body:
  text: 欽定四庫全書硃批諭旨卷一百二十硃批袁繼蔭奏摺加總兵官銜駐防哈密陜西洮岷副將臣袁繼蔭謹奏為恭謝天恩事竊臣準署甘州提臣田畯咨蒙兵部劄開奉旨現在駐防哈密陜西洮岷副將袁繼蔭著加總兵銜一應事務會同員外郎盛柱辦理具奏欽此咨行到臣臣隨恭設香案望闕叩頭謝恩訖伏思臣邊末武夫至愚極陋蒙皇上隆恩由遊擊超擢漢中副將調任洮岷今復蒙皇上加臣總兵職銜臣聞命自天感激無地惟有竭盡駑駘悉心料理以期仰答髙厚於萬一耳為此繕摺叩謝天恩謹奏知道了爾將來大有成就之人勉之陜西涼州總兵官臣袁繼蔭謹奏為微臣戀主情切懇請陛見仰覲天顔跪奏聖訓事竊臣荷蒙恩綸以副將加總兵職銜未及數月又蒙皇恩升授涼州總兵髙厚之恩實難圖報但臣自受命以來夙夜兢惕思欲得覲天顔跪聆聖訓因駐防哈密未敢瀆奏今臣已抵涼州任所犬馬戀主之心甚殷仰懇恩準陛見臣得以趨赴闕廷跪聆聖訓則臣有所遵循而巖疆亦有攸賴矣為此繕摺請旨謹奏爾來塞外甫經回任從容休息數月於明嵗來京陛見可也陜西涼州總兵官臣袁繼蔭謹奏為懇乞聖恩俯準隨師以效愚誠事竊臣蒙皇上天恩拔擢總兵雖夙夜黽勉毫無報稱近承準督臣嶽鍾琪照會密令臣在標屬挑選兵馬聽候調遣至領兵之員宜靜聽奉派但臣受恩深重報效無地今際用武之時披堅執鋭實所甘心是以感激思奮不能自已謹繕摺奏伏乞皇上天恩準臣隨師行走則臣圖報下悃得以少效於將來矣為此謹奏朕已有旨命爾署理安西鎮印務矣安西乃新設要鎮大兵前進正賴接濟䇿應諸凡事務竭力勉為之署理陜西安西總兵官印務臣袁繼蔭謹奏為恭懇聖恩憫念窮兵準開官當以濟緩急事竊臣見安西新設巖疆土無出産百物價值數倍內地兵丁衣食較為艱苦其日用緩急不無藉于典質但口外並無富商大賈納稅開當之家不過闤闠小民押物求息每兩一月之息竟至三錢以致窮兵日用愈為困苦臣查安西前蒙皇上發有庫貯通融銀共六萬兩內四萬兩必奏聞始敢動用至二萬兩為平時通融之用奉旨不必具奏而此二萬兩內除哈密存貯二千兩臣庫現貯一萬八千兩臣請于此內動支三千兩開設官當照內地當鋪例每兩每月三分起息其每月所有利息謹仰體皇上憫念在京八旗兵丁之恩旨亦將此項利銀存貯公所安西兵丁之家遇有吉凶事故呈明借領其本利出入細册每嵗經臣查核再行報部存案至前後接任之時造入交代册內查核庶極邊汛地緩急常通無重利之苦有周濟之益而皇上愛養兵丁之盛心無逺不周矣是否允協伏乞睿鑒施行謹奏此奏甚屬合宜咨明該督提照所請辦理聞汝嗜酒誤事當深戒之若不能遵朕訓諭仍復沈湎豈止自暴自棄負朕深恩莫汝為甚矣署理陜西安西總兵官印務臣袁繼蔭謹奏為遵旨議奏事竊臣準甘肅提臣宋可進咨雍正七年十二月十九日準署川陜督臣查郎阿咨雍正七年十二月初四日準户部咨內開和碩怡親王等奏稱派撥官兵事宜十二條開單恭呈御覽伏候皇上聖訓等因請旨雍正七年十一月初四日奉旨依議欽此欽遵內開衣孫蔡漢齊老圖地方關係緊要隘口與安西相近應令安西鎮酌量派兵防守等因移咨到臣臣隨酌量于臣標派撥將辨並馬步兵丁共五百一十員名預備馬匹甲械鍋帳鎗炮弓箭口糧等項候安臺辨兵起程之日即令前往防守伏查沙州至衣孫蔡漢齊老圖共八百九十六里其間惟阿魯巴兒固水草最廣堪以屯兵且南北西三面俱通要路臣酌量于此處安逰擊一員千總一員外委二名帶兵三百名防守倉都幹地方有草而水泉細微形勢窄狹此處安守備一員把總一員外委二名帶兵一百名防守自此至衣孫蔡漢齊老圖隘口三百一十四里間水草微細難以屯兵應于倉都幹駐劄兵內每十日派官一員帶兵三十名至衣孫蔡漢齊老圖哨探一次其呵呵賽地方亦屬緊要但水草無多今酌安把總一員外委一名帶兵一百名防守呵呵賽在阿魯巴兒固之東北相距一百四十八里倉都幹在阿魯巴兒固之西相距一百二十五里此三處互相掎角勢同指臂駐劄之地似無踰此事關軍機要務臣敬攄愚見酌量辦理所有派撥官兵數目駐防地方情形事宜理合繕摺先為具奏伏乞皇上睿鑒施行謹奏覽奏巳悉舉凡派遣官兵一切事宜槩行呈詳督提二臣畫一辦理即一面奏聞毋因係已密奏竟不請示于督提而行將所奏朕之批諭亦令張善備悉知之署理陜西安西總兵官印務臣袁繼蔭謹奏為恭繳硃批諭旨叩謝天恩事竊臣前奏請開官當以濟緩急一摺奉到硃批臣跪讀之下悚惶無地感激涕零伏念臣一介武夫由遊擊蒙皇上隆恩特擢副將旋授今職雖粉骨碎身亦不能仰答髙厚于萬一况臣鎮守巖疆責任重大又值軍興之際即晝夜警惕猶恐貽誤倘臣所行之事幾微辜負皇恩不但難逃訓誡諄切之至意所有微臣感激下悃理合繕摺恭謝謹奏覽硃批諭旨卷一百二十
