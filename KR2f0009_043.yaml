body:
  text: 欽定四庫全書硃批諭旨卷四十三上硃批劉世明奏摺雍正五年六月十五日陜西興漢鎮總兵官臣劉世明謹奏為奏明事竊臣駑駘下質不堪驅䇿荷蒙聖主知遇擢任總兵官到任後查興漢一鎮及所屬各營路俱在萬山之中實屬要地隨行令將備等官將所管汛地每季輪流務要親身巡查嚴緝匪類並行令將盔甲旗幟鑼鍋帳房一應軍裝器械等項俱要修補齊全聽候點驗各在案所有興鎮鳥習連環步法操演至拔補千把查向來總兵多在本標揀選臣今仰體皇上鼓舞人材至意飭令所屬將備將馬步弓箭鎗手兵丁分別日期輪流操演並令將技藝之優劣列觀感奮勵矣再漢中城守營副將趙祿老邁昏庸舉步艱難不能騎射臣現將其年老注入軍政案內但軍政定例係提督轉咨總督於十月內具題之後轉給疏稿到鎮約在十二月內方得照缺委署臣因思漢中一帶地方遼濶又係秦蜀咽喉往奏仰祈睿鑒謹奏覽雍正五年九月初六日陜西興漢鎮總兵官臣劉世明謹奏恭請皇上聖安朕安今命爾署理湖廣提督印務楚省兵丁向稱驕悍不馴又經魏經國一味善柔沽譽以致營伍廢弛不堪爾到任後萬不可因循舊習亦不可過於急驟當先之以開導繼之以勸懲次第整理務令改觀馮允中似稍不勝任聞伊一字不識信用一幕客係本處籍貫以革職翰林居鄉甚不安靜其名姓朕記憶不清爾到彼詳細訪察如得有劣迹不必干連馮允中止將其人所有實據明白具奏以聞密之同日又奏為奏明事竊臣於雍正五年九月初四日接河南總督田文鏡咨為詳請咨革事據河南按察司呈蒙本部院批據本司呈河內縣請咨革楊廷敬武生詳由蒙本部院批仰候移咨學院褫革仍一面將一干人犯提至省城另委賢員密行嚴審務必究出楊廷選確實下落飛行緝獲移解並將翟丹桂書內所稱介翁羅姓並雪羽楊姓齊姓是否即齊遂侯逐一究明嚴拏具報繳等因批司蒙此遵將一干人犯提至省城發交開封府會同懷慶府審解去後今據該府等詳稱蒙此除審據楊廷敬供稱楊廷選前往陜西興安州總鎮劉世明任所業經詳請咨拏外又據楊廷棟首供這案內原有濟源縣人周敬菴李渭南即李嚴翟明逺尹道士河內縣人孫茂先顧清宇胡無瑕郝老二孫仁文王孝貽張起相劉錫瑗王志孫龍文侯榮先馬靜逺濟源縣是周敬菴為首河內縣是楊廷選為首上年八月十六日羅眉年曾對我説要我隨他我不肯依羅眉年説就是你不肯事發也要拉你的後楊廷選給我合兄弟楊廷敬兩張黃符都沒有收今年六月十八日日將落時楊廷選拏了被套從我門前過我問他往那裏去他説往興安劉總鎮任所看總鎮兄弟劉錫瑗去這是實話此外還有什麼人沒有只拏住周敬菴們問他就知道了等情供吐在案據此卑府靳樹賢星夜馳回懷慶督同縣營密拏周敬菴等犯另報外所有楊廷棟供首晉省妖言聚衆案內黨羽緣由擬合具文申報並祈憲臺轉請移咨興安鎮將楊廷選劉錫瑗一並解晉收審等情到司轉詳到院為此合咨貴鎮請煩查照希將楊廷選劉錫瑗作速嚴拏務獲解晉收審仍祈見覆施行等因準此臣當即將臣弟劉錫瑗拏交該興安州吏目收管並行令城守營都司選差妥當目兵協同解役遞解陜撫轉解晉撫收審訖至臣弟劉錫瑗既同匪類交遊理應即行正法今押解晉省死有餘辜夫復何辭但臣父子兄弟受恩深重似此不肖之弟臣平日不能約束交結姦匪漫無覺察罪實難逭仰懇皇上天恩將臣立賜斥革奏以桞下惠之賢而有盜跖之不肖劉世明安能保無劉錫瑗之弟乎不但兄弟即親生子女亦難洞悉其心術隱微此事只合具摺奏聞設或具題則大不是矣汝其坦懷勿慮有何愧懼若能將楊廷選捕獲豈特汝弟被攀虛實尚須質對固屬與汝無涉縱使劉錫瑗誣揑至汝身朕亦斷不令株連無辜封疆大員也此案內王廷揚家人竟有十數名之多朕諭山西撫臣等勿因王廷揚家道殷實致令有借事吞噬之弊家口繁夥何能照管周到曾經如是切囑毋使纍及朕措施天下刑政諸惟揆情酌理豈肯寃抑平人汝第當上緊緝捕楊廷選解晉為要特諭雍正五年十一月十三日署理湖廣提督印務臣劉世明謹奏為奏明事竊臣荷蒙皇恩委署湖廣提督印務於本年十月初六日從興安起程由鄖陽襄陽宜城荆門州澧州一路馳抵常德業將接署日期奏聞查所過地方今夏被有水災者皆蒙我皇上深恩賑濟嗣又秋收豐稔現在地方安靜其所見營汛惟鄖襄一帶水陸塘汛猶皆完具至荆門營迤南煙墩塘房哨樓率多不整塘汛之兵丁皆係輪流更換問及地方情形皆不明晰臣細查楚省司照依在汛兵丁每名蓋結草房一間臣即轉行鎮協營路俱令塘汛兵丁㩦眷赴塘永為戍守不特地方情形人民姦良了然胸中即間有流匪亦給散再湖省濵水之百姓多有船隻打魚為生一處即有二三十隻不等往來水靣晝夜不息若遇孤舟停泊安保無生事之慮臣隨差守僃千把坐漁船不許深夜遊行並飭行所屬協營兵丁按期操練汛內加謹防範務期盜息民安所需一應軍裝必須齊整臣仰賴我摺奏明謹奏所奏朕皆嘉恱覽之爾係朕特加賞識之人非尋常可比辜負與否在爾捫心自思關係朕用人顏靣當勉之又勉秉公竭力勉為千古名臣以副朕之期望同日又聖訓實力奉行如打造黃銅器皿宰殺耕牛俱未嚴行禁止塘房保甲俱未修理整飭兵丁技藝亦皆生疏臣現飭將僃等官勤加操演每月合操務期熟練再查提督衙門舊有親丁步糧八十分標下每何補修火藥鉛彈等出自何項有云出自公費者費則一切軍裝得以整理而劣員亦不得藉名冒濫矣再查茄子窖原係詹毛湖地方居民頗多住居星散兼之接連馬景湖以至東通洞庭西界澧州南接常德北連荆州每年夏秋之間湖水泛漲四路商船由此往來十月以後水落灘淺商船皆愚昧無知不敢擅専謹具摺密奏仰祈睿鑒施行謹奏覽雍正五年十一月二十九日署理湖廣提督印務臣劉世明謹奏為叩謝天恩事竊臣家人齎捧硃批臣奏明臣弟劉錫瑗情由一摺到常隨即恭迎至署跪讀之下臣不禁感激流涕仰見我皇上仁慈居心推誠馭下臣愚魯武夫寸長未效何以邀聖主浩蕩之恩如此其極也臣曾責問臣弟劉錫瑗我祖孫父子世受國恩如何有你這樣不肖之人交結匪類上負主恩豈不有玷先人名節錫瑗答云楊廷選係同城居住我原認識至他所為我實不知等語臣即欲究處文武官員俱云事關欽案解到山西自有國法鞫訊以是交興安州吏目轉解訖查楊廷選原籍山東曾在懷慶做過千把總緣事革職臣今密令家人扮作行商分途屣緝務期必獲轉解嚴審按法究治外合先繕摺叩謝天恩謹奏其事巳顯然明白矣與爾何涉雍正五年十二月十九日署理湖廣提督印務臣劉世明謹奏為奏聞事雍正五年十二月十三日據桑植副將楊凱詳為土辨世受國恩無由報效懇祈詳請改土歸流另賞末職以盡犬馬微忱事雍正五年十一月二十六日據永順宣慰司彭肇槐率男彭景燧呈稱竊卑職生長邉地毫無知識蒙朝廷豢養殊恩有加無已今於本年十月初九日奉署督部堂檄行桑植司土辨向國棟暴虐不仁殘害土衆密陳改土歸流蒙皇上天恩俯順輿情救土人出水火而登袵席命卑職帶土兵二百名隨營聽候調遣卑職凛遵帶兵晝夜兼行至桑永交界處所劄營聽候調用見桑植土民歸誠嚮化者人人恱服歡聲震地卑職因思聖天子在上不毛之鄉俱梯山航海來享來王願入版圗況我土司居幅􅊷之內而有漢土之分實非臣下所安況卑職具有人心豈甘終老荒陬與草木同腐謹將職永順司戶口册籍地輿全圗查造清册伏祈憲臺俯賜轉詳上憲據情題達改土歸流將卑職父子或賞賜外省武辨末職俾得報效皇上天髙地厚之恩則有生皆戴德之日再卑職祖籍江西仍求安插江西原籍則子子孫孫共沐皇恩矣懇祈轉詳施行等情並據該副將齎有永順土司戶口印册一本輿圗一張到臣據此欽惟我皇上大德諴民至仁育物六合之內無一夫不得其所是以永順宣慰土司彭肇槐向風慕化感激皇仁情願改土歸流實因我皇上聲教覃敷之所致也除咨移督臣邁柱湖南撫臣王國棟會疏具題請旨外理合先將永順土司原造戶口印册一本輿圗一張恭摺進呈御覽伏祈皇上睿鑒施行謹奏覽土司彭肇槐自願改土歸流情詞已悉題到之日有旨雍正六年二月二十日署理湖廣提督印務臣劉世明謹奏為敬抒管見仰祈睿鑒事竊查湖廣地方遼濶沿江塘汛彼此相去有十里有十數里者而每塘汛兵不過二三人或四五人而止客舟失事之時倘遇賊多勢盛汛兵不無退縮之處且本塘客舟被劫鄰塘相去窵遠聲息難以相聞是水汛弭盜遊巡不可不設也遊巡之法令各協營將存城兵丁每次派撥十名乘坐該營巡江船一隻或將僃統領親巡或千把督率親巡定限每月三次為率如能緝獲盜賊十數起者仰懇皇上天恩賞給議敘以示鼓勵至洞庭湖額設兵丁七百零七名快船五隻専司湖汛向例常川遊巡洞庭一協仍應照舊此外有武昌荆州常德嶽州四水師營每汛安設戰船二三隻兵丁三四十名不等徒泊江干並未遊巡緝捕以臣愚見一汛止須兵丁十名船一隻仍留分防外其餘兵船盡令撤回與存營兵船俱為遊巡之用每月亦限令遊巡三次於地方似有裨益再查長沙衡州鄖陽三協並無額設船隻臣愚謂長沙係湖南省會重地該協應設巡船八隻衡州勢居上流止須巡船四隻鄖陽上連秦省下達襄陽係商賈通行之路亦應額設巡船四隻然此項船隻不必另行添造查沅州協除經裁去現存戰船二十隻俱屬空間無用請將該協之船撥歸長沙八隻衡州四隻鄖陽四隻以資遊巡所餘四隻留為沅州協遊巡之需是一轉移間以無用而悉為有用於地方不無小補但江湖夏秋水勢泛漲遇有狂風波濤洶湧間有遊巡船隻被風損壞者自當據實題報免其賠補出自聖恩臣愚昧之見是否允協伏乞皇上批示以便遵行謹奏設立遊巡以稽查塘汛所議似屬妥協但朕未經親歷其地事關創舉何可遽定是否與督臣邁柱詳悉商酌題奏候旨雍正六年四月二十一日署理湖廣提督印務臣劉世明謹奏為瀝陳下情仰祈天聽事本年三月二十九日準湖南撫臣王國棟咨稱臣弟劉錫瑗交臣收管訖竊照臣弟錫瑗幼失庭訓遊惰卑汚身罹法網皆由臣平日教誨不嚴督責疏忽之故荷蒙天恩優容仍令供職舉家感戴沒齒難忘今錫瑗由山西撫臣審明摘釋解交收管臣思錫瑗原係臣分居之弟應令回籍但恐約束無人別生事端如仍豢養在署終是虛度時日輾轉思維臣弟錫瑗身材壯實能受辛苦雖平素遊惰糊塗自經此番罣誤刻骨銘心頗知悔過惟是志切圗報國恩其如效力無地臣跪求皇上天恩準臣將錫瑗遣回原籍就近賞發河北鎮標安插撥歷勤苦差使以贖自身罪愆庶有約束拘管或可望其稍有造就應否如是微臣不敢擅便理合繕摺奏聞謹奏似此下愚之流尚何望其改悔當於任所嚴加拘禁不令會晤一人方是凡遇斯等不肖子弟若少存姑息必纍及祖父遺害子孫於此處見不透非慈父賢兄也慎之雍正六年五月初一日署理湖廣提督印務臣劉世明謹奏為奏聞事竊臣本庸材仰荷恩命簡署湖廣提督印務自履任後目擊營伍廢弛將辨疲玩惟有時時宣布天恩諄諄訓誨標員亟圗改過自新近頗勤加操演至於外鎮協營將辨亦經輪流調赴考驗復疊行文告教導俾各觸目警心臣實自知愚昧惟督飭屬聖主天髙地厚之恩至如長沙協副將楊林廢弛營務私坐戰船任其朽壞擊碎與永州鎮標左營遊擊楊京瑛右營遊擊蔡洪印疏玩盜賊貽害地方俱查實報之處一并附參在案臣查寧逺縣丹桂鄉上洞居住生員荆之寶家於本年二月初一夜被盜一案臣恐風聞未確於三月初六日専委臣標左營遊擊陳有年前去察勘實情并令署理永州鎮右營遊擊事務據陳有年稟稱查得左營遊擊楊京瑛把總徐俊傑王俊侯各帶兵丁於二月十七日至鬼仔嶺地方會合十八日齊進南竹坪拏賊忽有兵丁泄漏賊衆知覺又兼霧迷被賊暗截其後殺害兵丁五名搶去火藥鉛子帳房弓箭并衣物等項楊京瑛跌傷右腿王俊侯腰受鎗傷將辨均被執辱楊京瑛允許賊人銀三百兩米鹽等物仍留把總王俊侯兵丁楊國英作當方將楊京瑛放去十九日右營遊擊蔡洪印同千總王士元把總陳文宣帶兵至中軍營地方途遇楊京瑛説知失利緣由而蔡洪印當即劄駐滴水營竟不率兵前進楊京瑛隨差兵拏銀一百兩并米鹽如數給賊始將王俊侯楊國英放回蔡洪印後探知賊人逃散即將兵丁撤回寧逺現據盤獲賊黨年亞孫等五人經寧逺縣審供夥黨八九十名均係廣東連州等處人民因開金礦折本所以行劫理合呈報等情稟報到臣臣查此案不過廣東礦徒流入楚境交界處所本係烏合之衆若將辨略有謀為相機尾追何難立時盡行縛獲今楊京瑛以寡謀失算恃勇躁進致被拒捕受辱蔡洪印聞知失利畏縮逗遛縱賊聞風竄揚其罪更不可逭更可異者鎮臣楊國相自此案發覺迄今已經三月置若罔聞絶無隻字咨報臣推國相居心謂已沐皇上天恩調補兖鎮總兵竟可任意玩延専俟新任鎮臣到任便可飄然卸肩而去如此居心無乃負恩不淺臣愚懇求皇上仍令鎮臣楊國相暫緩赴任羈留在楚著伊等率領參革遊擊楊京瑛蔡洪印并同千總王士元把總徐俊傑等協同文員捕役設法緝拏俟夥盜全獲之日再行請旨定奪庶汛員各知凛畏功令勤謹巡防而邉苗百姓皆得安枕矣為此繕摺奏聞伏乞皇上睿鑒謹奏已有旨矣候由部頒發雍正六年六月二十二日署理湖廣提督印務臣劉世明謹奏為奏聞事竊照湖廣一切營制積玩因循臣謹凛遵訓旨不疾不徐教誨申飭頗已修整惟是水陸塘房例係有司修理臣到任後即咨移督臣並北南二撫臣在案因牧令任催罔應現又咨移督臣並北南二撫臣轉行督飭矣至於湖廣水師雖與邊海不旨遵行再查沅州協副將牛玉現年六十五嵗騎射猶能勉強為人老成持重熟諳營規但沅州適當苗疆恐將來牛玉之精力終難勝任為此繕摺奏請皇上恩賜調補庶幾各收得人之效伏乞睿鑒施行謹奏據稱牛玉為人老成持重熟諳營規但恐年邁精力不能勝任等語果如所云試思老耄衰頺之人何處可相宜耶此奏殊屬不協當審觀其猶堪勉強供職則熟諳之員尚可姑容若竟昏憒龍鍾即令伊告休為是因將來恐難勝任而預為請調有是理乎汝其再加酌量於所屬各營擇事簡之地就近題請調補或庶幾可同日又奏為奏聞事竊照湖廣地方本年二麥豐收之後雨水調勻禾苗均得及時栽插五月內襄陽安陸等處沿江水長堤塍間有坼陷隨即搶築並未衝決湖南諸府未曾發水一切堤塍甚是安穩夏至以後大雨時行但各處得雨分數不齊得雨充足及有塘水車戽者早中二稻俱十分收成得雨不足又無塘水車戽之處止有七分收成米價每石自八錢四五分至九錢四五分不等目下雨水短少立秋處暑前後若得數次澍雨則晚稻處處豐熟矣兵民時氣漸消地方甚是安靜恐厪皇上睿念理合繕摺奏聞謹奏深慰朕懷同日又奏為奏聞事竊照常德城內革職翰林楊緒在籍如何之處經臣查明據實奏聞已蒙皇上睿鑒臣復不時訪察楊緒每見官員經由便去逢迎拜往今於五月二十八日同原任廣東黃岡協千總裴俊前往辰州稱係新任辰沅靖道王柔邀約而去查王柔赴任經由常德與楊緒動身時相隔不過旬日則其到王柔處似屬實情理合繕摺密奏伏乞皇上睿鑒謹奏楊緒不安其分已被王國棟參奏矣雍正六年八月二十四日署理湖廣提督印務臣劉世明謹奏為奏聞事本年七月初一日據臣看守轅門中營守僃張起朝稟稱有自京城來人趙之雋口稱係臣表兄在外求見查臣父生母趙氏原係正白旗滿洲戶下趙姓之女而趙之雋實臣祖母之內姪孫但伊係滿洲何得出外行走復令盤問之雋自稱並未告假倐稱已贖出旗言語支離顯有情弊臣即押交一十五嵗尚未授室緣撫臣王國棟查勘堤塍經由常德會靣數次敘及家常伊言第二女年十四嵗亦尚待字閨中欲與臣子為媳臣隨求允此臣家庭瑣事奚敢瀆陳君父之前但臣蒙皇上成全造就之恩遇事不敢稍有欺隱故繕摺一並奏聞謹奏因同官而結婚媾乃係情理所有文武相和極好之事朕欣恱覽焉同日又奏為恭繳硃批事竊臣前因湖廣各營水師廢弛於蒞任後屢加嚴飭汛防整理船隻意欲秋間調集臣親身驗看督令練習所以恭請訓旨仰荷皇上誨示諄諄周詳確切臣心倍增凛惕専候欽命發給福建熟練水師教習兵丁到楚欽遵施行查沅州協副將牛玉於七月內赴武昌考驗回任沿途忽患背瘡醫治不痊至八月初三日在任病故業經督臣邁柱據報會題矣所有硃批原摺理合敬繳謹奏覽今用爾為甘肅巡撫勉為之母負朕之特簡所派助黔兵辨一一精選上等者發往不可少涉草率雍正六年十月十三日暫理湖廣提督印務臣劉世明謹奏為奏聞事本年十月初十日署湖廣提督臣嶽超龍已到常德臣隨出郭迎請皇上聖安嶽超龍敬宣諭旨劉世明俟嶽超龍到日即赴甘肅巡撫任欽此但臣先於初六日接到部文係九月十四日奉旨命臣派撥前往貴州官兵俟辦理起身之後再赴甘肅巡撫之任等因欽此臣於初八日業將暫留印信緣由具疏題明在案查嶽超龍傳宣諭旨在前臣復接到部文奉旨在後今臣凛遵後奉諭旨辦事為此繕摺奏聞伏乞皇上睿鑒謹奏遵奉後旨甚是知道了同日又奏為奏聞遵旨派撥官兵事竊臣於十月初六日自嶽州府會審回署本日接到部文奉旨命臣揀選賢能精壯官辨兵丁一千名著黃州副將李繩武帶領前往貴州聽鄂爾泰楊天縱節制調遣等因欽此臣隨揀選臣標右營守僃王璽曾在四川口外出兵效力洞庭協守僃張養民曾在口外出兵效力皆係熟悉邉情均屬賢能之員再揀選得臣標千總文尚禮李德民寶慶協千總王治國澧州營千總趙玉臣標把總李學聖周秉樂張國良江應秀孫易明辰州協把總藍美林沅州協把總彭光禮常德水師營把總趙國棟等俱係小心勤愼才能辦事之辨又咨湖南撫臣王國棟揀選標辨一員標兵一百名臣標五營派兵丁五百名辰州協一百名沅州協一百名寶慶協五十名澧州營五十名洞庭協五十名常德水師營五十名合足一千名之數以上各標協營均屬附近貴州所撥步兵內俱令挑選鎗手庶崇山深箐易於制勝更思炮位乃必需之物撥臣本標五營子母炮五位龍陽協子母炮一位前去臣於初八日分檄督催各官兵限日到常専俟督臣邁柱撫臣王國棟作何給與馬匹及沿途口糧草料酌量料理之處咨照到臣即轉飭領兵官黃州副將李繩武逐一遵照令其速行起身今嶽超龍於初十日已抵常德暫住公館臣將所行事由當靣詳悉説知仍俱咨移知照商酌協辦庶將來接管承行兩無貽誤臣俟料理前往貴州官辨兵馬起程之日送交印篆與嶽超龍署理為此繕摺奏聞伏乞皇上睿鑒謹奏選派兵辨殊屬精詳妥協覽汝辦理事件完畢方交印與後任之疏足見乃心奉公朕甚為嘉恱雍正六年十一月初六日特授甘肅巡撫臣劉世明謹奏為奏聞事竊臣遵旨揀選僃辨並派調各協營兵丁數目前經奏聞在案續準督臣邁柱撫臣王國棟議給各兵馱載馬匹並擡運炮位人夫委員承辦沿途散給口糧草束料豆等項催調黃州協副將李繩武及各協營辨兵陸續到齊臣隨逐細查察僃辨俱係才能目兵均屬精壯一切器械軍裝無不鮮明鋭利騎坐之馬驗皆臕壯馱馬內有疲弱不任負重者立押挑換肥健好馬照數補足俱令李繩武即時烙印公同署提臣嶽超龍將兵點交李繩武帶領於十一月初三日起程前往臣亦具疏題明隨將印信送交嶽超龍署理再有奉旨預僃之兵一千名經署提臣會臣派撥妥協専候諭旨遵行臣於初四日由水路至德山離城十里灣泊等候差送兵馬出境回信於初六日據前差尾送官兵遊擊回稱兵馬已出常德境臣即拜摺起程前詣武昌候旨為此繕摺奏聞謹奏覽薦舉許登瀛一摺留中雍正七年正月二十五日福建巡撫臣劉世明謹奏為恭報微臣入境日期并陳地方情形事竊臣荷蒙皇上特達之知調補福建巡撫接準部文知照速赴新任臣隨遵旨自湖廣由江西赴閩於十二月二十四日入臣屬崇安縣境即由建寧延平二府所轄縣分至臣駐劄之福州城細詢建延汀邵上遊一路米價每石自九錢五六分起至一兩一錢三四分止福州省城及興化漳泉福寧各府州米價每石一兩四五分至一兩三錢有零不等目擊民情和恱四境平安雖去夏數處缺雨歉收蒙我皇上預敕江浙截留漕米運閩平糶又蠲免歷年民欠錢糧疊沛殊恩萬民感激遍地菜麥春花目下均有接濟揆度情形可無靑黃不接之慮誠恐逺厪聖懷為此繕摺奏聞謹奏據奏閩省民情和恱米石價平可無靑黃不接之虞諒卿不忍為欺飾之語也朕懷曷勝欣慰同日又奏為奏聞恭聆傳宣諭旨凛慎遵循事竊臣於本年正月初五日抵洪山橋先詣欽差吏部侍郎史貽直公館叩請聖安伏聞傳宣聖躬萬安敬聽諄諄訓誨臣即叩頭領受銘刻肺腑隨於次日到任正值封印所以半月中得有數次靣會欽差史貽直疊述皇上教訓居官體統並察吏安民之要道臣係武職初入文途荷蒙皇上如此曲賜指示微臣若不細細體貼凛慎遵循則遊府廳縣官臣於沿途接見匆匆咨詢難悉底藴外貌皆無龍鍾衰殘考之輿論亦無狼藉之聲至於下遊道府廳州縣各官臣尚未接見所幸閩省聖明燭照察吏之道雖非一端臣愚不以聽言信行而便姑容或在臣前言語魯直頗類粗蠢退而觀其撫字催科咸有實濟臣則不敢因伊辭令未嫺而故為屈抑其有因吏治未諳偶致貽誤者臣必先行飭訓至再至三如仍不能悛改憲章具在訓示遵行謹奏覽同日又奏為酌籌閩省耗羡歸公之法以昭畫一事竊照閩省邊海環山原非財賦重地但承辦公務如津貼戰船撥解京餉協幫銅斤不敷與捐補無著虧空各項公務較諸內地更覺繁多惟是從前濟用有提取火耗數分或又分派照捐者更有因俸工奉旨敕給另立公捐之名而又暗扣俸工充用者上則飾辭以瀆聖聰下則借端以苛索屬吏猾胥乘機舞弊牽混便足誤公總因院司道府廳州縣各以勢分懸殊遇事承順意指不肯仔細通盤籌畫之故臣查通省地丁錢糧每年共一百五萬有零百姓完糧火耗止許內加一扣收正銀一兩完給串票九錢是也以零星所收拆封歸總彈兌又可多出二三釐統計每兩加一火耗連並戥共耗一錢四分即剖為一十四股一股作批差解司盤纒及雜項費用四股留存知縣養廉并充該縣公用一股分給知府養廉廳員有經徴屯糧雜稅無庸另議養廉尚餘八股盡歸司庫糧米耗羡亦照地丁之式每年統計銀九萬有餘或有別項無礙非關正項銀兩再應歸公者查出仍盡充公然後計算一年必不可省之費并院司道各官分給養廉通共若干捐補無著虧空亦在此內撙節報完所有俸工一項遵旨分釐實給官役不許欺瞞捐扣辜負皇恩如此畫一立法庶官吏難於滋弊而臣亦易於查考也應否如是微臣愚昧不敢擅便為此繕摺奏請訓示遵行謹奏覽所籌畫甚屬允當但州縣無論錢糧多寡概以四股存留餘盡提取恐有苦樂不均之處尚宜詳酌同日又奏為奏五年多增一萬六千六百餘兩此係天恩準開南洋通商裕課之效驗也臣細查每年除解贏餘赴部路費添平飯銀等項及差員齎奏盤費並採辦枝圓柑橘等項遇事支用外每年共有剩銀一萬餘兩又有擔頭錢乃每貨一擔另給家人巡役銀一分或七八釐並紅單照票坐口鹽菜等項查歷任巡撫皆差家人前去坐口親查收繳其數目多寡無從稽考所以前任撫臣朱綱不令家人坐口將此項陋規並交委官専司其事督臣髙其倬續署撫篆亦循此例而行可稱良法細核半年以來所得擔頭各項分給委官家人關吏書手養贍并巡攔各役諸色用人工食日用館租修整巡船等項外每月報繳巡撫多則一千六七百兩少則一千四五百兩不等約計每年共可得銀一萬八千餘百兩又巡撫衙門另有布政司平羡養廉銀五千兩親丁步糧五十分是福建巡撫一官蒙皇上特恩共計得銀三萬三千有餘矣據臣計算巡撫衙門一切需用并奬賞出力官役酌量每年不過一萬四五千兩臣又見布政司所送捐項一册內諸如此類陋習相沿正恐不止一事也謹先繕摺奏明容臣暨司道府覿靣確核如承辦地方公事不敷濟用撥出巡撫衙門現得多餘銀兩協濟應否如是理合繕摺奏請訓旨遵行謹奏如公事不敷濟用不應於汝等養廉銀內動撥或稅課或鹽規均可添湊通融也然皆當據實奏知總之一毫不欺不隱則諸務不難辦集而其中多寡輕重朕了然洞悉亦易於指訓可與髙其倬確商具奏以聞雍正七年三月十一日福建巡撫臣劉世明謹奏為奏率領佃人侵入傀儡山開墾破水灌田致被生番生番界內開墾各職名到日另行題參為此一並繕摺奏聞謹奏覽同日又奏為遵旨覆奏事竊臣齎摺家人回閩蒙皇上發交升任布政使沈廷正奏摺一件前任撫臣朱綱奏摺一件又戶部王大臣密議覆摺二件奉硃批命臣詳細斟酌徐徐查議奏聞欽此臣查官役俸工久蒙皇上特恩給領斷不可再以修理戰船名色議捐辜負聖恩況福建地方應辦公事條欵甚多原不僅津貼船工與不敷銅價二事而已似應統歸耗羡項下畫奏各屬溢額銀兩官收寺租龍溪縣欺隱地畝等項查欺隱地畝一項現據龍溪縣民自首一萬三千餘畝但未足二百餘頃之數應飭再為確查此係百姓從前欺隱相應遵旨歸於自首案內一並彚題升科官收寺租一項因各屬皆有甚覺零星而且事例不一未便但據一二處所見所聞草率具奏寧福安等十一州縣每年溢額銀約共八千八百五十餘兩米六百石現經查出數處多係百姓從前開墾報縣升科州縣官不為轉報請題竟將此項錢糧歷年侵蝕肥已上下通同已成錮弊奚容任其揑稱溢額巧飾侵漁今此項地畝溢額銀米亦應歸自首案內彚訓旨遵行謹奏所奏琉球國王進貢一事摺留中有旨諭部同日又奏為奏聞事竊閩省官吏辦事延緩已成錮習臣查泉州府屬之同安縣列械鬭毆事件共計一十七案察閲起釁情節甚覺細微稽延日久拖纍多人總因屢易署事縣令凡遇爭訟告報到官不能即為剖斷解紛忿氣日積往往恃其族大人衆彼此聚集互爭勝負干犯憲章及被州縣通詳無案不牽連數十餘人乃復懼罪逃匿以自作苟安之計臣隨密飭新任泉州府知府劉而位親往就近查理許其便宜措置不以文法相拘續經劉而位即以已意先出告示曉諭兩造各來聼勘概豫酌量發落準令自新亦不再行拘解拖纍等因隨據十七案原被人犯盡赴該府投到未滿十日俱經劉而位逐一審明分析情罪輕重枷號責警無辜一概省釋各飭歸農具文通詳並具稟懇如伊詳請完結庶百姓皆以知府之言為可憑信等語臣隨細查各案並無人命盜劫重大事件當即照詳批司轉飭銷結訖即此類推可見民心原易化導祗因閩省訟師多有勾串各衙門胥役舞文滋弊殊為閭閻大循積習以仰副我皇上勤求治理察吏安民之至意至於修造戰船尤為海疆要務而承修各道員動以津貼不敷借辭支飾臣查興泉道張廷枚分修之船除竣工交營外尚有戰船八隻並未修理完工亦不上緊催督趕辦並以無力賠修為詞於應領正價及津貼銀兩之外復向布政司移借庫銀三千兩需用據詳到臣臣即駁飭確查去後因思既有正價又有津貼不過但令承辦其事何得動稱賠纍及細加察訪內中另有隱情蓋因閩省戰船津貼較之浙江為數幾少一半所以承辦各員動稱賠修今臣再四籌思津貼既與鄰省不符無怪其承辦心亦怠玩現議酌加三分假如從前津貼係七百兩者兹竟給領一千兩無論大小修之船統照此加三之數核算遞增凡各厰一切未完船工均照加增津貼嗣後如再故延時日不速趕完工容臣另行據實指名題參至於津貼修造戰船乃海疆第一緊要公事例應支動耗羡但閩省公用養廉應歸耗羡項下辦理已經微臣繕摺奏給發津貼緣由相應再為奏聞伏乞皇上睿鑒謹奏覽雍正七年四月十三日福建巡撫臣劉世明謹奏為奏聞二麥豐收事竊照福建地方氣候較各省甚早今年菜麥春花處處十分豐熟目下收穫齊全自正月迄今雨水及時民間亦無被劫盜案惟據臺灣道府稟據鳯山縣報稱去年十二月長興莊管事邱仁山等率領佃人越界侵入傀儡山開墾破水灌田致被生番殺害一事臣即嚴飭勒令設法獻出凶番審擬招解並取玩縱失察侵越開墾各職名到日另行題參去後續於本年三月二十六日據臺灣道府各稟報據遊擊靳光瀚署海防同知劉裕各報稱於本月十一日拏獲山豬毛等社凶番共二十名俟解到訊確另詳等語稟報前來臣查生番原與禽獸無異業蒙我皇上燭照幾先已奉諭旨勒石立有界限而姦民乃敢越境開墾偷破番水題請旨恐厪聖懷為此繕摺奏聞謹奏覽雍正七年五月初一日福建巡撫臣劉世明謹奏為奏聞事竊照福建通省地方自春及夏雨水甚勻米價平減禾苗豐茂無比四民樂業地方安堵欽差吏部左侍郎臣史貽直甄別府縣各官事畢於四月二十九日起程回京復命臣見史貽直一切需用俱出巳資況係兩次赴閩誠恐回途缺欠盤纒臣支應得養廉銀三百兩幫伊路費史貽直再四不收似此操守淸謹實為可敬臣惟見善自勵勉效步趨以仰報我皇上天恩而已理合繕摺奏聞謹奏覽奏雨水調勻禾苗豐茂朕心深慰汝抵閩任事未久即蒙上天如是湛恩汪􅐮必因汝念慮忠誠有以感召之也欣恱之懷筆難悉諭其加勉加慎勿怠汝等封疆大吏但能實心為國為民則神明祐助百物順軌實有不期其然而然者同日又奏為據實奏聞恭請睿鑒事竊照欽差吏部左侍郎臣史貽直遵旨回閩甄別府縣各官隨即辦理梅廷謨摺奏原任侯官縣王夢賢之子王溥仁侵匿錢糧一案嚴拏有名各犯於十二日部臣史貽直會同督臣髙其倬並臣劉世明逐一細細察審分寄財物之處毫無實據嚴加夾訊堅不承招監生楊璉惟有搶地呼寃鑒貌辨色似無支飾別情況部臣與臣等辦理此案甚是謹密伊等無從探聽預僃登答所供似屬實情再據奏幕客王能之曉夜呼盧揑改簿册四百六十三本等語則能之必係精明強幹之人今臣等審驗年已八十龍鍾不堪即此一節竊恐梅廷謨似有奏對失實之咎況臣身受皇上隆恩遇事敢不赤心辦理自干罪戾一切情節惟有據實奏聞除將永成號洋貨店財産物件帳簿文約並王溥仁寓所服飾等項逐細登記封貯俱撥令兵役嚴加看守聽部臣史貽直據實僃細奏聞請旨遵行外臣謹繕摺奏聞伏乞皇上睿鑒謹奏所奏是百凡總惟汝等是賴悉肯秉公據實直陳一切事自皆適中得當矣何有枉縱過不及之失朕有旨命史貽直留閩署理總督印務與之和衷共事可也同日又奏為奏聞事竊照新任海關臣準泰於四月十八日到閩臣已飭令總理該關事務張廷枚將印信文卷吏役人等一並送交準泰接管外所有臣任內經手三箇半月正稅贏餘銀兩俟督催各委員解司齊全報册到日逐一核明分別另行奏聞再準泰靣奉上諭總督髙其倬為海關各稅口委員分查具題一事爾到福建之日會同髙其倬劉世明酌核具奏欽此伏查福建海關已蒙皇上燭照欽差専員似與督臣前題事例微有不同應俟準泰料理月餘欲作如何損益之處微臣自當勉力贊助務求妥協也合先繕摺奏聞謹奏雖欽差専員監督稅務究係汝所轄地方毋視為身外事而漠不相關也雍正七年六月十六日福建巡撫臣劉世明謹奏為奏聞畫一辦理通省公務分給各官養廉事竊照閩省一切公事及各官養廉臣於到任後業經細加籌畫繕摺奏聞復與督臣髙其倬及司道等官將通省耗羡并存公各項逐細查開確核每年應行承辦公事暨分給各官養廉公同議定除臺灣一府耗羡養廉經督臣分派會奏外臣謹將八府一州公務養廉條欵數目另繕清摺恭呈尚有應給各官養廉銀八萬四千三百兩今先實給八分三釐零存留司庫一分六釐零每年計銀一萬三千九百一十七兩分作三年將無著銀兩全補完日仍照原議十分全給各官養廉庶辧理公私事務不至有缺乏之虞臣亦易於稽查弊竇應否如是伏乞皇上睿鑒施行謹奏此奏朕甚嘉之歷來直省耗羡養廉一節朕從不問及遇各督撫等肯秉公據實奏請者朕一一斟酌訓示閩省督撫未經詳陳請示朕何因追求今據汝所開條欵甚屬明晰閩省養廉似覺不敷己降旨諭部指撥數項以增助汝等用度庶不致有所缺欠也同日又奏為恭報早穀豐登事竊照福建地方自入夏迄今各處雨水均無缺欠晚禾茂暢早穀現已登場山鄉僻壤處處豐收省城米價每石一兩一錢各府州縣每石自九錢四五分至一兩一錢五六分不等地方安堵海洋寧靜恐厪皇上睿懷為此繕摺奏聞謹奏早穀業已登場朕懷甚慰至於晚禾必待秋成後方敢釋念也同日又奏為欽奉上諭事本年四月初一日準吏部咨文內開奉旨姚孔針戴大冕杜昌丁葉維榮楊璧黃廷鋐劉世霖湯其祿嵇嶽延劉長善錢廷鏞王裕璸張廷球亓式願郭偉基趙可承黃南春陳悌命往福建交與該督撫酌量應以知縣用者著委署試用應以縣丞以下等官用者著具題補授其試用知縣人員如辦事好者再行具題補授倘不能辦理地方事務咨部請旨其庸劣者即行題參欽此等因到臣目下已據各員陸續至閩臣恐伊等俱係初登仕版尚未諳練吏治況其才具短長亦未能一見即定若遽委之以政實恐用違其才貽誤地方竊照藩臬兩司乃錢穀刑名之總滙隨將新到人員分派在藩臬衙門學習使其通達治理並令藩臬二司遇事為之開導講解則其才具優劣便可試得大概酌量詳請委署試用似於造就初仕人員深有裨益理合繕摺奏聞伏乞皇上睿鑒謹奏朕原有此意所奏殊屬可嘉之至已有旨通諭直省照行矣雍正七年七月二十六日福建巡撫臣劉世明謹奏為據實奏聞恭請睿鑒事竊照外洋製就鴉片煙一種最能淫蕩人心貽患不淺荷蒙皇上敕部議覆定例通行禁止在案兹據漳州府知府李治國申稱鴉片毒煙現奉嚴禁但欲塞其流當淸其源卑府密差文韜訪查於二月二十二日據該差轉託蘇笑從陳市行中向陳遠買得鴉片一斤當即委員前往陳遠家起獲三十三斤等語通詳到臣隨批司飭令確審究擬招解以憑審題去後續經李治國審據陳逺供於去年載運橘餅往廣貨賣因無售主適有不知姓名客人以鴉片木香等物與伊兊換帶回將陳逺擬照興販鴉片煙例枷號一箇月滿日發邊衛充軍招解到司據臬司覆審無異照依府擬解院審題臣隨親審據陳逺滿口呼寃堅稱鴉片原係藥材必需並非做就之鴉片煙只須一驗便明臣即提到原贓令福州府傳到太和堂藥鋪戶陳書珮認驗供稱驗得此係鴉片熬膏藥用的又可做鴉片丸醫治痢疾這是並未做成煙的鴉片等語夫鴉片為醫家需用之藥品惟加入煙草始淫蕩害人為干犯禁例之物李治國何得設計誘出陳逺家所藏鴉片便以鴉片煙之例問擬枷號充軍錯混施行甚屬乖謬法應照依故入人罪列欵題參臣思濵海頑民性多愚蠢或見因此參官謬稱已弛鴉片煙禁復肆貨賣此煙亦未可定不得不防微杜漸除將陳逺發司取保鴉片三十三斤貯藩庫外理合僃細奏聞再李治國平日居官才具似不能勝劇郡之任稽察屬員與辦理庶務不無寄耳目於小人反致自干咎戾合並密陳伏乞皇上睿鑒施行謹奏李治國於此一事雖欠明察然乃過於從事之咎情理尚在可原不就此案𠫭處甚是若果才具平常不勝要任則當與史貽直商酌或調任事簡之缺或題請以部曹補用可也其三十餘斤鴉片若係犯法之物即不應寬釋既不違禁何故貯存藩庫此皆小民貿易血本豈可將錯就錯奪其生計如欲留為異日證據數兩幾片足矣未有全留貯庫之理雖係細事殊關輿論汝等身膺封疆重任慎勿因其細而慢忽視之蚩蚩愚氓正於此等處觀汝之體恤民隱周詳與否也志之雍正七年八月初二日福建巡撫臣劉世明謹奏為奏聞事竊照福建提督學政臣程元章蒙皇上特恩署理浙江布政司事於閏七月十二日遵旨將印信交臣管理次日起程前往赴任惟是貢監生員科舉例係學臣録取送闈應試查程元章於七月內完竣科考內地八府一州並臺灣府共取一二等生員三千九百餘名尚有貢監生員七千一百餘人雲集省城正候示期考録遺才臣思巡撫署理學政定例不預考校之事但今鄉試在邇未便拘泥成例下誤士子功名上負掄才大典所以臣於接印疏內即經陳明在案自閏七月十八日起分作五場考校已經陸續録取發案現在造册送闈應試至於一切場務臣俱督飭照料齊僃為此繕摺奏聞伏乞皇上睿鑒謹奏事固在所應辦但汝意不過借此恱士心以沽名耳亦何足深取同日又奏為恭謝天恩事本年閏七月二十七日據臣標齎摺兵丁敬捧皇上賞臣絨纓頂帽並克食二匣回閩當即出郭迎接至署恭設香案望闕叩頭謝恩祗領訖臣伏讀諭旨指示周詳洵乃無微不照增賞養廉羣沾厚祿特恩曠典亘古稀聞隨知會署督臣史貽直觀風整俗使臣劉師恕並傳司道以下各官齊集公所宣示恩旨望闕叩頭謝恩除飭司檄行通省大小官員遵照再與署督臣史貽直布政使臣趙國麟會同參酌料理妥協務使大小臣工均沾渥澤逐細辦定另行奏聞外惟是臣本武夫仰沐皇上特恩畀以巡撫重任吏治不諳日凛氷淵今蒙天恩眷注寵錫便蕃臣惟有愈加悚惕並勵所屬大小官員人人持廉知恥實心料理地方以仰報皇上浩蕩天恩而巳為此繕摺奏謝伏乞睿鑒謹奏覽奏知道了善柔沽譽之習汝切不可犯仍存武人直朴之風以忠誠奉公任事為上雍正七年九月初六日福建巡撫臣劉世明謹奏恭請皇上聖安朕安諭史貽直知悉近見劉世明一切行為惟於得名處加意周旋遇有關科甲之事倍覺勇往大有崇慕虛譽光景凡人一務名則誠必不足以不誠之心承上接下焉有是當之理再加以善柔自處好施小惠取媚屬吏則諸務更不可問矣至於武進士輩每混入斯文一途居之不疑尤屬可笑以髙其倬之通明歷練持躬慎行因其但欲潔己而奉公不純朕尚鄙之何況劉世明中材武夫受格外拔擢之恩而不思竭力致身以圖報效可乎史貽直汝當體朕之意極力朂誡之諭劉世明汝當仍存武臣本質勿尚浮華若忘本隨俗攀援科目詭恱紳襟恐禍及汝身非若輩筆墨所能救助也假令怨歸於朕恩歸於汝獨擅天下後世令譽在劉世明自為固云善矣仰首對天於心安乎嗣後如不痛加省察改絃易轍將來必至噬臍莫及從來人之精力有限専於此則忽於彼務名者鮮有實行且根本一失遭鬼神所忌上天既不垂佑人力何能抵禦將至心憒神惛百事顛倒一敗塗地而後巳耳可不慎哉惟堅守初志不隨境遷於根本處著力為要勉之同日又奏為奏聞事竊照福建本年已酉科鄉試臣蒙皇上殊恩叨受監臨重任自八月初六日入闈至九月初四日揭曉所有闈內應行事宜俱遵定例敬謹關防詳慎料理查閲卷同考官俱係聘取浙江江西廣東三省進士舉人掣籖點入內簾布政司按察司遵旨在外辦事場內提調監試改用道員提調係署糧道陳豫朋監試係汀漳道楊𢎞緒至於外簾受卷彌封謄録對讀收掌五所官均有稽查檢點試卷是否合式之責所關甚大先準布政司詳稱若盡委佐雜等官辦理恐伊非屬科目出身於三場文卷犯規應行貼出之處未能通曉宜酌委縣令數員為五所綱領另以佐雜副之庶覺妥協等語具詳到臣經臣批允隨選科甲出身之縣令五員令其督協佐雜各官盡心商酌辦理幸而提調官陳豫朋諸事寓目經心晝夜不辭勞苦實力照料監試官楊𢎞緒巡察謹嚴亦頗稱職臣仰邀天恩無誤大典實藉提調道臣陳豫朋之力居多也為此繕摺據實奏聞謹奏陳豫朋乃庸鄙不堪之人何得如是薦揚科場係照例辦理之事奚庸如是張皇此奏殊屬煩瀆同日又奏為恭報年嵗事竊照福建通省地方自春至秋雨暘時若間有數處正在望雨即得澍雨霑足目下晚稻俱已結實不過旬日內外皆可陸續收穫登場即瓜果菜蔬番薯之類俱各豐稔萬寶告成洵稱大有地方甚是寧靜省城米價每石九錢五分所有各府州實在收成分數俟十月中據報彚齊另行奏聞恐厪皇上聖懷先此繕摺奏報伏乞睿鑒謹奏若史貽直一離閩省恐地方未必有如是景象也雍正七年十月十三日福建巡撫臣劉世明謹奏為遵旨密拏事本年九月十八日準刑部咨開摺奏羅教一案奉旨羅教邪説惑人爾等理應刑訊刑訊之後若將伊等各省居住同夥之人供出二三人爾等即據其所供密咨各該督撫密行查拏解送爾等研訊便可知其根源實情再未行供出省分或有亦未可定爾將五十七年如何結案並近日盛京鳯凰城如何發覺之處詳悉行文該督撫將此緣由曉諭訪拏解送欽此夾訊羅明忠等各供內有夏義供稱同教所有認識的福建人兩箇萬姓王姓到德勝門裏羅教庵內來請經我曾見過並不知他的名字是實等語為此行文該撫作速密行訪拏並搜查伊等所供羅教庵院接教住持以及各庵羅教經卷一同送部以便質審等因到臣隨密令各府選差幹役於城鄉各處遍加密訪查拏去後嗣據汀州府詳稱卑府訪聞府治有前項教名即託詞要延請伊等入衙看經密囑傳喚即有張維英聶君龍等欣然應召入署當經盤問細訊其教之來由雖稱羅氏所傳實無庵院與接教住持名目不過一人傳習一人喫齋念經而巳亦無萬王二姓其人察其舉動情形實係務農鄉愚但以此教為修行之門無衒術惑衆之事今既奉旨查禁豈可令其仍前念經做會應如何禁絶之處詳候憲示施行等因詳報到臣臣復飭按察使孫國璽密督各府用心查緝據稱漳泉二府更多難以姑容縱玩如果查有萬王二姓並現有羅教庵院接教住持之人便當嚴拏解部質審或如汀州府之原無庵院教主滋蔓多人者應否令其作何改邪歸正永逺禁絶許令自新之處微臣愚昧不敢擅便為此繕摺奏聞密請訓旨遵行謹奏前因阿齊圗抄發朕旨內有錯誤處隨經明白宣諭該部另文行知各該督撫想此時尚未到閩俟文到之日遵照奉行朕意但不令邪教煽惑良民招聚多人耳至若鄉愚被誘汝等量加戒飭令其改過自新而已何可拖纍蔓延致滋紛擾倘查有為首倡率不法者自應解部質審照案歸結和碩怡親王臣允祥等謹奏為遵旨查議事據福建巡撫劉世明奏稱閩省九府一州除臺灣府耗羡督臣髙其倬議給該府各員養廉外其八府一州經徵地丁錢糧并額徵糧米所有耗羡平餘及雜欵等銀共一十六萬九千二百三十四兩臣等詳細確核每年承辦公務共應用銀七萬四千七百三十三兩餘銀九萬三千二百兩分給各員為養廉之資開析條欵以為定額將來每年承辦通省公事分給各官養廉即以所有耗羡等銀量入為出已足敷用等語臣等查得閩省自督撫以至府佐州縣共九十九員而所有耗羡除辦公之外僅存九萬三千餘兩實不敷各員養給之用今臣等遵奉恩旨將閩省報出各項贏餘歸公銀兩核查為該省督撫等官增加養廉之資臣等查福建陸續報出閩安竹﨑崇安杉關並稅課司等五處及上杭縣泉州府河橋車稅贏餘銀共一萬一千三百二十兩零又臺灣府官莊等項歸公銀三萬七百三十九兩共歸公銀四萬二千五十九兩零倘蒙天恩以此二項賞給各員為增加養廉之資臣等計員酌算共應加銀四萬九百兩存銀一千一百五十九兩零請交與該督撫將閩省縣丞以下微員每員亦酌紷數十金則閩省大小各官舉家之日用衣食寬然有餘可免拮據經營之纍俱沾沐浩蕩天恩矣臣等謹將各員增加數目另單呈覽伏候皇上欽定謹奏爾等前奏各官養廉等事朕交怡親王會同大學士議覆今將所議之摺發來爾與史貽直商酌妥協辦理但別省道員養廉率皆多於知府兹爾閩省知府養廉反多於道員其中情由朕不甚解此條尚不以為協並一切多寡厚薄處怡親王暨廷臣等不過據爾前摺所開就朕恩賜之項擬議增添亦未可即以為準爾二人當再同司道等官詳細秉公酌定奏聞務期久逺循行無礙不令人檢點指摘方為盡善也雍正七年十一月十七日署理福建總督臣史貽直巡撫臣劉世明謹奏為欽奉硃批會議覆奏事竊照閩省督撫司道等官議給養廉銀兩經臣劉世明會同前督臣髙其倬悉心酌議具摺奏請荷蒙聖恩敕行怡親王將閩省各官養廉銀兩詳議擬單具奏又蒙皇上將臣劉世明摺內議給道員養廉一欵詳細批示臣等跪讀之下仰見聖明鑒照周詳定議期於盡善之至意臣等欽遵硃批諭旨隨率同司道等官將閩省應給養廉欵項逐一詳細秉公妥酌遵查知府一官職司民牧有統理屬縣錢穀刑名之責每年延請幕賔束修及巡歷縣治察盤倉庫等項往來費用過於道員較之道官駐劄一方遙制府屬者其中政務繁簡有間是以臣劉世明前次摺內所開知府養廉數目多於道員者職此之故今怡親王等議單所擬賞給各官養廉數目實屬秉公至當可以永逺遵行相應仰懇聖恩俯準議給至於閩省佐雜等官臣等亦遵議每員每年各分給養廉銀二十兩合並覆奏伏乞皇上批示遵行謹奏髙其倬諒已抵閩復任矣若爾等意見相合別無異議照行可也福建巡撫臣劉世明謹奏為奏聞事竊臣查得福建各州縣經徵錢糧米石外有溢額之項先經前撫臣朱綱任內奏報閩縣侯官等十縣並福寧州共溢額銀八千八百七十餘兩又永安甌寧二縣暨福寧州共溢額米六百二十一石零臣自履任後復將各府廳州縣徵收正雜銀米徹底淸查去後據侯官福寧等州縣續報溢額銀米數目前來同前撫臣朱綱查出溢額銀米通計前後共溢額銀一萬四百三十兩米七百五十三石零現在檄行藩司彚造淸册詳送容辦齊另疏題報充餉其餘各縣覆無溢額者隨經批司取結彚報尚有福淸龍溪漳浦南平沙縣寧化等六縣有無溢額銀米俱未查淸應俟詳覆到日另奏又前撫臣朱綱奏稱古田縣有缺額無徵銀六百餘兩建寧軍廳缺額銀一百九十餘兩漳平縣無徵雜項銀五十餘兩寧德縣缺額銀二十餘兩官民俱各受纍可否將此項缺額均在溢額之內撥補等語臣查錢糧關係國課絲毫不容含混若果缺額無徵自應詳細淸查據實代民陳情懇恩豁免豈有將徵存贏餘之銀以補缺額之數移甲就乙因緣為姦殊屬背理且啓不肖官員借端侵蝕之弊臣未敢扶同允議辜負聖恩現在嚴飭藩司將古田等廳縣缺額無徴確據情由僃細詳查到日另實不盡及乾沒侵用者臣即據實具疏題參究審照侵盜錢糧例治罪如此則從前欺隱之弊可以永除矣為此繕摺奏聞伏乞皇上睿鑒謹奏覽雍正七年十二月二十四日福建巡撫臣劉世明謹奏為欽奉上諭事雍正七年十一月十六日臣齎摺家人回閩微千總蒙聖祖仁皇帝拔列侍衛遭逢我皇上知遇隆恩不次超擢畀以封疆重寄臣雖身受殊榮實不敢忘行伍本色不敢情隨境遷自稍恣縱辜負天恩今蒙聖主矜憐臣愚不遽罷黜特賜教訓防微杜漸告誡諄諄臣當刻骨銘心時加警惕如臣行止悖謬口是心違難逃皇上睿照所有微臣接奉訓旨自勵自新之處理合繕摺奏聞謹奏有無沽譽之心及肯改悔與否總在汝返躬自問而巳硃批諭旨卷四十三上欽定四庫全書硃批諭旨卷四十三下硃批劉世明奏摺雍正八年二月初三日福建巡撫臣劉世明謹奏為奏聞事竊臣查福建地方無為天主等教原無掌教為首之人鄉愚無知妄求果報往往私相傳習此等旁門邪教必須除淨根株風俗方歸淳厚今臣凛遵皇上諭旨務令默化潛消臣聞習天主教者其家不奉神佛並不供祀祖先歸無為羅教者闔家男婦老幼俱喫長齋臣今専行臬司通飭所屬著落保甲曉諭凡大家小戶俱令供奉祖先敬禮神明除年老男婦願齋者聽不許闔室大小俱喫長齋如一月以後仍不改邪歸正甲鄰不稟首官司一體坐罪現在省城行之著有成效不過再行半年此等邪教福建諒可潛消矣理合繕摺奏聞伏乞皇上睿鑒謹奏但應禁止邪教惑衆從未有禁人喫齋之理此奏甚屬乖謬之至朕不解汝具何意見而云然若將此等無理妄舉以為盡心任事實力奉行則大誤矣既云年老願齋者聽而闔家大小喫齋者又欲坐罪更屬可笑之談如於一家老者小者飲食之際稽查某齋某不齋其紛擾為何如耶觀一切辦理覆奏不但浮泛不實且每多乖張失措大有心志惶惑光景嗣後仍不痛自警省加勉誠敬則朕恩殊為可惜也朕日理萬幾刻無寧晷費一片心血親筆訓誨之旨乃竟一字不覆想汝終日在醉夢中矣汝之所奏朕尚何心再行批諭況教職養廉直省從未有言及者而劉世明獨能念及似此滿懷沽名負恩之心宜乎昏憒茫無知解也況此養廉乃向日地方官所用之物朕何可邀教職之虛譽而勒令分給乎將此諭旨與史貽直看觀汝光景原由武而入欲借文以顯終致從武而得因文而失也凡天下人但一忘本則心行不必問矣雍正八年二月十六日福建巡撫臣劉世明謹奏為微臣罪過多端籲求聖恩鑒宥事本年二月初九日臣標把總齎奏回閩臣跪接諭旨遵即恭捧交與督臣史貽直敬謹觀看訖竊臣蒙皇上恩賜硃筆訓諭臣感悚無地何敢不敬謹奏覆實緣自京抵閩路程遙遠臣齎摺人適因中途阻風不能依限到閩直至臣下次拜發奏摺之後始奉到上次硃批奏摺是以所奉蒙皇上訓旨臣始恍然醒悟蓋教職俱屬本省人員去家不遠與隔越外省離家逺涉之微員迥乎不同所以經費額編兩官合食一俸今直省概不議及養廉臣獨妄議及此直如醉夢中語臣昏憒無知慚悚何極所以養廉奏摺臣已刪除教職一條餘照原摺另繕奏陳叩求皇上天恩赦臣知識愚鄙特賜矜憐臣曷勝惶悚之至謹奏覽雍正八年四月二十二日福建巡撫臣劉世明謹奏為跪聆諭旨恭謝天恩事雍正八年四月初十日福建總督臣髙其倬陛見回閩臣出郭迎請聖安髙其倬口宣在勤政殿欽奉聖諭爾回福建時傳諭巡撫劉世明巡撫之任不比武職訓察屬員整頓吏治懲惡安良緝除盜匪最為要務一切市私恩示小惠之事斷不可行此習務要更改欽此臣即跪向北闕叩頭謝恩伏念巡撫之任不比武職訓察屬員整頓吏治懲惡安良緝除盜匪等事俱係巡撫職分所當盡心料理者惟是微臣知識淺陋承辦不妥之處甚多屢沐天恩教導寬宥更當竭力報效悉心整頓至於市私恩施小惠臣已痛自改悔若再稍萌此念即是下愚不移深負聖心自貽罪戾臣斷斷不敢為此繕摺恭謝天恩謹奏顧力行何如耳豈在空言同日又奏為奏聞事竊臣前奏天主無為等教一摺奉有硃批諭旨臣跪讀之下惶悚無地仰沐天恩不即罷斥復荷恩誨諄諄即木石亦應感動況臣稍具人性者乎惟有刻刻自省凛遵諭旨黽勉敬誠以仰副天心下盡臣職而已為此繕摺奏聞伏乞皇上睿鑒謹奏豈但不即罷斥今不得已更用汝為總督矣能不負吾弟怡親王之薦舉全朕用人顔靣與否在汝仰靣對天俯首自問而為之也雍正八年六月初三日福建巡撫臣劉世明謹奏為奏聞事竊照福州府知府蘇本潔仰荷特恩補授自蒞任以來勤愼辦公有志向上今於五月初四日忽患風痰病證言語澀滯現在調治尚未痊愈查蘇本潔年止四十六嵗氣血壯強非精力衰邁者比但福州乃省會繁劇大郡命盜案件俱由審轉不便任其久延據布政司援引恩旨詳請暫委該府同知李錫爵代為辦理堂務俾蘇本潔得以安心調治速愈報效國恩等因到臣除如詳批發外為此遵旨繕摺奏聞伏乞皇上睿鑒謹奏暫時權宜甚是雍正八年八月十二日福建巡撫今升福建總督臣劉世明謹奏為據實奏聞密請睿裁事竊照福寧鎮臣楊􅛵到任一載曉暢營伍辦事細心實武臣中不可多得者兹因該州生員犯夜與兵丁口角致罣彈章部議降級調用已經署督臣阿爾賽準咨知照另委署員檄令楊􅛵離任赴部另補但臣觀楊􅛵實係有用之才且聞其圖報國恩之語頗具血誠臣可保其實能竭力淸理營伍志切報效非心口兩岐之人為此繕摺密奏伏乞皇上睿鑒謹奏已有旨矣雍正八年十月二十六日福建總督臣劉世明謹奏為奏陳蟻悃籲求睿鑒事竊臣仰蒙皇上天恩畀以總督重任於本年八月二十八日視事今已將及兩月所有山海巡防與通省營務應行嚴加整飭暨清查姦匪安輯地方諸務臣俱陸續督飭所屬並移知撫提鎮臣一體協力實心辦理斷不敢因循玩忽上厪聞臣籲求皇上靜攝聖躬俯慰臣民仰賴如有閩省應陳地方諸務容臣細心查察另行奏聞為此繕摺奏陳蟻悃伏乞皇上睿鑒謹奏汝於奏事摺中夾雜套語籲朕靜攝以表汝之忠愛但既欲諸務僃細陳奏又欲朕躬靜攝殊屬前後自相矛盾心非出於至誠似此庸愚無識朕實憂汝之不克勝任今朕不但不能靜攝見所用封疆大吏如是伎倆轉增煩慮不解汝意此番係籲朕靜攝耶抑係貽朕憂煩耶朕之調養精神必待外省臣工規諫而後省悟寧有是理汝之懷詐不實益可見矣雍正八年十二月二十六日福建總督臣劉世明巡撫臣趙國麟謹奏為敬陳管見仰祈睿鑒事雍正八年六月二十七日臣趙國麟到京陛見時內閣交出吏科給事中赫碩色等條奏一摺奉旨此摺著暫收存俟趙國麟到京之日給與伊看仍令帶去如路遇髙其倬著給與髙其倬將可行不可行之處商酌仍將此摺帶至任所會同劉世明定議具奏欽此因臣趙國麟與督臣髙其倬水陸相左即抄摺寄商嗣準髙其倬議覆前來臣等復將條奏臺灣一切事宜可行不可行之處會同悉心商酌大概與髙其倬所議相同謹將愚昧所見逐條定議另摺呈覽外至南路營移駐一條臣等未能親視形勢懸揣率議恐有未協因行文臺灣道鎮會同勘覆海洋往返致稽時日合並聲明謹奏爾等此議是將所議之處行知巡臺御史令其存案雍正九年二月初六日福建總督臣劉世明謹奏為奏請訓旨事竊臣蒙皇上特恩畀以總督重任自蒞任以來所屬將僃辨員陸續聽調赴考者已經過半臣既不敢擅作威福更不敢姑息優容除年老弓馬不堪居官平常僃辨另行題參並循例咨部斥革外內中副參遊守及千把辨員漢仗弓馬可觀及才具可用者亦頗不乏臣查調任督臣髙其倬從前預行保舉各員俱蒙皇上次第升補未經掣補者僅止水師二員陸路四員今可否令臣於考過將僃辨員中選擇人材技勇兼優者再行循例保舉以僃簡用升補庶可收得人之效微臣不敢擅便為此繕摺請旨謹奏此汝職分內應辦之事又何須具摺奏請朕殊不解同日又奏為謹僃陳閩疆水陸營汛事宜伏祈睿鑒事竊臣蒙皇上不棄菲材超擢閩省總督自視事以來僃查陸路營汛洵稱碁布星羅毫無疏漏間有塘撥略應因地制宜添增移換之處俱陸續改移照例咨報兵部在案其水師汛守經臣題請添設臣標水師一營以司稽察外洋分巡總巡之勤惰並盤緝海口內河各處匪徒察核船中器械整理火具等事荷蒙皇上天恩俯準現在抽調安設外臣再細查戰船舵工一役實為水師最關緊要之人僅食一名戰糧較之商船所雇舵工工食多寡甚覺懸殊此中不無情弊今察出戰船舵工於本名戰糧之外歷來俱食伙糧一分以敷養贍積習成例實難裁汰但臣清理營伍既知有如此曠占情弊又未便遽為發覺革除貽誤要務理合據實奏請天恩凡水師戰船各舵工念其出力與衆不同可否援照外委千把總之例亦準給食隨糧一分庶從前曠占之錮習盡除而營伍得收實效矣為此繕摺請旨伏乞皇上訓示施行謹奏此奏好與沿海各省督臣會同商酌行之同日又奏為欽承聖諭恭謝天恩事竊臣前具奏陳蟻悃籲求睿鑒一摺奉有硃批臣跪讀訓旨慙悚交並祗因閩省去京甚遠聞知聖躬前略欠安又值四省被水各州縣俱蒙皇上遣官發銀撥粟賑恤不知如何煩勞聖心臣愚昧無知於奏摺中夾雜套語混瀆聖聰今蒙皇上訓示臣曷勝感激所有奉到硃批原摺理合恭繳謹奏武夫粗濁之習當時加滌除雍正九年三月十三日福建總督臣劉世明謹奏為奏聞事竊照福建內地年嵗情形臣俱真知灼見惟臺灣遠隔重洋傳聞互異海疆關係匪輕臣不敢不時勤察訪以仰副我皇上垂念海邦之至意兹於本年三月初二日有臺灣道劉藩長聞訃丁憂回閩細詢地方年嵗情形據稱所屬四縣甚是寧靜穀米糖豆價值倍減於前惟去冬略覺缺雨於正月初三日時雨霑足二麥秀茂豐收可必再詢其生番致死匠役陳勳一案並鳯山縣通報傳言鬍九要搶新莊起釁實情該道將事之原委及審理發落之處一一僃細陳説臣見劉藩長應答地方事務甚是誠慤無欺洵屬有用之才今巳奔喪回籍如蒙皇上天恩仍敕來閩委署或遇道缺另行題補實於海疆有益為此據實繕摺請旨伏乞睿鑒謹奏劉藩長豈有復用閩省道員之理若遇兩司缺出朕再加酌量耳同日又奏為據實奏聞請旨事竊照臺灣大小官員例不隨帶眷屬赴任今有汀州府知府王仕任奉旨調臺於本年正月開印後據王仕任由省赴臺向臣訴稱隨任僅止一妾二婢而妾生之子尚在襁褓除家人之外並無至親可以寄託只得暫且㩦帶同去等語臣細加訪察確係實情若遽以違例題參似覺人材可惜若為之徇隱臣實不敢應否飭令王仕任速喚誠慤至親到閩給照過臺領伊家口回籍之處微臣不敢擅便為此據實繕摺奏聞請旨伏乞皇上睿鑒謹奏爾姑允所請令其㩦帶可也須將曾經摺奏蒙朕恩準情由俾衆知之以杜他員藉口比例之端雍正九年三月二十九日福建總督臣劉世明巡撫臣趙國麟謹奏為據實奏聞恭請睿鑒事竊查福建學臣戴瀚自到任以來臣等見其舉動誇誕性亦頗奢念其有母承歡上沐恩賞養廉不薄未可遽加責僃及至考試下遊各府雖無穢迹顯著然招搖線索竟有傳聞即如新生每名陋例致送學院贄儀四兩業經前學臣程元章革除今戴瀚於文武新生每名仍勒送贄錢二千文另加隨封二百文及歲內旋省考試福州府臣等向其諷勸不憚苦口幸而輿論尚無物議正月按臨上四府臣等仍恐其復沿舊習隨諭各府提調加意關防並飭緝招搖説合棍徒嚴究根尋治罪今據建寧提調知府薑朝俊盤緝陳經當取供詞確據若再略加詰訊便可盡得實情不期詳報學臣而學臣戴瀚但將陳經驅逐竟不飭交法司審究輕為縱放顯有情弊臣等何敢再為緘默自蹈徇隱之咎理合據實奏聞伏乞皇上睿鑒施行謹奏戴瀚係新進少年蒙朕拔擢內廷供職觀其才情學問可望有成今如此負恩自棄實出意料之外可竭力勸誡之朕亦密諭嚴飭如仍不改悔再奏以聞朕訓諭中並不言及汝二人之奏也密之此奏深為可嘉如是不隱方不愧朕之倚任勉為之雍正九年四月二十九日福建總督臣劉世明謹奏為奏聞通省二麥豐收禾苗現俱栽插事竊照福建所屬地方二麥收成通有八九分不等自入夏以來雨水調勻禾苗亦俱栽插雖值青黃不接米價亦仍照舊地方安堵四民樂業至於南北各海洋據總巡分巡鎮將各官稟報甚是寧謐四月初二日未時省城閩侯二縣所屬地方偶下冰雹數陳臣隨遣人前往四鄉細查秧苗並無絲毫傷損恐厪皇上聖懷為此繕摺奏聞謹奏雨水調勻禾苗栽插固云有望然必待收穫方可慶秋成也雍正九年六月十五日福建總督臣劉世明謹奏為奏聞事竊臣接準兵部火牌遞到內閣大學士寄字內開雍正九年五月十五日奉上諭總兵官王郡在臺三年任滿例應調補內地但臺灣地方甚屬緊要總兵重任難得其人南澳總兵官張起雲雖克勝任而伊又現署陸路提督印務為內地重大職掌朕意欲將王郡再留一年俟明年風信順便之時著張起雲前往臺灣換回王郡即署理提督之任張起雲起身赴臺之後王郡未回內地之先福建陸路提督印務著將軍阿爾賽暫行署理朕意如此著總督劉世明悉心斟酌務期妥協或其他總兵官內有克勝臺灣之任者亦著劉世明具奏欽此遵旨寄信到臣該臣看得臺灣乃福建海外第一緊要之區如鎮臣王郡之克勝厥任者一時難得其人已蒙聖明洞鑒應懇皇上天恩將王郡再留一年俾收成效至於明年俟風信順便時各令署理交接之處均蒙皇上措置周詳又荷諭旨命臣悉心斟酌務期妥協或其他總兵官內有勝臺灣之任者亦著臣具奏欽此臣查有海壇鎮臣吕瑞麟歷練持重整飭有方操守廉潔儘可勝臺灣之任去冬已蒙天恩準其今年秋冬之間睿裁再有浙江瑞安營副將黃有才前任臺灣南路營蒙皇上垂詢人材微臣既有所知之員理合一併奏聞伏乞皇上睿鑒謹奏覽雍正九年九月十一日福建總督臣劉世明謹奏為奏聞事本年八月三十日接準兵部火牌遞到公文係內閣字寄福建總督將軍巡撫公同開拆內係廣東觀風整俗使臣焦祈年奏摺一件奉上諭劉世明阿爾賽趙國麟汝等職任封疆平時閉塞耳目並不留心察緝匪類及至鄰省移咨照會又不盡力查究未知汝等具何心胸具何靣皮也今接朕諭若復膜視不加意訪究懲治或從而粉飾欺隱及反行開脫亦任汝等為之耳欽此臣等伏讀上諭恐懼悚惶不勝汗流浹背竊臣劉世明仰蒙皇上特恩畀以封疆重寄況福建為山海交錯之區地方何等緊要臣雖至愚凡遇一切事件從來不敢懈怠施行至於鄰省督撫或緝拏匪類或照追贓私凡有咨移知會到臣靡不實力督飭依限咨解今查廣東觀風整俗使臣焦祈年從無移臣查拏窩棍黃五舍之案即其題參饒平縣知縣周世濂并黃岡司巡檢彭芝麟臣亦止見邸抄並未見焦祈年揭帖咨送到臣臣復查福建觀風使臣劉師恕出巡漳州曾在詔安縣訪拏盜窩黃阿五交縣禁究不識是否即係黃五舍不能指為確實適值汀漳道章廷瑎因公在省臣即密委前去詔安縣確訪的實拘拏嚴究俟章廷瑎據實回覆到日另行奏聞外臣先將接奉上諭日期繕摺具奏伏祈皇上睿鑒謹奏此案朕據焦祈年之奏降旨察詢汝等乃稱並未移咨知會到閩朕殊不解其故汝等何惜一問焦祈年耶雍正九年十月初九日福建總督臣劉世明謹奏為奏聞事竊臣於十月初六日接準署提臣張起雲咨稱本署提督荷蒙聖恩著令署理福建陸路提督抵任以來凡地方營伍事宜無不竭蹶辦理以期仰報萬一詎自五月半後忽染氣喘之證延醫調治日見淹纒初時尚堪力疾支持近日肌肉消瘦喘急加甚似此山海要地豈可以病軀茍延貽誤除一靣具摺奏聞外所有提督印務伏祈選擇能員前來協理等因到臣應即遵照皇上前頒恩旨遴委人員暫往協辦臣今選得福州城守副將馬召南歷練老成可以暫委前去協理俟張起雲病證調理如何再為奏報為此繕摺奏聞伏乞皇上睿鑒謹奏提督事務已命阿爾賽署理馬召南豈協辦提篆之才汝大誤矣雍正九年十月十九日福建總督臣劉世明謹奏為奏聞事竊照福州將軍臣阿爾賽接到部文遵旨即於十月十七日自省起程前赴泉州署理陸路提督印務去訖臣近探聞署提臣張起雲病證雖覺略減但身弱氣虛殊非數月即能痊愈恐難便往廣東署事邊海要地不比尋常為此據實繕摺奏聞伏乞皇上睿鑒謹奏已有諭旨矣福州將軍臣阿爾賽福建總督臣劉世明巡撫臣趙國麟謹奏為欽奉上諭事雍正九年八月三十日臣等接準內閣寄到硃批廣東觀風使焦祈年奏摺一件伏讀諭旨悚惶無地所有奉到諭旨日期并密委汀漳道章廷瑎親往查拏提案緣由經臣劉世明先行繕摺奏聞續據汀漳道章廷瑎提齊案卷并拏解黃五舍即黃必顯到省臣劉世明隨會同阿爾賽趙國麟細加審問取供在案該臣等會看得黃必顯於康熙四十四年經前督臣金世榮題準承襲伊父黃靖𠞰撫澎臺案內所得拜他喇布勒哈番世職續準兵部咨回收標效力至雍正元年六月內前督臣滿保因其懶惰偷安屢飭不改黜退隨標行走發回原籍亦經咨部在案查康熙六十年臺灣朱一貴叛逆時有廣東饒平縣姦民余應茂等拜盟謀匪發覺而黃必顯亦以所得風聞之語在閩首報因彼案陳飯所送名單內有黃弼顯名字隨將必顯解赴廣東疊經質訊並不預謀知情審釋發回閩省又查雍正八年正月內廣東饒平縣鄭汝式等家耕牛被竊跟蹤追至廣洋鄉見牛牽入武舉俞猊寨內當即搜獲牛皮牛骨併弓二張訊據供稱弓是黃必顯寄來託伊收拾並疑必顯亦係窩家又因廣東已死賊犯鄭阿妙夫妻子女在詔安縣徑口鄉居住者黃維忠之屋所耕者乃黃必顯之田更疑必顯實係窩主此廣東潮州府饒平縣所以有關移福建漳州府詔安縣拏解黃必顯之文案也除此之外黃必顯並無窩匪窩贓被人告發之案但黃必顯雖無窩匪等事而從前隨標則懶惰偷安自後居家復不安分應將黃必顯革去世職羈留省城發交營伍管束用杜匪流借名詐混作姦犯科等弊應否如是臣等愚昧不敢擅便為此繕摺請旨遵奉施行至於焦祈年摺內所奏之案臣等並未準有移咨查究之文合併陳明并繳前奉硃批廣東觀風使臣焦祈年原摺一件伏乞皇上睿鑒謹奏總在汝等秉公辦理不可疏慢致令姦匪漏網亦不可過於深刻是非日久自有公論何能掩人耳目朕遙隔數千里之外不便代汝等懸定準繩也雍正九年十月二十五日福建總督臣劉世明謹奏為欽奉上諭事竊臣接準兵部火牌遞送內閣寄字內開雍正九年九月二十七日奉上諭從前吕瑞麟在京引見時朕看其人漢仗甚好諳練水師但似糊塗武夫祗因張溥在浙曾經保薦且言其操守甚好是以屢擢用為總兵官昨因臺鎮要缺不得其人降旨詢問劉世明據劉世明奏稱吕瑞麟克勝臺灣之任朕允所奏將伊調補頃史貽直奏稱於邸抄內見有吕瑞麟調臺一事臣在閩省深知吕瑞麟之為人平時熟悉水師出洋巡哨頗有膽量不畏風濤惟是性情躁暴御下無恩操守亦甚平常臺灣遠隔重洋倘或任性妄行於地方未必有益等語史貽直之奏如此即髙其倬在京時亦言吕瑞麟氣質粗豪朕思從前張溥奏稱吕瑞麟操守甚好今史貽直則言操守平常二人之言互相矛盾此一節又不足信矣臺灣地方關係緊要總鎮職任必得才守兼優之人方於海疆有所裨益爾等可詳悉寄信與劉世明令其悉心斟酌如果不甚妥協若吕瑞麟尚未起身似應將王郡暫留原任俟朕徐商替換之人再降諭旨若吕瑞麟已經前去著劉世明再加酌量將吕瑞麟果否勝任或另有調補之道速行定議具奏請旨欽此遵旨寄信前來等因到臣臣查海壇鎮臣吕瑞麟奉旨調補臺灣臣於八月三十日接到部咨即經轉行照會續據吕瑞麟呈請擬於十月初一日交印卸事正可乘此風信前詣臺郡昨接塘報吕瑞麟於十月十三日已抵厦門此時諒已早到臺鎮矣臣蒙皇上特恩在閩任事三年細察吕瑞麟歷練持重而整飭營伍均係實心操守才具可稱兼優又係外省之人寄籍福建並無親故為所瞻顧所以臣敢保其克勝臺灣之任至於性情躁暴操守亦甚平常之處或係從前如是臣在閩三年之中實未見吕瑞麟有此等不肖形迹也今吕瑞麟已經前往臺灣據臣愚見似可勝任為此據實繕摺覆旨伏乞皇上睿鑒施行謹奏此汝現今職任中事也倘有不協惟汝是問汝既言勝任朕復何諭史貽直既有此奏焉得不降旨詢問但臺地緊要吕瑞麟作何鎮綏之處時當留心察訪雍正十年正月二十四日福建總督臣劉世明謹奏為奏聞事雍正十年正月初六日準據水師提臣許良彬並臺灣鎮臣王郡咨報臺灣北路營大甲西社番於雍正九年十二月二十四日突集番衆射傷遊巡兵丁焚燬房屋及傷害淡防廳家人衙役等情到臣臣隨即委差標員齎持令箭星夜前往督令該鎮𠞰捕肅靜地方並細查的實搆釁根由復知會提臣許良彬酌撥船隻梭織遊巡去後又於正月二十三日接準巡臺御史臣奚德愼髙山並據臺灣道府移報前由並稱同知張𢎞章知有事端竟不照料地方但自單騎奔去等語其因何起釁之處亦未據聲明但查所燒者係同知衙署所殺者係同知幕賔家人則致釁情由必自同知而起除先將怯懦無能同知張𢎞章另疏題參並勒令協同兵役擒捕孽番嚴審搆釁根由從重究擬外謹此繕摺奏聞伏乞皇上睿鑒謹奏奚德愼髙山容隱如此劣員既不言之督撫又不奏聞於朕致令激出事端殊為深負朕之任用也雍正十年正月二十六日福建總督臣劉世明謹奏為欽奉上諭事竊臣接到內閣寄字雍正九年十二月十四日奉上諭據福建觀風整俗使奏稱閩省各府收成俱好惟泉州漳州二府苦於秋旱文武官有從彼地來者問其收成約有三四五分不等近於十月杪方得大雨於禾稼無益而番薯猶可救濟米價亦聞漸長又聞臺灣亦苦乾旱等語爾等可將此寄信與劉世明趙國麟令其體察該府情形若果收成歉薄有應設法接濟料理之處可預為留心料理不可忽略臨時周章欽此遵旨寄信前來等因到臣臣伏查漳泉臺灣三府於去年八九月間晚稻正當結實之時雨澤稀少其低窪與有水可以車戽之處收成不減其無水灌溉之髙阜地畝多成癟穀收成減薄四五六分不等福建山多田少民鮮蓋藏每至青黃不接時便多掣肘之慮總由積習因循不早思患預防所致臣業於十月內專頒條教知會撫臣趙國麟檄令司道轉飭牧令各官多張告示與民講求疏通販運早為籌議毋使青黃不接之時致有困乏以副皇上眷念海疆至意現據道府申報紳襟富戶人等各知踴躍爭自顧恤閭閻或請挾資給照前詣鄰近採買或將所餘穀石開報實數存貯専候臨期濟糶或計量人口預積糧石其貧窮食力羣黎儘有倉穀可以糶濟近來遍沐春雨二麥與菜蔬之類俱又有收據臣揆度目前情形將來可無青黃不接之慮矣所有臣遵旨預為設法接濟料理之處據實繕摺奏聞伏乞皇上睿鑒謹奏覽奏深慰朕念雍正十年三月十七日福建總督臣劉世明謹奏竊臣恭聞皇上前者偶爾違和避風靜攝臣僃員海疆不能隨同廷臣朝夕啓請聖安撫躬自問寢食靡寧於三月初七日接奉皇上硃批諭旨臣跪讀之下即如趨覲天顔抃舞歡欣更逾常格臣仰蒙皇上畀以海疆重任未敢遽請恩賜陛見以遂依戀之心惟有竭盡心力料理封疆或得稍寬聖主南顧之殷懷庶少盡臣職於萬一為此繕摺奏請聖安伏乞睿鑒謹奏已有旨命汝來京不日即可靣朕也硃批諭旨卷四十三下
