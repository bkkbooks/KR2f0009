body:
  text: 欽定四庫全書硃批諭㫖巻一百七十六之硃批髙其倬奏摺雍正元年二月二十八日雲貴總督臣高其倬雲南巡撫臣楊名時謹奏恭請皇上聖安朕安提督張谷貞以老辭職朕已優諭留任不知伊之精力若何猶健旺否因係一好提臣甚為惜之若露有衰邁光景至難以支持時汝等宻奏以聞毋致遺誤重任同日又奏為奏聞事竊臣等查得藏地距雲南遼逺駐藏官兵所需俸餉口糧等項銀兩必預行解送方無遲誤康熙六十一年六月内臣等委遊擊李化龍預解餉銀七萬一千六百餘兩已經具摺奏明續於康熙六十一年十二月内據駐藏管理支放同知丁棟臣報稱除原領雲南省俸餉官兵外再額駙阿寳所帶駐藏官兵奉署定西將軍令牌亦令在雲南貯藏錢糧内動給統計一年滿足共需銀一十一萬三千餘兩計以前所解之銀只敷次年夏季有餘之用等語前來臣等㑹議此項銀兩應急行照數解送但藏地遥逺往來多需時日又酌量多解銀二萬六千餘兩以僃不時支給之用共撥動藩庫銀一十四萬兩委援𠞰右協遊擊汪仁等於雍正元年二月二十一日起程解運訖再解餉官兵通事跟役共一百九十九員名俱照上年之例折給馬匹口糧鹽菜盤費賞賚等項及雇覓馱餉馬匹脚價共動給銀二萬六千餘兩又駐藏官兵久居逺塞臣等商酌附觧銀八千餘兩以為添補衣鞋之用所有解送銀兩數目竝起程日期臣等謹㑹同具摺奏聞謹奏覽奏知道了駐藏官兵巳降㫖命其返斾矣雍正元年四月初五日雲貴總督臣高其倬謹奏為奏聞雨水米價事竊查雲南省目下蠶豆已經収割全完二麥巳収十之五六俱有九分収成自三月中旬以來得雨五次田中之水足用如臨安元江等處地氣頗暖稻田俱巳栽插十分之四五他處秧苗出水尚未栽插四月二十以外方始栽起直至五月末纔陸續栽完據百姓等云現今割麥之時且不用雨四月十五以後至五月中再得雨一二次則高下田地無不遍插收成即可預定三四分矣至各處山田今巳得雨蕎麥俱巳播種目下雲南省城米價毎石一兩八九分外府州縣米價毎石九錢五六分貴州雨水霑足秧始栽插米價省城每石八錢七八分外府州縣米價每石七錢三四五分不等理合具摺奏聞謹奏滇黔雨水米價情形知道了一切奏報總須據實為要同日又奏為奏聞事雍正元年四月初二日准署理定西將軍印務公䇿旺諾爾布等咨稱為密行奏聞事公策旺諾爾布之族兄在呼呼腦兒住的諾顔哈什漢等寄來䝉古字宻信譯出内云呼呼腦兒的大小諾顔等於本年十月内㑹盟密商云自我等祖父以來至我等俱遵阿穆瑚朗汗之㫖而行如今看來於我等毫無益處喇藏汗因他為惡被策妄阿喇蒲坦征殺據了土白忒國我等之兵與漢兵㑹同前進將車領敦多布敗走請達賴喇嘛坐牀先經阿穆瑚朗汗有㫖取了土白忒國將爾等内中立汗只當後來將我等内中立汗迄今三四年無有信息看來我等無望了我等自祖父以來至我等與凖噶爾甚為親好但因喇藏汗為惡方與為敵與我等何干如今就在今冬十二月内速差人往策妄阿喇蒲坦那裏去説自祖父以來相好至我等仍照常相好嗣後我等同心合意而行靠著阿穆瑚朗汗行走也與我等無益將此情由作速差人說去如此計議結誓聞得此事竊思聖主乃天下衆生靈之大恩主你今又身任土白忒國之大事往於彼處此事關係甚大未可測料應作速密奏聖主就是你們那裏也該堅固防僃方好等語又據呼呼腦兒台吉巴爾朱爾差來的人衞徵囊蘇口稱我的兄弟是呼呼腦兒台吉巴爾朱爾拏碗的人羅卜藏丹津王傳集㑹盟之處他本身跟著聽的話告訴我説若自打箭爐至喀木藏衞俱行占取還有侵害我等的人麽等語衞徵囊蘇係我們喀爾喀的骨頭奴才等愚見羅卜藏丹津受聖主之恩重於衆人伊身為首倡負恩為逆即是自尋滅亡之禍呼呼腦兒人等俱彼此不睦骨肉離析各逞已意伊等所屬之人與彼擕貳者多羅卜藏丹津又甚糊塗酗酒失人心伊雖傳集衆人㑹盟呼呼腦兒人等無不感戴聖主養育之深恩且内中各顧生業安靜過活之人不少衆人未必皆與羅卜藏丹津一同為逆取禍但事有關係不可不預為防僃奴才等隨行文知㑹侍郎常壽總兵官王以謙四川雲南督撫提鎮令其探訪奴才等已於此處密為防僃外謹將諾顔哈什漢密寄䝉古字書信一紙照鈔䝉古字書信一紙由四川西寜兩路密奏進呈睿覽伏乞聖主指示等因具奏訖為此合咨前去查照施行等因移咨到臣臣隨飛飭駐防中甸遊擊劉宗魁駐防阿墩子遊擊劉國侯及管理臺站守僃張鶴密為偵探不時飛報并嚴加防僃外臣思此事真假未可遽定但先事預防不可不密為籌僃查雲南口外之中甸阿墩子俱係進藏要路現有遊擊劉宗魁劉國侯各帶兵二百名在二處駐防而中甸去裏塘巴塘稍近彼處狜猔人民雖係土白忒所屬其管地方之營官亦服呼呼腦兒管轄此處尤為𦂳要現在駐防兵丁二百名力量稍單臣只以巡防為名現調鶴麗鎮劍川協兵丁三百名添往中甸防守再令永北鎮密選兵三百名楚姚鎮二百名鶴麗鎮五百名一切預僃整齊聽候調遣此内鶴麗鎮去口最近總兵郝玉麟諳練營伍實心任事臣亦密令其預僃倘有信息即令帶領此預僃之兵丁一千名出口并中甸阿墩子現有之兵丁七百名一總令其統率相機接應臣亦將本標兵丁預僃整齊若有聲息臣酌帶官兵即速前往與提臣張谷貞商度策應至彼處軍糧臣前同撫臣楊名時商酌於去冬今正已令鶴慶知府白兌運米一千石至阿墩子又令順寧知府范溥買青稞一千石又令運米八百石至中甸足供支應但中甸之米尚宜多僃現又㑹飭順寧知府范溥再運米一千石以僃兵食臣謹就滇省情形籌僃識見短淺伏乞聖主指示謹奏知道了兵馬糧餉一切籌僃機宜如及與年羮堯商酌者與之㑹商而行庻無舛誤之虞倘事屬緊急不及㑹商則汝等酌量而行年羮堯近年來於軍旅事務邊地情形甚為熟諳且其才情實屬出人頭地雖然亦不可因有此諭遂爾推諉膜視朕欲汝等協謀共濟之意耳雍正元年五月十二日雲貴總督臣高其倬謹奏為奏聞雨水米價情形事竊照雲南四月内雨水調勻豆麥已經収割全完有九分収成五月初旬又得㣲雨二次低田俱已插秧山上及高坡之田水尚不足尚未插秧再得大雨一次即可全插現今省城米價一兩一錢一石次米一兩五六分一石外府州縣米價每石俱在一兩以内貴州雨水足用秧田巳插米價省城八錢一二分一石外府州縣七錢七八分一石理合具摺奏聞謹奏覽奏深慰朕懷爾所奏乞恩一事朕已允行諭部仍賜恩廕矣又論奏總兵等賢否甚屬公當知道了又廣南協遊擊一事已𤼵部議矣同日又奏為自陳薦舉不當乞賜治罪事竊查原任四川布政使戴鐸為人輕狂伊前在廣西按察使任内時臣曾將伊到任數月以來操守頗好辦事盡心具摺陳奏甚是錯誤慙悚無地謹直陳於聖主之前伏乞將臣交部嚴加治罪以為舉人不當之戒臣謹具摺請㫖謹奏此亦何罪之有汝安能保其始終不渝非但戴鐸凡所薦舉之人有改易操行者俱當嚴加㕘劾若明知故縱文飾前愆彼反得挾保薦而放恣上司又因其曾經保薦而姑息則官方紊亂矣自兹以往即今日保明日㕘朕亦不責總歸於秉公持正槩予寛宥稍涉存私徇情一有實據斷不輕恕也且戴鐸之品貌言談一見原可令人鑒賞孰知乃係真正小人不堪棄物朕亦被伊欺瞞多年何况於汝乎雍正元年五月二十日雲貴總督臣高其倬雲南巡撫臣楊名時謹奏為恭繳御批事雍正元年五月十六日臣等齎摺把摠回滇所齎臣等恭請聖安一摺及奏事一摺俱奉有皇上硃批臣等敬封恭繳謹奏似此等無關緊要之事應不拘遲早隨便繳進何必勞擾驛遞此舉不是矣同日又奏為奏聞事竊臣等前具恭請聖安摺内奉到皇上硃批臣等看得提臣張谷貞在滇十年居官甚優且久經戰陣兼有膽畧聖恩留之在滇於營伍實有裨補即一應軍務臣等與之共商亦受其益至其患病因稟賦素壯飲食毎多脾氣受傷今春正二月間飲食少減身上無力自三月中旬以後飲食漸加精神漸復目下可以支持嗣後身體如何臣等不時繕摺具奏所有現在情形臣等謹據實奏聞謹奏如此甚好然亦何須不時具奏至不能支持時奏聞未為晚也雍正元年九月二十日雲貴總督臣高其倬謹奏為欽遵聖諭事竊臣前奏僃兵一摺奉到硃批臣謹遵聖諭一切預僃調遣與年羮堯商酌而行現在巳將中甸留兵及撤臺之處移咨斟酌至應料理之事臣竭盡心力斷不敢推諉膜視謹將遵行情節具摺奏聞謹奏中甸留兵之籌畫甚當業經有㫖命郝玉麟親徃駐劄今醜虜羅卜藏丹津無知背叛西海正在有事一應糧餉兵馬爾須悉心料理路途甚逺若逐件請㫖而後措施恐誤機宜或與大將軍年羮堯咨商而行或一面舉行一面奏聞可也但凡關西海軍機事務悉通知年羮堯彼此照應庶不致兩相乖迕其兵馬糧草等項槩當預為僃足以候調遣通省營伍尤宜曉諭該將弁等各各加意及時訓練不得少忽特諭同日又奏為奏聞土司承襲情節事竊查雲貴兩省土司承襲之事皆有規禮上下各衙門往往借文結之舛錯假駁查之名為需索之地故事多遲滯而土司亦習為故土司陋規俱行裁革屬員需索通行嚴禁抑臣更有請者土司係邊鄙之人通達文義者少凡所送承襲文册圖結書寫多有舛錯有司借此需索駁回查改一字之訛經年不結駁回數次即遲數年此端不除弊竇終在臣再四熟思合無仰懇聖恩稍為變通嗣後土司所送文册等項之内如有世不符臣謹繕摺奏請睿鑒謹奏破除積年弊竇此奏甚好同日又奏為奏聞清查裁禁雲南公件事竊查雲南各州縣於火耗之外歴來有名曰公件一項取之民間隨事収派甚為民累巡撫楊名時到任之後令州縣開單呈查斟酌裁減俾州縣遵照不許此外多取比之從前頗為輕減但臣與撫臣熟商州縣之地方遼濶一時耳目難週州縣開單之時未盡據實或有雜稅出息巳足以飬廉不行盡數開出者或有將數目浮開預留裁減之地者再各員居心做官人各不縣火耗甚㣲又無别項出息用度實屬不足不得不仰懇聖恩於詳加裁減之中斟酌量留以為養廉之資臣謹據實奏聞謹奏似此細㣲處朕安能代爾等逐一指示爾等封疆大吏但肯屏除私心進賢退不肖舉錯合宜不數人而官箴嚴肅吏治潔清矣若一味寛厚容隱以博取名譽不過全身苟祿而巳實屬辜負朝廷之任用也今雲南嵗需協濟帑金三十餘萬始敷支銷如果督撫實心任事為國計民生周詳籌畫將官吏之侵漁各項盡情搜剔酌盈劑虚即滇省巳自敷用奚必逺藉他省之助然必正色執法毫無假借非左瞻右顧欲為從前諱飾者之所能設或因此反致加累百姓則又與朕意大相逕庭况爾於此任未久縱有侵漁各項率係前人之咎與爾無涉何須代為遮掩自兹以往實力奉公定䝉鑒照仍復因循故步亦難瞞朕耳目倘另遣人來振作一新民無滋擾而國計增饒彼時爾何顔以對朕耶殊非臣等豈不願為祗緣才力實有未逮等語所可支吾者也接諭後當與該撫率同司道共相講求如何甄别屬員之賢愚如何興除地方之利病殫心竭慮徹底圖維方副朕勵精求治之意勉之爾暨楊名時潔已有餘奉公甚屬不足亟宜互相提撕黽勉可也同日又奏為奏聞訓習本標兵丁子弟事竊查臣標兵丁之子弟閒散者頗多平時不免遊蕩多事及至頂補兵糧弓箭鳥鎗俱未熟習必得再加教練半年數月之久方可入隊差操臣思維整頓之法今將五營兵丁子弟親行看驗除有田務生理及年尚幼小者不挑錢至三錢不等此内如有挑補兵丁者再將幼子挑補再派分𤼵年滿千總管理學習臣亦時加親看以稽勤惰庶兵丁子弟不致任意遊蕩而技藝亦可熟練頂補之時不用再行教演臣謹將情節奏聞謹奏此亦預行操練之一道甚好件件悉如是料理何愁通省不治雍正元年九月二十八日雲貴總督臣高其倬謹奏為奏聞事竊現在駐藏之滿漢官兵已經撒回又留四川官兵駐劄叉木多以通西藏聲息雲南原安之瓦河一帶臺站官兵不相接續應行撤回以省煩費又中甸為雲南邊外藩籬通藏要路原有駐防兵丁二百名又加臣摺奏添駐兵丁三百名足資僃禦其原駐阿墩子之官兵亦應議撤臣㑹商川陜督臣年羮堯意亦相同臣將瓦河一帶臺站官兵令其撤回阿墩子駐防官兵二百名之内酌留千把一員兵四十名看守存貯米石其餘亦令撤回至阿墩子中甸傳送信息即於駐防中甸兵丁内酌撥安站以供逓送無庸另設所有酌量撤回情節臣謹具摺奏聞謹奏目下情形又非春夏之比矣應作何更改防僃接應西藏爾與年羮堯再行㑹商相機酌宜而行可也同日又奏為查㕘事竊雲南鹽政臣現在㑹同徹底清查兹據驛鹽道李衞揭稱前署總督張文煥除得去鹽規銀二萬三千三百餘兩又向被劾驛鹽道沈元佐要去捐納加添銀一千二百兩程儀一千兩又臨行勒索那動鹽課一萬兩又委原任富民令柯鉅署理黑井提舉索酬謝銀一千二百兩致虧額鹽二百六十萬觔又委姚安府通判沈允陞署理雲南縣事止圖謝禮致虧鹽課六千餘兩又勒索陞任䝉化府同知李敬熙動鹽課銀三千六百兩又因未揭原任雲南令龍文玉訛去大理府知府程珩銀四千兩又因大計勒索數千兩係將太和縣穀價鹽課墊交又聞臨安府知府王僴少倉穀等項亦係大計勒去又每季生日收大姚令吳繩武盃縀規禮過多致虧鹽課五千餘兩署總督張文煥種種苛索以致雲南元氣損傷俱係孫姓堂官經手孫堂官額外索取入已亦有數萬之多應將張文焕𤼵滇追賠但張文焕曾為大臣或請將伊子及孫堂官𤼵滇質訊令其照數儘力賠補開報前來臣查張文煥身任封疆重寄理宜潔巳率屬似此多端需索致虧課額雖已經休致法難徇縱請將伊子及孫姓堂官發滇質訊明白將伊身及孫姓堂官所得追出賠補庶課帑易清需索者知警臣謹據實具摺請㫖謹奏照該督高其倬所請將張文煥之子及孫姓堂官拏送雲南審明定擬具奏該部知道雍正元年十月二十六日雲貴總督臣高其倬謹奏為奏聞雲南營伍情形事竊查營伍之中空糧是一大弊滇省各鎮協營其中居官好者俱無空糧然十分之中有者居半但多少不等耳臣近經查出原任永順鎮總兵卜應奎侵占空糧九十三分原任楚姚鎮總兵劉俊傑六十分病故臨元鎮總兵林國賢三十分現任開化鎮總兵閆光煒二十八分元江協副將吴開圻二十六分其餘有十餘分及八九分六七分不等共五百二十餘分盡令補實此外恐耳目不週尚有隠漏者臣巳知㑹新任提臣郝玉麟彼此細查隨查隨補至於馬價銀兩亦有扣留一二分臣俱巳查令給與此臣現今清查情節然雲南營伍尤緊要者臣看得兵習稍惰兵氣微驕此處尤要留心上緊整頓目今郝玉麟巳䝉恩放授提督新放之總兵楊天縱張耀祖臣聞二人做兵丁嚴查將弁令其訓練不容偷安但整頓營伍然玩愒無如從前上司保㕘將僃抜補千把不論官聲人材但憑餽送難以責其整頓臣惟有細加官平常近又有擅給戲役張貴生牌票縱拏客民致死人命一事現在查審臣不敢隱庇此係現在雲南營伍情形臣謹據實奏聞謹奏此奏甚屬可嘉如是方合朕意爾向日之居心為人朕雖不深知然大槩亦有所聞才品老成操守亦好但嫌過於謹慎偏於善柔耳總督之任統率文武必須剛方風厲為人所凛畏庶幾於事有濟寛仁勸導善良者固可感化而邪惡者反致藐玩妄作若稍嚴峻賢者自不為非而不肖者亦多歛迹利莫大焉今當軍興之際百凡須放膽勇敢為之不可畏縮因循以圖自了果能但知有國而不知有身上蒼自必加佑神明定當黙助縱遇危難終歸吉慶也倘或瞻前顧後外則徇人内則惜已百私交雜於寸衷衆務差謬於千里及至事敗名隳身不自保矣人莫能援矣夫復何益朕雖不謂上等聖明之君亦不為庸愚下流之主爾等既遇知於此時要當吐氣揚睂明目張膽上以報效朝廷次以垂芳竹帛為務一切總倚託朕躬而為之胡禁不止曷令不行耶計不出此而狐疑畏愞甘心自棄豈不深可惜哉勉之思之燈下所書字畫潦草莫哂同日又奏為懇恩調補中軍副將事竊臣標中軍副將胡亮病故業經具題在案臣仰荷聖恩統轄兩省官兵料理營伍先從本標為始中軍副將一官上則幫助微臣下則表率五營尤須得人查雲南騰越協副將孫𢎞本雖弓箭不為出衆然老成勤敏辦理營伍事事盡心自到騰越以來兵丁感畏聲名甚好近因調陞臣已具疏題留但騰越固屬邊地而中軍副將一缺尤為緊要伏乞皇上恩准將孫𢎞本就近調補於標營有益臣亦得収指臂之效謹冐昧繕摺請㫖謹奏照依所請調補該部知道同日又奏為奏聞事雲南鹽銅二事奉㫖交臣㑹同查奏臣與撫臣楊名時及驛鹽道李衞已徹底逐一詳細查清據該道向臣等云各井鹽務事體情由雖經查明但九井地方情形若不親到查看恐尚有遺漏及調劑不甚切當之處必得親去查看詳細方敢覆㫖臣與撫臣意亦與之相同驛鹽道李衞已於十月二十四日前往各井親查十一月盡間即回俟囘時即㑹同詳細摺奏所有情由臣謹具摺奏聞謹奏知道了李衞是一出色好員爾等宜極加愛惜而委用之諭雲貴總督高其倬巡撫楊名時提督郝玉麟等知悉頃呼呼腦兒羅卜藏丹津興兵背叛侵犯西寧邊界之申中堡被我兵擊敗呼呼腦兒既經叛逆不可不行防禦爾滇省沿邊内外俱係畨夷雜處且中甸係新撫地方羅卜藏丹津妄稱係伊所屬部落差人往誘抑或遣兵招納俱未可定前次進師取藏之時原任提督張國樑曾帶兵揚威駐劄中甸今宜保固邊境將附近兵馬酌量調撥郝玉麟帶往中甸揚威駐劄倘遇羅卜藏丹津所遣之阿齊巴圖魯寨桑帶兵在彼務期勦擒淨盡以安彼處番夷人等之心作速料理毋得遲誤特諭雍正元年十二月二十日雲貴總督臣高其倬雲南巡撫臣楊名時謹奏為奏聞官兵起程日期事雍正元年十二月初七日准兵部咨雍正元年十一月初三日怡親王舅舅隆科多捧出㫖意一封給發雲貴總督高其倬巡撫楊名時提督郝玉麟欽遵等因郵遞齎捧到臣臣即㑹同撫臣楊名時叩頭跪讀專差齎捧送提臣郝玉麟欽遵今提臣帶提標兵丁一千名調附近鶴麗鎮兵二百名永北鎮兵二百名劍川協兵一百名酌量配給馬匹借支銀兩定於十二月二十一日起程合現在中甸之兵五百名總共兵丁二千名遵㫖揚威駐劄嚴密防查如羅卜藏丹津遣人帶兵前來即行𠞰滅如遣人暗來招誘即行擒拏其中甸巳有臣等預運米二千餘石劍庫亦有預貯銀五萬兩足供支給不致遲誤再臣高其倬亦僃兵三千名俱巳整齊稍有聲息即親身帶領策應所有提臣郝玉麟帶兵起程日期謹具摺奏聞謹奏覽所料理處已可謂妥協但帶兵策應之說則屬差謬即或有接應郝玉麟之事只宜酌委總兵副將等員前往爾總督兩省膺封疆重寄嗣後偶遇類斯小事輒輕身妄動斷乎不可軍糧各項自應於文職中派一大員總理至於督兵槩當責之總兵等官方為合宜此奏大不是矣前者馬㑹伯來京陛見朕因伊弟大同總兵馬覿伯領兵急於就道故暫命往大同署理印務今此缺既經得人已降㫖令伊馳驛旋歸永北本任矣爾無庸為此計慮再者發來補用府州縣人員係就應陞應選之内揀其明敏精壯者遣往非朕深知灼見之人亦非廷臣知而保薦者或恐此輩自以為係朕親揀肆志妄為爾等又以為朕所特遣有意包容則與地方民生大屬無益倘或此輩居官少有苟且不職處負恩自棄莫此為甚更當執法㕘處毋得稍存姑息至其中有廷臣所請託者尤宜察其吏治如果奉公盡職請託何妨但爾等為朕倚信大臣當將請託之員某係廷臣中某某親友故舊併其官聲優劣一一密奏以聞朕斷無洩露一字之理果能如是實心察吏朕之見重曷有涯量耶君臣要當一德同心不啻父子之互相親愛須彼此真實感契方有一體相關之效也細繹此諭揆其義利審其輕重勉而行之特諭同日又奏為奏聞中甸情形事竊雲南提臣郝玉麟遵㫖帶兵駐劄中甸起程日期臣另行具奏外查中甸為雲南西面藩籬向係麗江土知府木地狜猔仍以為係羅卜藏丹津所管心懷兩岐其地所産鉛子竹箭弓面鞍板鳥鎗壳子皆軍器所需又每嵗納銀一千三百兩麥二三千石除供給臣甫經到任未能深知今年以來臣與郝玉麟遣人嚴行查禁銀兩分釐不令解往即竹箭等物亦俱不許出境中甸統屬之地有小中甸果羅灣格咱泥西四大處其餘小村寨頗多人民共五千七百四十三戸管理地方者有營官二名神翁四名列賔十七名毎列賔之下管馬兵五十二三人步兵無定數又有喇嘛一千餘人内有堪布一名係其總管之人凡事皆營官料理營官又聽堪布之言而行與呼呼腦兒遥通聲息我㫖通知大將軍年羮堯一面料理其料理情節容臣陸續具摺奏聞謹奏覽所論奏悉合朕意封疆重務料爾自能辦理然同儕共事切戒爭功勉之慎之再者楊名時聞人言伊辦事糊塗且渉迂腐亦有言伊操守中平者且有讃伊才守兼優者紛紛不一據爾所見以為何如從實奏朕知之倘值緊急事務不致貽誤否毛文銓朕用為貴州巡撫矣爾意更以為何如滇藩一缺爾有所知勝任之人乎他省現任藩司中對調不可新任臬司亦不可此外如有所知者具奏以聞朕即允准命來助爾料理錢糧事務宻之所奏銅鹽兩摺留中候𤼵廷議同日又奏為奏聞事竊查雲南魯魁一山接壤哀牢聨絡千里形勢險阻其内各種夷人甚多强横者乘隙四出搶掠索取保頭錢楊方普李四姓為其頭目議𠞰則潛匿無蹤稍懈則復行竊發為滇民之患匪朝伊夕康熙二十七年總督范承勲因其猖獗曾委臨安府知府黄明臨元總兵馬山招撫賊首楊宗周率夷目普為善方從化李尚義等投誠題請將楊宗周授以土縣丞其餘三人准襲土巡檢令其出具甘結把守隘口在新平元江安插彼時雖似稍有約束此後伊等子孫分居各寨各聚人衆分地討保亦不聽其土官約束調管民間畏其記仇寧受苛歛不肯告官而江楚棍徒亦間有假裝野賊嚇取財物者近山之處俱受其害臣到任之後亟思懲創整頓因形勢未審伊等又現未有形跡故不遽為𠞰捕兹於夲年十月内據元江府報稱有方從化後人方景明夥同普阿黑普有才李三斤普白賒方四李篾巴各率猓夷共數百人蜂擁持械將元江地方之猓目施和尚竝伊姪施糯片之寨房焚燒一空將和尚殺死臣查方景明等雖口稱伊等與施和尚有仇係夷人仇殺之事但聚衆不散驚擾居民且此數人皆積年討保之二臣及司道一面遣遊擊李化龍守僃楊洪緒帶兵三百名又楊方普李四姓之内惟土縣丞楊世恩不與伊等同謀因令楊世恩亦帶土兵三百名隨李化龍等由新平前往遊擊南天章守僃曹士貴張雄帶兵四百名土兵二百名由元江前往於十一月初二日直抵巢穴克其黑白苴阿古竜暮弄普計岡舍子竜五寨伊等不敢抵敵逃入深箐臣又訪得猓目方盛明普阿路與賊通氣臣飭將弁將方盛明普阿路拏禁搜山追拏方景明等伊帶兵由司陀司深入斷其要路惡夷等知無處可走隨有方景明方四普白賖李篾巴至元江協投不住方景明等再四叩頭伊隨著人到普阿黒處普阿黒李三斤隨亦來投伊等六人共帶來猓夷三百二十六名并馬匹甲械鳥鎗弩礮火藥等件一帶討保頭錢之大頭目已獲十之六七此次漢其尤惡者押到原處正法以警猓人目今破其巢穴獲其頭目正可就此整頓料理一番以清討保之積弊一應事宜容臣詳酌另行具奏外謹將獲賊情由先行繕摺奏聞謹奏覽奏俱悉嘉悅之懷筆莫能盡雍正二年正月二十日雲貴總督臣高其倬謹奏為奏聞事竊雲南提督郝玉麟遵㫖駐劄中甸之處臣業經繕摺具奏續接部文經總理事務王大臣議政大臣議奏令提督郝玉麟帶兵二千名進駐叉木多其中甸地方亦屬緊要令臣選擇總兵一員帶兵五百替代郝玉麟駐劄中甸欽奉硃批依議著速行等因移咨到臣欽此欽遵一面飛速知㑹提臣欽遵一面㑹同撫臣作速料理糧餉馬匹一切應用各項出口應付提臣帶兵起程臣查護理鶴麗鎮印務副將孫𢎞本老成歴練現在就近臣隨飛調迤西各營兵丁五百名令其帶領駐劄中甸再查提臣帶兵前往叉木多地方雖中甸有官兵駐劄相離尚逺其阿墩子天柱寨一帶須安將僃帶兵駐劄前可與提臣聲勢相接後可顧糧護運於軍事有益臣謹一面奏墩子等處酌量安駐至安臺之處臣相機料理再行具奏兹據提臣咨稱中甸喇嘛營官番目人等感戴天恩繳投所領羅卜藏丹津偽劄信子帶三千五百戸共男婦大小一萬七千五百名口喇嘛和尚一千一十四衆叩頭納土願歸版圖永為子民事闗納土歸誠臣謹㑹同具本詳奏再雲南現今口外駐兵省城相離稍逺且迤西一帶提臣既已出口鶴永二鎮總兵又未到署臣俟并奏聞謹奏可嘉二字外餘無多諭雍正二年二月十八日雲貴總督臣高其倬謹奏恭請皇上聖安朕安西海既經底定又值春雨普降畿輔軍民人等俱各平安歡慶朕惟以手加額感戴上蒼之篤祜皇考之祐庇已耳曷勝欣幸之至同日又奏為奉到上諭事竊臣奉到上諭四道跪讀尋繹仰見我皇上宵旰孜孜無時不以生民為念雖一日萬幾之際凡飭吏安民之要治兵息盗之方以及籌行保甲社倉禁止供應煩擾無事無處不厪睿慮皇上如此憂勤如此省各營查補五百餘名今又續行查補七十餘名副將吴開圻以及將僃等業已民雜猓夷地多山箐臣選擇州縣中做官好人明白者數人先令舉行保甲之法如行之果便即令奏為此繕摺奏聞謹奏所奏可嘉之至同日又奏為恭謝聖訓事竊臣前後二次奉到皇上硃批奏摺聖訓諄切無微不至跪誦之下感激涕零伏讀聖訓云臣過於謹慎偏於善柔深中臣病臣敢不痛自勉改勇猛振作以期仰副訓誨至意至去貪汚之官為地方要政聖諭至明至當雲貴各屬内不肖之員臣單㕘㑹㕘者近已題奏一十六員嗣後隨查隨㕘不敢徇縱又雲南兵餉毎年需他省協濟若將各項贏餘清出不待他省之助實長久之計臣查雲南向來頗有贏餘者惟鹽銅及銀厰三項鹽務贏餘業經查出歸公㑹摺具奏鹽道李衞清廉急公辦理盡心鹽務一項實無隠漏銅斤一項亦經查奏將所有贏餘盡行歸公但此項銅斤若辦理得宜則出銅亦多贏餘亦增頗可助公臣當竭力率同管理銅斤之道府盡心調劑必使與從前不同以濟公帑至銀厰一項以目下而論極為衰乏然就臣所見若得旺礦則此項出息可兼鹽銅實可以佐餉前經訪聞募迺一處礦氣最盛又有都竜一處礦亦稍好及遣人細查募迺離口四十餘日又隔喀哇野人之境瘴氣甚大難以開採至都竜係交阯地方非雲南之境臣恐滋事現在嚴禁此外加查訪凡有礦息悉収濟帑如更得一二旺盛銀礦合助鹽銅歸公之贏餘及雜礦新収之出息銅斤多做之增益則每年兵餉稍有裨補矣臣謹因恭謝聖訓詳細附奏伏乞睿鑒謹奏此奏近情近理朕實嘉是覽焉毋欲速徐徐為之邇來覩汝一切奏章暨諸凡料理已知汝之居心為人朕於滇省無南顧之憂矣勉之同日又奏為奏聞提臣帶兵起程日期事竊查雲南提臣郝玉麟奉㫖帶兵二千名進駐又木多臣隨飛行知㑹提臣及添調兵丁七百名以僃安駐阿墩子等處使聲勢相接并選委護理鶴麗總兵印務副將孫宏本帶兵五百名駐劄中甸之處臣業經具摺奏明先是提臣帶兵駐劄中甸臣等俱照前任提臣張國樑之例支給糧餉其馬匹亦照前次兵丁除騎馬之外二兵合給馱馬一匹如此料理應付兹提臣帶兵進駐叉木多應照前次永鶴二鎮總兵帶兵進藏之例添給糧餉及借支給賞銀兩其馱載馬匹亦應照例兩兵共給三馬臣同撫臣飛速辦理除中甸阿墩子先行運貯之米足供裹帶外一面撥調各營馬匹及買購馱載騾馬送赴中甸應用并知㑹提臣去後隨准提臣商稱今遵㫖進駐叉木多現在口外米石足資裹帶陸續送到銀兩亦敷支給惟馱載馬匹甚屬緊要亟應熟商方於事有益查馱馬與騎馬不同兵丁所騎之馬遇高陡山坡可以牽行休息馱載之馬不能缷䭾皆負重而行尤須壯健查内地各營及州縣撥調買購之馬騾趕赴中甸不無疲乏不暇歇息又復馱載前行恐難致逺又兼内地暖處之馬不耐口外寒冷惟狜猔馬騾能食糌粑内地之馬無草即難存跕所以初次雲南買内地馬騾運米至響鼓坡一帶十停之中倒斃七八以致誤運嗣後解餉皆雇狜猔馬騾馱送俱無遲誤此巳然之明驗也目今之計不若將撥調買購馬騾留在劍川歇息餧養僃用給雇狜猔馬騾馱載既可使起程日期急速且軍裝糧糗皆可無誤雖與初次進藏之例不符而於軍事實為有益等因前來臣與撫臣㑹商除迤西之馬已經到劍迤東在路之馬仍催僃用外并覆提臣相機就近酌行兹於二月十六日准提臣咨稱現今糧餉已給宜飛速起程至馬匹除兵丁騎馬外馱載牲口雇僃足用巳於二月初八日起程前進又副將孫宏本亦於初七日帶兵巳抵中甸其提臣隨營糧餉臣委開化同知丁棟成辦理又委大理府通判顧朝俊等辦理續後運送軍糧及支放阿墩子中甸兵米又派兵三百名僃安臺站所有一應用過糧餉細數容於提臣移册到日詳奏外臣謹先將提臣起程日期繕摺奏聞謹奏覽所奏軍糈馬匹各情節甚屬周詳明析知道了已諭部存案矣雍正二年二月二十九日雲貴總督臣高其倬謹奏為奏聞雨水米價事竊雲南去冬雨多正月内亦有大雨二月内有小雨二次現在蠶豆已結粒飽足好者可有八分収成次者可有七分六分小麥已結粒有四分滿飽大麥巳抽穗尚未結粒米價省城毎石一兩一錢外府州縣毎石一兩至八錢七八分不等貴州雨水霑足各處米價毎石八錢至七錢不等理合具摺奏聞謹奏覽滇省雨水米價情形朕懷深慰近畿數省自去冬今春以來微缺雨雪昨於三月三日普雨霑足中外慶幸不知是日雲南曾有雨否查奏以聞兹四月初十日正在盼雨之際又得甘霖透足北五省麥秋大有可望矣同日又奏為遵㫖謹奏事竊臣奉到硃批欽遵諭㫖看得巡撫楊名時居官為民之意甚切雲南糧米雲南布政司皇上令臣舉所知之人臣識見短淺深切祗懼謹就臣所知者雲南鹽驛道李衞操守才具俱好再加以皇上於睿鑒之内所奏俱悉語語悉屬是當之至同日又奏為奏聞事竊臣奏摺内欽奉皇上硃批同儕共事切戒争功聖訓周到至此實天地父母之心臣跪讀之下感刻心髓臣謹凛遵守不敢稍違一切緊要軍機事務商量得及者臣務必先商之大將軍年羮堯酌妥然後舉行有商不及者辦理之後務必通知不敢稍萌爭競之心亦不聞謹奏請託一節汝雖奏出朕斷不宣露但必令朕知之方好其中關係非細爾等大臣言所當言亦非為刻薄朕昔在藩邸時從不問人之善惡嬾聽談人之是非何也身居閒地無賞善罰惡之柄聞之徒亂心胸言之空惹怨尤而巳今位當九五臨御萬方若聞見不廣必至是非顛倒賞罰混淆貽誤匪淺所以不得巳而勤加延訪也爾等封疆大臣能仰體朕衷事事據實入告不掩蔽朕之耳目則禆益吏治民生曷有涯量然於君父之前一派真誠絲毫無隱大非易事豈泛泛庸常人所能及哉勉為之同日又奏為奏聞事竊據雲南調補副使道趙之均呈稱之均荷䝉皇上洪恩垂念祖父微勞格外優恤准將雲南事簡道能即至請於鹽道庫内先行暫借解交藩庫應用一面差遣家人回籍湊僃來滇即行交還鹽庫補項等因到臣臣查趙之均感戴聖明情願急公捐助軍需臣謹將情節具摺奏聞謹奏覽同日又奏為恭謝天恩事雍正二年二月二十三日臣齎摺把總回滇捧到皇上賜臣袍褂一套果子一匣臣恭設香案望闕叩頭謝恩祗受訖伏念臣才質庸下䝉皇上以署理之員實授雲貴總督毫無報稱夙夜自慙乃荷天恩下逮數月之内三叨御賜雖捐糜頂踵不能仰酬惟有勉竭駑駘之力謹遵皇上硃批以真實感契之聖訓凡事從誠從實以冀稍報高厚於萬一耳臣謹具摺恭謝天恩謹奏自軍興以來爾諸凡料理實屬可嘉朕已降㫖賜爾世襲拜他拉布勒哈畨以酬勞績一切處黽勉為之作一千古不磨之名臣方不負聖祖數十年知遇之恩也硃批諭㫖巻一百七十六之一欽定四庫全書硃批諭㫖巻一百七十六之二硃批高其倬奏摺雍正二年四月十六日雲貴總督臣高其倬謹奏為奏聞事本年四月十六日據提臣郝玉麟咨及來字提臣遵㫖前往又木多駐劄一面起程一面宻查各處有無呼呼腦兒賊人在彼煽惑騷擾之處以便勦擒隨據各處報稱俱各安靜惟擦哇岡番目報稱正月二十五日有呼呼腦兒差扎石等到奔打一帶要奪地方大話恐嚇説青草出時有兵前來且索要馬匹硝磺畨民甚是恐懼隨遣遊擊李君賢帶兵前往擒拏惟恐走脫提臣亦帶兵前往於三月初七初九等日在擦哇岡等處共拏獲結松翁布扎石等一十三名搜出小番字信紙一張譯出係呼呼腦兒賊人寨桑七里敦魯令結松翁布扎石二人探聽打箭爐中甸有多少兵馬進來速令寄知之信隨將十三人細加訊問内有九人實係呼呼腦兒遣來姦細隨即行正法其四人係本處跟隨不知情之人已經保釋再奔打至薄須常川一帶地方有四百餘里其間黑帳房之人向服呼呼腦兒管轄交納錢糧提臣宣布皇上聖德神功中外一體至意夷民懼喜交集有木魯敦巴地方頭人素囊工波常川地方頭人奔特之竹墨巴工卡地方頭人彌納等皆到營門叩首情愿歸順天朝開報戸口三處共五百五十三戸又巴樹地方喇嘛處丕松及火頭扎機等投狀内稱原是達賴喇嘛的人五年未納錢糧未投四川亦未投雲南但呼呼腦兒時常騷擾情愿為聖主子民開報喇嘛一百八十名戸口二百一十戸提臣已經逐一安撫并呈報撫逺大將軍年羮堯作何管轄料理候酌定而行臣查呼呼腦兒差人煽惑番人皇上早巳預料及此今提臣兵到即獲姦人與前奉到諭㫖毫髪不爽現在常川一帶黒帳房夷人俱各叩首歸降而提臣之兵已到則陜西西藏四川雲南四面皆嚴羅卜藏丹津敗殘之衆如魚遊釡中計日授首此皆我皇上智燭機先仁周化外之所致也再雲南所運米糧隨營者現足供支繼後者止離行營五站皆無遲誤中甸一帶地方俱甚安靜臣謹一并具摺奏聞謹奏覽奏深為慰悅雍正二年四月十九日雲貴總督臣高其倬謹奏為開墾馬厰以濟兵食事竊查雲南一省山多田少生齒日繁所産之米有収之年止敷食用是以滇省米價較隣省倍貴而省城米價又較外府獨昻省城之人較他處度日為難而省城之兵承平日久人口日增且無生理較商民口食又窘臣到滇以來時時留心思為設法調劑近經詳細訪查有臣衙門及後營馬厰一處坐落陸凉州地方原甚寛大因其地草毒馬食之者多死故三十餘年馬匹不往牧放附近居民將地可種者俱漸報糧開墾惟剩中心積水成湖之地一片又水傍窪下難種之地共計有三千餘畆臣隨捐銀五百兩委員雇人打圍護住水邊之地開得田三千三百餘畆可以種麥種稻即招本地民人願種者薄取田租令其承種但今年巳過種麥之期止有稻田可種計秋収之時可得米一千石至年來即稻麥俱収該地百姓見田租甚輕紛紛來說此地中心積水之處因大河泛濫年年灌注所以耕種不得若於上流做閘兩旁築堤二道旱時放閘灌田澇時閉閘令水順堤而下則水不灌入田皆涸出起初一二年種麥以後漸可擇種稻田其閘工官做堤工百姓願自行出力築起但涸出之後乞將此田分給築堤百姓承種納租民得田種兵得租食實屬兩便如此料理雖中心深潭一時難乾而四旁涸出者定可得田一萬餘畆臣又委陸涼州踏看與所説相符隨支臣鹽規銀一千五百兩分𤼵該知州吏目等令其修築閘座百姓亦欣欣共築堤工現已工完一半八月内即可全完此時地巳有涸出者其勢可以成功若再得此田成就則一年可約得麥米一萬數千石倘二年有収則可有二三萬石之積設有不収省城八營之兵可不動公聞謹奏周詳之極可嘉之至如此方克稱封疆大臣也且爾此事與朕現在舉行之事適相符合朕思八旗生齒日繁苦無久逺養贍之策因命將各項地畝查出共得田七千餘頃照井田法令八旗閒散壯丁前往耕種雖事甫經始尚未成就看來似與旗人大有裨益便中諭爾知悉同日又奏為奏聞野賊情形并㕘流土不職事竊查雲南魯魁野賊向來四出向各寨索要保頭錢不與者輒肆搶殺經前督臣范承勲招出楊芳普李四姓賊目給以縣丞巡檢土職安插於元江新平一帶居住令其管束猓夷保固地方豈知伊等竝不能保固地方反為討保頭之樁主其子弟宗族及所屬頭目人等各自暗占地方竟成年例復彼此爭奪搶殺相尋方景明等糾衆攻破猓目施和尚之寨將和尚殺死不肯解散臣隨分委將弁帯領兵丁攻克賊寨所有方景明方四普阿黑普白賒李三斤李篾巴等陸續投出惟普有才逃往威逺土州鎮沅土府一帶藏匿陳阿巴尚據土戛不出復飭文武上𦂳查拏各情由經臣具摺奏明欽奉皇上硃批將兵丁所用米糧令臣開銷正項又中途染瘴病故官兵令臣具題皇上加恩議叙全滇官兵無不感戴天地高厚之恩咸思奮躍圖報臣謹欽遵俟於事竣之日詳細另疏具題外臣嚴檄威逺土州鎮沅土府令將普有才查拏解送又令元江文武嚴諭陳阿巴令其速行投出乃陳阿巴竟不肯出且又騷擾土戛附近村寨官兵進攻克其土戛陳阿巴逃向里仙江外土司地方又糾合方景明等數家頭目所留餘黨迫脅本處猓人共六七百人往車里宣尉司所屬茶山一帯搶擾臣委守僃魏翥國帶兵三百名前往𠞰捕有把摠唐起運帶兵四十名到籠得地方查緝遇陳阿巴帶賊六七百人恃衆竟犯官兵官兵奮勇殺賊四十餘人賊人敗走魏翥國復追賊到整董從賊三人又遣千總楊文舉等在深箐之處趕上賊人賊見官兵皆滚箐逃散官兵隨即追殺賊衆三人獲馬六十二匹鳥鎗梭標三十餘件我兵前後傷死五名容臣一并題請議叙又施和尚之姪􅕹勒糯片經元江文武曉諭伊等情愿帶伊土兵前去搜擒陳阿巴及普有才隨遣守僃李鳳帶兵一百名押令前往亦經將陳阿巴之弟二瘋子拏獲臣查陳阿巴巳經勢窮力竭惟有在山箐深宻之處躱藏以延旦夕臣分飭搜擒務期必獲至普有才逃往土司地方中途所留一妾一女及奴僕五人亦經拏獲細查蹤跡普有才係由鎮沅土府之境逃入威逺土州土知州刀光煥隱匿不報臣務必設法查拏但細加籌度欲除魯魁野賊討保之害目下有應調劑者數端葢野賊向以魯魁一山為逋逃之藪而隔江又有哀牢一山其深逺數倍魯魁歴來野賊事急必逃入魯魁若魯魁又存站不住必逃入哀牢賊入魯魁攻擒猶易賊入哀牢𠞰捕即難向者皆云林深箐密搜捕難施臣細查情勢實另有别故哀牢一山各州縣營汛環其三面其西南一面則係威逺土州鎮沅土府及車里宣尉司之地而威逺尤當衝要賊人無事之時與土司及其子弟頭人結姻拜盟一經有事官兵三面進攻賊即從土司一面逃出土司護庇藏匿或縱出境外烟瘴之地令官兵難以前往查捕督撫亦往往以曠日持久恐沅土府車里宣尉司皆任其在境内行走竝不堵禦而威逺土知州刀光煥尤為姦狡不但不加堵禦反暗中接濟米糧透漏消息又與普有才結為父子諸子皆結為兄弟將普有才藏匿其地經臣詳查確實似此不法土司既法在必懲且雲南形勢亦必須於哀牢西南一面安住官兵則野賊巢流臣熟籌妥貼交臨元鎮總兵楊天縱就近相機將威逺土知州刀光煥父子拏禁再行具疏題請改設酌安官兵駐劄則形勢既便惡黨亦除再楊方普李四姓土司原係賊目竝非因功授職之人且承襲數世不能保護地方反為害地方除李姓之土職巳因犯罪革去又土縣丞楊世恩此次野賊妄行伊之子弟宗族無一人在内又帶伊土練跟隨官兵查拏野賊頗屬勤勞應仍留其世職匪矣至各野賊出没之處地方文武各官有撫治控馭之責尤關緊要其因循廢弛才具不及者皆亟應㕘處另易賢員整理除元江協副將吴開圻新平知縣蹇王臣已經臣㕘革外元江府知府張嘉穎才具甚短控馭乏術臨安府知府王僴頗耽麯孽人亦糊塗普洱通判王秉煌此次運糧俱行遲誤竝不盡心均請革職又建水州知州尚崇初臣以其非繁劇之才人尚本分請以之與陸凉州知州對缺調補今又查出伊將地方搶殺一案隱諱不報臣不敢以經臣具前投出賊衆應分别處置臣已將生擒之賊目老常在當處正法又一同被擒之賊衆五名暫留二名在營中認拏賊人餘三人拏至省城當著投出陳阿巴之弟及各處報獲之賊衆俟解到審明另為處置至前在元江投出之賊首除普白賒已經身故其方景明等五人皆係歴年討保頭錢之大官兵未到之先自行投出者即免其正法減等發落若拒敵者俱即正法圍住後投出者割斷兩隻脚筋再方景明等之小頭目人等内有平素兇惡者割斷一隻脚筋令成廢人其愚懦者分𤼵各營及錢局嚴謹查管令其當差又臣細細查審内有一百零七名年多不滿二十嵗實係鄉愚被方景明等廹脅帶出充數者臣已𤼵令該地方官安插臣謹將情節據實奏聞謹奏通盤皆是朕實嘉之能如此庶不忝封疆重寄也勉之雍正二年四月二十九日雲貴總督臣高其倬謹奏為奏聞中甸田地可以開墾情形事竊中甸納土歸誠其戸口錢糧及四至疆界臣遣順寧府知府范溥前往清查并諭令於清查之時細看各處有無閒曠田地可以開墾之處一一留心目今叉木多及中甸等處有兵駐劄米糧皆自内地運送若中甸左近得有可種之地仿屯田之意開墾即以其糧米供給兵食既可節省錢糧又可省内地運送今據范溥禀報細看中甸之東四十里外有沿江平川一道可以種麥亦有可以開成水田之處地面頗大番子人少不能遍種若酌量招募人力稍給器具牛種今秋開田來年可以収麥漸次種稻所収之糧以供兵食則中甸之兵米可以不須運送即叉木多等處需糧亦可省十餘站脚費臣現在籌畫料理謹先將情節具摺奏聞謹奏如此盡心籌畫實屬可嘉但此事當與年羮堯周詳商計方可見諸措施目今西海巳定藏兵議撤中甸一帶若竟歸入版圖屯田供餉固係妙策無疑即不歸入版圖而久逺駐兵彈壓亦係良謀倘不過遥為覊縻仍屬外地將來兵馬盡行撤回此舉豈不徒勞可再加酌議汝二人㑹同具奏以聞雍正二年五月二十八日雲貴總督臣高其倬謹奏為奏聞事欽惟我皇上聖德神功超邁千古出師半月西海蕩平當此逺人盡歸教化外地皆入版圖之際正經營圖度善後永安之時臣謹就雲南中甸情形盡臣愚昧之見籌畫數條此係永逺之事所關甚重臣識見淺短恐多未當不敢冐昧陳奏已詳悉咨呈大將軍年羮堯俟酌定之後再行具奏謹先將情節具摺奏聞謹奏甚好理應如是朕為此前巳有諭矣同日又奏為遵㫖奏聞事竊臣前奏摺内欽奉硃批覽滇省雨水米價情形朕懷深慰近畿數省自去冬今春以來微缺雨雪昨於三月三日普雨霑足中外慶幸不知是日雲南曾有雨否查奏以聞兹四月初十日正在盼雨之際又得甘霖透足北五省麥秋大有可望矣欽此臣跪讀之下不勝慶幸欣喜此皆我皇上敬天勤民實心實政之所感召至雲南三月三日省城午末下雨至酉初止外府州縣普皆有雨四月初十日雲南亦有雨自入夏以來雲南水田得雨極其霑足向年不得種之雷鳴田俱各得種栽插甚廣目下雨覺微多若四五日内即止則高下俱可望大収倘再不止則近海子之極窪田畆即有傷損雲南之田通省合算此種窪田不過百分之一恐縈聖懷故瑣細聲明臣謹將雨水情形具摺奏聞謹奏覽奏深慰朕懷畿輔雨水亦覺微多然秋収有八九分可望一切河道伏汛皆保無虞惟張家灣決口數處幸未損傷民田廬舍大約今嵗年景荷䝉上蒼垂慈直隷等省普冀豐熟此實係皇考在天之靈有以陰庇黙佑之所致也朕曷勝感慶之至同日又奏為奏聞事竊照總兵一官表率將僃整理營伍最關緊要各鎮賢否臣有所知不敢不據實上聞除前各總兵居官臣已經具奏外近陸續到任之總兵中臨元鎮總兵楊天縱辦理諸事拏治野賊俱井井有條於地方營伍有益楚姚鎮總兵南天培安靜勤飭盡心營伍鶴麗鎮總兵張耀祖漢仗好微有恃才急欲見長之病然於出兵行軍之事甚為歴練是有用之才惟永順鎮總兵李根潤自到總兵之任行事頓異從前總兵卜應奎冐食長隨糧甚多臣查令挑補除挑補外尚剩八十四分延挨未補又經嚴催伊於雍正元年九月初四日挑人頂補頂補之人巳行走二十餘日總兵李根潤於九月二十六日到任復行革除將餉冐食經臣訪知復令臣標官弁到彼查看始行補實共計冒食銀一千一百餘兩又暗遣管隊夏朝龍兵丁石玉等到干崖猛卯土司處需索禮物又日日飲酒清晨即入醉鄉醉後將千總胡章稿房冷興桂兵丁陸榮先責打鎖禁醒皆不知臣勸戒數次毫無悛改臣受皇上高厚之恩不敢以甫經補授之員緘黙容隱謹據未深知合并聲明謹奏如是方為不負朕之倚任李根潤原屬平常因趙坤在朕前保舉所以擢用今職後聞是一醫官之兄人甚庸碌朕甚悔之此奏甚合朕意巳有㫖諭部矣趙坤何如此任提督似不及前任總兵時之聲名同日又奏為奏聞酌定各府税規羡餘充餉情節事竊據永北鎮總兵馬㑹伯交到奏摺一件内稱雲南曲靖大理永昌四府稅銀儘有羡餘可得數萬兩除正項之外凡有餘銀悉行清出以充兵餉不無小補等語臣於覆奏籌餉時巳行令司道將通省各府州縣所有稅課贏餘實數逐一查清臣再詳加核酌分别應歸應存使可永行方敢具奏今查雲南省除無稅課之府州縣外其有税課之府州縣毎年報部正額銀共一萬四千七百餘兩此外各府贏餘多者四五千二三千兩少者五六百三四百至一二百兩不等各州縣贏餘五六百二三百以至四五十兩不等臣再四籌畫謹將各屬稅課贏餘酌定督撫藩司及府州縣留存養廉之外毎年共可得銀一萬二千兩歸公充餉聽撫臣造冊送部查核統以本年秋季為始解交藩庫此内惟雲南大理二府與他處稍有不同雲南府知府韓鍾因從前滿洲官兵在省前督撫臣將一切供給諸事盡推令該府一人支應又有勒索之處以致虧少倉米三萬一千餘石又大理府知府程珩因從前上司壓令代各州縣完補虧欠銀米代完鹽欠種種勒索以致虧欠倉米一萬餘石銀八千兩臣因該府等實非自己花費侵漁情有可原且其身家亦難完補若行題㕘此數萬銀米即無著落故㑹同委員將伊等稅務監収儘其羨餘盡行完補現今雲南府知府韓鍾將所収稅羨及該員變産借完之項一總填入巳買補米二萬三千餘石下剩七千餘石若再収一年有餘即可全清大理府知府程珩將伊稅羨及伊自補之項一總填入巳將所欠倉米一萬餘石買補全完尚有銀八千兩未能完補大理之稅課羨餘較雲南府稍少若再収補二年亦可全清臣冐昧懇乞聖恩俯准雲南府於雍正三年冬季為始大理府於雍正四年為始將贏餘解交藩庫則虧欠之頂可以盡數全完矣臣不敢擅便謹將情節具摺請㫖謹奏朕於地方諸務但偶有所聞率皆發交爾等督撫大吏酌量而行原非深知灼見之事總在爾等因時制宜秉公料理朕自有鑒照殊不便指示可否萬一其中原委知之不悉反致爾等掣肘難行不得已而陽奉陰違及或那彼就此則於上下皆屬無益况此皆係創始之舉審度應題即行具題可耳朕竝無欲速之念不特此一節百凡俱當徐徐相機合理而為之同日又奏為奏聞拏獲土州父子以除積患事竊雲南威逺州土知州刀光煥將野賊頭目普有才認為父子伊子與之結為兄弟任意藏匿令其逺遁臣前巳將情節及密拏土知州刀光煥并改土歸流設汛防守之處具摺奏明但威逺土州三面接壤外夷地方頗大人衆亦多刀光煥又與野賊交結親密狡猾難測其第三子尤為兇惡恐一時孟浪擒拏致生事端臣前與布政司李衞密商遣守僃楊國華選帶壯健兵丁三十名以稽查普有才為名先到威逺又續令千總朱仲玉把總周元勲各帶兵丁三十名從新元江二路作奉本營將官遣其遊巡在威逺合哨便道來看望楊守僃以便幫助又暗令楚姚臨元二鎮臣遣派將僃帯兵前往俱離威逺一日之程不入其境以為協應諭令楊國華俟各處兵到如機㑹可擒即擒如勢不能即調三處之兵協助楊國華到彼見土州已有防僃但所調之人未齊乘其人尚未到即將刀光煥及其四子三弟盡行拏住并獲其印信號紙又搜出明景泰年間給與鍍金符信一面業巳將刀光煥等解至省城平日刀光煥在州苛派土民聞其㕘拏衆俱悦服地方甚是安靜巳委官細查地方錢糧户口造冊另報仍令楊國華駐劄彈壓其刀光煥審擬定罪及改土歸流事宜容臣審明酌定具本題明外所有拏獲土州父子情節謹先具摺奏聞至普有才原因刀光煥為之隱匿故蹤跡難得及刀光煥一拏之後守僃李鳳等即問出蹤跡將伊母妻及家人皆已拏獲普有才止帶一㓜子跟六七其陳阿巴被官兵連敗數次拏獲賊黨及殺傷甚多抛棄馬匹器械滚箐逃躱將已撲完臣謹一并奏聞謹奏知道了問擬刀光煥罪名務必允協得當堪服衆土司之心方好過嚴恐向後有違犯法紀者不敢悔改自新過寛又恐若輩見被擒獲仍不過如是發放滋長玩視之念二者俱屬不可宜平心查審依凖土人習俗性情再四斟酌然後定案可也雍正二年六月二十九日雲貴總督臣高其倬謹奏恭請皇上聖安朕躬甚安都中内外平靜今歲荷䝉上蒼垂佑直省秋成可書大有此皆仰頼皇考在天之靈聖慈黙為蔭庇所致朕實慶幸不盡惟有朝夕乾惕與諸臣共勉敬畏二字耳特諭賜來眼鏡二副光與目對否同日又奏為查㕘事竊臣具摺奏㕘原任署理雲貴總督事務張文煥向沈元佐柯鉅等需索致虧鹽課等額請將張文煥之子及孫姓堂官發滇質審等因奉㫖照該督高其倬所請將張文煥之子及孫姓堂官拏送雲南審明定擬具奏該部知道欽此於雍正二年正月初二日准刑部移咨到臣欽遵在案續於本年四月十五日據陜西寧夏道差解張文煥之子張廷蕙堂官孫廷璽到滇臣即押𤼵布按二司㑹同質審去後兹據布政使李衞按察使張謙㑹同詳稱拘到張廷蕙孫廷璽將摺内㕘出需索被劾鹽道沈元佐署黑井提舉柯鉅等各銀兩當堂質對除審無確據外其餘據各員供有憑據尚有原㕘未及查出需索銀兩又據雲南府知府韓鍾被劾平夷縣知縣傅永緒陞任永北府同知孫漢良被劾廣西府通判靳治邠被劾昆陽州知州何大寵等各具呈到案據各員亦各供有憑據計共應追補銀四萬五千六百四十八兩零兩造互相質對張廷蕙孫廷璽俱各承認隨當堂投到畫押呈詞一紙情願著人回籍變産賠補銀十萬兩等情據此查此案原奉查㕘前署督院需索多端致虧額課請將伊子及孫姓堂官發滇質審明白將所得銀兩追出賠補具摺奏明今審得前署督院需索各員銀共四萬五千六百四十八兩零查此内有収過沈元佐銀二萬三千三百六十兩零係總督衙門鹽規又一千二百兩係索去捐納加添銀兩皆非鹽課虧項俱不准抵補沈元佐虧空應追出歸公充餉外其索去程儀係額外那動鹽項此一千兩應准抵補元佐虧空再需索柯鉅等各名下銀共二萬一千八十八兩應將張廷蕙認賠銀内撥補二萬一千八十八兩令各清虧項外仍剩銀七萬八千九百一十二兩再查鹽道交盤案内原題有各府州縣逺年民欠并流交虧空難於催追銀八萬九千五百四十六兩零自題報後設法彌補陸續催収過銀二萬九千九百八十一兩零又除揭出靳治邠吴繩武劉淑未完虧空銀九千四百六十九兩零另案審追外至今仍有未完舊欠五萬九十五兩零原題勒限兩年催追彌補内有年逺民欠并已故離任不等現在照數催追盡力補庫儻有民欠無著家産盡絶實不能追者兩年限滿請除將前項張廷蕙等認賠銀兩撥補外下剩盡行歸公充餉庶庫帑不致虚懸鹽課錢糧得以全清無虧矣再張廷蕙等認賠銀兩内已完銀八千兩交貯藩庫其餘著人回籍變產應行文原籍勒限一年解滇補庫如限内不完詳請㕘革治罪等因前來臣覆加親訊與司審無異應如司詳將張廷蕙等認賠銀兩行文原籍勒限一年解滇補庫其歸公充餉及抵補撥補虧欠之處亦應照詳准行至司審有鹽道交盤案内原題難以催追未完鹽課銀兩俟兩年限滿儻有民欠無著家産盡絶實不能追者請於張廷蕙等認賠銀兩内撥補等語此等銀兩既有著追似不應又擬撥補但臣細查此内實有年逺民欠及原官病故離任者李衞於鹽課積欠彌補催追不遺餘力兩年屆限不完者必不甚多彼時尚不能完即屬實無可著追之項存之徒懸不楚虚數若准其撥補則從前欠項皆徹底全清矣臣不敢擅便理合繕摺請㫖謹奏覽奏知道了應如李衞所請酌量准其撥補鹽課正項既清之後所餘者朕意不必歸公充餉當以之彌補别項無抵虧缺為是爾臨時分析奏聞朕自諒情允准也同日又奏為奏聞事竊臣前具奏摺内欽奉硃批𤼵滇補用人員内如有不職者令臣不可瞻徇即行㕘奏今發來各員缺出委署者巳十之八九雖其中或確知但以目前而論皆有振作之氣無弛怠之意惟委署南寧縣鄒汝黙日事麯糵醉後遶堂走呌或出至街市民間駭異凡斷獄訟縱性徇私自恃因奉有訓㫖謹先具摺奏聞謹奏知道了應亟予革黜雍正二年九月十二日雲貴總督臣高其倬謹奏為奏聞年成分數事竊查雲南今年春末夏初雨水甚早且極霑足處處稻田不但栽插應時即山腰坡頂最高之田往常因少水不能種稻者皆得插蒔惟六月間雨水太多窪下之田禾苗稍覺傷水幸雲南高田極多低田甚少又自七月初四五以後晴霽一月有餘今各處俱陸續収割高低合算年成有十分九分八分七分不等現今省城米價每石九錢外府州縣八錢七錢不等各州縣之内惟昆陽州昆明縣鄧川州定逺縣此四處之田各被水淹者有千餘畝其中尚有一半有四分収成有二千餘畝無収者又七月初二日早大雨如注昆明縣屬之寶象河水暴漲漫溢淹塌小板橋等村居人土房五百餘間田苗雖過水因水退甚速今皆有六七分収成其塌倒房屋之家臣同撫臣楊名時及司道等巳各量捐賞給理合一并奏聞貴州今年安順府以西雨水霑足有十分収成安順府以東六月内少旱隨亦得雨有九分八分年成今年雲貴兩省俱獲有収臣意趁此籌勸積貯并戒令民間加謹葢藏不可因稍豐収遂致浪用是為要務臣自同兩省撫臣上緊勸禁料理所有年成分數臣謹據實奏聞謹奏覽滇黔收成分數朕懷深慰趁此籌勸積貯洵屬要務同日又奏為遵㫖覆奏事竊臣欽遵硃批諭㫖查得趙坤自到貴州提督任以來操守謹嚴武員中無所取索各營查補實在之糧甚多操練亦勤此實是其好處臣不敢隱没以臣愚昧之見觀之覺度量微隘稍懷忌刻事事欲見巳長恐不能用衆屬員之長又調度之處所見未逺似戰將之才有餘大將之畧未優兹䝉天語下詢稍有所見不敢少隱臣實無知人之識冒昧未當不勝惶悚謹奏據奏趙坤若能如是在武臣中猶屬好一邊當勸勉伊開濶度量協力整飭地方若稍露衰邁不稱職光景亦宻以奏聞此等老成歴練之員但取其循分集事雖短於謀畧殊勝新進少年多矣同日又奏為奏聞野賊巳平事竊查野賊普有才逃入威逺土州地方藏匿土官即代賊揑飾隱蹤臣巳將土官刀光煥拘拏又野賊陳阿巴聚衆拒敵傷兵官兵屢次擊敗賊衆殺賊甚多陳阿巴帶領餘黨逃入車里地方各情由經臣節次具摺奏明嗣後陳阿巴率衆逃入蠻先小寨各將弁兵練四面緊追於八月二十三日趕上殺死賊衆陳阿巴身中一鎗自刎而死巳割首懸示其普有才自拘拏威逺土官之後即查出伊在三圏地方官兵一到伊倉皇止帶數人及其子逃去伊妻被搶入擒獲餘賊俱被擒殺續於慢朋地方土人殺死伊子阿黑勒及隨從之賊普有才僅剰隻身止須留弁兵數十人在彼細細搜查自能弋獲又野賊頭目三肐撘亦已帶十二人在元江投出現今野賊根株巳除臣將兵練暫留在彼月餘飛令㕘將張應宗率領將僃將零星餘燼再行搜淨併相度形勢詳細具報臣熟商詳籌永久善後事宜另行具疏并𠞰賊始末一竝詳奏請聖訓平心查審務期公當足以服土人之心今衆證明白其子弟俱俯首無辭惟刀光煥尚恃土職稱係奏者貴州一省諸事廢弛未經整頓臣雖於錢糧一項諄囑撫臣毛文銓就近將水銀及礦厰二事查明實奏又定廣苗情一事臣業將汛兵改歸定廣協將廢弛副將陳元勲題㕘在案但撫心自問實未及如雲南一様料理何文銓前在雲省藩司出入稽查最為詳慎今必能一一清楚至貴省仲苗恣肆定廣為最都勻次之先將兩處辦妥餘即易於為力但太寛緩則誤事太嚴急則滋事目今雲南野賊之事巳經就緒再料理月餘一切可了口外量務糧餉巳有成規中甸善後事宜業巳商定又撫臣楊名時布政使李衞可以料理且雲省情形臣稍已熟悉亦可遥相酌定臣請於十月下旬輕騎赴黔就近相度機宜形勢與撫提二臣商酌料理大槩稍定再回雲南總之臣務竭心力不敢掩飾目前必期清肅臣非敢於輕動細審仲苗情形不稍加懲創難遽言綏輯安靜軍機間不容髪必就近調度始不失機㑹臣謹冒昧奏聞謹奏據奏欲親詣貴州相度機宜但黔省惡苗非滇南土司可比且黔省營伍廢弛已久切勿輕舉當再三慎重為要至於爾身兩省所關尤不宜輕忽目今西海已平魯魁事定滇省諒無急務矣若至貴州不妨多待數月通盤籌算斟酌詳審而後定議假如事在必行仍須商計萬全徐徐圖之特諭軍事貴密須出其不意尤宜知巳知彼謀定機先一切預僃完全臨期神速行之則一鼓而功可成也雍正二年九月二十日雲貴總督臣高其倬謹奏為奏聞事竊雲南麗江土府經臣請改土設流復䝉聖恩俯准以知府楊馝調補臣諄諄告誡令其盡心整頓調劑務使土司夷人心皆安穩方可經久兹自楊馝到任將及一年以來將夷民無名雜差盡行查免向來土府及頭人苛派陋規酌量一年裁革二萬餘兩事事休息教以禮義即土官亦量留養贍使之得所今通府土人皆以歸流為樂即隣近土司人民亦俱心服所有土府自改流以後甚為安帖情節臣謹據實奏聞謹奏覽奏土府改流以後安帖情形朕甚為嘉悦同日又奏為奏聞事竊臣將雲南陸凉州地方之馬厰地築堤設閘𨗳水開田籌僃積貯接濟兵食前已具摺奏明欽奉硃批訓誨令仿古井田之意料理實臣意見所未及謹欽遵聖訓辦理今臣所開之田因六月間雨水多於每年河水溢入淹浸十分之四其工本係臣給與者非兵民之力臣巳將種地之人量行給賞其未淹者分得租米二百二十四石巳貯五營義倉僃濟兵丁家口之用臣又思必種稻則須疊埂開畦經夏歴秋始能収割若令種麥則秋潦巳涸之後方種夏水未𤼵之前巳収更為便利且収麥之後水不甚大又可播種晚稻雜糧今臣就現在已成之田遣餘丁十六戸前往與彼處民人分行種麥毎八戸分給田九百畝以百畝為公田合力共作成熟之後九分中取其一分以為五營義倉之積此時低田未全涸出且係創始先遣此十六戸試行此馬厰之田若盡涸出約可有二三萬畝俟試行漸定涸田漸多臣自添撥餘丁陸續料理并所積米糧數目再行奏聞謹奏試行井田麥稻兼種之議甚善雖然事貴因地制宜酌其可而為之毋因奉有朕諭而勉强遷就也查雲南設有援𠞰左右兩協毎協額設馬戰兵三百八十名歩戰兵一千三百二十名左協駐劄尋甸州係曲尋鎮所轄尋霑營地方右協駐劄羅平州係廣羅協所轄地方兩協原無專城地方之責亦無護餉解逃之差止以預僃督臣調遣策應而巳但督臣親標額設馬步守兵共五千名全滇各鎮協營星羅碁布一有遣𤼵飛檄響應即無援𠞰二協亦自聲援足用况設援𠞰以來從無專用之處即有調遣亦無用至三五百名者洵屬閒冗無益計兩協馬步戰兵三千四百名以及協將僃弁嵗需俸餉馬乾等銀竝所支米石折色而算幾及九萬兩以朝廷有用之庫帑贍養積年無用之官兵誠為可惜目今雲南僃兵不便全請裁去臣謬度時勢酌量足用毎協應裁去兵一千名止留馬戰兵一百名步兵六百名留遊擊守僃各一員千把總共六員改為援𠞰兩營歸駐省城督臣標下就近䇿應既為㨗便隨標操練更成精鋭嵗計官兵俸餉馬乾竝米石折色又可節省五萬兩有零以資别項軍需其尋甸州地方仍令尋霑營撥千把一員帶兵一百名駐守羅平州地方仍令廣羅協撥千把一員帶兵二百名駐守則營制汛防亦各有專責矣至裁去之協將僃弁令其赴部另補所裁之兵行令督撫提標併通省各鎮協營出有糧缺不必招募即令裁兵頂補務於二年以内盡行安插入伍庶兵無閒廢糧不冗食其於營伍錢糧均有裨益矣有人條奏雲南援𠞰兩協兵冗應裁朕未深悉情形故將奏摺發來汝看汝其詳加斟酌如係有益之舉即作爾意具疏題請若有不合宜處將不應裁改情由僃細聲明具摺奏覆同日又奏為遵㫖覆奏事竊臣䝉皇上發交條陳裁減兩協兵丁奏摺一件奉有硃批臣查此摺所奏可行惟所裁之數過多又欲將兩協裁剩兵丁移駐省城未為允協此事臣到任之始亦謂兩協之兵似可全裁及細察情形前人設立亦有深意未可以目前無用遂謂其非葢督標有兼顧兩省之責特設此兩協復處之近地以僃兩省援應之事急速調遣且使督標有以重制輕之勢原制多設馬兵而不分汛防者亦以便於隨時隨處皆可調遣應援之故但兵額稍多可議酌量改減若竟欲裁成五六百兵之小營則徒存虚名無濟實用實廢督標兩臂又條奏内稱兩協兵丁各留百名防守尋甸羅平二州餘者應調入省城查尋甸羅平二城界連川廣逼近㺜苗實資兩協之兵彈壓且兵丁住久田廬園墓皆在於彼省地既無房地且一遷移又有搬家道路之費而省城食米價亦貴於兩州此節不便於兵且在事勢亦有未可前此臣因中甸内附地方寛廣應議設兵防守又楚姚一鎮統轄四府汛廣兵單總兵南天培摺請添兵奉㫖令與臣商酌臣議將兩協兵丁共裁減一千名又酌量改馬設步改戰設守擬於中甸一帶地方添設兵丁一千四百名於楚姚鎮添兵六百名移此就彼不須多增餉銀即可添出兩處之兵將改添中甸營兵情節咨呈大將軍年羮堯俟其酌定覆到後方始具題今巳覆到以為可行令臣具題除容臣另行具疏詳奏外所有奉到條奏之事臣業巳酌行情由謹繕摺奏聞并將原摺恭繳謹奏詳閲裁改之議可謂一舉而兩得甚屬允協前此各情節知道了雍正二年十月二十五日雲貴總督臣高其倬謹奏為奏聞事竊查貴州定番廣順二州地方仲家苗於通省諸苗之中性尤兇悍苗頭阿近更為不法住於散幹倚恃山險并其弟阿卧廹脅阿近之苗隨從為非歴年刼殺臣屢次切責定廣協副將陳元勲令其整頓一味支飾因循臣巳具疏題㕘定廣距雲省二十站摘印文尚未到之間乃陳元勲忽思僥倖拏獲阿近以塞目前之責不報上司帶兵徑往被阿近等潛服高崖弩傷兵丁三人兇苗未獲臣摘印文到拘看續經提臣趙坤商㑹用兵圍攻委遊擊卜萬年等帶兵二千四百名𠞰捕賊又弩傷官兵二人臣以彼地苗寨頗多向受其廹脅必先離其黨則阿近勢孤易擒隨飛諭文武各員務先曉諭各附近苗人官兵所欲擒者止阿近等數人餘俱無涉爾等不隨助阿近者可自居本寨官兵秋毫不擾若與阿近聚在一處者定行𠞰除并張示曉衆撫臣毛文銓所行與臣相同各苗隨各歸本寨且為官兵耳目官兵進至底塘阿近勢孤逃入深箐遊擊卜萬年帶兵搜山入箐於十月初七日先獲阿卧及其家口并賊黨阿柴阿戎阿愛阿保阿雄等續於十四日夜已獲阿近阿近既擒則定廣之賊魁已除各苗聞之亦自歛跡但散幹一帶地勢深險仲苗甚多應趁此商酌永逺寧帖之䇿再黔省他處多苗地方亦須整頓料理今雲南各事稍竣容於大計拜疏後臣照查邊之例輕騎減從前往貴州與撫提二臣面商詳細料理再行具奏及拏獲阿近業經㑹奏外理合將臣欲赴貴州情節繕摺奏聞謹奏前經有諭總督乃統轄兩省第一職任一切舉動不可忽畧輕騎減從雖云美舉亦豈可拘定而不隨時變通也聞貴州官兵於今嵗四月八月兩次被辱且漫無紀律將熟苗廬舍焚燒恣情搶擄以致激變從逆爾暨趙坤毛文銓何故隱瞞不行奏聞今因阿近隨經就獲現在諭部議叙爾等爾等當感朕宥過賞功之恩莫謂朕於前事竟不知悉也嗣後舉凡地方大小事件絲毫不可諱飾一一據實奏報若再如此隱瞞定即重加處分不更寛貸矣兩次違律妄動之劣員俱查明嚴行㕘處示懲趙坤猶堪提督之任否依朕觀之甚覺因循罷軟從實奏來再者副將金懷瑋爾巳廉知其不職既欲㕘劾為何又復中止亦明白具奏以聞硃批諭㫖巻一百七十六之二欽定四庫全書硃批諭㫖巻一百七十六之三硃批髙其倬奏摺雍正二年十一月初十日雲貴總督臣髙其倬謹奏為奏聞雨雪情形事竊照雲南入冬以來未得足雨少覺旱燥於十月二十八九至皇上萬壽日連得甘雨四郊霑足豆麥暢茂又冬至日復降大雪雲南地暖得雪最難父老皆以為來嵗大豐之兆此皆我皇上愛民如子至誠感召之所致貴州雨水亦皆勻足理合具摺奏聞謹奏覽雲南雨雪情形朕懷曷勝慰悦全賴爾等封疆大吏恪秉一誠有以感格上蒼垂憫錫佑也同日又奏為奏聞事竊查貴州苗情現今巳將阿近拏獲又滋事之苗頭羅三龍土司薛世乾皆巳拏獲又苗頭阿教現在設法擒拏皆有頭緒雖可籌調劑之事但貴州諸苗之中仲家一種固最為頑惡然各苗亦多搶殺之事人多云由於苗性記讐嗜殺而然臣細察之皆起於圖利其復讐亦借端實利其所有嗜殺亦有故乃欲得彼財凡他人銀物一經其目必生心搶殺奪之而後已然貴州民貧有銀物可搶者亦少惟綑賣一節實啓生苗搶殺之心貴州接壤四川四川人價頗貴川販往往囑託貴州土棍又復勾串諸苗俾綑掠人口互相授受輾轉獲利諸苗爭相效尤故搶殺之事由於報讐及圖財者居其半由於搶人者居其半若能止綑賣之風則諸苗搶殺之事可十減其五但其中弊竇尚自多端貴州各土司地小人窮多以窩販窩盗為事而劣衿亦把持隠蔽共為樁主兵丁坐汛亦復賣放是以治綑販之法未嘗不嚴然不將各種弊竇詳酌整頓此風終不能息再貴州有拏白放黑之習如此人與人有讐或為人所搶已身力單不能報復即尋一有力之家或搶其人口或掠其牲畜暗插標紙説明情故令彼家代為報復或為贖取然後還其所掠臣查禁不遺餘力近此習頗息然必更加嚴密請㫖定重處之條始可永示懲戒杜絶惡習再貴州各府州縣與各省接界之處土司夷目亦多互相搶殺之事宜隨處拏獲隨即處治不必存彼此之見不可護本省之人即可消弭釁端不致滋事又黎平府與湖廣五開衞同在一城官分兩省事勢不便應行籌畫又貴州大定一鎮在兵稠苗靜之處兵額稍多定廣一協在兵稀苗頑之處兵額反少亦應減多益少以上數事及散幹善後之策臣皆已將調劑之處詳細籌慮俟到貴州再面商撫臣毛文銓提臣趙坤㕘酌熟計容臣具疏㑹題外謹先繕摺奏聞謹奏覽奏深愜朕懷此一番卿須悉心籌畫務將各種陋弊釐剔淨盡一應事體料理妥協方好朕另有諭卿及該撫提之㫖隨後頒𤼵可㑹同詳議具奏以聞雍正二年十一月十六日雲貴總督臣高其倬謹奏為奏聞事竊查雲南開化府與交趾都竜厰接壤向日交界以賭咒河為界係一大河後因其地曠逺多有刦殺之案又適值交趾之賊攻刦各寨總兵知府既畏處分又憚救援之勞遂將塘汛移入内界稱此外係交趾地方另指一小河强名為賭咒河其實棄去疆境一百餘里内有六寨人戸田糧俱歸交趾迄今四十餘年厯來知而不言者因都竜厰廣産銀銅内地及外夷俱往打礦貨物易消貿易者亦多總兵設汛稽查暗抽私利恐説出舊界則一經清查此弊亦露近經客民開銅山呈出舊界藩司李衞詳報前來臣以銅礦事小疆境事大委員確查總兵閻光煒尚阻撓隱蔽後經查出六寨舊納糧額及塘房舊趾臣隨移咨安南國王准其咨覆尚支吾牽賴目今臣又將詳細情節再行移知俟其覆定詳行具奏請立一關止禁硝磺鉛鐵等物不禁貨物抽其課税以資軍餉何者為宜詳細查報俟其查到臣再詳酌具奏外謹先將情節繕摺奏聞謹奏全在爾悉心斟酌行之同日又奏為奏聞事竊照雲南按察使張謙去年甚病兩月有餘後漸痊可今年自入冬之後行步常多傾跌精神短少不耐勞劇臬司刑名總滙衰病之人難以勝任臣謹遵㫖奏聞又邇來臬司張謙與藩司李衞不相和衷蓋緣李衞才情敏而稍輕視同官張謙遲滯鈍緩又因存不甘之心愈加偏執臣經屢行密加勸戒尚復時有參差謹一并奏此奏甚合朕意巳有㫖矣雍正二年十一月二十一日雲貴總督臣高其倬謹奏為奏聞事竊臣前赴貴州於雍正二年十一月十七日到雲南省之易隆驛恭接臣前奏摺欽奉硃批聖諭訓臣治苗方畧洞晰周詳無微不悉臣惟有朝夕敬繹事事不敢輕忽謹慎周密調劑料理所有事宜容臣相度商酌再行陸續具奏外臣謹將奉到聖諭繕摺奏聞再臣於十一月二十一日已到貴州之普安州合并陳明謹奏知道了爾辦理諸事朕心一無顧慮也同日又奏為奏聞調營拔補千把事竊查雲貴兩省拔補千把雲省迤東各營送臣衙門考驗迤西各營送提督衙門考驗貴州通省千把俱送提督衙門考驗雖拔補之處原無成例必令以本營之人拔補本營之缺但歴來皆以本營拔補本營習以為常相沿不改臣到任兩年以來留心細察情形以本營拔補本營實屬未妥蓋以本營之人同為兵丁一旦甫為千把即立體統規矩其勢甚難有志者纔欲約束則衆兵怨論即同輩之千把亦羣笑羣非衆情不協只得緘黙其不肖者且遮蔽兵丁之過附和兵丁之言膠固黨比甚至將僃稽查管束亦不易為力臣請嗣後由臣衙門及兩省撫提二臣衙門考驗者俱將本營之人考定抜補之後即調外營一員與之對換則新舊之員皆可漸次換易不在本營矣再此調換止就近營不調過逺之處俾省搬移盤費若同城之營仍不准調至慮營伍換易各員或有不能熟諳之虞臣查各營將僃皆非本營之人然不乏熟諳之員是熟諳在於留心不在於本營且千把果拔能員則本營熟諳之兵皆供其驅使更可収指臂之效臣從整頓營伍起見謹據實㫖謹奏覽雲督高其倬此奏甚屬得理若應通行於直隸各省該部確議奏覆飭令直省一體遵行其中倘有不盡善處亦即聲明毋得迎合朕意同日又奏為奏聞節省鉛價并調劑錢法事竊查雲南開局鼔鑄以倭鉛四分配撘計四局一年共應用倭鉛六十七萬六千餘觔俱照市價採買各局逺近不一并馱脚毎百觔共需四兩五錢臣亟思另自開厰以供鼓鑄外訪得雲南之快澤河向曾出産倭鉛委員招採所出不旺節省有限仍不敷用又訪得貴州地方之馬鬃嶺齊家灣礶子窰等處亦有倭鉛礦硐因通知撫臣毛文銓委員㑹同查勘招開巳經具奏今各處皆有成效雲省每年買運黔厰倭鉛五十萬觔供鑄一年約節省銀七千餘兩臣查雲南省自雍正元年十二月開鑄以來迄今巳將一年四局共鑄錢一十七萬五千九百餘串計撘兵餉及驛堡工食放錢八萬八千九百餘串除初開鑄各匠手生誤卯現在趲鑄外今已存錢五萬六千餘串又雲省寸步皆山不通舟楫流通運轉制錢須用脚價是以各近局之府州縣有錢行到其離局數百里千里者俱不能到以致壅積省城錢價漸賤臣與撫臣楊名時布政使李衞設法買運𤼵各次近之府州縣行消目下錢價雖巳漸平但雲銅非鼓鑄無法可消源源鼓鑄將來日積日多若不早思調劑恐致價賤病帑病兵臣再四思維不得不即請以錢局節省之項仍為流通錢法之用查雲南本省既尚有逺僻之府州縣止須運錢之脚價即可流通似可不必計及他省但一省之地有限恐仍虞壅積又查湖南湖北從前以糧船載回制錢行消今已久停聞彼地現今每錢一千可賣銀一兩一錢若運滇省之錢到彼每千工本及脚價約銀一兩三分三釐亦少不敷臣為流通制錢起見謹冐昧請以雍正三年節省倭鉛之價添補運脚先儘本省逺地流通逺地既遍再酌運售楚省統請於鑄務内一并奏銷庶錢法流通滇銅亦無滯積除容臣再與撫藩二臣詳細斟酌具疏㑹題請㫖外謹先將情節具摺奏聞謹奏流通制錢之議甚是仍聽該部議覆遵行雍正二年十二月二十二日雲貴總督臣高其倬謹奏恭請皇上聖安朕安卿之可嘉處朕殊褒奬不盡古人云求忠臣於孝子之門此語誠然不謬朕視卿實覺日重一日也同日又奏為恭謝天恩事雍正二年十二月十三日貴州大定鎮總兵官丁士傑到貴陽府臣出郊跪請皇上聖安丁士傑口傳欽奉聖㫖你馳驛前往貴州你到時大約總督高其倬還在皇上簡任總督毫無報稱夙夜難安乃荷天語褒嘉跪聽之際感愧交集惟有愈加黽勉冀少答知遇隆恩於萬一耳理合具摺恭謝天恩謹奏覽同日又奏為奏聞事竊貴州調劑事宜臣巳就臣愚昧之見㑹商具奏外更有一事雖屬甚微然於苗情亦有關係查諸苗之中仲苗之弩最毒恃此拒捕然皆伏於箐内施放所離頗逺中人所入不深原不甚傷無如其藥極毒纔破皮肉即難救治從前督撫亦曾設法収各苗之弩以除此害其實深山野苗之弩究難盡収臣近訪得苗弩藥有二種一種係草藥一種係蛇藥草藥雖毒熬成兩三月之後即出氣不靈蛇藥熬成數年可用然單用蛇汁其毒止能潰爛仍有治蛇之藥可醫更有一種蠻藥其名曰撒以此配入蛇汁敷箭其毒遍處週流始不可治聞此撒藥係毒樹之汁滴在石上凝結而成其色微紅産於廣西泗城土府其樹頗少得之亦難彼處蠻人暗暗賣入苗地其價如金苗人以為至寶臣非敢欲借此缷過於鄰省但既知有此不敢不思杜絶之計伏乞皇上諭廣西諸臣密訪如果有此樹請令認明形狀盡行砍挖再既有此藥恐亦有解治之方亦令訪求臣現今亦在雲貴兩省内捐賞遍尋解毒之術若毒弩可解亦治各省苗蠻之一端臣謹具摺奏聞謹奏此奏甚屬可嘉君臣間如此互相推心見誠方是已特諭廣西撫提李紱韓良輔等訪求矣雲貴總督臣高其倬貴州巡撫臣毛文銓貴州提督臣趙坤謹奏為奏聞古州八萬情形事竊貴州一切調劑苗地事宜臣等巳經㑹同具疏詳奏此外尚有黎平府之西南都勻府之東有生苗地方一處名曰古州八萬其地歴來未入版圖不納賦稅亦不容外人走入間有他處犯罪之苗逃入其地者彼地之苗即綁縛送出其内稻田甚多出白蠟桐油棉花及各様木植週環皆山中有平川四處皆方二三十里一總延袤五六百里中有一河下通湖廣之洪江口上通貴州之重安江重安江水小不能通裝載之舟其洪江口可通小舟楚民間有載鹽紬等物換彼白蠟棉花彼地之苗亦不容客人亂走及入其内地村寨止許到其沿河之十一村内住下令人伴著換貨一完即令起身不容多住亦不容多問聞其内總頭目名曰紀總其下辦事兩大頭目名曰金悶金勾其餘小頭目甚多向時風俗極為渾朴竝不多事近來亦頗収留湖廣江西之漢姦及貴州犯事逃入之苗不肯放出其中識字者甚是敬重查此地生苗最衆甲弩亦多既容留漢姦恐必致教之生事不可因目前無事不預行留心籌畫但其内中不容外人到去欲得彼地實在情形頗難臣等現在暗暗密行設法查看得其確情如果應防範或可招降即再行㑹商具摺請㫖若可靜治無事亦行詳細奏聞謹先將情節㑹摺奏聞謹奏確訪情形然後定謀乃係極善之舉但不涉喜功年利理所應為者卿等悉心籌畫務圖萬全而行之可也雍正三年正月二十六日雲貴總督臣高其倬謹奏為㕘奏事竊照原任貴州威寧鎮總兵麥世位在威寧鎮時私占長隨糧四十名經護理印務副將張禹謨查出募補又借藩庫銀二千一百兩臨行令將僃以各員親丁糧抵還雖未尅扣兵丁實苦累屬員經接任總兵石禮哈查報臣一面移咨廣起程日期復行住下要與將僃算賬索要不已臣屢檄查催口稱患病又不呈明李根潤係奉奭張時煥等指應考童生邵汝鈞為奴隸不容赴考又將邵汝鈞及保廪楊炳毆打竝搶去邵汝鈞卷子學臣王奕仁將伊等褫革枷責在案後據鎮臣石禮哈禀稱伊等所為比河南封邱縣劣生更為不法臣隨面訊大定州蘇霖泓生員童生閙者不及三十人無聚衆之處又伊等未入州衙亦無擁堂罵官之處此不過如他處攻打冐籍之事學臣王奕仁革頂枷打已足蔽辜無庸再懲臣謹一并奏聞謹奏大定棚生童情節知道了同日又奏為恭謝天恩寛宥事竊臣前將苗頭阿近等業已就擒并臣欲赴貴州情節具摺奏聞奉到硃批諭㫖臣跪讀之下不勝祗懼不勝慚恧臣罪戾至重皇上不加重處俯賜訓飭令臣改悔復諭令議叙臣益加惶愧無地自容嗣後惟有痛加省改一切大小之事絲毫不敢隱諱一一據實奏聞查雍正二年四月内定廣協副將陳元勲遣把總周正帶兵二百名令擒捕阿近兵力甚單此陳元勲調度失宜之處有落木一寨仲苗雖暗中與阿近通同然未顯然相助周正宜先撫定此寨以孤其勢然後再謀擒阿近方合機宜乃周正先即攻掠此寨火焚房屋以致此寨仲苗及他處者助阿近拒敵傷兵八月内副將陳元勲自帶兵弁冐險直入希圖徼倖擒獲阿近阿近據險弩傷兵丁陳元勲先行退走臣前摺所奏即係此事周正陳元勳臣俱巳咨革㕘革臣未將放火失利之處陳奏臣罪至重何敢粉飾又後調兵二千攻擒阿近有遊擊郭世𤼵領兵五百前進至谷藺寨此係青苗非仲家寨中之苗皆巳避入箐内郭世發帶兵在寨内駐劄夜間失火燒其草屋青苗謂伊等無罪為何燒其房屋遂到寨邊放弩亂打傷兵兵亦放鎗傷苗此遊擊郭世𤼵統馭無能之處容臣具本嚴㕘至提臣趙坤操守尚好臣前經摺奏此次臣勸其勉力整頓伊亦未嘗不奮𤼵感激亟謹據實奏聞伏乞睿裁再查左協副將金懷瑋弓馬頗去得居官中等因伊有隨帶之人在營當兵差操間有不到遊擊徐成正說其不是伊將各兵革伍另補然與徐成正借他事相鬧都來吿訴於臣臣調至省城當衆武官之前問明即嚴加訓責令其改過彼時責僃之際原有你不護隨丁即行革伍固是但過後如何挾持私怨本該㕘處之語此係當時即行訓責𤼵落實無欲㕘中止之處臣謹將情節明白具奏再臣自貴州回曲尋鎮總兵楊鯤向臣說金懷瑋不敢徇庇至貴州尚有應行調劑之事俟臣查確籌妥方敢詳奏臣謹繕摺恭謝天恩併陳罪悃謹奏所奏俱悉同日又奏為奏聞交阯舊界詳細情節事竊照雲南開化府與交阯接界有内地舊境失入交阯因開銅礦查出布政使李衞詳報前來臣以銅礦事小疆土事大隨批踏查有完糧舊額塘汛舊址移咨安南國王據其咨覆尚牽頼支飾臣又委開化鎮總兵馮允中令其親身詳查業經具摺奏聞兹據鎮臣馮允中報稱奉查内地舊界親身踏量至都竜厰之對過鉛厰山下一百二十九里又查出南狼猛康南丁等三四十寨亦皆係内地之寨被交阯占去不止馬都戛等六寨據開化府志及土人之言皆以此鉛厰山下即係舊界内一小溪即係賭咒河但此溪甚小不應與外國分界之處指如此小溪且謂之為河復細查雲南通志圖考内刋載開化南二百四十里至交阯賭咒河為界因細問土人過都竜厰一百餘里有一大河今交阯呼為安邊河以道里計之正合二百四十里此方是賭咒河以此分界方計符合等語臣又再四反復細查通志開載開化府南二百四十里至交阯賭咒河則安邊河為賭咒河無疑然一百二十里之境人何以皆知之二百四十里之境人何以皆不知葢縁此一百二十里失去四十餘年年老之人皆能記憶二百四十里之界不知失於明季何時事久年淹故土人無能知之者臣前查時亦止知有一百二十里一層不知有二百四十里一層實是臣疎漏之罪若以舊界應將二百四十里之境徹底取回交阯之都竜南丹二厰皆在此内交阯久倚此二厰以為大利必支吾抗拒且必謂臣等圖其礦利故揑辭陳奏但臣叨任封疆朝廷境土臣以尺寸為重謹詳奏請㫖恭候聖裁謹奏覽奏交阯舊界有逺近互異等情朕思柔逺之道分疆與睦隣論則睦隣為美畏威與懷德較則懷德為上據云都竜南丹等處在明季已為安南所有是侵佔非始於我朝也安南自我朝以來累世恭順深屬可嘉方當奬勵是務寧與爭尺寸之地况係明季久失之區乎其地果有利耶則天朝豈宜與小邦爭利如無利耶則又何必與之争朕居心惟以大公至正為期視中外皆赤子且兩地接壤連境最易生釁尤須善處以綏懷之非徒安彼民正所以安吾民耳即以小溪為界庸何傷貪利倖功之舉皆不可為訓悉朕此意斟酌行之諭雲貴總督高其倬貴州巡撫毛文銓提督趙坤等知悉聞黔省狆苗最為不法前於三四月間輒敢蟻聚搶奪集市定廣協副將領兵驅逐官兵多被損傷至八月間爾撫提㑹調兵丁二千名委員進𠞰於九月行至定番州兵丁强買民物喧閙罷市暮抵谷藺地方夜火不戢又復焚燬熟苗五寨以致民苗合圍射傷官兵夫師出以律乃沿途騷擾平民激變熟苗種種强横漫無法紀竟至如此且前後虧折官兵爾等俱匿不奏聞何也狆苗及紅黑諸苗之巢穴附在各州縣者種𩔖不一出没無常安保其再無搶奪之舉朕意與其有事而加𠞰撫孰若未事而預為計畫黔省文武各員委靡成風非伊朝夕爾等須大為整頓一番身先倡率文自司道以至府州縣衞惟撫恤是務武自鎮協以至㕘遊僃弁惟操練是勤務使民無派累之苦兵無怠玩之習將見各處向化熟苗必皆舉踵企慕擇其頭目中淳良可用者命該管官宣播恩德加以優賚俾各愛養所屬以僃驅策其有干紀犯科者從而重懲以示儆戒不一二年間則内地之兵民莫不感激奮勵巳附之夷人胥皆畏威懷惠彼狆苗及紅黑諸苗多與漢姦聲氣相通自當俛首帖耳望風惕息猶敢縱肆猖獗乎設有怙惡不悛者亦必審查果係族𩔖衆多稔惡渠魁始遣熟苗頭目先行招撫撫之不從然後行知所在將弁塞其奔逸之路一面命熟苗頭目率伊部落前往𠞰捕大兵從而繼之自獲全勝所獲牲畜等物即頒賞熟苗酬其功績將勞效尤著之輩或奏請賜一職銜如是平定一二處則其餘不待招撫而歸誠恐後矣試思安内攘外恩威竝濟使兵民愛戴苗夷效命輸誠非爾等大吏督率屬員盡心籌畫之責而誰責耶至於直省各員俱有火耗羡餘畀之養廉以絶苞苴黔省錢糧額寡耗羡無幾或以養廉不足加派民苗然州縣員缺較他省無多猶易為設法莫若將各項陋規通盤查清即以本省之所出還濟本省之公用似屬允協聞自巡撫提鎮及司道等官各有納糧官莊毎嵗収米千百石至數十石不等府州縣亦間有之此皆國家正賦豈容私行隱佔又聞貴陽鎮逺安順普安四處𣙜稅毎嵗抽収一二萬金而報解正項不過數千思南威寧黔西大定畢節等處俱有過往牛馬銅鹽并落地等稅每嵗可収至八九千金少亦不下二三千金而報解正項不過數百此等府州縣養廉太覺有餘至若都勻思州石阡平越獨山麻哈廣順定番清鎮安平等處養廉又甚屬不足一省之中豐嗇懸殊安可不為調劑且以安順貴陽之美缺而反多虧空蓋緣出息既饒則逢迎路廣需索多端又兼自奉奢靡所以虧空有必然之勢而該上司既受其餽送被所挾制不得不為徇庇地方之弊寧有大於此者嗣後爾督撫應將各處稅課逐一清查毎年盈餘若干量留該管官養廉餘者貯庫并將文武各員所佔官莊交納之米盡數貯倉闔省錢糧耗羡一總提解合此三項通行㑹計自巡撫司道以下及府州縣分别衝僻繁簡酌定養廉之數而派與之如此則溥遍均平缺美者無虧空之虞缺苦者亦不致科累民苗上下俱無染指各員咸得奉公盡職矣再者除養廉外量存數千金貯諸司庫以僃賞犒兵丁苗猓之用亦未始非禆益地方之一助也爾等其周思詳議具摺陳奏務令官民兩頼可以永久行之無弊庶幾地方寧輯民苗樂利以副朕懐逺籌邊之至意特諭雍正三年二月十二日雲貴總督臣高其倬謹奏為欽奉上諭事雍正三年正月二十八日臣奉到硃批奏摺匣内欽奉上諭一道臣跪讀之下仰見我皇上萬方在宥睿鑒無遺於治理黔苗調劑黔省之法悉煩聖慮委曲周詳臣自愧奉職無能慚悚無地隨即敬謄密封交貴州撫臣毛文銓提臣趙坤恭領欽遵外查從前定廣及谷藺將弁約束無法兵丁被傷所有情節臣前巳繕摺遵㫖詳奏臣罪至重悚惕靡寧伏乞皇上嚴賜治罪臣心始安再臣恭讀聖諭令臣等躬為倡率振作文武各員委靡之習使民無派累之苦兵無怠玩之弊擇向化熟苗之淳良者加以恩義復查生苗中果係族𩔖衆多稔惡渠魁酌行撫𠞰平定一二處其餘自必歸誠恐後聖諭所示皆治苗之要法至明至當嗣後臣務奮勉振作與撫提二臣悉心盡力一一欽遵以期成效至各官官莊米穀稅羡及通省錢糧之耗羡將三項一併清查通行㑹計酌定養廉各員皆得盡心於吏治不致加派民苗此外量存數千金以僃賞勸兵丁苗猓之用一節臣謹㑹行徹底清查詳細料理方敢僃悉具摺奏聞請㫖為此謹奏總之凡事不可稍存瞻徇顧忌必纎毫無隱為要能若此則内外合為一體上下共作一心何愁吏治民生之不能盡美盡善也勉之勉之同日又奏為欽遵聖訓恭謝天恩并陳下悃事雍正三年正月二十八日臣奉到硃筆密諭一道䝉皇上諭知年羮堯奏臣不稱雲貴總督之職并䝉聖心俯慮恐臣為其所愚陷於不是如有自應料理之事指示臣以各自辦理惟求諸巳欽此欽遵臣跪讀再四不禁涕淚如雨感激振興雖粉骨碎身何能仰答高厚於萬一除臣庸下之見另摺密奏外臣謹刻骨鏤心仰記今書此諭與爾朕亦愧之等諭臣心動淚下此我皇上聖不自聖處乃正歴代帝王所不能及處臣仰瞻我皇上御極以來所以待臣下者皆一片至誠臣下稍有寸善即褒賞之惟恐有不及臣下如有過失即教戒之惟恐其不改即如皇上前後賜臣之臣子仰愧皇上耳至臣之與年羮堯臣本非後進受其栽培提挈之恩又臣生平器小硜硜守分不肯為夤緣趨附交情亦淡後欽奉聖祖仁皇帝特㫖令旗下翰林俱在國史館幫修功臣列傳從此在一館行走日日相見臣謂年羮堯才長可以勝繁劇之任年羮堯亦知臣拘謹不敢為敗檢之事以此相知實非因親戚綢繆自年羮堯為四川巡撫之後十七年不相見或半年一年亦有間二三年者有書札問候然昔謂臣不稱雲貴總督之職臣毫無所辨臣實是一受恩深重跡涉憚勞不敢遽奏欲俟得覲天顔之日面跪陳請是臣不稱職任之處臣亦自知自懼年羮堯知臣甚確至謂雲南刑名錢穀鹽政銅政均屬不可問不過因路逺䝉蔽之語臣不能無辨臣在總督任内除毎年存留銀二萬六千兩以為賞賚養廉之用此外實無所染指雲貴萬耳萬目共見共聞何能掩飾若謂臣於此中有曖昧臣實一無所取可以上對君父質諸天地鬼神若謂容他人作弊臣自不為而為他人臣雖至愚亦不至此以此誣臣臣實不甘伏乞皇上命員徹底清查則臣誣得白名節亦全矣抑臣更有冐瀆天聽者臣弟高其傃由武進士䝉聖恩賞授侍衞臣正謂從此或可學習成人今忽得家聖主格外之恩賞賜調回仍在侍衞上行走則臣與臣弟均沐皇仁於無暨矣所有臣欽遵聖訓恭謝天恩及詳陳下悃之處臣謹繕摺奏聞伏乞睿鑒謹奏恐卿不喻朕之意向故日前明白䧏諭今覽此奏知已洞徹無遺矣且語語深愜朕心可嘉之至夫復何諭各種情節俱明高其傃候遇便調回同日又奏為密奏事竊臣奉到密諭一道所有微臣欽遵等情巳另摺奏聞臣更有密奏者年羮堯近來舉動聖鑒巳洞悉無遺我皇上天地為心思所以保全之者已無微不至然賞罰乃皇上治天下之公柄亦恐不能獨為寛假臣觀古來人臣稍有功績而驕滿者處以閒地與假以事權其事遂逈然不同年羮堯既不知自處惟皇上有以處之臣以為宜早宜預伏惟我皇上天縱聖神知明處當臣庸下之識所知淺小何敢妄言但事關重大犬馬寸心不能自已不敢畏禍皇上之誅戮暗難免鬼神之殄罰臣臨奏不勝悚慄之至謹奏𩔖斯奏者甚多朕尚惜其才而用其力自另有保全之道觀伊近日似亦頗知愧悔矣同日又奏為奏聞事竊查雲南阿迷州原有土知州一官係李阿側之祖李寧和相沿傳至李阿側李阿側之子李思敬助逆經吴三桂偽授制勝將軍迨後恢復雲南李思敬不出而令伊子李廷樞投誠仍授為土知州後廷樞病故將冒宗之李廷正妄請承襲經本州民夷控告隨具題革襲改土歸流在案其後知州王來賓揑詳各寨皆係夷民錢糧難催彼時李廷樞之父李思敬尚在復詳准委為土催名為代催銀米其實賣與人民正額銀米一倍硬収三倍此外隨時隨事之苛派不一而足縱用頭人虐害夷戸李思敬身故又委廷正廷正身故又委伊子李慧李慧身故又委伊子李興唐興唐身故又委伊叔李純自李純替管以來苛虐更甚派累愈多抗欠正課任催不應反累知州賠墊臣察知此弊又據民夷疊控將李純批革令通判耿覲謨查編里甲而李純暗脅夷人不許完課交官伊盡暗収又加雜派屢次抗欠各項銀共二千七百餘兩數次提拘負固不出是旁甸鄉之一百九十八寨係早經歸流之土竟為李純抗占李純一日不拏錢糧一日不完民害一日不去臣酌拘拏之法臨往貴州交布政使李衞總兵楊天縱辦理今巳將李純拏獲并於伊家内搜獲鎗礮甲械火藥等物臣將李純𤼵司審追該州夷民無不歡欣現在輸納恐後再臣查李姓一門李思敬曾領兵助逆而廷正亦曾教伊子李慧抗敵官兵手字現存多藏兵器世濟其惡一方夷人畏之如虎李純之子姪最親者不過二三人若設法量給房田在伊等既無失所地方亦可永逺寧帖矣再拘拏李純時阿迷州知州元展成辦理有方極盡心力臣不敢隱沒謹一并奏聞謹奏元展成若果係可用之材遇緊要缺出援㫖題請當越次超擢以示鼔勵雍正三年三月二十八日雲貴總督臣高其倬謹奏為代繳硃批奏摺并謝天恩事竊臣准雲南巡撫臣楊名時咨稱有奉到皇上硃批奏摺例應具摺恭繳又荷聖恩賜御書福字一幅例應具摺恭謝天恩名時不能敬謹奉摺自慚無地䝉皇上不加嚴譴賜停奏摺悚惕靡寧所有奉到硃批奏摺一封隨繳摺恭請聖安摺一扣并感戴恭謝天恩微忱望為代繳等因咨送到臣臣謹具摺奏繳伏乞睿鑒謹奏據楊名時日前之奏疏觀之但知有身而不知有君之人也雍正三年四月初二日雲貴總督臣高其倬謹奏為奏聞豆麥収成分數事竊照雲南省現今各處蠶豆俱巳収割有九分十分収成不等麥子目下有割動二三分處有尚未割動處約計可有八分七分収成臣所開陸涼州督標馬厰之田麥子亦皆成熟尚未割動約計九停分一可得麥二千石有零俟収畢時臣料理運到省城臣現在葢建兵丁義倉収貯於内以僃接濟兵食現在雲南稻秧巳出水數寸到四月二十内外即可分插彼時須得大雨則栽蒔不誤且更廣遍貴州省不種蠶豆種麥者亦聞謹奏覽豆麥収成分數朕懷深慰京畿左近春田甚好諭卿知之同日又奏為奏聞請㫖事竊照貴州原都勻營守僃今調定廣協守僃趙文英臣到任之始即聞此人熟暗苗情實心料理營伍以後留心細察伊前後拏獲川販拐犯比他處獨多一切地方苗情管束化誨事皆得宜故臣前因定廣正在苗情緊要之時請以調補定廣協守僃巳䝉聖恩允准在案此次𠞰捕阿近令帶都勻之兵堵禦山深箐大伊不但防範嚴密即趁此便將在逃難拏之羅三龍拏獲臣等遣伊之時竝未諭及此處伊竟能相機辦理洵係實心任事之人若不特加奬拔無以鼔武員奮勉之心查現在有臣劾㕘銅仁協左營遊擊一缺逼近紅苗若以守僃趙文英題補洵屬人地相宜但貴州無題補之例臣未敢冒昧具題謹繕摺奏聞請㫖謹奏已照所請諭部將趙文英補授銅仁協遊擊矣似此應行之事但據實具奏以聞果與地方有益絲毫不必遲疑朕實信爾無他也同日又奏為奏聞事竊照貴州定廣一帶仲苗最為頑惡在定番者阿近為首在廣順者阿棍為最阿近巳經捕𠞰阿棍被仇家藥弩射死故臣於調劑黔省事宜調裁大定鎮兵安設於廣順州之長寨者貢一帶以資控壓業經具題在案兹雍正三年正月内據安順府報稱於雍正二年十二月内有仲苗焚刦普定縣唐三寨居住之生員胡種玉等家燒死男婦四命刦去耕牛四隻等情查係長寨者貢等處之苗恐是阿棍餘黨撫臣毛文銓一面咨㑹臣衙門一面㑹同提臣趙坤飛檄安順府知府何經文㑹同提標守僃鄔元度帶領兵役前往擒拏隨據報拏獲兇賊季麻阿任阿賣三犯供出同夥計盧阿濃四金阿存阿毋共八人阿毋於上盗時中箭回家身故又續拏獲四金一名餘計盧等三名濳遁他所俟加緊躧緝兵役俱巳撤回謹將情節奏聞臣據此地苗情就臣愚昧之見以為查拏刦掠兇苗務期必得甚為要務然平時整頓於前更為緊要臣查長寨者貢一帶仲苗最多且頑又連十三枝及五枝等苗無兵不能彈壓然不得人亦難料理目下皇上特放之安順知府何經文實有才守調補之定廣協副將劉業浚亦是賢員如移兵之處倘䝉允准臣務同撫提二臣及知府副將竭力趁此將此一帶徹底料理一番以期安靜不敢以目前拏賊了局遂謂地方安靜也再黎平府境接古州八萬臣前巳將大槩情節具奏容臣確行密查兹據黎平府知府趙坦報稱土司林天錦楊秀等招出生苗千餘人投出臣以古州八萬地大人多必透徹知其情形又全局算定然後料理使一了百了方可舉行若圖小利必啓爭奪抗拒之端且林天錦楊秀目下望得土官恐借此打動上司止圖一時僥倖不顧日後利害更恐勢與苗疆不宜臣離黎平窵逺容查確另行㑹奏外謹先繕摺奏聞謹奏毛文銓心行似少誠實調伊來京面加審視石禮哈雖係少年朕謂大有可觀爾意以為何如同日又奏為奏聞事竊臣前奏節省鉛價并調劑錢法一摺欽奉硃批流通制錢之議甚是仍聽該部議覆遵行欽此除運消楚省之處臣謹候部議議定遵㫖奉行外其本省逺處各府州縣臣又與雲南撫臣楊名時布政司李衞熟商此錢若將局錢𤼵消勢必要動他項錢糧銀兩添補脚價現在民間錢價日賤不若發銀買市上之錢運往即以多餘之錢為脚價既可不費錢糧而省城市錢漸少則其價自增一舉兩便隨交布政使李衞辦理省城錢價因之少平今各處逺府州縣又將充遍省城之錢仍又壅積惟俟運售楚省之部議議定運轉流通庶可無積滯價賤之虞至滇黔接壤臣前摺乃請將錢運消隔境之湖廣不請運消就近之貴州者因貴州向來從不曾行錢恐於兵丁民苗或有不便不敢輕議上年臣往貴州經過安順府提臣趙坤及貴西道吴應龍安順府知府何經文同言宜將滇錢運至貴州以便兵民臣以恐有未便為言提臣等云貴州軍民人等皆以無錢行使為不便毎買日用之物值銀多者猶可若買值二三釐及四五釐之物分兩甚少須用戥秤戥若少昻此數釐之銀尚不敷秤折之數以致日有紛競若有錢行使兵民俱便目今皆甚盼望等語臣又到貴陽訪之兵民其言亦同隨與撫臣毛文銓布政使劉師恕細酌且暫先運錢五千串到黔試行果便再行詳籌不便即可停止今已運送到三千串試行兵民大以為便似可通行從古不曾行錢之區雍正小臣亦酌量可行不敢令壅積又雲省霑益一局全賴烏龍一厰之銅供鑄近忽衰竭查得有貴州之忙步溝產有銅礦相離頗近向有黔棍偷開屢經驅禁臣以厰銅有關鑄局帑項不敢避染指之嫌付之縮手封閉圖作自了之人除巳具題請旨外臣謹繕摺奏聞謹奏覽奏貴州產有銅礦知道了具題到日候𤼵該部議覆有㫖工部侍郎臣金世揚謹奏為撫臣侵冒軍需挾仇誤公據實陳明仰祈睿鑒事竊臣一介庸愚至微極陋蒙聖祖仁皇帝豢養深仁由同知拔至巡撫復蒙聖主洪恩陞授工部侍郎自知供職無狀百身莫贖更荷聖德汪洋曲賜矜全據貴州撫臣毛文銓具奏臣使用司庫銀兩甚多欽奉恩㫖惟令作速完補不即黜革審究種種高厚雖粉身碎骨亦不能仰酬萬一曷敢推諉自干嚴譴惟是撫臣毛文銓與臣原有爪葛於康熙五十九年扺雲南布政使仕接辦軍需其豆草均係臣預行辦集豆每石價銀自七錢以至一兩草毎束價銀自七釐以至一分運脚在内即滿兵折色豆毎石領銀九錢草毎束領銀七釐此江浙之官兵以及承辦之委官皆鑿鑿可問者乃其造報奏銷時將豆毎石開報價銀二三兩草毎束開報價銀三四分侵冐帑銀五六十萬臣在黔時有伊家人來署原以正言規戒毛文銓以此記恨無刻不思雪忿今於雍正二年五月内接任貴州惟恐臣於陛見之時將侵冒情由奏出遂爾先𤼵制人以臣虧空庫銀甚多請將水銀著落微臣𤼵賣具奏臣思収買水銀原以彌補軍需司道公議督撫公批委官經収積貯藩庫兩經題奏非臣一人之臆見至於那動庫銀亦惟為辦理科場津貼塘報以及修理城池橋道犒兵諸項不得已之公用且經手俱係藩司歴任撫臣皆捐自已俸工非臣創始即經批准以俸工流抵原只遵循舊例以公完公即毛文銓現任貴州亦不能將公事廢弛而别有良䇿更可異者毛文銓奏臣使用庫銀若果為慎重錢糧起見則應將水銀流通速歸庫帑何至杜絶商民不容運販自摺奏以來至今一石未售臣訪查今年漢口廣東水銀價值頗昻商民惟利是圖源源而至毛文銓以已經奏交與臣阻抑不容將來遲延即可補㕘置臣於死地為雲南滅口計則其侵冐軍需不致𤼵覺臣查水銀惟産於貴州售賣必藉之他省臣雖帶有家人十數名錢糧所係不敢輕任分運而一人之身勢又不能兼顧仰懇聖慈賞將存庫水銀准帶黔員二名分運漢口廣東發賣所獲價值即存該省司庫以充協餉免其運送價有盈餘悉以歸公如有不足著落賠補庶水銀不致壅積庫項得以早歸感沐皇仁於萬萬世矣至於毛文銓侵盜帑銀挾仇誤公之處伏乞聖主敕𤼵廉明大人嚴查究追實則按毛文銓以侵欺之罪虛則律臣以反坐之條謹此繕摺奏聞統祈皇上睿鑒施行謹奏金世揚所具陳明一奏除將原摺嚴批擲還外特命鈔發爾看其事果否真偽僃細查明據實密奏以聞同日又奏為遵㫖奏聞竊臣䝉皇上𤼵到原任工部左侍郎金世揚奏㕘貴州巡撫毛文銓一摺奉有硃批臣遵查金世揚奏稱辦理軍需料草毎豆一石價銀七錢至一兩不等每草一束價銀七釐至一分不等脚價在内折色豆毎石九錢草毎束七釐毛文銓每豆一石開銷二三兩毎草一束開銷三四分共冐銷銀五六十萬兩等語臣細查前督撫送部底册每豆一石連脚價報銷一兩一二三四五六七八錢不等毎草一束連脚價報銷一分八釐册現存戸部可查無每豆一石開銷二三兩草一束開銷三四分之事再查册造此次通共奏銷銀三十九萬五千餘兩内除去官兵俸餉銀三萬八千四百餘兩豆草項下共止銀三十五萬餘兩册亦現存戸部無冒銷五六十萬兩之事惟查當日官兵間有願折者亦行折給草毎束多開銀三釐至豆毎石多開銀二三四五錢不等當時大兵到滇雲南茫無預僃又值旱年金世揚以應需糧餉料草約嵗需銀三十餘萬兩而近邊地方豆草難得購運脚費浩繁目下暫動庫銀採買僃支前撫臣甘國璧據詳具題隨經毛文銓接催接辦彼時種種多費及虧耗者皆以此彌補即臣等續行奏銷之豆草價二十六萬兩亦有移補前欠項者不敢粉飾又在當時領銀銷銀亦俱稍有部規亦出於此此係實情臣謹繕摺奏聞謹奏所奏甚公知道了硃批諭㫖巻一百七十六之三欽定四庫全書硃批諭旨卷一百七十六之四硃批髙其倬奏摺雍正三年五月初六日雲貴總督臣髙其倬謹奏為奏聞事雍正三年五月初一日臣承准到撫逺大將軍年羮堯令諭内開為軍務事照得策妄既經歸順西海亦巳蕩平則西藏路逺不便久駐大兵而义木多地方不可無兵彈壓應將松潘鎮帶領駐藏之兵盡行撤回而留雲南之兵一千名暫駐义木多或選總兵或選副將管領此兵竝於中甸駐兵數百以為聲援其四川兵馬現在西藏與各處防汛者共二千八百餘名應令松潘鎮於撤兵之日在此内留三百名駐防乍了留三百名駐防巴塘各令遊擊一員管理雲南提督帶兵五百名松潘鎮帶兵五百名由义木多至裏塘一路㑹同踏勘地界近川者歸川近滇者歸滇事畢之日雲南提督即由裏塘帶兵回滇松潘鎮則帶此五百名兵暫駐裏塘彈壓兩省兵糧照舊令兩省委員分運其餘兵馬不在派留之數者先行撤回原汛巳經奏眀奉有俞旨除行松潘鎮雲南提督雲南廵撫四川廵撫外擬合就行為此仰該督查照將官兵所需糧餉仍委員運供勿致遲誤施行等因到臣臣隨飛行知照除一切迎勞賞給馬匹船隻以及糧餉臣俱料理無誤陸續具疏另奏外惟留雲南之兵駐劄义木多之處臣查义木多離四川近離雲南逺雖中甸現駐雲省之兵五百名然相離仍逺前臣準年羮堯咨將义木多地方巳歸四川彼地喇嘛番人亦以為伊等係四川所管雲南官兵凡購買炒麪柴草皆呼應不靈臣愚以為义木多既巳歸川似不應留駐雲南之兵且供運買購恐較川省所費亦多但查撤兵來文一靣行臣衙門巳一面行知軍前各處今若咨行往復商籌必致不及义木多地方目下不容空虚臣隨飛檄現駐天柱寨鶴麗鎮總兵張耀祖帶兵一百名前往义木多再將現在义木多之兵留九百名共合一千名一總管領暫駐彈壓并咨呈大將軍年羮堯义木多既歸川省踏勘後應撥川省官兵管轄駐劄外臣謹將詳細情節繕摺奏聞再中甸地方現有副將李宗膺帶兵五百名駐防應仍留暫駐俟踏勘定後量歸滇地之廣狹臣再將酌安將弁兵丁之處具疏仰請睿裁再义木多既有雲南之總兵帶兵駐劄其一路安臺遞送公文之兵亦應暫留合并聲明謹奏發議政王大臣㑹議具奏矣同日又奏為奏聞功加外委兵丁情節仰懇皇仁事竊查雲南前次進征西藏外委兵丁稍有微勞者仰荷皇上恩加格外敕部議敘皆得從優給與副將等銜劄付嗣經部劄發到給領之時臣以為此等兵丁既加副將等銜或應赴部酌行推選當經臣以應否開除名糧咨部候選之處咨請部示隨准部咨不便在營食糧令其開除業巳遵照在案今候數月兵部將應否送部候選之處未另行知照而前咨内亦止令開除名糧無應否送部候選之語臣思此項兵丁係效有微勞者乃未奉部示既未能赴部稍邀寸進而開除名糧又難與在營兵丁一體拔補且此内貧乏資藉名糧養贍者頗衆臣謹將情節奏聞仰懇聖恩准將功加各兵仍留本營食糧俟千把缺出與漢仗好弓馬熟嫺之目兵選擇間補庶各兵仰沐皇仁將來獲上進之階目前得養贍之地矣為此繕摺請旨謹奏發交兵部議覆有旨同日又奏為欽奉聖諭事竊臣奏交阯疆界一摺奉有硃批臣跪讀再四仰見我皇上仁育中外之民明燭萬里之外如天地廣大日月照臨所以訓諭臣者精晰周詳臣欽遵聖諭詳酌事理自鉛厰山下小溪以内土田有糧額可憑疆界有塘基可據失去僅四十餘年彼處之人知之者多應以小溪為界臣仍移咨安南國王亦委員㑹同査清之後明白立界臣務仰體皇上至公至正中外一視之聖心安静辦理斷不敢存貪利倖功之念所有臣奉到聖諭欽遵情節理合繕摺奏聞謹奏復經有旨由部頒發矣即此四十里立界之說亦須查確議眀斟酌行之同日又奏為奏聞雨水栽插情形事竊查滇省自四月以來臨安元江永昌三府地方俱早得大雨髙下稻田栽插巳遍雲南等府亦於四月内連得小雨低田栽插十分之八雷鳴田未栽於五月初四夜大雨自三更初至天明各處之低田盡插髙田栽插三四分至五六分不等其餘髙田水尚不足在夏至後十日以内得水栽插俱不為遲若再往後栽插者則收成止可五六分目下日日俱有小雨但未得大雨貴州雨水甚足正在栽插將完臣謹將雨水栽插情形繕摺奏聞謹奏雨水栽插情形知道了爾等滇黔吏治如此自䝉上天賜以嘉徵也同日又奏為奏聞事竊照廣西捐穀一案欽奉聖旨令臣等將原任南寧府知府沈元佐收捐之處查審務得實情臣委布按二司將沈元佐之子及家人王四等反覆詳細查審今追查出原存葢南寧府印細冊一本開載甚詳除將原冊存司現照謄一本用印鈐葢遵旨咨送廣西巡撫李紱查理外謹照註開原式另謄一摺進呈御覽為此謹奏查審情節知道了摺留覽諭雲貴總督髙其倬知悉前奏安南疆界一事朕批諭後隨據該國王亦行奏到因命内閣鈔發示爾當細加籌酌毋乖朕懷逺之心毋長彼逞恣之漸施恩須令知感出言務俾誠服馮允中漢仗雖好不諳事體既有不睦形迹殊與邊境無益巳調南天祥替之矣其轉諭天祥領㑹朕意開化文職尤須安静曉事之員方與其地相宜現任者若不稱厥職酌量奏請更易夫分界之舉即理應展拓亦必與彼國公同議明奏聞於朕得㫖後奉行方是乃馮允中擅自立碑定界占寨毁舍隨復建造營房甚屬孟浪前此諭爾有準四十里為界之㫖亦不可膠執致生事端總期相機合宜料理允妥至於此事之前後原委所以然之故爾一一明白宻奏朕知為此特諭雍正三年五月二十六日雲貴總督臣髙其倬謹奏為遵旨宻奏交界情節仰祈睿鑒事雍正三年五月十二日臣准兵部咨發到宻交臣諭㫖一匣安南國王敕㫖一道又内閣宻封公文一角臣謹望闕叩頭祗領隨將諭安南國王敕㫖一道遵即遣差齎捧送安南國王祗領外又内閣鈔發安南國王原疏一摺臣亦收到訖臣敬啓黄匣内欽奉到皇上宻諭一道跪讀之下仰見我皇上懷保萬邦一視中外之至意臣謹就愚昧所見此交界一事有不必與安南再議即應畀與者有尚須與安南查議明白再奏請定奪者如鉛厰山小河以外之境雖係内地失於明朝此應與安南上以示皇上懷逺之仁下亦息疆界紛競之擾如鉛厰山小河以内之境此失去僅四十年有餘皆有確據臣辱䝉聖恩叨任封疆格外之恩在安南國王或可叨承在臣分則不敢言臣細揆之事勢此地之係内地必須使安南曉然明白明白之後如䝉聖鑒畀還雲南則安南知係内境自安一定之分即萬一皇上施天地之恩則安南愈知感格外之仁然欲明白非㑹安南委官查議不可臣前曽移咨未見彼國委到㑹查之官忽陪臣帶兵數千隔水扎營訪聞得安南有鄭姓陪臣事多專擅稍昧大體即如在廣西則越争土司之田在雲南則先帶多兵到境亦其明驗恐長其逞恣之漸將來疆境難處亦不得不慮臣謹不避瑣屑詳細奏聞查開化與安南之界一總共有三層其最近内之一層離開化府一百二十里以馬伯汛為界乃久定之内地歴來安塘設汛此界無庸置議其最近外之一層自鉛厰山小河以外至安邊河即大賭咒河安南之南丹都竜二厰皆包在内此即通誌圖考所載自開化府南二百四十里至賭咒河與交阯為界之舊境經總兵馮允中查勘臣前摺所奏失自明朝者即係此境交人在都竜東靣設守以為界限臣前但將原係内地情由摺奏竝未有一兵前往并未遣一人過界今經二次欽奉諭旨念安南國王累世恭順此境失在明朝令臣不必與爭聖鑒至明臣巳欽遵宣揚皇上天地之恩咨明知㑹安南國王此界亦無庸置議惟有在馬伯汛以外鉛厰山小河以内之一層共四十里内有開化府逢春里之各寨現今臣之所查奏及安南國王所疏請者皆係此地臣細揆安南國王堅稱是伊舊境有糧冊足據者亦有情故臣前巳歴查今更得其的確緣當日開化鎮總兵髙必勝在任之時開化有一八撤一汛下有一河口通海廣東洋船可到髙必勝私開謀利彼時廣商到者頗多遂有往都竜販貨者走至雙眼井地方被刼殺死三人髙必勝畏事隨暗將塘汛撤進四十里另在馬伯汛立界牌謂此外與開化無涉逢春里之各寨亦隔在外此棄界之由也然雖棄出交人亦未敢攘為巳有後於康熙二十一年彼國有小􅟱王偽寛之亂搶掠逢春里各寨人民開化總兵不救都竜土目援之故各寨遂認彼糧此各寨與安南納糧之由也然安南雖收各寨之糧究只在都竜立界此地竝未設守中外皆置之不内不外若有若無之間臣向未知此界藩司李衛管理銅務有土人呈開銅礦銅礦無驗遣員查出此境詳報前來臣遣員再查查出雙眼井地方有芹菜塘之舊址又有逢春里之馬都戛等六寨原納開化府秋糧共正米十二石有零年年總催賠納臣因移咨安南國王俾其查覆後准柬復稱此地係伊舊境若係内地何失去四十餘年黙無一言大意如此詞語之間稍不循理臣不與較惟恐小員所查或難憑信因再委開化總兵馮允中親身踏查明白再行辦理一面亦咨安南國王委員㑹查此咨尚未逹臣適往貴州中途接馮允中報稱有交官鄭鏡忽帶兵二千餘人前來又有二千餘人在後竟在對河扎營雖安南素稱恭順但既有兵來恐䦨入内地不得不防隨遣員帶兵三百名前往馬都戛總路巡防駐劄因彼地多雨兵丁量搭木棚存身本職亦即帶二百人親往查勘地界因以彈壓等語臣隨一面奏聞一面移咨安南國王俾戒諭陪臣速撤兵衆毋令失恭順之體并速遣官㑹查如果係安南之地憑據確鑿雲南必無占奪之事即確係内地或安南有必須此境不得巳之情皇上父母萬邦仁同天地或王自行陳請或柬知代為具奏亦無不可移咨之後交兵亦撤惟在都竜樹城蓋營留兵千人在彼續准到安南國王柬稱伊自具奏等語今伊疏内亦仍以糧冊為言即前認糧之故至占寨毁舍之言馮允中竝無其事或安南土目所報一面之辭至立牌定界之言馮允中原令人竪一木樁使人隔水指著喊諭交兵不許亂走過來此係止兵不係定界因交兵千人尚未退去所以前派於馬都戛巡防之兵三百名亦尚未撤嗣臣據馮允中查稱自鉛厰山小河以内為内地無疑本職查雲南通誌圖考開載自開化府南二百四十里至賭咒河為界則自鉛厰山小河以外至交阯今名安邊河即舊賭咒河此仍是内地但鉛厰山以内言之或易鉛厰山以外要之則難詳臣批定界址臣以事應清查難竟批定隨經繕摺請旨此事之始末情節也今臣欽奉到宻諭遵即飛飭將馬都戛即安南名為斜路村所有三百名兵丁撤回此境定須㑹同查議臣隨委廣南府知府潘允敏止令帶一百人前往㑹同查議并移咨安南約其遣官亦止帶百人前來各將憑據㑹同虛公查考議清疆界永杜爭端知府潘允敏暨新總兵南天祥臣俱面與詳言從公從直不許絲毫瞻徇游移如㑹查果係外地臣決不敢規避錯誤之罪必據實奏明請將此境畀與安南仍以馬伯汛為界如確係内地諒安南必仍執前説未必改移然理不可奪臣即一面與之言明使彼中心内折一面奏請皇上定奪臣遵境乃其職守馮允中係臣委遣一切俱曽詳稟臣皇上敕部嚴加治罪至現在開化府知府吳文炎人亦謹飭才力稍弱容臣酌量調補另行繕疏請㫖臣謹將情節詳細繕摺奏聞謹奏覽奏前後情節俱悉不諉過於人雖云得體而起事原由其中不無隠飾姑且如是料理李衛具摺僃將此事奏聞今發來爾看所見褊狹涉於尚氣甚不合宜爾須評情度理而斟酌之至於馮允中一則為於斯事形迹有礙二則伊初由年羮堯提拔上進視之不啻奴隸調伊來京敎訓一番俾詳知朕恩另行委用不加之以罪也李衛一切過於從事處另有諭問據實奏覆同日又奏為彚報鹽政額外贏餘事竊據雲南布政使仍辦理驛鹽道事務李衛彚報臣覆查得雲省鹽政於遵旨覆奏鹽務利弊等事案内經臣㑹同查明將舊額新増并秤頭陋規各項分晰具奏造報部科奉旨著照該督撫等所請行欽遵在案其雍正元年正項有款之贏餘巳經奏銷今雍正二年循照元年之原額贏餘銀六萬五千七百餘兩仍如數報部搭同正課并新開鹽井奏銷外又有自元年五月二十四日鹽道李衛到任以六月為始至二年年終止仍有聚零合總碎雜無定款之項陸續收獲者查算共銀五萬五千三百一十五兩零除巳因公動用銀并暫留存僃未完公事外實多銀五萬兩整其贏餘款目摺内難以僃載即如白井額外沙滷較從前數倍雖夏秋山水驟發竟未淹沒是以能照常取滷煎鹽查當年迤西地方官鹽尚且難銷今因稍加調劑分撥均平竟連額外沙滷銷售過倍但銷售固係人力而泉滷濃多水發不淹似黙有效靈非人力能為者若即定為常規歸於正項贏餘之内不但將來恐難敷額且恐日後致貽官民井竈之累惟有儘則邊省藩庫始終無因公動用虛懸之項於錢糧不為無補抑或充作兵餉伏乞睿鑒施行又新開按板抱毋等井歲内原題巳獲課息五千兩有餘因此井離省遙逺九月内具報到省及㑹詳請題出本在十月二十六日今又查自九月至年終冬間滷濃瘴息又辦獲多出課銀九千兩零自今年衛繕摺奏聞謹奏覽同日又奏為奏聞雨水遍足事竊臣前經具摺將雲南得雨微小低田皆巳插秧髙田尚未遍插情形奏明今於五月十一十二連夜得雨又於十三十四兩日得兩日夜透雨一切髙坡之田無不霑足在在栽插可望大有此皆仰賴我皇上宵旰勤民至誠感召之所致也理合繕摺奏聞謹奏實賴卿等大臣平允刑政和輯兵民有以感召天和也雍正三年五月二十八日雲貴總督臣髙其倬謹奏為奏聞事竊照雲南自五月十二日以後連得大雨通省霑足髙下稻田無不遍插可望豐年惟曲靖府屬南寧縣之北霑益州之南中間有數十村地勢低下兹據該府報稱自五月十六日至十九日大雨不止上流山水驟發將角家哨塘邊髙橋及舊街子之太平橋望海寺之新橋俱各衝倒低處田畝房屋淹沒倒壞頗多等情又據署霑益州報稱五月十八日山水暴漲衝壞道路橋梁二處倒塌歪側房屋共七百九十五間淹沒低田二千一百五十九畝百姓人口竝無損傷至二十一日水勢漸退等情具報到臣臣即㑹同撫臣檄行布政司飛委馬龍州知州就近前往查勘并捐銀一千二百兩先行帶往散給被水人口乏食者即暫動積穀救賑無力修整之圩埂酌為估值修補毋致小民失所除被水人户及恤給確數并田地成災分數俟詳查另行核確再奏外臣謹先行繕摺奏聞謹奏今嵗荷蒙上蒼慈恩各省收成俱好惟覺雨水稍過如山西山東江西直隸等省𩔖斯山水驟發情形在在皆有所奏知道了但據實直陳萬不可隠諱粉飾之舉朕所深惡同日又奏為仰懇天恩請留陞員事竊雲南寧州知州梁衍祚業經陞授陜西靖逺衛同知接准部咨知照在案臣查梁衍祚為人謹飭辦事勤緊在滇最久屢次出口辦理軍需本省猓人及口外番人情形均能熟悉邊省地方頗難得曉諳夷情之員合無仰懇聖恩將梁衍祚賞留滇省暫供委遣辦理之用俟有同知缺出題補則邊省獲熟諳之員臣亦收指臂之效矣因陞員無題留之例臣謹繕摺請旨謹奏巳諭該部照所請行矣同日又奏為宻陳愚昧所見仰祈睿覽事竊臣近聞䇿妄阿喇蒲坦萬里奉表稽首歸誠欽惟我皇上聖德天威無逺不屆故頑梗姦宄革面改心從此甲兵載戢敎化風翔中外赤子歌咏太平臣不勝欣喜至斟酌防駐之兵籌度經久之計正在此時臣愚昧之見兵所不知不敢妄言至阿爾泰一路臣曽運米二次謹就臣道路經由所見者自殺虎口出口穿走土黙特部落地方逕過約有四百餘里又穿走吳喇特及明安部落地方逕過約有二百餘里又穿走喀爾喀部落地方逕過約有二千數百餘里又穿走降來厄魯特部落地方逕過約有三百餘里在推河一帶此地原係喀爾喀者其厄魯特係安插於彼又穿走喀爾喀部落地方逕過約有四五百里此外儘邊之處則係大兵駐劄此兵包護於外甚有關係若無此兵包護則喀爾喀素畏厄魯特既恐力不能抗即降來之厄魯特且恐心難全信臣看此兵在彼則内藩部落安穩外衛藩籬堅固此時彼處兵數多寡臣實不知第就形勢而言臣以為或宜酌減不宜全撤但此兵若駐則為時經久臣見彼時給兵之米食用雖能僅敷然人稍多微増則逺戍之士愈感皇仁倍加踴躍又彼時折給買羊之價亦微似不敷臣既有所見不敢隐諱又彼地所種之麥亦給與兵彼處松木頗有流水湍激安造亦易為力又彼地一切牛羊等物皆取資於喀爾喀部落管兵之官必留心綏輯使主客相安始是經久之計我皇上聖神文武萬里之外睿照靡遺經理悉當况此時一切調辦臣實又未聞知何敢以愚昧之言上凟天聽但兹當撤留之時事有關係臣受恩深重稍有寸知犬馬之心不能自巳謹冒昧繕摺奏聞越職妄陳臣臨摺不勝戰慄之至謹奏覽奏足見忠君愛國之誠朕實嘉之為此一事與在廷諸臣幾經籌畫盡數撤囬即同爾論斷乎不可假若長逺駐防滿兵孤懸數千里外歲月積久習成䝉古風俗亦屬無益况塞外苦寒兵情不無畏怯再四計議究不出聖祖從前方畧輪流換班以均勞逸今議定將土黙特兵移駐二千於彼令其携帶眷屬仍照蒙古習俗隨地住牧復派遣八旗滿漢兵三千名四年一更統聽將軍管轄駐劄於現修城處自京赴彼之官兵朕重加賞賚令各敷用悉皆踴躍歡呼已於四月内起行矣北路辦理大率如此䇿妄阿喇蒲坦狡詐性成何可憑信防禦之道朕豈肯稍忽至於西路約於布隆吉地方駐兵五千新設兩鎮沿邊布置以為接應兵數尚未確定哈宻駐兵數百與否亦在未定土魯番則賜還與伊巴里坤士卒逐漸撤退大抵策妄之事可以善結而僃禦之謀不容一時疎懈也朕斷不萌好大喜功之念總仰恃上蒼鑒祐并聖祖在天之靈黙示神機以為進止且此等大事亦惟克盡人事以俟之耳曷敢預執成見雍正三年六月二十八日雲貴總督臣髙其倬謹奏為奏懇聖恩請留賢員事竊查貴州安順一府仲苗最多知府一官實為緊要即才具操守頗好而苗情未熟於地方尚不能切實有益現任知府何經文係蒙聖恩特擢之員才守俱好熟諳苗情一切辦理皆合事勢臣等於其知縣任内大計列為附薦近荷皇上特恩准為卓異現在領咨引見査卓異之員例皆遷轉臣從地方得人起見仰懇聖恩將何經文仍賜留安順倘應遷轉乞與以加銜庶苗疆得一熟諳之員地方受益為此繕摺奏聞謹奏覽奏知道了何經文自必仍留原任同日又奏為奏聞事竊查貴州都勻府所屬地方有李美李秀兄弟二人積年勾串為護送川販之事地方官屢拏未獲臣細思捕之不急則終然漏網捕之太急恐逺颺無蹤因委定廣協守備趙文英令其招諭二人自行投出查捕拐販以贖前罪今據稟李美李秀已自行投出情願查拏拐販贖罪臣隨飭趙文英加意經管勿致脫走俾查拏拐販自贖若果能多獲拐販臣請寛其罪儻屬虛言臣令將二人解來仍行懲治所有情節臣謹繕摺奏聞謹奏此舉甚是可謂情法兼備同日又奏為奏聞事竊臣欽奉到奉旨發還雲南廵撫楊名時恭請聖安一摺臣巳遵照交還楊名時伊不勝悚懼又荷聖恩賜以端陽藥錠一匣楊名時叩頭祗領後屢欲臣將伊中心不安口奏謝恩之處具摺奏逹臣堅拒不應所有拒却情節臣繕摺奏聞謹奏楊名時撫滇以來聲名頗好但前者朕降旨停其摺奏伊並不認過求請未免有悻悻自恃之心故令其窘急慚恧庶或自反非別有譴責也宻之同日又奏為遵旨奏聞事竊臣奏摺内欽奉硃批毛文銓心行似少誠實調伊來京面加審視石禮哈雖係少年朕謂大有可觀爾意以為何如欽此臣才識庸淺尤短於知人恭承天語下詢不勝祗懼惟有就臣愚昧所見據實奏皇上聖鑒甚明臣從前六年之前曽一見即深喜其才近聞其在威寧有二事臣於其心跡之間不無少疑昨者威寧府知府姚謙將欲離任因其不在地方濫取商民有一二千人攀留石禮哈延姚謙入署取到任以來摺稿令看云非我奏你後又以千帶來長隨頂補臣謹據實奏聞謹奏石禮哈急公效力之心甚切且遇事亦能幹濟其才其志實有可取然尚欠歴練今若大用恐非其福所以朕命張謙來撫黔省向聞張謙有書生習氣猶慮偏於迂懦及召至京見其度宇剛方心胸明白洵乃有用之才也殊與黔地相宜毛文銓人忠厚事體熟諳然未見朕以前不出中下之品若經召對能洞悉朕意所向則可以稱封疆之任矣同日又奏為奏聞事竊臣將坐落陸涼州臣標後營廢棄之馬厰築壩開閘開墾為田以所收租粒貯之營中義倉僃濟兵食臣業經具摺奏明以其地窪下夏秋水漲易淹臣令改種麥子今年已收租麥二千石陸續運貯義倉又右營亦有一廢棄小厰坐落嵩明州可墾之地無幾臣亦招佃種麥今亦收得租麥三十八石併貯義倉又臣標向有沿昆明池一帶草厰淤出之地百姓承種納租米於各營以養廢退無子之老兵名曰老丁田每年共納租米四百二十三石因年深日久無人細查其傍陸續淤出者皆為佃丁隠占而收租之兵貪其小利亦為掩飾臣委中軍副將㑹同昆明縣逐一踏查共查出田地一千六百餘畝増出租米三百七十一石亦併俟秋成收租歸入義倉將月給老兵之米數稍為加豐有餘之米亦存僃濟兵食臣查三處之田其昆明嵩明二處已皆一定但為田無幾所出有限惟陸涼一處地方甚大若盡成田實可足省城八營之儲僃臣料理兩年前年為水所淹今年雖獲麥二千石然其土堅實止可墾數分中一分近委阿迷州知州元展成復行細查據稟其中窪下之地盡應種麥亦有髙處若築小圍儘可種稻現今其旁民田種稻者止築三四尺髙小圍遇水俱各無損即其明驗但其宣洩之處尚須建一大閘三小閘等語然千聞不如一見陸涼州離省不逺臣擬親往彼地相度種麥種稻之處及籌酌宣洩導注之法趁此水發之際水路分明髙下易見庶可酌定畫一之方以為永逺之利臣謹將情節繕摺奏聞謹奏欲為一勞永逸之事何可惜費𩔖斯與兵民興利之舉若汝力有未逮據實奏知以便朕酌量賞助同日又奏為奏聞事竊臣前欽奉上諭諭臣及貴州廵撫毛文銓提督趙坤以治苗之方又諭貴州各項贏餘通行合計分給各官養亷以省派累欽此所有治苗之處臣等欽遵料理外其通行㑹計一事臣隨令司道徹底清查通盤酌計臣再與撫臣㑹同酌定具摺奏聞并敬將上諭各恭謄一道送交毛文銓趙坤領遵在案近廵撫毛文銓奉旨令其陛見臣又將上諭恭謄送交署撫臣石禮哈一體欽遵辦理㑹同查酌去後兹據布政使劉師恕詳查又經署撫臣石禮哈酌定開單㑹奏到臣臣思此事係定一省經費欲使民免派累官商酌以求無弊今細查來單所開款項有應再加斟酌之處臣已詳註單内商之署撫臣石禮哈及聞謹奏知道了此非朕深知灼見確然一定之事也其中若有窒礙難行處毋得强為同日又奏為奏聞事竊查雲南曲靖府及南寧等州縣所屬沿紅花海一帶地方原係近水窪下之地居民開墾成田於五月十八九等日大雨起蛟山水陡發據南寧縣奏明後續據平夷縣報稱所屬海馬鄉田畝廬舍被淹陸涼州亦報所屬之東門等三十村田畝被淹又曲靖府報府屬越州鄉之蔡家衝吳官衝二村蕎麥地於六月初四日被冰雹打壞臣隨委員一併查恤踏看其被水之處巳經撫臣楊名時繕疏題報其成災分數容臣等勘確續題臣查此被水及雹傷地方雖係府州縣五處實係延袤百餘里一區五處交錯分管目今雲南通省栽插廣遍稻禾極茂近覺雨水稍多雖現在無妨然得連晴十餘日則成實分數更好再各屬之中俱大雨霑足獨禄豐縣及練象鄉亢旱方圓四十里内無雨稻秧不能插種昨於六月初練象鄉巳經得雨雖插秧頗晚尚可望五六分收成惟禄豐縣之二十里内雖亦有雨田中不能積水其地係山坡之田臣已遣員諭令百姓改種蕎麥以望有秋所有情形臣謹繕摺奏聞謹奏覽雨水情形知道了今歳直省禾稼除被淹外荷蒙上蒼垂祐大抵秋收俱屬可慶同日又奏為恭請陛見敬聆聖訓事竊臣受恩深重效職巖疆自皇上御極以來臣尚未獲瞻仰天顔面聆聖訓依戀之私時刻難安且萬里邊境苗猓環居一切控制料理之宜必得仰蒙天恩訓誨指示臣方可欽奉遵循冀免隕越伏祈皇上俯鑒微臣犬馬寸心允臣於提臣郝玉麟帶兵入口之後起身赴京陛見不勝欣幸臣無任瞻依冀望之至為此繕摺請旨伏祈皇上睿鑒施行謹奏卿一切辦理事務深合朕意朕實嘉之來京面見亦無可訓諭處滇省道路遥逺邊圉任重僕僕往來殊屬無益況卿年未老我君臣相見正自有日俟朕將天下督撫咸斟酌允當文武官弁以及軍民人等皆曉然洞悉朕意之後行將有㫖召卿也今封疆諸臣中應面加敎誨者尚不一其人卿且佇候雍正三年九月初九日雲貴總督臣髙其倬謹奏恭請皇上聖安朕躬甚安覽卿奏摺知日前偶染瘧疾邇來諒巳全愈矣兹因閩地緊要整飭不得其人調卿前往督理巳命伊都立來滇接替復慮地方情形伊都立不逮楊名時熟諳欲行更易尚未宣㫖暫且勿聞於人齎摺人回卿若尚未離滇不妨宻告楊名時知之至於卿身縱經痊愈仍應攝養萬不可力疾而行況閩督印務巳有宜兆熊代署雖躭延數時亦不致有所貽誤也諭雲貴總督髙其倬知悉李衛石禮哈互相宻㕘之摺發來爾看人心如此真堪發一大笑二人皆具可用材器感激出於真誠圖報實屬懇切且操守俱清才猷皆敏但嫌過於勇果謬誤多端都緣尚氣恃才矜巳傲物之心使然耳即如李衛朕經再四嚴加敎誡總不肯改行易慮一惟偏執已見其意葢謂身無貪婪敗檢之疵何惜物議所以全不自反第稱被人屈陷急欲辯明石禮哈秉性與之相同若欲推求二人之過又實具一片公忠兼其敢言不諱鋒利英銳之氣亦不易得朕於此殊難持定鈞衡所以與爾商酌李衛經管鹽銅之事若可缷責别員料理就緒朕觀伊情性頗不宜於邊方欲試用近省撫任以策後效至於黔撫一缺俟毛文銓到京陛見其人果妥不必言矣但以向日所聞伊之聲名與近日撫黔之後一切章奏觀之非致身為國人也朕甚不取貴州吏治敝壞日久非才長而激切奉公者弗克勝任石禮哈雖年少稍覺輕躁然果敢可嘉欲命伊撫治其地整頓委靡復慮伊振作過當不能收功則貽害匪淺為此猶豫莫決亦與爾酌計爾意以為宜否朕前降㫖敎訓李衛伊有回奏之摺并發來爾看試評論二人優劣究竟如何曁朕一切所問悉秉公據實絲毫毋隐速行奏覆朕以便決定去留縱或與爾身干涉之事亦不可稍有回護直言剖悉以聞若止據彼此互揭之詞以定斯案則二人不但不可委用實亦難留於人世矣豈非大笑談乎同日又奏為遵旨奏聞事竊臣欽奉到皇上硃批諭旨一道跪讀之下仰見我皇上睿鑒所照物無遁情惜才聖心獨超千古臣遵將發下李衛石禮哈互相宻㕘之摺詳細閱看詞多過甚且不實在尤甚者一則追數其既往一則逆料其將來皆係挾私妝點冀聳天聽實非公論葢因二人皆性急量狹彼此原有忌才之心兩不相下又兩地來往之人遂迎合搬唆傳為彼此訕罵漸成嫌隙以致相讐李衛石禮哈忍以一巳之私嫌小憤瀆煩睿懷二人之罪實不可逭皇上俯念其才皆可用不加嚴譴不但二人應且感且愧即臣跪讀再四不覺感激涕零至䝉聖諭令臣評論二人優劣如何之處據臣所見二人才皆有餘倚之辦事皆係美才若云純正臣不敢許李衛在雲南鹽政煥然一新一切盡力料理石禮哈署貴州巡撫以來實力振作毫不因循就此而論二人所為臣以為實皆可取但就其才氣之中細求其稍不足處若當大事李衛失之疎脫石禮哈失之輕易恐至志得意滿皆不免驕盈之病至李衛所辦雲南鹽銅之事規模已屬小定雖後來之人恐難企及然大槩亦可守其成規雲南鹽銅可不需李衛料理至石禮哈目下貴州得之甚好實能振作比毛文銓頗優所稍可慮者惟恐氣銳更張太過看事太易苗猓之地或有孟浪之失臣謹就愚昧所見據實直陳恐多未當不勝祗懼伏乞睿鑒再臣有奏聞者臣於八月二十五日接到諭㫖正在繕摺間於二十八日忽渾身壯熱兩眼視物迷離至初六日現成瘧症雖目下比前心内稍清無如手顫不能成書今此事䝉天語垂問復令臣速行奏覆事關緊要不容遲緩只得令臣姪髙定勳代寫臣必不令其一毫漏洩謹將情節據實奏聞謹奏所論公當可嘉之至與朕意若合符節自時加訓誨而用之同日又奏為遵旨覆奏事竊臣欽奉發與臣看御批敎訓李衛一摺臣再四跪讀仰見我皇上成就人才至意有加無巳御批訓飭之諭處處皆切中李衛之病其一切謬見俱在聖明洞鑒之中李衛若能將皇上指訓之處夙夜敬遵一一悛改則性情見解自與前不同即可成有用之才必不似目下有才未純失於矜恃也為此謹奏朕雖有意成就要看伊之福量何如耳同日又奏為奏聞雲貴秋成分數事竊雲南今嵗四月盡間連得大雨髙下稻田俱得栽插五月盡間因雨太多以致發水曲靖府屬之霑益南寧陸涼平夷一帶被淹臣隨委員查賑巳經摺奏并㑹同撫臣楊名時題報在案又於七月中旬隂雨連綿大理府屬之鄧川州臨安府屬之建水州山溪竝漲漫堤而出沿河村屯田禾房屋被水衝淹臣遴員照前查賑亦經㑹疏題報在案此外尚有雲南府屬之安寧昆陽大理府屬之浪穹等處村屯亦有被水淹沒田禾五六十畝至七八十畝及未被水田禾亦傷雨多結實少歉自八月以來晴霽一月有餘今各處田禾陸續收割約有六七分收成亦有數處八九分者雲南髙田極多低田甚少今年髙田得種所收巳多以此合算有七分年成目下貴州今歲有九分年成臣謹具摺奏聞謹奏覽滇黔收成分數朕懷深慰同日又奏為遵旨查奏事竊臣前欽奉到硃筆諭旨一道内制馭苗民之處臣謹欽奉遵行辦理外其黔省大小各員養廉一事臣跪讀聖諭遵即敬録二道專差齎交撫臣毛文銓提臣趙坤欽遵㑹查外并行貴州布按二司及各鎮協營將各處税銀羡餘文武各官官莊所收米糧通省錢糧羡餘暨一切贏餘數目逐一據實查報去後續因撫臣毛文銓奉㫖陛見臣遵將前奉上諭敬録一通復齎交署撫臣石禮哈㑹同查商辦理在案兹據貴州布政使劉師恕等㑹同查報前來經臣與署撫臣石禮哈再加酌核查得黔省各屬税羡一項每年共銀三萬四千一百七十四兩零又通省地丁錢糧耗羡一項每年共銀一萬七百九十二兩零又通省額徵秋糧耗米一項共折銀九千一百二十三兩零又黔省武員官莊併文員額徵官莊學租以及額外官莊所收租米一項共折銀一千四百七十九兩零又黔省文職俸工前因軍需懸項除敎雜等職不捐外其餘俱係捐補軍需今巳補完除敎雜等職竝各衙門各役工食仍照數實給外其府㕔州縣既經分給養亷所有俸銀共三千六百四十兩查黔省盈餘不多若將此項除出則分給各員為數不敷亦應坐存算入養廉數内以上五項共銀五萬九千二百零八兩臣㑹同署撫臣石禮哈詳細商酌毎年議給廵撫衙門養廉銀八千五百兩學政衙門養亷銀二千兩布政司四千五百兩按察司三千兩貴東道二千兩貴西道一千八百兩至各府㕔州縣分別衝僻繁簡貴陽府一千三百兩鎮逺安順威寧三府各一千一百兩平越黎平都勻三府各一千兩思南思州石阡銅仁四府各八百兩貴陽府同知南籠通判各五百兩正大營同知貴陽府通判各四百兩威寧府通判三百兩貴筑縣七百兩定番廣順麻哈獨山大定平逺黔西鎮寧永寧普安十州各六百兩黄平州五百兩開州四百兩普定鎮逺永寧畢節四縣各五百兩貴定龍里修文普安安南安平清鎮平越湄潭餘慶甕安都勻清平施秉安化印江婺川龍泉銅仁永從二十縣各四百兩共分給養亷銀五萬二千三百兩餘銀六千九百零八兩再除黔省每年奏銷飯錢馬塘津貼賞兵等項額需銀四千八百一十八兩外尚餘銀二千九十兩存貯司庫以僃添科塲及賞有功兵役效力苗猓之用所有扣算充公分給養㢘即於雍正三年七月初一日為始其各處税銀署撫臣石禮哈現在委員就近監收羡餘歸公錢糧火耗一例提解耗米租米俟秋成上倉後酌令變價解貯分給此係臣等就愚昧之見商酌料理恐未允協謹繕摺奏聞伏乞皇上訓示遵行謹奏黔省情形朕雖未身經目歴然覽所酌議處情通理順似屬允協應照此行再諭雲貴總督髙其倬黔撫一缺試就石禮哈毛文銓二人而論孰為相宜石禮哈果敢任事報效情殷毛文銓輿論既不一而陳奏詞語每欠爽直所以調來審視今到京尚未暇多見觀其大概甚屬歴練但恐涉於狡猾不肯勇往向前然其心胸明白亦係可用之才據爾所見纎毫毋隐速奏以聞石禮哈惟恐年少有孟浪之失所以朕意遲疑不決耳雍正三年十一月十二日雲貴總督臣髙其倬謹奏為遵旨覆奏事竊臣奉到硃筆諭旨一道伏查毛文銓石禮哈二人臣於前次奉到聖諭業經就臣愚昧具摺詳奏臣看毛文銓做外官最久見事頗多實為歴練但當大事即稍覺擘劃不開才具似覺微平石禮哈有才而氣鋭尚欠歴練若遇應勇往直前之事其鋒銳之氣可用若遇應審慎持重之事其孟浪之失亦多乞皇上訓誨長養而用之臣愚昧之見如此謹繕摺據實奏聞謹奏覽諭雲貴總督髙其倬知悉原任永從縣令楊秉乾因揀選科員於進呈履歴時條奏古州八萬之事朕觀所論似屬有理續據石禮哈又奏招撫之策今并發爾詳加斟酌如事在應行作爾意見具疏題請候朕裁定觀石禮哈奏摺條分縷析頗屬周詳但内稱將來必欲歸入版圖先調兵駐防堵截前後去路并禁通鹽貨斷絶必需之物措置停妥即一靣宣布威徳俾其知所懷畏倘一二年後不受招撫則調集四路兵丁搗其巢穴云云之論朕殊不以為然今石禮哈既興此念且巳形諸奏牘設或洩露風聲令苗衆聞之恐此地安設未畢而彼苗先生疑懼激出事端亦未可定不熟計萬全而輕率行之可乎果若改設鎮標増添士卒則湖南之靖州天柱等州縣俱當歸并黔屬為便諸如此等機宜悉當逐一籌畫妥確徐徐具奏以聞雍正三年十一月十四日雲貴總督臣髙其倬謹奏為遵旨覆奏事竊臣欽奉到硃筆諭旨一道并發下石禮哈楊秉乾奏摺二件臣跪讀聖諭再四尋繹又詳看二摺内所陳情由仰見我皇上聖神天縱萬里之外洞照無遺指訓之方精詳周僃臣竊謂黎平及古州之事楊秉乾所陳得其梗槩尚未詳僃石禮哈所言實為詳明稍欠妥酌蓋古州八萬其地不小其人甚衆目前固不宜忽略不思籌防然亦不宜輕躁驟言攻取若斷其鹽貨必致激之生變至搗巢覆穴䇿非萬全况現今黎平及改歸之地方尚未整頓何暇言及外地生苗臣以為古州八萬只宜時時訪探情形宻加防範令入版圖之䇿且作緩圖先將黎平五開銅鼓等處選擇文武賢員加意料理俟有頭緒再將附近内古州週圍之生苗而實非内古州之所管者相機化誨此苗馴服歸心則内古州勢孤黨弱自生畏服之心然後從容圖度惟漸加化導不驟斷鹽貨惟控扼形勢不竟示兵威地方文武能就其情勢揆合機宜如此行之雖不必有期效旦夕之心然數年之間臣可保其必漸有成功若忽略近地希圖逺功不但無益且恐有損至添兵設鎮一節石禮哈楊秉乾所言皆是黎平一協所設額兵僅六百二十名數原太少所以從前提鎮屢屢請増且從前控制古州八萬之責湖南與貴州分任今又全歸貴州黎平孤懸東隅勢非添兵設鎮不足以資彈壓署撫臣石禮哈請設一鎮増標兵之額為三千名臣就事勢斟酌似應設一鎮標下分三營每營各設額兵七百名共二千一百名又都勻營係古州八萬後路現兵單弱亦應如署撫臣石禮哈所請添増二百名其㕘將不必改設副將查現在黎平協兵丁六百二十名貴州通省細加籌計惟思南地方通府無苗石阡地小安静無事請於思南營兵裁調三百五十名石阡營兵裁調一百三十名共四百八十名移於黎平總計添設黎平都勻二處尚共不敷兵一千二百名貴州别營遍加籌計實皆再難酌裁應請另為招募至黎平官弁應裁去副將一員將大定裁去總兵之額改設於黎平其三營遊擊三員守僃三員千總六員把總十二員查思南營既裁去額兵三百五十名止應留守僃一員其思南營㕘將應裁去改為遊擊一員再減去千總一員把總二員皆移於黎平其石阡營亦應減去千總一員把總一員移於黎平以上除黎平原有守僃一員千總二員把總四員尚應於黎平添遊擊二員守僃一員千總二員把總五員倘䝉允准改鎮則湖南之靖州及天柱縣應遵照聖諭亦應改隸黎平方為妥協蓋五開銅鼓既經歸黔則古州八萬一區貴州之府州縣巳周環其三面若靖州天柱縣不歸黔省則東北一角尚缺將來未免呼應不靈防範難周應請改屬黔省其靖五一協亦應改隸於黔至黎平若行設鎮請將鎮逺定廣靖五三協平越都勻黄施三營俱歸該鎮管轄庶呼吸相通調度無誤其黎平應添營汛查毛坪為水陸咽喉應分遊擊一員守僃一員千總一員把總二員兵四百名駐防其地外古州曹滴寨麻地方最為緊要應分遊擊一員千總一員把總二員兵五百名駐防其地永從縣應分守僃一員千總一員把總二員添兵一百名合之原設兵一百名及西山汛兵一百名共三百名聫絡彈壓其五開銅鼓二衛原係靖五協所轄倘䝉將靖州天柱縣歸黔應歸靖五協分兵防汛倘有不敷請再將鎮兵酌量分添其各小塘汛俟設鎮之後酌宜安設五開銅鼓衛皆應改衛為縣又黎平府所屬共吏目六員從前分設尚未得宜如潭溪洪州二大司各設吏目一員於事勢為宜其湖耳赤溪亦係二大司乃不設一吏目中林亮寨古州三司亦無吏目而歐陽八州龍里新化四司地方既小又接連一處而各設一吏目似屬冗多應請將歐陽司吏目改令兼管八州新化二司龍里司吏目改令兼管中林亮寨二司八州司吏目改令管理湖耳司新化司吏目改令管理赤溪司似屬妥協而籌劑黎平尤為緊要者在急去不肖之文武員弁選用亷能老成之人方能使内地漸有起色生苗日就馴服臣查現在黎平副將李梅雖履任未久實庸劣無能黎平要地斷難姑留臣之所知者現在定廣協副將劉業浚才守俱好頗悉苗情請將劉業浚調補黎平副將於營伍地方有裨再臣恭繹硃諭恐此地安設未畢而彼苗先生疑懼激出事端亦未可定聖慮深逺無微不至實不得不慮者以臣愚見倘蒙允准改鎮懇乞皇上即以劉業浚試用一則情形熟悉必能料理安輯不致生苗疑畏再則官不換人冺然無迹似亦消弭事端之一法其新調黎平知府馬駿人有操守於彼地形勢亦頗熟悉似可料理至將來文員改添知縣武員添設將僃皆須得人方能辦理臣之所知貴州文員中正大營同知馮光裕操持謹飭人亦明白銅仁縣知縣牛天申明敏有才武員中撫標遊擊趙文英熟於苗情辦事敏㨗鎮逺協遊擊韓勲為人端謹顧惜顔面皆可僃聖鑒簡擇若文武悉人地相宜同心竭力料理整飭不但黎平日見整頓即古州必漸就歸服矣謹就臣愚昧之見繕摺奏聞伏乞睿鑒謹奏覽奏俱悉雍正三年十二月初二日雲貴總督今調補浙閩總督臣髙其倬謹奏為奏聞土司奪占民田流官串合賄斷情節事竊查雲南姚安府大姚縣所屬有苴却十馬地方四週三百餘里民户極多土田饒衍現今姚安府土同知髙厚徳之祖髙奣映為吳逆川東道時始行侵占至髙厚徳又賄囑流官将地方斷歸伊管錢糧斷令伊徵於康熙四十七年以進京費用為名派苴却十馬銀五千兩民不能措遂揑寫賣契令土目帶衆持械壓民照寫各民畏威吞聲寫給乃於各村安設土巡檢一員名曰經管地方實係暗察各民財産子女任意取携派累百端尤堪髮指者流官即為鈐蓋印信土官遂爾稱為血産而前署大姚令陸應機且代為設謀将錢糧巧行合柱前迤西道畢忠吉又賺民存案将憑據竟付火焚後經前任督臣郭瑮知其誣抑斷歸民里接任督臣蒋陳錫復斷與土司臣到任之後察訪得實又查賦役册案確係大姚民地遂斷令永歸民里復令勒石以杜翻案之弊旋據土同知髙厚徳詳稱苴却十馬内尚有六十五莊係伊養亷血産不應歸之大姚又據尼楚珍等控稱此六十五莊盡係民田被土司霸占臣隨批令姚安府知府盧兆鵬詳行查審未經審明該府丁艱又委姚安府知府今調永昌府知府李孔嘉永昌府同知蒋天麟等㑹審詎該府該同知受土官之賄斷出十莊歸之百姓餘者仍歸土司臣隨另行遴委楚雄府知府李玉鋐姚安府知府楊輝祖等前至苴却十馬適中之處秉公確勘詳審兹據審報前來底裏盡出髙厚徳之土司養廉田土盡在金沙江南苴却十馬及六十五莊盡在金沙江北不但苴却十馬之地悉係土司硬占前官賄斷即此六十五莊亦無一非土司借端强霸硬典硬贖者證據確鑿雖土司世僕亦盡吐實情又據自首出歴年隱占之田尚有三十七莊據髙厚徳稱係明末尼效叛産歸於伊家據里民夏文烈等呈稱悉係髙厚徳占去之民産又據髙厚德供出知府盧兆鵬曽受賄七百兩李孔嘉曽受賄一千七百兩同知蒋天麟曽受賄六百兩又據知府楊輝祖揭報髙厚徳行賄銀三千一百兩先交銀二千兩求楊輝祖照拂審案各等情除後供出之三十七莊是否民田或係叛産臣行令再行確查外似此流土串通一氣舞弊殃民宜加嚴懲以警官邪又據司道等揭㕘前來臣不敢以離任在邇即行寛假謹另行繕疏題㕘請旨革職發審外所有情節謹具摺奏聞再臣堂兄刑部侍郎髙其佩曽任姚州知州亦為地方不法之事曽行詳揭今髙厚德揚言謂臣此舉挾怨報復臣雖不肖仰蒙聖恩畀以兩省重任斷不敢以國家法紀快一巳之讐何况宗族之怨臣若避嫌縮手寛縱此事即上負天恩有乖職守但既有此情節亦何敢隱黙理合一并奏聞謹奏如此方合大臣之體朕甚嘉之土司奪占民田及賄斷情節知道了具題到日有旨雍正四年六月十九日浙閩總督臣髙其倬謹奏為奏聞閩省情形事竊臣於本年六月十一日至杭州看浙江巡撫李衛處所有福建省門報及詢問屬員并自福建來之行旅謹将所得情形僃細奏聞福建自來人稠地狹食米不敷各府鄉僻之處民人多食薯蕷竟以之充數月之糧去嵗福興泉漳四府秋收甚歉延建汀邵四府之秋收亦歉廣東潮州府向為漳泉所仰資者其秋收更歉於福省又因本年四月雨多薯蕷被傷所插早稻之秧亦損重行補種望收更遲五月間漳泉興三府之米毎石價至三兩福州府之米每石價至一兩八九錢延建汀邵四府米價亦昂五月初十日福州府閩縣知縣因米貴前往南臺地方查米有興化府民人自南臺買米搬往興化南臺之人不容搬去知縣斷令零星買數斗者許其搬往南臺之人以本處乏米愈搬愈貴遂爾紛鬨扯碎知縣轎衣并拆中亭保長王仲濟之房姦惡之徒乘勢遂搶米店以致城内城外各舖聞風俱闗廵撫毛文銓遣員持令箭四出諭禁十一日有千餘人環巡撫轅門呌喊推倒柵欄打破巡捕官之轎巡撫毛文銓令又拏搶米之犯陳清王端重責永逺枷號将軍宜兆熊親身及遣員曉諭又遣旗下官兵照護巡警長應稍行添糶早行預僃迎機先發則姦民雖欲又開四月二十七日邵武府建寧縣百姓聚衆罷市逼知縣停碾減糶五月初二日汀州百姓因米貴鹽貴共罵趕知府何國棟搶其鹽船五月十二日汀州府上杭縣百姓因米貴搶奪又汀州府永定縣百姓搶米知縣諭禁即向知縣借米知縣不民情未安五月末係早稻吐穗之時又未得足雨臣到杭州原欲将兩處海塘并浙江各様事體情形逐一與撫臣李衛詳細面商一番然後往閩但目今閩省情形如此況向來其地民情好事臣應三十萬石可得米一十五萬石福州府每日需米三千石一月計需米九萬石倉中全穀不足兩月之用况又巳平糶甚多更覺歉少泉州興化人民需食與福州畧同漳州人民比福州更多而此三府倉穀皆少於福州且又皆有動糶眼前之平糶奏伏乞睿鑒除到閩相度情形應作何料理臣再行具奏外臣謹将所聞情節及赴閩之處繕摺奏聞謹奏可嘉之至同日又奏為奏聞借撥浙穀請於山東淮安買麥運閩接濟事竊照福省現今米貴情形臣巳另摺詳奏查福建通省倉穀共一百五十萬石數不為少今經於各府州縣在在撥動平糶現存者少而福興泉漳四府人衆食繁目下之平糶既不可止而将來之秋收尚未可知若不急行預籌恐致臨時莫措查浙江與閩接壤海運尤便從前曾運閩米濟浙解價還閩有例可循臣與浙撫臣李衛熟商酌撥温台二府倉穀七萬石委員運往閩省接濟其海運水脚臣檄浙江布政司動借銀七千兩給發事竣造報臣因閩省需米頗急謹一面撥運一面奏聞至倉穀之價俟温台秋成照時價由閩解還買補所運之穀到閩若發平糶臣亦将糶價報部核查臣更有請者閩省人衆食多此七萬石之穀僅可得米三萬五千石恐仍不敷臣見今夏自直隸以至江南二麥異常豐熟臣細詢浙省屬員之曽任閩者皆言福興泉漳之人亦食二麥臣查山東及江南之淮安所屬各州縣産麥最多其價亦賤且皆濵海臣到閩時請動閩省鹽項公費銀兩委的當之員至此二省購買二麥計所遣之員八月之初可到二處八月之末麥完船齊正値北風初起揚㠶南向計日到閩以之接濟最為㨗速臣謹請諭二省督撫轉飭驗明放行庶不致稽遲時日其一切價値水脚及平糶之價臣詳明造册報部核查再閩省米貴應籌於江楚等省秋後購買前臣亦曽面奏浙江撫臣李衛向臣面言伊因籌僃浙江兼顧閩省巳具奏動銀十萬兩往四川買米又動銀在就近秋後買米就近所買之米足僃浙閩歲内之用四川所買之米足僃浙閩歲外之用等語臣是以且停籌買俟到閩親身相度情勢儻有更應添買之處臣再行詳細陳奏謹先将借運浙穀及請旨買麥之處繕摺奏聞謹奏照所請隨巳諭明各該督撫矣諭浙閩總督髙其倬頃福州姦民因米貴不容販糶竟敢環聚巡撫衙門讙譁拆毀栅欄借求減價名色大肆咆哮似此藐視官長目無法紀為督撫者理應據實奏明察捕渠魁置之重典以彰國法乃毛文銓拏獲十七人枷責示衆旋即釋放巡撫膺封疆重寄為通省表率被姦民覻若弁髦任意陵犯毛文銓逡巡畏縮如此處置罷軟無能何以示懲且若輩原以求減米價為詞若嗣後米價仍復照舊不予平減則巡撫之令雖云寛縱猶謂能行於地方倘於此番喧鬨之後竟為稍減而姦民又復寛縱不治是敎之使鬨也刁風之滋長何有底止今将毛文銓原奏鈔發爾看其悉心籌酌如應重加整頓即正色執法徹底推究務令刁頑知警設此案業既完結不便更張将來一切處不可不時時留心約束再遇此等强悍不法之徒必痛加懲創以除惡習以靖地方特諭硃批諭旨巻一百七十六之四欽定四庫全書硃批諭旨巻一百七十六之五硃批髙其倬奏摺雍正四年七月十八日浙閩總督臣髙其倬謹奏為欽奉上諭事雍正四年七月十三日奉到皇上諭旨一道臣前在浙江途次巳将所聞福建情形具摺奏聞及到閩省其諸事與前所奏所聞皆符惟永定縣殺守僃及知縣自盡一節實無其事係是訛傳至省城姦民鬨鬧巡撫轅門一節實因米價漸貴撫臣毛文銓持重不肯早糶後雖發糶而米數不多姦民遂爾鬨鬧其意專在於要多糶倉穀亦有減價之言毛文銓起初即行拏懲甚是但不應遽免其枷號然責後巳死三人尚可使之稍畏至米價先是每斗一錢一分不應改為一錢臣正在繕摺具年來省城米價至賤皆賣一兩一二三錢不等賣至一兩者極少而歴年督撫布政司圖悦衆口所定之價多者一兩少者九錢二三分再去碾價只有九錢八分及九錢之價存倉雖至豐年不能買補是以有出無入雖稱不虧空其實虧空不能買補此減價一節既長刁風又虧積貯實為不是至姦民敢鬧巡撫不法巳極臣一到閩省即思嚴拏杖斃且為首一十七人原單姓名具在按名鎻拏其事甚易但臣細查彼時姦民鬨至轅門亂喊街市之人皆在左右觀看及至要拏之時将僃弁兵未免慌張從内喊出拏人姦民聞聲早已先跑攙入觀看人内不可復辨所拏之人多不係鬧轅兇首處之不足懲姦而無干杖斃反啟衆人不服之心臣故爾中止臣又訪聞彼日有一人打巡捕官又有一人手揮蒲扇大呌巡撫毛文銓之名而罵此二人皆實是兇首不在所拏之内臣暗暗查訪畧有蹤跡但隔日久拏人最恐枉抑必俟訪確之後嚴拏審明即行杖斃以懲刁風庶幾可以示警府嚴查確拏為首之人立時杖斃附從者嚴懲此是閩省第一最要之著勸懲挽回之機全在於此臣必仰遵聖訓竭力為之斷不敢使法弛民縱再臣雖到閩未久看其光景不但米貴鹽亦大貴不但民情不好紳士兵丁風習皆甚不好以至如臺灣如海洋如錢奏其中應請旨者臣具摺恭請聖訓遵行外謹先将姦民鬨鬧情節繕摺奏聞謹奏覽同日又奏為酌量閩省情形請運江西穀石事竊照福建五六月間米價昂貴民食稍艱仰荷我皇上特頒上諭諭江西撫臣裴􅏍度将江西存倉之穀碾米十五萬石速運至閩省交界地方先期知㑹閩省督撫委員領去分給各地方以濟民食欽此仰見我皇上愛民如子閩省數千萬生靈咸在覆載全活之中闔省人民感戴踴躍所有奏謝情節臣等另行奏逹外臣查閩省今年四五月間雨水過多早稻巳插之秧俱多爛損重新再插有穀之家見此光景顧慮缺乏不肯糶賣以致在在米貴民情惶惶及到五月盡六月二十日以前又復缺雨早稻将秀不得滋潤晚稻待種不能插蒔又通省倉穀大半存價實貯者止有三四分眼前之平糶難停将來之收成難望撫臣毛文銓是以摺請借運江西之米今自六月二十日以後大雨滂沛到處霑足從前竟有㐫年光景今忽變而為豐年氣象各處早稻現皆成熟俱有八分收成晚稻巳種者禾苗茂盛未種者現在插秧泉漳二府以前每米一石賣至四兩及三兩九錢者今賣一兩七八九錢不等皇上憂民之誠感召所致惟是閩省米少積貯為第一根本要務以前惟憂乏糶今則應籌實倉查通省倉穀為數不少皆能實貯何憂米貴今皆十之三四又復平糶且恐所存不實不容不急籌補足以之米應請改運穀石方可久貯但查江西福建雖係接壤中隔大山水陸相間輓運匪易若改為穀石則十五萬之米易而為三十萬石之穀其事愈難矣臣再四詢訪若将江西穀石用大船由長江載至鎮江再到蘇州一帶用海船載至福建之福興泉漳四府秋間北風起時半月可到似屬便㨗此米到時再并臣前奏運温台倉穀七萬石皆以填補福興泉漳四府之倉其延建邵三府尚屬産米之處其倉穀可以本地買補獨汀州一府既産米頗少而海運不通稍難籌畫容臣熟籌再行奏益臣隨遣員持咨咨明江西撫臣其巳經碾運之米仍運到界上臣等接運入閩此項米石臣意即留貯邵武延平二府各倉以之給散兵米而二府各州縣今年應徵之兵米改徵稻穀以補倉儲一轉移間亦可補實積貯至江西省尚未碾運之米暫停碾運巳具摺請改運穀石俟奉旨之時再欽遵奉行等因一面移咨外臣謹一面将僃細情節繕摺請旨臣更有請者江南蘇松二府倉穀之多少臣不能知前所籌尚為未當請停買運謹一併奏聞謹奏覽同日又奏為遵旨奏聞事竊臣欽奉諭旨令臣看騐福建陸路提督吳陞之病臣一到福省提督吳陞即欲勉强前來時正極暑與病人不宜臣馳書止之隨聞其病甚臣又不能前去謹委漳州府知府耿國祚漳州鎮左營遊擊張見龍同往問病看視據稟提督吳陞比從前甚瘦不能跕立飲食大減左目先前朦翳今右目亦不能見物等語臣看得吳陞之病巳深日漸衰羸雖居官素優今力不從心提督職任𦂳要難以支持臣謹将實在情節繕摺奏聞謹奏提督吳陞患病巳深知道了另有㫖矣雍正四年七月二十六日浙閩總督臣髙其倬謹奏為仰懇聖恩請調中軍副将事竊臣到福省查督標兵丁習氣頗驕一切操演止是故套臣思加以約束整頓中軍副将一官臣實資指臂之助現在中軍副将李惟揚人小心弓馬好但辦事遲鈍又奉旨交臣帶來以副将用之康陵福建情形頗熟但係本土之人少存瞻顧之習以臣愚昧所見此二員於中軍副将皆未相宜臣從浙江過時見嚴州協副将李郡營伍井井人甚明白且曽久在福省兼任臺灣各處情形頗熟臣從得人起見仰懇聖恩請将李郡賞調臣標中軍副将即以李惟揚調補嚴州協副将一轉移間臣實獲指臂之助為此繕摺請旨謹奏是日清晨朕降旨擢用李郡為總兵適於午間爾奏齎到李郡原係出色好員但南贛緊要非伊不可爾標中軍一缺如以康陵謂不甚相宜更於各協營搜訪俟得人時再行奏請同日又奏為奏聞詳記拏賊勞績拔補千把事竊查千把一官為兵丁進身之階武途儲材之地頗闗緊要遴選不可不加詳慎其漢仗弓馬辦事行走固所當論但臣思閩浙二省山海交錯盜賊甚多若以拏賊之勤怠為拔補之慿據則各處弁兵必更加鼓勵緝捕愈勤臣巳咨㑹兩省提鎮飭行各将僃嗣後各營把總兵丁有能實力擒拏賊盜者查明人數具文詳報發臬司衙門如審係實盜臣即将本弁兵登簿記明提鎮以及将僃亦各立簿登記俟有千把缺出即将拏賊弁兵送考擇其拏賊尤多弓馬嫺熟盡心營伍者拔補千把庶各弁兵皆踴躍功名羣亦如此記明俟年滿之時亦以此考其勤惰分別保送按事考勤似實而有據即保送之人亦難架空庇徇所有情節臣謹繕摺奏聞謹奏日前李衛亦有類斯一奏部議恐武弁因此樂於地方多盜不允所請部議雖亦有理朕特命暫於浙省試行今卿鼓舞兵弁之見與朕意同也此一事更有堪發笑處偶示卿知兵部司官初定駁稿與尚書蔡珽看蔡珽云當再斟酌妥議該司官竟不列伊銜名即送吏部㑹題所以覆本進呈伊竝不知朕覽所列銜名獨無蔡珽諭問其故方始察出現将司官議處豈非大笑談乎同日又奏為奏聞事竊查地方風習為第一緊要之事臣到閩未久雖未詳知然看福省文官多要詞訟之錢且多懶緩之習武員任用親友疎於防閑袒庇兵丁不敢管束鄉紳士子好者固有然每多攬勢好利主持詞訟之人是非議論多徇偏私兵丁技藝頗生習氣驕縱水師提督藍廷珍做官操守固稍平常然操練頗勤管束稍嚴郭等即思刧其衙門以圖報復從前督標兵丁因催完所借庫銀即出城站隊以挾總督雖老成歴練如提督吳陞於管兵亦頗失之寛假通省兵氣在在皆驕至於各處之民習尚狡詐動輒聚衆制官今年借米貴應糶為詞鬨鬧巡撫轅門其外府州縣恃衆抗官者甚多種種風習皆為不好臣仰承僅僅敎戒所可感化必先嚴加懲治示以禮法庶皇上簡畀封疆至意所有閩省風習情形臣謹繕摺奏聞伏祈皇上敎誨指示謹奏自卿莅閩後朕不為海疆憂念矣此奏欣悦覽之在他人或慮其徒弄虚文而無實際在卿則確信言行之必相符也徐徐不間為之同日又奏為請開臺灣遏米之禁接濟泉漳民食事竊查閩省泉漳二府向資臺灣之米以濟民食自朱一貴變後巡臺御史等恐其運出接濟洋盜又恐聽民搬運以致臺灣米價騰貴或生事端遂禁止臺米不許過海泉漳之民有米無米在所不顧殊不知臺灣地廣民間所出之米一年豐收足供四五年之用民人用力耕田固為自身食用亦圖賣出購錢一行禁止則囤積之米廢為無用既大不便於臺民而又不便於泉漳之百姓究竟泉漳之民勢不得不買臺灣之民亦勢不能不賣查禁雖嚴不過徒生官弁兵役索賄私放之弊臣愚以為遏米之禁似宜酌籌變通臣查開通臺米其益有四端一泉漳二府之民有所資藉不苦乏食二臺灣之民既不苦米積無用又得賣售之益則開田愈力三可免泉漳臺灣之民因米糧出入之故受掯勒需索之累四泉漳之民既有食米自不搬買福州之米福民亦稍免乏少之虞臣謹将應行開禁情節繕摺請旨至開通米禁有須防之處二端亦不可不加詳慮其一恐泉漳之民任意搬買或致臺灣米貴查臺地一年豐收足供四五年之食嗣後應於冬成之時詳細確查若臺灣豐熟即開米禁倘年成歉薄即禁止販買雖年歲稍豐而一時偶有米貴情形臣亦即随時查禁必不敢疎忽滋事其一恐買米之船接濟洋盜查海洋之中刦米為盜者頗多買米為盜者實少閩地歴來諸臣既於此鰓鰓過計臣亦不敢不於此詳細周防嗣後泉漳之民過臺買米者俱令於本地方報明欲往臺買米若干載往某處販賣取具聫保詳報臣等衙門即飛行臺灣及所賣之府縣兩處稽查如有不到即係偷賣必嚴懲聫保究出本船之人盡法重處如此查防自不致接濟洋盜臣謹再将僃防情節一併奏聞謹奏九卿確議具奏雍正四年九月初二日浙閩總督臣髙其倬謹奏為奏聞蘇禄國王進表效貢事雍正四年八月初三日臣據晉江縣禀稱七月二十五日有蘇禄國貢船一隻到晉江縣日湖港地方據蘇禄國進貢正使龔廷彩禀稱彩原住泉州府城於康熙壬辰年往呂宋國貿易不意夲利耗蝕逗遛外國去歲由呂宋到蘇禄蘇禄國王親諭以聖明在上逺慕徳化欲圖進貢不識水路命子民同伊國臣阿石丹并通事楊佩寧貢土産前來以子民為嚮導給有番銜照身令子民為正貢并船上番人及小厮計十一人唐人舵工水手三十一人帶有些少海參蚌壳燕窩胡椒巴仔子等物於七月初五日由蘇禄開棹至七月二十五日就泉州日湖港泊船等情并單開進貢之土産表章一道大珠二顆燕窩一箱玳瑁一匣金花支踏一匣竹布一匣上幼牙卅一匣上幼喝茅一匣籐席二領番刀一對白花曲劍一對番標一對活猿一對等情到縣除俟該船進港查明另報外縁係外國仰慕聖化浮海進貢合先具報臣隨飛飭調入内港確查人數貢物并飭弁兵防護去後續據晉江縣禀稱蘇禄貢船於八月初四日乗大潮水放入内港卑職於初六日親至伊船點驗雖番人禮儀草率而輸誠歸化之念溢於顔面其番官名阿石丹約四十餘歲檢看其貢物與前單所開無異表文有二摺一係番文一係漢文所遣充正使之龔廷彩係晉江人十五年前至吕宋後至蘇禄蘇禄國王逺慕聖化遣其同阿石丹進貢等語臣復飭該地文武加意防護從優撫恤外其進貢之處仍照例由巡撫衙門具疏題報臣查蘇禄國隔越重洋係海外從不通貢之邦我皇上聖徳洋溢其王毋漢末毋拉律林慕化歸誠臣謹将情由先行繕摺奏聞其漢字表文臣亦另照寫一通進呈睿覽至蘇禄國王雖以龔廷彩充為正使固是敬重聞謹奏覽該國表文具一片誠敬嚮慕之忱甚為可嘉巳飭諭沿途官員優待來使到京朕自加恩以示懷柔於其回閩後務令歡喜稱意旋歸本國可也同日又奏為奏聞事竊查福建水師提督藍廷珍於水師事務實為諳練但向來性貪好利自伊陛見䝉皇上訓誨之後已改一半臣於㑹晤之時亦相規勸伊發念更進俟其果能實力與否臣再行據實奏聞臣更有奏請者福建本地人做本地武官者多瞻顧鄉情討衆人之好不嚴管兵丁或更庇護是其風習獨藍廷珍管兵最嚴能破積習乃其好處但臣細看兵情因向日操持未足以服其心現在嚴而無恩外畏中離此處稍有關係容臣與之見面時宻宻緩言俾稍濟以恩誼畧示以和平然其人頗具勇邁之氣言之恐難即入仰乞皇上於藍廷珍奏摺中賜以敎訓自必敬凛遵奉實於封疆營伍大有裨益臣謹冒昧奏聞謹奏評論藍廷珍可謂至公且當朕自時加敎誨但恐伊質性粗濁未必能領畧耳俟訓諭之後觀其能否聽受遵承再奏以聞同日又奏為奏聞運麥事竊臣前到浙省聞福建米價大貴六月又復缺雨倉穀大半存價人心不安深屬可慮惟有速僃米糧為第一急務是以具摺奏請撥運温台之穀又請買運山東江南之麥由海運閩接濟及臣抵閩境六月二十日以後大雨普遍早稻全登晚稻皆插米價漸平又䝉濕臣恐買運之麥民不多食難於售消且一經潮濕堆積易壞故臣又摺請停運今接部文運麥之處欽奉特旨准行且命山東江南撫臣先為代買妨果有益無益可行不可行即此可得一實據若不可行自不敢再行儻如有益将來即可僃籌濟閩省之一策臣謹行遣員持銀到山東欲運麥五千石江南五千石令其到閩試行謹将情節繕摺奏聞謹奏試行看諒來米麥均堪食用豈有無益之理但海船潮濕恐致霉浥此說亦不可不慮同日又奏為奏聞事竊查閩省自七月以來晴雨適宜稻苗茂盛八月初五日小雨初六日至初八日風雨甚大山水驟長省城附郭之閩縣侯官二縣髙田俱好低田被淹初九日水退苗出黄損者不多據土人云無大傷礙不過收成畧減一二分況被淹之田十分中止有一分省城之城垣及民間房屋亦俱有倒塌者竝未傷人其福州府屬之福清長樂閩清興化府屬之莆田仙遊等縣亦俱報大雨發水其情形與閩縣侯官相同惟福州府屬之連江縣據報蛟水驟發城内低處水深一丈七八尺城郷共淹斃人口一百九十五名口民人房屋漂流者四百三十户倒壞者一千六百九十餘户營房被水衝壞者一百一十六户城垣倉房俱被水衝壞倉穀兵米有漂流者有浥濕者田禾多被衝壞淹沒又羅源縣報稱蛟水大發山崖塌下壓斃人口共七十六名口廬舍寺廟橋梁被水衝壞者甚多低鄉田禾皆被水淹等語撫臣現監文闈臣即遣福州府知府胡承謀前往親身踏看如果被災即酌量其人户動銀穀給恤接濟隨據稟稱連江縣被水實甚其被災稍重之兵民現酌動銀穀逐户給恤其被淹田地皆為水占且道路橋梁衝壞難行現在﨑嶇遍行踏看其倉穀漂流者一千五十餘石餘俱浸濕現在曬晾兵米浸壞者一百四十五石至羅源縣被水比連江頗輕查係起蛟山崖塌下壓壞人口房屋此一帶人戸俱多係有産之家不甚貧乏無庸給與銀穀其有一家二三口俱被壓斃者量給銀兩令地保買棺埋葬其田禾低處者水淹十分之中二分現在遍行踏看詳報等語八月二十二三等日臣又續據福州府屬之古田永福二縣及泉州府屬之晉江縣漳州府屬之龍溪南靖長泰三縣福寧州及所屬之福安寧徳二縣俱陸續據報大雨水發城垣房屋間被衝倒人口無傷低田被淹等情前來臣亦現令該管官作速細獨甚其查報成災之處應由巡撫衙門具疏題報外臣謹先将情節繕摺奏聞再臣細細查問去年亦是七月内大雨發水稻禾因雨水太大浸濕之後結實頗虚此亦米貴之由今又雨大水發恐稻子又似去年俟将來結實之後餘人民俱稱禾苗比去歲甚盛其被水淹之稻亦俱退出俟稍緩方能定其成數現今省城以及各府米價每石自一兩二三錢至一兩七八錢不等江西之米現報運到交界者巳有一萬餘石臣現㑹同撫臣毛文銓委員接運臣所奏撥運温台倉穀七萬石巳由海運到三萬石臣謹併行具二十八日有仁和縣姦民因出甲光丁之銀攤入田畝鳴鑼執旗入城喊呌罷市撫臣李衛巳将首聞謹奏覽同日又奏為奏聞事竊照福建金門鎮總兵謝希賢臣遵旨定期俾赴京陛見之處謹巳繕疏具題臣到任後細查鎮臣謝希賢於福建水師諸員中係二等熟練者亦算諳習水師之人但居官操守不好料理營伍平常伊有自僃哨船三隻此等船隻皆影射營船奉差夾帶臺灣偷渡之人今年伊亦借稱買運米石到金門接濟兵民其實十停止有一二停載到金門糶買餘者俱載到價貴之處賣利自私又常遣營船四隻託名出哨在沿海一帶装載貨物做生意又好管地方上詞訟徇庇兵丁臣謹将其居官之處據實奏聞謹奏謝希賢到京後朕審觀其人若猶堪朂勉加以敎誨令其旋任如係下愚之流則更選別員前來更替但水師将官大都品行卑鄙皆勇而無耻他省人又不諳水師職任所以甚難爾仍就本省各協營加意物色庶或得之同日又奏為奏聞事竊照臺灣一府孤懸海外總兵一官比他處尤關緊要必須得人方能料理使地方寧謐現在臺灣總兵林亮臣到任以來人人皆言不妥因留心訪察其操守雖不甚好然無狼藉之處惟於營伍兵丁不能整頓約束臣聞雍正三年林亮之舊友陳子芳與兵賭博争鬧訴於林亮将兵鎖去衆兵不服譁噪欲拆毀陳子芳之房林亮即将鎖兵釋放令千把解和而散又雍正三年七月南路兵與縣役毆鬧署㕘将柯英将兵責治衆兵赴府繳納甲胄林亮遣千把解和令散又林亮将一營兵革糧逐令過海到鹿耳門船上兵丁數十人将鎖兵奪回開放後亦不究兵皆玩忽毫無尊畏營規廢弛又因水沙連番子殺人林亮恐傷兵丁将挨番境之兵汛那入裏靣威望亦損如此之員久在海外臺灣地方營伍日就廢弛伏乞皇上另簡一操守好寛嚴相濟之人庶臺灣得以整理至臣所見聞現在閩浙總兵之中未有能確勝臺灣之任者雖海壇鎮總兵朱文居官鎮静然臣觀其才具亦未能勝臺灣之任臣謹将情節繕摺奏聞謹奏林亮原不愜朕意今巳調用矣朱文粗俗庸材前曽向爾面諭實不克勝此任臺灣地方又必熟諳水性之員方始合宜朕所知者惟陳倫烱一人伊尚有求好之心雖非大器姑暫行委任俾且整理副将康陵再三敎導以僃将來之用兹以仇元正補授爾標中軍依朕觀之似係上等人材然廷對一靣之頃亦未必即可為慿爾試用看臺灣鎮一缺暨水師人材其代朕加意旁求留心物色可也同日又奏為奏聞禁止短擺船隻及自僃哨船以杜偷渡事竊查臺灣偷渡一節大為隐憂而短擺之船及自僃哨船二種實為偷渡之津梁葢自臺灣至厦門自厦門至臺灣俱必到澎湖此實臺厦之咽㗋凡一切往來人貨自臺灣至澎湖可用杉板小船自厦門至大担門外亦可用杉板小船惟自澎湖至大担門外此中間一段洋靣水寛浪大必用大船方能渡過向有泉漳一帶姦刁船户借稱往澎湖貿易駕駛趕􅊻大船名曰短擺既不到臺灣掛號又不到厦門掛號終年逗遛澎湖往來於大担門外有厦門不法店家客頭包攬廣東及福建無照偷渡之人用杉板小船載出大担門外送上短擺大船渡到澎湖又用杉板小船装載不入鹿耳門以避巡查徑至臺灣北路之笨港鹿仔港一帶小港幽僻無人之處上岸散入臺地此種短擺從前督臣俱經嚴禁雍正三年船户林合興等一十九船乗巡撫毛文銓初到情形未諳借稱澎湖人民需船装運鹹魚糧米具呈請行澎湖副将董芳亦稱便民為之具詳毛文銓批司道議詳開禁泉州海防同知馮亦隨詳請有方永興等一十三船亦一體准行不知澎湖魚米若到臺灣買賣原有杉板小船絡繹装運不須大船若云此大船往澎湖貿易澎湖地方竝無出産無可販運不過為偷渡之人作接手耳況林合興等内中多有從前曽被查拏案尚未結實非善類又今年福建泉漳米貴廣東之米更貴董芳縱容短擺偷載臺米全賣於廣東不到泉漳是以米價益昻臣訪聞得每米一船索規禮銀二十餘兩自副将以及汛兵俱分其利此短擺之弊也至自僃哨船水師提督藍廷珍金門總兵謝希賢名下俱有其福建本省人為将官亦間有自僃哨船者往往亦載偷渡之人及私出之米臣查提督總兵及将官若欲巡防自有本營兵船可用若云係本地之人多有倚船隻貿易度日如北方人之田土則應編入民間商船號内一體貿易以便稽查豈容此不兵不民之船倚借營私臣於提督藍廷珍相見時巳将此船不應存留正言規勸伊自願改悔不行臣查此短擺及自僃哨船二項實有病於臺灣巳通行嚴禁飭巡查文武如有拏獲者即解臣衙門親審究㕘至副将董芳營私作弊同知馮水師提標中軍㕘将李若驥俱一味因循隱徇巡查疎廢臣另具疏題㕘外所有臣嚴禁短擺及自僃哨船情節謹繕摺奏聞謹奏似此釐姦剔弊實屬可嘉當規訓者戒飭改行甚不法者㕘處示懲卿措置自必合宜無煩多諭也同日又奏為奏請展限切實清查事竊照閩省人稠田少産米不敷民食倉穀一項至關緊要臣查闔省監穀一百四十二萬餘石官民積穀二十八萬餘石未盡實貯有從前各官交盤以價銀存貯者有借碾兵米未經徵還者有從前督撫批行平糶以及碾一實貯惟是總督到任例限三箇月具題保結為期少促地方甚多逺近不一若依限具結恐不能清查到底臣現在具疏題請展限三月容臣切實確查外所有情節謹先繕摺奏聞其浙省倉穀及閩省兵米臣請於展限内一竝清查合併聲明謹奏具題到日自允所請同日又奏為奏聞水沙連社番肆惡情形事竊查臺郡水沙連社各處之番於臺匪未變以前原納番餉銀共三百一兩五錢自臺匪既平之後竟分釐不納地方文武茍了目前遂不深究所有番餉地方官代賠後總兵林亮等招番歸化亦不言水沙連係納餉之番亦不問水沙連原納之餉概謂之為生番招出數人即云巳經歸化漫不防閑以致去年番人屢有燒焚民房殺死佃丁之事署督臣宜兆熊撫臣毛文銓㑹同遣員酌帶弁兵熟番前往相機𠞰懲御史禪濟布攔止今年水沙連番益肆於二月十八日夜大武郡保新莊練總李雙佃丁葉陣等共十一人被番殺死燒屋三十九間焚死耕牛十八隻三月初七日夜船匠曽謙被番殺死二十日夜大里善莊莊民黄賢亮等十一人被番殺死燒房八所焚死耕牛九十七隻四月初四日鎮平莊佃民江長九江永山二人被番殺死十一日夜柴頭井莊賴阿秀一名被番殺死燒房三十二間焚死水牛十八隻六月十六日石榴班莊莊民陳登攀等五人被番殺死數月之間燒殺甚多縱恣無忌此時正值雨水之時難入番界臣一靣批飭移駐防兵兼用民番丁壯給械助力分布防護外臣再四熟思必得於冬春水涸之時示以兵威懲其首惡令認賦餉然後再加撫恤始可懲創兇頑寧静地方其遣委員弁酌用兵番及一切籌糧籌賞之處俟臣再行詳細具奏所有水沙連番肆殺無忌必應𠞰懲情形臣謹先繕摺奏聞謹奏應如是此種番人猶如牲畜有何知識自係在臺文武撫馭不得其宜所致兇悍不法之風豈可任其滋長亟當先以兵威懲創一番使被震懾而後繼以恩恤方獲寧帖然總以斟酌得人為要斯乃處事之根本也同日又奏為奏聞鹽政情節事竊照閩省鹽政奉有聖旨交臣與巡撫毛文銓辦理欽此欽遵臣自入閩境到浦城縣地方即聞民間鹽貴只以浦城一縣而言向來定價一分二釐一觔今賣二分四釐較前倍増當時官賣反不至此其餘沿途府縣鹽價亦俱昂貴細查縁由各販鹽水客及管塲管鹽各官俱稱閩省今年自正月至四月雨多各塲俱不得晒晾鹽少是以價貴臣查因塲地雨多産鹽頗少以致各處價貴固是大槩實情然一歲之中有多雨之月必有少雨之月數歲之中有多雨之歲必有少雨之歲全賴人力調劑於天晴産鹽之時趁其價平多方設法買收存積一遇天雨鹽缺則将積鹽發賣接濟故可使鹽價常平民食無缺而裕課之道即在其中去年以來前則滿保患病不籌收積後則毛文銓初到不知收積是以一遇鹽貴束手無䇿臣雖目撃價昂無鹽可發勢無如何惟将價值可以略平之處稍為酌平不敢太減塲中鹽本現貴若減價太多恐客販不前反致絶鹽此現在閩鹽之情形也臣受恩深重又專理鹽務敢不盡心籌辦冀於就緒今福建鹽務大段情節臣巳查得十之六七至於細微曲折之處尚未詳確謹就臣所巳知之七大處銷鹽多寡縁由幷各塲弊端以及課羨盈絀情節另摺開呈御覽外臣因現在鹽價未平各塲又無積鹽接濟查得臺灣府尚有積鹽七萬餘石隨與撫臣毛文銓商酌檄調六萬石到福泉漳三府且濟目前至於通身料理之處臣惟有盡此寸心隨查隨辦未明者不敢孟浪既知者不敢緩遲以期仰副聖主委任之至意而巳抑臣更有請者運使一官乃承上接下之員勢不能少閩省從前滿保及近來毛文銓辦理鹽務雖不設運使然皆調興泉道陶範在省一切令其料理是無運使之名實司運使之事但查陶範雖熟於鹽務臣訪有一二處鹽埠陶範出本令人出名行鹽漁利徇庇親友頗有弊竇如此之員豈容久任貽誤俟臣察確題㕘臣意與其調用外道不若設一專員查閩省屬員之中泉州府知府張無咎人頗明白辦事直爽仰乞聖恩或将張無咎擢用臣庶獲指臂之益但張無咎竝未辦過鹽務臣亦不能十分確信其必能倘聖鑒中有守廉才敏知曉鹽務之員賜放一人助臣料理更為有益如䝉俞允臣查雲南係以鹽驛道管鹽兹福建驛務不繁向係糧道兼管仰懇皇上賞放辦鹽人員即授為福建鹽驛道於管轄料理似為妥便再者調劑鹽政塲員最關緊要臣查福省各州縣皆有本地之事難以委為塲員而同知通判如臺灣厦門者亦難調委所餘之員除差委外其中確可任塲務者頗難其人伏乞皇上揀發不拘同知通判知州知縣之内亷謹明白者四五人來閩委任場員遇缺仍以應得之缺題補實於場務有益理合繕摺一并奏聞統祈睿鑒謹奏覽所奏鹽務各項情節非實具報效赤衷不能講求籌畫至於如此之詳而且當也卿乃上蒼見畀國之棟梁朕之股肱豈泛泛具臣所可比擬将奏摺與怡親王及廷臣數人㕘看莫不以為詳細妥協朕嘉悦之懷實難筆罄巳照卿所請簡用一好運使來閩矣陳豫朋係屢經試驗之員大約必能助卿料理於其到閩任事後應如何辦理處與之斟酌允妥具疏題奏以聞至所請同知通判等員亦經諭部必令揀選優者發來陶範聲名朕先聞其不妥隨經詢問滿保據稱居官好曽於大計卓異毛文銓亦言其好朕雖未識伊面光景不似純正且滿保黄國材之所卓異尤不足為憑也留心試用之雍正四年九月十五日浙閩總督臣髙其倬謹奏為奏聞事竊查福建近自八月十五日以來雨水調勻各處稻田禾苗甚好延建邵汀四府最早之稻巳有刈穫者收成八九分不等晚者尚未收割現皆吐穗據民人等云看來亦可以有八分九分收成俟收成後臣将分數確奏外再自八月十五日以來各場産鹽兩汛之期比前期亦俱頗有所産理合一并繕摺奏聞謹奏深慰朕懷雍正四年十月初二日浙閩總督臣髙其倬謹奏為奏聞浙江洋盜情節事竊查福建浙江二省海洋盜賊一事闗係最為緊要近於雍正四年七月初五日有福建同安縣漁船户施寳興之船在浙江黄巖鎮左營所轄之青嶼洋靣捕魚遇賊船一隻被刦七月十七日有福建莆田縣商船户陳瑤之船在黄巖鎮右營所轄之石塘龍目哆洋靣遇賊船二隻被刦其賊又在黄巖鎮右營所轄之佛頭山再刦一船将陳瑤之船放回又八月初八日有福建海澄縣商船户林盛晉江縣商船户紀合利二船同於黄巖鎮左營所轄之三門洋面遇賊船三隻被刦又有福建晉江縣商船户林徳亨亦於八月初八日在黄巖鎮左營所轄之花嶴被刦又浙江永嘉縣商船户諸信先之船亦於是日在花嶴被刦陸續據浙江各屬文武詳報到臣又據温州府同知楊吉祥宻稟賊船大小四隻約六七十人船上插旗書刦富濟貧字様賊首穿大紅羅漢衣坐大紅坐褥賊夥皆穿紅緑緊身語音係福建廣東之人船上有鳥鎗一二十桿等語臣聞報隨飛飭浙省水師各鎮協營出洋哨巡併力查拏𠞰緝外恐賊船或趁風南下復飭閩省各水師處處出洋堵緝又恐各員以虛文推延每營皆揀擇熟諳水務之遊守千把指名令其出洋巡拏仍恐各員憚於逺出只在近處停泊即稱巳到外洋以致海盜來去任意捕緝無效臣查浙江太平營㕘将陳勇現在閩浙水師各員中熟諳海道無有過之者今運穀到閩臣委令出洋遍巡并派閩安協守僃烽火門千總帶領兵丁配給船隻賞與盤費口糧令陳勇帶往自閩而浙遍歴各島澳直抵盡山花鳥哨巡緝捕其浙江一帶水師之巡哨者俱令在各所轄之外洋與之合哨則各員不能躱懶而哨巡益嚴宻矣復慮巡查既宻各洋盜設或潛囬本地因遍行福興泉漳四府各處文武宻躧嚴拏又宻札水師提督藍廷珍俾其併力查拏總之此項洋盜臣期於必得乃巳至黄巖鎮總兵馮廷輔之巡查廢弛各該管将僃千把之玩違溺職實有難寛縱者如七月八月總兵馮廷輔造報俱云巡哨無誤而千總林選更報竝無失事上下欺飾總不哨巡任賊刦掠且於事後撈賊所棄之綿花将鎗傷客人拏解地方官指為本案之賊希圖以無辜之人頂案了事總兵無能員弁不肖乃至此極臣另具疏嚴㕘以懲不職至臣蒙聖恩畀以海疆重任不能整飭屬員實力稽查前無弭盜之方後無緝捕之效遙瞻闕廷愧恧難安臣謹於另疏請賜嚴行治罪以為不能盡心封疆者之戒為此繕摺奏聞謹奏海洋之盜非陸路可比何能尅期擒捕徐徐設法巡緝務令終能就獲斯可矣但觀夥賊刧掠情形匪伊朝夕前無弭盜之方亦咎所難辭馮廷輔原因其明白曉事擢用總兵諒伊自必格外圖報昨互揭一案朕即甚為疑訝隨經留心訪查又多有道其好者所以姑留至今豈料如此負朕要當嚴加處分以為辜恩者戒同日又奏為奏聞清查臺灣穀石事竊福建通省倉穀臣現在徹底嚴查務使清楚巳經奏明在案其臺灣府各縣所存之穀更為緊要臣查得大概現存倉穀内存價未買者共有三十餘萬石又有以官莊折價應行買補之穀共二十五萬餘石統計未經買補穀共五十餘萬石現存之穀無幾問其所以動穀未買之故有借給兵米者有在本地平糶者有因原任巡撫黄國材奏每年運臺米五萬石接濟泉漳無米可運借穀碾米者更有從前因厦門倉虧空那動撥補存價者種種不一而所存之價大半不敷買補臣現在徹底清查容将各情節據實具奏其中情節可惡者臣具疏嚴㕘其如何補足之處臣一併籌酌奏聞為此謹奏所奏是積貯最為要務在臺郡尤當竭力籌計不容稍有疎懈者也同日又奏為宻奏事竊臣仰荷聖恩令将議政所奏之事鈔發示臣臣奉到部文數件之内見有吳量海降人和羅爾邁等逃去一事稍有關係謹就臣庸下之見仰陳聖聽臣以為來降之吳量海人等該管之人理宜小心詳宻照管何可令其逃去但今業巳逃去就事論事正可因此愈使知聖度之廣大聖恩之髙厚和羅爾邁等若在外邦愈増其思戀仰慕之懷若其回來愈増其堅定歸依之志且使内外臣前運米曽經推河内外之地彼時我大兵襲擊深入喀爾喀扎薩克等各令所屬之人移近居住暗云襲擊之師失利宻探細究其語從安住推河一帶之厄魯特部人遙傳而來又和託海吳量海之馬厄魯特部人多有之以與之往來貿易故也睿鑒謹奏覽雍正四年十月十三日浙閩總督臣髙其倬福建巡撫臣毛文銓謹奏為奏聞𠞰懲水沙連兇番情節事竊查臺灣水沙連兇番抗餉不納焚殺無巳必須少加𠞰懲使知斂戢所有情由業經臣等俱奏明在案今巳屆冬令山溪水涸正可𠞰懲之時臣等㑹調臺厦道吳昌祚到省復靣加詳問再四熟商委吳昌祚帶兵三百名熟番四百名總行料理一切𠞰撫之事并委北路營㕘将何勉協同料理其下分為兩路一路從南投﨑而進用兵二百名熟番四百名千把共四員令淡水營守僃戴日昇帶領前進一路從竹脚藔而進用兵二百名熟番四百名千把共四員令原任淡水海防同知王汧帶領前進其糧餉事務檄委臺灣府知府孫魯總行料理又照㑹臺灣鎮總兵官林亮酌派遊守一員量帶兵丁在進山要口住扎協助再派該鎮右營守僃張文耀帶兵一百名在羅漢門一帶彈壓彼處生番遥助聲勢并照㑹林亮臺灣府城緊要不可逺離該鎮只在府城彈壓統行照料䇿應其一應弁兵鎗礟軍械統酌派給令臺灣道吳昌祚於回臺後在十一月内舉行臣等細籌此𠞰番之法應先懾其膽再孤其黨然後擒其首兇令納舊餉庶知遵法不敢肆行所有一切機宜巳詳細僃説與吳昌祚令其照行至此番舉動止期勒拏首惡令認舊餉以𠞰為撫非極兵威臣等觀吳昌祚雖非肆應之才然尚朴實小心必能謹慎遵照不至好勝喜功是以委令總理又原任淡水同知王汧頗能勤於辦事甚得番人之心守僃戴日昇人亦實力辦事是以臣等将王汧暫留并戴日昇分委辦理謹将情節㑹摺奏聞謹奏委用料理俱屬妥協若照所畫機宜屬員咸能實力奉行可收安戢之效矣浙閩總督臣髙其倬謹奏為奏聞事竊臣欽奉皇上面諭宜兆熊何如可勝督撫之任否令臣細看具奏欽此臣遵旨詳加細看正在欲繕摺奏覆宜兆熊欽奉聖旨補授湖廣總督臣謹将臣所看者仍謹奏聞臣看宜兆熊操守廉潔人謹慎辦事細心於好中求其未及之處反在好潔太過不能入泥入水一直低頭做去不求人知今現入京陛見一經聖訓必識見長益規模開擴比舊不同再臣細看宜兆熊於同事之中甚能讓人而小節之愆介介於中不能去懷臣愚昧之見以為商酌公事關係吏治民生不宜故示推讓至於儀節之間無闗政體者不必與人計較致生芥蔕此等處亦乞皇上敎誨臣與宜兆熊極相敬好總為成就國家人材謹行詳細奏聞伏祈睿鑒謹奏朕自然盡力指示之前命傅敏往署楚督印務臨行時朕曽降有諭旨宜兆熊到京後必多留數日加以訓勉俟伊領悉朕意所向始令前來莅任頃宜兆熊到京面朕隨将前諭述知觀其根本端正可稱總督之任但伊自奏不識字此處稍為之不足然亦無妨同日又奏為奏聞拏獲洋盜事竊照浙江黄巖等處洋盜情節并臣飭行浙閩兩省将僃出洋查拏之處業經奏明在案續於九月二十日據閩安協報稱右營守僃施大英出洋巡哨恐坐哨船賊人遥認即先揚帆逺颺改坐小漁船放洋一日夜到外洋東湧山澳邊遙望見賊船二隻果插有一桿白旗夥賊多穿紅緊身隨開鎗攻打賊船亦放鎗拒敵時因風起賊船乗風東走賊船篷大漁船篷小追趕不上致被向大洋走去等因臣隨嚴行責查令各處并力窮追外因思賊船見有官兵攻緝自必乘便散斗各歸登陸臣即飛飭各沿海文武上緊於陸地嚴宻查拏兹陸路經水師提督藍廷珍差原任千總黄耀顯在涵江地方拏獲陳尾係賊船舵工稱為二爺又興化協副将朱杰拏獲賊夥陳盛老又方河即方珠二名又臣差水師守僃魏國泰在厦門劉五店拏獲夥賊烏脚菊天送許受三名又海壇鎮臣朱文遣員拏獲張輝張旺朱恩郭麟陳秦陳勇六名又仙遊縣知縣蕭系閎拏獲朱祐一名共巳獲一十三名臣隨經調解陳尾親審伊将刦船得財做舵工稱二爺之處俱即直認不諱惟賊首及窩家姓名堅稱不知雖經夾訊終不供出臣又調陳盛老親訊據其所供合之各處所問各賊口供賊首呌陳興漳州人曽攻過臺灣在石瑪住窩家呌黄輝超係漳州人在浙江溫州府平陽縣澗宅住係監生一應軍器米糧俱係伊出的贓物亦在伊家同夥先有二十二人後有六十餘人連刦是實因九月十三日在東湧遇兵船攻擊於十四五六等日各登陸散斗等語臣現在遣派員弁分頭宻拏賊首窩家及夥賊人等務期必獲外所有巳獲洋盜一十三人之處謹先繕摺奏聞謹奏覽奏此案大有頭緒矣夥盜既經擒獲如許名數則海洋不難肅清可嘉之至從前疎防者業既懲處現今捕獲之員弁兵役亦當分別奨賞題請議敘以示鼓勵同日又奏為奏聞事竊照福建田禾雨水情形臣屢經繕摺奏明今已屆十月萬寶告成之候臣遍令細查據延建邵汀四府所屬各縣禀稱稲穀收成約有十分九分福興二府屬收成約有九分八分即被水獨甚之連江縣其髙田收成亦有八分泉屬收成約有八分漳屬稻穀八月内連次發水通身計算田畝十分之中有一二分被淹其餘髙田俱好牽算約有六七分收成惟詔安一縣八月發水之時未據報災今忽報災臣現委員踏看確查容據實具奏臺灣府據報約有九分年成現在省城上米每石一兩四錢次米每石一兩三錢興化延平建寧邵武四府米價每石一兩一二錢不等汀州泉州二府米價每石一兩五錢漳州府米價每石一兩七錢臣謹一併奏聞謹奏今歲閩地荷䝉上蒼慈恩收穫乃至如此實出望外朕慰悦之懷筆不能盡同日又奏為奏聞事雍正四年九月二十二日厦門地方因安溪縣典史陳永芳徵追屯欠比責保長姦棍倡令罷市旋經諭開臣查典史徵追屯欠係奉上司差委乃係辦公比責未為不是姦棍即敢罷市不法巳甚斷不可寛除令查拏為首之人審明杖斃以懲姦棍以止惡習外所有情節臣謹繕摺奏聞謹奏應如是懲治以警刁頑硃批諭㫖巻一百七十六之五欽定四庫全書硃批諭旨巻一百七十六之六硃批髙其倬奏摺雍正四年十一月初八日浙閩總督臣髙其倬謹奏為奏聞事竊查臺灣田土向當臺灣初定之始止臺灣一縣之地原有人户錢糧故田土尚為清楚其諸羅鳳山二縣皆係未墾之土招人認墾而領兵之官自原任提督施琅以下皆有認占而地方文武亦占做官莊再其下豪强之户亦皆任意報占又俱招佃墾種取租迨後佃户又招佃户輾轉頂授層層欺隠按其賦税每田一甲不過内地之十餘畝而納八石有餘之粟似種一畝之田而納十畝之糧類若田少賦多然究其遞相欺隠畝數則種百畝之地不過報數畝之田實係田多糧少今欲徹底清查海外巖疆恐其紛擾相延愈久清理愈難因田產經界不清居人名户亦混編立保甲止是大概欲驟更變未敢輕言臣現詳訪熟思俟得一妥貼可行之法始敢具奏請旨遵行外至彰化一縣新經設立田土錢糧俱為有限其所管有藍張興一莊其地向係番人納餉二百四十兩原任總兵張國原認墾其地代番納餉招墾取租數年之前提督藍廷珍轉典其莊現聚墾種田土者已二千餘人地方文武官因生番到其處殺人以為開田惹番意欲驅逐墾户以地還番臣思此處若不令開墾當禁之於始今已有二千餘人又有墾出之地一經驅逐則此二千有餘失業之人俱在海外置之何所但若聽業主私據佃户混占不於起初清理又必似諸鳳二邑之流弊臣意欲将此田總行清查所有田畝令各墾户報出認賦即為永業俟報明之後不必照諸鳳二邑之例以一甲之田定粟八石止照内地按畝定糧量寛其力以下則起科約可得額賦一二千兩或再稍多亦未可定竟将原納二百四十兩之番餉題請開除藍張二家總不許覇占并趁量田之時兼查人户編清保甲更立四界令官嚴查不許墾户侵耕出外似屬一勞永逸乆長可行之道臣巳檄行臺灣道府同彰化縣詳議如係可行即一面詳復一面辦理所有情節臣謹具摺奏聞謹奏區處雖是何若密喻藍張二姓令其自行檢舉將田糧推卸於各墾户不尤爲省力乎同日又奏為奏聞設法操練水師將弁兵丁事竊臣看得福建水師兵丁内頗有不諳水務之人千把多係中等將備亦然浙江水師與福建相仿而本領更覺不及臣細訪衆論㑹其大意熟悉水師之人内有三等其最高者不但本處海洋情形無不熟知即各處港口之寛狹沙線之有無何處外洋島澳是洋盜寄泊取水之所何等日色雲氣是将作颱颶回瀾之候因其熟極故能生巧實於廵防有益此為第一等其次或熟知數處情形或熟知本處情形此第二等又其次者於本處情形亦知大槩在船不暈能上下跳動運使器械此為第三等其僅不甚暈吐只坐艙内不能上下跳動運使器械者此種不過充僃人數而已現在閩浙水師將弁兵丁之中如第一等者或一營之中竟無其人或僅有二三人而年近老邁筋力就衰者居半所有之好者次好者不過第二等第三等之人而僅不暈吐不能上下跳動運用器械者參半此等不知港沙之可以行走與否不知島澳之可以寄泊與否行船擱淺撞礁立有性命之虞即内洋遇賊尚難期其緝獲安望其廵捕外洋之盜臣愚昧所見惟設法勤令操練則二等者可至一等三等者可至二等或亦至一等即僅不甚暈吐者亦可使之能上下跳動運使器械漸習漸精查閩浙之例本處巡哨之兵只在本處洋面巡哨即總巡分巡之員亦只福建者巡福建浙江者巡浙江如此行走操練止熟本處不知他處止知本省不知外省臣欲稍為變通每年總巡分巡及在本洋巡哨者俱仍令照常巡哨外臣每年再於此外另𣲖熟悉之員帶領官兵配給船隻南風起時令自閩省直巡到浙省盡頭北風起時復令自浙省回棹直巡到閩省盡頭并令俱經由外洋島澳令本處巡船與之在彼合哨不到者據實揭報題㕘如此則各處哨船不能偷安而外洋大盜亦難蔵閃且各處哨巡官兵常到外洋經歴既熟自漸無畏怯不憚逺出矣至此巡查之員弁兵丁臣𣲖令極熟者五停參以次熟者五停令其同往沿路所過毎到一處即添帶其官一員兵十名亦令同往俾其操練則二等三等以及稍生之官兵往返一番自必俱有長進若遇有海運米穀等項之事或到江南山東廣東等處臣亦酌量𣲖配官兵令其押船行走所走之處愈逺則所知情形愈廣矣之用臣查現在閩浙二省水師各員中有浙江陸路太平營參將陳勇水務極為熟悉置之陸路無用臣欲保題水師副將但思補一水師副將各有汛守之地臣難以不時調遣令其巡查海洋臣查現出有浙江陸路平陽協副將一缺臣請以福建福州府城守可於臣標及将軍標撫標各員内擇其好者代理題請外謹仰懇聖恩伏乞睿鑒臣愚所見統祈皇上訓示謹奏所奏朕欣悅覽之有何可諭但自今既令官兵衝風渉險來往大洋則船隻堅固無虞最係第一要務若審查稍有未妥寧先料理船隻為是同日又奏為奏聞事竊查行刦浙江黄巖鎮所轄洋面之洋盜臣業将情節及已獲夥賊十三人之處繕摺奏明續據臣前所遣之員於浙江溫州府平陽縣澗宅地方拏獲窩家黄輝超又拏獲夥賊二人再水師陸路各營及各縣共又拏獲二十八人前後共獲四十四人俱係正實此案洋盜細問各供賊首實名陳㑹又叫陳尾在安海住先在厦門做客頭因攬偷渡懲處後朱一貴之變伊領原任總督滿保告示過臺張貼得外委劄付在水師提標中營喫糧因革名糧舊年纔往溫州入賊夥起初是二十二人後打刦各船又押令入夥并曾分贓者四十餘人臣得此確供正遣員飛拏陳㑹隨經水師提臣藍廷珍亦在厦門先問出姓名遣員到安海拏獲陳㑹妻子又拏獲其兄陳祖據供陳㑹於九月十六日夜到家住一夜即出外並不說去向等語臣又細問細訪陳㑹巳往廣東的有消息臣選差的當之人并訪出認得陳㑹之人令一同前往密行查拏陸路提臣丁士傑水師提臣藍廷珍亦各遣人前往宻拏共巳遣有六起人前去再陳㑹曽做客頭或恐往臺灣亦未可定臣亦遣人密行查拏又懸重賞緝捕總期獲而後巳再前供出之賊首陳興巳經查有其人現在臺灣確問不係實賊臣巳止拏理合一并奏明謹奏此案辦理甚好賊首料必不致逸脫同日又奏為奏聞事竊查原任福建興泉道陶範管理鹽務倚恃熟習欺朦作弊臣將現得之款㑹疏題㕘續又經臣㑹同撫臣毛文銓查伊凡兌收鹽課銀兩俱外有加平之費每百兩共得銀一兩五錢又查經管理莆田場鹽務興化府通判張宏祚報出陶範用諭帖吊出已入公倉未給價之鹽一萬六千擔運賣臣等查此項鹽觔並未納課費顯係偷賣正在徹底清查確實忽於十月二十三日夜據福州城守營及侯官縣報稱劾道陶範託稱欲自寫辦鹽清單趁空自縊身死并送到伊桌上遺稟一封除行令確騐報殮外臣對衆拆看遺稟大意稱伊毫無貪黷一𣲖委曲可憐之詞又稱水客陶大張永祥與伊無渉並未𤼵本各水客伊無所需索又另單四紙其中最要者云得平頭四千餘兩係伊養㢘又所賣之鹽係用為部費一千四百兩與原任巡撫黄國材四千兩送原任總督滿保盤費二千兩又署藩司應得平頭銀四千一百餘兩補前布政使秦國龍丁士一舊欠三千四百兩存銀七百兩等語臣何敢自執己見不行自返但細查遺稟尚是飾詞除將各項情節臣另㑹疏請審外所有遺稟另單臣一一照寫不敢封入匣内另用夾板交臣進摺家人齎呈并乞皇上遣員騐明謹奏此事已降旨命爾審理矣陶範之稟是否飾詞且置不論只在一死即知其非端人也雍正四年十一月二十八日浙閩總督臣髙其倬謹奏為奏聞年成米價情形事竊查福建今年延建邵三府收成有九分以上本地民食足用且頗能有餘興化府收成有八分以上民食可以自敷汀州府收成有七八分可足八箇月民食福州府收成有八分以上可足七箇月民食此六府收成之後米價俱比前頗賤獨泉漳二府晚稻收成僅有五分民食殊覺不足米價亦不少減不可不急行預籌即福汀二府亦須早籌接濟其現就本地料理之處臣巳将江西運到之米調一萬石運赴省城将撫臣毛文銓所賣之米三千石運赴南澳将存省臣前所運溫台之榖再運二萬石到漳州運一萬石到泉州運六千石到厦門運四千石到詔安至臺灣之米舊例每年買運五萬石以濟泉漳今年又欽奉特旨再加運十萬石又臣請開通米禁亦奉聖恩允行在案今年臺灣有八分收成而臺灣倉榖從前撥用存價十停之中僅有一停實貯約計應買補者六十餘萬石若再加十五萬石買濟之米及臣請泉漳之民買運恐本地力不能支不可不詳慎顧慮臣現詳細酌量其照常年買運之五萬石本地買補之倉穀酌其可能量勢買補再外省接差員前往等催運濟兼試行領運山東江南之麥又臣酌量暫動鹽課盈餘銀五萬両令差員等帶往上江一帶買米隨帶運回閩省平糶仍繳本還庫開册報部一通融間似於閩省民食有濟又前䝉聖恩截留浙米十萬石易穀運閩近經浙江撫臣李衛奏請以此米平糶將所買之穀米運閩接濟臣現遣其截漕之米浙省既以易穀為難閩省復又待米頗急臣現咨商撫臣李衞欲即將此十萬石之米以趁冬末春初北風多有之時開行運閩於事既撫臣汪漋濟而将来之倉儲亦豐臣之所見如此至臣到閩尚未經過一次青黄不接之候雖預揣情形亦恐詳細籌酌具奏臣謹將情節繕摺奏聞謹奏覽同日又奏為懇請移駐道員改設通判事竊查福建形勢臺灣最為緊要而厦門澎湖係其咽喉鎖鑰之處厦門地方駐兵既多而五方雜處一切貿易并游閒覓食之人以及包攬之客頭偷渡之姦民無不羣聚於此管查辦理其責綦重澎湖地方既駐一協之兵又為過臺必經之要地亦甚有關係而厦門歴来則以隔兩重大洋之臺厦道兼轄只有虚名並無實際駐厦門者僅一泉州府同知官輕勢既不重事繁力亦難周澎湖又僅有一巡檢微員而與副將對掌文武之任司監放糧餉稽查偷匪愈覺輕微均難資彈壓辦理之益臣留心細察厦門係泉州府同安縣所屬之地興泉道原係兼轄興化泉州二府之員而以厦門割屬隔海之道員既已鞭長不及而泉州一府之中現有専司之知府可無庸更令興泉道同居一城臣愚昧之見請將興泉道移駐厦門管理一切事務而以現在之同知佐之則於彈壓料理事勢既覺妥協管辦更為親切至澎湖之地臣請添設臺灣府通判一員駐劄管理而將巡檢裁去似於監放巡查諸務有益除臣另行繕疏具聞再興泉道既移駐厦門似可將同知移駐澎湖但臣查厦門地要事繁必得道員同知共理方覺妥協難以移調其通判一員不得不請添設又福建三面踞海而向例只有汀漳一道帶巡海之銜實難謹一併奏聞謹奏覽同日又奏為奏聞拏獲海洋盜首事竊查浙江黄巖鎮所轄洋面商漁船隻疊被刦掠拏獲夥盜其盜首陳㑹逃往廣東經臣及水師提臣藍廷珍陸路提臣丁士傑分頭遣人密往查拏奏明在案兹於十一月二十二日據藍廷珍差往廣東緝賊之功加金祿報稱於十一月初七日在潮州平海地方認著陳㑹又名陳尾隨即拏獲報知潮州鎮添兵押解不日到閩等語所有拏獲盜首之處臣謹繕摺奏聞至此案洋盜人人狡猾不吐實供臣近拏到林六一名即係溫州府同知楊吉祥稟中所稱盜首係白鬚之人雖非盜首亦夥内緊要之犯經臣親問盡吐實供一總起首同謀及被擄共有六十三人其被擄燒火煑飯無排行者七人實在夥盜五十六人有鳥鎗四十二桿并刀鏈等物其旗係打刦的紬布縫的等語臣查此案洋盜前後現獲四十七人餘正夥盜九人未獲除密緝務獲外所有已獲各盜解浙歸案審結其鳥鎗如何出去之處臣究明㕘處謹將情節一并奏聞謹奏此案盜犯不旋踵而就獲實屬有功無過朕甚爲嘉悅同日又奏為恭謝天恩事竊臣齎摺家人常徳於雍正四年十月初六日回閩所捧摺匣在路上墜騾壓損蒙皇上天恩不治臣差人不慎之罪換給摺匣臣悚懼無地巳將家人常徳重處臣實自愧靡巳謹繕摺恭謝天恩謹奏程途遥遠安能保無失誤況此事朕竟不知久經有旨諭明奏事人等凡遇損壞摺匣即行換給無庸奏請𩔖斯者不可枚舉何必如是過慎耶雍正四年十二月二十日浙閩總督臣髙其倬謹奏為奏聞事竊臣細看福建情形福泉漳汀四府産米不敷民食泉漳更甚每年至二月三月平糶不能不行米各官交盤存價收受而所作之價又係不敷買補之價雖有不肯收受之員加以上司之抑捺衆口之調停即不得不收是以日見空虛竟無彌補臣現在徹底清盤務必懲革此弊容臣查清另行具奏其一則年年平糶之價太賤即舉福州一府而言歴年即極豐之嵗最賤之價米未有賣至一兩一石者向時督撫但討目前百姓之稱揚不顧將来買補之無法平糶之米每石價減至一兩且有不及一兩止賣九錢者此雖米石極賤之時所不能有之價下屬奉批收存此價欲買之本處則本處無一兩及九錢一石之米可買欲買之外省外省雖有一兩及九錢一石之米可買其各項運脚從何而出是以屬官之中亦有尚欲籌補者縁價短糶之價一年賤似一年所以從前有糶價太賤且在年内即行平糶者不知此不過米價稍貴非飢荒可比米價稍貴乃遂如此若實遇荒年將何以處臣細看未妥併此糶價太賤一莭若不竭力挽回則福省之倉儲惟日就空虚民食終不能接濟臣之愚見如福州府来年平糶視米之程分髙下每石定以一兩二錢或一兩三錢穀亦視其程分髙下每石定以六錢五分或六錢其各倉之穀亦有在倉年久及當日收倉之時程分即低者再隨宜酌定至於各外府州縣亦隨其地平時米之貴賤定價總之必計算本地秋成後既平之價為凖計久逺止知目前得賤價之米之好不知將来無接濟之米之苦必以為臣不如從前督撫之愛民加以閩俗浮薄刁棍復多而紳衿之多事者又從而和之恐有扞格騰謗之事但臣為地方長久之人情安定辦理曉諭一切易行所有江南之穀久伏乞行走不能刻期至閩臣謹一併奏懇聖恩謹奏覽同日又奏為奏聞事竊福建平糶一事臣已於另摺詳奏其糶價之多少既須斟酌即糶期之早晚更要的當臣細察泉漳二府情形目下冬底雖則米貴年内尚可支持不應急急平糶若此際尚在可緩即行平糶来嵗緊急之時反致米石歉少無以應濟乃泉州鄉紳詹事府正詹陳萬策於十一月十五葉祖烈應云在此數年看光景此時尚未應平糶及散後陳萬策傳知府户房令查倉穀數目又連日知㑹各舖鄉保令赴各衙門具呈又屢屢與提臣丁士傑說令咨臣與臣㑹奏此其意亦係因地方起見亦係欲稍討同鄉稱好但止知一面不顧全局而閩省人情輕而易動見此光景刁姦之徒未免踴躍有穀之家蔵起不賣價反愈貴提臣丁士傑初從貴州米賤之省来閩嘉湖被水海口之禁不可開臣因詳知泉州嵗内可以不用平糶只運穀往泉但使民知米穀有備而不敢輕許平糶今又半月外米並未到泉而泉州米價業已少減可見米貴非本地斷米反因此一番多餘之事而起至平糶到来春開正臣看地方光景再酌量緩急而行必不敢致有誤事所有聞再晉江縣有監生考授州同李遵仁係本地富家妄於聞謹奏覽同日又奏為奏聞事竊照福建撫臣毛文銓為因藩庫存銀不敷解京將部撥餉銀三十一萬兩仰請諭部免解一摺奉硃批該部議奏隨經部議以毛文銓所奏前後自相矛盾恐有虧空掩飾情弊令臣將該撫所報實存庫銀并現在徵收銀兩詳細確查果並無虧空實為邊省兵糧起見則所撥銀兩不妨改留閩省若有虧缺那移借此為掩飾彌補之計令臣即行據實題㕘著落該撫暨布政使各名下勒限追補仍将該撫從重治罪等因奏覆奉旨依議欽此欽遵移咨到臣該臣行據布政使沈廷正確查詳報臣又親身盤騐詳細核查福建藩庫現經撫臣毛文銓所報實存庫銀及現在徵收正項銀兩俱無虧空惟部撥雍正四年兵餉項下撥有本年應徵地丁銀六十五萬一千五百八十七兩零州縣徵解未到而兵餉需發屆期難以緩待業經前署司陶範任内将現存各案庫銀墊給雍正四年兵餉二十五萬九百八十七兩零據布政使沈廷正造入交盤清冊在案即現今尚應預發雍正五年春季各營兵餉州縣徵解未到亦俱在現存各案庫銀墊發實係墊𤼵各營兵餉所有臣盤查撫臣毛文銓所報存庫并現在徵收銀兩並無虧空其清冊已於交代錢糧事經毛文銓㑹疏題報送部在案兹據沈廷正核造所入所出細冊前来臣謹送部核查外臣思閩省係邊海之地臺灣澎湖各營俱隔大洋南澳金門厦門海壇各營亦隔海港所領餉銀船帆載往須候風汛不能刻期而至歴来如臺灣澎湖南澳各營兩季總發夏秋兩季即於二月内一并具領冬春兩季即於八月内一并具領其餘金門厦門海壇俱預在每季兩月之前具領然後可以如期放給即如雍正五年春季之餉戸部撥定之文尚在来年正月始到而臺澎南澳及各處来年正二三月之餉有在今年八月内預𤼵者有在今年十一二月内預𤼵者不能不稍有存餘以備墊給又發臺灣暨外省買米約須十餘萬兩以及每年買銅運銅并預𤼵来年辦銅修造戰船辦解顔料各項皆須給發均在撥餉之外在部撥實有盈餘應解之處而在閩省則有存備預發之項臣再四詳計閩省情形應請留餘四五十萬兩方能週轉給發所有前經撥解之三十一萬兩零臣謹遵旨確查仰懇聖恩停解另疏題明外所有情節理合繕摺奏聞再臣前欽奉皇上交臣怡親王議奏摺一件原任福州將軍宜兆熊奏摺一件係宜兆熊請於閩省存留二年兵餉之事臣查福建地雖邊海若每年有留存四五十萬兩即可週轉給發其請留二年之餉似屬太多無庸請留臣謹將原摺另封恭繳謹奏所奏甚屬詳晰知道了近日怡親王擬定一例極爲允協庫餉存留在外而不令支飾舞弊可謂料理外省錢糧之上策開印具題朕准行後爾等自得備悉也雍正五年正月初七日浙閩總督臣髙其倬福建巡撫臣毛文銓謹奏為奏聞𠞰撫臺灣兇番事竊查臺灣水沙連兇番自朱一貴之變不納額餉且肆行焚殺事案甚多應示懲創使知斂戢臣等委臺厦道呉昌祚面行說與𠞰撫機宜令酌帶官弁兵番於冬深水涸之時進𠞰前巳㑹摺奏明呉昌祚回到臺灣即酌帶官兵番壯前往於雍正四年十二月初三日直抵山口查水沙連各社番内惟水裏社番骨宗最為兇惡而附助為惡者係哈裏難社一居南港一居北港呉昌祚等酌量分為南北二路吴昌祚帶守備戴日陞張文耀等領兵番從南路而入參將何勉原任淡水同知王汧帶兵番從北路而入所過番社不許弁兵一人入寨騷擾又先遣熟番林三等入山曉諭各隣近番社今官兵所𠞰者止水裏社行兇之惡番骨宗等與助惡之哈裏難一社與他社之番無干爾等不必驚怕但自歸誠向化必行寛撫若敢助惡必行併𠞰令其傳諭隨於十二月初三日二路之兵分行前進兹據吴昌祚報稱本道帶兵入山後隨據前差之林三等帶決里社土官阿龍領社番迎接歸誠次日進至武骨納又有緦麻丹社土官田仔帶番壯歸誠初七日兵至外北甲地方土官阿龍帶毛啐社土官卑臘同番壯歸誠初八日隨著守備戴日陞等帶兵登嶺而進本道領兵進至水裏社對面湖邊扎營隨有北路帶兵之參將何勉領兵来㑹據稱哈裏難社番兵到盡皆歸誠留同知王汧把守其地何勉帶兵前来㑹合等語當遣何勉仍回哈裏難社同王汧料理未歸各社隨有守備戴日陞稟稱帶兵前進直抵番巢放鎗攻擊兇番越嶺逃散進至骨宗所居寨内伊等各皆逃去所有搜出米穀散給兵番并将巢穴焚燬等情本道隨遣兵遍搜并令何勉王汧亦行㑹搜緝拏務獲骨宗等去後續於十二日晚有南投土官眉成爻大霞等在山南深林内招出兇番骨宗併同惡之土官麻思弄押解前来十四日又據麻思弄引出伊侄巴老肉骨宗之二子拔思弄水里萬并該社逃躱夥番共十六名投出其来歸各社之番俱愿照額認餉不敢再行生事叩頭求寛各等情具報到臣等隨飛行吴昌祚令将各社順番詳細安輯骨宗等帶出山外拘禁臺府詳究其焚殺實情及下手殺人之番再定懲處其他處尚有曽經行兇殺人之番社亦應趁此兵勢懲戒撫輯務期永遠寧貼不可苛求太過亦不可草率完事飛檄示行外臣等謹将水沙連番社巳經撫定情形先行繕摺奏聞再此次𠞰番御史索琳亦同深入山險水漲索琳與吴昌祚俱不避艱難臣等不敢沒其盡力之處謹一併附奏朕觀所報情形猶不似一勞永逸景象番性兇頑反覆無常務令料理妥協久遠平定方爲盡善在事人員於旋師後将應議叙者酌定等次具奏以聞浙閩總督臣髙其倬謹奏為奏聞暫留總兵辦理事務事竊照浙江提督巳奉旨簡放石雲倬給假尚未到任原定海鎮總兵張溥奉旨調補南贛總兵其定海鎮總兵奉旨以臺灣總兵林亮調補亦尚未到任近黄巖鎮總兵馮廷輔奉旨革職臣查浙江通省提督及三鎮之中現在只有溫州鎮總兵邊士偉一人浙省地方營伍既需人料理而目下海洋漁期将近粤閩二省漁船紛紛向浙北上正姦盜冒托為匪之時廵查緊要之際原定海鎮總兵張溥現署提督又兼辦定海鎮事務若簡調南贛鎮之部文一到即應起身赴任但浙省現在需人臣謹知照張溥如部文到時且暫緩赴任俟新提督石雲倬到任後再行交印起身所有情節理合先行繕摺奏聞謹奏料理甚屬合宜巡哨屆期需人孔亟正爲此厪念間覽奏深愜朕懷同日又奏為閩省辦理需人謹冒昧破格保奏仰乞睿鑒事竊查臺灣縣知縣徐琨做官雖無甚不好之處但頗任巳見辦事恃才而欠斟酌彰化縣知縣張縞操持尚好而年輕不甚諳練若調在内地儘可教導望其成材而於臺灣彰化二縣人地均不相宜臣於閩省屬員中留心細看止有二三人堪以更調但所任亦俱係緊要之處又難移動今看得原任福清縣革職知縣張廷琰在福清官聲頗好性情和平且有識見又原任南安縣革職知縣湯啓聲居官謹飭辦事細心此二員就臣愚昧之見似覺張廷琰可勝臺灣縣之任湯啟聲可勝彰化縣之任二員現奉旨赴京引見伏乞皇上聖鑒如果尚在可用臣謹仰懇聖恩可否以張廷琰湯啟聲仍帶革職補授二縣令其效力庶可收人地相宜之效倘䝉允准其徐琨張縞遇有福建内地之缺臣請另行題補再臣看有福建被前督臣滿保題㕘之原任詔安縣知縣徐治民經臣審結定罪具題在案雖此一事其不是在所難辭而臣細訪其在詔安聲名至今百姓感激稱好臣於審理時見其有才隨試以小事覺辦理井井有條於閩省形勢頗熟似覺人才可惜可否懇請聖恩俟事結後送令引見仰祈睿鑒倘猶屬可用臣冒懇聖恩且令白身辦事效力俟著有實效再與以職銜以上三人或係革職或係有罪臣以之奏請實屬冒昧不勝惴悚但臣仰見我皇上加意人才無所不至兹有所知不敢不據實上聞謹奏所奏張廷琰湯啓聲二員巳諭部查明具奏其徐治民一員於送部引見時僃將情節咨明恐朕偶或遺忘也雍正五年二月初十日浙閩總督臣髙其倬謹奏恭請皇上聖安朕躬甚安自入春以來頗覺諸凡順適總皆仰賴上蒼聖祖之祐庇耳同日又奏為仰懇聖恩嚴懲事竊臣在雲南時曾保舉馬駿又保舉劉業浚今馬駿居官貪黷劉業浚臨事退縮臣保舉謬錯遴選不慎之罪實無可逭惟有慙愧無地伏乞皇上敕部將臣嚴加議處以為保舉不實之戒臣謹繕摺仰祈睿鑒謹奏劉業浚雖未經覿面馬駿於初見時原屬可取之材然朕巳識其不似端人人實難知安保終始不渝此等事經歴一番亦未嘗無益將來庶不被屬員之所誑惑同日又奏為奏聞事竊查臺灣府知府一官地隔重洋獨當一面緊要之事不能詳候上司批定皆須先自決斷隨機料理地方民雜人刁必得人地相宜之員方能妥協辦理現任臺灣知府孫魯臣到任之初聞其操守頗好為人和平近看其買米補穀一節辦理竟無次第亦無斟酌又經管臺鹽頗為鬆緩鹽斤甚減於前斷理詞訟率多含混了事雖㢘謹有餘而才具似覺不足於海外之郡不甚相宜伏乞皇上簡用一才守兼優之員於臺灣地方始為有益其孫魯或調一海内之知府加以策勵再觀後效謹就臣愚昧所見繕摺請㫖謹奏人材之難不料如是奈何奈何臺灣府缺甚屬緊要卿可於浙閩二省郡守中揀擇題請候朕裁定頃據范廷謀條奏臺灣數款其中有甚可取者亦有不可行者朕正在細閱詳酌俟伊到閩卿面詢後再加確訪以待顧問范廷謀乃才勝於徳之小人也毋以人廢言可耳不宜傾心倚信同日又奏為奏聞事竊臣前奏拏獲洋盜一摺奉有硃批仰見我皇上賞勞罰罪至公至當臣察地方有盜各人員兵弁俱有不能勝任之咎查拏緝獲乃其應行勉力補過之事仰䝉聖諭令臣題請議敘各員已俱應感激慚恧雖捐糜頂踵不足仰酬萬一何敢復請議叙臣謹将各員弁兵丁拏獲各盜日期繕疏題報伏乞睿鑒再此案盜首陳㑹於雍正四年十二月初一日解到福州經臣面訊并弔各盜隔别識認果實係盜首隨遣員押解於雍正五年正月十二日據報已到杭州收審各盜夥亦俱到杭臣謹一併奏聞謹奏地方有盜乃各文武之咎旋即擒獲獨緝捕者之功而不奬賞示勸豈理也乎同日又奏為奏聞事竊查臺灣𠞰撫水沙連番社各番業經歸順并獲兇番骨宗等情節臣巳㑹摺奏明今又據臺厦道吴昌祚報稱各社番男女歸順情願仍納番餉者共四千四十五名又猫裏眉内社及外社番衆巴里鶴等綑獻社内歴年行兇殺人之番一名阿密氏麻著據衆說即係前殺功加外委之人已解回臺灣府詳審等因到臣又准巡臺御史索琳咨稱北路之番已經定平其南路之傀儡社番亦多殺人應趁兵威進𠞰且不過用兵二百名番三百名即可辦理等因到臣臣查傀儡社番亦有燒殺之案應加懲戒但二三月内恐山中水發兵番難行隨飛行臺厦道吴昌祚酌量如可行即行辦理懲戒若天時不可進山𠞰懲即暫停止俟再酌量而行臣謹將情節繕摺奏聞謹奏覽奏俱悉但此種番夷與禽獸無異地方文武若不得人不能時時留心恩威互用令其知感知畏則懲戒之舉方興未艾似非如是一勞而遂可享永逸之慶也臺灣情形朕未洞悉不過就事據理而論耳同日又奏為奏聞事竊查閩省今年正月以来各府米價及沿海各島澳米價每石自一兩三四錢起至二兩不等臣看延建邵三府暨福寧米石價平其平糶光景可至五六月或竟可不需平糶福興二府可至三月或閏三月泉漳二府可至二月或三月汀州別縣可至閏三月四月長汀上杭永定三縣可至二月或等處俱在二月三月即得平糶臣已將各處地方就其緩急分頭預備南澳去省頗逺米價最貴臣於去年十一二月内雇覓海船運到米三千石先緊要查府城各縣共現存穀六萬石臣於去年十月已運到榖一萬石今又運到穀二萬六千石又運到銅山米一千石雲霄米一千石泉州府及各屬縣并厦門金門海壇緊要與漳州同府城及各縣共現存穀六萬石臣於去嵗十月運到穀一萬石今又運到穀一萬石又米一千石又運厦門穀六千石米一千石金門米一千石海壇米一千石汀州府之長上永三縣情形亦甚緊要但山峻河小水陸俱不能運福州即有穀米顆粒難到然汀州府及各縣本處積穀尚有實貯者十餘萬石已可支持臣再四思維遣員到江西買米運濟又遣員将江西應撥五萬石之米内由贛州府雇船運一萬五千石到古城地方再搬過七十里之山路即可到汀州所有三縣之地有限此米穀即可以接濟平糶無誤又興化府及二屬縣現有實貯穀二萬餘石臣於去嵗巳撥運米一千石今又運米四千石福州府現有實貯穀十萬餘石又有現在撥運江西之米三萬餘石接濟省城可以充給其各屬縣俱收成頗好不急待平糶惟連江縣去嵗被水亦需平糶然所需不多易於接濟此現在各府之情形此外又有䝉聖恩截留浙江漕米易穀二十萬石今浙撫臣李衞巳料理由海運穀十萬石計日可到可濟閩省急用又臣商之李衞在溫台動閩省庫銀買穀四萬石運閩今亦巳買運此皆可刻期到閩者已有穀十四萬石臣前就福州漳州泉州汀州興化各處情形計算所運所存之穀米福州者可平糶到四五月漳州泉州興化者可平糶到閏三月盡厦門金門銅山海壇雲霄者亦皆可平糶到閏三月盡浙䝉聖恩截漕米易穀二十萬石近聞江蘇撫臣陳時夏欲實運十萬石到閩尚未聞上船之期其到来之期未能計定大約速則四月遲則五六月福省情形潮濕蒸熱穀則可糶可存米則難以久貯福建米留穀備貯今浙江之穀到在三四月間正當平糶之時不得不糶江南之米到在五六月間反可以不糶然恐難存又有不得不糶之勢此事為可惜臣再看到来之米之光景詳細計慮如若可存臣必設法留存以備積貯至臺灣運米一節去年仰荷聖恩於每年照常運米五萬石之外又添運米十萬石又臺灣倉穀未買補者數十萬石又臣請開臺米之禁令泉漳之民販運接濟奉旨准行欽遵在案臣恐三事並行臺灣係一隅之地力不能支隨行令臺灣道府及各縣酌量該地米價情形如可買若干即買若干如不可買即據實詳覆再行酌量即發臺灣買米十五萬石應需價脚銀一十七萬四千兩臣止令先運過臺銀七萬兩買購照常之五萬石餘銀陸續運往俟臺灣覆到可買時然後再令購買近據臺灣府及各縣詳稱臺地米價頗貴至今不減所加買之米十萬石又應補之倉榖俱請停買又泉漳之民買販者亦請停禁等語到臣臣思臺灣原係產米之區去年又有八分收成且米穀現尚未買何至價昂細訪其石匿蔵暗中擡價遂致束手無策臣今通身計算就閩省現在之情形及各處運來之米穀福興泉漳汀并各海澳今年之平糶臣儘可以接濟無虞文銓大張告示諭知各民臺灣運米一節除每年所運之米五萬石仍照常運送外加運之米十萬石竟行停運買補倉糓一節惟臺灣本地恐四五六月亦需平糶應於三縣之中共買補糓十萬石以備平糶此外一槩盡停買補至泉漳之民買販若聞臺米尚在開禁即臺米並未到其地民間蔵糓皆肯出賣米價即不増昂若一聞臺米禁出即旨令葛繼孔運米一萬石到閩今葛繼孔已到先運到聞謹奏覽浙閩總督臣髙其倬鎮海将軍暫辦福建廵撫事務臣毛文銓謹奏為奏聞事竊臣等據興化府同興化協稟報據仙遊縣知縣蕭系閎右營逰擊胡璟報稱雍正四年十二月十八日據鄉保黄未顔徳報稱本日将明之時有姦民在大蜚山上聚人擂寺中之鼓闗係地方等語隨差官弁兵役拏獲鄭洞鄭官郭尾鄭貴劉冬劉細顔二等又續獲陳烏一犯研訊供出係監生吴漢起意為首有吴學林昆吴𣲖巡鄭昭劉冬彭龍孫二蕭引鳳等幫助欲同行搶刦轉邀陳烏鄭洞鄭官郭尾鄭貴劉細顔