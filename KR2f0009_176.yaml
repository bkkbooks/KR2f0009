不日到省臣亦再面與僃細詳説反復勉勵令其竭力辦理一番當既懲之後又加以嚴防勤辦庶海外地方可期安静臣謹将料理情節繕摺奏聞謹奏更有諭旨俱批毛文銓摺内兹不重宣浙閩總督臣髙其倬鎮海将軍暫辦福建巡撫事務臣毛文銓謹奏為奏聞事竊臣等前奏拏獲臺灣北路水沙連社為首兇番骨宗等一摺奉有硃批臣等謹凜聖諭詳細思慮其北路之番雖經𠞰懲目前自然斂戢但不行周詳籌畫嚴密防範稍久仍恐滋事臣等現經行令臺灣鎮及該道府一面於要路設汛嚴防一面仍令熟商辦理之處臣等再加商籌容另具奏外又南路傀儡社番亦多焚殺之處前據巡臺御史索琳咨㑹亦應𠞰懲臣等隨行臺灣鎮道令細細酌量如山中三月間溪水不大尚可進去即速料理𠞰懲如春夏之間山溪水已大長難以進去即行嚴防俟秋冬再行辦理兹據該鎮道覆稱此時山溪水大難以進山應俟秋冬商酌𠞰懲但現在有傀儡突入阿猴社藔内殺死土番巴陵等四名又入隔壁藔内殺死番婆二口查其住處離山口不遠且不須多兵即可𠞰懲應先行相機懲創等情前來臣等巳行令酌量𣲖員帶兵先為𠞰懲俟𠞰懲後再應作何料理防範之處容臣等再詳細籌畫另行奏聞至於前獲之兇畨骨宗等經臺灣道吴昌祚已委員押解到省臣等㑹同親審據各供骨宗為首出山焚殺過十餘次伊自殺過十人其餘係夥下之人同殺者又阿密氏猫著一名雖供只殺過二人而領帶衆番焚殺數次共殺過二十六人情罪最重其拔思弄等十三人或供曽經殺過五人四人三人二人一人不等亦皆出山焚殺數次其水裏萬等五人雖供未經殺人然亦屢次同行臣等查楚省紅苗治罪之例伏草殺人再犯者不分首從皆斬立决骨宗等殺人不止二次應照此例擬罪完結尚覺罪浮於例但係生番雖經官兵追拏窮廹無路可走始行投出仍係曽經報出之人應行援減然臣等細思骨宗阿密氏猫著二犯實係首惡若不即加嚴懲恐各番以為如此焚殺仍可不死則人人效尤又斷不可行臣等愚昧之見欲将骨宗猫著二犯仍擬立斬梟示押至北路番子山口原行兇之處正法示衆其拔思弄等十三人援減擬斬監候其水裏萬等五人照為從例枷責𤼵落但係番人且放回必更滋事應留在省城永行監禁除審擬之處另行繕疏具題請㫖外理合先行具摺奏聞謹奏辦理甚屬允協若照内地而論既有如此兇惡形跡悉當正法何可稍為末減但念若輩實與禽獸無二姑開一面之網可耳雍正五年六月初四日浙閩總督臣髙其倬謹奏為奏聞福省平糶情節事竊查福省今年正二三月以来雨水太多至閏三月四月缺雨各處早稻不能遍插福州府米價比前較長興泉汀三府及厦門金門銅山海壇各標鎮協營駐兵處所米價俱各昂貴漳州府米價更貴賣二兩一二三錢一石而南澳一鎮半屬福建半屬廣東米價尤貴俱賣三兩及二兩七八錢一石此南澳一處尤為緊要臣於去冬今春陸續預撥米八千石穀一千八百石運往接濟近江南之米船巳到又飛撥米一萬三千石行令各員不拘閩粤所轄一概平賣以濟民食今據各員稟報五月末南澳米價巳減民情巳安尚可剩有餘米臣隨飛飭不必急糶酌量存貯以僃将来接濟其漳州府及興泉二府厦門金門銅山海壇各處臣先行令将臣前已經撥運到之江南浙江買回米石及江西運来米石并浙江運来穀石即酌量平糶凡平糶各屬先儘用米石如米石用完再用浙穀之被海船潮黴過者其好穀留貯倉内不許動糶以僃積儲去後隨江南截漕之米陸續運到臣亦隨陸續飛撥運往分頭接濟今據各屬稟報閏三月四月及五月之上半月百姓待米頗急買者甚多因官米發糶民間米價稍平近五月下半月以来早稻将收米價漸減百姓買米者亦漸少各處民情俱皆安帖汀州一府不通海運臣由江西運米一萬石前往接濟今早稻将收米亦漸賤人情安靜福州府地方今年雖亦開糶然其米價始終未曽太貴民情甚安至延建邵三府今年不用平糶其各府各處到六月初間早稻刈穫平糶即可停止約算各處所糶止用米石不曽多用穀石即米亦未用完臣現在嚴飭加意收貯其臺灣府自三四月以来米價俱不平減所有接濟泉漳之米臣除只令照往年之例運五萬石餘外俱盡停運現今福省平糶之事已竣各處極其安静所有情節臣謹繕摺奏聞謹奏毛文銓袒徇屬員通同蔽匿汝復為之容隱遮飾朕既㢘知種種情弊則凡此番措畫係為民耶抑為官耶果真平糶耶或巧移穀價貯庫耶總至於疑而難信矣早知汝縁各屬虧空起見何至去冬今春朕為該省米穀枉費數月焦勞另有諭㫖命楊文乾来閩面傳同日又奏為奏聞早稻收成情形事竊照今年福建省閏三月四月頗為缺雨早稻栽插未遍泉漳二府更甚四月二十邊方得透雨泉漳及各府早稻皆遍行插種自四月末旬至五月初十日以内晴雨甚是適宜各處早稻長發極茂目下漳州府之早稻巳熟約有八九分收成興化府早稻約有十分收成泉州府早稻約有八分收成福州府早稻約有八九分收成惟福州府屬之侯官閩清二縣於五月十三四五六等日大雨如注山溪之水暴長數丈二縣内低下之田山水溢入田内稻子俱被水漫過頭數尺水退之後雖仍結實分數少減侯官縣收成約有七分閩清縣收成約有七分以上至延建邵汀四府其地氣與福興泉漳不同早稻甚好現巳結穗據民間約估云有九分以上收成但尚遲一月方得全熟此時難以確定惟邵武一縣因山水大發田稻有被衝壞者十停内有一停餘俱茂好其臺灣一府早稻亦熟約有八分以上收成現今福省晚稻又将插蒔秧苖俱好田水充足所有福建二麥俱已有收今各府早稻又皆大熟臣謹将情形詳行繕摺奏聞謹奏覽閩省早稻情形朕懷深慰雍正五年七月初八日浙閩總督臣髙其倬謹奏為奏聞事竊臣於在京陛見之時面奉聖諭臺灣地方緊要令臣到閩加意料理欽此欽遵臣自到閩以來日夕察訪雖少有所聞不敢輕易舉行今經一年稍知詳細就臣愚昧所知以為臺地險要遠隔重洋全在文武得人方可治理妥協臣行酌定折徴粟石應改徵本色兵丁不敷防巡應請酌添生童考試應取本地之人臣謹一事另繕一摺具奏請㫖遵行又查禁偷渡一事臣巳得備細尚有須斟酌之詳奏其稽查換班之兵冒名頂替及防範姦宄之人無知妄為二節臣現在嚴查嚴防并與水師提臣藍地方根本之事而辦理極須詳細斟酌臺灣田土經界不清數目隠混者多有言宜加清丈者有言可以増額者臣雖屢飭查辦而原任知府孫魯等臺将料理情形據其所見禀覆到臣臣再加籌想具摺奏聞又番人焚殺一節此事情節中有數種一則開墾之民侵入番界及抽籐弔鹿故為番人所殺一則番社俱有通事通事刻剥番人憤怨之極遂肆殺害波及隣住之人一則社番殺人數次遂自恃强梁頻行此事殺人取首誇耀逞雄臣再四詳思治番之法最先宜查清民界番界樹立石碑如有焚殺之事即往勘查若民人侵入番界耕種及抽籐弔鹿致被殺死則懲處田主并縱令擾入番界之保甲鄉長荘主如漢民並未過界而番人肆殺則應事之時係番係民稽查有憑懲處庶可得實至通事一節臣現在嚴禁嚴查又行令道府稽查各縣不許接受餽送濫以無妻子田房及行事不好之人僉充又令各縣嚴行查處通事不許刻剥番人胥役不許需索通事臣亦詳行細訪若各社可以不用通事臣即盡行革除更為清楚至應懲强梁之番如北路之水沙連已經懲撫現在嚴防調劑南路之傀儡番亦應稍懲臣與總兵道府說知俟冬間水涸再行料理再臺灣風俗奢侈無度任意賭飲最應急加勸禁臣巳嚴行示禁又與知府俞存仁詳說令其時時留心懲勸不可徒事故套此臣所已知臺灣之情節謹行詳細繕摺奏聞俟更查有緊要情節再行陸續具奏謹奏閩省諸務未有要於經理臺灣者當再加延訪籌計以期永遠寧靜同日又奏為奏聞臺灣人民搬眷情節事竊查臺灣各處居住人民多係隻身在彼向皆不許㩦帶婦女其意以臺地遠隔重洋形勢險要人民衆多則良姦不一恐為地方之害近來閩省之人及曽經任閩各員條陳議論多謂人民居彼既無家室則無父母妻子之繫久遠安居之心所以敢於為非若令搬眷成家則人人守其田廬顧其父母妻子不敢妄為實安靜臺境之一策臣因其說甚近情理隨反覆詳細詢訪籌思查得臺灣府所屬四縣之中臺灣一縣皆係老本住臺之人原有妻眷其諸羅鳳山彰化三縣皆新住之民全無妻子此種之人不但心無繫戀敢於為非且聚二三十人或三四十人同搭屋藔共居一處農田之時尚有耕耘之事及田收之後頗有所得任意花費又終日無事惟有相聚賭飲飲酣賭輸遂致共謀竊刼若令各有妻子則内外有分不致雜沓紛紜且各顧養贍妻子則賭飲花費之事自減各顧保守家室則搶奪剽竊之志自消實為形格勢禁之要務就臣愚昧之見以為全不搬眷固非長策而一槩搬眷亦非長策請嗣後住臺人民若欲搬眷往臺其貿易雇工及無業之人全無田地原非安土之輩槩不准搬外其開臺未滿五年及雖佃田滿一甲住及五年而業戸不肯具保者一槩不准如此辦理似搬眷而往者皆将來耕田安分之家而就此一番確查又可以得其田産多少之槩并係何人下之佃户設有犯法責有所歸查拏亦易似為有益至現在甫往臺灣求田耕種之人即係誠實現無田業亦應一槩不准帶眷前往以防生事此臣愚見所籌未敢遽行謹将情節繕摺奏聞伏乞皇上睿裁謹奏且試行之同日又奏為奏聞臺灣各學寄籍諸生宜歸本籍事竊查臺灣府縣各學所有生童嵗科二試歴来俱係臺灣道考試向因臺地新闢讀書者少多係泉漳各處之人應試進學之後仍歸本處居住應試之時渡海而往試畢復回每人帶小厮一名給照前往日久弊生所帶小厮多係收攬偷渡之人臣愚以為臺地昇平日久沐浴教化生齒巳繁文風漸盛何必借才異郡既壅本地人才又滋偷渡之弊請嗣後嵗科兩試應令道府各縣查明現住臺地有田有屋入籍既定之人方准與考即就此内取進其泉漳各處寄籍之人一槩不許冒濫其從前已經進學之文武諸生俱查照各省呈明改歸本籍之例一槩改歸泉漳各處本籍之學考試則臺灣土著人才皆踴躍於上進之階而他處之人又不得借端滋弊似有裨益除容臣另疏請㫖外謹先将情節繕摺奏聞謹奏爲此朕曽經降有諭㫖冒濫之弊所當嚴禁者同日又奏為奏聞臺灣兵丁額少應籌變通調劑事竊查臺兵孤懸海外地方緊要其近海一面除鹿耳門之外南北二路大小港口極多處處可通偷渡依山一面山内山外生熟番人錯處在在皆須防範一府四縣既須駐兵而岡山阿猴林等處每易蔵姦更須防守查臺灣鎮標三營及南路營北路營淡水營兵共五千三十名安平副将所轄水師共水兵二千五百名二共額兵七千五百三十名實在不敷汛守似宜添設以資防禦但臣思添設兵額既須詳籌糧餉且更當審度地方形勢實在必需此兵斷不新臺灣府知府俞存仁亦令細為查稟臣再行籌思調劑其現在應行籌酌者臣查臺灣鎮向無馬兵經御史禪濟布條奏改撥各營馬兵三百名自設立以来因臺灣水土與馬匹不甚相宜時常倒斃每年每營於定數大報倒斃外更有二三十匹之多兵丁皆於月餉内私行朋扣賠補頗覺苦累若臺灣必需馬匹亦不應以此即議更改無如臺地多雨春夏秋三時皆泥深水大馬無所用惟冬間方能乘騎遠出而入山征番捕匪兵丁仍皆下馬歩行於營伍不甚有益就臣愚昧之見若将所設之三百名馬兵裁去改為歩戰兵三百名守兵四百名分入四十三營輪流添撥防臺比之舊額相同除臣另行具疏外謹先将情節繕摺奏聞謹奏覽同日又奏為奏聞請将臺灣折色粟石仍行改徵本色事竊查臺灣府四縣原額每年徵收正供粟共一十四萬二百六十一石臺澎各營兵丁嵗支米三萬六千石每年除嵗支之外所餘粟石貯存各縣倉中年年存積故從前倉粟存至三十餘萬之多後經廵臺御史禪濟布等奏請每年止留徵粟七萬二千石碾米三萬六千石以供一年兵食再兼有倉粟三十餘萬石足支五年其餘粟石俱請改徵折色以充兵餉隨又經原任總督滿保復行詳查奏稱臺灣共徵粟一十四萬二百六十一石請将六萬石改徵折色每石折銀三錢六分又請将番婦丁口粟三千六百八十八石免其徵收每年實徵本色粟七萬六千五百七十三石以供兵食俱經准行在案此實因時制宜之法臣何敢自逞巳見輒思更張但查臺灣情形與彼時不同向之存倉粟三十餘萬石歴年碾米運濟泉漳用去甚多尚未買補而年年定例碾米五萬石撥運泉漳即需粟一十萬石且更有旋補旋撥不能停留之勢近又加駐防臺地兵丁眷口米石每年需米一萬六百五十石并各營兵丁嵗支兵米三萬六千石二共需米四萬六千六百五十石需碾粟九萬三千三百石臺灣以現今每年實徵粟七萬六千五百七十三石計之是每年不敷粟一萬六千七百二十七石目前固動倉粟湊支将來必需購買放給既非經久之計而𣲖徵每石三錢六分之折色以目下臺灣之米價計之亦難買購況臣細查所𣲖改折之粟六萬石内止有鳳山縣八社番户應納粟五千六百二石零番人納粟言語不通未免受通事里胥之欺騙需索不如納銀之便其餘粟石俱係業户完納而業户每年有收租萬石數千石以及數百石者往往囤積擡價若免其交粟改徵折色則益増其囤積擡價之勢且臣愚昧所見更有不闗臺地而亦宜因此一併籌畫者查福省水師各營每年兵米俱半本半折惟厦門金門之兵全支折色考其由来因當年米賤原提督施琅欲使兵丁有餘故每石折銀一兩近厦門金門米價貴時賣二兩二三錢一石平價亦一兩四五六七錢不等兵丁以餉銀貼添買食頗覺稍難亦不可不籌久遠之計就臣愚見此折色之粟除番社粟五千六百二石零仍徵折色外其餘折色粟石請於雍正六年為始仍徵本色除支兵米及眷口米嵗需粟九萬三千三百石外尚應餘粟三萬七千六百餘石查厦門金門提鎮標營共兵六千八百零四名給以半年本色應米一萬二千二百四十三石有零應粟二萬四千四百八十六石有零可敷支給有餘其所省米折銀一萬二千二百餘兩亦可補支臺餉既可足臺厦之嵗計兵食又可減業户囤積之弊似有裨益除臣另疏請㫖外謹先繕摺奏聞謹奏滿保禪濟布二人經手料理之事何足爲凖耶雍正五年七月初十日浙閩總督臣髙其倬謹奏為預籌買米以備平糶事竊查福建福興泉漳汀五府及厦門金門海壇銅山南澳各駐劄水師官兵之處兵民稠密食米頗多至青黄不接之時米價頓昂每需米石平糶以資民食以平市價今年仰荷皇上截留江南漕米十萬石浙江漕米易穀二十萬石又浙省透運糓五千七百五十八石零又撥江西米現巳運到者二萬四千七百石零又葛繼孔運到米四千五百四十八石源源接濟分撥平糶是以米價平減民情安帖兹當夏末平糶甫竣各處報數未齊約計米糶十之七八穀糶十之一二容臣確核石數糶價另行題報外臣思閩省來嵗平糶應於今嵗預籌查通省現經盤查實貯糓共七十五萬九千餘石又加以今年運来浙穀以之料理來年平糶足敷有餘但閩地之穀糶出則易買還稍難非帶潮潤年久難貯之穀不敢輕言發糶既不輕糶倉穀應思籌濟之法臣查江南漕米一項約糶價銀有七八萬兩臣愚昧之見請於八月間收齊此銀即在本省上游量買米石運省再委員赴外省年豐米足之處買運米石於冬底春初到江南海口趁北風運至閩省正值三月将糶之時與今年所餘江南截漕米石一併分糶倘少有不敷再酌以倉穀中之確應出陳易新者畧行配糶即可接濟一則可減省平糶之倉穀再則舳艫相望民間米價不抑自平其糶出如有盈餘即行造册題報於来嵗添買米石或充兵餉年年照此料理買得一分之米即省一分之穀且可平市價之頓昂似有裨益臣請自任辦理凡有虧空欺匿惟臣是問再遣員購運俱須及時臣謹一面量行先撥動銀三四萬兩分頭辦買除臣另行㑹題外謹将情節繕摺奏聞謹奏買米濟糶固係極好之事即庸愚無識者亦知為善舉浙撫李衞現如此行但可少而不可多葢得人最難虧空欺匿等弊安保其無若一味姑容之督撫恐未能實獲裨補爾擔荷此事責任匪輕朕不言不可行亦不言必當行總在爾等斟酌妥確審擇有益無損而為之耳同日又奏為奏聞事竊臣前奏鹽務摺内奉有硃批伏查臣與陳豫朋係㑹試同年當時見其舉動甚輕躭於逸樂甚有紈絝習氣後做員外時見其比前謹飭近有十餘年不見今春到閩看其舉動老成議論持重比往時不同兹同料理鹽務半年以來細看居官尚未有敗檢之處但巳稍有信任家人衙役光景凡所料理皆寛泛而不詳切籠統不中肯綮福省鹽務頭緒頗多規模未定必得一精明㢘勤之鹽道時時查整處處籌畫方能使課額優裕民食充足以臣愚昧看陳豫朋料理鹽務久恐無益仰乞皇上另簡賢員庶有裨補其陳豫朋或調回或調簡伏候睿裁謹奏朕亦聞陳豫朋不勝此任已諭明楊文乾矣俟其抵閩後爾等㑹商擇本省相宜道缺調補可也同日又奏為請勻兵米事竊查福建通省陸路各營兵米每年俱係半本半折惟督標三營兵丁俱全年支領折色而延平協建寧協邵武營三處兵丁俱係全年支領本色臣查延建邵三府米糧頗賤購買頗易省城米糧頗貴購買稍難而全折全本未免偏枯應酌勻支領臣愚昧之見請将延建邵二協一營之兵米亦照通省各營一體支給半年本色即将半年本色支給督標三營半年之食有餘而以督標半年之折色改給延建邵二協一營查此折色每石九錢所有延平一府米價較建邵二府稍貴應仍給以每石九錢其建邵二府米賤每石折以八錢即敷買食而以所餘一錢勻為本色米石之運脚亦敷運送一轉移間則通省兵米皆一體半本半折而貴處賤處亦皆均勻於營伍有益臣未敢具題謹先将情節繕摺請㫖謹奏朕不洞悉地方情形難以諭定行止同日又奏為奏聞事竊照福建通省倉穀經臣題請展限在案隨行布政司確查造報除行令各道府照例盤查外又委道員分行親盤并令各縣知縣隔屬互盤去後兹於本年六月二十八日據布政司沈廷正造册并将揑報各員詳報前来臣查尚有起初交價輾轉流交未買各員未據查揭又行飭查於七月初四日續據詳報前来其中尚有分晰未詳之處臣逐一再加細查覆核福建通省九府一州及同知通判各縣倉存貯官民監糓除漳州府知府耿國祚龍溪縣知縣魏彪巳經題㕘且耿國祚欲買浙穀抵補顯有那掩不實其二處造報實存續補并未經買補共穀一十一萬九千六百三十五石俟委員同接署道府另加確盤并請嚴審追擬題報外尚應存穀共一百六十八萬四千六十三石零除軍需用去賑給災民水漂及給天津駕船舵水食米共應銷穀六萬五千一百一十一石零尚應存穀一百六十一萬八千九百五十二石零内歴案虧空穀六萬一千六百四十石零應俟追完題報又借碾兵米穀九萬八百六十五石零秋後徵還仍存支給又平糶運浙借兵共五十四萬八千餘石未補外今查得已經委道府親盤及隔屬各縣互盤據司册開造原報實存暨續報買補共實貯存倉穀九十一萬八千四百五石零臣覆加細核内原報存榖共七十五萬九千一百八十一石零查係實存其各屬現今續報買補之穀共一十五萬九千二百二十四石零難遽確作實存尚須覆盤至於從前各屬流價未買輾轉接受報作實貯之㕔縣等員并扶同捏結之道府以及詳題捏報實存穀石之巡撫藩司臣俱逐一查清現在具疏題㕘請加嚴處再查臺灣正供稻粟向與地丁錢糧一例奏報不入倉儲項下臣以臺粟為數四十餘萬之多兵糧民食攸闗不應以不係盤查之案放過是以一并清查兹據布政司沈廷正呈送臺灣道吴昌祚造報臺屬四縣清册臣隨飭𤼵核造去後續據該司造具清册前来止據将臺屬應徵官莊糖粟及糖蔗車各項已未完銀兩數目開造其正供稻粟管收除在四柱清數未據備造難以核題臣覆查雍正三年撫臣毛文銓奏册内開臺屬積年流存正供稻粟共實在二十八萬九千八百三十一石零存剩粟價四萬五千二百一十三兩細核臺灣道吴昌祚造送各縣之册僅現貯粟共一十一萬二千七百餘石尚有未移交并未撥補及未買補各項粟石頭緒繁雜不清且現貯之粟與奏册數目大相懸絶顯有虧空捏報情弊即所報現存之穀亦恐未實現在已飭委員赴臺催同新任臺灣府知府俞存仁徹底確盤容俟查盤到日核㕘奏報理合一併奏聞謹奏奏已遲矣總之爾以科甲二字耿耿於中善柔沽譽之病不除諸事朕皆疑而難信也同日又奏為奏聞運到江浙各項米穀并分撥情節事竊查福省仰荷皇上聖恩截留江南漕米十萬石又截留浙江漕米十萬石易穀二十萬石又江西運到米二萬四千七百零一石又臣動鹽課銀五萬兩委員赴江南購買楚米江米共二萬四千三百七十六石麥六千七百九十四石零運回閩省又動鹽課銀二萬四千兩購買溫州米一萬三千一百一石零穀一萬六千四百四十三石運回閩省又葛繼孔運到米五千六百五十五石零除江西運到米石數目業經題明其撥還價脚銀兩俟解還日另行具題所有運到江浙各項米穀臣俱隨到隨撥兹海運御覽外至於分撥各項米穀臣已屢飭各屬先儘米石糶餘米石小心曬晾存留以備接濟其一應撥還浙江價脚及江浙買運米穀麥石價脚并自省再撥運各處船脚入倉挑脚各價值并盤收折耗銀題報送部查核又汀州一府孤懸肘外海運陸運俱不能通惟通江西贛州府一路而米價常昂應籌接濟臣動邵武縣存庫平糶穀價六千四百二十九兩零又鹽課銀六百兩委邵武府㕔撥動邵武府倉光澤縣倉穀碾米三千四百石又赴江西買米六千六百石共一萬石由瑞金一路運入汀州接濟今據各員報稱米石俱已運到所有買運價脚及平糶石數銀數亦容臣查明一併造册題報送部查核謹附摺奏聞謹奏知道了雍正五年九月初二日浙閩總督臣髙其倬謹奏為奏聞辦理鹽務情節事竊照閩省鹽務欽奉聖㫖令臣辦理今已一年謹就臣愚淺所知籌思料理調劑之處分條臚列為我皇上陳之一謹産地之收曬查福建省八場之中福清一場最大所産之鹽供西路十五縣東路八州縣南路二縣鹽資半省之食課居三停之二係第一緊要之場歴来私梟叢雜風習刁頑沿海則風帆倐忽入山則細徑四通臣到任之時舊委通判王仁管埕每月潮有長退潮退之日方為爬土淋滷曬鹽之期逢期俱宜晴不宜雨若遇小雨則滷淡鹽止半産遇大雨則無滷即無所産此福場産鹽之大畧歴來姦刁團曬人等彼此串通或賄囑場員将無雨報為有雨小雨報為大雨掩飾隠匿私行偷賣既虧折正課又充斥行銷之地為鹽場第一大弊又場官書役填空日之票巡查哨兵不截票角容其重複影射走私而海船漁戸借醃之名串通偷載漏私一船則百餘人所不能肩負者揚帆装去到處可通尤害課地管場同知任煥詳臣福場向止有團長十數人皆係積年匿私之徒隨倣保甲之法添設團長八十名甲長四百二十名每日令甲長查報曬丁所曬之鹽又令團長再查甲場大中小埕共五萬四千餘埕曬丁四千一十三名将大中小埕每日所産之鹽一一秤較按埕坎之大小計炎寒之天時合算細計即可約畧知此日之所産而所報可以約計又營私巡役書團及場棍痛行懲革於海港添設哨船以查各處漁船各曬丁之内其營私之處固必嚴懲然鹽之出産整頓惟各團之中俱無官設收鹽之倉一遇風雨即有耗折向係各團曬丁自葢土室收蔵零星散雜稽查不易必得酌定總要之處分行建設總倉令各團甲曬丁将日曬之鹽總歸此處場員親加而雨濕水淹之患亦無則福清一場稍為整頓矣至莆田一場供莆仙二縣民食兼濟西東南三路之不足為福省次要之場敝壞更甚其場内分上下二里里内又分大小十團上里之曬鹽仿彿福場而下里則逈然不同係就地勢之高下築為坎埕開溝引潮水入於第一坎内曬水二日放入第二坎又曬二日放入第三坎至第四坎而成滷然後掘一極大土坑存貯滷水名為滷窟又從滷窟注滷入埕始曬成鹽而莆場之上里產鹽不多全倚下里之產以供民食查下里產鹽必得連晴十日至第七八日坎水方始成滷注入滷窟又得天晴從滷窟取滷注埕内方曬成鹽設在坎曬水之時一遇有雨則前工盡棄而滷水注窟乃一平地之坑一遇大潮即虞漫沒若遇大雨淡水一入滷即損壞曬丁費數日之工既難必鹽之成否巳屬不願而從前場秤稍重兼向來場價官定每擔八十文以及七十六十文不等較之福場其價極輕曬丁不獲微利而遇雨之時反又折本是以多別行傭工度日往往惰曬而各處埕坎壞損不修引潮溝道亦多堙廢曬丁雖較之福場稍淳然偷賣亦多臣将場鹽每擔酌加三十文又将場秤較準製𤼵并委員整頓今各壞損可修之埕皆已修好引潮之溝現皆挑濬滷窟週圍厚令培土作為小埂潮水不能灌入惟是滷窟皆係露天即用蓆片苫蓋海風力大隨勢吹去不能遮蔽一經下雨淡水攙入滷即無用故目下産鹽尚未能豐臣又令之日必須晴霽而既巳成滷之後注入窟内即無被雨折耗之虞而曬鹽之日縱使遇雨亦可收蔵賣揑報之弊臣令場員嚴查嚴禁又委標員帯弁分大小一十三團此二場雖未能如浯場之清楚亦為盡心近又委同知金瑛總管此􅜉潯二場亦稍為整頓又恵安一場共分七館此場原係小場所產不及各場現在辦理之小場員亦未能徹底料理臣現另行委員又委金瑛總查料理此恵安一場尚未見成效未為整頓臣不敢粉飾容臣竭力料理必期妥協又漳浦一場分為東南二場其東場委原任批騐所大使林昇遠管理頗能盡心料理稍有頭緒場鹽亦為有產其南場因守備張標係舊熟之員委令管理事事廢弛場務既不能又詔安一場内分一十三團又一小團其產鹽全係曬水與莆田之下里相仿產鹽頗難而歴来之廢弛實甚臣委原任知縣徐治民管理半年以来畧有頭緒尚未大見成效至臺灣之場舊日頗為整理原任知府孫魯管理畧覺鬆廢今臣改委新任知府俞存仁料理此各場之情形係屬產地為鹽務根本其大段規模應籌酌久遠徹底整頓其零星弊竇應隨時逐事不時查懲臣料理一年雖今年產鹽之數現至八月盡巳產鹽九十餘萬擔三變其法矣以大勢論之各處鹽法如兩淮兩浙河東長蘆兩廣皆係𤼵引僉商乃鹽法之常經豈有便於五處獨不便於閩省之理何必又行官運又改水客但臣就現在閩鹽之情形籌酌将來料理畫一之時自必歸於設商𤼵引而後鹽法始成但目下閩鹽若不㕘用官運及水客行銷而拘泥成法即用商引則斷然不可葢他處之商多外地饒富之人充當本大力厚行銷可倚而責成亦易閩省既無外地饒裕之商而本地之商又多本薄力弱之人即今充應水客者十分之中八分皆係舊商之家其力量俱甚微細若僉定商名給與引照必致所運短少上虧課費下乏民食臣愚昧之乏者則行斥革且官為暫時運濟再招殷實之人承充但官運雖屬可行而亦有難行之處葢官運之法必須委員得人方不致以官力壓累病民如不過三數處得人尚易若至數十處則擇人甚難故現在西路東路南路興屬泉屬臣皆以水客運銷而以官運為接濟補救之用有場之處以肩販為㕘行之人俟一二年之間細查各處水客有運鹽無誤課食二年如出一轍其人誠實而家道亦裕者題明報部僉為商人以示鼓勵如此漸定俟各處俱同如東路則現今水客所行銷之數與雍正二三四年行銷之數詳較無甚太多太少之異應即照當日原定之數行銷再勤加催查俟可多行即令加運至南路則其數可増而現在水客行銷即原額尚不能副應再加調劑方能畫定目下亦止以鹽之時差僅一年止拘舊例在得課費如前其事巳畢其舊案與額數俱不可為式臣将自雍正二三四年各處所行銷之數細開詳較通三年之行運酌定課費於此外酌其屢銷之數又加溢額之鹽且暫定為一年試行之數又以一年之額分算為按月之額定為程限以此稽查水客之運銷鹽觔鹽道陳豫朋又按月将不及額者催運比限再不完者斥革另招其能踰額者臣又行令查明奨勵所有西路鹽篷臣今又新加酌改加以溢額之數其興泉二屬現在亦照二三四年所銷通算酌定擔數行銷惟漳屬一處陶範所定擔數全是徇私勻𣲖不公臣因舊商林萬興家道頗裕具呈充令石瑪館委員兼以官運暫行接濟以裕課食其行銷之數臣亦現以雍正二三四年之數合算酌定至各處鹽價隨意髙下漫無成據臣俱令以水客在場買價為定加以運脚之費詳細確核到省之時鹽道填冩票上葢印行到各州縣令各州縣照價本脚費細核定價每斤止許水客得利一文退又存積鹽斤尤為最要葢一年之内不能皆產鹽之月亦無皆不產鹽之理惟多產之時任意銷𤼵及至無鹽之時遂缺民食要在設立鹽倉於多產之時收存鹽斤若至缺產之時開倉接濟即可使鹽價常平民食不缺但閩省水客力量不豐不能多收多運查向来官運之時皆係官動場課之錢就場收積臣亦仍照前例酌於場鹽多產之時收買存積以備鹽缺接濟但向来存貯鹽場離各處既遠即運至省城而於上游乏鹽之時運濟逆流而上建溪陡險非一二月不能即到仍屬無益臣今酌於延建邵三府以府城為適中之地各建鹽倉於鹽不乏之時從容運往交知府總貯倉中遇鹽缺之時即撥各屬縣接濟庶運往既速而緩急可恃至省城為各路之總滙臣亦於鹽倉廣行一酌定鹽課之額數查福建鹽務自雍正元年以前年徵課斤坵折等銀九萬四百六十一兩零雍正二年奉准部文将鹽官各衙門所得公費及額解銅斤脚價河工等銀八萬二千二百一十兩一并徵收二共應徵課費銀一十七萬二千六百七十一兩零其餘額外溢行之鹽所獲銀兩造為盈餘銀兩報查亦同正課撥餉雖分三項實同一項今請仍前分為三項其課費二項即照定數作為正額其餘溢行之鹽所獲之銀數不能畫定惟上緊料理儘其所獲造入盈餘一同課費造報送部核撥兵餉至西路十五處仍按篷在場徵課銀一十三兩零運至瀛前盤弔再完公費一十四兩九錢零照舊徵收其餘各場俱照舊按擔徵課每擔錢一百五十文其石瑪館向係每擔徵銀二錢三分今應照各場一例徵錢一百五十文庶皆畫一無輕重難行之處至原任撫臣毛文銓所請水客於額外多運之鹽按擔減半只收公費之處殊為未協臣到任之時即皆不行并前多運者俱按擔徵收課費一槩不免照常徵收外嗣後一切溢額多運之鹽俱照常徵收無庸減半又毛文銓辦理之時雖經奏明向例有長價錢價票錢等項錢文以供各場官巡役薪水飯食公費賞賚等費今臣查歴年長價等項除支給外尚有餘剩銀兩頗多已令造入盈餘册内聽候撥餉外嗣後長價等項仍應照徵以供各項給費又鹽道一官其薪水盤費亦應酌給臣擬於長價之内每年支銀四千兩以資用度除各項給費之外所餘長價等項銀兩請每年歸入盈餘造報送部核查再鹽課銀兩若撥解部餉則有幫貼水脚銀兩應照數於長價等項之内撥給仍造明確數報部核查如無撥解之處即将長價等項支剩餘銀俱全造入盈餘數内以充撥餉一酌定辦理之人員臣查向時閩省鹽政設有運使運同經歴倉大使閩安司大使竹﨑司大使等員分管各務其各場則交各該縣及縣丞管理雍正二年悉巳裁去嗣後皆遴擇同知通判暨地方佐雜各員委令辦理並無一定之員臣詳細試看設定一官不如不設官之便葢鹽政辦理必須實能辦事㢘幹之員方能有益而且一日曠弛在場地即缺一日之產在銷地即缺一日之課若擇員題設外其餘辦理止用委員無庸另設以上係臣現經酌定料理之處除臣另行具疏詳奏恭候睿裁外謹先行繕摺奏聞再鹽務一事臣曽繕摺奏請之益伏懇皇上允准施行謹奏觀汝辦理諸務必先将兩邊情理論一精詳週圍弊效講一透徹方欲興此一利而又慮彼一害甫欲除彼一害而又不忍捨此一利輾轉游移毫無定見若是則天下無可辦之事矣夫人之處世如行路然斷不能自始至終盡遇坦途順境既無風雨困頓又無山川險阻所以古人多咏行路難葢大有寓意存焉凡舉一事他人之擾亂沮撓巳不可當何堪自復猶豫疑難百端交集如蠶吐絲以縛其身耶世間事要當審擇一是處力行之其餘利害是非槩弗左盼右顧一切擾亂沮撓不為纖毫揺動操此堅忍不拔之志以往庶幾有成及事成後害者利矣非者是矣無知沮撓之輩不屏自息矣今汝則不然一味優柔不斷依違莫決朕甚憂汝不克勝任有關國家用人之得失也奈何奈何雍正五年九月初九日浙閩總督臣髙其倬福建巡撫臣常賚廣東巡撫臣楊文乾謹奏為覆奏本年八月内准兵部咨開内閣奉上諭昔年曽奉聖祖仁皇帝諭㫖海外噶喇巴乃紅毛國泊船之所呂宋乃西洋泊船之所彼處蔵匿盜賊甚多内地之民希圖獲利往往有留住於彼者不可不預為措置欽此隨經廷臣與閩廣督撫議令内地之人留在外洋者准附洋船帶回内地比時奉旨准行在案此乃聖祖仁皇帝綏靖海疆且不忍内地之民轉徙異域實仁育義正之盛心也但數年以来附洋船而回者甚少朕思此等貿易外洋者多不安分之人若聽其去来任意伊等全無顧忌則飄流外國者必致愈衆嗣後應定一限期若逾限不回是其人甘心流於外方無可憫惜朕意應不令其復回内地如此則貿易欲歸之人不敢稍遲在外矣将此交與髙其倬楊文乾常賚悉心酌議並如何定限年月處一併詳議具奏欽此又於八月十八日准内閣行文雍正五年七月初二日奉上諭爾等所查康熙年間辦理海洋及臺灣各舊案著繕寫𤼵與髙其倬楊文乾伊二人現有料理海洋臺灣之事若有查考之處便於稽查欽此并奉到繕寫御覽奏摺一件臣等伏思欲嚴查從前留住彼國之人必先禁止現今偷往之弊查從前商船出洋之時每船所報人數連舵水客商總計多者不過七八十人少者六七十人其實每船皆私載二三百人到彼之後照外多出之人俱存留不歸更有一種嗜利船户畧載些湏貨物竟将游手之人偷載至四五百之多每人索銀八兩或十餘兩載往彼地即行留住此等人大約閩省居十之六七粤省與江浙等省居十之三四臣等公同商酌嗣後凡出洋船隻俱令各州縣嚴查船主伙長頭椗水手并商客人等共若干名開明姓名籍貫令族隣保甲出具切實保結再令同業三船連環互結該地方官一面給與印照一面加結造册册内逐名開寫年貌註明兩手箕斗申報督撫本府并報興泉道厦門同知提標中營㕘將俾其照此查騐督撫再行委員坐口協同稽查如有報少載多及年貌箕斗不符者即行拏究保甲之人一并治罪回棹時照前查點如有去多回少先將船户人等嚴行治罪再將留住之人家屬嚴加追比或有意外事故處就近出口難免紛雜隠揑之弊其閩省者總歸查拏照私越之例治罪如此庶往返皆有稽查不致存留外地矣至從前存留外洋之人臣等細詢洋行人等或稱噶喇巴地方有萬餘人者或稱有數萬人者但彼處俱係蓄髮我國之人非照彼蓄髮不能久留其地噶喇巴米糧甚賤工藝之人易於獲利是以蓄髮居住婚娶生育竟不作故土之想間有欲回内地者剃頭逃歸吕宋係干西臘國之轄屬住居其地者毋庸留髮現在亦有數千人臣等思此項人去自何時無可稽考而訪聞𫝊說雖大畧相同究無實在確據必須遣員前往查探細亦可斟酌定限年月則飄流之人咸得復歸故土矣但未奉諭㫖不敢擅専謹先繕摺請㫖如果可行臣等即行𨕖委的當之人一面遣往一面再行奏聞謹奏覽雍正五年十月二十六日浙閩總督臣髙其倬謹奏為奏聞事竊查臺灣總兵陳倫烱操守頗好辦事亦勤安平協副將康陵自到任以来實能大改舊習破除情面辦理俱為好官但臣訪聞得二人因爭欲見長意見不和臣正在細察其實近據康陵詳稱安平礮臺用木為架不如改用磚石壘砌堅固經久臣諸事為經久之計原不妨各出己見㕘酌期於極妥但臣細審二人之文皆中含不平之氣則其不和是實臣現在密行勸飭務令和衷不可存絲毫爭勝之心彼此之見應俟看伊等果能照行與否再行詳確奏聞但臣思臺灣係海外要地鎮協俱武職大員若彼此不和則於營伍地方不但無益且更有損不於其細微初起之時預早調劑恐久必致貽誤臣愚昧之見康陵雖係福建人原是陸路水師不熟臣請先行調移仰乞皇上於各省記名水師副將或㕘將之中簡放安平協副將一員將康陵不拘何處移調陸路副將似為妥協至陳倫烱雖現居官亦好然看其才具器量於臺灣尚覺任過於才臣亦乞皇上俟睿鑒酌有勝任之員仰祈簡放或將陳倫烱調别處水師則仍是一好總兵抑臣更有敬奏者臺灣總兵之任聖心時厪睿慮實一時未得其人臣亦於閩浙總兵副將中細看未見有確能勝任者臣思臺灣總兵因管有水兵故必於水師人員中求之但水師人員為數不廣得人實難又查臺鎮所轄之地皆髙山平埔與内地陸路之邊海者無異即兵亦皆内地撥去陸路之兵惟安平一協是水兵有一熟諳水師之副將専管又有將備佐之儘可料理總兵如浙江提督之統轄亦儘可管理其總兵之任即放陸路之員儘可勝任不必慣熟水師之人敢乞皇上於各省陸路之中已做總兵一二年試有成效之奏既不能辨其是非曲直莫若二人並調洵良策也將朕所批一切訓誨之旨俱令常賚知之同日又奏為奏聞事竊查今年自春夏至秋末福建海洋俱各平静近據南澳鎮左營守備稟報據廣東省護理守備事千總許元報據樟林港李財生等呈稱伊等合駛小蝦船二隻十月十三日出海採捕駛至雲葢峙花嶼洋面被賊數十坐􅭧船將伊等二船刦坐將􅭧船舵水放回並無哨船救追駛至福建將軍澳十四日刧大商船一隻十五日又刧一隻仍拏伊船中水手杜阿利一人幫他駛船将伊等放回等語臣當即分行各營嚴密追捕并查該管将弁揭㕘隨准提臣藍廷珍咨稱伊曽任南澳數載彼處洋面甚悉雲葢峙邊並無花嶼地方且雲葢峙離福省之將軍澳有五垵之遠此時北風盛𤼵十三日盜賊刧坐蝦船本日斷不能到將軍澳又於十四十五日刧坐商船所呈定有别情巳檄行詳查等語臣以賊刧商船無論閩粤只是竭力查拏嚴飭弁兵追捕又經續行各營嚴緝務必究出實跡兹據署銅山營㕘將李燕稟稱已差密訪有廣東澄海縣外埔鄉賊夥楊阿亥等在漳林港外坐牽風船一隻出洋在澄火垵刧商船一隻等語臣又飛委幹員密往㑹拏所有情節臣謹繕摺奏聞謹奏擒捕盜賊猶如鷹鸇之逐鳥雀何暇分别此疆彼界耶督令嚴緝務獲硃批諭㫖巻一百七十六之七欽定四庫全書硃批諭㫖巻一百七十六之八硃批髙其倬奏摺雍正五年十一月十七日浙閩總督臣髙其倬謹奏為奏聞事竊照十月内臣據南澳鎮營報稱有洋盜在雲葢峙到将軍澳刧坐鄭廣利等船隻後又經報有洋盜在洋刧鹽船户吴徳隆船隻帶去水手杜阿利一名臣隨嚴飭南澳銅山鎮營各員搜拏兹十一月十五日據南澳鎮左營㳺擊禀稱所差弁兵躧到廣東普寧縣地方拏住此案賊夥李阿才李阿皆黃阿鳳三人因普寧縣借去訊供俟訊畢另解外又拏獲盧阿利李武臣王阿熊三名解赴水師提督兹准提臣藍廷珍咨訊問盧阿利據供是廣東海陽縣人盜首係洪伯封共四十四人九月十三日夜在廣東潮陽鳳規港坐􅭧仔船十四日到臨浦港口刧坐鄭廣利鄭財源繒船二隻分坐不是在將軍澳彼時洪伯封帶二十三人坐一隻洪阿福帶二十一人坐一隻伊在洪阿福船上九月十六十七日到福省將軍澳洋面刦魚船一隻又刦吴德隆鹽船一隻水手杜阿利是願入夥的隨回廣東到神泉二十四日洪伯封刧杉木船一隻即帶人換坐去了小的隨洪阿福因船上無米散了黨洪阿福原在恵來縣東門住洪伯封是揭陽縣白塔鄉人拏獲之李阿才等皆係同夥器械有牌刀竹篙鋛百子銃散伙時丢下海去了此器械俱是揭陽綿湖寨監生荘相老出錢買的等供除批臬司研審實情查揭將軍澳失事二船該管各員㕘題并飛飭該營再速上緊務拏盜首洪伯封洪阿福及窩主監生荘相老各夥盜兼咨移粤省㑹拏外所有已獲盜夥供吐情節臣謹繕摺奏聞謹奏緝盜禁姦若稍渉疎縱非比容隱屬員之過希朕寛貸汝也同日又奏為奏督印務二次人尚老成隨飛用公文委其署理金門鎮總兵印務厦門係其必由之路一面密寫一字并寫一委護水師提督印務照㑹遣人密送令其密行帶往到厦門之時細看提臣藍廷珍病體如何若已全愈伊即前往金門署理若提臣病體雖好尚未全愈可在厦門看視其病俟全愈時再往金門若提臣病沉即在厦竟幫助料理營務倘有事故即行護理提篆巳飛遣前去今臣所遣到厦門之人已回提臣藍廷珍病體已好但尚覺軟弱謹將情節奏聞抑臣更有請者提臣藍廷珍病雖漸愈秉賦亦壯但年已六十之外恐將來舉發厥暈加重厦門地方闗係緊要臣愚昧之見應行預籌臣看金門鎮離厦門最近現在金門鎮總兵林秀雖有征臺功績水師亦熟惟是性情輕浮向有貪名臣已遵㫖酌令起身陛見臣仰懇皇上簡一可任水師提督之人就近補授金門總兵以備接辦提督事務庶緩急可資彈壓臣謹繕摺奏請伏乞睿鑒謹奏水師大員皆在閩粤閩省係爾所屬地方粤省乃貼近隣封其賢否豈有全無聞見之理若漠然不闗全諉卸於朕朕又不能就近驗試倘致誤用貽害地方爾能辭其責乎念之殊為寒心至於林秀原無足取所以日前曽經有諭金門較之海壇尤屬緊要設以朱文謂可更替即應奏行如以為不可宜將何員調補之處亦當陳請乃悉置之莫定現任者不能朂勉教導因材器使後進者亦不能作養鼓舞拔置上列但言林秀之短以為不克勝任金門或係陸路之缺他省督臣猶可代爾訓練好員前來更替無如水師各營皆爾所屬爾不訪求搜羅令朕從何覓人以應似此潔已獨善全不體諒朕躬恐身名䘮失之憂行將及矣同日又奏為奏聞事竊照福建泉漳二府民間大姓欺凌小族小族亦結連相抗持械聚衆彼此相殺最為惡俗臣時時飭禁嚴查今查得同安縣大姓包家與小姓齊家彼此聚衆列械傷殺署縣事知縣程運青往勸被嚇濳回隠匿不報該營游擊亦不行禀報殊屬溺職臣一面具疏嚴㕘外閩省此等惡習必加嚴懲嗣後方知警戒斂戢臣亦一面委員嚴拏為首糾衆行兇者即行杖斃以懲惡俗餘者懲戒料理所有情節謹先繕摺奏聞謹奏空言自屬可聽實行殊未能信覽奏徒令朕觸目煩心耳雍正五年十一月十九日浙閩總督臣髙其倬謹奏為奏其彼此協同盡心料理務令營伍地方十分妥貼安靜恐厪聖懷臣謹将情節再行繕摺奏聞謹奏顏光旿何如觀其奏對甚覺明亮周詳同日又奏為奏聞事竊查福建陸路提督丁士傑到任之始於營伍頗為經心料理近聞耽於逸樂不専心公務以致營伍漸弛且更貪取小利將弁兵丁不服不畏與其向在京城舊識之人夥同販馬散賣各營以勢制壓每馬一匹向日十六七八兩不等者今俱要按照部價庫平二十二兩一匹近因軍政借部冊名色每營按派十二兩八兩不等又向來提督有親丁名糧八十分以為養㢘前任提督吴陞發出四十分與營中只存四十分丁士傑要復舊數仍不肯俟糧出陸續扣補尋事借革兵丁名糧所革之糧不容營中頂補盡行扣起又減馬糧合標不服又近有提標前營兵丁黄宇强割民人王貫之田被獲送縣有管隊魏三餘丁黄佛同兵丁等搶犯打傷王貫及至該營遊擊傅為宿送縣将黄佛責枷又有兵丁將枷犯擡去提督丁士傑不㕘傅為宿當將兵丁止行棍責又提標兵丁歴有抗糧之習近因提督寛縦抗納益多臣過䝉皇上格外隆恩不因丁士傑曽經臣保舉敢袒護容隱臣看丁士傑實不勝提督之任謹先繕摺奏㕘至不能嚴管兵丁之逰擊傅為宿及署晉江縣知縣蘇本潔臣另㑹疏題㕘謹奏覽奏已有㫖矣雍正六年正月初八日浙閩總督臣髙其倬福建廵撫臣常賚廣東廵撫臣楊文乾謹奏為遵旨定議先行具摺奏聞事竊臣等欽遵諭㫖将洋船貿易之人留住外國之處㑹摺議奏欽奉硃批詳細訓誨并令臣等定議先行繕摺奏聞欽此臣等謹遵㫖㑹同再議得嗣後福建廣東凡出洋船隻俱令地方官嚴查船主伙長舵工頭椗水手并商客人等共若干名開明姓名籍貫分取族隣行保出具切實保結再令同業三船連環互結該地方官一面給與印照一面加結造册冊内逐名開寫年貌申報督撫并該管文武各員俾其照此查驗督撫再行頒到海洋事宜内載康熙五十六年定例所去之人留在外國將知情同去之人枷號一月仍行文外國將留住之人解回立斬等因後奉聖祖仁皇帝有令回内地之㫖准行之後臣等欽遵傳諭到彼處之時定限一年如有願回之人不論年分遠近俱准其附船回籍查明交地方官點騐查管不許復往如一年限内不覺之日官民俱照容留逃人例議處治罪此定例立限之處多寫傳單𤼵交出洋貿易商人令其帶往曉示如此則先去之人可以依限回籍而現在前往者亦不敢再留異地矣是否可行臣等謹遵㫖先行繕摺具奏伏乞睿鑒裁定另疏具題謹奏具題到日有㫖浙閩總督臣髙其倬謹奏為奏聞事竊照開洋一事經臣奏請仰䝉聖恩准行欽遵在案臣隨行令凡飄洋船隻務令將船上人數據實造報先取族隣地保不敢稽留外地甘結地方官加具印結并填左右箕斗再令海口文武各員查驗明白方准放行檄行各屬并張示曉諭已經數月有餘續於雍正五年十一月十三日臣准到提臣藍廷珍咨稱據洋船户陳國泰等舖户張喻義等呈稱舵水人等終年操駕手皮粗厚羅紋不明箕斗難辨且通船數十人臨時開棹不無死䘮病故另行雇募原結難符箕斗不對至貨客多有别州越府之人臨時搭船令回取結勢必稽遲風􅰆請於出口之時將船内舵水貨客姓名年貌籍貫逐一造報同殷實行家具結赴厦門同知及水師提督中軍衙門存案入口之時如缺少一人遺留外國重甘罪責等由又據管理海闗事原任驛鹽道陳豫朋詳同前由臣行司道詳議隨據㑹詳在厦行保多係有身家之人舵水商客責成該船户具結仍著各行保船户五名互結送厦門同知及水師中營衙門查驗日後回棹時按册查點倘有互異將原保結之行保船户嚴治其罪以此責成則船户不敢容其冒頂而箕斗似可免填亦可不必取具隣族保結矣等因臣隨批水手人等牽篷扯索箕斗不明免其填註至取隣族地方保結一節通飭巳經數月何以俱不遵照取具此時方以風􅰆為巧飾之詞且商客船主皆泉漳之人居多相離不逺俱行仍令取結批行去後近聞各商客仍有以坐失風期有誤客貨為詞在厦具呈請詳者似此奉行巳數月之久相隔地遠者不過數百里乃竟不回縣取結延至臨時欲以誤期誤貨脅制冀免以便營私臣斷難任其借端脅制遂其刁計所有情節臣謹詳行繕摺奏聞謹奏堅執不移甚善魯論云民無信不立凡百處悉宜如是無可疑者當此創始之際稍若游移將就向後法不行矣誤貨誤期皆伊等自誤與人何渉同日又奏為奏聞事竊臣訪得興化府莆田縣軍犯郭允宣原係武舉恃家富族盛霸惡强横為害地方犯事發配山海衞令人頂替又復報死濳回從前數年躱在鄉中教人拳棒近因年老事久常常回家濳住通縣之人俱畏其族强勢大不敢舉首至於府縣衙役營兵頭目人人交厚百方為之隠蔽臣近訪其回城度嵗密令遊擊李䕃樾躧實拏獲據供係先以人頂冒後報病故康熙五十七年逃至京中居住五十八年逃回福建先年原教拳棒近日老病無曽教人等語除臣已行具題外所有情節理合繕摺奏聞謹奏斯舉甚屬可嘉事事咸肯似此留心整理何慮地方殘穢不除風俗不美郭允宣亟當處死以為不法者戒同日又奏為奏聞事竊查福建人情愚悍輕浮好事凡有喧閙一唱百和泉漳二府尤甚雍正五年十二月十一日學臣程元章在漳州府教場考試馬箭因人擁擠軍牢執鞭趕打誤打著武生何衝斗衆生童人等遂因此喧鬧丢擲瓦石其所以如此之故因學臣矢意拔擇實才凡武童必要其弓箭好漢仗可觀者方看策論取進其年老弓箭不堪者俱止令射一二箭即行攔下不令再射無知之徒因此懷怨遂借以洩憤而好事之人亦相附和似此惡習大干法紀而生童如此尤可痛恨除當時學臣程元章已令提調拏獲棍童徐仲顏英林鳳等七人臣據各屬員禀報業巳飛飭地方官盡力嚴拏詳行研審務得實在為首之人盡法嚴擬重懲另行具題外所有情節臣謹先繕摺奏聞謹奏好朕已聞之業經有旨矣同日又奏為奏聞事竊照水師提臣藍廷珍患病情形經臣具摺奏明續於雍正五年十二月二十三日臣所遣往問視提臣之把總胡楷稟稱提臣藍廷珍病已全好見屬員辦事如常該把總面見惟氣比前少弱今年正月以来比前全好所有情形臣謹繕摺奏聞謹奏藍廷珍病巳全愈業既聞之矣水師提督一任仍當留心預擇克勝之人朕亦時時在念此缺實屬緊要同日又奏為奏聞事竊查閩省同安縣大姓李姓陳姓蘇姓莊姓柯姓合為包姓小姓各雜姓合為齊姓彼此聚衆列械格鬬互相傷殺一事經臣將不行報出之署同安縣知縣程運青署同安營遊擊孫濂題㕘臣看原任臺灣府知府孫魯雖不勝臺灣之任然人頗明白歴練隨委令前往辦理又委延平協右營遊擊張起雲往署同安營遊擊事務福州城守營守備王振署理同安營守備事務命往候補知縣吴永權署理同安知縣事務令㑹同將為首之人查拏嚴審又將臣辦理之意詳諭令其先行嚴切曉諭如仍敢蔵匿不出聽審即著兵役嚴拏為首之人加倍重處兹據孫魯張起雲等稟稱到同安嚴行曉諭數日之後其大姓小姓各為首之人俱皆一一投出聽審隨將大姓為首之李邦小姓為首之葉祖𫝊皆行監禁餘兩邊幫附為首之人俱分别拘候臣已令興泉道張廷枚同孫魯㑹同地方官研審實情分别嚴懲另行具題請㫖以警愚悍外所有兩姓為首之人𤼵審情節臣謹先兇頑慣盜然臣細訪此族中平日為之主持暗提線索者乃係李衷是原任㕘將李若驥之兄捐納貢生一切爭鬬皆伊主持一切訟盜皆伊護庇若此事據外面情節止處李邦不處李衷仍不足以警戒姦頑今拘審之時李衷已令到案臣必究其平日惡蹟另行嚴懲臣之愚見嗣後凡泉漳生事之大族細訪察其如此暗提線索之人及敢於率𤼵之人地逺勢孤亦必不能倡和為非再泉漳二府向因防海寇家家有刀鎗器械自守遂沿為積習以為故然今應因此格鬬查收但地方守令及營汎員弁若不善於辦理稍假手胥役目兵不但滋擾而所收仍必不能清楚臣先揀最緊要之處擇能辦之文武各員即行查收料理其餘以次料理此懲戒為首之人及查收鎗械臣必竭力辦理期有成效斷不因循遲緩謹一并奏聞謹奏此等處要湏鼓舞屬員實心盡力方能有濟設遇一二有爲者甫欲整理稍加振作縁耳目不明讒謗易入拘以文法不原其情輒目之為多事喜功屬員窺見隠微人人惟思潔身自全而已誰肯任怨冒愆勇往向前汝等督撫操通省權衡意指所向好惡愛憎關係匪淺若肯强勉如此力行一二年後見有成效始信朕言之不誣也一人之精力有限如不能合衆力以為用諸務殊難就理惟宜廣視聽勤訪察再加以委用得人則何事不克辦集耶同日又奏為恭謝天恩并陳臣悃事竊福建省倉穀錢糧䝉皇上特命廣東巡撫楊文乾浙江觀風整俗使許容吏部郎中鄂彌達内務府員外郎今陞福建鹽運使伊拉齊等㑹同福建巡撫常賚徹底清查今積年銀穀仰荷皇上隆恩皆已一一清楚臣感激無地慚愧無地伏念臣身叨封疆重任復受格外深恩於此緊要重務不行清楚查辦仰負聖恩俯慚臣職惟有跪懇皇上將臣重賜治罪臣心稍以得安臣繕奏之際執筆愧無一詞謹此恭謝天恩并陳下悃伏乞睿鑒施行謹奏似此虛浮套語朕殊厭覽雍正六年二月初十日福建總督臣髙其倬謹奏為奏聞事竊查福建地方自上年冬末日日晴霽今年正月上半月以来又連皆晴天福省地暖麥熟頗早二麥急需雨澤即稲田雖尚未至種時其田中亦得雨水浸泡土方酥軟將来插秧易於暢茂兹自正月二十日至二月初旬日日有雨且又甚大二麥甚為得力現已有抽穂者百姓僉云一定有收稲田内之水俱滿將来早稻插秧水可足用再自上冬至今春福省米價和平惟正月初民間見無雨恐麥不收成泉漳米價畧長每石賣一兩六七錢今得雨之後又每石仍賣一兩四五錢不等所有情形臣謹繕摺奏聞謹奏據奏閩省情形已悉未知汝曽聞浙豫滇黔荷䝉上蒼所賜之雨雪膏澤否也雍正六年四月十二日福建總督臣髙其倬謹奏為奏聞事竊照福建今年二三月以來雨水甚多各府二麥俱有八分以上收成早稻各處巳插完十分之九所餘者現在栽插惟三月二十一二等日大雨甚急山溪之水下來大驟福州府之西南二三十里内稻田所種之秧水俱葢過秧頂數寸亦有一尺多者一日之後雨止水退稻秧依舊青茂並無傷礙餘延建泉漳等七府俱無此大水稻田俱好至各府米價目下每石自一兩二錢起至一兩五六錢不等所有情形臣謹繕摺奏聞謹奏閩省自不能全慶豐收何也吏治如斯安望嘉應俟朱綱到任後或看有無徵驗天道惡僞惟一派公誠方能默有感召同日又奏為恭謝天恩凜遵聖訓事竊照福州副都統阿爾賽自京回閩口傳雍正六年正月初八日欽奉皇上訓誨微臣諭㫖臣跪聽之下感激涕零伏念臣一介庸愚仰䝉聖恩畀以海疆重任柔懦愚昧罪戾山積捫心自問夙夜無以自安乃荷聖主天髙地厚之恩訓誨諄諄無微不至臣若不警心刻骨痛自悛改不但上負聖恩仰且有靦人𩔖嗣後臣必痛改柔懦斷絶猶豫凡辦理事務及分别屬員務立剛果一定之見不存游移兩可之習除預備水師提督人材及稽查料理沿海姦民之處臣另摺具奏外所有臣感戴凜遵聖訓情節繕摺奏聞謹奏嗣後痛改與否在汝捫心自揣耳同日又奏為奏聞事竊臣前奏摺内欽奉硃批顏光旿何如又福州副都統阿爾賽回閩口傳聖諭水師提督藍廷珍年紀巳老命臣於所知人内預思賢員以備將來任用欽此欽遵伏查福建水師提督之任實為緊要藍廷珍近日病已全好現可辦理但年已六十之外又有舊日痰病預行選備人材我皇上睿鑒深遠周詳無微不至臣謹就愚昧所見據實詳極為熟悉且於海疆事務甚知輕重緩急之宜能有定見過海屢次並不暈船水師中事務亦俱知道臣以為可預備水師提督之用福寧鎮總兵顏係總統調度之人不比將備必要衝風破浪然遇有緊要之處亦須身到目擊則指麾更為親切而將士愈加奮勉若才勝提督之任又能不暈船乃以上四人臣所知之中俱係好者就臣愚見若預備水師提督之選臣以為王郡為首可備任用阿爾賽次之顔光旿又次之朱文又次之其實料理營伍以阿爾賽之才具與顔光旿之諳練相較原不相上下但臣細查人之不暈海船可以操演而能即閩省水師之中生来毫不暈船者千百人中不過數人其始終暈吐操演不來者千百人中亦不過數人其餘皆漸漸操演久之自能不暈顏光旿年紀亦大似難操演阿爾賽年力壯盛可以操處嚴密實在扼住盜艘之咽喉并可查盜窩之根脚現在總兵陳祖訓居官及才調俱係中平不勝此任臣查海壇一鎮其緊要比南澳少差臣謹仰繕名摺恭呈聖覽仰備睿鑒謹奏水師列名一摺留覽斯不過就汝目前所見而言將來亦不可固執謂巳有此摺在大内也同日又奏為欽遵聖諭事竊照福州副都統阿爾賽回閩口傳欽奉聖㫖中國民人過海到外國居住有十年十數年者回来沿海居住造揑無影浮言煽惑人心無識愚人不辨是非有從之妄行者亦未可定似此應密諭地方官巡查訪察有此等之人不可令在海邊居住當遷移之於内地散其隨附妄行之黨不但内地清靜即外國聞之亦生警懼矣欽此臣謹欽遵聖諭除密行兩司沿海道府㕔縣各鎮協營文武密查細訪并密咨㑹撫臣水陸二提臣嚴密察訪實力查拏外臣更另自嚴密設法詳細時時加意訪查并切諭屬員不時上緊留心一有此等人消息形跡立即嚴拏必獲務盡根株情重者盡法嚴處餘充𤼵腹省其有經臣訪拏究實而屬員不知者嚴㕘重懲以絶引誘之源煽惑之弊庶惡黨無所蔵姦外地聞而知警所有臣欽遵查拏辦理之處謹繕摺奏聞謹奏實力設法搜緝留心密訪始不致有疎漏空言何益勉為之同日又奏為欽遵聖訓痛自奮勉事竊臣前奏水師提臣藍廷珍患病一摺奉有皇上硃批臣跪讀之下不勝愧恧惶悚涕淚如雨雖犬馬猶知報主况臣過䝉天地之恩仰荷封疆之任寧甘犬馬之不若嗣後惟矢此寸心恪遵聖訓竭盡心力痛改優柔訓勵所屬將備培植水師人材務期少有實效斷不徒飾具文至一切賢否可任與不可任之處必就臣所見決定再仰請聖鑒總之臣果能如所奏與否自難逃皇上睿照之中臣斷不敢一毫粉飾所有臣恪遵聖訓痛自奮勉下悃謹繕摺奏聞仰祈睿鑒謹奏凡人但於晨起出户時仰首對天無慚晚歸就寢時捫心自問不愧斯於立身行已之道其庶幾矣同日又奏為恭繳奏摺事竊臣欽奉皇上發交臣審周鍾瑄一案禪濟布汪繼燝景考祥等奏摺共三件又宜兆熊毛文銓㑹奏摺一件今此案經臣審擬業巳另疏具題仰祈睿鑒外所有臣原欽奉到皇上𤼵交臣奏摺四件理合恭繳謹奏此案之審擬殊屬可笑之至即斯一事據所辦理而論若言巳知朕意所向痛改前尤實令人疑而難信也原交四摺仍復發回爾將日前朕所面諭此案之始末情節一一僃述與朱綱許容知之同日又奏為臣罪難逭恭謝天恩事竊臣前奏摺内欽奉皇上硃批前日閲爾續報之摺忽見有業巳奏聞之語朕疑訝良久隨經批爾查覆今覽此奏始知到遲之故數千里外關河迢遞漫不計算緩急先後遂逆尅必到之期而預作是語殊欠精細欽此臣跪讀之下不勝慚懼所奏之事關係緊要臣乃不計程途之緩急到期之先後疎忽錯誤以致上煩聖心臣實罪不可逭仰䝉天恩仍加以訓誨臣感激無地惟有愧懼戰慄謹繕摺恭謝天恩伏乞睿鑒謹奏總屬可笑絜矩之道全然未講身不居帝王之位遂不知帝王之苦衷目不親士庶之事又焉知士庶之疾痛朕之苦衷非但不能深知併且全不體諒安望能仰慰朕懷耶雍正六年六月初七日福建總督臣髙其倬謹奏為奏聞事竊查福建四月以前雨水甚勻各處二麥有八分以上收成米價平減泉漳二府尤為平減四月間泉漳糙米每石只賣銀一兩二錢自四月末至五月十六七日福興延建邵汀六府及福寧州二旬無雨早稻覺旱於五月十八九至二十五六等日各府俱陸續得雨除延建邵汀四府其稲係只種一季者收成在九月十月其分數方定現今田禾秀茂至福興二府之田係先種早稻六月内收畢早稲又插晚稻九月十月間再收晚稻泉漳兩府亦然現今此四府之早稻俱已刈穫漳州府有九分收成泉州府有八分以上收成興化府有八分收成福州府得雨稍微髙田未透足其低田有八分收成平田有六七分收成髙田有五分收成福寧州地方俱經得雨亦尚未透足臺灣府雨水勻足禾苖茂盛其稻收割尚遲現在各府米價如常甚平泉漳二府比四月之價每石又減一錢再今施設醫藥調治現今時氣已退病者巳少所有各項情形臣謹繕摺奏聞謹奏覽雍正六年七月初六日福建總督臣髙其倬謹奏為奏聞事竊查臺灣道吴昌祚陞任員缺臣接准部文以朱鴻緒補授臣又接准吏部咨開雍正六年五月初二日奉上諭前朱鴻緒在朕前奏稱鳳陽府原有積欠十萬餘兩伊在任設法勸諭督催於二年之内將積欠十萬餘兩悉行催完所欠不過數千金等語朕以其實心辦事曽經降㫖嘉奨今聞鳳陽府積欠並未全完刁承祖接任始徴收三萬餘兩尚有七萬餘兩未曽完納不知朱鴻緒從前陳奏是何意見著行文朱鴻緒令其明白回奏欽此合咨等因到臣欽此欽遵臣擬俟朱鴻緒到閩之時即遵㫖令其明白回奏迄今已久朱鴻緒尚未到閩臣愚以為臺灣地方緊要道缺既難久懸且恐朱鴻緒或係一膽大妄誕之人即使到閩令其赴任伊若任意行為必致貽誤臣因地方起見謹一面奏聞一面俟朱鴻緒到閩臣竟留之省城令其明白回奏候㫖至臺灣道一缺臣看新到汀漳道孫國璽前在杭州知府任内官聲才具俱好近見其人心地明白為人端方用之海外重地似為相宜仰祈皇上以孫國璽調補臺灣道其朱鴻緒俟其明白回奏之後若無虚妄之處再以道員補用臣謹就所見繕摺奏聞伏乞睿鑒謹奏此奏甚是已有旨矣雍正六年八月初十日福建總督臣髙其倬謹奏為奏聞事竊查福建省自七月初旬以來興化漳州汀州建寧邵武延平福寧六府一州之各屬有報得雨霑足者有報得雨甚大者有報連得小雨者將來晚稻俱可有收其雨小之處不過收成稍減惟福州泉州二府所屬天氣甚旱除永福縣已報霑足其古田羅源閩清安溪永春徳化六縣俱報巳得大雨晚稻將來可得五六分收成餘福州府屬之閩縣侯官長樂福清連江泉州府屬之晉江南安同安恵安此九縣所有晚稻十停之中田内無水竟不能種者二三停巳種稻而乾壞者二三停俱無收成餘四五停内有山泉及潮水浸泡者二分有水可車潤者三分此四五停之田將來晚稻可望四五分收成臣同撫臣朱綱現遣員詳細踏看分别成災分數另行具題外臣前奏摺内奉有硃批閩省自不能全慶豐收何也吏治如斯安望嘉應俟朱綱到任後或看有無徵驗天道惡偽惟一派公誠方能黙有感召欽此欽惟我皇上聖鑒早巳見徹聖主睿照如神臣罪萬死莫贖臣奉職無狀深負聖恩上干天和下貽民瘼慚愧汗慄無地自容伏乞皇上立賜嚴治臣罪以為不誠不公貽誤封疆之戒臣實無詞但臣犬馬寸忱更有冒死仰懇天恩者臣當無事之時玩廢封疆而當旱災既成之後將難辦之處卸肩他人雖則臣膺重罪而臣仍因此作事外之人臣心萬不能安萬不肯安臣謹垂淚叩頭仰懇皇上重治臣罪或暫留閩聽督撫差遣揀旱災最甚極緊要之地令臣幫同州縣辦理一切糶賑之事事一竣畢即正臣罪使臣心於萬分難安之中得盡犬馬之心於毫釐死亦瞑目實出聖主天地父母之恩臣不勝惶悚愧恧之至謹奏果肯如此誠心悔過返躬自責試觀来年上天之錫佑必不爽也同日又奏為奏聞事雍正六年四月十八日臣訪聞臺灣北路地方有姦徒結盟拜把蔵有大旗二面長槍四十桿以雙龍􅋦珠銀班指為號又有僧人梁懷以假辮冒為俗人形迹可疑臣隨飛檄臺灣鎮道府縣密行訪緝嚴拏㑹訊去後於四月二十一日據臺灣鎮總兵王郡禀據諸羅縣知縣劉良璧訪聞縣屬茇仔林地方有無知棍徒招𩔖結盟拜把隨經拏獲湯完陳岳二名又續獲蘇亮賴妹朱寳陳斌魏迎魏祖生共八名嚴訊衆供相同除蘇亮相約未到外餘係每人出銀一兩陳斌起意招人於雍正六年正月十三日在湯完家結父母㑹㰱血拜把共二十三人湯完為大哥朱寳為尾弟三月十九日係湯完生日又要招人拜把十八日即被拏獲等情并據臺灣道府及諸羅縣報同前由臣又批令務盡嚴拏夥黨去後於七月初七日據臺灣鎮道府縣等各禀稱陸續又拏到蔡祖黃富方結吴竈張夀吴科王馬四黄贊許亮林二等十人反覆嚴訙與前獲之湯完等所供無異刺血滴酒設誓拜把是實並無大旗長槍軍器除未獲之阿乂林生林茂鬼里長蘇老興現在嚴拏務獲究擬蘇亮審無入夥外查定例異姓歃血訂盟不分人之多寡照謀叛未行律為首者擬絞監候為從者杖一百流三千里此案雖湯完為大哥實係陳斌起意招人應以陳斌為首擬絞監候其湯完等各犯均照為從擬流黄贊蔡祖朱寳年未及歳應照例收贖具禀前來又臣於八月初一日據諸羅縣禀報於六月内該縣同守備楊樊訪得縣屬蓮池潭亦有棍徒拜把拏獲陳卯一名供係蔡䕃為大哥共二十一人隨又陸續拏獲蔡䕃林寳楊派田妹廖誠林元洪林生周變黄戊董法石意黄富曽屘蕭養等嚴訊係蔡䕃為大哥雍正四年五月初五日與陳卯林寳楊派田妹廖誠周變周添曽文道吴結林元黄富董法十三人結盟是實並未歃血又於雍正六年三月十八日在蕭養家飲酒舊盟十三人新添洪林生施俊郭緞曽屘陳郡黄戊蕭養石意八人共二十一人再行結父母㑹拜把内周變不到共二十人仍以蔡䕃為大哥以石意為尾弟並無器械擬將蔡䕃照未結歃血焚表結拜兄弟為首例杖一百折責四十板陳卯等合依為從例杖八十折責三十板内董法石意僅十五嵗應照例量予責懲曽文道周添吴結施俊陳郡五犯嚴緝務獲究擬又據臺灣鎮道知府亦各禀報到臣臣查臺地逺隔重洋風習不純人情易動此等之事懲治當嚴且結盟以連心拜把以合黨黨衆漸多即謀匪之根何可從輕𤼵落臣擬將湯完陳斌俱行令曉示立斃杖下以示懲警餘人照例解審問流蔡䕃二次拜把為首亦應杖斃餘者加重枷責押過海交原籍禁管安插隨將此意商同撫臣朱綱撫臣意亦相同正在㑹同檄行臣又訪聞此二案内頗有案盜在内若曽經為盜雖為從者亦難輕縱臣現又飛行確查俟分别明白再行詳飭𤼵落所有情節臣謹先行奏聞其梁懷一名細令研審實係貪戀幼童故扮俗人無為匪情由除臣行令查明係何項之僧照例加處謹一併附奏知道了處斷俱屬合宜同日又奏為奏聞事竊查福建飄洋船隻仰蒙皇上隆恩准令前往外洋貿易臣隨欽遵行令厦門文武各員將各飄洋商船人貨俱取地方官印結及行家的保各結嚴查明白陸續於雍正五年十月以後六年三月以前共船二十一隻由厦門出口前往今於本年六月末旬至七月内據署泉州海防同知張嗣昌前後共報商船户魏勝興等一十二船俱巳回厦共計載米一萬一千八百石餘係燕窩海參蘇木牛皮各貨原人俱各照數回厦惟髙陞船内有原去客人康萬王之賜二人因貨賬討不起暫留住咬𠺕吧討賬俟來年搭船回籍又魏勝興船内載回原留住咬𠺕吧人黄龍等五人内林哲一名在船病故林萬春船内載回原留住咬𠺕吧人郭堂等四人謝合興船内載回原留住咬𠺕吧人陳伯等三名髙陞船内載回原留住咬𠺕吧人郭加等十八人女眷一口小男孩二口小女孩一口甘宏源船内載回原留住咬𠺕吧人李從一名陳得勝船内載回原留住安南人陳茂興等三名各等因到臣臣隨飛飭該管文武各員將帶回之人詳細訊供係何年留住外地係何縣人何處居住家中有無父母妻子詳行查訊具報去後兹據署泉州海防同知張嗣昌查訙今巳經報到者據訊問魏勝興船内帶回之黄龍供係龍溪縣人在西門内居住有妻有二子在咬𠺕吧十七年了在彼賣茶生理據朱猜供係龍溪縣人南門外居住有妻有一子在咬𠺕吧十八年了在彼種田據韓聘供係龍溪縣人在北門保居往有妻有一子在咬𠺕吧十八年了在彼種園據陳厚供係龍溪縣人在二十七都長州鄉居住有妻有一子一孫在咬𠺕吧十五年了在彼賣草等因并詳將載回留住外洋各民人交各地方官查明安插前來臣隨批令將伊等押交各該府縣取具族地的保嚴密收管暫令在家居住外臣查留住外國人民一事自開洋一年以來詳細留心察訪近確知他故臣愚昧之見詳看情節此項回來之人應著落各該管地方官查明取保嚴管安插不許滋事亦不許再行前往但係久住外國回来之人臣未敢擅便謹繕摺請㫖伏乞睿鑒謹奏俱係未經奉㫖宣示以前之人應准安插原籍但須留心察訪其情形耳雍正六年九月十七日福建總督臣髙其倬謹奏為奏聞事竊照福建省入秋各處缺雨情形臣巳繕摺奏明此後各處陸續俱得小雨至八月十三四兩日各處俱得大雨各處晚稻雖未收割看其情形漳州府可有八分收成汀州府福寧州可有七分收成其餘各府俱有六分收成惟福州府屬之閩縣侯官長樂福清閩清五縣泉州府屬之晉江南安同安三縣雖俱得雨其未插之田及巳枯之稻皆不能有收此八縣巳據報具疏㑹行題報又泉州之恵安縣晚稻亦無收成現經臣批查此一縣俟另行查報再臺灣府七月中旬以前雨水甚好田禾茂盛自七月半後至八月初旬俱缺雨水田禾亢旱近據報呈八月十三四日俱得大雨田稻可望收成但尚有雨水未足之處將來收成必稍減分數等因臣謹將雨水情形詳細奏聞臣查福建人稠田狹豐年米穀貴於他省今秋成歉薄嵗底来春價必昂長應預行酌量情形籌備平糶米穀以平市價以備民食現在延建邵三府所屬雖收成不甚豐足素係產米之地尚可自給汀漳二府收成尚好漳州民雖繁多亦現有所存運貯江浙米穀足備接濟青黄不接可無庸預籌外其福屬之閩侯福長清泉屬之晉南恵同九縣較他處收成更薄人民更稠將來米價必至騰貴今總計福州府各項米穀共可得米一十二萬六千餘石泉州府各項米共可得米四萬一千九百餘石以備来年平糶似屬不敷此應早籌接濟臣再四細思福州府應再籌備米四萬石方可敷用此外再多備萬餘石以接濟興化府二縣海壇金門銅山烽火各處兵民稍不足之用泉州府再應籌備米八萬石三共應需米十三萬石計臺灣來年例應運米五萬石撥糶泉漳二郡今年收成稍好來年只須撥二萬石以三萬石撥糶泉州但厦門亦屬要地應分糶一萬石以濟厦門所餘之米泉州可得二萬石尚不足六萬石臣再查今年臺灣應運糶泉漳米五萬石因泉漳米價甚平不曽撥運仍存臺灣前酌令撥運穀十萬石易補福倉今補倉之處且可不行祗以備濟平糶為重應趁此冬春間仍令臺屬運米五萬石即速辦理彂運以米三萬石運赴福州合之現存之米微覺歉少然僅不足萬餘石亦易籌濟如此則福州平糶有資至泉州所少之數應令臺屬將五萬米之内運二萬石到泉其尚不足之四萬石再加接濟興化等處之一萬石共五萬石應目下即行委員將現在存司米價交令齎往江南買米五萬石於今冬來春運到以備接濟如此則泉州及興化二縣各島亦平糶有資矣臣現與撫臣朱綱商酌另行具題辦理所有情節謹先繕摺奏聞謹奏前據朱綱奏到業經有㫖將江浙漕米截留二十萬石以濟汝等之用今覽所奏閩省現存米穀情形再加以截留之米似可從容辦理矣倘慮仍有不敷當預行奏聞候朕更為裁酌凡事有備則無患免致臨期張惶失措也雍正六年十月初八日福建總督臣髙其倬謹奏為奏聞事竊照臺灣地方緊要文武各員必俱稱厥職始於海疆不致貽誤兹查現在武員之中有安平協中營遊擊蔡徵溫寛縱兵丁不加嚴管臣業巳具疏題㕘又臺灣鎮標右營逰擊洪繼龍才具中平不宜海外之任臣現具疏請調内地另選幹員調往辦理至文員之中知府俞存仁人甚老成明白近日精神甚是不及事多堆滯恐有貽誤請調回内地調養看其精神如能復舊再請酌量題補至臺灣知府一缺甚闗緊要臣所知者有原任福建羅源縣知縣今陞江西南安府知府倪象愷聖恩放授臺灣縣知縣今辦理諸事拘謹執泥展布不開不勝臺灣縣之任臣冒昧保題所舉不當不勝慚懼伏乞聖恩將臣交部嚴處其張廷琰原係革職之員請仍革職除臣另疏具聞謹奏覽硃批諭㫖巻一百七十六之八欽定四庫全書硃批諭㫖巻一百七十六之九硃批高其倬奏摺雍正六年十一月初五日福建總督臣髙其倬謹奏為奏聞事竊照福建今嵗秋旱福州泉州各屬晚稻乏收臣因預備半年平糶欲遣員向江南買米五萬石前已經摺奏正在委員繕疏間於十月初十日接准部文業已欽奉皇上特㫖命浙江截留漕米或二十萬石或十五萬石或十萬石令浙江督臣李衛酌量料理運濟臣隨經遍行曉示閩省軍民歡呼雷動除臣謹率地方各官并據各民具呈繕疏恭謝聖恩另行具題外所有截留米石臣查目下福建米價福汀二府每石賣一两四五錢不等比前畧貴一二錢至興泉漳延建邵六府福寧一州俱賣一两一二錢一石米價不昂臺灣晚稻收成有七分以上各府人情甚是安定臣前尚預備嵗内之平糶今細㸔光景情形嵗内不須平糶即或近年之時省城泉州少需平糶亦不過畧為接濟各處現備米榖巳足敷用有餘惟來年正二三四數月之内須用平糶細算只需浙江截運漕米十萬石即足敷用臣業已咨㑹浙江督臣李衛并㑹同委員雇船料理運載其江南買米之處亦無庸舉行惟臺灣之五萬石尚需補運葢臺灣比浙江更為近便而臺灣即運此項亦不至費力難辦所有情節臣謹先行繕摺奏聞謹奏所奏是已有㫖矣雍正六年十一月二十二日福建總督臣高其倬水師提督臣藍廷珍陸路提督臣石雲倬謹奏為戍臺兵丁等事竊據福建福寧鎮臣顔光旿鈔呈原奏戍臺兵丁情狀敬抒管窺一摺欽奉硃批朕覽所奏甚屬合宜可與督臣提臣㑹同商酌如應具題即具夲題奏欽此欽遵㑹商到臣又水陸二提臣亦准咨酌議移㑹前來臣高其倬㑹同臣藍廷珍臣石雲倬往復詳細㑹商得據鎮臣顔光旿奏請每營量汰馬兵八名將節省之銀分給戍臺兵丁為盤費衣帽之用一節查臺灣共駐防馬歩戰守兵九千四百九十名皆從内地標營抽撥是内地之兵已缺九千四百九十名之用迨至年限將滿坐臺之兵未囘而出戍之兵必須先期遣往換替每當換替之時即有數月之久内地所有一萬八千九百八十名之兵不在營内以是内地稍覺兵單而閩省各營山海交錯所設兵制馬一歩九馬兵原為數無多若每營再汰去八名通省計之數至數百各鎮協營地方營汛有衝僻之殊萬難一例他鎮協營有不能再行減馬之處若或減或不減又不均齊畫一彼此難以岐視且戍臺兵丁原係案三年輪流換班其戰守均攤糧餉循行已久俱各相安若於戍臺者加賞將來或有調遣之處援此為例必至難行臣等按全省情形從長計議戍臺之兵應仍照舊給餉但其有家口留餉之處將五錢應改為四錢則戍兵稍裕而家口亦可贍給所有顔光旿請量汰馬兵節省錢糧分給戍臺兵丁之處應毋庸議又會商得據鎮臣顔光旿奏稱每兵原俱留餉銀五錢贍家請將所留之銀存於公處以為該丁回日娶妻之用一節查駐防臺灣之兵俱係由内地各標營選有父母妻子者撥往惟是營兵在伍無妻子之人居半是以亦有將有父母兄弟而無妻子者亦行撥往其戍兵之餉銀俱在臺灣散給前據衆兵公懇以家口在内地重洋遠隔寄銀艱難請每兵每月餉銀量留五錢以贍家口當經批司議覆并臣等會商相同准行在案今顔光旿慮及戍臺無妻之兵間有逃匿議將每兵毎月所留五錢之餉如係有室家者給贍家口如係無妻室者將每月五錢之餉交與夲管將備留存公處俟夲兵三年戍滿回營給領以為完娶之用等語此與無妻之兵調劑有益應如該總兵所請嗣後將改定存留養贍四錢之銀其出戍之兵如有父母在堂又别無兄弟侍養者將銀仍給伊父母為養贍如有已身雖出戍而有兄弟奉事或雖無兄弟而父母另有薄産足供養贍可以不須此項銀两者令各營詳細查明詳報將所留四錢之銀按月扣存著落該管將備千把公同收貯按季造册報查俟該兵回時選委同營誠實之兵公同料理為之營娶臣等不敢擅便謹繕摺回奏請㫖遵行臣等再查原奉硃批如應具題即具夲題奏今因馬兵既不議裁則額設兵馬數目以及每年支餉册籍俱係循舊無須具題合併奏明伏祈睿鑒謹奏目前且照議行候命廷臣議覆朕再加詳酌另有諭㫖福建總督臣髙其倬謹奏為奏聞事竊照福建收成及米價情形臣前已具摺奏明今十一月以來福興泉漳延建邵汀八府及福寧州各處米價俱如前民情安定又恭聞聖恩特沛截漕運濟百姓愈有所恃人情愈安米價竟平年内毫無需糶情景即各府來年又有皇上恩賜運來之米濟糶汀州一府不通海運亦業已預備米榖足備來嵗平糶臣㸔閩省雖冬收稍歉目今情形不但今嵗即至來嵗俱必定處處安静臣愚昧所知所見甚確如有不符甘受重譴恐上厪睿懐臣謹將情形繕摺奏聞謹奏深慰朕懐同日又奏為宻陳臺灣文員歴俸太久轉生懈怠情形事竊查臺灣各文員向以三年為滿後經原任總督滿保具題請三年任滿之員再行加銜留任三年原意慎重臺疆欲久留熟諳之員辦理但臣三年以來細察臺灣各員情形正任前後報滿既已歴任六年而調任之時渡海而往即須數月任滿候有缺挨陞又或一年二年既陞之後交盤渡海又得半年總計其前後日期大約俱得九年十年方得陞用又臺員例不帶家口其父母妻子相隔重洋託之親友未免繫戀意念分馳其辦理之處不免有始勤終惰之情景雖人臣之誼公爾忘私何可萌内顧之念但中人之情往往不免臣既見有如此情形不敢不預思籌度宻行奏聞以臣愚昧之見凡臺灣道府㕔縣各員嗣後請俱以四年為滿加其交盤往返之期約計五年有餘俾得陞調庶為期適中可收各員奮勵之效臣未敢擅即具題謹先繕摺請㫖謹奏所奏是已交該部議行同日又奏為奏聞事竊查福建海闗巡查之事不比他處之闗但止稽查貨税凡往來外國及臺灣船隻并外國來閩船隻出口入口皆係海闗稽查實以兼防姦宄臣查福興泉漳四府福寧一州共有海闗口汛三十二處迤邐周轉不下二千餘里自巡撫辦理以來雖専委管闗之官一員辦理但以一人之心力耳目查照二千里之逺數十口之多其勢已不能周遍又加以洋客船水之隠蔽書辦巡攔之姦詭遂致百弊叢生雖從前巡撫及委員衙門各遣家人坐口監查而家人愚下之輩何能見利不移一惟吹求商旅從不念及防姦原任巡撫朱綱到任以後只責委員查報不遣家人前往頗為得當臣暫且管理亦照之而行但臣細㸔亦尚未妥葢從前之不妥固多一層家人之累而今此之不妥又少一層互查之人巡撫専靠一委員委員又専靠衆家人雖所委之員廉慎奉公查懲竭力無如所轄之地既遠所用之人又衆心有所不及力有所不能稽查滲漏勢所必至僕役朦混難保其無臣謹思一法總理闗務應特委一道員稽查下再委府㕔總辦理令其専駐厦門總口其餘各口之在福興泉漳四府福寧一州者於各地官員不論府㕔州縣但㸔其人精詳奉公者選擇分委専查彼處口隘庶耳目就近難以欺蔽稽貨防姦事易精詳似於海洋闗税稍有裨益除臣一面辦理更定委查另行具題外謹先繕摺奏聞謹奏福建海闗已有㫖派遣京官前來管辦到時協同盡心料理可也雍正六年十二月二十八日福建總督臣高其倬謹奏為奏聞事雍正六年十二月二十六日欽差侍郎臣史貽直到福州省城仰䝉皇上天地父母之恩所有欽奉聖諭訓誨臣感激無地慙恧無地敢不痛自悛改一一敬記欽遵容臣詳悉另行繕摺具奏再奉㫖交令辦審查理事件容臣逐一會同辦理審查亦另行㑹奏外所有史貽直到福日期謹先繕摺奏聞謹奏前嵗在京朕覿面開心見誠諄諄訓誨不啻百千萬言尚不能動汝分毫今史貽直於幾千里外轉傳數句諭㫖曷敢望汝欽承痛革耶不過聊盡朕心焉而已總不得人柰何似爾等積年老練胷中定有成見者雖曉譬萬端竟牢不可破殊為莫觧静言思之終属朕之徳薄信淺實不足以感孚亦無怪乎諸卿也大小臣工若果咸遵訓誨任勞任怨竭力奉公則億兆奠安化行俗美之效計日可必其如羣然不肯何同日又奏為奏聞事竊照福建米價情節臣前已具摺奏明續於十一月内得大雨一次十二月二十六七两日又連得大雨田中俱已霑足二麥青茂大麥已有一半抽穗各府米價俱仍如前汀州府米價自十一月中旬以來每石一两三錢有零比前又減福州府米價每石賣一两四五錢不等但省會之地人煙稠宻每到元旦節近則米價定比平日稍為昂長臣於十二月十五日以後將所存未糶之浙江榖石於各營兵丁已酌糶萬餘石城内有萬餘兵丁之家不買米食則近節之米價可以仍然不長今十二月二十六七日以來已比前毎石俱賤四五分現在福建各府米價民情俱甚安静臣謹將情節繕摺奏聞謹奏覽閩省近日情形朕懷深慰雍正七年正月二十日福建總督臣高其倬謹奏為恭謝天恩敬遵聖訓切實改勉期竭寸忱事竊照侍郎臣史貽直自到閩以來凡在公所會集及署室對晤時時諄切詳細宣傳聖訓逐一教諭反覆開導竝將其日在禁庭目瞻心記我皇上宵衣旰食勤求治理所以敬天勤民惟誠惟實中外臣工視同一體之至意無不事事示知殷殷戒勉臣敬聆之下沁心洽髓感激涕零伏念臣一介庸愚過荷知遇畀以封疆重任格外寵榮涓埃無報愆戾山積皇上屢加寛宥頻賜矜全不但臣之顯榮華膴皆荷天地生成即臣之名節臣之身族皆出天恩所賜憐憫保全在臣奉職無狀慙恧欲死乃又䝉格外天恩數千里外命侍從大臣仍遠加訓誨俾臣猛省期臣悛改雖天地之徳父母之心無以至此臣亦忝居人列具有心性何肯甘於怙終上負聖恩下慙同列至為盛世之棄物聖主之罪臣嗣後惟有切遵聖訓刻勵心神斷不肯存絲毫希譽之心不敢有一點討好之念改其優柔勉其緩懦事事據實念念存誠兾少贖前此重大之愆稍報天地高厚之恩於萬一耳所有臣恭謝天恩祗遵聖訓情節謹繕摺奏聞謹奏詳閲所奏似屬本諸天良發乎至誠但恐熟處難忘世俗通病捨已從人大非易事雖目前偶然警醒暫以為是柰薰染已久習慣性成不數時仍循故轍矣朕七年於兹惟以用人為事訓誨為心看來欲貪夫㢘尚易冀懦夫立尤難朕殊惜汝何靳而不勉為天祐之全人也今覽此奏深信汝之真切改悔而不敢信汝之事事剛果實力奉行也勉之勉之同日又奏為奏聞事竊照厦門地方為福建通省洋船出入總口澎臺之咽喉各處人民輳集於此風習不純最易叢姦究審理公事之職掌而起提臣藍廷珍在厦凡盜賊及偷渡之人每經拏到間有即嚴打懲創發落不即送文職衙門審理此雖於例有不符然厦門海疆巖險之地姦宄頗有非威嚴不足以彈壓此處地方消弭姦宄而㨗速辦理始副事機此應通變辦理者至於偶有些小訟事間亦即自發落此處是提臣之不是張廷枚不肯聽其如此俾歸文職辦理此處是其職分當言但未免氣象太過一則武職性粗一則年富氣盛俱不能自返彼此漸成不和光景臣現開導提臣嚴諭該道俾彼此和衷雖外面暫從然胸中芥蔕未必能化久恐無益臣愚昧之見提臣藍廷珍管理嚴肅於厦門有益張廷枚應調換他處伏查福建糧道事務不繁糧皇上將興泉道另簡老成之員張廷枚俟有道缺另𥙷當有益臣謹將情節詳細繕摺奏聞謹奏朕謂另調道員抵任之後藍廷珍勢處不得不相和好更無煩朕加批訓倘或仍至於不睦其過必在文員汝但切戒李玉鋐可也同日又奏為奏聞事竊照福建地方於今年正月初九等日俱得大雨各處所種二麥甚是芃茂十分之中已有三四分秀穂者正月以來泉州各屬縣因臺米常到又聞皇上賞給之江浙漕米不日將次運到米價每石又賤於前細米一石只賣一两一二錢粗米一石賣一两五六分漳州興化二府與泉州相似福州省城細米每石賣一两三錢有零粗米每石賣一两一錢延建邵三府之細米每石賣一两一二錢汀州府細米每石賣一两三四錢福寧州細米每石賣一两二三錢各處米價俱極和平春雨俱極普遍所有情形臣謹繕摺奏聞謹奏覽奏春雨情形朕懐猶未寛慰必也封疆大臣諸凡政務能蒙上天許一是字則雨𤾉時若可預期不爽朕然後方釋顧慮之念也勉之勉之雍正七年二月初八日福建總督臣高其倬謹奏為奏聞事竊照福建自入春以來雨水甚足二麥茂盛臣業已將情形繕摺奏明兹於正月二十八日至二十九三十日天降瑞雪地上積至四寸有餘福省地暖難得有雪而地上存積數寸尤不易見實為瑞兆年穀豐盈之應衆口同詞皆以我皇上敬天勤民誠意感孚所致海隅億兆咸荷高厚之恩共有盈寧之慶所有瑞雪情形臣謹繕摺奏聞再浙江截運漕米現據福省遣往押運之員報稱已運到一萬五千餘石泊收五虎門外臣現分派貯糶各處米價又更平減謹一并附奏切戒肆志但以誠敬二字對天直待秋成後方可言盈寧之慶也汝於去春亦曾具有如此一奏至收穫時乃大相懸殊於心能無愧乎朕觀汝等亦知勤學立品然不免狃於私懐自為究於大公至正天道人理茫然未喻奈何奈何此時不過將雨雪情形據實陳奏一無增減則已奚庸鋪張如許夸詞設似滇豫兩省連嵗豐收又不知作何形容矣朕殊代汝慚怍而兼為汝懼也同日又奏為恭謝天恩事竊臣於雍正六年十一月初五日於臣奏事摺匣内敬繕恭請聖安一摺恭請聖安又將臣與户部主事管志寧議論之情節具摺奏聞臣以為分處進呈又於摺匣内敬繕恭請聖安一摺竟不思係同日拜發之事臣大不敬謹之罪重不可逭仰蒙皇上格外天恩不加嚴譴命怡親王令臣齎摺家人持回臣跪㸔仰承之下感激愧恧無地自容雖肝腦塗地不能上酬髙厚之恩臣無任惶悚戰懼之至謹繕摺恭謝天恩謹奏𩔖斯謬誤皆莫之為而為實黙有主之者不知返求諸夲愧恧何益戰慄惶悚無非虛文即如肝腦塗地等語雖出誠切何補於朕躬亦何濟於地方生民耶要當逺大是務用心探夲尋源於合天理對幽獨處著力毋在區區拘謹邊耗費精神今嵗秋冬之間朕㸔劉世明若於閩撫一任猶屬妥協地方無事意欲召爾同管志寧來京俟到時再面加訓誨但尚在未定臨期候旨行同日又奏為奏聞事竊臣署理福建巡撫印務兼管海闗税課所有臣管理月日内徴收正額盈餘及一切火耗擔銀各雜項臣俱逐一造册悉行交新撫臣查收業經具奏今計臣管闗三箇月零八日共收正額并盈餘税銀四萬五千三百三十四两零連前撫臣常賚朱綱所收正額并盈餘銀共一十萬六千七百三十四兩零通計雍正六年全年共收正額銀七萬三千八百五十七兩零盈餘銀七萬八千二百一十兩零尚有商漁船樑頭徴收未完銀二千九百六十二兩零俟催完亦應歸入盈餘之内共應盈餘銀八萬一千一百七十二兩零又從前常賚朱綱任内所有火耗擔雜及家人伙食鹽菜等項銀除支用公事外其存剰者俱經前撫臣各自行收用尚存觧銀水脚等銀六千三十三兩零臣任内所收火耗擔雜伙食鹽菜等項銀除辦巡撫衙門公事等項用銀二千八百三十五兩零又應除觧銀水脚等銀二千七百五兩零及管闗同知張嗣昌養㢘暨各家人巡役工食外臣署任内浄存應得耗雜等項銀七千餘两臣謹逐一將支存細數造册移交撫臣劉世明查明此七千餘兩亦歸入盈餘數内共計盈餘銀八萬八千一百七十二兩零再合正額總計雍正六年海闗共收正額并盈餘銀一十六萬二千二十九两零再臣所管尚有自雍正六年十二月二十七日至七年正月初三日計六日之銀俟各口報齊查明再行造册一并移交撫臣查核再未完樑頭項下尚有應完耗銀三百四十餘兩應俟接管之員隨正徴收統歸盈餘數内所有情節臣謹繕摺奏聞謹奏覽今命準泰來閩管理税務諸凡儘力助之同日又奏為奏聞事欽惟我皇上立賢無方因材器使雖廢員之中其才守尚有可取者無不搜求再試使之改過自新内外臣工咸知感激奮勉臣所知者有原任福建陸路提標右營遊擊孫濂因署同安營遊擊事務將包齊二姓列械傷鬬之事未行實報經臣題㕘革職但其人居官操守頗好辦事謹慎勤苦尚有可用又有原任臺灣淡水營守備鍾日陞因違例頂替班兵郭元等四名經臣題㕘革職提審其前在守備任内不避勤苦管兵有方前帶兵進𠞰番人甚有膽勇以上二員臣不敢因係臣所㕘之員隠沒其㣲長謹據實奏聞仰懇天恩或准令引見伏乞睿裁謹奏該部察議具奏同日又奏為恭謝天恩事雍正六年十二月二十六日臣齎摺家人回閩捧到皇上賜臣哈密𤓰一箇臣郊迎至署恭設香案望闕叩頭祗受訖伏念臣一介庸愚仰荷聖恩畀以海疆要任涓埃無報愆戾山積不勝慚懼悚刷以冀稍酬高厚於萬一耳為此繕摺奏謝謹奏覽同日又奏為恭謝天恩事竊臣齎摺家人於雍正七年正月十四日回閩捧到皇上賜臣御書福字一幅貂皮三十張平安丸一千圓湯羊一隻臣即出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖伏念臣至庸至愚仰䝉知遇受任封疆纎毫無能報稱愆戾滋多屢荷寛宥洪仁撫已自慚措身無地乃䝉奏覽同日又奏為恭謝天恩事竊臣齎摺家人於雍正七年正月二十九日回至福州省城奏摺匣内䝉皇上賜臣黄辮荷包一對臣謹望闕叩頭謝恩祗受訖伏念臣身任封疆重寄辦理無能夙夜慚悚乃䝉聖恩疊加賞賜拜領之下不勝感激愧奮惟有痛自黽勉刻勵公誠以竭犬馬心力仰報洪慈於無盡而已臣謹繕摺恭謝天恩伏乞睿鑒謹奏朕之賞罰要在汝等自問耳於心無愧罰亦何辱於心有歉賞亦何榮或因人而賞或因事而罰朕惟虛已應物而已實無容心於其間也雍正七年三月初十日福建總督臣髙其倬謹奏為奏聞事竊臣接准户部咨雍正七年二月初二日内閣交出奉上諭據南澳總兵許良彬奏稱南澳為閩粤要區孤懸海島田地無幾産米有限全賴内地買運接濟兵食臣所轄親標右營屬於廣東已經兩廣督臣孔毓珣發銀一千二百兩買穀二千石以備借給兵丁惟左營屬於福建尚未舉行請將臣之俸金及隨丁項下銀兩捐買穀二千石并建倉厫發交左營將弁積貯以備借給兵丁等語南澳逺隔海島自應預籌積貯接濟兵食今許良彬奏請捐俸買穀伊所有俸金原以供其食用何能辦理公事著動支閩省藩庫銀一千二百兩給與許良彬循照右營之例買貯穀石以備左營兵丁借給之用朕思右營屬於廣東左營屬於福建孔毓珣為海疆計如此辦理不識高其倬亦曽聞之否乎或高其倬之不倣傚辦理者亦别有善䇿乎朕俱不得而知矣著諭令髙其倬知之欽此欽遵移咨到臣跪讀之下慚悚無地伏查南澳為兩省巖疆兵食甚闗𦂳要臣䝉皇上聖恩畀以福建總督重任何敢不思預備臣於到閩之時恐南澳兵民乏食隨經撥米三千石穀一千五百四十九石運到南澳令該鎮及左營逰擊存貯以備借糶後值連嵗彼處米貴臣前後陸續將截漕買運并臺灣碾運等項米穀或令將備或令文員押運前往源源不斷接濟共計米二萬九千四百七十七石零穀一千五百四十九石令先後接續隨時借糶兵民不但左營之兵閩省之民不致匱乏即右營之兵粤省之民亦俱俾其借糶上年夏間南澳存貯之米穀尚有數千石未完臣即恐稍有不接又撥米三千四百五十五石零穀五千二百石復往預備現今除米糶借外於夲年二月内據報現存左營穀四千二百石右營穀一千石左營存貯未動之穀較之粤省買備右營之二千石尚屬加倍右營并貯有閩省穀石嗣後稍有借糶臣又即撥貯存備臣因南澳左營之榖現有預備是以未經發銀買貯今此總兵許良彬籌買穀石臣請無庸另買即於前項存穀内酌數存留修倉收貯設有一時更多需米穀接濟之處臣再隨宜撥運前往接濟所有情節臣謹繕摺奏聞謹奏另有旨諭部此奏殊屬巧辯同日又奏為奏聞事竊照福建水師提臣藍廷珍向有痰疾近又舉發雖精神尚健然多卧病不出署辦事提督任重厦門地方𦂳要臣已寄信宻令南澳鎮總兵兼署金門鎮許良彬前往厦門照㸔提臣之病體兼彈壓地方俟提臣之病稍痊再回鎮署所有情節臣謹繕摺奏聞謹奏此舉甚是許良彬即將來接替藍廷珍之人也密之勿宣同日又奏為奏聞事竊查福建自二月中旬下旬以來連得大雨三月初旬晴霽應時二麥已有刈穫者收成約八分九浙江者於二月内五萬石業已全到江南者已到三萬二千餘石尚未到者一萬七千餘石亦有信來不日即到臣現酌量各府米價之低昂需米之緩急分行撥給閩疆百姓無不感戴皇仁歡呼叩首各處米價平減之至此皆仰賴皇上賜米截漕之恩至江浙截漕之米難以過夏久放臣現與撫臣劉世明商酌令福興泉漳四府俱以一两一錢一石糶給兵民仍留有餘以備四五六月之接濟所有情節臣謹繕摺奏聞謹奏覽同日又奏為奏聞事竊照福州城守副將馬召南自到任以來管兵極嚴凡所辦理營伍之事井井有條臣標中軍副將仇元正調往雲南臣令其署理臣標中軍事務一切俱能實力辦理管東弁兵甚是嚴明且能有斟酌人亦明白實属賢能之員臣愚昧之見以為係可用之才謹繕摺奏聞謹奏馬召南曽經侍衛班内行走朕所熟識者心胸猶屬明白安静和藹循分守已是其所長乃巧黠善柔之流若言能管兵嚴明或到閩奮志勉勵亦未可知前在廣西一任諸務懈弛原欲予以斥革因念無大過且係皇考時年久進士姑從寛調補今職兹覽汝破格保薦朕殊為驚訝莫非脱胎換骨乎馬召南何能如是竒特向後宜再加試騐或恐見伊儀表文雅又兼平易近人較之武弁中之粗俗愚戅者不同故爾頓生識㧞未必留心詳察其行為耳凡人之更改遷移雖不可限定然質地心性亦未能一旦變換遂至逈異此奏朕究不以為然雍正七年三月二十七日福建總督臣高其倬謹奏恭請皇上聖安朕安有旨命汝於閏七月起程來京候部文到日遵行同日又奏為奏聞事竊照福建水師提臣藍廷珍舊疾復𤼵未能出署辦事臣寫字與南澳總兵署金門鎮事務許良彬俾其到厦門㸔視彈壓之處已經繕摺奏聞臣又遣人往問據禀於三月初五日到厦親見提臣病已漸愈雖面瘦氣弱而精神尚好已出署考騐過各官一次等語近又經各處禀知提臣病更大好如常辦理行走所有提臣藍廷珍病痊情節臣謹繕摺奏聞謹奏覽奏知道了頃據藍廷珍奏請陛見朕料其病必大痊矣同日又奏為奏聞事竊照琉球國進貢使臣向例到閩有福州海防同知衙門陋規二千兩臣前已查明革除業經奏明嗣後又查有管海闗之委員及城守營亦各有陋規二百餘兩復經裁禁近訪得琉球國人給㸔舘及前站各色之人銀錢㸔鈔報及臣等省報適撫臣劉世明到臣署臣隨説知即同撫臣各飭令新任之海防同知李錫爵嚴查隨據禀稱即已將節臣謹繕摺奏聞謹奏覽同日又奏為奏聞事竊照福建汀漳道朱鴻緒前經奉㫖令往江南清查積欠錢糧近臣接准部文汀漳道缺奉㫖以福州府知府楊宏緒補授欽此欽遵臣查朱鴻緒雖到任未久其辦理地方事事身親一一切實料意冐昧陳奏今實見其如此不敢有誤人材倘皇上江南查欠之差可另得人或朱鴻緒清查事竣之後仰懇聖恩仍用之福建臣敢保其於海疆必有大益再臣前據朱鴻緒詳報原任臺灣府同知王作梅原任閩縣知縣李芬欲保往江南帶令查欠懇行具題臣查此保帶人員雖經奉㫖令伊等舉出然係仍令敢壅於上聞臣謹將情節一併繕摺奏聞謹奏覽同日又奏為奏聞事竊查閩省飄販南洋船隻俱於北風之時前往南風之時回棹兹據厦門同知張嗣昌禀報所有雍正七年分飄販南洋船隻自雍正六年十二月至今年三月有陳合興等商船共二十五隻具報前往俱經臣嚴飭文武逐一詳查細騐取保放行俟回棹時臣再遴員前往覆查一一明白相符始准入口再為具奏外其雍正六年分飄販南洋出口之船共二十一隻有高陞等一十三船俱如期回棹查騐明白入口又有許天澤陳得勝船二隻因遇風飄至廣東復自廣駕回於上年十二月内回厦門亦經驗放入口又有陳旺興一船遭風飄至廣東廣海地方船壊人溺僅存陳旺興等十二人又林順興一船遭風飄至廣東香山十字門地方船壞人溺僅存貨客舵水三十三人又徐瑛一船回途大洋遭風船壞人溺僅存高彬等一十三人飄水遇救搭船至廣東復病故五名止存八名以上遭風三船所存人等俱經報明廣省地方領照并經廣東督撫移咨前來俱查照與原人相符已行令安插又林盛一船中途遭風打壞桅舵遇香山哨船救至嶴門船未全破有貨客甘佛等十二名領廣東咨文回籍已經查明相符發原籍安插其原船一隻復在廣省修好舵水人等在廣東攬客由廣省驗明出口仍往宋居朥貿易又陳萬源鄭福二船俱在外洋壓冬未回俟回棹時嚴行查驗所有今年洋船數目及上年船隻回棹各船情由臣謹一并繕摺奏聞謹奏覽此飄溺人口甚属可憫必係船隻不堅所致今李衛陛見在京朕有面諭之㫖伊回任後自然通知於爾也同日又奏為奏聞事竊查福建自入三月以來雨水甚足稻秧現皆布插田水充滿各處二麥收成十分九分八分不等俱係豐熟米價甚平比二月内每石又賤五六分以及一錢不等所有情節臣謹繕摺奏聞謹奏覽雨水霑足米價平減情形朕懐深慰雍正七年四月初三日福建總督臣高其倬謹奏為請㫖事雍正七年四月初一日准浙江督臣李衛咨為密咨查拏事夲年三月十六日新陞漕運性督院浙江觀風整俗使蔡都院面言性督院家人巴蘭泰自京來至山東遇有蔡都院家人孫從熟識同行隨外有馬姓一人自稱係福省延建道家人伊主姓魏北直籍緣奉委辦銅跟隨伊小主在京交銅先行回閩三人結伴同行至揚州馬姓與孫從面説爾係福建人我在京中聞知皇上因欽天監啟奏紫㣲星落在福建地方為此特差大人赴閩凡三嵗以上九嵗以下男子盡行誅滅現有巴蘭泰一同聽見可據查造作流言傳播惑衆久奉嚴禁今馬姓敢於如此妄言倘至閩省訛傳愚民為其蠱惑恐致别生事端闗係非輕因此公議夲部院差外委千總劉朝用帶同孫從巴蘭泰前至閩省認拏如拏獲其人即於閩省錄取確供連人觧浙以慿會訊察奪咨臣轉飭拏觧等因到臣臣接閲咨文不勝駭異適延建道魏壯正調在省委觧楠木臣隨即傳諭查拏據魏壯禀稱果有家人馬廷錫一名因前在常德府任内辦銅將銅觔水脚被解員花費以致莫能交清是以變賣凑銀在江南上海縣差家人蔡利正同馬廷錫帶領赴京辦交於夲年三月二十六日馬廷錫自京回閩二十七日著伊回延建道署至伊有此言壯實不知今即遣家人回署鎖拏解交等語臣當即奏外再查馬廷錫係閩省道員魏壯家人所言又係皇上准俟馬廷錫訊明請㫖之時容臣等傳集軍民詳加曉示即在閩當衆正法奏覽雍正七年四月十二日福建總督臣髙其倬謹奏為聞事竊照福建八府雨水米價及二麥收成早稻插秧情節臣前已繕摺奏明近據臺灣各處禀報現今二麥業已刈穫收成十分有餘小麥每石賣六錢大麥每石賣三錢米價亦因之更減每石賣九錢六七分再福州等各處於四月初九初十两日連得大雨極其應時所插早稻甚為茂盛臣謹將情節繕摺奏聞謹奏早稻茂盛雖屬可喜直待刈穫後方敢言秋成也同日又奏為奏聞事竊查臺灣南路鳯山縣所屬山猪毛等三社生番因莊民邱仁山等擅入深山引水灌田被生番殺死十二人又趕至竹葉殺死二人當經臺灣鎮道禀報併詳將殺人生番𠞰拏示懲臣隨經批行嚴查懲𠞰去後續據該鎮道詳報於夲年二月初一日夜生番又於田尾地方殺熟番紅朶等大小七名又焚牛隻草禀稱先已委令同知劉浴遊擊靳光瀚帶兵三百五十名番壯二百餘名前往擒拏今於二月二十一日直抵山猪毛社前石門扄閉儼若闗隘施放大礮擊碎石門而進分兵搜捕兇番先已逃去隨毁其巢穴詰詢嚮導云離此十五六里尚有山裏目一大社山路更險為兇番藏匿之處即帶兵前進竟有數十兇番把守施放鏢箭我兵大礮飛發番衆驚逃躧勘山左有旁徑可入隨分兵追𠞰兇番男婦俱由東北滚巖而逃二十三日移營山猪毛溪口二十五日二更時候宻遣鄉勇通事率内優社番壯由後山暗渡埋伏二十六日統率官兵或由溪上或由山入舉礮為號前後夾攻兇番拚命奔逃督兵窮追斬獲番頭一顆并獲鎗箭等械三月初一日探知兇番往八里斗即前往追尋於山深林密内陡遇兇番成羣喊殺鏢箭亂發土官邦於澤等督率衆番奮力攻擊砍倒兇番三人割獲首級其餘多有帶傷者夲月十一日又設法令近社生番將山猪毛社生番引出隨即圍拏現獲二十人解赴訊奪其餘現在招撫各等情又據禀各處左近旁社悉行安撫已撤兵回營隨又經臣檄行該鎮道將所拏各番分别究訊果係實在殺人兇番究擬解審示懲其無罪者仍曉諭釋放并詳細安撫各番令其寧謐至越界滋肆之通事人等斷不可寛即嚴行查拏究擬重懲照會行知今又據禀稱該社生事之通事張漢伯已經拏到又舊通事慣行引誘生番生事之栁福藏入番社亦已設法拏出現在究擬等因俟分别查詳究擬到日臣會同撫臣劉世明查審明白具題所有情節謹先繕摺奏聞謹奏平時不能約束内地人民越界生事至激變之後將無知蠢𩔖恣情殺戮殊屬可憫豈以此為功乎朕實耻之陳祖訓曽命汝留心察視究係何如人耶雍正七年五月初二日福建總督臣高其倬謹奏為奏聞事竊照臺灣各文員履任年限及更替料理之處欽蒙皇上睿慮周詳聖恩高厚令該部議定成例臣現欽遵辦理嗣後臺員俱可敷辦理委署之用至現在臺灣文員之中臣查臺灣道劉藩長前因丁憂給假今已年餘尚未回閩伏乞皇上俯賜令山西省速催赴閩又新調臺灣府知府倪象愷亦因丁憂給假恐亦不無遲緩併仰乞皇上敕諭川省令假事一畢即催來閩其臺灣府知府事務臣現委興化府知府沈起元前往署理又海防同知員缺經臣以候補通判尹士俍題補尚未經奉㫖臣現令漳州府通判劉浴在彼署理四縣之中除諸羅彰化皆有現任之員其臺灣縣知縣張廷琰經臣題㕘請以晉江縣知縣唐孝夲調補署鳯山縣知縣彭之曇亦經臣題㕘請以龍溪縣知縣熊琴調補臣現飭交盤一完俟風一便即行過臺辦理惟是臺地隔海之區仍應於現員之外即多遣一二額外之員前往一面幫助辦理一面預備委署更替庶無渡海遲緩之處但查現在閩省府縣缺員頗多咸需委署一時實難更於額外多遣前往俟奉㫖命往以知縣用之各員一經到閩臣即將新員委署替出諳練之員二人前往臺灣以備委署更替之用所有情節臣謹繕摺奏聞謹奏該部察議具奏雍正八年四月二十二日福建總督臣高其倬謹奏為恭謝天恩事竊臣一介庸愚仰荷海疆重任愆謬山積蒙皇上仍加以教誨洪恩畀臣陛見得以日覲天顔仰瞻皇上至誠純敬之聖範時中正大之聖治跪聆睿訓捧讀硃批心神豁開如夢得覺始識君臣原屬一體萬事惟在一誠臣從前岐謬之痼病後此上進之階梯一一現前炯炯披露自此得以徹骨悔改勉力成人此皇上最深最重之洪恩臣身難遇難逢之遭際臣惟覺感激無地陳謝無辭又復重荷特恩加銜疊蒙賞賜臣即捐糜頂踵何能仰報今臣已於四月初十日回到福州臣署所有日期另行具疏題報外謹繕摺敬陳㣲悃恭謝天恩伏乞睿鑒謹奏今調卿兩江復有面諭之㫖不得已召卿來京總俟到時面悉同日又奏為奏聞事竊臣於夲年四月初六日回至福建延平府適觀風整俗使臣劉師恕亦到延平恭請聖安臣即將在京面奉訓飭劉師恕之聖諭并賞給養㢘銀四千兩之恩㫖敬謹宣示隨據劉師恕叩頭謝恩口奏臣劉師恕從前過失甚多俱䝉皇上矜全應追銀兩俱䝉皇上寛免閩中用度命臣自備此正皇上深於造就至意兹又恩賞養㢘聖恩高厚至於如此臣雖木石亦知感激奮勉惟有力改前非矢竭公誠仰報聖恩倘嗣後不實心辦事一毫茍且願當重譴求臣代伊回奏臣回至福州府於四月十七日復經劉師恕寄書與臣云署中人夲無多諸事簡省一切用度只須二千兩即可敷用伊身受恩至重本任支用之外若稍留贏餘以補别項心實不安令臣將此情節代為轉奏臣謹將臣敬傳聖諭及劉師恕所奏情節繕摺奏聞至給與劉師恕養㢘銀兩之處臣亦已敬將聖諭傳與巡撫劉世明一體欽遵會同辦理按期給與至於所給銀兩定數臣敬候聖㫖遵行謹一併附奏既據劉師恕有辭多受少之奏即照其所請知會劉世明給與可也同日又奏為奏聞事竊臣欽奉聖諭令臣於見署理水師提督印務臣許良彬時以臣意詳切勸導俾其竭力奮勉欽此臣於四月初十日到福州臣署許良彬亦巡海到省臣謹遵㫖以臣意詳切勸導勉其嚴管兵丁緝懲盜賊詳察營務籌防臺灣内秉誠心外盡實力以仰報聖恩自盡職守相勸之際臣㸔署提臣許良彬言語心意甚要實力勉奮嗣後辦理臣看其果是如何之處再行㨿實奏聞至臣勸勉之語并許良彬之語臣謹另錄一摺恭呈御覽謹奏好將所錄勸勉之語與劉世明看俾伊知之同日又奏為奏聞事竊臣到閩後查得侍郎臣史貽直署理九月以來所辦諸事俱妥協詳明兵民相安米價甚平惟今年正月二十二日臺灣府地方因臺灣縣知縣唐孝本夜間帶領民壯查拏賭博并開鴉片館之張攀等張攀等上房逃走被千總李振拏住唐孝本與之相争誤將該千總扭押次日營中兵丁鼓衆生事擅離營盤炒嚷業經史貽直一面嚴審一面具疏題㕘請將知縣唐孝本千總李振解任質審各兵犯嚴提究審定擬管兵不嚴之中營守備陳君贊把總王友并請革職署中營逰擊林榮及總兵王郡一并附㕘在案臣查臺地遠懸海外兵習少縱最有闗係知縣唐孝夲扭押千總李振自有該弁與之揭報聽上司究懲兵丁何得鼓衆生事此漸斷不可長臣現飛催審明臣愚昧之見為首兵丁應嚴行處死以警將來其署逰擊林榮到任僅及半兵王郡雖在臺两載辦事頗為盡力但臣聞其於此事彈壓亦不得當臣不肯以曽經保舉瞻徇俟臣再行詳察確實并其近日辦理光景若諸事辦理如前或此一事有錯臣據實具摺奏聞仰祈睿鑒倘此事既辦理未協而一切辦理又不及從前臣即另選可勝臺鎮之人之初雖係中營之事而臺灣鎮右營逰擊范志遠最先親身喝罵兵丁立令回營辦理甚當臣謹一併奏聞至於知縣唐孝夲自調臺以來頗能實力勇往辦事奏伏乞皇上睿鑒謹奏覽雍正八年六月初三日福建總督臣高其倬謹奏為奏聞事竊查福建水師官弁兵丁生長海濱慣於操駕其水務之膽勇技藝實多可觀較之他省為優但多泉漳之人習氣相沿仍有未能盡改者一則重同鄉親友之情上下通聨彼此瞻庇不肯公直舉察嚴𦂳管理一則以富相誇貪得茍取交互營私彼此不耻各官弁兵丁犯此病者頗多臣幸仰䝉皇上至高至厚之恩諄切教訓恍如更生自期徹骨更改因思教誨之法與察管竝行實能啟𤼵人心破其愚昧臣前此教導水師官兵者尚未深切著明今詳細敬思推廣聖訓之意作一牌檄欲刻作小夲俾各水師官弁兵丁詳看使之透徹從心内動念改起其機既振於有志實改者即以激勵隨之於下愚不改者即以懲㕘隨之務使水師之中大改故習但恐臣之所言未到不足動人謹另摺繕錄恭呈御覽伏乞聖恩指示教訓謹奏此意甚善如尚未刋布交付劉世明訓示施行雍正八年六月初六日福建總督今調兩江總督臣高其倬謹奏為恭謝天恩謹陳㣲悃事竊臣荷䝉聖恩調臣兩江總督畀臣乗驛陛見臣聞命之下感激涕零謹恭設香案望闕叩頭謝恩所有福建事務臣現在料理交付定於六月十一日交印十五日起身於八月初二三日到京仰瞻天顔恭聆聖訓但臣之犬馬㣲忱更有上瀆睿聽者臣受恩之重實若再生得一圖報辦理之地努力勉奮乃臣之至願臣之至幸豈肯自畫豈忍畏難然臣自揣才力精神辦理福建一省已實勉强兩江地大事多臣實不克勝任伏乞皇上俯鑒蟻悃兩江總督之職另簡賢能委用辦理庶封疆不致貽誤臣感戴洪恩於無既矣為此繕摺冒昧懇奏仰祈睿鑒謹奏覽奏已悉卿謙譲情悃到京候朕面諭同日又奏為奏聞事竊查沿海商漁船隻無論大小例應印烙給照開載船户姓名年籍以便汛口盤查杜絶姦匪兹於雍正八年六月初四日據銅山營㕘將禀稱本年五月二十四日據撥守簄頭礁汛管隊陳海盤驗小艇船三隻一船户黄瑶并舵水三名一船户黄珀并舵水四名並無縣給票照惟各執有禮部右堂蔡圖書小單一張付該船户販鮭往來生理一給侍郎蔡圖書小單付楊陳在各港内等處洗􅸔生理并舵水二名亦無縣照除將原船三隻暫留在汛撥兵看守其舵水九名移送漳浦縣查審外理合専差禀明等情到臣續又據該㕘將呈報本年五月二十七日據守訊管隊陳海禀稱本月二十四日䝉差押觧蔡宦私照小艇船户黄瑶等并舵水九人赴漳浦縣查收海遵即赴汛押送詎伊恃勢强横黨結不識姓名十餘人搶奪舵水人等并將所獲原船内楊陳一隻駕駛而去緣伊等人衆勢横不敢與之争奪理合禀明等情轉報前來臣查禮部侍郎蔡世遠之子舉人蔡長漢不守本分私抽税銀經觀風整俗使臣劉師恕奏聞據蔡世遠具奏陳辯䝉皇上將奏摺發交臣秉公查審臣回任後隨檄行布按二司查審詳報在案兹復據該營具報前情似此正值查審之時尚敢違例給照恃勢妄行不法已極除將署漳浦縣知縣李曙漫無覺察之處會同撫臣具疏題㕘外一面嚴行飛飭查拏妄行擅給照票之蔡世遠子弟家人究訊實情詳報併飭催將蔡長漢抽税之處秉公速審另行具奏所有勢宦違例給照生事不法情由理合奏聞謹奏此奏據實不隠殊屬可嘉硃批諭㫖巻一百七十六之九欽定四庫全書硃批諭㫖巻一百七十六之十硃批高其倬奏摺雍正九年正月十四日兩江總督臣高其倬謹奏為恭謝天恩謹陳愚悃事竊臣一介庸愚仰荷知遇畀任封疆加臣世職遂瞻天仰聖之㣲願䝉生成訓誨之深恩犬馬感激之誠深入心髓所有臣恭謝天恩之處臣已繕疏具奏臣自陛辭之後於雍正八年十二月十九日入江南徐州交界二十六日抵江寧駐劄衙門一路得雪甚大直至江寧并上下江各府所屬地方處處大雪浹旬至正月初一日方晴在在隴畝青潤二麥可望有收臣察看江南情形文武各員習於懈緩營伍尤甚江寧城中經皇上訓飭之後雖大盜未聞而竊賊甚多營縣文武毫無切實禁緝之法其餘諸事大抵如此臣受恩深重到任之初未能稍辦一事稍見一效但只鋪陳既往借作形容臣荷皇上教訓以來臣實耻於如此嗣後臣惟自思江省凡有廢弛皆臣之罪竭臣寸誠切實料理以冀或於官習民風少能有裨期報高厚洪恩於萬一其一切辦理之處容臣隨事奏聞江寧城中盜竊臣亦現在設法料理所有臣恭謝天恩併陳臣悃之處謹繕摺奏聞謹奏如是自勵甚好勉之勉之同日又奏為遵㫖辦理據實奏聞事竊臣在京䝉皇上將侍郎馬爾泰等所奏查賑江省被水人民一摺交臣帶往江南命臣會同欽差大臣及巡撫酌量辦理欽此臣於雍正八年十二月二十六日抵臣駐劄衙門查被水一十八州縣應賑民户兩月糧銀業已散給加賑一月口糧欽差工部侍郎臣馬爾泰吏部侍郎臣彭維新巡撫臣尹繼善御史臣安修徳等酌於十二月十六日已開倉賑給但臣思此一月之口糧計至雍正九年正月十五日已届一月即節省度用僅可至正月末旬江南麥熟之時在四月二十以後中間相距將有三箇月為時稍遠且正當青黄不接之時雖有本省平糶之糧及浙江督臣李衛運米平糶米石糶價雖平而此被災之民户艱於買食就現在情形應再酌量加賑一箇月或四十日口糧方能接濟臣隨移咨彭維新等商酌會奏請㫖在案今尚未准到回咨回札相離稍遠恐為日稍遲臣謹先將臣愚昧所見及被水民户尚需加賑口糧四十日情形繕摺奏聞伏乞睿鑒至此項加賑口糧臣查揚州鹽義倉之穀共數十萬石加賑四十日口糧共計需米十萬五千餘石除賑用外鹽義倉存餘之穀尚多足敷鹽場各處備用之需有餘且淮揚一帶運送亦易臣愚昧之見請動鹽義倉榖運賑似為便利再從前各州縣民户有被水即出聞賑始回者不在原查數内今亦應補查賑給接濟臣亦現飭各道府州縣詳細查辦料理謹一併奏聞謹奏候另有諭㫖由部頒𤼵雍正九年二月初六日兩江總督臣高其倬謹奏為奏聞事竊臣於本年二月初五日在邸鈔内恭讀皇上加恩賞恤擊敗準噶爾賊衆衆將士及戰傷官兵之上諭知逆賊噶爾丹側凌逞其姦惡敢如此肆逆臣不勝憤恨而總兵樊廷及官兵等如此忠勇果敢奮擊破賊臣又不勝敬慰而我皇上恩加逾格且聖躬引為已過臣恭讀之下如跪聆御音不自覺臣心之動在皇上聖謨勝算應之裕如而上厪睿慮㣲臣犬馬之情不勝依戀之至至臣以庸愚仰荷聖恩上年命得與議想當十月共議之際正逆賊窺伺之時臣毫無智識預慮及此少報萬一實不勝慙愧伏念臣以若此之識見又何足以測料軍機但臣寸心有不容自已者雖知無當不敢不以陳奏就臣愚昧之見兩路將帥官兵上感皇上高厚之深恩又加以深恨逆賊之悖惡實有奮勇無前滅此朝食之氣然逆賊伎倆慣習詭詐大兵前進之時臣以為其一切示弱誘進偽遁藏姦或令回衆來歸詐稱脅助或令部落虚降詐稱離心此處最宜留神乞皇上諭兩路大將軍傅爾丹岳鍾琪等雖當萬分必勝之勢之時愈宜小心不可氣猛再臣前與議聞説逆賊來路一邊阻於山嶺一邊阻於郭必能來之路不為甚多今臣雖不詳知逆賊所由之路但似覺其可入之路亦多行走之處頗熟兩路大兵前進或恐逆賊遣兵繞出我後驚擾喀爾喀部落或窺伺我察漢搜爾一帶與巴爾庫爾一帶之軍營亦未可定將帥官兵似宜深加防範此乃臣之愚見實有知其無當且即使萬有一當亦早已在聖慮所照之餘何敢瑣瀆但臣不能不奏之衷實在皇上睿鑒之中臣謹繕摺奏聞謹奏近日之議卿徐徐自得知悉揆之時勢今嵗進𠞰如何其可同日又奏為再行詳奏各處饑民情形仰懇睿鑒事竊照江南淮揚徐邳海五府州所屬各州縣被水災民仰荷皇上天地高厚之恩有加靡已無在不周而聖衷軫念民生猶惟恐一物失所臣跪聆天語仰承聖訓甫到江南任所查第三月應賑口糧已於上年十二月十六日散訖計至夲年正月十六日賑期已滿距麥熟之時尚遠臣已將尚需加賑四十日情形具摺奏聞今一月以來臣又經細察各處情形上年各州縣被災之處因上游大水驟至淮黄一時竝漲民間現種在田之禾稼被淹而屋中囤集之舊糧搬避不及亦多漂流是以雖係偏災而乏食之情稍甚臣前原計算自正月十六日至四月末雖有百日之期而添以四十日之口糧再加以三月四月内之野菜及河工之傭工即可竟到麥熟之時近來一一細㸔情形扒搶者未絶倒斃者亦有其確實光景實有不能以四十日之口糧即確可支持至四月末之勢目前民間正將耕作待布秋禾若口食不接難以力作本年農稼恐有躭擱闗係匪輕臣前所籌奏尚有未盡既有如此情形若不再為奏聞先行預備恐臨時奏請有遲接濟就臣愚昧所見應再籌備給賑三十日之口糧以備接濟又臣細察各州縣之民户内有當被水之時即行逃出聞賑之後又復還家者亦有當初查之時其家尚有數月之糧不應造入賑册及到今春實無糧食可以餬口現又待拯者亦更有各州縣查荒遺漏者此種皆未經查造入册之人雖仰䝉天恩有加無已此等需食之人以原册無名不能仰霑賑濟之恩臣將此處正寄商撫臣尹繼善而撫臣亦移咨與臣内稱從前查報災民僅就被水村莊造册其未經被水者俱未竝查即被水村莊内亦止賑乏食窮民其稍有積蓄者惟恐冐濫原未一概入賑迄今為時已久稍有積蓄者固已食用無餘即未被水窮民亦多謀食維艱若照前散糧仍止在册災民此外無由遍及惟有改行煮賑多設厰所辦理有法委用得人則窮民皆可均勻餬口等語臣謂設厰煮賑亦須查其應食與不應食則與查其應賑與不應賑同一查辦不若再多委妥員協辦更令大員督察辦理查明實在乏食之民仍以口糧給領為妥臣等現在商酌俟商定再一面具奏一面辦理以上二項給賑之處倘䝉聖恩允行臣前請動鹽義倉十萬石之米又不敷用臣查浙江督臣李衛奏明動運浙江省城永濟二倉米二十萬石到江北山東平糶臣愚昧之見如䝉皇上格外天恩准賜加賑則浙米正到江南莫若將此二十萬石内量行動撥與江南各州縣本處之穀米及鹽義倉之米一同酌量為添賑之用臣隨咨商浙江督臣已准李衛覆稱江省需賑米穀與其再往揚州撥運鹽義倉米不若將浙省現成起運之米於沿河州縣起撥散賑更為便易若待賑期廹或將撥運山東之米俱留備賑亦無不可止須查明題銷浙省開除自行買補無庸觧還糶價等語似此一轉移間均屬便易并將撥賑有餘之米仍行平糶則賑糶兼施乏食窮民均沾皇仁於無既矣又臣准撫臣尹繼善移咨内稱江都泰州地方上年被水較輕未經題請賑濟恐其間亦少有被災之處不無乏食窮民自當竝行賑濟今酌發銀一千兩令該府酌量給𤼵該州縣將實在乏食窮民量為賑恤等語臣查此二處之情形上年因江都泰州二處被災少輕故只題免其錢糧未經賑濟今入春以來二處實有乏食之民需賑頗急臣謹一面酌動揚州鹽義倉穀二千石委揚州知府賑恤江都動撥泰州鹽義倉穀二千石委該知州賑恤泰州俱令詳細加意辦理務期得所謹一併奏聞謹奏户部速行查議具奏雍正九年三月初六日兩江總督臣高其倬謹奏為奏聞事竊照上年下江淮揚徐邳十八州縣偶被水災仰䝉我皇上蠲免錢糧賞給修葺室廬之費更免從來例不應免之漕糧特命大臣會同督撫動帑發粟撫綏賑恤加增口糧之數添展散賑之期俾災黎人人得所聖恩優渥至深極厚今又䝉我皇上逾格天恩命動鹽義倉穀加賑四十日之口糧濟其困乏資其耕作又命臣等會同侍郎臣彭維新悉心奉行并令臣等將皇上逾格加恩之處曉諭百姓俾各省過嚮善守法奉公乗此春和盡力南畝勿再游手失業欽此欽遵臣即會同彭維新尹繼善一面敬將皇上逾格加恩詳晰教訓上諭遍行宣布刋刻曉諭令各處百姓人人敬悉恪遵省過嚮善守法奉公乗此春和盡力南畝無負皇上生全之曠典教誨之深恩一面分委各道多帶協辦之員率同各府㕔州縣詳細確查切實料理至徐州一州四縣又専委通太道包括帶領幹員親往查辦務使饑民實沾聖恩咸登袵席侍郎臣彭維新御史臣安修徳亦已於二月二十八日自蘇州前往淮徐親身辦理淮揚邳徐數百萬百姓無處不歡呼雷動叩謝聖恩皆稱勉遵聖訓省過嚮善各勤本業至上江地方上年亦有被災之各州縣但其情形較下江頗輕仰䝉皇上深恩蠲賦免漕命給三月賑恤米石已敷接濟現在上下江晴雨均勻麥苗青茂可期有收所有情節臣謹繕摺奏聞謹奏覽奏散賑情形朕懐稍釋同日又奏為奏聞事竊照江寧為江南省會城中偷竊之事時有臣查城中夜禁甚寛柵欄甚少上元縣所管地方内有城北一帶曠空之處人家三五零星居住且多竹園樹林最易藏匿偷竊之人臣今選屬員中明白者令其逐一細查城中有街道極多而栅欄極少者俾加添栅欄其現在街道已有栅欄而朽壞者俱令修整堅固至於城北一帶空曠之處既難安設柵欄擇其要路總口添設堆卡建葢汛房一十七處每處安兵五名其舊有一汛僅設一兵之處俱令添増共添兵丁塘房及添加栅欄五百餘處計需銀五百餘兩臣於上江耗羡存備修理省城銀内動給修理其添増堆卡兵丁臣查向來城守營將備所定跟役字識之數過多臣再加細酌取令敷用之外勻出兵丁一百餘名添入新添堆卡及加添一堆一兵令其巡查地方臣又酌量時候每夜升放號礮聞礮之後栅欄齊閉違禁行走者即行拏懲仍不時委員明查暗緝以嚴偷竊再城中之地保甲頗屬難行臣現派各員協幫兩縣查行但嚴盜緝不令煩碎俾易遵行現在編查所有料理城内情節臣謹繕摺奏聞謹奏好此舉殊屬是當之極省㑹之地理應如是嚴密者同日又奏為奏聞事竊照江南戰船修造一事臣到任檢查巻案雖木值之價較閩省稍貴而江省協貼銀兩較閩頗多實力辦理不係極難之事無如各員辦理遲緩疲玩成風文員一經委辦始則設法堅辭繼則借端推卸而上司亦此委修船彼差他事隨委隨換屢易其人以至僅一料估即經年累月造報不前現在各船無一不遲而動手起工竟無時日及至動工其船久停厰地雨淋日曬小修者竟須大修大修者竟須拆造矣因而修造各員遂紛紛求增協貼嘵嘵無已領銀到手又不親住厰地身自辦理毎多假手於人恣其中飽遂致物力不敷自貽賠墊措借不來愈致遲久此文員貽誤之大畧也武員則往往不遵協辦之例巧於躱閃置身事外而其中不肖者則千方需索百事掯難無銀到手雖好物美材槩謂單薄有銀到手則薄板稀釘一任裝造而千把捕舵因之競皆勒掯共索銀錢當船應駕厰之時則換舵換纜以舊易新及至造成駕回之時又任擱沙灘竝不照管以致船隻不到年限而損壊已甚文員正修之外賠累更多此武員貽誤之大畧也各習不除船工終難妥協臣現在徹底嚴查飭行藩司會同承修各道將一切痼弊細加查議速詳應禁懲者禁懲應調劑者調劑并飭此後派定修船之員必令一手修理到底不許各員推卸亦不許該司詳換違者查㕘即使本員或有事故一經領銀亦必責令修完不許另替以杜巧脱之弊以挽推卸之風并令一經派定一員承造承修即行詳明各上司衙門記册不必另派差使俾不得藉口推脱總期於料理數月半年之内必令戰船修造副期齊全妥協臣心始安所有現在江省船工情節臣謹繕摺奏聞謹奏如是辦理深中肯綮朕嘉悦覽焉雍正九年四月十五日兩江總督臣高其倬謹奏為奏聞事竊照江省邳宿各州縣偶被水災仰䝉皇上蠲賦蠲漕特命大臣親查令督撫㑹同賑糶并給與室廬之費又於已給兩月口糧之外再加一月之糧復䝉皇上逾格洪恩命動鹽義倉穀二十萬石加賑三十日又荷逾格洪恩令酌用浙江運來之米及本省米穀再加賑四十日如有不敷命酌截漕船尾幫接濟給賑聖恩廣厚從古未有各處百姓感戴皇仁懇切肫誠求為轉達臣已恭䟽具題所有應需米石計商留浙米外尚有不敷撫臣尹繼善與臣商酌稍為寛餘計算請留漕船尾幫米一十五萬石分運各處現在另疏具題其各處賑濟臣與撫臣尹繼善侍郎臣彭維新御史臣安修徳分派道府大員及委各文武員弁協同地方官分頭確實詳查上𦂳辦理至於平糶米穀亦令酌宜開糶以平米價今各處糧米已陸續運到各處賑務已次第舉行各處平糶亦俱隨宜開糶撫臣尹繼善又酌動鹽項規禮銀三萬兩飭行各屬確查種稻乏種之民借給接濟目下糶賑兼行米價漸減二麥抽穂收成可期地方人民情形安帖至於江都泰州之邵伯近場一帶地方經臣前各撥鹽義倉米二千石撫臣尹繼善經動銀各五百兩接濟給賑一面具奏仰荷聖恩允准欽遵在案今據泰州并江都縣報稱所撥銀米尚在不敷臣又與撫臣各酌量添撥泰州本處存倉穀五千三百七十餘石江都縣本處存倉穀七千一百九十餘石相應一併奏聞此現在下江賑糶之情節也至上江上年被水各屬其情形輕於下江已䝉皇上恩免錢糧又加給賑三箇月之恩已可接濟臣到任後嚴查飛催各州縣上緊辦給又委員督率料理今各處皆已賑竣内有靈璧一縣該署縣呉之綱匿災不報現有乏食之民未經給賑臣専差往查經撫臣程元章已具疏題㕘臣一面飛酌米穀運往賑濟除就近撥穀三千二百二十石敷賑半月口糧外臣又飛檄飭動藩庫銀一千六百六十六兩零折給半月之糧現在散給可以接濟至五月麥熟之期再鳯陽懐遠虹縣泗州盱眙五河各州縣雖經散賑但當青黄不接米價稍昂臣准撫臣程元章咨尚需米穀平糶接濟臣查鳯陽各屬存貯穀石本不甚多又經散賑用去之後現在所存無幾而隣近之州縣亦無可撥運之處臣再四籌思現在下江淮揚一帶各項米穀頗屬有餘可以變通暫借隨飛檄江安糧道劉永鐄就近不拘何項之米即借撥一萬石運往鳯陽各縣交地方官接濟平糶一面檄令署江寧藩司劉柟將存省倉米撥運八千五百石糧道倉穀碾米一千五百石共一萬石委張勤望率員押運至淮揚還項今據劉永鐄報稱撥借高郵寳應山陽三處應截漕米共一萬石已令運往其張勤望等所運之米今亦業已開行至於上江現今通省除發賑外合計存倉榖石各處共二十六萬五千一百餘石為數既少而鳯陽一府屬及亳泗等州倉穀顆粒無存應行急籌設法積貯再下江邳宿各州縣亦有全無倉貯之處應籌將别府屬多貯之榖勻往運貯以為儲備臣現在細籌俟㑹商兩撫臣酌量妥協容臣再行㑹奏請㫖謹一併奏聞謹奏但行救荒實政毋存沽譽私懐冀䝉天心鑒照自黙有轉移如或不然徒矜施設之多方妄以人力為可恃倘至力不能為時則將如之何朕此諭旨令兩撫臣及藩臬二司知之凡迎合上意猶目之為憸壬小人若一味曲徇下情試思更為何如人耶但當循規據理而為之無湏言及小民之感與怨夫既聞感而喜生則必因怨而怒發斯乃庸人之常情豈為達者之高識總以驀直行去一切盡屬不妨假若弄巧成拙終歸無濟也誌之同日又奏為恭謝天恩并陳愚悃事竊臣因聞逆賊噶爾丹側凌遣其賊衆冒死犯我西路卡倫偷竊馬駝臣不勝忿恨將臣犬馬愚忱冒昧繕摺具奏乃荷皇上天恩諭大學士公馬爾賽等將皇上近日辦理築城之事寄令臣畧知大槩併諭令嘱臣秘宻不可令一人知之大學士公馬爾賽等欽遵敬錄上諭二道寄臣臣謹望闕叩頭恭謝天恩跪讀之下仰見我皇上睿照如神無逺不燭葢準噶爾逆賊不過恃其地稍遠我師進𠞰難以久住及恃其偷竊馬駝之伎倆此次冒死來犯亦以為竊去馬駝我師不能深入此正畏我師之深入進𠞰一則其力不能排兵對壘再則我師壓境其下威脅之衆必有擕離瓦解之勢是以為此冒死先發之計此種情形俱已悉在我皇上照臨之中築城以扼其吭漸進以蹙其勢出遊兵以取其人畜廣屯田以裕我軍糧使賊勢日促賊衆日離然後搗其巢穴殄此遊魂此誠萬全之道必勝之方臣不勝欽仰欣慰在臣犬馬愚昧之衷因皇上築城之聖諭思及立壕一節兩面陡峭人馬難越亦可以制賊人之偷竊我大兵駐劄及緊要之處既已築城其間或有應分布駐兵牧馬之處若築城不能遍及可否刨立壕塹如有事之時黑夜之際將馬駝牛羊趕入壕内平地置放我兵易於防範賊人難以偷竊其事速於築城或築城之前先立壕以制敵衆然後從容築城似亦可行總之臣知識庸短所見無當但臣既有愚忱不敢不以具奏伏乞睿鑒謹奏掘壕固屬防禦之一䇿但係行軍規則人人皆知者雍正九年六月初二日兩江總督臣高其倬謹奏為奏聞事竊照地方設官必酌量其情形與之相宜始可期其有辦理之益臣查上江亳州一帶地方插入河南在兩省交界去江寧安慶督撫駐劄之處皆有千里即其本管之鳯陽道亦相離五百餘里境當南北水陸之衝行販輻輳人衆龎襍盜案竊案極多地棍衙蠧亦衆民間積習好鬭健訟私鑄私梟曽經犯案亟須加意整頓臣雖現在查訪結㑹打架之光棍及窩倡之豪蠧面諭該州拏獲究懲但設官之處尚應籌酌查從前曽經題請將亳州改為直隷州亦從調劑地方起見今臣細察覺仍有未協葢改為直隷州於所屬之蒙城太和二縣固添一就近之知州管轄而在亳州轉少鳯陽府知府一層之稽察且亳州改為直隷知州體同知府而於本州之錢糧命盜各件仍照州縣一例辦理亳州幅員甚濶命盜極繁一經具報即須知州親往驗㸔往返動即兩三日之程一月之中約計看驗之時居半及至回署錢糧又已半月未徵復須上緊料理其精神工夫未免有不暇總攝照管之處臣愚昧之見應將亳州改為府治設知府一員糧鹽捕同知一員仍令稽察私鑄再設附郭知縣一員専管本地之事所有原管之蒙太二縣仍令該府管轄其潁州一處亦將直隷州仍改為州并所屬之潁上一縣併歸該府管轄惟潁州所屬之霍邱一縣相離稍遠應仍歸就近之鳳陽府管轄如此則各州縣一切事務既有親切専司之州縣各自料理又加就近統攝之知府同知稽察管辦臣等再加意督率悉力料理庶於地方可期整頓之效再下江徐州亦屬四縣為江南門户界接三省地方遼濶盜竊亦多亦應照此改為府治并設附郭一縣方為妥協臣近因會同秋審與撫臣程元章尹繼善商酌亦以為事屬應行除所有改設料理之處俟臣另行詳細具題請旨外謹先將情節繕摺奏聞謹奏具題到日有旨同日又奏為奏聞麥熟分數情形事竊查江南江西地方二麥刈穫已畢據三省布政司及各府州縣具報復加確查約計分數俱有九分八分以上收成係屬豐稔其上下江被水之州縣民食俱已接濟所有各府二麥收成細數臣另繕清摺恭呈御覽再江南各府稻秧俱已栽插惟江寧府所屬揚州府所屬五月中旬稍旱高田之稻秧待水栽插於五月二十一二三四等日俱已獲雨高田之中栽插者已十分之六惟最高山坡之田尚未起水仍須大雨若六月初十以内有雨栽插俱可無誤臣謹將情節一并奏聞謹奏覽奏知道了畿輔地方目下甚為缺雨奈何同日又奏為奏聞事竊照鎮江將軍標京口水師副將蔡勇臣到江南據該營遊擊辛開元禀稱該副將操守平常管兵寛鬆臣近經細察所禀俱屬不虛將軍臣王釴屢經嚴飭臣不敢以隔標之員岐視現一面寄明將軍一面飛調蔡勇到江寧臣詳細面加嚴行申飭懇切開導再俟兩三月看其能改與否臣看蔡勇質地愚下難望其徹底全換但能知斂飭勉强改悔則現在江南水師各員俱水務平常船工不諳甚少熟練之員即仰懇天恩留之江南尚可以指教水師員弁幫看料理各處船工若兩三月之内仍無悛勉臣即協同將軍臣王釴㑹㕘所有情節臣謹繕摺奏聞謹奏所奏是蔡勇原係極㣲賤人但在水師中乃出色技藝若操守平常怙終不悛當傳朕旨嚴訊伊云前於引見時皇上經如何訓諭汝曾如何奏對豈皆遺忘再不痛改貪罪尚屬輕㣲欺君違旨之罪汝何可當以此等語誡飭之觀其後效雍正九年八月二十日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏懇天恩事竊臣有長子高恪次子高愿向隨任所臣於本年七月間俱令回旗正在起行適臣仰䝉天恩令臣署理雲貴廣西總督印務臣之家口現在留住江南省城所有家人需人約束臣謹仰懇天恩欲將臣次子高愿暫留江南約束家人照管眷口臣長子高恪即令回旗臣謹繕摺奏懇伏乞睿鑒謹奏將汝二子俱准留任所料理家務不必令其歸旗雍正九年十一月初十日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊臣仰荷聖恩令臣署理雲貴廣西總督印務赴京陛見仰覲天顔臣自跪聆聖訓之後馳驛赴滇於十月十九日到雲南省城所有三省一切事務地方情形屬員賢否臣俱謹遵訓旨詳問督臣鄂爾泰鄂爾泰皆一一向臣詳言臣謹奏公誠二字勉之勉之同日又奏為仰懇聖恩賞簡賢員事竊查臬司為刑名總滙貴州苗猓風習不純案件居多明刑弼教示以理法全賴方正之員平允辦理今調任之按察使張體義現已到任其通揭之案臣查看稿巻審屬全虚以此觀之存心不正令司風憲有損無補雖題疏到日自有處分但查審案件俟部議覆未免少遲時日伏乞皇上准即簡賞賢員實於地方有益臣謹繕摺具奏仰祈睿鑒謹奏有旨諭部矣同日又奏為奏聞事竊臣欽奉聖諭鄂爾泰眷属在滇令臣仍將雲貴廣西總督衙門養㢘之項支給以為用度務使富足寛裕其有餘者付臣以為衙門之用其不敷之處著將江南總督衙門養㢘之項補足欽此欽遵臣到雲南即將留給養㢘之旨向鄂爾泰傳知鄂爾泰云亦奉有聖諭因言伊之眷屬在滇每月只需二三百金即敷用度一年只需留給二三千金臣與藩司葛森鹽驛道張無咎云今將養㢘之項一年存送一萬五千兩鄂爾泰向司道云此數過多斷不肯留臣亦不肯依往復再四强而後可鄂爾泰定以一年留存一萬兩且云此已寛裕之至臣再向説必不能强只得暫令司道且照此按季預行支給臣愚昧之見酌量鄂爾泰眷屬在滇之用度應每月支給銀一千兩一年應一萬二千兩始稍寛裕但臣竟不能相强伏乞皇上面諭鄂爾泰寄信回滇臣照所酌定之數支給庶其眷屬始肯收存用度至臣衙門之用謹仰懇聖恩請動支江南總督衙門之項一萬兩以五千兩留為臣眷屬用度以五千兩補雲省臣衙門之用再江南總督衙門養㢘共二萬二千兩臣動支一萬兩尹繼善衙門之用稍屬不敷臣前奉聖諭令臣奏明皇上另酌令撥給臣謹將情由奏明伏乞睿鑒謹奏鄂爾泰到京據奏家口薪水之資萬金委屬過多每月以五百金計之一年六千金儘敷用度云云則是爾滇省養㢘復增此四千矣所少千金可否取之江南在汝酌定至於尹繼善之養㢘其足與否伊自另議請旨同日又奏為奏聞事竊查雲南省駐劄叉木多兵丁一千名奉旨令其進藏再於雲南省調兵一千令作速起程前赴叉木多駐劄欽此欽遵經總督臣鄂爾泰遵旨派調料理今原帶官兵前往叉木多駐劄之原任提督張耀祖及廣羅協副將馮鸞即帶原領之兵一千名進藏另又於各標鎮協營挑選兵丁一千名令劍川協副將姚起龍統領俱赴劍川州取齊前往叉木多駐劄所有一切口糧鹽菜騎䭾馬匹及賞給官兵銀兩俱逐一分析料理其進藏官兵糧餉委寧州知州王㪍辦理續駐叉木多之官兵糧餉委呈貢縣知縣殷良棟辦理又委開化鎮右營遊擊段福押觧餉銀七萬兩以備進藏官兵支給至臺站事務總委維西營㕘將劉瑛管辦俱經具疏題明在案臣到雲南接據㕘將劉瑛禀稱據駐劄梅里樹管理臺站外委把總毛詩咏禀稱有黄草坪雙井箐底三臺因連日大雪至九月二十日將山谷路逕封阻雪深數丈有軍前發回文書俱在箐底停積不能遞送其内地各處發往軍前公文自九月二十八日至十月初四日計六十餘件現俱停積不能前進等語臣恐大雪封山原任提督張耀祖等不能接到部文及督臣鄂爾泰所行之文有誤前進雖分頭飛即移行并遣員馳令辦理各員上緊料理或將雪路開通或另尋别道繞過雪山作速飛送務令必到外續於十一月初二日接到張耀祖來文内稱於本年十月初四日行至奔打地方接到部文及四川總督黄廷桂咨文即遵旨帶領官兵進藏但查奔打至叉木多計程六日若由叉木多進藏未免繞道今暫往奔打檄行總理糧務寧州知州王㪍將漢土官兵一應馬匹衣裝口糧等項遵旨寛裕應付妥備并行總理臺站㕘將劉瑛添安臺站外即由瓦河洛龍宗進藏相應咨明等因臣隨即再行檄飭知州王㪍速將口糧馬匹各項上緊備辦齊肅應付官兵進藏毋少遲緩又一面飛檄㕘將劉瑛詳查程途之逺近居人之稀稠酌量情形或由瓦河安站或仍由叉木多安站務期妥速料理所用臺兵先於副將姚起龍所帶兵丁内抽出數十名先令安站俟遊擊叚福觧餉兵丁回時令留數十名替換安臺姚起龍所帶之兵仍令歸入一千名内在叉木多駐防并檄姚起龍殷良棟段福速行前進外所有各情由臣謹繕摺奏聞謹奏覽奏俱悉另有諭㫖矣雍正九年十二月十五日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊照雲貴廣西地方所有不法之苗猓夷疆等處歴年以來經督臣鄂爾泰𠞰撫兼施次第底定惟在善守其辦定之規勿紊其已成之緒綏定調劑期於久安乃臣今日之責臣雖才地駑下蒙皇上教訓有年必期竭此淺陋之見少報高厚之恩剛果以濟㣲臣之寛和勤細以察苗猓之情節為之辦理俾其寧謐而目下第一最先之要務在於新疆文武得人各處政事公當臣惟有竭盡心力稽察文武之賢否嚴禁兵役之苛累不敢以各處已寧少有忽畧所有次第辦理之處臣隨地隨事另行具奏外現在臣接辦以來各處夷人當督臣鄂爾泰𠞰撫辦理之後俱各安静恐仰厪聖懐臣謹繕摺奏聞謹奏但勉法鄂爾泰之公誠為要根本處若能操持牢固枝葉邉焉有違謬之理勉之勉之雍正十年二月二十日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊照雲南省地方民間春田多種蠶豆二麥民人以為一季農食其重亞於稻田臣查雲省各處上冬多有雨雪今年自正二月以來雨水調勻現今蠶豆業將成熟有十分收成大麥現已吐穂小麥暢茂俱可望十分有收廣西省二麥苗俱秀茂貴州省地皆山田種麥者少合併陳明所有豆麥情形臣謹繕摺奏聞謹奏以手加額覽焉同日又奏為奏聞事竊查昭通總兵徐成正人尚有才辦事向前但平素性情狹隘好是已非人每與同事文武不和近因昭通地方新到之兵多虐使夷户經臣嚴行示禁撫臣張允隨亦行示禁在案總兵徐成正即移咨撫臣謂毋信讒言其中悉偏執已見之詞臣查昭通兵丁虐使夷人事皆炳據豈可因未經自行查管遂爾護短轉謂示禁者為信讒實屬偏謬又昭通地方初定耕作者少兼之添兵及修城夫役頗多米價昂貴臣於上年十二月即商同撫臣酌動庫銀委員赴川買米接濟業經題報在案又撥運各附近米荍先行接濟總兵徐成正亦留心設法調劑此實是其好處乃伊因昭通省米石到昭食用竝不費耗昭米其開銀厰之人雖不甚多果有耗米之虞事在應禁但係厰務民事應言之臣等若臣等不行禁止伊再自行趕禁始為得理從前徐成正並無一字通知臣等即行趕禁事屬不合臣查徐成正雖尚屬有才且係臣經保舉之人自得總兵之後日漸驕滿但其於昭通情形尚屬諳悉於地方營伍亦尚留心臣愚昧之見今且先為嚴切申飭教誨若仍不知悛改臣即行㕘奏所有情節臣謹繕摺奏聞謹奏徐成正人甚明敏才復幹練武員中之難得者其性情狹隘是已非人驕滿之病容或有之然全材難覯謬誤之失在所不免但當審察公私朂勉悛改絀其短而伸其長第視䇿勵開導之誠與不誠耳朕觀伊氣質雖稍偏駁而心力可用所以甚加賞識非因汝等薦舉而始行拔擢也昭通伐木開厰之人果有耗米之虞先行逐禁係為地方起見乃可嘉而不可責惟其狹隘驕滿等疵既屬汝所節制汝可剴切訓誡以裁成之此外或與地方兵民有不協處則又豈宜姑容而不予以㕘劾至時據實具奏以聞同日又奏為奏聞事雍正十年正月十九日臣接到部文雲南進藏兵丁暫駐達賴宗地方俟來年青草生時令領兵張耀祖仍帶回叉木多駐劄候旨其雲南續派之兵此時若未起程即行停止或起程未遠亦即各回營汛如已出口令在中甸等處暫住至明年二月間撤回等因臣查自叉木多調赴西藏之官兵一千名經副將馮鸞領兵五百名於雍正九年十二月十六日抵達賴宗之邊壩駐劄原任提督張耀祖領兵五百名於十二月二十九日亦抵達賴宗地方俱據咨禀在案其續派前赴叉木多駐劄之兵丁一千名亦據副將姚起龍禀稱於雍正九年十二月二十七日巳到叉木多駐劄臣隨於正月二十二日當即飛咨張耀祖將現所帶領暫駐達賴宗之漢土官兵一千餘員名於文到時即行率領帶回叉木多地方駐劄所有劍川協副將姚起龍所帶之續往駐劄叉木多官兵一千餘員名俟張耀祖所帶官兵到叉木多之日即行撤回但臣查原隨張耀祖帶兵之副將馮鸞從前帶兵前進之時既多不和且毎有専擅之處經臣屢行嚴飭今又據張耀祖禀揭副將馮鸞揑造買騾文册凌虐兵弁以及選留各營騾頭短𤼵價值包攬駝運米石多索脚價等欵臣謹酌量將馮鸞檄令即同原帶續往叉木多兵丁之游守帶領撤回之兵回滇其張耀祖所揭之款俟馮鸞回時查問明確臣再行題奏臣將副將姚起龍即留於叉木多協同張耀祖駐劄管理兼飭其悉心幫助其隨營糧餉各務檄令寧州知州王㪍仍行辦理其撤回之官兵糧餉等務令呈貢縣知縣殷良棟辦理并飭令將隨軍所帶折給口糧鹽菜銀兩除已經放給併為現今支給回師等項之用外餘剰者交明王㪍存貯叉木多以備支放又飛檄遊擊段福將前觧預備軍需銀七萬兩亦交王㪍收存以備接濟所有暫駐達賴宗官兵撤回叉木多駐劄及續駐叉木多官兵撤回滇省各日期俟禀報到日容臣另疏題報外臣謹將檄撤辦理緣由繕摺奏聞謹奏馮鸞係聪明人才具甚有可觀乃記名一等之員如果掲款是實則亦無足惜矣但張耀祖非操守清㢘秉公服衆之人既與之先有不和所掲之款其中或有他故亦未可知總俟馮鸞回滇後查問的確再行據實奏聞此外各情節俱悉惟馮鸞一案湏加意察審為要雍正十年三月十二日兩江總督署理雲貴廣西總督印務臣高其倬謹奏恭請皇上聖安朕躬甚安近日較之未病以前更覺健旺雍正十年六月十六日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事雍正十年閏五月二十二日臣據護普洱鎮副將李宗膺等禀稱思茅地方有苦葱前往蠻壩河拜一緬僧稱之為神仙遊擊朱仲玉已遣守備燕鳴春帶兵前往巡查以防不法臣即諭令上緊悉心查訪究拏續於六月初三日據逰擊朱仲玉禀稱閏五月初八日燕鳴春報據思茅土千總刁輔國禀稱閏五月初二日土弁查得思屬蠻壩河蝙蝠洞離思城二百餘里竟有苦葱聚衆在彼朝賀神仙土弁隨差人查至蠻壩河猛板坡頭果有五家苦葱其往洞朝賀者有百十餘人諭令伊等速散毋得在彼惑衆詎料苦葱不惟不遵且聲言就要殺到思茅壩來等語轉報卑職當即遣發守備燕鳴春帶領兵弁礮位於初八日夜出普洱城前赴思茅隨於初十日據燕鳴春禀稱初九日早晨官兵下畢班鳩坡後有押火藥之兵十五名纔下至半坡不意箐中一羣苦葱突出執弩放箭打死兵丁二名我兵亦鎗傷苦葱五名衆兵極力追趕苦葱滚箐逃散職等於初九日已刻抵思茅城即於是夜商同通判朱繡帶兵一百名躧蹤尾跟至柏樹枝天已黎明見賊伏箐中即令兵丁齊放鎗礮賊衆中傷俱滚箐潛逃目今正在商酌遣兵直撲蠻壩猛坡巢穴等情十三日又據燕鳴春禀稱卑職於十一日多遣兵練遊巡探路帶遞公文行至坡頭忽有苦葱數十截路放箭探得各路軍皆阻截再查苦葱嘯聚之處即係刀興國同伊堂弟刀三所住地方苦葱即係刀興國項下之人又探得苦葱遍傳木刻勾通茶山江壩威鎮等處黨𩔖起事等情二十三日又據燕鳴春禀稱初十日卑職會同朱繡發曉諭牌差鄉保胡尚聞陳璋刁聨㨗等前往猛板招安十五日據刀聨㨗回稱小的等行至半路那庫落地方即被刀輔國胞弟土把總刀興國等帶領苦葱猓玀夷各執標弩在彼阻路説招安要土千總刀輔國出去方肯同到城裡只教小的與先歪兩人來回話胡尚聞等留在那裏作當等語卑職同朱繡商酌賊之詭計欲將刀輔國誑出一齊作亂刀輔國禁於城中斷難放其出城此則倡首作祟之實情十六日賊箭傷死漫板湖廣客人五名燒蠻間民房二間於辰刻報到卑職等於已刻𤼵弁兵至漫板蠻間山後鎗傷賊二名正奮追間忽經大雨賊奔箐散於十七日已刻四山賊有千餘四面圍城直攻南門卑職督令把總劉雄才開門迎敵鎗礮打死逆賊十三名我兵全無傷損十八日賊又來圍攻西門放礮打死賊三名拏獲刀輔國送信家人阿林訊供刀興國等帶衆賊盤踞輔國家内興國口稱要做王爺四山一處埋伏五六十人要攻北門等語理合具禀俯賜請兵𠞰除叛賊等情據此合將逆賊始末情形備悉禀報同日又據駐劄思茅通判朱繡禀同前由到臣臣查普洱鎮地方遼濶汛廣兵單難以調𠞰即飛調内地迤東臨安鎮官兵六百名土兵二百名又元江新二營兵丁各一百五十名令副將李宗膺遊擊王先韓雯鵬等分行帶領由元江一路前進攻𠞰又調景䝉營官兵一百名由鎭沅威逺前赴普洱會𠞰但思普洱思茅夷人作亂其勢必勾結九龍江橄欖壩一帶夷人一時煽動所調官兵必得大員總統調度臣又派撥督撫兩標官兵四百名開化鎮兵三百名委令臨元鎮總兵官董芳管轄併總統各處所調官兵由元江前進相機䇿應撲𠞰又移咨雲南提臣蔡成貴再派撥迤西官兵數百名由景東一路直抵普洱思茅協𠞰兼顧鎮沅威逺到普之時亦統聽該總兵董芳節制調遣但各處兵丁一時不能即到令總兵董芳先帶所派督撫兩標官兵四百名於六月初九日即自省起程到元之時則臨安新之兵自已齊到即先行帶領進𠞰續於六月初十等日據元江府知府祝宏逰擊李定海疊禀閏五月三十日據普洱鎮把總陳天申飛報二十八日有通闗大寨夷被苦葱勾通聚衆附和屯於通闗廟邊箐内每人頭帶樹葉一枝為號把邊塘房盡行燒了塘兵三人業已奔汛把總汛内兵少請速𤼵兵急救等情卑職等即於六月初一日委守備馬漢勛帶把總康天錫官兵一百五十名土練一百名馳赴他郎分頭接應去後乃苦葱煽動通闗哨夷已過阿墨江於六月初三日至他郎分為三股每路約有四五百人守備馬漢勛率領官兵土練奮勇殺賊鎗礮打死賊人甚多賊衆敗退我兵無損賊敗之後仍聚四山喊聲不絶而元江所屬之善政徳化恵遠定南四里夷民亦有被廹煽惑附從者夷賊添聚二千有餘於初四日復來攻營把總康天錫率領兵練奮勇殺賊乘勝深入守備馬漢勛令千總黄有仁帶兵接應而黄有仁遇賊即行退回以致康天錫陷陣身死又陣亡兵丁六人該弁又勸守備馬漢勛退走馬漢勛叱斥不從及至初六日賊人圍住守備馬漢勛行營正與賊對敵之際黄有仁忽若瘋狂用刀自砍跕墻之兵衝入賊營致兵驚散賊人乘勢衝入馬漢勛隨身兵單不能固守退至莫浪地方隨遣新已到之兵一百名并土弁施糯利等帶領土練五百餘名星飛前進他郎𠞰殺逆賊已將賊殺退二次賊仍退回他郎等情臣即差員催令由元江一路領兵官立即統兵前進𠞰殺他郎一帶賊人開通道路又即照會總兵董芳令一面督率各員速行前進𠞰賊一面申明賞罰將把總康天錫及兵丁六人即以軍中牲酒親祭并以臣所𤼵銀兩賞其家口仍給與其子弟名糧諭以俟事竣具題請奬其元江文武所禀千總黄有仁之處果確即請該鎮王命用軍法在軍營前斬首示衆以作士氣即統現到之兵攻進臣思賊人退回他郎必不敢向元江城定分一股向新平縣一路山僻之路鼓脅夷人隨又派督撫標兵四百人令守備李國柱等帶領飛赴新平䇿應臣又思思普二處既已有賊衆而攸樂一帶竝無禀報其相近之九龍江橄欖壩等處地大夷衆從前攻𠞰經用兵六千餘名此時應再增撥官兵兩路竝進則𠞰平方速隨又酌調曲尋鎮官兵四百名開化鎮廣羅協武定營官兵各二百名竒兵營官兵二百五十名尋霑營官兵五十名又督撫標兵二百名武定府土練二百名共計迤東官兵三千二百名土兵四百名俱由元江一路聽總兵董芳總統調遣進𠞰又飛咨雲南提臣蔡成貴再添撥迤西官兵合二千名選勇幹之員帶領由景東一路前進兼顧鎮威直入普境以𠞰逆賊到普會合之時仍令總兵董芳一併總統調度六月十一日接准提臣蔡成貴於未接臣咨之先咨開六月初七日據普洱鎮中軍逰擊朱仲玉禀稱閏五月二十七日據燕鳴春禀稱閏五月十七八兩日賊衆攻城卑職分布兵丁站墻擊石竝遣弁兵開門迎敵賊始敗遁今賊盤踞刀輔國樓上至於攸樂茶山一路卑職於十一日即行飛調兵丁會商堵截機宜乃竟半月亦無音信兹會商通判朱繡夜募鄉道一名同攸樂管隊陳守由間道往通文書行知守備李萬鵬嚴截各處要隘并吩咐宣慰各猛土千把嚴堵賊首奔逃路逕去訖等語同日又據該備禀稱閏五月二十五日賊衆千餘圍攻思茅四門卑職商同通判朱繡分遣兵弁迎敵奮勇攻殺賊衆受傷四竄我兵難於分布追擒即撤回城等情據此隨酌撥提標官兵五百名令逰擊陳上志帶領又撥楚姚鎮官兵二百名景䝉營官兵一百名俱由景東一路前進普洱思茅會𠞰等情移咨到臣六月十三日臣又據駐防威遠普洱鎮左營逰擊張超威遠同知章元佐禀報六月初一日據堵禦三圏汛外委千總王服曾禀據寛黑村三先報稱孟連地方猛薩村查得有銅厰客人奔至猛薩村云前日有九龍江悶坑莽子夷造亂殺到銅厰將厰上客人横殺大船俱各搶去竝云親眼見白馬山百姓送梭標一根上插雙羽至猛薩村報口稱九龍江呌我來傳知今九龍江有四五千人馬分開三路一路殺募廼厰一路殺上思茅一路過去殺威逺州等情據此卑職等當即增添兵練前往三圏猛薩元江一帶扣鎖船隻責令外委王服曽加謹逰巡堵禦現存威遠之兵除分遣之外存城不滿百人等情又據鎮沅府知府高培呈稱鎮沅地方界連元普有普洱逆賊侵入境内之石門坎又有元江把邊江挖黑村小火頭王老四帶領夷人阿開等妄傳木箭勾引沅民業經練總盤查拏獲現在汛供其王老四已經脱逃鎮沅之兵亦僅數十名合就呈報各等情臣即飛行催令逰擊陳上志將提標官兵五百名楚姚景營官兵三百名一併統領由景東一路星飛前進如鎮威需兵𠞰擊即行䇿應又准提臣蔡成貴咨又已撥提標兵二百名永順鎮兵三百名前往應援臣又飛咨提臣仍照前咨速統派迤西官兵合二千名星飛酌撥委員統領由景東一路前進援𠞰又差員持令箭赴元江一路督催各將備進兵攻𠞰他郎賊營不許一刻遲緩如違定按軍法從事飛行去訖嗣後俟續報攻𠞰情形另行奏聞外謹先將情節奏察禀報又竝未奉委調借勘查元江城垣為名忽自行來省及有思茅緬僧惑衆之信閏五月二十八日臣猶面傳詢問佟世廕回稱近日竝未再據有禀報之情形六月初三日臣始據逰擊朱仲玉等禀報即星飛派調各處官兵前往攻𠞰乃聞有外合并奏明謹奏覽奏知道了雍正十年六月二十八日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊查雲南普洱府屬思茅土把總刀興國勾結苦葱悖叛元江夷人亦被煽惑附和為逆經臣將調遣兩迤官兵由元江景東兩路進𠞰緣由已經繕摺具奏續於六月十九等日據普洱鎮逰擊朱仲玉護普洱鎮總兵印務副將李宗膺鎮沅府知府高培提臣蔡成貴總兵董芳等咨禀逆賊形勢暨調遣兵練各情節到臣臣俱一面飛行指示機宜一面查有廣西慶逺協副將顧繩祖因候送引見到滇該副將前曽久任元江熟習情形人亦明白隨委顧繩祖為副總統即於六月二十一日令其自省起程飛往元江帶兵援𠞰去後嗣於六月二十五二十八等日據副將李宗膺逰擊王先㕘將呉朝應等將各路官兵進𠞰殺賊等情禀報前來臣查現今賊人情形雖普思元江夷人被脅相隨者頗衆但一見官兵雖尚呐喊鳴錛若拒敵之勢及至官兵一衝即行奔竄惟於山窄樹宻之處潛伏拒抗迤東由元江進𠞰之兵臣已檄令㕘將周儀帶兵千餘專𠞰元江之賊而令副將顧繩祖李宗膺帶兵直進奮勇攻𠞰自他郎前到普洱計程不滿三百里再算過渡工夫不過十日之内必到普洱則普洱之賊必走思茅之圍亦必相因而觧其元江之賊一面攻𠞰一面曉諭二十餘日之内可以大段清除此迤東進兵之情勢至迤西所調之兵計六月二十以内有七百名可到威逺及恩樂一帶地方其餘官兵亦陸續而進此二處地方威逺去普洱有二百里恩樂有三百餘里攻𠞰而前約計十日之内可到普洱以其行走日期計算則迤西之兵到普在迤東官兵之前以臣愚昧若援兵一到則普洱思茅之賊七月初旬必破其圍必解但其禀報到省尚須十有餘日計其日期不過七月中旬之末普思之㨗音必至矣至普思之圍觧後方能知攸樂確信若九龍江橄欖壩一帶為所煽動則𠞰平又少需時日若九龍江橄欖壩未經煽動則𠞰平更可速竣惟是賊人一敗恐賊首必逃竄於山箐瘴地或走向外域則搜擒不免需時臣已與提臣蔡成貴再三指示各領兵之員令其一到普思攻賊必先預籌其走路勿令兎脱此現今攻𠞰之情形臣一併謹繕摺奏聞伏祈睿鑒謹奏兩路進兵情勢據奏已悉業既興師動衆不可草草完結務須徹底清理為一勞永逸之計方是硃批諭㫖巻一百七十六之十欽定四庫全書硃批諭㫖巻一百七十六之十一硃批高其倬奏摺雍正十年八月初三日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊查刀興國等悖叛及元江四里夷民附和為匪官兵分路進𠞰所有進攻𠞰捕情形臣已節次繕摺具奏續據元江府知府祝宏禀報有雲南貴州廣西等省酌量委署試用之章倫經差往協修攸樂城工不知夷人謀叛回至思茅相近之慢蚌村村夷突然變亂章倫正坐罵賊被殺而死等情到臣理合先行繕摺奏聞容臣查確再為具題懇恩旌奬兹於七月二十九日據總兵董芳禀報帶兵於七月初十日自把邉江前進中途竝無賊人對敵惟將沿途山逕窄狹之處俱用木石塞斷隨令兵練開路而進於十二日已到普洱副將李宗膺帶兵亦於是日到普守備鄧之姜雲於初十日帶兵亦經到普普洱及思茅城池俱皆全固賊人退遁往猛先回竜一帶聞攸樂未有變動其九龍江橄欖壩之夷人全未隨賊現皆安居各茶山亦未叛逆刀興國之兄刀定國聞在彼觀望亦未從賊但雖聞如此而攸樂營員竝無確信到來現於七月十四日令副將李宗膺逰擊王先陳上志等分帶官兵一千五百餘員名起身直進攸樂相機料理將九龍江橄欖壩茶山一帶未從賊之處安撫將漫蚌等村殺害章倫之處痛加懲創以先斷賊人後路其猛先回竜一帶為賊潛藏之處今分派逰擊韓雯鵬等帶兵由問南水箐前往猛先派逰擊區明等帶兵由磨黑前往猛先於七月十七日起身各分頭攻𠞰限於二十日在猛先會合前赴整岡再分兵圍攻回竜賊巢擒拏賊首殲滅賊衆又令守備燕鳴春酌帶兵練至倚象猛茄一帶令土把總召第帶土練至整董一帶堵截後路等語臣隨一一宻示機宜行令總兵董芳悉心料理又提臣蔡成貴已於七月十七日到新撫地方不日亦即到普臣并宻寄俾其酌量指示各員辦理其元江一帶之餘賊相近新平恩榮一帶者臣前已遣令㕘將周儀専𠞰兹於七月三十日據周儀禀報於七月十八日至漫竜江坡有賊人千餘沿江守渡連壘石城排柵遮蔽鎗礮卑職一面令人紥筏一面移行逰擊張瓚等帶領漢土官兵由谷麻渡口鈔襲賊人之後卑職分派備弁兵練於二十四日用鎗礮打破排柵賊人抵敵不住督令守備張接天帶領官兵駕筏搶渡過江奮勇攻𠞰逆賊勢窮力竭各棄器械叩頭乞饒查係定南善政二里所屬上下漫竜等十四村寨夷人共九十八户令繳器械暫行交地方官查明分别安插懲處等語臣隨飛飭恐此一帶之賊尚多仍行詳細查𠞰務令淨盡不得遺漏又據逰擊張瓚等禀報於十九日抵阿墨江細耶渡隔岸有賊拒敵隨令兵丁施放鎗礮賊人退入土坑躱避高聲喊呌情願投順現在分别𠞰撫等語臣查此一項賊人乃元普夾界地方之賊皆躱聚於此今經搜𠞰其情形數日内即可撲除此賊一清則元新一帶即皆寧帖所有各現在情形臣謹繕摺奏聞謹奏若輩兇苗無故謀叛聚衆興戎以抗拒王師今計窮力竭方始搖尾乞饒毫無可矜之處官兵既已齊集當乘勢攻𠞰以懲創之倘汝度徳量力不能操必勝之權將投順者亦宜審思作何移易之䇿不可仍令盤踞舊巢復貽患於將來也切戒因循善柔致於疎縱雍正十年九月初三日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊照普思刀興國等悖叛元江四里夷人附和為逆官兵進𠞰情形臣已莭次具摺奏明兹據總兵董芳提臣蔡成貴以及軍前副㕘逰守等禀報各路官兵攻殺援𠞰情形前來臣查賊首刀興國已於那卡地方被逰擊區明拏獲刀興國用刀抺頸傷輕不致傷命業經押觧往普竝於南指河拏獲刀興國之幼弟刀經國又於那弄箐内拏獲刀興國之弟刀老五刀老六二名妻二口子一名妹一口竝家人等共十三名其同謀之召第及賊黨等尚未就獲臣隨飛咨提臣就近飭令將備等上緊搜拏必使賊徒罄獲以盡根株其普思元新之賊現已攻𠞰將竣理合繕摺奏聞其善後事宜俟𠞰竣之日臣與撫臣張允隨提臣蔡成貴悉心籌畫再行具奏謹奏覽奏知道了善後事宜當再三詳慎為之同日又奏為奏聞事竊查廣西思明土府各寨頭人目無土官不服拘管土知府黄觀珠自知懦弱不能約束是以詳請情願將洞郎等五十村寨請歸流官管轄司道總兵等議詳前來臣商同廣西撫臣金鉷提臣張應宗㑹題請㫖在案今於本年七月二十六日臣接據左江道閻純璽禀稱據思明同知崔傑禀稱本月初三日思明土府各村百姓聚集數百餘人執持器械圍繞土府衙署聲稱土官聽信寵役黄瑞卿等審斷不公竟衝入衙署抄洗一空捉出黄瑞卿亂刀砍死土官夫婦逃出南街躱匿又復忽聚忽散聲言五十村寨寧死不肯歸流續據太平府知府屠嘉正禀稱土民不法緣由因土官庸弱有頭目譚道美鄭可傳魚肉小民黄瑞卿潜與勾通以致村民聚衆赴控土署適遇黄瑞卿遂擒住砍殺而各頭目不樂歸流乘此土民轟鬧之時亦從中唆使聚散不常等語本道現已遴差前赴探聽確實情形另行飛報外合先禀明等情到臣據此臣隨即宻劄撫臣金鉷提臣張應宗并左江鎮臣霍昇就近察實確情速飭文武酌妥辦理倘須用兵亦即酌撥前往并宻諭隣近各文武加謹防範去後嗣接提臣張應宗咨已調左江鎮標官兵三百名遣𤼵至太平府聽副將施善元統領到彼彈壓又接撫臣金鉷來劄亦已調本標兵二百名星飛前往駐防臣隨會飭在案續接左江道鈔土忠州禀起釁緣由前來據禀云卑職確查起事之由皆因官兄監生黄高朗與姦目黄芳蘭周之賓等不肯歸流稱言土府與黄瑞卿上省將他們管下各寨賣與流官遂招集刀蕚㜑元隴盧各寨姦目星洪等分途傳集土人約有萬餘於七月初三日進城操戈破街燒燬羣房男女星散并搜獲黄瑞卿牽出照墻砍死是日抄搶燒燬共一百餘家後於初十日同知崔傑崇善縣馮瑚經歴田生玉千總李正會同送土府回衙各寨土蠻又復鼓噪趕殺各官而各官拚命奔逃姦目周之賓將土府接入家内居住不許出門為首者實係周之賓黄芳蘭勢力最大呼應最靈黄芳蘭僅在家中鳴鐘三次各土兵立刻即至其餘又在其次又探聞得十八日各亂民要到各村寨會齊如有不肯附和者勒𤼵銀兩凡官兵一至必要齊赴救援勿效鄧横被兵平服等語臣細按種種不法情節必將首惡等懲創一番將來方可寧帖度其情勢非曉諭可以了事官役可以緝拏并非數百官兵可以𠞰擒者臣即一面宻咨提臣張應宗酌量添兵遴選將備會同地方文員壓境駐劄并檄令副將施善元相機而行如應増兵飛即就近呈報提督酌撥去後嗣接提臣張應宗來劄與臣意見相同已酌定各路漢土官兵共有二千七百名預為設伏如敢猖獗即行𠞰懲今於九月初二日又接左江道禀稱土民初雖烏合繼亦不無悔心自太平府知府新太協副將於七月二十九日親至彼地將舊日頭目給牌委用又於各土民切加開導并聞撫鎮兩標官兵將到愈加畏懼八月十三日該府協摘取土官印信將土官押送太平府城各村寨俱安静無事男婦長幼咸皆投具情願歸流遵依自後再敢不法願甘𠞰除等情隨㨿太平府屠嘉正新署左江鎮施善元稟同前由似可不必用兵但又據左江鎮標逰擊俞大勇禀稱各村土蠻目下雖各具遵依第野性難測既將黄瑞卿擅行砍殺種種不法豈不自曉今首惡竝不獻出見官兵源源臨彼揣其情意似非實肯斂息恐因秋成已届口糧當收又慮村寨未固假以抒誠欲以暗築壕墻實難測料各寨環遶呼應相連安能保其無事等語臣細按各員禀報再三籌度土蠻如此不法必將為首者懲處以儆將來方可久安必得官兵在境軍威彈壓方能使之聽諭遵令此時斷不可撤回且不可抽減務令首惡悉出方可一面審究撫定辦結臣現將此意劄寄撫提二臣并行令兩司鎮道各員暨施善元屠嘉正崔傑照此辦理不許錯誤所有情節謹繕摺奏聞伏惟睿鑒謹奏覽所畫機宜俱是事闗土蠻恃衆極須慎重辦理雍正十年九月二十二日兩江總督署理雲貴廣西總督印務臣高其倬謹奏為奏聞事竊查普思元新夷賊勾結悖叛臣已將調兵分𠞰情節節次繕摺具奏兹普思搜𠞰賊首一路之兵前經逰擊區明已將賊首刀興國及其子妻與其弟拏觧續據區明報稱刀興國在途傷發身故隨割首級并各賊眷觧省今已將到續又據逰擊陳上志禀報搜至圏羅擒獲賊黨胡尚文及其兄弟妻子又招出蠻竜村男婦大小八十三名口搜至整空擒獲刀三家人據供刀三逃在六困地方現帶兵前往搜拏等語其𠞰撫威逺以外賊人一路之兵臣據逰擊張超禀報行至蠻住殺死拒敵賊人數十名招出魏科等一十八寨各令安業又在窩羅寨蠻簡三臺坡殺傷賊衆直抵三圏投出蒲蠻猓黑二十四塞將賊首四喇鮓用弩打死割獲首級此一帶𠞰撫之事已竣業撤兵回威逺駐劄等語其援應攸樂一路之兵臣據逰擊王先報稱帶兵經過蠻罵河闗舖闗坪板角等五處俱有賊人拒敵我兵奮勇進攻沿途殺死賊人甚多於八月十九日將至攸樂對山有賊人千餘匿箐放弩官兵鎗礮齊𤼵打死逆賊數十名有攸樂官兵前來接應砍開木栅四道於未時到攸查攸樂柵城官兵俱各完全又據守備張接天禀報沿途四次與賊對敵傷賊甚多攻破木栅無數亦於八月二十一日已到攸樂其茶山各寨據王先禀稱窩泥苦葱蒲蠻俱已作逆惟夷尚在觀望其九龍江外車里土司之地卑職遣把總李燦將奉𤼵告示及與宣慰刀紹文公文交該弁齎持前往旋據李燦帶領宣慰主文鄒文蔚打鑼土弁召者叭目先憨杭等到營禀稱把總等到九龍江將公文告示交兵丁王大成一面投交宣慰土官隨有土千總刀細悶納即來江口迎接至宣慰刀紹文處有宣慰刀紹文稱伊身幼弱所有伊下之土目或不法通同叛夷或推延不聽調遣屢逼伊母子通同賊人伊母子不聽煽惑抵死不從伊下之土目惟土千總刀細悶納盡心竭力固守九龍江内抗諸目外拒賊人等語卑職查係確情俱經分别奬賞又宣慰刀紹文懇求官兵往江邉駐劄以為聲援彈壓隨令守備張接天帶領兵練前赴九龍江彈壓卑職在攸率領弁兵一面將圍攻攸樂之逆賊嚴加攻𠞰一面曉諭橄欖壩附逆夷人再刀興國之兄刀定國已經守備李萬鵬拏禁合併聲明等情臣即飛行王先飭令速行相機辦理叛逆者痛加懲創觀望者曉諭招撫其宣慰刀紹文深明大義土千總刀細悶納矢心忠勤盡力把江抗賊臣俱現𤼵給重賞以示鼓勵其𠞰撫元普兩界中賊人一路之兵今各里夷寨𠞰撫已竣惟曽經附賊為逆之火頭豐阿常等四人尚鑚箐藏匿不出現在躧捕其六里人民今俱已復業矣至新平楊昌禮等通同普思之賊叛逆臣已調鶴麗鎮總兵楊國華總統所調各處官兵星飛攻𠞰今接據㕘將周儀呉朝應報稱在鮓馬宻殺死賊人數十名賊衆敗退至宻白哨搜獲賊人男婦大小一十五名口在怕之勒投出被脇夷人男婦大小百餘人追至阿者山梁遇逆賊千餘恃險拒敵官兵奮勇攻破木栅三道連踏賊營二十餘座殺死賊首楊登科一名又據知府佟世廕禀報率同官兵在猓黑達拏獲賊人二名即直抵新化擒獲賊首普占春之長子普之傑姪普之英及賊眷十九名口又分兵直趨象山有賊五百餘人在山拒敵官兵奮勇直上賊不能敵舍􅋭奔逃生擒男婦大小四十七名口活拏賊人一名施老三又據守備胡大勇等禀稱帶兵至黑龍坡有逆賊數千與官兵對拒我兵奮勇當先短兵相接斬賊首級四十餘顆鎗礮打死賊人三百餘名賊人大敗我兵直抵寳秀又分兵三路進至紅岩賊衆聚有三四千守備等率兵進攻追至山海子大腦打傷猓賊數十名賊人滚箐逃遁隨於阿花寨搜出賊黨男婦五十六名口又在磨些衝大松嶺打死逆賊數十人有夷猓一百餘户投出隨令各歸安業又據㕘將鄭文煥報稱帶領兵練至石屏之巴窩地方遇賊千餘我兵分為兩路夾攻殺敗逆賊砍獲賊人首級十二顆活擒十三名又據逰擊白天佐報稱帶兵至賴子塘地方有猓賊千餘呐喊拒敵弁兵奮勇連戰三次殺死逆賊無數跟追至界牌有駐防界牌千總劉瑞彩等帶兵夾攻斬獲賊首三十餘顆又據守備謝章禀報令把總楊起鳳等逰巡至蠻拱坡遇猓賊六七百人我兵鎗礮齊發打死穿黄衣騎馬賊首一名砍獲首級直追過嶺打死猓賊二十餘人又據逰撃段福報稱領兵至洗魯遇賊擊敗又據逰擊主廷標稱帶兵至禄鴉尾擊敗賊人數百殺死甚衆又於九月二十日據鶴麗鎮總兵楊國華報稱賊人經官兵𠞰敗今據新平土目普應祥等禀報已將賊首楊二皮斬首又張保將賊首模則革父子俱行斬首又據逰擊郭佑民禀報已拏獲賊首金名芳又據總兵董芳禀報賊首李世蕃帶後生前來元江軍前投誠等語又據把總陳義文等禀報於南藴村𠞰敗賊人斬獲賊首李阿白首級并擒獲賊人隊長普老二等一十三名又據知府佟世廕驗報帶兵搜𠞰新寨之賊已獲賊首李本龍腊子龍標三名及其妻子家口一百四十餘名口又守備楊旭已獲賊四百巴等語臣查新平賊人已經各官兵痛𠞰屢次大敗之後業俱散潰潛逃所有大賊首已獲九人其楊昌禮等數名臣飛飭將備上緊搜擒現今情形普思之賊首已獲普洱思茅攸樂三城已全新平之賊又已散敗追搜擒捕不日可竣臣俟新平之賊首普洱之賊黨所未獲之數人一經搜獲即將一切料理調劑俾永逺寧帖之處詳細籌思條列具奏請旨敬謹辦理所有現在情節臣謹繕摺奏聞謹奏據奏普思賊首已獲餘黨現在搜捕計日可以竣事等語但思夷猓犬羊成性反覆無常今兹𠞰撫務須窮源㧞夲勿使餘燼復燃凡夷人内知大義能不被賊煽惑者及隨軍効力者極宜厚加賞賚或題請恩錫以示鼓勵豈可吝惜小費辜其向化之心此番行間官兵奮勇效忠甚屬可嘉其中勇往向前拚命拒敵竝臨陣受傷及已故之各員弁士卒俱應從優賞䘏又如罵賊被害之試用章倫更應題叙旌奬昭示勸懲可將前後用兵𠞰賊以及奏㨗情節暨分别加恩錫賚之處繕疏具題候朕降㫖施行前數次奏摺槩未交部汝其知之同日又奏為奏聞事竊查黔省新闢苗疆内之九股地方前經題定安營駐兵經撫臣張廣泗會商令按察使方顯會同清江鎮臣趙文英料理續經臣與署撫臣元展成提臣哈元生商定於本年七月十六日令帶官兵二千餘員名起身前往臣已具摺奏明今於九月十六日據總兵趙文英按察使方顯等報稱官兵已抵現建城之台拱地方於初到之時苗民伏道迎接似甚恭順詎於九月初六日夜有桃賴等寨兇苗約萬餘人圍營發喊放鎗經官兵擊退平明猶未觧散職等分撥官兵三路齊出將近營首逆之楊翁寨攻破焚其寨栅斬殺無算我兵亦有帶傷惟是九股地險寨衆現在行營官兵不敷調遣已飛調鎮逺等營兵丁五百名再調撥兵丁二千名前來以資遣用等語同日又接署貴州撫臣元展成札稱於十一日據清江鎮報請調兵因軍機緊急滇黔隔逺不及候檄已飛調本標及提標等營兵丁二千名派撥弁員統領星速前赴台拱等語臣當即照署撫臣所撥兵丁員弁飛飭各協營隨帶火藥鉛彈及一切行軍器具星飛前往台拱又檄飭貴陽都勻二府飛調定番廣順藥弩手土兵五百名爛土司麻哈宣威土兵五百名前往台拱聽候遣用并飛檄趙文英方顯會同揆度情形酌合機宜辦理𠞰定此外仍令各相近之處預備官兵臣查苗人情性聚衆皆各自帶米食用十日半月之後米糧食盡即各散回本寨不能久聚一處官兵乘其食盡散歸之時則攻𠞰更易為力臣又飛飭趙文英當苗人初集氣鋭之時稍緩擊以老之乗其糧盡𠞰之再鄰近台拱地方四面皆係新闢苗疆恐各處苗人聞風煽動最宜宻察嚴防臣又飛飭各新疆文武十分用心宻加防範不可一毫疎忽再者臣前因貴州提臣哈元生奉㫖進京署提臣霍昇尚未到黔臣已於九月初八日飛咨署撫臣元展成將提督印務暫為署理今據報九股苗人抗拒不法臣又咨元展成提篆前已咨送暫署即可并行調度辦理又據霍昇驗報已於九月初三日卸事起身約計九月二十五六日可以到黔臣謹將情節繕摺奏聞謹奏奏中既稱苗人初集氣鋭之時應緩擊以老之俟其糧盡散歸攻𠞰甚易又稱隣近台拱地方四面皆係新闢苗疆恐各處苗人聞風煽動最宜宻察嚴防等語果如所言各處苗人有聞風煽動情狀愈當速振兵威破其姦謀諺云迅雷不及掩耳正此之謂寧容緩耶二語似屬大相矛盾况從來兵貴神速遲則變生又添枝蔓且恐在事將弁借此任意遷延殊與行師之道甚不相協未知汝具何意見朕頗憂之但逺隔萬里彼地情形朕未獲身經目歴不過就事論事非必以為然總在汝相機籌酌向允妥處辦理可也特諭雍正十年十一月二十九日兩江總督署理雲貴廣西總督印務臣髙其倬雲南巡撫臣張允隨謹奏為仰懇聖恩事竊查雲南學臣呉延熈到任試士以來辦事勤慎考試㢘明而於教訓士子讀書為文之外尤於立心行事加意告勉諄諄不倦士子之為非者又不袒護實於邉方有益且係接前任學臣于廣之差在滇辦理僅有年半臣等愚見冒昧仰懇聖恩乞將吳延熈賞令在滇訓士為日少久似於士習有裨臣等謹會同繕摺奏聞謹奏此奏未到之先巳有旨矣不便再更雍正十一年六月二十四日兩江總督臣高其倬謹奏為奏聞事臣於雍正十一年五月二十六日到江寧接印任事業經繕疏題明現在江南上江各府及下江之江寧府鎮江府雨水調勻稻苗暢茂餘蘇州等府稻田現皆車水灌溉稍望雨澤上年下江之松江蘇常等府所屬常熟華亭等縣内有被災之處仰䝉我皇上蠲賦給賑又截漕平糶更復特諭加賑四十日并嚴飭地方官加意辦理被災之民仰賴皇仁皆得全活其流出在外者今已復歸安堵初夏麥又有收甚資接濟惟上江之泗州夀州宿州泗州衛頴上霍邱二縣下江之海州徐州山陽阜寧安東青河沭陽贑榆豐縣沛縣宿遷桃源等縣地方四五月間各據報有蝗蝻生𤼵即經署督臣魏廷珍分頭檄飭各屬員設法上緊撲捕務令淨盡隨據各屬報已撲盡各具結送查臣到任後又各據報撲捕已浄臣恐設有不實即致貽患隨又一面嚴飭搜查捕打一面分遣各員分頭馳查以考虚實倘有未淨亦即令在彼督同撲打其不力不實之員即令掲報嚴㕘現據各處所報蝗蝻俱已撲滅惟沛縣地方五月二十七日據報尚有蝗虫而從前沛縣各員所報則稱蝗自山東魚臺縣而來而山東各員則又報蝗在沛縣撲打乏員等語前經臣魏廷珍逕行魚臺縣令協力淨捕而河東督撫亦咨明江南督撫俾嚴飭沛縣實力撲捕在案臣到任後隨又咨覆凡各省屬員陋習未經撲捕先為推卸之地在江南者則推之山東而山東之員亦推之江南惟有各加嚴查嚴督所屬各員凡就近生蝻不論何處盡力撲打毋分彼此方不致貽患臣又於馳勘各員外再飛委蕭縣知縣温長𤼵就近飛往協幫竝令懸賞購捕倘少不實俱即嚴㕘臣㸔現在情形各處之蝗已息獨徐沛二處未浄再淮安府屬雖報撲浄未可放心臣現在嚴飭緊辦以期實在淨盡所有情形理合繕摺奏聞謹奏前諭魏廷珍甚晰蝗蝻倘至為災任汝百計支飾究不能辭其咎也雍正十一年九月十六日兩江總督臣高其倬謹奏為奏聞事臣查今嵗江南六月間稍旱前經具摺奏聞續於七月間得雨但各處遲早不等是以同在一州縣之中年成或收或歉不同即在一圖一保之中此上彼下不一其年成必詳查細看方得確實今詳查得上江安慶太平廬州鳳陽等府和州潁州亳州等州俱八分收成徽州寧國池州等府滁州六安等州俱七分收成惟廣徳州貴池旌徳建平合肥等五州縣前經報旱續經得雨俱獲五分有餘收成其被旱者不及一分勘不成災又宿州泗州靈璧虹縣七月内黄河之水洩出田稍被淹宿泗虹三州縣甚輕靈璧稍重查上江惟此處應稍調劑臣現籌動存公之項預計接濟與撫臣徐本商同料理其下江淮揚徐三府收成俱九分八分内揚州府屬江都泰興二縣之沙田因江水漲損圩圍稍有被淹徐州之沛縣亦稍被水俱分數至少其江寧蘇松常鎮太倉通州等府州俱有七分六分有餘收成内蘇屬之呉縣崑山新陽常熟常屬之武進荆溪鎮屬之丹徒丹陽金壇溧陽松屬之華亭奉賢上海南滙青浦福泉太倉屬之鎮洋嘉定寳山崇明俱報被旱及被風細查不及分數俱有五分以上收成臣查此等下江各州縣雖内有乏收之田被旱不及分數民間雖有報勘之呈不應開其冀倖之習所有嵗額應照舊徵收惟是熟歉不勻各圖之中既有乏收之家又有上年被潮今又稍旱之處現在秋成之際米價未減將來青黄不接之時市價必昂應加意調籌預思接濟臣自松回過蘇州與署撫臣孫國璽商酌所有除前籌買運楚米之外其各州縣每處應買補足二萬石之穀雖已經發銀飭買但以四錢五分一石限定銀數又限令其買穀則州縣之中謹慎者不敢増價通融蒼猾者更托稱價值不敷帶銀回貯則來年平糶各處倉穀前經用空今又未補必致無可糶濟臣等現已行令即彼地穀價稍貴亦即増價購買臣等仍不時查察不令浮冒并令買運之處米穀不拘將來即以原價平糶既可接濟民間亦可不虧價本倘此内有平糶尚屬不敷之處再行酌撥隨時運添其江西各府屬今嵗收成俱有八分七分不等内被水者共十一縣今勘查有新淦峽江吉水永豐崇仁南昌豐城七縣成災業經題請緩徵併請照分數蠲免勘不成災者大庾清江宜黄樂安等四縣臣現㑹酌批動存公銀兩酌宜撫恤又有續報之新建等十六縣或山水衝刷或江潮漲發俱有被水細查今或已收穫或已補種俱不成災臣亦已令酌宜撫恤并預備平糶接濟務使安定所有情節一併奏聞謹奏覽奏知道了加意撫恤務俾災黎無至失所同日又奏為奏聞事臣查看松江海塘業經題明臣於九月初二日抵上海縣地方將新築土塘逐段親㸔於初五日看畢所有塘工修築俱各堅固惟原估塘頂寛二丈二尺塘脚皆寛五丈已為寛濶但細看尚覺㣲陡應再酌培外面塘根令成走馬坦坡則根基愈厚捍禦海潮愈為有力應俟每畝五文之錢徴收稍積再酌於嵗修加培至所有石塘臣亦逐段親查其已完工者甚屬堅固其現做工者俱完及七分六分五分四分不等其未做工者俱現釘樁木等候石料興工臣查詢工尚未竣情由據臣俞兆岳臣張适移咨及面説通共應築石塘四千六百三十四丈已築完石塘三千九十四丈未築石塘共一千五百四十丈零此工原題於雍正十一年内修竣因各辦石之員買運遲緩俱不足原議之數現在停工待石今將遲延各員咨㕘并咨請題明展限又原定修築石塘用黄石六分青石四分今黄石採取甚艱應請改用黄石四分青石六分以速工程又原經題定於石塘兩頭各添石塘一百丈今海潮形勢改移石塘東頭之華家角沙長潮逺而石塘西頭之金山墩􅃮家墩海潮逼近形勢頗險應將華家角之石塘一百丈改建於金山墩􅃮家墩一帶再有尚未建之石塘一百一十九丈今金山墩􅃮家墩一帶潮勢既險亦應移之添建於此一帶又金山墩之運石小河與上浜之大河俱應速行挑挖則石料運載無阻等因臣查海塘闗係緊要竣工不能如期所有辦石遲誤各員臣另行隨一面加委辦員發給銀兩另令開採青龍山戈家山之石以濟工用一面將原採之各山俱添派幹員或令協辦或令督催限期定數務令上緊趲行多辦遲者立即㕘懲其運石小河及上浜河臣飭司動項委員著落趕挑俾運石無誤至華家角之一百丈石塘及未做之一百一十九丈石塘移建於金山墩􅃮家墩之處臣到彼細看潮勢之緩急沙脚之遠近現在情形應行移建再應於華家角添修土塘一叚接連現在土塘更為週宻其石塘外之外護土塘原築頗有稍低稍蟄之處經臣尹繼善令其加修續又經臣喬世臣令遍行加培増高二尺今臣查看現在培築尚未完工已嚴飭蘇松道王澄慧上緊催趲即令完工不許再緩惟是臣細看此土塘塘身稍為直陡仍應於嵗修厚培走馬坦坡更為堅固此内現在去水太近者十餘處臣已指令目下即行添培併説與俞兆岳張适就近查督務令如式所有改移石塘工段請用青六黄四石料及酌請展期之處臣亦另行具題請㫖外臣謹先將各情節繕摺奏聞謹奏覽雍正十一年十一月初六日兩江總督管理蘇州巡撫事務臣高其倬謹奏為詳察地方情形仰懇聖恩事今年江南江寧蘇松常鎮五府通太二直隷州所屬各縣收成稍薄淮揚徐三府中亦有一二屬縣稍稍被水秋冬之際民間米價未減將來青黄不接之時米價恐必昂貴應預行籌備平糶之米穀以平市價以濟民食臣將情節業經繕摺奏聞正在辦理間接准總漕臣魏廷珍字寄近據屬員報稱今年天時稍旱民間所收米粒細小兼多青腰白臍間雜田中祗有此種者有司亦難分别擇收可否奏請截留亦接濟平糶之一䇿等因札商前來臣查江南地方人口最衆食指極繁今春各處平糶動用過常平均貯兩項米穀及楚省運來之米共二十二萬八千餘石尚屬不敷仰䝉皇上天恩截留漕米四十萬石除賑濟用米九萬一千餘石盡行添入平糶市價始得稍定民食賴以得充今查常平等項米穀雖現在遣員往楚買補但聞彼處米價亦未甚賤竊恐未能全數買回則將來平糶之需必須詳細預計有備無缺方足接濟况今年民間所收又有米粒細小及青腰白臍難於擇收之處可否將應運漕米截留三十萬石以濟平糶之用謹具摺請㫖伏候聖裁再今年下江地方去年緩漕及歴年舊漕仰沐皇仁悉准折徵業已淪肌洽髓兹據布政司會同糧道詳稱蘇松等屬雍正十年緩漕共計三十餘萬石上年潮水泛溢今又收成稍薄民間不無竭蹷輸將且本年應徴地漕銀米竝雍正十年所緩地丁及各年舊欠錢糧均應於今嵗秋成後併徴於嵗内全完自十月至十二月計期三月一時民力恐難兼顧今似應請將十年分緩漕於十一年冬徴收一半其餘一半緩至甲寅年冬帶徴完納以舒民力等語臣查所詳情形是實今一併繕摺請㫖倘䝉聖恩俯准施行則民力民食均荷皇仁益更寛裕矣謹奏江南今嵗情形朕業經悉知已降有指示汝等酌辦之㫖汝當凛奉欽遵莫視功令同兒戯也同日又奏為查明奏聞事松江海塘臣查看之處前已具摺奏聞其查㕘辦石遲延及設法趲修之處臣已現具疏題明兹據臣張适禀稱附貼石塘之土塘工程原定每土一方給發工價銀共九分加夯硪緊貼石塘堅築張适到工之後經確查各號土塘俱用浮土堆積竝未夯硪每方止給工價銀五分有零俞兆岳先築様塘各工員俱照俞兆岳兩號様塘辦理其樁木亦有多餘價值現細加查察核實報明等語臣正確查隨據太僕寺卿俞兆岳咨開石塘内之貼附土塘夲寺惟恐塘身單薄不足以資捍禦塘面二丈加寛至四丈塘脚四丈加寛至六丈四尺加増土方之費咨請在嵗修捐錢項下開銷夲寺東西様塘共二百九十餘丈應加増土方銀約五百餘兩夲寺已經捐資補足無庸再給又咨稱樁木盈餘銀二百九十餘兩等因臣查俞兆岳身任總理自應潔已無私實心督率乃土塘未加夯硪竟有浮多之銀今稱加寛之應領銀五百餘兩捐資補足無庸再給此項銀兩及採辦樁木盈餘銀二百九十餘兩不行早為報明聞查始報甚屬可鄙臣謹據實奏聞至在工承辦各貼塘之員其土方餘出工價之處臣查詢俱稱所有土塘未加夯硪多餘土方之銀現俱尚存司庫未敢支領竝未侵冒臣現飭附貼土塘工程緊要難任浮鬆即令以多餘未領之銀仍照原議飭令張适督令各該員另行拆開照例夯硪堅固如重加拆修此銀不敷各員雖未侵冒亦未先報出應俱罰令各該員賠出添補修築再查照俞兆岳所做様塘承修但未經奏銷俞兆岳即聽其離工應著落俞兆岳名下代為拆改重築臣查俞兆岳從前督修石塘甚為悉心勤力近年老精神少衰海塘工程緊要現已竣工遲誤此係江省要工臣不委之俞兆岳謹自一一籌酌督率同張适上緊辦理期務早竣工堅費實至土護塘及此外有無浮冒之處亦令張适實力嚴查臣亦加意查察如有侵蝕情弊即行指明題㕘所有查明及辦理情節臣謹先行奏聞謹奏俞兆岳年力衰邁督辦遲誤各情形朕未身經目歴無從而知在汝秉公據實酌宜措施耳如應㕘劾具疏指㕘至於張适乃向日所悉險邪小人若深相倚信専委辦理倘異日被伊連累毋謂朕言之不早也同日又奏為奏聞事臣查江南修船一節久成錮弊臣前在江南議定題請就近分厰當修造之際即為查催驗看其揚厰移至江寧聽總督查驗淮厰聽總漕查驗蘇厰聽巡撫查驗鎮厰聽將軍查驗松厰聽提督查驗冀除積弊臣尹繼善亦以江南船工往例於部價之外給有一五協貼每部價一百兩協貼一百五十兩内河沙唬等船在大修小修協銀儘敷而拆造之船頗有盈餘至外海繒艍等船各員稱拆造僅可敷用大修小修協銀尚有不足等情飭行據實修造節省并准將在厰辦理經役之食用以及管船捕舵之房飯錢均於節省項下據實動支開報俟核定盈縮確數量與裒益因各委員所報節省㕘差不齊未經核題是皆因船工積弊力思整頓然文武各員弁及兵胥行匠久成一片膠結已深究未徹底清釐臣今再四思維現將各項船隻按趕繒沙唬吧唬之各様及拆造大修小修之各項俱各調一様船至蘇厰親查親看遴委可信㢘潔勤慎之文武員弁照實辦料照實計工一一成造各船一竣則工價俱有成規可循然後照此定議工價一例遵行以定畫一成規嗣後上司無庸批減修員亦無可詳増既有一定之數無可浮開再嚴稽查之法不許尅減一有違誤嚴㕘賠懲庶船工可期實在料理亦有定程矣臣謹將情節繕摺奏聞謹奏調船至厰看造亦不過小試行道之端耳焉能徹底清釐夫木料價值嵗有低昂工亦時有貴賤俱難預定且汝現今酌議之數未必即可永逺遵行而乃云嗣後上司無庸批減此一語自為日後省心省力張本則善矣若謂為國家清釐積弊則朕不知也總之凡事惟有實力辦公四字方免罪責此外别無良䇿雍正十二年三月初六日總督管理蘇州巡撫事務臣高其倬謹奏為恭謝皇上嚴切訓飭之深恩實陳㣲臣痛自省改之下悃仰祈睿鑒事竊臣節次奏摺内欽奉硃批詳訓嚴飭多方指示字字警誡在在提撕仍施教誨之恩俾以自新之路臣跪讀之下感激涕零臣之愚昧錯謬自容無地自愧難安惟有切切敬記聖訓刻勵自心期念念誠實事事公忠不但斷斷不忍竟昧天良少存絲毫歸過之念巧飾之心即從此有一毫自全自便之念畏勞畏怨之心亦即屬上孤聖訓下昧本心何能逃日月之照國法之誅此是臣犬馬實情謹繕摺仰謝訓誨深恩自陳改勉下悃伏祈睿鑒謹奏覽之厭矣雍正十二年五月二十二日蘇州巡撫臣高其倬謹奏為奏聞事臣查江南上年淮徐一帶及江寧通州等處蝻子生𤼵經悉力撲滅但恐蘆洲及草灘僻處遺子或時𤼵生臣於今年三月即預飭各道府州縣時時細查一有萌動即悉力上緊撲打務令打淨不許疎漏兹臣陸續據江寧揚州淮安徐州等府所屬之各州縣俱報稱蘆洲草灘蝻子生𤼵有蓆片大數處者有一畝半畝一二塊者惟泰州分司所屬之梁垜場東臺場草地内間有寛數畝者然皆逼近海邉向不種植禾稼之處俱稱極力撲打臣隨分差各員分路查督現俱禀報業已撲打刨坑趕埋火燒鴨食悉已撲淨無遺具結前來臣又令布政使白鍾山分派試用各員即令分往各府州令其専司查勘督催總之蝗蝻為禾稼巨害臣務必悉心極力料理防撲斷不使為害近又連得大雨俱皆普遍不但於禾稼有益即蝻子亦不萌𤼵所有情節臣謹繕摺奏聞謹奏蝗蝻撲滅之説難可準信倘於此等處再涉欺誑不實則高其倬禍不旋踵矣悉心竭力料理與否任汝自為之雍正十二年六月二十六日蘇州巡撫臣高其倬謹奏為奏聞事江蘇各屬地方自春入夏晴雨調勻二麥有收稻已插蒔情形臣已繕摺奏明六月初間栽插全竣正資雨澤灌溉自初一日即沛大雨頗為應時但自初一至初六日晝夜大雨自初九至十一日又復連綿雨水過多臣一面飛行遣員分頭查看各屬亦各報有雨水過大淹浸禾苗之處臣復飭令詳看確查今查得各處高田禾苗甚好其中田禾苗亦好將來俱可望豐收惟最低被水浸過禾頂之田已經連日晴霽有即露出禾頭者亦屬無妨只有現尚未露頭之田禾勢必有損然天時尚可補插及補種各種雜糧亦可望有收臣現分頭委飭令各委員與地方官督率勸導令各民或培圩堰或行疏洩竭力車戽又飭或酌借倉穀以資食力或令業主量行借助俾佃户力作以期補種臣就大槩而看如句容常熟昭文新陽陽湖江隂無錫金壇泰州崇明通州境内一二最低之區圖似水退之勢稍遲稍難其餘上元江寧宜興靖江等縣雖經報水俱屬無礙現在嚴飭令其盡力戽水補種臣惟有悉心調劑將來如果有積水難消不及補種者另當查確奏聞請㫖遵行至於江寧省城内外以及各屬間有被水衝倒房屋已查明實在無力修整窮民量為資助城垣營房墩臺閘坐偶有淋損之處勘明修理礮岸沙土坍入河内有闗運道者分别修濬統俟次第料理另行奏聞外所有委員查勘雨水情形并辦理緣由理合繕摺奏報謹奏高其倬巡撫江蘇安望免旱澇之虞覽所奏雨水各情形原非意外事殊無足訝其中雖經淹浸而不至成災者乃督臣忠勤感召之所致耳誠偽之徴昭如影響明者覩之莫不毛骨悚然第未審下愚輩作如何體會也硃批諭㫖巻一百七十六之十一
