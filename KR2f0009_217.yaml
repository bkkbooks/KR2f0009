將有無經吳永清撞騙過情由亦即據實詳報外謹先繕摺奏聞并鈔録假諭帖一紙恭呈御覽為此謹奏何物姦徒輒敢如此膽玩真匪類也嚴審定擬具奏雍正十一年十二月十六日山西巡撫臣石麟謹奏為奏聞事雍正十一年十二月初八日據澤州府鳯臺縣知縣羅著藻稟稱卑職聞有京中人同騾夫隨從共五人騎騾二頭於十一月二十四日到卑縣下町村廟內住宿口稱問梁淵要板卑職隨差役查問據稱有宛平縣公文一角投鳯臺縣又稱有王爺諭帖隨又委典史親往查問王爺諭帖再三索要方始取出內開本府為示諭事照得山西鳯臺縣民梁淵等進敬香柏木板大小八塊自備腳價運送至京今差烏林逹齊其各至板所驗看果有此物即便速運至府以應供用如無此物即著烏林逹齊其各押解梁淵至府回話不得違誤以憑關防須至諭者右諭知悉雍正十一年十一月初十日行等語上用清字戳子硃標據稱係撥什庫發的至宛平縣公文一角係關提拐騾人犯與此事無干問其緣由稱從宛平順便稍來如此舉動甚屬可疑值知府因公赴省卑職隨稟眀本府章同知本月初三日章同知即親往查訊而本人俱不承認口稱諭帖巳經燒燬又稱係蘇喇並非烏林逹前後互異隨於行李內搜出諭帖稿一紙上寫鑲紅旗納親郡王老王爺諭地方關防事本府門下買賣人梁淵薛隆節進敬香柏木板大小八塊今差官烏林逹趙住前往曲沃縣運解至京特諭各府州縣關津不得攔阻須至諭者右諭地方知悉雍正十一年九月日等語至硃標諭帖藏匿無蹤初四日當經章同知將齊其各帶到縣城卑職隨撥役嚴加看守事關旗人擅稱王諭合先稟眀等情到臣并據同知章廷圭稟亦相同臣見之不勝駭異正在檄飭該縣將齊其各等訊取確供詳報間十二月十四日又據澤州府同知章廷圭稟稱本月初四日查獲齊其各等業經具稟在案卑職隨將跟隨騾夫等四人細訊據常闖生供係陽城縣人向在京師騾行生理因梁淵欠騾行銀兩所以到梁淵家來討的據霍龍節供係陽城縣人因代梁淵借郎萬行銀兩是伊保借又與齊其各素相認識所以同行再宛平縣關文是原告楊虎給伊轉給齊其各的據郎萬行供係陽城縣人同霍龍節來與梁淵討銀子的據張立成供係趙城縣人因齊其各霍龍節雇伊騾二頭尚欠騾價所以跟著的等語今將查出姓名情由再行稟聞等情臣查既據該同知訊眀騾夫等姓名俱係山西民人則齊其各眀係棍徒妄行生事有干法紀除飭鳯臺縣嚴訊確情并將趙住現在何處務須究出倘該犯堅稱旗人不吐實情即令解省發理事通判究眀另奏外謹先繕摺奏聞謹奏據奏旗人指稱王諭招搖晉省地方朕知諸王咸皆守法必無此舉自係假冒無疑若云巳革退之納親郡王納爾素在伊則無不可為之事素行極其鄙猥不肯安分自愛之人也當將獲犯研審確情定擬具奏以聞雍正十二年正月十一日山西巡撫臣石麟謹奏為奏聞事竊照晉省於雍正十一年十二月二十八日省城得雪五寸雍正十二年正月初一日寅時起瑞雪繽紛至午時止省城得雪五寸有餘并據各屬陸續申報於上年十二月二十八日暨本年正月初一日各得雪四五六七寸不等查三冬之內晉省連得瑞雪普遍均霑不特在地麥苗深獲滋培而土膏和潤將來春耕亦有裨盆閭閻樂業農民歡慶臣謹恭摺奏聞為此謹奏覽晉省得雪情形朕懷深為欣慰同日又奏為至德光昭甘泉疉見恭摺奏聞事竊臣於雍正十一年十二月初一日據介休縣稟稱卑縣城南五里外上堡村地方舊有南泉灰泉長湖泉三處合流而為一渠經由上堡下堡常樂等三村共灌地五百餘畝數十年來三泉俱已乾涸水田悉成旱地忽於今秋收穫後三處復現微泉至十月而轉盛現今嚴寒氷凍尚爾日夜長流又南泉東面髙地內新湧出泉一處其流尚細灰泉西南平地內新湧出泉一處長湖泉西南平地內亦新湧出泉一處二泉甚旺其周圍附近處亦尚有湧出小泉等情具稟到臣臣復令將新舊各泉現在聚水寬深之情形及新湧成泉者確有幾處再加查眀去後兹據稟稱查得南泉現在圍寬五文水深一丈旁有新泉三處圍寬四五六尺不等水深各二尺灰泉現在圍寬一丈一尺水深三尺長湖泉現在圍寬四丈水深五尺與灰泉相接旁有新泉三處圍寬五尺九尺一丈不等水深二尺五尺不等又附近有井一口向需人力汲引取水甚深今泉從井眼湧出亦充滿長流等情稟覆前來臣接閲之際深為慶幸此皆我皇上湛恩普被大德覃敷敬天勤民時時以稼穡為念重農貴粟刻刻以安阜為心是以上格蒼穹下昭瑞應甘泉疉見溥利民生臣與官民人等曷勝歡忭感頌惟有盆加敬謹以裕天庥除飭該縣於春融後即相度源流築堰疏引灌溉地畝若干俟詳報另奏外臣謹恭摺先具奏聞謹奏地湧甘泉堪資灌溉乃生民樂利之休當具疏題奏興築壩堰以垂永久及或建立祠宇以昭神貺一併酌議施行雍正十二年三月十二日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方於本年二月二十八日省城得雨三寸三月初五日得雨四寸初九日得雨三寸據各州縣申報二月二十八九三月初五等日有各得雨三四五六寸及霑足者臣查三春之內雨澤甚是調勻周遍在地麥苗現髙出四五六寸不等農人俱各乘時耕耘歡聲遍野咸頌皇仁臣謹恭摺奏聞為此謹奏據奏三春雨澤調勻麥苗長發以手加額覽焉雍正十二年四月二十八日山西巡撫臣石麟謹奏為奏聞事竊照山西地方今歲自正月以至三月雨水俱各調勻充足經臣節次奏聞在案嗣據各屬申報四月初一日得雨二三四五寸不等并有霑足者其蒲解二府州地氣和暖麥苗蚤發獲此雨澤尤為得濟二麥現俱吐秀結穗惟入夏以來雨水漸覺稀少十八日省城得雨寸餘二十二日又得雨一寸行查各屬十七八二十二等日得雨一二三四寸不等有報霑足者亦有未得雨者伏念時屆仲夏禾麥等項正需雨水滋培今未獲及時均霑臣心切倣徨深自刻責修省現在敬謹祈求仰冀天鑒大沛甘霖溥利田疇以慰聖懷謹將四月內得過雨澤并現在祈求緣由恭摺奏聞謹奏京畿地方亦需雨甚殷朕正為此日夜焦憂亟當竭誠修省以祈天恩垂祐可也雍正十二年七月十一日山西巡撫臣石麟謹奏為奏聞事竊照山西省城地方於六月二十五六日得雨霑足臣即行查各屬去後兹省城又於七月初一初二初四初五等日疉沛甘霖十分深透隨據各府州縣陸續申覆前來臣查各屬於六月二十五六日得雨霑足者十居七八其餘得雨三四寸者續於七月初一二初三四五等日均獲霑足太汾二府屬內從前少雨者亦皆普霑西成無虞查各屬在地禾稼前此之已成植者暢茂倍常其漸次栽種之蕎麥等項得此膏雨亦即勃然興發現在平地之粟禾長有一尺八九寸至二尺五六寸不等髙地之粟禾長有八九寸至一尺五六寸不等平地之髙粱長有四五尺不等髙地之髙粱長有三尺六七寸不等豆黍等項平地者長有二尺餘髙地者長有八九寸及尺餘不等芃芃彧彧遍野青蔥凡兹黎庶靡不歡欣臣謹將晉省得雨霑足及禾稼現在長發情形一併奏聞謹奏覽奏朕懷深慰但訪聞沿邊一帶朔平等處仍屬缺雨目今直隸宣郡與晉省北界接壤地方俱現在苦旱為何並未言及耶雍正十二年八月初三日山西巡撫臣石麟謹奏為欽奉上諭事竊臣前具奏晉省得雨霑足一摺欽奉硃批諭旨覽奏朕懷深慰但訪聞沿邊一帶朔平等處仍屬缺雨目今直隸宣郡與晉省北界接壤地方俱現在苦旱為何並未言及耶欽此欽遵伏查朔平一帶地處邊疆氣候較遲本年四月當播種之時雨澤稀少至五月初一二等日亦只各得雨二三寸不等雨未透足二麥未能暢茂秋禾播種未齊嗣於五月十四五二十二十八等日得雨霑足秋禾雜糧咸得播種惟因邊圉地方多係沙土若十日或半月不雨即覺乾燥故於五月底雖得雨霑足而六月望後又需雨澤正在祈求旋於二十五日得雨二三四寸不等復於七月初一二三等日連得透雨優渥霑足查六月下旬得雨雖覺稍遲而連霈甘霖禾黍均獲滋培興發是以臣於七月十一日同各屬霑足情由一併具奏未敢以缺雨冒昧率陳也兹奉諭旨查問臣謹據實覆奏伏祈睿鑒至各屬自七月初一二初四五等日得雨霑足之後省城於七月二十三四日得雨霑足又於二十六日得雨十分深透隨據各屬陸續申報七月十九二十二十三四五等日各得雨三四五寸及霑足不等其沿邊朔平府所屬之五州縣內右玉左雲平魯馬邑等四縣於七月初十十九二十等日俱得雨霑足朔州於二十四五日得雨五寸大同府所屬之九州縣於七月十九二十二十二等日均得雨霑足查各屬蚤禾現在結穗晚禾等項亦漸次秀實臣正在繕摺具奏間省城於八月初三日甘雨大沛四野霑足理合一併奏聞謹奏覽奏知道了凡雨暘奏報惟以據實為要若少加粉飾遮掩則心涉欺隱近於無恥小人之行矣戒之志之雍正十二年十月初三日山西巡撫臣石麟謹奏為恭報盛世豐年收成分數事竊照晉省地方今嵗三春雨水到處充足入夏之後惟沿邊大朔保三府州屬暨近省太汾二府屬內間有雨水未獲普霑者至六月下旬七月初旬內甘霖疊沛通省普遍霑足田禾仍屬得濟兹當百穀告登之候臣留心查察并據各府州縣陸續開報分數前來臣復逐一查核晉省共一百五州縣今十分收成者共三十六州縣九分收成者共三十一州縣八分收成者共二十四州縣七分收成者共十二州縣六分收成者共二州縣黃童白叟羣相鼓舞感頌皇仁此皆我皇上敬天勤民至誠感召以致萬姓得此盈寧之慶也謹將各屬所報分數遵奉諭旨分别開明另繕清摺恭呈御覽為此謹奏晉省今歲秋成得有如是分數可謂望外之幸也同日又奏為欽承聖訓恭謝天恩事雍正十二年九月二十三日接準兵部咨開將臣題補鎮西城都司之馬自能渾源城都司之王哲朔平營都司之楊國彥帶領引見奉旨馬自能王哲楊國彥俱弓箭生疏姑照所請補授石麟凡題補武職多似此等人員是何意見爾部飭行該署提知之欽此移臣欽遵跪讀之下惶悚靡已伏思臣庸材陋質荷蒙聖恩畀以晉撫重任復奉命署理提督印務任事以來時時督飭員辨勤習技勇整理營伍惟期殫竭駑駘之心力以報聖主委任之隆恩至於題補將備等員尤深兢惕遇有員缺會同鎮臣詳加揀選再三考核不敢稍忽祗緣知識短淺選擇未當臣心深愧臣咎難辭乃蒙聖主洪恩不加處分特賜訓飭臣跪誦恩綸實感愧交深難以名言嗣後如遇員缺益當詳慎揀選以仰副聖主訓誨之至意也所有微臣凜遵聖訓感激之忱謹恭摺叩謝天恩為此謹奏若詳加揀選再三考核之人尚皆如此平庸則通省武備廢弛將辨怠懈營伍之不整齊兵丁全未訓練不問可知矣惟愧惟懼庶免隕越慎之雍正十二年十一月初八日山西巡撫臣石麟謹奏為奏聞事竊照山西省城十月十一十二日得雪情形臣當即恭摺奏聞并聲明行查各屬俟覆到另奏荷蒙睿鑒嗣省城於十四日未時起至十五日已時止復得雪六寸并據各府州縣陸續申覆於十月十一二日十四五日各得雪五六七八九寸及一尺二三寸不等通省普霑在地麥苖得此瑞雪疊降均獲滋培之益所有查明緣由理合奏聞伏祈睿鑒謹奏覽奏闔境普霑瑞雪麥苖均獲滋培曷勝欣慰雍正十三年三月十七日山西巡撫臣石麟謹奏為欽承聖訓恭謝天恩事竊臣於雍正十三年三月十五日接到臣兄新授福建按察使倫逹理寄字內開我於三月初六日奏請聖訓蒙聖訓實深惶悚伏念臣由筆帖式至微極末之員蒙皇上天恩教養生成拔置御前奏事特授為員外郎旋放安徽布政司寸長未效仰荷聖恩逾於常格簡畀晉撫重任又蒙命臣署理山西提督印務臣身受殊恩至優至渥即捐軀糜頂尚恐不能報效何敢自甘暴棄以蹈罪譴惟是才識短淺心思耳目不能周到靡遺以致愆尤日積復蒙聖主洪恩寬宥矜全屢頒諭旨訓誨諄諄臣每跪讀恩綸之下感激涕零兹復欽承聖訓臣愈深敬畏痛自刻責惟有益加勉勵殫竭心力辨理政務冀贖前愆仰報髙厚隆恩於萬一耳為此繕摺恭謝天恩謹奏覽雍正十三年六月十三日山西巡撫臣石麟謹奏為奏聞事竊照山西省城地方於五月十二等日得雨霑足并各屬於五月初五六等日得雨均霑情形經臣恭摺奏聞嗣省城於十七八等日復得雨霑足并據各屬陸續申報於五月十五暨二十五六等日各得雨四五六寸及霑足者不等兹省城於六月十二日申時起至戌時止得雨二寸又於十三日子時起至卯時止得雨深透霑足當兹黍稷稻粱俱在吐秀含苞之時得此甘雨優渥滋培深有裨益理合奏聞以慰聖懷為此謹奏及時得雨深慰朕念雍正十三年七月十九日山西巡撫臣石麟謹奏為奏聞事竊查晉省各屬地方自夏入秋雨水均獲霑足田禾俱各茂盛因屆結實之際雨澤尤關緊要臣時行查詢其近省太原等府州及省北各府州現在雨水不缺惟省南平陽府蒲州府解州絳州等處於七月十五六等日接據各該府州稟稱查所屬內有自六月下旬起至七月初十雨澤稀少即間有微雨不能沾濡田禾望雨殊殷現在祈求等語臣聞之深為憂慮隨自刻責修省即於七月十七日在省城設壇率同司道等官虔誠祈禱兹省城於十九日丑時甘雨下降纒綿優渥至於申時巳得雨六寸現在尚未止息且雲氣瀰漫雨澤綿綿所降必廣除飛飭平蒲解絳等府州將有無得雨并田禾情形即查明具報俟覆到另奏外謹先恭摺奏聞為此謹奏交秋逾月節令已屆白露平蒲等處縱得雨亦恐無濟於事矣雍正十三年八月初六日山西巡撫臣石麟謹奏為奏聞事竊臣前奏平陽蒲州解州絳州四府州屬地方入秋以後雨澤稀少並七月十九日省城得雨情形一摺兹於八月初四日奉到硃批諭旨臣跪讀之下仰見我皇上念切民生惟恐雨澤後時致厪宸衷臣查七月十九日之雨近省及省北各府州屬地方獲霑足者居多又於二十五六七等日省城暨各府州復得雨透足其平蒲解綘四府州據陸續申報七月十九日僅得雨一二寸不等未獲沾濡復於二十四五六七等日甘霖書夜連沛纒綿優渥均獲霑足前此待雨之田禾皆浡然興發現在長茂秀穗等情臣查平蒲解絳等處地隸省南氣候較蚤民間播種有早晚二禾早禾秋後即可收穫前此少雨之隙而早禾已屆收割其晚禾係收麥後始行播種有渠堰井泉可以澆灌者仍屬茂盛惟髙阜坡地禾苗因雨水愆期未免生發遲滯今得此膏雨普霑雨後天氣現在暖熱田禾猶得長養尚屬有濟收成不致缺望統俟收後確查分數具奏外所有平蒲解絳等處巳經得雨霑足并田禾情形臣謹恭摺奏聞上慰聖懷謹奏果如所奏則雨澤猶不嫌遲禾苗仍屬有濟也何喜如之硃批諭旨卷二百十七之四
