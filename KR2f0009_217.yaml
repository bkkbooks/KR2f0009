body:
  text: 欽定四庫全書硃批諭旨卷二百十七之一硃批石麟奏摺雍正四年五月十八日江南安徽布政使臣石麟謹奏為奏聞事竊臣於夲年三月二十日到任將各項錢糧僃細查得江南省上江向有各州縣有著虧空一項銀二十三萬九千四百六十兩零經前任布政使董永芠據安徽等十府州公議將向有呈送本省各上司莭禮並官役俸工銀兩情願於雍正二年起至雍正四年止按季齎解藩庫抵補前項虧空其不足之數仍於虧空各員名下嚴行追比如其無完冉為議補等因轉詳督撫經前任撫臣李成龍批示準行在案查雍正二年五月起至雍正四年三月止各員共捐解到莭禮銀三萬七千二百一十兩零俸工銀二萬三千四百七十七兩零經前司董永芠任內補完過虧空銀六百六十五兩零升任布政使博爾多將此莭禮俸工銀內借放雍正二年三年四年豆價並借放成造雍正四年厯日共計四款動過銀八千四兩零仍係有著可追還項又有借放補辦各屬採買商欠廢銅借放修理明陵借放癸卯正科恩科文場費用不敷借放代補署司吳應鳳前司董永芠升司博爾多各任內差員解送京餉部中兌缺共計七款動過銀二萬五千七百五十兩零內有無項可抵者據云有屬欠商欠可抵但原派各屬率多升遷事故而原欠商人又多窮亡莫追似此紙上錢糧臣斷難接受料理至博爾多任內尚有差員解送京餉部中兑缺未補銀一萬七千一十七兩零更屬無米之炊博爾多仍要將現存莭禮俸工銀兩項下動用抵補臣查前項虧空乃係國帑攸關莭禮俸工係各員公議捐解彌補虧空之銀兩博爾多不將虧空彌補任意支用殊屬不合除將前項虛懸銀兩一面詳報撫臣魏廷珍題眀追補外謹摺奏聞謹奏博爾多所有虛懸之項一一秉公查揭甚是似此辜負朕恩之人豈容絲毫姑寬且爾亦豈便代他人任過耶將其奏摺看過仍交與伊雍正四年八月十七日江南安徽布政使臣石麟謹奏為請旨事竊臣案查江南省督協各標併外營官兵每年應給俸餉逺者按季近者按月在藩庫支領惟是每年歲終各營領借次年餉銀數百兩至一二千兩不等約共借銀一萬餘兩在次年二月起至十二月止作十箇月扣還歷年由營員詳請督撫批司查例借給相沿巳久從無挂欠但臣若不奏眀而竟以萬餘兩之國帑預借兵丁臣實不敢擅專合先密奏應否借給出自皇恩指示謹奏此等事件自應循照前例而行爾之奏聞亦是同日又奏為奏聞事竊臣到任以來聞督撫俱不收受莭禮臣荷蒙皇上天恩闔家老幼衣食豐足惟有時深感激是以各屬一切賀禮莭禮並不收受訪聞得升任布政使博爾多在任亦不收受莭禮惟是雍正二年因伊母生日收受過各屬壽禮金銀紬緞玉器等項約共計銀七千餘兩此外如有未盡查出之項另行奏聞謹奏將所收受盡行查出具奏以聞不可稍為容隱同日又奏為遵旨賑事巳竣恭摺奏聞事竊臣於本年七月初三日接到撫臣魏廷珍檄開準戶部咨開欽奉上諭軫念泗州被水災黎命臣動支庫銀二萬兩親往泗州散給務使災黎均沾實惠臣跪讀之下謹凛祗遵隨一面檄發告示於被災處所遍貼曉諭併令該州確查被災人口造具清册即於初十日前至泗州嚴加查核以杜詭冒之弊合算名口酌定銀數包封並無絲毫假手胥吏臣親往各里就近按名散給每大口給銀一兩八錢每小口給銀七錢內有辛一等四里田地被災二三四分雖不蠲免錢糧向有賑粥之例且田苗亦曾被水窮苦是實臣推廣皇恩亦俱酌減散給每大口給銀八錢每小口給銀四銀又有既無田地向為代人農工之窮民止有草房棲身亦被水淹倒塌是雖無田地淹沒而現無棲身之所其苦更甚臣亦照成災之例每大口給銀一兩八錢每小口給銀七錢以上三項共均勻該州詳稱水勢消涸民間補種雜糧等情臣於八月初三日巳經散竣除具詳撫臣題覆外合將賑過情由繕摺奏聞謹奏料理甚屬妥協賑過情形已悉爾其勉之雍正四年十二月初四日江南安徽布政使臣石麟謹奏恭請皇上萬安朕安覽爾條奏二摺甚屬可嘉如此留心國事將來自有上進永久受朕恩榮也且聞爾聲名亦好當終始莫移此志更將一切外吏政務勉力學習同日又奏為敬陳管見仰祈聖裁事竊照外省凡有虧空等案入官田地房屋例應估價變賣乃歷年久逺徒有變賣之名多未經變價解部者或田地乏人耕種遂致荒蕪或房屋無人居住日漸倒塌間有火患燒燬僅存基址者甚至州縣屢易其人漫無稽查一任胥役掌管將堅好房屋或大街鋪面私租獲利或私行居住或將田地租榖隱匿入巳種種侵漁之弊莫可枚舉以臣愚見各省凡有入官田地房屋俱應徹底清查若田地如有荒蕪者查明招佃耕種房屋分别賃租收息造册送部存案以杜官役侵蝕肥巳之弊此事若交與州縣官清理不惟刑名錢榖事務殷繁稽察難周抑或串通胥役從中朦混希圖掩飾從前之弊終屬無益查同知通判係佐二間員應請敕部行文督撫遴選廉幹丞倅委令清查必能悉心辦理按季收租解司造册報部查核或僃賑濟或充囚糧之用既可莭省倉儲經費而入官田地房屋亦不致荒蕪倒塌似屬有益倘民間如有願買者不許胥役從中掯勒使費或房屋破損不能如原估之價尤宜亟為變賣應即令委查之官據實確勘造册詳報督撫咨眀內部照時值變價不使假手胥役於中掯勒則民間既無雜項使費自必承買有人而入官房地皆得盡數變價歸公胥役侵漁之弊可除矣臣管窺之見未知是否伏乞皇上睿鑒施行謹奏該部議奏同日又奏為推廣良法以杜虧空事竊照藩庫錢糧從前多有虧空侵那之弊我皇上御極以來特設造報春秋二撥之法按季撥解使藩庫虧空無可掩飾立法盡善為萬世不易之良規臣推廣良法竊以各省道庫錢糧雖有多寡不一然江安十府糧道每年收放漕項錢糧約計四十餘萬無異小省藩庫請將道庫實存錢糧嗣後照司庫一例於每年春秋二季將實在貯庫錢糧分别應存應解之款盡數登眀造册報部聽候撥解京餉俾錢糧均有查考按季截解而庫無多積撥解有時則虧空之弊自可杜絶矣更有請者糧道專司漕運每歲例應押運過淮抵通在署日少因公出外日多凡赴淮之後如遇各屬解道漕項錢糧併支放糧船行月及修船工料等項并各屬解道糧米雖委佐雜官一員代為收放實係胥役經手所委之員不過虛應故事並無稽查之責胥役縱有弊端莫敢過問查各省藩庫俱設庫大使管理錢糧出入事有責成臣請於江安糧道衙門比照藩庫之例添設大使一員凡倉庫收放銀米責成大使稽查則職任既專咎有所歸而銀米出入自能慎重無弊矣其添設大使之處應令督撫於佐雜間員之內可以裁汰者改設一員則官役俸工即可移彼應此毋庸另議也臣謬抒管見是否可行伏乞皇上睿鑒施行謹奏該部議奏他省糧道有與江安相類者事同一體一併妥議具奏雍正五年三月初九日江南安徽布政使臣石麟謹奏為恭謝天恩事竊臣齎摺人回捧到皇上欽賜御書福字前來臣隨出郊恭迎至署望闕叩頭謝恩祗領訖伏念臣一介庸材至愚極陋荷蒙聖主隆恩逾格擢用夙夜兢兢深愧涓埃未效乃奉賞賜御書溫旨優加天語勉勵臣跪讀之下感激無地自顧何人膺兹異數受恩愈重圖報愈難惟有凛遵聖訓益竭駑鈍終始如一盡心學習永效犬馬之微忱仰答高深於萬一耳理合具摺恭謝天恩為此謹奏覽奏謝知道了勉力為之但能將陛辭時所立志向堅守不移則無往而不是也雍正五年閏三月二十九日江南安徽布政使臣石麟謹奏為謹陳侵隱稅銀之弊亟宜立法清查以除積習事竊查民間置買田地房産定例每兩稅契三分雖歲無常額例應儘收儘解乃官胥因循錮弊以國稅作虛名視欺隱為常套分侵肥槖靡不相習成風若不立法清查流弊將無底止謹就臣管見臚列於後敬為我皇上陳之一殷實良民既置産業自必急公輸稅焉肯隱匿取罪惟姦牙勾通胥役侵漁延捺不用司頒契尾有擅用州縣私票填給者或地方紳襟包攬觀望每乘州縣升遷事故離任之時有將白契乞恩蓋印免其稅契者或生監人等素知稅契原有侵隱遂挾制州縣將自巳應稅之契求情減半輸稅填給契尾假揑完數造册者究之契册不獨數目懸殊抑且産業各别種種弊端難以枚舉皆由牙人從未定匿報之罪業戶稅契又無限期悉聽遲早自便不惟官胥串通捏報而刁詐之民亦生匿契不稅之弊矣以臣愚見嗣後凡民間置産請專責牙人將業戶某人住居某處某月日用價若干置産若干逐一填具報單赴收稅衙門十日一報以交價之日扣限四箇月如業戶逾限不行呈眀過戶完稅者查出按律治罪仍照契上價值追罰一半充餉如牙人扶同隱匿不報者别經查出除責革不許復充外仍於牙人名下計所隱稅銀照追入官如無藩司印尾或州縣官擅用私票填給或白契擅行蓋印免稅者將州縣官革職計贓治罪業戶牙人照前分别追罰如有姦牙胥役於正稅之外需索勒掯等弊將該管官照縱役犯贓例議處如此責成既專匿稅之弊自絶而業戶亦不致滋纍矣一安徽向例用藩司印信契尾轉發州縣如遇民間上稅將司尾填給業戶收執造册報司其中以多報少實難稽查以臣愚見請自議準奉文之日為始將契尾改刊合同一樣兩張鈐蓋司印轉發州縣民間上稅將所買田地頃畝房屋間數用價若干完稅若干業戶住址逐一據實填注不許絲毫侵隱一張給業戶收執一張按季送司查核但此內不肖州縣或將送司契尾與業戶所執兩樣多寡填報亦未可定接閲邸鈔現經部臣議覆清查官房一事聖眀洞鑒外官或有牽制瞻徇之處著吏部將候補候選之佐二官員揀選差往酌量分派清查仰見我皇上至聖至眀無微不燭臣請將州縣按季送司之契尾亦委令清查官房人員順往查對是否與業戶之契數目相符有無兩樣多寡填報之弊如此試行觀一年之實數以定課程倘所委官員仍有扶同隱諱情弊將該員革職加倍治罪庶大破從前之積習而徹底澄清矣一外省民間買用人口向無上稅之例多有背主潛匿及拐騙情弊甚至其主窮苦孤寡則欺凌詐騙強贖強去全無主僕名分皆由一紙白契無足憑信查京城買賣人口有上稅之例官民稱便臣請嗣後漢人無論官員軍民人等買用人口應於所在地方官照田房稅契每兩三分之例上稅另刊契尾由司蓋印轉發州縣填給紅契不獨裕課抑且使買主收執有據逆奴背主惡習可稍杜矣以上三條是否有當伏乞皇上睿鑒施行謹奏此事與該督撫商酌如應題奏具疏題請如應咨部咨明該部可也同日又奏為奏聞事竊照駐防江寧八旗官兵併總督織造筆帖式等每年冬季三箇月應放本色馬豆一萬四千七百餘石例於上下江各屬額徵南屯豆協解江寧藩司按月支放查各屬有離省窵逺者有不通水次者向來經徵各官聽從民便折色交官轉解司庫每石折價銀一兩二錢其間完欠不一如州縣偶被災傷徴解不前或州縣虧空參追均難尅期完解而應放馬豆必須豫僃難容遲誤歷任布政使或那正項或借公帑逺赴山東河南産豆地方先期購買運回以僃支放一面嚴催豆價歸還借項惟是逺購於産豆之地價值雖賤但路經洪澤湖豆船重載風濤堪虞臣任內將雍正四年分應放官兵馬豆暫借存庫飯銀遴差就近於邵伯高郵地方陸續購買以應支放雖價值稍昻實免冒險逺涉之慮然此採買豆石歲有豐歉價有貴賤如遇年豐豆賤頗有盈餘今臣止就邵伯高郵購買計盈餘銀三千一百五十兩除另摺奏眀外所有從前折收購買情形理合僃陳顛末具摺奏聞謹奏將此項盈餘另貯司庫以僃價貴之年添補不敷方為允協雍正五年七月十六日江南安徽布政使今升山西巡撫臣石麟謹奏為欽奉上諭事雍正五年七月十三日接到署江南總督臣范時繹咨前事準吏部咨開雍正五年六月二十日奉旨山西巡撫德眀著補授刑部尚書巡撫員缺著布政使石麟補授布政使員缺著按察使富貴補授欽此欽遵行文到臣伏念臣一介庸愚仰荷聖恩畀以安藩重任年餘以來涓埃未效時切悚惶兹復蒙特恩補授山西巡撫聞命之下感激涕零除循例具本恭謝天恩外臣犬馬戀主之誠正在繕摺恭請陛見間又準署督臣范時繹準吏部咨開雍正五年六月二十八日奉旨石麟任內經手錢糧自無不清之項若俟富貴到任交代為時尚早著范時繹查明接受交代其布政司印務范時繹酌量委員署理石麟著即來京陛見欽此臣現候署督臣查眀交代清楚後即趨赴闕廷仰覲天顔跪聆聖訓不獨臣獲抒瞻雲就日之忱其於邊疆巨務禆益良非淺鮮矣為此繕摺奏聞謹奏覽爾奏謝知道了來京陛見在即統候面諭雍正五年八月二十八日新授山西巡撫臣石麟謹奏為特參州牧不職以肅官針事竊查直隸知州不獨有刑名錢榖之任且有表率屬員之責必須年力精壯勤敏練達者方克勝任臣查有安徽屬之泗州知州張文炳年邁昏庸廢弛政務聲名不好臣時嘗訓導無如終不知改似此昏庸不職之員貽誤地方斷難姑容合亟特參以肅官針者也為此具摺奏聞伏乞皇上睿鑒敕部施行謹奏該部察議具奏雍正五年九月二十四日山西巡撫臣石麟謹奏為奏聞事竊查澤州妖言聚衆一案臣欽遵諭旨自進署後隨又嚴飭密拏兹據澤州知州劉育嵒詳稱差役盧廷帶等於九月十一日巳將首惡靳廣在河南洛陽縣白沙鎮地方緝獲到州録供起解等因前來并準河東督臣田文鏡咨同前事等因臣隨令澤州將緝獲之差役重加賞賜以示鼓勵并將案內有名未獲各犯及續經供出之犯嚴飭澤州及飛咨各省密行嚴拏外靳廣於二十日已解到省城監禁現在公同嚴究實情另行具奏今將首惡巳獲情由謹先具摺奏聞謹奏澤州首犯靳廣就獲之處適據王廷揚已奏聞矣雍正五年十月初十日山西巡撫臣石麟謹奏為奏聞事竊照山西省城於本年十月初三日午後下雪至次日清晨止約深三四寸臣見同雲四布所沛必廣隨行各屬飭查去後據各府州陸續申報所屬地方於初三日各下雪二三四五寸不等並稱麥苗在地欣逢瑞雪滋培大有裨益所有得雪日期理合繕摺奏聞伏祈睿鑒謹奏晉省得雪情形欣悅覽之畿內已蒙天恩兩賜瑞雪矣河南山東二省據報亦同獲霑濡之慶雍正五年十月二十日山西巡撫臣石麟謹奏為奏聞事竊臣蒞任以來即以清理錢糧為首務所有晉省耗羡一項按雍正元年十一月間前撫臣諾岷奏眀提貯司庫酌量分别支用原屬以公濟公也臣查原奏摺內開有每年修理城垣衙署并修築汾河堤岸義學束修沙虎口馬匹料草并倒斃馬匹各衙門心紅紙張書辦工食布政司搬銀工價提塘報資等項共需銀六萬四千餘兩臣到任後據布政使高成齡將臣冬季養廉銀及心紅紙張修理衙署賞兵等銀呈送前來臣查養廉銀兩乃蒙皇恩賞給應收之項其心紅紙張修理衙署亦係原摺內所有之項此二項銀兩臣暫收存務期莭省不致虛費至賞兵之銀原摺內並無此款隨發回布政司收庫臣因此查閲舊存册內有開送程儀酒席者有開稱部費使用者有開稱進上土儀往返腳費者每項合計各有四五千兩不等甚現在催齊各册逐一查核眀白另行具奏外謹先奏聞為此謹奏覽雍正五年十一月初六日山西巡撫臣石麟謹奏為奏聞事竊照收買黃銅器皿一案臣欽遵諭旨於到任後即檢閲舊案自雍正四年二月準到部咨迄今年餘查司庫及各屬存貯共收過黃銅八千七百餘斤甚屬寥寥而省城店鋪亦有貨賣銅器者臣思下效必由上行立法當從近始臣隨將署內一切銅器當衆曉諭發貯陽曲縣庫并遍發檄示務使家喻户曉仰體皇上屢頒諭旨無非欲使錢文充裕便民日用之聖心交官給價實力奉行去後兹據附郭之陽曲縣詳稱奉示收買黃銅器皿自十月初六日起至十一月初一日共收買銅器一萬六千餘斤又據各屬報收銅器共有三萬四千餘斤至私錢欽遵諭旨現在設法漸次禁止收買外所有收買黃銅器皿漸有成效緣由合先具摺奏聞再禁止賭博私宰耕牛二案臣俱刊發告示遍行曉諭俾小民洗滌前非仰遵聖化以副皇上軫念農耕敦厚民俗之至意兹據陽曲縣詳稱遵奉示禁現在遍諭訪查力行禁止并飭鄉地牌頭互相稽察倘一家有犯十家連坐等因到臣除不時訪查外倘有官民仍蹈故轍玩違不遵定行按法參究所有禁飭緣由合并奏聞謹奏此等禁約行之省城如是稽查可耳至於外府州縣鄉僻處所須看有司才力何如倘遇無能牧令一任胥役生事擾民則禁之不如不禁之為愈也慎之務宜婉曲勸導為主不可徒繩以法同日又奏為奏聞事竊查晉省於本年十月初三日得雪分寸經臣具摺奏聞嗣於十月二十二十一日省城復得雪二三寸又據各屬報稱於十九至二十二等日各得雪三四寸至七八寸不等等因到臣伏思麥苗初長連得瑞雪滋培更見青蔥鬱茂此皆我皇上以大孝至仁教養天下故爾疊召天和臣與闔屬官民惟有額手歡呼共慶升平之盛而已所有得雪日期理合恭摺奏聞謹奏覽奏深慰朕懷直隸近日得雪情形大略相同河南通省竟得盈尺之雪宜乎吾民之慶喜也雍正五年十一月二十一日山西巡撫臣石麟謹奏為奏聞事竊臣接怡親王書信內開雍正五年十一月初三日奉上諭目今西藏之事差大臣前往辦理其跟隨兵丁所用糧餉需騾馱運令山西河南各採辦三千頭著該督撫動支正項錢糧採買按價給發俾其足用不得絲毫派在地方纍及小民亦不許地方官員人等有捐助之事或存公銀兩有可動用者著動支應用在該督撫酌量可密寄信與伊等知之欽此寄信到臣查此案馱騾定限眀年二月交齊臣於接準部咨之日即查眀産騾處所按其地方之大小分派騾頭之多寡飛飭各屬星速購買其應用價值臣隨檄令布政司於庫貯耗羡公用銀內動支委員分發各屬揀擇臕壯照數購齊以便依限解交并出示曉諭毋許絲毫派在地方纍及小民如有借端派纍不時查參謹將動用耗羡銀兩飛飭購買緣由繕摺奏聞謹奏此番採辦若稍蹈科派前轍滋纍百姓汝即為負朕簡用矣慎為之倘微有風聞汝領罪不起當再三嚴飭屬員汝復加意訪察毋忽同日又奏為請旨事雍正五年十一月初十日據按察使蔣泂詳據大同朔平寧武三府申稱竊查大同府屬之陽高天鎮二縣朔平府屬之右玉左雲平魯三縣寧武府屬之寧武偏關神池五寨四縣俱係以衛改設並無監倉現在各縣俱有命盜重犯暫借民房店戶撥役看守巳及兩年前經纍次估計建造監獄清册附於建造各衙署清册一併申請院司題咨建造未蒙準允除將原估各册申請藩司具詳外職府等以監獄未造心懷殷憂懇詳轉請等因到臣臣隨一面批飭速將重犯嚴加防範務保無虞一面檄令布政司將此九縣監獄工價先於現貯司庫耗羡銀兩內每縣暫行發銀一百五十兩飭令印官即日購料興工外臣查舊案新設朔平等府及所屬各縣應設衙署監獄原題內係請動正項錢糧建造因估價未確屢詳屢駁是以因循二載尚未題覆今催據布政司高成齡詳稱除有衛所舊署改設外應建朔寧二府所屬之各衙署並監獄等處共需銀一萬四千兩有零請動地丁錢糧應用册報前來臣因所估工料仍未確實現在批令核減俟核確之日一面具題一面給銀建造臣思此項添建衙署監獄乃係地方公務所需工料銀兩似不必動用正項錢糧應於司庫現貯耗羡銀內動用以為建造之資實屬以公完公是否如此辦理臣未敢擅專相應據實具奏請旨遵行謹奏據奏既動耗羡銀興工建造可無庸具題於工完之日或咨部存案或摺奏以聞雍正五年十二月初十日山西巡撫臣石麟謹奏為遵旨定議謹先奏請睿裁事竊查晉省各案虧空錢糧布政使高成齡前護撫印時曾將酌議查追虧空之法等事繕疏具題奉旨此案應如何追完之處俟石麟到任後與高成齡悉心定議具奏如不能清伊都立髙成齡不能辭代賠之責也欽此臣到任後即與高成齡悉心查議各案虧空今查得有可著追銀四十三萬七千六百九十六兩零其中有虧空各員原籍家産已估計而尚未變解者此係原籍地方官未定有例限處分以致任意遷延今議請旨敕部行文各省著落原籍地方官凡屬虧員原估衣飾等物定限文到四個月內即照數變解如違限不行變完將該地方官由本省督撫參處其田地房屋如果一時無人承買即行入官召租仍不時變賣一面知會晉省於虧員名下合算巳未完數目報部庶虧項可清而衣物田房亦免消耗荒圯之虞矣有審眀應著落上司分賠并開出借欠及認還者此等人員多係在於隔省雖往返咨催或稱現在設措或稱並無借欠輾轉推延終無完解今查分賠中如前任撫臣德音布政使蘇瞻森圖名下各有應賠之項此在京之員請就近於刑部監追其餘毋論現任與候補候選人員俱題參革去官職發往晉省如係無職之人則晉省徑行委員往提將分賠認還二項人員即便監追其借欠一項人員內如有未認眀借欠者俟到晉之日審眀確實若果係虧員牽扺並無未清完者即題請開復發回其應還銀兩仍著落原虧空人員名下追補如巳審眀實係借欠未清完者亦照分賠認還人員一例監追已經在晉者以奉文之日為始未到者以到晉之日為始俱再限一年追補一面即查其各家産變抵能限內全完則請開復釋放倘逾限不完則察眀情由分别治罪其各完不足數銀兩俱著落不早行催追之前任撫臣伊都立布政使高成齡名下逐案各半賠補全完俾帑項有著而情罪亦允當矣其有著之中除分賠認還等項外尚未足數仍應向虧員名下追補并民欠撥補等項臣現在嚴督承追各官勒限追比務期完報統於雍正七年限內清楚至期如有未完請將虧員即照侵盜錢糧例按現在未完之數治罪未完銀兩著落四股賠補以現今承追之州縣官賠補一股督催之院司府官各賠補一股則承督各官咸知警惕上緊追比而無瞻徇延緩之弊矣再查前疏內開無可著追者共銀一十一萬四千七百五十九兩零今查此內有任所承追官雖出具並無隱漏保結而原籍地方官尚未送有印結者現在復行嚴查如果實係家産盡絶追無可追抵無可抵者雖日事監比終於國帑無補此等人員不特法無可恕而且再為延挨反起未完各員觀望之心應照侵盜錢糧例按現在未完之數即行治罪如本人已故即將妻子照例治罪其未完銀兩請動原議彌補虧空之耗羡銀補完庶虧空之員皆知畏懼而國帑亦不致久懸也以上各條臣與高成齡查議惟分賠等項如不能清著落伊都立高成齡代賠及有著之項不能催追完足著落承督各官分賠之處在高成齡俱以此時不必預先議定係臣自行酌定應否如此著落辦理臣未敢擅便謹先具奏伏乞皇上睿鑒施行謹奏朕惟欲事體妥協情罪允當不使貪叨者漏網賣法沽譽者逍遙事外耳汝領會朕意秉公酌妥於開印後具題可也至於高成齡在任日久各項俱伊經手若不令暫離恐終難徹底清晰汝意如何據實奏聞雍正五年十二月十八日山西巡撫臣石麟謹奏為奏聞事雍正五年八月內護撫臣布政使高成齡接準部咨令將殺虎口應否設立關門之處會同右衛將軍查眀奏聞一案臣到任屢經檄飭布政司查議去後總無確切定議詳覆臣查殺虎口地處邊疆應否設立關門必將地勢情形及有益無益之處確勘詳查方得定議何敢草率從事臣擬於正月初四日親往殺虎口確勘眀白其應否設立關門即可與右衛將軍臣色穆德面為詳酌定議奏請皇上睿裁且邊疆營伍情形臣亦得閲歷稽查矣理合具摺奏聞謹奏汝往勘眀定議甚好但色穆德值來京陛見之班到彼未必得與之相晤耳伊乃識見庸平之人在彼與否毫無關係汝竟相度形勢自立主見具奏以聞可也同日又奏為奏聞事竊據河東鹽法道朱一鳯呈稱本年十一月十九日準運同王又朴牒呈據中東西三場大使等申稱據商人周斯盛等報稱自十月初三日以至十一月初七八十一等日池內各畦皆有自生之鹽約共收鹽有七百萬餘斤等情呈報前來據此隨率同運同王又朴親至池內驗看果見池畦皆有自生之鹽隨令衆商收貯訖詢諸耆老僉云未見考之歷代實屬罕聞除報明鹽院外事關嘉瑞擬合報眀等情到臣臣查河東鹽産於池俱係四五六月間人力澆曬而成今於十月十一月內池內各畦皆有自生之鹽共計七百萬餘斤此皆我皇上恤商愛民至誠感格是以池鹽獻瑞曠古希聞應聽河東鹽臣查眀起止月日産鹽確數作何定議題報外事關池鹽嘉瑞理合具摺奏聞謹奏業據鹽臣碩色奏聞矣知道了同日又奏為遵旨查奏事竊查按察使蔣泂以布政使高成齡派捐養廉抵補耗羡以及應給之銅價先農壇監獄等項工料價值遲延不發等因繕摺具奏奉硃批諭旨將此摺密與巡撫石麟看若查有實據即具疏嚴參欽此臣查地方緊要公務如收買銅器以資鼓鑄一項此我皇上軫念錢文為民間日用之需務使充裕以便民用之至意布政使高成齡自應上緊辦理廣買銅器核實定價給發現銀乃遲延不發致屬員亦遲緩查收自奉準部文之後一年有餘僅收買銅器八千七百餘斤臣到任檄催始現在給價而各屬亦紛紛具領則從前奉行不力高成齡難辭其咎又如各省設立先農壇一案此我皇上祈榖重農之曠典理應即行核實給發料價乃高成齡以各屬造報浮多久不給發及臣查催之後陽高等九縣應添設衙署監獄一案理應核實速臣因監獄乃繫囚重地刻不可緩隨一面於耗羡銀內飭發建造一面繕摺具奏仰蒙睿鑒在案以上三項臣到任後俱已嚴飭現在辦理查高成齡身任藩司仰沐皇上高厚之恩自應力圖報效乃辦事因循實屬玩忽但就此三項而論有因州縣估價浮多輾轉駁減有因從前撫臣亦不上緊督率遲延之咎似不在高成齡一人是以臣只嚴督辦理而未參奏也至於派捐養廉抵補耗羡一項臣密加訪察詢之署太原府事同知徐大枚并寧武府知府郎瀚俱稱布政使高成齡因臣嚴查耗羡恐有不準銷算之項曾有欲捐養廉之説而實未舉行派捐收受等語臣荷蒙聖恩逾於格外若高成齡果然派捐染指何敢稍為徇隱以負皇上委任之至意但臣再四訪查高成齡雖有欲捐養廉之説實未舉行派捐收受可否免參出自天恩臣未敢擅便理合據實繕摺具奏伏乞皇上睿鑒謹奏既據查眀若係如此何必題參高成齡之可取處只有謹飭錢糧一莭所以初睹蔣泂前奏朕甚訝之假使果真則是其人一無可取矣同日又奏為奏聞事查得藩庫存貯耗羡一項雖充公用理應慎重莭省不得混行動用除將應動不應動之處臣逐一分晰另摺具奏外查升任撫臣德眀在任時曾支過雍正五年春夏二季操賞兵丁銀一千兩嗣於十月內德眀差家人赴晉領取皇上賞給養廉銀兩聞臣清查耗羡隨將前項操賞兵丁銀一千兩解還司庫以歸原款又查按察使蔣泂雍正四年內多支取刑名部費銀一千兩兹據布政司詳稱蔣泂於十二月十四日移還補項是以今具摺內不應動用項下俱未有列入理合繕摺奏聞謹奏百凡果能公正無私則人皆率從自有益於國家也即此非眀驗歟硃批諭旨卷二百十七之一欽定四庫全書硃批諭旨卷二百十七之二硃批石麟奏摺雍正六年正月初四日山西巡撫臣石麟謹奏為遵旨據實奏聞事竊臣前議奏晉省各案虧空一摺奉有硃批臣跪讀之下仰見我皇上至聖至眀無微不燭臣查高成齡升任布政使歷今四載有餘凡於錢糧事務俱伊經手不無瞻徇之弊且今又擬有著落賠補虧空之項若仍令在任恐致掩飾牽混以臣愚見自宜令其離任則一切錢糧易得清楚除酌議追補虧空之案開印具題外臣謹據實具摺奏聞謹奏令其離任固是但一時未得勝任之人且爾到任未久諸凡尚須協助稍遲數時候朕有旨此其間爾宜更加審度如查無通同欺瞞情弊為人尚屬和平有守熟練地方有可惜處據實再奏以聞雍正六年正月二十二日山西巡撫臣石麟謹奏為請旨事竊臣前奏殺虎口應否設立關門之處擬於正月初間臣親往確勘一摺奉有硃批臣隨於本年正月初四日起程前往於初九日到彼逐一查看得殺虎口外係蒙古地方前朝建築邊牆設有馬市樓一座下設暗門四層門洞低狹只可單身行旅徒步出入自我朝定鼎中外一統口外歸化城即為貿易之所商民往來交易日盛順治八年遂設監督一員於此經收稅課暗門之西有大河一道按之志書詢之土人前眀萬歷年間於河上接連邊牆建立萬全橋一座計十九洞又於暗門之西萬全橋之東中間建立大樓一座後於康熙五年因暴雨水漲將萬全橋東邊六洞半并大樓一座連邊牆共衝倒六十餘丈橋下前後遂致沙泥淤塞水不歸橋下而移向衝決之河口流出口外至康熙三十三年間因設右衛將軍建造營房出口砍大青山木植以暗門狹小難以拉運車輛遂於倒缺之處闢立木柵欄以通往來因而貨物駝馬牛羊亦從此出入商旅稱便監督亦隨於此立一收稅所徵收稅銀而河口亦設木柵以為遮攔撥有滿洲同緑旗官兵於暗門木柵欄關口及河口東西兩岸查看出口禁物相沿已久今原任監督臣三保條奏殺虎口應照張家口等處之例於現今收稅木柵欄關口設立關門等因臣查自設立木柵欄關口以來業經多年商旅雲集於此外藩蒙古往來進貢絡繹不絶若於木柵欄關口設立關門查關口之去河口僅十餘丈勢必於河口築隄保護將萬全橋下前後淤泥挖去使水仍歸橋下并補修橋洞邊牆而後方可垂久若不修河口并萬全橋洞邊牆則未能接連雖設關門亦不能如張家口等處關門之壯麗也且挖驗河口之土深至五尺俱係沙礫即使補修橋洞邊牆設立關門無論錢糧浩繁而一經暴雨沙礫之土鬆泛易於侵削難以保固是徒費錢糧未有裨益以臣愚見莫若仍照舊制嚴飭滿洲緑旗官兵加謹看守毋庸更設關門之為便也臣又查看得暗門之去木柵欄僅十餘丈之地一切貨物自應俱從木柵關口輸稅出入今查肩馱背負輕小之貨又有從暗門出入者雖監督亦遣人於此稽查恐不能無賣放隱漏之弊且一處關口設立兩門亦屬未便似宜將此暗門竟行封閉使大小輕重貨物俱由木柵欄關口輸稅以歸畫一但臣愚昧識淺所議未知當否謹將看過情由先行具摺奏聞伏乞皇上睿覽指示遵行謹奏覽所奏情形原委甚屬詳悉但此事全憑爾斟酌定議朕未親歷其地不便指示是與否也同日又奏為奏聞事雍正五年十二月十九日接到大學士朱軾等來字內開雍正五年十二月初二日吏部將原任大同通判王琠帶領引見奉旨王琠著補授廣西養利州知州欽此又奉諭旨王琠家屬在晉爾等寫字與山西巡撫布按令其酌量差員將伊家口送往粵西欽此字寄到臣臣隨查明王琠在普家屬酌量自普至粵應需盤費臣給銀四百兩布按兩司各給銀二百兩共銀八百兩內交給王琠家屬銀七百兩又差臣標把總劉成文護送給發往回盤費銀一百兩巳於雍正六年正月十一日自普起程赴粵訖為此具摺奏聞謹奏所奏知道了前因藩司缺未得相宜之人故於爾摺內有暫留高成齡之批諭今已得人另有旨諭部矣知之雍正六年二月初二日山西巡撫臣石麟謹奏為請旨事竊臣查得普省民間完納錢糧整戥完納者少或數錢或數分零星上納者多州縣拆封以數十戥之稱收而併作百兩一平之彈兌其中不無多餘謂之併頭此原非額外加耗亦非重戥稱收所致乃零收總兌自然而有之贏餘也臣隨行查各府州去後今據覆稱各屬徵收錢糧每百兩除原定火耗之外尚有餘出併頭銀二兩等因臣查普省每年額徵錢糧共二百八十二萬餘兩每百以二兩計算一嵗共應有併頭銀五萬六千餘兩伏思州縣各官巳蒙皇恩賞給養廉起解錢糧又另給有傾銷腳價等費則併頭銀兩自不應仍歸州縣請將此項亦令州縣按數同耗羡一併解交司庫嗣後遇有解京餉之飯食補平等費即於併頭銀內動支其餘存貯司庫以僃地方之公用如蒙俞允即以雍正六年為始開徵後飭令各州縣照數起解倘州縣因此項解交而有加耗者臣不時稽察嚴參應否如是理合繕摺具奏伏乞皇上睿鑒施行謹奏此項不應令州縣解交司庫仍少留餘步為是若耗羡之外又收贏餘倘不肖有司從而加耗則民力其何以堪耶同日又奏為遵旨密議覆奏事竊臣於雍正五年十二月初八日接準怡親王戶部尚書臣蔣廷錫來字內開上諭一道令河南山西山東三省督撫密議會商每省於步兵內挑選二千人以僃明年秋冬調遣其人須揀老實壯健不必長於弓馬但可以駕車開墾等事之用者若步兵不足即於馬兵內挑選等因到臣奉此又於雍正五年十二月二十日接準怡親王大學士臣張廷玉戶部尚書臣蔣廷錫來字內開前所寄挑選兵丁之信原奉上諭有不必長於弓馬但能演放鳥鎗併可以駕車之用者寫信時少寫能演放鳥鎗字樣兹特再信知大同鎮標內挑選八百名以足二千名之數除弓馬不必論其優長外務期能演放鳥鎗并老實壯健可以駕車開墾等事之用者方準挑取但為期尚早未敢預泄臣惟密札轉囑兩鎮令其密行挑選造具花名清册存案俟欽奉十箇月內家口乏用似應分作四分臨行先給一分將三分當面封貯公所去後五箇月令其家屬再領庶行者居者之心均可以相安而不致懸念矣其各兵行裝衣服等項臣查行裝可以畫一製僃而衣服必須照其身軀分别肥瘦長矮似不便查兵丁各有鳥鎗弓箭腰刀等項器祴似應令其隨帶而行以僃臨時操演至於盔甲旗幟似可不必帶往其所需鑼鍋帳房應照營內定制每兵五名共給各一件每兵五名再買僃馱騾二頭鞍架俱全以負載行裝等物至所挑之兵俱屬步兵似可無庸給與馬匹騎坐再查兵丁係各營挑選彚集若不委官管領任其散行恐途中不能遵守紀律似應照依營中舊制預行酌量派委平日管轄之官或遊擊或都守併千把總領旗等數員率領前行到彼處地頭或令其交眀彼處該管將官使各員即回原任或竟令其管轄至二十箇月後掣回之時率領各歸營伍其領兵各官之路費銀兩伏候諭旨到日臣再查其品職大小路途逺近時日久暫酌形先為恭摺密奏但臣等智識短淺是否合宜伏乞皇上訓示遵行謹奏事同一體不便稍有參差總於豫督田文鏡處畫一行之同日又奏為欽奉上諭事雍正五年八月十三日前護理山西撫臣高成齡準禮部咨祠祭清吏司案呈禮科鈔出浙江巡撫李衛題奏浙江西湖聖祖行宫一疏奉旨聖祖仁皇帝念切民生省方問俗不費地方一絲一粟每次頒發諭旨甚明此天下臣民所共知者至於駐蹕之所地方預僃行宫乃出於臣民愛戴之心不能禁止亦天下臣工所共知者今行宮既屬間設每年修葺需費防護需人在本地有司未免又多一番經理非所以體聖心而惜物力也李衛所奏甚是即照所請行其餘地方有行宫之處如何辦理方為妥協著該督撫會同該管官悉心商酌具奏請旨該部知道欽此欽遵鈔出到部相應通行直隸各省地方有行宫之處該督撫會同該管官欽遵旨內事理悉心酌議具摺請旨可也等因準此隨經行司欽遵查議去後兹據布政司詳稱據代州所屬之五臺縣申稱查得五臺縣之五臺山於康熙三十一并五十年曽經聖祖仁皇帝巡幸駐蹕普省官民愛戴建有行宮三處一在菩薩頂一在射虎川一在羅㬋寺今三處行宫雖皆空間然俱在各寺之內現有喇嘛朝夕看管似無庸另延高僧應否即令本寺喇嘛在內焚修照舊看管至三處行宮現今存貯物件惟黃色團龍椅墊及門簾包袱等物民間不敢用者解送內庫外其餘即留為供佛之需等因議詳前來臣覆核無異謹繕摺請旨伏乞皇上睿鑒施行謹奏五臺行宫仍應照舊毋庸另議延僧爾所奏請是雍正六年二月十八日山西巡撫臣石麟謹奏為奏聞事竊臣仰蒙聖恩畀以撫普重任凡文武大小官員不時稽察前訪聞得太原鎮臣袁立相染有痰疾因其駐劄平陽未能覿面近有平陽府知府樊錢倬因公來省臣細問情形據稱袁立相日常辦事照舊動履亦與平時無異惟形容消瘦語言蹇澀不眀似乎痰氣積滯等語臣查平陽乃緊要重地鎮臣係封疆大僚臣既聞袁立相染有痰症理合奏聞謹奏袁立相患病情形奏聞甚是近日若何問明再奏以聞尚不至於昏憒猶可令其將就在任若心內不明縱能勉強辦事地方關係緊要豈可因循貽誤耶雍正六年二月二十八日山西巡撫臣石麟謹奏為奏聞事竊照普省入春以來據各屬申報於二月初三四至初十等日各得雪二三寸至六七寸不等十六日得微雨近又據各屬報稱二月二十一二兩日得雨雪五六寸不等在地麥苗連得滋潤更見青蔥長發此皆我皇上愛養民生至誠感格是以雨暘時若普利田疇所有得過雨雪情形理合奏聞謹奏各省據報春澤情形山右近鄰畿輔正爾懸念今覽此奏朕懷深慰但不可肆志當益加勤慎清理刑名為第一要政念念秉公時時存誠自必常蒙上蒼垂佑也勉之敬之雍正六年三月十一日山西巡撫臣石麟謹奏為奏聞事竊查臨普縣姦民師刑樊中花張臣等聚衆鬧縣已獲之樊中花張臣復越獄脫逃一案經臣將疏忽之該縣知縣劉國琮題參一面委絳州知州萬國宣與署縣事萬全縣知縣杜庭珠懸賞協拿去後今於三月初九日據萬國宣等報稱師刑等藏匿不出指使村民彼此固結恃險負嵎又復聚衆持械拒捕傷死捕役三名受傷者數人師刑等仍畏罪藏匿臣查臨普風俗素稱刁頑師刑等今復敢聚衆拒捕傷人實法所刻不容逭但愚民多係被其煽誘一時難以盡究臣隨出示曉諭專拿首惡凶犯復懸賞設法緝拏獲犯之日即按律究擬具題再查臨晉縣止有城守把總一員不足以資彈壓臣一面調委蒲州營守僃楊名臣帶兵一百名前往縣城暫駐彈壓外事關姦民拒捕傷人理合先具奏聞伏乞皇上睿鑒施行謹奏觀此強橫不法光景又一翟斌如之案矣速行嚴拏毋得少有疏忽兵止百名似覺人少力單凡事當防未然不可輕忽常將小事作大事辦方好布置切須周密勿致再失機宜臨晉地當四達冝預選捕役兵丁派令分路堵截以防其逸脫遠揚此為最要特諭雍正六年三月二十二日山西巡撫臣石麟謹奏為奏聞事竊查臨普縣姦民師刑樊中花張臣等聚衆拒捕傷人前據絳州知州萬國宣等具報臣隨發示曉諭懸賞緝拏并即委蒲州營守僃帶兵前往彈壓當經繕摺奏聞續準太原鎮臣袁立相咨稱據蒲州副將薛鳯翼具報亦即遣兵三百名前往臨普相機協拿等因今於三月二十日據署縣杜庭珠申報出示懸賞嚴拏間蒲州副將薛鳯翼到縣有把總徐雲赴該村拏獲首犯師刑到縣收監訖并準太原鎮臣咨會首犯師刑已經捉獲投首將前遣兵三百名內撤回二百名仍留一百名協同彈壓查拏未獲各犯等因各到臣除仍嚴行該州縣等將樊中花張臣并拒捕傷人凶犯設法協拏務獲究擬具題外所有首犯師刑已經拿獲緣由理合先具奏聞謹奏據奏拏獲首犯知道了此等不法刁徒並始初孟浪激成之劣員俱不可絲毫涉於姑息以圖將就結案了事務須徹底根究眀白嚴懲示警雍正六年四月十八日山西巡撫臣石麟謹奏為奏聞事竊照普省正二月間連得雨雪麥苗出土青蔥鬱秀經臣具摺奏聞乃自三月望後以來雨澤稍缺麥苗望雨正殷兹於四月十五日據平潞二府澤蒲解絳四州報稱四幸三四日即愈不致傷人臣隨遍示丹方飭令各屬建醮祈求已經漸次平安事關地方旱疫理合繕摺奏聞謹奏今歲時氣流行各省俱有沾染病者頗多仰蒙上天慈佑不數日即愈為可幸耳同日又奏為恭繳耗羡黃册事竊臣於雍正五年九月二十七日跪請聖訓之時經升任撫臣德明於御前將晉省雍正三年分耗羡奏銷黃册一套交臣當即敬謹祗領到任後隨查各年耗羡銀兩多有濫用之項自雍正元年起至五年止逐一清查今已將不應動用及動用內核減之各項款數目并應令賠補之各官職名造册具題追補外所有原領黃册一套理合恭繳為此謹奏凡百處不宜過刻此册留內無用仍發還與爾收存本省可也同日又奏為遵旨再行奏聞事竊太原鎮臣袁立相患病緣由經臣具摺奏聞奉有硃批臣隨細加訪察俱稱袁立相患病巳有半載日常辦事心內尚自眀白惟語言應對不眀因袁立相駐劄平陽臣未能覿面前有汾州府知府白映棠因公來省問據稟稱鎮臣袁立相前赴汾州看兵曾經面會心內眀白惟語言蹇澀等語與臣訪聞無異理合遵旨據實奏聞謹奏知道了總兵袁立相實為武臣中之難得者雍正六年四月二十七日山西巡撫臣石麟謹奏為奏聞事竊普省雨水缺少情由經臣於四月十八日具摺奏報臣與各屬俱各虔誠修省設壇祈禱今省城太原府於四月二十一日得雨寸許又據各屬陸續申報代州應州屯留壺關長治五臺繁峙廣昌垣曲等州縣均得雨霑足其餘各屬亦得雨二三四五寸不等尚有未霑足者臣等現在日事祈求所有各屬二十一日得雨情形理合奏聞謹奏河南與晉省接壤試觀大法小廉民懷吏畏一切刑名錢榖驛站塘汛井井有條河工堤岸修築鞏固直省中實為第一整理省分而年來雨暘應時連獲豐收徵驗亦遂不誣爾能知此朕則更無可諭矣同日又奏為請旨事竊照大同鎮臣祖秉衡親母張氏於本年四月十八日在署病故例應丁憂經臣另疏題報外查大同鎮地處邊疆所轄各營路甚屬緊要鎮臣祖秉衡蒞任以來實心辦理諸事整飭文武和衷兵民悅服皆在聖眀洞鑒之中伏懇皇上天恩令其在任守制其於邊疆營伍地方均有裨益臣因地方起見不揣冒昧據實陳奏伏候聖裁為此謹奏不待爾之奏請自必留其在任守制也雍正六年五月十六日山西巡撫臣石麟謹奏為欽奉上諭事雍正六年五月十二日接到怡親王大學士臣張廷玉字開為臨晉縣匪類脫逃一案於雍正六年五月初六日欽奉上諭一道轉寄到臣臣跪讀之下不勝惶悚伏思臣何人斯乃蒙聖恩不加罪譴特賜訓誨天高地厚之恩感激涕零隨傳示按察使蔣泂欽遵外查臨晉縣姦民師刑張臣樊中花等先既聚衆鬧縣後復越獄脫逃臣據報之日當即飭令出示懸賞嚴拏并將疏縱之知縣劉國琮參革隨委臨晉接壤之萬全縣知縣杜庭珠署理印務并委絳州知州萬國宣協同嚴拏而師刑等復敢拒捕傷人臣隨咨會太原鎮臣袁立相撥兵彈壓查拿當據首犯師刑自首提解省城其張臣樊中花藏匿不出又檄諭蒲州營副將薛鳯翼撥兵於要隘處所堵禦稽查復節次嚴催該州縣選差嚴緝仍將張臣樊中花二犯之家屬嚴行追比又面諭蔣泂差人密訪該二犯潛匿確所并將師刑供出拒捕之樊壽花張舉等一併協拏嗣於四月初六日據署縣杜庭珠以怔忡病發兼染時症難以辦事具詳臣迅飭蒲州知州崔佩速赴該縣督緝務獲又將奉旨命往山西以州縣補用之閻鈵委其署理臨晉縣印務諄諄面諭令其設法緝拏凶犯緣彼時杜庭珠因病仍回本任而知州催佩又往猗氏縣盤倉復改委閻鈵前往署理以致彌月無官有稽比緝臣身任封疆此等姦徒不能即獲究治致稽時日疏忽之咎實所難辭况臣才識短淺屢蒙皇上天恩逾於常格雖粉身碎骨尚不足仰報高厚於萬一若不實心辦事即為天地之所不容矣至鎮臣袁立相以姦民未能就獲慎重地方秉公具奏臣方感激之不暇何敢少有含怨之心再五月初七日據署縣閻鈵稟稱現在勒比查拏臣又飭令該州縣會同武員將張臣樊中花等迅速協拏務獲即行另奏外所有微臣欽奉聖訓感激惶愧之忱謹繕摺奏謝仰祈睿鑒謹奏於此一事觀爾景况實係心有餘而力不足也若不勤以補拙虛衷博採借人之才為才資人之力為力則恐有覆餗之虞兩司設不稱職尚賴督撫糾正至若督撫之任通省官民休戚相關措施稍涉乖謬餘且勿論雨暘必不協和年歲定多歉薄即如臨晉正值有事之際豈容曠月乏官料理隨又委一試用新員攝署將從前妄行之人並不參處示懲似此懈弛犯何能獲事何能集尚有何顔粉飾支吾以奏聞於朕耶朕經諄諄訓爾若不向受福根本處追求亦奚能為勉之慎之為督撫者只一不能用人識人則不克勝封疆之寄矣縱能此二者倘於公勤二字絲毫未盡欲望屬員真心實力代爾任勞任怨亦無有是理試觀田文鏡李衛亦丈夫也伊二人無他技術公勤而已今若仍不愧勉則虛負朕恩殊為可惜也雍正六年五月十八日山西巡撫臣石麟謹奏為奏聞事竊照臨晉縣姦民張臣樊中花脫逃未獲一案今於五月十七日據蒲州知州崔佩報稱臨晉縣越獄要犯樊中花於五月十二日據捕役張威鳯等在於接壤之陜西朝邑縣地方拏獲并請護送到州除將該犯暫羈州監飭縣選差幹役領解赴轅聽候審究合將拏獲日期申報等情到臣除飭令將樊中花嚴加押解來省究訊確情并飭將張臣及拒捕等犯速即緝拏務獲解審外所有獲到樊中花緣由先行繕摺奏聞謹奏原係極易為之事總因漫不經心懈忽之故所以稽延至今始就獲耳朕實代汝愧之雍正六年六月初八日山西巡撫臣石麟謹奏為欽遵聖訓恭謝天恩事雍正六年五月二十九日臣齎摺把總回署接到硃批諭旨隨恭設香案望闕叩頭謝恩訖伏念臣蒙皇上簡畀隆恩撫晉以來自愧知識短淺種種不逮乃荷聖恩浩蕩不即加罪譴復蒙鑒臣之心諒臣之力教臣以知人用人之道勵臣以惟公惟勤之志此皆聖主勉臣望臣之深是以屢蒙訓誨諄諄有加無巳臣跪讀之下不禁感愧汗流敬録聖訓朝夕虔誦凛如天威咫尺時加警覺愧勉惟有盡心竭力公勤辦事以贖前愆仰報我皇上生成教訓之恩於萬一耳所有微臣感激下悃理合恭摺叩謝天恩謹奏覽奏已悉勉之若不能令吏畏民懷如何辦集通省政務然民懷之道非徒事姑息也但能察吏民自懷矣吏畏之道亦非專用威嚴動輒參劾也克盡公勤吏自畏矣惟務本毋逐末奉朕訓諭心悅誠服孜孜實力為之好惡不偏勸懲得當斯即公以馭下勤以補拙之謂捨此别無良䇿也勉之慎之雍正六年七月初八日山西巡撫臣石麟謹奏為奏聞事竊照晉省春夏之交雨澤稍欠業經臣繕摺具奏仰賴皇上洪福自四月二十一日以後連得雨水四野霑足兹據各屬陸續報稱二麥收成自五六分至七八九分不等現在雨水調勻秋禾俱青蔥茂盛各等情前來理合恭摺奏聞謹奏地方上值爾此等巡撫朕之洪福亦何自而來同日又奏為奏聞事竊查臨晉縣鬧縣一案蒙皇上特命光祿寺正卿臣王璣來晉辦理臣於七月初七日據按察使蔣泂具文申稱會同欽差辦理臨晉縣鬧縣一案多方曉諭宣布皇仁又復捐給重賞設法招致今扶老攜幼回村復業者千有餘人其鬧縣拒捕各犯除先獲之師刑樊中花王彪外又有張景師張克耀等及實在鬧縣之張臣或自行投首或密行擒獲首從皆無漏網良善毫無波及閭閻安業地方無事業經移會太原鎮將派撥防守兵丁一百名撤回理合報明等情到臣臣查此案各犯己經獲到其先獲之師刑樊中花等現在俱帶在臨晉除即飭蔣泂將各犯質審確情詳報外所有張臣己獲緣由理合奏聞謹奏覽爾所奏洵可謂不知恥矣雍正六年九月初六日山西巡撫臣石麟謹奏為奏聞事雍正六年九月初四日據陽曲縣申稱九月初三日夜山西學院衙署失竊卑職隨往驗看出入情形係從西房牆扒進挖門入室是竊非強等因又準學臣勵宗萬咨明緝拏并失單一紙內開失去皮衣蟒錦紬縀等物等情到臣伏查竊盜案件雖向無查參疏防之例但地屬省會又係學臣衙署失竊與尋常竊案不同臣隨即懸賞飭行按察司通飭各屬責差嚴緝并傳太原府廳及陽曲知縣面加切責令其協同選差幹捕勒限屣緝務期贓賊全獲究擬倘逾限不獲即照盜案例將文武各員辨疏防職名題參以警疏忽所有學臣衙署失竊緣由合先奏聞謹奏省會地方官衙之內鼠竊敢於肆行無忌則汝平日之法令懈弛槩可知矣若不限日嚴緝務獲以示懲創僅將員辨題參疏防恐未可以卸汝之責也同日又奏為奏聞事竊臣於雍正六年九月初五日接到怡親王大學士臣張廷玉蔣廷錫字開雍正六年八月二十日奉上諭據嶽鍾琪奏稱欽差顧魯於歸化城採買駝隻必由晉省來陜其沿途駐宿料草若委員前往購買支給恐事屬隔省不無呼應不靈難免遲誤請敕諭山西巡撫石麟移咨顧魯查明進口駝隻確數咨報晉省該撫石麟飭令經過地方官預僃草料每隻日支豆四京升草一束至沿途牽送駝隻人夫併護送官辨兵役請令山西撫提轉飭該管文武官辨遴選派撥同臣差員一同料理其牽送人夫挨程遞送每駝四隻需夫一名每夫日給口糧三分此項草豆夫價於晉省庫帑動給俟駝隻到陜之日晉撫將動支銀兩核實彚册移咨臣於軍需銀內解晉還項等語爾等可寄信與石麟令其照嶽鍾琪所奏辦理欽此遵旨寄信前來巡撫俟駝隻進口即遵照妥辦并將派撥護送兵辨之處密行知會提督袁立相可也等因到臣臣欽遵諭旨將應僃料草數目并派撥護送文武官辨兵役隨檄行布政司及經由各府州縣遵照并即移咨欽差臣顧魯將駝隻進口確數即行查明咨報又密行知會提臣袁立相將護送兵辨派撥外合將遵旨辦理緣由繕摺奏聞謹奏務須辦理妥協絲毫不得遲誤關係軍需要務非諉卸屬員可以塞責之事也雍正六年九月十九日山西巡撫臣石麟謹奏為恭報盛世豐年收成分數事竊照晉省地方夏秋雨水調勻田禾茂盛先經臣具摺奏聞兹當萬寶告成之候行據各屬所報收成分數俱有十分即鹹鹵沙坡之地亦有八九分收成此皆我皇上宵旰不遑重農貴粟事事以民依為念是以感召庥和雨暘時若百榖豐登普天率土莫不含哺鼓腹歌頌於堯天舜日之下臣與闔屬官民生逢盛世快覩歲稔時和四民樂業惟有仰遵聖訓益加恪謹敬承耕藉之典禮以永享升平之樂利而已所有晉省收成分數理合恭摺奏聞謹奏覽奏知道了朕之前旨甚明兹不更諭同日又奏為奏聞事竊照晉省前奉發炮車一百輛並侍衛沙亮袁楚楊得元三人前來教導兵丁演習於六月十三日到省臣隨將派撥兵數在於省城平陽大同分作三處演習今據各侍衛等咸稱教導兵丁演習炮車進退旋轉衝馳止守之法俱己齊全各兵已經純熟等語除一面仍令再加操練外合將三處兵丁習學炮車俱皆純熟緣由繕摺奏聞至各兵丁既經習學純熟似可令各營將辨督率不時操練所有侍衛沙亮等三人應否暫留在晉候旨抑或令其回京臣未敢擅便謹此一併具奏請旨謹奏兵丁果皆熟諳無庸教導即應令其回京若仍須訓練則當暫留爾此番請旨處朕殊不解雍正六年十一月初八日山西巡撫臣石麟謹奏為遵旨查奏事雍正五年九月初二日臣面奉諭旨土默特管旗大人丹進曽奏過土默特處如遇豐年米糧價值甚賤若運至晉省甚有裨益但旱路不能行走儘可用船隻自黃河運送等語啓奏朕曾交與伊都立查議據伊都立奏稱黃河內有幾處水勢最險不能行走等語朕已批定不行但伊都立為人其言難信爾到任後留心細細查問如果行不得則止若可行爾再奏聞請旨欽此欽遵臣於到任後每遇臨河州縣來省見臣之時逐細查問并諭令各員將所管河道里數及某處險峻某處平坦是否可以行船逐一查稟內有未甚明晰者復令確查兹據各稟覆前來臣查自湖灘河所迤邐而南至潼關計程一千八百餘里雖屬順流而山峻水急諸磧橫阻船隻實難涉險即照從前編置木筏裝運之議只可為水緩之處而言若於天橋壺口禹門等處均必須陸運一二十里或三四十里不等危崖仄嶺率皆﨑嶮亦屬難行也此係臣集衆稟之情形復加確核無異謹將查過情由恭摺奏聞謹奏據奏險阻如是則船隻運送之説實屬不可行矣雍正六年十二月初四日山西巡撫臣石麟謹奏為奏聞事竊查晉省十一月初二日得有瑞雪嗣於二十三日省城復得雪二寸餘又據各屬報稱於十一月二十三四等日各得雪二三四五寸不等等因到臣伏思麥苗初長連得瑞雪滋培更見青蔥茂盛此皆我皇上深仁厚澤教育萬邦是以疊召庥和臣與闔屬官民惟有額手歡呼共慶升平之盛所有晉省得雪日期理合恭摺奏聞謹奏冬雪不過為來年預兆耳必俟交春後雨澤接續方可定其收成敬畏之心絲毫不容稍懈同日又奏為敬陳一得之愚仰祈睿鑒事竊臣至愚極陋荷蒙天恩畀以晉撫重任一載以來夙夜黽勉惟期有益於吏治民生以仰副皇上勤求治理之至意但臣材識短淺時深隕越之懼兹細加查察悉心計慮謹列數事稍申一得之愚為我皇上敬陳之一已經議裁之員即宜酌量調用也一盜賊窩家之鄰佑十家長宜嚴加治罪也一酗酒行凶宜定以嚴例也一加倍治罪之處尚宜詳定也以上四條是否可採伏候聖明訓示以便具題為此繕摺請旨謹奏本任內事尚多顧此失彼未能施措合宜何暇及於分外天下督撫勝汝者多何待汝初學辦事之庸才增減律例也同日又奏為據實奏聞仰祈睿鑒事竊查新補澤州府知府劉育嵒自康熙五十八年補授山西渾源州知州經前撫臣諾岷兩次題請調繁俱蒙俞允又經臣保題新設澤州府知府奉旨照所請補授欽此欽遵在案正在給咨送部引見奉旨敕查從前歷年考職監生有代考得官者準其自行出首劉育嵒係康熙四十二年由監生考授州同職銜彼時實未親身赴考今不敢欺罔遵旨自首請賜罷斥等情臣另疏具題外但劉育嵒才幹優長操履廉潔實屬有為有守之員且澤州新設為府正資辦理而劉育嵒感激天恩亦力圖報效今查其當時雖未親身考職但後實由捐納選授知州可否格外從寬免其罷斥出自聖主洪恩臣謹據實奏聞伏候睿鑒施行謹奏劉育嵒乃可恕之過也此事當先具摺請旨然後題疏今既經具題候題到之日有旨雍正六年十二月十八日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方於雍正六年十一月初二日暨二十三日兩次得雪情形經臣具摺奏聞兹於十二月十三日起至十五日止省城復得雪一尺有餘又據各屬報稱各得雪六七八寸不等等因前來臣思麥苗在地連得瑞雪滋培今復得雪一尺有餘則土脈肥潤將見麥隴青蔥更加茂盛矣所有得雪盈尺緣由恭摺奏聞謹奏覽晉省得雪情形朕懷深慰雍正七年正月初四日山西巡撫臣石麟謹奏為聖朝德化廣孚士民還金疊見據實奏聞事竊臣於雍正六年十二月十九日據汾州府孝義縣詳稱雍正六年十二月十二日據介休縣民張福烈具稟詞稱烈係雜貨生理於十月十一日路經孝邑地方遺失小稍囊一箇內有銀二十三兩四錢銅錢三百四十文行至北窰村外知覺隨即回身沿途尋查至十里鋪地方見一人拉馬站彼烈隨向問彼即問烈所失之銀錢數目相符即行給還當時願謝固辭不受問其姓名不答而去細訪至今始知是孝邑南窰村生員梁璂烈實感激難安登門酬謝堅辭不受驚聞鄰里似此善人不可多得特此報明等情詳報到臣又於十二月二十日據蒲州府永濟縣詳稱本邑小李村民崔效林務農力作雍正六年十月十四日於任家莊東首道上拾得布包一箇內係金珠首飾即於次早默坐於任良田店門首守候及失物之人奔至尋覓效林細問件數式樣俱符隨將原物交還十九日失物人高世津送食物四盒銀四兩來謝效林堅不肯受據鄰佑鄉約公報到縣具詳到臣臣查拾金不昧自古云難今生員梁璂見利思義毫不苟取且不道姓名不受酬謝無忝士林至崔效林乃一介鄉民路拾金珠悉還失主堅辭酬謝靡有望報之心尤為閭閻難得之美行此皆我皇上化神德盛致士民革薄從忠咸相摩以義是以秉懿之好觀感而興起者遂頻聞而疊見也除一面給發花紅匾額行令各該縣嘉奬外事關風化臣不敢壅於上聞謹奏該部議奏雍正七年二月初八日山西巡撫臣石麟謹奏為請旨事竊照晉省前奉發炮車一百輛并侍衛沙亮等前來教導兵丁演習逮後兵丁學習純熟經臣奏聞在案兹準大同鎮臣張善札稱前在陜省所演炮車上有小旗一桿虎頭遮牌一面下有遮擋一條今所演之車上少此三件殊覺未齊恐一有行走臨時製造難免愴惶應行添製并齎旗牌等式樣到臣其遮牌係用單張牛皮上畫虎頭遮擋係用氊裏布面復準提臣袁立相扎稱接大同鎮之札車上少此三件似應共為製僃等語臣查奉發之車原無此小旗遮牌遮擋等項似屬僃用之物今應否即為添製臣未敢擅便謹繕摺奏聞伏祈睿鑒訓示遵行謹奏旗牌等三件京中所造車輛皆有因操演之時非比臨陳可以不用所以未經發來不必再為添製同日又奏為欽奉上諭事雍正六年八月十二日準戶部咨開雍正六年七月二十六日內閣交出奉上諭前因山東參革知縣朱成元令家人叩閽一案朕命學士繆沅前往審理據繆沅將朱成元蒲臺縣任內餽送巡撫布按各官規禮印簿查出陳奏朕一一閲看知係朱成元任內二十餘年餽送上司之陋規而雍正元年以後仍復餽送如故已交部嚴察議奏自朕即位以來嚴飭官方禁止私賄又恐督撫等官用度不敷暗中巧取是以給與養廉之項俾其公私有賴俯仰從容庶可永杜苞苴以為澄清吏治之本蓋上司既受屬員之餽遺又何以禁止屬員之貪墨甚至以餽遺之多寡分情誼之厚薄則屬員之優劣何由辨别而吏治尚可問乎故不能禁止餽遺必不能秉公察吏不能秉公察吏必不能有益於政治民生此相因之勢一定之理也各省督撫養廉之項皆經奏聞奉旨者司道等官亦皆於公用內支給其無公項可支之員亦應於督撫前陳明準其收受何項以為用度焉有朝廷既給養廉而仍收屬員陋規之理今觀山東巡撫司道等官之私收陋規如故則他省或有似此欺隱私受者亦未可知著各省督撫一一嚴查據實陳奏在地方官薪水之資自不可缺但於屬員之手接受禮莭陋規斷乎不可目今各省內或有尚未分給養廉之員著各督撫悉心商酌一面辦理一面奏聞寧可以州縣應出之項解至藩庫從公發給而不可使其自相授受廢公義而徇私交留禮儀交際之名而長貪婪賄賂之弊也倘再有私收規禮將該員置之重典其該管之督撫亦從重治罪欽此等因轉行到臣臣欽遵上諭隨細加嚴查并通飭各司道府廳州縣將自雍正元年以後有無餽送上司陋規并有無收受屬員規禮各據實開報不得隱飾瞻徇去後隨據吉州蒲縣知縣蕭藻開報該州知州李琠之母生辰曾餽送杯縀等項壽禮李琠收受等情臣當於互揭案內題參在案其餘除升遷他省事故回籍者無憑查察現任晉省者俱覆稱並無餽送上司陋規及收受屬員規禮各出具不敢隱捏印結前來又據按察使蔣泂詳稱遵查泂自雍正三年四月十二日抵山西臬司之任迄今並無收受屬員莭禮陋規亦無餽送上司規禮之處但查雍正三年前院伊都立四十正壽曾公送過壽屏杯幣一次雍正四年伊都立之母六十正壽亦曽送過壽屏杯幣一次俱係原任布政司高成齡僃辦泂及糧驛道胡瀛鴈平道謝王寵河東道潘𢎞裔列名公送此係因正壽致祝並非餽送規禮今蒙行查據實詳覆等因到臣臣查晉省各員雖據覆稱並無餽送陋規及收受規禮具結在案臣仍時加嚴查嗣後一有發覺違犯即行參究不敢容隱再查晉省自巡撫以至州縣皆蒙聖恩於雍正元年起議定賞給養廉並無未給養廉之員臣謹據實陳奏伏候睿鑒謹奏覽奏知道了據開壽屏等項不過些少酬酢儀文偶然之舉乃人情物理中事非年規節禮可比也雍正七年二月二十九日山西巡撫臣石麟謹奏為欽奉上諭事雍正七年二月二十九日準吏部咨開雍正七年二月二十三日奉上諭聞二月初五日夜山西蒲州城內道府城守文武衙門三處同日被盜明火執杖劫去衣物等項此事朕已聞知而巡撫提督兩司何以遲延尚未奏聞山西地方盜竊之事甚多今以地方大員衙署尚且被劫則民間可知矣巡撫提督等所司何事而疏縱廢弛至於如此著巡撫提督等轉飭屬員將蒲州盜犯嚴行緝捕務令全獲倘少有隱飾逾限不獲定將巡撫提督等一併嚴加議處欽此等因到臣臣跪讀之下不禁悚惶戰栗之至竊臣仰蒙皇上天恩畀以封疆重任不能緝盜安民竟至衙署被賊接續頻聞是臣既不能消弭於未然何敢復隱飾於事後但前據各屬報稱俱係竊賊續據霍州報稱協同蒲州府永濟縣差人拏獲李添才等成羣結隊騎馬乘騾假扮客商贓物纍纍等情到臣臣查此案夥賊情形似非鼠竊之流或地方官從前諱強為竊亦未可定隨飛飭蒲州府永濟縣嚴審強竊實情夥盜確數姓名行劫過處所并查此外有無隱諱之處務期全獲以靖地方俟詳報到日方行具奏以致有稽時日兹欽奉上諭訓飭臣實無地自容遲延疏忽之咎實所難辭伏懇聖主格外恩宥臣惟有黽勉竭力辦理以贖前愆謹此繕摺奏聞謹奏朕日前諭旨係由部頒發應汝等會疏題覆之事何乃具摺奏聞耶雍正七年三月十一日山西巡撫臣石麟謹奏為奏聞事竊照晉省地畝半屬山岡土坡全資雨水及時且值春和正麥苗長發之際更藉滋培自入春以來雨水調勻土地滋潤兹據各屬報稱三月初一日又得雨雪三四寸至六七寸不等高原下隰靡不霑足萬姓歡騰此皆我皇上重農貴粟無刻不以民依為念是以感召庥和雨暘時若麥隴青蔥臣惟有益加勤勉共樂升平而已所有春間得過雨雪并麥秀緣由恭摺奏聞謹奏惟宜一秉公忠倍加誠敬以迓上天之錫佑切毋少涉高興恣肆時自省察可也雍正七年三月二十九日山西巡撫臣石麟謹奏為奏聞事竊照晉省春間得過雨雪日期經臣繕摺具奏兹據各屬報稱三月初十十一暨二十一二等日連得時雨四野霑足麥隴青蔥高粱雜粟俱各長發秋禾亦乘時播種野老農夫咸稱我皇上勤求上治時切民依故得此時雨普被百榖秀發等因到臣臣惟有益加誠敬公忠凛遵聖訓修身克己共慶升平樂利而已所有連得時雨緣由恭摺奏聞謹奏覽得雨情形深慰朕懷果能誠敬持躬時刻勿懈自蒙上蒼降鑒也雍正七年四月二十七日山西巡撫臣石麟謹奏為請旨事竊照晉省州縣於雍正二年間經前撫臣諾岷以太原平陽二府地方遼濶知府一官不能周歷稽查題請分設直隸州將附近之縣歸於州轄就近稽查經部臣議覆奉旨俞允遵行在案今臣查閲輿圖訪諸衆論所設直隸各州分隸管轄妥協者固多其中間有數處道里逺近不同形勢亦非聫絡者臣既查眀不敢以己定之制而遂苟且隱默也如分隸解州之垣曲縣距州治三百六十里相隔崇山峻嶺公文往來繞道傳遞呼應不靈惟與絳州相距一百九十里似應歸於絳州管轄又如平陽府屬之聞喜縣距府二百一十里絳縣距府一百八十里道里雖非甚逺但中間為絳州所屬之太平襄陵二縣地方隔斷形勢逈異查聞喜縣距絳州僅七十里絳縣距絳州僅一百里且界址相連此二縣似應歸於絳州管轄至絳州所屬之太平縣距平陽府僅九十里襄陵縣距平陽府僅三十里此二縣似應歸於平陽府管轄如此一轉移間則府州與所屬之縣俱各方隅聫絡道里適均凡稽查倉庫錢糧審解詞訟案件更為便易而於吏治民生均有裨益矣臣為地方起見謹抒末議是否可行伏乞聖眀訓示以便具題為此繕摺請旨謹奏據奏以垣曲等三縣歸於絳州管轄太平等二縣歸於平陽府管轄似屬有理但汝之識見朕信不及如何批諭是否同日又奏為奏聞事竊照晉省車騎兵丁二千名接準部咨調取定於五月二十五日以前到京并令各帶綿甲前往等因臣隨移行提鎮并各營一體遵照但查撫標二營提標各營止有鐵盔甲向無綿甲綿壯帽大同鎮標三營有綿甲七百九十副而無綿壯帽臣準提鎮二臣咨會製造隨於司庫耗羡公項銀兩動支分給各照調用車兵之數製造綿甲綿壯帽今已一色完僃至兵丁每名蒙皇恩賞給銀二十兩又準給製辦行裝銀六兩并令雇給騾匹馱載行裝至京臣準部咨俱即動銀給發并雇就騾匹分給其領兵官員至京路費先準部咨令於公項銀內量行給發臣酌議參將給銀三十兩守僃二十兩千把總十五兩動銀給領又欽奉諭旨總兵副將參遊守僃等員各賞二年俸銀千把等員各賞給二年俸薪銀兩即動用藩庫銀兩賞給欽此欽遵隨即動銀按數給領至兵丁及官員跟役進京一路口糧接準部咨令於公項銀內一體量給亦經查照動給俱一一辦理妥當隨準提臣袁立相咨會提標各營車兵一千名撫標車兵二百名酌分三起赴京定於四月二十二十一五月初二等日按次起行大同鎮標各營車兵八百名準鎮臣張善咨會分作三起赴京定於五月初六初七初八等日起行除領兵各官職名并動用過各銀兩數目現在核實造册分别題咨送部查銷外合將晉省辦理軍務及官兵分起起行日期臣謹恭摺奏聞謹奏軍需事務前經諭爾與田文鏡處畫一而行第當遵旨照依豫省辦理己耳何須瑣瑣煩瀆且又不聲説曾與田文鏡商明異同與否朕殊不解汝意何居雍正七年五月初六日山西巡撫臣石麟謹奏為奏聞事竊照晉省自入夏以來雖得微雨未獲普足兹於四月二十七日申時起至二十八日寅時止省城得雨三寸餘據各屬陸續報稱亦於是日夜各得雨二三四五六寸不等四野均霑又於五月初四初五兩日省城得雨四寸夫麥苗當此吐花秀發之候連得膏雨普被田疇萬姓歡騰咸頌我皇上念切民依感召庥和之所致也所有連得時雨情由理合恭摺奏聞謹奏覽奏實慰朕懷更宜加勉感召天和之道毋容稍怠雖據奏稱萬姓歡騰直待秋成後朕方敢釋懷也雍正七年七月初八日山西巡撫臣石麟謹奏為奏聞事竊照晉省各屬二麥收成分數臣正檄飭各屬確查申報間於雍正七年六月二十三日接大學士公馬爾賽等字開欽奉上諭向來各省督撫奏報年歲收成皆云幾分至幾分不等似此未曾分晰清楚未免朦混嗣後可細加分别一府之中如九分者居十之幾八分者居十之幾照此類推據實奏報則朕可以詳悉收成之分數爾等可寄信與各省督撫知之欽此欽遵仰見我皇上重農貴粟誠求民依之至意兹據各府州將該屬二麥收成分數分别申報前來自六分起至十分不等臣欽遵諭旨細加查核各府州所轄之州縣多寡不同今按其各屬所報分數據實另繕清摺恭呈御覽外理合奏聞謹奏覽所開收成分數單􅤾澤州聞得雨甚屬調勻何乃收成不及他州縣代州於五月初間少覺缺雨何以收成分數更勝别屬大約總據該府州任意開報即行鈔録奏聞並未留心一加訪問也同日又奏為奏聞事雍正七年六月十八日接怡親王大學士公馬爾賽等字開山西巡撫即密行緝訪將其人解送來京不過質問明白便行釋放之人不可拘禁然亦不可疏縱此係奉旨事理巡撫務須祕密或其人出遊於外將現往何處查訪得實即飛信相聞又單開黨琮河東人曽作鄂林忒幕賔後在西寧住候選守僃在允禵軍中效力官員內行走過曾隨允禵入京等因臣隨密差標員飛往河東地方緝訪於六月二十八日在平陽府臨汾縣城外東關緝獲黨琮七月初五日解至省城臣隨面詢據其所供與來單所開無異臣即差把總二員帶領兵丁六名一路小心護解於七月初六日自山西省城起解赴京外理合繕摺奏聞謹奏未經逾時其人即已緝獲殊屬可嘉雍正七年九月二十日山西巡撫臣石麟謹奏為恭報盛世豐年收成分數事竊照晉省地方今歲雨水甚屬調勻田禾俱各茂盛兹當百榖咸登之候行據各屬開報收成分數東西南北高原下隰無不豐收而陽曲縣清源縣鳯臺縣俱十分有餘收成至山僻州縣鹹鹵沙坡之處亦有七八九分收成不等其霍州五臺縣藉田民田之內産有三穗四穗五穗及尺餘之嘉禾各等情到臣臣逐一留心細加查訪俱確實無異白叟黃童咸歌帝德臣與闔屬官民欣逢盛世快覩豐盈惟有仰遵聖訓益加恪謹敬承耕藉之典禮并復勸諭百姓崇莭儉裕積蓄以永享升平之樂利於無已耳臣謹按各屬所報分數欽遵諭旨分别開明據實另繕清摺恭呈御覽外理合奏聞謹奏覽奏實慰朕懷此皆汝地方大吏克盡公誠方能上感天和致兹豐稔當愈加敬畏勤慎從事絲毫毋得肆志雍正七年十一月初七日山西巡撫臣石麟謹奏為恭謝天恩事雍正七年十一月初三日齎摺把總回晉恭捧到皇上賞賜哈密瓜一箇臣隨跪迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣一介庸愚荷蒙聖恩畀以撫晉重任寸長未效乃蒙殊恩異數疊沛頻施有加無已臣感激難名愈深惶悚惟有朝夕黽勉殫竭駑駘以冀仰報高厚於萬一耳理合繕摺恭謝天恩謹奏覽奏謝知道了操守為居官之根夲本立則道自生上天之所棄取惟在於公私而已然公私二字須要辨眀乃心國家即為公乃心利己即為私如為身家禍福計心一涉私縱行善事亦恐不能仰邀上天之眷佑何況非善乎苟不貪利沽名復不作威作福一派公忠致身於國將見無為不遂無往不昌也試行看鄂爾泰田文鏡等無他竒異技術不過於根本上見得透立得定耳可不勉哉將此諭亦令蔣泂知之同日又奏為皇恩愛民深切民情效力急公恭摺奏聞事竊臣於雍正七年九月十一日接準部咨令晉省製造駝屉繩氊等項三萬副務於十一月內辦齊派官運送於次年正月二十日以前送至二十一臺處交收其辦屉及腳價俱作正開銷並奉旨敕臣將需用錢糧據實造報作正開銷毋令承辦官員分毫賠纍倘有限於部定之價不敷採辦者於存公銀內動支銷算務將屉繩等項皆極堅固緊厚依限解送欽此欽遵臣即酌議行令通省州縣分辦庶易為力而速於齊全一面即動司庫銀兩給發採買毛麻上緊製造不許絲毫派纍里民務期堅固緊厚其自夲地運至歸化城之腳價據布政使蔣泂亦動司庫銀兩預行給發至由歸化城解送二十一臺已遴委河東道潘𢎞裔為總領委平陽潞安汾州寧武等府四同知為分運先行齎銀赴歸化城雇覓車駝以便依限解送各在案兹各州縣俱竭力製造繩屉已漸次造完現在陸續報解間據太平潞汾大朔寧蒲澤九府遼沁平欣代保解絳吉隰十州等詳稱據各紳襟士民人等呈稱伊等生逢聖世屢荷皇恩浩蕩難名僃辦軍需毫無差纍今聞繩屉告竣值此農隙之際情願自備車輛騾隻各從夲地運至歸化城交收稍申報效之忱等情紛紛詳報到臣又有衆士民赴臣衙門具呈籲請者臣伏思皇上愛養元元有加無已晉省連歲豐收尚蒙特恩免賦則此運送繩屉於歸化城腳價已經動給且關緊急軍需自應仍令地方官給價雇送無須士民領運是以宣布皇仁再三慰止所有輿情感戴歡躍之忱臣不敢壅於上聞謹奉據奏民情踴躍報效朕嘉悅覽之此皆汝等大員平日化導有方臨時辦理得法始有感激輸誠之效悉能如是汝等身居其地顔面豈不增色乎可見果能公誠未有不感動之事睹此當愈加畏慎毋少肆志否則前功盡棄恐倍獲罪於天也勉之勉之總之絲毫不可涉於高興但一秉至公不計前程利鈍徑直行去試看何如此諭亦與蔣泂看同日又奏為奏聞事竊照晉省於九月二十二日戌時下雪起至二十三日卯時止得雪一寸有餘又於十月初六日得雪寸餘臣隨行據各府州陸續報稱所屬地方於九月二十二三兩日各得雪二三四五寸不等又於十月初五六兩日各得雪二三四寸不等查麥苗在地欣逢瑞雪滋培大有禆益萬姓歡呼咸稱嘉瑞所有晉省得雪日期理合恭摺奏聞謹奏山陜地方冬雪甚為緊要據奏該省得雪分寸尚覺不足竭誠祈禱可也近京於十月十一日得盈尺之雪後又連得一兩寸之雪數次但地方不廣自保定以南即不過二寸許耳同日又奏為請旨事竊照晉省蒙皇上特諭蠲免庚戌年地丁銀四十萬兩臣接準部咨敬奉上諭遍行宣布隨據通省紳士軍民人等歡欣感戴呈請代題恭謝天恩在案惟查大同朔平二府原額地畝銀錢內有因右衛駐防官兵於康熙三十三年及四十九年議將額徵銀錢改徵米豆草束支放官兵至康熙五十一年欽奉恩旨蠲免本年錢糧并歷年舊欠前項夲色糧草經前撫臣蘇克濟及左都御史臣趙申喬先後題請一例免徵部議欽奉上諭內並無蠲免米豆草束將所題俱毋庸議等因奉聖祖仁皇帝特旨準豫蠲免欽遵在案今前項米豆草束內於雍正元二年又題定將旗兵留支餧養馬匹之豆草折價支給於是大同府屬原改徵夲色豆草今仍舊折徵銀三萬八千二十七兩零外尚存改徵本色米三萬一千七百二十三石零計合原額銀三萬六千四百八十一兩零尚存夲色豆八千四百三十八石零計合原額銀八千一百八十五兩零朔平府屬原改徵夲色豆草今仍舊折徵銀一萬七百七十四兩零外尚存改徵夲色米七千六百八十六石零計合原額銀八千八百三十九兩零尚存改徵本色豆二千四百二十石零計合原額銀二千三百四十八兩零以上大朔二府復徵改徵二項計通共銀一十萬四千六百五十四兩零但查此改徵夲色并復徵折色原均係額徵地畝銀兩今似應一體邀恩并入應蠲四十萬兩數內與通省地丁核算約共合每兩應蠲免銀一錢三分三釐零而駐防旗兵應支糧餉除蠲免外不敷之米有原任同知鄂齊理賠補之米可以撥抵其豆原有長餘仍足敷支放之數俾邊方羣黎無一夫不均沾聖澤闔省編氓無一處不感沐皇仁矣為此具摺恭請聖訓如蒙俞允臣另繕疏具題謹奏自應如是辦理亦不必另行繕疏請旨照此辦理完竣後將緣由題眀可也雍正七年十一月十七日山西巡撫臣石麟謹奏為民情效力踴躍再三慰諭不止恭摺奏聞事竊照晉省各屬士民情願將奉旨動用正項錢糧製造之駱駝繩屉三萬副各從夲地自僃車騾運送至歸化城交收踴躍報效等情經臣據詳一面恭摺奏聞一面令各屬宣布皇仁再三慰止去後數日以來復據各屬報稱遵即轉諭乃各士民咸稱聖主宵旰勤民至誠昭格連登豐稔復蒙恩膏減免錢糧朝廷愛民直如赤子安享升平無以為報此項運送繩屉必效犬馬之勞各州縣將腳價雇覓車騾而士民或挽車而來或拉騾而至擊轂駢肩一時雲集爭先背負裝載恐遲各州縣即將所發腳價照數散給而士民皆感激涕零不肯領取各州縣止之不能強之不可只得差丁役同其起程運送等情紛紛申報到臣似此民情急公效力既肫且切實為曠古之所稀聞此皆聖德皇恩之及於民者淪肌浹髓以致士民之踴躍辦公爭先報效者俱出一片忠誠之心實欲止之而不能也臣目覩輿情惟深欣慶除現繕疏具題外謹再恭摺奏聞謹奏覽奏深為嘉悅具題到日有旨新補大同總兵徐起鳯前於參將任內來京引見時朕未經著意看驗昨據田文鏡舉為一等且因其歷俸已深所以擢用今職及伊面請訓旨審觀其人聽其奏對甚覺庸愚恐不勝此要任爾其留心察訪的確據實秉公密奏以聞硃批諭旨卷二百十七之二欽定四庫全書硃批諭旨卷二百十七之三硃批石麟奏摺雍正七年十一月二十七日山西巡撫臣石麟謹奏為聖德光天雲日獻瑞事雍正七年十一月二十六日據布政使蔣泂詳據直隸保德州知州王清詳稱卑職於本年十一月初二日辰時督率州民正在辦理駝屉之頃忽覩卿雲捧日外繞三環光華四射藻彩繽紛自辰至午照耀三時萬民咸相慶幸又據河曲縣知縣張球興縣知縣程雲先後各詳報本年十一月初二日自辰至午卿雲捧日外繞三環實為聖世祥符據此理合一併具文申報等情到司轉詳前來并據保德州知州王清具詳徑報到臣臣接閲之際曷勝歡忭此實我皇上至誠昭格厚澤覃敷物阜民安率土皆歌樂育禮陶樂淑萬方共被生成是以上天眷佑和氣致祥當軍需辦理之時顯雲日輝煌之瑞光華四射士庶咸觀愈徴聖德之光昭佇見王師之克捷實千載一時之盛事太平萬世之庥徴臣惟益深敬惕共迓天庥除另恭疏題賀外謹先繕摺奏聞謹奏蒙上蒼垂示祥符如是顯著我君臣惟有愈勵敬誠以仰答天心更黽勉父母斯民之責耳同日又奏為奏聞事竊照晉省從前得雪分寸經臣繕摺奏聞仰蒙睿鑒兹省城於十一月十九日得雪三寸有餘又於二十二三兩日得雪三寸有餘又據各府州陸續報稱所屬地方於十一月十一十五兩日各得雪二三四五寸不等於十八十九兩日各得雪三四寸不等於二十二三兩日各得雪三四寸不等臣查各屬得雪雖係數寸但間日屢降凝聚在地麥苗深得滋培之益現在咸有霑足之慶萬姓歡呼羣頌聖澤所有晉省十一月內連次得雪日期理合恭摺奏聞謹奏覽奏得雪數寸雖云間日屢降仍恐未必霑足也同日又奏為奏聞事竊照各省督標撫標提標兵丁等欽奉上諭動支司庫銀兩酌定數目交與各該督撫提督委員料理營運生息如遇兵丁家有吉凶之事將息銀酌量賞給以濟其用本銀永逺存公生息不必繳還其營運利息之處亦必公平辦理不得指稱官銀名色或占奪百姓行業或重利刻剝閭閻與商賈小民爭利擾纍地方欽此又欽奉上諭出征緑旗兵丁家中遇有吉凶之事著照京城驍騎之例吉禮賞銀六兩喪禮賞銀十二兩凡此賞給銀兩其有巳經賞銀資生利息之處即於利息內支給其未曾賞銀及雖賞銀而尚無利息可支之處著動正項錢糧支給欽此臣俱欽遵在案并準部咨山西撫標兵丁擬賞給銀四千兩等因臣伏思此項銀兩乃皇上惠濟兵丁之特恩其營運生息自應籌畫妥協俾行之永逺而無虧缺方為盡善查晉省太原城內商鋪頗多伊等挾本開張歷有年所素諳經營伊等有情願將此項銀兩領去作本者按數分給令其代為營運生息照伊等鋪內原得之利減少交納公平辦理則於公事有濟亦於彼有益當檄行太原府曉諭去後隨據省城當商葉蓁等一十二户願領此銀營運每兩每月願出息銀一分二釐共息銀四十八兩俱按月交收府庫等情臣隨取具領結將銀發領并即委太原府料理收放之事計自七月起至十一月共收息銀二百八十八兩除支給過出征兵丁家屬三名喪費銀三十六兩外現存息銀二百五十二兩從此源源生息而兵丁永沐皇恩於無既矣所有辦理緣由臣謹具摺奏聞謹奏據奏發交商鋪代為生息甚好若無勒令強從情故斯乃極妙之舉同日又奏為聖主訓誨無巳微臣感激難名恭謝天恩事竊臣齎摺把總回晉捧到硃批摺子內有臣奏謝皇上賞賜哈密瓜一摺并臣奏聞晉省製造駝屉漸次告竣士民願捐車騾運送一摺俱奉有硃批臣仰瞻諭旨如覲天顔跪讀之後遵旨傳布政使蔣泂到署臣恭捧諭旨令蔣泂跪閲訖伏念臣一介庸愚仰蒙聖恩簡畀晉撫重任受事以來每多過愆皆荷寬宥矜全疊頒訓誨俾得遵循臣受天恩逾於常格之外感激之忱實難名言惟有公誠自勉亷隅自勵庶立身有本稍冀仰答髙深臣時凜此心矢守不易是以夙夜兢兢第知有國而不知有家知有君而不知有身也況臣係微末窮員荷皇上殊恩不次擢用職任封疆寵榮巳極每年又蒙賞賜養亷銀三萬餘兩一切用度綽然有餘若於此外再有貪得不肖之心稍萌苟且肆妄之志不但有干國憲亦必難逃天譴兹荷聖主訓導朂勉臣跪讀之下不禁感極涕零敬謹繕録朝夕虔誦益加黽勉殫誠竭力克修致身事君之道仰報隆恩於萬一耳理合繕摺恭謝天恩謹奏睹兹晉省天意民情如是朕便欲譴責於爾而亦有所不能也勉之仍遵前諭毋稍肆志自滿朕嘗訓誨內外大小臣工不但庸流之毁譽不足以為榮辱即朕一時之喜怒亦不必遽動欣戚之念但以方寸對越神明時時凜懼鑒察是乃立身行巳之根本趨利避害之良方捨此而分外馳逐皆屬本末倒置試看小民踴躍急公甫及二旬即蒙上天昭示景象如是捷速可不興感起畏乎益當加勉勿怠雍正七年十二月十一日山西巡撫臣石麟謹奏為聖德之格被靡涯上天之嘉應疊見事雍正七年十二月初十日據布按二司會詳據蒲州府臨晉縣胡南藩報稱為慶雲呈瑞事十二月初一日臨晉縣自午時起見祥雲歷未申酉時回繞麗日擁護而西但見其雲五色繽紛霞光萬道疊秀爭華呈輝耀彩卑職仰瞻多時正慶慶雲獲見旋據闔邑紳士軍民羣集縣庭歡呼鼓舞以手加額咸稱聖世嘉徴合之卑職所見相符等情會詳前來并據該縣胡南藩徑報到臣臣接閲之際曷勝歡忭欣慶伏查晉省兩月之內嘉祥疊見此皆我皇上至德光天仁恩匝地惟太和之氣翔洽於閭閻斯休徴之應屢著於雲日臨晉素稱疲悍之區年來感沐皇仁咸知遵法急公查自康熙五十六年至雍正六年共積欠錢糧一十六萬餘兩今一載以來巳清完一十三萬餘兩本年錢糧巳完至八分有奇即此民風之丕變實由皇仁之淪浹而天人之感應益徴其捷如影響也除另恭疏題賀外謹先繕摺奏聞謹奏據奏臨晉慶雲捧日不禁以手加額覽焉因蔣泂之奏先到已僃悉批諭於伊摺內可取觀之雍正八年正月初十日山西巡撫臣石麟謹奏為奏聞事竊照晉省雍正七年入冬以後節次得雪日期俱經臣繕摺奏報嗣於十二月二十六七八等日省城得雪四寸有餘又據各屬陸續報稱各得雪二三四五寸不等麥苗在地連得瑞雪滋培且新年以來風和日暖積雪消融土脈滋潤更見青蔥茂發此皆我皇上愛養元元至誠感格所致是以連得瑞雪普利田疇臣惟與闔屬官民額手歡呼共慶升平而巳所有得雪日期理合恭摺奏聞謹奏覽嵗內得雪新春和暖情形朕深為欣悅都中亦於此三日得雪霑足今於十六日又蒙上天賜雪三寸有餘大率直隸各省俱於去冬均沐天恩矣惟雲貴閩粵尚未據奏到雍正八年正月二十六日山西巡撫臣石麟謹奏為奏聞事竊照晉省於雍正八年正月十六日辰時起至亥時止省城得雪一尺三四寸又據各屬報稱各得雪自四五寸至一尺及一尺有餘不等臣思麥苗在地去冬連得瑞雪滋培今復得雪一尺有餘且風和日暖消融入土將見麥隴青蔥更加茂盛矣所有得雪緣由恭摺奏聞謹奏此真祥瑞也欣悅覽焉雍正八年二月十二日山西巡撫臣石麟謹奏為欽奉上諭事竊臣據布政使蔣泂恭捧硃批諭旨一道並廣東督臣郝玉麟奏摺一件到臣署隨敬謹跪讀欽奉諭旨觀近日晉省百姓情形便有此等匪類亦不能搖惑萬一但既有此論汝等可密諭屬員各處留心訪緝將郝玉麟奏摺一併發來與汝同石麟密觀料理毋得聲張極加慎密可也特諭欽此欽遵復密觀督臣郝玉麟奏摺內情由俱一一領悉臣查晉省連嵗豐登皇恩疊沛士民咸各尊君親上感激勉勵無不家安户樂共慶升平巳在聖明睿照之中第晉省之人經營於四方者居多恐往來粵省及粵省流寓晉地之民或有被其煽誘相通聲氣者自宜急為訪緝臣當即遵旨密諭各屬員於四境內細加密訪查拏不得聲張泄漏亦不得滋擾良民通行密諭在案臣復密令人於各通衢要隘等處細行訪查務期消弭姦匪寧謐地方所有微臣欽奉諭旨現在辦理緣由理合先行奏聞謹奏從來匪類之為害生民甚於盜賊盜案命案有失主苦主為證尚易於追求至若匪類率皆暗地濳藏蹤迹詭祕全賴地方大員留心發擲方能消患於未然此輩各有耳目倘汝等法令嚴明訪緝細密自將回心斂迹斷不至聞聲附和羣聚多人何有如呂留良輩肆行無忌至數十年之久也此事不待粵省奏聞奉朕飭諭而後始加察究者嗣後當加意防範但有風聞立即嚴飭各屬訪拏務獲窮詰實情毋避生事之嫌甘為聾瞽而貽害於地方督撫中能察究匪類惟李衛為第一爾當倣效之將此諭亦令兩司知悉雍正八年三月十七日山西巡撫臣石麟謹奏為欽奉聖訓敬謹遵行恭摺叩謝天恩事竊臣標把總齎回臣奏聞查緝廣東匪類一摺奉有硃批臣跪讀諭旨如覲天顔隨遵旨傳布政使蔣泂按察使宋筠到署臣恭捧諭旨各令跪閲訖伏查禁戢姦匪理宜消弭於未然若悠忽容隱為害非淺今欽奉訓示周詳無微不燭臣當以此事時時留心并督率屬員各各嚴密謹慎勤加察訪但有風聞即當拏究不敢少懈於平時亦不敢寬縱於巳覺惟凜遵聖訓察究匪類消患未萌以仰副我皇上教誨生成之至意耳所有微臣遵奉感激之忱謹繕摺恭謝天恩謹奏當不時留心密行察訪毋致日久生懈勉之同日又奏為欽奉諭旨察訪奏聞事竊臣前奏晉省士民急公效力情願運送繩屉緣由摺內奉有硃批恐新補大同總兵徐起鳯不能勝任命臣留心察訪的確據實秉公密奏等因欽此欽遵臣察訪得鎮臣徐起鳯自雍正七年十一月到任至年底未見有所行為至本年正月初十日看兵之後即陸續考驗所轄各營大小官辨甄别舉劾俱從公道約束兵丁亦稱嚴肅至於辦事每於文移中見其亦明白老成緣大同距省六百餘里鎮臣徐起鳯到任以來因無公事相會臣尚未與之謀面兹留心細加察訪現在之措施如此若始終不懈實力整飭於邊方誠屬相宜臣謹遵旨察訪的確據實秉公奏聞伏乞皇上睿鑒謹奏若如所奏徐起鳯乃一好總兵於初到時能如此行為日久熟練自必更有可觀也同日又奏為奏聞事竊照晉省地方今春正月內得盈尺之雪經臣具摺奏聞兹省城於三月初五日十一日俱得雨二寸又據各屬節次報稱於三月初五初六初八十一等日各得雨三四五六寸不等農夫俱及時耕耘咸頌聖主念切民生是以膏雨應時而降得以盡力田畝莫不鼓舞歡呼等情前來臣查時當春耕得此雨澤不特麥苖興長即布種五穀亦皆滋潤而發生矣所有得雨緣由恭摺奏聞謹奏都中近日頗覺乾旱朕正晝夜憂心覽爾晉省雨澤之奏深為慰悅雖然須至秋成後方敢言其必然也但宜益加誠敬以俟之定蒙上天默錫嘉應勉之同日又奏為奏明雍正六年耗羡銀兩事竊照晉省耗羡銀兩歷年俱繕造黃册奏報在案兹據布政使蔣泂册造雍正六年分額徴耗羡銀三十七萬一千三百九十六兩零內巳完銀三十六萬五千四百六十兩零支給各官養廉并各項公費共開除銀二十九萬三千六百五十九兩零實在現貯司庫銀七萬一千八百一兩零民欠未完耗羡銀五千九百三十六兩零並將四柱總數各州縣巳未完數繕造黃册各一本詳請轉奏前來經臣逐一覆核相符謹將黃册恭呈御覽為此謹奏此種册籍朕亦何暇觀覽總在汝等秉公節慎辦理其中之是與非公與私何能逃衆論也雍正八年四月初八日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方三月二十四五兩日省城得雨三寸有餘二十七八兩日又得雨四寸有餘兹於四月初一日至初四日每日得雨四五六寸不等十分霑足又據各屬陸續報稱自三月二十四日起至四月初四日止各得雨七八九寸不等普遍霑足等情前來臣查晉省地方半屬髙岡土坡且時值孟夏通省連得膏雨入土滋培高原下隰無不周遍稻黍粟麥俱各青蔥鬱茂此皆我皇上至誠感召之所致臣正在繕摺具奏間於初七日又得雨六寸有餘所有連得時雨緣由恭摺奏聞謹奏自春以來晉省得雨優渥實慰朕懷以手加額覽之同日又奏為遵旨詳查辦理奏請睿裁事竊臣標齎摺把總回晉捧到硃批選拔貢生蕭澍條奏一摺欽奉硃批諭旨蕭澍條奏此二事當詳查辦理者欽此欽遵臣閲蕭澍條奏內稱鴈門關關門不全稽查不密請將鴈門巡檢移至廣武以嚴稽查廣武守僃移駐鴈門以扼要路並將關門修補一事臣遵旨詳查并行布按二司暨鴈平道會同查明議詳去後兹據司道等會呈據代州詳稱遵查鴈門關城有南北二門其北門現有二扇該巡檢早啓夜閉惟南門原毁一扇今巳將南門製造北門加修俱堅固完僃并飭巡檢乘時啓閉加謹稽查至守僃巡檢移駐之處查廣武南至鴈門計二十里兩山盤谷中間僅有溪河山路一條並無别徑可通欲進鴈門舍廣武隘口無由而上是廣武地方實為鴈門之咽喉地處扼要且坐落平坦舊有堡城居民稠密而關北各屯俱設有分防營汛今守僃駐防廣武在雲朔既可控制而鴈門亦有屏藩若移駐鴈門則去廣武窵逺關後各屯巡檢微員非惟不能彈壓且鴈門高處山岡彈丸之地既無建蓋營署之所而居民寥寥水草無多亦難駐防兵馬則彼此移駐於關隘地方似屬俱無裨益等情泂等會查該州所議移駐未便之處似屬妥協但鴈門本屬要地今止有巡檢一員弓兵十五名及汛兵五名恐不敷稽查巡緝諸務似應添設外委把總一員再派撥兵五名庶足以資防守等因臣隨咨商大同鎮去後兹準鎮臣徐起鳯以司道所議誠屬妥協移覆到臣臣細加酌議似應亦如司道等公詳為是又蕭澍條奏內稱大同府大有倉所貯米石甚多若不出陳易新將來必有黴爛之虞請按數運赴朔平府抵兑右衛兵糧將大同府屬應解給右衛兵糧之新米歸倉還項一事臣遵旨詳查并行布政司大同府朔平管糧廳各查明議詳去後兹據布政司詳據署朔平同知詳稱右衛八旗官兵口糧每嵗所需米石向係大朔二府屬州縣解交常豐倉按月支給今欲以大同府屬州縣應解常豐倉新米路經郡城者即換兑大有倉陳米運交支給以新易舊雖似兩便但常豐倉亦尚有從前存貯之陳米六萬餘石因八旗官兵向來俱係支領新米若竟以陳米放給則必爭嫌較論惟在管糧者於收到各屬新米設法籌畫將陳米配搭放給官兵帖服無辭除經搭放並雍正六七兩年出糶外今本倉尚有歷存陳米豌豆黑豆緣無項動撥而積貯現多仍宜一面漸次搭放一面呈請題明照常平倉出陳易新之例每年夏糶秋還實為妥便至常豐倉現有陳米自毋庸又換大有倉之陳米也等情隨又行據大同府詳稱大有倉存貯米石換兌右衛兵糧之處既不便舉行但倉貯陳米共十二萬九千餘石上年具詳咨部請糶嗣奉部允時已八月秋成在望糶賣無幾今仍請題明每年於青黃不接之時減價平糶儘糶儘買不數年間則皆可易新矣各等情前來臣細加酌議似應照朔平同知及大同府所詳為是以上二事臣就地方情形逐細詳查如此辦理庶為妥協但臣材識短淺是否有當伏乞聖明訓示臣另具題所有詳查緣由理合恭摺奏覆請旨謹奏所奏是汝斟酌允妥後徑行具疏題請辦理不必援引前奏雍正八年四月二十四日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方連得時雨緣由臣俱恭摺奏聞兹省城於四月二十至二十一日膏雨綿密又得一尺有餘又據各屬陸續報稱於四月十二十七十八二十二十一等日各得雨六七八寸不等四野霑足并稱隴麥長發髙二三尺不等現在吐花出穗十分茂盛萬民歡呼咸頌皇仁等情到臣臣惟凜遵聖訓益深誠敬并與闔屬官民額手慶頌靡已所有得雨尺餘及夏麥長發情形謹繕摺奏聞恭慰聖懷謹奏以手加額覽之朕實深為汝慶幸也京都於月之二十五日甘霖透足是日雨意甚廣西望雲色濃郁想爾晉省自必又沐霑潤矣雍正八年五月十三日山西巡撫臣石麟謹奏為聖化感孚遐邇邉民重義還金恭摺奏聞事竊臣據布政司詳據朔平府左雲縣申稱據縣屬助馬堡鄉約張廣基報稱緣由本堡民人趙亨清於本年三月十二日路有堡洞拾起銀子一包不知兩數見有字封知係餉銀隨赴守僃衙門首明交訖理合稟報據此卑職正在詳報間又準助馬路守僃移據外委千總劉開震稟稱三月十二日據本營馬兵劉朝選於本日支關春季三箇月餉銀九兩一錢九分零忽因馬驚將銀遺失回家方知隨從原路找尋間忽有本堡民人趙亨清手持餉銀一封向開震説係伊在堡門洞裏拾著此銀見封皮上有字知是兵丁餉銀正要到衙門給還本主開震接過餉銀見係原封未動理合稟明等語據此隨喚趙亨清劉朝選細問朝選認係原關餉銀又云趙亨清拾去理應亨清使用據趙亨清稱還人遺物乃是常事分毫不要等因移會到縣擬合詳報由府轉申到司相應轉報等情又準大同鎮臣徐起鳯移咨到臣伏思我皇上仁恩廣被教化咸孚久巳俗美風醇拾金不昧所在多有顧以邊徼窮黎而知慕義興亷益見聖化之隆靡逺弗屆也除一面給發花紅扁額行令該縣嘉奬外事關風化臣不敢壅於上聞為此謹奏據奏朔平民人拾金不昧知道了候另有旨諭部雍正八年六月二十八日山西巡撫臣石麟謹奏為恭報二麥豐收事竊照晉省二麥收成分數臣留心細加訪問并據各府州縣開報前來查得山西共一百六州縣而十分收成者八十一州縣九分收成者十五州縣八分收成者十州縣詢之野老農夫僉稱今嵗雨水調勻二麥收成有向來豐年每畝收一石者今竟收至一石一二斗實為數十年之僅見莫不歡欣鼓舞咸頌皇仁臣謹按各屬所報分數欽遵諭旨分别開明據實另繕清摺恭呈御覽謹奏蔣泂奏摺先到隨經批諭并命伊將朕所批持與爾看矣兹不更諭雍正八年十月二十六日山西巡撫臣石麟謹奏為奏聞事竊照晉省於十月二十一日得雪二寸有餘又據各屬陸續報稱於十月十八二十一等日各得雪二三四五寸不等且有得雪至八寸暨一尺者查麥苗在地欣逢瑞雪滋培大有禆益萬姓歡呼咸稱嘉瑞所有晉省得雪日期理合恭摺奏聞謹奏覽得雪情形朕懷深慰雍正八年十一月初九日山西巡撫臣石麟布政使臣蔣泂謹奏為欽奉上諭事竊臣等接到大學士公馬爾賽等來字內開雍正八年八月二十五日奉上諭聞得山西武鄉縣知縣張憲齡年巳七旬目巳昏翳審事不能剖斷百姓有泥土地之謡壺關縣知縣許溥年逾七旬到任一載於地方事務全不經心因該縣距府二十里知縣應辦之事俱係知府王景望代為辦理祁縣知縣羅著藻在任五載怠惰廢弛有珠商被竊一事意欲朦混歸結且辦事糊塗用刑甚酷上年曾因私忿杖斃騾夫一人民有怨言陵川縣知縣髙永滋貪劣性成多方取利陵川一邑每年額稅四十餘兩髙令加至四百餘兩又陵川窮民挖山採鐵鍊打釘頭者從來無徴稅之例而髙令聽信蠧役婁起鳯等私索稅銀又錢糧火耗竟至加二以外士民含怨以上諸條係朕訪聞如此爾等可密寄信去詢問石麟蔣泂欽此字寄到臣等仰見我皇上眀目達聰察吏安民之至意臣等隨公同逐一確查又復細加密訪查武鄉縣知縣張憲齡實在現年五十四嵗精力尚健惟兩目有微翳係自幼發痘受傷所致名為風淚眼而目光仍是清眀其居官小心勤慎操守謹飭惟存心慈愛審事少欠風厲至事之曲直仍無所枉武鄉縣地僻事簡張憲齡辦事安靜尚屬人地相宜壺關縣知縣許溥年近六旬辦事遲鈍因係舉人出身尚堪課士業經援例題請改就教職在案祁縣知縣羅著藻在任五載辦事勤幹廉隅自勵洵堪驅策其珠商被竊一事緣平遙縣珠商孔竒相等赴祁邑趕赴廟集貨賣在縣民渠上疏鋪內住宿珠銀被竊具呈控縣尚未審結至杖斃騾夫一案緣羅著藻於署平遙縣任內家人羅祈昌與騾夫趙鼎鰲索銀口角羅祁昌稟知羅著藻隨拘喚到縣於雍正六年三月二十三日分别責警發放訖趙鼎鰲受責之後染患時證醫藥罔效於四月初一日身故彼時經汾州太原二府會審確情委係病死並非杖斃取有尸子醫生甘結在案陵川縣知縣高永滋徴收稅務盈餘一案查該縣額解商畜二稅歷來俱係牙行包納起解其中盈餘俱被牙儈襟棍侵肥自髙永滋到任後將稅銀改為官收按則儘收儘解雍正七年分除完解正稅外共解盈餘銀一百六十九兩零造入奏銷在案牙儈無從染指遂造流言散布究於商民實無剝削至鐵行向有牙稅惟陵邑鐵釘鋪户十二家從前原不徴稅髙永滋初次清查曾令照熟鐵例認稅旋因各家俱係打釘之鋪即行停止臣等密諭澤州府弔取該縣收簿卷宗細加察核高永滋實無私行多收入己情弊再查錢糧火耗一項該縣收耗實止加一三之數祗緣花户完糧每用市銀合市戥上匱及傾銷足色扣凖庫平俱算入耗內致有加二之傳説但查髙永滋雖無貪婪實迹其居官平常辦理事務未甚洽於民心因其為人尚屬小心屢經訓飭冀其勉勵後效以上四員事款欽奉上諭詢問臣等逐一細加訪察其實情蓋如此不敢稍為容隱謹據實公同繕摺覆奏伏候睿鑒謹奏知道了平時於屬員既不能勤訪察嚴懲勸逮朕親有聞見指名詢及若又不秉公據實奏覆而涉於遮掩文飾則大不可也雍正八年十二月二十日山西巡撫臣石麟謹奏為奏聞事竊臣據寧武縣詳稱十二月十六日據本城店家曹珍報稱午刻有一行十一人到店投宿稱係內務府蘇奉密旨辦理機密事件等情到縣又奉府飭查隨親詣店內問據戴水晶頂人稱姓蘇名致隆係介休縣人在京范育馪處辦事我是蒙皇上欽賜的五品頂帶在內務府管稅司行走奉十七王爺轉奉內諭往陜西辦機密事去及訊其有無執照所辦何事則稱我們替皇上辦事從無執照我是採買軍需駱駝的再訊其寧武非往陜西大路至跟隨之人是否同伴又稱要往永寧州送信與范育馪之親家于姓跟隨之人內張保張弼是家人從京跟出來的其餘髙瓚等七人是太原汾州等處人在朔州遇見要回家去的有余海川是朔州雇來引路的還未到等語行蹤詭祕言語支離未敢輕縱除看守外擬合通報等情前來臣據報除行按察司飭令嚴加看守并一面移咨內務府查覆外理合繕摺奏聞謹奏此事明係光棍詐冒無疑嚴拏究擬具奏以聞雍正九年正月初十日山西巡撫臣石麟謹奏為欽奉上諭事竊臣前奏蘇致隆等蹤迹可疑一摺齎摺人回奉有硃批諭旨同日又接到大學士公馬爾賽等寄字內開雍正九年正月初二日奉上諭上年十二月內山西巡撫石麟摺奏寧武縣客店曹珍家內有居歇十一人行蹤可疑該縣詰問有一人稱姓蘇名致隆係范育馪家夥計奉差辦理軍需機密事務等語朕以此必無之事批令石麟嚴拏究擬隨據內務府户部奏稱山西巡撫石麟有文來查問蘇致隆是否奉差往陜西辦理軍需有無假冒等因臣等傳問范育馪據稱今年十一月內果親王著令採辦軍需皮襖因為數甚多隨差夥計蘇致隆等前往大同寧武等處採買皮襖恐其聲張致擡市價囑其不得以實情告人今巡撫來文有雖無騷擾地方嚇索銀錢但蹤迹殊難憑信之語是蘇致隆等實無騷擾多事之處竊念軍需緊要萬難遲緩祈為轉奏行文晉撫等語户部內務府查范育馪夥計到山西辦理軍需實有其事爾等可即寫字寄與石麟將蘇致隆等十一人釋放無庸審問其有名未到者亦不必關提欽此寄字到臣臣隨欽遵諭旨飛飭寧武縣將蘇致隆等十一人即行釋放其有名未到者不必關提外所有欽遵緣由理合繕摺奏聞謹奏從前朕亦以為必係假冒無怪地方有司報稱行蹤可疑總因其人言語糊塗有以自取也同日又奏為奏聞事竊照晉省地方於雍正八年十月二十一日得雪情形經臣具奏在案嗣據各府州陸續報稱十一月十一暨十二月初三十六二十一等日各得雪二三四寸不等兹省城於十二月二十七日得雪二寸二十九日得雪三寸又據各屬申報於二十七八九等日各得瑞雪自二三四五寸以至八九寸一尺不等等因前來此皆我皇上愛養元元至誠感格所致是以屢得瑞雪普利田疇臣惟與闔屬官民共額手慶祝升平而巳所有屢次得雪日期恭摺奏聞謹奏據奏晉省於嵗底屢次得雪朕深為慰慶雍正九年二月初十日山西巡撫臣石麟謹奏為欽奉上諭事竊臣接到大學士公馬爾賽等寄字內開雍正八年十二月二十六日奉上諭今年直隸山東江南河南有被水之州縣聞本地乏食窮民有糊口散往鄰封者若該地方官員視為他處之人不肯加意賑恤必致流離失所且三春耕種之時若不旋歸本土又必致荒棄故業朕心甚為軫念爾等可寫字寄與各省督撫令其轉飭有司凡遇今年外來被災就食之窮民即動支常平倉穀大口日給一升小口五合核實賑恤再動用存公銀兩賞為路費資送回籍並行文知會原籍地方官收留照看總在該督撫督率屬員善於料理以副朕念其所用銀穀著該督撫查核報銷嗣後以此為例欽此寄字到臣臣即欽遵上諭轉飭各屬敬謹奉行去後隨據陽曲縣申報賑恤過直隸獻縣窮民二十一口寧津縣窮民四口榆次縣申報賑恤過獻縣窮民十七口徐溝縣申報賑恤過寧津縣窮民四口黎城縣申報賑恤過山東東平州窮民十六口樂平縣申報賑恤過江南邳州窮民五口平遙縣申報賑恤過江南夀州窮民十口縣申報有山東歷城縣窮民桑海等九口因伊子桑一昭在歸化城開鋪生理前往相依該縣即捐給盤費放行等情并各分别資送起行在案臣復時加督率各員實心實力辦理不但到境停住之窮民當賑恤資送即遇往來經過在途之窮民亦須稽查收留賑恤資送務使窮民無流離困苦之虞蚤旋本土各安耕作以仰副我皇上軫恤羣黎有加無巳之至意所有欽遵奉行緣由理合奏聞謹奏好實力奉行以副朕意同日又奏為奏聞事雍正九年二月初九日據解州夏縣知縣趙尚友具稟稱本月初四日據署教諭髙振呈送匿名帖一紙內開走狗狂惑不見烹祥麟反作釜中羮看徹世事渾如許頭髮衝冠劍欲鳴又稱曾靜可殺不殺呂晚村無罪坐罪真古今一大恨事也為此感憤傾吐血性倘好義君子與我同心請將此詩傳布宇內俾當途聞之轉奏天闕庶朝廷知所悔改而梟曾之首存呂之孤則刑罰中人心服矣區區癡想不無望於萬一等語卑職隨赴學面詢髙教官並與祭文武各生據稱此字不知係何人暗貼是祭畢時有門斗説秀才們都在西角門外看牆上有貼的什麼字哩稟知教官就同去看用醋噴濕髙教官親手揭下來看了拏去的等語卑職復細驗帖內看徹二字俱揭破一半尚有一半字在何又用新紙另寫看徹二字粘補原字之下其字迹係出一人之手顯有情弊可疑似此喪心病狂暗肆悖逆殊難寬縱除密訪外理合稟眀等情具稟到臣臣接閲之下深為痛恨如此逆賊大干法紀除即密諭飭令司道及該州縣作速密訪將貼帖之正賊姓名察實嚴拏務獲嚴究有無同黨星飛詳報毋致聲張泄露疏縱逺揚并差臣標千總前往該縣督同訪拏必期獲到究擬外臣謹據稟先行奏聞謹奏該縣令教官果肯實心根究自不難查出當盡力訪拏務獲毋使姦匪漏網雍正九年三月初七日山西巡撫臣石麟謹奏為聖主之訓誨無巳微臣之察吏不周仰請睿鑒嚴加處分事竊臣一介庸愚荷蒙聖恩畀以撫晉重任自蒞任以來夙夜兢兢時以察吏安民為念緣臣才識短淺地方遼濶耳目不周致有蒲州府知府劉登庸平陽府知府樊錢倬等利欲薰心罔顧功令恃其離省窵逺肆行敗檢朋比貪婪臣竟為其欺蔽疏於覺察今蒙皇上命刑部侍郎臣韓光基太僕寺卿臣顧琮到晉訊明將劉登庸等解任究審以昭法紀但臣身沐皇上至優至渥之恩而於此等劣員不能早為覺察實深惶愧無以自容惟有跪請聖主將臣敕部嚴加議處以為不能覺察屬員者之戒臣謹涕泣實陳曷勝悚栗之至謹奏國家功令自在何待汝之奏請雍正九年三月二十二日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方入春以來連得瑞雪經臣恭摺具奏嗣據各屬陸續報稱於二月初六十七八九暨三月初四五六七八等日各得雨二三四五六寸不等省城於三月初六日得雨一寸兹於二十日又得雨三寸伏思雨水關乎年嵗之收成生民之粒食無時不厪宸衷今晉省各屬連得時雨普利田疇二麥得此滋潤更見青蔥茂發萬姓歡呼咸頌我皇上念切民依感召庥和之所致也所有連得時雨情由理合繕摺奏聞謹奏覽得雨情形深為晉民慶慰雍正九年七月初七日山西巡撫臣石麟謹奏為恭報二麥豐收事竊照晉省二麥收成分數臣留心訪問並據各府州縣開報前來查山西共一百六州縣今十分收成者八十五州縣九分收成者十四州縣八分收成者四縣七分收成者二縣六分收成者一縣野老農夫黃童白叟莫不歡欣鼓舞共慶盈寧臣謹按各屬所報分數欽遵諭旨分别開明據實另繕淸摺恭呈御覽謹奏欣覽二麥收成分數不禁以手加額焉同日又奏為奏聞事竊查晉省地方入夏以來四五兩月雨水均各調勻充足六月內初三十三二十一等日各屬俱節次得有雨澤省城六月初四十七二十九三十等日各得雨三四寸并據各屬陸續報稱六月二十八九日并三十日各得雨二三四五寸不等霑足者甚多兹省城七月初六日又得雨五寸四郊霑足及時甘雨秋禾甚屬得濟臣惟欽遵聖主睿懷所有現在得雨緣由恭摺奏聞謹奏覽同日又奏為請旨事臣伏查雍正八年六月二十一日奉諭旨聞自京赴太原駐劄滿兵不遵法令騷擾百姓特命護軍統領臣宗室哈爾吉前來帶領回京并令會同臣將不遵法令生事之兵丁逐一查出從重懲治即在太原府大街枷號示衆其該管章京之不能約束者亦著查出題參將臣交部嚴察議奏等因經統領臣哈爾吉於七月十四日到晉隨會同臣查訊并取檔案查對將與民人互相角口鬪毆之驍騎關保住等八人雖經臣責處過仍酌其輕重復行懲處外所有正藍旗滿洲旗分傅齊保佐領下驍騎傅海擅入民人院內與婦人角口一案臣石麟當即查知究問因係角口巳將傅海鞭責在案復會同研訊據傅海供稱與婦人互相角口是實並無進人家去等語臣等隨將傅海重責枷號於太原府南門內示衆并將章京參領等查參等因經哈爾吉帶兵回京覆奏在案嗣於雍正九年二月二十八日準兵部咨將臣暨章京參領等照例分别議處緣由知照到臣其枷號之傅海作何發放未經議及臣隨咨請部示續準兵部咨覆令仍欽遵原奉諭旨查照可也等因臣查傅海不遵法令生事角鬬兩經責懲枷號已將一載今應否開枷押解回旗出自聖恩臣未敢擅便為此謹奏將傅海開枷釋放解交該旗另行請旨雍正九年十月初六日山西巡撫臣石麟謹奏為恭報盛世豐年收成分數事竊照晉省地方今嵗雨水調勻田禾暢茂當兹百穀咸登之候據各府州縣陸續開報分數前來查晉省共一百六州縣今十分收成者五十三州縣九分收成者十六州縣八分收成者二十四州縣七分收成者十三州縣黃童白叟羣相鼓舞感頌皇仁臣謹將各屬所報分數遵奉諭旨分别開眀另繕清摺恭呈御覽為此謹奏晉省收成分數以手加額覽焉雍正九年十一月初二日山西巡撫臣石麟謹奏為預籌移貯倉糧以裕軍需仰祈睿鑒事竊照大同府大有倉朔平府常豐倉存貯糧石原以備軍需之用夲年四月內準部咨令將大有倉米四萬石常豐倉米二萬石賣給范育馪將價收存秋後買補還倉現今已飭催買補第大朔二府相連直省今嵗來晉販糴者多米價不甚平減且有關於民食採買亦難急迫伏查晉省各屬存貯各案倉穀并密陳管見事案內歷年所買之穀計共有百萬餘石仰沐皇仁連嵗豐收未有動用現皆實貯臣愚請將密陳管見事案內穀石除大朔二府屬之外酌動十五萬石令各屬碾米九萬石雇覓車騾運赴大有倉五萬石常豐倉四萬石加謹收貯以待不時之用似於軍需有益二處倉厫如有不敷即酌量添造其運送之口袋腳價碾米工資及造倉等費請於司庫收貯雍正八年存公銀內動用事竣造册送部查銷至運動過各屬穀石仍請動存公銀兩照數聖主訓示遵行如蒙俞允臣即一面辦理一面具題為此繕摺請旨謹奏預籌軍需之見甚是一面辦理一面題奏可也雍正九年十一月初五日山西巡撫臣石麟謹奏為奏請量加兵米折價以廣皇仁事竊照晉省各鎮營兵丁月支不敷米石歷年俱照雍正元年題定時估價值折給採買即夲年十月內估撥壬子年兵丁折價月米及赴甘兵丁養贍家口應支月米之數亦已照例造册送部請撥在案但晉省今嵗因直豫二省民人赴晉販買搬運絡繹相繼以致米價日增若仍照題定時估折給兵丁買食維艱臣謹遵雍正元年欽奉如遇價值髙昻之年該督聲眀具奏之恩旨於題定時估之外量請加增臣查三關鎮屬朔州營兵丁不敷折價月米五百八十五石每倉石題定時估價銀四錢五分今查朔州等處現在米價每倉石一兩一二錢不等可否將兵丁折價每石再加折銀三錢大同鎮屬各營路兵丁不敷折價月米共一萬五千六百二十石零每倉石題定時估價銀四錢五分今查大同府等處現在米價每倉石一兩二三錢不等可否將兵丁折價每石再加折銀三錢殺虎協營兵丁不敷折價月米共三千二百五石零每倉石題定時估價銀五錢三分今查朔平府等處現在米價每倉石一兩一二錢不等可否將兵丁折價每石再加折銀二錢二分腹裏各營內撫標太原盂夀等營兵丁不敷折價月米共四千六百四十四石零每倉石題定時估價銀五錢四分今查太原平定等處現在米價每倉石一兩二三錢不等可否將兵丁折價每石再加折銀二錢六分太原鎮標平陽等營兵丁不敷折價月米共八千九百八十二石零每倉石題定時估價銀六錢今查平陽潞安等處現在米價每倉石一兩三四錢不等可否將兵丁折價每石再加折銀二錢汾州石樓等營兵丁不敷折價月米共二千九百八十七石零每倉石題定時估價銀五錢二分今查汾州等處現在米價每倉石一兩四五錢不等可否將兵丁折價每石再加折銀二錢八分以上價值俱按其原定之數并現在米價酌量加增計通共加折銀九千四百五兩零俾兵食無虞訓練有資感沐皇仁無既并據布政司蔣泂查議相同臣不揣冒昧具奏伏候聖主睿裁施行謹奏該部議奏同日又奏為奏聞事竊查大同鎮臣徐起鳯於雍正七年十一月到任之後欽奉諭旨令臣察訪具奏臣查徐起鳯彼時任事伊始考驗官辨皆稱秉公操練兵丁俱屬嚴肅是以據實覆奏在案至今嵗以來即聞其年力漸衰覺察多疏聽任家人書役朦蔽作弊然知之尚未確實今臣署理提篆陸續調取各營員赴省考驗面加詢問并復細訪知鎮臣徐起鳯惟任聽家人張二潘二稿房書辦金質貴用事遇官辨請咨領劄按其大小索銀三四十兩六七十兩不等前又將繭紬數百匹分發該鎮衙門人等二百匹及標下三營每營各三四十匹不等每匹令繳價銀三兩四錢又迎送過往酒席程儀俱支銷中營公費糧銀又聞其從前將署內家人挂名於標下三營支取糧餉近因臣嚴行稽查始除名另補臣查大同一鎮地處邉方關係緊要鎮臣徐起鳯年力既衰似此奉職有愆恐有貽誤之處臣知之既確不敢瞻徇隱諱謹據實奏聞伏乞皇上睿鑒施行謹奏前日之奏覆固屬錯謬今此之奏聞更屬遲延雍正九年十一月初十日山西巡撫臣石麟謹奏為恭懇聖恩俯留能員以濟公務事竊查前準吏部咨開前任山西巡察勵宗萬騷擾勒索案內有濫應夫馬等項之翼城等州縣既各自行檢舉應否查參等因議覆奉旨勵宗萬著革任翼城等州縣著照例查參欽此欽遵臣隨檄行布政司等查揭去後今據開報各職名前來臣查除已經參故各員及原無額設驛遞因勵宗萬索取自行捐雇夫馬應付之翼城等州縣俱例無處分應邀免議外所有自行檢舉濫應夫馬之前任安邑縣知縣今升保德州知州車敏來前任臨汾縣知縣今升遼州知州徐三俊曲沃縣大計附薦知縣王世銑洪洞縣卓異知縣余世堂前署靈石縣知縣今署長治縣試用知縣郭麟生介休縣知縣李夀彭前署徐溝縣知縣今署鳳臺縣知縣趙炯屯留縣知縣甄爾節襄垣縣知縣劉德潤聞喜縣知縣李錦祁縣告病知縣羅著藻等俱例應處分但臣伏查雍正六年內欽奉上諭督撫等遇屬員愆尤當觀其平日居官如何若係庸碌無能之輩則無足惜倘屬廉幹之員而因此罷斥殊非大臣為國家愛惜人才之道雖定例所在不得不參然亦當密行奏聞欽此臣查濫應夫馬各員內趙炯甄爾節劉德潤李錦皆係循分供職之員應聽部議外其車敏來徐三俊王世銑余世堂等皆屬亷幹素著之員至郭麟生李夀彭羅著藻等亦皆辦事勤敏除羅著藻久經告病離任查晉省現有軍需之際得有幹員辦理更為有益臣不揣冒昧恭懇聖恩可否將車敏來等照例議處從寬仍行留任俾現在辦事不致乏人而各員感戴天恩益加奮勉矣臣於本月十二日具疏題參外謹繕摺密奏伏乞聖主睿鑒施行謹奏該部議奏硃批諭旨卷二百十七之三欽定四庫全書硃批諭旨卷二百十七之四硃批石麟奏摺雍正十年二月初六日山西巡撫臣石麟謹奏為奏聞晉省得雪日期事竊照晉省各屬地方上年十月得雪深透之後十一十二月以至今嵗正月內雖各屬屢經得雪但僅及一州一邑未能普遍霑足臣心日切倣徨深自警惕昨欽奉上諭更深恐懼修省并預為籌酌平糶等事今荷蒙穹蒼上鑒聖心之乾惕下憐萬民之生命省城於二月初五日申時雨雪並降入土三寸有餘仰瞻雲色深沉降雪必不止一二處晉省地氣多寒今嵗時令較遲得此雨雪深有濟於二麥臣已飛查各屬得雪之情形但覆到尚需時日臣伏知聖心垂念之切謹將省城得雪緣由繕摺先行恭奏其餘俟各屬查覆到日再具奏聞謹奏覽晉省雨雪情形朕心深為欣慰雍正十年三月初五日山西巡撫臣石麟謹奏為奏聞事竊照山西省城於二月十九日得有瑞雪隨據各府州縣陸續申報是日各得雨雪二三四五六寸不等并有至八寸者均獲普霑在地麥苖咸有禆益兹又於三月初四日戌時起至初五日丑時止得雨三寸有餘沾濡優渥四郊遍及詢之野老農夫俱稱應時甘雨一切禾黍正可趁此播種歡呼載道莫不感頌皇仁除即行查各屬俟覆到另奏外合先繕摺奏聞上慰宸𠂻謹奏覽奏曷勝額慶近京一帶地方亦節次據報得雨雪矣雍正十年三月十八日山西巡撫臣石麟謹奏為奏聞事竊照山西省城三月初四日得雨情形經臣恭摺先行具奏一面行查各屬去後隨據各府州縣陸續申覆初四初五日各得雨雪二三四五寸不等均屬得濟臣正在繕摺間省城於初十日得雪八寸十一日又得雪尺餘十分霑足復即查據各屬申報初十十一日各得雨雪七八寸一尺及一尺四五六七寸不等雪後天氣晴和消融入土優渥深透髙原下隰通省地方咸獲霑足上年所種之麥無不青蔥暢發目下應種之麥并一切禾黍亦皆得及時播種齊全野老農夫遍滿田疇歡呼力作咸頌皇仁所有晉省雨雪霑足緣由謹再奏聞謹奏據奏通省雨雪霑足實慰朕懷雍正十年四月初六日山西巡撫臣石麟謹奏為欽奉上諭事竊臣前接到內大臣公豐盛額字開欽奉上諭令於所轄兵丁內俱著勤加演習步行及本身裹帶物件之法多多益善不可視為具文苟且從事將來若不能諳練將該管大臣官員從重議處欽此欽遵臣隨知會太原大同兩鎮臣於所轄兵丁內挑選演習并將奉行緣由先即具摺回奏兹查太原鎮各標營路內經署鎮臣張朝良挑就兵丁共一千八百名大同鎮各標營路內經署鎮臣李如柏挑就兵丁共五千五百七十四名至臣標除額外兵丁巳經全數製給沙囊演習外其左右二營內挑就兵丁一百六十名通共挑就兵丁七千五百三十四名俱各製給沙囊令其繫於腰間兩腿勤加演習由輕漸重由近漸逺臣仍不時督察務期諳練合將挑就兵數恭摺奏聞謹奏練習步行趫捷之法須當由漸加增非可急驟之事知此要訣而時加督察方為有益同日又奏為奏聞事竊照山西於三月二十七八兩日省城得雨四寸餘并據各府州縣陸續申報二十七八兩日各得雨三四五六寸不等正在繕摺具奏間兹省城於四月初四至初五日霖雨大霈十分深透霑足雨水調勻且天氣和暖在地麥苗得此膏澤滋培更加茂盛而播種之禾黍亦皆勃然暢發所有連得時雨情形理合繕摺奏聞謹奏覽所奏情形朕實深為晉民額慶雍正十年閏五月二十四日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方於五月初六十六二十二十四二十八九等日暨閏五月初二十一十二等日各屬俱得雨二三四寸不等兹省城十八日得雨五六寸十九日甘雨大霈十分深透霑足隨據各府州縣申報十八十九等日各得雨二三四五六寸不等通計省北各府州屬雨水俱屬霑足省南各府州屬霑足者十居八九其一二未霑足者雨澤時有地土亦皆濕潤二麥已漸次登場收穫禾黍亦俱種齊暢發正在繕摺具奏間省城又於二十三日得雨三寸當兹盛夏甘霖疉霈普利田疇皆由天庥以副我皇上惓惓民生之至意為此恭摺奏聞謹奏當兹盛夏連得甘雨西望晉省不禁以手加額同日又奏為欽奉上諭事竊查雍正九年十一月初六日準兵部咨開奉上諭山西大同總兵官徐起鳯著來京大同總兵員缺著肅州總兵官張朝良調補大同總兵事務緊要且近有挑選兵丁之事張朝良未到之先著李如柏暫行署理其太原總兵官印務著石麟委員署理張朝良到晉時著石麟酌量或令張朝良徑赴大同之任或李如柏在大同辦理之事未竣即令張朝良暫署太原總兵印務欽此移咨到臣臣隨欽遵諭旨將太原鎮印務即委鎮標中軍遊擊胡海護理嗣於雍正十年正月鎮臣張朝良到晉因鎮臣李如柏在大同辦理召募兵丁挑選安設等事未竣臣遵旨酌量令張朝良暫署太原總兵印務俱經題眀在案今查大同召募安設等事已經告竣則鎮臣李如柏張朝良自應題請各回本任第臣查大同地處邊方時值軍務絡繹鎮臣李如柏署印半載有餘調度有方辦事勤敏於營伍公務均有禆益目今召募兵丁雖已事竣尚有整理邊口製造軍器及辦送軍營火藥旗幟等項均當料理查鎮臣張朝良自署理太原鎮印務以來訓練辦事俱屬誠實熟諳惟是大同地方營務較之太原殊為遼濶殷繁若初到彼地諸務未能一時深悉辦理不無稽遲臣因營伍地方公務起見仰懇聖恩可否令兩鎮臣仍各暫行署理兩鎮印務俟大同各項事竣之後再行酌量題請各回本任伏乞聖主訓示遵行謹奏各令暫署兩俱有益所奏是雍正十年七月初一日山西巡撫臣石麟謹奏為欽奉上諭事雍正十年四月初九日準户部咨各省督撫提鎮標下兵丁蒙皇恩賞給生息銀兩一案雲南貴州廣東廣西四省巳敷分給協營兵丁均霑欽奉上諭著各省督撫等酌量本地情形悉心籌運若可以照此變通辦理則協營兵丁可以蚤受恩賞誠屬有益但各省地方之利息輕重不同餘銀之多寡不一非以不能行之省分令倣行之也不可勉強從事欽此欽遵仰見我皇上一視同仁睿慮周詳之至意臣查山西省雍正七年五月內蒙恩賞給撫標兵丁銀四千兩提標兵丁銀六千兩又於雍正八年九月內蒙恩賞給大同鎮標兵丁銀九千兩均各營運生息在案查臣標銀兩係省城當商情願具領營運每兩出息一分二釐因營運之後即有調遣車兵及赴甘兵丁而生息尚未豐裕是以先就出征兵丁家屬遇有吉凶事者賞給除給發銀共三百十四兩外尚存息銀一千二百四十八兩復據各當商情願再領息銀一千兩營運照前加息按交於本年四月初一日給領從此每月又多增息銀十二兩所有存營兵丁臣擬於今年四月為始遇有吉凶事者即將息銀動用賞給正在繕摺奏眀間欽奉上諭著將賞給生息銀兩酌量辦理欽此臣隨咨會太大兩鎮臣各就本地情形公同籌酌可否即得分給協營兵丁蚤受恩賞去後兹準暫署太原鎮臣張朝良咨覆查惠濟銀兩所得一分利息除賞給出征車騎暨赴甘出征馬兵家屬吉凶之事外今止現存利銀四百五十八兩餘銀實屬不多若勉強通融勢必兩不相就此時似難分給協營兵丁等因又準暫署大同鎮臣李如柏咨覆查大同地處邊疆不通舟楫貿易各商獲利實微惠濟銀兩分借各鋪領運每兩僅交息銀一分因利銀不豐酌議先令標下三營車騎赴甘出征兵丁家屬遇事給賞其存營兵丁俟利息豐裕再為開賞咨眀户部在案今查現在止存利銀六百五十四兩此時似難概行開賞等因各咨覆前來伏讀上諭原令不能行之省分不可勉強從事諄諄聖訓固已洞鑒靡遺今太大二鎮標恩賞生息之銀實與滇粵四省利廣而可敷分給者不同至於臣標二營現存利銀僅止三百五十兩請將標下新添額外兵丁二千名於癸丑年為始遇有吉凶事亦照存營兵丁之例一體給賞以廣皇仁所有各協營兵丁此時尚不能分給似應俟生息充裕之日臣等當酌量請旨遵行臣謹一併恭摺覆奏伏乞睿鑒謹奏原命汝等酌量施行自不應勉強從事雍正十年七月十二日山西巡撫臣石麟謹奏為恭報二麥收成事竊照晉省二麥兹當收穫之際據各屬開報分數前來查山西共一百六州縣今十分收成者二十三州縣九分收成者十一州縣八分收成者二十六州縣七分收成者二十三州縣六分收成者二十三州縣野老農夫咸稱上冬今春雨雪稀少麥收幾致難望荷蒙聖主念切民生頻頒修省之訓誥屢諭先事之圗維是以至誠感召雨雪疉霈二麥得濟獲此收成莫不歡欣感激仰頌皇仁臣謹按各屬所報分數欽遵諭旨分别開眀據實另繕清摺恭呈御覽為此謹奏覽奏二麥收成分數朕懷曷勝欣慰雍正十年九月二十五日山西巡撫臣石麟謹奏為欽承聖訓恭謝天恩并據實陳眀事竊臣庸材陋質荷蒙聖恩畀以晉撫重任復命署理提督印務受事以來凡於題補將僃等員一一會同鎮臣詳加揀選再三考核不敢稍忽緣晉省於請定武職升選等事案內則有應改補之都司於遵旨議奏事案內則有三七分缺應題補之將僃又於欽奉上諭事案內有沿邊各營應題補新添設之營員臣於所轄標營各員內疉次挑選無如難得合例之員祗就各員中酌量人地相宜現在勤慎營務弓馬可觀以及著有勞績者公同揀選題補恭候欽定前將千總劉朝棟題補茹越營守備續將改補各都司之守備劉文秀黃澍祚馬圯受米虎馮選梁永夀等莭次送部引見兩蒙皇上飭諭臣跪讀之下惶悚靡已伏念臣知識淺短揀選人員未能允協蒙聖主不加處分頻頒訓誨臣感愧交深難以名言嗣後如遇員缺更當詳慎揀選以仰副聖主訓誨之至意但臣更有陳眀者查大同鎮屬守僃應改都司者共十七缺臣於本年四月內揀選具題經部議覆奉旨俞允補授之外計有十二員應送部引見臣前具題疏內聲明分作兩起咨送今除劉文秀等六員已經奉旨在案又除原題頂補梁永夀員缺之守僃田重時今梁永夀仍回原任田重時毋庸送部外尚有任起龍尚崇傑顧晉珍李進朝張夢麟五員今次應送部引見查部議任起龍係合例之員尚崇傑顧晉珍李進朝張夢麟部議俱越銜一等而李進朝又係本省人均令送部引見恭候欽定臣查尚崇傑顧晉珍李進朝俱原係專營守僃臣考驗才具俱與新銜相稱是以即請改補原營都司張夢麟現係新平路中軍守僃臣考驗該僃老成厯練弓馬可觀因請調升保德營都司至任起龍弓馬雖屬平等但從前屢經出征因著有勞績現以署都督僉事管殺虎協中軍守僃事是以即請改補該協都司以上各員係未奉聖訓之先於本年四月內具題在案今除給咨送部引見外臣既感蒙聖主訓誨之諄切又深懼揀選之未當謹恭摺叩謝天恩并將從前酌量題補緣由據實陳明謹奏朕用人原只論材技從不拘限成例雖然材優而合例者上也材優而不合例者次也若材劣而又不合例斯為下矣豈宜濫入保題乎如此不但用非其人是乃開汝等督撫自作威福之權尤為不可觀汝此奏未悉朕旨所以復行批諭令汝知之同日又奏為恭報盛世豐年收成分數事竊照晉省地方夏秋雨水霑足田禾暢茂當兹百穀咸登之候據各府州縣陸續開報收成分數前來查晉省共一百六州縣前惟據芮城縣詳報縣境內有十三村莊得雨稍遲田禾被旱臣當將情形題報在案嗣據委員詳稱履畝確勘所有補種之荍麥因雨後天氣和暖俱巳長發結實獲有收成巳經另疏題覆外今共計十分收成者六十四州縣九分收成者十四州縣八分收成者十八州縣七分收成者九州縣六分收成者一縣臣謹將各屬所報分數遵奉諭旨分别開明另繕清摺恭呈御覽伏乞睿鑒謹奏以手加額覽焉雍正十一年正月二十八日山西巡撫臣石麟謹奏為奏聞事竊查晉省地方上冬雨雪稀少今時屆仲春東作將興仰望膏澤正殷之際荷蒙聖主至誠感召省城於正月二十七日酉時起大雪繽紛至二十八日丑時止四野得雪四五寸不等隨降隨融入土優渥不特在地之麥苗深獲滋培即耕耘播種均屬有濟且是夜同雲密布雨雪綢繆所降必廣臣伏念雨雪關乎年嵗屢厪宸衷若待各屬報齊尚需時日除一面飛行飭查覆到另行具奏外謹將太原省城得雪情形即先恭摺奏聞上慰聖懷為此謹奏省城得雪情形欣悅覽之各屬曾否普遍霑濡查明具奏以聞諭山西巡撫石麟布政司蔣泂知悉阿齊圖前自京起程時應給馱載之馬不過二十餘匹今歸途行裝增至四五十馱之多沿路騷擾驛站經直隸陜西皆據實參奏而汝二人竟忍掩蔽朕聰隱默不言是可忍也孰不可忍也思之實為寒心況驛馬關係緊要豈汝等任意應酬情面之物耶接諭後將阿齊圗於山西境內曾受何員餽送所得何物如何索取情形一一察訪的確併汝等贈助贐儀若干悉據實開明奏聞以贖過咎倘仍執迷不悟巧為飾辭希圗遮蓋前愆恐終不能欺蔽朕之耳目也各訪各奏毋得會商汝二人若必欲商同奏覆朕亦難強任汝二人為之耳特諭雍正十一年三月初六日山西巡撫臣石麟謹奏為奏聞事竊照晉省地方正月二十七八等日得過雨雪情形經臣繕摺奏聞在案嗣據各屬將二月十四十五二十三二十七等日得雨緣由申報前來臣查省南各州縣各得雨三四五六寸不等并有一尺餘者惟省北大朔寧保四府州屬內有得雪三四寸者有得雨二三寸者亦有尚未得雨者數處臣巳飭令各加修省虔誠求禱兹省城於三月初四日申時起天降霖雨至初五日午時止遍查四野俱獲深透霑足麥菽等項大有裨盆且連日濃雲普遍甘霖稠密所降必廣除行查各屬俟覆到另奏外謹將各屬二月內所得雨雪並太原省城現在得雨情形恭摺奏聞上慰聖懷謹奏深慰朕懷雍正十一年三月二十六日山西巡撫臣石麟謹奏為奏聞事竊照太原省城三月初四初五日得雨情形臣當即繕摺奏聞并聲明行查各屬俟覆到另奏在案嗣據各府州縣陸續申覆前來臣查省南各州縣三月初四五日各得雨二三四五六寸不等并有霑足者而蒲澤解三府州屬十分溥足又地氣較之他處和暖麥苗蚤發得此甘雨現在暢茂省北大朔寧保四府州屬三月初四五日各得雨二三四五寸不等亦有霑足者臣謹將查明各屬得雨情形恭摺奏聞謹奏覽奏晉省得雨情形仍未經溥遍沾足月盡月初以來光景若何更奏以聞雍正十一年四月十三日山西巡撫臣石麟謹奏為奏聞事竊臣前將各屬三月初四五日得雨情形繕摺具奏欽奉硃批諭旨覽奏晉省得雨情形仍未經溥遍沾足月盡月初以來光景若何更奏以聞欽此臣查太原省城於三月二十四日得雨寸餘隨據各州縣陸續申報三月二十四五兩日各得雨二三四五寸不等并有報霑足者其大朔二府屬十九二十得雨之後二十五六兩日又得雨霑足者較之他屬尤多而蒲州府屬地氣和暖雨水調勻優渥二麥現今秀實惟是時當孟夏豆麥等項在在需雨今各屬雖陸續得有雨澤但未獲普遍透足臣心切倣徨隨於四月初七日設壇率同司道等官虔誠祈禱至初十日省城得雨寸餘臣仍深自刻責修省現在敬謹祈求仰冀天鑒甘霖大霈普利田疇以上慰聖主惓惓民生之睿懷也謹將三月內各屬得過雨澤并現在祈求緣由恭摺奏聞謹奏覽畿輔一帶於月之十六十八兩日得雨霑透密邇晉省諒必已蒙上天慈佑溥賜甘霖矣雍正十一年五月初七日山西巡撫臣石麟謹奏為聖主之訓誨無巳微臣之覺察有疏仰祈睿鑒嚴加處分事竊臣一介庸愚感蒙聖恩畀以撫晉重任屢荷訓誨生成得以遵循有自夙夜黽勉殫竭心力惟冀有益於吏治民生以仰報髙厚於萬一其於徴收錢糧辦理軍需尤加意督察諄同府知府王聯晉雖蒞衝繁要缺事無貽誤但居心實多巧詐昨旗兵起行之際乃敢假臣之名餽送銀兩臣知之深為駭異隨即題參在案豈意分餧馬匹一案屢催尚未報銷乃竟有朦