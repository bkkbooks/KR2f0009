body:
  text: 欽定四庫全書硃批諭旨卷二百四硃批勵宗萬奏摺雍正六年正月初七日山西學政翰林院編修臣勵宗萬謹奏為請定教職調補之法以收實效事竊臣世受國恩涓埃未報復䝉皇上天恩命臣督學山右撫躬自問惶懼滋深惟有勉盡愚誠以期少酬萬一臣於陛辭之日恭領皇上諄諄訓誡剴切丁寧以士習民風為首務伏思學校為教化之本原而士習為民風之表率欲端士習非徒課其文藝必湏嚴別優劣以示勸懲但學臣一年之中巡歴通省各郡生員之賢否勢不能一時備悉而教官則一學兩員訪察甚易故教官職分雖卑關係實重臣細查通省教官冊籍壯年固不乏人但皆年屆六旬以外者居多此輩非素之不同風俗有厚薄之各異其年壯才長者任居小學及士風醇厚之處而年衰才絀者反任大學及士習澆薄之處人地似不相宜臣愚請將晉省各屬教職陸續調取省城㑹同撫臣公同驗看詳細分別至教官原有令學臣考試之例驗看之後復行考其文藝除文理荒疎年衰力頹不堪供職者㑹同撫臣詳議題請休致外其年壯才優學問淹通者調以大學要缺其年力尚壯文理平通者調以中缺其年雖已地相宜之實效矣倘臣言可採伏候皇上批示以便㑹同撫臣料理謹此具摺冒昧陳請抑例調補要缺之後其果能實心辦事有裨士風者酌定年分予以優敘其有調任之後不思報稱有皇上指示施行謹奏覽同日又奏為奏聞事竊思學政一官固在廉明公正遴拔人材為職分當盡之事而學臣為一方教化之所關凡地方風俗人情亦非可委為分外事也臣留心體察晉省風俗雖云醇樸然太原以南平陽汾州絳州一路皇上陳之曲沃積習暴悍歴來有抗欠錢糧之風署縣事霍州知州王作朋素知其習有意振厲約束胥役過於嚴刻比較錢糧用刑太重以致胥役含怨勾通地方惡棍於雍正五年十二月初四日聚集百餘人打入署内將作朋衣冠毁壞推倒聚毆旋入卧室又將箱内銀錢衣物搶分扯裂此臣得之風聞者繼見曲沃鄰近官員留心訪問果有其事臣恐其中不無劣衿幫唆亦未可定容臣訪實另行密奏外似此抗糧毆官有干國法臣職司風化不敢委為分外壅於上聞謹此僃悉密奏伏乞聖主睿鑒謹奏凡百惟以據實無隱為要汝少年即被擢用一生之見取見棄於朕在能此四字與否也勉之勉之同日又奏為預行奏聞事竊臣到任以後清查前案有雍正五年五月内代州五臺縣生員田化霖與訓導盧標互毆成訟一案據生員田化霖供訓導盧標因勒索補廩陋規未遂以致挾恨毆打據訓導盧標供因朔望宣講上諭訓飭士子文田化霖不到不服戒飭以致毆折盧標小指扯裂衣服此事雖經該縣該州兩次審訊而彼此供詞互異尚未定案其田化霖已經署學政撫臣石麟批革衣頂候審在案續於雍正五年十二月二十六日據該州申報田化霖押在五臺縣看守不意於本月初二日五更脱逃臣隨批令該州嚴飭該縣責差幹役勒限嚴緝俟拏獲該生確審定擬㑹題外似此干法無忌師生互毆等情合先繕摺奏聞謹奏知道了遇此等事亟宜破面整飭不可絲毫瞻顧沽取寬厚假譽以自蹈委靡之習雍正六年三月初六日山西學政翰林院編修臣勵宗萬謹奏為請定學臣舉黜優劣隨棚造冊達部以杜奉行不力事竊惟舉報優劣乃鼓勵士風之本源學政激揚之大典我皇上加意振興屢頒上諭諄詳明切疊經部議通行各省遵奉在案乃近年以來各省學臣舉報優行照議升入太學者竝無一人而間有開報劣行者又不過將緣事已經斥革者數名造冊達部茍且塞責揆厥所由葢因三年任滿之後方行造報其中不無瞻徇顧忌示恩沽譽之處夫十室之邑必有忠信一郡之中豈無敗類臣請嗣後學臣考校一棚務湏遵照定例令各學教官將所屬文武生員優劣事蹟秉公據實開報再令該府州縣於平素所知生員中孰優孰劣亦具密單呈送學臣以憑印證查核於考畢之日分別奬戒發落隨即造冊登明奬戒過各生數目達部存案俟任滿之日訪察確實果屬名行相符再具疏彚題倘學臣造報不實一經發覺嚴加議處如教官開送不實即將該員題㕘嚴處如此立法不惟可杜學臣瞻顧之弊將見未合送入太學之生既知部冊有名益知勉勵而未經斥革之劣生亦咸知部冊可畏均知改悔似於士習民風均有裨益臣從鼓勵士子起見不揣愚昧敬陳管見伏乞皇上指示施行謹奏此奏甚是九卿㑹議具奏同日又奏為請旨事竊臣查考試定例内開凡童生入籍二十年現有丁糧祖地者方准考試臣今按試汾州一府據提調知府白映棠申送所屬石樓縣童生冊卷内有外郡童生二名稱係代完石邑荒糧給有執照准其入籍考試者臣即調查檔案竝行查布政司去後隨據布政司查覆前來臣細查前案緣石邑自康熙六十年歳歉之後人民逃散地土荒蕪歴年舊欠錢糧盈千纍萬無可著追前任知縣麥士偉據闔邑紳衿公議無論本郡外郡童生有能代完荒地錢糧三十兩者并有能自僃牛種開荒一頃者俱各給予執照准其入籍考試等因通詳撫學兩衙門當經批行布政司查議續據司府各官確議可行竝取通邑紳衿情願甘結僃詳前任撫學二臣批允出示通行曉諭在案是此外郡童生雖非石邑之人委係遵示代完荒糧給有執照非同冒籍可比現據府縣各官送考印結以及本學廩生具保五童互保各結臣當即按冊一體收考訖但臣思從前地方各官雖為國帑起見而未經具奏終與考試定例有違目前歲考已過將來科試轉瞬即屆理應繕摺具奏應否仍行收考抑或移咨撫臣㑹題奉旨俞允之後再行收考伏乞皇上批示遵奉施行謹奏似此於情理可通融者竟行收考為是據實陳明亦是所奏情節知道了雍正六年六月初三日山西學政翰林院編修臣勵宗萬謹奏為奏聞事臣自本年二月下旬由汾州府考畢前往平陽考試竊見一路麥田秀發詢問農民咸稱上年夏麥收成稍歉今歲麥苖暢茂三月間若得大雨即可十分豐稔臣在平陽考校彌月雖時有雨澤未能霑足迨至四月初間前赴絳州天氣微覺稍亢嗣於初七日大雨間日一下四郊霑足民情歡悦臣於四月二十二日由絳州至解州考棚一路麥穟俱已登場細訪收成分數自臣考試所經之地由平陽府屬之聞喜縣起北至汾州府所屬止皆有六七分不等自聞喜縣起西至蒲州止收成皆有八九分不等麥價每倉石四五錢米價毎倉石八皇上宵旰精勤刻刻以民生休戚為念謹將臣親歴所見隨路所聞地方民事情形收成分數米麥時價據實奏聞謹奏覽同日又奏為奏聞事竊臣三月間正在平陽府考試風聞蒲州所屬之臨晉縣有村民鬧縣拒捕一事臣恐此案或有不法生員主持附和當即飛行蒲州密查去後隨據該州申稱鬧縣拒捕一案係臨晉縣西鄉之張村昝村角丕村三處均屬蠢頑愚民内無讀書之人竝無文武生員在内嗣於五月中旬臣按考蒲州經過臨晉縣地方細加博採閙縣之由緣㕘革知縣劉國琮因臨晉向慣拖欠錢糧遂比較過嚴不分多寡槩用重刑以致村民入縣鬧署該縣拏獲為首二人繼復脱逃該縣復差役往村緝拏差役被毆而回迨後撫臣檄委蒲州絳州臨晉等三州縣㑹同協拏三村鬧縣首犯其角丕村及昝村姦民雖各聚衆持械尚未拒捕惟張村姦民則竟拒捕傷人當即兩州一縣㑹同詳報平陽鎭臣隨差遊守帶領兵丁赴縣彈壓隨後撫臣飭行嚴拏即據張村之閙縣首犯師刑投到解省審訊及臣到蒲州後又聞續獲昝村鬧縣之首犯樊中花解省其角丕付之閙縣首犯張臣遁跡潛蹤已拏獲該犯胞兄胞姪拘禁在縣追比至於師刑供出三村拒捕各犯内已經拏獲角丕村拒捕二人解赴省城其餘現在嚴拏尚未到案目今昝村及角丕村俱知畏法惟張村一處尚在執迷未悟通縣居民安堵竝無紛擾合將目前情形繕摺奏聞謹奏此事朕已悉知特差部臣前來查審矣同日又奏為密奏事竊臣考試絳州時訪聞有本州監生在營田例捐納候選佐貳梁開宗者家貲豐贍有數十萬之厚伊本係同祖別房自幼過繼為嗣有伊族兄監生梁翼宗者窺開宗以嗣子而擁厚貲挾制嚇索分吞祖業者已經屢次去歳又控該州復控臬司經臬司批令該州斷給原告銀三萬兩於今春已經交銀一萬五千兩但訪得此一萬五千兩之項原告入手僅十之一二其餘銀兩聞有原任山東布政使侯居廣之子候補道員侯琰者在臬司衙門從中説合分肥傳言嘖嘖此事不知按察使蔣炯曾否知情抑或侯琰朦朧中飽均未可知臣因事關行賄徇情既有所聞不敢隱蔽謹據實密奏伏乞皇上睿鑒謹奏此奏甚屬可嘉凡有所見所聞咸似此據實入告能以不隱為務方為不負朕恩將來可成大器也勉之勉之雍正六年八月十一日山西學政國子監司業臣勵宗萬謹奏為恭謝天恩事竊臣弱質庸材仰䝉皇上高厚洪恩畀以山西學政抵任以來自慚才薄時切恐惶惟以不能稱職為懼兹復荷䝉特恩陞臣國子監司業臣拜命之下感激悚惶罔知所措伏思學政為風化專司夙夜已懷戰懼司業為成均表率聞命更切屏營殊恩異數稠疊便蕃臣何人斯膺兹寵渥惟有益加黽勉仰體皇上造就人材之盛心矢竭愚誠少副聖主任用微臣之至意於萬一耳除具本恭謝天恩外謹此具摺叩謝謹奏覽奏謝知道了汝少年輕率諸事甚不謹密凡所密奏人皆知之如梁開宗之事通省皆知係汝奏聞似此豈特深負朕恩亦乃速禍之道臣不密則失身君不密則失臣朕於不當宣露之事從不令四目六耳見聞不但汝新進小臣狂妄炫耀足以取禍即隆科多年羮堯輩皆以不能愼密自致滅亡汝讀聖賢書而昧於明哲之理非薄福小人則為作孽召禍之徒豈可復望上進於此若不愧恨痛改仍勉强支吾以圖粉飾正所謂欲葢彌彰轉增罪咎耳汝一生進退升沉之基全在此任況年當少壯後半世功名事業不可限量倘甘心自棄於謹愼保全四字猶不能加勉試思已為世間何等人耶將朕斯諭當書諸紳以為終身誦前於汝陛辭時朕何等諄諄訓諭尚能記憶否誠若下愚不移朕一片望汝之心殊為可惜也同日又奏為謹陳貢監考職之法杜代倩以收眞材事欽惟我皇上臨御以來愛惜人材曠古未有於制科取士之外雖考職貢監亦必加意愼重欽點大臣及詞臣公閲試卷取定之後又䝉特行引見如人材可觀不拘常格即行拔擢普天之下凡有一長可取一能足錄者靡不歡欣鼓舞思登仕路而上年冬間考取貢監計有千餘鄉里其願已足文理既不堪考試而又冀盜虛名遂有一種畧知筆墨之姦徒包攬代倩頂名入試雖考試之日未嘗不行查察而人數衆多在吏部只憑有咨送文結何能逐名辨其眞偽以致相沿者上年幸䝉皇上洞悉情弊敕令引見頓使姦宄盡露不然則朝廷職銜又不知冒濫凡幾矣臣愚以為嗣後貢監考職似應改於三年一次順天鄉試榜發之後舉行臣監衙門將下第各省貢監照錄科之冊移送吏部請旨考試此等下第貢監原有本籍文結又在監月課已久素知行文斷無代冒替考之弊其直省不進鄉場之貢監等有情願考試者將赴部考職緣由呈明該地方官查核明確取具鄰族甘結造具年貌清冊加具印結照例遞申撫學兩臣㑹同再加嚴查果係親身竝無頂冒一咨吏部一咨臣監亦於鄉試之後考試但此貢監於臨考之時方行到部仍恐有代倩等弊一時難以查察應定限六箇月之前到京亦照貢監鄉試之例歴考六次者方准送部考試臣監衙門於六箇月之内查對年貌毎月與到監鄉試之貢監一體考課如文理清通准其送部考試如文理荒謬即行移知吏部著令回籍以杜代倩之弊倘臣監衙門各官徇庇營私有朦混送考者一經控首嚴加議處倘各省撫學兩臣咨送考職貢監不詳察明確致有於原籍起文之時即頂冒來京到監者經臣監衙門察出即行題㕘將原籍撫學及送考各官均照科場例議處其作弊之貢監并頂冒之姦徒亦照科場例治罪如此立法則頂替自除眞材可得庶不負我皇上加意人才廣收博採之盛心矣目今又値考職之期臣謹陳管見是否可行伏乞聖主睿鑒指示謹奏所奏甚是現今廷臣正議此事奏覆時再加酌看如有不詳僃處朕自當另降諭旨同日又奏為奏聞事臣於上年十二月内到任檢查卷案有代州五臺縣生員田化霖毆傷本學訓導盧標手指一事及田化霖在逃情由於本年正月具摺奏聞仰䝉皇上訓誨破面整飭不可瞻徇沽譽臣跪讀之下仰見我皇上愼重官方整肅風化之至意臣於二月内因未據該州報獲嚴催一次又於三月六月疊行嚴催該州縣不但未據報獲亦竝無片紙隻字回覆臣隨移咨撫臣查取疎縱遲延職名并轉飭嚴拏去後兹於七月二十日有田化霖之兄田賜霖赴臣具呈臣即訊究田化霖遁跡處所據稱州縣各官袒庇教職因此化霖躱避忻州定襄縣地方臣隨差押田賜霖限七日之内拏獲田化霖去後如限果至訊問之下極口稱寃雖一面之詞不足憑信但既據供州縣官有袒庇教職等語似不便仍發代州審理臣因改委忻州秉公究審并移㑹撫臣知照訖容俟審明之日具題外所有臣拏獲田化霖改委審理緣由理合繕摺奏聞謹奏但肯秉公處事安往而不得其宜假如該州縣果有袒庇實據即當糾㕘若平日居官猶屬才能稱職抑或情有可原則宜姑恕同日又奏為清理商民籍貫以除積弊事臣查山西河東專建運學設立教官乃國家優恤商人之殊恩必須的係行鹽子弟方准考試其民籍童生不得混行冒考商籍商籍童生亦不得濫考民籍如有冒濫通融送考之鹽道地方官收考之學臣均有處分祇因河東當日修理鹽池禁墻堤堰等工原係蒲解二州并臨晉榮河萬泉河津安邑夏縣平陸芮城垣曲聞喜十二州縣舊有額設鹽丁其子弟許入運學考試繼因額設鹽丁修築無力遂招募十二州縣民夫應幫修理其子弟亦遂冒名鹽丁入運學考試并此外無因之民籍童生亦紛紛改竄入冊乃商籍童生見民既可冒商商亦無妨於冒民遂致商民互相冒濫前後重名往往有一童而冒兩籍一人而考幾場甚或本籍已經取入將冒考之名賣與他人頂充入試姦弊百出相習成風臣按考解州隨行鹽法道竝提調各州縣徹底清查去後續據鹽道楊夢琰分行十二州縣查明冒籍情弊前來除商籍子弟不許冒入民籍考試責成各州縣嚴行查禁外其運學歳科兩試童生惟准報部有名商人子弟并從前有錠之商人的派子孫查明祖父三代籍貫准作商籍其別省暫租商錠零星小販一槩不准冒入商籍考試至從前冒籍文武各生之子弟應令各歸本籍考試不得因父兄現屬運學而子弟仍行混冒如有故犯察出連父兄一併除名治罪如此則籍貫可清積弊可除矣臣職司學政清查冒籍分所當然何敢瑣瀆天聽但積弊相沿日久若不具題經部議覆恐後不無仍致廢弛理合繕摺先行具奏是否可行伏乞聖主訓誨指示謹奏可嘉之至若不題明不但冒濫之弊終不能免且恐為後來提學者仍留任意通融之地具疏題奏可也雍正六年九月初六日山西學政國子監司業臣勵宗萬謹奏為恭謝天恩事本年八月二十四日臣家人齎捧硃批奏摺到臣臣叩首展觀欽奉皇上恩懃訓誨責臣少年輕率之愆教臣謹愼保全之道臣跪讀之下惶悚戰懼罔知所措竊思臣以新進小臣荷䝉天恩畀以督學重任陛辭之日又䝉我皇上諄諄訓誨期望成全并賜奏事摺匣臣承此厚恩夙夜惶懼唯知上畏我皇上之法不敢稍有顧忌上感我皇上之恩不忍稍有欺隱凡有所聞據實密奏期無負此特恩何敢以密奏之事宣露於人自取罪戾但臣賦性庸愚事關陳奏訪查再三以致不自檢點或訪問之間為人窺測事内之人臆度張揚實未可定是臣疎忽之罪萬死難逭幸䝉天恩不加譴責特頒諭誨懃拳肫切臣稽首叩謝之餘自愧自恨無地自容惟有加意謹密痛改前非矢竭犬馬力圖後效以仰副我皇上期望保全之心於萬一耳謹此繕摺叩謝天恩不勝戰慄惶悚之至謹奏能改與否在汝自為朕何能强之使然餘所奏數摺留中候與廷臣商酌有旨同日又奏為據實奏聞事竊臣擬於九月初六日起身自省前往岢嵐大同等處考試正在收拾冊籍整理衣物間不料於初三日夜被盜入署將臣所帶皮棉衣物二箱并恩賜貂褂一件青膁袍一件蟒縀一疋俱行竊去臣天明始知隨加查驗蹤跡實有多人似有暗進明出之狀除移行撫臣嚴飭各屬拏緝外臣不敢隱黙謹據實奏聞謹奏汝辜恩不密應招此等失竊之報從兹戒愼修省痛自刻責毫不怨尤庶可免將來意外之虞也雍正六年十一月初三日山西學政國子監司業臣勵宗萬謹奏為感激天恩敬陳謝悃事本年九月二十三日臣齎摺家人回晉復䝉聖主天恩頒諭訓誨警戒提撕臣跪讀之下感悚交至又接閱臣父手信僃述我皇上訓誡微臣改過之盛心勉勵微臣自新之至意殷殷期望雖天地父母之恩無以踰此臣雖至愚極陋同於木石之無知敢不改過自新力圖犬馬之後效臣父子唯有共加黽勉竭盡愚誠以仰報聖主高厚洪恩於萬一耳謹此繕摺恭陳謝悃伏乞皇上睿鑒謹奏不患有過貴無憚改能改則無過矣勉之同日又奏為密奏事竊臣於十月十三日按試大同科考知府例當提調乃新任知府吳槃于臣到府之先二日兼程赴省臣思考試關係大典知府有提調之責非緊要事件何至急遽上省隨留心察訪聞大同府之大有倉係知府經管内存貯軍需米十餘萬石已歴十有餘年今吳槃到任之時因此項米石多有蟲蛀霉爛不肯收受交代而署印知府徐榮疇又因此項倉米當日㕘革知府許惟訥交代之時係寧武府知府郎瀚潞安府知府王景望平定州知州青阿立等奉委公同盤查報無虧少竝經御史性桂騐同加封署事以來未經開視等語俱經回明撫臣藩司撫臣石麟檄委雁平道湯預誠并調原盤之府州等官公同查騐至今尚未到府其應作何清理竝作何賠補之法撫臣自有歸結因事關邊儲臣既有所聞不敢不據實密奏再臣又聞得大同府屬之應州靈邱縣廣昌縣均有從前歴任交下虧空未經清結雖屬風聞未知詳確臣亦不敢隱徇謹繕摺一并密行奏聞伏乞聖主睿鑒謹奏覽欠糧生員停考一摺所奏甚屬可嘉摺留中雍正七年三月二十日山西學政國子監司業臣勵宗萬謹奏為奏聞事竊臣因科考太原府并平定等州事竣在省料理冊巻前赴潞安於三月初一初二兩日連獲膏雨初十日又獲霖雨至十二日午後始晴四野沾足臣十三日起身赴潞安一路經過太原府所屬之陽曲太原祁縣徐溝遼州所屬之榆社沁州并所屬之武鄉潞安府所屬之襄垣屯留長治等各州縣一帶地方俱皆同日得雨沾足所種冬麥俱已發生青茂而春麥亦俱已乘時播種民情愉悦感頌天恩理合將得雨日期竝臣一路目覩兩麥情形繕摺奏聞謹奏覽奏得雨情形深慰朕念又所奏請托一摺留中候降旨飭令密審殊屬可嘉之至悉能如此秉公不隱汝之福將來不可限量也勉之雍正七年七月二十一日山西學政國子監司業臣勵宗萬謹奏為奏聞事竊臣䝉皇上天恩畀臣督學三晉臣到任受事之時查前任學臣沈錫輅在任雖有年餘因患病時多止歲考太原等府中小之區其平陽一帶大學均未歲考臣任内又遇特恩於科考時選取拔貢臣約計時日不能必其限内考完當經援例題請展限荷䝉恩旨敕部議准展限五箇月在案臣自上年正月出棚歲考以來連塲考試不敢茍且從事亦不敢玩曠偷安今科考通省已經全完而拔貢一項亦俱已選定現在旋省考錄遺才竝造冊發司料理文闈事務俟三塲完畢臣即將通省拔貢巻冊連人一竝送部繕疏具題恭候皇上親加考騐所有臣任内科考造冊報部及彚題舉黜優劣案件并㑹同撫臣騐看歳貢等項臣現在逐一次第辦理完結於武塲榜發之後查取中式武舉親供畢臣離闕日久戀主情殷即擬束裝就道星赴聞再查山西士子歴來科考者甚少目今涵濡聖化士子力圖上進奮志入闈者甚多臣較對前次冊案竟多十之三四合併奏聞謹奏據奏士子咸奮志上進朕嘉悦覽焉同日又奏為請旨事竊查河東設立運學乃國家優恤商人之曠典祇緣數十年來商民混考作姦舞法誠為學校之弊藪經臣具摺奏請聖訓荷䝉恩旨准臣具題隨經部議欽奉俞允令臣徹底澄清永除冒濫在案今臣按考平陽即檄行各府州縣并行鹽法道嚴加查察毋許商民混冒臨塲又復諄切告誡不意有武舉梅獨竒者身係坐商膽敢藐視定例勾引臨晉縣軍籍童生梅認為胞姪冒入運學考試經臣臨塲查出當即批行提調官解州知州拘集有名犯證究審去後嗣據該州詳稱審據各犯口供坐商梅獨竒通同冒濫衆口僉同而梅獨竒倚恃武舉揑供搪塞且將案内應質之要犯伊弟梅獨芳膽敢藏匿不令出審甚屬藐抗等因鹽法道姚培和均有失察冒籍朦混送考之咎但縣考道考之時惟憑坐商親屬承認該管官員非不加意嚴查總因梅獨竒將梅認為胞姪以致被其混入似非有心疎縱可比且安邑知縣車敏來在晉年久尚屬黽勉稱職之員鹽法道姚培和到任方新正在整理鹽政臣仰體皇上鼓勵人材之聖心不敢冒昧遽行糾㕘合先將緣由繕摺具奏可否免其㕘處出自皇上天恩伏乞聖主指示遵行謹奏此事情有可恕不必糾㕘雍正七年九月二十四日山西學政翰林院侍讀臣勵宗萬謹奏為請禁屬員無益之㕘謁以重職守事竊惟州縣為親民之官職守綦重而城池倉庫尤關緊要非有奉公差遣不得擅離地方定例昭然遵奉已久若屬員非係公事或因上司陞轉或遇生日年節擅離職守赴省㕘謁不惟僕僕道路往返無益抑且地方公事難免遲誤臣近因在省見臬司臣蔣炯䝉皇上天恩陞授布政司合省府㕔州縣紛紛到省㕘賀者甚多竝有地隔千里之州縣亦來謁賀者雖藩司諭令速回而往返徒勞荒廢政務一省如此他省可知臣仰請皇上敕諭督撫藩臬諸臣嚴飭屬官凡遇上司陞轉生日年節不得仍蹈故習赴省謁賀如有公事奉上司調遣者限文到日一面起身一面仍將奉何衙門調遣具文通報事畢回日亦具文通報各州縣有要緊公事必須赴省赴府商議者一面起身一面將情由具文通報以僃各上司查考敢有借名公務出境私謁者督撫諸臣察出照例㕘處知府同知通判凡出府境亦照州縣一體通報永著為例如此立法庶私謁之風可杜於地方職守不致曠誤矣是否可行伏乞聖主訓誨指示謹奏此奏可嘉朕另降諭旨飭行雍正七年十一月二十七日山西學政翰林院侍讀臣勵宗萬謹奏為據詳奏聞事竊臣據保德州詳稱本年十一月初二日辰時卿雲捧日外繞三環光華四射藻彩繽紛自辰至午照耀三時萬民咸相慶幸維時鄉耆士庶里老營兵衆口僉同以為從來未有實千載一時之景象昇平萬世之嘉徵又據河曲縣興縣先後詳報目覩竒祥等因詳報到臣欽惟我皇上至德格天深仁育物殊祥上瑞疊見頻呈晉省屢歲豐收民歌樂利兹保德一郡正在辦造軍需之時忽睹卿雲捧日足見民心踴躍上格天和至誠感孚捷於影響臣接閱之下不禁懽忻舞蹈除㑹同撫臣查明具疏恭賀外今據該州縣具詳到臣合先繕摺奏聞謹奏覩此捷如影響感應昭然之理不愈勵忠誠寅畏之心可乎勉之勉之同日又奏為奏聞得雪日期事竊臣查晉省農民首重春麥欲卜來年豐稔總以冬雪為憑兹於十一月初三日得雪一次約有二三分十八日又得雪一次有七八分又於二十一日夜得大雪一次至次日午刻方晴約二寸有餘一月之中連獲瑞雪實為來歲豐年之兆士庶歡騰農民慶告臣覩此情形不勝欣快謹將得雪日期繕摺奏聞謹奏晉省今冬較河南山東陜西得雪分數殊覺不足直隸亦然惟京城左近及京東一帶地方甚為優渥同日又奏為恭謝天恩事竊臣祖孫父子世受國恩臣祖先臣杜訥䝉聖祖仁皇帝知遇隆恩歴官刑部侍郎恭逢我皇上御極之初特頒恩命追贈禮部尚書臣父臣廷儀疊䝉聖恩擢至刑部尚書臣以弱質菲材復䝉聖恩督學山西疊賜陞擢臣一門三世仰荷高厚洪慈恩同覆載涓埃未報正切悚惶今臣父臣廷儀又䝉特恩加太子少傅臣任滿之時又奉恩命管理山西廵察事務受恩深重感悚難名惟有共加勉勵矢竭愚誠以圖少報聖主天地生成之恩於萬一耳謹此具摺恭謝伏乞睿鑒謹奏覽爾奏謝知道了益當加勉自勵以期無忝厥職雍正八年五月初十日翰林院侍讀管理山西廵察事務臣勵宗萬謹奏為奏聞縦容家人衙役訛税詐贓復用酷刑立斃民命之縣令事竊臣奉命廵察山西至太原縣地方訪得知縣龔新於本年二月間有陽曲縣民續其先在太原縣買有白布二半疋例不上税經過該縣市口有該縣收税家人周姓同快手賈榮口稱漏税即將續其先鎖至詹文魁店内共嚇詐大錢七百文布二半疋猶未飽慾又復勒要錢四千文續其先無力應允周姓等即將續其先以漏税稟縣知縣龔新隨差拏續其先到縣竝不查問布疋多寡果否漏税即用大板重責三十板復用大枷枷出以致續其先即日殞命屍弟續其盛雖在司府等衙門具呈未見深究似此殘酷劣員臣既訪聞確實不敢隱匿謹據實奏聞伏乞聖主睿鑒謹奏言之撫司嚴行查究雍正八年十一月十六日翰林院侍讀革職仍留山西廵察之任効力贖罪行走臣勵宗萬謹奏為恭謝天恩敬陳愚悃事竊臣輕浮躁率自蹈重愆經撫臣具摺㕘奏仰䝉聖恩不即罷斥留任効力贖罪又經撫臣具疏題㕘復荷聖恩令臣明白回奏臣聞命之下感激惶愧頂戴鴻慈高深莫喻除遵旨恭疏明白回奏外嗣後惟有敬凜訓旨益加謹愼實心效力以贖前愆斷不敢挾私苛索分外生事致負聖主教誨矜全之鴻恩耳所有微臣感激愚誠謹繕摺奏謝伏乞皇上睿鑒謹奏爾雖具疏回奏尚未䝉朕寬免之旨事未了結何便具謝恩之奏耶同日又奏為奏聞河津縣歴年衝塌地畝竝村莊民舍數目亟請疏濬淤沙以安民生事竊查絳州屬河津縣西南一帶地方逼臨汾黄二河每當夏秋水長之時所有近河村莊田畝廬舍多因水刷沙岸恒有侵䧟坍塌之患臣於九月間廵察至河津縣親到該縣西南界臨河之處遍行查勘并詢問附近居民據稱汾黄二河深為河津西南一帶之害緣水由地内潛行逐日刷刮每遇一時衝決田畝房屋多致沉䧟居民難以預僃遷徙臣隨詢問防禦之法又據稱河沙坍漲不常疏濬既無所施土質不堅築堤亦屬無益惟將對面山脚下淤沙疏濬則水性舒緩可免坍陷等語臣到縣城知縣張渡進見臣即訊問河水情形據該縣歴歴陳説與臣所詢附河村民之語相同臣復詢問歴年坍陷地畝房屋數目隨據該縣分晰年分細數開具印單到臣臣伏思我皇上御極以來刻刻以民生為念惟恐一夫不獲其所今河津一縣西南臨河地方被水侵刷之處既據居民僉稱對河山下疏濬淤沙即可安居樂業似宜亟議疏濬保衞民生兹當冬令河水消落之時正可相度情形以待春融動工修濬臣既親歴其地不敢不據實奏聞竝將知縣張渡開送被坍地畝村莊數目清冊謹另繕摺一併恭呈睿鑒謹奏山下淤沙應作何疏濬之處言之撫臣可也雍正九年正月二十一日翰林院侍讀革職仍留山西廵察之任效力贖罪行走臣勵宗萬謹奏為請旨事竊臣自廵歴以來見每汛只設兵丁三名大路計十里一塘僻路或二三十里不等夫此項兵丁原為盤緝姦宄操防守禦而設非為遞送公文而設也其遞送各衙門公文則有額設舖司如有關係軍務等事則由驛站馬上飛遞此例遵奉已久乃自雍正六年因一時權宜遂成定例竟將武職衙門一切公文俱由汛兵遞送臣所到州縣親廵汛地或有通汛無一兵者細詢其故總為公文絡繹遞送不及此角未去彼角又來前汛無兵接受只得越汛齎送跋涉紛繁遂致緊急差務無護送之人衝途僻路無守禦之伍而舖司於遞送文員公文之外別無一事臣查舖司之設原為遞送公文汛兵所司專在防緝姦盜嗣後各宜遵守成例永逺奉行其有事關緊急軍務者則特令驛站馬上飛遞至一切平常公文仍歸舖司齎送庶汛兵之責守得專而要地之事機無誤矣臣謹陳管見仰請皇上敕下撫鎭諸臣㑹同查議或容臣恭疏具題伏乞聖主批示謹奏著該撫鎭㑹同查議具奏該部知道雍正九年三月二十五日翰林院侍讀革職仍留山西廵察之任效力贖罪行走臣勵宗萬謹奏為奏聞事臣仰䝉恩命巡察山西稽查通省盜竊各案係臣專責臣自受事以來當即通飭各府州縣平日力行保甲稽查匪類遇有盜竊案件發覺務令即時通報毋得隱匿更令嚴比捕役躧緝賊犯訪拏窩線清姦宄以靖地方臣仍恐各屬有諱盜之弊頒發條約務令按月出具印結以憑查核晉省頻年來疊䝉聖主教誨養育之恩雖山僻小民皆知務本力農各安生理且屢登大有家給人足姦匪潛消一年之内其強刦之案止有天鎭縣王氏家被盜一案盜犯五名旋行全獲其鼠竊之案通省一年共二百八十五件經臣檄行勒限嚴緝於限内已經拏獲審結者一百七十六件臣目擊三晉風俗醇良民安盜息不勝歡忭合將情形繕摺奏聞謹奏晉省盗賊消弭情形朕欣悦覽焉同日又奏為敬陳芻蕘管見仰祈聖訓指示事竊臣仰䝉恩命巡察山西今已徧歴通省所有關係吏治民風驛務營伍似應斟酌損益者六條敬抒管見為我皇上陳之一吉州所屬之蒲縣應改隸隰州也查雍正二年經撫臣諾岷題將吉隰二州改為直隸州隰州轄永和大寧汾西三縣吉州轄鄉寧蒲縣二縣但由蒲縣至吉州路皆崇山峻嶺虎狼窟穴自來不通必經隰州之仵城鎭等處相隔二百一十里始達吉州一切遞送文書解審人犯應考童生路途不順跋涉維艱而由蒲縣至隰州只一百里通衢大一各屬驛站應交各該守道就近稽查也查山西驛道一員專司通省驛站定例一年之内親到各屬驛站稽查一週今於雍正八年准部議將山西驛道加銜冀寧道令其兼管太汾潞澤四府遼沁二州夫以驛道而令兼管地方則刑名錢穀事務殷繁況又有盤查之責欲其通省巡歴勢所不能查晉省河東道一員管平蒲二府絳解吉隰四州鴈平道一員管大朔寧三府平忻代保四州二道本有盤查之責似應即令於盤查之時就便稽查驛馬出具印結報部如有疲瘦惟該道是問至於奏銷仍歸冀寧道經管以免參差如此則各道分一軍站歸併州縣之馬宜有專司也查雍正六年經侍郎臣馬爾泰條奏晉省各驛站其在州縣者歸州縣管理所有驛丞應行裁汰其距縣窵逺者歸驛丞專管奉部議准通行在案臣查大同府一帶向來多係衞所所有站馬即係驛站原均屬武職管理於雍正七年經原任提督袁立相條奏所有軍站馬匹俱歸州縣管理亦經通行在案但查軍站有在州縣城内者責令州縣就近管理甚便其有相去窵逺者州縣鞭長不及似應照馬爾泰所奏均歸驛丞專管查大同府之聚落站朔平府之高山站威逺站井坪站寧武府之水泉站老營站利民站八角站三岔站代州之廣武站及所屬之平型站俱距州縣窵逺均應即將奉裁留晉改一冗驛宜裁以省錢糧也查驛站所以應付差使倘有虛設自當裁汰臣巡歴所至查有汾州府永寧州之玉亭吳城青龍三驛向因路通陜西吳堡縣地方文書往來設有驛站近因文書俱由保德州一路傳送三驛竟成虚設再查寧武縣之寧化一廣靈一縣地處通衢防兵宜行添設也查各州縣分設防兵原為捍衞城池倉庫稽查匪類而設臣巡歴各屬見省城以南如平陽等内地州縣各有防兵五六十名及一二十名不等惟大同府之廣靈縣路當衝要只有防兵五名實不足用似應仰請一邊民出口耕種應禁其攜帶家口以杜逃糧之弊也查出口舊有禁例近因我皇上德威逺播中外一家所以歸化城一帶地土豐沃大同等府居民出口耕種者甚多但臣訪聞邇年出口之民不止隻身前去竟將全家搬移出口散居土黙特各村落者不下數千家臣細查此等皆内地無藉之徒抛荒田産拖欠丁糧不安本分挈家逺去久而忘返大同一帶積欠不清皆由於此若不禁約勢無底止以臣愚見似應嚴飭沿邊地方加意盤詰并飭歸化城同知嚴查口外各村落凡有大同一帶人民挈家居住者確查造冊定以期限勒令將家口送還内地若隻身種地之民仍以上六條臣因地方情形起見謹將大畧繕摺具奏如有可採伏乞聖主批示臣再詳細繕本恭疏具題謹奏覽一勵宗萬初抵太原府令陽曲縣多僃執事人役伺候日需五六十人皆該縣墊給食物又令買好騾三頭每頭僅發潮銀十二兩在省二十餘日知縣賠累三四十金又有平定州知州安克寬向臣吿言兩次借銀二百兩出巡時所騎驛馬至二十餘匹之多州縣多雇騾馬僃用又轎夫摃夫十四名沿途需索雇値自五六兩至七八兩不等經過州縣約費二三十金又體統尊大知府跪迎行部輒行威刑官役擾累朕覺汝有少年驕縱躁妄之失所以屢屢面加訓諭今據人㕘論若此則朕之觀汝殊屬不謬也從此若不返躬内省痛自悔艾乃復妄為猜嫌揣度某某所奏則為怙過辜恩福淺命薄人矣朕一番期望成全汝之特恩寧不可惜愼為之審思之硃批諭旨巻二百四
