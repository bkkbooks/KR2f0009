body:
  text: 欽定四庫全書硃批諭旨卷一百五十八硃批博爾多奏摺雍正元年六月十八日户部銀庫郎中臣博爾多太僕寺少卿臣須洲謹奏為恭請皇上萬安事欽惟皇上德合乾坤心通造化和神爽氣身備春秋玉色金聲光昭日月自聖祖仁皇帝龍馭上賔哀毁骨立又遇皇太后鶴軿仙逝悲慟神傷兼之念切蒼生神周赤縣但求百姓之樂幾忘聖體之勞臣奉使以來身居山左心繫闕廷惟溽暑之未消冀聖躬之調護敬抒寸悃恭請萬安臣不勝犬馬依戀之至謹奏朕安覽爾等所奏雨澤并地方情形朕懷深慰摺暫留中爾等其殫心竭力料理於此兩月內必不令窮黎有一人填於溝壑方為不辱朕之使命也勉之雍正元年七月初九日户部銀庫郎中臣博爾多謹奏為恭報賑務事竊臣蒙皇上天恩差往山東查明飢民動帑賑濟於六月十六日前至濟南見雨水充盈秋禾茂盛即於十八日具摺奏聞外隨會同山東巡撫臣確議照麥收歉薄之處於濟兖東青四府屬及萊州府髙密即墨二縣分别大中小州縣衛所動帑賑濟大州縣發銀三千兩中州縣發銀二千五百兩小州縣發銀二千兩衛所發銀一千五百兩共九十八處實動藩庫銀二十二萬四千兩於六月二十三日公同驗明兑發各府轉發各屬飭令確查實在乏食窮民按口給散務使窮簷蔀屋盡沐皇恩臣於七月初九日親赴各屬巡查仰遵聖訓務使無一人填於溝壑以副聖主愛民如子之心再東省於發銀之後二十七至二十九三日連得雨澤各種禾穗俱碩大圓滿父老子弟咸慶豐收至截留漕糧欽差部員於本月初五日到濟臣同撫臣黃炳少卿臣須洲郊迎跪請聖安深慰犬馬依戀之意其漕務事宜撫臣已繕疏具奏合併聲明謹奏知道了勉力自惜更當約束隨從人等毋得倚仗欽差之勢騷擾地方雍正元年八月十二日户部銀庫郎中臣博爾多謹奏為奏聞事竊臣於六月二十一日入山東境內即留心地方官員賢否風聞藩司佟吉圖聲名狠好糧道余甸操守亦好到濟之後二員一被參拏即有士民曲文彬等百餘人環繞臣門具呈懇請題留以慰輿望臣不敢據一時之聞見冒昧奏聞及臣親赴各屬查賑單身密入村莊見百姓有聚談佟藩之事者莫不咨嗟嘆息感激好官七月十八日臣至濟寧州值佟吉圖解審河南百姓喧傳欲罷市保留其經過之處往往如此臣受聖主深恩故敢不避越職之罪冒昧據實奏聞伏祈睿鑒謹奏聲名雖好亦何能抵罪同日又奏為遵旨會審事竊臣於八月初六日回濟初七日即會同撫臣審理奉旨所交李元龍一案嚴審李元龍據供家産實係盡交王二掌管夾訊王二及夥紀李先實俱堅供花費無存止剩房産等項於初十日覆加嚴訊仍然供吐遊移臣現與撫臣酌議詳加嚴審務得實情再行具摺奏聞謹奏貪吏之私人莫非助虐棍徒同黃炳嚴加審追硃批諭旨卷一百五十八
