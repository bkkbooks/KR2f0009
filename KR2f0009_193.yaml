body:
  text: 欽定四庫全書硃批諭㫖卷一百九十三硃批赫勝額奏摺雍正五年十月十七日貴州按察使臣赫勝額謹奏為遵㫖事雍正五年八月初五日臣恭請聖訓奉上諭貴州巡撫何世璂前任臬司富貴居官如何之處爾隨路訪察一到任即具摺奏聞欽此臣一路訪察撫臣何世璂為人老實辦事盡心升任按察司臣富貴辦事平常除伊等居官實在如何之處容臣再細訪察一有確據即行具奏外今將臣路上所訪緣由先行奏聞謹奏凡百處惟以務實為要至於言人之短長評吏之優劣尤須秉公據實若少涉誣揑隱飾則代人受過矣切記勿忘雍正五年十二月初一日署理貴州布政使印務按察使臣赫勝額謹奏為恭請聖訓事竊臣至微至陋荷䝉皇上洪恩不次擢用特授貴州按察使到任以來敬遵聖訓一切命盜案件務盡愚誠辦理不敢稍有錯謬今䝉殊恩又命署理貴州布政使印務臣感激微忱已籲署撫臣祖秉圭代題并通省錢糧現在逐細清查俟查明另摺奏聞外伏思布政司承宣皇上政教統轄一省錢糧職任綦重臣才識短淺誠恐辦理未周必奉聖主訓㫖教導方有遵守為此繕摺恭請聖訓謹奏但專務實行毋徒尚虛言此外别無訓諭勉之勉之同日又奏為敬陳管見仰祈睿鑒事竊臣至微至賤幸䝉教育疊荷隆恩雖質本庸陋毫無知識而犬馬報主之忱實深五內不揣愚昧謬抒管見敬為我皇上陳之一城垣之設原以守土衛民最為重大黔省苖夷雜處更關緊要臣赴任時經過各府州縣有無城者有有城而傾頽者除現在奉文查估俟查估明確詳報督撫具題外查黔省錢糧無多兵餉尚係各省協濟若議修建城垣庫項不足支用竊思治國安民首在懲貪臣見大小臣工內廉介者固多而貪婪者亦復不少不肖之員剝削民膏少者積百成千多者盈千纍萬及至發覺不過其中一二雖按照律例治罪追贓猶得享用餘資若不嚴加懲處無以警戒將來請嗣後將此等貪贓官吏發至黔省著令修建各府州縣城垣及填築改站道路橋梁俟其家産盡絶後再將修過城垣用過銀數逐細奏聞請一黔省離京路逺凡選補各官每因盤纒缺少借貸艱難一時不能起身以致赴任稽遲故在省官員常有經年署事者未免兼顧為難伏思黔屬臣工俱荷皇上隆恩賞給飬亷臣請嗣後選補黔省之員如有盤纒無措不能起身者許其具呈户部持憑照驗借領庫銀即行赴任道府借二百兩同知通判知州知縣借一百兩佐雜等官借三十兩借後户部將借過數目行文該撫俟其到任後半年內令布政司將本官飬廉銀扣除全完於每年起解水硍時一苖性凶悍動輒劫殺燒虜地方官差人追捕則潜入山箐非技勇超羣者不敢深入查各州縣之捕快俱係召募鄉民雖年力強壯實不如兵丁之技藝嫺熟臣聞各營官辨跟隨伴當皆係兵丁是無技之鄉民委以緝捕重任以有用之兵丁反居閒散之地請稍為變通以此項兵丁撥給州縣頂兵矣一捆掠販賣最為黔省之患前經撫臣黃國材督臣高其倬先後具題定例不為不嚴而販賣之事不能盡絶者緣捆販與興販皆藉窩隱之人為之販賣實與開窑子無異若無此輩窩隱自無販賣之事定例止將伊等割斷腳筋且割筋又多弊竇是以無所畏忌販賣如故請嗣後窩隱販賣之人照開窑子光棍例將為首之人擬斬立决護送牽合及用銀興販之人俱照為從例發往寧古塔等處給披甲人等為奴事可以永絶矣以上四條臣灼知其弊冒昧妄陳伏祈聖鑒施行謹奏諒督臣鄂爾泰自然次第料理所奏知道了雍正五年十二月十五日署理貴州布政使印務按察使臣赫勝額謹奏為請㫖事竊查雲貴開墾事例部議令官生等交銀布政司出給實收一案臣署任後正行嚴禁包攬需索并飭貴陽等府招民開墾即據生員朱曙等陸續具呈捐監前來臣隨即查例照數彈收正在貯庫間據該生等稟稱從前事例俱有平頭及部費紙筆飯食等項今既無平頭所有紙筆飯食等項使費情願每畝加銀六分交收等語伏查從前事例原有使費等項今既據伊等踴躍急公情願每畝加銀六分相應如其所請一併彈收貯庫除稟明督臣鄂爾泰署撫臣祖秉圭外此項銀兩應請量給院司書役人等二三分為紙筆飯食之費餘盡入公以資開墾統於墾荒案內與正項銀兩一併造冊奏銷臣未敢擅便伏乞皇上批示遵行謹奏此非汝當專主亦非汝能料理之事但一一稟明該督聽其指示而行方是或將鄂爾泰如何料理之處事後隨便奏聞則可似此越分請㫖大不是矣戒之慎之將此諭録與鄂爾泰看令其知之硃批諭㫖卷一百九十三
