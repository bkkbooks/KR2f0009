body:
  text: 欽定四庫全書硃批諭㫖卷一百四十八硃批黃之雋奏摺雍正三年八月十八日提督福建學政左春坊左中允臣黃之雋謹奏為欽奉上諭事臣准督臣覺羅滿保撫臣黃國材移准吏部咨奉上諭凡文武官員曾經靣奉諭㫖除不能記載外俱將訓㫖一一詳細將年月日一同繕寫進呈等因通行到臣臣蒙皇上特恩命臣提督福建學政於雍正元年十一月初二日恭請聖訓蒙召見養心殿聖諭云汝學問好此去盡心辦事做官好朕知之不好朕亦知之臣隨叩謝蒙皇上重恩不次超擢臣惟竭盡臣職不敢纎毫茍且聖諭云非但不茍且凡地方上有所見聞可寫摺子奏來所奏之語切不要使人知務必謹密但不可因此挾制他人凡奏事摺可令家人齎進請安摺附督撫皆可福建路甚逺此去又有三年欽此臣字字銘心叩首而出自到任至今嵗試八府一州已竣臣見閩省文武大吏皆由皇上簡擇任用其人品行事皆在宸𠂻洞鑒之內至於府縣各官臣就按試時所見邵武府知府曹友夏清勤愛民漳州府知府耿國祚才優辦事臣試汀州時署汀州府事同知李暲勤慎有守試建寧時知府辦銅公出署建寧府事同知任煥亦有才幹又如莆田知縣朱子瓏南靖知縣彭璋長汀知縣趙煌俱謹慎晉江知縣葉祖烈勤敏福安知縣傅植明亮至臣所經過縣分一宿而去未能深悉就臣所見如此今奉上諭謹將前所請訓㫖繕寫恭呈御覽因奉訓㫖內令臣言所聞見謹連接繕寫固封遣家人齎進伏乞睿鑒謹奏知道了將前面諭之㫖另具摺單開寫進呈同日又奏臣材質庸駑荷蒙皇上簡任督學閩省陛辭之日跪領聖訓鏤心銘腑到任後復蒙皇上拔置坊僚兩邀寵擢感激無地伏念臣下之仰承皇上如天之覆幬皇上之知人善任如天之照臨無微不矚無逺弗屆臣今嵗試已周謹將臣所已行者據實敷陳以仰求訓誨臣自奉命以來日念督學一職首在端學術以正人心而厚風俗次及衡文以闡明聖賢之道臣見閩地負山襟海形勢壯固土俗皆能治生兵民皆知畏法良由聖德所暨者逺聖化所洽者深是故文武協和兵民相安山陬僻壤素稱刁悍之俗者亦皆率循至通省士子雖多向善守法而其間越禮犯科者亦所在而有臣仰體皇上教戒至意反覆開導刋布禁約纍數千言頒行府州縣學示以義利禍福已禁而仍犯者即行褫革悔過而自新者亦量豫開復又於學宫行香講書之時和氣正色令諸生旅進環立喻以皇上崇儒育材廣取士之額舉孝亷之行嚴加等之法有善必奬有惡必懲缺糧包訟萬萬不可又恐言語未必盡通令教官以土音遍告之繼蒙欽頒聖諭廣訓御製朋黨論即選工敬刋分行各學令生童朝夕肄業務使身體而力行之又閩為宋儒理學之邦臣留心採訪索其著述見諸生中有好學深思之士能發明理道之奧者意其行誼必有可取容臣核實而奬薦之庶理學一途人知所勸至於衡文以制義為憑臣謂不讀五經則根柢不深不參宋儒則理解不的不讀古文則筆力不髙不法先輩則家數不合而又非為人深濳純粹有所實得則亦不能暢然而成章臣刋發條約以此立教校試臣蒙恩視學有造士之職茍非殫精竭誠何以上報聖主下酬夙志是以校試所至凡屬生童視如弟子法嚴心慈手勤語復受任至今髮白眼昏而忘其勞瘁冀仰答聖恩於萬一今將科試各府略陳愚悃恭懇聖慈再加訓示俾臣益有所遵守以勉所未能不致有負皇上重選使臣之至意臣謹奏百凡宜務實行不在文字語言間也至於頌聖諛詞朕尤厭觀今此奏甚覺浮泛不切類斯等奏章嗣後竟可不必朕實無暇披閲也硃批諭㫖卷一百四十八
