body:
  text: 欽定四庫全書硃批諭旨卷一百四十硃批王朝恩奏摺雍正二年正月二十五日大理寺卿職銜調補浙江布政使臣王朝恩謹奏為清查浙省藩庫錢糧事竊臣奉廣東督臣楊琳撫臣年希堯準吏部咨奉上諭廣東布政使王朝恩著給大理寺卿職銜調補浙江布政使清楚浙江錢糧等因欽此咨院行司遵照臣當即恭設香案望闕叩頭謝恩并詳廣東督撫兩臣代題恭謝天恩在案臣即於雍正元年十一月初九日自廣起程至今年正月初六日到任準署布政使印務按察使臣王之麟移送交盤各册內開應存庫正雜銀共計六十八萬五千九百四十三兩零臣親詣庫逐項盤兑止有現銀三十八萬六千五百三十七兩零計缺銀二十九萬九千四百六兩零當即具詳督撫請飭清追又據册報缺少緣由一項滿漢官兵借支俸餉等銀一十四萬七千三百四十六兩零一項巡撫李馥提取銀四萬二千一百九兩零據稱買米補漕一項前司傅澤淵借支銀一十萬九千九百五十兩零或稱買米補漕或稱融支者臣身在地方未敢諉之已往自當代為補苴不致公帑懸缺又查巡撫李馥提取之四萬二千一百餘兩如果買米催令運米入倉亦可抵欵如米有不足應於李馥是問又查前司傅澤淵借支之一十萬九千九百餘兩除買米融支借給路費應俟分案著落外其餘不敷據議於雍正元年以前通省各年應捐俸工解補今傅澤淵雖經病故盤查保題之巡撫李馥現在以上缺少銀兩雖開報有抵而庫貯錢糧豈容久懸但臣既已照例詳明督撫應聽撫臣於交盤限內查追如限內不能盡數還庫撫臣仍令牽抵彌補臣自當據實奏聞請具摺奏聞謹奏覽爾此奏甚屬可嘉勉之新任巡撫黃叔琳將次到任俟伊抵杭爾其盡心協助將浙省吏治整理一新方不負朕之信任委託凡百據實一切無欺無隱為貴朕生平取人只一誠字爾等能以此事朕則獲福難量也同日又奏雍正元年十月內蒙皇上加臣卿銜調補浙江布政使清楚藩庫錢糧廣東撫臣年希堯轉傳勉臣上諭并蒙聖恩準臣具摺密奏欽此竊念臣一介庸愚向蒙聖祖仁皇帝不次超擢報稱無地任粵八載循職謹守庫藏無缺荷蒙皇上睿鑒加銜調補臣何人斯際此寵遇揣分已自不安又蒙溫旨遙頒勉勵諄切格外天恩委曲詳盡鏤骨銘心難報髙厚今於初六日到任除盤過庫項錢糧另摺奏聞外查浙省藩司向收節禮養亷收餉並無平頭每百止有添針銀二錢以為放餉補折之用臣今照舊收貯其節禮一項臣現在禁革惟有矢勤矢慎遵旨敬謹辦理期副皇上多方勉勵教臣做一好官至意惟是臣知識短淺浙藩任重必得親叩天顔面求聖訓地方事務庶免錯誤但藩司無請引見之例懇乞皇上恩施格外允臣所請俾臣得遂犬馬戀主之心實為萬幸為此具摺請旨謹奏爾等撫藩皆係新任何可擅離職守黃叔琳到來協同辦理數時土俗民情熟諳之後朕方有旨命爾來京陛見也至於地方應行事宜悉已明白面諭黃叔琳矣同日又奏臣於雍正二年正月十四日奉巡撫準到吏部咨文一件為嚴行查參事議得户部咨稱浙江巡撫李馥以雍正元年下運額銅八十三萬一千五百九十九斤零應於十月內辦解到部今時屆九月尚未報解將辦銅遲延嘉興府革職知府吳永芳指參移送吏部議處等因前來查銅斤關係鼓鑄事屬重大銅斤既有如許之多自應分委大員辦理止委知府一員承辦以致遲誤且十月內應解到部時屆九月尚未辦齊顯有侵蝕情弊該撫並不據實題參止將革職之員以遲延參送塞責以致下運銅斤遲誤應行令該撫作速查明侵蝕情弊並將原委各上司一併題參可也等因到院行司臣查訪得雍正元年下運銅斤因腳價銀兩發不足數以致承辦之官不能依限辦解再如雍正二年上下兩運之銅巡撫李馥已於上年三月內領去辦銅銀二十四萬兩尚未委員承辦第恐將來仍然滋誤事關鼓鑄臣有所聞不敢隱瞞理合一併奏聞謹奏銅斤一事爾奏明甚是李馥諸凡不妥迥非當日按察使聲名今江國英案內斷難姑容已有旨令其離任命黃叔琳前來矣爾將類此各務竭力秉公料理黃叔琳若有朋比瞻徇處即當密以奏聞至於爾之如何殫心效力朕自有照鑒非虛負臣工之人主也據實二字勉為之雍正二年八月二十四日湖南巡撫臣王朝恩謹奏本年七月十四日奉聖主面諭據兩廣總督孔育珣奏稱廣東藩庫流抵俸工爾任內應賠銀四萬兩朕批回伊摺內云王朝恩不日來京俟問過王朝恩應賠與否等諭臣回奏俸工原是督撫取去公用與臣無干但臣專司庫項督撫要用聽從取去即是臣之不是臣情願認賠蒙聖明在上不加罪譴允臣認賠臣之幸也安敢遲違今設措現銀二萬兩專候督臣孔育珣移文到日即行起解尚欠銀二萬兩臣向年在廣代商人完過鹽餉鹽價銀兩可以催追抵補斷不敢在湖南任內擅取分文有負皇上生成大德理合先行奏明伏乞睿鑒施行謹奏如此甚好清亷二字極宜加勉雍正二年十一月初四日湖南巡撫臣王朝恩謹奏十月十二日臣家人齎捧到臣奏補廣東俸工摺子奉有硃批臣跪讀之下不勝惶悚感泣竊念臣才庸識淺荷蒙殊恩特授巡撫重任時切冰兢敢不益勵清操上答聖明下保身命臣自十月初一日抵任以來贄儀節禮槩不收受考察官方不敢混劾一人臣蒙皇上生全大德惟有刻苦自勵不敢計及身家況臣從前藩司任內除用度之外尚有餘力可以辦公報效倘將來嵗久月深難以支持自當據實陳奏臣賦性愚拙從不敢曖昧欺心巧詐取錢自甘欺罔辜負聖慈臣之實心如此理合奏明所有奉到批摺及臣在浙藩任內奉到批摺一併恭繳謹奏覽奏知道了若不交通聲氣趨奉權要一已所需能費幾何自然易處矣怡親王乃為國惜才之賢王朕所深信不疑者料無苛索於爾之理爾果一心奉公家門私事王儘可照管有餘其他怙勢僥利之輩又何必舍已之身家性命而為之填無厭溪壑耶即目今隆科多年羮堯亦不能為汝致福降禍且二人曾在朕前奏汝不堪信任爾須奮勉自勵全朕特用顏面庶不致被人所笑勉為之假朕恩以為已力喪心無恥者頗不乏人切勿為其所愚但信此數行硃諭好同日又奏臣於本年七月內在京陛見時奉皇上面諭湖北臬司蔡起俊官聲何如密訪奏聞臣欽遵聖諭到任後即密行訪察未聞蔡起俊做官有要錢不好之聲名但其為人粗率性情不好是實聞伊起身進京時督撫催令各屬將蔡起俊名下原定應得養亷給與湊完前任官庫銀兩臣訪聞如此理合據實回奏伏乞睿鑒謹奏知道了蔡起俊乃倚恃隆科多度日之人無足取者同日又奏臣在京陛見時蒙皇上面諭湖南安仁縣減則一事著問布政使朱綱如何不行細查即詳巡撫具題欽此欽遵臣到任後即傳旨詢問朱綱據朱綱回稱此案係雍正二年二月二十五日奉前任巡撫魏廷珍批前任藩司鄭任鑰文書著令另敘簡詳以便具題隨行衡州府查詳去後朱綱於三月十三日到任續據府縣詳到理應稟請撫院再行踏勘乃照前司奉批舊案遽即轉詳請題是朱綱冒昧疏忽之處求轉奏懇皇上寬宥等語理合據情轉奏覆旨謹奏所奏知道了朱綱行止輿論不一依朕觀之似欲速成者然否據實奏來密之同日又奏為欽奉上諭事案查雍正二年八月十九日欽奉上諭國家分理庶績務在得人道府州縣等官尤屬要職其有才幹素著亷潔自持者不得以時上聞何以示勸於各省道府同知通判州縣等官內著總督保奏三員巡撫保奏二員布政使按察使各保奏一員將軍提督亦屬本省大員將所知者亦令保奏一員俱各密封保奏不得會同商酌等因欽遵在案臣於十月初一日到任恭誦聖諭理應遵旨保奏二員但臣到任未久湖南地方遼濶通省屬官賢否尚未周知保奏官員一時未便草率容臣細加訪察必得深知灼見方敢據實保奏理合先行奏明伏乞皇上睿鑒謹奏所奏是得人時再行補奏可也同日又奏本年七月內臣在京陛見時蒙皇上面諭湖南田賦不均百姓未能受益此誠聖主明見萬里澄清欺隱包賠之至意臣自抵任以來檢閲卷案併據百姓紛紛陳訴細察其中所以不均之故蓋自康熙二十八年經湖南巡撫興永朝題請丈量起至四十五年巡撫趙申喬題請勒限墾荒陸續報墾升科之後五十二年巡撫潘宗洛以湖南荒蕪田地除厯年報墾外尚未墾田五萬一千五百餘頃實在人力難施請照各省之例免其勒限具題奉聖祖仁皇帝遣郎中瓦爾渾會同總督額倫特親身詳悉查勘前任藩司阿琳慮其滋擾竟令原未墾完之長沙等四十一州縣俱報全墾足額造册六年升科其實皆係照額攤加從前欺隱者仍復安享如故而包賠之户益覺受纍頻年搆訟無休錢糧拖欠官民交困五十九年期屆升科民情不服嘵嘵訴辨前撫王之樞於四十一州縣內摘題長沙等一十五縣減則徵收以慰輿情今雍正二年前撫魏廷珍任內又因安仁縣百姓不服據詳題請照例減則奉旨令臣遴委賢員履畝確查分析上中下科則造册現在遵照間臣復訪聞得十五縣減則一案前撫王之樞以公費為名令前藩司宋致將嶽州府知府許玠應領辦銅銀內那去二萬八千餘兩嗣因許守辦銅急需又令各縣將已徵減則銀兩那與許守辦銅以俟捐還收不足數復那長沙府知府張楙辦銅價銀還給許守將未經收完減則之銀抵還張楙究竟未能全補宋致賠銀六千餘兩以完此局而減則公費一項經新司朱綱查揭魏廷珍題參湘鄉護撫朱綱題參益陽善化總督楊宗仁題參湘隂併聲明長沙等十一縣自必一例濫派公費名色請飭一併提質將來研審自然水落石善愈增擾纍臣凜奉諭旨現與司道等悉心籌畫容另請旨遵行合并聲明謹奏清丈田畝大事也甚有關係切戒輕舉須爾與楊宗仁朱綱三人同心合意察明情弊籌畫得宜然後公同奏請絲毫不容草率朕意且將包賠之户應減則者查題其欺隱之田應增額者徐為設法漸次料理方好萬不可失於急遽同日又奏本年九月二十八日臣行次醴陵縣接得布政使朱綱奉總督楊宗仁轉鈔皇上諭旨將此條奏二摺交與總督巡撫並轉發湖南巡撫可將其中應當施行并或有未便施行之處俱詳悉斟酌回奏併鈔送條陳二摺到臣欽此欽遵今議得條陳一件為請立苗猺之約束以安邊徼以靖凶頑事條陳內開楚南民猺雜處如永保郴靖等處洞數甚多惟以搶奪為事道州永明等處界連廣西之富川等處粵地苗猺越境為非邊地光棍勾引生事捉人勒贖請令有苗猺州縣將洞寨查明照民編甲設立練總寨長如有干犯著落拘拏生苗凶惡難馴惟防伊等出入杜絶土棍勾通交界設汛互察文武疏諱照例處分等語臣查苗猺原有生熟之分熟者耕鑿飲食與齊民不甚相遠但生性獷野時有搶奪貽害地方究其根源亦由近洞姦民勾引教唆搆釁惟有飭令有司嚴禁附近居民不許出入洞寨致起禍端違禁查解盡是法懲治則苗猺無勾引之人自不敢於生事查厯來原設有土千百户在總督衙門給發委牌管轄箐之中言語衣食不與民同又以熟苗熟猺為耳目時出邊界作祟不法之徒亦有串通熟苗熟猺引線潛入彼地搆釁為患者臣檢閲卷案生苗生猺出入之處現有附近鎮協營汛分防彈壓失事照例詳參已如條陳所云今再移行文武嚴飭苗猺雜處州縣實力奉行內地之保甲加謹隘口之稽防則民自為民生熟苗猺各以類聚不致彼此奏條奏之語未免稍過楊宗仁所奏又太輕視爾此論適中允妥與朕意合嚴飭屬員實力行之可也同日又奏竊臣接布政使朱綱奉總督楊宗仁鈔送皇上諭旨並條陳二摺到臣除請立苗猺之約束一事另摺議奏外今議得一件為嚴禁楚習之刁橫以肅紀綱事條陳內開楚中獷悍成風惡襟土棍動即勒衆逐官罷市又有甫經摘印乘機打入私衙併有擡聖賢牌位打架教官不加禁約反串通漁利上司漫不查究以致刁橫日甚請分别嚴禁如遇聚衆罷市等事果係官吏貪汚參摘治罪亦當嚴首倡之罪若止緣棍徒拂意橫行者竟將棍徒從重治罪至巳被參之員再打入私衙肆無忌憚同城文武立拏為首解治如有隱匿嚴加處分至擡聖賢牌位打架教官隱諱漁利從重治罪等語此誠整飭紀綱挽回風俗向來原有例禁應如所奏施行抑臣更有奏者大凡刁橫惡習半由州縣之激起半由督撫之縱成如去年九月內安仁縣知縣田仁被參摘印有百姓鬨鬧縣堂一事臣到任後檢閲舊案雖田仁所稱搶毁皇上格外𢎞恩簡任楚疆固不敢縱官虐民致滋多事亦不敢任豪強襟棍結黨把持挾制官府有傷國體臣惟事事仰遵聖訓潔已奉公寬猛交濟不使官民之勢偏重此風或可漸息即或一時未能頓改遇有前項不法等事亦必據理揆情分别究治務期處置得宜無負我皇上飭吏愛民之至意也謹奏果能行與言符朕不為湖南顧慮矣勉為之雍正三年二月初三日湖南巡撫臣王朝恩謹奏雍正二年十二月二十八日臣標把總捧到臣代朱綱陳奏自認安仁縣田畝減則一案疏忽摺子奉有硃批臣抵任以來看朱綱身家殷實錢糧謹愼誠可委信惟操切苛細罔知大體人多怨望至於有無欲速之處無由窺其衷曲不敢冒昧指陳理合據實奏覆伏祈睿鑒謹奏知道了觀汝二人似不相合若然於地方民生無益果汝二人彼此矛盾朕但是朱綱而不是汝不可不知也朱綱劣處如有真憑實據指明參奏則可倘懷私不睦暗相傾軋將來汝必至於虧辱密之同日又奏為恭謝天恩事雍正二年十二月二十八日臣標把總齎捧皇上頒賜哈密瓜二箇并皇上批回臣奏刻苦自勵摺子到署臣恭設香案望闕叩頭謝恩訖敬啓摺匣跪讀硃批竊念臣賦質既拙學問又疏自服官以來兢兢自守介然獨立從不知通聲氣迎權要是以人人皆以鄙吝目之今蒙皇上委任封疆重寄又荷推誠指示奚啻家人父子長跪三復涕淚交垂臣行年將近五旬氣志已定此心止知有皇上不知有身家止知報聖恩不知迎權要第慮知識短淺地方事宜措施難必一一盡善仰祈皇上時賜教誨免致隕越庶臣有生之日皆報效之年矣所有微臣感激私衷理合虔申奏謝伏祈睿鑒謹奏亟當小心勤愼聲色娛戲最能廢事豈膺封疆責任者所宜且聞爾家口衆多用度甚繁從何而辦撫標營伍廢弛已久須常加訓練鼓舞兵辨爾非尋常受恩之人可比若孤負委任壞朕用人之名必重懲以示戒愼之勉之同日又奏為奏聞事欽惟我皇上念切民依首重農事凡各省之雨水田禾無時不上厪聖心臣自上年十月初一日抵任即檄行通查據各府州申報自十月以迄十一月天氣晴明田家及時收穫十二月初五六等日天降瑞雪十七十八等日得雪一尺有餘本年正月雨澤調勻菜麥俱好又據布政使朱綱開報目下米價每石八錢四五分至一兩四五分不等地方相安商民樂業除將來雨澤及春耕田禾容臣再奏外所有冬雪春雨及目前米價緣由理合奏聞以慰聖懷謹奏覽奏雨雪米價情形曷勝欣悅但須一一據實直逹不可絲毫粉飾同日又奏竊臣標把總齎捧到臣奏湖南田賦不均摺子奉有硃批臣跪讀之下仰見皇上至德如天愛民如子謹密商督臣楊宗仁布政使臣朱綱同心合意漸次料理斷不敢草率輕舉致負皇上子惠湖南地方之德意也理合奏覆臣再有陳者據朱綱呈詳湖南自康熙四十六年奉有部文嗣後承認開墾於六年後照下則起科俟納過五年仍照原則徵收至五十三年四十一州縣一所題請全墾部覆雖止云於五十九年照下則起科未曾載有納過五年仍照原則徵收之語然亦並無永照下則不必復原則之明文其四十一州縣一所內除長沙等十五縣於五十九年起科之時因田地依山沙磧實甚業經題明減則并麻陽等四州縣一所於五十九年已照各本則起科均無庸復則又安仁縣現遵部文俟勘明上中下則另報外其湘潭等二十一州縣例屆復則之年理合呈請題明等因連詳到臣臣三批該司確查而該司執定康熙四十六年認墾復則之例必欲具題復則但該司現詳復則州縣之內尚有瀏陽等縣各以田地瘠薄辦賦維艱詳請永照下則徴收臣若不批令通行查明能復不能復竟以一例復則具題將來復則之後而各州縣仍以田地瘠薄辦賦艱難為請豈不於國計民生均無裨益輾轉思維不敢一槩坐定復則冒昧率題除據詳具疏題明外理合一併奏聞統惟睿鑒謹奏爾乃通情之論朱綱亦據理之見具題到日候朕酌定同日又奏為恭謝聖恩事雍正二年十二月初六日準通政司封發臣奏嶽州衛所屬地方被災分數勘明另題一本奉有皇上嚴旨飭行並將原本發回欽此臣跪讀之下不勝惶悚隨查此案於上年十月初八日拜疏之後即行復勘明白就於是月二十八日一面題報一面仰體皇仁行司散賑未敢後時竊念臣賦性愚拙凡關錢糧事件未免過於愼重者恐有草率致涉欺朦是以前案只知確查為急遂失先後之宜誠屬錯謬乃蒙皇上不即加顯責而復訓諭周詳將本發回天地包容不是過也臣晨夕思維不禁涕零嗣後辦理庶務惟有恪遵聖訓倍加謹慎仰答洪恩於萬一耳為此具摺奏謝謹奏大都為己之念重為國計民生之念輕所以每有此等錯謬若果秉公執正但知有國而不知有身斷不如此也總之為人臣者能屏盡私腸則無事不辦無往不宜勉之同日又奏為欽奉上諭事雍正二年七月十八日臣在京陛見時奉皇上手授諭摺諭湖廣總督楊宗仁湖南巡撫魏廷珍湖南地方苗猺雜處必綏理有方乃能移風易俗聞吳三桂竊踞之時內地居民有義不從逆避入苗猺籍內者久淪殊俗深為可憫今願歸民籍者宜令地方官聽其改籍為民又自古治苗猺之法惟以威武未能濡以文教我聖祖仁皇帝道化翔洽無遠弗屆熟苗熟猺俱令就試入學異方丕變但當時嚮學者尚少原議之處未廣今聞各處苗猺多有讀書求試者宜一體收羅并許應試夫使良民脫於苗猺使苗猺躋於學校此國家安民化俗之要務為大吏者所當留心察訪而並行之爾等並未加意經理是為有負封疆委寄之重著即會同詳議具奏用𢎞懷遠敷文之化特諭欽此欽遵臣抵任後遵即一面咨移督學二臣公同詳議一面檄行藩司查議通詳并飭先將內地人民從前有避入苗猺籍內者通行有苗各屬遍示曉諭宣揚聖德許赴地方官呈明聽其各歸原籍如或有年久難於稽查原籍者令地方官酌量安插務使各得其所以副皇上矜恤邊民之德意其苗猺嚮學之士現據藩司詳稱近年以來文風日盛各處苗猺多有讀書求試者今既蒙恩旨下頒應請將附近苗猺之州縣酌量於額外議定取進童生三名準赴州縣應試永為定例等語臣又移查學臣咨商妥確另行會疏具題請旨定奪緣奉上諭理合會同督臣楊宗仁先具摺覆旨伏乞皇上睿鑒謹奏知道了料理苗夷事務比內地更宜公正勤愼勤之一字在爾尤當加勉雍正三年四月初三日湖南巡撫臣王朝恩謹奏為恭謝聖訓瀝陳愚衷仰祈睿鑒事本年三月二十七日臣家人齎捧奏摺回署跪讀御批極當小心勤愼聲色娛戲最能廢事豈膺封疆責任者所宜且聞爾家口衆多用度甚繁從何而辦撫標營伍廢弛已久須常加訓練鼓舞兵辨爾非尋常受恩之人可比若孤負委任壞朕用人之名必重懲以示戒愼之勉之欽此伏念臣賦性庸愚才疏識薄荷蒙皇上加恩教訓不啻家人父子今奉硃諭諄諄惶愧之下無地自容臣自思從前聲色戲娛之事自逸樂皇上為臣慮及於此高厚深恩感激涕零臣之愚計祇有痛加節省刻苦自勵而已至於訓練營伍鼓舞兵辨臣到任之初即示期簡閲臣標兩營及長沙協營將辨兵丁俱經犒賞奬勸逮後按期操演鎗箭不容少懈又見營中鳥鎗長短不齊選匠打造盡改合式營中之弓有舊損不堪用者已捐製二百張分發更換兩營技勇舊無藤牌臣捐資專差赴廣置造牌刀於步兵內挑選演習以壯軍威此皆臣分內當行之事從前不敢冒瀆天聽兹蒙皇上諭及用敢據實直陳仰祈睿鑒謹奏只在實行不在空言勉之雍正三年六月二十五日湖南巡撫臣王朝恩謹奏為恭謝天恩事雍正三年五月十八日臣家人齎捧皇上批摺到楚併捧御賜紫金蟾酥各種藥錠一匣臣即郊迎至署恭設香案望闕叩頭謝恩訖竊念臣僃員封疆寸長未效乃荷皇恩疊頒賞賜惶悚靡已今當盛暑之時又蒙御賜藥錠聖慈之眷念有加臣心之感激無地且摺內硃批訓旨與學臣黃鴻中傳述聖諭無非欲臣有則改之無則加勉全名保身作一好官之德意臣非木石敢不銘心刻骨奉為寶訓至如隨任家口現在酌量安插以副聖懷自今惟有益加砥礪事事悉遵聖諭無二無欺以仰報高深於萬一耳理合繕摺奏謝伏惟睿鑒謹奏覽奏俱悉切毋效法年羮堯如此禽獸居心行事也同日又奏為恭報早禾收成及雨水情形事竊查湖南七府二州所屬地方早禾收成分數長沙府屬十二州縣內長沙等十屬春夏雨水霑足早禾收成計有十分惟茶陵州湘隂縣春雨愆期收成止有七分衡州府屬十州縣內衡山等八屬甘霖時沛十分收成惟藍山酃縣二處三春雨少插蒔少遲收成亦止七分永州府屬八州縣自春徂夏雨水應時十分收成寶慶府屬五州縣四月以前雨水微小收成約有六七分不等四月初七日以後連得大雨四野霑足嶽州府屬八州縣內平江等五屬雨水及時收成約有八九分惟巴陵安鄉慈利三縣春雨稍遲收成止有七分夏雨霑足常德府屬四縣三春雨水未足收成亦止七分入夏甘霖大沛辰州府屬七州縣春夏雨暘時若十分收成郴州所屬五縣三春雨澤稍少收成亦止有七分四五月霖雨時作靖州所屬四縣春夏雨水如期收成約有八九分至於中稻茂盛俱將吐穗揚花晚稻亦皆秀茂市中米價每石自六錢二三分起至八錢五六分不等軍民和輯苗漢相安理合繕摺奏報謹奏覽收成雨水情形知道了總宜據實直陳毋蹈欺隱之咎雍正三年九月十三日湖南巡撫臣王朝恩謹奏竊臣前奏恭謝天恩一摺奉有硃批臣跪讀之下伏念臣至愚至拙素無表見蒙皇上特達之知拔置巡撫天恩優渥報稱未能夙夜捫心悚惶實甚臣自分居心行事過於謹畏即竭力黽勉猶恐多所貽誤安敢效年羮堯之行為自干國憲也皇上明同日月臣亦無庸置喙自蒙簡畀湖南已經一載祇知事事仰遵聖訓竭盡駑駘實心辦理不敢違悖致負殊恩今蒙皇上教誨諄切理合奏謝伏惟睿鑒謹奏公勤二字最為切要當銘佩勿忘同日又奏為恭報收成分數米糧價值事竊照湖南長沙等七府二州自七月以來各屬地方雨暘時若今秋季將終一年收成可以總計而定據布政使朱綱開報中晚二稻收成合算均有八九分不等鄉城米價隨時增減皆因米有高下不一現今倉斗每石自六錢二三分至八錢四五分九錢不等至若地方素來寧謐今值年嵗順成兵民尤為樂業理合繕摺奏聞以慰聖懷謹奏覽收成分數深慰朕懷但聞米價仍出一兩之外所奏為何不符雍正五年七月初十日盛京户部侍郎革職留任署理奉天府府尹印務臣王朝恩謹奏為奏聞事臣因失察户部買米一案荷蒙聖恩從寬革職留任復奉旨命臣兼管府尹印務署事以來題請奏銷展限又奏請命往候補人員盤查倉糧均邀俞允得以次第辦理感戴高深捐糜難報查奉天府屬倉糧多有虧缺臣已將錦縣知縣呂曰宮鐵嶺縣知縣王永祿題參在案今候補知縣曹涵盤查得開原縣倉糧內缺少倉豆七百三十石係前官借出臣查開原縣知縣萬如濟居官辦事尚在勤愼所缺豆石照部價計值不停止未免自顧而不顧人遂致公事難辦臣署事以來看得俸工一項欽奉特旨禁止捐用臣俱欽遵給發不許捐扣至節規一項亦嚴行禁革惟出口車票一項每年約收銀一千二百餘兩臣雖係署員不敢矯情干譽使後人難聞謹奏爾非無過之人可比當勉力以蓋前愆況年又未老豈宜因循怠忽於此一任要須秉公持正致身辦理倘有些微欺私不愜朕意處身家性命殊為可惜朕非好為嚴刻總期諸務合於公當耳勉為之愼為之雍正五年九月十二日盛京戶部侍郎革職留任署理奉天府府尹印務臣王朝恩謹奏為恭謝聖訓並繳硃批原摺事臣前奏辦理府尹衙門事務一摺奉有硃批臣跪讀之下儼如天顔咫尺伏思皇上訓諭諄諄正為保全臣之功名與臣身家性命惟其眷顧之隆是以訓諭之切臣非木石寧不感愧況正當服官之年敢不致身竭力但識淺才庸是臣之短習懶好嬉是臣之病前遵聖訓久已改過兹更當時刻警省不忘諄切之諭旨竭盡駑駘期無負高厚之洪恩理合奏謝並將奉到硃批原摺恭繳謹奏能自策勵甚好然不在空言勉實行與朕看同日又奏為請旨欽定稅差事竊照奉天府有徴收牛馬稅銀一差向例在於五部將軍衙門郎中以下主事以上統共較一本任俸深者補放現今收稅之盛京員外郎常祿一年期滿例應更替今咨查各衙門選送俸深人員前來有連前任之俸算俸深者且有出過稅差者又有呈稱凡出過稅差及拖欠各項錢糧者例不出差更有五部郎中聯名公呈請照京城小差之例在於每旗較論俸深者各派官一員入筒掣籖紛紛具呈爭端不巳臣思牛馬稅銀每年約計四千餘兩以臣管見即使將本地俸深人員派收恐未必能稱厥職懇祈皇上於京城部屬內揀選補放一員前來奉天徴收稅銀庶可杜隱匿拖欠之弊而各官亦無所用其紛爭矣伏乞皇上睿鑒施行謹奏所請甚是該部議奏雍正六年正月初七日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為奏明會審情形事上年十二月二十二日將軍伊里布捧到旨意命臣等四人審問根都札布等訛詐銀兩行止不端臣恭繹之餘仰見皇上明同日月無不照臨深為惶悚臣等即日傳喚會審除金長保李存柱先巳赴京未到外會審根都札布不認需索赫楞格銀兩惟認供與金長保赫楞格李存柱唱戲喫酒郭二家行頭原拏出來與戲子看過兩次又在李存柱家唱戲我與金長保到李家見户部司官常有同著一箇司官不知姓名在李家喫酒聽戲見我們一到他們走了等語隨傳到常有問供我同本部司官程德赫楞格在李存柱家喫飯一次是有的後見根都札布金長保同佟九如等一羣人進來我們就走了並未聽戲等語又喚到李存柱之弟李砥柱問那根都札布金長保同一羣人到你家是何姓名尹泰即接問李砥柱進學年分種種間話並不問及一羣人姓名云你去罷臣云既呌了李砥柱來如何不問他一羣人是誰呢武格云何妨再問呢臣按根都札布供出常有緣常有先曾管庫三年前見根都札布到庫時出有不平之語遂成嫌怨其程德初到盛京因租住李存柱房與之往來常有程德臣素知其非妄為之人不與根都札布同類且在李存柱家喫酒喫飯者豈止常有程德二人今根都札布只供出常有程德而常有又供出一羣人進來如任其妄供株連恐有屈抑若止以常有程德喫飯坐罪亦未允服應聽公論議結臣欽奉嚴旨敬謹會審時武格云根都札布是將軍衙門的官赫楞格是户部衙門的官他們行止不端有煩聖念你們審問只要公當我就依了等語伊里布以手掩面一語不發尚有畏懼羞愧之心尹泰談笑自若反作坦然無事之狀同官皆所耳聞目覩除現在據供會摺奏請革職究審外合將現審情形據實奏聞謹奏會審此案肯秉公與否要須爾等自為結案後孰是孰非有無瞻徇處豈能逃朕鑒悉耶至於其間之言語神情亦在所不論雍正六年二月十一日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為皇恩錫福自天微臣感激無地謹繕摺恭謝事本年正月二十七日臣齎摺家人捧到御書福字臣跪迎懸挂如覲天顏恭設香案望闕九叩謝恩訖伏思人生最難得者福是以書載五福詩稱多福臣本薄福之人今蒙皇上賜臣以福從此薄福轉厚不獨臣身膺錫福之榮即舉家亦邀增福之慶謹什襲收藏歲歲恭懸傳之子孫永為世寶長戴聖恩於無極理合繕摺恭謝謹奏據汝奏稱本來薄福是何言歟從來福緣善慶所以富貴中淺福者有之貧賤中多福者有之人每自怨福薄却忘薄福之由且福者非富貴貧賤之謂也但以富貴貧賤論福乃屬無知之人轉薄為厚在汝自為朕何能賜朕年年書福字與內外臣工者正欲警惕汝等自厚其福之意若以朕能賜福會則誤矣再所奏納糧一摺交該部議奏矣雍正六年三月十二日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為奏明首列銜名情由事竊照根都札布等行止不端一案奉旨交臣伊里布尹泰武格王朝恩會審其所審情節已經另摺具奏外此係臣等四人公同會審之事及至定稿伊里布不肯列名會奏尹泰因已降級不肯首列銜名而武格又以應該户部頭銜數日議論不定若臣再為推諉勢必徒稽時日覆旨遲延殊非公忠辦事之道是以臣首列銜名具奏合將情由奏聞謹奏銜名應如是開列何必多此一奏殊屬煩瀆雍正六年七月二十一日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為奉天借三之積弊已深剔除之立法宜早請敕部定議以清倉糧事竊照倉糧存七借三每年春借秋還誠為良法乃襟民借出之後秋收每有止完額糧而不完借三者甚至有本戶應完之糧不肯全完出具借狀以本年之未完算作來春之新借者州縣官慮干奏銷考成聽從報完圖邀紀録因而甘心捏報從前積弊相沿已久在襟民既知官巳捏報便可任意抗欠官有事故離任在新官或初仕未諳交代之時以為既有領狀不難催完可以接受殊不知歷久不完釀成虧空按其名則本年之借三究其實則歷年之捏欠及追比之時人亡者有之失業者有之是倉糧借三之良法反開官民欺飾之弊端奉天府屬各州縣處處皆然且前任州縣授受多員歷年久遠因恃有借三之例前後得以遮掩惟有暫停借三自然水落石出如將現任官一槩參追則衆官俱應離任倘不早為立法清查則積弊愈深倉糧懸宕以臣愚見仰懇聖恩俯念此項借欠不清與侵那虧空有間暫寬治罪著令現任州縣官將現在借三民欠舊欠者若干新借者若干其舊欠內係有徴者若干無著者若干據實造册自首仍將各册咨送户部有著之借欠按其民欠之多寡州縣之大小酌量另行請旨按限追完外其無著之項如現任官已經接受交代者革職留任其離任官現在交代者革職在原任地方均限一年追賠全完復職如限內不完以及現任官或有派纍地方者參處治罪著落家産變賠暫停借三之例請自下年為始俟查清舊欠之後再行借三之法庶倉糧並無虛懸而積欠一清自無淆混矣是否可行伏乞皇上敕部議覆施行謹奏該部議奏同日又奏為請定紳襟欠糧奏銷另册達部之例以杜隱蔽以清國賦事竊照錢糧為經國之要務紳襟乃百姓之觀瞻各省額徴地丁錢糧每年奏銷未完槩稱民欠紳襟亦混入其中查紳襟欠糧原按分數處分久有定例但照例處分案牘少見推求其故皆因混入民欠之中是以未嘗顯著臣思紳宦巳登仕版子襟身列儒林凡户下錢糧每年開徴當首先完納以為民倡乃不肯早完待至奏銷尚有拖欠若不分别造册嚴定處分無以勸懲百姓臣愚以為應令州縣官於每年奏銷時查有紳襟拖欠錢糧者不得混入民欠數內即將紳襟所欠糧銀數目無論多寡另造一册開明一户某鄉紳或某進士舉貢生監名下額徴地丁銀糧若干拖欠若干計未完幾分逐户開出造册詳報知府司院隨同奏銷册達部聽部臣核議照原定紳襟抗糧之例分别革去頂帶衣襟仍按未完分數加倍治罪追完倘州縣官不行列册詳報别有發覺照徇庇惡紳例處分庶紳襟自無積欠併可杜詭寄包攬之弊矣至於每年奏銷有實係小民拖欠者亦令州縣官造册呈送府司院存案仍令知府按照都圖出示曉諭俾小民咸知欠數上司得以稽查如交代後官亦得以接徴更可杜州縣官捏欠侵漁之弊似有裨於催科國賦之一法也如果臣言可採伏乞皇上睿鑒敕部議覆施行謹奏九卿詹事科道議奏雍正六年八月二十六日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為奏請調缺以示勸懲事竊復州原係旗地因有民人開墾地畝是以添設民官先經原任將軍噶爾弼署府尹尹泰等議以錦州府通判移駐復州今新選復州通判周槐到任受事以來見其詳報事件每與城守尉抵牾即如詳報署印章京二格自放海船出口周槐即請辭海防責任經臣批飭嗣後海船出入照依江浙閩廣事例文武會查會放併一面咨明將軍轉行城守尉一體遵行又如復州城內荒地甚多該倅詳稱民人欲於城內蓋房貿易臣亦咨明將軍轉行城守尉但地屬旗地原該儘旗下駐劄之餘地然後給與民人而周槐又以丈給皆係窪地并詳稱城守尉不容民人蓋房縱兵拆墻嚷鬧又揭報城守尉五欵請咨將軍會參經臣批飭閲該倅所揭各欵合之節次前詳是必欲去此城守尉而後快於心非惟不知文武和衷之大體而併有不安其位欲圖規避遠缺之深心矣大為不合今臣若遽列彈章反得遂其規避之願若姑容其久任復州必致滋事臣查有金州新設巡檢王震原由蓋平縣典史題補為人老成歷練熟悉風土人情即如金州城內旗地丈給民人蓋房貿易一事王震辦理妥當而城守尉並無一言又上年委護通判印務凡遇審理事件處置得宜據臣管見如以巡檢王震升補復州通判必能文武和衷調劑得宜其金州巡檢員缺即以復州通判周槐降補倘能改其氣性三年無過仍準以通判改補如此一升以示勸一降以示懲則各員均知鼓勵辦事地方必有裨益可否調補臣不敢冒昧具題理合繕摺奏請伏乞皇上睿鑒施行謹奏覽所奏甚屬可嘉已另旨諭部矣但必實出於公方免物議若稍涉左袒旗人及瞻徇滿員情面而屈參良倅以取悅邀譽則大有未便後來被朕於他處訪知汝獲罪不淺也雍正六年十二月二十一日盛京户部侍郎署理奉天府府尹印務臣王朝恩謹奏為請改奏銷限期以紓民力事竊照奉天奏銷定例在於每年三月因上年丈地比舊册丈出一倍臣議定半銀半米徵收具題小民以部文未到延挨觀望完納不前是以今年三月不能依期奏銷臣題請展限十月荷蒙聖恩俞允臣屢次出示曉諭勸勉催科仰賴皇上洪福歲獲豐收是以雍正五年銀米新舊全完止有錦縣鐵嶺復州三處尚有尾欠通計未完不及一分巳經拜疏奏銷但臣前題展限案內奉準部文有嗣後奉天奏銷務照三月奏銷之例依限具題等語今計至明年三月除扣年節封印日期計於三箇月內欲完一年之銀米未免民力拮據勢有不能即使民間今年完糧之外尚有蓄積當留為來春耕作資本必待明年秋收方能完糧況丈地之後民不加多而地實增廣臣從籌度民力起見仰祈皇上洪恩嗣後奉天奏銷改定在於每年十月則民力得以年年寬紓輸將不致拮據永戴皇仁於無既矣謹繕摺奏聞如蒙俞允臣另具題本請旨施行謹奏奏銷改限之議是具疏題請可也雍正七年二月二十六日盛京刑部侍郎署理奉天府府尹印務臣王朝恩謹奏為恭謝天恩事伏念臣以菲材陋質蒙皇上拔置户部侍郎已屬逾分今於本月十二日準到部文奉旨調補刑部侍郎聞命自天感激無地日內因兵部侍郎永福前往外城查點盔甲臣現帶兵部印務俟永福回日將户部兵部印信交代又因西安巡撫武格奉命之日將禮工二部印務交臣署理臣現在辦理五部府尹衙門事務恭設香案望闕叩頭謝恩外理合繕摺恭謝天恩謹奏從來能者多勞但慮無能莫辭勞瘁多為國家出力寧非美事乎雍正七年六月初四日盛京刑部侍郎署理奉天府府尹印務臣王朝恩謹奏為遵旨酌議養亷事竊臣欽奉諭旨各省有尚未分給養亷之員著各督撫悉心商酌一面辦理一面奏聞欽此臣準到部文查奉天府府尹府丞治中通判錦州府各衙門從前所有節禮陋規久經革除今酌給養亷自應照各省事例出諸耗羡查奉天承德等十州縣每年額徵地丁共銀三萬四千五百九十二兩加一耗羡可得羡餘銀三千四百五十九兩零內酌留一半以為州縣公用及養亷之資其餘一半銀一千七百二十九兩零擬派府尹衙門七百兩府丞衙門三百兩治中衙門一百六十五兩通判衙門一百六十五兩錦州府四百兩令各屬解赴承德縣貯庫分給各官以充養亷之用再查府尹衙門臣先經奏明有出邊車票一項除給各項人役飯食紙筆之費外府尹可得五六百兩合之耗羡七百兩共有銀一千二三百兩儘可為府尹衙門養亷之資理合奏聞謹奏所奏知道了辦理頗屬妥協同日又奏為奏聞事竊照賭博牌骰久經嚴禁而造賣之源尤宜杜絶臣不時曉諭嚴查先據海城縣詳稱有山西太谷縣民孫廷賓由海船販運紙牌二十三箱假稱錫箔貨箱車拉上岸盤獲詳究等情臣隨批行查審買自何處務究根源續據該縣詳審孫廷賓供出在於河南彰德府南關劉小吾等店鋪買來臣查賭具久經禁止尚有愍不畏法之徒製造販賣若不嚴加懲創為害地方不淺臣若提拏製造之人往返甚遠是以封貯紙牌一面差役將孫廷賓押解河東總督究出製造鋪户劉小吾等并販賣之孫廷賓在於彼省照例治罪就近完結俟其移覆到日將紙牌燒燬以結斯案今準河南回文已將孫廷賓發司收禁訖合將辦理緣由奏聞謹奏押犯解交豫省就近結案以絶弊源甚屬可嘉雍正七年七月初一日盛京刑部侍郎署理奉天府府尹印務臣王朝恩謹奏為特參御史掣肘部務以肅政體事竊臣查得巡察盛京御史赫德布凡注銷册籍必要司官親身齎送不時傳喚司官當面回話以致各官奔走不遑更有提閲稿案越俎言事即如臣部於本年六月三十日準赫德布來文內開為咨取事貴部白旗司五月分注銷檔內有八兒呈報一主家人劉三自縊身死一案將説堂原稿相應送院以便稽查等因臣閲其文不勝駭異劉三自縊之案據八兒於五月二十六日在部呈報差官驗明自縊情實五月分注銷册內已造送赫德布查核訖逮提人審理斷結例應於七月初五日以前造入注銷册內今未屆注銷之期突來提閲案稿是實何心且此案當八兒呈報之初尚未審理赫德布預傳臣部司官輝色當面吩咐云這件事情看你們如何審法要仔細審才好等語不知是何意見夫刑名案件自有章程如辦理果有舛錯不公之處御史可以風聞參奏不應主張議論面囑司官提閲稿案且凡遇詞訟事件從中指撥甚為掣肘又赫德布更有立異之處盛京與都京一體所以每遇朝期必齊集殿前朔望祭陵必齊集陪祀赫德布從不隨班上朝陪祀可謂不知紀綱法度者以上諸事臣目睹身受未敢緘默理合據實參奏伏乞皇上睿鑒施行謹奏據王朝恩參奏赫德布掣肘部務該部將赫德布撤回嚴察議奏其員缺另行揀選御史派往雍正八年二月初九日盛京刑部侍郎署理奉天府府尹印務臣王朝恩謹奏為請留縣令辦理地方事務事臣見上年十二月分選單有中書一缺將奉天府海城縣知縣張士毅升補查張士毅於雍正四年間到任臣自署理府尹以來見其詳報李文福販運鎗桿出海一案又有查拏孫廷賓紙牌一案可謂留心料理地方事務之員且目今欽奉諭旨奉天地畝分别上中下三則起科正需熟諳民情之員悉心料理若該員升授中書文到交盤離任則員缺又須委署亦乏兼理之員請將張士毅以升銜留任海城俾其供職辦事因部文未到臣不敢具本理合繕摺奏請伏候聖裁施行謹奏吏部議奏雍正九年四月初六日刑部左侍郎臣王朝恩謹奏為恭謝天恩事本年四月初三日大學士公馬爾賽等寄字內開督臣郝玉麟題參皮應瑞在廣招搖生事一案將字稿呈覽奉旨交與王朝恩務將皮應瑞拏獲解出倘王朝恩不能拏住皮應瑞即將王朝恩革職解往廣東質審欽此臣聞命之下恐惶悚懼無地自容查皮應瑞於三月二十日來到奉天是實臣不敢隱瞞嗣接大學士寄字遵旨將皮應瑞咨送盛京刑部嚴加肘鎖派撥官兵併差家人押解赴京訖緣上年皮應瑞寄來條陳臣愚昧誤聽其言轉達天聽曾具摺將臣差人討取鹽商借欠及皮應瑞所寄條陳種種情由據實陳奏並不敢懷私隱匿自蹈欺罔今應瑞在廣招搖玷臣官聲臣罪難逭有干革職之條荷蒙皇上不即將臣罷斥高厚之恩有同天地臣感激涕零愧汗浹背惟有痛自刻責悔誤聽於既往期自新於將來以圖仰報高深於萬一耳理合繕摺恭謝天恩謹奏若無皮應瑞解交汝之身家性命難保不獲如何其可所奏知道了雍正十年三月初十日直隸河道總督臣王朝恩協理北河事務臣徐湛恩謹奏竊查河工修防每年有歲修搶修大修不等除大修工程隨時另請錢糧外其歲搶二修預於霜降後撥發預僃銀兩儹辦物料運貯工所一俟春融即便興工於汛水前一律完整以資捍禦此定例也前署河臣劉於義奏請歲修工程於歲內題估來年二月動工四月完竣所議允協大學士臣朱軾以堤岸工程報册後續有坍裂者必令隨時報修又不在隔歲估報之限等語查此係搶修工程隨時趲做所用錢糧應彚入搶修項下另案奏銷無庸另行估計至於大修工程有石土掃工之别劉於義奏請大工不能速完者五六兩月停其工作朱軾覆奏如係險要工程雖五六月亦未便停止等語臣等詳審酌議如建砌石工創築堤工為經久之計者工程浩大動輒經年應請於五六月農忙時暫停工作若加幫土堤挑挖引河建築掃壩等項均係緊要工程應亟於汛前趲完雖五六月亦未便停其工作也是否允當伏乞皇上睿鑒謹奏所議是應逹部者咨部存案可也雍正十年六月二十六日直隸河道總督臣王朝恩協理北河事務臣徐湛恩謹奏為奏聞事竊照滹沱豬龍兩河今年伏水甚大幸皆隨漲隨落自入秋後大雨時行水勢增長據河員呈報本月二十二十一等日蠡縣豬龍河水漲出槽民堤漫溢又據衡水縣報稱滹沱水發漫溢二丈又據束鹿縣報稱滹沱水長無堤之處大水溢出又據平山縣報稱滹沱水發漫溢過堤各等情前來除飛檄上緊堵築并查水經何處有無損傷禾稼外臣等查秋汛之水甚屬浩瀚目今永定南運水俱長發臣王朝恩現在督率料理晝夜防護臣徐湛恩飛赴蠡縣等處督同堵築漫溢之處務期剋日完竣合將秋汛水長豬龍滹沱漫溢緣由恭摺奏聞謹奏因不得人暫時勉強用汝乃汝毫不知勉勵遷改以冀仰邀天地神明鑒佑朕實代為憂之如欲講求感通之道惟以忠誠公正自律方克有效非徒懷巧詐恃一已之聰明歷練所能致者試自問自省寧有竟不覺知之理所奏知道了雍正十年七月二十六日直隸河道總督臣王朝恩謹奏為欽承聖訓恭謝天恩事竊臣謭陋庸材疊蒙皇上高厚隆恩涓埃未效時切冰兢前以豬龍滹沱兩河水漲以致蠡縣等處漫溢隨經繕摺奏聞仰荷皇上天恩不如嚴譴特頒硃批諭旨諄諄訓誨勉勵成人臣跪讀之下感懼交深惟有鏤心刻骨朝夕凛遵時存忠誠公正之念對越天地神明勉盡職守斷不敢一念稍弛一事稍懈以仰副我皇上教育洪恩於萬一耳臣臨奏曷勝感激惶悚之至伏祈睿鑒謹奏汝等漢軍輩之口頭言語何足為據須行出與朕看雍正十一年二月初七日直隸河道總督臣王朝恩協理北河事務臣徐湛恩謹奏為奏請分隸隄工以重河防事竊查永定河南北兩岸於康熙四十三年間設立同知二員分管南北兩岸隄工嗣於雍正元年十月內奉旨南岸同知全寶兼管北岸同知事務行走欽此欽遵在案嗣經前督臣李紱題請復設北岸同知因疏內未經陳明北岸必須專員緣由是以部議未準臣等伏查永定河自蘆溝橋以下兩岸環長四百餘里工假本屬綿亙以一廳而兼兩岸之工程挨工查看數日方周若遇汛水漲發上下全河俱係洶湧水猛溜急不能挽渡汛險工長顧此失彼上年永定河汛水三次大漲臣等目擊險要情形雖經飛飭道廳分投督率搶護得保平穩但永定河道職任兼轄調度查驗是其責成至於巡守保固辦料修防必須專責廳員以重職守且北岸現在添設重河重隄則巡防保守更需專員料理屢據永定河道定柱詳請復設前來臣等復查無異仰懇皇上恩準復設北岸同知一員分岸管理實於工程有益擬合繕摺奏請伏祈皇上睿鑒謹奏具疏題請雍正十一年三月二十一日直隸河道總督臣王朝恩協理北河事務臣徐湛恩謹奏為據情代奏事竊據署務關同知盧承琦詳稱承琦係鑲黃旗漢軍有子盧烺現年十八歲例應歸旗惟是承琦身係河員奔走修防凡做工購料等事關係錢糧必得親信之人相助辦理承琦僅此一子别無幫助之人所有不能相離情節乞為據情代奏等因前來臣等伏查盧承琦之子盧烺現隨伊父任所幫助辦事别無親信可託之人擬合據情代奏請旨臣等竊思河員專司河務與地方官職任刑名錢榖者不同一應辦料修工均關帑項必須往來河干詳加稽查務得親信子弟相助料理方免貽誤臣等愚見如係河屬旗員子弟有成立者準其酌留一人隨任助伊父兄辦理事務既可資其臂指兼以學習修防實於河工有裨合并奏請伏乞皇上睿鑒謹奏盧承琦之子準留同知任所咨明該旗可也雍正十一年六月二十七日直隸河道總督臣王朝恩協理北河事務臣徐湛恩謹奏為奏明伏汛水勢情形事竊查本年入伏以來自六月初八日至今隂雨連綿惟十七十八二十二二十三等日雨勢更大晝夜不止聞山東地方自六月初一日起接連大雨臣等查諸河之水惟漳河滏河南運北運四河水勢漲發甚至一日之內陡長至一丈有餘者其漳河所長之水挾衛汶兩河之巨流盡歸於南運兼之風雨交加南運河內無隄之處在在出槽有隄之處平溢隄頂滄州之東岸大王廟前縷隄其水高出隄頂數尺漾開溢出幸水有歸宿直由南窪入海俟水退查明另參疏防外至北運水勢甚驟亦有平隄之處其無隄處所亦皆出槽幸有青龍灣筐兒港兩處減壩可以宣泄臣等輪流上下督率搶護其險要各工亦俱選派人員無分雨夜時刻巡防務期保護無虞現在南北兩運河內空重糧艘往來遄行無阻而永定滹沱豬龍三河水汛亦皆小於上年臣等因雨大水漲恐厪宸衷謹將伏汛水勢情形繕摺具奏仰慰聖懷謹奏朕慮汝之居心立行未能仰邀神佑時以河漕運道念切於懷總俟秋汛過後方敢言無虞二字也硃批諭旨卷一百四十
