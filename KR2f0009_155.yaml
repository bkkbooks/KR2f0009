body:
  text: 欽定四庫全書硃批諭旨卷一百五十五硃批南天祥奏摺雍正六年六月十八日雲南開化總兵官臣南天祥謹奏為奏聞事竊臣欽奉上諭統領雲南省官兵三千餘員名進藏雍正六年三月初八日自雲省起程業經題報在案四月初六日由劍川州出口十九日於中甸起程俱經咨呈雲貴督臣鄂爾泰奏報今於五月二十九日臣率領官兵先至察木多等候川師初七日接欽差駐藏副都統馬臘等告急咨報臣隨差員馳迎散秩大臣鑾儀使臣周瑛會商速進六月十三日周瑛到察臣正在揀發官兵十五日續接馬臘等咨報內開頗拉奈統領阿里後藏各兵於本年五月二十六日進藏頗拉奈甚恭順聖主聽信逹賴喇嘛絲毫不擾番民二十八日將殺害康金鼐之阿爾布巴隆布奈扎納奈悉行拏獲現在拘守俟將頗拉奈抵藏各情具奏之日另為僃咨等因仰見皇上天威遠播番夷綏靖左都御史臣查郎阿鑾儀使臣周瑛到藏後自必仰遵睿謨安頓料理臣遵諭旨準鑾儀使臣周瑛議留臣分領滇省官兵一千餘員名駐察遙為掎角以壯聲援除另疏題報外所有頗拉奈擒獲阿爾布巴隆布奈扎納奈情由理合繕摺奏聞謹奏覽奏知道了駐兵外地極力約束官兵申明紀律令遠近番夷畏威懷德方為不負朕之委任切勿因見小利有失大體致貽笑於人也勉之雍正八年七月二十五日雲南鶴麗總兵官臣南天祥謹奏為遠隔天庭日久微臣孺慕時殷恭請陛見以抒蟻悃以聆聖訓事竊臣一介庸材毫無知識荷蒙皇上格外殊恩於雍正三年由廣羅協副將得覲天顏旋蒙擢授開化總兵才疏任大蚊負難勝當擬恭請陛見冀得跪聆聖訓因其時甫離闕廷且值淸理交界未敢遽請嗣於雍正六年領兵進藏仰仗天威睿算藏域平寧旋師之日本擬奏請復覲天顏乃荷聖恩調補鶴麗鎮總兵官是大兵雖撤而邊僃宜嚴臣屬維西等處俱係新設營制正需料理因又不敢冒昧籲請兹我皇上德威遐播萬國咸寧兼督臣鄂爾泰體國公忠漢夷傾心向化臣計陛辭至今業巳六載依戀之私刻難自巳仰祈皇上俯鑒愚忱恩允入見俾得面請聖訓庶有遵循以重封疆而螻蟻下悃亦可少抒萬一矣為此繕摺奏聞伏乞睿鑒施行謹奏不必入見但能勉盡職守勝如跋涉萬里程途也雍正十年九月初九日江南提督臣南天祥謹奏為奏聞事竊臣才識淺陋叨荷聖恩簡畀江南提督任大責重受事以來夙夜兢惕惟期勉竭駑駘以圖報效涓埃兹因蘇松一帶沿海地方於雍正十年七月十六十七兩日颶風大作海潮漲溢傍海居民以及汛防兵丁未免被水遭溺臣於本年八月到任後星即差員逐細覆查與各該營汛官辨稟報相符其被水窮黎業經署督臣尹繼善署撫臣喬世臣仰體聖心亟為賑恤今現在委員分頭散給錢米其受傷兵丁家口亦量加給發一次所有賑恤事宜應聽署督撫臣條析具奏至被水各處所城墻城樓墩臺營房坍缺甚衆軍火甲械馬匹戰艦等項亦多有漂失臣俱經咨商署督撫臣作速籌酌修整製補而各該汛防營房衝沒兵丁露處者尤為緊切且間有溺故兵丁家口無所依倚者益堪憫惻據各營官辨紛紛申請前來臣再四籌畫查得臣標有皇恩賞借營運生息銀一萬八千兩經前提臣議交典商以一分生息計自雍正九年五月起至雍正十年六月止共生息銀二千七百八十六兩零未經動支竊思此項息銀原係皇上浩蕩洪仁賞給兵丁吉凶等事之用非可於別項通移但事有緩急或可權宜當此天氣漸寒不惟溺故兵丁之家口室廬蕩然待援甚迫即凡沿海汛兵棲止無所者若待營房蓋就勢必日久病生抑且巡防疏懈所關匪細臣愚冒昧擬於前項息銀內權行動那分別酌給臣標被水營分其本兵及家口俱無傷而房屋衝毁者每名銀五錢其本兵雖存而家口淹沒房屋漂失者每名銀一兩俱令搭蓋茅棚以免露處以重汛防再本兵溺故家口僅存房屋復經漂毁者每名銀二兩使皆得所棲息并以資其生計以上三項共應動支息銀約計九百餘兩臣一面咨明署督撫臣一面檄行各該營汛官辨具領按給造册呈送存案事關通那理合陳奏仰懇天恩俯允賞給則營汛兵丁叨沐皇仁無不淪肌浹髓矣再有請者崇明狼山兩鎮標營各有營運生息銀兩如臣標那給兵丁銀兩得蒙俞允則兩鎮沿江沿海被水兵丁亦應一例分別邀恩臣謹具摺奏聞伏乞皇上睿鑒施行謹奏此項銀兩原僃賞賚兵丁之用今酌緩濟急通融動那在汝與督臣商酌為之耳雍正十一年正月二十日江南提督臣南天祥謹奏為陳奏事竊照軍中利器鳥鎗為先則所需火藥最關緊要按江省各標協營鳥鎗現動公糧改造將次整齊畫一而火藥一項查下江各營除逐年製僃以供操演外其間有稍為存貯者有全無存剩者更如崇明鎮標沿海各營因上年七月間海潮泛溢將舊日所存悉行衝失是江省營伍事宜莫有急於製僃火藥者矣仰惟聖明睿慮周詳無微不照先經督撫提鎮諸臣於遵旨議奏事案內會同酌議除上江各營舊有存貯火藥未經撥動無庸添造外擬以督標中左二營及江寧城守營蘇撫標左右二營及蘇州城守營京口水師標左右二營及鎮江營為省會海疆重地應僃火藥五年其漕標河標臣標與崇明狼山兩鎮標暨各協營凡屬沿江沿海者俱為扼要之區然地多潮濕恐易黴黰應僃火藥三年再內地偏僻處所如溧陽平望常州中左右三軍及孟河靖江泰州泰興等營止擬量加添造以上各項火藥除存貯數目抵補外實應添造火藥一十四萬九千四百七十七斤零俱擬動支司庫存公銀兩採辦製僃業於雍正九年二月內分析條款咨覆內部在案尚未奉文準行臣覆加查核所見相符但上年被潮各營據報漂失存貯火藥共計三萬二千六百四十餘斤更須亟行補造以足前項擬定之額至每年操演所需或係捐僃或取辦於公款仍照舊例遵行不與儲僃火藥一體動項製造也惟是儲僃之數有五年三年不等則需用硝磺甚多一時不能齊辦臣請於沿江沿海各營先行製僃其餘亦酌量次第竣事庶軍實無不充裕營伍大有裨益矣臣以遵旨議奏事件不容久稽謹冒昧奏請倘蒙俞允伏乞皇上敕下署督臣魏廷珍蘇撫臣喬世臣速行會同酌核動項採辦設局興造照數存貯其委員經管造册報部以及將每年操演火藥與儲僃火藥遞行出陳易新等事宜一併條析辦理以免日久滋弊為此繕摺奏聞仰祈睿鑒施行謹奏火藥最關緊要應照此議辦理所奏是聞松江一帶被災百姓因該管各官撫恤不周有嗷嗷待哺者何以不行奏聞汝意若以為除營伍之外地方事務於己毫無干涉則大負朕之委任矣雍正十一年三月初九日江南提督臣南天祥謹奏為奏明事竊臣於本年正月間為江省製僃火藥一事恭摺具奏欽奉硃批諭旨臣跪讀之下惶悚戰栗感激涕零伏念事關民瘼臣叨任封疆不即上聞是臣昏昧無識罪實難逭乃邀聖慈寬宥不加譴責特示訓誡聖恩實同覆載臣心倍凜冰淵兹有不敢不據實陳明者上年江南濱海地方偶被風潮又華亭等縣田禾受傷秋成歉薄俱經督撫臣陸續題報節奉諭旨蠲租散賑大沛恩膏務使窮黎各得資生不致或有失所皇仁浩蕩誠為千古難逢凡屬臣工敢不實力奉行臣從前訪聞查賑乏食貧民頗有遺漏之處當即將閭閻困苦情形咨明督撫臣速為推廣皇仁續又懇切寄信通知繼接蘇撫臣喬世臣回書云巳無遺漏臣思撫臣仰體皇上好生之德念切痌瘝自必會同署督臣逐户淸查確實但使辦理得宜臣愚不敢攙越逮臣查閲沿海一帶乃見賑恤未遍誠如聖諭有嗷嗷待哺之民幸蒙皇上聖明無微不照復命加賑四十日並頒特旨嚴飭竭力稽查湛恩汪濊載道歡呼臣現在細加訪察如此番補賑有司仍不實力奉行臣當星即奏聞斷不敢稍有容隱以致上負天恩自罹重罪也臣恭繹硃諭深切悔懼謹冒昧繕摺奏明伏乞皇上睿鑒矜原謹奏覽奏內叨任封疆之語朕實代汝愧之同日又奏為陳奏事竊照江省軍務無處不關緊要而沿海一帶尤須加謹嚴密臣自蒞任以來檢閲卷宗有每年以臣標中左右前後五營官兵輪流貼防上海吳淞一團漕涇黃浦等汛一案相沿巳久歷任提臣徒具空文按期報部臣於本年正月二十九日起程巡閲沿海各營官兵即以相度形勢機宜歷觀沿海營制如金山柘林靑村南滙川沙上海黃浦吳淞劉河福山等汛星羅碁布固巳至嚴且密然從前之貼防上海吳淞等五汛者本非無因查康熙八年間副都統查哈泰等於遵旨會閲沿海等事案內題準以臣標左右前後四營遊擊輪流帶領官兵五百三員名貼防上海一汛守僃輪流帶領官兵五百三員名貼防吳淞一汛此因當時營制未周原設官兵不敷防範耳再查康熙十五年經前任提臣楊捷於浙境寇䑸狂逞等事案內題請一團漕涇二處亦以臣標四營遊擊輪流各帶領官兵五百三員名前赴貼防又令中營守僃帶兵三百名赴黃浦江貼防此因當時海匪竊發江省不得不預為防範皆非永遠定制是以所議貼防各汛並未建有官署營房也歷今數十年來法制周僃海不揚波臣於親歷查閲之次復加籌畫除上海一汛業經前督臣常鼐於康熙五十七年間題準將臣標右營官兵移駐彈壓至吳淞一汛外控大洋最為險要海口雖於康熙五十三年間添兵一百餘名設繒船四隻將僃輪班出洋巡哨并於海口設立炮臺與川沙營炮臺對峙俱撥兵嚴防制度可謂詳僃矣然通計該營額設兵丁九百二十八名除隨丁公糧及分派墩汛之外每年春秋二哨該營將僃輪班帶領官兵一百二十五員名出洋巡查則存城防守之兵似覺稍單查吳淞口內即與黃浦水師營接壤臣請嗣後當該將僃哨巡之時就近令黃浦營都司帶兵一百名坐駕沙船前赴該汛協力巡防俟該將僃哨巡事竣仍行撤回原汛實為有益再黃浦營改設都司仍駐上海縣城上海既移右營重兵彈壓則水陸汛巡在在嚴密而黃浦一營官兵儘敷調度防禦矣又一團係南滙營專汛漕涇乃柘林營專汛二處濱海之區俱係沙塗潮長則隱潮退即現從來海艘不能停泊可無外虞查南滙營於雍正五年經前提臣魏經國奏請添兵一百名巳敷防範惟柘林營額兵止有一百八十一名未經酌添臣閲漕涇一汛商賈湊集匪類易滋派守之兵甚少請於臣標中左前後四營內抽兵六十名撥入該營專防而向時漕涇貼防與吳淞黃浦一團等汛貼防之處本無實事俱請停其報部至沿海一帶地方臣仍不時飭令標營將辨帶兵巡哨即有策應不難立時調遣也事關沿海軍務理合據實陳奏倘蒙俞允臣當會同督撫臣另疏具題請旨再照通省各營旗幟甲械鎗炮藤牌等項蒙皇恩賞給公糧修製隨經前署督臣尹繼善檄令舉行臣復屢檄飭遵自當次第辦理但公糧必須陸續存留若逐漸動支未免先後需時似難整齊畫一臣擬將各項分析估計酌借司庫存公銀兩一齊補造興修庶可按期告竣其酌借之項仍以公糧照數扣還則一轉移間事覺易辦是否允協恭候諭旨遵行為此繕摺奏聞伏乞皇上睿鑒謹奏俟高其倬回任後與之商酌妥確具奏以聞雍正十一年四月二十二日江南提督臣南天祥謹奏為奏聞請旨事竊臣凜遵訓諭於地方民情悉心體察所有蘇松等處沿江沿海窮黎蒙皇上洪仁疉沛復行加賑四十日毋許更有遺漏臣訪聞各該有司俱經續查補賑九重雨露悉巳優渥霑足矣但其間户口浩繁且多室廬漂失是以四散乞食者未能盡免幸蒙聖恩興築海塘羣趨就役得遂資生莫非膏澤之所被惟是老弱疲癃以及相隔路遠者不能悉赴工所隨有有力之紳士商民頂戴皇仁互相感動自二月杪至四月初各就近地陸續捐資煮粥施賑即如松江郡城男婦老幼就食者日有五六千人訪知蘇州郡城亦然近以施粥不繼復經地方官稍給錢文著令各歸本處雖巳逐漸出城猶未皆得其所目下二麥將登羣黎有賴然被災之民未經種植者仍艱於食將來無力耕作必致拋荒田畝臣愚伏念一方偶被災傷即厪聖主宵旰殷憂蠲賑錢糧動以纍百萬計深恩厚澤巳極無加顧上之施仁既溥下之好義自興觀前此不賞而能勸使加之鼓勵必更踴躍樂輸臣管窺鄙見仰祈皇上天恩敕部定議凡江省上年被災處所無論紳民人等有願捐銀米就近資給貧民使不廢農業者照捐數之多寡分別賞豫議敘即為數少者亦準給嘉奬字匾仍著督撫臣飭令有司稽查按給分晰造報不得勉強抑勒俟秋成之日即行停止如此則窮黎蒙福富室邀榮東作無荒豐亨預卜皆出皇上生成之賜矣臣更有請者上年江蘇被災各州縣衛所有應徵新舊錢糧緩至麥熟後開徵皇恩巳極浩蕩但查蘇松沿海一帶地本低窪産麥無幾況當被災之後播種尤少今雖豐收僅能稍濟農食若以措辦正供民力尚覺未紓仰懇聖慈恩施格外俯賜緩至稻熟開徵則黎庶益感高深定必輸將恐後事關民隱臣不揣冒昧據實奏請是否有當伏候聖裁再臣訪得三月十五日靑浦縣飢民鬨聚縣堂呼籲求賑蓋緣縣令因公赴蘇散賑愆期所致非盡遺漏使然又金山縣於三月二十三日有鄉民數皇上睿鑒施行謹奏覽雍正十一年七月十三日江南提督臣南天祥謹奏為聖主德嫓生成微臣情殷瞻戀恭請陛見敬聆睿訓以裨職守以慰下忱事竊臣邊鄙庸材至微極陋遭逢盛世得僃戎行歷任滇南涓埃未報沐恩寵而悚惶望彤廷而踴躍伏念臣在廣羅協副將任內曾經督臣保舉送部引見於雍正三年二月內兩覲天顔仰邀隆眷旋蒙擢授開化鎮總兵官率師進藏事竣回日復蒙聖恩調補鶴麗鎮總兵官當經具摺恭請陛見未蒙俞允依戀之忱日以益切今荷聖恩高厚簡畀江南提督視事將及一載雖夙夜兢兢罔敢或懈然海疆重寄地廣事繁臣才識疏淺恐難免於隕越是必仰藉聖謨指示方略俾臣知所遵奉或可勉圖報效伏祈皇上俯念微誠允臣陛見臣即輕騎減從星馳赴闕庶職守所寄凜遵睿訓之精詳犬馬下忱用慰多年之瞻戀矣為此繕摺奏請伏祈睿鑒施行謹奏赴闕之請候旨遵行今且不必同日又奏為敬陳管見仰祈睿鑒事竊臣秉質庸愚受恩深重凡一切職分應行事宜無不勉竭駑力剔釐整頓以期仰報高厚於萬一茲有事關營伍利弊理合恭請聖訓永著為例者臣不揣愚陋敬為皇上陳之一江省買馬之宜畫一以杜偏纍也伏查江省非産馬之地向例照原定每匹十四兩與十三兩八錢之價支領司扣朋銀每年一次核定數目請部給單委員赴口買補計每匹價費與定額不相上下法甚善也但惟將軍督撫等標及臣標沿海各營為然外蘇狼兩鎮標尚或另請購買其餘各協營並無赴口買馬之例亦不附各標營帶買或就當地購覓或從行販轉買以致每匹價值多至二十一二兩與二十三四兩不等所領司庫朋銀不敷所用不得不聽各兵自行捐補是同一江省買馬事不畫一遂有偏纍之處而不肖營員且有通同行販於中取利者矣臣察知此弊除令附近臣標營分應補馬匹俱附臣標照數帶買外其餘上下江各協營向不赴口買馬者仰請敕下將軍督撫鎮臣等無論親轄外轄俱準附帶朋銀赴口買馬回日按數分給補額庶兵丁得免捐賠之纍而將辨亦無滋弊之端於營伍實有裨益者也一買補營馬之宜調劑以免私朋也竊照各省營馬每年照額報倒俱因地制宜定有成數或遇倒斃過多之年額領朋銀不敷買補兵丁互相私朋此雖出自各兵情願並非抑勒然仰體皇上惠恤戎行之至意所當亟為調劑者也臣思武職養亷蒙聖恩照品級之大小賞給隨糧使得馬步兼支各敷其數且自僃例馬亦得照支草乾銀兩則凡隨丁馬匹即有倒斃自應捐資買補而以額領司庫朋銀留充營伍買馬不敷之用方為潔己愛兵之道雖向來操守廉潔之員未必領支入己然不著為令其間容有藉口營私者矣臣查江南地土潮濕倒馬尤多兵丁私朋向所不免為之悉心調劑惟有將隨糧倒馬額領朋銀通融辦理前據臣標中軍參將循例將臣蒞任後應報隨糧倒馬補額朋銀呈繳臣以率屬必先正己當即明白曉諭飭發存貯充公但未經請旨不敢擅便檄行仰懇聖明恩準嗣後無論大小武職隨糧倒馬俱令自行捐資買補仍將每年額領司庫朋銀照數扣存各該中軍衙門以補營伍買馬不敷之用庶官辨無或利己兵丁得免私朋并祈敕部通行直隸各省營分一體遵行則皇仁公普而軍政畫一矣以上二條臣管窺之見冒昧陳奏是否可採伏乞皇上睿鑒施行謹奏高其倬身為總督節制通省於斯等處不悉心籌辦據情奏請所司何事將此二條言之於伊可也倘或推委因循朦混卸責密奏以聞聞喬世臣甚不勝任據汝以為何等撫臣秉公陳奏凡朕所問少有不密非汝之福見理須透愼之毋忽雍正十一年九月初四日江南提督臣南天祥謹奏為陳奏事竊照營汛之設原以弭盜安民江省水陸營汛會哨遊巡在在嚴緊而盜不斂迹失事屢報者良以鼓勵之道尚有未至也臣自抵任以來屢行嚴飭申誡立法勸懲在各汛員豈其不惜功名甘自罹於參處但以孤村僻壤未免遠隔墩臺則巡防或有不周曲港支河不能盡行阻截則追捕必多遺漏臣愚以為欲淸盜劫之案件必設專司巡捕之官兵而欲設專司巡捕之官兵須定不次超擢之賞格如臣標中左右前後五營除移駐上海及各營派撥汛守巡鹽外其餘存城官兵儘敷調遣臣請遴選精幹千把外委數員各挑帶強壯兵丁數名專任捕盜之責酌量分派於沿海各路凡孤村僻壤曲港支河以及水陸要衝墩汛隔遠處所遍行巡緝每報獲盜一起辨員記功酌賞兵丁量加賞拔積至獲盜三起千把即以應升之缺請補外委準其實授兵丁能節次首先獲盜者準拔外委把總倘有怠玩從事無益地方甚至誣良為盜越分滋事等弊即將該辨分別責革治罪兵丁一併究處再照將軍標緑旗官兵以及督撫河漕鎮臣等標與協路各營存城官兵俱敷調遣之用並請敕部知照一體酌派分頭專司巡捕其獲盜立賞之處亦俱畫一以示鼓勵則各辨兵志圖進取當必奮勉效力而江省盜案自可漸少矣臣不揣愚陋為營伍地方起見繕摺陳奏是否有當伏乞皇上訓示遵行謹奏將軍等各標分頭巡捕之説聽之似屬可行行之未必無礙何則恐致騷擾地方害多利少非有益之舉也同日又奏為奏明事竊臣既陳請專司捕盜官兵務須立賞以昭鼓勵臣復酌籌賞賚之需必有所取給方可永遠循行查臣標各營別無存公款項可以動用惟松城行銷鹽引責成營員經管除照繳課本之外稍獲餘利留充租房盤駁之費以及官兵緝私承辦之賞係前浙督臣李衛兼理鹽務設立此法於雍正六年間奏請準行在案但當浙督臣經始時未能預定每年銷引之多寡今行之數年案查前項行鹽餘利除租房盤駁各費外每年約可得銀一千二三百兩與一千四五百兩不等用以分賞緝私承辦人員原為杜梟販裕引課起見然臣查其間容有無功幸邀者恩覺稍濫且營中公務如捕盜一項最關緊要而賞獨不及惠亦不均臣請嗣後每年松城行銷鹽引所獲前項餘利分作二股一股仍充緝私承辦之賞一股即作臣標各營官兵巡獲盜賊之賞總貯臣中軍衙門照款動用每季分晰册報查核如此則事可經久且恩不濫而惠適均無非鼓勵營伍竭力奉公之道也事關通融給賞理合繕摺奏明請旨伏乞皇上睿鑒謹奏此奏似屬可行與兩省督臣密商為之毋得預先張揚以市惠於己雍正十二年正月二十二日江南提督臣南天祥謹奏為敬陳管見仰祈聖訓事竊臣標中左右前後五營及城守一營每營額設兵丁七百六十七名不等其中有馬兵一百六十名及一百六十一名者計六營馬兵共九百六十三名通較額定兵數逾於十分之二蓋臣標係援𠞰䇿應之師或遇調遣馬兵誠不可少然以松屬地當濱海支河汊港小橋曲徑大半不通馬路且土氣潮濕較別府為甚一遇炎暑濕熱熏蒸馬匹最易倒斃每年出口買補為數獨多是臣標各營多設馬餉不惟無裨海疆抑且徒糜國帑欽惟聖恩寬大凡有益於地方兵民者雖多費帑金亦所不惜臣仰體宸衷不敢妄議節省若臣標各營馬匹酌地之宜實應量加裁減况營中利器鎗炮為先而於沿海要地尤屬相宜臣愚擬將臣標中左右前後五營及城守一營馬兵各裁去五十名共計三百名俱改作鎗手步餉俟陸續開除充補則各營鎗兵既額外增多臣益督飭將辨時勤操練務使技藝悉歸精熟庶於海疆良有裨益臣管窺之見冒昧陳請倘蒙俞允臣當會同督撫臣另疏具題為此繕摺奏聞伏乞皇上睿鑒施行謹奏更改兵制當與督臣詳酌題請於撫臣無涉之事也硃批諭旨卷一百五十五
