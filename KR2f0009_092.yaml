body:
  text: 欽定四庫全書硃批諭旨卷九十二硃批馮允中奏摺雍正五年二月十八日湖廣提督臣馮允中謹奏為恭謝天恩並陳地方情形事竊臣一介庸愚毫無知識蒙我皇上天恩由偏裨歷升提督慚惶感激日夕靡寧不知將來何以圖報萬一除本年二月初一日到駐劄皇上萬壽節前容臣單騎赴京隨在廷諸臣叩祝聖壽無疆並將地方事宜僃悉陳奏為此具摺奏聞伏乞睿鑒謹奏赴京之行今歲不必雍正五年六月十五日湖廣提督臣馮允中謹奏為奏繳硃批恭謝天恩事竊臣一介庸愚仰蒙皇恩深重擢至總兵提督叨此非常寵榮雖肝腦塗地不能仰報萬一且於摺奏內御批訓示剴切詳明不啻耳提面命臣雖木石亦應感悟惟有一一欽遵時加警惕如覲天威於咫尺耳為此繕摺恭繳硃批伏乞睿鑒謹奏好勉為之務須言行相符以副朕望同日又奏為恭報拏獲搶犯解散飢衆情形事竊臣查常德府所屬武陵龍陽沅江嶽州府所屬安鄉華容等縣上歲偶被大水西成歉收感蒙皇恩賜賑又復減額蠲租民各安生樂業不意今歲五月內雨水過多江湖漫溢不但田禾淹沒沿湖民間三十日據常德遊擊董朝輔稟稱離城二百里洞庭湖邊之茄子窖塘兵報稱該地方不知是何姓名姦徒聚集多人於二十八九兩日各駕魚船俱在水面遇有客商船隻盡行邀截搶奪卑職聞報當即率領把總星飛前往查緝並移武陵縣帶領捕役同往查拏為首搶犯撫諭聚集飢民等因到臣臣一面飛移督撫一面委臣標遊守千把等帶領兵丁乘坐常德水師營戰船八隻又飭常德水師把總帶兵乘坐該營戰船四隻分頭巡查湖畔以資彈壓不得令有飢民聚集再慮湖面廣濶蘆葦茂密搶犯畏懼兵威或至潛逃他所為患隨又嚴飭洞庭嶽州澧州荆州等協營各於該管水汛查緝前項搶犯務須淨盡不得養姦滋害在案續據遊擊董朝輔等報稱聚集飢民官兵一至即行奔散巳經拏獲有贓人犯何大起等九十餘名知縣陳沆現在究審又據洞庭嶽州副參等報稱遍查水汛俱各寧靜並無搶犯潛避商旅現在通行等情各到臣查姦棍何大起等在茄子窖嘯聚瀆煩天聽罪所難辭今謹將被水災民因飢起釁緣由獲犯解散情形據實陳奏臣再有奏者查得武陵等縣高阜之鄉今歲禾稼較往歲滋盛早者既實半黃中者穗齊結實晚者吐穗將齊奏覽同日又奏為黔楚會拏凶苖情形仰祈睿鑒事竊臣於抵任後查雍正四年十二月內有前任提臣趙坤接準巡察湖廣黎致遠咨據士民呈稱靖州界連黔省五開衛之謬沖花衣苖煙僅三四十戶苗僅五六十丁倚山負險專事搶劫邊民受害無所底止呈請撥兵擒拏以靖苖邊等緣由僃咨署督臣福敏酌奪在案兹於雍正五年三月內經福敏移咨黔省督撫提臣遣發官兵並咨會到臣臣隨飭靖州協署印遊擊吳文帶領官兵三百名會合黔省官兵堵禦協拏凶苗去後疊據署印遊擊吳文新任靖州協副將黃賢呈報謬沖花苗於閏三月二十四日攻破巢穴之後俱各畏威逃散今陸續拏獲凶苗並婦女苖孩共八十名交文員審訊至逃散凶苗現在多方搜緝俟盡獲另報等語經臣復為嚴飭該將等速行擒拏務盡根株並飛咨黔省督撫提臣一併緝拏除俟全獲之日仍聽督臣會疏題報外所有臣據報拏獲凶苗數目理合繕摺奏聞謹奏此事據署督臣福敏雲貴督臣鄂爾泰俱經奏過凶苖之就獲全賴黔省兵辨之力也且爾所奏亦屬遲延同日又奏為請旨事竊臣於雍正五年六月初二日接蒙兵部劄奉旨楊凱人甚去得熟悉苖情交與湖廣總督提督遇有近苗地方參將缺出題補如有內地參將缺出將近苖參將不及不諳者調補一員其所調員缺即將楊凱題補欽此該臣查得近苖地方並無參將缺出止有辰州地固近苗官係副將今該協副將魯嶼病故臣現在會同督臣題報其所遺員缺甚屬緊要可否即將楊凱以參將署理辰州協副將事務出自皇上天恩臣不敢冒昧具題為此繕摺請旨如以越升未便伏乞皇上簡用賢能迅赴辰州邊苗重地以資彈壓其楊凱俟有楚省近苖邊地參將缺出題請補用臣無任悚栗待命之至懇乞睿鑒謹奏巳有旨諭部矣雍正六年正月十六日湖廣提督署理陜西西大通總兵官印務臣馮允中謹奏為敬陳微臣自楚至陜並在西安前赴大通事竊臣欽奉諭旨署理陜西西大通總兵印務於雍正五年十月十六日自常德府起程十二月十五日至陜西西安府隨往會川陜督臣嶽鍾琪言西大通總兵印信尚未頒發又值隆冬嚴寒邊地更甚道路皆冰抽撥兵馬難以搬移留臣暫住西安議令各兵於三月初間春暖冰開起程前往庶免長途寒冷之苦臣俟開印後擇日先赴西大通料理外理合繕摺奏聞伏乞皇上睿鑒謹奏候春暖冰開之議甚是嶽鍾琪亦經奏過今周開捷不日進藏西寧總兵事務朕意亦欲命爾兼理兩處要任竭力勉為之大通乃初設之鎮一切營伍規制兵丁生計俱從兹創始務須悉心籌畫咸令允當得所永逺循行無礙方為不負委任也勉之雍正六年四月初二日湖廣提督署理陜西西大通總兵官印務臣馮允中謹奏為恭謝天恩敬報微臣到任日期並陳地方情形仰祈睿鑒事竊臣欽奉諭旨署理西大通總兵印務自楚起程至陜西西安府各日期俱經摺奏臣於二月初三日自西安起程三月初七日到西大通新設總兵衙門恭設香案望闕叩頭謝恩署事訖伏查大通鎮標二營外另設二營在於白塔川測爾二處其白塔川城池營房俱巳修竣兵馬亦俱到齊臣經過其地周圍巡視隨飭令該遊擊張廷芝在緊要處所安設塘汛撥兵防守訖至測爾城池營房尚未動工西大通城雖修起城門城壕城樓垜口俱尚未修營房亦未修完現在修造俟告竣日另行具奏原議裁撥肅涼鎮屬之永固張義鎮番洪水等營堡馬步兵丁俱巳到標尚有裁撥寧夏漢興鎮營馬步兵丁現在移催亦不日可到矣臣在西安督臣嶽鍾琪對臣云測爾城房未修原議撥之馬步兵丁俟城房告竣秋後令其起程前往其西大通及白塔川原議撥之馬步兵丁俱令於三月起程前往夏季糧餉仍各在本營關領俟大通及白塔兵馬到齊挂領秋季糧餉臣思各兵不無家口一時不能同往夏季糧餉既先在本營關領除收拾行裝留贍家口外到營之日自是囊空篋洗將何度日因與督臣商定量借糧餉以為安頓兵馬之需故臣於二月二十日到蘭州面會甘肅撫藩將與督臣議過量借糧餉之事告知撫臣莽鵠立領餉找足臣隨調署大通鎮中軍遊擊王復到蘭在藩庫共借領銀一萬八百八十兩令該遊擊帶至大通將巳到兵丁先行借給餘飭加謹收貯臣勘大通地土寬濶可以開種但氣候寒冷巳經立夏早晨地尚凝凍因訪聞老農云欲種此地須於秋天犂起來春用火燒煅其土經火則性不寒可種臣到大通巳是三月不及犂燒又一時買牛不出止買數隻用騎騾搭配開犂將帶來之靑稞燕麥大豆豌豆麥穀等籽種在近城避風地方每色先種少許試看何地何色收成俟秋收之後另行具查大通西北之老虎口東南之阿兒探打板正東之東古城正南之迭兒吉打板地方僉係番夷人等出入要隘臣俱酌撥馬步兵丁防守巡查不許漢姦入內指稱貿易生事起釁以及各處應設塘汛亦俱酌撥馬步兵丁防守訖又大通之東南由白塔川至西寧計程雖止二百五十里奈中隔一山即迭兒吉打板上下五十餘里不惟車運難通即騾馬馱載亦須人扶臨到大通又隔大河此時水泛漲無定亦難搭橋惟有造船為便再要隘處所臣既設兵防守不許漢姦擅入番夷境內因議臣遣官一員在集彈壓不許夷漢爭鬭前於三月二十二日起集亦有百十餘人來集買賣矣此雖臣為新設地方起見但是否應行未敢擅便是以瑣屑具摺奏聞伏乞睿鑒謹奏覽所辦理殊屬可嘉之至但一切措置須事事與嶽鍾琪商計而行方好倘有參差互異未免又費他日更張新設營鎮槩屬創舉必心存遠大之見始可為後人成規諸凡總宜詳愼為之同日又奏為敬陳大通接連三鎮營堡程途里數事竊臣荷蒙皇上隆恩署理西大通總兵事務於到任之後查得大通之東南一百六十里至西寧鎮屬之北川營大通之東由東古城至仙密寺計程一百五里由仙密寺約有九十里至桌子山由仙密寺迤東約有二百里至涼州鎮屬之鎮羌營迤東北約有一百八十里至涼州鎮屬之張義堡迤南約有一百五十里至西寧鎮屬之威遠營大通之西北至老虎口計程三十里由老虎口約有二百里至涼州鎮屬之新城堡自老虎口至白水河計程三十里自白水河由明海子沙金城獅子口一路至京陽嶺計程八十里由京陽嶺約有二百里至涼州鎮屬之高古城自京陽嶺至野馬川計程六十里由野馬川約有一百六十里至肅州鎮屬之大馬營又自野馬川由後哨口約有一百八十里至肅州鎮屬之黑城營自野馬川由羊胸子至扁渡口計程七十里由扁渡口約有六十里至肅州鎮屬之永固營又自野馬川迤西由三角城至西水關計程一百三十里由西水關約有一百五十里至肅州鎮屬之洪水營此西大通與寧肅涼三鎮屬營堡地接勢聯之情形也再臣親厯查勘各地方見老虎溝口之山與沙金城之河灘俱有刨穵坑窟形既聞知理合據實奏明為此繕摺同地理圖一併奏聞伏乞睿鑒謹奏所奏知道了地圖留覽雍正七年四月二十四日湖廣提督署陜西西大通總兵官兼署西寧總兵官印務臣馮允中謹奏為敬陳地方情形並派調出征官兵事竊臣蒙我皇上隆恩命兼署西寧鎮印務今經一載夙夜冰兢惟虞任重才疏有負聖明委任至意伏查西寧去歲豐收今春米糧頗賤所種麥豆靑稞等項亦皆發苖惟自入夏以來雨水缺少我皇上軫念行伍不惜帑金頻頒厚賞今西路用兵士卒人人思奮爭告出征西寧標路所派領兵副將二員遊擊二員守僃三員係督臣嶽鍾琪派定照會到臣隨行令整僃軍裝聽候矣又承督臣照會令就標路選派千把總二十三員馬兵一千四百名步兵九百名新募車兵六百名臣俱選派妥帖將各兵行營應用一切軍裝等項逐一點驗齊全馬匹驗明臕分嚴飭加意餧養仍責令將辨逐日操演技藝純熟聽候調遣外至於馬步兵丁暨車兵所需皮帽皮衣等項亦查驗製造完僃並無缺少再臣承督臣照會內開軍需駱駝一萬餘隻現在解送西寧口外牧放可派撥參遊大員守僃千把外委兵丁駝把什經理牧放等因臣隨照檄派撥參將一員守僃二員千把總五員外委十員駝把什五十名兵丁五百名聽候駝隻到日分起經理牧放以上一切辦理之處緣事關軍務理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏俱悉朕意欲汝仍兼理兩鎮印務且不易人今督臣嶽鍾琪出塞遠征地方事宜勉力愼為之必一一預籌著著機先於無事時圖維意外處防僃方為不負朕之倚任也倘至精神不及氣力不支毋得隱諱亦須即為奏聞勉之勉之硃批諭旨卷九十二
