body:
  text: 欽定四庫全書硃批諭旨卷一百五十六硃批冶大雄奏摺雍正十年正月二十八日署理湖北彝陵鎮總兵官臣冶大雄謹奏為敬陳管見仰祈睿鑒事竊臣一介武夫荷蒙皇上天恩由千把末辨拔置副將今復叨沐皇恩命署彝陵總兵官印務臣感激涕零報稱實難惟有夙夜兢惕勉竭駑駘於營伍少有禆益之事不揣冒昧為我皇上陳之一兵餉兩季兼發似宜為變通也伏查彝陵一鎮距省千有餘里而請領兵餉俱遵照部議兩季兼發之例於季首具領請支回營存貯州縣庫內按月給散是在請餉員辨無往返道路之煩而存營兵丁亦免守候時日之苦法至善也臣查兩季兼發多係春夏一請秋冬一請其間似宜稍為更易臣以一歲之內如秋冬二季於季首具領赴司庫請支至期即可前往不致遲滯延緩毋庸置議外惟請春夏二季兵餉季首正值封印必須開印後方可具領差員赴司庫請支再加往返月餘而領餉到營之日已屆仲春之後兵丁自年前十二月初旬領一月之餉又值度歲迎年需用較諸平日倍多所關月餉自無餘剩若候至仲春後餉到始得關領則正二兩月之用度難免賖借之纍臣仰體皇上軫恤兵丁至意懇請將嗣後臣標兵餉春夏二季改作夏秋一請秋冬二季改作冬春一請則兵丁各得按月霑恩不致守候開印曠日持久且與兩季兼發之例相符一轉移間而戎行卒伍均沐皇仁無既矣一支放兵米之宜為更易也查臣標五營兵丁內除左後二營右營半營駐防興山歸州巴東長陽等州縣緣山路﨑嶇挽運維艱向例四季俱支折色銀兩兵丁各於彼地就便買備毋庸另議外其駐劄彝陵州城之中前二營右營半營向例春冬二季支領折色銀兩夏秋二季支領本色米石臣愚以春夏為東作方殷之時青黃正爾不接市糴米價較秋收之後未免稍增秋冬則百榖登場農有餘粟市糴米價較之春夏不甚髙昂臣請將嗣後臣標中前二營右營半營兵丁春冬二季之折色銀兩改作秋冬二季關領當農人收穫之始可以出其所有以易所無兵丁所領折色足以償米價而有餘夏秋二季之本色米石改作春夏二季支放臣查彝陵州倉厫米石俱係先一年附近州縣撥運存貯預備次年給散兵丁既已久經貯倉又不俟臨時挽運且際此青黃不接之時兵丁赴倉支領而市集之米石止供民糴兵丁不復赴市爭相交易米價自致平減一移易間而於兵民俱有禆益矣以上二條臣妄抒芻蕘之見冒瀆宸聽如可採擇伏乞皇上敕下湖北督撫轉飭布政司糧道遵奉施行為此謹奏覽所奏二條甚與情理相合言之督撫酌行可也同日又奏為據實奏明仰祈睿鑒事竊臣於到任後即留心訪察所屬地方土俗民風蒙我皇上教養生成兵民安輯即附近土司亦皆恪守法紀均沐聖世太平之福至於營伍事宜臣莫不徹底清查今查得臣標五營額設馬步戰守兵丁二千九百一十八名內每營存貯公費守糧一十一名共公費守糧五十五名存貯中軍衙門為營中製造旗幟火藥並修理衙署以及提塘工食一切公事使用又查有淮鹽商人經兩淮鹽臣檄委在於彝陵地方設立關卡盤查興販川私鹽斤奉文每月輪撥水師營兵丁協同鹽卡巡役在彝河上下巡查以杜越境私販是以商人每歲在總兵官衙門餽送規禮銀六百兩臣到彝之日據總兵臣杜森言及此項曽經奏明蒙皇上天恩賞給總兵官衙門應用今杜森於雍正九年九月起程赴川之時除將雍正九年分一年規禮銀六百兩收受外又將壬子年規禮銀在商人處支去三百兩合併奏明嗣後應否仍準總兵臣杜森支受伏乞皇上睿鑒施行謹奏因杜森將透支一半之處奏明請旨故許伊收受此次也嗣後應歸於爾杜森何有再支之理同日又奏為奏明事竊臣標五營兵丁荷蒙皇上殊恩賞給銀一萬二千兩營運生息以濟伊等吉凶支領之用此誠我皇上軫念兵艱體恤周至從來未有之曠典也前經總兵臣杜森題請在於彝陵州城開張典鋪二分取息以一年之後生息有餘惠濟兵丁臣到任後備查典鋪情形檢閲典內帳務自雍正九年三月十五日開張典鋪起至九月臣到任止當出本銀甚屬有限查其由來蓋彝陵地處山陬非比衝繁都會之區人煙輻輳是以質當之家無幾而帑本不甚流通也總兵臣杜森因此項銀兩乃皇上特沛洪仁加惠兵丁俾得早霑聖澤因令兵丁中有事需費無出者田房印契亦準其質當暫通緩急以二十箇月滿限議定每月陸續贖取臣思此舉不過以帑本壅滯特為變通以冀成效也臣以兵丁一月所領之餉僅可敷其家計除納還典鋪本利一半又無餘剩兵丁終屬艱難且兵丁之房多係草屋甚平交易及至年底逐次查核委係彝陵地僻人稀質當甚少是以自三月十五計至十二月底九箇月止當出本銀九千一百一十二兩零內陸續取贖者五千一十五兩零僅獲利銀三百一十九兩零實在存架未取贖之本銀四千九十六兩零約估有利銀二百七十七兩零而典內雇倩商人各項執事人等所需工食及租佃民房紙張筆墨等費每年共計銀四百九兩零夫以開典九月之期所獲三百一十九兩之利息止足敷商人等九月工食之需又將何項為積蓄接濟兵丁之資一年後若行惠濟或恐難以措辦臣籌畫再三爰集標營將備妥商典內雇覓人役過多需用未免浩繁酌其中可以減者減一人即減一人之費除董理總商執事人等毋庸議減外其餘無關緊要徒滋浮費之人概行裁去以節繁冗再總商人等及所租房屋開典之始原議工價飯食銀兩為數過多臣亦於原議數內酌量裁減俾令養贍優裕該總商等俱各欣感踴躍從事如此措置一年工食等項止需銀二百三十六兩零較前可以節省銀一百七十餘兩漸次積蓄不致仍前浮費兼之日久質當與贖取者源源接續則帑本既可流通利息益溥永遠接濟庶無告匱之虞矣為此繕摺奏明伏乞皇上睿鑒施行謹奏浮費減則積蓄自多辦理殊屬可嘉雍正十年五月初二日湖北彝陵鎮總兵官臣冶大雄謹奏為恭報地方雨水二麥收成分數事竊臣駐劄彝陵州城及分防歸州興山巴東長陽並兼轄之遠安當陽宜都枝江松滋恩施十一州縣查上年入冬後雨雪時降土膏賴以滋潤億兆歡騰預慶年豐今自春入夏彝陵州地方雨澤調勻田苖暢茂其分防兼轄之各州縣行據各將備查報雨水霑足前來臣復專委千把員辨分路前往細心踏勘會同各地方官確查呈覆去後茲據回報該州縣地方雨水俱各及時普遍髙下均獲霑足二麥現在刈穫收成約有五六分以及七八九分不等其禾稻雜糧己皆播種民人盡力隴畝四境安堵等情到臣臣仰體皇上宵旰憂勤至意謹將臣屬所轄十一州縣地方雨水霑足二麥收成分數逐一據實分晰另單恭呈御覽伏乞睿鑒施行謹奏雨水情形并麥收分數以手加額覽焉同日又奏為據實奏聞仰祈睿鑒事竊臣叨沐皇恩隆逾常格自愧知識短淺報稱無能惟期殫心竭力無隱無欺於營伍勤加整頓凡陋弊嚴行釐剔竭盡犬馬勉供職守不敢因循偷安有負聖恩委任本年四月十八日接閲邸報續承準湖廣督臣邁柱照會到臣臣伏讀上諭仰見我皇上加意戎行訓勉備至聖明燭照無遺洞悉楚省積習臣慚恐交集實無地可容何敢不披􅅹陳情致罹罪譴也臣於上年抵任後即點閲兵馬見其鎗炮騎射陳勢隊伍均欠􅈺熟臣隨躬率將辨勤加操練竭力整飭並行調所屬各營千把隊目來彝學習操演之法回營按式畫一操演務底純熟邇來騎射鎗炮陳勢隊伍較前漸覺改觀將辨隊目人等亦知奮勉其有老弱者臣仰體皇上豢養士卒期於有用之至意曷敢以朝廷帑金任其虛糜但各營中老弱兵丁一時概行裁退壯健之人驟難招選足額臣不時親加檢驗量其技藝精力堪以充伍者準令操防實屬不堪留伍者另行召募務期營伍充實以收實效至於臣標所屬額數兵丁臣到任首先查點除遵定例每制兵一百名存留二名為營中公事使用外一一搜剔如總兵衙門之紙劄向於公費銀兩內幫補臣查營中公費製辦軍裝旗幟以及各項使用浩繁且總兵之紙紅銀兩一年儘可敷用臣當即禁革毋許仍前浮濫至遊守等官亦各有紙劄守糧一名又中軍衙門有左右前後四營各幫貼紙劄守糧一名臣以各官均有紙紅之項足以應用亦飭令悉行革除募補並戒以再犯必懲又經承書識人等亦有加餉守糧一名者共有守糧數名雖現在各有人頂充而人材技藝均屬平常不堪造就臣亦痛飭革退毋容濫充隨募壯丁一一補額凡此積弊臣到任已盡革除兹蒙諭旨訓飭臣是以不揣冒昧將臣抵任以來所兢業辦理之事逐一繕摺據實奏聞伏乞皇上睿鑒施行謹奏果如是整飭剔除營伍自應改觀勉為之雍正十一年四月二十六日湖北彝陵鎮總兵官臣冶大雄謹奏為微臣親歷查勘敬陳營汛事宜事竊查臣屬所轄八營分防二州九縣地方遼濶營汛星列散處必須親往稽查較閲點驗分别勸懲庶將備辨兵知所奮勵緣雍正九年九月內臣到任後即值料理赴陜兵丁之事未得親往巡查逮至雍正十年春夏二季督臣邁柱前提臣嶽超龍仰體皇上整飭營伍之盛心先後差員馳詣各營操練兵丁點驗馬匹軍裝器械臣又未便親往巡查至十月內臣即呈明督臣邁柱並咨署提臣張正興於本月十九日輕騎減從自彝陵起程由歸州巴東恩施興山以及長陽宜都枝江松滋遠安當陽等州縣逐一查勘汛防俱皆嚴密點驗軍火甲械亦各齊全操演弓箭鳥鎗藤牌㓲刀水陸陳勢有純熟者有如法可觀者臣即酌定等次分别勸賞以示鼓勵仍嚴飭各營官辨加意操演毋得懈忽聽候不時抽調驗試必須精益求精以成徑旅使壁壘改觀營伍生色仰報皇上教養隆恩於萬一所有微臣查勘各營汛操防緣由理合繕摺具奏伏乞皇上睿鑒施行謹奏實力查勘盡心訓練朕自有照鑒雍正十一年八月二十六日湖北彝陵鎮總兵官臣冶大雄謹奏為敬陳管見仰祈睿鑒事竊查雍正九年奉𣲖湖北省兵丁二千名赴陜駐防內𣲖臣標八營馬步戰守兵丁三百九十名起程之時莫不奮興踴躍歡欣就道今自陜出口一載有餘其中間有陳亡病故者而糧餉以文到之日住支其家口養贍似宜仰體皇仁急為籌畫者也臣因思恩濟銀兩乃皇上軫恤兵丁之至意祗緣彝陵鎮城地處偏隅開典營運需本不多息銀無幾至今尚未開賞約至雍正甲寅年春季方可題請惠濟惟是軍營陳亡病故兵丁骸骨有雇人送回者有尚未送回者其送回之家有父兄子弟在營食糧者猶可多方設湊先給雇人腳力後作掩埋之費其無父兄子弟或子姪幼小及並無子息者不但雇人之腳力無出而掩埋亦難措辦臣查彝陵典內除逐年各項應用外現存利銀一千餘兩開濟之期轉瞬即屆伏懇聖恩移緩就急先於彝典息銀內將陳亡病故兵丁骸骨到營之家每家給銀六兩令作掩埋之費以廣皇仁再查臣標陳亡兵丁三名一名姚騰龍現有叔兄在營食糧足資養贍毋庸計慮其一名王允芳父母年老有妻室子尚幼稚又一名陳芳有妻室並無子息此二丁之家糧餉既巳住支實屬嗷嗷孤苦目擊情形深為可憫臣愚以為陳亡兵丁二名家口無靠者即於彝典息銀內每家每月給銀一兩以作二丁家口養贍之資其有弟男子姪在營食糧衣食有靠及軍營病故者不在此例所給銀兩即入於臣標惠濟册內年底報銷俟陳亡兵丁領到恤賞養贍有資之時即行停止一轉移間則死者銜結無涯而生者感激思奮益切報效之誠矣為此繕摺具奏伏乞皇上睿鑒批示遵行謹奏與該督提商酌辦理雍正十一年十月十八日湖北彝陵鎮總兵官臣冶大雄謹奏為土辨狂悖違旨欺君據實奏聞仰祈聖裁事竊臣駑駘下乘荷蒙皇恩拔置總兵駐劄彝陵管轄湖北十五土司臣於抵任之時即細心訪察土司舉動始知諸司之中惟容美司田旻如最為強悍復加密探悉得其僣越暴虐種種不法情狀前冬臣在襄陽備細密稟督臣邁柱隨蒙督臣諭云彼之惡迹久已深知非不欲據實嚴參實因皇恩浩蕩漢土一視同仁仍宜仰體皇上寬貸洪慈再為嚴飭告誡彼自知洗滌改悔臣是以未敢遽為陳奏孰意該土辨犬羊成性怙惡不悛查該土辨與施南司土辨覃禹鼎誼屬翁壻向日往來悉由忠洞一帶舊路行走忽於上年十二月勾同禹鼎私開捷便新路彼此來往不由舊道又縱容伊壻禹鼎殘暴橫行並藏匿大炮八尊經土人控告首報隨據施州營遊擊劉䇿名呈報到臣臣即咨呈督臣飭行查追審究及地方官屢次提追僅繳出炮位六尊尚有二尊至今未據繳出且又袒護禹鼎抗不赴審至於伊甥東鄉土司應襲覃楚昭殘暴不仁一案既經審實擬斬監候部議題準伊竟不遵國典敢以私情籲懇矜全冒昧已極復又恣肆無忌於今春二月內突在該司各關揚兵打圍宰牛犒衆遍厯關隘月餘始返前經臣密稟督臣在案及督臣邁柱以狂悖參奏請旨將田旻如革職擬罪又蒙皇上天恩不忍即行嚴究暫停革職準令赴部引見奉文差委妥當員役伴送隨經督臣檄委臣標守備韓嶽前赴該司伴送該土辨赴部乃田旻如又託言該司桃子壩春夏被水現在賑濟土民奏請皇上寬限兩月竟不起身臣思何物土辨敢於煌煌恩旨抗不凛遵狡詐欺罔莫此為甚臣愚以為該土辨既敢抗違豈無姦謀結黨布置將來拏究負固強橫實難逆料臣身任地方固不敢聲張驚擾然亦不得不預為防備隨一面密飭接壤該司營汛員辨謹慎防範留心整頓毋得疏懈致滋貽誤一面飭令密差幹目前往該司隘口確為探訪並查各土司有無附會去後續據施州營遊擊劉䇿名稟稱密探得容美司遣土人張素謙帶領土人潛赴施南司將衆人隱伏山林惟張素謙一人於九月二十八日先到施南司是夜糾合衆土人將土官覃禹鼎署內家伙器皿及眷口俱帶領私奔容美該司舍民多不知覺復遣土人回司安慰土民不要失散到了容美自有安頓目今施南司土民晝則歸家生活夜則邀同婦女入山等情又據各營稟據各差目稟稱該司關隘甚緊把守甚嚴不容外面一人進司其中情形難以探聽等語各到臣似此姦惡萬端違旨抗命強橫不法之土辨斷難一日姑容理合繕摺奏請皇上敕下督撫提拏按法懲處庶國法彰人心慰而各土司知所警惕邊境得以敉寧矣為此繕摺奏聞伏乞皇上睿鑒施行謹奏所奏俱悉汝職守疆圉防備固所當然第不可妄作聲勢激出事端一一聽候督臣指示而行百凡舉動切戒輕躁其欽遵毋違雍正十一年十一月初一日湖北彝陵鎮總兵官臣冶大雄謹奏為土辨負恩叛逆亟請宸斷以靖邊疆以安民生事竊容美司土辨田旻如僭越暴虐惡迹多端及督臣邁柱以狂悖特參而又抗違不遵各情狀經臣繕摺奏聞聽候聖裁今於本年十月二十日據臣標後營遊擊張廷蘭專差稟據紅砂堡汛選差偵探土司情形之目兵熊克純回營稟稱十月十五日二更時分有容美司斑竹園巫陽坪石龍寨土民男婦二三百人隨帶鳥鎗器械外帶炮位擁出塢陽關來到紅砂堡衆土人口稱田土官身犯國法今又在椒園斑竹園打城要將我等男婦悉調進寨婦女留著作當將我們發出與他出力若不出力就將我等婦女殺了我等所以通知三處土人帶領男婦前來投生等語轉稟到臣臣隨一面密稟督臣邁柱並逹知署提臣張正興一面諭令遊擊張廷蘭帶領該營兵丁二百名星赴紅砂堡防禦彈壓並確查該土民等棄土逃來是否實情仍將該土民等隨帶鳥鎗炮位查取收貯其土民男婦等應交文員收管緣歸巴有司俱值公出臣隨飭令遊擊張廷蘭查明户口在於堡汛選擇妥當地方暫為安頓俟文員回署移交安置復查巴東縣治向無城垣界連恩施縣又逼近該司塢陽關遊擊張廷蘭既經帶兵赴堡文員又經公出防守乏人臣即諭令接壤巴東之左營守備任大功帶領該營兵丁二百名星往巴東汛內貼防去後又於二十日據遊擊張廷蘭稟據防守紅砂堡把總于元稟據選差偵探土司情形之目兵陳大金等報稱目等十五日在關外巡探見有土民男婦牛隻陸續擁出關來連夜回汛稟報等情隨於是日未時土衆男婦到汛把總隨將土千總髙起龍旗長陳起鳳喚到問田土官待你們好你們為何事携帶男女倉忙走出關來回稱因昨有外面差來的老爺進司呌小的司官進京他不肯去支吾差官去了土官即差遣頭目發令箭二枝一枝督修椒園斑竹園土城一枝發在關上又發有火藥炮子并過山鳥到關密傳如外面遣發官兵進關呌小的們合心努力敵殺小的們只得携眷投奔逃生又問這關甚緊你們怎麼出來的回稟守關的頭目係昌旗田太年火器營田文如俱是司官親舍小的們先將田文如捆在關上田太年懼怕是以情願帶眷一同投奔出來的等語把總即差隊目將土衆男婦暫為安置堡汛等情又於十月二十七日據遊擊張廷蘭稟稱十七二十等日又有白僚坪塔梁村等處地方土民男婦陸續逃出當將土衆暫為安置聽候示下復據巡哨目兵王克昌等報稱目等瞭望塢陽關內逃出土民空屋復有煙爨關上又有土人把守時放鎗銃再有土目等呈繳田旻如發到塢陽關上雞腳過山鳥一門上刻將軍府爵字十六號令箭一枝寅字號理合稟報等情轉稟到臣臣即密稟督臣邁柱並逹知署提臣張正興復諭令遊擊張廷蘭督率辨兵嚴加防範恐該土辨統衆追趕搶奪乘勢猖狂以致貽誤地方隨飭令張廷蘭如所帶兵丁不敷彈壓即將左營貼防巴東官兵檄調赴堡協同堵禦仍一面飛報以憑另𣲖官兵前往巴東貼防去後臣查土辨田旻如世受國恩敢於悖天逆理狂縱凶頑厯有確據臣素凛聖訓非不仰體皇上一視同仁之至意而敢冒昧陳奏但查該土辨存心姦險始則屢請陛見及奉調進京又復捏稱賑濟奏請寬限明係朦蔽欺罔冀免猜疑便於暗中布置以遂其狂逞之志且又築城發炮密令敵殺官兵今值土衆奔出該土辨叛逆情形種種畢露提拏勢必抗拒伏查彝陵由長陽至百年關汛五日可到由百年關四百餘里前至該司土寨又自彝陵起身由歸州巴東至塢陽關九日可到由塢陽關一百四十里前至該司土寨二路俱可進兵以臣愚見若率臣標兵丁不露一毫聲息乘彼人心不定兼程馳赴出其不意密抵該司土寨將土辨田旻如以及親支族黨並伊壻施南司土辨覃禹鼎悉行收捕仍將恭順土民善為撫恤以靖邊圉至於設官安汛善後事宜恭候皇上敕下督撫提臣斟酌辦理是否可行伏乞皇上批示欽遵為此謹奏斯事豈宜如是輕率舉動真可謂武夫之見凡百總聽督臣指示而行前諭甚明何得復有此請但嚴加防範事至而應不可先發特諭雍正十一年十二月二十一日湖北彝陵鎮總兵官臣冶大雄謹奏為敬繳硃批諭旨恭謝天恩事雍正十一年十一月十五日據臣前差齎摺千總恭捧皇上硃批奏摺到彝臣即郊迎至署焚香敬啓荷蒙硃批訓示臣跪讀之下感激靡涯又於十二月初一日據臣前差齎摺家人恭捧硃批奏摺馳驛到彝復荷天恩俯念愚蒙丁寧誥誡臣捧讀再四惶悚實深竊臣駑駘下質愧昧事機軍旅大務不能持重熟思冒昧奏請批示躁妄之咎夫復何辭乃蒙皇恩寬大曲賜生成教誨周詳頓開聾瞶復奉綸音命臣家人馳驛回彝俾臣早得欽奉速為悛改臣何人斯仰荷隆恩如此其深且厚也惟有恪遵聖訓嗣後凡有事宜一一靜聽督臣指示不敢孟浪輕率以報髙厚於萬一耳理合繕摺恭謝天恩並繳硃批奏摺伏乞睿鑒謹奏誠屬躁妄庸流孟浪武夫若依汝前奏而行成何規模經此一番訓飭當自知毫無識見向後諸事忖度分量而為之可也硃批諭旨卷一百五十六
