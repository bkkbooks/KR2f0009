body:
  text: 欽定四庫全書硃批諭旨卷十五硃批裴􅏍度奏摺雍正元年四月二十一日江西巡撫臣裴􅏍度謹奏為奏聞事竊臣一介庸愚荷蒙聖恩補授江西巡撫於雍正元年三月初一日自貴州起程於二十九日抵省任事恭疏題報在案兹據布按兩司詳據袁州府轉據萬載縣詳報三月十八日有興國縣人許賢章傳布謡言紏衆放搶當據伊壻羅老滿等拏首到縣訊供招出匪黨王老二溫上貴等又據詳報續經拏獲探信賊犯楊龍友溫先榮等情臣一面檄司會同南昌鎮飛飭該府營縣督率兵役嚴加搜捕務盡根株一面給示委員撫綏安戢去後今據布按兩司詳據萬載縣詳稱溫上貴等巳經拏獲訊據各犯供稱溫上貴為首係福建人賣煙虧本起意紏約許賢章等希圖搶榖因賢章轉紏走風伊壻首獲首犯現巳就擒餘黨解散等情到司轉詳到臣伏查此輩姦民係閩廣等處向來附居江西荒山搭棚墾種靛煙名為棚民良匪雜處今據報雖巳被獲誠恐根株未淨貽害地方除嚴飭文武官辨再加巡查嚴謹防範務期寧謐外所有姦民謡言放搶及被拏獲各情由理合奏聞謹奏知道了此事查弼納兩次摺奏甚詳朕巳明白批諭矣爾與伊斟酌料理可也雍正元年六月二十日江西巡撫臣裴􅏍度謹奏為奏聞事竊照江西省自春徂夏雨水調勻今值早稻收成之候臣據布政使查報南昌瑞州袁州臨江吉安撫州等六府屬約收八九分及十分不等建昌廣信饒州南康九江南安贑州等七府屬約收七八九分不等米價每石自六錢二三分至七錢八九分不等再南昌府布種御稻二十五畝收早榖八十餘石相應奏報至江西各屬種麥稀少竟有全不種麥之處查收成約六七分至八九分不等自交六月未經得雨現在虔禱合併奏明伏乞皇上睿鑒謹奏覽奏深為慰悅江右地方仰賴上蒼垂佑料此摺起身後旋見甘霖普霈也一江西自白潢為巡撫之後諸事俱有條理雖以王企埥之昏庸不能盡壞其法惟驛站廢弛馬匹疲瘦不堪甚至山僻地方有驛而無馬伏巡撫白潢知之最詳伏懇皇上特加奬用以風吏治遣往祭嶽官員回京復命奏此三事今密發於爾其一一盡心料理驛站馬匹大有干係毋得忽略至撫標兵丁操練亦甚屬緊要恐爾文臣不以武備為重務則有忝厥職矣天下督撫標兵俱當以孔育珣為法也雍正元年九月初一日江西巡撫臣裴􅏍度謹奏為遵撫臣各營密訪操演臣倣照而行至於薦劾更不敢不慎如吉安府知府王若鏊居官平常聲名鄙穢原欲參處因所屬縣內歷年虧空正在嚴飭著落彌補完後仍按欵紏參蒙臣朝夕訓誡果有實心辦事才守兼優者容臣薦舉或専有所長亦不敢掩飾當各據實摺奏以仰副皇上鼓舞人才之盛心也為此謹奏知道了同日又奏為敬陳湖口設關之險仍請移回九江并分立口岸保商裕課事竊查湖口地方江湖合衝水本溜急商船常遭覆溺臣到任後據商衆環轅哀籲懇將湖口關移設九江以保全商命等情紛紛前來伏念錢糧關係恐有缺額復博採輿論審察地形僉稱離湖口四十里有大姑塘為江西商艘必經之地若設口分抽則公私兩便臣再四思維國課民命均關重大隨行布政司悉心確議又檄委饒九南道勘驗去後兹據勘得九江舊關上有龍開河官牌夾下有老鸛塘白水港等處地勢寬平泊船安穩又勘大姑塘水漲則有女兒港張家套等處停泊水涸則平湖一錢夾岸泥沙俱無風波峭石之險果如商衆所請移關九江再於大姑塘設口分抽則關稅不致缺額而商船亦復安穩裕課恤商誠為兩便等語臣不敢壅於上聞為此繕摺伏懇皇上宸衷獨斷特頒恩旨將湖關移歸九江於大姑塘設立口岸徴收往來船稅雖分兩處其實一關如此則稅課無虧商旅安恬矣謹此奏聞伏乞睿鑒謹奏此議甚好爾會同督臣查弼納將朕批諭爾等之旨入本具奏一面即料理妥當移關可也雍正元年九月二十六日江西巡撫臣裴􅏍度謹奏為奏聞事竊照江西省晚稻收成及現今米價行據布政使回報南昌南康九江三府屬約有六七分不等瑞州袁州撫州建昌饒州南安廣信七府屬約有八九分不等臨江吉安贑州三府屬約有七八分不等米價每石自八錢七八分至九錢不等所有江西晚收分數及現今市賣米價相應奏報再南昌府本年布種御稻田二十五畝晚收得榖五十石合併奏明臣查通省自八月以來雨澤不能周遍南昌南康九江三府屬入秋雨少是以晚收稍歉至臨江吉安贑州三府屬雨水調勻因七月蛟水陡發微有傷損雖不成災未免略減分數理合據實聲明謹奏知道了一切惟宜據實無隱雍正元年十月十三日江西巡撫臣裴􅏍度謹奏本年十月初六日據寧州知州稟稱準銅鼓營守備移會內稱九月二十七日民間謡言瀏陽縣界內石姑山有賊人從血樹坳入州境排埠欲於銅鼓地方搶掠未知虛實等語該州隨諭棚長李上正督率各都練長前往防守忽於三十日一更時分瀏邑界上𥪡旗殺死排埠塘兵二名及至二更時分李上正及伊二子俱遇賊被殺等情臣即與南昌鎮臣在省司道會商鎮標撥兵二百名前往銅鼓防護并飛檄該州營加緊防禦相機擒捕又差臣標千總星夜前往探聼去後續據該州通詳查明三十日被殺塘兵羅成虎李廷松二名是晚獲賊一名搜出書信紅捆布鷂鞋乾糧五更搜山有遺棄刀鎗等件獲賊當被叢打身死又據臣標千總探聼回報探得初六日有賊邱良生鄒竒富混入營內當被拏獲是夜該營統領兵丁搜巡南坑拏獲賊犯邱君祥等九名解州審訊餘黨仍潛入石姑山等情又據臣衙門差役回報於初八日續拏賊犯吳日正等三名一并飭州確審去後臣伏思此等匪類藏匿深山棚民雜處不得不嚴加搜捕但統衆進𠞰又恐姦良難辨臣與鎮臣司道再三商議俟該州審明現獲各犯如同夥無多即究擬完結就中或有仇扳并豫摘釋倘夥黨衆多屯聚有據臣即會商督臣進𠞰現在酌撥瀏邑連界文武各官晝夜巡查一面擒捕一面曉諭務期地方寧謐不致滋擾為此先行奏聞伏乞皇上睿鑒謹奏此等匪類自不容姑息亦不宜急迫若涉因循恐漸致滋蔓若不辨姦良又恐驚衆反為匪類添助羽翼總須整理營伍訓飭吏治果兵將強勇官吏廉明百姓胥畏威懷德此一二匪類何難消弭全在爾等封疆大吏相機而行實心任事也與督臣查弼納商酌妥協而為之原曾諭爾明春前來陛見朕雖未見爾面信爾之心與見面一般今地方上既有此等小事不必拘定明春來京見朕須度量可來之時亦必先行奏請候旨到日然後再來慎毋一面具奏一面前來也特諭雍正元年十二月十二日江西巡撫臣裴􅏍度謹奏採買米石一事臣接準部文奉旨停止臣欽遵移知科臣繆沅即日回省隨準移稱共發價各府買過六萬一千石未經買齊之米仍行繳價司庫等因臣即檄飭布政司糧道確查各府分買實在數目巳起運者收在省倉未起運者仍留本處俱飭加謹存貯候旨遵行俟該司等查明造册到日具題外再科臣繆沅奉差謹飭不擾安靜明白合併陳明為此謹奏知道了諒其辦事必好繆沅人原去得係朕揀選而用者但稍近迂濶且欠純粹非可大用之才也同日又奏竊臣標千總齎摺回省伏讀硃批我皇上淵衷睿算洞鑒機宜臣仰體聖明綏靖地方矜全民命至意一面擒捕一面曉諭兹據寧州知州報稱審訊獲犯供出醫生劉允公勾引匪黨揚旗散劄無非虛張聲勢恐嚇鄉愚希圖索詐銀米非有别情所有脅從各犯皆自首繳劄哀求開釋現在地方寧靜又據該州稟報獲犯一名白大生供出醫生劉允公現在祥雲菴麻洞地方并羽黨龔竒坤等八人隨即緝拏龔竒坤等七臣臣仍嚴檄各營汛州縣四路搜捕務獲起釁劉允公并飭將現在各犯確審其仇攀自首之犯暫恩深重未獲仰覲天顔孺慕之忱寤寐難安且江省事宜不能盡繕摺內伏懇皇上準臣仍於二月初間星馳入京跪聆聖訓不特於地方有益而微臣戀主之私亦得少慰矣臣不勝惶悚待命之至謹奏目今暫且不必至秋冬之際再行奏請朕意大約定於明春著爾來京同日又奏為恭謝天恩事竊臣標把總齎摺回省捧到皇上賜臣克食果品又賜奏匣鎖鑰臣出郊跪迎至署恭設香案望闕叩頭謝恩訖伏讀硃批摺外奉有諭旨二道飭行社倉保甲嚴禁供應餽送仰見宸衷軫念地方興利除弊剴切周詳良法美意至明至杜矣再臣衙門向有鹽道鹽規一萬兩循例解部糧道漕規四千兩布政司平規八千兩未經奏明絲毫不敢擅動雖臣家口不多日用無幾但巡撫衙門不無所費仰懇聖恩或將布政司平規賞給一半資臣薪水之需餘俱留充公用瑣屑私情不當冒瀆聖聰臣自揣愚昧君父之前不敢不據實直陳伏請訓旨遵行為此恭謝天恩謹奏爾等封疆大吏賞勞將辨公用捐項所需甚繁一塵不染潔巳固善恐無以為奬勸鼓舞之資亦與地方上營伍吏治無益此在爾等揆之本心取所當取用所當用耳朕自然照鑒斷不因此而有所嗔責若欲朕指出某一項當取則不可一者朕不洞悉外省情形二者於大體不便爾等於情通理順之舉但放膽做去總還朕一是字來不論如何若何皆可巡撫之任較之藩司不同若一介不取與恐難以料理地方也爾毋錯會朕意應行者行不必疑畏雍正二年三月二十八日江西巡撫臣裴􅏍度謹奏江西省本年正月少雨二月中旬至今各郡雨澤頻沛二麥秀實新秧滋發栽插及時早禾可望豐收米價亦平仍照上冬每石八錢三四分不等小民安業共樂豐登理合具摺奏聞謹奏覽奏深慰朕懷近京數省雨澤亦甚調勻特令爾知同日又奏湖口關稅務奉旨交臣衙門兼理兹本年二月十六日一年期滿據委員南康知府張景良共抽稅銀除正額銀兩照數按季解交户部外所得贏餘銀五萬二千六百四十六兩零蓋因江楚嵗稔商船輻輳之所致也現繕具批文起解户部交送內庫為此奏聞臣更有請者湖關移回九江𣙜務一新臣每念額稅四季解部向委吏胥管押往返多費濫冒難稽臣愚請嗣後將季稅俟一年期滿委員彚解不惟節皇上睿鑒批示遵行謹奏今嵗贏餘因爾等清釐所致數覺過多倘額外剝削商民則斷然不可關稅繫於年嵗之豐歉難可預定總在爾等據實奏報朕自能照察或偶遇不及之年不可勉強必求足數此項原係贏餘只須任事者本心無欺而巳不然是又增出一畨稅額矣假若監稅者借此更取己之餘利此則尤其不可者當再四嚴加訪查毋致苦纍商民朕在此正欲頒發稅關訓諭到時飭令實心遵奉而行可也同日又奏為奏明事竊查江省棚民由來巳久臣上年到任值溫上貴一案即嚴飭闔省文武各官稽察保甲整飭營伍并檄司通行查議正在繕摺具奏隨準督臣查弼納奉旨頒發條議移咨到臣又雍正元年十二月內接到大學士臣白潢抄摺奉旨交臣奉行又雍正二年二月內復準部咨內開户部尚書張廷玉條奏奉旨發江西浙江督撫詳議具奏欽此欽遵俱經檄飭兩司查議在案查諸臣條議編甲之法大概相同但編甲之中不無變通臣身任地方細訪情形各有不同有入籍年久現在納糧當差者有入籍未久去留無定者有逺在山箐星散各居者有土民雇其傭工地主招其墾田者有山主利其力作曲為隱庇者或種靛麻或種茶煙或佃耕做紙統名之曰棚民要在因地制宜順情立法地方官得人方能有益臣於該州縣謁見時莫不諄切誡諭令其實力奉行至一切應行事宜俟查議到日臣會同督臣悉心公議具題外合將現在查編保甲緣由先行奏明謹奏將諸臣條奏發來之意原為爾等地方大吏洞悉利弊故令爾等詳議也務須細加訪察必透徹事之終始情節再加以詳慎籌畫方於事有益不可以一二屬員之語為慿忽於整理而貽害於後日也雍正二年六月二十四日江西巡撫臣裴􅏍度謹奏雍正二年六月二十日署南昌鎮臣陳王章抵江西省城臣率同文武各官出郊跪請聖安陳王章口傳諭旨教訓諄諄切中臣病跪聆之下汗顔無地伏思棚民一事臣因屢奉諭旨愈求詳慎惟恐地方官編查不力疊次告誡巳經徹底查明除九江南康撫州建昌四府無棚民外九府共計一萬五千餘戶俱逐一分析編甲造册料理齊備地方寧謐至應調之缺堪調之員亦詳加酌擬但應督臣主稿候其到南昌盤庫當面公驗即日會題臣不能仰體天心早為題覆致厪聖懷臣罪何辭至地方一切要務臣竭力辦理曉夜不遑今祗凛嚴訓惟有痛自改悔益竭駑駘期免隕越謹此奏聞臣不勝悚惕惶恐之至謹奏爾為撫臣中之優者再加剛方自持俾屬員知所警畏則十全矣同日又奏為奏聞事竊江西省本年自春徂夏雨水調勻今值早稻收成之候行據布政司查報南昌瑞州臨江吉安等四府屬約收八九分不等袁州撫州建昌廣信饒州南康九江南安贑州等九府屬約收七八九分不等米價每石自八錢二三分至八錢八九分不等通省合算實有八分收成再南昌府本年布種御稻二十畝得早穀五十一石五斗所有江西早收分數及現今市賣米價相應奏報至江西各屬所種二麥僅十分之二三查收成約有七八分不等再現在晚禾亦俱茂盛交六月後南昌南康九江三府雨少目下齋戒祈求早晚得雨可望有收合併聲明謹奏知道了江省有爾如此好撫臣治理地方諒上蒼自必賜以嘉應也此摺來後即得甘霖亦未可定同日又奏竊查寧州流匪一案經臣兩次摺奏并遵例題參疏防文武職名在案兹六月初一日續據寧州報稱於上猶縣地方拏獲要犯黃本習到案隨解司審訊供出首犯劉允公自稱元帥呌黃本習做都督同夥鄒文詔王阿滿等共十八人在本習家會齊往銅鼓營搶掠路遇李上正父子本習即與鄒文詔等一同下手殺死又撞見塘兵恐其報信王阿滿趕上殺死是實聞官兵追捕分頭逃散等語據此黃本習實係此案殺人要犯同夥姓名現供確鑿查現在巳獲正犯五名除四路密差嚴緝劉允公并夥犯務獲外合將現獲要犯黃本習供情先行據實奏聞謹奏知道了其餘未獲各犯嚴行設法緝拏務期擒獲同日又奏竊臣標把總齎摺回省伏讀硃批湖關贏餘恐有苛索諭臣隨時收解仰見聖明恤商至意臣欽遵辦理絲毫不敢纍商六月初五日恭接上諭一道臣欽遵祇領分行九江贑州兩關宣揚聖德務使商民共曉并嚴飭該管官務期悉心仰體實力奉行再查移關九江及大姑塘口岸後商船安穩並無損壞皆出皇上生全大德惟大姑塘現在水長左有女兒港右有蝦蟇港船泊港內甚是平穩但入冬水落恐大船不能進港當再稍為疏濬便可停泊為此一併奏聞謹奏嚴行約束該管各員至為緊要聞得各關交與地方官管理以來商民頗有不便之論此或係部院各屬所造之言亦未可定但據理而論欽差苛刻尚有地方官可以挾制若地方官過刻則商民無處告苦全在爾等督撫大吏善於識人選委且不時留心訪察也雍正二年六月二十九日江西巡撫臣裴􅏍度謹題報在案臣於是夜聞報即率同司道等親自到庫驗看封鎖次日盤查各項俱各清楚並無虧缺再查布政使為通省屬員領袖錢糧總滙最關緊要我皇上知人善任臣何敢冒昧瀆奏但臣受恩深重知而不言負罪實多臣伏查如本省按察使陳皇上簡拔一員就近升補早有専司則地方風土熟悉於錢糧大有裨益矣伏乞皇上睿裁謹奏知道了諭江西巡撫裴􅏍度地丁錢糧百姓自行投納此定例也聞江西省用里民催收每里十甲輪遞值年名之曰里長催頭小民承役既不免姦吏之需索而經年奔走必致曠失農業擾民無甚於此者即應查明通行裁革若慮裁革里長輸納不前亦當另設催比之法或止令十甲輪值催趲花户自行赴官投納不得干纍輪催之人務須斟酌盡善永除民纍毋負朕惠愛元元之意再諭巡撫裴􅏍度朕惟除莠所以安良黜邪乃以崇正自古為國家者綏戢人心整齊風俗未有不以詰姦為首務者也聞爾江西地方頗有邪教大抵妄立名號誑誘愚民或巧作幻術夜聚曉散此等之人黨類繁多蹤迹詭祕茍不絶其根株必致蔓延日甚地方各官倘務姑息不行訪拏是養姦也澄清風俗之謂何爾等督撫亟當嚴飭各屬密訪為首之人嚴拏治罪能去邪歸正者則豫以從寬如有出首者即量加奬賞務令萌蘖盡除隂翳全消風俗人心咸歸醇正其或仍前因循不能查禁事發之後該管官一併從重議處所謂邪教者非指世俗尋常僧道之流而言也慎毋錯會或致紛擾多事即此查禁邪教亦毋得張大聲勢以駭衆聼惟當留心密訪設法緝獲祇將為首者重懲其餘被誘惑者槩不深究如此方合朕意假若不肖有司借此恐嚇平民波及無辜則不特無益而反有害也爾其仰體朕心飭諭屬員徐徐為之可也又諭雍正二年九月二十八日江西巡撫臣裴􅏍度謹奏竊臣標千總齎摺回省跪讀硃批諭旨革除里長嚴禁邪教二件臣查里長纍民自臣上年到任通行革除勒石永禁隨奉皇上頒發聖訓益嚴加申飭欽遵在案現在行滚單之法令花户輪催交納聼從民便其中抗頑拖欠者按名查比不致干纍輪催之人臣時加察訪如有陽奉隂違仍有里長暗行滋擾輕則隨事究處重即據實題參至於邪教臣凛遵密訪果有夜聚曉散蹤迹詭祕者立即嚴拏為首之人治罪斷不敢仍前因循其餘被誘愚民去邪歸正者從寬免究有能出首者量加奬賞恪遵諭旨不敢張大聲勢以駭衆聼再查江省醫卜星相一姦匪以厚風俗謹此遵旨覆奏恭繳上諭二道謹奏甚屬可嘉足見實心任事同日又奏本年九月初八日督臣查弼納抵江西省城同臣赴布政司庫內查照各項逐一盤驗清楚惟題請打造船動支庫銀三萬兩一案未準施行現存木料變價歸庫其餘並無虧空次日即訂督臣驗看撫標辨兵操演弓馬試放鎗炮又傳集有棚民緊要州縣各員公同驗看應留應調細加斟酌又將通省倉庫營伍塘汛驛站馬匹以及官辨優劣一切要務俱經公驗公商督臣既極練達又極和衷再三商酌務期妥協彼此愜心仰體皇上至聖至明以實心行實政之盛意事無巨細必徹底澄清實力報效幸督臣意見俱與臣符合相見之後更極相信除棚民一案巳經會題外合將督臣來省會商情節據實奏聞謹奏覽和衷二字朕甚嘉悅如此方是同寅協恭事君之道同日又奏竊照江西地方因六月少雨臣率屬虔禱巳於奏報早禾摺內聲明跪讀硃批九分不等米價每倉石自七錢六七分至八錢八九分不等惟南康九江二府屬得雨稍遲約收六七分米價每倉石九錢二三分至一兩不等再南昌府布種御稻二十畝收晚榖三十八石相應一併奏報再查江西雖獲豐收人心歡慶但因江南浙江風潮傷損搬運者多是以米價未減恐冬春之交青黃不接米價勢必漸增臣查上年採買米石現存六萬一千石若米價騰貴或於本地平糶存價俟明年收成買補亦易措辦或有江浙採買之官照上年安徽原價兑糶之例既濟江浙又平米價一轉移間於國帑民食均有裨益矣伏乞皇上睿鑒指示遵行謹奏巳有諭矣同日又奏竊臣查地方諸務隨時修舉原屬常分不應冒瀆聖聰仰惟我皇上宵衣旰食勵精圖治臣雖竭盡駑駘悉心展布惟恐未當謹將現行數件條列陳之一通省巳參之虧空統計連外省咨回各案約三十萬兩內除有著現在審追外其中人亡産盡無可著追者十二萬餘兩臣與督臣再三籌畫國帑緊要豈容虛懸查晉省提解耗羡一時權宜誠為良法但因地制宜各有不同江省火耗每年不過十五萬兩分給各屬巳無餘剩此外别無所出惟有將現在節省浮費公同竭力捐補恪遵諭旨務於三年內補完無著之項不敢絲毫揑飾派纍奏聞虧四十餘縣約十餘萬兩難以槩參臣飭將通省一應交際浮費每年約有十萬兩盡行革除就此中所省各填補本身虧空解司轉報查年餘以來巳補十分之七八俟補足之日即以此有餘接補巳參之無著者亦易易矣一積貯倉榖查江西通省額貯一百十五萬石從前半多折價兼有借欠并虧價之處臣屢經嚴查將價封貯不足者勒令賠補一靣追比舊欠一靣委員買補年餘以來巳實貯穀八十餘萬石現在一驛站馬匹巳委驛道親往各處查驗足額臕壯堪應差使其餘一切人等不許私乘一騎如有騷擾濫給等弊定即據參巳經督臣驗看烙印整備亦經督臣驗看如式州縣亦俱照設勸捐現在或數百石至千餘石不等三年之中可有成效一棚民編甲既定稽查肅清現在地方寧謐人民是安堵至土著之戶亦遵通飭清編統歸嵗底彚册造報以上各條均關緊要恐有未當之處伏乞皇上睿鑒天恩指示遵行謹奏所奏俱悉雍正二年十月二十八日江西巡撫臣裴􅏍度謹奏竊臣叨任封疆沐恩深重未得仰覲天顔前兩次恭請陛見奉硃批諭旨目今暫且不必至秋冬之際再行奏請朕意大約定於明春著爾來京欽此臣惟有冰兢夙夜竭盡駑駘以期無負委任至意今仰賴皇上福庇地方寧靜年嵗豐盈現在正當大計確核錢糧倉庫以及緊要案件册籍并遵旨運米浙省平糶巳經題報開運日期陸續趕運齊完伏乞皇上準臣於封印後起身來京跪聆聖訓庶幾微臣戀主積誠藉以稍慰并得親承指授知所遵循於地方更有裨益矣為此繕摺請旨伏候批示遵行謹奏封印後來則元日在途中矣開印之期又不及回任况張楷朕欲用於别省今嵗竟不必來姑且候旨卿自巡撫江右以來甚愜朕意即來京朕亦無多面諭之處遵旨可也雍正三年二月二十六日江西巡撫臣裴􅏍度謹奏江西省昨冬十二月連得大雪本年正二月雨澤頻沛菜麥茂盛新秧及時栽插可望有收內河小港俱慶利濟米價亦與昨冬相等人民歡欣感戴皇恩浩蕩二月初七日吏部尚書朱軾由浙江過江西省城臣率同司道文武各官出郊跪請聖安朱軾到家隨有摺子交臣轉奏理合一併恭齎奏聞謹奏知道了朱軾若巳起程將此字交與伊母看畢令其隨便寄與朱軾同日又奏竊九江關稅務於本年正月十六日一年期滿據委員南康府知府張景良報抽稅銀除正額照數按季解交戶部外所得贏餘銀六萬七千八百一兩九錢零因係移關之始商旅穩便聞風輻輳故比昨年所得增多據實儘解繕具批文齎解户部交送內庫為此奏聞謹奏此項之盈絀惟看天年豐歉何如不可為例但祇據實為是耳同日又奏為備陳封禁山情形伏乞睿鑒事竊臣準督臣查弼納抄送請開封禁山摺稿奉諭旨會同臣與鎮臣酌議又布政使常德夀到任口傳諭旨著臣查明果有窩盜即行清理無則據實具奏欽此臣身任封疆敢不悉心籌畫據實陳奏查廣信府有銅塘山相傳産銅故名銅塘然有名無實誘衆聚匪擾纍地方故自明代至今歷來封禁又名封禁山順治十年有獻議採木者郡縣力陳不便前督撫臣會同題明永行禁止勒之碑石臣查弼納摺奏情由蓋因棚匪為害有鑒於萬載寧州二案疑此輩必有巢穴相傳封禁山舊為盜藪或即於此內藏聚務在破巢搗穴計慮誠周但萬載寧州離廣信封禁山甚逺兩不相涉流匪偶然烏合原無穴巢也若以封禁山內有沃土可以藏姦此尤傳聞之誤此中封禁日久樹木充塞毒蟲滋藏無可容身之地正為弭盜而封禁並非有梗化頑民盤踞在內自耕自食也臣到江西聞有封禁山之名即備查細訪此山開則擾纍禁則安寧歷有成案確鑿可據五十九年鉛山縣有匪類擾害即時擒獲因恐有餘黨逃竄其中彼時參將卓爾壇率同兵目徐天麟等百人曾進封禁山內搜查二十餘日並無藏匿臣與鎮臣會商密調搜過此山之徐天麟到省面問情形與前訪聞無異但恐年久禁弛現在密諭地方文武再行細查并遣人入山周圍察看俟覆到之日容臣與督臣確商繪圖會摺具奏外合將封禁山始末情形先據實奏聞謹奏當開則不得因循當禁則不宜依違但不存貪功圖利之念實心為地方興利除弊何事不可為也全在卿等秉公相度時宜而酌定之雍正三年六月二十日江西巡撫臣裴􅏍度謹奏為奏聞事竊江西省自春徂夏風雨調和今值早禾收成之候臣行據布政司查報通省各府州縣收成俱有七八九分不等米價每倉石自八錢六七分至九錢四五分一兩不等再南昌府布種御稻二十畝早收得穀五十石相應一併奏報但查御稻試種自康熙五十六年起向租民田照收償還原係紅色三年後漸變白色與本地榖無異土性非宜所收漸減似可無庸再種應否停止合據實具奏二麥種者甚少約收七八分一併奏聞謹奏原係試種既無大益即行停止可也同日又奏竊惟積貯莫便於社倉而勸輸設法尤在於牧令捐輸多而成效速者即以覘其化導有方才具出衆一年以來查通省陸續報捐榖巳有十萬石其中如鄱陽縣知縣李汝霖勸捐過一萬三百餘石寧都縣知縣李治國勸捐過一萬一千餘石捐輸沙淤山田約二頃有餘衝損草房五六家被淹老幼七口即發社榖賑給以資本開挑及時補種不望掣肘矣為此繕摺奏聞謹奏如果實係開導勸諭不加強逼而捐輸者當具疏題奏朕賜以議敘以鼓勵直省州縣等官嗣後奏摺不必一摺一封套兩三摺併封可也請安摺應如舊奏事摺面宜用素紙綾絹殊為可惜同日又奏為恭謝天恩兼陳愚悃伏候睿裁事竊臣接準部文奉到上諭臣遵查蕭義宗履歷兩任同知升授南安知府巳十三年素不認識臣到任即聞其居官謹慎聲名好及後明察暗訪或南安小府易於見長因委署吉安府數月其操守辦事益加勉勵計典合例司道公薦據詳卓異豈料該員係總督蔡育榮家人之子臣欽奉諭旨感愧無地臣與通省司道俱被其隱瞞誤薦咎復何辭幸蒙聖恩浩蕩宥臣不知從寬發回原任此誠我皇上天髙地厚之恩但蕭義宗雖經開戶終屬出身微賤且不據實奏明居心可知皇上或垂念該員履任尚優姑免其罪仍斥其官則在蕭義宗既感沐殊恩之寬宥而官方亦得以整飭矣應否繕疏題參伏候皇上批示遵行謹奏題參在爾似屬得體朕仍豫以從寬也將不據實奏明居心可知之句不必敘入本內當令伊深知朕恩勉力做好官假若因無升遷之階懈怠自棄再行嚴參加以重處朕只欲南安一府子民得受實惠何必拘執耶雍正三年九月二十六日江西巡撫臣裴􅏍度謹奏竊江西省仰賴皇上福庇地方寧謐但弭盜安民尤須加意整飭臣查各屬形勢惟鄱湖最為險要地又空曠巡防查緝全賴塘汛臣到任後添蓋塘房撥兵防守而塘房隨水遷移水口隨修隨壞究非長䇿因又造巡船八隻不時巡查但恐湖面廣濶巡查難周塘房或有應添應改之處必得親身查勘方能備悉情形臣擬於冬底封印之後親往鄱湖周圍察看聞湖內有山可否添設塘汛務求一勞永逸之法并順便查看九江大姑塘關口一應收放事宜庶委員益加謹飭免致日久弊生也臣未敢擅便伏乞天恩批示遵行再督糧道副使李蘭出京時面奉訓旨欽遵繕摺交臣轉奏合併恭齎謹奏鄱湖塘汛應親歷詳審查勘者知道了再爾所奏稍寬接徴處分一摺甚為有理留發部議同日又奏竊臣接準浙江署巡撫事按察使臣甘國奎密札內開溫州范子盛等邪教惑民供出首惡王文治等住居閩省恐鄰省江西亦有其類等情先經奏明欽奉硃批著甘國奎密以相聞到臣欽此臣接密札一面訪查一面遣人到浙抄録案情九月初六日準浙省抄咨全案細閲前後供情所指邪教起於閩省惑於浙省並未煽惑江西亦無干連逃匿之犯臣於境內仍留心稽察設有此類務即嚴處現在並無邪教恐厪聖懷合行奏明謹奏此等處切毋存將小事化無事之心以不究為安靜凡人立身行己尚有無因惡小而為之之戒况平治天下國家豈可因事小而忽略之乎當再三留心密訪勿使漏脫閩浙二省巳皆奏報擒獲矣雍正三年十一月初八日江西巡撫臣裴􅏍度謹奏竊臣查臨江府知府胡期頥前因揭清江縣魯宗懋虧空致宗懋以勒詐互揭題參一案奉旨留任所揭勒詐審係揑誣惟揭娶妓是實業經具題聼候部議在案但臣見胡期頥雖辦事能幹而舉止稍輕是以留心細訪其從前居官行事聞在山西知縣任內曾與巡撫蘇克濟家人趙七夤緣趨奉復與伊兄胡期恆同往年羮堯處串通作弊投拜門生且又宿娼淫蕩種種不堪雖訪聞之言未必皆實然亦必非全虛似此心術人品雖有才具行止不端實玷官針仰請皇上特旨斥退或容臣另疏題參臣未敢擅便伏乞聖恩批示遵行謹奏前於本內朕巳看出業有旨矣如此據實甚合朕意朕殊嘉之同日又奏竊布政使常德夀奉旨調補雲南著乘驛速往臣欽遵暫接交代該司巳於十一月初一日起身業經題報在案臣查正項錢糧俱各清楚惟各項細欵必分析造册方無舛錯該司起身匆迫細册不及全造如欲逐細盤查勢須稽留時日若先令起身補給印結該司又不放心是以一面出給印結一靣將各庫項查點封貯俟新司到日再行逐細盤查偹造欵册報部現在收放緊要事件臣照常辦理合將常德夀遵旨乘驛赴滇并庫項交代給結緣由據實奏明再常德夀為人和平辦事勤敏在任八月恪謹無誤合并奏聞謹奏常德夀朕所深知者也陳安䇿據朕觀之似外君子而內小人當留意密訪其人甚不妥當雍正三年十二月十八日江西巡撫臣裴􅏍度謹奏竊江省從前虧空各案內有十二萬餘兩無可著萬兩臣三年節省司庫平規補銀一萬兩布政使陳安䇿捐銀六千兩饒九道劉均捐銀二千兩贑南道王世繩捐銀二千兩驛鹽道孫蘭苾捐銀二萬兩通共節省捐貯銀十二萬兩堪以撥補無著之項現在飭司查明各案挨次分析造册具報統於奏銷前報部查銷歸結一併繕摺另奏臣惟有加意節省儘力圖報務期實有成效不敢踴躍願捐如修建社倉收貯社穀前後捐過五千餘兩實屬急公仰懇皇上優奬以示鼓勵謹此奏聞伏乞睿鑒謹奏朕初即位時聞孫蘭苾聲名好後漸聞人多有言其不妥者且論伊任河南府時甚屬平常昨費金吾面奏朕云孫蘭苾浮躁任性操守中平等語朕所以不能定此人之優劣爾其據實奏聞若居官果好朕自當示以奬勵若徒以其捐助之多而優加褒奬恐衆人皆趨尚此風殊非善事也同日又奏竊查贑關稅務於本年十月十一日一年期滿據委員贑南道王世繩報抽稅銀除正項額課遵例咨部充餉外所得贏餘銀三萬二千七百八十餘兩現在繕具文批起解户部轉交內庫為此具摺奏聞謹奏知道了雖交內庫朕亦無私費處也久之天下人自必洞悉同日又奏為遵旨據實陳明事奉上諭副將以下遊擊以上未見過者輪流來京引見等因欽此臣查有袁州協副將周開捷一員未經引見合行起送該員漢仗弓馬俱屬可觀至其操守及整飭營伍之處自五月到任以來頗稱勤慎在陜西四川多年屢次出兵軍務營伍亦頗熟練但到江西未久尚不能深知天顔照臨之下自邀聖明洞察理合據實陳明伏乞皇上睿鑒謹奏聞此人甚好逈逾尋常今巳用為總兵矣雍正四年三月十三日江西巡撫臣裴􅏍度謹奏竊臣因鄱湖塘汛并關口情形恐未周悉先經奏明親勘在案臣於正月初十日自省城起身二十四日回署勘得沿湖塘汛俱各修整但水勢時退時長塘汛俱在老岸山腳難以更移惟五六塘離水太逺者水退即於沙洲添蓋草房數間汛兵移住防守有益商民所費不過數金水長棄之仍還本處嚴飭巡船不時巡查弭盜安民可以有備無患至關口事宜臣親自收放二次遍詢輿情如有不便及舊弊未除許即呈訴俱各稱便並無異詞其大姑塘口岸一帶客船停泊之處亦俱安穩水大泊入內港水淺沿江可泊收放甚便合將臣親勘塘汛關口情形據實奏聞謹奏據奏商民稱便甚好但稅關之事最難辦理得中切毋過於信人須廣布耳目不時訪察同日又奏竊江西省地方荷蒙皇上福庇四境寧謐入春雨澤霑足早禾滋長漕運利涉稍嫌春霖過多恐交夏少雨幸米價尚平目下亦巳晴霽從此雨暘時若斯農田稱慶矣合行奏明謹奏知道了題奏書院一事當先具摺請旨率然具題大不合矣即廣西李紱之題請亦係先經摺奏奉旨然後具題也劉允公之案雖結緝捕之限不可虛應故事當懸賞設法時刻留心密訪務以擒獲為期同日又奏竊臣到任之始即聞九江南康二府有古河二道可避鄱湖之險隨飭地方官查勘回稱九江之河中有三十里山嶺阻隔南康之河俱係浮沙二處皆難開濬臣因未經親勘不敢冒昧布政使陳安聞蒙皇上傳諭著臣商議臣於正月初十日親勘塘汛即一路相視地形水勢南康之河從王湖壠四十里至五福港口兩頭皆髙中係民田內有廖家池乃廬山積水四面不通臣親勘兩頭俱係沙洲皆長七八里水退洲現不能立岸即開浚成河一經水漲即蕩為平沙仍屬無益九江之河臣從府城外江邊龍開河沿河陸路勘至藍橋五十里皆小溪自藍橋至黃老門以上二十五里皆係山阜隔斷並無河道且用水平測量地形甚髙恐下有石根阻隔難以開鑿所有勘過兩河情形臣謹據實繕摺并繪圖奏聞伏乞皇上睿鑒謹奏誠如此何可開濬天下事無強為之理也同日又奏竊臣於奏明公補虧空摺內驛鹽道孫蘭苾捐數較多仰懇皇上天恩優奬奉有硃批諭旨聞該員聲名不好著臣據實另奏欽此臣與孫蘭苾素不相識從前居官如何之處不能深知自臣到任以來見其氣質用事性情稍急殊欠涵養言語又多率直是以不滿人意其居官才具操守雖非出衆尚屬謹飭遇事勇為急公效力不辭艱難其存心辦事猶可取也臣思全才難得姑取其所長戒其所短冒昧陳奏不勝惶恐謹將該員居官為人之處據實奏聞謹奏此奏甚公朕尚欲調來看驗其人將伊之效力處具本題來可也雍正四年四月初四日户部侍郎仍辦理江西巡撫事務臣裴􅏍度謹奏竊臣接準部咨欽奉上諭特授臣戶部侍郎仍辦理巡撫事務聞命之下不勝感愧謹繕疏恭謝在案伏念臣忝任封疆祇懼弗勝荷蒙天恩優渥尤增戰栗臣材識短淺夙夜竭蹶末由報稱仰懇我皇上時加教訓得以遵守庶免隕越也為此繕摺恭謝天恩謹奏覽奏謝知道了卿等若肯實心求治君臣同心視如一體遇事彼此商酌朕無有不推誠指訓之理假若沽名釣譽不論時勢之可否不體朕躬之難易似此者又當别論耳卿為撫臣中之優者勉為之但不可柔軟以寬縱屬員姑息以邀取衆譽此固書生之常態乃朕預防之諭也切宜留神同日又奏為請嚴交盤掯勒之積習以清民欠以實庫帑事竊錢糧關係重大交盤務須清查無如州縣積習每於到任之初惟恐前任民欠難追即作虧空揭報府司恐蹈抑勒亦即據揭轉詳及至批查旋又報稱無虧懇請免參者有之或稱尚在盤查請參交代遲延者有之若接任者係姦猾之員並不清查實在無論久近不問多寡凡有尾欠之項一槩揑作虧空揭報更有知府或因民欠難清或因别事將發亦不清查先行詳揭其意不過豫留地步謂揭報在先得以推諉卸責耳臣再四思維若既揭緩參即涉抑勒若有揭即參又恐寃誣且一經參出新官竟置不問花戶觀望不前直至審明題結雖經新官認徴欠戶延挨巳久以為巳入虧案乘機刁抗遂至月積嵗纍陳陳相因將有追易完之民欠釀成年逺難清之虧案殊非實心辦事之法臣愚以凡州縣交代與知府盤查果有侵那虧空務須查明確數通詳揭報批司徹底清查核明實在虧項然後轉詳即行題參如有將分年分欵實在民欠有追之項並不查明混稱虧空揭報及故意遲延諉卸者即將揑揭之州縣與率轉之府司一併紏參如此則新任交代不敢恣意混揭府司亦不敢率轉卸責庶接徴盡力民欠易清庫帑實有禆益矣臣不揣冒昧據實奏聞伏乞皇上指示遵行謹奏此奏爾幸止具摺若冒昧具本題奏朕大怪爾矣李紱亦將此事具奏大槩相同經朕備悉訓諭矣著李紱密書與爾看同日又奏竊臣查社倉積貯欽遵諭旨通省設法勸輸陸續報捐其中惟鄱陽縣李汝霖寧都縣李治國勸輸較多經臣奏明奉有諭旨臣一面行布政司確查實數造册去後一面訪察俱係勸輸並無勒派現在該員奉上諭引見巳經給咨起身一應錢糧倉庫交代俱各清楚社倉一項亦委兩該府逐倉查明實在確數出結遵旨具題外臣查鄱陽寧都二縣在江省頗稱繁劇錢糧較多李汝霖既將新舊錢糧清理全完又能勸輸社榖萬餘石實係能員但性急氣盛好與人爭論李治國本任錢糧全完舊欠完至八九分社倉勸輸萬餘石亦屬勤慎之員但書生習氣未免過於拘謹各有所短臣不敢隱諱謹據實奏明睿照之下自能洞察也謹奏李汝霖尚未到李治國巳到京引見實係可用之材朕意欲超擢為知府也雍正四年六月初四日户部侍郎仍辦理江西巡撫事務臣裴􅏍度謹奏竊臣前回奏驛鹽道孫蘭苾摺內奉硃批諭旨將伊效力之處具本題來欽此臣行司查照無著虧空各案分析補清造册正在飭司另詳核題間不意有九江府德安縣知縣蕭彬因該府李敬熙詳揭虧空蕭彬亦以勒索互揭知府并牽連孫蘭苾從前主使勒索等情是以該道效力之處未便具奏明至蕭彬揭告一案臣巳會同督臣題參候旨在案但查蕭彬所揭倒提日期牽混他事不無反噬聖明洞鑒統聼審明之日如道府果有勒索按律治罪如係反噬誣揑應請立置重法庶綱紀嚴肅而刁險知所警戒矣合併陳明伏乞皇上睿鑒謹奏凡事不可預定成見預定即屬私意反噬誣揑豈可預言其必然但秉公審理自得其實朕料此事孫蘭苾難保潔清無染若因曾保薦而袒護之則反纍及汝也便此揭告一一俱實朕不責汝何也即汝親子何能保其必不汝欺惟於覺後不徇庇不文飾則無過矣朕生平不罪改過之人朕虛公之念爾當領悉同日又奏竊江省五月內大雨連日江水驟漲旋幸晴霽水亦退落田禾茂盛無損惟贑州府贑縣長興鄉沿山一帶山水陡發衝去草房十一家淹溺男婦大小十五口臣隨飛飭地方官加意賑恤又遣員查勘被淹田地僅止二畝巳補種雜糧不致成災也往請將軍壓服總督亦到省安慰等語又據贑州甚多以致地方米缺價貴每石一兩四五錢等語臣一面飛飭該府屬速將積榖平糶濟困一面飛飭文武各官於接壤兩省處所加意整飭多方戒備毋致滋擾地方再查吉安建昌等府米價亦貴每石一兩三四錢不等俟早榖收穫方能平減理合據實奏聞伏乞皇上睿鑒謹奏據閩省奏聞爾江西遏糴朕甚不取是何理耶朕巳有旨矣部文到日速為奉行毋稍玩延遲悮同日又奏竊臣前奏地方雨水情形摺內跪讀硃批諭旨劉允公當懸賞設法時刻留心密訪務須拏獲欽此臣一面出示懸賞五百兩於所屬境內無論文武軍民人等嚴緝務獲一面又差兵役在閩廣浙楚鄰省四路屣緝務設法拘擒不致漏網再臣奏交盤民欠一摺奉諭旨轉傳知直隸督臣李紱著密書於謝恩摺內蒙天恩於萬一耳謹奏知道了雍正四年七月初三日江西巡撫今升都察院左都御史臣裴􅏍度謹奏竊臣接準部咨欽奉諭旨補授臣都察院左都御史聞命悚惶感愧交集謹繕疏恭謝天恩在案伏念臣猥以謭陋疊蒙我皇上逾格擢用臣何人斯邀此殊恩五中戰栗雖捐糜頂踵豈足云報謹遵旨俟新撫臣汪漋到江西臣即起身來京竊臣先經屢請陛見未邀俞允今幸得覲天顔微臣戀主積忱庶幾稍慰矣為此先摺奏謝伏乞皇上睿鑒謹奏知道了將爾任內民欠清楚之後再行赴京巳有旨矣同日又奏為奏聞事竊照江省五月中旬六月初旬雨水稍多江潮驟長然江省沙地頗為相宜早禾豐收惟瀕湖低窪之處間有被淹者水退即種晚禾矣今據布政使丁士一查報各府屬早禾收成俱有七八九分不等惟德化一縣瀕江收成約六七分現在米價南昌等十府屬每倉石自八錢七八分至九錢四五分一兩不等贑州吉安建昌三府界聯閩廣二省商販搬運者多每倉石自一兩一二錢至一兩三四錢不等目下新榖初登市價漸減至江省種麥之地僅十之二三二麥收成亦有八九分民生安業共樂升平為此謹奏覽收成分數米價情形深慰朕懷硃批諭旨卷十五
