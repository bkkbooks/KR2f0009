body:
  text: 欽定四庫全書硃批諭旨卷一百三十一硃批宋可進奏摺雍正三年三月初一日署陜西涼州總兵官臣宋可進謹奏恭請皇上聖安臣於雍正三年二月二十九日據臣子新補河南開封府都司宋愛在京蒙皇上頒賜臣御書福字一幅差家人捧齎到涼臣恭設香案望闕叩頭謝恩祇領訖又據臣子密稟於雍正二年十二月二十五日荷蒙皇上訓諭諄諄周詳懇摯臣何人斯得邀聖恩成全至此也伏念臣邊鄙庸陋仰荷皇上擢用總兵今臣子宋愛在侍衛行走寸長未效又蒙特恩補放都司臣與臣子不識何修邀此異數雖捐糜頂踵實難圖報兹復蒙天恩頒賜臣御書福字臣跪領之下瞻仰宸翰不勝歡忭惟有朝夕供奉傳為至寶永戴髙厚之恩於生生世世耳理合繕摺奏謝伏乞皇上睿鑒謹奏年羮堯頗不喜爾爾須加意防範勿露破綻被伊指摘爾於前冬去春為國效力建立如此大功伊忍若斯存心待爾朕甚竒之然爾亦不可恃功驕傲或致舉動乖違有干法紀較前更當自愛以圖永久受朕恩榮方是至於都中權要概宜謝絶仗已一身兼靠朕知儘足保全無虞何必結交若輩倘於其中少涉沾染徒有害而無益也遇朕如是人主若輩豈能為爾作禍降福耶思之勉之雍正三年七月十五日署陜西涼州總兵官臣宋可進謹奏恭請皇上聖安竊臣署理涼州總兵事務因番夷新定未敢請赴闕廷瞻仰天顔而犬馬戀主愚誠夙夜惓惓未能稍釋兹於雍正三年四月二十八日臣齎摺家人捧到皇上硃批諭旨臣跪讀之下感激涕零前冬去春皆仰賴我皇上天威將士用命臣實無效力之處今荷蒙聖慈鑒臣愚昧頒賜訓旨惟有刻銘心肺時時警惕不敢少懈以報我皇上知遇之洪恩於萬一耳所有原奉硃批諭旨理合恭繳伏乞皇上睿鑒謹奏知道了勉力做好官操守第一要緊切勿自恃有功舉動或致放恣再者隆科多亦如年羮堯一般貪詐負恩攬權樹黨擅作威福朕今差伊查量地畝爾向日雖曾為伊屬員似此誑君背主小人相見時不須絲毫致敬盡禮爾等內外大臣如果恪遵朕諭而行此等姦險不法之徒亦知有所愧悔若猶瞻顧小節私誼陽奉隂違則後來人仍以為權勢有益誰肯畏懼改易耶爾其遵奉毋違特諭雍正三年九月初十日署陜西涼州總兵官臣宋可進謹奏為微臣敬領聖訓恭謝天恩事雍正三年九月初八日臣齎摺把總捧到皇上硃筆諭旨一道臣隨郊迎至署恭設香案望闕叩頭謝恩祇受訖跪讀聖諭諄諄不禁感激涕零伏念臣一介武夫蒙我皇上恩施疊沛俾臣由參將以至今職受恩深重未報涓埃今復蒙皇上垂訓命臣亷潔持躬恪恭盡職和輯兵民撫綏疆宇上遵國憲下念身家仰見皇上成全矜恤之盛心無微不至臣雖駑鈍素具丹誠惟有銘心刻骨朝夕凜遵以仰報聖主髙厚之恩於萬一而巳所有捧到諭旨什襲珍藏奉為至寶理合繕摺叩謝天恩伏祈睿鑒謹奏爾係朕之功臣勉力照所奏遵循勿懈同日又奏為恭繳諭旨事雍正三年九月初八日臣齎摺把總回涼捧到皇上硃批奏摺臣跪讀聖訓伏見我皇上顧復提撕如天覆地載無所不周臣何人斯受恩深重至於此極臣惟有凜遵聖諭砥礪亷隅不趨權要以恪守臣職仰報天恩而已所有奉到硃批奏摺理合恭繳謹奏爾能保全自己即為保全朕之顔面矣勉之雍正四年二月十一日署陜西安西總兵官臣宋可進謹奏恭請皇上聖安竊臣受恩深重未報涓埃惟有犬馬戀主愚誠夙夜惓惓無時或釋今謹繕摺恭請聖安伏祈睿鑒謹奏朕躬甚安秋間即來見朕矣同日又奏為微臣戀主情殷懇請陛見事竊臣一介武夫極愚至陋疊受皇上洪恩從未仰覲天顔跪聆聖訓區區孺慕之心積久彌切前署涼州總兵事務因番夷新定未敢請赴闕廷兹蒙皇上命臣署理安西總兵事務臣抵任安西每念巖疆重地日夜滋懼又不敢遽請陛見但臣戀主情殷惓惓寤寐仰懇皇上天恩允臣於孫繼宗回汛之日赴京陛見庶犬馬私忱得以下遂矣理合恭摺奏請伏乞皇上睿鑒謹奏巳用爾為古北提督矣赴新任時就近來京甚便但安西地方緊要勿因暫時署理稍有推諉懈弛候潘之善到任後再來陛見可也潘之善署理川提尚需時日其加意整飭一切營務安西係初設要鎮尤非他處可比勉之慎之同日又奏為恭繳諭旨事雍正三年十一月二十二日臣在署理涼州任內有齎摺把總捧到皇上硃批諭旨臣郊迎至署望闕叩頭謝恩跪讀天語仰見我皇上恩同覆載德嫓生成臣以邊鄙武夫疊受皇上洪恩擢用總兵自揣毫無寸效虛糜厚祿兹蒙皇上格外天恩以功臣許臣臣敬聆之下惶恐無地驚怖難安惟恪勤職守以敦臣節上報聖主殊恩於萬一耳所有奉到硃批諭旨理合恭繳謹奏惟功之一字朕亦不得私許須天下人公許方為定評若能有功不伐則其功更著矣勉之同日又奏為恭繳諭旨事竊臣奉到皇上硃批奏摺跪聆聖訓臣如夢覺醉醒不禁感激涕零自昔至今非臣自能保全實賴皇上顧復提携保全微臣臣惟有仰戴髙厚竭盡駑駘以供職守圖報聖主洪恩於萬一耳所有奉到硃批理合恭繳叩謝天恩伏祈皇上睿鑒謹奏爾之功朕不可負朕之恩爾亦不可辜將此二語我君臣時置於胸中庶幾保全始終耳雍正五年十一月初六日陜西甘州提督臣宋可進謹奏為奏聞事雍正五年十一月初五日準安西鎮臣潘之善咨稱本年十月二十九日據駐防栁溝堡守備報稱本月十九日據把總張文元口稱據頭道溝塘兵王朝信報稱有達子十數名將把總李良策在頭道溝餧養安西馬匹趕去二百匹差小的沿塘報來等情據此卑職即差張把總帶領兵丁三十名追拏去訖理合報明等情又據本標中營紅旗何清稟稱本月二十九日中營兵丁朱學等四名趕馬飲水忽有逹子七名各執器械前來趕馬兵丁保護馬匹逹子將兵丁衣服剝去止趕牛三隻隨後沙窩裏又閃出逹子二十餘名接替將馬竟趕往東北去了把總李良策隨帶兵二十名跟趕各等情據此本鎮即刻差守備千把帶兵二百名并飭靖逆赤金二營各派兵丁尋蹤追拏訖查此項賊夷恐係坤都魯住牧之夷人打牲潛至境內偷趕馬匹由北山一帶遁去事關營馬未便輕縱除移咨肅州鎮即選派兵丁從金塔寺口外察黑包上下石梯子羊頭泉三岔河等處堵截賊之去路緝拏務獲俟馬匹趕回之日另咨外合先咨明等因又準肅州鎮臣楊長泰咨稱準安西鎮咨同前由隨遣辨兵分路堵截擒拏等因各咨移到臣臣查賊夷趕去馬匹牛隻準鎮臣潘之善等咨稱已遣辨兵分路追拏况所趕馬匹有二百之多行走蹤迹必顯跟蹤追拏亦易除飛移安西肅州二鎮嚴飭遣去辨兵務將馬匹牛隻追回並賊夷拏獲究處俟追獲之日另摺具奏所有賊夷趕去馬牛情由合先奏明伏乞皇上睿鑒謹奏覽奏知道了此風斷不可令其滋長不但所盜馬匹至如許之多即三二匹亦豈可隱諱不行嚴究乎雍正五年十一月十二日陜西甘州提督臣宋可進謹奏為奏聞事雍正五年十一月十一日準安西鎮臣潘之善咨稱頭道溝餧養馬匹十月內被賊夷趕去即差備辨尋蹤追趕緣由業巳咨明在案今於十一月初五日據中營頭道溝餧馬管隊金必報稱巳於布魯墩花海子等處地方獲馬一百一十五匹尚少九十匹等情正在具文移咨間又於初六日據前差把總胡發等報稱馬守備領兵於十一月初一日追至鹹泉子見賊夷飛奔前往馬守備即帶兵飛趕前去初二日先有把總張文元等同小的帶兵追至馬宗山打板賊夷與我官兵彼此放鎗見後頭又有官兵到來隨即退去初三日兵分三起跟蹤追趕至一百六七十里趕上賊夷有賊又在沿山放鎗官兵直追前去亂山之中忽又添賊夷一百餘人圍住官兵放鎗打仗隨有馬守備帶領千把兵丁到來賊夷看見官兵隨即退去打仗之處相離金鈎硤六七十里天色傍晚官兵下營駐劄今先差把總等前來回話等情本鎮隨問此項賊夷係誰家逹子稟稱賊夷打扮是青海的逹子戴的白黑羊皮卧帽子穿的棉甲據此查前據紅旗何清報稱偷馬之時二起止有逹子二十餘名今亂山之中忽閃出一百餘人竟敢與我官兵打仗若料是策妄阿拉布坦的逹子並未戴有髙裝帽子且伊差人新近前來修好未必就敢起釁恐係土木札薩去年從西海上分去帶赴北套逹子聞得去年牲口乏弱潛住在土胡魯北大湖一帶住牧休息牲口借打牲為名乘空偷盜又恐是前在布隆吉住牧之阿拉蒲坦八素台同羅卜藏丹津往投策妄阿拉布坦今聞伊在遼邊住牧或乘隙由巴爾庫爾土胡魯前來偷趕馬匹妄生事端均未可定本鎮於初六日復派原差來之把總胡發帶兵一百五十名前赴金鈎硤接應去訖惟恐賊夷再統賊衆前來復挑選兵丁派撥將辨預備停當俟再有報來即速遣發以便𠞰殺擬合飛咨等因又準肅州鎮臣楊長泰咨稱準安西鎮咨同前由亦即預備將辨兵丁如有賊勢衆多信息即便馳往同安西官兵合力𠞰殺合先咨移等因各移咨到臣準此臣隨遣臣標署前營遊擊李遇貴千總曹學懋馳赴安西協同追𠞰並查確情臣仍選派臣標官兵及口糧軍裝等項俱巳齊備俟報到賊夷緩急情形一面酌量遣發擒𠞰一面另摺具奏所有前情理合奏聞伏乞皇上睿鑒謹奏審觀局勢清海夷人焉敢如是行為或係凖噶爾有意搆釁亦未可定切囑追捕官兵極加謹慎防其引誘狡謀也雍正六年正月二十六日陜西甘州提督臣宋可進謹奏為微臣自劾冒昧保舉人員請祈敕部議處事竊照安西鎮標參將仍留中營遊擊任衛維康前臣蒙天恩補授古北口提督赴京陛見具摺密奏保舉荷蒙皇恩擢用至參將理宜感戴天恩恪供職守竭盡心力辦理事務以期圖報萬一乃輒敢違例妄行於百里之外餧養中營馬匹致被賊夷趕去不職殊甚臣雖一面繕摺奏聞一面咨會督臣嶽鍾琪題參臣清夜自思從前冒昧密保臣之踈忽濫舉罪實難逭理合繕摺自劾伏乞皇上敇部將臣嚴加議處以為臣下保舉失人之戒為此繕摺奏請微臣不勝惶悚待命之至謹奏不但此等疏忽之愆即或貪婪不法與爾何涉親生之子亦豈能保其始終如一耶况此事非有心之過執法以警其怠忽不慎固屬當然尚非不可寬恕之罪也同日又奏為恭謝天恩事雍正六年正月二十三日臣齎摺把總回甘荷蒙皇上洪恩賜臣荷包一對貂皮二十張臣郊迎至署恭設香案望闕叩頭謝恩跪領訖伏念臣一介武夫至愚極賤一月之間叨蒙寵眷錫豫便蕃聖恩髙厚感激難名惟有勉竭駑駘仰報恩施於萬一而已理合繕摺叩謝天恩謹奏向後類此奏謝無庸一事一摺當彚集一摺具奏庶不煩瑣雍正六年五月二十七日陜西甘州提督臣宋可進謹奏為微臣保舉失當繕摺自劾仰祈敇部從重議處事竊臣前蒙皇恩補授古北口提督赴京陛見臣因西寧鎮海營參將張嘉翰在西川守護城池辦事明白是以臣一時愚昧具摺密奏保舉嗣蒙皇上擢用肅屬永固城副將理應感戴天恩勉力奉公以圖報答不意改行易轍藐法營私違例濫給家人食糧將紙紅銀兩入已紙張取用公費缺少軍中器械以致營伍廢弛兹臣察訪得實隨移督臣嶽鍾琪會題參處訖臣之從前冒昧濫舉罪實難逭理合繕摺自劾伏乞皇上敇部將臣從重議處以為臣下濫舉人員之戒臣不勝惶悚待命之至謹奏前諭甚明能如是不偏袒回護遂非文過爾何罪之有雍正六年七月初三日陜西甘州提督臣宋可進謹奏為奏明事竊照安西鎮標中營馬匹在頭道溝餧養於雍正五年十月二十九日被賊夷偷去一案業經臣節次具摺奏聞今準鎮臣潘之善咨稱查出偷馬賊夷逹什等十二人係北套住牧巴濟公之弟阿害台吉下之人差遣把總朱祿等前赴北套面質賊夷多寡數目兹據回稱並準振武將軍宗室公等咨開訊據賊夷逹什等確供實係十二人偷馬並無别人等因本鎮始知從前差往追賊並報信備辨盡屬虛誕庸懦謊報除守備馬進榮已經革職遵旨送京引見訖所有追賊不力之把總沈國槐張文元並報信不實之把總胡發應請斥革以肅法紀等因前來臣除將把總沈國槐等三辨照例咨會督臣嶽鍾琪咨部斥革外所有查明偷馬打仗賊夷止係十二人確情理合具摺奏明伏乞皇上睿鑒謹奏阿爾泰將軍處已得實據甚屬可惡業有旨矣雍正六年九月十六日陜西甘州提督臣宋可進謹奏為恭謝天恩事雍正六年九月初四日臣進摺家人回甘捧到皇上賜臣蜜漬鮮荔枝一瓶臣隨郊迎至署恭設香案望闕叩謝天恩領受訖竊臣邊逺武夫涓埃莫報荷蒙皇上優渥隆恩頒賜佳品臣頂戴髙深曷勝感激臣不敢獨嘗謹分惠羣僚共沐皇恩為此繕摺叩謝天恩謹奏覽奏謝知道了殊不料周開捷如此負恩無恥也摺留中雍正七年二月十八日陜西甘州提督臣宋可進謹奏為仰懇皇上洪恩準臣領兵效力以圖報答稍盡微忱事竊臣接準督臣嶽鍾琪密咨令在臣標挑選馬戰兵一千八百名步戰兵六百名每兵一千名派千總四員把總六員管領以備調遣其領兵將備等官至期另議選派等因臣遵即照數挑選派出並軍裝器械預備齊全聼候調遣外臣思領兵提鎮大員督臣自必先期請旨指示定派理應靜候微臣何敢冒瀆宸聰緣臣蒙皇上隆恩調補甘提重寄扺任至今巳及二載坐享廩祿毫無寸勞今值備兵聼調正臣報效之時謹將下忱預為奏陳仰懇我皇上洪恩允臣所請臣得領兵效力行走頂感歡欣曷其有極為此恭摺奏請伏祈皇上睿鑒俯賜恩旨遵行謹奏督臣嶽鍾琪既當逺出內地彈壓更屬緊要爾豈宜輕動遵旨行不必再奏雍正七年閏七月十八日陜西甘州提督臣宋可進謹奏為鎮臣年老惛憒恐致貽誤邊營臣謹據實奏聞仰祈睿鑒事竊照寧夏鎮營地處沿邊極為衝要總兵一官統率屬員有彈壓控馭之責臣訪得寧夏總兵官郭成功年巳七十二嵗辦事惛憒且起坐維艱實難勝任臣謹據實繕摺奏聞伏祈皇上睿鑒施行謹奏所奏是朕亦慮其年老誤事候酌定有旨同日又奏為恭繳硃批諭旨事雍正七年四月二十八日臣進摺家人捧齎皇上硃批諭旨到甘臣叩頭啓封跪讀硃批督臣嶽鍾琪既當逺出內地彈壓更屬緊要爾豈宜輕動遵旨行不必再奏欽此臣敬遵諭旨嚴謹邊防整理營伍操練兵馬勉供職守以仰報我皇上隆恩於萬一所有奉到硃批理合恭繳伏祈睿鑒謹奏覽奏巳悉朕於河西諸提鎮中所倚仗者汝也勉之一切地方營伍諸事悉心料理敬慎毋忽雍正九年九月十八日陜西甘州提督臣宋可進謹奏為奏聞事雍正九年九月十四日欽差內閣學士班第到甘臣出郊跪請聖安隨至班第寓所蒙口傳皇上密旨臣叩頭謝恩聼受之下感戴無巳仰見我皇上聖謀深逺睿慮周詳實為防邊禦敵之至計臣愚昧武夫叨蒙聖恩擢用甘肅提督重任夙夜冰兢惟恐稍有疏懈有負聖主倚任隆恩雖當無事之日而小心謹慎時作有事之防前自逆賊侵犯軍營以及噶斯之哈吉卡倫臣彼時凜遵皇上屢次訓旨不敢輕率臣即移行臣屬各鎮協營整頓兵馬嚴加防備不可一時疏忽臣查現今提標六鎮除派撥征防之外存營尚有馬步守兵共四萬之多加之滿漢官兵駐防涼寧西肅安西莊浪甘州等處如有賊人窺伺之信足資防禦甘屬沿邊地方可保無虞且仰蒙皇上指示教訓皆係萬全之良策臣一一欽遵自當臨事相機而行決不敢輕舉妄動貽誤事機今將臣敬謹遵奉諭旨緣由繕具密摺奏聞伏乞皇上睿鑒謹奏覽奏知道了勉力固守邊圉諸凡處謹慎毋忽雍正九年十二月初一日陜西甘州提督臣宋可進謹奏為欽奉上諭事雍正九年十一月二十六日接到領侍衛內大臣公豐勝額等寄字內開雍正九年十一月十四日欽奉上諭一道臣敬誦之下竊思逆賊出沒其情叵測而兵機變動惟貴相機而行我皇上聖謨深逺籌畫萬全猶恐逆賊策凌敦多布等窺知阿濟空虛乘冬雪之際來擾昆都崙等處攪亂西面之喀爾喀此誠先事預防之睿算也臣欽遵諭旨隨會同署督臣查郎阿酌議今查郎阿在於肅屬挑選馬六步四兵二千名現駐肅州直隸河南緑旗兵一千名臣隨在臣標亦挑選馬六步四壯健兵三千名選派臣標署中營參將龔以仁署右營遊擊牛國珍署甘州城守營參將董庫各領一千名及守備千把人員將一切軍裝器械騎馱馬匹俱各整頓齊全並會商在於昆都崙一帶安設卡倫不時輪流逺探一有逆賊信息飛報署督臣查郎阿暨臣會合機宜即發官兵前赴金塔寺鎮夷及甘州各要口等待察看賊兵情形相機迎𠞰掃除逆寇所有遵奉上諭派撥官兵預備緣由理合繕摺奏聞伏祈皇上睿鑒謹奏據奏業俱整頓齊全預防逺探甚好其加敬加慎勉為之雍正十年六月十八日陜西甘州提督臣宋可進謹奏為凜奉上諭叩謝天恩事雍正十年六月十七日臣接蒙大學士鄂爾泰張廷玉寄字內開雍正十年六月初六日欽奉上諭一道臣跪誦之下伏地九叩惶汗靡寧頂感聖慈不勝戰栗竊念臣庸愚微賤父子叨受隆恩顯榮已極當此軍興凡一應軍務事宜分應先事料理以期緩急無誤庶於職任無忝前將調赴軍營兵丁所需馬匹不能如數摘撥發去之馬仍有疲瘦不堪疏忽之罪實所難辭今荷蒙皇上浩蕩洪恩不即嚴加處分恩賜訓飭臣銜戴髙深既感且愧惟有仰遵上諭時時警惕竭盡心力督率將辨嚴加淬礪將現在營馬加意牧養務期臕壯以蓋前愆用濟緩急萬奏謝伏祈睿鑒謹奏朕甚代汝愧之至於復蹈前轍與否在汝捫心自忖耳雍正十年八月十二日陜西甘州提督臣宋可進謹奏為恭繳硃批諭旨事雍正十年八月初九日從驛發來奏匣一箇臣跪迎至署啓封敬閲荷蒙皇上硃批諭旨垂訓諄諄感激泣下痛自刻責慚愧之心無地可容臣惟有凜遵聖訓改過自新竭盡心力仰報隆恩於萬一所有微臣奉到硃批奏摺理合恭繳伏祈皇上睿鑒謹奏凡人一言之失猶云駟馬難追似此負國誤公縱然悔艾自新聲價巳減大半矣何况改過二字尚在能與不能之間朕從前知遇之恩并期望之意殊屬可惜硃批諭旨卷一百三十一
