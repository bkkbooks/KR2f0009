body:
  text: 欽定四庫全書硃批諭㫖巻三十二硃批張楷奏摺雍正三年四月三十日江蘇廵撫臣張楷謹奏為宻陳沿途地方情形事竊臣自四月初三日陛辭岀京留心察看一路麥禾涿州以北俱得透雨二麥茂盛涿州以南新城等州縣及山東徳州等處雖天氣亢暘因二月間曾得透雨麥苖不至枯槁平原禹城齊河乾旱更甚若數日内無雨二麥難望有收由張夏以至郯城等州縣俱於三月得雨二麥秋禾盡皆暢茂沂州城東偶遭冰雹然亦被損無多十八日入江南淮安境自卯至未大雨普降田畝霑足二麥豐盛由揚州以至蘇州一路皆雨水調勻麥皆堅實二十七日蘇州又得時雨一晝夜現在揷秧耆老紛紛赴臣舟次叩謝皇仁浩蕩減免浮糧沛四百年以來未有之殊恩臣即宣揚聖徳勉以守分急公歡呼載道再臣沿途訪有河間知府張璨清㢘愛民任邱知縣袁圻徳州知州陳留武泰安州知州呉曙俱辦事明白惟齊河知縣王米才具平庸抑且耳聾以上各員係臣見聞所及謹一併據實繕摺奏聞謹奏朕從不寄耳目於小人軰爾等大吏既受知遇之㤙百凡正宜如此據實直陳同日又奏為遵㫖回奏事竊臣於陛見之日面奉諭㫖謹一一遵奉施行容次第奏覆外今臣遵㫖宻訪得署京口將軍李杕為人亷靜在京口兩載兵民相安八旗感戴但㣲覺多疑寡斷輿論如此合行奏明臣抵滸墅闗織造胡鳯翬到臣舟次跪請聖安臣即轉傳諭㫖江南近日織造紬縀用五色線繡成花卉殊屬無謂可傳㫖與胡鳯翬令其禁止一切織造惟期堅緻樸實不可作為竒巧致開奢靡之風隨據胡鳯翬奏稱奴才欽遵聖諭蘇州機上禁止繡織併移㑹江寧杭州織造亦行禁行等語合行奏明臣到江蘇任見布政使鄂爾泰臣轉傳諭㫖鄂爾泰做官甚好朕所以不令伊做廵撫者因年羮堯隆科多極力保薦必是他附託於人爾可下㫖與伊令其改過實心辦事朕自加任用隨據鄂爾泰奏稱臣受皇上厚恩係皇上特用之人與年羮堯從未識靣亦並未附託隆科多今奉聖訓惟有實心辦事以圗報答不敢依附他人臣又宻傳諭㫖聞得爾在蘇州要移風易俗将酒船戲子盡行禁止這原係好事然移風易俗非數十年工夫不能若一旦禁止此等人無以營生必致失所不必禁之太甚隨據鄂爾泰奏稱臣初到任見蘇州風俗奢靡原行禁止後訪得不便民情隨亦不復嚴禁等語合行奏明以上三條先行具摺回奏伏乞睿鑒謹奏所奏俱悉三呉風俗奢靡宜漸為化導使歸於儉約此正督撫之責汝當深為留意者也同日又奏為委員管理上海闗稅務仰祈聖鑒事竊查臣屬各闗稅務除龍江揚州二闗前經署撫臣何天培就近委江寧揚州該知府管理今仍照舊令其管理外所有上海闗稅務署撫臣何天培雖就近委上海縣知縣協理係差家人在闗收稅臣查上海一闗界連海靣出口之處甚多稽察宜嚴錢糧闗係重大不便專委家人經收今遴得蘇松道朱一鳯為人誠實才具頗優堪以委任管理稅務但查該道係為廵查盜案而設駐劄蘇州臣細查江省盜案惟松江之上海縣遠在海隅更為宵小出沒之地盜案最多若委該道經理闗稅移駐上海不但稅務得有專責并可廵察姦匪似於地方更有裨益除另疏題報外㳟行繕摺奏聞伏乞皇上睿鑒施行謹奏據奏以蘇松道經理上海闗稅務遴委甚屬妥協照所請行雍正三年五月初六日江蘇廵撫臣張楷謹奏為奏聞事竊臣到任後即查所屬二麥收成分數松江通州八分江寧蘇州常州鎮江揚州徐州七分八分不等淮安府六分七分不等雨水俱各霑足稻秧秀發目下現在栽揷蘓州米價白秈米每石一兩三錢七分次白秈米一兩三錢二分麥價毎石五錢四分四月三十日至五月初一二日連得大雨又訪得四月二十五日戌末亥初江寧省城地震片刻即止居民並無驚恐臣蒙皇上簡任封疆惟有兢業小心整躬率屬訓兵恤民以仰報聖主知遇隆恩於萬一耳為此繕摺謹奏閱所奏夏收分數併米價情形朕懐深慰同日又奏為敬陳管見㳟請聖裁事臣愚昧無知蒙皇上畀以廵撫重任時深兢業謹将皇上御極以來欽頒諭㫖敬録成帙朝夕持誦竭力奉行内蒙皇上加封至聖先師孔子五代王爵一條仰見我皇上因心仁孝顯承聖祖仁皇帝崇儒重道之盛心特沛崇徳報功之典禮此誠千古未有之曠典也而定例止載先師孔子祭辰於前二日不理刑名照常辦事伏查至聖先師卒於魯哀公十六年壬戌四月己丑即今之二月十八日也際兹文明盛世理宜停刑齋戒以誌景行愾慕之忱縁從前未經議及臣愚以為二月十八日似應不理刑名不讌㑹照常辧事著為令甲永乆昭垂則聖徳彌光千秋莫並矣臣謬抒管見是否有當宻請聖裁謹奏所請亦屬推廣崇徳報功之意但加封之典禮甫舉而聖忌之令甲又頒天下後世無乃視朕為有意務名乎此事宜俟詳考徐議再定雍正三年五月二十六日江蘇廵撫臣張楷謹奏為奏審畢回署隨傳臣標下左右兩營各弁員帶領兵目親詣教場逐一操閲射箭打鎗量行捐賞以示㫖發修海塘之黄叔琳等員已至蘇郡臣擬於二十七皇上減免蘇松二郡浮糧臣仰遵諭㫖轉行布政司嚴飭所屬確查糧户秉公減免毋許聖澤又分縣一事係屬創始必湏籌畫萬全地方始有裨益俟臣到松江勘明城垣縣治併查明蘇屬分縣事宜即行㑹同督臣查弼納另疏題報臣才識短淺仰求皇上時加教訓俾有所遵循庶得盡犬馬微忱以報聖主委任𢎞恩合併繕摺奏明謹奏知道了殫心竭力而為之何慮不能報稱也同日又奏為感激聖慈敬陳謝悃事竊臣接閱邸抄江西卓異引見官内有南安府知府蕭義宗經吏部遵㫖查訊義宗係原任總督蔡毓榮家人等因欽奉上諭爾部行文裴􅏍度南安府知府蕭義宗係裴􅏍度張楷等薦舉之人諒其居官必好伊原係蔡毓榮家人之處該撫等自然不知朕既知之必湏明白其事蕭義宗在朕前尚飾詞誑奏存心不純夲應治罪今姑從寛發囬原任果知感恩益加勉勵奉公則已如甘心自棄改易操守稍有不職著該撫即行據實題叅治以重罪欽此仰見我皇上睿照所及無㣲不燭臣於布政司任内祇知蕭義宗之居官操守實不知其為蔡姓家人業邀聖明洞鑒但臣身為大吏不能細加訪察冒昧保奏咎實難辭幸荷皇上洪慈不加罪譴而撫己徬徨問心愧悚實不能已惟有益加兢惕以仰報髙厚之恩於萬一耳謹繕摺㳟謝天恩伏乞睿鑒謹奏汝與裴􅏍度之不知不待辯而明者朕深信之周書建官惟賢位事惟能國家用人原不限資格其出身之貴賤亦在所不論也雍正三年六月十八日江蘇廵撫臣張楷謹奏為奏聞事竊臣念海塘闗係重大於五月二十七日起程前往沿海一帶查勘塘工於六月初四日接准部文欽奉上諭恐派往人員修築遲延特命動帑委員興築臣隨飛檄布政司委員動帑速飭鳩工庀材刻期興築以副聖懐臣由崑山松江一路遍看田禾茂盛沿海地方不種秧稻止種棉豆俱各暢茂再前督臣查弼納疏請分縣一事部議俱令同城但查沿海一帶綿亘數百里除上海而外别無縣治以致姦匪叢生盜竊纍纍今勘得沿海現有城垣相度地勢華亭應分青村城上海應分南滙城婁縣應分呉淞城皆城池堅固地基寛厰若分縣於此附近居民完納漕米糧銀可免黄浦江過渡之險且沿海稽察匪類於地方大有裨益又勘得柘林城係邊海地方甚為緊要據士民等呈請将松江海防同知移駐柘林城更資彈壓現在㑹同督臣另疏題覆外合将親勘過情形繕摺繪圗具奏伏乞睿鑒施行謹奏覽爾分縣之議經畫井井甚屬合宜圗留覽同日又奏為㳟請聖裁事竊查蘇松等府所屬縣分繁劇前經督臣查弼納疏請分縣一十三處然毎縣地方有肥瘠不同民情有姦良不一今新分之縣該令俱未到任若聽現在各縣分疆定界倘有偏枯新令到日未免又多一番議論仰求皇上将新分各縣錫以嘉名併求敇部即速遴選能員星赴新分縣治公同分析疆界俾各躬親料理得悉地方情形将來自可駕輕就熟吏治民生均有裨益臣為地方起見除㑹同督臣另疏題報外合行繕摺奏請聖裁伏乞皇上睿鑒施行謹奏該部議覆到時有㫖雍正三年七月初八日江蘓廵撫臣張楷謹奏為奏聞事竊臣於六月初六日接准部文欽奉上諭前蠲免蘓松兩府浮糧彼處士民感激朕恩聞有誦經立碑葢造龍亭聚㑹演戲諸事恐有貽累小民蘓松士民習於華侈今又為此虚文甚非朕意著督撫嚴行禁止欽此又接准部文吏部尚書朱軾奉差查勘海塘自浙回京據蘓松士民張姚壽等呈請奏謝皇㤙奉㫖這所奏知道了摺内有赴京謝恩等語著諭督撫等勿令來京以致苦累欽此仰見我皇上勤求宵旰痌瘝在抱誠古聖王不使有一夫不獲之盛心也臣即嚴行禁止遍諭士民勿令赴京轉行所屬一體欽遵外隨據張姚壽等焚香頂謝僉稱壽等䝉皇上蠲免浮糧共四十五萬兩沛此四百年來未有之殊恩情殷誦祝咸思建立碑亭併於農隙之時赴京叩謝天恩實出感激至誠今奉恩綸諭行禁止併勿令赴京恐有苦累壽等欽遵停止誦經演戲建碑等事亦不敢赴京叩謝惟有仰遵聖㫖務夲重農力行節儉以副聖懐懇請代奏等情合将士民感激聖恩叩謝情形繕摺謹奏蠲免浮糧以紓民困非為市恩邀譽也何用謝為此等虚文俱可不必同日又奏為仰懇聖慈清滯獄以廣皇仁事竊查雍正三年江蘇等屬秋審重犯經臣㑹同督臣逐加推勘照例分别情實緩決可矜另疏題報在案惟查江省自康熙五十三年起至雍正二年止核查緩決男婦命犯一十八名緩決監候盜犯一十二名歷經秋審在命犯或跡渉故殺或係謀殺為從在盜犯或贜證未明監候待質均難議減遂致乆禁囹圄情屬可憫伏查康熙四十五年間欽奉聖祖仁皇帝恩諭将各省重犯緩決至三年者俱行減等發落又五十五年間奉有恩㫖謂已緩則不復論決著九卿議令分别減等完結欽遵在案欽惟我皇上聖徳如天欽恤備至御極以來讞決重犯至詳至愼俱令三復集議㑹奏屢邀緩決為從古帝王莫並之寛仁也臣請夲年秋審各犯仰懇聖慈敕下廷臣查有命犯歴擬緩決盜犯監候待質曾經秋審已過三次者特沛殊恩准予減等發落通行各省一體欽遵則監候待斃各囚均邀皇上法外之仁於無既矣此係出自皇上特恩臣不敢冒昧具題謹繕摺宻奏伏乞睿鑒施行謹奏刑讞最為國之大事朕詎不加意欽恤何待汝之奏請亦可謂不知朕矣且封疆大吏尤不宜一味存姑息之念若以弛縱法紀為積徳不但不能為子孫種福反恐有損陰騭也朕面諭汝之訓㫖終身不可遺忘雍正三年七月十六日江蘇廵撫臣張楷謹奏為奏聞事竊查江蘇地方自六月以來各屬間報得雨然未能溥徧霑足今七月十二日卯時起至辰時止甘霖大沛下午至晚又降大雨萬姓歡呼齊頌聖徳同天今歳可登大有又據宿遷縣報稱因睢寧縣黄河水溢連及宿界隨飛檄布政司星速委員查勘有無淹損田禾房屋人口統俟覆到之日另行具奏外又松江華亭上海等處據報七月初一二連日北風驟起致海潮漫至堤下新堤㣲有衝坍數尺之處隨因初四日轉發西風潮即退落田廬並未傷損臣隨飛檄該地方文武官弁加謹防護併飭将衝坍之處隨時修補臣仰遵諭㫖飭修海塘現在調集委員俟布政使鄂爾泰往江寧㑹審常熟馬令虧空回蘇即發帑辦料嚴飭上𦂳修築刻期竣工以副聖懐所有得雨情形及黄水漫溢海潮長發縁由理合一併奏聞謹奏所奏俱悉朕調鄂爾泰來京欲擢用伊為廵撫布政使員缺以漆紹文補用矣漆紹文雖未可與鄂爾泰並驅或亦可無沗厥職朕頗以人材目之俟其莅任後留心察看據實奏聞同日又奏為奏明事竊臣查江蘇地方公用浩繁向來廵撫衙門除各屬節規外有司庫平規兩淮兩浙鹽規及滸墅闗規禮共銀四萬五千三百兩揚州龍江上海三闗監督則餽送貂皮人參等物自皇上御極以來節規乆已革除而鹽規平規等項仍留用度臣到任後将鹽規俱補無著虧空止有藩司平規四千兩存為薪水之費至臣在安慶府任内辦銅欠債二萬兩臣經奏明䝉皇上天恩憐察諭令與鄂爾泰在藩庫中借銀二萬兩以償夙負臣查司庫動闗國帑何敢擅行支用所有龍江揚州上海三闗係臣委員管理每年除正額及應進羡餘外尚有贏餘銀兩於此贏餘銀兩内臣動用若干亦必奏明皇上斷不敢有毫釐侵隱有負具弊帶者有之臣現在飭令各口岸嚴加稽察不許夾帶至臣面奏緝拏盜賊清理命案整頓風俗等事奏覽雍正三年八月十五日江蘇廵撫臣張楷謹奏為奏聞事竊臣欽奉諭㫖行查年羮堯寄匿財産之處臣即轉飭各屬嚴查去後隨據江安糧道馬世珩等首報年羮堯有上年運到木植存貯發賣併漏稅不納縁由批司確訊另行題報外又據蘇州府詳報生員李份出首託伊刋成陸宣公集一部又民人李長春出首託伊刋刻康熙字典一部又據江都縣詳報騾行黄健華出首年羮堯有馬二匹騾八頭騾轎九十二乘馬車三乘現存伊行又民人曹良佐禀報曽領年羮堯銀三千兩已討人二十口銷算又上元縣詳報民人胡範彞借魏之燿銀三千兩已經還過二千兩等語再奉㫖行查胡期恒家産據江寧府詳報胡期恒之壻喬汲帶領期恒眷屬貲財自揚搬運潛逃隨即水陸追趕俱皆弋獲現經督臣轉發布按二司究審又據無錫縣詳報該縣魚腥巷有胡期恒房一所並房内所存什物及伊兄弟五人公共田畝又據寳應縣詳報貢生喬于宣出首曾借胡期恒銀一千五百兩俱批該司一併嚴查統容另疏題報並現在嚴行各屬逐户挨查年羮堯寄匿之處及胡期恒財産另奏外先行繕摺奏聞謹奏胡期恒之事已據查弼納奏聞矣年羮堯姦狡百出寄頓隠匿豈止於此當再行嚴察毋使隠漏同日又奏為奏聞事竊查蘇松常三府屬於七月十二日得雨之後二十二十四二十九等日連得雨澤髙下田禾可冀豐収江寧鎮江揚州各屬得雨稍遲山田尚有未經霑足之處蘇城連得甘雨現在米價平減白叟黄童無不歡呼慶幸共樂有秋再睢寧朱家海河水漫溢延及宿遷等處已經奏報在案今查河水洶湧竟衝至百餘丈雖經竭力堵築聞己打住裹頭訪之輿論河水漫延無歸將次必入洪澤湖内恐髙寳運河又有泛濫之虞現在飛行該地方官竭力防禦其睢寧宿遷被衝之處臣仰體皇仁隨檄行睢宿二邑各動常平倉米一千石先行賑恤毋致失所恐厪聖懐合先奏明又淮揚二府所屬范公堤闗係鹽竈民居去嵗被海潮衝決據被災竈丁等紛紛呈請照往例令兩淮商人捐築等情隨咨商鹽臣併檄行運司傳集商人公議情願捐修咨覆到臣當即飛行布政司委員勘估興修容俟工竣之日另行㑹疏具題合併奏聞謹奏據奏河水洶湧諒齊蘇勒自必講求防禦之術不致泛濫為害其睢宿二邑被水人民亟宜加意撫恤毋令一夫失所以副朕已溺之懐雍正三年九月初二日江蘇廵撫臣張楷謹奏為欽承聖訓瀝悃瀆陳仰祈睿鑒事雍正三年八月十八日臣標千總齎捧硃批奏摺到臣跪讀之下曷勝悚惕臣縁五月間甫經到任即同督臣查弼納赴常秋審見江省年逺獄囚甚多一時愚見冒昧瀆奏仰蒙聖明訓誨指示見我皇上睿慮周詳大中至正悉皆刑賞忠厚之至意非臣煦煦陋識所能仰窺於萬一臣惟有兢業小心益自振勵以期不負聖主成全教誨之𢎞恩謹瀝悃奏陳伏乞睿鑒謹奏狥縱姑息而以寛仁自居及袒護士子以干崇儒之譽排斥釋道以冒理學之稱諸如此類有心作偽狃於一偏之見非徒無益而有害也惟以實心敷實政公爾忘私國爾忘家則至諴感神未有不為㝠㝠之所庇佑而世之所謂名者不求而自至矣勉之勉之雍正三年九月初五日江蘇廵撫臣張楷謹奏為謹籌徵輸積欠錢糧以裕國賦事竊臣查核通省歷年錢糧完欠冊巻自康熙五十一年起至雍正元年止内止蕭縣贛榆無欠及泰州碭山儀徵江浦四州縣欠止數百兩其嘉定長洲等四十七州縣尚有未完地丁漕項等銀共積欠至八百八十一萬兩有零臣又查核各州縣歴年現年錢糧完欠分數自康熙五十六年至雍正元年每年未完至五分以上及二分以上不等是從前新糧尚不能全完帶徵竟致有名無實現今新舊錢糧歸併一嵗並徵臣查江省每年額賦除蠲免浮糧外應實徵銀三百五十三萬兩有零再加歴年舊欠計共一千二百三十四萬兩有零竭小民一嵗所收籽粒斷難責以全完且逐年欠欵既多不免差催絡繹花户更多一番費用併致新糧不能全完臣再四思維若不急籌一徵輸之法何以剔除錮弊隨同布政使鄂爾泰酌議除江屬夲年新糧務期責令全完外至各屬未完地丁漕項等舊欠銀兩仰懇皇仁均作十分請自雍正四年起每年限其徵完一分不必又分年欵逐限咨叅均作十年按照分數徵完於每嵗奏銷時另冊奏報如不按欠追清承追官議以降職二級仍令同次年應完銀兩帶罪併徵全完准予開復如仍不完即以降二級調用如能徵過舊欠一分以上者所餘銀兩准留作下年完數仍格外予以紀錄一次以示鼔勵抑臣更有請者嘉定一縣積欠未完地丁漕項等銀共有一百四十餘萬兩若令十年帶徴連夲年銀米則毎年應共徵銀三十九萬兩零勢又不能全完應請均作十五年分徵其次上海崑山常熟華亭宜興呉江武進婁縣長洲等九縣核計未完地丁漕項等銀共皆積欠至四十萬兩至六十餘萬兩不等應請均作十二年分徵其承追各官並請同前一例處分此又出自皇上格外之仁錢糧事闗重大臣不敢冒昧具題謹先備細繕摺奏請聖裁伏乞皇上俯賜批示施行謹奏徵輸之法可謂籌畫周詳發部議行矣果符所奏國計民生兩有裨益洵為可嘉但有治人而後有治法全在訓飭各有司實力奉行耳勉為之雍正三年九月初七日江蘇廵撫臣張楷謹奏為請㫖事竊臣標左右兩營守備經臣特疏題叅併請皇上於記名人員内補放或於奉發江南年滿千縂内挑選題補一併題明在案適督臣查弼納自查勘泖湖劉河過蘇帶有守備千把内有奉發年滿千縂候補守備李允祚吕銘鐘二員漢仗出色弓馬熟嫺以之補授臣標左右二營守備於營伍甚有裨益臣謹繕摺恭遣該弁齎奏仰懇皇上親賜驗試如其可用伏乞恩准補授謹奏李允祚吕銘鐘弓馬人材不及侍衞故另為揀選補放也雍正三年九月二十日江蘇廵撫臣張楷謹奏為嚴捕盗之責以衞民生事竊臣履任之時即查前案所有雍正二年分報過盜案共有一百八十五案雍正三年正月起至四月止報過盜案共有八十一案臣恪遵皇上聖訓嚴禁盜窩盜線轉飭各屬加意廵查然臣自四月二十八日到任今經五月所有報過盜案己共有四十四案臣思盜賊竊發緝拏惟在捕役但捕役不載經制全書並無工食給領此等承充捕快率皆市井無頼原與盜賊為伍之人況無工食則廵緝之飯費無出妻孥之養贍無資毎遇承緝盜案非婪贜故縱即囑盜扳良種種弊端勢所必至伏查定例各州縣額設民壯五十名給以工食器械令不時訓練以衞地方則緝盜之責己有專屬臣愚以為州縣捕快應請通行革除即令額設民壮緝拏盜賊所有工食銀兩務令按月當堂給領毋許吏胥侵扣毎月報臣查核其民壮内某名下承緝某案獲有積盜一名印官即捐賞銀十兩照所獲名數遞加以示鼓勵如有故縱誣良匿贜等弊及該州縣不嚴行覺察或經告發到臣經臣察出一併嚴㕘分别從重治罪庶正盜易於弋獲而積捕豢盜尅贜縱放之弊可杜矣但民壮事闗各省臣不敢遽行題請謹繕摺奏明伏乞皇上睿鑒俯賜批示施行謹奏此事之利弊朕一時未能周悉不便遽行批示且係更改成例必詳議可否方可通行各省一體遵奉爾應具夲題達候部覆到日朕再為酌定此等密諭不必引入夲内雍正三年十月初二日江蘇廵撫臣張楷謹奏為奏聞事竊查江蘇等屬今嵗雨𤾉時若田稻豐收蘇城自九月以來已收割十之七八新榖登場米價日減小民易於謀食閭閈盈寧皆我皇上敬天勤民感召之所致屬在臣民無不慶幸今據興化縣具報被河水漫溢及江寧二衞所江水泛漲現将情形具題臣訪得江寧二衞田禾半皆收割江水旋即消退現在委員確勘是否成災尚未申覆臣前奏江都被水查已經消退無損田禾儀徵被旱查係一隅不過收成稍減均未成災臣仰遵皇上硃批諭㫖加意撫恤務使被水災黎得所以慰聖懐至松江海塘己經動帑委員採石辧料速飭興築以奠民居但查新築石塘若在舊土堤之外恐潮水衝激難以興工應築在舊堤之内其中尚有挖聞伏乞睿鑒謹奏所奏俱悉江南之丹徒丹陽交界有所謂圌山者其上有仙人洞老虎洞等處聞係鹽梟出沒之所當留心訪察搜緝又聞淮揚瓜潤之間有名羅思禮其人乃盜之渠魁地方官弁不敢過而問焉亟宜探訪確實宻為擒拏不可稍露圭角致令逺颺設或黨衆巢固大費經營爾即宻商該督及駐防將軍出其不意設法緝捕以必獲為期愼毋急遽湏籌畫萬全而後行之特諭雍正三年十一月初六日江蘇廵撫臣張楷謹奏為遵㫖奏聞事竊查丹徒縣圌山上下有老虎仙人二洞向為鹽梟出沒之所若輩聚㪚不常行踪靡定臣奉到皇上硃批諭㫖遵即細加訪察併淮揚瓜潤間之盜首羅思禮一面與總督将軍宻商去後臣知督臣查弼納在任數載查拏鹽梟素所熟諳臣隨宻與查弼納㑹商即著督標親信幹弁四路訪拏其羅思禮訪得現在赴北未回己於沿途探伏宻拏俟獲日另行㑹奏外今據督標副将張玉金帶同弁目在圌山一帶查獲鹽梟龔選等併獲首犯李明卿等及船隻鎗械等項今渠魁俱已擒獲圌山從此寧謐除現在會同查弼納商撥弁員作何鎭守之處再行具奏所有圌山巨梟就獲情由謹繕摺奏聞伏乞睿鑒謹奏此汝地方上第一要務殫心竭力而為之毋稍疎忽同日又奏為欽承聖訓再陳謝悃事竊臣前因冒奏獄犯減等一摺蒙皇上切加教誨隨經繕摺叩謝復奉到硃批諭㫖臣跪讀之下感激涕零伏思臣蒙皇上知遇之隆兩載之中由安慶府知府洊擢江蘇廵撫受恩深重履任以來一切政務不敢不實心辦理然賦性愚魯未能仰報髙深今又蒙皇上諄切開示提撕警覺臣惟有恪遵訓㫖公爾忘私國爾忘家小心兢業以圗上報主恩於萬一耳謹繕摺㳟謝天恩伏乞睿鑒謹奏汝但能屏絶務名之念不為鄉原之所為於察吏安民毅然獨任自可無虞覆餗若遇事瞻顧毎以煦煦自矜則惠而不知為政朕所不取也同日又奏為奏聞事竊查江蘇等屬今嵗仰頼聖主福庇秋成豐稔榖穗九岐臣俱經題奏在案今蘇城於十月二十一二十六等日又得時雨所種豆麥俱皆發生暢茂米價平減民樂盈寧至奉到上諭務令民間際此豐年廣為積貯併行社倉撙節愛養欽此欽遵臣即轉行布政司通飭遵照出示勸諭務使家喻户曉實見施行社倉之法臣查舊案因江蘇水旱不時經前撫臣宋犖議以民田每畝捐榖二合存為積貯題明在案地方有司久不遵行臣思按畆均輸乃積貯之良法江蘇今嵗十分豐收臣循舊例量為加增己經出示令民趁此完納漕糧之時毎畝改令捐米二合隨漕捐輸令州縣印官另貯倉厫将捐過米石造冊報臣查核俟捐完之日即以此存為社倉聽民備賑以後照年嵗豐歉再行變通損益臣仰體皇仁凡有裨益民生之事務竭盡駑駘斟酌舉行以副聖主委任至意伏乞睿鑒謹奏有備無患社倉實為美政古人行有成效惟在汝善為勸導士民踴躍樂輸不可稍渉強勒也同日又奏為奏聞事竊陞任江蘇布政使臣鄂爾泰蒙皇上簡任封疆益思報效所有伊任内經收錢糧除解支外應存庫銀一百一十一萬一千四百五十七兩零臣㑹同督臣查弼納於十月二十六日詣司盤查逐櫃抽兊絲毫無缺併據詳稱莅藩二載以來兢兢供職今蒙聖恩簡擢爾泰仰體皇仁所有任内應得餘剩銀兩捐買穀三萬三千四百四石八斗零分貯蘇松常三府備賑等情隨據新任布政使漆紹文申報各該府倉收到臣除經㑹同督臣另疏具題外今鄂爾泰已於十一月初一日自蘇起程赴京陛見新任布政使漆紹文係於十月十三日到任為人謹愼和平存心甚正誠如聖鑒但甫經履任其辦事如何尚未深悉俟後再行具奏理合一併奏明伏乞睿鑒謹奏據奏鄂爾泰以所餘銀捐榖備賑急公之心可嘉爾等理應代為題達至漆紹文朕信而不疑但其才情能及鄂爾㤗與否尚未可知耳雍正三年十一月初十日江蘇廵撫臣張楷謹奏為海塘務期永固工料應請酌增仰祈睿鑒事竊查松江海塘自金山墩至華家角所有改建石塘險工共三千八百五十四丈四尺内惟漴缺墩至東灣九百六十六丈六尺當海潮之衝實通塘要害為最險之處己經欽差吏部尚書朱軾查勘確實奏明在案誠如原議理應先築以奠民居臣業經飛飭該委員俞兆岳等速行辦料将此漴缺險工先令協力儹修完固再行分叚次第建築臣於十月十二日率同該員等祭告海神宣揚聖意擬於十一月望前擇日興工另行題報其塘工移築於舊土塘之内以期永固民皆情願臣在工所己經相度地勢釘立樁橛分叚委築俟塘工完日将挖損民田錢糧勘明題請豁免至石塘樁木等項原議己極詳明亦可遵照修築臣細加估勘兼訪輿論若增添樁木加以鐵錠更為萬年永頼是以不揣冒昧另摺瀆奏所有增添樁木等項不敷錢糧懇求皇上聖裁或即在黄叔琳等名下追補或另發一二員協同辦理仰祈皇上批示遵行謹奏凡有所作胥當以一勞永逸為期矧此塘工保固海疆實係利民之舉所議增添樁木鐵錠足見汝實心任事處殊可褒嘉其辦理人員之發徃與否著李衞於過蘇時面諭雍正三年十二月十一日江蘇廵撫臣張楷謹奏為奏聞事竊據布政使鄂爾泰詳稱旗丁運兊漕糧一路提溜過閘剥淺抵通窮丁需費無出各屬州縣除額給銀米外毎船向另有貼費相沿已乆但旗丁毎於受兊之時借此延挨勒索印官惟恐誤漕而隠忍胥役毎藉詞以浮收總縁貼費向無定數以致旗丁苛求無己今議於江蘇等屬受兊糧船每船約貼銀二十兩此外不許旗丁多索分釐故意掯勒請通飭遵行以肅漕政等情通詳到臣臣查旗丁運兊漕糧向有貼費難以禁革從前因無議定數目致旗丁借端需索故意掯延今據該司詳議每船貼銀二十兩不許此外勒索分釐則數有定而旗丁不敢為任意之求併杜胥役浮收之弊臣經轉飭遵照外謹據實奏聞伏乞皇上睿鑒謹奏議定貼費數目以杜胥役浮收之弊固屬善舉但旗丁亦必令其敷用方可行之永乆否則恐因此誤事或更致生事也雍正三年十二月十八日江蘇廵撫臣張楷謹奏為欽承上諭事夲月十七日欽差奏事員外郎石麟到臣衙門口傳上諭聞嘉興府有曹濤安即靖一道人張楷若知其人即刻密拏若不知其人即差員跟隨石麟密諭嘉興府協拏欽此臣素不知曹濤安隨作密札印封知㑹該府當遣千總二員把總二員跟隨石麟連夜往嘉興府密拏俟拏獲回蘇之日再行奏報謹奏石麟此行萬一不獲其人爾當設法嚴緝斷勿使致脫同日又奏為欽承上諭事竊臣前准部咨欽奉上諭凡文武官員曾奉面諭者俱詳細繕寫進呈其不應摺奏之員著封固交與該上司轉奏欽此臣即轉行所屬一體欽遵去後兹據鎮江府知府魏觀禀稱曾經面奉諭㫖繕具奏摺自行封固交臣臣謹遵㫖轉奏伏乞皇上睿鑒謹奏此等轉奏将來儘多非要務也嗣後當彚齊乘便附奏以聞同日又奏為遵㫖奏陳仰祈睿鑒事竊臣前奏社倉一摺奉到皇上硃批諭㫖惟在汝善為勸導士民踴躍樂輸不可稍渉強勒欽此臣查江省民情浮薄若令自行捐積終無成效惟立法勸輸趁此豐收令毎畆捐米二合民皆樂從絶無勉強又臣前囬奏布政使漆紹文為人辦事之處奉到硃批諭㫖漆紹文朕信而不疑但其才情能及鄂爾泰與否尚未可知欽此漆紹文到任已兩月有餘觀其存心行事誠實謹愼但才情少遜鄂爾泰然辦事勤謹亦不致有遲誤舛錯之處又臣前因冒奏獄犯減等一摺兩䝉聖恩教訓繕摺叩謝今又奉到硃批諭㫖汝但能屏絶務名之念不為鄉原之所為於察吏安民毅然獨任自可無虞覆餗若遇事瞻顧每以煦煦自矜則惠而不知為政朕所不取也欽此臣跪讀訓㫖感激涕零惟有益加奮勉時切冰兢以仰副聖主訓誨成全至意謹奏知道了爾等雖云仰賴朕之成全亦湏自有以成全之也外君子内小人陰柔二字朕生平所憎汝其知之江南額賦向有魚鱗冊備載編氓啚甲以便徵輸法良善也但日乆弊生不無牽混錯謬之處況今分縣伊始新舊更易尤宜察覈明晰源潔則流清庶将來不致紛擾所慮者地方上未免有挾私阻撓之人即如俞兆晟條奏殊為簧惑朕聰特發與汝看此事全在汝堅持不拔殫心經畫方能釐剔一清若少依違瞻狥必貽築舍道旁之誚大抵流俗可與樂成難與謀始汝率同漆紹文協力為之雖或繁言嘖嘖愼毋被其搖奪茍邀一時紳衿豪户之虛譽恐反隳汝一世之官聲也朕見之甚透故爾切諭當謹誌之雍正四年正月初一日江蘇廵撫臣張楷謹奏為遵㫖具奏事竊臣奉到皇上硃批諭㫖伏查江蘇財賦殷繁各州縣向有魚鱗冊查照啚甲花户姓氏於各户名下分别田地山蕩號叚弓口實徴地丁漕米若干按冊而稽以絶飛灑詭寄等弊臣到任以來即查各屬魚鱗冊籍有湮沒無存者亦有散失不全者以致姦胥猾吏移邱換甲侵攬影射或有産去糧存民受賠累州縣無從查核致錢糧歷年積欠共至八百八十餘萬兩臣謹籌徴輸積欠議請按年分徵具摺瀆奏仰荷聖恩俞允臣思若無魚鱗冊清查欠户啚甲的名何能總其欠數分限催徵現在飭行各屬查造外今跪讀諭㫖仰見我皇上至聖至明無微不燭以魚鱗冊乃經界所由定徵輸所必需恐日乆弊生諄切訓示令臣等協力察覈臣隨遵㫖傳示布政使漆紹文一體欽遵嚴飭查造臣惟有恪遵諭㫖竭力整刷剔除錮弊飭行各州縣将魚鱗冊備行查造毋致牽混錯謬并不許里胥蠧役借端擾累倘有紳衿豪棍抗玩阻撓臣不避嫌怨必繩之以法斷不敢稍有依違妄干虚譽有負我皇上䇿勵臣工軫恤黎元至意臣謹遵㫖奏明伏乞睿鑒謹奏果能言行相符則催科不擾南畝西疇得盡力耕耘矣雍正四年正月二十二日江蘇廵撫臣張楷謹奏為奏聞事竊臣奉㫖濬築丹徒丹陽一帶河閘以利漕運兹據該道王璣等具報工程将竣臣自蘇前往察勘現在逐叚細驗是否濬築堅深有無侵冒容臣另疏具題外臣又訪得朱家海口子業經河臣齊蘇勒修築合龍不料於去年十二月二十五日又復走埽臣聞信隨即飛遣幹弁星往查探實因冰凌湧至剷斷埽繩決口六丈有餘目下四處辦料一俟料齊即可下埽合龍河臣齊蘇勒現今晝夜在工料理但料物需用繁多不得不派之地方雖云給價而運送維艱民情嗟怨然工程緊急若一姑息必致誤事實處無可如何之勢事闗地方合併奏明伏乞睿鑒謹奏國計民生不可偏視要當權其輕重酌其緩急而行之百姓固宜愛惜不可令其嗟怨工程緊急又豈可任其貽悞此等事在爾等大吏處置之公當與否耳爾此摺若為請㫖而奏必湏朕親至河干目擊情形方能明白曉暢以降諭也同日又奏為奏聞事竊臣欽奉諭㫖訪拏盜首羅思禮併拏圌山鹽梟臣即欽遵密啇督臣查弼納并密行知㑹将軍臣何天培一體欽遵在案旋經督臣差員訪拏詎該犯潛匿湖廣幫回空糧船聞信脫逃隨即移咨密拏於漢陽地方拏獲羅思禮現在研究確實另疏題報再鹽梟李明卿等俱已陸續弋獲現在審擬但圌山係江海要區似應添設弁兵以資彈壓臣經㑹疏題請合併奏明臣身任封疆似此積梟肆行到任以來不即查拏致厪宸衷臣咎難辭今幸仰藉天威羣梟就獲地方寧靖臣惟有嚴飭文武官弁加謹廵查不致少有怠忽以仰副皇上整飭地方保衛民生之至意謹奏見理未眞所以違道干譽立法不嚴馴至縱盜殃民究明治病之由方可言治效也勉之雍正四年二月初六日江蘇廵撫臣張楷謹奏為遵㫖奏覆事竊臣前奏江蘇等屬旗丁兊漕議定貼費一摺奉到硃批諭㫖旗丁亦必令其敷用方可行之永乆否則恐因此誤事更致生事也欽此仰見我皇上至聖至明無㣲不燭臣又查訪得各州縣從前舊例有毎船止貼費二十兩者亦有貼費三十兩至四十兩不等者臣仰遵聖諭宻令各州縣仍循舊例而行在州縣不敢延捱誤兊旗丁亦不致額外苛求甚為相安可以行之永乆現今各屬漕糧業俱兊開無誤合行奏聞謹奏百凡惟期相安無擾果如所奏則可謂行其所無事也同日又奏為欽承聖訓再陳謝悃仰祈睿鑒事竊臣前䝉聖訓具摺㳟謝又奉到皇上硃批諭㫖爾等雖云仰賴朕之成全亦湏自有以成全之也外君子内小人隂柔二字朕生平所憎汝其知之欽此欽遵臣跪讀之下感激涕零自揣何人得邀皇上眷顧深恩訓誨愈切期望彌殷臣雖愚魯敢不恪遵諭㫖益加奮勉寤寐兢惕永矢一誠以圖仰副皇上䇿勵成全至意臣謹瀝忱叩謝聖恩伏祈睿鑒謹奏此奏泛而不切不似知過思改痛自刻勵光景雍正四年二月二十一日江蘇廵撫臣張楷謹奏為奏請聖裁事竊蘇松太道蔡永清病故臣隨經題報在案查廵道一缺最闗緊要非才能練達熟諳捕緝之員未易勝任伏乞皇上簡㧞能員補授要地抑臣更有請者查有揚州府知府孔毓璞守揚八載才能幹練勤緝私梟委管揚闗稅務恤商裕課已有成效倘蒙皇上将該府陞授蘇松太道俾其靖盜安民兼管闗務實於國課民生均有裨益臣為地方起見不揣冒昧謹繕摺密奏伏乞睿鑒施行謹奏已有㫖矣看吕大雲年少尚氣恐不免孟浪之疵伊被年羮堯寃叅朕開恩昭雪於引見時因其奏對明白原係推陞之員故用為揚州府知府但聞伊向日不務安靜頗事鑽營朕亦再三靣加訓誨未知能稱此任改過與否汝留心試驗據實奏聞此㫖不可令伊知之雍正四年三月十三日江蘇廵撫臣張楷謹奏為奏報闗稅贏餘銀兩仰祈睿鑒事竊查江寧龍江闗稅務經前署撫臣何天培題委江寧府知府郭汝楩接管在案臣查自雍正三年二月初六日起至雍正四年二月初五日一年期滿内署撫臣何天培自三年二月初六日接管起至四月初十卸事日止經收六十五日實存贏餘銀一百三兩一錢七分臣自四月十一日接管起至今年二月初五年滿日止所有經收銀兩除起解正額並銅斤水脚外實存贏餘銀三萬五千二十兩三錢四分連前共贏餘銀三萬五千一百二十三兩五錢二分除經解部外臣謹據實奏明再經收闗稅惟在遴委之員實心查察庶無侵冒情弊今臣遴委驛鹽道楊紹接管闗務該道為人誠實係蒙皇上特簡之員自能裕課恤商悉心經理除經題明外合併奏明伏乞睿鑒謹奏楊紹才品朕甚為鑒賞但經晉擢之後又不知操行何如耳同日又奏為遵㫖瀝陳仰祈聖鑒事竊臣一介庸材邅逢聖主由安慶府知府洊擢江蘇廵撫陛見之日䝉皇上鑒臣為人謹愼秉質柔懦仰承訓誨周詳勉臣不逮臣履任以來又屢奉皇上硃批諭㫖諄切開示縁臣賦性愚昧不能竭力振作所有題奏事件毎多邀取虚名而上年秋冬之間承審蔡源吳應鳯王雲有三案又不能按法窮究率據藩臬二司審擬具題經部議駁咎實難辭復荷皇上不即加罪譴降㫖嚴飭在聖主天地為心曲垂矜宥而臣受恩獨重捫心愧悔實幾無地自容為此瀝陳君父之前伏懇聖慈恕臣已往之愆予臣自新之路臣自今以後惟有痛自改悔夙夜奮勉務竭犬馬㣲忱以圗上報皇上髙厚之恩於萬一謹繕摺具奏臣不勝戰慄恐懼之至謹奏玩法劣衿亟宜嚴加鈐束汝若不能改絃易轍振作自新仍復固執庸迂識見釣虚名務姑息封疆任鉅豈容貽悞朕則不能為汝姑息也徒於紙上改悔不力圗奮勉如饑人說食究不能飽脫有蹉跌噬臍莫及矣雍正四年四月初二日江蘇廵撫臣張楷謹奏為奏聞事竊查江蘇等屬今春雨水調勻麥苖秀發四月間再得雨澤可慶豐收此皆我皇上軫念民依天心協應白叟黄童歡呼遍野至蘇城食米自三月至今價頗平減合行奏聞以慰聖懐又臣前奏海塘修工玩誤人員一摺奉到皇上硃批諭㫖此内多有狥情開除者欽此臣查海塘闗係緊要奉㫖先行動帑興築其修工人員李馥黄叔琳金啟復李陳常之子等自應仰體聖慈所有各名下應行補庫銀兩即當速完乃任臣諄催藉詞玩誤是以具摺奏明欽承訓㫖臣現在分别催提嚴追補項如再支飾抗延臣即據實題叅斷不敢稍有姑息瞻狥致負我皇上軫念海疆至意合行一併奏明伏乞睿鑒謹奏於姑可以延緩時甘言嘔嘔以市已之寛徳及玩誤至無可支飾處復藉辭功令森嚴而歸怨於上且示以無可奈何不得已之狀在朕前施此等作為尤其不可也雍正四年四月二十一日江蘇廵撫臣張楷謹奏為欽承聖訓據實陳明事竊臣前具悔過一摺奉到皇上硃批諭㫖臣跪讀之下感激涕零惶悚無地伏思臣縁江蘇俗澆地劇其中衿監恃有護符擾害地方無所不至誠如聖諭玩法劣衿亟宜嚴加鈐束臣自履任以來所有玩情現在密拏欵犯逐一究審另疏題叅外臣蒙皇上委任封疆以臣為尚可改過振作之人屢䝉訓飭臣非木石斷不敢復存釣名姑息之念自外奏覽雍正四年五月十六日江蘇廵撫臣張楷謹奏為奏聞事竊查江蘇等屬春夏以來雨𤾉時若麥苗秀發經臣繕摺奏聞今查各屬二麥收成分數蘇州松江九分鎮江通州江寕常州淮安海州揚州太倉等府州七八分不等徐州邳州六七分不等内睢寧宿遷碭山三縣於四月十三四五等日因朱家海河水陡長沿河低窪之處麥苗致被淹損現在檄行布政司查勘確實另行奏報外又臣䝉皇上諭㫖署理總督印務查得安徽各屬二麥收成分數和州七八九分不等太平府八分寧國池州鳯陽廬州廣徳州六安州頴州七八分不等安慶徽州滁州亳州泗州六七八分不等其泗州沿河地方亦被黄水漫溢准撫臣魏廷珍将該州被水情形㑹疏題明再查上江一帶入夏以來望雨甚廹今於五月初九十四等日連得甘霖遍沛農人得以栽插今聞新任署理總督臣范時繹到任在即臣即於十六日差員齎送王命印信臣於十七日起程回蘇合行一併奏聞謹奏所奏俱悉但當勤勉吏治靖共乃職毋忽聞鎮江水利通判徐永隆丹陽知縣魏化麟俱不實心辦事去冬吕城地方修築壩河閘座其淤淺處不過六七丈一叚殊易於疏濬伊等竟不預行開通以致糧艘阻礙大費人力即此以觀其素不實心可知矣但其操履官聲未悉若何察明奏覆倘朕所聞未確即當據實陳明不可寃抑無辜也雍正四年五月十七日江蘇廵撫臣張楷謹奏為遵㫖具奏事竊臣奉到皇上硃批諭㫖仰見我皇上宵旰勤求無時不以吏治民生為念臣查鎮江府水利通判徐永隆上年因奉㫖開建丹陽一帶地方河閘以利漕運據江常鎮道王璣淮陽道傅澤洪詳委徐永隆及揚州府江防同知胡璉領帑修築詎永隆等並不實心任事不但所建吕城閘座不堅所開之河将土仍堆兩墈遇雨復衝缷河中經臣履勘確實當将徐永隆胡璉以冒帑悞工特疏題叅現在嚴審究追在案其二人之居官亦甚平常至查丹陽縣知縣魏化麟為人謹愼尚係用心辦事之員其吕城地方壩河閘座因專委徐永隆等領帑修築該知縣並未經手與伊無渉臣謹據實奏聞謹奏知道了諸務惟宜一秉至公據實直陳切勿阿順迎合以為容悅也誌之同日又奏為欽承訓㫖瀝悃瀆陳仰祈睿鑒事竊臣前奏覆修築海塘人員一摺奉到皇上硃批諭㫖臣跪讀訓辭感懼交併欽惟我皇上御極以來無事不合乎天理人情無時不夲於大中至正凡屬臣工無不實力實心勉圗報效况臣受恩獨重若自昧天良稍有市徳沽名歸怨君父之念不特王法不容抑且神明共殛但臣賦質愚昧一時辦事錯誤咎實難辭兹䝉聖諭諄切周詳臣惟有竭盡愚誠一心報主以仰副皇上教訓䇿勵之至意臣謹繕摺奏謝天恩不勝戰慄恐懼之至謹奏心在汝腹内朕從何察究亦惟據事論斷耳論語云聴其言而觀其行朕深佩服此一語硃批諭㫖巻三十二
