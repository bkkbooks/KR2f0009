body:
  text: 欽定四庫全書硃批諭旨卷一百九十四硃批廖坤奏摺雍正七年十二月二十四日湖廣襄陽府同知臣廖坤謹奏為遵旨密奏事竊臣恭覲天顔蒙皇上垂念臣祖廖有功殉難微衷特加異數疊沐高厚隆恩亙古未有臣中懷感激時存敬凛不敢少鄰聖訓伏被溫綸垂誨準臣摺奏臣自出都以來即沿途查訪於十一月內到浙所有見聞擬合分條密奏一聞知江南有周崑來者善能演用長鎗遊厯各省行蹤詭異更聞有張雲如以相面坐功邪術符法煽惑人心及臣到浙時已經督臣李衛訪拏更為師內有一程姓鹽商與各處匪類往來屢經浙督李衛差拏各犯而馬世烆竟為庇護支吾抗犯不發此更為負聖恩之甚一聞得盤查江南松江府原任杭嘉湖道王溯維徵比舊欠不待百姓自完惟恃苛求酷責民多怨聲前蒙皇上聖明敕下緩徵百姓歡呼咸頌聖德時有本地百姓稱為王溯維挂斗志感王溯維信為實然出堂懸斗則斗上所書乃係一聞得江南浙江兩省今歲武科鄉試弓馬技勇較之從前倍多精好但江南較射竟至黑夜又值天雨弓箭盡濕以致狠好技藝之人多有不得合一臣到浙之日正值徵漕之候督臣李衛委令糧道朱倫瀚親往有漕各州縣水次查察因今歲年欺隱以上數條皆臣親見親聞不揣冒昧據實陳奏伏乞睿鑒謹奏覽雍正八年三月初四日湖廣襄陽府同知臣廖坤謹奏為恭繳硃批原摺事本年二月十一日臣家人回蒙皇上天恩賜臣摺匣四箇臣恭設香案望闕叩謝敬啓摺匣跪讀宸批深荷皇恩浩蕩天語溫和不特臣舉家感激涕零即臣祖在九泉亦必銜平餘金分晰詳明竟自添兑以致革職繫獄去秋審擬賠金問徒已經結案今雖監禁刑部若限內賠完猶望邀恩豁免何敢為之陳請但臣祖廖有功殉難之日家産盡為耿逆抄焚至今房屋地畝俱無臣胞兄應賠金子四十五兩萬難完繳故冒死瀆陳情願將臣每年俸銀在本省司庫扣繳代為完納并念臣兄皇上面諭外省或有好人或有好官素所深信者著臣具摺以功名身家保之臣蒙皇上如此深恩安敢不細加體察冒昧妄保以負奏一聞有參革河工通判張鵬飛潛往蘇州來往江托出將來河帑亦可無欺隱之虞矣一聞浙江提督萬際瑞作事乖張不知大體帶有一聞得江南匪棍張雲如并程姓鹽商一案有揚聞此俱臣所親聞謹繕密摺陳奏伏乞睿鑒謹奏嘉悅覽焉密之密之硃批諭旨卷一百九十四
