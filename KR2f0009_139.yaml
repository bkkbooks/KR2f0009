body:
  text: 欽定四庫全書硃批諭旨卷一百三十九硃批宋筠奏摺雍正六年八月二十四日巡察山西等處户科掌印給事中臣宋筠謹奏為據實陳明仰祈睿鑒事竊臣欽承簡命巡察全晉於本年六月二十四日入境自省城太原府陽曲縣起備查臣所應行切要事件及經過州縣地方凡有見聞不敢稍為瞻徇隱匿敬為我皇上一一陳之一既富方榖養而後教謹飭學校建立農壇仰見我皇上崇儒重農之至意司其事者於學宫當時加灑掃六打掃潔淨勤謹將事臣即面加誇奬又按行稷山縣入學查視該教諭武良弼不特灑掃不及甚至神位欹側雜以他物臣即面飭整頓至於農壇本宜建立郊外以便舉行耕藉之禮即如吉州鄉寧縣建立城內者固已不知典禮之甚復如稷山縣建立城外又或在西郊亦未協往昔諸侯東郊一臣按行隰州地方有州學武生李彪在途喊寃呈稱次子李除除於雍正元年十一月十九夜不任董俊到任接緝限滿未獲其承緝不力之知州李濓經前撫臣諾岷初參議處而護撫臣髙成齡袒護接緝之董俊並未續參今現任知州吳元鉽由歷來各承緝衙門怠緩而護理撫臣髙成齡不行續參有以開之也應否指名查詰伏祈睿鑒批示遵行一臣巡查所至民有紛紛在途具呈臣收細閲多屬户婚田土構訟或有以印官升遷降革離任未經審結一槩注銷者亦有準而未審經年纍月拖延者更有印官闒茸批發捕衙審理不能令其恱服者伏思捕衙職守卑微難於彈壓甚而不肖之一山西地近邊境且多重山峻嶺風俗強悍臣恐窮僻之處易於藏姦預飭各屬開明所部境內四至何處平坦民居稠密何處險僻姦宄易藏俟臣按臨日該縣面呈以便備細查詰及到沁水縣該令面送四至內開東北由端氏集并固縣村至長子縣界二百一十里俱從山澗中小路行走似宜於固縣村設立塘汛防守又據南至莪圪梢山垣曲界九十里山髙路險村落鮮少似宜於中村集設立塘汛防守等語臣訪查無異應否如其所陳一驛馬為馳印烙除同戈驛怙終不悛業經題參一煙墩炮臺計里設立分撥汛兵按汛防守前後聨絡俾一處不致坍塌一刻不容或離誠弭盜安民之良法也今有陽城縣知縣吳紹祚現在修理未完經臣目擊本應參處但聞吳紹祚居官頗不委靡紳襟畏服似應開以自新之路臣面加嚴飭察其守汛勤惰武藝精疏分别奬勉除隰州尚莊臣不時參革一民壯專為捕盜而設所當選擇漢仗出衆技力過人者充之晉省設立民壯多屬具文臣今所歷之處將民壯中漢仗不堪武藝又未演習者均行革退現令該管印官續選備具花名年貌籍貫并一平遙縣地方遼濶民風刁薄諸務冗雜該縣令李廷琯賦性柔懦聽訟寡斷非理繁治劇之才與地方殊未相宜再大寧縣知縣鍾恆雖才具平常而居官尚無乖張猶堪供職應否飭知撫臣調簡一臣於八月十四日查及澤州訪得澤州地方頗睿鑒一奉差巡察於該管地方例應遍厯今臣所至之若田疇豐稔歌舞報賽熙熙皥皥悉樂業於桑麻里長二十里寬榖子葉皆黃萎而其穗仍然無恙詢及居民始知於七月二十七日為冰雹所打幸以上凡十條係臣入境以來所查境內實迹至於全晉各府州縣尚多未經之處容臣次第巡查外所有已聞已行者謹具摺備悉奏報伏乞皇上睿鑒施行謹奏所奏各條朕嘉悅覽之若果奏與行符乃山西闔省黎庶之福亦汝之福朕之福也竭力勉為之不可徒以空言悅朕耳目雍正六年九月十三日巡察山西等處户科掌印給事中臣宋筠謹奏為不避煩瑣隨所聞見無論巨細據實直陳仰祈睿鑒事竊臣自任事以來將及三月所厯府州縣地方三十餘處次第有所見聞理合彚摺敬為我皇上陳之一錢糧耗羡定議加一有三臣巡察所至之州縣有加一四五加一七八以及加二者雖於加一三之數較多而民俱相安並無怨聲惟稷山縣王夢熊厯任四年一向耗羡竟至加二以外頗干物議及聞山西特設巡察之員即為減去現今仍有加一七八再襄垣縣現在引題參合先據實奏聞一臣於八月二十五日巡視至屯留縣訪得該令莫士桂聽斷無才懶惰性成諸事廢弛似此闒茸一臣於九月初六日巡行至潞安府聞該府該同知衙役狂妄自大肆行無忌如府皂頭郭姓廳快頭楊姓倚恃官役又且身家富有開張店鋪甚至交通官府遂致經厯司盧熊曲意迎合為渠特出告示禁約人民不許在彼騷擾作踐違者許其扭稟重處伏思體統攸關名分不容僣越且命官尚仰其鼻息則平日魚肉小民可知除該同知劉芳璧於别案已被參革外其知府王景望難免失察諭旨施行一臣於九月初十日巡行平順縣始入其境即聞該令居官汚穢民怨沸騰再行密訪知於各鄉充置農官勒索銀兩到手方許充應發給民壯工食俱不足數扣尅入已抑且賦性暴戾甚失官針臣抵潞安府該知府王景望亦備稱其居官民怨並云即行揭報恐長刁民告訐之風且徴比錢糧易起容徐徐專揭去之臣伏思該知府到任已及二年既知穢迹如何不行即去猶云徐圖未知當於一臣巡行州縣每事必細加查訪乃知歷來學臣供應陋規現在猶存每按考一次州縣出銀自數十金至百餘金參差不等但既係歷來陋規似宜睿鑒一恭逢聖明在上各該有司奉公守法者固多而因循玩愒偷安旦夕相率成風者亦復不少如介休縣郝國義被盜一事係雍正元年失竊縣官已經屢易而盜未全獲贓未全追逮臣巡查至境告發批府將已獲盜犯發落未獲之犯立案嚴緝又據署聞喜縣詳明未結竊案內開於雍正二年聞喜縣被竊驛馬二匹今已三年有餘案內竊賊尚未弋獲究處觀此二案則上司之失察下屬之怠玩可知矣伏矣一臣於九月初九日收到太原府陽曲縣知縣孔興宗及太原營參將周三竒申報學臣勵宗萬署奏一宣講鄉約乃化民善俗之根本臣將抵襄垣縣在路有該縣民尚良德狀告生員郭明璿於去年三月初一日登講混訾臣即提原案查閲乃知郭明璿曾與尚良德訐訟為仇見尚姓與聽乃講息誣告以全良善一條將俗語衍講不無借公譏刺而尚良德以為專意罵彼遂具詞控告已經潞安奏聞以上八條就臣耳聞目見聊悉犬馬之鄙衷並不敢矯情立異亦不敢邀譽和同但遵我皇上無欺無隱之諭旨求克稱乎巡察二字而己為此謹奏覽雍正六年十一月二十二日巡察山西等處户科掌印給事中臣宋筠謹奏為隨時隨事據實奏聞仰祈睿鑒事竊臣於本年八月九月兩具摺奏伏蒙我皇上詳加批諭諄切訓教俾臣有所遵循不至隕越臣縱蒙瞶敢不殫竭愚誠益加奮勉謹將現在所見及現在未敢遽行之事為我皇上陳之一九月十八日據臨汾縣詳稱有逰棍李宏假臣家人并寫狀人周立朝口稱監生結黨私立訪簿民人等如遇此輩立拏送官以申法紀此係有干臣之官聲者不敢匿不奏聞一郝國義告秦國興以義子盜竊及聞喜縣詳報盜竊稷山號驛馬兩案濡遲纍年不結經臣前摺奏聞奉旨言之石麟看伊如何回覆密奏以聞今臣於入省之時遵奉言之撫臣並不敢聲明曾有訓旨兩次叩之以探其意據撫臣回答云此等事甚多自須隨時隨事處分可也觀其應對如是則從前奏明一臣未至山西知地近邊􅗲又多崇山峻嶺慮易藏姦於到任之後即行詳示巡查盜賊斷絶根株嚴禁窩藏并通行牌飭各處所部地方凡汛兵鄉地甲長捕役民壯人等於每月朔望具循環簿册呈送本管官司兼具不致擒拏不力不相協助及隱縱窩線如有等弊願甘同罪互結存案各該管官司亦各加結呈送各該管衙門及臣處以備考察倘不遵守巧為遮飾或經發覺訪知官參吏處自是以來各處盜竊報者紛紛似少從前隱諱之弊至於盜賊竊發之處俟詳報到日臣自應批令一臣巡行至霍州查點驛馬餧養殊不合式則其平日怠惰驛站可知本應題參但臣見該知州吳廷祚年力方壯又訪得居官奏不敢寬縱一臣巡查至襄陵縣聞前經告病之知縣吳世雍久在牀褥未愈一切民事咸批發捕衙顧嘉諒代合并奏聞一臣奉翻告生員郭明璿一詞關係講約不敬不敢不收一面發潞安府查覆一面具摺奏聞仰蒙我皇上硃批諭旨姦民駕詞誣告事小生員講約不敬罪大作何處斷結案後具奏以聞欽此今據該府查覆尚良德原係姦民好訟而生員郭明璿講約果係不敬難逃聖明洞鑒但詞涉生員事關庠序將原案咨送學臣作何處分完結一并奏聞逮至十一月初十日據學臣勵宗萬咨覆內開以事關科臣批審之案未便越俎等因移咨推諉於臣伏思臣無承審責任何敢擅為主張自干罪戾謹不避嫌怨據實入睿鑒一臣巡行經過州縣凡有已經種秋麥之處麥根俱為茂盛又十一月初二三等日在太原府遇雪及過汾州府所屬州縣俱約有二三寸不等似與一臣於十一月十八日巡查至永寧州接有蒲縣知縣蕭藻詳揭吉州知州李琠十四欵臣細查所面據實奏聞一臣巡查至臨縣見該令吳早不但賦性柔懦抑以上九條除恪遵諭旨奉行外更有所聞所見之處臣不敢稍為隱諱謹繕摺具奏伏祈睿鑒施行謹奏嘉悅覽之堅守此志莫移更莫虛張聲勢多事務名雍正七年二月十九日巡察山西等處户科掌印給事中臣宋筠謹奏為隨聞隨見據實直陳伏惟睿鑒事竊臣仰荷天恩巡察三晉凡有聞見不敢隱匿已三次具摺奏聞今臣巡察將及八月經過州縣已及十分之七更據見聞所及敬為我皇上陳之一臣於十一月二十三日巡察至汾州府黃蘆嶺地方係通秦省綏德州大路山峻人稀最為險要舊設巡檢司一員帶領弓兵三十名在嶺防守巡查後巡檢衙署傾圯因而移駐府城額設弓兵雖云照舊撥守不過虛應故事臣查巡檢住居府城一無執掌誠屬冗員若仍移駐黃蘆俾其巡防彈壓行旅可保無虞似大有裨益謹具奏聞一臣於十一月二十九日巡察至汾州府石樓縣及隰州永和縣交界查兩縣相去九十里路僻人稀中間越一大嶺約十餘里乃兩縣交界之處其中最易藏姦不可不設兵防守臣愚以為應於石樓縣所屬之解莊調石樓縣駐防兵三名防守於永和縣所屬之趙家溝調永和縣駐防兵三名防守庶姦宄竊發無所容身而交界之地彼此俱可接應不致有互相推諉之弊謹具奏聞一臣於十二月十一日巡察至安邑縣運城地方查運城為河東鹽池錢糧重地商賈輻輳五方雜處之所城內僅一外委把總領兵三十名防守殊不足以資彈壓臣愚以為似應設武辨一員添兵聞一臣於十二月十三日巡察至解州地方中途遇雪麥根潤澤解蒲二處所屬地方有雪厚一尺者有七八寸五六寸不等者臣經過城邑鄉村貢監生員耆老小民無不來迎臣隨諭以時和年豐瑞雪盈野皆我皇上聖德至誠上格天心所以致此爾等生當堯舜之世俱要依聖諭上聞一臣於十二月十八日巡察至平陸縣據蒲州府永濟縣知縣施奕簮詳稱該縣小李村農民崔效林於本年十月十四日拾得髙世津遺失布包一箇內係金珠首飾為兒子下聘之物約值六七十金效林不肯隱留俟髙世津奔至尋覓問明件數式樣俱各符合逐一點明交還髙世津世津備禮求收效林堅辭不受事屬罕見逺近稱揚等語臣於二十一日由平陸往巡蒲州適取道小李村經過崔效林之門村民向臣公舉良善臣親斟酒三杯與效林飲之稱贊褒奬至於再三一時觀聽之下人人説俱願學這樣好人等語臣因宣布皇上德化勸伊等凛遵聖諭皇仁臣謹據實奏聞一臣於十二月二十三日巡察至蒲州府聞黃河風陵一渡與潼關接壤乃陕西河南山西三省交界之區臣因紆道往視渡口舊設巡檢一員弓兵二十名及防河兵丁五名臣細細查點惟有巡檢一員兵丁五人在渡口臣面問巡檢據云渡口衙門久已傾頽巡檢在逺村十數里外居住聞臣已入境在此迎候弓兵俱未帶到等語臣抵蒲州向知府劉登庸言及據云此地巡檢已歸并陕西潼員若仍留山西則應令在渡口住劄以便盤詰姦宄臣因地方險要起見謹據實奏聞一臣於十二月二十六日巡察至蒲州聞所屬永濟臨晉二縣民刁俗悍健訟抗糧實為晉省繁劇難治地方臣見永濟縣令施奕簮辦事才鈍以之蒞事簡民醇之地似乎有餘以之理事繁民玩之區實為不足又見臨晉縣令胡南藩賦性柔懦雖行止初無乖張而理繁治劇實難勝任此二員若令其久任巖邑不能除姦適足長姦急須調一小聞一國家教養兼設則學宫與農壇交重臣巡察三晉已及十分之七惟平陽府知府樊錢倬膜視學宫大成殿聖像之上板將傾圯明倫堂已坍塌半間均未整理臣壇俱在城內臣見撫臣自當言之合并奏聞一臣由蒲州驛路北回見沿途該府廳州縣無不僕道路毫無利益且恐地方或有匪類窺此空隙致生事端亦未可定臣不敢不密為奏聞一臣於雍正七年正月十五六七等日在絳縣垣曲地方遇雪約有三四寸復於正月二十六日在聞一臣自蒲州北回察訪沿途州縣竊案有未報未結者臣俱飭令速獲賊贓結案臣至沁州訪聞升任知州沈一葵衙署被盜一葵匿不通報及丁憂知州管學宣抵任衙署亦復被盜學宣又匿不通報兩知州衙內失事前後相隔二年可見盜風之過地方察出者先行奏報其餘俟臣陸續察出一一奏聞以上諸條係臣耳聞目見不敢隱匿為此具摺謹奏覽雍正七年三月十二日巡察山西等處户科掌印給事中臣宋筠謹奏臣蒙天恩巡察全晉西南一帶地方行查已周於三月初八日抵太原省會將前摺所奏之事應與撫臣言者悉向撫臣言之矣所有晉省現在盜案及目見耳聞之事臚列六條敬為我皇上陳之一臣於二月二十日以後連接河東道報文該道衙門於二月初四日夜被盜同夜該蒲協副將衙內被盜正月二十二日解州知州衙內被盜二十八日洪洞縣知縣衙內被盜二月二十八日據霍州知州吳廷祚詳報該州於辛置莊地方同蒲州捕役拏獲盜犯李添才等七名認明河東道及蒲協副將洪洞縣贓物在案録取各供現解蒲州府質審臣當即嚴飭該府令其嚴行訊問窮究盜夥務絶根株以息盜風再大同總兵署內及平遙縣驛丞署內俱各被盜臣以衙署失盜俱不敢輕縱除一面嚴飭地方官速獲贓賊外面見撫臣諄切言之臣謹據實奏一臣至太原省會察訪前任參將今升陕西漢中副將陳美署內曽被盜劫隱匿不報并臣由蒲州北回途中察出未報盜案二十三件俱逐一言之一臣於三月初三日據石樓縣詳稱石樓倚山為城學宫倉厫建設其頂傍城居民八十餘家下係溪河一經大雨萬壑奔騰直衝城腳倉學民舍深為可慮應於溪河左首開一枝河並於險要之處築堤捍禦等語除該縣已詳撫臣應聽撫臣經理一臣自蒲州北回點驗沿途驛馬惟平樂縣柏井驛揀出疲瘦之馬二十三匹本應題參該署縣夀陽令胡具體悉以肥壯者充補及查點夀陽驛馬俱各臕壯無缺又聞該令居官尚屬小心謹慎臣仰體一臣自驛路南回經過州縣見各處所種秋麥青蔥茂密及抵太原等處地方見農人力作田野播種春麥土膏滋潤初十十一兩日又得時雨五寸合并奏一臣巡察晉省西南等處地方見臨縣城垣東西已坍蒲州府城垣四面坍塌甚多已向撫臣言之并奏以上六條係臣耳聞目見理合繕摺奏聞謹奏覽悉雍正七年六月初四日巡察山西等處户科掌印給事中臣宋筠謹奏為據實奏聞事臣巡察全晉地方將己周遍又有耳聞目見之事不敢隱匿敬為我皇上陳之一臣巡察至崞縣只有文職并未設有武官亦無守城兵丁殊不足以資彈壓似應專設把總一員撥鄰近營兵二十名防守又興縣僻處萬山之中民俗頗悍盜竊時發實為要緊地方城內僅有外聞一臣巡察至應州訪出去任知州蕭綱於雍正四年七月間署內失盜該州隱匿不報臣又查出雍正三年以後不報盜案文水屯留襄垣長治平遙一臣巡察至大同縣見該縣知縣陳世寶忠厚有餘才識不足調一小邑猶堪供職大同附郭首邑一臣巡察至神池縣所屬之八角堡與偏關縣所屬之老營堡相去九十里係兩縣交界之區中間嶺峻村稀最易藏姦不可不設兵防守臣愚以為應於南泉地方調八角堡兵三名防守於鄧家山地方調老營堡兵三名防守庶險要之地俱有接聞一晉省各處學宫農壇臣俱留心閲視邇來各處一臣以姦民尚良德翻告生員郭明璿講約不敬摺奏奉硃批傳諭勵宗萬會同石麟完結可也臣即移文學臣撫臣於五月二十二日接準咨覆內稱郭明璿身列青襟宣讀聖諭理應敬謹乃敢假土語罵人甚屬狂妄應杖一百徒三年到配折責尚良德張大其詞疊控不休應一三岔額設站馬三十匹係把總曹喜所管因鎮臣調演炮車轉委把總袁遴署理查出內有缺額疲瘦及有疾之馬九匹揭報驛道轉詳撫臣請參并及臣處臣因尚未至其地親行查驗先移明撫臣撫臣回咨應咨提鎮查明會參及臣巡至三岔查閲缺額者已補足疲瘦者已臕壯有疾者已養好臣又不敢因有揭在先過於嚴刻吹求已印烙令其應差矣理合據實奏一晉省大小竊案從前地方官槩不報明上司上司亦不稽察以致盜風日熾竊發時聞臣到任後多方查訪邇來報者紛紛似少從前隱諱之弊通計臣巡察晉省一年報大小盜案者共一百零九件已獲盜賊及按律問擬者共四十三件其報而未結者臣現在行文嚴催陸續完結至不能依限以上諸條臣聞見最確不敢欺隱理合繕摺奏聞謹奏觀汝乃實心任事不負朕用之人也甚為嘉悅當務始終如一莫移此志雍正七年九月初一日巡察山西等處户科掌印給事中臣宋筠謹奏為恭謝天恩事竊臣以菲才仰荷天恩畀以巡察重任夙夜兢兢罔敢怠惰殫竭愚誠方愧寸長未效乃蒙我皇上天語褒嘉再留一年聞命之下感激涕零伏念臣世受國恩至為深厚臣雖不才願竭駑駘之力稍效涓埃之報惟益加勉勵無欺無隱實心實力以仰報髙厚之恩於萬一耳所有微臣躬荷天恩理合具摺奏謝謹奏即不論國恩但據臣職官針是非利害而言何一不當加勉耶宜勉之又勉同日又奏為據實奏聞事竊臣於閏七月初十日自太原出巡將及兩月經過地方隨所見聞列為十條并六月內巡察嵐縣地方一條敬為我皇上陳之一臣自六月初四日進摺之後隨巡至嵐縣地方臣謹奏聞一墩臺設有汛兵所以稽查匪類弭盜安民如果實心巡緝何患盜竊臣巡行各地方細加訪查聞臣至之日羣候在汛臣去之後額設之兵只有一半在汛者亦有白日在汛夜間歸去只留一二人密查每至一汛各試武藝不使老弱濫充至各處城守兵丁臣亦加訪問千把所轄十名中不無一二名空糧之弊事關設汛分防似未便任其缺額臣謹奏聞一郵地設立鋪司遞送公文必須隨到隨行然後文無遲滯事可限內完結臣沿途訪察見雖設有逺出即交該地方官薄治并飭其不時稽查庶文到即傳事件亦可依限早結臣謹奏一臣細訪盜竊繁多之故有州縣諱匿不報者亦出示曉諭反覆開導令失事之家無復自行隱諱並申飭各州縣官嚴禁胥吏捕役需索弊端臣巡行一邑再密加訪察係州縣不報以諱盜題參如吏役作弊查出重行處治庶盜風可以少息也一臣於八月初七日巡察至沁州地方初八日應祭關帝三代之期臣思既至其地理應與祭祭後細閲供物犧牲前後殿豕羊尚備供物則簡略之至矣及初十日至沁源縣復加查訪僅有一豕一羊供物更不問可知查祭祀之費每季例銷銀七兩八錢有餘其中不無冒銷情弊再臣巡察晉省三與文廟丁祭俱犧牲肥腯供物精潔及細細查訪惟臣現在經過之處為然尋常多寡不齊豐嗇各異未一臣巡察至榆次縣於郭家堡地方查出賭博一起已交該縣嚴處又巡察至盂縣鷂騰崖地方於賣燒餅魏姓之家見有十餘人聚賭臣面問魏姓云賭博新例甚嚴爾等何不怕官答云官離此數十里不得知道臣又問云衙役稽查如何答云送他幾百文錢就可完事臣又問云地方鄉約出首心查訪謹奏一臣巡察至遼州據嵐縣詳稱該縣文生邸拱珵地方見各州縣教官老邁者居多精神不支何以約束士子合并奏聞一臣巡察至潞城縣一入縣境訪聞該縣火耗頗重差役下鄉催糧每户索取錢文民以為苦及見艱教諭張大塏年近八十兩人扶翼始能行走一縣三官俱係年老恐難勝任臣謹奏聞一臣據清源縣詳稱被臣參劾疏縱兵丁之榆次縣外委把總李會未奉部議攜眷回家經過該縣堯城地方帶領榆次守城兵丁武俊耀趙興及伊弟提督差官李斌全等口稱失盜將堯城安永興店內之貴娃子等弔打李會遂面見該縣口稱被盜該縣令遞呈詞又復親驗偷竊情形並無出入蹤迹細訊貴娃子等口供並未偷盜伊物係李會兄弟聲言失去衣服銀兩喝令兵丁將伊弔打令其招認等語該縣令候詳再審李會忽稱原未失物懇求免詳銷案等語揆此李會顯有私帶兵丁嚇詐平民情弊臣巳據該縣詳文移咨撫臣提臣聞一臣聞潞安等處落地稅物甚多係知府委人收管細察厯來相沿舊規當店每店一年稅銀十兩五錢生鐵百斤稅銀一分熟鐵粗者百斤三分細者六分麻子每石二分麻油百斤八分乾粉百斤一錢二分故衣紬帛每件八釐布衣四釐白布每箇稅錢三文麻一斤一文椽子一根一文每起一聞一晉省今嵗雨暘時若年景豐收臣於閏七月初十日自太原出巡經過徐溝太谷榆次夀陽盂縣平定樂平和順遼州榆社武鄉沁州沁源襄垣潞城黎城平順壷關等處見沿途禾稼成熟有收穫在場者有尚未收穫者惟平定一州係山田六月以上十一條係臣耳聞目見不敢隱匿理合繕摺奏聞謹奏覽雍正七年十一月二十一日巡察山西等處户科掌印給事中臣宋筠謹奏為恭謝天恩事本年十一月二十日臣巡察至汾陽縣地方準撫臣轉行吏部咨文本月初三日奉旨山西按察使員缺著山西巡察宋筠補授山西巡察事務著侍讀勵宗萬管理欽此聞命自天感激無地臣隨恭設香案望闕叩首謝恩竊念臣以菲才蒙皇上不次擢用由翰林拔置垣中復由垣中特簡巡察殫竭愚誠毫無報稱今又蒙隆恩畀以全晉刑名重任臣何人斯屢受寵眷至深至渥唯有益加黽勉實心任事以仰報鴻恩於萬一耳臣即於二十四日回太原府將巡察印信恭送學臣勵宗萬臣到任後照例懇撫臣代臣叩謝外臣謹具摺恭謝天恩并將臣巡察任內所聞所見事宜一併奏聞謹奏好勉之勉之觀汝非汝兄宋致負君辱祖者比當竭力黽勉莫移初志以繼續汝先人之美可也同日又奏為據實陳奏事臣於十月二十七日復抵太原恭祝萬夀將臣前摺奏之事應與撫臣言者言之撫臣應與學臣言者言之學臣於十一月初五日出巡汾州一帶地方所有九月十月以來耳聞目見事宜敬為我皇上陳之一臣巡察至澤州府聞該府素多邪教臣嚴飭該地方官及鄉保人等不時稽查及查至攔車一驛離府六十里在太行山上係晉豫交界險阻之區最為緊要前因姦徒聚衆為匪特設同知一員駐劄其地彈壓甚覺有益乃該同知顧開陸自去嵗七月間抵任至今一載有餘尚在府城居住並未搬移亦不急修衙署揆之設官彈壓之意殊不相奏一名山載在祀典樵採宜禁九月初三日據趙城縣詳稱霍山中鎮廟東古柏一株被賊偷伐廟南一株又被鄉民燒燬等情已批該縣勒緝賊贓并飭其不時稽查又於十一月初六日據五臺縣詳稱五臺山臺懷村民郭玉成等店內窩留伐樹賊人趙之樞等搜獲伐樹斧鋸賊人鼠竄等語臣即批行嚴緝將來臣至太原囑撫臣嚴出告示以禁奏一臣巡察至平陽府臨汾縣地方聞該知縣徐三俊催科得法居心尚慈惟約束衙役不嚴捕役作弊往往養竊盜在家為害地方臣將捕役重行責奏一臣訪聞山西落地稅甚多潞澤二府更甚陵川一邑僻處山中向無額稅今年五月新行添出百姓頗以為苦又臣巡至垣曲絳縣交界地方名橫等民多怨言係臣親見不敢隱匿一臣巡察至霍州據靈石縣詳稱十月初一日文生鄭纘武出首民人耿義成逆母出妻窩賭打架及至審問乃因錢債細事起見該縣將耿義成薄聞一臣巡察至陽城縣據夏縣詳稱九月初三日在縣屬之陳村廟內盤獲卦子楊守立等四家男婦二十名口攜帶馬騾遊走訊問伊等供係臨晉縣人原想出門走馬賣解求些衣食恐路上難行前後分走晚宿野廟雖未犯事既經盤獲不便聽其遊走業將楊守立等遞回臨晉安插等情臣即嚴聞一臣於九月二十二日巡至沁水縣地方遇雪二寸於十月初六日至襄垣縣地方遇雪二寸澤州平陽所屬地方多種秋麥麥根俱為滋潤臣見小一臣巡察至太原縣據靈石縣仁義驛驛丞胡楷稟稱嶽陽縣家人劉姓在驛餧養馬匹扣尅馬料開場窩賭私騎驛馬等情臣一面嚴飭平陽府查報一面照會驛道查明移覆再通省驛馬近來俱無缺額疲瘦等弊臣每到一處細加查驗其中稍有臕欠者必令加意餧養務期肥壯間有一二齒實屬可嘉老不堪驅策者亦令更換奏聞一晉省民壯臣每到之處親行考驗其中或有年老及技藝不堪者臣即行革退另募精壯者頂補該州縣稍有懈弛不行操演者臣必嚴行申飭近來武藝頗有可觀再臣於今嵗春初曾通行各屬於道旁栽插栁枝除山麓多石難種外其餘平坦聞一自臣巡察以來一年零六個月凡各州縣大小竊案俱令通報計共二百四十三件已結者七十一件未結者五十三件未獲賊未結案者一百十九件臣現在逐一查明造册交送新任巡察管理臣抵臬司之任自當不時嚴催并奏以上十條臣耳聞目見不敢隱匿理合繕摺奏聞謹奏嘉悅覽焉臬司為守土之官執掌全省刑名莫稍移易今日此心此行更宜竭力加勉雍正七年十二月十一日山西按察使臣宋筠謹奏為聖德光天卿雲疊呈上瑞敬攄賀悃仰祈睿鑒事竊臣蒙皇上天恩畀任晉臬於本年十一月二十九日受事後見保德州詳報慶雲正在具摺恭賀間復於十二月初八日接臨晉縣申稱本年十二月初一日慶雲捧日五色繽紛霞光萬道呈輝耀彩與闔邑紳士軍民群集縣庭歡呼鼓舞咸稱聖世嘉徴小民今日欣逢仰荷皇恩福慶等因前來臣曷勝踴躍歡欣之至除詳報撫臣外恭摺肅攄賀悃仰祈皇上睿鑒又臣於十一月二十二日自汾陽回太原府連日遇雪經過地方俱約有三四寸抵任之後各屬俱報得雪自二寸至五寸不等合并奏聞再臣新任晉臬地方事宜應否準臣摺奏及應向何處轉奏臣不敢冒昧伏候諭旨遵行謹奏覽奏欣悅已有諭旨批發蔣泂奏摺內矣雍正八年正月二十六日山西按察使臣宋筠謹奏為恭報晉省瑞雪普霑事本年正月十六日太原府地方自辰時至亥時瑞雪繽紛微風不作得雪一尺二三寸旋據各屬報到或稱一尺有餘或稱九寸八寸以及六七寸四五寸不等合省普被地畝滋潤凡屬官民莫不仰戴聖主恩膏歡呼抃舞臣目覩地方情形曷勝額手理合具摺奏聞謹奏但勉吏治精勤刑罰平允則上天之垂賜嘉應可企踵而待也雍正八年三月十七日山西按察使臣宋筠謹奏為遵旨回奏事雍正八年二月十七日撫臣石麟傳示奉到硃批諭旨臣跪讀之下仰見睿鑒精詳訓示明切竊臣前奉命巡察晉省地方凡山村僻壤俱經巡歷奬勸淳良稽查姦宄今復荷天恩畀以臬司重任敢不益加黽勉時時留心訪究現在密飭屬員實力稽查并時差親信謹慎之人細為偵緝設有訪聞自一一密拏嚴究斷不使姦匪幸逃國法以冀仰副我皇上惠愛善良寧謐地方之至意所有恭聞訓旨緣由理合具摺回奏仰祈睿鑒謹奏留心為之毋忽同日又奏為恭報晉省雨澤普被事竊山右地方於本年三月初五十一等日太原府地方得雨約三四寸嗣復據各屬報稱得雨三四寸以及五六寸不等雖日期不一而無不霑被實屬及時之施現在四野芃芃二麥茂盛理合具摺奏聞謹奏深慰朕懷雍正八年四月二十四日山西按察使臣宋筠謹奏為恭報雨澤霑足事竊晉省地方於四月十二及十七十八等日據各府州縣紛紛報稱得雨或云霑足或云深透二十日戍時起至二十一日午時太原府省城得雨一尺有餘旋據各屬又陸續報到俱於是日得雨七八九寸不等通省雨澤優渥現在二麥盈野固甚蕃滋秋苗初生亦俱茂盛萬姓感戴聖澤歡聲載道所有晉省復得透雨日期理合具摺奏聞謹奏覽益當黽勉吏治詳慎刑名不可絲毫縱肆怠忽雍正八年八月二十日山西按察使臣宋筠謹奏為據實陳奏事竊臣蒙皇上厚恩由巡察特簡臬司今已蒞任八月惟期殫竭愚誠實心任事以報隆恩所有臣見聞確據之事四條並地方事宜三條不敢隱匿密行陳奏伏祈皇上聖明鑒察一管理巡察翰林院侍讀臣勵宗萬蒞任以來甫抵太原令陽曲縣多備執事人役伺候日需五六十人皆陽曲縣墊給食物又令買好騾三頭其價值十五六金十七八金不等每頭僅發潮銀十二兩餘皆該縣墊出又平定州知州安克寬向臣告言兩次勒借銀二百兩日來出巡廣帶人役所騎驛馬至二十餘匹之多又從陽曲縣起行即帶轎夫十二名扛夫二名前往任其沿途索擡舁價值聞一晉省河東所屬一帶地方俱係緊要之區且民刁難治必得精明強幹道員為之彈壓庶於地方有益臣見河東道臣潘宏裔居心仁慈為人長厚聞一晉省解刑部官吏飯銀二千兩係公用項內開銷者臣抵任以後細加訪察於此二千兩之外又每一州縣各私出銀十兩統計全省一十六州八十九縣共銀一千零五十兩交付提塘運送部內聞一七月十四日護軍統領臣海爾吉到晉撫臣率領司道赴郭外公所恭請聖安海爾吉宣過撫臣管束滿兵不嚴之旨十五日臣同藩司蔣洞驛道孟孫繩齊集撫臣官􅈦候撫臣傳進講話蔣洞忽袖中出一小札云撫臣約束滿兵不嚴一事我早已知有其事此札由京奏一安邑縣知縣車敏來詳報訪得該縣屬西古村居民假文亮世傳邪教自伊祖父相傳教曰收源已經數十餘年嗣後漸漸冷落與伊往來者稀少家中供非釋非道非仙男女像共六軸有徒弟衛朝仙等十餘人在洪洞趙城臨汾曲沃太平等處居住目下並無聚衆為匪及作會念經之事臣轉報撫臣批令將圖像燒燬並將衛朝仙等押赴安聞一據蒲州府報稱六月十四日有臨晉縣東坡鄉民數十餘人從北門進縣要與知縣胡南藩講話適知縣分劃虞鄉疆界公出捕驛等官諭阻衆皆悔懼即由北門而出當時散回各村去時交與把總徐雲一單云分縣苦樂不均開有六條一不該分縣不分驛遞一不該平分生員一不該收糧每兩捉短封五分一收銅不發銅價一坊廂四里差事不應里民代賠一胡知縣不該既賣虞鄉又賣五姓湖地方等語臣查知縣果有劣迹應赴各衙門控告何得聚衆肆橫群擁縣門臣轉詳撫臣批令該府確查為首姓名嚴拏重治如單內所開胡令各款實有其事即速揭報今於七月二十九日據該府詳報將單開各款除分縣等項係奉部議定案無庸議至多捉短封不發銅價等項逐一查事關聚衆入縣臣不敢隱匿不行奏聞一晉省自夏及秋據各屬報到雨澤調勻髙下原隰秋禾俱十分蕃滋惟大同府屬之天鎮縣報稱縣屬南鄉一帶田禾被旱雖七月得雨天寒補種無及等語撫臣已委員查驗臣同撫臣藩司設法撫綏務令得所又各屬有一二稍被雹災之處臣即轉詳撫臣批令藩司同地方官加意料理合并奏以上七條臣聞見最確理合據實具摺奏聞謹奏好勉之密之密之一字更為切要雍正八年十二月十九日山西按察使臣宋筠謹奏為奏聞事十二月十九日據寧武縣報稱本月十六日有蘇致隆等一行十一人投宿寧武縣曹珍店中該縣見其行蹤詭祕細加盤詰內有戴水晶帽頂者云我姓蘇名致隆在京范育馪處辦事係內務府管稅司行走奉十七王轉傳密旨差往陕西辦機密事去該縣復加盤詰所辦何事云採買軍需駱駝該縣又加盤詰既往陕西採買駱駝何不從大路前進云范育馪與永寧州于巡撫是親家有一件事託于巡撫著我帶信去料理因此到寧武府等情詳報到臣臣思既奉密旨斷無泄漏風聲且斷無從僻道與他人料理事件之理臣即一面轉詳撫臣一面飭寧武縣確查蘇致隆等如何奉差辦事及冒詐實情並飭令選差幹役協同城守兵丁嚴加看守外臣不敢因循隱匿密行奏聞謹奏有旨諭撫臣硃批諭旨卷一百三十九
