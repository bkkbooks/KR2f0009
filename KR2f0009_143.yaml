body:
  text: 欽定四庫全書硃批諭㫖卷一百四十三硃批李萬倉奏摺廣東韶州總兵官臣李萬倉謹奏為據實陳明事竊臣查總兵一員䝉聖恩賞給親丁糧六十分儘足以贍養家口今韶州總兵名下除親丁之外多食糧十二分詢厥所由謂前任總兵皆家口長隨衆多故舊有長隨糧十二分遂致標下三營將備各於應食親丁之外亦皆多食長隨糧二三分上行下效習為故常臣現在家口無多其長隨工食俱於親丁項下支給雖三營將備多食之糧皆有長隨頂食兵數不差但不能依時聽操而經制官兵豈容虛設所有總兵名下多食長隨糧十二分竝將備各名下多食長隨糧共二十七分臣已公同營將招募健壯如數隨營差操庶補汛防兵單之地以實營伍少有裨益矣理合據實具摺奏明伏祈皇上睿鑒施行謹奏據所奏不過汝等職分中之末節耳第一要著申明紀律以大義鼓舞將士次則訓練操習技藝􅈺熟又其次令兵丁各顧生計崇尚節儉不至貧窘以及緝盜不遺餘力察姦毋使疏脫均係要務是乃汝等提鎮大員之專責至若招補幾分空糧捐製幾面旗幟修造數件器械類斯細事何足列諸章奏耶勉之既為大臣當於大者逺者是務區區小節不論如何若何皆可切須擺脫行伍走卒小人之形態方為無忝厥職也識之署理廣東潮州總兵官臣李萬倉謹奏為陸營請改水師捍外兼以衛內事臣竊見潮州地方枕山腹海最為嶺東巨鎮離潮百里所屬黃岡柘林大城所東界等汛接連閩壤控扼關頭要隘故額設馬步戰守兵丁一千二百名分為左右二營以都司轄之副將統之而以副將駐防黃岡城汛居中調度於大澤深山諸處而不知柘林一汛尤為要也查柘林係南澳海道第一關鎖門户據瀕海三路上游前年廣盜往閩船由此出閩冦犯廣亦由此入況對面汪洋萬頃飄風突來勢不可遏又況鄰界之澄海海門靖海諸處亦皆咫尺海濤陸汛之外兼設水師屬南澳總兵管轄誠有以援其勢矣若柘林為南澳澄海掎角止使操戈岸上不改水師必致彼此岐視倘遇警急陸汛不能援應水師徒放炮虛張聲勢有防海之名而無捕盜之實也臣愚以防守柘林陸汛左營守備請改柘林水師專防海澳配造艍船二隻快哨二隻䑩艚二隻并現在巡河櫓船二隻共大小戰船八隻分泊柘林管轄港口之雞母澳西虎仔㠘二水汛配兵哨巡於閩粵交界海道不與春秋㑹哨外洋之例艍船定額每隻配兵四十名䑩艚每隻配兵二十名快哨每隻配兵一十五名通共船兵一百五十名其餘照次分班仍防岸汛俾水陸兼資實用如遇春夏東南風發時陸師可防內地姦匪出口遇秋冬西北風起時水師可截外洋剽劫登岸如此則內嚴而外自靜然為海疆計者水師之設每慮人地不宜水務不諳以潮州之兵皆土著之人慣於海者居多至於千把皆土著也可無更張止選調熟識水務守備一員足矣餘如副將轄管都司及右營守備千把辨兵仍照專防陸汛分布守禦山海兩得其宜矣緣臣巡閲黃岡柘林濱海等汛見外而南澳孤懸海島四面汪洋內而柘林阻隔一渡閩海毗連扼吭撫背甚屬要區謂宜通盤籌計聨絡巡防俾海疆永逺寧謐臣庸愚管見是否可採仰請皇上睿鑒施行謹奏改設之舉果否水陸兼資言之督臣酌量施行署理廣東潮州總兵官臣李萬倉謹奏為備陳礦徒流患仰祈聖明敇法窮治永靖巖疆事臣竊見廣東産礦山場惟潮州之海陽縣止仲坑山一處若惠州屬縣則指不勝屈如永安海豐歸善長寧長樂河源在在皆有礦山未能悉舉但查礦山所産銀銅鉛錫不一雖曰天地自然之利然利之所在人必趨之禁之不嚴患漸隨之故凡礦徒盜挖之山上極巔崖下窮深谷盡是姦匪藏之所其中多有依山村落人家之豪强者專一窩匿外方遊手始焉募為砂夫繼則從而竊據於是起蓋草房羅列鎗械希冀茍安至寶山既空利無從覓乘機竊發大則嘯聚虜掠小則雞犬靡寧官兵追捕此輩長於穿林截徑一見隊伍扳藤裹石據險以待雖有徑旅雄師無可施展之地又查去年九月內礦徒曽乾浪鄒百里等在惠州永安縣屬鳳凰嶂聚衆挖礦貽害地方延今未能盡獲此其明徴又前年七月內海豐縣屬礦徒各裹紅巾攻劫梅隴墟市五十餘家屠戮甚慘更虜人口押挑劫贓歸山地方有司但以招安冀免參罰而被害之家飲恨吞聲無可伸訴若非皇上明見萬里將此等礦賊仍發本地梟示不知效尤何所底止又幸此輩相率結伴由鄰省江西之上猶崇義等處前往楚南之桂東桂陽開採因據江西巡撫公文稱廣東砂夫經過甚多皆包頭跣足貿然前往湖廣開採俱係廣東之和平龍川長寧興寧河源永安等縣之人臣署潮州鎮務隨即遍行所屬并張示曉諭引導各回安業竝未實見其來觀此必惠州屬縣礦徒可知此七月內承接督臣郝玉麟密札奉有上諭廣東舊有礦徒因惠州等處嚴禁偷挖此輩蟻聚無業一聞湖廣桂東桂陽刨試礦砂之信蜂聚蟻行接踵而往桂東一縣約有二三千人散住於寨前大塘等處守候日久至於典衣糊口或有偷竊度日者今桂東已不准開採恐此種無賴之人不能復歸故土流散楚地衣食缺乏以致别生事端加意防範善為遣發其經由江西南贑等處亦令地方官留心稽查并廣東督撫將此礦徒令該州縣曉諭引導各就生業安居勿事遊蕩母使滋蔓鄰省欽此等因到臣仰見我皇上保惠元元惟恐一夫不獲其所故令地方官善導出疆回籍安插誠堯舜之心為心也乃此輩前者由江西至湖廣多至數千人今回廣東何以絶無蹤跡明係各自形匿影散入故居仍復鳩集盜挖更可知矣須得地方有司嚴行保甲稽查出入方不致冷灰復燃況保甲之法十家一保甚見成效一家窩匿九家連坐誰敢共相徇隱故欲清礦徒必先嚴行保甲亦必督撫飭行府縣出示家喻户曉窮治以法絶其根株至有該地强丁巨族以及紳襟豪棍接濟糧食仍縱偷挖朋比為匪州縣選委佐二等官實力查察逐月務取近山鄉村竝無窩容前項礦徒盜挖礦砂甘結呈報該地方官加具印結轉繳督撫察驗如有扶同徇庇事覺一併法究庶礦徒無托足之地良民獲安堵而居永無伏莽之虞矣臣受國恩深重奉職難酬若知而不言及言而不實是自蹈欺罔之罪我皇上用臣彈壓地方奚以取臣為哉臣謹繕摺奏請敇法窮治伏乞皇上睿鑒施行謹奏此奏甚屬可嘉隨另有諭㫖廣東廣州左翼總兵官臣李萬倉謹奏為恭請效力西陲仰祈恩准事竊臣生自西涼壯投戎伍哈密地方備悉形勢後隨天津總兵官潘育龍拔補把總歷官三十餘載以至今職叨受兩朝豢養深恩更荷聖主特擢遇太平盛世圖報無由貪職偷安捫胸殊愧兹當西陲用兵之日實臣犬馬蹶之期臣雖行年六十有二筋力猶屬强健矍鑠據鞍臣敢自許況臣向曽經歷邊外今使安閒內地不遂臣心我皇上奚以取臣為哉臣圖效邊陲此志不自今日緣雍正八年間由韶州左翼總兵調任廣州左翼重鎮未幾督臣郝玉麟委臣署理潮州鎮務時值臺灣土番生變潮州係閩粵接壤海洋相連臣有督巡邊隅口岸之責未敢奏請效力近因遵㫖以瓊州副將蘇福署潮州總兵臣得卸事回任廣州地方寧謐無事正臣矢志邊陲奮身圖報之日況臣自雍正三年九月內仰覲天顔面承聖訓隨賜御書克食紫金錠貂皮銀兩若此髙厚之恩捐糜難報計今七載瞻天仰聖依戀彌切叩乞皇上允臣星馳赴闕跪懇驗臣年力併請指授方略俾得遵循臣不勝待命之至謹繕摺陳奏仰祈睿鑒施行謹奏果能殫竭心力勉盡職守與軍前效力無以異也赴闕之請不必硃批諭㫖卷一百四十三
