body:
  text: 欽定四庫全書硃批諭旨卷一百三十七硃批孫國璽奏摺雍正六年二月初十日浙江杭州府知府臣孫國璽謹奏為奏請睿鑒事竊臣至愚極陋備員州縣於雍正四年八月引見幸荷皇上簡授開封府知府曽面奉諭旨准臣摺奏臣跪聆天語感激無地緣抵開封府任未及一月復奉旨調補杭州府知府自到任以來夙夜奮勉極圖報效幸在省㑹凡一切地方事宜俱就近詳禀督臣李衛商酌辦理臣不敢稍存偏私之見故未曽冒昧具摺上瀆宸聰今䝉特旨補授福建汀漳道聞命之下曷勝感戴惶悚伏念閩省山海交錯民風刁悍奏朕但知為人之道端本為是逐末為非至於內外居官法則朕未身歷一事縱有所聞亦自信不及仍是從前面訓之旨汝果肯敬奉力行一生用之不盡莫移初志勉之密奏事件遵照前諭仰副朕意毋違雍正六年十一月初三日福建臺灣道臣孫國璽謹奏為奏請睿鑒事竊臣於雍正六年正月奉旨補授汀漳道臣隨恭繕摺奏欽奉簡任之殊恩臣自本年七月十三日抵汀漳道任於八月十二日奉督撫調赴署理按察司事至十月十八日交印卸事現在星馳臺灣受事其閩省利弊就臣一得之愚敬另具摺奏聞至臺灣事宜容臣到任之後詳悉察訪確實倘有應奏之處再行恭繕摺奏所有原奉硃批奏摺理合恭繳謹奏今已將爾調任鹽驛道所奏二摺事宜到省時面與督撫臣共相商酌妥議奏聞至於嚴定聚衆處分朕意可以不必但遵循現行則例不寬縱市恩瞻徇沽譽一一執法不撓人亦自知警懼假若處分倍嚴而奉行不力徒歸怨於朕而已於事未見其益總在爾等詳細籌畫具奏如應具題禀明督撫㑹題可也其催徴民缺之奏今朕業經寬免可無庸議同日又奏為敬陳下悃仰祈睿鑒事竊臣於雍正四年八月引見之日得䝉天語垂問臣母年紀臣跪對之下面奉諭旨俟臣母八十嵗令臣預期奏請頒賜扁額欽此欽遵是臣母之叨光榮者至優至渥有生之日皆聖主恩賜之年臣兹奉命調臺伏查臺灣諸臣無帶眷之例況臣母年老龍鍾勢難航海現在寄居漳郡臣遠隔重洋職任地方不敢擅離伏懇皇上憫念臣母孀節所生只臣一子恩准臣於一嵗之中回漳省視一二次仍即馳赴地方辦事俾臣公私得以兩全皆荷皇上之𢎞慈臣不勝銜結瞻戀之至謹奏覽汝奏請朕甚嘉悅已另有旨矣雍正七年四月十一日福建臺灣道臣孫國璽謹奏為聖恩之高厚難名仰申微臣謝忱事竊臣於本年二月十一日接䝉撫臣牌行准部咨開雍正六年十二月十一日內閣交出上諭一道到臣䝉皇上天恩念臣母年老母子相依至情將福建鹽驛道劉藩長調補臺灣道以臣調補鹽驛道俾臣得以晨昏奉侍聞命自天感激無地又於本年二月十五日准臺灣鎮臣王郡家人恭捧皇上欽賞到臣復准王郡宣傳硃批諭旨爾可傳旨與孫國璽亦令伊奏摺不必特遣人來或隨巡臺御史奏摺之便或送交該督撫轉奏欽此欽遵臣跪聆聖諭恭設香案望闕叩頭謝恩祗受伏念臣何人斯䝉皇上特恩格外升遷俾得遂侍飬之私悃復荷錫賚便蕃賜以上方珍品是臣母子之荷曠典者誠千古所僅見也涕泗感激鏤心刻骨惟有益矢公忠勉竭犬馬以仰報髙厚於萬一耳惟是臣既䝉聖恩特調鹽驛道則非遠隔海洋嗣後倘有聖諭遵行所有臣感激私衷理合具摺奏謝伏乞睿鑒謹奏覽雍正七年十月初六日福建按察使臣孫國璽謹奏為恭謝天恩仰請准臣引見事竊夲年六月二十四日新任臺灣道臣劉藩長抵任臣交代清楚隨即起程於閏七月初三日抵省禀明督撫二臣給假赴漳迎母就養復奉聖恩特擢臣福建按察使臣聞命之下感激惶悚莫可名狀惟有竭盡愚忱實心實力恪供厥職以圖仰報髙厚於萬一但念臬司為通省刑名總滙臣智庸識淺膺斯重任非仰賴聖明指示曷克遵循伏乞皇上念臣愚昧恩准赴部引見俾臣得恭覲天顔跪聆聖訓凡事遵照敬謹辦理庶免隕越不特於地方民生有益而微臣戀主之心亦得稍遂矣為此謹奏凡為臣子者惟當勉一公誠事事無欺無隱與君上一德同心為要朕因觀汝可成大器所以不次擢用諒汝必不忍負朕也雖然每遇與汝共事之同寅上司人等偶一言及未有不稱道汝者朕少涉疑料汝必由俯仰浮沉取悅干譽之所致今果然矣朕深為之寒心如蔡仕􅘎凂汝轉託程元章一事在他人尚不肯欺隱而據情奏聞於朕不知孫國璽具何肺腑竟能隱忍而欺朕似此不明大義不别重輕卑陋鄉原小人之形態豈能受朕知遇之人物耶殊大失朕之期望矣雍正八年二月十二日山東布政使臣孫國璽謹奏為恭謝天恩懇請聖訓事竊臣奉特旨補授福建按察使未及三月又䝉特恩升授山東布政使聞命之下感激涕零隨經具詳福建撫臣代題恭謝天恩於雍正七年十一月初十日自閩起程於雍正八年二月初二日抵任現將升司費金吾送到交代册籍確加查核并將費金吾所交一應地方事件次第料理外惟是山東山海之區地方遼濶政務殷繁臣才庸識淺非荷聖明訓誨指示曷克遵循伏乞天恩允臣於接受交代清楚之日束裝赴京恭覲天顔跪聆聖訓不獨犬馬戀主之忱得以稍慰於地方民生均有禆益矣為此繕摺具奏伏乞皇上睿鑒批示遵行謹奏甫經到任地方事務緊要不必來京同日又奏為恭謝聖訓據實奏明事竊臣前奏恭謝天恩一摺奉到硃批臣跪讀之下不勝驚惶戰栗之至伏思臣何人斯䝉皇上天恩由知縣歷擢藩司恩逾常格今又諄切訓誨至於如此是聖主猶以臣尚可教誨故不即加嚴譴而使自知警省改悔心非木石受此隆恩何敢稍有欺隱臣於上年七月間自漳州赴省路經泉州府旅邸忽有人持蔡仕􅘎名帖口稱奉伊主母之命求臣轉致學臣程元章將伊子未經與試者准作科舉入場等語臣以事關大典豈容弊混即經面叱并將所開小單擲還及至省時見程元章巳經卸事調署浙江藩司即日起程赴任是以將此情由告知并言蔡仕􅘎現署浙撫印務即此輾轉央情一事可知其人品不端此等之人須當留心防範等語今程元章現在不敢一字涉虛者也臣因其事已將伊家人面叱又經與程元章說知使其留心防範是以未敢復瀆宸聰此實臣愚昧昏聵之所致百喙何能辭咎但以臣為有心畏懼蔡仕􅘎而故為欺隱則臣犬馬不如矣今䝉恩旨訓誨臣從此惟有時刻警省事無大小茍有見聞斷不敢一字隱漏伏懇皇上天恩格外原宥臣生生世世矢圖報效於無既矣為此據實陳明伏祈聖鑒謹奏似此理屈辭窮之辨何益將蔡仕􅘎為伊子轉託求情一事另具奏摺參來雍正八年四月十一日山東布政使臣孫國璽謹奏為奏聞事竊照東省耗羡歸公從前每正銀一兩加耗一錢八分於一八之內各州縣扣留公費銀一分又聽出解費運費部飯庫飯等項名色共銀三分外實提解耗羡一錢四分又於一四之內分别州縣大小扣除養廉若干外餘銀解司歸入耗羡項下又於聽出解費等項銀三分之內除偏僻州縣實支腳費銀三毫衝繁州縣實支腳費銀三釐三毫外餘銀另行解司歸入充公項下自上年署撫臣費金吾將東省公費不照從前一分之例按照直隸大中小州縣分别衝僻繁簡定數扣支至各州縣起解銀兩亦照豫省之例分别道里遠近支給腳費實屬至公但衝繁州縣仍聽多支銀三釐未經改正似屬遺漏至解費運費部飯庫飯等項名色亦仍另扣各自起解歸入充公項下其餘扣除養亷之外方全作耗羡起解臣思從前衝繁州縣三釐原因公費未分州縣之衝僻俱照一分扣除且腳費未分道里之遠近俱照三毫扣除未免苦樂不均是以有此三釐之多扣也今養廉公費俱分别衝僻支給即腳費又照遠近分别扣除則此多扣三釐實出無名未便聽其影射重復應請嗣後大中小州縣一例起解至提解耗羡原為地方公事動支是各州縣正項之外止應有耗羡一款凡一應解費運費部飯庫飯名色原屬相沿之謬悉應革除今年欽奉恩旨蠲免耗羡二分在各州縣徴收一六耗銀除養廉若干及公費腳費若干外其餘應總為耗羡一款全數解貯司庫在司中亦不必另立耗羡充公二項名色除正項外所收耗羡存貯一處凡遇地方公事應行動支詳報督撫批准支給嵗底報銷如此則款項不繁稽查亦易而上下經胥亦無從舞弊矣再照部飯等項向在本項內支給庫官庫吏養廉向在庫飯項下支給今若彚為耗羡一款則將來部飯等項以及每年庫官庫吏養廉均應在司庫耗羡項下支給除詳明督撫兩臣外理合具摺奏聞謹奏類斯等務自應向督撫二臣熟計詳商將爾所奏逐一請教田文鏡而行可也同日又奏為籲懇再寬首報隱匿地畝之限期以廣皇仁事竊照各省隱匿地畝荷䝉皇上屢頒恩旨寬其限期令民自首百姓感激洪恩陸續首報升科者所在多有而其間愚民無知尚在因循未經首報者亦或有之今查東省於雍正六年八月初二日奉到部文欽奉恩旨准其寬限又經撫臣嶽濬題請再寬半年之限於七年十月二十六日限滿但臣檢查案卷有首報原在限內及經司府駁查明白詳覆到日已在限外不便彚入自首案內題報者經前司臣費金吾因其限期已逾批令歸入勸墾案內彚報臣思此等自首隱匿之案現在已逾定限若照例治以隱匿之罪則當其首報之初尚在限內似非我皇上屢次寬恩之至意若歸入勸墾案內則又俟十年之後方行起科查此地現在成熟豈容以熟作荒轉令起科於十年之後可否仰懇天恩再寬半年之限准其自首則不但此等首報原在限內以駁查而致違限者得以邀恩免其治罪即凡有未經首報或因逾限恐罹罪戾而現在觀望因循者亦得陸續首報升科似於國計民生均為有益臣不揣冒昧據實具奏伏祈聖鑒謹奏與該督商酌具題請旨同日又奏為奏明東省平餘實情仰祈睿鑒事竊臣於到任後接受升司費金吾交代冊籍逐一查核除正雜錢糧業經查明出結另具簡明清摺恭呈御覽外又據費金吾冊開平餘銀二萬五千二百六十兩零一項臣未悉平餘始末隨問費金吾并庫官庫書據云費金吾自雍正六年七月到任起至八年二月卸事止任內支放過正項耗羡共銀六百九萬三千餘兩共平餘銀三萬兩零除用去銀四千九百餘兩已經費金吾自行奏明外尚存此二萬五千二百六十兩零留充公用又云此項平餘雖無定數每平約有七八錢不等內三錢已經前司臣張保奏明歸入充公項下五錢則係費金吾任內奏明充公之項等語臣查前項平餘並不在向日一八現今一六耗羡之內實係暗令庫官髙下其手每平多含七八錢以符平餘之數在庫官彈兌時輕則數有不敷重則州縣添搭不足實屬兩難在州縣則因解司時有此一項平餘是向之一八者實需一九今之一六者實需一七若多徴自民則恐上司之提封抽兌劾以重耗若實止一六則此項平餘實無從出伏惟我皇上軫念民依屢沛如天之恩蠲免動盈數千百萬今平餘每年不過二萬餘兩若留此名色則州縣徴收錢糧實難以一六耗羡之數約束遵行倘䝉皇上天恩將此平餘一項豁除則州縣起解錢糧俱令按凖庫平自行滴珠臣於收兌錢糧時得以督率庫官毫釐不許多重一應州縣徴收錢糧俱得約束令其遵奉恩旨一六徴收如有絲毫重徴嚴加參劾從重治罪如此則上下畫一不獨各州縣易於遵守而東省黎民尤得實被減耗之殊恩於千萬世矣為此繕摺奏聞伏祈睿鑒謹奏此事費金吾前經奏過據云與他省之例不同但相沿既久遽議豁除亦應與督撫二臣商酌而行雍正十年正月初十日大理寺少卿臣孫國璽謹奏為遵旨具奏叩懇天恩事竊臣於雍正四年九月二十八日由河南禹州知州引見荷䝉天語詢臣家世經臣具奏臣有老母年逾七旬面奉恩旨俟爾母八十爾具摺奏請賞給扁額等因欽此欽遵臣感激聖恩寤寐不忘緣臣賦質愚昧歷任以來毫無報效而且每多錯誤荷䝉天恩不加譴責屢奉訓旨教誨諄切雖天地生成父母顧復不足以形容髙厚臣母今年八十若就臣供職無能自揣何敢瀆奏但念臣母一生苦節冀邀皇上錫類仁恩今三月十四日臣母八旬夀日臣謹遵旨具奏叩懇皇上天恩賞給扁聫俾臣母得荷寵榮并跪求聖主格外洪恩照臣現在職銜頒賜誥封臣母仰邀皇上洪福將來年嵗由此遞增至九十至百嵗皆聖主浩蕩恩波之所賜也伏惟睿鑒謹奏朕初期望於汝之心實惟天鑒豈料汝如是負朕深恩也今日不但汝母扁額無須啓齒汝若不痛自悛改仍循潔已沽譽欺朦隱飾轍迹身家性命目前難保纍及汝母尚在未定具何心膽面皮輒敢冒請封典耶觀汝此奏甚屬妄誕可惡之至慎之雍正十年四月二十五日辦理河東副總河事大理寺少卿臣孫國璽謹奏為恭繳硃批叩謝聖訓事雍正十年二月十五日臣齎摺家人回浙恭捧到臣前奏遵旨具奏叩懇天恩一摺奉有硃批又於二月二十五日浙江總督臣李衛在京寄信內開欽奉上諭一道申飭到臣臣跪讀聖訓不禁感激涕零惶悚汗下無地自容伏念臣質本愚昧知識短淺屢䝉皇上擢用之恩並䝉天心屬望之切臣何人斯得邀天恩高厚一至於此雖生生世世永矢捐糜末由仰報乃歷任以來既以供職無能毫無報稱今因臣母苦節厯䝉聖主格外洪恩有加無巳臣復不自揣量於遵旨具奏之時並懇賞給誥封冒昧之罪萬死奚辭荷䝉硃批訓勉又𫝊諭旨嚴加申飭仰見天恩終始垂慈提撕警覺至再至三臣心非木石愧悔之餘感激倍切惟有凛遵聖訓痛自改過凡事務竭駑駘實心實力恪供厥職以期圖報天恩於萬一所有奉到硃批理合恭繳叩謝聖訓伏乞睿鑒為此謹奏朕實不解汝等漢軍是何風習大抵人人言行不符心口互異求如田文鏡者百中不得一二似汝此奏朕殊難以見信也雍正十年十月初七日協辦河東總督事務河東副總河大理寺少卿臣孫國璽謹奏為恭謝天恩事雍正十年十月初四日准河東總督田文鏡咨准吏部咨雍正十年九月二十三日內閣奉上諭據河東總督田文鏡奏稱臣於今年四月患病至六月方得稍痊八月間勉力入場監臨今已出榜現在加意調養無如氣血一時難以復原轉瞬武闈即届以一人而兼監臨主考自揣微軀恐不能力疾辦事仰祈恩准解任調治俟春融由水路進京查副總河孫國璽在豫半年小心勤慎堪以暫署河南巡撫印務等語田文鏡老成練達奉國公忠河東兩省地方緊要正資料理著在任調攝不必懇請解退但總督職任事務繁多如考試武闈等事皆須年力精壯之人方能辦理孫國璽著以副總河協助田文鏡辦理總督事務凡似此監場等事著田文鏡委用代理欽此等因到臣隨恭設香案望闕叩頭謝恩訖伏念臣庸愚陋質知識短淺屢䝉皇上不次擢用畀以河東副總河之任半載以來毫無報效日切悚惶兹復奉綸音命臣協助河東督臣田文鏡辦理總督事務旋又欽奉恩旨酌分養廉銀兩期於敷用皇仁優渥下恤臣工偹極周摯臣跪誦之際感激涕零捫心自揣報稱實難惟有勉效駑駘凡事無巨細均聽督臣教導指示如有委用殫心竭慮敬謹辦理不敢稍有怠忽以期仰報高厚於萬一所有微臣感激蟻忱理合繕摺奏謝伏乞聖鑒謹奏但效法田文鏡之居心辦事能一分受一分福不能一分罹一分害似汝等輩事事因循人人瞻顧圖邀一時虛譽縱使中外交稱而所謂益者何在若執迷不改將來禍必不測類此下愚不移屢經訓誡而置若罔聞終至身家性命喪失者不一其人汝豈全無聞見乎如田文鏡毫不阿徇回護但知秉公持正盡心體國雖招衆怨謗言盈耳而宦蹟優隆榮祿自若汝試思之益耶害耶當如醉醒夢覺洗滌肺腸竭力以效法之倘再狐疑觀望可惜虛負朕一番期望之恩且國家三尺法朕亦不得頻頻私貸於汝也勉為之慎為之將此諭併令田文鏡知之雍正十年十一月初八日協辦河東總督事務河東副總河大理寺少卿臣孫國璽謹奏為封疆責任綦重伏懇聖主簡任賢能以免貽誤事竊臣前䝉皇上天恩因河東督臣田文鏡患病未痊陳請解退命臣協助辦理臣准督臣委令代典武闈承審命盜各案並日行事件悉皆協同竭蹶辦理今於雍正十年十一月初八日又准督臣田文鏡以病勢沉重不能視事委員齎送河東總督印信並王命旗牌書吏文卷等項移交到臣臣因先奉有協辦之諭旨是以暫為接管臣任事一日則盡一日之職分斷不敢絲毫瞻顧將就推諉自干罪愆以上負聖心下辜督臣田文鏡委任之意惟是封疆責任重大臣知識短淺未能勝任伏乞皇上迅賜簡任賢能以免貽誤則仰戴高厚當銜結於生生世世矣除將接管印信日期另疏題報外理合繕摺奏請伏祈皇上睿鑒施行謹奏覽奏知道了姑竭力勉為之雍正十年十一月二十四日署理河南巡撫事務大理寺少卿臣孫國璽謹奏為恭謝天恩懇請陛見仰承聖訓事雍正十年十一月二十三日准吏部咨開奉諭旨河南巡撫關防著齎發副總河孫國璽令署理巡撫事務欽此等因到臣臣隨恭設香案望闕叩頭恭謝天恩訖除接到巡撫關防另疏題謝外伏念河南居天下之中巡撫膺封疆之重督臣之章程具在而遵循恪守奉行不可不謹微臣之耳目難周而察吏安民稽查不可不力況以臣之駑鈍臣之愚魯事無巨細必求皇上訓誨指示欽奉遵行庶免隕越仰請皇上容臣乘封印後減從馳赴闕廷叩請聖安跪聆聖訓則不獨稍慰微臣犬馬戀主之私而全豫官民莫不感戴皇上造就隆恩於無既矣謹繕摺恭奏伏乞恩允訓示遵行再查河南巡撫養廉經督臣田文鏡奏明在案因前奉諭旨令酌分數千金與臣其餘仍留為督臣用度是以自十月起其裁減銀兩尚未歸公今督臣已故應照前奏每年巡撫養廉二萬兩永為定額其餘八千九百餘兩臣即飭司歸公以偹地方之用合併陳明為此謹奏今河東既添設總督此養廉一事俟王士俊到豫後商酌妥協另行奏請雍正十一年正月三十日署理河南巡撫事務大理寺少卿臣孫國璽謹奏為恭報雨雪日期仰祈睿鑒事竊查豫省今嵗正月內自初二以至十三日各屬得過瑞雪數寸經臣具摺奏聞并將現在設壇祈雨率屬晨夕步禱緣由奏明嗣據得雨州縣陸續申報如歸德府屬之商邱寧陵夏邑永城柘城南陽府屬之南陽泌陽鎮平鄧州內鄉裕州舞陽葉縣汝寧府屬之汝陽上蔡確山正陽新蔡信陽羅山陳州并所屬之商水項城沈邱許州所屬之臨潁郾城光州所屬之息縣等處於十四十五十七十九二十等日得雨自八寸以至二三寸不等又開封府屬之把縣太康中牟歸德府屬之寧陵鹿邑虞城睢州考城柘城彰德府屬之安陽臨漳武安陳州并所屬之西華鄭州所屬之汜水等處於二十四五六等日得雨自七寸以至二三寸不等二十七日臣又㑹同督臣王士俊另行薰壇竭誠祈禱即於是日申時降雪繽紛稠密至二十八日辰刻始住據祥符縣申報入土三寸有零四野積雪一尺二三寸不等并據開封府屬之陳留把縣通許尉氏洧川鄢陵扶溝陽武封邱蘭陽儀封歸德府屬之睢州彰德府屬之安陽湯隂衛輝府屬之汲縣淇縣延津滑縣濬縣懷慶府屬之原武許州禹州所屬之密縣新鄭鄭州并全屬先後申報俱於二十七八兩日各得瑞雪自二尺一尺五寸一尺二寸并一尺及八寸五六寸不等臣觀是日雲氣甚厚得雪必廣除距省稍遠各州縣得雪尺寸俟報到另摺恭奏外所有十四日起至二十八日止得過雨雪緣由合先具摺奏聞謹奏可謂大奇王士俊甫經到豫即有瑞雪溥降似此應驗昭然若仍不知慚懼則誠非人類矣雍正十一年二月初六日署理河南巡撫事務大理寺少卿臣孫國璽謹奏為恭摺續報雨雪日期仰祈睿鑒事竊查豫省今嵗正月內自十四日起至二十八日止各屬得過雨雪尺寸經臣於三十日具摺奏聞并聲明距省稍遠各州縣俟報到另摺恭奏嗣據開封府屬之太康中牟歸德府屬之商邱寧陵永城鹿邑虞城夏邑考城柘城彰德府屬之臨漳林縣武安涉縣內黃衛輝府屬之新鄉輝縣獲嘉懷慶府屬之修武武陟溫縣濟源孟縣河南府屬之洛陽偃師鞏縣孟津宜陽登封新安澠池嵩縣永寧南陽府屬之南陽唐縣鎮平新野裕州舞陽葉縣汝寧府屬之西平陳州并所屬之西華商水許州全屬禹州陜州并全屬汝州并全屬等處陸續申報俱於正月二十七八兩日各得瑞雪自一尺以至三四寸不等其續報得雨州縣如歸德府屬之商邱夏邑彰德府屬之涉縣河南府屬之嵩縣汝寧府屬之上蔡南陽府屬之唐縣鄧州淅川許州所屬之郾城陜州所屬之闅鄉光州所屬之商城於正月二十四五六等日各得雨一二三四寸不等臣復差員查察并據各屬禀報咸稱雨雪及時未耕之田可以翻犁播種現在之麥藉以滋潤長茂民心歡悅預慶豐收臣又因青黃不接之時恐百姓艱於謀食隨分飭司道轉行各屬查明將社倉穀石照例出借一面動撥常平倉儲減價發糶務期民食充足安居樂業以慰聖懷所有續報得過雨雪緣由理合具摺奏聞謹奏前諭甚明汝薄福小才也當極加警勉將朕兩次所批之旨皆令王士俊知之雍正十一年二月十九日署理河南巡撫事務大理寺少卿臣孫國璽謹奏為恭報得雨日期仰祈睿鑒事竊查豫省今嵗正月內得過雨雪尺寸經臣先後具摺奏聞嗣據開封歸德衛輝河南南陽汝寧等六府汝陳許禹鄭等五州所屬州縣陸續申報俱於二月初五初十及十一十三十四十五等日各得雨霑足其彰德府屬之安陽湯隂臨漳武安懷慶府屬之武陟濟源孟縣原武陜州并所屬之闅鄉俱於二月初五初十及十四十五等日各得雨八寸六寸及二三寸不等臣復差員四路查勘并據各屬禀報咸稱屢經時雨沾濡二麥俱已青葱長茂未種之地亦皆翻犁種植秋禾現在糧價平減農民安堵樂業除距省稍遠州縣容俟查報到日另奏外所有二月內各屬得雨情形合先具摺奏聞伏乞皇上睿鑒謹奏以手加額覽焉雍正十一年三月二十五日河東總督臣王士俊署理河南巡撫事務大理寺少卿臣孫國璽謹奏為奏聞事竊照豫省收貯捐納等項穀石其倉厫不敷存貯者屢經前督臣田文鏡奏明動用河北捐納公費項下每間給銀十五兩陸續分發各州縣添建在案今據布政使刁承祖詳稱開封歸德河南等府及禹鄭等州之屬縣俱有報捐穀石多少不等除舊有之倉厫盡數存貯無庸添建者不議外尚有不敷收貯捐穀之處如開封府及所屬之祥符陳留蘭陽三縣歸德府屬之商邱寧陵虞城考城柘城五縣河南府屬之偃師鞏縣孟津宜陽登封五縣禹州屬之密縣鄭州屬之滎澤滎陽河隂汜水四縣共需添建正餘倉厫五百四十八間請照原議每間給銀十五兩共應給銀八千二百二十兩俱於前項公費現存司庫銀六萬一千七百五十六兩之內動支給發建造臣等不時稽察務令上緊建造完固以資儲蓄理合奏聞謹奏好倉厫完固方於積貯有益也雍正十一年四月二十四日署理河南巡撫事務大理寺少卿臣孫國璽謹奏為恭報接運楚米過豫數目日期仰祈睿鑒事案照雍正十年十二月接准部咨撥運湖廣米十萬石赴陜備貯其經過豫省地方所需船隻并挑濬河道等項令臣㑹同湖廣督臣撫臣及陜西撫臣詳悉定議等因臣遵即㑹同酌議妥協委員上緊辦理並經奏聞在案嗣於雍正十一年四月初二日准陜西撫臣史貽直咨稱楚糧運足四萬五千石之數其餘暫行停止俟七八月間再為酌運等因又經咨明楚省撫臣并轉飭委員遵照在案兹據文武各委員具報自三月初四日接運過第一運頭幫船起至三月二十二日第一運六幫船止共米二萬二千五百石均各交送出境訖又於四月初一日接運過第二運頭幫船起至四月初十日第二運三幫船止共米一萬二千石均各交送出境訖通共接運過米三萬四千五百石現在文武員辨協同催趲源源接運陜省所需米四萬五千石之數指日即可運足除俟運齊另行具奏外所有接運過楚米數目日期理合先行奏聞以慰聖懷謹奏接運迅速甚好雍正十一年七月初九日河東總督臣王士俊署理河南巡撫事務左副都御史臣孫國璽謹奏為據實奏聞仰祈睿鑒事竊照南陽府署泌陽縣知縣顧師仁因前署遂平縣任內雍正八年分未銷鹽引八分以上部議革職奉旨依議欽此准兩淮鹽政臣高斌移咨到臣當經轉飭遵照離任去後兹據布按二司㑹詳據知府程秉禮詳稱該員操守廉潔居官勤慎年力精壯辦事明敏洵屬難得之員請仍留泌陽試用臣等㑹查得顧師仁先因署遂平縣任內濫應革職知縣孟光國車輛口糧一案部議降一級調用奉旨顧師仁著詢問該撫如係才具可用之員著奏聞仍留本省酌量委用欽此又因署遂平縣任內雍正四年分未銷鹽引一案部議革職奉旨顧師仁前因濫應車輛巳降諭旨將伊居官如何之處詢問該撫此案俟回奏到日一併降旨欽此經前督臣田文鏡以該員才具明敏實心任事具奏奉有諭旨仍留豫省酌量委用欽遵在案今又因遂平任內雍正八年分鹽引未銷革職據司府各官詳請具題留用臣等查顧師仁年力富強辦事勤敏今以未銷鹽引革職尚屬因公罣誤臣等為地方得人起見理合據實奏聞倘䝉皇上格外天恩將顧師仁仍留泌陽試用則該員感激皇仁自必倍加奮勵以圖報效伏祈睿鑒謹奏有旨諭部矣雍正十一年九月十三日暫署蘇州巡撫印務左副都御史臣孫國璽謹奏為恭謝天恩事竊臣奉命暫行署理蘇州巡撫印務於雍正十一年九月初九日至駐劄衙門望闕叩頭謝恩開印視事訖伏念臣質本庸愚知識短淺厯䝉皇上天恩不次擢用毫無報效悚惕日深兹又欽奉恩旨暫行署理蘇州巡撫印務伏念江蘇地方幅員遼濶事務繁劇臣何人斯仰䝉聖恩高厚復膺封疆重任撫躬自問尤切悚惶臣惟有將地方吏治民生事宜逐一確加咨訪次第辦理務期勉竭駑駘實心實力恪供厥職以期仰報洪恩於萬一所有臣感激下忱理合具摺恭謝天恩謹奏江蘇繁劇料汝實弗勝任前因喬世臣之去留未定故命暫理數時今已確知喬世臣不及不令旋任矣另旨命高其倬前來攝署即日可到汝交代後來京候朕徐加訓誨硃批諭旨卷一百三十七
