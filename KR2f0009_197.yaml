body:
  text: 欽定四庫全書硃批諭㫖巻一百九十七硃批方覲奏摺雍正七年七月二十五日浙江按察使臣方覲謹奏為恭謝天恩事臣蒙皇上擢用浙江按察使莅任以來恪遵聖諭勤謹辦理猶恐才識疎庸未嫺法律多有錯誤時切冰兢兹布政使髙斌調任江蘇所有浙江任内交代之事復奉特㫖命臣暫接兼理仰荷殊恩感激難名理合繕摺恭謝天恩再督臣李衞前經題委髙斌護理鹽政印務今因髙斌離任赴蘇商之督臣轉交到臣接受護理任劇事繁彌滋悚惕惟有益加黽勉小心供職以冀仰報聖恩於萬一合併奏聞謹奏竭力勉為之毋負朕恩莫自誤一生功名事業同日又奏為敬陳地方情形仰祈聖鑒事臣奉命莅浙經今六月地方情形悉心體訪向時風俗淳澆不一惟杭嘉湖紹金五府及寧波之慈谿奉化温州之瑞安台州之天台仙居衢州之龍游人多刁健尤為難治數年來仰蒙皇上聖教鴻敷恩施疊沛紳衿百姓咸知感悟豪强歛跡姦匪濳蹤舊染積習日漸廓清是以上召休和雨暘時若蠶麥豐收秋成在望湖面海洋悉皆寧謐自春及今據報盜刦止有三案臣惟恐地方官有勒抑諱匿之弊統令各據原詞申報嚴緝夥盜質審分别定擬其穿窬小竊時飭地方官嚴查保甲比捕緝拏至團練鄉勇自相捍衞即古者寓兵於農之法但律嚴私蓄軍器例禁教習拳棒原以杜民滋事綏靖地方若假以選練之名濟以格鬭之具誠恐好勇鬭狠之徒或致藉生事端似宜概行停止各屬有司官員偶有敗檢即掛彈章是以人知警畏循謹奉公但肆應長才尚屬難得臣愚以為也臣不揣愚昧仰陳聖鑒不勝悚惕之至謹奏嘉悦覽焉凡事講求至當而行毋令過偏次第料理徐徐不間日久自然就緒也所奏窩盜處分一摺現發九卿議奏另頒諭㫖雍正七年閏七月十八日浙江按察使臣方覲謹奏為敬陳鹽政仰祈聖鑒事竊臣接護鹽政通查杭紹嘉松四所去歲新鹽過掣之時存倉舊鹽不過十萬引今歲竟存至二十萬引似此積漸不巳必致仍前壅滯查雍正六年督臣李衞與兩江督臣范時繹等㑹議鹽政一疏曾經聲明貧難小民負鹽四十斤但許其於不銷官引地方照數易米度日如在銷引地方公然買賣仍同私鹽一體查拏部議題准在案今兩淮產鹽之地如通泰等處附近場竈原未設有官引民間皆食竈鹽應許照數買賣至於上江湖廣江西河南行銷鹽引之地則顆粒不准私售江都亦屬銷引地方何可概行負鹽四十斤之例轉滋縱漏況兩浙之松江杭州寧紹温台逼枕海隅凡行銷引地即係產鹽之所倘許負鹽四十斤老少婦女何室蔑有皆得藉稱貧難家出數人日運數次則徧地皆是私鹽何處更銷官引在浙省地方係臣所屬自當竭力整頓江南各府未免勢隔情暌仰懇聖恩敕令江省督撫提鎮嚴飭各屬文武員弁凡商店銷引之處遇有私鹽不論數目多寡立時拏究但其間有一二鄉愚偶然販賣竝無夥黨而鹽數又不滿三十斤者請從寛免罪以廣皇仁至於貧難小民督臣李衞先經行令毎縣查報四五十名給與木籌赴官店買鹽挑賣應令再行確查凡係鰥寡孤獨疲癃殘疾實在貧難小民又無孤貧口糧者造册給籌毎日許赴官店買鹽二十斤毎斤照時價減一釐給與店票按日迴銷俾得覓利養生用副聖主軫恤窮黎之至意如有府縣官沽名市恩縱私不緝致虧引課者著落照數分賠庻幾官引不致壅滯而國課自無虧缺矣緣臣現護鹽政謹陳末議仰祈聖鑒謹奏所奏嘉悦覽之候朕再加斟酌有㫖雍正七年十二月初二日浙江按察使今陞西安布政使臣方覲謹奏為恭謝天恩事竊准督臣李衞行知准吏部咨開雍正七年十一月初三日内閣奉上諭陜西西安布政使員缺著浙江按察使方覲補授欽此相應知照到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣以一介庸材屢蒙皇上簡拔任用超擢按察使寸長未效時切冰兢乃未及一載復荷天恩授臣今職理財字民承流宣化責任綦重報稱逾難聞命之下感激交深罔知所措惟有矢竭心力益加黽勉恪供厥職冀以仰報髙厚於萬一為此繕摺恭謝天恩謹奏竭力自勉莫負朕知遇之恩諸凡以不欺隱為最要於此尤當加勉雍正八年二月初六日陜西布政使臣方覲謹奏為瀝陳微臣患病情形仰祈聖鑒事竊臣體質羸弱素有痰喘之證毎冬一發旋亦平復至上年十月望後舉發尤甚乃於十一月初三日奉㫖授臣西安布政使十一月二十五日部文行知到浙臣聞命自天懽欣感激㒺知所措隨具摺奏謝即請督臣李衞委署以便赴任於本年正月十七日奉督臣行文令將印務交杭州府知府喬世臣護理臣隨於十八日交印卸事二十一日登舟北發不意途次病勢轉劇甚難支持二十八日舟抵揚州輿疾至家延醫調治一面僱覓頭口隨於本月初三日長行初四日至六合縣氣虛喘急甚天恩即暫駐六合延醫服藥俟病勢平復即便星速前往理合繕摺奏聞伏乞聖鑒謹奏西安布政缺另用人矣汝回家加意調攝候遣御醫前來看視痊愈後摺奏朕知同日又奏為奏聞事臣蒙皇上擢用西安布政使兩浙鹽商以臣曾護鹽政循照舊規公議送銀二千兩以為長途之費臣通行力阻瀕行之際衆商仍送盤費銀一千兩臣堅拒不受督臣李衞以臣護理鹽政三月將雍正七年鹽政衙門飬廉銀兩按季撥給臣一千二百兩臣亦再四辭讓李衞云此係奏明恩賞之項既經護印理無可辭臣因不敢固却現今長途盤費醫藥取給敷裕皆出自皇上天髙地厚之恩也理合具摺奏明謹奏此係當領受者何必過辭凡似此矯廉以自髙之舉朕所不取也誌之同日又奏為恭謝天恩事臣前接臣胞兄方鴻家信知臣兄蒙皇上特授河南襄城縣知縣聞命自天感激無地伏念臣疊荷天恩有加無已莫可報稱正切悚惕復蒙皇上恩及臣兄由教職微員擢授縣令破格録用榮寵逾涯臣隨信囑臣兄殫心竭力勉供厥職務於地方力行實政以仰報皇上天髙地厚之殊恩所有頂戴微忱理合繕摺奏謝伏祈聖鑒謹奏汝兄具有心胸料必不肯辜負朕恩也硃批諭㫖巻一百九十七
