body:
  text: 欽定四庫全書硃批諭㫖卷二百九上硃批楊永斌奏摺雍正八年二月二十四日湖南布政使臣楊永斌謹奏為恭謝天恩敬請聖訓事竊臣天末庸才至微極陋由順天府大城縣罣誤知縣欽奉皇上特恩賞給官職效力行走數年之間洊加拔擢至膺郡符旋升貴東道兹復荷逾格天恩授以湖南藩司重任自顧何人膺斯異數惟有勉奮駑駘以仰答聖主高厚於萬一伏查湖南民缺厰礦苗疆三事皆為應辦緊要之件臣到任後訪聞民缺項內多有侵蝕包攬諸弊現在詳明督撫將積缺最多者委員清查其餘交於地方官清查倣照督臣邁柱清查沔陽州之法分别官吏侵蝕紳襟包攬與實缺在民三項減其火耗立限催輸並出示曉諭如有自首侵蝕者酌量從寬責令分限通完臣不時稽察委員毋令紛擾地方至厰礦苗疆二事臣在貴州跟隨雲貴廣西督臣鄂爾泰辦理稍知規模昨督臣鄂爾泰由廣西回黔道經長沙臣將厰務苗疆事宜備細禀商復䝉指示臣已將應行辦理之法禀請督撫轉為奏主恩下供職守臣更有請者臣自雍正三年補授貴州威寧府知府五載以來未獲一覲天顔犬馬依戀之忱時切於中今臣查受藩庫交代事畢可否容臣輕騎赴京瞻仰聖顔跪請訓㫖伏候聖裁俞允施行謹奏爾甫經接任受事正在整理之際何必徒為無益之往來即使來京見朕面加訓誨者亦不過殫心實力循分盡職黽勉效法鄂爾泰事事不欺不隱此數語而已遵㫖勉力為之可也雍正九年五月十二日調補廣東布政使臣楊永斌謹奏為恭謝天恩敬請聖訓事雍正九年四月二十三日䝉湖廣督臣邁柱湖南撫臣趙𢎞恩牌開准部咨雍正九年四月初一日內閣奉上諭湖北巡撫員缺著廣東布政使王士俊補授廣東布政使員缺著湖南布政使楊永斌調補王士俊久任粵東於地方事務甚為熟練楊永斌到粵王士俊一一交代講論眀白再赴湖北之任等因欽此欽遵轉行到臣隨恭設香案望闕叩首謝恩外伏念臣一介微陋䝉皇上特恩拔擢授以楚藩重任雖捐糜頂踵未足仰報高深正在隨同撫臣趙𢎞恩於地方一切事務勉力整理今復荷隆恩調任粵東聞命自天感激無地現在一面將湖南藩庫錢糧事宜逐一清交新任藩司張璨接受聽候撫臣盤查題報臣即起程星赴粵東新任但海疆重地一切治理較之湖南更為繁要藩司一官任大責重臣材質疏庸克副實難伏懇皇上恩賜訓誨庶臣知所遵循得以上報主恩下供職守免致隕越為此繕摺恭謝天恩敬請聖訓謹奏王士俊久任廣東於吏治民情甚為熟練即命伊巡撫粵省豈不駕輕就熟但粵省向來各立門户文武不和而文武之中又各互相黨庇此風因楊文乾方願瑛二人而起方願瑛實罪不容誅其黨甚固如觸其藩籬必百計報復而後已斯乃汝所當知而加愼者王士俊亦被習氣所染不能超然出類若命撫粵豈特無益在伊自多牽制掣肘朕所以用為湖北巡撫也汝今往蒞粵藩當思革化頽俗時自檢察愼勿被所誘惑至於民情較之湖南尚易為治然邊海巖疆盜風甚熾率多嗜利輕生必須大費一番心神方收成效能事事效法鄂爾泰之居心精勤不懈何務不克整理勉之莫負朕委任之恩若開礦一事粵東斷不可行惟以嚴禁為是非可將順民情者王士俊日前奏請開採經朕再四諭止未知曾向汝道及否此數節係粵省緊要大端皆朕素所洞悉先以諭汝其餘地方機宜遇汝摺奏之便隨時逐事自當一一指示也方願瑛大姦大詐沽取虛名阻撓實政至今仍有為其稱寃之人汝當知之凡為稱寃者即係黨友須加體察朕豈枉誅方願瑛之主耶朕於方願瑛從未識面何嫌何怨之有此種情形朕御極已歷九載其中隱微實能了悉無疑汝將此諭密之親友間概不宜言惟令巡撫鄂彌達知之汝二人同心協力整理可也亦轉囑鄂彌達加愼加密毋致泄露一人為此再諭雍正九年十月二十五日廣東布政使臣楊永斌謹奏為恭繳硃批奏摺事竊臣以庸陋凡材荷䝉聖恩調補粵東藩司海疆要地罔識遵循隨即具摺恭請聖訓於七月二十七日家人齎回臣望闕叩首跪讀硃諭天語煌煌訓勉諄至感激蟻忱中心震悚欽遵諭㫖密與撫臣鄂彌達看訖臣查粵東地方向因楊文乾方願瑛抵牾以致各立黨援文武不和而文武中又相互異方願瑛實罪不容誅幸䝉皇上睿照如神將方願瑛下獄究治今臣到任後時時省察竝未有為方願瑛言寃之人又再四密訪方願瑛之黨實已渙散至於通省文武臣悉本至誠相待宣布皇上和衷聖諭共相勉勵各員見臣開誠體公亦各傾心現在情形較之從前實覺改觀若再加調劑自可革化頽俗也再查粵東瀕海之區向來劫竊頻聞近日較前稍息惟韶州府屬乳源曲江等縣之栁坑猺人素為盜藪現今議於栁坑山埸設汛彈壓俾防守整嚴盜蹤自杜也又開採一事臣向在湖南時即聞粵東厰礦甚多而難於開採昨至粵東曾向王士俊問及據云經伊具奏䝉挖私煎以靖地方謹此奏覆并繳原奉硃批一摺再粵東地方遼濶臣到任甫經兩月餘全省利弊尚未周知另容悉心查確次第陳奏合并聲眀伏祈皇上睿鑒謹奏嗣後再具奏摺差人齎至大學士張廷玉處轉奏同日又奏為請定鐡鍋出洋之禁以杜姦弊事竊照鐡器一項所關綦重不許出境貨賣律有眀禁况近有廢鐡亦可鎔製兵械本年奉有定例止許內地變賣若捆載潛出邊境及海洋者照越販硝磺之律分别治罪立法已屬周詳但臣查粵東地方因向來出産鐡鍋凡洋船貨買歷未禁止臣到任後檢查案册見雍正七八九年造報夷船出口册內每船所買鐡鍋少者自一百連至二三百連不等多者買至五百連並有至一千連者其不買鐡鍋之船十不過一二查鐡鍋一連大者二箇小者四五六箇不等每連約重二十斤若帶至千連則重二萬斤臣思此項鐡鍋名雖煮食之器其實一經鎔煉各項器械無不可為每年販出外國誠有關係以臣管見嗣後此項鐡鍋應照廢鐡之例一體嚴禁毋論漢夷船隻概不許貨賣出洋違者即照捆載廢鐡出洋之例治罪如此則外洋之鐡不致日積日多於防姦杜弊之道似有裨益是否有當伏乞皇上睿鑒謹奏此奏甚是足見留心地方庶務雍正九年十一月二十三日廣東布政使臣楊永斌謹奏為奏聞事竊臣到任後知有姦匪李梅結黨散劄事發在逃一事隨即嚴飭地方官員留心密查本年九月間經督撫二臣委令理猺同知龎嶼前往羅定一帶密同地方文武訪拏得楊士元及夥黨盤陳養陸運眀溫良賔等供出本年三月內有陳漢同吳世友廖洪受從廣西藤縣五屯所白石寨陳美倫家領有唐太祖的劄付來散給上有羅平聖號字樣及仙掌八卦圖樣每張要銀三兩六錢等語禀報到臣隨㑹同臬司禀商督撫密飭龎嶼選差設計相機誘拏去後復經撫臣鄂彌達添差辨兵前往白石寨等處協同密拏兹於本月十二日拏獲陳美倫等一千人犯押解並起有木印挖銀符書單札前來臣等隨在撫臣內署公同究訊俱各取供在案查各犯雖藉道教名色鼓惑愚民但既稱有年號又立有公田名色符劄私自封官單據結連聚黨潛謀為匪大屬不法今首犯陳美倫雖已就獲而餘黨陳漢等尚未弋獲並供出之玉龍太子以及林茂清錢珍均難寬宥業經督撫二臣密札廣西撫臣嚴行查拏勿令漏網其陳漢等亦現嚴行拏究外總俟獲到各要犯之日臣等再行公同確審聽候督撫核奪另行請㫖緣事關姦匪重情理合繕摺密封奏聞伏乞皇上睿鑒謹奏察獲姦匪甚屬可嘉員辨兵役俱當格外奬賞雍正十年四月初一日署理廣東巡撫臣楊永斌謹奏為恭謝天恩事雍正十年三月二十七日䝉廣東督臣郝玉麟撫臣鄂彌達牌開准部咨雍正十年二月十五日內閣奉上諭廣東巡撫印務著廣東布政使楊永斌署理欽此欽遵轉行到臣隨恭設香案望闕叩首謝恩外竊臣天末庸才至微極陋由罣誤知縣叨沐殊恩賞給官職數年之間洊加拔擢由湖南藩司調補粵藩重任雖捐糜頂踵未足仰報高深今復荷聖恩命臣署理廣東巡撫印務自顧何人膺此異數聞命自天感激無地伏念巡撫表率全省封疆任大責重臣受恩愈深圖報愈難惟有刻自兢惕誓矢公忠實心任事以答主知以報高厚於萬一耳臣再有請者臣自雍正三年補授威寧府知府引見以後歷今八載犬馬依戀之忱時切於中今又䝉主恩畀以重任自維才質疏庸恐難克副惟恭請聖訓指示庶得知所遵循伏乞皇上容臣輕騎赴闕瞻仰聖顔跪聆訓㫖所有微臣感激蟻悃除俟接印後恭疏具題外謹先繕摺專差家人恭齎赴京交大學士張廷玉轉奏恭謝天恩敬請陛見伏乞睿鑒俞允施行謹奏覽奏謝知道了勉之莫負朕知遇之恩地方緊要豈可遠離陛見之行兹且不必汝既署理撫任此後奏摺徑自齎進毋庸交大學士轉呈矣同日又奏為奏聞事竊粵東正二三月晴少雨多臣恐有礙東作不時留心體察據各屬回報竝訪諸近城農民僉謂粵東山海之區每遇春來雖多雨水然易於消退非西潦泛漲可比各屬圍基安穩間有高處所種之麥亦已收割目下春夏之交天氣晴眀正在栽插不足為慮等語臣即飭經管水利各員多備樁木土方督率墟長業户預防西潦外查現今米價較之上冬略為增長每石六七錢至一兩零不等臣以省㑹人煙稠密需食甚繁隨諭南番兩縣各將糶三倉穀減價發賣以平市價臣又慮四五月內正值青黃不接之時兼因奉准福建督臣及南澳鎮臣咨移各差員辨商販赴粵採買必致價益騰貴臣即商之撫臣動支關稅羡銀一萬兩委員赴粵西採買米穀旋據委員報稱粵西米穀價值亦與粵東相等臣又再四體訪聞本省茂名電白陽江各縣出産米穀緣地方偏僻少有客商搬運以故價值頗賤於前項關稅羡內動支五千兩分發各地方官據報已照時價買全但係經由海運必須風信順便四月中旬可以運到臣思有此米穀既可以聽閩澳之採買亦可以平本省之市價不虞民食維艱也本年二月內欽奉諭㫖因京師自上冬以及今春未得雨雪令大學士九卿等恪愼齊戒至誠祈禱殫職奉公至於該省督撫等各自敬謹修省先事圖維倘二麥歉收必有思患預防之䇿不使黎民有乏食之虞等因欽此臣查粵東地勢低窪種麥無幾已經收竣其早晚二稻依時蒔插目前雨暘時若將來定獲豐登兼粵東通省常平倉貯一百九十二萬石之多社倉穀一十五萬石有零臣自當先事預防殫力䇿畫上副聖心下利民生也誠恐有厪聖懷理合恭摺奏聞謹奏據奏業已採買米穀可以預防不虞朕懷深慰雍正十年五月二十七日署理廣東巡撫臣楊永斌謹奏為恭請聖裁事竊照粵東一省在在海洋水師官兵巡哨全憑戰船堅固而戰船又賴碇纜維繫是碇纜實為一船根本所關綦重聞浙省戰船每隻設碇三門一遇洋中風浪驟發三門竝拋船藉安穩至於纜索藤纜易於脆裂不若棕纜之綿固可經牽扯粵省外海繒艍拖風各船有設碇三門者亦有止設兩門者其纜索有用棕者亦有用藤者臣於布政司任內䝉督臣郝玉麟飭令查議各船應否添碇一門及改換棕纜有無利益船隻經臣移詢各鎮協營去後嗣俱准覆稱添碇一門並改換棕纜則官兵船隻藉保安穩裨益實非淺鮮等語異口同聲移覆前來臣隨核算通省約共需工料銀六千兩有零正在議詳間而督臣郝玉麟奉㫖調任閩省未及議請題奏臣思碇纜為戰船安危所繫官兵身命所關既有見知何敢壅於上聞可否准於各船修造之年將向來設碇二門者再添設一門及將藤纜改換棕纜以利舟師仍歸案估報題銷伏乞皇上睿裁施行謹奏所奏甚是已交該部議行矣同日又奏為奏聞事竊查粵東今歲春夏之交天氣晴眀民間依時栽插圍基穩固經臣奏聞在案自四月以來晴多雨少五月初五日後晴雨相半各屬圍基安穩無事目下禾苗茂秀將來定獲豐收惟因青黃不接之際米價比前略增自七八錢至一兩零不等省㑹人煙稠密日食頗繁幸前日所動關稅羡銀五千兩於電白茂名陽江各縣採買穀石已運到省現在陸續平糶價銀隨即歸項又有南番二縣平糶倉穀及西省穀船接濟民食無缺再閩省臺灣土番滋事聞已就縳恐有餘孽逃竄查南臺地方與潮州府之澄海等處頗為切近臣已密囑文武各員加意密防稽察毋得滋擾居民地方相安無事臣恐有厪聖懷理合一並奏聞謹奏覽奏禾苗茂秀民食無缺朕顧念粵東之懷釋矣同日又奏為恭繳硃批敬請聖鑒事竊臣前於藩司任內恭繳硃批並奏粵東礦厰宜嚴加封禁一摺欽奉硃批總之為粵東地方多盜且米穀又非雲貴粵西價平省分可比所以不得不嚴禁開採當以此意曉喻之假若粵東民風丕變人人皆知力田務本米穀充裕價值亦如數省平減時聽其開採何須禁止也欽此臣查粵東不乏可墾之土因民間不勤稼穡以致米穀不能如雲貴粵西等數省之平易臣仰體皇上重農至意督飭屬員勸導粵民務勤耕作盡力開墾其高亢之區不宜禾稻者則令樹藝豆麥亦可以資食用至附城陸地及山麓偏坡雖不能播種糧食尚可栽植樹木今俱閒棄實為可惜臣令番禺縣買桐樹試種於土性頗為相宜已經成活臣現在購買桐子令地方官倡率指畫勸民栽種可以獲利别項木植隨地土之宜聽民酌種禁飭兵民踐伐其可種糧食之地仍飭不得棄本逐末並將從前欽奉皇上勸民務本力農及栽種木植歷次諭㫖敬謹刋刻分發州縣散給里民務令家喻户曉力勤耕植以收地利以謀衣食不得坐待饑寒迫身流入匪類再查惠潮兩府户口較繁他郡人民不務本業為尤甚從前趨利之徒多於各處礦山私挖甚至叢聚為匪近因稽查嚴密雖已渙散但必俾有恆業庶得永無滋事兹因大官田新設縣治委員丈荒給墾惠潮無業之民紛紛投至臣會商署督臣鄂彌達悉令墾户招為佃民又墾户分墾之外餘剩二十頃臣首先倡率同司道公捐資本分給前項無業之民墾種諭令各安耕作毋再甘蹈法網將來似可不致竊挖滋事此外各屬俱現無礦徒臣仍加意稽察不敢少懈其前項田畝將來成熟每歲可收官租千餘石查省城向有粵秀書院現為義學教習生童請歸入作為膏火之資事屬兩益至粵東士子文藝庸陋品行卑汚且不諳官音雖前經欽奉諭㫖著地方官訓導又雍正六年定例諭令有力之家先於鄰省延請官音讀書之師教其子弟轉相授受以八年為限如不能官話者生童舉監暫停送試俟官話習㑹之時再各准其應試奉㫖依議欽遵在案但粵人皆狃於積習歷今四年仍未能漸移臣擬將粵秀書院捐資修葺倣照大學士鄂爾泰前任雲貴總督時在昆眀書院教士之法將學臣歲科兩試所取優等生員品行端方者每學撥二三名赴書院肄業在於鄰省延請老成篤行之士為之教習砥行課文每月臣與督臣各課試一次加以訓勉俾知立身行己尊君親上之義每人月給膏火之資於前項官租內取給科舉之後散歸本籍另將新學臣歲科所取者照前撥入肄業如此合一省之優生訓誨造就三年之間文行既得以交修官音亦易於學習及至散歸本籍復可轉相授受陋劣者亦可知所勸勉矣但臣庸淺之見所辦各務未知是否有當伏乞皇上俯賜訓誨所有原奉硃批理合恭繳謹奏所辦各務皆屬是當嘉悅覽焉勉之雍正十年七月初十日署理廣東巡撫臣楊永斌謹奏為恭報早禾收成分數仰祈聖鑒事竊查粵東早禾閏五月內正當結實之時雨水勻足穀粒飽滿有至五六穗七八穗不等者逮六月初旬刈穫已遍民情歡悅咸慶盈寧據署布政司黃文煒將各屬收成分數彚報前來查各府州屬早禾分數自十分九分以及七八分不等現在米價每倉石自五錢四五分起至八錢一二分不等六月十五日以後雨水調勻晚禾栽插已遍俱皆茂盛地方寧謐民樂豐登所有各屬早禾收成細數臣謹另摺分晰恭呈睿鑒為此謹奏覽粵東早禾收成分數曷勝欣慰之至同日又奏為奏眀遵㫖驗看量材題補官員事竊臣荷䝉聖恩簡署撫篆准署督臣鄂彌達密交鈔録大學士張廷玉蔣廷錫寄信一摺內開字寄廣東督撫雍正九年十二月初一日奉㫖據焦祈年奏稱番禺縣茭塘司巡檢李藻才力强幹查緝姦匪不遺餘力經督臣題升縣丞因格於部議仍留該司供職又惠來縣葵潭司巡檢黃繩中才具敏練殫力查緝此二人實係才識兼優實心效力之能員等語爾等可寄信於廣東督撫將李藻黃繩中確加驗看如果可用著該督撫量材題補欽此遵㫖寄信前來等因鈔録轉交到臣臣隨㑹同署督臣將李藻黃繩中確加驗看查黃繩中才具敏練緝捕勤謹實係雜職中卓越之員能勝縣任今揭陽縣現在出缺恭懇聖恩即以黃繩中升授實為人地相宜又查李藻才力强幹捕盜有方前經調任督臣郝玉麟題補番禺縣丞格於部議隨另選東莞縣縣丞王守創調補在案但查番禺縣縣丞駐劄南村地方為沙灣茭塘兩司交界適中要地實係濵海盜藪必得强幹之員方克勝任王守創雖辦事維勤而隨機緝捕非其所長李藻前署番禺縣丞盡心查緝地方寧謐頗為有效如䝉聖恩仍准以李藻補授番禺縣丞以王守創補授現出之歸善縣縣丞缺實為人地相宜於緝捕盜賊甚有裨益臣與署督臣意見相合除將黃繩中李藻另疏㑹題外所有臣等遵㫖驗看量材題補緣由相應㑹同署督臣鄂彌達恭摺奏眀伏乞皇上睿鑒謹奏覽奏知道了具題到日有㫖同日又奏為奏請聖裁事竊查粵東一省徵收民屯糧米支應本省兵食內有解省解營水陸程途俱需腳費又交倉盤運不無折耗因從前未經議定耗米數目各屬濫行加徵多寡不一其地處衝繁之州縣多浮徵耗米以凑應地方公務之費而里户輸納亦有産同賦異之懸殊經前署撫臣傅泰檄飭司道㑹議畫一飭遵去後嗣據前藩司王士俊糧驛道陶正中詳稱約計通省支解米糧需費數目均勻畫一加耗議以每額米一石准加收耗米一斗六升內除鼠耗三升並遞年修補厫座墊笪等項需費米三升外尚餘耗米一斗作為運腳之費足敷通省辦解公用計粵東通省除番禺東莞等三十四州縣衛所額徵屯糧皆有屯耗報出已於遵㫖議奏事案內報部不加耗米外尚有通省民屯本色米二十五萬三千一百七十八石零共應徵收加一腳費米二萬五千三百一十七石八斗零又徵民屯折價米二萬八百九石零共應徵收折價耗銀一千八百八十三兩零內除通省各屬共應支腳費米一萬二千九百五十六石腳費銀一百五十四兩零又扣解通省各屯應徵演炮火藥銀二百兩外尚剩餘米一萬二千三百六十一石零餘銀一千五百二十八兩零再從前衝繁州縣多浮收耗米以凑應地方公務今既畫一加徵此外顆粒不許浮收未免較前拮据若將此存剩之米准其量留數百石以公濟公似亦妥便所有衝繁之南海番禺三水高要四縣應請量留米六百石其次衝繁之曲江保昌英德清遠四縣應請量留米五百石其餘銀米悉令起解司庫以充通省公用等因經前撫臣鄂彌達批允飭遵在案嗣因惠州府屬之歸善縣地方衝要差使繁多請援照保昌等縣之例酌留耗米五百石以應公務又通省各縣驛流徒人犯因日食不給往往沿鄉乞食乘間脫逃經司道議詳於前項餘剩耗米內每名日給口糧七合約計每歲需米千石有零亦俱經前撫臣鄂彌達批准在案兹復據署布政司黃文煒糧驛道陶正中據廣南等各府詳據所屬各州縣詳稱或道府同城公務殷繁或地當孔道差犯絡繹一切夫役口糧舟車扛轎等項向無額設經費從前州縣往往派之里户供應今私派禁革懇請倣照南番等縣之例分别酌留耗米以供支應等情據該司道覆核分别地方衝繁稍簡議詳前來查據開各州縣衛應留米石連前詳准南畨等九縣酌留之米及分給流徒口糧通省實需耗米一萬二千三百二十九石九斗尚剩耗米三十二石零又興寧縣請添支前議不敷運費銀八十三兩零尚餘耗銀一千四百四十四兩零俱請遞年照解司庫以充公用等因具詳到臣等臣等伏思此項米石原係腳費餘剩今照該司道議詳量給各屬以應公務則官無墊應之艱民無派纍之苦官民咸沐皇仁浩蕩於靡既矣但洪恩出自聖主非臣等所敢擅便臣謹㑹同署督臣鄂彌達恭摺具奏伏乞聖裁謹奏耗米一項乃汝等督撫酌量辦理之事如應咨眀該部咨部存案可也雍正十年九月初十日署理廣東巡撫臣楊永斌謹奏為奏聞事竊粵東自入夏以來晴雨調勻早禾豐收業經臣具奏在案自七月後至八月底雨暘愈加順時晚禾更為茂盛兹據各屬將穀穗送驗前來穎實堅好飽滿光潔間有一莖至二十餘穗不等者此皆由我皇上敬天勤民重農務本故能致此休徵臣等覽閲之下不勝歡忭除通省收成分數現在另行查眀彚摺奏報外所有晚禾茂實及雨暘情形合先繕摺奏聞伏乞皇上睿鑒謹奏此皆卿等忠誠任事有以上感天和之所致於朕無涉地方督撫之賢不肖實招上天災祥之應其速如響然卿等之臧否即朕之臧否也豈可分析為二際斯休徵歡忭且置要當倍加寅畏期共勉之雍正十年十一月初四日廣東巡撫臣楊永斌謹奏為恭報晚禾收成分數仰祈聖鑒事竊粵東自七月以後雨暘愈加順時晚禾尤為茂盛嘉穀蕃昌萬民歡悅兹據廣東布政使甘汝來將各屬晚禾收成分數彚報前來查廣州南雄韶州惠州潮州肇慶高州雷州廉州瓊州等府羅連等州各屬晚禾收成分數自十分九分以及七八分不等各屬米價自五錢起至八錢零不等又據各屬送到瑞穀自一莖雙穗以至七穗一本自二穗以至一百二十九穗自四五尺以及長至一丈一尺不等歲登大有民慶盈寧臣謹將各屬所報晚禾收成細數另摺分晰恭呈睿鑒為此謹奏覽奏晚禾收成分數不禁以手加額也雍正十一年三月初四日廣東巡撫臣楊永斌謹奏為奏眀動項安插貧民仰祈睿鑒事竊照粵東惠潮等處生齒日繁無業貧民資生無策每偷挖礦山輕蹈法網荷䝉皇仁厪念命臣等悉心辦理安插之法業經臣等查眀鶴山新縣及近省各縣荒地諭招有力商民承墾將無業貧民招為佃户給以廬舍口糧俾令耕種樂業巳經安插者計有三千餘户復經臣等奏定本省因公罣誤人員招佃報墾開復之例現在遵行緣惠潮貧民續來就業者絡繹不絶目下鶴山境內及各興墾處所尚有未經安插無業之民應即為安頓俾無失所而有力商民與罣誤人員止可聽令隨時報墾前項貧民未能久待臣等查肇慶府屬恩平開平二縣交界地方有土名九岡坪一帶荒地約二萬五千餘畝平坦可耕以之安插貧民每一户丈給荒地二十畝令其耕種可以安插一千二百餘户緣該處水源稍遠臣等委員查估引水開塘築室授食并牛隻耔種各費分别水旱每畝約需銀七八錢不等共約需銀二萬兩查藩庫內有前署撫臣傅泰題眀於關稅羡餘銀內酌存墾耕工本銀四萬兩原係户部咨覆給借無力墾户按年扣還之項可以動支給借前項貧民俾作耕本俟墾耕成熟之日遵照部文分限三年扣還解部仍分别水旱照例起科如此則現在貧民得速就安插而荒地獲成膏腴於地利民生大有裨益矣除將動支工本銀兩各緣由咨眀户部外所有動項安插貧民情形相應㑹同督臣鄂彌達繕摺奏眀伏祈皇上睿鑒謹奏覽日前朕有所聞業經降諭矣於此奏內仍將窮民覓食他省情形隱而不露甚屬不合同日又奏為要地需員彈壓請添設同知以便吏治民生事竊照廣東省城洋商賈舶雲集而一應貨物俱在南海縣屬之佛山鎮貿易該鎮綿延十餘里煙户十餘萬五方雜處易於藏姦緣距縣治五十餘里南海省㑹附郭治理繁劇一應稽查鞭長莫及向設有五斗口司巡檢一員職分輕微不足以資彈壓臣察情形必得一大員駐劄稽查庶為嚴密應請設立同知一員駐劄佛山鎮鑄給關防專司督捕稽察一切姦匪及賭博私宰私煽鐡爐等項仍隸廣州府統轄如此則彈壓得宜稽查嚴密於地方大有禆益至該鎮既設同知無庸復需巡檢查平洲一堡煙户千餘人丁繁庶港汊多岐路通林嶽石各村莊與順德縣地方接鄰為匪類出沒之所應請將佛山巡檢移駐平洲以資巡緝洵屬得宜臣為地方緊要起見與督臣會商意見相同合先具摺請示倘䝉皇上俞允即繕疏具題臣謹㑹同督臣鄂彌達具奏伏乞皇上睿鑒謹奏照所議具疏題請同日又奏為籌畫海疆積貯仰祈睿鑒事竊照南澳地方為粵閩鎖鑰孤懸海島地隘人稠向來仰食於粵省之潮州府揭陽等縣及閩省詔安等縣但涉歷海岸風汛靡定一遇商運愆期米穀陡長兵民口食維艱緣向未設有地方官竝無倉貯米穀緩急可恃雖南澳鎮標設有營倉存貯倉穀二千石僅可接濟兵食勢難兼及商民今䝉皇上俯念海疆重鎮俞允設立粵閩海防同知彼地既有文員駐劄誠宜籌畫積貯以期裨益兵民查潮州府存倉穀五萬石有零揭陽縣存倉穀四萬二千石有零均可酌撥勻貯若於粵閩同知衙署鄰近空隙地面建造倉厫二十間即於潮州府并揭陽縣等倉各撥穀五千石運往存貯倉內該同知專司料理一遇商運愆期米價昻長一面詳報一面開倉量減市價平糶俟有米穀運到即行停止所糶價銀令該同知遣親信家人赴潮郡附近價平州縣買穀運回還倉不必拘定秋收買補所需運費於贏餘價值內銷算仍責成惠潮道盤察實於海疆地方大有裨益臣行據布政司議覆相同現在飭令估計建倉工料俟估册到日於建造粵閩同知衙署案內附疏㑹題請㫖所有臣籌畫積貯事宜謹先繕摺陳奏伏祈皇上睿鑒謹奏具題到日有㫖雍正十一年五月初八日廣東總督臣鄂彌達巡撫臣楊永斌謹奏為奏聞事竊查粵東地方本年自春徂夏仰賴皇上福庇雨暘時若高下田畝早禾十分暢茂惟南雄府城逼近大庾嶺下本年四月十八日庾嶺內蛟水陡發溪河迂折疏泄不及水勢驟湧丈餘漫及府城之南該府率同在城文武分頭救護城外近山之民悉令移就高處將低窪無山之處及水城內居民皆渡載入城安頓臣等聞報即飛委廣南韶連道馮元方等星往㑹同府縣查眀被水各户確數立即動支府庫急需銀兩厚加賑恤務令窮民得沾實惠去後兹據該道等具報十九日水勢即退歸河二十日消退如舊分頭查勘水城內外及沿河村莊保昌縣坍塌房屋一千八百一十八家傷人口七名水城城垣坍塌數處共百餘丈始興縣屬亦坍塌房屋七十七家人口無傷幸水勢驟長驟消田禾俱巳退出如舊無礙收成已將被水最甚房屋全塌之五百餘家各賑銀四兩其坍塌一半者七百餘家各賑銀三兩其不及一半者五百餘家亦各賑銀二兩俱係挨户確查宣布皇仁督同實給被水之民均沾實惠現在修蓋房屋照舊安業竝無失所等語前來除飭令將城垣估計修理並將所動銀兩俟册到核眀於藩庫公項內撥給補貯外所有該府被水情形臣等已詳慎料理可無上厪聖懷謹將緣由繕摺奏聞伏乞皇上睿鑒謹奏被水户口實力撫恤務令各得其所勿俾一人致有向隅之泣廣東巡撫臣楊永斌謹奏為奏聞事竊照潮州府饒平縣已革武舉余猊因窩賊不法斥革枷責該犯挾恨冀圖報復囑黨陳阿蘭紏合黨羽陳阿幼等㰱血結盟欲打鬧府署搶劫潮州府城東門行鋪事發被拏余猊復令陳阿蘭紏合夥犯羅謂玉陳竒和等囑其劫獄相救羅謂玉等復紏人拜把欲候余猊等審眀發回之日中途搶劫下海逃避亦被訪查拏獲經臣等先後奏聞並將一干人犯審擬具題在案惟陳阿蘭一名係兩次代紏夥黨之要犯脫逃未獲經臣等嚴飭府縣設法密拏勒限務獲去後兹據潮州府轉據海陽縣禀報於本年四月初三日據差役獲到陳阿蘭前來除飭令㑹差兵役押解來省究審具題外所有拏獲要犯緣由臣謹㑹同督臣鄂彌達繕摺奏聞伏祈皇上睿鑒謹奏要犯就獲可嘉之至官役俱當亟加奬賞示勸同日又奏為敬陳修整軍器仰祈睿鑒事竊臣自到任以來於臣標兩營兵丁每逢三八日期親督將辨勤加操練竭力整頓勸懲互用如馬兵內有弓馬生疏者降為步糧即於步兵內有漢仗技藝好者拔補馬糧其弓馬技勇精熟差委效力多次者賞給銀牌絹匹以示鼓勵遇有頭目把總缺出即行拔補以期人人奮勉現今軍容技勇較前可觀惟是軍裝器械有向來缺額未備及執用年久宜加整理者如兩營帳房共止有四十頂且巳舊爛其鑼鍋歷來未置又盔甲旗幟鳥鎗牌刀等械均需添造修理伏讀本年二月上諭內開古云兵可百年不用不可一日不備如馬匹軍裝炮火器械軍營必需之物一一皆預備於平時及有事調撥便可刻期起行不致拮据延緩令該管大臣加意整理欽此仰見我皇上慎重軍旅整飭武備之至意臣欽遵諭㫖傳同將備將臣標兩營軍裝器械確加估計核實整辦齊全需銀一千五百兩查臣標前䝉皇上恩賞生息銀六千兩自雍正七年起至雍正十年七月底所得利息除每月賞兵之外尚剩銀三千七百三十九兩除巳於敬籌各標生息銀兩案內將本銀六千兩並所剩利銀三千兩歸入一十三萬兩數內借給鹽商生息外尚存剩銀七百三十九兩又雍正十年八九兩月分鹽道衙門尚有未解利銀三百六十兩二共