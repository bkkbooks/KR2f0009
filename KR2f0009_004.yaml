body:
  text: 欽定四庫全書硃批諭旨卷四硃批楊宗仁奏摺雍正元年三月初九日湖廣總督臣楊宗仁謹奏為恭繳硃批奏摺事竊臣於雍正元年三月初二日遵旨到任隨即繕疏謝恩敬請陛見恭候俞旨所有一切應行事宜現在次第辦理臣查檢欽部案件有準兵部咨奉上諭各省督撫從前奏摺內所有欽奉聖祖仁皇帝硃批俱敬謹彚集繳進嗣後凡奉到硃批奏摺俱行奏繳亦不可抄寫存留欽此臣嗣後凡有奉到硃批自當隨即恭繳所有臣前在廣東巡撫任內歷蒙聖祖仁皇帝硃批奏摺共五件理合遵旨彚繳具摺恭進伏乞皇上睿鑒謹奏全楚地方疊遭滿丕張連登王之樞等朘削苛虐元氣大傷向非賴我皇考六十年培養之深恩厚澤有以淪肌浹髓則至今日更為不可問矣朕雖未識爾靣爾之操履志趣居官聲名早巳洞鑒所以急用爾總制其地為朕治理今蒞任伊始正在振刷一切不必來京湖南湖北兩省屬員內察有貪婪酷劣及老病無能向來茍且姑留之輩盡數紏參追賠虧空以清補錢糧如遇有為有守賢能之員即行越格保題以示奬勵如此則官吏勸而民心悅地方有不改觀者乎其守令中或有人地不相宜者因材器使更繁調簡原屬善舉徑具密摺奏請朕即飭部準行至於督撫標下兵辨率多忽略不以為事覽爾前奏皇考摺內整頓標兵之議朕深為嘉悅可轉諭兩撫共相加意訓練毋似仍前怠弛再地方有司革職留任設法賠補之説萬不可行何則此輩身家已若漏巵不取於民將從何出又捐助一事尤為朕所不悅審為當用公務自應動發正項錢糧若些小彌縫之事則又何必奏聞乃不肖督撫動稱捐助千萬兩因而勒派州縣倍取於民復於中取利焉由此以至拖欠正賦虧缺倉庫弊無底止究其實所捐之項仍出於國家錢糧此等名實相違有害無益之事爾亟竭力為朕革除爾之屬員內文自兩司武自鎮協以下朕俱聼爾酌定去留爾其仰體朕信任之誠黽勉為之俟地方大有起色諸務妥協之後再請陛見未為晚也且梓宫大事巳過即使爾來亦不及盡禮惟宜殫心竭慮料理封疆以無忝厥職仰報皇考向日知遇之恩可也賜來皇考所遺御用衣物爾其敬領毋忽雍正元年四月初五日湖廣總督臣楊宗仁謹奏恭請皇上聖安朕安爾雖到任未久所奏所行數事深合朕意甚屬可嘉如此可謂名實相符無愧封疆大吏也爾今兼統文武特賜孔雀翎以彰爾之優能同日又奏為遵旨議奏事雍正元年三月十五日巡撫臣納齊喀齎到禮科掌印給事中繆沅奏摺宣傳上諭交臣與納齊喀查議具奏欽此竊照科臣繆沅昔年視學三楚經歷兩湖各郡特具條議入告似有成見但臣等細查鎮筸各苗素稱狡黠從前常有掠捉勒贖之事自康熙四十二年蒙聖祖特遣吏部尚書臣席爾逹等剿撫兼施凶苗各知畏威懷德嗣經督臣鄂海奏稱各苗歸順之後頑梗漸消等因在案臣等當更加意撫綏以期潛移默化俾革靣革心不復生事至於土司原係荒服非內地可比父子承襲相沿巳久或與鄰司挾隙穴鬬均在萬山洞寨之中若議令分襲諸子竊恐日後不無強弱兼併欺凌之慮柔逺安邊總在聖明照鑒再查鄖陽一府居楚地西南界連秦蜀明季因流冦竊發設兵防禦遂成重鎮本朝因吳逆變亂亦曾設提督在彼彈壓策應一經平定即奉裁撤今該府所屬六縣共有副將遊擊都司守備千把三十餘員制兵二千六百餘名分地防守巳為嚴密且鎮臣駐劄榖城距鄖陽僅三百餘里足資策應至於襄陽乃五方雜處之地亟須道員彈壓現今鎮道分駐控制兩府似未便移動紛更緣係奉旨令臣等查議事理謹就淺陋之見合詞繕摺具奏伏乞皇上睿裁謹奏覽奏朕甚嘉悅此事朕原不深悉適因繆沅條陳發爾查議今爾逐欵分晰甚明但奏內有若令分襲諸子恐日後不無兼併欺凌之慮等語於此爾當再加思維從來統馭外藩以衆建諸侯而分其勢為善策一時陡然舉行彼中頭目自必不願遵依茍可緩緩設法諭令聼從逐漸分襲似亦潛移默化安邊之一道其強弱欺凌之虞何必為之逺慮耶朕謂其勢既分心即離異日後縱欲鴟張其中必互相掣肘或畏懼相誡則其邪謀自息矣於我內地頗覺有益朕偶然見及於此非欲必行其事爾等切勿勉強遵承以求符朕旨為念當徐徐斟酌詳議具奏可也雍正元年四月二十日湖廣總督臣楊宗仁謹奏為奏聞事本年四月初七日接準部咨奉旨楊宗仁不必來京陛見該部知道欽此臣未能即遂瞻天仰以臣將節禮陋規一槩嚴行禁革不許文員有私商人借長鹽價均在百姓身上盤剝即如總督衙門鹽規漸次加至四萬所以從前一錢一包之鹽今則公然昻貴至一錢五六分不等臣不得不溯商販往來俾米價漸平與力行保甲稽察匪類等件事事宣揚聖主洪恩力圖興行教化凡此皆臣職分應行之事不敢一一瑣陳為此繕摺奏聞謹奏覽爾所奏朕實嘉悅在他人朕猶聼其言而觀其行至於爾朕則信而不疑斯乃全楚地方否極泰來之機也密之亟加懋勉一切興舉毋遺餘力朕生平誓不負人爾其知之同日又奏為奏聞事竊照今嵗湖廣自入春以來雨水調勻禾苗現在蒔插二麥收成兩省各府屬均有七八分不等武漢二府米價每石七錢八分黃安荆襄鄖德六府米價每石自六錢五分至七八九錢有零長沙米價每石七錢五分衡永寶嶽常辰六府暨郴靖二州米價每石自五錢六七分至七八九錢有零理合繕摺奏聞伏乞皇上照鑒謹奏覽奏甚為欣悅全楚地方獲蒙上蒼垂佑皆由爾等封疆大吏能布德宣化有以感召天和之所致也勉之雍正元年五月十五日湖廣總督臣楊宗仁謹奏為奏聞事竊惟量材任官乾綱握自皇上選賢與能以期敷政寧人之盛心也但臣蒞任伊始現在湖廣屬員其賢否尚未周知容訪聞確實另行具奏所有臣前任廣東時確知之員謹開列於後伏祈斷自宸𠂻隨材任用庶各官無私恩可感靡不殫心竭力以期上報皇恩倘遇緊要缺出與各該員人地相宜者臣再密摺奏請恭候皇上睿裁廣東廣州府以主同留南海縣知縣宋瑋辦事勤敏頗有幹才廣東廣州左衛守備范宗堯因委察保甲得法知其練於庶務操守亦好謹奏所奏俱悉同日又奏為奏聞事竊照俸工一項乃朝廷祿養官役之恩典豈可任意飭捐以填貪官欲壑題參在案今自雍正元年起一切官役應支俸工臣得加一耗羡內節省二分解交藩司以充一切公事之費此外絲毫不許派捐近奉部文皇上又將解部餘平一分恩賜免解則承辦公事更得有餘况節禮陋規槩行禁革則州縣易於補苴從前虧空臣所辦一切事件惟仰體皇上愛養黎元澄清吏治至意理合備將飭給俸工緣由據實奏聞伏乞睿鑒謹奏所言全是一無瑕疵勉之湖廣全省甚竒督撫布按七人貪庸一轍俱不應留於人世者朕因初登大寶不忍遽將皇考時曾任封疆之大吏即加誅戮所以姑寬其性命但若干貪冒虧項不必全著落張聖弼一人之身將來至不能完結時不過止於呈報家産盡絶而巳亦復何益所有應連坐之滿丕等參入案內令其合力賠補方是爾目今何遽為伊等籌畫補苴如果伊等閔不畏死錢糧至不能完時再為設法彌補猶不為遲也特諭譬如五人共為盜竊之事今止捉張聖弼一人追贓未免偏枯殊堪發一笑須知五人一體相連毫無可以矜原之處同日又奏為奏聞事竊臣查得從前湖廣州縣缺出每多鑽營委署上府兼攝更可恣肆彌縫況謀署有費或致虧空此中錮弊久在聖鑒之中今臣自到任後凡遇州縣缺出先儘本府同知通判署理如無同知通判或别有差遣者即令附近州縣兼攝槩不令逺涉兼理并知府代篆庶民風土俗各皆熟悉而鑽謀奔競之弊均可屏絶矣謹奏此論甚是洵為矯弊之舉同日又奏為密請聖裁事竊照湖廣漢口一鎮乃八省通衢商賈聚集之所藏汚納垢匪流最多今漢陽知縣巳據乞休此缺必得強幹之員方克勝任臣前巡撫粵東時目擊廣州左衛守備范宗堯年富力強委令編查保甲與盤緝姦宄甚為得法查該備係武進士出身熟嫻政務如蒙皇上將范宗堯改補漢陽縣知縣則漢口雖易於藏姦而所有匪類冀可默化潛消地方收得人之效矣再廣東南海縣知縣宋瑋原係四川舉人捐升主同題留在任今有湖南寶慶府知府員缺查該府地方接連苗猺必須幹員料理皇上若將宋瑋升補寶慶知府實為人地相宜為此具摺奏聞伏乞聖裁謹奏宋瑋范宗堯二員皆照爾所請敕部補授矣此後切勿踵行省省盡屬版圖在在皆需賢員何地非民何缺非要隔省題官實屬越例假若别省賢員彼之督撫不加褒奬不行薦擢者備將情節聲明密奏則可今因初次朕姑俯從爾請特諭同日又奏為涕泣陳情籲懇天聼事竊臣自去冬痛聞聖祖皇帝龍馭遐升悲號不能自巳恭遇皇上纘承鴻緒特沛恩綸升授臣湖廣總督臣即遵旨赴任不期在途忽聞臣母病故訃音公私悲戚填塞胸次復蒙皇上命臣在任守制臣惟矢竭愚誠將地方諸事盡心整頓不敢稍自怠延以期仰答天恩但庶務紛繁勞思不免近染鬱塞中隔之症非嘔吐不能通利書寫細字頭即懸暈所有密奏各摺臣不敢自寫只起草令家人代寫進呈理合據實奏明再臣現年六十三嵗血氣未衰但偶有病痛必得親人照料藥食庶可日夕辦事臣妻巳故止有一子楊文乾現任陜西榆林道臣不揣冒昧仰懇皇上天恩準令臣子楊文乾隨臣終養俾臣辦事之餘得有親子在旁照料湯藥庶病不增劇得勉竭駑駘仰報洪恩於無既也為此恭摺請旨伏乞皇上俞允微臣曷勝激切待命之至謹奏照該督楊宗仁所請準令楊文乾隨其父任終養加以按察使職銜以示朕特恩命醫官趙士英與楊宗仁來人一同乘驛前往湖廣醫治楊宗仁病愈後回京覆旨該部行文陜督著楊文乾馳驛速赴伊父任所將楊宗仁此奏并朕所降諭旨抄録交付楊文乾看明俾知情由毋致驚疑為此特諭各該衙門欽奉施行諭總督楊宗仁差來御醫趙士英係朕深知之好醫官但藥餌必須投契方能奏效毋因朕欽賜之醫止憑伊一人調治須將爾日前所服之方并染症之由詳細述明更同爾平時診視之醫生共相參酌對病投藥必有用當通神之驗其安心攝養痊愈後據實奏明以慰朕念諒爾子不日可以到楚閲朕諭部前旨應巳知悉也雍正元年五月二十二日湖廣總督臣楊宗仁謹奏為糧驛各有專司歸併勢難兼顧亟請復設驛鹽道員以専責成以免貽誤事竊照湖廣為八省水陸通衢實乃要緊繁劇之地糧道管理全省南漕支放各營及荆州旗下兵糈以及修船兑糧押運等事一嵗之中計有半年公出至於驛鹽道經管全省旱路驛遞并水道宣樓號船應付勘合火牌又有日給商販水程淮鹽到楚更有盤驗察私之責督運額銷引目此二道職守逈異各有専責查湖北驛鹽道自康熙十三年題請添設以來至五十八年巳歷四十餘年不識前督臣滿丕何故率將湖北驛鹽道題請歸併糧道其歸併之由殊不可解況每年漕糧冬兑開幫之後糧道即送船過淮既將印信帶去而通省驛務等事又不得不用印信或俟回任輔用或令預給通關均屬未便是二道各有責成勢難兼顧節省一官之經費有限而貽誤地方之公事良多臣目擊情形謹具摺奏聞伏乞皇上照鑒仍將湖北驛鹽道照舊復設各専責成以免將來舛錯推諉之慮應否具題理合請旨遵行謹奏所見甚是具題可也大凡滿丕一切措置朕意未必有一件得當一事秉公者同日又奏為恭繳御批原摺事竊臣前覆奏土司事由一摺奉有皇上硃批精詳周到邊徼情形無不上蒙睿照臣查各土司性多猜忌所以歷來止能依險逞強而不敢離穴為患今蒙諭旨議令衆建分勢此誠控制頑苗之良法也臣復再四思維此時若忽令分襲易啓削弱之疑竊查各土官於諸子姓中不能無所偏愛祗因格於嫡長世襲定例不敢分建諸子如蒙特頒恩諭準土司呈請分襲酌給印信職銜自必感激踴躍願將土地人民分給所愛以共沐國恩臣當體察情形各為分析疆界以默寓削弱之意其勢既分控馭自易誠如聖諭何必慮及其有兼併欺凌之患也就臣鄙陋之見繕摺回奏伏乞皇上乾斷施行謹奏此事朕與廷臣虛懷籌議僉云無因而舉似覺多事朕思所言有理分襲之説竟可不必雍正元年五月二十九日湖廣總督臣楊宗仁謹奏為奏請調補道員利益地方事竊照湖廣省城衝繁緊要今守道金祖誠以衰老乞休業經題報在案查該道有稽查漢鎮沿江匪類并分守武漢黃三府整飭地方之責必得精明歷練之員庶能稱職近見上荆南道殷邦翰署理藩司印務辦事謹慎年富力強志圖上進現在清查藩庫錢糧竭力革除錮弊臣閲邸抄知該道巳升廣西通省鹽法蒼梧道若蒙皇上特將該道調升武昌守道不但衝繁要地得人且藩司未清事務又可専候新任交盤而承審參案亦無瞻顧遲延之慮矣為此繕摺奏聞伏乞皇上聖裁謹奏殷邦翰乃淳親王包衣下人朕向不識其姓名御極之後聞有論伊聲名佳者亦有論伊聲名劣者臧否不一原欲調伊進京面加審定今汝既力為保薦諒必才具優長但既有譏評不可不察伊或掩其不善而著其善以來相欺亦未可知汝其留心詳加驗試如果其才可用不妨將朕諭旨宣示勉伊砥礪上進當向伊云我今將爾一力薦舉倘日後不符所薦有一毫不妥處我豈肯被爾連纍定當參劾爾斷不可辜負我此番提拔之意如此向伊諄諄言之人孰無良自當奮勉做好官矣殷邦翰免其來京引見照爾所請調補武昌守道可也特諭雍正元年六月初二日湖廣總督臣楊宗仁謹奏為奏聞事竊本年六月初一日彝陵鎮臣劉業溥陛見回任到省臣隨接見該鎮敬聞皇上聖躬嘉泰甚慰微臣犬馬戀主之忱復據鎮臣轉傳勉勵文武臣工之上諭臣謹銘刻於心務期實力奉行為此繕摺謹奏朕觀劉業溥不過尋常朴實之人而巳爾以為何如至其料理營伍及操守若何之處亦未深悉再爾奏鹽價一事極為詳備摺暫留覽具題到日有旨雍正元年六月二十七日湖廣總督臣楊宗仁謹奏為叩謝天恩恭繳御批原摺事本年六月二十三日臣齎摺家人回楚仰蒙皇上念臣犬馬微軀特遣醫官前來看視臣隨出郭迎請聖安復率各官跪聼醫官趙士英口宣皇上諭旨并領受密旨訖竊臣胸膈不舒巳將兩月因湖廣並無明理醫生臣亦不敢妄投藥餌僅自按病由考閲方書略加調劑幸而病不增劇惟常頭暈結燥至辦理一切事務精神猶覺勉強如舊也今蒙皇上殊恩特賜臣子楊文乾按察使職銜乘驛來楚賞隨臣任終養又恐臣子不知情由或致驚疑特頒諭旨並録臣摺示知聖恩曲全無微不到臣於聞命之下惟有涕泣叩頭而巳從此日荷醫官調攝胸膈者另行遵旨密奏為此具摺叩謝天恩謹奏所奏俱悉同日又奏為奏聞事本年六月初六日新任糧道郭維新到楚口傳皇上諭旨臣敬謹跪聆竊照撫臣納齊喀自三月十五日到任以來小心辦事頗礪廉隅亦無瑕疵可指如果歷久不渝洵無負皇上特簡設或改易臣即據實上聞為此具摺謹奏知道了朕簡任封疆大吏所望者無負朕知而巳果能如是復有何説乃求之而不得者也同日又奏為覆旨事本年三月初四日準兵部咨開湖廣襄陽鎮前營遊擊員缺掣著候推遊擊郭鞏於二月初六日題本初八日奉旨郭鞏依擬用著行文湖廣總督俟郭鞏到任後如行走得好著留任如不能供職即具題革退等因欽此該臣查得遊擊郭鞏據報於四月十一日到任隨行該鎮確察郭鞏行走如何並令赴臣親試去後嗣經郭鞏赴臣考驗試得人材弓馬均在中平因任管事除咨明兵部外理合具摺覆旨謹奏凡百總宜一秉至公切毋阿順朕旨稍涉依違果係朕所真知灼見之事即巳決斷處分不必訪詢於爾等矣嗣後遇朕凡有詢問惟以從公據實為期雍正元年七月初九日湖廣總督臣楊宗仁謹奏為奏請聖裁事竊照湖北糧道與驛鹽道各有専司責任不便歸併貽誤仰蒙皇上洞燭臣謹遵旨會同撫臣合詞具題外查湖廣路處通衢驛鹽道員實為緊要必須強幹廉潔者方克勝任臣前委令漢陽府知府柳國勳署理驛鹽道務頗能自礪廉隅而且留心剔弊如蒙皇上將柳國勳特授湖北鹽驛道實屬人地相宜再查漢陽一府五方雜處姦宄易藏亦得練達之員以資彈壓臣見黃州府同知郭朝祚年富力強辦事慎密勤敏如蒙皇上將郭朝祚摺奏聞伏乞睿鑒謹奏覽雍正元年七月二十五日湖廣總督臣楊宗仁謹奏為覆旨事竊臣前因武昌守道缺出密奏請旨將上荆南道殷邦翰就近調補蒙皇上特恩允臣所請伏讀諭旨備極詳明臣數月以來細察該道人才雖不超格然肯竭力除弊勉尚廉隅臣隨傳到該道宣讀聖旨即據該道叩頭奏稱臣殷邦翰係淳親王包衣下聖主不賜罷黜特準總督保薦補授守道嗣後更當發憤勉做好官仰報聖主天恩涕泣求臣轉奏微臣不敢壅於上聞再查彛陵鎮臣劉業溥自臣到任該鎮即報起程補臣復不時砥礪合并據實覆奏伏乞皇上睿鑒謹奏知道了湖廣營伍廢弛巳久亟須操練爾其毋憚勞煩留心訓飭督標撫標俱加意整頓方好雍正元年八月二十五日湖廣總督臣楊宗仁謹奏為恭請聖裁事前奉諭旨令臣保舉將備各官臣隨逐細察訪并親試人材技勇除應舉應劾並巳蒙升調懇請仍留原任者另行繕疏具題外竊照臣標中軍副將一官實屬全楚各鎮標觀瞻所繫若非才技兼優者實難勝任今新調之馬建邦未必即能赴任要缺殊難久懸再新升鄖陽協副將穆廷弼現經浙江提臣題留在浙查鄖陽界連陜西為荆襄上遊門户該副將亦係要缺又武昌參將一缺水陸汛守俱關緊要省城九門鎖鑰責任匪輕臣謹仰懇聖恩將嶽州城守營參將李登雲升補臣標中軍副將均房營參將周一德升補鄖陽協副將鎮筸中軍遊擊張自竒升補武昌城守營參將洵屬人地相宜如蒙皇上允臣所請懇將嶽州城守營參將均房營參將鎮筸鎮中軍遊擊并升補各缺命臣於將備中保題升補庶全楚各營武職靡不鼓舞奮勵爭自濯磨力圖效用於盛世矣為此繕摺恭奏伏乞皇上睿鑒謹奏朕於前月初八日將各省題到將備等員缺業俱按缺補授頗皆人地相宜今不便據爾此奏又復更易候再有缺出另摺奏請抑或俟新授該員等到任後量其材之長短於爾本省內調補俱可再爾所奏顔光旿等三人之摺留覽雍正元年九月初四日湖廣總督臣楊宗仁謹題請加增鹽價一案臣準部咨有務照原行會議具題之語查鹽臣原摺但懇每包加價一二分此內仍應減去裁革之陋規六釐今部文又有從前自二分五釐至三分之價值似與原行未合誠恐鹽臣偏袒復欲照部議以二分五釐至三分減去六釐為準所以臣先遵旨題覆以省往返會商稽延時日況商民皆係朝廷赤子無一不在聖主懷保之中所有應增鹽價伏祈欽定使商民咸知裕商便民之恩出自皇上自無不踴躍樂從頂戴髙厚於無既矣為此謹奏爾於此一事料理之處甚屬糊塗朕念鹽法有關商民重務原諭爾同鹽臣謝賜履會議具奏乃竟不遵旨會商任意妄奏何耶夫民乃朕之赤子商亦朕之民也爾身為地方大吏不思兩便商民兼籌國課置一切於膜外惟欲沽一己之虛名事至窒礙不能通行猶不悔艾日前偏見反祈朕欽定鹽價鹵莽無知莫此為甚爾試捫心自問受朕優渥之恩而如此報效王臣匪躬之節寧如是乎抑或病久智昏自不覺知耶速速遵諭與鹽臣詳議妥確具奏倘仍前偏執巳見致令膠固難行及或為粉飾文過之舉定當從重戒懲決不輕貸一全楚之兵丁宜恤也臣路經湖廣地方德安武昌漢陽嶽州長沙衡州永州皆必由之地留心體訪大抵楚兵多驕而貧而湖南為甚武辨既扣尅兵餉即不能勤於訓練任其惰慢且塘兵甚少必有虛冒之弊如洞庭湖近三百里岸塘寥寥無幾商賈多盜賊之虞似宜嚴敕提鎮足額足餉支散錢糧必文官眼同出結則兵不缺額而訓練加勤矣有人條奏營兵積弊爾其悉心剔除實力整飭雍正元年九月十五日湖廣總督臣楊宗仁謹奏為奏聞事竊照湖廣各標營將卒驕惰積習久沿因有公費空糧所以疏於訓練臣自蒞任即經察悉弊端業將一切虛冒名糧共四百五十二分徹底清出盡選精壯頂補在案臣現陸續調到各營將備考驗面加戒諭靡不頂戴由虛冒使然如武昌城守營額兵共止六百有零除看守省城九門防護庫獄送餉解犯并分發各縣防守城池外輪值塘汛原無多人臣今遵旨留心料理總視塘汛之衝僻險要斟酌增添䇿應保固地方仍不時訪察密令文官於散餉之際留心稽察出結嚴飭將備勤於訓練以上副聖懷所奉諭旨臣謹恭繳伏乞皇上睿照謹奏爾等封疆大吏之任固在進賢須知退不肖更為要務武辨固宜嚴飭文員更當紏參若姑容一日則吾民一日在湯火之中思及此亦何忍因循貽患或有藉口惜人功名而冒居長厚安靜之稱者乃朕所不解也總之戎政吏治全賴激揚賞罰以為勸懲朕所以諄諄向爾等誥誡不巳但盡期公平得當為尤難耳同日又奏為恭繳密諭事竊照設立社倉實係美政若行之稍不得法即至貽纍閭閻此中公私利弊均在聖明洞照之中但講究舉行必須與司道府州縣各官賭窩逃法莫善於力行保甲臣自到任後即將編查之法備敘六條通飭嚴革相沿陋弊令紳襟兵役與齊民一體魚鱗挨編自衛衛人不許脫漏一户十户共為一牌一户稽查一日周而復始聯絡守望百姓稱便現據陸續申報編成今蒙皇上諭及奬勵教誨以示鼓舞實乃微臣愚昧所思慮不到者誠恐各州縣奉行不得其法若逺調赴省教誨或致貽誤地方臣今専委本管道員稽查如有未盡合法之州縣即令指示照式編次擇其善者遵旨另豫優奬理合奏聞為此具摺敬繳密諭謹奏此論甚好大凡舉行一法必示以勸懲方期有效耳諭湖廣總督楊宗仁天下緑旗兵丁率十分中有二三分空糧為専閫大臣及將辨等之所侵冒而老弱殘疾不能騎射者復充當兵數徒令國家錢糧費於無用之地夫武備關係重大不特緩急恃以為用并藉以防緝盜賊守護城汛各省大臣將辨每於兵內挑選隨丁一無拘限今奉天等處將軍副都統官員俱令酌選數名著為定額其提督總兵以下等官亦宜照例酌定各於該管兵內查有不堪者亟應沙汰選擇年力精壯漢仗雄勇者頂補嗣後營伍騎射須時加操演火器營兵於春秋二季操演水師營兵勤於戰船操演其安營布陳進退作止之法務令精熟盔甲器械船隻等項務令堅固沿途守望煙墩之兵宜量增數名酌計幾墩共設一千把辨員輪流管轄督令不時稽察至山谷林麓近江濵海險僻處所或有匪類潛藏亦未可定將參遊以下派委二員令其領兵四十名時往巡哨更須嚴飭所領兵丁經過地方毋許騷擾兵丁內有實能效力弓馬嫻熟者記録其名遇有把總缺出即行補放以示鼓勵其懶惰刁悍者嚴行責革以彰法紀至若士卒效力戎行所希望者止把總一缺乃缺出不將漢仗雄勇實能效力之人拔補每以提鎮將辨親隨之人或係同鄉戚屬平時虛冒錢糧毫無勞績一遇缺出徇情納賄無論孩童幼丁即行補放似此何以服士卒之心斯等情弊朕所深悉今限一年之內徹底改革逮至三年朕必遣廉明清正不徇情靣之大臣密往訪察使爾等不及預防無從請託倘竟不遵諭旨仍不盡情改除致被察出定將該管大臣及將辨等官從重治罪凡爾封疆大吏各宜敬凛毋忽特諭雍正元年十月十六日湖廣總督臣楊宗仁謹奏為恭繳上諭事竊照湖廣緑旗官兵從前各營原有公費空糧侵冒情弊臣巳竭力清查頂補老弱者亦即陸續退換斷不肯使國家錢糧費於無用之地查督撫提鎮四標營俱係䇿應候援之兵平時更宜訓練精熟庶緩急有濟奚容任意挑選多人跟隨即提鎮大員原有親丁指使亦難聼其頻役士卒至於副參以下各員管轄之兵皆有城守分防撥護事件更無餘兵可以挑選跟隨臣今遵旨申飭革除錮弊務期營伍改觀以上副聖懷至於盔甲器械船隻火器等項各令逐漸增飾務使堅固整齊勤操熟練習成徑旅如臣標兵丁缺出俱臣親自試驗技勇頂補並不混放家丁一名食糧所有沿途塘汛并守望煙墩之處臣俱酌量衝僻險要分撥兵丁增添防守仍令千把輪班管轄稽巡至於千把乃武官進身之基如遇考補惟秉至公臣斷不敢稍有偏私或以年紀幼小弓馬生踈者補放上負皇上殷殷訓誨之至意再查湖廣與各省接壤并土苗連境之所頗多山林險僻地方恐有匪類潛藏亦未可定臣今就近分别飭令將備各帶兵四十名遊巡查緝嚴禁擾纍百姓如奉行不善一經發覺立即據實題參臣亦斷不敢勤始怠終自干嚴譴所有原奉上諭理合具摺恭繳謹奏類斯事務若仍偏執己見任意妄作反致生事有損無益必須通盤計算慎始慎終斟酌允妥然後施措可行則行如有不可行處將情由聲明具摺奏請務期實獲利濟真心為國宣猷但知有君而不知有身之人方克奏效非泛泛釣取虛名昧公私之義徇得失之途茍且阿從之巧宦所能辦集也敬慎為之尤須精勤毋怠同日又奏為奏聞事竊照下荆南道趙𢎞恩因伊父負罪不敢居官詳請退休業經臣會疏具題今巳遵旨令到京引見查趙𢎞恩於該道任內操守廉潔地方安堵自委臬篆巳逾半年審理事件平允得情今準部咨無日不據士民環籲攀留羣情愛戴異口同聲臣理合密為奏聞如蒙皇上察驗仍豫居官可否將趙𢎞恩發回湖廣效力下慰楚民翹望伏候聖裁謹奏觀爾前此舉薦沈澄殊覺目力不甚精明極當勉自進修深加造詣自古知人則哲勿易視之然明生於公要非偏徇愛憎好勝任性者之所能須從根本上體察方好同日又奏為欽承聖訓據實自陳事竊照加增鹽價一案臣自接準部咨應即公同鹽臣謝賜履會議具奏何得不自悔艾仍執從前偏見鹵莾無知妄瀆天聼實係微臣病昏所致今蒙皇上用臣天恩跪讀聖諭臣始恍然自悟偏執不通之罪譴難逭至於鹽價自準部咨業經鹽臣遵依出示漢鎮現照部議發賣巳將兩月臣並不敢沽名另有異議合併陳明臣今遵旨速與鹽臣確議妥當具奏外所有微臣凛奉訓旨自知罪譴之處理合具摺奏聞伏乞皇上睿照謹奏天下督撫若皆似此不慎厥初動輒稱誤誤而悔悔而改則朕一人曷勝其勞耶諭湖廣總督楊宗仁凡為大臣者身任封疆重寄必當和平詳慎曲體人情虛懷博詢以求適中庶於國計民生稍有禆益上亦不負人主委任之恩爾自蒞楚以來一味偏執己見意氣自用即如米鹽為小民日用之需須令商販流通市價均平閭閻始不受困今湖廣鹽斤涌貴良由減價太過之所致也在爾意原欲利民而不期病商乃致商運裹足不前衆口食淡是欲利民而民轉受其困矣咎將誰歸至如楚地本産米之鄉素為東南之所仰給因爾禁米出境以致川米亦不到楚不但鄰省價昻而本省糧價亦致漸長是爾之遏糴原欲封殖本境而本境之民並未沾毫釐之益也况鄰省黔黎莫非朝廷赤子大臣體國當以公溥為心似此偏執𥚹狹殊屬不諳大體負朕知遇兹特明白訓諭爾其速行改圖務令販運流通逺近民食有賴特諭雍正元年十一月十七日湖廣總督臣楊宗仁謹奏為凛遵上諭繕摺覆旨事竊臣接準兵部咨文封發上諭一道到臣跪讀聖訓諄切嚴明中臣隱病臣素性愚昧不諳大體仰蒙皇上俯賜優容特頒諭旨令臣改過天恩髙厚感激涕零伏思湖廣産米之地為東南所仰給鄰境黎民皆係皇上赤子更當公溥為懷豈可偏私固執雖臣從前止禁富户囤積不期因此商販亦稀今奉皇上訓示臣更悔悟惕凛加意飭令流通接濟鄰省羣黎以上副皇上愛惠元元之至意理合繕摺覆旨恭謝天恩謹奏人非聖賢孰能無過即顔子亞聖祇以不二過見稱亦未嘗竟免於過也但不可自恃小節小廉任性好勝則必致諸事阻礙物情不能通達聞爾素性尚氣大凡不審於理而易動聲色皆屬肝病由於血脈之偏天下愚不肖之流一切過不及之行為萬有不齊自我觀之莫非可憐之人可笑之具何以忿怒為哉遇不能忍時自覺是病則胸中渙然消釋矣凡事宜以和平謙虛為主體物之性順事之理當寬而寬非我有意寬之也當嚴而嚴非我有意嚴之也茍任一己血氣之性自信不疑嘉謀何由得聞膏澤何能逺布爾等節制一方不比朕為天下臣民之主人或懷殺身成仁之心猶肯面折廷諍以獻可替否冀不失身後之名於爾督撫大吏前何故為此無名直諫徒干爾之威以賈目前實禍耶謙恭下問尚恐不能得人真心實語若乃剛愎自用則通省屬員不過袖手側目旁觀冷笑而巳於爾之政績及朕之封疆亦何益之有勉之戒之和平謙虛四字當畢世誦之無斁則終始邀眷不盡也同日又奏為奏聞事竊臣身受皇上厚恩不能報稱擅以鹽價細事瀆奏實負職守今蒙皇上欽差部臣黃叔琳到楚臣即出郭迎請聖安跪聽傳宣諭旨戰栗惶悚負慚無地除鹽價業經部臣與臣同鹽臣會議妥確公同具題外又據部臣黃叔琳傳宣上諭國家最重倉儲粟米當加謹積貯吏治有關民生劣員須不時查參欽此臣凛遵聖諭立即會同湖北撫臣納齊喀湖南撫臣魏廷珍確察現貯榖米在倉外其餘凡有存價在庫者俱令奏至於湖廣大小各官從前賢否優劣均邀聖明洞鑒復蒙皇上特頒諭旨訓誡諄嚴聖治聿新咸知警惕查有難以姑容如湖北布政司糧道武昌守道漢陽等州縣湖南之寶慶府常德府通判武岡等州縣俱經臣與兩省撫臣陸續皇上允臣題請陛見俯遂微臣犬馬戀主瞻天仰聖之願為此繕摺請旨謹奏陛見且可不必至應來時候朕降諭於爾雍正元年十二月初三日湖廣總督臣楊宗仁謹奏為恭謝天恩事竊臣子楊文乾陛見謝恩回楚敬述皇上聖訓微臣跪聼之下涕泣感激刻骨銘心惟有追悔過誤於巳往愈勵勤慎於將來誓竭愚誠上報聖主洪恩而巳臣謹率同臣子望闕叩頭謝恩為此繕摺謹奏知道了和平二字為汝對病之藥當拳拳服膺然知和而和不以禮節之亦不可行也雍正二年正月十九日湖廣總督臣楊宗仁謹奏為奏聞事竊照西藏撤回甲兵於雍正二年正月十七日到諭旨即與各官加意講求特立條約六條先為擇地建原為伊等思患預防而有司皆能實力勸化共捐榖本踴躍爭先現據江夏武昌蒲圻咸寧等二十州縣各報建倉每州縣三五十所不等約共勸捐榖本將及三十萬石看此民情喜悅效驗巳著今臣又傳湖南各官面令循照湖北巳成之法施行再稽數月統俟所屬報齊之日另行奏聞伏乞皇上睿鑒謹奏據奏社倉一事朕深為欣悅於各省中爾先成創始之功殊可褒嘉勉之惟當嚴飭官吏不得干涉致滋擾纍一聼百姓自為方好同日又奏為叩謝聖訓敬繳硃批事竊臣頑鈍無知今蒙我皇上諄諄訓諭昭若發蒙臣惟朝夕敬誦天言時時警惕以期省愆改過皆出聖主鴻慈所造就也但臣感激如何容臣察確另行奏聞為此具摺敬繳硃批伏乞皇上睿照謹奏覽雍正二年四月十三日湖廣總督臣楊宗仁謹奏為奏聞事竊照湖廣地方凡有布種二麥之處粒穗茂實大有收成至於分數容俟登場另摺奏聞今年秋收之後社倉皆可告成仰賴我皇上訓諭諄切區畫周詳從此民間各有預備豐歉無虞咸感戴天恩於無既也臣數月以來細觀按察使蔡起俊勉力辦事舉動平穩至於操守尚未露有圭角後或稍涉營私臣斷不敢徇隱為此具摺奏聞謹奏社倉一事朕經諄諄告誡聼民自為嚴飭屬員毋稍催迫近聞百姓因此胥含怨懷懼爾欲速成其事以邀嘉奬其如功不掩過何前巳有諭旨申飭爾可會同兩撫嚴查不肖有司之欺飾逢迎者并明白曉諭安慰閭閻小民以釋其疑務令知原為百姓防患起見並非為倉榖舉行也即將來出舊入新總宜聼民自便若立法不善致被官吏土豪之所侵蝕又復苦纍窮黎賠補則不但非久逺善政即目前暫時亦不可行今當謀始之際必其難其慎克勤克公行一兩年使百姓曉然領會踴躍樂從方可期望後效輸納之時縱有些微缺少但向侵蝕之官吏土豪取償以示罰懲切毋逼勒百姓照數賠足致令嗟怨於道路也爾因此事近日聲名不好知之諭湖廣總督楊宗仁湖北巡撫納齊喀湖南巡撫魏廷珍等凡為封疆大吏者貴學古尤貴通今能安民方能裕國經濟之術烏可不講朕念爾楚省地方遼濶戶口滋繁而恆産有限民食維艱間有殷實之家亦不過僅自溫飽而巳求其急公尚義賑災恤鄰者前此未之或聞所以國家設立常平諸倉蓄榖積粟不容一日少緩也又念官倉關係考成有司安敢擅動偶逢旱潦詳報踏勘往返察驗未免後時古人云備荒之倉莫便於近民而近民則莫便於社倉前密諭爾等勸導建設蓋專為安民起見非謂官倉榖少欲假此儲蓄以誇張富有也爾等領會朕意自應轉諭屬員體訪各邑士民中家道素豐有急公尚義之心者使主其事果掌管得人出納無弊行之日久榖數自增至於勸捐之時須俟年嵗豐熟輸將之數宜隨民力多寡利息之入務從乎輕取償之期務從乎緩如值連年歉收即豫展限令至豐嵗完納必遇有姦頑之徒立意刁抗者然後從而懲創之以杜絶諸弊護衛良法外此一切條約有司毋得干預至行有成效積榖漸多該督撫亦止可具摺奏聞不宜造册題報使社倉頓成官倉貽後日官民之纍朕初意欲如此耳孰料該督望影揣情而又欲速不達令各州縣應輸正賦一兩者納社倉榖一石且以貯榖之多少定牧令之殿最近聞楚省榖石現價四五錢不等是何異於一兩正賦外收加四五錢火耗耶是為裕國乎抑為安民乎無乃學古而不通今之咎歟楊宗仁初舉毅然未嘗不好一旦鋭意欲速而屬員又奉行不善其流弊遂至於此也在楊宗仁之病惟尚氣自用而魏廷珍納齊喀所短又在阿順曲從夫豈朕所望於爾等清忠報國之意耶諭到該督撫速會同司道府等官確商妥議務得可以安民裕國經久之法以副朕委任至意特諭雍正二年閏四月二十二日湖廣總督臣楊宗仁謹奏為奏聞事本年閏四月十一日據駐京提塘承領內廷交出報匣一個齎發到臣臣隨知會湖北撫臣納齊喀公同跪拆敬讀諭旨復即差員恭捧上諭轉送湖南撫臣魏廷珍接受開讀齎回竊照社倉一事臣前靣與各官籌畫咨商撫臣舉行出納聼民自主不許官吏會計侵肥羣情踴躍俱樂捐輸榖本續據各屬報稱所捐之榖應俟秋收貯倉臣皆聼從民便查有尚義多捐榖本之人分别奬勵實無勒派按照完糧一兩者務貯社倉穀一石之事撫司道府衙門各可稽查非臣敢有蒙蔽皇上聖聰之處也誠恐僻逺州縣無富室可勸或襟士議有田土之家普捐些微亦未可定但臣身受皇上殊恩惟有竭誠辦理地方事務如臣有尚氣擅專及將社倉令照完錢糧一兩勒派榖一石之事臣不敢飾詞兩省撫臣自各有密奏至於安民裕國可以經久之法微臣凛遵諭旨與兩省撫臣司道府各官商酌施行以期仰副我皇上愛民之至意為此繕摺敬繳原頒上諭伏乞睿鑒謹奏如果所行不謬朕自能照悉無庸爾奏辨也同日又奏為欽奉上諭事竊照勸舉社倉原為百姓預備永逺積貯之計出納總聼民便不許官吏經手侵肥但經營伊始必須創立規模臣實愚昧因見本年楚省各屬二麥豐收原欲趁此機會勸捐以成根基今蒙皇上明照萬里誠恐小民疑懼畏慮特賜諄諄訓誡睿鑒無微不燭臣俯首服膺惶悚無地臣今凛遵諭旨現與兩省撫臣暨司道確商曉諭寬緩並嚴查欺飾逢迎不肖各官徐圖經久良法以仰副我皇上子惠元元之至意所有奉到硃批原摺理合恭繳謹奏知道了凡為大吏者須廣耳目勤訪察始不被屬員之所欺蔽也同日又奏為奏聞事竊照湖廣全省地方仰蒙皇上福庇雨水得時禾苗俱巳栽插湖北二麥收成俱有九分十分武漢米價每石九錢五分各府米價每石自八錢至一兩一錢有零不等湖南二麥收成各計八九分長沙米價每石八錢七分各府米價每石自七錢至一兩有零不等凡有可以種植之處現在遵旨督率屬員遍為勸課仰慰皇上重農務本聖懷所有二麥收成并禾苗巳蒔緣由理合奏聞謹奏閲奏大慰朕懷北五省今嵗苗稼亦好目下時雨溥遍秋收可望但數處間有蝗蝻起發朕殊為此厪念耳同日又奏為披瀝陳情仰干天聼事竊臣蒙皇上拔於衆人之中特畀湖廣總督重任殊恩疊沛聖澤彌深即捐糜頂踵亦難言報前遣臣子楊文乾赴京恭領諭祭隨即詣闕謝恩欽奉皇上訓旨諄諄臣子回楚敬宣上諭臣於跪聆之下感激惶悚涕泗交流伏念微臣賦性愚拙從前實多偏執自蒙皇上屢次明示如夢初醒惟有洗心滌慮盡改前非凛遵中正和平聖諭自省過愆愈加勤慎以仰報聖主洪恩於萬一為此披瀝下情繕摺奏聞伏乞睿鑒謹奏過而能改則無過矣但須真心服善時加警省自然受益所以謙卦六爻皆吉也諭湖廣總督楊宗仁朕惟安良莫如除莠扶正必先黜邪向有清淨無為白蓮羅門等教妄立名號誑誘癡迷假因果之説飾詭異之迹夜聚曉散男女混雜黠者同聲相和愚者罔識其非爭趨崇奉黨類潛滋妨耕廢織莫此為甚除他省朕經再三飭諭搜捕剗除聞爾楚省似此姦徒亦復不少爾其飭行所屬各員密訪渠魁嚴拏究懲化導脅從去邪返正務令妖萌盡淨隂翳全消風俗人心咸歸良善但須密加偵伺設法緝擒如得元惡酬以重賞有能出首者概豫從寬切戒無知屬員急遽聲揚擾民駭衆致生事端則非徒無益而有害也慎之密之一苗疆之積弊不可以因循也鎮筸一隅紅苗雜處自康熙四十二年勦撫之後固巳向化輸糧但其性頑蠢不馴每年猶有捉人勒贖之事營員恐干嚴例匿不申報又慮被捉之家不能隱默只得公空兵糧若干名以為贖人之費夫兵以防苗糧以養兵而乃以糧為彌縫苗患之具相沿日久羣苗益無忌憚臣竊以為經制之名糧亟宜充補足額其在汛地官辨於近苗界址實力巡查毋得偷安怠玩希圖事後補苴遇有頑苗捉人等事責令百户寨長拏獲正身解赴鎮筸文武衙門會同審供詳報從重治罪又於一嵗之中嚴加考核即以地方之有無失事定各汛之居官優劣則一二頑苗知有朝廷之法紀官辨亦知勸懲而邊民永享太平之樂矣閲條奏內有此一欵殊可詫異但未知果否虛實爾與撫臣會商確查如所言不謬爾等悉心計畫以聞若所言荒唐爾亦據實奏覆雍正二年六月二十五日湖廣總督臣楊宗仁謹奏為欽奉上諭恭繳硃批事竊照楚人浮躁輕剽性多詭詐每尚師巫邪教欺衆惑民今蒙皇上洞見萬里特頒諭旨指示周詳民情姦偽與綏戢緩急無一不在聖明照鑒之中本年四月內荆州府屬之逺安縣有匪類郭姓改名朱桃紅詭稱法術能治疾病揑造妖言名號誘騙幼女二名藏匿山洞欺誑鄉愚即被出首到官該縣立即拏獲稟報到臣查該犯並未徒各豫枷責再漢口地方亦有遊手棍徒私斂衆户錢財舉迎天符會名色爭勝逞強囂風漸染臣與撫臣訪知嚴禁其餘或有未發者不便急遽滋擾惟飭各屬力行保甲彼此稽查若有姦匪立時首報庶可消弭患害於初萌而冀徐圖實效於事後也再查鎮筸紅苗挾仇伏草捉人索取本家銀錢勒贖每見案牘非屬無因一有發覺務飭嚴督文武協力併擒或令帶兵遊巡追回拏獲頑苗審究實無武官虛冒兵糧存充贖人費用之事但臣誠恐耳目或有未周現在遵旨知會湖南撫臣如有因時制宜之處另行悉心籌畫奏聞理合具摺敬繳上諭并奉發硃批條陳伏乞皇上睿鑒謹奏與新任撫臣王朝恩會商將類此等事盡情紏剔務令潔清不得絲毫朦隱地方上之為民害者不除則利益何由而振興耶勉之同日又奏為奏聞事竊照湖廣地方入夏以來連得澍雨早稻俱巳登場湖北收成共計七八九分不等武漢米價每石九錢八分各屬米價自七錢五六分至八九錢一兩一錢不等五月二十三四等日鄖襄連日雷雨山水陡發沿江十三州縣堤塍多被漫溢據報臣即飛督管堤各官搶築保護撫臣現在委員查勘先行題報湖南早稻收成共計七八九分不等各屬米石據布政司朱綱報稱自六錢四五分至八錢七八分不等理合繕摺奏聞謹奏知道了溝渠堤塍防護於平時何有意外之虞耶堤防不固流通不暢則啓閉失宜蓄泄不得其利於小民耕溉諸事大有妨礙此皆爾等封疆大吏素不悉心籌畫之故間時置於膜外陡遇水發所以束手無䇿也若能以國計民生諄諄在念早應誠感上蒼垂佑類斯災眚潛消默化亦不可知今值上天示警垂戒當竭誠修省地方中一切政治并巳之存心敬謹凛惕亟圖遷改庶幾免將來之譴責朕所諭之理可以立竿見影莫作杳渺無憑視之勉之毋忽同日又奏為奏聞事竊照湖北按察使蔡起俊前未赴任時臣於去年十一月內具摺奏明奉硃批令臣於其操守留心試看嗣該司於十二月十五日到任續具摺奏復奉硃批令臣留心觀其行止臣查蔡起俊到任巳逾半年初則居官黽勉圭角未露近來辦事駮雜喜於濫準詞狀臣隨留心密察有潘大生控告鹽商方能潔掯價毆父一案該司受銀一千兩準其和息又張聖弼案內口袋變價牽連鹽商程鄰張前經兩司審明無涉省釋去後蔡起俊復行差拘司役勒詐銀八十兩該司隨將程鄰張釋放看來操守平常理合密摺奏聞伏乞皇上睿鑒謹奏據奏巳悉此人操守朕原信伊不及亦可謂愚昧性成難以化導者矣隨另有旨調伊進京雍正二年八月初八日湖廣總督臣楊宗仁謹奏為欽奉硃批恭繳原摺事竊照湖廣沿江各州縣居民田廬全賴堤塍為之保障每年嵗修司堤各官催督百姓加築護衛不虞今夏襄水漫溢致有殘缺衝損實由臣等平日疏忽之愆仰蒙皇上燭照萬里指示周詳臣惟凛遵聖訓俟秋收農隙會同撫臣納齊喀并該管道員督率有地方一切應行事宜臣謹遵旨與撫臣確商辦理不敢貽誤為此具摺奏聞敬繳硃批原摺伏乞皇上睿鑒謹奏知道了湖南不法刁惡之風亟當留心設法務令革除但不可急暴激出事端亦不可姑息馴致釀成大患須因時相機慎終惟始通盤計算透徹而行方好若似勒減鹽價遏糴等事任性膠固途窮始返則此非臣本庸愚痛自改悔之事也慎為之雍正二年九月初一日湖廣總督臣楊宗仁謹奏為奏聞事竊照湖廣地方交秋以來雨暘時若中晚二稻現在收穫登場湖北年成各屬統計七八九分不等武漢米價每石九錢五分各屬米價每石自八錢五分至一兩一錢不等湖南中晚二稻收成共計七八九分不等各屬米價每石自六錢七八分至九錢八九分不等惟湖北沔陽天門潛江江陵四州縣沿江受水之鄉各令補種雜糧以資接濟事關地方收穫情形理合繕摺奏聞謹奏覽全楚收穫情形深慰朕懷更宜加勉吏治期以感召天和雍正二年十月二十日湖廣總督臣楊宗仁謹奏為恭謝天恩事雍正二年十月初十日據臣齎摺承差敬捧欽賜哈密瓜一簍回楚臣隨出郭迎接至署望闕叩頭謝恩祗受訖竊臣口嘗異味心志聖恩圖報無由愈深凛惕臣不識何修仰沐如此異數惟有竭誠黽勉吏治上報聖主洪恩為此具摺奏謝謹奏覽奏謝知道了總兵董象台乃從前何天培力保之人朕見其身材雄壯年力富強因而録用今嵗張大有至京又再三保薦所以朕即超擢此任頃來京陛見應對之間朕審觀其神氣大非端人亦甚糊塗且似愚而懷詐爾其加意訪察試驗如有不妥處即行參奏前此之保薦朕疑有别故於其陛見時朕經面加教訓伊若知凛畏敬慎遵奉猶可令其供職否則不可姑留同日又奏為欽奉上諭事竊臣準戶部咨文內開雍正二年九月二十二日奏事雙全等捧出硃批諭旨因浙江江南沿海地方七月十八九等日海潮泛溢近海田禾不無損壞皇上軫念災黎嚴飭兩省督撫發倉賑濟又慮杭嘉蘇松等府人稠地狹出米無多命臣速動司庫銀兩買米十萬石選委廉幹賢員陸續押送浙江交撫臣平糶所糶之銀仍移還補庫其米應於何處交卸即咨會浙撫酌議速行等因到臣臣即遵諭旨飛速咨會浙江撫臣并選委漢陽府知府郭朝祚承領湖北司庫銀兩照時價採買米石料理船隻裝載陸續報運起程以副皇上念切民瘼之至意查浙江客商來楚糴販俱係熟米今臣亦照商販之式令委官採辦熟米使小民得米即可炊㸑現今買就上熟次熟通行三樣熟米共三萬石先令起運餘亦陸續買齊催趲接濟除押運起程日期另疏題報外所有微臣遵旨買米陸續報解緣由理合繕摺奏聞恭慰聖懷謹奏覽奏運送浙江平糶米石料理甚屬妥協同日又奏為奏聞事雍正二年九月十六日湖北糧道王承烈到任捧齎皇上發給條陳二摺據稱奉旨交與總督巡撫並轉發湖南巡撫將其中應當施行或有未便施行之處俱詳悉斟酌回奏欽此又稱奉旨湖廣一切有關係事件督撫未經奏聞之處大槩伊等有惟恐朕過於煩勞之意但朕實不憚煩勞愈多愈好欽此臣隨將條陳二摺知會護理湖南巡撫印務布政使朱綱俟新撫臣王朝恩到任轉交一體欽遵外臣查安仁縣知縣田仁虧空庫銀一萬二千餘兩於被參摘印之日因素有賖欠鋪戶帳目未清衆人見其離任擁擠索討羣相爭閙而田仁自知虧空難掩希圖乘機誣害揑稱銀匱被搶等語聼幕客張寶三為之主文誘勒典史王治為之申報據報當即專委耒陽縣前往查勘銀匱封貯宛然並無打破損失形迹搶毁聖訓均屬揑誣續據典史即將做就文書勒令申報實情供首明白因田仁幕客并家人等脫逃未獲疊經駁飭緝拘審究並非百姓結黨妄行所以未敢朦混具題至於邊苗地方督令各州縣一體清編保甲稽查嚴密武辨不時遊巡間有苗性難馴或挾隙伏草報仇行竊一經發覺即令文武協緝追擒是命是盜審確逐案報參臣總不敢諱縱貽患惟有凛遵諭旨通盤計算慎始慮終務期民苗安帖以上副聖懷今新撫臣王朝恩於十月初一日巳經到任諸事遵旨會議商酌而行所有奉發條陳二摺理合恭繳謹奏朕凡有所聞不遽信以為真必皆一一諭問爾等但須據實回奏朕得洞悉其由無稽之言原不足為凖也雍正二年十一月十五日湖廣總督臣楊宗仁謹奏為欽奉上諭事竊臣準戶部咨文奉上諭敕臣動司庫銀兩買米十萬石委員陸續送交浙江巡撫平糶等因欽此臣即遵旨選委漢陽府知府郭朝祚承領庫銀照市價採買於十月二十五日先買就米三萬石裝載起程又於十一月初四日買就米四萬石續運前往俱經題報在案今又買就米三萬石連前共足十萬石之數於本月十六日委員管押起程目下武漢地方米糧充足市價並不增長合併陳明上慰聖懷除買米價值水腳動用庫銀數目另行題報咨部移催浙江撫臣照還補庫外所有遵旨買米十萬石三次陸續報解全完緣由理合奏聞謹奏據奏運浙米石全完知道了年羮堯何如人也就爾所知據實奏聞純之一字可許之乎否耶密之諭湖廣總督楊宗仁爾楚省洞庭一湖居湖南之首而接界於湖北實為全楚要地水勢浩瀚島嶼瀠紆舟楫所經慮叢姦宄朕披覽輿圖詳察形勢知其入口之處東有湘江由長沙入西有沅江由常德入而皆北出於嶽州以合岷江此三處俱係洞庭咽喉今常德嶽州俱設有水師守汛朕意若於長沙湘隂地方調撥附近兵辨添設一營共為掎角之勢令三營各駕小船往來遊巡防範姦宄如遇風濤陡發亦可救濟商旅似於地方有益爾其會集該屬詳議具奏假若添設營汛或另有不便之處亦即聲明奏覆特諭雍正二年十二月初十日湖廣總督臣楊宗仁謹奏為欽奉上諭事雍正二年十月二十一日湖南撫臣王朝恩差員恭捧上諭一道到臣臣隨跪接開讀該臣看得洞庭一湖汪洋寬濶滙納諸流實為全楚最關緊要之區查常德在湖之西南嶽州在湖之北從前於居中之龍陽縣設立洞庭一協駐防遊巡續經前任督臣丁思孔題請常德添設水師守備一營又於嶽州添設水師守備一營將各營戰船分配兵丁派於濵湖緊要處所分界巡防至於長沙府在大湖之東雖湘水由彼而入並非濵臨險要可比此處現有長沙協鎮守是湖口巳得防範之要領矣再查長沙府所屬之湘隂縣上接長沙界四十里下至嶽州界一百二十里此處亦有長沙協專撥千總一員帶兵一百餘名沿江安設水塘一十二處防守巡查更有長嶽接壤地方辨兵彼此聯絡會巡防範布置頗稱周密又湖南布政使朱綱設立救生漁船平日任其捕魚為業如遇風濤險惡即令往來救護行旅分别賞格現在實力遵行今蒙我皇上特頒諭旨應否於長沙湘隂地方添設水師令臣等詳議具奏臣因智識短淺深慮所見殊有未詳隨敬録上諭細與提臣魏經國撫臣王朝恩會商續準議覆僉云長沙有副將駐劄而湘隂亦有專委千總帶兵巡防復有各處水塘長沙湘隂地方似可無庸添設水師臣謹會同撫提二臣合詞具摺覆旨伏乞皇上睿鑒謹奏所見甚是原係可行可止之事所以與爾等商酌也同日又奏為奏聞事該臣看得湖北糧道王承烈歷任巳將三月隨事辦理端重老成勵志要做好官仰報皇上隆恩雖才非肆應而目下所居地位洵屬稱職相宜也鎮筸總兵官董象台尚未到楚俟其赴任後臣遵旨逐細試看確察另行據實奏聞謹奏知道了切毋稍涉迎合致有抱屈之人但務據實秉公為是雍正三年正月二十日湖廣總督臣楊宗仁謹奏恭請皇上聖安并叩謝恩綸謹奏朕安爾子楊文乾乃中人以上材質令其勉力進修將來可成大器同日又奏為遵旨奏聞事竊臣回奏採買米石摺內奉到硃批該臣看得大將軍公川陜督臣年羮堯特蒙皇上簡拔節制九邊遣將發師皆遵當推照於心因臣與羮堯宦途並未共事憶昔聚晤之時羮堯尚在內館肄業泛以親誼往來其心術未能深知所以純之一字臣實不敢浮誕敷陳自干欺誑理合據實回奏再湖北撫臣納齊喀腹患瀉痢巳將半年朝夕辦事並未倦怠但自入春以來身體頗覺羸瘦合併奏聞伏乞皇上睿鑒謹奏聞納齊喀抱病雖經遣醫前往調治但不知近日光景若何朕甚為注念雍正三年二月初七日湖廣總督臣楊宗仁謹奏為恭謝天恩事竊臣接到臣子楊文乾家信知於正月初九日恩蒙召見跪聆聖訓仰承欽賞又奉旨楊文乾著實授河南布政使該部知道欽此臣隨恭設香案望闕叩頭謝恩訖伏念臣父子均荷皇上特恩不次超拔愧無寸長報效受恩深重寢食靡寧即捐糜頂踵亦不足以仰報萬一臣惟矢囑臣子楊文乾勉勵清勤力圖仰報皇恩臣自病痊之後雖精神似覺如舊惟左耳塞蔽右耳時或重聼顧此衰微之軀益當奮志自強以上報聖主千古隆遇為此具摺恭謝天恩謹奏爾子楊文乾俗所謂跨竈子也朕深為爾慶喜之雍正三年四月初九日湖廣總督臣楊宗仁謹奏為奏聞事竊照湖廣地方初夏時雨霑足早禾盡栽二麥遍處豐收米價每石九錢五分臣恐上厪聖念理合先行奏聞恭慰皇上睿懷謹奏覽奏大慰朕懷爾等封疆大臣於一切政治但務寬嚴相濟舒暢兵民之情自必蒙上蒼垂佑此理毋視為杳渺難憑勉之同日又奏為恭謝天恩事竊臣接準部咨隨即遵旨暫行兼署湖北巡撫事務另行繕疏題報外臣仰沐皇恩深重自問圖報無由惟有竭盡心力料理地方政務以期無忝職守再臣子楊文乾荷蒙皇上寵眷實逾常格父子並沐殊恩誠為千古隆遇臣惟刻刻諭囑臣子始終勤慎勉竭駑駘仰報聖恩於萬一為此繕摺奏謝謹奏粵東懸缺一時難得勝任之人即又用爾子為廣撫矣雍正三年六月十七日湖廣總督臣楊宗仁謹奏為奏聞事該臣看得鎮筸鎮總兵官董象台到任巳經半年料理營伍亦無超羣異衆之處前據該鎮以前營遊擊楊凱熟悉苗情欲臣題請調補中營等因咨呈到臣臣查鎮筸鎮中左右前四營均有分管苗寨汛地楊凱前營所管之苗寨獨多既稱熟悉苗情似不便改調中營苗汛最少之處且新升之中營遊擊朱國佐是否熟悉苗情尚未可知若令管理苗寨最多之汛措施殊欠持重臣實不敢草率題請理合一併奏聞謹奏知道了其操守行止再加察訪奏聞同日又奏為奏聞事竊照湖廣地方仰蒙皇上福庇雨水調勻早稻現經登場俱稱十分豐收即素係瘠薄之區亦有八九分收成不等中晚二禾甚是滋茂米價每石九錢五分臣恐上厪聖念理合先行奏聞恭慰睿懷謹奏嵗豐米賤大慰朕懷此皆卿等封疆大吏能體朕敬天勤民之心敷布得宜之所致朕實欣喜之至雍正三年六月二十四日湖廣總督臣楊宗仁謹奏為奏聞事竊照白鉛乃鼓鑄必需之物如地方果有出産應聼開採實與窮民均有利益之事據商人范育馪等在户部呈稱湖南郴州九架夾原有白鉛礦砂請照舊開採等因經部覆奉旨依議行令湖南巡撫確查明白具題前準撫臣王朝恩與臣會稿臣因細核部文原係專令巡撫查覆未便注題致與部文有背臣亦並無絲毫參酌阻抑於其間也臣子楊文乾傳宣訓旨臣惟凛慎遵奉理合回奏伏乞皇上睿鑒謹奏所事朕恐爾有意見不同及與地方或有不便處因命爾子楊文乾過楚靣詢今覽所奏巳悉此亦緣王朝恩請罪之疏而起見也硃批諭旨卷四
