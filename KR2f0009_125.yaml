body:
  text: 欽定四庫全書硃批諭㫖卷一百二十五之一硃批鄂爾泰奏摺雍正元年十一月二十六日江南江蘇布政使臣鄂爾泰謹奏為交盤巳竣特陳額外虧缺事竊臣以卑鄙庸材伏䝉聖恩簡任蘇藩要地惟有竭力盡心不敢少有欺隱以期報稱今查得江蘇藩庫錢糧除署撫臣何天培先經報參前藩臣李世仁虧空現在嚴審是否侵那俟督臣另奏外臣到任後續查出李世仁虧空雜項等銀一萬餘兩隨經臣嚴催巳據陸續還庫共接受實在錢糧十六萬二千餘兩自八月十八日臣到任之日起扣至十月三十日止共新收過正雜銀四十九萬一千餘兩解放過雲南四川兩省協餉及本省兵餉驛站等銀共四十五萬五千餘兩現存庫內銀共十九萬九千餘兩俱經督臣查弼納於十一月初十日到蘇㑹同署撫臣何天培臨庫盤驗訖但此外有不入檔冊實關正項者又查出前藩臣宜思恭等各任內虧缺無抵經欽差部臣張鵬翮前任督臣赫壽撫臣張伯行題准將康熙四十八九五十五十一等年俸工捐補銀共十五萬餘兩至今未補又查出前藩臣李世仁任內墊用虧缺并所屬各庫借墊虧缺前撫臣吳存禮咨准户部將康熙五十四五六等年俸工捐抵銀共一萬六千餘兩至今未補又查出前藩臣楊朝麟李世仁各任內墊用虧缺詳明前任督臣赫夀常鼐撫臣吳存禮批准統俟俸工捐補銀共二萬餘兩今亦未補伏查前項虧缺銀兩既係因公墊用准將俸工捐抵自應即將各年俸工捐補清項乃十餘年來從前各任並不徴解歸欵且有巳徴在庫不歸原欵而復充他用者共計六萬五千餘兩餘俱虛懸待補竊念新奉明㫖議捐俸工永行停止此誠聖主軫恤臣民之至意縱地方公務原應地方官公辦然公捐之項自當完公逾限過期尚且不可况任意出入竟至虛懸將來流抵作何歸結臣受聖恩深重身任錢糧專責斷不敢少有瞻狥以負慈父今將交盤之外查出歷年額外虧缺將俸工捐抵未補各項逐一詳明督撫二臣限年清補外謹遵訓㫖具摺奏聞臣謹奏此奏甚明甚晰甚為可嘉前各案虧空捐補之項當與督撫商酌應令歷任督撫司道賠補豈可纍及現任無辜之員爾等若肯任怨實心任事那有不辦之理少有瞻顧因循則諸凡掣肘難行也如山西通省虧空諸務廢弛今諾岷到任方半年料理清楚錢糧分釐皆有著落實可謂天下撫臣中之第一者也他省督撫當愧而法之爾等如何效力處朕自然知道不能惑朕耳目何天培居官何如輿論不一爾可據實具奏雍正二年正月十一日江南江蘇布政使臣鄂爾泰謹奏為恭繳硃批諭㫖據實回奏事竊惟江蘇重地財賦甲天下從前各項虧空缺在民者或由災荒缺在官者半由貪鄙深維其故瞻顧實貪鄙之源因循乃瞻顧之驗瞻顧因循未有不流為貪鄙者上官需索下屬下屬因剝削小民至剝削之所入猶不足以供所出則動庫帑蓋愛惜功名不得並愛惜廉恥究之廉恥掃地功名隨之故虧空之州縣亦未必盡出無良實不肖之督撫司道有以使之也欽奉諭㫖將各項虧空捐補之項令歷來前任督撫司道賠補不許纍及現在無辜之員復以瞻顧因循不實心任事為誡此誠聖主如天之仁如日之明無逺弗届無微不燭之所至分别著落另摺奏聞外至署撫臣何天培為人直率居官恂謹每對屬僚諭㫖據實覆奏外恭繳硃批原摺合併聲明臣謹奏知道了雍正二年六月初八日江南江蘇布政使臣鄂爾泰謹奏為恭謝天恩并繳硃批諭㫖事署理浙江藩臣佟吉圖抵蘇口宣聖諭鄂爾泰自到江蘇聲名甚好毫不負朕恩是天下第一布政欽此臣質本庸人身遭殊遇受事以來見江蘇地方外似繁華中實凋敝加以風俗奢靡人情浮薄縱遇豐年亦難為繼私心竊慮實非止於不要錢不廢事便足以報君恩盡臣職也迄今待罪將及一載雖凶頑稍戢淫蕩稍減府州縣吏亦稍知自愛然於地方本計曾無寸補乃䝉天語褒嘉逾於常格臣自分何人膺兹異數自今以往惟有時凛聖訓不瞻顧不因循竭力盡心佐署撫臣何天培謀積貯通水利崇節儉惜廉恥務期荒年亦可不愁饑窮民亦漸不為盜臣職無虧臣心始慰庶仰酬髙厚於萬一耳臣謹奏所奏甚是向聞爾料理得法故未諭及今既有此奏因將朕意諭爾凡轉移風俗之事須漸次化理不可拂民之意而强以法繩之也從前如湯斌等及幾任巡撫亦有為此舉者皆不能挽回而中止反致百姓之怨望無濟於事如蘇州等處酒船戲子匠工之類亦能養贍多人此輩有游手好閒者亦有無産無業就此覓食者倘禁之驟急恐不能别尋生理歸農者無地可種且亦不能任勞若不能養生必反為非不可究竟矣惟在爾等地方大吏正巳率屬徐徐化導使百姓明識其非樂從務本知其利害方可長久遵行風移俗化也萬不可嚴急使民失業究之蘇常等處還是禮義柔弱之風雖習尚奢靡不過好為嬉戲耳况人性多巧頗嫺技藝善於謀食較之好勇鬬狠之風相去逺矣若盡令讀書勢必不能若槩令歸農此輩懦怯之人何能力田服勞將來不過棄鄉棄土逺往他省仍務其舊業耳非長策也凡事順人情就風俗而理之從容布置委曲開導方可有成一點迂腐淺見存不得虛名務不得地方上刁頑襟紳縱不得末業小民苦不得必須一夫不獲其所若巳推而納之溝中如此寬仁如此識見方可為民父母若不計及久長祇顧一時髙興非惟不能風移俗美翻成勞而無功只可善為化導不可使小民失其生理也此朕密諭爾之㫖不可令一人聞之要緊要緊雍正二年七月初五日江南江蘇布政使臣鄂爾泰謹奏為恭謝天恩事竊查參革知府張汝愫揑結署令陳紳虧空全完詳請開復一案臣據詳轉請部臣以狥庇題參臣接閲邸抄不勝惶悚不勝慚愧雖嚴加處分甘受何辭不期七月初二日接臣兄鄂臨泰家信知奉恩㫖查弼納居官好固不待言鄂爾泰居官聲名好布政使內第一伊等失於覺察則有之斷無狥庇之事可以保得伊等俱著從寬免其處分餘依議欽此臣跪誦之下感極涕零謹望闕叩頭恭謝聖恩訖伏念臣逺隔數千里外孑處江蘇智短材庸未能寸效乃䝉聖明垂鑒下信臣愚非分之褒重頒天語臣自顧何心能不思奮自今以往惟有矢此愚忱益加詳慎務期少補涓埃不敢自甘暴棄除詳請撫臣代疏恭謝外謹具摺奏謝臣謹奏知道了不可因取信於朕而放縱改易也勉之又勉莫負朕用雍正二年七月二十四日江南江蘇布政使臣鄂爾泰謹奏為欽遵聖訓恭繳硃批事竊臣於七月初九日恭接硃批臣摺諭㫖廣大悉偹纎細不遺如衡斯平如鑑斯徹既精義以入神乃造化之在手此固萬物咸宜千秋惟鑒小試之則小效大試之則大效者也臣跪誦之下心目洞豁浮氣頓除深繹熟思歡欣纍日伏念鴻慈凛遵寶訓鏤心刻骨敢一飯之偶忘宣化承流期三年而報可臣謹奏所奏甚是勉為之同日又奏為敬陳管見事竊臣受事江蘇巳經一載地方事宜粗悉大略如丹徒丹陽河面係杭嘉湖紹蘇松常七府之運道而派夫挑淺獨纍兩邑之民糧漕關係天儲旗丁固宜優恤然馭之不善而驕悍橫索官府莫制遂為商民纍州縣分修戰船營辨勒索州縣船不堅完官受賠墊徒為科斂口實凡此諸事業䝉聖主洞鑒諭令查議臣更敬攄一得附陳四條伏冀聖主採擇焉一漕船之宜更舊式也謹按糧艘舊式船勢濡時日逮過關上進以及達通沿途發賣客貨又須留滯船式過大遂得藉口實非無因敢於玩誤也況船大則行遲行遲則擁塞擁塞則河路益隘而民船不得通甚有相去數丈守候經旬兼之硬拏剝運捶撻交加怨聲載道誠有如聖主明諭者以臣愚見與其大而無適於用莫若更其式而有便於漕并有便於民嗣後每遇一船破壞并届滿號大造之期請即飭令更造如子船式窄小而長量其所裝可容千石六百石以裝正供一百石以裝行月口糧餘三百石地仍許其帶貨則船小載輕不難撑運即遇淺擱亦易扛幫而於旗丁輩仍無苦纍商販民船且得肩行無礙殊兩便矣况船小則水手亦可減裁少一人即少生一事兼又便於舉棹其行亦速將不踰六月便可抵通不踰十月便可回次不惟易於督運復有益於商民或亦救弊之一法也一巡道之仍宜專設也竊查蘇松二府地當濱海民稠地沃賦重風刁且有泖澱太三湖汪洋千頃最易藏姦東南壤接浙常鎮四府漕白二糧始須設法催徴繼則到次督趲而又押運赴淮按船盤驗是糧道一官亦難雜以他事分擾其心惟是康熙二十二年間將巡道一缺裁併糧道而巡查之責與催趲之任遂統歸一員竊思糧道之催趲正當冬月而匪類之竊發亦係寒冬若押運赴淮勢不能不顧此而失彼以臣愚見似應查照舊例仍設分巡道一員巡查地也婁江即今之劉河在蘇州府城之東經崑山縣抵太倉州境環城南而東過嘉定縣以入於海上泄諸水下通潮汐東南半壁實賴之故其通塞所關甚重河向寬二十餘丈後因於天妃宫建閘束其水勢潮汐來緩以致停淤暴塞所存河面僅五六丈土人方欲去之而於康熙五十四五年間又建六渡橋之新閘而河道日湮因六渡橋去海巳逺潮力巳微束之以閘則潮來愈微退時愈緩緩則沙停漸成淤積以致濱河田畝灌溉無資此則旱之為患也若遇大水為災河道本細復有此閘梗其咽喉以震澤西來列郡之水盡趨劉河而爭出於丈餘之水門其泄㵼不及則泛濫漂沒之患必不能免此又水之為患也當時與六渡橋並建者又有七浦一閘此閘去海為近潮大則阻於閘而不及進閘外之田受其泛濫潮小則阻於閘而無所入閘內之田無從戽救故二閘一建而三郡之水利欲絶士民無不欲去此二閘者而以當日建造之始經督撫題請未敢議廢殊不知地勢有更遷事機分利害因革興廢在乎審時况在議建之時本為利民計也而未見為民患及今巳受其患若仍不為變通拘於前議恐水利翻為水害並於前議利民之初心亦大相悖謬矣臣博訪羣議如出一口倘邀聖明恩允廢此兩閘太倉等三州縣萬民實攸賴焉一視耗羡之多寡定賄賂之重輕而被委之官原期藉此獲利既所費巳多且為時不久遂至百計營私而侵帑蠧民無所不至荷䝉聖明洞燭特頒定例署印之官凡有虧空即著落原委署之上司分賠法至善也近奉部覆臺臣王恕條議知府缺出止許委府佐署理州縣缺出止許委鄰近之州縣兼攝其所以杜通融瞻狥之弊者至詳且悉臣又何敢置議獨是地方有大小之不同政術有繁簡之各别因地制宜庶免貽誤查蘇松常鎮所屬之二十州縣俱係財賦重地事務殷繁江寧之上江句溧諸邑揚屬之江都暨髙通二州淮屬之山陽宿遷等縣並皆衝劇要地素稱難治如收漕之時印官住宿倉厫殫力徴輸尚虞遲誤平時催徴各項錢糧條欵繁多日昃不遑猶難如限加以欽部命盜重件並承追承緝各案均有嚴限例干參處任斯職者即使才具優長亦止能勉盡職守若更委以他篆恐即有兼人之才亦乏分身之術勢必以本地之事私委衙官則害民誤事更有甚於同知通判者是鄰近兼攝之事可行之於他省而未便概之以江蘇也臣查佐二首領等官未嘗無長才若概不許委署恐敏練之員無由自效非所以示鼓勵鄰近州縣等官未必皆循吏若例定以兼攝恐夤緣之輩反得借徑非所以示防間况既遵定例凡署印之官但有虧空即著落委署之上司分賠則委署之責自當聼任應分賠之上司若分賠則有嚴例委署實無專責或受分賠未免屈抑即現委署亦難遴選深計熟思恐終無補據臣愚見嗣後州縣缺出惟當欽遵聖諭令該管上司不拘何官但慎擇才守兼優者詳請委署其委署之官一有虧空或至惰誤即著落分賠仍加嚴處在該管上司既無可推諉則為公為私倍加詳慎而通融瞻狥之弊或亦不敢出此矣至於知府缺出詳委府佐署理事可通行然遇府佐中或無可委之人亦當隨時變通以收實效以上四條均關民事臣自維職守不揣冒昧詞過冗長伏乞聖主睿鑒施行臣謹奏知道了凡奏應明白達意何冗長之有雍正二年九月初四日江南江蘇布政使臣鄂爾泰謹奏為陳明地方情形仰懇皇仁事今嵗江蘇地方自夏涉秋雨暘時若將謂可卜大有不意於七月十八十九日兩晝夜颶風驟雨海潮泛溢江濱海澨之處同時被淹衝決海塘倒壞民居廬舍甚至溺死男婦多人臣驚聞震駭隨即轉報督臣查弼納署撫臣何天培俱巳具題外臣念聖主以誠達天以仁育物宵旰憂勤無日不以民生休戚為念自御極以來蠲免赦除屢下非常之詔一旦見此濱海百姓忽遇竒災必惻然憐憫恩賜撫賑第現今壞廬舍絶煙火秋深霜露方始而小思不得不亟求拯救之策除孤懸海外被災尤甚之崇明一邑巳奉督臣急撥存留米一萬石署撫臣買米二千石押運至本地散賑平糶安撫兵民臣一面詳明督撫二臣一面先動捐存銀兩量受災之大小輕重各發三百兩五百兩不等令州縣官親詣核實無力貧民按戶散給助其苫蓋薪粟之資免於露處潔腹之慘以待皇仁今續據各災屬詳報巳經俵分各散訖又有各自捐資并勸大戶樂輸凡係屋廬倒塌者現在修葺㸑煙不繼者得賴保全莫不各理舊業漸復安堵臣用敢據情繕奏以稍舒聖明南顧之憂但目前雖獲稍安恐涓滴未能補救一俟確勘情形細核分數立即詳明督撫常屬之武進鎮屬之丹徒淮屬之山陽贑榆安東揚屬之通州如臯等縣雖據報災臣細加訪問於秋成分數不無減什之二三然猶不致大害現在委員㑹勘俟勘確另業主希圖減課佃户希圖饒租而包攬錢糧襟棍復從中聳駕以為緩徴之計若不分别查勘明白陳者松江府屬之海塘向係土堤自遇颶風將華亭縣所轄金山衛柘林青村三汛一帶土堤患口衝坍五十五處計三千六百七丈據估工料銀二國課民生全賴海塘捍衛前據士民公呈請照浙江潮大汐倘有害生不測不可不防第所費浩繁司庫錢糧别無閒欵可撥臣愚伏念惟有權動正項地丁給發堵築并即以一帶被災之民召募充役日給工食銀五分則不特自食無虞兼可分贍家尺細核工料不使冒銷用過錢糧徐議歸補實緣地方緩急之時不得不設此權宜變通之計是否仍不可少若因有改建石塘之議而謂土堤可以不築無論內地現在可危即將來石塘告竣而無土堤捍禦或值狂瀾瀰漫則無以截水勢以安民居此土堤之亟宜搶築非止為暫時補救計也是誠所繫非輕故敢備細直陳所有硃批臣摺三扣並硃諭事件合併恭繳臣謹奏知道了雍正三年十二月十九日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為恭謝聖恩報明臣體痊可事竊臣質本庸材身遭異數五日留京六䝉召見疊荷我皇上天髙地厚之恩訓誨儼若嚴師矜憐宛如慈父臣口不能述心實難安縱使竭盡駑駘斷不能少酬萬一若復甘自暴棄稍易初心謬言通脫移念身家在諸臣所當薄罰在臣即應顯戮皇天后土亦必不容臣負背至此也臣於初二日巳刻起程御賜行轎穩適快便日行兩站餘略無勞頓兼以尚書臣蔡珽所定二藥方經臣立即合就早晚分服今於本月十九日巳抵湖北襄陽府飲食漸增精神漸長此後當儘力前行略無遲誤臣以微恙致厪聖懷午夜捫心難以自處惟有努力自愛務使體氣强壯以重臣職以答天恩而巳臣謹奏覽奏朕甚為欣慰新正大禧諸凡平安如意也朕與卿一種君臣相得之情實不比泛泛乃無量劫善緣之所致期共勉之雍正四年二月二十四日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為恭謝聖恩事竊臣於雍正四年正月二十八日抵雲南馬龍州地方接受印信隨於二月初一日抵署到任兹於本月十八日前齎摺家奴回滇䝉御賜臣福字一卷荷包一箇珍食一匣臣隨郊迎至署恭設香案望闕叩頭領受訖及敬啓摺扣欽奉硃批覽奏朕甚為欣慰新正大禧諸凡平安如意也朕與卿一種君臣相得之情實不比泛泛乃無量劫善緣之所致期共勉之欽此臣跪讀數四不能仰視既奏同日又奏為遵㫖覆奏事竊查雲貴兩省綿亘二三千里正雜錢糧除鹽課及銅鉛等項外每年所入不敷所出需撥協餉數十萬兩為計久逺實切隱憂署貴撫臣石禮哈抄齎減則升補摺底內奉硃批此事議論甚妥可備悉說與鄂爾泰著再詳審定奪奏聞等諭𫝊示到臣臣伏讀詳繹仰見我皇上仁以推誠明以行恕既事理之兼該亦萬一之各正至於恩不易示美欲兩全尤為政治要道內外臣工各宜身體蓋市恩者末後必招怨恩難繼也偏美者對面巳成惡美無濟也據臣愚見毛文銓所請餘糧一萬石暫不可免石禮哈不行丈量示令自首增科實屬細心妥議臣於滇省巳仿行此法但邊方要地糧儲為先議減首重田則應俟升增獲有成效統計餘糧方可遞減若隨增隨減以抵原數恐升增之地舊即隱匿之人在隱匿者原未全首雖增實未嘗增在增升時巳有漏田是減而又再減深慮熟思似於國計無補再如內開土司首重田則一條彼雖依例輸糧其實占踞私享者不止十數倍而且毒派夷訓示遵行至於鹽課錢糧係滇省要務臣到任後即行清查正項必不可減贏餘似可抵銷若查竈户薪本原無賠纍鹽斤價值另有騰那即贏餘銀兩亦未宜擅動統容臣詳悉斟酌俟有成算再具摺奏聞外臣謹奏深知熟悉後再行雍正四年三月二十日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為敬陳東川事宜仰祈聖裁事竊查四川東川一府原係土酋祿氏世守地方考祿氏籍隸馬龍分據東川明季並未歸版圖至康熙三十一年始獻土改流議歸四川管轄其地與雲南省尋甸祿勸霑益三州接壤距雲南省城四百餘里方隅廣濶地土肥饒昔遭流寇蹂􅏳之後緣半未開闢兼之土人凶悍專事劫掠川民不肯赴逺力耕滇民亦不敢就近播墾故自改土以來歷今三十餘載風俗仍舊貢賦不增該府每年徴折等銀止三百餘兩俸工兵餉不敷悉赴成都支領往返維艱以天地自然之利致為荒蕪不治之區良屬可惜况東川去成都二千八百餘里一切事宜俱有鞭長不及之勢即如上年十月內烏䝉土府祿萬鍾之叔祿鼎坤統衆攻打東川村寨東川知府周彬慮川省逺不可恃具報滇省經前督臣髙其倬撥兵應援始獲解散解散之後而川省所發令箭方得到府是川省之無濟於東川而東川之無益於川省也明矣况尋甸祿勸霑益三州之民時遭東川土人之害綁虜人口劫搶牲畜不一而足及至赴官告理備文關提川省官例問土目伙頭而土目伙頭惟就中攫利曲為隱庇經年纍月竟不拏解一犯洵為滇省之纍臣按稽志圖博訪輿論若得東川府改隸雲南聲教易及凡滇黔兩省商民有力能開墾者廣為招徠以實其地並將附近營汛斟酌移駐以資彈壓不但兵民衆多土人自不敢橫肆且從前茂草皆變為膏腴民受福利國增錢糧似亦因地制宜及時變通之一端也再查烏䝉土府與東川接壤驕悍凶頑素稱難治不惟東川被其殺虜凡黔滇蜀接壤之處莫不受其荼毒而且産富田肥負固巳久若不早圖終為後患如䝉聖恩允東川歸滇俾臣指令將備先懷以德繼畏以威然後徐議改流不二三年間或可一舉大定至於防守官兵亦無庸另設查督標援勦左右二協原備調遣並非扼要應止留一協去左右字改為援勦協將一協裁省移駐東川府改為東川協其東川原駐官兵是否應裁均聼部議是一轉移間地無棄土兵無冗食節餉便民而地方賴以寧輯矣臣受恩深重報稱實難倘言有可採伏乞聖主睿鑒敕部議覆施行臣謹奏所奏甚合朕意東川歸滇髙其倬未到之先巳有㫖矣其餘所論極是應題請者具題諭雲南巡撫管理雲貴總督事務鄂爾泰四川烏䝉土司縱恣不法擅擾東川府巧家地方似此若不懲戒料理將來益無忌憚滋事愈多雲貴與烏䝉接壤朕正在諭爾㑹同嶽鍾琪料理爾所奏之摺適至具見留心地方可與嶽鍾琪和衷酌辦將烏䝉土官土目先行詳加戒諭令其毋虐土民毋擾鄰境痛改前非恪遵法度倘敢怙惡不悛罔知斂戢應作何懲治爾當悉心籌畫將來若可改土歸流於地方大有禆益但一切機宜務出萬全慎密勿少輕易致生事端其㑹同嶽鍾琪辦理之處朕巳頒㫖諭知矣特諭同日又奏為遵㫖議覆事竊照雲南卓異經歷章元佐條陳元江修城一摺並浙撫臣李衛議覆一摺前奉面諭交臣詳查議覆到任後隨檄行元江府知府遲維璽元江協副將張應宗著將三家山上建城有無關礙水泉曾否足用士民果否情願並此外附近地方有無瘴氣可以移建之處㑹同細勘禀報去後兹據報稱查勘三家地方由府城東上山盤行三十里居民分三層散處所應用水係自山上大竹箐穿溝引來除日用外園蔬尚不足灌溉兼之地勢狹隘萬難建城再踏看附郭地方惟去城北八里許圌山之前地勢稍髙炎熱稍減似可建城但詢之紳士漢夷僉稱此地雖稍寬濶然四面俱無地泉河道可資汲飲即便鑿井亦難有水况士民等生長於斯不畏瘴癘且田園屋舍墳墓俱在於斯實難遷移等語此外並無可以建城地方等因禀覆前來臣查元江一府自宋時那氏改建至順治十七年改土歸流歷年巳久紳襟百姓習慣煙瘴並無祲毒且田園廬墓俱近附郭安土重遷實本人情况查府城四至東至石屏州界通臨安府東北至臨安府㠄峩縣界通省城南至臨安屬虧容土司界通外五司及交址東南亦屬臨安土司界西至普洱界通車里宣慰司西南至鎮沅土司界通威逺北至臨安新平縣界西北至鎮沅土府界所轄地界盡係各種夷人其間有凶悍猓玀平昔與新平諸夷勾通索保劫掠害民者俱在附近元城百里之內城守文武各官居中控制有大江環繞無橋可渡實屬扼要重地是無論三家山上地窄水少萬難建城即便可建亦斷不應移建者也至於去城八里許圌山之前雖稱地勢稍髙炎熱稍減殊不思城郭之內原非郊野可比移建則人多人多則氣盛氣盛則炎熱如舊縱有水泉亦於土民無補李衛所議改築三家及另擇佳處之處似無庸議但土城低矮又兼傾圯章元佐陳請改建磚城實係元江逺計臣議於原城基址外面砌磚裏面築土惟期堅固可以歷久所需一應工料業交該知府㑹同該副將確細估計急速詳覆俟詳覆到日臣即𫝊同司道細加核算併將應動何項贏餘之處詳悉妥議具摺請㫖其普洱茶山威逺等處添設官兵所有衙署營房以及汛房塘房並修整城垣等項臣現在駁減確估應動何項銀兩俟數目核定再行合算至於普洱城小難容官兵等語臣查普洱一城周圍大四里九分駐劄官兵僅參將一員兵五百名似亦可容無庸開擴再貴州都勻府知府王鼎鋐條陳安順府改站一件臣前入黔境沿路訪問官民俱稱妥便抵貴陽時巳面交各司道委勘查議尚未詳覆合併聲明為此具摺並繳原摺二扣伏乞皇上睿鑒施行臣謹奏周詳之極朕甚嘉悅同日又奏為據實奏聞事竊臣到任以後清查錢局除大理一局係太和令龍為霖管理一切正雜額息分文無虧外臨安霑益二局爐頭匠役等雖不無些少那借然非侵項易於著補獨省城一局為順寧府知府范溥總理三年以來欺朦種種現在查出虧缺銀錢巳有五萬餘兩其銅鉛等項及順寧府任內銀米尚未查清俱不在此數臣看范溥乃市井小人頗有能幹緩則圖全急則無賴若驟行參破反恐於錢糧無補因密交藩司常德夀嚴諭完欵迄今一月餘自巳借抵衆人幫賠巳完及二萬兩零俟完有成數再將餘缺列欵特參於國帑官法庶幾兩益再查滇省錢法不能流通别省日鑄日多愈多愈賤現今每銀一兩巳換錢一千四百文合計每年約虧本欵銀一萬餘兩若不暫行停止籌畫善策恐將來壅滯更加折耗臣擬於題參范溥時隨另具本請㫖暫停鼓鑄容臣徹底清算盡除陋弊將地方小錢併沙破新錢盡數收買先合銅鉛次合工本務期錢文堅好可以行久再謀一流通之法使必不致壅滯然後懇請聖恩復開鼓鑄或於兵餉民用並有實效矣合具奏聞伏乞睿鑒臣謹奏此奏可嘉之至范溥乃可惡小人聼爾處分無可惜也暫停鼓鑄之事李衛亦曾面奏朕未允行若可減爐另商流通之法不尤妙乎總俟爾題到交部議再定雍正四年四月初九日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為請肅清頑苗以靖邊方事竊查前督臣髙其倬謹陳調劑黔省事宜等事一案雍正四年二月初一日臣受事後據貴州提臣馬㑹伯咨稱蓋造長寨等處衙署營房巳將宗角一處蓋造其長寨羊城􅋭者貢谷隆同筍焦山一帶地方盡係仲苗性最狡悍地更深入建造營汛兵房若非多方衛護匠役人工難以進修請檄發大定分撥駐劄廣順兵前往長寨駐劄臣隨經移覆撥兵去後續據署撫臣石禮哈手札云燒燬營房抗阻建造巳差官領兵持示相機勦撫去訖臣念仲苗頑抗實因循積玩所致必先出示明切曉諭雖引兵前往應俟示後看其情形辦理妥帖再行用兵一面奏聞若情形未定不須先煩聖慮總之制苗之法固應恩威並用然恩非姑息威非猛烈到得用著威時必須窮究到底殺一警百使不敢再犯則威仍是恩所全實多隨具札答覆略申此意三月三十等日又接撫提二臣手札稱據委員撫標遊擊趙文英等禀稱職等齎帶告示花紅前往曉諭頑苗不遵化誨每日離營五里吹角呐喊自宗角至長寨五層關口俱用檔木壘石每關加五六十人把守馬棉盔甲藥弩長鎗俱巳準備等語今現在酌撥官兵聼候進勦巳於本月二十日將始末具摺奏聞誠恐將來天氣炎熱抑或雨水過多兵丁率多未便務於四月內剪此醜類安輯地方其調遣各路兵馬及檄移鄰省阻遏去路等事正在速為料理等語臣念黔省諸苗仲家惡焰獨盛每小有爭鬬輒搆連各寨一呼百應凶狠久著實為通省大患今既明肆頑梗殺之有名藉此一舉以懾伏羣苗誠兩得之計然先須曉諭各苗只在專誅長寨一二渠魁其餘馴懦各皆安堵不惟秋毫無犯倘諸苗中有能協力擒凶者仍有厚賞其官兵經過之處無論為民為苗皆我赤子更須多方安慰毋許驚擾若早知降服授首只須擒其渠魁一二人設仍負固抗拒即行深搗巢穴殱除醜類事定之後尤宜號令嚴明另立管守各還完聚毋令苗衆失所因復詳細具札以覆二臣外兹四月初六日准提臣移知巳調平逺等標協營兵共二千七百名前往廣順州㑹同定廣副將及地方官兵多撥土兵相機撫𠞰臣竊思滇黔二省逺極邊末頑苗雜處前入黔境沿途訪察苗情略巳知悉曾面與撫提二臣切實商酌平日務當整肅營伍視無事為有事却以鎮靜為主示以無事以仰體聖主如天好生一視同仁之至意倘仲家苗凶狠如故罔知顧忌切不可隱諱務當殺一警百使羣苗畏法二臣亦深然臣言俱有同心今臣到任兩月仲苗凶惡種種頻聞兹復敢顯肆頑梗目無官軍若復稍事姑息恐羣苗望風長其惡焰將貽後患雖官軍一至勢如腐鼠原不須多兵但此一舉不獨為剪此醜類實欲懾伏羣苗故不得不稍張軍威聞貴撫臣何世璂於四月初二日到任請將總兵臣石禮哈暫免回旗同提臣馬㑹伯調度辦理二臣必能了此事終應無煩聖慮也再查土苗種類多忌少和互相仇殺者甚衆不能報復者亦多臣巳咨調定畨州屬剋把郎苗兵一百名平逺州屬熊家苗兵二百名定番十二土司土兵六百名俾作前隊許事竣之日將所獲人省兵力伏乞聖主睿鑒訓示遵行臣謹奏前者馬㑹伯奏到朕恐其孟浪後見何世璂之奏朕又恐其怯懦因循正在憂疑覽汝此奏朕始寬懷量爾料理必得事情之中也事定之時應具本題奏當以軍功賞敘石禮哈巳調用廣州將軍因汝此奏復命其暫停往粵俟料理此事畢再赴新任矣特諭爾知同日又奏為報明銅厰事竊查滇省銅厰額課九千六百餘兩經管司道按年照數辦納而青龍等老厰外如有新開之厰恐衰旺無定俱不題報只就附近老厰作為子厰隱匿抽減弊遂百出自清查銅斤利弊案內除額課之外凡有銅斤餘息悉行歸公充餉其新開之厰仍作子厰照銅取息慮至周法至善也然下屬奉行不力大吏察考不勤隱匿抽減又所時有臣仰荷殊恩畀以重寄錢糧所關兵民攸繫若或謬矜寬大不親細務名譽所歸暴棄斯甚故自到任後諸凡錢糧大小事件備細查核不敢稍懈各屬亦共諒臣心交相奮勉兹據糧道張允隨禀稱路南州大龍井一厰原屬龍寶子厰銅苗甚旺現今一季內巳辦獲銅六萬餘斤臣查一季獲銅六萬一年應獲銅二十四萬合每百斤銅收餘息銀三兩核算每年可增餘息以充兵餉不無小補俟再看一季辦有成數即行題報外合先奏聞伏乞聖鑒臣謹奏卿秉公忠報效處非止此一事也朕甚嘉之雍正四年五月二十五日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為恭謝聖恩事雍正四年五月十四日臣家奴齎回摺扣二匣並御賜小種茶十二瓶到滇臣隨郊迎至署恭設香案望闕叩頭領受訖敬啓摺匣貴陽途次二摺未䝉批示臣不勝惶恐及敬啓臣到任後摺匣伏讀硃批汝之心朕早皆洞悉矣朕不輕許人也欽此竊思臣之事主只此一心雖相隔萬里如覲天顔臣由員外郎三年之內超擢巡撫管理總督若非聖主洞悉臣心何以超逾常格若此但臣本凡材心長力短方且時切冰淵惴惴自凛顧乃荷䝉聖明以不輕許人者許臣臣獨何心敢不自重敢不自㫖覆奏一摺硃批凡天下事利弊名異而實同途況欲速則不達詳審為之深知熟悉後再行欽此大哉王言誠萬世寶訓臣知聖主所以訓臣者正不獨此事當銘心刻骨一念不忘除將黔省減則首重大要傳諭撫臣何世璂凛遵外謹此繕摺恭謝聖恩伏乞睿鑒臣謹奏此奏實洽朕肺腑欣悅覽之同日又奏為聖恩逾重愛身圖報事五月十四日敬啓恭請聖安一摺荷䝉硃批朕安將爾身子大好處為何不書奏欽此臣跪讀之下涕淚盈襟遙望君門惶悚無地念臣本庸愚荷䝉髙厚至於此極縱使日夜盡瘁矢以終身實難報稱萬一乃臣之一身疾痛疴癢呼吸之間上關聖慮經云父母惟其疾之憂言念及此無可自解若復不善調攝漸致殘疾有誤職守是自負是負慈父臣即不諳大義天性具在未敢不小心凛慎也竊聞臣受慈鑒無以臣病為念庶臣心稍安臣爾泰不勝感痛無任瞻依臣謹奏爾只遵㫖省力愛養朕方不以為念莫云萬里之隔朕不聞知也同日又奏為恭報滇黔二省豆麥等項收成分數并米糧價值仰祈睿鑒事該臣查得雲南所屬地方髙低不一本年春初無雨春杪夏初始得雨澤四月中旬雨方霑足細加訪問各處豆麥收成如澄江府屬之河陽江川二縣約有七分雲南府屬之昆明嵩明二州縣約有八分其餘各府州縣亦約有八九分不等省城米價每京石約賣銀一兩三四錢大理等郡之米稍貴臣等巳於米貴之處將倉米減價糶賣俟秋收買補還倉目下之價巳平至貴州山深土瘠全賴雨暘時若始獲豐收貴陽等各屬自春入夏雨澤時沛民間布種油菜豆麥雜糧等項約有八九分不等現今省城米價每市斗賣銀九分計倉斗一斗五升各屬價值雖低昂不齊而斗有大小計算亦約略相同再臣等親往各鄉遍行勸課目擊漢夷男婦盡力東作豆麥登場插蒔巳遍早者業經秀發而各屬申文亦稱播種插蒔將完西成有望理合一併奏報伏乞皇上睿鑒施行臣謹奏上天自然憐汝也同日又奏為進勦頑苗收獲諸寨事竊因貴州廣順州長寨等頑苗阻修營房一案臣先奏聞一面調集官兵土兵以張軍威一面出示曉諭再三化誨及四月二日撫臣何世璂到任復諄切示諭據副將劉業浚逐日報稱愈化愈頑臣等仰體皇上如天好生之仁不肯輕易進勦然觀其情勢必非文告所能化誨者乃令整理軍容剋期前進五月初六日據稱焦山長寨等寨頑苗糾黨放鎗放弩來驚營盤拾得藥箭十餘枝拏獲頑苗三名并藥箭一筒初七日諸將官議定三路進兵一由谷隆一由焦山一由馬落孔而以宗角為老營應援初八日分布隊伍整齊號令於初九日㑹同進勦十六日據提臣馬㑹伯咨稱遊擊田玉官祿於初九日丑時將官兵分三路前進由谷隆關而入越嶺登山直扺谷隆關上占踞關口攻打焚燒立破附近谷隆關之岩底寨冗把寨桑打寨擺架寨桐林寨大谷隆寨小谷隆寨等處諸寨賊苗擅敢對敵官兵奮不顧身施放大炮鎗箭齊發打死賊衆無數理應取賊首呈驗奈賊衆頗多打死一賊旋即搶去官兵共燒七寨占一谷隆關等因移咨到臣十七日又據提臣咨稱遊擊卜萬年於初九日子時自焦山起營遊擊詹天祥分兵兩路前進搶過焦山竹林關口四圍鳴角呐喊路俱塞斷官兵冒險攀援而上直抵苗穴翁忙險關滿山俱安藥簽頑苗率衆擋敵擂石弩弓亂發官兵爭先頑苗敗走深入穴內奪險關而下兵馬渡河頑苗又復拚命拒敵官兵力戰開得翁忙頑苗復敗入井口官兵齊追又開得井口四野頑苗蜂擁接陳炮傷頑苗數人往取首級彼巳先搶而歸遂分兵前後先踞長寨之後山後借勢而入男女奔竄一空及齊入長寨而頑苗復奮力拒敵是夜喊聲震地箭發如雨令兵丁施放鎗炮嚴加固守所有頑苗拒敵並得長寨情形移咨到臣臣自經黔省與提臣署撫臣面㑹細商原委詳悉及抵滇署咨札往還常無虛日逮撫臣何世璂到任後又復郵筒商榷其於一切機宜屢經嚴諭副將劉業浚及諸將辨並預事文武官員示以調度兼發有令箭專員申飭總期謀出萬全亦擒亦縱為計長久今官兵一進收獲各寨秋毫無犯生民安堵此皆我皇上教養之恩浹骨淪髓有以鼓動之也但長寨而外尚有羊城􅋭者貢谷隆同筍焦山諸寨今據報稱止焦山長寨谷隆以及谷隆附近諸寨而羊城􅋭者貢同筍等寨尚未報明謹先將巳獲諸寨奏聞外隨巳檄行諸將著令觀其順逆應撫應勦相機行事其巳獲諸寨既稱焚燒巳遍逃竄一空必須查明每寨共若干里關嶺若干田畝若干除巳燒者存户若干除巳逃者存口若干逐一查明造報清冊前督臣髙其倬等所議添設武職幾員兵丁幾何衙署營房幾所與今所獲諸寨地勢果否相符應否更議將所獲諸寨現存房舍暫安插兵丁居住俟事定之後應將田畝改作屯田令兵丁耕種聖懷先此具摺伏乞皇上睿鑒賜以指示臣等幸甚邊方幸甚臣謹奏此事何世璂亦奏聞未免書生之見況初到未審情形大有姑息之論朕著實嚴諭訓示倘事有稍遲時日處一切糧餉賞勞之需少掣肘遺誤朕必加罪巳諭兩次矣凡百皆令聼汝調度不可少立意見有誤機宜爾應如何指畫一面料理一面奏聞可也雍正四年六月二十日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為恭謝天恩事雍正四年六月朔日臣齎摺千總李茂䝉恩賞給驛馬並捧御賜臣祕製丹錠一匣到滇臣隨郊迎至署恭設香案望闕叩頭祗領訖敬啓摺匣伏讀恭請聖安摺聖鑒少慰慈懷及臣接開家信知荷䝉聖主以臣胞兄鄂臨泰女特頒恩諭許字怡親王𢎞晈阿哥臣率同臣妻席他拉氏並臣子恕奴約奴孚奴叩頭謝恩外竊臣先世自從開國代沐皇恩至先臣鄂拜雖忝列儒官歷階祭酒依然寒素凡屬朱邸何敢躋攀今臣疊荷聖恩不次超擢以巡撫管理總制方時深惴栗莫報涓埃臣胞兄臨泰舊曾任中書退歸巳久近叨聖恩給以八品頂帶雖家居輦下而禮儀踈簡朴野自甘姪女未嫺姆教鮮諳閨針性雖近於淑柔質難辭於固陋忽䝉聖主顧以蓬門弱息上配宗潢聞命之餘不勝欣躍不勝悚惶豈惟臣兄弟一門並叨恩耀其自臣始祖下逮髙曽祖父皆荷光寵沾沐殊庥臣自度身力斷不能報稱惟此赤心勉始勉終不敢稍懈以仰答髙深巳耳謹此繕摺恭謝奏怡親王實不世出之賢王卿實國家之名器真皆朕之股肱心膂朕有意聯此門親也卿當慶喜者爾前陛見時朕巳有㫖言爾起身促迫未得見怡親王王查勘河務尚須時日可圖他日㑹面之㫖及爾動身後王回京朕告以爾為人居心王之代朕慶喜之意動諸辭色爾一切奏摺朕多與王看王之一種敬慕稱讚之懷實難筆諭王實人之有技若巳有之實能容之而兼愛敬之之人王好賢嫉惡之公忠實為希有朕所悉知者當代惟汝二人朕保再不移志者其他朕實不敢信其必爾爾等皆朕心腹王大臣相識並非私交今既奉㫖聯姻一切書札問候來往正可彼此規諫以報朕知遇之恩同心合德贊襄朕與蒼生造福凡形跡影像之懷一點不必存中遵㫖行莫疑同日又奏為欽奉聖諭事竊照四川東川府接連雲貴逼近烏䝉驕悍橫肆為民大害荷䝉聖主洞燭幾先令東川歸滇俾就近料理特頒硃諭一道并臣摺硃批所奏甚合朕意東川歸滇髙其倬未到之先巳有㫖矣其餘所論極是應題請者具題欽此臣伏讀詳繹仰見我皇上大知用中至仁兼勇生殺豫奪一出無心臣當字字深思事事反體務出萬全勿少輕易終身誦之終食不忘可也臣自摺奏後隨密差人至東川細訪確勘其地方疆界形勢險要山川城池衙署營汛兵丁戶口糧餉賦役并現在風俗一切礦厰俱得悉大概俟部文到日應即遴委大員逐一查明臣更當親往細勘酌議㑹題蓋事在初定每易簡略始之不慎終成弊端不可不熟慮至於料理烏䝉一事即當札商嶽鍾琪並密致黔省撫提二臣著先事籌畫統俟臣親勘後妥議奏聞大約烏䝉土官凶惡習慣可以威制似難以恩化不改土歸流終非逺計然威止可一舉恩可以先施歸滇之後臣當宣示皇仁曉以國法練兵屯田以壯我軍漸離其心腹徐剪其黨羽俟機有可乘設法招致庶可一勞永逸其防守官兵臣擬以援剿左協移駐巳䝉聖鑒但將備千把仍須選調其左協原設防汛擬即以右協辨兵內分撥合先聲明再元江修城一件現據府協詳行司確估安順府改站一件據司道勘詳俱稱不便臣又委知府王鼎鋐本身查覆尚未詳到合併聲明為此具摺恭繳聖諭一道並硃批原摺一扣臣謹奏是當之極卿與嶽鍾琪商酌不煩朕諭也同日又奏為欽奉硃批敬陳大略事竊臣陳明錢局請暫停鼓鑄一摺荷䝉硃批此奏可嘉之至范溥乃可惡小人聼爾處分無可惜也暫停鼓鑄之事李衛亦曾面奏朕未允行若可減爐另商流通之法不尤妙乎總俟爾題到交部議再定欽此臣查滇省開鑄以來不一年內錢壅價低合銀一兩錢一千文之數難以搭放兵餉難以轉運外省業經管撫事督臣楊名時具題請將錢文免其搭放並請於原役四十七爐之內減爐十一座兹減爐一本業准部咨奉㫖依議在案臣前之所以請暫停鼓鑄冒昧題奏者實緣局內收銅之弊炒銅之弊抽銅加鉛之弊誤卯短額之弊前後牽扯之弊扣工纍匠之弊種種不一恐急切難於清理故欲停鑄閉局俾令水落石出無所逃遁以便調劑今臣受事巳五月而總理錢局元展成努力清剔不避嫌怨各項弊竇業知備細可不停鑄而減爐另商流通之法誠如聖諭但臣更有請者鼓鑄之法減爐不如減局流通之法本省不如外省蓋有一局即多一局之費爐座即減局費仍不能大減且管局賢員就近不可必得逺調又誤本任兼多掣肘本省即搭放兵餉所銷亦無多況錢一千文原不值銀一兩兵且受虧據臣愚見大理一局去省甚逺除搭放兵餉外别無可以流通之處霑益一局雖在迤東發運黔楚似屬近便然而䭾腳必由省雇往返反致多費此二局似應議減省城一局本地流通頗易而由黔達楚漸暨江南皆可發運舊設爐二十一座今擬加爐四座共二十五座臨安一局附近粵西由廣南府之剝隘下船以至兩廣更為便易舊設爐六座今擬加爐五座共十一座以上二局共爐三十六座以符原題部覆四十七爐之內減去十一座之數至於發運腳價運楚每串約需銀二錢四五分運粵每串約需銀二錢二三分以四十萬串計腳價銀近一萬兩臣詳細籌算每年採買所用三十六爐倭鉛五十一萬八千四百斤內每百斤節省銀一兩共銀五千一百八十四兩再查各爐役額鑄之外十日一卯原可儹工擬於每爐每卯另發銅鉛一百斤令其帶鑄除去折耗并歸還銅鉛物料錢本應獲息錢二串八百六十文通計三十六爐合共獲息錢三千七百零六串五百六十文二共銀錢八千八百九十兩五錢六分以作發運腳價少有不敷另當設法其二局添蓋爐房所需工費查有炭斤節省錢文可以足辦不須報銷如此則局弊可以清除錢法可以流通似於帑餉均有禆益臣應候部覆奉㫖到日再㑹同管撫事督臣楊名時詳酌具題如䝉睿鑒俯允臣當一面通咨楚粵兩江并乞聖恩頒諭該督撫諸臣一體行銷庶無阻滯合先奏聞臣謹奏具題來他省一體行銷之句亦入奏同日又奏為苗寨雖靖防禦宜周事竊以廣順州長寨建營頑苗抗阻臣與提撫二臣再四詳酌勦撫兼行巳兩經奏聞嗣據定廣副將劉業浚并文武各員將各寨情形逐日飛報或肆或戢或出或潛或假投誠或仍抗拒或白晝暗放弩箭或黑夜結黨燒掠才順旋逆此戢彼張種種狡獪長寨雖空然猶散據各寨不時竊發時值天雨連綿嶺峻草深難以深入五月三十日稍乘天霽攻開者貢一􅋭斬首級三顆生擒數十人鎗炮死傷無算六月二日又攻羊城一􅋭老幼降順前後所獲人口牛馬盔甲器械弩箭藥筒等及投誠各寨戶口俱報有清冊并獲有川販人口現在根究就目前論苗膽巳喪苗焰盡衰然而渠魁未擒羣苗觀望凶心未死終難寧帖乃據副將劉業浚等禀稱原議於長寨等處安設營汛今查看營基深處賊穴用此不滿二百駐防之兵豈能禦苗反為苗制不若歸併宗角改設一大營則各寨營汛皆可不設等情並准提臣馬㑹伯據詳移商到臣臣細按情形詳查卷案長寨者各寨之腹心也仲苗凶悍焚燒劫掠出沒無常前督臣髙其倬議於長寨就其腹心建設營汛俾前後左右皆可巡哨凡凶苗踪跡無從潛匿盡失所恃原不無確見宗角雖係羣苗之門户但官軍一退彼仍復據腹心我之所守者止一宗角而彼之所恃以出入者原不止一宗角如此則焚燒劫掠終不能止欲靖邊方究非長計況仲苗之所以抗拒者原止欲於宗角建營必不許在長寨建營以期自便其橫肆得遂其猖狂今前後調兵共及五千官軍延時巳踰三月猶未曾殱其魁散其黨而依然宗角建營不出頑苗之計其何以能張威令以制苗夷據臣愚見原議長寨建一大營實屬扼要但駐兵二百名原不足以彈壓應請議增宗角自應建一子營其羊城􅋭同筍焦山等處議俱不設汛似必不可蓋宗角內屬仲苗原不敢犯長寨四圍官軍仍不得制也但臣未嘗身歷其地固不敢執巳見亦不敢狥原議前經奏明將總兵官石禮哈暫留省城令伊前往相度形勢大小營當幾處官幾員兵幾何務期盡善以計長久其巳得諸寨宜何布置其投誠諸寨宜何安撫逐一清查商榷提臣臣再㑹同諸臣熟商妥議奏請聖裁提臣亦以臣言為是今石禮哈於六月初八日起程赴長寨副將劉業浚提臣馬㑹伯巳令赴黎平新任另委都勻營參將劉朝貴任事新提臣楊天縱緣臨元任內寨長張義登等凶惡不法與臣密議設法拘禁現在懲治故尚未赴任此外如霑益土州安于蕃鎮沅土府刀瀚等皆係首惡窩庇賊盜殘虐夷民為地方大害臣欲先置於法改土歸流為懲一警百之計巳密飭該地方文武官緩圖楊天縱留心民瘼深熟夷情臣當與伊合盤熟計以便次第舉行長寨一事馬㑹伯石禮哈自可完結楊天縱即到任轉恐一時難悉備細耳謹具奏聞伏乞睿鑒臣謹奏知道了甚是甚當近者石禮哈奏到光景似大有頭緒可慶之舉硃批諭㫖卷一百二十五之一欽定四庫全書硃批諭㫖卷一百二十五之二硃批鄂爾泰奏摺雍正四年七月初九日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為擒制積惡土官事竊以滇黔大患莫甚於苗猓苗猓大患實由於土司臣自到任至今凡遇夷情無不細心訪察所有鎮沅土知府刀瀚霑益土知州安于蕃勢重地廣尤滇省土司中之難治者也查刀瀚人本凶詐性嗜貪淫自威逺鹽井歸公長懷不法强占田地阻撓柴薪威嚇竈戶擅打井兵流毒地方恐貽後患前升任臨元鎮總兵臣楊天縱在省臣業與面商續於六月初二日因密交臣標前營遊擊楊國華等前往如法擒拏據禀巳於十九日就擒并撤取印信號紙押赴臨安轉解至於安于蕃勢恃豪强心貪虜掠視命盜為兒戲倚賄庇作生涯私占橫征任其苛索縱親勾黨佐其恣行卷案雖多法不能究比刀瀚更甚臣屢據呈訴訪察確實於六月二十九日密檄臣標左營遊擊署尋霑營參將祝希堯設法拏解據禀亦於七月初四日就擒押赴曲靖轉解以上二土司除俟押解到省審訊確供具疏題參外務須按律比擬盡法懲治將所有地方悉改土歸流庶渠魁既除而羣小各知警惕矣謹據奏聞伏乞睿鑒臣謹奏是當之極實慰朕懷同日又奏為恭報頑苗俱靖定議各寨安營事竊以廣順州長寨建營一案臣巳三經奏聞兹於六月二十一日齎回四月初九日一摺伏讀硃批仰見聖主兩端是執精一用中合內合外一歸時措臣自維凡材斷不能窺測萬一然每奉硃批惴惴凛凛一言一字熟思深體若遇事度情時有省悟覺一切立功立名要好嫉惡之念漸次消減竊以長寨一舉專為安營自應仍依原議及石禮哈於六月十一日到宗角行營於二十二日踏看各寨相度形勢與臣所見相同今與石禮哈及提臣馬㑹伯公同參酌審其要害權其重輕就原議中斟酌損益期於至當不敢茍且遷就塞責一時巳定議大營仍建於長寨即以長寨命名所以威苗志不忘也原議長寨設兵一百五十名羊城􅋭設兵五十名合共二百名查此二處係各寨腹心之地最為扼要應於長寨設兵三百名羊城􅋭設兵七十名方足以資彈壓原議暮謝設兵三名同筍設兵五十名而未及者貢查暮謝逼近同筍可以不設而者貢一寨居同筍以裏川販諸姦俱資藏伏應於同筍設兵五十名而者貢亦設兵四十名以為長寨左翼原議翁忙井口二寨各設兵三名焦山設兵三十名而未及火連忙查火連忙尤為衝要而翁忙井口居火連忙焦山之中則此二處可以不設惟焦山一帶皆屬深林密箐界通各路為仲苗往來要徑應於火連忙設兵二十名焦山設兵八十名以為長寨右翼原議馬洛孔設兵五名宗角設兵五十名沙子關深井關地賴皮河四處各設兵四名查宗角實門户之地馬洛孔適當宗角之外而沙子關深井關地賴皮河則在宗角之內是沙子關深井關地賴皮河俱可不設兵應於馬洛孔設兵十名宗角設兵一百名以為長寨內應原議董乃谷隆擺架共設兵十一名查谷隆關最險居各寨之後為羊角􅋭之後門而董乃近於者貢擺架近於谷隆二處無庸另設應於羊角􅋭設一百名谷隆關設五十名據其險要扼以重兵則前後門路通達無阻首尾相應苗夷雖欲為姦不可得巳又廣順州原有駐防兵九十四名今既有長寨大營又有宗角子營則不須多設應於本州駐防酌設五十名以上共兵八百七十名查原議止以大定所裁兵五百名分守各寨今擬添兵三百七十名應於撫標抽撥一百二十名提添設遊擊一員其添設遊擊即以大定鎮裁缺頂補仍於通省遊擊內選調如此庶營伍齊整巡守兼備矣臣竊念各寨頑苗燒殺劫虜荼毒夷民巳駕馭羣苗恩威並濟經營各汛規畫有方其禆益邊疆良非淺鮮皆我聖主之賜也更荷恩諭事定之時許臣具題以軍功賞叙臣伏念諸將職任邊方理應戢靖惡類乃蠢兹仲苗敢於頑抗則平日之懈弛可知及至官兵齊臨猶結夥拒敵又復遷延時日死傷辨丁律以軍法何當議叙但積習因仍一時難返叨沐殊綸期以鼓勵將來就現在將備而論勇怯各殊智愚不一軍前情事臣巳悉知而建營諸務大綱雖皆首惡及川販人等現在追究羽黨其未獲而有住址者現在設法擒拏其先巳逃竄四川者現在移咨嚴緝其所獲男婦子女俱巳釋放領回其奔散流亡者俱巳還鄉復業其所獲牛馬器械什物俱巳賞給兵丁其所獲首級俱巳懸竿示衆其被傷兵丁俱巳分别奬賞其死傷兵丁俱巳倍加優恤并所獲各寨疆界田畝户口租稅現在飭令文武各員逐一清查具冊申報又復札致撫臣何世璂濫先此聲明伏乞聖主睿鑒臣謹奏欣悅覽之雍正四年八月初六日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為敬陳所知以偹採擇事竊惟國家政治祇有理財一大事田賦兵車刑名教化均待理於此財不得理則諸事不振故孔是用人一事自大吏以至於一命皆有其責而一身之分量等級庶政之興廢優劣胥視乎此未可短長用違其材雖能者亦難以自效雖賢者亦或無廢事伏念臣受恩深重報稱實難自昨嵗赴都留侍五日親聆天語以用人為要以得人為難推誠布公虛衷實踐行如日月天下皆見臣自陛辭就道以至今日拳拳耿耿不敢暫忘務期努力奮勉得少有遵循以仰副聖慈無如識見短淺學力未充昧知人之明切返身之聖鑒以申愚悃巳耳除巳經奏聞及未經親見人員不敢冒昧開注外謹將滇黔大小文武另各開一摺各詳注名下恭呈御覽伏乞聖主訓示施行臣謹奏治天下惟以用人為本其餘皆枝葉事耳覽汝所論之文武大吏以至於微辨就朕所知者甚合朕意但朕不過就目前之所見斷不能保其後也覽卿之奏非大公不能如是非注意留神為國家得人不能如是非虛明覺照不能如是朕實嘉之但所見如是仍必明試以功臨事經驗方可信任即經歷幾事亦只可信其巳往猶當留意觀其將來萬不可信其必不改移也上智之資從古難得朕前批諭田文鏡言用人之難有兩句可信者非人何求不可信者非人而何不明此理不可以言用人也朕實以此法用人卿等當法之則永不被人愚矣卿等封疆之任古諸侯也闔省窺伺投其所好百計千方掩其不善而著其善粉飾欺隱何所不至惟才之一字不能假借也凡有才具之員當惜之教之朕意雖魑魅魍魎亦不能逃我範圍何懼之有及至教而不聼有真憑實據時處之以法乃伊自取也何礙乎卿等封疆大臣只以留神用才為要庸碌安分潔巳沽名之人駕馭雖然省力唯恐誤事但用才情之人要費心力方可操縱若無能大員轉不如用忠厚老成人然亦不過得中醫之法耳究非盡人力聼天之道也燈下隨手寫來卿可以意㑹之同日又奏為嚴緝黔省漢姦川販據實奏聞事竊以黔省大害陽惡莫甚於苗猓隂惡莫甚於漢姦川販蓋夷人愚蠢雖性好劫掠而於內地之事不能熟悉權謀巧詐非其所有惟一等漢姦潛住野寨互相依附嚮道引誘指使橫行始則以百姓為利劫殺捆虜以便其利繼復以苗猓為利佯首隂庇以估其財是虐百姓者苗猓而助苗猓者漢姦虐苗猓者亦漢姦也至於川販即漢姦之屬串通苗猓專以捆略男女為事緣本地既不便販賣且不能得價故販之他省而川中人貴故賣至川者居多其往來歇宿半潛匿苗寨沿途皆有窩家既可免官府之擒拏又可通漢夷之消息居則有歇家為之防衛行則有黨羽為之聲援無從盤詰莫可稽查及其路徑既熟呼吸皆通不獨掠漢人之丁口亦復拐苗人之男婦而苗人既墮其術中遂終為所用臣入境以來深知二者之患留心訪察時欲窮其根株猝難尋其巢穴及長寨之役知若輩多藏匿其中隨乘此大舉密令諸將中有才略者細心訪緝借討頑苗之名為搜川販之計合前後所獲男婦大小數百口令文武各員將要犯阿撈阿搗楊世臣王有餘等共十二名詳加審訊鞫其渠魁究其脅從探其窩巢詰其踪跡無論巳獲未獲俱逐一得實除將現在要犯嚴行監禁情罪可原者盡行釋放其巳逃諸要犯隸黔屬者通行捕拏外伏祈聖恩諭令川省撫提諸臣按姓名居址同心密緝務期擒獲盡絶根株毋使漏網庶兩省漢夷皆安而劫殺捆虜之風永靖矣伏乞聖主睿鑒施行臣謹奏卿此心此行不但當代督撫聞之可愧實可為萬代封疆大臣之法程朕實嘉賴焉勉之上蒼照察再無不倍增福夀子孫榮昌之理再兩江非卿不能整理如朕之意雲貴一切事宜俟料理有頭緒時還向卿要一可代之人來兩江與朕出此一大力可留心但諸務不可因此㫖促迫為之常德夀可勝撫任否楊名時朕原欲調進大用今覽卿所奏外任亦甚屬緊要卿意如何同日又奏為分别流土考成以專職守以靖邊方事竊照流土之分原以地屬邊徼入版圖未久蠻煙瘴霧窮嶺絶壑之區人跡罕到官斯地者其於猓俗苗情實難調習故令土官為之鈐制以流官為之彈壓開端創始勢不得不然今自有明以來巳數百年中外一體流土同官既有職銜寧無考察乃仍以夷待夷遂致以盜治盜徒令挾土司之勢以殘虐羣苗隨復逞羣苗之凶以荼毒百姓橫徴苛斂貢之朝廷者百不一二而燒殺劫虜擾我生民者十常八九必須控制有方約束有法使其燒殺劫虜之技無能施為而後軍民相得以安兹准部咨伏讀聖諭以流官有設立吏目者職分卑微無印信可行無書役可遣土司意中倘有輕忽之念則未必肯遵其約束今可否酌土司之大小將微員如何改設重其職守使流土相適地方各安該督撫㑹同密議具奏欽此大哉王言所以為邊方計者誠無微不燭無逺弗照矣除俟㑹同督撫諸臣將兩省各府州通盤合計妥議覆奏外臣竊念流官固宜重其職守土司尤宜嚴其考成土司之考成不嚴則命盜之案卷日積大凡殺人劫財皆係苗猓雖一經報聞隨即緝捕而潛匿寨中巳莫可窺探故無論吏目等微員任呼不應即使府州關移臬司牌票亦置若罔聞十無一解非知情故縱即受賄隱藏其在流官束手無策大吏深難其事不敢咨題多從外結其實得外結者亦復無幾故劫殺愈多盜賊益盛虜人男女掠人財物苗子無追贓抵命之憂土司無降級革職之罪有利無害何靳不為此土司之考成不可不嚴所當與文武流官畫一定例者也據臣愚見事各有專責應分為三途盜由苗寨專責土司盜起內地責在文員盜自外來責在武職責在土司者末減流官責在文員者末減武職責在武職者亦末減文員參罰雖俱不免輕重各有攸分盜由苗寨者是平時不行鈐束而臨事又不行防間此土司之罪也盜起內地者是鄉保不能稽查而捕快又不能緝獲此文員之罪也盜自外來者是塘汛不能盤詰而兵丁又不能救援此武職之罪也以此三者分别議罪土司無辭流官亦服然所以清盜之源者莫善於保甲之法臣屢與督臣楊名時撫臣何世璂熟商酌議擬立規條行之兩省及閲邸鈔知荷䝉聖恩著九卿詳議具奏臣等伏候奉㫖部行到日當即頒行一體遵奉外按保甲之法舊以十戶為率雲貴土苗雜處户多畸零保甲之不行多主此議不知除生苗外無論民夷凡自三戶起皆可編為一甲其不及三户者令遷附近地方毋許獨住則逐村清理逐户稽查責在鄉保甲長一遇有事罰先及之一家被盜一村干連鄉保甲長不能覺察左鄰右舍不能救護各皆酌擬無所逃罪此法一行則盜賊來時合村百姓鳴鑼呐喊互相守望互相救護即有凶狠之盜不可敵當而看其來踪尾其去路盡力跟尋訪緝應亦無所逃至於保甲之外最重者莫如嚴責捕快與汛兵蓋內地之盜捕快多有知情外來之盜塘兵且為通氣平時緝盜之捕快皆宜分定鄉村某方失盜罪在某捕快而捕快之中亦有姦良不一能否不齊又須每十人立一快頭如緝盜不獲者捕快與快頭一同治罪大抵盜情未有能欺捕快者其塘兵之設原以晝則盤詰夜則巡防伊等平日毫無所事每晝則看牌賭錢夜則飲酒酣睡甚或乘空偷竊出人不意種種非為又或夥衆結强唆使劫掠陽防隂助其惡不可勝言必須嚴加號令定為成法使不得不留心盡力盤詰稽查則盜賊既弭而兵丁亦皆可用矣謹具陳明伏乞聖鑒臣謹奏兵部刑部都察院各議具奏雍正四年九月十九日雲南巡撫管雲貴總督事臣鄂爾泰謹奏為恭謝聖恩事雍正四年八月初十日臣齎摺家奴䝉恩賞給驛馬銀兩並捧御賜臣珍器六件果乾一匣到滇臣隨郊迎至署恭設香案望闕叩頭領受訖及本月二十八日臣齎摺家奴復䝉恩賞給驛馬並捧御賜臣紗一箱磁器二箱到滇臣隨郊迎至署恭設香案望闕叩頭領受訖敬啓摺扣恭悉聖躬甚安自入夏來更好臣無任歡忭遍告屬僚蓋一心獨運萬幾過勞慮有不格之豚魚隱施曲成之造乎此設於此有不尊是無人理設於此猶不親是無天理狗子亦有佛性忍自不如狗子乎臣知愧象未識真如而無著生心時參常住知忠孝之通天思勇決以立命顧以鈍根下質振拔殊難若不時時勤惕驅之使前則此心一放精力日減神智不生漸就墮落百不能為將使天下後世謂鄂爾泰濫受殊知不堪重寄自貽隕越有傷聖明則雖骨化形銷痛心無巳天髙地下生生世世其何以自處言念及此臣實不敢暇逸臣並不知辛硃批若稍存慰朕之類亦屬欺隱之寶訓念念自反事事類推惟有實際凛體以毋負我慈父以毋忤我嚴師而巳謹此繕摺恭謝聖恩臣謹奏朕實竭力與諸卿共勉以仰答我大慈大恩皇考之念定矣同日又奏為欽遵聖諭事竊以東川歸滇其烏䝉事宜前荷聖諭與嶽鍾琪㑹同辦理欽遵在案八月二十八日齎摺家奴回敬啓東川一摺復荷硃批是當之極卿與嶽鍾琪商酌不煩朕諭也欽此臣自初奉聖諭念東川新附一切先須安頓各有定規方可相機行事隨經密委各員前往踏勘其形勢田土營汛礦厰俱經禀覆粗具節目臣前擬以援勦左協全營官兵移駐東川巳經陳明俟親加查勘即當題請移營待移營事定應先將巧家等六營地方凡屬頑梗滋擾者或須擒拏或令投獻悉為歸轄流官軍合攻其三靣川省汛營截其去路探穴尋鼠諒無所逃遁但事須慎密未便預為聲張故進取之期難以預定臨時關㑹勢必不及臣於九月初九日謹遵聖諭巳詳細具札密致嶽鍾琪預相啇酌凡烏䝉必由大路以及旁斜曲徑諸可通川者是何地方屬何管轄應飭何員作何防偹一一查算明確一面密諭各員一面密札覆臣以便臨期就近調度在嶽與烏䝉土府無異若不改土歸流三省交界均受其擾或先制烏䝉徐圖鎮雄或一舉兩就出其不意或令二土府互相吞併然後剪除統容臣親歷相度後稍有定算再行詳酌至於東川原駐官兵因循巳久必不能制土夷或撤歸川營或應行裁減俟臣具題聼候部議並俟嶽鍾琪札覆其援勦左協現在將辨雖俱能稱職但新歸之地諸事未定非有控制經營之才不能幹濟亦須揀選調補斯可勝任據臣試看督標前營遊擊楊國華幹練通達兼能詳慎馬龍州知州黃士傑操守才具俱優實心任事䝉可圖而田地礦厰次第清理即國賦可增民生攸賴矣伏乞聖主睿鑒施行臣謹奏欣悅覽之同日又奏為欽遵聖諭事竊長寨一案臣屢經奏聞跪捧硃批剴切詳盡一切情形悉䝉睿鑒八月二十六日接准部文復荷聖諭此案著將各犯交與鄂爾泰審訊窮究詳悉分别定擬並安插撫恤使地方永逺寧謐不受惡苗之擾一一經理具奏欽此伏念仲苗積惡原成於因循即偶加創懲仍均圖茍且故前嵗誘擒阿近猶未及安營而今春長寨餘凶即抗不旋踵勢所必然斷難再誤前據黔省文武各員種種詳禀初則招致各寨頭人揑詞投誠臣不准許勒令進𠞰繼雖以直至六月二十七日擒獲阿搗七月初十日擒獲阿撈八月初五日擒獲李竒然後渠魁皆得羣苗喪膽各寨畏威就目前論劫殺之風似可少戢但良法以圖久逺屢經催飭各吏促將長寨一切事宜彚造清冊以慿相其形勢酌其重輕庶可就中參酌畫為規條至今尚未詳覆及八月十六日聞李竒既獲大局全定即應具疏奏聞了結此案臣因就前後所報諸事擬有㑹稿專致升任鎮臣石禮哈并致提臣馬㑹伯撫臣何世璂公同參酌考訂確實以慿㑹止長寨一案亦不止苗情一事也正擬請㫖容臣親行踏勘方可絲毫無欺並地方一切事宜面與撫提諸臣懇切參議以便慎擇辦理兹捧誦聖諭如見臣心自欽奉之後隨又嚴飭文武各員一應事件查清彚齊以慿親勘俟其詳覆到日臣即一面題報一面起程大抵審鞫凶頑務得實情安設營汛必據險要既先之以重兵彈壓即繼之以清冊稽查按其户口照漢民以行保甲清其田畝借賦役以為羈縻不獨户與戶環相連保并寨與寨互相甘結則容一凶苗而羣苗為之獲罪隱一凶寨而各寨為之靡寧勢不能不互相舉首交為盤查又復使之剃頭辮髮以新其面目懲惰勸勤以收其分别㑹辦俟長寨事結各案稍有頭緒即取道東川親行踏勘總期凛體合併陳明為此具摺並繳硃批原摺併臣摺二扣臣謹奏同日又奏為剪除夷官清查田土以增租賦以靖地方事竊以苗猓逞凶皆由土司土司肆虐並無官法恃有土官土目之名行其相殺相劫之計漢民被其摧殘夷人受其荼毒此邊疆大害必當剪除者也臣受恩深重職任封疆日夜籌思若不盡改土歸流將富强負君父而纍官民故以臣愚昧統計滇黔必以此為第一霑益土州安于蕃經臣拏禁題參後隨分委幹員將各田畝户口銀穀數目逐細清查緣土州安于蕃地土更廣私莊尤多清冊尚未造報現據遊擊楊國華威逺同知劉洪度造報鎮沅土府清冊前來查該土府每嵗額徴米一百石今每嵗應納米一千二百一十二石零每嵗額徴銀三十六兩今每嵗應納銀二千三百四十八兩零是其徴之私槖者不啻百倍數十倍而輸之倉庫者十不及一二百不及二三由此類推又何可勝計再查附近鎮沅之者樂甸地方與元江新平景東接壤四面皆鄰漢土一線緊逼哀牢素為野賊出沒門户其江形山勢尤為險阻且當按版各井䭾鹽要道原係世襲土長官司管轄該長官司刀聯斗昏庸乖戾受漢姦把目主使為害地方民夷怨恨若不一併改流終難善後臣就告發各件即委楊國華同劉洪度止帶兵一百名徑至者樂甸質審案擬相機行事而刀聯斗自知罪無可逃隨即出迎投獻印信號紙但求免死情願歸流帶終身以示鼓勵則强不如安于蕃刀瀚勢不如頑半出寨目因地制宜更須别有調度臣巳面與新提臣楊天縱詳細密商并將各要件逐一開單交付查訪以便㑹辦務期兩省邊方永逺寧謐仰副聖懷而心長力短時切惶悚伏乞聖主訓示遵行臣謹奏朕中心嘉悅竟至於感矣有何可諭勉之同日又奏為報明銅鹽事竊臣到任後清查鹽課據署鹽道楊馝報出雍正三年分額外沙滷鹽一百餘萬斤並石屏等店應節省銀約二千兩當經摺奏入奏銷冊造報在案今查自正月起截至八月終止所收過沙滷鹽共二百三十三萬八千五百斤應獲課銀四萬五千一百六十八兩零除扣還薪本銀二萬一千六十八兩零外該正額贏餘銀六千八百兩零該額外贏餘銀一萬七千二百九十九兩零再九十冬臘四箇月仍該收鹽一百二十餘萬該獲贏餘銀一萬二千餘兩臣料算白鹽沙滷一項但用心調劑不時稽查每嵗必可得餘鹽三百五六十萬有增無減其各地各井一應收鹽發鹽腳費店費以及稱頭鹽工食費等件徹底清有濟也至於礦厰原係自然之利但屬可開之地俱有益無損查雲南各厰課嵗額共不過十萬兩而每有虧缺猶須移抵在該管官吏亦非盡不肖非盡無才實因仍聊且之習有以中之臣今數月來巳將滇黔二省巳開未開巳報未報各礦厰明查密訪粗知情事猶未敢迫速激成弊端統俟勘驗確實逐漸料理陸續奏報外查路南州大龍井銅厰前於春季內辦獲銅六萬餘斤巳經臣摺報兹據糧道張允隨禀單自四月起截至八月終止共抽收課銅買收餘銅又辦獲銅五十八萬八百餘斤合春季六萬餘斤共辦獲銅六十四萬八百餘斤應獲息銀約共二萬二千餘兩再核至年終銅銀合算仍應獲息銀一萬一千餘兩是就此一厰今嵗巳獲息三萬餘兩各厰雖衰旺不同多寡難定然竭力清剔俱不無小補合併報明伏乞聖主睿鑒臣謹奏卿朕之竒臣也朕實實欣幸之至同日又奏為恭報秋收併米糧價值仰紓聖懷事竊照滇省今嵗自夏徂秋各屬雨澤調勻兩迤田畝髙低不一盡得栽插榖穗秀發今各府之早稻巳穫晚稻現刈將半雲南廣南等十七府通計收成俱有九分十分惟楚雄姚安二府夏間得雨稍遲止可八分收成至於今嵗蕎麥逺近飽收髙可至四五尺粒粒圓足每一京石價不過五百錢民間大得接濟目下省城米價每京石賣銀一兩三錢臨安大理等府每石約一兩二錢其餘各府州縣有七八九錢至一兩外者較省城之價稍平蓋非兵民輻湊之故其寧州宜良南寧通海太和等縣雖間遇山水驟衝嵩明彌勒安寧平夷昆明等州縣雖間有冰雹蟲傷然少者僅數畝數十畝多者不過一二百畝隨經該州縣勘驗詳報酌動倉榖賑恤俱不致失所至黔省亦雨暘時若髙下田地皆得及時播種據各屬詳報早稻現在收穫晚榖亦俱結實通省收成約計八九十分省城米價每市斗折倉斗一斗五升每市斗價銀九分各屬之市斗大小不一其價亦髙下不齊以倉斗計算每斗不過四分以至六七分若俟收穫完日其價便可平減似此年豐物阜比户盈寧實由我皇上宵旰乾惕至誠感召之所致臣不勝慶幸不勝感切謹繕摺奏聞伏乞聖鑒臣謹奏卿總督滇黔上蒼自然賜此昭應也深慰朕懷雍正四年十一月十五日雲南巡撫管雲貴總督事臣鄂爾泰謹奏恭請皇上聖安朕躬甚安今嵗更覺健旺皆皇考在天之靈賜佑之所致冬至前後三天大雪盈尺朕甚欣幸特諭以慰卿懷同日又奏為恭謝聖恩事雍正四年九月二十日臣齎摺家奴䝉恩賞給驛馬並齎回欽賜臣御用既濟丹一瓶并方湖筆五匣佛手柑一簍蜜荔枝二瓶到滇臣隨郊迎至署恭設香案望闕叩頭謝恩祇領訖續於十月初二日雲南府知府袁安煜到任口𫝊聖諭汝到雲南下㫖與總督鄂爾泰聞得伊些須小事每辦至二三更天若是勞壞了時不是欲報朕恩反為負朕矣嗣後但辦大事斷不可如此欽此臣既捧誦硃批復跪聆慈訓感激踴躍非口所能述而荷䝉聖鑒宛在心目形之欣悅重以慶幸敬繹一德一心之義君臣期共勉之之㫖心動神依不敢復作三代以下想臣復何言實難以自寬也伏念邊方大事惟賦與兵弼以刑名期於月初四日服聖慮見臣羸瘦若恐不勝煩勞一旦殘廢不能終職者臣身受又係燈下率筆字跡更屬可笑也同日又奏為恭謝聖恩敬陳愚悃事雍正四年十月二十二日臣齎摺家奴齎回御賜臣人參八斤哈密瓜二箇扺貴陽省城臣隨郊迎至貢院恭設香案望闕叩頭謝恩祗領訖敬啓硃批卿此心此行不但當代督撫聞之可愧實可為萬代封疆大臣之法程朕實嘉賴焉勉之上蒼照察再無不倍增福夀子孫榮昌之理再兩江非卿不能整理如朕之意雲貴一切事宜俟料理有頭緒時還向卿要一可代之人來兩江與朕出此一大力可留心但諸務不可因此㫖促迫為之常德夀可勝撫任否楊名時朕原欲調進大用今覽卿所奏外任亦甚屬緊要卿意如何欽此臣伏讀之下感極愧生念臣身荷殊恩至矣盡矣心實無巳行多不逮業業兢兢時恐隕越上蒼照察臣實不敢自欺至於兩江重任原非臣愚所能勝然誓欲酬兹䝉聖諭不敢不盡言之一夷情之無制也查雲南土官多半强豪所屬苗衆悉聼其指使殘暴橫肆無所不為其土官懦弱者凶惡把目為害尤甚不但目無府州亦並心無督撫及至事大經官或欲申理夷等暗行賄賂揑詳結案上司亦不深求以為鎮靜而刁抗不法任拘不到者又復不可奈何隱忍了事貴州土司單弱不能管轄故苗患更大平日燒殺劫虜拏白放黑以為生計有徑至城汛捆人子女明說某處勒令取贖者而本家不得巳哀贖地方文武亦視為故常隱忍了事至於或經控告凶犯百無一獲而原告原報并干證人等反拖纍至即使拏幾土官殺幾苗首亦不過急則治其標本病未除恐終難寧帖一軍伍之不振也雲南兵丁不減內地即貴州兵弱亦猶勝江南奈武員因循成習惟事逢迎羣聚省城鑽營朋比有纍升至副參而未一到營者營伍何賴臣受事後首經嚴示房鑼鍋斧橛等項大半不偹即火鎗弓刀操練必需者亦多殘缺至於空糧夥糧種種名色倒馬朋馬種種勒侵相沿巳久視為常例即有努力自愛之員亦未免避嫌從衆雖經臣確訪嚴飭寬其既往勉其將來業據各屬陸續禀報軍器俱現修整糧馬俱現頂補然猶未敢深信臣自滇赴黔巳經由曲尋鎮援𠞰左協尋霑營過安籠鎮屬安南營盤江營普安營至安順提標抵貴陽營省城俟審理事畢擬由黔西協大定協威寧鎮抵東川府再回滇省仍擬明嵗親歷雲南各標協營查勘軍裝朦矣一地利之未盡也雲貴兩省雖地少山多然水旱均平荒年甚少且礦厰鹽井出産頗多何至不如江南一府計每年協餉共需數十萬兩為百年計竊有隱憂臣查雲南鹽課實李衛之功雖尚有疏漏實力有不能銀銅各厰每至缺額仍須羡餘抵補臣料斷不至此貴州亦有礦厰兼多砂鉛欲私開則明有官禁欲官開又難於私侵因循茍且大半中止至於鹽井原屬地脈流滇通蜀不應外黔今採訪鹽井共得數處現煎試一井巳有微效託賴聖仁山效其靈地呈其寶或可以得濟民食也雲貴荒地甚多議者謂宜開墾不知利之所在人爭趨之不禁其開墾而不來開墾者緣荒地多近苗界實慈訓一水陸之不講也雲貴逺居天末必須商賈流通庶地方漸有生色今水路不通陸路甚險往來貿易者非肩挑即馬載費本既多獲息甚微以致裹足不前諸物艱貴臣查湖南水路直達貴州鎮逺府由鎮逺而施秉由施秉抵黃平州界雖中有阻礙臣今現巳開通黃平州地方雖山髙水陡不能行舟然不過一二站若由重安江溯源而上漸次開濬亦原有河路自貴陽而南水路難通然開平旱路使可行車猶人力所能為况雲南金沙江原通蜀粵東川府牛欄江直通四川貴州永寧州黎平府可通川楚疏決導引縱一時難措而日積月也來即遲至十年二十年但能成事實雲貴永逺之利也以上四條撮舉大要節目繁多不敢瑣瀆臣不自揣思欲鏤肝剖膽略定規模使後來勝臣者可以推廣即不及臣者亦可以依循斯臣力既竭臣心稍慰仰懇聖恩兩江另同日又奏為欽遵聖訓事竊臣敬陳所知一摺荷䝉硃批治天下惟以用人為本其餘皆枝葉事耳覽汝所論之文武大吏以至於微辨就朕所知者甚合朕意但朕不過就目前之所見斷不能保其後也覽卿之奏非大公不能如是非注意留神為國家得人不能如是非虛明覺照不能如是朕實嘉之但所見如是仍必明試以功臨事經驗方可信任即經歷幾事亦只可信其巳往猶當留意觀其將來萬不可信其必不改移也上智之資從古難得朕前批諭田文鏡言用人之難有兩句可信者非人何求不可信者非人而何不明此理不可以言用人也朕實以此法用人卿等當法之則永不被人愚矣卿等封疆之任古諸侯也闔省窺伺投其所好百計千方掩其不善而著其善粉飾欺隱何所不至惟才之一字不能假借也凡有材具之員當惜之教之朕意雖魑魅魍魎亦不能逃我範圍何懼之有及至教而不聼有真憑實據時處之以法乃伊自取也何礙乎卿等封彊大臣只以留神用才為要庸碌安分潔巳沽名之人駕馭雖然省力唯恐誤事但用才情之人要費心力方可操縱若無能大員轉不如用忠厚老成人然亦不過得中醫之法耳究非盡人力聼天之道也燈下隨手寫來卿可以意㑹之欽此臣身受殊知不忍自棄雖為國家得人之義未敢忘公而虛明覺照之誠實難斯信捧誦天語內顧驚慚臣獨何心敢不益自奮勵凛體終身至於明試以功臨事經驗信其巳往觀其將來杜窺伺欺飾之源别庸碌才情之用敬繹寶訓目朗心開此固經權之極則政事之要樞覺因材器使之論猶屬後起未為先覺者也恭惟我皇上至誠至明無偏無倚如日在天中魑魅魍魎無所逃遁而寸木小草均被栽培若或自避陽和何由曲施化育人皆自取天本無心大小臣工羣知審所自處矣臣念可信不可信原俱在人而能用不能用則實由巳忠厚老成貪官之弊易除清官之弊難除實緣貪官壞事人皆怨恨樂於改正清官誤事人猶信重礙即更張也但有守有才者實難多得而有才無守之人駕御稍疏即不用於正惟能動其良心制其邪心使彼熟知利害漸愛身名然後可以濟事臣自揣不逮當努力勉之貴州撫臣何世璂自奉聖諭附札郵寄臣弟鄂爾竒荷䝉聖恩補授工部侍郎業具疏奏謝外竊爾竒少有志氣才具亦不甚庸但每多偏執㑹即係陳奕禧之孫合併覆奏臣屢荷恩綸比擬逾分一言一字熟㑹深思敬念我奏同日又奏為欽奉上諭事竊臣於九月十九日以烏䝉事摺奏後嗣於十月十八日接部咨以川督臣嶽鍾琪特參土府一疏復䝉聖㫖俞允各委文武大員㑹審臣隨於途次遴委曲尋鎮總兵官劉起元併糧儲道張允隨前赴東川且密囑劉起元止隨帶健丁百人餘選精騎在營靜候俟川員到日㑹商妥確相機行事去後因復札致嶽鍾琪與之相商務期共體聖意謀出萬全及十一月初十日臣由長寨回黔省嶽屬民志未齊待移營之後諸務俱就然後計及烏䝉一舉可定今嶽鍾琪既經題請奉㫖㑹審自難刻緩在土府祿萬鍾癡蠢小兒招縛殊易而伊叔祿鼎坤跳梁巨惡就擒稍難必將兩凶一齊拘到則改土歸流庶能有濟正恐以疑畏之心生驕悍之計則文告不從武功須預且烏䝉鎮雄地連唇齒乘機因便並當剪除隨經札覆嶽鍾琪逞頑肆虐勢埒罪均大凡四省劫殺之案多由三郡酋虜諸凶總以逼近鄰疆沿成惡習殺人虜人越境以逃緝人拏人隔省無法幸而擒獲償牛償馬視人命為泛常一或潛踪移咨移關目官府為故事凡此卷牘叢集如山故三土府不除則四省界難靖臣意先將烏䝉鎮雄兩府俱定即當移致廣西督提諸臣㑹審合𠞰改土歸流伏乞聖主密頒諭㫖俾令先事預謀同心協力則雲貴川粵邊疆寧謐而民皆安堵地皆樂土矣臣謹奏所論甚是巳密諭韓良輔矣陳時夏有母在家欲告假接其母同赴任所朕許命地方官送來可以不用伊親往伊深感情願爾可與楊名時委一微員同陳時夏之弟一路用心照看好好送至蘇州可命乘驛前去爾等亦幫助費用令其如意即伊家中亦為之安頓妥協不可令其母繫念爾等併時常照看將此亦諭楊名時知之再起身日期不可催迫遲早取伊母之便有年紀人路上著好生照料隨便歇息行走不必因乘驛定限特諭同日又奏為欽遵聖諭事竊臣於十月初四日由滇赴黔於二十一日抵貴陽省城恭祝萬夀後即親往長寨由定番州經威逺汛抵谷隆關沿關陡竣幾無行路今雖鑿開小徑尚須平治及登關逺望各寨分明頑苗盤踞其內洵屬險要由谷隆而進峰嶺崚嶒叢箐隱密人跡罕到復由羊角􅋭經巖底冗磉等十數寨始抵長寨營凡住五日得以遍查各寨相度形勢酌定規模大抵仲苗凶頑皆由恃險負固得肆猖狂凡燒殺劫虜之犯即明知其人無論十數名兵役不敢直入而巢穴詭祕亦難以搜捕如者貢同筍羊角羊城焦山打壤等寨實藏姦之所此數百年來所以因循忍事莫可如何而地方難以寧謐也現今諸惡雖擒猶未盡獲羣苗雖靖猶未盡歸況兵器不收則凶具尚在生資無計則惡焰難消伏讀上諭於審訊之下必繼以窮究安插之中必繼以撫恤籌先善後洞燭精詳固不獨定廣二州當下受福仿行通省實可以謀永逺臣凛體聖㫖宣布皇仁業於長寨等處通行告諭苗衆歡欣遵奉惟謹三日之內除前所收五十七寨外復有數十小寨焚香接踵頂謝天恩除前進勦之時所獲大弩弓七十三張箭筒十一箇箭三筒刀二十七把皮盔二十一頂皮甲二十七身標十二桿外兹復督令將兵流土等官各寨搜查又得大弩弓四千二百一十七張箭筒三千四百五十七箇藥箭三萬餘矢環刀五百六十一把挑刀一百六十九把雜刀八十四把皮盔七十六頂皮甲三十八身棉甲一十四身標四百六十二桿交鎗二門其尚有收繳未盡者務期搜清永除凶具至於田畝前巳經丈查非臣過於苛求實欲借以羈縻應俟田戶全歸後再定科則報部其現在各寨前經逃竄有失耕種所有今嵗應納額銀一百四兩零臣巳宣示恭懇聖恩豁免所有告諭八條另繕呈御覽料理粗定復由火連忙馬洛孔等寨以抵宗角通查所造營房巳十有八九月內可以完竣遂由廣順州回省審理苗販各案抑臣更有請者苗性愚蠢不知官法不聞教化故得肆意恣行今長寨既設有武職彈壓巡防仍當設一文員宣諭開導查貴陽一府有同知一員通判一員同知原有理苗之銜定廣實頑苗之藪請即以貴陽同知移駐長寨就近料理庶兵民相安再打壤一寨接連竹林井口大案凶犯多出其內臣緣未經親勘故前議猶有疏忽終不敢稍有回護將就了事查羊城􅋭雖險與長寨相望不過二里且非出沒要路設兵三十名儘足防守原不須七十名長寨既設有參將留千總一員亦足供驅遣臣傳同諸將酌擬於羊城􅋭減兵四十名於長寨營減兵二十名撥長寨把總一員移駐打壤則與焦山汛同為右翼而竹林井口等寨俱得伏制矣除審理各案事畢一廢弛非大聲急呼猝難振拔用兵之舉實出不得議雖經臣嚴飭猶復支飾遷延若非聖明獨斷指示周詳此舉終無頭緒苗患正未有底止也其前摺內開未獲惡苗姦販各犯有續經石禮哈馬㑹伯委員拏獲者臣到長寨又飭拏首惡季成等十餘人到案其餘躲避諸犯雖查訪巳確不難遣兵立擒但羣苗甫安驚魂未定若再行遣兵勢皆鳥散必致流毒地方臣現密交定廣協副將馬世龍楚雄府知府張廣泗設法誘擒諒亦無所逃遁至於劉業浚不職斷難姑容臣親勘形勢偹悉情罪應俟敬陳長寨始末一本奉㫖到日據實叙參聼候部議再臣前請酌撥撫提標兵移駐長寨摺內荷䝉硃批酌撥甚當但有不得巳便添設數百兵能費幾何錢糧總以地方平靜安妥為要可題請奏聞如實足用則巳欽此仰見聖主眷注邊方慎重營伍之至意臣敢不凜體但查撫標現存城兵一千五百名今抽撥一百二十名提標現存城兵二千六百名今抽撥二百五十名儘題請外合併奏聞謹具摺奏伏乞聖主睿鑒臣謹奏雍正四年十二月二十一日雲貴總督臣鄂爾泰謹奏為恭謝天恩事雍正四年十一月二十日臣進獻土物家奴回抵貴陽荷䝉聖恩賞收并御賜臣貂皮五十張本月二十四日管撫臣楊名時承差復齎回欽賜墨刻御書魏徴十思疏一幅到臣及二十五日臣自貴陽起程至二十七日於清鎮縣屬鎮西衛地方臣齎摺家奴䝉恩賞給驛馬齎回御賜臣貂尾冠一頂袍縀九聯鹿尾鹿肉一簍哈密瓜二箇到臣計在黔一月四奉恩賜榮幸巳極臣隨於各日跪迎至行署恭設香案望闕叩頭謝恩祗領訖謹啓摺扣敬誦硃批荷䝉聖主矜奬過分比擬逾倫望希大夀勉作竒臣至有中聖主臨御以來事事遵承聖祖言言必稱天參贊化育惟天下至誠臣等親際唐虞不能許身稷契巳深慚愧顧復何心甘漢唐賢臣之不如勤勤勉勉只所以自盡實不能仰副萬一乃屢荷殊褒捫心滋懼敢不益思奮揚以竭綿力續接家信知於十月二十六日欽奉特㫖補授臣雲貴總督加兵部尚書銜兹於十二月十八日巳准部咨行知臣隨恭設香案望闕叩頭恭謝天恩另疏奏誠必敬矢勤矢慎時時問心勿自昧天良巳耳謹此繕摺齎奏伏乞定臣擬於除夕回省朝賀元旦令節再往霑益州適中之地就近料理統俟事畢回署日具疏題報合併聲明臣謹奏是同日又奏為欽遵聖諭事竊臣烏䝉鎮雄摺內荷䝉硃批徐徐斟酌為之此事急不得嶽鍾琪巳請身到成都就近料理涼山普雄等事朕巳允其請此一大事全賴二卿協衷勉力為之也欽此伏念臣身受殊知叨膺重寄邊方大事敢不謹慎但事在審機法惟遵制若機無可乘原不妨遲緩倘事有可圖則務宜神速如烏䝉土府一案既經川督臣嶽鍾琪題參革職奉㫖各委大員㑹審則祿萬鍾等出而聼審自應按罪定招抗不赴審即應遣兵擒勦名正言順不待再計者也臣自接准部咨訪查烏䝉舊事康熙五十三年曾奉欽差侍郎噶敏圖㑹同雲貴督撫諸臣齊集畢節縣提審各案土府祿鼎乾抗不赴質坐待兩月餘不得巳令流官入烏作當換出祿鼎乾及至到案並無嚴凶焰益熾而至今主文劉建隆猶有不敢正視烏䝉之語查烏䝉兵馬共不及一萬所恃者惟標刀弓弩大炮止二座鳥鎗不過三百桿渠魁止祿鼎坤握其大勢又與祿萬鍾母子不和而祿萬鍾年才十五一聼劉建隆主使毫無知識但得祿鼎坤其餘俱可應手料川省委員必不能拘提到案因先示以不可犯次示以不忍殺隨於赴黔之便沿途酌派官兵并各土兵俱令各在營候調聲言烏䝉少抗即擬進𠞰一面密檄署東川府黃士傑密差幹役入烏打探并覓熟識土目之人前去開導曉以利害明告臣舉動一面委總兵官劉起元糧道張允隨先赴東川料理一切候川省委員到日再赴威寧㑹審并移知川省督提諸臣去後續據黃士傑呈送祿萬鍾祿鼎坤詳文俱稱烏䝉與東川緊連去滇省不過六百里情願照例撥歸雲南等語臣隨以烏䝉原屬川轄今欲歸雲南事關題達仰候酌奪至於奉㫖㑹審之件本部院與川督部院事同一體順則䝉福內止提達木一人並無祿萬鍾祿鼎坤等且無革職摘印拘審字樣遂得藉口支吾不前而祿鼎坤狡黠自領數十頭目并土兵數百人前來江界差頭目請黃士傑㑹話黃士傑禀明總兵糧道帶領數人親往江界諭以順逆曉以禍福祿鼎坤見並無一兵感泣畏服遂率伊二子并各頭目隨至東川并剃頭改服以明輸誠之意及臣本月十三日抵東川前一日祿鼎坤父子迎至百里外匍匐道左情詞哀切隨行至郡臣各賞給縀匹銀牌面加飭諭并委為土守備令隨同遊擊張鶴前去土府招喚祿萬鍾等及十九日據土府祿萬鍾詳稱欽奉天㫖革職憲牌提審未䝉兩省憲員知照在於何處何日臨審懇恩寬限俟將案內提審人犯催齊親領赴轅等語至二十日亥刻又據張鶴祿鼎坤各禀報祿萬鍾母子並無異詞奈被劉建隆楊阿台等協同鎮雄范掌案紐紐巴等唆撥挾制斷不肯令出去非先擒此數人不能了事等語臣隨酌撥官兵當夜檄行去訖該臣看得祿鼎坤既經投到烏䝉大勢巳無能為雖遣官兵直抵土府料亦不敢抗拒大約半月內俱可平定烏䝉改流目下不難設官安營嵗需費帑銀數萬有名無實終於無補況恩威寬猛之間少有未協猶恐滋後患臣受亦不能待合併聲明臣謹奏為此一事朕不能釋懷萬不料其如此完結實非人力朕惟以手加額心叩蒼穹我聖祖君父在天之靈賜佑耳此事豈不用張弓持矢所能了者國家祥瑞之事卿之竒功也朕之慶喜筆難書諭同日又奏為據實奏聞事竊臣家奴齎摺抵黔內奉硃批何世璂恐有書生迂習未知可能料理黔省正在振作之任否據實奏聞朕意欲易之欽此伏念黔省吏治因循委靡由來巳久隱田荒土從未一清礦厰銅銀誰經親驗而燒殺劫虜之案毫不關心惡夷姦蠧之防動則束手非有振作之才難堪料理之任誠如請留黔俾臣得同心協力依次料理一二年後將有規模至於軍務苗情鄰省野夷等件臣當加意總理斷不敢以逺在滇省少有諉卸也謹據實奏聞伏乞聖主睿鑒臣謹奏覽卿此奏朕放心矣同日又奏為欽遵聖諭事竊臣進貢家奴抵黔欽奉硃諭陳時夏有母在家欲告假接其母同赴任所朕許命地方官送來可以不用伊親往伊深感情願爾可與楊名時委一微員同陳時夏之弟一路用心照看好好送至蘇州可命乘驛前去爾等亦幫助費用令其如意即伊家中亦為之安頓妥協不可令其母繫念爾等併時常照看將此亦諭楊名時知之再起身日期不可催迫遲早取伊母之便有年紀人路上著好生照料隨便歇息行走不必因乘驛定限特諭欽此臣隨敬録硃諭齎送楊名時并札囑預先料理外恭惟聖主曲體下情無所不至用其子并念其母慰其心更恤其家身受者難安見聞者增感而臣伏讀數四泣下沾襟重念臣父家居十五年時臣弟兄俱幼臣母拮据倍常逮婚嫁事畢窮乏益甚續臣襲世職充侍衛臣父謝世臣母甘㫖不能繼憐臣最篤望臣最切及雍正元年臣疊荷殊恩而臣母巳先三月見背故自任江蘇擢雲南臣富貴巳極而飲食服御亦未敢稍事華美者痛念臣母不及待恩榮不忍令妻子輩過分受享也兹奉恩諭照看陳時夏之母淚從中來不能自止聞伏乞睿鑒臣謹奏同日又奏為敬陳東川事宜事臣自長寨事竣於十一月二十五日由貴陽府起程過威寧鎮至東川府此三百六十里內人煙俱寂雞犬無聞惟隔三十里有塘兵二三名茅屋數間而入山處古木參天逺山處平疇萬頃取用盡屬良材墾治皆為美産然而田皆蒿萊地盡荆棘耕種不施漁樵絶跡者則以地近凶夷徒齎糧以資寇盜故民不肯為官不敢問而近城數十里內肥饒之土亦半拋荒雖藉口烏雄之侵擾實地方有司之不用心也臣住威寧兩日查勘一切見西北康家海子一帶一片積水長可百餘里細詢土人俱稱明季原曾開田舊有河三道後因河身淤塞無處泄水故廢棄至今臣隨尋看河身三道河形仍在緣下三十里為白石崖所阻故爾漲漫查白石崖傍有土山可以開挖通流約略工價不過三千兩倘得成熟可出米數萬石較稻田壩八仙海子更屬近便臣巳面委文武各員逐細勘估擬於明春捐價興工及十二月十三日抵東川雖城垣傾圯人户蕭條然而覩其山川察其形勢按其疆畝稽其厰地固膏腴之府物産之區也坡坂宜蕎原隰宜稻田髙水活旱潦無恐緣歸流之後仍屬六營盤踞諸目逞凶嵗遇秋收輒行搶割故改土三十年仍然為土所有而文武官員離省二千里長寓省城每於終嵗文來收租武來散餉此外皆不復問自聖主御極以來各加整飭雖文員到署武職到營而因循畏縮錮習難返墾田開礦之議從未與聞今臣所至之處宣揚聖德播告天威土府雖尚未除而道路所經無不惕栗凡於官辨兵丁申之以訓詞給之以奬賞并𫝊諭六營長諸頭目賜以銀牌牛酒無不踴躍帖服惟命是從隨復按籍稽查逐欵清理據東川定額嵗賦不及四百兩並無秋糧設兵一千名嵗需米三千五百餘石每石議定折銀一兩六錢四分係於成都藩庫請領今既歸滇來年春季即該滇省放給而現在倉儲並無米石臣查得舊有官莊一十九處每年納租米一千四百餘京石係文武各員私收之項今應歸公又查得舊有祿氏莊三處共十三村每嵗約有租四百餘石祿氏原係獻土之婦今祿氏身後無嗣亦應歸公查此二項通共可得租米二千石現在可充軍糈再合郡隱漏田畝甚多應趁此逐一清丈按畝升增每嵗兵糧量可資給不須更慮至於拋荒地土半屬良田通計開墾不下數十萬畝一時難以招募且開墾定例六年後升科亦緩不濟事臣現巳置買耕牛捐造農器擬於者海漫海等處蓋房百餘間先墾田萬餘畝雇工分種明嵗秋收即可得糧二萬石除添放兵米外用備修理接濟厰民諸事可以調劑查東川礦厰頗多前川省未開亦以米糧艱難之故現在湯丹一厰臣巳採試礦苗甚旺就目前核算嵗課將及萬金此外如革樹等厰凡十餘處待米糧足用通行開採雖或衰旺不一皆不無小補再東川地方遼濶營長伙目侵占田畝私派錢糧甚至縱夷劫殺綁虜平民非一知府一經歷所能遍理查巧家一營逼近烏䝉去府窵逺歷遭烏酋殘踏似應設立一縣將馬書弩革米糧壩以扯汛等處歸併管轄者海地方素通烏䝉暗行不法應將縣典史移駐者海將革舍阿固伙紅等處歸併管轄歹補地方亦難府治百里山深箐險應設巡檢一員將五龍卑七法戞等處歸併管轄則補地方逺在江外應設巡檢一員將阿木可徂普毛杉木箐等處歸併管轄如此則凡緊要地方俱有職員分理墾田開礦協辦有人而營長伙目改立鄉約保長一體編甲將稽查既嚴漸染亦易二三年後東川將為樂土矣至於東川營制臣前議請移援勦左協駐防原為東川一府計今若得烏䝉改流則東川烏䝉鎮雄三府必應設一鎮東川又可不必安協容俟烏䝉事定合撥兵數通算糧餉必銀米不至大增然後可以定議臣現同曲尋鎮總兵臣劉起元詳細籌畫應併東川府一切續議事宜再行請㫖合先陳明謹繕摺具奏伏乞奏覽此奏甚為嘉奬賞悅一一從至誠三昧中料理之事朕實不知如何待卿而方於此心不負但實憐卿心血於意不忍耳同日又奏為奏聞事竊照阿墩子奔子欄其宗喇普為西等處緣貼近滇省應歸滇省管轄經雲南提臣郝玉麟四川提臣周瑛㑹勘定擬咨商川督臣嶽鍾琪前督臣髙其倬詳議具題業經奉㫖依議欽遵在案臣准部咨隨檄委中甸辦事原任劍川州知州楊正輔駐防阿墩子曲尋鎮遊擊顧純祖候同川省委員清勘界址交割錢糧并移知川督撫臣去後續據委員禀報略稱阿墩子其宗喇普為西等處頭人俱無異說獨奔子欄素與中甸不和恐歸滇之後受中甸營官鈐制而頭人敦住扎什者舊係巴塘所屬號為小神翁遂造為浮言譯出番信稱不願歸滇以蠱惑衆聼并投訴各署等語臣念受降外夷原以示羈縻既與中甸不和自不應令中甸營官管轄致生事端但奔子欄既經歸滇又不應仍令巴塘營官管轄以滋混亂查巴塘原有三營官若撥一員屬滇奔子欄地方仍令照舊管轄庶幾兩便隨札商提臣移咨川省并檄知委員著令曉諭安慰去後嗣又據委員詳報鶴麗鎮臣張耀祖咨呈大略謂川省委員巳到正調齊阿墩子各處頭人㑹同勘界割歸滇省而敦住扎什獨不遵奉復再三開示歸滇之後並不令中甸營官管轄仍撥巴塘營官來滇管轄伊始終抗拗且率領數百人并馬匹器械等集聚喇嘛寺名為㑹議勢甚梟張而其宗喇普等處又各具番信急欲歸滇恐受敦住扎什之害請兵防護查四川提督給有番民信牌有不願歸滇代為再奏之語故敦住扎什恃以狂悖欽差大人來時亦曾面言巴塘營官差人到洛籠宗行營投遞番信有不願歸雲南受中甸營官管轄的話川省委員見勢不能清交巳俱回省請示等語而提臣郝玉麟并稱川提督咨文內明知昌波奔子欄二處應歸滇省而進呈御覽之册又造入川省巴塘項下並未注明應割分滇省字樣以親勘同議之事自相矛盾甚不可解據此則前此之給牌情節顯然等語臣接准川提臣周瑛咨與郝玉麟咨札無異竊思奔子欄等處既皆內附則歸滇歸川均屬一體維聖主軫念邊方原使各圖寧謐而大臣仰體睿慮詎敢作意區分即番夷各懷巳私但知此疆彼界在權衡應知大體何得朝四暮三乃爾持疑不定至今交割未清況或蜀或滇豈可令頭人自主而孰逺孰近又早為屬吏通知惟上議既定則下情日自有妥議緣欽差鄂竒等回京覆陳情事恐縈聖懷先此奏聞臣謹奏郝玉麟將此情由奏到即詰問周瑛但支吾亂道毫無定見平常人也巳諭嶽鍾琪將敦住扎什調回川省巳議定之事豈可任其自主雖如此諭去恐非奔子欄部落之情願或少生事端今覽卿此奏朕毫不繫念矣硃批諭㫖卷一百二十五之二欽定四庫全書硃批諭㫖卷一百二十五之三硃批鄂爾泰奏摺雍正五年正月二十五日雲貴總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安自去冬以來外緣順序身體更覺好都中內外情形一切平靜卿好麼同日又奏為恭謝聖恩事雍正五年正月十七日臣家奴䝉恩賞給驛馬齎回欽賜臣貂冠一頂四團龍補服一領龍袍一襲御書福字一幅對聨一副并蘋果文旦甜橙廣橙福橘三箱哈密瓜二箇鹿尾鹿肉樹雞關東魚四簍湯羊一隻到滇臣隨率同在省文武官員郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓恭請聖安一摺荷䝉硃批朕躬甚安今嵗更覺健旺皆皇考在天之靈賜佑之所致冬至前後三天大雪盈尺朕甚欣幸特諭以慰卿懷欽此及遍誦硃批望臣最切勉臣甚至數復之餘不能仰視伏惟聖祖之默佑實皇天之照鑒而至誠之感通千里萬里有如響應若賢若愚均被鈞陶此則聖主之所獨契而凡具心性者之所知奮知愧而且感且泣者也念臣身遭異數無有倫比午夜捫心實慚不稱乃復邀殊典賜龍補龍𫀆跪捧之下益深惶悚自顧何人敢當兹非分謹什襲供奉并奏覽同日又奏為恭報雨雪事竊以滇城氣候四時相近伏不言暑臘不知寒三冬之雪尤不多得仰賴我聖主軫念民依逺邇一視躬耕祈榖報穡勸農以先天下達於海㝢仁孝誠敬上天鑒之自郊畿之近訖萬里之遙無不丕應如響隨聲今京師大雪盈尺而滇中之雪亦前所希有冬至前後時氣甚正水能結氷自二十二二十三日為始前後雪約可數寸城外較大各郡縣所報不一大槩得雪處多十二月初十日雪勢尤溥遍及滇黔是日臣正由威寧行八十里至黑石頭地方駐劄帳房次早布帷乍啓雪盈半尺詢之滇省亦復不減總計數月以來天氣雖多晴和而風雨惟時可稱調順正月二十三日春膏竟日田疇霑足現在蠶豆已收麥苖盡茂不獨夏熟可望豐登即秋成亦應占大有謹附摺奏仰紓聖懷臣謹奏深慰朕逺念卿具此丹誠再無不感格上蒼垂鑒聖祖慈佑之理都中今春雨雪亦邀數次浩蕩之恩澤矣同日又奏為覆奏事竊候補通判臣管斾一摺荷䝉頒發到臣捧誦硃批此條奏內除勾去一條或有可採擇之處發來卿看欽此臣謹據愚見僃悉陳之一漢姦宜禁一條查邉境逞凶莫如頑苖而頑苗肆惡専仗漢姦此兩省文武所共知而臣於長寨一案巳痛切言之盡法處之但苗之族類甚繁凡黔粵四川邉界所在皆有今安設營泛兵苗錯處之地雖不能禁漢民之不相往來而劫殺之風自可少息其餘無營泛之寨専屬苗夷聚處原不應許漢民雜居多借貿易之名巧為勾通之計自宜嚴行禁止立為條約遍告漢夷夷民毋得容留漢民毋得擅入況保甲之法已行則鄉保頭人自應稽查地方鄰佑自應首告使皆各有責成違者並坐而流官土司亦各㝎考成舊議以拏獲川販十五名准豫紀録一次夫川販漢姦潛匿凶寨非動官兵難以擒拏又各分巢穴并非聚集一處則以一時獲十五名此最難之事即或前後合算能拏獲者㦯不止十五名然多由外結並不報部故雖有鼓勵之典而踴躍效力之員甚少臣請嗣後凡有擒獲川販漢姦審眀實有通同苗夷劫殺案件每擒獲一起即詳加紀録一次一切劫殺等事俱不姦或可絶跡矣一藥箭宜禁一條臣查凶苗所恃惟有凶器臣自親行長寨巳將㝎廣各寨凶器查繳無餘仿行藏在家以防盜賊凡白晝出門者概不許擕帶其有萬不得已事必欲夜行擕帶兵器者先通知鄉保頭人告以欲往某處擕帶何器何時回家鄉約給以圗書號票所過共幾塘泛則給以幾號票每一塘泛盤驗放行收票登簿每月終鄉保至塘泛查對凡有白晝擅帶兵器及夜行雖不收繳與收繳同但須文武各員奉行嚴眀庶能有濟至於箭藥多自川粵來現巳嚴示并密訪飭拏其拏白放黑之說臣自受事後即行嚴禁犯者懲以重法今此風雖少減尚未能盡淨總俟凶惡土司土目盡情懲創一歸法度後則此患可絶若不治其本縱時加剪伐恐旋除旋長終非逺計也一倉貯宜榖一條臣查積貯之法榖原勝米然實心任事存乎其人不但存七糶三可以長行即青黃不接之時減價多糶俟秋成買補既可推陳納新並可嵗增餘息則倉廩日盈災荒無慮為甚雲貴亦然臣自涖滇以來凡銀折印借民缺勢壓等弊皆漸次禁止其有虧短各屬盡勒限完補踰限不完者即指名題參今巳各知警惕努力急公至於米應易穀雖經一黔省鼓鑄一條臣查黔省地方地瘠民貧故分毫出入必須較量輕戥潮銀所在通行若換制錢必先加戥折色甚以為苦況凶苗雜錯見財即殺人往來行客尤未便帶錢故鼓鑄之議不果行至於黔省産銅原不止威寧一府即不須運雲南銅亦可以供鑄但開採礦厰動聚千萬人油米等項定須預籌若少不接濟則商無多息民纍貴食一旦封閉而衆無所歸則結夥為錢可當銀民自樂利庶幾可以行逺為現今計一書辦擬批宜行禁止一條臣查書辦擬批原係錮習緣上下文移非吏不諳是否定例非吏不熟故官不親理固全憑乎吏官即親理亦半恃乎吏江浙固甚黔省亦未能盡除殊不知吏等作主而蠧胥姦巧窺官之意指乘官之懈怠援例揆情言之確鑿鮮有不為所愚者該通判不准書辦擬批之請固亦清弊之一端但官無識力或少精勤則內幕代勞之說其弊實與書辦或反斷須自主惟據理按律竭力盡心俾胸中不執一成見自權度不至於大差至於才具庸條覆奏伏乞聖主睿鑒施行臣謹奏覽同日又奏為覆奏事竊貴州安籠鎮總兵官臣蔡成貴一摺荷䝉頒發到臣捧誦硃批此事如何應行與否所奏是與不是定議奏聞應具題作卿主意具題欽此臣按廣西西隆州古障地方土目王尚義等一條細查舊案係貴州普安州捧鮓地方苗目阿九等與王尚義等歷年互爭歪染烏舍壩犁魯磉等寨於雍正二年正月控告焚虜無休兩年以來自前督臣髙其倬并貴州撫提鎮諸臣移行粵省撫提諸臣屢經咨催即何世璂到任後咨檄交馳無如西隆地因煙瘴該牧寄寓省城一嵗中惟冬季暫駐其地而一切催徴事務又復倥偬遂至任催罔應則愆期之咎多在粵省今准部咨奉旨令臣與何世璂委大員㑹勘隨經委貴西道吳應龍前往并咨催粵撫遴委大員速集㑹審俟審㝎詳報到日臣等再當㑹議竊思鄰邉地方苗民雜處搶虜為常劫奪不巳姑息因循釀成此習其故多由外結此至當不易之論臣經將分别流土考成使各有専責不致互相推諉遲延不結之處繕摺具奏業奉聖旨諭部議覆在案至於黔粵之交原有大江為界祇因犬牙相錯以致彼此紛爭今若劃江而理江以南屬之粵江以北屬之黔則界限井然防守稽察文員一條臣查此地民苗雜處距州二百四十里止有安籠鎮分防之逰擊一員一切地方事務並無文員管理而武職又不敢違例干預今請添設文員事屬應行但黃草壩地僻民貧飬廉無出若添設㕔貟無論庸鄙者不能相安即清介者亦難以自給據臣愚見㦯改歸安籠㕔管轄則事簡原昧㝎議巳密委員將應分撥黃草壩所屬疆界田畝户口人丁并與安籠㕔道路逺近等項確細查聲操守清白辦事亦盡心雖不無過當處實係好奏伏乞聖主睿鑒施行臣謹奏前卿奏泗城土府一事請朕密諭廣西預偹之摺朕便録與韓良輔諭令凖僃伊回奏許多識見淺鄙之閒論二年韓良輔亦曽奏過此事今奏與前意不符或其間有賄求之弊朕稍疑焉伊奏欲親至滇省與卿靣商朕巳有㫖命李紱同韓良輔前來卿等可將三省交界一切事宜講眀齊心料理方於地方有益若事不畫一恐難措辦並有㫖若有用兵處粵省撫提鎮命卿莭制矣卿可悉心籌畫俟伊二人到來將此定界一事一併合議具奏同日又奏為欽遵聖諭事竊烏䝉一事臣於雍正四年十二月二十一日再經摺奏自臣委逰擊張鶴與投誠土辨祿鼎坤前往烏䝉諭革職土府祿萬鍾赴審去後續據鈔呈祿萬鍾奉有川督臣嶽鍾琪印牌調烏䝉土兵五千名協𠞰凉山效力贖罪求寬期赴審隨據威寧鎮總兵臣孫士魁逰擊哈元生知府楊永斌稱有四川永寧千總孟如林云奉川督臣印牌准調土兵效力贖罪是實竊按改流之事臣初意原欲緩圗緣嶽鍾琪既將祿萬鍾等請旨革職與臣㑹審復札致到臣謂將來抗不服拘囑為運籌預定共圗厥成則係奉旨欽件又自不容少緩為川省計惟有密􅊾營泛各路預防一靣密咨㑹臣一靣委員直至烏䝉摘印提審如或順來則按罪定擬倘行抗違則合兵擒勦國體所關名正言順似無庸再計臣愚兩月以來仰賴聖主仁威招致祿鼎坤來歸宣慰夷衆渙散夷兵即土府母子亦屢欲投獻事巳垂成乃祿萬鍾忽接該總督撥兵印牌見無革職㑹審字樣而烏䝉主文劉建隆楊阿台等鎮雄范掌案紐紐巴等遂有革職並無眀文提審亦無員到我們自屬四川等語臣料嶽鍾琪此舉雖係掉虎離山欲先奪其巢穴以便改流之計殊不思祿萬鍾即出界劉建隆楊阿台必不肯出界即使劉建隆等一同出界遵調效力則既許以贖罪勢難再行問罪若竟行寬免是特參革職請旨㑹審之案難以了結如仍行䆒治則失信於夷人所關更大臣雖未准移知不敢不愈加愼重以謀萬全隨一靣將辦理情形僃細移知川省諸臣并切札飛遞一面密交總兵劉起元并各將辨俱限於十二月二十五日各自營起程二十七日各駐劄所指泛地相機行事徑取土府臣隨自東川起程於本月二十九日回署示以緩勢以安夷心續據各貟禀報自臣回署之後漢姦劉建隆楊阿台等每日計議整㸃夷兵潜窺內地且有鎮雄之范掌案紐紐巴等前往協助帶領二千餘人來攻魯甸又有一千餘人圍繞後山欲殺歸滇之祿鼎坤以堅衆志時左協逰擊張鶴已駐魯甸隨分撥辨兵與祿鼎坤帶領土兵三千餘人由山坳往迎夷賊聞四山炮聲齊起知官兵巳到衆始潰散總兵臣劉起元亦抵魯甸檄令逰擊張鶴及威寧逰擊哈元生知府楊永斌等一靣整兵一面招撫直進烏䝉而烏䝉各寨頭目等沿途投誠者前後巳三千餘户相約剃頭者無算各為宣揚聖德播告天威給以安插告示賞以銀牌紬緞布匹羊酒等物一時歡聲雷動賊等見大勢巳去計無所施而烏䝉之劉建隆楊阿台鎮雄之范掌案紐紐巴等遂將萬鍾母子簇擁上馬并男婦數百名口馬匹財物盡行搬運而去又逼勒烏民相隨從行有行不數里㦯數十里逃回者甚衆是時逰擊張鶴哈元生知府楊永斌等既駐劄土府隨將烏䝉倉庫錢糧户口什物等件眼同祿鼎坤逐一查勘只餘鎗炮弩弓等件並無多物當即封固仍交看管而總兵劉起元亦於正月初二日帶兵抵烏隨分撥兵丁跟踪祿萬鍾等去路續據尋霑營守僃朱廷貴并祿鼎坤等行至戈奎河拏獲李三阿固二人手持漢夷兩書稱係鎮雄土府隴慶侯與祿萬鍾書內有雲貴即有毒意嶽公爺自為作主我們自然來鹽井渡相㑹等語於是各將於老李渡鹽井渡米鐵女白迭大關􅋭等處分兵追擒據報獲有劉建隆妻女等共八人業交威寧府收禁臣看得烏䝉鎮雄互相朋比脣齒為姦今烏䝉已遁土府一空土地人民盡皆內附勢如釜魚籠雀安所脫逃而鎮雄怙惡不悛土府隴慶侯年才十五皆由范掌案紐紐巴等為之主使又有胞叔隴聨星為之飬姦臣於進兵烏䝉時即令取道鎮雄以懾其膽又密令威寧鎮臣孫士魁知府楊永斌誘致聨星聨星自知服罪歸命軍前願求效力兩土府山川形勢俱能熟諳不獨為鎮雄前導并願為烏䝉前驅臣以鎮雄之有聨星亦猶烏䝉之有鼎坤姑令善為羈縻鎮雄之勢又巳分其大半復嚴飭各將并密致提臣楊天縱調撥健兵一同㑹𠞰俟慶侯擒獲則萬鍾愈孤即奔命入川實自投羅網檄札才行後于正月十四日接到嶽鍾琪來札具言給牌之意原以烏䝉負凉山為嵎故特差貟假調兵為名借以踏勘其通凉山之路凉山平則後路絶不妨少待俟凉山事竣即訂期並進先奪其巢穴等語十八日又接來咨巳令遵義協副將張玉帶領官兵一千五百名前來聽候調遣川撫臣馬㑹伯來札亦稱共調漢土兵三千名前來等語總俟川省官兵一到或授意誘擒㦯勒兵立𠞰維今之計須先制隴慶侯後及祿萬鍾以烏䝉已窮鎮雄未艾先難後易一舉兩得料此二凶皆可計日成擒無煩聖慮在臣與嶽鍾琪凛遵和衷辦理務出萬全之眀諭兩地一心原無同異緣嶽鍾琪逺駐陜省難知虛實不得不少有遲回臣以身經其地親見事機不敢不勉效神速總期寧謐邉方何分彼此疆界謹將現在情事據實奏聞伏乞聖主睿鑒施行謹奏所奏知道了祿萬鍾已投到川省嶽鍾琪即奏聞欲問罪正法改土歸流朕巳批諭審眀㝎案一靣奏聞一面解送與卿明白雲貴未了案件後方可定擬連奏有二摺待回繳時將朕批諭隨便發來卿可密觀便知朕辦事之道理矣此事在嶽鍾琪略務巧些彼意以凉山冕山之事不就烏䝉未能輕了見卿調撥神速似少有怪意但皆存為國效力之心即便爭功亦屬快事朕亦欣恱嘉之耳內外大臣但患不爭功也戲筆雍正五年二月初十日雲貴總督臣鄂爾泰等謹奏為奏聞事雍正五年正月二十六日據者樂甸辦事逰擊楊國華報稱雍正五年正月十九日據塘兵報稱鎮沅夷猓不知何故鼓譟突于正月十七日四更時候聚衆數百人將衙門放火焚燒威逺同知劉洪度巳被害防泛兵少不能彈壓乞發官兵星速前來免致猖獗等語又據附近文武各貟報同前事臣隨一面移咨提臣郝玉麟一面飛調元江協副將張應宗新㠄營參將曹登雲景䝉營參將李登科各領官兵星速前往并照㑹臨元鎮總兵官孫𢎞本酌帶本標官兵親赴鎮沅確查起釁實情相機𠞰撫去後又據景䝉營參將李登科禀稱據普威營分防把總何遇奇報稱正月二十三日據鎮沅各夷等訴稱鎮沅府地方自雍正四年六月改土歸流百姓無不傾心恱服不意劉太爺家人踢打人民苛索銀兩今日要草料明日要柴薪終朝苦打每日謝銀三四五錢不等哀求才罷故此我們急了才將衙門焚燒並無别念懇祈轉報賞行安撫等因卑職巳發示曉諭再相機行事等語臣等查得鎮沅土府自改土歸流已經八月夷民帖服並無異議即刀瀚親支凶惡頭目心懷不甘亦未露形跡至威逺猓黑一種從不耕種兼無房舍棲止専以打牲劫虜為生現有命案檄令緝拏嵗內已據劉洪度報眀殺死猓黑一名拏獲五名于鎮沅府監禁在案此案事由或有以激變㦯相約復仇俱未可定除俟文武委貟確查起釁情由并聞伏乞皇上睿鑒臣謹奏據理而論激復二種情由皆有朕前有旨著嚴苗猓黎夷之處分嶽鍾琪奏摺內巳兩次批諭改土歸流固係美事然必委用得人不令野愚小民有避溺投火之想方保永安長治如謂兵威震懾之時視如禽獸任意凌虐苛求若令一思故主所關甚巨等語矣觀此劉洪度必有自取死之道但傷及許多兵民朕心深為惻然當此振作之初必酌中料理疏而不漏方好全賴卿措置得宜料卿自無過不及之慮也題到自有㫖烏䝉鎮雄一奏摺留中此事嶽鍾琪少務巧些朕不甚取此事俟題到自另有㫖如川貟畏難隱諱之處當移知嶽鍾琪不可回護哈元生前取仲苗赫赫有名今烏䝉所效之力實出格外具疏時可一一申明若有副將缺或參將缺當引旨題用此番進取烏䝉官辨俱甚屬可嘉題到朕自加恩議敘祿鼎坤不料如此改面革心非但贖罪兼當論功可著實設法安插令出望外以勸將來事雖就緒善後務要得人卿詳細愼重籌畫可也聞楊國華人亦甚去得未知果否雍正五年三月十二日雲貴總督臣鄂爾泰謹奏為恭逢上聖慶覩殊祥事欽惟我皇上德參兩大道合一清兼聰眀睿知之能念念必欽天法祖綜激濁揚清之用事事皆主敬推誠惟其上下同流諸祥於焉畢致亦且神人交洽百物為之呈奇蓋自御極以來時聞嘉徴屢告日月合璧五星連珠早識天心之協應蓍草叢生嘉禾九穗更知地祇之效靈若夫黃河之水千年一清史冊所𫝊亙古罕見者也臣謹按京房𫝊曰河水清天下平又按易乾鑿度曰天降嘉應河水先清又按王子年拾遺記曰黃河千年一清至聖之君以為大瑞此皆論其理不能實舉其事即隆盛之代間或一見不過逾時逾刻之頃一州一邑之地今閲邸鈔于雍正四年十二月十六日為始上自河南下迄淮徐河水澄清地逾二千餘里期歷二十餘日自古迄今曽未之前聞臣在萬里之外聞兹上瑞歡欣之餘倍切感激蓋河源發自天上見于崑崙之山鍾於星宿之海入於龍門積石之地遍于雍冀豫兖徐揚之間其源流為最長其支𣲖為最盛其性得中故黃流浩瀚其蓄至厚故濁浪奔騰而欲求其清波澄徹輝映千里勢必不能惟我皇上聖聖相承知淵源之有本謙謙益著信德業之彌光亦保亦臨時凛上蒼之鑒致誠致慤常懷聖祖之憑析理如日月常懸無微不燭鏡物似冰霜四映何地弗瑩故瑞氣所覘遂現澄清之象而渣滓盡去乃顯河伯之神此皆皇上本其誠孝之符致此清眀之驗臣等遭逢聖世遘遇鴻庥思登畔岸而未能惟切冰淵以自礪顧復荷䝉聖主巍巍不與蕩蕩難名用錫福於臣工大沛恩于中外各加一級言嘉庶職之劻勷伏念九重實冀羣工之洗滌藉使黃河如帶惟期清白常存乃知聖德同天正是太空不有益信福如川至同頌九如竊願臣效華封申歌三祝誦及河喬嶽欣聞百神之懷柔念維清緝熙仰紹二祖之勳烈蓋誠無不動憂勤即是嘉徴感而遂通警惕長符瑞應矣臣爾泰無任踴躍歡忭之至除俟接准部文恭疏奏賀外謹奏以聞向來朕不深信史冊所載此事不料見於今日朕實惶愧而不敢當益凛敬畏之心發乎至誠惟與卿等竭力黽勉利益蒼生社稷以答上蒼之格外垂恩聖祖皇考之賜佑耳同日又奏為恭謝聖恩并陳愚悃事雍正五年三月初一日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣松糕一匣茶糕一匣酥食一匣燻猪風羊肉一簍抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖謹啓摺扣荷䝉硃批朕躬甚安自去冬以來外緣順序身體更覺好都中內外情形一切平靜卿好麼欽此恭惟我皇上聖敬日躋乾行不息本憂勤惕厲之思為仁育義正之治內外平靜逺邇攸同都中情形自可想見獨念萬幾就理聖躬過勞萬里臣心時切微慮兹屢奉硃批健旺安好實不勝歡忭此固上瑞所從來諸祥之符驗也及遍誦硃批臣不敢卒讀不能仰視惟有對天指日矢此血誠以自免悖負感謝謙抑之詞亦並不能著一語更念臣自覲天顔巳逾一載回憶陛辭之日我慈父眷顧矜憐時宛在心目俯首淚垂現今地方事務止鎮沅威逺尚未寧帖烏䝉鎮雄正須料理計遲至四月俱可完畢此外田畝礦厰各件業巳選委分理彚報總核亦可無悮懇請聖恩俯鑒愚悃准臣于八月末旬起程于十月中旬抵京俾得隨在廷諸臣慶祝萬夀并靣陳一切恭聆聖訓則依戀私忱得以稍申而封疆重寄亦知所自效矣伏乞聖主睿鑒俞允施行臣謹奏今嵗萬夀節朕不受禮地方事務雖少就緒正資料理卿之欲來見朕朕知發乎至誠非具套文之可比而朕亦實想卿凡諸外用大臣陛辭朕不忍别至于落淚者惟卿一人耳況我君臣年紀他日歡聚有日當權輕重而為之不必作兒女態可靜心治理地方今嵗不必來同日又奏為欽遵聖諭事竊土府一案於雍正四年十二月二十一日摺內荷䝉硃批為此一事朕不能釋懷萬不料其如此完結實非人力朕惟以手加額心叩蒼穹我聖祖君父在天之靈賜佑耳此事豈不用張弓持矢所能了者國家祥瑞之事卿之奇功也朕之慶喜筆難書諭又奉硃批嶽鍾琪已奏從滇料理為便自然就近歸滇為是題到有㫖卿只管奉此㫖籌畫料理欽此臣伏念烏䝉鎮雄兩土府擾害邉疆為患三省數千百年來稔惡巳久今仰賴聖天子大知大孝誠無不動感而遂通邀蒼穹之鑒愜聖祖之靈使兩土府聞風授首漢土騰歡計滇黔進兵之期在上年十二月二十七日而得烏䝉土府在是月二十九日祿萬鍾等之投川貟在正月初七日得鎮雄土府在正月十四日隴慶侯等之歸川營在正月十七日兩旬之內二酋同歸實非人力所能為臣何敢冒功所惜漢姦惡目人等惡貫巳盈自絶于天不能見幾于早既巳蹈苗民逆命之罪豈能免防風後至之誅故雖獻土歸印難贖前愆若不將兩地漢姦惡目人等盡法懲治并土府等移置內地絶其根株則雖改土歸流而餘風未殄終貽後患至于改流之後據臣愚見東川烏雄三府應總設一鎮以資控制東川現有一營鎮雄應添設一營以資聲援烏䝉仍設知府一貟魯甸地方添設一縣鎮雄府應改設一州歸併烏䝉府屬其安鎮設營所需官兵糧餉臣現在籌畫抽減那湊亦所增無多統俟奉旨到日一一詳議具疏題請臣務當盡力料理俾得一勞永逸以仰紓聖慮除將兩土府底㝎情由另疏報眀外謹具奏聞臣謹奏籌畫甚是妥協今滇黔數處改土歸流新㝎苗夷正資彈壓烏䝉鎮雄等處擴地甚廣應添兵處不可惜此小費當謀一勞永逸萬不可將就從事俟歸化日久一切如內地一般時再議減撤未為不可當知朕意料理可也同日又奏為覆奏事竊四川永寧協副將張瑛三摺荷䝉頒發到臣捧誦硃批此係張瑛條奏之三摺朕觀此人愚俗蠢夫但向日聲名甚好亦不可以人廢言爾等現今整理烏蒙之事或有可採處發來卿看嶽鍾琪亦照樣發去矣有可採處取用若無用之論不必逐欵回奏欽此臣謹據愚見敬陳大略一各營盔甲宜亟補造一條臣查營伍器械除盔甲外火鎗刀箭尤為緊要旗幟帳房鑼鍋等項皆當齊僃邉方承平日久一切廢弛軍裝不整誠如該將所慮但據稱餉乾既不敢扣公費又無贏餘欲請補造束手無䇿等語臣查標營公費原可騰那倒斃馬價亦有餘剩若提鎮不受禮莭將辨不肆侵分補造軍裝無不足用如必請動正項或又尋别項恐弊將百出後且難繼況一切軍器原取堅鋭並以壯觀近見所造盔甲鎗刀等件多不堪用有名無實將欲誰欺應一已歸流之土民宜從國制一條據稱歸流百姓仍聽土目管轄席其椎髻裹氊之舊宜令剃頭改裝分設里長甲首令百姓輪流充當土目俱遷腹地等語臣自長寨之役凡各寨投誠前後剃頭者巳數千人及烏蒙之役各土兵情願剃頭者又數千人率皆出自本心並非有所逼勒若強令遵依各不情願將惡猓凶苗與齊民無别轉恐為齊民害至于既經歸流則把目伙頭之名自應改為里長甲首但必將土目俱遷腹地令百姓輪管夷民恐兩不相習轉難寧帖臣愚以為撫夷之法須以漢化夷以夷治夷即如土官類多殘刻而夷民畏服並無異志者此正可以轉移之一機但使流官大破因循茍且之習力存委曲開導之意則一永寧烏蒙宜酌量歸併一條臣查貴州永寧縣係威寧府屬為黔蜀交界之地兩省邉境所關當日設縣之意原以兩省聲息可通犬牙相制若以此縣歸川則直至畢節縣方有黔貟勢必另立一縣與川接壤以清界限此不獨城池學校衙署倉庫皆須另建即防汛亦須另增似不聖㫖無庸另議一東川府宜及時振作以圗久逺一條查此條內分析條欵具疏請㫖一烏蒙阿底搆怨土府萬鍾應留一摺臣看張瑛此奏嚴于阿底恕于烏䝉請寬祿萬鍾不及劉建隆等頗有私心未是公論前嶽鍾琪委伊會審移咨到臣續准咨移復改委張玉送伊赴京引見料聞其議論知其無能為也查前烏䝉土官曽搶阿底土官之女從此結讐互相劫掠威寧不能禁阿底川省亦不能制烏蒙所謂排解二字正所以驅之鬪耳臣前過威寧酌調阿底土兵時祿在中等踴躍爭趨相率剃頭改裝者甚衆今烏蒙既㝎誠恐在中等欲乘此復讐橫肆劫掠隨已通飭文武官貟嚴行禁約諒皆遵依不敢妄動其歸流地方仍係土目收納提調之處自應改正但非止阿底一區亦須緩理其祿鼎坤係土府嫡𣲖縱恣狡黠夷目憚畏實屬烏䝉渠魁欲謀土府亦屬實情臣悉此情節故先設法誘致以賊拏賊而烏䝉遂不能支此人終不可留以貽後患臣意欲俟設官安營一切事㝎然後乘其有犯一併擒除諒同腐鼠亦必無所逃遁至于祿萬鍾童稚無知原不必律以重法而劉建隆主文三世一手把持惡目楊阿台白女迭刑即改土歸流猶難善後該將乃請將祿萬鍾革職暫留俾仍約束土人是誰貽禍害川貟姑息類多此意嶽鍾琪自有㝎見決不為所搖惑也伏候聖裁一黎州等處猓蠻一摺臣查制伏猓蠻須用鵰擒之法前于長寨案內業經條議請㫖鎮臣趙儒如果能權宜自應任其調度免致掣肘以待成功至該將所稱先之以寬大禁約泛防官兵等不得希圗小利啓釁生隙庶猓蠻滋事無以藉口等語此實係邉省通弊治夷要務四省以上各條謹據臣愚見分析覆奏伏乞聖主睿鑒其松潘城池商茶二條臣不深知情形未便妄議合併聲明臣謹奏覽同日又奏為覆㫖事竊候補通判程廷偉一摺荷蒙頒發到臣捧誦硃批此摺所奏或于地方事宜有益否發來卿看酌用欽此臣按積榖一條據稱瑞州府所屬髙安上髙新昌三縣地方𥚹小民鮮蓋藏請于三邑常平倉外近水鄊村各設社倉于庫內支銀三千兩買穀存貯俟來嵗夏初照時價每石減五分糶濟民食所糶穀價除歸原項外計得贏餘若干該縣造冊報府並布政司轉申巡撫咨部存案其贏餘之銀俟秋收添買榖石嵗以為常如此不數年而倉有餘穀庫無損帑倘行之果有禆益則凡産穀之處有餘帑農原有餘粟貴糶賤糴上下交濟用意本善事屬可行但奉行不善于地方無益若通行他省更有勢不能者臣愚以為欲行此事在得其人在因其地在酌其時請敬陳大略凡州縣官皆民父母現銀買米誰不樂從然官不親買必假于吏胥發銀之時層層剋減收米之時事事需索是民間之米賣之民間者恆得常價賣之官府者什僅得八九及夏初出糶官減五分吏胥不敢不減而重戥輕升百姓實不敢不依雖大張告示嚴切曉諭百姓亦唯有甘自隱忍敢于告吏胥者百無一二本官方自以減價糶穀平斗便民殊不知百姓受纍已多甚至串通客啇盡賣向外省本地米價從此愈貴纍民更甚此行之在得其人也各地産穀多寡不同水陸逺近亦異若或限以㝎額各支庫銀數千採買如常毋論如滇黔二省每州縣嵗額多不及千百兩民間亦並無多榖難以照行即就江西一省論恐亦難一例臣前任江蘇深悉此弊止可濟以權宜不可著為例額此行之在因其地也至于時有豐歉嵗無盡登今于夏初之間以所買之榖減價糶出據數報部秋成買補設嵗一不􅍄即使價增于前亦復無穀可買而倉儲虧空恐干參罰自必報荒求寬至來嵗買補部議不允則官實受纍部議若允則端不可開均有未便即之在酌其時也得其人因其地酌其時庶幾有益不然即存七糶三之例法良意美而或屬貟朦混上司因循將名為糶官米名為買官米實為不肖官吏掩飾虧空捏稱民缺之資此弊各省皆然雲南尤甚臣受事一年已知僃細欲槩行糾參則一經革職十無一完臣以錢糧為重又不敢不稍有顧慮因嚴切開示仍佯為不知密囑司道等勒限清還除調順寧府韓鍾業經題參外現今完米者十有六七以銀抵米仍待買補者十有八九俱限于閏三月內完抵臣看此輩習染深重終難振拔擬于限滿日通參請㫖一概解任勒限完補限內全完者酌量開復逾限不懇祈聖恩于記名賢貟內府㕔州縣預清除可以調劑矣又墾荒一條據稱雲南麗江其地向為極邉夷郡地土寒薄耕種惟宜雜糧而夷民所食亦惟雜糧凡平曠之處儘可廣種其沿江地方如九河石鼓巨甸塔城等處其地稍暖頗可種稻等語臣惟墾荒之法係民生第一要務到處皆然不獨麗江即以麗江論亦不獨九河石鼓巨甸塔城等處臣查麗江各里可開墾者以阿那灣為第一剌是壩為第二吳烈里為第三他如橋頭茨柯河西阿喜樹苗托丁南山等處皆可開墾但麼㱔等夷不諳耕種兼苦地寒臣已飭麗江府元展成現在招墾并教以作糞攙灰之法目今漸有頭緒即推之他府他省荒田荒地所在皆有所以棄而不墾者總緣荒蕪田土非屬在邉隅即並無水道有田者不肯逺種無力者不能自種且拋荒之地向原無業主一經開墾則羣起相爭甚至夥衆搶割結訟不休而地方官又並無條例可以約束可以鼓舞此荒田甚多而墾荒者甚少也在滇黔二省曠土尤多如黔之威寧地土較寒不種稻榖即雜糧亦少臣經歷其地查勘城南有海子地可在軍前協辦糧務尚未就理俟河工告竣亦用石灰暖土竟令種稻以視雜糧更為得濟如滇之東川田疇尤屬平衍有蔓河者海二處尤為沃壤臣已捐發三千兩先買水牛一百頭蓋房六百間招民開墾酌給牛種房屋復給以現銀為半年食米之費其自外州縣來者又給以盤費為搬運行李之資現今招集巳有四百餘户續准管撫督臣楊名時亦捐三千兩司道以下各願捐輸約計共有萬金二處開墾巳可足用但兩省地廣力不能遍薄産羣知力田之榮各為治生之計滇黔兩省永沭聖澤于無既矣除墾荒一件臣當再加詳議㑹疏奏一併陳眀伏乞聖主睿鑒施行臣謹奏覽同日又奏為報明夷猓橫逆遣發官兵擒獲情形事竊照鎮沅夷賊勾通威逺猓黑于本年正月十七日夜放火焚燒衙署殺官劫課縱囚作亂臣據附近地方文武官禀報即與提督臣郝玉麟各調遣官兵前往𠞰擒并查起事情由去後一靣檄行糧道撥運附近倉米以濟軍食一面與管撫事督臣楊名時聨銜奏報在案據臨元鎮總兵官孫𢎞本元江協副將張應宗新嶍營參將曹登雲普威營參將邱名揚景蒙營參將李登科臣標升任逰擊楊國華元江府知府遲維璽等陸續呈報帶領官兵土練前往鎮沅賊人分布把住要隘意在拒敵據新府住民并差去打探之人回禀係鎮沅參革土府刀瀚族舍目把衙蠧人等或稱署府劉洪度編糧苛刻㦯稱洪度家人勒索銀錢威逼寨民致姦民同謀不軌其為首者係刀西明等糾合猓黑共千餘人放火劫殺等語當即揭示各村寨許附和夷民將主謀造意之人擒拏首報准免其罪並遣撥辨兵將威逺普洱者樂一帶凡通鎮沅隘口嚴加堵截毋令越界兔脫屢次招諭投誠乃各賊自知謀叛巳成又勾引鄰境脅令同謀而威逺頭人刀國相等不肯從逆回書拒絶到營出首各賊益加猖獗巡至營盤山後見林中箐下有賊四五百人各帶器械在彼埋伏即發辨兵前往邀堵賊竟鳴角放炮呐喊來迎我兵放鎗打死賊黨三人賊衆始退拏獲逆目袁正綱等把總洪朝望等行至優里山有賊千餘人拒敵及被兵截散當晚復來劫營活拏叛賊余老二供同夥夷人有五百窩泥有四百猓黑有三百大頭猓玀有二百擺夷有四百領頭是土官的老兄弟刀應才圈玀的周猓玀黃莊的張把司我們山背後的猓玀原說到鎮沅再齊些人還要打者樂出景東去等語各將查訪既確議以元江協副將張應宗帶領官兵由他郎界牌中路直衝其前新嶍營官兵由哀牢者樂橫搗其左景蒙營官兵出景谷至抱母徑斷其後普威營官兵于威逺各井分禦其右訂期于二月十四日㑹同進兵直抵舊府衆賊各皆逃散惟革職土府刀瀚之子刀輔宸帶領夷目刀沛等十數人迎接隨入土府十五日據刀沛等帶領刀西眀刀西進齎部頒府印一顆來行營投獻提標逰擊曹士貴帶領兵丁往禦猛統圈帖要隘路獲二人搜出王吏目鈐記一顆關防一顆隨將府印交署鎮沅府事師宗州知州章元佐赴任受事將要犯刀西侯等各設法拏獲有頭人刀波幸陶小保自首獻出鹽課銀二封起出賊人皮甲二身皮盔一頂官兵鳥鎗一桿鹽課銀七十兩賊人收銀簿一本分出刀鎗單一紙把隘議單二紙查閲賊簿所搶鹽課共重一百三十五斤劫去發散各賊數目開載甚明又按簿搜追于二十九日差把總吳起鵬等拏獲户猛寨夥賊陶小五等共搜出課銀八百五十七兩四錢左插刀九把盔甲器械鹽課帳簿俱交署府收貯鹽井大使沈大倫王廷伯等各皆回井查㸃鹽斤漸次搜獲俟另冊清報先後投誠各夷民俱各安插在逃各賊現在分兵追捕等情各到臣臣查雲南魯魁山接壤哀牢向住各種猓賊招出楊方普李四姓賊目授以土職安插于元江新平地方管轄猓夷日久弊生其子弟宗族倚土職之勢壓制猓夷反為討保頭錢之樁主各占地方搶殺相尋官兵進勦遁入威逺土州及普洱等處莫能追捕先經前督臣髙其倬拏獲索保之馬德即行處死至雍正元年猓賊大頭目方景眀普有才等率衆作亂當經發兵𠞰擒處決發落尚有普有才脫逃未獲附和之猓夷亦未盡𠞰滅雖設立普威營官兵控制又將威逺土州改土歸流而夷性狡悍野賊之患仍未能消弭臣於上年二月到任後體察夷情檢閲舊案隨經宣布皇上德威再四推誠開導不意野賊白得愍不畏死猶敢糾衆行劫楊文魁等家并殺死開厰者八人俱經報參疏防職名在案臣密令新平文武調遣兵練查拏白得等先則逃避深山繼則執械拒捕致被兵練放鎗打倒梟取首級拏獲窩主李育芳并白得之夥盜現禁省城審招臣赴黔之後又兩次據報威逺猓賊放火殺人是以臣又令署鎮沅府事威逺同知劉洪度查拏巳獲猓黑五名又殺死一名故猓黑之銜恨洪度者由此也又按板抱母二井從前為野賊及土官土棍所踞不但無分釐歸公兼之野賊騷擾商販不前嗣經前督臣髙其倬驅逐整頓商販疏通一年出鹽四百餘萬斤獲息二萬餘兩以充兵餉普洱一帶又報出土井數處向亦野賊阻撓擅自取利繼被清查歸公劉洪度補授威逺同知剔釐鹽弊嚴禁土棍把持需索故土目人等又不無銜怨至于鎮沅一府前未設有流官土府刀瀚恃職肆橫凌虐夷民濫行科派擅責井兵奪有夫之婦占期親之妹種種不法所以臣密委楊國華同劉洪度拏解赴省特疏糾參請㫖革職發審即委劉洪度往署府事改土歸流洪度查田編賦或立法過嚴而刀瀚之族舍土目冀圗報復遂借此惑衆威逼寨民勾結猓黑公然蠢動今雖倡亂要犯已獲者共五十人未獲者止刀如珍陶正紀等數人招回夷民已三千餘户但臨元鎮轄一帶地方各種猓賊不法已久若不趂此擒𠞰除暴安良邉境終難寧帖臣現在嚴檄各領兵官務搗巢穴以盡根株毋得仍存姑息更貽後患現獲各犯與續獲者令解赴省聽臣與管撫事督臣楊名時親加審訊如係主謀巨惡即行正法逼脅附從者分别發落安插除現另疏報眀其一切善後事宜并調遣過官兵用過糧餉以及被賊傷死兵丁數目俟查議㑹題造冊送部外所有夷猓橫逆遣發官兵擒獲情形合先摺奏伏乞聖主睿鑒施行臣謹奏此一事未免當日料理不曽徹底之所致朕前諭凡改流之處更當留意者正恐有此等復作之虞今經此一事乃轉禍為祥便地方微貟亦自知檢束孰肯捨性命而為非也今既就緒朕轉喜此事之發露也但傷如許人命未免惻然於懷然亦其自取無奈之舉也題到有㫖十二日巳刻臣繕摺畢正在封固拜齎間適提標逰擊曹士貴楚雄鎮標守僃施善元禀到據稱本月初四日在平寨地方拏獲賊首刀如珍並妻女男婦共九口已解赴臨元總兵官孫𢎞本行營查刀如珍與葉在臯刀西明刀廷貴等俱係首惡中之首惡業俱經拏獲餘賊諒無所逃遁合併奏聞臣謹再奏首惡盡獲可快之事當審明嚴懲者雍正五年閏三月二十六日雲貴總督臣鄂爾泰謹奏為恭謝聖恩并陳愚悃事雍正五年閏三月初五日臣家奴䝉恩賞給驛馬齎回御賜臣火鐮包一箇茶糕二匣松糕二匣瓜果乾一匣到滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖至本月十九日臣齎摺千總裴𢎞道蒙恩召見賞給驛馬銀兩齎回賜臣御用寶硯一盒隨復郊迎至署望闕叩頭謝恩祗領外細詢該辨僃悉聖躬和暢精神倍常歡忭之餘彌深瞻切敬諷前後硃批恍如身侍聖旨著將臣等從優議敘念臣職任封疆責在寧謐但地方有事即臣罪無辭蠢兹仲苗既不能弭患于未萌復不能懲凶于既變勞師費餉需日就擒此復何功應邀議敘若竟冒膺聖恩敬陳愚悃伏乞聖主睿鑒俞允施行臣謹奏覽同日又奏為據實陳明仰祈聖鑒事雍正五年閏三月初五日齎到臣奏烏蒙一摺欽奉硃批所奏知道了祿萬鍾巳投到川省嶽鍾琪即奏聞欲問罪正法改土歸流朕已批諭審明㝎案一面奏聞一面解送與卿明白雲貴未了案件後方可㝎擬連奏有二摺待回繳時將朕批諭隨便發來卿可密觀便知朕辦事之道理矣此事在嶽鍾琪略務巧些彼意以涼山冕山之事不就烏蒙未能輕了見卿調撥神速似少有怪意但皆存為國效力之心即便爭功亦屬快事朕亦欣恱嘉之耳內外大臣但患不爭功也戲筆欽此又于本月十九日齎到臣奏摺內烏蒙鎮雄一摺復欽奉硃批烏蒙鎮雄一奏摺留中此事嶽鍾琪少務巧些朕不甚取此事俟題到自另有㫖如川貟畏難隱諱之處當移知嶽鍾琪不可回獲哈元生前取仲苗赫赫有名今烏蒙所效之力實出格外具疏時可一一申明若有副將缺或參將缺當引旨題用此番進取烏蒙官辨俱甚屬可嘉題到朕自加恩議敘祿鼎坤不料如此改面革心非但贖罪兼當論功可著實設法安插令出望外以勸將來事雖就緒善後務要得人卿詳細愼重籌畫可也聞楊國華人亦甚去得未知果否欽此臣跪誦之下仰見我聖主用人辦事順應曲成執中行權一歸時措讀至即便爭功亦欣恱嘉之句不勝感切讀至內外大臣但患不爭功句不禁汗下及讀至戲筆二字不禁心折神悚繼以起舞實不能窺測迥不侔然心應無二而嶽鍾琪初聞祿鼎坤業巳歸滇祿萬鍾母子又將投獻惑于浮言遂有調兵贖罪之牌檄既而烏䝉巳獲鎮雄隨破雲貴官兵分駐土府出示安民大局粗㝎而川貟猶斂息潜踪坐觀成敗逮至白女迭等擁兵拒敵哈元生等連攻險關直搗巢穴軍前文武皆知兩土府奔川為不可解巳經申飭見覆前聞嶽鍾琪將親至敘府臣即飛札郵遞謂何日抵敘祈即示知當親赴雄屬川烏蒙屬滇烏蒙所屬之大關􅋭一帶仍割原主此議竊查烏鎮兩府脣齒相依鎮雄漢多夷少田地成熟民能活計烏蒙所屬止大關􅋭等處夷知耕種猶易約束獨土府附近地方從不務農惟以劫虜為事所需鹽米皆取資于鎮雄及大關􅋭等處今若將兩府各屬又將一府中分將來呼應不靈最難調劑又不如仍歸川省畫一料理之為便業經切囑委貟秉公審議并將此意札復嶽將就也至于臣身受殊恩無有倫比服膺惟誠惟敬之旨時凛覽同日又奏為覆奏事竊烏蒙之役臣前赴黔省密調官兵見威寧鎮標中軍逰擊哈元生人材雄壯技藝純熟詢以軍機頗具膽略臣將赴東川遂委令總統進取烏蒙并給以馬匹紬縀以示鼓勵哈元生以舍副將參將獨奉委用奮激異常及至路過險隘賊衆拒敵哈元生率領候補守僃熊權等身冒矢石連破險關羣凶喪膽兩府潜奔此番效力實屬首功荷蒙硃諭若有副將缺或參將缺當引旨題用仰見聖主奬勵軍官之至意臣敬當凜遵查貴州㝎廣協副將貟缺緊要非材不稱雲南尋霑營參將蘇大有隨總兵張耀祖久駐軍前甫經回泛臣看得漢仗精悍辦事直爽論𠞰論撫頗識機宜兩省參將無即以哈元生升補俾臣得就近開導進以詳愼將蒙著伊在臣標行走漸次化導以勉將來至于齎天顔更蒙賞賜即伊福分俟年滿咨部時臣當遵奏伏乞聖主睿鑒施行臣謹奏覽同日又奏為陳明鎮沅等事竊鎮沅一案臣於雍正五年二月初十日及三月十二日兩經繕摺奏聞并具疏題報在案今于閏三月十九日齎摺千總回滇敬啓摺扣荷蒙硃批據理而論激復二種情由皆有朕前有㫖著嚴苗猓黎夷之處分嶽鍾琪奏摺內已兩次批諭改土歸流固係美事然必委用得人不令野愚小民有避溺投火之想方保永安長治如謂兵威震懾之時視如禽獸任意凌虐苛求若令一思故主所關甚巨等語矣觀此劉洪度必有自取死之道但傷及許多兵民朕心深為惻然當此振作之初必酌中料理疏而不漏方好全賴卿措置得宜料卿自無過不及之慮也題到自有㫖欽此臣跪諷再四仰見我聖主明並日月無逺不燭無微不照嚴處分則事後知警愼改流則幾先預籌委用得人乃圗治之本計免思故主實撫夷之要機不令避溺投火此仁暴所由分期于疏而不漏則知仁之兼用本惻然之心布振作之化措置得宜無過不及歸于一中大哉王言非大智時中孰能幾此臣雖至愚敢不銘心鏤骨瞻顧考成或託言寬大弱者不能治強者啖之暗謂官軍伎倆如此莫可誰何事變不過招安事㝎依然安插益肆猖狂明相勾結此頑梗之來由也臨安鎮屬之鎮沅威逺元江新平普洱茶山等處猓黑苦葱擺夷窩泥大頭猓玀之類夷種不一出普李四賊授以土職計圗以賊制賊殊不知始猶潜踪外地近則流布內境諸凶之餘孽未盡四姓之黨羽日蕃既不能禁其來復誰能驅之去且威逺署事鎮沅努力急公頗稱廉幹緣野賊猓黑殺劫一案劉洪度親率兵練四處擒捕已獲五人又因鎮沅土目土役舊有百餘人皆白占夷民田地既令納課復令上租劉洪度欲撤還夷民各令輸賦土目等屢求不允從此銜恨及至嵗底見劉洪度由威逺解鹽課回署欲于開印後解交司庫隨捏造浮言煽惑夷衆謂知府要將民田盡數入官有願領種者每一石種田先交價銀二十四兩定限于開印日完納當堂親收違者重處由是勾通分别正法鎮沅業已平㝎而猓黑夥賊猶須多擒以安良懦臣更差持令箭嚴督官軍務盡根株毋貽後患料四月內俱可完結此逆案之始末也至于臣自到任至今威逺新平一帶劫虜時聞原未寧帖如張義登馬亦鳯等窮凶極惡設法擒拏立經杖斃數年舊案完結者亦數件其餘命盜不能結者尚多所以未經奏聞者非敢隱諱實不自揣欲將一切惡類盡皆剪除一切案件盡皆清楚使野夷知法畏威惟命是聽然後示以寬仁結以恩惠以圗永逺再達聖恩寬宥臣實難以自處惟當盡心措置勉希得宜以期仰紓聖慮已耳鎮威夷民現已復業無悮耕種鹽課現追獲四千二百餘兩所少無多可以彌補其府㕔縣缺臣巳㑹商保題請以嵩明州知州佟世廕補授鎮沅知府以師宗州知州章元佐補授威逺同知以候補舉人宫爾聖主睿鑒施行臣謹奏覽同日又奏為欽奉上諭事竊臣於雍正四年十二月二十一日摺奏廣西泗城土府等事荷蒙硃批已諭韓良輔矣欽此雍正五年三月初十日韓良輔專札到臣內稱兹奉上諭為黔粵邉境計安全之䇿不識何日始蒞粵境懇賜確期并將來應作何措施之處預為指示等語臣隨以現在兩省大貟駐劄交界處㑹審乘此取泗城各案卷一併發審􅊾調土府等質訊可以相機行事但泗城一切形勢不能深悉望詳細示知并訂期適中之地約㝎何時當就教以圗面商等語覆札去後續于閏三月初五日接奉臣正月二十五日議覆安籠鎮臣蔡成貴條奏摺內硃批前卿奏泗城土府一事請朕密諭廣西預僃之摺朕便録與韓良輔諭令準僃伊回奏許多識見淺鄙之閒論二年韓良輔亦曽奏過此事今奏與前意不符或其間有賄求之弊朕稍疑焉伊奏欲親至滇省與卿面商朕巳有㫖命李紱同韓良輔前來卿等可將三省交界一切事宜講明齊心料理方于地方有益若事不畫一恐難措辦並有旨若有用兵處粵省撫提鎮命卿莭制矣卿可悉心籌畫俟伊二人到來用之古有成訓豈可少有孟浪但先事預防却不可不熟計據愚見乘此查界㑹審諸件即明委泗城土府及該同知并田州土知州令同隨辦理諸務與田州同來則泗城不疑若泗城疑不肯來即是違抗勒兵擒治名正言順且田州雖係岑姓彼此不相能此中或正有機要等語去後至本月十二日准到部文欽奉上諭著粵撫臣韓良輔來滇與臣面議并著前撫臣李之處著交與臣調度廣西巡撫提督總兵官俱聽臣節制欽此欽遵行知等因臣祗承之下仰窺聖主寧謐邉方愛飬夷民之至意不勝惶悚恐難負荷一俟韓良輔咨覆到日臣即前赴貴州安籠駐劄預先料理交界事宜候同面商務當實力虛心􅍄籌妥議斷不敢稍有瞻顧亦不敢稍執意見也查泗城地方雖無甚險隘然綿亘三省最稱遼濶土府岑映宸狂妄虐民挾勢滋擾不獨鄰境受害即所屬夷猓無不怨恨切齒臣前于赴黔之便已面交各界附近幹貟并札囑安籠鎮臣蔡成貴各令訪查密報今已知其大略據臣度料若調離巢穴實無能為倘潛匿負固亦不易治今伊現駐邉界越境拏人又經貴州署永寧州事蔡維申通詳臣已檄行前委兩省道貟𫝊土府與該署州質訊示以至公并密札蔡成貴勿失機㑹更諭黔貟暗差倘必須用兵查粵西附近黔邉等泛兵力單弱不敷調遣惟田州土司岑應祺奉公守法且曽保薦旌賞堪令帶領土兵前導臣酌派官兵即委蔡成貴總統擒治雖稍需時日仰賴槩伏乞聖主睿鑒施行臣謹奏覽同日又奏為奏聞事竊滇省錢糧半出鹽課臣自到任後雖極力稽查盡心調劑然一人耳目殊難遍及鹽道一官實最關緊要荷蒙聖恩將湖廣糧道劉業長調補該道于去年十月任事迄今巳逾半載臣不時接見將一切利弊情形反覆商論劉業長俱能領㑹俱能料理為人直爽辦事精細並無瞻顧亦無刻薄據臣愚見不但楊馝不如較李衛似更覺詳慎現在鹽課一事臣可以放心可以省力不勝欣幸附摺奏聞臣謹奏欣恱覽之此人李衛所薦朕未料其能如此同日又奏為報明厰務情形事竊照滇省各厰臣自到任後調劑稽查已逾一載近來略有頭緒漸次興旺查雍正三年各銀厰缺額銀共一萬三千五百餘兩零今核算雍正四年分各銀厰應完額課銀六萬六千四百餘兩零內據報收過課銀六萬一千四百餘兩較之雍正三年分少缺額銀八千四百九十餘兩又查各銅厰雍正三年分報獲餘息銀一萬七千九百六十兩零今核算雍正四年分除完額課銀九千六百二十五兩零外報獲餘息銀四萬七千兩零較之雍正三年分多獲息銀二萬九千餘兩臣約計各厰將來額課必不虧短餘息或猶可增益再查新歸滇屬之東川府有湯丹普毛二厰出銅頗旺川省舊曽開採臣經委知府黃士傑管理并發銀接濟兹據呈報湯丹厰自去年九月初九日起至今年二月終止除工本食用外辦獲淨息銀五千三百四十餘兩其普毛厰離府遼逺油米馱腳俱貴自去年十一月起至年終止合計辦獲銀銅雖已報息五百餘兩尚未至大效現在督令該府竭力調劑此外府屬地方仍有銀銅厰二三處亦現令採試約算每年厰息即以充東川營兵餉或可以敷用除滇省舊厰應聽撫臣届期奏銷東川新厰俟陸續報部外所有厰務情形合先繕摺奏聞臣謹奏卿料理自然妥協者硃批諭㫖卷一百二十五之三欽定四庫全書硃批諭㫖卷一百二十五之四硃批鄂爾泰奏摺雍正五年五月初十日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正五年四月二十日臣齎摺家奴蒙恩賞給驛馬齎回欽賜臣御用冠一頂并茶糕一匣松糕一匣香瓜乾耿餅一匣酥食一匣抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷蒙硃批今嵗萬夀節朕不受禮地方事務雖少就緒正資料理卿之欲來見朕朕知發乎至誠非具套文之可比而朕亦實想卿諸凡外用大臣陛辭朕不忍别至于落淚者惟卿一人耳况我君臣年紀他日歡聚有日當權輕重而為之不必作兒女態可靜心治理地方今嵗不必來欽此臣跪諷數四自念遭逢雖義屬君臣實恩同父子淚從中來不禁復作兒女態臣有何言時當內省無論於地方事務稍存茍且稍涉乖張目視手指罪不容誅但此心少懈即是悖負神明鑒之生難幸免固未敢僅以清勤自效便稱盡職與二三庸衆人較優劣也至于當權輕重固事理之要樞亦經綸之極則臣務時時身體虛心實力黽勉步趨雖萬里之外常如親聆慈訓已耳謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏朕每念及交卿辦理倚任之事思卿之勞實令至于不忍凡卿一切料理奏對朕實心動覽之朕亦不多諭惟秉一誠默祝上蒼厚土聖祖神明令我鄂爾泰多福多夀多男子平安如意耳量精神力量為之第一不可勉強同日又奏為恭報豆麥收成分數事竊照閭閻之休戚先卜之嵗年而苗猓之頑良率由乎豐歉仰賴我聖主軫念民依慮周遐邇勸農祈榖一本敬誠固應感召天和不遺萬里均叨福蔭者也臣行據雲南布政使常德夀詳稱雲南等府州縣所屬地方本年豆麥收成俱有八九分不等據署貴州布政司事按察使富貴詳稱貴陽等府所屬自春入夏雨水調勻通查各屬收成約有七八九分不等各等情前來相應奏報再雲南地方春熟既登夏苗尤盛雨澤霑足陰晴惟時臣親往課農周行郊野一望青葱遍經栽插地無隙壤畦無餘秧據父老咸稱十來年不曽種之田畝俱已種完今嵗秋收至少亦是十分等語而各屬呈報復大約相同臣目擊歡呼情狀將謂大有可期不勝慶幸無任感激合併附奏仰紓聖懷臣謹奏實慰朕懷今嵗春收直省可稱大有近日都中左近雨水甚屬調勻各省奏報似亦皆然但今夏令或恐有雨水過多之處總在天恩之賜亦不敢預料同日又奏為欽遵聖諭事竊烏蒙鎮雄一案四月二十日接奉三月十二日摺內荷蒙硃批籌畫甚是妥協今滇黔數處改土歸流新㝎苗夷正資彈壓烏蒙鎮雄等處擴地甚廣應添兵處不可惜此小費當謀一勞永逸萬不可將就從事日後歸化日久一切如內地一般時再議減撤未為不可當知朕意料理可也欽此四月二十一日接准部咨知部覆川陜督臣嶽鍾琪特參玩愒一疏於閏三月初七日奉旨征𠞰烏蒙搗其巢穴係雲貴官兵奮勇總督鄂爾泰調度之功然非川陜總督嶽鍾琪將冕山涼山等處不法之番夷悉行𠞰撫去其掎角之勢則雲貴官兵亦不能成功如此之速白女迭祿未甲敢于抗拒官兵甚屬可惡鄂爾泰屢次差遣祿鼎坤招撫祿萬鍾而祿萬鍾不肯就撫及至勢窮力竭又至嶽鍾琪軍前投到欲以巧脫重罪甚屬狡詐部議將祿萬鍾解往雲貴質審所議甚是白女迭祿未甲擒獲之時亦著解往雲南質審餘依議欽此又部覆嶽鍾琪請旨改土歸流以安邉氓一疏同日奉旨隴慶侯向與祿萬鍾勾通作惡今復唆使逃匿法難寬宥部議解送雲南審明題結甚是鎮雄地方改土為流即交與雲南附近管轄欽此臣伏念兩土府情事早在聖明洞鑒之中無庸臣愚再瀆其㑹審一事總兵劉起元永昌道賈擴基等拘齊所轄應解各犯前赴永寧候同川貟㑹審嶽鍾琪荷蒙聖諭遵將祿萬鍾隴慶侯等亦發至永寧候審所有巳到各犯現在陸續勘問兹據詳稱祿萬鍾隴慶侯皆童幼無知勢難自主萬鍾母子初欲投獻是實皆由劉建隆內而與白女迭祿未甲陳明哲阿母直等詭計延緩點集夷兵先攻魯甸後敵官軍外復勾通鎮雄王之瑜范掌案紐紐巴等設伏劫營擁兵守險并勒令兩土府母子先後逃竄計窮投川現據巳審之烏蒙案犯祿萬鍾祿鼎坤汪一清劉建隆楊阿台白女迭祿未甲阿母直陳明哲等鎮雄案犯隴慶侯王之瑜范掌案紐紐巴戛虐木奈八十阿固吕林施額洛澤雷主文胡掌案胡阿僃王之玨周維蕃王罵拍等悉令三面對質所有抗拒官兵勾通作惡唆使逃匿等情皆歷歷供認無能隱諱尚有白迫等二十餘人未經到案查白迫係倡首抗拒之人前隨祿萬鍾母子投川今亦現在催提俟到日再審至于祿萬鍾等逃竄之後當經各貟查勘土署一空臣密令各貟四處察訪隨據文武各貟陸續查明禀報有就近窩頓者有逺寄賊巢者有點交川貟者有運藏敘府者其就近窩頓與逺寄賊巢等項差役起出逐件查明令印一顆凡屬要件必用此為慿記經臣密令駐烏之副將郭夀域逰擊張鶴嚴追看庫機固李和尚之家搜得馬蹄印一顆夷字冊一本又從夷目知智家搜得夷字冊二本皆經飭發譯出查對俟搜玉等亦各報有器物等冊并王之瑜等鉛錫貨物較之烏蒙則多寡懸殊統容將欽件六案并兩府歷年劫殺不結之案一併會審確擬招詳到日除將一切輕罪人犯發落開釋外其要犯祿萬鍾隴慶侯及漢姦惡目人等俟臣赴安籠與粵撫臣韓良輔等會商事竣當駐劄烏鎮適中之地一面親審各犯一面料理兩府事宜凡應撫恤漢夷安插酋目及增設營泛造蓋衙署清理錢雄改州應另設一營臣前巳奏請計援𠞰左協可以減撤相應移駐外仍須添兵一千六七百名再查貴州威寧一鎮原為逼近烏䝉而設今兩土府既議設流若將威寧鎮移駐烏蒙威寧府改設一營仍將所裁援𠞰左協兵數歸聖訓至新定地方流官最關緊要自應揀調賢貟責成務糧餉之責固不敢少有孟浪也伏乞聖主睿鑒施行臣謹奏覽同日又奏為奏明事竊臣報明鎮沅情形一摺荷蒙硃批此一事未免當日料理不曽徹底之所致朕前諭凡改流之處更當留意者正恐有此等復作之虞今經此一事乃轉禍為祥便地方微員亦自知檢束孰肯捨性命而為非也今既就緒朕轉喜此事之發露也但傷如許人命未免惻然于懷然亦其自取無奈之舉也題到有旨欽此又摺片硃批首惡盡獲可快之事當審明嚴懲者欽此臣跪誦之下仰見我聖主如天之仁如日之明喜此事之發露轉可就緒則底料理仍復茍安恐威逺普洱元江新平之間終難以寧帖將裨半屬庸才不知逺計見事已就緒流轄制因者樂甸舊土官刀聨斗威逺大頭目等不肯從逆各經拒絶遂聚衆據險希圗招安後見官兵進勦不肯招撫首惡等四路燒殺脅從千餘人分把隘口兩次拒敵打仗各情由俱各供認情實緣在軍營夾訊受傷旋報在監身故者計有七名內刀如珍等亦報負傷沉重臣恐首惡或再瘐斃不能明正厥辜即于四月二十六日弔提刀如珍刀廷貴陶波公刀西明刀西侯陶國貴等六犯奏明伏乞聖主睿鑒臣謹奏覽同日又奏為報明泗城情形事竊雍正五年閏三月二十六日臣具奏泗城土府一摺已將専差札致粵撫臣韓良輔約至安籠鎮地方㑹商等情陳明在案自差役去後臣隨密札黔省提鎮及附近文武各員㦯囑偵探或令計誘各與細商相機䇿應據署永寧州蔡維申詳稱泗城土府岑映宸差有土役十餘人各執器械越境拏人隨經臣一靣令蔡維申將土役等拏下一靣批發貴西道吳應龍并將兩省邉界如泗城西隆等處歷年不結各案一併㑹審其時普安知縣瞿鵬佳因泗城土府侵占疆界劫殺不休曽經臣等委同清鎮知縣與泗城土府并泗城同知會勘據瞿鵬佳禀稱該土府㑹勘之時不惟不肯清所已占并欲吞所未占每日率土衆數千雲集境上故作耀武揚威等語而安籠鎮臣蔡成貴亦報稱泗城土府岑映宸借㑹勘疆界之名率領土兵四千有餘分劄七營于者相地方其伏藏箐中者出沒不常尚不知其數又發銀兩于黔境收買米石且託辭開穵魚池以為濠塹之計此種情形必該土府接閲邸鈔預為整僃等語先是提臣楊天縱差役託名往桂林採買藥材路經者相佯言泗城土府因公差人永寧州將差役拏下雲貴總督怒欲執法貴州提督却說永寧州的不是要督何經文答云我們尚沒見鈔你土府如何就知道了此信恐怕不確回稱土府早知信了現在烏蒙鎮雄俱已改流大勢是箇確信何經文答云既然如此料你土府不敢抗拒銀錢又無使用處你們土府是甚麼主意回稱土府怎敢違拗只是立㝎主意繳印罷了何經文答云若果如此我們雲貴總督一定替你土府請祈天恩賞以冠帶給以飬贍若稍有抗拒之意烏䝉鎮雄的樣子是你們曉得的了回稱但得如此就沾恩了小的們就寫禀帖與土府去等語次早土目等又到提臣處投禀提臣亦答以好語去後近據提鎮各臣又皆探稱土府已連夜陸續撤兵從者相退歸行至珉球地方遇泗城協副將王大綬及泗城同知劉興第接見相商復駐劄珉球把總李富前往珉球􅋭禀見王副將據王副將云我來此並未見土府帶兵四五千鎗刀炮位等件李富回稱自土府正月二十八日到珉球原止隨帶從人數百及駐劄者相陸續調兵四五千有餘劄營七座鎗刀標桿弩弓炮位都有是卑辨同衆人親眼見的王副將云土府出門豈不帶千數人就是他的大兵目出門也要帶三四百人這是他土人的規矩李富回云土府便帶數百人也就招搖了何况調兵四五千人王副將云這是人家毁謗他的他獻土府銀三十餘兩馬二匹以僃使用口稱數百年之業一旦壞于今日乃於四月初七日撤營而回其鎗炮器械等項盡行帶去所建子營亦皆燒燬凡于黔省交界之處該土府各添造卡房安設兵丁等情各到臣據臣看得泗城土府地方二千餘里承襲數百餘年舉動儀從盛于制撫而富饒強悍復倍于烏䝉鎮雄且倚資交結藐視流官夷民受其魚肉邉境肆其慿凌皆習為故常羣不知怪若不及此懲創使歸法度目今雖無能為日後必將貽患臣為封疆大計酌量輕重故于諸土司事寧刻無寬不敢稍有隱諱實非敢好事非敢越爼以自取嫌怨也今仰賴聖天子仁威略加震叠遂爾斂踪雖增卡設泛亦不過探聽風聲决不敢别施伎倆臣料土府岑映宸必當審時度勢繳印獻土必不肯蹈烏雄之覆轍自取殄滅兵可無用或能了事伏念聖主于烏蒙之役緣係創舉則訓以密圗勿令預覺于泗城此舉緣有近事則明諭用兵懲治著臣調度隨機握要至無定而至有㝎臣每熟誦札云俟甘汝來到粵即由靖州貴陽安順來滇至初七日臣前差役回滇據韓良輔覆札見臣手字已照依檄調將由田州泗城一路至南籠會商甘汝來李紱聞于閏三月十六日已抵武昌約四月初旬到粵一俟到後伊即起程等語臣擬將鎮沅奏先此繕摺據實陳明伏乞聖主睿鑒訓示遵行臣謹奏卿斟酌為之同日又奏為奏聞事竊黔楚交界地方多係苗夷錯處更有花衣苗一種不論男婦老弱俱以劫虜為生而楚省靖州零溪司所轄之謬沖地方界于兩省姦藪甚多四面髙山周遭密箐負固恃險尤稱凶悍與黔省黎平府新轄五開衛之木洞屯接壤頻年劫殺案件甚多前靖州五開每互相推諉今五開歸屬黎平更以隔省藉口每遇強劫重案即差遣兵役前往捕緝亦僅在寨外窺探並不敢深入巢穴以致輾轉遷延賊勢愈熾臣念花苗逞凶何分黔楚俱當協力擒𠞰焚巢掃穴以靜邉疆隨咨商黔省撫提二臣嚴飭黎平文武官貟查明各案一靣調遣官兵前往𠞰捕一靣移㑹楚省協力合擒于是調遣黎平協中軍守僃左垣率領千總趙國珍把總熊占魁帶領該協兵丁與黎平知府張廣泗署五開衛事孫紹武㑹同前往又調鎮逺協左營逰擊今委署黎平協事韓勳并黃施營千總賈啓俸等各帶領兵丁協助于閏三月二十一日起程會商楚省署靖州協副將事逰擊胡文都司劉䇿名訂期于閏三月二十四日進兵會𠞰及是日黎明該守僃左垣等自張弩起身由觀音山至木洞屯巳經卯刻逰擊吳文駐劄培坡塘止著把總領兵前來左垣等立即進兵于木洞屯對山直上官兵奮勇爭先辰刻臨謬沖寨凶苖放鎗堵禦官兵火炮攻打當即攻開寨子舉火焚燒巢穴殺死苗子一名生擒一名并苗婦一口羣苗逃竄至本月二十九日黎平知府張廣泗探得凶苗由黃柏屯入後山凹中尚有男婦二百餘人未經逃散乃親點健卒與左垣分兩隊尋踪追趕約離有五六里賊苗見官兵追至暗伏要隘鎗炮亂發兵丁徐國爵著炮傷腿幸不致命該知府署縣守僃千把等身冒火炮督率兵丁努力前進將凶苗殺傷數人并擒放炮傷兵之苗立即梟首衆苗四奔追至日沒該府等於南英坡露處一夜次日仍同往追踪捕𠞰計連日擒殺凶苗又二十餘人衆巳膽落臣看得夷性犬羊種類各别而花苗之惡實不減仲苗謬冲地方雖介在兩省實係靖州所轄前據楚貟稱係五開所屬已歸黔省不便越爼為辭及查謬沖一名扭沖現屬靖州零溪司所轄而五開歸黔冊內並無謬沖扭沖字樣止緣該苗曽典五開衛之木洞屯軍田二石故每遇事發則狡稱衛屬在凶苗則藉稱異地可肆兔脫之謀在貟辨亦利其他屬可免疏防之咎不知該苗之耕食於衛地者不過二石之田而其聚族以居為逋逃淵藪者則在靖屬之謬沖也若黔省亦以地屬楚不便越爼則彼此兩懸凶苗何由撲滅地方何由寧謐故目前所急將為首凶惡盡行擒獲之日作何處分安插再妥酌一切善後事宜㑹疏請旨合先據實陳明伏乞聖主睿鑒臣謹奏此事福敏已奏過未如此詳細同日又奏為銅礦大旺工本不敷懇恩通那以資調劑事竊照滇省銅厰二八抽課餘銅歸官採買以供鼓鑄奉有成例查每嵗額課銀止九千六百二十五兩零每嵗所獲餘息銀約一萬七八千兩不等計所辦銅斤除供鼓鑄一百餘萬斤外多不過二三十萬斤從前收銅工本俱用鑄局買銅銀兩辦銅既無多故買銅工本足用臣自去嵗抵任後督率清查細心調劑厰務漸有頭緒雍正四年分辦獲銅斤餘息銀已四萬七千兩零業經奏明在案今嵗閏三月以來仰賴聖主福庇山祗效靈銅礦增盛倍常數十年來所未有即就現在核算五年分銅斤可辦獲三百數十餘萬合計應獲餘息銀不下十數萬兩但銅多本少收買不敷厰客如有積銅薪米即難接濟若不早為籌畫臨時更費周章相應懇祈聖恩俯准于鹽務贏餘銀內酌借五六萬兩發價收銅賣價還項一轉移間似于厰務大有裨益再運銷之法以速為利查江浙湖廣辦銅諸省緣採買洋銅每至悮運關係鼓鑄匪輕臣前任江蘇深知其故若令各省委貟齎銀赴滇買銅起運合算銅價每百斤九兩二錢加以腳費等項運至漢口運至但沿路關稅得免抽收始不致賠纍不致遲延在各省獲銅供鑄克副考成在滇省獲銀充餉無慮壅滯以有易無或亦兩益之事也緣係錢糧重務是否可行臣未敢冒昧合併陳請伏候聖主睿鑒批示遵行臣謹奏有旨諭部議行同日又奏為遵旨議覆事竊臣酌減鹽價議增薪本一疏部覆奉旨著臣查明鹽斤內所增銀兩核算明白抵補減價增薪之數㝎議奏聞欽此欽遵移咨到臣臣隨檄行司道議詳并𫝊商鹽道劉業長逐年逐項細加核算查看得滇省鹽政黑白琅雲等九井每年額辦課銀一十六萬八千一百四十五兩七錢零自雍正元年始至雍正四年止或清查陋規㦯新開鹽井或收買沙滷以及辦獲鹽息聚零合總零星莭省積餘等項所增銀兩俱按年入于正項額外贏餘冊內共計銀四十萬五千五十一兩四錢七分零此外又有新開之只舊草溪井麁江土井按板抱母恩耕香鹽等井三項共辦出銀七萬四千五百三兩五錢五分五釐零合之歷年正項額外贏餘統計共銀四十七萬九千五百五十五兩二分六釐零此雲南近年清查鹽稅增銀之總數也至于正項額外贏餘每年所獲雖有贏縮多寡之不齊然逐細清理諒可有增無減但贏餘項下凡可以必得者俱應㝎為正課緣正課分數官有考成贏餘虧短例無參處若不查核定額恐日久弊生或不肖之貟以多報少蒙蔽侵欺實不可不慮查正項贏餘內黑井之新井嵗煎鹽一百萬斤可獲銀一萬七千兩白井之正額沙滷鹽嵗煎一百一十五萬九千斤可獲銀一萬二百兩六錢八分又白井不幫黑井之加增嵗煎鹽二十五萬斤可獲銀四千兩額外贏餘內阿陋井之改板井嵗煎鹽一十四萬一千六百斤可獲銀九百兩六錢四分九釐零以上均可必得均應定為正課再按板抱母恩耕香鹽等井嵗煎鹽四百五十七萬二千六百一十八斤計獲課銀二萬一千三百一十二兩六錢九分原係題明就近動放新設普威營官兵俸餉之需但井地煎出鹽斤運銷賣價均需時日勢不能計月而獲而兵餉按季支領復不容遲悮若以本年之課放本年之餉不但難以應辦仍須向司庫借支且收課放餉俱歸一處辦理設或侵那最易影射亦難于稽查應請照各鎮協營事例將普威營兵餉仍歸司庫動放該井鹽課令其批解道庫移司充餉一轉移間庶課餉兩無岐悮其普洱之黑磨井嵗辦課銀三百六十三兩五錢零元江府屬之猛野磨鋪井嵗認課銀二百三兩原題歸入按板抱母等井項下為添助創設之費今抱母等井鹽課既議解道庫則此二小井亦應㝎為正課以上各項所有每年造入正項額外贏餘項下今定為正課銀兩暨按板抱母恩耕香鹽磨黑猛野等井鹽課并只舊草溪井題請嵗增課銀三千八百三兩四錢零共改㝎正課銀五萬七千七百八十三兩九錢零請自雍正五年為始統入舊額鹽課一十六萬八千一百四十五兩七錢零考成實徴冊內奏報嵗計額課銀二十二萬五千九百二十九兩六錢零此外每年多收額外沙滷等項贏餘銀內請照原題將一萬九千四兩五錢二分零抵補減價增薪之數每年仍有正項額外贏餘銀六萬一千五百餘兩應照原議留抵銀厰虧缺並應辦地方緊要公事仍于年終造冊報銷如此則章程㝎而弊端清于課于餉庶均有裨益矣再查麁江土井嵗辦課息銀二千五百餘兩該井出息尚不止此數雲龍井景東井俱尚有隱匿白井沙滷鹽猶可多收按板抱母等井雜費仍可裁減臣與劉業長熟計大約滇省鹽務連正課贏餘合算每年可增至三十萬擬于明嵗請將正課再增至二十六萬兩僅留贏餘項下銀四萬兩備辦地方公事亦無不足用除具疏題覆外合將原委詳細陳明伏乞聖主睿鑒臣謹奏通盤全是有何可講欣恱嘉賞覽之雍正五年六月二十七日雲貴總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安卿好麼來往人朕僃細訪問知卿精神起居甚好實如獲珍寶之喜但諸凡量力而為之萬不可過強同日又奏為恭謝聖恩事雍正五年六月初七日臣家奴䝉恩賞給驛馬齎回御賜臣丹錠九封貢茶四瓶香囊四匣錦扇四匣扇器香一盒抵貴州安籠鎮臣隨郊迎至行署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批賞罰非可私冒膺不可得此一事即可為諸改流寶訓動魄驚心臣敢不字字凛體事事反求至于憐臣之心恕臣之過期臣以立功勉臣以一誠天心之曲成已耳臣弟鄂禮供職二十餘年前經降調臣嚴札切責伊惶愧無地不敢有飾詞茲䝉恩諭鄂禮前朕未審其人罣悮降調時朕亦忘記名字昨補用時見其人甚可取卿之祖父必有積德處若無可取或蹈愆尤朕再無因卿之親戚而瞻顧姑容也加意教導他卿這弟如何朕觀似在鄂爾奇之上欽此竊臣弟鄂禮存心忠厚亦頗明晰䇿勵用之聖主任材使器因物付物之至意至臣祖父何敢當積德但自髙曽以來從無臨陳不勇見財苟得臣父鄂拜平生耿介義理自持居官四十年祖業之外未曽長尺寸通旗所知富寧安尤所親見欽荷天語謂臣祖父必有積德處祖父有知且感且泣臣等若復稍有不肖不獨背負殊恩上蒼鑒察逆子辱孫類同狗彘其何以見先臣于地下言念及此痛淚沾衣臣即無良實有所不敢有所不忍也謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為欽奉上諭事雍正五年六月初七日臣於安籠鎮接奉閠三月二十六日摺奏泗城土府等事荷䝉硃批當令伊等就滇來卿既赴黔亦可但現在許多大事要料理朕恐少有稽遲處韓良輔亦奏聞但他只帶三四十人來少輕忽些此事未必能如此完結欽此臣伏讀之下仰見我聖主慮終慎始一出萬全之至意竊念土府頑劣不遵法紀雖若與性成要皆未經鈐束未經開導之所致岑映宸聚兵江北以震夷民及一聞嚴㫖著用兵懲治聽臣調度遂連夜撤回四顧差探是其心驚膽裂已知無所逃遁故臣於前摺內有兵可無用或能了事等語實緣聖謨𢎞逺務在機先已不啻甲兵數萬也臣若不乘機眀檄土府隨至安籠岑映宸意在辨訴仍妄希茍全及臣于六月初二日抵鎮映宸遂具詳呈請從寬越數日始繳印信號紙求免死存祀臣看得泗城土府岑映宸庸妄人也祖籍浙江伊父岑齊岱貪淫暴虐肆行殺害夷民怨恨已久竟以病故漏網及映宸襲職性既愚頑習仍驕縱業已衆叛親離無人依附茲議革職設流發回浙江安插訪之夷衆並無異詞惟是兄弟親支及使令兵目土目恐不無疑懼臣與韓良輔李紱熟商岑姓繁衍勢不能盡行遷置夷目中良頑不齊亦未便盡行究治遂大張告示厯數土府罪狀其餘宗族槩不波纍其從前助惡夷目已往免䆒後犯必誅一面委田州土牧岑映祺先回泗城遍行曉諭復委兩省文武前去查勘錢糧田土革除陋例苛條及十五六等日大頭目十五人投到臣俱靣加開示喻以利害各給賞銀牌立即放歸著各寨𫝊諭二十二十一等日土府子一人并親弟七人俱投到叩見內一武舉兩貢生兩監生臣復宣示皇仁懇切開導并喻以流土榮辱之辨勉其努力功名希圗上進各給紬縀銀牌等物伊等皆能解悟感泣領受臣等隨復酌議武舉岑映翰年次居長人江北泗城一協向止駐守泗城其接壤黔苗數百里之地原無一兵防汛故悍目凶㺜往往恣肆且西隆州西林縣雖久經改流兩營額兵共止三百名又逺在思恩九土司及土田州泗城土府之外然臣說以為兩益業經臣等㑹議將割歸黔省江北一帶地方統設一州添知州州同州判等貟分治總設一營添兵五百名官辨調撥不須添設統屬安籠鎮管轄其江南一帶地方應設營汛之處查廣西右江地方倍于左江左江設有一鎮右江亦應設一鎮庶權重兵多可資彈壓可任調度一切營制官辨駐劄泛地并抽撥兵丁等項俱經酌商㝎議現擬分疏㑹數十人新平野賊二百餘人業經投誠現在安插烏䝉鎮雄案犯據詳起解赴滇計七月半可到臣稍有稽遲合併聲明再臣自抵安籠日與韓良輔硃諭二年韓良輔亦曽奏過此事今奏與前意不符或其間有賄求之弊朕稍疑焉欽此茲據臣試探二年所奏係土府岑齊岱岑映宸劣蹟復不減于其父自以身任撫提未能整治或不無畏難之意遂致不知著腳于庸遂致長處反是短處殊屬可惜蔡成貴操守清潔武臣中所難其整頓營伍防僃邉奏不無過當處即其竭力圗報處也其泗城同知劉興第查係特用之貟任同知僅數月土府非所轄及經面詢歷言死罪鄰省上司差貟查問原不得不少有回護臣僃聖主採擇臣謹奏覽同日又奏為生苖向化請附版圗事竊查黔省各屬邉界多有生苖不納糧賦不受管轄身不到城市心不通王化隨其自便無所不為由來已久臣自長寨之役切商撫提諸臣并嚴諭各貟凡邉界之地無論生苗熟苖時刻留心設法化誨令其自然歸誠無須兵力庶幾邉疆可靖漢夷皆安除長寨一帶地方大小各寨當經安插外其西南各路深巗密箐綿亘百有餘里東南各路亦綿亘百有餘里盡屬生苖盤踞今長寨初闢安設大營不特附近羣夷安恬無事並化外生苖目覩長寨苗户給米給鹽領牛領種安家樂業並無紛擾莫不各思投誠願附內地兹准提臣楊天縱據中軍參將劉成謨禀稱長寨後路克猛等處十四寨及廣順定番鎮寧三州邉界宗地巧馬等八十七寨通共一百零一寨均係生苖內有羊腸苖頭班國卿等素皆不服鈐束今各情願投到轅門領給賞賜分頭化誨生苖隨據班國卿等將生苖土官土舍頭人薛琳于起田國臣常令薛等二十六名所有一百零一寨共九百零九户四千三百三十六口盡皆化誨咸願歸誠各具户口清册又據生苖土舍薛鴻于超韋朝甫阿奈等化出生苖四十七寨共三百零五户其四十七寨頭人亦皆來投見現在造具户口冊籍尚未送到提臣楊天縱隨各賞給銀牌花紅等物遍行安撫又據長寨營參將官祿禀稱有馬頭山埧忘箐松把磨茹拉賴翁來把雲白岩冗降遍記等三十六寨頭人班國順班國用老卜唐老卜令老卜物老卜𣲖阿臘阿鳥阿細阿並等各皆聞風嚮化共三百八十九户情願自認每年上納貢賦銀兩各具認狀刻木為慿五月二十九日有廣順州生員盧永昌兵頭李茂育等率領各頭人并各寨户口及認糧數目冊到長寨營投誠該參將官祿隨賞給花紅等物各情由到臣臣查生苗來歸應示羈縻以計長久科糧務須從輕户口定應清造夷民半無姓氏名多雷同日後難以稽查現在恐有重復復經札致提臣并飭知劉成謨官祿等再加查明更定姓名編立保甲彚造清冊以慿具題報部伏念幅貟萬里巳暨海隅日出區區夷土夷糧何增毫末而生苗原無統轄任其擾害邉疆即欲行稽查實無從踪跡并欲施撫恤亦無自招安今仰賴聖主聲教所播訖於遐荒即此化外野夷莫不喁喁內嚮所稱惟德動天無逺弗届臣於今日見之矣謹此繕摺奏聞臣謹奏實可欣慶之事從此邉氓得以安枕矣此皆卿忠誠為國之感應朕嘉恱之至題到有旨同日又奏為覆奏事竊雍正五年六月初七日臣據實陳明一摺荷䝉硃批訓示諄切復蒙頒發硃批嶽鍾琪十二摺到臣臣伏讀纍日分繹合參仰窺我襲取得也至于務愼急先慮周善後物無遁情語無泛字俾竣事之日早定于受命之初以臣愚鈍知解實難謹據管測條覆以自慶臣等之遭逢并以志私心之奮勉敬陳于左一正月二十九日二摺臣看嶽鍾琪委貟提審于前遣兵應援于後預謀安撫先防擾纍知祿鼎坤之狡猾恐其潜踞滋蔓皆伊歷練愼重處其委貟並未入烏援兵並未露面嶽鍾琪實逺不及知至于祿萬鍾既參且請赴叙府親理止欲改土歸結不將參案委審則不無姑息伏讀硃批于委貟審理未免遷延等語則以前案亦要審明方是于將祿萬鍾題參改流等語則以仍嚴解送鄂爾泰處以便合一歸結改歸雲南于祿鼎坤狡猾內應等語則以未必有此舉寧可防其意外臣初讀傾折再讀抃舞知烏䝉之事如此輕易完結者實旨伊稱深服臣臣益難以自安矣至稱天全二土司罪惡多端既經訪確自應懲治若身為大臣而貪其小利眀知貽害而不計逺圗罪不容誅終難漏網但知料理難知斟酌更難臣等當凡百熟慮舉一詳推可也一二月十二日二摺臣看摺內大意烏夷既傾心歸附川貟業經安撫而雲貴兵馬乃深入大關以致傷亡官兵似屬自取及編查户口巳逐一安置而雲貴官兵尚駐劄烏蒙之內更似多事又烏蒙鎮雄既先後具呈情願繳印獻土一併帶至敘州府酌議安置是雲貴原無容攙越並不用臣㑹辦也伏讀聖鑒如神臣惟當自慎至于嚴飭官辨毋得貪小利以悮事比引從前率皆少示威而終止水火之譬實切驚心委用得人誰能過信臣前蒙硃諭不敢暫忘大抵才智之弊莫大于邀功庸鄙之私莫甚于貪利懲斯二者則何念非公何事非實凡一二月二十二日二摺臣看摺內嶽鍾琪以兩土府俱幼稚無知請原情略法將公用銀兩于四川省城置買房屋莊田分給安插情詞懇切臣查兩土府各有資財即便安插亦不須動公用且祿萬鍾兩次參案又何以了結伏讀硃批以此二事宜于雲貴歸結前已有諭雲貴四川皆與其故土相近內省安置或京師山西河南等處相宜則知川省之不可留而黨羽勾連之或能貽患也以各案明白後自然從寬發落則知漢姦惡目之并應究治而先寬土府之未便明告也以冕山普雄得以成功奪其屏障所以從容就緒則知二事之完結亦嶽鍾琪先事之功並非臣力之自能料理也三復紬繹敬念睿慮周詳並曲全臣愚至意安得不感切欣幸而訓諭諄懇反覆誥誡者總不外勤撫馭嚴勒索數事至仁如天萬物一視於此而敢不凛愼是自殘同類矣其烏蒙大關􅋭所有藏蓄等項三省所共知臣前委貟㑹勘業經川貟查點封貯云不必再查亦不告知件數後聞有歸滇之信復因臣嚴飭兼委文武遍查始陸續詳報今已四處查清現在造冊伏讀硃諭後仰體聖主大公至正之心凛遵歸併管轄之旨一切咨札並無嫌猜俾臣得盡力料理漸有頭緒此發兵搗巢不知土府之役臣實明示以意使夷酋先自度量雲貴能否攻勦烏鎮能否拒敵然後速我進路留伊去路故智窮勢迫相率投川臣前密札劉起元張玉等已明言之是臣初意原不在搆兵祿萬鍾等徒自取禍耳今事已底㝎善後須周伏讀硃批不可因歸併雲貴應辦者推諉總賴二卿悉心籌畫褒嘉逾分悚仄倍常若復稍蓄私心其誰能逃洞鑒義應報國實則所以自為矣其九姓土司覆摺欽奉聖訓以未有盡行改流之理以如易改之處必不敢為大不法之事以向來安分土官便情願具呈改流皇上而無異論者也一閠三月十一日三摺據嶽鍾琪具覆張玉情詞似屬可用之貟臣前所奏係就事言事並未審其人在張玉等彼時以事屬川省臣不過協辦料未便破面續經臣通咨嚴飭遂復悔懼并明告滇省委員以無可奈何之意竊念習染難除何止張玉一人總緣庸人鄙見且以回護本省為義氣而不知耽延公務之大為悖負也土府安插內地即屬格外洪仁此邉境久逺之謀亦酋長身家之計事情明白後臣謹按以人事君者人臣之大義凡屬僃位皆應惜材况陜督臣嶽鍾琪效命邉塞有功國家捫心自揣能如伊者何事若或不知愛敬稍有嫉嫌即是顯背慈訓并攄愚誠謹繕摺覆奏伏乞聖主睿鑒臣謹奏覽雍正五年八月初十日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正五年七月二十日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣珊瑚珠一盤記事摺一袋法琅匙箸瓶盒一副鼻煙洋器一具蓮心茶一瓶佛手柑一簍抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷蒙硃批朕躬甚安每嵗夏令便覺少有不爽總不似今年甚好卿好麼朕每念及交卿辦理倚任之事思卿之勞實令至於不忍凡卿一切料理奏對朕實心動覽之朕亦不多諭惟秉一誠默祝上蒼厚圡聖祖神明令我鄂爾泰多福多壽多男子平安如意耳量精神力量為之第一不可勉強欽此臣跪捧卒讀感痛失聲妻子驚看莫知所以伏念我聖主萬幾就理直若行所無事猶復日御勤政殿雖溽暑不少輟既辦理一切又命諸臣呈件代辦自強不息純亦不已天下萬世有至尊而勤勞如此者乎上蒼厚土聖祖神明實鑒精誠用申保佑在聖躬之康強逢吉固所自得而內外大小臣工皆當知感知奮自訟自慚者也臣血氣具存心肝不昧身膺殊知異數秩晋八階廕叨四品儒臣之榮至於斯極即使竭蹶效命已難酬萬一乃屢荷聖慈奬許至此期望至此愛飬至此矜憐至此臣不但念及身家實同狗彘便私有性命亦難欺鬼神敬繕及此涕淚盈襟此生此世即欲作報恩人且無能自了又何敢墮落故自受事迄今惟思勤以補拙曉起夜眠巨細皆親理而同官屬吏謂臣羸瘦時有勸詞殊不知盡得一分力斯安得一分心心之所安即是樂境強弱論形達人所誡臣今且精神健旺疾病全消無所云勞漸能就逸懇祈聖恩毋為萬里逺臣慮也至於錫福自天求福由已上有皇天眷命萬壽無疆之主斯下有天夀平格保乂王家之臣臣實非倫當求自信再臣自赴滇黔連生二子今已有五男平安如意欽奉御書聖心即天心臣惟當自為承受地耳不揣冒昧瑣細陳奏恭謝聖恩伏乞聖主慈鑒臣謹奏覽卿奏謝朕甚為欣恱前朕之祝願實住大光明中出于一時至誠之筆今多子之願既應其他上蒼必賜如意也朕實欣幸焉同日又奏為敬陳水利以備採擇事竊江南水利一事屢荷聖心眷注諄懇臣前任江蘇藩司於所屬水利曽悉心咨訪略知大要原擬將此項經費籌畫預定然後詳請督撫隨其輕重緩急次第舉行及奉聖恩超擢來滇事雖已寢心未暫忘前閲邸鈔知蒙聖主發帑金十萬委大臣辦理且感且奮適值撫臣陳時夏之母奉命就飬臣隨寓書陳時夏略云疏濬河渠特賜帑金以資調度不勝歡慶蘇松常鎮就近之地料已留心查勘而江寧為省㑹之區城池尤宜亟講郡治內外皆有河道秦淮之水四至可通獨以日久湮塞若尋源開濬實於民有濟揚州所重全賴五塘久屬豪強擅廢諸閘淤河作田因占數百里之官塘遂荒數十萬之民産至今少旱即歉多水又淹若將故閘仍舊復造五塘之水一蓄所費不過數千金而斯民之利甚溥但須不畏強禦方克有成故雖有賢守令往往中途遂阻由一郡類推大概準此即勢不能搖又或造為别論使必不可行此不欲開河之通弊不可不留意也至髙寶一帶稍遭水漲即為民害應設良法為久長之計等語去後復屢讀聖諭剴切周密又奉旨以原任給事中許承宣條奏揚州水利一疏著問揚州府在京官貟其覆奏亦甚詳明仰見聖慮所周無微不燭欣躍之私實不自禁更䝉聖主著臣胞弟鄂禮同往協辦誠恐鄂禮才具少軟設遇有議論異同不能決斷除詳細札囑外謹據臣所見冒昧陳奏按劉河白茒二處奉旨開濬此誠湖海二區之脈絡江浙六郡之要津查康熙九年巡撫張祐開濬劉河二十年巡撫慕天顔開濬白茆等河其時相去未逺皆有志可考有跡可循自能仰體聖諭至于江寧之秦淮其源有二一出句容華山一出溧水東廬山合流入方山埭自通濟水門入于郡城內外交資其利甚溥但久不疏濬即疏濬亦屬故事故河道雖存僅于夏秋水大時暫通舟楫是享其利者正復無幾若不及今大加疏濬日就堙廢勢難清理至于揚州之五塘雖侵占已久而故址皆在但能不畏勢豪修治甚易裨益實多由揚州之邵伯髙郵寶應以直達淮安此一帶地方稍遇水大一望汪洋民將不堪若開濬五塘亦足分其下流但河堤綿亘三百餘里往往淮黃及湖一時滙聚宣泄甚難雖設閘巳多而一旦水勢驟急輒橫行泛濫多被衝決須沿途相度别分支河出水迅駛常就安瀾如此則淮掦二郡永逺奠㝎而江北之水患息矣至于髙家堰為二郡之保障及淮北各州縣皆逼河工自有河臣坐鎮不時督修又非獨水利所關無俟臣瀆江南自劉河白茆之外其為南北之要津者莫如鎮江之漕河在丹徒界者四十五里在丹陽界者九十里地勢如建瓴雖有京口吕城奔牛諸閘藉以蓄水一至冬月漕河水淺挽運艱難每年挑濬隨濬隨淤嵗以為常皆由河身淺狹及挑濬時又復茍且為一時之計所挑淤泥堆積兩岸就近之處及大雨淋漓仍復衝缷入河且水淺之時漕船既不能行橫截河內阻絶民船無由飛渡以致起岸盤壩行旅艱苦公私交困此又江南河渠大弊亦不獨水利所關也臣查此地實係杭嘉湖蘇松常鎮七府行漕之河而向例每嵗挑濬獨責之丹陽是丹陽之民獨受其纍更有姦胥蠧役地棍等人得以借名灑𣲖腳役車夫驢户等人得以勒索髙價而兩頭來船又得以卸裝另載凡此姦徒皆因以為利故樂其堵塞不樂其疏通于是勾串夫役原不肯實力疏濬使就深濶又且賄囑漕船舵工水手故意排擠不留餘隙甚至多用小船填塞河縫以絶其往來行人到此忍氣吞聲不得不舍舟而陸臣深察其弊曽經親勘嚴飭雖于雍正二年間料估工費公中疏濬然猶未能如式且附近各境凡有可比丹陽之練湖者皆應開通以助運河常使流注無窮不須復濬庶為一勞永逸之計至于各郡州縣之內外城河并各鎮市之河每被勢豪侵占或填砌狹小或全行堵塞尤可痛恨應嚴飭有司盡行疏通不得少有狥庇如仍前因循不即挑濬清理者一經察出官參吏處勢豪之家從重治罪其各支河港瀆塘浦名類不一所在多有據廣督臣孔育珣所奏各閘各瀆各鎮市之河皆就所經厯一處而言實不止此凡可裨益地方者應悉令查報酌量經理但河路甚多若必盡待帑金勢難遍給臣竊斟酌條例凡挑濬官河者一切工費取給公帑其挑濬城河及鎮市之河者則通計河身丈尺俾瀕河兩岸居民每户照其基址各浚其半其在巷內不臨河者量為協助深淺寬窄各有定程鰥寡孤獨悉豫優免至其閒隙之地並無民居以及未挑之前先須築壩戽水及挑之日或須拆屋砌岸凡此等工費公同確估勸令紳襟富户典賈鹺商量力捐輸毋許勒𣲖其各支河關係民田者髙田挑濬借水之利低田墟岸驅水之害皆勸令通計合商彼此交濟是官為經營民受惠益勢豪姦蠧不敢阻撓且自費者仍以自給凡有田之業主種田之佃户皆無不踴躍樂從而為利斯漙矣再城外運泥之法務令逺置低窪之所不令髙出地上城內運泥之法則暫令積之有障隔之空地俟水通日雇船運至城外亦置于低窪之所不令髙出地上總須倡率有方調度有法一切因時度勢之用惟恃乎其人又非臣言之所能盡也臣自任江南私心耿耿適蒙聖主軫念及此實千載一時故不揣愚昧越職陳奏伏乞聖主睿鑒採擇施行臣謹奏此奏可嘉之至已有旨矣同日又奏為報明開墾田地并查出隱射田土仰祈睿鑒事竊照各省有可墾之處聽民相度地宜自墾自報奉有諭旨著為定例其無主影射田土應清查抵補屯軍丁銀經署撫臣楊名時具題部覆奉旨依議欽遵在案臣自上年二月到任後即通行各屬勸民開墾并查影射田土抵補丁銀凡接見屬員時復又諄諄告誡務期留心查勸實力奉行以副聖天子富民阜俗之至意嗣據昆明羅次尋甸河陽彌勒雲南騰越等州縣并廣南蒙化二府陸續申報勸墾過民賦荒旱田地共四千七百五十三畝零該夏稅本折麥一十一石五斗一升五合本折米一百二十石二斗七升四合條編銀七十一兩四錢四分又羅次雲南㝎邉三縣勸墾過屯官馬料荒旱田地共一千三百八十二畝零該夏稅本折麥三石二斗二升六合秋糧本折米三十五石五斗六升五合條編銀二十九兩八錢二分俱雍正四年分之事業經署撫臣楊名時與臣㑹疏題報訖又晋寧呈貢昆陽嵩明宜良富民彌勒趙州等州縣申報查出欺隱并自首抵補軍丁民賦田地一千九百二十九畝零稅糧折徴條編二項共徴銀五十三兩零景東府夷民自首抵補軍丁未載全書額外田四百五十六段稅糧折徴差發二項共徴銀一百四十三兩零按田畝論段係土夷舊例尚未及清查畝數又昆明祿豐晋寧呈貢昆陽易門嵩明宜良羅次富民雲南趙州浪穹保山騰越䝉化㝎逺等府州縣查出欺隱并自首抵補軍丁屯官馬料田地共九千二十四畝零稅糧折徴條編二項共徴銀五百四兩零均于雍正四年田地糧銀項下徴收造報俟各府州縣清查抵補丁銀于下年奏銷冊內造報近又據陸凉州查出影射田一千一百六十七畝零地八百四十二畝自首新墾田七千二百五十七畝零地八千六百五十八畝易門縣清出民賦沐莊隱墾田六百六十二畝零路南州民自首隱匿叛産田一十七畝零通海縣清出自首屯田二千一百二十七畝零民田三十四畝五分寧州查出自首影射民賦田一千五百九十四畝零保山縣民自首田二百五十七畝七分屯田一十八畝賓川州查出影射地九十四畝二分田一百二十畝宜良縣查出影射田七千五百七十六畝地八千八百七十八畝以上各田地糧條或應歸入正額或應攤抵丁銀現在行令查明分别科則造冊申報又陸凉州向有臣標馬厰一項坐落海子內雖例係夏秋二季牧放馬匹冬季收攔然牧放時甚少因附近居民侵占告爭前督臣髙其倬委千總劉起賢查丈招民開墾科租給與老丁然所收無幾現已無存臣自到任即委新興州知州今准補開化府同知吳士鯤嗣復行令現任陸凉州知州祖良範查造地畝分别科則內有變價新墾浮多一項係借新墾為名私自占種又祭需一項田地被貢生趙世基以教讀為由父子相𫝊私自收租又有無糧田一項亦係私種此三項並無錢糧雖非馬厰皆係欺隱故均照馬厰科租又魚箔一項原係築箔捕魚辦課因阻水道常淹沒民田百姓控告將箔拆去量撥海子餘地幫補辦課今馬厰盡行招墾魚課應行開除至旱馬厰一區亦係官地查其土宜可以種蕎今據祖良範開報查出田地數目原任新興州知州吳士鯤造報地三萬一千五百六十一畝三分零祖良範到任後查出地三千三畝一分三釐零內有未領荒地四百三十二畝六分零俟有人承領科租查出旱馬厰地五千二百七十五畝七分四釐田四百二十六畝八分零以上實種田地通共三萬九千八百三十四畝三分零應徴大小麥蕎榖京斗租三千四十石九斗八升零現在飭令造冊詳送題報歸公又蒙自縣有臨元鎮馬場始而有一二報墾納糧之事及逺近居民漸次開穵有稱祖遺民田與叛産者有稱報墾與各祠廟香火田者率皆糧少田多各自隱占臣訪聞確實于今春檄委廣通縣知縣郭倫通海縣知縣顧濟美前往逐一清丈除有糧田四千六百四十一畝零有糧地四百二十五畝零共丈出隱占熟田二萬三百五十五畝零熟地三萬八百二十六畝零現在行催冊報又麗江府民報首田畝據該府元展成禀稱約有田三萬餘畝現在清查冊報即於明嵗科租統應俟查明造冊到日㑹疏題報所有勸令開墾查出影射田地通共一十三萬八千餘畝外夷民自首田四百五十六段合先具摺奏聞再滇省文武衙門大半各有官莊臣業經密查并檄飭各貟據實開報現已悉大略俟各屬報齊行令藩司造冊詳題歸公合并聲明伏乞聖主睿鑒臣謹奏可嘉之至四字皆屬多諭同日又奏為覆奏事七月二十日頒到升任廣南府經厯吳啓文一摺荷蒙硃批吳啓文條奏此一摺朕不達卿可酌量斟别為之欽此臣看摺內所稱廣南府土同知儂鵬及儂繩英妻撫幼嚴氏并土目陸順達陸尚安父子等情事臣自到任後即經訪聞隨密飭各貟各就所知密禀當據糧儲道張允隨廣南府知府潘允敏等據實呈禀在案查該土同知儂鵬係儂智髙之後從吳逆作亂受其僞職及王師平逆儂鵬投順給以世襲土丞其始從逆四川時曽經搶虜遵義府民間女子濮氏為妾後奉文稽查發回原籍嫁與張大為妻及儂鵬身故無嗣鵬妻祿氏聽信土目龔勝等揑稱濮氏原係懷孕而去遂將濮氏并其後夫張大之子接回認為儂氏之子改名儂繩英冒襲世職後因不法擬絞未議削土繩英妻嚴氏遂濫膺撫幼管理土丞事自此土官權柄俱歸土目其四大頭目曰內甲曰總管曰板欄曰內兵此四目把持線索任意指揮四目中內甲又最權重凡調撥土兵發縱指使皆係內甲舊時內甲俱儂氏族人選用康熙三十五六年有陸尚賢與儂克昌爭此內甲劫殺連年官兵攻𠞰不勝後設計招撫陸尚賢出降一守偹乘間擊之事得稍息而儂陸之仇至今不解陸尚賢是現今板欄陸順達之姪輩始則陸順達誘出尚賢繼而尚賢死後順達與其子陸尚安等互相濟惡更甚于尚賢官府傳唤從不入城即偶至城外禀事亦必四路埋伏勢若臨敵其于村中恃強占奪不遂其意便肆燒搶伊既盤踞險逺瘴惡之處急則竟入粵􅟱藏匿無從追踪曽于五十六七年間各頭目遍起土兵圍城幾陷攻殺相尋逐年皆有近雖稍知斂戢不敢猖狂然凶惡難化終為後患臣念土官無權權在土目而土目巢穴又逼近􅟱粵緣粵夷未靖􅟱夷有事若不籌畫萬全相機而動即剪除土官亦難以善後先經大張告示明書陸順達陸魯陸尚平陸尚安等名曉以改過從寬怙惡必戮大意復切諭廣南文武明示寬縱密計擒拏續奉清查邉界酌設逰巡之旨現議于廣南要隘駐劄官兵更替防汛且泗城既定粵夷喪膽料不敢助惡一俟􅟱址事定便當勦撫兼行漢夷並用務擒其渠魁收其土地為一勞永逸之計凡臣屢次札檄皆該經歷所知聞故其言之確鑿也至于該土丞徴取屬夷錢榖名曰年例每年約得六千餘兩色係七成上下實計紋銀四千餘兩與吳啓文所稱八成吹絲銀五六千兩不等之數亦大概相符此外復不時需索夫役牲畜稍不如意則箠楚拘囚無所不至皆有不願服土司管轄之望統俟擒獲陸尚安父子時一面參革土職盡歸流管轄將向所入年例再疏請聖恩酌為減少以恤邉夷其餘盡歸公帑銀米各半輸納庶按緒就理一舉可成而廣南邉境得以寧謐矣謹僃細陳覆伏乞聖主睿鑒臣謹奏覽此奏朕明悉矣次第緩為之卿自有斟酌道理朕意凡煙瘴之地改流極宜詳愼同日又奏為請旨事竊查雲南提督臣郝玉麟于雍正元年十二月奉旨帶兵前往中甸雍正二年二月又奉旨帶兵赴察木多應援西藏查拏逆黨在中甸起程時值大雪封山水冷草枯前督臣髙其倬㑹商署撫臣楊名時每兵借給一年餉銀至雍正三年九月提督臣郝玉麟遵旨查看裡塘巴塘地界一路回署仍酌留兵丁五百名駐劄察木多彈壓地方至雍正四年十二月奉旨撤回當自中甸進察木多時緣奉有作速前進之諭旨口內營馬檄調不及提臣郝玉麟將現在馬匹搭配分給兵丁䭾載不敷之馬雇覔夷馬給兵䭾載每匹發銀一十三兩雪深冰厚番民之馬倒斃甚多又經重復雇募以致各兵多有賠纍及抵察木多存營之馬復遣差逰巡逆賊羅卜藏丹津所屬地方招撫南稱巴卡等二十七處番民所到各地方俱崇山峻嶺積雪數尺而營馬倒斃殆盡逮至撤師䭾馬所存無幾復又雇募由巴塘裡塘草地跟隨查勘地界進口只在管理糧餉官處每兵權借銀八兩給付自行雇覔䭾載查康熙五十九年出征西藏兵丁回師䭾載于管理糧餉官處每兵借支銀二十一兩有零察木多係進藏一半路程每兵借銀八兩未及前次一半又各兵借支過年及回師盤費前後通算除病故廢疾兵丁外現在馬步兵丁共借支過銀五萬七千二百四十八兩零今雖議㝎作一十二季除還但照數分扣各兵所支者無幾難資飬贍據各兵聨名懇訴情詞迫切准提督臣郝玉麟咨㑹前來臣查康熙五十九年兵丁進征西藏時除照例支給鹽菜口糧給與䭾載馬匹並折給五個月裹帶口糧每石折銀四十兩七錢製辦一切行裝費用于司庫內每兵借支半年餉銀與在藏借支之項後䝉恩旨俱准豁免又莭次護解糧餉兵丁每名賞銀十兩又給與䭾載二兵三馬每匹折銀四十兩亦經奏銷在案各兵往察木多擒拏逆黨援𠞰各路雖與進藏兵丁有間然比護糧解餉亦頗效勤勞出口之日每兵賞銀四兩口糧馬匹並未折給又未領支草料僅此口糧鹽菜實不敷用適提臣在省臣詳細詢問伊復僃言形狀若照三年扣完恐仍不免艱窘相應據實請旨准以六年扣完庶兵丁不致苦纍至于量豫減免以示優恤此出聖主特恩非臣所敢置議也謹繕摺奏伏乞睿鑒施行臣謹奏此奏甚是朕欣恱覽之卿若不奏此事幾乎疏忽已有旨矣加恩優恤原朕之本意也硃批諭旨卷一百二十五之四欽定四庫全書硃批諭㫖卷一百二十五之五硃批鄂爾泰奏摺雍正五年九月十六日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正五年八月三十日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣嵌玻璃紫石蘷龍盒硯一方銅格水火雙硯一盒蜜荔枝二瓶抵滇又於九月十四日臣齎兵馬錢糧冊承差李燦回滇復䝉頒賜臣欽定詩經傳說會纂全部臣隨皆郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪諷硃批朕躬甚安卿好麼來往人朕僃細訪問知卿精神起居甚好實如獲珍寶之喜但諸凡量力而為之萬不可過強欽此及摺內敬述天語一公則無事而非是一私則無往而非不是復䝉硃批但知此何時而非坦蕩之景真極樂界也欽此臣伏讀之下無可語言愛臣諄篤臣之慈父勉臣深切臣之嚴師凡有天性皆應悚心臣敢不益自愛重期為成人但臣竊念我聖主萬幾親理日昃不暇心周遠邇大小靡遺盡在睿慮之中總歸至中之宰而百官羣牧曾不能仰贊萬一少紓聖懷念聖主之勤勞實臣工之罪戾臣雖在萬里心切難安況臣職司所寄即竭蹶料理亦止此兩省而兩省諸事猶多未就緒乃復屢荷聖慈諭臣量力不可過強臣更何以自解至於臣年來精神實倍健旺此來往人所共見惟當念念存公刻刻去私常求坦蕩之景毋敢忘此極樂界也為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝知道了字字出於至誠句句朕皆動容覽閲諸王大臣因朕五十大壽懇請僃宴朕勉從之此日微雪一堂和氣喜溢宫院念卿在遠省未得入座特留數種朕親嘗食物寄來卿食此如同君臣對面宴㑹也特諭同日又奏為謬沖既靖各寨歸誠事竊花苗一種介在楚黔兼連西粵獷悍難馴謬沖尤甚今據各員攻破其地親行踏勘報稱三方峭壁一線通門羊腸曲徑鼠穴盤居漢夷不能偵探兵役無從捕覓此羣凶之所以得肆其姦惡也前於閏三月二十四日經臣將兩省㑹攻合寨逃散情形奏明在案續據黎平知府張廣泗率領知縣孫紹武署黎平協事鎮逺協遊擊韓勳率領守僃左垣等文武同心楚黔協力冒險履危深入巢窟直窮邊界之外不獨彼此兩地互相糾查并粵西懷遠縣所屬各接壤地方凡有凶苗潛伏等處無不親歷窮搜今兩省各員陸續擒獲賊苗通計大小男婦共二百三十餘名口齊集適中之處公同㑹審其逞凶拒敵并從前各案凶犯俱有著落查得黎屬地方尚止於盜案而於楚省之靖州通道縣等處則肆行劫殺晝夜不分逮經官差捕緝則殺死差役打傷兵丁以及州縣拏獲該寨之人即糾合通寨抗拒官府并擅自捉拏百姓揚言作抵是從前已屬極惡窮凶及今兩省㑹兵臨寨復敢同謀拒敵殺傷兵役是盜劫之罪固已難寬而按以拒敵之條更當從重䆒擬所有掌寨渠魁姚相明等三名各姓管事頭人姚富凡等六名分路拒敵之姚安美等二十三名同謀之李榮華等四名或同謀立議或逞凶拒捕以至動手鎗傷兵丁殺死差役均各俯首供認不諱現在定擬招解另疏㑹題外自此各寨遠邇嚮風皆知為除暴安良故無不畏威懷德除向經歸順各苗悉與漢民一體嚴立保甲并取具不敢容姦容賊甘結外更有歸歐鬼壘九厥交椅几馬等寨俱花苗之種類悉化外之生夷無不舉踵歸誠傾心嚮化今據頭人率領羣苗並繳軍器願納錢糧造有户口花名清冊同詣張廣泗韓勳行營焚香叩首願求內附共沐聖朝治化等情到臣臣查得歸歐鬼壘等寨在黎平府所屬洪州土司界外應令歸洪州管轄其交椅几馬二寨係廣西懷遠縣所屬幹沖地方界內若歸附黎平則中間隔有幹沖應歸懷逺管轄似為畫一除臣咨移粵西撫提收入懷遠縣屬外所有各寨投誠户口錢糧及所繳軍器另繕清摺恭呈御覽又據張廣泗禀稱查黎平西北之龍里古州各土司所轄地方逼近清水江烏孟江等處生苗此種生苗不獨素性凶頑肆無忌憚且凡有罹罪犯法之人攜家竄入恃作護符實為養姦縱惡之區今張廣泗巳㑹同新任副將李登科於八月二十四日起程前往乘機𠞰撫以清邊境此皆該員等先事預籌實心效力裨益地方者也合併聲明統祈睿鑒臣謹奏此事雖卿調度委用得當張廣泗遵照辦理甚屬可嘉同日又奏為報明永北邊界用兵協𠞰賊番事竊永北府之蒗蕖地方與四川之臘汝窩地方邊界相接前據永北鎮總兵柳時昌中軍遊擊徐成貞永北知府馮光裕報稱六月初七日據本鎮標汛蒗蕖千總馬勝稱據土舍阿騰龍報稱四川鹽井衛有官兵調動五所土兵探得係建昌總兵征𠞰臘汝窩等情隨據柳時昌一面令徐成貞派撥目兵添汛防守一面飛報到臣臣隨切囑柳時昌并諄諭徐成貞馮光裕既係川省用兵事同一體所有一切要隘嚴加堵禦毋令脫逃并將番賊各處巢穴密行偵探的確預先挑選精健以僃䇿應協同進𠞰毋得少有疏緩去後續據柳時昌報稱六月十四日接准四川建昌鎮公文移知前事隨著徐成貞并守僃鄭文煥率同千把等帶領健兵五百名前往蒗蕖駐劄查得蒗蕖東通臘汝窩大路一條地名白窩離蒗蕖一百二十里東北通臘汝窩小路一條地名岩底離蒗蕖六十里北通臘汝窩大路一條地名茹卜戈離蒗蕖八十里又蒗蕖半路東南通臘汝窩大路一條地名西番河離蒗蕖一百二十里西番河以外係蒗蕖地界內通高章二土司地界各令辨兵分路前往嚴加堵禦并行密探一切情形以憑㑹𠞰至七月初六日川兵抵阿利村寨逆番抗拒不肯授首滇兵四路堵塞川兵乘勢進攻斬殺三十餘人餘皆降伏又搗什咱一村生擒二十三名口并𠞰殺多人然後情願獻黑鹽井以求宥罪等情於是兩省各皆撤兵回營事關邊界用兵協𠞰賊番情事理合陳明臣謹奏如此不分彼此料理封疆大臣毫不推諉瞻顧何事不能辦理也嘉悅覽之同日又奏為乘藉兵威𠞰滅猓賊事竊臨元鎮屬威遠新平一帶地方猓賊猖獗潛匿魯魁哀牢出沒江內江外為害最凶由來已久雖從前屢經用兵凶頑難以就擒煙瘴難以深入或反致代為支飾互相容隱巳非一日久在聖明洞鑒之中前以鎮沅逞逆因而威遠猓賊扎鐵匠周大妹等乘機聚衆打井劫寨虜掠鄉村又有新平野賊李百疊等亦率衆報仇搶殺臣聞禀報隨嚴檄官辨趁此兵威前赴威遠新平二處協力擒𠞰務盡根株又遣臣標遊擊李化龍帶領辨兵星往㑹擒始而羣凶嘯聚洶湧異常及見官兵奮勇直前有戰必克賊勢潰解四散奔逃潛伏深箐無從踪跡其時正值盛暑瘴癘薰蒸官兵染瘴甚至病故者屢報到臣臣思若不及此𠞰滅又行撤兵縱暫時安帖後必猖狂姑息之恩適所以養禍因復差臣標守僃席嘉旺齎臣令箭遍飭行營謂猓賊一日不除官兵一日不撤縱觸鋒冒瘴寧死必前能滅賊死有餘榮不能殺賊生有餘辱等語去後仰賴聖主仁威將士奮勵冒險深入搜箐搜山於是殺斬過半多所擒獲據臨元鎮總兵官孫宏本詳報各處地方所有猓賊生擒解省者六十名當場拒敵鎗駮傷死者九百四十一名內斬首級三百八十四顆拏獲眷口安插者一百八十二名口向來猓賊從未覩此兵威從未經此大創兹見官兵所到抗拒盡行𠞰滅投誠一槩從寬於是有威遠凶賊黑老胖等奔赴行營懇求免死旋擒獻賊首扎鐵匠等以求贖罪而新平凶賊李百疊等亦來投訴願為良民各皆從寬安插其解到擒獲人犯現在審擬具題從此威遠新平一帶地方諒可安堵縱有一二狡賊潛踪漏網然渠魁盡獲終難逃匿再從寬安插之李百疊實係新平賊首既強悍橫肆且狡獪不測有時一人數名易於脫復有時一名數人難於鵰擒現在投誠之李百疊即前經奏明梟取首級之白得也姓李名白得又名百疊又名迫德前經官兵追急乃取賊中年貌近似之人故令賊黨指引就前追殺一時辨兵亦無從辨認自此匿跡藏踪今復乘機劫虜被官兵窮追勢難别竄乃哀懇求生率黨服罪此賊不除江外終難寧帖臣令就計許降不必驚破暫行安插以寬夥衆隨密囑孫宏本如法布置務絶禍根緣本內未便陳叙合先聲明至於此番官兵頗受艱苦染瘴病故千總二員把總二員巡檢一員帶傷把總二員陳亡兵丁十三名帶傷身故兵丁三名染瘴身故兵丁一百八十九名陳亡土練六名染瘴病故土練四十名帶傷土目土練三十五名臣每念此舉實切難安欲圖一勞永逸勢不能不出於此固莫可如何敬記臣前摺內欽奉硃批且猛做去寬之一字乃上天之恩若容寬時得有可寬之日乃爾我君臣之大福天地神明之殊恩也只此二字之苦聖祖鑒之含淚筆欽此又奉硃批不可留之人即一人亦不可疏縱若不應正法即一命亦當詳慎蓋千人百人一人皆同一命耳不可就數目而論多寡此等處須用廣大識見料理者欽此臣卒讀神傷再讀志豁仰窺一人之苦心俯覘羣工之陋見始知寬猛兩字皆出自仁慈詳慎合中斯克幾廣大惟當謹遵寶訓事事凛體願學中庸之難能不敢因循以自棄除將𠞰撫猓賊情形㑹疏報明外謹繕摺奏聞伏乞聖主睿鑒施行臣謹奏朕嘉悅之外餘無可諭題本上巳有旨矣同日又奏為據實覆奏事竊八月三十日頒到二摺荷䝉硃批此係李日更所奏朕當日用伊看其甚耿直所以許他奏摺曾摺奏二次似實心任事之員今覽此奏何世璂恐有此病但未知其中或更有别情否據實奏朕知道伊等科甲袒護沽譽之風實為吏治之大害朕在此竭力整飭如果如此朕另有道理欽此臣跪諷之下仰見聖度虛公不遺棄衆論并不輕信羣言是非必核其實進退一凖於衡臣荷聖主殊知惟期仰體天心倘稍有不確何敢冒瀆臣看得何世璂與李日更誼本同鄉又經同在翰林即不行袒護亦何至勒逼臣前在貴陽兩月申大成富貴俱曾向臣言糧道貌似質朴心頗詭譎且待巡撫甚無禮及臣面問地方事伊多不能對或稍坐久便垂頭瞌睡臣經靣問何世璂據云形跡何足論伊能慎重錢糧便是好糧道等語即臣亦因其操守硜介並無染指相待甚優此黔省屬吏所通知者今所奏諸件皆屬虛揑且多自相矛盾實有别情早不出聖明洞鑒中也緣去年奉㫖保舉人才伊再四懇求保舉何世璂不允又求富貴保舉富貴又不肯遂以此蓄怨臣近赴安籠始訪聞此語今據稱何世璂日日來往賓客筵宴豐盛不慮有誤政事等語臣查黔省僻處過客無多其屬員因事來謁與各營將僃領餉候考均當接見并得以詢問各處土俗民情皆分內事即間留一飯亦奬勵之常臣前在黔省何世璂留臣㑹食並不見豐盛况此外可知又稱接見秀才卑詞揖讓不慮長其驕志講書課文自早至晚以大吏而行教官之事等語臣查何世璂每於月朔行香復至明倫堂接見士子并集耆民宣講聖諭廣訓則誠有之竟日講書課文並無此事至於諸生有敗壞行檢武斷鄉曲挾持官長者臣見其屢行咨革已不下三四十名并未姑息何謂長其驕志又稱濫准詞訟沿街投控以憲臣而行有司之事等語臣查黔省屬吏因循成習地方事件多不即完結故致百姓奔控上司即臣到黔省每日攀轅投遞凡焚燒劫殺等件自當批審詳結如有誣告即加倍重處何世璂親准狀詞亦同此意若盡視為有司之事槩置不問又何賴有憲臣也又稱護庇屬員好徇情面詳揭虧空倉糧者槩不參處等語臣查何世璂到任參劾虧糧者巳經數員何謂槩不參處况凡參虧空當先為完虧空計如參後可完自當即參如任內能完亦應稍待若只欲自了身事不顧難了公事終於錢糧何補前當奏銷時李日更正在抱病不察虛實不分多寡混入一詳槩請參追據所詳揭內有少穀止三四十石需銀不上十兩者而署銅仁府思州府知府張鉞即係李日更發銀招買之項並非該府應存穀數緣正值青黃不接張鉞不肯承認李日更一靣勒領一面揭參又黎平府知府張廣泗係前任馬駿領買之項張廣泗因在軍前辦事未及買補銀兩貯庫並無不敷而必欲揭參平越府知府朱齊年係兵丁支借及平糶之項立請買補亦仍列詳揭此外尚多半非情理曾經臣駁查并札致何世璂囑伊務查確實毋或屈抑能員隨委署藩司富貴盤驗完補出結在案且即據李日更所稱止有三四處買補不及存銀作抵則非實在虧空可知即如此三知府才具皆堪辦事而稍不遂意即欲摧殘臣亦不料李日更之居心行事至於此極也何世璂清勤自效少通達才過於拘謹近於瑣屑則有之徇情市恩不敢出此若果深觸其忌尋事中傷則李日更告病時即應代題請休又何至惜其操守婉詞慰留至所稱驛站陋規臣查此項經署撫臣石禮哈奏作修理營房之需已據各屬報竣題銷司道皆有案伊反疑劉師恕申大成適自形其昏憒耳李日更業已起程富貴亦赴部引見劉師恕申大成俱現在京聖詢之下自無遁情臣無庸瑣瀆謹據實覆奏伏乞聖主睿鑒臣謹奏所奏所論甚公朕於李日更之奏亦覺不實况未有因一道員摺奏即調回撫臣對質之理朕原欲俟李日更到來問確再令何世璂明白回奏不料何世璂自奏數摺甚屬悖謬故調來面問今將何世璂到來問伊諭㫖録與卿看雍正五年十月初八日雲貴總督臣鄂爾泰謹奏為恭謝天恩事雍正五年十月初一日新授雲南按察使張允隨赴任回省齎捧欽賜臣御書扁對誠悃宣猷四字體國公忠股肱膺重寄憲邦文武梁棟得純臣十八字并鈎刻撰銅共二十二字到臣臣隨郊迎至署恭設香案望闕叩頭謝恩訖祗領之下瞻誦之餘覺感激之私與驚慚而交集抑欣幸之至轉恐懼以彌深俯首無言仰天流涕欽惟我皇上至誠致化大知用中念為君實難朝乾夕惕願臣工堪寄股肱悉憲邦匪易諄誨曲成期文武克充梁棟維天心之默運雖竊比管窺凛聖諭之頻頒應羣開茅塞况反誠為僞反公為私反忠為姦反純為詐但蹈其轍固王道所必誅而離僞未即是誠離私未即是公離姦未即是忠離詐未即是純縱涉其途特聖功所與進臣爾泰不甘自棄情知亦步亦趨未能自強實恐忽前忽却期匪躬而體國政多未平矢攄悃以宣猷民猶不信欽承寶訓惟當力辨幾希仰覩龍文弗敢少寬一息問此心是欺是慊天鑒在兹論有事謀身謀家人言可畏除具疏奏謝外謹繕摺恭謝聖恩伏乞聖主睿鑒臣爾泰無任激切悚仄之至謹奏覽卿奏謝知道了同日又奏為欽奉聖諭事竊雍正五年十月初一日按察使張允隨回滇臣僃細詢問知聖躬康悅行健日強復傳諭旨你回去對鄂爾泰說朕入秋以來精神愈好你說與他知道他愈加喜歡欽此臣跪聆之下恍如親聞天語欣幸無似瞻依倍切又𫝊奉聖諭鄂爾泰奏稱銅厰甚旺請將銅運到湖廣江南賣與各省採買的官員狠好再著他將鑄的錢多運些還好你回去即傳旨與鄂爾泰欽此竊惟運錢運銅雖可以並行然運銅則省餉增益運錢則國寶流通體勢所關輕重懸殊前此滇省之錢必量數鼓鑄就近運行者皆以山路險阻運載艱難流行逺則需費多需費多則虧折易虧折易則報銷難故司鼓鑄者皆不敢求行逺而騖多今我聖主規其逺大略其錙銖以多運為重微折為輕流通為重開銷為輕此實經世之良法非蠡測管窺之見所能仿佛規畫者也臣查滇省錢局共三十六爐每年共鑄正錢一十三萬四千七百八十四串內除匠役工食標營兵餉搭放各項錢七萬一千九百九十五串零尚存錢六萬二千七百八十餘串臣前原題內請將倭鉛節省銀兩作每年運費約運錢四萬串赴外省行銷外尚存二萬二千餘串現擬設法腳費將此項存錢亦運外省行銷此外添鑄補運買錢轉運仍可以調劑臣當詳細籌算再黔省向無錢局今查得威寧府現出銅厰而鎮雄亦産銅鉛現俱檄令開採將來銅斤儘可供用且齊家灣馬鬃嶺堆積倭鉛皆與畢節縣相近擬請於畢節縣地方開設一局將各厰所出銅鉛照滇省例委銷果能盡心料理辦官事如家事亦必不至虧折威寧府知府楊永斌因㑹審烏䝉案現在滇省臣已令與管理錢局麗江府知府元展成㑹商妥議并估計開局一切房庫爐卡等費約不過二千金俟估定詳報臣再加核酌具疏請㫖外合先覆奏再運銅一案一應䭾腳等項臣早經委辦所需二百七十萬銅數俱可於明年三四月內到漢口五聖鑒臣謹奏同日又奏為奏明酌均公件耗羡以昭畫一事竊惟滇居邊末賦少事繁通省民屯額賦每年僅徴銀一十九萬餘兩秋糧止二十餘萬石各屬條糧秋糧火耗除起解司道二庫平奏欵費之外餘剩無幾而衙役工食等項原無額設俱係自給故從前各府州縣薪水日用以及夫馬并一切公事俱派民間辦應官派一分衙役數倍之地方鄉保又數倍之羣蠧分肥每年私派不下三四十萬小民困苦異常此滇省向來之陋弊也逮楊名時到任於康熙六十一年間將各屬公事核其應需者每年照糧均派隨正完納勒石曉諭名曰公件銀兩此外不許再加派擾使小民知有定額不受書役之苛索在有田之百姓因向有隱射或侵占無糧之田亦樂於完納數年以來百姓安之巳視同正額但各屬糧額多寡不一在當日酌定亦仍有不均臣再四思維若將此公件銀兩概行革除滇省火耗無幾各項公事難以辦應轉恐不肖有司復開私派之漸若照舊聽其自收自用弊端百出實無以善後因檄令各屬造冊呈送即按所送冊內欵目面與司道逐一細核有必需者斟酌議留辦公餘各盡行裁去節省辦理查通省糧條火耗除去解費約餘銀一萬三千八百一十四兩零稅秋羡餘除去道欵約餘銀一萬四千九百二兩零公件銀一十一萬四千六百四兩零內除尋甸路南順寧和曲祿勸等府州攤丁鹽課共銀三千三百三兩零實該公件銀一十一萬一千三百一兩零各項共銀一十四萬十七兩零除永北府併永平縣原未定有公件外昆明等五十五州縣并廣南元江開化順寧鶴慶䝉化景東麗江等八府共留辦公銀二萬二百七十七兩零養亷銀內除元江一府其廣南昆明等六十二府州縣共給銀四萬五千二百三十六兩零所留養廉銀准其按月扣留應用如無動用仍存留移交不得别用倘有那移虧空與正項錢糧一例參追實應解司庫銀七萬四千五百四兩零此外尚有黑井提舉司每年應送督撫布按節禮銀一千六百八十兩白井提舉司應送節禮銀八百兩琅井提舉司應送節禮銀一千二百一十六兩仍應照舊起解通共該解司庫銀七萬八千二百兩零至各屬公項中如督撫兩院與布政司糧鹽二道衙門俱有養廉節禮一項應俱裁革雲南曲靖大理永昌楚雄元江六府向有稅規普洱通判有徴收秋糧羡餘可以養廉均無庸議給其臨安澄江廣西姚安武定等五府及按察司永昌道衙門别無養廉全賴節禮為日用盤費幕賓束修之需應於解司公項內每年議給按察司銀四千兩永昌道銀三千兩臨安等五府銀各八百兩共銀四千兩按季赴布政司庫請領又雲南曲靖臨安開化大理五府同知通判各二員永昌永北楚雄武定四府同知各一員澄江廣西鶴慶順寧四府通判各一員俱屬冷署亦别無養廉每員應量給銀四百兩共銀七千二百兩以上司道府㕔共該養廉銀一萬八千二百兩俱令按季赴司請領臣通盤計算省中各項公費有紙張役食修理資助并齎奏顔料兵丁犒賞部辦飯食以及三年文武科場等項每年應需銀二萬兩尚節省銀四萬兩應請歸公充餉如此庶通省公事無誤而各屬養廉有資矣但公件名色既條例所無亦别省所未有臣未便詳叙擬將歸公銀四萬兩作為火耗羡餘并各衙門節禮等項題報充餉再滇省田地欺隱者巳陸續清出未清者現在委員勘丈又開例招墾錢糧自必漸增如各府州縣所得耗羡可以辦公養廉則所徴公件一項仍應漸次裁減合併聲明除將公費并各官養廉銀兩數目另開清摺恭呈御覽外伏乞聖主睿鑒批示遵行臣謹奏料理甚屬妥協大概川省亦然近者嶽鍾琪請將一切雜派供給盡行裁革只存加三火耗均與通省屬員為養廉百姓亦甚樂從料理雖是妥協但加三猶須核酌所以於恩減浙省錢糧之諭㫖內亦曾略帶數句滇省如此籌畫可謂盡善但各員養廉似少不足從前此事原係楊名時沽名釣譽之舉不計可行與否暫沽一時之名而又縱容屬員設法巧取置之不問以取悅於屬員令感其寬厚毫無實心惠民之處乃大巧大詐之作用耳今既如此只得就此公平料理也將此諭與楊名時朱綱看同日又奏為查出官莊田地報明歸公以除隱漏事竊照官有祿以養廉民藉田以辦賦凡地方田畝惟民可得而有官不得而據也滇省文武衙門大半有官莊名色或係勳莊清出或係叛産歸公或無主田地文武衙門招佃開墾因而收租收息視為定額前官𫝊之後官私相授受匿不報聞而夷民得以藉口欺隱田糧官不能清理亦不敢清理陋弊因仍由來巳久臣於去冬查訪既確隨檄行各員據實開報去後除雲南等府昆明等州縣各覆稱並無官莊外據糧儲道元江廣西澄江大理永北永昌䝉化麗江楚雄順寧景東等府并安寧易門陸涼平夷河陽路南彌勒建水寧州新平阿迷趙州鄧川賓川保山永平騰越南安雲州和曲元謀大姚等州縣陸續報到官莊田地每年收得租米穀麥蕎豆共一萬七千三百六十七石四斗四升二合九勺內除上納條丁秋糧費用之外尚餘米榖麥豆八千五百七石七斗七升七合零又據曲尋永順永北三鎮并騰越協副將段宗嶽臣標中軍副將陳清永北鎮左營遊擊張翰彬守􅊀劉化龍各報到官莊田地除完條糧年收租穀麥豆共一千四百二石七斗五升又據東川府報稱查出巳故祿氏養贍並文武官莊田共一萬五千二百七十二畝年收租穀四千六百八十餘石再臣標五營有沿海邊界開墾老丁田地并各處草場腳下丈出新淤自報田地共二千五百三十六畝三分零年收租穀一千五百七十八石五斗零向為恤養老丁之用其實需用無多查臣衙門另有菜地數塊可以分贍老丁田地租穀相應歸公又臣標陸涼州馬場年可收大小麥蕎穀租三千四十石九斗零業經摺報以上共米穀麥豆蕎一萬九千二百一十八石零又租銀一百二十九兩統應歸公彚入年例奏銷册內達部至開化武定姚安尋甸馬龍羅平姚州鎮南定遠定邊等十府州縣俱報有官莊因數目開造不符業經發換俟到日一併檄發藩司造冊詳題其有終不具報或所報不實者仍當查清以示畫一所有現在查出官莊田地緣由合先奏報伏乞聖主睿鑒臣謹奏向聞滇省鎮臣甚苦毫無出息此等營中官莊地畝應賜與營標為養廉者卿當斟酌之雍正五年十一月十一日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正五年十月十三日巡撫臣朱綱入境差役齎至頒賜臣奏匣三箇又本月十六日臣齎摺候補守僃裴宏道等䝉恩賞給驛馬齎回御賜臣素縀四聯哈密瓜二圓果乾一匣抵滇臣隨各郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批覽卿奏謝朕甚為欣悅前朕之祝願實住大光明中出於一時至誠之筆今多子之願既應其他上蒼必賜如意也朕實欣幸焉欽此臣伏讀數四覺感激之私并忘仰至誠之明通凛上蒼之昭鑒一念少懈鬼神殛之此外實無可名言至十八日撫臣朱綱到任抵省臣出迎郊外恭請聖安伊口傳聖諭總督鄂爾泰昨年出京時朕看他身子弱後聞他到雲南將身子調養好了朕心甚為喜慰今朕躬萬安朕知他時常敬念爾到雲南可說與他欽此臣跪聆之下如聞我慈父聲北望神馳不復能出一語續接見朱綱備細請問伊一一敬述皇上聖躬康恱精神倍常日理萬幾無少停留并親見奏摺盈尺硃批皆遍感激驚嘆動諸顔色臣因就管窺敬告朱綱聖主用人行政經權時措衆皆知為生民未有其實並為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為恭報滇黔二省秋收豐稔并米糧價值仰祈睿鑒事竊照滇省跬步皆山黔省土性瘠薄全賴雨暘時若方可豐收雍正五年自夏徂秋雨澤調勻兩省高下田畝均得及時栽插穀穗秀發異常今雲南等二十一府各報所屬秋收均有十分實為大有之年目下省城米價每石賣銀一兩一錢其餘各府每石六七八九錢至一兩不等貴州貴陽等十一府並各屬具報早稻晚稻俱經收穫通省收成約有八九分省城米價每倉斗價銀八分餘係六七分間有八分者此皆仰賴我皇上宵旰勤勞感召天和之所致也再雲南今嵗收成實十數年所未有緣各屬缺少倉穀有以銀作抵并發銀招買之項皆令及時完補故米價仍不能大賤合併聲明謹繕摺奏報伏乞聖主睿鑒臣謹奏卿此忠誠若不如是昭應無是理也朕欣悅以手加額覽之同日又奏為報明進𠞰窩泥逆賊事竊查車里宣慰司地方近逼老撾遙連緬國有窩泥一種雖具人形而生性冥頑與禽獸無異藉江外為溝池倚茶山為捍衛盤踞萬山之中深匿巖險之內入則借採茶以資生出則憑剽掠為活計前鎮沅逆案刀如珍等勾結各種猓賊輒有窩泥四百臣於三月內已摺奏其詳及官兵進𠞰窩泥四散於四月二十八九等日據普威營參將邱名揚茶山守僃李定海等先後報稱有窩泥逆賊沙比一名在架布地方砍傷客腳當被汛辨查知前往追拏沙比即脫逃於倚邦穀地等處糾結賊黨隨有莽芝凶賊麻布朋與克者老二二人原係窩泥渠魁率同衆凶於四月初六七兩日在慢課慢林等處要截路口劫殺行人茶商客衆多被殺傷各皆奔命隨經嚴飭將辨帶領官兵星速擒拏通計前後拏獲凶賊大小共七十人隨經該將僃等訊問各供麻布朋等悖亂已極雖其妻子羽黨等俱巳被獲而麻布朋與克者老二濳逃無踪查一帶地方係車里宣慰司管轄隨經將僃等檄知該土司刀金寶協同擒拏續據刀金寶雖一靣委有土目刀正彥等前來㑹商𠞰撫一靣具詳代窩泥凶賊辨訴據稱茶商衆客多以重利滚砌窩泥故致麻布朋等肆行劫殺等語該將僃等以既稱茶商滚砌隨帶領官兵約同該土目等齊至茶山代為清算以憑招撫漢夷安輯地方去後詎料刀正彥稽遲不前反遣叭枯等督領六山窩泥焚燒倚邦各寨堵塞各路要口竟將帶領兵丁㑹期招撫之把總王朝選并兵丁內之十七人及糧差一名皆衝散裹去今據總兵官孫宏本副將張應宗參將邱名揚等各報稱據探往山往江各要路盡行堵絶不能前進參將邱名揚已帶領官兵親往行至猛旺等情到臣臣隨飛檄孫宏本著帶該鎮官兵一千名并調元江協兵五百名新營兵五百名景東營兵三百名加以普威營官兵仍調土兵一千名星夜進𠞰臣看得窩泥雖凶若無指使之人亦未敢輕舉據土目刀正彥素與宣慰司刀金寶不睦屢欲占管江內板納地方勢有不能兹乘隙鼓惑六山窩泥逞其恣橫以嫁禍於刀金寶情節顯然若非大軍前進協攻茶山檄令刀金寶率領土兵堵絶江外去路則凶賊勢難擒撲況殺官殺兵習為泛常不及此𠞰滅何以善後臣前於九月報明𠞰撫猓賊情形事案內有因尚有一二狡賊未獲酌留官兵暫駐等語正以此案羣凶雖擒正犯未獲其時威逺未靖聞伏乞聖主睿鑒訓示遵行臣謹奏覽同日又奏為遵旨議覆事竊貴州安順府改站一事前面奉聖諭交臣查議臣自入黔境即留心咨訪不獨安順地方所當改站即平越一帶亦有别路可通平坦捷近官民均便及抵貴陽即面交司道委勘確議續據詳覆前來並無定見意殊畏難臣於去冬赴黔之便復面交安順府知府何經文及雲南遊擊徐成正示以路徑前往勘估據該員等禀覆果另有寬平大道不獨便於行人且可省去三驛又令平越府知府朱齊年并屬縣王大烈勘估黃平一帶該員等亦以道路應改並可省去二驛詳覆前來適臣今年五月前赴安籠於安南縣地方面㑹提臣楊天縱遂并將移置驛站改設防汛各事一切面商提臣隨帶領何經文復同親往查勘與臣面議無異兹查得安順府屬鎮寧州之安莊驛至普安州之亦資孔驛直交滇界凡十驛今可減去三驛平越府屬之平越驛至鎮逺府屬施秉縣之偏橋驛凡六驛今可減去二驛合兩處計之是十六驛之中可減去五驛每一驛馬匹俸工銀約計千餘兩夫糧馬料米約計三百八十餘石通計五驛每年可省銀約五千兩米約一千九百餘石其所改驛站除亦資孔安莊平越偏橋四驛仍舊安設外其餘俱當移置自鎮寧州之安莊驛行五十七里至坡頭為新改第一站應設一驛一汛移駐千總一員兵丁五十名並安馬步兵五塘又四十二里至歸宗為新改第二站應設一驛一營移駐守􅊀一員把總一員兵丁一百二十名並安馬步兵三塘又四十五里至烈當為新改第三站應設一驛一營移駐守備一員把總一員兵丁一百四十名並安馬步兵五塘又四十七里至南車渡為新改第四站應設一驛一汛移駐千總一員兵丁一百名並安馬步兵五塘又於渡口安馬步兵二塘又五十四里至劉官屯為新改第五站應設一驛一營移駐守僃一員把總一員兵丁一百四十名行四十七里至青岡寨為新改第一站應設一驛一汛移駐把總一員兵丁五十名並安馬步兵五塘又四十八里至朗城司為新改第二站應設一驛一汛移駐把總一員兵丁五十名並安馬步兵五塘又六十五里至施秉縣之偏橋驛此平越改站之大略也所有官兵俱於舊設營汛調撥所有驛舍七處衙署十四處營房約九百餘間塘汛房約二百餘間官㕔牌坊哨樓煙墩約三十餘處造新石橋三十餘座修舊石橋十餘座木橋十餘座渡船七隻并石關石堤石路土路等通共物料工價屢經核估約需銀二萬兩臣竊計三年所省五驛之費即可以供用而從此路盡平坦且更捷近不獨行旅商賈易於往來實黔省千百年之樂利也臣緣事關改置且錢糧所係復經檄行黔藩司祖秉圭再加確核造冊具詳以便㑹疏好題請但一切物料匠役須乘此農隙預為僃辦庶可省便相應懇祈聖恩准於司庫先動銀數千兩委員料理一俟具疏奉旨部覆到日催趲興工庶夏令雨水之前皆可以報竣謹繕摺陳覆伏乞聖主睿鑒批示遵行臣謹奏覽同日又奏為新增鹽課餘息事竊照滇省各井雖産鹽不等若加意調劑實力趲煎自可裕課益餉臣查麗江府屬之麗江井年煎正額稱頭鹽共二十萬一千餘斤前聞該井尚有餘滷又有下井并附近之四小井可以開煎臣隨於本年五月面商鹽道劉業長委員督竈煎辦據報陸續收獲鹽斤比前日增計可獲正鹽二十六萬七千一百餘斤每斤二分二釐課銀五千八百七十六兩零較之歷年所辦多獲銀三千餘兩每百斤有稱頭鹽二十斤除腳人擦損折耗二斤年可獲稱頭鹽四萬八千餘斤照府境賣價二分八釐該銀一千三百餘兩應將稱頭鹽價留為知府井官辦事人役養廉工食一切費用正鹽賣價請自雍正六年為始定為正課又景東府屬之景東井年額煎鹽一十六萬九千二百斤該井頗多餘滷委員前往辦理滷多者發薪煎辦竈少者招竈領煎修理鹽井建造竈房督竈煎辦自七月起漸次成效計年可獲鹽二百萬斤有奇年可獲銀一萬二千兩除酌留二千兩為井地官役設店收買養廉工食一切費用實可新一十四斤趲煎鹽三十萬斤今該井餘滷尚多委員較煎發銀收買自本年七月起每月可收買鹽六萬六千餘斤年可獲鹽八十萬斤分撥帶銷年可新增鹽價銀七千五百一十七兩零正項贏餘欵內有加增銀三千二十兩零趲煎鹽價銀三千兩二項均可定為正課其新增收買除本境零星銷售及各屬腳人帶銷不便定為正課仍入贏餘項下造報其分撥保騰永三處鹽三十一萬八千四百九斤賣獲銀三千一百八十四兩九分亦可作為正課合之舊額共銀一萬四千二百一十五兩零亦自雍正六年為始定為正課又白井收買沙滷雍正四年共收買沙滷鹽三百五十六萬八千五百斤各屬領運行銷其價不等除還薪本實獲餘息銀三萬五千二百五十九兩零今五年分儘力收買連閏可獲鹽四百二十五萬斤有竒可獲價銀四萬二千三百餘兩照題定正課加閏該課銀一萬一千五十兩七錢外較之上年多增沙滷價銀七千餘兩以上四井年可增銀二萬四千一百餘兩臣前題定正課二十二萬五千九百二十九兩零贏餘六萬一千九百餘兩連今新增自雍正六年為始約定正課二十五萬六百兩零仍有贏餘銀六萬一餘息緣由相應奏明再滇省錢糧從前隱漏各件除鹽務厰務軍民田地文武官莊以及公件諸項臣巳大槩清理陸聖主睿鑒臣謹奏覽滇省有卿料理則循分供職安靜和平者皆可勝任他省不乏人則已若需人朱綱似不能久任在滇雍正五年十二月十三日雲貴總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安卿好麼新春大禧一切平安如意也同日又奏為恭謝聖恩事雍正五年十二月初二日臣齎摺家奴䝉恩賞給驛馬齎捧頒賜臣親嘗克食一盒御筵果餌并鹿尾鹿舌共三匣哈密瓜四箇抵滇至本月初八日臣標千總段福等復䝉恩賞給驛馬齎回御賜臣阿布哈羊三隻廣橙一簍文旦一簍抵滇臣隨各郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪諷硃批覽卿奏謝知道了字字出於至誠句句朕皆動容覽閲諸王大臣因朕五十大壽懇請備宴朕勉從之此日微雪一堂和氣喜溢宫院念卿在逺省未得入座特留數種朕親嘗食物寄來卿食此如同君臣對面宴㑹也特諭欽此臣伏讀之下感痛失聲妻子聞知亦皆泣下念受爾奇家信內稱十一月初一日上御西暖閣諭諸臣曰朕於羣臣無不關切每當陛辭時諸臣亦有戀戀者然朕心實未嘗留擊惟鄂爾泰前在朕前不過數日朕每念之不置偶閲伊奏摺輒為淚下豈亦君臣夙世緣分耶昨朕萬壽節諸臣進觴朕於班中不見鄂爾泰輒為不懌特留筵上果餌四盤令奏摺之愚實無以當此夙世緣分敬受今生今生作者更期奮勉公忠誠純之訓凜體終身不敢或作不善因以致大慈悲大光明亦欲施矜憐而不能則幸免墮落臣願奏對謬誤自分嚴譴䝉聖恩矜全旋加寬宥訓誨諄諄逾於父子并諭看汝近來行事恐有大姦見朕意不可搖動故别為巧計使汝自蹈罪戾或并欲借此以陷汝兄汝兄鄂奏同日又奏為恭報瑞雪預兆豐年事竊滇南氣候四時不甚懸殊晴霽則冬可衣夾隂晦則夏可重綿秋盡草不凝霜冬深地無積雪即間遇大雪亦不過數寸旋積旋化然凡降雪之年來嵗必係豐收詢之土人歷歷可驗今自入冬以來天氣甚正冬至日微雪衆皆以為佳兆至十九日傍晚大雪紛霏及次日清晨雪盈二尺許父老罕見少壯希聞漢夷士庶莫不歡欣復據左右郡縣絡繹具報同日得雪自一尺二尺至二尺幾寸不等農民慶幸皆謂二十年來所未有此實我聖主敬誠所致感召天庥遠邇無間被及邊方臣每接准部咨伏讀上諭凡祈榖重農賑災蠲賦莫不深入民隱體恤周至即父母之各為子謀百姓之各為家謀恐無此諄切詳到也臣等身膺重寄叨荷無任感激繕摺恭報伏乞聖主睿鑒謹奏去冬瑞雪可謂浩蕩天恩直省普同皆賜盈尺之雪實罕遇者况滇省從未聞有二尺尺餘之雪朕惟以手加額倍加惕厲與卿等共勉之耳朕實感激愈增敬畏矣天祖實鑒之也同日又奏為續報向化生苗盡入版圖事竊臣於雍正五年九月二十九日業將招撫生苗情由㑹疏具題在案其時安順定廣各路生苗歸附者巳二百餘寨緣冊內夷民半無姓氏名多雷同雖稱願納糧賦尚未報明確數難以畫為成規隨經移咨撫提兩臣及行文武各員令其定正姓名酌為額賦以憑彚造清冊核實報部去後續據參將劉成謨復差有外委胡榮率領頭人薛琳等化出戎長冗壤等十六寨共八十二户又差把總胡元臣外委胡榮率領頭人班國卿等化出大稿等九十一寨共四百九十五户又差把總王宣外委李元龍率領土舍土人薛琮等化出上擺召等三十八寨共一百六十八户又差把總陳文英率領土舍薛等化出抵蓬等九寨共二十七户又差把總胡元臣外委盧炳率領頭人韋朝甫等化出大染等一十四寨共五十一户又差把總陳文英率領土舍王世芳等化出上雨霾等二十一寨共七十七户又差把總楊世雄率領土目王廷臣等化出膽弄等十寨共二十七户班可用等化出打貫等五寨共八户又據被劾安順府知府何經文提標前營遊擊卜萬年因㑹勘邊界又化出大箐等十寨共四十三户俱隨經逐次帶領各寨頭人就近投見提臣楊天縱面加奬諭令其剃頭改裝賞給衣帽花紅銀牌酒食等物復赴貴陽投見撫臣何世璂亦各賞給花紅銀牌等物以上所化生苗又共二百一十九寨合前次題報各寨通共合計四百二十四寨二千八百三十一户男女一萬二千九百零三名口俱各具認狀共納糧銀一百一十六兩二錢七分糧米四十一石二斗造有户口錢糧清冊到臣臣看得安順鎮寧定番廣順等府州邊界接連粵西一帶地方生苗盤踞最為難馴今仰賴聖主聲教遠被莫不輸誠恐後皆願內附計地則有四百餘寨之多計人則有一萬二千九百名口之衆該苗等生長遐荒忽履中土見城郭營署之壯麗衣冠人物之整齊其歡欣鼓舞之狀經見𫝊聞者皆知共慶太平咏歌聖世臣已檄令文武各員附載版圖編入保甲各加奬賞安插訖至於化外苗夷既經內附則漢民往來勢難禁止誠恐姦徒撥弄匪類潛聚又不可不慮因復商之提臣就各寨適中之地移駐千總一員量撥兵丁分設防汛巡緝稽查以杜販掠唆使等弊庶可以清漢姦之源絶苗夷之釁而制之未然不禁自止則從此編氓或得以安枕矣除另疏㑹題并各寨户口錢糧清冊送部察核外為此繕摺伏乞聖主睿鑒臣謹奏妥協之極覽此有不嘉悅之理乎題到有旨同日又奏為報明古州各夷願附版圖事竊查黔粵之交有八萬古州裏外一帶生苗地方千有餘里雖居邊界之外實介兩省之中黔之黎平都勻鎮遠永從諸郡縣粵之柳州懷逺羅城荔波諸郡縣四面環繞而以此種生苗伏處其內分兩省而觀各在疆外合兩省而觀適居中央任其劫掠四境一無管轄故兩省潛受其害而皆莫可如何前督臣高其倬署撫臣石禮哈等曾見及此亦皆欲設法收入與屬員相商只須鼓以風聲不在脅以威力今仰賴聖化普被自長寨設營後安插撫綏遠邇歸心加以泗城改流並無事誅戮以致延及安順各寨生苗編户輸糧者巳四百餘寨而謬沖之役又復旁及邊孟江等處地方相機𠞰撫續該員等同抵江上其兩江之空鵝噶宗便扛等寨素行不法慣匿姦頑者皆知畏懼有凶犯石祥汝久經逃入者該寨亦皆獻出凡前虜陷人口亦各皆追還該員等隨復藉勢親往八萬古州之地巡查踏勘據稱府西之曹滴天甫六洞等處去府窵逺從不見官性好讐殺且與彼處緊接遂借巡查曹滴等處即𫝊知各寨苗民齊進八萬裏古州地方該處苗人亦逺來叩接隨於所在地方設立款場宣示皇仁凡八萬古州裏外苗民同時觀聽逐一犒賞申明條約使彼凛遵不獨毫無抗違且皆扶老㩦幼莫萬洞軍民長官司地也在黎平之西南隅自府城一百三十餘里抵古州土司所轄寨麻地方又自寨麻五十里過八匡沖即入八萬裏古州之地其間形勢寬敞田土膏腴南自車寨北抵樂鄉約長三十餘里而橫濶之處或十餘里或六七里總計周圍約有八十餘里除零星各寨不計外其大寨則有車寨藏弩寨頭月寨口寨樂鄉寨等處每寨或千餘户或數百户其小寨則有寨王麥寨高逹定達寨覩寨晚等處每寨亦有百餘户或數十户總計約有四五千户男婦大小約有二萬餘丁地勢平衍户口稠密風俗頗稱淳朴去府治雖逺而於府屬古州等土司猶有羈縻之意界內有古州江其高敞處為諸葛營相傳諸葛亮曽駐兵於此四望寬平後倚大山周圍土垣尚存基址而古州江臨其前又有都江瀠其右溶江繞其左二水回抱滙合南流直達廣西懷逺縣界江內現有小船裝載鹽貨就近貿易因多係生苗阻隔不能行逺其土垣基址之內可居住數百户基址兩邊之外地勢亦皆平正可居住數千户若設立郡縣商賈往來人民輻輳較勝黔省內地此裏古州之大槩也由此東去一百八十餘里為黎平郡西之境而有八匡沖等處生苗間之西去一百七十餘里為都勻府屬爛土司之境而有滾粽千家等處生苗間之南去二百一十餘里為廣西羅城縣屬景裏之境而有苗谷滚里等處生苗間之北去二百八十餘里為黎平郡屬清水江之境而有山㜑烏矮等處生苗間之東南七十餘里為永從縣郎巨洞之地而有蘇洞廷洞等處生苗間之西南一百四十餘里為廣西荔波縣水西之境而有都江八飛厰等處生苗間之東北五十餘里為黎平屬曹滴土司之境而有高麗洞寅賴洞等處生苗間之西北二百一十餘里為鎮逺府凱里司之境而有丹江勒往等處生苗間之四境所至八方所到均屬內地其中約有一千二三百里其寨約有數千其户口約有十數萬可設兩三州縣並可建一府以逺只須帶黎協兵丁數百名并府屬健役鄉勇文武㑹同前往多方勸諭先將八萬裏古州之外通達都勻一帶生苗設法布置俾盡輸誠次將通達廣西一帶生苗亦如法招撫俾各寧帖俟兩處既定然後合之八萬裏古州開曉法紀俾令輸糧編甲再直抵清水江㑹調鎮逺協官兵明張聲勢却秋毫無犯剴切化導以招撫九股生苗總計不過就約束無復化外之民據臣愚見侍郎臣申大成現今改鎮添兵之議暫可不必行謹當具疏題覆合先聲明至黎平府知府張廣泗實屬幹員盡心效職荷䝉聖恩著署理貴州按察司印務并奉上諭黎平府知府員缺著鄂爾泰酌量題補倘黎平府新苗初定尚須張廣泗在彼料理則貴州按察司印務交與鄂爾泰另行委署欽此臣查黎屬苗夷現在具題外謹此繕摺伏乞聖主睿鑒批示施行臣謹奏覽雍正六年正月初八日雲貴總督臣鄂爾泰謹奏為恭謝天恩事雍正五年十二月二十九日雲貴提塘官姜文濱專差齎捧御製律歷淵源一百卷頒賜到臣臣隨郊迎至署恭設香案望闕叩頭謝恩祗受訖竊律歷之學窮極精微而御製之編探其源本跪覽之下悅目洞心臣謹按綱分三部目有萬端一曰歷象考成始以天象配以地體繼以歷元明黃赤道之分辨經緯度之别復益之以嵗差然後示以三角之形究其日星之要上以揆天察紀下以明時正度言之不足表以彰之而歷象如指諸掌矣一曰律吕正義立黃鍾以正中聲定元聲以正律吕協律吕以正度量權衡齊度量權衡以正萬物蓋黃鍾立而萬物無有不正故曰正義黃鍾為萬事之根本理數所從出究三分損益隔八相生之淵微窮五聲二變高低字譜倍律半律加分減分比例同形之妙用於是長短清濁各適其宜髙下剛柔各得其位始之以正律審音中之以和聲定樂終之以協均度曲而律吕如聞其聲矣一曰數理精藴以河圖為加減之原以洛書為乘除之本得其原本則以一貫萬至於靡窮皆此理也而精藴即在其中總之則有點線面體分之則有和較順逆由淺以及深執簡以御繁將以仰觀天文俯察地理中度人事為之立綱明體分條致用又從而表出之使理與數協天下之精藴孰有踰於此者就此三書敬觀大略臣雖管窺不能仰見垣壁然三復既周亦覺有轍迹可尋若得從容究心或能漸有所得庶可不負聖賜也伏念臣幼從孰師學舉子業四子六經皆以供帖括及少長略有知識而所為律吕之書亦逺之不過史記漢書中諸志近之不過蔡氏律吕新書即周髀等編間嘗竊觀然既不能得其淵源且并無從窺其涯岸逮後襲世職叨侍聖祖禁庭竊聞有三角算法幾何原本等書雖願聞其指實無由可覓今叨䝉聖恩頒賜及臣仰瞻聖祖之手澤敬誦聖主之睿裁可使抉羲和未發之奧闡商高未明之旨豈獨為天官寶笈祕府瑶函也欽惟我皇上躬膺無疆之歷數乾乾惕若日進日强臣雖愚陋不能齊七政以正五音然生逢堯舜竊願學羲䕫長使千萬世仰日月之光聽和平之奏已耳為此繕摺恭謝天恩伏乞聖主睿鑒臣謹奏欣悅覽之朕所喜者滇黔兩省新創之事甚多初定地方籌畫之處頗繁想必案卷如山料卿必竭蹶勉强辦理今覽此奏尚能留心於律歷之書則精神力量必有餘也朕實神情皆為之怡慰欣喜之懷筆不能諭雖然留之一字甚切要珍重之同日又奏為恭謝聖恩并陳愚悃事雍正五年十二月二十日臣接到家信知欽奉聖旨苗民梗化由來已久既屬生苗尤難懾服綏靖鄂爾泰𠞰撫並用威惠兼施俾生苗向化輸誠咸願納賦歸附版籍又謬沖逆苗等素稱獷悍難馴今𠞰撫已靖悉皆內嚮鄂爾泰辦理甚屬可嘉著給與世襲阿達哈哈番以奬勞績張廣泗遵依鄂爾泰調度實心出力著交部從優議叙所有在事官兵應如何議叙賞賚之處著鄂爾泰分别等次具奏該部知道欽此臣捧誦之下不勝感激不勝慚惶竊臣於烏䝉一案前巳叨沐聖恩賞給世襲拜他拉布勒哈番今復錫命重頒榮䕃逾分捫心自問實切難安伏念身膺殊知總制兩省寧謐邊疆宣布聖化臣之職司無所諉卸而能事在人自用斯小羣材羣力端賴推誠故自蒞任以來雖無事不相參酌無人不與叮嚀然而心不敢懈才不能戡意可相通身難親歷倘文武僚屬因循支飾以為無關考成互相觀望臣即有覺察亦不可奈何况自長寨之役以及烏鎮泗城諸件皆仰荷睿裁指授機宜勉臣得中令臣撫恤臣惟一遵訓示並别無調度而風聲所至苗猓輸誠實由我聖主至誠所動無遠弗届之所致若謂臣自能辦理是不自量是為無恥而或更掩人之功俱攘為已有則尤無恥之甚者也伏查安順等處生苗向化一件臣於雍正五年十二月十三等日業經題奏在案續於十二月二十八日復准提臣楊天縱咨稱參將劉成謨又化出木林工乜等寨生苗一百一十五寨四百二十八戶男婦一千九百零七名口共認糧賦銀二十一兩零所有户口錢糧清冊一併移送到臣是合前後所化生苗凡五百三十九寨此皆提臣楊天縱之善於鼓舞參將劉成謨之善於招徠自始至終兩人之功居多參將官祿次之原任定番州知州蘇松又次之遊擊卜萬年及原任安順府知府何經文又次之每一次所化凡各苗頭人劉成謨等領至提臣楊天縱處從優賞賜面為開導復領至撫臣何世璂處亦給以賞賜加以開導凡此大小臣工皆能仰體聖主撫綏至意而楊天縱臣於兩次赴黔曾密交苗地舊案二十六件囑令查拏商結一載以來皆巳漸次清楚則尤為實心努力者也至於內附既衆外防須嚴必為一勞永逸之計方可收其始終歸順之功臣前議以千總一員帶領兵丁彈壓要隘今户口愈增地方愈廣查向化各寨長濶九百里巳直抵粵界如前所議不足以資彈壓仍俟與提臣詳細商酌㑹疏請㫖其黎平一帶所化生苗如交椅几馬歸歐九厥等寨皆張廣泗之力居多署副將韓勳及知縣孫紹武守􅊀左垣等副之清水烏孟二江并八萬裏古州諸寨所化生苗亦皆張廣泗之力該副將李登科副之撫臣何世璂復委撫標遊擊冶大雄齎犒賞以佐之再者鎮遠所屬之番隴噶腳擡拱三寨性素强悍肆行燒劫現在鎮遠協副將張禹謨率領遊擊韓勳㑹同施秉縣知縣沈遴相機𠞰撫除將番隴等寨巳經𠞰滅并凶賊富八等巳經拏獲仍俟搜捕賊黨外又據有高坡生苗之番招上下二寨頭人顧九顧條雞加寨頭人老寵下烏奪寨頭人老九養了寨頭人老序交汪寨頭人老歐稿五寨頭人老仲􅋭竹寨頭人板東八朗寨頭人顧冒等又據有九股生苗之歐家寨頭人條沙排略寨頭人老章烏樓寨頭人交養羊烏寨頭人烏羅在濃寨頭人條尚南等寨頭人阿排桃饒寨頭人羅三桃賴寨頭人包樓世蓋寨頭人陽九南生寨頭人阿商等以上共十九寨頭人各皆傾心投誠盡求內附臣前摺內欲將都勻一帶生苗化誨然後及九股生苗再合八萬古州畫定規模今張禹謨等已能乘機化誨各皆實心努力則黔省生苗均可指日共附版圖而粵楚之交聲援聯絡並無阻擾庶黔省可謀安全而幅員亦不至狹隘矣所有續化生苗應俟開印具題欽奉恩㫖除候部文行知到日恭疏奏謝外合先繕摺恭謝聖恩并陳愚悃伏乞睿鑒臣謹奏覽楊天縱巳另有旨其餘文武官員可一一詳細造冊送部同日又奏為窩泥既靖規畫宜周敬陳管見仰祈睿鑒事竊滇省邊疆大局東則東川烏䝉鎮雄西則鎮沅威逺恩樂車里茶山孟養等處皆係凶夷盤踞素為民害誠欲規畫全省邊疆必將此數處永逺寧謐斯為長䇿今仰賴聖主仁威逺暨俱巳漸次平定悉有規模唯車里茶山孟養一帶地方界連交址老撾蟒緬諸國各種蠻賊憑陵江外忽出忽沒並無定所肆其凶殘莫可踪跡不獨劫人燒寨視為泛常即殺兵傷官亦目有軍期彼且號召異類聲息逺通蠻國酋長皆可響應故自元迄明每一興師輒調兵數萬支餉四五省所費不資然後僅入孟養之界明兵部尚書王驥輩曾率師到此諸部皆震怖曰自古漢人無至此者洵天威也及其班師而歸又旋服旋叛總緣未經妥辦故遂貽纍至今臣自受事以來深察駭天聽故於雍正五年十一月十一日進𠞰窩泥摺內猶未敢陳明逆狀今合計官土兵數千人巳直抵孟養地方并深入攸樂莽芝橄㰖壩等諸凶寨俱已搗破賊巢斬獲賊首羽黨就擒羣蠻歸附此固機去後續據各報稱車里宣慰司刀金寶并版目刀正彥屢經差催㑹兵𠞰撫並無確覆徒延時日而逆賊等擅將通茶山九龍江一帶路徑如普逺慢哀關鋪官坪版角以至孟養等處地方砍伐大樹重柵壘石盡行堵塞沿途并掘深坑伏地弩竹簽進普藤㑹合駐劄於是夷賊恐懼哀求版目轉懇免死牌情願投誠隨經該將嚴諭版目賊等先則殺客繼則殺官殺兵又復阻塞道路罪當必誅若不獻出首凶斷難免死等語又據防汛九龍江千總陳安邦並稱宣慰司刀金寶於十月二十三日往橄㰖壩㑹刀正彥至今尚未回江傳說刀正彥有謀奪宣慰之意故暗起此釁欲以嫁禍隨據副將張應宗參將邱名揚帶領兵練兼程奮進直抵孟養凡三大站夷賊等鳥散兔奔盡皆逃竄其地離九龍江六十里離攸樂七十里離橄㰖壩一百四十里聞羣賊皆嘯聚攸樂邱名揚於十一月二十日帶領兵練行至蠻破地方忽有賊千數鳴角呐喊放弩拒敵及官兵鎗炮齊施賊皆遁匿追至攸樂賊占踞山梁官兵三路直上賊皆滾箐潰散畏懼乃日令辨兵遍搜各箐有羣賊在對面山上喊呌我們情願投降見辨兵等爭前擒殺遂齊跪哀告我們原是好百姓俱係被莽芝麻布朋克者老二逼勒幫助若不依他便要燒要殺有火頭一百餘人領衆至行營懇求免死情願引路拏賊隨據邱名揚報稱茶山地方綿亙數千里夷民不止數萬而六茶山之最大者莫如攸樂一山所管大小四十餘寨窮一日之力不能遍搜一箐及搜到山寨賊已潛踪形勢若此所以麻布朋等敢於肆橫今官兵雲集網羅巳密何難撲滅但渠輩既畏途窮搜於初六日酉時抵莽芝大寨只有老幼窩泥封布朋和尚布朋等數人迎隊來投隨加細訊得知賊首麻布朋藏匿於大箐石崖之下該將即刻星馳四面圍合於初七日寅時生擒賊首麻布朋並妻子媳三名口又以慢了慢五二寨之賊前則坐草拒敵後又夥黨殺兵正欲往擒適有慢五布朋二名阿臭阿戍慢了火頭一名呀蚌帶領窩泥三名來投又拏獲賊首坡頗一名因查得慢了之賊潛藏於蠻空山箐慢五之賊潛藏於蠻别山箐是月十二日邱名揚復帶領官兵由漫達渡河前往蠻别於十三日寅時三路合圍殺死逆賊二十人割取首級生擒賊黨六名賊婦女大小三十六名口是日守備孫科等帶領官兵由慢林過整版渡口前往蠻空午時邱名揚亦到兩面交攻鎗傷逆賊二十七人隨割取首級生擒十六人并賊男婦大小六十九名口其生擒慢五寨之賊犯囉孳學白勒厦喲白勒學遮白勒慢了寨之賊犯妙日夤夜遣千總李萬春等圍搜慢岡箐殺死拒敵逆賊二十七名生擒男婦四十一名口又據守備王耀祖等於十五日午時搜至慢拱寨羣賊皆執標弩拒敵及見官兵衆多圍困嚴緊遂放下標弩哀懇投誠獲有慢拱逆賊男婦一百七十四名口內賊人三十六名賊婦子女一百三十八名口即遣伊等帶領拏賊又拏獲克梅大箐逆賊男婦四十四名口內賊人十八名賊婦子女二十六名口方江內江外原各設有土司除車里宣慰司外有茶山土司孟養土司老撾土司緬甸土司等員總因邊方窵遠各土司爭相雄長以强凌弱以衆暴寡其茶山孟養等地方皆被車里吞併向來均置不問以致凶夷肆惡漸及內地若不乘此大加懲創布置周密江以外仍付宣慰江以內分設營防不但普洱威逺等處終難安帖即永昌順雲各汛亦難藉聲援况土目刀正彥占踞江內板納蓄謀巳久此人不除尤難以善後臣已密札嚴檄令該將等務必將賊首盡數擒解并乘機藉勢將六茶山所屬千餘里地方盡行查勘按其疆界察其形勢度其險要凡與蠻國酋長通連隘口應如何防茶山地方向因未經人到皆稱地寒土瘠不産五矣至此外滇省邊境凶夷如東川府之土目祿世豪祿天佑素性跳梁斷難革面而祿天佑橫肆尤甚臣前因有事烏鎮恐激其助惡故暫緩擒治今祿世豪巳被知府黃士傑誘擒解省業經審究而祿天佑恃險聚衆明肆抗拒臣近派本標辨丁㑹合武定營協同東川官兵四路進𠞰并照會四川俟擒解到日分别審擬繕疏題報外謹將進𠞰茶山情形敬陳大槩伏乞聖主睿鑒訓示施行臣謹奏凡卿所辦之事朕實至無一言可諭矣在廷諸臣皆與觀之人人心悅誠服賀朕之福慶國家得人朕亦惟以手加額感上蒼聖祖賜朕之賢良輔佐耳卿如此居心行事不但得卿一人之力勸勉屬員得通省文武官員之力且凡見聞臣工實亦莫不奮勵國家得力處多矣大臣習尚一整我朝之福洵不可限量卿功實大凡封疆大臣能保全名祿者即為上上人物矣不但孰能如此且亦孰肯如此此人情分明眼前者天祖自然照察朕慶悅之懷實難筆諭勉之一字朕皆不忍書矣嘉之一字實亦有負卿之心也特諭硃批諭㫖卷一百二十五之五欽定四庫全書硃批諭㫖卷一百二十五之六硃批鄂爾泰奏摺雍正六年二月初十日雲貴總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安精神愈覺健旺實皆天地神明聖祖君父慈恩錫佑之所致直隸入春以來雨澤甚屬均調直省奏報皆然但未敢料其向後若何也卿好麼同日又奏為恭謝天恩事雍正六年正月初十日由驛遞齎到頒賜臣御書福字一幅對聯一副如意荷包一箇內金銀寶玉共二十八枚珊瑚結堆花荷包一對貂皮六十張蘋果廣橙共一簍文旦朱橘共一簍哈密瓜二簍鹿尾十隻鹿肉六方湯羊一隻樹雞六隻細鱗魚四尾臣隨郊迎至署望闕叩頭謝恩祗受訖竊念臣自到滇南三經改嵗每遇慶賀之辰遙念班聨之㑹敬憶慈顔恍聞天語心依神馳實不能自解而我聖主萬幾親理日昃不遑乃䝉於元旦二十餘日之前僚驚見受恩至此臣有何言前䝉聖諭訓臣毋作兒女態臣自捫心固不能無兒女天性也至若天保遐福之歌蓼蕭萬福之咏此臣之所以祝君惟有猷有為有守康色好德則錫之福此下敢不凛然至於敬繹寶聯則曰化日山川秀芳春歲月長臣欣忭之私倍切慶幸蓋邊隅苗猓之地皆蠻烟瘴雨之鄉今共覩光天化日盡成大地芳春固宜滇黔山川皆增秀麗蠻荒歲月同樂舒長而我聖主之所以眷顧邊方者期之深望之切故勉之至也臣惟願以殊恩臣當矢之生生世世涓埃萬一之報臣亦無能自慰矣謹繕摺恭謝天恩伏乞聖主睿鑒臣謹奏覽卿奏謝知道了同日又奏為恭謝聖恩事雍正六年正月十九日奉到驛遞齎回臣前奏匣敬啓摺扣荷䝉硃批朕實含淚觀之卿實可謂朕之知已卿若見不透信不及亦不能如此行亦不敢如此行也朕實嘉恱而慶幸焉不但朱綱聞此而不感發者除非木石也朱綱人甚練達朕訓他莫患才不足用但務一誠字則全才矣伊亦深為感服此人可用欽此臣伏讀之下不能仰視念臣雖身在萬里然一月之中必一聆訓誨凡一言一字無不可以動遵奏公件官莊二摺現與撫臣朱綱確商妥議再另摺聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為恭謝聖恩敬陳愚悃事雍正六年正月二十六日准兵部咨為議敘威遠一案奉旨著加臣二級等因到臣除繕疏奏謝天恩外臣袛承之下愈增惶悚先是正月十九日臣具進𠞰窩泥一摺荷䝉硃批此等事推諉不得的隨出隨辦一勞永逸之舉不可少憚煩勞也此等用命將士事畢必題請議敘方是欽此竊查滇南凶猓原不止威遠新平近接魯魁哀牢逺連茶山孟養綿亙數千里直抵江外種類不齊頑悍則一而六茶山尤係久叛之區從無數年寧帖目前雖無大害日久將為隱憂總因從來將辨畏其凶焰不敢深入內則莫窺其巢穴外則不熟其路徑故來不知踪去無由跡以致未事不能防禦於先既事不能追擒於後而封疆大吏智識淺鄙者固不能遠見其瞻顧粉飾者反每多支詞此賊風之所以日肆猖獗而莫知所底止者也臣受恩深重無有倫比實不敢辭難竝非敢好事雖能與不能限於才力而良心則斷不敢昧請敬陳其概仰候聖鑒即如臣所稱孟養地方巳令各將冒險突入駐劄其中遍搜各寨經臣於正月初八日奏聞在案考之此地與老撾國蟒國𬗟國等處自元明以來皆設立土司各有專轄盡屬內附至正德初孟養土司刀兵玉勢漸削弱不能安輯羣夷其部酋思任作亂遂略取孟養由此屠騰衝據潞江正統四年乃遣黔國公沐晟左都督方政右都督沐昻率師征之不克復遣兵部尚書王驥提督戎務以定西伯蔣貴充總兵官率京營湖廣廣西川貴兵一十二萬直抵上江未及孟養思任巳走緬甸王驥乃許割孟養地賜緬甸購思任緬甸斬思任首送驥遂奏凱論功當時議者即以孟養宜設流官不應畀緬甸不數年思任子思機果復據孟養為亂正統十三年仍命王驥總督軍務率土漢兵一十三萬討之師踰孟養思機敗竟失所在乃立石金沙江為界班師而旋亦不於孟養議設流官未幾思任之子思祿復據孟養自立故貽禍至今并流毒內地終無巳時臣每觀明代此等事輒為歎息凡為大臣者不能籌畫萬全設法𠞰撫動輒提師數萬支餉數省預為張大其事以邀事定功賞乃又旋服旋叛究不能為久長計臣深恥之故每遇邊事訪之衆議僉欲多調官兵多撥糧餉甚至歷舉往事以為規鑒并以危言動臣以示老成愛護之意臣皆不以為然蓋聖明在上原不須顧慮而兵不在多審機為要昔諸葛亮云戰欲竒謀欲密衆欲靜心欲一又云善師者不陳善陳者不戰臣嘗以為至言夫承平之世即偶有蠢動原非敵國對壘者比一旅偏師乘機握聖主推誠布公仁育義正之至意以各動其良心言之感痛臣每涕流而聞者亦半多泣下故自年餘以來有司漸知奮勉將士亦多能用命然邊疆大概雖幸粗安而求所以謀逺久者臣尚無一可信今屢荷聖恩復賞給世襲阿達哈哈番又復加二級捫心自問寢食難安現在孟養攸樂橄欖壩九龍江等處各將皆巳深入臣必欲將六茶山千餘里地盡行查勘安設營防巳囑提臣郝玉麟親往相度臣詳細與之密商務期將各巢穴盡行搜遍將各要隘盡行查明不論江內江外其逼近外國應示羈縻之地仍著落車里土司以備藩籬凡應安營設汛并聖主睿鑒臣謹奏覽同日又奏為遵㫖覆奏事雍正五年十二月二十三日奉到郵遞摺匣一箇內奉硃諭諭總督鄂爾泰何經文朕記得人尚明白去得少蒼滑些但係毛文銓之薦亦非大材非朕留意賞鑒之人若只此虧空二三千石穀粟人尚可用則人材難得若可恕從輕審理如人平常更有他欵不可因朕之旨開除他料卿自然秉公辦理但恐不知朕意徒令不肖之員漏網因特諭之欽此及雍正六年正月十四日又接准部咨為特參府官虧空一案奉㫖何經文來京引見時朕觀尚係可用之材這所參虧空各項銀兩必有情由著總督鄂爾泰審擬具奏該部知道欽此等因行知到臣該臣看得何經文辦事明白材實可用而蒼滑二字亦實所不免業䝉聖鑒洞徹隱微臣無庸再瀆至其虧空各項據查貴西道吳應龍曽向何經文那借銀米在彼時原係暫時通融即期完償適何經文奉臣委勘改站一事數月之中俱奔走在外諸事未暇布置且曾差役赴楚雇覓船工來黔以備修造渡船并預辦木植釘鐵油麻等件又不無支墊故一經盤查不及彌補在何經文巳干條例法所應參但據此情由猶與不肖侵欺者有間今吳應龍業經還楚何經文現在逐項清交俱有頭緒臣巳委黔省兩司㑹同大材在安順府治民夷頗屬相安而於苗情亦復諳練倘審訊之後虧空清楚更無他欵懇請聖恩仍留安順或革職留任庶得駕輕就熟於地方有裨而何經文血氣猶存非全無心肝者自必感激奮勉痛改舊習以圖掩蓋前愆努力後效矣相應據實陳覆伏乞聖主睿鑒臣謹奏覽同日又奏為鑄錢日多請增發運事雍正六年正月初八日接准户部咨欽奉上諭江西巡撫布蘭泰奏稱江西所有制錢不敷流通請每嵗多撥滇錢一萬貫運至漢口江西省動庫銀一萬兩委員前往漢口交易運回之日照京中制錢搭放之例每滇錢一千作餉銀一兩均勻搭放俾流通交易等語從前鄂爾泰奏請將滇省所鑄錢文除本省搭放外每年以四萬貫發運楚省川江兩廣等處巳經俞允著户部行文鄂爾泰於此四萬貫內以一萬貫運至漢口將起運日期預行知㑹布蘭泰令其委員接運欽此移咨到臣臣查滇省制錢先經題明每年運發外省四萬貫雍正五年分運過廣東錢二萬貫易銀二萬兩巳解交司庫運廣西錢二萬貫所易之銀計日可到今江西撫臣布蘭泰以該省制錢不敷流通奏請每嵗多撥滇錢一萬貫運至漢口該省動庫銀一萬兩委員前往漢口交易奉諭旨著臣於四萬貫內以一萬貫運至漢口欽此欽遵伏念錢法貴於流通錢文宜於多運若於四萬貫內運發江西一萬則他省運錢僅三萬貫仍不敷流通臣先因滇省鑄錢日增穀價日賤設法調劑曾檄令雲南布政司暫動鹽餘公用銀兩照時價收買市錢陸續搭放兵餉抵出新錢存庫以備發運外省銷售其中原有贏餘之錢足敷腳價現存新錢三萬五千六百餘貫提標與大理城守營兵餉向係錢文搭放前因大理停局若將省局之錢運至大理搭放往返多費應停其搭錢放給全銀經臣具題荷䝉聖恩俞允則搭放兵餉之錢每年計多二萬一千二百餘貫且各爐役每年有額外帶鑄息錢三千七百餘貫而霑益局尚存舊鑄之錢省中又有鹽斤賣獲錢文均須易銀統計每年約可運外省錢十萬貫惟是發運腳價逺者每貫約需銀二錢五六分近者每貫約需二錢三四分以十萬貫計腳價銀近二萬五千兩所以不能全運今除每年運往外省錢四萬貫仍照舊運售外應請將鹽餘銀收買搭放兵餉抵出新錢內動支一萬貫委員運赴漢口交江西撫臣委員接運領銀回滇還項每貫約需運腳銀二錢六分即於贏餘錢內發給尚餘抵出新錢二萬一千八百餘貫亦以錢作運腳委員運往川粵二省易銀現在另疏具題餘存之錢俟今嵗運赴漢口鎮江銅斤易銀回滇獲有額外息銀可以通那自雍正七年為始每嵗運錢十萬貫前往楚省川粵兩江易銀則滇錢不致壅滯各省之錢亦敷流通於國計民生均有裨益伏乞聖主睿鑒臣謹奏好極欣悅覽之前於四萬貫中撥運萬貫者恐滇省錢文不敷之意今既可足數所謂多多益善也題到部覆有旨同日又奏為覆奏事雍正六年正月十九日奉到何世璂條陳一摺荷䝉硃批此係何世璂之奏若應行酌量具題如無益摺奏以聞欽此臣看何世璂摺內一為正軍田之疆界一為定苗民之管轄就黔而論均屬可行但其中有當斟酌變通者有應分别緩急者請敬陳大略據稱田土疆界一事臣查漢夷地方多有互相攙雜隔涉窵逺者論田土亦不獨軍田論隔屬亦不獨楚省論黔省之內亦不獨鎮逺施秉玉屏清溪大抵鞭長不及互相推諉難於稽查者所在皆是臣自奉就近歸併之諭㫖巳概行委員分路查勘不論隔省隔府隔州隔縣通令查勘明確就近改併以歸畫一庶幾錢糧易於徴輸姦宄無從逃匿於地方極有裨益應俟查裂非過於畏葸即過於張皇論𠞰論撫遂都無是處現在如黎平都勻鎮逺所屬八萬九股等苗臣已趁封印閒時調署臬司張廣泗來滇將一切機宜詳細商諭并行各該屬協營將辨同心協辦聽黎平為前導舉重馭輕則施秉不勞而自靖今欲先其小者恐失要領反難就緒矣相應一併陳明伏乞聖主睿鑒臣謹奏所論甚是祖秉圭奏烏䝉之變副將郭壽域被害事烏䝉彈壓之兵為數原少此事卿所辦少覺輕忽但郭壽域舉動甚屬孟浪似此等新定地方朕屢屢有旨不可惜費善後之䇿得人為要想卿自有調度料理向後須更當慎重前數摺皆十九日批諭者祖秉圭二十日方奏到此係續批之諭雍正六年三月初八日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年二月初十日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣瓜果乾乳餅各種共一匣珍細爐食各種共一匣九頭柑大中蜜橘共一簍抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣伏讀硃批朕躬甚安卿好麼新春大禧一切平安如意也欽此臣跪捧之下歡幸無似是日值臣生日天恩眷顧備極矜憐臣復何言惟時時自審勉為承受應感泣實無可言說矣至竟有如頑石而不知覺者之諭臣不勝憤恨至兄弟子孫之諭臣不勝感痛伏念臣自親聆聖主至誠之訓凡遇親疏大小皆不敢異視皆望伊為好人伊為完人以備國家之用而耳目所難周知識所未逮誠不能通願亦難遂臣惟應自奮自勵於等等人皆不敢過為期望也再二月十八日午刻耕藉禮畢交未濃隂體天心時以民事為念合併附奏仰紓聖懷為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為削平法戛以靖東川事竊東川改流雖久而六營長九伙目俱沿舊習各踞一方有則補營長祿世豪法戛伙目祿天佑素稱凶悍為害邊疆而祿天佑為尤甚臣於雍正四年十二月親勘東川稔知其惡其時以該郡新附滇省又以地近烏䝉正在興師若急為驅除轉恐增其羽翼隨經密諭知府黃士傑令察其動靜相機徐圖查祿天佑於康熙四十七年擅殺東川營官兵及調兵追擒公然拒捕經久不獲文武各官揑報身死立案仍准伊妻沙氏出名看管法戛地方其地在萬山深處到處險峻巢穴甚多縱令土目肆行剽掠祿天佑隂為驅使沙氏陽出號令夫妻各據一寨互相掎角內擾東川外侵武定尋甸祿勸交受摧殘後見烏䝉改流隂蓄逆謀暗造鎗弩欲為土府復仇屢經招致明肆違抗一載以來惡跡畢露伊所任用凶目沙世鳯祿三斤狡地阿苦阿固沙處沙得卡超五科等種種不法俱經知府黃士傑并武定營參將魏翥國節次擒獲審訊各供得以備悉祿賊結寨連營據險負固一切情形禀報到臣臣於雍正五年十二月令武定營參將魏翥國守備王先等帶領官兵協同東川營參將楊國華等㑹合擒𠞰分作四路一由武定府祿勸州之他頗等處進扼其右直抵法戛之多顆落地方以搗祿天佑之賊巢一由東川府之小江等處進控其左直抵法戛之花椒園地方以攻伊妻沙氏之賊巢一由普渡河等處進據其前抉其藩籬撤其屏障此可破賊巢之門户一由五龍汛等處進堵其後使多顆落之消息莫通花椒園之聲勢俱絶此可斷賊巢之應援乃祿賊則姦狡百出凶焰四張要截運道壘塞險關山懸擂石草伏弩機路埋地弓井下毒藥嘯聚羣凶顯然拒敵彼時押運先行辨兵行至小五龍地方有法戛凶賊潛匿雪山腳下殺傷官兵一名土兵亦被殺傷楊國華帶領官兵行至安機卡亦被賊妻沙氏擁衆截阻祿賊顯立白旗為號沙氏率領羣賊遍踞各寨糧道不通公文阻滯臣又發本標援𠞰左協官兵三百名著守備席嘉旺齎持令箭星赴軍前趲運督軍聽魏翥國調度并發大炮二位隨營續據魏翥國奮勇前進直入老烏老地方攻開普戛羣賊把守各隘凶鋒甚鋭而守備王先亦衝鋒前進直抵老烏老嶺下結營住劄山頂山腳分兵攻打凶賊被鎗炮打死及刀箭傷死者甚衆隨攻破老烏老險關時有魯得村夷民喊呌投順并小五龍八寨施寬番界等夷接踵投誠各繳軍器隨悉行安插又據楊國華禀稱賊妻沙氏母子差猓二名情願擒獻祿天佑贖罪既又詐稱祿天佑自殺臣固知其為緩兵狡計復飭該將務生擒祿賊夫婦不得聽信姦謀楊國華始攻克舍可地方旋又攻克石城魏翥國與王先直抵祿天佑賊巢多顆落地方賊衆逃散復進攻沙氏賊巢花椒園地方賊復逃散及再追踪前往則壘石柵木堵塞堅固隨用大炮攻打賊皆被傷奔潰於是㑹合守備席嘉旺追至歹基箐協力齊進大敗賊衆復追至九龍箐㑹合楊國華協力攻打其勢陡如削壁直深萬丈復大敗賊衆又追至龍鬚厰遂生擒賊之幼子奶公頭目并賊衆等二百二十餘人及盔甲鎗刀牛羊米穀等賊衆死傷者無算續據魏翥國詳稱正月二十八日賊妻沙氏因官兵搜箐失足墮崖渾身跌傷不能動履擡至半山氣絶擡至行營喚齊所獲男婦識認俱稱的係沙氏該將隨令梟首解省號令又據魏翥國詳稱於二月初一日更盡時候祿天佑逃至起得村隨經塘兵土練協同擒獲將囚籠押解來省各等情到臣臣看得祿天佑為凶目之渠魁實邊疆之蟊賊夫妻主僕黨惡一門營長伙頭分侵四境今天佑被擒沙氏梟首幼子惡目等俱陸續拏獲仍有長子阿本次子阿第及餘黨尚在潛逃猶恐根株未盡已嚴飭文武各員先將賊巢要隘之地詳勘確查安防設汛巢穴既空潛藏無所則一二狡賊諒難漏網現在將祿天佑等發司審供俟詳到具題外至則補營長祿世豪前巳飭令知府黃士傑誘擒解司審供擬招在案祿世豪既經就縳䘵天佑又復被囚二凶既除一郡皆靖其餘營長伙目俱可漸次整理大者安設辨員小者更易鄉保庶東川地方不負改土之虛名而邊方百姓咸沾歸流之實惠矣臣於正月初八日具有窩泥既靖一摺曾將東川土目事大略聲明今大局既定相應備陳始末專摺奏聞伏乞聖主睿鑒臣謹奏欣悅覽之在事官兵奮勇效力甚屬可嘉事畢可題請議叙善後事宜著實擇人委用可也同日又奏為據實奏聞事竊有烏䝉案犯祿永孝原係米貼惡目因伊胞弟祿永忠係四川馬湖府屬磨坡長官司及永忠病故伊妻陸氏招贅祿永孝謀襲磨坡司仍占住米貼地方踞有兩處巢穴肆其憑陵擾害邊境前拒敵官兵一案經臣審訊將祿永孝磨坡司題請革職招擬斬决而陸氏係案內要犯斷難輕縱曽屢經拘提頑抗如故開印以後據援𠞰右協副將郭壽域左協遊擊張寉署烏䝉府事耿覲謨等聯銜禀稱陸氏抗不服拘非帶兵往提難以捕緝臣因飭副將郭壽域帶兵前往設法擒解隨據郭壽域於二月初一日率領千總談盛元把總張士俊等帶兵三百名親赴米貼相機擒拏續據稟稱沿途所至夷民安靖毫無驚懼等語至初五日抵米貼陸氏狡計差人於三十里外迎接及官兵一到陸氏先逃於是劄營米貼次日遍搜各箐至晚探知陸氏巳過金沙江上􅋭該將並不審度形勢酌量多寡當遣把總張士俊帶兵分布江口把守又遣千總談盛元等帶兵過江追擒以三百之兵僅留兵五十名自衛而又毫無警防於是土夷生心夥連川夷遂於二月十二日乘夜劫營先搶去馬匹器械隨圍殺官兵副將郭壽域被箭殞命五十名兵脫免回烏報信者僅甘正位等十餘人聞江外兵丁亦多被害隨據遊擊張寉署烏䝉府耿覲謨等聯銜通報而威寧鎮臣孫士魁先於二月十六日就近聞報隨遣本標遊擊顔文選帶兵三百名星往應援又請發黔省各營官兵九百名土兵一千名於本月二十日同報到臣臣一面調黔省官土兵付孫士魁調度一面發本標左協兵五百名曲尋鎮兵四百名著參將哈元生星往應援令先將烏䝉府并魯甸大關等要地布置妥當然後進𠞰隨據鎮臣孫士魁及附近各文武等先後報稱查係陸氏過江勾通川省沙馬司及建昌巴布猓玀二千餘人動手劫營又糾合涼山一帶各賊四路把守要口等情到臣適鶴麗鎮臣張耀祖因公在省請往親𠞰臣念米貼地方緊連涼山沙馬等處事屬隔省非歷練老成而又有機謀之大員不足以調度隨添撥督標兵五百名委張耀祖前往并總統全師業於三月初二日自省起程其千總談盛元自二月初七日領兵過江搜箐殺賊圍而出沿途遇敵日每數次至二十日間道由金沙厰渡江於二十三日抵烏䝉回營收合餘兵計郭壽域所帶三百名兵其留在營盤及把總張士俊等帶領守江者共一百一十二名被害千總談盛元所帶回營及先回者共一百八十八名等因各據報到臣臣看得逆賊陸氏夫婦凶惡貫盈內恃米貼外倚磨坡素與沙馬土官司脣齒為姦勾通巴布猓玀夥結凉山凶賊蠶食邊地實無寧日臣前請於米貼設知縣一員守備一員駐兵二百致倉卒變生延及軍士禍由自取無足矜憐至於情形㑹疏題報並請議處外合先繕摺據實奏聞伏乞奏覽同日又奏為欽奉上諭事雍正六年正月二十七日准吏部咨奉上諭為治之道首重得人朕臨御以來夙夜孜孜廣為咨訪期得人材以理庶政而內外臣王所保之員其中秉公推薦足備任使者固不乏人而狥私濫舉及茍且塞責者亦復不少今特諭內外諸臣等京官自翰林科道郎中以上外官自知府道員學政以上武官自副將以上旗員自參領以上皆令每人各舉一人滿洲官員則保舉滿洲漢軍官員則保舉漢軍漢人官員則保舉漢人文職官員亦許保舉武職武職官員亦許保舉文職欽此欽遵部咨到臣竊臣係滿洲鑲藍旗人應遵旨保舉滿洲官員但臣初襲佐領繼充侍衛後調內務府員外郎人微性拙原少知交即或親友中間有才具可備國家之用業䝉聖恩拔置大吏不在應保之列况外任五年文武旗員皆未能熟悉既不敢濫行舉薦又何敢茍且塞責相應具摺奏明伏乞聖主睿鑒臣謹奏卿若有所知之人亦不待朕之詢問此奏甚是雍正六年三月二十八日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年三月十二日臣齎摺家奴䝉恩賞給驛馬齎回欽賜臣御定子史精華全部并乳餅一匣酥食一匣藕粉六包抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗受訖除經繕本恭謝賜書外敬啓摺扣所有奏謝律歷淵源一摺荷䝉硃批欣恱覽之朕所喜者滇黔兩省新創之事甚多初定地方籌畫之處頗繁想必案卷如山料卿必竭蹶勉強辦理今覽此奏尚能留心於律歷之書則精神力量必有餘也朕實神情皆為之怡慰欣喜之懷筆不能諭雖然留之一字甚切要珍重之欽此臣跪誦之餘始而抃舞繼以感泣念臣身受誠之一字親承寶訓一時一事皆當凛體若接奉御書而并不寓目經心供奉高閣是虛負聖賜誠於何通故以臣愚陋雖不能深解必周復玩繹敬求大旨以返諸身心原非敢留心文字或有妨政務也至於留之一字臣當欽遵珍重宋邵雍解留春能安樂亦只是騰那法木以靜而朽樞以動殊恩愛臣諄篤憐臣切至即竭百年之力亦不能報效慈父也言之淚下不禁瑣陳敬繕摺扣恭謝聖恩伏乞聖主睿鑒臣謹奏朕欣悅覽之所論極通但嘗此滋味者不多得也同日又奏為首凶就擒外域效命事竊茶山一案臣於正月初八日具有窩泥既靖一摺荷䝉硃批凡卿所辦之事朕實至無一言可諭矣在廷諸臣皆與觀之人人心悅誠服賀朕之福慶國家得人朕亦惟以手加額感上蒼聖祖賜朕之賢良輔佐耳卿如此居心行事不但得卿一人之力勸勉屬員得通省文武官員之力且凡見聞臣工實亦莫不奮勵國家得力處多矣大臣習尚一整我朝之福洵不可限量卿功實大凡封疆大臣能保全名祿者即為上上人物矣不但孰能如此且亦孰肯如此此人情分明眼前者天祖自然照察朕慶悅之懷實難筆諭勉之一字朕皆不忍書矣嘉之一字實亦有負卿之心也特諭欽此臣跪誦之下悚仄無似念臣凡所辦之事一皆仰承聖訓凛體欽遵能不能限於才肯不肯視乎心才有不能應邀鑒原心有不肯何殊欺罔臣每以此自警即以此勸屬近日文武各員多有以不能濟事不能圖功為恥者此我聖主至仁之所化至誠之所通固血氣之具存亦羞惡之克充也臣受恩深重無能報稱所可以自信者只此一心不但無功亦何功可言伏讀勉之一字皆不忍書嘉之一字亦有負卿之心之諭感痛由𠂻無以自解彼思隨習尚保名祿自以為得下封疆大吏并內外大小臣工各相勸勉共慎之凛之至茶山叛逆原起於版目刀正彥查刀正彥倚恃江外橫行邊境號令羣賊劫害商民始欲計圖宣慰後致殺傷官兵總因逼近外域素通諸夷故積惡頻年無敢過問若此賊不除車里終難控制經臣於窩泥既靖後隨嚴飭軍前務期擒獲并令檄知蟒子老撾等國及孟艮卡高花臉諸外域凡接界地方不得縱令逃遁適據總兵官孫宏本等報稱守備張秉毅等訪得刀正彥家口逃匿稿緬山內離九龍江八十里隨差漢土兵潛往擒獲正彥之妾并妾所生女二口使女二口小使一名并金銀器物等件隨皆看守行營嚴訊刀正彥踪聖德宣示天威派令署景䝉營參將祝希堯及千把等分布各外國要隘協力嚴緝諸外國皆遵奉惟謹并據呈覆有但遇刀正彥及諸犯即當擒獻不敢縱匿等語以致刀正彥無路可遁無黨可援復回內地之猛臘地方潛避於是各將辨探知的確密㑹剋期四面圍捕三月二十一日據孫宏本等報稱千總陳安邦等於三月初四日巳生擒刀正彥并伊子二名義子一名隨從五名共九人著祝希堯押解行營等因到臣臣查醜類黨羽俱經孫宏本張應宗邱名揚等節次擒獲搜捕殆盡除巳經梟示及分别安插外現將八十餘犯解省發審首惡既擒羣夷向順而刀正彥所轄各地方延袤數千里江內六茶山地方如倚邦攸樂之屬以及孟養九龍江橄欖壩等處俱屬要地延袤千有餘里險峻處固多肥饒處亦不少且産茶之外鹽井厰務皆可整理乘此劃定界限建立城垣安設文武既可固邊疆之藩籬并可成遐荒之樂土其一切布置俟郝玉麟查勘回省臣與面商妥議具疏請旨外所有擒獲刀正彥緣由合先奏聞伏乞聖主睿鑒臣謹奏嘉悅覽之此役如此完結順速出朕望外在事官兵破格效力矣但聞該地方煙瘴甚盛向後應如何料理也同日又奏為報明鹽務零星銀兩撥充公用事竊照滇省鹽務事宜臣飭鹽道劉業長遵循辦理業將增鹽加課并正項額外贏餘各欵彚疏題報在案但鹽務內尚有零星節省閏月公費以及積餘稱頭并撥銷鋸削等項仍有溢出羡餘亦應查核前據劉業長詳稱自雍正四年十月初二日到任起至五年十二月終止所有前項溢出羡餘彚存銀一萬一百九十五兩零現貯道庫此項銀兩雖非每年必有之項然既有羡餘絲毫何敢隱匿詳請留為公用等情臣查現在進藏案內需用各項銀兩俱須隨軍押解支放所委府州縣等官置辦行裝幫給盤費各項并押解糧餉支放文武官備帶番夷賞號俱未便作正開銷而又别無捐欵原擬於備公銀內動發而本年分備公銀兩尚未徴解臣因與撫臣朱綱面商飭令劉業長將此溢出銀兩解交司庫先放給押運官賞銀盤費并買備賞號什物訖所有劉業長報出羡餘酌充公用緣由相應奏聞再此項溢出銀兩雖未便定數然係每年必有之項鹽道衙門原有額給養廉銀五千兩即此報出一萬兩外仍有數千兩餘剩臣未敢苛算俾劉業長得以寬裕料理合併陳明伏乞聖主睿鑒臣謹奏覽聞得劉業長甚好果然否雍正六年四月二十六日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年四月十八日臣齎摺家奴䝉恩賞給驛馬齎回頒賜臣皇輿圖十卷御製磁器一箱共二十件哈密爪乾香瓜乾共一匣乳餅一匣抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖竊念臣叨荷殊知無可比擬感頌之詞莫能出口伏讀不念及卿尚當念及何人之諭淚下如雨不能仰視此即凡有血氣者皆應聞之激切况臣天性具在將何以自處公忠誠純之奏覽同日又奏為報明分兵進𠞰米貼情形事雍正六年四月十八日齎回臣前摺內欽奉硃諭祖秉圭奏烏䝉之變副將郭壽域被害事烏䝉彈壓之兵為數原少此事卿所辦少覺輕忽但郭壽域舉動甚屬孟浪似此等新定地方朕屢屢有旨不可惜費善後之䇿得人為要想卿自有調度料理向後須更當慎重前數摺皆十九日批諭者祖秉圭二十日方奏到此係續批之諭欽此竊米貼逆賊謀害官兵臣調遣總兵官張耀祖等領兵前往烏䝉㑹同進𠞰隨經具摺奏明并具疏題報在案前自烏䝉平定以後臣酌留官兵於烏䝉府魯甸大關鹽井渡八仙海等處駐劄彈壓一年以來夷民安堵并無蠢動念米貼地方逼處金沙江接連涼山巴補一帶川夷故令副將郭壽域乘提質陸氏之便親往查勘意謂郭壽域屢經出師著有勞績自諳軍務初不料其毫無機謀并無防備反中賊人之計以致殞命損兵在郭壽域之孟浪實由於臣之輕忽自聞報至今惶愧憤恨寢食難安惟當凛遵聖訓諸凡慎重料理以圖寧謐並無可以自解也四月初二日據張耀祖等報稱滇黔官兵到烏㑹集相度情形應作三路分兵㑹𠞰中路官兵於三月二十四日同右路之兵自烏䝉起程至大關分路由羊泥至耶魚庫與左路之兵㑹合左路自烏起程由酒魚河至耶魚庫與中路之兵㑹合張耀祖帶領左路官兵先令守備王五采等於三月二十二日前往開路耀祖於二十五日起程前進調遣各路官兵俱於米貼合攻井底􅋭直搗賊巢右路由大關豆沙壩正溪門坎山直抄井底􅋭之後道路險逺派參將哈元生統領官兵於三月二十四日起程進𠞰并設援兵及沿途安臺護糧之兵俾聲勢聯絡以便長驅直入威寧鎮總兵孫士魁帶領官兵駐劄烏䝉兼安左路進兵臺站遊擊張寉等帶兵分駐抵補等處防禦等情四月初八日據總兵孫士魁報稱三月二十七日有烏䝉頭人切黑蘇家之子名皮歪赴營首報米貼猓賊白駒格沮之家人逃在他家隨令擒解訊供陸氏與立之户吞都在井底􅋭商議急則往拖跌白達􅋭去米貼賊約有二千餘人四月十一日又據張耀祖報稱統兵由左路前進隨遣守備王五采等帶領官兵為前鋒先奪險要關口本職帶領官兵䇿應進𠞰沿途皆有夷賊哨探守險官兵奮勇疾驅追趕夷賊驟不及備險要處所皆為我兵占踞三月二十八日至地名黑鐵關山梁上劄營離米貼三十餘里於下營之後遙見米貼寨上放火將房屋燒燬據巡哨兵丁拏獲米貼苗民三名到營訊及陸氏云巳奔往井底去又云有夷兵在大關來路各處堵禦官兵這一條路米貼以為險峻難行料官兵不能前來是以未曾堵禦等語令隨行之烏䝉漢把楊壽長前往各寨𫝊諭招撫又令你不期羊呢二家差夷人二名前往大關米貼暗行打探於二十九日漢把楊壽長帶到苗民寨頭一十三名懇請給示安住隨於三十日起身前過耶魚庫關口劄營哨探張耀祖亦於三十日至黑鐵關山梁劄營至寸金關離米貼十里賊衆把守甚力官兵直上攻打賊衆棄關退守巴上擂石臺官兵直追至米貼四月初一日俱至米貼劄營賊巳逃去房屋俱燒燬隨差人搜箐捉獲婦人二口訊供陸氏同賊首立之户吞逃往井底􅋭帶有賊兵數千沿途守險等語中路遊擊卜萬年康世顯帶領官兵亦於初一日到米貼㑹同劄營擒獲逆賊阿母雞之弟水牛阿格水牛幾幾二名該遊擊等將水牛阿格斬首懸示嚴訊水牛幾幾追問賊踪據稱逃往井底􅋭聚衆數千是實與前婦女所供無異俟分遣官兵屣探路徑另行搗巢擒𠞰等情四月十三四兩日又據該鎮報稱初二日晚差人搜箐擒獲土人一名訊得陸氏同賊首立之户吞逃往井底欲奔􅋭上而􅋭上猓賊俱說你們犯下的罪來連纍我們堅拒不容上􅋭遂踞住巴上擂石臺本職因遣兵從後山攀藤附葛而上鎗炮齊施殺傷夷賊六十二名墮江死者不知其數餘賊棄關滾箐而逃即於初三日遣前鋒守備馬似龍王五采帶漢土夷兵由正路飛攻井底遣遊擊卜萬年康世顯領漢土官兵由偏路飛攻井底四月初八日酉刻據報右路參將哈元生中左路遊擊卜萬年康世顯守備馬似龍王五采等率中左右三路之兵㑹合於四月初七日一日連破三􅋭官兵奮勇於酉時直搗門坎􅋭賊巢夷賊首尾不能兼顧賊衆潰散聞陸氏同賊首人等藏匿􅋭上寨子內官兵重重圍困諒立可擒拏各緣由到臣據此俱經檄飭務將逆賊悉行𠞰滅毋得少有姑息即逃竄山箐賊黨亦細加搜擒以盡根株毋貽後患去訖竊念烏䝉建昌之交金沙江內外夷猓盤踞不聽約束為害地方已久聞建昌鎮離城二十里即係野夷時虜掠至近地兵丁無敢逺出樵採者而米貼陸氏占奪江外􅋭寨川土司亦不敢過問今即平靖米貼安設官兵若由江外直達建昌一路川省並無營汛俾聲勢可通漸次化導恐此猓終難服制此地終難寧帖臣不自揣已據愚見札商建昌處並無附從原俱安靜合併陳明除俟擒獲凶首𠞰盡黨羽另行奏報外合將破􅋭殺賊情形先行奏聞伏乞聖主睿鑒訓示施行臣謹奏深慰朕懷朕始初聞報未料事止於此恐烏䝉鎮雄凉山一帶俱各蠢動又大費一番周折也祖秉圭黃廷桂所奏孟浪不曉事矣同日又奏為恭報春熟事雍正六年四月十八日臣齎摺家奴回滇敬啓恭請聖安一摺荷䝉硃批朕躬甚安精神愈覺健旺實皆天地神明聖祖君父慈恩錫佑之所致直𨽻入春以來雨澤甚屬均調直省奏報皆然但未敢料其向後若何也卿好麼欽此臣跪誦之下不勝歡忭不勝感悚仰惟我皇上以上聖之睿知本至誠之明通日理萬幾原只物來順應精神愈覺健旺此莊敬之所以日强也而勤念民依時厪宵旰伏讀未敢料三字心動神依不復能出一語鎮沅宣威恩樂等府州縣咸稱所屬地方田地高低不一今年豆麥收成均有十分九分兼且豆粒皇上睿鑒臣謹奏實慰朕懷同日又奏為􅊀陳古州等處情形仰祈睿鑒事竊臣附陳邊境夷情一條內荷䝉硃批這又奇祖秉圭密奏八萬古州之不可取今又欲如此急為懲創朕不解矣欽此伏讀諭旨臣再四思維查得黎平屬之八萬古州有裏外之别亦有生熟之分而鎮逺屬之九股生苗與都勻屬之雜種苗俱攙雜三屬之內地阻截道路來往不通即文武官軍亦皆繞道逺行不得走直路以故聲化難暨抄虜橫行此現在腹裏之患並非盤踞界外自相雄長者比也但其中良頑不一强懦各異在良懦之苗夷素為强頑所逼脅而無人招撫雖欲內嚮而不能臣既悉此情節故乘謬沖既靖知羣苗皆巳震動隨令張廣泗等輕騎直入相機化導而裏古州一帶相率接待踴躍歸誠據張廣泗報到臣復批令暫不必科糧亦不必編户須將鎮逺都勻各處生苗盡行招撫然後酌議設官安兵漸次料理以為一勞永逸之圖是時何世璂極力贊成并差遊擊冶大雄帶備犒賞前往協辦曽札致臣有此係黔省大計尤非餘事可比務當力圖等語蓋緣古州各地方田土肥饒民多殷實雖性近獷悍而風俗直朴易於治理且九股苗界之清水江平瀠寬濶向可通舟由清水江而上可直抵黃平州之重安江由重安江而上另有小河可通平越府之黃絲驛由黃絲驛至貴陽省城則不過百餘里由清水江而下可通湖廣之黔陽縣直抵辰州常德兩府又清水江旁支另有溪河一道少加開浚亦可通廣西其間桐油白蠟棉花并毛竹桅木等項出産甚多若能將生苗招撫安設營汛俾無阻擾使楚粵逺近商客得以上下貿易諸貨流通就黔省而論裕課便民更無有出於此者此臣以為八萬古州之必應取即官民紳士亦無不以為必應取而引領翹望者也及臣調張廣泗來滇面示事宜并密檄附近各員許聽調度張廣泗回黔祖秉圭知臣決意招撫遂揚言於衆以為此事斷不可且不必行我自有主意在屬員雖不免觀望然猶暗地奉行現據禀稱黎平生苗有高㜑八妹等寨鎮逺生苗有南高等寨都勻生苗有丹行等寨共計四千一百二十餘户皆聞風輸誠并出具木刻因撫臣力言不可尚未敢具報即鎮遠等處前已具報之生苗就撫認糧情由亦俱行駁詰再常德壽赴京過黔祖秉圭亦曾面言古州此舉不必多事需兵費餉終成後纍我巳密摺奏聞等語常德壽抵鎮遠札寄到滇囑臣斟酌竊惟同寅協恭之義人臣所當深思凡與共事皆屬一體祖秉圭如有知聞亦應一札相商以定可否在臣並非謬執己見不聽規勸之人但知錯誤即當改悔斷不敢怙過亦祖秉圭所素知乃並未商問一語旨俞允通行遵照在案鎮逺副將張禹謨訪確賊踪帶兵二千名令伊擒𠞰商之提臣楊天縱楊天縱札相應據實僃陳伏乞聖主睿鑒訓示施行臣謹奏祖秉圭到黔數次奏對朕即覺其立志不是先有旨令來陛見後恰遇伊丁憂想不宜邊省撫任巳另用人矣此人朕不識認因歷任多言其好至兩司即命奏摺見其奏對勇敢人甚聰明黔撫員缺因不得人所以擢用巡撫之命一下翻然不似前人矣大竒人之福分力量確有定限絲毫不可勉强從前實未留心今六年觀之實令人毛骨聳然如祖秉圭此是何心蓋緣福量不能承受耳如此等者不可枚舉同日又奏為請旨事雍正五年十二月十七日准兵部咨雲南鶴麗鎮總兵官張耀祖奏前任鎮臣侵蝕國帑遺纍兵丁一摺奉旨張耀祖將趙坤侵蝕銀兩據實陳奏不狥情面可嘉著交部議敘趙坤於領兵進藏之時指兵丁借餉之名侵蝕入已又將正項錢糧私自那用以致貽纍營伍趙坤殊玷大臣之體及奉恩詔豁免兵借餉銀之時鄂爾泰未經察出亦屬疏忽趙坤名下應追銀九千四百四十六兩著照數追出交與鄂爾泰其應還庫者即行還庫應賞給出征兵丁者即行賞給倘進藏武辨內再有如趙坤之借名侵蝕錢糧者著鄂爾泰查出奏聞著追該部知道欽此欽遵移咨到臣臣查原案趙坤借兵丁馬匹等項名色冒支銀兩揑作兵借混請豁免又私自那用找支錢糧雖俱雍正二年奏銷之事臣到任後未曾察出疏忽之咎實所難辭但上年九月鶴麗鎮總兵張耀祖到省見臣曽云奉文行追鶴劍駐藏各兵長支銀七千八十四兩零請豫免扣將閒欵撥補臣以長支銀兩乃應追之項無論並無閒欵可以撥補即有閒欵皆為公項亦不應代為彌補并詰其因何代兵請免緣由據稱前任總兵趙坤與軍前各官有代各兵借支銀未曾給兵又將各兵找支折給本色銀用去雍正元年䝉聖恩豁免此項各兵未沾實惠今若扣本兵長支之銀百二十兩理應查明分借各官一體照追方無含混且找支銀兩趙坤如何用過四千五百兩亦未指明趙坤既應追跟役長支銀兩各官跟役豈無長支之項因檄令該總兵赴省面詢去後嗣據張耀祖到省將各官分用數目欵項并應追長支銀兩開具清摺內稱一駐藏各官共借過銀一萬一千九百三十兩零內兵丁實領過銀六千八百八十三兩五錢其五千五十兩係各官分用總兵趙坤用銀二千兩遊擊李君賢用銀八百兩守備張有義用銀五百兩千總施善元何元李遇春把總李成林楊從林孫成宗陳尚義各用銀二百五十兩後係前任鶴麗中軍遊擊今升曲尋總兵劉起元造冊呈送轉報一已故遊擊王之臣找領各兵折給銀八千九百四十四兩零趙坤取四千五百兩令前任永北鎮遊擊今升開化鎮總兵南天祥交永北鎮標千總今升武定營參將魏翥國往四川議敘使費一駐藏各官跟役長支不准折給銀內除趙坤之外尚有遊擊夏因唐李君賢守備張有義千把施善元等共應追銀八百三十五兩零臣復面詢與所禀相符則是張耀祖先不將各官分用借支銀兩開明又將各跟役長支統入兵丁項下及奉行查始行開出均有不合矣當據藩司詳請行查定議臣隨移咨提臣郝玉麟并行武定營參將魏翥國開化曲尋二總兵據實查覆據曲尋鎮總兵劉起元呈稱本職於鶴麗中軍任內曾據進藏兵丁云借支雇覓烏喇牛馬馱載軍裝銀兩分釐未得因彼時無人告發無從察其真僞所造之冊乃據軍前將備移來鈐印轉送及至旋師查出侵隱邀免情節不敢瞻狥即經報明提督總鎮等語據開化鎮總兵南天祥呈稱議叙使費緣川督年羮堯川提嶽鍾琪索部費萬金前鶴麗總兵趙坤原任永北鎮總兵馬㑹伯議令在事人員公同措辦鶴麗出銀四千兩永北二千兩麗江土府一千兩付已故遊擊王之臣買備禮物及兩鎮差員盤費等項去銀二千兩餘銀五千兩同禮物交永北千總魏翥國往川送禮造冊因鶴麗差役盤費使用又動銀五百兩實交川提嶽鍾琪銀四千五百兩其鶴麗鎮所出銀兩係王之臣辦理是否動用兵丁找支銀兩無從得其底裏麗江出銀一千兩亦係王之臣經手惟永北所出二千兩實係議敘人員公捐等情據參將魏翥國呈稱奉差往川辦理議敘功冊領銀五千兩禮物三馱俱王之臣備辦及到川將禮物一分送嶽提督應送定西將軍一分因伊復進西藏亦交嶽提督收貯隨䝉吩咐將功冊造齊同禮物一分呈投年羮堯處收訖因路途遙逺員役往返盤費用銀五百兩存銀四千五百兩俱呈嶽提督收訖餘與南天祥所覆相同准提臣郝玉麟咨稱前䝉聖恩補授鶴麗總兵於雍正元年三月到任隨據遊擊劉起元造報出征兵丁在藏借支銀兩欽奉恩詔豁免冊籍因係借支舊案據冊轉報原未允准旋奉旨升授提督帶兵赴察木多駐劄雍正二年四月復據劉起元造冊請免升司李衛兩次駁查劉起元覆據原駐藏千把查稱此項借缺係奉定西將軍諭令總鎮趙坤公同代借接濟兵丁雇買牛馬馱載並非官借李衛始准入冊請免嗣又據劉起元驗報奉造案冊詢據標兵施瑞溥等供稱未領借支等語隨飭領兵將備行查據覆有兵丁刁應魁等呈稱實在借支請提對質若不提審難成信案因遠居塞外隨移鶴麗鎮俟旋師㑹同提究雍正三年冬奉旨撤師張耀祖又帶兵移駐察木多四年嵗暮方撤師回營比即咨催張耀祖總無隻字回覆無有實據是以未曾題參今准咨查始知張耀祖已經參奏等因各到臣臣細查各案細閲各覆文趙坤等於軍前借支銀五千五十兩既無兵借確據明係官借冒銷除扣扺外餘應於各官名下分追還庫又議敘使費用去各兵找領銀四千五百兩應於議敘各官并行賄受賄之官名下照追跟役長支一項亦應於隨帶跟役之各官辨名下著追抵補兵缺但欲直窮到底在冒免錢糧之現任參將李君賢等自當治罪而川陜督臣嶽鍾琪湖北撫臣馬㑹伯等并據冊混轉之劉起元知情不舉之南天祥等均應分别處分第趙坤已䝉皇上隆恩寬免治罪現在各員可否亦從寬免其議處止於分用軍需剋銀以邀議敘并未完跟役長支題合將查出情由先行奏明仰請聖主鑒奪批示遵行臣謹奏此事預為摺請者甚是矣同日又奏為銅礦大旺等事竊照滇省各處銅厰較前增盛經臣奏明五年分銅斤可辦獲三百數十餘萬請發價收銅賣價還項奉旨俞允并准部咨令將所産之銅自雍正五年四月起扣滿一年獲銅若干即行題明以憑預定曾否足額等因今查各銅厰自雍正五年正月起至十二月終止共辦獲銅四百萬零內除留本省鼓鑄外運赴湖廣一百一十萬零江南一百六十萬零陸續雇腳發運巳將發完又因廣東洋銅缺少需銅甚殷不敢岐視現議賣給銅二十萬斤此五年分辦銅運銅之數也至六年分銅斤現在督催上緊辦理但總數難以預定且滇處天末馱腳無多本省運鹽運米運錢皆所必需若接連雇運不但恐有遲誤兼恐屬員奉行不善或致滋擾應請將雍正六年所辦銅斤俟年終核定確數除留滇省鼓鑄外餘銅若干咨明户部於雍正七年分陸續雇覓馱腳運赴湖廣江南賣給承辦之員轉運京局以供八年鼓鑄而七年分辦出之銅則於八年分發運以供九年京局之用似此遞年辦運在銅數既得清楚而挽運亦可從容至七年分吳楚應辦銅斤暫聽其自行採買辦此一年以後每年俱有滇銅接濟矣况現今各省奉文收買黃銅器皿七年分京局鼓鑄諒可無誤除另疏具題外合繕摺奏伏乞聖主睿鑒俞允施行臣謹奏甚是題到有旨硃批諭㫖卷一百二十五之六欽定四庫全書硃批諭㫖卷一百二十五之七硃批鄂爾泰奏摺雍正六年五月二十一日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年五月十三日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣六安茶二瓶抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣職任封疆無能報稱時多錯誤致厪聖懷既捫心而自慚亦對人而滋懼乃復仰荷聖慈矜全備至寬臣之過愆勉臣以慎重身非草木何以自安惟當痛自貶懲益加奮惕凛遵善後為要得人為主之寶訓時時事事敬體誠求巳耳為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝知道了同日又奏為恭報黔省豆麥收成分數仰祈睿鑒事竊照各省二麥收成豐歉理合奏報前行據雲南布政使張允隨呈報滇省豆麥因上冬雨雪滋養各屬收成均有九分十分且豆粒大而麥穗長較之往年實為加倍臣業經具奏今據貴州布政使赫勝額詳稱各屬地方自春入夏雨澤時沛民間布種油菜豆麥雜糧等項惟開州畢節縣二處據報收成六分都勻石阡二府定番廣順普安三州又普安都勻印江永從錦屏永寧等六縣據報收成七分其餘各府州縣俱報十分及八九分收成等情臣復察訪無異所有黔省豆麥收成緣由合再奏報至滇省入夏以來迤西地方雨水霑足髙低田土禾苖俱巳栽插迤東一帶因未得大雨不能存水故低田皆巳栽插髙田半未布秧至五月初九日迎請福滇益農龍神二像到省臣率同屬僚恭迎供奉畢隨於初十日為始齊戒七日䖍誠瞻禮每日得雨數寸及十五六等日甘霖大沛各處俱巳霑足是雨澤不致愆期秋成可以預卜皆我皇上誠敬格天感召惟響之所致也合并奏明仰祈聖主睿鑒臣謹奏深慰朕懷卿總督雲貴兩省雨𤾉時若朕可保也天道至理朕實信得及但朕若不能盡君之道卿亦無可奈何也期共勉之敬之同日又奏為報明清出影射等項田土仰祈睿鑒事竊臣自到任後即遵㫖通行各屬勸民開墾荒田荒地清丈欺隱田土分别升科輸賦并抵屯軍丁銀因清丈一事未便於民而地方各官遂藉以諉缷臣再四思維若不清查必多隱匿若概丈量必致滋擾故行文各屬遍示鄉村以隱匿田地則遭衙蠧里役之科𣲖無敢聲言受豪紳劣襟之需索有難伸訴其實能養家入已者正復無幾且一經官府查出應追歷年所收籽粒田土入官更應治罪若果能遵示首報准寬巳往給照輸糧永為子孫長久之業除正賦外計所餘剩巳多倘仍前隱匿并許旁人首報即將田土給與首報之人通行曉諭而逺近民夷皆知有利無害始據各屬陸續申詳首報開墾欺隱并清丈出田土為數甚多除前巳經奏報外今又據陸凉平夷阿迷䝉自䝉化保山大姚廣西寧州等府州縣申報民間自首欺隱荒熟田地共二十四萬二千一畝五分零昆明易門永北元謀永昌楚雄定逺宜良石屏通海㠄峩鄧川䝉化保山開化麗江安寧晉寧南寧彌勒寧州新平元江雲龍永昌永平等府州縣申報勸民開墾荒熟民屯田地共九萬二千三百二十三畝零䝉自浪穹賓川鎮沅景東等府州縣申報清丈出新增影射荒熟民屯田地共八萬八百七十七畝四分零以上三項通共田地四十一萬五千二百二畝零按上中下科則不等共該秋糧夏稅米麥三千六百九十六石九斗零條編銀二千七百二十七兩二分零又據陸凉建水寧州大姚安寧等州縣查出抵補軍丁田地一萬二千六百八十五畝五分零該科夏稅秋糧米麥六百三十九石七升二合條編榖折銀四百二十八兩六錢零係應抵補屯軍丁銀之數除現在分别入冊給照或彚并奏銷或分案題報外其餘現在清查應陸續具報至收捐開墾之項除東川府屬原多荒蕪先令招佃領銀墾種餘恐借名開荒即將隱匿成熟之田充數致有冒領工費等弊所以暫且從緩當俟首報查丈既清其實在拋荒者勘明頃畝召佃發銀方無朦混再各衙門官莊馬厰等項巳令藩司糧道逐細清查另行具報所有清丈自首開墾田地四十餘萬畝數目合先繕摺奏明伏乞聖主睿鑒臣謹奏是當之極嘉悅覽之同日又奏為奏聞事雍正六年五月十六日准署貴州撫臣祖秉圭咨稱貴州布政使赫勝額因前署任查報老婦案內奉㫖革職提問查藩司衙門關係通省錢糧未便一日乏員料理今按察使張廣泗現經委令化誨生苖貴東貴西二道缺員現係知府護理其餘知府各有差委不便委護所有布政司印務黔省並無可委之員雖部文尚未准到事關緊要合先咨商請煩遴委滇省司道一員令其馳赴貴州暫署布政司事庶錢糧重務不致貽誤等因到臣隨經委雲南按察司趙宏本前往署理雲南按察司印務暫委糧道元展成署理牌行咨覆在案臣查黎平都勻鎮逺一帶生苖近日聞風嚮化皆思內附專候臣委員到日相率投誠機會不可失張廣泗自無庸復緩再清水江直通楚省船路尤屬要務臣又密囑趙宏本令將凱里一帶地方應設防汛處確查速報以便預辦今趙宏本巳於本月二十一日起程赴黔合將委署緣由繕摺奏聞伏乞聖主睿鑒臣謹奏委趙宏本往黔是當之極張廣泗巳擢用貴州巡撫此奏到又有㫖命沈廷正仍在黔署理俾張廣泗得以從容辦理成此美事似此破格任事之人如此破格擢用如阿克敦常賚因循欺隱之輩亦即棄而不用方可以革除積習不然誤國計民生莫有甚於此二弊者同日又奏為報明𠞰擒米貼逆賊首惡巳獲餘黨將盡事竊照米貼猓賊聚衆拒捕傷害官兵臣委總兵官張耀祖等統領滇黔二省官兵分為三路進𠞰并咨川省督撫提諸臣調兵會擒據張耀祖等呈報破􅋭殺賊情形經臣兩次奏報在案接准部咨欽奉上諭烏䝉鎮雄等處猓夷不法巳經𠞰撫今因該地方查拏祿永孝之妻又有匪類餘黨私自嘯聚抗拒官兵現在用兵擒拏四川建昌永寧等處亦𣲖兵堵截據楊天縱祖秉圭嶽鍾琪憲德黃廷桂等具奏前來所有用兵事宜俱著鄂爾泰節制調度其四川建昌永寧等處之兵亦聼鄂爾泰節制調度欽此移咨到臣隨即移行欽遵去後四月二十六等日據張耀祖呈據遊擊卜萬年等報稱四月初四夜至井底􅋭劄營猓賊即來劫營自半夜以至天明皆被兵丁鎗炮打退賊衆退守門坎山劄營四座初五初六兩日職等攻􅋭猓賊數千守險擂石滚木如雨我兵不得上􅋭初七日辰時猓賊率衆呐喊從門坎山蜂擁前來拒敵當令辨兵堵禦門坎山右邊衝口職等率領官兵攀藤附葛追殺賊衆入箐兵半渡河賊衆拚命拒敵官兵齊上鎗炮俱發打傷猓賊數十各棄攩牌而逃滚岩死者不計其數奔入門坎山關放滚木擂石弩箭職等率官兵奮勇直上搶至頭層岩復搶至二層岩時巳申刻適參將哈元生從後而入巳登􅋭上𥪡其坐鎗官兵兩下會合分兵夾攻打死賊衆無數賊方奔入箐內據哈元生報稱卑職由右路領官兵前進四月初四日抵會溪劄營有四川叙馬營阿興土千户安永長報稱陸氏住井底他起意的頭目呌毛臉固咱水牛母雞捫車軌里領兵殺人的呌屋基母機離朱黑鐡目魁女女阿六擯租現住吞都與土千户德昌議事德昌幫兵四枝去殺官兵德昌手下領兵殺人頭目呌黑際石巴扯一别固么兒木戛今阿六擯租領夷人劄在溪落渡口德昌統衆邀約去里密吞姑列土舍等過河來阿媽太醫地方同米貼人會飲血酒齊心煎􅘮毒藥貯附近營盤溪水內人馬飲之即死卑職初五日抵賊境大茅灘初六在大險􅋭遙望對山老虎寨係吞都􅋭門坎山要路連夜差辨兵上寨堵禦初七辰時抵蛇腰馬吞都門坎山等􅋭觀其山形凶惡夷賊望見即欲抵敵卑職隨收官兵分為三路攻打夷賊抵敵不住潰敗我兵奮勇爭先殺賊首數顆其餘四散滚箐投江不計其數又於申時分攻打門坎山賊見我兵勢重亦各逃散陳獲夷賊二名正在搜捕值遊擊卜萬年等攻打上􅋭會合收兵提訊陳獲夷賊梁嘉楷供係德昌之主文因德昌幫兵勸阻不依特來投奔陸氏巳同賊首立之户吞頭目人等逃往牛角落寨去了又問丁進忠供係陸氏厨子訊陸氏下落供與梁嘉楷同卑職查吞都地方之土司德昌乃川省所屬敢與所管巴布夷猓盡幫助陸氏殺官奪印正在分撥官兵擒拏忽有把守五險􅋭把總劉寬飛報五險􅋭夷賊與官兵對敵卑職親帶辨兵前往攻打從辰至未牢不可破隨出竒兵抄此􅋭要路砍伐箐樹透其光亮用炮攻打連發二十餘炮卑職督兵從山腰衝斷方至山頂夷賊滚箐官兵獲􅋭拏獲陸氏之女么姑娘卑職日破三􅋭各官兵無恙漢夷無不鼓舞初八九兩日帶兵搜箐擒獲拒敵夷猓共二十五名查係吞都井底逆夷即在吞都正法係米貼逆夷解往米貼正法有婦人男娃共一百二十七名口查半係陸氏奴婢半係德昌部夷妻奴即賞給有功官辨為奴等情又據鶴麗鎮驗報據遊擊曹元文報稱帶領官兵於四月十四日自井底起營由小路搜𠞰沙址一帶行至拉香寨見有賊踪分頭追擒放鎗打死猓賊二十餘名帶傷滚箐者不計其數活擒男婦四名口又據哈元生報據守備馬秉倫報稱四月初九日行至設以􅍺箐口見有險􅋭猓賊於􅋭上施放擂石令官兵由􅋭後攻打開炮打死猓賊三名又用炮攻開􅋭柵官兵直上鎗打死猓賊十數名其餘帶傷滚箐次日進箐追踪至大石河坎水深石大猓賊堵有石木排柵隨用炮攻開打死猓賊七名餘俱走箐十二日過大石河四五里遇賊在夾谷之內身背攩牌呐喊堵禦兩山施放擂石我兵齊進炮打死猓賊六七名鎗打死十七名餘逃深箐我兵陳亡二名帶箭傷六名石傷二名夷兵陳亡一名帶傷九名有江邊義子到營投誠禀屋基母機巳逃過江躲避慕故癡寨本職隨發兵前往擒拏三省官兵原係會𠞰今我兵深入川界四五日程途川兵並不知消息已飛移永寧協移營至吞都檄調建武等營官兵赴井底會𠞰等情又據該鎮報據遊擊曹元文等報稱職等搜箐四月二十日至巴上後箐見竹木叢雜微有腳踪密令兵丁砍竹而行又爬陡岩攀藤而上忽於密林擁出猓賊二百餘人執鎗放弩我兵用連環排鎗打死猓賊三十餘名餘賊跳岩而走我兵亦跳岩直趕砍死三十餘名又鎗傷七十餘名生擒六名拏獲大小男女二十三名口內砍死一名係指撥衆賊者隨令夷婦識認係務基母機之弟務基母紐是陸氏管軍頭人將首懸示本職於吞都同哈元生擒獲殺傷官兵兼又拒敵猓賊斬過九名行至井底劄營差人圍屣捉獲猓賊十七名當又斬首懸示將搜箐解到六名並陸續擒獲猓賊六名又威寧鎮自烏䝉盤獲解回猓賊一名共十三名押赴殺傷官兵原處斬示又據把總陳瑞等禀稱搜至猴坐􅋭有猓賊四五百人把住陡岩無路可上令鎗手在下施放作爬岩之狀把總等攀藤繞道而上至􅋭放炮猓賊跑竄我兵魚貫而上鎗傷刀砍者一百多人墜岩死者二三十人生擒賊首務基母甲井底蔑所搜出大纛二面各路官兵自進𠞰至今斬殺猓賊一千餘名各箐各路傷斃者無數等情又據該鎮報稱訪得賊首母舉者吕奔舉阿固即毛臉逃往羊泥箐內羊泥之弟阿母及實心效力曾獲猓賊多人故令把守要路遣辨兵搜箐母舉者吕并背陸氏頭人野雞固跨者博烹居帶猓賊九名婦女孩子五十三名口從羊泥箐逃出母舉者吕被羊泥兄弟打中一弩把總胡朝相等趕上會合將母舉者吕并一干賊犯擒獲奔舉阿固帶猓賊十名逃至羊泥寨羊泥欲誘入寨擒拏此賊抽刀砍傷羊泥脅上被羊泥所帶埋伏之人用亂鎗扎死并將隨帶猓賊殺傷又據哈元生報稱據土千户安永長驗報四月十九日有賊經過隘口率夷兵堵截招安隨獲夷猓男婦大小共一百四十五名口又一夥抗不服招率兵堵𠞰殺死猓賊一十八名撲水淹死者甚多擒獲五名并男婦娃子共六十一名另行解審等情又自四月二十四日至二十五日官兵伏路搜箐共拏解猓賊七十七名本職審訊俱係各賊首項下夷兵又監禁之內有應正法猓賊六名俱傷害官兵之逆賊於二十六日委遊擊曹元文等押至殺傷官兵原處斬示內有三名審係殺傷官兵極其凶惡郭副將子郭邦興郭邦棟禀懇手刃祭奠其父訖至五月十四日又據該鎮報稱五月初一日據阿母及到行營禀稱有賊首水牛母雞於初一日五更到夷人支歪那租家要糧食被我屣著捆拏追問陸氏下落說在硐裏藏著隨帶人同去陸氏果在硐中隨帶賊四五名被我上前捉獲二名滚箐三名陸氏跟前還有女人三口我將陸氏并隨行婦女一並拏獲四山伏路官兵聞喊趕到巳將陸氏等交給官兵等語隨據曹元文等將犯婦陸氏賊首水牛母雞等解至行營收禁俟差員起解等情據永寧協副將張瑛先後呈報查得井底夷目黑鐡勿箕女女等領夷兵四百前去相殺奉檄行調卑協帶領官兵於四月二十日抵雷波箐口𣲖兵三百名前往噶哈百足會合建昌沈許二遊擊又兵一百名由虎跳那比二處沿江接應卑協移兵於江干溪落渡口駐劄會合建昌一路官兵搜捕又驗報官兵至阿路寨擒拏賊目阿路賔苴捉獲夷賊業果一名過渡口地方有阿媽太醫并吞都土舍確里密吞姑力等乃陸氏親戚應𣲖兵堵𠞰又聞雷波土司地方有陸氏餘黨潛匿巳責令擒獻以自明如不從即雷波亦屬逆黨乘此會兵𠞰除又據哈元生報稱惡賊立之户吞并德昌逃於半個山􅋭官兵炮路巳可打至賊巢此􅋭不日可破又賊首務基母機巳逃過江川省黃螂司所管那古壩地方有猓玀擺渡招呼猓賊過河應著黃螂司擒獻等情各到臣該臣查得川屬凉山地方緊連米貼延袤千餘里原甚荒野向多夷賊從未覩兵威吞都沙馬雷波黃螂等各土司又俱陸氏姻親一帶土夷川省鞭長不及故米貼猓賊恃有黨援敢於蠢動吞都土司德昌即幫兵助惡謀逆顯著是德昌一犯實此案之渠魁而雷波等土司隱匿逆賊不行拏解亦難姑寬若不乘此大加懲創然後示以撫恤恐此滇蜀交界終難寧帖今傷害官兵之賊或擒或𠞰業巳將盡滇黔兩省官兵俱至川界臣現檄令軍前各官務將半個山􅋭攻開擒獲德昌等各賊一并解省審擬以彰國憲並行永寧協副將張瑛嚴督各土司將賊擒獻如敢抗違即會兵擒𠞰以圖靖謐至於臣身受殊恩職膺重寄並不能謀出萬全先事預料以致上厪定地方善後為要善後之策得人為主郭夀域朕未見其人想必一敢勇武夫如何委用如此要任大不是了欽此臣有何辭惟當凛遵慈訓小心慎重相機度勢無論屬滇屬川務期竭蹶料理詳籌善後不敢少有疏忽少有推諉以圖一勞永逸巳耳除俟續報到日繕疏具題外所有巳獲首惡陸氏等及餘黨𠞰擒將盡情由合先奏報伏乞聖主睿鑒臣謹奏欣悅覽之陸氏米貼之事朕未料如此完結之速在事官兵可嘉之至題到朕自有恩㫖再雷波等助惡不法土司德昌等據嶽鍾琪憲德黃廷桂一一奏聞必當𠞰除巳有㫖著提督黃廷桂親往調度相機𠞰撫矣雲貴兵辨卿可訓示伊等協力同心以成此一勞永逸之功也專候捷報同日又奏為據實奏聞事竊臣前報米貼摺內荷䝉硃批聞談盛元回到烏䝉同衆兵大罵耿覲謨聲言郭夀域之陷皆伊等害之之語其中情節所當詳察者欽此臣查副將郭夀域將領兵前往米貼恐不悉路徑向署府耿覲謨要熟諳夷地之人耿覲謨曾委漢把謝天升隨往郭夀域諸凡信用及至陸氏潛逃勾連江外猓夷乘夜劫營官兵被害而謝天升全身回烏馬匹行李無失若非與賊熟識何以至此故千總談盛元等回兵抵烏時聲言官兵之陷害皆謝天升之串通謝天升之串通即耿覲謨之指使齊至府衙將天升擒縛立欲殺死因耿覲謨呵斥其無禮衆益不平時所調威寧鎮官兵巳到烏䝉經遊擊顔文選排解遂靜候伸理臣據威寧總兵孫士魁報到隨經札覆并密令總兵張耀祖參將哈元生詳細查報續據覆禀無異臣看耿覲謨平日才具老練辦事謹慎從不敢孟浪乖張以致決裂故前於烏䝉初定暫委署理府事然人甚蒼滑觀望推諉處則事所必有若謂造意設謀此事以滋惶惑是以臣暫置不問惟密令將謝天升及前所獲一二漢姦等監禁看守候事定審訊今米貼皆巳掃靖新調烏䝉知府陸世宣不日到任應俟陸世宣任事後即當檄調耿覲謨談盛元及兵丁頭目并提謝天升等犯來省逐一親訊以定曲直如果耿覲謨謀陷情實立當據實題參治以重罪即或以署事之員不久離任諸事毫不關切亦當分别參究設或談盛元等因為賊所暗謀欲自掩其醜藉此竦聼臣當詳細奏聞斟酌處分合先繕摺覆奏伏乞聖主睿鑒臣謹奏覽同日又奏為報明五年分辦獲銅息仰祈睿鑒事竊查雍正四年分除銅課額銀九千六百二十餘兩外辦獲餘息銀四萬五千八百二十餘兩零較之三年分餘息銀僅多不及三萬今雍正五年分銅厰課息例應於六年五月內奏銷臣查該年分各厰辦獲銅四百一萬三千餘斤除銅課額銀一萬八百餘兩再扣還原本厰費并供鑄耗銅外實應獲息銀一十四萬七千三百餘兩又此項銅斤係按奏銷定例每百斤價銀九兩二錢合算今運吳楚銅斤賣銀十三兩內除正價九兩二錢并腳價銀三兩外每百斤仍有節省銀八錢又應獲銀二萬餘兩是五年分所辦之銅課額餘息約共可獲銀十八萬兩現在核造細冊具題送部而運發吳楚餘銀應俟變價回日另行報銷再總理厰務並無額給公費惟請領工本係庫平而收買銅斤則用尋常市平每百兩約餘銀一兩零歷來以此為官役公費今據總理厰務糧儲道元展成報明五年分約有平頭銀三千兩查銅厰既旺用人更多是以仍循舊例留為總理厰務一切費用至於各處各厰大小不一條例各别頭緒好心實力絲毫無欺且才具足以幹濟故得漸次調劑少覩成效此固視天年亦視人力在得人不在立法衰旺多寡皆未可以為定例者也合併陳明伏乞聖主睿鑒臣謹奏覽雍正六年六月十二日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年五月二十九日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣祕製各種丹錠二匣人參笋二匣雨前六安蘂尖二瓶雨前六安梅片二瓶抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷䝉硃批朕安卿好麼今嵗三四月各省多患時證幸皆數日即愈總未傷人比户如此都中內外人等大槩未有不病之人京中自四月初五六至二十五六全解矣此二十天內更換而病大竒事也朕為此甚是焦煩而惟朕一人不病精神如常恐卿有所聞繫念特書諭令卿放心特諭欽此竊今嵗三四月以來聞湖廣多時證初患大頭瘟繼變瘧或變痢隨復痊可續漸及河南漸及直𨽻自四月末旬以至五月貴州亦多時證由鎮逺府以至安順府普安州止少有不病之人今巳漸次減退祇雲南一省無多病人而廣東運錢差回聞粵省亦大槩不免至都中慮周萬有動觸焦煩亦臣所深知若或有一時一事不繫念我慈父豈復有人心者臣有敢放心處竊謂知天知摺恭謝聖恩伏乞聖主睿鑒再雲南新定之鎮沅府於二三四月內獨擺夷一種多得暴病不一二日畢命內有見劉洪度憤擊喊呌而斃者有見劉洪度怒罵驚悸而斃者據土人咸稱此皆叛案夥從漏網之人良懦夷民總無傷損厥後並知府衙內吏役人等亦每見劉聞臣謹奏覽同日又奏為欽奉聖諭備陳愚知事竊臣前具首凶就擒外域效命摺內荷䝉硃批嘉悅覽之此役如此完結順速出朕望外在事官兵破格效力矣但聞該地方煙瘴甚盛向後應如何料理也欽此查車里等處地方雖素稱煙瘴然聞煙瘴所聚大率皆密林深箐低窪蒸濕之區其髙敞平濶處所則半無煙瘴即有亦甚輕如思茅猛旺整董小猛養小猛崙六大茶山以及橄欖壩九龍江各處原俱有微瘴猶未若元江府之甚現在漢民商客來往貿易並不以為害且應設官駐兵處惡首麻布朋等盡縳即前逃脫之要犯熊老二及克者老二父子等近據禀報亦皆或擒或斬地方平靖夷民皆願內附而車里宣慰司刀金寶自知年幼不能約束業經具呈情願將江內各版納歸流官管轄其田土肥饒其人民蕃庶現據查造巳不下數萬户口而銀厰鹽井少加調劑即足充俸餉及此設官安營以圖久逺實滇省大局所關似無庸再計至應設文武官兵府州營汛皆宜預先定議庶得從容料理臣詳查地方形勢普洱居中鎮沅恩樂威逺居普洱之右在西北一帶車里所屬十二版納并六大茶山居普洱之左在東南一帶擬將普洱改為府治設普洱知府一員經歷一員扼要總理將普威營改為普鎮協設副將一員中軍都司一員守備二員千總六員把總十員馬步兵丁共二千二百名副將一員帶千把四員兵丁五百名駐劄普洱與知府同城并分防通關哨俾左右兼顧可以舉重馭輕思茅地方居民稠密地土寬濶為九龍江橄欖壩六茶山之咽喉但緊連普洱僅百餘里擬將普洱通判移駐思茅設巡檢一員安千總一員帶兵二百名與通判同城以聨聲勢橄欖壩地方南接䝉緬東連蟒子老撾諸國為全郡之門户最關緊要擬立州治設知州一員吏目一員安都司一員千把二員兵丁五百名與知州同城并分防慢逹江以資巡守九龍江安千總一員帶兵一百名駐劄防汛倚邦攸樂猛烏三處各安把總一員各帶兵五十名駐劄防汛鎮沅府安守備一員把總一員帶兵三百名與知府同城駐劄分汛防守威逺安守備一員千把三員帶兵三百五十名與同知同城駐劄分汛防守恩樂縣安把總一員帶兵一百名與知縣同城駐劄名之數除普威營現有守備二員千把共十二員兵丁一千四百名外應添副將一員都司一員千總二員把總二員馬步兵丁八百名查元江一協額設副將一員守備一員千總二員把總四員馬步兵丁一千名原以兼轄普威鎮沅并控制車里等處之故自另設普威營後元江汛地巳減去十之五六今既議設普鎮協則元江協自應議裁千把兵丁亦應議減臣擬於元江地方酌留把總三員馬步兵丁六百名就近撥入臨元鎮標不須另設將備即令該鎮左右兩營遊擊輪流駐防一年一換庶彼此交代更可免懈弛其所裁元江協副將即調補新設之普鎮協副將所裁兩千一把兵丁四百名總撥入普鎮協計尚少都司一員把總一員兵丁四百名除都司一缺揀選題補把總一缺考拔添補外其不足兵四百名查提標四營額設兵四千名內係馬兵一千名戰兵三千內並無守兵緣從前於五營內分設大理城守一營僅撥出守兵一千名全留馬戰兵存標故不但與各鎮協營馬一步九戰守各半之制不合即較之督標馬二步八戰六守四之制亦尚屬浮多今擬將提標比照督標以馬二步八戰六守四核算所餘錢糧儘足補此四百兵缺數並無庸議添其餘應設巡檢鹽大使并各處應分撥小汛統俟聖主若不得其人寧緩事以待必預備有人方可舉行不然好事亦被釀成妄舉之查雲南城守營守備王先明白强幹識字解事前經委往長寨近調攻法戛俱能了當擬即以王先請補授新設都司可以稱職其裁缺之普威營參將元江協守備二員俱應另用臣看守備孔繩聖人係中材宜酌量調補參將邱名揚才具甚可用堪任要地查新㠄營參將一缺最關緊要該參將曹登雲雖復勤謹實少才幹現因患病臣巳據詳題請准其休致所出員缺請即以邱名揚補用洵屬人地相宜至新設府州二官尤宜慎選滇省賢員內現多居要任未便移調臣再四籌思難得其人查鎮沅府知府佟世廕辦事敏練人亦老成雖鎮沅同屬要地現在諸務就緒夷兵安堵但得一亷介勤慎之員即可資撫恤擬請以佟世廕調補新設知府所遺鎮沅府缺請以同知管黑鹽井提舉司髙培升補黑鹽井提舉司缺請以陸凉州知州祖良範調補似均可以勝任新設知州一缺查有丁憂留滇候補知州郭倫才守兼優人復平正相應懇請無違礙除俟委員查勘造報到日臣再詳細定議分疏具硃批郝玉麟前奏只帶辨兵二百餘人行走踏勘甚屬輕率朕巳批諭矣向後凡大員巡查新定地方務以持重為要可諭令屬員知之欽此欽遵除敬録齎示郝玉麟欽遵外臣當切諭屬員向後務各持重以仰體聖慈至老撾亦當聼其情願不必强者仰見聖人舉事動合自然臣當每事凛體不敢少存意見查外域輸誠原難以强致近自擒刀正彥後不獨老撾一國即孟艮整邁等諸夷長皆有內附之意情見乎詞而蟒國强大與緬國等昨據禀報蟒國差土目二人到車里將刀正彥前所呈送蟒王禮物盡數繳回云不知刀正彥不是宣慰應交給宣慰刀金寶等語據此蟒國即無內附之意亦殊具恭遲疑臣巳詳細密囑惟應示之寬大不必更及其他大約秋冬間始有的信合併奏聞統乞聖主睿鑒批示遵行臣謹奏嘉悅覽之同日又奏為報明酌撤滇黔進𠞰米貼官兵并川省蠻夷不法會兵擒𠞰事竊照𠞰擒米貼逆賊首惡巳獲餘黨將盡情由臣於五月二十一日具摺奏明旋又據報拏獲賊首立之户吞等并川省各土司不將賊擒獻反縱蠻夷拒捕殺兵咨行會兵擒山一帶搜箐遇賊對敵遊擊卜萬年帶兵前往堵截因山形髙峭攀援無路鎗炮亦不能攻到當令官兵扼其險要後令嚮導漢夷把目喊呌開導散其黨羽隨招出設以脈頭人黑際等三名到營訊供是土司德昌的百姓又誘出巴補牛落等六名細訊德昌踪跡咸供不知隨一面穩住使彼不防一面勘的山勢惟右邊岩嘴僅可容十餘人攀援率兵爬至岩嘴見賊第一道排柵進路窄險又有關門岩攩住彼髙我低鎗炮難到只得令把總等領兵屣後山路徑搭梯而上卜萬年帶官兵奮勇前進搶至第一道排柵夷賊拒敵矢石如雨率兵開打鎗炮復搶至二層排柵有後山官兵亦攀援搶上後面山梁兩下正在夾攻遊擊康世顯守備馬似龍各帶官兵亦同攀援從後山而上接應放炮打死猓賊多人跌岩死者不計其數卜萬年復率兵搶抵三十六道岩梯猓賊自知不能逃生俱在􅋭跪喊饒命情願投誠隨誘出大小夷賊一百五十五名婦女一百四十六口并摘取弩弓長標橫刀恐尚有岩孔藏匿黨賊又令細查搜出交鎗大旗號褂戰鼓銅鑼等項有右協兵丁認得是副將郭夀域及兵丁隨帶軍器卑職查解報猓賊玀灑等三十七名逐加詳訊劫營殺官情由俱認不諱並喚川土司德昌主文梁嘉楷認識據供都是當日跟隨德昌過米貼殺官之人應請正法刑審德昌下落據供從箐尾用索弔下逃去止有他叔子名呌阿虛住安土司所管地方就往他叔子家去了也定不得等語本職隨檄令哈元生將半箇山􅋭解到猓賊玀灑等三十七名斬示家口分賞官兵等情又據永寧協副將張瑛驗報據阿興土千户安永長報稱於落甕口石岩擒獲賊蠻阿鐵一名係吞都頭目那里胞弟婦人大小男女哇子共八名口交參將哈元生收審檄𣲖遊擊王谷宰等帶官兵五百餘員名前往門坎山阿興吞都等處駐劄會擒卑協帶兵八百名內令守備髙哲等分兵四百名前往吞姑力雷波等處會捕卑協帶四百名駐劄溪落渡分遣搜捕等情又准四川提督臣黃廷桂咨准建昌鎮咨遊擊沈國卿帶兵四百名前進洗米鍋把守江口遊擊許連科帶兵六百名駐劄沙罵地方以待兩處應援又據參將哈元生報稱卜萬年等帶兵搜至沙包子羊岩􅋭望見百十餘人在􅋭上劄排柵三四十處竟有對敵之勢隨令捕獲巴補喊呌據云是四川安文二土司家百姓除非二土司到才下來又令喊呌可知德昌往那裏去彼各藏身不應不肯招出應行攻取隨咨永寧協嚴飭各員帶兵速赴會𠞰准四川提標遊擊王谷宰等各領兵抵會溪安土司處駐劄將擒獲阿虛留營跟究德昌踪跡移會到職六月初三日又據哈元生報稱捉獲巴補內有一小子名呌奔迭據稱我去揀柴見德昌在樹下拏手刨一土坑後又抓土蓋著不曉得是甚東西第二日德昌就不見了隨遣把總邰士竒帶奔迭引路前往穵出土千户印信一顆存俟旋師面交副將郭夀域所失印信尚未追出搜獲猓婦一口係門口川保之妻名喚特麻據供門口川保往江那邊姐夫卑租家去躲藏印是門口紐紐拏著隨咨永寧協即著雷波土司嚴拏卑租獻出二犯勒追印信一併解報又准四川提督黃廷桂咨據永寧協驗報分𣲖官兵於下江上江一帶搜捕凶賊因雷波土司楊明義所屬部落三千七百餘户內多因親納叛中懷二意隨將該土司調至行營勒要黨惡明義竟自潛逃且縱部落容納凶首所當𠞰除查該土司地方遼濶懇將木坪瓦寺金川沃日等土兵再調一二千名由峩邊一路至太平墩駐劄等候如楊明義將賊獻出尚可寬容倘抗不解獻即一併掃除等因又據哈元生報准遊擊王谷宰卜萬年康世顯等聨銜咨開羊岩􅋭夷賊聚集負險分遣官兵堵截􅋭之前後帶守備馬似龍并千把總由中􅋭直上賊衆擂石弩箭如雨官兵鎗炮齊發打死賊衆數十滚岩死者不計其數千把姚宅中等領漢土兵丁扳援直上懸岩百十餘丈連奪三處排柵斬獲打死賊人數十畢赤營兵一名被擂石傷手四川把總李仕榮被賊箭傷口脣率三省官兵連夜冒險攻擊我兵於五月十七日寅時齊上連砍排柵數十餘處開奪險􅋭賊衆大敗擒獲男女多人隨令酌留賊犯二三名一併起解其餘逐加刑審供招係干米貼劫營并又拒敵者一併即在彼地正法訖德昌等數賊俱在川地深藏應聼川員就近擒解吞都􅋭須兵彈壓兹川省遊擊王谷宰巳帶兵二百名前來合守備師翰正之兵三百名駐劄防範米貼一帶聼張總鎮酌留官兵彈壓逃過江之賊可計日就縛無用我兵守候請中右二路漢土官兵一併撤回等情臣隨檄令張耀祖酌𣲖裁調烏鎮官兵駐米貼防禦餘俱撤回去後六月初五日據張耀祖報稱米貼逆賊擒斬巳盡惟助逆川土司德昌及屋基母機等逃匿彼界巳飭永寧協副將著落跟獻德昌𣲖漢土官兵一千名於噶哈百足會擒屋基母機兼飭令雷波沙罵土司協助擒拏米貼一帶地方巳平軍務告竣應即酌撤官兵吞都地方本職同哈元生移咨永寧協調撥官兵五百名駐劄哈元生巳領滇黔官兵回至米貼本職會同酌議吞都既駐川兵可以彈壓米貼應駐官兵今留威寧兵四百名左右兩協兵五百名內令遊擊康世顯帶兵四百名駐劄米貼守備馬似龍帶兵三百駐劄屋基不時由箐後至井底門坎山與川省吞都官兵會哨巡查江岸井底􅋭安千總一員帶兵一百與川兵聲勢聨絡再令把總一員兵一百名於女不奎駐劄則米貼烏䝉官兵亦軍聲絡繹糧運不誤本職帶領官兵於五月二十六日自米貼撤師回省其餘官兵令陸續起程撤回等情又准四川提督黃廷桂咨會遊擊許連科等巳各帶兵進𠞰噶哈及慕故癡寨擒拏屋基母機等賊首又據張瑛呈稱雷波司楊明義不遵調度致夷猓肆行傷害制兵行文勒獻凶首雖據伊母沙氏禀覆擒拏並未解到俟獲德昌後再會兵𠞰除各等情到臣該臣查得米貼逆賊自四月初旬起至五月中止擒𠞰巳盡犯婦陸氏等業據解省飭發按察司收審未獲者僅川省助惡土司德昌等數賊逃頓各土司所轄地方臣現移咨川省督撫提諸臣飭令川員會兵𠞰擒俟獲日即解交滇黔駐劄官兵轉解勿使脫總兵張耀祖於五月二十六日自米貼撤師回省其餘官兵亦陸續撤回米貼之軍務巳經告竣惟是米貼原議駐兵三百名止足彈壓本地而井底一􅋭與川省之吞都􅋭相連應請增兵二百名添防井底􅋭並沿江一帶渡口所添兵丁餉乾等銀即以改撥兩協兵丁餘剩銀兩內動給庶更覺嚴密臣現在另疏具題請撥塘汛接連馬湖等營以通聲勢至涼山冕山抵建昌一路野夷獷悍終為邊界憂其間作何安營設汛之處應聼川督臣商酌措置所有酌撤滇黔官兵并令川員會兵擒𠞰不法蠻夷緣由合再具摺奏聞仰祈聖主睿鑒施行臣謹奏實可慶可喜之事也前據川省督撫所奏不似如此易於完結者朕恐滇省官兵日久逺入川界糧餉費力深為繫念今覽此奏如釋重負何快如之巳有㫖矣同日又奏為據實奏聞事竊臣於五年六月前赴安籠會辦土苖事宜訪知廣西夷目半多凶頑內有思陵州鄧橫等寨渠魁王興運等以大竹環門深塘繞寨器械畢備自衛甚固差役不敢窺探官兵莫能拘捕截路虜掠橫行劫殺肆惡尤甚因安籠總兵官蔡成貴曾任粵省參將經備細詢問伊言之甚詳并送歷年劫殺案冊一本臣隨向原任撫臣韓良輔面商土酋凶目原不能盡除亦無盡除之理乘此泗城改流加意整頓但將最惡最强如鄧橫寨王興運者剪除一二則其餘不勞而自定韓良輔亦以為然云當料理續臣訪聞粵省曾勒兵招撫著令填塘伐竹盡繳軍器而鄧橫等寨支吾搪塞依舊不悛凡屬渠魁俱巳潛避止令婦人女子將廢壞鎗刀呈繳數十件而文武官司惟取其甘結遂爾畢事至六年三月二十九日據貴州安籠鎮總兵官蔡成貴臣隨照會該鎮并行雲南廣南營各調撥辨兵前往西隆州附近要隘堵禦協力擒拏在案而廣西撫提並未有公文咨會到臣兹聞粵省所委總統提標遊擊常顯虎帶漢土兵三千餘名前赴西隆案犯岑顛一人而顔光色等小覷官兵竟遣其子顔光應先赴營盤詐稱投順常顯虎深信不疑撥兵同惡子前往化誨而光色等又復揚言逃遁􅞫蓬寨內及至搜擒杳無踪跡此蓋狡設緩兵之計以便築炮臺掘陷坑插枯籖圍鹿角等事整頓齊備以逸待勞五月十三等日官兵攻打弄髙寨被該寨殺傷兵丁又乘夜劫營殺傷土兵十一名帶傷者十餘名似此凶惡固難一日姑容者也今六月初三日又據總兵蔡成貴呈稱准兩廣總督孔育珣照會該惡目椎牛飲血聚衆猖獗更有大炮添官兵親行統領相機𠞰擒應再堵禦等情臣復照會該鎮並行廣南文武添撥辨兵協擒堵禦在案又六月初八日准四川提督臣黃廷桂咨准陜督臣嶽鍾琪咨稱喇汝窩逆番屢行狂悖去年整土官兵檄委洮岷協副將王剛一併統領前往擒𠞰請發兵防堵等因臣立即照會永北鎮酌撥官兵於喇汝窩相通要路各山口嚴加防堵并協力擒拏外合並奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為請㫖事竊烏䝉叛案內有革職土司祿鼎坤者係土府祿萬鍾之親叔向居魯甸本係渠魁當臣調遣官兵進𠞰烏䝉時先令東川府知府黃士傑前往化誨祿鼎坤即帶領二子及魯甸頭目等到索橋江邊投見黃士傑加以奬賞毫無疑慮隨至東川見曲尋鎮總兵官劉起元給以外委守備准其立功折罪及臣親抵東川祿鼎坤在者海汛接見跟至東城臣面加奬賞亦准效力録用給牌令其同遊擊張寉前往烏䝉化導祿萬鍾母子歸順鼎坤凛遵同往因主文劉建隆范掌案等抗頑反遣沙六等督兵劫殺魯甸鼎坤親率土兵攻擊敗走而劉建隆等又帶領祿萬鍾母子逃往大關鼎坤自備口糧督領土兵三千直搗鎮雄之脅使其首尾莫顧是以萬鍾等計窮勢迫投奔川營且招撫烏䝉頭目五十餘人各目部屬百姓數千户俱赴劉起元行營投誠報明有案在祿鼎坤悔罪抒誠功實足録前審招時臣因鼎坤素行凶悍恐仍留魯甸致貽後患所以題請照新定之例發往江寧安插逮米貼陸氏等勾通川猓殺害官兵鼎坤聞信復具呈願將妻子搬移省城為質調率土兵親往擒逆伊妻子等現俱到省雖陸氏等旋巳就擒臣亦未准鼎坤前往然觀其實心努力較怙惡不悛之土司大有不同若不豫以寬典無以示信羣夷相應仰懇聖恩特降俞㫖免其逺徙臣當將伊同家口安插雲南省城并令在臣標效力行走以便鈐束再同案之白頗阿業亦隨鼎坤到江邊投誠黃士傑恐地方空虛令回烏䝉管轄後陳明哲等抗違拒敵阿業領伊母命曾率土兵血戰破圍此亦有功之夷人因其兄祿白坡係叛案重犯緣坐應流并請免其發遣以廣皇仁可否俯准伏祈聖主睿鑒批示遵行臣謹奏所奏甚是祿鼎坤之逺徙原與朕意未洽只為卿另有意見在滇有不便處所以未曾諭及今留滇不但示信羣夷將來或尚有得力處可恩養之伊近日之功足可抵當年之過也巳有㫖諭部同日又奏為覆奏酌均公件耗羡遵㫖寬裕留給以廣聖恩事竊惟滇省賦少事繁一切公事向俱𣲖民間辦應經前撫臣楊名時飭令各屬照糧均𣲖隨徴完納名曰公件其實有不均未能畫一臣因令各屬造冊呈送逐一細核將通省糧條稅秋耗羡及核定公件并三井節禮等項除去各屬留辦公事並酌給各員養亷銀兩以及省中各項公費應需銀兩外尚節省銀四萬兩經具摺奏請荷䝉硃批料理甚屬妥協大槩川省亦然近者嶽鍾琪請將一切雜𣲖供給盡行裁革只存加三火耗均與通省屬員為養亷百姓亦甚樂從料理雖是妥協但加三猶須核酌所以於恩減浙省錢糧之諭㫖內亦曾略帶數句滇省如此籌畫可謂盡善但各員養亷似少不足從前此事原係楊名時沽名釣譽之舉不計可行與否暫沽一時之名而又縱容屬員設法巧取置之不問以取悅於屬員令感其寬厚毫無實心惠民之處乃大巧大詐之作用耳今既如此只得就此公平料理也將此諭與楊名時朱綱看欽此又公費養亷摺內荷䝉硃批但此歸公四萬未知做何用朕未解若歸帑項如何使得若為本省舊例之公用尚可如公用有餘各員養亷仍當加增方協欽此臣即將硃批原摺密付與朱綱楊名時看訖時朱綱深以楊名時為冒昧楊名時惟自認糊塗更無一辭臣復傳同司道等官宣布聖恩面加商酌著將通省各屬所得一切羡餘盡數查明具報應歸公者歸公應留給者留給庶不致牽混以滋隱匿今巳報齊經臣核算計通省糧條火耗除去解費實餘銀一萬四千七百五十六兩九錢九分八釐五毫稅秋羡餘除去道欵實餘銀一萬五千五百五十五兩三錢六分七釐公件銀復行酌定除去攤丁鹽課實餘銀一十一萬六千八百二兩四錢九釐九毫又據布政使張允隨開報每年正雜錢糧平頭羡餘銀八千四百餘兩又箇舊錫厰抽收錫斤并錫票稅銀等項除報部額課七千一十五兩外每年約餘銀五千餘兩又金厰除報部課金七十四兩八分外每年約餘金五六十兩不等又找支馬價每年餘銀一千九百一十八兩八錢又溢額商稅牙帖厰課等項每年餘銀二千二百四兩三錢一分零臣查布政使並無别項自應將正雜平羡餘銀八千四百餘兩存留作為該司養亷至錫金兩厰羡餘每年約共銀五千數百兩查各銀厰每年俱有缺額奏明於鹽餘內撥補足額今應以厰補厰將此錫金二項羡餘儘收儘抵如有不敷再以鹽餘撥補足額找支溢額銀兩項共四千一百二十餘兩應歸入公件之內總作收除又據糧儲道元展成開報每年稅秋欵費存銀四千九百兩折徴坐平銀一千兩共五千九百兩查糧道只有此項應仍存留作為該道養亷無庸歸公又據各州縣銷鹽地方續報出銷鹽羡餘銀一萬二千二百二十兩六錢八分二釐二毫又黑白琅三井應送節禮歸公銀三千六百九十六兩仍應照舊起解以上火耗羡餘公件及布政司開報之找支溢額各屬報出之鹽餘并三井節禮通共一十六萬七千一百五十四兩五錢七分二釐六毫除存留各府州縣辦應本地方公事銀共三萬五千三百四十八兩三錢一分四釐四毫酌給各官養亷銀兩內布政司有平頭羡餘糧道有欵費平餘鹽道有奏明養亷鎮沅府威逺同知雲龍州恩樂縣俱有鹽餘銀兩普洱通判有徴收秋糧羡餘可以養亷均不議給外雲南等六府前因向有稅規未曾議給養亷今稅規俱巳歸公亦應給與養亷自按察司永昌道雲南等府昆陽等州昆明等縣及各府同知通判併新設地方教佐雜職等官共攤給養亷銀一十萬二千一百四十兩內除保山等九府州縣有鹽內養亷銀三千五百兩外仍應給銀九萬八千六百四十兩又省中各項公費有紙張役食修理衙署資助齎奏顔料差操犒賞部辦飯食以及三年文武科場等項每年應需銀二萬兩仍照原奏存留尚餘銀一萬三千一百六十六兩二錢五分八釐二毫應照鹽餘歸公之例存貯司庫應辦地方緊要公事在各官養亷既優裕足用而存辦公事亦寬綽有餘庶餽送之陋規可以永禁而指𣲖之舊弊不至復作矣再臣與撫臣衙門各有賞給鹽餘養亷銀一萬二千兩應得司欵銀三千餘兩護印隨征親丁糧一百分前撫臣朱綱曾照提督例酌減二十分每年共有養亷銀一萬七千兩臣除資助武職賞勞兵丁及一切應用外家口無多儘足敷用此外如節規稅規等項並無收受合併陳明除將公費存留并各官養亷銀兩數目另開清摺恭呈御覽外伏乞聖主睿鑒批示遵行臣謹奏甚屬公當但總督所需甚繁而巡撫養亷過多西安巡撫養亷亦只萬金滇撫一萬二千兩足矣其餘五千金添為總督養亷之用可遵㫖行此巡撫養亷必楊名時無恥之議也雍正六年七月二十一日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年七月初五日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣嵌東珠凉藤冠一頂御製磁杯一匣共二十四件十錦香囊十匣錦扇四匣香扇器一匣香手珠二匣鄭宅茶十瓶小種茶六瓶抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬唘摺扣遍誦硃批感痛交深喜懼并集伏念人之福分力量原絲毫不可强然賜福自天求福自已未有能求福而不䝉福者而力量亦若因之加增彼不能承受者非天有所吝固自不能求福者也我皇上至誠至敬心與天通福夀無量得之自已跪讀損夀折福之喻不禁神惕骨悚此非大光明不能作此語非大徹悟不肯出此語臣即鈍根亦知領會凡百只仰賴天知恩義即屬豚魚亦有性情於此而猶不感激奮以謝天下蓋恩深者責愈重賞厚者罰難輕言念及此淚迸汗流敢聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為欽奉聖諭先行陳覆事雍正六年七月初五日䝉頒發到貴州提督臣楊天縱密陳黔省田賦情弊奏摺奉硃批此係楊天縱條奏地方事宜看此奏甚屬可嘉但其中或有委曲亦未可定卿可詳細酌量與沈廷正會議料理欽此欽遵臣查黔省地方漢夷雜處田地雖科徴不等而額賦實昔多今減祇緣先遭吳逆之變民夷棄業逃避及至恢復大半為土司并豪强者占踞地方官不實力清釐因循怠忽遂相沿至今臣自到任後即留心體察遣員查訪欺隱者固多拋荒者亦不少原非止安順一府且有姦狡之徒於隔府隔屬置買田畝指稱巳在本籍完糧不入該管官正額之內兩地閃躲逮日久莫可稽查致糧賦均為虛懸又有紳襟衙蠧包攬完納䝉蔽侵蝕者因而應徴錢糧不能復舊額課有虧臣念若遽行清丈必致民心惶惑而奉行者稍有不善又不免擾纍且田地統於疆界疆界尚未清田地何由清理錢糧出於田地田地既未清錢糧何能清楚况黔省之地半不納課因而墾地成田者亦匿不升科種種陋弊臣雖巳深知然未敢急迫清剔者如理亂絲法須用緩若不得頭緒反更無條理早經臣飭諭各屬將互相攙錯地界俱就近歸併其一切田土只論地不論人如地在某屬者即在某屬納糧即隸某屬管轄再行詳切開導令民自首并許人告首一經告首即徹底清丈庶民既相安而事亦有濟即如滇省之欺隱從前亦舉首寥寥自臣出示曉以利害并勸開墾遇有告發即令該地方官或委員查丈現今自首隱射新報墾荒以及丈出田地每嵗約計數十萬畝此可為之徴驗也此事臣檄行黔屬巳久且屢經揚言於衆使之聞知料黔省紳襟士庶皆知必事清查難再弊混是以臣前經奏明欲赴貴州盤查藩庫擬就近料理一切嗣因兼理撫篆未便擅離應俟滇撫臣常賚到任後臣看視月餘即赴黔省與撫臣沈廷正面商妥酌先行各屬將别邑民人置買并豪强隱蔽之田按里逐一清出分别科則造具實徴細册歸入正額則應徴之糧賦先可按冊徴收再重出示曉諭凡有欺隱及新墾未曾報官者盡行首報地方官勘丈給照升科倘不自首委員摘丈將丈多之田入官變價仍治以欺隱之罪照追歷年所收籽粒則從前諸弊自不得不首報亦不敢不首報矣又提臣楊天縱奏稱安順府衙門原有陋規二千四百兩自知府何經文到任盡行革除各廳州縣豈無此等陋規等語臣查黔屬府州縣向來俱有私𣲖陋規前署撫臣石禮哈到任業巳通行禁革勒石永遵安順府之陋規非知府何經文始行革除也前有石阡府知府趙之堯藉稱公務名色仍違禁私𣲖雍正四年冬臣赴黔訪確隨經糾參今黔省大小各官俱議給養亷若再稍存公費使各員日用充裕則私𣲖陋規自可永行禁絶亦俟臣到黔與沈廷正商酌而行又提臣楊天縱奏稱各衙門書役差催徴收每多勒索諸弊等語臣因胥役玩法者多已屢次嚴行示禁并令提拏究治或尚有藐視故違者應俟開徴時再通行嚴飭倘敢仍蹈前轍務須盡法究處則姦胥蠧役自必不敢以身輕試再民間買賣田地黔省陋例從不到官稅契致多訐告紛爭臣巳飭令各屬務將買契送官完稅鈐印以杜假契弊混今春布政司頒發契尾令州縣官鈐印給業主收執如無契尾即照匿稅治罪之新例各屬現在遵行是提臣楊天縱請凡置買田地務必赴官稅契之處無容再議除鈔録原摺密交黔撫臣沈廷正預行籌議外理合據臣所知先行覆奏伏乞聖主睿鑒施行臣謹奏想皆卿必知之事但閲其奏偶爾發來卿看者朕原無定見也卿斟酌次第為之同日又奏為奏聞事雍正六年六月三十日准兩廣督臣孔育珣札開泗城改土歸流其田土未清人情尚屬未定前經劉守議詳各欵據以具奏今奉硃批諭㫖抄録奉商應作何料理粵省巳詳委左江道思明府同知土田州岑應祺丈量邊氓夙未經見前任劉守論白徴收之處未識是否可行等因并録原奏摺略內開奉硃批卿斟酌合宜委令辦理朕不洞知地方情形難以懸諭當與鄂爾泰商酌可也欽此臣查泗城與西隆江北地方議歸黔省若丈量田地恐致滋事當經委員將每年應徴錢糧并隨糧徴納陋規及歷年遇事濫𣲖各項銀兩查明造冊據報應徴糧米計有一千九百六十餘石應徴糧銀僅三千二百一十兩零除官役俸薪工食等項外不敷放給兵餉西隆册亨等四甲半尚有破收銀二千四百五兩零因官無養亷役無工食是以改流後歷任徴收相沿巳久而各甲夷民俱遵循完納應將官役所得之項革去四百餘兩酌留二千兩歸入正項又泗城長壩等十七甲半有公議鹽銀乃土官收用之項若照舊額徴收仍不免苦纍應每亭酌留一半共留銀五千六百六十兩零歸入正額統計合算新設永豐一州共徴銀一萬八百七十一兩零共徴米一千九百六十六石零則官俸兵餉并衙役工食皆巳足用又泗城土府藉稱修理衙門名色每年每亭𣲖銀六十兩共銀七千九百五十兩今設官安兵應建衙署塘汛營房等項亦暫留一半銀三千九百七十五兩為修建之費俟修蓋完日另行裁減其餘濫𣲖各項逐細開列出示永行禁革以蘇民困續又據南籠府知府黃世文詳稱清查各亭村寨內有水衝荒絶田土無存無可撥補者共六亭半應徴銀米請豫豁免共應免銀四百兩零米七十七石六斗零并免徴收修理衙門銀六十五兩共一百三十五亭應完之銀除俸工兵餉巳自有餘恐日後完納維艱徒多積缺每亭再懇量減銀一十一兩二錢四分共減銀一千五百一十七兩零臣又批行准其減免并出示曉諭夷民無不悅服現在飭令造冊詳題按數徴收兹接奉商酌之諭㫖臣隨將泗城江北原未經丈量係酌照舊時額數徴收以資官兵俸餉胥役工食內有水衝荒絶田土將原徴銀米准豫豁免所有土官陋規業盡行禁革夷民安之現俱寧帖在粵屬江南一帶雖措置應有不同然丈量一事似斷不應輕舉緣人心未定遽繩以官法舊主未忘復增以新怨恐非所以便目前計久逺也昨嵗奉命協辦泗城事曾據愚知向粵前撫詳切言之即如重參土府提問土目究從前之苛𣲖追既往之贓私雖事屬應行亦不妨少緩新定地方先務不在此前據滇黔委員禀莊田等事隨經嚴飭而粵前撫或未之深思耳茲讀奏略如援原任泗城知府劉興第之詳分給岑映翰存祀并養土官眷口以及族目各役之田等議甚屬妥協第每白止田二畝約令上稅一兩即為已業誰不樂從但不論肥瘠每白概徴銀四錢未免輕重不一此係遙度之見未知當否等語備札回覆督臣孔育珣囑其裁酌而行訖緣係奉㫖著臣商酌之件合行奏聞伏乞聖主睿鑒臣謹奏甚好是當之極同日又奏為報明委員招撫生苖情形事竊照黔省苖猓雜處半多凶頑幸逢聖世德威逺被中外歸心安順貴陽所屬生苗陸續向化惟黎平之八萬鎮逺之九股以及都勻凱里等處生苖盤踞於黔楚粵三省接壤之間阻隔道路不通聲息以致燒殺劫虜肆行無忌地方官從不敢過問若不乘長寨泗城謬沖等處苖夷懾服之後即行招撫清理終為邊境之害但各種生苖攙雜於數郡之中延袤千有餘里其間亦有良頑各分强弱若不先擇其最頑最强者首加擒治就其素良素弱者明示撫恤則不足以懾其膽而服其心恐即逐節為之亦難得要領而坐失機宜貴州按察使張廣泗素有才略兼能武事是以臣一面具摺奏明一面傳調張廣泗至滇省詳細指示令其帶兵前往招撫先由都勻凱里次及鎮逺之九股等夷然後至黎屬之八萬古州收局竣事并行附近各協營撥發官兵悉聼張廣泗調度臣復發給犒賞等物並於黔藩司庫撥捐項公費銀一千兩著帶往備用去後今據張廣泗先後具報於五月十六日自省起程先抵都勻府酌商機要體察情形有八寨者乃生苖門户欲事開通應於此處設畫為始移知各協營整備官兵預為振揚六月初九日同都勻營參將趙文英等帶領撫標官兵暨都勻漢土官兵前進八寨隘口劄營查八寨周圍約計一百四五十里共大小一百一十餘寨地勢遼濶户口亦繁兼以生苗錯雜而處為都黎通逹要區苗夷出入總隘向係天壩土司所轄曾將該管土官殺害兩代並未明正其罪惟改歸府轄自改歸府轄後轉益獷悍莫可控制是以酌議應自此先為布置隨明白給示差通事齎往曉諭該苖等初猶觀望復諄切開導即有代理代省等十餘寨俱赴行營叩見矢願歸誠又有生苗九門長塘等三十餘寨亦來懇請招安認納糧賦當同文武賞賚令各安業惟代理等寨相隔一山之楊牌楊堯二寨在八寨之中恃寨分稍大十二日糾衆持械前來欲行阻抗當令撫標守備張瑢帶漢土官兵馳往堵擒廣泗復同參將趙文英帶兵親去督率連斃十餘苖衆即奔竄至次日遂有牌牙壩固等寨前來投見並稱彼等為楊牌楊堯脅制附和今巳知威悔過其餘大肚小肚乜告等數十餘寨於十四五六等日俱相率歸誠又有都勻營所調之獨山汛官兵於十三日自普􅋭前進八寨會合有交歸羊甲等寨先為楊牌糾約及該員辨領兵前來彼等尚不知楊牌寨巳經潰散猶敢堵截隘口肆行阻抗亦被該員辨督率漢土目兵攻殺頑苖八人割其首級連破交歸羊甲等六寨隨有附近交歸之甲些等十餘寨前來就撫均照前賞賚仍聼逐一編查户口定議錢糧造冊詳報至於楊牌等寨恃强違抗迎敵官兵猶敢阻撓相連各寨並鄰接生苖不許就撫所當嚴加懲創但倡謀糾集者楊牌則係頭人阿舍阿乜阿米等楊堯則係頭人方金抱牙等不獨此外各寨多係畏勢脅從即其本寨亦被壓制附和今該二寨巢穴巳空復移八寨適中之斗魁劄營有楊牌楊堯之人懇求招撫隨諭將倡謀首犯獻出餘人方准寬宥俟其回覆酌量安置又八寨之傍有無管生苖各寨俱巳傾心歸撫獨有番仰番扛大小十一寨既係生苖尤恃險固平日燒殺劫虜無惡不為兹官兵經臨自知孽不可逭將家口衣食先行藏匿惟餘丁壯看守巢穴遣人招諭至再彼等藐玩不從愈肆驕悍隨令都勻營所調麻哈汛官兵密飭麻哈州麻哈汛千總帶領於十八日攻番仰一路又令守備張瑢帶撫標官兵攻番扛一路廣泗同參將趙文英帶兵前詣適中要隘督率聲援而該苖等逞凶拒敵官兵奮力撲攻或殺或擒燬其巢穴其餘黨類不能抵禦俱各逃逸遂行屣探該寨之人亦有悔罪求生者查番仰番扛等寨所居外面形勢之險甚於長寨之谷隆打壤而其內地又稍寬展故敢盤踞肆行毫無顧忌今經官兵懲創附近生熟苖寨莫不歡欣此等餘孽似難寬宥而貽養癰容俟從長酌議於此處或安設防汛或招集漢民庶得填實以為長便所有八寨等處投誠苖民共大小一百一十餘寨計一千八百餘户又就撫生苖共大小四十五寨計一千二百餘户周圍地界約計二百六七十里局面巳定六月二十一日准凱里營都司羅資衮等移稱自凱起程至烏留坡頂駐劄查烏留乃無管野苖係丹江桃繞髙坡雞講上下九股一帶地方門户應於此處先行化誨十七日前至烏留該寨凶苖約有一百餘户不遵化誨糾合丹江等處凶苖千餘人披戴盔甲拋刀呐喊前來對敵本職等當遣官兵分路迎敵三路夾攻凶苖大敗直抵該寨收兵駐劄對門山上相機招撫而凶苖復集夷衆環繞營盤施放鎗炮十八日天明有丹江凶苖統率千餘人各執鎗炮蜂擁前來當即分遣千把隊目帶領兵丁本職等親身督率四面迎敵傷死數苖羣苖奔潰是日申時分凶苖復又糾集千衆鳴鑼呐喊而來又經傷死數名十九日仍來迎敵本職等率兵分為三路追殺自巳至酉傷死凶苖六名帶傷而逃者不計其數現在募差苖頭前往各寨化誨各等情到臣臣查苖猓情狀初似凶猛然大率烏合之衆志氣不一始鋭中懈攻擊甚易我軍對壘時起初不可輕敵到交敵時則斷不可輕縱務用全力以搏小醜但殺傷賊數人則數千人皆無鬭志然後乘機速進𠞰撫並行喪其膽招其心此破竹之勢無不應手若見其橫肆少存畏疑因其渙散又復怠緩則斷無有克濟者隨又詳細批行各員遵照去訖料此時張廣泗等巳前進鎮逺八月中即可抵古州料理矣所有委員招撫生苖情形合先奏報再安順一帶直抵粵境生苖除前巳化出五百三十九寨節次造冊具題外近又據副將劉成謨等陸續化出生苖一百餘寨現在清查户口俟造冊至日題報合併奏聞伏乞聖主睿鑒訓示遵行臣謹奏朕見張廣泗初進苖地其敬奉之景似只用撫而不須威力者今既用兵威撫取則善後事宜更當謹慎為之凡新定地方利之一字萬不可與較錢糧二字萬不可惜勿因小而誤大切諭切諭同日又奏為奏報添𣲖官兵會𠞰川夷事竊照米貼逆賊擒𠞰巳盡犯婦陸氏等業經解省發審止助惡土司德昌等數賊逃遁川省各土司所轄地方應川員會兵擒拏并將不法蠻夷勦除故酌量存留滇黔官兵分駐堵禦餘俱撤回經臣具疏題明在案續據元江府知府遲維璽等審據陸氏供殺官殺兵都是黃螂土司德昌同立之户吞募期虐虐屋基母機水牛母雞們做的事印是募期虐虐送與小的小的不要他與募期阿破就背了投雷波司楊明義那裏去了等語申報前來隨將供出人犯照行建昌永寧等鎮協按名擒拏解報去後七月初十日據遊擊康世顯驗准四川遊擊許連科鄂世威沈國卿聨銜報稱賊首屋基母機藏匿結覺寨內奉文飭令擒拏隨於五月二十三日在以密哥會商三路分進約於六月初六日齊集𠞰洗三路官兵按期會合適結覺雙尺巳遵建昌鎮化誨悔罪投誠於初五日擒出屋基母機之父阿加弟怕虐至行營投獻初九日據夷人阿太禀報屋基母機在結覺後山髙岩石洞之內即遣發漢夷兵丁攻打上岩擒捉亂鎗刺死梟下首級怕虐跳岩而死亦將首級割下所有屋基母機首級并怕虐首級二顆并伊父阿加哇子阿果屋逆合差目兵押解等情呈報到臣隨將屋基母機怕虐首級發按察司懸示并令該司將阿加等收禁並審又據遊擊康世顯驗報准四川提標遊擊王谷宰移開審據犯屬阿家供德昌在大毛灘憨家地方隨撥𣲖官兵前往圍擒於七月初六日土司安永長同官兵將德昌弟兄二人拏獲所有幫兵拒敵與雲南副將印信俟審明另移合先咨會等情轉報到臣七月十六日准陜督臣嶽鍾琪咨開准兵部咨內閣鈔出奉上諭據嶽鍾琪黃廷桂奏稱米貼逆夷陸氏巳經擒獲餘黨搜捕指日可竣其四川雷波土司楊明義從前私遣部落幫助陸氏今又劫奪糧運傷害兵丁並誘結附近結覺阿路阿照平底等處苗蠻聚衆妄行罪惡顯著再吞都千户德昌私助陸氏土兵與官兵公然對敵甚為狂悖均屬不法應請用兵𠞰除以安輯苗地等語烏䝉等處凶苖抗拒官兵該督等遣兵進𠞰今巳悉就擒獲而楊明義等當陸氏潛匿之時輒敢朋比隱藏今又劫糧聚衆誠為法所難宥但用兵關係緊要必須武職大臣統轄方為妥協著提督黃廷桂即帶領會𠞰米貼漢土官兵檄委將辨會期前往仍飭副將張瑛嚴行防範相機擒𠞰著總兵張耀祖帶領滇黔官兵分路堵截使賊苖四面受敵勿致竄逸著總督嶽鍾琪雲南總督鄂爾泰飭總兵趙儒於凉山相通阿路各處嚴加防範再飭總兵張耀祖於各要路委辨巡輯遇有逃逆即行擒解黃廷桂著賞銀五千兩張耀祖著賞銀五千兩為二人行軍賞需之用俱於四川司庫內動用支給此番用兵係川省地方之事進退機宜著張耀祖等聼黃廷桂節制調遣特諭欽此移咨到臣即經移行張耀祖等遵照去訖該臣查得川省賊蠻猖獗皆由土千户德昌幫兵助惡雷波土司楊明義等私遣部落奪糧殺兵勾連結覺等處苖夷肆行不法所致前據永寧協副將張瑛報稱訊據楊明義部夷供明義在營逃脫時别確落葉等連夜往涼山調四千蠻兵到哩立格聞明義巳回才轉去等語是楊明義與部夷平日濳通涼山夷賊私結黨援悖逆顯著續滇黔官兵巳將米貼掃靖張耀祖哈元生分領官兵直入川界五六百里攻搗巢穴擒斬殆盡而川省官兵並未殺一賊拏一犯且約定會合日期亦不能到及經張瑛檄行查問據報遊擊許連科沈國卿覆稱賊蠻殺死塘丁巳將索橋砍斷並無渡處欲轉路前進賊蠻截糧阻路又有滚木擂石且按壤涼山路口繁多即或至彼兵單亦是無益等語臣屢見張瑛驗報大有奮憤之意是川省官兵非得大臣統轄實難望其濟事者也兹伏讀上諭著提督黃廷桂帶領調遣著飭總兵趙儒於涼山相通阿路各處嚴加防範仰見睿照無遺巳握機要以全力擊小醜何向不克在臣初意德昌巢穴業經破毁即便逃匿料不日就擒止為楊明義一犯川兵巳有數千足資攻𠞰且烏䝉鎮應設官兵臣准部文後即檄撥速往足資防範故於煙瘴正盛之時官兵勞苦之後除該鎮額兵外仍酌留官兵九百餘員名分駐米貼屋基令於沿江隘口嚴加堵防其餘暫令撤回若因涼山一帶原未輸誠應乘此大舉以圖久逺寧謐則諒非數月可以成功臣原欲待至深秋煙瘴盡消夷人稻榖將熟隨即選調將辨添撥生力軍剋期前進三省合攻務期竣事前於七月初間准川督提臣咨會云川省𣲖漢土官兵八千餘名提臣黃廷桂擬親領征𠞰業經具奏臣隨密調附近漢土官兵除烏䝉鎮兵外共三千名在營聼候計陸續起程及至會齊則巳八月盡矣提督臣黃廷桂英鋭慷爽總兵臣張耀祖勇敢老成同心協力自必可能濟事也抑臣更有陳者苖蠻生性畏威而不懷德由來巳久若不加懲治轉不妨姑容但一動官軍則斷難少縱或大兵雲集勢不可當彼則狡稱投誠遂豫招撫終難善後據臣愚見𠞰應先撫佐之即便准撫亦必親臨其地大張軍威擒其渠魁寬其附從庶知有可畏然後知有可懷倘中事而還得半而止夷情反覆料不旋踵如烏䝉之米貼原未經攻𠞰建昌之涼山亦惟事招撫故致有此舉即可為前鑒臣本不諳軍旅未敢臆度然凡有愚知斷不敢少有不盡之詞以負我聖主忠誠之訓所有添𣲖官兵會𠞰川夷情由合併摺奏伏乞聖主睿鑒訓示施行臣謹奏朕先未料米貼事完結如此之速亦未知滇黔兵巳撤之信因有前諭原為兵勢衆多更易擒捕之意後知張耀祖等撤兵又有㫖不必用滇黔官兵合𠞰矣想後諭巳到卿等自然遵行若少有疑慮當令兩省助力亦可此在卿相度機宜而為之觀其情勢川省之兵力足可靖其餘孽也同日又奏為報明粵西土目拒殺官兵情形事竊照廣西西隆州八逹寨惡目顔光色等不法提臣田畯等發兵𠞰捕不能擒獲并臣調撥辨兵堵禦協擒緣由業經具奏在案近探得粵西官兵向未經訓練半多臨陳畏縮而右江鎮之兵又係新募不諳紀律顔光色等前用緩軍計堅築炮臺預備巳久且其寨坐落髙處路止一條周圍板墻下挑深渠人站渠內向外打鎗外邊鎗炮俱不能打著賊人又於寨外路上安小囤子二處遍插竹簽並掘陷坑官兵屢次攻打不得前進六月二十一日粵省官兵攻打第一囤子被土賊竹簽亂扎標子亂打傷死千總一員兵數十名受傷者百餘人又活捉去兵三名用繃子繃住手腳衆惡在山頂坐地飲酒吹號鳴鑼將兵鎗刺箭射以示威勇從此四處土人皆與顔光色寨內挑米挑物供應不絶因該寨後路通滇之廣南顔光色等慮及廣南官兵於六月二十六日又添設炮臺二座以阻廣南之路惡熖甚熾前右江總兵官假宗嶽移會安籠鎮廣南營府發兵會𠞰臣據鎮府具報業檄飭廣羅協廣南營各撥精鋭兵二百名令幹練辨員率領照會安籠總兵官蔡成貴調該鎮標遊擊田昌友帶守備一員千把總四員兵丁四百名土兵三百名各赴八逹軍前會𠞰并令酌調安南普安盤江等營兵共三百名到安籠聼用今於七月十五日又據廣南府知府賈秉臣禀稱聞假總鎮於七月初三日又同西隆州西林縣土田州帶領漢土官兵去打囤子土兵不肯前進漢兵正欲前行見顔光色寨外坡上有漢人指點對敵炮臺上有土婆子三人身穿艷色新衣手拏五色布搖擺官兵昏迷回頭奔走囤內之賊趕下傷兵七八十名西隆州之泥硐寨巳投歸光色反攻漢兵假總鎮差人齎文前來請撥土目陸尚貴多帶土兵前往接應可否撥往等情經臣立即批令遣發訖七月十七日始據假宗嶽以賊計狡猾早踞險要粵兵疲弱反被傷害若請兩廣督院發兵有需時日請就近添發官兵土勇四面圍攻協力進𠞰臣復飛行廣羅協廣南營速即添撥官兵帶領大炮并於廣西府𣲖五嶆土兵數百名於廣南府撥土兵數百名著該副將酌𣲖備辨帶領前往堵截應援再照會安籠鎮令其添𣲖漢土官兵籌畫定計務滅凶夷以靖鄰界訖今廣南官兵早於各要隘堵截安籠官兵巳於七月初四日抵八逹軍前臣查粵西惡目豈止一顔光色憤奮誓滅此朝食則羣凶效尤更何所顧忌言念及此不勝痛恨在臣職任滇黔原不應干預粵事但事有緩急何敢岐視且受恩深重無有如臣者嫌疑彼此之際固非所計也至於五色布幡夷人謂之五海術雲南元江等處亦多有之一遇官兵奮勇則並不見靈驗搖擺昏迷之說似屬畏縮者之藉口料亦非實事俟看續報到日是如何情形另行調遣外所有惡目拒殺官兵情形合再奏聞伏乞聖主睿鑒施行臣謹奏提督田畯又親往矣但廣西兵將業巳氣餒田畯亦係中材料此事伊等未必能成功卿當身任料理有何分疆界之嫌疑也賊衆經此一番必然氣盛諸凡不可輕視所調進取將辨務令慎重從事可也同日又奏為請㫖事竊照烏䝉鎮雄改土歸流經臣請設鎮營將援𠞰左右兩協官兵裁撥烏䝉并將威寧一鎮改營所餘官兵移駐鎮雄奉㫖依議欽遵在案今據烏䝉鎮總兵官劉起元以各兵安土重遷請照遷撥新設維西營千把兵丁搬移賞給事例一例議給臣查維西新營係奉特㫖前往駐劄之兵俱離本處移駐邊逺地方伊等搬移家屬等項不可念及節省錢糧著甚豐裕施恩前往欽此欽遵是以酌議千總每員賞銀六十兩把總每員賞銀四十兩到維西兵丁每名賞銀八兩家口十五嵗以上每名賞銀三兩十五嵗以下每名賞銀二兩到中甸奔子欄阿墩子等處兵丁家口又各遞加賞給原較從前兩協官兵移駐景䝉營賞給之例為甚豐裕然維西一區雖處極邊而夷人歸化既久漢民俱各安堵比之新闢烏䝉地方既屬荒涼且連經進𠞰疲敝愈甚一切艱難實有倍於維西者相應懇祈聖恩特降諭㫖准照遷往維西兵丁之例著臣酌量逺近分别賞給則官兵家口咸沭皇仁於無既矣臣未敢擅便恭摺請㫖伏乞聖主睿鑒施行臣謹奏所奏甚是巳有㫖矣硃批諭㫖卷一百二十五之七欽定四庫全書硃批諭㫖卷一百二十五之八硃批鄂爾泰奏摺雍正六年八月初六日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年七月二十四日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣欽定駢字類編全部共二十二套玲瓏囊花牙毬一盒果乾糊條共一匣乳餅酥食共一匣蓮心茶一瓶抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批矜憐倍深體恤備至伏讀屬員之衆焉能處處事事得人而用之等諭伏讀非本心怪卿實為卿將來易於舉劾他人不得議論之意等諭不禁淚下莫能自解竊念臣受恩深重中外共知即果係臣之小疵亦可供人之議論臣若不小心敬慎時刻省惕致多過愆為他人議論或更有忍心悖理之人以得議論臣之故並私議論聖主用臣之誤則臣死不足以贖辜為天下後世之罪人每念及此實寤寐難寬勉之敬之之慈訓當事事理會處處體認斷不敢少有輕肆以自甘背負也至於川省會兵之役沿江堵禦原有官兵足用即雷波土司楊明義不過一乳臭蠻童努力進𠞰立可就擒獨涼山冕山賊蠻直踞建昌永北各邊通連喇汝窩打箭爐一帶獷悍巳久斷難施撫若不用全力期在必靖終難一勞永逸臣接准部咨業立檄哈元生領兵先行限於八月十五日到界總兵張耀祖復添帶該鎮兵五百名於八月桂調遣並詳細諄囑示以此舉名係堵禦實須會𠞰毋得因事屬川省少有推諉情事協力同心四字臣務當以身倡之以仰副聖諭專候捷報之至意而張耀祖哈元生等叨䝉異數榮幸無似自必奮勉圖功料不敢少有岐視耳合併陳明為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為奏聞事竊照粵西土目顔光色等不法提臣田畯發兵擒勦該將等日久不能𠞰滅惡焰愈熾據右江鎮總兵官假宗嶽移會安籠鎮廣南營府發兵會𠞰臣行安籠鎮及廣羅協廣南營各撥發官兵前去堵禦協擒兩經具摺奏報訖安籠鎮總兵官蔡成貴以粵兵懦弱黔省兵單恐不能成功自願親往調度業據題報起行在案今於八月初一日據蔡成貴呈稱七月二十三日據遊擊賀成田昌友禀報本月二十日有右江鎮令職等三路進兵業巳禀報二十一日卯時分𣲖職等率兵照依左右山梁攻進守備李友仲督炮攻取賊兵炮臺自辰至未與賊對敵巳攻到八逹寨腳詎知粵西各路兵丁四山觀望不前離寨十餘里放炮虛應故事未臨賊寨即先奔潰以致賊兵四路圍繞將職等困於寨腳垠下致害官兵職等奮勇攻出魯土土兵雖同攻打見賊圍繞各自奔走不行援應所以守備李文仲把總王承文在陳身亡千總袁登貞陳思儀皆帶重傷陳亡兵丁二十六名帶傷兵丁五十四名陳亡土兵十三名帶傷土兵四名另開清單呈閲等情據此查兩遊擊領兵赴粵會𠞰逆㺜本職嚴諭相機行事務出萬全巳非一次後本職有定期題報親赴調遣之舉又經三檄兩遊擊如果勢孤兵單毋得輕進靜候本職到日籌畫再攻及本職起程後行至馬鞭田據兩遊擊禀報奉右江鎮軍令訂期於二十一日卯時兩下會兵四路攻𠞰接閲之頃復以粵西官兵雖訂定日期會𠞰臨時斷難策應又飛檄行知去後不料二十三日行至壩榜地方據該遊擊等禀報殺害官兵不勝駭異此實由粵西領兵官常顯虎左吉等不遵分路會攻原議始則袖手旁觀繼則率兵奔潰以致我軍進退兩難勢孤失事今據前情合先咨呈等情又於八月初四日據右江鎮總兵官假宗嶽呈稱統兵𠞰擒顔賊一到八陽即咨請雲貴附近官兵會合原為賊巢居險肆行猖獗也兹於七月二十一日議以三路進取本職督同左右兩江官兵取賊右平寨田昌友等取賊左平寨遊擊左吉土田州等取弄髙寨俱係中間賊寨山橫箐密非若平荒大野一目相顧者比我兵奮勇進攻俱難近寨恐兵丁進老退之不及頻用大炮施放賊仍不畏詎意田昌友等輕敵進老其師遂致有失本職督令官兵奮攻賊寨賊多潜藏密布鎗弩於箐林我兵一進鎗炮齊舉兵丁傷死者十人帶傷者二十人急遣遊巡兵馳救施放沙炮打死賊六人始得漸次以退猶令於八陽河北遙作復進之狀以待田將兵退今田將等反欲誣飾缷過理合咨呈等情又據該鎮密札禀稱粵兵怯懦土兵二心本職初到實無可如何在安籠官兵業巳奮勇攻上弄髙賊寨燒著排柵而攻炮臺之土兵見賊放鎗即行飛退弄髙賊寨併力推來各路粵兵望風即走若不懇請添撥附近精鋭官兵以為後徑則止賴粵兵即本職之後事亦不知何如等語前來除咨貴州提臣楊天縱就近撥發官兵并行廣羅協廣南營添撥官兵土勇多帶大炮令該副將楊洪統領飛往八逹後路併力會𠞰又照會曲尋鎮撥兵三百名令遊擊顧純祖統領前往土黃泥硐一路斷賊糧道并行安籠鎮俟續撥兵到再行訂期相機進取並查遊擊田昌友等是否粵兵不行應援以致兵敗抑係冒險貪功以致失事俟查覆到日據實題奏外臣查粵省官兵廢弛畏縮由來巳久此鄰省所共知亦本省所不諱今以粵兵數千之衆加以黔省協濟之軍並不能破一土寨三戰三敗粵省如顔光色者尚不下數十寨若羣起效尤粵民何鎮協并切札假宗嶽令伊等先斷賊糧路截其附從絶其聲援次攻毁其炮臺填塞其陷坑將官兵布置嚴密用大炮火箭四面環攻計賊不過數寨衆不滿二千一鼓成擒料可預定俟滇黔官兵到齊是何進取另繕摺奏外所有安籠官兵傷亡情由合先奏聞伏乞聖主睿鑒施行臣謹奏覽廣西兵將既如此伎倆卿當獨任料理之同日又奏為八寨生苖招撫完竣事宜仰祈睿鑒事竊臣委令貴州按察使張廣泗帶領官兵前往古州等處招撫生苖該司以八寨乃生苖門户先應開通各苖聞風嚮化惟楊牌等寨頑梗拒敵官兵該司等率兵擒𠞰首凶逃竄各情形經臣奏報在案兹據張廣泗呈稱八寨生苖倚恃苖寨衆多不遵約束由來巳久今既開通以及附近新歸生苗周圍地界約三百餘里共大小一百九十四寨計四千六百餘户是當議設營汛以為善後防維其次則使認納錢糧俾知任土作貢之義惟是此等苗寨歸附之初不能家喻户曉必須齊集細為開𨗳庶彼等同時觀感知所遵守查都勻地方向有合榔之舉隨先期傳示預備賞需於六月二十九日在通逹寬展之龍場一處舉行合榔齊集各寨苗頭並老少人等公同在事文武各官敬宣皇上如天之仁曉以法紀示以利害指以設營之處並使其認納糧賦雖係蠢爾頑苗聞聼之下俱各歡欣凛戴毫無疑畏當據議定銀米數目割具木刻復詳加詢問逐一奬賞暨將認定錢糧填注告示給領共計所認條銀四百六十七兩二錢零秋米二百二十八石零照依定則於禾米收熟時即行上納其應設營之地屣勘得八寨適中一處在楊牌楊堯等寨之間地勢髙敞平整四顧寬裕兼可俯視諸山以之設營實為控制相宜更資都黎臂指至楊牌楊堯二寨於官兵初到敢行抗頑但經本司查明倡謀糾衆者每寨只二三頭人所為其餘各寨以及本寨之人均係挾制附和續據求撫隨諭務將倡謀之犯獻出軍前餘人方准宥免今該犯等畏罪潜逃屣查尚無踪跡而二寨餘人巳知畏威悔懼哀懇招撫除倡謀之方金阿舍等犯仍令跟拏務獲解究難以原恕外此等餘人既屬無辜咸來歸附皆為赤子不便因罪犯無獲致使流離應准其招撫認糧豫以復業又番仰番扛等寨住居險峻素日貽害苖民今經懲創則應設立防汛或招漢人填實其中毋使再為盤踞但據前來行營悔罪求撫認納錢糧并呈繳鎗炮甲械甚為迫切查該寨等肆惡巳久法難姑貸然其從前過犯實緣向居化外未通聲教所致且巳知所警惕應槩豫准撫庶恩威並濟仍於其地設立子汛以資彈壓以漸收其革面革心之效除善後一切圖維及應設營汛官兵數目作何分轄治理以資教養約束等事宜統俟清理各郡苗疆告竣之日公同各處文武總核情形從長妥擬另行詳請舉行所有八寨等處並生苖歸誠各寨編過户口認定錢糧細數現在造冊移送布政司糧驛道備查外合將開通招撫八寨等處生苖事竣緣由先行申報等情到臣該臣查得八寨生苖既知警惕得豫生全自應漸革悍頑不敢復逞故習以此恩威並用再加善後防維不獨八寨等處可成樂土而凡接壤苖夷聞風觀感自必接踵輸誠查都勻之八寨為生苖之門户凱里之丹江為生苖之關隘鎮逺之九股為生苖之窟藪而黎平之八萬古州為諸苖隔截遂居然外域今八寨地方既經開通招撫即應進次丹江乘機化誨丹江一定則隨至九股𠞰撫並行然後再進古州布置妥備通盤合計定議添設文武安立營汛庶此一舉可以垂示久逺除行張廣泗遵㫖從容辦理俟大局既定即赴巡撫新任并詳細叙札切囑慎重外所有八寨開通招撫完竣事宜合先奏聞再臣前摺荷䝉硃批委趙宏本往黔是當之極張廣泗巳擢用貴州巡撫此奏到又有㫖命沈廷正仍在黔署理俾張廣泗得以從容辦理成此美事似此破格任事之人如此破格擢用如阿克敦常賚因循欺隱之輩亦即棄而不用方可以革除積習不然誤國計民生莫有甚於此二弊者欽此竊念張廣泗以一知府不二年間叨荷殊恩破格擢用巡撫感激奮勉自屬天性中事况聖主之用人行政如日在天中無人不見盡力者以小臣驟至封疆昧心者以大吏立置廢棄百爾臣工即不明是非亦應知利害而因循欺隱之習猶未能盡革者臣殊不解其何心也張廣泗具有肝膽人亦聰明斷不敢自蹈二弊但由本省知府升任本省巡撫文武屬員皆舊係同官或恐避得新忘舊之物議礙難破面過於謙和則亦非苖疆政治所宜臣料化苗之役大約九月內可以完竣俟沈廷正到滇任事後臣即赴黔省會同張廣泗商辦一切善後事宜並諄切規勸俾先破除俗見然後奏明伏乞聖主睿鑒施行臣謹奏覽雍正六年九月初三日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年八月初十日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣新花樣紗五匹蜜荔枝一瓶人參笋二匣抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣伏讀硃批仰窺我聖主用人行政如鑒如衡大小短長各因其器而敬天勤民時厪宵旰萬里之外共見共聞臣每捧誦數四輒熟在天恩之浩蕩何莫非聖心之感通而雲南全省豆麥蕎稻遍處豐收較去年尤盛即劍川口外一帶地方苦寒素難望嵗今據駐劄各員并來往差辨咸稱自中甸直至阿墩子俱有十分收成因天氣和暖並王瓜菉豆亦皆出産等語且昆明大理臨安等各處海田向因雨澤霑足海水即多漲漫率以半收為十成今嵗潮水未上田禾壯實榖穗堅好下垂即各處報稱一年足抵三熟農民歡慶以為從來所未有此固殊知乃二年以來屢荷聖恩賞給世職至頭等阿逹哈哈番加至十二級捫心自揣倍深慚懼兹復於八月二十八日准兵部咨米貼夷變臣請議處一疏奉㫖郭夀域乃一勇敢無術武員祗因輕視賊苖被其詐誘以致受害非鄂爾泰調度之誤今巳將逆賊渠魁擒獲地方悉行撫定功過較之有功無過不必交部察議欽此欽遵等因行知到臣臣承奉之下銘心鏤骨實莫可名言伏念苖猓邊荒獷悍日久反覆靡定若與性成凡新撫之地皆不能保其小無變動惟應留心駕馭冀其漸摩並時刻防範若知其必不能相安反不如速令發露及今懲治免貽後患然而條例所關各不無瞻顧故聰明者斷不肯擔承才幹者亦不免容隱且謂在任不三五年何必作十年計以自取煩擾凡此流輩皆自以為解事知機而殊不知挾私忘公負恩曠職實與貪汚廢弛者等且尤倍甚者矣在臣矢竭血誠原不敢少有顧慮但非仰賴我聖主訓誨諄詳使臣知所自立矜全備至俾臣得以有為則滇黔蜀粵一切苖疆勾當臣亦必不能任一事人或以臣為好事或復以臣為能事皆不知聖主睿鑒臣謹奏覽同日又奏為恭謝聖恩事竊照滇省糧條稅秋耗羡及核定公件節禮等銀臣遵㫖將應給各官養亷并存留各屬辦公之項與司道均勻酌定寬裕留給并聲明臣與撫臣衙門各有養亷銀一萬七千兩儘足敷用緣由具摺覆奏荷䝉硃批甚屬公當但總督所需甚繁而巡撫養亷過多西安巡撫養亷亦只萬金滇撫一萬二千兩足矣其餘五千金添為總督養亷之用可遵㫖行此巡撫養亷必楊名時無恥之議也欽此欽遵臣隨抄摺檄行布政司移行遵照在案伏念臣素守儉朴原無奢費且家口無多養贍甚易計一年上下衣食幕客修金各項共不及六千兩其平常資助辨員犒賞兵丁及些微捐貼亦不過二三千金緣二年以來時有軍務並查拏等事一有調遣須先行酌賞以示鼓勵及事竣回師凡奮勇效力辨兵給賞銀兩馬匹紬縀等件斷不可少且不宜輕而各鎮諸臣凡奉委勤勞臣仍各有幫助故所得養亷儘支儘用略無存留若仰賴天威諸事漸次平定即此一萬七千兩巳屬寬裕仍有餘剩兹奉諭㫖賞給五千兩為總督養亷之用臣巳行知布政司將此五千兩存留司庫如臣需用實繁原有養亷不敷再行支動若無所需用即留司充公以備地方要務臣為兩省表帥斷不敢小意節省亦不敢無端濫費以虛縻聖賜也為此繕摺恭謝聖恩伏乞睿鑒臣謹奏卿酌量為之同日又奏為報明會𠞰西隆叛目情形事竊照粵西八逹寨土目顔光色等肆橫不法該省發兵擒捕屢被殺傷右江鎮總兵官假宗嶽移文安籠鎮廣南營府撥發漢土官兵堵禦會𠞰安籠鎮先去之官兵亦被殺傷據該鎮總兵官蔡成貴呈請添撥官兵臣隨咨會貴州提臣楊天縱就近撥發并行雲南廣羅協廣南營府添撥官兵土勇多帶大炮令該協副將楊洪統領飛往八逹後路堵截相機會𠞰又照會曲尋鎮撥兵令遊擊顧純祖統領前往斷賊糧道飭安籠鎮確查遊擊田昌友等是否貪功冒險以致失事即經奏報在案八月初六日據蔡成貴呈報該鎮帶兵共三百五十名土兵七百五十名率領前進八月初八日准提臣楊天縱咨會巳檄調提標安順長寨等營官兵七百九員名前去據廣南府知府賈秉臣廣南營參將馮鸞聨銜報稱酌調土勇二千名給委土目陸尚安陸尚貴帶領復差千總髙長生帶兵監同督率又據廣南革職土同知儂繩英之子儂振裔情願效力職等復聨銜給委選帶土勇二千名酌遣把總王玉林帶兵監同督率俱往八逹統聼右江鎮調遣又於八月初十十六等日據廣羅協副將楊洪報稱職協前後共調兵五百名除千總黃士玠巳領鎗手二百名前往外今職親身帶領千把楊文舉郭玉貴兵三百名又五嶆土兵三百名炮八位於八月初六日自廣西府起程前往粵境會𠞰途次法白據軍前千總黃士玠禀稱八月初三日儂振裔陸順逹領土兵甫到八陽右江鎮遂於戌時傳令會兵丑時攻打千總帶兵率廣南土兵過河攻至􅋭邊而粵省官兵直至辰刻尚未下山八逹逆黨蜂擁前來千總與兵丁奮勇力敵自午至申傷斃兵丁一十四名重傷者三名傷死土兵二十六名又准右江鎮移開據廣南營把總王玉林到八陽面禀云奉委監同儂振裔帶領土兵前來聼候調遣初四早齊到八逹山後劄營本鎮見得後路要緊賊徒性悍土兵先到營壘未備隨傳令各路漢土官兵分路攻進又令廣羅官兵二百名同陸尚安土兵攻賊西邊炮臺以分其勢俾廣南土兵得以安營下寨詎料賊多譎猾先於深箐中埋伏數百人候土兵劄營之際突出齊攻土兵不備不能抵敵本鎮速令攻打西後山炮臺之兵奮勇衝敵傷死賊二十餘名救出漢土官兵過河復於八陽山後屯劄等情轉報到臣臣聞報之下實不勝憤恨以么麼小醜而屢挫官軍將士何顔邊疆何賴况八逹賊寨只五六百户壯丁不過千人若使粵員預有籌畫先安撫附近各寨絶其黨援奮力速進亦何至猖獗如此敬誦臣摺硃批前田畯奏聞舉行此事朕即恐其料理未必妥協况撫臣又係阿克敦乎此田畯一面舉行一面奏聞一面知會孔育珣之事所以不得其人諸事不可舉也欽此臣看粵西諸臣獨孔育珣可資料理然而駐劄遼逺呼吸難通臣若復避越爼之嫌不身任協辦恐愈緩愈熾反難擒制因不得巳明檄通飭大意謂土兵新到尚未安營即何得黑夜傳令驟督進攻况以進攻為安營之計尤所未聞且此等埋伏皆不能料是智短於賊何以勝賊今貴州漢土官兵令只聼安籠鎮調遣廣羅協漢土官兵令只聼副將楊洪調遣右江鎮如有會合應知會該鎮協遣發務須和𠂻妥商然後進取再粵賊狡獪多設伏陷應先偵探確實四面布置各於通逹賊寨隘口十數里以外斷其糧路一月以後三省約齊各離賊寨三二里以外劄營計我軍大炮可以打寨賊寨鎗弩不能到營只用大炮環打漸次逼近看賊勢不能支再用鳥鎗連環排進仍用大炮打寨用火箭燒房併力齊攻自可一舉成功若毫無定算徒以躁氣乘之在官兵奮勇殺賊雖死有餘榮而屢損軍威徒長賊志將何所底止總之立於不敗之地而後可以戰料有必勝之勢而後可以攻機無可乘不妨緩待勢料可圖務須神速本部院職任鄰封誼同切膚况皆屬王事何敢分彼此倘嗣後仍敢畏縮或復躁妄軍法胥在干係匪輕等語除照行右江鎮安籠鎮廣羅協遵照外并咨會廣西督撫提及雲南撫提去後復隨差臣標把總李顯解送火箭三千枝火毒瓜炮二十二箇軟攩牌一百面前赴軍前分交收用訖至八月二十四日據蔡成貴報稱因聞八逹附近夷寨誓死合黨若不解散率難撲滅本職於起程日即發牌示分頭招撫八月初四日前抵八逹相度賊寨獨踞山中黔粵營壘髙劄山頂官兵稍有舉動賊人皆知預備匿形以少應多所以屢遭挫折俟滇兵齊集扼其後黔兵分布攻其前使賊衆四顧莫及破之實屬不難初六日據差通事帶泥硐助賊頭目抱表等八人到營投順并幫兵效力又花貢各寨率衆開路當賞花紅牛酒給示免死俱各悅服初七日光色光東等到本職營盤山腳大呼饒命本職恐土酋狡詐鎗炮逐去初八日伊等復率衆前來極口稱寃懇求伸雪死亦甘心且有情願歸黔不願歸粵等語又將盜去馬匹遺失器械逐項投繳本職思𠞰之止戮其身撫之兼服其心除其首從徙其餘黨懲勸並施恩威兼濟雖粵民素多頑梗藉此亦可化導倘陽奉隂違以緩我師則剋期會𠞰合寨誅戮可謂殺之無怨俟投到再報等情臣查顔光色等凶惡橫肆為粵害巳久今見滇黔兵勢期在必𠞰遂爾極口稱寃大呼饒命又有願𨽻黔不願𨽻粵之語此固計窮力盡欲尋生路而亦勢不得不出此隨札覆蔡成貴若果顔光色等自縛投見即應受降審問實情具報如不自出僅差夷衆傳禀斷不可輕信務當神速取之以完粵案去後適八月二十九日據廣南府知府賈秉臣參將馮鸞禀稱據軍前把總王玉林等禀報本月二十二日八逹寨知官兵齊到必欲屠寨遂將顔光東殺死顔光色業巳脫逃即夜又安撫附從據實速報外所有會𠞰情形及欲行投降首凶就戮緣由合再奏聞伏乞聖主睿鑒臣謹奏專候捷音廣西一切吏治營伍廢弛不堪朕欲將廣西就近撥入雲貴命卿總督之俟八逹事畢另發諭㫖郭鉷甚好卿與之商量料理可望起色田畯柔善平常人不宜廣西提督之任張耀祖可勝此任否若亦勉强則滇省數總兵內孰可勝任據卿所見奏來朕再斟酌同日又奏為丹江生苖不服化誨添撥官兵𠞰撫事竊照貴州升任按察使張廣泗前往都勻八寨等處招撫生苖悉行歸誠編過户口認定錢糧造冊申報通逹丹江各寨生苖應再設法開撫業經具摺奏聞續於八月十一日又據張廣泗驗報七月二十四日帶領官兵前進及抵枯桐隘口頑苖施放鎗炮敢於堵截隨發兵攻打至二十五日正擬遣差通事人等復為化諭乃頑苖等敢於糾衆分兩路前來迎敵隨分遣官兵追殺退散二十六日頑苖又分四路前來復遣官兵抵禦追殺頑苖仍披靡敗竄共計連次殺死頑苖數十餘人但此內山勢﨑險頑苖等多有在於隘旁箐邊躲伏官兵奮勇直前防備不及致被鎗傷其凱里一路官兵亦於二十四日拔營前進所經之烏稍寨巳就歸撫其餘皆為大寨勢壓觀望不前逮至囊孟隘口有頑苖阻拒當被該都司羅資衮暨平越營守備馬允升等督率辨兵奪隘而入殺退頑苖在囊孟劄營二十五日頑苖分路迎敵復經該都司等帶兵抵禦二十七日該都司等自囊孟進攻烏疊頑苖拒敵官兵人等用命向前殺死頑苖五人帶傷者無數當即奔潰貴陽營步兵受傷身死者計四名隨來烏疊與本司行營會合本司於彼等未到之先遙見旗號即遣撫標守備張瑢率兵前去接應夾攻擊退頑苖本應從此逐寨嚴行懲創但查丹江共計百十餘寨地勢深險丁壯約有數千相離凱里僅三十餘里逼處都勻鎮逺等郡腹裏地方積久相沿從無過問因而窩藏川販肆害苖民且多有鎗炮甲械之類其性凶悍而尤狡猾今敢固結抗敵傷兵兼之屢經殺敗毫無畏懼若再前去勢必日事爭鋒終無以攻其腹心制其首尾是屬無益所當暫緩前進亟請大兵前來相機布置等情到臣臣查凱里之丹江鎮逺之九股一帶生苖凶惡强悍尤甚於羣苖今敢恃險抗拒更肆勾連若不用全力𠞰除既無以畏服投誠各寨而九股生苖亦斷難以就撫除札覆張廣泗囑令相機慎動寧遲毋錯隨咨會撫提二臣𣲖撥官兵去後八月十五日准提臣楊天縱咨巳飛調大定黔西平逺三協兵各一百名新添營兵五十名令千把各一員帶領又𣲖提標兵四百名令千把四員帶領𣲖定廣協兵一百五十名千把一員俱令副將蘇大有統領前往八寨行營聼張廣泗調遣𠞰撫八月十七日准撫臣沈廷正咨巳行本標中軍遊擊髙岱𣲖撥左營守備徐希逹右營把總楊漢飛將本標左右兩營精健兵丁三百名星夜帶領前往丹江等處聼候調遣等因則是前後檄調共合官兵四千三百餘名足供遣用倘丹江惡類預行糾約九股各寨或併勾結楚界生苖臣即當咨會楚省督提飭調附近營汛沿邊控制料此一舉雖復少遲時日似終不難就緒也除俟報到作何𠞰撫情形另行奏報外所有丹江頑苖不服化誨逞凶抗拒添撥官兵前往相機布置情由合再奏聞伏乞聖主睿鑒臣謹奏前因各處奏到巳遣廷臣密往張廣泗行營將朕初意一併備悉諭卿知之矣卿等酌量相機合宜為之朕因貴州之兵用處略多恐不敷調撥巳有㫖將湖南精鋭兵𣲖撥一千名來黔以備卿調遣又令在本省預備一千聼卿調用黔省錢糧無多亦酌撥十五萬送來以備軍需之用矣凡事豫則立寧有備好此二千兵卿可酌量若無用可一面令回一面奏聞若有用即行調用可也八萬古州之事先經石禮哈即欲進取朕因其少年孟浪非任此事之人所以切責訓諭之將前諭發來卿看即知朕當日初念後因張廣泗身歷其境卿復陳奏情形朕何忍將此一處棄於化外所以准招撫化誨之請嗣見𠞰撫兼施即於朕心少為不合近見楊天縱沈廷正奏報張廣泗添兵之文雖巳取八寨而丹江九股其地深險若大費攻取必致多傷人衆朕思八萬古州原係化外亦無甚大罪非如土司惡苖之可比卿前奏九月內可以完結者自據張廣泗之意見而言倘至期不副其言則從前所見少有未及此事發端在伊恐進取為難欲退無策勉强從事未為萬全朕再四思維密書敕諭一道未令人知遣翰林牧可登春山二人密齎張廣泗軍前令伊酌量而行若事出萬全將次完結即令伊等回京倘有難辦之處即將此曉諭宣布朕意撤兵而回卿意以為何如今將諭㫖録來卿看朕原欲令春山等至滇與卿商酌因恐稽遲時日便到卿處自然亦以張廣泗處之情形咨文為憑耳所以一面令二人前赴軍前將朕料理之處諭卿知之特諭同日又奏為奏聞事雍正六年八月初八日據駐防攸樂茶山普威營參將邱名揚禀稱車里之橄㰖壩地方向為巨惡刀正彥占踞因指使窩泥劫殺客商拒捕不法䝉遣官兵擒𠞰逆夷悉巳授首巨惡刀正彥亦經擒解六茶山及各版納夷民俱各安生業忽有刀正彥向日管轄之擺夷暨緬寺和尚於二十一日夜放火將客民草房燒燬延燒刀正彥原住大樓致傷看守兵丁擺夷聚集多人隨飛行宣慰司刀金寶帶領夷目星往確查有無傷斃看守住樓兵丁速報卑職查各路要隘俱經撥兵駐防攸樂一處外控九龍江橄欖壩內扼六大茶山思茅等處前刀正彥唆使窩泥拒敵甫經輸誠歸附此地最為緊要橄欖壩逆夷不法應須預備一面飛調附近官兵土練赴營聼遣一面整頓本營兵馬並分諭各茶山火頭堵禦防範去訖六茶山地方俱各安帖寧靜等情臣因駐劄思茅臨元鎮總兵官孫宏本先報赴省會商安設營汛等事巳經起程恐刀金寶年幼不能約束夷衆隨即照會孫宏本帶兵速由元江一帶前往料理又檄調永順鎮官兵五百名由景東一路前赴普洱會合提臣郝玉麟復調本標官兵五百名亦前赴普洱會合統聼孫宏本調遣又撥順雲營兵前赴江底堵截委元江府知府遲維璽帶元江協兵一百名星赴軍前會同協辦去後八月初十日又據邱名揚禀報七月二十四日清晨據差探兵回報有橄欖壩逆夷數百人昨二十三日巳到慢顙要來攸樂打仗卑職隨撥精兵四路埋伏先占地利令各版納頭人嚴加堵禦本日辰刻果有擺夷數百各戴皮盔身披棉被手執梭標弓弩鎗刀等械聲言要替刀正彥報仇卑職隨令熟識夷語兵丁曉諭宣布皇恩憲德刀正彥作惡巳久今與你們除害為何聚衆不法乃逆夷遂放鎗弩蜂擁前來職即督率辨兵迎敵鎗炮齊施打死賊人數十賊盡敗竄八月二十一日又據邱名揚報稱據千總燕鳴春到營禀報奉令差查刀金寶親向千總泣訴云橄欖壩擺夷被大塔寺緬和尚及刀正彥心腹叭護叭瞻等煽惑逼脅要我同反我從前被刀正彥欺凌謀占䝉各憲調遣官兵生擒逆惡仍令我管理地方豈肯聼從逆等惟有一心報效斷不敢稍懷二意八月十一日逆夷聚集二三百到猛又被燕鳴春打敗帶傷逃去九月初一日又據邱名揚禀稱八月十八日據千總燕鳴春探差回報夷賊叭護叭瞻等又煽惑附近橄欖壩之猛遮猛籠等擺夷同叛口稱要分路前來等語卑職各於要隘處安設伏兵嚴整備辨待敵各等情到臣臣查橄欖壩一帶夷民向為版目刀正彥所轄正彥欲奪占宣慰世職主使凶類肆行劫商害民臣遣官兵擒𠞰復敢堵路拒敵臣令官土兵數千直搗賊巢斬獲賊首然後首惡羽黨相繼就擒羣蠻歸附正彥旋亦被獲解省發審現據供認前情不諱且當鎮沅夷變時正彥接得刀如珍等手書曾調窩泥五百前往助惡因蟒子國恐被貽禍差人喝阻方始撤回現據質審亦伏首無詞是其造意謀叛又不自今日矣正彥占踞地方延袤數千里險峻處甚多臣恐餘孽未盡所以各處留兵駐防而攸樂一山乃正彥號召窩泥起事之處最為緊要令參將邱名揚帶領辨兵駐劄彼處居中彈壓并委員往查各地方户口議設流官營汛不但各版納夷民無不輸服即橄欖壩夷衆亦並無異議向使彼時夷心思變則一二文員其何能為祇因大塔寺之緬和尚向為正彥主謀叭護叭瞻等皆正彥親信惡黨恐一設流官伊等終難漏網遂藉稱流官到來你們决無生路我們也存住不得了緬和尚先率夥衆逃避江外叭護叭瞻等煽惑愚夷代主報仇隨聚衆放火堵路攻營并逼脅宣慰希圖仍霸一方夜郎自大此夷賊故智計固不出此現雖宣慰司刀金寶并各版納六茶山夷衆俱誓不從賊然刀金寶人無能為夷性犬羊難保其必無反復是以臣與提臣郝玉麟面商籌畫遣撥各路官兵前往會合相機𠞰撫今漢土官兵添撥齊到料此小醜不日可以撲滅俟續報到日另行奏報外所有據報逆夷黨惡不法緣由合先奏聞伏乞聖主睿鑒臣謹奏知道了新定地方此等事固所不免但於初定之際有司料不敢營私營伍亦自有凖備而伊等尚敢睯不畏死如此妄為則將來善後事宜更當詳慎者矣雲貴新定之處甚多設兵彈壓之舉最要不可省費將應添設之兵數遷就辦理倘有此等小事必本處兵辨足資任用方好若用調撥協助恐此輩姦匪或有同舉報復之事亦不可不預防者若少涉周章所關甚巨必待鎮靜數年朕方釋念至於古州八萬之舉張廣泗既見不透則此事少急驟矣再有如此等應整理者當緩一步徐為之雲貴兵辨甚覺勞苦朕心實為不忍亦即有㫖加恩伊等著候㫖行再廣西儘有似此應整理者朕命卿總督時一概姑緩之必待廣西兵辨營伍件件整理事出萬全時方可動作恐卿不知朕意謂令卿作速料理也特諭知之雍正六年十月二十日雲貴總督臣鄂爾泰謹奏為恭報滇黔二省秋收分數仰祈睿鑒事竊照各屬收成豐歉理應奏報臣檄行雲貴布政司確查詳報去後今據雲南布政使張允隨詳稱雍正六年自夏徂秋各屬雨水調勻兩迤髙低田畝俱甚暢茂行據雲南曲靖臨安澄江廣南廣西元江開化大理永昌鶴慶楚雄順寧䝉化麗江永北武定姚安景東東川鎮沅烏䝉等府咸稱所屬地方秋成分數俱有九分十分又據貴州布政使鄂彌逹詳稱今嵗自春入夏雨暘時若髙下田地均得及時播種目下早稻巳經收穫晚榖現俱秀實通省收成惟麻哈黔西二州安化一縣據報止有六分又廣順開州普安永豐平越施秉石阡清溪銅仁平逺永寧畢節等府州縣據報止有七分其餘各府州縣俱報十分八九分收成各等情前來臣查貴州今嵗春熟甚盛五月以前雨水霑足插蒔應時六月內頗覺乾旱禾苖漸枯後連得大雨以蒸曬之餘得沾潤澤水田轉加倍發茂收成俱有十分獨髙阜田及新種地畝收成分數稍減然亦不致歉薄雲南今嵗實屬豐年據昆明等州縣呈送瑞禾瑞榖自一莖二穗以至七八穗不等且於夏秋之交省城荷池忽産並頭蓮二枝紅白各一又産二色蓮一枝紅白各半臣同司道等往觀農民歡笑皆謂可預卜大有是瑞應嘉兆亦未有如本年之盛者此皆仰賴我再雲南自入秋以後省城傳染時氣不數日即過聖主睿鑒臣謹奏覽同日又奏為招撫生苖事竊照貴州升任按察使張廣泗招撫都勻八寨地方生苖悉行歸誠丹江各寨頑苖不服化誨逞凶抗拒添撥官兵前往𠞰撫經臣於九月初三日具摺奏聞九月十三日據張廣泗呈稱撫提兩標以及各協營𣲖來官兵於八月二十日以後陸續到齊擬將八寨內背恩反復之楊牌等寨先行懲創然後直進丹江嚴加布置查此一假生苖地界雖屬寬廣而要隘總滙之區在黎平者則為古州在鎮逺者則為九股清水江在都勻者則為八寨在凱里者則為丹江又自八寨深入則為千家寨其餘零星寨分雖地名尚多户口繁衆其中亦有頑梗者然皆觀望此數處以為向背非能自為主張也今古州早巳願聼約束現在寧帖其九股據鎮逺協遵奉化誨者巳十之八九其尚未就撫者因切近丹江故爾觀望至清水江一帶亦多領受告示情願內附而八寨經本司恩威並用亦俱就撫即今背恩反復者細查只有楊牌楊堯楊烏乜告交歸羊甲番仰番扛等寨其餘各寨照舊斂戢輸服惟丹江一處敢於抗違者總因寨分稠密壯丁有三四千人加以勾結附近脅制羣苖通計不下六七千人而且鎗械極多狡悍異常我漢土官兵雖以少擊衆殺其多人屢經潰敗而仍然散而復聚者實恃其衆也是以移營至衙門寨復移至甕城切近八寨之地以便彈壓兩處并慰撫未反復各寨以待添兵今所請之兵巳到惟一切攻戰之具尚須整備剋日即先進八寨後進丹江大震威聲使頑苖知所警懼合先報明等情臣查生苖之役原欲示撫故不須多兵今丹江既敢抗拒則非重兵不足以濟事若不先制其强者即弱者亦難以歸附隨以羣夷負險狡悍莫測天時可乘地利宜審近功速效終無逺計須待大兵齊集慎重圖之凡事先易者後轉難先難者後必易務籌一勞永逸俾無煩再舉則此一大部署庶可以昭示來兹等語密札張廣泗去後又隨札致提臣楊天縱除前調官兵外再將粵西撤回之安籠等標官兵酌量調赴遣用并將臣所造火箭三千枝及攩牌火毒炮等件差辨解赴行營備用旋據各報前調官兵巳陸續到齊又准提臣楊天縱咨會巳飛調安籠兵三百名安南普安盤江三營兵共二百名委遊擊田昌友帶領又調平逺黔西大定三協兵各一百名長寨營兵二百名提標兵二百名令貴陽營遊擊史應貴同提標守備任龍合營管領前往又製造靖蠻大炮二位並火藥鉛彈等項現在差員齎解等因是前後所調官兵合計巳六千三百餘名前進攻取並酌留駐劄似皆可以敷用矣十月初八日據張廣泗呈報巳於九月二十六日移營前進十月十六日隨據定廣協副將蘇大有呈稱䝉張撫院與卑職酌議用伏兵以待苖賊十月初四夜卑職令千把帶兵離營盤六七里之地四處埋伏初五日辰時果有苖賊千餘各執火鎗直衝營盤伏兵四起與苖對敵卑職親統官兵分路追殺令千把髙選等帶兵由左路追至擺楷等寨鎗炮打死苖賊數十名隨將擺楷也略壤頂埧搆俱各燒燬卑職帶候補守備𫝊又新等由右路追殺至乜告關口鎗炮打死苖賊不計其數各營官兵俱奮勇力敵殺賊首級數顆直抵乜告寨張撫院發兵三百名亦至山梁登髙應援趙參將等帶兵俱至乜告有寨內苖賊逞凶拒敵受傷漢土兵四名卑職親率千把奮力當先衝開寨門直殺入內鎗傷苖賊數十并取首級衆兵將乜告等三寨亦俱燒燬衆苖各皆逃竄現在招撫等情而張廣泗尚未報到再先據鎮逺協副將張禹謨呈報帶兵於舊施秉縣之柏枝坪駐劄遣土舍招撫九股及小江各寨生苖將巳撫各寨苖頭傳齊於八月十六日赴行營奬賞欵諭共苖頭七十二名會同鎮逺府知府方顯於十七日設立欵場令土舍苖頭人等先自行公舉苖頭內有衆苖素服公直能事者以為榔頭分為三榔管理其應納糧賦俟張臬司到日定議各苖頭俱聼從喜悅出具遵依木刻共招出羊翁世蓋等四十一寨計一千七百七十七户共男婦七千六百七十一名口合將各寨煙户總數開摺呈報等情據鎮逺府知府方顯呈報分遣各土官土舍以及效用人等分道前往招撫隨撫得清水江一帶生苖共一十六寨計一千五百九十户男婦五千七百六十七名口業經編立保甲理合造冊呈報至認納錢糧容俟取具認狀另册齎呈又招撫得九股之台拱生苖數寨共計二百一十户男婦七百八十六名口現據效力人役李有成等禀稱情願歸誠造具户口清册呈送到府但行劫施秉縣琵琶寨石狗洞二寨凶苖藏匿台拱現在責令獻出二案夥盜准其歸誠俟稍遲續行呈報又據卭水司副土官袁三竒禀稱招撫得清水江之者磨等寨生苖七百餘户又土推官楊再瀚禀稱招撫得九股之交汪等寨生苖六百二十戶俱現在編造煙户二共招撫生苖一千三百二十户俟造册到日另報等情各到臣竊照黔省下游一帶邊界生苖盤踞劫殺橫行阻塞道路為害巳久如黎平鎮逺平越都勻等府生苖環處俱在百里內外至凱里地方則二十里十餘里以外即係生苖錯雜而居並無防隘且凱里去清平驛道僅四十里逼近衝途關係尤巨故自臣受事早經留意詳籌博訪而後舉行是即用全力需歲月必當開通安置而不可更貽後患者也况古州八萬前經招撫至今寧帖九股地方及清水江各苖現來歸附者巳四千八百九十餘户計不下二萬口即八寨一帶前投誠受撫者業有三千餘户雖楊牌等數寨復入夥丹江而反復者亦不及十分之一今敢於抗拒者止丹江一處現在分路進𠞰烏合之衆究何能久持據臣愚料黔省六千官軍似可能勉竣此舉也前九月二十八日齎到臣摺荷䝉硃批朕見張廣泗初進苖地其敬奉之景似只用撫而不須威力者今既用兵威撫取則善後事宜更當謹慎為之凡新定地方利之一字萬不可與較錢糧二字萬不可惜勿因小而誤大切諭切諭欽此十月十五日又據提塘鈔禀奉上諭黔省現有𠞰撫古州八萬之事又協𠞰粵西不法㺜苖黔省所有額設兵丁或不敷用著將湖南就近營兵酌撥一千名前往貴州聼鄂爾泰楊天縱節制調遣此所撥兵丁著黃州副將李繩武帶領管轄再將荆州滿洲駐防兵預撥一千名令副都統觀音保帶領在京𣲖出大臣一員同往俟朕再降諭㫖到日起身前往常德府駐劄以資彈壓著議政大臣大學士會同議奏欽此又議政大臣等奏前事奉㫖依議湖南所𣲖官辨兵丁俱著揀選賢能精壯者發往并多給口糧令其速行起身再著該提督巡撫預𣲖兵丁一千名聼候調遣欽此臣伏讀聖諭敬謹詳繹仰見皇上慎重邊疆矜恤苖夷之至意今粵西不法㺜苖業經𠞰滅丹江現在進𠞰各處多巳投誠又得楚兵一千名以壯聲勢更易於竣事應俟咨會到日將湖南官兵令暫駐黔界以資彈壓若前進黎平鎮逺時或復有頑梗生苖不遵化誨臣即當就近調遣協同擒治其預𣲖候調之一千名楚兵似可無庸再遣至於凡新定地方利之一字萬不可與較錢糧二字萬不可惜勿因小而誤大煌煌寶訓臣當時刻凛體無如兩省文武半識見不廣能於利上辨公私於錢糧酌盈絀者則巳屬賢才而不知大體不謀逺計才有一事而先自驚慌才了一事而每多矜肆能事之人即或為誤事之人雖復諄切剖示似亦當下明了不能臨時變通如祖秉圭者并不如祖秉圭者殊復不少臣惟有竭盡血心自勉之共勉之誓勿負殊恩巳耳除俟報到作何𠞰撫情形再行具奏外所有進取丹江𠞰平乜告擺楷等寨并九股等處生苖先巳投誠緣由合先奏聞伏乞聖主睿鑒訓示施行謹奏張廣泗楊天縱皆備悉奏聞矣同日又奏為奏聞事竊照橄欖壩緬和尚與頭人叭護叭瞻等向為惡目刀正彥之心腹因見正彥被獲地方歸流藉稱代主報讐煽惑愚夷放火打仗冀圖仍霸一方臣據參將邱名揚禀報隨即調遣官兵立飭臨元鎮總兵官孫宏本前往相機𠞰撫去訖業於九月初三日奏明在案九月二十五日據孫宏本邱名揚并元江府知府遲維璽等各禀報內稱逆夷等自前經擊散之後復於九月初九初十等日聚集一千餘人突擁至叭泥意在阻拒水口糧運屯劄山梁倚恃鎗炮攩牌欲來攻擊在營備辨等隨率兵奮勇殺退傷死賊人甚多我兵亦陳亡三人餘賊仍屯聚江上阻斷隘口因各路官兵尚未到齊不便輕進惟令各營嚴謹防備等情臣隨飛檄各處將辨領兵速進并備軍器藥餌差送軍前及催䟎糧運速往接濟札諭行營文武但嚴督守禦俟大兵齊集然後進攻又預備督撫兩標兵五百名提標兵六百名開化永北二鎮各兵四百名劍川協兵一百名聼候調遣十月初一等日又據軍前各員報稱江上逆夷猶復聚結不散且脅逼鄰寨挾制土司每晚遙放鎗炮以作聲勢甚屬猖獗而參將邱名揚現患時疾行營兵辨染病者甚多請添撥官兵以便進取等情臣查逆夷反復原止橄欖壩一隅其六茶山等處並未變動今據報續𣲖官兵巳於九月二十四以後陸續齊到以四千之衆分路進𠞰本不難立破但𬗟和尚叭護叭瞻等遍行鼓惑到處逼脅兼挾制宣慰司刀金寶以威嚇夷衆雖各處堅稱誓不從賊然夷性犬羊未可深信且地界緊連外域關係甚巨臨元鎮總兵官孫宏本雖知努力然不識機宜短於駕馭伊駐劄該地方年餘並不能察夷情動靜及報橄欖壩嘯聚經臣面詰猶力言無事可但放心臣巳破面嚴飭時提臣郝玉麟在省亦親聞知參將邱名揚以少應多使賊不敢犯有勇有謀實可資指臂前聞伊染病臣徹夜不能寐屢差辨役致送銀兩參藥等物親往看視今雖病巳小愈稍能行走尚未堪驅馳臣再四籌思若不剋期𠞰滅恐致滋蔓而得人實難未敢輕任提臣郝玉麟今春前往查勘地方曾遍歷各版納熟悉情形非提臣再行親往相機𠞰撫並查起事之由加意安置恐孫宏本不足恃難以妥辦臣前經面商巳有成議是以將前備之兵一面調發限日到普洱等候一面札致提臣率本標兵六百名急速起程於普洱會合統領前進分遣調度訖諒橄欖壩逆夷始初造意原欲勾結各夷羣起作亂今各處既未附和獨江壩一處究何能為料提臣到日自能完事似可無煩聖慮也合先繕摺奏聞伏乞聖主睿鑒臣謹奏著郝玉麟前往甚是一到自然成功者專候捷音邱名揚想今大愈矣同日又奏為奏聞事竊照川省雷波土司楊明義私遣部落幫助米貼逆夷劫奪糧運傷害兵丁並誘結覺阿路阿照平底等處苖蠻聚衆妄行欽奉諭㫖發兵擒𠞰臣隨調撥滇黔漢土官兵三千名令參將哈元生統領星馳前往料理并照會鶴麗鎮總兵官張耀祖帶該鎮標兵五百名馳赴軍前統領滇黔官兵分路堵截擒拏業經奏明在案七月二十一日准四川提臣黃廷桂咨稱雷波等蠻勾通跳梁不法欽遵上諭遣兵進𠞰但自雷波以至結覺及阿照阿路一帶地廣山深必須分路堵𠞰今𣲖官兵俱走谷堆會合𣲖滇黔官兵八百員名渡江抵以密哥駐劄二千餘名渡江由魁虐取路至阿驢交界阿路嗎地方駐劄以便堵截會𠞰等因臣隨飛行參將哈元生就近酌𣲖官兵八百員名前赴以密哥斷野低密落賊苖逃遁之路并令哈元生帶漢土官兵二千餘員名星赴阿驢交界駐劄聼候分遣嗣准提臣黃廷桂陸續咨會遣發官兵攻破平底夷寨二處至地歪屣探賊巢沿山左右皆阿路惡夷分兵進𠞰并𠞰洗阿路覺覺亨罵數處隨破遇紅寨至巴普猓賊奔敗過河官兵後追連破步三黑亨革勺勒姑四處又直搗阿照哈都嚕狡夷巳經逃避由黑姑嚕逹羅一路跟追楊明義巳逃往哈都嚕地方到簸箕􅋭攻克九洞𠞰殺賊苖無遺又至北山箐溝并悟覺直至波哈地方殺賊甚多又攻克野低密落等因據武定營守備王廷標申報九月初一日奉令帶辨兵攻打阿基初􅋭擒𠞰噶哈督令辨兵齊進賊人逃散捉獲男婦等情十月初四日又准提臣黃廷桂咨會滇黔官兵逺來糧運不易而川省兵糧又跋􅍱維艱倘不能接濟滇黔豈不反纍軍營况渠魁卑租巳獲楊明義潛藏深箐偷延旦夕仰仗天威指日即可就擒其特口寨阿驢交界駐劄滇黔官兵無容留駐均應撤回除行哈參將外相應備移等因正在轉行間初六日又准黃廷桂咨稱差員由拉密一路搜捕楊明義復逃山箐發兵圍困於九月十六日在過橋轉上深箐內拏獲楊明義羈禁行營十月初七日據參將哈元生呈稱奉四川黃提督牌開阿驢交界阿路嗎地方川省巳𣲖官兵堵截况渠魁巳獲滇黔官兵無庸留駐仰職將原領官兵俱行撤回卑職遵於九月二十日先令遊擊張世傑帶兵起身卑職率遊擊卜萬年自校頭口起營至阿驢猓古地方劄營二十二日卯時起營行有四五里忽見四山蠻子約數千披甲掛弩懸刀環繞數十餘層竟來抵敵將卑職同卜萬年圍困垓心隨喚阿驢訊問蠻子為何叛逆回稱並不知道卑職帶兵二百名架大炮衝開殺散賊蠻數十餘層搶上赤布岩卜萬年隨後帶兵奮勇登岩會合查點官兵有督標千總蘇世爵職標委署千總劉雄把總張應舉馬玉四員陳亡四山賊蠻仍然環繞卑職令阿驢呌喊賊蠻答說是沙罵家人卑職看來明係阿驢部落阿驢難辭其責二十三日卑職帶把總胡亮兵丁二百名用對子鎗分打殺死賊蠻無數正在對敵有臺兵王應宗禀稱二十二日賊蠻將烏䝉府運到糧二十石盡行搶去今日來圍住小的們幸遇兵到始行奔散本日有卑職差調遊擊張世傑到赤衣臺會合賊蠻仍然不退二十四日卑職等各帶精兵令遊擊卜萬年張世傑領兵埋伏左右箐內卑職督兵中路三下夾攻賊蠻大敗奔逃因值大霧不便追趕查赤衣臺係阿驢適中之地運糧要路卑職呈請鶴麗張總鎮帶兵過江駐劄調度以便進𠞰逆賊其陳亡兵丁查明另報至帶土兵五百名染病多半所存無幾不敷遣用巳呈請張總鎮檄行威寧營府飛調阿底等五目土兵五百名漢兵除調本營鎗手五十名威寧營兵二百名畢赤營兵五十名共漢土兵八百名星夜前赴以資遣用再阿驢界連阿路嗎阿都沙罵一帶現有川兵臨近駐劄請咨四川提督飭令將辨就近堵𠞰等情臣隨飛行鶴麗鎮總兵張耀祖就近調撥官兵星往應援并令該鎮親自過江調度并咨川提臣黃廷桂發兵堵擒因在臣標之祿鼎坤熟悉彼地情形情願前去效力臣又行東䝉鎮總兵劉起元烏䝉府知府陸世宣在魯甸等處調撥土兵一千一百名令祿鼎坤管領前赴軍前協助擒𠞰去訖該臣查得川省土司楊明義等向有涼山賊衆聼其指揮因而勾結阿路等處苖蠻恣行不法今奉㫖會兵擒𠞰川提臣黃廷桂親統大兵先攻克阿路等處又𠞰滅雷波部落首惡楊明義等旋亦就縛似此調度迅速紀律嚴明各路官兵加倍奮勇計不日可以竣事惟是阿驢阿路嗎一帶蠻夷忽又作變聚衆截路殺傷官兵斷難寬縱現移會兵撲滅覆另行具奏外所有咨會𠞰擒楊明義等情形及阿驢等處賊蠻擅行傷害官兵緣由理合一併奏聞伏乞聖主睿鑒臣謹奏黃廷桂數次奏聞矣此番黃廷桂諸凡調撥進取機宜甚屬可嘉朕深為奬悅慶用得人也硃批諭㫖卷一百二十五之八欽定四庫全書硃批諭㫖卷一百二十五之九硃批鄂爾泰奏摺雍正六年十月二十日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年九月二十八日臣齎摺家奴䝉恩賞給驛馬齎回御賜臣玻璃瓶四件番八緞二聨重陽糕一匣松仁糕佛手糕青果糕梅蘇糕各一匣乳皮酥乳餅共一匣白石榴一簍抵滇臣隨郊迎至署恭設香案望恩賞給驛馬齎摺回滇臣恭迎入署敬啓摺扣伏讀先後硃批奬勵矜憐如聞天語裁成指授如對天顏臣身居萬里心戀九重敬念萬壽令節不獲與在廷諸臣同侍左右兵效趨蹌復以苗疆未靖料理需時又不敢具奏陳情恭請陛見瞻依之私日久倍切懇祈聖慈垂鑒臣於事竣之日馳驛赴京俾得以跪覲慈顏親聆亦不至遲誤為此繕摺恭謝聖恩伏乞聖主睿鑒俞允施行臣謹奏覽同日又奏為欽奉聖諭事竊照粵西西隆州八達寨凶夷顏光色等肆橫抗拒屢傷官兵及至大軍齊集計窮勢迫賊黨將首惡顔光色光東殺獻請降經臣節次摺奏因賊黨恃險負固仍行支延不即投誠臣行令該鎮協等作速會兵進𠞰據報於八月二十八九兩日破􅋭燒寨殺死賊衆無算倒戈投降及奔竄擒獲之把事抱金等計共男婦一百八十餘名口逆賊巳靖賊巢盡燬顏賊家屬應聽粵西文武協同緝捕滇黔官兵俱於九月初四日撤回等情臣巳繕疏題報在案續於九月二十八日齎到臣前報明粵西土目摺內荷䝉硃批提督田畯又親往矣但廣西兵將業已氣餒田畯亦係中材料此事伊等未必能成功卿當身任料理有何分疆界之嫌疑也賊衆經此一番必然氣盛諸凡不可輕視所調進取將辨務令慎重從事可也欽此及十月十五日齎到臣摺內又䝉硃批廣西兵將既如此伎倆卿當獨任料理之一切機宜遵㫖通飭行欽此又據提塘鈔稟知已經奉㫖廣西八達寨㺜苖素行不法經田畯奏請撥兵𠞰撫而籌畫辦理未能周詳派兵數少所遣之員又非練達以致賊㺜聞信預先準備近聞官兵屢攻不克輕率先進致傷官兵朕心深為軫惻向來廣西營伍廢弛兵丁懦劣而提督田畯才猷中平總督孔育珣相隔路逺難以辦理著將廣西提督以下辨兵悉聽鄂爾泰節制調度其從前進𠞰㺜苗被傷之辨兵著該督撫優加賞恤將來事竣之日仍照例加恩欽此臣查顏光色等本係小醜縱夜郎自大實擒治不難獨以巢穴堅牢器械鋭利粵省辨兵先有畏避之意以故臨陳不勇益致猖狂今雖仰仗天威不旬日皆已屠滅然逆賊家屬早經逃匿凶惡黨羽多未擒獲為粵省計正應趁此聲勢搜除惡類將附和餘衆加意安插庶可懲一警百而力半功倍乃提臣田畯計不出此於九月初四日抵八達隨於十一日回栁僅留遊擊一員駐劄彈壓似此料理殊屬疏漏臣查訪顏賊之妻子家口現在粵屬之底母八白寨其附和黨羽聞約聚數百人現在粵屬之馬白寨臣接准部文後即當通飭將辨並剴切示諭有自來投誠者免死安插其抗拒擒獲者立行正法再咨商粵西撫臣令該管州縣將附近八達各寨遍行撫慰嚴禁胥役毋得藉端恐嚇務示之以信然後夷心可安粵㺜强悍非諸苗比並非僅兵威可以伏制也再賊黨抱金等總兵蔡成貴原不應帶回安籠因其畏法先殺賊獻首旋即投誠而呈詞內又有粵員激變不願歸粵之語若解交粵省反恐滋事故暫准帶回現在發審俟審詳到日或就黔地安插或另遷徙别省臣當酌議會同粵撫臣請㫖遵行至於安籠遊擊田昌友等雖深抵賊寨折損辨兵但既奉軍令何敢退却而兩路粵兵不能前進亦豈能預料田昌友等似應無罪而粵員按兵不動之語實屬卸過之詞右江鎮總兵官段宗嶽急欲滅賊不量兵力調度失宜則誠有之若謂其柔懦觀望尚不至此即粵屬遊擊常顯虎領兵初到八達被賊子詐誘暗築炮臺堅固巢穴以致屢攻首已戮賊寨已平似可仰邀聖恩均豫寬免以勵後效除俟准到部文欽遵料理外所有此案情節理合僃細陳明伏乞聖主睿鑒施行臣謹奏今命卿兼督粵西一槩酌量合宜料理奏聞可也同日又奏為覆奏事雍正六年九月二十八日齎回臣前摺內奉硃諭此係祖秉圭之奏朕前批諭昨伊到京繳進隨便發來卿看欽此臣細看祖秉圭奏摺敬誦硃批此事汝識見卑小矣豺狼驅入內地而不能化任其野性永為地方之患爾身為大臣職掌封疆忍心坐視乎若言不完糧為失體便今直省百姓能人人遵法完納乎失體豈在此此皆從前督撫任任推諉代代因循之所致天工人其代之若遇實力為國家利害置於度外之人自能料理欽此伏查貴州苗夷素多不法擾害居民難以枚舉祖秉圭固已深知據稱貴陽等四府之苗最為悍野自長寨等處盡法懲創之後皆喪膽畏服又稱都勻府數處尚有負固不法欲撥兵懲創又稱有事則必加懲治不事姑息是祖秉圭亦知懲創者現俱畏服負固者終須懲創矣乃以早經就撫之八萬古州而謂不必取現在橫肆之都勻等苗而又不即治然則禦苗之道豈僅大張曉諭而遂可以畢事乎至稱一加懲創則皆可安靜無事但嗣後偷竊小事不敢保其全無等語此則浮游之論瞻顧之情竊照苗疆險逺夷性貪頑無論懲創之後偷竊小事斷不能全無即安靜之後燒劫大事亦料所時有縱日後反復為患與目前橫肆為患者孰逺孰近孰多孰寡若或慮及將來因而遲疑現在將利害之念重則民社之計輕若大若小必無有肯擔任一事者臣本係凡材非不知事關重大力不能勝自蒞任至今請𠞰請撫若有急不可待者實以身受殊知萬難報稱良心不昧血氣未衰務期及臣之身為苗疆荒服稍定規模俾後來勝臣者易於布置即不及臣者亦難以推諉故如長寨如泗城如烏䝉鎮雄如鎮沅威逺茶山車里等件雖多人勸阻諸務艱危而立意不回誓欲掃蕩者萬里臣心殊未敢稍懈夙夜也且祖秉圭亦知以人道責豺狼難以奏效矣殊不思以人道責豺狼固不可以化誨若以豺狼待豺狼未嘗不可以羈縻今豺狼入內地且復傷人而曰不可殺並不必制是厚豺狼而薄人人將何賴在祖秉圭所難者原不在八萬古州知臣此舉必先由丹江丹江逼近腹地凶惡强悍即現今抗拒官兵伊所稱都勻黃平一帶負固苗也恐不能勾當或致貽纍故先事密陳而黔省傳言謂丹江生苗原欲就撫因祖秉圭先不肯招撫言之甚力後於教場操兵時又揚言於衆謂生苗必應𠞰滅斷不留遺種以故丹江聞風牢作凖備即提臣楊天縱手札亦有祖撫軍何不說撫必定說𠞰此人心不可測等語然此事實出情理之外臣不敢全信其有也再化出生苗一件臣前赴黔與楊天縱面商密委劉成謨何經文等行事祖秉圭任藩司時即不以為然續見化出數百寨欲入銜詳報楊天縱謂此係總督專委之事藩司並未與力如何假得從此益不悅後署撫事又有化出生苗楊天縱照例欲令赴省叩見伊先阻止且向司道說那裏閒錢賞他楊天縱深為之不平後臣聞知隨寄札勸解茲看摺內專指提臣撫臣而並不及臣者以此案叨䝉聖恩奬勵逾分伊隱約其詞意謂臣無功冒賞也至於銀兩米石錢糧兵餉多少費省等語實因識見卑小故議論鄙陋多自相矛盾敬讀聖諭諄切周詳莫不洞燭臣諷誦數四且感且奮不禁涕淚之沾襟也伏念易為之事定有先臣而為者何待於臣若明知事屬難為而在所當為臣更或敢推諉或敢因循捫心自問何殊悖負懇請聖鑒但責臣成效寬以時日臣務當竭盡血誠以完竣斯舉也除𠞰撫丹江緣由另摺陳明外合行覆奏臣謹奏覽奏知道了同日又奏為設法彌補無著之虧空以清積案以實庫帑事竊惟倉庫錢糧最關緊要臣自到任後將所屬虧空各案嚴飭承追督催各官竭力催追雖亦少有還補終難如數全完若不設法補苴終致國帑虛懸但其中有有著者有無著者自當分别追補以期濟公臣查雲南通省新舊虧空共十五案內除署永昌府事參革同知梁衍祚臨安府參革知府王僴雲南府參革知府韓鍾廣通縣參革知縣劉淑元謀縣參革知縣徐鳴鸞署武定府事開化府參革知府佟世祐元江府參革知府張嘉穎以上七案或有家産可以變補或有借缺可以追償臣已分别勒限嚴追其有應行咨追者亦經分咨旗籍照數完追又順寧府參革知府范溥名下虧空銀錢銅鉛等項已經題請著落前任督臣髙其倬署撫臣楊名時原任按察使江芑各名下分賠其餘現在查追不致無著外尚有鎮南州參革監故知州陸應幾南安州參革知州王志正新平縣參革監故知縣蹇王臣宜良縣參革知縣申稼呈貢縣參革監故知縣饒啓心昆陽州參革監故知州何大寵馬龍州參革監故知州許日藻以上七案虧空共計未完條丁鹽課等銀九千二百五兩二錢零未完米一萬六千六百一十六石零折算該價銀一萬一千六百三十一兩零未完穀一萬六千五百一十五石零折算該價銀五千七百八十兩四錢零通共該銀二萬六千六百一十七兩五錢零屢次移咨各原籍查追據稱並無産業可變任所本身家屬又已衣食不充雖監禁嚴比毫無設措不過徒稽嵗月䆒於錢糧無補臣籌之再四必須早為設法彌補庶不致倉庫有虧查滇省欺隱田土內如從前漏報勳莊叛産等項不自行首報别案發覺審出應令納價准為己業又滇省各官䝉皇上洪恩賞給養亷已優裕足用如有現任官委署他任者其署任內養亷不應全給現議扣留一半以上二項俱有騰那即以此二項代補逺年無著虧空陸續完報約計兩年便可全數通完如是則積案清楚帑項亦不致虛懸矣緣係設法填扺虧空未敢具本題請理合繕摺陳明伏乞聖主批示遵行臣謹奏有㫖諭部盡著寬免矣如此卿可少省心力同日又奏為查出官莊實餘租息歸公裕賦事竊照滇省文武衙門大半向有官莊收租取息匿不報聞臣通行各員據實開報先據糧儲道元江等府安寧等州縣報到官莊田地并查出臣標五營向有開墾老丁田地及丈出新淤自報田地又東川府查出已故祿氏養贍並文武官莊經臣摺奏聲明武定等十府州縣俱有官莊另報在案除東川府之養贍官莊業同該府丈出田地彚疏題報外今據武定姚安馬龍羅平姚州鎮南定逺定邊等八府州縣并永昌道臨安府嵩明石屏二州祿豐楚雄廣通等縣陸續報有官莊田地并查出撫標左右兩營亦有新墾官莊連前所報田地合算計共十一萬四千六百二十九畝零該年收京斗米穀麥蕎豆二萬四千二百一十五石七斗零銀二千四百六十七兩七分零除完納條丁秋糧公費并留給義學束修老丁孤寡口糧外實餘京斗米穀麥蕎豆一萬二千九百二十九石四斗零銀一千九百六十八兩六錢零俱應歸公現飭藩司分析造具清册詳題彚入奏銷册內報銷內臣標陸凉州馬場臣於雍正四年到任後清查本年分已收獲租息銀一千兩至雍正五年分徹底查清年該豆麥變價銀一千六百四十八兩零除完魚課條糧外實餘銀一千四百三十兩業經全數歸公今六年以後應俱照五年收交其各屬官莊租息俱於雍正六年為始入册歸公至此外或仍有零星未報及已報而未及造册者現催清查造册另報再雍正五年十月內臣查報官莊摺內荷䝉硃批向聞滇省鎮臣甚苦毫無出息此等營中官莊地畝應賜與營標為養亷者卿當斟酌之欽此臣查滇省提鎮諸臣元年以前原俱豐裕皆因多食空糧收受規禮之故自元年以後漸次減少臣到任之初密查各鎮親丁糧猶有加倍公費糧猶有一百二三十分不等經臣嚴檄通飭并懇切開導二年以來始無此陋弊計提臣一年所入不及四千兩各鎮一年所入不過二千餘兩此外原别無出息而貴州安籠鎮臣蔡成貴向來即無染指清窘尤甚是以臣於各鎮諸臣凡有調遣及各有事故自二三百兩以致千兩皆酌行資助在此等官莊地畝屬營中者合計不及數百石穀米即全數留給亦無關錢糧但上有私匿下必多影射於清查隱占一事不無干礙故不若全數歸公使民間不得藉口仰荷聖慈垂念邊鎮之苦據臣愚見或於報明公件餘剩歸公銀一萬三千兩內每年各賜與數百兩添作養亷則感切之餘自必愈知奮惕是否可行臣未敢擅便合併陳明伏乞聖主睿鑒臣謹奏另有㫖諭內閣頒發同日又奏為奏明借動庫項收鉛運售獲息情由仰祈睿鑒事竊照滇省自雍正元年起設爐四十七座鼓鑄制錢需用倭鉛因本地所産無幾購買艱難故於黔省之丁頭山馬鬃嶺齊家灣等處開採鉛厰委䝉化府同知前任晉寧州知州朱源淳前往採買運滇供鑄其厰鉛每百斤黔省例抽課二十斤滇省買價每課鉛百斤丁頭山議定銀一兩六錢齊家灣議定銀一兩五錢馬鬃嶺議定銀一兩四錢照數解黔奏報由來已久逮雍正五年分經臣題請減爐九座止存三十六爐用鉛既少又值滇之羅平州屬卑浙塊澤二厰出鉛頗旺運局搭鑄儘可敷用遂將黔厰之鉛停運第馬鬃嶺等厰俱在僻壤山路﨑嶇難以通商而開採小民又半係赤貧苦無工本不能久貯每鉛百斤厰價已減至八九錢一兩不等若不設法收買勢必星散以有效之厰而坐視廢棄實屬可惜是以暫於司庫借動鹽餘銀兩作工本腳價仍委朱源淳收買除課鉛照原定之價解黔報銷外餘鉛按時價收買統運漢口賣給京商所獲餘息儘數歸公自雍正五年二月起至九月止共發過銀二萬兩收獲鉛二百萬零今已運過鉛二十萬約計工本腳價盤費每百斤共銀三兩五錢而漢口之價則係四兩五錢每百斤實獲息銀一兩尚存鉛一百八十餘萬現在陸續分路挽運通商照前合算除歸還本腳之外約共可獲息銀二萬餘兩此後即以息銀動用隨厰內出鉛多寡儘收儘運無庸再發工本其所獲息銀俱於嵗底奏報充公至滇省鼓鑄倭鉛每百斤節省銀一兩不在此數內前已題明仍留為運錢腳價之用另於鼓鑄案內報銷再查齊家灣一厰硐老山空無人開採而畢節地方新出雞厰可以抵補臣現咨商貴州署撫臣沈廷正會題所有雞厰鉛課仍歸黔省報銷餘鉛統令滇員買運餘息歸公庶辦理得以畫一而於錢糧亦不無小補矣所有借動庫項收鉛辦息原委理合僃細奏明伏乞聖主睿鑒臣謹奏好諭部鈔録存案矣雍正六年十一月初十日雲貴總督臣鄂爾泰謹奏為恭謝聖恩事雍正六年十一月初五日臣齎摺家奴䝉恩賞給驛馬齎回欽賜臣御服天青寧紬羔羊皮褂一件醬色寧紬羔羊皮袍一件哈密瓜一圓藕粉八包抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣盡心竭力情知矢效涓埃而報國酬恩實難自安衾影顧幽獨而增慚對帝天而滋懼覺感頌之詞更不能著一語而回首殿廷不禁心依而神馳也為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為欽奉聖諭事雍正六年十一月初一日辰刻准兵部火牌齎到內廷發出黃包匣一件內奉硃諭三道録示敕諭一道并石禮哈條奏一摺户部主事楊秉乾條奏一摺硃批石禮哈奏摺二扣硃諭髙其倬石禮哈各一道又陳世倌參石禮哈鈔摺一扣臣敬誦批諭仰見我皇上慎重邊防軫惜苗命務籌萬全或恐生事之至意正擬密札張廣泗囑令遵照相機料理同日午刻適張廣泗差辨來滇敬録敕諭并鈔怡親王大學士等公字密示到臣臣隨即日詳細札覆去訖至本月初五日臣齎摺家奴回滇前事摺內荷䝉硃批前因各處奏到已遣廷臣密往張廣泗行營將朕初意一併僃悉諭卿知之矣卿等酌量相機合宜為之欽此又另摺內荷䝉硃批古州八萬之舉張廣泗既見不透則此事少急驟矣再有如此等應整理者當緩一步徐為之雲貴兵辨甚覺勞苦朕心實為不忍亦即有㫖加恩伊等著候㫖行欽此臣伏讀之下不勝感切倍深省惕竊照張廣泗已平八寨擬赴丹江并湖南派撥預僃官兵應調應停緣由臣已於十月二十日具摺奏聞茲欽差翰林牧可登春山二臣現在軍前同張廣泗詳勘八寨畢業前進凱里相度形勢酌量𠞰撫仰賴聖主仁威或易於就緒自應速圖倘進取實難不過勉强從事即當宣布上諭徐徐撤兵斷不敢回護前議以致紛擾至前石禮哈等摺奏臣細看所議皆止就黎平之八萬古州而言猶多未確查都勻黎平二府連界而由都勻不能直逹黎平者正以丹江一帶生苗橫截道路並非古州苗界有以隔之也清水江諸水下通楚之黔陽縣直入大河上通平越屬之重安江並可至黃絲驛而舟楫不通貨財不廣者則以九股一帶生苗動劫商旅亦並非古州苗衆有以阻之也從來富庶之地半少頑民為其身之可愛而欲重保其資也今既稱古州富庶更多土産而以燒殺搶虜等事全以歸之恐事不盡然是以臣於昨歲委張廣泗親至古州業經招撫而並未科糧編户若不欲取者誠欲開通丹江次及九股先沿江設汛俾河路通行然後合八萬古州改鎮添兵以籌長久此黔省百世之利大局所關其苗地些微糧賦並不足以較多寡論有無者也統俟張廣泗等如何料理是否可成臣再詳細商酌籌議善後事宜請㫖遵行抑臣更有陳者苗疆賊藪兵事時有凡有舉動務當示以鎮靜斯可以安民心而一衆志方張廣泗初進丹江界見苗賊强多恐衆寡不敵或致失事遂暫退衙門寨以待添兵時省內訛傳張廣泗乘夜逃遁狼狽不堪行李搶奪一空漢土兵丁傷亡數十人臣聞信立即差探又接楊天縱札并有苗賊强悍勝似官兵而官兵鎗械亦不如苗賊堅利等語臣覆云若果如此則平日所操練者何人所整備者何器是則提軍之責矣續據沈廷正來札云密差確探並無此事對敵時傷數人是實餘俱係謊言臣復經訪問而羣議始息如會𠞰粵㺜之役所調安籠官兵不過數百人而司道等官俱倉忙失措議請撥兵五百名移駐安籠又請撥兵五百名駐防黃草壩派府派㕔僕僕道路見臣以為不可初頗不以為然及不日八達已平官軍回汛始復帖然無詞凡此擬議雖皆屬慎重急公之意而上官過於驚慌小民未免惶惑邊荒苗猓之地尤不可不審處者也相應備陳臣謹繕摺奏聞統乞聖主睿鑒訓示施行臣謹奏有㫖諭張廣泗矣同日又奏為奏聞事案照參將新授雲南元江協副將哈元生帶兵前往阿驢交界阿路嗎地方堵擒川省賊蠻後奉四川提臣黃廷桂行令撤回於雍正六年九月二十二日行至阿驢猓古地方忽有阿驢部落糾衆數千攔阻打仗殺傷辨兵搶奪糧米哈元生設伏夾攻賊蠻始行敗走臣據申報飛行鶴麗鎮總兵張耀祖就近調撥官兵星往應援并令該鎮親自過江調度會𠞰並咨川省提臣發兵堵擒一面調撥土兵著令在臣標效力之祿鼎坤管領前往協力擒𠞰并查起事緣由去後臣隨於十月二十日具摺奏明茲據鶴麗鎮總兵官張耀祖東䝉鎮總兵官劉起元及軍前各員陸續呈報並准四川提臣黃廷桂咨會前來該臣查得阿驢地方逺在金沙江外界連川省沙罵等處雖向屬烏䝉所轄久已不服管束素稱野夷前哈元生領兵進𠞰米貼追至江外阿驢土官方就撫歸誠後哈元生奉調復帶兵赴江外阿路嗎地方駐劄堵擒雷波賊蠻阿驢土官曾送牛羊炒麵以為犒軍并幫夷夫擡送軍裝原極恭敬哈元生亦經賞以銀兩緞匹花紅等物各皆領謝而去並無動靜祇緣哈元生將阿驢土官帶於行營聽用其母疑有傷害之意而頭目等遂言他將土官土目都擒殺完了那裏饒得你我好也做一出不好也做一出隨令部落夷蠻勾連親戚藉稱報讐乘哈元生回兵之日糾衆數千重重圍住行凶截殺哈元生當賊衆圍困時奮勇奪占山梁率同官兵攻擊二晝一夜始將賊人殺退即相度形勢擇地于赤衣臺下營旋又攻打賊寨搜獲蕎糧數百石得以接濟復于十月十四十九等日分兵搜𠞰逆猓與官兵對敵被官兵斬首多人仆巖投江死者不計其數活擒二賊又分路跟追阿驢夷寨已騰空逃遁查汛逆黨去處俱逃往阿都阿不囉地方躲避附近阿驢之拉金者呢阿都並沙罵所屬夷目拖科拖却等皆係阿驢姻親曾幫兵助惡而拖科係阿驢妻父拖却係阿驢姨夫尤出死力今新升肅州鎮總兵王剛奉川提臣調遣巳帶漢土官兵一千四百名于十月初八日先到赤衣臺原調駐劄以密哥地方堵禦之逰擊康世顯帶所領官兵沿江而下守備馬似龍帶兵渡江而上總兵張耀祖因溜筒江險逺在黃平寨大井壩打造大小船隻率本標兵威寧營兵俱于十月十八日渡江赴赤衣臺會合其餘調撥滇黔漢土官兵皆計日可到張耀祖等聞阿都夷目乏嗣係接養沙罵土司之子為嗣且係世代姻親阿都夷目倚新撫沙罵土司之勢故敢容留逆黨已商同王剛勒令沙罵土司速赴阿都令伊子沮姑獻出逆黨免其𠞰戮否則立即進兵擒拏以彰國法十一月初九日又准川提臣黃廷桂咨商助惡現有川蠻應否分地各𠞰等語臣已札檄張耀祖謂造意不自阿驢毋得濫行屠戮但殲其渠魁應撫其餘黨并就近與川提臣妥酌去訖竊查野夷不法傷害官兵固應㑹兵合𠞰以示懲創但念此事阿驢土官既並無反復亦何必拘留行營即便留營聼用亦應先行曉諭以安夷心續即糾衆圍截意不過為土官又何難將阿驢立放即令阿驢明白開示以散羣夷况哈元生原帶官兵二千一十四員名內除分遣安臺并患時氣染瘴者約數百人彼衆我寡尤當防備更須權宜乃哈元生奉檄回兵並不慎重以致陳亡千把四員兵丁四十餘名雖據稱總因卑職進𠞰烏蒙米貼殺賊過多故賊蠻痛恨特來報復等語而自恃勇敢氣髙志滿遂致僨事誤師實哈元生有以啓之釁也臣於兩省將禆凡有寸功皆不敢掩沒凡有大過亦何敢姑息自應據實題參請㫖革職嚴加處分以為輕肆者戒至于哈元生肝膽勇略實屬將材前進取烏䝉𠞰滅米貼皆係首功現奉諭㫖造冊議敘合無將功贖罪從寬留任以勵後效此出自皇上格外隆施非臣所敢擅請者也除俟事竣一併具題外所有賊蠻起事緣由並現在𠞰撫情形合再奏聞伏乞聖主睿鑒臣謹奏朕前已有諭㫖料卿必參奏者以哈元生之任事豈忍將此等事治罪也况朕已用伊安籠總兵矣題到之日朕或令將功贖罪或寬免處分再斟酌有㫖雍正六年十二月初八日雲貴總督臣鄂爾泰謹奏恭請皇上聖安朕躬更甚安好卿好麼立春日祭祈穀壇回卿奏適至誠所謂新春同囍也同日又奏為恭逢聖誕慶覩祥雲事雍正六年十月二十九日恭逢萬夀令節臣率在省文武官員人等在五華山朝賀畢坐班至辰刻共覩五色卿雲光燦捧日經辰已午三時至十一月朔絢爛倍常凡呈現兩日臣尚以為省城所見其他郡邑未必同然隨經行查去後適據楚姚鎮總兵官張應宗呈報恭逢皇上萬夀本職率同在城文武大小官員以及合郡紳耆兵民人等朝賀坐班仰見上天垂象卿雲滿布祥光五色擁護日邊從辰至午燦爛非常初一日午時煥麗更勝文武兵民咸稱歷來未覩齊祝萬夀無疆所關盛朝祥瑞理合具文呈報又據雲南布政使張允隨詳稱查據楚雄府楚雄縣廣通縣姚安府姚州大姚縣定邊縣等處先後呈報恭逢皇上萬夀聖節喜見卿雲五彩擁護日邊經辰已午三時於十一月初一日午時又復光華照耀衆目齊觀不勝歡忭此從古未有之殊觀曠代罕聞之盛事幸生聖世得覩奇祥伏乞轉詳各等情到司伏查省城乃全滇之㑹楚姚為兩迤之中欣逢五色祥雲正當萬夀令節此誠嘉徴上瑞罕見稀聞理合具詳祈請轉奏等情到臣臣謹按黃帝有景雲之應虞舜有卿雲之歌瑞應圖曰慶雲者太平之應孝經援神契曰天子孝則慶雲見春秋感精符曰南至有雲迎日年豐之象再考雲南通志漢武元狩元年有五色雲見于白崖遣使跡之至大理屬之雲南縣雲南由是得名其後歷晉唐宋元史不再書至明洪武嘉靖間五色雲見于永昌其餘或一二見半屬彩霞亦不移時而散惟我聖祖仁皇帝二十一年五月彩雲見于雲南縣十月五色雲復見于楚雄府是年雲南悉平歷數從前要皆太平寧謐時和年豐之兆至于恭逢聖誕呈現三時歷現二日稽諸簡冊從未有如今日者也欽惟我皇上大孝格天與穹蒼而協撰至明如日並雲漢以昭回先天後天合德而自呈符驗陽月良月應時而迭著庥徴覩盛事于五華鵷鷺貔貅宛在蓬萊之島紀嘉辰于六詔山川城郭畢收圖畫之中兒童引領以稱奇父老駢肩而志喜屢豐預卜願大有遍一十五州衆口同聲祝吾皇臻萬八千嵗臣無任歡忭無任感激業經恭疏題報在案續又據順寧府知府傅逵具報十月二十九十一月初一兩日五色雲見所報與各處相同是合計雲南同日現瑞者共四府三縣稽諸簡冊尤屬從來所未有者也臣於冬至後曾親出郊外色雲瑞兆驗非虛矣敬念我皇上慎籌邊計勤念民依一誠相通無逺弗屆用敢瑣屑繕敘一併奏聞伏乞聖主睿鑒臣謹奏朕每遇此祥瑞蒙上天慈恩豈有不感喜之理然實絲毫不敢慶幸惟倍加敬畏之心況此嘉祥實係卿忠誠所感而獻於朕夀日者正表卿愛戴之心也天理二字朕實見得透信得及上天以卿如此不世出之良臣賜朕此朕之真祥瑞也嵗前冬初聞卿每患脅痛少覺氣弱朕思此皆憂思之所致朕至不忍有諭慰問蓋以諺語云心病還須心藥醫若邀上天慈恩聖祖賜佑各處軍役就緒時我鄂爾泰自然全愈非目下空言慰問所能解者所以忍而未頒諭問今天祖慈佑三處俱陸續報捷又覩此罕遇之嘉瑞想卿必然心怡神暢諸微疾得全愈矣目下卿體如何去冬不爽時如何光景可據實奏朕莫隱凡人能一念專誠聚精會神勤勞二字實不妨然憂心焦思則萬萬不可且亦於事無濟當切戒之況世情冷暖人事參差明天理逹人情者有幾只可盡一已之心以對越上天則修齊治平之道俱備於中矣其他入海算沙之類又何足與較凡事當酌量精神體察能否不可任力不能勝之事不可費思所不及之心夜眠若稍覺不靜日食若稍有不美則當慎節而不可勉强從事也可必遵朕諭行同日又奏為恭謝聖恩並陳愚悃事雍正六年十二月初二日准兵部咨奉㫖廣西地方離廣東總督駐劄處較逺與滇黔兩省相近著鄂爾泰總督雲貴廣西三省一應軍民事務俱照總督之例管轄欽此欽遵到臣臣即恭設香案望闕叩頭謝恩訖伏念臣叨荷殊恩無可言說竭蹶奮勵惟當終身以之竊思廣西重地㺜獞環居而吏治因循營伍廢弛實由來巳久在地方情形原與雲貴少别則措置緩急亦應與雲貴有異若狃于姑息固足以養姦倘過于嚴切可懷威有可畏然後申明法紀剪除凶頑庶一二年內或可漸次就緒至于振作調劑固須立法尤俞允將元展成調補懇祈所以自立矣再貴州苗疆事宜臣擬親往辦理是以前經㫖著動正項銀十萬兩交與臣酌量分别賞給其征𠞰八達寨之官辨兵丁中有陳亡受傷者巳令加恩優恤仍照例給與恤典賞賚殊恩曠典實互古未有臣傳集將辨兵目宣布皇仁在事者涕零與聞者泣下臣現在檄行雲貴各標另行造冊送部所有此案統兵失利調度失宜之提鎮等官功罪輕重自應分别定議但廣西提督田畯已于十月十八日在署病故右江鎮總兵官段宗嶽前在軍前染瘴亦于十月十四日在署病聖恩並陳愚悃伏乞聖主睿鑒批示施行臣謹奏覽同日又奏為分兵進𠞰阿驢等處逆蠻情形事竊照阿驢部落乘參將哈元生從川省地方撤兵而回糾衆攔截打仗殺傷辨兵臣聞報調撥漢土官兵堵擒協𠞰賊寨騰空逃往阿都阿不囉地方躲避附近阿驢之拉金者呢等皆曾幫兵助惡并哈元生擅帶阿驢土官隨營行走以致生疑啓釁各緣由俱經具摺奏聞據鶴麗鎮總兵官張耀祖呈稱本職于十月二十四日抵雜羅古地方會同肅州鎮商得阿驢逆蠻雖已逃遁無非潛匿川滇接連地界內除首惡者呢已誘擒外其餘如在滇省者本職派遣官兵搜𠞰入川者移㑹川提發兵撲滅庶三省官兵得免耽延時日已咨會川提准川提臣黃廷桂咨覆川省分兵五路進攻阿不囉本職即于十一月初七日遣參將哈元生帶領官兵由中路進𠞰者呢遣威寧營參將楊馥帶領官兵由左路進𠞰以呢遣貴州提標逰擊卜萬年帶領官兵進𠞰拉金兼于溜索河補凹一帶堵截通阿都路徑派大定協逰擊張世傑帶領官兵于三路䇿應本職統領官兵駐劄務都特適中之地調遣至沿江南岸與阿不囉等處所通地方移咨東蒙鎮派兵逰巡堵截又調東川營參將祝希堯帶兵于巧家一帶駐劄堵截等情又准四川提臣黃廷桂咨稱本提督酌量程途逺近令逰擊張朝良帶官兵隨肅州鎮于十一月初十日由拖科𠞰入至阿不囉會攻令副將張瑛帶官兵由覺覺過河進𠞰至拖覺底㑹合直搗阿不囉令逰擊馬光等領官兵由狃姑𠞰入至易磨㑹合令逰擊許連科帶官兵由勻勺殺入阿不囉令逰擊王勇帶官兵由木托進攻本提督同建昌鎮率兵由狃姑中路前進四面督催接應十一月二十五三十等日又據張耀祖咨呈據參將楊馥報稱遵領官兵抵以呢路巫地方連攻三寨與賊對敵官兵奮勇追殺賊蠻數十活擒男婦十五名口逆賊以呢並無踪影本職又差守備馬似龍領兵于簸羅箐搜𠞰據稱有阿驢逆蠻前來抵敵官兵奮勇殺死賊人三十餘名活擒九名呈解到營嚴訊各賊并令阿驢者呢識認俱係幫殺官兵之賊即于是日斬示據參將哈元生報稱遣守備王廷標帶官兵跟追逆賊卑職隨後䇿應追至特衣庫􅋭夷逆聚集􅋭上拒敵官兵攻取賊放擂石打死兵丁一名土兵一名帶傷把總一員胡亮帶傷兵四名餘俱奮勇直上始奪第一層􅋭口殺傷賊衆仆岩滚箐不計外生擒賊蠻三名男女二十四名口所獲賊蠻訊明係殺害官兵之犯即斬首示衆據逰擊顔文選報稱帶兵搜查溜索河一帶于山箐深處見有猓賊逃匿上前擒拏賊等敢放箭石兵丁齊上擒獲猓賊一名婦女四口又據參將楊馥報稱分遣官兵至腳曲箐內搜𠞰活擒賊蠻男婦二十五名口又鎗傷一名滚岩二名所獲賊蠻俱禁守行營又准四川提臣黃廷桂咨開准肅州鎮咨稱密派所帶官兵分𠞰據守備賈成林帶兵前赴易磨賊蠻逃遁于箐內密搜遇賊百十餘人被官兵斬殺四十三名擒獲蠻婦二十六口遊擊張朝良帶兵前抵易磨結業賊窠賊等俱逃跟踪追殺至卑奚山箐見夷猓躲藏在內恃險抗拒被官兵攻擊殺賊六七十人獲男婦三十一名口本鎮暫居易磨分屣逆夷潛伏巢穴據守備賈成林由别哺加樂蠻寨右山直上見有蠻人數百即督兵撲殺斬首五十餘級飛岩者大半餘奔下山撲入河內生擒蠻婦小子五名口本鎮自易磨起營師次山頂箐邊屣有踪跡隨督遣辨兵環堵箐林搜殺賊三十七名生擒蠻婦四十四口逰擊張朝良帶兵至阿布切樂見賊百十餘人令兵圍殺夷蠻抗拒被官兵斬殺五十八人鎗打死三十五人據副將張瑛帶兵抵羅喜朵喇圭賊窠分兵窮搜殺死四十餘名逰擊王安民將膩厄潛伏之夷搜殺三十餘名至拖覺同王安民沿途搜𠞰于各箐搜殺賊蠻百十餘人又遣官兵分𠞰拖覺底各寨十二處搜殺阿都頭目咱乃攝飛一名賊蠻一百有餘捉獲男婦一百二十八名據逰擊馬光等領兵進至加普異角蠻人逃遁連夜追至易磨蠻賊亦皆逃遁分兵搜捕計殺猓蠻十二人生擒二名訊知猓賊聚潛拖覺一帶連夜進攻一夜連破猓蠻一十三寨又至拖覺溝破猓蠻九寨共殺賊二百餘人活擒男婦一百三十名口遊擊沈國卿亦于是夜分遣官兵一齊進攻突出猓賊百十多人我兵併力攻擊截殺四十餘賊活捉男婦四十七名口又搜至絣葛易裏磨箐內捉獲猓蠻二名偵知前箐聚賊分兵殺入惡蠻蜂擁拒敵自辰至酉斬殺二級傷死約一百多人直殺至阿波羅囉務地方猓賊潰散又據張耀祖報稱千總林發正等前往拉金地方搜擒殺死逆賊一名又進施落大箐有賊蠻拒敵官兵殺死逆賊三十餘名擒獲男婦十九名口據逰擊顔文選等搜至得泥箐見有猓賊二百餘人手持弩弓拒敵官兵鎗炮打死七十餘人生擒夷賊一名扭租審係阿驢部落各等情到臣該臣查得阿驢部落糾約川蠻擅敢截殺官兵本應盡行𠞰滅祗緣事有由起非苗蠻積謀倡亂臣是以咨㑹川提臣黃廷桂照會總兵張耀祖等切囑但擒首惡應招其附從詎意三省官兵齊集提鎮俱已親臨而烏猓川蠻毫無畏懼仍敢四出拒敵是凶頑橫肆非僅有以激成隨據川省分兵五路滇黔分兵三路各于境界內密布𠞰擒現在首惡者呢巳經擒獲適據探報拉金兄弟二人并家口亦俱就擒而各處賊蠻被官兵斬殺捕獲者甚衆今始有望撫之意是止有首惡拉金拖科等尚竄匿川界而川提臣黃廷桂等勒令搜擒不遺餘力諒無所逃遁臣據張耀祖等札稟似可不日竣事除俟獲到首惡商定善後事宜撤師回汛另行奏報外合將分地進𠞰情形再行奏聞伏乞聖主睿鑒臣謹奏此一番事乃朕調遣錯失之所致然看此惡逆凶悍情形若不復加懲治恐將來亦未能保其無事此乃上天默示潛消之恩轉禍為福之舉也朕不勝欣悅之至在事官兵甚屬可嘉事畢自有恩㫖同日又奏為報明克取江壩情形事竊照橄欖逆夷蠢動經臣檄調官兵進𠞰并札致提臣郝玉麟親往調度節次具摺奏明續據臨元鎮總兵官孫宏本咨呈內稱自到猛養遵照札囑慎重料理今各處官兵俱到行營訂期于十一月十三日寅時三路一齊進𠞰密令逰擊施善元帶領官兵攻整板慢腮小猛崙直抵橄欖壩令守備朱琦帶兵由整板前進參將邱名揚遣守備李定海帶官兵自攸樂起程由原屣山箐繞出慢顙守備裴𢎞道由大路直攻慢顙約定大炮一響然後首尾夾攻此路攻破均趨赴整哈除搗賊巢穴另遣遊擊郭佑民帶官兵自猛養由九龍江奪取大渡口遣遊擊馬成林帶官兵攻取小渡口因九龍江大小兩渡之間有一沙洲林木叢雜內有賊人房屋恐逆夷暗由沙洲岔河抄出以襲我兵之後遣守備鄧士彥帶官兵直抵岔河以遏賊人來路又橄欖壩沿山沿箐有崎嶇鳥道可通猛養恐賊暗來偷襲遣把總湯德新帶鎗手兵丁前往通達猛養攸樂總路埋伏又遣遊擊徐成正帶領官兵由小路過渡先繞至九龍江直搗賊巢本職帶兵駐劄猛養調度等情隨據遊擊施善元報稱卑職遵帶官兵于十一月十一日直抵猛崙午刻到上江渡口有賊人二三百潛匿樹林吹起牛角齊來拒敵卑職令兵丁齊放鎗炮打傷賊五六十人又令官兵往下江渡口齊放鎗炮打傷賊三四十人看賊衆散亂乘勢一齊過水隨奪得下江渡口而守備朱琦亦于十二日奪取整板渡口鎗炮打傷賊數十人十三日率兵渡河等情又據施善元稟稱十三日進攻猛崙蠻允蠻蚌等寨賊人俱已逃遁直至慢整邊有賊五六十立柵阻我官兵隨即追趕打傷六人賊自放火燒寨逃散卑職直進猛崙賊人聞風逃竄十四日前進猛寬賊人亦皆逃散十五日抵橄欖壩賊巢有一千餘賊潛匿寨柵齊出拒敵卑職令守備保瑄等帶領官兵分中左右三路殺出卑職督令官兵齊心努力自辰對敵至未打傷賊人無數割首級七顆是晚更盡守備朱琦攻破整板河口帶兵督糧到營十六十七兩日遊擊黃忠耀等俱領兵來到十八日分三路進攻賊巢杳無人跡令兵各路搜查拏獲夷人七名橄欖壩地方俱巳克取等情又據遊擊徐成正稟稱抄渡九龍江之上流喇卡江出猛海深入賊巢沿途坐卡七處每處有賊數十人及百人不等卑職督兵奮勇擒賊四起共擒賊十七名過卡出箐而一出箐口復遇賊衆交鋒我兵嚴整飛衝大渡口大施炮火打死賊一名打傷三名又擒獲凶賊一名登時梟首其餘獲賊七名解交提督行營九龍江已克等情兹准提臣郝玉麟咨稱十一月十六日已抵攸樂據逰擊施善元等稟報逆賊俱有望撫之心惟是畏懼不前拏獲擺夷數人並江西客人一名皆云若提督到來我們俱出投見本提督若不親往招安見機行事恐夷衆又被狡賊煽惑今帶領本標官兵于二十日前往橄欖壩相機𠞰撫有一緬和尚投見據云情願寫緬文招來夷民等語本提督即賞花紅令其前去一面遣員赴橄欖壩江邊扎造竹筏二十二日寅刻親到江壩彼岸並無一賊我兵占踞江干搜獲牛尾炮三十四位查橄欖壩逆夷俱巳𠞰散九龍江一帶又為徐成正等克取逆賊聞風膽破魂飛縱有一二首惡隱匿偷生料難漏網等情各到臣該臣查得橄欖壩逆賊不法藉稱代刀正彥報仇糾脅夷衆放火打仗臣遣發官兵𠞰撫因值炎瘴未消時疫流行漢土兵丁半多染病是以臣行總兵官孫宏本參將邱名揚令各暫時固守勿得妄動俟續撥官兵到日合攻今于十一月初旬各路官兵雲集孫宏本隨遣分路進𠞰于提臣郝玉麟未到軍營之先而橄欖壩九龍江一帶即經克取惟首惡緬和尚叭護等尚未就擒宣慰司刀金寶被賊逼脅猶未見投謁除咨提臣郝玉麟剴切出示遍行曉諭只將首惡數人務須搜獲其被脅從餘黨概豫招安慎毋濫行𠞰戮一俟平靖多留官兵駐劄彈壓以杜後患外所有據報克取江壩情形合再奏聞伏乞聖主睿鑒臣謹奏欣悅覽之觀此各役將辨之效力用命回思皆我聖祖君父皇考六十年深仁厚澤教養之所致實不禁喜淚交流惟嘉奬憐憫慶幸之外無可批諭也同日又奏為報明克取丹江情形事竊照貴州升任按察使張廣泗帶領官兵招撫黔屬生苗八寨九股等處俱經就撫惟丹江一帶頑苗復勾結八寨向化之苗抗拒官兵張廣泗先攻破八寨反復之乜告等寨再議開通丹江以及湖南先發之兵止須駐劄鎮逺遙為聲勢欽差收可登春山巳至軍前查勘情形各緣由經臣奏明續據張廣泗呈稱本司帶各路官兵齊集本應即進丹江但念苗民愚頑不悟或係化導未周是以敬體皇上如天好生之仁復多遣通事前去宣諭利害彼等全無悔心且將願投撫之烏留寨男婦虜去斷難寬容查丹江一處居中則為大丹江其左則為小丹江其右則為雞講而烏耶地方乃扼要之所本司親率安籠鎮標遊擊田昌友貴陽營遊擊史應貴等帶領官兵于十一月十一日前進烏耶駐劄又有抱得一處為丹江要徑派令鎮逺協副將張禹謨等帶領官兵于十二月從烏留取抱得山至大丹江㑹合并飛檄左路駐劄之定廣協副將蘇大有等帶領官兵亦於十二日從枯桶進攻小丹江俾凶苗四下受敵不能准備等情又據副將蘇大有稟稱卑職自八寨起營至烏髙十二日分兵兩路左路由蜂塘寨直抵枯桶前面右路抄枯桶後尾其枯桶各寨頑苗俱已逃遁十三日撥土兵于要路安設三卡以待果有頑苗來寨搬取米糧坐卡土兵放弩打傷頑苗四名十四日率官兵將運糧路徑焚搜有苗四五百于山梁上放鎗呐喊兵丁放鎗對敵大炮打死數名頑苗即拉扯背負逃去隨密差前往丹江探聽險要處俱築土城蓋有草棚拒守十五日過枯桶至石板寨山後頑苗拒阻官兵鎗炮攻打苗賊潰敗衆兵正在屣路下營有頑苗千餘蜂擁前來分兵對敵追至坡下埋伏帶兵佯敗頑苗尾後追趕伏兵即起鎗傷苗賊十餘名苗復潰敗等情又據副將張禹謨呈報奉令帶領官兵進取烏留抱得直抵大丹江遵於十一月十二日駐開懷寨對山十三日令守備梅先春等各帶兵分左右路密進烏留夾攻其寨卑職率將備由中路繼進攻取卯刻俱抵烏留寨賊苗預將眷口搬移官兵臨寨賊苗占寨後山梁對敵官兵奮勇直上將賊穴燒燬賊苗退奔乘勢即攻抱得苗復拒敵鎗炮打傷數賊將抱得燒燬三寨十四日發兵搜山十五日官兵至抱得查烏留抱得之苗俱竄囊猛囊堯二寨如發兵遽取抱得對山險峻賊苗阻守髙嶺後即大丹江囊蕩谷猓賊巢恐其襲我之後是以令凱里苗兵先前往抱得附近招撫然後攻取囊猛囊堯後取髙嶺進大丹江等情又據遊擊田昌友報稱遵於十一月初十日自凱里帶兵十一日駐劄排洛張撫院于十二日亦抵排洛遙見對山苗賊日則舞刀呐喊夜則明火守路蒙諭同遊擊史應貴于十三日帶兵分奪左右山梁卑職帶官兵奮勇直上巳奪右首山梁即係丹江總口令把總張明定劄此復又分兵搶奪前面山梁值史應貴亦到㑹合即駐劄丹江頭一關口聞後面鎗炮之聲令把總李國寵等帶兵應援據稱丹江頑苗爭奪山梁被把總張明定殺退據張明定稟稱有苗四五百爭奪山梁我兵對敵傷死頑苗甚多餘衆敗回對山張撫院于十四日亦抵丹江頭一關口令把總謝遴中等占奪丹江總口對面山梁據稟路遇苗賊數百交陳鎗炮傷死苗二十餘名有頭關賊苗四路猖狂奉令分兵堵截鎗炮傷死賊苗多人餘黨潰散等情又據遊擊史應貴稟稱卑職同田遊擊隨張撫院帶兵由凱里右路而進搶登烏耶寨大山梁子卑職督令官兵于已時搶上七處劄營是夜頑苗數百前來對敵鎗炮打死十數人帶傷三四十人十四日張撫院到梁子駐劄頑苗千餘人來對敵鎗炮打死十數人敗去十五日張撫院踏看頭道梁子炮臺苗衆聚集對敵令卑職帶兵親往把守此關逆苗千餘前來鎗炮打死多人始行敗退十六日賊苗在彼山梁呐喊復來打仗卑職率領官兵施放鎗炮四路伏兵齊出又打死多人敗退十七八等日賊苗只在對關虛張呐喊張撫院因張副將由中路烏留所進之兵禾見速進十八日親往烏留至抱得行營會商令卑職等且勿妄動俟張副將等㑹合進取大丹江再進兵奪取關口等情又據蘇大有報稱十六日申時苗賊于四處呐喊卑職帶兵前去誘敵仍于兩肋埋伏兵丁卑職佯帶兵退回頑苗約有五六百四處追來伏兵齊起卑職復回督令官兵奮勇攻擊鎗傷頑苗十餘名賊苗敗走有大定協把總馬國良帶兵殺死賊苗三名十七日因雪雨霧重未便進兵十八日卑職等往附近烏疊一帶山梁察其虛實有苗賊千餘放鎗呐喊四山撲來卑職分兵攻擊從辰至午半敵半誘於兩肋埋伏兵丁卑職仍作佯敗之狀苗賊隨後追來伏兵齊起卑職回兵施放平逆大炮打死苗賊數名鎗炮共傷數十名賊苗潰逃回守土城二十日卑職等分為四路于五更時起發前去攻打丹江有苗賊千餘在頭關土城垜口內打鎗拒敵卑職用大炮攻打土城堅固從黎明至辰難以攻破卑職親督備辨兵丁冒險逼近土城乘隙越進殺死苗賊四十五名辨兵復奮力追趕連破土城五座直追至小丹江之烏疊寨又殺死苗賊二十一名卑職督令放平逆靖蠻大炮打死苗賊數十直抵巢穴苗賊俱敗潰逃去隨將小丹江之烏疊大小八寨燒燬次日移營至小丹江駐劄所有開關破寨情形理合飛報等情又據鎮逺府知府方顯稟稱九股清水江一帶生苗地方遼濶卑職多遣土官人等分道前往化誨除已招之四千四百七十餘户外今復招撫得一千零二十一户賞以花紅銀牌酒食苗情甚是踴躍聞風而來者紛紛將來所遣之人回覆又可得數千户附近鎮逺九股清水江一帶生苗不難就緒等情各到臣至十二月初六日臣差探軍情辨員回滇據其口稟並接張廣泗手札與各員稟報無異該臣查得丹江生苗恃險負固凶頑異常雖屢經招撫剴切化道不但不知感悟亦且毫無畏懼若非大加𠞰除必致更貽後患今自三路進兵不及旬日小丹江一帶俱已到處成功軍威大震賊苗喪膽雖據各員稟報苗人有饒命就撫之請正復未可輕信墮其緩計現已布置進取大丹江料不日可以全勝況古州八萬略無反復九股清水江生苗巳投誠五千數百餘户只俟丹江一定其餘皆易就緒仰賴聖主仁威嵗內或可以報竣矣其湖南先發之兵一千名巳調至鎮逺駐劄遙作聲勢統俟事畢再行遣回至苗疆軍營一切情形欽差牧可登春山二臣皆巳親見深知伊等不日回京復命自能面陳詳細無庸臣多贅所有官兵克取小丹江緣由合再奏聞伏乞聖主睿鑒臣謹奏此事實皆天祖之慈恩卿等忠誠用力之所致建此從古未有之奇勳除邊方萬姓之永患朕嘉幸之懷筆難宣諭其善後事宜當詳慎料理惟以重兵彈壓為要不可惜費省事待數年安帖時量減不遲也硃批諭㫖卷一百二十五之九欽定四庫全書硃批諭㫖卷一百二十五之十硃批鄂爾泰奏摺雍正七年正月二十五日雲貴廣西總督臣鄂爾泰謹奏為恭謝天恩事雍正六年十二月二十六日臣齎摺家奴䝉恩賞銀十兩馳驛齎回御賜臣鹿尾十條鹿肉五方樹雞六隻野雞十隻細鱗魚四尾廣橙文旦蜜橘朱橘共一簍哈密瓜一圓紫金錠二千錠平安丸二千丸抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批卿三省總督之印乃朕合對卿之年命選擇吉日良時在養心殿交怡親王監視成造者卿可愛惜長久用之事事如意也特諭卿知之欽此臣伏讀之下不勝慶幸不勝惶悚念臣質本凡材身叨殊遇榮光稠疊莫可名言乃以三省總督之印復荷聖慈合對臣之年命選擇吉日良時並在養心殿交與怡親王監視成造臣何人斯實難承受雖天恩下逮遍及草木昆蟲而臣力難酬常凛豚魚犬馬事事如意固天心之眷注實人事之積纍也敢不敬畏敢不奮勉至雍正七年正月十三日臣齎摺家奴又䝉恩賞銀十兩馳驛齎回御賜臣御書福字一幅對聨一幅計嵗嵗平安節年年如意春十字黃縧緑珠一盤小黃荷包二箇內貯寶玉金銀共二十八枚貂皮四十張鹿尾十隻鹿肉六方野雞十隻蜇鱸魚二尾細鱗魚二尾廣橙文旦鳳橘朱橘共一簍抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷䝉硃批朕躬甚安卿好麼新年大囍欽此臣跪捧囍字歡訓諭惴惴恐恐未嘗不汗流泣下也敢不敬畏敢不奮勉兹於正月二十一日提塘官姜文濵恭齎增提鎮之養亷免州縣之虧項俟准到部文臣當敬謹遵行天恩浩蕩普遍無遺計數月以來聖恩伏乞聖主睿鑒臣謹奏覽同日又奏為欽奉聖諭事雍正七年正月初十日署廣西提督副都統臣張溥馳驛抵滇臣率在城文武出郊迎接跪請聖安隨張溥至公館據𫝊示諭㫖福建副將仇元正人去得已著馳驛往雲南交與總督鄂爾泰試看如人好或放左江右江總兵若左江右江現在總兵俱好可留在雲南俟有總兵缺出補放鄂爾泰可時常教導他此人好用得再左江總兵齊元輔亦著鄂爾泰試看欽此臣跪聆之下敬詢起居得知㫖酌用外廣西地方一應事宜張溥在滇十日於正月十九日始起程赴粵臣已謹就所知與伊詳細講轉有瞻徇如果營伍整齊兵丁奮勇將既已可用或並可以不用其粵省將辨半係聖主簡補之員看其履歷多有勤勞並非庸懦獨以狃日齎回臣前摺內荷蒙硃批前因未聞田畯之故待問卿再定此缺續連接田畯段宗嶽之遺本所以急急有㫖命張溥來署理調用蔡成貴右江今卿既言張耀祖可以勝任俟張溥到來二人中卿再酌量速速奏聞若張耀祖相宜時王紹緒聞得善軟不勝廣東全省之任即調用張溥於廣東矣張溥來時朕亦曾密諭之此人甚妥當卿試看欽此又奉硃批若用張耀祖於廣西照卿所請孫𢎞本調用鶴麗朕意欲將邱名揚補授臨元卿意如何欽此又臣奏楊天縱條內荷䝉硃批此人雖老難得之提督也著實好若不致甚曠廢將就留用好卿見張溥若與粵西提督相宜張耀祖備用貴州之任亦可欽此臣看張耀祖老於戎行四一月內在行營病故臣聞報之日即差守備一員提督臣與共事三載同心合意相與有成獨以患目日久不敢不據實奏聞在楊天縱雖年已七十四精壯如常辦事無誤即考好驗一事臣早不時留意亦不致曠廢之甚也合併陳明統乞聖主睿鑒施行臣謹奏覽同日又奏為欽奉聖諭事竊臣荷䝉頒發硃諭二道廣東總督臣孔育珣奏摺二扣原任廣西提督臣田畯奏摺一扣到臣臣伏讀硃諭此係田畯之奏發來與卿一笑竟有如此良心何在之論然黔省官兵輕厭粵西兵將見大局已定有心留與伊等為難或亦有之事今總將廣西歸併著卿總督此案卿自有秉公察理之道也隨便發來與卿看欽此又田畯摺內奉硃批此係田畯未上遺本之前所奏即將此摺留中已批諭何顏有此一奏之㫖如此良心喪盡可發一笑欽此又孔育珣奏報八達蕩平一摺奉硃批此係孔育珣之奏發來卿看以便採擇料理欽此臣看田畯八達之舉既輕率於前復畏縮於後初調常顯虎進取地勢賊情並未籌畫繼見賊勢猖獗官兵屢敗鎮將紛紛告急而田畯咨行惟有務出萬全一語亦並無調度及聞滇黔官兵將至不得已親往計栁州至八達不過半月程而匝月始到既到見賊首已戮賊巢已平並不計及賊子聽其逺遁數日之內遂爾旋回并撤官兵僅留兵三百名令遊擊一員駐劄彈壓試思以粵省數千之貴既破弄高該寨賊衆哀號乞命而八達之賊亦願歸順故蔡成貴念義不殺降暫停進取諭令投誠廣羅協副將楊洪奮勇前進奪取炮臺攻抵賊寨見黔粵官兵未到故隨踞險劄營暫緩進取而八達賊衆見滇兵已臨巢穴欲奪路出逃遂直奔粵路粵兵不能抵敵故致傷亡據田畯摺稱安籠官兵收回雲南官兵退去竟若一日克取五炮臺皆粵軍之力而雲南官兵轉似敗退者捫心自問是誠何顔且所稱平寨鬼亭止兩小寨耳離八達懼乃焚大寨夜遁殊不知粵軍大敗之日即克平寨鬼亭之後無論克二小寨賊黨無所懼即使賊黨果懼欲遁欲守俱焚寨何為臣前據粵將呈報見有二十九日夜賊寨不知何故火起等語實不禁大笑無情之詞遂不覺自相矛盾也至孔育珣奏明段宗嶽見粵兵懦弱斷不能力取發銀購線極費心力此臣所深知但以數月之久並無聲息滇黔官兵一到隨即殺獻謂盡係粵力黔員不能平惟蔡成貴報文內不與段宗嶽聯銜止稱將賊首級移交粵員粵員亦不能甘此係蔡成貴器小不知大體處再段宗嶽血氣勇敢人也急欲滅賊苦進攻已抵賊寨粵兵不能前原非所逆料傷亡辨兵可以情恕乃自以畏罪之故竟以賊人恃粵通同外應等語通詳此實係諉飾之詞大約鎮將之摺前奉硃批聞得劉德健甚是不堪卿可秉公察究或調或革即酌量一面料理一面奏聞欽此續奉硃批西隆州知州劉德健前經有人參奏故有前諭今又據金鉷奏稱劉德健乃係出色好員十分保薦似此毁譽難憑用人之苦不可勝言矣其該上司如此嘉奬必有確據朕已諭伊向卿言之也卿可參酌察訪秉公料理又諭此諭書畢劉德健故本題到因有前諭閒發來看欽此臣查廣西之西隆州地方與雲南廣南府接壤又於黔粵分界案內經臣題請將西隆江北之五甲己割歸貴州故凡該州情事臣半得與聞初八達寨之舉非田畯本意實啓釁於劉德健既而八達橫肆方難𠞰除而劉德健又聲言欲滅泥峝以致泥峝附賊後并土黃以及各寨無不附賊者西隆幾不能支而劉德健並束手無策續八達既定有投誠土目等聯名具呈訴告劉德健劣蹟臣因隔省未便審究僅取供備案移知粵省大約孔育珣所奏多係實事此三省在事文武所合口一詞者也據臣揆度劉德健諒非寨一案雖提鎮俱已病故應無庸議而事情原委仍須查明臣現已檄行查報統俟赴黔回滇各案卷詳送到日臣再詳加參酌秉公料理據實奏聞合先覆奏伏乞聖主睿鑒臣謹奏可謂大公至正之論同日又奏為報明𠞰撫丹江一帶生苗就緒情形仰祈睿鑒事竊照升任貴州按察使張廣泗統領官兵開闢生苗地界八寨等處俱經就撫小丹江一帶業已攻破經臣節次奏明在案兹據遊擊史應貴呈稱卑職帶領官兵在烏耶關口固守十一月二十一日黎明有逆苗千餘前來對敵卑職令官兵施放鎗炮打敗二十二日逆苗聚集復來被卑職四路伏兵齊起用鎗炮打死數十次日逆苗復聚千餘三面進敵卑職領兵堵殺官兵奮勇打死逆苗無算據副將蘇大有稟報十一月二十四日張撫院同卑職移營至小丹江有賊苗千餘四山呐喊撲近前來卑職率領箐山頭隨有者飛頭人阿駝等赴營求請招安又有楊烏交歸羊甲黨找達石硐爽排戛各寨苗民求撫割具木刻傾心歸順又據副將蘇大有稟稱十一月三十日有大丹江苗賊千餘從山梁呐喊直衝天柱營參將營盤卑職同該參將率各營辨兵並定番土兵迎敵乘勢追上坡梁鎗炮藥弩打傷數十人苗賊逃遁十二月初三日又同率辨兵攻大丹江甫至附近黃毛嶺凶苗約有二千餘人於各險峻路口阻截拒敵卑職帶官兵冒險衝擊鎗炮打傷數十人凶苗奔敗官兵追下坡梁直抵巢穴卑職連射死凶苗六人衆兵亦殺死十數名而凶苗從旁施鎗打中卑職左腿穿過卑職勉強督兵攻破黃毛等共八寨各兵殺死凶苗數十名鎗炮打死不計其數餘衆奔逃破寨後即有楊排等八寨畏威割就木刻來降奉張撫院諭大丹江各寨已破尚有桃繞大寨最凶卑職遵派官兵於抱得諭卑職分兵兩路攻取囊猛遵撥都司羅資衮等帶兵由左路進攻撥守備梅先春等帶兵由右路進攻其餘官兵隨張撫院聲援左路官兵至囊猛左山嶺苗賊二三百人砌土城拒敵官兵攻破土城賊苗奔潰官兵追至囊猛巢穴適右路官房列烏堯以搏雞講隨有楊排雞勇等十餘寨叩見張撫院咱刀一帶及攻克之黃毛等寨亦約期前來歸撫據遊擊田昌友報稱奉張撫院面諭同史遊擊領兵分奪逼近丹江左右要口遵帶官兵奪上右關頑苗約有數百迎敵大炮打死不知其數登時大敗下山奪獲關口正在下營頑苗有五六百人前來爭持隨令官兵一面築牆一面迎敵苗賊死傷者甚衆十二月初三日奉張撫院令率官兵下坡打故猓寨未到寨時有苗賊三四百突出迎敵官兵施放鎗炮打敗當將故猓計隴大小六寨燒燬初五日奉令同史遊擊蘇副將三路進兵攻破桃繞大小六寨初十日又奉令同史遊擊領兵先攻抵筒次打雞講卑職至抵筒由右路攻焚賊寨又分安南等營官兵由左手搶上山梁燒燬抵筒大小四寨苗賊層集數千衝敵將黃施安南普安官兵壓敗二次陳亡炮手五名官兵奮力攻上頑苗敗走卑職追至雞講山嶺同史遊擊駐劄露營苗賊亦對山駐劄十一日張撫院令鎮逺張副將帶兵前來同開雞講卑職令辨兵齊心努力官兵剛起身時頑苗亦即下山對敵官兵奮勇殺敗沿路拋棄標桿攩牌追至雞講一面迎敵一面燒雞講五寨苗賊約五六百户敗入深箐逃避十三十四兩日始上山投誠割具木刻又據遊擊史應貴稟稱張撫院至烏耶諭令搶奪丹江大關口卑職率官兵由中路搶上關口賊苗大潰奔竄隨同蘇副將等攻克桃繞等寨丹江生苗牽羊赴張撫院行營求請招安後抵筒寨苗人亦求招安十二月十八日又有雞講各寨共六百户俱來行營投誠張副將帶兵由九股化誨未服數寨又據寨生苗計二千七百九十三户人丁五千二百四民共五百十一户人丁四百七十四丁洪州副司龍早等六寨計共五百三戶七百一十九丁又據二名口並招撫得清水江董敖寨并九股之陶賴等生苗共十三寨計五百一十三户男婦二十一百八十名口各等情到臣該臣查得丹江雞講生苗自恃地險人衆不服招撫經新任撫臣張廣泗調遣官兵分路進𠞰先克小丹江一帶旋又攻破大丹江雞講各寨頑苗始各畏懼投誠割具木刻認納錢糧願為良民現已復業安居丹江等處事已告竣上下九股亦經就撫清水江一帶節據鎮逺府知府方顯等稟報向化者已多其黎平之古州一處雖宣導在先現俱寧帖然地廣人衆兼之丹江八寨諸凡善後圖維尤關緊要須新撫臣張廣泗親身布置庶蠢兹苗夷得永沐聖朝太平之化也張廣泗因有建造土城營房工費等項回省與署撫臣沈廷正靣商昨准沈廷正咨會新撫料理丹江諸事已經就緒應即交印受事業於正月十六日移交印信即於十七日前赴雲南新任今臣俟沈廷正到滇將撫篆移交並將雲南題明檄飭撤回再欽差司業臣牧可登侍講臣春山同赴大小丹江親行查勘即於十二月初九日回京復命所有一切𠞰撫情形二臣自能詳陳更無庸多贅謹此具摺伏乞聖主睿鑒臣謹奏覽同日又奏為奏聞事竊照橄欖壩逆夷不法經臣調遣官兵進𠞰直搗巢穴克取橄欖壩九龍江大小渡口江壩悉已底定逆夷大敗奔逃業經繕摺奏明因臨元總兵官孫𢎞本在行營病故臣隨委楚姚總兵官張應宗署事去後兹據各員陸續稟報并准提臣郝玉麟咨會宣慰司刀金寶因畏賊勢避匿猛者地方差辨目前往宣布皇仁令其出見於十一月二十七日攜帶家口自猛者起身三十日到九龍江十二月初二日赴提臣郝玉麟行營投見提臣即賞給銀兩袍帽等項吩咐云爾乃無罪之人不過為逆夷勢逼逃避如今出來可安慰各頭目招撫百姓寧家樂業該宣慰一一認承叩頭感泣於初三日回江去訖提臣仰體皇上好生之德廣行出示招徠恕其已往許其自新江壩一帶先後就撫投誠者業有一千六百餘户男婦八千一百餘名口現在安插得所其仍有未歸夷民並查遺存米穀牲畜嚴禁兵役不許擅動計穀二萬餘石牛羊無數俾各寨夷民歸家仍有過活其招徠撫慰之方無不僃至嗣後十一版納頭目俱赴營投見聽候差遣獨猛臘一版納頭目因係刀正彥之死黨伊父前已被擒解省故猶觀望不前且聞首惡叭瞻等俱逃往蟒撾邊界現被堵住不放過去更須捕緝未便聽其竄匿提臣郝玉麟已遣提標遊擊施善元帶領漢土官兵一千名於十二月十八日自橄欖壩起程由猛籠猛慢一路前進沿途善為招撫密訪首惡踪跡得有確信即行𠞰捕母得株連良善又差遊擊徐成正帶領官兵六百六員名前往猛臘地方擒捕刀正彥之餘黨并相機招撫又於大江橄欖壩九龍江三處搭起浮橋三座濟渡行人業已如市大局已定蟒國之整鉛有緬文給猛籠叭先云大兵不必進來橄欖壩的人造反如走到我們地方我們自然拏解等語看此緬文甚是恭順隨令宣慰司同叭先照寫緬文令其堵截并云不可容隱一人若容留住坐大兵進來恐擾及你們地方等語專差持送去訖諒此逆夷斷難漏網惟須安定人心或不致煩勞兵力也今總兵官張應宗已至行營提臣郝玉麟將招撫户口查存米穀移交張應宗並副將邱名揚知府遲維璽經理江壩兩處無須多兵擬留漢土官兵二千五百名餘悉撤回儘可足用兹准提臣郝玉麟札稱善後事宜雖前有成議必須與臣面商酌定且總兵張應宗諳練情形自能料理惟緝拏首凶一著不須提鎮同駐於正月望後起程赴省俟擒獲首犯安置羣夷并將建立城垣安設營汛流官等事逐細妥商另行分案省情由再行奏聞再臣前摺內荷蒙硃批著郝玉麟前往甚是一到自然成功者專候捷音邱名揚想今大愈矣欽此又臣摺奏郝玉麟條內荷蒙明伏乞聖主睿鑒臣謹奏覽同日又奏為報明𠞰撫阿驢夷蠻已靖現在撤師回汛事竊照阿驢部落糾衆截殺官兵逃往川屬阿都阿不囉地方仍多抗拒總兵官張耀祖分兵三路川提臣黃廷桂分兵五路各於境界內搜捕緣由經臣具摺奏明訖續據遊擊張世傑呈稱十一月初九日到者呢地方搜箐有逆蠻恃險藏匿卑職率兵直入施放鎗炮打死二名活擒一名其餘滚巖逃竄初十日至特衣庫據千總羅朋差報有逆蠻數百潛過索橋卑職同哈參將帶領辨兵追至江邊搶奪索橋逆蠻俱已逃遁過橋奔上西烏路􅋭藏躲卑職等占住要隘令千把等帶兵過橋攻􅋭逆蠻大放擂石各官兵冒險爭先奮勇直上攻克西烏路􅋭被鎗炮打傷滚巖死者數十餘人活捉逆蠻男婦九名口十一日追至阿姑轆􅋭逆蠻大敗官兵追殺鎗炮刀傷撲巖死者不計其數活捉男婦十三名口一併解交哈參將行營據總兵官張耀祖呈稱三路官兵搜獲解到賊犯內訊得有阿驢所管賊蠻三十一名賊首拉金所管賊蠻十五名俱係截路傷害官兵之犯隨於營前斬首示衆又據參將楊馥報稱十一月十九日率領官兵分路搜捕拉金父子捉獲大小男婦十一名口據參將哈元生呈報十一月二十四日派撥辨兵捕緝賊魁擒獲賊蠻男婦大小共四十一名口據遊擊卜萬年康世顯咨稱捉獲巴布一名呂呂令其引路搜至烏魯特箐內突遇猓賊與官兵對敵捉獲男婦二十五名口又搜至呢勒箐內見有猓賊聚集率領官兵扳援而上賊蠻放擂石打傷通事官兵緊圍鎗炮打死多人隨後窮追於夾箐溝內擒獲男婦九名口又於著窩呢勒箐捉獲夷猓二名遇賊蠻拒捕我兵奮勇斬殺賊首一十三級捉獲蠻賊十名大小男婦三十一名口賊等願將家小留營作當立限拏拉金即撥那窩那各部夷十名協幫訪查於磨路區及帕膩鄰近各箐內搜獲賊十九名內將者呢夷賊鍋者等八名梟示又據參將楊馥呈報十一月二十六日分兵於硬你硐搜捕賊來獲拉金兄弟家屬千總林發正帶兵於小溜索河擒獲賊蠻二名又據遊擊張世傑稟報十二月初六日帶漢土官兵於索橋一帶沿江搜箐有逆蠻十數人各帶弓弩藏於箐內拒捕鎗傷一名活擒白窩者市二名餘滚巖逃散准川提臣黃廷桂咨稱阿驢苗蠻不法川屬阿都拖科等苗幫兵助惡已經搗巢搜𠞰查勾結幫兵原止阿必加樂二逆聞大兵將至鼠竄潛藏其餘無知苗夷畏懼逃匿故議建昌鎮暫駐布特逐處招撫並密屣阿必加樂去向今准建昌鎮咨稱責令將備派遣千把外委同伙頭等於各山箐分頭搜尋已將阿必加樂并阿必之子脅獻來營詢明擒縳解交鶴麗鎮收審尚有拖科覺過未獲俟獲日另解又據張耀祖呈稱因拉金未獲本職嚴諭滇黔漢上官兵於各山箐逐地窮搜並飭令參將楊馥守備馬似龍祿鼎坤嚴比帕膩將拉金勒限早為擒獻本年十二月二十五日據馬似龍祿鼎坤稟稱嚴飭帕膩叔姪勒獻拉金本月二十四日酉時帕膩叔姪解到拉金卑故一名古故一名者薩一名阿英一名共父子四名為此差目呈解等情據此本職隨即審訊解到拉金父子四人據供長子一名者故前被官兵拏獲現今拘禁營盤等語本職隨即提出與伊等對質果係拉金長子除嚴加禁守同應解審各犯並家屬人口不日起解發審外至於川界地方助逆之拖科覺過今四川提督現在嚴督官兵極力搜擒自難漏網拏獲之夷民子現交烏蒙府好為安插今阿驢地方𠞰撫已盡無需兵力除將滇黔漢土官兵於十二月二十八日自務都撤師起程回汛外理合呈報各等情到臣該臣查得阿驢猓賊傷害官兵其造謀聚衆拉金原屬首惡今賊首者呢與阿驢土官先已解省頭人亨以夸等及拉金之眷屬人口咸已就擒而川界助逆之别哺加樂阿必亦經川師拏解前惟拉金未獲續據總兵官張耀祖呈報於十二月二十四日祿鼎坤等拏獲拉金父子等軍務已竣即於二十八日撤師今於正月十七日已經抵省除解到拉金等飭發按察司審擬招解并將撤師日期具疏題報外所有𠞰撫阿驢事竣回師緣由合先奏明再查烏蒙金沙江外屬滇轄者無幾經此番懲創之後猶易控制獨川屬之苖蠻地既遼濶人更獷悍兵至則散兵撤復聚𠞰之既難撫之不應故以川提臣黃廷桂之調撥進取頗識機宜加以兩總兵之協力諸將士之奮勇而於阿都阿不囉地方川蠻猶敢三次劫營毫無畏懼是其天性凶頑實同惡獸因知阿驢之變非僅哈元生之激成而誦臣奏前事摺內硃批便捉拏一小土官即至如此橫逆此風豈可長也亦不為僨事欽此乂於續奏摺內荷蒙硃批朕前已有諭㫖料卿必參奏者以哈元生之任事豈忍將此等事治罪也況朕已用伊安籠總兵矣題到之日朕或令將功贖罪或寬免處分再斟酌有㫖欽此臣伏讀之下實不勝感切念哈元生肝膽足用效力殊多臣前題請由元江調補黎平協副將原欲俟古州事定請參以警其後至於總兵之任伊必能報稱並不在諸鎮下也合并聲明伏乞聖主睿鑒臣謹奏覽同日又奏為奏明事雍正六年十二月二十日承准和碩怡親王大學士公馬爾賽大學士張廷玉蔣廷錫寄字內開雍正六年十一月初六日奉上諭據田畯奏稱八達寨苖㺜𠞰撫事竣其中擒獲把事漢姦現今拘禁西林州等語朕思苗猺本屬蠢然無知其肆惡抗橫擾害地方之處俱係漢姦從中勾引此等姦人平日為匪犯法本籍無所容身是以逃至苗猺窟穴生事把持多方煽誘以致抗法害民其情罪甚屬可惡何以向來𠞰撫苖寨未聞拏獲漢姦嚴行究治者今八達寨把事漢姦未必止此數人而從前烏䝉鎮雄諸處亦必有漢姦煽引等情爾等密行寄信與鄂爾泰可留心訪察嚴拏究訊勿使漏網欽此遵㫖寄信前來總督即遵奉辦理可也等因到臣該臣查得烏蒙鎮雄叛案內有劉建隆王之瑜畢君廷俱係漢姦謀充烏鎮二土府之主文生員范紹淹鑽充鎮雄掌案縱容夷目劫殺為害地方及至提審即勾通逼脅預謀拒敵官兵當經拏獲審擬具題劉建隆王之瑜范紹淹奉㫖正法畢君廷因未共謀拒敵部覆行令遣戍此外並無另有漢姦貴州長寨頑苖謀拒官兵一案內有川棍李竒楊世臣汪子謙等及貴州武舉厲紹逺州役黃應甲均係漢姦為川販護符為凶苗主謀俱經題請處決訖其鎮沅茶山等處夷民蠢動皆惡目土舍倡謀號召查無漢姦在內煽惑勾引凱里丹江等處巳拏獲販棍數名並姦細一名臣業經發審並嚴飭查拏至廣西八達寨擒獲之把事漢姦查把事名色即係㺜寨管事頭人早經發審其所有漢姦臣前並未據報現在行查並留心察訪務當嚴拏究訊斷不使伊漏網所有烏䝉鎮雄諸處原有漢姦已獲正法緣由相應奏明伏乞聖主睿鑒臣謹奏知道了漢姦甚為可惡當嚴究緝者雍正七年二月二十四日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正七年二月初五日臣齎摺家奴蒙恩賞銀十兩馳驛齎奉欽賜臣錦絲盒盛上御寶帶一圍又黃匣一箇內洋漆盒盛御用團圓餅滿器並瑪瑙盒硯瑪瑙瑞芝法琅鼻煙壺各一鎮紙火鐮包各二共八件又元旦令節御宴珍食二匣鹿舌鹿尾鹿肉共一簍養心殿製爐二座人參十斤藕粉十包哈密瓜二圓蜜橘蜜柑共一簍回滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖復據家奴口傳奉內裏大人面諭這餅是中秋圓月的皇上元旦日在宫內同用這團圓餅特留出一塊賞總督等語臣敬聆之餘聲淚俱咽神魂靡寧謹率同臣妻並臣子鄂容鄂實鄂寀鄂寧鄂宓等合家叩首均勻分食竊謂都俞喜起實不足以為喻家人父子猶無可以比倫此即負心賊子聞之亦應感泣況臣天性具存良心未昧自問何人是誠何以當此及敬啓摺扣跪誦硃批言言訓勵字字矜憐不敢卒讀不能仰視念臣爾泰叨荷殊恩至矣盡矣此生此世即欲圖萬一之報知必不能天地神明是鑒是察生逢堯舜有不勉學臯蘷而僅以漢唐諸臣自處是已暴棄之甚者倘並漢唐諸臣之弗如其何以自甘然心勿敢懈才不能堪終恐無補封疆負我慈父為天下後世笑是則臣之所日夜悚惕難以自安者也念輒驚心言輒淚下感頌之詞並不能著一語欽賜寶帶惟當敬謹祕藏為臣家世寶亦並不敢具本謝恩謹此繕摺差臣家奴齎奏恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝至誠肫摯朕動容嘉悅覽焉同日又奏為恭謝聖恩事竊臣家奴回滇口述正月初八日內裏大人傳㫖你到怡親王處去有交給你的事情如今日交給你你明日就起身奴才隨於初九日赴府䝉王爺面諭皇上賞總督內庫銀四萬兩你回去說知著來請領欽奉此臣敬聞之下不勝歡忭不勝激切伏念臣自䝉聖恩拔置大任計六年以來所應得養亷何止十萬即用度之外存留多餘以置立田産非力有不能獨以公事未畢未敢計及家私是以至今京中臣並無房屋並無莊田除隨任家口外亦並無一家人在京昨歲兼理撫篆多得養亷銀九千兩除添用去賞號尚有六千餘兩臣曾用七百兩贖出舊典老屋再添數百兩拆造裝修為臣祖父改置祠堂並用九百餘兩再於墳園立碑三通以表祖父墓道仍存三千餘兩現貯司庫僃公擬俟祠碑事竣然後可及房産以立家園原非敢矯情實不敢悖理也況託賴聖主仁威諸事就緒總督養亷歲計有餘即臣自謀生理已甚屬充裕且臣天性儉約不事浮華除衣馬犒勞原不敢茍簡以損大吏體統此外則别無枉費至臣妻在署衣服不過紬絹並無首飾叉釧等物至今如常感恩遇之過隆痛父母之不逮實不忍令妻子輩受享奢靡以重臣罔極之悲也兹復䝉特恩賞臣內庫銀四萬兩仰窺聖慈神愴氣咽計屋舍田園兒女婚嫁即終臣之身下及孫子皆可從容富饒即屬庸人亦毋須别營私槖以自玷身名矣憐愛之深衷成全之至意感極無言祗領何辭但臣京中既無家業又無家人即欲置房産一時亦難妥當仰懇聖恩或准於滇庫餘銀內暫且動撥臣當陸續支領除置買田房外餘留僃臣需用庶不至虛糜聖賜而有忝殊榮矣除啓覆怡親王候文遵照外謹繕摺具奏恭謝聖恩伏乞睿鑒施行臣謹奏好已面諭怡親王矣王自有料理說與七斌來同日又奏為據實陳明仰祈慈鑒事竊臣恭報祥雲一摺荷䝉硃批嵗前冬初聞卿每患脅痛少覺氣弱朕思此皆憂思之所致朕至不忍有諭慰問蓋以諺語云心病還須心藥醫若邀上天慈恩聖祖賜佑各處軍役就緒時我鄂爾泰自然全愈非目下空言慰問所能解者所以忍而未頒諭問今天祖慈佑三處俱陸續報捷又覩此罕遇之嘉瑞想卿必然心怡神暢諸微疾得全愈矣目下卿體如何去冬不爽時如何光景可據實奏朕莫隱凡人能一念專誠聚精會神勤勞二字實不妨然憂心焦思則萬萬不可且亦於事無濟當切戒之況世情冷暖人事參差明天理達人情者有幾只可盡一已之心以對越上天則修齊治平之道俱備於中矣其他入海算沙之類又何足與較凡事當酌量精神體察能否不可任力不能勝之事不可費思所不及之心夜眠若稍覺不靜日食若少有不美則當慎節而不可勉强從事也可必遵朕諭行欽此臣跪諷之下感痛失聲及今二十日每一捧誦猶不禁淚墮盈襟莫能自解也念臣爾泰受恩深重報稱實難惟期矢此血誠以自免背負世情人事原非所敢知雖身本羸瘦然精神自强並未敢以物欲縈心亦何來有疾病攖體緣去嵗秋冬諸務叢脞哈元生失事於川蠻橄欖壩犯順於慢磉八達凶㺜屢挫官兵丹江逆苗肆行抗拒臣每接禀報自慚疏庸自思罪過輒中夜坐起不敢安寢凡一應軍前文書隨到隨投立即批發不敢少遲時刻而浮議紛騰造言雜錯雖明知為誑言或竊恐為實事心力交迫眠食不遑逮十月初左肋下隱疼漸及胸膛腔內聞血腥心氣微覺下陷時不能見官視事卧榻者僅三日續靜息調攝亦漸次痊可及萬壽令節五色雲現後各路官軍紛馳報捷臣不勝慶幸踴躍忘疲旬日之內遂已全愈今且精神加旺餐飯增强較未病時更覺壯健矣此天恩之下逮實聖心之上通稠人䝉福而不知微臣當身而自省竊謂知慎節戒憂焦此病藥也明天理達人情此心醫也伏讀倍加敬畏之心一念專誠聚精㑹神之諭覺於心病得醫心之藥並於心醫得醫心不病之藥其入海算沙之類不但不忍與較正恐稍自墮落即與於入海算沙之數更為人所不足與較者也臣雖鈍根敢不奮勉至訓諭諄諄令不可任力不能勝之事不可費思所不及之心夜眠不靜日食不美則不可勉强從事雖慈父之憐弱子無以加此臣復讀至不忍有諭慰問句我鄂爾泰自然全愈句忽念臣父母復不禁感痛失聲無以自解也夫勞逸不在形骸疾病無關性命忘身而身存廢心而任事臣必當時時警惕自愛自重懇祈聖慈母為萬里逺臣慮也緣奉垂詢用敢瑣屑僃陳伏乞聖主睿鑒臣謹奏覽卿更覺壯健之奏心怡神暢實慰朕懷朕揆天理人情所見不謬矣何慶如之同日又奏為奏聞事竊照滇省橄欖壩逆夷不法調遣官兵進𠞰大局巳定止猛臘一版納尚未平復緣由經臣節次奏明在案續據遊擊徐成正禀報奉令帶兵進𠞰猛臘先令各版納前往招安正月初八日行抵猛半地方差探猛臘已於險要關口打木城二道用數百人把守卑職率領官兵進頭道木城劄營示以攻取刀正彥之子召糯隨即遣人投見情願歸順卑職單騎直入開諭招安當招出橄欖壩百姓二百一十三名口小頭人四名押赴提督行營聽候安插并責令召糯同各版納往招各賊首據遊擊施善元禀稱帶官兵前往猛籠過籠得壩招出各寨逃避夷民一百九十六名口緣係蟒界恐蟒國夷民懼怕逃躲隨遣叭先帶能事頭目土兵往整亢漫牛等處誘撫正月初九日據叭先回禀橄欖壩擺夷共來八寨今先令七人前來投誠餘俟陸續方能到齊賊目俱分散逃躲分遣誘擒有九龍江頭目具緬文知㑹宣慰刀金寶云猛拏叭憨巳差人拏獲賊首叭瞻叭素宰雅三犯現在差人往探虛實據楚姚鎮總兵官張應宗呈稱自正月十七日起至二十三日止又招出各寨夷民一百户共男婦七百五十二名口俱交宣諭刀金寶各安住牧又據徐成正禀報召糯同各版納在蟒國地方招出橄欖壩流夷四百一十三名口卑職在猛臘又招出二百八十名口俱押赴張總鎮行營安插再被阻外域之元江目兵康天錫等并客人六名夷目二名今於正月二十七日老撾國差叭目二名先目四名土兵五十名護送同來回到職營並據康天錫禀稱老撾來目說備象二條情願歸入內地未知確否等情臣查橄欖壩夷民歸誠復業者已萬餘人賊首叭瞻等三名既據報獲其餘一二犯定難漏網至於遠服外域備極恭順此實我聖主至德深仁化被誠通之所致臣已隨差齎蟒錦縀紬布匹等項去賞老撾來人願歸之說聽其自便並令不必言及其應安設文武流官等事提臣郝玉麟於二月初九日到省臣已與面加商酌現在詳慎定議分疏具題又開闢貴州生苗地界事巳就緒惟地廣人衆諸凡善後圖維務須詳加布置臣亦節次奏明兹據遊擊史應貴禀報伊等在雞講營盤宰牛款諭大小各寨苗人明誓飲血埋石為記據稱情願永作良民每年上納錢糧再不敢作歹違抗據參將趙文英知縣魯朝聘禀報伊等在八寨行營正月初八等日有里條乜告烏達楊烏擺桌番扛竹留等寨頭人赴營上納條銀埧固排卡擺牌等寨頭人赴營就撫割具木刻認納錢糧據鎮逺府知府方顯呈報又招撫得清水江柳受柳利二寨生苗計一百九十二户楊遼番招等寨計七百六十户等情是生苗前已畏威漸且向化設鎮安營當凛體聖訓詳慎料理以圖永遠安帖可也又安順一帶前所化生苖應勘明界址收納錢糧臣先委副將劉成謨知府朱齊年何經文等前往辦理今據禀報公同分勘界址陸續收過生苖糧銀已三百二十六寨深山窮谷恃險負固之生苖無不紛紛向化實有欣羡良民之心近又化出生苖二百四十七寨尚有二十餘寨不出投順隨佯作進𠞰之勢再遣人化誨各寨生苖現俱歸誠願預納雍正七年錢糧職等一遵指示到處奬賞科賦從輕生苖歡幸現已直達粵界等情臣查安順定廣鎮寧永寧永豐等府州凡與粵接壤皆係無管生苗近一年以來並無劫殺案件是亦歸化之驗應俟勘明界址分歸各州縣營汛管轄即當另行題報以上三件實係滇黔兩省極邊要務所有續報情事合再一併奏聞伏乞聖主睿鑒臣謹奏欣悅覽焉皆賴卿忠誠任事之所致者宣示廷臣無不歡欣慶幸但此歸化生苖人數衆多地方遼濶善後事且最為切要卿奏云人頗以為較易而不知愈應作難事觀此論甚是朕復有何諭也即此一念辦理未有不妥協者可與張廣泗悉心料理奏聞同日又奏為奏明事竊照地方水利攸係民生而在滇尤屬急務臣自受事以後即檄行各屬凡有河道俱查明詳報以憑次第疏濬嗣聞嵩明州之楊林海又名嘉麗澤自東至西廣二十餘里自北至南廣十五六里一納東北龍巨河水來源一納西南南沖河源餘皆山溪小水積聚成塘合流出於河口歸車紅江水口甚低原易泄瀉緣河灣迂回曲折不能直瀉以致四散汪洋又藥靈山下有石子流沙衝入河口壅塞咽喉去水太緩故海邊四十八村巳成田畝每年多被淹沒為害實甚臣細加採訪此海水原不大深若改疏河道由丁家屯開穵里許直達龍喜村面前再開里許直抵河口使新舊兩河并瀉水勢即可暢流不惟已成田畝可免水潦而周圍五十餘里草塘均可開墾所費無多為利甚溥前督臣高其倬曾據紳士呈請亦經委官踏看因應開河身之處不無成熟民田時被該地襟棍阻撓遂爾中止臣因一面出示明白曉諭并行布政司委員查勘估計工費并查補償田價共該若干造冊具詳續據該司詳稱委員丈核所費田畝里數酌定人工於雍正六年正月十六日祀土興工隨據四十八村里民咸稱情願幫工莫不踴躍從事乃有龍喜村之官華等仍逞故智妄行抗阻經臣批飭將為首之官華楊國英二犯枷示河干限完工日釋放自此里民得以併力不數月而報竣茲據嵩明州知州安鼎和禀稱修濬工畢水勢直達河口前之迂回曲折者今則順流而下前之泥沙淤塞者今則通達無滯水得所趨而沿海田地漸涸卑職履畝查勘共清出中則田四百一十畝下則田一千七百零七畝中則地一千一百畝下則地六千九百五十畝二共一萬零一百六十七畝共科秋糧米麥一百八十四石九斗九升零科徵條編銀九十二兩五錢一分二釐零仍給本主輸價領給遵照永逺管業於雍正七年起升科納賦等情臣於赴黔之便更經臨河親勘沿海居民莫不歡幸是舊有田畝可永免水患而新出田畝亦少為民利矣又查自滇至粵原有河道雖因盤灘險阻不能直達省會然自臨安府屬之阿迷州有燕磁硐河流一道可直達大河自燕磁硐疏鑿可以通八達汛而臨安屬之箇舊金叉坡等銅厰離燕磁硐不過百里餘自省城水路抵晉寧起岸至彼亦不過三百里既與厰地相近運發銅斤甚易又離鑄局不逺盤運錢文復可省腳價似此便宜水道所應急為開修者也臣早行令各州縣造麻陽鰍船數隻先為試演併令糧道發銀交給委員前往興工並令沿河州縣官照界分辦其自八達至黃土一帶河路咨㑹廣西撫臣委員會勘務期開通一俟告竣則阿迷至粵可以安穩行舟往來商賈有千百年之便利矣又雲南府之滇池海口及金汁等六河并各處堤岸壩閘必疏濬深通修築堅固庶足資灌溉從前雖有嵗修要皆潦草應事坍塌淤塞率以為常臣於上年冬繪圖為說檄行雲南糧道遴委河員公同地方官查看議修嗣據該道黃士傑親勘詳覆昆明之滇池為呈貢晉寧昆陽等四州縣衆水滙聚之區而海口大河又為泄瀉池水之要道沿海各州縣田畝每患海水漫溢全賴此河泄瀉稍有淤塞則沿海田畝輒遭淹沒今親歷河干細閲形勢勘得大河南北兩面俱山皆有箐水入河每至五六月間雨水暴漲沙石併流衝入大河而受水處河身平衍易於壅淤如北面有白塔箐臘龍箐二水合流泄入大河名耳宗閘壅淤之患猶小若南面則有瓦泥箐邢家園二水屬呈貢縣轄名普安閘有羅武箐一水屬晉寧州轄名清水閘有天自箐芭蕉箐二水屬昆明縣轄名新村大閘皆直瀉入河中每年疏濬於農隙之時即壅塞於雨水之後不穵則淹沒堪虞開穵則人工徒費四邑沿海人民重纍難堪兹查大河下流水勢漸陡至石龍壩奔流跌注入安寧州大河再勘得南面之平定哨一閘係雲龍箐水歸入大河之道正值水陡流急之處本道相度地勢咨詢輿情咸稱南面宜開一子河引普安清水新村等閘之水同至平定哨閘入河則泥沙石子不能停住一勞可以永逸但兩畔俱有成熟地土今議另開子河其應穵去地畝應給價值或查欺隱抵補其所用人夫仍照例於四州縣派用添給口糧而各州縣人民皆歡欣趨事現在督工修濬等情若此子河開成則昆明等四州縣可永無水患而實獲水利矣以上三件除楊林海業已工竣滇池海口通粵河路現已興工所費錢糧核計不過萬餘金即以開河漲出田畝變價充用或有不敷騰那甚易總不須動支正項並不須開銷贏餘理合一併奏明伏乞聖主睿鑒臣謹奏有何可諭可謂超羣拔類之辦理為從來封疆大臣未舉之善政也朕為滇南赤子曷勝慶幸凡此等有利於地方民生之事若有應動正項者只管奏請不可瞻顧竭蹶從事同日又奏為覆奏事竊臣請將雲南按察使元展成調補廣西按察使摺內荷奉硃批元展成光景是一大人物人人言好二人互調甚合朕意已有㫖矣路途遙逺且不必令來引見著赴新任料理一二年再著來見朕又批著他奏摺來人令到怡親王處轉奏朕隨事批諭訓勉之料伊必能領㑹也欽此欽遵臣即傳元展成赴臣衙門密宣著他奏摺令到怡親王處轉奏諭㫖元展成跪聆之下感激涕零據稱誓竭駑駘始終弗渝以期仰報聖恩於萬一比值部咨亦已到滇臣隨令其將經管之銅厰錢局事務以及發運銅斤查明交代速赴新任一面與撫臣沈廷正會檄布政使張允隨署理臬篆去後兹據元展成呈報銅厰錢局諸務俱巳造冊移交糧道黃士傑管理並無絲毫虧空發運吳楚粵西三省銅斤除銅本水陸腳價官役盤費等項尚應有節省獲息銀共約二萬餘兩分析造冊送臣備案俟銅價到齊悉行歸公元展成臬篆巳交即於二月二十四日起程前赴廣西新任等情臣看元展成心地才具皆可以有為若復得邀聖訓識力日增將來大有成就至雲貴兩省屬員內如曲靖府知府劉斌威寧府知府吳士鯤開化府同知楊正輔陸涼州知州祖良範楚雄縣現報丁憂知縣李文炯俱係年力精壯兼有才幹實心任事之員以之升調廣西皆可資料理除祖良範明白勤慎於應安撫之地相宜臣巳遵㫖請補泗城府知府其廣西最要府州等缺如現任守牧或人地不甚相宜臣自當據實奏請酌量調用惟是知人甚難無可自信即如黃炳其向來行止居官穢聲臣並非無所知聞因伊在滇數月時與晤談見其多改過之言有上進之意更以伊父子俱受同日又奏為遵㫖酌覆事據雲南撫臣沈廷正前具摺奏請將知府直隸州承審本府本州地方命盜等項案件令解赴該管道員衙門覆審屬藩司者移解藩司屬臬司者移解臬司審明轉解督撫等因荷䝉硃批沈廷正此奏卿酌量行之欽此欽遵該臣查得守巡二道雖分司盤查屬府倉庫督催刑名事件原無承審之責親轄地方之知府與直隸知州凡有欽部命盜重案俱係自行審招徑解藩臬二司勘轉歷來已久如訊供不確擬罪不當情關重大者兩司駁行覆勘無甚關係者照例為之改正設藩臬所審不公或依樣轉詳尚有督撫核審指駁未嘗不其詳其慎即如發審重案或轉發府審由司勘轉或兩司自審或招解赴督撫審題各省皆然若謂少一核轉衙門事便草率焉知不多一核轉衙門事反拖延總之定罪之允當與否全在督撫藩臬揆厥情理秉公推鞫則刑獄自無寃抑倘大吏不能明察茍且了事不特添一核轉衙門終為無益即委員調審亦不過虛應故事緣案件完結處不但不在府州並亦不全在藩臬也且各省道員不與藩臬同城駐劄者居多督撫又不時有差委之事若將欽部命盜重案俱責令審轉人犯必多守候拖纍之苦而道員與藩臬又俱平行設呼應不靈必致愈多遲滯據臣酌量撫臣沈廷正所請將知府直隸州本府本州案件解赴道員覆審之處似可不必行惟是道員既有督催之任則所屬府州縣無論事之大小係通詳者俱應並詳該管道員聽候批示庶以便查核臣查近來府州縣官初報命盜案則詳道官後有案中續詳之事止詳府司及府州審招亦不並詳該道而該道每避攬事之嫌亦率多置之不問比至遇易結不結之件道官限於條例同受處分殊屬未協臣於雲貴兩省業經面諭司道囑令照行獨以未有定例事難畫一臣請嗣後凡應道員督催督緝事件屬員有詳臬司之文概令並詳該管道員及成招解司時並將全招詳送該道倘有無故遲延承緝不力許其按限勒催罪名不合許其指摘詳揭庶事有專責而執掌亦不致廢弛矣謹此議覆伏乞聖主採擇施行再沈廷正於二月初一日到任視事臣將滇省一切事宜詳細告知聽伊料理隨於本月十八日自滇起程前赴貴陽先辦黔件候金鉷到日再商論粵事合併陳明臣謹奏是其應行處應題請者可具本題奏雍正七年四月十五日雲貴廣西總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安好今歲飲食肌肉更覺增長健旺卿好麼同日又奏為恭謝聖恩事雍正七年三月二十三日臣齎摺家奴䝉恩賞銀十兩馳驛齎回御賜臣御服銀鼠袍褂二件果乾五種共一匣乳餅敖爾布哈四種共一匣抵貴陽臣隨郊迎至公館恭設香案望硃批仰見我皇上用人行政恤兵憂民及一切方略一應施措莫不一本於至誠一出於至敬祥垂天象聞喜若驚瑞現地靈披圖彌畏撫綏征伐有事而無心和豫豐亨籌先而慮後此誠上聖之心傳萬年之政要臣愚管窺實無可名言惟有凛體聖訓勤宣聖德俾文武同官以及邊逺微末咸知身際隆遇千載一時不甘自暴自棄各勉作完人是臣之所以盡職即臣之所以報國也今嵗滇黔二省晴雨以時春熟加倍粵西去冬大雪今春雨足據金鉷面告並詢來往官辨皆稱十分收成除俟該司等彚報到日另摺奏報外合先陳明為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏欣悅以手加額覽焉同日又奏為奏聞事雍正七年四月初十日據雲南廣南府知府賈秉臣廣南營參將馮鸞禀稱本年三月初七日自午至酉見日旁五彩旋繞如環上戴一環下承一環三環相扣色皆五彩環外霞光萬道光之外又有五色彩雲擁護光華耀目五色繽紛卑職等逢此上瑞不勝踴躍理合繪圖禀明等因到臣臣查文獻通考及天文志言氣在日上者為戴戴者德也國有喜也占曰人君德至於天則有戴戴者推戴福佑之象又曰氣在日下者為承承者臣承君也名曰承福人主有吉喜且得地有不戰而降者又曰日暈五色有喜等語竊思戴與承及五色皆係分占未有有戴有承三環相扣環外五彩霞光光外五色雲擁如今日現於廣南府者臣淺見寡聞未識主何瑞應敬遵雲物必書之義依照原圖繪呈御覽伏乞聖主睿鑒諭示施行臣謹奏上天垂賜昭祥照例題奏可也同日又奏為覆奏事竊照貴州布政使鄂彌達摺稱黔省田土報墾寥寥隱匿自多應將曠闕多者先為清丈如實在曠闕者招佃給本開墾如已舉首及巳報墾而為官吏侵蝕分肥者即為參革究擬如係豪强地棍侵占者嚴拏治罪等情奉硃批清丈之說萬不可輕舉與督撫詳悉斟酌看汝此奏甚屬孟浪汝不諳外任事事不可如此任意亂行當著實與有識見歷練人商酌慎重比不得旗下部院中事也欽此又一摺內稱黔省有官莊學租一項額徵米三千九百三十六石九斗五升零內除支給鋪兵米一千九百三十九石三斗餘作賑濟寒生窮民報銷其實悉為各衙門官役食用署撫臣石禮哈奏明變價歸公分給各官養亷前司祖秉圭以職官不便分沾貧民之食定議各衙門人役支給食米外省城貧民寒生歲支米六百石各府州縣支貧民米一十一石四斗寒生米五石今查生員之內貧富不等應令各教官查明實在極貧者取結撥給孤貧一項確查建有養濟院房屋在內居住之孤貧照人數支給各衙門人役停其支食各屬罪犯解省覆審俱是沿途求乞應每名日給米八合餘米變價解司買米存貯平糶等情奉硃批此詳督撫之事汝如何如此自立得主意將此二摺硃批與督撫看欽此前經鄂彌達敬録齎示臣隨細看原摺伏讀硃批當經札商前撫臣沈廷正兹復與撫臣張廣泗面商籌畫飭令鄂彌達轉行遵照外該臣查得黔省田土向來原有荒蕪邇年人煙漸廣陸續首報開墾已多今臣赴黔目覩高低山坡俱已開穵成田大道兩旁空土亦俱耕犂種植若以捐納銀兩再招民開闢將來自無曠土惟是民間成熟田地自吳逆變亂以後多有隱占不清又有詭寄隔府隔屬之弊遞年閃躲遂致錢糧無從追納姦頑每享無賦之産額徵數目尚多虛懸是欲清田畝必先清地界凡各屬之雜錯窵逺地方俱令就近歸糧人隨土轄將縱有詭寄而稽查較易矣至於清丈之說固萬不可輕舉即先丈曠闕數多之州縣仍係清丈亦未便舉行莫若寓丈量之法於聽訟之中除剴切勸諭令其自行首報照例升科外其凡有爭告田土者即委履畝勘丈實者按律虛者反坐並但查額荒不查新熟若荒無著落即熟係欺隱再將實在欺隱訪聞的確者偶一摘丈懲一警百庶良民無擾姦民無辭而賦課亦可以漸增矣其官莊學租米石若將寒生孤貧通行查報撥給無論是虛是實人多米少萬不能遍賑不如仍就所見照舊薄施至罪人在監在途報故者甚多名為病故實多瘐斃在州縣官未必盡屬無良而無米之炊亦殊難措辦所有此項米石除支給鋪兵鳴贊生口糧及照前分賑省城各府州縣寒生窮民外餘米應留充囚糧獄食并照前署撫臣石禮哈原議歸公似均有實際合併覆奏伏乞聖主睿鑒批示遵行臣謹奏是卿酌量為之丈量之說朕言其不可輕舉未言其必不可行也恐鄂彌達孟浪不達因有此諭況如四川通省現俱清丈行之得宜何妨乎同日又奏為奏聞事竊臣於二月十八日自滇起程赴黔沿途查看營伍考驗將辨於三月初七日始抵貴陽隨與撫臣張廣泗商酌苗疆事宜並定議黔省一切事件至本月二十六日粵撫臣金鉷到黔臣等遵㫖㑹商粵省諸務據金鉷凡於地方文武兵民等事俱曾留心伊單開各件將情形原委詳細商問臣皆實據所見直言可否聽其斟酌伊無不首肯喜形於色並有照如此辦理廣西事一年內皆可就緒我不但不敢負聖恩亦並不忍令總督再分心費力等語隨於四月初八日自貴陽起程去訖臣看得金鉷肝膽血氣人如金鉷者臣實愛敬之願其更加精進也至臣報明丹江摺內荷䝉硃批張廣泗此番親往安撫當著實詳慎朕意若多帶兵役恐新撫者疑畏少則苖猓之性又未可深信也與張廣泗悉心籌畫為之諒卿未有不念及此者特將朕意諭來若可令屬員代往似覺更妥何必又多此撫臣親往之名也若有必應親往之情仍多帶兵役隨從為是欽此臣按八寨丹江雞講清水九股八萬等處前後陸續歸誠者雖已八九萬丁口然苖猓之性未可深信實有如聖諭倘開導安慰稽察防範等事少有未協恐不能保無後患況古州一帶地方遼濶必查勘的確始可定議又過江深險之地如公鵝雞擺尾數寨尚在抗拒緣公鵝離江較近恐開通之後不能肆惡隨勾結雞擺尾大寨以為黨援初雞擺尾本欲出投不肯助惡後為湖廣漢姦曾文登煽惑遂與合榔近與官兵對敵被官兵殺傷雞擺尾八人內有該頭人之子該頭人深恨為漢姦所誤隨將曾文登妻子舉家盡行屠戮從此不助公鵝是公鵝寨賊勢已孤無能再抗若不乘此𠞰滅公鵝招撫雞擺尾恐黔楚船路終有阻礙事關重大何敢不熟慮查屬員內並無可以代往之員是以囑令張廣泗親往駐劄柳羅地方調度並不必深入除軍前官兵原有數千又添撥六百名隨從張廣泗於三月二十七日自省起行昨據來札巳過丹江雞講沿路就撫生苗歡欣接送毫無畏疑計日今已抵柳羅矣在張廣泗自能幹濟臣復現駐貴陽以作聲勢料不過五月內即可以竣事至於新闢苖疆合㫖定奪合并奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為欽奉聖諭事竊逆賊曾靜詆毁天朝誣謗聖躬敢於天理絶滅計欲搖惑人心自投法網神實使之兹䝉頒示鈔録上諭一道共五十二頁復䝉硃批此因逆犯曾靜之諭朕欲遍示天下録來與卿看俟各犯至京審明尚另有諭㫖欽此臣敬誦數四不勝憤恨不勝激切仰惟我皇上至孝至仁至誠至敬憂勤惕厲旰食宵衣蓋七年以來如一日雖生殺豫奪事各有不同而威惠寬嚴行歸於一是此無論在廷諸臣之所深知外省官吏之所共悉即凡非盲瞶亦誰不見聞且古稱聖君哲后載在史冊者固屈指可數矣其德性事功及一切文章禮樂比我列祖較諸聖躬有過之無有不及即滿洲臣僚內無知無恥無殊異類者固不乏人其凡敦倫明理自省自立期於不愧不怍者律以漢唐諸臣亦誰甘不如乃逆賊曾靜揑造浮詞恣意狂悖暗布匪黨聳動大臣其所以能如此得如此者臣以為其事有漸其來有因如誣謗聖躬諸事若非由內而外由滿而漢誰能以影響全無之言據為可信此阿其那塞思黑等之本意為逆賊曾靜之本說也如詆毁天朝等語則江湖惡類山野狂愚不識天日者皆能造僞說而不至若此之甚此懷疑二蓄怨望諸漢人等之隱意為逆賊曾靜之藉口也今國家一統垂八十餘年與禽獸介於幾希麒麟鳯凰禽獸也而人不如傲象盜跖人也而禽獸不如天不能生人而不生禽獸又不能不生禽獸中之惡禽獸更不能不生如禽獸甚於禽獸之人天亦不可奈何不能奈何即還以問之天應亦無辭如逆賊曾靜者實甚於禽獸之人禽獸中之惡禽獸乃揑造逆書誣嫚狂悖此固聞者見者莫不痛心疾首髮竪皆裂者也兹人遍示臣民布告中外自非大光明大智慧無我無人惟中惟正固未有能幾此者天下萬世各有本心天地神明實鑒實佑臣無復多言謹繕摺覆陳伏乞聖主睿鑒臣謹奏為朕放心絲毫不必憤悶遇此怪物自有一番竒料理卿可聽之硃批諭㫖卷一百二十五之十欽定四庫全書硃批諭㫖卷一百二十五之十一硃批鄂爾泰奏摺雍正七年五月十八日雲貴廣西總督臣鄂爾泰謹奏恭請皇上聖安朕安卿好麼所奏瑞雲捧日一摺交內閣同日又奏為恭謝聖恩事雍正七年四月十八日臣齎摺家奴䝉陽臣隨郊迎至公館恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批許臣以肫摯勵臣以公正俯首捫心益深悚惕伏念屏除邪障易屏除私障難屏除私障猶易屏除殊恩特授陜西寧夏道聞命之下不勝惶恐念鄂昌年甫三十毫無歷練臣雖不時訓飭勉其自立然相隔萬里不見已數年伊即聖主睿鑒俯允施行臣謹奏同日又奏為奏報春熟事竊滇黔兩省山多田少民間終嵗之計半賴春季收成以資食用臣經檄行該布政司各將通省府州縣豆麥收成分數逐一確查彚具總冊呈報去後今據雲南布政使張允隨詳稱據雲南等二十府昆明等五十六州縣及東川烏䝉鎮雄威逺宣威恩樂等府州縣咸稱所屬地方田地髙低不一自冬迄今雨𤾉時若本年大麥小麥均有十分其蠶豆雜糧有八九十分不等相應據實詳報等情又據貴州布政使鄂彌達詳稱黔省今嵗雨水調勻凡民間布種油菜豆麥春蕎雜糧等項現在收穫如貴陽貴筑清鎮安南綏陽餘慶甕安湄潭都勻府清平印江婺川龍泉思州永從威寧大定等十七府州縣俱係十分收成其定番廣順開州貴定龍里修文安順鎮寧永寧普定安平南籠普安州普安縣永豐遵義府遵義縣正安桐梓仁懷平越府平越縣黃平獨山麻哈都勻縣鎮逺府鎮逺縣施秉思南安化石阡玉屏青溪銅仁府銅仁縣黎平天柱錦屏開泰平逺黔西永寧畢節等四十四府州縣俱有九分收成至於蠶豆有同日又奏為報明清江頑苗就撫攻克情形事竊照八寨丹江雞講九股八萬等處生苗俱已招撫寧帖惟清水江深險之地有公鵝雞擺尾等寨尚在抗拒囑令撫臣張廣泗親往駐劄柳羅地方調度添撥官兵前往勦擒臣暫駐貴陽以作聲勢各緣由於四月十五日具摺奏聞四月二十六日准張廣泗來札內稱十四日抵清水江行營詢察苗情周閲地勢已撫各寨俱依向堅切頑苗之敢於抗拒者獨公鵝柳利雞擺尾雞服黨白索白汗等十餘寨約計二千餘户又有僻逺零星寨分雖未公然出名而亦有潛來幫助者此等處所除公鵝一寨素稱强暴久為生熟苗夷之害實有難以德化者其餘各寨雖聽公鵝勾結然係烏合本不固結今聞自丹江統兵而下隨各自渙散柳利寨苗人遂自來坡下喊求叩見情甚可憫此義所當收雞擺尾等寨各自歸守皆有願來投誠之意公鵝一寨亦遣人懇求招安等語臣查柳利雞擺尾等寨雖夥同助惡亦難輕縱然既有可原之情即有可寬之法至於公鵝一寨先則伏路截兵繼復渡江挑戰威逼鄰夷指揮衆寨實屬巨惡斷難姑留況該寨緊逼清江盤踞要害將來疏通河道舟楫往來寧不遭其劫掠是務當乘機勦滅以計久逺者即或哀乞誠切義不屠降亦必令將倡謀造意諸犯擒縛投獻明正典刑然後收撫餘黨免其全寨誅戮庶幾威不損恩不濫以示羣苗方為妥計隨作札切致撫臣去後今於五月十七日戍刻又接張廣泗來札內開雞擺尾雞服黨等寨己陸續赴營願就招安公鵝久成孤立正可渡河擊之一舉而定時因連日隂雨河水暴漲山霧彌漫是以指揮既定而復罷者數四直至五月十二日天氣晴明遂於十三日撥派已定於十四日五鼓分遣將士酌量地勢先後奪船而渡頑苗先於江岸拒敵繼於箐林伏截逮我兵衝擊敗退猶復歸寨死守我兵鼓勇直前壞垣躍牆而入四面舉火燬其巢穴公鵝頑苗被傷斃擒殺及被焚死者甚衆新撫各寨苗民於山頭觀戰莫不且喜且懼至雞擺尾既經就撫前令提標守備任龍等帶領駐劄九股之兵在彼無事檄調前來適於十四日已到即分布兩岸劄營聲勢愈壯清水江路自可開通無阻矣官兵內銅仁協千總曹文元右腿微傷兵丁帶輕傷者八人皆可無虞等語臣因賊寨雖燬賊衆未必盡傷倘容其暫時躲避不竭力搜擒恐兵退而賊復聚又將有事應乘此軍威務將公鵝盡行屠滅此為上策如勢有不可或宣諭雞擺尾等寨併力攻取許虜其子女分其田土猶可得中策善後之舉更須慎重籌畫隨即札覆撫臣去訖除將先後勦撫事竣情由彚疏題報外所有清江頑苗就撫攻克情形合再奏聞伏乞聖主睿鑒臣謹奏嘉悅覽焉但善後事宜須謀萬全不可少有疑二頑苗經此一番懲創必有數十年之安靜若仍照舊安插可以相安則更可免異日之煩勞如卿信得及可一勞永寧又何憚而不為也此全在卿通盤悉心籌畫而為之者詳慎之同日又奏為奏明遍化生苗嚴懲凶犯情形事竊照貴州安順鎮寧永寧永豐定番廣順等府州地方生苗環處向居化外該地方文武各官既無從撫綏復不能防範以致橫行無忌恣意逞凶統衆則劫掠漢民恃强則殘虐同類視為慣常無人過問實數百年於兹矣臣欲漸施整頓以計安全是以商同提臣楊天縱委令平逺協副將劉成謨安順營守備熊權等並㑹同文員持示前往遍行化導歷將各緣由具奏在案今臣自滇赴黔陸續據報凡逺近生苗生㺜生狆並直連粵界如擺羅宗地最險極邊等處莫不聞風向化認納錢糧又有定番州屬榮歌等六寨生苗永寧州屬太平等十二寨生苗俱欲投誠內附因不識路徑特央求熟苗領赴行營并招同喜松等九寨生苗皆願預納糧銀歸化誠切自本年正月起至四月止共化出五百四十一寨合計前後所化生苗㺜狆共一千二百九十八寨五千九百七十八户男婦三萬五千九百八十二名口各認納銀米共合三百餘兩業經分編各府州就近管轄所有舊化各寨應納六年錢糧皆已完納新化各寨應納七年錢糧現已全完其沿途叩見及赴省投見頭人共七百零二寨臣俱傳集面加開導賞給銀牌紅紬其歡欣鼓舞合掌同聲願聽約束誓為善良之狀似皆出自至誠或可永無反覆但夷衆既撫凶頑宜除若少事姑息終必為後慮前據各文武禀報據頭人阿納控告擺頂之松奈寨頭人老錢傭虜伊董愛寨鮑六斤男女十口並阿慢家男女六口又虜伊那毛寨阿並家姊妹二口又虜打必寨阿成之子二口等情查老錢傭積年虜掠不止此數事該犯虜到人口或行轉賣或自役使必勒其本主父母將銀布牲畜等物換贖始得放回其肆惡一方實為巨害但擺頂一帶最為險僻擒拏不易隨委辨酌帶土兵前進埋伏令通事過話而老錢傭糾合把朝等六寨頭人率領夷衆二百餘名佩刀帶弩仍有逞凶之勢該辨等設伏計誘犯已就擒而附和之松奈把朝等寨感恩悔罪各准歸業老錢傭之妻子隨皆勒令投到再可老寨犯苗吳曰列前因虜賣阿燕之妻被苖首告隨差人往查該苖一聞差到即哀乞求饒赴營投順俯首伏辜且帶鄰苗三寨一同聽撫又有擺岡寨凶苗阿六阿成等於雍正六年十二月內商謀捆賣金寨韋阿利之子阿降乃先誘韋阿利至荒山毆斃復潛入阿利家將阿利之妻阿升拉出打死搶去阿降轉賣與把弄寨之阿征得受銀兩牛隻各賊俵分該委員等擒獲審供隨一併押解到省臣即將凶苗人等發兩司鞫究據覆老錢傭一犯逺年事件甚多伊亦不能全記而近虜各苗供招已確按其所犯皆應斬絞但若照例定擬勢必監候倘斃於獄不獲明正典刑且現在無以示警是以批令該司𫝊集赴省未回之各生苗頭人將首惡老錢傭數其罪狀立斃杖下衆苗觀看莫不膽戰骨悚知以老錢傭為戒其從犯阿重阿項等俱重責枷示另行遣發於雲南之中甸廣西之土田州安插其阿六等因欲捆賣其子先謀殺其父母將韋阿利夫婦俱行毆死其凶殘慘毒實罪不容誅因狡供未定逸犯未獲復押令前往行凶處驗尸今尸傷已經驗明實情已據供吐逸犯亦經獲到俟再覆審確實亦應發往苖地當衆處死庶使受害者寃抑得伸聞風者共知警懼其吳曰列一犯既悔過自新化苗贖罪當從寬釋放業經面加嚴飭並詳切開導令與各苗頭一並回寨安業訖至於前後招撫地方周圍計一千二百餘里凡扼要處所務須安營分汛彈壓調劑庶可以日久相安黔兵無可抽調不得不懇恩添設臣現與提臣楊天縱熟商妥議同編定寨分户口錢糧并管轄界址各冊分疏具題咨部外合先奏明伏乞聖主睿鑒臣謹奏添設營汛朕原有㫖不可惜費但數千里生苗地界內設汛彈壓恐武辨中未必能盡得其人而用之倘因些小事故激成事端所關甚巨恐將來不勝其料理當熟思萬全妥協而為之不可因目下之恭順而必其蠢頑之不復作也朕意可相其險隘苗界與內地相連處多設兵以鎮撫為上此朕遙度之意卿就近親視情形自有定見朕所諭者正恐因目下情形有誤久逺之規畫也悉心籌畫料理不可視為輕易夫頑苗之反覆何能保其必無但須先事圖維預為防範可慎重為之同日又奏為奏明事竊照川販勾通黔棍略賣民間子女向來文武各官惟利無事並不實力拏懲而差役兵丁遂爾得錢縱放互相容隱以致毫無顧忌漢夷並遭其毒且竄入苗寨勾結為非靡惡不作實為黔省之害自雍正四年發兵擒勦長寨頑苗拏獲積年販棍李竒等臣親加嚴審定擬題請正法之後雖稍知斂形然終未絶跡揆厥由來蓋緣承審各官或因夥犯未獲或因供證未明藉故拖延因循懸擱雖有一二完結率多草率了事姦惡之徒嗜利忘身不無仍踵舊習臣復屢行嚴飭緝拏所有報獲各起謹摘事由逐條具奏一起川販王之竒等查王之竒於雍正六年九月初二日同夥黃兆戎黃兆策至貴州凱里附近之昻歐寨時值官兵勦撫生苗之竒貪得銀兩代充細作至凱里探聽兵馬告知苗頭阿扛等率衆堵截隘口經凱里兵丁拏獲一起川販張之臣等查張之臣同弟張之相販騾來黔賣得價銀路遇未獲之盧世臣商為人販於雍正六年十二月十五日至世臣之兄盧現正家買得苗女又有未獲之販棍陳老三等與盧現正亦各販苗女希圖同往四川發賣在途被獲經平越縣審出各情被販苗女十二名口給還親屬訖一起黔販陳金保等查陳金保於雍正六年十二月十九日誘騙苗人阿講賣與髙梘地方夏家又有苗人阿王即係阿講之弟與伊妹夫阿往商謀將阿講子女亦賣送與夏老五家經都勻府拏獲詳報一起黔販劉之漢等查劉之漢同子劉正及夥黨戎師兵戎師奭并未獲之戎老二川販熊佩武販賣苗男婦女於雍正六年十二月二十九日潛往四川轉賣經平越營防兵屣踪拏獲解縣訊供究明詳報一起川販梅廷現等查梅廷現與戴志善并未獲之梅兩素於雍正六年十一月初三日來黔欲買馬匹路遇夏老五邀同販人各買得男女往川轉賣復回買馬有窩犯黃燦知情容隱經麻哈州差役人等拏獲解官訊明詳報一起黔販李老滿等查李老滿與駱天正胡思學并未獲之萬顯雲共謀興販齊至鎮逺居住之王騰蛟家歃血結盟於雍正七年二月初一日遇買牛苗子二人遂取其銀兩誘往岩洞捆帶往川路經塘汛被石阡防兵盤獲解官訊供具報一起川販周世隆查周世隆與黔棍謝聖選等販賣子女雍正七年二月十八日藏匿於凱里所屬之川岩山洞被苗首報汛兵前往拏獲解交清平縣訊供詳報一起黔販楊老么等查楊老么與未獲之余成龍等夥販苗男苗女藏於清平縣屬之狗窩地方雍正七年二月十七日被防汛辨兵拏獲并獲窩家華文秀移縣詳報一起黔販杜煥如等查杜煥如與周世蕃於雍正七年二月十六日同遇窩家陳老二等勾引販賣苗男苗女經麻哈州土官拏解該州詳報一起川販黎尚文查黎尚文與張明儀到黔賣花於雍正七年正月二十六日商同未獲之關子招轉託希惟勳引賣苗婦苗女被麻哈州差役拏解訊供詳報以上十案情事雖有不同罪惡實皆顯著此外仍有舊案數起亦未便竟置不究臣現今在黔自應就便速行審結業經嚴行貴州按察使勒限催提審擬招解臣即親審勘定具題請㫖分别正法發落庶現犯者得以伏辜未發者知所懲警而積案亦得清結至於各種販棍原即係漢姦夥同苗狆則殘害漢民夥同漢民則愚弄苗狆其行踪詭祕半潛住於山硐石窟密箐深林臣現又通飭文武各官令砍伐林箐堵塞窰硐並嚴加防範實力巡緝外合先奏明伏乞聖主睿鑒臣謹奏好此輩當盡法處之再嚴加訪緝務令此風盡息方可同日又奏為軍田加稅難完仰請聖恩寬免事竊查貴州省軍田一項原係前明屯衛軍丁管業糧賦差徭較民田獨重自本朝裁汱衛所改設州縣後軍丁之名已經革除其向編屯糧仍照舊輸納因此田受之於官例不買賣或有軍丁故絶遺産無歸或有子孫困窮私相典當此紛爭占奪訐訟不休所由來也臣前於雍正四年到黔時前布政使申大成即有加徵稅銀之議臣以軍田名色雖由官授然子孫相承已三百餘年原與已業無異且糧賦最重幾倍於民田若更每畝徵稅五錢恐不可必得反多擾纍議遂中止逮申大成內調入欵條陳部議准行臣恐已見未確不敢執謬隨經轉飭遵行在案今臣因公來黔據軍民人等紛紛呈訴雖恐長刁風仍行批飭而留心訪察復面詢司道府縣各官知軍丁先代受田因明時隨征有功分給土地計軍一户授田十八畝除上納屯糧嵗丁外一切差役皆軍户應承在當時已不免苦纍故雖田本膏腴難以割棄而故軍子孫欲脫重賦轉售於人者已十分中之八九申大成謂故軍子孫坐享無價之田獨不念該軍户等纍代纍世之應差納糧猶不足抵十八畝之田價乎是所見之小矣至謂百姓頂買軍田利其價賤者按民間置産必核算籽粒除算錢糧然後合其利息照值論價此各省皆然查貴州軍田一畝自一斗五升起至三斗七升科則不等嵗丁在外是便以一畝之價買得民田二畝之田而應納錢糧已以一畝可抵民田二畝之賦故雖軍田賦重而未便驟議輕減者實亦於輕重之中仍權量平準也今若每買田一畝再徵稅銀五錢合算每户十八畝而應完銀九兩雖據稱有十餘萬之虛名料難完數千兩之實數究於民生無益更於國賦何補相應仰懇聖慈將申大成條議新增稅銀一項准賜豁免凡田土授受悉照常例投稅印契從前私相典當者並令首明完稅補給契紙准其管業如有豪强侵奪及仍敢隱漏者嚴加懲罰庶訟端可除規條畫一而民無觀望軍無藉稱即清理田畝一案亦可漸次就緒矣謹繕摺奏伏乞聖主睿鑒施行臣謹奏所奏是已交部議覆申大成真庸愚小人也雍正七年六月十八日雲貴廣西總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安好向來朕甚畏暑今嵗都中盛熱而總未覺苦飲食起居更好諭卿慰念卿好麼同日又奏為恭謝聖恩事雍正七年六月初六日臣齎摺家奴䝉恩賞銀十兩馳驛齎回御賜臣各種錠藥一匣紗羽洋席芭蕉堆繡各種宫扇共六柄一匣畫扇四匣素扇二匣各種香囊共二十七匣桂花雕香一匣黃紅絡手串四匣各種香藥扇墜四匣抵貴陽臣隨郊迎至公館恭設香案望闕叩頭謝恩祗領訖敬啓摺扣跪誦硃批朕躬甚安好今嵗飲食肌肉更覺增長健壯卿好麼欽此又敬聞擇吉遣師先期告廟頒敕大禮既成天日晴和氣象舒暢聖駕大閲官兵人人感奮歡聲雷動臣不勝欣忭不勝踴躍再雲南大理府同知佟世䕃回任過黔臣敬詢聖安據佟世䕃傳示世䕃跪辭之際奉皇上面諭佟世䕃你再細看看朕身體精神可好世䕃回奏主子聖躬精神甚是安好隨䝉諭㫖你就將朕身體精神這般安好回去告訴總督鄂爾泰教他放心以前朕聞得他因辦事過於憂勞以致身子氣弱甚不放心教他此後惟遇緊要大事親身料理然亦不可過於憂思凡夜晚辦事最是傷人務教他善體朕諭以仰副垂注至意欽此臣爾泰敬聆之下仰窺聖慈氣咽泪流莫能自解伏念都俞喜起古已稱難如臣遭逄更何倫比洵以臣子之名實兼受務當凜體訓諭節慎自愛萬不敢於無關緊要事積憂耽勞以致復厪聖慮謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為新開水道并興修陸路事竊惟邊境之大防莫重於苗猓而窮荒之大利莫急於舟車查滇黔兩省崇山復嶺鳥道羊腸旁逼夷巢中通一線因舟車之難至致商賈之不前是以開闢近百年而猶無殊草昧其各郡縣內地原不無大小河流可疏鑿以資灌溉亦緣半由苗界出入遂因循至今臣自叨奉簡命雖已遍訪熟籌思欲開修而苗疆未靖凶頑未除慮有阻撓故不得不緩待今仰賴聖主仁威强梁者就擒良懦者歸化業已粗定只須撫綏若不及時興舉以計久長恐日後不無懈弛又將觀望臣故於去嵗冬月即遍飭估勘以便次第料理所有疏濬雲南府之滇池海口及金汁等六河并自阿迷州直達粵西大河等緣由前經臣摺奏荷䝉硃批有何可諭可謂超羣拔類之辦理為從來封疆大臣未舉之善政也朕為滇南赤子曷勝慶幸凡此等有利於地方民生之事若有應動正項者只管奏請不可瞻顧竭蹶從事欽此臣伏讀之下不勝慚悚不勝踴躍務當竭力盡心期於有濟斷不敢少有瞻顧以上負殊知並負滇黔赤子已耳兹於五月二十三日據雲南廣南府賈秉臣等覆稱職等奉委開河隨同各委員沿江查勘源發於澄江流達於粵閩內有巨石間阻疉灘陡險相傳漢唐迄今未曽開鑿職等詳看形勢初甚以為難乃不數月而工己告竣自阿迷州以下一千五百里至剝隘之水道已通八達河而土黃一百六十里之旱路亦修整平坦可行車馬是不特東西兩粵片帆可至將來通商竝可達吳楚等情臣隨飭令多造鰍船麻陽船并於楚省雇募熟練之匠工水手前往廣南教習彼地民人打造撑駕復繕刻告示飭發滇黔粵三省地方官遍行曉諭使各商賈知往來貿易之便其所費工價俟該府等開報到日臣即照數捐補緣去嵗臣有餘剩存司養廉銀五六千兩可以充用竝非敢小見竭蹶從事也又據糧道黃士傑覆稱海口子河由清水閘新村大閘開通瀉入大河水勢俱己暢流可無壅滯之慮現值農忙已暫時停工俟秋成後再開修下截其盤龍江金汁銀汁寶象馬料等六河俱己疏濬深通凡各河閘口俱飭巡水人役用閘板啓閉以資分灌民田現在逺近俱己得水等情此臣前奏粵河滇海水利之大概也再曲靖府屬尋甸州有宣甸二里地面低窪時遭淹沒者計二十餘村又宣化七甲之歸龍寺山後有山河一道直垂瀑布流於山下可引以灌山下之田而土民畏其工費僉云難成若疏鑿開渠山下田畝可開者不下千工旁有橫坡亦可陸續增墾又果馬里十甲之潘所海子其地土約四五千畝而兩溝山河及五六月霖雨併四山之水俱積聚於此無路消泄只於南山腳下亂石罅隙中浸滲不得通流因而低下田地屢被淹沒又乞曲里之五里箐地勢水道約可墾田亦應修築渠堤臣前經詳飭該州逐細查勘復於赴黔之便路經尋甸又備悉指示續據知州崔乃鏞先後覆報宣甸二里勸民修葺堤渠已免受水患歸龍山河隨雇覔匠工遍歷山巔用築堤之法鑿石開渠并雇土工築壩蓄水三月內已經完工現在引水開田潘所海子搜剔石孔己鑿通洞口七處皆可消㵼海面之積水其兩旁田地已現可開墾五里箐地方修濬水渠亦己告竣現在具詳藩司請領工本分給各民買備牛力趁時布種等情至該屬有海子屯大河聞每多泛濫以致平原沃野盡成草地沙洲業己數百年甚屬可惜臣令繪圖呈送竝飭親勘估計工程幾何需費若干先召募湖廣熟練工匠確核詳請俟秋後興工此尋甸州水利之大概也又臨安府屬建水州之南莊十六營以下暨獅子口郭衣村羅家坡大小回龍宗家莊中所營金雞寨等處田地甚多竝無活水灌溉若雨澤愆期地皆焦土田半荒蕪每致栽插過時秋成失望經臣飭令該知州祝宏設法疏濬今據詳覆訪問父老知附近南莊李浩寨山腹之中有過泉一股常聞水聲晝夜不息卑職親往查探見山中陂地深邃源流甚逺似可疏通以濟田地隨招募人夫備辦器物至李浩寨對山開鑿因髙坡層疊巨石嶙峋幾費工力不能疏通遂用穀糠灌試之法尋流三十里果浮出於州屬之老鼠窄石穴其水徑由此山無疑因即於李浩寨山外里許穿穴地道伐木為廂截流激水已於四月二十六日開鑿告成穴中水湧湍急開溝築堤順流以資灌溉竝立約各村每至播種之候按定時刻挨次引水豪强不得阻截其嵗修溝堤著有田之家各就已田濬築毋得推諉再山穴出水之處有民田二丘既在其田側建堤不無藉口亦給價銀五十兩買存以免滋擾其開鑿人夫俱止捐給口糧各村踴躍赴工竝無工價等情此建水州水利之大概也至於貴州通省河水源流道路平險早經臣檄委勘報竝繪全圖以便籌畫除支流小路應漸次開修外如鎮逺府屬苗界之清水江上達平越府之重安江下通湖南屬之黔陽縣現可行舟無須修鑿實黔省之大利前因生苗阻截故須有待今凶頑既經剿撫夷民亦知便益據該府方顯稟報由柳羅行營裝米試船已直到施秉又用船四十隻令辨役前往黔陽縣買雜糧試運俱可通達無阻是此河道計日可以常行矣且由重安江至都勻府亦有河道少加疏鑿即可行舟由都勻府至省現據知府王鍾珣勘報可開寬平大路堪以行車既避舊路之險又近止三站是急宜興修者又府屬獨山州之爛土司地方亦有河道可通粵西聞計程七日便可抵柳州因路經來牛寨生苗地界向不能通臣已密行黔粵各官確查路徑先示化導如或敢拒命應即勦滅此寨以通聲援至黔省通滇大路如關嶺盤江等處實係險途臣擬由安順府之安莊另開新路直出亦資孔寬平可以行車且可裁減三驛前嵗已有成議業經奏聞時因黔員各有異議不無私心臣轉恐已見未確遂復暫止兹因公赴黔沿途覆加查問又委員細勘據稱實係路平而近竝無阻隔只有一坡稍險亦逺不及關嶺易於開修等語臣當更與撫提二臣㑹商妥酌另疏請㫖此黔省水利之大要陸路之大端也竊念庸人俗吏難與創始易於落成若立有規模俾知利益則相因相習官不必率而自勤民不必勸而自力將不數年即支流小路亦皆遍行開修臣當敬體聖訓凡有利地方民生之事如果有確見應一面請動正項一面預備料理千載一時力半功倍臣知自奮臣知自勉矣所有新開水道并興修陸路緣由相應奏明伏乞聖主睿鑒臣謹奏欣悅嘉奬觀覽六字不能諭朕之意而此外又覓欲諭之辭不得在卿自為參詳可耳同日又奏為奏聞事竊照清水江之公鵝等寨頑苗素行凶殘虐害夷衆抗不聽撫屢次拒敵官兵經撫臣張廣泗分兵進勦業將破寨殺賊情形繕摺奏報查自五月十四日懲創之後羣苗震懾向受公鵝荼毒者尤切歡欣官兵隨分作兩營對江駐劄防範乃公鵝餘孽猶敢即於十四日夜暗冦新營隨被官兵擊退有雞擺尾寨苗因先曽與公鵝合榔為公鵝苗激動復行勾結聚集千餘人於十五日竟來攻營當復被官兵鎗死者甚多賊苗俱各奔竄十六十七等日有董兜等各寨苗頭來營投誠前附逆之柳利寨雞擺尾大寨各悔罪求生又有白索等五寨同雞擺尾苗頭來營上納錢糧願聽約束該營府等隨細訊漢姦曽文登撥唆被殺事由據供苗等原割了木刻要來投降是曽文登說你們不要去見不要上糧若今年上一兩明年就要上十兩還要丈田當差所以聽了他的話實是被他誤了今定當縛獻等情隨立將曽文登竝伊妻子共六名口縛獻來營嚴訊之下俱直認不諱即令於行營梟首示衆該犯家口應酌賞出力辨兵現解鎮逺府禁候旋准撫臣張廣泗札開各寨聞公鵝破滅雞擺尾收撫連日赴營投誠納賦討求告示者暮夜不絶即逺處生苗皆自來投撫其公鵝逃苗奔竄無地亦自投軍營認罪求生尚未准其招安等因臣以衆寨雖經懾服但該地環夷背水形勢險要必須就地即駐重兵庶可以資控制此江最關緊要務須熟籌萬不可少有將就緣由札覆續又連接撫臣札稱現在駐兵於北岸彈壓凡沿江可渡處俱委辨守探其公鵝逃匿之苗若發兵搜捕勢難盡俘其衆捕之愈急逃匿愈深既不能窮追徒為他寨添羽翼留此三百失業之苗反致滋事因就其懇乞哀切責令繳獻鎗械并令托柳壽等大寨具保方准收撫初五日據各寨苗頭帶領公鵝苗人赴營禀稱公鵝歸順求生不敢復反日後倘有犯法我們衆寨領罪情願殺他隨繳獻鳥鎗環刀標鎗弩弓甚多查苗地向有合欵之例今清水江南岸逺近投撫生苗已納糧編甲者共四十餘寨不下萬户因傳其合欵適於初五日齊集隨曉以公鵝罪狀姑念老弱無辜今仰體聖天子如天之仁暫准招回賞還田地如果能改過則永為良民倘少萌異志即立就殱滅又告以清理苗疆之舉朝廷不惜錢糧官兵不辭勞瘁原為開通清水江河道使商賈往來財豐物阜為爾等苗民垂永逺之利若不安營設汛河道終不能開今於公鵝寨基安設大營餘擇善地另立塘汛保護客商稽察匪類該苗等聽聞之下莫不歡喜慶幸始知自古漢兵不渡河孔明曾與立石為信之語亦皆漢姦有以教之也目下因江北岸有平夏一寨約三百餘户向屬生苗凶惡更甚去嵗正當清理苗疆猶敢殺死順洞之糧苗六命捉去二人一帶苗民銜恨入骨現在勒令獻凶如敢抗延應即發兵進勦此寨不除無以服衆苗之心故仍須有待再清水江上下接連九股南岸直達古州地不止千里而現在聞風投附之苗已數萬計駕馭撫綏實非尋常所能勝任蘇總兵辦事忠誠威名素著得士卒心有兼人之勇如得委調前來即可以交替前進黎平安撫古州矣等因查總兵蘇大有前在丹江因腿受鎗傷久未平復臣到黔後即調官祿往替令回省醫治復割開皮肉取出二鎗子不二十日俱已全愈行走如常隨經面委竝囑一切機要即令於本月十二日前赴清水江去訖平夏一寨不難完結雞擺尾等苗尚須防範此番料理張廣泗頗稱周詳蘇大有必能幹濟也五月二十三等日據駐劄丹江之定廣協副將官祿呈稱丹江苗衆甫經歸附因有漢姦老楊老許以鬼師之說煽惑愚苗復萌叛念都司羅資衮聞知差頭人阿豹等五名往彼開導令將漢姦獻出請賞乃該寨苗人聽信漢姦竟將阿豹等殺害即於二十一日夜前來劫營被官兵鎗炮擊退現在確查漢姦竝倡謀寨分續報等情續據呈稱自擊退賊苗之後各苗寨無一反覆且恐有干連俱到營誓信隨加奬賞安慰其反覆苗衆係桃繞大寨今見各寨俱自投辨訴料無幫附亦著屬苗到營投順當即著令獻出漢姦凶手去後隨據該寨頭人阿尚等先後縛獻漢姦老楊老許到營除漢姦二名己嚴訊牢禁候示外現在勒獻凶手再報等情臣查苗人之反復實由漢姦之播弄漢姦不盡除苗寨終難寧帖況丹江一帶原未及妥辦目下多一番整頓將來加一倍安帖倘將就完事即致誤事必轉費事臣屢䝉聖諭指示詳明業欽遵凜體每事類推現計各處官兵雖已足用但久役疲懈及疾病懦弱之兵料所必有且苗疆一有定議即應設汛安營分駐彈壓若俟具題准咨到日始行召募則數千之兵即一年亦不能足額臣於四月內即通檄各標協營令遍查餘丁現據册報現可充伍者已近二千名適安籠總兵先到丹江以備調遣并查勘各處將疾病疲弱等兵替換回營將來即留駐新鎮仍將餘丁添補庶可兩無缺誤再蘇大有擬調黎平新鎮之處經臣摺請業奉亦不致久懸合併聲明統乞聖主睿鑒臣謹奏覽同日又奏為謹報廣西豆麥收成分數并雲南陸凉南寧二州縣被水情形事竊照雍正七年分滇黔二省豆麥豐收臣己查明具摺奏聞今據廣西布政使張元懷呈稱本年豆麥收成分數除梧州府屬之藤縣容縣柳州府屬之融縣南寧府屬之忠州歸德果化下雷湖潤遷隆剝甘上中下勾慶逺府屬之東蘭那地南丹欣城永定永順長副思恩府屬之歸順都康興隆等漢土州縣共二十屬尚未報到外其餘漢土州縣共九十四屬彚造總冊呈送并據冊開泗城一府橫州上思河池三州富川賀縣修仁昭平懷集桂平永淳懷逺上林等九縣安定白山古零定羅舊城那馬等土司奉議土州所轄向不種豆麥鎮安土府土田州武緣縣向武土州種麥甚少收成只有二三四分賓州甫種黃豆向不栽麥鬱林州所種豆麻芋薯均有八分收成新寧州博白縣從不種麥所種黃豆黑豆七月始收西隆州西林縣俱不種豆麥西隆所種小米早稻子均收成八分西林所種小米收成七分岑溪縣不種大小麥間或種豆向來收成無幾永寧縣只栽豆收成七分思明土府州左州養利永康象州等四州隆安崇善思恩三縣萬承太平安平恩承龍英全茗茗盈佶倫結安都結鎮逺羅陽江州羅白下石西思陵慿祥上下凍等各土州并上龍下龍二土司所轄俱不種豆所種小麥蕎麥均六七八九分收成其入夏并夏末秋初始栽豆現在止種麥之州縣惟遷江一縣六七分收成臨桂興安陽朔永福義寧灌陽平樂柳城荔波宜山天河等十一縣全州一州有七八九分恭城馬平雒容三縣俱十分收成豆麥兼種之州縣內蒼梧縣豆係五分麥係七分平南縣豆係五分麥係六分宣化縣豆麥俱係六分羅城縣豆係六分麥係八分永安一州靈川荔浦貴縣北流武宣陸川興業來賓等八縣豆麥俱有七分九分又獞猺不諳種植之上映土州豆麥只收三分土上林縣下旺都陽二土司所轄豆麥止收五六分至各屬米價惟永安新寧二州每石市價一兩三兵牧場東乃一帶髙山西南北三面皆土坡髙阜之地每於五六月間大雨時行山水驟發馬厰之中地勢低窪為聚水總滙臣因原未牧馬徒為刁頑侵占經委員招民開墾成地每年於秋盡冬初水涸時播種麥蕎等糧至次年四月及五月初收穫復慮不能全熟故科租從輕其上則地每畝只完小麥租一斗中則地每畝完小麥租八升下則地每畝完大麥租六升除完升斗官租外其所得花利頗多連年皆係十分收成臣已奏明歸公在案今嵗因春雨霑足兼有閏月節候少遲適值四月中連雨上流河水泛漲所以馬厰內之低下地畝不及收穫致被水淹撫臣沈廷正據報隨委府州各官同往覆勘續於五月二十六日據覆被淹者二萬三千七百餘畝未淹者一萬四百餘畝被淹之地計算大小麥租該折徴銀一千九十五兩五錢零但馬厰歸公納租原與民間納賦之田不同且止一隅而各户未淹之地業已十分收成況此承種佃民皆係紳襟吏役各有本面稻田現在及時栽插實與窮民有間米價亦不昻貴此項租銀或減免或緩徵等語臣復批行布政司詳核酌議去後旋准撫臣沈廷正札開馬厰被淹應輸本年糧銀一千餘兩若照分數請免甚屬無幾己具摺懇請聖恩全免其徵收在司庫備公存剩銀內撥補完項可否再按被淹分數題報請免商酌前來臣查此項地土原係低窪若雨水稍遲反加倍豐收凡雨澤應時即間有淹沒既聖諭遵行除札覆沈廷正外相應奏明再據曲靖府知府劉斌詳稱據南寧縣勘報該縣東北二鄉田地低窪易於積水五月二十一夜廟髙山起蛟山水陡發以致衝決墟堤田廬被淹今水勢日消其髙阜之處禾秧未傷可望有秋墟內低田尚有被淹至民房因水勢急驟間或衝倒各村居民竝無損傷理合轉報請飭各委員確查等情臣隨批仰雲南布政司速飭委員勘明果否成災據實詳奪又據撫臣沈廷正委勘之澄江府知府王鐸詳稱六月初四日到曲靖帶同南寧縣親往被災之所查勘東北二鄉李家等墟低田果將圍堤衝决田苗淹沒近水草房被水浸壞倒塌幸水勢雖大不過兩三時即退并未傷損人口俟同該令清查被災頃畝分數及倒塌民房造冊另報等情臣因蛟水陡發既稱不過兩三時即退現在積水曽否全消可否補蒔秧苗未據聲明仍批行雲南布政司速飭查明通詳外臣查滇省今嵗春雨霑足故春熟甚盛因四月末旬至五月間雨水稍多髙阜處所遍得栽插低窪田畝不無泛濫撫臣沈廷正現己發庫銀五百兩交給委員酌散衝塌田房之户俟委員再細勘覆如應賑恤蠲免錢糧即同撫臣㑹疏題報合併奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為奏聞事雍正七年六月初五日新授廣東總督臣郝玉麟赴任過黔臣謹遵聖諭罄臣所知詳細講論諄切勉勵大略謂廣東要地逼近海洋欲安民生必先靖賊盜欲靖賊盜在先飭官軍聞各鎮總兵有因公上省者沿河賊船竝不回避且以鎗炮遙逐官船官船搖櫓飛行亦不敢駐問又聞山賊哨聚人以千數竝未懲創且賊案甚多十無一結信如此是大可慮應將武辨中之貪劣庸懦者亟行參革以警衆志凡振刷處務示以嚴厲而措置處須出於周詳如果將猛兵强自必漸消潛避倘無制勝之具而驟欲擒賦恐賊不能擒而先已損威後轉費手矣其大小文員內才守兼優者料難多得須先取其才幹次論其操守緣我能駕馭即有才幹而滑者亦可以濟事我不能造就縱有操守而迂者其何能惠民凡接見屬員禀商事件務虛心平氣令各盡所欲言庶得周知情形以便裁處姦貪者必不可留粗直者切不可棄雖詞氣溫和却不離嚴整先使人不可犯而後次第條理庶官民相安而事易就緒再地方一切施設必先計可成然後再舉大學云事有終始而不言事有始終者蓋事必慮終而後謀始故凡所始事必終有成彼論是非不論成敗之說猶是為已私心原未曾關切民社耳又如道千乘之國首言敬事而信豈有敬事之人尚有不信實之理此信字應作信賞必罰信字看即係果斷義蓋每有敬事之人惟恐錯誤反致猶豫者故為下一轉語人嘗言明決若臨事不能決即明處亦是假此雖似腐語然於政治却係本論願交勉之至於心術行止全要自已檢㸃可以自信即所以酬恩一切揣摩瞻顧念頭萬萬不可起福是自求禍是自取聖心無倚著惟適如所應得幾曽見詭詐乖巧等人得有好處我輩亦不須逺學祗將前後一切上諭敬録一冊常供案前時時詳繹事事體貼若將大小輕重寬嚴緩急種種不同處俱能看成一片則立身治事自皆有定見倘此時信不及須用心數月先理散處再尋總處那時能入得進便出得來許多言話更都用不著矣等語郝玉麟氣斂神悚一一聽受但云任重事繁兼少厯練若不得深知素信之文武員辨相佐辦理更恐耳目難周擬懇請聖恩准於滇省內帶往十數人赴粵酌用以資指臂與臣面商伏念同係封疆何敢少分彼此伊業經摺奏應候諭㫖遵行至廣東提督臣王紹緒復奉硃批大聰明人武辨中少者朕一見賞目所以不次擢用但柔善沽名恐不勝巖疆之任耳若肯破面毫不瞻顧非不能之人也著實寄字鼓舞之欽此臣已將前後原由向郝玉麟備言之竝密𫝊聖諭令伊到粵留心訪問試看如有不勝任處即據實奏聞郝玉麟己欽遵敬記臣前己寄字王紹緒剴切勸勉兹復寄字詳悉開導痛切規責去訖郝玉麟共住八日於本月十三日起程赴粵約於七月望後即可到任合併奏聞伏乞聖主睿鑒臣謹奏郝玉麟不但受朕深恩當知奮勉即卿此一番諄諄勸勉之友誼聞之而不動心自勵者除非木石也不但郝玉麟斂神聽受朕觀覽之下亦不覺踴躍生歡喜心矣前伊途中并動身時己摺奏數次觀伊立志甚堅而主見亦甚妥協然必待伊到任後方見其底裏也一者關其造化二者在朕之福量亦非可强求者只用人一節其苦其難惟上天與朕皇考鑒之耳雍正七年七月二十四日雲貴廣西總督臣鄂爾泰謹奏為恭謝天恩事雍正七年七月初三日准吏部咨開總督鄂爾泰自陳一疏奉㫖卿忠誠體國公正廉明自簡任總督以來正已率屬和輯兵民撫綏苗衆百度具舉懋著勳勤正資倚任著照舊供職該部院知道欽此相應知照欽遵施行等因到臣欽惟我皇上廣覆同天至明竝日揚清激濁舉三載考績之典庶政咸熙鑑徹衡平行百僚明試之條天工時亮皇恩寵逮驚慚甚而但覺汗流聖眷褒嘉感激深而無言泪下念去姦去僞去私去偏去貪去暗臣爾泰固嘗洗滌於隱微而學忠學誠學公學正學廉學明臣爾泰實未進窺其堂奧却非存是縱不敏而請從由淺入深雖未能而竊願諄諄聖訓寤寐難忘懇懇王言出入必警不敢以僚屬之過誤謂非臣之愆尤不敢以兵民之疲羸謂非臣之疾痛不敢以苗衆之獷悍謂非臣之疏頑不敢以百度之廢弛謂非臣之怠惰荷垂倚之異數敢自懈其股肱凛委任之殊綸敢稍弛其負戴無勳勞之可報雖踵頂不重毫毛矢勤劬以自將即豚魚亦同血氣緣遵例不敢具疏謹繕摺恭謝天恩伏乞聖主睿鑒臣謹奏數句票籖諭㫖何能盡述卿之忠誠功績也不過將大略令天下臣工知之之意耳同日又奏為恭謝聖恩事雍正七年七月十二日臣齎摺家奴䝉恩賞銀十兩馳驛齎回欽賜臣御書扇八柄共三匣抵貴陽臣隨郊迎至公館恭設香案望闕叩頭謝恩祗受訖敬啓摺扣荷䝉硃諭聖祖皇考當日甚喜朕書扇每年書進百餘柄有㫖不著書名命用閒字圖書今尚有存留在內者賜卿數匣近日朕書法實不能及從前矣六年來亦未暇書扇偶書一二柄自覺筆澀不及當年之興致也欽此欽惟我皇上聖由天縱學本性成大孝至誠歷七年而如一日用中行健勤三事而理萬幾憶承聖祖之歡顔法書斯在仰答上天之眷佑體物不忘臣恭捧天章萬里恍同咫尺敬觀聖藻便面如覲龍顔傳諸子孫寶勝球圖垂寵光於奕葉鐫諸金石珍逾琰琬銘恩德於肺肝前賜臣以扁聨日月光華時瞻仰乎寶訓今賜臣以扇箑烟雲繚繞常披拂夫薰風此君恩無以復加而臣職不知所報者也再奉硃批鄂昌人甚用得存心似正才具儘可再加教導歷練不改初心可望成人在內學習與外任事體不同及至外轉大用時仍須歷練豈不多費工夫嵗月卿意不過恐其錯悮即如卿負朕一般耳然朕用人自有斟酌除自暴自棄之下流無奈伊何但肯存心向上者自有造就之道也可勉勵之欽此敬仰聖主造就人材勤勤懇懇之至意居心行事二者均重內事外事各有攸宜歷練望其及時寸隂是惜陶鑄直符化育片長不遺培必因栽傾原自覆或同頑石是自外甄陶茍具良心亦誰甘暴棄臣先以此惕慮臣即以此勸勉惟願內外臣工共思立心制行以副聖天子生成造就之盛心不特臣之一身臣之弟姪臣之僚屬當期矢諸寤寐盟諸幽獨已也為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為黔省慶雲千秋特見事雍正七年七月十九日據貴州思州府知府劉禀稱七月初八日自申前至酉刻初見府城正北方有淡色紅霞舒徐散布少頃光彩射日有青雲數片左右環合隨有深淺紅雲四圍繚繞又見一朵紅雲宛如宫扇直上半天大數十圍鮮華燦爛旁有光如錦練約長數丈縹眇旋繞側邊有黃色雲如淡金雛鵝頃刻黃雲邊又現出紅雲形色儼若珊瑚鮮明艷麗繼而北方中間疊出青色雲約六七重其下皆藍碧色雲似此雲成五色綵纈玲瓏有未能以言語形容丹青圖畫者瞻仰之餘驚喜舞蹈一時滿城官辨白叟黃童莫不額手聚觀咸稱為從來所未有斯實上瑞竒祥皇上誠格之符驗也復據府學教授張克惠都坪司副長官司周琇具報前來謹摹仿繪圖呈報等情到臣伏查黔省兩迤雨多晴少隂鬱潮蒸居民行旅俱以得見晴明為瑞今嵗自春徂秋霽日甘雨時和年豐黔之臣民無不交相慶幸頌聖天子之格被而思州一府與黎平鎮逺接壤地逼楚疆忽見五彩慶雲色異形殊呈竒獻瑞臣遍查貴州通志從未經紀載比諸雲南尤屬僅見敬仰皇極日懋俾遐方盡沐光華帝澤洪施致邊境共昭雲漢盛矣大矣至德難名巍乎煥乎太平有象上天重巽以申命是用誕告以彰聖治之光昌微臣賡歌以揚言惟願大書以補皇輿於美備除俟㑹同撫臣張廣泗具疏題報外合先繕摺竝將原圖恭呈御覽伏乞聖主睿鑒臣謹奏上天屢示嘉祥朕實倍加寅畏題到另有㫖諭同日又奏為聖德逺届外國輸誠事雍正七年六月二十九日據雲南臨元鎮總兵官邱名揚呈稱雍正七年六月十一日據汛防猛灑目兵康天錫蘇鳳彩等禀報五月初六日老撾國王子島孫差頭目叭五名先十二名後生八十名備貢象二隻投順天朝懇求轉達又有描金匣一箇內係呈總督緬文理合稟明本職即差千總亶國鑑竝思茅土目刀興國於十二日起程前往江壩一路接應照管來差頭目人等撥備兵夫護送前來等情又據前委協辦軍務之元江府知府遲維璽報同前事各到臣臣伏查老撾國即古之越裳氏叭先皆係土目名叭目稍大先目次之其土兵則統名後生僻處雲南之極西南離省城六十八程自周成王時獻雉之後數千百年未聞入貢雖元明之初名屬內附然皆迫於壓制竝非出自諄誠未有不加兵威不事招致而自效恭順萬里逺來如今日者也兹蓋恭遇我皇上光被四表寧及萬邦聲教無所不通囊括無雷之國懷柔鮮有不至包涵出日之鄉重譯來朝聖人興而萬方作覩梯航致貢文德盛而四夷咸賓敬備鳳闕之威儀不數貢獒於西旅上供羽林之鹵簿寧等獻翟於南淮不同赤雀蒼烏徒勞跋涉大異橦花蒟醬空耀珍竒較玉帛於塗山何須誅防風之後至比共球於商代豈必責荆楚之來王斯誠我聖主德無不届逺無不來風動時雍固有無間於外域者臣前據報竝准撫臣札隨檄行雲南布政使張允隨備辦犒賞供應等項令知府遲維璽照管來省竝檄總兵官邱名揚如土目土兵內有留在思茅等候者水土不服亦不必相强仍照常供應去後兹據邱名揚稟該土目等於六月內可抵思茅計七月末或閏月初可至省城俟臣回署接見來目譯出緬文竝酌商定議㑹同撫臣沈廷正具疏題報外所有老撾國輸誠進貢情由合先繕摺奏聞伏乞聖主睿鑒臣謹奏欣悅覽之朕所喜者非因外國之納欵蓋以此國內附則鎮沅新定一帶可保永永無虞矣此皆卿忠誠任事悉心體國之所致何慶如之同日又奏為奏報春熟事竊臣前報黔省春熟摺內有蠶豆粒大如栗豌豆粒大如榛等語荷奉硃批隨便帶些來朕覽不必多一半升足矣欽此謹將蠶豆豌豆各一匣附呈早稻俱已登場臣於七月初據各處夷民來獻新米竝呈穀穗其歡欣之狀殊有景象晚稻壯盛異常現已吐穗結實據各屬禀報秋成皆可卜十分而黎平古州苗地稻禾每莖長七八尺又有兩三穗者竟至遍畝生熟苗衆莫不歡呼以為從來所未有羣感皇恩之逺播愈以堅其內附之誠黔嘗有謡曰天無三日晴地無三里平今隂晴以時數日一雨天氣和霽人情踴躍臣目覩耳聞實不勝慶幸敬驗天時地氣此苗疆轉移之機臣務凜體禾茂盛亦可望豐收但自六月二十以後雨水過多逼近河海郡縣內如雲南府屬之晉寧宜良二州縣及楚雄府本治據報暴雨潰堤低田被水撫臣沈廷正率領司道䖍誠祈禱已於本月初六日起天氣大晴雖續據各員禀報水已退消然終恐覆到是何情形另當奏聞外合併陳明伏乞聖主睿鑒臣謹奏覽同日又奏為請招無管生苗以安三省邊境事竊照貴州銅仁一府地處黔省極邊逼近紅苗夷界向因路逺苗强不能管轄僅於近府之烏羅等司地方薄築土牆以分內外繼而楚苗通同作祟雖經用兵剿撫設官防範而日久廢弛凶頑如故流官不敢輕出邊牆苗人轉復侵擾內境然此猶地近黔省向名歸附者自紅苗而外又有無管生苗北連湖廣西接四川廣袤千餘里成化外之巨區居三省之腹裏其中地土平衍人民饒庶語言衣飾多如漢人雞犬桑麻無異內地因竝不𨽻於何省或為强橫土司所割據或為凶悍頭目所分侵向號四不管積習相沿由來已久查其接連楚省者則係保靖永順桑植容美中峝大旺臘壁髙羅施南中路因復密查博訪適有士民冉端等具陳前事隨交兩司傳詢竝面問情形大概悉皆符合本年五月銅仁府知府姚謙赴省謁見臣看其明白老成猶堪料理當將苗情詳細示知指以機要令其回郡㑹同武員設法化誨去後陸續接據該文武禀報㑹委吏目張公佐巡檢孟士毅把總張文炳廖自新等先赴熟苗地方曉諭臣意令將犯案之凶苗獻出以便究結舊案隨據該犯等自行投到候審竝不敢狡抗又訪得生苗中有頭目田金保者素為羣苗推服因設法招致加以奬賞令其引導分兩路前進據張公佐等化出生苗彭宗蓋牌黃版至川新寨松桃上卡落下卡落拖把鄉木坪桃子坪落塘蠟冲老堡子上稿坪抵哨金扛沙流家多盤豹老虎寨大平茶下寨小河平所偏岩獨嘴岩上嗅瑙下嗅瑙上十八棧下十八棧中十八棧大鉛厰小鉛厰等共二十七寨又化出盤古打古藏坪竹子山爛草坪上芭茅坪下芭茅坪上火燒炭下火燒炭桿子坳代董洗鉛寨罷巴等共十二寨俱帶出各寨苗目龍見布龍豹子等七十餘名赴府投見給以花紅銀牌賞以酒食宣揚聖德令其永逺歸順并勸導未歸各寨一體受撫永為良民該苗等無不歡欣鼓舞又據張公佐等報稱坡西一路直進化誨共招撫百餘寨已抵鄰省邊界該府姚謙等擬親進賞犒查勘逐漸經畫等語除節次批行慎重料理外臣查逺近生苗一經招撫即紛紛內附出見投誠實因聞風向化故能共相觀感似此機有可乘勢無不便曷敢復有逡巡力省而成功速將從來未服之苗藪同登版籍共聽約束而三省之聲勢益通邊隅永靖矣緣為疆界起見臣不敢少分彼此謹繕摺具奏伏乞聖主睿鑒訓示遵行臣謹奏覽同日又奏為覆奏事竊照安順府一帶歸順生苗所應建設分轄事宜竝丹江古州一帶苗疆剿撫就緒情形俱經臣前後㑹疏題報在案其桃繞等寨獻出之漢姦楊世恆許揚清等發司審覆臣業恭請王命𫝊集漢夷斬决示衆前檄令縛獻凶手盡繳凶器方免其屠戮少敢違抗全寨剿洗之處續據副將官祿來省面稟有丹江苗頭四十餘人約雞講苗頭十數人赴營跪稱不敢反覆等語臣隨面諭既屬自來應免其死即殺此數苗亦不足以示威竝令逐寨曉諭嗣後敢少有反覆者必屠其全寨寸草不留如有不法兵役敢於勒索嚇詐者亦即立斃杖下隨令官祿回營并轉囑總兵哈元生去訖兹據各將來禀大小丹江雞講并八寨等處頭人俱求赴省見臣以明誠切臣已准其來省據此情狀丹江一帶似可以無事矣其清水江竝平夏三寨據撫臣張廣泗札竝知府方顯等禀清水江兩岸各寨苗户業俱上納錢糧開報丁口并二百餘里逺隔之苗寨皆前來投順又江之南岸以外有白衣苗一種更居僻逺亦相率歸誠前差兵役雇苗船一百四十五隻徑由苗境下湖廣洪江令買鹽布雜糧查探河路今於七月十四日已回據稱所經過苗寨日有數百人聚觀無不驚喜爭來交易以為過望其沿江水面較鎮逺河猶寬深不特麻陽鰍船可以通行即小號巴桿船亦可往來無礙至於平夏凶苗有上中下三寨中下兩寨案犯前已擒獻鎗械俱已繳納惟上寨止獻案犯六名尚有四名逃匿未獲軍器亦未盡繳因派令副將張禹謨帶領官兵數百前往嚴行追捕搗其巢穴彼等惟俯首求生無不聽命此案即可完結查清水江一帶事既就緒又有總兵蘇大有駐劄彈壓知府方顯防維拊循但須鎮靜亦料可以寧帖矣七月初一日撫臣張廣泗已抵黎平札稱沿途所經縣司村寨苗民情景甚屬歡舞并曾預經細訪古州俱各安寧竝無異說惟內中之月口二三寨因上年傷害漢姦楊應科之事自懷驚疑現差土舍通事齎示曉諭即應須懲創亦不難就緒俟交與黎平協副將趙文英知府張鉞協辦料理即可回省等語臣查苗所傷害如果係漢姦自可寬其前罪教以自新即或借此支延或竝圖抗拒亦不妨故緩俟營制設定各寨相安料此數寨剿撫俱易且趙文英張鉞皆係能事之員既可委辦撫臣原不必久駐也前臣報明頑苗就撫摺內荷䝉硃批嘉悅覽焉但善後事宜須謀萬全不可少有疑二頑苗經此一番懲創必有數十年之安靜若仍照舊安插可以相安則更可免異日之煩勞如卿信得及可一勞永寧又何憚而不為也此全在卿通盤悉心籌畫而為之者詳慎之欽此又臣報明遍化生苗摺內荷䝉硃批添設營汛朕原有㫖不可惜費但數千里生苗地界內設汛彈壓恐武辨中未必能盡得其人而用之倘因些小事故激成事端所關甚巨恐將來不勝其料理當熟思萬全妥協而為之不可因目下之恭順而必其蠢頑之不復作也朕意可相其險隘苗界與內地相連處多設兵以鎮撫為上此朕遙度之意卿就近親視情形自有定見朕所諭者正恐因目下情形有誤久逺之規畫也悉心籌畫料理不可視為輕易夫苗頑之反覆何能保其必無但須先事圖維預為防範可慎重為之欽此臣捧讀之下詳繹合參敬佩我聖主明無不照萬里之外洞若觀火既經懲創可仍如舊安插設兵鎮撫必與內地相連聖謨𢎞逺洵籌邊之機要臣曽與張廣泗商論治苗非以為苗所以安漢民也漢民安而苗亦共受其福若深入其地則我軍孤注聲援既逺頑苗得以生心且或有不肖劣辨見小生事致有激成反致難於收拾現議設營汛如八寨丹江一帶苗地深險兼少平土只應於總要隘口安兵控制如清水江一帶本欲開通黔楚河道以利商民關係久逺必應就苗寨安設重兵更將塘汛聨絡周密方保無虞至於古州八萬固必當開闢但駐劄官兵亦只可就諸葛營此外深逺則但可遙制總之扼要處定須設重兵無事處竝不必小汛防苗易防官軍難若既據險要能振威聲而又毫無騷擾毫無苛求日久漸摩不患不成內地張廣泗亦深以臣言為然兹祗承聖訓心智益開識力益定務當詳慎料理通盤籌畫斷不敢視為輕易致厪聖懷也俟撫臣回省將設官安營一切善後事宜并㑹同提臣熟商定議臣即兼程回滇以便接見老撾來目合先聲明謹繕摺覆奏伏乞聖主睿鑒臣謹奏覽奏知道了硃批諭㫖卷一百二十五之十一欽定四庫全書硃批諭㫖卷一百二十五之十二硃批鄂爾泰奏摺雍正七年八月十八日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正七年閏七月初九日臣齎摺家奴䝉恩賞銀十兩馳驛齎回御賜臣御製磁瓶二件內製藤花籃二件囊花毬一件蓮心茶二瓶松糕一匣茶糕一匣乳餅香瓜乾共一匣蜇鱸魚乾十束抵貴陽省城臣郊迎至公館恭設香案望闕叩頭謝恩祗領訖至二十一日臣自貴陽起程二十三日抵安順府二十四日早臣齎摺把總李顯齎到御賜臣蜜荔枝二瓶臣跪迎回店恭設香案望闕叩頭謝恩祗領畢隨起身前來業於八月初二日抵署具疏題報在案敬啓摺扣荷䝉硃批朕躬甚安好向來朕甚畏暑今嵗都中盛熱而總未覺苦飲食起居更好諭卿慰念卿好麼欽此臣跪誦數四歡欣踴躍莫可名言曽遍告諸臣用慰感切至於臣以凡材叨䝉聖眷奬勵訓勉逾格殊倫每自參詳倍深悚惕誠恐少自寬懈即是悖負將不齒於人倫之數也惟誠惟敬誓當終身以之必如何報稱臣無能多言謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為德溥兩間慶協三才事竊照黔省思州府慶雲臣已經摺報續據貴州司道及副將趙文英呈詳隨經㑹同撫臣張廣泗具疏題報在案一月之內七度呈祥洵為千古所未有更為黔省所特見據思州府知府劉等赴省面禀前報慶雲實非畫圖所能仿佛筆舌所能形容如所報宫扇誠如雀屏雉尾佛像誠如瓔珞莊嚴佛頂金冠閃爍巍峩天光雲影中隱約瓊樓玉宇疊現六日無論漢夷兵民莫不驚竒互相慶幸等語又據撫臣張廣泗回省口述詢據趙文英等面禀殊形異彩恍如丹鳳朝陽日下雲頭宛似蓮臺擁護是日梅岑黑苗正在抗拒適於劄營時衆苗舉頭共見一時各棄器械合掌齊跪叩天輸誠不數日而古州口月數寨亦傾心來歸等語此皆我聖主福德感召天不愛道之協應也其黔省農事六月早稻登場七月夷民獻新穀莖分兩三岐長七八尺者遍畝叢生臣亦經奏報閏七月內據各屬禀報晚稻嘉禾自二三穗以上無論髙低原隰漢土苗疆通屬皆同現據呈驗者已不下萬枝而長大稻穗每穗計米竟至三百餘粒至小米穀穗長大自一尺三四寸至一尺八九寸不等者亦不止萬枝並有一穗上又生九小穗一莖上竟有二十四穗者驚見罕聞實從來所未有此皆我聖主誠敬感格地不愛寶之符驗也臣駐黔時各處新化苗民紛紛赴省叩見臣每宣布皇仁剴切勸諭并各加奬賞無不歡欣鼓舞各歸本寨互相勸勉爭先剃頭竝皆感泣續據總兵張大有禀稱每於合榔之日傳齊逺近欵諭之寨令其互相激勸見苗人爭先設誓共相親睦願為良民竟有至垂涕失聲者始信聖德所孚不遺異類有不期然而然者等語臣自貴陽起程目覩沿路民苗或捧嘉禾或獻野蔬築場刈穫熙熙閒閒親敬官長之誠形於顔色此皆我聖主憂勤懷保至化翔洽以致風動時雍無間於邊逺之明效也臣伏念黔省天示竒祥一月七現地呈上瑞一莖二十四穗一穗九岐人樂升平嚮化之苗寨有數千丁有數十萬經史所稱卿雲之歌豐年之慶咸寧之化畢集於一時超邁乎千古實非尋常嘉徴所可以比擬況年逄大有尤在必書所以重民依昭農祥也臣不揣冒昧業商同撫臣張廣泗令將嘉禾瑞穀敬貯萬八千數并繪全圖備呈御覽擬俟秋收既畢㑹疏題報合先繕摺奏聞伏乞聖主睿鑒施行臣謹奏此實皆卿忠誠之所感召披覽之下嘉悅慶幸之懷筆難宣諭同日又奏為奏聞事竊照雲南省今嵗夏月多雨郡縣中低窪田地間有被淹其水退後禾苗無損者如雲南府屬之晉寧州宜良縣并楚雄府本治及附近屬邑俱照常收穫外惟曲靖府屬之南寧縣東北二鄉地連馬厰勢最窪下於本年五月二十一日因廟髙山起蛟發水衝決堤岸共淹民屯馬厰田地一百五十餘頃時臣在黔接據禀報隨一面委員查勘令分别具詳復札諭地方官督率疏導有可以補種處加意調劑去後續據該府知府劉斌該縣知縣梁廷彥禀稱履畝查勘前報被淹田畝內水退之後早者已補栽十分次者補栽六七分最遲者亦補栽二三分現種蕎麥豆稗等項可以一體秋收其餘田禾俱倍加豐盛等情臣查滇省地方山多田少喜水畏旱故民間有水潦喫飽飯乾旱要苦饑之謡臣自黔回滇沿途遍詢文武目覩田禾豐茂竝據各屬稟報迤東皆慶有秋而迤西諸郡尤盛兹南寧二鄉被淹田地本屬無幾水退後又可補栽且春熟十成已抵終嵗之半若因一時之水全免一嵗之糧在請免應候奉㫖准咨到日臣再核實商定務使均平事有因惠而貽害示怨而為愛者職在邊方尤不可不慮也再本處損傷婦女二口隨經撫臣委員查勘賑恤據覆一府一州共倒房三十一間坍牆二十九堵現俱修理賞恤久已寧靜竝准提臣張耀祖札與所勘無異合并奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為請㫖事竊臣荷䝉聖恩兼制粵西受事以來已逾半載所有地方營伍一切情形業備悉大略內有應整飭者有應更易者有應調停者有應循照者有應示以嚴急而始得挽回者有應示以寬緩而始能條理者事雖萬殊理實一本在撫提二臣努力盡心加意整頓臣復隨事參酌和衷商辦現據所見所聞文武人各思奮猺獞少知斂跡器械旗幟已煥然可觀積犯首凶已屢經縛獻然而殺劫之案猶多嚇詐之風不熄因循與鹵莽同科下屬與上司異志總緣衆心未齊是以諸事有待若不先將官僚將辨諄切開示俾各知所遵循次將惡襟姦胥及凶頑土棍嚴懲一二俾羣知有法紀恐即零星料理終難立定規模今臣已回署仰賴聖訓雲貴諸務皆粗有頭緒即親理事件兩月之內亦俱可清楚臣擬於冬至後起身赴粵自羅平廣南入粵境由右江鎮泗城思恩府屬左江鎮南寧府屬抵提督駐劄之柳州府沿途查勘營汛考驗辨兵即赴桂林省城與撫臣面商糧鹽厰局并一應事宜俟封印以後各屬無事再行調府州縣詳加驗看分别優劣酌量人缺復開誠勸諭動其良心俾各知是非榮辱共思所以自立庶能者鼓勵劣者改悔人既足用設措不難而臣亦得藉手少慰悃忱是所至願是所深幸也謹繕摺請㫖伏乞聖主睿鑒俞允施行臣謹奏好應題奏者具題但卿赴粵時凡少有煙瘴處萬不可經歷若少疏忽則違㫖負恩莫此為甚也必遵㫖行雍正七年九月十九日雲貴廣西總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安好凡有來引見過往之人朕皆詳細備問知卿精神氣象甚屬壯健光彩實為慰悅之至為善日强是乃天道敬誠為養性修身之本乃千古至理二者卿皆得之矣朕復何慮同日又奏為恭謝天恩竝陳下悃事雍正七年八月十五日臣接到家信敬聞敕建昭忠寺大典告竣復欽定表奬忠勳扁額業於七月吉日懸掛竝安置牌位讀文致祭而臣曽祖圖捫亦得與祀典臣隨恭設香案率同妻子望闕叩頭恭謝天恩訖竊念臣髙祖屯太初由汪欽地方率領七村親族人等效順歸誠䝉太祖髙皇帝以覺羅瓦爾喀厄七克之妹給屯太為妻將屯太之妹給吕東巴突魯郡王為配即賞給全佐領又一拜他拉布勒哈番臣曾祖圖捫承襲佐領兼拜他拉布勒哈番擒勦諸役屢著勤勞及大凌河被圍圖捫領兵首先出戰殺入敵陳又力擊張理兵奮勇陳亡時臣祖圖彥突甫年十九䝉太宗文皇帝優恤垂問賞襲佐領兼拜他拉布勒哈番圖彥突歷任參領兼户部郎中屢有戰功通旗首重逮順治元年平定北京圖彥突身故年四十三時臣兩伯父才五六嵗臣父鄂拜甫二嵗衆皆叙功獨遺未叙臣父每向臣言汝等但能上進將爾祖事績得一達天聽吾可見爾祖於地下臣子效忠功固非所計此臣髙曾祖從龍家世之始末也伏念臣以薄劣凡材遭逢殊遇位至總督加銜尚書竝無寸功而官廕二品今又以苗疆之役交部議叙雖臣實不稱而祖宗父母皆應感泣於泉下瑣屑私情又何敢仰瀆但臣曽祖圖捫既叨列昭忠牌位僅書佐領查固原提督臣紀成斌之父陳亡守備紀法業䝉聖恩賞給誥封得以贈官位列大臣之末懇祈聖恩矜憐臣志將臣苗疆議叙之案准豫銷免賞給臣職銜誥封俾臣曽祖圖捫亦得以贈官位列大臣之末而臣之父母竝得受封贈改換祠堂神主則臣上至祖宗下及子孫生生世世光榮無既矣謹此繕摺恭謝天恩竝陳下悃伏乞聖主睿鑒施行臣謹奏此奏朕實欣悅嘉是覽之待朕恩命可也同日又奏為恭謝聖恩事雍正七年八月十五日臣齎摺家奴䝉恩賞銀十兩馳驛齎回欽賜臣御服織花屯絹袍褂二件紅白月餅各一匣白石榴一簍緑葡萄一簍大觀釉三口葫蘆瓶一座八方雙管瓶一座方勝花瓶一座太平樽一件水丞一件均窰瓶一座抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣叨荷殊知無能報稱每多錯誤時切悚惶兹復月餅寵頒恰值中秋佳節珍器羅列鮮果具陳萬里本請釋竝先不應入摺請免乃不思體要所關僅以錢糧實係無著遂冒昧無知有干朦混前在黔見鈔深自悔懼寢食不能安獨以聽候部議未敢具陳兹於八月二十九日接准部咨復䝉聖恩寬免處分聞命之下且感且慚竊惟受恩重者罰不宜輕以臣受恩深重中外皆知而猶有不盡心尚何所逃罪仰祈聖鑒凡臣有過愆務加倍處分庶臣益自奮惕而天下臣工亦羣知所警戒矣為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏朕何忍加處分於卿也與其有今日之寬似不如初時即暗弭其議但朕所見不然一者卿有微過令天下知朕亦毫不容情二者卿之所屬員辨兵民見朕如此信重於卿或有分外希冀及怨卿之不達於朕者亦可令知少越準繩即有勢不可行之處卿宜知朕用意可也況在卿原不過為清理案件之舉前摺請之時朕亦未深悉一時批諭卿又何罪之有同日又奏為地出醴泉民沾厚澤事雍正七年九月十四日據雲南永昌道雷之瑜呈稱九月初八日據大理府知府陳克復詳據趙州知州徐樹閎詳稱據白崖鄉約周澤等連名禀稱本年閏七月白崖五里路地方平地中忽湧出甘泉二股一出於仙女莊後山之麓一出於蝦蟇口泉清味甘一帶雷鳴田地俱可賴以灌溉小民等實切慶幸理合稟報等情卑職立即親至其地查勘得仙女莊泉水一股約圍圓八九寸許蝦蟇口泉水一股如珍珠上湧隨親掬酌飲二泉味極清甘及遍問村民僉供向來竝無此泉今於閏七月中忽從平地迸出雷鳴田地俱可藉以灌溉所有原納地稅情願皆改田糧等語卑職勘明仙女莊與蝦蟇口相去里許查趙州與雲南縣交界該縣竝無水利以故田號雷鳴今得此二泉兩州縣近泉田地皆可藉灌溉實大有裨益等情詳報到府轉詳到道除批行趙州細查泉流逺近或由某處入河或至某地蓄聚實可灌溉趙雲二州縣田畝若干另行繪圖造冊詳報外相應呈報等情到臣臣謹按禮記曰天不愛其道地不愛其寶人不愛其情是以地出醴泉又禮運云王者政平則醴泉出史載堯時醴泉出夏后時亦出鶡冠子曰聖人之德上及太清下及太寧中及萬靈則醴泉出欽惟我皇上誠無不通明無不照登萬民於衽席合九域以生成誠足以感召天和協應地靈醴泉之出實為難得之上瑞也伏查前古縱有甘泉未必有關民命可濟田疇今白崖地方即漢時五色雲現而雲南由此得名者趙州雲南縣繡壤相錯其他郡縣俱有流泉挹注臣經通檄全省相度水利當疏者疏之當塞者塞之當分者别其支派當防者厚其堤岸各因其勢而利導之亦略有成效獨至雲南一縣束手無策智勇俱困向來一帶雷鳴田地皆屬地稅民艱於耕種故也今有二泉可資灌溉百姓䝉福踴躍稱慶無一不頌皇仁而荷天眷臣實不勝欣幸不勝感切除俟查明流泉之逺近灌田之多少詳覆到日另當奏報外合先繕摺奏聞伏乞聖主睿鑒臣謹奏欣悅覽之有㫖諭內閣頒發刻刻不可負上天神明聖祖慈佑成全顯應之大德深仁也覩此我君臣能不凛然於衷存敬畏於衾影乎期共勉之同日又奏為遵㫖議奏事雍正七年八月二十九日承准大學士公馬爾賽大學士張廷玉蔣廷錫寄信內開雍正七年閏七月二十二日奉上諭御史龔健揚所奏著鈔寫分發與總督鄂爾泰田文鏡李衛巡撫尹繼善署巡撫費金吾謝旻令其各抒所見確議具奏朕又思邇來八旗於參領佐領外添設副參領副佐領辦理旗下事務甚有裨益至於各省州縣事務實為繁多或於知州知縣亦添設一官為副地方如有查勘工程檢驗命案等事州縣一人不能分身兼顧者添設一人協同辦理亦不致耽延遲誤而州縣官升遷離任之時有平日同事熟習之員接辦亦似有益但兩人同為一官或因事無專責互相推諉或因意見不合彼此爭執轉致事務稽遲即如從前宜兆熊劉師恕之在直𨽻於公事甚屬無益今添設州縣副員是否可行有無裨益之處亦著鄂爾泰田文鏡李衛尹繼善費金吾謝旻各抒所見一併議奏欽此遵㫖寄信前來等因併鈔掌山東道監察御史龔健揚奏請州縣自牧令丞尉而下於東西南北四鄉各設鄉官一員取用本鄉之人以資治理原奏稿遞送到臣該臣查得設官分職各有專司專司而外原有佐理如州牧縣令以下設有州同州判吏目縣丞主簿典史等官而縣分大者則添設縣丞為之徵比錢糧審理詞訟鄉鎮多者則分設巡檢為之緝捕匪類查拏盜賊定制立法固已屬盡善況本朝定例官員不許升任本省其選授鄰省距原籍五百里以內者亦應另補親屬同官一處又有回避之例蓋近鄰本地或易於囑託營私而逺離桑梓可杜徇私報復諸弊也今若添設鄉官即用本鄉進士舉貢生監耆民人等若輩世居其土非親即故內有恩有德亦有怨有嫌一旦令其羣居民上豫以事權無論假公濟私施威市恩料事所必有即或皆屬善人存心利物而拘鄙乖張各逞已見將議令紛出民情觀望雖有賢牧令恐亦難於措手矣據稱人才不易安所得盡皆有猷有為有守之人為之星布而碁立斯言誠是但統合天下州縣計共一千四百餘缺尚慮其不盡賢能若合計加三倍之鄉官共需五千六百餘人能保其盡得賢能而為有猷有為有守之人乎既不能保其盡得賢能矣不賢不能之鄉官縱能確知一鄉之中某某刁惡某某抗缺某某􅒬酒賭博某某行竊窩强保其能秉公據實密告牧令明申法紀乎夫今之州同州判丞簿巡檢吏典等官即論語所云應先之有司漢制所稱三老嗇夫游徼等職之屬類也唐書所載縣下於鄉者即今之鄉約鄉保總甲總練之屬類也名異實同人存法立如果牧令得人則此等等人原俱可以助其不及而進其不知即鄉進士舉貢生監內品行才德之選亦未始不可以資耳目而益心思是不必增鄉官而堪以佐理者甚多設使牧令不得其人則雖賢能鄉官亦原不能主其事或遇不肖鄉官且適足濟其惡臣竊見出入衙門包攬公事把持官府欺壓善良之鄉紳襟監在在不少矣十室之邑必有忠信言必有者正為不多有也且鄉官既應設則佐二可裁佐二不可裁則鄉官為冗臣愚以為該御史請設鄉官之議似不可行至所陳衙役差票之為害錢糧盜賊詞訟賭博保甲之不清與夫宣講聖諭解釋律條之難周實屬切中但差票可以酌裁而衙役必難竟革不但牧令在所必需即鄉官一身亦難日遍鄉村家至户曉勢必轉用委差謂鄉官之委差必善於牧令之衙役又誰能信其必然如徵收錢糧則原有自封投匱竝滚單紙皂之例如緝拏盜賊則原有著落鄰佑保結之例如查禁賭博則原有責成佐二轉責鄉甲逐户具結之例如調處詞訟則原有户㛰田土細事先批鄉鄰公講息結之例如遍行保甲則原有户口門牌細開名數竝記簿稽察之例凡此諸條竝無遺法皆仰煩睿慮詳切開示通飭遵守者據該御史請委任鄉官之事皆牧令之所得為亦牧令之所能為下屬奉行之不力實由上司督率之不勤人之過也於法乎何尤至於宣講聖諭廣訓以及解釋部頒律條既非牧令一官所能遍及亦非鄉官四人所能周至在鄉官既仍率用各鄉村貢監生員而牧令亦何不可分用各鄉村貢監生員語云有治人無治法此雖恆言實準至理定制必有深意俱難輕議紛更臣惟願天下大小官吏各抒實心各宣實力既謹依良法更善體美意則固執為法權宜亦為法於化民成俗之道或庶幾其有賴也再八旗事務原與州縣不同在參領佐領半多世職其所管轄半多舊屬雖有頑劣乖張之員而瞻顧隱忍在所不免今添設副參領副佐領既以二其事又以分其權公同辦理實大有裨益至於各省州縣雖事務煩多要止不過數項得其頭緒亦不難料理況如邊省簡僻之州縣竝未設有佐二如大省煩劇之州縣業經分畫管理若復添設副員於查勘檢驗等事固可以分任而一治兩官非統非屬倘不能和衷共濟或復此忌彼猜則誠如聖諭或相推諉或相爭執轉致事務稽遲甚屬無益者也據臣愚見州縣副員似亦無庸添設緣係奉㫖各抒所見議奏事理相應繕摺陳明伏乞聖主睿鑒臣謹奏是與田文鏡費金吾之論大槩相同惟尹繼善等之覆奏尚未到此事可無庸議者同日又奏為請招撫無管生苗以安三省邊境事竊臣摺奏前事內荷䝉硃批此事目下萬萬不可事情重大若清理此事必四省督撫得人同心合力預為籌畫萬全一舉而可就緒今者邁柱查郎阿憲德王國棟皆非能料理此事之人暫且緩之再者川陜精鋭多派出口滇黔官兵亦當令休息湖廣民刁兵驕而從未經事非其時也此舉當密而又密之將嶽鍾琪等所奏朕之批諭發來卿觀看自知朕意也欽此臣細閲嶽鍾琪原摺敬繹先後硃批仰見我皇上睿謀洪逺動計萬全謹當字字凜體不敢少萌躁妄伏查楚屬之容美川屬之酉陽兩土司實屬頑劣為邊境隱憂然論其目前尚未竟至狂悖用兵懲創不但非時亦暫可不必在臣愚見原欲先事預籌逐漸化導俾得備悉情形熟知道路或可以不須兵力依次就緒固屬上策即或仍須用威則既有成算然後相機而動亦不難布置是以僅遣數人前往招撫好言勸諭以覘其動靜並非敢遽欲清理以徒滋惶惑也又䝉硃批邁柱亦曽有聞黔省將楚界所轄生苗招去現今咨問該督撫之奏朕批諭咨問果實可不必分彼此但令苗衆相安不拘何省也欽此伏查此疆苗界名為四不管既已四不管則屬楚屬黔誰能劃定前臣差員前往化歸一百數十餘寨隨准湖南撫臣王國棟來咨詢問黔員何故越界招去楚苗續准楚督臣邁柱咨亦言同前事臣皆以差員撫苗原止清黔界黔員或不知黔界故竝將楚苗招徠原非黔員敢於越界多事即當查明此十三寨飭令送還等語咨覆去訖試思此苗如果納糧於楚必不肯再納糧於黔若在楚竝未納糧何妨聽於黔暫行入冊況事定之後自必仍還楚轄亦有何不便在臣此舉除面示委員竝密囑升任糧道楊永斌留心料理外其餘諸屬竝未經與聞即楚督臣邁柱係臣妻父亦竝未一札通知誠恐先事泄露徒滋議論反於正事無補也伏讀不必分彼此但令苗衆相安不拘何省之諭是為大公是為大同天下大小臣工皆應敬體斯言又䝉硃批楚省苗疆事宜可暫緩之且將已化之苗能令相安感戴國恩知向化之益其鄰境觀望一二年不理而自治矣若急欲舉行倘遇不法凶苗再有漢姦挑撥則新附之苗不能保其不被煽惑也此事愈緩愈妥可遵㫖行欽此伏查楚粵川黔苗疆各别㺜蠻狆猓苗性半同狡悍者其常情反覆者其故智欲令其相安感戴實不在法而在人得人之難難於任事善後之難尤難於創舉是無論未撫之生苗逺隔之鄰境臣不敢謂或能料理即丹江古州一帶已經歸化之苗衆雖現在伏帖臣亦不敢時刻放心蓋努力易知機難解事易推誠難撥弄煽惑罪不止於漢姦而調停不善約束不嚴即官辨兵役皆有以激成事端亦竝非僅苗人之罪也夫觀摩有漸緩即是急籌畫未周急反致緩據臣愚見容美酉陽二處似竝不須用兵或先於楚省密委新授布政使楊永斌川省密委建昌道劉應鼎黔省密委請補新設貴東道之鎮逺府知府方顯令各承辦各界竝㑹合商酌但示開導不露威嚴一二年內或可以就緒倘彼時有須懲創則嶽鍾琪已經凱旋總統調度亦可一舉而定臣受恩深重萬難圖報事無難易不計能不能惟有竭力盡心期少安衾影臣謹繕摺具奏是否有當伏乞聖主睿鑒訓示遵行臣謹奏亦且不必況酉陽容美皆久經歸化受職之苗非生苗可比今若無故委員化導雖此數人不露嚴威而委用之人或少見圭角萬一致生事端轉費料理且伊等亦頗知畏懼奉法斂跡矣再者建昌道劉應鼎原係川省大員若不令伊上司聞知恐一切掣肘亦難從事縱命卿一人總理調度伊等於本省上司自有不得不將順之勢也況委員化導但革面而不能革心將來愈覺措置無辭若稍露不法之景又不便遽爾料理仍緩緩相機為是同日又奏為請開黔省鼓鑄以利民用事竊照貴州一省漢少夷多素無錢文行使惟用散碎色銀分釐交易臣初欲運滇省制錢分交州縣以濟民用而路逺價貴慮難以流通繼籌設局開鑄俾上下通行又因本省乏銅須由滇運合算工價得不償費遂爾暫停止去嵗秋冬間黔屬報有銅厰批准採試稍有成效又以東川府厰銅甚旺可就近運至威寧府以供鼓鑄臣隨札行司道先於威寧府屬之畢節縣地方酌量規模置設爐局將各厰收買銅鉛運貯備用并選撥滇省寶雲局諳練匠役前往試鑄錢樣雖統核局務可以不誤鼓鑄然而略無餘息必至折耗終非久逺計猶未敢以定議也今臣自因公赴黔連據呈報威寧一帶俱現有銅苗各請開採當經面委升任糧驛道楊永斌親往各厰確查調劑并囑將新報厰地即勸本地苗民開採不必多招閒人一則使知有利可以資生二則各有所事自必漸為良懦續據楊永斌回省面稟查得原有之銅厰現多發旺其新報者如稻田壩之八地厰性化里之以朵猓厰拖克厰順化里之落州厰女羅厰共十餘處或已經採驗或尚未開挖雖銅礦分不同要皆可以供用前緣該地夷民未識天地自然之利致多委棄以故搶虜為生兹經詳切開諭令本處保正頭目并雇募爐頭廂頭督率教導許伊等各開各地銅厰除抽課外其餘銅斤俱發現銀收買隨各歡欣踴躍現議採試計各厰出銅可以供鑄有餘等語臣查銅鉛既足鑄務可定業委新任平逺州知州介錫周等承管并分委試用人員前往聽用其一切條例工費等項仿照滇局成規復加斟酌務期妥協以便次第辦理除俟㑹同撫臣張廣泗繕疏請㫖外所有黔省鼓鑄緣由合先繕摺具奏伏乞聖主睿鑒臣謹奏欣悅覽之向聞黔省從來不用錢文今似此得毋可通行乎同日又奏為覆奏事竊臣前摺內荷䝉硃諭知府耿覲謨來引見時觀其人甚平庸或老成謹慎則有之若遇事未必能籌畫措置也留心試看欽此臣查耿覲謨係由雲南普洱通判奉㫖特授貴州正大營同知該員貌似平庸材頗明晰行雖謹慎人實深沉從前兩省㕔員內皆推其能臣因其才可辦事而習氣蒼滑凡事不肯擔承必先討著落曽屢經嚴飭不假以詞色續見伊知改努力奉公因題補貴陽府知府俾得就近撫藩以便委用以便鞭策昨赴京之日臣仍面加開示伊以微員末吏或於進春豆摺內荷䝉硃批果然異常之大此種類未知年年如是抑但今嵗如是也欽此臣查雲南蠶豆種原比他省獨大貴州次之然如是大者亦少豌豆種類雲南如常貴州則較大臣在黔據報曽面問市民竝取舊豌豆比看不但大不如是而圓潤光亮白如珠色更從前所未有伏驗今嵗黔省叨荷聖恩氣象實别無論慶雲七現遍地嘉禾誠僅聞罕見即瓜茄花果等類種種竒異竝不止此不敢復瑣陳現在省城米價每石止五錢幾分其餘郡縣四五錢不等而蕎麥燕麥有賤至二三錢一石者較之往嵗減價幾三倍臣等敬承之下感激彌切悚仄不遑又滇省年嵗髙下齊收粵西秋成亦甚豐稔除俟彚報到日另摺奏聞外合併附奏伏乞聖主睿鑒臣謹奏以手加額覽之慶悅之懷實難筆諭但天道朕實信得及感應之理真毫釐不爽者同日又奏為奏聞事竊照廣西一省地介邊徼漢少蠻多其間種類各殊良頑不一在桂平潯南四府屬者猶知守本分而𨽻於梧柳慶思等郡者性多强悍習尚凶橫置法令於罔聞以劫殺為能事其巢窟之險深器械之鋭利夥黨之繁衍所在皆然洵非捕役兵丁所能勾攝雖向來間有懲處之名或上司與下屬意見不同或文職與武員行為各别一經舉動既多掣肘又早泄漏此所以厯久因循至今貽患而不可不乘時整頓者也臣仰荷聖恩兼制該省受事之後檢查卷牘除尋常竊奪及逺年案件不計外自雍正元年起共有苗蠻猺獞人等所犯命盜大案一百二十宗又新經報發七十九案皆係劫財殺命未結之重獄雖依例查參緝審究無以清其根源而或過於嚴急以期速效又恐威信未立轉難以挽回是惟在先勸後懲寓嚴於寬但擒渠魁暫置夥從其地方兵役襟監嚇詐勾通之弊務在禁除毋少姑息凡有故犯者定立斃杖下以警姦頑庶得有頭緒或漸可以就理也臣每據各屬禀事莫不詳切批答竝令遍告臣意謂總督某有必欲殺者為凶惡有必不殺者為愚懦有事應殺而或不殺者因其知悔有罪不至殺而或竟殺者因其造意迄今數月查各處土夷亦各稍有忌憚相誡守法如思明府屬之鄧橫寨向號凶頑應施懲治前經臣奏明續因其填濠伐竹形似支吾又委令員辨親往究訊據稱該寨夷衆跪迎懇訴矢誓歸誠如少有不法願甘寸磔竝取有甘結編送户口臣復准提鎮來札隨許以自新其餘一帶猺獞皆現屬安靜獨有慶逺府屬荔波縣之髙黑寨惡苗梁總剛梁總納等勾黨嘯聚靡惡不為掠人資財虜人子女且因地接黔邊又有棍徒勾引川販潛往窩藏暗添羽翼該縣遣役緝捕被惡黨搶回凶犯毆死縣差臣時駐劄貴陽審理川販積案內有荔波髙黑凶苗起釁者甚多先已嚴檄查拏並無報獲續據該縣詳到隨札移提臣張溥即委幹員酌帶漢土兵丁相機往捕并諭貴州都勻獨山文武撥兵堵禦協拏又思恩府屬之上林縣有東西兩撫蠻民向居化外不受約束而西撫之積賊樊李王樊匡料等父子兄弟濟惡一門世踞六便村中出沒古零等處招集外賊㺜獞為衛防交結襟棍兵役為護庇擒既不獲撫又不能歷來地方文武俱視為莫可如何今附近里民因受害最烈懷恨已深願出糗糧請兵勦賊臣據報前事隨查通省命盜上林為最上林一邑又樊賊為最現有特參營備諱盜一疏內所開近日劫殺十案悉係樊賊行凶洵屬著名巨寇若不急為擒縛流毒何底是以飛檄柳慶協副將潘紹周㑹同該署縣何允秀分撥兵練協力擒拏現在堵禦搜緝臣查髙黑六便二處賊蠻荼毒善良禍害邊境罪狀雖異惡跡實同今先後發兵懲創凶賊雖尚未授首而黨羽已散巢穴俱空實力捕擒料難漏網然賊首一日不獲地方一日不寧若或少有逡巡必致復聚滋事此又務當濟以嚴急以示威信以警姦頑者也提臣張溥自受事以來實心實力不辭勞怨考察營伍申明號令現在旗幟器械已一槩整齊獨兵丁疲弱猶猝難精練初張溥見百不如式少有躁心臣經密札婉規伊隨肯諾其出巡之舉前曾寄商臣念巖疆重地且經廢弛之餘非親身閲厯不能周知情形一旦有事故實難以遙度布置到任之初出巡固不可少但若嵗以為常又或日久相沿視以為例恐不免煩擾亦不可不慮經前後兩札覆知總之粵西軍務振刷者其皮毛鼓動處在志氣調停整頓兩事一心統俟臣到粵得悉大局再與撫提二臣酌商緩急次第料理外合併奏聞伏乞聖主睿鑒臣謹奏嘉悅覽之朕於三省更無纎毫顧慮處惟靜聽上天佑卿諸凡就緒耳雍正七年十一月初七日雲貴廣西總督臣鄂爾泰謹奏恭請皇上聖安朕躬甚安好卿好麼新春新囍諸凡平安吉利如意也同日又奏為恭謝聖恩事雍正七年七月十四日臣齎摺家奴䝉恩賞銀十兩馳驛齎回御賜臣花縀四匹寧紬四匹貂皮四十張哈密瓜二箇抵滇臣隨郊迎至署恭設香案望硃批好應題奏者具題但卿赴粵時凡少有煙瘴處萬不可經歷若少疏忽則違㫖負恩莫此為甚也必遵㫖行欽此臣伏讀之下仰窺聖慈感極涕零莫能自解查粵西地方委屬煙瘴而百色西隆一帶為尤甚惟冬至以後春分以前行人可保無虞其餘月令俱難免侵染是以臣欲乘此時徑由百色一路赴粵經過提鎮各協營約於封印前可抵桂林省城商酌諸事畢即於正月初旬取道全州一路由黔回滇是粵省地方既可以遍厯而回至鎮逺再停駐數日將新闢一帶苗疆親加查詢竝接見古州等處苗民面加撫綏然後抵貴陽過安順與撫提二臣妥議諸務由新開路沿途查勘以入滇境總不過三月初即可抵署縱有煙瘴處亦竝非煙瘴時也臣務當凛遵聖訓節飲食慎寒暖以自重自愛萬不敢少有疏忽以自蹈背負臣已定於本月初八日起程所有赴粵日期另疏題報外謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏欣悅覽之實慰朕念同日又奏為恭奉聖訓一併陳明事雍正七年十月二十九日准禮部咨稱為慶雲一月七呈黔省千秋一見事儀制清吏司案呈禮科鈔出雲貴廣西總督鄂爾泰題前事奉㫖據總督鄂爾泰奏稱黔屬思州及古州之梅得等處自七月初八日至閏七月十一日有五色彩雲光輝燦爛疉秀爭華厯時經久一月之內七見嘉徵等語朕嘗言天人相感之理捷於影響督撫大臣等果能公忠體國實心愛民必能感召天和錫嘉祥於其所轄之地即如鄂爾泰頻年駐劄本省祥雲三見於滇南今年以公事前往貴州慶雲即見於黔省又如今嵗嶽鍾琪領兵甘肅而甘肅禾稼豐登田文鏡節制山東而山東秋成大稔又如李衛總督浙江比嵗以來境內農田豐熟今年甫離浙境而衢屬山鄉即有蛟水泛溢之事舉此近事數端仰見上天昭示顯然欲使君臣共知警惕也朕素不言祥瑞所以屢年以來從未曽因嘉徵而受慶賀而敬慎之念日益加虔想中外臣民亦共知之矣夫上天示人君以災祥一如人君加臣下以賞罰也人臣受君上之賞固不可侈然自足放逸驕矜若竝無欣慰之心而不以為慶則受君上之罰亦不知畏懼悛改皆出於情理之不能自已倘有心懷不肖之人或且議其為迎合或且譏其為諂諛此皆藏幸災樂禍之邪心不止於春秋責備賢者而已惟是滇黔逺省荷上天之垂象加恩如此則自大臣以及官辨兵民宜如何之敬謹䖍恭以永承天貺是所當夙夜加勉者也該部知道圖併發欽此欽遵到部將圖存部外相應行文直𨽻各省督撫轉行駐劄該省之提鎮文武各衙門可也等因到臣隨欽遵轉行外臣跪讀數四敬仰我皇上發明天人感應之理廣大精微而一本誠敬值庥徵之屢至總兢業以相承所以保泰持盈欽若昊天者無時無事而不然是以上天申命嘉祥疊見此實聖德之隆有以感召而臣等䝉福得幸際其盛者也於此而有不夙夜加勉敬謹䖍恭以冀永承天貺而或反侈然自足不知慚懼是不識天心之無私不體聖訓之至切將自無承受地而恩不可長災且逮身纍及黎庶其罪豈減於矯情違衆胸無忌憚之輩哉伏念身為大吏凡所轄之地即為家所轄之地之兵民即皆子弟遇祥則喜遇災則憂固人情同然矣若地方寧謐年穀順成欣太平之有象致雲物之呈祥即愚魯民苗山童野叟尚且額手歡幸頌萬年有道之聖人而職任封疆或竝不以為慶故泛視以鳴髙是不但不仰體聖主厪念邊方之至意其於地方亦何殊視秦越而不關肥瘠者況事須據實何嫌數見如以為諂諛聖明不受如以為迎合諸臣且不能蓋能迎合堯舜之人必係臯夔之選以臣自揣愧未能窺測萬一實不敢自欺也在臣於諸祥瑞必彰明較著者然後具題若係邊隅僻地或即在㑹城而非萬目共覩者多未經具報即如滇省慶雲其在省城六月十八日五色雲呈見七月十七日已時五色雲呈見十月初六初十日五色雲呈見十二日五色雲呈見在各屬於九月二十八日新平縣呈見五色雲厯辰已二時十月初六日安寧州呈見五色雲與省城同日十月初九初十十一連三日烏䝉府五色雲見正值建造萬壽宫興功之始俱經地方官呈報至月華之祥亦不勝書閏七月十四夜省城月明如晝有五色雲捧護照耀十月初十十一兩夜省城見月旁彩霞擁護而八月初據報大理武定二府俱産有靈芝此實時和年豐漢夷安樂之兆臣不勝慶幸不勝警惕至於趙州醴泉普安州稻孫尤為從來所未有又十一月初二日據黔撫臣張廣泗札竝屬員禀稱十月二十五日起在省文武於萬壽宫齊集坐班據都勻府知府王鍾珣差齎芝草一本呈稱係在苗疆開河處所從石中採取竝不附於草木其芝如蓋似雙如意又合而為一長盈尺奏謝及續報慶雲芝草一併附摺奏明伏乞聖主睿鑒臣謹奏題到有㫖同日又奏為恭報滇黔粵西三省秋收分數米糧價值仰祈睿鑒事竊照兆民樂利端藉屢豐終嵗盈寧尤期秋熟況在邊省民之所依惟稼穡是賴滇黔粵三省豐熟氣象屢經摺報而實在分數必俟秋成之候臣前檄行各藩司確查詳報去後兹據雲南布政使張允隨詳稱雍正七年自夏徂秋各屬雨水調勻髙低田畝通得栽插據廣西廣南元江鎮沅開化普洱威逺永北鶴慶䝉化麗江順寧景東等府嵩明霑益宣威馬龍陸涼羅平尋甸師宗彌勒建水石屏阿迷寧州新興路南趙州鄧川賓川雲龍鎮南南安劍川和曲祿勸等州昆明平彝䝉自河西新平河陽江川恩樂太和浪穹保山永平楚雄廣通定逺定邊大姚元謀等縣具報穀收實有十分蕎收實有八九分據東川府并騰越雲州姚州鎮雄等州呈貢羅次祿豐通海㠄峩雲南㑹澤等縣具報穀收實有九分蕎收實有八分據烏䝉府并晉寧昆陽安寧等州宜良易門富民永善等縣具報穀收實有八分蕎收實有七分據南寧縣具報除被水田地補種者有十分六七分外其餘穀收實有十分蕎收實有九分又據雲南等府州縣呈送瑞禾瑞穀自一莖十三穗至七八穗五六穗者一千餘稞目下米價惟烏䝉夷地出産無多現在每京斗賣銀一錢九分省城五方雜處兵民衆多每京斗賣銀一錢二分各屬之價或六七分或九分一錢較之省城頗賤萬姓歡呼羣工忭舞凡此嘉祥上瑞皆由我聖主敬天勤民感格上蒼之所致相應據實詳報等情據貴州布政使鄂彌達詳稱今嵗自夏入秋晴雨應節髙下田地俱得及時耕種目今早稻已經收完晚穀現在收穫稻穀有一莖數穗及穀穗長至二尺自四百粒以至七百餘粒者小米有一莖二十七穗者髙粱稗子有一莖十五穗者黔省從來未見咸稱竒瑞各府州縣與各土司地方米穀雜糧收成雖止有十分其實倍收於往昔通省皆然不敢分析瀆陳現今省城米價每一市斗細為較量折倉斗一斗六升每一市斗賣銀一錢各屬市斗大小不一其價亦約略相同以倉斗計算每斗不過四五分至六分而止黔省天末邊疆乃得嵗登大有户慶盈寧皆我皇上德澤深厚感召天和所致除各種瑞穀委員齎送撫臣進呈外理合呈詳等情據廣西布政使張元懷呈稱今嵗風調雨順行據臨桂興安宣化三縣報早晚二稻收成均有十分黃豆小麥蕎麥各有八九分靈川縣報早晚二稻收成十分黃豆小米麥各有七分蕎麥八分陽朔縣報早稻收成九分晚稻十分黃豆六分麵麥蕎麥各有九分永寧州報早晚稻收成十分黃豆米麥蕎麥俱有八分永福縣報早晚稻收成十分黃豆米麥七分蕎麥六分義寧縣報早晚稻黃豆米麥蕎麥收成均有十分全州報早晚稻收成十分黃豆七分小米麥八分蕎麥五分灌陽縣報早晚稻收成十分黃豆蕎麥六分小米麥八分平樂縣報早晚稻小米子收成各十分黃豆八分芝麻七分棉花九分永安州修仁蒼梧藤縣等三縣報稻穀收成十分豆八九分恭城縣報穀豆收成均有十分富川縣報早晚稻黃豆米麥收成各十分賀縣象州報稻穀收成十分黃豆六分荔浦昭平二縣報稻穀雜糧收成俱十分泗城府橫州上思西隆等州東蘭南丹那地田州等土州容縣岑溪懷集思恩荔波武宣西林等縣永順長司各報稻穀收成十分隆安縣報稻穀收成八分豆與雜糧均有十分新寧州賓州永淳來賓遷江三縣奉議土州下旺安定二土司各報稻穀收成八九分馬平羅城懷逺三縣報早晚稻黃豆小麥蕎麥芝麻收成俱有十分雒容縣報稻穀子收成十分黃豆八分蕎麥六七分柳城縣報稻穀黃豆芝麻各十分粟米子九分蕎麥正在暢茂麵麥始行布種融縣報稻穀小米黃豆芝麻收成均有十分宜山天河二縣河池州欣城土縣永定土司永順副司各報田稻今嵗倍收實有十二分武緣縣報稻穀收成八分小米四五分豆三分鬱林州博白北流陸川興業等縣報早稻收成八分晚稻收成七分上林縣報早稻收成九分晚稻收成十分尚有潯州太平二府所屬漢土州縣未據報到然而粵西處處豐登柳州等處俱産嘉禾自一穗兩岐至六七穗者甚多則潯太二府亦無有歉收者應俟詳到另報至省城米價粗米每斗賣銀六分四釐細米每斗賣銀七分三釐五毫其餘各屬貴賤不同賤者四五分一斗貴者八九分以外總不及一錢之數百姓咸謂從來未有此倉箱之慶山農村老無不稱觴遙祝感戴聖恩等情各到臣除潯太二府俟該司查覆如果豐收無庸再奏外所有雲南粵西二省秋收豐稔黔省年登大有并三省米糧價值理合奏報再據貴川布政使鄂彌達禀稱普安州屬早稻見之竒事異常之休徴相應一併奏聞伏乞聖主睿鑒臣謹奏以手加額覽之朕向來深信天道捷如影響今歷覩滇黔之賜應實愈加親切倍增寅畏也不但當世封疆大臣起奮勉效法之心即將來奕祀膺父母斯民之任者亦莫不興感忠誠任事之念也卿之功大矣上天聖祖賜朕之恩厚矣我君臣惟愈加敬謹以仰報天祖之罔極耳期共勉之同日又奏為苗情踴躍嚮化誠切事竊照黔苗之役雖業已開通議設營汛撫綏防範可保無他虞然而苗性多疑漢人多詐武易張大文易懈弛善後之計實較創始為尤難欲求其傾心思服願為良善日近日親愈久愈安臣每熟慮殊時刻未能放心今回署已三月屢接張廣泗札竝各員辨禀報俱稱八萬古州遵奉約束有頭人數十名前來省城撫臣剴切宣諭鼓勵賞勞該苗等得觀閭里之安居樂業又見官府之體統威儀深知惡必誅而善必賞依戀情殷樂而忘返再三勸誡始資送回寨而清水江一帶諸苗前因有姦人捏造加糧丈田之說以致該寨驚惶今聞風嚮慕爭先赴營言傳聞之誤竝將所藏過山炮二位呈繳又有頭人三十名赴省叩見歸依誠懇再八寨苗衆現在奉公輸將之外竝以起造營基願趨力作其丹江各寨則於收成後自來請納錢糧不待催喚均極觀感之誠其九股苗人因向有讐隙自相殘殺者行營文武為之剖斷俱各遵依知有法度不復敢爭訟清水江通楚河道現在客貨通行可資生理惟古州都江可以通粵水道有原未招撫之定旦寨生苗尚在阻梗該文武亟欲開通業經臣密飭令其緩待務俟營制既定諸務就緒然後相其順逆一舉可畢蓋既非難事亦竝非急事也臣觀此情形新闢苗疆二三千里之地以俱安靜寧帖可無上厪聖懷總俟臣自粵回黔親歷其邊境再當宣布皇仁剴切開諭釋其畏疑之心指以安全之路俾知威必不可犯而恩日有加但得官辨無擾斯必苗民胥慶矣謹繕摺奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為奏明調劑黔省鉛斤竝辦獲滇省鉛息事竊照貴州威寧南籠二府所屬馬鬃嶺丁頭山等厰出産倭鉛向供雲南錢局之用經委滇員管理兹滇省羅平州地方出有鉛礦已足資配搭鑄錢而貴州現在請開鼓鑄需用鉛斤則威寧等處之厰應就近歸黔經管庶兩有便益亦易施調劑查馬鬃嶺厰每年約可出鉛一百萬斤大雞厰約可出鉛一百五六十萬斤砂朱厰約可出鉛二三十萬斤江西溝厰約可出鉛一二十萬斤四厰共計三百萬斤照例二八抽課每年可得課鉛五六十萬斤已敷新局之用其爐户餘鉛每年共有二百三四十萬斤又丁頭山一厰可出鉛十餘萬斤柞子一厰可出鉛一百餘萬斤總緣開厰之處地僻山深不通商賈以致鉛皆堆積而爐户人等工本無幾時有停工誤卯之虞若不設法接濟疏通難期功效況各省現有議開鼓鑄者徒以路逺不前即有一二官商前來如聽其赴厰購買不特馱馬雇腳呼應不靈而攜帶重資深入險逺之地亦難保無疏失是以臣駐黔時即經面同司道商酌照滇省題明收買運售之例借動庫項委員在厰將餘鉛按數收買就其取鉛之難易以定發價之重輕如馬鬃嶺砂朱江西溝柞子四厰礦淺煤近每百斤俱給銀一兩二錢大雞丁頭山二厰煤逺礦深每百斤俱給銀一兩五錢庶爐户等工費充足且有餘利得以盡力攻採而厰地始能興旺俟收買既定陸續發運於楚粵四達之區公平轉售又可濟官商之緩急除腳價費用外每鉛百斤約可餘銀一兩總計一年可得三萬餘金歸公充餉如再有節省贏餘查黔省各員養廉尚有不敷應另議酌添并備公支用此皆得有帑項通融籌畫是以裕課利民始獲鉛務之效也至於鉛厰既經歸黔則從前滇員所收買之鉛斤自應銷售清項臣前委武定府知府朱源淳收買黔鉛共發過本銀二萬兩曽經奏明今據朱源淳除繳還原領工本銀二萬兩每百斤應歸公銀一兩共歸公銀六千八百七十兩零外尚贏餘四千七百六十八兩零俱已兑交藩庫以備公用而滇省羅平所出之卑浙塊澤兩厰仍委朱源淳承領工本買辦供鑄每百斤已有銀一兩歸公現又議加課息將來仍有贏餘除聽滇黔二撫臣㑹疏題報外所有調劑黔省鉛斤竝辦獲滇省鉛息緣由合併奏明伏乞聖主睿鑒臣謹奏命該部鈔録存案俟題到查核同日又奏為報明七年分鹽銅課息事竊照滇省正賦為數無多所有鹽政厰務最關緊要臣自受事以來極力清查擔任辦理雖尚無大效亦稍有頭緒曽經節次奏明今鹽道馮光裕自雍正六年十一月二十二日到任起實心條理絲毫無欺計此一年內共徵獲節年新舊正額課項贏餘銀四十二萬八百六十一兩零較比額數多催獲銀八萬七千五百六十一兩零其額外贏餘一項共收獲銀四萬七千六百八十兩零帶徵從前遺缺在內若連題明抵補減價增薪缺課等項合算共有額外贏餘銀六萬一千餘兩其零星積餘一項前道劉業長在任共二十三箇月除開銷公用外實解司庫銀止二萬二千六十四兩零今馮光裕十二箇月內報出積餘銀共二萬一千五百六十六兩零內除開銷捐設通粵各驛馬價等項公用銀七千六百一十六兩零外實現存解司庫銀一萬三千九百五十兩零是合每一年算實較前道劉業長多收積餘銀四千八百兩零至各厰銅斤雍正六年分止辦獲二百七十餘萬者緣夏秋之間時氣盛行厰地尤甚厰丁難以存住故銅數大減今嵗天氣甚正各厰興旺糧道黃士傑復能盡心努力現據報春夏秋三季已辦獲銅二百四十萬目下冬季三月正出銅之時只須接濟工本不誤採煎實可辦銅一百六七十萬是七年分銅斤仍可辦獲四百萬之數其湖北銅運因該省願買滇銅臣現在發運一百餘萬至永寧水路聽其收領湖南廣東俱委員差役赴滇買銅臣俱令糧道如數發賣竝些少減價以恤逺來其吳省銅斤因去嵗運到之銅至今尚未收解不便再運應俟年終將銅數報部後聽候部撥所有七年分鹽務贏餘銅厰興旺緣由相應奏報再鹽務銅斤及銀鉛各厰事件向俱係撫臣專政臣到任後因諸項不清故一意經理今己有成規惟在調劑仍應聽撫臣總理臣照舊稽察亦竝不敢少有諉卸己面囑沈廷正竝通知司道合併陳明伏乞聖主睿鑒臣謹奏辦理妥協之至有何可諭但沈廷正操守甚不可信卿酌量之不可因專政避嫌倘有疏虞朕惟卿是問耳回滇時將朕諭令沈廷正知之硃批諭㫖卷一百二十五之十二欽定四庫全書硃批諭㫖卷一百二十五之十三硃批鄂爾泰奏摺雍正八年正月十三日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正七年十一月十五日臣齎摺家人蒙恩賞銀十兩馳驛齎回御賜臣寧紬八匹沉香一盒乳餅一匣果乾一匣抵彌勒州屬之樹皮寨臣跪迎至塘房內隨恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷蒙硃批朕躬甚安好凡有來引見過往之人朕皆詳細備問知卿精神氣象甚屬壯健光彩實為慰悅之至為善日强是乃天道敬誠為飬性修身之本乃千古至理二者卿皆得之矣朕復何慮欽此臣跪誦之下不勝感激不勝慚悚在臣志切成人原不敢為兒女態然每奉恩諭入骨沁心儼若跪覲天顔儼若面聆慈訓神與氣結淚隨言下不但臣無以自解即見者聞者亦實不能為臣解也伏念為善日强人道實即天道誠意故能潤身主敬所以復性此正聖學高深與天合德而剖析至理宣示臣愚所以養性修身者在此所以理人治事者亦即在此臣雖不敏無所成就然數年以來時時凛體寶訓亦稍有領悟精神壯健實倍於往昔而身心性命之際所以深受殊恩而萬難仰報者臣惟自知臣惟自勉此固莫可名言不容少懈者耳再讀至卿有微過令天下知亦毫不容情之諭旨敬仰聖明在上如日中天不以曲直而互易其影如鏡高懸隨其妍媸而各肖其貌功過不相貸恩威必竝施所以造就臣愚訓勵臣工者至詳且切臣敢不時加凛惕又讀至於卿或有分外希冀等諭臣不禁神愴在臣止知敬事一人何暇容心於恩怨然逢迎嫉妬觀望窺伺者實不無其人臣雖自信亦殊自危我聖主矜憐臣志為預絶意外之營求潛消難遂之憤怨所以愛惜臣保全臣者至矣極矣臣敢不益加奮勵益加警惕乎謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為恭謝天恩事雍正七年十二月十四日接准部咨奉上諭鄂爾泰忠誠體國經理苖疆勳績懋著伊曾祖圖捫於開國時奮勇陷陳效命疆場忠節炳然垂光衍慶積於其孫鄂爾泰為不世出之良臣祖孫忠良後先輝映朕甚嘉焉今鄂爾泰奏稱曾祖圖捫與祀昭忠寺牌位列銜佐領請照固原提督紀成斌之父守備紀法業恩給誥封贈官之例請將苖疆議敘之案移賞曾祖祖父誥封著將鄂爾泰之曾祖祖父俱照總督加內大臣兵部尚書職銜給與一品誥封其昭忠寺圖捫牌位改書新贈之銜入於大臣之列鄂爾泰苖疆之案仍著議敘該衙門知道欽此知照到臣臣隨恭設香案望闕叩頭謝恩訖竊臣追憶髫齔時臣父督課之餘諄諄以忠孝為訓謂身不足學當效爾祖每言及臣曾祖暨祖父母未嘗不淚下臣時雖無知一一敬記迄今四十年來不敢一日忘今荷䝉聖恩加三世以內大臣兵部尚書職銜給與一品誥封臣曾祖牌位改書新銜入於大臣之列寵命自天感泣無地半生難遂之隱願至今日而畢伸百身難報之洪恩即纍世而罔極聆後先輝映之溫綸何敢負慚燕翼奉祖孫忠良之寶訓豈忍貽辱祖宗沒齒不忘臣無可寬之一息畢生圖報臣惟誓盡其寸誠至苖疆之案仍著議叙之旨伏念祖孫父子業邀非分之親王之儀仗著增一倍大學士馬爾賽著加太子太傅大學士張廷玉著加少保大學士蔣廷錫著加太子太傅刑部尚書勵廷儀著加太子少傅靖邊大將軍公傅爾丹寧遠大將軍公嶽鍾琪雲貴廣西總督鄂爾泰俱著加少保河東總督田文鏡著加太子太保浙江總督李衛吏部尚書查郎阿寧夏將軍西柏俱著加太子少保欽此知照到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣自受事總督以來疊䝉聖諭之褒嘉懼負知人之哲屢荷殊恩之寵錫時懷逾分之羞世襲二品之官垂裕後昆於奕葉誥贈三代之爵重光前烈於千秋業叨罔極之深恩永下難酬之血淚今復荷特加少保器小任大恩重命輕寅亮之猷實顧名而滋愧凝丞之職竊捫心而加慚惟有敬誦王言恪遵慈訓每事矢之以忠誠勿懈夙夜庶務必勉其勤慎益凛氷淵除俟開印日恭疏奏謝外合先一併繕摺恭謝天恩伏乞聖主睿鑒臣爾泰無任激切屏營之至謹奏覽卿奏謝矣同日又奏為奏明微臣入粵情形事竊臣自雍正七年十一月初八日起程取道廣南府經土富州等處入粵西境自剝隘地方至百色登舟過思恩土田州屬抵南寧府登陸赴栁州自栁州復由水路於十二月十九日抵桂林省城沿途瘴氣全消且天氣和暖路旁豆麥青葱菜花黃茂緣年嵗十分豐稔以故兵民氣象皆甚屬恬熙臣一路接見屬員詢問情事原無所為勞亦竝不知勞所有目擊情形先敬陳大略看得百色地方為滇粵門户水陸交㑹人煙稠密商賈輳集且係行鹽總埠誠屬往來之要衝經臣題請將右江鎮衙門移駐於此實所以資控制在撫臣金鉷之意前欲於對岸之甘蔗園建城修署及臣親加相度見甘蔗園地面低窪毫無形勢且隔河背道諸多不便隨擇於現在遊擊衙門左近既屬形勝亦且高爽今已面商定議不日次第興工至南寧一府南控交址東瞰潯梧西接思田北衛栁桂駐劄左江鎮為粵省要區城垣坍陷墻垜傾欹臣前據查報業經批司料估兹復率同鎮道周至賔州遷江來賔雒容永福等州縣城小而墻低間有倒壞已令隨時修整此沿路城池之大略也粵西營務廢弛兵丁怯懦見者聞者莫不衆口同聲兹臣親至粵地始知從前之廢弛怯懦者亦有由來查通省額兵原不足二萬而提鎮將辨等官私食空糧竝捏充公費糧者已不下數千名其管隊領旗等又不敢不分給夥糧兼且一切軍器皆不堪用帳房鑼鍋無一齊備一經撥調將辨先已畏縮僅令現在之兵丁前往兵丁又不甘心以故相與因循遂致漸成疲敝自雍正二年以後侵冒營俱略已改觀而提標則甚屬嚴整即如昨酌派官兵前赴都江時兵丁紛紛告禀俱各願往效力是軍氣已振號令可行但能從此勤加訓練務鼓動其心志將不一二年皆可漸成精鋭此沿路軍伍之大略也粵西各屬土職之為患者少版目所目之為害者多緣伊等平素既能挾制土官及至地方有事又惟土官是問竝不責成土目以故日屢據各屬禀報俱稱不敢滋事臣竝未敢過信兹自入粵境隨據總兵官蔡成貴呈報據泗城府鎮安府西隆州西林縣土田州土鎮安州各屬土目千七百零一張據稱尚有未及繳到者容即陸續全繳本職現俱查收請將鎗刀揀好者給新兵領用其餘遵示解交司庫備用等情而思恩南寧太平各府屬土目竝約集千餘人遠出迎接俱隨行數日看此光景似漸有回心向化之意臣俱犒賞開諭宣示皇仁各歡欣領受而去此沿路夷情之大略也粵西土府州縣以及峝寨等司共計五十員俱隸於南太思慶四府半係狄青征儂智高時所留守半係王守仁征岑猛時所駐防其中良頑不一賢愚各異從前諸流官但知利其貨財竝不示以統屬即或繩以法紀亦竝不禁其殘苛土民目無流官土司心無大吏愈遠愈疏日久日玩故即該管府道有竝未一見土屬者此邊省之通弊亦不獨粵省為然今臣赴粵自百色以至南寧四府五十土員內除現未承襲及因事參革之五員外其餘無論遠近俱經齊到匍匐叩接踴躍隨行臣一體傳見宣示聖主一視同仁至意曉以禍福喻以人禽內有昏庸不能約束乖張不恤夷民耽酒好戲一任頭目驕縱癡呆敗家亂宗者共數人臣復指名申飭更詳切開導該土員等聽聞之下叩頭有聲齊稱誓當圖報國恩不敢有負訓誨直隨至賔州始皆退散臣看各土員內竝無獷悍之人只須教以禮法不須示以平不讓內地諸省從前頗側險隘之說皆屬虛捏臣經過柳州府直隸賓州即就目所親見可耕種者已不下數十萬畝提臣張溥言伊巡歷所至如此類曠土仍不止數倍閒棄地利誠為可惜昨嵗撫臣金鉷赴粵與臣言及欲仿屯田為足兵計臣云兵少不妨請添開墾之實應力行屯田之名不必立今臣親至查問知開墾一事尚竝無成議是務當及早經畫者至額荒田地雖亦經報墾首熟然細加察訪紳襟士庶尚多不遵限首報或將未首之田指為老荒具呈報墾或將新墾之地匿其大半僅首些微地方官或有糧册而無田册縱使稽查不難指東話西甘蹈欺隱臣業檄令藩司通飭各屬先令戶書開明各里各甲查出業主正姓的名弔驗文契有無帶荒字樣則欺隱自出凡有報墾者地方官即就查勘如果係無主老荒或有主而無力開墾者方給照許其開墾如以熟田混報新墾治其詐冒之罪倘堅不首報或經查出或被告發即變價入官給賞首告之人仍治欺隱之罪按年照追籽粒則原報荒額庶可以補足又民屯田地雖分里甲立有户根然半係地棍勢豪包納侵肥業户之正姓正名糧冊不得而考業户之額糧多寡本人竝不得而知於是姦徒立一户根侵而地方官之催徴亦得實據臣仍當不時查催總不敢少有諉卸此沿路地土之大略也粵西水陸處處通達如自百色抵南寧由潯梧平樂以至省城俱可行大船但路稍迂繞自南寧登陸至柳州計七日道路寬平數輛車亦可竝行即自剝隘至百色之陸路從前甚屬險窄今知臣經過㺜獞人等爭先開修巳成大道獨由柳州至桂林之水路陸路俱有阻隔往來不便查自柳赴省陸行三日可到只因細路崎嶇兼無鋪店行人遂視為畏途欲事開修殊非難事至於水路係自府城登陸四十里至雒容下船經二百二十里抵蘇橋復自蘇橋登陸六十里至省城計程不過三百二十里須行六七日者緣河面雖寬然灘淺沙淤從未疏濬日有停擱俱係水手下水推行即寒冬以為常臣隨處詳勘竝細加詢問知不但開挖此河甚易為力且自柳至省原直可通舟不須逐節登陸查自省城河塘起至分水塘以東雖有牛尾陡馬溜陡等名共九處內惟廟門橋陡社公陡二處應修老虎跳曬禾坪等處有石應鑿自分水塘以西均係順水半屬深寬內惟鰱魚黃泥二陡應須整理外共有低橋三處應須改造統計工料需費無多若此河一通不獨商賈便利且附近田禾皆可資十七日自桂林起程再取道親勘倘有未協仍令加工修築務期堅久此沿路水陸之大略也至塘汛郵遞半多懈弛墩臺房鋪半屬草率臣巳嚴飭通行其文武官辨於沿路驗看竝封印後來省接見者巳十居八九容臣實據所知合之查訪將賢否優劣分析開摺續呈御覽所有微臣入粵情形合先繕摺具奏伏乞聖主睿鑒臣謹奏嘉悅覽之同日又奏為敬陳水利併改河道事竊照雲南府屬之宜良縣原有水道其在縣之西者有湯池龍泉一十八村之田畝悉資灌溉不過修整埂壩開濬河身便可無水旱之虞其在縣之東者有赤江一道發源曲靖穿過陸涼流於該縣達於澄江原屬巨浸但江深岸高無濟田畝狗街六村計十五里向無水以供栽插業經臣於六年冬檄令該縣相其水道開引孫王吳營之水以灌田赤江以東亦現受其利獨縣治之東赤江之西自黑羊村以至水趕村共四十餘里從來無水田畝不下萬頃每栽插失時所收歉薄約計十畝尚不敵縣北之一畝臣查宜良河陽交界地方有陽宗海寬十里南北長三十里其深莫測前明有糧道文衡者曾開穵此水穿山過箐從湯池已至黑羊村今雖稍淤田畝猶賴以利濟臣諭該縣前人既可行之於前今人何不可踵之於後縣北之四十餘里既可穵縣南之四十餘里寧不可鑿乎若能開至水趕村通赤江其利濟甚溥仰即傳集紳士耆老公議開修去後續據知縣邢恭先禀稱奉諭之後即集闔邑士民公議疏鑿俱各歡欣踴躍業擇於十月初三日興工日有千夫各開各界竝不要工價但須接濟食米等語及臣赴粵之便經過該縣親加查問薄示犒奬士民鼓舞倍常約於嵗底春初即可以竣事但北屯疏濬南屯開穵共計八十餘里不無傷損粵河道自滇之阿迷州直達粵之八達汛中止有土黃一百數十里之陸路前經臣奏明今查得由飛塘至八達河止計水程二百四十里水勢平緩易於疏鑿大可行舟由八達河登陸至土黃計一百八十里下船直通剝隘百色計水程六百九十四里與其歷諸險灘至阿迷州登陸六日方到雲南省城不若由八達河下船至飛塘登陸由廣西府至省城計程亦不過六日既險易迥殊且工費懸絶臣隨於途次面交廣西府知府周埰令將廣西府至雲南省城六站陸路修整寬平務使可以行車復札諭糧儲水利道黃士傑令於此一百八十里陸路兩頭蓋車店兩處共打車一百輛買大牛一百條委妥人照管以便載運錢銅招引商賈至此條陸路原係粵西西隆州地界自八達至馬蚌四十里有塘房可住須添蓋牛棚二十間自馬蚌至古障五十里亦有塘房須添蓋牛棚二十間自古障至央達六十五里無屋可宿須蓋塘房十五間牛棚二十間自央達至土黃三十五里須蓋塘房十五間牛棚二十間業經檄飭西隆州照站起蓋竝令該道一面差人支取臣存興造緣為滇粵通道計臣不敢少有將就事期可久不得不更為通酌者也合併繕摺具奏伏乞聖主睿鑒臣謹奏是當之至同日又奏為奏聞事竊照黔省苖疆自開通之後楚省舟楫已可直達清水江來往客商現今稱便而古州八萬有都江河道上可至黔之都勻府下可至粵之柳州府等處船可通行既便且近因向有原未招撫之定旦寨及來牛寨兩處生苖尚在阻梗經臣密飭該文武緩待務俟營制既定諸務就緒然後相其順逆一舉可畢業將大槩奏明在案今古州一帶現在安塘設汛并設流官管轄化導而定旦一寨前據密報復有伏草截路傷害放馬苖夫之事是剿之有名機不可緩但查定旦來牛之後路俱緊連粵境非粵兵協進難以開通臣巡視粵西查得柳州慶遠二府計程到古州緩不過十餘日抵南寧時隨調撥左江鎮標兵三百餘員名至柳州時又派調提標兵七百餘員名慶遠協兵二百餘員名并令酌帶土兵檄委慶遠協副將潘紹周永寧營參將施善元統領前往古州諸葛營㑹同黎平協駐防彼處副將趙文英查勘河道便剿定旦又撥粵撫標兵三百餘員名賔州營兵二百餘員名徑由荔波縣屬之三峝前進平宇地方并准趙文英檄調都勻協兵三百餘員名亦前抵平宇兩下㑹合堵禦定旦帶𠞰來牛俟事畢後即令開通河道㑹同踏勘黔粵二省當於何處分界兩省地方應於某某處設汛各需兵若干各於何營抽撥定議通詳酌奪在懲治二苖寨原不須多兵臣所以撥派稍多者一則為開通兩省河道計二則粵西辨丁向不知兵事既令其學習行走以鼓其志氣兼令黔疆苖衆知粵兵聲勢呼吸可通竝以懾其膽而消其萌亦殊為兩益也再黔省各處苖情大局俱屬帖服惟古州之車寨諸葛營舊為伊土今既就地建營現雖外甚恭順未免中懷耿抑清水江之雞呼黨數寨原與公鵝合款習氣凶頑公鵝雖平餘黨半在暗地勾結亦情事所必有臣屢經切札囑撫臣張廣泗并鎮將等官加意防範不可姑息兹臣赴粵於途次先後接據總兵蘇大有呈禀准張廣泗札云十一月初間有雞擺尾大寨苖頭數人來營報稱有雞呼黨等寨潛相糾結欲來偷劫苖等勸之不聽特來密首蘇大有當即准備果於初六日夜潛來營盤左右窺探見有防範不敢肆惡猶於遠山舉火呼跳逮至天明遣發官兵數百名沿山搜逐衆皆奔竄擊殺頑苖數十人我兵亦帶傷二人續據探報頑苖自奔竄之後不敢復來而附近寨分有被其迫脅者恐并連纍俱赴營洗白確查倡首者只有雞呼黨東庫夭蠟黨宜四寨現亦畏罪央人求饒情勢不過如此無煩籌慮等情又准提臣楊天縱咨同前事并令更替補數官兵前往等情各到臣隨經札囑蘇大有等倉卒之際良頑未分驟爾進𠞰反滋惶惑務查實順逆先明白曉諭與别寨無干然後指定雞呼黨數寨盡力懲創即縛獻哀乞切不可輕聽去後復札覆張廣泗前公鵝寨原未盡𠞰餘黨思欲報復故必煽惑勾結且雞擺尾等處近聞赴省叩見而獨雞呼黨不前其機已露故預料其不無反覆前在黔時欲一併𠞰戮者實非忍也今自作之孽何用姑息倘再縱惡致多效尤是不殺少而殺衆名為用愛而實殘故未經化導而抗拒者情有可恕業已歸嚮而反覆者法必當誅雖反覆者只三四寨而漸不可長萬不可因事易而輕忽視之且現因開通都江調發粵兵至古州諸葛營協同辦理雖清水江無需粵兵而正可遙作聲勢事機難預定可就近酌行等語札覆去訖至於古州之車寨現雖毫無形迹然不可不預圖臣已密諭副將趙文英令於進𠞰定旦時親領千餘兵離營却於附近埋伏諸葛營內故示以單弱以覘其動靜倘少有反覆即回兵嚴𠞰若果歸向甚堅則萬不可輕舉臣看趙文英頗知機蘇大有實能事粵副將潘紹周雖少歷練然志氣可用佐以參將施善元久經陳戰能識緩急此三事料可計日告竣所有撥派調度情事理合繕摺陳明謹奏大局業巳䝉上天慈恩盡屬妥協矣似此細端猶在卿酌量詳慎不可少忽以貽後患然古州一事朕終不敢信其久無他變也卿其志之若能始終如今日之妥帖誠出望外同日又奏為奏聞事竊照粵屬荔波縣之高黑寨上林縣西撫之六便村二處蠻賊荼毒良善禍害邊境罪狀雖異惡蹟實同臣先後檄行發兵懲創業經奏明在案續據副將潘紹周等禀稱屣緝得蠻賊等藏匿洛峝巢當即㑹同賓州牧王琠督兵攻打賊復潛遁嚴令官兵加謹搜捕守備許應虎等於十月初八九兩日擒獲男婦五十餘人又獲窩賊樊國珦并其妻媳孫女八名口俱交賓州收審訖又於十四日據三鎮土舍等報西撫渌村山上隘口有賊潛匿隨即督令官辨兵役四面分布將淥村山團圍搜擒職等從洛峝移營督兵㑹捕十五日漢土官兵奮勇直上蠻賊開鎗迎敵當被土兵鳥鎗中其右乳從崖上跌下當即氣絶據鄉練人等看視稱係賊首樊匡料各皆憤恨切齒欲分啖其肉而甘心職等恐其不確令營兵有目識匡料者識認咸供稱無異隨即梟首呈驗繼據報樊李王在龍霸巢地方藏匿隨即親督辨兵於二十二日追捕已將樊李王擒獲并擒幼女一口炮死伊子一名其餘黨羽仍令官兵嚴加搜緝等情到臣臣查撫民之名始於明代王守仁在當時原未加懲賊梁總綱等懼罪潛逃遍緝無蹤其附和之衆俱經撫諭安插現議於寨內摩猺村安設營盤於村司設法緝捕而撫諭安插之衆俱各矢誓歸誠願獲解去訖是巢已盡毁地已改營賊既無歸路亦難有去路游釜之魚料不能漏網也臣查粵西一省㺜獞為害實不止此二三處而慶遠思恩柳州三府直隸賓州一州為尤甚蓋土地荒僻易於遁藏又有地棍劣襟為之黨羽根蟠蔓衍遂日久難制若因擒治數起案犯即以為凶頑震帖僅見通衢附郭良民即以為地方樂利恐當此少有懈心日後轉須費力密飭嚴拏固未可以暫忘者臣在滇署業經通檄各屬竝不時訪察兹自入粵境復沿途細加查訪凡素行不法之棍霸亦稍自斂戢竝有自行投首者槩許以自新其凶惡不悛斷難寬貸者如賓州屬之獞棍韋學祖石良玉號稱南北二霸殘虐鄉愚魚肉良善附近被害者竝不敢訴告恐官不能治反遭其毒手臣過思恩時據報業將韋學祖獲禁其石良玉經嚴諭該州縣勒限拏解現據禀報亦於十二月二十八日擒獲到案又南寧府屬宣化縣之武生梁愈棟窩强匿竊無惡不為伊子四人竝為盜賊大為地方害亦即檄拏審究又直隸鬱林州屬之衙役何清等七人藉多務當嚴飭嚴拏以靖地方者也至若慶遠府之宜山縣屬有南巢西巢北巢四面險阻惡獞盤踞其中時出劫虜雖隸宜山縣管轄而與南丹東蘭那地三土州連界潛沒出入縣令不得制今東蘭州既改流非設兵駐防不足以資彈壓又柳州府之羅城縣屬有通道峝馬等寨巢穴深險隘口窄狹惡獞時出而虜掠兵役不得入而盤詰該地方文武皆能知其詳臣擬於要隘處所先密設塘汛以稽其出入以斷其搬運順則示撫抗則立𠞰現與撫提二臣㑹商酌議竝一切添兵移營及米榖礦厰等事俱容臣虛衷商問細心斟酌再當次第聞伏乞聖主睿鑒臣謹奏欣悅覽之同日又奏為廣南土司土目投見歸誠事竊照雲南廣南府土同知儂繩英犯法擬絞業經監斃其妻嚴氏撫幼管事其權俱歸土目其四大頭目曰內甲曰總管曰板欄曰內兵其板欄有陸順達與其子陸尚安等互相濟惡官府傳喚從不入城即偶至城外亦必帶兵四路埋伏其於村中占奪燒搶種種不法曽於康熙五十六七年間各頭目遍起土兵圍城幾陷亦惟事隱忍不可奈何及經臣出示明書陸順達陸尚安等名曉以改過從寬怙惡必戮大意後亦稍知斂跡臣於雍正五年八月初一日覆奏升任廣南府經歷吳啓文摺內奏明荷奉硃批覽此奏朕明悉矣次第緩為之卿自有斟酌道理朕意凡煙瘴之地改流極宜詳慎欽此臣即密諭該地方文武外示寬容密為防範以便緩圖今臣巡視粵西路經廣南預行檄飭經過地方凡土官土目人等俱來聽宣示皇仁豫以自新之路開其遷善之心如有隱匿不出者定行嚴處去後到處土官目民人等無論遠近盡來投見臣隨加奬賞勸諭於十一月十九日將至廣南即有儂繩英之妻嚴氏同其姑祿氏率領伊子儂振裔竝四大頭目等泥首郊迎臣於二十日逗遛一天盡傳至行署面加開示若能改過自新已往不究若仍蹈前非即嚴拏正法該目人等無不感激泣下誓為良善內陸尚貴一目前嵗征𠞰八達寨時曽調領土兵奮勇效力業造入軍功冊內今因其來見賞以紬縀銀牌等物竝令以外委把總隨營行走一以示奬勵一以便指使陸尚貴涕泣叩頭感激悅服時陸尚安一目猶畏罪未出及至次早將起行陸尚安投到俯首請死臣歷數其惡故作必殺狀竝令其回寨預作准備以待屠滅而陸尚安叩頭設誓願永作良民懇隨赴廣西隨回雲南以效犬馬逮隨行兩日已入土富州境臣始許以不殺令一聼流官約束時土官母子竝大頭目人等俱在臣復剴切開示令其各回大衆歡躍臣亦加以奬勵諭令寧輯地方各安本業伊等皆知感戴聼受惟謹嗣於十二月十四日行抵廣西柳州府據廣南府知府賈秉臣廣南營參將馮鸞禀稱有撫幼管理廣南府土同知事務嚴氏率領土目親具印呈內稱自大憲節制撫恤漢夷同視近來年豐時和祥瑞疊見幸逢巡視粵西沙儂今日見天敢不及時向化氏雖女流亦具天良誠心愛戴情願於原納額糧一千八百二十二石零外增輸熟糧一千一百七十七石零共足三千石又廣南府向無城郭願捐已資建築城垣一座不敢派纍夷民以報國恩土目陸順達等衆志如一懇恩轉達等情又據廣南府富州土知州沈肇乾亦具印呈內稱自沐聖朝覆冒生齒日蕃荒土漸開兹逢大憲冒瘴衝煙為民籌畫雖屬土夷亦具天性情願照原額秋糧三百六十六石零外增輸糧米六百三十三石零共足一千石以供兵食又卑州向無城垣願捐祖遺資財在歸朝地方建城一座以固邊防職屬九茍土目頭人方準矩等紛紛踴躍各各傾誠永願為聖世良民伏乞轉達等情又據馮鸞禀報有廣南老土目陸順達面禀今䝉大憲巡歷恩威普著合門感激不殺之恩謹繳從前收存大炮一座過山鳥一尊願永為良善此外尚有大炮各頭目情願總繳伏乞賞准從緩查出一并繳上再廣南土目俱已到齊惟陸尚元盤踞彌勒灣地方從不進城今又未到現已嚴檄土同知飭查另報各等情到臣臣查雲南廣富二土司地廣田肥不讓內地廣南一營兵米嵗需不敷仍須採買而接壤粵界沙儂素多仇殺又竝無城垣可資防禦目前雖屬寧帖終非久遠之計臣曽委員料估城費即石基土墻亦需一萬餘金而廣富糧米頗多即加增一倍亦甚全倘敢有頑抗立即擒治蓋從前原不妨寬緩以待徐圖此時則務當嚴急以齊衆志陸尚元固無能為恐將生衆目之心也其土同知嫡子儂振裔年已十六例應承襲管事臣巳批令取結具詳竝不許令伊有絲毫雜費去訖至於廣南一營地方遼濶汛廣兵單實不足分布彈壓按舊制廣南營屬廣羅協兼轄係臣衙門統轄竝不受開化鎮節制是以遇有事故呼應不靈彼此推諉以致日久廢弛查廣南府離省城十二站離廣羅協駐劄之廣西府八站而開化府一鎮離廣西府廣南府皆止四五站較論遠近此一協一營自應歸併開化鎮管轄庶便酌緩急以資調度且此一隅係三省交界極邊之地今統歸一鎮則黔有安籠鎮粵有右江鎮與滇鎮三方鼎峙連絡聲援亦足以建威消萌永謀寧謐但道里形勢臣尚未周悉或將開化鎮竟移駐廣南將副將移駐開化或將廣南改協廣羅改營兩相調换容臣詳細籌畫再當㑹疏是請旨遵行除輸糧數目及建城日期俟詳到題報外所有廣富二土司土目投見歸誠情形合先繕摺奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為奏聞事竊照廣東省盜賊甚多或駕船列械或哨聚山林公行劫掠為害地方兵役不敢捕緝案件十無一結臣聞知最確前廣東督臣郝玉麟過黔時臣曽囑令振刷措置漸為消弭并於欽遵聖諭與郝玉麟講論事宜摺內奏明至廣西省雖未聞有匪黨聚衆而接連東省州縣及土屬地方不無凶犯逃竄潛匿復經臣通飭各屬密訪嚴拏在案兹臣抵桂林省城後於夲年正月初二日准督臣郝玉麟咨㑹上年十二月初五日據肇慶協副將李建功探報肇慶府屬恩平開平等縣地方有姦匪聚衆不法散布僞劄當即委員領兵前往搜捕陸續據報獲解姦徒四十餘人隨經飭審究擬今餘黨巳散地方業巳安堵惟訊獲犯梁子賔供十月內有東安縣李梅說八月裏往廣西大倫地方見一箇姓文的說他哥子現在陜西要圖大事招有許多兵從廣西就到廣東楚震公就是姓文的弟郎還有一箇和尚呌智開曉得法術臨陳能使人昏迷八卦圖寫羅平二字係取來作旗號劄付係紅白藍各色等語希即密查大倫地方有無姦匪潛匿境內并飭各屬嚴行稽查防範等因臣看來咨內所開大倫地方竝未訊明屬何州縣惟查梧州府屬之北流縣屬現有大崙墟地名隨密檄司道及府州等星速查拏并咨覆督臣郝玉麟去後旋據泗城府知府祖良範稟稱十二月十二日據武舉岑映翰禀本月初十日陡有羅安面遞稟帖係班康吳順黃全羅安名字俱是府城素不務業之人拆看都是不法之語不勝駭異武舉世受皇恩粉身難報因兄映宸不肖改土歸流猶䝉准豫存祀日前叩接督部院又䝉訓誨奬賞聽受之下感泣無已今班康等自巳為人所愚又來哄騙武舉為禍不小特將原禀呈電等語隨問岑映翰供據羅安說為首的人本姓韋係土田州人自稱李天保現住在田州街上去來不定他呌我來說若要做官拏十二兩銀子給李天保討一張劄付來就可做官了武舉假意對他說有此機㑹是極好的事我差人同你到李天保家討了劄付回來再作道理他信了武舉的話還在武舉家住著求將羅安暫緩拏訊且令伊同家人往田州取討劄付等他們去後武舉帶領親信妥人隨後趕去出其不意一鼓擒捉等語卑府隨將計就計令岑映翰前去擒拏岑映翰打發家人同羅安去訖於十四夜又據岑映翰首報有一人名䝉薦帶有劄付一張來招家人班良班良告知武舉䝉薦現住府城相應出首等語隨即密拏䝉薦訊供是泗城人今年四月內到田州撞見李天保說玉皇大帝二仙娘娘來㸃化他賜有玉符使法跟了他就有官做故此小的跟他的他平日來往的都是田州土人零星散住約略也有五六十人記不得他們名字小的曽向李天保說起缺班良八錢銀子至今不得清還李天保說你招他來做官他看見有劄付這銀子就不要還要另外送你銀子故此替他送劄付來的等語又搜出牌一張符咒五張據稱做護付呈報又據田州土知州岑應祺禀稱奉泗城府牌委十二月十八日夜協同泗城武舉岑映翰拏獲匪類李天保徐召年班康等三名并歇家楊秀陳良黃寄三名起有僞劄字紙訊據李天保供係思恩府屬歸順土州人徐召年係廣東高州府電白縣人今住太平府屬鎮遠土州地方班康係泗城府人當將現獲匪類歇家羈禁聽候提訊僞劄字紙禀繳右江鎮合具禀報又據右江鎮總兵官蔡成貴禀稱李天保假此劄付愚弄土人圖得財物其僞劄內皆先填注姓名然後授劄附和要犯有吳順黃全勞有功黃結現在密拏僞劄略檢二張呈閲各等情到臣臣查李天保潛匿田州私造符印分發僞劄劄內僞號曰開平元年即據各禀稱李天保貌同乞丏略無人形而此等匪類若不追究根由剪除餘黨何以安定良民東西兩省之案是一是二尚未供出隨行廣西按察司移㑹右江鎮并行泗城府及土田州迅提李天保等各犯公同㑹訊果係何人造謀糾夥稱皇假號何人僞造印信劄付同黨實有若干人廣東省謀為不軌之犯是否即係伊等一起大倫地方是否即係北流縣屬之大崙墟抑或在泗城府及土田州所屬境內文姓是何名字現住何處楚震公與和尚智開曽否識認選差兵捕追拏供出夥犯務獲一併訊取切供詳解撫臣親審明白請旨正法發落外所有廣東省查拏匪類廣西邊境拏獲姦匪現在飭審緣由合先奏聞伏乞聖主睿鑒批示施行臣謹奏覽此等匪類之為害甚於賊盜當不時留心訪察者此案宜極力嚴究審擬可傳諭金鉷等不可存恐其拖纍之小見草率將就完結也同日又奏為覆奏事前臣請開黔省鼓鑄摺內荷䝉硃批欣悅覽之向聞黔省從來不用錢文今似此得無可通行乎欽此伏查向來黔省竝不用錢文者既因錢文無多兼因苖狆獷悍習慣逞凶但見財物即行搶劫錢質沈重更不便攜帶又因糧食買賣熟苖以錢交易者漢民或昂其貨物或虧其錢價故彼此俱不用錢由來已久今數年以來仰賴聖恩苖民向化道路坦行搶奪之風已息錢文之價甚平不特往來旅店銀錢竝用且有商賈於滇省䭾錢至黔换銀者是國寶漸可流通自應乘時鼓鑄據臣愚見擬於開局之後不特各役工食及驛夫等項俱應發給錢文而支領兵餉亦須以銀八錢二或銀七錢三搭放即漢夷零星糧折亦令其銀錢竝納則上下通行遠近散布錢文自無壅滯矣再黔省礦厰雖可有成效然經理方始尚未敢驟定規條如商民獲利太微則開採者稀少遠近腳力太重則販賣者退縮須權其所出之多寡工本之輕重馱載之遠近大局不可分歧而調劑須别髙下必使民間於工本之外尚有利息而在官所收銅鉛亦必各有贏餘則上下均受其益方可以經久臣已批示委管厰務各員去訖容臣由粵過黔時再面與撫臣及司道等細心酌量妥協再行題請外所有黔省錢文可以通行緣由合先繕摺覆奏伏乞聖主睿鑒臣謹奏欣喜覽焉硃批諭旨卷一百二十五之十三欽定四庫全書硃批諭㫖卷一百二十五之十四硃批鄂爾泰奏摺雍正八年三月二十六日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正七年十二月二十九日臣齎摺家人蒙恩賞銀十兩馳驛齎回御賜臣御書福字一幅御書對聫嵗嵗平安節年年如意春十字平安如意荷包一箇堆錦荷包一箇內貯金錢寶玉等各十四枚哈密瓜二圓文旦四㑹柑紅柑盧柑甜橙共一箱各種敖爾布哈一匣奶餅一匣鹿尾十條樹雞六隻野雞十隻細鱗白魚二尾多樂魚二尾鹿肉十四塊鹿腸二副抵廣西省城臣隨郊迎至行署恭設香案望闕叩頭謝恩祗領訖敬啓摺扣荷蒙硃批朕躬甚安好卿好麼新春新囍諸凡平安吉利如意也欽此又恭奉聖訓摺內荷䝉硃批欣幸覽之此實卿忠誠之所感召非朕推美於卿作違心之諭也然上天賜佑之德朕亦不敢矯情謂於朕無涉蓋君臣之間若少不能視為一體則為庸主愚臣矣同囍二字實為通論餘無可諭欽此伏念臣身在萬里心依九重感聖恩之逾厚顧臣職之匪輕每自省自訟斯懼斯慚雖時敬體天心未能步趨一二幽獨之地只應自知兹跪誦同囍深維一體心馳神悚復不禁涕淚之盈襟也至諸凡平安吉利如意臣自赴粵返滇周行四省氣候各殊水陸迭替不但臣身體強健精力倍增即隨從二百餘人竝無一人疾病而人情和悅氣象光昌一切舉行半多順遂惟聖主之賜直遍及庶人臣之慶幸實有莫可名言者若恭逢至聖之主而猶無所領受顧自安於愚是為下愚不移者臣愈知所以自處矣再臣恭報三省秋收摺內荷䝉硃批以手加額覽之朕向來深信天道捷如影響今厯覩滇黔之賜應實愈加親切倍增寅畏也不但當世封疆大臣起奮勉效法之心即將來奕􅑤膺父母斯民之任者亦莫不興感忠誠任事之念也卿之功大矣上天聖祖賜朕之恩厚矣我君臣惟愈加敬謹以仰報天祖之罔極耳期共勉之欽此臣捧讀數四悚惕汗流伏惟天道無私人心有著敬謹所以修身寅畏所以立命但能深喻影響自必各起奮興在上天之鑒察昭垂固至公至信實一人之憂勤惕勵必敬必誠如微臣者雖立心行事不敢自甘暴棄然數年以來所以少有進境者實惟聖訓之裁成而無他學問感切欣幸更有出於恩光榮寵之外者捫心自審殊未敢稍有欺飾以上負我慈父也忠誠敬謹務期終身勉之當世奕􅑤竝非所敢計謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為奏聞事竊臣巡視粵西行抵南寧府接據雲南布政使張允隨禀報雍正七年十一月十二日戌刻見一星從東方起色正黃其光熊熊煌煌竝不芒射較衆星獨明潤而大嗣後每夕見光色相同兵民共覩額手歡忭等因臣經諭令查明分野詳考典籍敬於御賜臣古今圖書集成內確查詳核續據禀覆查得十一月十二等日嵗星昏出躔度井水宿為升殿屬雲貴川陕分野又查天官書云嵗星一曰攝提曰重華曰應星曰紀星又云色光明潤君夀民富主福主五榖又云星色赤黃而沈所居野大穰又云其色明而內黃天下安寧今按雲南所見星象方位正是嵗星呈祥占為人主仁德同天錫福無疆百姓安寧五榖豐稔實為瑞應等情臣經告知廣西撫臣金鉷等據稱查天文考瑞星者五行中和旺相喜合之所生也王者德至於天則見其星有五一曰景星二曰周伯三曰含譽四曰格澤五曰歸邪唐時李淳風瑞星辨有云周伯赤色光潤或黃如橘按之滇省所見星出東方黃大而明潤無芒以其狀則與黃大如橘相合正係周伯瑞星不得指為木星等語該臣學識淺陋負慚管窺未有確見不敢妄擬但其色黃大明潤創見罕聞即為嵗星亦實屬上瑞且臣自粵起程由黔旋滇一路雨𤾉應時風和氣暖遍閲郊原豆麥菜蕎茂盛非常而滇省春熟尤較往年加倍其蠶豆一種據農民親說可抵二三年收成小麥現已將穫早田俱已插秧是時和年豐已兆瑞應惟一人之憂勤俾萬姓以樂利臣得親際其盛感激慶幸實莫可名言也再據張允隨詳報臨安府屬新平縣於雍正七年十二月二十一日慶雲再見厯午未申三時臣雖未經題明亦竝不敢隱匿在聖天子精神上格德澤遐敷符驗自然盈寧永賴迄今八年無論文武官辨感奮圖報即漢夷童叟皆激切輸誠此非臣之私言亦非臣所得而私言者天心可見人事宜修臣惟有時深敬畏以自勵自省已耳理合繕摺一併奏聞伏乞聖主睿鑒臣謹奏上天屢賜嘉應朕從前所頒諭旨實皆出於至誠肺腑之論不但可對天下臣民即對天地神明聖祖者亦此意念實不敢自居亦不敢不居朕總不肯因此而稍存驕盈之念謂已治已安也惟盡一已之誠敬如時對聖祖君父朝乾夕惕以仰邀上天之慈佑鑒照耳然實賴卿等內外大臣一心一德協贊朕躬之不逮以利益蒼生也期共勉之同日又奏為海口興工神龍示現事竊滇省為山多水少之區水利尤宜調劑其無水者固須相度水源疏通灌溉而有水之地又慮沙漩水溢漲沒田禾查雲南府昆明池原需此以濟昆明呈貢晉寧昆陽等四州縣之田地但海口出水處既已狹隘且衆水滙入之處又復沙隨水下以至壅塞泛溢而每年不無淹沒臣前檄令另開子河以分其勢現已告成奏報在案而海口尚有舊埂一條橫塞其中埂外有牛舌灘一箇又側而下有牛舌洲一箇此一埂二灘攔阻不能瀉泄以致田地被浸其舊埂淤泥尚易挑挖而牛舌灘牛舌洲從來未經議挖臣竊思畏難觀望則膏腴非民有罪實在官因先測量水勢海沿深八九尺近兩灘之水僅止九寸其不得條逹暢流者勢使之然臣於去冬赴粵時將一埂二灘開挖工費切諭糧儲水利道黃士傑確估即令其遴貟料理今據黃士傑禀報奉委修河隨於正月二十四日率領在工人貟雲南府同知臧珊等同至海口敬祀龍神忽見白龍摩空全身俱現閃爍有光鱗角爪尾無不畢露其色初黑後白起直北之鳳凰山升東北之龍馬山約行五六里凌空而上觀者共驚竒異然猶以為適逢其會不敢具報於二月十五日破土興工又臨海口虔備牲醴敬告惠濟龍王忽見雲從海起風雨交作見白龍上升仿佛如前狀祭畢依然風和雨霽官民匠役濵海居民不下數千人無不驚竒欣慶竊思事關民命工係創興惟神有靈事必克濟此皆我皇上乾德升聞神靈告瑞不敢壅於稟逹等語到臣臣念興工祀告之日而龍神兩次顯形是實許可此舉將必默助成功隨批令致敬竭誠以襄厥事不可稍有懈忽以負神庥去訖續據黃士傑稟稱牛舌灘一座今已挖平至水面牛舌洲亦已挖去其半再得數日俱可挖平并於灘底挖出古錢數百文知此兩灘俱由沙泥壅滯日積月纍而致原非生成不可開鑿等語臣復思此一灘一洲若僅與水平尚未能暢逹必更深下三四尺方能通暢隨又飭令加工并俟灘洲完工後即挑挖舊埂再查得水尾有石龍壩橫梗中流水必紆回不能直下而石龍壩又斷難開鑿臣已另買民田照值給價開築成河以便泄水統計月內俱可以報竣而四州縣或能涸出良田永利民生也除俟工竣另報外所有海口興工神靈告瑞及一埂二灘修挖緣由合先奏聞伏乞聖主睿鑒臣謹奏以手加額覽之同日又奏為清水江苖業經勦定各寨畏服事竊照雞呼黨數寨外雖投順內未傾心相勾結暗行窺伺臣屢次札囑軍前防範總兵蘇大有亦時刻戒嚴果於去冬十一月初六日夜近伺營盤逺集山梁雖當即搜逐登時奔竄然不可不窮究凶首以别頑良經臣檄飭蘇大有嚴加懲創前已奏報在案今雞呼黨於去冬十二月二十四二十六等日已將反覆者勦滅附和者招撫發兵凱旋往回四日事已大定正月三十日據總兵蘇大有稟稱查此番舉動實雞呼黨之計包辛安干州等為之倡而東庫之新毛黨宜之黨東套夭臘之計往等為之附和也因思計包辛曽經來營責之獻凶繳械賠榔三事未經回報待至十八日計包辛帶領小苖二十二人牛一隻以為詁話之用隨訊及三事朦混支吾堅不承認即欲擒之復計首惡數十人若止獲一犯不足示警禍根未除且縱之去諭以此番詁話須要正經頭人盟誓方可准信爾等速回務同安干州往包章噶打計等同來方無翻悔計包辛見兩次放回心粗膽大應聲願來隨密布健兵聼號擒縛果見計包辛帶領安干州往包章養九金轉腮包長商噶打計及散苖老包竝夭臘寨之姑辛共三十頭人投見本職責其起事之由并責其何以匿凶藏械該苖抗言凶首不知誰何刀鎗留以護寨等語號令一起咸就擒縛當即與升任鎮逺府知府方顯及諸將等商同將首惡八名祭旗發兵隨撥派鎮逺協遊擊劉成龍帶領銅仁協守備韓生耀及千把兵丁八百名居左黃施營遊擊章竒相帶領天柱營守備皮衮及千把兵丁七百五十名居右安籠鎮標遊擊任龍帶領提標大定思南等協營千把兵丁七百五十名居中撫標中軍遊擊髙岱帶領千把兵丁一千一百名分撥彈壓公鵝栁羅以及子營堆子等處營盤分撥已定即將首凶計包辛安干州等分交三將於十二月二十二日辰刻斬首祭旗發兵去後於二十六日據遊擊任龍劉成龍章竒相等飛報大捷劉成龍帶領辨兵從左路進據險扼要鎗弩齊發打死數苖搶獲大小鎗桿無數賊苖鬼師正在鳴鑼跳鬼被兵丁一鎗打死餘衆始潰狂奔守備韓生耀果敢爭先將一路馬樁伏弩盡行拔去一面追殺一面將賊所棄攩牌填平陷坑直殺至寨門喊聲震山右路章竒相一併殺到飭令守備皮衮當先衝殺連放兩大炮打死數賊漫山奔潰中鎗著炮被刀帶箭跳崖滚箐者甚衆搶獲鐵盔標桿攩牌無數任龍從中路進三路一同圍住賊寨隨將大炮一齊開放該寨賊苖魂奪魄喪爬山滚箐而逃韓生耀當先砍寨而入千總康文玉等攻破前面爭先放火守備皮衮等衝破上寨火光燭天夭臘黨宜東庫三寨之苖懼官兵乘破竹之勢一齊洗盡俱遙跪髙山匍匐呌號稱為雞呼黨逼脅原不敢生事今見天威再不敢作歹再不敢違拗求開恩饒命隨諭以凶器盡繳首凶擒獻方准招安今日且免殺明日來營聼諭當即會同收兵查我兵被輕傷者五人俱不致礙命於二十五日五鼓奉令班師當於本日申刻還營等情到職理合轉報至黨宜東庫夭臘烏交鴣演農交甲等六寨先後俱央雞擺尾雞右栁利九筸等寨為之擔保業已共繳鎗八十六門刀一百三口標桿一百七十根弩八十二張鐵甲五領竝自願各罰牛隻重為詁話尚有白索白汗及南江等處大小各寨俱在央請良寨為之乞恩觀其情形甚誠且豫招安等情臣看得清水江之雞呼黨等寨因昨嵗輕易招撫未曽示以兵威苖性犬羊故復小有蠢動今經此一番勦洗加此一番布置則凶頑破膽良懦自愈傾心且臣前過鎮逺時鎮將各官皆出迎請示而各寨苖頭俱倉皇隨行赴鎮投見情詞懇切立誓效順據此情形料可寧帖無事矣至其餘苖疆俱甚相安可以無慮合併陳明臣謹奏嘉悅覽焉朕為古州八萬之憂懷今日始少釋矣然善後事宜尤宜詳慎同日又奏為生苖𠞰定河路開通事竊臣為開通都江水道計必欲𠞰撫定旦來牛欲懾服定旦來牛必須粵兵兩路進攻且劃界設汛亦必黔粵文武公同踏看酌議故經調遣粵兵一路從栁慶進駐劄諸葛營一路從荔波縣進駐劄平宇江之上下兩路夾攻則用力省而成功速臣已奏報在案二月初八日據副將趙文英等禀報定旦生苖阻截河道迭奉憲檄勢在必𠞰雍正八年正月十七八兩日粵副將潘紹周粵參將施善元次第齊集二十一日分兵左右兩路疾走都江將及申時直上定旦後梁賊苖擊鼓放炮我兵奮勇先奪其土城炮鼓斬殺凶苖六人頑苖四山逃竄等情臣隨批諭定旦來牛惡衆必當窮搜嚴治以盡根株務使啇賈輻輳漢夷樂利黔粵交通庶幾邊疆永寧倘今日之姑息即異日之殘殺今日之草率即異日之煩難若謂大局粗定即應收拾只了目前不計久逺是即欺罔心盜賊心人或以為解事我實不敢負恩其詳思而審處之等語諭令去訖十三日據趙文英等禀稱定旦苖民阿埃來營投順願歸原業卑職等暫豫招安仍令招回合寨砍樁刴諭又於是日通事帶領來牛之冷烏擺老粉栁怎岩擺烏羊邦羊翁擺鳩冷皆等寨苖民阿巴阿鳳等三十餘人請示招撫隨即曉以利害諭以恩威據稱情願修路開江認納糧賦隨加奬勸以慰其心初二日有上至平宇下至都江沿河四十餘寨苖民齊集軍營砍款永作良民其定旦寨據阿埃止帶領老扛阿難等四人先來其餘尚未同來砍款等情臣又嚴諭𠞰撫二字雖須竝用却是兩端不當撫即𠞰不必𠞰即撫未有非𠞰非撫希圖了事而終能濟事者懲創安定事宜必須徹底籌辦毋許得半而止批令去訖續據報稱定旦餘孽盡逃生苖地方卑職等恐窮追藏匿愈深良頑不辨令通事𫝊諭若能擒獻首惡脅從者准豫招安初六日據候補守備髙夲陽等率同寨比苖民拏解定旦首惡阿當到營即將阿當斬首梟示從此各寨俱知定旦首惡罪不容誅其餘迫脅及不肯附和之領甕俾因等二十六寨央求通事赴營投順呈繳凶械認納錢糧各撫慰賞諭令其助工開路永作良善去訖等情臣竊思定旦已𠞰而諸葛營之車寨有水田三十餘畝棉花地二十餘畝議在其地建城若不償其價值焉能使伊心服臣業經檄令查唤地主從厚給價該苖心悅誠服出具木刻認領則該寨志願已遂可無他虞矣臣更計與車寨相為脣齒者尚有溶硐一處生苖地廣人衆為黔粵門户目下雖無阻梗情形不可不乘此軍威宣布皇仁使之懷德畏威則車寨益無所恃而通盤大局庶臻寧謐隨檄軍前令一併料理據潘紹周張鉞慶逺府知府徐嘉賔等禀稱正欲帶兵前進溶硐而該寨苖民將所買兵米用船裝載送至諸葛營叩見極其誠切隨奬賞去訖等情到臣此自栁慶至諸葛營定旦寨之𠞰撫開路情形也其自廣西荔波縣以至平宇來牛所發官兵據粵副將董芳黔副將卜萬年獨山州知州孫紹武稟稱於二月初七日在三峒地方會合初八日自三峒起營有土把總白登科帶領附近來牛之楊甕楊邦二寨頭人黎阿包楊阿斗稟討招安察其情實即令先行引路次日行至平宇九􅋭據險劄營該二寨又領楊翁霸飛等六寨頭人潘阿馬等迎接求撫隨動以開河之利懾以官兵之威俱傾心悅服而來牛搖排搖曬等寨始終抗拒不出十二日據新撫之九􅋭楊甕楊邦等寨報稱有搖排搖曬革招革雄等寨因我等誠心向化開路搭橋隨集千餘山苖隔江放炮聲言欲洗我等各寨望大兵作主等情臣隨批示順者即撫逆者定𠞰𠞰為上撫次之先𠞰正所以為撫地但撫恐終難免於𠞰即應分别頑良速行𠞰撫若歸附者不能保護不但他寨裹足不前又何以服向化之心批諭去訖又於二十三日據董芳卜萬年稟報卑職等至隴寨對山劄營有來牛暨革招革雄搖排搖曬各寨頑苖數千人始而􅋭劄兩岸繼而直犯大營卑職等以官兵為正兵以土兵為竒兵五路迎敵隨搗其巢穴該苖等從寨後山箐狼狽而逃奪獲火鎗長標環刀無數并獲牛羊猪隻分賞辨兵我兵俱獲安吉等情臣又密諭來牛首惡不可不除今羽翼既剪乘其孤立速行進𠞰江南北衆寨専視來牛之向背為從違來牛𠞰滅而既伏者益専向化之志其觀望者亦絶猶豫之心凡事須得主腦則其餘易於收拾批諭去後續據報稱遵諭於二十一日率兵直抵來牛該苖尚敢截路抗拒卑職等鼓勵將士奮勇衝殺直逼寨門除大炮打死竝墮江而死者不計外漢土官兵趕入深箐立斬首惡凶苖首級二顆盡毁巢穴羣苖無不畏懼南岸諸寨俱來就撫惟北岸革招革雄搖排搖曬等寨尚在阻截乘此兵威大振之時於二十七日移營北岸相機布置是日趙文英施善元等領兵亦至北岸會合劄營一處即同會議於二十八日帶領漢土官兵穿過已服之擺常寨分路直入攀援而上竟抵革招賊巢賊苖驚逃我兵四路搜殺有歸順各寨苖民恨其素惡焚搗其巢職等乘勢進𠞰搖排搖曬等寨其革雄一寨係革招迫脅曽將通事護送還營故特宥之因天雨收兵俟晴霽窮搜等情又據董芳等禀報有通事帶領俾爽大小二寨革雄三寨栁碟平甲栁排牌告小腦千家甲雄共十二寨頭人到營投撫認糧隨諭以官兵進來開這河道上通雲貴下逹廣西使客商往來原是利益你們不是要你田地錢糧爾等既然自己情願納糧亦不拘多少以後務要解釋仇怨開修道路保護江河拒絶山苖便得長享利益各苖俱歡喜叩頭割具木刻領示而去隨派黔兵開修上江一帶道路護軍運糧粵兵往三峒一路安臺護運荔波一帶軍糧又派黔粵官兵前往來牛後山砍伐荆棘放火焚燒以絶姦宄以便往來又撥兵開修擺常路徑以便大兵前進搜緝餘黨等情此來牛等處𠞰撫開路之情形也臣查古州一處東自黎平西抵都勻計程五百餘里北自清江南抵粵西荔波計程七百餘里必得四通八逹聲息相聞在在無阻然後可保永寧至都江水道古州至來牛江水平濶間有小灘稍為修鑿巳可通行來牛以上至獨山州屬之爛土司舟雖現在可行尚有數處灘石應鑿其陸路自古州至定旦俱屬坦平自定旦至來牛雖經開挖尚須修整來牛至爛土司尚未開成大道一俟餘孽盡除即可漸次就緒但新闢苖地沿江一帶非重兵不足以彈壓查黔粵各營俱無可抽調相應懇祈聖恩准於通黔粵河路安設一營添兵一千名分布塘汛俟二三年後諸如內地然後再議酌減庶於新疆有益除俟兩省文武各貟將分疆設汛等事會奏覽同日又奏為請酌添養廉以廣皇仁以勵官方事竊惟朝廷設官分職即末秩亦重考成而臣子效力宣勞惟苖疆尤資條理臣巡視粵西親飭僚屬見各屬首領佐雜等職多能隨分自矢黽勉奉公其流官佐貮協辦土司事務并有専責最為緊要二者向無給與養廉之例官微祿薄日用維艱一至奉差尤難措辦在有志上進者雖守清操不無隱忍其不肖流輩顧慮身家或則指稱公事射利病民或則勾通土司害苖生釁均未可定所當預防而早為之所也臣仰體聖主優恤臣下之至意常俸之外遍給養廉實從來所未有兹首領雜職暨漢土司州佐等官應請一視同仁量豫養廉以示鼓勵至粵西撫司道貟已有成例復䝉皇上添賞銀共九千兩天恩優渥無庸再議惟左右江二道現給銀一千六百兩計一切費用尚屬不敷應請照蒼梧道之例再加銀八百兩則支度從容其餘府㕔州縣或以現在添設之貟未定養廉或其中多寡未盡均調臣查閲地方與撫臣金鉷悉心酌議統計應添之數共一萬九千七百一十兩倘䝉俞允於潯梧二厰稅羡項下尚可支給自雍正八年為始照新定之額給發永以為例則公私兩便大小有資凡邀格外之恩施益思分內之官守雖雜職微貟夷疆末吏亦將感奮勸勉各圖效犬馬之報於萬一相應繕摺具奏伏乞聖主睿鑒施行臣謹奏好照所請行同日又奏為覆奏事竊臣報明鹽銅課息一摺荷䝉硃批辦理妥協之至有何可諭但沈廷正操守甚不可信卿酌量之不可因専政避嫌倘有疏虞朕惟卿是問耳回滇時將朕諭令沈廷正知之欽此臣於三月初八日回滇隨欽遵聖諭密示聞知沈廷正敬聆之下激切惶悚繼以涕泣據稱廷正以微末庸材且屢有罪過叨荷聖恩格外矜全竝授兹重任若復少存不肖豈是人類等語臣查沈廷正頗有厯練亦具才情其向來行止原多不滿人意及􅊩任滇黔共事幾二嵗臣惟雖係撫臣専政原屬臣所兼理夲無嫌可避亦何敢少有疏虞獨以臣衙門事務實數倍於撫臣若得盡心協力不因臣總理而有所諉缷庶事益周詳而可免遺漏以故於離省赴粵時面同司道諄切言之復經附陳上瀆聖聽也理合覆奏伏乞聖主睿鑒臣謹奏覽雍正八年四月二十日雲貴廣西總督臣鄂爾泰謹奏為土司納課野夷輸誠事竊雲南孟連土司地方逼近永昌屬隸緬國其俗慓悍好劫自古不通中國夲朝開滇以後該土司仍不服提調未經授職每年止上差發銀四十八兩交永昌府轉解此外一切公事即奉牌諭亦竝不遵照厯久相安業視為成例昨嵗臣檄該府清查邊界據該土司刀派鼎申稱孟連一隅極處邊末內屏中夏外捍野夷山髙箐密民無恆産惟賴募乃銀厰以為用度故自前明以來世世相承未曽貢賦今聖天子在御萬國來朝且孟連地方數年以來仰賴皇上洪福安享太平年年豐稔情願自雍正七年為始每年納厰課銀六百兩以充兵餉等情臣查邊逺酋長惟應律以恭順原不必科其錢糧但土夷重財即所以重禮若無些須上納轉難以示羈縻隨經批准令其按年交解兹於雍正八年三月初五外合先奏明又鶴慶府屬維西邊外有怒江三道過江十餘日路有野夷一種名子劫殺搶掠久居化外新設維西通判陳權約束撫綏頗有條理子等羣生感激相率來維將麂皮二十張山驢皮十張麻布三十􅽛黃蠟八十斤煩通事稟請願將此土産作賦永隸聖朝該通判加以勸諭令將土産帶回而衆子各交頸環叩誓願將前項土産著為年例以表傾心情甚懇切該通判始准收存薄示奬賞具報前來臣查子內向願納土産事雖微細意頗諄誠隨經批司准其交納該通判變價交司存公竝於奏銷錢糧文尾叙明不入額款其每年交納之時賞給鹽三百斤以為犒勞業已存案訖合併奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為遵㫖酌覆事竊粵西撫臣金鉷敬陳倉榖一摺荷䝉硃批總與鄂爾泰商酌行之欽此録示到臣臣查粵西通省積貯常平社倉及捐榖三項合計共一百五十三萬餘石撫臣金鉷擬共留貯榖一百六七萬石所餘榖四十五六萬石槩請糶賣充餉伊為粵西一省計自屬可行但據臣愚見身任封疆須合鄰省而通算盈絀不應就夲省而獨籌多寡蓋凡事有備則無患交濟斯有功天時豐歉不齊人事總可補救即如廣東一省務末而賤農者多故仰食而販買者衆嵗即豐收而乞糴於西省者猶不下一二百萬石是西省之饒餘實以資東省之缺乏也又如湖廣全省向為東南諸省所仰賴諺所謂湖廣熟天下足者誠以米既充裕水又通流之故而昨嵗楚省歉收吳省豐稔江南之米且轉運濟荆南是湖廣之熟猶未可全恃矣粵西界連衡永溯湘江而直逹長沙倘有所需粵未嘗不可以濟楚也又如雲南一省山多田少水路不通大潦猶可望半收小旱則難籌一䇿臣到滇時具悉從前米價竟有每石貴至十兩十五兩者縱使鄰有餘粟無從接濟是以臣立意開濬通粵河道務俾舟楫來往以為緩急之資原非僅為商賈貨資計也且粵之栁慶二府與黔之都黎二府接壤今都江開通無悍苖阻截將來粵舟直可以抵黔是粵省縱有餘粟未始不可濟滇省竝以備黔省也臣通盤核算所貯一百五十餘萬石榖止得米七十餘萬石固不為過多似無庸變價況即以變價論計四十五六萬石榖每石約價三錢上下不過易銀十四五萬兩與其貯銀何若積榖緣需用銀時每石榖總可得三錢上下之價原無異於貯銀若需買榖時恐三錢上下之價斷不能得一石榖適所以費帑矣又據云不通水路之處不能接濟鄰封腳費比米價多至兩倍萬難出糶擬減十分之七或十之二三其南太梧潯平五府及宣化崇善二縣酌請加增存貯等語臣查裒多益寡權有通無倉儲之要計係屬應行但以不通水路糶費倍多之州縣不能接濟鄰封之故始擬酌減存留是通水路各屬之榖原可以資接濟自不須議減而南太等府縣應加增存貯之榖勢必仍令不通水路之州縣撥運則所需腳費諒亦不能太輕而添蓋倉厫等費又為所急需若統於糶出三錢上下府為省會重地兵民商賈輻輳雲集食指浩繁且與栁州為左右臂原存榖數竝不為多今議府縣兩倉止貯榖六萬石減去五萬三千石是止實貯米三萬石非所以重省會也據臣所慮必不可行至以黴浥折耗損物纍官為慮臣思存七糶三出陳易新立法固已盡善而調劑在人其有虧空者半係官吏侵那其致黴浥者多因倉厫滲漏典守之責參處何辭若止於頂面氣頭及積久因陳稍有蟲蛀等項則情有可原不難設法彌補是惟在諸大吏秉公執法就事察情但能一視不偏自可相安無怨其多貯榖之各府州縣雖曬晾出納盤運交代之際原不無折纍然籌大益者自不惜小㫖酌行事理除將臣所見備細札商撫臣金鉷外謹繕摺覆奏伏乞聖主睿鑒批示遵行臣謹奏覽同日又奏為奏聞事竊照匪類一案前據廣西右江總兵官蔡成貴泗城府知府祖良範呈稟泗城武舉岑映翰首擒李天保等并起有僞劄經臣一面檄行按察司移會該鎮并轉檄該府公同嚴訊務期究盡根株并查與廣東匪類是否一起一面密檄滇粵二省地方文武嚴加訪緝業經奏報在案續據蔡成貴祖良範等先後呈稟稱案犯黃結勞有功已自投首又獲王士忠即黃士忠韋宋等公同嚴訊審得李天保一人四名遊手無賴借符水行醫誆騙銀錢勾結匪黨搜得邪書等項俱經起解等情又據雲南廣南府營申報據土富州報稱奉廣西右江鎮牌密拏受劄匪類黃玘兆隨經拏獲黃起平供有蔣先生散劄復獲蔣先生趙大哥黃國雄羅老四等共五犯解赴右江鎮去訖等情此廣西匪類一案也至於東省所獲匪類臣差人探聼係李梅陳京眷區世義梁宗傑胡伯楊等訛騙鄉民捏造謠言有溫亞七首發陸續拏獲各犯經督臣郝玉麟飭發會勘指稱文姓在陕西有兵馬從廣西而來之語統屬虛捏原無謀逆情狀但黨類實繁現在查拏等情又據梧州府知府袁璣稟報探得東省督標把總王泰於正月二十九日在新會縣之甕洞地方拏獲散劄匪首李梅解赴總督隨發收審等情此廣東匪類一案也臣查此等姦匪或以堪輿賣藥周遊鄰省或以念咒書符搖惑愚氓始以穵掘金銀為招致之術繼以禳解瘟疫為訛騙之方捏造異言散布僞劄姓則時李時張名則有三有四如鬼如蜮假瘋假癡蓋自元二年已遂有此事向因地方官竝不實力察究一經事犯或匿不具報又或據實具報而上司反加呵斥以為好事以為不解事隨亦互相隱諱草率完結以致各匪類竝無忌憚反自以為得計而為其所愚惑者且將以為可恃而可信誰貽之禍實厲之階殊不思姦徒匪黨雖盛世不能絶無然何術不可以愚人而必假僞號何計不可以騙錢而必造僞劄僞號僞劄俱可以不究則更有何事應究者況不忍於二三匪類致令百千愚民被其哄動至蹈法網是恩是害孰重孰輕於匪類欲故示寬容於國家亦有何忠愛害人心壞風俗而不之恤且以為身謀豈不竟同於匪類而自安狂悖者哉臣言念及此實切痛恨前在粵西已明切開示及至回滇又屢經札囑兹奉到臣前奏報匪類一摺荷䝉硃批此等匪類之為害甚於賊盜當不時留心訪察者此案宜竭力嚴究審擬可𫝊諭金鉷等不可存恐其拖纍之小見草率將就完結也欽此臣隨復敬録聖訓𫝊諭金鉷等去訖伏查廣東匪類另為一案應聼該督撫審結廣西一案業巳擒獲多人録供解省撫臣金鉷竝無瞻顧因循必能竭力嚴究俟審擬到日臣意除實在無干供扳牽連人犯應行省釋外首惡匪黨定正法梟示其雖無同謀而知情夥出銀收劄以圖免禍人犯雖情似可原然其中良等斷不敢存此小見也再泗城府武舉岑映翰感戴聖恩實切圖報荷䝉硃批岑映翰可嘉之至賜給千金以示鼓勵度其人才可以如何加恩處奏朕知之欽此臣隨知會撫臣金鉷并行布政司酌動款項著宣㫖賞給千金至其人才似止可勝守備或㫖遵行又岑映翰之胞弟貢生岑映奎頗有才幹亦思上進或邀竝示羈縻理合一併奏聞伏乞聖主睿鑒施行臣謹奏覽雍正八年五月二十六日雲貴廣西總督臣鄂爾泰謹奏為地湧滷泉民霑膏澤事竊照雍正八年四月初一日據黑井提舉司安鼎和詳稱黑井五馬橋西岸河畔沙石地上於本年正月初一日忽湧沙滷一區隨行掘浚流而不竭報經鹽道差人查驗可以成井兼汲煎試看俱可成鹽已奉鹽道發銀到井卑職協同吏目孫復鳩工開挖已見黃泥夲土實係鹽滷正源水味醲鹹晝夜不息人民驚異共慶嘉祥現在督修井臺俟煎辦成效再請定額合先詳報等情到臣臣查雲南各井以黑井為最所出之鹽行銷亦廣今五馬橋畔以從無滷脈之地忽湧此泉其味醲鹹其水旺盛就現在試煎數目合算一年應出鹽斤不下一百萬將來可另成一井於國課民食皆甚有裨益但滷水之濃淡冬夏各殊柴薪之逺近運費不一是應發薪夲應賣鹽價以及出鹽額數行銷地方俱難以預定而所當熟籌隨批行查議去後今據布政司張允隨鹽道馮光裕會詳請俟年底較定鹽額多寡滷味濃淡量其所費薪夲定議請題等語臣已准令飭行該提舉督率竈户預領薪夲將新出滷水按日儘數汲出竭力煎辦發運行銷將賣獲鹽價除薪夲腳價外餘照數歸公暫作贏餘具報統俟年底按實查明共煎出鹽若干運銷若干可定額數若干應給薪夲若干再行會題請㫖著為成例所有具報黑井地湧滷泉緣由合先繕摺奏聞伏乞聖主睿鑒臣謹奏大好事也題到有旨同日又奏為開鑿河道以利民生事竊照雲南尋甸州之宣甸二里宣化七里之歸龍寺果馬里十甲之潘所海子乞曲里之五里箐四處水利俱已修濬完竣前經臣奏明在案復查得海子屯大河接連尋川河係滙嵩明尋甸兩州之水每至五六月間雨水洊至漲漫洋溢加以馬龍一州之水會於七星橋下衝激尋河之水逆流泛濫滿於城南平川之內不惟可耕之地盡棄為水宅即沿山四隅成熟之田亦嵗被湮沒厯來無䇿捍禦臣細加博訪知尋川河之湮沒實由於馬龍河之山髙勢急衝激尋水倒行逆流不得暢瀉之故欲治尋河使不逆流莫若使馬龍河不爭水道欲使馬龍河不爭水道莫若使尋河泛濫之水另開一河彼此不相衝激則順勢安流可以暢瀉而無阻查該處木龍村後名曰後海係泛濫之水蓄聚之區海前橫隔山梁鑿之使成子河則泛濫之水從後海東流入於尋河之下稍與馬龍河分道别流可以無憂漲溢復經詳諭該州知州崔乃鏞令於秋後覆勘作速興修毋得畏難避怨務期成功去後兹據崔乃鏞詳稱卑職遵諭即親往相度地勢自木龍村後開鑿河口起至橋頭村大河口入於下流止共丈量得七百四十餘丈中間堅硬頑石計有一百四十二丈髙三丈二丈不等於雍正七年七月擇吉致祭十月初二日鳩衆興工卑職親身調度指畫督率盡力開穵至今年正月二十五日業將河形穵開中間石梁鑿通計新開河口寬三丈二丈不等河底寬丈餘二丈不等儘可泄後海之水歸於下流不復致泛溢請委貟勘驗計垂永久再宣甸兩里現在耕種之田較之水淹荒田僅有十分之三今尋川兩岸涸出田地計可增二萬餘畝可否將涸出田畝以一半賞給出夫應役人等并各效力士民暨設立水利頭人領種納糧其一半令附近居民酌量納價領田永為已業統俟秋成後另行丈勘造冊申報等情臣已批准并行布政司會同糧道委貟勘驗定議通詳在案謹按水利之興廢實關民生之休戚屬在滇南尤為要務臣不自揣欲將東西兩迤凡有可興之水利逐處興修此二年以來勤訪密查不遺餘力除現在省城六河昆明海口并迤東諸府所屬一切河渠閘壩各項疏濬開築已粗有頭緒其餘迤西各屬有已經查勘者有未經查報者務期確知以便委辦在舉事之始雖不無所費然皆臣力所能嗣後則有涸出田地竝丈出田地應行變價銀兩現核數目已約有數萬即以此項辦此事總屬有餘斷無不足是以臣屢䝉恩諭恐力有不能令請動正項而竝不敢請動正項亦不敢請動贏餘也獨是導水濬河務期一勞永逸暫行補救易長籌通利難就事治事易以人治人難臣愚擬俟各工報竣即備細彚敘具夲題明請於道貟㕔貟竝佐雜官貟內分别河道逺近酌量改銜兼銜令總理分理各屬水利再酌留嵗修銀兩分定勤惰考成立季報月報之條著具詳具結之例其督撫藩司仍應將要緊河道分派著落令不時勘修俾於總管之外又各有専責庶現在各屬貟役不敢怠忽從事即後來大小官吏亦不致因循竝無可諉缷或於邊方水利實有裨益合併附陳伏乞聖主睿鑒臣謹奏可謂大功德代朕造福利益蒼生永霑惠澤事也同日又奏為覆奏事雍正八年五月二十日奉到硃諭元展成前奏陳伊父年七旬之外情辭甚為可憫則不便留此任矣卿可將原缺亦皆酌量擬貟奏聞欽此臣看得廣西布政司元展成心地坦白才具通逹亦有肝膽能求義理自調粵以來金鉷甚與和𠂻僚屬皆相傾信現在一切事務已將少有頭緒今䝉聖恩念伊父年老不便留此任令將原缺擬奏此誠天地父母之心凡屬臣子皆應感激思奮者臣何敢異議但念廣西藩任在今日尤關緊要緣初欲清釐尚少條理若遽易其人未免轉緩其事况元展成由州牧微貟叨荷殊恩數年之間拔置臬司旋補授布政一事不成寸長未效若遂顧戀私情欲移近地其父若賢者必將責以大義斥為不肖子元展成即日侍左右亦何以自處且聞伊父雖年逾七旬精神健旺步履如常即遲一二年待公事粗畢替代有人然後或請歸省或圖迎養此不必兼顧而適所以兩全也至於藩任原缺據臣所知現在難得其人如雲南按察司常安操守清介辦事甚勤雖器局微小然明白詳慎可勝藩司之任但金鉷甚與不和難以共事如貴州前任按察司徐夲明晰安詳兼有見地此貟似可勝粵藩現已奉㫖調補江蘇此外臬司各道雖各有所長克盡職守然求其可勝藩任竝與粵藩任人地相宜則尚須觀其後效臣未敢驟許其能相應懇祈聖恩或特簡賢能補授廣西布政再令元展成去任或將元展成仍留此任俟諸事略有條理於今冬明春暫行委署准伊赴京引見俾得就近省親竝酌迎養庶久任可望成功而暫離亦得伸下悃矣是否有當伏乞聖主睿鑒施行臣謹奏所論甚是但朕於此等處實有所不忍卿可將朕意與卿之論詢問元展成必使伊得遂其情而朕心始安也或令暫來引見就便見伊老親之處與伊商酌奏聞若往返不致曠日愈妙同日又奏為恭報滇黔二省豆麥收成分數仰祈睿鑒事竊臣從粵西由黔回滇目擊沿途所種豆麥各項茂盛倍常豐收可卜經檄行各布政司分析查報去後今據雲南布政司張允隨詳報除石屏㠄峩師宗元江騰越新平景東等府州縣具報不産豆麥外昆明安寧祿豐呈貢嵩明霑益尋甸宣威建水河西寧州通海開化鎮沅恩樂廣南普洱威逺浪穹鄧川永北太和雲龍雲南保山永平䝉化劍川廣通定逺鎮南南安順寧雲州姚州大姚和曲烏䝉鎮雄永善等四十府州縣豆收俱有十分麥收尚不止十分晉寧易門富民羅次羅平馬龍南寧平夷廣西䝉自新興江川賓州趙州鶴慶麗江楚雄等十七府州縣豆收實有九分麥收實有十分昆陽彌勒陸涼宜良阿迷河陽路南祿勸元謀會澤等十州縣豆收實有八分麥收實有九分等情據貴州布政司鄂彌逹詳報民間布種豆麥雜糧等項貴陽貴筑貴定龍里安順鎮寧永寧普定清鎮南籠永豐桐梓平越府平越縣黃平思南思州青溪大定平逺黔西等二十一府州縣俱係十分收成定番廣順開州修文安平普安州普安縣安南遵義府遵義縣正安綏陽仁懷餘慶甕安湄潭都勻府都勻縣獨山麻哈清平鎮逺府鎮逺縣施秉安化印江婺川石阡龍泉玉屏銅仁府銅仁縣黎平永從天柱錦屏開泰威寧畢節等三十九府州縣俱有九分收成至於蠶豆豌豆尤肥大異常等情各到臣伏查滇黔兩省自春入夏雨澤霑足是以豆麥雜糧俱獲豐稔雖雲南省城於四月十七日酉戌之交二十二日自亥正至子初暴雨如注山水陡發東北鄉淺薄堤岸衝決數處幸俱於次日旋即雨歇兼因小麥巳八九登場秧苖半未栽插故不至為患臣立即親勘委貟補築現在髙低田畝業已遍栽禾苖青葱盈尺仰賴聖恩或可羣望有秋也貴州廣西自四月中旬後亦雨水稍多然俱無損春熟而有益秋成除廣西春熟分數俟呈覆到日另行奏報外所有雲貴二省豆麥豐收分數合先奏聞伏乞聖主睿鑒臣謹奏實慰朕念硃批諭㫖卷一百二十五之十四欽定四庫全書硃批諭㫖卷一百二十五之十五硃批鄂爾泰奏摺雍正八年七月二十四日雲貴廣西總督臣鄂爾泰謹奏為欽遵諭㫖斟酌陳覆事案准吏部咨開廣東道試監察御史髙山奏前事奉㫖通行直省實力奉行粘單一紙移咨到臣當經移行三省欽遵在案竊照馭吏不嚴定滋蠧弊外緣不絶終難肅清髙山所稱外班住省及更换迭充借厨役水火夫之出入以暗通關節招搖撞騙事所必有實屬切中在臣所轄三省雖屢經察禁現據督撫等衙門各吏上班時止帶水火夫二三名並無厨役跟進一經入署原不許出入所需食物係將支領工食銀兩給令轅役代買轉接送入並無親戚子弟潛匿住省亦從無外班之名然日久懈生猶應不時申飭惟是督撫藩臬衙門上班書吏俱令一年更换因地審宜似尚有未便臣夲擬備悉詳查務使三省畫一可以永逺遵照再行奏明適廣西調任布政使張元懷以勢有難行摺奏奉㫖如秉公權宜可與督撫斟酌地方情形而為之欽此將摺鈔示到臣查雲貴廣西三省雖地方各異而情形略同所有各衙門書吏不獨愚鈍粗疏半不解事而文義之悖謬字跡之錯訛亦殊屬罕見緣能幹者不多故巧詐者亦少較諸江浙等省之猾吏姦胥實大有間是以臣衙門滇吏向係一季一换黔吏因係隔省向俱半年一换惟粵吏撥自廣東其中不無姦猾因無班可換仍暫時留用三省巡撫及滇粵臬司衙門亦俱一季一換獨黔省藩臬衙門向係一兩月換班不等雖因從前事簡殊非防間之意至滇粵兩藩司衙門政務叢雜冊籍繁多向來書吏竝不分班次一切查算書寫俱係同房合辦然不換班者終年在署於所承辦事件猶多遲誤兼且糊塗其換班者每至上班時諸務茫然了無頭緒一經查問則直認邊愚此督撫藩臬各衙門皆然固不勝責革竝無能教誨者也今若俱令一年更換在上班者經年在署家計縈心不免內顧且為日既久婚喪疾病等事仍不得不給假放歸其下班者經年在家勢難坐守或就近營生或他出貿易及至該班時將文移愈益生踈案件更多遺忘此又可以預料者是一年換班之例就三省論實均有未便也至於藩司責任係出納總滙甄别攸關實較臬司為尤重衙門封鎖自應一體遵行雖據張元懷摺奏意恐兩次開門例須按時封鎖批解錢糧不能隨到全收支領兵餉不能即日全放及一切事務或不免稽遲殊不知國家定例凡以防弊原不妨公未有公事未畢即行封門之理亦未有公務既集仍不開門之理但無私曲何礙料理據臣愚見三省督撫臬司及黔藩司各衙門書吏斟酌合宜俱請半年一換滇粵兩藩書吏雖難議換班然統應關防不得任其出入三省藩署俱照例封鎖准其遇事隨開事完即閉庶稱妥便是否有當恭候批示遵行抑臣更有陳者大凡胥役作姦多半串通幕友而幕友弄弊必須勾結家人操縱惟視夲官把柄不在書吏如果夲官勤明事事親理寬嚴有制賞罰不撓是即內户洞開亦原無徑可入設使夲官昏惰一應委代事理不知准駁聼便將無論下賤書吏固惟利是圖便伊親戚子弟俱或敗乃事而遂已私是即重門深鎖亦實有線可通况封門不過半日兩次開門時何紙不可夾遞正門尚有瞻顧各署率有便門何事不可暗投物必先腐也而後蟲生之未有勤明之官濟以嚴正而吏敢舞文不惜身命者臣願與天下大吏務先反躬責已然後執法繩人庶於我皇上澄清吏治之盛心或能仰副萬一乎合併具陳伏乞聖主睿鑒臣謹奏交部鈔録俟直省議覆俱到時一併議奏有旨同日又奏為請㫖事竊照黔省邊界向為生苖所踞前已開通經臣請於古州設立重鎮八寨清水江丹江等處添設協營分布官兵駐防彈壓奉㫖俞允遵行在案但新設辨兵多係內地協營抽撥移駐而所添新兵亦係內地招募撥往雖道路逺近不等而搬移家口等項需費則均查從前雲南省移駐維西辨兵及撥往烏䝉鎮雄辨兵因係邊逺夷疆俱䝉聖恩特加賞賚得以寬裕足用今黔省移撥辨兵皆係新闢苖地諸未就緒物力艱難搬移路費似可引照滇例相應仰懇聖慈特頒恩㫖著臣酌量逺近分别給賞則新疆辨兵不致拮据而益思奮勵矣再定旦來牛一帶生苖接連粵境阻截江河現已𠞰撫開通不下五六百里止有凶頑數寨尚須嚴懲俟事竣定議即當繕疏請㫖安營設汛以資防範巡查所有應添辨兵搬移路費亦應一視同仁合併聲明具奏伏乞聖主睿鑒施行臣謹奏是另有旨諭頒發同日又奏為奏聞事竊照古州三保地方貼近諸葛大營而車寨尤逼處營側營基舊為伊土今既就地建營豈遂帖服况撫臣張廣泗前往招撫時原止結以恩惠竝未示以兵威苖性犬羊何知信義為久長計臣竝不能安枕去嵗在黔時曽面囑張廣泗謂必當相機𠞰除以圖善後續回滇後又經切札告之據覆車寨恭順已如內地實可以放心及臣因公赴粵調遣粵兵時名為疏通河道原為古州車寨計曽密諭副將趙文英令於粵兵到日聲言㑹𠞰定旦空城而出營內止留兵二三百名故示單弱却將黔粵官兵暗行埋伏以覘動靜俟其反覆即回兵嚴𠞰先除此腹心之患則定旦來牛或竝可𫝊檄而定時臣此諭原未札知撫臣而趙文英接諭隨一面稟商撫臣一面覆稟稱實係恭順祈免加兵旋據張廣泗來札亦以為詞臣答云愚非好殺人者人所共信但恐今日不殺少日後將殺多反是罪過耳如果恭順何須加兵其餘不恭順者則無可姑息此臣從前札諭之節要也查上江之要隘在來牛下江之咽喉在溶硐諸葛營在中權以扼首尾慶逺荔波在兩頭以作關鍵形勢所在應計通盤其溶硐一帶雖現無違抗然係通粵要路務當妥籌又滚裏七寨前曽肆惡亦須大加懲創若一處或縱凶頑將諸務皆有阻礙利害不在目前功過自有聖鑒復經切札撫臣并嚴諭軍前文武去訖續據文武稟報自來牛回營後商議布置滚裏等處五月初八日據巡兵稟稱寨頭地方見殺死一人又挑鹽一人被苖子殺死鹽皆搶去初九日又據土司弓兵被寨頭寨苖子用刀砍破藤帽背戳一鎗又見口寨月寨寨頭藏弩苖人隱於樹間擊鼓初十日又據報殺死挑麻客民一人十四日又報殺死種菜客民二人職等遍行嚴查惟車寨前來洗白其餘等寨俱不曽來職等奉令覘中下二保誠僞今果露反覆會議必𠞰復據八匡把總徐祺生密稟寨頭藏弩約口月二寨勾結山苖要來作歹約定先奪八匡沖合寨良苖驚慌逃散等語職等即於十四日飛備船隻搭造浮橋分兵三路施善元帶領守備四貟兵一千三百名先往永鎮關駐劄邀截寨麻一路多伏疑兵拒截四路附和約於次日聼放號炮從右路進攻趙文英潘紹周帶領遊擊向之榮守備四貟兵丁一千一百名渡過浮橋由車寨後山會合永鎮關之兵夾攻口月寨頭藏弩江墨田墨六寨遊擊史應貴帶兵二百名於八孖河口大張旗幟牽制凶苖使不敢襲我兵之後其諸葛老營臬司張鉞知府徐嘉賓同知滕文炯率同守備鄧文選統領官兵九百名駐劄防守又撥遊擊馬世祿帶領官兵五百一十名防守卧龍岡大營竝於蠟山寨後山分兵堵防髙文髙武各處山苖於十五日五鼓前進凶苖竟敢擂鼓聚衆呐喊放鎗前來抵敵我兵連放靖蠻大炮鎗炮交加自卯至酉打殺多人生擒男婦五十餘人所獲盔甲鎗炮環刀馬牛等無數另冊詳報我兵陳亡馬兵一名土兵一名馬步兵丁輕傷者六名十六日復行搜捕河東一路趙文英潘紹周帶領遊守兵丁一千一百餘貟名河西一路施善元率同遊守兵丁一千三百餘貟名一面搜擒一面砍伐樹木以去藏姦之藪隨據土舍楊茂枝帶領口月田墨等寨老苖跪路哀求職等察其情形無可逞凶勒令獻凶繳械方宥其老幼去訖十七十八兩日據江墨等六寨苖人咸跪營門稟稱各寨為惡者大半已被誅戮其逃躲者不敢回寨願請招安俟回寨一一縛獻從今器械不敢藏留一件等語夲司張鉞等諄切曉以利害指以生死隨發令箭十枝准豫招安等情臣隨札囑撫臣并飛諭軍前古州三保既未示以軍威亦未曉以法紀寸鐵未繳一人不殺而驟望其寧帖無此理無此事此番反覆固早在意料中猶不幸中之幸事今六寨肆惡其中必有一寨主謀時刻隱憂者車寨耳今反以車寨洗白為辭若無歹念何用洗白既欲洗白於後何不出首於先口月等寨在所必戮而車寨亦須審察萬勿失此機會更待後舉夲部院身受殊恩捐糜不能報凡事務籌逺久斷不忍少有支飾難固不辭罪亦不避倘目前惟圖茍安日後又將有事即遲至十年二十年官去身亡猶有餘愧猶有餘恨此即前諭所謂人禽介盜賊心也諸文武其各凜體等語批示去訖續據張鉞趙文英等稟報六寨𠞰洗後羣寨膽落其滚裏一處有龍早佳沙黨祥擺裏黨鳩分遮等寨曽逞凶悍伏草傷人隨復遵諭料理於六月初三日趙文英潘紹周帶領備辨兵丁一千一百四十餘貟名由右路進發攻打龍早佳沙施善元史應貴帶領備辨兵丁八百七十餘貟名由左路攻打黨祥再調遊擊徐希逹帶兵於分董隘口䇿應兼護糧道守備張鳳翥帶兵於擺乃隘口堵截查諸葛營至凶寨有七十餘里頑苖將路塞斷寸步樁簽酉時方抵賊巢止隔數里面山下營凶苖呐喊拋刀終夜擊鼓放鎗於初四日黎明黔粵官兵攀援直搗凶巢頑賊尚敢抵敵我兵施放大炮鉸鎗打死凶苖數十割取耳鼻十一副追過數架山梁俱各潰敗初五日趙文英潘紹周由龍早佳沙後山搜進大箐施善元由黨祥搜進周圍約四十餘里名大雄箐四路窮搜鎗炮打死凶苖數十斬獲首級二十一顆懸掛營門示衆割取鼻耳四十二副活擒一名奪獲火鎗刀桿無算夲日隨有通事帶領分擺黨鳩擺裏分遮四寨苖頭到營洗白稱傷人拒捕係龍早佳沙黨祥三寨於初七日備牛砍欵鳴誓又帶黨祥佳沙二寨苖人跪營悔罪鳴誓而去查滚裏地方共計七寨路徑既熟懲創已遍倘不獻凶繳器洗之甚易隨於初九日撤兵回營料理車寨等情臣隨即批飭車寨為腹心之患屢經密諭嚴𠞰蓋亦幾經籌畫非了無確見者詎料此報寧帖彼稱恭順直信不疑惟恐多事不知該文武等何愛於車寨始則養癰繼則諱疾若必欲庇護而聽從之者今且為口月六寨之主謀暗作龍早等寨之羽翼此實老姦巨猾決非蠢苖比若復姑息養姦終必受其大害今亦無多言示𠞰示撫聼汝等為之王法無私軍令具在惟功與罪其各自取大約凶器不盡繳凶寨不盡除即如何調劑如何撫綏恐終為不終年之計以云善後則萬不可得之數也等語諭訖隨據趙文英等稟稱職等會議得古州下保之車寨勾結情實齊集兩省官兵至該寨兩山四面劄住著令鄉導𫝊諭勒獻反頭果見凶苖呐喊放鎗公然抵敵職等即督率官兵四路並攻人各奮勇立焚凶巢我漢土官兵內被傷輕重不等共一十五名現令醫治隨取據金盤香亞口供看守外又據口月寨苖呈繳鎗炮并解獻反頭庸了銀有二犯到營隨見車寨包羊等被拏有帶纍各寨今也天報之語職等會看得車寨苖民自招撫以來加恩實倍他處乃該苖外雖恭順中懷叵測前𠞰定旦時苖民即有悔錯聼車寨之語𠞰除口月寨車寨有人幫鎗昨攻中保擒苖頭金宗及藏弩頭人懶烘亦供車寨勾結情形龍早寨內又有車寨之人是車寨久蓄歹念情罪難寬除將各寨各犯逐一嚴訊俟擬罪解省覆勘題請正法外今日始知批諭所云腹心之害不除則四肢百骸終不平復實為深知灼見職等第據其外貌之恭順並不能察其中藏之險惡目下一面遵諭巡察溶峒滚塘誠僞一面親赴上下江會勘酌議安置全盤收拾可望永寧等情隨復行批飭全局未定難與圖成大害既除尤須防後但屬軍器必盡勒繳無餘凡有凶頑必盡嚴拏正法老弱幼稚必分别安插之方逃散流亡必審處招集之䇿至該寨地址或分營駐劄或招集住居應熟籌妥議其溶硐雖無抗違滚塘雖已羈縻正當察其情形乘此速為布置勿以一簣之虧致廢九仞之力則火種必然草根致蔓無事而有事又將多事矣等語去訖臣查清水江一帶巳甚寧帖城工現築營房現造苖民情願幫工且器械陸續來繳計報繳到鳥鎗一千四百九十五桿標鎗一千八百六十根弩弓一千四十二張刀一千五百一口鳥機九位子母炮一位霸王鞭炮一位鐵盔九頂鐵甲十七身肯繳凶器則自息頑心古州總兵官原應駐劄諸葛營臣巳檄令蘇大有將清水江軍務委交將官料理並檄貴東道方顯總理調度即赴古州坐鎮收拾通盤大局其古州各寨據報現繳器械子母炮行營炮共十二位鳥鎗二千二百六十四桿刀一千七百十七口桿子二千一百七十五根盔八十五頂甲二百二十五身弩四十七張雖為數不少恐藏匿尚多又經嚴檄勒兵窮搜勒令盡繳令一面分兵料理溶硐去後兹於七月十二日據張鉞等稟稱今古州三保並各處山苖俱皆帖服兩江河道俱皆開通軍糧俱皆無誤男婦老弱俱已安插停妥俟古州鎮到時便回黎平赴省任事其溶硐一帶毫無頑抗所繳器械約共八千二百餘件統俟繳盡造冊另詳其營造木植據逺近各寨苖民紛紛運到俱給價值并賞腳價一切料理應聼各貟分析造報粵省官兵候檄凱旋等情臣看得古州等處地方遼濶險深界連楚粵加以強悍富庶器械具全故千百年來皆棄置化外而不能制今雖仰賴聖主威德指授精詳𠞰撫開通已二三千里前後所收鎗械亦二三萬件然籌度情勢欲其知敬知畏不敢逞凶縱少有蠢動隨時殄滅似一二年內尚可以就緒若欲其知禮讓知法度革心服化一變馴良此內地所猶難即悉心調治亦非十年不能敬誦前摺硃批卿此奏乃無益之往來不必可將三省事宜竭力辦理一二年妥協穩當卿可信而不疑時再奏請來京但聞此諭若草率辦理只圖速慰朕念倘三省新闢事宜或有乘隙反覆文武屬貟變移心志懈怠安撫至令若輩少有蠢動比時再令卿來料理則內外皆致貽誤則不但卿為國家之罪臣而朕亦不免天祖之責咎也欽此伏念臣身受殊知萬難報稱所可以自信者只此一心若或草率辦理粉飾茍安是昧天良是滅人理斷不敢暴棄至此但新闢苖疆約共十餘處計地數千餘里能整頓易求妥當難選才幹之貟猶易得忠誠之人甚難惟督撫大吏或自用聰明或専慮成敗欲見長而護短不因事以從人則雖有賢能又將不能用亦且不為所用臣不揣愚鈍為方隅百年計念兹全黔念及滇粵並念及川楚輾轉籌思輒徹夜不能寐私心自誓惟有矢竭血誠及身努力期無負我慈父以免為罪臣而凡遇文武僚屬傾吐肺肝務規以正望為邊疆保障以備國家任使已耳因奏聞𠞰撫黔苖備細情事謹一併覆陳詞過冗長不勝瑣屑伏乞聖主睿鑒臣謹奏覽卿奏報實出朕望外之事何幸如之同日又奏為奏聞事竊照古州都江河道向為生苖梗阻經臣調遣粵西官兵一面𠞰撫定旦來牛等寨一面會同相度形勢劃界分疆建營設汛開路濬河確勘議詳蓋緣諸葛大營貼近三保地方而車寨尤逼處營側外雖恭順中多耿抑且定旦伏草傷人之事即在車寨地方保無暗相勾結至來牛距定旦九十里踞江上流均須整頓藉此兵威大集可以圖定旦來牛致河道之通可以謀三保車寨除腹心之患將都江上下密置汛防大營在中以扼首尾聲勢既壯脈絡相通即此外尚多生苖皆可次第料理不致為新疆大害也隨據報副將趙文英潘紹周等會𠞰定旦副將卜萬年董芳等會𠞰來牛業將定旦已懲來牛巳𠞰各情形俱經奏聞在案嗣後屢准撫臣張廣泗札及軍前文武各貟節次呈稟自會兵來牛巳經𠞰撫革招革雄等寨後有搖排搖曬等寨膽敢逞凶該將等統領黔粵官兵二千餘貟名於三月初八日直抵革招後山隨獲革雄等寨苖民訊問逞凶首從僉云係老你寨倚恃地險人衆挾制勾結搖排等寨又附和定旦幫助來牛悉是老你為首伊寨在深山大箐中大木搪寨數十餘道路止一線可通等語職等分兵三路開道穿箐深入三十里鎗炮打死凶苖數十滚箐帶傷者無數兵官又劈門入寨奪炮三位并鎗刀火藥等項次早逺望搖排搖曬止數里我兵直入該寨苖民等跪道投誠職等暫准投降専攻為首之老你寨復於初九日預先埋伏分兵搜寨焚其巢穴臨晚收兵有附近怎冷等十三小寨聞風畏服到營投順認納錢糧即令其砍箐修路各苖傾心順從等情臣查黔粵會兵之後連𠞰凶惡大寨連撫數十小寨兵威大震各處膽寒自然漸歸鈐束而定旦餘孽直似遊魂更何所逃遁故前此分兵者可絶其相為脣齒今則合計者可絶其互為狼狽隨復諭諸將兩事止作一事觀勿以兼顧而致兩失務須聲東擊西自必一舉兩得但來牛平宇一帶為將來安營之處檄令卜萬年董芳駐劄來牛確試各寨誠僞不得草率將就並料理修鑿河道議設分防查編煙戶撫馭苖民打造船隻諸務檄令趙文英施善元回營料理定旦善後事宜續據趙文英潘紹周等稟報職等因率師協𠞰來牛隨攻革招老你諸寨而定旦頑苖無所藏匿遂星散於深箐密林之中正議分兵𠞰捕該寨犯阿斗阿掌等自知無路可生反歸來求死而沿江各寨頭人亦願以各寨身家保其永無反覆求請安插復業誓以改過遷善查定旦罪在不赦自應盡淨根株第凶犯阿憤阿同阿花阿雖阿申阿烘六人并宗族十餘人未回若將阿斗等擒拏梟首不惟阿憤等逺揚而歸來者恐復驚散是以概為籠絡具稟請示等情臣隨札囑撫臣并即飛諭諸將定旦餘孽原不應准撫屢諭甚明今汝等因良寨擔保巳准其歸業若復擒殺是為詭詐其何以服衆為目前計勒令擒獻阿憤等六犯以覘誠僞以分功罪獻則如何不獻將如何明白開諭利害聼其自擇庶不失信不損威而全勢可以大定去訖隨據趙文英等稟定旦雖經懲治餘孽悔罪投誠駕馭撫綏尤為緊要須得幹貟重兵駐守職等議留遊擊周豹統率官兵一千貟名駐劄防範而於寨比八開亦撥官兵駐劄庶足以上援定旦下應都江職等隨帶官兵前往溶硐布置是則定旦底平沿江一路分設疏導諸事更當迅為量度也隨復檄令會同妥議詳奪續據卜萬年稟稱自老你惡寨大創之後纍日以來各寨歡欣悅服搭蓋房屋耕種田地貿易人等㩦物赴場逺近苖人互相交易宛然內地景象所諭諸務現在一一料理等情臣再查得上江河道不特現通爛土司與粵之荔波縣接壤而爛土司地方有溪河一道進至交然寨登陸五十里即係清水江實天地自然之形勢但有三大灘及數小灘應行修鑿即檄飭獨山州知州孫紹武勘估興修并令查勘五十里陸路若可一併開成河道則清水江都江呼應通而聲援接苖疆打成一片所關於通盤者尤巨但欲令都江清水江河道相通其中尚小有阻梗查八寨丹江交界處離來牛二百里距八寨百里偏處東北有擺調方勝等寨素稱凶悍未經招撫因檄令卜萬年相機招撫去訖隨據稟稱該寨知清水江都江水道開通頑苖無可肆惡屢遣通事𫝊諭負固不服膽敢殺死爛土司負鹽苖人二名又將木刻𫝊至栁疊欲阻截軍糧等情臣隨密檄古州清水江八寨丹江文武防其勾結令一面酌撥官兵與卜萬年酌定路數約定日期前赴來牛協力進𠞰而撫臣張廣泗已料理新募兵丁五百四十四名前往提臣楊天縱亦撥兵三百名聼候調遣旋據稟報清江協撥官兵六百餘貟名已到來牛行營又趙文英已親領精兵五百名自諸葛營前來接應料大兵齊集蠢兹小醜自可一舉殄滅也所有搖排老你各處又經𠞰撫并擺調方勝數寨現在議𠞰情形合先繕摺奏聞再大局一定即應設營前開通定旦來牛等處已有五六百里今復𠞰撫數十寨此外尚須開通是除古州等處二千餘里外將來新闢地方又不止千里臣前奏請於通黔粵河路安設一營添兵一千名分布塘汛原止為河路計尚未籌及通盤荷䝉硃批是題到有㫖倘仍覺兵力少單不可將就從事新闢如許生苖地界理應增添辨兵者萬不可惜小費而致貽後悔如果訓導苖頑俾凶愚之性如內地人民各知禮讓法度比時再加抽減未為不可也遵㫖行欽此臣伏讀之下實深傾服萬里如在目前指授必中機要臣知愧知勉不敢少有游移應請事竣後共添兵三千名於扼要處所設參將一營令帶兵一千五百名彈壓分布其餘酌歸標協以備援𠞰如尚有不敷則用撥駐之法查雲南兵多地方無事即嵗撥臣標及迤東附近官兵一千名前往駐防輪流替換既可以經練亦不為勞苦務期無惡不除有頑胥化所謂摶毬亦用全力防貓亦如防虎俟三五年後一切如內地然後再議抽減斯黔粵南楚呼吸可通而千百年汚穢場俱化為乾淨土矣再三千名兵一時難以招募如蒙俞允懇祈路諸事會詳核議後一併叙明具題庶不致遲緩而可資巡防謹具摺奏伏乞聖主睿鑒批示遵行臣謹奏覽題到有旨雍正八年九月初四日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正八年八月初二日臣齎摺家奴蒙恩賞銀十兩馳驛齎回御賜臣圓明園養𧖟內織花屯絹二件蜜漬鮮荔枝二瓶到滇又九月初一日臣家奴齎摺回滇復蒙御賜臣蜜漬鮮荔枝二瓶俱隨郊迎至署恭設香案望硃批朕安朕躬已大愈矣不必繫念也卿好麼朕此番愈後光景精神力量較前更勝卿料理地方諸務便遲緩數載不妨也不必急為措辦矣欽此臣伏讀之下額手欣忭繼以感泣恭惟我聖主御極八年無日無時不以百官萬姓為慮即聖躬違和亦所為何事臣飲食寤寐一有不繫念是決不但知信人之不可即自信亦不必也順應御人聽其自取此一事即上天賜卿訓誡之恩也可歡欣鼓舞料理之其他無益之意念皆可不必況此事非卿之咎亦朕之過卿乃因朕躬違和繫念至令精神紛亂料理地方不專不誠之所致朕實毫無罪卿之意也期共悔過祈恩以迓天地之慈佑可耳同日又奏為勦平凶寨事竊因古州地方疏通河道中有陸路五十里江流隔絶且未撫生苖擺調方勝等寨素稱凶悍盤踞其地勾結梗頑不遵誨諭勢須剪除前經臣奏明隨已密札古州總兵蘇大有清江事竣即回夲鎮就近調度著黔副將趙文英卜萬年統兵進𠞰該副將等各遵飭諭趙文英卜萬年各領官兵一千三百名由來牛至八寨會合續據該副將等稟稱八月十六日俱由八寨起程十七日由者飛分路前進俱係髙山密箐至申時約行五十餘里在甲石會合正在劄營即有頑苖千餘於對山蜈蚣嶺呐喊放鎗逞凶此嶺相去凶巢二十餘里官兵奮力追趕過河上嶺凶苖越嶺奔逃因日色已晡難以窮追仍回甲石行營屯劄分撥備辨兵丁七百五十餘貟名於嶺上露劄設伏以窺動靜聼得凶苖徹夜呐喊於十八日黎明趙文英帶領官兵由左路前進卜萬年帶領官兵由右路前進攀藤附葛越石沿崖於辰刻直抵擺調賊巢凶苖膽敢恃橫公然拒敵官兵奮勇殺死頑苖一百餘人搶獲鳥鎗環刀桿子銅鼓等件凶苖奔箐潛逃即將賊巢大小三寨焚燬乘勢追至方勝四路攻打將大小四寨盡行焚燬日暮收軍回營十九日黎明各領兵會合搜箐殺死頑苖多人餘多奔至擺保楊烏二寨查擺保楊烏與擺調方勝四大寨土苖稱為四凶相離約三十餘里山箐深險路徑盤曲隨穿箐越嶺追至二寨苖衆呐喊放鎗復公然拒敵官兵併力攻打施放靖蠻大炮攻破凶寨殺死頑苖二百餘人鎗炮打死者無算搶獲鳥鎗環刀桿子牛隻等件我兵帶傷者外委把總一名黎永昌傷死步兵一名彭書紳官兵憤恨復焚燬二寨凶巢燒死甚多收軍回營通計兩日之內焚燒九寨殺死數百凶苖仍恐餘凶未盡俟盡力搜洗務盡根株等情到臣臣查古州新疆以諸葛營居中坐鎮而都江清水江左右環抱中有丹江為之接引所隔陸路止五十里之地一為開濬則三江會合楚粵皆通誠自然之形勝而頑苖等以失其險要無可藏姦以故多方梗阻若不盡除凶寨即良寨亦難伏帖隨復嚴飭該將等務必乘機借勢徹底清理永杜後患去訖其凡開河設汛事宜現在議商即當會疏請㫖所有𠞰平凶寨情形合先奏報伏乞聖主睿鑒施行臣謹奏欣悅覽之官兵爭先奮勇甚屬可嘉俟功成事定之日題到自有恩旨其應如何犒賞處卿酌量傳朕旨賜賞以示鼓勵可也所用錢糧可達部存案題銷雍正八年九月十四日雲貴廣西總督臣鄂爾泰謹奏為密奏事竊烏賊叛逆經臣奏聞並備陳緣由於十三日題報及夲章行後於十四日子時據東川知府羅得彥武定營參將南天章督標遊擊王聫封等報稱祿鼎坤之子祿萬福居住魯甸聼信賊衆共行謀反已緊逼東川祿鼎坤之弟祿鼎明在大營膽敢行刺已經伏誅等語臣查祿鼎坤原係凶惡終難革心只因既已投順故暫請羈縻示以誠信荷蒙聖恩著臣送京引見補授河南參將並著臣照看家口因令伊子祿萬福暫回魯甸料理産業其餘妻女二幼子并伊弟鼎明仍留在省城以為牽制及報烏蒙叛亂鼎明力求隨軍臣准隨往威寧續威寧軍前亦知祿萬福被賊脅從叛逆顯然鼎明極力訴寃欲赴東川魏翥國行營剖白招撫臣以祿鼎明一人即便反覆無所逃遁因令夲標隨征劉漢甲押伴軍前並密諭魏翥國留心防範但有形跡即刻正法乃祿鼎明知祿萬福反謀情實必將不免早差家人於東川一路布散流言勾約舊東川土府之的派祿良珍等寨謀復東川糾聚衆猓合併烏夷欲攻府城而府城內拏獲姦細一名即係鼎明家人初九日鼎明到營即拔刀行刺魏翥國隨立將鼎明正法臣隨於是夜將祿鼎坤家口盡行拏禁現在訊供懇祈聖鑒將祿鼎坤交部拏禁嚴訊通謀情弊如鼎坤已赴任祈速敕下河東督臣田文鏡密拏確訊並飛移臣知以便將伊家口正法専此繕摺差臣家奴馳奏伏乞聖主睿鑒施行再東川一路官兵已到二千餘名可以無虞威寧一路已到官兵二千餘名且威寧土目誓不從賊其餘官土兵陸續可到提臣張耀祖已先帶夲標官兵於十五日可以到省合併陳明臣謹奏照所奏諭田文鏡矣但此事恐祿鼎坤未必知情或有寃抑情節亦未可定俟審明自有分曉雍正八年十月十七日雲貴廣西總督臣鄂爾泰謹奏為官兵報捷恢復烏蒙事竊照烏蒙猓賊叛逆情形巳經臣奏聞并具題在案隨據東川威寧鎮雄等處羽書告警并據武定宣威霑益尋甸畢節等處請兵貼防查東川一路烏猓萬數半巳渡江江外則勾連涼山下方阿驢各賊以為倚仗江內則糾合巧家營者家海以為黨援其禍胎始於祿鼎坤成於祿鼎新祿萬福而東川之祿良珍祿應爵祿天錫祿承鼎等凡祿氏凶目皆起而應之自近江如則補以扯地方要截江路近城如以則以擢地方窺伺城垣東川境內如挖泥矣氏歹補阿汪等寨東川境外如急羅箐施魯古牛畢古等寨迤邐至於武定尋甸凡進東川隘口拆毁橋梁沿途堵塞以致往來斷絶聲息不通咸寧一路阿底為咽喉則勾通頭目黑寡暮末搆雄等賊鎮雄一路奎鄉為鎖鑰則勾通頭目施額法漏阿路㓲刀等賊殺傷塘兵搶劫糧運施弩放炮公然拒敵且串結漢姦代𫝊木刻遍委姦細四布流言以致賊勢洶湧民心惶惑臣一面飛調各路官土兵丁一面出示諭以逆賊即時撲滅毋得驚慌令各地方官團練鄉兵以資守望復嚴緝漢姦密拏姦細皆已屢經擒獲訊問確供并得賊內情形隨皆梟示至凡出師辨兵因倉猝派調巳各賞銀一兩并氊衫棉襖各一件運糧夫役各照民間價值少酌加增通計兩省所調官兵共一萬數千名土兵半之無不踴躍用命宵夜前驅除分防各城池各要隘外盡以撥東川威寧鎮雄先分三路掃除羽黨羣凶再圖會合進𠞰烏蒙逆賊東川一路經委新授臨安總兵官魏翥國總統兵馬仍聼提臣張耀祖調度續因魏翥國被刺帶傷隨改委楚姚總兵官官祿威寧一路委安籠總兵官哈元生總統兵馬以未到任梧州協副將徐成貞副之鎮雄一路有鎮雄營參將韓勳勇敢可用仍令聼哈元生調度自九月十八至十月初七日據韓勳報稱九月十二日鎮雄土目施額者布法漏者約等勾通烏賊聚衆數千將東蒙鎮標所失盔甲旗幟號筒等大張聲勢官兵目擊心傷奮勇爭先無不一以當十於夲日已時至十三日已時在莫都都地方一晝夜血戰二十七次殺賊三百餘人帶傷者無算夷賊奔號潰散連破四寨盡行燒燬而州城附近有逆賊㓲刀說革等在雨撒河以那山箐搶劫行人並詐稱隴慶侯庶毋二祿氏招兵聚衆州城居民驚慌賊復謀逼二祿氏往主賊寨二祿氏矢死效忠逆賊解散知州徐德裕密差鄉約兵役將㓲刀說革並㓲刀之子阿戛等俱經拏獲訊明確供皆立刻杖斃民心始定九月二十六日又有夷良一帶地方叛目阿路等帶領烏賊共七八千劄立奎鄉對面山嶺至二更時候掌號呐喊甚是猖獗因黑夜不便攻擊二十七日帶領官兵前往膽敢分作九股迎來拒敵官兵分七路攻擊自辰至申鎗炮刀箭傷死者百餘人帶傷數百餘人斬獻頭目首級六顆夷賊大敗二十八日賊又於寸鐵塘地方離營盤五里搶劫倉房分十路前來卑職等分五路攻擊自巳至酉夷賊傷死者二百餘人帶傷者三百餘人生擒四人斬首級五十餘顆復令雄所土目安國興抄截後路殺賊五十餘人賊又大敗至十月初二日辰時逆目等仍敢分兵十路卑職帶領官兵仍分路攻擊自辰至午𠞰殺夷賊斬獻首級六十餘顆傷死者二百餘人帶傷者不計其數賊奔入山谷各官兵戮力追殺直至賊營焚其營寨逆夷奔散等情臣查鎮雄州屬之奎鄉係接烏蒙要隘離州城四站該營額兵除留城分汛外時韓勳所領駐劄奎鄉者不過四百人敵賊數千血戰一日夜殺賊數百進𠞰皆可敷分布此鎮雄一路之情形也自九月二十二日至十月十五日節據張耀祖咨并鎮將等驗報烏賊勾合東川諸夷在府城四境大箐口土城馬鞍山馬五寨挖泥寨等處焚掠村寨截斷糧運殺傷塘兵魏翥國於九月十一至十四等日遣將出𠞰官兵奮勇日斬數十級百餘級不等九月二十一日遊擊王曜祖張超等前往隱革箐海山箐搜𠞰各遇賊數百人殺死甚衆生擒猓賊九人獲有長鎗并牛羊等件又於二十二三四等日王曜祖等由小龍潭前進東川有夷賊數千堵禦拒敵每日率領官兵奮勇對敵斬獲首級甚衆至二十七日總兵官祿自小龍潭起程前進行至歹補有夷目沙七福受等訴求招安二十九日相率老幼男婦齊至行營叩見准撫行至以濯河有夷賊數千阻住要口於山梁安放滚木擂石官兵奮勇鎗炮齊發帶傷滚崖而死者不計其數連斬首級數十顆獲弩弓長鎗甚多於戍刻抵東川府城逮十月初四日官祿遣遊擊紀龍等帶領官兵直抵挖泥寨一帶賊營猓賊數千攻擊數次賊衆大敗燒燬扯戛黑龍潭拖姑等處十三寨救獲被虜民婦子女七名口又遊擊王先由武定僻路前進東川駐劄畢古壩擒獲賊人勿替等訊取𫝊播木刻并賊寨情形隨於十月初四日將勿替斬首祭旗帶領官土兵前進𠞰捕賊衆逺望逃竄追趕十餘里初五日追至古牛寨後山賊衆躲藏密箐官兵鎗炮齊放打死十餘人帶傷滚箐者甚衆初七日復追至古牛􅋭自辰至申斬殺死傷無數又初五日遊擊何元守備張其貴奉提臣委𠞰捕阿旺急羅箐據報自辰至申殺賊三百餘人賊不能支跑入箐口堵守寨栅官兵於山上山下四路夾攻賊哀求投降我兵入箐追搜活擒男婦大小二百三十一名口又斬賊二百一十三人夷賊遁入􅋭頂復追斬數十人初六日辰刻移兵到噶得三台􅋭栅梁賊衆踞險施放擂石弩箭自辰至申將􅋭打開賊衆殺傷甚多於十五日總兵官祿驗報遣遊擊紀龍等𠞰洗者家海逆猓查者家海寨大人衆東川第一凶頑即由魯甸進烏蒙捷路也訪得者家海賊首陸承爵等皆聚於山後三多多等寨初十日官兵分兩路攻打殺賊無數賊衆滚箐奔至江邊官兵追至賊衆過渡不及盡投水淹死等情查東川逆目半係祿姓緣烏賊叛亂祿鼎坤之子祿萬福等遍行勾結乘勢過江搶厰劫糧肆行虜掠幸臣於七日內巳調到官兵二千名東川得保無恙且間日出𠞰賊多死傷隨後官兵大集初𠞰而賊已披靡望風奔竄雖氣已少振終不免就易避難臣因飛調官祿回省面示機宜令獨任東川酌行𠞰撫咨會張耀祖著領官兵六千名速進魯甸會合哈元生料理烏蒙事緣烏蒙業已恢復掃靖頗易張耀祖熟悉形勢調度不難此東川一路之情形也自九月二十四日至十月十五日節據哈元生報稱九月二十一日烏蒙逆賊約有二萬分作三股漫過官防海子張旗呐喊殺奔前來隨親同副將徐成貞署參將曽長治從得勝坡帶領官兵分三路迎𠞰鎗炮打死賊衆無數斬賊首三十餘顆進退十數次賊大敗始散於二十二日賊又分十二三路而來有威寧阿底叛目黑寡膽敢衝鋒直前用長鎗來刺夲職一手隔過隨拔箭射中黑寡落馬墮地斬其首級又隨射死凶目暮末一名殺死賊衆無數生擒賊十三名隨於夲月初八日由得勝坡拔營前進以那地方逆賊數萬在對過山梁張旗呐喊接連十有餘里官兵雖強幾有衆寡不敵之勢夲職激勵三軍宣諭憲令於初九日夜密令參將康世顯遊擊王友仁曽長治各帶領官土兵分作兩路潛繞賊營左右後山埋伏竒兵各聼號炮出竒攻擊至初十日五鼓率同副將徐成貞并王千總安天爵等帶領官土兵由中路前進賊衆分數股前來迎敵官兵一人不動直至相近號炮一聲然後一齊奮勇鎗炮並發而此兩路竒兵亦一齊突出賊衆不能抵敵大敗四奔官兵乘勢追殺連踏賊營八十餘座追至稻田壩復冒險殺過松林直搗巢穴凡東蒙鎮所遺盔甲器械及賊衆刀標鎗弩并窩篷鑼鍋衣服乾糧等件沿山拋棄即於夲日直抵烏蒙城外之鳳凰山駐劄恢復郡治特差陳前守備段福飛報大捷等情臣查總兵哈元生調委總統於九月十九日始抵威寧時官兵不過二千餘名所帶領駐劄得竊思烏蒙之變固造謀於祿鼎坤實成禍於劉起元蓋我多鎗炮賊止刀弩如果兵有訓練官有防間賊便生心亦斷不敢妄動即或事起倉猝寡不能支時有商民萬衆皆欲效死殺賊亦可據險抵禦以待援兵乃劉起元並未一出衙署擁兵護守卑詞求和所有官私盡以豫賊而賊愈橫逆坐致傾陷今哈元生於二旬之內巳克復烏郡各路辨兵奮勇誓欲滅此朝食即運糧夫役莫不踴躍前驅此皆我皇上之深恩厚澤浹骨淪髓各思圖報之所致而年嵗豐稔天氣晴和於九月初一初四十二三等日每遇遣發官兵時五色雲疉見若示人以無恐者臣窮搜務獲渠魁盡屠醜類所有安插調劑事宜巳飭徐成貞會同文貟一面料理其烏蒙鎮奔出之兵丁現有五百餘名諒投到者尚衆俱無庸置議未經被害之文貟備辨均有應得之罪未便寬縱即領兵進𠞰之提鎮以下及將辨等官強怯不一功過各異亦應據實糾參未便瞻徇但用人之際不得不暫時隱忍以重軍威統俟事竣之日分别需犒賞另疏請㫖外所有官兵報捷恢復烏蒙情形合先奏聞伏乞聖主睿鑒臣謹奏覽凡犒賞此役皆從裕厚不可稍存省費小見公用正項只管酌量動用摺奏以聞朕自有旨諭硃批諭㫖卷一百二十五之十五欽定四庫全書硃批諭㫖卷一百二十五之十六硃批鄂爾泰奏摺雍正八年十一月二十八日雲貴廣西總督臣鄂爾泰謹奏為遵㫖議覆事雍正八年九月十九日承准內閣大學士公馬爾賽等寄字內開雍正八年八月十四日內閣奉㫖鄂彌逹所奏諸條事關重大是否可行著將原摺密封寄與總督鄂爾泰悉心斟酌定議具奏欽此并將廣東撫臣鄂彌逹原摺一扣遵㫖頒發到臣臣詳核形勢悉心斟酌謹將逐條事宜參以末議敬陳如左據鄂彌逹奏稱請於古州鎮添兵一千名都勻協添兵一千名丹江營添兵一千名清江協添兵一千名共添兵四千名俟三五年後帖然無事再議酌減等語臣查古州等處地方綿亘二三千里苖衆數十萬戶界連黔粵南楚環繞八寨九股清江丹江地廣人庶出産多而秉性頑雖巳經開闢而信義未孚防其蠢動全藉兵威現在古州設鎮清江設協丹江設營都勻改協業經奉㫖遵行合算兵力已足資彈壓緣新開都江河道已直達粵西如上江之定旦來牛平宇等處下江之溶硐等處并聨絡清江之擺調方勝等處又拓六七百里地防汛需兵是以臣於七月摺內請於事竣後共添兵三千名奏明在案今擬請於來牛扼要地方添設一大協帶兵二千名與諸葛大營互為犄角以一千名於溶硐擺調等處及沿江一帶分防設汛似已可敷用若再添兵一千名則應於古州鎮暫設援勦一營以備調遣俟諸事就緒即將此一千兵移駐大定仍改協為鎮庶黔西一路皆可資控制蓋大定即水西係安氏餘孽此鎮原不應裁考諸前事不得不顧慮再添兵四千如䝉俞允合之原數已一萬二千餘名非古州一鎮所能管轄應請將都勻協再改一鎮庶便於稽查合先一奏稱添兵急需籌餉查通省新舊兵丁共二萬九千六百四十三名每年需糧一十萬六千七百一十四石八斗額徵秋糧共一十一萬六千八百一十石有竒內附近各營可以設法挽運支領本色者只有六萬三千七百餘石僅足半年之糧查湖南辰州府屬之沅州與黔屬玉屏縣聨界今清江一帶河道開通自沅抵黔水路往來尤為便利仰懇聖恩俯將沅州割歸黔省管轄所有該州每歲額徵秋糧用船直運清江等協營就近支給又查古州苖地出産樹木棉花白蠟等項向緣河道不通生苖阻絶以致商販稀少且黔地素不産鹽皆藉川淮鹽斤價值甚貴兼之布帛鮮有今河路疏鑿開闢已廣正可乘時利民如䝉俞允將沅州歸黔則運米之回空船隻即載苖地貨物帶往湖廣江浙各處發賣賣完之日即載淮鹽紬布赴黔販賣如此往來運售交相濟用則謀生之道已通毫無阻滯且沅州之平三里四八兩甲因攙越黔省玉屏縣境內共田地塘二千一百七十五畝九分零共該征條餉銀八十八兩七錢零及桑地人丁監生等項業經湖南撫臣趙𢎞恩題請應歸黔轄奉㫖依議欽遵在案若將沅州改隸黔省實諸事稱便但有益於黔者未必無損於楚且湖南辰常等府止敕下湖南督撫二臣通長酌議非臣所敢冒昧置議者也又據鄂彌逹奏稱都江河道現在開通舟楫直逹粵西栁慶二府查二府屬近水州縣歷年支放餘剩改貯之穀甚多若令古州按季遣員赴粵近水州縣支領餘剩米穀接濟不特挽運省力而在黔無䭾載之苦在粵無紅朽之患且可以巡察河道招致商販一舉兩得等語臣查新疆兵米最關緊要黔省不敷支放粵省歲有多餘為權有無用資接濟臣前於赴粵時即派官兵協同黔員力開都江河道固已早籌及此續河道巳通商賈絡繹隨經札商黔粵二撫臣㑹題請㫖聼候部覆此無庸再議者也又據鄂彌達奏稱四川重慶府所轄之酉陽并酉陽所屬之邑梅平茶石耶地把等土司離府十八站離黔屬之思南府僅五站地界相連因離川窵逺以致該土司等匿犯藏姦橫行不法且地方遼濶土脈肥沃每有銅仁等府貧窘百姓彼處開墾完納土司租賦稍不遂意百般凌虐考之黔志思南府屬之甫南圖地方久被該土司占去以致國賦虧縮似此侵課害民亟宜鈐束清理今酉陽等司應請就近割歸黔省管轄等語臣查酉陽土司前明時原隸黔省因紅苖作亂改隸楚省嗣因六里地方叛踞不便管轄又改歸川省離重慶府八百里距黔省銅仁府不及二百里其邑梅石耶地把平茶四司至銅仁府止一百六十里更有一百三十里者其酉陽土司冉元齡因離川省窵逺夜郎自大無惡不作擅敢設立五營副將五人守備五人千總二十人把總四十人衙門大旗書崇文振武四大字地分十二里恣意徵派鄰司受其壓制土民被其苛虐間有赴省控訴者即遣土辨半路截殺其餘橫肆尤難枚舉臣於去歲駐劄貴陽時即據銅仁府知府姚謙禀稱有附近酉陽之平茶土司楊正鸞呈請歸黔并稱石耶地把邑梅三司與彼同族素受酉陽凌侮俱願歸黔管轄又有與銅仁接壤之小江里衆民田仁華等呈稱小江里地方周圍七百餘里約有三千人戶每年上納酉陽司錢糧共有一千餘兩情願歸黔輸糧當差臣密諭姚謙細詢原委咸稱酉陽及平茶等司原隸貴州康熙二年始改隸四川冉元齡凶惡日甚無人能制曾具訴川省俱未准理土司懷恨必將置之死地望乞作主等情該臣看得川屬酉陽土司冉元齡之不法與楚屬之容美土司田旻如無異為邊方計終難姑容臣前曾摺奏荷䝉硃批開示令待嶽鐘琪凱旋是以暫緩料理兹據鄂彌達請將酉陽及平茶等司改隸貴州就道里之逺近論控制之難易黔非利其有川亦樂於還勤勤有當伏乞聖主睿鑒施行臣謹奏覽同日又奏為欽奉上諭事雍正八年十一月初二日承准大學士公馬爾賽大學士朱軾張廷玉蔣廷錫寄信內開雍正八年九月二十八日奉上諭前因吾弟怡賢親王時常抱恙曾寄信與總督鄂爾泰若知有精於醫理明於飬生之人可資送來京以為調攝頤飬之助今吾弟仙逝其從前所言修鍊飬生之人不必送來若有醫學精通之人仍著送來又前日曾將朕躬違和適得異人賈士芳調治有效之處批諭鄂爾泰今賈士芳虛詐姦回猖狂無忌朕悉行察出將伊正法恐鄂爾泰聞之疑與前㫖不符并疑朕躬尚有未經全安之處爾等可寄信與總督言賈士芳乃因姦邪不法罪無可貸與調治朕躬無與也朕躬今已十分大安爾等係日侍朕之大臣可寄信告之令其欣慰又朕前次曾諭總督於來春進京陛見可令伊將地方事件一一料理停妥於開春起身按程徐行欽此我等遵㫖寄信前來從前聖體違和自八九月以來巳經大安我等日侍天顔仰見聖躬精神煥發氣體壯盛更勝於前實巳十分大安此皆我皇上誠敬日强天心眷佑非方士醫術能為毫髮之力也賈士芳因姦回不法自取誅戮在廷臣工無不仰頌聖主之乾綱獨斷實從古帝王之所不能總督聞知亦必欽服欣慰等因到臣竊臣屢䝉慈諭敬悉聖體全安家奴親覲龍顔備述精神煥發又復傳示聖諭暨大學士公等同辭稱慶萬里臣心如傍九重之左右終身孺慕得慰百念之縈回實歡欣而抑鬱頓舒因慶幸而瞻依倍切至妖人賈士芳虛詐奸回難逃覺照乾綱獨斷維世道以正人心天命常新錫純嘏而申保佑此惟信諸莊敬日强之一人并可告諸普天率土百官萬民使共知共信者也臣實不勝欣慰不勝欽服其醫學精通之人臣敬當加意訪求䝉恩准陛見臣已於十月中摺內陳明俟烏䝉等處布置停妥於明年八月初自滇起程合併繕摺覆奏伏乞聖主睿鑒臣謹奏亦且不必拘定八月至臨期相機再行請㫖同日又奏為𠞰除逆賊疏通兩郡恢復三關各路報捷事竊自烏賊逞凶堵塞各隘截斷牛欄江則與東川阻隔截斷伐烏關則與鎮雄阻隔截斷豆沙關則與川境阻隔截斷大關則凡屬烏䝉聨絡三省之界俱為阻隔此聲息之所以不通而凶焰之所以忽熾也及烏郡既復之後雖奔逃四竄實各踞要口如牛欄江逼近魯甸正逆賊巢穴所恃為憑陵之區故江內江外分布蔓延凶鋒甚烈猝難解散至若三關均屬天險懸岩峭壁箐大林深失之雖易得之甚難至於撒魚河馬鞍山髙魯箐等處各皆賊騎數千不時往來窺伺官兵初入烏郡時不過五千有餘僅敷彈壓難資掃除而川省則道路甚遙鎮雄則兵勢無多故於總兵哈元生則囑其少待於提臣張耀祖則催其前驅蓋通計大局東川緊連烏䝉而與東川接壤之尋甸武定宣威三府州最關切要自張耀祖統領大兵駐劄功山由功山前抵東郡沿途安臺設站尋甸之路已通而武定則阻於畢古壩宣威則阻於者家海故於畢古壩一路先之以遊擊王先繼之以遊擊曹士貴者家海一路先之以遊擊紀龍繼之以遊擊范昉彭之義各令奮力攻𠞰使武定宣威兩處血脈速為貫通而六營長九伙目則囑提臣分遣官兵搜捕逆寨內患既除外亂自靖然後直渡牛欄江連絡魯甸庶皆可就緒臣前摺奏至今巳踰一月進兵之檄既晝夜頻催報捷之文亦朝夕疊至續據遊擊王先由武定進兵沿路𠞰滅已直抵畢古壩而遊擊曹士貴亦到畢古壩㑹合逆賊聞風逃遁隨進至大魯􅋭分兩路抄上逆猓弩石交施官兵奮勇鎗炮齊發打死賊人甚多餘各星竄十六日招撫阿易路一帶苖猓民人共一千二百六十八名口又在紫牛坡查獲漢姦陳仕教等解赴提督行營俱經梟示十九日在小江口駐劄聞有賊衆欲渡金沙江往四川逃遁行至多步可地方隨分遣官兵前往搜捕賊衆搶渡漂流淹沒者十餘人擒獲賊首祿配等解赴提督行營救出被虜漢人老幼男女二十四名口隨給米糧移交東川府安插畢古壩既清而武定與東川之路通矣自紀龍等進𠞰者家海而逆賊勢窮弱者皆求招安强者各皆逃竄時宣威州團集土勇千數百人經臣准其效力已抵者家海進至牛欄江於陡紅箐遇賊持弩抗敵土兵奮勇殺賊并生擒賊首祿承爵之繼母及男女二十名而遊擊紀龍范昉彭之義等先後拏獲祿承爵之叔革舍火頭沙埧及以勒寨賊黨禾利戈客者卡共二十七名祿承爵之妻安氏子阿六及歹補頭人麻色者機直補頭人沙奈卡備卡租等共二十一名又過牛欄江至直補箐官兵密分四股一齊進攻鎗炮打死賊衆大半餘皆奔逃至革舍火頭沙埧前拏獲時因勒令拏賊故暫且從寬至是率孫祿元龍到營出首阿固祿承鼎管下夷人你布等并阿固火紅等處逃匿逆黨求賞員押往擒獻隨差辨押同拏獲男婦大小共六十五名口及牛馬等物并擒以勒寨頭人阿迫阿樹福壽俱係祿承爵死黨又據可可夷人戈色報有猓玀機革機則今來投誠訊供祿良珍家口確實所在隨密差官兵前往押令機則引路四面圍擒共獲男婦大小一百三十五名口又救出難民五人又復查得阿得六􅋭離者家海百餘里有逆黨潛藏即帶領官兵直抵賊􅋭遇賊拒敵官兵施放鎗炮賊衆四潰是賊首祿成爵雖同祿良珍等逃避巧家營尚未就擒兩路官兵早巳㑹合則宣威與東川之路通矣宣威武定兩路既通而逆賊巢穴各宜掃靖查東川四境沿途堵截殺兵劫糧者則有阿汪施魯等賊乃遣遊擊張翰彬等進剿據報十月十五日官兵既入探得逆賊潛匿白石崖大箐即帶兵前往賊沿途砍木塞路密下竹簽官兵開路拔簽奮勇而入賊衆千餘前來拒敵官兵用鎗炮攻打自午至酉打死逆賊數十人十八日官兵搜擒逆賊至革黑㑹合遊擊何元跟蹤至烏羅河賊有五六百人占踞山梁施放弩箭擂石我兵奮勇攻打自辰至午鎗炮傷死二百餘人餘賊滾箐而逃拏獲乘機竊虜之漢姦許登科張國彥袁標三名當解提督挑筋釋放至於結黨虜掠肆行劫殺者則有卑七五龍弩革等賊乃遣護參將張其貴等進剿據報十月十七日至卑七劄營聞五龍寨後箐內有夷賊藏踪隨分兵四面圍攻又於紫牛坡拏獲漢姦張瑜五龍猓賊長壽俱係逆黨亦詢明梟示正在搜箐之時忽箐左山上深林之內復有賊搖旗呐喊官兵前往擒拏獲旗一桿殺死賊數十人生擒十七人亦於彼地斬首示衆擒獲逆目祿有福之妻并賊猓男婦一十七名口於二十五日帶領官兵前進至阿泥卡劄營二十六日分兵下山至魯補箐有賊數百手執長條弓弩呐喊堵截官兵分路三面夾攻斬賊數十中鎗滾岩死者不計其數復前進至黑鐵山腳遇有賊探望隨擒獲一人據供有附府猓賊濳匿河外大􅋭左右懸崖密箐前隔大河是晚四更官兵繞河渡水於二十七日黎明齊至􅋭下賊猓滾木擂石甚多官兵冒險殺進賊衆滾岩落水及中鎗死者無數生擒賊十名俱斬首割取耳記擒賊男婦一百五十一名口二十九日又擒賊一名訊供知魯得􅋭有逆賊數百拒守三十日官兵直搗賊巢賊復大敗奔散至於聚衆圍城拒敵官兵者則有那姑魯革等賊乃遣遊擊區明守備陳上志胡玉書等進𠞰據報十月二十五等日帶領官兵前往黑魯搜剿途遇落水洞民人來報有賊搶虜男婦牲畜前去即尾追至那姑有賊五六百人前來迎敵我兵奮勇殺賊救回男婦一百七十餘名口牲畜百餘賊衆沿山逃竄隨分兵二路進𠞰追至法機見賊營盤十餘處隨即圍裹攻踏賊營殺死百餘人生擒賊二十餘人俱斬首懸示至於勾結逆猓堵截江邊者則有阿固火紅以扯等賊乃遣遊擊韓文鵬守備李國柱等進𠞰據報十月十七等日帶領官兵由阿固入火紅拏獲漢姦首惡一名張隨搜馬纓箐斬殺賊人甚多奪回難民八十餘口牛馬豬羊無數又有火紅頭目祿承貴自行來投引至巴兔海收窩寨內拏獲頭人一名沙奴并阿固祿承鼎之弟阿的虐查張素性凶惡聞烏賊悖叛即率領東川猓賊大肆猖狂沙奴係祿承鼎親信頭人罪大惡極隨解提督即將二犯釘手稱桿示衆軍民稱快其阿的虐現監禁行營候審又據分遣千總劉蔭祖等帶領兵練由巴兔一帶山箐屣搜斬殺拒敵黑猓一十四名搜出大小男婦四十七名口并牛馬豬羊皮盔馬棉弩弓長條等物又據以扯苖寨頭人長命報稱有凶苖老三者野等十名曽同烏賊劫殺東川塘兵現將搶虜兵丁各物收存隨經拏獲男婦三十五名口隨將凶苖等訊供確實即行梟示復帶領官兵自以扯起營前進巴兔地方查有石土庫黑猓附和烏賊殺人行凶隨往屣搜賊衆齊來拒敵官兵奮勇斬殺一十九名其餘滚箐逃脫擒賊男婦三十九名口搜獲牛馬豬羊并漢人衣鞋等物各訊確供俱稱祿良珍祿良臣祿良宰祿承爵祿天錫等皆逃匿巧家營臣查巧家營地廣猓强又緊連川界素稱賊藪自東川官兵各路搜𠞰賊首祿良珍等無可踞守遂皆奔巧家欲逃入川賴川省官辨一遵臣檄沿江堵禦不得濳遁而提臣派往官兵已三千四百名若令進𠞰早已擒獲掃靖奈遲疑觀望僅著落該頭目擒獻准其贖罪以為妥算臣料賊係緩兵之計恐致逺揚因徑檄諸將限日攻擒而諸將既奉前令不得不候示乃隨據禀報賊衆已濳匿各寨已搬空願甘擒獻之頭目亦竝無消息張耀祖見臣言巳驗始飛飭合攻雖諸賊首斷不能漏網而機已泄時已廢矣况東川一日不清張耀祖一日不能過江烏䝉一日不定諸夷一日不能息心滇黔四面苖猓愚者皆懷隱慮而張耀祖動念不及此殊不可解也臣備悉情狀恐并誤烏䝉隨飛咨嚴催令於東川一萬二千兵內先撥四千名過江聼總兵哈元生調遣於十一月初一二等日始派三千兵過江至今尚未足四千之數查烏䝉既復之後哈元生營兵時不滿六千即以一支兵遣參將康世顯由魯甸至牛欄江以接引東川以一支兵遣遊擊曾長治由龍洞山至法漏􅋭以接引鎮雄臣因其膽勇過人或恐失之躁率經屢檄切札囑以深入尤宜嚴防大勝勿忘小挫竒兵不可以屢用險事不可以幸成務候東川兵到再圖㑹𠞰等語嗣據康世顯具報十月十二日帶兵至髙魯十三日抵魯甸凡經過村寨賊皆逃竄只搜出猓賊搶去五子炮一位􅟱鎗十二桿并鎮兵盔甲俱已被賊損壞救出原任烏䝉遊擊張鶴之妻與子并兵妻數十口逃難男婦五六十口十六日已抵牛欄江令守備徐國佐帶兵搜𠞰進至補多地方遇逆賊七八百拒敵官兵奮勇殺死逆賊百十餘人斬首級二十餘顆隨令徐國佐監造木筏搭設浮橋更遣把總楊旭帶兵三百名直抵東川府城迎接提督是東川官兵料可以徑渡矣又據曾長治報稱十月十六日帶兵起程至龍洞山十七日抵法漏後􅋭逆賊滚木擂石堆積如山矢石頻施官兵冒險攀援直上施放鎗炮打死逆賊十數人賊勢大潰隨星夜於下江搭造橋梁以待㑹合而鎮雄官兵亦早已遙應凡此固諸將之奮勇實哈元生之效忠較之東川提鎮猶未可僅以强弱論也惟是哈元生行營地勢甚危兵力尚單不知內顧一意前驅乘康世顯曾長治之勝乃復前後分遣三百兵令遊擊王弼巡遊近地又遣官土兵五百名令外委土目等運糧魯甸又遣八百兵令千總蔡之斌陳䇿等搜捕江邊以致王弼欲擒逆賊貪功深入陳亡於髙魯寨損兵百餘外委所帶運夫被截於馬鞍山損人二十此即躁率之過亦不得為哈元生寬也而遣往江邊之八百官兵於十一月初四日由魯甸一路巡抵江邊復回至魯甸對面之五顆樹遇逆賊五六千人官兵搶踞山梁賊衆四下圍繞正在相持之際適有臣催調過江之遊擊曹士貴王先等於初四日自火得紅進兵巳抵魯甸聞有鎗炮之聲即催兵前進隨一齊奮勇裏外衝殺賊衆大潰我兵跟追至草海子地方殺賊百十餘人而烏䝉應援之兵亦至竊查魯甸係首惡之巢穴牛欄江實兩郡之咽喉是以臣咨札提臣催兵速進甚詳甚切至再至三向使過江官兵但遲一日不及應援則八百漢土官兵縱極勇敢亦豈能當逆賊數千而張耀祖聞報始謂臣籌慮周詳嚴催過江適逢其㑹撫臣司道見者皆笑之而深鄙其老師玩冦忠義之無存也今張耀祖過江無日哈元生已於十三日分兵六路搜𠞰烏逆留副將徐成貞防守大營現據徐成貞報稱大兵既進恐逆賊狡猾反由擦拉松林一帶出沒滋擾因於十五日戌刻密遣烏䝉把總施𢎞義等帶領官兵濳伏撤魚河隘口埋伏堵擒至四鼓果有賊衆二百餘人持掛刀弩長條暗出松林一遇我兵即行拒敵我兵截殺猓賊數十人帶傷陷入擦拉海子死者十數人餘皆奔潰又據副將楊馥遊擊曾長治等報稱十四日由普折槽大箐進𠞰所經道路約八十餘里僅羊腸一線凡緊隘處所賊皆將木石截斷官兵於箐中另開路徑攀藤附葛而進將至白卧地方有賊衆前來據敵官兵奮勇鎗炮打死賊數十餘衆潰敗隨追至白卧寨四面搜擒等情又據哈元生報稱自十三日起程至撤魚河駐劄賊皆逃散十六日自撒魚河跟踪搜箐抵小凉山止見賊營數十處並無一賊十七日前進有逆賊空寨煙火尚存所宰牛羊並糧飯等項拋撒過半隨追至大凉山劄營屣至離營五里之內接連切黑蘇寨後一大深箐箐口劄木城五層堅固難破隨造硬攩牌抵攩弩箭以近木城十八日先遣土目安疆等率領阿底土兵撑架攩牌攻進隨用鐵炮㸃火拋進賊巢聲響如雷炮殺逆賊五人餘衆獸奔山谷震動我兵尾後追殺逆賊仆巖滚箐併帶傷及死者難以悉數等情是兩路官兵聲威大振其餘四路諒即報捷東川聨絡鎮雄㑹合烏䝉逆賊料自不難平靖矣再鎮雄一郡早已寧帖附逆各寨俱經𠞰除節據參將韓勳具報前據土目戛虐報稱逆目施額等賊𠞰戮未盡復勾通烏賊招結鎮屬夷良逆目作叛即帶領官兵星赴賊巢施額賊黨知覺逃竄復追至河邊多已過河僅殺賊二十餘名獲烏鎮所失盔二頂鎗三門隨焚燬賊􅋭起程沿途撲滅逆猓村寨百十餘處至革洛箐內獲賊男婦二十餘名口十月十八日前攻法漏􅋭㑹合曾長治及至法漏曾長治已𠞰賊先回隨於二十日自􅋭起程由戈魁阿路一帶至銅厰溝搜擒男婦三百餘名口並獲牛馬牲畜等物二十四至二十九等日搜擒賊猓男婦一千五百餘名口并獲牛馬牲畜無數招安得阿度阿庇抹得罵色措洛罵色及阿布洛澤等暫羈行營三十日已破伐烏關又前分遣之守備馬騏自奎鄉起程直抵渣多巢穴據土目戛虐引路擒獲渣多惡黨阿束母黑魯所阿阻共四名盡燬賊寨在以洛劄營又離行營四十餘里有灼佐􅋭乃渣多洛澤阿路阿布等逆賊出沒之所􅋭上現有逆賊數百聚集隨連夜帶兵三路前進活擒逆賊一百二十三名賊婦子女一百九十四名口又巡至戈魁河拏獲一百三十四名口又前分遣之守備李守祿由右路大支壩搜擒阿路羽黨亦獲男女一百餘名口牛羊牲畜數十隻已至伐烏關與官兵㑹合等情查伐烏關係大關之外衛與甕迭􅋭相近伐烏關既破大關斯可進攻然烏逆賊衆皆嘯聚大關合力拒守猶難遽破經韓勳密查甕迭􅋭逆目祿鼎新現住洗馬溪阿業家阿業并收飬大關等處兵丁以待招撫乃密差千總談盛元協同土目戛虐前往偵探回營招得甕迭􅋭逆目祿鼎新洗馬溪土目阿業黃水塘鄉約符子章並帶回所保兵民家口竝雄魁甕迭馬湖等處客民三十餘人到營據稱叛孽係大﨑胸固固祿世昌等逼令起兵而黃水一帶村民皆無反意初阿業聞信即率伊子祿萬全保護官兵客民不敢從逆并千總王家彥付以飬活兵丁家口銀二百兩亦原封存貯俱係實情等語查逆賊祿鼎新係祿鼎坤之胞弟即阿業情僞亦未可遽信然因其授首暫且羈縻以取甕迭而進大關亦殊計之得韓勳乃准其招安隨於初四日先遣官兵占踞甕迭􅋭其時川兵已駐劄豆沙關竝可為遙應於是進兵黃水河分派守備王應熊等由麻栁河進攻大關之右守備李世祿等由呢勒進攻大關之左韓勳親率守僃馬騏等由葫蘆口進攻大關之中又密遣千總談盛元帶領土目戛虐等於先期由地瓜坪潛透老林至雄魁腦以抄大關之後進至深溪溝官兵㑹合四面夾攻立破賊營排柵五層殺傷無算賊衆大潰隨克復大關占據劄營時川省官兵亦於初六七兩日攻破小關占據鐵線溪汛地不約而同誠可慶幸等情臣查大關為一郡之鎖鑰實三省之樞紐川省遊擊李繼經等奮勇協力久欲進攻大關以賊勢甚衆未便輕率今川滇㑹合大關已破則三省之血脈皆通四路之聲威齊振不獨永善一縣計日可復而烏䝉逆孽實不難淨盡根株矣至於川省調兵先經提臣黃廷桂一面聞信即派遣官兵於筠連雷波等界分派堵禦及臣咨到後又節次添撥官土兵丁於鎮雄㑹川等界以為應援而署督臣查郎阿撫臣憲德皆飛檄嚴催一體關切自十月初旬守備王敬簡巳抵鎮雄遊擊李繼經已抵鹽井渡遊擊王谷宰已抵雷波及節次准據川省咨報稱筠連縣小壩河西猓賊二百餘人將篾縛竹渡河後有續到不知其數賊既過河去筠連縣僅三十餘里筠連向無城郭止有李繼經兵恐賊衆難禦又稱猓賊將約同涼山一帶衆夷來搶雷波又稱猓賊渡河已抵髙縣邊界迫近筠邑又稱檜溪蠻夷狂悖殺害阿興土司安永長燒燬房屋雖有遊擊王谷宰帶領兵丁應𠞰尚慮兵單且雜谷土兵未到等情臣查得川省督撫提鎮諸臣雖派遣官土兵丁六七千名應援堵禦但程途遙逺一時不能遽到現在李繼經王谷宰等實係兵單若遽令深入則川境可虞况烏郡既經恢復恐逆賊勢窮或將渡江入川故權其緩急隨飭各員所有川兵應先清川界并嚴堵烏夷俟川界事竣再聼調㑹𠞰至東川官兵巳有萬餘即川兵到日亦只須於江外堵禦可不須渡江等因去訖續據川員各報遊擊李繼經已克取豆沙關遊擊康國泰已搜𠞰㑹通溪遊擊王谷宰已克取撒水壩并分遣撫提鎮標及龍安普安安阜等營千把兵丁克取檜溪之大關口小關口及七勝關口復連取黑鐵寨六合寨等處官兵奮勇各有擒殺并獲刀弩鎗標及牛馬米榖等物遂尋獲土司安永長並妻王氏及子女尸骸又安永長代筆夏姓及子之尸骸俱交安永長之弟安文俊領回收殮於是川屬之筠連縣髙縣均巳寧靜而遊擊楊澤厚汛接東川領兵𠞰堵已抵金沙江邊見有潛逃過江之猓賊約有千餘官兵奮勇鎗炮打死竝滚岩落水者不計其數生擒男婦二百餘人并獲牛馬豬羊弓弩腰刀等項甚多又據㑹川營遊擊張棻具報擒獲東川竄賊盡悉造叛劫厰情由緣現在進𠞰不敢擅解俟將渠魁擒獲之日另報等情臣查川省官兵雖各為邉界而齊心協力殊不減於滇黔川提臣黃廷桂速調勤籌惟恐遲誤則轉甚於本省提臣張耀祖至楚姚鎮總兵官祿退縮姦狡事難枚舉不但為總兵哈元生及奮勇之將所不齒即肝膽備辨血氣兵丁亦皆有後言此皆兩省文武所共知共忿臣固不敢少為隱諱以博寬厚者也竊思烏猓之變備極凶殘侵犯各邉擾動三省猖狂實甚驟滅殊難仰賴聖主仁威將士效命漢土同心故恢復郡治不及二旬克取三關才經兩月今雖東烏群孽尚未盡剪除而合𠞰分搜總難漏網即永善一處差為窵逺前已據該縣夷民呈訴竝未反叛俟官兵一到應即歡迎合看情形似可無煩聖慮其川屬之黑骨頭蠻惟沙馬之女土官尚知約束此外如阿驢阿都阿布路以及涼山各處直至臘汝窩一帶率多凶頑難以馴服據臣愚見或於適中之竹墨地方安設重兵并分布營汛俾與附近鎮營聲息相通以示彈壓如有現應懲創之處趂此兵力於檄撤凱旋時隨帶清除庶一舉兩得於川於滇皆可免後患但事關重大尤須熟商擬俟烏䝉諸務一有頭緒即密札黃廷桂囑伊妥計作何料理聼川省諸臣運籌臣當盡心協辦是否有當恭候訓㫖遵行至於臣忝荷殊恩限於才力於親轄邉夷尚不能安輯何顔復向鄰封更言兵事獨以寸心微願惟我慈父鑒憐若動念利害少顧嫌疑即是悖負恐無與於人倫也除俟逆首就擒凶黨盡戮即將𠞰撫緣由傷亡名數分晰詳敘繕疏題報外所有𠞰除逆賊疏通兩郡恢復三關各路報捷情形合再奏聞伏乞聖主睿鑒再事緣軍務不敢太略詞過冗瑣合并聲明臣謹奏所奏情形朕皆備悉矣雍正八年十二月十七日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正八年十二月初七日臣差報捷軍前守備假福家奴七斌荷䝉召見賞賜馳驛齎回御賜臣內織寧紬四匹人參十斤哈密瓜四圓鹿尾六隻鹿腸二副鹿肉一簍野雞十隻晾羊肉一簍抵滇隨郊迎至署恭設香案望闕叩頭謝恩祗領訖臣敬詢起居備悉天顔和悅精神煥發實不勝歡欣額手稱慶及啓摺扣荷䝉硃批朕躬安好聞卿烏䝉報捷恢復心神暢悅額慶之餘更增安適矣想卿近日必大愈如常精神復初也欽此又批凡此實皆無能不及一時昏愚之所致當自省黽勉况萬里之外似此存心何益之有徒自苦耳殊屬不必愛身二字莫要於此除此之外便奮志亦不能免背負當銘刻志之欽此臣跪讀之下如親覲慈顔如親聆天語感幸無似繼以涕零實有不敢卒讀不能卒讀者遭逄至此復有何言伏念奮志只堪供職愛身斯可酬恩背負論心馳驅緣事此中通窒分量限之臣無能不及未窺理要之處自省殊多固平日識見之差誠一時昏愚所致兹䝉慈訓諄切開明惟當終身銘刻黽勉上達若既知如何是背負而猶不能改過是尤背負之甚者也至臣貴兩省風日晴和氣象舒暢逺近豆麥青葱春熟可卜且於本月十二日巳刻省城慶雲復現逈異尋常軍民歡幸莫不踴躍臣仰窺慈鑒勿為臣厪念臣於萬里之外即魂夢俱安矣再臣家奴輩全無知識且甚糊塗屢䝉召見面諭恐怖之下多不能記述臣雖細體繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為南掌使回莾國請貢事雍正八年七月初七日南掌國使叭猛花細禮松花等回至雲南據稱小目等邊逺末夷䝉差送到京得親見天朝聖人賞飲食賞銀兩賞縀匹駐劄㑹同館日每諸大人照看復賜宴兩次又欽賜南掌國王敕諭一道及文綺器皿諸寶物著五年進貢一次所有恩賞國王以及先目後生人等各物謹開單呈驗臣隨逐件敬閲宣示聖主至仁至誠中外一視至意叺猛花等合掌叩頭齊稱南掌逺處遐荒亦無可圖報惟有回至本國告知國主世世頂戴並遍告鄰國使知皇帝聖仁各各歸誠以少效犬馬臣剴切奬諭之過數日伊等赴轅具呈稱外夷心直不知有二嗣後南掌諸事惟大人之命是聽其餘不敢信從臣面示云我雖總督三省撫綏各邊不過是箇中等人朝中大臣比我强者甚多我去後繼來者定强似我傳知你國王日日見天即想著天恩不得少存意見伊等懇求記驗臣令升任元江知府遲維璽給小圖書一方諭以但見此記即是我諭遂復欣然領諾隨又諭云爾等離國巳一年多了歇息幾日可就早些回去據稱小目們如今是天朝人到了雲南就是家一般願多住些時才去臣看叭猛花等雖係小國夷目殊有向慕依戀之意因於八月二十六日始派撥夫馬供應仍令經歷姜際昌把總康天錫沿途照看伴送回國兹於十一月二十日據元普總兵官邱名揚普洱知府佟世廕等各禀稱南掌國使九月二十七日到九龍江一路平安歡欣無似十月二十六日已起程回國先於十月十六日有莾國差大頭目猛古叮叭喇并小頭目二人先目六人來車里因刁紹文准承襲宣慰特來致賀適遇叭猛花等捧敕齎賞回國隨來見伴送差官經歷姜際昌等亦往答看知府佟世廕等聞知復令守備燕鳴春過江犒賞莾使問其來意並告以南掌國納貢䝉恩備細據猛古叮叭喇等合掌稱頌皇帝實是天宣慰這小年紀就承襲了官且將南掌外國如此十分加恩回去告知國王明年一定進貢懇預先禀明雲南大人求准代奏等情臣查莾子國亦名阿瓦距南掌東南計程四十五日較南掌强大如八百媳婦景邁景線等皆其屬國若得該國歸誠則滇省邊域更可永固藩籬矣竊念鑿齒雕題猶往史之所巳載南掌莽子實前代之所未聞欽惟我皇上德洋恩普豈止重譯來朝慕化輸誠時見逺夷入貢此日使回但聞一路謳傳幸陪臣得見天子彼方人至復從萬里逖聼誦中國上有聖人故捧詔言旋羡承恩之恐後而舉踵內嚮卜來嵗之可期此雖外域竒逢良屬天朝盛事皇恩大矣試看聲名洋溢於蠻貊之邦臣詠康哉願操翰墨編著於方輿之策合先繕摺奏聞伏乞聖主睿鑒臣謹奏極好之事此皆卿代朕宣猷之所致但總宜聼其自然不必有意設法誘致蓋此等事乃國家榮幸之實跡惟靜待天恩非人力之所能者同日又奏為欽奉上諭事雍正八年十一月初九日承准大學士公馬爾賽大學士張廷玉蔣廷錫寄信內開雍正八年十月初九日奉上諭各處苖蠻㺜獞等秉性暴虐久為地方之害不得不加懲創化導以安良善而格凶頑俾共享太平之福竝非利其民人土地也及用兵𠞰撫之後其渠魁有應得之罪或將其家口賞給兵丁以昭國法若夫脅從附和之人誅之不可勝誅既已寬其重罪即當還其家口復其故居仍使之骨肉完聚則彼心無擊戀易於管束可不至於反覆靡常矣即如進兵之初於扼要之處自不得不焚燬關隘以破其險阻若室廬房舍之可存者仍留以為歸順後安插之地此亦法外之仁也以秉性凶惡之人而失其故居離其親屬則心懷忿恨往往不能帖然寧靜臣工中有如此條奏者此乃通論苖蠻情形非因烏䝉之事而發也鄂爾泰年來經理苖疆自有寬嚴適中之道爾等將此再寄信告之聽其酌量辦理至於烏䝉地方將來平定之後應添設兵丁以資彈壓亦有如此陳奏者可一併寄與鄂爾泰知之欽此遵㫖寄信前來等因臣捧讀之下仰見我皇上矜憐異類寧輯巖疆之至意藹然惻然無偏無倚敢不凛體敢不熟籌隨已敬録數道傳示軍前提鎮并切札諄囑令通諭將辨遵照去訖伏查雲貴川廣漢少民稀在川為蠻在雲貴為苖為猓在廣為㺜為猺獞為狑狼雖種類甚繁强弱不一而暴虐凶頑若生天性至烏䝉一隅則盡係猓屬獷悍橫恣已歷千百年流毒最久臣前經理改流原以計取竝未大加懲創今日反覆故所應有特鎮將庸劣全無隄防倉卒傾陷恨不及料耳兹既明肆悖叛屠滅有名若復少事姑息貽害何底臣意祿酋族姓務應盡戮逆目惡黨務應盡除所有家口自應賞給兵丁或內有賊眷係各土司親屬不便分賞以啓釁端者則照例發遣其脅從附和之人雖不可勝誅但有證據俱未可寬縱或還其家口使之完聚俱遷徙寧古塔或刴去右手割去腳筋仍復其故居應按其情罪審其頑懦再酌量發落其東川各寨有苖子乾猓玀二種舊屬馴良不應驚擾惟黑猓凶頑故乘機起事然較之烏逆亦應分首從臣意除酋長頭人務嚴𠞰窮搜或誅或遣不留一孽外其餘脅從附和但來歸順概豫安插庶不為地方之害亦不失法外之仁至於扼要關隘及深密箐林固不得不焚燬以防埋伏即室廬房舍於正當搜擒時或需用火攻或恐其復聚亦有不得不焚燬者若竝無阻礙原俱可存留臣於調遣官兵後即經詳切檄飭毋濫燬民房藉端虜掠毋􅑫焚空寨揑報戰功其凡肆行焚燬者半為藉端揑報地但使將帥嚴明自可不禁而止此事關係全局又非止為凶惡忿恨慮臣惟當勤察未敢信其必無也現在烏䝉地方不日可以平定論該鎮營制兵額二千八百名原不甚單若再添設更足聲援臣查大關永善係左右兩營汛地緊接川蠻而甕迭伐烏米鐵豆沙等處俱屬險要魯甸涼山係中營汛地逼近牛欄江濳通川界及巧家營又接連火得紅鸚􅛥嘴直達東川或於該鎮准設四營每營一千兵以一營駐防魯甸將中營舊防兵俱撤歸府城以壯聲勢其左右兩營凡險要汛防既已添兵均可增設是共添兵一千二百名既彈壓有餘并調撥有資矣烏䝉既已添兵鎮雄東川額兵敷用可不須議添惟威寧地方夷人强悍額兵一千名除分防外微覺單弱或添兵五百名改營為協分為兩營設副將一員中軍都司一員守僃二員與烏䝉鎮聲息相通似更易於控制此外則尋甸一州雖屬內地實為東烏咽喉查雲南省城除城守營外督撫兩標額兵六千六百名儘可分撥擬於兩標共撥兵一千名移駐尋甸設參將一員管領仍歸臣標統轄以備䇿應其曲尋鎮原防尋甸兵丁移駐羅平添防粵境庶通盤合算皆可備應援而資戰守即遠近苖蠻亦或可消其窺伺矣此臣愚慮所及未敢定議俟與提鎮諸臣詳籌妥酌再當請㫖外合先覆奏伏乞聖主睿鑒訓示遵行臣謹奏卿籌畫措置自然周詳愼當朕凡聞有議論皆諭卿知之卿酌其宜而行之可也同日又奏為覆奏事雍正八年八月初二日奉到硃批所論甚是但朕於此等處實有所不忍卿可將朕意與卿之論詢問元展成必使伊得遂其情而朕心始安也或令暫來引見就便見伊老親之處與伊商酌奏聞若往返不致曠日愈妙欽此臣讀至實有所不忍及必使伊得遂其情而心始安等諭誠以天地父母之愛擴萬物一體之仁求諸史䇿君臣之際逾於家人父子不欲令臣下稍有不遂之情生民以來實未之有也臣爾泰感殊恩之頻加痛雙親之不逮心動神愴不禁泣下隨敬録聖諭並鈔摺稿傳示元展成令其商酌據實回覆去後續於十一月二十一日據元展成覆稱接奉諭㫖荷䝉聖恩聲淚俱咽莫可名言展成此生即捐糜頂踵亦不足以仰答髙厚今准十一月中專差家奴進摺陳情即取道靜海迎飬老親等語臣念粵西地方兩載以來互思整頓諸事漸有頭緒該司具有肝膽才亦通達且撫臣金鉷與之和衷不至互相爭執僚屬皆相信服可以效收指臂而目下開墾一案業奉聖㫖俞允將來一應事宜必須實心料理之員指示調劑籌畫稽察庶與國課民生斯有裨益元展成既擬專差迎飬似竝不必令其來京引見且聞伊父身體康健板輿到署家庭歡聚并得親見伊子之黽勉王事不以私恩而廢公義伊父子之情必皆倍加暢遂實可以上安聖心也謹繕摺覆奏伏乞聖主睿鑒臣謹奏如此甚好前者元展成亦巳具奏接伊父來任矣同日又奏為覆奏事竊臣前報恢復烏䝉摺內荷奉硃批韓勳此番之忠勇所建功績實史冊所罕載者朕欲即用為烏䝉鎮總兵已有㫖問卿矣朕嘉喜之情筆不能諭當優奬者欽此兹於十二月十五日准到部咨欽奉上諭烏䝉逆蠻不法勾連鎮雄逆目梗塞道路抗拒官兵參將韓勳帶兵四百名當賊勢猖狂之時奮勇爭先破逆賊數千之衆頃據總督鄂爾泰奏報總兵哈元生副將徐成貞領兵前進於數日之內已克復烏䝉朕心甚慰此次進兵以寡敵衆壯三軍之氣而喪賊人之膽者則韓勳之力較諸路為獨先也朕意欲將韓勳授為烏䝉總兵官以奬勞績以鎮苖疆著詢問總督鄂爾泰如伊能勝此任即一面奏聞一面令其受事或鄂爾泰另有意見亦即具奏欽此除具疏題覆外臣看參將韓勳係原任巡撫韓良輔之子原屬將門雖非豁達之才實具忠勇之氣此番效命可謂忘身用鎮苖疆自可能勝任但烏䝉初復一切軍民事務皆資總兵料理在韓勳彈壓攻取皆可以優為而條理精詳尚有所不足是以恢復烏䝉後臣隨委徐成貞署事逐細指示令其調劑以搜𠞰之事專責之哈元生韓勳等兹䝉聖詢據臣愚見或將韓勳補授别鎮總兵以示奬勵而烏䝉總兵或即以徐成貞補授似屬人地相宜均可稱職至於本內有不便明言韓勳不能致減踴躍亦不敢將徐成貞竟請授總兵有違體制臣當斟酌敘奏合先聲明又奉硃批張耀祖朕原不深取因卿各處委遣皆能幹事而李衛復數次陳奏其優朕幾自以為識錯觀此則朕前所觀䆒屬不爽不過一老練俗將耳此番舉止在伊亦竭盡心力奈其才有限何朕意欲調署固原提印哈元生朕向來甚以大器賞之此番恢復之功實非尋常人之所能者朕欲將哈元生補授滇省提督卿以為何如欽此又奉硃批凡見此奏斷無不歡慶鼓舞愛服哈元生者况朕躬耶再徐成貞朕甚愛賞之前恐其行不逮言今觀此番奮勇尚何不可信卿前言只可副將之任則朕觀人之識似較勝也朕今欲將徐成貞補哈元生之任卿以為何如可速回奏欽此臣看張耀祖人固老練習本傖猾前所幹事原無甚難此番舉止實屬可鄙臣已另摺陳明毋庸瑣瀆哈元生有膽有略可寄全省干城徐成貞實力實心可為一方保障以俗將識張耀祖以大器賞哈元生以可信愛徐成貞聖明洞照人無遁形實非臣愚所能跂及今既奉諭㫖將以張耀祖署固原提印則哈元生或亦暫令署滇省提督待其成功然後實授且臣愚見雲貴兩省雖同係苖疆而貴州尤為險要提督楊天縱年已七十六恐不能久任原擬俟其休致懇請以哈元生補授實能控制而雲南提督只須得守正急公能肅軍紀之人即可資撫馭哈元生將來或仍用貴州更屬人地相宜而古州等處并可以無虞矣是否有當統候聖裁至末奉硃批覽凡犒賞此役皆從裕厚不可稍存省費小見公用正項只管酌量動用摺奏以聞朕自有㫖諭欽此臣當欽遵酌量動用固不敢過省亦不敢稍濫緣賞以示勸惟在公當無關多少原皆足以興感也諭賜哈元生徐成貞韓勳等翎子帽盒皮箱腰刀各件臣已隨差守備段福齎送軍前親交祗領合併覆奏伏乞聖主睿鑒施行臣謹奏覽另有㫖諭部矣硃批諭㫖卷一百二十五之十六欽定四庫全書硃批諭㫖卷一百二十五之十七硃批鄂爾泰奏摺雍正九年正月二十八日雲貴廣西總督臣鄂爾泰謹奏為逆首全獲各路蕩平事竊照烏賊一案自十二月十七日已將前事具摺奏聞臣因地方雖經恢復逆首猶未盡擒則根株尚存後患未熄隨更嚴飭軍前凡祿氏逆族及逆黨頭人一孽未盡則罪不抵功一寨未清則賞不勝罰烏䝉所屬則專責之哈元生徐成貞韓勳等東川所屬則通檄各將詳切指示奬其前勞䇿其後效寬其巳往望其將來總期早結大案務為永圖節據哈元生等報稱分遣各將帶領官兵搜山捕箐猓賊皆潛匿深林嘯聚險硐遇兵則拒敵勢急則奔逃各路每日被官兵鎗炮打死刀箭傷死滾巖投江而死者多寡不等其活捉追擒并搜獲逆賊大小男女兵器什物牛羊馬匹亦多寡不等凡屬賊巢業巳掃蕩一空然而祿萬福一日不獲賊情一日觀望擒賊擒王尤不可稍懈續據徐成貞報稱屣得祿萬福自破鼠􅋭復逃回魯甸後箐密遣本標把總賴君翼帶兵前往令開化把總張有禮與鄉導張廣扮作夷人分路捕踪閲六晝夜於十二月二十四日找著祿萬福隨勸誘招安祿萬福因同奶公羅士賢即羅阿摸家人李洪義並帶出漢人江文俊戈撒等二十八戶投至行營及訊據各供其魯甸謀反頭人則有段良伯段璠奔苴鼠壽長顧延康顧鄉約江孔澤李洪義等其烏䝉謀反頭人則有龍山甲甲催黑窩切黑窩蘇甲庚沮西戈魯凹篾所大木那二木那惟鳩髙魯維業等其東川謀反頭人則有祿良珍祿良宰祿承爵祿承鼎祿天錫蘇八十等臣通查此案造謀者祿鼎坤指使者祿萬福知情者祿鼎新號召期約者魯甸頭人不待及期而啓釁者烏䝉頭人聞風響應而起者東川頭人也今奔苴顧鄉約顧延康龍山甲甲庚沮西戈切黑窩等皆已臨陳梟斬段良伯段璠鼠壽長江孔澤李洪義魯凹篾所二木那髙魯維業等皆已拏獲而未獲者止魯甸之李六斤李固老李烏䝉之大木那惟鳩等不過數人是魯甸烏䝉之逆首皆巳全獲而凶猓且𠞰屠殆盡矣至東川一境則祿良珍等為之倡而祿氏蜂起者甚衆祿良貴祿良相等乘勢劫厰統衆作叛川員雖協力擒𠞰而首逆未獲亦難容刻緩臣經通飭東川軍前并行川省謂該將等近來攻取似少知愧憤若從前兵到即進賊敗即追毫無觀望奮勇圖功則此時凶猓成擒久矣乃賊智狡詐竝不知速攻賊穴險深又不能預探臨時方覺勝算何來仰照節次牌文鋭意屠𠞰不搗賊巢毋得旁及不獲逆首毋得空回各路將領皆當熟思凛遵立身以報國其餘咨行半多嚴切即川將亦不敢少寬自此以後始節據東川各將報稱於十二月二十八日拏獲祿良宰祿良珍於正月初十日拏獲祿承爵十六日拏獲祿承鼎二十四日拏獲祿天錫此外所獲頭目如蘇八十阿擢等甚多而總以祿氏為最其川界之祿良貴祿良相屢據川鎮詳請以未便即擒俟事竣拏解臣復檄飭嚴催於正月初六日拏獲祿良貴初十日拏獲祿良相此外所獲要犯如殺土司安永長之碧薩及搶厰之捉固老大戈則等亦多而亦以祿氏為最是東川及川界之逆首並無漏網而斬殺之凶猓亦且數千人矣至於祿鼎坤之兄惟固於祿萬福未獲之先巳經擒解帶傷身故祿鼎坤之幼子祿萬華於祿萬福未獲之先巳經擒解自徐成貞招擒祿萬福而倡亂之羅士賢江孔澤從逆之李洪義及巳殺之顧延康伊弟顧阿黑伊妻鮑氏并假璠阿黑家口等犯與龍山甲甲管下逆賊沙那等犯一併就擒者成貞之力也梟斬倡逆大頭人庚沮生擒倡逆大頭人魯凹篾所併伊家口等犯者韓勳之力也梟斬祿鼎坤之兄惟固首級生擒大白迫領兵頭人拖布普豆梟斬老篾所家人鋪額及逆目戛布生擒烏䝉府奶公管下之者書大耆老之妾辰柱并各家口等犯者則副將楊馥等生擒龍山甲甲之兄龍山未未及擦拉篾所之兄朵馬無威並逆目以拍窩威業逆目沙租與祿萬福羽黨阿戛等犯逆蠻頭人戛阿母故戛奔阿代等犯并梟斬各逆犯者則副將劉朝貴參將康世顯遊擊王友文等生擒祿萬華劉明齡梟斬魯甸頭人顧鄉約魯甸大旗長生并祿萬華家口等犯者則遊擊區明王聯封何元守備陳上志張其貴等生擒倡逆頭人鼠壽長魯甸逆目暴保正烏䝉逆目鼠阿固布果沙虐納苴暮麼沙補谷固者則遊擊張翰彬守備張國用陳上志等梟斬魯甸首惡頭人奔苴及逆賊等犯者則參將南天章遊擊王聨封區明韓雯鵬守備張其貴等其與奔苴倡謀者為假良伯由魯甸叛起者為假璠一併生擒與假良伯家人沙戈一同解到者則威寧州知州趙世燕以上皆係烏䝉逆首要犯自哈元生攻破鼠􅋭殺死龍山甲甲催黑窩之後各逆皆奔逃四散而祿萬福無所倚仗又聞祿鼎新及阿業祿萬全父子投歸韓勳可以全活是以授首行營哈元生復親行搜捕斬取逆目戛布阿虐首級及逆目純苴阿母固首級又生擒純苴阿母固之叔魯歹等犯至於東川一路生擒逆首祿良珍祿良宰及祿良珍之門子陳德佃户小五奶公五租五租之弟紫利者則參將南天章等生擒逆首祿承爵及祿承爵之家奴者卡五即并逆目拖木麻色及拖木麻色之妻并子戈期即革等犯者則守備林梧鳳等生擒逆首祿承鼎并跟隨逆賊之即也戈麻母格李得沙租等犯者則把總胡應聘等生擒者海逆目祿承爵之羽黨母睢恩機洗業曲烏沙得三犯又獲逆目氣鳩一犯黑支魯機一犯阿紅麻色者測一犯阿擢一犯阿紅麻色租者一犯補必麻色者華一犯阿固沙則一犯隨皆梟首者則守備孫謀等唯祿天錫毫無消息正在嚴飭搜擒適委糧道黃士傑前往東川烏䝉一路調劑善後事宜於正月二十四日行至野豬冲祿天錫投至營盤撥兵押解前來則東川祿氏逆首皆已盡獲至若生擒搶厰作亂之逆犯祿良貴及同夥捉固老大并捉固老大之子戈則等犯者則川遊擊張棻守備孟元恩等生擒搶厰作亂之逆犯祿良相及同夥之者則阿屈改三戈業吳埧等犯者則川遊擊楊澤厚等其有雖非倡逆之人而亦係逆目要犯或逆夥親丁如梟斬逆賊魯苴你嗟阿暑等三犯梟斬長保魯得等三犯生擒逆賊者他等十三犯者則遊擊王先等生擒祿萬福管下之查薄等八犯梟斬祿鼎坤管下穿營兵衣甲自供殺人不諱之二十二犯擒斬假良伯管下之二十三犯生擒賊目翁作覺阿固及伊子六魯等家口九犯并羽黨依都阿底阿的卑諸松諸者拍未苴及阿的家人者革等犯者則遊擊區明張翰彬等生擒魯甸頭人烏那格老李管下之逆賊擒獲李六斤並伊壻那郭家眷男婦等犯者則遊擊范昉等生擒烏䝉頭人木納風子管下之魯紀魯窩魯業魯迫等八犯并家口等犯者則遊擊韓雯鵬等生擒祿良珍之妻陸氏嬸母安氏并男婦家口等犯者則參將梁彪等生擒打蕨溝逆賊者戛者卜等犯及逆目拖布管下等犯者則遊擊曾長治生擒小烏䝉頭目迭馬甲甲母子并伊頭人呼梯及賊奴眷口等二十犯生擒烏䝉土府管下逆目雞喲等犯又生擒奎鄉拒敵之逆賊祖虐阿戲頗格等犯者則守備李世祿等生擒施額法漏之母并法漏者約家口阿底者則之父等犯生擒烏䝉賊目拖布并拖布妻女等犯解獻補卧管下頭人抱梯雨者首級并雨者之兄雨窩及其子姪穿營兵號衣等犯者則千總談盛元梟斬龍山甲甲管下之常富阿合者補魯止等犯梟斬髙魯管下之者挖補者兔沙沮色兔四犯生擒大木那管下之黑補等犯生擒烏䝉頭人拖白香之子位位等犯者則千總蕭得功等生擒賊目鼠壽長之叔阿革等犯者則千總胡大勇生擒烏䝉頭目阿覺者則千總鄒大志梟斬祿萬福管下逆賊十餘犯生擒逆賊曲目等犯者則把總賴君翼生擒魯甸頭目阿客者則把總劉林興生擒大木那之妻阿嫩子戈奈等犯者則把總張問明生擒馬鞍山賊首頗噶等犯者則把總李天秩生擒逆賊者奈等犯者則土目那德洪臣查此番出師自鎮協而下以及參遊并辨目兵練無不奮勇爭先窮搜力𠞰統計逆首逆黨及附從凶猓前後臨陳殺傷并滾崖投江自殺自盡者已萬餘人擒獲搜獲訊明梟示及刴去右手者已數千人所獲猓賊男婦分賞在事有功者亦數千人准豫安插竝暫准投誠者亦萬餘人其餘生擒賊首賊目竝應質審要犯家口現已數百人押解到省收監發審所未獲大小頭目共不滿十人臣逐一開明嚴檄擒拏即藏匿川界亦無所逃遁至威寧所屬阿底土目捕凶等前經從逆明肆反覆續雖悔罪投營隨軍效力非出本心此數百强猓難以姑息臣已密示哈元生於回師之日盡數擒拏梟首沿途懸示以除後患以警羣夷再江外川蠻有素不安分應加懲創者俟提臣黃廷桂指定酌行亦不難清楚是此一大舉轉可謀永寧福倚禍來誠如聖明洞鑒而川滇黔三省漢夷之幸也現在軍務將竣東川一路土兵業檄撤回官兵酌留三千名儘足布置烏䝉一路土兵亦應檄撤酌留官兵七千名彈壓搜捕俱可敷用至於招徠建置營汛關隘諸事臣已一面料理穀種牛力俱已預備現自外來住牧墾田者已七八百戶再兩三月即皆有頭緒除將調遣攻𠞰恢復完竣情形應詳叙題報聽部察核外所有逆首全獲各路蕩平緣由合再奏聞伏乞聖主睿鑒施行臣謹奏欣悅覽焉同日又奏為委替總統嚴𠞰賊蠻事竊以廣西思明土府所屬之鄧橫寨强暴恣橫積惡多年通計不過一百九十餘戶丁壯不滿千人聚集凶徒專事劫殺左有雷蓬右有那練暗為黨羽互相勾結密竹層柵陽當外衛深濠險坎陰設內坑築土如城建臺安炮鎗箭能出不能入兵役敢近不敢前欲興問罪之師則懇誠悔罪及追逞凶之犯則委卸他辭凡屬各員多因循而諱盜遂爾成習致文過以飬姦臣前有訪聞曾經屢奏及奉恩命兼制粵省復確查密訪情事無虛隨札致撫提二臣并密行藩臬及文武各員公同查議及接撫臣金鉷札稱歷委文武各員親往查勘實屬順民具有不敢為非不敢藏匿器械甘結并取具地方官印甘各結等語而司道府㕔并將辨等官據各詳禀俱代稱恭順同口一辭所有劫殺各案皆置之不問臣亦姑置之逮後再行確查鄧橫賊蠻不但竝不悛改復敢明肆劫殺該文武知不可諱始詳報請𠞰而提臣張溥以為必不可縱已先委思恩協副將尚清統兵進𠞰乃尚清毫無智謀不審形勢於雍正八年八月初二日一到鄧橫即冒昧進攻損兵挫威首先失利臣經嚴飭切責并詳示機宜而尚清一誤再誤終於不振隨復准提臣張溥調委左江鎮齊元輔親往調度并詳切札囑不謂該鎮庸懦更甚日事遷延視賊黨為腹心以招安為長䇿不能殺賊每為賊愚不過數百賊已先傷數百兵仍不知悔悟屢墮計中臣前後檄飭指示頗詳而一無領㑹惟望投降似此劣鎮終何能濟事臣於新提臣張應宗赴任時詳告情形密囑料理計已到任隨於雍正九年正月十二日飛調右江鎮蔡成貴星往並通檄軍前以鄧橫一寨自出師以來已經半載提數千官兵𠞰數百蠻賊即不能搗巢犁穴亦何難絶食斷援是縱出下䇿亦可收全功乃遲延至今損兵已多殺賊何在為總統者不知忿恨不識羞慚攻𠞰之䇿一籌莫展其有往來賊寨者不問餽送賊寨者不問帳外呐喊者不問營盤偷挖者不問甚至有營內土兵鳴鑼暗號約賊殺兵者亦不問以致三五成羣出寨窺探不能擒殺數十結隊出寨猖狂不能𠞰捕明知賊乘夜必來竝不設伏而專藉土勇明知賊暗鎗屢中竝無防備致日傷兵丁賊不出寨轉能殺兵賊既出寨尚不能殺賊伎倆止此謀勇安在况屢示機宜頻加䇿勵利害勝負分晰詳明不謂血氣全無肺肝如見直至此日仍望投誠且稱託名招安實欲借以擒殺以堂堂官軍不能用正不能用竒而欲誑誘殺降無論智出賊人下早為賊覷破計必不成即便計成亦非男子事而損威失信所關尤巨又不止為鄧橫本部院早知左江鎮庸懦無能不堪任大事特以寨小兵多猶不難勾當且因其力𠞰不克退而求參故復嚴切檄飭許令自新乃據來禀仍毫無定算又復歷月踰時而確探軍情但聞今日誘撫明日詐降朝見武生暮商賊黨旁觀者皆知為左計當局者猶祕為密謀以致軍氣日頽賊志愈肆似此心膽掃蕩無期倘復姑容邊疆何賴人或曲為該鎮解本部院殊無以自解也除飛檄左江鎮立速回任聼候參處外合行專委右江鎮即便於所屬轄選帶將辨并酌派漢土兵丁星赴鄧橫軍前總統一切軍務須先絶賊黨援斷賊糧路敢有私通私餽者審明某寨即先將某寨屠滅毋得姑息亦毋得牽纍并明白曉諭附近各寨及各路土兵不許於近賊寨處所出入行走以防遞信倘有故違初犯者插耳遊營再犯者梟首示衆其軍中號令有明有暗陳前金鼓有緩有催務使通知或令各記犯者皆依軍法其將辨土司有畏縮觀望不齊心努力者立即據實揭報以憑嚴究其鼓勇抒謀誓期滅賊之將辨土司奮不顧身爭先殺賊之漢土兵練立即奬賞并分晰呈報至於攻擊擒制不外審測變疑但知活法都是先機矧此么麼有何轉幻惟該鎮審度大勢運用一心毋撼於煩言毋膠乎成見即本部院從前屢檄須善為體㑹竝不必拘泥總期滅此朝食勿使更留荄蘖庶少振軍威用伸國憲立撲蠻焰以重邊防在本部院所慮實不為小而為大不在近而在逺以全粵兵力不能除一鄧橫束手甘心此復可忝居軍民上膺封疆寄耶言不盡意其熟籌速𠞰施行等因通飭文武并咨撫提去訖該臣看得廣西一省盜賊殊多而諱匿不少大吏粉飾寧靖有司瞻顧考成上下相朦積習已久如鄧橫一寨特尤甚者耳惟調任提臣張溥立意清除不避嫌怨次則總兵蔡成貴努力急公然張溥微覺褊急蔡成貴過於執拗每不理於衆口謗言日至而撫臣金鉷尤不以為然臣每接札禀委婉調停緣是未露形跡向使彼此和衷文武協力鄧橫小醜亦何難立除臣故於咨行內每痛切言之而於司道將辨尤日益嚴厲在撫臣金鉷雖有自是護短之病然能諒臣心曾不以為怪新提臣張應宗頗能解事亦能和好料賊情盜案嗣後轉可商辦得以清釐也至於左江鎮齊元輔以所轄地方平日既已因循臨事仍然委靡不獨庸懦亦且油滑實不稱總兵之任臣當另疏糾參候㫖遵行其所遺員缺關係緊要查三省副將內現無可勝總兵之人懇祈聖恩速揀賢能補授或將蔡成貴即調左江以專責成將右江鎮缺另揀精壯强幹之員補授庶人地相宜各有禆益再廣西副參遊擊內尚有應參之員而雲貴兩省出缺亦甚多更祈聖恩將可任副參遊擊之員揀選十數人命往雲南令臣預先委用酌量題補則要缺不致懸曠臣愈得資指臂之力矣合併陳明伏乞聖主睿鑒訓示施行臣謹奏覽另有㫖諭部同日又奏為籌酌黔省養廉請㫖遵行事竊惟聖主優恤臣下實至渥而極周大吏因地權宜應量入以為出即宣勞無異而不可不分繁簡為低昂縱品秩相同而不得不别新舊為增損定額必給以足數折扣不宜教職本近於鄉邦議給殊過雜職雖應量給因數少而且俟將來試用難定人員待歲終而統歸公用此不得不通盤合算較多論寡者也臣查得貴州一省賦稅本屬無多故羡餘為數甚少雍正三年經前署撫臣石禮哈將額征火耗秋糧耗暨官莊學租各米折價以及各屬稅羡並府㕔州縣等官名下俸銀共銀五萬九千二百兩零奏請歸公自巡撫學政以至司道府㕔州縣等官分給養廉銀五萬二千三百兩留支一切公費銀四千八百餘兩存銀二千零九十兩以充不時需用之費在案但地丁糧米耗羡係有常額猶不致缺少稅羡一項盈縮不常不能以一時查出之數遂為定額是以當石禮哈任內本年即缺銀九千一百六十餘兩不得已議將各官養廉九扣給發尚有不止九扣者又如官莊租米歷有支給孤貧賑濟寒生及囚犯解審口糧等項原不能盡行變價其各官俸銀遇有升遷缺罰即應除歸正項亦不能槩算充公是此二項約又缺銀二千餘兩再永寧一縣已歸川省應除去稅羡銀三千六百九十餘兩更加以由川割歸之遵義一府暨所屬之正安等五州縣由楚割歸之開泰等五縣又新設之南籠一府永豐一州除將本地耗羡即勻給各官飬廉外尚少三千餘兩在從前公費石禮哈原奏定四千八百餘兩之外尚有必須公費各項未經奏明蓋因彼時尚有普安縣屬濫木厰水硍稅羡數千兩可以支墊雍正五年經前撫臣何世璂將此項奏請歸公統計不敷數目每年實共缺銀二萬餘兩今又加新闢苖疆現在題准設立道員竝同知通判縣丞等官俱應給以飬廉約共需銀六千二百兩又緊要苖疆竝衝繁險難各缺亦應酌增又約需銀五千七百兩再新添必需公費各項又約需銀六千餘兩以上三項共又需銀一萬八千餘兩並無别項羡餘可以籌酌惟有礦厰一項每年約可獲餘息五萬餘兩請將此項給與黔省以便補足石禮哈原議缺少之二萬餘兩並新添苗疆各員及衝繁險難各員之飬廉一萬一千九百兩又各管厰官役費用工食約計五千餘兩又新添必需公費各項之六千餘兩四項約共需銀四萬三千餘兩除各項支給餘銀按年扣算造冊報部留作收買餘鉛工本如有節省銀兩以充新闢苖疆犒賞之需如此量入為出庶幾經久可行前臣過黔時撫臣張廣泗詢商此事臣囑伊再同司道詳細妥籌續知其所奏并議及教職在各省從無此例且伊等俱在本省又無地方應辦之事即有差遣亦可於公費內酌給盤纒原不必議及飬廉者臣已切札相責張廣泗深自愧悔而臣在黔面議諸事於此件未曾分别說明亦屬疏略今詳細籌酌分其新舊别其繁簡辨其難易擬以實數發給不令九扣八扣其餘雜職如經歷照磨司獄吏目長官司吏目典史巡檢等黔省共七十七員原應議給然又約需五千餘兩俟各項盈餘辦有成數再行奏明議給又發往試用人員數之多少不能預定時之久暫亦難預期况內有在省學習者應止給以薪水之需倘遇差遣應量給以盤費此應開入公費項下不應入飬廉冊中臣統計飬廉共需銀七萬一千兩倘䝉聖恩俞允以運售餘鉛獲息補足原缺及新添各員飬廉俱照新定之額頒發永為定例則難易均平大小各得而新設之員亦更知踴躍凡沭恩施之隆益凛冰淵之操矣為此繕摺具奏伏乞聖主睿鑒施行臣謹奏卿料理自然妥協照所議行雍正九年四月初九日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正九年二月初九日臣齎摺家奴䝉恩賞齎回御賜抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖跪捧摺扣敬詢起居備聞聖躬康强精神暢悅又聞聖駕親行祈榖日瑞雪繽紛氣象和藹並前數日俱降微雪預兆豐亨臣踴躍欣忭莫可名言欽惟我皇上敬天勤民眷注不遺萬里而至誠妙應昭賜先自京畿據來滇人員及臣家奴口述自出京直至河南俱得大雪農民慶幸湖廣貴州豆麥菜子俱盛而雲南全省冬雪春雨逺近霑足二月內蠶豆上市三月內大麥菜子登場現在小麥收割過半而稻秧已甚青葱臣親歷郊外見田家男婦翻泥放水行將栽插各有喜色謂又是豐年此天心之仁愛實聖心之感通慶幸無似警惕彌深誠恐稍自乖戾不能為承受地致纍兹蚩氓耳為此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣期共勉之同日又奏為奏聞事竊照古州地方自𠞰平擺調方勝等寨隨經摺奏在案嗣後通查各路如八寨丹江清水江諸葛營等處氣象殷繁人情和樂商賈往來已如內地惟定旦來牛二處原係苖外生苖因收附未久兼未經嚴𠞰故附近各寨習染未除仍每有伏草傷人偷牛盜馬等事又滚踪一處地勢險窄巢穴堅固重重排柵扼要紆折且鎗炮齊備瞭樓髙三五層不等屢示招徠不肯受撫是滚踪不除定旦來牛不懲恐苖衆效尤終難圖寧帖隨經臣嚴飭鎮將密示緩急期在必𠞰毋許支飾前據總兵官蘇大有派遣官兵進𠞰滚踪屢攻難破互有損傷時因烏䝉有事曾囑令少待續據報蘇大有病故臣恐苖賊乘機勾結必逞凶頑又或以兵力勢難竝舉必懈抵防遂一面委副將董芳署理古州鎮務撥聖恩分賞兩省官兵以示鼓勵並令親看攻𠞰情形回報李枝連既到於十二月十九日密傳臣令各令協力齊攻黔副將趙文英帶領守備侯𢎞道等由左路粵副將潘紹周帶領都司鄧文選等由右路又派遣官兵分兩路堵截俱於四更時分前進每路各有凶苖數百幫助滚踪以襲我兵之後被埋伏官兵四面齊起分追截殺賊皆奔潰趙文英率領官兵連克左路險關數道乘勢大進直搗滚踪賊巢潘紹周帶領官兵翻山越箐連克右路險關數道從滚踪後山直上攻打賊巢左右兩路相隔十有餘里頑苗亦分兩路拒敵於是各領官兵併力攻打至辰時㑹合直至未刻備辨兵丁爭先鼓勇兩下夾攻遂破大寨鎗炮打死頑苗甚多帶傷者無算當將賊寨巢穴焚搗一空日暮回營隨於次日有苖衆投誠願繳鎗械懇請招安該副將等因暫緩搜𠞰據差往千總李枝連回報并董芳趙文英潘紹周各詳報前來又於正二月內節據副將卜萬年等報稱來牛定旦等寨各頭人陸續到營呈繳鎗械造報戶口情願納糧當差永為良民等情臣查滾踪苖衆狡悍異常又非定旦來牛比雖此番懲創已震軍威然家口預藏餘孽濳匿所繳鎗械又復無多若驟准投誠終不能實心內向况時值東作或頑苖恐誤春耕故為緩計亦未可料隨經嚴檄董芳等務將滾踪惡類盡力搜擒毋任漏網然後將來牛定旦各頑寨相其誠僞次第清除毋得率混去後嗣據董芳報巳派遣永寧營參將施善元總統官兵㑹同趙文英進𠞰滚踪於三月初一日抵賊巢右嶺初二日移營左嶺既抵滾踪隨有逃避苖衆暨附近滾踪之髙鳥邦受等各寨苖人跪接哀求情詞迫切該將等未忍加誅兹於三月十四日有滾踪苖八十餘名各寨苖四十餘名齊赴古州鎮衙門悔罪乞降納糧繳械咸稱願豫自新永作良民共繳鎗刀三百餘件未到者仍令續繳職細詢軍前各員俱稱實係輸誠並非飾說是以准其安撫其定旦一帶有平宇遮擺等一十九寨苖頭六十餘人齊集定旦營後共合大款重申誓約願永作良民竝保固來牛以至諸葛營道路其來牛一帶沿江各苖皆巳抒誠向化至兩江上下各寨苖民稍有頑梗者盡知悔罪從前觀望者皆懇當差目下光景實屬寧謐可以指日撤兵奉諭料理殊易完結等語臣查古州等處實千百年化外之區疆域二千里地險苖强料理原屬不易即成敗遲速固皆可以情寬惟是治苖之道首貴乎信信之為義仁勇資焉故威不立則惠不從𠞰不嚴則撫不定殺活皆以誠告力即可以服心籠絡全以術行智亦不能終事凡此大要人所共知如果實心實力實𠞰實撫絶去欺朦一無粉飾則事或不舉而舉必有成事或不成而成必可久顧或意在邀功抑幸免過不欲徹底澄清因而藉端揑混是不終日之計何有十年之籌不信之至必至於負國尤無論身名矣是以臣於黔省料理苖疆諸文武日益嚴切瑣瑣諄諄即於撫臣張廣泗亦竝不敢稍有寬假之辭實自勉願共勉也今古州大局雖據報平靜零星數寨自不難料理然功戒垂成事防既定是否確實猶難深信張廣泗現擬親往古州再行查勘臣復面囑韓勳札囑董芳竝切諭諸將務將善後事宜熟籌妥辦不得少有支飾竝將新擬設營添兵各件㑹議速詳以憑酌定具題請㫖外所有據報𠞰撫滾踪各處情形合先奏聞伏乞聖主睿鑒臣謹奏覽同日又奏為奏聞事竊以烏猓叛亂蔓引鈎連庸懦震搖民夷惶惑一時情形實有猝難撲滅之勢逮韓勳一戰而大挫賊鋒哈元生再捷而已寒賊膽恢復烏郡而賊盡狂奔收克大關而賊皆逃匿東川官兵㑹合於魯甸而賊無可藏身四川官兵㑹合於永善而賊難以托足且凉山鼠􅋭盡搗各處窩巢牛欄金沙遍搜二江內外不獨賊子祿萬福賊弟祿鼎新白迫阿得等皆已擒縛囚解並烏䝉倡逆之凶目庚沮西戈補卧切黑窩龍山甲甲髙魯維業等魯甸倡逆之凶目假良伯鼠壽長假璠李六斤奔苴等鎮雄倡逆之凶目㓲刀法漏者約等阿底附逆之凶目黑寡搆雄等東川發難之凶目祿良珍祿良臣祿良宰祿天錫祿君錫等川界搶厰之凶目祿良貴祿良相等以及各路大小頭目無不或斬或擒殆無噍類計前後擒拏解省之逆目要犯共四百七十名逆犯眷屬共一千餘名口尚有已獲未解者應俟解審招詳到日一併親審具題此外未獲逆犯尚有四五人現在四路嚴拏所有三省陳亡帶傷及奮勇官兵現飭分晰查造恭候奉到恩㫖送部查核臣已於正月後陸續將雲貴土兵通檄全撤烏䝉酌留官兵五千四百名東川酌留官兵一千五百名暫備彈壓搜緝之用其餘官兵亦盡行撤回四川漢土官兵并咨提臣黃廷桂僅於江外要隘酌留堵緝餘盡撤回其營制兵數田土城池應如何添設開建及一切善後事宜容臣愼重詳籌分疏請㫖仍一面辦理不敢延誤業於三月二十五日恭疏題報在案續據各員禀報拏獲東川逆目七里阿虐竝賊眷五名口烏䝉逆目切黑蘇甲竝賊父母妻子兄弟十八名口又拏獲烏䝉要犯阿慮等六名魯甸要犯者捕等十六名東川要犯戈則阿各等五十三名所有要犯眷屬俱已解省一併發審此外未獲止有烏䝉逆目擦拉篾所大木那鎮雄頭目施額東川女頭目安氏業經嚴檄四路查拏總之凡屬頭目俱應剪除斷難令一名漏網即罪不當殺亦必須遷徙庶既盡根株斯可絶萌蘖況此番反覆備極猖狂若非仰賴我皇上精誠惕厲上格天心乘勢迎機皆如默助縱以哈元生韓勳之效忠將備辨兵之用命求如此速捷無論諸文武不敢料百千萬人皆知有不能臣實深感激倍切警省倘復以事巳大定狃於俗論稍存姑息不為邊方百年計則辜負聖恩無異於劉起元官祿并何異於祿鼎坤故自始事至今或謂過於嚴急或謂近於殘刻臣皆不遑恤鬼神鑒察惟期勿欺衾影已耳所有續報情由合再奏聞伏乞聖主睿鑒再現解省審擬之逆首要犯及賊黨賊眷計一千餘名罪應凌遲斬絞充發遷徙不等若必待具題後候部議覆奉㫖准文到日然後發落既恐賊多病斃不獲明正典刑且日久事畢羣情漸忘亦無以快人心而震苗猓可否仰邀聖鑒准臣一面具題一面發落合併請㫖恭候批示遵行臣謹奏有㫖諭部矣同日又奏為請㫖事竊照滇省新設鎮營調撥别營兵丁補額因其安土重遷諸多需費屢䝉皇上隆恩賞給搬家之資俱係動鹽餘銀兩查明大口小口程途逺近分别給賞在案續因普洱府添設新鎮額兵二千四百名內除原收普威營兵一千四百名及新募補額外餘係調撥臣標兵一百名提標及開化鎮標兵各一百名曲尋鎮廣羅協兵各五十名元江協兵二百名今據普洱鎮總兵官邱名揚詳稱此六百名兵俱有家口在各本標營其中或父母年老家無次丁或家口衆多乏人養贍各兵無力搬移未免分心兩地且景䝉營原撥普威營兵二百名時因鎮威車茶江壩等處屢有軍務家口尚在景䝉地方今又改歸新鎮亦應令其搬移援例詳請照給銀米前來相應仰懇聖恩一例賞給路費俾得立業成家更可安心用命再黔省撥往古州清江等鎮協營兵丁先經臣具摺請給搬移之費荷䝉硃批俞允未准部文行知又滇省烏䝉一鎮除舊額兵應補外現議增設一營改設一協增兵二千五百名臣已招募足數乘官兵尚未全撤即應新舊相攙陸續撥往所有搬移家口之費亦應預先宣示皇仁俾各知曉庶所撥兵丁倍加踴躍而願往者益衆矣理合一併請㫖伏乞聖主睿鑒敕部知照施行臣謹奏此奏朕嘉是覽之凡有此等應施恩之事皆當密奏以聞朕自斟酌而行也另冇㫖諭該部頒發雍正九年五月二十六日雲貴廣西總督臣鄂爾泰謹奏為恭謝聖恩事雍正九年四月十一日臣齎摺家奴齎回欽賜臣御書單條一幅對聨一副新織花樣絲布四匹抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖臣盥手莊誦注目諦觀曷勝敬仰曷勝欣忭恭惟我皇上天縱多能日新富有萬幾餘暇舞龍鳳於毫端十指轉旋散珠璣於紙上斯固聖藻之超前軼後而尤臣心之遂願移情夢寐瞻依捧宸翰之輝煌如傍玉皇之香案山川間隔睹墨花之璀璨恍覲慈父於龍墀仗尺素之雲煙為近光之日月頒來萬里不違咫尺於天顔傳去千秋永貽奕葉之盛事載吟睿製見天地之同流敬繹王言識動植之咸若遮橋柳線絲絲剪出春風夾道榆陰樹樹苞含膏雨翻空麥浪仰窺帝心之眷注惟在鑿井耕田濺水池珠伏思聖學之髙深早徹鳶飛魚躍隔林鶯舌聲唱太平之歌拂水栁花點成熙皥之象樂兆民於海晏豈止輦路塵清示庶職以天和常見御園景滿寶此鸞翔鴻戲更重於琬琰圭璧之珍聆兹大吕黃鍾何殊於戛玉敲金之奏懸諸堂上如傳闕里之書賜出天邊更得金閶之苧荷䝉聖主以錦字當華衮之榮矢願微臣以尺布佐九州之被謹此繕摺恭謝聖恩伏乞聖主睿鑒臣謹奏覽卿奏謝矣同日又奏為鄧橫已靖蠻賊盡屠恭報情形仰祈睿鑒事竊照廣西太平府屬之鄧橫寨蠻賊積惡猖狂逞凶肆橫左江鎮已革總兵齊元輔不能𠞰捕惟事因循致賊勢愈張軍威不振經臣改委調任右江鎮總兵官蔡成貴詳悉指示令往料理業經奏明在案續據軍前禀報並參閲圖形計該寨共分三甲賊衆本甚凶橫地勢原屬險阻加以駐兵半載既損聲威玩寇多時反驅凖備以致鄰寨畏勢亦暗許勾連土兵相機更明行觀望因而壕塘之淺窄者復得開挖寬深墻垣之低薄者復得砌築堅厚且墻壕層間路徑紆盤兼有地道數寨相通而又環築炮臺密開鎗眼賊在內有以藏身兵在外無從駐足故鎗炮不能入入亦不能傷而賊則處暗擊明半無虛發是此時之進取實較從前為倍難該鎮蔡成貴自二月十四日抵軍營後遵照臣言先將攙雜之土兵盡行遣回復將營盤漸次前移逼近賊寨得步進步即搶築炮臺劄營駐守示以圍困之意一面捲土砍竹置備火具為填塘攻寨計蔡成貴初次督𠞰雖奪取一二炮臺賊已驚恐亦互有傷亡臣據禀報恐或欲圖萬全將復濡滯又以時巳入夏恐雨水連綿瘴癘漸發或疫作氣餒更何能剋期竣事因激以榮辱利害之語示以必勝不敗之機詳札切囑嚴檄飛催隨復發三等紀功牌並醫創治疫等藥專差持諭速往督進兹於五月二十二日據該差回滇並報捷千總王廷彩禀稱自三月二十日進𠞰起兵分中左右三路以敵賊之四六九三甲無分晝夜不避險難伺隙即攻乘間即奪計經一月始直逼賊巢凡寨外各要隘皆為我兵占踞四月二十四日參將劉成遊擊王欽袁士傑等督率漢土兵丁斬柵壞垣奮勇殺入將九甲全平二十八日副將尚清遊擊陳典等先於天未明時遣用土練暗進四甲埋伏至二更時分令各站墻兵丁沿寨舉火乘勢攻進亦將四甲全平所有賊衆除斬殺燒死外餘皆竄入六甲合夥死拒因即於四九兩甲各暫劄營㑹合各官土兵并原攻六甲之參將周儀遊擊羅玊秀劉欽等併力圍攻至五月初四日巳將六甲賊寨占奪大半賊衆危急奔赴遊擊袁士傑守備俞大勇營盤求撫當即拘留看守復據投出之賊首馮韋髙帶領賊黨十二人進寨殺取首惡首級呈獻有蠻賊百餘人知必不准撫又突出砍柵意在衝圍逃竄被官土兵亂鎗密桿盡數殺死各割取首級並獲鳥鎗長桿藤牌腰刀挑刀大旗等件繳送營盤隨復督兵攻進生擒一百餘賊皆綁赴營門立即梟首致祭旗纛並陳亡官兵其賊蠻男婦除傷斃外尚餘六百餘名口俱解赴省城候審發落初六日俱經全平各寨壕塘現在督填寨外密竹現巳盡砍該寨惡類並無一漏網等語合諸鎮將及軍前道府各禀報無異臣查鄧橫三甲雖强賊不滿千人而巢穴險固器械堅利即論炮臺竟多至百餘座黔苗滇猓從無此凶悍是非獨庸懦如齊元輔輩原不能剋期𠞰滅即全粵文武見臣必欲𠞰滅不但有難詞且將作笑柄意謂事必不能不如將就及見臣嚴行通飭委蔡成貴前往尤不以為然殊不知以全省兵力不能制一鄧橫任其頑抗歷數十年則㺜狼猺獞尚何所忌憚是以臣於此舉多有激烈之言從無和遜之意謂置之死地而後生此外决無勝算非止為鄧橫實為全粵計也今仰賴聖天子仁威終於屠滅不遺根株將通省震動各知警懼不敢稍有不法事則恩生於害所全實多雖奮勇辨丁傷亡可憫然死於陳與死於家孰幸孰不幸臣終不敢稍存鄙見視甲士如婦人不責以大義忍姑息以相輕也除俟總兵蔡成貴呈報進𠞰詳細并奮勇傷亡官兵查造冊報到日另疏題報外所有鄧橫巳靖蠻賊盡屠情形合先奏聞伏乞聖主睿鑒臣謹奏題到冇㫖卿前奏云楊天縱乞休尚未見奏到朕意欲將哈元生調黔用蔡成貴為滇省提督卿以為何如若與朕意相同其右江鎮員缺孰可勝任可奏來一併發㫖同日又奏為恭報三省豆麥收成分數仰祈睿鑒事竊照雲南省本年二月雨水微稀雖去冬大雪豆麥苖甚盛誠恐過時不雨粒實不堅臣竊深省惕至三月望日甘霖大沛逺近均霑嗣後間晴間雨甚屬調和貴州省春雨無缺穫刈較晚是以兩省各屬所種豆麥俱獲豐收今行據雲南布政使葛森詳稱除石屏㠄峩騰越師宗元江新平景東等府州縣併攸樂地方向不産豆麥烏䝉鎮雄㑹澤永善等四州縣因兵燹甫定現在招集人民耕種收成分數未據冊報外昆明呈貢晉寧宜良嵩明昆陽霑益䝉自河西阿迷鎮南廣通定逺保山江川永平楚雄羅平宣威等十九州縣豆麥收成俱有十分十二分不等羅次南寧建水普洱新興文山河陽趙州南安浪穹賓川太和陸凉彌勒尋甸平彞安寧鎮沅恩樂雲龍永北雲南鶴慶麗江姚州元謀大姚順寧寧州馬龍等三十府州縣豆收八分九分不等麥收九分十分不等易門富民廣南䝉化劍川通海雲州祿豐廣西鄧川和曲祿勸路南威逺等十四府州縣豆收七分八分不等麥收八分九分不等據貴州布政使常安詳報豆麥雜糧等項現在收穫通查各屬內定番廣順貴定龍里安順普定鎮寧清鎮桐梓印江婺川思州黎平開泰永從平逺等十六府州縣俱係十分收成貴陽貴筑永寧安平南籠普安州永豐安南甕安湄潭都勻府都勻縣鎮逺府鎮逺縣清平施秉思南安化石阡龍泉玉屏青溪銅仁府銅仁縣天柱錦屏大定黔西威寧遵義府遵義縣仁懷等三十二府州縣俱有九分收成開州修文普安縣正安綏陽平越府平越縣黃平餘慶獨山麻哈畢節等十二府州縣俱有八分收成據廣西布政使元展成呈報除恭城賀縣修仁昭平容縣岑溪懷集橫州永淳上思懷逺賔州來賔上林河池東蘭等州縣向不産豆麥雜糧天河一縣豆麥收成頗遲分數難以預定外興安富川藤縣平南武宣左州馬平思恩等八州縣大小二麥收成俱有十分荔浦蒼梧宣化融縣等四縣豆麥收成俱有十分臨桂陽朔灌陽平樂隆安崇善養利雒容栁城羅城象州宜山荔波奉議都康等十五州縣二麥收成有八九分永寧永福義寧北流桂平西林等六州縣豆麥收成有八九分靈川貴縣永康遷江等四州縣麥收俱有七分永安州豆與大小麥收成九十分蕎麥收成八分全州小麥收成八分豆子蕎麥收成七分鬱林興業新寧等三州縣豆子雜糧收成有七八分博白陸川二縣并泗城府麥糧鮮有栽種豆收有七八分鎮安府西隆州歸順土州蕎麥麵麥收成七八分武緣縣蕎麥收成六七分向武土州麥收九十分上映土州小鎮安土州蕎麥收成九分小麥收成七分各等情前來合臣察訪無異相應據實分晰奏報再雲南省自入夏以來時雨屢降逺近霑足而芒種日大雨夏至日甚晴據農民稱幸以為又係豐年現在髙低田畝栽插已完早秧出水逾尺青葱可愛夏蕎雜豆亦甚茂盛如得仰邀天恩此後晴雨但不至過甚則今歲秋成又可預卜大有合併奏聞伏乞聖主睿鑒臣謹奏以手加額覽之京師目今甚旱實知皆朕一人之咎此中不得已召致之情惟祈上天鑒諒耳亦不勝批諭同日又奏為欽遵請㫖事竊臣自雍正三年十二月初一日陛辭赴任後逺違天顔巳歷六載孺慕私衷日久彌切昨歲恭請陛見荷䝉慈鑒准於今歲八月初旬內自滇起程於萬壽令節前扺京踴躍欣幸莫可言喻續於十一月二十八日摺內陳明俟烏䝉等處布置停妥於今年八月初自滇起程緣由復䝉硃批亦且不必拘定八月至臨期相機再行請㫖欽此欽遵臣查雲南之烏䝉東川早已平靖現甚安帖其餘邊夷外域皆實心向化各享盈寧廣西鄧橫蠻寨亦經屠滅淨盡根株而貴州之古州新疆凡未歸生苖又復酌行𠞰撫悉入版圖縱有一二寨招擒殊易即接壤楚界之稿坪落塘數寨原非强賊現巳懲創不日可以報竣此外三省别無大事其地方諸務三撫臣儘能料理可以放心乘此空閒往還不過數月計明年開印後即可回任亦並無曠誤臣謹擬於八月初四日自滇起程敬記慈諭按程緩行至總督印務實關係重大臣於昨歲曾以三撫臣中沈廷正不能制金鉷較逺張廣泗雖尚未能服衆似猶可以暫署等因附摺陳明續於另摺內荷䝉批示臨行時可具題以聞督印可傳諭張廣泗署之欽此今臣起程有日臨行時自應將督印移交惟是張廣泗現擬親赴古州㑹同韓勳等經理一切善後事宜並黔楚苖界之三不管地方俟稿坪事定亦須就近詳勘將移協安營增汛添兵等事酌商定議以便題請計日需時或難兼顧且臣衙門三省書吏三省文卷例隨督印自滇移交甚屬繁重臣曾密商張廣泗亦稱多有未便合併請㫖或將督印仍交張廣泗令伊赴滇署理或暫行收貯令三撫臣各於本省暫代行總督事俟臣回任再將事件移交統乞聖主睿鑒裁示遵行臣謹奏卿來京見朕不過暢我君臣一時之情耳而三省苖疆甫定尚需鎮靜彈壓善後事宜更資料理況朕萬壽廷臣亦皆不令行禮卿萬里往來匆忙一見更覺難以為情朕當再加詳酌降㫖至總督印務或令髙其倬前來署理或令三撫分任處臨期亦有㫖朕意於今冬或明春著令卿來今朝中尚少一贊襄機務之人朕正在籌畫大概并諭卿知可靜候朕㫖而行八月之期不必也同日又奏為覆奏事竊照廣西布政使元展成前請以分發進士派交各府知府學習一摺荷䝉硃批與督撫商酌為之若意見相同應請㫖可具題來欽此欽遵録示到臣臣謹按欽奉上諭以今科中式進士分派各省藩臬衙門令其學習三年即於所派省分試用補授者正以藩司衙門為一省錢糧之總滙臬司衙門為一省刑名之總滙但能用心學習三年必有一長於該進士大有禆益即於該省分大有禆益也兹據元展成奏稱通省政事雖出於藩司要皆總攬其綱領與州縣官親民者有别且收放錢糧事有成規可無庸學習再命盜案件例由州縣解府審詳到臬司衙門已屬成讞即有供情未協亦仍駁回府其民間細事非臬司逐一親理若令入藩臬署內學習又與內幕相親亦恐滋弊是分派各省進士不如於知府衙門學習之為親切等語臣查一應事件無非情理守正持平端視大吏故宣化為藩不止司錢穀弼教為臬不止司刑名此外省樞紐之地實觀政者之準的也若不令學習於藩臬轉令學習於知府是猶使觀水者舍江河而就溝渚其能識源流者幾何臣愚以為分派學習除藩臬衙門外督撫糧鹽道衙門亦應酌派總在省㑹易於觀摩似不必分派各府轉不能時常接見無以試驗其優劣也惟是有教斯有學有傳斯有習竝非止於升堂片時令其侍立靜聽而即可望其知能或間發一案令其擬看或故作一問令其裁答或實指一事令其條陳或虛設一疑令其剖斷或差令查勘或委令督催或閒論夷情或詳說地勢就其言動觀其才識指示是非改正錯謬如此三年庶學習進士或可半有成材至於學習署內恐與內幕相親將來滋弊此事惟在本官即如書吏未嘗不在署內與內幕隔别原不得相通作弊不作弊亦豈限於署內署外各衙門二堂以外儀門以內但擇閒房二三間即可為學習之所其日用薪水應酌量資給俾無窘迫庶益奮興臣現於分發雲南新進士九員內將一等次等者派往撫藩各衙門學習留又次等二員在臣衙門學習仍不時傳集合考其所學分别勤惰以示勸誡在各省各有不同總期仰體聖意造就人材竝可不必題請通飭除知㑹撫臣金鉷札覆布政使元展成廣西可否照行聽其再酌外緣係録示啇酌事理合備陳愚見繕摺覆奏是否有當伏乞聖主睿鑒批示施行臣謹奏是同日又奏為續報𠞰撫生苖并收繳軍器事竊照古州之滚踪寨頑苖恃險負固抗招經臣委令署古州鎮董芳遣撥黔粵副將趙文英潘紹周帶領辨兵進𠞰并歸誠苖衆繳械納糧各情形業經繕摺奏明在案復查新疆地界寬濶二千里逺僻生苖未經招撫者尚多即已受招撫之苖為生苖牽制猶懷疑二者亦仍有數寨若不徹底清理稍有將就終恐無以善後隨又切諭鎮將勒兵巡遊相機𠞰撫去後續據禀報自滚踪徹師後凡從前觀望及歸向未堅之寨各皆呈繳器械願納條糧誓為良民竝無異念惟有已有厄有路石格四寨尚未出投更有邱車一寨恃强阻抗若不示懲無以服衆業於四月初二日復委副將趙文英潘紹周參將施善元等領兵前往料理據沿途經過歸順各寨皆踴躍殷勤效力恐後因各加奬慰以堅其志初六日兵抵髙舊寨當據有巳有厄有路三寨各苖凂求鄰寨苖頭帶領來求收撫時並未准撫初七日進至邱車附近劄營而邱車寨苖已擂鼓舞刀準備拒敵該將等於初八日五鼓分兵三路進𠞰苖衆亦分路拒敵官兵併力奮攻連破關隘數道自辰至未苖衆大敗隨直搗巢穴踞地駐兵初九十等日復行搜捕十一日夜該寨餘孽於對山喊呌饒命徹夜不止十三十四等日有苖人阿羊赴營禀訴山苖原不知王法從前聼了苖頭阿桶的話勾結各寨不許繳械上糧原是實事今官兵殺進來衆苖都知怕懼只求寬限願盡數繳出刀鎗做好百姓等語復三次帶領男婦老幼到營哀懇又據有已有厄有路石格四寨苖人各負軍器投繳訴稱被脅附和實由阿桶指使衆口同聲當著將阿桶捆獻詢供不諱即經梟首示衆尚不肯收撫仍議痛懲直至二十一日衆寨羣苖哀求情迫邱車軍器亦已繳齊始令合款諄詳開諭各皆傾心受撫誓作良民續又據附近已撫之鄙倍平宇歹擺等寨苖人背負刀鎗到營禀稱各家留得一兩件器械原為防備山苖今邱車寨既已𠞰除都做好百姓還要這器械何用所以盡數繳來等語隨各加奬賞一併收存計此次所收合赴鎮所繳鳥鎗苖刀弩弓標子桿子皮盔甲等項共二千一百零二件從此遠僻山苖始知懷畏矣又據都勻協副將卜萬年等禀報革招來牛等寨自經遵諭搜𠞰後俱求安插矢願歸誠該將等暫准羈縻仍暗地訪察欲分别誠僞再定𠞰撫而諸苖歸寨後各皆安心樂業所繳鎗刀標弩共計六千五百六十九件其感恩悔罪之誠即於此可信似無庸再𠞰者臣查邱車一寨强大頗類滚踪有已諸苖反覆未如定旦示𠞰示撫宜别寬嚴若使滚踪不滅邱車必不服有已等寨亦不順猶之定旦不懲革招來牛等共一百三十餘寨亦仍有觀望必不肯投從前張廣泗委辦古州因惟示恩惠未加兵威而副將趙文英又極言恭順深信不疑臣故預料該寨之必將蠢動而速調粵兵及粵兵甫來而形跡已露一經嚴𠞰始復帖然此相因之勢亦反還之機少有粉飾必至貽誤前車之鑒固不敢仍蹈覆轍也今兩處續收鎗械又共八千六百七十一件凶器既繳凶心自熄而楚粵河道現已通行各處城垣現已完備論目前大局粗可稱就緒惟通粵江路尚有滚塘一處當水陸要區雖不頑抗亦不投撫若不制伏終有阻礙臣已密囑董芳令廣西參將施善元於撤兵回營之便乘機辦理務期了當竝札致撫臣張廣泗仍將舊撫新撫逺近各寨詳細查勘再商同鎮將等將一切善後事宜妥議定擬容臣斟酌覆核㑹疏具題請㫖遵行外所有續報𠞰撫生苖并收繳軍器緣由合再奏聞伏乞聖主睿鑒臣謹奏覽奏知道了善後事宜卿自然料理妥協也同日又奏為奏聞事竊照南掌國夷目叭猛花等進貢回滇臣委員照看起程並差目兵二名暨土把總召猛比伴送回國嗣據普洱總兵官邱名揚知府佟世廕等禀報該差等伴送夷目於八年十一月二十四日至該國界內之戈奈地方有猛灑叭先率領數百人於五十里外跪道迎接將敕書安設龍亭供奉緬寺叭先復率領大小頭目人等行三跪九叩頭禮敬謹護衛叭猛花隨寫緬文差先目二人馳報該國王於十二月二十三日差回猛灑恭請敕書御賜由猛喇上船沿途地方該國王皆差頭目敬謹迎接至雍正九年正月十五日抵埧烏離南掌百餘里該國王島孫先遣大叭目四員帶領二千餘人備金銀綵花龍船四十餘號設龍亭香案親出五十里外跪迎至新造公館內供奉敕書御賜畢島孫行三跪九叩頭禮復齊戒三日始恭迎進署行禮如初然後叭猛花敬捧敕書跪授島孫島孫跪接開讀畢又捧御賜一一傳觀點交明白該國君民歡聲雷動舉手加額齊稱自有南掌以來從未有此榮寵䝉天朝聖主恩賜惟有世代頂戴其感激實出至誠留該差等住二十日極其敬重於二月初六日該國王遣目先教先喇二員並後生十一人齎捧謝恩蒲葉泥金緬字表文一道隨經譯出情辭諄懇等語禀報到後該目等抵省臣傳見面加勞慰據來目禀稱國主感戴天恩無可以報惟有一心歸誠世世子孫不敢忘天朝大恩再銅䥈一對物雖不堪係祖代相傳之物國主請獻皇帝以表小臣誠心五年再貢時差目人等見此銅䥈即如在本國一般外象牙雀尾藤席樹頭酒四種係國主呈送總督以見感念求收留等語臣查所稱銅䥈即係大銅鑼外夷草野意雖誠而物甚微恐違體制既未便入本若令其帶回又非逺人之表文并譯出漢字副本另疏代題外存貯銅䥈緣由合併聲明再莽國請貢一件臣前奏摺內荷䝉硃批極好之事此皆卿代朕宣猷之所致但總宜聼其自然不必有意設法誘致蓋此等事乃國家榮幸之實跡惟靜待天恩非人力之所能者欽此臣查莽國土名阿瓦即緬國西南之夷無有大於緬者因有外域整邁即八百媳婦國衆亦至十萬舊隸緬屬後互相仇隙厯年爭執整邁曾於七年冬差目納款情願歸誠據普洱文武公禀欲求允許臣經嚴批不准以十可疑駁去嗣後鎮府等密差查採始知整邁前曾誑緬國以為我國已投天朝欲借聲威以示恐嚇故前此莽子未敢加兵因於去歲十月先差大頭目莽古叮叭喇等赴車里一以賀刀紹文承襲宣慰并以探聼整邁歸附虛實適南掌夷使叭猛花等回國相遇於九龍江而守備燕鳴春送夷使過江亦與莽古叮等相㑹問答款洽之際復備悉整邁投順臣不允許緣由其慶幸傾服愈出意外是以諄切懇囑至再至三若惟恐弗准者此實出於自然臣初無招致之意續於五月初十日據總兵邱名揚探報莽國發兵二萬令國王之子同莽古叮統領問罪整邁現在相持其所屬小國亦聽調幫兵等情臣隨密諭鎮將但於內界巡防勿許過江驚擾勝負聼之仍行探報覆奏伏乞聖主睿鑒臣謹奏總聽上天慈佑雍正九年八月初一日雲貴廣西總督臣鄂爾泰謹奏為欽承恩諭再攄愚忱事竊臣欽遵請㫖一摺於七月二十日接奉硃批卿來京見朕不過暢我君臣一時之情耳而三省苖疆甫定尚須鎮靜彈壓善後事宜更資料理況朕萬壽廷臣亦皆不令行禮卿萬里往來匆忙一見更覺難以為情朕當再加詳酌降㫖至總督印務或令髙其倬前來署理或令三撫分任處臨期亦有㫖朕意於今冬或明春著令卿來今朝中尚少一贊襄機務之人朕正在籌畫大概并諭卿知可靜候朕㫖而行八月之期不必也欽此臣跪誦之下如親覲天顔如親聆天語激切瞻依莫可言喻而尋繹萬里往來匆忙一見更覺難以為情句熱血奔心復不禁淚下盈襟矣伏念三省苖疆廣狹不一臣數年以來凛遵聖訓已料理一十六處雖𠞰撫異施遲速各别然大率多一番懲創斯增一分寧帖今大局甫定諸務須籌安輯調停更非易事若不用猛力斷難圖成若不具恆心終難善後此中緩急細體方知以臣薄劣固猶期之數年後也况一切民事多未就緒如疏濬江河挑築溝壩墾闢荒蕪焚烈山澤皆地方之逺計尤邊省所急先臣雖竭蹶料理亦略有規模獨因廢弛日久一時難以俱興猶未敢題報凡此兵民要務皆臣所有志而未逮欲懇請陛見既少慰私衷並敬領訓示再馳回滇任盡心調劑以二三年為期然後入侍左右少效奔走此臣之至願亦臣之厚幸也兹䝉恩諭再加詳酌或今冬明春著臣來京並委署分任之處一併降㫖臣當欽遵靜候安心辦事斷不敢少有延挨亦不敢少有將就也為此繕摺覆奏伏乞聖主睿鑒臣謹奏覽巳命髙其倬來滇矣到時卿自悉知其餘事件總俟卿來京面諭路上量力行走不可勉强奔馳過於勞碌必遵㫖行同日又奏為皇威巳靖苖氛天象特昭瑞靄事竊據廣西布政使元展成等詳稱雍正九年五月二十九日卯時旭日初升祥雲捧護日旁有宛然山字結成不散綵色繽紛似芝似蓋山形靉靆為阜為陵儼舞鳳於丹山煙霞縹眇拱赤烏於碧落瑞靄絪緼歷卯辰已三時之久遍府州縣四屬之區文武兵民咸稱為南寧未聞之上瑞鄉村城市共慶為西粵未睹之奇祥等情又據左江鎮總兵官蔡成貴呈稱自剪滅鄧橫賊寨奉檄撤兵於本年五月二十二日抵署即於二十九日特見異瑞等情各到臣臣查粵西為猺獞狑狼之雜處惟多瘴雨蠻煙鄧橫為凶惡獷悍之渠魁久肆苖氛惡焰一朝屠滅頓開化日光天合省震驚悉畏雷霆烽火下民之怨氣盡散撥霧披雲上蒼之和氣旋施回春煥采故於戢弓櫜矢之際特呈金柯玉葉之奇童叟呼嵩歷三時而結字臣民額手遍四屬而同觀感北闕之動天咸賴一人有慶頌南山之成象羣祝萬壽無疆除經撫臣具疏題報外謹繕摺奏聞伏乞聖主睿鑒臣謹奏業已題到矣同日又奏為覆奏事雍正九年六月初十日大學士公馬爾賽大學士張廷玉寄信內開雍正九年五月十五日奉上諭聞廣西鄧橫苖寨憑仗險阻屢攻不克因思京師冲天炮一種若用以攻擊苖寨似操必勝之技查冲天炮大者重七八百斤小者重三百八十斤逺道運送以小者為便爾等可寄信詢問總督鄂爾泰若攻取苖蠻地方須用此炮即具奏前來朕發炮二位並選精熟炮手二人一同前往至於應送何省何處亦令鄂爾泰酌量定奪倘攻取苖寨不必用此或此信到日苖疆軍務已竣亦即據實奏聞欽此遵㫖寄信前來等因到臣臣捧讀之下感奮惶悚一時交集敬念我皇上萬幾宵旰無慮不周以鄧橫一賊寨而屢攻不克猶致上厪聖懷此天下兆姓之福亦臣等大吏之罪也因欽奉上諭之前鄧橫已報捷音暫不須用故未奏請查冲天大炮實攻擊之竒器果能熟悉炮規逺近髙下不差尺度則無堅不破亦何險可憑惟是此種炮位俟未便留置外省且蠢爾苖蠻原無大伎倆但將領少具勇謀鎗炮即可操必勝臣於各苖蠻之役又製有西瓜炸炮火毒羣蜂炮並火箭火磚等件用以攻寨亦頗便利前於烏䝉攻破涼山木城近於鄧橫攻破四六九甲俱甚得其力三百八十斤重冲天炮二位俟或有須用之處臣再當請㫖頒發然仰賴天威百蠻震疊惟願永逺更不須用此炮則邊疆幸甚臣愚幸甚謹據實覆奏伏乞聖主睿鑒臣謹奏甚是同日又奏為覆奏事竊臣恭報鄧橫已靖情形一摺荷䝉硃批題到有㫖卿前奏云楊天縱乞休尚未見奏到朕意欲將哈元生調黔用蔡成貴為滇省提督卿以為何如若與朕意相同其右江鎮員缺孰可勝任可奏來一併發㫖欽此查楊天縱原係能事提督獨以年近八十兩耳重聼考驗稽查恐不無錯漏是以臣前經奏聞擬令乞休續因軍務未竣須人料理故不得不暫緩今已密札囑伊具本矣黔省苖疆關係緊要且楚粵邊界尚有應辦事如䝉聖恩將哈元生調黔實可以有濟雲南提督員缺統轄九鎮方隅遼濶雖苖猓雜錯接壤外夷然地方寧靜營伍充實但得操守端謹可以服人訓練嚴勤可以馭衆之提臣即可以收實效而勿隳前功左江鎮總兵官蔡成貴耿介自持從無茍得操練約束不避嫌怨若補滇省提督亦可以勝任雖伊賦性孤直多與人不和然臣能相規伊亦相信同省共事自可以相與有成也至左江鎮員缺當水陸要衝汛連交址營接廣東雖鄧橫已除諸務猶須整頓現在三省副將內無可勝此任者查雲南永順鎮總兵官霍升雖器局微小似非大材然操守謹飭不減蔡成貴練兵有法不讓哈元生且諸事留心俱可條理移調左江殊可以資彈壓其永順鎮遺缺查臣所屬副將內將來可用總兵者僅三四人或尚須造就或尚少功勤或要地未可擅離或擬留用要地現在俱未便升補懇請特簡補授或將山永協副將冶大雄補授庶邊防各有能員臣亦得資指臂之用矣謹繕摺覆奏伏乞聖主睿鑒採擇施行臣謹奏覽冶大雄已有㫖著署彞陵總兵矣軍前需用人員甚多各省要鎮多將就委用一時不得其人三省員缺卿只可酌量補調越銜不合例不必論也霍升之缺可遞行擬員言之髙其倬具奏請㫖同日又奏為蕎自天生蟲為鳥食天庥滋至聖德靡涯事竊惟兵燹之後難冀豐盈螟螣為災何能驅捕雖曰種由誕降未聞新條發自陳根即謂蝗不成殃未聞禽鳥能為掃蕩查得烏䝉新改之昭通府自從大兵進𠞰屠滅逆猓之後人煙稀少田野荒蕪商賈不來米糧甚貴臣念地方新定一切布置皆以食為先憂心如焚恐難接濟計檄飭該鎮府各員所安插土著之殘黎招徠逺方之農賈凡歸業逺來者巳不下數萬人雖令分寨給田各與資糧牛種督率耕種又檄發别郡之米减價平糶更委專員買蕎種數百石於大關壩等處凡屬隙地皆令犁種以資秋冬民食然私心熟慮亦止期可免匱乏並不敢過望饒餘隨於六月初間再委糧儲道黃士傑親赴昭通并歷東川令遍行查勘督催料理續於七月初十後屢據各員禀稱昭通府之稻田壩八仙海等處及魯甸各寨禾苖俱極茂盛再各處蕎苖碩大異常早者七月盡即可收割更可異者去年夷人種過蕎地本年並未犁燒今悉從舊根長出新蕎花實繁茂與本年新種者無二東川府巧家等處亦然官辨漢夷歡呼慶幸謂從來所未見亦所未聞因名曰天生蕎又六月二十八日八仙海稻田壩等處禾苖忽生赤蟲長寸許無毛蠶食稻葉該鎮府等情急無措呼臣名䖍禱詞語甚厲忽有烏鴉數千飛鳴捕啄一二日間噉食罄盡而鴉亦不見稻苖並無傷損轉益茂盛誠屬竒事定獲豐年等語臣接閲各禀初不敢以為信及密加查訪道路兵民皆互相傳說而前所委員並糧儲道黃士傑亦適回省復經細問所道更詳並稱睹此竒異商民踴躍米價巳大減且遍觀城郭鄉村不獨酒米鹽布上市充裕而一切蔬菜俱全較從前尤勝其東川城工該府全用石砌現有規模昭通城腳需用五面石巳打就一千五百餘丈現在催趲燒磚不日興工衙署營房已蓋造及半俱無遲誤等情臣查昭通地土素稱肥沃近省各府實皆有不如因向為凶猓所據故人視為畏途今既洗除惡類將實以良民則但能悉心調劑毋躁毋忽不三五年實可謀富庶况蕎自天生誰來下種蟲為鳥食不期其然粒我蒸民益信帝德之無逺弗届殲兹蟊賊羣識聖心之無物不孚雖上天之仁愛憫此邊隅實一人之精誠積於宵旰臣親逢嘉瑞睹兆姓而歡欣伏念因施捫寸衷而凛栗除將一切事宜敬謹料理陸續題奏外所有據報覆查兩郡稻蕎緣由理合繕摺奏聞伏乞聖主睿鑒臣謹奏以手加額覽焉雍正九年九月初二日雲貴廣西總督臣鄂爾泰謹奏為滚塘𠞰撫已竣古州大局全定事竊照黔屬古州地方道里遼逺山川險深村寨稠繁人丁頑悍自歷經𠞰撫已八九就緒獨有下江滚塘等數寨居黔粵水陸接壤之咽喉雖不敢逞凶亦不甘投順恐將來把持道路阻截兵民出沒於新定之區終無以善後是以復令鎮將等官假撤回粵兵路過該地乘機料理臣已附摺奏明在案陸續接據署古州總兵官董芳等禀報滚塘有內外二處在內者已願歸誠在外者亦有數寨求撫惟才瓦擺雪加的等寨約千餘戶因後路通連老荒山綿亘四十餘里與粵西思恩羅城兩縣地方接壤崇山深箐人跡罕至恃有退藏之地逞其頑抗之習若議懲創必先把截後路奪踞髙岡方可進取但下江一帶從未加兵此舉實關係各寨之觀望不得不愼重圖維該署鎮擬親統官兵仍派副將趙文英潘紹周施善元分領合攻布置已定於六月二十一日五鼓自諸葛營起程由水路前進順流迅速午刻即抵蘇洞江登岸鎮將等各選帶精兵盤坡越澗而進先見凶苖百餘人各執器械於嶺上排立呐喊官兵直上甫至半山隨有伏草凶苖突出拒敵官兵奮勇𠞰殺趁勢搶登山頂各苖勢不能敵即棄械潰逃時因日暮未便窮追即就山梁劄營二十二三等日先分兵截住苖寨後路即進攻才瓦加的兩寨苖衆帶傷奔逃隨將該寨燒燬分頭追捕二十七日有蘇洞勒龍二寨苖頭帶領塘根等十寨苖人赴營繳械查此係未曾拒敵寨分當即收械准撫後才瓦加的等寨苖衆亦央鄰寨頭人求撫因其先既抗頑繼復狂逞寨雖焚搗苖未剪除無以示警戒遂逐出不准復督兵搜擒遍歷山箐各有斬獲且得鎗械甚多後將諸凶苖首級懸示各寨羣苖莫不戰栗而才瓦等寨餘孽尤魂驚膽落復將所有藏匿之軍器凂求勒龍寨頭人一併負赴營盤哀求饒命並願納糧當差察其情狀甚屬誠切當將諸苖羈留傳集內外滾塘苖衆訂期款諭時附近各寨及散處下江一帶百里內外寨分並住居深僻從前招撫未盡之苖未奉傳喚亦各背負鎗刀絡繹而至皆聚集營門輸誠請撫該鎮將等提出才瓦諸苖嚴加斥責剴切宣諭該苖等感泣服罪誓願歸誠而各寨苖衆皆合口同聲願永為良民誓無反覆隨經合款刴諭令各回安業料理事竣撤兵回營現在上下兩江逺近各處苖寨均已𠞰撫平定地方又約千里可圖乂安等情臣查苖蠻之畏威每甚於感恩若威無可畏亦恩不知感故必先創懲而後收服庶足以懾其膽而堅其心此從來料理苗疆之大較也古州地廣苗多勢險習悍鎗炮鋭利不减於官兵故𠞰撫之役視各處為倍難幸次第緩圖均有頭緒惟此滚塘等寨猶敢自居化外既當水陸之衝途復介黔粵之要害倘因事已垂成少有將就將來必生事端又滋搖惑是以臣故示嚴急俾知不了不休每痛責文武實亦不得已之施為今董芳趙文英等毫無旁顧一照臣所指實力妥辦既無容縱亦不牽連逺近苖衆皆知畏知感而逺僻畸零之寨並不招自至繳械輸誠楚粵江路通行現在商船皆直抵鎮協新城下目下古州大局始可謂全定但得任黔文武各攄忠誠加意撫馭絶漢奸之往來嚴兵役之騷擾勿有事而隱諱致小成大勿無事而鋪張計賞希功則數年以後將為富庶之鄉即黔屬內地皆有所不如臣亦與榮光而志願遂矣除將自七年冬以後料理𠞰撫情形容敘疏恭報并續開新疆應添兵設營酌調將偹及一切善後調劑事宜另疏請㫖遵行外所有古州大局全定緣由合再奏聞伏乞聖主睿鑒臣謹奏覽奏知道了新疆添兵設營總不可惜目前之小費而貽將來之大患詳愼為之硃批諭㫖卷一百二十五之十七
