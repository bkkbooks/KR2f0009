body:
  text: 欽定四庫全書硃批諭旨卷一百四十六硃批繆沅奏摺內閣學士臣繆沅謹奏臣於雍正六年四月二十日奉旨差審參革原任蒲臺縣知縣朱成元家人張士榮叩閽控告告休蒲臺縣知縣王僧慧一案臣於五月初二日至濟南本日行文巡撫咨提原狀內官犯人等並提原卷十五日準巡撫將人犯文卷解到臣即隔别研訊據成元供稱原有那移銀六千餘兩尚有民欠七千兩可抵王僧慧已據實詳明布政司批允臣查布政司詳文止有批查字樣而成元揑稱已經批允所控已誣成元又供稱僧慧違例預徴新泰縣六十六十一兩年帶徴錢糧全完將銀一千四百餘兩婉求成元收受成元隨後又退還僧慧取有僧慧蒲臺縣印收為據查印收係硃上蓋墨明係成元在蒲臺任內私留空白印紙後填假收朱成元所供預徴全完又誣又供稱僧慧威令經承李天錫等囑令里長李道恆等將民欠揑報虧空出首圗賴銀兩等語均應刑訊因王僧慧年老病篤不能受刑將僧慧管宅門家人孫榮同經承李天錫等十餘人各加刑訊俱堅供係各役情急出首並無威令囑令等情又據經承李天錫等供成元在蒲臺任內徴收錢糧令家人張成桂在宅門經收糧戶錢糧哄騙鄉愚止給串票不登流水簿又著里長李道恆等預繳錢糧五六十兩不等交管門人張成桂收入只給總票許其存算各花戶錢糧等語臣查朱成元在任年久地方熟悉既侵用倉庫而又陷害衆民巧於彌補移新蓋舊現在虧空共銀二萬六千餘兩朱成元自聞調任新泰之信明知虧空甚多萬難交代遂與收役張仲蘭等商議將成元項下侵蝕銀兩揑作民欠暫掩交代俟到新泰設法抵項詎意到任甫及三月新泰又參虧空張仲蘭等恐禍及已隨將揑造册籍情由出首僧慧因有續揭三揭成元讐恨令家人張士榮叩閽希圗將虧空錢糧推卸與收書里民及接任之員而册籍有憑活口現在一堂之上吏書里民衆口齊證隨將張成桂刑訊各欵直認不諱其成元在任將正項錢糧官侵吏蝕視庫項如已物現今刑訊張𢎞圗王存義等十一人各名下共計侵蝕銀二千六百餘兩其餘實係朱成元侵蝕供明在案臣奉旨速行前往詳審具奏不敢稽遲先將審過緣由繕摺具奏其虧空一案册籍繁多現在行查謹奏明恭候諭旨臣臨奏不勝悚惕待命之至謹奏朕總欲凡事得其實情將册籍查明後具疏親帶來京進奏可也據奏朱成元誣控顯然如此則可惡極矣亟當從重定擬將伊任所資産行令地方官詳查毋令隱匿並將其緊要用人嚴行看守防有兔脫特諭內閣學士臣繆沅謹奏臣於七月初七日接戶部知會奉旨命臣同鹽臣鄭禪寶會查東省鹽政積弊臣遵旨詳審朱成元案件不得親齎來京謹繕疏具題恭請聖旨其家産人口臣委員協同地方官詳查嗣據各州縣造册申送共估時值價銀二千八百餘兩其緊要用人張成桂等現在收禁男婦八十六口分别看守隨將各册籍移交署撫臣嶽濬收貯其歷城縣申送查出朱成元任內送銀禮簿有字帳三十本無字帳一本散帳二十八頁通計送銀禮帳二百七十三頁臣另繕疏具題誠恐冒昧理合奏明謹奏審理朱成元一案公明詳細殊屬妥協之至甚為可嘉今清查鹽弊一事尤為緊要亦應如是秉公破面辦理勉為之內閣學士臣繆沅御史臣鄭禪寶謹奏臣等欽奉諭旨清查山東鹽弊其重復影射阿城改包種種弊端併積年侵蝕正課數目臣等查出業於八月內具奏在案其引張短少之處訊據本商劉衮劉養才連名公具保結內稱如有隱匿積引日後或被查出或經首告商人等情甘重罪等語臣等不敢因有衆商甘結不復察訪隨又細加密訪今訪得運司殘引房書辦康福盛等向有偷匿殘引情弊現今寄頓戶總科堂號房內臣等同運使梅廷對親往搜查果於堂西號房內搜出雍正五年殘引一箱隨將康福盛等鎖拏收禁又至康福盛等家內搜出康熙七年至六十一年雍正元二三四等年共殘引四萬四千五百五十七道又運使梅廷對在書辦盧鼎爵家碾盤下搜出歷年殘引一萬五千一百六十道呈送前來其引目細數另繕清摺恭呈御覽臣等逐加嚴訊康福盛等僉供歷年姦商書吏通同藏匿殘引營私作弊是實臣等誠恐尚有搜查未盡隨經出示曉諭諸商及書吏人等令其自行出首臣等現今搜出殘引之內除雍正五年殘引一萬七千五百六十九引交明鹽運使貯庫入五年奏銷册籍外其雍正四年以前殘引容臣等細加研訊取具確供按律定擬仰副皇上肅清鹽政至意伏乞聖鑒謹奏覽如此搜查嚴急此外再有藏匿者必至於燒毁滅迹然亦不得不如此也內閣學士臣繆沅御史臣鄭禪寶謹奏為奏明事竊查馬禮善案內以財行求之顧九臯金恆基李生馥三人原擬杖徒今訪得並非正身乃係辦商錢連城范録陸維宸冒名充徒前經臣鄭禪寶具摺奏明奉硃批諭旨可惡之極萬不可令兔脫嚴審定擬具奏欽此欽遵隨經刑訊錢連城等據供小的們是商人顧九臯等夥計本商向來不在山東俱係夥計們頂名行鹽辦課去年以財行求原是小的們做的事後來塞巡撫批發張布政司楊按察司梅運司會審時小的們曽供稱過本名顧九臯的夥計錢連城金恆基的夥計范録李生馥的夥計陳瑗承審官員亦不曽究問等語訊據合綱商人等同供行鹽引名顧九臯本商顧憲臣引名金恆基本商劉衮引名李生馥本商李芳州各商本身俱在原籍去年頂替充徒原是錢連城范録陳瑗冒名去的因陸惟宸陳瑗俱是李生馥的夥計以財行求是陳瑗值月做的事不是陸惟宸做的及至充徒亦係陳瑗冒名頂替是實審據顧憲臣劉衮李芳州同供錢連城等以財行求冒名充徒之處商人逺在各省居住實係不知辦課夥計有干法紀商人等情甘同罪有何辨處等語取供在案臣等現將錢連城等交歷城縣收禁外容臣等按律從重定擬繕疏具題其承審失察各官塞楞額等一并奏明聽候部議伏乞皇上睿鑒施行謹奏具題到日有旨再所奏清查追補一摺已交部議矣侍郎臣繆沅御史臣鄭禪寶謹奏為奏明事竊據解任運使梅廷對詳稱自雍正元年裁減鹽規後尚有耗羡銀二萬七千兩此內除應解河工銅斤并運司養亷等項銀兩外尚餘銀四千兩查山東各道員養亷俱止六千兩惟運司養亷一萬兩似屬浮多應裁減銀四千兩每年應節省銀八千兩自雍正五年三月􅊩任及今年半共節省銀一萬二千兩自應歸入公帑現將此銀封貯道庫聽候解交等語又據山東鹽運分司宋懷金詳稱雍正元年一切陋規盡行裁革應解銅斤銀兩及卑職養亷每年議留銀九千六百五十兩除公私費用外自雍正二年二月到任及今共餘銀一千九百七十一兩情願歸公等語據此臣等查運使梅廷對贓迹纍纍未便因其一詳遂寬其咎現在繕疏題參再查分司宋懷金除引商應交養亷外又多收票商銀兩容臣等查明繕疏彚題外所有梅廷對宋懷金舉首出羡餘銀共一萬三千九百七十一兩理合奏明解赴內務府廣儲司交納伏乞聖鑒施行謹奏此項銀兩不必解內務府仍應咨請部示遵行侍郎臣繆沅御史臣鄭禪寶謹奏為請旨事竊新任運使唐綏祖已於九月二十日到任凡鹽務一􅋀積弊正需清理目今私販漸少額引不敷自應增引增票現在檄行唐綏祖傳集引票衆商公同妥議事關全省鹽政頭緒繁多必得運司専心辦理庶為妥協唐綏祖現署山東按察司印務關係通省刑名事務殷繁勢難兼顧理合據實上奏伏乞皇上敕下督撫臣將按察司印務另委賢員署理則鹽務刑名均有裨益抑臣更有請者山東鹽務自奉旨清查之後私鹽斂迹官鹽不足民食臣等現在斟酌增引增票因事關通省州縣不敢草率遽定誠恐民虞淡食仰祈皇上天恩敕部將東省雍正七年額引預發十萬道來東令運司速催各商及時告運接濟民食俟臣等議定酌增引票數目鹽臣按依年分赴部請領引票時除去現在預給數目一轉移間商民均沾皇恩於無既矣理合繕摺請旨謹奏所奏是已諭部議行矣硃批諭旨卷一百四十六
