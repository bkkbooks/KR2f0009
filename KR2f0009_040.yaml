body:
  text: 欽定四庫全書硃批諭旨卷四十硃批常賚奏摺雍正四年四月初二日廣東布政使臣常賚謹奏為奏聞事竊臣於雍正四年正月十九日到任詳請巡撫臣楊文乾代題恭謝天恩外即將欽奉諭旨向總督臣孔育珣巡撫臣楊文乾面傳孔育珣楊文乾俱跪領謝錢糧數目於三月十一日將清冊申詳巡撫俟巡撫盤查訖即出結具題再查通省有必需之公項每年約計四萬餘兩皆於各屬火耗內每兩提解四分以充公用今巡撫與臣籌畫恐屬員或有借此纍民之處是以㑹同司道府州縣另行設法務期上不動移正項下不聖訓時蒙諭旨爾到廣東總督巡撫待爾何如繕摺奏聞欽此臣今到任兩月有餘看得總督巡撫居官辦事誠如獲到官從不肯招出同夥與窩家往往陷害仇人誣扳富户每見巡撫審訊盜案甚覺詳細愼重而臣亦必細細與巡撫籌畫弭盜安民之䇿以仰副居多若夫才守兼優者臣履任未幾不敢輕舉容留心察訪另行摺是奏自今以後凡有關乎國計民生興利除弊事宜臣務斟酌確實詳明督撫皇上畀以重任雖捐糜頂踵何能報稱於萬一惟有勤愼辦事節儉持身以盡犬馬之力雖逺在粵東奏覽雍正四年十月二十六日廣東布政使臣常賚謹奏為恭謝天恩事竊臣䝉皇上御賜紫金錠鹽水錠諸珍藥隨恭設香案望闕叩頭謝恩訖伏念臣至微至賤仰邀任使巳深逾分之慚復荷恩頒更切生成之戴惟當益竭愚忱上報高厚於萬一理合繕摺奏謝謹奏知道了𫝊鼐博爾多巳將朕用人於藩邸之顔面掃盡矣汝當奮勇自勵今日以前聞汝頗好但不知向後何如耳勉之同日又奏為奏聞事竊臣到任將及一年就地方中應奏之事二件另摺敬陳外臣謹看得總督孔育珣歷練老成處事得宜所屬軍民無不愛戴聞從前操守尚覺平常近來則分文不取巡撫楊文乾實心辦事勇於有為於地方利弊無不急欲興除但每多任性遇事過激署按察使殷邦翰辦事有才但為人多詐居心難信惠潮道方願瑛辦事勤敏操守亦好廣州府知府樓儼專事趨蹌不勤政事通郡人民嗟怨此外官員循分供職者居多其在任未久者優劣尚未周知容再為訪察據實奏聞至臣受恩深重時刻銘心是以惟知有皇上不知有他人惟知有報恩不知有招怨據所見所聞直陳無隱斷不敢一字涉虛有負天高地厚之深恩也謹奏好凡有所見所聞應如是直陳毋畏毋隱方是朕用人如爾若不得聞聽的確則耳目更無可寄矣諸事秉公持正據實敷奏勉為之雍正五年二月初一日廣東布政使臣常賚謹奏為恭繳硃批瀝陳微忱仰祈睿鑒事竊臣齎摺家人回粵奉到硃批諭旨臣捧讀之下淚如泉湧手足無措伏思傅鼐博爾多自幼跟隨皇上受三十年教養之恩復蒙不次超擢俱膺重任雖捐糜頂踵猶不能仰報於萬一乃一旦頓滅天良上負君恩此誠天地之所不容鬼神之所不宥者也臣前閲之才而忠君報主之忱存諸夙昔鑒此二人愈加勉勵惟永矢此心竭圖報效雖逺居萬里之外常如在力以上報主恩臣斷不肯似此二人頓滅天良喪心病狂有負委用之天恩作千古無恥之罪人也此臣微忱出於至情激切奏陳不勝惶恐之至謹奏朕嘉悅覽之但日久不忘此摺所奏之言庶不有負朕之期望同日又奏為奏聞事竊臣屢沐天恩得膺重任雖冰蘗自矢未足報稱何敢以纖毫肥巳之私自貽罪戾謹將去歲一年所得之養廉與各項費用之處敬摺奏聞查廣東布政司衙門向來每年所得規禮平餘銀約有三萬餘兩臣到任後隨將一切陋規悉行禁革惟有州縣所解錢糧每兩有平餘銀三分向係督撫藩司分作養廉之費查廣東通省除州縣存留備支外每年額解錢糧八十五萬兩零以每兩三分共計銀二萬五千餘兩督撫藩司每股照分銀八千三百餘兩又投充吏役給發執照向有督撫藩司紙劄之費今亦照股分銀二千八百餘兩通年核算共得銀一萬一千餘兩此外並不敢有絲毫欺隱除臣家口衣食用度幕賓束修併修理衙署庫藏等項共用去銀八千八百餘兩尚存銀二千二百餘兩此項餘銀倘值青黃不接之時小民艱於日食擬買米設厰煮賑以廣皇仁竊臣素居貧賤今得足食足衣巳是邀恩無極惟竭盡犬馬之力上報委用之恩何敢稍有私心自蹈欺誑之咎也謹奏好朕今用爾為巡撫矣爾試想常賚今日做巡撫常將此五字提撕尚忍得行一件欺君誤國之事以負朕乎當勉力成全朕用人顔面與舊日濳邸諸人增色不然則為天下後世之大笑柄矣大約貪酷不法之事爾自不為第恐趨於柔懦沽名一邊被人欺誘或入屬員之牢籠受科甲之夤緣請託而不能秉公察吏則為負朕也切宜勉之愼之欲免此咎亦惟有祇知君父為重凡百毫不瞻顧一切據實無隱如斯而巳若為虛譽小利懷私自便恐難逃朕之鑒察也雍正五年二月初十日廣東布政使臣常賚謹奏為恭謝天恩仰祈聖鑒事竊臣於雍正五年二月初九日接准部文內稱雍正四年十二月二十五日內閣九卿等奉上諭福建巡撫員缺著廣東布政使常賚補授欽此臣聞命自天感激無地隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚至微極陋荷䝉皇上天恩不次擢用兹復恭承寵命畀以閩海封疆重任臣受恩愈重圖報愈難感戴微誠與恐惶交并惟當實心任職實力辦事務期殫竭駑駘盡瀝肝膈以伸報效微忱耳更有請者臣自幼侍從日覲天顔不違咫尺自擢任粵藩跪聆聖訓以來未獲瞻仰闕廷巳逾一載有餘戀主蟻忱與日俱永况閩省為沿海要地臣才識短淺於地方情形一切未諳伏乞皇上俯允臣赴京陛見得覲天顔面聆聖訓俾得竭蹶辦公不致舛錯庶海疆大有裨益而犬馬依戀之私亦得稍遂矣所有感激微忱合行繕摺奏謝謹奏督臣髙其倬前任雲貴時偏於柔善姑息自李衛到滇傳旨後始知朕意所向較前巳好及至來京陛見經朕訓誨今任閩浙全是矣爾抵任後自必相合諸事當與和衷辦理兹爾撫閩立心行政爾係朕深知者亦無可教導至於地方事宜摺奏可以訓諭若肯向上不負朕恩來京陛見亦不過如此若立志不堅便一年一次陛見徒勞往返與事何益若言戀慕君臣果能一德萬里同心况朕與爾年俱未衰何必作兒女之態受事後加意懋勉治理數年然後來京未為晚也目下不必但以孤忠自效為本一切不稍瞻顧欺隱何事不可以辦集耶勉之勉之同日又奏為奏聞事竊臣䝉皇上天恩特授福建巡撫伏念廣東福建同是皇上封疆豈可以甫經升遷遂將廣東緊要事件視同膜外不行奏聞今就臣所親得之見聞於粵省民生地方實有關係者條具於後以備聖主採擇一碣石左翼二鎮宜愼簡幹臣也查粵省沿海地方惟廣惠潮三府乃洋盜出沒之地全賴賢能清廉之總兵官實力防範不稍懈縱偷安需索滋擾則所部自然凛凛奉法庶使姦宄潛跡可弭賊盜肆劫之患今查得碣石鎮總兵陳良弼左翼總兵藍鳳不但廢弛營務不能董率將辨且縱兵擾民漫無約束又操守不堪惟圖需索陋規况年巳七一新奉撥運倉穀宜盡行發糶也查粵東昨年晚禾歉收米價頓昻荷䝉我皇上軫念民艱特敕部議將廣西積穀三十萬石撥運來東添備倉儲仰見聖慮周詳籌畫盡善惟是秋成之後例應買補查得粵省連年歉收若將糶出價銀責令尅期買補勢必至於市價騰湧官民交受其困以臣管見目今現奉部文准開常平倉運米事例從此鄰省生俊輩爭先輸納源源而來倉儲不患不充可否懇祈皇上特敕撫臣將此三十萬石倉穀盡行發糶價銀可得一十五萬兩免其買補解貯司庫另行收貯以備不時之需是藩庫歲銷之外又有此備貯銀兩以壯邊儲以裕民食可一舉而兼收其效矣以上二條皆臣再四熟籌始敢據實陳奏是否有當伏乞皇上睿鑒施行謹奏楊文乾請假朕巳准伊所請兹命爾署理粵撫事務楊文乾尚需數月方能回任倉穀乃為爾身之干係事矣朕意爾所論固可平一時之價但天年何可期必目下雖少苦價昂尚不至於乏食倘倉儲一空將來萬一歉收所關非細此在爾相機籌畫逺近輕重而為之朕實不便諭應行與否也此際如楊文乾尚未動身當與之悉心商定再行若有應請旨處即行具題爾乃暫署之人止圖目前平價以遂衆欲及日後楊文乾回任時倘少至難於措置則爾領罪不輕矣愼為之雍正五年三月二十五日廣東布政使臣常賚謹奏為奏聞事竊照粵東早稻於三月間插蒔六月間收穫今歲二月以後天氣晴霽米價微貴幸得三月二十三四兩晝夜大雨臣遣員查看四野禾苖俱巳栽插將來早稻可卜豐登至奉旨撥運粵西倉穀三十萬石原委糧驛道何師儉前往梧州府地方接運今自三月初八日起陸續巳運到五萬石有餘臣現在酌量各屬地方之緩急需穀之多寡分撥運糶以平市價俟粵西穀石運齊分撥完日另行奏報外目今廣州省城米價日見平減人民樂業地方寧靜誠恐上厪聖懷理合據實奏聞謹奏覽奏米價平減深慰朕懷雍正五年閏三月二十七日署理廣東巡撫印務臣常賚謹奏為恭繳硃批仰祈聖鑒事竊臣奏摺家人馳驛回粵捧到硃批諭旨跪讀之下仰見聖謨逺大睿慮周詳臣不敢以將去而膜視其民暫署而忽略其事惟有凛遵聖訓愼重籌畫因時制宜以仰報皇上委任之深恩也今查粵西運到穀石除分貯肇慶府倉穀四萬石外計運到廣城十六萬三千石零因惠潮兩府去秋被災其所屬成災之縣現飭將倉穀發賑其勘不成災而亦被水之縣現在另疏題賑此外各縣仍飭照糶三例減價平糶復慮各屬貯穀多寡不一又㑹同督臣阿克敦議撥粵西穀二萬石起運惠潮二府分貯臨時酌量詳明動用再廣惠肇三府自三月內得雨之後至今雨澤愆期米價漸昂誠如戾也謹奏覽同日又奏為奏聞事竊臣至愚極陋才識踈庸荷䝉皇上隆恩至優至渥惟殫竭愚誠以圖上報髙深於萬一臣思巡撫之責首在稽考屬員之賢否若屬員果能潔巳奉公百姓自受其益臣敢不仰體聖衷時刻留心稽察以整飭吏治日前有潮州府通判吳安泰私賣變價戰船署石城縣舉人嘉鍾秀諱匿盜案業經具疏糾參今查有新補澄海縣令劉德基原由教職俸滿䝉恩特用不思潔巳奉公以仰報聖恩到任甫經數月而穢聲昭著又有花縣知縣朱紹濂居官素屬平常因係公馬爾賽之壻從前均為姑容今自委署海豐縣印務以來任意貪婪毫無顧忌臣查訪既確斷不敢為伊狥庇以致貽害地方除具疏列欵糾參外合再繕摺奏明仰祈恩鑒謹奏覽此奏朕甚嘉悅但肯秉公察吏地方諸務自當就理矣勉之雍正五年四月十三日署理廣東巡撫印務臣常賚謹奏為奏明嚴處積案凶盜以靖地方事竊查粵東山海交錯素稱盜藪臣䝉皇上委署粵東巡撫印務視事以來檢查案卷內有巳參疏防之盜案一百餘件尚有未參疏防之盜案因從前未經參過歷任督撫將州縣獲報之賊審實從重枷責發交親族保領約束凶橫之徒不知畏懼悛改臣見每案之中必有為首糾夥及行凶肆惡之徒若一概枷責發落日後斷難保其不再為盜臣不敢少為因循今將未獲賊之案催令文武嚴緝務獲不使漏網巳經獲賊之案催令審解臣必親審明白將極惡首盜并傷人之犯即委員押赴稠人廣衆之地立時杖斃以示警戒臣近又准部文嗣後審擬盜案將造意為首及殺傷人者悍惡凶暴者行劫三次以上並窩引盜賊者為法所難宥有迫於饑寒被人誘脅并聽從父兄指使跟隨上盜者為情有可原一一分析開明等因臣此後擬審未參疏防之盜案亦遵照定例分析將法所難宥之犯俱行杖斃其情有可原之犯嚴行枷責項帶鐵牌朔望點卯庶姦狡積盜不得幸免凶惡之徒咸知凛畏而盜風可以漸息矣謹將嚴處積盜緣由繕摺奏明伏祈皇上睿鑒謹奏所見甚是應如此料理楊文乾回任時將朕此諭與伊看雍正五年五月二十四日署理廣東巡撫印務臣常賚謹奏為奏聞事竊臣訪聞韶州府曲江縣濛裏地方有一山名為礬洞産有銅礦自宋元時曾經開採挖有銅沙堆積於壠旁之溪岸後因封禁山口此沙遂不許私煎間有村民偷取煎熬被地方查察相爭無已臣思此項銅沙與其堆積消毁何如作爐煎煽如其實在有銅亦可湊為解部額銅之用但現堆若干每堆約有若干擔每擔約可得銅若干斤臣巳密諭韶州府知府黃文煒親往查勘煎試去後尚未覆到倘查明如果有銅可煎臣即於雍正六年承辦銅價內一面量給工本交該地方官督同煎煽一面具疏題明俟煎得若干即抵解粵省每年應辦户工二部銅斤數目將辦銅價銀扣存撥餉於錢糧似有裨益是否可行伏乞皇上睿鑒施行謹奏勘明如果實有銅沙乃係極有益之事到閩之日面向楊文乾說知可也同日又奏為奏聞事竊照粵東閏三月雨澤愆期自四月及今甘霖疊沛晴雨及時因當望雨之際適得滂沱霑足禾苗暢茂較盛於常目下早禾巳熟各府收成俱約有十分九分不等省城米價每石減至一兩一二錢窮民易於謀食所有平糶煮賑二項俱於五月初停止此皆仰賴皇上感召天和福覃寰宇海隅蒼生獲享盈寧之慶誠恐上厪聖懷謹將早禾豐稔米價平減緣由據實奏聞謹奏覽奏深慰朕懷此皆爾等督撫實心任事上感天和之所致朕甚嘉悅焉同日又奏為奏明立限買補倉穀以裕天儲事竊照粵東常平倉每年應糶三穀四十八萬有零除碾支兵米於徵收本色米石抵還外其餘照例平糶出陳易新上年春夏之交米價騰貴經撫臣楊文乾於糶三之外復在存七穀內融糶一十五萬石有零所糶價銀均存府庫查無短少原擬於上年早晚二收照數買補因去秋被水歉收穀價高昂平糶之價不敷買補今歲春間又經平糶統計兩年平糶碾支及動存七之數共九十餘萬石除徵收本色抵還碾支及巳經買補外尚未買穀四十餘萬石倘一時需用或有缺乏關係非淺幸今及時得雨早收現在豐稔臣巳嚴催即時買補復與署督臣阿克敦面議定限於七月內務必買補十分之五十月內照數全補倘十月內不行買足即照虧空參處未買之數交知府領買限至歲底補足如仍有未清著落該府縣分賠并照虧空治罪如此立限嚴催不少寬假則人人必以功名為念自當上緊趕買早晚兩收之後各府州縣應貯之數顆粒無缺庶得以仰副我皇上愼重倉儲之至意也臣叨䝉聖恩不敢以暫時署理少存狥縱合將立限催補緣由繕摺奏聞謹奏知道了到閩之後可竭力料理汝本任內之事楊文乾經理福建一番事後回任自應盡心料理也雍正五年六月十八日署理廣東巡撫印務臣常賚謹奏為覆奏事竊查粵東韶州府曲江縣礬洞地方溪河之旁積有銅沙日久無用臣經一面行查一面具奏今據韶州府知府覆稱查明此沙之堆或高四五尺或高七八尺至丈許不等共約有千餘堆每沙一擔約可煎銅三四斤不等即煽至一二年恐不能盡等語查臣前摺內原有擬發工本委員前往煎熬之請但思此沙堆積日久其中出銅多寡固難懸定若發本委員則所委之員必多而雇募人夫又慮紛雜難稽今擬聽本地附近殷實居民自備資本赴臣衙門報明許其召募工役設爐開煽每沙一擔隨其得銅多寡酌其所費工本或行對半或行四六分收仍委幹練文官一二員專司稽察不許煎多報少并令就近武員帶兵巡邏不使姦匪混雜如此則所用工役俱係本處土著之人聚散皆易併可免動用錢糧省銷算之煩其所得銅斤凑同解部臣非不知山場久奉封禁但銅沙現存不必開山鑿取且又於國家鼓鑄不無裨益是否可行伏乞聖鑒謹奏想爾巳往閩省矣此事交與楊文乾令與孔育珣阿克敦詳議妥協奏聞候旨舉行同日又奏為奏聞事竊照粵東每年夏秋間大雨時行廣西諸水直趨而東奔流入海蓋以水急勢橫復加霪雨連綿東南風猛海潮倒灌潦水不得順流兩相搏擊致粵地圍基頻有衝決之患今年五月十五日至十八日止連日廣西諸水湧漲至一丈二尺有餘臣即親赴查勘據里民咸稱今年水發本處喜無大雨加之風靜浪平惟南海三水新築圍基其基面窄狹者偶有漫溢缺口亦不過數丈幸早禾巳收晚禾未插毫無有損其餘圍基俱安然無恙水勢於五月二十日即消去一半二十日後業巳照常臣巳檄飭各屬督率居民協力修復晚禾亦皆蒔插此皆仰賴皇上至德遐孚天心默佑是以水發之時無大風大雨逆流激湍海疆得免水潦誠恐上厪聖懷謹將圍基無損緣由繕摺奏聞謹奏據爾所奏深慰朕懷向聞此圍基若於年前預為實力修築即可保次歲無虞爾其知之同日又奏為恭謝天恩事竊臣齎摺家人回粵捧到恩賞各種藥錠一匣臣隨郊迎至署恭設香案望闕叩頭謝恩訖伏念臣一介庸愚茫無知識荷䝉皇上委任粵東藩司甫及一載復畀以閩撫重任又命署理廣東巡撫恩綸疊沛榮寵逾常臣智識短淺涓埃莫報乃䝉天心眷注特頒珍藥拜賜之下覺嶺海烟嵐蒸濕之氣一時頓釋臣不勝感激之至惟有益殫心力愈矢公忠以期仰報髙深於萬一理合繕摺恭謝天恩謹奏覽汝此去到閩絲毫毋得瞻顧情面乘此時同楊文乾徹底清楚日後汝更易為力矣當與之和衷辦理悉心詳查朕巳有旨諭楊文乾不必候汝到閩先即一面料理朕看汝之局面清勤二字似不為難但恐偏於平易疏慢寬縱沽譽一邊倘一涉此病較之貪婪不職者等耳况髙其倬又是以長厚自居惟恐被人嗔怪者從來身為大臣任勞易任怨難汝二人若一味以取悅於人為務自必有欺隱之弊一涉欺隱則無所不至矣勉之愼之君恩不可負也朕何為諭及此因汝自到粵省以來凡汝通省屬員來往人等無有不稱頌汝之和平寬厚者朕甚疑之福建邊海巖疆兵民刁悍若督撫惟以寬仁為主則萬難整飭地方毛文銓即係榜樣倘汝將就因循不能徹底清釐朕只得又調汝別任另用人察汝矣所事若少不清楚朕斷不肯中止也竭力為之雍正五年七月十九日福建巡撫臣常賚謹奏為請定修堤之專責杜水患以衛民生事竊照廣東近水田畝苦於廣西潦水漲發每致收成歉薄今夏水漲一丈有餘喜天氣晴明東南風信不作潮水如常廣西水來得以順流出海兼臨漲之時嚴飭各所屬親赴堤畔率同有業民人共相保護雖有衝决隨决隨修田禾無損惟查修築堤岸向例設有堤長按畝派工羣起力作逮後官念民力艱難委員量為幫理未免彼此推延不能及時修築以致水患頻見臣查近水受衝之縣廣州府惟南海三水肇慶府惟高要髙明四㑹等縣為最今欲保固堤圍莫如責以專任請以廣州府糧捕通判兼管南海三水堤工肇慶府糧捕通判兼管髙要髙明四㑹堤工令於冬收之後督同堤長按照各業户田畝派工修築務使堅固水漲之際即督同各業户保護更請定賞罰之法以示勸懲一二年至三四年保固平穩者豫以紀録加級五年不致衝决者以應升之缺即升一二年及三四年衝决議以罰俸降級五年頻見衝决者革職則事有專責庶水患可除而民業無虞矣再修築堤工必先僃物料以為搶修之具此項費用既不可派之田畝復不能取之在官必致臨時掣肘臣查廣肇二屬向有魚鴨埠稅欵向照徵收以充公用後經禁止但查事關水利按徵似亦無礙每年計得千有餘金即以此銀照數解交通判以僃搶修物料庶掣肘無虞而歲修無誤矣今巳離署不及具題謹繕摺瀆奏伏乞睿鑒施行謹奏此奏甚屬妥協周詳抵閩時面交與楊文乾悉心照此辦理應題者具題但楊文乾曽經奏請開捐以修理圍基同孔育珣面奏時朕經詳悉諭過楊文乾今若有意將此摺所議之處怠忽從事以覬行巳前奏則自招大過矣將此摺并朕批諭皆與楊文乾看同日又奏為奏明太平粵海兩關稅務事臣仰沐皇恩委署廣東巡撫兼管太平粵海兩關稅務自接署及今將及五月無時不以裕課恤商為念但查兩關春夏之稅有限所賴者盡在秋冬如太平關除正額外上年奏報羡餘銀四萬五千餘兩臣接署時撫臣楊文乾僅交下羡餘二萬六千餘兩臣自三月十八日接署至六月二十一日一年期滿除正額外按日計算應該羡餘銀一萬五千餘兩今據韶州知府按月報解尚缺羡餘銀一萬兩有零隨查向例將單錢平餘等項統歸羡餘亦僅得銀八千四百餘兩今統交署撫臣阿克敦奏報尚不足羡餘一千兩有零仰冀聖鑒查粵海關惟賴夷船但夷船必待風信於五六月到粵所載貨物無幾大半均屬番銀輸鈔納餉必候夷人買貨完畢除所買貨物按則納餉外統計每銀一兩抽分頭銀三分九釐此係舊例是一年稅課之正羡咸賴秋冬將有餘以補不足每年正額四萬三千餘兩羡餘四萬八千二百餘兩臣自接署至卸事共計一百五十日該正額銀一萬八千三百餘兩除現收船鈔貨稅以及各口解到之稅共計銀三萬一千二百餘兩彚交署撫臣阿克敦收貯外尚有逺口各委官徵收未解俟解到日統於年滿奏報獨是臣任藩司時傳聞撫臣楊文乾徵收課稅去年設立専行計共得銀二十餘萬隨即密察未得其詳逮署巡撫印務復行確訪詎經手庫稿兩房經承撫臣楊文乾於臨進京之先各給路費俱令回籍矣至夷船今歲進口時停泊數日並無行店承攬因詢之各商僉云廣東洋行向係十六七家去歲撫臣新例將夷人帶來銀兩每兩預行加一扣收共計得銀四萬三千餘兩及上餉之時仍照收稅耗外復抽分頭銀三分九釐令專放之六行先行辦繳又發銀數萬差人往別省置買湖絲茶葉等貨貯如升行飭令儘先賣完方許各行賣貨今崇義店陳騰官行內現貯湖絲二百餘擔客商知有積貨并慮貨到不能先賣以致往來稀少各行畏懼等情臣既訪察確鑿斷不敢姑為狥蔽致干欺隱之咎謹據實奏聞伏祈睿鑒謹奏據奏楊文乾所獲之利即此四萬三千之數抑或係先言二十餘萬之數殊未明晰除此洋行貿易之外楊文乾更有見小漁利之處否據實奏聞不得隨意增減雍正五年九月初二日福建巡撫臣常賚謹奏為奏聞事竊臣於八月二十二日到閩隨經具疏題報在案查得欽差廣東巡撫臣楊文乾浙江觀風整俗使臣許容吏部郎中臣鄂彌逹內務府員外臣伊拉齊先於八月十二日到閩臣隨即㑹同委員分查各府州縣之實貯若干虧空若干務必徹底清查無絲毫遺漏方可㑹題以慰皇上惠愛元元剔除積弊之至意臣蒞任方新雖未周知而稽查歷年倉穀案卷或貯價流交或捏報不實或因價值不符觀望未補遂至倉貯虛懸我皇上特差大臣逐一清查仰見聖明無微不照臣仰䝉聖恩以微賤之身委任封疆之重敢不竭盡駑駘清除積弊厚恤民生以仰副皇恩於萬一謹奏勉為之經此一番清楚之後爾將來大為省力獲免無限處分假若逞愚昧之見沽一時虛譽稍為優柔瞻顧則朕此番徹底清理之舉殊為可惜也竭力勉為之同日又奏為奏聞事竊臣查得閩省舊例每月俱有土産食物差家人進貢如有應奏摺子即同進貢摺子併裝一匣直到宫門呈進臣任坐糧㕔及布政使俱奉聖旨如有奏摺交怡親王轉進內廷欽遵巳久今臣查閩省進貢物件不便摺子與貢物兩處呈進臣再四思維謹將奏摺同貢物徑至宫門呈進為此奏聞伏冀皇上睿鑒謹奏自然應如是進呈向因汝係兩司之任故命怡親王代汝轉奏今巳用汝為撫臣自當照衆例行也雍正五年九月二十六日福建巡撫臣常賚謹奏為奏聞事竊臣到閩以來訪聞多有好勇鬬狠慣習拳棒一朝之忿遂起釁端兼有倚勢逞凶以强陵弱以及衙蠧訟師巧於舞弊架詞興訟魚肉鄉民者種種不法各府皆有而漳泉為甚臣現出示曉諭兼密行訪拏一有不法之類分别輕重嚴加懲治應具本者臣當恭疏題參應摺奏者臣當繕摺奏聞務使澆漓刁悍之風漸漸遷改以慰我皇上移風易俗之至意謹奏酌中合宜次第施為不必專務章奏空言惟當實力行之同日又奏為奏聞事欽惟我皇上念切民依於各省雨𤾉情形收成分數時厪聖懷臣叨恩撫閩自廣東赴任所歷漳泉興福四府一路見晚稻秀實沿途父老子弟皆歡欣踴躍共慶有秋詢其收成約計七八分不等咸稱感沐皇上愛養以致雨𤾉時若獲此豐亨等語此皆臣所親見其延建汀邵上四府臣遣人遍查皆有八九分收穫較福州等四府尤為豐稔仰見我皇上憂勤宵旰深宫䖍禱故能感召天和錫民祉福俟禾稼登場完畢之日另行具奏外恐厪聖懷合先奏聞謹奏覽一切奏聞只宜據實上逹似此粉飾諛詞欺詐虛文有何益處同日又奏為恭繳硃批感謝聖訓事竊臣齎摺家人回閩捧到硃批臣恭設香案望闕謝恩訖跪讀聖諭䝉皇上飭臣與楊文乾和衷辦理又許臣清勤誡臣寬縱皇上訓勉䇿勵周詳曲盡不啻覆載生成竊思臣於前歲除授廣東布政使時於養心殿跪聆聖訓煌煌諭旨銘刻於心無時敢忘况臣幼䝉皇上豢飬今復荷天恩委以封疆重任在臣之心只知有我聖主一人至內外臣工臣何敢復存瞻顧之念但臣在藩司任內因初膺外職循分守巳既不敢隨聲附和亦不敢創立主見是以臣未嘗稍有沽譽之心而人多有以臣為和平寬厚者臣捧讀諭旨惶悚無措竊思臣之官皇上授之臣之身皇上飬之臣不思仰報主恩反欲市名沽譽於悠悠泛泛之人是屬何心臣雖愚昧斷斷不肯為此今又䝉聖主隆恩諄諄訓諭臣惟有益加勉勵實力察查務必將從前積弊盡行發露庶不負皇上委任之深恩教飬之大德也為此激切陳奏伏乞睿鑒謹奏沽寬厚和平之虛譽其過尚小若再加以朋比欺隱則罪不可逭也雍正五年十月二十五日福建巡撫臣常賚謹奏為遵旨覆奏仰祈睿鑒事竊粵海關稅一項欽奉硃批據奏楊文乾所獲之利即此四萬三千之數抑或係先言二十餘萬之數殊未明晰除此洋行貿易之外楊文乾更有見小漁利處否據實奏聞不得隨意增減欽此伏思臣之一身生自微賤並無親族依倚維持且賦性魯鈍不諳時務仰䝉皇上天恩豢養訓誡時加兩年之間擢臣巡撫委以封疆重任臣即捐糜頂踵不足仰報萬一若臣有見聞不行據實陳奏敢稍為增減以欺聖主實為天地之所不容矣謹詳細陳之查粵海關稅定額四萬兩有零雍正四年據楊文乾報稱連溢羡共九萬餘兩臣細加查訪實有十五萬兩夷人帶來銀內每兩抽銀三分九釐計得銀二萬餘兩再紅黃顔色紬緞例禁出洋楊文乾令其置買每緞一匹得銀七錢線紬五錢紬匹及線每斤得銀四錢約計得銀萬兩又洋船所載多半皆屬番銀於起船時勿論其是否置貨先以每兩加一抽分得銀四萬三千兩此係楊文乾例外之求復以進上為名洋船開時揀選奇巧物件統歸署內並不發價專行代償約計銀二萬餘兩又將銀一萬九千兩作銀二萬交鹽商生利每年取利銀七千二百兩再查專行數家內有推病者有逺避者蓋楊文乾進京時傳各行吩咐今年計於八月回粵夷人帶來銀兩不能細查總以洋船所置貨物湖絲一擔扣銀二十兩茶葉扣銀五兩磁器等貨扣銀二兩按擔計銀回時彚繳此楊文乾之見小漁利處也至人言湖廣漢口山東東昌各有生業雖傳聞不啻一口但未確訪的實不敢妄奏伏惟睿鑒謹奏從來操守二字實難得其人奈何三人行必有我師汝見此尤當於廉之一字加勉況利者實係無益有害之物人皆知之而皆看不透亦大奇事汝等彼此將類斯等事毫不欺隱俾朕咸得知悉應教者教應戒者戒應罪者罪則孰敢為非也在楊文乾自以為不關國計民生設法巧取而名實兼收殊不知人之耳目如何能欺正所謂㺯巧成拙若不改悔立見名實俱敗耳所以天下事並無巧法惟有盡巳之誠以聽天而巳餘無良䇿也勉之戒之同日又奏為奏聞事竊照閩省倉儲准楊文乾許容㑹同將所帶委官分頭盤查今限期將屆據結報清者未及十分之六有以先委未經交盤而輾轉接盤者有以穀色平常呈樣申請者有以不足碾米彼此牽混者有以貯價未買諉之前任者巳同楊文乾飭其兩穀一米總須潔淨乾圓務期實在不許絲毫狥隱但怠玩成風又經臣將南安令吳彥遵㑹參至欽命㑹審事件查有本案虧缺者俟其盤查清結赴審有非本案內事及有親丁代盤不必本員面同者現各差員嚴提質審和衷辦理依限完結以仰副皇上委任之恩謹奏務以一勞永逸為期不可絲毫將就草率完結也同日又奏為奏聞事竊臣於到閩以後巳將途中所見禾稻情形奏明兹屆收成之後臣復檄查據各屬陸續申報到臣福州府屬收成有八分九分米價每石一兩二分至一兩四錢不等興化府屬收成有八分米價每石一兩二錢三分至一兩四錢不等泉州府屬收成有七分米價每石一兩五錢至一兩八錢不等漳州府屬收成有六七分不等米價每石一兩三四錢至一兩九錢不等延平府屬收成有八九分不等米價每石一兩一錢八分至一兩四錢不等建寧府屬收成有八九分不等米價每石八錢二分至一兩一錢不等邵武府屬收成有八九分不等米價每石九錢至一兩一錢不等汀州府屬收成有七八分不等米價每石一兩二錢至一兩八錢不等福寧州屬收成有八分米價每石一兩至一兩四錢不等臺灣府屬收成有九分以外米價每石一兩一錢八分至一兩四錢不等以上收成分數雖多寡不齊米價較春夏巳大平減民間樂有粒食無不仰頌皇上覆育深仁臣謹具摺奏聞謹奏但能以誠敬格天公忠理事自然時和年豐民安物阜此理分毫不爽爾等封疆大吏所關甚巨欽哉毋忽同日又奏為酌更水師營員補用之法以除刁悍積習事竊閩省所屬福興泉漳等府地處海濵所有沿海口岸在在均須防禦如五寨三遊海壇金門厦門以至南澳各設重兵相為掎角又復勤加巡緝然後可保無虞查水師營員例用閩人緣出洋巡哨風信靡常必熟諳水性之員方能隨宜調度有裨海防但相沿日久上下盤踞其子弟親屬中不肖之徒往往抗糧健訟暴橫鄉曲地方有司率多因循姑息希圖省事小民無可告訴遂紏集族姓結為黨羽遇有事故或聚衆鬬毆或聨名告詰因而藐視上官罔知法紀此閩省刁悍之風所由來也臣蒞任以後密訪嚴拏擇其惡跡昭著者懲一警百以挽頽風第沿海一帶營汛自閩至粵千有餘里凡屬營辨俱係閩人各有田畝産業回互占據聲氣相通其間作姦犯科之事一時稽查難周必得武職大員實心整頓盡力約束方能使之安分守法臣請嗣後提鎮以下參遊以上等官遇有員缺不必定用閩人伏懇皇上於漢軍及他省漢人中擇其年力精壯可以學習水師者間為補用庶整飭彈壓不至有狥情袒護之弊而所轄辨兵知所畏懼刁悍之風自可漸息矣臣愚見所及謹據實陳奏是否有當伏祈皇上睿裁謹奏閩省武辨黨比之習朕所悉知似爾此議奏朕者亦頗多果於他省辨員中得有諳練之人自應間補但得人甚難若庸碌不職之輩更不如本處人尚相安於無事也况通省人亦未有合一之理於中必有各立門戶者或有彼此猜忌而不相和者全在爾等大吏通權逹變隨事設法以警戒之解散之時時留心訪察以防範之最要者身先之以公忠體國徐開導以義利大誼必費一畨苦心用一畨實力漸次教化方能移易其積俗若捨本而務末不過止更換數名不逹海洋之武夫欲望振刷頽風朕恐不但無益而更有損也陸路從來酌量更調而用水師須當照例在閩歷任大員屢經摺奏朕思若果督撫得人寧不能感化此數十員武辨耶悉如髙其倬毛文銓惟名是務滿保黃國材惟利是圖之輩便將通省武辨全易他省之人亦復何益萬一海洋有警復招致本省之人令其戮力報國恐未必傾心用命也况更調亦只可從副參以上副參者乃微辨所望上進之地現在水師者既不能望升他省偏裨又不能推升本省將官則無階可上矣恐其心志一灰無恥之事何所不為未必新調一二他省之大員即能撫綏駕馭也故朕謂務末不如端本端本之道在爾等督撫公忠清愼以身為之表率而後可爾將此諭與楊文乾髙其倬看密之密之楊文乾若巳回粵則巳若皆似鄂爾泰田文鏡此等督臣斷無不能化導本省之人而求之於他省調員代為整理也朕實愧之不得其人奈何奈何雍正五年十一月十七日福建巡撫臣常賚謹奏為恭繳硃批奏摺事竊臣䝉皇上發到毛文銓奏摺六件欽奉硃批毛文銓所奏一派欺詐固不可信然或有可採處有成例或有抗缺責在有司即使如限全完亦督催經徵職所應為今繕摺陳奏似近塞責至姦徒不法立限巡查乃屬營官職守今時際升平即有盜竊何難捕治宜明目張膽整肅軍威使知所畏而不敢犯所奏暗帶軍器改扮衣裝殊於巡防無益今臣咨㑹督臣通行陸路武職立牌分界㑹哨巡查遇有匪類即行拏解但不許隱諱捏飾藉端騷擾違者參處再臺灣礱户即係內地米行向皆沿海居住以往來糴糶多由海運易於起載攬裝若遷置府城則買賣反多腳價與民無益似應聽其照舊開張但增減米價實屬病民應嚴飭價值隨時倘隨意髙昂立拏重處庶業户得免遷徙米價不至昻貴事屬兩便臣謹據愚見議覆是否有當伏候皇上指示謹將原摺六件一併奏繳謹奏所議亦不過紙上虛文耳雍正五年十一月二十二日福建巡撫臣常賚謹奏為奏聞事臣奉命撫閩以來凡見文武官辨無不諄諄飭諭令其嚴禁刁風力加約束詎閩省積習兵丁驕悍不惟陵虐良民兼且抗拒官法今訪有泉州府民人王貫買民人黃武兄弟之田巳經三載突有提標前營兵丁黃宇冒認為伊祖佃業率衆搶割王貫㑹同甲鄰扭獲禀送晉江縣該縣訊係不法未便責治兵丁將餘丁黃佛枷責縣前突有兵丁數十人蜂擁到縣將黃佛連枷搶去乃該縣只報提督並不通詳臣訪聞之下不勝駭異立將縱兵抗法之提標遊擊傅為宿及畏縮因循不行通詳之晉江縣知縣蘇本潔特疏題參外理合先行奏聞謹奏屢屢奏稱刁風爾等職任原係戢暴安良宣布風化若言刁風難治豈欲求朕往福建代爾等整飭之耶同日又奏為感沐聖恩恭陳謝悃事臣於十一月十九日接到部文內係怡親王暨大學士張廷玉遵㫖寄信示臣欽奉上諭嚴切臣捧讀之下不勝惶悚竊思臣荷䝉皇上天恩委任封疆大吏因賦質愚昧屢滋過愆兹奉天語飭知臣敢不敬布微忱據實陳奏竊臣署廣東巡撫印務任內從化山中有虜去採辦木料人一案龍門營有盜聚同謀劫去七子汛器械一案電白縣有盜賊四十餘人行劫一案種種不法臣於文到之日即嚴飭緝拏但此三案因疏防限期未屆俱未題參亦未奏聞此臣疏忽之罪至於賊衆千有餘人一日連劫二十七家臣即昏憒無聞如髙州鎮等職所專司而亦安然膜置耶此言事者故欲張大其辭以重臣罪至將軍營兵窩盜一案係署廣州府胡恂寓所被竊後於故衣鋪內認出原失衣服訊問故衣鋪人供稱將軍標下兵丁賣與我當票贖出來的臣委理事同知審理因未審解臣即赴閩至於失去奏匣匙鑰一事臣因署理巡撫印務移住城外總督舊行署內於三月二十夜被竊去木匣一箇內有小匣裝盛奏匣匙鑰兼有衣服數件彼時臣隨欲摺奏因羞愧恐懼交集於心竊擬將來獲陛見時面奏乞宥或免重罪此因臣疏忽昏憒竟涉於串通欺隱罪實聖教事無大小逐件奏聞臣何敢有心欺隱顯負聖恩自干罪戾也臣不勝惶恐戰栗之至謹奏汝竟忍於欺朕餘者更不必言朕觀汝光景又是一無用之物矣雍正六年正月初八日福建巡撫臣常賚謹奏為奏聞事竊惟制錢所以便民而黃銅為鑄錢必需之物我皇上洞鑒姦民燬錢為器之弊禁止擅用黃銅飭直隸各省城設局委官發價收買臣恪遵諭旨一體嚴禁恐有仍行制造銅器之姦民又委員不時巡查巳飭布政司發庫銀一千五百兩遴委福州府通判專管收買銅器於省城設局飭令估看成色照依部價隨到隨買復慮外府若不一體收買猶有藏匿之銅器是以同督臣髙其倬酌議飭司每府各發銀五百兩著各該府委員一體收買去後續接部文議令拖缺舊糧之花户准其繳銅抵算錢糧奉旨允行到臣遵即轉行各屬在案惟思銅器比户皆有而拖缺舊糧之家無幾恐未能遍收民間之銅器除遵照部文舊糧准其繳銅抵算外合將發銀收買緣由具摺奏明謹奏第一嚴禁燬錢私鑄為要收銅猶為次之今巳調汝撫滇此事亦與汝無涉矣滇省之銅不須禁者汝到滇一一聽從鄂爾泰而行不必自立意見同日又奏為奏聞事竊照洋船出海一案經督臣髙其倬題明取各商原籍族鄰保結地方官加具印結造冊申報給照開行等因奉旨允行欽遵出示曉諭取結去後今各商船貨俱集而原籍地方官印結竟無送到雖現在飛檄催取惟查出洋風信止在正月以內過此則風勢不順難以出洋但各商屆此風信之期尚無取到印結本年出洋之期必至遲誤理合先行奏聞謹奏覽誤亦係彼自誤與汝等何涉雍正六年二月初十日福建巡撫臣常賚謹奏為奏聞官役侵蝕捏稱民缺事竊查閩省倉庫不清䝉皇上命廣東撫臣楊文乾等與臣㑹同清理業將通省虛實官虧民缺各項查明恭疏㑹題在案兹據漳浦縣知縣于翰翊詳稱自康熙五十八年至雍正二年交盤冊開民缺共一千八百五十五兩零並無串根紅簿訊之經承係前任知縣汪紳文燒燬等語又據署閩縣州同李芬禀稱查出康熙六十年至雍正元年前任知縣于翰翊任內吏役侵收銀八十九兩零又自元年至五年前任知縣于沛任內吏役侵收銀七百三十六兩零各到臣隨飛飭嚴審擬追將前任漳浦縣知縣汪紳文郭以治馮紹立及前任閩縣知縣于翰翊于沛等員業經列疏題參臣查閩省吏役狡詐百出而從前各官亦皆因循玩忽不能覺察臣恐各縣尚有此弊現在飛飭嚴查臣斷不敢少為回護自干罪戾除另疏紏參外合再詳細繕摺奏聞謹奏似此已題案件何必又多一番煩瀆此皆居心不實根本處差謬遂至顚倒重復故有此不應奏而奏之舉且必有應奏而隱匿不奏之事此自然之理也雍正六年二月二十日福建巡撫今調雲南巡撫臣常賚謹奏為恭繳硃批奏摺回閩內有臣奏請調用水師營員一摺䝉硃批恭繳謹奏覽同日又奏為恭謝天恩懇求陛見事竊臣自幼侍從皇上受數十年教養之恩復蒙不次擢用四年之內委任封疆乃臣愚昧昏憒到閩以來未能少起頽風有負委用深恩咎實難逭仰䝉聖恩不即罷斥復調撫雲南跪讀聖諭之下感激惶愧無地自容伏念臣才識短淺滇省地係巖疆若得仰請聖訓知所遵循俾竭蹶辦公或可少免舛誤且臣未獲瞻仰天顔已逾四載戀主蟻忱刻不能忘仰懇皇上格外垂慈容臣於朱綱到閩後兼程赴闕面聆聖訓庶犬馬下情得以稍遂矣除另疏恭奏外謹再繕摺奏請伏乞皇上恩准施行謹奏朕教導汝巳二十餘年不能遵奉更有何教導處汝於根本上不能見真守定徒務枝節便訓誨汝千言萬語何益之有况滇撫之命不過令汝循分供職鄂爾泰非髙其倬庸懦詐僞之輩可比汝到滇相見自知見朕不如學伊之居心行事汝若能效法得三二分從此感發愧羡立志做此等人一生用之不盡至於滇省一切事宜朕全賴鄂爾泰經理奏逹更無可諭汝者俟朱綱到閩速往赴任可也雍正六年三月二十二日福建巡撫今調雲南巡撫臣常賚謹奏為奏聞事竊照閩省山海交錯田畝無多即當豐歲猶藉二麥油菜接濟今因晴雨得時民間菜麥可必十分豐收現在米價每石銀一兩三四錢地方安靜人民樂業為此奏聞謹奏覽奏深慰朕懷同日又奏為奏陳各官賢否仰冀睿鑒事竊臣奉命撫閩巳經半載有餘謹將聞見所及地方各官賢否為任及今地方為之一變此外各郡縣或到任未久或屬調任除訪有劣蹟特疏糾參外謹將各員賢否據實奏聞伏乞睿鑒謹奏所論皆不甚差然亦只可言其巳往何能保其將來也同日又奏為恭繳硃批叩請陛見事竊臣一介庸愚荷䝉皇上隆恩內外大小臣工受恩戴德未有如臣之至深且渥者臣自蒞外任以來事無大小遵奉聖訓不敢狥私不敢疏忽雖識淺才庸動多未諳而忠君報主之忱不敢少有或忘乃於去年春間署理廣東巡撫印務搬移衙署時將恩賜奏摺鎖匙被竊一時慮罪匿情未經啓奏今䝉國典臣又何辭乃荷恩垂格外嚴批示警豫臣自新髙天厚地之恩實有莫可名言者矣再臣䝉皇上矜憐愚昧因博爾多等獲罪恩賜教訓臣具摺奏繳硃批誓矢一誠無欺無隱竊念臣自奉職及今從未敢有知而不言言而不盡者如果不顧臉面瞞心昧巳上負聖主之洪恩下類博爾多等之欺詐即使聖旨奚敢復行瀆奏但臣自離闕廷巳逾四載戀主之心時形寤寐查赴滇程途由福建路出江西由江西進京由京往滇道途不甚迂折遷延僅止月餘於地方事務不至遲誤伏乞皇上俯憐下忱不勝悚惕望恩之至謹奏覽雍正六年四月十二日福建巡撫今調雲南巡撫臣常賚謹奏為奏聞事竊照閩省二麥油菜豐收以及米價情形巳經摺奏二十二十一日連得雨澤近省之南臺地處窪下更與建灘接連水勢驟長民間新插秧苖間被水淹臣即出城閲視併專差四處查看據云四野田疇盡皆霑足低處亦無水溢禾苖遍插無遺即南臺水淹之處一晝夜水即消退禾苗無損目下米價每石一兩二三錢人民樂業地方安靜誠恐上厪聖懷所有水發水退情形合再奏聞謹奏汝將此等事頻奏之意希朕信汝大小事無欺無隱大錯矣看來又有自作孽之光景發露奈何奈何硃批諭旨卷四十
