body:
  text: 欽定四庫全書硃批諭旨卷一百二十六之一硃批田文鏡奏摺雍正二年四月初六日河南布政使臣田文鏡謹奏為據實陳明仰祈睿鑒事竊臣一介庸才至微極陋荷䝉聖主隆恩格外錫豫復畀以豫藩重任感愧交集已于三月十八日到豫任事隨即具詳撫臣石文焯代題叩謝體察民隱閲視田苗大麥業經秀齊小麥亦已吐穗詢問鄉民皆云仰賴皇上洪福齊天恩澤頻施以致三月初三日大沛甘霖四野霑足二麥約有七八分收穫臣亦驗視無異見過者惟開封府知府孫蘭芬才堪任使復細察各員誠如聖鑑多係因循積年陋習諸事闒茸即如各州縣交代一節接任之員例限兩月查明歸結遲則揭參原揭參遲延臣今現在勒限嚴催併陸續檄調各府州縣察其才調品行居官政績令其滌慮洗腸痛遲延各官已經檄取各府州縣職名使之知所警惕作速清理歸結錢糧不致虧空至河工事務臣於二月十八日䝉聖諭府州縣經年纍月日在河干地方諸事難免遲誤臣隨即奏請河員與地方官各司其事荷䝉諭旨命臣到豫商之河臣嵇曾筠撫臣石文焯具疏題奏欽此臣今查各該地方官兼理河務民事誠如聖明洞鑑難免遲誤而河工需用銀兩有各州縣徑解河道庫內兑收給發者亦有自司庫內提解道庫并各州縣赴司請領者紛雜不一且文移往返亦多稽遲時日臣到豫遵將聖諭并臣面奏情由備細轉傳河臣嵇曾筠撫臣石文焯現在㑹議商酌總之臣受聖主天髙地厚之恩至深至渥即鞠躬盡瘁亦難報效惟有矢此血誠不敢一毫怠惰一事茍且以仰答天恩於萬一耳除一切興革事宜次第竭力舉行外茲據所查大略數條預為奏聞謹奏覽奏朕深為嘉恱徐徐次第黽勉措施不可過猛石文焯若能如汝所奏則與之同心一德協力為之倘或不肯悛改憚於振興覺有掣肘光景絲毫毋為容隱一切直陳於朕自信無奪其撫任之心何庸稍涉回護形迹總向國計蒼生有益處秉公行去自䝉上天鑒察同日又奏為欽奉上諭據實奏聞事竊臣䝉皇上諭令密察河臣齊蘇勒其人究竟如何欽此臣細加體察齊蘇勒之居官操守誠如聖鑒實屬冰清玉潔一塵不染於河工事務極其熟練第為人性執微躁每多逞才自用旁人無能參贊一言臣訪之輿論俱各相同至按察使張保初到任時亦循舊習不能自異近日持身嚴正辦事勤慎臣勸其益自奮勵以報聖恩理合具摺奏聞謹奏所奏俱屬甚公至云齊蘇勒一塵不染果然乎再加細訪據實密奏以聞雍正二年閏四月初六日河南布政使臣田文鏡謹奏為恭賀大捷事竊惟羅卜藏丹津者世受國恩至深至厚乃罔知禮法跳梁徼外我皇上胞與為懷寬其誅戮許以自新豈意怙惡不悛自取滅亡爰命大將軍年羮堯授以方略調遣奮威將軍嶽鍾琪統師競進有嚴有翼軍容大振於前茅如電如雷賊勢俄摧於破竹由是凱奏歡呼羣仰神威莫測捷音傳播咸歌廟算無遺從此荒陬僻壤共享升平之福矣臣自問卑微何敢越分奏賀但思普天率土無不歡欣況臣身沐皇上隆恩如天如地其為忭慶豈悉名言用是不揣冒昧繕摺稱賀謹奏應奏賀者知道了同日又奏為恭謝天恩事竊臣前差進摺家人回豫恭捧皇上賜臣上用乳餅御製寶碗六安銀針雨茶到署當即望闕叩謝天恩泥首祗領訖伏念臣何人斯荷蒙聖主髙厚之恩格外寵錫有加無巳此誠千古未有之曠典臣即鞠躬盡瘁實難圖報於萬一惟有愈加勉勵竭蹶駑駘以期無負聖恩已耳所有愚臣感激微忱理合繕摺奏謝謹奏覽奏謝知道了前聞陳時夏在豫甚有能名適據該撫石文焯言伊辦理無才奏請調內朕思此人既負聲稱無故飭調離任必招百姓嗟怨因於其摺內批諭云陳時夏果短於才幹實有誤公處爾不妨據事直參朕自有裁酌雖經如是批發但不解石文焯此奏為何至於陳時夏去歲曾具有一奏甚覺僭越無理經朕嚴加申飭今春聞伊欲告終養百姓環繞涕泣攀留而止果有此事乎抑或其人係務虛聲行小惠以收民譽者乎及採訪輿論則咸稱其美指不勝屈有清惠愛民而不阿附上司兼且處事明敏若云辦漕不逮伊去後别員更不逮矣等語是以朕懷疑莫決特行訪詢爾其據實奏聞同日又奏為欽奉上諭據實奏明事雍正二年四月二十三日學臣張廷璐到臣署云伊兄户部尚書張廷玉有字來豫四月十六日奏稱伊弟張廷璐在河南除夫馬取給於地方外他如幕賓修儀及養贍家口種種雜費皆無所出頗覺難以持支於考試內絲毫不敢染指有負天恩荷䝉皇上靣諭朕聞汝弟聲名頗好汝可寄信令伊靣向巡撫石文焯布政使田文鏡云奉旨著巡撫布政使酌量給與盤費一面具摺奏知欽此臣遵即㑹同撫臣面商因查豫省各州縣夫馬臣自抵任後遵奉上諭嚴禁如無勘合火牌不許擅取州縣驛站夫馬并不許州縣借供應名色派纍里民今學臣夫馬自不便令其取給於地方茲議沿途夫馬每歲需銀一千六百兩供給雜用等項需銀三千兩幕賓束修需銀一千兩養贍在省家口需銀一千餘兩總計三年應共需銀二萬兩前經撫臣奏准給銀一萬二千兩尚少八千兩之數臣與撫臣石文焯暨司道養亷銀內通融給發除撫臣另摺奏聞外為此謹奏學政一差假使苞苴不禁所取有何限量若清正自持則無錙銖可得總在爾等地方大吏本諸公心審其行為果一塵不染當協力幫扶以成其美倘或言行猶有不符即前此所議之數巳覺浮多朕原諭張廷璐與地方撫藩酌商合宜須爾等樂助方可非令其以奉旨勒行也爾等計議允協酌量給與同日又奏為據實直陳仰祈睿鑑事雍正二年四月二十七日臣齎摺家人回豫恭捧硃批奏摺到臣隨即盥手跪誦仰見我皇上至聖至明無微不照感激涕零難以縷奏惟有欽奉聖諭指示謹守恪遵并竭盡心力不敢一毫茍且一絲欺隱以仰報隆恩於萬一耳茲臣伏查豫省夏麥業經陸續收穫詢之農民僉云數載以來從未有此雨暘時若十分豐收又查秋禾高糧巳長尺許穀苗巳發數寸其餘雜糧盡皆茂盛頃䝉聖諭京都左近地方亦得兩次時雨麥秋大有可望此奏盤查虧空一事臣謹遵硃批訓旨嚴飭盤查之員不許借端擾纍今據河南府盤查過懷慶府屬各州縣其虧空少者臣即勒限嚴催令其作速彌補全完虧空多者臣現在詳揭撫臣題參至新舊參過虧空以及交代遲延未經參揭者皆因舊習相沿彼此耽閣隱庇之處誠如聖諭稽延之事實不止一端已也至臣自問與晉撫諾岷萬不及一而仰沐皇上天高地厚之恩奬許逾分不覺日夜惶悚寢食靡寧亦惟謹遵聖訓諸事徐徐次第黽勉措施并協恭和衷激發撫臣石文焯振興奮勵共勷至治以副聖懷再開封知府孫蘭芬才實堪使其性急之處誠如聖鑑陳州知州林鴻暹臣初到豫時亦微有所聞因審追虧空無可協辦之人故暫用其才今䝉皇上諭知臣復細加察訪人品實屬不端居官殊多劣蹟臣亦斷不姑容以貽民害但不謂似此微末小臣前訪聞具奏今遵甚屬遼濶守斯郡者不特諸事難以清查致有貽改置統攝止留十餘州縣屬開封府管轄庶刑名錢穀事件朝呼夕應而各官之賢否地方之利弊與夫民生之休戚知府皆得親知灼見徹底整頓矣然應行分設者尚有統轄三州十二縣之汝寧府一州十三縣之河南府均難兼顧是否臣言可採伏候聖裁倘䝉聖主鴻恩無可圖報凡有關於國計民生之事不敢不據實陳官而官有全報上司具題者亦有減報數目者并有全未申報者逮至期滿升科催令百姓完納錢糧在百姓止知上完國課而不知減報未報地畝之錢糧盡歸各官私槖臣察訪確實隨向撫臣石文焯說知又思欺隱田糧定例甚嚴一經顯行飭查各屬不免畏罪巧飾臣今並不檄發牌文只密諭各府知府令各州縣不敢再隱盡皆首報一俟查出地畝若干應納正賦若干即為詳明撫臣題請當年起科但臣更有請者此項隱匿地土匪朝伊夕若按律治罪追究積年錢糧則新舊大小各官均干重處枝牽蔓引便無了期我皇上聖德如天自無庸臣預為奏請第恐格於成例以致部駁不得不先行瀆奏俟撫臣具下之餘種於前四月十二日起據衛輝府屬之獲嘉胙城淇縣新鄉汲縣五處開封府屬之祥符滎陽封邱河隂四處懷慶府屬之武陟修武二縣陸續詳報版地內生有蝻子臣隨飛飭各該府親自九並未損傷田禾再有河工需用人夫原不比南工多可雇覔且向年止須搶修募夫甚少今興大工雇夫頗多因不得不借民力雖據在河各官遵照部定工價給發雇募並不纍民而內有祥符縣兩不相妨并使刁劣紳襟無以營私理合一併奏聞謹奏諸項俱悉總屬可嘉之至雍正二年閏四月二十八日河南布政使臣田文鏡謹奏為遵旨覆奏仰祈睿鑑事欽惟我皇上秉德承乾勵精圖治凡有關於國計民生者無不仰厪聖懷籌畫盡善茲撫臣石文焯傳臣至署捧出京時見直隸一帶地方紛紛種植業已謹切留意樹根以致路旁每多坑坎茲遵將刨掘之處巳經平治伏祈縣僉云去歲即將沿途營泛窩鋪逐一修整似無庸再修臣今復致札鎮臣令其嚴飭該管將辨加意巡查毋得疏忽然欲使在泛兵丁朝夕看守必須添蓋房屋攜眷居住而此項蓋房工料臣已與隙逐一料理斷不致纍及地方以厪聖懷又屬員養亷臣到任時據撫臣云已經奏明隨捧出硃批諭旨與臣細繹臣跪誦旨內即有不敷之諭仰見我皇上體恤臣工無微不燭臣復與撫臣酌議又據撫臣屬一切科派悉行禁止積年陋規盡皆革除今䝉聖諭遵當細加訪察斷不敢稍有疏忽以貽民害再河決等處地方實因連年歉收內有佃地貧民暫時就食他所今歸復業臣始見二麥甚好秋禾亦佳在在需人芟穫意其歸里可以傭工度日或不致盡皆乏食是以未及詳議乃皇上保民若赤令臣與撫臣實心辦理臣遵即檄行各府州縣查有確實無可依賴之人計口給以穀石務使得所以副聖懷總之臣受皇上子惠元元任使微臣之至意巳耳除撫臣石文焯另摺具奏外臣謹據實繕摺覆奏伏乞睿鑑謹奏徐徐盡力為之朕自有照鑑同日又奏為據實陳奏伏祈聖鑑事竊查豫省二麥今巳盡收總計約有八九分之雨隨降田苗可以盡望豐登至臣前交界之汲縣江南鳯陽府屬接壤之考城縣據各打傷猶幸夏麥巳收秋禾尚可補種臣隨嚴飭該地方官量動倉穀加意軫恤並諭令百姓及時補題請改教職尚有庸劣不堪數員臣亦現在查核詳揭聽撫臣題參外而量才酌調之處臣自問庸愚不敢冒昧舉行因思建德自臣到任以來見其踴躍奮力不辭勞苦辦可供職河南府知府張漢人亦朴實初任外吏事尚未諳止有歸德府知府談九叙年力衰邁事多叢脞臣諷其知機告退以免貽誤但聽其去就鴻恩出自聖裁謹奏所奏俱悉雍正二年五月十二日河南布政使臣田文鏡謹奏為自陳薦舉非人仰祈皇上即賜斥革嚴處以警冒昧濫舉事竊臣一介庸愚毫無知識於雍正二年二月十八日上覲天顔荷䝉諭旨垂問知有做官好者無論親友命臣舉奏臣謹據耳目之所聞見如江西瑞州府知府劉元琦官聲好人去得山西汾州府同知楊飛熊有才有守勤慎敏練可稱良吏即於二十日具摺陳奏不謂劉元琦竟有收受鹽商銀兩之私近晤晉省來人知楊飛熊復有虧空改作民缺之事臣從前保舉之時雖不敢一毫欺罔但似此疏忽冒昧妄薦不特昏瞶已甚抑且實負聖主未有之隆恩清夜環思殊覺惶愧無地罪莫可逭伏乞皇上將臣即賜罷斥嚴加處分庶臣心得以稍安而薦舉不實之員亦知有所警惕愈加慎重矣臣不勝戰栗待罪之至謹奏知人則哲惟帝其難之即親子亦安能保其終始如一今若治爾濫舉之罪嗣後尚望有推賢薦能之人乎但經厯此等謬誤惶愧在所不免自茲以往加詳加慎斯可耳特諭汝者倘偶失鑒别舉非其人覺察之後不自文飾偏袒遮護則不得謂之過舉過而不改是為過矣當切記以為終身誦同日又奏為欽奉上諭據實覆奏仰祈睿鑑事雍正二年五月初二日撫臣石文焯傳臣至署捧出硃批諭旨聞爾河南省將州縣火耗贏餘一概盡歸藩庫以補虧空又每千兩解費二十兩名曰平餘州縣分文不與有官窮民困之論等因欽此臣跪誦之下惶悚無地伏查豫省火耗原與正糧一封投匱而贏餘銀兩則係拆解時逐封歸併而出或多或寡亦無一定多則每千兩有六七兩至四五兩少則二三兩而止並有竟無贏餘者臣等恐火耗起解而贏餘留之州縣則州縣冀得餘銀難免重收暗加之弊故一槩令其解司使之自知無利斷不肯髙下其手以剝民脂此火耗贏餘之所以飭解亦可助公項之不敷也再臣到任後查知州縣起解錢糧即將火耗擅自扣留養亷亦有本無虧空錢糧捏稱因公那墊竟自扣存以作抵補臣思若如此混扣則人亡産絶無著虧空將何以補臣所以諭令凡有那移虧空者即應揭參而養亷銀兩亦須詳明批允方許扣留至每千兩有解費二十兩名為平餘臣查厯任布政使及牟欽元任內火耗未解司庫之前每千兩原有平頭一十八兩亦無二十兩之多自臣到任以來將前項平銀以及一切雜項使費門包之類盡皆通行禁革又恐州縣解役朦混本官以致苦纍小民隨檄令各屬將法馬攜帶赴省與部頒法馬較凖發回令其遵照兌足起解不須分毫多帶以備舊日平餘之費再各屬養亷銀兩前經撫臣石文焯奏明䝉皇上俞允現今春季蚤已飭令扣留養亷並無分文不與之事但錢糧封匱耗羡起解州縣自不比昔日可以自恣而一切陋例盡皆禁革百姓俱各安樂並無民困之處臣謹據實奏覆再䝉聖諭白蓮教等姦民蹤跡詭祕務須密訪嚴察此誠皇上詰姦止邪整齊風俗之至意臣自到任後因前有亢挺一案亦時刻留心巳經通飭嚴查保甲今惟有與撫臣恪遵聖訓竭力密訪留心料理斷不敢少懈以副聖懷合并奏聞謹奏朕初聞官窮民困之論即經降諭云斯語殊屬難信爾等寧有如是荒唐之理今覽所奏剖悉雖明究係爾等撫藩料理不妥致生猜嫌怨憾且更有甚焉者言爾等如此作用勝如收受節禮云云爾等居心自不如是而形迹之間或不無稍涉疑似其留心檢㸃秉公調劑毋令人有隙可乘方為盡善勉為之同日又奏為遵旨覆奏仰祈聖鑒事竊臣欽遵惠之流至收民譽誠如聖鑒再今春欲告終養原有此說而百姓環繞泣留訪無此事且陳時夏所少者隨機應變凡遇疑難之事不免遲緩必須得人助理方克有濟此撫臣石文焯所以有懇請調內之奏然辦理漕運雖不能敏捷亦未有遺誤洵如輿論若云辦漕不逮伊去後别員更不逮矣臣謹細加睿鑒臣前奏豫省蝗蝻生發立即嚴飭各屬設法上緊撲捕已據各屬陸續具報有盡經撲滅出具印結申送者亦有十去八九尚未淨盡者臣因蝗蝻為害民食攸關特與撫臣商酌給銀換錢每蝗蝻一斗賞錢隨即刨掘深壕用土掩埋今奉撫臣准到部咨內開尚書勵廷儀條奏捕蝗之法臣又隨即逐一遵行不敢怠緩竝嚴飭各屬凡有生發之處竭力上緊撲捕務期盡絶以副聖懷再查豫省于五月初一日大雨普降據報到之開封等八府一州所屬盡皆霑足又於五月初七日辰刻得雨至夜復得大雨暨初八九十等日連得時雨田禾勃發民情歡恱此皆我操守亷潔委係一塵不染理合一併奏聞謹奏覽雍正二年五月十七日河南布政使臣田文鏡謹奏為遵旨據實覆奏仰祈睿鑒事雍正二年五月十三日撫臣石文焯傳臣至署捧出聖諭臨潁縣知縣林貽熊儀封縣知縣袁珂二人聲名諭撫臣與臣細訪的確據實合詞具奏欽此臣遵即留明白再查鄭州知州高文愷該州地方從前並無飭該州出錢買蝗並上緊撲滅盡絶去後至其人居官頗好才甚堪使亦無不實心任事之處彰德府知府朱鈞其居官之處臣於閏四月二十八日摺內已經具奏聞併詳揭撫臣題參除林貽熊袁珂二人聲名臣與撫臣合詞具奏外謹將髙文愷朱鈞一併據實覆奏統乞皇上睿鑒謹奏知道了同日又奏為遵旨據實覆奏仰祈聖鑒事雍正二年五月十三日撫臣石文焯傳臣至署捧出硃批諭旨臣跪讀之下慚悚無地伏查河工所需草束人夫臣於本年三月內赴任路由工所隨留心逐細察訪知每草秸一斤原議開銷正項銀一釐祇因從前年歲歉收草價昻貴加之運腳每斤實至三四釐之費逮至去秋收成大有每斤止費至二釐許今歲百姓多有自運至工所售賣者每斤草價仍止二釐此連運腳均在其內值今二麥豐收秋成可望每斤一釐儘可買備而挽運轉輸自不得不稍借民力如果有虧價值有纍百姓臣即冒死入告亦所不辭況皇上愛民如子不惜帑金臣有何慮而故為緘默耶蓋因原非苦纍而稍借民力亦分所宜然此臣所以不敢冒昧具奏者也再查條奏內所陳每縣一年統計約賠數千金承辦州縣先猶那動庫銀再圖彌補今則正項隨徵隨解火耗亦解補虧空無項可那不得不按派里民押令辦運等因臣查先前草束檄發附近各州縣採買州縣轉發里民辦運已經數載並非因火耗起解而始令里民辦買亦非通省百姓均有派運之事蓋緣草束秫秸俱係産自民間既將銀兩發與州縣承辦州縣勢必散之里下豈有舍現在物料而另向他處購求者乎又查河工夫役工價原估乾土每方一錢二分扣存加一節省暨夯硪檾辮等項共銀二分四釐外每方應領銀九分六釐又原估水工每方一錢六分扣存加一節省暨夯硪檾辮等項共銀三分二釐外每方應領銀一錢二分八釐至於需用人夫分派附近州縣州縣按照百姓地畝或頃半或二頃出夫一名論方做工正與紳襟里民一例當差之例符合臣訪聞南河每土一方工半可以做就每日每名可得工銀五六分竟有謀之而不能遽得者其如豫省之民向稱懶惰偷安且不諳做法以致每方竟有做至四五工者其工價之多寡皆由勤惰而分則又非州縣派撥之過也况做工者俱係地多之戶不能親自赴工即雇覓貧民代往除工價之外尚有幫貼則是無地貧民正可藉此以資衣食原非苦纍之事且豫省堤工從前俱係里民自行修築連年以來仰沐聖祖仁皇帝𢎞慈復䝉皇上軫念民生不惜數百萬金錢興工築堤下掃堵塞特設副總河以專其任又設河員辨目分理其事遂使黃童白叟共享升平之福而富戶貧民均各保其地土全其家室是雖有運送草束之勞亦屬分所當然況古來國家凡有工役差徭動煩民力我朝百姓除完正項錢糧之外毫無一事較之往古勞逸不啻天淵相隔而目下因興大工兼之伏秋在即難於雇覓如此之多因而責之州縣領帑給發暫撥一時若至堤成工竣而地方百姓即貽子孫千百年無窮之利是名雖為國實所以為民豈可遽謂之纍耶緣奉諭旨事理理合據實覆奏仰祈睿鑒謹奏所奏甚屬明晰朕懷為之頓釋但小民蒙昧無知遇有類斯借力之事當預為申明利害將往昔苛政本朝恩澤現今不得巳暫時派撥各情節逐一分剖示諭皆令曉然知悉則此等怨聲自止息矣不然蚩蚩愚氓只管目前昨歲之事已懵焉莫省奚論往古來今勞逸天淵相隔耶就中更有一二不安其分之刁頑襟監出而慫慂播弄將小作大數白論黑以故橫議由此而起也嗣後凡地方上一切弛張政令興舉差徭總宜預先明白曉示則若輩姦徒縱懷不良之志亦無法可施矣同日又奏為預陳分隸之制仰祈睿鑑事竊臣因開封等府州縣過多地方遼濶知府難以稽察請照依晉省分隸統攝繕摺具奏仰沐聖恩硃批諭臣與撫臣詳議妥商具疏題奏欽此臣遵即按閲輿圖逐細斟酌復與撫臣石文焯再三確議開封府屬則除近府之祥符陳留杞縣通許陽武太康尉氏鄢陵扶溝蘭陽儀封洧川中牟封邱等十四縣仍歸府管轄外其餘各縣擇其附近而路順者歸併分隸以西華商水項城沈邱四縣分隸陳州臨潁襄城郾城長葛四縣分隸許州密縣新鄭二縣分隸禹州滎澤滎陽河隂汜水四縣分隸鄭州其原武延津二縣查懷慶府止轄六縣以原武歸併懷慶府就近統轄衛輝府亦僅六縣以延津歸併衛輝府就近統轄河南府屬則除洛陽偃師鞏縣澠池孟津宜陽登封永寧新安嵩縣盧氏等十一縣仍歸府管轄外請以靈寶䦩鄉二縣分隸陜州汝寧府屬則除汝陽上蔡新蔡西平遂平確山信陽羅山等九州縣仍歸府管轄外請以光山息縣固始商城四縣分隸光州所有各縣錢糧查核督催知州照知府之例處分而直隸各州錢糧光州則令南汝道盤查陳州許州禹州鄭州陜州則令開歸河道盤查如通同徇隱亦照知府之例處分庶責成既專而虧空可杜地近事簡而諸務易查至鄭州知州髙文愷光州知州劉學禮禹州知州屠用謙人才尚有可觀應請令其暫試管轄外再查陳州賦役繁重路當孔道陜州管轄靈䦩二邑素稱難治現任陳州知州林鴻暹品行久著不端不便令其統攝陜州知州李尚德甫經到任臣查裕州知州蔡維翰磁州知州范時緒才俱可用請以蔡維翰與林鴻暹對缺調補以范時緒與李尚德對缺調補以上各員倘不相宜容撫臣另選題請簡補又查許州知州王士俊臣於五月初十日晤撫臣石文焯云已將知州王士俊平常以之料理偏僻小邑則可臣到任後曾向撫臣言過今各縣至祥符縣事臣伏查得宜陽縣知縣郭朝鼎才堪肆應辦事勤敏可否將王士俊仍留許州任祖承祚調補宜陽縣缺郭朝鼎調補祥符縣缺一題請旨外理合繕摺預奏仰祈皇上睿鑒施行謹奏所奏俱悉爾與撫臣石文焯商計妥確時具疏題請可也雍正二年六月二十二日河南布政使臣田文鏡謹奏為特懇聖恩簡發賢員以勷盛治事竊查豫省州縣各官其中才堪任使政務練達者止有數員而循分供職暫獲一時無過者比比皆然乃自興築大工以來又多調赴河干刑名錢穀以及一切應行事宜每至壅滯若再遇事故及被劾員缺求其就近可以檄委署理者竟無其人即或間有才情略可兼攝之員非現居衝繁要地即動隔數百餘里往返奔馳不無顧此失彼之虞用有太康陽武洧川獲嘉輝縣河內修武孟縣新安南陽內鄉汝陽確山商城許州尉氏等一十六缺尚未到任并有未經銓選者雖暫時委署無奈在在需人勢難刻緩且臣前經摺請酌調繁簡仰沐聖恩批諭臣與撫臣商酌具疏題請今查據地方繁簡遴選人才髙下殊覺缺多員少不敷調用臣隨向撫臣石文焯告知臣前在京恭聆聖訓時曾經冒昧陳奏荷蒙聖恩有俞允之旨乃據撫臣云前巳兩次具奏未䝉賜發不敢再懇臣伏思皇上勵精圖治無時無刻不以吏治民生為念臣目擊地方乏員料理何敢壅於上聞仰乞皇上格外施恩將卓異候補候選人員內簡發二十員勒限到豫酌量委用如果才能稱職詳請撫臣具題實授庶諸事不致廢弛而臣亦得收臂指之效矣理合繕摺題或特旨簡發臣不勝悚惶待命之至謹奏據奏地方乏員料理候朕揀選發往從前未准該撫所請今乃依汝所奏非薄巡撫而獨厚於藩司也蓋念豫省向日綱領未舉吏治淆混縱命能員前來亦無裨補目今氣象似覺改觀應需才幹之吏以助不逮以供調遣故爾允行此摺本應發回仍令石文焯奏請方為合理但閲汝摺中有告知撫臣撫臣不敢再請之語則此摺即如爾同石文焯㑹奏無異也將朕批諭述與石文焯知之同日又奏為據實奏聞仰祈聖鑒事雍正二年六月初九日臣齎摺家人回豫恭捧皇上硃批諭旨到署臣隨跪誦細繹所有河工物料人夫一事仰見睿慮周詳盡善盡美無以復加臣惟恪遵聖訓竭力奉行凡有類斯借力之事務使愚民共曉茲於本年五月二十二日有開封府屬之封邱縣因時當伏汛北岸大堤工程緊急該縣唐綏祖即按照地畝飭令各社添雇人夫論方給價實無短少忽有劣襟王遜溫濬方元龍方元璐杜菁莪邉長虹武生范瑚王前并姦民潘得仁徐丕泰等一百餘人赴撫臣衙門具控詞內首列王遜名字而舉人進士反居其後經撫臣批開封府查報去後乃王遜等復乘唐綏祖赴鄉捕蝗至晚回縣聚集數十人攔阻不容進城口稱築堤不許雇覓社夫並稱徵收錢糧應分别儒户宦户如何將我等與民一例完糧一例當差當據該縣稟報隨經撫臣委令開歸道陳時夏親赴該縣地方嚴查確情并曉以大義示以利害而王遜等即行退避百姓俱帖然赴工力作臣與撫臣商酌因事內盡屬文武生員又聞學臣不日回省考校誠恐查拏過嚴以致脅衆罷考所以暫緩時日再行嚴拏具題請旨不謂王遜等野性未馴果乘學臣回省開捏欵單赴學臣衙門違例投遞匿名呈狀控告知縣唐綏祖學臣張廷璐遽准批開歸道查訊因而王遜等又脅衆阻遏考試封邱一邑文武生童僅有生員二十三名應試餘皆罷考又有武生范瑚等於途次竟將封邱縣呈送學臣考試童生用印册卷擡去希圖挾制官長不法殊甚撫臣與臣巳將王遜等現在批飭開封府嚴拏訊究除撫臣石文焯備細繕摺請旨並移咨催令學臣張廷璐㑹稿具題外臣謹據實奏聞伏乞睿鑒謹奏諭石文焯田文鏡知悉朕觀王遜等咆哮光景所奏猶屬未盡更恐生出事端爾等先將為首者出其不意拏禁省城候遣部臣前往審理如果情真罪當必將一二渠魁正法示警刁風方可少息此諭暫且密之但云遵奉特旨命將生事生員王遜等速行拏問一靣奏請定奪如是宣示於外遣部臣之旨尚未發出俟題本一到即行頒降同日又奏為據實再陳仰祈睿鑒事竊查豫省提解耗羡一項實係臣等料理未妥以致嘖有煩言上厪聖懷臣於雍正二年五月十二日曾經備細具摺覆奏奉有硃批諭旨臣捧接聖諭反覆跪誦感激之下又不勝悚惶無地矣夫豫省提解耗羡臣未到任時已經撫臣石文焯分析具摺奏明通行各屬而臣自到任後復將從前一切陋例以及平規使費盡皆禁革並諭令各州縣攜帶法馬赴司較凖銀到即收逮後支放錢糧即將原兑之銀照數給發並無絲毫短少至於所收耗羡每月造册報明撫臣如有因公動用詳請批示存查核算然後照依庫法支給亦無絲毫染指而論者以為耗羡歸公勝如收受節禮是徒知耗羡之入而不知耗羡之出且徒知昔日之收放錢糧而不知今日之所以收所以放也且臣仰沐聖主隆恩賞給養亷一切需用已充然有餘若再不思殫心報效貪汚茍且臣恐聖恩雖寬即天地鬼神亦斷乎不容所以臣自山右及至中州以來諸事秉公纖毫無染兑收支放均平如一而赤心為國之處每多嫌怨臣實不避至於上下過往交結逢迎之術臣又秉性孤介亦所不能藉非恭逢皇上明並日月知臣之深信臣之切臣未有不自危者矣但受恩愈重圖報愈難惟有恪遵聖訓竭誠勉力益矢清潔以仰副皇上知遇之隆恩已耳為此謹奏所奏知道了但秉公忠行去何危之有若少雜一毫私念亦難瞞朕鑒察爾係深知朕意者朕亦信得爾及勉為之同日又奏為遵旨據實再陳仰祈睿鑒事竊臣前因祥符等十一州縣蝻子生發繕摺陳奏捧接硃批諭旨令臣嚴飭撲捕無遺此事最關緊要欽此臣遵即凜奉聖諭凡有未盡者捐給銀兩嚴飭各屬實力撲捕已盡者仍諭各屬不時查察毋使偶遺種類滋生為患今據各屬結報內尚有數處續生蝻子未經盡絶現在上緊撲滅並不敢稍懈查豫省秋禾髙糧穀聖懷再臣前請酌調繁簡誠如聖諭內有甚不職者即簡處亦係吏治民生所關毋容姑息臣斷不敢稍顧情靣以為曽經調簡以卸瞻徇之咎如有才具庸劣操守不堪之員遵當立即詳揭以肅官方其應調之員臣已與撫臣石文焯現在逐細商酌務期公當呈詳撫臣具疏題請至臨潁縣知縣林貽熊儀封縣知縣袁珂二人聲名頗好才亦去得鄭州知州髙文愷先前隱蝗未報之處臣實不知已䝉皇上洞鑒至其人才具實堪任使臣惟有恪遵聖諭再加留心察驗原任許州知州今調補祥符縣王士俊誠如聖鑒其人甚優才具極好彰德府知府朱鈞臣已具詳揭報應聽撫臣題參歸德府知府談九叙現在差取原籍印結一到即告終養併祈睿鑒謹奏各項情節俱悉雍正二年七月初七日河南布政使臣田文鏡謹奏為封邑首犯已獲地方寧靜仰祈聖鑒事雍正二年七月初六日臣齎摺家人回豫恭捧國法而刁風可以永戢矣臣遵即傳諭撫臣石文焯見其跪聆之下感激聖恩不勝踴躍歡忭并飭開封府將已獲人犯加意看守候旨定奪外臣查為首之王遜溫濬方元龍方元璐杜菁莪邉長虹邉峰范瑚鄧九芳徐丕泰等據開封府詳報已經陸續拏解到省轉發祥符縣羇候訖只有武生王前姦民潘得仁尚未弋獲現今嚴飭該府勒緝務獲聽候審訊外其文童於六月二十五日考試武生武童於七月初一日考試文生於初二日補考自拏之後並無一人再抗地方寧謐至工所用人夫從前原無變動現今俱各竭力做工並無異說臣又查各處堤工仰賴皇上誠敬感格因而河伯著靈伏汛平穩秋汛可保無恩簡發賢員一事仰荷皇上俞允賜發臣遵將聖旨傳諭撫臣石文焯跪聆之下不勝感激歡忭臣查從前河南吏治誠如聖鑒綱領未舉吏治混淆乃蒙皇上睿照命臣赴闕諄切指示豫以重任臣自到豫以來恪遵聖訓逐一宣布并竭力激發撫臣凡有關於吏治民生一切事宜振綱肅紀執法秉公數月以來各屬頗改前非實心任事并有清亷愛民之員然臣自問皇上英明果斷神算無遺之所致也但臣未䝉聖諭亦不敢冒昧遽陳乃不意豫省近日光景早蒙聖明洞鑒臣不覺愈切悚惶益自奮勵矣新選汝寧府知府張玢臣等俟其抵任謹當仰遵聖諭留心試用至臣謹奏耗羡一事荷蒙皇上明並日月知臣之深信臣之切此誠千古未有之遭逢臣惟有愈加勉勵一切秉公竭誠辦理以仰副聖主照察且臣留此微資歸於何用清夜環思不覺感激涕零益深兢惕再查豫省穀黍髙糧早者俱已刈穫約計收成有八分九分十分不等晚者亦甚茂盛在七月二十外盡可登場臣訪問各屬農民咸云十餘年內無此豐收皆賴聞謹奏覽硃批諭旨卷一百二十六之一欽定四庫全書硃批諭㫖卷一百二十六之二硃批田文鏡奏摺雍正二年八月初八日河南布政使臣田文鏡謹奏為據實密陳仰祈聖鑒事雍正二年七月二十五日沽名袒護之意幸諸事俱係公阿爾松阿主持且要略謹另繕簡摺具奏至此案作何定擬題結因事甚祕密無從得實不敢冒昧具陳但臣查案挾官罷考情狀極其可惡而學臣始終亦無一言嚴飭止將匿名呈狀批發開歸道查覆并令代載審理事件即舉人進士尚不許坐質何況秀才乃陳時夏如此優待不特全無監司之體抑且殊開封府稟請作何施行回稱我只管人命盜案餘事非我職掌等語臣查臬司一官有查拏勢豪光棍之責而於此等事如是畏縮所謂風憲者安在耶再臣伏查撫司各衙門自火耗提解之後府州縣至省尚有門包規矩之費臣到任半月餘訪知積弊因將各衙門陋規一概通行革除凡接見各皇上深恩分宜一體實心辦事竭力報效始不負聖主任使之至意况豫省積年以來上偷下慢廢弛已極尤當急為整頓剔弊除姦愛養百姓原非臣一人所能挽回所可盡更者也其如諸臣俱欲沽名盛治臣聞生童云宗師甚寬按察使安靜陳守道是好人之稱殊不知諸臣獲有虛名一切茍且實誤大事若再因循數載將見流弊所極更難整理臣蒙皇上至聖至明無微不照此臣之所以捐棄身家不避因將各犯盡皆弋獲否則雖不致俱各逺揚亦斷不能緝獲整齊其感激自奮之處理合一併奏聞統祈聖鑒謹奏覽奏朕甚嘉之諸凡自有制度聽旨可也同日又奏為遵旨覆奏仰祈聖鑒事雍正二年七月二十一日臣齎摺家人回豫恭捧皇上硃批諭旨到臣臣跪誦之下不覺感激涕零悚惶無地至臣前奏豫省各屬所生蝗蝻臣時刻留心晝夜督催不遺餘力并嚴飭各屬多帶人夫上緊撲捕隨生隨即撲滅實無損傷田禾之處只有懷慶府屬之河內修武武陟三縣內有數村逼近太行飛蝗自山而至據委捕之懷慶府通判髙士鑰稟稱數村田禾幾塊地內略有損傷隨嚴飭該府作速查驗督捕據報蝗已盡滅數村田禾計實損傷無百分之一並不成災等語今䝉皇上敕諭理合據實奏聞再查今歲豫省秋汛自七月十七日河水長起至二十七日水勢甚大祥符縣之老劉家店暨時和驛步李寨張家灣靑佛寺一覽臺等處大堤外之民堤水與堤頂相平民堤被水浸透以致大堤根下亦皆有水而鄭州藍家屯等處河水竟長與大堤堤頂相離不過數寸勢甚危險幸荷皇上天恩不惜百萬金錢加工預為堅築並特設副總河董司其事復添河㕔河員暨武辨目兵分修防護又䝉聖恩敕建金龍神祠特頒寶幡扁額用光廟貌因而至誠上格河伯著靈於二十八日水勢停止日漸退縮仍歸故道堤根復出其餘各堤俱獲平安不特沿河百姓歡呼雷動感頌天恩即八郡一州之民亦莫不仰戴洪慈共歌聖德現今各處堤工仍照前日夜在工用力修築可保致失所理合一併繕摺奏聞伏乞睿鑒謹奏覽奏朕懷深慰誠屬可喜可慶之事也同日又奏為據實奏聞仰祈聖鑒事雍正二年八月初五日據撫臣石文焯河臣嵇曾筠將河工免調州縣之㑹稿各發與臣閲看臣查奏稿內開沿河十四州縣離工甚近往返料理勢易兼顧況募夫辦料之外又有河汛各員協力幫修本地方刑名錢穀諸事自可依限完結不致遲誤嗣後非猝遇危險緊工若附近印官免其調遣永以為例可也但臣伏思朝廷設官分職各有專司河員專理河務州縣專理庶政原毋容牽扯混雜況現奉皇上軫念河工關繫民生休戚特設副總河董司其事又添設河道河員暨武辨目兵分修防護而辦料雇夫又動用正項錢糧按時給發況今歲大工一過嗣後不過年年歲修搶修而已更不必再責之州縣為之經營調度也乃不謂豫省之河工辦料雇夫以及承修興築俱屬州縣而河㕔河員反不過從中丈驗往來稽查至於三年保固無虞河員得以循例議叙州縣則又置之局外倘一有踈失河員固不能免過州縣亦并干嚴處是利則河員獨享害則州縣共被在州縣亦何樂有此河員也且臣查州縣之在河工不特河㕔各員得以借查丈堤工名色魚肉州縣即一切管河州同縣丞等官亦無不向州縣需索至於辦置物料運赴河工必須講究然後稱收所以年來州縣無不因河工賠纍致虧庫項今河臣嵇曽筠㑹稿內辦料募夫其意仍欲責之州縣夫州縣之不能越境辦募者其勢也既不能越境辦募自不得不按照地畝門頭派之里下一經攤派其中便有蠧役土棍或受賄那易李代桃殭或勒價包攬以一科十州縣雖甚亷明亦不能逐細查察而官民巳不勝其纍矣臣再查㑹稿內附近印官免其調遣沿河十四州縣離工甚近仍令其往返料理但臣查通省州縣俱屬臣工若僅責之十四州縣是臨河者有河工之纍不臨河者獲安享之利實屬偏枯且從前臨河州縣即調赴河工猶屬僅奉河臣之令今若一經題定較之往昔更難移動而河㕔河員愈可肆其欺陵需索甚非計之得者也況今歲年登大有物料價值自平現今多有百姓各自運赴河工售賣亦甚易得而夫役一項又當農隙之時更易雇募臣查目下鄭州等處俱係自雇人夫並不派之里下若乘此時多買物料廣募人夫分任河員用力堅築便屬一勞永逸州縣似可概行免調以免苦纍臣雖將情節巳與撫臣面言但改奏與否則事由河臣暨撫臣主持臣自不敢擅參末議緣身受聖主隆恩至深至渥今目擊其中利弊不敢不據實預為奏聞伏乞聖鑒謹奏此奏揆情度理而論固屬允當但慮河工萬一有事地方官以為於巳無涉任呼不應脫致貽誤耳朕意或仍令幫助一兩年然後專責河員因此躊蹰未決候發廷臣議覆到日再定同日又奏為欽奉上諭事雍正二年七月二十日撫臣石文焯傳臣至署捧出撫臣所奏豫省捐納貢監以穀改銀奏摺一扣恭謝天恩奏摺一扣內奉皇上硃批諭旨俱令臣知臣看臣跪接拜誦逐字細繹仰見我皇上至聖至明無微不照不特撫臣慚愧無地即臣亦悚惕靡寧矣但臣伏查捐納一事於七月初三日撫臣曽與臣商酌臣以為目下穀價雖賤若改收銀兩投納司庫又是一番更張日後即按時價給發州縣採買從中便有不肖各官扣剋纍民之處不如照依赴部捐納之數議加穀石方於國計民生兩有裨益乃撫臣執意奏請改捐殊覺轉移失術自難逃於聖明洞鑒今撫臣亦無可置辨惟有欽遵訓旨并悔不聽臣言而巳今現在酌議加捐穀石俟各府議覆到日詳請撫臣具題第念臣何人斯乃䝉聖恩委任迥異等倫即撫臣奏謝二摺亦令臣知臣看不覺愈增悚懼罔知所報惟有一切秉公振綱肅紀俾地方大小各官咸知自愛共養黎元庶耿耿寸心少酬髙厚於萬一為此謹奏爾之存心朕所深悉諒必不忍辜負知遇但堅守此志終始不移方為純美同日又奏為循例冒懇仰祈聖慈垂憐格外榮封事竊臣自愧庸愚涓埃未報焉敢越分妄求仰邀曠典但臣伏查雍正元年十二月二十二日恭逢恩詔內開一從前恩詔後升職加銜之職銜給與封典欽此臣於雍正元年八月初九日奉差山西賑濟事竣回京復命即於八月初十日仰沐聖恩命臣署理山西布政使臣遵即於九月初十日抵晉任事與升職加銜之員似不相符乃臣近閲邸鈔見有威寧總兵官石禮哈去年係二品今升一品懇求一品誥封已蒙特恩賞給今臣幸沐聖主隆恩簡補豫藩濫叨二品之職臣曽祖父母祖父母父母從前恭逢恩詔俱受過三品誥封尚未因臣追贈上邀盛典清夜環思殊深負疚倘䝉皇上𢎞慈念臣景迫桑榆格外垂憐并臣有加職二級賞給一品誥封得封三代則臣有生之年皆銜結之日矣理合繕摺奏懇伏乞聖鑒臣不勝悚惶待命之至謹奏少遲時日俟汝更進一步再行奏請可也雍正二年九月初三日河南布政使臣田文鏡謹奏為聖恩之髙厚無極微臣之圖報愈難謹陳下悃恭謝天恩事竊臣一介庸愚毫無知識仰沐皇上知遇隆恩調補豫藩以來涓埃未報時切惴惴復荷聖恩命臣署理河南巡撫印務似此天髙地厚之恩即竭盡血誠捐糜頂踵亦何能仰報𢎞仁於萬一但臣伏思巡撫一官責任綦重凡有關於管錢糧即偶有踈忽之處尚有巡撫為之更正可以暫藏其拙臣自問才識短淺於藩司任內即竭蹶辦理猶恐不無舛錯何堪復邀曠典兼此重任聞命之下不覺憂懼悚惶莫知所措惟有盡臣之心竭臣之力秉公執法愈加勉勵以效犬馬報主之誠而巳所有微臣感激私忱合先繕摺恭謝謹奏豫撫之任汝優為之但天下事過猶不及適中為貴朕不慮汝不及反恐報效心切或失之少過耳同日又奏為遵旨據實覆奏仰祈聖鑒事雍正二年八月二十四日臣齎摺家人回豫恭捧皇上硃批諭旨到臣臣隨跪接拜誦敬謹遵奉所有臣前奏被水地畝今據沿河州縣報稱髙糧穀黍俱已收穫至如蕎麥黑豆之類雖稍有被淹但其中地有髙下目今黃水退淨之處現在布種秋麥其存有數寸積水一時不能涸盡之地再俟逾月水亦盡乾尚可種植春花勘不成災至於內有實在窮民臣隨檄飭各屬逐户挨查如有應行賑濟之處臣自當恪遵聖諭加意撫恤繕摺奏聞斷不敢使被水百姓偶致失所上厪聖懷然臣復有請者查開封府屬之祥符汜水原武封邱中牟等縣堤外地畝自黃水衝決堤岸以來業經數載不能種植士民苦於賠糧紛紛具呈懇請題豁雖據各該地方官造册詳報臣現在委員履畝旨至臣前奏河工免調州縣一摺欽奉硃批諭旨仰見我皇上睿慮周詳無微不照臣復再四籌畫今歲年登大有物料易得而農忙已過雇夫亦易莫如沿河十四州縣與河官分辦物料分築工程如遇桃伏秋汛以及萬一有事之時仍令州縣協力防護公同搶修而閒時州縣亦得稍有餘暇經理民事庶河工與縣務兩不貽誤臣再與副總河臣嵇曽筠斟酌議妥㑹同入奏伏祈聖鑒謹奏若有才守兼優堪任藩司之職為爾素所深知者密舉二三員來以備選擢朕從來用人不悉拘資格即或階級懸殊亦屬無妨同日又奏為據實奏明仰祈聖鑒事竊查豫省駐防滿洲官兵康熙六十一年十月至雍正元年四月終止應需粳米每石一兩八錢粟米每石一兩七錢黑豆每石一兩五錢草每束一分九釐雍正元年五月起至九月終止所需粳米每石二兩四錢粟米每石一兩八錢黑豆每石一兩五錢草每束二分以上各項價值於未奉定議之先遵照時價再四駁核確估詳報題請一面採辦按月支給今經撫臣石文焯兩次具題屢准部覆行令照依折中數目動給但駐防滿洲官兵於從前每月初二日領餉之後米豆草束挨次支取刻難緩待已照時價辦買支發況折中定價於雍正元年七月終始行奉文除八月以後已經遵照定價折給官兵自行採買而七月以前久已按月支領今若遵照折中定價向各官兵倒追其如米糧養贍家口豆草餧養馬匹早巳逐日用訖若問之經手採買之人在行戶以料物而易價值既無浮冒更難追取臣自抵任以來確訪此項價值實因豫省屢歲歉收物價騰貴原任祥符縣知縣卞永祜任內原無短發亦無冒銷臣伏讀上諭如豐收之年價值低微少有餘剩於我官兵亦有裨益如歉收之年價值高昻督撫聲明具奏施恩等因欽此則似前項價銀適與恩諭相符應否再題請銷臣不敢冒昧具疏洪恩出自聖裁合先繕摺請旨伏乞聖鑒謹奏此項米豆草束因豫省近歲歉收價值過昻固屬實情但事處兩難若竟准銷恐開别省效尤之端向兵丁追取又無此理朕意或於地方公項內設法完結庶幾善全倘力不能具疏題奏候朕再加斟酌雍正二年九月二十四日署理河南巡撫印務布政使臣田文鏡謹奏為恭謝天恩仰祈聖鑒事雍正二年九月十七日接准部咨內開封邑生童王遜等罷考一案欽奉旨內事理移咨到豫臣隨折閲拜誦欽惟我皇上仁覆萬物德被羣生重道崇儒四海振興文教開科廣額普天共慶風雲不期猶有封邱縣生童王遜等智類城狐狡同社鼠因河工雇夫捏稱知縣短發土方工價號召生童阻衆罷考經臣繕摺具特命大臣來豫審理人人以為三尺不赦罪無可逭矣乃又荷皇上湯網開三舜刑警百立誅首惡末減餘從聞命之下臣即檄知各屬宣諭皇仁廣布聖恩浩蕩餘從寬典踴躍歡呼盡皆革面革心不特臣任茲土地方諸事可以盡力振興即薄海內外臣民亦無不輸誠向化共歌聖德咸樂堯天於億萬斯年矣理合繕摺奏謝伏乞聖鑒謹奏賞罰原屬一理為治平之大綱絲毫不容稍偏也同日又奏為據實奏聞仰祈聖鑒事竊查豫省南北兩岸堤工連年潰決荷蒙我皇上保民若赤不惜百萬金錢命大臣駐劄工所董司其事復添設河員辨目協力堅修又敕建金龍四大王廟特頒扁額寶幡用光廟貌是以今歲河伯著靈自夏徂秋水勢安瀾堤岸平穩從此沿河數十郡永固金湯澤畔億萬民咸歌樂利皆我皇上神謀睿算手畫平成之所致也但臣伏查南北兩岸加幫大堤所做工程僅足十分之三臣自接署撫後隨移咨副總河臣嵇曾筠并嚴飭印河各官趁此天氣溫和夫料易得之時多募人夫廣買物料協力堅築務於來歲伏汛之前將大工告竣庶免貽誤第不知果如臣願否耶再查廟工現在興工修理的於歲內即可告成理合一併奏聞仰祈聖鑒謹奏督令極力趲修可也同日又奏為仰懇聖恩格外垂憐以廣皇仁事竊臣一介庸愚仰沐聖主隆恩不啻天髙地厚涓埃未報寢食靡寧惟是臣年已六十有三止有一女並無子嗣且於本年六月偶染嗽血之證或半月一發或月餘一吐凡有機密奏摺以及緊要事件既不能親自繕寫又不敢假手於人夙夜倣徨莫知所措伏思現任湖南長沙府屬湘潭縣縣丞崔鏏係臣女壻於雍正元年十一月內奉文同兵科給事陳世倕押運採買米石船隻進京俱已交納䝉皇上特賞銀兩以作盤費今便道由河南回任至臣署中崔鏏自幼小心謹慎可以相為倚依且微末之員於地方無足重輕倘蒙聖恩逾格垂憐俯准掣回聽其在署侍臣左右以供書寫臣得有臂指之用則銜感皇上隆恩永無紀極矣此臣孤苦之極思不揣冒昧奏懇可否容臣題請伏候聖裁臣不勝悚惶兢惕之至謹奏已照所請諭部矣同日又奏為遵旨據實密奏仰祈聖鑒事竊臣欽奉硃批諭旨若有才守兼優堪任藩司之職為爾素所深知者密舉二三員來以備選擢朕從來用人不悉拘資格即或階級懸殊亦屬無妨欽此臣跪誦之下自問何人仰邀皇上委任責成一至於此不覺感激涕零悚惶無地矣臣才識短淺秉性孤介竭臣耳目所見所聞求其才守有餘可舉以共勷八月二十六日抵任後臣即留心細察見其才識聖恩亟思圖報之誠勃勃欲發以上二員據臣聞見所實愚昧未敢遽必緣奉聖諭垂詢臣不敢不據實密奏仰祈睿鑒謹奏再於所識之中細加思索如得入選者另摺奏聞倘意中有人而未能深信亦將情由備叙以聞同日又奏為據實奏明仰祈聖鑒事竊臣前因豫省缺多員少奏請皇上簡選賢員發豫候補仰沐聖恩逾格俯准選知縣郭紹璞委署扶溝縣事毛伯鳯委署延津縣事周璠委署唐縣事楊𢎞緒委署湯隂縣事李陳州知州林鴻暹已經乞休今准部咨為請照晉省分轄等事內開裕州知州蔡維翰調補陳州磁州知州范時緒調補陜州應將現委暫署陳州事之候選知州袁頊調補裕州臣又查磁州一缺係衝繁要地必須能員方克勝任因將候選知州金上玉委署磁州事其現委暫署陜州事之候補知州黃大成掣回另補以同知銜調補許州知州祖承祚現在赴京引見因委候選知州陳綬來暫署許州事外有太康輝縣內鄉洧川四缺業經部選有人新令尚未到任臣已委候選知縣趙可大暫署太康縣事朱體謙暫署輝縣事萬瑄暫署內鄉縣事劉輝祚暫署洧川縣事均應俟新令到任之日再有缺出另請補授以上委署各員臣於九月十五日恭疏具題訖又於九月十九日接准部咨內開奉旨南汝道佟鎮知州管祥符縣事王士俊遊擊馬世龍三員准石文焯帶往浙江俟散賑事畢即令回豫等理祥符縣缺暫委奉旨留豫補用之原任封邱縣知縣唐綏祖署理遊擊員缺暫委該營守備張孟儀署理仰祈聖鑒再查通省府州縣各官內尚有應行參革數員臣曾與撫臣石文焯說過據撫臣云大計已届為日無多若盡皆參革恐將來大典亦不成文且奉發各員內多初任容臣逐細試人之效矣是否有當統祈皇上訓示謹奏所奏各情節知道了同日又奏為欽奉上諭事竊查豫省河北郡縣捐納加增一案前經撫臣石文焯奏請改捐銀兩荷䝉皇上硃批嚴諭令臣同看臣隨經具摺奏明仍應加捐穀石復據撫臣石文焯檄司查議加增臣查據開封懷慶彰德衛輝等府報稱穀價每石自四錢起至四錢四五分以及七八分不等又經撫臣石文焯奏明每穀一石收公費銀二錢外鋪墊倉厫造册紙張飯食需銀五分計穀一石共需銀七錢上下今議俊秀捐監一名加增穀二十石連前共捐穀一百五十石約計需銀一百餘兩其餘捐貢等欵按照原定捐欵穀數核算加捐似屬平允臣已繕疏具題誠恐前議每穀一百石加增三十石今議每名加捐穀二十石或致部駁臣復再三籌畫若議增太多不免人皆裹足有誤捐案況再增穀二十石按之價值與部例每監生一名收捐一百零八兩之數相去不遠合將議加情形併穀價銀數繕摺奏聞謹奏所議是知道了雍正二年十一月初三日署理河南巡撫印務布政使臣田文鏡謹奏為欽奉上諭事雍正二年十月初三日准户部咨文內開欽奉上諭諭河南署巡撫田文鏡爾可速動司庫銀兩買米四萬石選委亷幹賢員陸續運交蘇州巡撫平糶所糶之銀仍移還補庫其米應於何處交卸爾即咨㑹蘇州巡撫酌議速行毋得怠緩遲誤等因欽此轉奉到臣臣跪誦之下仰見皇上饑溺為懷軫念江省沿海災黎之至意臣遵即檄動司庫錢糧竭力辦運外但查江南民人素食大米并有未經見過小米之人而豫省各屬止有光州固始光山息縣四處産有大米然每年所出亦甚有限現據各屬報稱米價每石一兩一二錢不等其餘各府州縣止産小米若購買大米運送江南不特徒稽時日抑且有誤賑濟如竟行採買小米運交又恐該處民人食用不慣或致阻滯殊屬無益臣再三籌畫素知江南百姓亦常食麵食每遇山東豫省商販小麥到彼民爭買食今查河南小麥每石價銀八錢上下不等連腳價每石計銀一兩內外可到目下江南麥價約略每石非一兩二三錢不可若減價平糶於饑民大有裨益而國帑亦可早歸清項除一面動發司庫銀兩遴選亷幹賢員前往光州所屬照依民價儘數採買大米運送仍一面委員分往開封等處鄰近水次産麥豐收之各該地方照依民價採買麥石雇船陸續起運外臣因時屆寒冬河水將凍若待半月內陸續可以運送但應否如此料理仰祈睿鑒指示如有錯謬之處以便臣急為更易理合繕摺請旨謹奏足見實心任事可嘉之至但聞瀕江北岸人民亦慣食小米即江南以至浙江若遇歉年亦用粟米攙和作糜云云然朕之所聞猶恐未確爾既有真知灼見徑行委員料理殊屬權變合宜雍正二年十月十二日署理河南巡撫印務布政使臣田文鏡謹奏為恭報雨澤事竊查豫省自入中秋以後民間即布種秋麥以備來歲之用目今麥苗已長望雨頗殷茲據開封等八府七州所屬俱各報稱於九月二十九至十月初二等日天降雨雪四野霑足以及三四五六寸不等民情歡悅此皆我皇上敬天勤民之所致臣謬任封疆目覩輿情曷勝欣忭所有闔省得雨分寸日期理合繕摺奏聞以慰聖懷謹奏覽雨雪情形朕甚慰悅爾緣報效心切未免急於求成以故屬員百姓頗露怨聲竟有見小巧取之訾議前因革除各項陋弊致被通省銜恨曽經詳細奏明於朕此無足怪者雖然身操統率之柄果能一秉至公施措平均官民斷無不感畏之理今乃至於怨望必有偏枯不當處深自省察究明端緒務須相機合宜寬嚴共濟徐徐循序辦理毋貽迫促之譏同日又奏為遵旨覆奏事竊查豫省折給駐防滿洲官兵米豆草束一案照依時價採買支放在先奉文折中定價在後經臣具摺奏請仰䝉硃批諭旨周詳指示臣遵即逐項細查有康熙五十九年截留漕米十萬石前署糧道吳柯前任糧道戴錦因年歲歉收米價騰貴額價銀六萬五千兩不敷採買未經買貯經前任撫臣楊宗義於奏銷册內捏造貯存河南府倉嗣經撫臣石文焯查明將不敷價值奏請著落楊宗義賠銀十四萬七百三十九兩交糧道貯庫今歲撫臣石文焯飭行糧道照一米二穀動用原額銀六萬五千兩又動楊宗義交存道庫銀四萬七千六百八十兩零買穀二十萬石存貯河南府屬州縣又武陟濟源新鄉汜水各縣虧空共銀一萬五千七百一十兩零因楊宗義未經參出將此項銀內動用撥補又撫臣石文焯奏明著落楊宗義買補偃師等縣民借康熙四十三年漕穀銀一萬二千餘兩前任布政使牟欽元傾寶折色銀二百四十六兩零以上除各項動用外尚餘銀六萬四千八百餘兩現存道庫據撫臣石文焯單開楊宗義情願歸公今可否將此項餘剩存貯銀兩撥還折中米豆草束價值銀二萬一千七百三十九兩零餘銀四萬三千九十餘兩俟有公用或楊宗義任內尚有未清之項臣再奏明動撥一轉移間而國帑可以無虧矣為此繕摺具奏伏祈皇上睿鑒施行謹奏此事可行至云楊宗義或尚有未清之項其權操縱在爾何也爾為伊之後任一切款宗無不經手檢核如肯令伊清結無纍則即清矣若不令其脫然事外自必不清矣雍正二年十月二十六日署理河南巡撫印務布政使臣田文鏡謹奏為恭謝天恩仰祈聖鑒事竊臣前因年逾六旬並無子嗣凡有奏摺既不能親自繕寫又不敢假手於人孤苦無依再三籌畫因思臣壻現任湖南湘潭縣縣丞崔鏏小心謹慎足供書寫冒昧繕摺奏懇賞給來署荷䝉聖恩格外垂憐俯允所請臣捧接硃批跪誦之下不勝感激涕零莫知所報惟有恪遵聖訓竭盡血誠絲毫不敢茍且偷安以仰答皇上天高地厚之恩於萬一耳所有微臣感激私忱理合繕摺奏謝伏乞睿鑒謹奏極當勉勵職守檢點政務近日輿論甚屬平常爾乃朕獨加賞識之人必須克稱知遇方不貽羞於世也同日又奏為恭謝天恩仰祈聖鑒事竊臣前於雍正二年十月初三日接准部咨欽奉上諭敕臣速動司庫銀兩買米四萬石陸續運交蘇州巡撫平糶毋得怠緩遲誤等因欽此臣因豫省所産大米無多且素知江南百姓亦常食麵食隨一面料理買運麥石一面繕摺具奏茲奉硃批諭旨足見實心任事可嘉之至臣跪誦之下莫知所報伏思應買米石今運小麥仰沐聖慈不加譴責已屬萬幸何期復蒙恩旨格外奬許似此髙厚之恩即竭盡血誠總不足圖報於萬一也臣查所買小麥三萬五千石大米五千石已於十月十三四五等日裝載起運陸續交署蘇州撫臣何天培兑收平糶臣又查江北民人誠如聖諭多食小米合併覆奏除米麥船隻開行日期容臣恭疏具題外所有微臣感激私忱理合繕摺奏謝謹奏米麥起運日期知道了亦毋因一事而遂諸事放膽擅為必似此得理之舉方可如是果決也同日又奏為據實奏聞仰祈睿鑒事竊臣於雍正二年閏四月二十五日據撫臣石文焯傳臣至署捧出皇上硃批諭旨暨條奏內所陳豫省塘汛一事臣遵於閏四月二十八日具摺奏請俟秋收農隙將沿途窩鋪添蓋房屋令所在汛兵攜眷居住朝夕守看復䝉聖諭塘房一項最要留心東省舉行此事遂致擾纍百姓欽此臣遵於本年八月十一日動撥耗羡銀三千兩詳委南汝道佟鎮將沿途大路估修每鋪蓋房七間馬棚一間臣復再三諄囑令其到處切不可給銀州縣以致擾纍只傳集匠役照依民價絲毫不得短少給發現銀聽其自行買料雇夫去後茲據南汝道佟鎮於十月十六日移送清册到臣內開除舊有營房修葺整理外共新添過墩房八百零三間馬棚一百三十九間按照民間蓋造房屋價值給發承攬夫匠共用過銀二千七百四兩零俱各添蓋整齊臣隨細加密訪並無絲毫短少并稍有纍民之處現在移咨各鎮照數撥兵令其攜帶家口星赴各汛居住晝夜防範共保無虞所有添蓋過墩房暨動用銀兩數目理合繕摺奏聞謹奏如是毫不纍民辦理甚好知道了雍正二年十一月初九日署理河南巡撫印務布政使臣田文鏡謹奏為據實陳明仰祈聖恩鑒宥事竊查康熙六十一年十月起至雍正元年七月所有折給支放滿洲官兵米豆草束一案欽奉硃批諭旨飭臣設法完結臣隨請將前任撫臣楊宗義買穀餘剩銀內動撥補項繕摺具奏茲䝉聖諭此事可行至楊宗義或尚有未清之項其權操縱在爾何也爾為其後任一切款宗無不經手檢核如謬荷聖恩畀以重任夙夜兢惕惟恐寸心稍有偏徇上負皇上知遇隆恩所以任事以來母論大小諸務無不矢公矢慎兢兢辦理至於事關國帑即絲毫亦不敢擅自操縱致有出入臣前奏楊宗義任內尚有未清之項蓋因撫臣石文焯曾經摺奏著落楊宗義賠補衛輝府參革知府吳柯等十案虧空銀米穀石共銀五萬兩臣細查各案錢糧以及漕米倉穀遵照題定部價併照依時值據實確估約需銀五萬八千四百餘兩則是不敷之八千四百餘兩似應將楊宗義買穀餘剩銀內另摺奏請撥補還項臣並不敢額外稍有搜求之意總之臣受恩優渥捐糜莫報惟望倉庫錢糧盡皆充足絲毫不致短少以副聖懷其如臣才識粗疏遂致轉移失術返躬自問罪何可逭仰祈皇上宏開天地之恩格外優容諄切訓誨俾臣得以安心辦事少盡犬馬報主之誠則感激𢎞慈矢之生生世世矣至前項銀兩臣惟有恪遵諭旨另為設法可否在於雍正元年耗羡銀內撥還折中米豆草束價值銀二萬一千七百三十兩零歸還正項其楊宗義買穀餘銀六萬四千八百餘兩照舊收存道庫以供别用但應否如此料理臣不敢擅便伏候皇上睿鑒施行謹奏前諭不過謂督撫輩之髙下其手處難掩照鑒令爾知朕之洞悉耳非以所奏為謬也米豆草束一事仍照前議料理為是若楊宗義更有未清款宗在六萬兩以內者除將買穀餘銀代伊彌補完項猶或不敷再以元年耗羡抵還未為不可大凡臨事最忌猶豫尤不宜迎合設一味揣摩遷就反致乖忤本意如奏內恪遵諭旨另為設法云云等語若然將朕前摺所批此事可行四字置於何地於斯一事爾大誤矣今後勿更如是游移無定隨時變轉始與身任封疆重寄臨大節而不可奪之義相符也切記毋忘同日又奏為據實覆奏仰祈聖鑒事雍正二年十月二十八日臣齎摺家人回豫恭捧皇上硃批諭旨到署臣跪誦之下不勝感激涕零惶悚戰栗伏思臣䝉皇上委任之恩至深至厚臣雖愚昧敢不恪遵聖諭徐徐循序辦理祗緣豫省各官因循玩愒相習成風一切奉行事件不論限期遲速任催罔應每至逾限尚多未結臣只得設法嚴催令其依限完結如有遲誤即照例揭參此足以取怨於官者一也又各屬地丁錢糧藩司從不嚴催遇有撥解京協各餉限期迫急即向各屬輾轉設法甚至將道庫錢糧混那凑數再每當奏銷之時上下恐干處分只得預出空批令各屬漸次解銀彌補臣思正雜錢糧均關國帑豈可任其遲延那掩因嚴飭各州縣立限徵解毋許似前那移影射此足以取怨於官并取怨於民者二也又各屬存倉穀石上司從不委員盤查任聽屬員私自糶賣虧空無存或擅自出借里民希邀民譽實取利息及至每年秋收完者聽其自完不完者即押換領紙臣查據各州縣竟有二十餘年以前出借之穀換具本年領狀相沿交代出結者夫各屬倉項原係國家未雨綢繆為歉收之年備賑而設豈可有名無實上下朦混臣自到任後只許照例存七糶三若有違例擅借之州縣即著落該員自行買補至於積年民缺亦檄飭各屬設法勸徵毋得似前私換領狀捏報貯存此足以取怨於官民者三也又各州縣從前舊例無論大小公事以及餽送上司食用等物槩行私派纍民臣伏思皇上愛養黎元如同保赤凡屬臣工自應仰體況近今上司各衙門不特節禮陋規革除殆盡即門包使費亦嚴行禁絶并將各州縣私派病民之事分析出示曉諭如有不肖有司以及姦胥猾吏照前私派許百姓據實控告臣復不時密訪有犯必懲因而各屬頗知畏懼不敢苛派然臣思各屬均有親友在京做官或向各州縣借貸或往來通問無不訴說清苦借此推却此各官怨望之說更所不免至如道及臣見小巧取之論又不得不為我皇上直陳者夫布政一官係通省錢穀總滙一應錢糧出入絲毫難容舛錯臣查豫省往年凡有公事并起解顔料濶布等項鋪墊解費向來派之州縣州縣復派之里下因而以少作多任意侵蝕承辦之員亦見此項銀兩並非州縣各官已資不免從中需索臣自到任後將各項應給公費槩從司庫於耗羡銀內酌量支給不致賠纍亦無贏餘若有可以節省之處即為節省仍將節省銀兩釐毫絲忽亦必詳明撫臣或照舊還項或為别項公用在屬員未悉原委必疑為扣存入已此見小巧取之論所由起也但臣自屢䝉皇上訓示之後應用威者即加之以威應用恩者亦未嘗不豫之以恩如民間火耗從前竟有徵收加一八九及加二之州縣臣隨密諭各府將所屬火耗逐一確查開送斟酌裁減通發告示曉諭士民毋許劣員私置重戥暗加火耗如有前項情弊即許納户控告且將一切私派病民之事嚴飭屬員盡皆革除至如勢豪土棍臣亦密訪款蹟分别恩赦前後無不量加懲治是恩威並用之於民者如此若夫州縣各官臣在山右將雜稅銀兩亦盡查出歸公茲因豫省各官養亷不如晉省之多臣隨將此項銀兩除起解正額外些須餘銀一聽各屬收用臣又查據各州縣折解錢糧碎封歸併平餘大州縣每年約有一千餘兩中小州縣亦有數百餘金巳於七月內亦盡歸州縣並不提解至於佐雜等官臣凡遇公事差遣皆量給盤費從不苦纍而查核賢否催徵錢糧以及督催事件係臣專職不敢姑容但內有勤敏亷潔者即寫字奬勵怠玩愚昧者亦無不教導申飭是恩威之並用於官者如此再臣仰蒙皇上隆恩給以養亷衣服食用已自充然有餘無論銀錢絲毫不肯染指即署內勺水亦係恩賞養亷銀兩買用至各屬餽送即菜果土物之類亦一介不取總之臣愚昧無知甫經抵任即欲使大小各官盡皆亷潔通省倉庫毫無虧空因而不避嫌怨秉公執法遂致急於求成多有未當罪何可逭然豫省自積玩之後若不急為整頓一洗舊習不免更致貽誤今蒙聖恩不加嚴譴周詳訓誨臣惟有恪遵諭旨寬嚴共濟循序辦理以副聖懷臣謹繕摺據實覆奏伏祈聖鑒謹奏前摺所批諭旨欲令爾知朕心似明鏡之不可掩純鋼之不可撓更加一番勉勵敬慎而巳如果自信無他則竟坦懷釋慮雖賁育之勇必不為所撼動即鬼蜮之巧斷不為其蠱惑倘果有纖瑕微玷可以指摘縱令籲天禱地亦恐莫爾救也勉為之將朕知遇深恩時時忖度務思全朕用人顔靣為要同日又奏為據實奏明仰祈聖鑒事竊查豫省府州縣各官內有庸劣不堪之員雖經陸續參革但其中查有南陽府知府何煜為人過於柔懦諸事闒茸臣再三教導怙終不悛伏思知府一官有表率屬員之責若似此怠玩貽誤匪淺至於州縣等官內亦尚有老邁昏憒才力不及并下愚不移是非顛倒之員佐二雜職等官內亦有年老病廢庸劣生事應行咨革者臣曾與撫臣石文焯說過據撫臣云因大計在邇姑留以待參革臣已將情由繕摺具奏茲臣接准部咨豫省今歲大計奉旨停止欽此臣伏查前項劣員均足貽誤地方難以姑容今應否即將庸劣各官據實題參抑或俟明春開印後參革臣未敢擅便理合繕摺請旨謹奏候朕命下實授汝撫任時再行奏請同日又奏為遵旨據實覆奏仰祈聖鑒事竊查豫省黃河南北兩岸堤工設有堡夫九百七十四名住宿沿河大堤堡房晝夜看守誠不可一日乏人嗣因連年黃水泛漲堤工在在危險額設人夫不敷驅使復蒙皇上軫念河工關係民生休戚特調江南河兵一千名協力防護所以今年秋汛水勢倍常堤岸堅固則是河兵之設原以濟堡夫之不足未便因設兵而遽可以裁夫也臣前因河臣齊蘇勒請增豫省河員等事原題內有過秋汛裁汰堡夫之語曾於八月內向撫臣石文焯副總河臣嵇曾筠說過後兵科給事中管河道陳世倕到任復與陳世倕說知應將堡夫仍留工所倘遵照部議一旦裁汰不免防守乏人或致貽誤關係匪輕今據陳世倕繕摺奏請停裁仰䝉皇上硃批諭旨著臣具題欽此轉傳到臣臣查堡夫一項皆係永遠土著水勢緩急堤岸情形無不深知熟悉且搜尋獾洞鼠穴狼窩蟄陷尤其所長即或猝有險要搬運泥土竭力填塞非堡夫不能勝任至於新設河兵雖鑲填釘樁捲掃下掃固所熟諳然而風防雨守寒暑無間晝夜巡視不辭勞苦者總不如堡夫之足供驅䇿也况今加幫大堤工程綿長千有餘里又係新築之工正須兵夫兼用協力防禦方有實效所有原設堡夫斷難議裁除將應停裁汰堡夫情由容臣咨商河臣到日具題外合先繕摺奏聞謹奏覽停裁堡夫情由知道了據稱堡夫如是堪供驅䇿裨益河堤從前為何不一奏聞耶雍正二年十一月二十日署理河南巡撫印務布政使臣田文鏡謹奏為據實陳明以慰聖懷事雍正二年十一月十二日臣齎摺家人回豫臣跪誦硃批諭旨極當勉勵職守檢點政務近日輿論甚屬平常爾乃朕獨加賞識之人必須克稱知遇方不貽羞於世也欽此又於十七日學臣王國棟至臣署轉傳上諭田文鏡並無一人保舉係朕特加擢用者令伊著實勉力做好官莫辱朕之顔靣不知伊作何施措致使官民胥怨於其奏摺內亦難以詳悉批諭爾到彼傳旨命伊加意省察若有不當處速行遷改等因欽此臣敬聽之下不勝感激涕零惶悚無地伏念臣本庸材至微極陋自雍正元年正月仰䝉皇上特達之知奉差秦蜀命賑山右隨署晉藩調補中州稠疊隆恩千古未有臣身沐高厚無可圖報早將此心立定即至生生世世亦斷不敢稍有變易且荷皇上面諭即相與朋友尚為知巳者死何況君臣之義自古為昭臣雖愚昧豈無肺腑故自山右抵任至今感激天恩時切焚頂謹守清慎勤三字終始不渝至凡有關吏治民生之事即瞬息寤寐亦不敢茍且偷安上負𢎞慈此報效心切恐致太過早巳仰䝉聖鑒但豫省自積玩之後政多廢弛若不急為整頓竟有不可問者夫人情難於圖始可與樂成今當更變之初未有不以為難而苦之然思皇上之所以用臣者正欲使臣整理地方並非欲臣因循舊習也臣所以不辭勞苦不避嫌怨一切秉公夙夜經理應行者立即舉行應革者亦立即革除內有可以暫緩者即遵聖訓徐徐辦理不敢過急即如河工一事臣於接署撫篆後據管河道陳世倕向臣說及加幫堤工自去年以至今秋九月有完至三二分者有完至一分者竟有全未開工者臣思河工關係緊要若舍此農隙料物易得人夫易募之候不作速興築一至桃汛農忙便難經理隨不避越俎之嫌一靣移咨河臣轉行嚴催一靣檄飭印河各官令其協力分段趲築并動發司庫錢糧隨時接濟於是人夫湊集並不派用民夫迄今兩月有餘現據各屬陸續申報巳完過半即全未開工者亦盡皆開工年內雖不能照數全完明春桃汛前即可告竣臣自知即此一事亦係取怨之道其如國計民生攸係豈敢視為非臣專司若夫欽部案件均有一定之限催徵錢糧例有一定之期而查核倉庫訪察賢否與夫興利除弊愛養百姓之事何一不關緊要倘或騖虛名邀衆譽瞻顧因循偷安玩愒有一於此即非臣之所以報皇上而皇上之所以委任夫臣者也至於見小巧取當此不避嫌怨之時十手十目共指共視稍有絲毫必將傳聞確據張大其詞臣雖下愚必不為此況臣賦性孤介並不知相與交接茫茫四海實無知已惟仰賴皇上知臣幸有今日設欲學為鄉願茍且和同臣非惟不敢亦所不忍臣亦逆知臣之苦心未必即能共諒且必有從而騰謗者故臣前奏摺內有非仰沐皇上知臣之深信臣之切臣未有不自危之奏當䝉聖諭果能任怨任過真實為國家竭力報效何危之有欽此臣所以鞠躬盡瘁愈加奮勉雖任怨任過刀鋸在前而有所不避者也總之臣受皇上隆恩至深至渥於無可報效之中亟思圖報每接見各屬諄諄告誡令其共體聖懷務須亷潔自愛惠養斯民幸今豫省各屬見臣自始至終並無虛假賢者知感不肖者知懼至於地方百姓諸弊盡革追呼不擾似乎稍有起色民亦知感矣而憾者復有官民胥怨并甚屬平常之論然臣自問才具庸劣即平常二字實不敢居豈敢自陳如許好處妄希格外寵榮只緣臣係皇上獨加賞識之人今不能施措妥當以慰聖懷臣罪已不容誅乃荷聖主隆恩不加罪譴反憐臣恤臣委曲教導并諭及有關皇上天顔則九重宵旰不知上厪幾許天心聞命之下非惟手足莫措抑且神魂悚栗矣不得不將犬馬私忱斷無改易暨臣居官辦事之處連篇纍牘據實直若稍有不及之處臣即繕摺參奏不敢姑容以上各項臣一字一淚據實覆奏伏乞皇上睿鑒謹奏盧官保稍有不及處即行參劾非朕意也或愚不曉事自以為昔日王府受知之人妄肆大言於汝則何容姑寬察無放縱不安分舉動猶可規訓造就汝加以教導而委用之伊之身家頗裕操守一節諒猶可取如肯聽從指示勉力奉職自不應參倘露恃勢凌傲形迹亦須預先具摺奏明然後再列彈章同日又奏為遵旨據實覆奏仰祈聖鑒事雍正二年十一月十七日又據學臣王國棟轉傳上諭聞得唐縣知縣關敶官聲頗不為劣前被揭參人皆為之抱屈如係一時錯誤君臣之間不妨直剖胸臆倘仍執迷粉飾即關敶亦豈肯默然甘休據實奏來候朕裁度以便復還其職等因欽此仰見皇上愛惜人才慎重黜陟之至意臣敢不恪遵聖諭據實直奏伏查臣到任後詳明撫臣石文焯調委盤查各屬倉庫於本年七月初十日蒙撫臣批據護理汝寧府信陽州知州李廷基詳稱奉檄委查南陽府屬唐縣倉庫該縣關令因有官隱墾地五百七十餘頃未經造報不敢將地畝完缺底册送查隨用印信手本并印封銀三百兩令其友鄭之傑來寓密送求免槩不清查除將用印銀兩手本申送布政司貯庫外不得不將該令行賄情由通詳核奪等情䝉撫臣批布政司確查詳報臣隨行南陽府㑹同汝寧府確查詳報去後嗣據南陽府知府何煜詳揭到臣臣因關令用印手本鑿鑿可據印封銀兩現今貯庫若不轉行揭參非惟不足以服通省各屬之心而臣即自蹈徇庇劣員之愆矣臣蒙皇上委任深恩如此賄贓確據現奉撫臣批查該府詳揭臣敢不據實轉揭今聞學臣轉傳聖諭臣誠恐一時愚昧誤行揭報有如聖慮因將原揭底卷始末原委逐細查明並不敢膠執已見粉飾怙過自千罪譴理合據實覆奏伏乞聖鑒謹奏覽奏此案根由炳據爾之心迹巳明殊屬可嘉隨發廷臣共閲矣同日又奏為請旨事竊查豫省各官仰䝉皇上隆恩俯念耗羡歸公特賜養亷銀兩以資薪水此誠千古未有之曠典也茲於本年十一月十一日接到撫臣石文焯來字內開除從前養亷按月支領外將九月以來未經支領養亷銀兩照奏過數目給發統於明歲奏銷彚核奏聞等語但臣伏查石文焯係奉特旨署理浙撫之員非奉别項𢎞恩出自聖裁再查巡撫衙門有健丁五十名每名每大月支領餉銀九錢七分小月支領餉銀九錢三分每名每月支領米三斗凡遇撫臣升遷事故離任之日即行住支撫臣石文焯係署理浙撫與前項離任不同茲據中軍遊擊將九十兩月銀米照常繳送臣思浙撫任內應自有健丁銀米臣係署事之員並無健丁且蒙皇上隆恩賞給養亷已自用之不盡隨將銀兩暫行貯庫今應否住支歸入正項抑或收貯司庫留為公用理合一併奏聞仰祈聖鑒謹奏毋於類斯瑣屑處希朕見賞亦無庸矯亷衒異但躬行實踐循分盡職朕自有照鑒膺封疆重任切戒器量狹小諭田文鏡知悉今在廷諸王大臣中實心為國家愛惜人材者惟怡親王朕信其純汝傾慕王之公忠德望昨差人達意未為不是但此際命王代汝轉奏事件斷然不可何也汝與諾岷為舉朝所怨衆議沸騰論奏者指不勝屈而年羮堯殆有甚焉朕乾剛獨斷悉置之不聞兹若因汝秉心與王相契俾得時通音問內外合一共勷政治則輿論必指以為借勢私交不但汝與王負謗無益亦於朕用人大體攸關所以諭令拒而不納也汝當感此曲全備恤之恩愈勉公清和恕下以杜衆口上以全朕靣俟汝根基立定官聲表著之時然後降旨命王照應於汝則嫌疑無自而生矣更加切諭者假若因此放膽以為有朕可恃復何懼之有遂乃縱情肆志出入繩墨致被指摘其他姑置不論試思朕將何顔以對隆科多年羮堯暨在廷諸臣一愧之後汝猶克當否耶勉之慎之諸凡務敦大體不宜瑣細苛刻為最要戒之開歸道沈廷正原係藩邸舊人朕所深知者才品俱優但慮其過於聰明心行未純尚在可以為善可以為惡之間聞伊未到豫省即先蓄成見欲與汝作梗試思朕豈有命屬員前來鈐束上司使掣肘於汝之理伊若露有不肯盡心協助實力承辦反倚勢借端妄作威福賣汝以取媚於他人形景嚴加參劾候朕重懲決不姑寬之也汝接到此諭旨時可與伊共觀之硃批諭旨卷一百二十六之二欽定四庫全書硃批諭旨卷一百二十六之三硃批田文鏡奏摺雍正二年十二月初四日署理河南巡撫印務臣田文鏡謹奏為聖恩之髙厚無極微臣之圖報愈難謹繕摺覆奏仰祈睿鑒事雍正二年十一月二十五日臣齎摺家人回豫恭捧皇上硃批諭旨到臣臣隨即反復跪誦逐字細繹不知九重宵旰上厪幾許天心清夜環思臣即粉身碎骨總不足以仰報聖主隆恩於萬一伏讀聖諭假若因此放膽以為有朕可恃復何懼之有遂乃縱情肆志出入繩墨致被指摘其他姑置不論試思朕將何顔以對隆科多年羮堯暨在廷諸臣一愧之後汝猶克當否耶勉之慎之欽此臣不覺竦然神驚繼以飲泣似此聖諭諸事愈加公清和恕必使衆人之心皆悔騰謗之非衆人之口皆頌皇上之明此實臣諓諓之私雖鞠躬盡瘁而猶欲矢之生生世世者也伏乞聖諭今在廷諸王大臣中實心為國家秉公惜人材者惟怡親王朕信其純汝傾慕王之公忠德望昨差人達意未為不是但此際命王代汝轉奏事件斷然不可何也汝與諾岷為舉朝所怨衆議沸騰論奏者指不勝屈而年羮堯殆有甚焉朕乾剛獨斷悉置之不聞茲若因汝秉心與王相契俾得時通音問內外合一共勷政治則輿論必指以為借勢私交不但汝與王負謗無益亦於朕用人大體攸關所以諭令拒而不納也汝當感此曲全備恤之恩愈勉公清和恕下以杜衆口上以全朕靣俟汝根基立定官聲表著之時然後降旨命王照應於汝則嫌疑無自而生矣欽此臣思人臣事君皆應如怡親王之公忠為國家愛惜人材今怡親王之誠心已䝉聖鑒而臣犬馬報主之私又仰沐我皇上垂憐至此似此知遇隆恩而已至於開歸河道沈廷正其才品心行已久蒙聖鑒臣無庸再奏伊若露有不肯盡心協助實力承辦反倚勢借端妄作威福形景臣當欽遵諭旨嚴加參劾不敢姑容再蒙皇上發下轉交沈廷正之諭旨因沈廷正現在衛輝府辦漕容臣指日赴衛輝監兑時親自密傳仍遵聖諭將伊回奏之摺代為轉呈至臣前奏豫省大小各官仰蒙聖諭候朕命下實授汝撫任時再行奏請欽此但臣自河臣齊蘇勒親至豫省地方與撫臣石文焯副總河臣嵇曾筠靣商㑹題此時臣實並未與聞嗣奉部文到司臣始知有過秋汛裁汰堡夫之事後據印河各官至省見臣時稟稱此項堡夫斷不可裁汰臣隨細加察訪實係不可裁去即向撫臣石文焯副總河臣嵇曾筠說知欲其自行奏復嗣於管河道陳世倕到任臣又向陳世倕說知令其轉致嵇曾筠作速具奏蓋因新奉部議臣若冒昧奏聞恐干僣越縱肆之議故欲令河臣自行具奏折給滿洲官兵米豆草束一案臣實愚昧未喻聖意因復繕摺具奏今既蒙諭旨此事可行欽此不特微臣感激靡涯即官兵鋪户無不共沐皇仁羣歌聖德臣遵當查照前議撥補完項總之臣身受聖主隆恩無以圖報惟有事事恪遵聖訓諸凡務敦大體不敢瑣細苛求以副皇上教導成全之至意已耳所有微臣奉到諭旨理合繕摺覆奏伏乞睿鑒謹奏所奏俱悉同日又奏為恭謝天恩仰祈聖鑒事竊查本年九月初三日因撫臣石文焯奉差赴浙荷蒙特旨命臣署理河南巡撫印務三月以來涓埃未報夙夜悚惶且臣以為暫時署理竭盡駑駘猶可支持今於雍正二年十一月二十三日接准部咨欽奉上諭河南巡撫事務著布政使田文鏡署理河南布政司事務著楊文乾署理欽此到臣臣隨恭設香案望闕叩頭恭謝天恩訖但臣自問謭劣即布政使之任疊荷聖恩諄切訓誨尚不能幸免無過何堪復當封疆重寄若不仰覲天顔恭請聖訓臣即鞠躬盡瘁隨時隨事竭力留心辦理總不足以仰副聖懷於萬一也惟是新任布政使楊文乾尚未到任糧驛道沈廷正現赴衛輝府辦漕同城止有按察使張保一員臣不敢擅離伏乞皇上俯念臣實愚昧容臣於本年封印後赴京陛見得以上覲天顔跪聆聖訓俾臣有所遵循不致奉行舛錯則感沐聖恩益矢之生生世世矣倘蒙皇上允臣所請臣即恭疏具題所有微臣感激私忱理合繕摺奏謝伏祈聖鑒謹奏爾乃領悉朕意之人無庸奏請入覲即使來京亦無可訓諭處但勉力職任為要雍正二年十二月十五日河南巡撫臣田文鏡謹奏為聖恩疊沛圖報實難謹繕摺奏謝仰祈睿鑒事竊臣一介庸愚毫無知識荷蒙皇上乾剛獨斷不次擢用畀以藩司署理撫已邀非分之榮聖恩髙厚捐糜莫報茲於雍正二年十二月初九日接准吏部咨內閣交出硃批諭旨田文鏡著補授河南巡撫該部知道欽此到臣臣遵即恭設香案望闕叩頭恭謝天恩訖但臣自問有何寸長有何報效而仰沐皇上隆恩稠疊優渥至此且巡撫係封疆大吏上關國計下繫民生責任匪輕臣之愚昧豈能勝任聞命之下不勝神魂悚栗手足無措受恩愈重圖報實難清夜環思益滋恐懼惟有仰遵聖訓恪守公清和恕正巳率屬竭盡血誠以副我皇上天高地厚知遇之隆恩於萬一耳所有微臣感激私忱除恭疏具題外理合繕摺奏謝為此謹奏汝若將來至於負朕則情理中不宜有此毋多言勉為公忠體國之臣俾民生安阜吏治澄清乃實無負朕恩乞封一事來歲二月中旬可以奏請同日又奏為恭謝天恩仰祈聖鑒事竊臣於雍正二年十二月初六日接准部咨欽奉諭旨前諭山東河南二省買米運送江南平糶據何天培奏稱江南小米不能發賣請易小麥等語此事曽經署河南巡撫田文鏡具奏江南人不食小米請買小麥運送朕覽奏甚喜曽諭朱軾張廷玉據田文鏡所奏辦理甚善山東亦當照此行彼時朱軾張廷玉回奏小米煮粥甚好江北人亦多食之朕從其言遂未降旨與山東巡撫今巡撫何天培所奏與田文鏡相同可見田文鏡辦理盡心朱軾張廷玉不過因張廷璐之事歸怨田文鏡欲使所奏不行耳大將軍年羮堯曾奏田文鏡居官平常舅舅隆科多亦曾奏過此皆輕信浮言未得其實現在買麥一事即是實心辦事之確據陳世倌料理之處遠不及田文鏡山東所買之米今到江南不能發賣著陳世倌照依時價在江南地方自行發賣其不敷之價著草率辦事之陳世倌賠補田文鏡辦理此事既好應著吏部議叙具奏欽此到臣臣遵即捧接拜誦逐字細繹不勝感激涕零愈滋悚懼矣伏念臣本庸材至愚極陋仰䝉皇上乾斷畀以重任受恩深重無可圖報惟有隨時隨事恪遵聖訓心體力行並不敢稍留一毫心血亦不敢旦夕茍且偷安至買米一事臣實愚昧無知並不識如此料理方免貽誤此皆疊䝉聖恩多方教導臣遂不揣具奏請易小麥並非臣有一得之愚可以仰邀曠典茲蒙皇上因辦理此事著吏部議叙清夜環思聖恩愈重臣罪愈深矣所有微臣感激私忱合先繕摺奏謝仰祈聖鑒謹奏朕由來秉性凡事公聽並觀必求其理之當爾輩大臣若不負恩朕斷不辜負爾輩也勉之勉之同日又奏為恭報得雪日期分寸以慰聖懷事竊臣伏查豫省於十一月二十八日暨十二月初二初三等日省城連降瑞雪臣隨通檄各屬確查有無得雪去後續據開封等八府鄭州等七州具報所屬各州縣俱得瑞雪自四寸起至一寸五分止二麥滋培豐年有兆此皆我皇上宵衣旰食勵精圖治因而上感天和花飛六出臣職任封疆覩此休徵不勝歡欣踴躍之至所有得雪日期分寸理合繕摺奏聞謹奏瑞雪占豐誠為可喜可慶封疆大臣惟當懋勉吏治上蒼之感應原如立竿見影係必不爽者須認理真確為要耳勉之同日又奏為遵旨據實奏明仰祈聖鑒事竊查豫省南北兩岸堤工仰䝉皇上軫念民生休戚特發帑銀四十九萬八千三百餘兩以資興築今據管河道陳世倕具奏每土一方除部議加一節省并支給工價銀九分六釐外尚餘銀一分二釐通省合算應共該再扣加一銀四萬餘兩另行題請以為各工補修補築等項之用轉傳硃批諭旨命臣酌量或題或行等因欽此臣遵即悉心咨訪原估乾土一方工價銀一錢二分除扣存加一節省應給銀一錢零八釐今止給銀九分六釐者蓋因河工錢糧實與州縣不同水勢變遷事在呼吸有昔平而今險者亦有昔險而今平者是無論通省之工程多有難易即一人承築之工亦各有平有險在印河各官自不得不相度水勢之大小工程之難易截長補短隨時變通方克有濟若膠執一定不特錢糧糜費抑且苦樂不均官民畏縮難免貽誤臣查平易之工每土一方即給銀九分六釐或八分上下一應修邉打硪製辦繩索買土鑲墊拖腳等項均可在內如遇昔平今險取土甚逺難做工程即給至一錢二三分外尚需夯硪檾辮等物銀兩至於水工一項有照原估一錢六分扣存加一節省再扣加一節省已敷所用者亦有帶水泥土挑運路逺難做易塌之工竟有給至一錢七八分至二錢三四分不等者則是前項再扣加一之銀原非盡為部費而設也若夫奏銷各項錢糧在部胥不能枵腹辦事厯來各省皆有發給飯食之陋例臣訪聞南河工程凡遇奏銷每開銷銀一兩支給部胥飯食銀自五分起至七分止今豫省此案大堤動用正項錢糧至四十九萬餘兩册籍繁多奏銷核算需時給發些須飯食亦似不可少欽惟我皇上明並日月無微不照所有奏銷部費已奉嚴旨禁革在部胥自不敢因飯食之有無吹毛駁詰舞弊作姦然臣伏思岸堤工尚可再扣存銀二萬五千餘兩并令管河道陳世倕再將難易工程暨别案堤工有無一例節省并節省若干之處確查詳報一併具題所有此案堤工除原議加一節省外又節省銀兩應聽副總河臣嵇曾筠查有應行補修補築之工題請酌量通融支給仍飭管河道嚴加察核毋許冒破庶難做工程不致偏纍貽誤而帑項絲毫均得實用矣除俟管河道陳世倕詳報到日恭疏具題外謹將臣察訪確實緣由繕摺奏聞仰祈聖鑒謹奏覽同日又奏為據實奏明仰祈睿鑒事竊查蘭陽縣參革知縣朱燧虧空厯年地丁銀八千六百二十二兩零常平倉穀四千一百八十一石零經撫臣石文焯先後核參嗣據朱燧交完以錢易回銀二百七十三兩又據紳襟里民情願樂輸銀五千九百六十四兩零以上共完解司庫銀六千二百三十八兩零尚未完銀二千三百八十餘兩朱燧自行買補過常平倉穀一百七十一石尚未完穀四千一十石零臣雖現在著落該地方官嚴行追比但查朱燧任所並無財物可變而訪查原籍亦無家産可追將來勢必另作歸結至其人在任柔懦無能諸事因循玩愒並不徵比錢糧每遇奏銷俱係那新掩舊代為報完所以士民念其被參離任於未奉旨意之前情願樂輸實無抑勒情弊亦並非因朱燧居官確有善政輿情踴躍也今此案具題臣惟恐部臣以士民樂輸有悖明旨且代完如許銀兩必以朱燧為好官疑而駁詰合將士民輸納情由并朱燧居官之處據實奏聞伏乞皇上俯准臣奏則不特案件可以早結而帑項亦不致久懸矣為此謹奏此案該部並未駁議巳照題具覆隨經降旨允行矣雍正二年十二月二十七日河南巡撫臣田文鏡謹奏為聖恩日重圖報愈難謹瀝丹誠仰祈睿鑑事竊臣一介庸愚仰沐皇上隆恩稠疊優渥清夜環思捐糜莫報其如臣知識短淺不能料理妥當以致上厪聖懷寤寐之間不覺神魂悚栗手足無措乃復荷皇上逾格優容不加罪譴反憐臣恤臣諄切教導委曲保全并將臣奏摺給與在廷諸臣公同閲看遂使犬馬微忱得以共白臣何人斯而仰邀皇上天髙地厚之恩一至於此臣即永矢清節竭盡血誠總不足以報效𢎞慈於萬一也至於唐縣知縣關敶一案并䝉聖恩將臣奏摺給與在廷諸臣共閲臣亦惟有矢公矢慎審明題結總之臣蒙聖主隆恩夙夜冰兢正不知如何可以圖報謹當時時刻刻凜遵聖訓愈加公清和恕著實勉力做好官以副我皇上聖明獨斷委曲成全之至意而已理合繕摺奏謝伏祈睿鑒謹奏覽奏謝足見悃忱同日又奏為恭報得雪日期分寸以慰聖懷事竊查雍正二年十一月二十八暨十二月初二初三等日豫省普降瑞雪業經具奏已蒙聖鑒茲又據八府七州具報所屬各州縣於本年十二月十五日復得大雪自二寸起至四五寸不等四野均霑二麥滋培農夫士女莫不鼓舞歡欣共慶豐年有兆臣職任封疆覩此休徵不勝踴躍欣忭之至所有得雪日期分寸合再繕摺奏聞謹奏覽奏豫省連降瑞雪情形朕懷曷勝欣慰同日又奏為敬陳芻蕘請增營汛官兵保固疆圉以垂永逺仰祈睿鑒事竊查河南一省居天下之中地形四達為九州之腹心諸夏之閫域向設標鎮協營業巳星羅棋布近年省城又添駐滿洲官兵措置極其周詳自可奠安我國家於泰山磐石之固而為萬世不拔之基矣臣又何容置喙但臣既蒙聖主隆恩授以封疆重任敢不竭盡心力圖求萬全臣在布政使任內固已留心地方今復行咨訪利弊曾據各屬條陳又據河北鎮臣紀成斌前往親勘所言與臣咨訪無異臣細覽輿圖查豫省八府其處萬山之中而素稱險要者莫過於南陽河南二府所屬州縣然南陽一郡雖地接鄖襄既有鎮臣駐劄府城自能捍禦惟汝寧府屬之遂平縣境內有名平頭垜嵖岈山者長亘百里界連四縣山深谷僻最易藏姦當於南陽鎮標調設千把總一員帶兵數十名以資防衛至於河南一郡係河北鎮所轄離省四百餘里離鎮一百四十里中隔黃河孤懸西鄙設有河南營都司一員守備一員千總二員把總三員馬兵一百三十四名步兵五百一十三名共轄一府兩直𨽻州一十四縣東西相距六百餘里南北相距四百餘里地方遼濶俗悍民頑且山多箐密姦宄易於出沒誠中州第一要隘也康熙五十五六兩年亢珽王更一等乘機竊發幸䝉聖祖天威剋期撲滅此其明驗今以孤營防禦地險兵單如汝州郟縣魯山寶豐四州縣僅以一千總帶兵一百二十五名專轄陜州靈寶閺鄉三州縣亦僅以一千總帶兵九十一名專轄登封鞏縣偃師孟津四縣專轄者惟一把總兵止六十八名宜陽澠池伊陽新安四縣專轄者亦惟一把總兵止六十七名地方遠隔三四百里往返巡查數日方能遍厯一千把微員而專轄三四州縣不但官卑兵少不足以資彈壓而勢亦不能兼顧無遺况陜州一州新改直隸分轄靈寶閺鄉二縣離省七百餘里逼近潼關為山陜咽喉最稱險要再查嵩縣一營止一守備並無千把管轄嵩縣盧氏永寧三縣相距三百餘里兼之四面皆山層巒疊嶂莫可端倪其間伏牛欒川等山更為深邃臣案查河南營原設參將一員因順治十八年駐劄提督改參將為城守營都司嗣於康熙七年奉裁提督參將因未復設今可否復設參將一員駐劄河南府將河南營都司或改為守備移防陜州另為陜州營河南營原有之守備一員千總二員把總三員仍歸參將管轄分防登封鞏縣偃師孟津宜陽澠池新安伊陽汝州魯山郟縣寶豐十二州縣如既將都司改為守備移防陜州應更設把總二員分防靈寶閺鄉二縣其兵丁照陳州營馬兵酌增七十二名步兵酌增二百六十八名其嵩縣營亦應添設把總二員分防盧氏永寧二縣至於添修衙署營房并製備甲械旗幟等費存有充公銀兩可以支用無庸動用正項錢糧用過銀數容臣細加查核另摺奏聞如此一轉移間實武備以固疆圉示軍威而垂永遠且辨兵均有專責而聲勢聨絡彼此又可接應不致有鞭長莫及之虞矣臣因封疆所繫不揣愚䝉敬陳管見伏候聖裁倘蒙俞允俟開印後臣當㑹同河北總兵臣紀成斌恭疏題請仰冀睿鑒謹奏此增設營汛官兵之議甚關切要㑹疏具題可也雍正三年正月初四日河南巡撫臣田文鏡謹奏為恭謝天恩仰祈聖鑒事雍正二年十二月三十日臣齎摺家人回豫恭捧皇上欽賜福字到臣臣隨跪迎至署恭設香案望闕叩頭謝恩祗領訖又蒙皇上恩賜河北鎮臣紀成斌南陽鎮臣佟世鏻福字各一幅臣遵即差辨恭齎轉頒訖欽惟我皇上德合堯天光昭舜日恩膏普被四海蒼赤已均沾樂利之休愷澤頻頒內外臣工既共享升平之福矣乃復荷天恩格外寵錫御書福字到臣伏覩龍章之璀璨竊喜福自天申仰瞻宸翰之輝煌不啻祥開斗極臣何人斯邀此曠典惟有什襲珍藏永作傳家之寶恪守清節以求福履之綏而已所有微臣感激私忱理合繕摺奏謝臣不勝歡欣抃舞之至謹奏福者德之徵也故洪範曰嚮用五福朕樂與天下臣民共之同日又奏為聖恩浩蕩無可圖報謹瀝丹誠仰祈睿鑒事竊臣前奏恭報瑞雪一事仰䝉聖諭瑞雪占豐誠為可喜可慶封疆大臣惟當懋勉吏治上蒼之感應原如立竿見影係必不爽者須認理真確為要耳勉之欽此臣伏思天人本屬一理至誠自可上格臣查雍正二年十二月二十七八等日又據開封等八府鄭州等七州所屬州縣紛紛具報各得瑞雪自四寸起至六七寸不等四野霑足二麥暢茂此皆我皇上勵精圖治無刻不以民生為念因而感召天和降此瑞雪官民共慶臣職任封疆惟有恪遵諭旨懋勉吏治上格天心仰副聖懷又蒙諭旨朕由來秉性凡事公聽並觀必求其理之當爾輩大臣若不負恩朕斷不辜負爾輩也勉之勉之欽此欽惟我皇上聖由天縱仁本性成而英明果斷推心置腹誠千古未有之聖主臣以謭劣庸才仰䝉皇上特達之知委曲保全諄切教導此又千古臣工未有之遭逢焉敢絲毫茍且旦夕偷安上負隆恩又䝉聖諭汝若將來至於負朕則情理中不宜有此毋多言勉為公忠體國之臣俾民生安阜吏治澄清乃實無負朕恩乞封一事來歲二月中旬可以奏請欽此伏思臣係蒙皇上獨用之人且疊荷聖恩不啻天髙地厚臣即竭盡血誠總不足以圖報萬一寤寐之間時切悚惶倘或因循玩愒稍有不堪自問豈特為天下之竒事竊恐天地鬼神亦斷不肯姑容也至臣前奏乞恩一事臣謹當仰遵聖諭俟二月中旬具摺奏請所有微臣感激私忱理合繕摺奏謝仰祈睿鑒謹奏覽奏巳悉悃誠新正十二日得辛有事於祈穀壇是日也彤雲密布和氣盈空抵暮天降瑞雪繽紛不斷直至十四日黎明方霽已十分霑足朝野共慶朕不勝欣幸之至特諭爾知同日又奏為據實奏明仰祈聖鑒事竊查衛輝府參革知府吳柯等十案虧空銀米穀石經前撫臣石文焯奏請著落原任撫臣楊宗義賠補銀五萬餘兩以完各案嗣據楊宗義陸續交貯司庫外今於雍正三年正月初四日據署布政使張保詳稱楊宗義應賠吳柯等十案虧空銀五萬兩已經照數交完貯存司庫臣隨查據所交銀五萬兩除補完吳柯等十案虧空地丁等銀外其米穀價值尚有不敷然數亦無多臣當遵將楊宗義買補漕穀剩存銀兩內撥補全完俟給發各屬照依時價數目買補動用之日容臣另摺具奏所有楊宗義急公交完銀數緣由合先繕摺奏明伏祈睿鑒謹奏可惜楊宗義此番效力贖罪猶有悔心之萌不應復事夤緣鑽刺求助於年羮堯隆科多後半世功名止於斯矣此之謂弄巧成拙適足以自誤而巳雍正三年正月二十四日河南巡撫臣田文鏡謹奏為敬陳各官賢否以慰聖懷事竊臣蒙皇上特達之知畀以封疆重任夙夜思維無可圖報惟有整飭官方留心吏治務使大小臣工各做好官以仰副我率以上各員皆與臣同心協力圖報聖恩汝寧府知府張玢自到任以來臣留心察訪辦事明白操守亦潔歸德府知府祝兆鵬居官安靜無忝厥職河南府知府張漢為人忠厚學問頗優將來可勉循良南陽府知府何煜并庸劣縣令數員經臣前摺奏明不敢再瀆只有彰德府知府屠洵辦事糊塗偏不知改難居方靣表率之任仰懇皇上掣回另補閒散京員或容臣另疏題補之湯隂縣丁憂知縣楊𢎞緒係四川進士其人年力精壯辦事明白地方百姓無不悅服臣因其到任只有月餘不敢冒昧題請留任且家無次丁聽其回籍料理數月但似此賢員不能遽得可否容臣具州縣內遴選亷幹能員另題請補再臣更有請者各官實心任事恪守清節雖屬分所當然而一種爭自勉勵圖報私忱臣實不敢壅於上聞況臣伏思皇上體恤臣工無微不至凡稍有效力之處即蒙聖恩逾格褒嘉俾其奮勵今豫省各官除到任未久之員臣再觀其後效另為密奏其厯任已久清慎勤敏之員伏乞皇上俯賜格外加恩仍留原任俾自愛者愈知感奮中材者亦必勉力而臣均得收臂指之用矣所有各官賢否理合繕摺奏聞謹奏所奏俱屬是當諸務從容辦理毋過於猛同日又奏為恭報得雨日期共慶豐年以慰聖懷事竊查豫省各屬屢得瑞雪經臣節次具奏在案茲據開封等八府鄭州等七州各具報所屬州縣於雍正三年正月十七日得有時雨四野霑足二麥暢茂野叟村童莫不塗歌巷舞共慶豐年有兆此皆我皇上至誠感格因而雨暘時若臣目覩輿情鼓舞不勝踴躍歡欣所有得雨日期理合繕摺奏聞謹奏春雨如珠霑足尤為難得真屬可慶幸者同日又奏為據實覆奏仰祈聖鑒事竊臣前奏楊宗義賠補吳柯等十案虧空完銀五萬餘兩一摺奉有硃批諭旨臣跪讀之下仰見我皇上體恤臣工無微不至凡有些微效力之處即仰邀𢎞慈格外垂憐今楊宗義完此公項臣細繹聖意俯念其效力之誠復惜其夤緣之誤皇恩浩蕩不啻天髙地厚但臣查據河南巡撫任內一年所有各項陋例不下二十萬兩臣復聞輿論楊宗義在任並非循良清正之員每嵗所入為數尚多今蒙聖恩寬宥只令其賠補些須效力贖罪不特分所宜然無足深惜即楊宗義後半世以及子子孫孫亦沐皇上隆恩於靡盡矣至䝉聖諭可惜楊宗義後半世功名止於斯矣此誠皇上明並日月睿照無遺臣亦細察其心行如再得封疆重任勢必仍蹈故轍未必遽勉循良然臣自到任以來因未䝉皇上諭問臣亦不敢一字瀆奏不謂楊宗義稍有微勞反致上厪聖懷如此憐恤臣疊䝉皇上隆恩推心置腹超越千古若不據實奏明以慰天心即寤寐之間亦局蹐難安矣伏乞皇上俯賜鑒察謹奏此奏既公且當知道了同日又奏為聖恩疊沛謹􅅹丹誠仰祈聖鑒事竊臣於雍正二年十二月二十八日仰遵諭旨將開歸道沈廷正回奏摺代為恭進荷䝉皇上將奏摺發下隨即靣交沈廷正收領訖臣因見摺口未封仰體聖意逐一細閲摺內所奏與向臣言無異但臣跪誦皇上硃批諭旨朕為汝主田文鏡係汝上官除此之外他處更無主人上司也等因欽此仰見皇上明並日月無微不照從此沈廷正斷無他處請託瞻顧必與臣協力同心共報聖恩然臣捫心自問有何寸長而上厪天心委曲成全一至於此也臣即竭盡血誠亦難圖報惟有協恭和衷共矢清節以仰報皇上髙厚之恩於萬一耳所有開歸道沈廷正回奏同原摺二扣今復恭捧到臣理合繕摺代為恭進謹奏覽奏知道了朕待天下臣工總惟大公無我一語耳同日又奏為遵旨覆奏仰祈聖鑒事竊臣於雍正二年閏四月初六日將豫省各州縣欺隱在官地畝繕摺具奏仰懇聖恩免其按律治罪准令當年升科荷蒙硃批諭旨既往自應不咎題本到日恐朕偶爾忽略汝仍一靣具摺奏請欽此臣於布政使任內隨密諭各府轉飭所屬令其盡行據實首報毋得絲毫再有欺隱嗣據各州縣陸續造報到臣內因總撒不符或科則舛錯駁飭另造去後今據署布政司張保詳據開封等七府屬陳州等七州并所屬共計五十一州縣各將已報在官民衛更名共地二千五百八十三頃五十二畝零內除偃師縣折去地四頃六十一畝零實在共地二千五百七十八頃九十一畝零照依賦役連閏併補徵則例共該銀六千四百七十二兩零即於雍正二年當年升科造册呈送前來臣覆核無異除另疏於雍正三年正月十七日具題外理合繕摺覆奏再臣伏查各州縣因感戴聖恩復多方勸諭民間如有墾過未報地畝亦令其據實舉首俟造報到日臣再另疏具題為此謹奏知道了該部議覆有旨同日又奏為仰懇聖恩仍留堡夫以資防修事竊查豫省酌撥江南河兵一案前准部覆除武陟縣堡夫一百名仍留防護其餘南北兩岸堡夫俟秋後盡皆裁汰嗣據管河道陳世倕具摺奏請停裁仰䝉皇上硃批諭旨此事當詳明撫臣具題欽此轉傳到臣臣隨繕摺具奏復一靣咨商總河臣齊蘇勒副總河臣嵇曾筠去後茲據河臣齊蘇勒回稱甫經議裁旋又議復似覺矛盾而嵇曾筠回稱已經摺奏現在聽候部議等語臣查黃河兩岸堤工綿亘千有餘里防守在在需人今時屆桃汛正須巡防保護原設堡夫斷難議裁臣復近乘監兑漕糧之便親詣河干悉心咨訪并目擊河兵實止能捲掃下掃鑲墊釘樁而穿衣躡履僅堪協助至於沾體塗足下水運泥以及風防雨守無分晝夜是河兵究不如堡夫之熟悉而任勞也且河兵係營員所轄多不服河㕔州縣約束未免呼應不靈臣愚以為務須兵夫兼用協力修防方有實效茲復據管河道陳世倕確查議詳前來臣復核無異除另疏具題外理合繕摺奏明為此謹奏所議是具題到日有旨雍正三年二月初八日河南巡撫臣田文鏡謹奏為據實奏明仰祈聖鑒事雍正三年二月初四日副總河臣嵇曾筠因查勘堤工至省靣傳皇上硃批諭旨河工錢糧巡撫固不可攙越然以為未曾經手遂乃概行委卸河臣亦屬不可爾等自應㑹商確當公同具奏為是咸似此各抒已見密摺陳奏朕不洞達情節殊難批諭欽此到臣臣跪聆之下復據嵇曾筠將原奏摺捧出與臣看閲臣又遂字細繹仰見我皇上至聖至明無微不照茲臣伏查康熙六十年起至雍正元年止河工奏銷一案其中各項錢糧有動用司庫銀兩解交河道給發者亦有動用河庫銀兩由河道徑詳河臣通融零星支給間有詳明撫臣衙門者更有堤工緊急一時不及具詳或奉河撫二臣靣諭竟行給發者如動用藩庫及解交河庫錢糧撫臣衙門悉有檔案可稽若河庫零星支給并臨時通融給發之項撫臣衙門並無底案可查是以南河工程例由河臣竟自核銷並不㑹同撫臣具題今蒙皇上天恩軫念河工關係緊要豫省亦特設副總河駐劄工所專司其事并添設河㕔汛官分任協理則是豫省各案工程動用銀兩自應副總河查核奏銷而河臣嵇曾筠以為未奉簡命以前之事欲令臣㑹同具題似可分肩其任然臣伏查十里店工程係雍正元年六月十七日欽奉特旨差嵇曾筠承築之工而楊橋漫工即與十里店堤工相離咫尺并加幫大堤等工所有做過工程用過庫項臣問據河臣嵇曾筠亦云悉知相應遵照南河之例聽候河臣奏銷非臣所敢越俎代庖者也今䝉皇上諭旨臣已與副總河臣嵇曾筠現在㑹同商酌以副聖懷緣奉上諭事理合將臣並非諉卸情由據實繕摺奏明仰祈睿鑒謹奏爾等酌妥㑹奏可也同日又奏為奏明事竊查豫省雍正二年分應行採買正耗漕米一十五萬一千三百八十三石零每石額價銀六錢五分共額銀九萬八千三百九十九兩零今照時價採買每石止需價銀六錢九釐四毫零共實用過銀九萬二千二百六十四兩零共節省銀六千一百三十四兩零現存糧驛道庫茲據該道沈廷正回稱此項節省銀兩分文不敢入巳情願歸公等語臣查雍正二年漕米因歲稔價平較之往年採買額價有餘至沈廷正辦理漕糧實在照依時價分給採買並無絲毫剋扣短少官辨水手人人感悅所有前項節省銀兩數目并貯存緣由理合奏明仰祈聖鑒謹奏此項節省銀兩係沈廷正所得羡餘或行給與或留充公用爾酌量為之雍正三年二月二十四日河南巡撫臣田文鏡謹奏為奏請酌更貯存米石以免紅朽事竊查康熙五十九年豫省共截留漕米二十三萬三千三百八十八石零內除運交河南府米十萬石因額價不敷經前撫臣石文焯摺奏著落原任撫臣楊宗義添價買補已於雍正元年十月內照依一米二穀買穀二十萬石貯存河南府屬各州縣倉訖又雍正元年賑濟借動米三萬四千五百七十五石零俟河北三府捐足補項外又各屬虧空米一萬一千二百五十九石零現在分案買補又墊運康熙六十一年漕糧動用米一萬九千八百二十八石零於雍正二年六月內經前撫臣石文焯題請於雍正三四兩年帶徵應俟徵完補項外實在貯存開封彰德衛輝懷慶等府屬暨陜州許州鄭州并所屬米共六萬七千七百二十四石零又康熙六十一年分截留漕米共九萬八千九百三十六石零內除未完民缺米五萬八千九百三十四石題請於雍正三四兩年帶徵分項補欵外虧空米一百八十石零雍正元年賑濟借動米一萬六千三百四十五石零俟河北三府捐足補項外實在貯存開封屬之陽武封邱二縣暨彰德衛輝懷慶三府所屬共米四萬五千五百七石零又康熙六十一年陜州太陽渡開捐三次所收運陜米麥十萬石經川陜督臣年羮堯摺奏停運內除撥運懷慶府借賑米一萬一千四百六十七石零實動賑過米九千七百一十五石零俟河北三府捐足補項外尚剩存懷慶府屬米一千七百五十一石又貯存陜州靈寶䦩鄉三州縣米共七萬四千二百一十七石零大米三千四十石小麥一萬一千一百七十五石零以上各年各案共貯存米麥二十萬三千四百一十六石零臣查前項米麥不比穀子可以耐久今經貯存數載多有變色若不急請酌糶紅朽堪虞且開彰懷衛河南等府所屬以及陜陳禹鄭許等州并所屬復貯存康熙四十三年漕米易穀八萬九百七十七石零買貯康熙六十年漕穀三十五萬八千八百二十四石零而河南一府又貯存康熙五十九年分楊宗義添價買補漕穀二十萬石又常平義社等倉通省共貯穀一百一十五萬四千四百四十六石各府州所屬均有貯存兼之各案虧空買補米穀以及河北三府開捐所收穀石并帶徵民缺米穀日積日多而臣於布政司任內凡查有私借在民并捏報還倉之州縣即勒令買補全完不比從前有名無實今皆分堆寺廟年久恐致黴爛若謂前項停運并截留米麥原備歉收之年暨運陜而設然既有穀存貯一時動用碾米亦易臣愚以為雍正三四兩年帶徵康熙六十一年民缺未完漕米照例以一米二穀徵收其虧空買補漕米亦以一米二穀還倉始可稍為經久之計至於現貯康熙五十九六十一兩年截留漕米暨康熙六十一年捐收停運米麥共二十萬三千四百餘石似應俱令各州縣於青黃不接之時概行減價平糶價銀解歸藩庫或徑行充餉或俟秋收查明貯存穀少之州縣均勻分發買穀存倉如此則米麥不致紅朽而州縣各官將來亦免賠纍矣是否可行伏乞皇上睿鑒指示以便臣另疏具題為此繕摺請旨謹奏該部速議具奏同日又奏為請補各案虧空以裕國帑事竊臣伏查豫省題參過各官虧空銀米穀石共計三十六案內除吳柯等十案虧空巳據原任撫臣楊宗義賠補銀五萬四千一百兩貯存司庫業經臣檄飭布政司逐案查明分析歸欵俟具詳到日臣即陸續題請結案外所有登封縣參革知縣薛國瑞等二十六案虧空內除未經審結之陳留縣參革知縣沈銘慎等七案并現在軍前尚未掣回之宜陽縣參革知縣張育徽一案其餘一十八案共原參虧空地丁銀八萬九千三百二十九兩零虧空倉穀共五萬一千四百三十五石零經臣前在布政司任內遵照定例在於任所嚴查復委員逐案審追連參後共完過銀一萬六千四百六兩零穀一萬二千七百六十五石零又一靣分咨各原籍地方查變去後嗣准各省撫臣陸續咨覆到豫追完銀三千兩各參員原籍家産可變抵銀九千一百三十五兩零尚應彌補銀六萬七百八十八兩零倉穀三萬八千六百六十九石零臣查例載承追督催各官以五年為率如限滿無完分别題參降調其如虧空各員任所原籍俱已搜查殆盡內有無産可追者亦有本犯身故者臣愚以為與其延挨時日徒處現任之員究於國帑無益莫若將各案虧空即行填補况議解火耗國帑起見不揣愚昧繕摺具奏仰祈聖鑒謹奏公私兩益不特善政兼亦隂德事也但須得理為要同日又奏為據實覆奏仰祈聖鑒事竊臣敬陳各官賢否一摺欽奉硃批諭旨諄切教導臣跪誦之下感激涕零惟有恪遵封府知府孫蘭芬性急之處較之從前頗覺悛改惟管河道陳世倕諸事慎重不敢將所估錢糧一起給發臣當各司道進見時曾經說過數次河工物料須乘價賤之時採買預備庶免臨時周章若不盡發錢糧一致誤事關係匪輕今陳世倕因所做工程過於核減絲毫不肯寬容大招衆怨臣亦題咨取來豫遇缺補用南陽府知府何煜臣前因其為人懦弱諸事闒茸繕摺具奏今察其政績稍勝從前故暫為寬緩以觀後效彰德府知府屠洵既䝉諭旨臣現在繕疏題參臣又查湯隂縣知縣朱體謙性耽麯糵不能約束家人書役民多怨言洛陽縣知縣鄭植賦性昏庸諸事不諳鞏縣知縣鄒崍才具庸劣縱容家人書役出入不謹似應一併題參以肅官方再臣伏查奉旨建造金龍神廟前因估時係隨常磚瓦今改為紅緑磚瓦房屋又稍放寬濶修理整齊原估不敷所用臣與前任撫臣石文焯商酌將耗羡銀內動支過銀四千兩今據管工同知吳元錦等詳稱匠役工價以及修蓋後閣尚需銀四千餘兩臣恐其中或有冒羡銀三千兩已令各州縣俱已栽植統祈聖鑒謹奏覽同日又奏為據實奏明動存耗羡銀兩數目仰祈聖鑒事竊查豫省各州縣所有新舊耗羡銀兩經前任撫臣石文焯具摺奏明內除各官養亷及各屬起解正項錢糧赴省路費並知府同知通判養亷俱令各州縣徑自扣存轉給外其餘盡解司庫以為通省雜項公費暨撫臣學臣司道各官養亷并彌補無著虧空之用臣於雍正二年三月十八日到布政使任內起至十一月二十六日升任止共收過各年新舊耗羡銀三十萬五千一百四十七兩零又前任布政使牟欽元任內收存耗羡共銀一萬二千九百六兩零二項共銀三十一萬八千五十三兩零內除詳明撫臣衙門存案動支過各項應需銀一十七萬六千八百八十四兩零實在貯存司庫共銀一十四萬一千一百六十八兩零應即奏請彌補虧空其署布政司張保任內續收耗銀并各年民缺未完耗銀應聽新任布政使楊文乾接收另報外所有臣任內收存動支過新舊耗羡銀兩年欵數目理合恭繕細摺一併奏聞謹奏所奏可謂明白詳悉之至然朕於此等事件不過閒覽而已無暇細計欵數也同日又奏為奏明事竊臣接准前撫臣石文焯咨稱雍正二年九月以後未支養亷銀兩具摺奏懇聖恩全賞以資家眷盤費欽奉硃批諭旨准賜爾即傳諭田文鏡可也欽此到臣臣自應恪遵諭旨轉檄藩司支給無庸再為奏請但石文焯前奉特旨署理浙江巡撫致字與臣支取養亷經臣於雍正二年十一月二十日繕摺具奏荷䝉硃批不必再給留充公用可也欽此欽遵在案且臣查據豫省各官養亷前因懷慶府知府梁需把奉差軍前效力臣於布政司任內具詳撫臣石文焯批給一半以資家口薪水一半支給署員以為往來盤費如前員已經離任者將一半養亷解司充公然署事得支一半原因微員起見至於臣署理巡撫任內荷䝉皇上天恩於布政司任內已有養亷因將前項一半銀兩即行貯庫充公而按察司張保亦將署學臣任內應得養亷銀兩并署藩司任內應得養亷銀兩俱已詳請充公在案今撫臣石文焯奏懇聖恩全賞應自雍正二年九月初一日起至十一月二十六日止動給銀六千九百一十一兩零緣事關庫項臣奉有皇上前批諭旨且石文焯來咨係無印空文臣已經咨回俟鈐蓋印信移文至日再飭藩司支給理合繕摺奏明謹奏覽奏已悉并據奏稱微員署事得支一半養亷等語朕意即爾等督撫兩司亦不必矯亷過於清苦百凡總宜合乎情理之中只要還朕一當字而已硃批諭旨卷一百二十六之三欽定四庫全書硃批諭㫖卷一百二十六之四硃批田文鏡奏摺雍正三年二月二十九日河南巡撫臣田文鏡謹奏為仰懇聖恩逾格榮封事竊臣一介庸材仰沐聖主隆恩不啻天高地厚涓埃未報時切悚惶焉敢越分妄求仰冀曠典但臣伏查雍正元年十二月二十二日恭逢恩詔內開一從前恩詔後升職加銜之職銜給與封典等因欽此臣於雍正元年八月初十日荷䝉聖恩由內閣侍讀學士署理晉藩洊至河南布政使近又䝉皇上特㫖補授河南巡撫雖考之品級布政使係二品副都御史係三品等次似有不同而論夫官守實與升職加銜之詔欵相符臣曾祖田有功曾祖母高氏寧氏祖田養濟祖母王氏因臣父田瑞年在日曾為兵部督捕司員外郎加一級同母于氏於康熙六年十一月二十六日恭逢恩詔俱受過三品誥封臣同妻蔣氏在監察御史任內於康熙五十二年三月十八日恭逢恩詔受過四品誥封今臣䝉皇上隆恩稠疊優渥臣曾祖父母祖父母父母尚未因臣追贈同邀盛典犬馬私忱難以自巳伏冀皇上𢎞慈垂念臣巡撫任內有荷䝉聖恩特加三級之異數仰懇隆恩免加賜臣之三級格外欽賜榮封三代誥命俾臣曾祖父母祖父母父母得以均沾聖澤共沐恩光則臣有生之年皆銜結之日矣臣不揣冒昧繕摺奏懇伏乞皇上俯賜睿鑒謹奏該部議奏同日又奏為敬抒謝悃據實奏聞事雍正三年二月二十五日臣齎摺家人回豫恭捧皇上硃批諭㫖到臣臣跪誦之下不勝感激涕零自問何人疊荷聖主隆恩多方教導有加無巳臣即鞠躬盡瘁總不足以圖報萬一也臣前奏糧驛道沈廷正辦漕節省銀兩原係應充公用之項而沈廷正實不敢絲毫入巳情願歸公似應留充公用今復據沈廷正摺報有貯存道庫康熙六十年分河內濟源等縣折徵漕榖價銀共一萬四千九十二兩零共應買榖二萬三百六十二石零前據各縣係照該年時價徵收解貯今亦照依時價如數採買尚餘銀七千四百五十六兩零現貯道庫亦情願歸公等語臣查前項剩存銀兩俱係經委署南汝道臣留心試看為人老實難􅈾監司之任今南汝道佟鎮赴浙散賑事竣巳經回任而盧官保適有丁憂之事似應聽其歸旗臣俟取結報到之日另疏具題再臣前奏鞏縣知縣鄒崍臣正在繕疏題參間適據該縣詳請休致到臣似應行令布政司委驗取結另疏具題理合一併覆奏仰祈聖鑒謹奏知道了同日又奏為敬陳積年被水田畝仰祈聖鑒事竊查豫省臨河各縣地方自康熙六十年伏汛水漲暨雍正元年秋水漫溢將納糧地畝或流成支河或變為鹽鹻或因水去沙停無可種植以致錢糧積缺完納無期臣於雍正二年九月初三日在布政使任內曾經繕摺具奏荷䝉硃批諭㫖極係應題之事但宜查勘明確毋令不肖官吏得以高下其手欽此臣遵即悉心咨訪除祥符汜水原武等縣勘不成災外惟陽武封邱中牟三縣被水獨甚民力艱難臣隨密諭開封府知府孫蘭芬親詣各該地方逐一履勘去後兹據查覆前來臣查陽武封邱中牟三縣共被水淹沙地四千七百餘頃每年共應納錢糧二萬五百餘兩共計鹽鹻地七百一十餘頃每年共應納錢糧三千一百餘兩自康熙五十九年起至雍正二年止計民間積缺水淹地畝並鹽鹻地畝錢糧共銀五萬八千餘兩日事嚴比終無完納之期伏思皇上御極以來宵衣旰食無時無刻不以民生為念自應恪遵前奉諭㫖據實具題然臣又思小民疾苦在所當恤而國計攸關亦宜熟計且豁免與緩征均出自聖主隆恩并非臣下所敢冒奏但三縣被淹地畝現在不能播種伏乞皇上敕部諭臣查奏使沿河百姓咸知感激天恩其三縣積年拖缺錢糧或容臣題請分作四年每年帶徵一年或將中牟縣未經漫口以前所缺康熙六十六十一暨雍正元年錢糧一萬九千四百餘兩在於雍正三四五三年內帶徵其雍正二年未完錢糧一萬四千餘兩陽武縣未完康熙六十六十一暨雍正元二兩年錢糧共銀一萬一千餘兩封邱縣未完康熙五十九年尾缺暨六十六十一雍正元二兩年錢糧共銀一萬二千餘兩仰懇聖恩俯賜寬免以蘇民困至於陽武封邱二縣雍正三年并以後錢糧臣查據被淹地畝自雍正二年霜降後現已涸出崖岸二三四五尺高不等臣隨諭令該地方官設法用力堵築凡進水之處俱巳斷流日漸乾涸將來地畝俱可照舊耕種民力稍舒完糧自易其三縣鹽鹻地畝實係不毛之地須俟十餘年後地氣減淡方可種植照舊輸糧今或輕其賦稅改為下則仍諭小民各熬硝鹻以完國課或容臣將每年共應納錢糧三千一百餘兩徑行題請豁免以廣皇仁𢎞恩出自聖裁再查中牟縣被淹地畝內有沙深不能種植之地一千二百六十餘頃每年應納錢糧五千二百餘兩雖多方勸諭並無分毫完納伏乞皇上恩賜暫行豁免其沙深一二寸至三四寸不等之地共九百七十餘頃每年共應納錢糧四千五十餘兩尚可置備牛隻將地耕深使下靣之土翻上與沙攙和一二年內仍可種麥種榖照舊納糧臣查耕地必須牛具小民被水之後衣食尚且維艱焉能置辦耕牛仰懇皇上將雍正三年應納錢糧恩賜暫行寬免并可否將豫省貯存充公銀內酌量動支借買耕牛分給各貧民儘力深耕仍將牛價限以二年內歸還司庫至應納錢糧自雍正四年為始照舊如數完納庶沙淤地畝不致永作曠土而於國計民生均有裨益矣再臣更有請者豫省修築堤工地多被壓而沿堤納糧地畝又因掘取土方刨成坑塹不能耕種難免賠納錢糧應否俟大工告竣之後容臣逐一查明另疏入告以上各項臣恐煩瀆聖聰謹擇其大略繕摺具奏其中尚有未詳之處恭候聖諭命臣具題之日分析題明仰祈聖鑒謹奏所奏俱悉候另有諭㫖雍正三年三月初三日河南巡撫臣田文鏡謹奏為遵㫖據實覆奏仰祈聖鑒事雍正三年三月初一日接准部咨據副總河臣嵇曾筠具奏管河道陳世倕不發錢糧預備物料一案欽奉皇上硃批諭㫖該部嚴察議奏速行文與田文鏡動河南司庫錢糧五萬兩交與嵇曾筠速速相機料理佟鎮調補管河道陳世倕問田文鏡如可用調補南汝道如無可取發回交部嚴加議處堤岸少有踈虞將嵇曾筠亦議重處欽此轉奉到臣除遵即檄飭布政使楊文乾將司庫錢糧動撥銀五萬兩解交副總河臣嵇曾筠作速相機料理外兹臣伏查豫省今歲桃汛較之去年雖屬稍大仰賴皇上福庇堤工俱各平穩而加幫大堤工程合計已完九分之數其餘未完一分於四月初旬俱可告竣至於豫省歲搶修工程例由河臣於年內秋汛後勘查確估㑹同撫臣具題預辦料物貯工俟題准部覆至日動支司庫錢糧移交河道今雍正三年歲搶各工錢糧經副總河題請於司庫內先行撥銀五萬兩及時分發備料臣於雍正二年十月二十七日准副總河移咨到臣或飭令河道先於河庫銀內借支或將加幫大堤銀兩通融給發臣隨咨覆副總河令其轉飭河道先於河庫銀內查係何項可以借支酌量給發并檄飭陳世倕先行通融動支而陳世倕過於慎重不肯一起給發臣恐貽誤當經屢次靣諭令其速發續據陳世倕冊報於雍正二年冬間連前署道楊守知任內暨該道接任後共先發過本年歲搶修銀二萬二千六百六十七兩零又於雍正三年正月起至二月二十六日止共陸續發過本年歲搶修銀二萬三千五百五十六兩零其餘銀兩向例留為夫工土方之用俟各屬開工之日再行發給等情到臣據此臣查此案應需銀兩已發過四萬六千二百二十三兩有零矣至陳世倕招怨之處因伊前奏加幫陽武大堤等工加一節省之外不用部費應再扣加一節省存貯道庫以備急需而從前印河各官做過工程銀兩並未扣存陳世倕欲急於歸公完伊奏請之案將從前已發者槩行嚴催因各屬未據解交將現在未發銀兩竟行扣存以致沿河州縣紛紛具詳臣因此項銀兩只可催追不便扣除如徑行扣除恐承築各官藉詞不敷貽誤工程關係重大隨經嚴行批飭并靣諭該道令其如數給發俟工完查明之日如有應追之項另行催追仍移咨副總河臣嵇曾筠轉飭并檄飭布政使楊文乾嚴查在案而陳世倕又見前署道楊守知任內錢糧東那西扯紛雜混亂竟致無可交代業經臣批飭嚴查另揭參追陳世倕以為前車之鑒亟欲徹底清釐絲毫不肯茍且寬容大招衆怨此副總河臣嵇曾筠所以有道員掣肘偏執乖張之奏也然臣細察陳世倕到任未久每於進見之時聽其陳禀河工段落以及堤岸緩急似乎胸中無不熟悉只因該道小心過甚惟恐河庫錢糧一有未清沾纍及已不肯稍為通融且膠執書生意見凡出納之間自信操守廉潔又恐各屬冒領浮銷居心行事俱在苛刻一邊以致衆怨攸歸遇有緊急誠恐不免貽誤今䝉皇上逾格隆恩不即加擯斥從寬調補南汝道以觀其後效又䝉皇上以陳世倕之可用與無可取詢臣臣伏思進退臣工出自皇上天恩臣何人斯焉敢冒昧置喙然臣受恩深重圖報無由惟有酌量地方之繁簡人才之短長據實上聞稍盡以人事君之微忱至於南汝道管轄南陽汝寧二府汝光二州及二十九州縣地方遼濶壤接吳楚甚屬緊要可否將陳世倕調任南汝道之處伏候聖裁倘䝉皇上賜恩准其調任後容臣再加逐細察訪如有不自悛改實心報效上負聖恩之處臣再另摺奏聞恭疏題參緣奉諭㫖事理除另疏具題外合先繕摺覆奏仰祈睿鑒謹奏陳世倕朕亦尚在眷惜但此番掣肘似屬有意掯帑誤工非奉公招怨被衆揑陷之可比汝斯言謬矣調任南汝容伊改悔日新實為逾格寬恩候題本到日有㫖雍正三年三月十七日河南巡撫臣田文鏡謹奏為據實奏聞仰祈聖鑒事竊查豫省今歲麥苖內有開封府所屬一十四縣自本年正月二十四日得雨之後迄今雨澤愆期風霾時起麥苖之上間生旱蟲其細如塵非人力所能撲滅詢之土人云係久旱而生每年常有得雨便消臣據報隨即竭誠步禱并轉飭各屬一體祈求如指日得有甘霖可望一半收穫又彰德衛輝懷慶河南四府所屬暨陳鄭許禹四州并所屬各州縣亦覺稍旱至於歸德汝寧南陽三府所屬以及光汝等四州并所屬各州縣於二月初十暨十七等日雖得有微雨然尚未霑足豫省雨澤愆期皆臣不能仰體聖心誠求民隱奉職無狀所致罪何可逭除痛加刻責猛自修省外所有被旱情形誠恐道路之口傳聞失實以致上厪聖懷臣不敢不據實奏聞謹奏昨於十九二十等日京都得雨滂沱兩晝夜連隂至四五日不意竟未普遍直𨽻南四府尚缺透足則豫省自未沾膏澤也為此朕甚憂之兹於二十六日親詣時應宫専為河南祈禱汝亦率屬竭誠修省以仰冀天慈同日又奏為仰懇聖恩格外賞給養廉以廣皇仁事竊查豫省巡撫學政司道暨知府同知通判州縣各官仰䝉聖主隆恩概行賞給養廉以資薪水似此曠典誠千古臣工未有之遭際也臣又何敢復置一辭上瀆聖聰但臣查據司府首領以及州縣佐二典史巡檢驛丞等官品職雖微均有贊勷助理之責况䝉聖恩准其保舉卓異而直𨽻各州州同州判復照府佐一例督緝責有攸歸且恭逢皇上宵衣旰食勵精圖治正人人思奮之時此等微員亦不無才識明敏廉潔自愛之輩其如官卑俸薄衣食無資兼之時有檄委奔走疲勞未免甘心自棄流為寡亷鮮恥之徒殊為可惜臣伏思皇上體恤臣工無微不至倘䝉聖恩格外垂憐一體賜給養廉自必咸感皇仁恪遵功令而於吏治民生均有裨益矣除司府首領以及佐雜教職等官議給養廉細數另繕清摺恭呈御覽外再查汝州一州前經撫臣石文焯議給養廉銀二千兩今陳許鄭光陜禹六州新分直𨽻均有承督盤查之責前議支給養廉銀一千兩較之汝州數不畫一今請將汝州養廉減去銀五百兩陳許等六州加給銀五百兩每州各給養廉銀一千五百兩并首領佐雜教職等官於雍正三年耗羡銀內酌量給發之處臣不敢擅便理合具摺請㫖謹奏此等作為在爾地方督撫大吏斟酌可否耳朕不便特諭意謂佐雜微員百人內未必有一二卓越者與其培植若輩莫如加增州縣養廉俾得從容展舒況從前已降恩㫖命微員俱得一例卓異保舉正當觀其涉歷清苦果否砥礪志行安分固窮若於其中拔出數員始可為真實材具今照所奏量加資助此際自當感激思奮強勉修飾恐進階之後未必不隨境遷移也斯論未免稍近於刻爾等試細加籌度毋即以朕諭為是遂乃中止也更慮者此非止行豫省之事倘遇他省耗羡不敷將從何分惠亦不得不一思及至於直𨽻六州僉有承督盤查親民之責增給之議實屬允協同日又奏為據實奏明仰祈聖鑒事竊查唐縣參革知縣關敶行賄一案前據學臣王國棟轉𫝊上諭臣即於雍正二年十一月二十日將關敶行賄實情據實奏明在案兹臣伏查關敶用賄行求原因該縣有未報隱地而起但查豫省隱地一項臣曾經繕摺奏懇寬其已往止令造報當年升科荷䝉聖恩允臣所請臣遵即密諭各府州轉飭各屬令其盡數開報毋得絲毫再隱嗣據關敶於詳揭後未經參革之前亦經造冊報明而臣前詳撫臣石文焯委員盤查各屬倉庫詳內以及檄委前護汝寧府信陽州知州李廷基文內並未入有并查隱地之語若一經參究誠恐已報者張惶驚恐而未首者勢必盡皆隱匿此撫臣石文焯於題參本內所以止據現首之銀兩並南陽府知府何煜詳揭虧空行賄繕疏入告也兹據各官審擬招解到臣臣訊據關敶固不敢將隱地供吐而李廷基又恐節外生枝自取罪戾亦不敢以關敶有未報隱地指證臣若嚴加䆒詰則與原參情節不符而部臣遵照律例駁查不免枝牽蔓引竟成大獄茫無歸結之期臣伏思皇上仁德如天恩膏普被凡有血氣之倫莫不均沾聖德而忠厚愚懦之關敶或亦仰邀𢎞慈者也臣謹照依原參欵蹟并各犯供吐情詞具奏再查信陽州解任知州李廷基其人小有才情賦性實多貪鄙臣察訪欵蹟正擬繕疏題參間接准部咨知李廷基借缺原任山東撫臣李聞謹奏覽同日又奏為據實覆奏仰祈聖鑒事竊臣前奏撫臣石文焯支取養廉一摺荷䝉聖諭所奏巳悉爾等督撫兩司亦不必矯廉過於清苦百凡總宜合乎情理之中只要還朕一當字而巳欽此臣反復誦繹似此浩蕩隆恩即千古帝王體恤臣工未有如是之深且渥也但臣伏查臣等食用荷䝉皇上天恩於本任內俱各賜有養廉已自用之不盡現今大小各官莫不感激聖恩人人思奮臣等實不敢矯廉致有絲毫清苦至於撫臣石文焯所請養廉自雍正二年九月初一日起至十一月二十六日止應得欽奉諭㫖靣同齊蘇勒商量斟酌若可更改即另換石碑理合一併覆奏伏祈睿鑒謹奏知道了雍正三年四月初二日河南巡撫臣田文鏡謹奏為遵㫖覆奏仰祈聖鑒事雍正三年三月十四日臣准河北鎮臣紀成斌來咨內開二月初一日具摺奏懇聖恩賞借藩庫銀八千兩製造各營步兵盔甲大小員辨分年捐俸還項奉皇上硃批諭㫖捐俸抵還則辨員殊覺苦纍爾言之田文鏡令其詳議具奏請㫖等因欽此到臣臣伏讀之下仰見我皇上睿慮周詳無微不至而體恤營員兵辨不啻天高地厚兹臣查據鎮臣紀成斌咨稱鎮標八營步兵止有開封一營舊有盔甲然亦皆年久損壞其餘七營歷來並無盔甲不足以壯軍威等語似應如鎮臣所請設局製造至於果否應需八千兩之數臣再移咨鎮臣令其逐一據實確估絲毫毋得浮冒俟估計到日或即在雍正三年耗羡銀內動撥移交製造之處臣不敢擅便伏候聖裁緣准轉傳欽奉諭㫖事理理合繕摺覆奏請㫖遵行謹奏此議好照所請行應助伊修整者同日又奏為遵㫖覆奏仰祈聖鑒事竊臣於本年三月二十五日前赴武陟縣地方金龍神廟會同河臣齊蘇勒副總河臣嵇曾筠於三月二十七日卯時開光巳時恭上御書扁額臣見敕建廟宇極其精工壯麗豫省士民莫不感頌皇恩歡呼雷動其廟內銅碑已經磨洗光明建亭竪立伏候御書碑文到日遵即恭鐫臣隨向河臣齊蘇勒轉𫝊聖諭據齊蘇勒回稱先前原要購覓石碑因近境並無堅固好石訪之别省更覺運費甚多再查石碑原樣鑄成銅碑一座巍立碑亭之中頗壯觀瞻且銅質堅固自可經久不致發鏽朽減至於應否用石用銅之處再具摺奏請聖明指示等語除河臣齊蘇勒會同臣合詞另疏具奏外合先繕摺覆奏仰祈聖鑒謹奏如碑尚未成自應用石若業巳鑄成難言不用銅矣當兹各省開爐鼓鑄錢文銅斤每慮不敷何必作此無益之費兼恐將來啓人效法之端也雍正三年四月初三日河南巡撫臣田文鏡謹奏為恭報得雨日期分寸以慰聖懷事竊查豫省自本年正月得雨之後雖據各屬報稱間有時雨均未霑足而開封一府所屬內多沙地旱乾尤甚經臣繕摺具奏今仰賴皇上敬誠感格於四月初三日卯時起至午時止省會四野得沛甘霖入土已有四五寸不等現今尚未晴霽麥穗勃發至於巳種秋禾盡皆滋長即未種地畝亦乘時可以播種士農工賈預卜西成羣歌聖德歡呼之聲遍於四野臣職任封疆不勝歡欣抃舞之至除各府州縣俟查明具報到日容臣另摺具奏外所有開封一郡得雨日期分寸合先繕摺奏聞以慰聖懷謹奏覽奏朕心雖為少慰但未及深信恐有粉飾耳一切總宜據實不可微涉虛僞爾於此事從前已屬奏遲地方上甫覺缺雨時即應將情形具奏以聞也雍正三年四月十三日河南巡撫臣田文鏡謹奏為恭謝天恩仰祈聖鑒事竊查豫省各屬自入春以來雨澤愆期臣於雍正三年三月十七日繕摺具奏於本年四月初五日據臣齎摺家人回豫恭捧硃批諭㫖朕於二十六日親詣時應宫専為河南祈禱汝亦率屬竭誠修省以仰冀天慈欽此到臣臣伏讀之下仰見我皇上愛民之深憂民之切豫省一隅偶爾稍旱即上厪聖懷躬親祈禱考之千古史冊實所未有臣與豫省士民正不知何修何幸而躬逢聖主共沐天恩至於如是之深且渥也但臣伏查豫省汝寧府所屬各州縣因離省甚逺臣一時未及查明乃近據各屬報稱於三月二十一二等日大沛甘霖自三寸起至七八寸不等四野均沾今四月初三日開封一府所屬各縣得雨四五寸不等臣已於本月初三日謹先繕摺奏聞兹復據彰德衛輝等六府所屬及鄭汝等七州并所屬各縣報稱於四月初三日已得大雨亦有報稱於四月初五初六等日得降時雨自二三寸起至六七寸不等二麥盡皆勃發已種秋禾俱各滋長未種地畝亦皆種植此皆我皇上至誠祈禱因而上格天心豫省久旱之後得有甘霖普降可望西成臣復將皇上特為河南祈禱雨澤隆恩向司道各府州縣宣揚令其轉諭百姓臣適㑹同欽差部臣查勘地畝見士農工賈以及黃童白叟莫不感頌皇仁咸歌聖德至於沿途所見得雨入土分寸與各屬所報無異再查豫省二麥統計各屬惟開封一府所屬麥苖間有枯槁今自得雨之後於四月十一日省城又得微雨并有報稱得雨至二三寸不等之州縣臣隨沿途乘便驗視雖其中豐歉不一然合計一府所屬竟可望三四分收成彰德衛輝懷慶河南四府所屬暨鄭陳許禹四州并所屬各縣被旱甚淺尚有五六分收成其歸德南陽汝寧三府所屬及光汝等三州并所屬各縣間有微雨地畝滋潤可得七八分收成所有豫省仰沐皇恩躬親祈禱得雨日期分寸理合繕摺奏謝伏乞睿鑒謹奏豫省雨水情形及二麥收成分數果能如是耶但須據實絲毫毋得隱飾同日又奏為據實覆奏仰祈聖鑒事竊臣前奏佐雜教職等官養廉一摺奉有硃批諭㫖臣遵即細繹不覺猛省復與布政使楊文乾再三籌畫實屬無益之舉即內有督緝等官亦似不便支給致有參差至於直𨽻各州既䝉聖諭僉有承督盤查之責增給之議實屬允協欽此似應將汝州一州減去銀五百兩支給養廉銀一千五百兩陳許鄭光陜禹等六州自應照給汝州之數每州各給養廉銀一千五百兩臣已檄飭布政司遵照矣又臣前奏撫臣石文焯所請養廉臣因事關動用庫項不敢擅専所以必待奏請然後支給不意石文焯即借此事心懷嫌怨幸䝉皇上洞鑒無遺明白指示感恩之涕不覺自零臣隨謹遵諭㫖將硃批捧出與楊文乾同看深仰我皇上至聖至明絲毫不爽因共相勸勉終始惟恪守奏信陽州解任知州李廷基一事荷䝉硃批諭㫖臣伏查李廷基又因虧空汝陽縣參革知縣鍾鐸世名下貯存府庫銀兩已經臣題參奉奏金龍神廟所鑄銅碑奉有聖諭臣已欽遵與河臣齊蘇勒靣同商酌復據齊蘇勒會同臣具摺覆奏仰祈奏覽雍正三年四月十四日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事雍正三年四月十三日臣接准部咨欽奉諭㫖著行文河南山東兩省巡撫得雨即令馳驛來報欽此到臣臣伏讀之下仰見我皇上心周蔀屋念切民生聖恩浩蕩誠千古史冊所未有除本年四月十一日以前闔省各屬所得雨澤臣於四月十三日業經繕摺奏聞兹臣伏查豫省又於四月十四日寅時雷電交作大沛甘霖臣隨委員分路查勘四郊高窪地畝入土四五寸不等此皆我皇上至誠上格因而時雨滂沱萬民胥悅除通飭各屬確查得雨日時分數飛報到日再繕摺具奏外所有近省得雨情形合先繕摺奏聞謹奏覽奏朕之憂懷頓釋但恐仍缺透足頃十七十八兩日㴻雨如注仰瞻形勢想應上蒼普沛膏澤豫民稱慶矣果爾即速奏聞雍正三年四月十七日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事竊豫省本年四月十四日近省得雨分寸情形臣欽遵諭㫖即於本日先行繕摺奏聞嗣據開封等八府暨鄭許等七州并所屬各州縣報稱於四月十二十四等日得雨一二寸至三四寸不等兹於四月十七日已時起至酉時大沛甘霖現今大雨尚猶未止臣隨登髙逺望見密雲四布雨澤普遍臣復委員分勘雨皆盈尺四野霑足民心大恱歡呼雷動此誠我皇上躬親祈禱精誠上格之所致也臣不勝歡欣感激之至再臣伏思我皇上德盛治隆嘉祥駢集今次雨澤諒直𨽻山左亦自必普遍民歌樂歲至於豫省各屬除離省遙逺之州縣檄飭該地方官立即確查得雨時日分數飛報到日臣再繕摺具奏外所有得雨十分霑足情形理合繕摺馳驛奏聞仰慰聖懷謹奏覽奏知豫省得雨十分霑足欣慰之懷莫可言喻我君臣真堪共慶也聞年羮堯前於二月間用車二十輛裝載細軟由潼關一路運往河南不知交卸何處或寄頓紀成斌署抑或藏匿他所確訪奏聞至紀成斌雖係年羮堯之所保薦朕觀其人未必甘心為作鷹犬毋逆詐更毋挾私誣陷細訪其居心行事秉公實奏以聞密之雍正三年四月二十五日河南巡撫臣田文鏡謹奏為敬陳愚悃仰祈聖鑒事竊臣一介庸愚仰沐皇上特逹之知畀以巡撫重任毫無報效時切悚惶乃幸䝉聖主隆恩於河南布政使員缺特簡楊文乾補授自該司到任以來臣見其才識明敏操守廉潔實非尋常可比且與臣協力同心共圖報效殊得臂指之助臣不勝感激歡欣踴躍抃舞今臣於本年四月十八日接准部咨欽奉諭㫖廣東巡撫員缺著楊文乾補授等因欽此到臣臣伏讀之下仰見我皇上至聖至明至公至當而楊文乾具有恩威並濟之才俾得展其所長實能仰體聖意正巳率屬愛養黎元為一省之保障但愚昧如臣甫得賢良贊勷助理又一旦升補他省臣不免勢處孤立借資無人清夜環思不覺悚惶憂懼更深覆餗之虞矣嗣據闔省士民張成等具呈懇留臣因楊文乾係奉㫖特升之員從無題請留任之例不敢冒昧具題所有微臣委曲私忱暨士民愛戴情形理合繕摺一併奏聞謹奏豈有阻人晉秩開府而強欲保留原任之理可謂笑談矣朕所賞鑒之才品大抵不致差謬從前熟識人中因故舊情殷稍失於偏或未可定同日又奏為據實覆奏仰祈聖鑒事竊臣齎摺家人回豫捧到臣覆奏金龍神廟內銅碑一摺欽奉硃批諭㫖如碑尚未成自應用石若業巳鑄成難言不用銅矣當兹各省開爐鼓鑄錢文銅斤每慮不敷何必作此無益之費兼恐將來啓人效法之端也欽此臣伏查此碑久巳鑄成磨洗光明及奉到諭㫖之日又業經建亭竪立嗣臣於本年三月二十五日前赴武陟縣地方向河臣齊蘇勒轉𫝊聖諭據齊蘇勒回稱實因近境並無堅固好石所以鑄成銅碑等語今䝉地畝仰䝉皇上軫念民艱欽差户部侍郎臣托時來豫會同臣逐畝履勘宣布聖德見沿途士民莫不焚香俯伏感頌聞理合繕摺具奏伏乞睿鑒謹奏覽同日又奏為據實奏明恭請聖裁事竊臣於雍正三年四月二十二日接准部咨奉㫖胡期恆寬其徒罪發與田文鏡河南堤工效力贖罪如抗違耽延發黑龍江當差等因欽此即於本日據刑部筆帖式傅敏將胡期恆押解到臣臣隨一靣咨會正副河臣一靣將胡期恆檄發布政司轉發管河道撥工效力外復據胡期恆回稱期恆罪當即誅今䝉皇上天高地厚之恩賜以寬典此身如同再造感激難名今現帶有盤費銀四千兩聼候先行兊收河庫動撥應用業又差人夫辦料分工修築但臣又思河工關係緊要胡期恆甫到工所未必遽諳河務且係效力贖罪之人復恐呼應不靈所關匪細臣再三籌畫可否將胡千兩飭貯河庫以備應用并嚴飭胡期恆作速竭力湊辦交納贖罪如敢抗違耽延臣再另摺具奏是否有當伏乞皇上指示遵行謹奏覽同日又奏為據實覆奏仰祈聖鑒事竊臣齎摺家人回豫捧到臣奏報雨澤一摺仰䝉硃批諭㫖覽奏朕心雖為少慰但未及深信恐有粉飾耳一切總宜據實不可微涉虛僞爾於此事從前已屬奏遲地方上甫覺缺雨時即應將情形具奏以聞也欽此臣伏讀之下悚惶無地寢食靡寧但臣伏查豫省各屬於雍正二年十二月內頻降瑞雪十分霑足本年正月二十四日以前又屢得雨雪地土滋潤逮至二月下旬惟開封一府所屬各縣內有高地及沙多薄地始覺稍旱而低窪地畝暨彰德衛輝等七府所屬并陳許等七州以及所屬各州縣則猶待雨未殷也後自三月初間開封所屬各縣尚無雨澤風霾時起臣即竭誠祈禱於三月十四十六等日始據通許尉氏等數縣報稱高坡地畝於麥苖之上間生􅖆蟲臣即於三月十七日繕摺具奏隨據開封所屬各縣報稱於三月二十二十一等日已得時雨雖未霑足而所生􅖆蟲俱巳淨盡臣於三月二十五日赴武陟縣辦理公務隨沿途查勘麥苖見祥符陽武等縣沙多土高地畝有受過蟲傷之麥苖間有枯萎臣復於四月初二日據實奏聞荷䝉聖恩特為河南雨澤躬親祈禱精誠所感上格穹蒼即於四月初三等日豫省各府州屬俱得時雨今又於四月十七日巳時起至十八日寅時止闔省均得大雨十分透足節經臣繕摺馳奏兹臣細查各府州所屬二麥歸德南陽汝寧三府所屬及光汝陜三州并所屬於二三月內實得過雨二三次竟有八九十分收成之州縣其彰德衛輝懷慶河南四府所屬暨陳許禹鄭四州并所屬被旱原淺可得五六分收成惟開封所屬之祥符陳留陽武封邱中牟尉氏蘭陽通許洧川等九縣并界連開封懷慶府屬之武陟原武修武暨鄭州并所屬滎澤一縣內多沙土高地覺有旱乾然自連日得雨之後雖所收豐歉厚薄不一合計收成尚有三四分四五分之數臣前據祥符等十一縣具報并臣前赴武陟縣據武陟鄭州滎澤三州縣士民具報亢旱臣隨檄發布政司委員確查詳報去後但臣沿途所見二麥雖間有枯萎而實穎實栗之麥苖正復不少臣恐耳目未周豐歉難以懸定又慮小民希圖停徴免糧捏詞混報更慮不肖州縣欲沽虛名詳報不實復遴選能員四路分查如果有成災之州縣臣自當核實具題如較豐年止不過數處略為歉收即不成災臣亦加意撫恤斷不敢使小民乏食稍有一夫失所今開彰懷衛四府所屬各州縣已䝉聖恩將貯存截留漕米二十餘萬石平價糶賣而常平等倉榖石復有存七糶三并春借秋還之例臣巳檄飭照例借糶在案現在米糧價值日漸平減出賣者甚多小民已不憂艱食況時值麥秋多有收穫而已種秋禾盡皆青葱暢茂未種地畝亦盡皆乘時布種萌芽滋長總之臣受恩深厚自簡畀以來一切俱係據實入告從不敢絲毫虛僞粉飾倘或少存不肖之心偶有一事茍且一字涉虛臣恐聖恩雖寬亦難自問於夙夜矣至於奏報少遲之處臣因三月初間開封所屬及河北三府實不覺甚旱且臣伏思皇上日理萬幾宵旰不遑為臣下者茍遇地方略有旱潦即張大其事冒昧入告以致上厪聖懷亦大非人臣愛君之誠矣此臣所以於三月十七日具奏實屬犬馬私忱因致稍遲罪何可逭嗣後惟有恪凛聖諭如遇地方才有水旱之事遵即速行具奏以副皇上諄切訓諭之至意為此繕摺奏覆伏祈睿鑒謹奏朕勤求治理寧辭焦心勞慮雖萬幾叢雜精力猶可應酬所以朝夕乾乾惟恐不知宇內兆民之真實情形耳雍正三年五月初六日河南巡撫臣田文鏡謹奏為恭報得雨日期分數以慰聖懷事竊查豫省各屬自雍正三年四月十七十八等日得雨霑足之後復於四月二十四二十七二十八等日疊沛甘霖地土益加潤澤今據開封府所屬祥符陳留等一十四縣報稱五月初四日酉時起至初五日已時止又得大雨四郊十分透足所種秋禾雜糧盡皆青葱遍野加倍茂盛此皆仰賴我皇上誠求感應因而甘霖普被澤及羣黎臣職任封疆覩此嘉祥不勝歡欣感激之至除飛飭各屬具報到日另摺具奏外所有近省得雨日期分數合先繕摺奏聞謹奏據奏雨水接續情形可望轉歉為豐實屬喜出意外也同日又奏為遵㫖據實密奏仰祈聖鑒事竊臣前為保固疆圉起見特疏題請復設河南營參將并添設官兵分防守禦荷䝉聖恩俞允嗣准部咨轉行欽遵在案惟是議添官兵處所俱係險要重地而河南營參將一缺管轄一府兩州一十七縣地方遼濶防禦最為緊要非得材技優長諳練營務之員難以勝任臣正欲於通省武辨中選擇能員奏請補授間適據河北鎮臣紀成斌轉𫝊皇上硃批諭㫖俟該部議覆到日然後與撫臣擬定人缺密摺具奏以聞欽此到臣臣伏思豫省參遊等官為數頗多若止於一二標內選擇恐有遺才所以臣復商之南北鎮臣令其於所屬標下各遴選一員臣亦於臣標武辨中挑選一員再行妥議酌奪去後兹據河北鎮臣紀成斌選有分防衛輝營參將徐起鳯南陽鎮臣佟世鏻選有左營遊擊王瑞材俱送臣驗視前來臣亦於所屬標內選有中軍遊擊馬世龍以上三員臣隨驗據遊擊王瑞材雖熟諳營務而年已七十似與人地不甚相宜無庸奏請外惟參將徐起鳳遊擊馬世龍漢仗弓馬皆有可觀均堪調補升授仰懇皇上於此二員中簡用一員庶要地得人而臣亦可收臂指之效矣再查參將徐起鳳於雍正二年二月內到任遊擊馬世龍於欽奉上諭事案內經臣給咨送部現在恭候引見合并聲明謹奏已有㫖矣其遊擊馬世龍業經引見朕命楊文乾過豫時面諭汝知同日又奏為恭報二麥收成分數以慰聖懷事竊查豫省今歲二麥雖間有被旱之州縣分數略為減少然幸䝉皇上軫念民生特為河南雨澤躬親祈禱精誠上格甘霖疊沛遂使已枯之苖盡皆復蘇方秀之禾愈加滋長現今通省二麥俱已登場兹據開封府報稱所屬祥符等一十四縣收成自三四分起至四五分不等彰德府報稱所屬安陽等一州六縣收成自四分起至五六分不等衛輝府報稱所屬汲縣等七縣收成自五分起至六分不等懷慶府報稱所屬河內等七縣收成自三四分起至五六分不等河南府報稱所屬洛陽等十一縣收成自五分起至六七分不等南陽府報稱所屬南陽等十二州縣收成自五六分起至七八分不等歸德府報稱所屬商邱等一州八縣收成自七八分起至九十分不等汝寧府報稱所屬汝陽等一州八縣收成自七八分起至九十分不等汝州報稱該州并所屬魯山等四縣收成自六七分起至八九分不等陳州報稱該州并所屬商水等四縣收成自五六分起至七八分不等許州報稱該州并所屬臨潁等四縣收成自四分起至五六分不等鄭州報稱該州并所屬滎陽等四縣收成自三分起至五分不等禹州報稱該州并所屬密縣等二縣收成自三四分起至五六分不等光州報稱該州并所屬光山等四縣收成自七八分起至九十分不等陜州報稱該州并所屬靈寶等二縣收成自五分起至六七分不等以上各屬所報二麥收成分數臣復細加確查惟開封府屬之祥符陳留陽武封邱中牟尉氏蘭陽通許洧川等九縣懷慶府屬之修武武陟二縣鄭州屬之滎澤滎陽汜水三縣禹州屬之密縣內多沙土高地兼之工本缺乏人力不齊實止三分收成然其中低窪地畝并料多力勤之地可獲五六分收成況沙土瘠地即遇豐年所收亦屬有限似不可遽謂之成災也臣查定例被災七分八分者免錢糧十分之二今積年錢糧荷䝉皇上軫念民艱特㫖分作五年帶徵民力已舒此十數縣些須被旱減收地畝似可無庸再為題請至於此內或間有乏食貧民臣自當加意撫恤務令得所但臣智識短淺是否有當伏乞皇上指示遵循所有各屬二麥收成分數理合繕摺據實奏聞謹奏所奏甚屬周詳明晰知道了同日又奏為請停印發紅簿以省無益事竊臣於雍正二年十月十七日接准部咨議覆條奏內開令直𨽻各省州縣將下年徵收錢糧之紅簿於上年十月內申送布政司鈐蓋印信於開徴前給發各州縣即眼同花户登記填發串票上司盤查時即取布政司鈐蓋印信之紅簿對驗則虧空自難於掩飾矣等因具題奉㫖依議欽此到臣臣隨檄行布政司轉飭各屬遵照造送去後兹臣伏查各州縣花户錢糧一年之內增減不一各州縣統俟年終彚齊於次年未開徵之前查明過割數目造具紅簿分月分限按期照數催徵臣前為牧令一十四年知之最確今部咨內令各州縣於上年十月內將紅簿申送布政司鈐蓋印信而此時民間售買地畝尚未過割淨盡促之造送必致遺漏舛錯如將現在過割數目造冊送印則十月以後過割錢糧作何開除如俟彚齊造送則已值開徵印發不及臣查豫省所屬紅簿多寡不等共有二千六百七十餘本布政司止此銀印一顆除日行事件鈐用外即朝夕印發巳屆四月完半之期而紅簿未到之州縣則又無從填注不敢擅自徵收難免貽誤餉需如聽其先立草冊俟發到紅簿另為填注則數月以內並無紅簿該管上司憑何盤查且恐有等不肖州縣即乘此侵那反致虧空臣愚以為各州縣虧空錢糧并不在於紅簿之用司印所貴乎為上司者果能正巳率屬分文不取一遇盤查之時或有不肖州縣捏造紅簿串票希圖掩飾立即查驗批領實在并傳集催頭花户及正身經承嚴加訊究仍令其開列完缺出具甘結與紅簿串票磨對州縣雖甚狡猾斷不能賄囑闔邑之士民而代為捏飾也如為上司者或平日受其彌縫收其禮節即有虧空州縣有所恃而無恐上司亦明知而不問偶或盤查止不過虛應故事而已雖有司印紅簿實屬無益臣於豫省錢糧現經檄司轉飭該管上司給發封條將銀匱概行封固俟徵有成數詳請委員驗拆隨即督令起解而承委之員復令其出具并無拆多報少如有扶捏情弊願甘獨賠印結送司存查仍嚴飭道府各州照例不時盤查即或不能杜絶虧空竊計監守之員當亦知所警惕矣臣受恩深重熟計印發紅簿非惟不足以永杜虧空而州縣各官反因此滋擾臣不敢不據實具奏如果臣言可採伏乞皇上俯賜訓示以便另疏具題為此繕摺請㫖謹奏條奏內所稱用司印鈐蓋紅簿之說或亦係杜絶虧空一法但各省民情風俗不同宜否各異要在爾等封疆大吏悉心斟酌而行耳其據實題覆仍聽部議同日又奏為據實覆奏仰祈聖鑒事竊臣齎摺家人回豫捧到臣於本年四月十七日恭報雨澤一摺欽奉硃批諭㫖覽奏知豫省得雨十分霑足欣慰之懷莫可言喻我君臣真堪同慶也等因欽此臣伏讀之下仰見我皇上軫念民生有加無已臣不勝歡欣踴躍感激難名正不知臣與豫省士民何修而仰沐聖主天高地厚之恩一至於此也至䝉聖諭年羮堯一事容臣密加確訪一有著落臣即繕摺密奏又䝉聖諭命臣細訪河北鎮臣紀成斌之居心行事臣查據紀成斌自到任以來臣雖未經會靣但細察其文移及往來字札其人辦事勤敏至居心行事之處臣尚未深悉不敢妄奏惟有謹遵諭㫖細加察訪據實奏聞總之臣受洪慈此實臣敦篤之誠可以自問於幽獨者也緣奉聖諭事理合先繕摺密奏伏祈睿鑒謹奏所奏是朕深為嘉悅雍正三年五月十六日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事竊查豫屬近省於雍正三年五月初四初五等日續得大雨業經臣於五月初六日繕摺奏聞嗣據開歸等八府所屬及陳許等七州并所屬各州縣報稱於五月初四初五暨初九初十等日先後復得甘霖均沾普遍兹又據開封府所屬祥符陳留等縣報稱於五月十四日得雨二三寸不等又於十五日大雨滂沱入土一尺有餘四野十分透足秋禾暢茂士民歡躍咸頌皇仁此誠我皇上敬天愛民精誠感格之所致也臣職任封疆覩此休徵不勝抃舞之至除俟逺屬申報到日另摺具奏外所有近省得雨情形合先繕摺奏聞謹奏通省如是透足誠屬可喜之事同日又奏為恭報米麥雜糧價值以慰聖懷事竊查河南省城自今歲二月中旬以後米糧價值稍覺騰貴幸仰賴我皇上至誠祈禱於本年四月十七十八等日通省得雨霑足之後復得時沛甘霖民情喜悅價值日減其彰德衛輝懷慶三府所屬及鄭許禹三州并所屬各地方從前米糧價值原較開封府所屬略為減少今自得雨以來時價益減至於歸德汝寧南陽河南四府所屬及光汝陳陜四州并所屬各地方米糧原未增價今二麥又復豐收較之彰德等府所屬米糧價值更為平減除各府州所屬時價本甚平減無庸入告外兹省㑹白麥時價每石七錢四分零紅麥每石六錢九分零高糧每石三錢九分黃豆每石五錢一分零黑豆每石四錢六分零榖子每石三錢二分零小米每石五錢五分零黍子每石五錢二分零理合據實奏聞仰祈聖鑒謹奏覽豫省米麥價值情形殊為欣悅之至同日又奏為據情代奏恭謝天恩事竊臣據按察使張保詳稱本年五月初九日䝉頒到御賜黃匣一箇內貯紫金鹽水等寶錠四種保隨恭設香案望闕叩頭謝恩祗領訖伏念保以一介旗員至愚極陋仰沐皇上𢎞恩畀以豫臬重任兩載以來涓埃未報時切悚惶兹復荷聖恩特賜寶錠保何人斯邀此曠典欽承之下不勝感激涕零惟有竭盡駑駘愈堅清白以仰報我皇上髙厚隆恩於萬一耳所有感激微忱無由上逹懇請代奏等情到臣臣查據張保情詞懇切理合繕摺代奏恭謝天恩仰祈聖鑒謹奏覽張保詳請代奏情詞知道了當傳諭伊毋因䝉朕眷顧遂乃放恣妄為即照此一念不移做去方好同日又奏為據情代奏恭謝天恩事竊臣接准部咨欽奉諭㫖陳世倕氣髙性執支給河帑雖致遲延並無别項情罪人尚有才且有勉欲做好官之心著補授南汝道仍行文申飭令伊嗣後勉力盡職務改前非如怙終不悛定行從重治罪斷不寬宥欽此到臣臣隨行布政司轉行原任管河道陳世倕接管南汝道印務并欽遵諭㫖行文申飭去後今據陳世倕詳稱伏念世倕賦性庸愚不諳河務以致發帑遲延上厪聖懷罪何可逭乃仰䝉皇上𢎞慈不加重處復改授南汝道之職似此高厚隆恩世倕即捐糜頂踵亦難圖報兹復荷聖恩諄切訓誨祗遵之下不勝感激涕零自今以後惟有朝夕恪凛聖訓痛改前非勉力盡職以仰副我皇上寬宥殊恩於萬一耳所有世倕感激私忱不能自已懇請代奏等情到臣臣伏查道員從無代奏謝恩之例不敢冒昧具疏題奏而陳世倕情詞懇切臣又不敢壅於上聞謹繕摺代奏恭謝天恩仰祈聖鑒謹奏覽代奏情由知道了本章國體攸關應遵定例若具摺密陳諸凡俱可雍正三年五月二十六日河南巡撫臣田文鏡謹奏為恭謝天恩事竊查豫省河工荷䝉皇上軫念民生不惜百萬金錢大興修築遂使水勢安瀾黃流順軌變沮洳為樂土登斯民於衽席乃皇恩浩蕩有加無巳復發帑銀於祥符縣之回回寨老君堂等處挑穵引河並仰䝉聖恩指授方略飭建挑水壩一座使水盡歸引河以免旁溢誠億兆蒙庥萬世永賴之樂利也今水勢已長正可乘機開放臣隨諭令河員於本年五月初六日將河頭河尾集夫挑穵幸蒙皇上至誠感格河伯昭靈巳於五月初七日開放大溜掣入奔騰東注旬日之內河頭寬有二百餘丈河身至河尾寬濶相等水勢直下盡入引河舊日正河兩邊俱已露灘中泓止有三四丈流水亦甚遲緩人可涉水而過大約不久正河即可盡行淤斷至挑水壩座亦於五月二十日已經完工其上下雁翅護崖掃箇之類現在儹工修築指日亦盡可告竣則是挑穵引河之利不特回回寨等處納糧地畝可以永保無虞而新漲河灘并可漸施畚插且與沿河一帶數十村莊以及省城地方均大有裨益矣兹據回回寨等處居民楊懷義等因引河巳成田廬可保莫不感戴皇仁歌頌聖德歡呼之聲遍於四野臣職任封疆幸逢嘉㑹不勝歡欣踴躍所有士民感激至切情形理合一併繕摺奏聞仰祈聖鑒再臣伏查南北兩岸加幫大堤各處俱巳報竣惟祥符中牟太康等三縣或因工程稍多或因前令未完每縣尚有數段現在勒限嚴催作速儹築務於六月中旬告竣合併聲明謹奏田廬既永免衝決之虞沮洳復變為膏腴之壤誠屬可喜事也同日又奏為敬陳河工錢糧務宜逐案及時奏銷以清欵項仰祈聖鑒事竊臣伏查河工錢糧雖例得通融支給然一案有一案之工程一案有一案之錢糧若不及時逐案奏銷一至年深日久用過物料不無黴爛漂失之虞堤工丈尺亦有淤高蟄陷之處工程無憑查驗因而錢糧得以指借紛雜混亂莫可究詰即欲徹底清查而承築經手各官又多去留無定難以追求如責令現任之員清算則又茫然不知頭緒遂至經年纍月愈積愈多不特一時奏銷艱難抑且新舊交代不易臣查據豫省未銷工程自康熙六十一年起至雍正二年閏四月以前止不下十有餘案東牽西扯紛如亂絲臣愚以為各案堤工內除歲搶二修仍令按年奏銷外其餘一切工程如做完一工即將此工用過錢糧暨工程丈尺土方價值樁料數目隨令管河道核算明白立即造冊詳報河臣撫臣勘明工程㑹核奏銷不得定以次年彚銷之限稽遲時日庶新築工程新添物料一目了然而承築經手之員亦無從指借冒銷矣至於遇有險工出於意外一時急須搶救不及估計題請之項須令河臣一靣檄飭管河道動支錢糧委官搶救一靣令管河道報明河臣咨部存案工完即行造冊申報委官勘明銀工相抵隨即繕疏奏聞飭部查銷毋得觀望推諉坐失機宜臣為清理河工錢糧起見偶有一得之愚不敢不據實密奏伏乞皇上特頒諭㫖飭令河臣不得拘定次年彚銷之例竟致延擱務遵照康熙二十八年十月內所定計銀限日奏銷之例依限逐案及時奏銷如有逾限即賜飭部嚴加議處如此各清各欵自不致年久牽混而工料現在亦可查核勘驗不致捏造冒銷於河帑大有裨益矣謹奏內有兩欵乃係現行之新例餘俱不可此奏殊缺斟酌矣同日又奏為遵㫖據實覆奏仰祈聖鑒事竊臣欽奉皇上硃批諭㫖聞年羮堯前於二月間用車二十輛裝載細軟由潼關一路運往河南不知交卸何處或寄頓紀成斌署抑或藏匿他所確訪奏聞等因欽此臣遵即差委奉發來豫試看候補之侍衛白琦沿途訪查嗣據白琦回稱自潼關一路密訪於本年二月初三日有年羮堯所雇騾車一十九輛住宿河南府大通店由河南府逐程挨查於二月初十日住宿彰德府屬之豐樂鎮聞係載至直𨽻保定府起卸等語臣復令其再往前途確查并至保定府地方密查卸於何處交送何人據實回覆去後一經查有著落臣再未經會靣兹臣細加察訪該鎮到任半載有餘辦事尚屬勤敏與百姓亦覺相安第聞其人情性暴戾居心殘忍兵卒微有怨言臣所訪如是並不敢迎合聖意致有欺誑容臣不時再行察訪確實繕摺奏聞合併聲明謹奏所訪紀成斌之處已悉佟世鏻居官何如更訪以聞同日又奏為恭謝天恩仰祈聖鑒事竊臣前奏河南營參將一摺欽奉硃批諭㫖巳有㫖矣其遊擊馬世龍業經引見朕命楊文乾過豫時靣諭汝知欽此臣正在祗候間於本年五月二十四日接准部咨欽奉上諭河南府城守營參將著馬世龍補授等因欽此到臣臣跪誦之下不勝鏤心刻骨感激涕零伏念臣本庸材仰沐皇上洪慈不以臣為謭劣委任責成至深至切業巳捐糜莫報兹復荷聖恩垂念地方緊要收回成命特將馬世龍欽賜補授非惟要地得人俾臣并獲收臂指之效似此高厚之恩誠千古未有一時僅見臣遭逢何幸疊荷恩慈有加無巳清夜環思惟有愈竭駑駘永堅清白以仰報我皇上知遇之隆恩於萬一耳所有微臣感激私忱理合繕摺奏謝為此謹奏若不如是委託信任俾爾臨事趦趄何能承流宣化整理地方但常懷不忍負之心斯已耳何用謝為硃批諭㫖卷一百二十六之四欽定四庫全書硃批諭旨卷一百二十六之五硃批田文鏡奏摺雍正三年六月初十日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事竊查豫省各屬自本年五月十七十八等日以前所得雨澤業經臣節次繕摺奏聞兹又據開歸等八府所屬汝鄭等七州并所屬各州縣報稱於本年五月二十一日起至二十七日止連得大雨均沾普被十分透足又於六月初三日起直至初十日連日大沛甘霖雖間有止息之時然迄今陰雲密布天尚未霽不特四野霑渥抑且充滿有餘即匝月無雨田禾俱可豐收現今高糧蚤穀蚤黍盡皆秀實再至一月均可收穫登場其餘晚穀晚黍以及花豆芝麻等物亦俱各青葱遍野暢茂條逹詢之老農皆云十餘年內從未有此豐稔此皆我皇上軫念民生至誠感召因而上天垂眷五風十雨出諸意外實穎實栗大有可期臣職任封疆覩此休徵不勝歡欣踴躍之至所有豫省得雨透足暨禾苗暢茂情形理合繕摺具奏仰祈聖鑒謹奏覽穀黍秀實情形不禁額手為豫民稱慶兼亦代爾欣幸之至也同日又奏為遵㫖據實覆奏仰祈聖鑒事雍正三年六月初六日臣齎摺家人回豫捧到皇上硃批升任布政使楊文乾奏摺一扣荷䝉諭㫖爾等撫藩俱忽略矣此係田文鏡當具奏者等因欽此臣伏讀之下不勝惶悚兢惕感激無地但臣伏查豫省沿河各州縣地方自黃水漫溢之後將納糧地畝變成鹽鹻沙土者比比皆是惟勤於力田之民不惜工本時加耕耨地復成熟其間游惰農民見有沙土即棄而不耕以致地漸荒蕪無可播種蓋沿河地畝價本甚賤民多視為無關輕重之物且民欲無饜一聞皇恩敕查免糧無論沙土地畝紛紛具告即耕種地畝亦希圖豁免槩行混呈故日前欽差大臣來豫祥邑士民稟請於前原武滎澤等縣亦訪惟查據陽武封邱中牟三縣被淹尤甚民力更難復委員密行查勘巳得確實畝數然後敢於入告今祥符等縣沙土鹽鹻地畝本來原甚有限且尚可開種前據士民具呈臣巳批發布政司確查詳報在案又於五月內臣隨將祥邑所屬之南北兩岸村莊諭令開封府密行查勘去後嗣據該府稟稱各村所開沙地十分之中已種有四分現今禾苗茂盛可望收穫其餘未種地畝多係當年逃荒在外未歸民業遂致荒蕪等語至於原武滎澤等縣臣查據各該地方亦間有鹻沙地畝今祥符縣沙地荷䝉聖恩諭臣具奏臣敢不再行遴委能員俟秋成後勘查確實如果均係沙土鹻地糧無所出臣遵即繕摺一并密奏恭請聖裁謹將從前未敢具奏緣由先行繕摺覆奏仰祈睿鑒謹奏朕恐百姓致怨於汝因有前諭俟秋成後將三邑確實情形一并查明奏聞可也同日又奏為漕糧關係國儲挽運必須協力懇請改歸屬縣以免推諉遲誤事竊查豫省漕糧改徵本色米共一十萬四千餘石折徵採買米共一十五萬餘石向受兌於衛輝水次自衛輝府屬之汲縣挽運起歷淇縣湯隂縣及直隸大名府屬之濬滑內黃等三縣并大名縣之龍王廟止共計水程紆回六百四十餘里其中遇有淤淺之處惟在地方各官不分彼疆此界協力刨挖深通建壩蓄水雇船剝運方克有濟是以雍正二年十月內經副總河臣嵇曾筠奏請於淺澀處所每年建築草壩束水浮舟嗣准部議奉㫖依議欽遵在案但豫屬之汲縣則與直屬之濬縣小河口接壤豫屬之湯陰縣五陵集十里則與直屬之滑縣米善口接壤米善口九里十三弓則又至湯陰縣潘家灣塌河所由塌河所水路四里二百八十五弓又至滑縣地方由滑縣水路三里至直屬之內黃縣草坡地方由草坡水路十二里復至湯隂縣蔡家窰及北高堤等處由北高堤水路六里半又至內黃縣地方由內黃縣水路三里又至湯陰縣孟家灣由孟家灣水路三里又至內黃縣林家灘由林家灘水路四里又至湯陰縣流水口固城壩等處由固城壩水路十八里又至內黃縣神廟竇公等處兩省地方極其交錯是以每當運漕之時豫省撫臣飭發令箭委員督催出境糧道則親詣守催而押運府佐等官復係各屬之上司斷無不畏參處怠玩從事之理若一交直隸地方事係隔省毋論道府等官任意逍遙即地方各官亦視為隔省上司無可如何莫不延挨推諉及至淺阻移查則又皆捏詳支飾卸過於人而該管上司既存有彼此之見復不能親歷其地不過止據各屬稟詳空文塞責而巳此豫省漕糧年年不免遲誤而押運等官所以屢被參處者也臣仰懇皇上俯念漕糈攸關隔屬呼應不靈將濬縣滑縣內黃等三縣改歸豫省之彰德衛輝二府就近分隸管轄庶事歸統一彼此不致掣肘至於運送漕糧每年挑淺築壩之費臣查據糧道衙門有鹽商節禮銀四千一百兩開封府衙門亦有鹽規銀八百兩現據糧道沈廷正開封府知府孫蘭芬俱稟稱仰䝉皇上天恩賞有養廉巳自用之不盡所有鹽規願充公用等語則是此項銀兩便可每年動撥銀三千餘兩分發各屬一例建壩挑淺飛挽前進自無阻滯之虞而於國計民生實大有禆益矣是否可行臣不敢擅便伏乞皇上指示遵循臣更有請者前奉諭㫖河南糧艘向由大名一帶轉運但係灘河難免淺阻遲延可否由漳河挽運詳加詢明具奏等因欽此到臣臣隨一面細加察訪一靣轉行糧道查議去後嗣據糧道沈廷正詳稱豫省漕糧若改歸直隸大名府屬之小灘鎮受兌本色米石便有舟車盤運長途跋涉之難採買米石則又因小灘一隅之地斷難買米一十五萬石之多且該地方百姓均係回教無論牙行囤户得以故高價值即買運堆貯費亦浩繁官民受纍莫可控訴并聞從前豫民坐歇樹下亦要地鋪錢二三十文以每石六錢五分之價買米尚恐不敷焉能供此需索今此案本色米石應仍在衛輝水次受兌其採買米石不必拘定水次何處買米即於彼處交兑等語與臣所訪無異業經臣繕疏奏聞奉旨依議欽遵在案今大名府屬各官只圖便安不顧利害意欲改歸小灘以免貽纍故每遇挽運之時竟高坐官衙任催罔應即偶或一來亦旋即回署不過飭委一二佐雜聊且塞責究於漕運毫無禆益倘䝉聖恩將濬滑內黃等三縣改歸豫省管轄則統屬既專呼應自靈即不必拘定水次而漕運自不致遲誤諸弊亦可盡絶矣再臣查沿途水次若建立石閘須得三十餘座費既浩繁且恐流沙壅塞反多未便每年只可建築草壩若遇水大之時益可暢行實為妥便總之臣受旨謹奏據奏欲將濬滑內黃等三縣改歸豫省管轄以禆益漕運利弊瞭如指掌深中肯綮似此抒誠直逹毫無瞻顧可謂於人臣奉公盡職之誼不忝矣巳交發部議俟覆到時酌定施行同日又奏為據實覆奏仰祈聖鑒事雍正三年六月初三日據廣東撫臣楊文乾到豫轉傳上諭河南撫標中軍遊擊馬世龍漢仗弓馬俱優前在浙江放賑甚好係極有良心之人朕因河南府城守參將缺緊要伊在豫年久以之升補正是駕輕就熟已用硃筆將伊名字記注在上上等內所注之處今與爾看明於過豫時可傳諭田文鏡知并令馬世龍知之欽此臣祗承之下感激難名而馬世龍同臣跪聆諭㫖復不勝鏤心刻骨感激涕零回稱世龍惟有竭盡聖諭飭開賈魯河一事臣伏查此河前據楊文乾在布政司任時即與臣商議欲行開穵臣思此河如果工程告竣可以永逺通行原屬萬世無窮之利焉敢不亟為奏請臣隨查閲舊案自鄭州所屬之滎陽縣起至陳州屬之沈邱縣止共計十一州縣紆回不下千里於康熙四十五年曾經開穵雖題銷議捐俸工銀二萬九千餘兩然至四十七年七月內工完合計派之里下及通省各屬公捐實動用過銀二十餘萬兩逮後駕船試探其中或淺或深竟不能暢行無阻蓋因豫省土性鬆散略被風雨吹刷兩岸所挑沙土即歸河道旋濬旋淤是亦地土使然故不待河水衝決而數年之內深者尚有河形淺者已變為陸地臣前與楊文乾靣商時并熟計黃河兩岸荷䝉我皇上軫念民生不惜百萬金錢特命大臣董司其事復設立河員汛辨分工堅築且仰賴我皇上至誠感格河靈助順即至萬載以後自可永慶安瀾斷無漫溢衝塞之虞然臣所慮者新開河道兩岸流沙勢必漸次淤墊而各處交通支河一遇山水漲發盡歸合流又不免水去沙停即建閘築壩設官設夫不時挑穵而每年錢糧糜費貽纍更非淺鮮且臣查鄭州屬之楊對橋地勢高下不等難循故道開穵必須另開四十餘里方免阻隔若向民間買地開河巳得數萬金再加備料雇夫建閘築壩一切動用等項費甚浩繁况查據康熙四十五年之時費銀二十餘萬均係派之里甲今䝉皇上愛養黎元諸弊盡革若俱照民間價值雇募採買所費更恐不資臣䝉皇上隆恩畀以封疆重任凡有利益斯民之事焉敢不據實預陳其如開穵此河費既如此浩繁河又不能經久且細察近河民情亦誠恐堆積泥土侵傷地畝殊多不願臣若不細加斟酌悉心咨訪輒聽浮言誑惑一時輕舉冒昧具奏及至錢糧糜費功迄無成是即無事尋事臣罪尚何可逭此臣之所以再三熟計而不敢遽為入上諭鄧州地方古來甚屬要緊陳綬來既不能勝信陽之任又豈宜於鄧州等因欽此臣跪聆之下仰見我皇上至聖至明無微不照臣自幼並未讀書實不知鄧州係古來要緊地方而智識短淺更不能深思逺慮以為目前似屬地僻事簡竟以信陽州知州陳綬來調補鄧州冒昧具題今䝉皇上明白指示臣不勝慚悚兢惕感激無地可否將陳皇上簡選能員補授庶要地得人而臣得收臂指之效矣又䝉上諭桃源集一案臣批委糧道沈廷正前赴該地方㑹同直隸山東委員公同確勘去後嗣據沈廷正回稱未到之時內有紙坊一寨適因直隸查拏盜犯百姓誤聽訛傳恐被嚴處間有幾家驚疑躲避逮後宣布皇上隆恩無非為弭盜安民起見竝無别意民情胥悅而潛避之民亦旋即歸里地方寧謐然小民甚恐撫存案一靣交給該地方官收審庶三省聮界盜賊該員均得查拏自無所容其躲避并無所容其託足矣臣俟㑹同查議妥確謹再繕疏具題以上各項理合繕摺覆奏仰祈聖鑒謹奏若令三省之民共聽一官約束則此一官即不得不為三省督撫之屬員矣試思銓部有斯等職銜否耶同日又奏為仰懇聖恩逾格補授辨員以收得人之效事竊查臣標中軍遊擊馬世龍荷䝉聖恩欽賜補授河南府城守營參將所遺員缺關係緊要非得老成練逹之員難以勝任兹臣查有臣標中軍守備張孟儀自康熙五十二年十一月內抵任迄今已經一十三載其人整飭營務訓練士卒素著勤敏兵民亦盡皆悅服抑且操守廉潔熟諳河工承辦事件從無遲誤雖漢仗不如馬世龍之射近日弓馬亦皆嫺熟又查雍正二年二月內有奉發來豫候補之年滿千總洪繼澤於雍正元年十二月二十三日引見奉經進藏著有勞績又雍正三年二月內有奉簡補臣標中軍遊擊所遺守備員缺請即以洪繼澤白琦二員內欽賜一員補授不特地方得人而臣實收臂指之效矣但是否有當臣不敢擅便仰祈陽鎮標左營歷任千把總與康熙六十一年七月內所定督撫提鎮將在本籍歷任備辨之員仍題補本籍都遊參副將者降三級調用之例有間倘䝉聖恩特賜俞允或容臣遵照雍正三年五月內欽奉諭旨過八月初一日再行送來引見之旨起送引聖裁臣為地方營伍起見故不揣冒昧繕摺請旨謹奏覽雍正三年六月二十一日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事竊查豫省各屬自本年六月初十日以前所得雨澤業經臣節次具奏兹又據開封等八府所屬暨鄭汝等七州并所屬各州縣俱報稱於六月十一日起至二十日止每日日則晴霽夜即大沛甘霖不特四野十分透足抑且均沾普被溝澮皆盈現今高糧蚤穀蚤黍等類不過半月均可收穫其餘晚穀晚黍以及花豆芝麻等類亦盡皆吐秀即至匝月無雨豐收可必詢諸老農皆云二十餘載無此暢雨民情胥悅此皆仰賴我皇上至誠感召之所致也理合繕摺具奏仰祈聖鑒謹奏直隸山東近日雨皆過多禾稼頗有防潦之慮據奏豫省二十日以前晴雨各適其冝但未知以後光景如何耳同日又奏為責成河道兼管河兵以免曠工以收實效事竊臣伏查豫省南北兩岸堤工仰䝉皇上隆恩不惜百萬金錢設官修築遂使河流底定得奏安瀾又因原額堡夫不足防禦特諭調撥江南河兵來豫修守隨經河臣齊蘇勒抽調十河營兵一千名千把總六員分派險要協力防範嗣因正副河臣議請裁去堡夫以致上厪聖懷諭令詳悉斟酌議奏復經副河臣嵇曾筠奏請停裁經臣題請照舊仍留并令堡夫跟隨河兵學習樁掃鑲墊等事於每年南兵將換之時試驗得實即准其拔作河兵以免淮兵逺涉之勞俱經部覆奉旨依議欽遵在案臣思堡夫之學習樁掃必須分責河員董率稽查方克有濟或一月一試或按季一驗內有教習勤而成就多者則給賞以奬勵之或有懶於指示怠於學習者則責治以警戒之庶河兵堡夫交相勸勉不過二三年內堡夫亦盡皆諳練明白均可拔作河兵無庸再調南兵矣兹臣查據撥到河兵雖有千把總六員為之統轄然而官卑職小其勢不能約束至於印河各官則又文武不相統攝毋論著令教習堡夫勢固有所不能即遇有險要工程亦多不服驅使委任雖有河兵之名究難收河兵之效臣愚以為守巡二道舊有兼帶兵備之銜而撥到河兵又無操演營務之事原與堡夫不相上下似應責令管河道統攝稽查并分責各河同知董司教習如有抗玩怠惰者許管河道徑行責治并許各河同知㑹同千把總究處如此河兵必咸知約束不敢抗違而堡夫學習樁掃等事亦易於成功矣至於責令管河道兼管河兵之處亦不必格外紛更止將管河道敕書內加入此款即可遵循但是否有當臣不敢擅專仰乞皇上指示以便臣㑹同河臣恭疏具題伏候敕部議覆為此繕摺請旨謹奏會同河臣具疏題請聽候部議同日又奏為請旨事竊臣伏查豫省直隸知州嗣准部咨令臣於本省知州內揀選調補如無可調之員即於知縣內擇其才守素著明敏練逹者保題升補在案嗣臣查有光陜二州員缺隨於現任知州內選有鄧州知州高鍈堪補光州知州於知縣內選有儀封縣知縣袁珂堪補陜州知州又汝州一缺因現任知州童守祿才具平常選有上蔡縣知縣張球堪以升補再汝寧府屬之信陽州雖非直隸界聮楚省兩驛事繁現任知州陳綬來才乏肆應選有鄢陵縣知縣孫國璽堪以升補其鄧州員缺請即以信陽州知州陳綬來調補鄢陵縣員缺請即以汝州知州童守祿調補儀封縣係臨河縣分員缺例應保題請以商水縣知縣吳耀調補至上蔡商水二縣員缺聽候部選經臣恭疏具題在案於雍正三年六月十四日臣接准部咨奉旨高鍈等依議補授俱著調來引見信陽州知州陳綬來人平常著該撫於事簡縣分具題調補信陽州知州員缺將卓異官員引見餘依議欽此到臣臣於祗承之下不勝感激無地但臣細繹部咨鄧州知州高鍈准其調補光州知州儀封縣知縣袁珂准其升補陜州知州商水縣知縣吳耀准其調補儀封縣知縣鄢陵縣知縣孫國璽准其升補信陽州知州信陽州知州陳綬來准其調補鄧州知州汝州知州童守祿准其調補鄢陵縣知縣至上蔡縣知縣張球有經徵承追未完事件所請升補汝州知州之處無庸議則是上蔡縣知縣張球不在升調之列矣而部咨又開該撫請將鄧州知州高鍈儀封縣知縣袁珂上蔡縣知縣張球鄢陵縣知縣孫國璽給咨赴部引見等語臣部除奉特旨調來引見外其餘論俸推升題補各官概不引見在案應將該撫所請給咨髙鍈等赴部引見之處亦無庸議等因臣細繹部文竝未將上蔡縣知縣張球扣除而伏讀聖諭復有俱著調來引見之旨又似應將張球仍令赴部引見再查信陽州知州陳綬來奉旨著臣於事簡縣分具題調補信陽州知州員缺將卓異官員引見是鄧州一缺現在乏員補授而請補信陽州之鄢陵縣知縣又現無任可到又查部咨內開汝州既係直隸令臣在於現任州縣內揀選合例之員保題調補但臣查直隸知州有表率稽察之責與知府無異今通省州縣各官內操守廉潔者尚有而才具優長者絶少求其才守素著明敏練逹合例之員實再無一人可以題補伏乞皇上將汝州一缺統於卓異官員內一併簡選補授其上蔡縣知縣張球鄢陵縣知縣孫國璽應否并令赴部引見之處臣不敢冒昧具題亦不敢擅請部示以致駁飭總之臣䝉皇上隆恩不啻天高地厚凡有奏請之事莫不仰䝉聖恩逾格容納今此案升調引見各官伏祈皇上睿鑒俯賜指示遵循為此繕摺請旨謹奏該部詳議具奏同日又奏為據實奏明仰祈聖鑒事竊查衛輝府參革知府吳柯等十案虧空內除認徵有抵外其餘本犯力不能全完之銀米穀石經前任撫臣石文焯具摺奏請著落原任撫臣楊宗義代為賠補奉有諭旨嗣據楊宗義陸續交貯司庫共銀五萬四千一百兩復經臣節次奏明在案兹據升任布政使楊文乾詳稱并署布政司事按察使張保摺開楊宗義所交代賠吳柯等案銀五萬四千一百兩發給各該府縣將各案虧空銀米穀石採買撥補代賠全完因時價平減除用去外尚餘銀一萬二千三百八十一兩零據楊宗義情願歸公等因臣伏查康熙五十九六十一年截留漕米并太陽渡收捐米麥內除運交河南府米十萬石已買還穀二十萬石外尚存米麥二十萬三千餘石巳䝉聖恩俞允現在平價糶賣俟秋收一米二穀買補還倉便有四十餘萬石之多自非原倉可以貯存而各屬現存常平新建等倉穀又不下一百七十九萬餘石加之雍正三四兩年帶徵民缺未完漕米徵還穀石及各案虧空買補倉穀并此十案虧空所買米穀日積日多倉厫不敷或分堆寺廟或賃貯民房甚有盈千露處無可堆貯者現據各屬紛紛詳請添蓋倉厫以圖經久似應將前項剩存銀兩查明貯穀多寡應添房屋若干據實確估分給各州縣及時蓋造庶免露處疏忽之虞但是否可行臣不敢擅便伏乞皇上指示遵循為此謹奏此議甚好積貯最為要務各項米穀須加意珍惜毋致少有狼藉同日又奏為據實覆奏仰祈聖鑒事竊臣於雍正三年六月十三日據臣齎摺家人回豫捧到皇上硃批臣恭謝天恩一摺荷䝉諭旨若不如是委託信任俾爾臨事趦趄何能承流宣化整理地方但常懷不忍負之心斯已耳何用謝為欽此臣跪讀之下不勝感激涕零悚惶無地伏念臣本庸愚毫無知識而性又孤介從無一人引為同心惟仰賴我皇上特逹之知畀以重任臣因不避嫌怨動輒招尤乂䝉皇上天恩屏絶衆論逾格保全知遇之隆誠千古未有一時僅見雖無知如草木亦必欣欣向榮蠢動如禽魚亦必沾沾向化况臣具有心胸能不鏤心刻骨感激思奮所以臣自始至終即一介之微亦斷乎不取惟仰遵聖諭恪守清慎勤和四字實力奉行而此不忍負與不奏年羮堯車輛暨河北鎮臣紀成斌一摺荷䝉諭旨所訪紀成斌之處巳悉佟世鏻居官何如更訪以聞欽此臣伏查佟世鏻為人氣高自大操守亦甚平奏再查豫省今歲伏汛雖據印河各官報稱本年六月初一日起至初九日止中牟縣之拉牌寨新莊等處儀封縣之三家店鄭州屬之薛家寨來童寨等處水長至二尺餘寸及三四尺不等又封邱縣黃水漲發陽武縣沁水入黃竝皆出槽漫溢工程亦間有危險之處所幸水勢隨長隨消自六月十一日以後抑且有消無長日漸歸槽而印河各官晝夜住宿工所協力修守防護現今堤工俱各平穩不敢上厪聖懷又臣前奏祥符中牟太康等三縣承築南北兩岸大堤今據各該縣報稱俱已盡數全完惟雨淋水刷之處現在鑲墊整齊夯硪堅實亦指日可以告竣恐厪發來豫河工效力贖罪之胡期恆前到豫省即繳銀四千兩業經臣繕摺具奏奉有諭㫖遵即飭令管河道查收訖今又據胡期恆繳貯河道庫銀六千三百兩二共交過銀一萬三百兩仍令其作速湊辦效力贖罪仰祈奏覽雍正三年七月初六日河南巡撫臣田文鏡謹奏為恭報雨澤以慰聖懷事竊查豫省各屬自本年六月二十日以前所得雨澤業經臣節次繕摺奏聞兹又據開封等八府所屬以及汝鄭等七州并所屬各州縣俱報稱於六月二十一日起至二十九日止連日雷雨傾盆不特溝澮皆盈抑且低窪地畝多有積水臣隨查據衛輝府屬之延津縣彰德府屬之磁州河南府屬之洛陽偃師二縣晚禾豆苗雖間有被淹之處幸而水勢隨積隨消且自七月初一日起天時連日晴霽田禾盡皆露出不致損傷可以仍望全收不敢上厪聖懷至於高糧早穀早黍現今漸次登場其餘晚穀晚黍花豆芝麻等物竝皆十分暢茂大有可必所有豫省疊沛大雨并秋禾暢茂情形理合繕摺具奏仰祈聖鑒謹奏覽奏積水竟不為患禾黍暢茂朕懷深慰直隸地方因雨水過多各處堤工間有損傷猶幸不至大礙同日又奏為恭報伏汛水勢情形以慰聖懷事竊查豫省今歲伏汛自六月初一日起至十一日以前水勢情形業經臣於本年六月二十一日繕摺奏聞兹臣復查自六月初四日初伏起至七月初一日立秋止較之去歲伏汛不相上下竝皆出槽漫灘加以陰雨連綿沁黃二水屢消屢長除長落相抵外淨長水四五尺或間至七八尺不等勢亦汹湧各處紛紛報險臣隨不時委員巡查稽察并嚴督道㕔印汛各官令其率領兵夫晝夜住宿堤上多備料物人夫協力加緊修防或遇掃工略有蟄陷并堤工稍有雨淋水刷殘缺之處立即勒令加鑲平整夯硪堅固偶有新生頂衝即諭令下掃搶護曉夜查催不遺餘力幸今伏汛巳過水勢逐漸消落盡皆歸槽兩岸工程平穩民情胥悅所有伏汛水勢情形理合繕摺具奏又臣於本年六月二十八日接准部咨內開據副河臣嵇曾筠摺奏請將滎澤縣知縣汪諴儀封縣知縣袁珂蘭陽縣知縣佟國芬祥符縣知縣王士俊暫留本任三月俟霜降後水退工平令其各赴調任等因具奏奉旨是該部照所請速行欽此到臣臣隨轉飭各該員遵照仍留任所竭力加緊修防共保安瀾以副聖懷又臣於本年七月初二日聞得江南邳州南岸朱家海地方於六月十五日漫決大溜竟由宿遷虹縣泗州而逹洪澤湖其缺口之下正河淤淺水不下流而漫溢處所又未成河形水雖散漫未能暢泄而豫省歸德府屬之虞城縣堤工與江南接界甚為緊要臣恐下流淤淺上游水長隨嚴飭印汛各官設法防範務保無虞合併奏聞仰祈聖鑒謹奏如此在地方上憂勤不懈何事弗克辦集耶勉之同日又奏為錢糧酌量撥解司庫少留存貯仰祈聖裁事竊臣伏查各省錢糧每歲正供所入除俸食兵餉工役動用之外春秋二撥悉令解部一以使府庫豐盈度支優裕一以杜外官侵蝕易於稽查政誠善也然臣以為內帑固當有餘而司庫亦不可使有不足臣不敢妄陳他省惟在豫言豫臣查雍正二年春撥雍正元年丁地銀三十萬兩兩次凑解銀二十萬兩外尚有未解銀十萬兩據升任布政使楊文乾詳稱正在湊解間接奉副總河咨令於司庫內撥銀五萬兩以為雍正三年歲搶修之用又欽奉諭旨將司庫錢糧撥銀五萬兩交與副總河相機料理查司庫無項可動僅有署司移交候解京餉銀并前造春撥冊內實在貯庫項下康熙六十年丁地款內銀共五萬兩解交副總河查收又將署司交存康熙六十年丁地款內支剩銀并新收雍正二年丁地銀共湊五萬兩解交河道查收是庫內竝無存貯未完尚未徵收萬難設法惟有飛檄各州縣將雍正三年錢糧速徵解司先抵奉撥雍正元年未解之十萬兩再陸續催解并抵康熙六十一年丁地解部之項惟是本年春撥在即大部復行撥解勢難兩全必致顧此失彼請將雍正三年錢糧暫停動撥等情臣正在咨部候覆隨接准部咨為請定酌撥條例事本年春撥巳將存貯司庫銀二萬八千五百一十七兩盡數撥解內有太行堤工餘剩節省銀二萬三百八十七兩零原係題明留為民壯工食之用一併撥解在內又經咨明嗣准部覆令臣即行解部其民壯工食於本省各年未完民缺銀內催徵補項在案則是豫省司庫之空虛如此那移湊墊甚屬拮据萬一偶有急需司庫無預儲之項將何支應况河南居天下之中實京畿之門户關係非小兹為國家圖萬全求盡善不可不預儲充實以資用度臣請皇上聖裁嗣後或隔一年撥解如雍正三年支剩錢糧寬至雍正五年春秋兩撥解部或與别省輪流分年起解免令十二省一時並撥或將地丁錢糧照例起解其餘追補虧空并贓罰等項銀兩暫緩解部以實司庫庶幾緩急有資內外如一至於布政司係錢穀總滙旬宣大吏皆由皇上簡拔必得其人斷不致再有虧空况定例綦嚴凡有那移俱以侵欺治罪孰敢不兢兢守法且與督撫同居省㑹朝夕可以盤察臣請嗣後司庫錢糧循例專責督撫稽查一有虧空除布政使照例問擬外將督撫一併從重治罪勒令獨賠則可以永絶虧空之弊矣但臣質本庸愚不自知其言之有當與否臣言非是仰祈皇上隆恩鑒宥留中不發倘有一二可採伏乞皇上特降諭旨免臣具本奏請則臣頂戴天恩於無既矣為此具摺密奏向來延捱緩解之弊朕所稔悉此處絲毫無容寬假果地方上存貯無多有實難起解緣由怡親王管領司農自能秉公調劑不致謬誤當備叙咨明候王酌量通融設或暗藏那移牽扯情故非如昔日夤緣請託即可以支吾掩飾也王之無私朕可力保雍正三年七月十五日河南巡撫臣田文鏡謹奏為直陳汛水漫溢情形仰祈聖鑒事竊查豫省今歲伏汛勢甚汹湧幸而保固平穩業經臣於本年七月初六日繕摺奏聞不謂入秋以來自七月初四日起大雨連綿黃水陡漲且伊洛沁水一時並皆長發而江南朱家海漫溢缺口之水未能暢泄正河又復淤淺水不下流以致上游有長無消自七月初六日起至十四日止共長水至四五尺及六七尺不等各處堤岸高出水靣僅止一尺至二三尺不等并竟有水與堤頂相竝者其餘如祥符縣之程家寨鄭州屬之薛家寨陽武縣之金馬張儀封縣之南北兩岸堤工尤為危險臣不禁憂心如焚寢食俱廢隨移咨副河臣嵇曾筠相機上緊料理并委員四路周流巡查督催搶護復嚴飭管河道暨印河各官無分風雨晝夜率領兵夫住宿堤上多備料物設法捍禦協力修防并檄飭管河道前赴南北兩岸堤工逐細確查於七月初七日據管河道回稱虞邑待賓寺迤西一帶工程勢亦危險幸皆鑲墊平穩於七月初八日又據鄭州詳報薛家寨工程危險臣隨即飛飭管河道星詣該地方督同㕔汛印河各官作速竭力修防甫據管河道回稱工程已保平穩又於七月十三日據南河同知劉永錫稟報祥邑之程家寨勢甚危急又嚴飭管河道攜帶帑銀前赴工所設法防護臣正在繕摺具奏間不期七月十四日酉刻據臣差巡南岸東首堤工之把總趙璉回稱儀封縣知縣袁珂因北岸堤工危險該縣過河搶救忽於本月十三日二更時分狂風大雨頃刻水長南岸大寨地方大堤陡被黃水漫溢缺口一十餘丈又於本月十五日辰刻又據蘭陽縣報稱本月十三日酉刻狂風驟雨頃刻水長漫溢北岸板厰後地方大堤缺口一十二丈臣聞報不勝神魂悚惕隨一靣飛飭管河道并㕔汛各官防護堤頭并多備料物掃箇立即搶救一靣飛飭開封府星詣該地方多備船隻接濟被水災民加意撫恤毋致失所臣隨於本月十五日親詣漫溢處所督率各員相機搶救并查明缺口丈尺以及進水逺近民間田廬臣再另摺具奏并㑹同河臣繕疏題參所有儀封縣南岸大寨堤工蘭陽縣北岸板厰後堤工漫溢情形合先繕摺奏聞謹奏候另有諭旨從部頒發雍正三年七月十九日河南巡撫臣田文鏡謹奏為缺口之流水巳斷居民之田廬無恙謹據實詳陳以慰聖懷事竊查儀封蘭陽二縣南北兩岸堤工均於七月十三日因大風驟雨頃刻水長各將堤岸漫開一十餘丈業經臣於本月十五日繕摺奏聞臣隨兼程前赴各漫溢處所親自勘查間適據副河臣嵇曾筠亦先後趕到臣隨㑹同嵇曾筠逐一確查所有儀封縣南岸漫缺大堤離黃河十有餘里先因大堤之外民堤被水漫溢次將大堤漫開實止一十餘丈而堤內積有雨水內外相平其勢甚緩竝未掣動大溜至黃水與清水合流離缺口沿堤往東二十餘里至儀邑之石家樓地方而止往南一十餘里即儀封縣城城外有護城堤以止水且東南地勢均高於北繞堤至城南半里而水竭約計水深止二三尺不等竝未損傷人民其民間房屋土墻內有一百餘家雖未坍塌倒壞然不無稍被水浸之苦臣現在嚴飭該地方官逐一查明加意撫恤務令得所不致上厪聖懷至堤外黃水業已歸槽灘皆涸出堤內積水值今天時晴霽其涸亦自可以立待又查蘭陽縣北岸大堤離黃河十里堤外舊月堤漫缺二口將未估加幫大堤漫開一十餘丈亦因堤內積有雨水其勢甚緩清水與黃水順堤往東合流約長二十餘里至蘭邑所屬之𫝊家寨而水竭散漫往北約寬八里至洮濱河而水止初時水深二三尺不等現今地土盡皆涸出竝未掣動大溜口門業巳淤塞至水過之處村莊少而地畝多竝未傷及人民其草屋土墻幸未倒塌而地內高糧黍子尚有收穫其餘未經被水秋禾俱係十分收成雖內有略被黃水之一百餘戶臣巳嚴飭該地方官加意撫恤毋致失所且喜黃河水勢於本月十四日起至十九日止隨即盡消共落水七八尺不等巳盡歸槽兼之連日天時晴霽水更易消工亦易趲其蘭儀二邑修築缺口工程每處約費銀三千餘兩臣與副總河臣嵇曾筠靣商趁此水勢消落汛水未長之時先借動河庫銀兩分發㕔印河員協力上緊補築一律完固務保無虞約計旬日之內俱可告竣統俟工完之日臣再另摺奏聞其用過銀兩據儀封縣知縣袁珂蘭陽縣知縣佟國芬情願竭力賠補還項斷不敢使庫帑久懸至於堤岸漫溢防護各官固難辭疏忽之咎但臣查七月初四日起連日大雨傾盆以致黃沁伊洛等水同時並長較之去歲秋汛水尚大二尺有餘且七月十三日風大雨驟工程在在危險人力實係難施儀封縣北岸堤工共有五處危險知縣袁珂同管河同知張近光實在北岸搶護一時不能兼顧致有疏失蘭陽縣缺口處所原係未估加幫大堤年久不免殘缺其情皆有可原今此項修補銀兩又巳據各該員情願設湊賠補且缺口之處與民間田禾所損無幾而水已盡涸工程亦甚平易副河臣與臣再三斟酌查據二處堤工實與搶險無異似可無庸具本入告且伏思我皇上聖德如天諸從寬典疏防各官可否免其題參臣等不敢擅便洪恩出自聖裁再臣因勘查已確水勢已退并將一應修築事冝與副河臣嵇曾筠巳商酌妥確無庸臣駐劄河干擬於本月二十日回署所有勘查缺口水勢情形理合繕摺奏聞謹奏知道了巳有旨矣雍正三年七月二十八日河南巡撫臣田文鏡謹奏為據實奏明仰祈聖鑒事竊臣伏查守備陳丙第等侵扣兵餉一案臣接准部咨隨檄按察司審解去後嗣因限滿未據招解業將承審遲延各官職名經臣咨參在案今復參之限又屆尚未審明因將承審之衛輝府知府張建德等調至省城令其作速審解兹據張建德將供情録報到臣臣細查其中情節若任其指借則供吐游移難以結案若據實審題則與鎮臣紀成斌不無干礙但紀成斌職任封疆非臣所敢擅便應否據實嚴審明確如紀成斌果有情弊容臣一併隨招附參伏乞皇上指示遵循除將審案供情另摺僃叙恭呈御覽外為此繕摺請旨謹奏聽訟不得其情成何信案審題若不據實奚啻弗訊紀成斌可以曲全則為之稍寬一步必不能寬自應據事直陳候朕裁酌耳同日又奏為教缺不可久懸衰老實難勝任敬陳一得仰祈睿鑒事竊學校為人才始基之地教職為首端士習之員不但諸生文藝賴其考課即人品行誼經綸治術莫不當躬先表率預為講貫此教職之責為甚巨而其任為甚重也雍正元年二月初八日欽奉諭旨教職等官係專教士子之人今准捐納以致不通文理少年反為學問優長年老者之師可乎伊既捐納應照伊品級别任調補之處交與該部議奏欽此仰見我皇上聖鑒甚明而年少文理不通之人不得為學問優長年老者之師矣又於雍正二年六月十五日准吏部咨議覆吏部侍郎沈近思條奏捐納現任教職以五年為限任滿之日令該撫將才具優長年力壯盛者出具考語保送照例改補未滿五年者俟其滿日陸續分别保送內有老憒陋劣不能稱職者令其休致等語則是教職一途巳經廓清將來不致壅滯矣但臣䝉皇上殊恩簡畀巡撫任事以來准部選豫省教職共一百二十三員內除病故者二十四員老病者二十五員回避者一員名字訛錯查無其人者一員未據送考者十員㑹試中式者一員考准給憑赴任者止六十一員現在教諭訓導懸缺無人者共六十二缺揆厥由來蓋緣吏部按冊銓選竝不知其人之存亡老病及憑發到省轉行地方官查催赴任則其人或病故已久或衰憊不堪紛紛詳覆始將原發文憑繳部另選雖准吏部咨令臣將在籍候選之員凡有丁憂事故按月造冊報部以憑銓選而現選之員仍復有事出意外者總因老朽衰殘風燭不定之故以致員缺終不免於久懸者也又查定例以進士選府衛教授舉人選州學正縣教諭恩拔副榜選復設教諭由廪生挨出歲貢選訓導則是訓導一缺止有挨貢可選再查雍正元年四月初三日准到吏部咨候選訓導貢生現選康熙三十三四年廪生挨出嵗貢其餘自三十五年起按年陸續造冊送部則是目下所選之訓導尚係康熙三十四五年之挨貢也其人即自二十歲補廪約越三十年出貢再越二十餘年銓選巳經七八十歲矣臣每於考試之時留心驗看類多年老即給憑赴任之六十一員除舉人恩拔副貢或有年止五六十上下者其餘均屬七十左右之人但耳目尚能視聽步履未甚艱難故敢令其赴任再下一等不但目瞶耳聾即行動起立之間似非扶掖不可考試亦不能成篇若容其到任安能訓迪士子臣因學校為重不敢給憑繳部另選此員缺又必至於久懸者也及至另補有人發憑到豫查驗之下仍復如前臣竊思教職雖屬閒員關係實屬緊要即現任內有年殘病廢者亦須㑹同學臣不時參革豈可以新選之員聽其赴任輾轉咨補而所屬教職之缺竟有經年缺官者矣臣請嗣後照雍正元年十二月初七日所定令直隸各省督撫每於鄉試事竣㑹同主考驗看舉人之例俟學臣歲科兩考完竣之日該督撫㑹同學臣將通省廪生挨出之貢生傳集秉公驗看凡年力精壯竝無事故者按定次第將補廪挨貢年分彚造清冊送部銓選其老病者亦另造一冊送部以便查核如此則所選之員皆可勝任無庸繳憑另選以致懸缺久待且刪除老病不選則近年新貢亦得早膺除授不待久逺候缺以致年老殘廢矣抑臣更有請者捐納教職五年任滿者令臣考驗將老憒不堪者即令離任其才具優長年力壯盛限滿各員俟新選人員到任後再令離任照例送部臣考驗過任滿捐納教職內儘有才品優長年力壯盛之員現在留任交代者四十六員雖仰䝉皇上天恩教諭調補縣丞訓導調補主簿然人多缺少未免守候而歲月磋跎又復老去殊屬可惜除俊秀捐貢外內有原係廪增附生員捐貢者可否令學臣嚴加考試若果文理優通將試卷送部閲看如新選有人准其仍在本省以教職補用如新選尚未到任准其仍留原任庶各該員得以乘時效力自必感激皇恩益加勉勵而學校均可收得人之效矣是否臣言可採伏乞皇上敇部施行謹奏該部議奏硃批諭旨卷一百二十六之五欽定四庫全書硃批諭㫖卷一百二十六之六硃批田文鏡奏摺雍正三年八月初三日河南巡撫臣田文鏡謹奏為據實奏明仰祈聖鑒事竊查蘭陽儀封二縣南北兩岸堤工於七月十三日因風大雨驟各將新舊大堤漫開一十餘丈臣聞報隨飛檄管河道查取疏防各官職名㑹疏題參并一面連夜前赴各該地方親自勘查間適據副總河臣嵇曽筠亦趕到工所臣隨㑹同嵇曽筠逐一確查即於堤上面商題報而嵇曽筠即向臣說缺口無多水勢亦緩况堤工漫塌亦非美事若一經具題不免天下皆知先繕摺奏請皇上指示再為遵行臣伏思我皇上聖德如天每多寬宥且查據黃河水勢已漸次消減兩岸外灘盡皆涸出竝未掣動大溜工程亦甚平易又據承築各官情願竭力賠補剋期便可告竣而副總河係總理河務之員臣亦未便故為堅執因商酌已妥臣隨將入告之意與嵇曽筠說知即於七月十九日查勘確實繕摺具奏臣正在伏候諭旨到日奉行不謂嵇曾筠忽於七月二十五日札移㑹稿著臣注題臣隨作字轉致尚未奉有諭旨隨即具題恐致上厪聖懷且與前日請旨奏摺甚不相符乃又於七月二十八日復接嵇曽筠來字內云堤上之言實已心志何敢矛盾萬一鄰封入告反蹈隱飾之咎已於二十六日卯時拜夲矣仍將㑹稿囑臣注題臣不勝駭異因思此案已經具奏便非隱飾且嵇曽筠既欲題報即不應與臣㑹商各繕摺奏請乃竟不候諭旨輒行注列臣銜繕疏具題則臣前日之奏不幾誑瀆聖聰狂悖已極罪何可逭除將㑹稿移還副河臣嵇曽筠外所有微臣不敢欺誑與夲內竝未列銜情由理合據實聖鑒再臣查據儀邑缺口已於七月二十八日申時將民堤合龍指日大堤亦可告竣其蘭邑缺口亦甚平易而副河臣嵇曽筠每事游移全無定見反致承築各官無所適從現今汛水長落無定尚未告竣設或再有疏虞臣雖非専理河務之員但職任封疆罪亦難逭因不避嫌怨已檄委糧道沈廷正前赴工所嚴飭㕔汛印河各官多備料物人夫晝夜上緊作速搶修務期剋日完竣以禦汛水如再刻遲即令取具職名揭報題參不敢上厪聖懷為此謹奏知道了同日又奏為奏請預買榖石以實倉廪事竊查豫省康熙五十九六十一兩年截留漕米以及康熙六十年陕州太陽渡捐收米麥共二十萬三千四百餘石臣因歷年已久恐致黴爛於雍正三年二月二十四日具奏請將前項米麥令各州縣於青黃不接之時減價平糶價銀解交司庫俟秋收後即將所糶銀兩買榖分貯榖少之州縣以圖經久荷蒙聖恩敕部議覆奉㫖依議欽遵在案嗣據各州縣陸續糶賣因為數已多一時未能糶盡現今又值秋收仰賴我皇上誠敬昭格各處豐稔年登大有米榖價值甚是平減臣思所糶米麥目下百姓買食甚少而價值又賤須俟明嵗正二三月青黃不接之時方能糶完若待明嵗秋收買榖還倉不免中隔一載臣請將現存司庫耗羡內借動銀兩并將已糶之價銀當此榖價減賤分給榖少之州縣立即買榖貯倉俟米麥糶完之日照依原動數目歸還司庫其各州縣買貯若干臣再造冊送部查核一轉移間而現糶之米麥庶不致賤售未買之榖石已均得實貯於國計民生大有裨益矣但是否可行臣不敢擅便伏乞皇上訓示遵行謹奏因時制宜甚屬妥協應如是通融辦理同日又奏為據實覆奏仰祈聖鑒事竊臣前具奏請酌留司庫錢糧一摺荷䝉硃批諭㫖到臣臣伏讀之下仰見我皇上至聖至明無微不照無逺不届但臣受恩日深圖報益切因見司庫錢糧甚屬拮据萬一偶有急需無可支應關係匪小茍有芻蕘之一得焉敢不據實陳奏今䝉聖諭諄切教導不覺愚昧頓啓感激無地至於怡親王之秉正無私公忠體國則又臣素所欽服倘有不能應解之處臣遵當咨請酌量通融以副聖懷又臣恭報雨澤一摺奉有硃批諭㫖仰見我皇上軫念民生有加無已臣查自七月二十六日以前所有豫省晴雨日期業經臣節次繕摺奏明兹伏查自七月二十七日申時起至二十八日卯時止復降微雨幸今天時連日晴霽即間被水淹之處自可漸次經理但臣於七月二十八日接閲汝寧府屬之汝陽縣來禀該縣因檄委盤查光州倉庫見沿途各屬所種田禾竝皆十分暢茂而晴霽日多猶需雨澤則天時之不同地理之各别不啻相隔徑庭而延津洛陽等十餘州縣低窪地畝所以被淹猶幸無多也至於直隸雨澤雖亦過多然臣伏思皇上至誠感召自必即日晴霽仍慶豐登也理合繕摺覆奏仰祈聖鑒謹奏豫省近日以來雨水情形知道了延津等處被淹窮黎務令均沾實惠勿致虛應故事同日又奏為欽奉上諭事竊臣於雍正三年閏四月初六日將豫省各州縣欺隱在官地畝繕摺奏懇免其按律治罪准令當年升科荷䝉聖恩俞允嗣據署布政司張保詳據各屬報到民衛更名共計折實地二千五百七十八頃九十一畝零照依賦役連閏并補徴則例共該錢糧六千四百七十二兩零經臣於雍正三年正月十七日繕疏具題嗣奉部駁臣現在查核咨覆今據布政司黃焜於雍正三年七月初一日呈報續據封邱鹿邑等一十九州縣共報民衛更名地一千六百七十一頃二十六畝零應納錢糧四千四百四十五兩零應否亦即造報雍正二年當年升科等情到臣臣查據前項地畝若再造報雍正二年升科不免有礙奏銷隨飭司造報雍正三年當年升科俟彚冊詳報到日臣再另疏具題外所有雍正二年已收錢糧四千四百四十五兩零可否令布政司提貯司庫充公伏候聖裁又臣查據汝寧府屬之確山縣有已經題報雍正十一年起科地二百二十四頃六十一畝零每年應納錢糧一千一百六十四兩零臣請自雍正二年起至雍正十年止將應收錢糧按年提貯司庫充公俟雍正十一年照例徴糧歸入奏銷又據確山縣有已經題報雍正三年起科地二十頃四十六畝零除自夲年錢糧入冊徴解外其雍正二年已收錢糧一百六兩零亦應提貯司庫充公所有前項續報地畝以及應即提貯司庫充公銀兩理合繕摺據實奏明謹奏田文鏡此摺朕反覆披閲殊多不解該部密議具奏同日又奏為恭謝天恩仰祈聖鑒事雍正三年七月二十六日臣齎摺家人回豫恭捧皇上御用鮮荔枝一器欽賜到臣臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣夲庸材仰沐皇上隆恩至深極厚清夜環思捐糜莫報乃復荷聖恩錫之珍品貢自南邦丹罽徹離明之艷頒諸北闕瓊漿含上苑之香驚物候之已新疊邀殊眷愧赤心之未報徒切素餐臣欽承恩賞感激難名惟有愈竭駑駘永堅清白以仰報髙厚隆恩於萬一耳所有微臣感激私忱理合繕摺奏謝為此謹奏覽奏謝知道了受寵若驚固屬人臣分所當然第貴常念勿忘耳雍正三年八月二十八日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事竊臣於雍正三年八月初四日接准部咨內開欽奉上諭儀封蘭陽兩處衝決堤工可星速㑹同副總河嵇曽筠督率各屬河員併力搶築務期永久堅固等因欽此欽遵臣伏查儀封縣缺口已於七月二十八日將民堤合龍經臣奏聞在案今據南岸管河同知劉永錫禀稱儀邑大堤已於八月十一日合龍現在加髙鑲墊指日可以全完其蘭陽縣板厰後缺口先據副河臣嵇曽筠正在下掃興築適河臣齊蘇勒到工諭令河員搶築鐵心堤費省工速已於八月十二日合龍現在加髙鑲厚指日可以完竣其一帶危險工程業經屢飭㕔汛印河各官加意修防務保無虞今䝉皇上軫念民生周詳指示臣復謹遵諭㫖㑹同副河臣嵇曽筠面商令其查有卑薄堤工立即遴員逐細確實勘估俟移咨㑹稿到日臣即㑹同具題至於被水窮民臣原擬動撥耗羡銀兩分給賑濟兹䝉聖恩著動正項錢糧臣隨查常平等倉榖石以及截留漕米并捐收米麥原因備賑而設惟截留漕米并捐收米麥易於黴爛臣經繕摺奏請平糶業䝉皇上敕部議覆奉㫖依議欽遵在案今此項米麥因時值秋收價賤且民間買食者少迄今尚未糶完臣請即將前項米麥動撥賑濟加意撫恤至於買榖歸還原項之處臣查此案動用米石甚屬有限應俟明嵗青黃不接將米麥糶完之日若有贏餘便可補足即無贏餘亦儘足分貯似於國計民生均有裨益矣但是否可行臣不敢擅便伏內夲有積水勢甚紆緩非比先前楊橋十里店等處決口致有衝沒臣復檄委賢員細加確查如果有衝沒處所臣再繕摺請㫖另疏具題不敢上厪聖懷所有欽奉諭㫖事理及補築儀蘭二處缺口合龍完竣日期理合一併覆奏為此謹奏覽同日又奏為據實奏明仰祈聖鑒事竊臣以謭劣庸材仰沐皇上隆恩不啻天髙地厚清夜環思無可圖報惟有秉此血誠遇事據實具奏從不敢少有絲毫欺誑以致上負聖恩自干罪譴兹臣於雍正三年八月十一日接准山東撫臣陳世倌來咨內稱據黃河同知牟錝元呈報蘭陽縣北岸板厰決口黃水橫流由曹縣衝斷太行堤入城武縣境隨即親臨查勘自城武沿堤而上至曹縣魏家灣太行堤被衝處所經歷數十村莊平地水深七八尺及丈餘不等田禾民舍皆被淹沒等語同日又准直隸督臣李維鈞咨稱據大名府長垣縣知縣梁芑呈稱七月十四日有黃水一道自西南蘭陽縣地方蕭家潭口流至黃家集等處復差役探看據稱淘背河一帶黃流自西而來甚是汹湧自梁家集東北由於李集南水寬一里餘逺流入長垣縣黃家集等處幸於七月十四日黃河南岸儀蘭兩縣交界地方清凌缸決開口門五十餘丈至十七日汕刷百丈許水流南走黃河北岸板厰等口淤塞斷流等語臣接閲之下不勝駭異但臣伏查蘭陽縣板厰後決口實因天時久雨堤根內外俱有積水上淋下浸又遇狂風驟雨遂致漫溢塌陷原非全被黃水衝激漫開缺口臣前聞報往勘竝未掣動大溜灘已涸出驗其初漫水痕實止二三尺不等隨據委員禀覆沿堤往東計長二十餘里至蘭邑之傅家寨而水竭往北約寬八里流至洮濵河而水止細查百姓田廬雖有被水之處然竝未坍塌淹沒今據陳世倌咨稱流入曹縣魏家灣等處水深七八尺及丈餘不等田禾民舍皆被淹沒等語則是近堤缺口處所非水深丈餘及二丈之水不能流入曹邑如此之深且豫省近堤民房田禾非先被淹沒不能流入曹邑如是之甚又必掣動大溜流成河形然後淹沒曹邑村莊如是之多即或水勢已退地上淤泥斷必有數尺餘深方足憑據今臣聞得曹縣芝麻集地方亦因天時久雨河水漲發水從堤上漫溢而過其魏家灣等處俱係清流竝非豫省流入之水况中隔洮濵河一道如果黃水盈溢則直隸長垣東明等縣水勢自必更甚於曹邑何以李維鈞來咨內雖有黃水流入之事竝未有淹沒百姓田廬之語豈直隸接壤之水反小而東省越境之水獨甚乎再臣查李維鈞咨稱清凌缸決開口門板厰等口淤塞斷流等語則又似北岸之水業已斷流而曹縣之水又復從何來且查據清凌缸離儀封縣大寨漫口相隔六七里亦未缺口如果衝開口門五十餘丈汕刷一百餘丈則非惟歸德府屬之虞城考城商邱一帶皆成巨浸即江南徐州等處亦必俱為澤國何以江南撫臣竝無一字移咨虞考等縣亦俱各無恙也且總河臣齊蘇勒往來三省其中有無被水之處自必目擊不知陳世倌與李維鈞是何意見一任各屬混詳捏詞誑奏以致上厪聖懷臣不勝夙夜兢惕寢食難安除一面遴委能員前赴二省逐一再加確查另摺具奏外誠恐上厪天心不敢不據實先為奏聞謹奏陳世倌李維鈞來咨所稱水勢情形既大相懸殊何不分具覆文與之辨析否則即將摺內陳奏之語竟行具題聲明此事朕甚疑之雍正三年九月十一日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事竊查豫省各州縣隱地一事經臣於雍正二年閏四月初六日繕摺奏請密諭各府知府令各州縣盡行首報一俟查出地畝若干即詳明撫臣題請當年起科但此項隱匿地土匪朝伊夕若按律治罪追究積年錢糧則新舊大小各官均干重處枝牽蔓引便無了期我皇上聖德如天自無庸臣預為奏請第恐格於成例以致部駁不得不先行瀆陳具題到日仰懇錫以寬典荷䝉天恩俞允又奉聖諭既往自應不咎題夲到日恐朕偶爾忽略汝仍一面具摺奏請等因欽此臣自奉到諭㫖之日即密諭各府令其轉諭各屬凡有從前欺隱在官地畝立即造冊詳報并遍貼告示宣布皇仁曉諭百姓凡有未經首報熟地作速自首若經告發或經查出定即按律治罪勒追歷年錢糧地畝入官因而官民咸知自愛將歷年隱地陸續首報共計折實地二千五百七十八頃九十一畝零共該錢糧六千四百七十二兩零業經臣於雍正三年正月十七日恭疏具題仰䝉聖恩准行在案但州縣各官內有聽信臣言盡數詳報者亦有將信將疑仍然畏縮者臣復開誠曉諭令其作速首報毋隱嗣據各州縣又續報民衛更名地共一千六百七十一頃二十六畝零并將雍正二年已收錢糧四千四百四十五兩零一併具禀布政使黃焜開具禀摺轉請造報雍正二年升科等因到臣臣查雍正二年錢糧已現在造冊奏銷而前項地畝俱係雍正三年四月內報司於七月內禀報到臣若欲造報雍正二年起科必須具題請㫖俟部覆到日方可造入其如奏冊已經造就勢難更改且往返需時不免有礙奏銷臣隨一面飭司將已收錢糧轉飭貯庫一面繕摺奏請皇上指示可否造報雍正三年當年起科實係臣一點犬馬私情竝非臣敢將正項錢糧歸入存公項下也今部議內開既稱前項地畝雍正二年已將應納錢糧徴收何以各州縣不於二年詳報應將遲延不報之州縣查參等語臣思前項情節原非部臣所能悉知而臣欲於前摺內逐細奏明又因情詞煩冗誠恐上費天心所以不敢分析縷奏此實臣一時愚昧之見致䝉皇上反覆披閲殊多不解乃復荷聖恩不加譴責只將臣摺諭令部臣密議奏聞并將部臣議覆奏摺賜發到臣似此逾格天恩誠千古未有一時僅見臣欽承之下不勝感激涕零慚悚無地矣至於前項地畝既䝉恩㫖密議具奏可否容臣題其所收雍正二年錢糧應再另造一冊報部查核仰祈聖鑒再部議內開令將遲延不報之州縣查參等語臣查各州縣既將雍正二年錢糧徴收在庫又經臣從前再三曉諭乃遲延至今詳報夲應繕疏題參但各州縣自臣飭查之後實多畏罪未敢輕報今見臣題報開封等府屬隱地已䝉聖恩寬宥始敢陸續首報且現在尚有詳報之各州縣若一經查參不特臣言不足取信并恐再有欺隱之地盡皆隱匿不敢再報伏乞皇上隆恩將遲延不報之各州縣免其查參則感沐𢎞慈永無紀極矣又臣前奏確山縣已經遵例題報至雍正十一年起科地二百二十四頃六十一畝零每年應納錢糧一千一百六十四兩零臣請自雍正二年至雍正十年止將應收錢糧提貯司庫充公而部議內開何不與開封等府屬一疏具題總以雍正二年起科等語臣查前項地畝在於雍正元年前任撫臣石文焯任內有姦民蔡璽在撫臣衙門具詞開墾隨有流民李夫仕等到縣認墾并將民間熟地紛紛占奪嗣據上蔡縣知縣張球於雍正元年九月內署理確山縣事即出示勸諭令土著士民如有未墾地畝以及墾過熟地勒限三箇月內自行首報如逾限不報即將此地給與李夫仕等開墾在百姓誠恐李夫仕等占種即具呈報墾隨據該署縣於雍正二年冬季遵照旱田十年起科之例造冊轉報而署布政司張保查係墾地於雍正三年正月內據冊詳報在於雍正十一年起科臣隨同開封等府屬所報旱田十年起科之例彚冊題報不謂近今百姓見臣有題報雍正二年當年升科之事亦情願在於雍正二年起科將二年錢糧在於三年春間爭相完納縣庫當據現任確山縣知縣尉鍾咸於夲年三月內赴省見臣禀白前情并請將所收錢糧存貯改報雍正二年起科臣伏思此地實不知百姓在於何年私墾然業已題定若再為改題疏內又不便叙入一俟升科之年則前報雍正十一年起科之地不免一地二糧若疏內分析叙明又恐戶部照例駁查反滋案牘臣隨諭令該縣既據百姓已將錢糧完納應即收存自有著落此臣所以一併繕摺具奏懇請皇上指示遵循今此項地畝既經部議可以改題雍正二年當年升科伏乞皇上天恩將前報確山縣雍正十一年升科之案容臣聖恩免其追究從寬結案𢎞恩出自聖裁又臣前奏確山縣已經原任撫臣楊宗義於康熙五十九年九月內遵照六年升科之例題報雍正三年起科地二十頃四十六畝零請將雍正二年已收錢糧提貯司庫充公今部議內開顯有以熟作墾情弊其歷年所收錢糧歸於何處著落應將從前虛報勸墾私收錢糧之員及失於覺察徇庇之各上司一併查參并將收過未報錢糧清查勒追等語臣查此項地畝原係久隱在官之地而各州縣見臣查察甚嚴是以不敢不據實具禀但業䝉皇上隆恩已往不咎所以臣即向各府州縣說明只自雍正二年臣到任為始且前項地畝已於夲年現在起科止有雍正二年一年錢糧似可無庸改司庫伏候聖裁至雍正二年誤寫三年之處委係臣年老昏瞶一時疏忽伏乞聖恩寬宥所有臣前奏情由理合繕摺據實覆奏謹將原奉部議奏摺一併恭繳為此謹奏前㫖朕豈遺忘汝第就事論事按照規則據實題明朕自寬恩不加譴責也若將十年後起科之地一旦以密摺奏朕而私徴貯庫以為地方公用天下後世不悉其中情節得無以汝之實心辦理朕之格外仁恩夲欲以安全吏民反滋無窮物議妄謂雍正某年撫臣田文鏡遵奉密諭將豫省田賦暗收若干云云成何政體餘姑不論此聚斂之名汝安可當耶斯隱地一事據常情而論似屬可取據正理而論則其中謬誤不可勝言若徹底追究不容無罪今仍應聲明原委辦理允協具疏題奏候朕從寬恕宥停其處分即州縣官亦槩免查議以符前㫖同日又奏為恭報秋禾收成分數以慰聖懷事竊臣伏查豫省今嵗入夏以來雖覺雨水過多但查據低窪地畝小民惟恐被水淹沒所種多屬髙糧黍子現今盡皆收穫竝無損傷至於通省秋禾俱已登場兹據開封府報稱所屬一十四縣收成自六七分起至八九十分不等彰德府報稱所屬一州七縣收成自五六分起至七八分不等衛輝府報稱所屬九縣收成自五六分起至七八分不等懷慶府報稱所屬七縣收成自六七分起至八九分不等河南府報稱所屬十一縣收成自六七分起至八九分不等南陽府報稱所屬二州十縣收成自六七分起至八九分不等歸德府報稱所屬一州八縣收成自八九分起至十分不等汝寧府報稱所屬一州八縣收成自八九分起至十分不等汝州報稱該州并所屬四縣收成自六七分起至八九分不等陳州報稱該州并所屬四縣收成自五六分起至七八分不等許州報稱該州并所屬四縣收成自七分起至八九分不等鄭州報稱該州并所屬四縣收成自七分起至八九分不等禹州報稱該州并所屬二縣收成自九分起至十分不等光州報稱該州并所屬四縣收成竝皆十分陕州報稱該州并所屬二縣收成自六七分起至八九分不等以上各州縣收成分數臣復加確查與所報無異理合繕摺奏聞伏祈睿鑒謹奏覽秋禾收成分數朕懷實為慰悅同日又奏為據實覆奏仰祈聖鑒事竊臣具奏蘭儀二處缺口黃水竝未流入直隸山東二省一摺荷䝉硃批諭㫖陳世倌李維鈞來咨所稱水勢情形既大相懸殊何不分具覆文與之辨析否則即將摺內陳奏無流入故為奏辨祗緣臣接准山東撫臣陳世倌來咨因思東省村莊如果被水如此之甚則直屬長垣等處并豫省蘭邑附近地方居民田舍必更盡皆淹沒臣惟恐上厪聖懷所以繕摺具奏也臣於接咨之日已一面具文移覆一面遴委賢員前赴直隸山東二省據實勘查嗣據委員回稱曹縣之魏家灣等處皆因天時久雨地勢窪下積有雨水二三尺不等詢之土人皆云竝非黃水現有樹木坡岸水跡可據其太行堤工亦因雨水積深淹浸日久塌有三十餘丈又查據直隸長垣縣之梁家集等處各村皆有積水總不過二三尺現有坡岸樹木可驗而蘭邑板厰缺口之水彼時順堤往北已盡歸於陶濱河內流入南陽湖矣總之今嵗入夏以來雨水過多三省地方低窪地畝皆有積水已早䝉奏情節實係臣一點犬馬愛主之誠竝無别意理合據實覆奏仰祈聖鑒謹奏覽同日又奏為欽奉上諭事竊照豫省案准户部等衙門咨行令查明河南由水路北來賣給商賈麥榖數目每月繕摺奏聞仍知㑹直撫等因除自康熙五十五年六月至雍正三年七月有無赴北麥榖俱經按月奏聞今查明八月分竝無客商由水路赴北販賣麥榖糧石除咨㑹直隸督臣外理合繕摺奏聞謹奏適經降諭命停此奏矣同日又奏為據實奏聞仰祈聖鑒事竊臣以一介庸愚仰䝉皇上特達之知畀以封疆重任緣知識短淺虛糜爵祿夙夜憂懼實無一刻敢於自安不謂臣於九月初一日夜至三更辦理案牘之餘退就卧室偶爾失足閃跌左膝幸骨尚未損然初時被跌血淤筋拳痛楚難忍不能動移延至二日適糧道沈廷正至臣署看視其人明於醫學兼有方書隨按方醫治多有效驗數日之後漸可屈伸比前舒展臣受皇上天恩至深極重一點竭誠報效之心鞠躬盡瘁死而後已豈敢因此一跌遂萌偷安圖逸之想然筋血內傷非調飬百有餘日未即全愈恐慶賀令節拜進夲章不能叩頭行禮一切公務臣雖勉力照常供辦但封疆任重何堪卧理犬馬之私實難自安清夜環思不禁憂心如焚寢食俱廢所有微臣失足跌損情由不敢不據實奏聞伏乞聖裁謹奏偶爾跌傷何足為慮拜夲賀節不能行禮亦屬無妨其加意調養怡親王處有奇驗膏藥已命王交付爾之來人帶回敷貼自當有效雍正三年九月二十九日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事竊查河北鎮臣紀成斌題參磁州營革任守備陳丙第等侵扣兵餉一案臣接准部咨隨檄按察司審解去後嗣因鎮臣紀成斌發給照㑹從中阻撓且復令現任守僃徐世俊於雍正三年正月十三日給頭目李邦虎等銀四十七兩又於正月十八日給管隊楊勷銀九十七兩二錢大錢十二千八百四十文令李邦虎等於審訊時供作陳丙第先經侵蝕後來畏罪吐出還帳之項以致各犯供吐游移案懸莫結業經臣繕摺具奏奉有硃批諭㫖臣欽遵審據陳丙第供稱所扣兵餉共銀二百六十四兩零實因製造旗幟衣帽等項用去尚不敷銀三十七兩零已經賠墊竝非侵扣入已亦無短發又衆兵每名自捐銀九分共銀四十七兩零乃係營中祭祀等項公費又朋馬一項共銀八十兩又係衆兵公買馬匹之用均非陳丙第經手即訊之管隊楊勷頭目李邦虎等供吐如一是陳丙第所扣兵餉實與管軍官科斂人錢糧雖不入已坐贓論罪杖六十徒一年之律相符似難擬以侵扣入已之條至於守備徐世俊所發李邦虎等銀兩以及紀成斌用印照㑹并與紀成斌有礙供詞臣已逐一刪去除恭疏具題外所有審明緣由理合繕摺覆奏仰祈聖鑒謹奏如此甚好知道了紀成斌才猶可用姑寬之以責後效同日又奏為恭報秋汛水勢情形以慰聖懷事竊查豫省今嵗秋汛自七月初一日立秋起至九月十八日霜降止因天時久雨沁黃竝長水勢浩瀚盡皆出槽漫灘除長落相抵外淨長水至五六尺或間至七八尺不等以致各處堤工在在危險幸自七月二十三四日以後逐漸消落現今水勢俱各歸槽工程平穩理合繕摺奏聞再臣更有請者豫省加幫大堤綿亙千有餘里其間地勢髙下不一但從前勘估之時止論堤面堤根估計丈尺一律加築臣於今嵗春夏秋間屢赴河干逐一查勘見地勢髙阜者水離堤頂尚有二三尺及四五尺不等其地勢低窪之處堤工丈尺雖無減少而形如月牙勢甚危險有水與堤頂相竝者竝有漫過堤頂臨時加築子堰或下掃搶護方保無虞者甚有先年舊堤前議加幫大堤之時竝未估修卑矮單薄兼多殘缺即如蘭陽縣板厰缺口亦係未估之加幫大堤臣思此等工程若不急為加築難以防禦且臣聞江南朱家海地方自六月十五日漫缺之後正河逐漸淤高一經堵築缺口則水勢不能暢泄而豫省地居上游臣恐明嵗一届桃伏秋汛黃水加長無可容受凡地勢低窪之處更為可虞臣於夲年八月初四日接准部咨內開欽奉上諭其一帶危險工程亦當增卑培薄預為之防等因欽此臣遵於八月初六日前赴蘭陽縣工所即與總河臣齊蘇勒議及前項堤工作何加築之處在齊蘇勒亦極以臣言為是因而公同商酌議即遴委熟諳河務廉幹能員數人細加確勘據實料估再為題請至所需銀兩約計十餘萬兩之數便可一律加幫永久堅固應否動用正項錢糧分發興修抑或即將豫省存貯公項內動撥應用如䝉皇上𢎞慈允臣所請臣即知㑹正副總河令其主稿㑹疏具題臣再檄令藩司動撥銀兩移解河道於今冬明春乘農務閒暇之時立即備料修築庶堤岸鞏固安如磐石而於國計民生大有禆益矣但臣愚昧無知是否可行伏乞皇上指示遵循謹奏此乃一勞永逸當為之舉但須詳細勘估籌酌合宜㑹疏具題候㫖遵行同日又奏為據實覆奏仰祈聖鑒事竊查唐縣參革知縣關敶行賄一案前據學臣王國棟轉𫝊上諭業經臣將關敶行賄實情據實奏明在案嗣據承審各官審擬招解到臣臣隨照依原參款蹟逐一審明具題復將其中前後情節於雍正三年三月十七日繕摺具奏荷䝉硃批諭㫖臣伏讀之下仰見我皇上至聖至明無微不照兹臣於雍正三年五月初八日接准部咨內開李廷基盤查倉榖應較明制斛清盤何得以私帶大尺杆量算况關敶倉榖既無虧空黴爛何用送銀求免清查明係借端勒索後因關敶要詳報停徴又將尺杆留住李廷基恐事敗露先行捏報之處顯然何得竟行免議等因具題奉㫖依議欽此轉行到臣臣伏查關敶用賄行求實因該縣有未報隱地而起但此種情節原非部臣所能知是以不得不詳加指駁臣隨遵照部駁逐一覆審其如關敶行賄之贓銀現貯司庫確鑿可據而李廷基借端勒索以及關敶要詳報停徴心虛捏報之處毫無足憑似難舍贓銀現據之關敶於不問而反坐李廷基以莫須有之罪且臣查據尺杆係汝寧府較凖歷來盤查所用與制斛無異竝非私帶之大尺杆况李廷基居官不職臣已繕摺奏明復於别案題參革職現在審擬是臣於李廷基絲毫不敢寬假又豈敢徇庇開脫但臣審據關敶一案委難將李廷基一併擬罪除仍照前擬繕疏具題外不得不將前後實情據實再為覆奏為此謹奏內外朕皆視為一體惟理是從但須秉公審斷反覆究詰其理愈明部駁亦復何害所奏知道了同日又奏為奏請酌調賢員以除積弊以蘇民困事竊查濬滑內黃等三縣仰䝉皇上軫念豫省運道所經隔屬呼應不靈以致貽誤糧艘特頒諭㫖改歸豫省管轄臣隨密訪該地方情形并各官賢否以便整飭不謂直隸與豫省地雖毗連吏治各别訪據濬縣有接受前任虧空銀三千九百兩現今大名道認補一千兩大名府知府認補一千九百兩其餘一千兩該縣已經補完滑縣有接受前任虧空銀四千五百餘兩今向監生及鹽店當鋪內借補訖內黃縣有夲任虧空銀二千五百餘兩今向新捐貢監及鄉紳富戶借補訖臣因各項錢糧文冊移咨原任直隸督臣李維鈞未准移送到豫是以無憑查核糾參又丁匠銀兩直省原係新改攤入地糧之內但每兩止應攤銀二錢七釐零今聞各該縣竟攤至二錢五分且正糧之外指稱小糧公費名曰奏銷每兩另徴銀二錢五分至三錢以及三錢三分不等火耗一項紳襟則係加一并加一五百姓則竝皆加一六及加二不等至於各項陋規并一切派纍臣現在清查禁革此在官之弊所當急為整飭者也若夫詞訟差票之講牌禮投充書役之有費用襟監胥役之把持衙門歇家光棍之勾通肆害相習成風視為固然此在下之弊所當急為剪除者也臣訪聞之下不勝駭異隨檄調各該縣知縣赴省面詢有回稱昔有今無者有回稱自到任以來盡皆革除者臣復將各縣知縣細加驗看惟濬縣知縣曽振宗才有可用事亦明白滑縣知縣董玧才具中平內黃縣知縣李惇未足勝任臣思各該地方積習相沿已非一日若將各官仍留原任不將才守兼優之員酌量調補則從前陋弊斷難一時盡革臣查鄢陵縣知縣孫國璽操守謹飭辦事明敏曽經臣題請升補信陽州知州未䝉俞允現在離任候補上蔡縣知縣張球才守兼優辦事勤慎亦經臣題請升補汝州知州部議該員有承追虧空一案不便升補奉㫖依議欽遵在案又查原署湯隂縣知縣楊𢎞緒其人操守廉潔辦事明白士民無不悅服於雍正二年十月內聞訃丁憂領咨回籍經臣題請准其在籍治喪百日咨取來豫遇缺補用巳䝉聖恩俞允今雖尚未到豫臣復現在移咨催取以上三員竝皆年力精壯才守兼優若以之調補濬滑等縣必能剔弊除姦振興一切伏乞皇上俯念地方緊要特降諭㫖將上蔡縣知縣張球調補濬縣鄢陵縣知縣孫國璽補授滑縣原署湯隂縣知縣楊𢎞緒補授內黃縣并將現任濬縣知縣曽振宗滑縣知縣董玧內黃縣知縣李惇容臣在於豫省知縣缺出酌量題補如此一轉移間庶民困得蘇而臣亦可收臂指之效矣臣為吏治民生起見不揣冒昧繕摺奏請伏乞皇上睿鑒施行謹奏不料李維鈞吏治如此廢弛昨於伊解任後命蔡珽代署其事方知備悉殊屬可訝之至濬滑內黃等三令若果有不職處即應參黜無庸改調此三邑又非邊要之區可比將以何詞調補况率土莫非吾民在在皆須良吏朕不便特諭施行也同日又奏為遵㫖覆奏仰祈聖鑒事竊臣伏查祥符縣南北兩岸沙鹻河形地畝仰䝉皇上天恩念切民瘼特將升任布政使楊文乾奏摺一扣頒發到臣命臣查奏臣欽奉諭㫖於夲年六月初十日業經繕摺覆奏訖兹值秋收已畢臣隨詳細密諭開封府知府將楊文乾摺內所開沙鹻河形地畝三千七十頃零共該糧銀一萬五千二百五十餘兩再行逐細確查據實開報去後今查據祥符縣之黃河南岸因雍正元年九月內中牟楊橋漫溢黃水下流地畝被淹水去沙停原共地一千四百八十四頃五十畝內除常缸等各社共地一千零七十二畝已經節年耕種收穫外其甘棠等各社內通共地四百八十三頃七十八畝現今俱未耕種又祥符縣之黃河南北兩岸因康熙六十年武陟決口河身淤墊黃水散漫地被淹浸變成鹹鹻原共地八百二十六頃四十五畝內除南岸邊村等社北岸陳橋等社共地六十八頃二十三畝俱經栽種收穫外惟南北兩岸之南神西和等社共地七百五十八頃二十二畝現今俱未耕種又祥符縣之黃河南岸因康熙六十年武陟決口黃水漫溢將納糧地畝流成河形變成浮沙原共地七百五十八頃二十五畝零內除南岸八角等社共地三十四頃北岸陳橋等社共地七十五頃七十畝零已經耕種收穫外惟南北兩岸之南毛長店等社共地六百四十八頃五十九畝現今俱未耕種以上南北兩岸內除節年已種地畝無庸再議外實在浮沙鹹鹻河形等項不能耕種地共一千八百九十頃五十九畝計每年額徴地丁銀九千二百六十一兩零漕折銀一百四十五兩零再臣伏查前項不能耕種之一千八百九十頃五十九畝內有淹浸日久變轉無期之地共計一千三百七十頃一十四畝計每年額徴地丁銀六千七百一十一兩零漕折銀一百五兩零應請援照陽武等縣陸續報墾之例俟變轉可耕之時查明陸續報墾先照下則起科三年後仍復原則其餘未種之五百二十頃四十五畝計每年額徴地丁銀二千五百四十九兩零漕折銀四十兩零查據此項地畝原與好地相離不逺或因雨水頻仍浮沙減少或因雨淋味淡漸有草生或因水不漫進漸次涸出者若再加以人力翻耕將來便可漸次成熟亦應請援照陽武等縣二年後起科之例於雍正六年先照下則起科三年後仍復原則再臣查南岸之浮沙地有未完雍正二年三年地丁銀共三千九百一十四兩零南北兩岸之沙鹻地未完康熙六十六十一年并雍正元二三年地丁銀共一萬二千五十一兩零南北兩岸之河形地未完康熙六十六十一年并雍正元二三年地丁銀共一萬四十六兩零以上通計民缺未完節年新舊地丁等銀二萬六千一十三兩零查前項被災地畝既未播種國賦從何而辦可否援照陽武等縣仰䝉聖恩豁免之例題請豁免庶民力得舒而皇仁無不廣被矣所有臣奉查過祥符縣沙鹻河形地畝理合分析具奏伏乞皇上指示應否容臣恭疏具題臣不敢擅便為此繕摺請㫖謹奏援㫖具疏題奏可也雍正三年十一月初十日河南巡撫臣田文鏡謹奏恭請皇上聖安朕安覽爾題參黃振國之疏甚屬可嘉如此方不負朕委任之意克勝封疆重任也凡事惟中正為無弊能照此秉公執法一無避忌放膽為去保爾永永平安受朕恩榮不既勉之勉之倘若稍涉縱肆過於深刻又非朕見重之意矣頃據嵇曽筠奏請養廉伊原毫無出息可資用度爾等當於地方耗羡內酌量助之為是或知伊别有進益之路則據實奏聞停其幫助同日又奏為恭謝天恩仰祈聖鑒事竊臣於雍正三年十月初四日據臣齎摺家人回豫僃述奏事人轉𫝊聖諭這所奏俱係自已的事竝不是地方的事狠不是了等因欽此臣祗聆之下自知愚妄冒昧不勝慚悚感激無地自容伏念臣以一介庸愚叨寄封疆重任自愧智識短淺毫無寸長報效乃疊荷皇上隆恩至髙極厚清夜環思無適而可故不禁犬馬感激之私亟欲敷奏於聖主之前而無一刻之敢於自安者也兹不揣愚昧冒干宸嚴極知罪在難逭乃復荷皇上天恩不加罪譴曲賜矜宥諄切訓諭似此浩蕩隆恩臣即捐糜頂踵亦難圖報感恩之涕不覺自零臣惟有追悔靡極隨事益加小心敬謹以仰副我皇上知遇之洪慈於萬一耳所有微臣感激微忱理合繕摺奏謝謹奏從來善始者多克終者蓋寡昔年聖祖常有諭㫖督撫輩於初用時皆有可觀及至日久遂多改變誠哉聖祖閲歷之言人能確然堅持初志不隨境遷方稱有守朕亦以此自勉同日又奏為漕運全資水利宜通源節流以濟運道事竊臣於雍正三年八月十二日准工部咨稱九卿議覆户部侍郎蔣廷錫條奏前事奉㫖著派學士何國宗護軍參領翟桑御史尤清王之琦員外郎馬泰將蔣廷錫條奏摺內款項逐一詳看係巡撫管轄之處㑹同巡撫看閲詳議具奏係河道總督管轄之處㑹同河道總督看閲詳議具奏欽此到臣臣伏讀之下仰見我皇上睿慮周詳經畫曲盡濟漕惠民一勞永逸之至意欽差學士何國宗等於九月二十三日到豫省所屬之臨漳縣查看衛河臣適因左膝閃跌不能動移隨知㑹副河臣嵇曽筠㑹同閲看去後今何國宗等查看漳衛沁丹等河并各處泉源已於十月二十九日到省與臣㑹議臣查據條奏所請引漳濟衛以及分沁入衛之處俱因水性極暴難以建閘不便輕開無庸詳議外臣與何國宗等再三斟酌查有輝縣所屬之蘇門山百泉河內縣所屬之小丹河安陽縣所屬之洹河雖均係入衛之水現在通流應再各開深廣以濟漕運又查據湯隂縣之湯河源輝縣之蓮花泉紫微觀泉萬泉焦泉丁公泉重泉梅竹泉修武縣之五里泉馬方泉淇縣之淇泉安陽縣之珍珠泉并洹河源善應山泉亦現在飭令各該地方官估計再加挑穵深通使泉水盡入衛河濟運除將各河泉源㑹同詳細妥議并一應開穵工段丈尺數目繕造黃冊另疏具題請㫖外所有學士何國宗等查勘河泉至省與臣㑹議情形理合繕摺具奏再查何國宗等已於十一月初七日起程赴山東臨清州去訖合併聲明謹奏此係専差何國宗等㑹同查議之事總俟伊等奏到再定同日又奏為據實覆奏仰祈聖鑒事雍正三年十月十九日臣齎摺家人回豫恭捧到臣奏請酌調濬滑內黃等三縣一摺奉有硃批諭㫖仰惟我皇上自御極以來仁恩覃被愷澤遐敷凡屬內外大小臣工無不仰沐𢎞慈加恩逾格況李維鈞身為大吏䝉恩最渥被眷尤隆雖竭頂踵以捐糜猶不足仰報髙深於萬一而乃負恩作慝恣意欺罔是天下竟無可用之人而人臣亦竟無可白之誠矣臣欽承聖諭不勝中懷義憤愈切冰淵至於臣奏請酌調三縣之事實因濬滑內黃等縣仰䝉皇上天恩新隸豫省若將各官遽行參處人多不免疑臣過刻如仍留原任又恐積弊相沿一時不能盡革此臣所以不揣冒昧繕摺具奏者也今䝉皇上明白指示諄切教導臣不禁茅塞頓開惟有再加密訪嚴行禁飭如果怙終不悛仍循舊習臣即據實題參以副聖懷又臣前覆奏河北鎮臣紀成斌題參磁州營革任守備陳丙第等侵扣兵餉一摺奉有硃批諭㫖仰見我皇上德合乾坤光昭日月如紀成斌之著有微勞即䝉聖恩寬宥格外矜全從此羣工庶職莫不感激思奮夙夜勤求以仰副我皇上都俞吁咈之盛治矣所有奉到原摺理合恭繳伏乞聖鑒謹奏所奏俱悉朕格外寬宥之恩當令紀成斌知之同日又奏為據情代奏恭謝天恩事竊臣於雍正三年十月十四日接准部咨內開欽奉上諭山東布政司員缺著河南按察司張保補授河南按察司事務暫令沈廷正署理等因欽此到臣臣隨行按察使張保糧道沈廷正各欽遵去後兹據沈廷正禀稱廷正在衛輝府督辦漕糧於夲月十七日接到檄文內開欽奉上諭河南按察司事務暫令沈廷正署理欽此廷正祗奉之下隨即恭設香案望闕叩頭謝恩訖伏念廷正以一介庸愚由陕西延安府知府奉㫖加以道銜改補西安府知府未經到任即䝉皇上簡拔特授河南開歸河道自抵任以來雖朝夕兢惕竭盡駑駘尚恐有慚職守今又復䝉聖主隆恩暫令署理按察司事務聞命自天感恩無地於夲月十八日准升任按察使張保將按察司印信委官送至廷正辦漕公署凛即欽遵接印署理外竊慮臬司事務任大責重圖報益難惟有矢竭犬馬之力恪守臣職以仰副我皇上委任之洪恩於萬一耳所有感激微忱格於職分無由上逹而寸衷縈結又難自已仰懇代為具奏恭謝天恩等情到臣臣伏查道員從無代奏謝恩之例不敢繕疏入告而沈廷正情詞懇切臣實不敢壅於上聞理合繕摺代為奏謝仰祈聖鑒抑臣更有請者糧道沈廷正委屬才守俱優之員且為人謙和辦事詳審吏治民生無不深知熟悉今䝉聖主洪恩令署按察司事臣欽承諭㫖仰見我皇上知人之明用人之當誠為千古帝王所未有凡屬臣工莫不感奮濯磨爭思圖報臣伏查按察司一缺係通省刑名總滙極其緊要而才守兼優如沈廷正之員實未易多得仰懇皇上天恩俯念地方緊要賜將糧道沈廷正補授河南按察使不特該員感激聖恩益思奮勉而臣得收臂指之用實感沐皇上格外洪慈於生生世世矣臣為地方需才起見不揣冒昧妄瀆宸嚴是否臣言有當伏乞聖裁臣不勝悚惶兢惕之至為此謹奏若得有勝似沈廷正者自然另用如不得勝似沈廷正者自即用伊此奏過矣同日又奏為據實奏明仰祈聖鑒事竊查豫省沿途塘汛添蓋墩房一事臣前在布政使任內曽經繕摺奏請動撥雍正二年耗羡銀三千兩詳委前任南汝道佟鎮估修監造嗣據佟鎮將沿途大路墩房添蓋整齊共用過銀二千七百四兩零復經臣具奏在案兹據布政司詳據南汝道陳世倕詳稱通省沿途大路墩房業經修蓋撥有汛兵擕眷居住朝夕看守但查據各州縣地方尚有逼近深山地當扼要并村莊市鎮人煙雜沓之處俱向有營兵在汛看守其如房屋馬棚多有不敷且今嵗夏秋以來雨水過多墩臺營房不無倒塌亦應即為修蓋等情到臣臣查據各州縣應修應添墩房處所俱關緊要隨批令布政司轉飭作速據實勘估一面動撥銀兩發給南汝道令其親詣各州縣塘汛處所𫝊集承攬工匠給發現銀買料雇夫速即修蓋毋得絲毫派及里民致滋擾纍今據布政司詳據南汝道陳世倕詳稱各屬應修應添墩房現今俱各修蓋整齊除前道佟鎮前領三千兩內剩存銀二百九十五兩零又動撥雍正二年耗羡銀二千三百兩令其如數轉發訖臣復移咨各鎮仍即照數撥兵速令擕眷赴汛居住晝夜巡防外所有續蓋續修過墩房并用過銀兩數目理合繕摺再為奏明仰祈聖鑒謹奏修蓋墩房固係應行之舉但聞汛兵擕眷移居之後每鼾睡至日髙三丈行人叩門乞火猶然未醒欲望其雨夜風晨以禦暴客豈可得乎似此怠惰偷安有名無實何如止而不為以省無益之費將朕此諭轉𫝊兩總兵官飭令嚴懲汛兵上緊巡防慎毋仍前疏慢否則併汝亦加譴責不稍寬貸也硃批諭㫖卷一百二十六之六欽定四庫全書硃批諭㫖卷一百二十六之七硃批田文鏡奏摺雍正四年正月二十一日河南巡撫臣田文鏡謹奏為據實奏明仰祈聖鑒事竊查汝寧府知府張玢於未到任時即䝉聖明洞鑒其人心術平常命臣留心試用自到任之後臣隨時刻留心細加察訪見其辦事明白操守亦尚亷潔業經臣於雍正三年正月二十四日繕摺奏明不意近日浮而不實漸加放縱一任信陽州參革知州李廷基橫行勒𣲖該府非惟不能禁飭且親至確山縣反為勸諭紳襟令其幫助確山縣知縣張邦憲瞻徇情面并聽知府指揮膽將南汝道陳世倕所發禁止告示匿不張掛從中勸諭紳襟𣲖幫廷基又有息縣知縣邵言綸固始縣知縣汪諴陳州知州蔡維翰或任匱書銀匠朦官作弊重等收糧或向鹽商借貸致用十四兩小稱發賣食鹽或怠惰偷安並不清查保甲盜案纍纍亦不比緝以上各官並皆劣蹟昭著勢難一日姑容臣伏查前參信陽州知州黃振國一案荷䝉皇上硃批諭㫖格外奬賞臣跪讀之下固已受寵若驚及讀至戒臣過於深刻之聖諭臣益加悚惕不覺涕泗交流竊思臣受皇上天恩至深至渥今於恩寵倍加之時復寓以諄諄訓誡之聖意無微不至無慮不周臣敢不鏤心刻骨仰體恪遵但以此劣員臣久已訪聞誠恐未確又復細加察訪事事確實有憑有證復據司道等官揭報到臣臣若不亟為糾參不特諸臣辜負𢎞慈臣亦自干欺隱之罪况各員劣蹟已著不便稍為姑容致使人人效尤無復顧忌臣惟有據實入告並不敢故為深刻也除將各員繕疏題參外理合繕摺奏明伏乞聖鑒謹奏各員果如此不法豈可一日姑容理應糾參者但近日以來每聞人論爾有任性尚氣之疵當深自省察切以為戒同日又奏為仰懇聖恩擢補賢員以收得人之效事竊查糧道沈廷正已䝉皇上天恩補授河南按察使所遺糧道員缺關係通省漕糧驛傳鹽務且兼管開歸河三府陳許禹鄭陜五州地方極為緊要皇上眀竝日月無微不照內外大小臣工久在聖眀洞鑒之中糧道一缺自必補放得人協臣料理臣亦何敢冒昧奏請自干罪譴然臣一點犬馬報主之誠時縈寤寐實有不能自己者臣查有開封府知府孫蘭芬才具優長操守亷潔抑且奮自勉勵力圖報效不敢稍懈至前䝉聖諭性急之處臣復凛遵諭㫖時刻教導彼亦自知悛改日漸舒徐又衛輝府知府張建德老成練逹才守兼優以上二員足勝糧道之任倘䝉皇上天恩於二員之內簡補一員不特該員感激聖恩益思奮勉而臣亦得收臂指之效矣再查開封府一缺係通省表率之首政務殷繁員缺最為緊要而衛輝府一缺又係南北通衢每年復有協辦漕糧之責必須能員料理方免遲誤臣查據鄭州知州髙文愷辦事眀敏纖毫無染民情悅服聲名甚優倘䝉聖主𢎞慈即以髙文愷升補府缺該員自必益加努力共報聖恩至髙文愷所遺員缺係臨河州縣容臣遴選熟諳能員遵例另疏題請補授似此一轉移間而地方均得其人矣臣為吏治民生起見不揣愚昧冒瀆宸嚴但是否臣言有當伏乞皇上睿鑒臣不勝悚惶憂懼之至為此繕摺請㫖謹奏已有㫖矣楊夢琰較沈廷正更優袁珂靳樹賢兩員未必不勝如髙文愷也同日又奏為恭謝天恩仰祈聖鑒事竊查豫省漕糧自衛輝府水次受兑由新鄉汲縣而進至直隸大名縣所屬之龍王廟止共計水程紆回六百四十餘里其中沙石灘淺非挑濬蓄泄不能前進向因濬滑內黃三縣視河南漕運為隔省之事不甚相關而押運官辨以非本省所屬呼應不靈每年自十二月中旬起運至次年四五月內尚未盡出豫境以致各幫糧船每誤抵通之期今䝉皇上天恩特將濬滑內黃三縣改歸豫省管轄俾地方有司各有責成押運諸員易於指使是以今嵗起運雍正三年漕糧沿途地方各官皆協恭和衷竭力料理一切雇夫覓船建壩蓄水不分此疆彼界俱各一律奉行毫無推諉之弊至於築壩地方所需料物存有糧驛道暨開封府衙門應得鹽規情願歸公銀兩分發各屬照依時價公平採買遇有淺阻之處需用剝船亦係發給現銀雇覓應用均無虧短缺少貽纍小民臣查濬滑內黃三縣百姓較之往年竟不知有漕運之纍黃童白叟莫不以手加額感頌皇仁歡呼之聲遍於四野兹復據押運等官報稱各幫糧船已於本年正月十七日盡出豫境且自今嵗起運以來河伯著靈水勢增長自三四尺起至五六尺不等船重者只須量行起剝船輕者便可暢行無阻似此天人交格輸挽迅速實係從來未有之事此皆仰䝉我皇上動悉利弊籌畫盡善之所致也所有官民踴躍至情暨微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏據奏漕船已出豫境然總俟抵通之日方可定其挽輸遲速也朕意此項漕糧將來終歸至小灘開兑而後妥同日又奏為據實再陳仰祈聖鑒事竊查豫省漕糧每年額該買運米一十五萬一千三百八十三石零內除中牟等縣沙壓鹻地豁免漕米一千六百八十三石零實應採買米一十四萬九千六百九十九石零每石部定價銀六錢五分共價銀九萬七千三百四兩零臣前因道口等處米價甚昻不惟艱於採買有誤冬兑且恐再買一十四萬餘石之米小民勢必乏食是以與糧道沈廷正再三斟酌只得一時權宜將彰衛二府所屬存倉榖石暫為碾米起運業經臣於雍正三年十二月初七日繕摺奏眀兹查據彰德府所存倉榖內動榖八萬石每石碾米六斗五升共碾米五萬二千石每榖一石價銀三錢五分共給貯價銀二萬八千兩衛輝府所屬存倉榖內動榖六萬九千七十七石每石碾米六斗五升共碾米四萬四千九百石五升每榖一石價銀三錢五分共給貯價銀二萬四千一百七十六兩零又據糧道沈廷正在衛輝等處採買米一萬一百七十石每石價銀七錢一分六釐零共價銀七千二百八十九兩零又在道口等處沿河水次採買米四萬二千六百二十九石零每石價銀八錢八分七釐零共價銀三萬七千八百三十八兩零以上共用過價銀九萬七千三百五兩零合之原額徵收米價竝無賠墊至於暫貯各州縣庫榖價銀兩如價值平減之處臣己檄令該地方官作速買榖還倉即或買不足數一俟麥秋暫買小麥存貯再俟秋收易榖還倉庶漕糧積貯均無貽誤矣所有採買漕糧并冒昧暫動倉榖細數合再繕摺具奏仰祈聖鑒謹奏爾之前奏已發部議矣同日又奏為恭報瑞雪以慰聖懷事竊據開封等八府所屬暨汝鄭等七州并所屬各州縣報稱於雍正四年正月初一初二十一十三等日同雲密布瑞雪繽紛自五六寸起至七八寸不等地土潤澤麥根深固將見豐年預兆大有可書臣職任封圻幸逢嘉㑹不勝歡欣抃舞之至所有豫省得雪日期理合繕摺奏聞伏祈睿鑒謹奏據奏新正瑞雪通省普被但朕聞河北三府雨雪尚缺霑足雍正四年二月二十一日河南巡撫臣田文鏡謹奏為據實奏眀仰祈聖鑒事伏念臣至愚極陋仰沐皇上殊恩畀以巡撫重任夙夜冰兢實無一事敢於茍且至於參劾屬員益自矢公矢慎必至不得不參不敢不參之時方敢據實入告如前任信陽州知州黃振國狂悖貪劣經臣糾參奉㫖審眀解部關係匪輕於本年正月二十四日解至省城聼候審解暫羈祥符縣監內緣黃振國於解省之時行至西平縣地方偶被車翻碾壞左手皮破筋傷於進監之時尚流血水每日延醫調治禁卒李玉見其左手帶傷即告知刑房王文輔隨寫報呈呈報祥符縣知縣俞汝翼該縣詳報到臣臣即批按察使撥醫加意調治務痊審解在案不謂黃振國之孫黃忠衡先因赴按察司呈保伊祖出監未准機乘該縣文內有血流不止飲食不進字樣輒赴按察司呈控刑書揑報重傷意在恣其凌虐似有使令以輕報重致死滅口之情竟令承審各官均罹不白之寃當據按察使沈廷正轉報到臣隨批令該司飛提祥符縣暨刑書禁卒醫生嚴審眀確併取捏報職名去後兹據兩司審眀黃振國帶傷入監是實而刑書混寫血流不止飲食不進字樣該縣不親加查驗冒昧率轉亦屬情確開具職名請參到臣除將祥符縣俞汝翼繕疏題參外臣思報呈內字句駭人該縣不察竟爾率轉雖屬一時疏忽然黃振國係奉㫖審眀之日解京重犯與尋常事件不同似此溺職之員若不亟為糾參非惟不足以折黃振國之心而承審各官亦不能洗其致死滅口之迹臣亦幾無以自白矣伏乞皇上俯鑒其中委曲出於無可如何之勢竝非臣敢於任性過刻致負我皇上諄諄垂誡之聖意也理合繕摺據實奏眀仰祈聖鑒至臣所參黃振國一案業經審眀現在繕疏具題起解赴部合併奏聞謹奏朕幾曽命爾將應參者勿參耶此奏大竒同日又奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣恭謝天恩竝報各幫糧船盡出豫境一摺奉有硃批諭㫖據奏漕船已出豫境然總俟抵通之日方可定其挽輸遲速也朕意此項漕糧將來終歸至小灘開兑而後妥欽此仰見我皇上睿慮周詳無微不至臣何敢再為瀆奏自干罪譴然臣䝉皇上髙厚隆恩非比尋常若眀知其中利弊故為緘默臣罪益不容誅矣兹臣復查豫省漕糧向由衛郡受兑自眀季移於直𨽻大名府屬之元城縣小灘鎮康熙三十五年前撫臣李輝祖題請改復業䝉俞允至康熙三十七年運丁張文安等叩閽部議仍改小灘後撫臣李國亮又請改復奉㫖允行迄今二十餘年不復更改者總因小灘之不如衛郡已經歷試而權其輕重也所以臣前奉皇上有河南糧艘可否由漳河挽運之聖諭臣遵即細加察訪若移水次於小灘每於交兑之時運米就船既苦轉輸之不易攜銀就買又遭牙户之居竒且該地方百姓均係回教臣聞豫民運糧至彼即坐歇樹下亦需鋪地錢數十文其餘勒索益自可想而知是以臣不敢冒昧請改而仍循舊例具題者也至於衛郡至小灘內有水淺即艱於挽運之處惟濬縣所屬之屯子馬頭至老鸛觜一十八里然每年淺阻皆由地方各官視為隔省之事遂致互相推諉遲延貽誤今䝉皇上天恩特將濬滑內黃三縣改歸豫省管轄所以今嵗起運雍正三年漕糧自受兑開行不及一月已盡出豫境若夫抵通之遲早自出豫境之後惟在直隸山東沿途地方文武各官照例催趲前進押運官辨以及旗丁水手不致到處逗遛便可迅速抵通則又非關衛輝與小灘受兑之故也臣不揣冒昧據實覆奏竝不敢故為堅執妄瀆宸嚴伏乞皇上俯賜鑒宥臣不勝悚惶兢惕之至謹奏但須有濟於事何在多言況早經降㫖下部矣無庸此番瀆奏雍正四年三月二十日河南巡撫臣田文鏡謹奏為恭報晴雨日期仰祈聖鑒事竊臣伏查豫省所屬地方自雍正四年正月初一日起至二月十一日止所得雨雪日期業經臣節次繕摺奏眀兹復據各屬報稱於本年二月二十一等日各得時雨二三寸起至四五寸不等但臣查據通省所屬自入三月以來惟南陽汝寧二府所屬各州縣於本年三月初二初四等日復得時雨四五寸起至六七寸不等四野霑足其餘各屬低窪地畝雖尚多滋潤而髙阜之處稍覺乾旱臣隨備檄通行各屬查有未得雨澤地方一體竭誠祈禱外臣於本年三月初五日前赴彰德府㑹同學士何國宗等覆勘河源於三月十四十五十六等日經過地方得雨一二三寸不等然親見地土均未霑足所有二麥待雨情形理合繕摺謹奏今嵗雨澤朕觀天時景象只恐過多耳弗憂不足雍正四年三月二十七日河南巡撫臣田文鏡謹奏為敬陳覆勘水利情形仰祈聖鑒事竊查彰衛懷三府所屬各道河源據欽差學士何國宗等業俱勘畢同副河臣嵇曽筠至省與臣㑹議欲將彰衛等府所屬百泉等水分别改造通流濟運臣聼其講說似與國計民生兩有禆益故隨即畫題不謂何國宗等前赴臨清去後臣准咨委員分往百泉等處勘估工料沿河士民始知議定開穵改造河道無不驚恐紛紛陳說利害當據地方各官轉禀到臣後承委勘估工料之候補知府楊守知等旋省臣復細問情由與各屬所禀無異臣隨令楊守知等親赴臨清何國宗寓所分析回眀以便改題嗣據楊守知等回豫稟稱何國宗等仍照原議未肯更改臣隨詳悉具札致意與何國宗未敢冒昧具奏兹臣接准部咨知何國宗等即將臣書內情節繕摺具奏荷䝉皇上天恩俯允九卿議覆令臣等再行確勘虛衷秉公妥議臣於雍正四年三月初五日自省赴彰德府跪請聖安何國宗等即將勘河之事轉傳諭㫖務須公同虛衷妥議期於運道民生兩有禆益毋得各執己見竝宣諭地方官民各宜仰體皇上重漕愛民至意不可以私意阻撓等因欽此欽遵臣敬將上諭隨處傳集官民逐字宣讀廣布皇仁并令地方各官恭繕出示遍為曉諭當據沿河士民俱各禀稱從前欽差來勘之時竝未傳集我等曉諭亦未眀說作何更改我等實未與知及委員來估工料我等始知定議但洹河百泉如照依前議改造雖有分水之名實無涓滴可灌地畝至於小丹河水勢每年伏秋極為汹湧今斗門止寬一丈零四寸尚被水淹查康熙五十五年六月內山水漲發由斗門閘直至清化鎮西門勢甚迅猛今若再為加寬民命田廬恐難保護今䝉皇上天恩特傳諭㫖軫念民等欽差覆勘斟酌料理我等不啻再生聖恩浩蕩感激靡涯臣見士民莫不以手加額歡呼之聲遍於四野此誠我皇上念切痌瘝周詳指示之所致也兹臣㑹同查勘安陽縣屬之洹河自善應山發源流至髙平村河上有自東往西石橋一座內除東西兩頭無水橋空外餘計四十三空現在流水量長三十三丈河靣約寬一百餘丈橋之東北一百四十丈緊靠東崖建有進水灌田石閘一座口寬一丈河灘上有順水斜向西南石壩一道共長四十丈內沙淤二十丈出土微髙者止二十丈竝非攔河築壩截水斷流臣再查現今河水通流濟運田髙水低竝無涓滴入閘每年農民當需水灌田之時於橋東第一洞起至第十洞止沿河東邊壘石引水八分之一已足灌溉餘俱暢流濟運若逼行遏入地畝己盡為巨浸此前議拆去石壩另築挑水壩座實於漕運無益徒費錢糧毋容議改者也臣復與何國宗等細為查勘如民間需水之時東岸仍照舊給民橋空十洞聼民順河壘砌石子引水灌田西岸橋空三十三洞疏濬深通俱歸運道實屬官民兩便臣再查輝縣百泉之南兩旁各有石堰一道開有小口稱為仁義禮智信五閘各閘之旁皆有還河閉住閘口泉水即從還河而入民間借水灌田之後餘水復由還河而歸入大河仍濟漕運前議於池南建石壩一道開三口門分為三渠官渠口門寬一丈六尺民渠口門共寬八尺渠內仍照舊各建五閘分灌民田但臣查水勢就下官渠居中口靣寬至一丈六尺中泓寬深勢必建瓴直瀉兩旁民渠西渠口靣僅寬三尺六寸東渠口靣僅寬四尺四寸且仁字第一閘逼近分水之口非惟不能遏水使髙灌入民田并恐一經閘住官渠泄瀉勢急又必去而復回是仁字一閘巳萬難灌溉何况以下之田今議將民渠兩處水口共再加寬二尺仁義閘座從分水渠口下移聼民自便臣見地勢漸低便可引水灌溉其舊有之五閘竝皆堵塞舊堰之內各另築石堰一道使官渠之水不能旁泄俱通流入衛於漕運大有禆益臣遵即㑹同何國宗等合詞具奏在案惟是河內縣所屬之小丹河臣詳勘地勢細察民情其進水石斗門有斷不宜加寬者然欲與運道民生兩有禆益總不如將小丹河之水盡入衛河以濟運道而小丹河內東西民地查有秦董二渠現在均可量為加寬分水灌溉不特上與漕運更有禆益抑且永無後患民情俱各心安乃臣與何國宗等虛衷秉公再三婉啇惟副總河臣嵇曽筠亦深以為然而何國宗堅執前議臣等因復㑹同屢次確勘據清化一鎮竝各村莊士民每日不下數百餘人紛紛禀說利害不謂何國宗竟置若罔聞動輒怒形於色反加以阻撓二字查究姓名緘民之曰以致士民盡皆股栗伏地哀懇似與虛衷妥議之聖諭未協而疏內奏稱竝無異詞實非百姓果無異詞也然臣等仰體聖懷竝不敢與何國宗彼此齟齬惟有從旁委曲勸解且即如臣等所議尚有何事未當何事不如前議在何國宗亦不能指出惟口稱若不照依前議皇上差我們這幾箇人出來做什麼就是九卿班上看了我們也竟不是人了又向臣說據百姓說改不得就依了他難道我們倒跟不上百姓等語臣思運道民生均關國計如果前議事屬可行即或民情多不樂從臣等亦焉敢復有異議其如一經更改當伏秋山水漲發竝非人力所能操縱民命田廬實有可虞現據士民驚恐呼籲臣只得另議同副河臣嵇曽筠合詞與何國宗等一併彚疏具奏總之臣䝉皇上特達之知畀以封疆重任復䝉奏者也緣欽奉上諭虛衷妥議事理謹將詳細確勘并另議情形繕摺據實奏聞伏乞睿鑒謹奏何國宗等數人非朕傾心任用者不過使其查勘耳豈即以其言為準爾等第各抒所見秉公籌議朕自有審擇兩端取中之道同日又奏為恭報晴雨日期仰祈聖鑒事竊照豫省所屬地方自入三月以來惟南陽汝寧二府所屬各州縣得雨霑足其餘各屬自本年三月初二日起至十六日止所得雨澤業經臣繕摺奏眀兹查據開封府屬之蘭陽等縣懷慶府屬之河內等縣於三月十九二十等日復得時雨一二寸不等又查據附省各州縣於三月二十六日又得雨澤寸許雖四野均未霑足而麥苖得此微雨可以滋長除各屬有無得雨容俟報到另摺具奏外臣現在設壇率領各官竭誠祈禱并通行各屬一體誠求所有豫省復得微雨日期理合繕摺奏聞謹奏專事祈禱莫若修省吏治多有譏爾諱飾災眚但遇州縣據實詳報者即欲加以參劾云云果若此豈為民上之道萬萬不可切戒切戒雍正四年四月初二日河南巡撫臣田文鏡謹奏為恭報雨澤分寸暨桃汛水勢平穩情形以慰聖懷事竊查豫省所屬地方自入三月以來所得雨澤業經臣節次繕摺奏眀兹臣續據各屬報稱於本年三月二十六日各得時雨自二三寸起至五六寸及霑足不等又據省城暨附省各州縣報稱於本年三月三十日復得時雨二三寸不等從此麥苖滋長豐稔可必除離省路逺各屬同日有無得雨一俟報到臣再另摺具奏外所有豫省復得雨澤分寸理合繕摺奏聞再臣伏查豫省黃河水勢今嵗自入桃汛以來至三月十五日止共長水自一尺起至二尺四五寸不等除長落相抵外現今竝無長落一切工程堤岸奏仰祈聖鑒謹奏近日以來畿內雨水過多朕心甚為憂虞雍正四年四月初十日河南巡撫臣田文鏡謹奏為恭報雨澤霑足情形以慰聖懷事竊臣伏查豫省所屬地方近據各屬陸續報稱自雍正四年三月三十日起至四月初十日止連日同雲密布甘霖大沛髙下地畝竝皆十分透足二麥可必豐收秋禾足滋茂植黃童白叟莫不歡呼踴躍感頌歡欣抃舞之至所有豫省得雨霑足二麥暢茂情形理合繕摺奏聞謹奏覽豫省霑足情形朕懷深慰直𨽻地方未免雨澤過多於二麥尚屬無妨秋禾則甚有礙朕所以憂虞莫釋也豫撫田文鏡性情僻暗信用僉邪賢否倒置謹擇其尤甚者恭摺上聞若上蔡知縣張球本屬市井無賴因將烏姓幕賔薦於巡撫衙門藉此招搖恐嚇同官撫臣信為心腹委署光州勒借息縣知縣邵言綸銀一千兩邵令止給五百兩未滿所欲即揭參邵令日耽詩酒一任匱書重等查邵令竝無詩酒之事所追重等係市中所用竝非匱等又因查固始縣倉榖勒索知縣汪諴餽送不遂即指汪令與鹽店換錢買榖一事誣為借錢縱商小稱鹽商送張球銀八百兩求免掛參後田文鏡附參商名張球始吐原銀查汪令實係換錢竝非借錢所追小稱係歷年舊稱竝非因借錢減小聞汪諴居官才守兼優而撫臣信誣參革賢否倒置莫甚於此懇乞皇上密敕撫臣將張球拏問將汪諴昭雪則公道彰而人心勸矣謹奏雍正四年四月初五日有人具此一奏發來汝看汝之居心不肯負恩欺朕原可確信不疑至若汝之屬員負汝欺汝與否則未可定也蓋用人最不宜護短聼言尤不宜偏信如上蔡令張球覽此參摺更訪之他處似一僉邪劣員汝或被其簧鼓不自覺知耳今當加意體察據實奏覆朕往往見清正大臣於妻子家人屬員親友間或牽於溺愛受譖訴而無疑或比於私誼被愚弄而不悟致冒不眀之譏因招敗檢之纍者不可枚舉不寧惟是即年羮堯從前朕亦何嘗不被所誑惑一旦覺悟即宜果決切勿執迷以求文飾自謂我何得有錯云云橫此偏見於胸中則其害至不可勝言矣況又非親非友何故以清潔一身甘被其汚而受衆人之謗耶爾等當取法乎朕虛公省察務别真僞倘誤信一二匪人所繫實非淺鮮朕操生殺豫奪之柄利害榮辱可判於目前而臣工之是非邪正兼關其千秋後世名節尚不能得奉公持正致身為國者幾人爾等之屬官下吏中豈易邂逅一心一德同休共戚之儔乃魚目混珠燕石擬玉以自蔽其聰眀何哉朕此論發前人所未發爾等封疆大吏膺激揚舉錯之責當觸目警心以為終身誦志之勉之夫可信者非人而何故語云始吾於人也聼其言而信其行不可信者非人而何故續云今吾於人也聼其言而觀其行於此持衡稍不均平則失之毫釐謬以千里難言知人用人之道矣雍正四年四月二十七日河南巡撫臣田文鏡謹奏為遵㫖據實覆奏仰祈聖鑒事竊臣齎摺家人回豫恭捧皇上硃批奏摺一扣欽奉諭㫖到臣臣跪讀之下不勝悚栗憂懼乃䝉皇上天恩不即嚴加治罪特將原摺賜臣細閲復荷聖慈於萬幾之暇親灑宸翰發千古帝王所未發之奧義竝密授臣以用人之祕㫖多方訓誡諄切提撕臣何人斯而仰厪天心一至於此不禁愈思愈感愈感愈泣數日之內聲淚俱無臣惟有終身頂誦時刻警心以仰副我皇上生成之隆恩於萬一耳兹臣伏查參奏各款遵即秉公密察謹逐一據實為我皇上陳之臣兩任布政使原無幕友嗣䝉皇上天恩畀臣巡撫重任政務殷繁必得一人撿查簿書因有浙江人烏思道係臣素所認識聞伊覓食上蔡臣隨延至臣署實非張球所薦且臣所延之烏思道不過令其查對文移核算錢榖而巳至於機密大事以及進退人材俱係臣親自裁決不但不與之參酌竝不令其與聞查上蔡縣知縣張球臣自到布政使任時即知其人才具操守均有足取前經臣委署光州今又委署陳州詳革陋弊政聲俱優訪之本任與署任內民情俱各愛戴似此賢員通省不過數人臣為國家用人起見所以屢次奏請竝不敢阿私所好顛倒是非如果張球略有招搖恐嚇之事誠如聖諭又非親非友何苦甘被其汚自虧名節即係臣之至親嫡眷臣亦不敢少徇私情不加參劾今臣密訪張球實無藉此招搖恐嚇同官之事其前向邵言綸借銀五百兩臣於糾參邵言綸之時即訪知此事適值張球因公在省面加詰訊據張球禀稱從前與邵令同寅相好暫為通融已經還清因而未經參處臣亦不敢不據實覆奏又查息縣知縣邵言綸不特日耽詩酒抑且止知課孫一切吏治竝皆廢弛固始縣知縣汪諴臣訪知到任三日即乘小轎親拜鹽商借貸銀兩地方一切陋弊竝不革除實非有才有守之員況邵言綸汪諴俱係臣親自訪聞臣因重等小稱未獲恐無憑據密飭南汝道陳世倕親誼該縣督同署光州上蔡縣知縣張球先行查審追出重等小稱竝借錢小摺經南汝道取有確供詳覆事皆確鑿而陳世倕張球始行補揭如謂張球因索借不遂捏款妄揭即不應在臣訪實行查之後矣臣賦性雖愚尚不至毫無覺察況䝉皇上隆恩任大責重凡事慎之又慎詳之又詳豈敢任人指使依樣葫蘆再查鹽商求免掛參許送張球銀八百兩臣細加察訪實屬風影無憑鹽商姓名皆臣先訪得實張球安能摘除但臣細閲摺內指斥張球為市井無賴此人必係進士出身邵言綸汪諴俱係己丑進士或與此人同年亦未可知再查邵言綸汪諴經臣於本年正月二十一日題參果有寃抑此人何不蚤為摺奏而必於本年四月內乘參革信陽州知州黃振國解京質審之時具奏而黃振國亦係己丑進士眀則與邵言綸汪諴辨寃暗則欲擾亂黃振國審案故施其烘雲托日之技以見臣所參各官俱不足憑我皇上眀竝日月無微不照而此人尚敢肆其姦狡巧為攻擊自難逃於聖眀洞鑒之中但屢䝉皇上特頒諭㫖解散朋黨諄切垂誡至再至三若瞻顧同年徇私捏奏竝非出於至公實皆由於私黨伏祈皇上詳察臣思我皇上求賢若渴賞善懲姦況今捐例已停將來科甲自多若此懷私挾詐朋比為姦則嗣後科甲之員萬一貪汚茍且督撫諸臣斷不敢再為題參矣至上蔡縣知縣張球可否容臣繕疏題參解任以與邵言綸汪諴竝黃振國俞汝翼各案伏乞皇上特簡亷眀公正大臣來豫一竝審眀庶邪正不致混淆而臣心亦得以自白矣緣欽奉皇上密諭事理合將虛衷秉公體察情形據實覆奏仰祈聖鑒臣不勝惶悚待罪之至謹奏朕念汝秉性直慤恐過於信人致被姦僞之徒所惑耳今據奏陳邵言綸汪諴等事皆確鑿可憑前言悉出悠悠讒譖之口誠如是張球亦何罪之有自可無庸列彈章也竝據乞請欽差來豫審眀各案以辨别邪正兼白汝心必令水落石出涇渭判然庶幾造言捏奏亂朕耳目之輩知所警惕此意亦是但身為大臣凡事須公聼竝觀不可絲毫袒護倘此案情節不無疑竇則外間物議亦非無因恐將來敗露汝之聲名所係猶小而朕用人當否攸關甚巨汝宜再思若斷然不疑即行具奏朕當遣大臣來豫審眀也同日又奏為據實覆奏仰祈聖鑒事竊臣前奏恭報晴雨一摺欽䝉硃批諭㫖到臣跪讀之下不勝感激涕零慚悚無地伏念臣䝉皇上天恩至深至重凡有關於民生休戚之事無不據實具奏况地方被災關係綦重非惟不敢隱匿實係不能隱匿之事設或黎民阻飢隱而不奏小則流離失所散走四方大則相聚為匪莫可究詰且豫省逼近京畿皇上眀竝日月無微不照而往來欽差又復絡繹不絶一經上聞不特有干國法抑且實招民怨臣雖至愚豈竟不知利害而甘心自陷也兹臣復加細查於雍正三年四月內當二麥告登之時臣因春間雨水稀少誠恐各屬隱匿災傷或捏詞混報隨密委賢員分路確查并飭各該府州據實查報去後惟禹州屬之密縣沙土髙地實止三四分收成其餘低窪地畝俱有五六分收成而知縣莊歆欲妄邀民譽捏稟所屬地方二麥竝無顆粒臣恐前委之員查報不實以致窮簷疾苦無可控告隨另委把總徐瑤密赴該縣四題參又因其係一忠厚書生尚未具文詳報情有可原隨即靣加嚴飭而莊歆亦自知虛妄俯首認過今䝉聖恩垂誡臣亦不敢不將此事據實覆奏又臣覆奏㑹勘水利一摺臣實愚昧無知一時誤書不避嫌怨不務虛名等字又䝉皇上天恩多方訓誡臣惟有恪遵副皇上諄諄垂誡之聖意於靡盡耳又臣具奏恭報雨澤暨桃汛水勢一摺臣伏讀聖諭仰見我皇上睿慮深逺敬慎圖維既厪保赤之懷復抱如傷之念臣職任封疆敢不竭誠仰體敬謹預防至於黃河水勢目今俱已歸槽臣前奏被水貧民亦現在詳察賑恤不致失所再臣伏查豫省所屬地方自四月初十日起至十七日止天氣晴眀於十八日酉戌二時雖復降雷雨旋即晴霽二麥盡皆秀實秋禾雜糧業已布種發生俱各十分茂盛大有可期士農工賈莫不歡呼踴躍咸頌皇上至誠所感自必上契天心近京地方諒己晴霽不致上厪聖懷也所有微臣感激悔過私忱理合繕摺覆奏仰祈睿鑒謹奏覽雍正四年五月十五日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事竊查豫省沿河十四州縣大堤以內灘地被水情形業經臣繕摺奏眀內除滎澤縣查眀竝未被水無庸賑濟外其餘各屬被水輕重不等而大堤以外所種二麥十分豐稔且又䝉皇上隆恩特發帑金將沿河州縣南北兩岸大堤增卑培薄現在興工儧築凡年力精壯之人俱可赴工力作覓取工價糊口臣前令布政司動撥雍正三年耗羡銀三千兩遴委幹員協同該地方官查眀大口照依榖價每名給榖二斗折銀八分小口每名給榖一斗折銀四分內有老弱實在不能傭工之貧民著再量為加賑去後今據各委員報稱查眀大口窮民一萬四千一百四十二口小口窮民六千九百九十一口遵照分别散賑訖共計動賑過銀一千四百一十六兩零餘銀仍繳還司庫歸款外現今乏食貧民均沾實惠俱各得所竝無一夫稍有未獲但臣伏查堤內地畝原屬河灘最為窪下惟秋間髙糧不虞水淹至於所種二麥若春間雨少收割之後河水始長可以加倍豐收如尚未收割一遇水發即被淹沒此亦地處河濵每年伏秋勢所不免况所納錢糧較之堤外地畝科則亦甚減少而有糧灘地合通省計之亦不足百分之一所以歷任撫臣即遇水淹之時不特不敢題報災傷抑且從未賑恤撫藩衙門竝無蠲免緩徵成案今若一經冒昧具題將來小民以此為例略被水患即執詞呼籲期望題請臣愚以為被水百姓既經賑恤較之從前已逾格外即或成災亦止應密飭各州縣將新舊錢糧或暫緩時日酌量催徵似不便恭疏題報以致小民無厭之求也所有查眀被水窮民大小口數暨賑過銀兩數目理合繕摺覆奏仰祈聖鑒謹奏朕但令不隱災耳未令報不應報之災也何用瀆陳如許繁文同日又奏為恭報二麥收成分數以慰聖懷事竊查豫省今嵗二麥總由四月內甘霖普降遂使麥穗秀實竝皆豐收現今通省二麥俱已登場兹據開封彰德衛輝懷慶四府所屬各州縣報稱沙土地畝并工本缺乏人力不齊之地亦有六七分收成至力勤而地畝好者足有九分收成又據歸德河南南陽汝寧四府所屬暨汝鄭陳許禹光陜七州并所屬各州縣報稱收成自八九分起至十分不等臣復詢之老農皆云十餘年內未有如今嵗之豐稔每年四月內亦未有如此透雨所收麥粒亦未有如此肥碩日來新麥入市糧價皆已平減老幼歡欣遐邇胥慶臣前䝉皇上硃批諭㫖此等俗談何必屢書於奏牘欽此欽遵然臣伏思雨暘時若年登大有實賴皇上一人有慶臣職任封疆欣逢嘉㑹不勝歡忭踴躍之至所有豫省今嵗二麥收成分數理合繕摺奏聞謹奏朕為豫民喜兼亦為汝慶幸也切毋髙興肆志更宜加敬加慎以仰承天貺勉之雍正四年五月十九日河南巡撫臣田文鏡謹奏為聖恩浩蕩圖報愈難謹瀝丹誠仰祈睿鑒事竊臣齎摺家人回豫恭捧臣前奏遵㫖據實覆奏一事欽奉硃批諭㫖到臣臣隨反復跪誦不勝鏤心刻骨血淚凝膺伏念臣自愧庸愚仰䝉皇上天恩畀以封疆重寄任事以來毫無寸長報效乃屢因人言嘖嘖以致上厪聖懷臣每自思維無適而可不謂疊荷聖恩有加無已既矜全於格外復教導以多方臣何人斯而仰沐恩慈一至於此惟有夙夜匪懈愈竭公忠以仰報我皇上天髙地厚之隆恩於萬一耳又臣具奏二麥秀實一事欽奉硃批諭㫖直省二麥之豐實屬罕覯今嵗誠可慶幸欽此臣伏讀之下不勝歡欣踴躍因思豫省二麥竝皆十分豐收而直省所屬更係罕遇之年似此時和年豐太平有象是誠仰賴我皇上恩膏普被至誠感孚之所致也理合繕摺覆奏仰祈聖鑒謹奏正值二麥登場之候奈近日隂雨連綿淋漓不止農家礙難曬揚深為可慮雍正四年五月二十九日河南巡撫臣田文鏡謹奏為恭請陛見以伸犬馬私忱事竊臣一介庸愚荷䝉皇上知遇隆恩由侍讀學士畀任藩司擢授巡撫屈指已經三載雖咫尺天威羮牆如見而一種犬馬戀主私忱無能暫解於寤寐况封疆責任事關重大愚昧如臣若不恭請皇上親賜指示豈能措置咸宜前經臣節次奏請未䝉聖恩俞允依戀彌深兹幸今嵗豫省二麥十分豐收民俱樂業奏銷秋審兩案已經完結而南北兩岸大堤又復荷犬馬積年戀主之誠亦得稍展於萬一矣所有微臣感激依戀私忱理合繕摺奏懇天恩伏乞睿鑒謹奏六七兩月正當盛暑之時況伏秋二汛關係甚重豈可擅離地方入覲之行俟十月間再定雍正四年六月十一日河南巡撫臣田文鏡謹奏為恭謝天恩仰祈聖鑒事雍正四年六月初十日據臣家人齎回皇上硃批奏摺到臣臣隨悉心反復跪誦感恩之涕不覺自零伏念臣受恩深重圖報殊切故臣自抵任迄今毋論大小事件莫不小心翼翼凛惕冰淵竝不敢私毫茍且亦不敢任性偏執而一㸃其難其慎秉正無私之血誠不特臣可以自信并可以仰邀聖鑒質之天地者也至於尚氣之處臣屢䝉聖恩諄切訓誡臣敢不痛自刻責竭力悛改惟是臣自幼竝未讀書雖敬謹敷陳而戅直之氣已不覺溢量以仰副我皇上諄諄垂誡之聖意於靡盡耳遵將挾私情節另摺具奏外所有微臣感激私忱謹繕摺奏謝仰祈聖鑒又臣覆奏二麥一事欽奉硃批諭㫖正值二麥登場之候奈近日隂雨連綿淋漓不止農家礙難曬揚深為可慮欽此臣伏讀之下仰見我皇上軫念民生如同保赤而至誠所感自必上契奏并將原摺一併恭繳謹奏覽同日又奏為據實奏聞仰祈聖鑒事竊臣以一介庸材至愚極陋仰䝉皇上特達之知畀以封疆重任兢兢業業凛惕冰淵故凡有關於吏治之事無時無刻莫不留心體察惟以其人之賢否是憑從不分别正異兩途故自抵任迄今經臣保舉者儀封縣升任知縣袁珂等一十九員經臣參革者陳留縣知縣沈銘慎等二十二員其中旗人漢人科甲捐納紛然雜出而臣實未計及其人係何處籍貫何項出身如係才守兼優之員即與臣素有仇隙臣亦不敢不舉豈敢妄參如其人劣蹟昭彰即係臣之至親嫡眷臣亦不敢不參豈敢妄舉然而一㸃犬馬報主之微誠臨事詳慎之苦衷惟賴皇上察臣愚忱而已臣查信陽州知州黃振國狂悖貪劣實出異常臣於雍正三年十一月內訪確題參自摘印之後不但州民稱快而通省亦復帖然毫無異詞突於雍正四年二月內豫省忽造浮言從此各處紛紛傳說或言臣不容讀書之人在豫省做官或言臣欲將黃振國致死滅口如此物論不一而足豫省如此京師可知臣見黃振國姦險狡猾恐其解京質審無人質對捏詞狡辨於訊審之時令其親筆寫供畫押存案內有收吕遜投拜門生一欵臣因參後又訪係拔取案首是實受賄屬虛不敢偏執隨於疏內聲眀其餘各欵竝皆有贓有證事事確實至於報病一節臣於題參祥符縣知縣俞汝翼疏內業經備細叙眀己久在聖眀洞鑒之中矣臣查黃振國係己丑進士竝不料臣於本年正月內所參汝寧府知府張玢固始縣知縣汪諴息縣知縣邵言綸俱係己丑進士在臣實出之無心而伊等同年弟兄一時被劾不無徇私袒護但屢䝉皇上特頒諭㫖解散朋黨至再至三凡為臣子者自應仰體聖懷洗心滌慮一皆出於至公若復瞻顧同年徇私羣起妄議則嗣後科甲之員如有貪汚茍且督撫諸臣斷不敢再為題參矣總之臣賦性甚愚受恩極重心意之間惟知仰皇上一人愛敬之誠亦惟知有皇上一人不但不敢偏執已私抑且不敢絲毫欺誑今忽造此讒謗浮言欲為同年泄忿陷臣負君不公之罪雖臣之聲名所係最小而皇上用人之當與否攸關甚巨伏乞皇上隆恩特簡亷眀公正大臣來豫將黃振國俞汝翼張玢汪諴邵言綸各案一併審眀或容臣將各案官犯卷宗解送赴京敕法司就近質審如臣有私毫懷私偏抑乞治臣重罪以警不公庶邪正不致混淆而臣心亦得以自白矣所有挾私造言情節臣不敢不繕摺奏聞伏乞皇上睿鑒施行謹奏田文鏡此奏是浮言嘖嘖朕亦聞之此風何可滋長著侍即海夀史貽直前往河南將黃振國等各案逐一覆審具奏同日又奏為恭報秋禾暢茂情形以慰聖懷事竊查豫省所屬各地方自本年四月內甘霖大沛之後不時間有雨澤所種髙糧蚤榖蚤黍以及棉花芝麻等物竝皆十分暢茂其麥後所種晚禾亦俱各青葱遍野大有可期現今通省各州縣市中糧食日益充盈婦子恬熙民皆樂業臣職任封疆不勝歡欣踴躍所有豫省秋禾暢茂情形理合繕摺奏聞仰祈聖鑒謹奏誠屬可喜可慶之事深慰朕懷更宜加勉吏治以敬迓天庥同日又奏為據實覆奏仰祈聖鑒事雍正四年六月初九日據臣家人齎回皇上硃批奏摺到臣臣跪讀之下仰見我皇上敬天愛民無時不厪諸睿念而謭劣如臣又復荷聖恩諄切垂誡眀白指示臣不勝慚悚感激涕泗交零惟有諸事竭誠仰體小心敬慎念兹在兹愈切冰淵以仰報我皇上髙厚隆恩於萬一耳再臣伏查豫省今嵗二麥曽有數處送到兩岐者祗因各屬不諳盡將麥本掐去僅存麥穗誠恐難免不敬之罪是以未敢冒昧恭進此係臣一時疏忽不能預為曉諭所致咎實難辭伏乞皇上俯賜鑒宥臣無任悚惕之至所有微臣未敢恭進瑞麥緣由理合繕摺具奏仰祈聖鑒謹奏知道了雍正四年六月二十一日河南巡撫臣田文鏡謹奏為遵㫖密奏仰祈聖鑒事竊查社倉一事臣前在布政使任內時即仰體皇上念切民依之聖懷勸諭所屬各州縣設立社倉勸民量力捐輸并公舉社長以司出入嗣䝉皇上天恩畀以巡撫重任臣復欽遵諭㫖見有好府州縣各官暗暗勸諭令其實力奉行毋得強勒擾害所有雍正二年勸捐榖石業經臣繕摺奏聞兹據布政使費金吾詳稱查據開封等八府所屬暨陳許等七州竝所屬各州縣彚禀雍正元年分共勸捐榖三千七百六十二石零雍正二年分共勸捐榖五萬三百二十五石零雍正三年分共勸捐小麥七十九石零粟榖五萬四千六百一十九石零又贏餘榖四十六石零出借加息榖九百三十四石零以上三年共本息勸捐麥榖十萬九千七百六十七石零分立社倉七百九十八座臣復密訪各屬或自行倡捐或聼民樂輸俱係社長董司其事竝無擾害強勒之處至將來秋收另有勸捐榖石臣再按年另摺奏聞外遵將各屬實在捐貯榖石竝設立社倉數目分析年分一併繕摺密奏伏乞皇上睿鑒謹奏據奏社倉粟榖已積有十萬餘石殊屬可嘉此事甚不易為爾以何術鼓舞勸導遂肯聼從樂輸至於如是實為他省所罕聞但從前楊宗仁行之楚地雖已稍有頭緒而頗著強迫之名朕隨經嚴加飭諭矣爾其勉力善為之萬勿因䝉褒奬反致稍涉逼勒形迹同日又奏為恭報雨澤併秋禾暢茂情形以慰聖懷事竊查豫省所屬各地方自本年四月內甘霖普降二麥登場之後迄今雨晹時若民安物阜兹據開封等八府暨陳許等七州併所屬各州縣陸續報稱五月內不時間有時雨足資種值又自六月初四初五初七初九十二十四十五十六十八十九二十等日或通省同日得雨或數處獨沛甘霖四野均沾入土透足現今髙糧蚤榖蚤黍以及花豆芝麻等物盡皆吐秀其餘晚榖晚黍亦俱各十分暢茂大有可期民情胥悅此誠仰䝉我皇上愛養黎元上格穹蒼之所致也臣職任封疆不勝歡欣凜惕所有豫省得雨日期竝秋禾暢茂情形理合繕摺具奏仰祈聖鑒謹奏禾稼雖云暢茂未届秋成何敢言喜如二麥之己登則朕懷欣幸筆不能罄也同日又奏為恭謝天恩仰祈聖鑒事竊臣前奏恭請陛見一摺欽奉硃批諭㫖六七兩月正當盛暑之時況伏秋二汛關係甚重豈可擅離地方入覲之行俟十月間再定欽此臣跪誦溫綸仰見我皇上睿慮周詳無微不至但臣何人斯而仰沐聖主垂憐一至於此似此浩蕩隆恩臣即捐糜頂踵亦難圖報涓埃豈敢因時當盛暑稍萌自逸之念況臣由布政使至巡撫屈指已經三載而一種犬馬戀主之誠實無能暫解於寤寐今既奉有伏秋二汛關係甚重之聖諭臣敢不愈加小心竭力防護伏乞皇上𢎞慈容臣於十月內武闈事竣再為繕疏奏請恩賜俞允則感荷聖恩臣益矢之生生世世矣所有微臣感激私忱理合繕摺奏謝伏祈聖鑒謹奏臨期奏請候朕裁酌凡事不必預定雍正四年七月初九日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事雍正四年六月二十八日據臣家人齎回臣恭報秋禾一摺欽奉硃批諭㫖誠屬可喜可慶之事深慰朕懷更宜加勉吏治以敬迓天庥欽此臣伏讀之下仰見我皇上愛養黎元有加無已而至誠所感自足上契天心所以直省地方旋即晴霽二麥不甚減收秋禾亦十分茂盛從此五風十雨四海九州嵗嵗必多竒異嘉苖以昭聖主之仁以彰盛世之瑞也兹臣伏查豫省秋禾自連得雨澤之後於雍正四年七月初一日復沛甘霖四野流膏無逺弗届所種早榖早黍以及髙糧棉花等物竝皆秀實旬日之內可以盡獲豐收其餘晚榖晚黍亦無不十分暢茂大有可期羣黎歡忭婦子恬熙臣職任封疆恭逢嘉㑹敢不夙夜黽勉敬迓天庥以慰聖懷謹此繕摺覆奏仰祈睿鑒謹奏朕之秉性於未來事從不敢預先期必惟恆持誠敬二字靜聼天命覽此等奏惟以手加額仰空祗肅而已即欣幸之念亦未嘗輕萌也爾等封疆大臣當默識朕意同日又奏為恭報伏汛水勢平穩情形以慰聖懷事竊查豫省黃河水勢前據陜西署寧夏府事水利同知王佩璁報稱雍正四年六月初四日黃河水長二尺臣隨嚴飭道㕔印汛各官率領兵夫住宿堤上加意防護幸保無虞今查自本年六月初一日起至七月初九日止共長水自二三寸起至二尺一二寸不等除長落相抵外現今已届立秋水勢有消無長一切堤岸工程俱各平穩理合繕摺奏聞再臣查南北兩岸增卑培薄堤工經副河臣嵇曽筠同臣節次嚴催勒限上緊堅築竝遴委標員不時查催現今共計做過工程已足八分之數其餘未完二分的於秋汛前後均可一律告竣誠恐上厪聖懷合併奏聞謹奏覽奏水勢平穩情形朕懷深慰秋汛尤屬緊要務須加謹防護以保無虞雍正四年七月十九日河南巡撫臣田文鏡謹奏為捏傳諭㫖鼓惑聼聞不敢不奏仰祈聖鑒事竊查信陽州參革知州黃振國狂悖貪劣實異尋常臣訪聞既確於雍正三年十一月據實糾參欽奉皇上諭㫖令臣解部質審不謂竟有大膽姦徒捏造諭㫖一道在汝寧府所屬地方傳播惑衆臣於雍正四年四月內即有風聞或云傳自汝寧府郡城或云出自汝寧府城內武職衙門臣因事無確據且未得見一紙不知所造是何浮言不敢冒昧入告時值汝南道陳世倕在省署理按察使印務臣隨飭令密查確訪務將捏造之言鈔録具報去後今據陳世倕呈據署汝寧府知府馬騆申據信陽州吏目管朝翰申稱聞得本州訓導宋鑣處有鈔傳一紙隨差役取來鈔録呈送其宋鑣不知何處鈔傳須問宋鑣便知等情轉報到臣臣接閲之下不勝驚駭因伏思我皇上眀竝日月無微不照無逺不周如臣所參黃振國以及張玢等各案果有誣枉難欺聖眀洞鑒皇上即當治臣以莫大之罪豈止諭㫖嚴飭乃敢預造浮言轉相傳播惑亂聼聞所關甚大臣雖不知此鈔出自何人若再從宋鑣名下逐一究追當有著落臣因事關捏造諭㫖不敢冒昧亦不敢不據實密奏除將鈔傳恭繕進呈御覽外理合具摺奏聞伏乞睿鑒施行謹奏海夀史貽直將此摺帶赴豫省一併嚴查審擬具奏雍正四年七月二十二日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事雍正四年七月初十日據臣家人齎回臣恭報雨澤併秋禾暢茂一摺欽奉硃批諭㫖到臣臣伏讀之下仰見我皇上聖德崇謙睿慮周詳無微不至無逺勿届然而至誠所感天和自必立應兹臣伏查豫省所屬各地方自雍正四年四月內至七月初一日止甘霖疊沛稼穡繁興今又據各屬陸續報稱於本年七月初二初八初九十一十四十五十六十七等日復得時雨四野均沾現今早禾己經收穫晚禾亦皆十分暢茂豐年可期臣俟秋成後查眀分數再為繕摺奏聞再豫省今嵗伏汛業經臣繕摺奏眀今復查自七月初一日立秋起至十六日止黃沁二水每日所長不過數寸暨一尺有餘即於十七日漸次退落現今各處共長水四五尺不等一切工程俱各平穩倘䝉皇上福庇秋汛一如伏汛則沿河士民可以各安衽席共樂升平矣所有秋汛水勢情形合併具奏以慰聖懷謹奏覽奏早晚禾稼豐茂工程平穩各情形深為慰悅但朕心意之間只覺今嵗秋汛似有可虞目下正當水勢長落不定之際汝與嵇曽筠其協力同心謹防毋忽同日又奏為據實奏眀仰祈聖鑒事竊臣伏查信陽州參革知州李廷基揭報唐縣參革知縣關敶行賄一案臣於雍正二年六月內在布政使任時委李廷基盤南陽府倉庫錢糧關敶因該縣有官隱墾地五百七十餘頃未經造報不敢將地畝底冊送出查核完缺於雍正二年六月二十六日餽銀三百兩求免概不清查李廷基即於本日連餽銀印信手本并銀三百兩禀首到臣又具文通報䝉前撫臣石文焯批司確查臣即檄令南陽府㑹同汝寧府確查詳報去後關敶自知餽銀情罪不敢置辨一詞嗣據南陽府知府何煜詳揭到臣臣查豫省隱地己䝉皇上格外加恩寬其已往俱令造報當年升科而關敶所隱地畝於詳揭後未經參革之前亦即造冊報眀若再將隱地一併詳參誠恐枝牽蔓引難以歸結所以止據現首之銀兩并南陽府知府何煜詳揭虧黴行賄繕疏題參嗣因學臣王國棟到豫傳奉聖諭令臣據實直奏臣遵將關敶行賄實情據實奏眀荷䝉皇上天恩將臣奏摺特命廷臣閲看後經臣審眀具題復將其中前後情節繕摺具奏仰䝉硃批諭㫖應如是辦理其中情節已悉欽此嗣奉部駁又經臣於審題之時繕摺具奏欽奉聖諭內外朕視為一體惟理是從但須秉公審斷反覆究詰其理愈眀部駁亦復何害所奏知道了欽此臣跪讀之下仰見我皇上至聖至眀至公至當臣敢不恪遵聖諭秉公辦理今復奉部駁關敶既無虧黴又無送冊不全何肯餽送銀兩眀係李廷基向鄭之傑說眀求索以致關敶餽送銀兩後因關敶要詳報停徵李廷基心虛始行出首承審各官竝不審出實情徇情開脫行臣另委賢員務將實情審出一併妥擬等因到臣臣查事之虛實全憑確證關敶行賄原為隱地今部臣因未經參出輾轉駁查而李廷基之求索竝無確據似難懸擬但此案已經臣三次具題臣伏查定例內開若駁至第三次該督撫不酌量情罪改正將承審各官該督撫一併交與該部議處等語所有關敶行賄隱情業經臣節次奏眀已久在聖眀洞鑒之中矣今若因部臣屢次駁詰欲避固執原題之處分迎合更改臣即辜負聖恩罪何可逭所以臣寧甘例議竝不敢私毫欺隱自干重處除將李廷基擬以不應關敶仍照原擬恭疏具題外不得不將前後實情再為覆奏仰祈聖鑒謹奏關敶行賄一案業經徹底眀悉何用更為重絮即無此奏於該部議覆時朕亦自有酌奪雍正四年七月二十六日河南巡撫臣田文鏡謹奏為據實奏眀仰祈聖鑒事竊臣荷䝉皇上天恩簡畀豫撫以來兢業凛惕從無一事敢於茍且亦無一字敢於欺隱故前參信陽州知州黃振國等各案臣敢於繕摺具奏仰懇聖恩欽差部臣來豫質審兹臣伏查上蔡縣知縣張球前因息縣參革知縣邵言綸借銀五百兩臣先聞知此事適張球因公在省臣隨靣加詰訊據張球稟稱從前與邵令同寅相好暫時通融已經還清因而未經糾參嗣奉聖諭令臣秉公體察臣查張球借銀還銀是實竝無藉此招搖恐嚇同官之事隨一靣繕摺據實覆奏至於應否題參恭請聖諭䝉皇上硃批諭㫖誠如是張球亦何罪之有自無庸列之彈章也欽此臣受恩深重固不敢仰欺皇上亦不肯為屬員所欺臣因張球一靣之詞未敢遽信復密令南汝道陳世倕嚴行確查嗣據陳世倕將張球掣回借劵併邵言綸收銀收票送驗臣猶疑為張球假捏復令陳世倕將此劵票令邵言綸驗看是否假捏如未還清即親筆注眀以憑題參去後陳世倕因署司篆在省轉飭西平縣知縣王鐄執持劵票令邵言綸親看據邵言綸稱係還清竝非張球假捏即注眀還訖字樣將原劵票申送陳世倕轉送到臣驗眀臣始信以為實復將張球嚴加飭責令其改過自新暫免題參在案今邵言綸汪諴等因張球别無招搖恐嚇之事可以為辭惟有借銀一節是確執為口實見皇上欽差部臣到豫覆審不知張球借銀一事臣已經奏眀意臣必有所徇隱不敢題參且妄揣皇上疑臣所參各官俱不足憑因而欽差部臣來豫質審以為伊等報復之地故於布按二司㑹審參案之時恣意牽混竝非與張球為仇而實則與臣為難更可駭者將臣飭令南汝道轉飭行查之西平縣指為證佐欲將張球之還銀掣票坐為臣所主使意在挾制陷臣以重罪是不特邵言綸得以報復而黃振國等各案從此均得擾亂矣總之伊等科目中人聲氣相通不比泛常不但被參諸員聨為一黨而從旁袒救者亦不乏人竟視張球借銀一事為竒貨可居視臣之不參張球為徇私曲庇必欲臣參張球以快其私并欲皇上治臣以罪以泄其憤臣查張球雖欽奉皇上有無庸列之彈章之諭㫖但臣當此黨惡錮結之時臣實處有不得不參不敢不參之勢非臣敢於故違諭㫖也今既據兩司録取邵言綸供詞詳揭到臣若不將張球題參革職反若臣實有所私實有所庇而外間之物議風生終無底止矣除將上蔡縣知縣張球繕疏題參外伏乞皇上天恩將張球敕發欽差部臣一併審眀庶臣心得以自白而一切浮言亦均可少戢如果臣有絲毫徇隱併乞皇上從重治臣之罪以為欺君罔上者戒為此謹奏既據邵言綸供出張球理應參革併案發審質訊之下曲直自眀朕非不容人辨白之主也清者清而濁者濁涇渭終豈混淆差來二臣可保其公假若稍涉遍徇乃自招罪譴耳於事何損同日又奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣恭報伏汛水勢平穩一摺欽奉硃批諭㫖覽奏水勢平穩情形朕懷深慰秋汛尤屬緊要務須加謹防護以保無虞欽此仰見我皇上軫念河防勤求備至臣敢不凛遵聖諭時刻留心加謹防護兹臣伏查黃河水勢自入秋汛以來安瀾循軌一切堤工俱各平隱至於增卑培薄工程亦已將次告竣又臣於本年四月內飭令管河同知將節年河泓刷深若干尺寸逐一據實確查分析稟覆去後今據開封府上南河同知禀稱所屬鄭州滎澤中牟三州縣河泓自雍正二年起至雍正四年六月內止刷深二三尺及四尺不等又據開封府下南河同知禀稱所屬祥符陳留蘭陽儀封四縣河泓自雍正二年起至雍正四年六月內止刷深二三尺及八九尺不等又據開封府署上北河同知禀稱所屬原武陽武封邱三縣河泓自雍正二年起至雍正四年六月內止刷深四五尺及八九尺一丈不等又據懷慶黃河同知禀稱所屬武陟縣趙莊壩下至滎澤縣交界河泓自雍正二年起至雍正四年六月內止共刷深五六尺不等又據歸德府河務通判禀稱所屬考城商邱虞城三縣河泓自雍正二年起至雍正四年六月內止刷深二三尺及六七尺不等臣查現在河身漸次刷深則河靣漸次收窄將來由窄而更刷深則崖岸日髙水由地中自可永保安瀾矣所有河泓刷深情形合併奏聞以慰聖懷為此謹奏覽河流順軌中泓漸次刷深情形實慰朕懷想因聞朕諭問嵇曽筠故有此奏也甚屬可嘉今嵗夏秋之交雨少水平幸獲安瀾之慶至深秋時有無霪潦殊未可定加意預防最為緊要毋忽毋忽硃批諭㫖卷一百二十六之七欽定四庫全書硃批諭㫖卷一百二十六之八硃批田文鏡奏摺雍正四年九月初一日河南巡撫臣田文鏡謹奏為恭謝天恩仰祈聖鑒事雍正四年八月初七日臣齎摺家人回豫恭捧皇上欽賜荔枝一瓶到臣臣因入闈監臨隨跪迎至公所敬設香案望闕叩頭謝恩祇領訖欽惟我皇上量若乾坤仁同雨露南方修職貢一物而恆厪天懷北闕溥恩膏三年而疊沾甘液香浮銀甕盈盈赤膽披霞色潤瑛盤灼灼丹心向日臣欽承恩賞感激靡涯惟有夙夜兢惕竭盡駑駘自始至終不移不易以仰副我皇上高厚隆恩於萬一耳所有微臣感激私忱理合繕摺奏謝謹奏初志固當不移不易然人砥礪心行所貴美愈求美精益求精豈可削竹為鵲而遂自視為極則耶同日又奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣具奏河泓刷深一摺欽奉硃批諭㫖到臣臣伏讀之下仰見我皇上軫念河防深通周悉之至意伏念豫省所屬地方雖自夏徂秋仰䝉皇上誠敬感孚雨𤾉時若然而天時難定汛水靡常臣於本年八月初五日據陜西寧夏府知府卜瑗申報黃河長水四尺餘寸臣隨飛飭道㕔印汛各官嚴加防護幸今水勢己過工程平穩若入深秋誠如聖諭加意預防最為緊要臣惟有敬謹竭力防範務保無虞以仰副我皇上諄切垂誡之聖意於靡盡耳又臣伏查河泓刷深尺寸臣自䝉皇上天恩簡畀巡撫以來事無大小莫不時刻留心細加察訪因思河身關係重大臣實於本年四月內即靣飭各河同知令其逐段確查據實禀覆但自西至東計長千有餘里直至七月初旬始據各河同知陸續禀覆臣既查丈眀確敢不據實奏聞上慰寸開單移知臣隨將尺寸數目列單封送今䝉聖諭臣不敢不將確情據實覆奏仰祈聖鑒謹奏覽同日又奏為據實覆奏仰祈聖鑒事竊臣齎摺家人回豫恭捧皇上硃批條奏少室山一事欽奉諭㫖知縣馬朴條奏此一事可與鎮臣商酌定議奏聞欽此臣跪讀之下仰見我皇上睿慮周詳無微不照無逺勿届但臣身任封疆凡通省所屬地方雖不能親厯其地然自抵任迄今查有山川險要之處莫不時刻留心細加察訪兹臣伏查登封縣所屬之少室山地方雖則遼濶因內有少林寺僧人居住從無匪類敢於潛藏今應否將登封縣原設把總移住巡查并登封縣地方作何兼防之處臣已知㑹河北鎮臣紀成斌現在㑹同逐細商酌一俟議定之日臣等再為據實奏聞又臣恭報秋汛水勢平穩一事欽奉硃批諭㫖臣因現在入闈不敢違例輕用墨筆繕摺覆奏隨一靣將奉到硃批諭㫖敬録轉送副河臣嵇曽筠將汛水平穩情形預為奏聞以慰宸衷仍一靣協力加謹防護并通飭道㕔印信各官住宿工所無分晝夜嚴加防範幸今霜降已届一切工程俱各平穩可無上厪聖懷又臣覆奏唐縣參革知縣關敶行賄一案欽奉聖諭臣跪誦溫綸仰見我皇上至聖至眀至公至當臣惟有愈竭丹誠矢諸白日以仰副我皇上知遇之隆恩於萬一耳理合繕摺覆奏伏祈聖鑒謹奏所奏各項情節知道了張球之事何如朕早知其非端人矣今種種欺隱俱已敗露服朕之眀鑒否從前查勘河道之欽差聞爾一無所贈殊覺禮儀少缺今鞫獄大臣在豫俟其諸案審畢當各盡地主之誼辭受與否聼彼自為耳雍正四年九月初三日河南巡撫臣田文鏡謹奏為恭報秋成分數暨秋汛水勢情形上慰聖懷事竊查豫省秋成據開封等八府所屬暨汝陳等七州并所屬各州縣陸續報稱今嵗秋禾竝皆十分豐收即沙土瘠地以及人力不齊之處亦有七八分收成所種芝麻棉花雜糧等物盡獲豐收竝無一物減少至於通省所屬地方據各屬報稱又於本年八月十六十九二十二十四二十五二十六二十八等日疊沛甘霖四野均沾地土滋潤不但蕎麥黑豆足資茂實即來嵗二麥亦可乘時布種黃童白叟莫不歡呼踴躍感頌皇仁羣歌聖德臣職任封疆不勝歡欣凛惕再查秋汛水勢自交白露以後日漸退縮今據各河員報稱本年八月二十六日黃水復長四尺五寸幸而水即消落兩岸工程俱各平穩臣不勝感激奮發益仰見我皇上眀竝日月無微不照臣惟有愈加勉勵小心敬謹協力防護不敢片刻稍懈以仰副皇上諄切垂誡之聖意於萬一耳所有豫省秋成分數暨秋汛水勢平穩情形理合繕摺具奏仰祈聖鑒謹奏朕實為豫省感激天地神眀不盡自亦以手加額慶幸而復倍增敬凛也同日又奏為道員懷私挾嫌一計兩害以圖報復仰祈睿鑒事竊臣自䝉皇上殊恩簡畀巡撫以來兢兢業業凡於審理重案出入攸關必求確實證據方敢定擬爰書從未敢草率從事至若盜案處分綦嚴屬員必多諱匿欲令有則必報是以委曲設法勸誘臣查豫省竊案從前俱不通報亦不上緊緝賊追贓自臣身任巡撫之後嚴檄飭行令各屬通報以便飭催勒緝務獲確賊究追又恐各員疑畏仍然隱諱每於因公進見之時諄諄示以將各員本任內凡有強竊盜案准其自行補報許令自新暫免參處并經檄飭在案此臣一㸃事求必濟之愚衷整飭吏治之苦心惟有皇上俯賜鑒察知之必深亦惟有皇上聖眀之前可以直陳無隱詎意有管河道佟鎮自調任河道以來於河庫錢糧希圖染指將未經奉部覆准之案先請撥司庫銀兩歸欵意欲從中開銷經臣屢次駁查嚴加申飭庶彼貪心不敢遽萌臣在豫一日則彼礙臣一日故急欲去臣者一也南汝道陳世倕曽在河道任內半年有餘諸弊盡悉臣之稽查何項錢糧必深中病根彼疑為南汝道所告故急欲去南汝道以去臣者一也按察使沈廷正升任缺出原應布政使署理藩司費金吾以事繁不能兼攝向臣靣懇又以河道管理全河正值汛水長發之時往來堤上不便再令署理臬惟南汝道事務稍簡詳請委署此正臣與費金吾調劑苦心而彼以臣不令其署理按察使印務痛恨臣而并及陳世倕以圖報復者又其一也因乘欽差大臣來豫審事彼以為此係臣多事之秋又值臣入闈監臨不及繕摺奏辨故尋一二事徑揭部院有意擾亂搖動各案名則揭報署司陳世倕而實則中傷及臣一計兩害巧莫巧於此險莫險於此也佟鎮所揭兩案臣敢為皇上詳晰敬陳之修武縣參革知縣鄒權虧空一案經前撫臣石文焯題參臣審擬侵欺律斬具題部覆奉㫖依擬應斬監候在案兹值雍正四年秋審豫省向例秋審雖列兩司各道銜名而實係按察司專政主稿送臣衙門審題佟鎮因係管河道員以為凡因河工虧空者不應擬以侵欺欲留日後虧空河帑地步不知凡審虧空案件分别侵那全憑有案無案從前曽詳眀上司存有冊卷者即係别項動用有案可據應問那移如未曽詳報又無冊卷者雖係河工動用眀係捏飾應問侵欺此一定之例也況虧空人犯與各案絞斬人犯不同各案絞斬人犯秋審時應分别其情之重輕填注情實緩决可矜字樣至於虧空人犯定有年限限內全完者減等發落逾限不完者方將本犯正法家屬著追鄒權一案承追未滿一年惟有填注緩决具題而佟鎮欲翻題定之案開脫虧空之員自留地步故意掯難不肯畫行嗣據陳世倕禀稱靣將鄒權虧空係題定奉㫖人犯不便輕減委婉向佟鎮陳說欲其畫行而佟鎮曽言鄂倫岱係伊近房之叔今遭寃抑不知將來如何牽纍有何心緒辦理此案等語隨即托避赴堤查工去訖陳世倕復查往年秋審舊案而列銜之道員亦有竟不畫行者即將鄒權一犯解臣臣飛檄調回佟鎮公同㑹審而佟鎮呈報查工緊急不能回省現有佟鎮驗文可據臣與兩司各道㑹審詳慎具題之案何得徇私開脫反以陳世倕為兒戲人命此其挾嫌混揭者一也再光州監生阮沖衢家於雍正三年正月二十七日被竊署州事上蔡縣知縣張球未曽通報經臣以從前未報強竊之案飭令補報如係強劫准於疏防疏內聲眀如係竊賊飭令緝賊追贓結案通行勸誘而張球於雍正四年四月內因公赴省將此案是竊非強遵飭禀臣臣即令其補報據張球復禀此案於雍正三年正月二十八日據失主報官原即具有通報院司道文書三角因查係竊案從前俱不通報故爾停止今原文現存但職久離署任印信交出無憑補報臣因係竊案即令其將原存報文補報到臣臣隨批司飭查竝非倒提年月後一靣行知光州此臣一片引誘屬員報盜不諱之苦心故爾委曲行查惟求各屬信臣之言敢於補報庶於地方公事無誤若張球果犯應參之條有斷難姑容之事臣與張球何親何眷不即題參反收報文存案又敢將詳文批司行查併知照光州愚不至此此其挾嫌混揭者二也總之佟鎮之圖謀害臣其處心積慮已久因臣無隙可乘特尋陳世倕署司任內之事乘機鼓簧一欲剪除陳世倕以去臣之耳目一欲株連及臣以快其私心以彼所揭報之二案視為臣之罪孽無過於此而不知臣之委曲苦衷實無不可跪陳於皇上之前伏乞皇上憐臣愚昧念臣孤立即賜罷黜並敕部嚴加議處又於雍正四年八月十四日臣在闈中接准刑部咨奉㫖著巡撫田文鏡㑹同侍即海夀史貽直審眀具奏欽此臣跪讀之下不勝感激涕零臣被佟鎮挾揭本應斥革聼候質審乃䝉皇上天恩令臣㑹同審眀臣何人斯被此髙厚之恩如天如地臣惟有矢公矢慎益竭犬馬微誠以圖報於萬一耳臣因在闈監臨具奏稍遲合併聲眀謹奏佟鎮此舉朕實不悅況所揭二事又非異常干犯法紀類斯謬誤何處無之遂乃如是小題大作但此時且不必眀露意㫖己令史貽直等來豫遵㫖秉公審理朕觀佟鎮似有懷私傾陷之意也今閲爾奏朕甚嘉之隨已有㫖諭部此等刁風豈可使其滋長當嚴懲示警管河道一缺爾意中有稱職之人否密奏以聞雍正四年九月初四日河南巡撫臣田文鏡謹奏為學臣三年任滿多士懇請復留謹據實奏聞仰祈聖鑒事竊查學臣王國棟自奉差河南學政迄今已經三載凡所考試生童由文及武務期拔取之公自始至終毫無茍且之事抑且刻苦辛勤留心講貫行優者舉敗檢者黜寬嚴並用悉秉至公或感生於知遇或願切於栽培多士歡騰文風丕變此皆學臣王國棟之實政而臣見聞之最確者也今據闔屬士子感頌皇上知人善任之聖意環繞臣署具詞懇留復據布按二司詳請代題復留三載臣查學臣王國棟已奉㫖補授光祿寺卿臣何敢冒昧題留且經王國棟靣與臣言三年刻苦無非圖報聖恩實無善政足當題留之實再三力辭但臣細察輿情極其懇切臣實不敢壅於上聞伏乞皇上睿鑒謹奏似此請留者不一其人候朕再加斟酌從來士為四民之首士風丕變較民俗還淳奏效尤難要須德化感孚非刑政所能驅迫者果若是耶則王國棟之督學可謂盡善矣同日又奏為聖恩髙厚靡極微臣感慚無地伏乞皇上立賜罷黜嚴加究治以彰不職事竊查上蔡縣參革知縣張球臣未到豫之時不但與伊向未謀靣并其父兄從無一人認識即臣到豫以後不但不敢受伊勺水之私亦竝無一人向臣囑託如臣與張球稍有私心不但不可以仰對皇上併不可以自對衾影惟因其人年力精壯頗有聲名厯試以事俱能辦理因而節次題請臣實悉秉至公憐才起見詎張球於前署光州任內曽借參革息縣知縣邵言綸銀五百兩臣於雍正四年正月內訪聞此事適張球因公赴省隨靣加詰訊而張球堅稱已還臣猶不敢遽信其言必欲以邵言綸收字為據又於四月內令南汝道陳世倕密查取有原借約并收字呈驗臣尚恐非邵言綸親筆復令陳世倕再加確查陳世倕因署司篆在省轉委西平縣解任知縣王鐄問據邵言綸亦回稱銀兩己經還清是實隨於約上親寫還訖字樣呈驗臣始信以為實嚴將張球申飭勉令改過自新不即題參不意臣於九月初一日出闈後聞知欽差所審黃振國等各案俱與臣原參情節相符惟張球借邵言綸銀兩一案經欽差大臣欲行夾審張球隨供尚未清還不勝驚惕臣被其欺皆因臣愚所致而臣從前即敢據其欺誑之言跪奏於皇上之前是臣之大罪一也似此劣員臣不即行參處罪已莫逭而又敢據情屢奏愚昧無知被其所欺是臣之大罪二也臣罪至此萬死有餘伏查張球向邵言綸借銀臣之參與不參只在還與不還之間臣經具奏久䝉聖眀洞鑒乃臣費盡苦心多方查察終被張球所欺直至欽差嚴審而後覺則臣之昏愚己甚臣即䝉皇上天恩涵宥不即罷黜而臣犬馬微忱自知羞愧無地尚敢再任封疆之重以自深其罪戾諺所謂一著不到滿盤皆空即臣今日之謂也伏乞皇上立賜罷黜將臣嚴加治罪以為不職欺君者戒庶臣心稍可自安而皇上封疆重任不致貽誤矣除案內情節統俟欽差大臣覆奏之後臣再恭疏具題請㫖將臣罷黜治罪外所有微臣慚愧無地神魂悚惕私忱合先繕摺具奏仰祈聖鑒謹奏將朕日前批諭竝汝回奏試反覆細觀今日之慚非自有以取之乎人固難知然以不逆詐勿偏聼二語處之亦何致被所誑惑終迷不悟用人妙術即在於此所可寬恕者猶屬無心之過不及之愆迥與懷私欺罔不侔況汝前將張球之堅詞狡辨及汝再三察詰情節曽經厯叙分眀復何罪之有但乏燭姦之智失馭下之道耳此等人此等事閲厯一番亦未嘗無益何也看透世情識見不期其增而日益增矣雍正四年九月二十一日河南巡撫臣田文鏡謹奏為恭謝天恩仰祈聖鑒事雍正四年九月十八日奉欽差侍即海夀史貽直知㑹奉到皇上欽賜臣等風羊荔枝臣隨公同出郊跪迎至公所敬設香案望闕叩頭恭謝天恩祗領訖伏念臣奉職無狀正當待罪之時乃荷珍竒之賜在通省臣民驚為異數而臣於深切憂危之日仰邀聖眷之隆更恨臣之駑劣不能進圖犬馬之報豈惟此生此世圖報靡涯即極之生生世世又豈能仰報於萬一也臣惟有銘諸寸衷竭盡血誠而已所有微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏此等恩寵皆汝平日勤勞奉公之效朕之一切賞罰本出無心皆任諸臣自取栽者培之傾者覆之乃天道也朕豈敢違同日又奏為遵㫖據實覆奏仰祈聖鑒事竊臣齎摺家人回豫捧到皇上硃批霍邱縣知縣陳守仁條奏上蔡縣水利一事欽奉諭㫖有人條奏此一事應行與否可徐徐詳查議奏欽此臣伏查豫省所屬各地方如汝寧府屬之汝陽上蔡新蔡遂平西平陳州屬之項城等縣最為窪下而上蔡一邑實居遂平西平之下流而又在汝陽項城新蔡之上從前各縣凡低窪之處一遇久雨水積便成巨浸以致地多荒廢農民失所康熙二十八九年間前任上蔡縣知縣楊廷望相度地勢率民疏濬并詳請通飭鄰邑同時開穵使各邑之水由溝直逹汝淮兩河地皆涸出變為沃壤數十年來逃荒之民盡皆復業是以紳襟百姓皆知開穵溝渠為此方之急務每於農隙之時即呈請疏濬雖土沙鬆浮風吹雨積易致游淺然不時挑穵自可通流故汝寧一府連嵗豐收竝無水患臣自蒞任之始即於飭行水利事案內嚴飭各屬凡有溝渠阻塞之處令其合力疏濬務使淺者深之狹者廣之嗣據各該縣陸續詳報俱各修通水勢暢流竝無壅阻今䝉聖諭周詳臣惟有再飭各屬於每年冬月農工已畢之時即董率近溝百姓協力疏濬深通不致浮沙壅積以仰副我皇上軫念民生之聖意於靡盡耳緣欽奉聖諭詳查議奏事理合將該縣水溝已經修通情節繕摺覆奏伏乞聖鑒謹奏溝洫最為要務必使通流無阻方與隴畝有濟如民力有所未逮則官為疏濬百姓足君孰與不足應動正項錢糧募工興舉其計度周詳先密奏以聞候朕裁定凡屬一勞永逸之事勿惜目前小費或在可行可止之間者切須審察妥確若實無益於地方而徒為宵小營利之舉則不可也同日又奏為聖恩益隆臣罪愈重謹據實覆奏仰祈聖鑒事竊臣齎摺家人回豫捧到皇上硃批諭㫖張球之事何如朕早知其非端人矣今種種欺隱俱已敗露服朕之眀鑒否欽此臣跪讀之下不勝汗流浹背無地自容伏惟我皇上德備乾坤眀竝日月自御極以來念切民依勵精圖治雖極四海之遙臣民之衆無一事不鑒照於機先無一人不洞察其微隱是皇上之聰眀睿智由於天縱而又加以聖德之純備聖學之淵深即千古聖君哲后實難嫓美於萬一者也臣之欽服乎皇上非自今日為然臣之輸誠於寸衷亦非由今日而始惟是臣以一介庸愚仰沐皇上特達之知畀以巡撫重任復荷聖恩諄切教導多方訓誡臣感激知遇隆恩無時無刻不思凛惕冰淵黽勉學習以圖報效無如臣質本下愚才實駑劣勉亦無益學亦不能如上蔡縣革職知縣張球臣實費盡苦心詳加皇上竝無顔以盟幽獨故於本年九月初四日繕摺請罪自必早䝉聖鑒但臣為張球所欺是臣之至愚臣輒敢據其所欺之言以欺皇上是臣之大罪已為國法所不容亦非臣所敢幸免即皇上深居九重之中早荷聖眀洞鑒則臣不但欽服皇上之無微不照而併自恨臣之下愚不移辜負皇上平日諄諄垂訓之聖恩而甘心自蹈於萬死不可一生之地又何顔立於屬僚之上而任封疆之重哉惟冀皇上立賜罷黜將臣嚴加治罪庶犬馬私忱或可以稍寬矣臣不勝悚惶待罪之至為此謹奏經厯如是境遇正乃上天所以玉成於汝也無須憤鬱即如年羮堯一人增朕無限見解夫闔省之廣屬員之衆焉得人人不謬事事無舛惟貴方寸內所秉忠正耳舉凡類斯波纍之咎朕悉豫原恕汝其寬懷自處勉之同日又奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣恭謝天恩一摺欽奉硃批諭㫖初志固當不移不易然人砥礪心行所貴美愈求美精益求精豈可削竹為鵲而遂自視為極則耶欽此臣跪繹之下感激涕零莫知所措仰見聖訓義至精微㫖甚深逺此誠千古帝王所未發之心傳朱子考亭所未闡之奧論也臣惟有終身頂誦聖意於靡盡耳又臣覆奏河泓刷深一事欽奉諭㫖所奏朕殊不以為然嵇曽筠固未知㑹於汝但飭令河員探量淺深確查尺寸汝自揣知其故也欽此伏念豫省河防上厪聖懷受恩如臣敢不悉心仰體然而臣實庸愚豈能逺及祗因本年四月內河水泛漲而滎澤縣堤內地畝竟未被淹臣隨詢之南河同知劉永錫據稱該縣地方因年來河泓刷深所以水不能淹臣此時正在奏請陛見因事關河防本欲查眀靣奏隨密飭各河同知令其逐假確查據實禀覆後據各河同知陸續禀報并具禀河臣嵇曽筠而嵇曽筠即有前聞查詢河泓深淺曽否奏眀令臣將原單移知之字嗣臣未䝉聖恩俯允陛見而既經查眀臣敢不繕摺具奏乃不謂聖眀早己洞鑒臣於繕摺恭奏之後始知河臣嵇曽筠已奉有諭㫖垂問臣不勝欽服皇上之眀無不照而深幸臣具奏之適逢其㑹也所有臣具奏河泓之故實因滎澤未淹而起今䝉聖諭諄切臣不敢不將實情據實再為覆聖諭從前查勘河道之欽差聞爾一無所贈殊覺禮儀少缺今鞫獄大臣在豫俟其諸案審畢當各盡地主之誼辭受與否聼彼自為耳欽此臣跪誦之下感激涕零伏念臣受性顓愚事多悖謬乃䝉皇上愛臣之深憐臣之切特頒諭㫖諄切教導似此髙厚隆恩臣即粉身碎骨亦難圖報但臣自到任以來欽差酌奪臣查前奉欽差查勘河務之內閣學士何國宗等臣於其初次來豫曽經備送贐儀而何國宗等再三力辭不受臣又備送土儀亦堅執未收後復奉知不免疏於禮節今䝉皇上天恩眀白指示臣惟有恪遵聖訓各盡地主之誼不敢再致有缺以仰副我皇上教導之洪慈於萬一耳為此謹奏覽雍正四年九月二十四日河南巡撫臣田文鏡謹奏為聖恩愈厚圖報愈難負罪愈深矢心愈篤淚盡血枯聲微哽咽事竊臣以愚陋庸材䝉皇上天恩畀以巡撫重任兢兢業業時凛聖訓每於因公接見司道各官必勸其各去私嫌共吐誠實即臣一身凡有所言未當所行未合俱懇其靣相商酌臣即改圖從善以求至當故歷任司道初則未免各懷猜忌久則俱鑒臣心無他不但有上下相成之美而且有朋友責善之風詎意有管河道佟鎮者外實肆傲內多姦險臣猶以該道總理河務不過催趲工程出納錢糧如此少年正可效力豈可因其妄自尊大便與計較故常曲為寬容不料其處心積慮已非一日然從來小人之心計雖毒必不能獨立孤行或朋比為姦或乘機傾陷或借勢中傷此又情事之必然如秋審鄒權虧空一案係題定奉㫖應斬監追人犯例當定擬緩决佟鎮因留侵用河帑地步執意開脫始則竝不詳報而惟以無心辦理為辭繼則傳伊㑹審又以查催工程為諉光州諱盜一案始則託陳世倕代為批詳繼則自行畫押移送故示以相好之情誘以同寅之雅陳世倕有不墮其術者哉更可異者佟鎮於本年七月初六比為姦之一證也況光州補報盜案係四月內事秋審鄒權係六月內事何難即時揭報乃候至七月終旬欽差大臣按臨審事正值臣多事之秋始行揭報部院此又其乘機傾陷之一證也再此二案果係陳世倕之非則當直揭陳世倕果係臣之罪則當直揭臣聖眀之前豈容魑魅魍魎出沒隱現指東擊西一傷兩敗此又其藉勢中傷之一證也總之佟鎮之姦已䝉皇上洞鑒無遺佟鎮之罪巳䝉皇上革職審擬無庸臣之再為瑣瀆臣於雍正四年九月二十一日據齎摺家人恭捧硃批諭㫖到豫臣跪讀之下仰見皇上至聖至眀無微不照類斯謬誤之事雖各省皆有但俗諺有云不犯為髙伏讀聖諭皇上諄諄告誡之意皆由臣奉職無狀罪不容逭乃以臣之罪而仰厪皇上如許天心周詳委曲復䝉皇上念臣之愚憐臣之至一至於此臣雖至愚豈同木石心既抱歉魂自不安此臣所以未泣而淚已枯欲言而聲已哽也又䝉聖諭此等刁風豈可使其滋長當嚴懲示警臣現在所遇之境所見之事而已䝉皇上洞鑒於機先無微之不照誠聰眀睿知之至聖盡性前知之至誠也臣請略陳其槩查自八月初間佟鎮一揭之後豫省官民紛紛議論或以臣此番必敗於佟鎮之手或以佟鎮能如此直行毫無顧忌將來必獲大用人人羡慕希圖效尤更或以臣必題參佟鎮以圖報復類斯等語傳聞不一直至九月二十日部文到豫䝉皇上特㫖將佟鎮革職著臣㑹同欽差大臣嚴審定擬然後官情俱各帖然民間亦無浮議若非皇上天威一震將來人各自危事更疊出不知究何底止此臣所以讀皇上之訓㫖而血淚俱無思皇上之天恩而聲息欲絶也臣何人斯而䝉皇上如此保全不但抱愧於中惟覺天恩愈厚臣罪愈深蓋心同犬馬自竭報效之誠而力臣因賦性愚鈍辦事全憑勤慎故凡片紙隻字必寓目而留神一事一言必熟思而審處此臣素所得力在此今被佟鎮一揭則更加慎重更加精勤臣且奉佟鎮以為師經一番風波長一番歷練則自今以後臣之所以事皇上者又未必非佟鎮有將伯之助也所有微臣感激皇上逾格天恩犬馬難報私忱理合繕摺覆奏仰祈聖鑒謹奏汝第坦然釋懷始終堅貞立志益勉公忠不涉一毫欺罔自然得免愆咎汝不自陷他人其奈汝何朕生平從不負人人或負朕上天默助必獲報復四年以來內外諸臣寧不共見斯亦朕一念赤衷所感諸臣俱當效法朕之居心即以斯內省不怍之念仰對天地神眀保汝無往而不亨吉也實為第一妙䇿同日又奏為遵㫖據實密奏仰祈聖鑒事竊臣欽奉硃批諭㫖管河道一缺爾如意中有稱職之人密奏以聞欽此伏念河道一官必須熟練河務勤謹辦事之員方可勝任在皇上至聖至眀因才器使為千古之聖君哲后所未及必自有克勝其任之人而必下詢及臣者即大舜好問察邇之聖心也臣識見雖愚敢不敬陳所知兹查有歸德府知府祝兆鵬居官勤慎才具亦優兼之為人平易官民相安兩年以來臣見其凡遇桃伏秋汛黃水長發之時必住宿河干督同商邱虞城考城三縣屬員周流搶護相度機宜深知河務自前撫臣石文焯請補知府未經引見正俟霜降後臣即遵㫖給咨赴部引見其次則開封府屬之下南河同知劉永鍚年力精壯久於河工極其諳練已經卓異俟霜降後赴部引見止此二人堪膺河道之任臣不敢壅於上聞伏乞皇上俯賜睿鑒緣欽奉聖諭密奏事理理合繕摺覆奏為此謹奏知道了朕正在搜訪如得有勝任之人即行補授倘一時竟不得人俟二員到京引見後再定同日又奏為恭謝天恩仰祈聖鑒事雍正四年九月二十一日臣齎摺家人回豫捧到皇上賜臣哈密瓜一枚臣隨出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣一介庸愚毫無知識仰沐聖主隆恩稠疊優渥業已捐糜莫報夙夜靡寧乃復荷聖慈錫賚頻頒有加無已在通省臣民視之當臣愆積罪深之日而皇上之寵眷比昔加隆在微臣一身視之當臣智盡能索之時而駑駘之報稱曷有其極自有此恩賜而忌臣者爽然若失疑臣者帖然無辭則是皇上今日之天恩寧止香能沁臣之心亦且寒能入臣之骨臣正不知何修何幸而仰邀聖眷之隆一至於此臣惟有矢諸白日竭盡丹誠以仰報我皇上天髙地厚之恩於生生世世耳所有微臣感激悚惕私忱理合繕摺奏謝仰祈聖鑒謹奏根本既是枝葉邊之過誤朕無不體諒曷憂外來風雨摧殘耶第省思慮養精神以與國家盡心出力可也雍正四年九月二十九日河南巡撫臣田文鏡謹奏為聖恩愈重臣罪愈深謹瀝血奏謝仰祈聖鑒事雍正四年九月二十二日據臣家人齎回臣奏請罷黜治罪一摺奉有硃批諭㫖臣跪讀之下不勝感激涕零五中碎裂矣伏念臣以一介庸材謬膺重任疊荷皇上天恩憐臣愚昧無一事不教導於機先無一端不訓誡於事後臣非木石敢不時刻竭誠仰體以求至當惟是臣受恩深重圖報殊切故每於屬員中見有年力精壯辦事勤敏之員臣即留心體察諄諄勸勉冀其學做好官共勷盛世以報聖恩無如臣性本愚人情叵測察之甚嚴而欺之甚巧防之愈密而藏之愈深雖欲制其變而窮其往先已自覺其智盡能索矣兹於張求佟鎮二案臣罪當萬死復荷皇上憐臣愚昧念臣無心不加臣以斧鉞之誅而仍賜臣以自新之路并䝉聖主𢎞慈以不逆詐勿偏聼看透世情增長識見諄諄垂訓似此天髙地厚之恩臣即生生世世誓作犬馬亦難圖報惟有銘諸寸衷竭盡丹誠而已所有微臣感深刻骨私忱理合繕摺奏謝又臣恭報秋成分數暨汛水平穩一摺奉有硃批諭㫖臣跪誦綸音伏思我皇上自御極以來宵旰憂勤無時無刻不以民生為念至誠昭格因而天和立應乃皇上聖不自聖安愈求安敬天之誠固無不至保赤之懷復靡不周是以今嵗豫省所屬各地方於八月二十九三十日竝九月初一初三初四等日疊沛甘霖入土透足所有來嵗二麥不但俱已種畢抑且播種甚廣現今己長有二三寸不等青葱遍野民情胥悅此皆仰䝉我皇上誠敬感孚之所致也臣敢不夙夜仰體感激敬畏以格天心以慰聖懷合將原摺一併恭繳謹奏且感今嵗己施之天恩眀年事何敢預料朕實不敢稍存此心惟朝夕乾惕以敬聼天命耳同日又奏為秋汛安瀾民情感激謹據實奏聞恭慰聖懷事竊照豫省今嵗秋汛荷䝉皇上厪念河工屢頒聖訓臣跪讀之下不勝悚惶無地每與副河臣嵇曽筠交相勸勉協力防護查自雍正四年七月十一日立秋起至九月初三日止工程水勢平穩情形業經臣節次繕摺奏眀兹復查自九月初四日起至九月十三日止除長落相抵外淨長水只不過一二尺至四五尺不等自九月十四日以後水勢有消無長盡皆歸槽今九月二十九日己交霜降兩岸工程俱各平穩且今嵗秋汛因河泓刷深之故水勢始長旋即消落不似上年壅塞難行臣見濵河士民感激皇上天恩扶老攜幼爭赴嘉應觀祝聖酬神歡呼之聲匝於四野并紛紛具呈懇請奏謝臣不敢壅於上聞現在繕疏入告此皆我皇上誠敬感孚河伯著靈之所致也臣職任封疆歡忭之餘彌深悚惕再臣復查增卑培薄工程大工已竣只有堤頂堤邊再加修整便可告完合併奏眀所有秋汛工程水勢平穩暨士民感激私情理合繕摺具奏仰祈聖鑒謹奏於題本內己有㫖矣雍正四年十月初九日河南巡撫臣田文鏡謹奏為聖恩愈重圖報愈難謹瀝血奏謝仰祈睿鑒事雍正四年九月二十八日署理湖廣總督臣福敏馳驛至豫臣即率領在省大小文武諸臣出郊祗候跪請聖安福敏向臣轉傳上諭汝所辦理之事皆是所以纍次加恩若一有偏執便不能皆是朝廷雖欲加恩亦不可得乃知臣道之克盡君恩之常保皆由於凡事之合宜而不執也汝宜深體此意欽此又傳上諭諭按察使魏定國糧驛道楊夢琰臣俯伏敬聆之下不勝感激悚惶益加凛惕伏念臣本庸材毫無知識仰沐皇上特逹之知畀以巡撫重任兩年以來恩有加而靡己寵逾分而益驚又䝉聖主𢎞慈憐臣愚昧時刻教導臣每奉聖訓諄諄即焚香跪誦逐字逐句更番尋繹凡居官行政莫不仰體聖心敬謹奉行以故庸劣如臣而猶得幸免隕越者皆皇上平日教誨之所賜也然臣受恩深重圖報殊切每於臨事之時未有不力求其是但臣素矢微誠以為凡事臣一人自見為是者未必即是必衆人共見為是者方為公是且以為衆人共見為是者或出於依附之私必皇上獨許為是者始得為大公之道然微臣之出其愚見盡其庸才而欲上奏聖眀以求一是則非內以盟諸幽獨而無慚色外以合諸同官而無異詞下以求諸民情而觀其向背上以矢諸天日以白其精誠斷不敢冒昧輕率跪陳於皇上之前又何敢偏執己私以上干莫逭之罪乎今復䝉皇上天恩推心置腹特命署督臣福敏於大廷廣衆之中𢎞宣訓㫖不但誡臣以偏執而更勉臣以精進不但欲臣一人盡心竭力以副我皇上期望之天心而併嚴諭臬司糧道無存黨比協恭和衷以匡微臣之不逮則皇上之所以教臣者固為臣終身之楷模即皇上之所以訓司道者亦莫不為臣一人之輔翼臣何人斯而仰䝉皇上望臣之切憐臣之深一至於此臣惟有恪遵聖訓益加勉勵力去偏執悉秉至公夙夜匪懈實心任事以仰副我皇上諄諄訓誡之聖意於萬一耳所有微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏福敏所傳誤矣朕竝未曽言爾偏執但命伊將朕所以嘉奬之意所以恩寵之故面諭爾知併降訓㫖與楊夢琰等蓋因楊夢琰原係福敏法海所薦舉之人才具頗屬優長去年春間李紱曽於朕前奏稱楊夢琰必不得田文鏡之歡心等語或恐其於中播弄致爾共事屬員懷疑掣肘預先道破不令若輩得以施其伎倆耳今觀福敏傳㫖光景殊大失朕意總之爾第坦懷勿慮自信果是䝉朕許可遂守而弗失偶或不是遵朕教誨復從而悛改則更無不是處矣最要者始終如一不隨境而遷方為大丈夫之操履朕不輕易許人爾之秉心立行實有可取非同泛泛即照此加勉為之自永逺叨承眷顧也硃批諭㫖卷一百二十六之八欽定四庫全書硃批諭㫖卷一百二十六之九硃批田文鏡奏摺雍正四年十一月初三日河南巡撫臣田文鏡謹奏為欽賜御書恭謝天恩事雍正四年十月初十日據臣齎摺家人回豫捧到御書唐臣魏徵十思疏一軸臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖臣盥手敬展之時仰瞻跪讀之下如乾坤之容日月之光輝煌發聿不可端倪臣何人斯䝉此寵錫伏思我皇上聖德直邁唐虞勤求逺逾湯武車書一統聲教遐宣幅員之廣郅治之隆從古未有豈貞觀之所得而嫓美哉而猶以魏徵所上十思疏親揮宸翰列諸御屏是即大智必察邇言聖人不棄芻蕘之意而䝉賜及臣是大聖人之所以日躋其敬德者未嘗不可以啓顓䝉大聖人之所以敷治於四海者未嘗不可以律一身臣竊取以自淑之際而益以仰見皇上之朝乾夕惕也臣自思學問知識不如魏徵殫思竭忠不如魏徵然一㸃敬君愛君不敢欺君之心未嘗不思以學魏徵然魏徵所遇惟英資睿哲之令主宜其上此十思疏以匡君德臣今所遇乃天縱天亶聖眀所以賜此十思疏以飭臣躬也臣敢不朝夕仰瞻終身效法而徒什襲珍藏奉為世寶巳乎除選工鈎勒鐫諸珉石建造御書碑亭敬謹供奉外所有微臣奉到御書感激歡忭私忱合先繕摺奏謝仰祈聖鑒謹奏此篇文字係出之自手耶抑或倩人代撰耶何其辭之不逹也偶爾戲諭同日又奏為據實覆奏仰祈聖鑒事雍正四年十月初十日據臣家人齎回臣恭謝天恩一摺欽奉聖諭此等恩寵皆汝平日勤勞奉公之效朕之一切賞罰本出無心皆任諸臣自取栽者培之傾者覆之乃天道也朕豈敢違欽此伏思我皇上聰眀天亶如同日月而賞罰所加則又不啻無私之兩大此誠千古帝王所未有而內外諸臣所共知者也但臣清夜環思自䝉聖恩簡畀以來涓埃未報愆尤日積乃仰䝉皇上天恩非惟不即嚴加罪譴而且矜全逾格錫賚頻頒此臣所以欽承皇上之恩賞而不解為何修跪讀皇上之眀訓而益驚為奏上蔡縣水利一事欽奉諭㫖溝洫最為要務必使通流無阻方與隴畝有濟如民力有所未逮則官為流濬百姓足君孰與不足應動正項錢糧募工興舉其計度周詳先密奏以聞候朕裁定凡屬一勞永逸之事勿惜目前小費或在可行可止之間者切須審察妥確若實無益於地方而徒為宵小營利之舉則不可也欽此仰惟我皇上自御極以來軫念民生勤求備至業已無利不興無政不修矣而又以溝洫要務慮民力未逮諭令動用正項錢糧募工興舉大哉王言臣敢不竭誠仰體悉心確查如果有益於民生以及一勞永逸之事臣謹當計度周詳繕摺密奏以副聖懷又臣覆奏美愈求美精益求精之聖訓欽奉諭㫖能遵朕訓行而有效方見凛奉之誠感激之切也欽此伏念臣以庸材謬膺重任幸蒙聖主𢎞慈時刻教導臣每奉聖訓莫不凛惕冰淵黽勉學習是臣之得以幸免隕越者皆皇上平日教誨之深恩而皇上今日之所以教臣訓臣者復係臣終身之至寶臣惟有念兹在兹敬謹奉行以期無負奏供應欽差一摺仰蒙聖諭若此又屬太過况朕曽經降㫖通行曉諭禁止地方官供備送迎豈可復循故步前諭蓋恐爾失交接之禮結怨於人耳錯㑹朕意矣欽此臣思敬欽差原出於敬皇上不敢不於前途灑掃旅店備送下程然俱係臣另聖諭委令地方供備迎送且各欽差多有不令預備者臣即不敢再備又蒙聖訓盡禮而已毋須過厚欽此嗣後凡欽差來豫臣謹當恪遵諭㫖如禮備送不敢過厚也又蒙聖訓儀文究不可省他人未必諒汝心也欽此臣性本庸愚亦復粗率每見人從前辭過即不再送然在報惟有銘諸寸衷竭盡駑駘而已所有奉到原摺合併恭􅌳謹奏覽雍正四年十一月初七日河南巡撫臣田文鏡河北鎮總兵官臣紀成斌謹奏為遵㫖定議據實奏聞仰析聖鑒事雍正四年八月初七日臣田文鏡齎摺家人回豫捧到皇上硃批條奏少室山一事欽奉諭㫖知縣馬朴條奏此一事可與鎮臣商酌定議奏聞欽此臣隨知㑹河北鎮臣紀成斌彼此確查商酌定議兹臣等伏查少室一山孤懸登封縣境內並無别山聨屬山之東西南三靣無路可登惟北面向少林寺雖有小徑一條而山勢嶙峋未易攀躋山上亦無平衍之地可耕可屋山溝亦無積水之處可汲可灌無茂林深澗可以藏姦無層巒疉嶂可以儲蓄從來平靜無庸防備此少室山之情形也再查此山由少林寺東行北至蕚嶺口路通山陜湖廣東南離縣治二十里中有郭店村去蕚嶺口八里距少室山五里實係適中之處臣等請於此處照例建立墩臺一座營房七間馬棚一間撥馬兵二名步兵三名㩦帶家口居住稽查往來行人足資防禦若增設官辨帶兵駐防不但建營於無用之地毫無裨補而且附山居民向安耕鑿者未免驚擾但臣等愚昧管見是否有當伏乞皇上指示遵行緣欽奉聖諭商酌定議奏聞事理臣等謹㑹同定議合詞覆奏為此謹奏所議是馬朴條陳朕原不深以為然大都書生不逹時勢因少林僧人向多操習技勇之傳聞遂乃敷衍此一奏耳若據現在情形而論即墩臺亦可不必建設爾等其再加酌量河南巡撫臣田文鏡謹奏為奉命來豫之侍衛才有可用仰懇聖恩逾格補授以收得人之效事竊臣伏查雍正三年二月初七日接准部咨內開將舊有進士千總侍衛內擬取三十七人引見奉㫖此三十七人內甚好者二十七人等因欽此嗣奉命來豫酌量試用之三等侍衛白琦係在二十七人之內臣於雍正三年六月初十日因臣標右營守備缺出經臣繕摺奏請奉有硃批諭㫖欽此欽遵何敢再為瀆奏但臣䝉皇上天恩畀以巡撫重任凡文武大小屬員無時無刻莫不留心教導加意體察臣見白琦年力壯健舉動便捷自到豫以來極知勉勵隨操學習弓馬比前更進臣常差委該員巡查堤工採訪民情土俗奔走勤謹實心效力委屬可用之員今據臣標左營守備金朝進因患痰證步履維艱具詳到臣經臣另疏題請乞休在案所遺守備員缺仰懇皇上逾格天恩准將白琦補授如䝉俞允容臣恭疏題請不惟白琦感激聖恩益加奮勉而臣亦得收臂指之效矣臣為營伍人才起見不揣冒昧繕摺再為奏請仰祈聖鑒謹奏具本題請可也同日又奏為屢䝉聖訓恭謝天恩事竊臣家人齎摺回豫臣跪讀硃批諭㫖此係必有之事朕早勘破小人衷曲巳降㫖與福敏命其過豫時密諭魏定國楊夢琰矣欽此臣伏念巡撫一官身任全省封疆事無巨細悉當料理即有兼人才技莫不藉司道等屬員為臂指之助同心協力共勷厥成況庸愚魯鈍如臣者乎若人懷一心上下掣肘自貽一身之罪戾甚小而致誤皇上之封疆甚大今䝉聖眀洞鑒不但訓誨臣者極其諄切即臣之屬員亦䝉皇上天心早為籌及凡所以訓魏定國楊夢琰者何莫非為皇上之封疆計亦何莫非為臣之一身計也又奉硃批諭㫖是即報朕之要道勉之欽此伏念臣受恩深重銘刻五中欺之一字非惟不敢存之於心抑且不忍萌之於念今䝉皇上諄諄訓勉特將一字不敢欺五字硃筆圈出臣更觸目警心益加惴惕若敢於皇上之前稍萌欺心則覆載不容鬼神殛之矣又奉硃批諭㫖汝第坦然釋懷始終堅貞立志益勉公忠不涉一毫欺罔自然得免愆咎汝不自陷他人其奈汝何朕生平從不負人人或負朕上天默助必獲報復四年以來內外諸臣寧不共見斯亦朕一念赤衷所感諸臣俱當效法朕之居心即以斯內省不怍之念仰對天地神眀保汝無往而不亨吉也實為第一妙䇿欽此仰見皇上聖心如青天白日又如水之平淨如鑑之光眀皇上之視臣下皆如赤子而臣下之負皇上無異欺天宜乎上天報復不爽毫髮此固皇上之精誠足以感召實亦諸臣之上干天怒也凡在臣工尚敢不以皇上之居心為效法乎臣雖下愚極陋然亦不敢自棄不敢自阻如七十子之效法孔子得其具體而微亦不虛生盛世空遇聖君天地神眀臨之在上質之在前臣惟有竭盡血誠益加勉勵以求絲毫無欺無負免致自陷於罪戾已耳所有微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏覆奏各條俱悉汝齎摺之人太覺頻數未免虛耗盤費朕萬幾在御日不暇給亦苦紛煩汝既有敷陳自須批答一往一來竟無寧息矣嗣後朕所降諭㫖如有回覆彚集一處附同奏請事件之摺齎呈朕覽殊為省便雍正四年十一月初九日河南巡撫臣田文鏡謹奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣具奏來嵗二麥一摺欽奉硃批諭㫖到臣臣跪讀之下仰見我皇上敬天勤民朝乾夕惕之聖懷有加無已臣不覺茅塞頓開愈深悚惕但臣伏思來嵗之二麥固難預期而皇上之至誠自足上格臣查豫省所屬各地方又於本年十月初三日起至初八日止甘霖疊沛四野均霑誠千古至治隆平之㑹也臣職任封疆敢不恪遵聖訓竭誠仰體臣惟有夙夜敬畏時刻黽勉以迓天庥以副聖懷合將原摺一併恭繳仰祈聖鑒謹奏直隸亦得瑞雪均霑朕仰賴皇天眷祐聖祖垂庇自惟凛慎修省求寡悔尤而已曷敢倚恃聰眀才智以駕馭天下實乃朕之本心也爾等封疆大臣當效法朕之誠敬同日又奏為荷䝉聖訓恭謝天恩仰祈睿鑒事竊臣家人齎回臣覆奏張球一摺欽奉聖訓諄諄臣捧接跪誦不勝哽咽莫知所以伏念臣䝉皇上隆恩至深至渥雖不敢因張球之事竟致昏迷失措貽誤封疆然而一種愧悔之私終難自釋今䝉聖諭何必乃爾此等舉止俱係無能為景象凡有錯誤愧悔總屬徒然自懲自戒改之為貴欽此臣敢不深自懲戒痛加悛改以副聖懷又䝉諭㫖過矣朕中心實不罪汝也經此一番洵非無益當篤信朕前摺所批增益識見用人妙術之㫖欽此臣伏思我皇上至聖至眀無微不照而知人善任誠為千古帝王所未及臣自問心思耳目雖黽勉學習亦所不能聖諭經厯如是境遇正乃上天所以玉成汝也無須憤鬱即如年羮堯一人增朕無限見解夫闔省之廣屬員之衆焉得人人不謬事事無舛惟貴方寸內所秉忠正耳舉凡類斯波纍之咎朕悉豫原恕汝其寬懷自處勉之欽此但臣清夜環思自以為生當盛世幸沐聖人之教得邀聖眷之隆毋論臣之一身固當兢兢業業力求其是即通省官民何一不當竭力整頓使之盡皆革靣革心蒸蒸向化然而皇上之聰眀睿知由於天縱雖極四海臣民之衆莫不洞察其隱故當年羮堯接見而終被張球所欺此臣所以問心自疚而無一刻之敢於自安者也今䝉皇上逾格天恩不惟宥臣以莫大之罪而并諭臣以寬懷勉臣以悛改似此浩蕩隆恩豈臣此生此世所能仰報於萬一乎臣惟有夙夜加勉時刻冰兢以期無負我皇上諄切垂誡之聖意於靡盡耳又臣覆奏管河道員一摺欽奉諭㫖知道了朕正在搜訪如得有勝任之人即行補授倘一時竟不得人俟二員到京引見後再定欽此仰見我皇上求賢若渴而用人如不得已之聖心復時厪於宵衣旰食之中則是河道一缺自必補放得人以資防禦再臣伏查開封府下南河同知劉永錫己經副河臣嵇曽筠給咨歸德府知府祝兆鵬己於本年十月初七日經臣給咨俱各赴部引見合併奏眀謹奏祝兆鵬好但恐其聰眀自用劉永鍚服勞奔走之員耳乃小材器然較二人之居心似乎劉永鍚平易若能涵養氣度將來亦儘堪驅䇿同日又奏為疊䝉聖訓感激難名謹瀝血奏謝仰祈聖鑒事雍正四年十月二十六日臣家人齎回臣覆奏署理湖廣督臣福敏轉傳上諭一摺欽奉諭㫖福敏所傳誤矣朕竝未曽言爾偏執但命伊將朕所以嘉奬之意所以恩寵之故靣諭爾知併降訓㫖與楊夢琰等蓋因楊夢琰原係福敏法海所薦舉之人才具頗屬優長去年春間李紱曽於朕前奏稱楊夢琰必不得田文鏡之歡心等語或恐其於中播弄致爾共事屬員懷疑掣肘預先道破不令若輩得以施其伎倆耳今觀福敏傳㫖光景殊大失朕意總之爾第坦懷勿慮自信果是䝉朕許可遂守而弗失偶或不是遵朕教誨復從而悛改則更無不是處矣最要者始終如一不隨境而遷方為大丈夫之操履朕不輕易許人爾之秉心立行實有可取非同泛泛即照此加勉為之自永逺叨承眷顧也欽此臣跪讀之下不勝感激涕零失聲哽咽伏念臣禀性庸愚才復陋劣荷䝉聖主天恩畀以封疆重任寸長莫展毫無報效屢䝉殊恩嘉奬臣實悚惶乃復䝉皇上特命署湖廣督臣福敏諭知并恐有人從中播弄令臣共事屬員懷疑掣肘預先道破仰見皇上至聖至眀無微不照臣思人臣事君全憑此心雖任有大小職有崇卑而一㸃敬君愛君不敢欺至愚未曽讀書然惟知天下之人志秉公忠心向皇上者即是同心合意之人非若他人除同年故舊之外即視為異己如李紱者楊夢琰尚未到任尚未與臣同辦一事即臣與李紱亦未曽謀靣臣實未解李紱何所見而即知楊夢琰必不得臣之歡心豈以臣為不公不忠之小人而楊夢琰為剛方正直之君子方底圓蓋不相投合耶不過恐臣日後糾參楊夢琰特為預留地步可謂巧於護庇矣臣查糧道楊夢琰係辛丑科進士雖為李紱門生然其居官存心與其師大不相同極知感激聖恩亟思圖報辦事勤謹操守清亷人亦爽直竝無私詐但性氣近於浮躁律例多有未諳往往舉動輕率凡事任意且馭下無知人之眀聼言無酌理之見一味猜疑反致拘礙臣每於接見司道之時逐事靣加訓飭至再至三令其改變倘肯服善自加勉勵久而久之或可去其偏而化其短斷無與臣有不合之處此尚在無庸計慮者所慮者豫省漕糧除近水次州縣徵收本色外其不近水次州縣題定折徵銀兩令糧道臨時採買每年辦運之時多有牙行囤户故髙其價以圖厚利而其間即有不肖書役串通說合舞弊分肥兼之旗丁之頑劣水手之作姦則又在糧道為之因地制宜相機行事庶可依限抵通上不致有誤天庾下不致貽纍官民彼拘方謹守之人恐難勝任且糧道與臣同在省城諸事俱可商酌而行即有不合處臣亦可以靣相考訂今赴衛辦漕與臣隔逺臣所以不得不為楊夢琰鰓鰓過慮者也至於臣之仰沐聖恩至深極渥每思圖報無由故凡居官行政莫不兢兢業業凛惕冰淵即至境遇紛乘之㑹亦不敢將求是之心稍有遷易乃䝉皇上親灑宸翰多方教導似此髙厚隆恩雖捐糜頂踵實難圖報惟有恪遵聖訓始終不移竭盡愚誠力求一是以仰副我皇上期望之天心於萬一耳所有微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏此奏通透之至知道了雍正四年十二月初六日河南巡撫臣田文鏡謹奏為恭報瑞雪以慰聖懷事竊查豫省所屬各地方於雍正四年十一月十三十四十五等日同雲密布瑞雪繽紛臣隨差人四路確查十一月二十六日據回差禀稱開封歸德衛輝彰德懷慶河南六府所屬暨陳許禹鄭陜五州併所屬各縣積地自二三寸起至四五寸不等南陽汝寧二府所屬汝光二州併所屬各縣積地自七八寸起至一尺不等臣正在繕摺具奏間據各州縣陸續報稱仰賴聖主福庇於本年十一月二十八日酉時起至二十九暨十二月初一初二等日復得瑞雪自五六寸起至一尺一二寸不等通省普被四野均沾地土滋潤麥根深固將見豐年預兆大有可書士農工賈莫不歡呼匝地感頌皇上臣職任封疆幸逢嘉㑹惟有益加黽勉愈切冰兢以格天心以副聖懷所有豫省各屬地方得雪日期分寸理合繕摺具奏仰祈聖鑒謹奏此番應時之雪實屬浩蕩天恩稀逢瑞兆且所被甚廣朕惟以手加額於欣慶之下復倍加敬慎感戴耳直隸八府普皆積地盈尺而山左山右所報大略相同塞外近邊一帶向來最慮雪大今所積不過五六寸反不及內地之厚因此朕甚慰悅兹接閲爾奏知豫省亦復如是優渥霑足則朕之喜更當何似耶我君臣益當自警同日又奏為恭謝天恩仰祈聖鑒事雍正四年十一月二十六日臣齎摺家人回豫捧到皇上賜臣繡爐一座臣隨出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣一介庸材毫無知識仰沐皇上髙厚之恩每自思維感深刻骨本年十月三十日恭逢皇上萬夀聖節臣奉差在外不克趨赴闕廷躬親拜舞是以不揣冒昧䖍備繡爐等物繕摺恭進雖極知粗鄙不堪上獻然而一㸃芹曝之誠實有非此難以刻安者乃未䝉聖恩俯賜全納寤寐之間正切恐惶不謂復荷聖慈特將繡爐恩賞及臣欽承之下不勝感激無地愈滋慚悚臣何人斯而仰䝉聖眷之隆優容之德一至於此臣惟有痛自刻責益加敬謹夙夜匪懈竭盡駑駘以仰報我皇上知遇之隆恩於生生世世耳所有微臣感愧私忱理合繕摺具奏恭謝天恩謹奏好勉之朕設身處地代爾思維即原係不肯勉勵之人當此際遇亦不得不加勉矣誠乃上蒼造就洪慈若似乎有意驅而納諸賢臣良吏之中又畀爾以欲罷不能之勢爾真何幸而遭逢若斯耶敬之毋忽同日又奏為據實覆奏仰祈聖鑒事竊臣家人齎回臣㑹同河北鎮臣紀成斌覆奏少室山一摺奉有硃批諭㫖臣等伏查少室一山竝無險要從來平靜況附近居民向安耕鑿一旦設立營汛非徒無益恐致反生疑畏但既經條奏似亦安益求安之意故臣等奏請建立墩房以資防禦乃不謂皇上深居九重之中而此山情形已無微之不照除一靣知㑹鎮臣紀成斌外臣復再三酌量誠如從無生事之處合併覆奏又臣恭謝天恩一摺奉有硃批諭㫖臣跪讀之下不勝感激慚悚因伏思我皇上宵旰憂勤勵精圖治凡屬四海臣民莫不共知祗緣臣賦性顓愚亟思奮勉凡有奉到諭㫖或一時未能覆奏寤寐便覺難安故不揣冒昧屢瀆宸嚴以致上厪聖懷罪何可逭今復䝉皇上天恩憐臣愚昧諄切教導臣敢不銘勒五中竭誠仰體嗣後謹當將奉到諭㫖凡有回覆彚集一處附同奏請事件恭呈御覽以副聖懷謹奏覽同日又奏為恭謝天恩仰祈聖鑒事雍正四年十二月初二日臣齎摺家人回豫捧到皇上賜臣黃羊一隻哈密瓜一枚臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖欽惟我皇上德嫓生成道隆化育恩膏普被遇物而恆厪天懷愷澤頻頒因時而每沾殊品臣心同犬馬雖欲竭頂踵以捐糜而力比駑駘實未能圖報於萬一撫膺自問不勝恐惶惟有矢之天地盟諸幽獨自始至終不欺不茍以無負我皇上知遇之隆恩於靡盡耳所有微臣感激私忱理合繕摺奏謝仰祈聖鑒謹奏朕待爾恩遇之隆不在些須食物間也奚庸於此言謝且非止施惠於爾一人之身蓋欲施惠於中州闔省蒼生也其仰副朕意毋違毋負雍正四年十二月十八日河南巡撫臣田文鏡謹奏為恭報瑞雪仰祈聖鑒事竊查豫省於本年十一月十三十四十五二十八二十九及十二月初一初二等日連次得雪俱經臣恭摺奏聞今於十二月十六日夜又得瑞雪積厚二三寸至五六寸不等是夜無風更得均勻十七日早即晴眀開朗太陽一照光焰輝騰中州黎庶共樂升平景象咸稱十餘年來未見此連朝瑞雪預兆豐年歡呼載道又據各屬報稱是夜之雪遍地普被四野均沾涵濡土􅍺極其優渥此皆我皇上聖德日躋昭格天心是以天眷極隆捷如影響臣幸際昌期惟有益加勉勵勤修厥職以仰副皇上諄諄訓誨天恩所有豫省各屬地方復得瑞雪日期分寸理合繕摺具奏仰祈聖鑒謹奏據奏十六日續得瑞雪欣悅覽之是天恩又偏渥於爾豫省矣雍正五年正月初一日河南巡撫臣田文鏡謹奏為恭報河清大慶仰祈睿鑒事欽惟我皇上聰眀天亶聖敬日躋本朝乾夕惕之心固已合天而基命極裁成輔相之大更復逹化而窮神是以彼蒼昭瑞於上而七政齊輝河伯著靈於下而三門底定既刷深數百尺而循軌以趨復澄清幾千里而安瀾共慶臣於雍正四年十二月初九日自衛輝府兑漕事畢回署由祥符縣之桞園口渡河親見浮冰開凍之處微覺清徹不似往日濁流心以為異不敢冒昧隨委員分路上下查看西至陜西交界東至江南交界於十二月二十七日據各管河同知申報豫省黃河上自陜州下至虞城縣一千餘里自雍正四年十二月初九日起漸漸澄清至十六十七等日竟與湖淀清水無異又於十二月二十九日據河道祝兆鵬具報到臣臣不勝踴躍歡忭竊以為大聖人在上天特降此異數嘉祥臣何幸而恭逢斯盛緣報到之時已經封印臣謹先繕摺具奏容臣開印即恭疏具題慶賀皇上天庥伏乞睿鑒施行謹奏河清之語耳則熟聞而目未經見蓋誠屬稀逢之事然朕際此嘉徵愈增敬畏於在廷諸王大臣慶賀表內已降有諭㫖行當布聞於汝兹不重宣雍正五年正月初七日河南巡撫臣田文鏡謹奏為恭謝天恩事雍正四年十二月十九日浙江觀風整俗使臣王國棟到豫臣隨出郊恭請聖安王國棟當將前次署湖廣督臣福敏誤傳皇上㫖意竝未曽言臣偏執因臣實心辦事所以屢屢加恩於臣之上諭備悉宣示臣跪聆之下不勝感激無地伏念臣一介庸愚至微極賤仰沐皇上逾格天恩畀以巡撫重任汲深綆短時切蚊負臣有何能足以䝉皇上之知而邀皇上之恩是以臣每受聖恩自覺毛骨竦然不寒而栗私心竊計以為今日之受恩非輕當思後日之圖報不易而且前恩之未報後恩之疊頒則臣之圖報更難而臣心更迫即如署湖廣督臣福敏所傳諭㫖雖有錯誤既䝉皇上硃批諭臣又䝉皇上特命王國棟於稠人廣衆之中眀諭其誤不但臣一人感激天恩即豫省大小臣工共聼共聞莫不稱頌皇上聖眀精詳周備至䝉聖諭一切毁譽之口分毫不能搖奪臣竊以為臣子居心有純不純之分辦事即有力不力之辨如居心不純則根本紛錯及至臨事非過於剛愎而失之粗浮即過於柔懦而多所瞻顧矣此其心惟知皇上操生殺豫奪之大權而可畏而不知皇上禀至聖至神之聰眀而不可欺彼悠悠毁譽之口安能搖奪哉臣何幸而遭逢堯舜得以眀目張膽毫無顧忌而行臣心之所欲行殫臣心之所欲殫也臣惟有仰遵聖諭實心為國家出力以仰報天恩於萬一耳所有臣奉到王國棟口傳諭㫖理合繕摺奏謝伏祈睿鑒謹奏好惟宜加勉勿怠同日又奏為恭懇天恩准留巡察以資政治事竊照豫省地方幅貟遼濶臣駐劄省城耳目難周荷䝉皇上特設巡察官周流查察所屬府州縣不敢不力行保甲修葺墩鋪即營汛官兵亦知警惕協力防護至於驛站夫馬亦復臕壯足數不敢虛糜與臣之在省遙制者不同實有益於地方且更有以補臣之不逮伏查巡察户科給事中臣張元懷一清如水辦事實勤所到之處吏畏民懷似此清亷勤慎之員委屬難得今當一年期滿臣不揣冒昧可否將張元懷仍留豫省再巡一年仰請聖裁如䝉俞允臣查各州縣每處民壯五十名給與工食使之學習長鎗鳥鎗弓箭以資捍禦巡防實與保甲捕務相為表裏應請歸巡察官就近調試技勇考其勤惰再大路兩旁所栽樹木誠恐地方官奉行不力以致枯活不齊巡察往來經由必及亦應請歸巡察官順便查驗以上二事如查有茍且塞責有名無實者許巡察官與臣㑹疏題參可否容臣題請伏候皇上諭示遵行抑臣更有請者巡察一官各處行走䝉皇上恩給夫馬口糧之外實無絲毫出息清苦異常更兼家口在籍恐不無內顧之心仰懇皇上天恩可否每年在司庫耗羡銀內動支銀八百兩賞給巡察官以為伊冬夏衣裝并豢飬家口之需臣未敢擅便并祈皇上睿鑒施行謹奏所奏是即照此具疏題請既與以養亷則當令其敷用滿足千金可也同日又奏為恭請復設河北道員仰祈睿鑒事竊臣伏查河北彰德衛輝懷慶三府向設守道一員於康熙六年奉裁九年復設又於二十五年前撫臣王日藻請裁部覆奉㫖依議在案臣查河北三府共轄二十三縣幅員甚廣與直隸山東山西三省接壤雖係內地但臣與兩司各道俱駐劄河南中隔黃河鞭長莫及一切倉庫錢糧與夫吏治民生全賴知府督率而知府無道員統轄則勤惰亦得以自由且河北大堤延袤數百餘里河道駐劄省城一至汛水漲發南北奔馳呼應不及近又䝉皇上軫念運道民生將小丹河百泉洹河等水修築疏通以濟漕澤民必得一大員兼轄料理方與地方有益應請復設河北守道一員統轄三府地方稽察吏治并責巡防仍照管河道之例加以兵備職銜將河北一帶堤工掃壩㕔汛各官河兵堡夫分與該道就近督率修防小丹等水利一并令其巡查此外再有零星小泉可以逹衛濟漕者俱令斟酌疏通彚流入衛以濟漕運毋致淤塞并稽察民間截流盜水之弊抑臣再有請者臣查衛輝府屬之胙城縣地方窄狹錢糧止有一萬三千餘兩事亦稀少離延津縣僅三十五里臣請將胙城縣裁并延津縣管轄每嵗科取文生各八名嵗考取武生八名廩缺二十名每科嵗貢生一名仍准其歸附延津縣學照常考取應銷鹽引亦歸延津縣督銷均免裁去縣既裁併則知縣教職典史之官俸役食即可移作復設守道俸工則是官役俸工無庸另動正項錢糧矣其守道養亷伏乞皇上天恩將胙城縣知縣養亷增照各道支領之數恩賞支領至於守道駐劄衙門臣查臨河適中之地莫過於武陟縣與沁河小丹河逼近查有副總河嵇曽筠原駐衙門今副河臣嵇曽筠移駐陳橋現今閒空則是衙署亦無庸蓋造矣似此一轉移間河北三府地方得一大員料理不但臣得資臂指之助而汛水長發之時濟渡維艱之際亦不致河道分身不及均沐天恩於億萬斯年永永無極矣是否可行伏乞皇上諭示容臣㑹同總河臣齊蘇勒副河臣嵇曽筠另疏題請敕部議覆施行為此謹奏復設道員之議甚屬有益地方㑹疏具題可也養亷一項究非俸薪之比毋得叙入本內雍正五年二月初九日河南巡撫臣田文鏡謹奏為恭報春雨春雪仰祈睿鑒事竊查豫省自雍正四年十一十二兩月之內四次得有瑞雪俱皆積厚普遍經臣節次奏聞今又於雍正五年正月二十九日春氣融和蒸成膏雨自酉時得雨起優渥霑足至三十日丑時轉寒成雪下至二月初一日寅時始晴積厚一尺至一尺四五寸不等據各屬具報到臣通省均霑髙下普被黃童白叟共慶豐年巷舞衢歌咸䝉聖德臣欣逢盛世幸際昌期但臣所見者豫省而已以皇上之敬修而驗之天心之篤眷以皇上之至德而驗之聖祖之垂庥則普天率土當莫不如豫省之疉沛天恩豐登預兆者也臣不勝歡忭踴躍之至理合繕摺奏聞為此謹奏豫省疊沛雨雪足徵和氣應時直隸亦荷天恩優渥朕不禁額手欣慶而復敬慎倍增耳曷敢稍涉髙興肆志況春澤預兆雖嘉究俟秋成方可為準也雍正五年二月十八日河南巡撫臣田文鏡謹奏為欽奉聖訓據實覆奏事竊臣家人齎回臣恭報河清大慶等事一摺欽奉硃批諭㫖河清之語耳則熟聞而目未經見蓋誠屬稀逢之事然朕際此嘉徵愈增敬畏於在廷諸王大臣慶賀表內已降有諭㫖行當布聞於汝兹不重宣欽此臣恭候聖諭間未奉內部頒發接閲邸鈔跪讀聖諭煌煌臣於皇上發揮天人感應之理休咎禍福之機仰見聖學之精深直通於無聲無臭之表及讀至皇上之所以事聖祖而聖祖之所以祐皇上仰見聖孝之純備即在於善繼善述之間而且宸衷敬慎謙德彌光不允諸王大臣再三之請升殿受賀惟祭告景陵奉誠敬於聖祖敕崇祀典歸功德於河神又賜恩臣工晉爵一級仰見聖德之寬𢎞已極於覆載之大不特河清上瑞載之史冊誠千古希有之竒祥而天語精微奉為典謨乃六經未傳之奧㫖以皇上之敬天法祖感召天庥又以皇上之朝乾夕惕以承天貺則唐虞都俞之風成周太和之氣不得專美於前而并有以超出乎上豈特七政齊輝九河告瑞而已哉臣幸生聖世快覩嘉祥且見普天同慶率土歡呼共戴夫至聖至眀之君共樂於光天化日之下惟有欽遵聖諭益加黽勉以仰報皇上天恩於萬一耳所有臣奉到硃批聖諭不敢稽延理合恭摺覆奏伏祈睿鑒謹奏實出朕之誠念非敢故為謙抑若稍涉作用有意致飾虛文非止欺人乃欺罔天祖矣朕斷不為但經此番瑞應彌凛天監昭垂敬畏之心洵有不期然而然者向於史冊中覩河清之載每疑為粉飾太平其事在或有或無之間不謂竟見之今日而且彰眀較著倍勝於往昔朕是以且幸且懼而前諭之頒降不能以自已也惟與諸卿期共勉之同日又奏為恭請分發候選州縣學習題補以課吏治仰祈睿鑒事竊照州縣一官為民父母與民最親事無巨細皆其所理關係非輕我皇上軫念民瘼留心吏治凡現任之州縣莫不甄别其賢否必得其人至新選之州縣又皆驗試其人才務期克當臣每見吏部月選之引見後人去得者記名别用或與緊要之缺人平常者調以簡僻地方或令督撫試看凡經皇上欽定之員人地應無不宜到任更當勉勵臣又何庸妄參末議但臣䝉皇上殊恩天髙地厚凡有知之深而見之切者敢不敬為我皇上陳之臣自蒞任以來見豫省新任之州縣初登仕版諸事茫然其間質本平庸者惟憑書辦依樣葫蘆稍有才具者又皆硜執已見任意妄舉臣聞學古入官居官所行之政本於平日之所學則新選之州縣內無不學之人宜其見之於政而可行措之於民而皆得然而進士舉人當其為諸生時專攻舉業以取科名故於刑名錢榖平日無暇寓目即間有博涉羣書講求經濟實學者若不能變通惟執古人成說則宜於古而多不宜於今合於南而或不合於北此中正有相時度地之權衡又未可執一而論也乃以初出學堂之書生而即膺民社之重任雖才具有可造就者聼其學習久當熟練才庸不能勝任者驗其不可即便題參則是以朝廷之民社而為新進後生所嘗試之具當其未熟練未題參之前少則數月多則經年儼然民上安能保其無害於民即或另易一官而後來者仍復如是吏治何由而報循良民生何由而登仁夀哉臣伏思我皇上求賢若渴用人無方常恐野有留良故往往不拘資格捐貢之教職俸滿引見竟得擢為知州未中之生員學臣保題竟得補授知縣考職州同亦令挑選雜職微員亦准卓異在我皇上聖意誠以何處無才不得早用為可惜耳候選之進士舉人并各項人員俱照科分名次分班銓選不得先後一人但其間有已經及選者或係才庸未得及選者反多竒士亦未可定與其在原籍閒居不如到各省學習此亦造就人才之一法也臣請將未經吏部截取家居候選之進士舉人并捐納州縣行文各省督撫查其選期尚在二三年之後者准其給咨送部按照省分掣籖照常引見如掣得直隸者則命往直隸掣得河南者則命往河南查照各省州縣之多寡酌量命往照進士留京學習之例令其寓居省城時常學習在省督撫司道衙門同現任官一體進見從旁觀聼凡有疑難重大之事屬官如何辦理如何禀眀上司如何教導如何訓飭之處便可一一考較如有公務應差人員則委其辦理以試其才再有缺出乏員署理則委其接署以觀其政各上司亦時加指示如師之於弟耳提而靣命之從此學習才具優長者督撫保題實授學習未熟者令其再學不能學習者題請改教如此則不以民社為嘗試亦不致遺害於地方其於吏治民生大有裨益如謂將未經截取之員先赴各省學習督撫遇缺題補則截取在部應選者反不得缺以致有妨銓政臣更請將學習人員內除實在才能出衆者許督撫遇缺保題仍令引見補授外其才非出衆僅可供職之員照其應選之期題補倘未及選期各省缺出歸部銓選不得越次保題則與銓政無妨也如謂各員徒往學習未得即補長途跋涉旅食維艱則各員在家閒居亦必喫飯穿衣赴部候選豈免登程就道倘到省後遇有公事差委各上司何難酌量往返日期捐給盤費且各員既欲致身事君豈惜此主僕居食之費此又無庸過慮者也倘各員不安義命營求鑽刺希圖先用督撫徇私阿好顛倒賢否屈抑才能保題庸吏一經發覺交部嚴加議處臣不揣愚昧敬獻芻蕘是否可行伏候聖裁特降諭㫖敕部詳議臣不敢冒昧具題仰祈睿鑒施行謹奏據奏請將候選州縣分發各省學習以裨益吏治此議朕於踐阼之初業經思及因難以施行遂寢而未發爾謂挨次分班恐致淹滯竒士此意固善然自古迄今大抵中材居多欲求間氣所鍾出類拔萃之利器世不屢覯故理國之道貴儲材有素首先以厚風習為要務風習既端斯趨向有方而人文蔚起矣夫資性茍純縱或政體生疏亦可漸次造詣天下事要不出情理二字而已不特科甲輩學古入官即一切旗漢人等既擬身登仕籍宜無不講求經濟吏治民生豈盡茫然莫喻傳不云乎未有學養子而後嫁者但恐其居心不肯恪秉公忠以奉乃職耳若慮以民社為新進後生所嘗試之具粵稽舜典眀試以功車服以庸已啓後世科資循格之端是以地方外吏全賴守封疆者激揚精嚴糾舉公當正所謂三載考績黜陟幽眀也至云新選者少則數月多則經年安保其無害於民今學習之員不令攝事無由核驗優劣委令署理彼僉邪小人之為害於民又獨不然乎況督撫諸臣雖簡命自朕未必一皆公而忘私或稍涉夤緣則大啓奔競其弊有不可勝言者不寧惟是即朕現今用人之法亦止堪暫行一時將來自仍歸於聖祖疇昔銓衡之成憲朕緣目擊官常懈弛吏治因循專以積纍為勞坐廢濯磨之志不得不大示鼓舞以振作羣工委靡之氣俟咸知奮勉治行改觀時自另有裁處之道又據稱朕超擢教職為州選舉生員為縣雜職亦准卓異云云就爾所言試觀如是甄拔才堪入彀者能得幾員此亦出於偶爾旁求非可永逺循行之良䇿所以吏兵兩部向年規例悉仍舊貫未命更張一二間遇爾等越例題請補授亦俱令聲眀原委朕降特㫖允行蓋有深意存焉豈俾輕紊成憲而致一代典章混淆無序哉雍正五年閏三月初六日河南巡撫臣田文鏡謹奏為奏聞事竊查豫省自去冬以及今春共得大雪五次俱經臣具摺奏眀今自二月初一日雪霽之後至三月初九十九等日得有微雨均入土寸餘麥苖滋潤長發臣因連日風多恐吹乾地土隨委員四路查勘據禀麥苖俱已長茂出地尺餘土膏不甚乾旱臣於三月二十五日赴武陟縣恭陪欽差大臣致祭河神一路詢問農民皆謂今年遇有閏月節氣稍遲但風後須得雨澤滋潤麥苖更易長發且所種髙糧棉花榖黍亦在望雨臣即飛飭各屬禁止屠宰齊戒沐浴率屬䖍禱深自修省已於閏三月初三日未時起至初四日申時止得有時雨據各屬禀報入土三四寸至五六寸不等麥苖青葱茂盛百榖亦俱長發今又於初五日已時得雨起現在連綿不住已經霑足通省臣民歡聲載道僉云雨金雨玉我皇上聖敬日躋感召天和得此及時雨澤萬民樂育所有得雨日期入土霑足情形理合奏聞仰慰聖懷為此謹奏深慰朕懷今春自入三月以來風霾時起朕頗以旱為憂然晨夕風起處即帶微雨天工殊為難測初二至初六七間雖雨而不勝風力光景膏澤未溥幸荷上蒼慈恩於初十十一連日甘霖大沛朕凛懼之心方為少釋頃據東撫奏報得雨已透晋撫亦報霑足想前二日傾注形勢所被地方甚屬寬逺朕實欣幸兼亦為卿等幸之同日又奏為桃汛已過工程平穩仰祈睿鑒事竊查豫省黃河南北兩岸堤工掃壩仰䝉皇上聖謨睿算指示周詳不惜百萬帑金連年修築又䝉皇上至誠格天大孝法祖及懷柔河嶽百神著靈是以澄清告瑞之後安瀾循軌今桃汛已過一切堤工掃壩俱各平穩通省臣民歡聲奏上慰聖懷伏乞睿鑒謹奏朕憂河之念較前稍減矣卿等身膺地方之責不可亦作如此想同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣恭請分發候選州縣等事一摺奉有硃批諭㫖臣跪讀聖訓恍然如夢寐之初覺惕然知臣言之非是仰䝉皇上天恩不加臣以失言之罪而且訓諭諄諄示以皇上用人之大道鼓舞羣吏之權宜臣伏讀皇上首先以厚風俗為要務之諭㫖誠聖天子清本澄源之至論風俗一正則人心向善雖椎魯之夫皆知變化況讀書科舉之士乎至於不肯恪秉公忠以盡乃職皇上已洞鑒諸臣肺腑如此則學習實屬無益而況僉邪小人更不可測乎此正風俗之所以為要也臣惟有凛遵聖訓激揚精嚴廢置詳當以仰報皇上天恩於萬一耳所有臣奉到諭㫖理合恭摺覆奏伏祈睿鑒謹奏棄取之責全在卿等若月選人員除實屬老病龍鍾外即灼見其不可用不便即行黜革何也一則恐物議徒以言貌為重抑或疑朕聼信耳目二則其中非科分應銓者即係急公捐納之員曷可恃片刻目力遂爾決定擯斥無論朕心有所不忍於情於理亦俱屬未協故不得已而姑且録用正賴卿等督撫大臣有以甄别其賢不肖也非推怨與卿等蓋其勢不得不然耳所以云用人一節天下事未有難於此者雍正五年閏三月二十日河南巡撫臣田文鏡謹奏為恭報得雨透足日期二麥秋禾長茂情形仰祈睿鑒事竊臣伏查豫省仰䝉皇上至誠至敬感格天心於閏三月初三初四初五初六等日連得霑足時雨麥苖滋長經臣即於初六日繕摺奏聞隨於初七初九十一十二等日又得雨澤據各屬具報各入土四五六寸不等通省已皆透足二麥青葱髙有一尺七八寸及二尺餘不等穗已秀齊現在揚花至於髙糧棉花榖黍等項亦皆長發茂盛白叟黃童歡聲雷動咸謂聖天子在上朝乾夕惕日就月將以致彼蒼默佑由是海內臣民皆得仰承天貺臣所見者止在豫省但豫省居天下之中既得有雨則他省應必同霑藉此仰慰聖懷微臣犬馬之私曷勝慶幸所有得雨日期二麥秋禾情形理合具奏仰祈睿鑒謹奏覽奏曷勝欣悅之至皆由卿能公忠體國荷䝉上蒼鑒佑始有此嘉徵也前月二十一二等日都城得雨時雲氣十分濃郁以為沾濡必廣不料輔京州縣如昌平涿州通州等處相隔咫尺入地尚未及一寸畿內近日望雨甚殷朕心深為憂虞所幸者天恩垂慈聖祖䕃庇適據山陜山東江浙楚粵等省悉皆奏稱雨暘時若因此懷抱少寬但直𨽻地方更近一層不容不親切視之也兹數日內沉隂黯靄甚有可望原欲俟甘澍降後批發爾摺復念來人守候至今為時已久故書此諭且令先回也同日又奏為據實奏眀仰祈睿鑒事竊臣於雍正五年閏三月初七日接准兵部火票封發內閣交出轉發河南巡撫包封到臣內封雍正五年三月二十八日怡親王暨大學士馬齊等奉㫖山西巡撫德眀所奏吳竒眀揭帖一紙可鈔録發與河南巡撫將揭帖內有名之該省人犯應行質問者即速密拏解往山西交與德眀究審不得疏縱亦不得拖纍欽此并揭帖一紙到臣臣查雍正五年三月二十九日臣接准山西撫臣德眀咨止令臣將現在河南結橋梁教哈哈教悟真教之臨頴縣人許登第中牟縣人耿炳光密拏解晋究處臣隨密行按察司遴委幹員分路前赴臨頴中牟二縣協同該縣文武印汛各官嚴行密拏并查橋梁哈哈悟真等教去後及臣於閏三月初七日欽奉聖㫖始知吳竒眀在山西出首田帝育等謀為不軌不勝驚駭臣即密令通省文武官辨各加嚴謹地方密行訪察姦宄查拏匪類兹據按察司詳據中牟臨頴二縣詳稱借查保甲為名挨户稽查不遺餘力竝無耿炳光許登第姓名踪跡亦無橋梁教哈哈教悟真教等名色現在移咨山西撫臣德眀訊眀該犯年貌竝確實住址移覆到臣以憑拏解在案臣查中牟縣耿炳光一犯雖據吳竒眀揭帖係現在跟隨吳竒眀在山西許登第一犯雖據臨頴縣覆稱並無其人但事關重大臣仍令中牟臨頴二縣查拏并差委臣標守備洪繼澤前赴該縣協同密緝務期獲解并揭帖內開有通元居士隱居嵩山臣亦委員密行查拏臣遵㫖不敢疏縱亦不敢拖纍所有密緝無踪并現在訪拏緣由理合繕摺具奏伏祈皇上睿鑒施行謹奏朕初聞此案便以為荒唐但既據稱姓名鑿鑿安得不一察究其各犯之直隸籍貫者雖已按名捕獲又悉係椎魯鄉愚不似謀為不軌姦匪之流事之真僞殊屬莫解晋撫德眀現在鞫訊審後自然水落石出若將確實口供移咨到豫時作速緝拏應付無誤至所開悟真等教名色亦當再加留心密訪舉凡此等邪黨率皆詭託深藏惟彼同類之人聲應氣求原無彰眀較著形迹猝難發摘慎毋輕率疏略致使漏脫況屢經降㫖飭禁若輩自必愈加固祕地方有司莫不欲避失察處分焉肯實力究詰全在爾等大吏耳目精眀督飭有方乘機將類斯邪教逐一搜剔為百姓除殘去穢肅清地方寧非美舉乎又有一種凶惡異常名為老瓜賊者聞豫省實繁其徒尤宜竭力設法剗除淨盡以安良善硃批諭㫖卷一百二十六之九欽定四庫全書硃批諭㫖卷一百二十六之十硃批田文鏡奏摺雍正五年四月二十八日河南巡撫臣田文鏡謹奏為欽奉聖訓據實覆奏事雍正五年四月初七日臣家人齎回臣覆奏遵㫖密拏耿炳光許登第一摺奉有硃批諭㫖伏思臣自雍正二年欽奉聖諭密拏邪教無時無刻不加察訪凡見一屬員無不諄諄囑咐并許其自能訪拏奏請皇上天恩免其失察處分若被上司及鄰封州縣拏獲定行嚴參請㫖加倍治罪各地方官亦無不禁止查拏即入廟燒香拏邪教為名自當借題設法臣令各屬明借查㸃保甲暗則察訪邪教則其人平日作何生理與何等人往來家中有無别項舉動鄉保鄰佑當無不知從此稽查或可根究今又欽奉訓㫖乘機將類斯邪教逐一搜剔為百姓除殘去穢肅清地方臣又飛飭各屬務期竭力同心嚴查密訪外設法用力緝捕在案不敢少有寬縱貽害地方又於臣恭報得雨透足二麥秋禾長茂一摺奉有硃批諭㫖仰惟我皇上敬天法祖宵旰勤求既䝉上天聖祖鴻庥各省雨暘時若則主之心不勝驚惕惟默禱上蒼早沛甘霖一刻俾天心早慰一刻耳至於豫省雨澤皆由聖德格天所致臣䝉恩㫖益切恐惶惟有竭盡血誠仰報天恩於萬一所有奉到諭㫖理合恭摺覆奏伏祈聖鑒謹奏據爾以豫省雨澤歸美於朕語固不妄非但豫省即依山傍海邉逺省分何一不關於朕耶所以云欲求民事天時不愆不忒全賴爾等大吏能體朕心以為心也若照直隸督撫輩不以朕心為心朕則無如之何更竒者畿內各府俱報霑渥惟保定一府未聞透足朕為之日夜憂虞莫置詎料宜兆熊等毫不介意所具摺內奏稱冬春以來雨雪既多麥苗長發甚好雖間有秋禾未種者今年閠月再遲數日無妨等語似此小民疾苦漠不關心不啻秦人之視越人而冀感召天和下應豈可得乎再年歲豐歉於奏報之虛實即可定封疆大吏之誠僞朕之所以諄諄垂示於卿等有厚望焉特諭同日又奏為恭報二麥收成分數及雨澤汛水情形仰慰聖懷事竊查豫省自雍正五年閏三月初三日起至十二日止連得雨澤情由經臣恭摺奏聞現今二麥俱巳登場兹據開封等八府所屬暨陳許等七州竝所屬各縣報稱地土雖有高下不等竝皆十分豐收除將送到瑞麥現在恭疏具題外所有巳種各色秋禾亦皆長發茂盛更兼入夏以來雨水極其調勻據各屬報到閏三月二十二十四二十七二十九三十等日四月初三初七初八初九十一等日各處得雨入土四五六七八寸及尺餘不等臣查所報雨澤非一日之內通省普被或有數處同日得雨或有數處先後各日得雨數日之間周流輪轉總之土膏無一處不霑渥秋禾亦無一處不茂盛白叟黃童歡聲載道皆謂年穀順成實有千倉萬箱之樂雨暘時若咸慶五風十雨之祥此皆我皇上聖敬格天大孝格祖之所致豫省臣民何修何幸而得逢斯盛也再臣伏查豫省今歲黃河於本年四月初九初十十一等日長水四尺五寸因河底刷深竝未出槽各處堤工俱獲平穩臣惟有愈加小心敬謹防護以期仰副聖懷於萬一耳所有二麥收成分數暨雨澤汛水情形理合繕摺奏聞謹奏以手加額欣悅覽之今歲二麥豐收景象叨䝉上蒼慈眷聖祖默佑直省仿佛相同竟可稱為大有惟汝河南最為第一朕實慶幸而益增敬慎至若秋成豐歉則未敢逆料如何若何也雍正五年六月初三日河南巡撫臣田文鏡謹奏為恭報雨澤暨汛水平穩情形仰慰聖懷事竊查豫省自雍正五年閠三月二十二日起至四月十一日止得雨霑足情形業經臣繕摺奏聞今據各屬陸續報稱又於四月十三十六十七十八十九二十二二十三二十八五月初一初四初五初六十一十二十三十五十九二十二二十四二十五二十六六月初一等日甘霖疊沛自五六寸起至尺餘不等臣查通省之中雖非一日之內同時得雨而周流輪轉高下地畝竝無一處不霑渥秋禾雜糧亦無一處不茂盛轉盼秋成可望十分收穫至於附近都省近時雨澤臣雖不及盡知然不時訪聞亦皆霑足益切歡欣惟聞陜西地方於夏府知府鈕廷彩報稱本年四月十八日黃河水長二尺臣隨移咨總河臣齊蘇勒副河臣嵇曾筠併飛飭道㕔印汛各官令其協力加謹防護毋得疏忽嗣據管河道竝各河同知報稱五月初二初三等日沿河水勢深淺不等除長落相抵外淨長水自一尺二寸起至三尺二三寸不等隨即消落不覺水勢巳過竝未出槽兩岸堤工俱極鞏固又於本年五月二十八日據寧夏府報稱本年五月十七日黃河水長一尺餘臣復移咨正副河臣竝飛飭道㕔印汛各官協力加謹防護外臣查五月二十五日巳交初伏前次長水既多不覺而近時水勢亦復安瀾雖每日長水自五六寸起及一尺四五寸不等亦隨即消落工程俱各平穩皆因河底深暢水由地中之故然臣實不敢因此稍懈惟有益加小心協力防護以副聖懷所有豫省雨澤汛水竝秋禾暢茂情形理合恭摺奏聞謹奏仰仗上蒼垂祐能保固全河兩三年無虞朕心方敢少釋也竭力加愼加勉為之同日又奏為據實奏明仰祈聖鑒事竊臣伏查前撫臣石文焯於雍正二年九月內奉差赴浙散賑之時有銀一千四十九兩零發祥符縣庫以傋公用竝無文案隨據祥符縣稟稱係前糧道陳時夏所交辦漕應送撫臣規禮臣查此時陋規未盡禁革應有此項銀兩雍正三年二月內布政使今升廣東撫臣楊文乾詳稱祥符縣所屬之黑堽鹽厰桞園草厰等四處渡口俱係章奏往來官民絡繹之地竝未設有官船向係民間私渡不但船隻稀少抑且破爛不堪一遇緊急差使每虞乏造册詳報共造船八隻分發各渡口應用外實動用過銀六百一十二兩零尚餘銀四百三十六兩零仍存縣庫今又據布政使費金吾禀稱豫省所屬登封縣境內中嶽廟西廊近被大風吹損椽瓦剝落又廟門牌樓月正值大雨時行之候若不蚤為修理誠恐將來一經坍塌工費必致愈繁隨飭令布政使將前項剩存銀四百三十餘兩發給登封縣令其作速估計修理毋庸再動别項公帑但臣查此銀係前撫臣石文焯留貯充公之項既經造船修廟動用無存理合繕摺奏明仰祈聖鑒謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正五年五月二十四日臣家人齎回臣覆奏遵㫖密拏邪教摺內欽奉硃批諭㫖地方上羣聚衆㑹男女混雜固屬應禁至若春祈秋報酬神祭饗此即大雅爾酒既清爾殽既馨公尸燕飲福祿來成之遺意安可阻遏其興或有乘聖諭其事巳明果不出朕始初所料欽此仰見我皇上聰明天亶睿算無遺此等無知之徒造言生事豈能仰逃聖鑒又䝉諭㫖此種劫賊深可痛恨當設法誅鋤欽此臣查老瓜賊為害地方實匪淺鮮臣遵當再飭各屬時刻留心協力嚴拏以靖地方又於臣恭報二麥收成暨雨澤汛水摺內欽奉硃批諭㫖以手加額欣悅覽之今歲二麥豐收景象叨䝉上蒼慈眷聖祖默佑直省倣佛相同竟可稱為大有惟汝河南最為第一朕實慶幸而益增敬愼至若秋成豐歉則未敢逆料如何若何也欽此又臣覆奏雨澤摺內欽奉硃批諭㫖批發爾摺之後即又得雨今歲直隸在在皆然膏澤不普隂晴靡定或濃雲遠翳或乍息亟零今夕此處祈禱明晨彼處報足職此之故數月總未釋懷及至麥秋據直督奏稱通計竟有六七分收成亦可謂大幸矣欽此又䝉諭㫖據爾以豫省雨澤歸美於朕語固不妄非但豫省即依山傍海邉逺省分何一不關於朕耶所以云欲透足朕為之日夜憂虞莫置詎料宜兆熊等毫不介意所具摺內奏稱冬春以來雨雪既多麥苗長發甚好雖間有秋禾未種者今年閠月再遲數日無妨等語似此小民疾苦漠不關心不啻秦人之視越人而冀感召天和下應豈可得乎再年歲豐歉於奏報之虛實即可定封疆大吏之誠僞朕之所以諄諄垂示於卿等有厚望焉特諭欽此仰惟我皇上念切民依勤求民隱九州四海萬國遐荒莫不上厪聖心務使各得其所因而上天默佑聖祖垂庥今歲二麥直隸巳慶豐年各省亦書大有臣䝉恩遇職守封圻雖無時無刻不仰體聖心兢兢業業而性本庸愚豈能仰冀萬一日切惴懼今䝉天恩嘉奬益深悚惕臣惟有愈竭愚誠永矢圖報而巳所有奉到硃批諭㫖理合恭摺覆奏謹將原摺一併恭繳謹奏覽奏俱悉緝盜一摺甚屬可嘉不必更行具題摺留中候另有諭㫖雍正五年六月二十日河南巡撫臣田文鏡謹奏為恭報得雨日期暨秋禾暢茂情形仰慰聖懷事竊查豫省自雍正五年四月十三日起至六月初一日止得雨霑足情形業經臣恭摺奏聞今又據各屬報稱於本年六月初二初三初四初五初六初七初八初九初十十一十三十六等日或數處同日得雨或數處先後得雨通省之中周流輪轉雨水極其調勻高下地畝土膏極其霑渥現今高糧蚤榖蚤黍以及芝麻花豆等物俱巳出穗揚花較之往年更加肥碩轉盼秋成大有可望再查晚穀晚黍并黑豆雜糧等物亦無不暢茂條達青葱遍野童叟歡呼皆謂我皇上誠敬感孚恩膏普被之所致也臣職任封疆幸逢嘉㑹歡忭之餘復不勝夙夜敬畏冀以仰迓天庥上慰聖懷所有豫省得雨霑足并秋禾暢茂情形理合繕摺具奏仰祈聖鑒謹奏實慰朕懷凡督撫大吏果有體國愛民之實心自䝉上蒼錫佑也此理朕信之最確同日又奏為伏汛巳過工程平穩仰祈聖鑒事竊查豫省南北兩岸堤工掃壩仰䝉皇上敬兩次具報黃河水長然瞬息之間不覺水勢巳過工程平穩業經臣繕摺奏聞今於雍正五年六月初三日又據寧夏府報稱本年五月二十五日黃河水長二尺五寸臣隨移咨正副河臣竝嚴飭管河各官率領兵夫住宿堤上加謹修防外嗣據各河同知報稱六月十二十三等日黃沁竝長但查沿河水勢除長落相抵外內河寬而深者長水僅止一尺二三寸不等其河狹而淺者長水亦僅止四尺不但水勢寬緩出槽之處甚少抑且隨長隨消其涸可立而待今伏汛巳過一切堤工俱各平穩通省官民歡聲雷動但現今巳交秋汛臣仍飭管河各官時刻修防加謹保護外所有伏汛巳過堤工平穩緣由理合繕摺具奏上慰聖懷謹奏雖據奏稱工程平穩朕懷何能便釋直待秋汛過後方敢言無虞也愼之又愼全河上下能保兩三年無事庶幾底定可期今歲雖無霪雨淋漓而水發甚驟朕所以時刻厪念不巳同日又奏為敬陳出借倉穀之積習不可不除伏乞睿鑒事竊惟常平等倉穀石關係重大自當出陳易新以防紅腐故於青黃不接之時有存七糶三之例春間出糶秋收後買補還倉又有存七借三之例春間出借秋收後加息完納法至善也乃各州縣奉行不善每於開倉出借之時即有頑紳劣襟姦牙積蠧串通鄉保地方俱將佃户家人姓名填入冊內臨㸃應名影射地方官無從查其誠僞雖每名下不過借穀四五斗不等當官零星借出即交伊主彚聚成多一人名下竟有二三十石不等究之無食無種貧民顆粒不得到手及至秋收後徵比還倉俱係紳襟牙蠧出頭赴比皆稱實係伊等借缺方知借穀時所造花名乃係捏造紳襟倚恃護符礙難責比牙蠧又復刁頑不畏刑敲詳則不勝其詳革則不勝其革州縣各官瞻徇因循挨至次年春間只得倒換借領將去秋之舊缺改作今春之新借以愚盤查官耳目俾出陳易新之良法遂成虛套故事此輩習以為常牢不可破一至交代時新官賢而能者或不肯接受令舊官代賠或竟詳揭虧空在舊官名下追補倘新任之員係一庸吏竟視為民缺可以代徵居然接受及至無完又蹈前轍而抗缺穀石之紳襟牙蠧反得脫然事外臣請敕部嚴行定例每年春間借出穀石自秋收後徵此勒限十月終務令盡數還倉造具完穀冊收申送報部年終知府直隸州下縣盤查其府州倉穀責令該管道員盤查出具印結申報如逾限不完或捏造冊收該府道員即行揭報參處除本官照數追賠外仍令缺户照數完納不得因本官既賠此數即將缺户豁免以市私恩倘查係紳襟牙蠧所缺不論多寡槩行詳革加倍追還仍照抗缺錢糧例枷責其代為造冊之鄉保地方嚴審有無受贓分别治罪如該管上司不行揭參察出照徇庇例議處庶幾立法嚴而各知有畏懼不敢捏名冒借抗缺不還而無食無種貧民得以均沾實惠矣臣不揣愚昧謹獻芻蕘如臣言可採伏乞皇上特降諭㫖敕部定例永遠欽遵施行謹奏常平倉穀存七借三之弊天下人所共悉者朕久思剔除未得良策今若照此立法繩治則冒借抗缺諸弊不杜自絶矣田文鏡所奏甚屬可嘉交發九卿再加詳議通行直隸各省永逺遵循同日又奏為恭報動存耗羡銀兩數目仰祈聖鑒事竊臣伏查豫省雍正二年暨雍正三年所有收過各年耗羡銀兩併動支數目業經臣兩次繕摺奏明今據布政使費金吾造冊詳報內開自雍正四年正月起至年終止原貯司庫各年耗羡共銀二十萬六千五百四十六兩零內除雍正四年二月奏摺內巳入新收雖開除項下注明未支而總撒數內未經扣除銀一萬五千六百七十八兩零應即開除外實存舊管銀一十九萬八百六十七兩零雍正四年新收過各年耗羡併歸還原欵共銀三十五萬八千四百六十一兩零以上新舊二項共銀五十四萬九千三百二十九兩零內除咨明各部暨布政使詳明臣衙門存案動支過各官養亷併各項應需銀一十八萬五千五百九十九兩零實在貯存司庫各年新舊耗羡共銀三十六萬三千七百三十兩零其民缺各年耗羡銀兩統俟各屬徵收起解於雍正五年歲終臣再查明具奏外所有雍正四年貯存動支過新舊耗羡銀兩年欵數目理合恭繕細摺一併據實奏聞仰祈聖鑒謹奏覽奏耗羡銀兩數目四柱井然足見查核精詳但既積蓄如是饒裕則當酌量增添屬員養亷俾得寬舒總之此項斷無克作正供之理汝其領悉朕意或於整理倉厫開通水利等處斟酌動用將來若比此數更溢則恐纍民矣雍正五年七月初四日河南巡撫臣田文鏡謹奏為恭報得雨日期暨汛水平穩情形仰慰聖懷事竊查豫省自雍正五年六月初二日起至六月十六日止所得雨澤業經臣恭摺奏聞今據各屬報稱又於本年六月十七二十一二十三二十四二十六及七月初二等日復得時雨自四五寸起至七八寸不等高下地畝盡皆優渥霑足所種高糧穀黍內有極蚤者巳經現在收穫其餘亦即在七月中旬均可收割至於晚穀晚黍花豆雜糧等物亦無不暢茂堅實總計通省可望十分豐收士農工賈歡聲匝地臣職任封疆不勝欣忭凛惕之至再查豫省黃河於本年六月二十一二十三等日據河員報稱六月二十二十一等日長水自一二尺起至四五尺不等雖間有出槽之處然隨長隨即消落現今水勢安瀾河流循軌一切工程俱各平穩臣仍協同副河臣嵇曾筠嚴飭管河各官率領兵夫住宿河干無分風雨晝夜時刻加謹防護務保無虞以祈仰慰聖懷所有豫省雨澤汛水暨秋禾茂實情形理合繕摺具奏伏乞聖鑒謹奏覽奏朕懷曷勝欣慰地方大吏果能忠勤愛民則和氣致祥䝉上蒼降福穰穰自然之理也第當勉之又勉慎之更慎毋存絲毫自得之心同日又奏為據實奏聞事竊臣於雍正五年六月二十八日據河北鎮標中軍遊擊楊國祚懷慶府知府靳樹賢俱各禀稱本年六月二十日聞得山西澤州大吉等村有飲賭學拳匪類聚衆拒捕之事臣查澤州與豫省之河內濟源二縣壤地相接誠恐匪類越境潛藏隨即一靣知會河北鎮臣紀成斌飭令各營汛辨加謹巡防一面嚴飭河北三府各該地方官嚴查保甲併於關津隘口村莊僻壤之處令其多撥人役嚴行盤詰併再飭通省地方官加意巡查外臣正在繕摺具奏間於本年七月初三日又據懷慶府禀稱於六月二十七日接到澤州關文內開有靳廣焦養祿王君祿申三陳桂衛智潛逃懷郡所屬之濟源縣地方翟神仙家藏躲隨即密差妥幹人役飛赴濟源縣仍一面移知營汛協同查捕巳於本月二十八日將翟神仙拏獲其餘姓名竝無蹤跡即將翟神仙録取供情於本月二十九日差官撥兵押解澤州去訖合將所取供單鈔録禀報等情據此臣思此等匪類雖係一時畏法拒捕今巳逃散但臣既聞鄰省有此等不法之事不敢不據實具奏謹將遊擊楊國祚原禀并知府靳樹賢所取翟神仙供情一併繕寫恭呈御覽為此謹奏更有一革職楊副將文內為何未見此名同日又奏為欽奉聖訓據實覆奏事雍正五年六月二十一日臣家人齎回臣覆奏遵㫖密拏邪教摺內欽奉諭㫖訪聞邪教人等惟河南山東及直隸南四府最多率皆夜聚明散蹤跡甚祕非深入其教者斷不能窺測底裏察訪愈嚴則閉藏愈固不但地方大吏莫可施為便州縣有司亦無從探其脈絡蓋胥吏中即有黨羽為之耳目以伺官之動靜非才能牧令默運機巧設法鈎致弗克緝獲云云既有此說諭爾知之庶便隨時留心也欽此臣跪讀之下仰見我皇上至聖至明無微不照臣敢不時刻留心勤加察訪兹復密飭各屬併見有才能之州縣令其遴選一二心腹之人改裝易姓濳入其教使之深信不疑或可得其詳確從而密首庶可盡其根株若州縣僻更易藏姦今䝉力稽查則地方更加嚴密矣又於臣覆奏雨澤摺內欽奉諭㫖近日以來京都左右地方雨水十分均調惟保府於五月盡方得透雨大竒欽此此皆我皇上至誠感孚上格踴躍欣又於臣條奏城鄉分緝㕔捕協緝二事欽奉諭㫖緝盜一摺甚屬可嘉不必更為具題摺留中候另有諭㫖欽此臣查盜賊為害民生緝捕關係綦重敢不悉心詳察據實敷陳乃䝉犬馬之報而巳又於臣具奏陜西地方雨澤未遍摺內欽奉諭㫖今歲陜省二麥收穫可稱十分昨閲法敏奏摺未云缺雨爾之所聞得無不確乎麥秋後止保定滄州數處雨缺近日亦報霑足矣欽此臣查豫屬之閺鄉縣即與陜西潼關連界前因聞得陜西自二麥收穫之後雨澤未遍秋禾尚未盡種臣既有所聞敢不具奏今又聞得陜西六月十五日酉時起至十六日辰時止甘霖霑足市糧價值頓減秋禾亦皆興發理合恭諭㫖仰仗上蒼垂祐能保固全河兩三年無虞朕心方敢少釋也竭力加慎加勉為之欽此臣查豫省黃河仰䝉皇上軫念民生周詳指示發帑興修是以汛水安瀾堤上慰天心仰報聖恩於萬一所有微臣奉到硃批諭㫖理合繕摺覆奏謹將原摺一併恭繳謹奏覽雍正五年八月初四日河南總督臣田文鏡謹奏為恭謝天恩事雍正五年八月初一日臣齎摺家人回豫捧到皇上賜臣荔枝一瓶臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖臣䝉皇上天恩屢頒尚方珍品恪恭拜受赤膽早巳披霞正席先嘗丹心益思向日但𢎞恩於萬一耳所有微臣感激私忱理合繕摺奏謝為此謹奏覽同日又奏為恭報秋雨日期暨汛水平穩情形仰祈睿鑒事竊查豫省本年七月以來秋雨稍多臣恐秋禾受寒隨即深自修省率屬虔禱荷䝉皇上福庇自七月二十五日雨後豁然晴霽所種秋禾早者俱各刈穫登場曬打收貯晚者上曬下蒸現在結實遍野如雲户慶盈寧民情胥悅至於黃河水勢查自六月二十三日起至今一月有餘共長水自五六寸起至四尺一二寸止除長落相抵外淨長水三尺二三寸不等隨長隨落幸河身刷深並未出槽一切堤工掃壩俱各平穩臣仍嚴飭管河各官加謹修防以期無負皇上天恩於萬一耳所有豫省秋雨晴霽暨汛水平穩緣由理合繕摺具奏仰祈聖鑒謹奏據奏秋雨晴霽汛水安瀾及早晚禾稼各情形朕欣悅覽之同日又奏為恭報秋禾收成分數仰慰聖懷事竊查豫省秋禾今當收穫之際臣據開封等八府所屬暨汝陳等七州併所屬各縣報稱豫省今歲二麥大收之後即得時雨民間酌其地土高下所宜播種高糧早穀早黍以及棉花芝麻等物皆十分豐稔近日天氣晴明俱巳曬打收貯至於晚穀晚黍蕎麥晚豆等物現在上曬下蒸含濡結實亦莫不堅好穎栗栖畝黃雲萬頃一色在於寒露前後均可刈穫登場臣詢之老農皆云如此豐年從來未有萬民樂育童叟歡呼雖王民皥皥不知帝力臣敢不廣為宣布使之咸知為皇上至誠昭格之所致也臣幸際昌期恭逢嘉㑹歡忭之下彌深敬畏除將送到瑞穀敬謹函封另疏恭進外所有豫省秋禾收成分數理合繕摺奏聞上慰聖懷為此謹奏覽奏不禁以手加額而復仰空䖍肅也欣瞻中土麥禾齊登惟朕與卿同兹嘉慶同日又奏為請㫖事竊查豫省所屬之賈魯河一道臣於雍正三年六月初三日准升任布政使廣東撫臣楊文乾傳奉諭㫖飭行開穵臣查閲舊案細察形勢自鄭州屬之滎陽縣起至陳州屬之沈邱縣止共計十一州縣紆回不下千里其間或深或淺或寬或窄不一而足當康熙四十五年開穵之時除題銷議捐俸工銀二萬九千餘兩外合計派之里下及通省大小各官公捐實費銀二十餘萬兩極其浩繁且至四十七年七月方能完工兩岸浮沙鬆土風括雨淋隨至淤淺河流亦難經久費多益少又需時日不敢輕舉妄行經臣覆奏欽奉皇上硃批諭㫖此事原非朕所亟欲為者爾之意見甚是又奉諭㫖試再加籌度如得便捷良法費既不至浩繁又可一勞永逸自應奏聞舉行否則且暫止耳欽此臣隨即飭行布政使㑹同管河道委員逐細勘查去後今據布政使費金吾管河道祝兆鵬詳稱沿河一帶若一概興修未免工程浩大糜費錢糧况於民田無礙無庸疏濬惟中牟縣屬之天麻堡至孔家莊止地勢低窪每至雨水過多民田間有淹沒又復環繞城邑一時難以就涸此亟宜疏濬以資宣泄者也且為費無多不日可以告成不比通行開穵之需費經時巳據委員上南河同知劉永錫㑹同中牟縣知縣章兆曾逐一查勘據稱查得舊河身共長四千七百四十丈內除五百二十丈並無阻塞不必疏濬外實應開穵四千二百二十丈再從新河添開八百九十五丈共應開穵五千一百一十五丈則中牟縣之水可以直達祥符縣屬原無阻塞之河內矣共計土十萬六千九百六十五方每方價銀八分八釐共需銀九千四百一十二兩零其所穵新土均分兩岸建築小堤每方應加平鍁夯硪工價銀八釐共需銀八百五十五兩零二共需銀一萬二百六十八兩零又士民冉克明等出具認結河成之後如或淤淺情願各照河岸地畝段落丈尺多寡每歲自行疏濬務使源逺流長不致壅塞等語繪圖造册轉詳到臣臣覆查開濬水利原為民田起見與民田無益不得遽興浩大之工與民田有益亦不得惜疏挑之費况所費不及從前二十分之一又可以一勞永逸自應急請興工可否照依所估銀數動撥司庫耗羡銀一萬二百六十八兩零臣遴委熟諳河務亷幹㕔汛各員協同該縣領給銀兩令於今冬農隙速即雇夫挑穵俾水有所歸民資其利臣不敢擅便伏乞皇上訓示遵行為此謹奏此議甚好允係應興之役從來水利為農民第一要務不獨中牟為然舉凡類斯宜疏宜濬河道逐處周詳籌畫具奏以聞切毋惜費如爾地方上力有未逮朕自發帑修治同日又奏為欽奉聖訓據實覆奏事雍正五年七月初七日臣家人齎回臣條奏出借倉穀摺內欽奉諭㫖常平倉穀存七借三之弊天下人所共悉者朕久思剔除未得良䇿今若照此立法繩治則冒借抗缺諸弊不杜自絶矣田文鏡所奏甚屬可嘉交發九卿再加詳議通行直隸各省永逺遵循欽此臣查常平等倉穀石關係綦重凡所以杜絶虧黴之道出陳易新之法巳䝉皇上洞鑒無遺屢頒諭㫖無一不訓誡詳明臣仰體天心冒昧陳奏乃荷竭臣之力以仰報天恩而已又於臣恭報伏汛平穩摺內欽奉諭㫖雖據奏稱工程平穩朕懷何能便釋直待秋汛過後方敢言無虞也慎之又慎全河上下能保兩三年無事庶幾底定可期今歲雖無霪雨淋漓而水發甚驟朕所以時刻厪念不巳欽此臣查豫省黃河仰䝉皇上睿謨指示連年修築固巳安瀾循軌可保無虞矣乃猶以全河之保固不易汛水之消長靡常上厪聖心臣伏讀上天默佑聖祖垂休河神著靈福國祐民而巳又於臣恭報雨澤併秋禾摺內欽奉諭㫖實慰朕懷凡督撫大吏果有體國愛民之實心自䝉上蒼錫佑也此理朕信之最確欽此竊惟豫省連年百榖豐收此皆䝉我皇上深宫敬修至誠感孚所致庸劣如臣不過適逢其盛與豫省官民共沐皇仁浩蕩而已乃䝉髙厚於萬一耳所有奉到聖訓理合繕摺覆奏謹將原摺一併恭繳謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正五年八月初一日臣家人齎回臣恭報雨澤汛水摺內欽奉諭㫖覽奏朕懷曷勝欣慰地方大吏果能忠勤愛民則和氣致祥䝉上蒼降福穰穰自然之理也第當勉之又勉慎之更慎毋存絲毫自得之心欽此仰見我皇上敬天勤民之聖心直與乾行同其不息愚魯如臣敢不恪遵諭㫖勉之又勉愼之更愼屏去自得之念惟期無負臣職仰報天恩至於豫省時和年豐汛水安瀾此皆我皇上敬誠昭格之所致今䝉奏密拏邪教摺內欽奉諭㫖隨時隨地留心毋或稍忽欽此臣於邪教一項多方設法密訪稽查而此輩蹤跡詭祕實難得其確據臣正深恐懼無刻自安復䝉奏雨澤摺內欽奉諭㫖近日秋雨連綿不止朕心甚為憂懼欽此秋雨偶爾過多聖心即為憂懼仰見皇上朝乾夕惕之不揣愚昧稍有芻蕘一得不敢隱匿不言䝉皇上量竝乾坤眀同日月轉圜之美從古未聞不但內奏汛水平穩摺內欽奉諭㫖全賴卿等督率各屬竭力勉為欽此黃河水勢關係綦重臣敢不實力勉為惟幸具奏澤州匪類聚衆拒捕一事欽奉諭㫖更有一革職楊副將文內為何未見此名欽此澤州一案臣當發覺之初據河北道朱藻懷慶府知府靳樹賢禀報到臣即於七月初四日繕摺奏聞此時尚未供出楊副將其人是以無憑繕入直至雍知姓氏住址令河內縣知縣梅枚借查保甲為名密覘形跡巳據查有革職千總楊廷選其人該縣竝不嚴訊同居之郝廷栻并速將送令脫逃之武生楊廷敬詳革衣頂追問楊廷選確實下落止具禀帖到臣玩縱要犯經臣巳將該縣特疏題𠫭之後適奉皇上硃批諭㫖臣不勝恐懼竝非臣敢於遺漏不據實具硃批諭㫖理合繕摺覆奏謹將原摺一併恭繳謹奏覽雍正五年八月二十八日河南總督臣田文鏡謹奏為恭報晴雨日期暨汛水平穩情形仰慰聖懷事竊查豫省今歲自入秋以來所有晴雨汛水業經臣節次恭摺奏明兹復查據各屬報稱自本年七月二十五日起迄今一月有餘晴霽日多隂雨日少所種秋禾雜糧早者久巳曬打收貯晚者亦巳刈穫登場即蕎麥一種盡皆成實穎栗堅好至於來歲二麥亦俱各播種再臣伏查豫省黃河於本年八月十八日據陜西寧夏府知府鈕廷彩報稱本年八月初六日長水一尺四寸臣隨移咨正副河臣併嚴飭管河各官加謹防護外嗣據道㕔印汛各官報稱八月二十一二十二等日共長水二尺七八寸不等勢甚寬緩亦隨即消落自八月二十三日以後水勢日益退縮一切堤掃工程俱各平穩總因河泓刷深竝未出槽臣查九月初十日巳交霜降可保無虞臣生當聖世適逢極盛之休惟有勸諭農民力崇節儉耕九餘三併督同管河各官益加敬謹竭力修防以期仰副我皇上軫念民生慎重河防之聖意於萬一而巳所有豫省晴雨日期暨汛水平穩緣由理合繕摺具奏恭慰聖懷為此謹奏歲功河防兩俱告慶朕心不勝欣慰之至自春徂秋三汛既暢流無阻河泓又復刷深幾許耶隨便查奏以聞同日又奏為遵㫖密奏仰祈聖鑒事竊查社倉積穀一項民捐民守民借民還不經官吏之手無俟詳請之煩每歲青黃不接之時乏食貧民藉以就近接濟實於民生大有禆益臣䝉皇上天恩畀以封疆重任敢不仰體天心依法奉行凡府州縣因公進見之時即囑其首先倡捐以為民勸併令勸諭紳襟富戶共勷厥成不得強人不願勒令捐輸亦不得官吏侵收有名無實嗣據各屬紛紛稟報自雍正三年併二年以前本息勸捐穀麥共計十萬九千七百六十七石零建立社倉七百九十八座分貯各該地方竝無虧缺業經臣兩次繕摺奏聞今又據布政使費金吾查據開封等八府所屬暨汝陳等七州併所屬各縣彚報雍正四年分仰䝉皇上聖德格天雨暘時若全豫連歲豐收民間社倉行巳三年咸知有益於民士民踴躍又共新收捐穀一萬九千八百一十七石零捐麥四百四十一石零豆三十四石息穀七千七百二石零又內黃濬滑三縣勸捐穀六千六百石內除柘城縣修倉動用穀八十石實在新舊二項共貯社倉穀麥豆一十四萬四千二百八十四石零從此年復一年愈積愈多通省人民莫不共仰聖德於無疆均沐皇仁於罔極矣但臣復思前項穀石雖不便主之於官以司出入然而一任正副社長董司其事恐其中賢愚不等日久不無虧空臣復密飭正署各官凡派虛開捏報之處至於雍正五年秋收後另有勸捐穀石容臣查明再行繕摺奏聞所有雍正四年分各屬實在捐貯社倉新舊穀石數目理合繕摺密奏仰祈聖鑒謹奏社倉一事朕前㫖甚明不但不便諭行即嘉奬鼓舞亦有所不敢今豫省料理至如此規模實出朕之望外汝可謂善於遵承矣同日又奏為豫懇聖恩仰祈睿鑒事竊臣一介庸愚荷䝉皇上天恩畀以封疆重任無時無刻不以察吏安民為念故每遇屬員因公進見之時臣即諄切教導令各自奮勉共圖報效然通省屬員中奉公守法者固不乏人而才堪肆應者卒難多得蓋因其初登仕籍未能深知土俗民情即欲有所設施以見其才而未經熟練不克展舒與其得一新進之賢員不如留一老成之舊吏臣是以每於各官之去留未有不鰓鰓過計者也如原任陳留縣知縣李鍾璠才品敦重辦事亦勤而且熟諳河務因曹國經一案奉部行查臣不敢不題請解任質審然而臣心甚為惋惜兹於本年八月初八日接准部咨欽奉上諭曹國經於未犯事之前經過李鍾璠任所顯無寄頓財物情弊此事免其究問李鍾璠著調來引見欽此仰見我皇上至聖至明無微不照奉此恩綸如臣身受殊寵又滎澤縣知縣劉永鐄年力精壯才猷敏捷原係泌陽縣知縣曾在河工承築堤壩深悉河務經臣題請調補滎澤縣臨河員缺臣復委試他事俱能辦理無誤洵屬肆應之才若再稍藏鋒鍔則才養竝優矣亦於本年六月十三日接准部咨欽奉上諭滎澤縣知縣劉永鐄著來京引見欽此臣即令離任交代清楚以上李鍾璠劉永鐄二員現在給咨赴部引見在案臣伏思當此聖明之世人才蔚起豈乏十倍百倍於此二員者且四海九州東西南北惟皇上所使臣豈敢因臣在豫省欲留此二員於豫省辦事仰冀天恩妄為瀆奏但臣自問庸愚才復鈍拙荷䝉皇上畀以重任汲深綆短日切悚惶惟藉一二諳練熟悉能員共相佐理庶幾得收臂指之效犬馬私忱不得不據實奏懇皇上天恩將李鍾璠劉永鐄仍留豫省則臣受皇上高天厚地隆恩殫心竭力所不能仰報萬一者也臣為愛才起見不揣冒昧具奏仰祈皇上睿鑒施行謹奏覽奏巳悉該省人員為朕所選取另用於他省者原屬過多然率皆以州縣牧令擢升郡守監司非以原品原職對調也今既據奏懇留豫俟二員到京引見後李鍾璠自仍發還於爾劉永鐄若才具果好諭部加銜亦發回豫省供爾驅策同日又奏為據實奏聞仰祈聖鑒事竊查豫省今歲雨暘時若各屬秋禾收成俱有十分經臣具摺奏聞今於本年八月初四日據固始縣報稱該縣東關官河一道地居平坦勢最低窪其東南一帶發源於江南六安山由商城固始滙入淮河本年七月十五日六安山水陡發上流奔騰直下更兼境內連朝大雨水勢益急官河水滿一時不能暢泄東岸長興集一帶西岸站馬巷一帶俱被水淹民房間有倒塌人口亦有被水漂失者適值該縣知縣劉縉照赴春河鎮查驗胡永年家被竊情形亦被雨阻當經該縣縣丞鍾時發親赴河岸迅即雇覓船隻分路救渡被水居民或暫寓近城親戚之家或分棲於菴觀寺廟幸而水勢驟長驟消該縣於次日回縣水巳退去查看城垣倉庫俱未被水併查㸃各寺廟男婦名口按口捐給錢文加意撫恤俟天氣晴乾令其各歸舊處設法修理房屋其境內俱係水田所種稻禾早熟者巳經收穫高原爽塏晚熟之稻俱未被淹茂盛無恙其近河低處稻田同光州知州趙紀星赴確勘適值南汝道孫蘭芬確數賑恤得所緣由併賑過銀兩數目詳報到日再行確核另摺具奏外所有固始縣臨河附近居民被水併委員查賑緣由合先繕摺奏聞仰祈聖鑒為此謹奏料理雖屬合宜恐乂不免諱災之論耳朕於所降諭㫖內略帶數語發出時爾自得知悉同日又奏為請定查驗盜賊出入情形之例併嚴事主捏報盜案之條以廣皇仁以重民命事竊惟盜賊為害民生查捕不可不力人命關係重大究察不可不詳臣查民間凡有一户被盜具報到官一面出批僉差四路追捕一靣移會營汛併鄰邑文武官辨添差協拏仍一靣通報督撫巡察司道府㕔批令嚴緝四箇月限滿題𠫭疏防限年緝賊逾限不獲再限一年分别降調如拏獲賊犯以獲盜之日起扣限一年審解核題此定例也而且鄰佑亦干責處汛兵復豫杖懲無容寬假何等嚴切至於地方印官不親詣查驗出入情形從未見有處分事主捏報盜案亦未確有定例臣查例內止有旗人以竊報强鞭一百亦未定民人以竊報强作何治罪至雍正四年二月定例事主以竊報强挾制官府妄行控告者查明治罪以遏刁風等語亦未定以應治何罪若竝未被竊捏報强盜者更未定議臣䝉皇上殊恩畀以封彊重任無時無刻不以緝盜安民為巳任州縣一有失事批查甚嚴如有諱匿情弊立即糾𠫭不敢少有瞻徇遂有一等頑劣之輩見縣令略加約束即拂其情希圖報復以快私憤且見定例無事主捏報罪名報盜認贓之外又不許苦纍事主遂妝㸃被盜情形張大其詞或毫無影響而突稱强盜劫殺或因别項事由而輒謂大盜劫財或偶被小竊失物而捏作羣盜拷逼種種不一總因州縣官慣能諱盜抑勒事主故定例將州縣處分特嚴將事主俱從寬典乃不謂刁惡之徒視事主為地方官所無可如何之人妄自尊大以逞其姦捏報之後多不能審出虛誣終得脫然事外所以肆無忌憚也又州縣官因無不行親驗處分只圖安樂一聞民間被盜不但漠不關心抑且以為害巳不過喚鄉地一問委衙官一查給捕役一批而巳未經親驗情形强竊從何而辨虛實從何而分只得草心受事主之挾制不敢再措一詞因而人皆效尤毫無顧忌此刁風之所以固結而不可解也官懼其捏盜陷害則凡事不敢與惡人為仇而彼得肆行於一州一縣之中縱有强項令亦不得不委曲調停求悅於衆其為害豈可勝言且一經報盜之後四月限届即參疏防一經題𠫭之後審係非強亦難開脫蓋參過疏防則部中有案限年不獲則處分甚嚴官畏處分必勒比捕役役畏嚴比必誣拏平民承審之員急欲完案豈肯任其申訴限期緊迫急於成招箠楚之下何求不得况有捕役為之栽贓買贓教唆口供扳纍無辜則遂成鐵案雖經撫臣司府歷審而該犯畏懼駁審加刑不敢翻供只得依樣招承撫臣覆審萬一不加詳慎照此具題部覆不數月而駢首藁街矣以竊盜而膺斬决之嚴刑巳是由輕入重以平民而代强盜之大辟更屬負屈含寃上干天和下戕民命揆厥由來皆地方官報盜不驗之故也臣竊以為辨盜案之虛實強竊必須責令地方官先慎之於始一聞報盜不論逺近無分風雨立即會同營汛飛赴事主之家先驗前後出入情形有無撞門毁户再驗有無遺下器械油捻之類再驗事主有無拷燎捆扎傷痕并訊地鄰更夫救護人等有無聞見影響則是虛是實是竊是強思巳過半然後再加詳審事主雖狡口如簧亦斷不能遁飾矣如云定例不許苦纍事主不敢過問則又不然實在强劫則事主報盜認贓之外自不得略有苦纍至若盜係捏報事當推求者此非事主也誣告之犯人也正不得謂之苦纍也况公道自在人心定例豈可拘泥乎臣查人命尸傷例應印官親詣檢驗不許轉委佐二雜職如印官公出亦必詳委鄰近印官代驗强盜重情與人命無異臣請嗣後凡有呈報强劫盜案照依檢驗尸傷之例責令州縣印官親詣事主之家查驗出入情形遺下器械拷燎傷痕當場查訊地鄰口供俱填注通報文內若印官公出即令衙官專差申請鄰邑印官代驗通報其衙官與防汛武職飛赴追擒若仍委衙官代驗或公出而衙官不申請鄰邑查驗或鄰邑推諉不即赴驗或竟將未曾目見之情形捏作親驗填報該管道府與直隸知州併管捕㕔員將不親驗情形之屬官徇庇不揭一併題𠫭請㫖敕部嚴加議處至於以姦命鬪毆等事而捏報强盜者除本罪屬重照本罪治罪外如本罪屬輕應否即於本罪上加等治罪以竊賊捏報强盜者應否照旗人例以鞭一百作杖一百折責有所挾制而憑空捏報强盜者應否即依誣告人死罪未决律問遣若果係被劫地方官因有懲治捏報之定例借詞抑勒苦纍事主以圖諱匿除照定例革職外應否亦照誣告平人加等治罪伏乞皇上敕部一併定例施行臣不揣愚昧敬獻芻蕘是否可行伏候睿鑒為此謹奏為此盜案一節朕自即位五年以來曾經日夜思維總無善策不得巳而惟嚴責督撫大吏俾督撫大吏嚴責州縣有司有司自必勒比捕役勿令玩愒疏縱庶被失之家不致抱恨莫伸蓋以為稍若懈弛則仍復如故是以執意行之而無疑也今卿所奏亦未嘗不是第恐此法一施刁惡之徒固應斂退而馴良怯懦者不敢報盜矣非不知盜案參例原屬過嚴無如勢處兩難寬嚴俱滋流弊試稍寬一步或可從容奏效因命各部院曾任外吏之堂司并科道等官㑹議不限以日期俾得詳籌熟計朕更悉心體究議定後另有諭㫖同日又奏為據實奏聞仰祈聖鑒事竊查山西澤州妖言聚衆等事一案臣於雍正五年七月十三十六等日接准山西護撫臣高成齡咨拏楊副將即楊廷選等各犯又據各屬報稱據山西澤州知州劉育嵓關拏翟神仙即翟斌如各犯臣隨選差妥幹員役開明各犯姓名年貌住址令其四路密訪嚴緝務期必獲解晉收審仍懸示賞格不論諸色人等有能拏獲楊廷選靳廣一名者臣即捐賞銀二百兩餘犯一名賞銀三十兩復咨會巡察户科臣張元懷照會南北兩鎮飛行按察司各道嚴飭地方文武密行屣緝不遺餘力且令塘鋪兵丁於關津界口盤詰放行鄉約地方於村莊煙户嚴查保甲各在案臣查翟神仙即翟斌如併弟翟相如陳桂田瓜即陳二又名陳志榮併子陳雲楊世龍楊世虎楊鐵山郭海龍郎裁周三即周叔方程廷賓宋文元併羽黨張三陳彥武陳新惠容留焦養祿之郭五郭萬舟郭里舟王小成俱經拏獲解晋收審訖尚有楊廷選靳廣焦養祿王君祿申三衛智賈四即賈坤全樊百川衛四聞先生張冉公劉三范溪李二又名李三閻登雲共十五名未獲現在嚴拏務期獲解再晋省咨拏陳桂供出之殷道士有三百多歲在濟源縣南窑住併侯石仙臣隨即密拏去後濟源縣竝無三百多歲之殷道士止有關帝廟居住之尹道士年七十二歲巳於本年四月十二日病故復據懷慶府知府靳樹賢查明病故是實亦無侯石仙其人止有一侯述先雖字音相同却係務農村民現在飭審確實移解又經臣委據開封府知府陳世倕㑹同懷慶府知府靳樹賢將資助放走楊廷選之河內縣武生楊廷敬併伊兄楊廷棟提至省城隔别研訊據楊廷敬供出楊廷選與陜西興安州鎮臣劉世明併劉世明之弟劉錫瑗素相交好於本年六月二十八日前往興安州任所投劉錫瑗等語又據楊廷棟首供羽黨濟源縣人周敬菴李渭南翟明逺尹道士河內縣人孫茂先顧清宇胡無瑕郝老二孫仁文王孝貽張其相劉錫瑗王綕孫龍文侯榮先馬靜逺等十六名俱係楊廷選糾約為匪之人臣即一面備文選差辨員令其星赴興安州鎮臣劉世明任所密拏楊廷選劉錫瑗務獲解晋收審併移咨川陜督撫諸臣轉飭協拏一靣嚴飭懷慶府知府靳樹賢星夜馳回懷郡密拏周敬菴等務獲今據該府靳樹賢報稱內除周敬菴即周叔方巳經拏獲解晋收審惟翟明逺一犯於本年五月十七日往鄧州未回巳行文選差密赴該州緝拏務獲去後其餘各犯俱巳全獲現在解交開封府與楊廷棟楊廷敬質訊是否楊廷選糾約為匪之人再行移解晋省收審除俟拏獲楊廷選各犯另行奏聞外所有豫省准咨獲犯名數理合繕摺奏聞仰祈聖鑒謹奏好此案人犯竭力緝捕毋令一名致有兔脫硃批諭㫖卷一百二十六之十欽定四庫全書硃批諭㫖卷一百二十六之十一硃批田文鏡奏摺雍正五年九月十一日河南總督臣田文鏡謹奏為恭謝天恩仰祈聖鑒事竊臣於雍正五年六月二十四日據辦河南塘務臣標把總張務信禀聞欽奉上諭田文鏡自簡任巡撫以來忠正為國實心盡職整肅官方所屬下僚咸被化育懲戒凶惡撫恤善良誠能盡教養之道豫省吏治整飭衆所悉知且辦事熟諳操守廉潔凡有陳奏知無不言言無不盡毫不隱諱其誠心更屬可嘉將伊撥在上三旗以示朕厚待賢能大臣之至意欽此又本年六月二十八日據把總張務信禀知奉內閣大人富寧安等傳奉㫖意著問巡撫有家人在京沒有前有㫖意著歸入上三旗問巡撫情願入在那一旗那一箇佐領下等因臣即備具說帖併囑令家人禀明大人轉奏於本年七月二十八日又據把總張務信禀開欽奉上諭田文鏡伊兄弟子姪共十一人俱著歸正黃旗欽此臣伏讀之下不勝感激涕零失聲哽咽伏念臣以一介庸材謬膺封疆重任五年以來無事不仰䝉聖恩諄切教導臣雖時懷兢惕敬謹奉行然而質本庸愚力多未逮實不足以𢎞宣聖德廣布皇仁間有芻蕘實同蠡測即時敷奏無異管窺乃䝉皇上天恩嘉臣盡職錫賚頻頒溫綸疊沛榮封臣三代祖父既䝉曠典於從前賞入上三旗子孫復邀殊恩於奕世并命臣自擇旗分將臣弟姪十一人俯允所請盡賞入正黃旗自古臣工從未有受恩深厚若此者臣惟有愈竭駑駘益殫血誠并囑令臣弟姪交相奮勉共圖仰報天恩於萬一耳臣緣未准部文不敢冒昧具本奏謝所有微臣暨闔家大小感深刻骨私忱理合先行恭摺奏謝仰祈聖鑒為此謹奏部文到日具本奏謝可也君臣之際恩義兼崇一切衷曲皆當剖析直訴朕甚嗔汝為何不以實告今春楊文乾在京朕偶爾言及汝之勤勞思酬以殊恩伊因奏汝有此心事云云既可抒情於僚友乃不可陳情於君父耶嗣後更有為難不得巳處愼毋如是含而不吐同日又奏為欽奉聖訓據實覆奏事雍正五年八月二十八日臣家人齎回臣覆奏雨澤摺內欽奉聖諭於月之十六日朕進宫齊肅虔禱自當晚直晴霽至今以故收穫一無阻礙隄岸潰決處乘時修補亦不至為大害復一面遣官數路查賑被水窮黎巳俱各安業實仰賴天心轉災為福方能有此嘉貺朕慶幸感戴之心莫可言喻欽此我皇上格天之誠捷於影響愛民之念過於生成不但直省士民感堯天矣又於臣覆奏汛水平穩摺內欽奉聖諭霜降水落方保無虞以後可稍寬懷矣欽此我皇上軫念民生無時無刻不以豫省河防上厪聖懷臣每奉諭㫖即協同副河臣嵇曽筠益相勸勉併嚴飭管河各官竭力修防幸今霜降巳過一切堤掃工程俱各平穩豫省臣民莫不歡欣感激咸謂我皇上至誠感孚以致奏請疏濬水利摺內欽奉諭㫖此議甚好允係應興之役從來水利為農民第一要務不獨中牟為然舉凡類斯宜疏宜濬河道逐處周詳籌畫具奏以聞切毋惜費如爾地方上力有未逮朕自發帑修治欽此臣䝉皇上天恩畀以封疆重寄蒞任之始即於飭行水利事案內嚴飭各屬凡有應修水利令其合力疏濬毋致流沙壅積有礙民田嗣據各屬陸續詳報俱各疏通水勢暢流內除田間溝洫道左通渠農隙之時應令地主自行疏濬外至於巨川大河地方上力有不能者業巳嚴飭各該地方官確查詳報今䝉奏請又於臣覆奏山西澤州妖言聚衆等事一案摺內欽奉聖諭此事於題本內巳有㫖矣又奉聖諭斯係要犯務宜擒獲欽此臣查楊副將一犯即原任濟源縣革職千總楊廷選臣不能預行查拏以致疏脫今䝉聖主𢎞慈不加嚴譴惟敕部飭行似此莫大天恩有逾高厚今據濟源縣報稱據澤州關拏假子秀任光先巳經拏獲解晉併准直隸拏獲翟丹桂書內之齊遂侯現在發司究出楊廷選實在下落務期必獲所有微臣奉到硃批諭㫖理合繕摺覆奏伏乞睿鑒併將原摺恭繳謹奏覽雍正五年九月二十五日河南總督臣田文鏡謹奏為請定稅契之法以杜姦弊事竊惟民間買置田房山場等産自應立時過户稅契但買主赴州縣上稅止用白紙寫契一張呈送該州縣於契載價銀數目上蓋印一顆即為稅契弊遂叢積夫小民希圖漏稅收匿白契竟不用印挨至地方官去任之時乞恩討情彼去任之官印信已將交出樂於徇情或圖得半價即與蓋印此一弊也凡愚夫愚婦未能識字者典賣田宅煩人代寫立契交價後買主即賄通代字之人另寫契約或多開價值令其難於回贖或以典作賣希圖永為已業此一弊也民間每年買賣田房地産不計其數小民之匿契漏稅者州縣無從稽查州縣之徴多解少者上司亦無從稽查此一弊也甚而姦胥猾蠧私收稅銀描模假印蓋於紙上下以欺民上以朦官此一弊也由是而有布政司頒給契尾之例凡稅契時州縣即將契尾粘連於民間契約之後鈐蓋縫印以杜其弊法至善也而不知弊又從此而生布政司僃此契尾之時不無刋刷紙張用印油紅之費州縣領此契尾之時不無差役路費司胥飯食之資此一張契尾頒到州縣價已昂貴自不得不取償於買主是以每張契尾勒索三五錢不等交易重大契內載有盈千纍百之價者自不惜買此契尾之需但民間大産大價歲有幾何其餘多係零星交易甚有地不過數分價不過數錢者每兩止抽稅三分其上納正稅不過數釐而買此契尾且逾百倍是以裹足不前寧甘漏稅之愆此一弊也且州縣官每年所收稅銀實不肯全行起解為其所侵肥者十常八九如每契必用司頒契尾則不能隱匿無從染指是以州縣官將司頒契尾領過一次用完之後不肯再領民間投稅印契者仍止於契上銀數蓋印或用硃筆於契內標注契尾候補字樣在小民愚賤無知惟以地方官為主既有印信可憑且有硃標作據即視司領契尾為可有可無之物雖或因買賣不明爭執涉訟當官驗契在州縣亦惟以契內有印無印辨其是非決不以契後有尾無尾定其曲直判斷自由以護其不給契尾之短此一弊也再契尾價貴則價輕稅微者自難令其買置契尾因而有稅銀五兩以上者方給契尾之陋規其餘槩於契上用印此一弊也有此數弊臣再四思維幾至無法欲民間槩用契尾價輕稅微者實有難堪欲州縣盡給契尾徴多解少者皆非所願臣愚以為與其使布政司頒給契尾不如使布政司頒給契紙與其令民間不論稅銀多寡俱用契尾不如令民間不論價值重輕俱用契紙此去其契尾之名而仍不失乎契尾之實者也臣請自雍正六年始民間買置田房山場産業概不許用白紙寫契布政司照連根串票式樣刋刻契板刷印契紙每契一紙用一契根契內書立賣契某人今有自巳户下或田或地或山或房若干頃畝間數憑中某人出賣於某人為業當受價銀若干其業竝無重疊典賣親鄰爭執情弊等字樣仍於契中空處開明四至年月其姓名數目四至年月聽本人自行填注契根照契紙內字句刋定中空一條編填字號即於字號上鈐蓋司印一顆恐州縣領此契紙司中勒索民間買此契紙州縣居奇亦即於契紙年月後刋定每契紙一張州縣賣錢五文解司以為油紅紙張之費毋得多取苦纍小民字樣每契百張釘作一本布政司查照州縣之大小地畝之多寡四季印發即於署內用印連根封固從鋪遞發給州縣不必經司胥之手仍將發過數目報明督撫查考州縣將契根裁存該房止將契紙發各紙店聽民間照刋定價值買用仍將收到司契日期數目申報督撫查考再另用印簿一本并發紙店凡有買契者俱於簿內注明某月某日某人買某字號契紙一張其有寫錯無用必須另換者俱令將原契紙交還紙店繳官送司塗銷俟民間交價立契之後過户納稅之時并契紙送入州縣即發房照契填入契根於價值之上蓋印仍於契內空處填寫某年月日上稅若干用印訖字樣發給納户收執其契根於解稅時一併解司核對如州縣於契根上少填價值稅銀者查出參追照侵欺錢糧例治罪若將司領契紙藏匿不即發店聽民買用或賣完不預赴司領給使民間仍用白紙寫契及縱容書役紙店昂價纍民至布政司不即印給以致州縣缺少契紙并縱容司胥苛索者督撫查出題參聽部定例議處若民間故違仍用白紙寫契者向買主追産賣主追價槩行入官仍照漏稅律治罪倘州縣將白紙私契用印者亦照侵欺錢糧例究追其雍正五年以前已經納稅用印者許令呈明存案免其另換司頒契紙未經納稅者不准呈明補印作漏稅究治如官民通同作弊將雍正六年後所買田産移作雍正五年以前年月仍用白紙寫契用印者許賣主告發追還原賣之業其價免追官吏買主仍行治罪如此一轉移間則一切陋弊可以盡除永杜矣是否臣言可採伏乞皇上睿鑒施行謹奏稅契一事指陳利弊可謂剖析無遺但朕自踐阼以來為百姓興除之條陸續頒發者難更僕數各省督撫中或因循觀望而敷宣不力或竭力遵循而施措未遑所以壅積者多通行者尚少今契紙之議名為稅課有賦斂之嫌且遍行直省一體更張而天下督撫尚未盡得稱職之人州縣半屬初任新吏恐奉行不善辦理乖忤徒滋紛擾耳將此摺發回存留爾處俟後相度時宜有可行之機具奏請㫖可也同日又奏為欽奉聖訓據實覆奏事雍正五年九月十七日臣家人齎回臣恭報晴雨汛水一摺欽奉硃批諭㫖歲功河防兩俱告慶朕心不勝欣慰之至自春徂秋三汛既暢流無阻河泓又復刷深幾許耶隨便查奏以聞欽此臣伏查今歲全河暢流河身比上年更加刷深臣時刻在念敢不亟為奏聞上慰聖懷但豫省黃河綿亘千里自當查驗確實何敢冒昧入告今查據上南河同知托克托海署上北河同知鮑學沛所屬鄭州滎澤陽武中牟四州縣河泓現今刷深自五六尺起至一丈四五尺不等較之上年各州縣河身更加刷深二三尺至一丈一二尺不等下南河同知劉永錫下北河同知張近光所屬祥符陳留蘭陽儀封四縣河泓現今刷深自八九尺起至一丈三四尺不等較之上年各縣河身更加刷深三四尺至五六尺不等署歸河通判李槃所屬考城商邱虞城三縣河泓現今刷深自一丈四五尺起至二丈不等較之上年各縣河身更加刷深六七尺至一丈三四尺不等其各處最深處所竟有刷深至三丈七八尺及四丈二三尺不等臣於本年九月二十日據管河道祝兆鵬禀報前來與臣查勘無異從此河泓日深河岸日高將見水由地中自可永慶安瀾此皆我皇上至誠上格之所致也所有河泓刷深緣由理合遵㫖據實覆奏仰祈聖鑒謹奏河身較前更深固屬可喜可慶之事然尚須加意防護過兩三年後無虞方敢釋懷也同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣具奏山西澤州妖言聚衆等事一案摺內欽奉諭㫖好此案人犯竭力緝捕毋令一名致有兔脫欽此臣查此案人犯內除巳獲解晉之翟神仙即翟斌如等二十二名業經節次恭摺奏孫葛仁孝亦巳解晉其前獲解交開封府與楊廷棟楊廷敬質訊之李渭南亦係案內為首要犯并郝老二王孝貽張其相王綕孫龍文侯榮先以及前往鄧州未回密差拏獲之翟明遠與楊廷選往來之齊隨侯假耀彩窩藏李三等之梁作舟伊子棟等前供拏獲之孫茂先顧清宇胡無瑕孫仁文馬靜遠等五名堅供雖與楊廷選認識並未交結覽同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣為預懇聖恩摺內欽奉諭㫖覽奏已悉豫省人員為朕所選取另用於他省者原屬過多然率皆以州縣牧令擢升郡守監司非以原品原職對調也今既據奏懇俟二員到京引見後李鍾璠自仍發還於爾劉永鐄若才具果好諭部加銜亦發回豫省供爾驅策欽此我皇上四海九州視同一體東西南北惟君所使且將豫省州縣皆以道府擢升又以臣能教訓屬員特㫖奬勵臣巳感激涕零又何敢以河南人員私為巳有但臣實才智庸愚惟藉一二熟悉風土能員以聖諭不覺感泣失聲益深惶悚又於臣具奏固始縣長興集站馬巷二處被水摺內欽奉諭㫖於通省中雖止兩村被水然災咎之來民命所關理應戒愼也又奉諭㫖似覺太少又奏諭㫖被淹如許名口深堪憫惻嗟此災黎橫遭無辜皆緣朕與卿等不能綢繆於早之所致經歷一番後須查通省內如有類斯可虞之處俱當預為區畫消患於未然司庫所存耗銀正宜於此等事務動用也巳有諭㫖頒下又奉諭㫖通盤計算固不成災無庸具題若據彼一家一村而論則巳被十分災矣其苦何可勝言此等户口宜密囑該州縣停免徴比竟動撥耗羡代為抵補錢糧斯為善舉事雖越例不妨記明朕㫖存案即一面飭諭該司遵奉施行又奉諭㫖料理雖屬合宜恐又不免諱災之論耳朕於所降諭㫖內略帶數語發出時爾自得知悉欽此仰見我皇上軫念民生勤求僃至煌煌天語剴切詳明但臣伏查該縣境內止有長興集站馬巷二處被水且水勢來快退速雖房屋人口一時未及防僃不無漂失而所種稻禾水退後收成尚好不至成災臣亦誠恐所發二千兩之數或有不敷已於南汝道孫蘭芬臨行之時令其暫為湊墊實一夫失所在案除俟該道等查明賑恤得所詳報到日臣謹當仰體聖懷悉心斟酌另摺覆奏外所有奉到硃批諭㫖合先恭摺覆奏仰祈睿鑒謹奏覽雍正五年十月二十六日河南總督臣田文鏡謹奏為恭報瑞雪仰慰聖懷事欽惟我皇上敬天勤民重農務本至誠昭格四海巳䝉豫大之休聖德覃敷萬方復荷盈寧之慶不但二麥三秋歲歌大有而且五風十雨疊著奇祥兹據開封等八府暨汝鄭等七州併所屬各州縣報稱雍正五年十月初四日同雲密布瑞雪繽紛積厚自二三寸至四五寸不等又於十月二十二十一等日天降瑞雪自六七寸起至一尺餘不等四野均霑高下普被土膏滋潤麥根深固黃童白叟莫不歡呼踴躍以為預兆豐年羣歌聖德臣生逢盛世幸際昌期不勝歡忭所有豫省普降瑞雪日期理合繕摺奏聞恭慰聖懷謹奏直隸普降瑞雪正深慶幸覽奏豫省得雪復如是優渥朕懷欣慰何似同日又奏為據實奏明仰祈睿鑒事竊照政務殷繁全賴庶司分理封疆重大更期臂指交資臣查布政使費金吾心地明白才更歷練聽其言論觀其辦事尤長於聽斷至於操守則皇上用人之允當也升任按察使彭維新心地人品如精金美玉初到豫省時因未任外官驟膺廉察聽其言論觀其舉止似乎茫無適從然學問本深才猷本具又能謙以受益勤以勉求不數月而大改從前刑名一道竟能領略深微今䝉皇上升授浙江布政使再歷練以錢榖可謂全才至於操守天生廉介不足為該司稱道但性稍拘方心多疑慮是以案牘常有稽遲屬員無暇接見該司皇上得人慶也新任按察使李秉忠臣觀其人忠誠朴實聽其語言亦似明白但係初膺外任諸事更覺茫然無所措其手足且於漢文不甚通曉李秉忠到任時謹傳皇上諭㫖令臣教訓學習臣雖至愚極陋一無所知敢不竭力教導時刻提撕然通省刑名關係重大微有不愼則上干識見頗有而心直口快性復躁急好任巳意每一啓口輒與例背經臣屢行誡飭故該道自到豫以來不敢獨行其見該道雖管理通省糧鹽驛站却仍分守三府五州地方臣見其專意於辦漕竝不原係禮部主事隨副河臣嵇曽筠到工協理河道事務臣見其操守耿介辦事勤勞題補河北道䝉皇上逾格升補該道感激天恩力圖報效又因河北守道一缺係久裁復設凡事俱須整頓該道可謂奮不顧身數年以來一塵不染任勞任怨毫無瞻徇臣深藉為臂指無如毁謗紛紛竟成孤立總因河北三府久無道員管轄今復設此缺該道又復精勤郡縣不能自由遂騰物議以青蠅而汙白璧臣甚為出身與朝廷辦事者危而不獨為該道恨也臣勉其不得因此改轍灰心況白才具亦優其操守一節聖明在上亦可信其無他第該道從前性少褊急略涉皇上不加罷斥補授開封府知府該府感激天恩力圖報效且經此兩番蹉跌三折肱後遂成良醫臣每加訓誡該府受恩獨深檢身宜謹此番再有微疵罪即莫逭該府自知通省稱神如此歷練老成之才若令其久任刑曹必多平反民自無寃但人心無欲而自剛事不徇於煩劇郡守也以上各員與臣同事二三四年不等臣知之甚深因念皇上以堯舜之心而治天下則首在於得人微臣以犬馬之私而報盛矣伏乞睿鑒謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正五年十月十八日臣家人齎回臣覆奏山西澤州妖言聚衆等事一案拏獲靳廣等犯摺內奉有硃批諭㫖臣跪讀之下仰見我皇上至聖至明無微不照而睿慮周詳則又無遠勿屆至於此案人犯臣無時無刻不留心察訪復遍懸重賞挑選捕役捐給盤費嚴飭所屬文武官辨協力嚴拏恨不能即時擒獲以副聖懷而劉世明將伊弟劉錫瑗拏解之時竝不追問一語臣疑劉世明身受皇上殊恩不應不向伊弟追問楊廷選下落非敢疑其身為此不法之事也今䝉皇上明白訓示仰見我皇上量同覆載明竝日月但此等匪類誠如聖諭乃豫省之一大害祇緣臣自愧庸愚既不能察訪於機先復不能嚴拏於事後以致上厪聖懷自此事發覺以來至今寢食靡寧惶悚無地今楊廷選一犯臣復飭河北鎮臣紀成斌懷慶府知府靳樹賢查明認識楊廷選之兵民俱各挑選數十名分發通省所屬文武各衙門令其作眼協同各屬兵役現在四路屣緝且近訪得楊廷選暨閻登雲二犯濳匿魯山縣所屬之史家溝山內臣已遴委臣標左營守僃白琦等密授以搜拏之法星夜前往㑹同該地方官逐處協力搜查務獲解審如該犯果係在彼濳匿斷無不獲一俟拏獲之日臣即繕摺奏聞再臣查假八年王君祿李小喜三名巳經續獲解晉收審訖其與楊廷選往來齊隨侯之子齊依禮亦經直隸押解晉省收審外至未獲楊廷選焦養祿申三衛智樊百川衛四聞姓張冉公劉三范溪閻登雲翟姓郎裁等一十三名又於本年十月二十二日准山西撫臣石麟咨拏翟斌如周三供出之假懋德陳有章楊慶侯李子昂王天乙茹璧何其攸閻西奇陳靜菴馮哲裴方來黃德恆曹貴汀馮智等一十四名臣隨即嚴行按察使密飭該地方官㑹同晉省委員把總郝廷璧星夜查拏去後今據懷慶府報稱所有咨拏之假懋德陳有章楊慶侯李子昂王天乙茹璧閻西竒陳靜菴馮哲裴方來黃德恆馮智等一十二名俱巳拏獲惟何其攸查係直隸天津州人濟境竝無蹤跡曹貴汀於未奉文之先已往衛輝府業經選差分頭密拏去訖等語除何其攸一犯臣現在移咨直隸督臣轉飭查拏外所有巳獲之假懋德等一十二名復經臣轉飭訊取確情交給委員并選差兵役嚴押解晉收審其曹貴汀一犯以及楊廷選等各犯臣俱現在遵㫖一一料理竭力擒捕務期必獲解晉收審斷不敢視為多事株連稍存懈弛之念自干罪譴也所有奉到硃批諭㫖理合恭摺覆奏仰祈聖鑒謹奏緝捕有方則姦匪何能漏網所奏嘉悅覽之同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣覆奏河泓刷深一摺奉有硃批諭㫖臣查黃河水勢消長靡定但河泓既深自可永慶安瀾乃皇上敬愼為懷無時或釋諄切奏請更定稅契一摺奉有硃批諭㫖臣跪讀之下仰見睿慮周詳實非臣之愚昧所能仰企萬一者臣謹欽遵諭㫖將奏摺底本加謹收存俟有可行之機另奏請皇上硃批諭㫖不敢復為奏請惟有嚴飭各屬遵照部文奉行現在經臣覆奏仰祈聖鑒又臣覆奏請留李鍾璠劉永鐄等一摺奉有硃批諭㫖臣伏思豫省如無知府缺出自應遵㫖將現任知府中甄别奏請皇上將劉永鐄擢補今既有南陽府一缺臣前准部咨欽奉上諭劉永鐄著加知府銜回原任令臣酌量天心合併覆奏謹奏覽雍正五年十一月二十六日河南總督臣田文鏡謹奏為恭請訓㫖事竊臣一介庸愚毫無知識仰䝉皇上逾格天恩由布政使升授巡撫復加兵部尚書授為總督伏思臣之所以克供厥職得免隕越者實荷皇上聖諭頻頒并臣奏摺內屢奉硃批訓誨方能稍知吏治民生之事膺此封疆重任之難數年以來凡臣之章奏文告無一非仰體皇上聖心仰遵皇上聖訓敬謹敷衍以成篇牘至於董誡屬吏勸誨軍民凡於地方緊要事務不啻一而再再而三罄筆而長言之政期必行而禁期必止日積月纍久而成帙雍正五年八月三十日據布政使費金吾按察使彭維新以屬員之去留不常案牘之稽查難遍詳臣刋刻頒行臣查刻成小本彚聚裝釘置之案頭不時翻閲各屬新進書生於臨民蒞政之事不無小補臣隨自行捐資將臣自雍正二年九月初三日奉㫖署理巡撫印務起至雍正五年七月十三日奉㫖升授總督止所有巡撫任內行過事宜逐一檢挍分作章疏條奏文移告示四卷名為宣化録蓋謂奉宣皇上之聖化也先行刋刻今巳告成竊思臣之所行雖悉遵乎皇上訓㫖但因地制宜內中不無就豫省之所有者為之立言臣意見之所及者為之增出則是否得宜有無悖謬之處臣實不能自知其非亦不敢自信為是未敢擅自頒發各屬但臣伏念天心臣罪莫逭且臣䝉皇上殊恩畀以重任不能躬行實踐表率羣吏惟以言詞警䇿實屬具文臣罪又無可逃然而郅隆之代不廢文辭敷政之臣當欽奏請可否允臣所請容臣先行裝釘敬謹進呈御覽伏候皇上敕㫖遵行臣不勝悚惶兢惕之至謹奏覽同日又奏為欽奉聖諭據實覆奏事竊臣於雍正五年十一月十一日准兵部咨內開欽奉上諭此次西藏挽運糧餉所需馱騾著陜西河南山西三省各購買三千匹預僃於明年正月為始陸續解至西安交與總督嶽鍾琪聽其使用務於二月內照數解足欽此臣查從古以來國家凡有軍興大事均不能不取之於民惟我朝理財用人各得其道是以人和年豐庫貯充裕聖祖仁皇帝時凡有軍需悉動正項錢糧竝無派纍及民臣以為正賦之外又有耗羡原期以地方之公項辦地方之公事今查豫省司庫現積有耗羡銀兩儘可動用以公項而辦公事上不致動支正賦下不致派纍里民於節用愛人之道更為兩便臣隨酌量價值馱騾之價賤於走騾每騾一匹發銀一十四兩其價巳敷諭令各州縣分領採買以地方之大小定騾數之多寡庶幾衆擎易舉臣復嚴飭各屬毋得經由鄉約地方人等之手致滋派纍各州縣境內凡有畜養馱騾之家驗係臕壯力能負重致遠者即令牙行當官評定價值官為親看稱凖銀兩面給本人收領不得縱令書役牙行人等需索扣尅亦不得將老病疲瘸者塞責致誤軍需每騾十匹外多買餘騾一匹以僃挑選鞍屉籠頭照騾數齊僃陸續送省驗烙其附近陜西之各州縣所買騾頭臨時臣另委賢能道員赴河南府經由地方驗烙徑行起解西安至於解送騾頭沿途所需草料口糧臣議令每騾一匹日給草料銀一錢每騾二匹需夫一名每夫日給口糧銀六分每夫每月再給安家銀一兩五錢內除豫省經由州縣檄飭赴司領銀預僃俟解到之日如數給領并預僃槽䥷店房以免露處事完之日造冊報銷其自潼關至西安一路非豫省所屬應僃口糧草料臣現在咨明兵部并移咨陜西督撫諸臣轉飭沿途該地方官先為代辦俟豫省解員至日照時價發給買用并飭沿途文武官辨每騾十匹撥兵丁一名差役二名逐程遞送再飭管河道凡解騾經由道路橋梁恐有窄隘圯壞之處俱令修補寬濶完固過渡水口預為僃辦船隻勿致臨時等待仍遵㫖於明年正月為始陸續解至西安務於二月內照數解足不敢遲誤臣正在飛檄布政司逐一辦理間於本年十一月十二日復奉到怡親王劄諭內開雍正五年十一月初三日欽奉上諭目下西藏之事差大臣前往辦理其跟隨兵丁所用糧餉需騾馱運令山西河南各採辦三千匹著該督撫動支正項錢糧採買按價給發俾其足用不得絲毫派在地方纍及小民亦不許地方官員人等有捐助之事或存公銀兩有可動用者著動支應用在該督撫酌量可密寄信與伊等知之欽此仰見我皇上睿慮周詳體恤僃至臣惟有竭誠仰體時刻稽查務期按數採買絶無派纍軍需辦而民若不知公事竣而官皆無擾以仰副我皇上諄切垂訓之聖意耳除俟馱騾解足之日將用過銀兩另摺奏聞外合先繕摺覆奏仰祈睿鑒謹奏卿所料理定然妥協朕實確信無疑也同日又奏為欽奉聖訓據實覆奏事雍正五年十一月十九日臣家人齎回臣覆奏山西澤州妖言聚衆等事一案摺內欽奉諭㫖緝捕有方則姦匪何能漏網所奏嘉悅覽之欽此臣查此案人犯自發覺以來臣無刻不留心察訪設法嚴拏今於雍正五年十一月十四日准山東撫臣塞楞額咨稱楊廷選一犯於本年九月二十㫖明正典刑實臣之罪但巳遭冥殛可見叛逆之人無所逃於天地之間也再臣查節次准到山西撫臣咨拏各犯共四十四名臣竭力嚴拏內除楊廷選自盡殷道士即尹道士病故并續准山西撫臣咨稱質訊陳桂靳廣等供稱夥內竝無聞姓其人外已獲翟斌如等三十二名其未獲之焦養祿閻登雲申三范溪樊百川張冉公劉三翟姓郎裁等九名臣查焦養祿等九名原係山西人事發在逃臣現在遍懸重賞挑選捕役捐給盤費設法嚴拏務聖懷至於續准山西撫臣石麟咨拏翟斌如周三供出之假懋德等一十四名內除何其攸係直隸天津皇上諭㫖理合據實覆奏仰祈聖鑒謹奏覽同日又奏為欽奉聖諭據實覆奏事竊查固始縣長興集站馬巷二處被水一案臣據報即批令布政司委員履畝確勘果否成災并飭動庫貯公項銀二千兩發交南汝道孫蘭芬帶往確查實在被淹男婦分作三等加厚賑恤無致失所經臣恭摺奏聞今據布政司詳據委勘之商城縣知縣黃正煥詳稱遵即親赴固始縣地方逐一履勘所種田禾早者已經刈穫晚者亦巳結實雖微被水淹但水勢來快退速竝無損傷仍有七八分收成不致成災出具印結詳送到臣又詳據南汝道孫蘭芬報稱遵即親赴該縣被水地方逐處挨查共計被水貧民八百二十二户漂失男婦大小共一百六十八名口遵照分作三等親行逐户散給并計其人口多寡每户給銀自一兩至二三兩不等共賑過銀二千一百三十七兩零受賑貧民歡呼雷動咸祝萬壽無疆造具清冊詳報到臣臣查被水貧民生者既䝉賑濟業巳安全殁者倍加周恤瘞埋有藉且各於故地結茅築室廬舍依然田禾無恙未至成災錢糧可以照常完納無庸題請恩蠲但臣前奉聖諭通盤計算固不成災無庸具題若據彼一家一村而論則巳被十分災矣其苦何可勝言此等户口宜密囑該州縣停免徴此竟動撥耗羡代為抵補錢糧斯為善舉事雖越例不妨記明朕㫖存案即一面飭諭該司遵奉施行欽此臣跪讀之下仰見我皇上軫念民生聖懷但臣委南汝道孫蘭芬細加查勘實因江南六安地方發蛟蛟水驟漲來快退速不過從田上一過而固始俱係種稻水田水去之後無甚損減即一二畝被災無收之處亦屬無有無庸停徴彌補再臣查該縣河道現在委信陽州知州王鴻勳逐細確勘據禀此係沙灘溪河寬有二三百丈至四五百丈不等河身俱係活沙往往有深不可測之處忽漲為淺灘人馬可渡其兩崖離高灘尚有二丈餘不等崖上方係平地內始有民田從來即雨水過多之時竝未漫溢今歲實因江南蛟水暴漲以致下流河不能容詢諸耆民咸云自明代洪武年間起蛟發水曽經一次實非人力所能防禦是以無庸疏濬理合據實覆奏仰祈聖鑒謹奏既勘不成災自無庸代為抵納果無庸疏濬亦豈令强為施設也同日又奏為恭摺覆奏事欽惟我皇上乾行日健天心呼吸可通聖敬日躋神鑒感孚不爽誠意積九重之內典重明禋渥澤沛四海之遙惠周黎庶虔塑龍神法像欽命直省恭迎臣已於臣署之前卜擇吉地蓋造龍王廟宇敬謹供奉全豫士民歡聲雷動咸謂從此百靈助順五榖蕃昌億萬斯年永書大有臣現在天恩外雍正五年十月三十日恭逢皇上聖誕令節臣虔製萬壽龍鳯燈五掛以展犬馬敬主之私乃䝉特命奏事人傳㫖著臣將所進之燈敬懸新建龍神廟內以充供奉仰見我皇上殷懷民事崇祀聖鑒謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正五年十一月十九日臣齎摺家人回豫捧到皇上硃批臣摺於臣具奏布政使費金吾條內欽奉諭㫖費金吾第一疵病在不實二字若非爾如是督撫與之共事即布政使之任亦恐不宜欽此仰見皇上知人聖哲直察秋毫實不能逃聖明洞鑒臣每勸其公忠體病根也於臣具奏升任按察使彭維新條內欽奉諭㫖彭維新氣質和平資性明敏洵屬好材品但恐立志未堅不能擺脫科甲積習尚缺琢磨之功欽此仰見臣曽執手暗囑令其勉力圖報奏新任按察使李秉忠條內欽奉諭㫖所奏甚是原係庸平才具第取其胸襟淺直且甚顧惜顔面朕亦慮伊不勝臬司之任姑試用之耳欽此臣查李秉忠為人忠直和平聽其語言亦屬明奏驛鹽糧道楊夢琰條內欽奉諭㫖朕欲命伊久歷此任且不擢用以老其才今爾所奏殊未了然明晰或言此任亦弗克勝耶欽此臣查河南糧道一缺雖管糧鹽驛站并分守三府五州地方然事尚屬清簡楊夢琰尚可勝任伏讀皇上朕欲命伊久歷此任且不擢用以老其才之諭㫖仰見聖明洞鑒昭如日月該道肯讀書遵例不任一巳私見奏分守河北道朱藻條內欽奉諭㫖多方開導之可也欽此臣遵即諄切開導令其立皇上天恩於臣具奏管河道祝兆鵬條內欽奉諭㫖此人原無足取外貌可觀中殊不然實非大器巳將伊記名止於府道階級所奏與朕意相符矣兼恐多瞻徇惟圖支吾完事且不能克去已私未免偏於好惡於臣具見皇上天縱聖明洞鑒肺腑於臣具奏開封府知府陳世倕條內欽奉諭㫖陳世倕朕頗重之而漢人中每多不足於伊諒係與陳世倌判然兩途之故其才力甚有可取然大任恐難深信司道以下綽有餘裕者也又奉諭㫖恢恢遊刃又奉諭㫖實有其能又奉諭㫖從來如此又奉諭㫖形容逼肖其人心能如是則為可用之器矣又奉諭㫖爾之屬員縱有萋菲之言逹於朕耳斷無不向爾察詢之理他人何能中傷欽此我皇上評定羣臣如鏡鑒物秋毫莫遁臣細察陳世倕雖係陳世倌堂兄其居心行事實屬兩途臣亦素知該府為漢人所不足之故實因該府不瞻徇年誼臣曽據該府口禀通政使繆沅係該府同年曽說該府惟將幾箇同年送臣參劾以結臣歡心他如奏河南府知府張漢條內欽奉諭㫖果爾亦可謂賢太守矣又奉諭㫖朕不記憶其人才之長短殊未深知欽此臣查張漢原係翰林䝉硃批諭㫖理合恭摺覆奏仰祈聖鑒謹奏覽奏俱悉雍正五年十二月初十日河南總督臣田文鏡謹奏恭請皇上聖安朕安往復推遷歲聿云暮荷䝉天地眷祐聖祖恩慈四季安平較前更勝夙夜循省何德以堪仰承俯協且欣且懼同日又奏為恭逢正旦令節普天同慶事欽惟我皇上德嫓乾坤道隆參贊撫辰出政千百國共沐恩膏握紀敷猷億萬年永綿厯數景福與年華而共茂𢎞庥偕歲序以俱新臣恭遇熙朝欣逢令節覩陽春之普被抃舞彌殷慶化日之舒長𢋫揚恐後伏願乾行日健泰運𢎞開治躋時雍玉燭常調乎有道化臻風動金甌永固於無疆臣無任瞻天仰聖踴躍歡忭之至為此謹奏三元肇慶喜逢宇宙遍融和萬物維新遙矚江山增秀麗顧兹黎庶共躋春臺凡百臣工同膺景福朕意如斯而巳矣同日又奏為恭報瑞雪仰祈睿鑒事竊查豫省自雍正五年入冬以來共得瑞雪三次俱皆積厚普遍業經臣節次恭摺奏聞今又於本年十二月初五初六等日同雲密布瑞雪繽紛黃童白叟共慶豐年巷舞衢歌咸蒙聖德臣職任封疆幸逢嘉㑹歡忭之下復不勝凛惕所有豫省復得瑞雪日期理合繕摺具奏恭慰聖懷謹奏瑞雪頻霑歌豐預兆我君臣真堪共慶也硃批諭㫖卷一百二十六之十一欽定四庫全書硃批諭㫖卷一百二十六之十二硃批田文鏡奏摺雍正六年正月十一日河南總督臣田文鏡謹奏為欽奉聖訓據實覆奏事雍正五年十二月二十二日臣齎摺家人回豫捧到皇上硃批臣摺於臣覆奏布政使費金吾條內欽奉諭㫖人原聰明能知改勉即是矣欽此仰見我皇上知人善任超越千古臣惟有竭力勸勉令其痛自悛改而巳又於臣覆奏升任按察使彭維新條內欽奉諭㫖果若斯則善矣欽此又於臣具奏按察使魏定國條內欽奉諭㫖魏定國前於萬壽節來京應對之間委屬不妥殊覺陰黠虛僞之至欽此臣查魏定國居心狹詐行事剛愎且凡遇科甲出身之員類多瞻徇臣伏讀奏按察使李秉忠條內欽奉諭㫖未諳律例難稱提刑之任自當另用通省政務殷繁汝豈有暇為訓䝉孰師耶欽此臣伏查按察使一缺關係綦重今䝉如巡察户科臣張元懷䝉皇上升授廣西按察使臣查張元懷在豫兩年於刑名於臣覆奏驛鹽糧道楊夢琰條內欽奉諭㫖若教而不改具奏以聞欽此臣查該道洵屬實心任事之員若委以一差一事彼亦勞苦不避惟不到今奉諭㫖謹當竭力教導令其自勉若始終不改臣再據實奏聞伏候聖裁又於臣覆奏南汝道孫蘭芬條內欽奉諭㫖於此一任尚屬克稱欽此臣查南汝道一缺孫蘭芬實能勝任又於臣覆奏開封府知府陳世倕條內欽奉諭㫖陳世倕原好漢臣中似此實心任事者頗少大抵肯實心任事遂不為同類所取不知何故然漢臣中之實心任事者每缺涵養之功率具狂傲之性亦屬大竒欽此漢人多由科目每以年家世誼師生情分為重一有瞻徇之私即萌退諉之念是以實心任事者絶少其人至於缺涵養者學問未到多狂傲者生性過剛皆於事無濟惟仰藉聖明知人善任而巳又於臣覆奏河南府知府張漢條內欽奉聖諭一府之事猶能了否欽此臣查河南一府統轄十一縣地方極為遼濶張漢惟優於德而絀於才到任以來不過奉法惟謹而已於府任原未甚宜臣也所有奉到皇上硃批諭㫖理合恭摺覆奏仰祈聖鑒謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正五年十二月二十九日臣家人齎回臣恭請聖安摺內欽奉諭㫖朕安往復推遷嵗聿云暮荷蒙天地眷祐聖祖恩慈四季安平較前更勝夙夜循省何德以堪仰承俯協且欣且懼欽此又於臣恭賀正旦令節摺內欽奉諭㫖三元肇慶喜逢宇宙遍融和萬物維新遙矚江山增秀麗顧兹黎庶共躋春臺凡百臣工同膺景福朕意如斯而巳矣欽此又於臣恭報瑞雪摺內欽奉諭㫖瑞雪頻霑歌豐預兆我君臣真堪共慶也欽此仰惟我皇上敬天故天心默佑皇上法祖故聖祖垂休福耀光昭合之四時而皆吉乾行日健較之往歲而更安臣欽承諭㫖不勝歡忭臣查豫省又於雍正五年十二月二十九三十等日復降瑞雪積厚自三四寸起至五六寸不等四野均沾高下普被士農工賈咸謂豐年有兆莫不歡欣踴躍感激皇仁合將原摺一併恭繳謹奏去冬之雪接續頻仍豫地固屬優渥而直省亦普蒙霑潤誠可謂浩蕩天恩朕心曷勝感慶而倍加敬畏靡已也雍正六年二月初三日河南總督臣田文鏡謹奏為遵㫖密議據實覆奏事竊臣於雍正五年十二月初十日接准怡親王暨户部尚書臣蔣廷錫來字內開雍正五年十一月二十八日奉上諭爾等可密寄信與河南山西山東三省督撫每省於步兵內挑選二千人以僃明年秋冬調遣其人須揀老實壯健不必長於弓馬但可以僃駕車開墾等事之用者若步兵不足即於馬兵內挑選著三省督撫密密㑹同商議辦理此所挑兵丁在外差使大約以二十箇月內外為期其應給安家之費及行裝衣服等項俱令該督撫富足給與至起身之後自有官給錢糧此信到日著伊等預先密為料理一切俟明年諭㫖遵行欽此又於雍正五年十二月二十二日接准怡親王暨大學士臣張廷玉户部尚書臣蔣廷錫來字內開前所寄挑選兵丁之信原奉上諭有不必長於弓馬但能演放鳥鎗并可以僃駕車開墾等事之用者寫信時少寫能演放鳥鎗字樣兹特再信知照總督可密行㑹同山西山東巡撫遵奉挑選可也奉此臣遵即先後密行寄字與山西山東二省撫臣㑹商在案兹臣伏查豫省奉撥之兵擬於臣標內挑選二百名南北兩鎮標內各挑選九百名以足二千之數除弓馬不必論其優長外務期能演放鳥鎗并老實壯健可以僃駕車開墾等事之用者但為期尚早未敢預泄臣惟面囑兩鎮令其密行挑選造具花名清冊存案俟欽奉諭㫖到日敬謹奉行至於安家銀兩臣謹遵以二十箇月內外為期之聖諭每名酌給銀三十兩巳比月糧量加盈餘俟臨行時如數封發各營使與挑之兵用度饒裕咸知皇上恩恤其家一至如此之厚途中自必更加勇往但銀兩到手又恐易於花消俾二十箇月內家口乏用似應分作四分臨行時先給一分將三分當面衣服等項臣查行裝可以畫一製僃而衣服必須衣服逐件開單一併給發令其自行製僃完畢仍令照單送驗庶易於完僃也再查兵丁各有鳥鎗鍋帳房應照營內定制每兵五名共給各一件每騎坐臣再查兵丁係各營挑選彚集若不委官管領任其散行恐途中不能遵守紀律似應照依營中舊制預行酌量派委平日管轄之官或遊擊或都司或守僃并千總把總領旗等數員率領前行上諭㑹同三省督撫諸臣密商事理合將商議辦理情形先為恭摺密奏但臣等智識短淺是否合宜伏乞皇上訓示遵行謹奏覽同日又奏為恭報雨澤仰慰聖懷事竊查豫省自雍正五年入冬以來屢得瑞雪經臣節次恭摺奏聞今據各屬具報於雍正六年正月十二十八等日春氣融和蒸成膏雨自三四寸起至五六寸不等通省均沾高下普被從此五風十雨年榖順成千倉萬箱黎民樂育臣生逢盛世幸際昌期歡忭之餘愈深敬畏所有豫省得雨日期理合繕摺具奏恭慰聖懷謹奏覽奏得雨日期深慰朕懷同日又奏為錢價之不平有由小民之銅器有限收銅之法則宜分仰祈睿鑒事竊照制錢係流通國寶民所必需銷燬則罪在當誅法所不赦我皇上念切閭閻務期錢文日多錢價日減以便民用恐無知小民將制錢私燬打造黃銅器皿屢頒上諭禁止藏匿私用復發帑收買并准民間交納黃銅器皿抵作正賦錢糧著户部詳議具奏等因欽此仰見我皇上欲求錢文豐裕使小民易於資生免致乏用諄切詳明至三至四務令法在必行事期有濟臣荷蒙皇上殊恩畀以封疆重任敢不仰體天心實力奉行但皇上為民裕用之聖諭久巳宣布民間無不共仰而閭閻市井鄙瑣委曲之民情不能上逹請為皇上敬陳之不藉於錢桌之販運至於錢桌販運原為圖利利之所在人方爭趨錢止數千尚可手提肩負多則須騾馱車載矣水路則須舟船裝運矣其腳費皆錢桌所出猶有串索麻斤人工飯食店租牙用俱而利即在此錢文之中譬如以銀一兩易錢一千換之於彼即權子母必不肯聽彼仍以銀一兩易錢一千矣再易一手其利即倍夫國家制錢每一千文作紋銀一兩無人不知然小民散處各省不能盡赴寶泉寶源二局以銀易錢是豫省而言省城換錢紋銀一兩得換錢九百三十文省城之外即便減去遞推遞遠至外府州縣村食或收花利俱係錢文自數十千至數百千不等藏之於家經年纍歲不即發換直有貫朽索壞者星押出比換錢更貴鹽商字號大店之錢竝不零換必須錢桌整兌價銀一總發運流通不速而錢國家鑄錢幾經費手而後成乃一旦棄擲於不可復與人角口使氣將錢文拋撒屋上水中者告發到官先責其拋撒錢文之罪再理曲直如此立法亦平錢價之一助也一小民之銅器有限宜專責之官紳富户也黃銅器皿除樂器天平等子法馬五斤以下之圓鏡不禁外其餘銅器民間槩行禁用臣查小民之家所用不過碗大銅鏡又在不禁之內外則不過洗面之盆銅鎖煙袋鈕扣等件而巳至於别項器皿非富户不僃臣嘗見巨室富家其門環門轉與夫木器之篐錠包鑲俱用黃銅誠不可以不禁但禁止之器人多愛惜而下此零星小物分兩不重又難交官若挨户搜查未免滋擾如勸令交官則多觀望且官紳富户俱係深房大屋內中私自擅用鄉地鄰佑不但無從而見并無從而知更有一等無知之人但知愛物不知畏法因家道富足日用不乏不專等此銅價買僃什物將舊有黃銅器皿悉行藏埋不用亦不交官惟另置别銅器皿以為吾巳遵法此誠法有所不能及者臣查此等之人家民如無確據仍照誣告家主律治罪如此立法則官紳富户所用奴僕衆多人心難測恐其出首必盡將銅器交出官買領價或不敢於藏埋觀望矣一收銅之法則宜分未可額定一例也蓋黃銅有攙和鉛斤性砂而硬即所謂生銅也至於古銅則光怪陸離發成斑㸃此等器皿其價原貴傳代已久或為民間世守之物自應免其交官又有一種雖係近日打造器皿然精巧完固竝無磕跌破損其自數斤以至數十斤重大器皿交官不難官為稱收發價亦易至於零星銅器如煙袋銅鎖鈕子帶扣等物聚之一處則多而重分之四散則少而輕小民即欲交官而一家銅器有限輕不過數兩五釐九毫四絲四忽雖分别二等價值但黃銅水銅板銅餅即已成器而新造不堪者即宜防其係銷燬制錢所鑄收銅各官便當加意盤詰照成色確估并不宜給以部定之價尚須核減一二分方可以杜絶銷燬制錢之弊其零星銅器小民難於交官者或阻於路遠而不能來或畏懼官衙而不敢來其銅雖屬無多若仍留之民間不盡交官則民間仍有黃銅器皿以致新舊混淆無從識别非價如此行之又未必非收買銅斤之一助也臣受恩深重力圖報效不揣冒昧敬獻芻蕘是否有當伏乞皇上睿鑒施行謹奏念汝條分縷析獻言之誠朕詎惜筆墨之勞不以諄諄示汝總之除遏止販賣銅器杜絶銷燬制錢察緝私鑄外其餘要在因地制宜相機時措庶幾情法兼到近來錢法甚有徴效京師目下市價每銀一兩可易九百餘文矣俟各省購辦銅斤饒裕一同鼓鑄制錢十分充足時再將雜錢徹底沙汰則私鑄之弊不禁自息矣爾等直省督撫但恪遵諭㫖實力奉行數年後可冀錢法大清若汝等泛泛從事則朕不敢言其必效也同日又奏為遵㫖恭進御覽事竊臣奏請進呈宣化録一摺奉有硃批諭㫖臣跪讀之下不勝歡欣感激隨即敬謹刷印裝釘恭呈睿覽伏念臣一介庸愚毫無知識䝉聖主天恩畀以封疆重任五年以來無事不仰䝉皇上諄切教導雖臣録中所載悉本皇上之聖訓奉宣皇上之聖化但言詞俚鄙文義粗疏實不足以仰體天心恭為闡發伏乞皇上宥臣之愚寬臣之罪特加訓示俾臣得有遵循免致隕越則感沐聖恩永無紀極矣遵將宣化録五冊敬謹隨摺恭進仰祈睿鑒謹奏冊留中政務餘暇覽畢有㫖同日又奏為恭報馱騾解足日期仰祈聖鑒事竊查豫省應買馱騾三千匹業經臣將辦理起解情形恭摺具奏今查據開封等八府汝陳等七州并所屬各州縣共購買馱騾三千匹自雍正五年十二月二十六日起至雍正六年正月十五日止委官懷慶府通判高士鑰等陸續起解俱巳截數解足臣查所解馱騾極其臕壯均堪負重致遠且臣再查各屬莫不奉法急公爭先購買竝無絲毫擾民歡聲載道此皆仰䝉我皇上體恤臣民周詳訓示之所致也除動用過銀兩數目容俟解員掣獲批收回省之日臣另摺具奏外所有解足馱騾日期合先繕摺具奏仰祈聖鑒謹奏又被屬員欺瞞矣據嶽鍾琪奏稱豫省之騾已駁回不堪應用者凡幾移咨到日爾自知也同日又奏為遵㫖酌增各官養廉以廣皇仁以勵廉節事竊查豫省大小各官仰䝉皇上天恩概行賞給養廉以資薪水此誠千古帝王從來未有之曠典也臣於雍正五年六月二十日具奏雍正四年分動存耗羡銀兩數目欽奉諭㫖耗羡既積蓄如是饒裕則當酌量增添屬員養廉俾得寬舒等因欽此仰見我皇上體恤臣工無微不至臣伏查各官養廉除臣衙門暨學臣并司道各府以及同知通判等官俱巳足用無庸議加外惟河北道衙門係新經復設諸凡未僃前䝉皇上天恩允臣所請賞給養廉銀四千兩比各道多給銀一千兩現今諸事將次完僃應俟領足一年至雍正六年四月止減去一千兩與糧河各道一例支給養廉銀三千兩以示畫一至於直隸知州暨各州縣養廉今既荷䝉聖恩令臣酌量增添臣敢不竭誠仰體悉心斟酌臣查直隸州七員前議支給養廉銀各一千五百兩今再加銀三百兩每員給銀一千八百兩府屬知州并大縣前議支給養廉銀一千兩今再加銀四百兩每員給銀一千四百兩中縣前議支給養廉銀八百兩今再加銀四百兩每員給銀一千二百兩小縣前議支給養廉銀六百兩今再加銀四百兩每員給銀一千兩以上直隸州知州七員府屬知州四員大縣三十六員中縣五十員小縣十員每年共應加養廉銀四萬二千一百兩可否自雍正六年正月初一日為始照數按季給領伏候聖裁抑臣更有請者直隸各州州同州判管理屬縣捕務定例俱照府同知通判一例督緝參罰綦嚴至於縣丞吏目典史等官分理水利糧捕稽察地方保甲日奉差遣奔馳其餧養騎坐牲口并主僕衣食在所必需臣於雍正三年三月十七日曽經恭摺具奏欽奉硃批諭㫖此等作為在爾地方督撫大吏斟酌可否耳朕不便特諭意謂佐雜微員百人內未必有一二卓越者與其培植若輩莫如加增州縣養廉俾得從容展舒況從前巳降恩㫖命微員俱得一例卓異保舉正當觀其涉歷清苦果否砥礪志行安分固窮若於其中拔出數員始可為真實材具今照所奏量加資助此際自當感激思奮强勉修飾恐進階之後未必不隨境遷移也斯論未免稍近於刻爾等試細加籌度毋即以朕諭為是遂乃中止也又奉諭㫖更慮者此非止行豫省之事倘遇他省耗羡不敷將從何分惠亦不得不一思及至於直隸各州僉有承督盤查親民之責增給之議實屬允協欽此仰見我皇上至聖至明無微不照臣亦何敢再為奏請上瀆宸嚴但臣伏查司府首領各學教職并巡檢驛丞稅大使司獄等雜職竝非親民之官又管河縣丞主簿均係自僃資力在工效用無缺可選之員河臣委其署理丞簿事務已屬望外且保固三年工程平穩即有議叙升補之例均無庸議給外惟是直隸州州同州判又直隸州吏目并府屬之州同州判吏目各縣之縣丞典史俱有承督盤查親民之責請將直隸州州同州判每員量給銀一百二十兩其餘各官每員量給銀八十兩以上直隸州州同一員州判六員吏目七員府屬之州同一員州判三員吏目四員縣丞十員典史九十七員每年共應加養廉銀一萬六百兩倘䝉聖恩俞允彼必益知感激勉作好官而於吏治民生不無裨益矣臣不揣冒昧再為繕摺一併奏請是否可行𢎞恩出自聖裁謹奏州縣等官原命爾增添養廉佐雜微員涉歷清苦之論原云稍近於刻命爾再加籌度今覽所議甚屬公當照此施措洵屬允協目下且試行看若果耗羡尚能豐裕又可接續議加天下事惟患不克公與平耳如能公平則上下斷無不足之理語云百姓足君孰與不足一有過不及之偏遂滋足不足之弊於此須要見透天之賦物鴻纖巨細長養亭育莫不俾各遂其生各安其分弗令少有缺陷也凡出身為吏者倘於蒞政臨民之際而以侵上剝下為務至上下不足時能保一身之足乎即如國家若不恤民節用而惟奢侈是尚馴至民窮財盡政教摧頽而欲長享豐亨豫大之慶豈可得乎推而廣之其理同然朕時時以公平二字奉為繩墨惟恐或失雍正六年二月十二日河南總督臣田文鏡謹奏為恭報普得雨雪日期仰慰聖懷事竊查豫省於雍正六年正月十二十八等日所得雨澤業經臣恭摺奏聞今又據各屬報稱於本年正月十九二十二十三及二月初四等日或頻降瑞雪或復得時雨通省之中周流輪轉極其普被入土自三四寸起至五六寸不等土膏滋潤麥苖長發豐年有兆童叟歡呼此皆仰䝉我皇上至誠至敬上格天心之所致也臣職任封圻不勝歡忭敬畏之至所有豫省復得雨雪日期理合恭摺具奏仰祈聖鑒謹奏此摺到時正值甘霖下沛覽畢不禁以手加額叨沐上天洪仁聖祖慈佑春氣融和土膏霑渥朕五內感慶筆莫能宣惟期共卿勉之又勉耳同日又奏為欽奉聖訓據實覆奏事雍正六年正月二十八日臣齎摺家人回豫捧到皇上硃批臣摺於臣覆奏前按察使魏定國條內欽奉諭㫖已違犯功令自陷大案矣竒哉欽此臣與魏定國皇上睿鑒可見聖眀之世無所容其詐僞也又於臣覆奏調任按察使李秉忠條內欽奉諭㫖實甚相宜又於臣具奏巡察户科臣張元懷條內欽奉諭㫖廣西緊要巳有㫖矣又於臣覆奏驛鹽糧道楊夢琰條內欽奉諭㫖新任於伊亦屬相宜之甚欽此仰見皇上知人善任罄無不宜臣遭逢聖眀不勝慶幸至於糧道一缺又䝉皇上將開封府知府陳世倕升補該道係革職之員䝉皇上天恩不加罪譴仍以知府擢用不及年餘復升補糧道不但該道感激涕零即臣亦深沐恩賜之榮莫知所報矣合將硃批原摺恭繳仰祈睿鑒謹奏陳世倕當極加朂誡訓導上以全朕用人顔面下以杜衆讒毁語言若不奮勉自强殊非戴髮含齒之類矣朕亦豈肯輕恕即以此利害二途諭伊深思審計孰與已身損益耶雍正六年三月初四日河南總督臣田文鏡謹奏為恭報復得雨雪日期仰慰聖懷事竊查豫省自入春以來雨雪應時均沾普被業經臣節次恭摺具奏今又於本年二月初七初八十五十六二十一二十二二十八等日或雨或雪輪流普降入土自四五寸至八九寸不等四野沾濡二麥滋長現今麥苖巳長有七八寸不等從此豐年有兆人在堯天舜日之中童叟歡呼共慶千倉萬箱之樂矣所有豫省復得雨雪并二麥暢茂情形理合繕摺奏聞謹奏覽奏雨雪應時均沾麥苖滋長暢茂今春直隸亦然朕不勝上感蒼昊恩施下為吾民稱慶也惟期與卿勉之益勉敬之愈敬寧敢稍肆厥志乎同日又奏為欽奉聖訓據實覆奏事竊臣前具恭報馱騾解足摺內奉有硃批諭㫖臣伏念軍需馱騾關係重大是以於發銀買辦之時即嚴飭各屬務選臕壯結實可以任重致遠者令其解赴省城先委府㕔逐頭挑驗合式然後解赴臣衙門臣復㑹同司道暨在省府州每日逐頭親視驗烙其中稍有瘦弱者臣即令解役領回另買起解實係盡皆臕壯堪用之騾臣實未嘗被屬員所瞞也及至委官懷慶府通判高士鑰領解之時臣又令其再加驗明該通判回稱騾頭盡屬臕壯如稍不合式解官亦不敢輕易領解不期解至西安即據通判高士鑰禀稱係川陜督臣嶽鍾琪委西安布政使張廷棟驗收云此番馱騾係轉解甘肅撫臣莽鵠立驗收運糧之物不敢不愼等語蓋有盡美又求盡善之心又禀內有十三歲以上者以為老而不收四五歲以下者以為小而不收又有下牙包上牙者名曰地包天不收騸騾不淨者不收五分之中退出一二分不等未免過於吹求等語臣據禀不勝駭異以為事關軍需臣豈敢以不堪騾頭支吾搪塞今西安既有挑不合式者即應移知到臣以便另行買補解足庶幾無誤二月解足嚴限臣即一面復動公項銀兩另行買補一面據禀移查川陜督臣嶽鍾琪西安撫臣西琳令將挑下數目移知買補去後自臣咨查到陜之後聞督臣嶽鍾琪將解到各起騾頭俱行親驗又解官高士鑰將豫省挑下騾頭呈驗復經驗收十分之三四足見督臣至公無私似此和衷辦理大事方克有濟臣不勝佩服之至臣因騾不合式即當另買尚不致有誤軍需係臣子當悉心辦理之事何敢冒昧瀆奏不期督臣嶽鍾琪見臣咨查即行奏聞此亦愼重軍需之意今臣查豫省應解馱騾三千頭統俟委員掣獲批收回省之日臣再另摺奏聞所有奉到硃批諭㫖理合據實覆奏仰祈睿鑒謹奏其中情節巳悉同日又奏為欽奉聖訓據實覆奏事竊臣於雍正六年正月二十六日接准怡親王暨大學士張廷玉户部尚書蔣廷錫來字內開雍正六年正月十一日奉上諭朕屢降諭㫖禁用黃銅器皿者蓋欲杜燬錢製器之弊至於銅器之中有海洋日晷儀器之類則造自外國有古銅香爐花瓶之類則造自前代竝非近日民間鑄成之物若將此等物件亦令銷燬實屬可惜民間亦覺滋擾大非禁用黃銅器皿之本意又如鎖鑰及匱箱上事件之類其物甚微用銅有限只令其不販賣而已人家現有之物若悉令禁止搜察民間甚為不便且或胥吏借端生事總之奉行此事務須該督撫等督率有司悉心酌量權衡合宜行之有法則銅斤充盈而民間無禁銅之纍方能永遠奉行也今觀直省督撫一切禁約非過則不及奈何朕若明降諭㫖恐不肖之人又藉此玩法而督撫難於奉行矣爾等可寄信與各督撫知之欽此到臣仰見我皇上軫念民用睿慮周詳無微不照臣遵將奉到諭㫖敬謹寫録奉藏另文通飭各屬宣布皇上禁用銅器無非欲杜燬錢製器之弊俾令錢文日多錢價日平利益民用之至意惟嚴行查拏銷燬制錢之人并禁各工匠鋪户不許打造黃銅器皿販賣至民間舊有銅器應交官者聽其自行交官照部定價值分别收買并不許胥役鄉地人等借端生事在案又於雍正六年二月十二日臣家人齎回臣條奏收買銅器摺內荷䝉皇上硃批逐條訓諭示以輕重緩急先後本末之宜開導臣愚如啓聾聵臣細繹聖諭此誠清本澄源之至論酌盈劑虛之大經蓋嚴禁銷燬制錢則錢文自多嚴禁販賣銅器則銷燬自絶嚴禁私鑄錢文則黃銅自積不數年而便可以各省共開鼓鑄制錢流通者多錢價必平諸弊盡絶矣如臣之愚但知兢兢奉法豈能見及如此遠且大者臣惟有謹遵諭㫖實力奉行飭令屬員多方勸遵并敬將皇上硃筆圈出者另作公文行之各屬共期緩急得宜先後有序不寬不擾以仰報天恩於萬一耳所有奉到聖諭理合恭摺一併覆奏仰祈睿鑒為此謹奏覽豫省收銅堪敷開爐鼓鑄時奏聞請㫖同日又奏為遵㫖奏聞事竊照收買黃銅以為鼓鑄之基充盈國寶以利民生之用我皇上籌畫精詳無微不至復頒諭㫖著各省督撫設立公所於屬員中揀擇廉謹老成之人專司其事在司庫先撥數千金以為價值將所買銅器斤兩每年歲底奏聞其所發價值報部奏銷等因欽此臣遵即檄行布政司於省城設立公所動撥庫銀遴委署理事同知事內閣侍讀董自超分别收買其外府州縣不便設立專員即令地方官動用正項照部定價值公平收買解省去後今據布政使費金吾報稱雍正五年分省城共收買過黃銅一萬二百六十六斤零外州縣共報收買過黃銅五萬一千九百四斤零二共六萬二千一百七十斤零業經臣陸續咨部在案除將動用過銀兩於該年奏銷冊內造送户部查核外所有雍正五年歲終止收買過銅器斤兩數目理合遵㫖奏聞謹奏民無滋擾即屬收買有方也同日又奏為欽奉聖訓據實覆奏事竊臣前具覆奏挑選兵丁摺內欽奉諭㫖思慮可謂周到之至又奉諭㫖此數是否敷用抑或太過爾等再加商酌又奉諭㫖不但管轄二十箇月而已直須派委將僃帶領兵丁董任其事今此寄信専為預僃兵數至於選派官辨臨期自另有㫖尚有教習車戰之人并車輛俱令隨後到來到齊之日遵照而行欽此臣查議給兵丁行裝銀兩臣等前因逐件估計約需銀十兩之數是以不揣冒昧具奏今䝉聖諭臣謹當㑹山東撫臣塞楞額山西撫臣石麟再行商酌務期敷用不致太過不足至管兵官員臣遵即密為留心遴選可以帶領兵丁董率其事之員以僃臨時酌量派撥不使伊等聞知伏候諭㫖到日敬謹奉行所有奉到硃批原摺理合恭繳謹奏所議好朕降諭山東山西兩撫臣俱令於卿處畫一而行也同日又奏為欽奉上諭據實覆奏事竊臣前因豫省米榖日多倉厫不敷於雍正三年六月二十一日曽經恭摺具奏請將原任撫臣楊宗義代賠衛輝府參革知府吳柯等十案虧空餘剩銀一萬二千三百八十一兩零動撥添蓋奉有硃批諭㫖臣遵即飭令布政司㑹同糧道動撥前項銀兩酌量添蓋共建過倉八百二十六間又於雍正四年四月二十七日准户部咨凡地方倉厫年久倒塌者詳明上司委員勘估報部動支正項錢糧急行修蓋其厫座無多將倉糧寄貯寺院并天堆露囤者詳請督撫查勘確實將作何建蓋之處妥擬具題等因到臣復經臣轉行所屬一體遵照去後嗣據各屬陸續詳報內除常平義社新建等倉榖石俱有倉厫無庸添建外惟有彰衛二府陜州一州陽武等三十縣康熙四十三年截留漕榖河北事例已未捐榖太陽渡收捐米麥糶易還倉榖雍正三四兩年帶徴民缺漕米徴還榖石共榖八十四萬六千九十三石零內除舊有并添蓋過倉厫二共六百六十一間貯榖三十三萬五百四石零尚餘榖五十一萬五千五百八十八石零應需倉一千三十一間每間核估銀一十五兩共銀一萬五千四百六十五兩再臣伏查通省各府州縣共積貯各案榖三百六萬七千餘石將來每年出借加收息榖尚無餘倉可貯且每當六七等月暑氣薰蒸之時曬晾搬騰須得空房存貯似應酌建餘倉以待收貯息榖并為盤量之地今就各屬貯榖數目統計通省共應建餘倉二百二十間每間核估銀一十五兩共銀三千三百兩以上添蓋正餘倉厫共應需銀一萬八千七百六十五兩臣查原任撫臣楊宗義代賠十案虧空內有解部銀二萬二千六百餘兩扣存腳價添平等銀九百六兩零止用過銀六百六兩零尚餘銀三百兩可建倉二十間又查河北事例每收捐穀一石外收公費銀二錢解司充公業經前撫臣石文焯奏眀在案兹查司庫內現存銀八萬九百二十六兩零原係存貯充公之項今即以此項捐穀之公費添蓋貯穀之倉厫甚為得宜似可無庸動用正項奏覽雍正六年三月二十五日河南總督臣田文鏡謹奏為恭報雨澤仰慰聖懷事竊查豫省自入春以來仰䝉皇上至誠感格因而雨暘時若嘉榖蕃昌所有通省節次得雨日期業經臣恭摺奏聞兹據各屬報稱又於三月初七初八十七十八二十一等日甘霖疊沛入土自三四寸至一尺不等通省之中均沾普被現今大麥穗巳秀齊小麥巳長有一尺五六寸不等較之往年更加肥碩再臣查高糧亦巳滋長出有四五寸不等芝麻棉花俱巳放莢榖黍盡皆播種并有萌芽出土者豌豆等物亦各秀實而且菜吐竒葩黃金遍於阡陌麥翻細浪瑞氣溢於郊原從此豐年可必太平有象臣職守封圻不勝歡忭敬謹之至所有豫省復得雨澤日期暨百榖暢茂情形理合恭摺具奏仰祈睿鑒謹奏覽奏豫省雨澤疊沛及麥禾暢茂情形實屬可喜可慶畿內亦然同日又奏為恭謝天恩仰祈聖鑒事雍正六年三月初四日臣齎摺家人回豫捧到皇上賜臣皇輿圖十排共十軸臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖欽惟我皇上德沛堯封光昭禹甸剛柔克協卓然兩大無私健順攸宜允矣萬年有祜視九州為一體特繪瑶圖運四海於一心時調玉燭𢎞仁普被黃童白叟莫不巷舞而衢歌愷澤覃敷僻壤遐陬盡皆向風而慕義幅􅊷之廣至治之隆此誠從古所未有於今為特見者也臣恭逢盛世謬荷寵頒感聖德之𢎞施銘鏤奚極覩皇輿之袤廣抃舞彌殷臣惟有什襲珍藏永作傳家至寶殫心竭力益矢報國微誠而已謹此恭摺奏謝仰祈聖鑒謹奏輿圖十軸其中鴻纖巨細悉由聖祖躬親考據苦心經營至數十年之久方始告成寰㝢以內地域廣輪之數一展玩間瞭如指掌洵可稱為寶物允宜什襲珍藏者同日又奏為桃汛已過工程平穩仰祈睿鑒事竊臣伏查豫省黃河據管河各官報稱自雍正六年二月二十五日清明起至三月十六日止黃沁兩河共長水一尺八寸至三尺五六寸不等今巳消落一尺八九寸不等雖蘭陽縣北岸耿家寨大溜北徙變為頂衝以致掃堌漂失并將臨河第一層越堤堤頂塌陷丈餘臣查耿家寨臨河越堤之北一里許外有二層越堤二層越堤之北二里許外方是大堤臣即商同副河臣嵇曽筠將塌陷堤頂修築堅實又在於頂衝之處下摟崖掃一路沉水掃一路已經鑲填簽樁結實水勢上提溜巳南開而第一層越堤之內搶築裡創壩臺連釘攔土排樁一路俾土創堅實再於第二層越堤加幫高厚挑挖深濠僃料下等掃一路其大堤業於去年加高培厚足以捍禦現今險工竝皆搶護無虞一切堤岸掃壩工程俱各平穩但轉盼伏汛即屆臣仍嚴飭管河各官加謹修防外所有桃汛已過工程平穩緣由理合恭摺具奏上慰聖懷謹奏覽奏險工業經保護無虞朕懷深慰仍須督飭各河員加謹修防毋致稍有懈弛雍正六年四月十六日河南總督臣田文鏡謹奏為據實奏明仰祈聖鑒事竊臣於雍正五年七月二十二日接到大學士臣張廷玉來字內開原任陜西漢陰縣知縣徐耀任內有噶世圖題參貪戾一案又有年羮堯續參虧空一案俱經審實部覆將徐耀擬絞監候因事在赦前應俟虧空科斂銀兩完日釋放隨於雍正五年六月內嶽鍾琪以徐耀虧空等項於限內全完題請開復部議以徐耀係科斂擬絞援赦之犯不准開復具題奉㫖依議著將徐耀帶來引見隨於六月內引見徐耀將被參款項含糊辨訴奉㫖交與户部詳查隨經户部將被參二案情由查明具奏七月初十日奉㫖徐耀係不應開復之員朕看其人尚明白可用且經厯外任多年故宥其前罪著發與河南巡撫田文鏡先以通判補用若居官果優再行題補同知倘不知感恩效力盡洗前愆著即題參從重治罪將此情由張廷玉作字寄與田文鏡知之欽此嗣因歸德府通判員缺經臣於雍正五年九月十六日將徐耀題請署理如驗其果能勝任再行題請實授奉㫖該部知道欽遵在案臣查徐耀仰䝉皇上洪慈宥其前罪逾格擢用自應感激天恩洗心滌慮竭誠圖報乃該員甫經抵任臣即聞其居心卑鄙行事乖張臣屢行教導竟怙終不悛署事半年種種劣蹟昭著經臣密訪確實復據司道府揭報實屬下愚不移教無可施似此喪心昧良之員斷難一日姑容貽誤地方除開列款蹟另疏題參外理合恭摺奏明仰祈聖鑒謹奏委係應參劣員宜加倍定擬具奏同日又奏為恭謝天恩事竊查豫省中牟縣所屬之天麻堡至孔家莊止地勢低窪每遇雨水過多民田間有淹沒且復環繞城邑一時難以就涸此皆雍正元年陽橋地方河堤漫溢賈魯河被沙淤塞所致經臣委員勘估確實於雍正五年八月初四日恭摺奏請動撥耗羡銀一萬二百六十八兩零遴委㕔汛各官協同該縣領給銀兩雇募人夫將賈魯河挑穵以資宣泄欽奉硃批諭㫖此議甚好允係應興之役等因欽此臣遵即行令布政司㑹同管河道動撥銀兩委員疏濬去後今據該司道詳稱中牟縣應開賈魯河巳於雍正五年十一月內挑穵完工實動用過銀九千五百一十九兩零節省銀七百四十八兩零等因到臣又據沿河士民冉克明等環繞臣署呈稱欽惟我皇上恩同覆載德竝生成俯念稼穡之艱難垂恤民生之疾苦尤以低窪地畝每至雨水過多不免淹積特發帑金募夫挑穵遂使沿河數百餘頃低窪地畝一旦盡成沃壤即遇雨水過多之歲亦可永免水患從此水勢暢流億萬年均沾膏澤黎民樂育千百載共享升平矣懇請據詞入告等情到臣臣不敢壅於上聞理合恭摺代為奏謝天恩仰祈聖鑒謹奏果如呈詞所云此番疏濬洵屬有益之舉矣同日又奏為仰祈聖恩特留清勤公正之道員以勷盛治事竊查河北彰衛懷三府地方遼濶河工緊要若無道員彈壓料理諸務不免廢弛經臣題請復設河北守道即以協理河道禮部主事朱藻題補䝉皇上俞允准其補授在案該道感激天恩竭誠圖報自到任迄今一年以來凡於地方事務河岸工程無不盡心辦理且一塵不染勞怨勿避公正無私洵稱全璧臣實收臂指之助今於雍正六年四月十二日准吏部咨查得鑲白旗漢軍都統咨稱原任安徽按察使朱作鼎虧空認還借缺原任鹽法道孔興璉銀一萬六千兩一案未完銀七千五百一十六兩零逾限不完請㫖將朱作鼎革職交送刑部照例治罪下缺銀兩著落伊子通判朱藩守道朱藻俱各解任來京勒限一年嚴追完結奉㫖依議欽此移咨到臣臣隨行布政司行令朱藻解任歸旗著追在案臣查虧空官員現在出仕之子例應解任著追功令森嚴臣何敢違例瀆請但臣思河北道員缺極其緊要伏汛轉瞬即屆北岸堤掃工程關係運道民生非可懸缺久待一時難得諳練河務清勤公正之員膺此重任朱藻一解任如失臣之左右手實有萬不得巳於臣心者伏乞皇上天恩俯念河工重大地方緊要將朱藻仍留河北道任伊父朱作鼎虧空銀兩准其勒限一年追完該道自必愈深感激竭力完解倘逾限不完即係該道辜負聖恩應聽本旗都統題參照例治罪是否可行伏候皇上睿裁臣不勝感激悚惕之至為此謹奏前該旗奏請將朱藻解任勒追朕偶未經意照例允行隨據吏部開缺業巳降㫖依議矣如欲保留在任具疏題請候朕裁奪以朱作鼎之為人而生如是幹蠱之子可謂大竒天道冥默儘有令人不可解處同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣恭報雨澤一摺欽奉硃批諭㫖覽奏豫省雨澤疊沛及麥禾暢茂情形實屬可喜可慶者畿內亦然欽此臣思雨暘時若皆我皇上至誠上感淳化下敷所致今查豫省又於本年三月二十一二十八四月初二十一等日連得時雨入土自四五寸至八九寸不等通省之中極其調勻大麥現在收割小麥於四月二十四五亦可刈穫較之往年更加豐稔至於髙糧榖黍以及棉花芝麻雜糧竝皆十分暢茂遍野如雲童叟歡呼羣欽奉硃批諭㫖覽奏險工業經保護朕懷深慰仍須督飭各河員加緊修防毋致少有懈弛欽此臣欽承聖諭敢不謹慎辦理并嚴飭管河各官加緊修防兹臣聞所有奉到硃批原摺理合恭繳為此謹奏知道了雍正六年五月初四日河南總督臣田文鏡謹奏為恭報二麥收成分數暨秋禾暢茂情形仰慰聖懷事竊查豫省二麥現在俱已登場臣據開封等八府暨汝陳等七州并所屬各州縣報稱二麥收成俱有十分更喜今歲黃河水勢退縮堤內河灘地畝無一處不加倍收穫所種高糧榖黍以及花豆雜糧極其暢茂臣詢之老農僉云如此豐年從來未有士農工賈莫不歡呼踴躍咸謂此皆我皇上至誠格天大孝格祖致此天庥豫省臣民何修何幸而得逢此盛也所有二麥收成分數暨秋禾暢茂情形理合恭摺奏聞謹奏二麥收成分數以手加額欣悅覽焉中州咫尺何待卿言過往使臣早經奏聞矣凡此實由穹蒼賜福於豫省正當敬承無斁朕深望上天眷佑生民均如豫省之時和年豐每訓示直省督撫凡居心行政必求上合天心庶蒙申錫嘉祉如是降諭不啻再三其不肯欽承莫能遵循者皆緣朕之德薄未足以化其私衷耳天人交感之際捷如影響此理甚明且確期共勉之同日又奏為恭報得雨日期暨水勢平穩緣由仰祈聖鑒事竊查豫省今歲雨暘時若年榖順成除二麥收成分數經臣另摺奏聞外今又據各屬報稱於本年四月二十一二十二二十九三十等日復得雨澤自四五寸至尺餘不等通省之中極其調勻土膏無一處不霑渥秋禾無一處不暢茂户慶盈寧民情胥悅臣得藉以仰慰聖懷再臣伏查豫省黃河自入夏以來水勢竝不加長即或長水亦止二三寸至七八寸不等隨長隨即消落一切堤工掃壩俱各平穩至於南北兩岸凡有形勢緊要應即加修之處俱巳乘時修竣臣仍嚴飭管河各官董率兵夫無分風雨晝夜加意防護不致稍懈以仰報天恩於萬一耳所有豫省得雨日期暨水勢平穩緣由理合恭摺奏聞謹奏河工一事直待秋汛過後方敢釋懷惟應敬謹辦理絲毫不可懈意且恐今歲雨水過多尤宜預為防愼雍正六年五月二十八日河南總督臣田文鏡謹奏為恭報晴雨日期暨汛水平穩緣由仰祈聖鑒事竊查豫省自本年四月二十八日以後雨水不免稍多臣恐民間堆積在場未經曬打之麥被雨淋濕隨即深自修省并飭令雨多之州縣竭誠祈禱外兹據各屬報稱自五月十一日起天氣豁然晴霽取視麥穗尚無損傷現據農民乘時曬打俱已收藏目今連日晴霽不特麥可盡曬而秋禾亦無不倍加滋長等情到臣此皆仰䝉我皇上至誠感孚天祖默佑之所致也再臣伏查豫省黃河水勢自入夏以來長水自五六寸起至三四尺不等旋即消落總因飭管河各官無分風雨晝夜董率兵夫加意防護以期仰報天恩於萬一耳所有豫省晴雨日期并汛水平穩緣由理合恭摺奏聞謹奏朕觀今年景象惟恐雨水過多以故日夜憂虞莫置幸歲巳過半節屆仲夏膏澤甚屬均調第此後自伏迄秋晴雨若何未敢預必耳同日又奏為恭報動存耗羡銀兩數目仰祈聖鑒事竊臣伏查豫省自雍正二年起至雍正四年所有收過各年耗羡銀兩并動支數目業經臣節次恭摺奏聞兹據布政使費金吾造冊詳報內開雍正五年分原貯司庫各年耗羡共銀三十六萬三千七百三十兩零又自雍正五年正月起至年終止新收過各年耗羡并歸還原款共銀四十三萬九百六十八兩零新舊二項共銀七十九萬四千六百九十八兩零內除起解各部添平案飯等銀暨布政使詳明臣衙門存案動支過各官養廉并各項應需銀共二十九萬四千二百七十六兩零實在貯存司庫各年新舊耗羡共銀五十萬四百二十一兩零所有雍正五年分貯存動支過新舊耗羡銀兩年款數目理合恭繕細摺一併據實奏聞謹奏卿諸凡料理悉屬井井所報銀兩數目知道了但耗羡儲蓄如許之多於國於民兩俱無益當思於地方公務濟用不令積聚盈溢方是或加恩官吏以奬清廉或施惠窮黎以紓疾苦均無不可卿其周詳籌計具奏以聞今用卿為河東總督東撫塞楞額巳命卸任赴京矣伊兩次所奏之摺并朕硃批諭㫖發來卿看內有應行事件庶便斟酌辦理硃批諭㫖卷一百二十六之十二欽定四庫全書硃批諭㫖卷一百二十六之十三硃批田文鏡奏摺雍正六年六月二十一日河東總督臣田文鏡謹奏為微臣恭受天恩奏請聖訓事竊臣一介庸愚至微極賤蒙皇上天恩簡授巡撫復加總督統轄全豫文武軍民榮莫榮於此矣重莫重於此矣臣方深蚊虻負山商蚷馳河之懼幸蒙皇上恩深教訓一切事宜天恩外所有臣總督任內應行辦理事件現在次第詳悉舉行竭誠圗報但臣伏查山東一省濵臨渤海幅員遼闊久無總督事屬創始與他省舊設有總督者不同一切事務既無文卷又無吏書而且傳若浼嫉惡如仇執法極嚴奉公惟謹情靣絶無瞻顧毫髮不敢徇容初蒙者如何而能使之吏畏民懷如何而能使之風移俗易不敢不敬為皇上預陳之仰祈聖訓者也況臣質本愚蒙才同楶棁管理兩省封疆總督之責任固同仍兼一省巡撫惟臣之仔肩獨重在豫且兼督河道在東又首重海邦雖庸不知所出如何巡警而使海氛永消無慮如何不可不加誠求然而千里關山既慮鞭長莫及微陛辭赴任得蒙之怨尤蔣大年人明白沉靜而秉質稍弱蔣嘉年人強幹敏捷而才華稍露但俱係青年經臣教訓有素堪供驅䇿理合一併總督中軍例係副將臣蒙皇上天恩授為兵部尚書總督河南因係一省未敢奏聖恩授為河東總督管理兩省似應與别省總督一例改設副將以昭體統查得中軍遊擊張孟儀才守兼優騎射嫺熟整頓營伍約束兵丁井井有條洵題請補授臣未敢冒昧一併恭請訓㫖施行臣不勝激切悚懼之至為此謹奏覽同日又奏為聖治淳熙化及愚夫愚婦據實奏聞事竊照羣黎遍德淳風自有所由路不拾遺治道從來稱盛我皇上德隆堯舜治邁羲農天以景星甘露著其祥地以海晏河清呈其瑞鹽泉自湧嘉榖頻登而且孝子節婦嵗舉而請旌者接踵而出言坊行表核實而奏薦者實繁有徒固已從古希聞於今獨盛矣乃有義行出自愚夫清操成於貧婦如河南府孟津縣天平街住民翟世有同妻徐氏者雍正六年四月初三日有陜西三原縣人秦泰擕銀一百七十兩至孟津縣販買棉花行至宋家山地方將銀遺失在路翟世有赴地耕作見而拾獲欲俟原主尋至給還在地守候一日無人找尋將銀擕歸告知伊妻徐氏氏亦甘守清貧勸夫給還至次日秦泰貼招找尋如有拾獲肯還者願與均分翟世有見招揭投鄉地將秦泰領至其家問明封記分兩與所拾之銀悉相符合即將原銀㸃還秦泰令其照招均分世有堅辭不允秦泰又以六十金相謝世有固不肯收受秦泰亦不肯取回以致鄉地報縣該縣知縣陳永正𫝊問明確因翟世有業由耕鑿家本貧寒乃能拾金完璧却贈全操其妻徐氏亦能同甘清苦贊成義舉事出難能洵屬罕見詳報到臣臣隨贈以士女淳良扁額給銀五十兩使翟世有具領以彰聖化以表淳風併飭布政司通行曉諭使人人則效處處觀摩仍飭該縣立碑𫝊後以示鼓勵在案臣因事屬小民細行從無題逹之例不敢冒昧具題謹繕摺奏聞謹奏小民慕義乃屬可嘉可喜之事有旨諭部矣同日又奏為據實覆奏仰祈睿鑒事竊臣家人齎回臣恭報二麥收成分數一摺欽奉硃批諭㫖二麥收成分數以手加額欣悅覽焉中州咫尺何待卿言過往使臣早經奏聞矣凡此實由穹蒼賜福於豫省正當敬承無斁朕深望上天眷佑生民均如豫省之時和年豐每訓示直省督撫凡居心行政必求上合天心庶蒙申錫嘉祉如是降諭不啻再三其不肯欽承莫能遵循者皆緣朕之德薄未足以化其私衷耳天人交感之際捷如影響此理甚明且確期共勉之欽此臣查豫省連年大有人民樂育此皆我諭㫖不覺血淚霑襟為臣子者至上負君恩仰纍硃批諭㫖河工一事直待秋汛過後方敢釋懷惟敬謹辦理絲毫不可懈意且恐今嵗雨水過多尤宜預為防慎欽此伏查豫省黃河自五月十七日據陜西寧夏府具報長水四尺臣即飛飭各屬小心巡防嗣據管河各官報稱上流雖報長水而豫河中泓刷深下流低溜隨長隨落竝未出槽各處支河亦皆至於民間旱地所種穀黍髙糧以及花豆雜糧俱皆次第成實不甚需雨農民父老羣稱從未見今嵗秋成之盛惟水田早稻穗巳出齊晚稻尚在暢發頗需雨澤據各屬報稱六月初六初九十四二十等日得雨霑足收成在望各處市集糧價甚平睿鑒謹奏覽雍正六年七月十一日河東總督臣田文鏡謹奏為遵㫖密奏仰祈聖鑒事竊臣伏查社倉積榖一項原以接濟民食誠為有裨民生之事惟在地方官奉行得法身先倡捐勸令紳襟富民不拘升斗使其出諸情願樂輸毫無勉強勒取之事遴選身家殷實平素取重於鄉黨者為之正副社長以司其典守董其出納地方官在任則按簿稽查去任則移交清楚則聖賢經費之事洵不難為豈可甘心讓美古人自居庸碌臣每以此勸諭各屬各屬遵行有年官民俱曉此法除舊管雍正四年分通省共捐貯穀麥豆一十四萬四千二百八十四石零經臣具摺奏聞外今據布政使費金吾查據開封等八府汝陳等七州所屬州縣彚報雍正五年分新收捐穀六千五百二十六石零髙糧八石麥一十六石零豆十石零息穀三千九百六十石零以上穀髙糧麥豆共一萬五百二十一石零開除一件為請㫖事案內磁州捐穀四百三十二石零止新收九千八十九石零實在新舊二項共一十五萬四千三百七十三石零從此年復一年愈積愈多民食有賴通省人民莫不共仰聖德於無疆均沐皇仁於靡既矣至於雍正六年秋收後勸捐穀石俟捐有成數容臣查明再行繕摺奏聞為此謹奏通計直隸各省中能體朕意如式遵行者不可多得卿宜勉為之同日又奏為欽奉聖訓據實覆奏事竊臣於雍正六年六月十九日奉到皇上發下管理淮安宿遷關務臣年希堯奏摺一件繪圗一封欽奉硃批諭㫖命臣竭力整理欽此臣查盜犯張大金棍等在江南桃源縣越獄逃入豫省臣接准漕臣張大有咨隨即轉飭所屬文武協力查拏懸賞務獲於雍正六年三月初一日在南陽縣東荒僻路地方將張二金棍拏獲張大金棍逃走飛鞭亂打官役不敢近前博望驛塘兵張起龍匹馬彎弓趕賊二十餘里共發七箭連中六箭始將張大金棍拏獲交南陽縣轉解江南竝非漕臣張大有所差之千總吳俊拏獲也至於年希堯摺內所稱直隸東明縣邑界俱沿河一帶與直隸之長垣縣山東之曹州曹縣暨河南之祥符縣壤地交錯每每境內竊發則逸往境外此省擒捕則逃之彼省若輩得以肆行無忌等語臣查一省有一省之交界即一府一州一縣亦莫不有一府一州一縣之交界而匪類住居交界之處此拏入彼藏匿彼拏入此潛蹤誠難捕獲但臣細閲繪圗豫省之祥符縣山東之曹州曹縣與直隸之東明縣長垣縣交界之處中界黃河地方遼闊抑且犬牙相錯難以歸併一處管轄臣查直隸之開州長垣縣東明縣與夫山東之曹州曹縣雖素稱多盜然不盡聚於臨界之處亦屬四散於一州一之間若各省之督撫稽查保甲甚嚴各省之州縣奉行保甲甚力則本境尚不能容身安能逃藏外省若此省力行保甲而彼省徒事虛文或并虛文而亦不設則此省稽查之下所不能容者有不盡向彼省而逃藏盜將視不行保甲之處為樂土矣豈特交界之盜竄逸甚便乎臣恐逺方之盜且接武而來也伏查雍正四年二月十一日奉上諭嗣後交界地方失事探實贓盜之處無論隔縣隔府隔省一面差役執持印票即行密拏一面移文關㑹拏獲之後仍報明所該管地方官添差移解各該有司務須協力稽查使姦究無可潛藏以副朕息盜安民至意欽此仰見我皇上至聖至明訓飭捕盜之法盡美盡善倘大小臣工俱能欽遵諭㫖何患黠盜之逺逸又何患疆界之交錯哉今既奉有即行密拏之諭㫖而捕役仍不敢越界密拏者蓋慮姦徒之劫奪也姦徒之敢於劫奪人犯者仍由於地方官之不能嚴禁約束也彼其膜視隔屬之盜案曲庇境內之人民成見橫據胸中往往因拒捕劫犯而致成人命逮鄰境差役復回夲縣禀官關拏凶犯而彼處地方官仍視為無關緊要并且抗不發人審究揑逃揑病揑故無所不至屢次申詳督撫咨提比比而是是以姦徒得恃以肆行盜賊得藉以濳聚也臣請嗣後如有隔屬遵㫖密拏賊盜而彼處有縱令劫奪徇庇不解者即許拏盜之地方官詳明夲省督撫移咨彼省該管督撫㑹疏題參將縱劫庇盜之地方官摘印解任該管之鄉地保鄰嚴拿法究俟此案盜犯全獲審明題結之日方准將解任之員出具賢否考語題請開復庶幾地方官有所畏懼則必約束於平日而姦徒黠盜亦失所倚恃矣是否可行伏候皇上睿裁批示容臣繕疏具題所有奉到年希堯原摺一件繪圗一封理合恭繳謹奏覽奏甚為嘉恱如此立法庶幾可杜隔省膜視之弊具疏題請可也同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣恭報動存耗羡銀兩摺內欽奉諭㫖卿諸凡料理悉屬井井所報銀兩數目知道了但耗羡儲蓄如許之多於國於民兩俱無益當思於地方公務濟用不令積聚盈溢方是或加恩官吏以奬清亷或施惠窮黎以紓疾苦均無不可卿其周詳籌計具奏以聞欽此臣查豫省各年新舊耗羡貯有五十萬兩之多此皆我皇上聖德格天連年雨暘時若百穀豐登小民爭先完納正賦通省錢糧雍正四年五年俱於奏銷前盡數全完解司有正糧即有耗羡是以積有五十萬兩之數臣查耗羡未歸公之時原係各州縣所得各上司因其得有耗羡於餽送節禮之外恣意勒索藉名派捐不但州縣分文不得入巳往往所入不敷所出遂至虧空正項糶賣倉穀無所不至及至地方一有公務仍派里民小民受纍此耗羡未歸公之情弊也自耗羡歸公之後各上司俱得有足用養亷不敢向州縣勒索派捐各州縣亦俱得有足用飬亷反得實在歸已日用既足又不至虧動正項錢糧倉穀至於一切公事俱經臣一面奏積聚盈溢之諭㫖仰見皇上至聖至明之睿訓極公極大之天懷但臣查大小官吏養廉俱各足用又蒙皇上天恩自知州以下已經加增州同以下又皆准給已無庸再請加恩矣至於加恩黎庶必須出之有名或偶遇水旱不致成災者自當奏請動支耗羡量為賑恤乃近今豫省連嵗豐收民康物阜家給户足在百姓又無藉於賜恩也臣查司庫耗羡雖有此數然應用之項亦多豫省各府州縣城垣惟因升平日久不無殘缺臣撫豫以來其少有殘缺者飭令各地方官捐資修整至於塌缷過多地方官力不能修者槩令布政司行查委官勘估意欲奏請皇上動支耗羡修築惟因幅員遼闊勘估需時又往年耗羡積貯不多不敢冒昧舉動現在經司詳委熟諳工程之員分頭勘估就緒大約需銀不下七八萬兩俟布政司詳到臣即當核實奏聞此一項也再欽奉諭㫖現在挑選兵丁二千名教習車法臣已經奏明計兵丁行裝安家約得七萬二千餘兩此一項也又欽奉諭㫖預備營馬三千匹雖奉㫖著動正項錢糧但將來解赴西安除動用正項外人工飯食往返盤纒亦不無所費此一項也又豫省按察司司獄自明季以來即無監房無從查考凡解審人犯俱寄祥符縣監羈禁殊為未便臣現在飭司勘估蓋造按察司獄大約需費七千餘兩俟布政司詳到臣即核實奏聞此一項也又查豫省文風日盛讀書士子日多每科鄉試貢院坐號不敷俱蓋席棚補足既難防間更虞火燭查貢院前有現成隙地略將頭門二門䟎移開闊便可添蓋二三千間號房永逺免搭席棚浩費正供臣現在飭司勘估俟詳到日臣再行核實奏聞當動用耗羡約得七八千兩此一項也再臣標與南北兩鎮馬步兵丁雖器械旗幟俱經製備完足而盔甲鍋帳鳥鎗不無缺損短少皆應修整添補臣久經行查確數飭令布政司確估大約所費又不下數千兩俟請到亦當核實奏聞此一項也再各州縣大小水利每年俱當疏濬深通其河身淺窄民力易舉者臣每年於農隙之時飭令地方官督催令民間自行挑挖至於各處大河沙淤土淺之處工費頗繁民間力所不能者奏請聖恩動支耗羡以為挑河工食器械之需雖年年疏濬為費無多亦必須動用銀兩此一項也除此數項之外司庫所貯耗羡已屬無多臣又以為此項耗羡俱隨正糧完解如每年春秋二季麥穀豐收則民樂輸將耗羡亦有積貯萬一年嵗偶歉現年錢糧或蠲免或停徴則正項不完耗羡無出而各官養亷仍應照數支給地方公務仍應逐一辦理況或請㫖賑恤此時自當賜恩於民不無所費則夲年之耗羡既不能如數解司堯舜斷無水旱不時之事然而經國久逺之道臣敢不鰓鰓過慮預為綢繆此司庫耗羡之不可不存留者也又奉硃批諭㫖今用卿為河東總督東撫塞楞額巳命卸任赴京矣伊兩次所奏之摺并朕硃批諭㫖發來卿看內有應行事件庶便斟酌辦理欽此臣伏讀原任山日期摺內欽奉硃批諭㫖朕觀今年景象惟恐雨水過多以故日夜憂虞莫置幸嵗巳過半節届仲夏膏澤甚屬均調第不知此後自伏迄秋晴雨若何未敢預料耳欽此臣伏查豫省於六月初六初九十四二十等日得雨之後又於七月初五六等日據各屬具報得雨入土二三四寸不等各種早晚秋糧俱已堅好穎栗以後竟可不需雨澤早熟者巳經刈穫登場且有向市中糶賣遲熟者已可陸續收割詢之農民僉云二十餘年未見有此百穀俱熟十二分豐稔之年景臣俟各屬將收穫緣由報齊之日即當查明確實分數恭摺奏聞至於黃河伏汛巳過據各屬具報隨長隨落俱各相抵竝未出槽各處支河亦未入水堤掃平穩即最險之耿家寨口連日形勢頓變溜走中泓南灘漸巳刷去北岸壩根一帶已長新淤壩基已經立穩可資保守臣查此處水口直當頂衝人力所不能捍禦忽而大溜南遷北壩新淤此非神靈默佑不能至此皆我皇上至誠感召之所致也今已入秋汛十日臣又嚴飭管河各官督率兵夫日夜加謹巡防務求安瀾循奏所有奉到微臣原摺并山東撫臣塞楞額奏摺三封一併恭繳為此謹奏覽雍正六年八月初四日河東總督臣田文鏡謹奏為恭謝天恩事雍正六年七月十三日臣齎摺家人回豫敬捧皇上賜臣大紅線纓凉帽一頂上綴東珠一顆金纍絲花圎盒一箇象牙雕花圎盒一箇到臣臣當即出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖欽惟我皇上德冠百王光昭四表萬宇廣帡幪之大莫不戴聖以輸誠九重開天日之華莫不望陽而傾志蓋金追玉琢章相備至美於深宫圭潔璋純聞望自為綱於率土乃恩多下逮澤必旁敷尚方之珍寶頻頒邀殊榮於章甫御苑之芬芳廣被等麗製於璿璣受寵若驚感恩圗報惟舉頭如見凛咫尺於業業兢兢瀝膽同懸矢珠環於生生世世耳為此謹奏朕之錫豫便蕃祇以鼓勵卿忠誠報效之志覽奏謝矣同日又奏為恭報豫省秋禾收成分數事竊照豫省今年秋禾長茂結實情形經臣節次奏聞今據開封等八府汝陳等七州所屬祥符等一百一州縣報稱民間髙糧黍穀芝麻黃黑菉豆等項悉行收穫登場幸值天氣連日晴霽俱經曬晾收貯不論地之髙下河灘山隴俱有十分收成且穗長實大粒粒如珠顆顆似玉現在百室盈寧白叟黃童莫不歡呼載道共慶年豐等情到臣此皆我皇上至誠格天大孝格祖得以仰邀天祖之默佑俾全豫臣民際此萬寶告成年書大有之盛也所有豫省十分收成分數臣已核實理合奏聞再查豫省雨澤自七月初五六等日得雨日期經臣奏聞外今又據各屬報稱七月十六十七二十等日得雨霑足農民盡稱得此時雨地盡可以耕犁種麥十分慶幸合併奏聞仰慰聖懷謹奏朕惟額手為中州赤子稱慶而已慰悅之懷筆何能宣同日又奏為恭奏東省秋禾收成分數事竊臣仰蒙聖恩授為河東總督一切地方政務現在次第舉行外臣行查東省秋禾收成分數因相去頗逺未能一時周知今止據兖州府屬并曹州濟寧州所屬各州縣陸續報到今嵗秋禾收成俱有八分九分不南府屬之鄒平齊河禹城商河陵縣兖州府屬之積窪下地畝被淹臣隨即飛飭山東布政司委員確勘果否成災仍將被水之民加意撫恤毋致失所去後應俟委員勘確到日臣自當㑹同山東撫臣酌量料理但臣查得山東地方窪地甚多略經時雨易至積水是以東省人民秋禾多種髙糧髙及至勘不成災撫臣亦不題報竟沿為陋例七月二十九日據布政使費金吾禀稱髙糧已經收穫有七八分稻穀巳黃自四五分至七八分不等棉聖懷者也又於七月二十四日據山東布政司詳報沂州協力撲滅勿使蔓延貽害在案以上被水被蝗兩案容俟布政司勘捕詳覆到日臣再詳悉奏聞所有據報情由理合先行具奏伏祈睿鑒謹奏覽同日又奏為恭奏豫省黃河秋汛水勢情形及中泓刷深丈尺仰慰聖懷事竊查豫省黃河關係運道民生仰蒙皇上睿慮周詳指授方略機宜連年發帑修築又蒙皇上聖德昭格上天聖祖暨河神默佑循軌安瀾堤掃鞏固至今嵗而愈顯神功從來在河灘地上播種者麥則偶然得收秋則難免淹及今嵗則二麥大收於春時百穀大收於秋日詢之土人羣稱難得且灘地穀麥不收則巳收必加倍於他處者蓋因土膏肥澤故也此一異也彼最險之耿家水口係全河大溜頂衝臣每為伏秋兩汛擔慮飭令多撥夫料加謹防護但大溜直逼堤根日夜搜剔以致掃壩虛鬆不時蟄陷實屬人力難為乃忽而溜走中泓刷去南灘淤起北岸而壩基得以立穩以保無虞此又一異也今入秋汛已逾一月查各屬報到水勢長落情形除從前隨長隨落相抵外近來數日有落無長不但竝未出槽流入各處支河且查據管河道祝兆鵬河北道朱藻報稱黃河中泓南岸西自滎澤縣起東至虞城縣止北岸西自武陟縣起東至儀封縣止有刷深六七尺八九尺不等者有刷深二三四丈不等者兩崖髙出水面有四五尺不等者有六七尺不等者總之較雍正五年中泓更刷深一二三四尺不等兩崖更髙出水面一二尺至二尺四五寸不等人人稱為從來未見處處稱為從來未聞惟大聖人在上大其懷柔之典致此允翕之休與河清大瑞無異豫省臣民仰覩嘉祥謳歌聖德洵頌禱之文所莫能殫述者也理合繕摺奏聞仰慰聖懷謹奏河流順軌實由天祖之錫福何可歸美於朕至如簡命得人之功朕亦不辭也覽奏嘉悅慶幸之懷洵非楮頴所能形容者惟與卿期加勉加慎以保厥終耳同日又奏為欽奉聖訓據實覆奏事雍正六年七月十三日臣家人齎回臣奏請聖訓摺內欽奉硃批諭㫖卿在豫省數年諸事留心諳練若止令督理一省事務尚恐不足展布底藴而并無以罄竭報效之志豫省諸凡甫經就緒若一旦遷移他往既恐部下官民不遵約束且念中州要地接壤都畿倘後來者不克勝任卿費數年心力經營措置殊屬可惜朕再四思維方申此命卿其以理豫省之心兼理東省可也勉之欽此伏念豫省東省總屬皇上封疆臣敢不竭盡血誠料理但臣才質庸愚駐劄豫省待罪五年至今毫無報稱雖蒙聖諭豫省諸凡就緒而自臣視之實無一事敢以自信而自安況東省之逺隔乎臣不知將來何以報效方不負皇上殊恩也又奉諭㫖如有遲滯阻隔何難審度機宜奏請疏通欽此臣自當逐事次第料理凡有應疏通處遵㫖敬謹奏請又奉諭㫖風行草偃乃自然之理然從古哲后名臣敷宣教化未有不先難而後獲者庸碌之輩烏能解此第今日東省非豫省初創可比孰無耳目豈有不甘為包拯屬吏部民之人乎卿但一秉初心行去朕自如前與卿做主凡為大吏者能全朕用人顔面則朕自能令天下後世灼見卿等之忠藎君臣期共勉之又奉諭㫖欲速則不達安可期效於旦夕耶欽此臣跪讀之下不覺失聲飲泣臣賦性愚魯又無學問但知事之不悖於理不礙於公者即屬當行之事毅然行之而不顧初不敢因人之喜怒而有所趨避也臣嘗謂人私心一起則見理不明見理不明則所行多謬瞻顧避忌與夫市惠邀名皆私心也有一於此雖聰明伶俐之人更多錯誤臣之敢於孤行獨往者臣心中惟知戴有皇上其他皆非臣所知也數年以來若非皇上天恩為臣做主臣亦早巳為衆人所排擊而擠陷之矣安能復望今日哉臣之身家性命毫無所顧而皇上之天顔如乾儀日彩臣若稍不敬慎冒瀆天威臣罪莫逭臣敢不殫心竭誠以仰報天恩耶又奉諭㫖卿之念慮精白朕實見信又奉諭㫖君臣一德一心未有不能辦理之事況昊天聖祖昭昭在上自必垂憐賜佑也欽此仰見我皇上至誠格天大孝格祖上天聖祖為皇上垂庥錫慶普天下大小臣民皆蒙福佑矣又奉諭㫖如費金吾唐綏祖正因念及於斯始行調用東省也以此類推兩省官員無論大小均可互調將深足倚信者置之稍逺未及試驗者反宜移之就近其教而不改下愚之流仍勿姑寬不半載後可冀規模粗定豈似當日到豫之初通省官民茫然一無識别之比乎欽此臣何人斯得沐聖教至此費金吾才識練達人亦持重唐綏祖聰明敏捷辦事甚勤今蒙皇上一調為山東布政使一升為山東濟東道仰見至聖至明睿謨允協臣亦深受㫖酌其人地之宜陸續題請調補又奉諭㫖假使朕不知卿卿不知朕應須覿面訓諭若云久違五載依朕觀之嵗月雖多未曽相離寸步也此來非但僕僕往返無益到京又不免耽延數日至速亦需兩閲月方能旋署新任事繁正資料理寧容曠廢況實無可訓諭卿者諸凡奏請摺夲俱堪達意奚庸面言始悉耶三二年間東省吏治亦如豫省就緒然後召卿入朝我君臣㑹晤未晚至於山左地方應於何時親詣察視一切臨期具題請㫖嶽濬少年老成資質聰明立志尤為可取毫無童騃紈褲習氣將來期望成就大器朕經再三教誨命伊請益於卿卿當待如至親子弟盡心朂勉以玉成之諒伊奉朕訓㫖將必虛心聽受和衷共濟其於蒞政臨民如猶克稱職行即實授斯任矣再者嶽含竒亦經調用山左不過庸常之器相貌儀表初見甚可觀及擢授總兵於臨請訓㫖應對之際殊覺才具平平然取其居心頗好究不失為誠實出力之人兗鎮堪供厥職卿更加試看自悉欽此臣雖逺在豫省實屬天顔咫尺且蒙聖訓周詳無微不到似可無庸趨赴闕廷但臣犬馬戀主微忱與夫必得跪聆聖訓面加指示愚見如赤子之依慈母蒙童之望明師中心自有不可解者今蒙聖訓凡地方之事臣自當遵㫖分别摺奏具本仰請訓示者也至於山東雖與豫省接壤然相去甚逺臣自當親往察視但此時正值秋汛況新經奉皇上簡拔訓誨自然成國家大器將來同寅協恭實臣之幸也兗州總兵臣嶽含竒臣素所未知近日連接該鎮公文觀其辦事亦似誠實謹慎者臣自當遵㫖再加試看也又奉諭㫖所見甚是已諭部矣欽此臣巳接准部文行令蔣諭㫖命卿督豫時即當題請改設者張孟儀既如是賢能稱職以之題補允屬人缺相宜欽此臣已遵㫖具題矣又於臣覆奏二麥收成分數摺內欽奉諭㫖果如卿言他省云胡不盡然耶近有通飭諭㫖甚明實出朕本諸天良之論若云與朕無涉亦非第功過不相抵耳必直省悉皆如是普遍豐亨卿此聖敬格天一語庶幾居之無愧否則方將抱歉未遑聖之一字何以克當欽此臣跪讀之下仰見我皇上聖德撝謙實千古聖帝明王所未有臣雖未讀古書然於唐虞三代典謨風雅之中求之不自掩其過者有之不自居其功者有之而欲如我諭㫖自蒙上天鑒佑勉之勉之又奉諭㫖以手加額覽焉又奉聞外山東秋收亦巳行查又遍加詢問俱稱與豫省無異俟各屬報到臣亦當奏奏翟世有拾金還主摺內欽奉諭㫖小民慕義乃屬可嘉可喜之事有㫖諭部矣欽此臣巳接准部咨大張告示宣布皇仁使河東兩省人民咸知感奮效法以成一道同風之治今又於雍正六年七月初三日據歸德府詳報商邱縣丁家道口賣麵貧人陳懷金於四月十四日拾江南洋客王盛之銀二十四兩八錢銀主找尋陳懷金問明銀色數目相符全數送還力辭酬謝等因到臣其所拾銀兩雖無翟世有之多然而貧民還金之義則一也仰見聞所有奉到硃批原摺理合恭繳謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正六年八月初二日臣家人齎回臣覆奏恭報動用耗羡銀兩摺內欽奉諭㫖自朕踐阼以來此舉實屬善政今各省悉皆仿效而為矣但若稍涉不公不洽則亦不可以行也又奉諭㫖議論可謂是當之至以上數項皆地方要務亟應辦理者卿權其輕重緩急一面奏聞一面次第舉行欽此臣自當凛遵聖訓悉秉至公務求至洽使行之無弊官民各受其益至於臣奏請修城等項公事更當遵㫖權其輕重緩急繕摺奏聞次第舉行必令公事悉經辦理而公帑仍復充盈方為上下各足內外兼濟以盡臣職也又於臣密奏社倉穀石摺內欽奉諭㫖通計直隸各省中能體朕意如式遵行者不可多得卿宜勉為之欽此臣賦性庸愚事事仰體硃批諭㫖理合繕摺覆奏仰祈睿鑒謹奏覽奏為奏聞事臣竊聞山東濵州地方舊有董姓人家自恃族衆丁强習為竊盜近年以來雖聞頗知斂迹不似當年之肆行無忌而習氣恐未盡除若得地方嚴加懲戒務令革面洗心均為聖世良民地方亦悉享寧謐之福矣伏祈睿鑒臣謹奏董姓一家聞自前明以來久積穢行其宗族中不乏衣冠人物而乃暗為寡亷鮮恥干犯功令之事竟習以為常斯言非出自無稽宵小之口似乎確鑿不誣卿其加意精詳體訪如得有實據徐徐設法懲治鋤莠淨盡斯良苖滋長也朕恐風聲泄漏未經更諭一人密之雍正六年九月初八日河東總督臣田文鏡謹奏為欽奉諭㫖據實覆奏事雍正六年八月二十四日臣齎摺家人回豫奉到皇上硃批摺奏山東濵州地方董姓一事臣跪讀諭㫖當即欽遵密行訪察務期必得實據然後徐徐設縣南三十里有一弔莊徐秀家嘗有一起來厯不明之人往來不定有青州府益都縣人髙擇善即徐秀家所住之人朝散夜聚不知所為何事禾見聘娶竟有草泊吳應元送婦女登門等情由飛咨署山東撫臣嶽濬并檄行山東布按二司密行查拏去後復據山東署按察使梅廷對詳稱髙密縣拏獲髙擇善徐秀徐明王福臣徐臣供出教首牛三花子諸城縣拏獲楊文邱志柱供出教首牛三花拉即牛三花子又拏獲牛三花拉之妻孫氏女小兌姐雇工婦張氏據小兌姐供出牛三花拉名呌牛見德是兗州府東平州人莒州拏獲談標談道德談祿德安丘縣拏獲范文信髙密縣拏獲張華商朱相卿供出牛三花拉賈得志二人為首現獲各犯或供係三元㑹空字教或供牛三花子戴五福冠穿青偏衫能發表牒超度人祖宗或供牛三花子能持正空家鄉無生父母現在如來彌勒花子等務獲根究夥黨盡弋無遺在案俟拏獲之日另行奏聞再臣又訪有濟寧州惡棍王奎文聊城縣惡棍回子蔣三范縣襟棍李曰蓮東平州積賊劉鐸劣監呂二拗子嘉祥縣襟棍黃公弼等俱行山東布按二司查拏審解在案再東省文武大小屬員除訪有劣蹟昭著難以姑容者另疏糾參外其餘俱自臣任事之後情願改過自新應再密加廉察如徒託空言仍不悛改再行糾參合并奏明伏乞皇上睿鑒施行謹奏覽奏知道了所參陳謨允當之極同日又奏為直陳歸充公用之非宜仰祈睿鑒事竊照國家取民有制而臣子事君有道食君之祿而恣其貪黷以剝民固為不可潔已之身而盡其所取以奉上尤屬非宜臣見督撫大臣每以從前歷任相沿之積弊數十年未革之陋規不問其取之義與不義惟知矯亷邀譽槩為奏請歸公以充公用更有本係一已之婪贓巳收入槖又恐敗露不敢私吞不得已而奏請歸公以蓋前愆則是諸臣欲博已之清名欲逃已之貪欵而悉舉而歸之於皇上臣恐敬君愛君者當不如是也臣蒙聖恩畀以總督河東重任命下之日即聞山東大小各官驚惶無措臣不得已而開以自首之門許以自新之路聞濟東道衙門所得驛站陋規又為署撫臣嶽濬奏請歸公矣兹據山東督糧道魯國華首出所收東省漕糧項下各州縣每年送糧道公用銀一萬四千五百六十八兩又隨封銀一千四百五十六兩八錢倉糧項下各州縣每年送糧道公用銀一千七百二十兩歷來各州縣舊有准支盤費腳價公費銀一千七百三兩零以上四項共銀一萬九千四百四十八兩零查糧道魯國華所開單內每年解送總漕公用養亷等項銀共五千四百四十兩巡撫公用等項銀共三千三百三十六兩倉場總督滿漢二員共銀四百八十兩今年未收止收隨封門禮共銀五十六兩坐糧㕔滿漢二員共銀八十兩去年今年俱未收各筆帖式共銀九十六兩各吏書銀一百兩滿漢户科滿漢户部司官共銀二百八十一兩零該道衙門心紅紙張銀三百兩又倉糧每年呈報四季巡環送總漕巡撫布政司户部户科倉場各衙門書辦共銀三百二兩又户部銀六百兩內四百兩係起批解送又户科銀一百二十兩又起解倉項錢糧送户部飯銀三百五十兩又實用部費銀六百兩以上共用銀一萬二千一百四十一兩零實餘剩銀七千三百六兩零留作糧道養亷查東省惟驛道糧道兩官從前未曽議給養亷任其濫收各屬陋規以作養亷又查豫省道員每員止給養亷銀三千兩已足敷用而東省道員每員給養亷銀六千兩竟逾一倍原屬過多今糧道魯國華不敢復行收受陋規請照各道之例每年赴司具領養亷銀六十兩并請行令布政司轉飭各州縣以前項漕倉陋規照數解司以充公用等語到臣臣思此等銀兩雖解自州縣無非百姓之膏血上司每年照數取索而州縣每年照數派徴州縣假借解送之名而魚肉小民用一派十解糧道者雖不及二萬兩派小民者竊恐二十萬兩尚不止也今因臣行查情極而請歸公則是該道所不敢取之於州縣者而謂歸之於公便可每年照數徴解彼其意以為外而督撫等衙門內而部科等衙門為必不可少之項故不敢請裁革而但請歸公臣不知各衙門每年收去此項銀兩作何項公用是否必不可少無則便至誤公抑或盡歸私囊以肥身家伏乞皇上敕諭戶部户科倉場總漕巡撫諸臣令其各行查明如委係辦公之項斷不可少臣請應動司庫耗羡銀兩給發此項派之於民者急冝裁革若借公用為名盡收入巳不但嗣後立應革除以蘇民困即從前收受者亦應追出入官方可以懲貪而警暴也臣愚以為督撫奏請歸公之項如豫省鹽商節禮東省泰山香規等項方可奏請歸公以充公用蓋以其非取之於民也此外凡取之於民者皆係私派之贓應除之弊豈可槩行歸公以致纍民至於東省驛道衙門驛站陋例已請歸公亦屬未合蓋有驛州縣將馬不照額餧養內多缺少將夫不照數雇募剋減工食彼上司因屬員有如此劣蹟遂乘機訛詐每年抽取陋規若干一任屬員所為竝不查究而各屬因上司得其陋規不懼查參竟縱所欲為餧馬之料豆麩草不用錢平買盡派之於閭閻應差之扛轎夫船不用錢平雇盡取之於里地甚而驛馬倒斃本有正項開銷亦令民間買補馬價悉歸入巳蠧國殃民莫此為甚臣以為此項銀兩亦應裁革不宜歸公裁革之後務令州縣必須實夫實馬實工實料以應付差使倘猶有缺少而派取者該管上司不時查參將州縣照貪官例計贓治罪倘有不肖之上司於裁革後復染指分肥通同徇隱事發之日亦照貪官治罪均按贓加倍嚴追如此則驛站不致廢弛郵政日有起色矣臣更請皇上特降諭㫖通行嚴飭各省督撫大吏嗣後各崇大體凡不應歸公之陋規止當請㫖裁革不宜奏請歸公使清名亷節盡歸於已而竟以司道之公庫為此輩免贓脫罪之便徑并從前有如此上竊之於國而下取之於民者除已經歸公外悉行確查停止革除至於可以歸公之項奏請時必須將無礙於國無礙於民之各緣由於摺內奏明仰候睿裁不得仍前含糊具奏其東省道員養亷應照豫省之例每員每年止給銀三千兩裁去一半糧道亦請於司庫耗羡內動給三千兩以作養亷其餘大小各官養亷有從前派給未協或多或少或有或無容臣徹底查明㑹同山東署撫臣嶽濬酌量妥確另行奏請臣為歸公之弊上關皇上聖明起見微臣敬君愛君之心不覺其冒昧瀝血陳請伏乞睿鍳施行謹奏所奏殊屬可嘉之至朕實未思及亦從未聞有言及此者若非辦理出於實心何能如是計慮周詳而更敷陳透徹耶欣悅覽之另有諭旨同日又奏為觀候月食事雍正六年八月初十日准禮部咨雍正六年七月二十日奉㫖據奏占書內稱七月月食陳州人惡又稱三日內有雨則災解等語朕深為之憂畏又意陳州係河南地方田文鏡居官清正其境內不應有災今於三日之內果得時雨則陳州地方自與占書相符不為災矣天人相感之理固應如是欽此臣即行河南布政司查察去後兹據該司稟稱據陳州知州林貽熊禀稱雍正六年七月月食十六日未時即得雨起至十七日丑時入土五寸四野均沾已經具文報明再陳州所轄之西華等四縣均於十六日得雨亦經各縣申報在案又查陳州以及所轄四縣境內百穀咸登實有十分收成閭閻男婦熙熙皥皥竝無疾疫等情到臣臣查本年七月月食陳州人惡三日之內有雨災解見於占書聖心深為憂畏果於三日之內得有時雨不致為災此皆我皇上至誠感格是以三日之內即於京師得雨上蒼明告以化災為祥之兆以慰聖心及臣奉㫖行查而陳州并所屬四縣又於七月十六日得雨霑足且河南通省州縣均於是日得雨經臣具奏在案乃蒙皇上恩綸奬勵及臣臣實惶愧無地惟有益加誠恪敬慎以仰報皇上天恩於萬一耳所有查眀陳州得雨日期現今地方寧謐人民熙皥情由除恭疏題報外理合繕摺奏聞謹奏覽奏陳州於三日內得雨果與占書相符從來善政可以消災乃自然之理也天道感應不爽朕信之最確同日又奏為豫省車法已經教演嫺熟仰祈睿鑒事竊臣遵㫖於臣標暨南北兩鎮標共挑選馬步兵丁二千名於雍正六年六月三十日怡親王發來三等侍衛鄭廷試藍翎侍衛談偉趙璉三員又臣差把總史維文赴京領車一百輛於雍正六年八月初三日到豫據侍衛鄭廷試等單開每陳用車六十四輛推車需兵一百二十八名炮手需兵六十四名鳥鎗手需兵二百五十六名弓箭需兵一百六十六名馬兵三十二名吹海螺需兵八名鼓手需兵八名共需馬步兵六百五十六名臣查豫省所挑兵二十名止足分作三陳臣酌量營汛附近省城者令侍衛談偉督率所挑兵丁於省城教演一陳侍衛趙璉往南陽鎮教演一陳侍衛鄭廷試往河北鎮教演一陳所有赴京領回車一百輛臣留省城四十輛分發南北兩鎮車各三十輛令各照式造足六十四輛每日令各營將辨㑹同侍衛用心教演臣於八月二十七日親詣驗看侍衛談偉所教兵丁俱巳演熟方圎合式進止部伍整齊復據侍衛鄭廷試趙璉各禀稱南北兩鎮車法亦俱教演嫺熟臣已令各兵仍歸營伍并令各營汛將辨不時督率自行演習不致生踈以候臨時奉㫖調用其侍衛鄭廷試談偉趙璉臣即當令其回京所有豫省車法教演嫺熟緣由理合恭摺奏聞謹奏覽奏車法已俱教演嫺熟甚好鄭廷試等令其回京可也硃批諭旨卷一百二十六之十三欽定四庫全書硃批諭㫖卷一百二十六之十四硃批田文鏡奏摺同日又奏為欽奉聖訓據實覆奏事雍正六年八月二十四日臣家人齎回臣覆奏費金吾唐綏祖摺內欽奉硃批諭㫖前經有諭費金吾若能變僞為真則可稱上等才品但恐巧黠二字伊自不肯捨耳唐綏祖朕不深悉其人卿必知之最確又奉硃批恆持此心用人何得致有差謬欽此仰見我皇上至聖至明無微不照臣觀費金吾實屬歷練明白惟其歷練過深未免畏首畏尾明白過甚未免裝啞裝聾若肯真心辦事洵為上等才品如用其智僞以愚人亦屬難防之事恐極聰明人鮮有不墮人未免恃才使智其才亦屬小巧之才其智亦屬尖酸之智用之得當則才智皆為有濟雖不如費金吾之深沉然其同在一處茍能實心辦事則又臣之幸也山東署撫臣嶽濬雖聰明有志終屬年㫖親往山東察視所有臣起程日期另疏題報又奉硃批此語實出自赤衷非欲致飾謙光之美也天監昭垂朕從不為心口互異虛僞之談卿係深知朕者諒必篤信其然欽此臣愚以為乾行不息聖敬無疆天下惟有至聖之聰明然後能見透至誠之實理是以治至唐虞而民不知德至孔子而言愈抑此皆誠實積中而英華發外不期然而然者若心口互異則偶然假飾於此而無心即現於彼豈得如聖人之自然呈露乎臣本庸愚雖不能仰見之矣又奉硃批朕御極六載直隸收成今年可稱為第一豐熟然亦與朕無涉欽此臣聞之自求多福和氣降祥此自然之道皇上豈斤斤而謂如何敬修而後能使雨䁑時若如何默契而後能使年穀順成乎亦惟朝乾夕惕以殫宵旰之勤日就月將以立君師之極因而化行俗美太和之氣充溢宇宙而天降康年以應之耕鑿農民深沐樂利之恩尚不知為硃批天祖鑒之矣欽此臣之以敬君愛民四字銘刻於中者實出臣之一點血誠如託之空言以欺君罔上硃批細民美行疊見於豫省誠所謂瑞事也另旨諭部欽此臣自當候部文至日欽奉奏黃河中泓刷深丈尺摺內欽奉硃批河流順軌實由天祖之錫福何可歸美於朕至如簡命得人之功朕亦不辭也覽奏嘉恱慶幸之懷洵非楮頴所能形容者惟與卿期加勉加慎以保厥終耳欽此臣查黃河水性允翕為難自我皇上聖敬格天大孝格祖而又懷柔百神及河喬嶽是以靈河告瑞循軌安瀾臣與豫省臣民共沐𢎞休於覆載之中但臣心稍不忠誠政無紀律雖上天聖祖未必以皇上敬陳者耿家水口係全河大溜頂衝今春堤掃蟄陷勢甚危險是以副總河臣嵇曾筠一靣將下北河同知張近光等題參一靣動帑搶救及至桃汛之後大溜忽走中泓刷去南灘淤起北岸臣接嵇曾筠來字與臣所查無異是以屢經奏聞迄今北岸新淤之河灘竟離中泓大溜有七八十丈之逺舊時所下之掃出在高岸無水之地洵屬異事但耿家水口動帑搶救正在全河頂衝之時而大溜南遷又在動帑搶救之後嵇曾筠題估此項工料疏內自應將昔險今平聲明為是乃仍以頂衝危險題估臣是以未敢注題將原稿送回不意副河臣已經拜疏雖錢糧已在險時用去係應准開銷之項而疏內不將搶後平易緣由分别聲明奏明又於臣恭報豫省秋禾收成分數摺內欽奉殊批朕惟額手為中州赤子稱慶而已慰恱之懷筆何能宣欽此臣查豫省未收之晚豆棉花蕎麥今已全收皆堅好穎栗十分收成現在雨暘時若農民趕種春麥均稱土膏滋潤明春麥苗又可預保其暢茂條達萬姓歡呼理合一併奏硃批自䝉上天錫祐也又奉硃批此數州縣每多水患或係疏濬未周抑或堤防不備卿須留心料理一番除去斯民疾苦又奉硃批此等陋習宜詳加訓誡開導愚蒙務俾改革又奉硃批雖然亦不可事前懸定固執成見也欽此伏查東省秋禾收成分數前因路逺未據各屬全報到臣但據兖州府屬并曹州濟寧州所屬報到者具奏今已據通省府州縣衛所具報俱有十分九分八分七分不等內惟有齊河禹城鄒平陵縣高苑五縣威海成山靖海三衛止六分收成樂陵一縣止五分收成至於報災各州縣每常如此其為疏濬未周或堤防不備誠所不免現在飭查令於農隙之時務期疏濬深通堤防完固兹據山東布政司禀稱山東秋禾全省豐收即報災之處成熟者十有七八其被水者僅十有二三在一邑之中其情形固有分别即一村之內亦豐歉迥不相同且被水之地不過晚禾缺收其二麥暨早禾俱先經收例臣已明白開導詳晰曉諭矣如果成災臣又當六年錢糧及今將屆全完之期尚完不及五分之數不勝駭異因而留心細察一由於各州縣之火耗太重一由於各州縣之私派太多甚至有令民先完私派後完正供者因欲私派不得不用里書總書等役名雖不同其實即係昔日之里長或每里一二名或每甲一名州縣實徴赤籍是其攢造其按糧灑派亦其所為此等里蠧定例久經禁革而山東各州縣違例不革者利其私派也私派之擾纍總在小民其各紳襟貢監不敢過問其各衙門書役不敢濫加更有不肖紳襟從而把持二三土棍從而附和使小民飲泣吞聲不敢言喘用一派十而此輩竟得從中分肥故樂於地方官之派而不樂於地方官之不派里書總書等役視為必不可少之人堅不肯革平時即用其催糧每將民間錢糧先收擎用懦者勒令重納强者陸續補完一至無力補完揑報死故或挈眷逺逃以致錢糧完納不全此一病也故人人謀充里書總書每於年終㸃充之時每名出銀二十四兩二十兩十六兩不等先送入官官得其陋規即行㸃充是以地方官明知其蠧害而貪此陋規決不肯革由是總書里書等役之把持甚牢而其為害更毒又有庫吏總吏户糧房匱書原差銀匠等役私收花户錢糧預借里書銀兩通同侵蝕牧令之清正者尚知忌憚若一有虧空一有婪贓即被此輩挾制惟所欲為故往往有設計誘官致令虧空以圖遂其挾制之私者此東省錢糧半虧在官半虧在役而實在民缺者無幾此臣之所訪最確者也至於火耗太重正項不完者其故何在臣查東省耗羡統係加一八內除解費添平并存縣辦公銀兩外悉行確者也雖經臣大張告示嚴檄飭禁誠恐積弊已深一時難以頓改何也從來大法則小廉上行則下效州縣之加耗加派其利全不入州縣之手其罪全不在州縣之官自巡撫布按兩司道府直隸知州同知通判皆不得而辭其責也山東州縣不論大中小每州縣給養亷銀一千兩而上司陋規每年却用至三四千兩斷不可少即有上司不得而歸公者亦有上司不收而縱容書役家人索取兖寧道衙門八兩巡道衙門五兩夲府夲州衙門十六兩同知通判每衙門三四兩此各州縣謁見上司之難也及解地丁錢糧則有鞘費部費𫾣平飯食驗色紅簿掛牌草簿寄鞘劈鞘大門二門內柵外柵巡風付子實收投批投文茶房等名色每解銀一千兩約需銀三十兩不等又解黃蠟牛角弓面輕齎席草鹽鈔臨倉使費河銀解費驛站使費起解夫馬小建閏月裁減各役小建等銀添搭奏銷部費冊費稿房冊費糧僉部費外房使費冊費本府封筒民壯幫貼夲府更夫炮手聽差厨役水火轎傘等夫起解課程按察司刑名部費以上自愛之州縣初登仕籍正思發抒其幼時之所學禁州縣之加耗加派必先嚴上司欲嚴上司必先革陋規陋例但臣離東遙逺示檄雖發而陽奉隂違者多查察雖嚴而漏網幸免者亦復不少必得皇上特降明旨嚴諭山東撫藩二臣著落其半年之內協同臣徹底查清分别應參者參應追者追應禁者禁應革者革若撫藩瞻徇容隱尚留絲毫陋規蒙皇上聖明察出或經臣題參將撫藩二臣敕部嚴加議處庶幾有所畏懼而臣雖隔逺亦不致有鞭長莫及之虞矣又於臣恭謝天恩摺內欽奉硃批朕之錫豫駢蕃祗以鼓勵卿忠誠報效之志覽奏謝矣欽此臣犬馬力微圖報不盡而又蒙綸音褒寵臣實惶愧無地惟有殫竭心力以仰報天恩於萬一耳所有奉到原摺合併恭繳謹奏覽奏深為嘉悅卿其勉之雍正六年十月二十七日河東總督臣田文鏡謹奏為恭報河束兩省雨暘時若二麥青葱仰祈睿鑒事竊照河東兩省仰䝉皇上聖德格天俾得年穀順成盈寧共慶復又雨水調勻土膏滋潤民間得早耕犁播種二麥播種之後自九月十六七八等日臣赴山東正在途次日晴夜雨極其霑渥嗣據兩省州縣具報到臣俱稱入土甚深四野遍及臣已到東省後又據河東兩省州縣具報於九月三十十月二十一二等日復又得雨雖至今尚未得雪而雨水霑滋麥苗長發現在青葱遍地共慶明春又得豐收除俟一得瑞雪另摺恭奏外理合奏聞仰慰聖懷謹奏覽奏兩省雨暘情形朕懷深慰都中亦於月之初三四連得應時瑞雪特諭卿知共相慶喜同日又奏為恭摺代謝天恩仰祈睿鑒事竊據分守河南彰衛懷三府兼管河北河務兵備道朱藻詳稱藻父作鼎於江南安徽按察使任內認還借缺原任鹽法道孔興璉銀一萬六千兩除業經完過銀八千四百八十三兩零仍缺銀七千五百一十六兩零奉旨將藻與胞兄江西饒州府通判朱藩解任著追又欽奉諭旨河北道朱藻因伊父朱作鼎缺帑未完該旗奏請將朱藻解任勒限追補巳降依議之㫖今吏部將河北道開缺朕聞朱藻向來居官尚好且在河工有年著詢問田文鏡若將朱藻留任可以照限清完伊父缺項而於地方公事無礙則將朱藻仍留河北道之任倘田文鏡不能保信則河北道員缺著田文鏡於所屬道府內揀選題補欽此又奉諭旨朱作鼎暫停解晉監追俟田文鏡將朱藻可否清完伊父缺項之處具奏到日再降諭旨欽此又奉諭旨河北道朱藻著照該督所請仍留原任餘著議奏該部知道欽此經部覆准將朱作鼎未完銀兩著落朱藩朱藻分賠對完朱藻名下應追銀兩行令該督務於一年限內照數追完解部等因又奉諭旨依議朱作鼎著暫停解晉監追已有旨了欽此藻父子兄弟荷䝉皇上天恩至深至重迥異尋常情難自巳詳請代為恭謝天恩到臣臣查道員無詳請代題謝恩之例然朱藻此番所受實屬從來未有之天恩感激出於至誠情詞極其懇切臣又未敢壅於上聞謹恭摺代為奏謝伏祈睿鑒謹奏朱藻若猶不知感激除非木石耳但能遂其圖報之心與否又看伊福量何如難可預定如加以逾格之恩寬其不赦之條遂皆肯盡力輸忠則得人之道最易用人之術無難矣不然不然同日又奏為欽奉上諭事雍正六年九月二十六日准户部咨開怡親王等奉上諭京師及西安需用騾頭爾等即行文直隸河南山西山東各該督撫令其照數採辦一應價值及餧養料草與沿途牽送夫役各地方官皆動用正項錢糧毋得借端擾纍民間著即遵諭速行欽此又於雍正六年十月二十五日准山東巡撫咨准户部咨將河南山西二省採買騾七千頭就近解送陜西已足備用等因到臣臣即飛行河南山東布政司欽遵查照發銀採買去後除山東騾頭應聽署撫臣嶽濬料理外臣查河南素非産騾之地即民間間有孳生騾隻俱低小無力難以任重致逺所用騾頭原係山陜兩省販子趕求貨賣價值本自昻貴從前採辦軍需部定每騾一頭價銀十二兩實屬不敷地方官俱令里下派增臣於雍正五年十一月奉旨採辦軍需䭾騾三千頭此時即知豫省騾少價昂斷難以十二兩一頭購買是以奏請動用司庫公項每騾一頭給價銀十四兩仰䝉皇上俞允此番復辦軍需奉旨動用正項錢糧雖與上年動用公項不同但十二兩定價委難購買臣仰體皇上軫念官民之聖心已飭行河南布政司除十二兩部價并餧養料草沿途牽送夫役工食遵照部行作正報銷外每騾一頭於部價十二兩外酌添銀二兩以符上年每頭十四兩之數河南一省應共買騾三千五百頭應共添銀七千兩即動用司庫公項銀兩添給各屬採買務令選擇肥健之騾依限解送每正騾十頭令其買備餘騾一頭以防長途解送之時偶致病瘸即將餘騾選補應共買餘騾三百五十頭共用銀四千九百兩亦動司庫公項買備俟正數解足之後其選剩餘騾仍令原買之州縣變價還項似此騾價敷足可以從容辦理若仍有借端派纍并遲誤軍需者經臣嚴行糾參彼亦甘罪無辭也再查雍正五年採買䭾騾三千頭每騾二頭用夫一名因係動用公項其沿途飯食宿店俱係按日支銷有食無工故每名酌給安家銀三兩今番用正項錢糧既給以工復給以食即不必再給安家銀兩矣至解送之時押解官役盤費及籠頭韁繩醫藥并住宿之處燈油等項不無所費亦應動用司庫公項統俟辦解完日除所用正項核實造冊題銷外其所用公項確數容臣另摺奏聞再山東所辦騾頭臣現在山東業將臣辦理河南騾頭事宜告諸撫藩二臣矣彼自必斟酌妥確奏明無庸臣再行瀆奏所有臣動用司庫公項採買河南騾頭事宜臣未敢擅便理合具奏伏祈皇上睿鑒施行謹奏籌酌甚屬允當即照所奏辦理已命該部存案矣同日又奏為欽奉上諭事雍正六年十月十八日長蘆巡鹽御史臣鄭禪寶齎捧皇上硃批該御史會同刑部侍郎繆沅具奏酌議養廉事摺內欽奉諭旨與田文鏡商酌行欽此臣查養廉一項雖出自地方耗羡然一經奉旨賞給即係天祿人臣授爵當量其能而人臣食祿當因其事事繁而祿少則不給事簡而祿多則虛糜其失一也查山東布按二司管理全省錢穀刑名其事誠繁從前酌議養廉每員銀一萬兩巳為不少至於各道每員給銀六千兩較之河南道員止給銀三千兩者似乎太多今查運司職等於道員而事且不及藩臬雍正元年奏明運司每年給銀一萬兩原屬浮濫今止應照道員例若照山東道員每年給銀六千兩尚屬過多如照河南道員每年給銀三千兩似乎略少可否酌給銀五千兩一年薪水之資似可有餘至於兩分司止應照同知通判例議給查山東同知通判尚未給與養廉而河南同知止八百兩通判止六百兩今分司分理場務其事較同知通判略繁則其祿食應較同知通判略厚可否運同酌給銀二千兩運判酌給銀一千六百兩至於經歷庫大使等官原係首領雜職閒員查布按兩司與各府首領各官俱無養廉而庫大使場大使雖有所司之事亦屬簡而不繁今議以要缺之永阜永利濤雒三場大使每年每員量給銀三百兩其經歷一員庫大使一員批驗所大使二員信陽登寧王家岡石河西由富國海滄等場大使七員每年每員量給銀二百兩似足敷用庶為得中臣之鄙見如此不自知其是否允協除聽鹽臣鄭禪寶會同侍郎臣繆沅商酌具奏外所有臣奉旨商酌事宜理合奏聞伏祈睿鑒施行謹奏斟酌養廉之數甚屬允當適中會奏到日有旨同日又奏為查明沿海汛兵揑報賊船情由據實奏聞仰祈睿鑒事竊臣䝉皇上天恩自畀任巡撫簡拔總督以來雖遭逢盛世永慶升平而受恩深重報效心切一應海防機務素亦留心學習今䝉聖恩總督河東登萊一帶正值沿海邊隅敢不悉心研求務期詳晰通曉謹以臣訪察情形為我皇上敬陳之大凡海島之間賊藪難搜之使盡而海洋之上賊船難信其必無但今日之海賊非若昔日之盤踞以圖竊發也本為賊船而遇客即劫者固是賊即本為民船而遭風失本遇客亦劫者未嘗非賊也哨船不到之處巡查偶疏風潮不順之時漂泊失所不幸而遭此輩之荼毒供此輩之貪叨防之不可不嚴也臣又以為閩粵之洋船不少富商大賈其所販之百貨亦多山海珍竒至於登州以北關東以南往來商艘則布帛菽粟糖果等物居多此海面情形南北不同也入夏以來東南風競南船俱皆北向霜降以後西北風多南船不能北來此又海面風色順逆不同也故於四月間登膠哨船俱皆出洋巡哨直至九月始歸即沿海各省之哨船亦無不於此時盡出則滿洋皆係哨船賊船又何敢再進臣在閩省時嘗詢問久慣出洋之老成客商皆云賊船探聽信息最捷每於海島高處望見哨船旗號即知某處哨船巳經出巡則悉皆隱匿遁避此又海中賊船出沒之情形也倘正值巡哨之時而仍不免劫奪之事此在於巡哨者之疏防而非海中洋面之不寧也然此皆大洋以外事也夫大洋之與內地相距甚逺大洋之旁謂之海口凡洋船欲入內地皆由此入港炮臺即於是乎建立焉此處去村莊居民多則百餘里少亦不下數十里海口以內大者謂之內洋小者俗名海套不知者一望無涯即以為海也海口小而海船大者則不能徑進必用腳船而後能入此又海船入港之情形也知此情形則巡防守禦之道可以講矣再商船入口必係府州縣治或大鎮處所為商貨屯聚之地內有牙行經紀商船方於是入口驗票納稅卸貨發行其餘小口商船素所不入惟立炮臺設汛兵以防禦之耳間有乘腳船以入者不過避風泊船於外入此打水買菜而已從不驗票納稅阻滯留難詎於雍正六年七月初六日有海商福建莆田縣人詹逢春陳日升吳德瑛各領號票各駕鳥船一隻裝載糖布烟紙等物至膠州發賣回貨遭遇北風將船暫泊膠州之古鎮口外桃林灣處候風初七日駕腳船入口上岸買菜打水路遇營兵張士琦勒索驗票規禮不令歸船詹逢春等許以次日取票送驗并送規禮始行放歸不料歸船之後詹逢春等皆以此處並非驗票海口不肯濫給銀錢兼之初八日忽遇大雨風浪又作不能上岸張士琦即赴靈山衛以賊船稟報把總劉玉劉玉即帶鎗手十名至桃林灣望見商船隔逺先用衣裳招呼不應即放空鎗恐嚇而張士琦隨用炮打以致詹逢春等不敢停泊於初十日早風信稍順將船駛進膠州港口投王元順行內赴州呈告通詳經臣批行山東按察司審出前情此其罪雖由於汛兵張士琦之勒索起釁而把總劉玉並不思及當此七月初秋正值兵船巡哨之時安容賊船停泊兩三日之久況容其入口上岸買菜打水乎其為商船不問可知矣乃仍打鎗放炮以快其勒索不遂之私其苦纍商民事尚屬小而揑報賊船擅放炮位搖惑沿海軍民之心其罪甚巨因而七月二十三日諸城縣南龍灣海口巡檢喬燮見船二隻自靈山前來到亭子蘭炮臺正南避風營兵亦用炮打該縣通報又八月十三日即墨縣望見巉山口有船二隻亦疑為賊船營兵放炮驚打該縣通報今據司道等審出確情俱係商船皆由膠州古鎮口汛兵張士琦勒索規禮不遂即目為賊船用炮驚打所以沿海一帶人人驚惶互相效尤且聳動江南督撫道員營將亦為之訛以傳訛混詳瀆奏觀此則劉玉張士琦之罪未可恕也臣既查明即應題參惟因署山東撫臣嶽濬曾經密示皇上硃批伊奏摺內諭旨仰見皇上至聖至明無微不照臣自應欽遵聖諭何敢復行瀆奏但臣愚以為防海事宜當嚴之於外洋至於內汛第當不時瞭望防守而巳若外洋有賊船巡哨者報之辨兵又未免驕恣矣輕事重報軍法所懲況皇上髙厚天恩不但將辨邀免參處即文職地方官亦皆得蒙寬典臣又不知其如何感激也臣受恩深重凡有愚誠不敢自隱冒昧瀆陳伏乞睿鑒施行謹奏覽同日又奏為欽奉聖訓據實覆奏事雍正六年九月二十九日臣齎摺家人回至山東敬捧皇上硃批諭旨到臣於臣覆奏唐綏祖欽奉諭旨聞其多病精神甚憊今用伊為鹽道矣能勝任否欽此臣查唐綏祖去冬曾染患時證今巳全愈伊形體雖天生瘦怯而精神却强今䝉皇上調補鹽道查鹽道專管鹽政事屬簡易自必料理無誤又於臣覆奏山東署撫臣嶽濬欽奉諭旨大都此等舉動非出自嶽濬本心皆緣費金吾慫慂而然昨批諭費金吾一摺尚未回繳俟繳到發卿密看即知其中底裏矣卿至東省面晤嶽濬時推誠相告料伊必歡欣領受而且佩服實係少年美才將來大有可望加意開導如朕前諭照親子弟一般相待將所批之㫖亦密令知之欽此臣於九月二十三日至山東省城即㑹見署撫臣嶽濬察其言詞觀其舉動少年老成聰明伶俐洵屬可望之才器臣又奉諭旨臣即密令知之彼亦感激將來自當益加奮勵又於臣奏陳東省舊缺未完及火耗太重私派太多欽奉諭旨江南更甚不得賢員清理奈何欽此臣查清理地屬員於督撫新到之時鮮不有所忌憚及久而久之而在上之督撫因欲速不達不覺生怠倦之心彼在下之屬員因窺其易與未免復舊時之習此仕途之通病而臣常於此兢兢自勉也又於臣奏陳東省州縣徴收火耗加二加二五加二七八不等欽奉諭旨此弊深可痛恨亟當嚴行剔除以解倒懸欽此查得臣未奉聖恩總督河東之前山東州縣大抵皆然若欲題參則通省無一可留者臣無可奈何開以改過自新之路自雍正六年六月二十日臣到任視事之後如有再犯者必定嚴參今各屬當臣新蒞之時莫不奉法維謹但恐一時收斂後或縱肆而臣駐劄河南去東遙逺且錢糧事務俱由巡撫掛批布政司收兊臣衙門不過一文報知而已今奉奏陳東省州縣進見各衙門需索門包欽奉諭旨有是理乎欽此臣查近日各上司衙門俱不敢收受門包但各役不能無費臣現在清理又於臣奏陳上司需索欽奉諭旨言及此洵可為太息流涕者矣欽此凡為上司者多由州縣做起當其為州縣時未嘗不鄙上司之叨餮亦未嘗不苦上司之誅求及至為上司而即將平日所鄙所苦者轉而施之於所屬此皆利欲薰心絶不知孔子忠恕之學大學潔矩之道一惟我所欲為而且縱其奴以肆毒任其役以舞文而硃批諭旨理合繕摺覆奏伏祈睿鑒謹奏覽雍正六年十一月十八日河東總督臣田文鏡謹奏為恭報河東兩省所得雨雪日期仰祈睿鑒事竊臣在東省據河南各州縣陸續具報於十一月初三四五六等日連得雨澤入土甚深東省各州縣於此數日亦同得雨俱各具報到臣臣於初十日自濟南府起程前往登州一路查看莊田土膏甚是滋渥得雨之後又復連日霜濃日暖遍地麥苗青葱長發臣詢問沿途耆老農民均稱冬至之後宜雪不宜雨今尚在冬至以前此雨正是甘霖苗麥正得滋潤預慶來春豐收可必及臣於十四日行到濰縣地方得遇大雪自未時起至亥時止積厚四五寸不等低窪之處竟有七八寸之厚此臣所身經目擊者嗣復據各州縣報到得雪與臣所見分寸相同除豫省於十四日曾否得雪容俟各屬報到另行具奏外合先奏聞仰慰聖懷謹奏覽奏雪雨情形朕懷深慰畿內兩次得雪亦已霑足矣同日又奏為據實奏聞仰祈睿鑒事竊臣接准吏部咨開欽奉上諭江安糧道員缺著南陽府知府劉永鐄補授南陽府知府員缺著田文鏡於所屬員內不論合例不合例之員揀選題補俟揀選得人題補後劉永鐄赴江安糧道新任欽此臣查南陽府知府劉水鐄原係泌陽縣知縣因該縣熟悉河務是以將其題請調補滎澤縣知縣調任之後臣又見其頗有才具審斷無枉以為是一賢員正藉為臂指之助至雍正五年奉旨著劉永鐄赴部引見臣恐皇上調用别省又經臣奏請皇上天恩仍將劉永鐄留在豫省補用復䝉俞允并加劉永鐄以知府職銜令臣遇有知府員缺即行題補適值南陽府知府缺出臣即遵旨具題又䝉天恩將劉永鐄補授臣正望其感激天恩大展才猷以圖報效乃劉永鐄自到知府任後臣見其所辦之事率多拮据大不如知縣任內之明白妥當臣再三教誡令其勉力精進臣又細加體察見劉永鐄長於口才往往言有餘而實不足且為人亦缺誠實即此知府一任尚屬勉强實止宜於州縣之才今䝉皇上天恩補授江安糧道任重事繁似非劉永鐄所能勝任臣受恩深重既有所知何敢因巳經奉旨即隱默不據實具奏臣是以冒昧奏聞仰祈睿鑒施行謹奏卿能如此方為秉公持正之大臣朕甚嘉之江南距豫不逺留心訪察如有不妥協處具奏以聞但念劉永鐄年少聰明身受超擢之恩亦自當勉力圖報料未必負朕卿於其臨行時切加訓誨然後令往同日又奏為查明據實奏聞事雍正六年十一月初三日據兖寧道具報濟寧州於十月二十九日夜乘知州高令樹公出羣賊傷官劫庫縱囚并入濟寧州官署傷及知州眷屬拒捕傷兵當經拏獲賊犯馮侯南等監犯全獲庫銀未失等情到臣臣即飛行山東按察司檄委署東昌府事同知徐石麟會同濟寧州知州高令樹將現獲賊犯馮侯南等查明起意緣由行劫確情去後今據同知徐石麟知州高令樹報稱查得凶盜馮侯南即馮壡係山西代州捐貢向在已故參革兖寧道宋基業家教書侯南長子馮齊係甲午科舉人次子馮善存俱流落濟寧州仍與宋基業之子候補主簿宋玫七品小京官應升宋薇常相往來又有蘇州府武生蔣琳及宋玫家教書之揚州府人姚進醫生唐耀管與濟寧州人孟輝玉王元勳彼此交好宋玫宋薇因著追伊父宋基業虧空在州貧極無聊與馮侯南孟輝玉商議濟急之䇿而馮侯南孟輝玉亦係赤貧無賴輝玉即倡言除非劫庫可以即得現銀又恐官兵捕捉遂定謀先傷官後劫庫以免救護追拏適知州高令樹於十月二十六日經濟東道調至曲阜縣查勘廟工因公出境各盜定於十月二十九日夜拜牌文武齊集之時乘其不備砍傷衆官即行劫庫宋玫宋薇即糾合王元勳蔣琳唐耀管姚進周佳士沈進傅沖等七人馮侯南即糾合伊子馮齊馮善存二人孟輝玉即糾合濟寧州人范經李調元孟富貴孟三殷國璧李士文王渙等七人共二十人於孟輝玉烟店取齊除同行逃脫赴守備衙門自首之王渙及同行逃脫之周佳士外實止一十八人於十月二十九日五更時候各執器械前往宋玫又恐新約之孟富貴等不能濟事令留在化城坊拐角處等候惟宋玫宋薇馮善存蔣琳執斧從東角門進姚進唐耀管王元勳孟輝玉執斧從西角門進正值各官禮畢將出動手亂砍砍傷泉河通判郎燦原任濟寧州州同陳文燦閘官楊志逺遊擊韓國枝都司李懷義守備李懷仁劉文燦因倉猝不及隄防俱各受傷各犯復出會齊即奔州署入內又將知州高令樹之妻女及使女砍傷宋玫等因見王渙周佳士逃回恐同夥四散難以認識即將衆人割辮為記又因人少打開監門放出囚犯冀其幫助并脅令禁卒更夫吕五等並皆割辮相從宋玫等撞開外庫攫取碎銀數封分散衆人正欲再撞內庫即聞鳥鎗聲起知有官兵圍擒羣盜棄庫拒捕欲遁致傷兵丁楊國臣馬勇等共十一名除於初一初二初三初四等日相繼死故四名外餘俱與受傷各官撥醫調治漸就痊可拒捕受傷之賊犯宋玫宋薇李調元孟輝玉范經姚進次日身故餘俱因割辮可認當即就擒惟同行逃回之周佳士尚未弋獲所放獄囚秦廷宰等當時全獲並無一名走失其禁卒更夫吕五等是否知情同謀或係臨時脅從并此外有無夥黨臣現飭按察司嚴審明確另行招解審題至所劫外庫碎銀亦當時在各盜身邊搜獲並無遺失事關羣盜縱囚殺傷官兵緣臣遴員委查確情兼之臣又前赴登州查視海汛於途次據委員詳報繕摺奏聞是以奏報稍遲合併聲明伏祈睿鑒施行謹奏據該撫等俱經奏到巳備悉情形另有諭旨矣雍正六年十二月十六日河東總督臣田文鏡謹奏為恭報河東兩省得雪日期仰祈睿鑒事竊查東省於十一月十四日得雪分寸經臣奏聞在案今據豫省各屬報到十一月初八十七十八二十二十三四五二十七八等日各得瑞雪積厚五六寸不等其低窪之處竟至盈尺又據東省各屬報到十一月十七十八二十三二十七八九等日各得瑞雪積厚四五寸不等臣現在自登州由萊州青州兖州濟寧一路回豫見麥田土膏甚是滋潤及至十二月十四日行至河東交界考城曹縣地方又遇大雪積厚盈尺兩省均沾沿途耆老村農攔輿稱慶咸謂今冬雨雪透足則來春麥苗暢茂條達豐收巳可預卜民情喜躍羣歌聖德此臣所親經目擊者理合一并奏聞仰慰聖懷為此謹奏據奏兩省得雪霑渥民情喜躍朕以手加額覽焉同日又奏為請添雙篷艍船以資巡哨以重海疆事竊查登州鎮標原水師營有哨船十三隻額設守備一員千總一員把總二員水兵三百八十六名至康熙四十二年總兵官王文雄題請添改戰船二十隻遊擊一員守備一員千總四員把總六員在中右并外協等二十六營內抽兵八百一十四名連原設水兵三百八十六名共一千二百名奉㫖海洋船二十隻或沙船或趕繒船并船上應用什物等項著江南總督巡撫提督公同在江南捐造完備堅固俟來春著山東水師營官兵前往取赴東省留用欽此經江南造成趕繒船二十隻於康熙四十三年領赴東省改為水師前後兩營康熙五十三年准部文將繒船十隻撥給金州止留十隻并裁汰後營止留前營又將水師兵丁挑選五百名其餘七百名仍各發回本營分為兩汛登州府為北汛膠州為南汛各分哨船五隻每船一隻配兵五十名於四月間出洋巡哨九月終回汛登州哨船五隻停泊在天橋口內查天橋一帶海港因海潮帶沙進出浮沙沉落口內日積月纍以致水勢平淺每年哨船進出必須預為刨挖動經月日兼之船身長大欲其行舵駕駛必須水深丈餘且必待朔望大潮方能進出遇有緊要巡查一時實難猝及此北汛哨船進出之情形也膠州哨船五隻從前原泊在塔埠頭港內亦應候大潮方得出入經前撫臣塞楞額題明移泊頭營子口今出入雖較前似易但自安東營至成山頭一帶港澳頗多深淺不一大船往來亦未便捷此南汛哨船出入之情形也臣查趕繒船船身長大出入既多不便遍查登膠各海口又别無可以移泊便易之處臣再四思維惟有雙篷艍船一項船身較小於趕繒船又復輕泛喫水不深其在登州北汛不待刨挖沉沙亦不待朔望大潮不拘何時可以駕行無阻其在膠州南汛往來港澳間更可無慮水之深淺臣行詢總兵官萬際瑞水師遊擊謝雲均稱艍船亦可出洋巡哨且進出往來甚為輕便臣即令該鎮營確估每艍船一隻約需工料價銀一千餘兩每船配兵三十名除舵工阿班大料頭碇四名不用軍器外其二十六名內配鳥鎗手十二名大炮手六名藤牌手二名弓箭手二名長鎗手二名大刀手二名南北兩汛共應添設艍船七隻分撥北汛四隻南汛三隻共用兵二百一十名以資巡查似不可少然臣非謂設有艍船其原有之趕繒船便可置之無用蓋原有之趕繒船數止十隻分為兩汛且每船止配兵五十名原屬船少兵單今酌添艍船七隻不過令其於緊要時先行出哨其趕繒船仍令刨挖海港深通俟有大潮全數續出於大洋海面四散分巡再趕繒船一隻止配兵五十名人尚不敷應請仍照舊例每船加配十名共六十名與七隻艍船之二百一十名通共需兵三百一十名查東省既分為登兗兩鎮且各協營原屬汛廣兵單不便仍行抽撥應請額外加增再查南汛額設把總二員北汛止有把總一員原不敷用今北汛之艍船較南汛又多一隻則辨員更不敷矣應請於北汛添設把總一員以資巡哨之用如此添船增兵實於海洋巡哨大有裨益是否可行伏候皇上睿裁批示容臣行令山東布政司會同登州鎮委員確估造冊臣與署撫臣嶽濬會核具題請旨敕部議覆施行謹奏添船增兵之議於海洋巡哨甚屬有益會疏題奏可也同日又奏為遵旨查明沿海情形無庸添設水陸滿兵仰祈睿鑒事雍正六年十一月初三日接准怡親王暨大學士張廷玉蔣廷錫字雍正六年九月十八日奉上諭山東登萊二府皆屬邊海地方似應照天津之例設立滿洲水師營兵以資防汛巡哨其應於何處駐防及蓋造營房增添戰船之事爾等密議具奏欽此查得山東海道南接江浙北通奉天直隸必資重兵駐防方足彈壓其原有戰船十隻水師營兵五百名分駐萊州營二百五十名膠州營二百五十名各配以戰船五隻雍正五年原任巡撫塞楞額以膠州離海口甚逺戰船入口或遇水淺之時即不能出口請將膠州水師移駐靈山衛部議令㑹同登州總兵萬際瑞詳議據萬際瑞合詞具題遂將膠州之水師戰船移駐於靈山衛但查江浙商船及關東天津米豆船隻皆由膠州進口何以戰船不便停泊口內我等未能深信至成山衛三面環海為渤海衝要之地似可於此處設立水師而考之地志以成山旁多椒島海道極險又稱成山無藏船之處則又未便駐劄兵船又登州營現有水師其海道東北至旅順口西至大沽口與江南接界遼逺或未能控此數處我等皆未身經實無定見再查山東邊海陸路自海豐至膠州幾及二千里所有膠州萊州壽樂武定等營兵丁不過二千餘名除城守之外每汛不過數名相隔二三十里所有防汛未為周密若於膠州添設陸路滿洲駐防兵丁於地方似有裨益但果否應設亦無確見是以我等請旨交與總督將山東沿海地方何處應設立滿洲水師及膠州應否設立陸路滿洲駐防總督確查詳議密奏請旨欽定等因字寄到臣臣即於山東濟南府起程親詣登萊二府并膠州一帶沿海地方詳慎查勘務期萬全臣查山東海道南接江南北連直隸雖延袤二千餘里而登萊二府地面係在海濱突出一方汛分南北登州北面臨海是為北汛膠州南面距海是為南汛原設有緑旗水師一營戰船十隻水兵五百名分駐北汛戰船五隻兵二百五十名從北口出洋巡哨分駐南汛戰船五隻兵二百五十名從南口出洋巡哨來字內謂分駐萊州營二百五十名者誤也今臣又因原有戰船俱係趕繒大船每年出哨之時必須刨沙候潮進出不便已經另摺奏請添造艍船七隻每船配兵三十名共添設兵二百一十名分撥北汛四隻南汛三隻又以原有趕繒船十隻每船配兵五十名尚不敷用請照舊例每船添兵十名共六十名現在請旨如䝉俞允則緑旗水師營兵已有八百一十名趕繒船艍船已共有一十七隻分防南北兩汛足資巡哨矣臣又查登州水城北臨海面其戰船即駐泊於水城之中與海密邇然城下之海仍屬內港且長山珍珠等島密布於前島內俱有居民種田納糧原屬內地去外洋甚逺海港中潮水長落沉沙積淺即戰船出哨尚須刨挖經月并候朔望大潮方能進出所謂重門保障無過於此此登州之無庸添設滿洲水師營兵也至於萊州一府北至海六十里亦係內港中多椒島其去外洋更逺雖有海廟小口即外來商船亦從不能入而內地之船亦不能出故從未設有緑旗水師營兵更可無庸添設滿洲水師營兵也若夫膠州原在內地其南面止有淮子口入港水面寬展故通商船至水師營戰船原駐泊塔埠頭雍正五年原任巡撫塞楞額會同總兵萬際瑞因彼處水淺必須等候大潮戰船方能出口故請移駐頭營子出入甚便然頭營子與塔埠頭相去止有十里同為膠州地方並非靈山衛地方查來字內所謂膠州戰船移駐於靈山衛又因塞楞額疏內未經查明誤以頭營子為靈山衛也再膠州距淮子口本逺而淮子口距古積洋亦逺茍非有票商船不能輕入既有緑旗水師營兵足資巡哨亦可無庸添設滿洲水師營兵也況臣閲視膠州城郭荒凉地土瘠薄若無一二商船入口發貨則係一彈丸小邑地廣人稀之所既設有緑旗水師營兵船復設有膠州協副將官兵其勢巳為甚重亦不便復設滿州水師至成山衛雖三面環海為渤海衝要之地而龍口山多島密大小船隻不能出入誠難以駐劄兵船也其餘北汛自登州之東沿海一帶福山寧海文登威海等州縣衛雖有八角口灣子口等處然去大洋甚逺中多椒島海船俱不能入亦無駐泊兵船之處自登州之西沿海一帶黃縣招逺掖縣昌邑濰縣壽光樂安霑化海豐等縣雖有黃河界河海廟淮河等口然去大洋甚逺中多椒島海船俱不能入亦無可以駐泊兵船之處是北汛一帶無庸添設水師滿兵也其南汛自膠州之東沿海一帶即墨浮山鼇山雄崖大嵩靖海等縣衛所雖有女姑金家何家等口自膠州之西沿海一帶靈山日照安東等縣衛雖有古鎮龍汪等口然皆去大洋甚逺中多椒島海船俱不能入亦無可以駐泊兵船之處是南汛一帶又無庸添設水師滿兵也如必須添設水師滿兵臣現在奏請添船增兵何難即將應增之緑旗水師兵數均請改增滿兵分撥配搭協同出洋巡哨轉移甚便但臣細查登萊二府風土民情地多斥鹵俗尚誇詐民之壯而黠者皆赴奉天直隸貿易力作以糊其口且多匪類至口外偷刨人參掏摸剪綹往往輕去其鄉而務農守土者悉係愚魯鄉民久巳兵民雜處習為故常今一添設滿兵未免驚疑不定且沿海一帶利止魚鹽食皆藜藿民問粗糲之食滿兵恐未習慣再水師巡查洋面各有界限登州北汛之兵自成山衛之北而西至直隸交界不過千里而有戰船九隻膠州南汛之兵自成山衛之南而東至江南交界更不及千里而有戰船七隻一至巡哨之期同時出洋上連天津以北之戰船下連江淮以南之戰船均出巡哨則滿洋皆兵足資防汛又無庸虛糜兵餉置之無用是以臣愚謂無庸添設水師滿兵也至於來字內稱山東邊海陸路自海豐至膠州幾及二千里防汛未為周密於膠州添設陸路滿洲駐防兵丁於地方似有裨益等語則又尚未盡然蓋海豐之至膠州幾及二千里者由海面水路約略計之應有此數若內地陸路則自海豐至膠州不過六百餘里未有二千里也內有青州壽樂萊州膠州等營陸路官兵再膠州在海口之西即墨縣在海口之東相距不過一百五里而膠州有副將統領陸路官兵即墨縣又有參將統領陸路官兵星羅碁布掎角照應無不盡善更無庸在於膠州添設陸路滿兵也至於登州陸路則有總鎮重兵水路又有水師營舟兵是登州一府亦無庸添設陸路滿兵也又萊州一府雖為登州咽喉然而僻處海濱城止周圍八里城內居民稠密並無閒曠之地可以建造營房屯駐滿兵且此處添設陸路滿兵於外洋並無防禦之資於內地亦無彈壓之勢均屬無用是以臣愚謂為并無庸添設陸路滿兵也臣謹繪圖恭呈御覽是否允協伏乞皇上睿鑒施行謹奏所論固屬詳悉允當但未領會朕意夫國家之分駐滿兵於各省原為預備援勦有事調遣而設既無緝捕巡防之責觀之似屬無用殊不知彈壓地方其勢隱然甚重現今豫省駐防滿兵有何用處耶朕尚思稍增其額數自定鼎以來滿洲户口孳生日漸繁衍將來若至敷用時省省皆有駐防滿兵方為全美兹發卿查議無非欲在山東境內駐劄滿兵數千之意耳卿言現在奏請添設緑旗水師何難均請改增滿兵分撥配搭協同巡哨云云等語尤為不達朕意何也滿兵從未協同緑旗營兵供應差役假若責令供應地方差役一旦有事調遣反致顧此失彼如云虛糜錢糧則在京在外均屬同然不為枉費如云地方貧苦商賈不至則建立大鎮駐劄多兵貿易者自將輻輳試觀安西一鎮逺在塞外千里移駐甫經二載一切市賣貨殖不亞內地繁盛之區矣如云俗尚誇詐且多匪類則於此等處正宜設兵彈壓如云城內地狹居民稠密則駐劄滿兵自必另築城垣未有令滿漢紛然雜處之理至於滿兵設立水師不過令薄海內外聞之以壯聲勢而已非為緑旗漢兵不足巡哨而議添也卿仰體朕意更為詳籌合宜之地如云登萊二府暨膠州地方必不相宜或於青州酌量查勘再不然即於濟南省城亦可卿其另議奏聞同日又奏為欽奉聖訓據實覆奏事雍正六年十一月十三日臣自登州府查視海汛事畢回至萊州府據臣家人齎到臣覆奏山東署撫臣嶽濬摺內欽奉硃批諭㫖盡力規勸母辭口頰之勞欽此臣敢不仰遵聖訓盡力規勸但臣愚以為督撫辦理封疆大事必須諳練胸中方有成竹見以為何事當行則急起而令其與臣同行飭遵彼雖轉行於各屬終未見其如何督率各屬使之必遵教導各屬使之共曉也奉諭旨前批諭嶽濬奏摺時未悉汛兵揑報根由今既查出起釁情弊安可不加懲治所議甚好即照此辦理欽此臣跪讀聖諭仰見皇上聖德如天包容廣大誠從古聖帝明王所未有臣謹當欽遵聖諭即照此辦理既使沿海兵民知所警惕不敢訛𫝊亦復使沿海兵民感激聖恩寬大加謹巡防誠一舉而兩得也又於臣恭報河東雨暘時若摺內欽奉諭㫖覽奏兩省雨暘情形朕懷深慰都中亦於月之初三四連得應時瑞雪特諭卿知共相慶喜欽此除東省已於十一月十四日得有瑞雪經臣恭摺奏聞所有河東兩省後復得雪日期現在另摺具奏外伏惟我皇上聖德上格天輦轂之下首善之地乎臣實踴躍慶喜之至所有奉到原摺理合恭繳謹奏覽硃批諭旨卷一百二十六之十四欽定四庫全書硃批諭旨卷一百二十六之十五硃批田文鏡奏摺雍正七年正月十九日河東總督臣田文鏡謹奏為恭謝天恩事雍正六年十二月二十八日准兵部火票敬捧皇上賜臣御書福字暨對聨并如意一執紅玉雙魚一枚貂皮四十張荷包二對金元寶二箇銀元寶二箇金八寶八件銀八寶八件各色寶結八件鹿尾十箇鹿肉十塊風羊一隻野雞十隻阿璣格敖爾布哈一封糜子米敖爾布哈一封阿爾茶敖爾布哈一封乳酥糖一匣蘆柑三十枚紅柑三十枚廣橙三十枚文旦六枚到臣臣當即郊迎至署恭設香案望闕叩頭謝恩祗領訖欽惟我皇上德僃中和功參化育彤廷開泰萬國共樂堯年丹陛頒春四海咸瞻舜日乃皇上享無疆之福必普逮於臣工而微臣邀皇上之恩更榮逾於格外仰龍章之璀璨偕金玉以擎來瞻寶物之輝煌並珍羞而齎至服之在身捧之在手常懷帝眷之隆懸於堂上藏於笥中益凛天威之近即一臠之味一果之甘無非叨上方珍異拜天子深仁者也臣何人斯膺此異數惟有上祝聖夀下竭駑駘以仰報皇上天恩於萬一耳所有微臣感激私忱理合繕摺奏謝為此謹奏覽奏謝矣凡物莫非上天之錫畀皇考之遺澤不與卿如此大臣共之更持以班賜何人耶同日又奏為查明東省倉穀酌量買貯據實奏聞仰祈睿鑒事雍正六年十二月二十七日據山東提塘齎到刑部侍郎繆沅來字為東省倉穀一事轉傳上諭到臣臣遵查東省倉穀如常平倉一項截留漕米易穀一項各州縣衛所分貯監穀一項兖寧道等五衙門收貯監穀一項濟青登萊四府捐米折穀一項通計各屬現存倉穀共一百九十三萬二千二百二十六石零存價應買穀共一百二十二萬四千八百二十四石零各屬虧缺未完穀共九十五萬三千三百九十六石零臣一至山東即清查倉穀確數而知從前派買尚未得宜是以遲延至今並未遵照買穀貯倉雖於欽奉上諭事案內奉㫖山東巡撫印務著嶽濬署理會同河東總督田文鏡將東省應買之榖酌量州縣之大小均勻分派於今年明年秋成後在本地採買還倉欽遵在案但臣看得濟南等處濱海潮濕倉穀易於黴蒸況查各州縣倉厫亦少若再以數十萬帑金悉行採買非另建倉厫不能委積不但盤查難交代難出陳易新難而且聖明在上大有頻書豐登屢告則倉儲盈餘究無多用之處將來恐有黴蒸紅朽之虞不肖官員更有侵盜虧空之弊是以臣在東省時即同署撫臣嶽濬議及此案再四籌畫惟有酌量地方大小議定成數分别積貯何項應買何項不應買庶不致多寡弗均又不致紅朽無用嶽濬以臣言為是彼時繆沅一同在座亦以臣言為是但此時臣尚未逐一查核未敢冒昧具奏隨即檄行布政司確查妥議詳覆嗣於雍正六年十二月初九日據該司詳議署撫臣嶽濬送稿到臣臣即酌定送去後據嶽濬來字俟開印後即繕本具題今欽奉諭㫖命臣據實具奏臣查得東省合屬直隸州六州九十八州縣十一衛三所酌量大小分别積貯凡直隸州各府首縣應貯穀二萬石府屬大州一萬八千石中州及大縣一萬六千石中縣一萬四千石小縣一萬二千石大衛一萬石中衛五千石小衛二千五百石三所各貯穀三千石該州縣或地要民稠積窪易潦者量加二三千石不等以此擬定成數分别買貯其中穀石未敷者酌量撥給買貯其成數之外尚有多餘穀價者應將原價照數提解藩庫再濟青登萊四府現在府倉穀石充足有餘其未買穀價亦應提解藩庫此外各屬虧缺未完穀石除借缺在民未完穀三十萬二千六百一十六石零照追完倉外其有各官虧缺追完穀價者亦應解照藩庫通俟現積現買之穀或有動用應行添買之時再行陸續發給買貯臣職任封疆事關倉穀重務固不敢因循茍且以致積貯久虛亦不敢拘守成法以致帑金濫費所有東省各項倉穀現存未買虧缺細數并應買不應買應提貯司庫各等項細數除另本㑹題造册報部外臣因各項條欵甚為煩冗不敢瑣瀆謹擇要略據實繕摺覆奏伏乞皇上睿鑒施行謹奏卿所料理既屬妥協無可訾議具題到日有旨同日又奏為查驗東省水陸各營及沿海汛地將辨馬步兵丁情形據實奏聞仰祈睿鑒事竊臣一介庸愚荷蒙聖恩簡畀河東總督無時無刻不以經理吏治民生整飭營伍為念於雍正六年八月二十七日欽奉諭旨命臣赴東省㑹審黃炳余甸一案臣自九月二十三日抵濟南府後乘便即將濟南城守營將辨兵丁及附近省城登鎮所轄武定營兖鎮所轄泰安髙唐臨清夀張等營汛將辨調赴省城陸續考驗除德州營守備徐行賦性狂妄弓馬不堪業經參革外其餘各營汛將辨騎射雖未熟嫺猶可練習至濟南城守營馬步兵丁弓馬俱屬生踈即連環鎗之進退疾徐亦不合度當即嚴行申飭勒限三箇月操演如式臣復思各營之兵馬有無缺額器械果否鮮明未能遍閲即調委青州營參將賀升濟南城守營參將魏時英前赴兖鎮所轄各營汛查驗又調委曹州營守備陳永良泰安營守備郅祿髙唐營守備劉屏藩前赴登鎮所轄各營汛查驗俱報稱各營兵馬現在足數惟器械有新舊不一亦即飭令各營造備如式再查登萊青三府暨膠州一帶營汛俱係沿海地方各營汛將辨兵馬等項均關緊要臣㑹審事竣於雍正六年十一月初十日由濟南府前赴登州等處沿海一𢃄查勘營汛業經具疏題報在案查驗得登標中右兩營水師前營以及寧福安東營其水師前營把總莊虎安東營把總余營馬步兵丁步箭鳥鎗尚屬可觀馬箭甚屬不堪理應將該營副將參處但臣閲副將王來祜年雖六旬有餘精力尚強頗知自愛猶可表率將辨訓飭兵丁姑勒限四箇月飭令教演如仍廢弛再行參處其萊州營兵丁技藝均屬可觀惟萊州營所轄之濰縣汛臣路由經過親閲辨兵該汛把總張爾美弓馬生疏操演懈弛以致該汛兵丁技藝不堪曠玩已極業已咨革再至兖州府臣驗看得兖鎮所轄中右二營將辨弓馬尚屬可觀兵丁騎射未免生疏當即嚴飭訓練如式至登鎮所轄之文登即墨青州夀樂各營兖鎮所轄之沂州曹州臺莊東昌梁山范縣沙溝各營臣未及親臨考試又不便調閲隨照㑹兩該鎮代為考驗尚未呈覆臣查東省各營汛一切鳥鎗弓馬炮位等項鳥鎗如式者什之七八弓馬如式者什之二三惟炮位自濟南城守營以至各處營汛俱不如式皆由於營之東省營汛從前積玩成習陋弊多端臣訪聞拔十兩不等此外節禮門包等項難以枚舉上而總鎮副將下至參遊守備千總等官各視饋送之多少為去取是以營伍一切操習俱至廢弛自登州營將辨技藝雖屬平常而人材尚皆壯健兵丁漢仗俱好果能教演熟習自必盡皆精練若據現在情形槩行參革亦非仰體皇上造就人材嘉與維新之至意是以臣親加考驗時操演委員驗看嗣後倘再有技藝生疏者定行革而於軍政實有裨益矣所有微臣在東查驗水陸各營及沿海汛地將辨馬步兵丁情形理合據實奏聞謹奏整頓營伍尚屬易事但得實心盡力不避勞怨之將領數員朞月之間便可改觀全在統轄大臣勸懲有術非比吏治民風之難臻成效也同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣具奏劉永鐄摺內欽奉硃批諭㫖卿能如此方為秉公持正之大臣朕甚嘉之江南距豫不逺留心訪察如有不妥協處具奏以聞但念劉永鐄年少聰明身受超擢之恩亦自當勉力圗報料未必負朕卿於其臨行時切加訓誨然後令往欽此仰見我皇上包容廣大覆載為心人非木石自當竭力圗報但臣看得劉永鐄人本聰明未能誠實即如劉永鐄於雍正三年十一月內自泌陽調任滎澤時臣曽加詢問泌陽縣內可尚有隱匿地畝否劉永鐄極言俱皆首報等語後經臣於雍正六年五月間查訪得劉永鐄原任泌陽縣內曽置買監生馮世承熟地二頃七八十畝報糧止五十畝雍正三年十一月內劉永鐄調任滎澤時竟將此地交與伊奶公陳士勷家人許九照管嗣劉永鐄升任南陽府時即將陳士勷許九掣回於雍正六年三月內寄字與生員馮瑄託其遵㫖首報糧二頃一十五畝而馮瑄因地未丈明止約略報糧一頃六十畝未經全首又有荒地一假不知畝數曽否報墾臣飭司轉發開封府提審據陳士勷供稱劉永鐄於雍正四年三月內尚有回贖馮世臣已賣之熟地一頃等語臣現在委員查丈尚未詳覆臣查劉永鐄從前在泌陽縣任內置産隱報干例議臣未敢擅便謹據實奏聞應否准其作自首報糧完結將所置莊地變價入官以充公用鴻恩出自皇上寬嚴並濟愛惜人材命臣教導之至意俟劉永鐄赴任時臣再切加訓誨留心訪察奏聞又於臣具奏濟寧州盜案摺內欽奉諭㫖據該撫等俱經奏到己備悉情形另有諭㫖矣欽此查此案臣奉諭㫖於雍正六年十二月初九日㑹同總河臣齊蘇勒山東署撫臣嶽濬嚴審明確實係宋玫宋薇為伊故父原任兖寧道宋基業應追虧空無補與馮侯南等一夥無賴棍徒商謀劫庫又因宋玫弟兄先與向充兖寧道衙役王奎文爭訟分賠伊父虧空聞又於臣恭報河東兩省雨雪日期摺內欽奉諭㫖覽奏雪雨情形朕懷深慰畿內兩次得雪亦巳霑京師以至薄海內外無不共占大有永慶升平矣所有奉到原摺理合恭繳為此謹奏覽雍正七年正月二十九日河東總督臣田文鏡謹奏為恭報河東兩省得雪日期仰祈睿鑒事竊照去冬兩省得雪分數日期已經具摺奏聞兹於雍正七年正月十二十五十六十七十九二十六等日據豫省各屬具報到臣通省積雪各有五六七寸不等又據東省各屬陸續具報到臣於正月十二十三十五十六十七十九等日各處得雪三四寸五六寸不等其正月二十六日東省曽否得雪俟報到日另摺奏聞臣查播種二麥最宜得雪自去冬以來連降瑞雪在地麥苗已經根蒂堅好當此春和始布土膏發動之時又復連得瑞雪均被霑濡則發榮滋長益卜豐登之有兆也我皇上至誠格天澤及庶類是以百物順成萬民樂業臣忝任封疆曷勝歡忭理合繕摺奏聞仰慰聖懷謹奏欣慰覽焉前於直隸得雪時曽降有諭旨此皆仰賴天地眷祐聖祖䕃庇之所致朕常懷慚懼然膏澤雖霑豐登二字必待秋成而後敢言也惟期與卿更勉誠敬而已同日又奏為恭謝天恩事竊查浙江嚴州府同知蔣大年湖廣蘄州知州蔣嘉年俱係臣之內姪蔣大年原任莒州知州蔣嘉年原任嘉祥縣知縣臣蒙皇上天恩總督河東隨將伊兄弟二人奏請回避蒙皇上俞允令其引見隨於雍正六年九月二十日引見蒙皇上特授蔣大年嚴州府同知蔣嘉年蘄州知州臣於去冬巡視海疆路經莒州蔣大年見臣時備述皇上溫諭訓誨賞賚曠典臣即面加教導勉其仰遵聖訓勤敏向前努力做好官以圖報效蔣大年遂感激涕零向臣禀云大年乃么麼小吏荷蒙皇上洪慈銘心鏤骨若敢有絲毫忍負天恩決非人類等語又於雍正七年正月十一日據蔣嘉年具禀到臣備載陛見時蒙皇上教誨懇切賞賜優渥洵千古未有之隆恩人非木石自當竭尺寸之長以效犬馬之報等語臣即寫字諄囑令其實心辦事無怠無欺以不負皇上諄諄教誨之聖意誠切開導去訖但臣查內親原無回避之例臣因嫌疑所關冒昧奏請乃蒙皇上俯念微情即為俞允則皇上之垂諒夫臣者無念不至曲體乎臣者無事不周臣何人斯遭逢一至於此惟有益殫血誠并時加訓誨令蔣大年蔣嘉年共圗報效以仰酬皇上天恩於萬一耳為此謹奏蔣大年嘉年弟兄於引見時既經朕耳提面命再加卿如此一番䇿勵若不思努力向上則豈木偶也歟況二人雖係新進後生觀其資質將來俱可期望成立者同日又奏為遵㫖察議具奏仰祈睿鑒事雍正七年正月初六日臣齎摺家人回豫敬捧皇上硃批山東巡察蔣洽秀條奏一摺到臣臣跪誦諭㫖欽此欽遵伏查巡察一官稽查保甲點驗民壯盤察驛馬乃其専責臣於去年九月內赴東時沿途察看保甲竝未實力奉行臣即條分縷析備檄各屬遵照力行在案復又驗看各處民壯率皆有名無實臣即嚴加申飭令各屬照例挑選募補置備器械勤加操演如有廢弛即行查𠫭在案至於驛馬一項亦多疲瘦缺額臣當委各道逐一盤查勒令買補嗣據各道陸續報明足額具結呈送臣復飭不時查察在案臣因山東保甲民壯驛馬如此廢弛亟宜整頓臣抵濟南後適蔣洽秀巡歷回省臣即一一囑其留心整理但蔣洽秀係一忠厚書生諸事既未歷練賦性亦復柔懦去年六月到山東以來於地方毫無禆益雖其心未嘗不欲振作無奈才力不及不能施為且御下不嚴所過地方跟隨僕役竟有需索門包小費之擾誠如聖諭觀伊甚不妥協人也臣謹據實具奏又蔣洽秀條奏登萊青大路添設墩臺營房條內欽奉諭㫖命臣察議奏聞欽此臣查蔣洽秀奏稱登萊青三府南北兩面皆海中通大路有二十里一墩者有三十里一墩者汛防稀濶賊盜出入難於稽察應請照中東兩大路之例每十里添設一墩每墩添造營房十間每兵一名撥給二間擇兵丁之家口少者令其挈眷居住等語臣查設立墩臺原酌量道路之衝僻分墩臺之多寡定守兵之數目非凡有道路俱應設十里一墩每墩撥馬二步三也山東登萊青三府雖南北兩面皆海中通大路然沿海各口俱另有墩臺星羅碁布已屬周密中間道路不過州縣居民以及小販營生往來而已非中東兩路行旅絡繹不絶者可比是以設立墩臺或十里十五里二十里二十五里以至三十里不等則從前設立之意非漫無分别也臣前巡視海疆登萊青三府俱經親歷見各處墩臺或因其地勢髙阜或因其路當厄要俱皆安置得宜足資守望雖非處處十里一墩而要之十里十五里者居多二十里三十里者為少頗為周密無事添設再據各鎮營造送守墩兵丁數目亦多馬二步三並無缺少至於兵丁之移眷居住亦不易言蓋兵丁原有本籍别籍之不同而本籍又復有離汛逺近之不一或置有産業或倚其姻親誰肯輕離往來跋涉富者固非情願貧者更屬艱難雖軍令所至不敢不從䆒非體恤士卒之意總之兵丁偷安離汛與否全在將辨之號令嚴明稽查勤密亦不在家口之有無也臣以為蔣洽秀所奏登萊青三府添設墩臺營房令兵丁移眷居住之處無庸議至蔣洽秀奏稱夲年二月內掖縣王文煜等家被盜拏獲賊犯髙義等係陜西平涼府等處人乘騎騾頭由大路直驅而入皆由防禦踈懈墩臺稀少之故等語查守墩兵丁原令其不時巡查暸望遇有大盜行劫瓜分謀害則奮勇救護竭力擒拏若乘騎騾馬扮作客商又焉知其為賊而詰問之耶又豈能執在途之行人而一一問之耶蔣洽秀所奏盜賊乘騎騾馬直驅而入皆由防汛疏懈之說亦屬未確又蔣洽秀奏稱黃縣福山縣之官莊九里站東十里鋪等處皆現有墩臺而無兵丁防守等語臣查黃縣止有界首諸由貫南欒鋪北馬等處四墩福山縣止有岡嵛小辛店黃務店等處三墩俱設有兵丁防守至於官莊九里站東十里鋪等處乃係從前廢墩原無兵丁防守現今豫省亦有此等廢墩況各處墩臺撥兵數目俱經造冊報部孰敢遺漏蔣洽秀不知係從前廢墩亦不知守墩兵丁俱係報部是以有有墩無兵之說也臣才識短淺所議是否允協理合具奏伏乞皇上睿鑒施行所有奉到硃批山東巡察蔣洽秀條奏原摺一併恭繳為此謹奏覽駁議蔣洽秀處深中肯綮於此奏未到之先已有旨矣蔣洽秀非忠厚書生乃不肯盡職奉公耳巡察一官若咸得實力任事勤慎之人與卿等督撫同心合德匡勷協助不無輔車唇齒之益如各欲自立聲名趨向互異則非徒無益而有害所以朕每因地因時而制宜於各省或設或不設也不得其人寧曠此缺以免紛擾雍正七年二月十一日河東總督臣田文鏡謹奏為欽奉上諭撥給養亷事竊臣准兵部火票齎到怡親王暨大學士公馬爾賽等寄字內開雍正六年十一月十九日奉上諭據副總河嵇曽筠奏稱協理河務僉都御史徐湛恩任內竝無養亷之項請將每年賞伊之養亷銀六千兩內分出二千兩給與徐湛恩等語朕思嵇曽筠養亷之項僅敷自已用度爾等可寄字與河南山東兩省督撫著每年於存公銀內各撥給銀一千兩合為二千兩與徐湛恩為養亷之資欽此仰見皇仁浩蕩體恤臣工之至意臣即欽遵諭㫖行令布政司每年於司庫存公銀內撥銀一千兩自奉㫖之日為始按季支發以為協理河務僉都御史臣徐湛恩養亷之資并咨㑹山東署撫臣嶽濬一體欽遵外所有撥給養亷銀兩理合繕摺具奏為此謹奏覽奏撥給養亷銀兩知道了徐湛恩居官何如同日又奏為豫省漕運動用歸公鹽規銀兩數目據實奏明仰祈睿鑒事竊查雍正六年七月內於請復舊例等案內准部咨豫省漕糧各照舊制徴收本色應給腳價銀兩於糧道庫內動用糧道及各府直隸州歸公鹽規竝節省項下耗羡銀兩支給仍將動用過銀兩造入該年漕項奏銷冊內具題查核等因臣查雍正六年分所有舊管前道楊夢琰餘剩鹽規銀一百六十五兩零新收各屬鹽規銀一萬二千四百七十八兩零又收漕項下耗羡銀二千九百八十二兩零共新收銀一萬五千四百六十兩零今起運雍正六年分漕糧所有發給各州縣運漕腳價銀共一萬七百九十八兩零又雇募剝船刨淺敲冰等項共用銀一千三百七十二兩零以上共開除銀一萬二千一百七十兩零實在存庫銀三千四百五十四兩零各屬未解鹽規銀二千三十七兩零俟解到貯庫通共應剩銀五千四百九十二兩零但臣查漕運腳價銀兩與雇募剝船等項俱係動用歸公鹽規竝非開銷正項錢糧可比雖奉部咨於該年漕項奏銷冊內具題臣愚以為既係充公之項不便造冊題報似無庸於漕項奏銷冊內造報題銷兹據糧道陳世倕詳報前來除另文咨明户部存案外所有漕運動用鹽規歸公銀兩數目理合繕摺奏聞伏乞皇上睿鑒施行謹奏充公銀兩自不應入於奏銷冊內題報所奏是不特此也卿凡料理錢糧事務悉屬允當朕實信之有素同日又奏為豫省各屬歸公鹽規銀兩據實奏明仰祈睿鑒事竊照河南糧道衙門及開封府舊例所得鹽規自雍正四年起經臣奏請歸公以為運漕建壩之用在案查雍正四年分餘剩鹽規一千五百三十一兩零又雍正五年分糧道衙門及開封府共收鹽規銀七千一百五兩零通共鹽規銀八千六百三十七兩零除雍正五年分辦漕動用過八千四百七十二兩零實剩銀一百六十五兩零兹於雍正六年五月內節據歸德河南彰德懷慶衛輝南陽汝寧七府及陳許禹鄭汝光六州陸續詳報前來呈稱各府州所屬各項陋規俱已革除惟舊有鹽規一項在鹽商以為成例已久分所當送但既蒙皇恩優渥賜以養亷願將此項鹽規悉行歸公以充運漕之用等因到臣隨據糧道陳世倕將各府州鹽規銀共六千一百餘兩開報前來臣查各屬鹽規一項詳請歸公蓋以鹽商原係富商且皆各省之人運鹽入境以取民利地方官有捕私督銷之責每逢生辰令節鹽商有所餽送亦屬情理之常今各官俱蒙皇仁浩蕩賜以養亷不敢私收情願援照開封府例為挑淺雇船築壩歸公之用上既無礙於國下亦無礙於民自應一併歸公以充運漕之用其各屬解到鹽規銀兩現貯糧道衙門庫內除起運雍正六年分漕糧動用鹽規并舊管新收實在數目另摺奏明外所有各屬歸公鹽規銀兩數目理合奏聞伏乞睿鑒謹奏斯事卿當再加斟酌朕意緝私銷引地方有司均關考成些微鹽規留與伊等一者資助薪水稍覺饒裕二者難保歸公之後不於此外重復需索若然則於衆商殊有礙也同日又奏為查勘東省廟工情形敬陳末議仰祈睿鑒事竊惟重道崇儒者聖王之大典趨事赴功者臣分之當為我皇上以聖廟偶災發帑興修大小臣工亟當黽勉從事早為告竣仰副聖懷不意遷延嵗月經久無成臣恭膺簡命總督河東仰體我皇上尊崇宣聖之至意巍煥宫墻之曠典豈可任其遲延虛費國帑即嚴飭山東布政司查明此工係何年月日興修領過錢糧若干買過物料若干做過工程若干逐一清查具報去後隨據布政使費金吾於雍正六年九月二十七日詳覆前來臣因奉㫖赴東㑹審黃炳余甸一案未得親詣查勘逮臣㑹審事竣由登萊查視海疆已畢遂親謁聖廟并率領監督承修各官逐加查驗查勘得大成殿寢基尚未建立大成門金聲玉振門御碑亭兩側門亦未興工兩廡該造八十八間內三十四間尚未建立其巳建之兩廡五十四間竝巳建之啓聖殿五間金絲堂五間俱未調脊蓋瓦亦未鋪砌磚石周圍墻垣尚未圬墁其木料之丈尺寬厚與原估半不相符且木植多未雕刻精細磚料多未琢磨光潤石料多未鏨鑿花文所用之琉璃瓦霜雪之後又間有折裂者種種草率難以枚舉臣即靣行申飭一應巳建未建工程照依原估丈尺其中稍有不符即飭更換至磚瓦木石已經辦成者務期精工未經辦成者速令採買俱各遵照去後臣回至濟寧㑹審宋薇一案將廟工情形一一告知署撫臣嶽濬據云回省便道即行親看再為嚴催等語但臣查開土興工已經四載有餘計其錢糧則在十餘萬之外考其工程則在二三分之間論其採辦則備一缺十實無應手之物料觀其匠作則此去彼來亦無鳩集之技能在督催者既因循而茍且在承修者亦玩愒而遷延錢糧則愈用愈繁工程則愈久愈弛而且原派之員既有升遷降調之殊則新委之員又多推諉延挨之弊如此相沿臣恐再遲三四年四五年亦難即覩巍峩之象輪奐之觀也臣若概行參處則參不勝𠫭若一概掣回另委人員則經手之官反脫然事外既無以示懲接受之官必轉相效尤亦無以示勸此其不可者一也但查各州縣承修承辦各官實有錢糧刑名之責若令其終嵗在工則地方何人代理若令其身任地方則廟工何人督率在州縣之勤敏者不免顧此而失彼在州縣之怠惰者反得偷安而規避此又其不可者一也臣愚以為人有勤惰貴考其成法有勸懲先専其責仰請皇上應否將在工人員有督催經手之責有承修承辦之任不能上緊辦理以致遲延者如兖州府知府金以成萊州府同知張文炳青州府同知張文瑞兖州府通判黃家炳濟寧州知州髙令樹泰安州知州王一夔東平州知州王敷賁滕縣知縣馬兆英嶧縣知縣崔𢎞烈汶上縣知縣于斐鄒縣知縣張曰璉滋陽縣知縣王㴻東阿縣知縣何一蜚等員除何一蜚經臣以才具平庸題𠫭外其現任各官俱令其暫為離任勒限修造俟廟工告成之日再還原任其餘佐二雜職等官俱係協修微員概免離任令其在工效力俟廟工告成之後准其回署至在工監督之大員相應仍飭濟東道張體仁登萊青道李英監督各官勒限修造但查登萊青道駐劄萊州去工本逺而李英又現在經臣題請調補南汝道倘蒙俞允准其調補應將一概工程専交濟東道張體仁就近督理實為妥便再臣更有請者修建廟工諸務繁劇非多集賢員不能辦理且現有離任者則署理各亦皆乏人仰請皇上於候選候補知府同知通判州縣人員內揀選身家殷實者二十員發往山東擇其中通曉工務者令其在工效力俟廟工告成之日奏請皇上敇部從優議叙留在東省遇缺即行題補其所遺知府一缺同知二缺通判一缺直隸州二缺知州一缺知縣五缺擇其中熟諳吏治者暫行試用署理俟廟工告成在工各員復還原任之後亦留在東省遇缺另行題補如此則在工人員得専心畢力以贖其從前怠玩之罪而效力人員亦必鼓舞奮興以冀其將來議叙之條況有該道之查催督撫之𠫭處所有用過錢糧做過工程令其五日一報以備查考則勤惰自分勸懲有道將見聖廟告成有日而國帑不致濫費欽工不至久誤矣再置辦物料現在需用銀兩查有鈕國璽從前採買木植虧空銀二萬七千三百八十六兩零若俟追還後採辦未免濡遲應否先動司庫銀兩照數支給嚴飭承追督催各官勒限嚴追賠還司庫若鈕國璽力不能完即遵諭㫖著落濫用劣員之原任撫臣陳世倌賠完以免懸項臣又總查得此工自前撫陳世倌起經前撫塞楞額布政司自前任布蘭泰起經前任張保嶽濬監督之道員自前任登萊青道徐德淑起經前任濟東道牟錝元俱係歷來督催之上司遲延之咎均所難辭似宜一體示懲以為不實力督催者戒臣現在勘得聖廟中未被災之聖蹟殿奎文閣􅎉星門詩禮堂啓聖寢殿神庖正房東西掖門齊宿正房等處不免猶有剝落殘缺將來大工完竣新舊間錯非所以肅觀瞻也臣請稍加葺理尤為全美我皇上興建大工既用一二十萬之帑金區區小費原所不惜然此項錢糧既在原估之外又非另行建造大工可比仰請皇上應否將此項修理即著歷來督催不力之撫司道分認估修以懲其不能督催之咎臣仰體皇上尊師重道之意不揣愚陋不避嫌怨冒眛具奏是否允協伏乞聖明訓示可否具題統候皇上睿裁施行為此謹奏此奏可嘉之至隨另有諭㫖頒發卿總督兩省政務殷繁不能分身兼顧廟工一事朕已差委部臣前往辦理矣同日又奏為欽奉聖訓據實覆奏事雍正七年二月初七日臣家人齎回臣具奏查驗東省將辨馬步兵丁摺內欽奉硃批諭㫖此輩武辨若不至劣蹟昭著但有寸長可取即當寬容一步又奉諭㫖誠哉是言火器為軍中最要之務豈宜稍忽又奉諭㫖此風何可一日姑容又奉諭㫖當嚴行申飭務令革除又奉諭㫖整頓營伍尚屬易事但得實心盡力不避勞怨之將領數員朞月之間便可改觀全在統轄大臣勸懲有術非比吏治民風之難期成效也欽此臣查東省營伍廢弛巳久是以臣查驗之時茍有寸長可取無不諄諄訓誨不敢遽行𠫭革以負皇上造就人材之至意至於各營兵丁漢仗俱好一整理間便可改觀但實心任勞任怨之將辨難得其人臣再四思維細加調度查河南督標中軍副將張孟儀開封府城守營都司宋愛該員持躬清正營伍熟諳臣已經題請將張孟儀調補膠州營副將宋愛升補即墨營收得人之效而東省各營將辨亦必觀感振興共相砥礪矣再火器為軍中最要之務聖諭至明臣巳經嚴行申飭令各處營汛依法製備至營汛陋規自鎮臣萬際瑞嶽含竒蒞任後加以臣總督河東以來此風全息其整頓之處遵㫖當再行嚴飭又於臣覆奏劉永鐄摺內欽奉諭㫖果能如此上天自無不照察錫佑之理又奉諭㫖在劉永鐄始初未料獲受如此知遇少年心性難免失於自檢後寄字託人代首正係天良發露處然即此觀之可見其駁而不純上智流品殆不若是也又奉諭㫖准照議完結欽此仰見我皇上包容廣大嘉與維新之聖意蓋天下無所慕而為善無所畏而不為不善者此上智之品難期望於中材然秉彛之念人孰無之今劉永鐄受皇上格外隆恩即設法令人代首正其天良發露悔過諭㫖准其作自首報糧完結至臣仰體皇上愛惜人材之意乃蒙溫語褒嘉臣益不勝悚惶之至所有原奉硃批奏摺理合恭繳謹奏覽雍正七年三月初六日河東總督臣田文鏡謹奏為恭報河東兩省雨雪日期仰祈聖鑒事竊臣據豫省各屬具報雍正七年二月十四十五十七等日通省積雪三四五寸不等十九二十兩日通省復得時雨入土二三四寸不等據東省各屬具報正月二十六七等日得雪三四寸至五六寸不等二月十四五等日又得雪二三四五寸不等各到臣欽惟我皇上至誠至敬上格天祖是以屢年以來雨暘時若年嵗豐登今兩省去冬以及入春連得雨雪臣益信皇上天人感應之諭聖明默契之微乃皇上聖不自聖猶有敬誠以待之諭㫖仰見帝德髙深非臣下所能窺測於萬一也所有河東兩省雨雪日期理合繕摺具奏仰慰聖懷為此謹奏覽兩省雨雪情形朕懷實慰同日又奏為奏聞事竊惟民生之為纍莫甚於陋弊陋弊之未除皆由於衙蠧蓋除弊方可興利去蠧乃以安民臣查東省陋弊相沿蠧役纍民比比皆是請舉其一二為我皇上陳之如徴糧有徴糧之弊也花户完納錢糧匱書之串票有費銀匠之鑿印有費經承之紙筆有費而且衙役則包攬侵漁單頭則需索派纍其司府衙門之飯食敲平看色寄庫以至解銀發銷等項派之州縣州縣書役又派之里民用一派十各自分肥此徴糧之弊也如收漕有收漕之弊也民間完納漕糧倉書則捺勒需索收米有費斗級則踢斛淋尖斛口有費起運則車輛腳價幫貼有費而且催漕亦有使用烙斛又有舊規其道府衙門之開徴造冊催兊押幫以至旗丁水手等項派之州縣州縣書役又派之里民用一派十各自分肥此收漕之弊也其餘陋弊諸如此類難以枚舉臣受事之後即備檄各屬將陋規悉行首出衙蠧悉行革除如有陽奉隂違者官則飛章糾𠫭役則嚴拏重處臣又於雍正六年九月內奉㫖赴東㑹審黃炳一案凡遇各屬當即面行開諭諄諄以除弊去蠧為急一時各屬紛紛呈首者不計其數近聞山東人民揑布訛傳言臣在東時見地土肥饒欲具題加賦民間房屋欲按間納課併發量地之竿丈量地畝比舊時短至二三寸俱賴巡撫力為勸阻等語臣聞此訛傳不勝駭愕臣自念執法極嚴奉公惟謹出一言必使之可以告皇上而後發辦一事必使之可以見皇上而後行久已在皇上洞鑒之中照臨之下臣復何容置喙即使物議風生謗言騰起臣非敢稍存顧避亦非慮上惑聖明但陋弊方在清除蠧役方在釐剔當法令初行即有訛傳以為如此可以掣肘乎臣矣如此可以牽制乎臣矣不知臣懷犬馬之私切鷹鸇之志雖早料其必然而必不敢不力為整頓急為清理以負皇上天髙地厚之隆恩也總之此等訛傳皆出於上下各衙門姦胥蠧役併各州縣里書總催單頭之口彼見陋弊悉除無從染指是以造作浮言蠱惑愚民使之羣生怨望且希將來查究之人自必顧忌瞻徇彼得朦官作弊以遂其網利營私之計耳豈知陋弊不可不除蠧役不可不去臣忝任封疆此心此念止知上體聖心下愛百姓謗毁固所不辭嫌怨亦所弗避但不敢於君父之前稍有隱諱臣現在出示曉諭外所有東省訛𫝊冒昧奏聞伏祈睿鑒為此謹奏大抵魑魅魍魎之輩至技窮力竭時率用此條姦計乃從來宵小之常情奚足介意凡百但求可以對天處行去悠悠毁譽不特似此捏造浮詞毫無影響便實有之事言之確鑿亦復何畏何慮之有明白曉諭後自當止息也同日又奏為欽奉聖訓據實覆奏事雍正七年三月初二日臣家人齎回臣具奏豫省鹽規歸公摺內欽奉諭㫖斯事卿當再加斟酌朕意緝私銷引地方有司均關考成些微鹽規留與伊等一者資助薪水稍覺饒裕二者難保歸公之後不於此外重復需索若然則於衆商殊有礙也欽此臣查此項鹽規自開封府知府孫蘭芬於雍正四年情願歸公以為運漕建壩之用經臣奏明在案是時七府七州皆有鹽規俱不自安共懷一歸公之念而未得其便逮至雍正六年於請復舊例事案內豫省漕糧改徴本色臣與司道等議及運漕腳價併雇募剝船刨淺敲氷等項之費除將糧道衙門及開封府充公鹽規併漕項節省項下耗羡銀兩動用支給外尚恐有些微不足敷用之處適歸德府知府唐綏祖光州知州劉兆幾因公至省在旁與聞即面禀將歸德府光州所收鹽規願充公用隨即具詳到臣嗣後各府各州聞之無不踴躍歡欣情願將所收鹽規以充漕運之用各詳報前來咸稱各府州蒙皇上賜以養亷公私有賴俯仰從容何敢於此外稍有染指等語則此項鹽規實屬情願歸公懇請再三實非臣有所强而行之也況伊等於歷來之所現有者尚皆不受而後安於心則分外之所無者又不敢於皇上之前稍有隱諱故備陳各屬歸公緣由仰祈睿鑒又臣具奏撥給徐湛恩養亷摺內欽奉諭㫖據實覆奏又於奏劉永鐄摺內欽奉諭㫖朕待天下臣工之心真誠無二實可質諸天地欽此仰見我皇上覆載為心胞與為念凡兹百爾皆一視同仁無分彼此不獨臣一人心恱誠服即天下臣工無不心恱誠服者也所有奉到原摺理合恭繳謹奏覽雍正七年三月二十日河東總督臣田文鏡謹奏為恭報河東兩省得雨日期仰祈睿鑒事竊查雍正七年二月內河東兩省共得雨雪其分數日期已經具摺恭奏兹據豫省各屬具報三月初一初二初三十一十二等日通省各得時雨入土三四五寸不等又據東省續報二月二十七八等日得雨二三寸不等又據報三月初一初二十一十二等日各屬又得時雨入土二三四寸不等二麥長發土田滋潤各等情到臣此皆仰賴我皇上至誠至敬感召天和是以甘㴻知時靈苖應候來牟率育計日可待臣惟有欽遵聖訓必敬必誠無或稍怠耳所有河東兩省得雨日期理合繕摺具奏仰慰聖懷為此謹奏覽奏即慰悅之念亦不敢萌惟敬待天祖錫祐於收成之後方始額手欣慶也同日又奏為受恩至重圖報至難冒昧越分陳言仰祈聖鑒事竊臣荷蒙皇上隆恩屢經遷擢秩崇祿厚非惟寵錫優渥莫與比倫諸如察臣之愚宥臣之罪憫臣之苦惜臣之名種種殊恩誠有子不能得之於父者而臣乃得之於君是以口不能言筆不能書日夜刻心希圗報稱然每自循省率皆分內所當為之事無以自别於庸衆而皇上逾格之恩施乃益有加無巳若臣凡有見聞不直陳於君父之前則臣不但負我皇上抑且自負其心矣臣近風聞一事明知事非職守言涉嫌怨然激於愚悃不得不敬為皇上陳之督撫大吏關係一省吏治民風固須才守兼優尤必謹身倡率如浙江督臣李衛操守亷介臣所素聞且𫝊其偶有缺乏輒於家間取足再臣閲邸抄每見其設施條奏亦皆動合機宜此誠當世之賢員所謂難能而可貴者也然馭吏繩尺未免稍踈振肅規模未免少檢則於大僚之體有未全於皇上任使之意恐亦有所未副夫察吏所以安民博寬大之名於一員則千萬人受纍矣正已所以率屬圖游衍之歡於一日則千百行受玷矣臣實見其不可然素無交際未便相規邇聞其陛見在即是以敬陳於皇上之前或賜面加訓誨俾知改過增美有醇無疵則體統全而綱維肅庶無負皇上造就臣工求賢若渴之至意諸所風聞除開具另摺仰祈皇上俯賜全覽外為此謹奏覽奏嘉恱之懷筆難罄述內外大臣皆肯如是彼此愛惜互相切磋即所以愛君報主也況朕每品評督撫優劣輒以卿與鄂爾泰李衛三人指為標準卿等三人實共為一體設一有參差兩俱削色李衛向耽嬉遊頗涉不檢朕所素知殊不料過舉乃至於此即日來京陛見當切加訓誨以䇿勵之諒其定然領受悛改果能蕩滌微瑕纎垢俾美玉瑩然則默默中卿為李衛之恩友矣若言有意縱容屬員可保斷無其事但通省官吏之衆焉能各各洞察無遺歷年薦揚之廣曷克人人循分盡職即責之賢聖亦有所不能者其間少有疏失憸壬之輩遂乘隙而起議論風生諸如此類朕皆置之不問必已身實有蕩檢踰間之疵及屬員款蹟昭彰官針玷缺而一味偏袒徇庇方始嚴詰不為稍恕也於斯朕持有定見確乎不移否則汝等封疆大吏如何展布手足耶同日又奏為恭報河南解陜騾馬日期仰祈睿鑒事雍正六年九月二十八日准户部咨內開欽奉上諭京師及西安需用騾頭爾等即行文直隸河南山西山東各該督撫令其照數採辦欽此又於雍正六年十一月初二日准户部咨內開總督嶽鍾琪奏稱河南山西二省採買騾七千頭就近解送陜西已足備用奉旨依議速行等因到臣臣當即檄行河南布政司遵照通行各屬辦買俱經臣驗烙如式自正月初十日起至二月十四日止分為十七運解送西安嗣據押運等官禀報騾頭到陜日期自二月初一日起至三月初三日止所有豫省應辦騾三千五百頭俱經川陜總督臣嶽鍾琪如數驗收訖再雍正七年二月二十九日准川陕總督臣嶽鍾琪咨內開各營應解馬匹行令揀選臕實之馬於騾頭解完之日即行接續解送西安緣由到臣臣查雍正六年五月初十日准户部咨內開欽奉諭旨爾等密行文總督田文鏡飭令該省駐防及緑旗營員辨將營馬加意餧養俟嶽鍾琪取用之日揀選臕實馬三千匹解往彼處欽此臣將駐防及緑旗各營均勻分撥每營馬百匹撥派出六十七匹以足三千匹之數隨檄行布政司飛移城守尉督標兩鎮照數揀選臕實馬匹解陜應用兹於三月初十日起俱經臣親驗明白分運解往西安其草束等項遵照部文動支正項備辦但長途跋涉馬匹止食空草必致疲斃麩豆等項亦不可缺其管押兵丁馬乾銀兩臣仍飭司照常給發并嚴飭押運官辨約束兵丁母致擾纍其解到西安交收日期俟報到日另摺恭奏臣因解陜騾馬事關軍需恐上厪聖懷是以先將解赴西安日期具摺奏聞至一應動支正項錢糧並買補馬匹銀兩容臣分别核實另行報銷合併聲明謹奏據奏巳將騾馬照數解陜甚好隨經交部存案備查矣同日又奏為酌議辦理車騎事宜給發各項銀兩數目謹分析奏明仰祈睿鑒事雍正七年三月十七日接准部咨內開為欽奉上諭事查得車騎營兵九千人令直隸山東山西河南等省於四五月間先後起身以五月初十後二十五日以前陸續到京四省車兵每名賞給銀二十兩著該督撫動支藩庫銀兩按名給發各兵丁所用綿甲令各該督撫修理齊全交與該兵帶來等因准此臣遵即檄行布政司及臣標中軍副將并照㑹南北兩鎮一體遵照外臣查雍正六年正月二十六日為遵㫖密議據實覆奏事摺內經臣將辦理挑選兵丁事宜逐一奏請奉有硃批諭㫖欽遵在案今臣按現准部文與臣前摺內條件猶有應為酌量分别辦理之處謹當逐一奏聞臣查前摺內兵丁安家之費經臣酌議動支公項銀兩每名給銀三十兩今部文內欽奉諭㫖每名賞給銀二十兩著該督撫動支藩庫銀兩按名給發欽此臣當謹遵諭㫖於藩庫內各給銀二十兩至臣前奏三十兩之處似無庸再給又部文內開兵丁所用綿甲令各該督撫修理齊全交與該兵帶來等語臣查南北兩鎮俱係綿甲經臣飭令修整現皆齊全足用惟臣督標俱係鐵甲竝無綿甲臣當照督標派撥兵數動用公項銀兩星速製偹務令堅緻如式給發起程以上二項皆遵照部文現在敬謹料理臣又查前摺內尚有兵丁行裝衣服等物乃皇上格外施恩令臣酌議之項似應仍行量給今臣謹酌議每兵六兩凡應用行裝衣服以及油罩雨具等物一切足用臣皆逐件開單動支公項銀兩給發令其自行製備仍令照單送驗臣又查前摺內奏明兵丁負載行裝等物每兵五名給䭾騾二頭鞍架俱全今部文亦未議及但所挑兵丁俱係步兵原無馬匹其鑼鍋帳房與盔甲等物長途跋涉皆須䭾載部文雖未議及亦必不可少臣謹照前摺所奏動支公項每騾一頭發銀一十四兩給領辦買以上二項俱現在檄行布政司臣標中軍副將并照㑹兩鎮按派兵丁數目確核給發并札致山東山西撫臣一體照此辦理至管押車騎兵丁之將備千把應酌給路費銀兩之處臣於前摺內奏請欽奉聖諭臨期自另有㫖欽此今准部咨管押車騎之將備千把雖經派撥而應否給與路費銀兩尚未議及應仍候諭㫖遵行所有現在酌量料理事宜理合繕摺奏聞伏乞皇上睿鑒為此謹奏交怡親王等議覆有旨諸凡事宜總俟部文到日遵照奉行同日又奏為動用耗羡銀兩據實奏明仰祈睿鍳事竊查雍正六年七月十一日臣覆奏動用耗羡銀兩摺內經臣將豫省應用耗羡銀兩辦理公務各項逐一奏明蒙皇上硃批諭㫖議論可謂是當之至以上數項皆地方要務亟應辦理者卿權其輕重緩急一面奏聞一面次第舉行欽此欽遵在案伏查豫省各府州縣城垣歷年既久不無殘缺其少有殘缺者臣巳經飭令地方官不時捐資修整至於塌卸過多自應動支耗羡修築臣隨檄行布政司委員確查估報去後兹據署司謝旻詳稱豫省一百零八州縣除八十九州縣或城垣竝無坍塌或少有殘缺地方官情願捐修無庸動用公帑外惟查懷慶府附郭河內縣彰德府附郭安陽縣汝寧府附郭汝陽縣陜州歸德府所屬夏邑縣寧陵縣懷慶府所屬修武縣武陟縣原武縣汝寧府所屬信陽州新蔡縣羅山縣衛輝府所屬淇縣滑縣南陽府所屬唐縣陳州所屬沈邱縣許州所屬長葛縣汝州所屬伊陽縣光州所屬息縣以上共十九州縣所有城垣年久損壞應一併估修但其中如淇縣原武羅山三縣坍塌過多難於修補除淇縣原係土城仍建築土城外其原武羅山二縣係偏僻之所今議一併建築土城庶工省而力便以上統共估銀六萬五千五百五十兩零委無浮冒等情造冊詳報到臣臣現在飭司確核將耗羡銀兩檄發委員速行辦料修築又查貢院號房舊止八千六百一十一間查上年丙午科鄉試應試士子多至一萬二千餘人因不敷用搭蓋席棚以足其數今嵗已酉科又值試期入闈士子諒不減於上科所少號房酌量添設二千四百間以為一勞永逸之計臣隨檄行布政司委員確估造報去後兹據署司謝旻詳稱添蓋號房在龍門相近東西兩圍墻之外填築地基添蓋二千四百間從老墻南首接砌圍墻兩邊包至大門共估用工料銀五千八百三十六兩零委無浮冒等情造冊詳報到臣臣現在飭司確核將耗羡銀兩檄發委員速行修造又查按察司司獄自明季以來即無監房凡解審人犯俱寄祥符縣監羈禁殊為未便臣檄行布政司委員確估造報去後兹據署司謝旻詳稱建造司獄在按察司衙門內西南臨街填髙地基建築監墻周圍共六十三丈髙二丈墻外東西北三面俱築更道土墻內造監房并獄神廟禁卒房等類共四十二間又另造司獄司署前後共一十四間以上通共估用工料銀四千七百二十三兩零委無浮冒等情造冊詳報到臣臣現在飭司確核將耗羡銀兩檄發委員速行建造此三項者均關公務共該動支耗羡銀七萬六千三百三十六兩零至臣前所奏修整臣標與南北兩鎮盔甲鑼鍋帳房鳥鎗等類及疏濬各州縣大河淤淺之處臣已經飭司移㑹兩鎮造報通飭各道府州縣行查去後尚未詳覆俟詳覆到日應動耗羡銀兩臣再另摺恭奏所有豫省修築各府州縣城垣并科場添益號房建造按察司司獄一應動支司庫耗羡銀兩數目俟工完之日除確核造冊送部報銷外臣欽遵聖訓一面辦理一面將需用銀兩總數繕摺奏聞謹奏所奏欣恱覽之興造俱屬是當合宜而又皆從節省甚為可嘉工完之日照例報部存案可也同日又奏為刑名之任非輕賢能之員難得仰請聖恩升擢以收實效事竊臣荷蒙皇上深恩總督河東吏治民生時刻在念伏思按察司一官為刑名之總滙民命之攸關必須精明練達才守兼優之員方克勝任臣查得現任糧道陳世倕於雍正三年在南汝道任內緣前按察司沈廷正升任福建藩司臣即令陳世倕署理臬篆觀其辦事明白聽斷得情實屬賢員後於雍正六年十一月前按察使納海離任時臣令署布政使謝旻署按察使事署任月餘因兩司事務殷繁力請將糧道陳世倕署理臣於其辦漕事竣即令署理臬該道署事以來悉心辦理朝夕弗遑聽訟精詳務期明允不以刑訊為能不以文致為巧揆情度理毫髮無遺是以刁詐之民當前立辨無出入之愆重大之案經手可完無拖纍之苦凡屬案情疑似該道必親自鞫審不任意駁詰推諉屬員現今數案俱係歷來府州縣不能審出者悉能審出實情豫省官民無不稱其斷獄如神此不獨臣一人之私言也可否仰請天恩將陳世倕補授河南按察使則豫省之民將無寃獄而臣亦得收臂指之助矣但臣查去年十二月內接准部咨奉㫖河南按察使員缺著廣東按察使公元調補欽此又查雍正六年正月二十七日邸抄內奉㫖吳昌祚補授山東按察使欽此臣查吳昌祚於去年皇上另補他省至臣奉命總督河東兩省事屬一體乃不懇請陳世倕在豫六年民情風土無不周知以之升擢臬司不獨豫省刑名臣可無慮即豫省諸務俱可共相贊理一轉移間實與地方甚有裨益再查河南糧道一缺兼管驛鹽分守三府五州非老成幹練之員亦難勝任查有衛輝府知府張建德居心公正辦事勤慎每年在衛輝水次協理漕運更屬諳練其糧道一缺仰請皇上天恩以張建德升補亦屬相宜其衛輝府知府員缺恭候皇上敕部於記名人員內請㫖補授臣仰體皇上因材器使慎重吏治民生之意用敢冒昧具奏是否允協伏候聖裁為此謹奏候另旨諭部再者朕簡命嶽鍾琪統軍出塞欲令嶽濬於五月間往陜送伊父啓行東撫印務卿能代理乎若慮鞭長莫及費金吾可暫署乎約計嶽濬道路往返於八月下旬方克旋任卿酌妥具覆奏到之日有旨陜州閿鄉縣知縣趙可大何如雍正七年四月十一日河東總督臣田文鏡謹奏為黃河水汛平穩敬謹修防以固堤工以慰聖懷事竊查豫省黃河水勢今嵗自桃汛以來至三月二十七日止一切工程俱各平穩臣已㑹同總河臣嵇曽筠合詞具題在案今四月初八日起伏汛又屆凡一切樁掃物料臣已飭令預僃齊全并檄行管河道及在河官辨督率兵夫人等駐守河干照依四防二守之法加意巡查相機料理以仰副我皇上軫念河工永慶安瀾之聖意所有伏汛修防事宜理合繕摺恭奏上慰聖懷謹奏諸凡敬謹為之自齊蘇勒溘逝之後朕每念及河工不禁心悸倘偶有變遷竟無所恃賴惟宜加慎修防并仰仗天地神靈護祐克保無虞庶幾少慰朕懷於萬一同日又奏為欽遵聖諭據實覆奏事雍正七年四月初六日臣家人齎回臣具奏浙江督臣李衛摺內奉有硃批諭㫖臣跪讀之下仰見我皇上明竝日月德配髙深凡內外諸臣俱在聖心照鑒之中帝念涵容之內雖覆載生成之德無以過也伏念皇上視臣工如一體本無彼此豈臣子事君敢存異同之見天下之事皆朝廷之事也天下之臣皆皇上之臣也為臣子者以一已之身報君不若合天下之臣以共圖報君是以善則相勸過則相規寅恭之誼實事上之道我皇上不以臣為冒昧多言又蒙溫語褒嘉臣何人斯遭遇聖明信任之隆一至於此臣查李衛實為難得之賢臣臣之愚衷實望其為臯䕫為稷契上為聖主慶得人下為督撫樹標準偶有微疵恐非全美一經皇上面加訓誨則李衛自必感激天恩力為改革將見有美無瑕庶幾仰副我皇上造就臣工之聖意而於封疆實有裨益則不獨李衛報主之心可以稍盡而微臣報主之心亦藉以稍抒其萬一也所有奉到原摺理合恭繳為此謹奏朕待天下臣工夲諸一誠所望者惟以全美二字交相勸勉耳此心實對天日無慚同日又奏為欽奉聖訓據實覆奏事竊臣家人齎回臣覆奏徐湛恩摺內奉有硃批諭㫖臣伏查徐湛恩向在運河洵屬諳練之員今聖諭仰見我皇上睿鑒精詳瑕瑜畢照至於徐湛恩之操守臣實未能深知緣自伊協理以來河工錢糧既非専管而豫省屬員又從無餽送是以未能悉其底藴今欽奉聖諭臣遵當留心訪察仰副聖懷為此謹奏覽同日又奏為欽遵聖訓據實覆奏事竊臣家人齎回臣具奏為刑名之任等事摺內奉有硃批諭㫖伏查臣前摺於三月二十日恭奏按察使公元於二十六日到豫二十八日接受印務隨於四月初五日適各司道等在臣衙門㑹議車騎行裝等項接到邸抄蒙皇上天恩將陳世倕補授河南按察使張建德補授開歸道是時陳世倕在旁聞之驚惶無措備述革職之員蒙終如一必不有負天恩至於公元臣雖相接未久觀其為人果係老成誠棄者臣受皇上隆恩兼轄東省自署撫臣嶽濬以至兩鎮司道府州縣并將備辨員等無不諄諄勸勉共相砥礪以期仰報聖懷再臣跪讀聖訓內有詢臣可能代理東省撫印之諭㫖臣不勝感愧交集悚惶無地臣自顧庸材兼轄兩省凡事皆仰賴皇上訓誨周詳幸免隕越兹蒙聖恩眷注復以東省撫印下詢臣何人斯乃蒙皇上委託之重恩遇之隆一至於此但臣於目下現在辦理錢糧奏銷併檢閲秋審案件兩項事竣又值科場屆期所有事宜亦當次苐料理況入闈監臨兩省各有専司非獨臣才有所不逮亦勢有所不能誠如聖諭鞭長莫及也至費金吾謹飭自愛黽勉厥職以之署理諒能無忝但臣微嫌其精神稍缺將來東省題報在案合併覆奏又於臣恭報河東兩省得雨日期摺內奉有硃批諭㫖仰見聖心廣大聖諭加勉弗怠焉耳所有奉到原摺理合恭繳謹奏覽硃批諭㫖卷一百二十六之十五欽定四庫全書硃批諭㫖卷一百二十六之十六硃批田文鏡奏摺雍正七年四月二十七日河東總督臣田文鏡謹奏為恭報河東得雨日期仰慰聖懷事雍正七年三月十二日以前河東兩省所得時雨分數日期已經具摺恭奏伏查豫省自三月十二日以後至三月二十一二及四月初五十一等日據河南南陽汝寧三府及陳許禹鄭光汝陕七州各屬具報得雨入土二三四寸不等惟開歸彰衛懷五府屬報雨多寡不同內有僅得微雨入土未深而四月初旬又遇風沙近省各屬及河北一帶稍覺缺雨臣屢差人四處到鄉查視據云上年三冬連日雨雪今春正二三月又獲雨雪霑足土膏潤澤麥根深固惟最髙阜處及沙土地內當此二麥頴栗秋禾生長之時稍覺微乾臣即於四月十一日起禁止屠沽䖍誠祈禱謹率在城文武步行龍神廟中早晚祈求并飛檄各屬雨未霑足之州縣一體䖍禱數日內僅獲微雨未克深透臣又於十九日擇吉薰壇連日䖍禱嗣據歸德府各屬具報二十日得雨三四寸不等兹於二十六日開封省城濃雲四布密雨普降自卯時起至二十七日寅時止據祥符縣報稱入土已經霑足不但二麥愈滋堅實其秋禾榖黍髙粱花豆等苗亦皆滋雨暢茂歡呼之聲遍於城野除豫省各屬得雨分寸俟具報到日再行奏聞外恐厪聖懷合將開封省城得雨日期先行恭奏再東省自三月二十一二及四月初十十一十二等日據各屬具報得雨三四寸至五六寸不等但目下曽否得雨因地方遼濶報到稍遲未能全悉合併奏明為此謹奏前聞豫省缺雨而衛懷一帶尤甚朕心日夜為之憂虞兹覽所奏開封等處得雨透足雖云稍慰其餘各府州尚未知曽否沽被料今嵗二麥失收矣去冬今春以來觀卿奏報雨雪之摺以為豐收可必似有滿足之意朕於彼時即不以為然今果如是所以天工之事惟宜以敬誠處之切勿預期一嵗功畢方敢釋懷此念絲毫不可肆也當志之同日又奏為據實奏聞仰請聖裁事竊查山左濟東一道分守二府三州管理通省驛務有稽察屬員督修水利清查馬匹錢糧之責非精明强幹之員弗克勝任兹該道張體仁性本忠厚才缺優長到任以來並無設施不聞整頓於濟東道缺頗不相宜且訪得張體仁之父現在濟南府雒口行鹽查係伊家舊業引課經手多年原非為張體仁官於濟南而起但張體仁前為濟南府知府今又䝉皇上天恩補授濟東道聖明在上該道自可據實詳明奏懇聖恩另補他處始為臣子善處之道今張體仁身為監司伊父即在治下行鹽雖無招搖之處而嫌疑所在未免有礙於官聲也可否仰請皇上擇京官閒簡之缺以張體仁調用其濟東道缺另簡賢能之員補授則不獨於伊父行鹽並無妨礙而張體仁身為閒曹亦可克供厥職矣再張體仁現在奉㫖監督廟工倘䝉俞允并請皇上將張體仁以京官職銜令其在工監督俟告成之日再行進京補用則監督既有專司驛道又有專任均無顧此失彼之慮臣仰體皇上軫念臣工委曲成全之聖意是以冒昧陳請伏候聖裁為此謹奏張體仁非短於才之人或觀望不前不肯盡力供職乎現任部郎內如張體仁者有幾頗多不及也監司之任綽然有餘東省各員中朕尚將伊置於第一第二之列卿再加試看自知至於其父在治下行鹽乃屬小節若調補豫省道職就近驗視猶或庶幾內調閒曹殊覺可惜同日又奏為遵㫖商酌據實覆奏事雍正七年四月二十二日據河北鎮臣閃文繡咨呈携帶兵丁一案內開欽奉硃批諭㫖所奏與督臣田文鏡妥商但書算之人亦何用許多至云差遣不過隨滿營大兵而行並無分外使令處也多帶一人未免多汝一人之纍其酌量為之欽此臣查國家設兵有制用兵亦有制各營兵丁調遣之外俱有防汛差操之責非可以供使令而效奔走也今閃文繡以書算差遣乏人欲携帶兵丁不知書算非兵丁所諳之事兵丁非可供書算之人則書算原不必携帶兵丁也臣伏讀諭㫖不過隨滿營大兵而行並無分外使令處也則閃文繡到彼既無分外差遣又無庸携帶兵丁且現奉部文總兵帶跟役二十四名并給以口糧鹽菜銀兩及䭾馬等類皆聖主格外施恩令其多為隨帶則跟役之中即可偹書算差遣之用閃文繡欲帶書算之人應在本衙門書辦內選擇諳練寫算者酌帶三四名以為跟役足資辦理更無庸分外携帶兵丁也臣欽遵諭㫖即將無庸携帶兵丁緣由并跟役中可帶書算之人等語照㑹鎮臣閃文繡在案所有商酌事宜理合據實覆奏臣再有奏者閃文繡到任以來辦事勤謹操守廉潔整飭營伍訓練兵丁俱各盡心克供厥職今䝉皇上命其統領兵丁但臣伏念統領兵丁與鎮守不同必識見過人處事決斷始為智勇兼全之將如此番調遣車兵事宜俱䝉皇上指示詳明區畫盡善又復恩賞屢加至優極渥乃閃文繡奉文之後臣見其事多遊移胸少成竹則閃文繡為人止可以奉號令遵約束非有經緯之材運籌之略也臣受皇上深恩稍有所知不敢隱默是以冒昧具奏伏乞聖鑒謹奏議論可謂公當之至閃文繡原屬一介武夫止堪聽受指揮而已此等才略豈可委以運籌之任乎同日又奏為敬陳東省事宜請敕道員分審𠫭案以清積牘以資吏治事竊臣以菲材仰䝉皇上殊恩畀以總督河東重任東省錢糧又奉㫖命臣主張料理夙夜兢惕寢食靡遑伏念東省吏治亟須極力整頓東省錢糧亟須徹底清查東省虧空亟須究追彌補東省積案亟須催督清完其他應行料理之事不一而足如整頓吏治必首嚴貪劣重懲衙蠧臣是以留心察訪一經得實即官𠫭役拏執法審究臣又欽遵聖訓諄諄教導俾各革面洗心奉公守法近來官役稍知警愓矣各府州縣倉庫前經委員分頭盤查誠恐彼此徇隱虧實混淆今又㑹同署撫臣嶽濬將到任一年以上之州縣題請錯綜調補各各交盤務使官侵民缺絲粟必得確實以冀漸次清理矣至已審結虧空各案大率有勒追之名無完補之實其中恐有隱匿寄頓承追不力之弊今巳委員提犯嚴訊務使一一究出以抵虧項毋許任其延挨支飾矣此東省吏治倉庫虧空臣之現在料理者如此總因廢弛巳久驟難見效然臣䝉為清理如已參之虧空未審題者現有茌平縣革職知縣馬皓等九案已參貪劣之員未審題者現有濰縣革職知縣袁登陛等二十案其他命盜等案難以枚舉在布政使費金吾前署按察使鹽運司唐綏祖感激天恩未始不竭力辦理竭力催督而臣亦時刻嚴飭無如東省官玩役疲積習未能驟改非幾經駁飭則案情未得非挨至臨限則任催罔應是以案牘每多壅滯前河南按察使公元奉㫖調補山東臣於其起身之際欽遵諭㫖諄諄教導詳細指示該司感荷聖恩亦自勇往向前力圖報效但甫經到任土俗民情尚未熟悉各案原委亦未深知現今積案既多又届辦理秋審一日之工夫有幾一人之心力有限若非將現在之積案分委賢員急為清理恐日復一日愈積愈多非所以仰體皇上委任微臣整頓之聖意臣查鹽運司唐綏祖才堪任用人尚勤慎諸凡案件實能詳審伏乞皇上天恩將以上未經審結虧空貪劣等二十九案著令唐綏祖勒催承審府州縣審解該運司確審招解俟督撫題結之後令該運司將卷宗交該藩臬衙門存案其有應追銀兩仍令藩臬二司督追完解其現今題參未經奉㫖之案及嗣後續參之案仍照舊例歸藩臬二司㑹審如此則不但按察使公元得以專心辦理現審命盜等案及秋審事宜積案可以一清而布政使費金吾亦得省此㑹審參案之心思可以悉意助臣清理錢糧稽察庶務鹽運司唐綏祖於各案情節亦頗知悉似亦駕輕就熟實於東省錢榖刑名吏治均有裨益臣因題參奉㫖敕審之案有關錢榖刑名例應藩臬兩司㑹審招解臣未敢擅委該運司審理是以不揣冒昧恭摺奏請伏乞皇上睿裁施行謹奏分委代辦以清積案此議甚是照所請行咨明該部存案可也雍正七年五月初四日河東總督臣田文鏡謹奏為恭報豫省得雨日期仰祈睿鑒事竊查雍正七年四月二十六七兩日開封省城得雨業經臣將入土霑足緣由并二麥秋禾情形具摺恭奏兹據通省各屬所報二十六七八等日各得甘雨八九寸盈尺不等入土深透自二十九日後天氣連日晴霽二麥正在刈穫現據陳汝二州祥符寶豐伊陽等縣報到分數俱有八分九分十分不等容俟各屬報齊再當奏聞秋禾得雨之後愈覺暢茂異常官吏軍民咸歌聖澤農商工賈共祝皇仁是上天之雨露皆聞仰慰聖懷為此謹奏覽同日又奏為遵㫖密覆事竊查雍正六年八月二十四日奉到奏摺一扣內奏山東濱州董姓習為竊盜一事欽奉諭㫖董姓一家聞自前明以來久積穢行其宗族中不乏衣冠人物而乃暗為寡廉鮮恥干犯功令之事竟習以為常斯言非出自無稽宵小之口似乎確鑿不誣卿其加意精詳體訪如得有實據徐徐設法懲治鋤莠淨盡斯良苗滋長也朕恐風聲泄漏未經更諭一人密之欽此臣遵即密遣精細的當人加意察訪嗣於臣赴東省㑹審黃炳一案臣亦時刻留心密訪查濱州董姓固屬族盛丁繁散處境內亦多生監但求其實據尚未有得臣恐一人耳目察訪未周又不敢稍有泄漏是以臣去嵗回豫時作臣有所聞面囑山東署臬司唐綏祖密為察訪并切諭一字勿露兹於雍正七年二月二十八日據唐綏祖密稟近訪拏得窩匪窩娼之董興野董竹卿二人現在發州嚴審然亦係該州退役捕快並非衣冠人物臣令其再為密查外臣又於屬員內有山東人現在豫省為官辦事勤慎不避嫌怨之員亦作臣有所聞令其察訪俟一有實據容臣恭摺具奏臣受皇上髙厚隆恩兼轄山左稽查地方是臣專責敢不留心訪察使不肖之輩洗心革面均為聖世良民緣係奉㫖事理理合先行覆奏仰祈睿鑒謹奏前㫖有云斯言非出自無稽宵小之口今其人巳故何妨明諭卿知但仍須密之勿令匪類結怨於地下之人此事從前乃何世璂所奏因本籍山左所以知之甚確何世璂為人老成端方斷不至有誣陷欺罔以伸報復之理徐徐詳加察訪不可委託多人聞此族類為匪巳久自前明迄今世代相承踪跡巧而且密泛泛訪詢萬難探其脈絡倘若覺卿察訪又加一番詭祕斂跡深藏則更無從發擲矣然非急務惟宜緩圖同日又奏為車騎兵丁起程日期仰祈睿鑒事竊查車騎兵丁一案於雍正七年三月十七日接准部咨經臣將辦理事宜逐一摺奏欽奉硃批交怡親王等議覆有㫖諸凡事宜總俟部文到日遵照奉行欽此臣節奉部咨逐一遵照敬謹料理兹於四月二十四日經臣將車騎兵丁在省城再加驗看親自查㸃凡器械旗幟衣甲壯帽行裝等項無不齊全足用此皆仰賴我皇上不惜帑金富足給與是以諸務畢僃軍容整肅而將僃千把兵丁等俱䝉皇上隆恩疊沛厚澤頻頒官辨賞以二年之俸薪兵丁賞以額外之銀兩路費另給沿途之需用咸周行裝畢僃家口之養贍並足是以各營兵丁感激天恩親詣臣轅紛紛遞呈并據鎮標呈懇題謝臣又將皇上愛養辨兵恩施無巳之聖意宣布曉諭俱各踴躍歡呼於四月二十六日陸續起程訖臣又飛檄沿途州縣出示曉諭客店買賣人等多僃食物照常生理不得髙擡時價以便兵丁分隊住宿購買無缺又嚴飭管押將辨約束兵丁亦不得絲毫擾纍百姓復委員沿路稽查現據禀報兵民安帖行住肅然除辨兵恭謝天恩臣現在繕本代題外所有兵丁起程日期理合恭奏其東省車騎兵丁起程日期據署撫臣嶽濬咨稱於五月初六日自省陸續起程合併奏聞謹奏據奏車騎兵丁業俱起程途間行住安帖甚好知道了同日又奏為欽奉諭㫖委員確勘道路事雍正七年四月二十九日奉到怡親王暨大學士等公札內開雍正七年四月初七日奉上諭山東為南北通衢自德州劉智廟以至紅花埠驛幾及千里厯年以來輪蹄踐壓致蕩平大道漸成溝塹其津澗橋梁亦多傾圯一遇夏秋之交山水偶發行人坐守時日而窪潦之區積潦成河旅客苦於渡涉朕心深為軫念但此通行之路巳久成低下勢難培築增髙若於大道之旁擇髙阜之處另開一道似屬有益前巳降諭㫖令工部侍郎法保等於今年夏秋之交自京師起程由直隸至江南陸路大道沿途踏勘但非地方官先為詳看恐未能詳察情形爾等可寄字與田文鏡著先即遴委賢員將山東境內南北經行之路相度地勢别開新道其有借用民田者照原價補還銀兩仍豁除糧賦其有繞行之處與舊道相逺者至頓宿之地仍應引歸以便行客投宿旅店至有應建橋梁及應疏濬水道之處詳悉踏勘俟法保等來㑹同商酌繪圖呈覽估計具奏欽此欽遵臣伏思南北大路乃旅客往來之所自應地方大吏平日飭令屬員不時查勘遇有低下之處相機料理或培築增髙或另開新道津澗橋梁應否修建疏濬均應查勘如需費無多捐資修理倘需用浩繁奏請動用公項修治乃臣並未預籌致上煩聖慮臣忝任封疆曷勝惶悚兹䝉皇上不加譴責著臣遴委賢員詳悉踏勘臣查新經調補登萊青道孫蘭芬幹練勤謹隨委其速至東省詳悉查勘并將欽奉諭㫖內事理逐一指示令其細加踏勘繪圖估計具報俟欽差至日㑹同定議具奏臣又諭孫蘭芬遇有舊路平正可以修理無庸另開者亦須敬謹斟酌明白聲說以便查核奏請除㫖委勘人員理合先行覆奏伏乞聖鑒謹奏平治南北通衢地連數省非一府一州汝等督撫所能專擅之事何惶悚之有俟秋間欽差到來㑹同詳議具奏可也同日又奏為遵㫖斟酌東省耗羡據實覆奏事雍正七年二月二十一日據山東署撫臣嶽濬札內開經手耗羡收支存貯各款逐一繕册具奏恭請聖裁欽奉硃批諭㫖命嶽濬與臣斟酌料理又巡撫衙門支耗各條復奉硃批亦與臣商酌欽此臣查歸公耗羡動關國帑凡有公務必須斟酌咸宜奏請睿裁然後動用今據嶽濬原冊內有未經奏明但據屬員詳請巡撫竟批司支給者有奏明動用正項經部議核減而巡撫仍將公項補給者有地方細微之事而亦動用公項者臣思地方公務果當辦理自應奏請皇上至聖至明無不俞允若擅行支給將來必有不當用而用者各屬混行詳請巡撫擅為批給使庫帑任意花銷其風殊不可長且不肖官員倘有侵那虧空將來上下交通即可借此掩飾亦未可定此未經奏明而擅行批給之不可也至於動用錢糧最嚴浮冒如果無浮冒難以核減自可據實覆部如果有浮冒自應核減豈可以正項核減仍以公項補給是名減而實不減在朝廷何必居此核減之名部臣又何必有此核減之議此既經部議核減正項而仍將公項補給之不可也若夫地方遇有公事如果需用浩繁自應奏請動支耗羡若事屬細微需費無多地方大小各官即可量行捐給乃毫釐必動用公項殊為未協且此項支用若不奏聞則為擅給必一一奏聞又覺煩瑣此亦臣愚之所為不可者也冊內款項甚多臣不敢逐一瑣陳惟擇其大略則不越乎三者臣謹據巳見條析如左至於巡撫衙門應支耗羡各條臣亦敬謹商酌應取用者自應取用以仰副我皇上軫念臣工委曲詳盡之聖意臣業將東省耗羡冊逐條粘簽何者應用何者不應用或照豫省之例以期畫一或仍東省之例量行料理於三月二十一日移送山東署撫臣嶽濬在案所有遵㫖斟酌料理事宜理合據實恭奏為此謹奏所議俱屬是當之極嘉悅覽焉同日又奏為聖恩髙厚難名微臣感激無地恭辭增給養廉仰懇俯准事雍正七年四月二十四日准山東署撫臣嶽濬咨內開臣總督山東事務繁劇兼以統轄武辨時有賞勞之需請㫖添給臣養廉銀一萬兩欽奉硃批諭㫖是欽此等因到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣起家寒微忝叨豢養廪祿虛糜涓埃莫效此臣所夙夜疚心刻不自安者也今署撫臣嶽濬請於山東耗羡項下添給臣養廉銀一萬兩在嶽濬因臣硜執不使臣知而我皇上體下恩隆遂賜允准臣聞命之下悚惶無地但臣在豫省每年於司庫耗羡內支領養廉銀二萬八千九百餘兩實屬俯仰從容公私給足今雖事兼兩省而家口猶是食用猶是即偶有犒勞儘足敷用兹東省此項若欽遵祗領則臣之受賜倍多而臣之抱歉倍深且臣䝉皇上天恩實逾常格果若資用不敷即當自行懇請焉敢復於天地父母之前稍存矯激欺飾之念臣除現在咨覆嶽濬毋庸飭司支給外謹當繕摺恭辭伏乞皇上俯賜允准庶微臣犬馬之心得以稍安而聖主體恤之恩益難名言矣抑臣更有請者豫省各州縣自雍正六年䝉皇上天恩加給養廉巳為優裕惟查豫省糧儲道每年養廉銀三千二百餘兩管河道每年養廉銀二千八百餘兩河北道每年養廉銀三千兩南汝道每年養廉銀二千八百餘兩但各道有巡厯地方盤查倉庫㸃驗驛馬閲視堤工之責道路往來時有所費所支養廉似缺寬裕是以臣前與署撫臣嶽濬酌議東省各官養廉每道俱議給四千兩荷䝉皇上允准在案臣不揣冒昧敢乞皇上將豫省各道於現給養廉外每員每年加給一千兩請於雍正七年為始在司庫耗羡內按季支給則各道均沭天恩於無既矣是否允協臣未敢擅便伏乞聖裁總之臣受皇上深恩無事不據實直陳在臣之養廉既屬有餘不敢不辭在各道之養廉既有不足不敢不請是以繕摺具奏仰祈睿鑒為此謹奏嶽濬初次議奏東省各官養廉時朕命與卿商酌而不令言及加卿養廉者蓋為卿不便自議自加也此番添給之議實奉朕命而非出於嶽濬之意何乃如是堅辭耶卿其再行酌量若領受此項於諸凡用度寬裕從容則不必過辭以蹈矯廉之迹再者因見前摺所議東省道員養廉多於豫省正欲遇便詢明今奏請加給豫省各道甚屬允協況朕從前曽經有諭耗羡既饒不須儲蓄盈溢當議增屬員養廉此請與前㫖相符照數加給可也至於府州縣各員未知較東省多寡若何亦應籌酌畫一務俾相去不遠方為均平得當雍正七年五月初十日河東總督臣田文鏡謹奏為恭報豫省二麥收成分數并河東兩省得雨日期仰祈睿鑒事竊查雍正七年四月二十六七八等日豫省各屬得雨分寸暨二麥刈穫緣由經臣兩次恭摺奏聞兹二麥登場據開封等八府屬暨陳許等七州并所屬各報二麥收成自十分以至九分八分七分不等因各州縣間有沙土瘠地其收成稍次於平原沃壤各屬以該管通計故報有七八九分不等其實各屬平衍地畝實有十分收成再秋禾榖黍髙粱花豆等苗自四月二十六日得雨後於五月初四日又據各屬具報得雨入土二三四寸不等秋禾益加茂盛此皆仰賴我皇上至誠至敬感召天和是以二麥豐收盈寧共慶臣不勝歡忭之至再東省於四月二十二十一二及二十六七八等日據各屬具報得雨入土三四五六寸不等其二麥秋禾情形臣詢東省往來之人僉云秋禾暢茂二麥結實甚好其收成分數俟報到日容臣另摺恭奏外所有豫省二麥收成分數并河東兩省得雨日期理合繕摺具奏仰慰聖懷謹奏覽豫省二麥收成分數并兩省得雨日期朕懷曷勝欣慰初聞河北地方膏澤稍缺頗深憂慮豈料麥秋收穫如是耶朕意分數即較此略減亦係極好消息何則豫屬疊見豐熟準之天地循環之理太過須防不及今嵗些微少缺方與周易損益盈虛之道不相違悖來年又可希冀盈寧也同日又奏為奏聞事竊惟我國家統一寰區聲教廣被是以萬邦向化重譯來朝我皇上優待逺人體恤僃至一切夫馬船隻令各省給以勘合應付於柔逺之道至矣極矣今臣訪聞得暹羅國貢使四員自廣東由山東赴京進貢廣東省給發勘合差順德縣巡檢陳圭伴送於本年四月十七日進山東滕縣界四月二十七日在東平州逗留三日始行聞其勘合二道共夫二百六十四名馬二十八匹今經過州縣先有傳單一紙傳知前站用夫二百五十名較勘合少十四名馬四十匹較勘合多十二匹額外用車二十五輛又每站需索上席四桌下席十桌前站三人銀三兩象奴三人銀三兩二錢等費臣念逺使感荷聖化輸誠進貢所至之處自必奉法惟謹今於勘合之外多索車輛酒席等項在貢使遠人何由而知此皆通事及伴送人員等借名需索擾纍地方者也臣忝任封疆既有所聞不敢不據實奏聞為此謹奏察漕御史旋京業據奏聞即命其具疏糾參矣續接此奏嘉悅覽之舉凡外任大臣人人咸肯如此據實入告則凡無知妄為之輩莫不屏氣斂迹孰敢肆行無忌耶候另有諭㫖雍正七年五月二十一日河東總督臣田文鏡謹奏為恭報東省二麥收成分數仰祈睿鑒事竊查雍正七年五月初十日經臣將豫省二麥收成分數恭奏在案兹據東省各屬具報現今二麥俱巳登場其收成分數自十分九分以至八分七分不等理合據實恭奏仰慰聖懷惟據青州府安邱縣報稱五月初七日雷雨近城地方下有冰雹二麥秋苗有無被損現在確查另文申報等語其被雹地方寬長若干未據聲明臣當即檄行布政司委員速行確查詳報外合先奏聞但臣思此時二麥刈穫居多諒無妨礙即秋禾或有被損尚可再為播種俟確報到日另摺恭奏再豫省於五月十七八九等日據開封衛輝彰德陳州各屬俱報得雨入土三四寸四五寸不等相應一併奏聞伏乞聖鑒謹奏今嵗直隸各省雖不為旱大都雨水缺足從來物極必反春末夏初既苦恆暘夏末秋初或恐霖潦不免也一切河工隄岸之防護俱當綢繆於早加倍慎重將朕此諭轉傳河臣嵇曽筠暨大小河員悉令知之同日又奏為欽奉上諭事雍正七年五月初六日據提塘官黃震齎到內閣大學士移㑹內開雍正七年三月二十四日內閣奉㫖所有頒發上諭每省應發若干爾等酌量頒發令該督撫將軍提鎮等轉飭各屬廣行宣布務使窮鄉僻壤家喻戶曉欽此欽遵等因計頒發到臣一本河道總督一本副總河一本學政一本河北南陽總兵各一本布政司一本樣本二本按察司一本臣隨躬率在城文武各員出郊跪迎至署恭設香案望闕叩頭宣讀訖竊惟君臣者天地之常經忠孝者生人之大義我朝自太祖太宗世祖聖祖積德纍功久安長治我皇上克紹鴻基龍飛御極天心協應疊見嘉祥凡含生之類負氣之倫莫不尊君親上共遊於光天化日之下矣不意有大逆不道如曽靜等者背理逆天造言侮聖肆為誣謗之詞極其悖逆之語狼嘷犬吠實何異是即寸磔以謝天下猶不足以泄神人之憤快臣庶之心乃我皇上本覆載之公行神聖之事光明正大日月莫踰至孝純忠天祖共鑒薄海內外固無不共見共聞共知共信今䝉皇上頒發聖諭布告天下煌煌天語揭至公無我之心洋洋聖謨昭地負海涵之量惟是臣跪讀之下實不禁切齒痛心眥裂髮指恨弗食其肉而寢其皮也謹將頒到上諭十本隨即分發各衙門并飭令布政司照式刋刻廣行宣布則凡逆賊輩之居心行事在窮鄉僻壤平日之未克周知者莫不家喻戶曉斯綱常之大義以伸而普天之公憤亦泄矣所有奉到緣由理合繕摺恭奏伏乞聖鑒謹奏既遇此種怪物不得不有一番出竒料理傾耳以聽可也同日又奏為豫省辦理車騎事宜動用耗羡銀兩據實奏明仰祈睿鑒事竊照車騎兵丁一案臣節奉部咨逐一遵照料理於雍正七年五月初四日經臣將兵丁起程日期恭奏在案至辦理各項動用銀兩之處臣查前後部文有行令在藩庫銀兩內動支者有行令在公項內給發者臣伏思正項錢糧與公項銀兩均屬朝廷庫帑而前後動用銀兩同為一案是以臣飭令布政司一併在於公項內動支給發除將動用細數造冊送部外所有車騎案內辦理各項并動用雍正七年分貯庫耗羡銀兩數目臣謹條析另摺恭奏伏乞聖鑒謹奏仍照原議賞賜兵丁銀兩支給將辨俸薪皆動用正項錢糧其將辨至京路費暨製造棉甲備辦行裝雇騾等務俱動用公項銀兩如此方與他省畫一雖云均係庫帑其實大有不同遵㫖行毋違同日又奏為恭報動存耗羡銀兩數目仰祈聖鑒事竊查豫省自雍正二年起至雍正五年所有收過各年耗羡銀兩并動支數目業經臣節次恭摺奏聞兹據署布政使謝旻造冊詳報內開雍正六年分原貯司庫各年耗羡共銀五十萬四百二十一兩零又自雍正六年正月起至嵗底止新收過各年耗羡并歸還原款共銀二十六萬五千六百五十兩零新舊二項共銀七十六萬六千七十一兩零內除起解各部補平幫費等銀暨布政司詳明臣衙門存案動支過各官養廉并各項應需用銀共一十六萬二千六百五十八兩零實在貯存司庫各年新舊耗羡共銀六十萬三千四百一十二兩零所有雍正六年分貯存動支過新舊耗羡銀兩年款數目理合恭繕細摺一併據實奏聞仰祈聖鑒謹奏卿料理一應錢糧事件考核精明出納妥確朕實篤信無疑此奏不過閒覽耳應咨部者仍照例咨部存案備查同日又奏為欽奉聖訓據實覆奏事雍正七年五月十三日臣家人齎回臣恭報河東得雨日期摺內奉有硃批諭㫖仰見我皇上朝乾夕惕敬天勤民之念無時不存聖德髙深非臣愚所能仰窺萬一又䝉聖訓諄諄以敬誠垂誡臣跪讀之下感悚交集竊查豫省自本年三月十二日以後河北一帶稍缺雨澤然賴去冬以至今春二三月雨雪深透土膏滋潤雖覺缺雨實不為旱自四月二十六七八及五月初四等日通省各得大雨後現今二麥俱巳收穫訖臣遍加察訪委無失收之處臣恐上厪聖念隨經陸續恭皇上福庇河流循軌中泓刷深桃汛以來水勢平穩其聖懷至於敬誠之心刻不可懈滿假之念刻不可存臣益當謹志聖諭服膺勿失焉耳又於臣具奏濟東道張體仁摺內奉有硃批諭㫖伏念臣一介庸愚荷䝉聖恩總督河東察吏安民時刻在念是以偶有所知無不入告兹欽奉諭㫖遵當再為試看若夫豫省道員糧儲道張建德有辦漕之責管河道祝兆鵬河北道朱藻有河防之任南汝道缺業經臣奏請以登萊青道李英調補䝉皇上俞允在案均未便將張體仁調補且張體仁在東省亦係臣所轄惟有留心試看以仰副我皇上愛惜人材之聖意所有奉到原摺理合恭繳謹奏覽雍正七年六月十五日河東總督臣田文鏡謹奏為恭報河東兩省得雨日期仰祈睿鑒事竊查豫省開封衛輝彰德陳州各屬於五月十七八九等日得雨分寸經臣具摺恭奏兹據歸德河南懷慶南陽汝寧五府屬及光汝許禹鄭陕六州并所屬續報五月十七十八十九二十七二十九等日各得雨入土三四五寸不等兹於六月初二初六初七初八等日又據各屬具報得雨入土七八寸盈尺不等臣於六月十一日親至郊外閲視禾苗查看得髙粱髙有八九尺不等榖黍髙有二三尺不等俱有吐穗者其芝麻花豆等苗髙有七八寸及尺餘不等均極暢茂晚禾播種之後髙出地上亦有五六寸不等兼之連得時雨土膏滋潤臣又遍諭農人宣揚聖德勸令勤加耘耔百姓感戴皇恩歡呼載道臣職任封疆雖心為慶幸亦不敢預為卜度惟有欽遵訓㫖必敬必誠以待至秋成焉耳再東省於五月初七初八十七十八十九等日據各屬具報得雨入土三四五寸不等其六月初旬得雨俟報齊日容臣另摺恭奏外所有河東兩省得雨日期理合繕摺奏聞仰慰聖懷為此謹奏覽奏河東雨澤情形朕深為慰悅然天工人事更變莫測秋成尚早何敢預必敬誠以待四字時刻在念而已同日又奏為公項動款既繁內部冊檔宜僃謹擬一併造冊報部以重庫帑仰祈聖裁事竊查豫省錢糧耗羡一項自雍正二年起至雍正六年嵗底計此五年之內動用耗羡各款有經前撫臣石文焯及臣奏明嵗有常額者有經臣隨事斟酌臨時奏請者有事屬瑣屑不敢屢瀆聖聰彚於嵗底奏聞者但厯年動用各款惟事經內部者於事竣後將動用之數咨部僃案其餘槩未咨部止於嵗底奏報動用存留摺內一併奏聞臣伏思司庫公項銀兩即與國帑無殊在我皇上覆載為量諭令不必奏銷而臣子經理其事不可不與國帑同其慎重况同一動用公項而有咨部不咨部之分則事不畫一且存庫之數嵗有所增動用之款嵗無一定為經久之計杜侵混之弊不可不使內外均有檔案以僃稽查也臣愚以為應將雍正二年起至雍正六年嵗底動用及存庫耗羡銀兩挨年分款彚造一冊咨部僃案其自雍正七年起凡有臨時辦理公務奏請允准動用耗羡者即於奉㫖後隨事咨部其餘統於嵗底繕造四柱冊摺一面具奏一面報部庶巳用之銀兩內外有案可稽而現存之庫帑絲毫不致侵冒倘䝉皇上俞允其東省動用公項銀兩臣擬知㑹山東署巡撫布政使臣費金吾亦照豫省而行再歷年動用款項甚繁難於逐條聲說臣擬於冊首開列奏明動用字樣其下止開某項銀若干而不僃叙其事由又據署布政使謝旻亦詳臣將動用耗羡奏請報部僃案與臣所見相同合併聲明是否允協伏候聖裁為此謹奏籌思及此可謂詳慎之至造冊報部時雖云項款繁雜難於逐條聲說亦必將所以奏准原由咨明方好不然該部未免以違例駁議也同日又奏為遵㫖密奏仰祈聖鑒事竊照社倉積榖一項數年以來臣時時勸諭各屬各屬無不凛遵成法勸諭樂輸士民無强派之事官吏無侵蝕之弊法良意美行之有年自臣總督河東并飭令東省俱照豫省之法積榖貯倉以仰副我皇上軫念民生之聖意而豫省又仰賴我皇上感召天和豐登屢慶是以勸捐之數日增榖石之數日積陳陳相因倉庾充足經臣於每年將社倉實貯數目逐一奏聞在案除舊管雍正五年分共捐貯榖麥豆一十五萬四千三百七十三石零今據布政使謝旻查據開封等八府屬汝陳等七州并所屬彚報雍正六年分新收捐榖一萬九千三百四十七石零豆一百一十四石零蕎麥九十一石零茭草籽一十二石零稻榖二石五斗零息榖三千三百九十石零盈餘榖四百七石零以上共二萬三千三百六十七石零實在新舊二項貯倉共一十七萬七千七百四十石零臣并檄行各屬轉飭各州縣正副社長加謹收貯仍飭地方官不時稽查在案至雍正七年秋收後勸捐榖石俟有成數容臣查明再行繕摺奏聞所有雍正六年分各屬實在捐貯社倉新舊榖石理合恭摺密奏仰祈聖鑒謹奏嘉悅覽焉社倉一事料理最難妥協宜詳慎為之同日又奏為恭報黃河水汛平穩仰慰聖懷事竊查豫省黃河此時正當伏汛臣於本年五月二十九日據陕西寧夏府知府鈕廷彩報稱五月十九日寧夏水長二尺有餘等因到臣臣即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫等無分風雨晝夜嚴加守護巡防臣復另委千把員辨不時來往嚴加稽查隨據管河道祝兆鵬河北道朱藻陸續具報於六月初二日黃河水長二尺當即消落一尺初四日沁河水長二尺初六日黃河水長三尺初七日黃河水落一尺四寸初九日黃河水落二尺沁河水落一尺十一日黃河水長二尺九寸十三日水落一尺五寸河岸髙出水面三四尺不等並未出槽堤掃工程俱各平穩等語臣查向來寧夏水長最易泛漲近年中泓刷深各處支河槩行堵築河汛循軌水未出槽此皆仰賴我皇上敬祀百神誠通上帝是以河流安瀾堤掃鞏固臣不勝踴躍歡忭之至所有水勢長落河汛平穩情形理合繕摺奏聞仰慰聖懷謹奏惟加勉敬慎以仰冀上天垂佑至霜降後方敢言一嵗河工事竣也同日又奏為據詳代奏恭謝天恩事竊查豫省各道荷䝉聖恩添給養廉銀一千兩臣欽遵諭㫖當即行知各道去後嗣據糧儲道張建德南汝道今調登萊青道孫蘭芬管河道祝兆鵬河北道朱藻㑹詳呈稱竊建德等前䝉皇恩優渥賞給養廉廪祿虛糜曠官滋懼兹復䝉皇上俯恤道員有加無已增養廉於常數之外沛殊恩於重祿之中賞賚自天感激無地惟有益殫臣心益竭臣力以仰報天恩於萬一耳為此具詳公懇代奏前來臣查道員無題謝之例但各道感激天恩臣不敢壅於上聞是以據詳繕摺代奏伏乞聖鑒謹奏覽代奏情節知道了當向伊等傳㫖云古之人正其誼不謀其利明其道不計其功若於賞賚時而始言感激圖報則落第二義矣但盡臣節所當為何論君恩之薄厚能秉此心以往自無不䝉上蒼照察果於冥默中獲邀神明錫佑勝朕賞賚奚啻什伯相倍耶諭令於斯奮勉為是同日又奏為欽奉聖訓據實覆奏事竊臣齎摺家人捧回臣恭辭增給養廉摺內奉有硃批諭㫖仰見我皇上恩待臣工有加無巳臣跪讀之下感激涕零伏念臣豫省養廉巳䝉恩賞過厚支用裕如是以前見署撫臣嶽濬咨㑹議加臣之養廉臣即備陳微悃恭摺奏辭兹伏讀聖諭始知加臣養廉出自天心臣何人斯而䝉皇上體恤之深寵遇之厚一至於此但臣支領養廉銀二萬八千九百餘兩除兩省用度外每年尚有盈餘存貯臣犬馬餘年受恩深重不敢以皇上之帑金恣意費用又何敢於支用富足之外再領天恩於無既矣再府州縣養廉又䝉皇上垂念令與東省畫一臣查豫省與東省府州縣養廉多寡原相去不逺惟東省州縣於養廉之外按正銀一兩扣留耗羡一分以為公費之用此則豫省所無者今䝉皇上推恩逮下一視同仁臣敢不仰體聖心再加斟酌查各州縣錢糧多寡不一地方衝僻不同至於公務之繁簡則全視乎地方之衝僻而不係乎錢糧之多寡臣謹按地方繁簡分别大中小等則奏請酌給公費查豫省每年實徴銀三百一十四萬五千一百五兩零以每兩一分扣算共銀三萬一千四百五十兩零今擬直隸州七州每州給銀三百兩大州縣四十一處每處給銀二百四十兩中縣四十九處每處給銀二百兩小州縣十一處每處給銀一百八十兩共銀二萬三千七百二十兩尚餘銀七千七百三十兩臣又查得各司府首領官及各州縣巡檢居常有薪水之需差遣有腳力之費臣今仰體皇仁擬將前項所餘銀兩酌量分給司府首領官巡檢為養廉之需俾微末小臣均沾聖澤查豫省司府首領官共十四員每員給銀一百兩經管地方之巡檢共六員每員給銀八十兩二項共銀一千八百八十兩以上公費并養廉銀共二萬五千六百兩行令各州縣仍解司庫按季給發所餘銀兩仍貯司庫以充公用臣欽遵聖訓斟酌資而微員末吏無不踴躍鼓舞共戴生成於億萬世矣至東省各州縣扣留之公費銀一分伏候奉㫖允准之後臣并咨㑹山東署撫臣費金吾照豫省分聖裁再臣密覆山東濱州董姓一摺伏讀諭㫖仰見聞為此謹奏覽同日又奏為欽奉聖訓據實覆奏事竊臣齎摺家人捧回臣恭報豫省二麥收成分數一摺奉有硃批諭㫖仰見我皇上聖德髙深天人一貫感應之機既默契乎天心盈虛之理復洞徹於睿慮臣跪讀之下頓啓愚䝉乃知大聖人敬謹以事天精深以察理廣大淵微非臣愚所能窺見萬一惟有欽遵聖訓敬誠以待以期無負皇上指誨之至意耳為此謹奏朕於人事紛紜殊茫然莫究其涯涘惟於天理昭灼實確乎見透於隱微天人交感之機何異影之隨形響之應聲其間幾曽有毫釐差忒耶硃批諭㫖卷一百二十六之十六欽定四庫全書硃批諭㫖卷一百二十六之十七硃批田文鏡奏摺雍正七年七月初四日河東總督臣田文鏡謹奏為恭報黃河水汛平穩仰慰聖懷事本年六月二十六日據陕西寧夏府知府鈕廷彩報稱六月十四日寧夏水長二尺有餘等因到臣臣當即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫等無分風雨晝夜嚴加防守臣復另委千把員辨往來稽查隨據管河道祝兆鵬河北道朱藻陸續具報沁河於二十八日水長二尺黃河於二十八日卯時起至二十九日寅時水長二尺八寸並未出槽惟祥符縣程家寨水長至六尺一寸其孫家莊卑窪處所水與民堤相並風浪相激即漫越民堤之上當即取土加堰並未流至大堤隨於是日辰時水即減退至三十日寅時水俱消落一切堤掃工程俱各平穩等語臣即飛檄管河道將孫家莊民堤有漫越之處立即加土培髙仍飭在工官辨加謹巡防相機料理毋得疏懈所有水勢長落河汛平穩情形理合繕摺奏聞仰慰聖懷謹奏覽沁黃消退堤掃平穩等語慰念二字朕竟不能落筆直待霜降水涸方敢釋懷耳敬之慎之同日又奏為欽奉上諭分析奏明河東二麥收成分數仰祈睿鑒事雍正七年六月二十二日接到大學士臣馬爾賽張廷玉蔣廷錫寄字內開本年六月初六日奉上諭向來各省督撫奏報年嵗收成皆云幾分至幾分不等似此未曽分析清楚未免朦混嗣後可細加分别一府之中如九分者居十之幾八分者居十之幾照此類推據實奏報則朕可以詳悉收成之分數爾等可密寄信與各省督撫知之欽此仰見我皇上旰食宵衣疇咨民隱年榖收成動關聖念伏查河南開封府一十四屬俱報十分收成歸德府九屬俱報十分收成彰德府七屬報十分者十之四報九分者十之三報八分者十之三衛輝府八屬報八分者十之六報七分者十之四懷慶府七屬報八分者十之六報七分者十之四河南府十一屬報十分者十之八報九分者十之二南陽府十二屬俱報十分收成汝寧府九屬俱報十分收成汝州共五屬俱報九分收成陳州共五屬報十分者十之八報九分者十之二許州共五屬報九分者十之八報八分者十之二禹州共三屬俱報十分收成光州共五屬俱報十分收成鄭州共五屬俱報八分收成陕州共三屬俱報九分收成此豫省二麥收成分數之次第也再查山東冊開濟南府一十八屬報十分者十之二報九分者十之三報八分者十之四報七分者十之一兗州府一十七屬報十分者十之二報九分者十之二報八分者十之四報七分者十之二東昌府一十八屬報九分者十之四報八分者十之六青州府一十四屬報十分者十之一報九分者十之二報八分者十之六報七分者十之一萊州府七屬俱報十分收成登州府八屬俱報九分收成泰安州共四屬俱報九分收成武定州共四屬報九分者十之八報八分者十之二濱州共四屬報八分者十之七報七分者十之三曹州共三屬俱報九分收成濟寧州共四屬俱報八分收成沂州共三屬俱報八分收成其十衛三所報八分者十之五報七分者十之五此東省二麥收成分數之次第也臣欽遵諭㫖謹將雍正七年分河東二麥收成分數逐一分析奏聞伏乞聖鑒為此謹奏覽奏曷勝欣悅未料豫省麥秋如此豐稔也即東省收成亦為向所罕聞斯乃上天眷顧我君臣而加惠於黎元至優極渥當朝夕焚香答謝益勵修巳治人之術耳期共勉之同日又奏為欽奉上諭據實奏明事雍正七年五月初一日准兵部咨為欽奉上諭賞給河南督標兵銀四千兩運用生息以僃兵丁吉凶之費等因到臣臣當即行令布政司移㑹臣標中軍副將查議去後嗣據布政使謝旻中軍副將王來祜㑹詳呈稱兵丁生息銀兩必須料理妥協委用得人方不負朝廷惠濟兵丁之特典請就近發給祥符縣當商十五家代運生息向來各鋪贖當照例三分起息今議扣除利銀一分為當商紙筆工食之費令其長年按照二分起利繳貯祥符縣庫遇有營兵吉凶需用該營具詳報明移縣關領仍於嵗底將出入之數造冊報部各商無不情願均勻分領取有領狀連環互保具詳前來臣伏念臣標兵丁荷䝉皇上天恩賞銀四千兩生息資用以濟吉凶之費自應仰體聖心妥協辦理俾利源生生不息以副我皇上優恤兵丁至意臣思此項銀兩運用不得其道有滋擾之弊委任不得其人有虧缺之虞惟當商係殷實富户其業又屬便民官無營運之勞兵獲生息之利臣再四斟酌似屬妥便臣是以令布政司動支正項銀四千兩分給各店仍令祥符縣查察各商不許借官銀名色額外取利臣并移咨山東署撫臣布政使費金吾在案所有遵㫖賞給兵丁生息銀兩酌量料理之處理合據實奏明謹奏據奏欲將此項銀兩分給當店代兵營運未嘗不是但既恐纍商又恐商人偶有事故或致兵丁弗獲實惠所料理處朕尚不深以為然同日又奏為奏聞事竊查藩臬兩司為通省錢榖刑名之總滙庶務殷繁責任重大我皇上特加簡拔務期承流宣化弼教明刑克稱其職以上佐聖治臣仰體天心時加勉勵留心體察查河南署布政使謝旻自雍正六年七月初五日到任迄今一載實心任事正己率屬勤於督課嚴於察吏凡地方事務辦理精詳蓋該司本具明敏之才而又能鋭志向上者也臣近在同城察試既確是以據實繕摺奏聞伏乞聖鑒謹奏謝旻乃出格聰明大有本領人但嫌其缺篤實耳以卿實心辧事之督臣為其上官而又現被朕恩眷最隆伊思己身之優劣臧否定於卿之一言若因此而暫勉一是字與卿看則離卿獨任時必不能堅持初志毫無改移也於斯須詳加體驗方得真情平居共事當不時朂誡勉其弗及匡其不逮以成全之朕深重其人而不能無疑命伊署理豫藩原令隨卿辦事知所倣效也此意曽面諭伊其再加確試具奏以聞同日又奏為請定交榖交馬之例以杜掯折以肅交代事竊照州縣官新舊交代凡倉庫錢糧驛馬等項自應據實查盤秉公授受在上司不得徇庇前官抑勒交代在後官不得掯勒前任挾詐行私斯於理為至當於法為得平臣謹􅈬倉榖驛馬兩項為我皇上敬陳之夫倉榖上關國儲顆粒為重若黴爛紅朽糠粃不堪接任官當據實詳報揭參著落前官追賠其實在存倉好榖即應照數盤收依限出結若不問榖之髙下概稱搧揚巳非至當之論使果從公搧揚設有不足令前官買補交倉猶曰為倉儲起見今不過借搧揚之名以刁難而其意在於私議幫貼究之榖未嘗搧亦未嘗補而銀則後官肥己臣愚以為存此搧揚之名以滋弊端不若核定得米之數以清交代伏查稻榖粒大而殼厚每榖一石碾米五斗即屬好穀粟榖粒細而殼薄新穀一石碾米有至六斗餘者其倉榖存貯日久碾米糠粞較多至五斗六七升者即屬好榖臣請以倉榖每石碾米五斗七升為率嗣後河東兩省交代倉榖先驗榖色如非黴爛紅朽即於各倉抽取碾米試驗如榖一石碾米果有五斗七升即行盤收如不足五斗七升按所少之數訃算詳明上司著落前官買補無許私折若接任官借端勒掯從重參處其或碾米不足定數彼此私議折價前後官一併參革究擬如此庶接任官不敢存私掯勒交代易清而榖石核米交盤無所假借似於倉儲亦有裨益也至於驛馬定例州縣交代委員督同新舊官從公查驗分别退收如有瘦老殘疾不堪應差者自應退還前官著落賠補其非殘疾老病瘦損實堪應差之馬當從公驗收斯為慎重驛遞若任意去取使監收之員不敢參酌可否而將實堪應差之馬挑回不收勒令前官每匹交銀十二三兩猶稱不敷及交明馬價又言驛馬應差甚急交價一時難買而以四五兩一匹賤買其原馬以應差而將餘銀入己不但挾詐交接殊缺公當而於驛遞亦恐漸滋弊竇臣請嗣後交代驛馬若後官挾私刁掯將實堪應差之馬故意不收希圖折價肥已仍賤買其原馬聽前官同監收官詳報該管上司另委公正之員確加查驗如詐掯是實將後官嚴參照溺職例革職倘監收官偏袒捏詳亦一併參處其或馬匹果有老病缺額應補而前官或係病故或因别案參革審擬呼應不靈無人可託不能買馬補交者應以十二兩為定價交與後官買馬應差仍詳該管上司委員查明取結庶驛馬無私折之弊而交代亦得其平矣臣為肅清交代起見謬陳末議是否有當伏候聖裁為此謹奏舉凡類斯新舊兩相授受之事斷難一以法齊要在居上位者調劑適中耳近日以來直省交代掯勒之弊不時上聞然雖知其弊亦竟無可如何掯不承接固屬刁難勒令收受抑豈公平全賴卿等督撫大吏於未交代前推誠訓誡正交代時留心察訪巳交代後揆情酌理務俾不致於偏即此可以驗知該員之居心立行也朕謂前任如果事事清白後任豈皆人人苛刻今接受之干係既重又不令暢意查盤而責成其將來不致虧缺則無米之炊何從施巧殊非公論至於碾米驗榖一說似乎有理然各厫米色畫一者少碾驗之舉聽舊任為政耶將新任是從耶如新任是從惟撿下色付之碓磑則舊任之賠纍更不可數計矣若云仗委員秉公監收秉公之員豈可多得乎偏袒之議安保其無又驛馬一項其弊更難悉數於中聊摘一二端另行批諭總之交代案件無有定法可恃惟在隨時隨事合宜辦理庶得公平候朕發訓㫖一道通頒直省首申詐掯之戒兼遏苛刻之風或於卿等膺統轄重寄者不無少助云爾同日又奏為奏明事雍正六年七月十五日准户部咨為山西濫支耗羡一案經晉省撫臣覺羅石麟具題應著落前任巡撫及前任布政司各名下分賠內開臣前署山西布政司任內應賠交代部費等項銀共該賠銀六千二百四十二兩零以文到一年內將應賠銀兩照數完解晉省等因到臣臣思前項銀兩雖准部咨行令解交晉省還項但臣查雍正六年六月內奉有諭㫖各省藩庫均屬國家公帑原無區别嗣後有行旗行籍追補之項該員交納之時即於本省布政司衙門交納布政司收明貯庫欽此欽遵在案是此項賠補銀兩似可比例就近解交豫省藩庫以省運送之煩臣䝉皇上天恩每年賞給養廉銀兩用度有餘今將前項應賠銀六千二百四十二兩零於雍正七年六月二十七日照數扣存藩庫收貯除咨明户部及山西巡撫衙門外所有微臣賠補山西布政司任內銀兩及就近扣交藩庫緣由理合奏明為此謹奏自應就近扣交豫省藩庫為是所奏知道了同日又奏為奏請動用公項銀兩修理瀆廟仰祈睿鑒事竊惟江淮河濟是稱四瀆歷有廟祀載在祀典查南陽府屬桐柏縣為淮水發源之地向來建有廟宇以祀淮瀆之神伏遇我皇上御極以來敬天祀神於雍正元年十二月二十三日奉有恩詔凡嶽鎮四瀆廟宇傾頽者該地方奏明修葺欽此彼時桐柏神廟現屬完固是以未經議修兹據署布政使謝旻詳稱桐柏縣瀆神廟所有大殿捲棚東西兩廊鐘鼓二樓大門㦸門御香亭等處日來漸次塌卸據南陽府詳據桐柏縣將工料數目確估實需銀一千八十三兩零委無浮冒等情詳請修理前來臣伏念瀆神保障淮流有功運道民生今廟宇塌䣃自應修理臣當即委員查明確估一應工料實在需銀一千八十三兩零可否仰請聖恩在雍正七年分公項銀內照數動支給領委員監修擇日興工庶幾廟貌巍峩享祀不忒以彰聖朝崇德報功之大典伏候聖裁臣未敢擅便謹繕摺奏明仰祈睿鑒謹奏淮瀆正神廟宇傾頽理應修葺但既奏請興工當期煥然一新所估為數尚少卿酌量籌計再加增益可也雍正七年七月二十一日河東總督臣田文鏡謹奏為恭報河東兩省得雨日期仰祈睿鑒事竊查雍正七年七月初四日經臣將豫省七月初四日以前并東省六月二十四日以前兩省得雨日期分寸具摺恭奏兹據豫省闔屬具報七月初五初七初八十四十七等日各得雨入土二三四寸不等又據東省闔屬具報七月初一初四初八初九等日各得雨二三四寸不等臣查六七兩月雷雨時行誠如聖諭夏末秋初雨水過多絲毫不爽益信我皇上默契天心見透隱微實非臣愚所能仰窺萬一但目下雨水雖多於田禾並無干礙查秋禾早者漸次成熟晚者穗皆齊吐所有河東兩省得雨日期并秋禾情形理合恭摺奏聞為此謹奏覽河東雨澤優渥秋禾成熟情形朕懷為之深慰同日又奏為恭報黃河伏汛平穩仰慰聖懷事本年七月初七日據陕西寧夏府知府鈕廷彩報稱六月二十八日寧夏水長二尺有餘等因到臣臣當即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫等嚴加防守臣仍飭委千把總往來巡察嗣據管河道祝兆鵬河北道朱藻并各㕔汛員辨具報七月初八日黃河水長三尺沁河水長二尺二寸隨於初九初十十一等日水俱消落歸槽又於十七十八兩日黃河水長三尺一寸沁河水長四尺六寸隨於十八十九兩日水各消落三尺一切堤掃工程俱各平穩等語臣竊查伏汛以來黃沁二水雖長落靡常今伏汛巳逾堤工鞏固此皆仰賴我皇上慎重河防至誠至敬屢頒訓㫖指示周詳是以在工官辨無不敬謹防護始獲此安瀾之慶也所有伏汛平穩情形除㑹同總河臣嵇曽筠另疏題報外理合繕摺恭奏仰慰聖懷謹奏轉瞬即届秋汛督飭管河各員僃加敬慎防護可也同日又奏為奏明事竊照豫省解陜䭾馬准川陜督臣嶽鍾琪咨覆豫省所解馬三千匹俱經照數收明未曽言及馬匹疲瘦勞傷臣正在題報間接准部咨據大將軍嶽鍾琪奏稱豫省䭾馬疲瘦勞傷者十居四五除餧養無益者即將餘馬補換內有三臕以下馬一千二百三十三匹分給西安各標營兵丁抵補摘調空缺為明春䭾馬之需部議以上年五月行文今年三月起解沿途又有草料餧養何至疲瘦勞傷令臣查明具奏臣伏讀之下不勝悚懼惶惕竊念臣䝉皇上教養隆恩事無巨細悉敬謹辦理不敢茍且塞責矧我皇上命將出師以彰天討臣衰朽庸材未能披堅執鋭效力疆場而受國厚恩共勤王事之血誠實寢食不忘是以此項馬匹臣奉文之後即嚴飭加意餧養及臣因公前赴東省又復札致檄行至再至三今春起解之時臣又嚴加挑選擇其臕健者始行起解臣實惟恐辦理未協有負我皇上委任微臣之聖意又何敢以疲瘦勞傷之馬遠解充數也查臣標解馬一百三十四匹頭臕者十居九二臕者十居一北鎮解馬六百四十九匹頭臕者十居九二臕者十居一南鎮解馬六百一十匹頭臕者十居八二臕者十居二旗馬一千六百七匹頭臕者十居四二臕者十居四三臕者十居二此實臣同城守尉副都統臣阿里袞及在城文武官辨逐匹驗明交給委員起解者伊時臣驗旗馬臕雖少遜標鎮之馬實皆可供䭾載之用是以俱令解陕誠恐長途跋涉或致減臕故仍令各多帶餘馬以僃揀補兹查據各解官雖稱沿途俱帶馬乾銀兩買僃麩料加意飼餧因天晴路乾馬行塵起為灰土所唴而又道路﨑嶇到彼不免有膀緊口熱并減臕者俱將所帶餘馬補交並無疲瘦勞傷等語但豫省馬匹既經寧逺大將軍臣嶽鍾琪奏有三臕馬一千二百餘匹臣辦理未協之咎實為深重然使寧逺大將軍臣嶽鍾琪將疲瘦勞傷之處咨覆於臣臣又何敢上欺君父不早為自劾據實奏聞兹䝉聖恩浩蕩不即將臣治罪俯照部議令臣查明具奏更自局蹐無地除具本覆奏仰請皇上敕部將臣嚴加議處外所有豫省解馬緣由及微臣感悚私忱謹據實繕摺恭奏伏懇皇上睿鑒謹奏卿料理一切公務盡心弗懈原可確信嶽鍾琪承辦各項軍需秉公不刻朕更無疑據奏所解馬匹俱屬選擇臕健云云等語豫陕相距程途遙逺解送官役疏忽不慎致有疲乏以及暗中抵換之弊安保必無似此漫不體察循省遽露悻悻之意毋乃涉於尚氣乎卿等皆公忠體國為朕所倚任之大臣勿存毫髮彼此之念方是密摺分辨猶或庶幾具本奏請議處殊屬畫蛇添足多一番形迹外觀愈覺不雅矣同日又奏為遵㫖覆奏事竊查東省科場一切事宜現係布政使費金吾照例辦理但科場舊例巡撫為監臨布政為正提調今署撫臣嶽濬尚未回任則監臨係費金吾之責而正提調一官場中尤關緊要如分撥內簾外簾派定各所員役并㸃名編號印卷發卷以及㸃驗水菜親送主試供應領發題紙散給舉子飯菜等項或隨同監臨辦理或正提調親自經管費金吾既為監臨勢難兼任提調臣前覆奏費金吾署理撫印摺內䝉皇上硃批諭㫖臨期斟酌奏聞欽此今場期將届臣欽遵聖諭再四斟酌查山東各司道除照例按察使公元為正監試鹽法道唐綏祖為副監試濟東道張體仁為副提調外其兗寧道有河工之責登萊青道現委查勘道路俱不便入場料理惟糧道顧贄其辦漕事務尚在場後且係進士出身應令顧贄為正提調辦理闈內事宜但事關掄才大典理應署撫臣費金吾題明請㫖臣一面繕摺奏聞一面札致費金吾令其具題伏候聖裁緣係奉㫖命臣臨期斟酌具奏事理相應恭摺奏聞謹奏近經有㫖不令兩司入闈辦理場務其仰遵定例另行籌酌人員具奏以聞同日又奏為司庫存貯零星歸公銀兩據實奏明仰祈聖鑒事竊查豫省司庫向有零星歸公一項蓋因無項可歸即另貯司庫以充公用自康熙五十年起至雍正六年嵗底共歸公銀二千五十三兩零歷年除布政司詳明動用敬刋聖祖仁皇帝聖諭廣訓并每年欽奉上諭及修補學宫樂器置僃籩豆延請教師演習樂舞生一切聘儀供應盤費等項共動用銀五百二十兩零現存司庫銀一千五百三十二兩零臣伏思此項銀兩自應充作公用遇有似前項公事每年祈晴禱雨敬神酬神因公差遣員役量給盤費及現今修理錢局等項均係地方公務既有此項零星銀兩可以動用不必再動公項實為妥便臣前此雖因嵗無常額額無常數動用零星不敢瑣瑣煩瀆聖聰但臣伏思歸公銀兩既存司庫即屬國帑自應據實奏明仰請皇上將此項存為地方些小公事之用嗣後如有此等歸公銀兩亦令存貯司庫遇有動用布政司詳明俟臣批准支給於每年嵗底開造四柱清冊送臣衙門僃案謹將歷年歸公款項及現存銀兩細數逐條開列另具清單恭呈御覽謹奏足見慎重公項出納絲毫不茍知道了所請可行同日又奏為據實奏明仰祈聖裁事本年五月十六日據登州鎮總兵官臣萬際瑞呈稱車騎兵丁欽奉皇恩賞給安家銀二十兩又製僃行裝銀六兩誠恐各兵任情花銷故令各該營將僃代為製僃安東營都司鮑士錦將一應軍需毫不經目自火藥鉛子器械以及衣帽行李一無周僃以五十五人行李僅雇小車六輛沉重難行日行五十里等因請參前來臣思恩賞各兵安家銀兩應給各兵用度其應僃行裝等項臣於奉文之時即為酌定開單令各兵自僃俟辦完照單㸃驗蓋因所用油單衣帽等項如各兵向有製僃者即可省此銀兩聽其他用今該都司是否將銀兩侵蝕以致行裝不全未據聲明至車兵進京䭾載行李東省原議每兵十名給騾二頭按站給與腳價今雇車六輛是否該都司將腳價侵蝕抑係各兵朋雇亦未聲明臣不敢草率入告隨照㑹該鎮確查間又據山東布政使費金吾札開安東營都司鮑士錦代為車兵製僃行裝暗中賠補百餘金有車兵李蘭等七人素常刁悍疑該都司有扣剋之意四處揚言業囑安東營參將賀升將刁兵懲治各兵巳自省起程進京等語臣又密訪無異兹又據登鎮總兵官萬際瑞呈稱兵丁製辦行裝酌定開單令各營僃辦造冊送閲今據安東營冊開軍裝俱各齊全及至青州府㸃驗十無一二再查各營行李或係雇覓騾頭或係馬車䭾載惟該營所雇小車僅日行五十里查該營距亰程途幾及二千里計日必得四十天方可到京已出五月二十五日之限矣該都司於軍裝事宜並不留心雖無侵蝕之弊難免藐玩廢弛之咎等情復另揭請參前來臣查都司鮑士錦雖據鎮臣萬際瑞揭其藐玩軍需辦理未協但該都司並無侵蝕之弊而且墊用銀兩似非不留心辦理者至䭾載行李雖部文令雇覓騾驢然地有衝僻不同或本處無腳騾可雇則暫用小車以代俟到省另雇亦屬一時權宜並非貪贓壞法確有劣蹟難容者可比況據布政使費金吾言係刁兵李蘭等七人造言興謗又未便因此而即參都司以長刁風但既據鎮臣萬際瑞揭報到臣相應據實僃悉奏請皇上天恩可否免其參處洪恩出自聖裁臣不揣冒昧恭摺奏聞伏乞睿鑒謹奏覽奏都司鮑士錦並無侵蝕之弊辦理未協猶可原恕應免其參劾將曽經奏聞并所降諭㫖咨明萬際瑞令其知之同日又奏為據實奏明仰祈聖裁事竊照山東東平州民牛三花拉即牛見德在青萊二府屬諸城等州縣地方倡為三元㑹空字教名色誘哄愚民一案前經拏獲案犯徐秀等而牛三花拉逃走未獲經臣於雍正六年九月內將緣由恭摺奏聞并密行河東兩省嚴加訪拏在案迄今將及一載臣屢飭懸賞勒緝無如該犯潛遁無踪尚未就擒兹據兩司將現犯五十餘人審録供情詳報前來臣查左道惑衆有關風教自宜執法嚴究但今牛三花拉懼罪潛遁其現獲隨教之犯嚴審並無他術實皆鄉愚無知始而聽其誘哄妄冀獲福療疾超度祖宗繼而見有存積香錢又希分利合夥貿易事發之日又恐被獲治罪或輾轉藏匿引送此乃伊等之實情實事可否將隨教合夥貿易之賈得志髙擇善李大本厲明成及聽從轉誘圖利之張太元張坤石容留轉送之徐秀丘志柱張顯各枷號三箇月滿日重責四十板知情藏匿賈得志吳氏之談標劉文炯隨教而為吳氏說媒之李九興各枷號兩箇月滿日重責四十板隨教而款待吳氏之范存信事未發而容留牛三花拉家屬之丘彬各枷號一箇月滿日重責四十板但被誘隨教而未與貿易之朱相卿楊文各重責四十板其雖未隨教而知情不首之徐明等及不察來歷留住之倪常才莊存敬各重責三十板其餘不知情之周二等及未隨教而聽從雇主尊長指使轉送之張三等并腳夫孟孺各豫免議和同被誘之孫氏張氏照例枷責并孫氏之義女小兌姐及被謀娶之吳氏均給親屬領回如䝉聖恩俞允將各犯發落後交給鄉地鄰族保領嚴加收管各務本業不許再與外人來往如或再犯加倍從重治罪在逃牛三花拉等臣飭令各屬務必緝獲究治再此案倘荷皇上恩照臣請從寬完結其從前失察各官去任而為别案被劾者居多臣仰懇皇上天恩概免參處可否如此結案伏乞聖裁為此謹奏所奏是一面嚴緝正犯務獲究擬示懲一面將脅從各犯及不知情人等先行發落以清積案其從前失察各官姑照請免其參罰同日又奏為欽奉上諭事雍正七年七月初四日准刑部咨內開雍正七年六月初六日欽奉上諭游惰之民自昔治天下者之所深惡若好為賭博之人又不止於游情而已荒棄本業蕩廢家資品行日即於卑汚心術日趨於貪詐父習之則無以訓其子主習之則無以制其奴鬭毆由此而生爭訟由此而起盜賊由此而多匪類由此而聚其為人心風俗之害誠不可以悉數也大凡為不善之事者雖干犯功令猶可得微利而獨至賭博今日之所得明日即未必能保若合一年數月而計之勝者與負者同歸於盡此天下之人所共知者而無如邪僻之人一入其中即迷而不悟且甘為下賤而不辭亦大可悲矣數年以來屢次降㫖嚴禁而此風尚未止息者則以製造賭具之尚有其人而有司之禁約未曽盡力也百工技藝之事可以獲利營生者何事不可為而乃違條犯法製此壞風俗人心之具其罪尚可言乎凡地方大吏有司均有化民成俗之責而乃悠悠忽忽視為泛常安辭溺職之咎今特定本地官員勸懲之法以清其源嗣後拏獲賭博必窮究賭具之所由來其製造賭具之家果審明確有證據出於某縣將該縣知縣照溺職例革職知府革職留任督撫司道等官各降一級留任如本地有私造賭具之家而該縣能緝拿懲治者知縣著加二級知府加一級督撫司道等官紀録二次將此勸懲之法永著為例於雍正庚戌年為始著該督撫通行曉諭使城邑鄉村及遐陬僻壤咸使聞之特諭欽此欽遵移咨到臣仰見我皇上覺世牗民端本澄源勸懲兼施立法盡善臣惟當欽遵諭㫖督率司道府州縣力行察禁使賭風頓息賭具盡銷以仰副聖主懲戒游惰洗除積習之至意尚何芻蕘之足陳焉但臣愚以為造賣賭具斷不能瞞地甲牌鄰之耳目必使地甲牌鄰不肯為其容隱而又加以地方官之嚴察則造賭具者自無矣查雍正四年十二月定例造賣賭具之地方保甲知情不首杖一百等語臣請嗣後拏獲製造賭具之人除本犯照例分别首從問擬軍流外其不首報之地方甲長牌頭鄰佑於杖一百之外再枷號兩箇月如係受賄通同隱匿加倍治罪其能將製造之人報官拏獲審實地方官捐賞銀三十兩倘有畏其勢惡恐被挾讎報復不敢明首許令據實密禀免其給賞如此則地甲牌鄰既利重賞又懼法懲即不敢通同徇隱似於禁造賭具不無小補也此臣管窺之見是否可採未敢具本謹繕摺奏請伏乞睿裁為此謹奏禁造賭具一節嚴繩鄰保不使容隱所見固屬有理然朕謂有治人而無治法果地方官盡力察禁不稍寬縱復申之以賞勸自漸止息若又倍加懲治恐更增弊何也老氏有言法令滋彰盜賊多有蓋刑憲太峻畏懼之情彌甚而詭避之術更巧或從而競相掩覆以希幸免則反無益矣雍正七年閏七月初十日河東總督臣田文鏡謹奏為恭報河東兩省得雨日期仰祈睿鑒事竊查雍正七年七月二十一日經臣將河東兩省得雨日期分寸具摺恭奏兹據豫省闔屬具報於閏七月初五日酉時起至初六日午時止各得透雨入土七八寸不等隨即晴霽目下既可及時收曬而大雨之後在地之晚榖晚豆棉花蕎麥等項更加茂實且乘此土膏滋潤農人即可耕犁種麥百姓無不歡呼載道感頌皇仁以為風調雨順實從來所未有也又據東省闔屬具報七月十四十八二十四二十八等日各得雨入土四五寸不等俱各霑足所有河東兩省得雨日期理合繕摺恭奏仰慰聖懷謹奏今嵗直𨽻地方雨暘亦甚屬均調但意中惟恐秋霖不止河工可慮耳同日又奏為恭報豫省秋禾收成分數仰祈睿鑒事竊照豫省今嵗秋禾長茂結實情形經臣節次奏聞兹據開封等八府屬汝陳等七州并所屬報稱髙粱黍榖芝麻黃黑菉豆等項悉行收穫登場又值天氣連日晴霽不論平原沃壤及沙土山隴地畝俱各穗長實大收成豐盛即現在地內之晚豆棉花蕎麥亦極茂實異常轉昐即可收穫并將收成分數逐一具報前來臣復躬率在城文武各員親詣四郊驗看遍問老農俱云今嵗秋禾十分收成實為從來所未有等語臣不勝踴躍歡忭惟有欽遵聖訓朝夕焚香答謝上天愈加敬畏黽勉焉耳其各屬收成分數遵㫖敬謹分析另摺恭呈御覽伏乞聖鑒謹奏今嵗農事如是豐穰固屬可慶不待言矣我君臣又當加勉若何修省以為來嵗感格上天慈佑聖祖垂庇之道朝夕乾惕曷容少間同日又奏為恭報黃河水汛平穩仰祈睿鑒事竊查黃河水汛平穩業經臣節次具摺恭奏兹於雍正七年閏七月初四日據陕西寧夏知府鈕廷彩報稱本年七月二十三日寧夏水長一尺有餘等因到臣臣當即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫等嚴加防守臣仍飭委千把總員往來巡察嗣據管河道河北道并各廳汛員辨等具報閏七月初六日黃河水長一尺初七日黃河水長二尺五寸沁河水長二尺四寸隨於初八日黃沁二水俱消落歸槽一切堤掃工程俱各平穩所有水長水落堤掃平穩情形理合繕摺恭奏仰慰聖懷謹奏覽黃沁消退情形深慰朕念仍當嚴飭該管官各盡乃職敬謹從事待八月後方可言今嵗工程平穩也同日又奏為奏聞事雍正七年七月二十五日據山東登州府寧海州報稱本州萊山集地方於雍正七年六月二十九日大雨普降山水驟發因僻處山野趨避不及被溺男婦六口幼孩四口共十口水即消退田禾並無損壞等情詳報前來臣即飛檄山東布政司委員查勘被溺情形有無傷損田禾併將被水各戶加意撫恤在案查近山地方雨後水發常有之事兹因偶被淹溺人口不敢不據實恭摺奏聞為此謹奏寧海州被水情形據費金吾亦巳奏聞今嵗直省皆不免有類此小災惟陕豫二省未聞耳同日又奏為遵㫖覆奏事雍正六年十二月初五日據河北鎮總兵官臣閃文繡咨呈內開雍正六年十一月初二日在養心殿面奏云臣在漕標徐州營副將任內催漕經過山東見沿路皆有墩臺營房惟中間臺莊營汛地自黃林莊起至吳家橋沙溝營汛地自吳家橋起至劉昌莊約有一百四五十里並無墩臺營房此係漕運大路似應一體添設墩汛等因奉㫖將爾所奏交與總督田文鏡酌行欽此等情到臣臣當即檄行山東布政司作速查議去後兹據布政使費金吾詳據兗州府申稱滕嶧二縣查明沿河一帶營房墩臺已於雍正五年正月內經前撫院塞楞額㑹同巡察奚德慎具本奏請委員查勘添建自劉昌莊起至吳家橋共建墩臺二座自吳家橋起至黃林莊共建墩臺六座俱各有營房三間防兵五名戍守查閃總鎮係在徐州副將任內催漕經過山東其時尚未添建墩臺後於雍正五年已經添設似毋庸再行添設等情詳覆前來臣案查山東沿河一帶墩臺原於雍正五年正月內經前撫塞楞額巡察奚德慎奏明添建墩臺八座在案似毋庸再行添建糜費錢糧也除咨覆山東巡撫衙門并照㑹兗鎮外緣係奉㫖交臣事理相應將沿河一帶毋庸添建墩臺營房之處繕摺覆奏伏乞睿鑒謹奏據奏從前添建墩臺之處即係閃文繡所指地方果若此自不應重復增添也同日又奏為奏請改造倉厫以重積貯事竊查倉厫為積貯第一要務而草房非可經久臣查河南通省各倉惟常平倉內舊有草房四百五十間彼時因尚可積貯未經議改但歷年既久漸次朽爛一遇風雨不無滲漏之處且墻壁俱係土坯壘成易致塌卸必得一律改造瓦房另築磚墻方為堅固經久之計兹據署布政使謝旻詳稱每間足貯五百石照往例估用工料銀十五兩改造瓦房四百五十間共需銀六千七百五十兩請於河北捐納公費銀內動支等因具詳前來臣查河北事例所收公費銀兩原係奏明解貯司庫造冊換照公項之用又經臣於雍正六年三月內奏請添建倉厫即將此項動支給發䝉皇上俞允在案今仍請於此項捐榖公費銀內動支改造似可毋庸動用正項錢糧倘䝉恩允臣即檄行布政司動支河北捐納公費項下給發飭令改造足貯五百石委員勘驗務期高敞堅固如式仍造册報部僃案所有豫省改造倉厫動用銀兩數目理合恭摺請㫖伏乞聖鑒謹奏改造倉厫極屬應行之舉但每間止估工料銀十五兩為數太少恐不敷用既議興修當令堅固若草率了事仍未能抵禦風雨非經久計也凡類斯裨益積貯政務切不可惜費卿其志之同日又奏為欽奉聖訓據實覆奏事雍正七年七月二十五日臣齎摺家人捧回臣奏署布政使謝旻摺內欽奉皇上硃批謝旻乃出格聰明大有本領人但嫌其缺篤實耳以卿實心辦事之督臣為其上官而又現被朕恩眷最隆伊思己身之優劣臧否定於卿之一言若因此而暫勉一是字與卿看則離卿獨任時必不能堅持初志毫無改移也於斯須詳加體驗方得真情平居共事當不時朂誡勉其弗及匡其不逮以成全之朕深重其人而不能無疑命伊署理豫藩原令隨卿辦事知所倣效也此意曽面諭伊其再加確試具奏以聞欽此臣伏讀聖諭明同日月德懋生成照鑒至微造就至切今謝旻又䝉皇上補授太常寺卿仍署理河南布政司事則謝旻感激天恩自必益加黽勉臣亦當欽遵諭㫖時加教導確試如果立志堅定臣再據實奏聞為此謹奏今命往江西署理巡撫印務可竭力訓勉之雍正七年八月初三日河東總督臣田文鏡謹奏為恭報東省秋禾收成分數并河東兩省得雨日期仰祈睿鑒事竊查豫省秋禾收成分數業經臣具摺恭奏兹據東省濟南等六府屬泰安等六州并所屬及各衛所報稱髙粱榖黍芝麻黃黑菉豆棉花等項悉行收穫登場不論平原沃壤及沙土山隴地畝俱各穗長實大收成豐盛即有前經被水被雹之魚臺安邱寧海等州縣俱於秋禾無損是以白叟黃童歡呼載道感頌皇仁并將收成分數逐一具報前來臣復詢之東省往來官辨兵役僉云今嵗收成實倍勝於往年臣謹遵㫖將收成分數逐一分析另摺恭呈御覽臣再查豫省於本年閏七月十三十四二十二二十七及八月初一初二初三等日據闔屬具報各得透雨入土五六寸不等又據東省闔屬具報於本年閏七月初四初五十四十六等日各得雨五六寸不等俱入土霑足不獨在地之晚豆蕎麥等項更加茂實且農人乘此土膏滋潤處處可以耕犁種麥實為風調雨順從來未有所有東省秋禾收成分數及河東兩省得雨日期理合繕摺恭奏仰慰聖懷為此謹奏山左秋禾收成分數并兩省風雨調順情形欣悅覽之同日又奏為恭報黃河水汛平穩仰祈睿鑒事雍正七年閏七月十五日據陕西寧夏府知府鈕廷彩報稱本年閏七月初四日寧夏水長二尺有餘到臣臣即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫等嚴加防守臣仍飭委千把員辨往來巡查嗣據管河道祝兆鵬河北道朱藻并各廳汛員辨等具報閏七月十七十八二十三等日黃河水長二尺二寸隨即消落歸槽其沁河水並無長落一切堤掃工程俱各平穩臣查每年秋汛自白露以後水勢漸緩今閏七月十六日白露已過此畨水汛緩弱漸長漸消臣仍嚴飭在工官辨加意巡防毋得踈懈所有黃河水汛平穩及水長水落情形理合繕摺恭奏仰慰聖懷謹奏朕憂慮之懷隨時漸減而敬畏之念逐嵗彌增治河之道與修身理同若因微有所進而自足巳無可虞而稍怠則將前功盡棄矣要當慎之愈慎也將此諭亦令嵇曽筠知之同日又奏為據實奏明仰祈睿鑒事竊照東省民間之雜派猶繁錢糧之虧缺未楚臣䝉皇上委任至隆必須嚴核力除以期風清弊肅臣查東省積年錢糧缺至三百萬有餘其中役蝕者多於官侵經臣嚴檄司道府直隸州嚴行糾察徹底清查除虧空在官者一經查明立即題參外其有衙役侵收捏缺朦混者雖本官不能辭失察之咎較諸自行侵那者有間現據各州縣紛紛察出詳報臣巳一面批飭嚴行究追勒限完報但思目下當清查錢糧之際正欲各員自為覺察若即將詳報州縣以從前失察題參恐别員畏懼處分反為蠧役徇庇不實力察報臣是以暫緩題參若收役所侵錢糧本官能勒限嚴追設法完解毋論本犯或本官將銀兩照數全完者臣仰懇聖恩寬其從前失察之咎其本犯仍照律治罪若遲延不完將失察之員題參著落賠補庶各員自顧考成稽查嚴而追補不敢不力矣又流抵一項其初州縣皆借公事詳明該管上司俟俸工復給之年抵補官官相交有名無實經前撫臣陳世倌奏請將通省耗羡彌補而弊竇自此叢生或以少作多或將無作有捏造案卷通同冒銷兹因流抵各案經前撫臣塞楞額奏明仍著落各員名下追還分咨旗籍任所查追水落石出據原任歷城縣知縣劉元琦等各具呈稱寃懇求查究捏造之弊免其寃賠等情到臣臣俱批布政使費金吾確查并飭徹底通查除原係該員在任假借公事詳准流抵者仍應向該員名下追賠若係院司各官通同捏造者應著落捏造各官名下追賠庶於法為平允且以為辜負㫖遵行又東省漕糧之弊甚多凡經管漕糧各衙門官役以及軍旗丁辨無一不有規禮無一不有需費所以州縣官重耗濫徴名雖加二耗米其實則加二五有餘也兹據糧儲道顧贄詳稱遵將糧道糧廳官役陋規浮費及交軍時黃旗祭旗祭江折席演戲穩跳回籌軍笆民笆軍檔民檔喜禮并運官運辨下程酒席鑰匙通關催兌開厫撥帖呈樣撕斛等項陋規盡行革除惟旗丁領運漕糧雇募舵工水手均須工價食米并買僃席片等費恐額設銀米不敷經前道湯豫誠酌定通糧每石貼銀三分食米二升薊糧途逺費繁每石貼銀五分食米三升在案其運辨隨幫俸薪無幾亦經前道酌定每兌米一石量給運官盤費五釐隨幫盤費一釐均在州縣所徵耗米內支給請照加一徴收前來臣查旗丁幫費食米及運官隨幫盤費應照前道湯豫誠所議支給俾各辦公裕如以示體恤惟别項漕糧陋規俱已革除則州縣巳無浮費自應將耗米核減以寬民力糧道顧贄所議加一耗米雖約計足敷幫貼之需但恐額編腳價不敷雇車之用致啓不肖州縣借端派纍里下之弊臣請每石減去耗米五升照加一五徴收即以此五升耗米留為州縣幫補雇車之用不許借名私派倘有多收斛面及指車派費嚴𠫭治罪此加一五耗米以雍正七年為始百姓既䝉減耗之徴多報少之弊所以耗額較之從前大率有減而無增也查豫省州縣自一錢一分起至一錢二三四五六七分不等其一錢七分者不及十處而東省州縣衛所每兩槩加耗銀一錢八分詳查其故始初亦多寡不一有一錢二三分至二錢以上者因雍正二年提解耗羡之時有彌補虧空流抵之議而帶徴康熙五十八九六十等三年舊糧全未解耗帶徴康熙六十一年雍正元年錢糧火耗又止解司七分其餘俱係州縣扣留所以昔年火耗本少者亦以一錢八分為率以肥私槖臣思各官既有養廉又有公費解費其帶徴雍正元年以前舊糧耗羡既收一錢八分如何康熙五十八九六十等年不解耗羡帶徴康熙六十一年雍正元年如何止解七分殊屬未協臣是以自雍正七年為始飭令各州縣照現年錢糧之例將帶徴各年舊糧除應扣解費公費外其餘一錢四分悉解司庫充公在案臣伏見我皇上保民若赤凡有可以紓民力而阜民財者無不特沛曠典臣不揣冒昧因奏減東省漕糧耗米併奏請漕米之耗又減錢糧之耗羣戴恩深重無可圖報凡有一得之愚即據實陳奏是否有當統乞聖裁謹奏覽諭河東總督田文鏡知悉朕於即位之二年冬間念及州縣各官比皆初任諸多未諳或偶因才力心思一時不到致被參黜人材殊屬可惜特命朱軾沈近思二人追憶向日已所閲歷如孰師訓䝉一般指示蒞事臨民法則綴緝成書以為新進楷模續因朱軾丁憂而又久病且筆下亦甚艱澀沈近思復經物故所以蹉跎至今未就昨李衛來京陛見言及此事伊奏稱曽有訓誡屬員一冊隨進呈朕覽披閲之下尚覺不甚愜意況亦非開導初任語句卿歷外任多年甚諳練吏治可於政務之暇悉心著作一部差人齎進朕彚集各處所擬於中採擇裁定然後降㫖刋布大抵不過如何交盤如何催科如何驗傷如何靖盜以及查詰吏胥姦欺等類耳浙督李衛訓誡屬員冊併發同日又奏為欽奉上諭事雍正七年閏七月二十九日臣齎摺家人捧回皇上硃筆諭㫖一道及督臣李衛訓誡屬員一冊到臣臣謹跪讀諭㫖仰見我皇上慎重牧令愛惜人才本作君作師之聖念垂是則是效之成書以啓愚䝉以資吏治法至善而意至厚也兹䝉皇上不以臣愚命臣著作以僃採擇伏念臣自撫豫及總督河東以來時時仰遵聖訓凡誡飭屬員開導初任事皆有案但恐識見淺陋詞多未逹未必有當天心臣現在細加查核詳加斟酌俟纂輯成篇進呈御覽所有奉到諭㫖及督臣李衛訓誡屬員冊容臣纂輯完日一併恭繳謹先繕摺覆奏為此謹奏無須過勞心神非急務也於辦事餘暇從容撰就齎呈朕覽同日又奏為奏請酌通河東兩省書吏換班之期仰祈睿鑒事竊查廣東道試監察御史髙山條奏各省督撫臬司書吏親戚子弟借供應名色潛住省城名曰外班又有兩人先後投充交相更換迭為外班由是內外一氣暗通關節招搖撞騙其中傳逹字跡要皆不出厨役水火夫之手應將外班盡行驅逐其所用厨子火夫一併封鎖署內不得聼其出入書吏兩三四月換班為期太近撞騙易施似應飭令一年一換藩司衙門一體封鎖等因欽奉諭㫖通行在案臣思除弊必清其源用法貴因其地臣於各衙門書役蠧弊疾之最深防之最密但地有不同人有各别如直隸院司書吏皆有缺主缺主在外攬事納賄而在內辦事者則係久住衙門之書辦其水菜等項皆缺主出資辦買是外班者即缺主之别名也其他省如有類此者誠應嚴行查逐若夫豫省則不然臣與藩臬兩司衙門書吏皆係身家殷實之人藉以支持門户悉屬本身入署辦事並無缺主該班則進署下班則歸家不在省城停留如臣與藩司衙門書吏所需鹽菜銀兩係䝉皇上恩賞在耗羡內支給其臬司衙門係各書吏自僃而為其買辦者即各衙門之承舍旗牌並無書吏之親戚子弟借供應名色潛住省城亦無兩人先後投充迭相更換所謂外班者已無可革除矣中州之人性多朴魯各衙門書吏不過略曉文義略通書寫即尋常事件辦理猶多舛誤較之江浙直隸及在部書辦之工於作姦舞弊者實迥不相侔今若定以一年換班則伊等本屬不諳之人更加生疏之久凡此一年內國家新定之章程內外奉行之事件皆茫然不知難保其不無貽誤且三月一換伊等到家略為料理家務轉昐即欲上班無暇别圖今以一年為期日月既長豈能在家安坐必然另尋生理及至一年届期又欲舍彼就此未免兩難況一涉他務心更不專而衙門之事益無頭緒大費周章矣用敢僃陳情由仰懇聖恩仍令三月換班實於辦公有益至厨役火夫原係封鎖在內不能出入并在署內水夫係在墻外送水不使入門均不能傳通字跡其藩司職居方伯責任綦重關防宜嚴遵例照依臬司衙門一併封鎮至東省書吏與豫省相同倘䝉天恩俞允其東省書吏亦懇照舊三月換班臣䝉皇上格外恩遇信任極深凡奉行之事惟期弊竇盡除又於公事有益是以因地制宜奏請聖恩俯賜酌通伏乞聖鑒謹奏該部議奏同日又奏為豫省黃河堤工請停加修議添堡夫仰祈睿鑒事雍正七年七月二十一日准總河臣嵇曽筠咨內開欽奉上諭黃河堤岸乃運道民生所關最為緊要年來增卑培薄幸慶安瀾獨是工程報竣例應歸汛修防而額設河兵堡夫只能修補水浪衝激之處防僃臨險搶護之用至於堤身一年之內風雨淋漓車馬踐踏漸致損壞者亦勢所必有而堤逺工多不能責諸寥寥兵役也朕思堤工雖千有餘里若按丈每年加髙五寸計費不過三四萬金倘置之不議一年剝削四五寸合十年而計之其所費之多恐有不止於加修之數者況河流漲漫不時難以預料何若逐年增修保固為未雨綢繆之計也朕意如此其果否有益之處著南壯兩河總督尹繼善嵇曽筠悉心商酌詳確定議具奏欽此仰見我皇上軫念堤工睿慮周至臣查豫省黃河兩岸堤工荷䝉皇上疊發帑金指示修築是以一律髙堅完固臣有兼理河道之責時時飭令管河各官敬謹料理如車馬往來另有道路不在堤上行走不致輪蹄踐踏損傷其雨淋殘缺水溝浪窩則令兵夫隨時修補毋許稍緩若新修之堤其頂面兩旁尚未有草根盤結風吹雨淋不免侵削則於霜降之後兵夫工閒之時各就所管之工逐日擡取細土填墊豐厚夯硪堅實日積月纍由少成多帑不費而工自固也況豫省所築堤工有逾四五年者有逾二三年者在工人員各就土性所宜種草固堤現今草蔓叢生盤結堅固若加幫新土必須剷去堤面草根方與舊土膠粘草根一去新土虛鬆又不如舊土草根盤結之為堅實適河臣嵇曽筠到省臣即與面商嵇曽筠深以臣言為然隨令管河道河壯道等各將南壯堤工親加查丈據稱現在丈尺較之原估俱屬相符是豫省堤工一律髙堅並無卑矮處所似毋庸嵗加五寸概議增修也惟豫省額設河兵一千名緣上年添造浚栁船隻即於河兵內挑選三百四十名現在河兵止有六百六十名不敷力作且河兵簽樁下掃往來調遣未能專守堤岸今查豫省現在堡夫一千五十八名專以守堡修堤為事臣擬添設堡夫三百四十名分派兩岸力作修防以補河兵之數臣亦與河臣嵇曽筠面商所見相同臣伏思黃河兩岸堤工關係緊要我皇上不惜帑金為未雨綢繆之計命河臣酌議嵗加五寸原恐風雨淋漓車馬踐踏漸致損壞額設兵役不能修補之故今豫省堤工既無車馬踐踏損傷而雨淋殘缺又隨時修補現今一律髙堅臣擬請停加修堤工止酌議添設堡夫則力作多人即偶有雨淋殘缺修補更易而堤工日益鞏固國帑不致虛糜矣此事雖非皇上命臣查議而臣於豫省堤工既知之深而信之確不敢不直陳於君父之前除聼河臣嵇曽筠具題外因此議出自臣之愚見而上諭內未命臣㑹議臣不便列銜是以繕摺恭奏伏候聖裁為此謹奏詳覽所議因事制宜足見竭慮奉公俟河臣嵇曽筠具題到日有㫖同日又奏為欽奉聖訓據實覆奏事雍正七年閏七月二十九日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀於臣覆奏謝旻摺內欽奉諭㫖今命往江西署理巡撫印務可竭力訓勉之欽此臣伏念謝旻䝉皇上補授太常寺卿不旬日間又䝉皇上命往江西署理撫印天恩稠疉實逾格外臣見其聞命之下感激之至更深惶悚臣業巳勉其立志堅定存心公正不恤勞瘁不避嫌怨以仰報聖訓臣欽遵諭㫖自當竭力訓勉以仰副我皇上造就人材之聖意又於臣奏豫省秋禾收成摺內欽奉諭㫖今嵗農事如是豐穰固屬可慶不待言矣我君臣又當加勉若何修省以為來嵗感格上天慈佑聖祖垂庇之道朝夕乾惕寧容少間欽此除東省秋禾收成另摺恭訓勉微臣益見聖敬日躋聖德日新實為從古聖帝明王所未有臣惟有敬佩聖訓永矢勿怠焉耳又於臣奏請改造倉厫摺內欽奉諭㫖改造倉厫極屬應行之舉但每間止估工料銀十五兩為數太少恐不敷用既議興修當令堅固若草率了事仍未能抵禦風雨非經久計也凡類斯裨益積貯政務切不可惜費卿其志之欽此仰見我皇上舉行善政不惜帑金聖心廣大覆載為量臣欽奉諭㫖即檄行布政司動支河北捐納公費項下給發改造務期上下堅固可禦風雨可垂經久其前估十五兩之數不敷所用再行酌量加添臣惟敬志聖訓凡遇地方應舉之事固不敢任屬員冒濫糜費國帑亦不敢茍簡從事以致草率總期辦理從容規模宏逺以昭聖朝百度維新之盛典也所有奉到各原摺理合恭繳為此謹奏覽奏俱悉卿所薦郭朝鼎多有人稱道其好朱綱亦曽保奏昨到京引見觀其舉止應對甚屬庸平或忠厚穩妥則有之若論才具恐未必能勝延平繁劇之任諒必有見長於卿處方始推薦朕竟不能品定伊之優劣卿意究以為何如人耶硃批諭㫖卷一百二十六之十七欽定四庫全書硃批諭㫖卷一百二十六之十八硃批田文鏡奏摺雍正七年九月初三日河東總督臣田文鏡謹奏為恭報黃河秋汛工程平穩仰祈睿鑒事竊查黃河水汛平穩自本年八月初三日經臣具摺恭奏後隨於初六日據道廳汛員具報於八月初四日黃河水長四尺五寸沁河水長三尺五寸等情到臣臣即飛檄各道廳汛員加意巡查嚴行防守而此番長水停滯積至七晝夜始行消退其低窪處所水皆漫灘浸及堤岸數尺間有裂縫之處實屬危險在工文武員辨俱各率領兵夫相機幫創竭力防護輪班分守晝夜不息隨於十一日據道廳汛員具報黃沁兩河水勢消落歸槽工程俱各平穩又據山東兗州府黃河同知禀稱曹縣之芝麻莊單縣之諸望壩自八月初五日起河水陡長兩處臨河掃工間有蟄陷俱各搶築堅固現今水已消退等語又於八月二十日據陕西寧夏府知府報稱八月十一日寧夏水長二尺有餘到臣臣即移咨河東江南河臣并飛檄管河道河北道督率官辨兵夫嚴加防守臣仍飭委千把員辨往來巡查嗣於八月二十九日據管河道河北道各禀稱寧夏水汛已過目下水勢平定並無長落等情臣查今嵗寧夏水汛較多於上年惟八月初旬之水停積七晝夜實非往常可比是以各處所報險工甚多臣業已分檄管河河北兗寧三道查看工程危險處所乘此秋收之際多僃物料其有應下長樁大掃加鑲髙厚者即確估料理以資保護其餘偶有蟄裂之堤勢不合一俱即從新翻做夯硪堅實務期鞏固今於九月初二日霜降已過工程平穩此皆仰賴我皇上至誠至敬感格天祖又復厪念秋汛屢頒諭㫖在工人員無不欽遵聖訓敬謹料理晝夜防護是以水漲雖甚於往常而堤工各保無虞共慶安瀾也理合繕摺恭奏仰慰聖懷謹奏今嵗秋汛極大一切堤工俱安堵無虞卿等之忠勤勞效更屬顯而易見朕嘉悅之懷筆莫能罄但淮黃交㑹處屢報清不敵黃深以此為憂目下雖尚無妨然不可不預行詳籌熟計耳同日又奏為欽奉聖訓據實覆奏事雍正七年八月二十四日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀於臣恭報黃河水汛平穩摺內奉有硃批臣即敬録知㑹總河臣嵇曽筠并曉諭各道廳汛外伏念我皇上慎重河防聖敬日躋跪讀上諭治河之道與修身理同誠為萬世河防至論於此識聖心之乾惕於此仰聖學之精微臣欽遵諭㫖敢不慎之又慎以期堤工鞏固永慶安瀾又於臣據實覆奏摺內奉有垂詢郭朝鼎諭㫖臣查郭朝鼎才具原屬中等聖明洞鑒毫髮無遺然臣之所取於郭朝鼎者以其在豫五載歷任宜陽洛陽二邑并歷署州縣印務居官謹慎辦事勤敏所到之處不獨向日之陋規悉行禁革即一應經徴錢糧平頭火耗並無絲毫多取是郭朝鼎雖才具不足而立志堅定操守廉潔誠如聖諭忠厚穩妥則有之此臣之所以敢為保奏也今䝉皇上垂詢理合據實覆奏又於臣覆奏豫省秋收及東省收成摺內奉有硃批臣伏念天人感應之理昭如影響絲毫不爽然惟皇上之至誠至敬感格天祖是以東省豐登為數十年來所未有臣雖懷犬馬報主之誠猶慮不能奉行聖訓宣布聖化乃䝉皇上聖不自聖推美臣工近奉恩㫖又蠲免東省雍正庚戌年額徴錢糧四十萬屢荷聖恩髙厚疊䝉溫語褒嘉臣實感悚無地除㑹同山東署撫臣恭疏題謝天恩外臣惟有欽遵繳為此謹奏覽同日又奏為奏請酌增豫省運漕腳價仰祈睿鑒事竊照豫省漕米向惟河北三府辦運本色而河南州縣均徴折色仍在河北三府採買甚為河北官民之纍經臣於雍正六年具題將河南州縣一例復徴本色以均勞逸又按道里逺近米石多寡除加一五耗米外酌給腳價在於鹽驛道及各府直隸州充公鹽規銀并漕糧節省項下耗羡內動支給發奉㫖依議欽遵在案是以雍正六年漕米較之往年兌運尤早而米色亦較往年乾潔民樂輸將官無賠纍實為永逺可行之法惟是臣彼時所議車腳僅敷其用不能裕如各州縣雖收加一五耗米而交軍之時有零星席片等費約除耗米五升所餘止一斗耗米核銀不過七分上下車腳未免拮据臣查各府州鹽規及糧道鹽務奏銷共歸公銀一萬三千五百六兩又新任鹽驛道到任賀禮銀九百五十兩又漕糧節省項下耗羡銀二千九百八十二兩通共銀一萬七千四百三十八兩零查雍正六年辦漕共支用腳價銀一萬七百九十八兩又雇募剝船刨淺敲冰等項共用銀一千三百七十二兩二共銀一萬二千一百七十兩零餘剩銀五千二百六十七兩臣思公項既有贏餘安敢不推廣皇仁將運漕腳價奏請酌增以使雇用裕如謹按原定腳價每錢酌增三分通共加銀三千二百三十九兩零查每嵗除鹽驛道新任賀禮銀九百五十兩另計外約贏餘銀四千三百餘兩除此加添車價銀三千二百三十九兩零尚餘銀一千餘兩存貯道庫或遇河水甚淺之年其挖淺築壩等費較多於常嵗以及河須挑挖之時可以酌量動用如此則州縣雇覓車輛更屬裕如不致藉口拮据日久生弊而官民均沐皇上浩蕩之𢎞恩也臣仰體皇上愛恤臣民辦公務使寬裕立法務期永逺之聖意是以恭摺奏請倘䝉恩允臣將奏准緣由咨部僃案是否可行伏乞聖裁謹奏運價充裕方久逺行之無礙應加增者辦理甚屬允當同日又奏為奏明存貯入官硫磺仰請發給各營以資火藥需用事竊查豫省界連晉省硫磺係山西澤州陽城縣所産陽城百姓及豫省接壤之懷慶府濟源河內孟縣等縣之民每有違禁私販經地方官查拏詳報因各人販磺不多而律載私自販賣硫磺者問罪硫磺入官等語隨將販磺之犯照違制律杖責案由外結所以入官之磺俱解貯開封府庫自康熙五十九年起至雍正五年陸續獲報各案共積存硫磺一萬一千六百六十八斤臣業已移咨山西撫臣嚴禁私磺不許出境在案但臣思所貯硫磺乃係禁物民間不得貨賣難以變價其性又易引火恐有他虞現在各營操練兵丁演放鳥演放鳥鎗炮位之用則各營製造火藥既不必另行購買硫磺而存貯之磺亦不致積於無用實於營伍有裨臣再查河東兩省各鎮標營演放鎗炮所需火藥或扣留空名兵糧製僃或鎗炮手兵丁自行製僃不獨兵丁有賠墊之纍而用少扣多兵扣之弊兵丁無賠墊之纍實為恩便臣謹繕摺一併奏請伏乞聖裁謹奏覽同日又奏為奏明事竊照整飭吏治全在得人前因東省員缺甚多需員甚殷經署撫臣布政使費金吾札商奏請聖恩簡發人員以資委用臣隨札致費金吾令其具摺奏請兹䝉皇上將盛開池等二十員命往東省令臣酌量委署試用兹據各員陸續到豫臣逐加驗看將居官辦事到任交盤審理命盜稽查保甲察革陋弊約束家人衙役懲治豪惡土棍并徴收錢糧初任規矩等項逐條逐項諄切教導而盛開池等亦能領悉似可造就臣遵㫖一面將各員酌量委署試用視其到任後果否勝任或有人地不相宜者另行改用臣恐在豫路逺一時見聞未確業已切致費金吾留心體察再加甄别統俟察試確實人缺酌定後再行具題再臣前奏東省流抵一案兹據費金吾禀稱事經二十餘年案至二百餘件前撫臣陳世倌草率具題於前塞楞額踵訛分追於後司卷既多殘缺院卷亦復不全密諭州縣衛所檢送舊案多與院司各冊不符復又弔取府卷查對其中舛錯之處巳得大槩有實係虧空而捏造流抵者有前任流抵而開追後任者有上司行文動用而開追下屬者有因扣公捐各項作為流抵開追者事久弊深不得不慎之又慎徹底清查總在金吾力任其事惟期再寬二三月之限等語臣查此案年久弊深案多更易清理誠為不易非該司如此細查不能得其端委非該司以藩司而署撫篆亦不能將兩衙門案卷查追不遺非該司不辭勞苦不避嫌怨亦不能使二十餘年之積案究查明確臣觀費金吾自上年奉㫖調補東藩之後事無巨細悉心經理即今暫署撫篆其撫衙門事務亦無不竭力整飭總由其感激聖恩圖報心切故事事殫誠弩力不敢自懈也臣因東省吏治時厪久矣不禁私喜是以一併奏聞伏乞睿鑒謹奏費金吾於此一任方見實心奉職朕亦極加奬譽但目今湖北上江兩省不得其人意欲於此二處酌量相宜命往撫治所遺藩司員缺以孫國璽代之卿意以為何如又有人言費金吾精神不足者不知確否查奏以聞同日又奏為恭謝天恩事雍正七年八月十五日准兵部咨內開欽奉上諭阿里袞因伊父病故奏請給假三月料理喪事著准假三月令其來京杭州將軍印務著性桂署理其河南城守尉印務於副都統白成額未到之先著總督田文鏡暫行管理欽此等因到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚至微極陋荷䝉皇上委遇之隆信任之深銘心刻骨感激難言今副都統臣阿里袞補授杭州將軍因伊父病故奏䝉恩准給假復奉諭㫖命臣暫行管理河南城守尉印務聞命之下感悚交并總之臣受皇上隆恩天髙地厚早夜思維無可仰報惟是河東兩省滿漢文武官辨仰體聖意時刻留心體察臣觀阿里袞才具精明操守謹慎勤敏老幹虛已和平在任將及二載約束官兵操演營伍實屬才守兼優之大吏蓋由其平日仰荷天恩感戴至切是以無事不實心辦理兹復䝉聖恩補授杭州將軍則伊愈加感激更必奮勉圖報而臣益仰我皇上知人善任至聖至明至公至當也再查城守尉衙門向無題奏之例臣管理城守尉印務遵例不敢具本恭謝天恩除將接印任事日期咨報兵部外謹繕摺恭奏伏乞聖鑒為此謹奏朕因阿里袞居心誠慤擢用今職然尚恐其不克勝任殊不料才具操守竟能若是也覽卿所奏曷勝愈愜之至新任白成額朕觀非實心任事之人甚缺妥協卿於其到豫後再三勸勉諸凡行為稍有不及阿里袞處即直言規正倘不肯聼受憚於遷改據實具奏以聞雍正七年九月二十一日河東總督臣田文鏡謹奏為欽奉上諭事雍正七年八月初四日准吏部咨內開欽奉上諭河南府知府員缺著田文鏡於通省屬員內揀選題補欽此等因到臣伏念知府一官上寄督撫監司之耳目下為州縣牧令之表率所係綦重臣安敢不矢公矢慎以求至當惟查通省屬員內凡府佐二及直隸州知州等俱皆尋常供職難膺知府之任查請㫖事案內令各省督撫酌量題缺多少將現任屬員內選擇保題以僃直隸州之用經臣於雍正七年七月內將輝縣知縣張鏐湯隂縣知縣張瀚太康縣知縣程秉禮等一併保題部議准其保題送部引見奉㫖依議欽遵在案今各員交代清楚現在給咨赴部引見臣查輝縣知縣張鏐居官謹飭辦事勤慎人亦老成湯隂縣知縣張瀚居官勤慎才幹精明太康縣知縣程秉禮辦事明白才守穩妥此三員者均堪選拔但臣知識淺陋未必有當一經聖明洞照則衡鑒精微絲毫不爽用適其才而於地方大有裨益仰請皇上於張鏐張瀚程秉禮引見之時欽定一員補授河南府知府鴻恩出自聖裁臣未敢擅便為此謹奏候引見時酌定有㫖同日又奏為據實奏聞事竊照豫省南汝一帶壤接江楚民俗刁悍素稱難治前任南汝道孫蘭芬極力整飭事皆就理臣因山東登萊青三府為海疆重地去豫更逺較之南汝尤為緊要必得精明強幹之員方可以任要缺而資整理是以題請將孫蘭芬調補登萊青道而以登萊青道李英調補南汝道嗣該道於未到豫之前因其原任袁州府任內為清查地畝一案部議降一級調用奉㫖李英著問田文鏡如居官好能勝道員之任著降一級從寬留任如係尋常供職之員即照部議降調欽此臣因李英前任登萊青道時雖囿於習氣未能整理地方但其年力尚壯須俟到任後再加䇿勵試驗臣隨遵㫖覆奏容俟李英到南汝道任後臣再加䇿勵以觀後效如不能勝任另當奏聞奉㫖將李英降一級從寬留任欽遵在案臣思該道以降調之員䝉皇上從寬留任自應感激聖恩努力圖報乃該道於赴任時一入所屬地方州縣供給酒席等項無不收受及至信陽州界見執事轎傘非係新製即怒形於色向州牧云難道你僃辦了本道就還不起麼等語該州隨差役回州喚集工匠連夜製僃一新又甫經到任即向信陽州知州郭士英借銀二百兩又因屬員謁見不給宅門家人規禮該道再四查問道役禀稱係臣久經革除因而中止總之器小識鄙狃於積習既不能正已又安能率屬及該道入場監試與臣朝夕共事幾及一月臣又加察試見其才具平常識見淺陋實不勝南汝道之任兹因該道及濟東道張體仁失察歷城縣陳世正家被盜諱強為竊案內部議降調俱奉㫖詢問居官如何之處除臣㑹同山東署撫臣費金吾題覆外在臣受恩深重無可圖報時時仰體皇上愛惜人才曲為造就之聖意是以將該道李英初請調任南汝繼請再觀後效今雖到任未久臣既察試其不能勝任實不敢茍且姑容貽誤地方所有李英居官平常才識鄙細之處理合繕摺據實奏聞伏乞聖鑒謹奏李英材器原屬庸下不堪乃昔日藩邸舊人為朕所深知者因詢之歷任上司皆言克勝厥任姑懷疑暫留此奏朕深為嘉悅候另有諭㫖同日又奏為欽奉上諭據實覆奏事雍正七年八月初九日接到大學士臣馬爾賽張廷玉蔣廷錫寄字內開欽奉上諭昔年聖祖皇帝巡幸時地方官員等預僃行宫為駐蹕之所後因閒設多年該地方修葺防護未免又多一番經理經督撫等奏請改為公所朕巳允行此皆體恤官民之意也至於龍亭及御碑亭之在地方者該有司等應當加意防護即略為修理費亦不多近聞間有損壞之處無人管理修葺朕若明降諭㫖則督撫等甚覺無顔爾等可密寄信與之欽此仰見我皇上孝思純篤睿念周詳優待臣工包容僃至凡為督撫者伏讀之下孰不感愧交集臣查豫省自康熙四十三年聖祖仁皇帝巡幸一次原建有龍亭御碑亭臣自䝉恩撫豫及總督以來留意檄飭各屬隨時修葺令人經管是以並無損壞之處今欽奉諭㫖復札諭各屬令其加意防護毋致損壞以仰副我皇上至仁至孝昭垂萬世觀瞻之聖意除東省地方臣已札致署撫臣費金吾外所有欽奉諭㫖事理相應據實繕摺覆奏伏乞聖鑒為此謹奏諒卿敬慎有素自必留心經管前㫖為聞江南地方荒廢而發也同日又奏為遵㫖密議覆奏事雍正七年九月初一日接到大學士臣馬爾賽張廷玉蔣廷錫寄字內開本年八月二十二日奉上諭科臣顧祖鎮條陳果否可行爾等抄録寄與總督田文鏡令其密議具摺回奏欽此并抄録禮科給事中臣顧祖鎮原奏到臣查條奏內稱弭盜之法先嚴窩盜之家而窩盜之人半屬掛名之役查各省督撫司道以下其書吏衙役皆有經制定額不容冒濫而有一等游手好閒無業貧人每於額設吏役之下空掛一名書吏則為貼寫為掌案下役則曰幫役曰白役小則希免差徭大則借端生事自恃衙門情熟因而包攬錢糧把持行市窩娼窩賭無所不至而猶未遂其欲每與捕役上下其手窩頓盜賊發縱指示名曰放線所獲之贓盜得其三彼得其七且以語言恐嚇事主令勿報官即使事發而州縣捕役向為一線串通或以强為竊或故意縱放有司為之掣肘百姓被其擾害臣請嗣後各省掛名書役嚴行禁革照額設之數每名止許添一人幫辦一正一副可不誤公現在掛名書役悉令歸農則窩盜之人少而盜藏身之地亦少矣等語臣查掛名書役各處皆有如科臣顧祖鎮所奏貼寫掌案幫役白役等名色則皆非掛名書役也蓋貼寫乃甫經學習幫寫文移之人掌案則久於衙門熟諳章程辦理稿案之人幫役白役即各役內之副役跟隨正役以效奔走之人皆非徒掛空名者也所謂掛名書役者乃足跡不至衙門經年不見本官不知辦案為何事差遣為何事按冊有名服役無人惟津貼紙筆之費以幫辦事書役此則為之掛名書役也查各衙門書役除州縣書役近在本處向不換班外其督撫司道府書役皆散處各屬率分為上下班輪流辦事若按經制額定之數每名再添一人則各衙門不過寥寥數人安能辦公無誤即如臣衙門經制書吏上下兩班每班十名共二十名今現在辦事書吏頭班二班俱有百餘名是較經制十倍有餘事務殷繁尚苦趕辦不及若以一正一副計算每班不過二十人以百餘人辦理不及之事而欲責成於一二十人其可得乎由此而推則各衙門書吏以一正一副留用乃萬萬不能之事其貼寫一項跟隨學習幫寫文移及閲歷日久漸次明白即接辦事務是今日學習之貼寫即將來辦事之經承而且書寫需人不能革除者也經制典吏役滿出缺新募典吏何能辦理文案故必需熟諳書辦職掌稿案無掌案則事務茫然是又掌案之不能革除者也至若幫役白役專視差遣之繁簡如差多事繁正役不能親身出差因有幫役白役為之代勞上司稽查不嚴本官有意徇縱則一票到手便為利藪所至之處如狼似虎恣意勒索正副分肥臣深知其弊是以嚴禁司道之差不許下府州府州之差不許下屬縣其有萬不得巳之事必須差提者則令所差之衙門將差役姓名報臣查考如犯有需索之弊必痛加懲處所以一年之內各衙門之差提甚少差既絶少利何從覓正役之盤費尚且竭蹶何能更養副役此又幫役白役不禁而自除者也至掛名書役既不服役衙門其所以掛此空名者蓋亦有故或家有田産藉以支持門戶或居鄉被人欺凌藉以攩抵外侮具呈投認之後必行地方官查其身家是否殷實有無過犯違礙取具印甘各結方准注冊雖人之誠僞難必大抵皆有産業之人也若科臣所奏是乃市井無賴一無恆産之窮民不但不能掛名於官并書役亦不肯與之為儔又豈能把持行市窩匿娼賭使令盜賊其他包攬錢糧等事更不必言矣要之窩盜通盜第一係不法捕役其次則不肖營兵與勢豪土棍臣雖不敢謂掛名書役中必無窩盜之人然如科臣所奏窩盜之人半屬掛名之役去掛名之役即少窩盜之家實非確論臣愚以為但當嚴查其行止以分别去留如平時果有生事把持等類不但掛名書役急當革究即現在辦事之書役亦當革究若實係安分自守藉支門戶以禦外侮雖有書役之名實與農民無異似可不必盡行革除蓋司道府衙門書吏本無額設工食又有紙筆等費既將各項陋規裁革不許受賄作弊若併此掛名津貼亦為革除則紙筆之費亦無從出矣况各衙門書役實非一正一副所能辦理所有科臣顧祖鎮條奏盡除掛名之役止留一正一副之處應毋庸議臣實智識淺陋緣奉㫖令臣密議具奏謹將在外辦事書役及掛名書役原委據實僃陳覆奏是否有當伏乞聖裁為此謹奏所議甚透可謂剖析無遺其原奏寢而不發矣雍正七年九月二十九日河東總督臣田文鏡謹奏為欽奉聖訓據實覆奏事雍正七年九月二十二日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀於臣恭報黃河秋汛平穩摺內欽奉硃批今嵗秋汛極大一切堤工俱安堵無虞卿等之忠勤勞效更屬顯而易見朕嘉悅之懷筆莫能罄但淮黃交㑹處屢報清不敵黃深以此為憂目下雖尚無妨然不可不預行詳籌熟計耳欽此竊念今嵗秋汛雖大仰賴我皇上至誠感格為淮黃交㑹之區必淮强河弱始可以敵黃濟運雖河水本強淮水本弱但黃水從清口橫過淮水從清口直出其直出之勢實強於橫過之勢我如臣前嵗奏請挑濬之賈魯河其上流諸水俱歸於賈魯河由朱仙鎮周家口入淮皆所以濟清而敵黃者也臣於治河之道本未通曉然就臣所知似可無煩聖心過慮也至豫省工程臣已屢行檄飭凡險要工程或用長樁大掃或應加鑲填墊務各及時料理停妥又令多僃物料以為來年桃伏秋汛之需總期硃批命卿總督河東上行下效早知必有此番整頓朕喜之久矣又奉硃批費金吾於此一任方見實心奉職朕亦極加奬譽但目今湖北上江兩省不得其人意欲於此二處酌量相宜命往撫治所遺藩司員缺以孫國璽代之卿意以為何如又有人言費金吾精神不足者不知確否查奏以聞欽此臣思撫藩重任用人大權鑒拔出自聖明臣何人斯而䝉皇上如此信任如此垂問臣伏讀之下實不知如何而可以仰答聖恩者也臣查費金吾自調山東布政司及今暫署撫誠如聖諭方見實心奉職臣思費金吾此番之矢志報效實由我皇上格外施恩特加褒奬中心感激之所致今又䝉聖恩欲用以為巡撫則費金吾之感激圖報不知更當何如也第查湖北上江均屬封疆重任自應敬聼諭㫖遵行然臣又不敢不為費金吾擇其人地相宜者奏請尚屬臣之所轄稍有未協臣即規正至若上江則獨斷獨行恐其不能悉出於至當惟湖北與督臣邁柱同駐一城時相見面可以化其偏而歸於正我不敢不於精神尚堪應付也再藩司一官為通省錢榖庶務之總滙責任綦重況東省正在整理之際尤非他省可比非有精明幹練之才任勞任怨之志而又肯實心任事者不足以收實效臣查孫國璽居官謹飭操守廉介固屬實心報主之員況屢䝉聖恩拔擢不數載而以縣令洊至藩司受天恩大有助臣整理之意更得好藩司以代費金吾則逺可為臣耳目近可為署撫臣指臂其有裨吏治實非淺鮮兹䝉皇上垂詢理合據實覆奏又於臣奏謝署理城守尉印務摺內欽奉諭㫖朕因阿里袞居心誠慤擢用今職然尚恐其不克勝任殊不料才具操守竟能若是也覽卿所奏曷勝愈愜之至新任白成額朕觀非實心任事之人甚缺妥協卿於其到豫後再三勸勉諸凡行為稍有不及阿里袞處即直言規正倘不肯聼受憚於遷改據實具奏以聞欽此臣查副都統白成額於九月十五日到任臣即於是日將城守尉印務交受接見之時聆其言語觀其舉動似不及阿里袞之老成諳練伏讀聖諭益信我皇上明同日月無逺不照至臣受恩深重無可仰報凡遇滿漢文武官辨無論新舊同寅諭㫖敢不再加勸勉直言規正如果不肯聼受憚於遷改容臣據實奏聞又於臣奏明存貯入官硫磺仰請給發各營以僃火藥等事摺內欽奉硃批料理甚是但不知此項硫磺部中曽否有案或應具本題明或應咨部分發斟酌合例為之欽此臣查此項硫磺原屬百姓私販地方官拏獲到案照律杖責將硫磺入官存貯向來杖責人犯俱係督撫外結並不報部部中並無檔案是以歷任撫臣俱將此項硫磺給與標營合製火藥自臣撫豫以來臣標施用火藥係臣動支養廉銀兩捐給製僃惟上年操演車陳取用八百斤臣思此項硫磺存積日久部中並無檔案不便遽爾題明咨部臣是以奏明皇上分發各鎮標營以為製造火藥演放鎗炮之用於奏再升任登州鎮臣萬際瑞奏明東省沿海炮臺應建出炮城之外等因並繪圖進呈荷䝉皇上發下令臣畫一修理再加斟酌而行竊念海疆事宜臣䝉聖恩總督山東時刻留心而沿海炮臺臣於上年巡視諭㫖遵即一面轉行知照一面斟酌料理理合先行覆奏所有奉到硃批原摺并萬際瑞原摺圖式一併恭繳為此謹奏丙夜燈下逐條省覽一一批示矣同日又奏為恭報蘭陽工次化險為平官民共慶聖德光昭事雍正七年九月二十五日據下南河同知劉永錫報稱竊查黃河自蘭陽北岸銅瓦廂流至朱家莊又自朱家莊流至南岸文家寨東流至四水口復從四水口流至朱家寨周圍環繞計長四十五里中隔乾灘二里有餘河勢兜灣不能暢行以致上流停壅屢生新險蓋因大河逼近大堤掃灣迎溜勢極危險數載以來每遇水長必需加謹防護以禦黃流大河形勢自蔡家水口對面至耿家水口河勢灣兜迎溜衝射鄰近大堤甚為險要連年將耿家水口支河堵斷不致掣溜向南今嵗伏秋水勢甚大逐漸坍塌河崖塌去百餘丈切近耿家水口支河壩工於九月十九日仍復坍塌正在躊躇欲於支河壩頭下掃裹護修建挑水壩以防河勢侵汕將繩纜長樁料物等項俱巳預僃齊集相機修做今耿家水口支河壩北頭於十九日大溜仍走南崖於二十日酉時大河水勢緩流自銅瓦廂以下朱家寨之北河流直趨將舊有乾灘刷透竟成新河一道順勢東流從前灣繞之大河淤斷不流竟成清水新開之河面寬百十餘丈深一丈六七尺不等大溜順流東下往來船隻行於其中舊日之河繞行四十餘里今新開之河取直只有數里舊河淤墊將來竟成陸地可供耕種蘭陽之工化險為平官民兵夫人等莫不感頌聖德歡呼載道等情具報前來復據管河河北兩道具報無異臣查蘭陽銅瓦廂至朱家寨從前河勢兜灣繞行四十餘里河流壅滯易於生險每年極力防護幸保無虞今不勞人力不費帑金天然新開引河一道一旦成功實出神助在工官民兵夫人等無不傳為罕見此皆仰賴我皇上厪念河防至誠至敬感格天祖是以神靈默佑化險為平河流循軌萬年底定并舊河淤墊成地將來可供耕種則樂利攸資安瀾永慶而豫省官民共祝聖天子萬夀無疆之福矣臣不勝歡忭慶賀之至理合繪圖進呈御覽為此謹奏蘭陽工段化險為平實可慶幸朕以手加額覽焉雍正七年十月二十四日河東總督臣田文鏡謹奏為遵㫖覆奏仰祈聖裁事竊照河南南汝道李英居官平常才識鄙細臣於奉㫖詢問案內據實奏聞奉硃批諭㫖李英材器原屬庸下不堪乃昔日藩邸舊人為朕所深知者因詢之歷任上司皆言克勝厥任姑懷疑暫留此奏朕深為嘉悅候另有諭㫖欽此仰見我皇上至聖至明臣下賢否悉在睿鑒之中今奉㫖將李英革職其員缺著臣於河南山東知府內揀選題補伏念臣一介庸愚荷䝉聖恩如此信任臣敢不矢公矢慎詳加揀擇以仰副我皇上為地方得人之聖意查南汝道員缺實為緊要臣於河東兩省知府內再四揀選惟河南開封府知府董自超老成持重廉謹勤慎在任兩載實心任事秉公察吏毫無欺飾實為賢能之員以之補授南汝道必能整綱飭紀表率屬員有益地方如䝉皇上恩允則開封府知府一缺地居省㑹庶務倍繁且有南北兩岸河工亦屬要缺臣仰體天心慎重地方謹一併遴選冒昧奏請聖裁查開封府下南河同知劉永錫年富力彊志勤才敏於雍正四年十二月內黃河澄清該員遲報一案經前任總河臣齊蘇勒題參奉㫖革職留任今經兩載臣留心體察該員感激天恩倍加奮勉晝夜勤勞風雨不避於凡河工事務實力辦理相度平險斟酌機宜修防保護之法較前更為練達河員內無出其右者且能虛衷學習留心吏治實為可造之才但其革職之案尚未開復臣不敢遽以知府題補可否仰懇皇上天恩令其署理開封府印務則一府所屬南北兩岸工程俱可資其料理固於河工有益而該員在豫年久於開封地方事務寮屬賢否習見習聞更於吏治有益臣從前屢奉諭㫖揀選知府因河工緊要不肯使之逺離是以未將該員題補别府今在開封既可經理郡務仍得兼顧河防用是不揣冒昧奏請聖裁除恭疏具題并給咨赴部引見外謹繕摺恭奏董自超可否補授南汝道劉永錫可否署理開封府知府𢎞恩出自聖主臣未敢擅便為此謹奏好具題到日有㫖同日又奏為欽奉聖訓據實覆奏事雍正七年十月十六日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀於臣覆奏黃河秋汛平穩摺內欽奉硃批君臣原屬一體何有彼此之分朕據事論功道其實耳非推美於卿等也設遇不忠不勤之輩朕即欲獨擅其美而亦豈可得乎又奉硃批可謂大竒此段議論與朕前日面諭孔育珣者如出一口令其堅築土堤再將石工加髙數層總命伊於到任後酌量措施又奉硃批如此籌計周詳朕懷實慰欽此臣伏念君臣之間本無彼此惟我皇上為堯舜之君斯臣遂得為堯舜之臣是臣等䝉恩褒美實由皇上至美無加在天心廣大視臣一體原非推美於臣工而臣亦不敢於君父之前稍有虛飾也再髙家堰為全淮堤防實關緊要我皇上睿慮周詳早巳厪念髙堰特命河臣孔育珣於到任後酌量再將石工加髙數層硃批所慮恰與朕意相合又奉硃批非不欲出於至公至正總緣缺至誠耳又奉硃批自當多方訓誨以䇿勵之又奉硃批揆宜處事全賴精神果如所奏甚善朕亦以此詢問伊本人矣欽此仰見我皇上睿照無遺絲毫不爽臣查費金吾為人所缺者實係至誠二字即如東省積年舊缺多係衙役侵收捏缺朦混經臣嚴檄司道府州嚴行糾察徹底清查但各官均有失察之咎臣思東省正在清查錢糧之際正欲各員自為覺察詳報之後若即以該員失察題參恐别員畏懼處分反為蠧役徇庇不實力察報臣是以於本年八月內具摺奏請聖恩暫緩題參乃費金吾於九月二十八日將衙役侵蝕各官失察一案繕疏題參後始將㑹稿送到臣處令臣注題臣思此案巳經具奏在先不敢前後互異以欺聖明且查署撫臣嶽濬於九月二十九日回任若云錢糧事件急需題參則同屬公事同屬朝廷臣子費金吾於藩司衙門內既已具詳自應聼嶽濬具題何必於嶽濬回任之前一日以並未㑹題之事而詭云㑹題即此一事誠如聖諭總緣缺至誠之明驗也臣深知其為人是以前摺內仰請硃批近於浙於閩兩任甚好此人卿其加意訓勉以造就之將來可望成器又奉硃批欣悅覽之欽此臣查孫國璽固屬實心報主之員況屢䝉皇上拔擢受恩既深圖報自切是以浙閩兩任實為好官臣欽奉諭㫖自當加意訓誨俾之奮發砥礪鋭志向上以仰副我皇上造就人材之聖意又於臣覆奏副都統白成額摺內欽奉硃批朕亦有訓伊之㫖諒其接任後自當徐告卿知卿所陳奏與朕所以訓伊者不約而相符誠可謂深知朕心矣朕曷勝欣慰欽此伏念內外大小臣工無一不䝉皇上訓誨一經聖恩教導倍加敬凛白成額既奉有諭㫖自必感激奮勉日漸妥協至臣不過仰體天心宣布欽奉諭㫖在外方可向東西施放而臺內地方更屬寬展莫言無區别也欽此臣查沿海炮臺一案臣業巳檄行山東布政司照㑹登鎮斟酌料理俟詳覆到日容臣另摺覆奏又奉皇上以天縱之聖九重之尊尚夙夜勤勞兢兢業業凡為臣子者反志在宴安惟圖暇逸不惟有負聖恩亦何顔仰對皇上臣惟有敬志諭㫖益加黽勉而巳所有奉到原摺理合恭繳謹奏黽勉不倦固屬美行雖然卿年齒巳髙諸凡當量力而為不可勉强勿將精神浪費於瑣屑處此非自圖暇逸乃為國家愛惜精力多延嵗月庶可布化宣猷以無負朕康濟蒼生之意也雍正七年十一月初七日河東總督臣田文鏡謹奏為恭報河東兩省雨雪日期仰祈睿鑒事竊查本年九月二十三日豫省獲有瑞雪經臣恭摺具奏兹據豫省合屬具報於十月初五初六十四等日各得雨入土二三寸不等又據東省合屬具報於十月十四十五十六等日各得瑞雪二三寸不等兩省獲此雨雪土脈滋潤麥根堅固理合繕摺恭奏仰慰聖懷為此謹奏如是希微雪雨少資沾潤而已恐無濟於事也同日又奏為臬司關繫綦重職守務在得人據實奏明仰祈聖鑒以收實效事竊臣查山東按察使公元前䝉皇上簡授河南按察使於未到任之前經臣具摺恭奏請以河南糧儲道陳世倕補授河南按察使其時山東按察使吳昌祚亦尚未到任臣復請以公元改補山東按察使仰䝉皇上俞允並欽奉硃批諭㫖公元亦係一老成人原欲令卿就近體驗今既懇請改補山東同為所轄地方均無不可須極力加以教誨然後令往果否稱職更留心試看具奏以聞欽此仰見我皇上眷顧優隆推誠逮下臣欽遵諭㫖留心試看公元到任以來人止謹厚才不優長所辦一切案件不能詳慎平反擲發姦隱止據府縣審定供招依樣率轉臣屢為指駁令其更改臣又敬遵皇上聖諭極加教誨不但時行牌檄嚴加申飭又復數致手書諄諄戒勉並札致前署巡撫臣費金吾就近開導冀其練習精進無如限於才力終無斟酌盡善之能且少精明振作之氣臣何敢瞻顧因循聼其曠廢職守所有試看公元不能勝任情由理合據實奏明惟是臬司一官刑名總滙民命攸關不但通省之獄情藉其研審核擬伸寃理枉而且有鋤强剪暴之權禁姦察吏之任茍非强毅幹練之才聼斷精詳之識安能昭雪明允有以上勷聖化今山東藩司荷䝉聖恩特簡孫國璽補授已慶得人惟臬司尚乏幹員臣再四思維誠有不得不仰懇聖慈者伏查山東鹽法道唐綏祖才識優卓奉職勤敏去嵗兩署臬篆辦理有效今夏又經臣奏明將東省參案委令審理巳據陸續審解情罪相符而於所屬官員尤能體訪明確以之讞獄察吏洵其所長又山東登萊青道孫蘭芬操守謹嚴强幹明白不避嫌怨亦有折獄之才又豫省河北道朱藻自䝉天恩留任以來矢心圖報夙夜精勤釐姦剔弊吏民咸深畏戴以上三員皆臣深知灼見之人於臬司一官均堪勝任臣䝉皇上髙厚隆恩畀以兩省封疆重任山左距臣為逺尤藉賢員以資助理今公元不能勝任其山東按察司可否於此三員之中仰請聖恩簡用一員則東省刑名不致叢脞吏治民生均有裨益莫不仰戴天恩於無既矣是否允協伏候聖裁謹奏朕原料公元不勝臬司之任所奏嘉悅覽之就此三員內而論惟唐綏祖最佳候另有諭㫖孫蘭芬性過於急不宜執掌刑憲朱藻遷轉似覺少驟且河北現屬要任冉令供職數年然後升擢亦不為遲今或調用鹽道猶可卿其斟酌宜否援㫖具奏同日又奏為奏明事竊臣才質庸陋忝膺兩省封疆重任惟有日夕黽勉不敢少自暇逸以期仰副皇上委任眷顧之至意臣偶於十月初三日微冒風寒適值武闈届期自初六以至十二等日協同南陽鎮臣馬世龍考取頭二場騎射技勇十三日入闈考試䇿論十九日放榜所感微寒場中調攝巳愈旋署之後不自經意復於二十六日時作寒熱兼之咳嗽頭暈數日以來服藥調治一切應行公事臣仍支持辦理惟恭逢萬夀聖節及長至令旦臣當首引僚宷歡呼揚拜而公所嚴肅之地誠恐起跪趨蹌有失禮儀是以敬於臣署恭設香案望闕叩頭惟念朝賀大典中外同慶而臣以犬馬之疾不能趨班拜舞此臣之心凛咫尺而踧踖靡寧者也所有未及率陳世倕明於醫理用藥精細臣服其方劑甚有效驗今風寒巳散現在調補日見痊可臣䝉皇上天恩豢飬至厚保護至周深恐上聞有厪聖念臣心益切不安謹一併奏明為此謹奏至平復如初時奏朕知之此種寒證若愈後調理得法併夙疾俱可望霍然頓除設或攝養失宜亦大為將來之纍極加慎重可也陳世倕雖云諳於醫藥恐其臨證日少仍選擇良醫須平昔所熟識者一二人與之參酌方劑為妥酬酢事務切戒勉力支持以致耗損精氣縱至稍有遲誤何傷乎卿其遵㫖毋違硃批諭㫖卷一百二十六之十八欽定四庫全書硃批諭㫖卷一百二十六之十九硃批田文鏡奏摺雍正七年十一月十六日河東總督臣田文鏡謹奏為恭報得雪日期仰祈睿鑒事雍正七年十一月十五日據臣齎摺家人回豫禀稱奏事轉傳上諭山東地方得過雪了聞有五六寸京城得雪也有五六寸保定府一帶得雪有一二寸你回去說河南一得了雪即寫摺子奏來欽此仰見我皇上厪念民瘼各省之一晴一雨無時不上繫聖懷今豫省于十一月十四日早天試微雪及至十五日子時大雪普降至十六日子時方止其十五日午時以前所落之雪隨下隨融俱已浸潤入地午時以後之雪始得存積至十六日子時巳厚五寸有餘合計融過之雪共得雪八九寸是日彤雲密布雪勢甚逺兼以無風所積之雪不至吹散滲沃土膏均霑透足臣于十五十六兩日每早遣人四出踏看城鄉百姓共稱瑞雪應時咸皆以手加額歡呼欣幸在我皇上深宮垂念方眷注于豫省之人民一誠格天即兆錫豐年之景象諭㫖方𫝊瑞雪普降聖天子存神感召徴應之速一至于此臣惟有與豫省官辨兵民共頌皇仁髙厚仰祝萬夀無疆而巳竝據開封府屬各縣報到得雪尺寸俱各相同其餘各府州縣俟其報到容臣另摺奏聞所有得雪日期理合具摺奏報仰慰聖懷為此謹奏從前雪雨雖微再得此番接續諒應透足矣若果通省均霑朕懷欣慰何似同日又奏為欽奉上諭事竊照發遣廣西人犯達色馬守柱蔡登科耿桑格六格太監吳守義霍成心懷怨望捏造悖逆之言沿途布散一案前奉諭㫖令臣明白開導解送人員將所聞伊等捏造悖逆之語一一據實說出臣即欽遵聖諭訊明解役辨兵所聞悖逆之言于雍正七年九月二十二日經臣恭摺奏聞續據確山遂平西平臨潁等縣汝寧襄城二營據兵役將所聞達色等悖逆之語一一說出解臣親訊臣復再四開導密加詰訊據供所聞悖逆之言大概與臣前摺所訊兵役之供相同并據供稱這些悖逆的話小的們實說不出口等語夫以兵役之微尚知尊君親上深明大義以語涉誣妄不敢肆口直言而達色等受國厚恩乃敢悖理逆天造言誣聖此等病狂喪心之語更甚于犬吠狼嘷臣訊問之下不勝切齒痛心何敢屢形紙筆再瀆天聽理合據實覆奏為此謹奏提解各犯到京一一詰訊俱巳供認更有夢想所不到奇怪可笑誣捏誹謗之語朕皆逐條分析特降諭㫖通行直省一體曉示料卿所聞悖逆情詞大抵不出各犯在京所吐之供可謂至矣盡矣而無以復加矣録來亦不過付之閒覽耳同日又奏為欽奉聖訓據實覆奏事雍正七年十一月十五日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀于臣覆奏摺內髙家堰石工一條欽奉硃批前因覽卿之奏朕意決定無疑業經降㫖遣差京官四員飭發庫帑百萬命往堅築髙家堰堤工矣若待孔育珣奏到然後施行恐誤今冬辦料大凡善政須貴勇為既知當為矣又復逡巡無怪事功難就所以古人每有後時之戒此番速舉似于河防大有裨益也欽此臣捧誦之下仰見我皇上聖謨宏逺此舉利益萬世永慶安瀾竝恭繹大凡善政須貴勇為之訓益見我皇上至聖至明但有利于國計民生之處不惜浩費不緩須臾總由天心默運斷以乾剛合之千古大聖人出其聰明才智立德立功以與天地同其悠久者先後誠若一揆也又于臣覆奏費金吾一條欽奉硃批自必訓誨但肯遵從與否要觀伊之福量何如耳若果為福量所限即費金吾自欲勉強亦恐不能然斷不能逃朕之覺照也欽此仰見我皇上愛育臣工生成造就不憚訓誨諄諄費金吾倘稍有欺飾之心皇上日月之明無微不燭自不能逃于鑒臨之下也又于臣敬覆皇上燈下所批之諭㫖復欽奉硃批因燈燭之下字畫潦草恐卿慮及朕之精神不到故有前諭非欲示朕之精勤也欽此臣跪讀之下聲淚俱墮我皇上日總萬幾燈下猶自披閲不輟乃以御書字畫恐臣仰念聖躬此非深鑒臣心犬馬戀主之微何能垂注至此也但臣素知皇上乾行日健福履時綏惟是宵衣旰食之餘猶不肯少自暇逸雖純一無間九重不自覺其勞而微臣瞻仰之餘誠不能不彌深其欽誦也又奉硃批黽勉不倦固屬美行雖然卿年齒巳髙諸凡當量力而為不可勉強勿將精神浪費于瑣屑處此非自圗暇逸乃為國家愛惜精力多延嵗月庶可布化宣猷以無負朕康濟蒼生之意也欽此臣益感激無措不知所言伏念臣至愚至陋仰䝉皇上畀以兩省重任寸心圗報無刻可安惟有竭蹶黽勉以副聖明眷顧之隆昨因武闈之後重冒風寒業經調治痊可臣恐有厪聖恩之嵗月臣敢不謹凛聖訓量力自愛以期無負聖主撫育之鴻慈也所有奉到原摺理合恭繳謹奏覽日前所保縣令昨到京引見朕于三員中觀程秉禮人甚明白氣度從容雖未見可大用處儘堪勝府道之任將來尚望其長進張鏐張瀚殊屬平庸不過謹守繩墨牧令之才耳未必克勝表率之職朕係一時鑒别偶爾評論固非卿明試以功之可比無如舉止應對之間局量顯然易見卿再留心驗視自當洞悉不然前濟南之缺即于此二員內簡用一員矣雍正七年十一月二十七日河東總督臣田文鏡謹奏為續報豫省各屬得雪分寸竝東省得雪日期仰祈睿鑒事臣查雍正七年十一月十五日開封府竝所屬各縣得雪霑足業經恭摺奏聞兹據通省各府州縣陸續報到于十一月十五日普沾瑞雪各得五六七八寸不等四野沾濡麥根深固又于十一月十九二十及二十一二十二二十三等日各屬復有得雪二三寸四五寸不等者豫省之雪今巳均被霑足理合繕摺續奏仰慰聖懷又據東省各屬具報亦于十一月十五日各得雪四五寸及二三寸不等理合一併奏聞伏乞睿鑒謹奏應時之雪兩省均被朕懷深慰不復為河東厪念矣同日又奏為欽奉聖訓據實覆奏事雍正七年十一月二十五日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀于臣奏明感冒風寒未及率班朝賀摺內欽奉硃批卿年巳髙邁理應如是節慎向後諸凡處不宜強動審擇輕重量力而為庶不有負朕意愛惜精神為國家久逺報效方為克盡臣職也欽此臣以犬馬之微重䝉天恩豢養自顧駑駘不堪驅䇿惟報主微誠根于天性雖筋骨就衰而血誠彌篤敢不祗遵聖訓努力自愛以副聖主保護無巳之深恩以伸微臣無窮之至願耶又奉硃批至平復如初時奏朕知之此種寒證若愈後調理得法併夙疾俱可望霍然頓除設或攝養失宜亦大為將來之纍極加慎重可也陳世倕雖云諳于醫藥恐其臨證日少仍選擇良醫須平昔熟識者一二人與之參酌方劑為妥酬酢事務切戒勉力支持以致耗損精氣縱至稍有遲誤何傷乎卿其遵㫖毋違欽此仰見我皇上慈懷周摯至論精微臣伏讀之下能不感激涕零竊臣之病今已全愈惟元氣尚未全復現在加謹調攝進服補劑䝉我皇上恩賞內府人參功效更倍不日之間即可調理如初今新愈之後飲食更覺甘美但不敢過于饜足至于陳世倕臨證原少誠如聖明洞鑒但其醫理確有根據而于傷寒一門尤為辨别精細所治雖無多人然每有診視無不應手霍然臣初起病時據云六脈浮沉皆帶洪數實因感冒之中又加感冒熱邪為風寒所鬱由淺入深遂自少陽直達陽明胃經所以用小柴胡湯合甘露飲重加生地黃連以守隂兼用知母黃柏以治胃依方服之半月有餘脈靜身涼諸證悉平近則與之參酌補劑服亦相安竝有向日所知之江南醫者一人共為商酌總之臣身至微君恩至重臣亦不敢以犬馬圗報之軀而輕付于碌碌庸醫之手有負我皇上眷顧之隆也至于兩省事務臣雖不敢過于勉強然儘可照常次第辦理但因新愈之後又䝉聖諭諄切令加謹慎臣益當小心調護現在謹避風寒不敢即出堂審事所有豫省應審事件臣謹遵㫖暫緩但山東解到參案數件隔省路逺不便令其守候臣暫委河南按察司陳世倕就近代臣審取確聖鑒又于臣奏明公元不勝山東臬司摺內欽奉諭㫖朕原料公元不勝臬司之任所奏嘉悅覽之就此三員而論惟唐綏祖最佳候另有諭㫖孫蘭芬性過于急不宜執掌刑憲朱藻遷轉似覺少驟且河北現屬要任再令供職數年然後升擢亦不為遲今或調用鹽道猶可卿其斟酌宜否援㫖具奏欽此仰見皇上至聖至明無逺不照唐綏祖補授按察司實足勝任孫蘭芬性原過急而近年以來亦漸次和平朱藻遷轉少驟河北要地亦不可乏此幹員至于鹽道一缺裕課恤商禁私剔弊尤關緊要兼之山東登萊青三府所屬蓬萊等一十六州縣俱係濵海地方民竈雜處地多鹻滷以鹽為業各州縣從無商人賣鹽銷引雖有商民報部而其辦納鹽課有向在地丁攤徴者有民竈均辦民攤地丁竈按户口者有貧民小販領票賣鹽辦課者各有不同相沿已久且通省鹽法向來積弊多端自上年奉㫖清查而諸弊顯露須得歷練老成識見明敏之員任以運使協助鹽臣整飭俾之裕課便民臣查登州府知府楊𢎞俊才幹練達人亦端方謹飭蒞任登郡將及三載所屬八縣均有民竈雜處其于行鹽辦課事宜亦能周悉情形以之補授山東鹽道洵屬人地相宜容俟部咨到日臣謹遵㫖繕疏題請恭候聖裁合先奏明伏乞睿鑒謹奏山東鹽道員缺巳有㫖命卿題補矣部文到日指名奏請可也同日又奏為奏明事竊臣于去嵗奉命節制山東凡關吏治民生無不加意整飭而地方營伍臣又時刻繫心蓋東省武辨闒茸成習兵丁偷惰相安是以臣諄諄誡諭務期杜虛冒嚴剋扣勤加操練不許滋事擾民再東省各營器械多不如式旗幟多有朽舊盔甲鑼鍋帳房等項率多鏽缺不全臣於去嵗赴東身歷各營親自查看其所不及身歷之處委官分查明確當即檄行兗登兩鎮飭令添補修理查議造冊去後至次年三月內始據兗州鎮臣嶽含竒將所屬十四營路添造帳房器械等物數目清冊咨呈前來臣查所送冊內竝不將現存原物分别堪用不堪用酌量修補但據各營混造槩稱另製恣意繁費殊不妥協隨經逐一指駁行令悉心確議據實另造呈送嗣因逾久不覆又經疊次檄催延至十一月十五日始將清冊送到竝據該鎮禀稱本職所屬十四營路凡應添應造之軍需事宜巳于今年正月內奏明欽奉硃批諭㫖諸事與督臣田文鏡悉心商酌若能聽伊指示實力奉行自然得其是當勉力為之欽此今將清冊呈奪等情到臣臣捧讀諭㫖不勝悚異查各營軍需臣于去嵗檄行修理今年正月該鎮又自行奏請奉有硃批理應欽遵實力奉行竝即與臣知㑹以便遵㫖商酌加謹辦理早為奏聞何竟任意延擱遲至經年之久始將硃批録送到臣而且禀內又稱前奉飭查造冊業經核減畫一因赴省監射以故遲遲等語查臣于三月內將冊駁回另造該鎮于十月內赴省監射武場中間相距共計七箇月有餘豈有一冊不能更造妥確而尚借監射之事以飾其遲延之咎不但見其居心之欺詐而更見其掩匿之愚庸况所送到之冊尚未核減妥定容臣確酌畫一統與登鎮之冊一併再為奏明臣又查去嵗覆奏請訓摺內欽奉硃批嶽含奇亦經調用山左不過庸常之器命臣更加試看欽此仰見聖明洞照絲毫不爽臣訪得今年四月內該鎮中營撥兵劉得勝王𢎞志等强賃生員尚𢎞賔之房居住又該鎮所轄泰安營兵丁姚四馬守業等于本年閏七月內強拉民婦袁氏飲酒袁氏不允即行凶毆撕衣又該鎮衙門官頭周道生各汛駐防千把皆趨奉之每將娼婦扮作良婦用車拉載送與道生嫖宿又該鎮管廚家人周佐亦時常出外與水夫董玉之妻姦宿該鎮均無覺察又該鎮所屬辨兵臣去嵗在東考驗技藝多屬平常經臣勒限三箇月務令學習􅈺熟而今年每次送考員辨仍未見其優􅈺昨據保送千總張文煜年滿赴部經臣考驗弓馬不堪當即駁回注冊現准部覆在案夫考驗之兵丁皆其挑選精􅈺者然後呈送而現任來考之千把又係管兵教習之人所有技藝均屬如此則營中之兵丁不能訓練精熟巳可槩見臣查整飭營伍寧謐地方乃鎮臣之首務嶽含奇分應感激天恩加意奮勉俾營伍日有起色方不忝于職守今臣見其所轄兵丁時復生事家人官頭亦無約束而辨員技藝不能督率精􅈺乃至欽奉諭㫖之事亦且任意疏忽耽延臣事事不敢欺瞞聖明兼以欽奉諭㫖命臣試看理合繕摺一一據實奏聞伏乞睿鑒謹奏嶽含奇原屬庸材前諭甚明況又目不識丁但念係嶽鍾琪之姪其方寸中未必即忍負朕卿其再加訓誡驗視聞各鎮皆係本標中軍主持事務或將其中軍員缺選補一妥協幹練之人俾令匡救其失更命嶽濬留心幫助以觀後效雍正七年十二月初八日河東總督臣田文鏡謹奏為恭謝天恩事雍正七年十二月初七日臣齎摺家人回豫恭捧皇上賜臣微紅京米二斗火腿六隻鴨子四隻野雞十聖眷頻䝉頒賜有加無巳復䝉我皇上念臣痊愈方新特賞御米做粥香滑津潤容易尅化而天廚珍品下逮微臣臣何人斯一飲一啄之微俱在聖慈垂注之中曲體周至百感難鳴臣惟有竭盡駑駘以圗仰報天恩于萬一耳所有感激微悃理合具摺奏謝伏乞睿鑒為此謹奏覽卿奏謝知道了同日又奏為欽奉聖訓據實覆奏事雍正七年十二月初七日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀于臣覆奏摺內欽奉硃批當于溫暖室中安居靜攝加意調養須待平復如初方可出户行動即遇元旦朝賀之期亦不必勉強從事敬君盡禮不在叩拜儀文上論定但遵㫖行縱令無知之輩妄生訾議有朕為卿作主也何妨欽此臣跪讀聖諭仰見我皇上無時無事不為臣慮及深逺天恩髙厚感激涕零但臣自十一月下旬以後神氣如常身體漸旺飲食亦復如舊惟足力少軟尚未能步履往來今荷聖慈垂念預飭元旦叩賀亦令不必勉強臣屆期自量可以行禮臣當親詣公所率班揚拜倘或趨蹌未逮臣即恪遵諭㫖不敢強自支持謹于臣署恭設香案望闕叩頭以伸犬馬微誠總之人臣事君惟在矢誠自信浮言妄議上有硃批日前所保縣令昨到京引見朕于三員中觀程秉禮人甚明白氣度從容雖未見可大用處儘堪勝府道之任將來尚望其長進張鏐張瀚殊屬平庸不過謹守繩墨牧令之才耳未必克勝表率之職朕係一時鑒别偶爾評論固非卿明試以功之可比無如舉止應對之間局量顯然易見卿再留心驗視自當洞悉不然前濟南之缺即于此二員內簡用一員矣欽此仰見皇上甄别精明毫髮不爽程秉禮辦事明白人亦和平恬靜氣度安間將來洵有長進今䝉特授河南府知府實勝表率之任張鏐才非卓越但居官謹飭辦事勤慎且能力行保甲具見實心張瀚則才情頗有辦事亦勤惟氣象粗浮有缺沉重在州縣之中均堪稱為優卓而于表率之任局量未稱仰䝉聖諭指示臣當留心再為驗視所有奉到原摺理合恭繳伏乞睿鑒謹奏人實難知遷改尤難限量亦不可因朕一時之甄别遂永奉為衡鑑也同日又奏為遵㫖編輯訓示初任規條恭呈御覽仰請睿裁事雍正七年閏七月二十九日臣欽奉硃筆諭㫖朕于即位之二年冬間念及州縣各官比皆初任諸多未諳或偶因才力心思一時不到致被參黜人材殊屬可惜特命朱軾沈近思二人追憶向日巳所閲歷如孰師訓䝉一般指示蒞事臨民法則綴緝成書以為新進楷模續因朱軾丁憂而又久病且筆下亦甚艱澀沈近思復經物故所以蹉跎至今未就昨李衛來京陛見言及此事伊奏稱曽有訓誡屬員一册隨進呈朕覽披閲之下尚覺不甚愜意況亦非開導初任語句卿歷外任多年甚諳練吏治可于政務之暇悉心著作一部差人齎進朕彚集各處所擬于中採擇裁定然後降㫖刋布大抵不過如何交盤如何催科如何驗傷如何靖盜以及查詰吏胥姦欺等類耳欽此仰見我皇上加意人才𢎞施造就留心吏治牖啓愚䝉本惟精惟一之心𫝊立作君作師之治統洵足以超越千古帝王甚盛舉也惟是臣幼未讀書壯而筮仕雖自縣佐洊升州縣􅤬歷中外忝竊封疆是皆仰䝉我聖祖仁皇帝豢飬于前我皇上超擢訓誨于後虛糜廪祿逾四十餘年所謂夙夜匪懈靖共爾位者臣實未敢有以自信蓋心雖黽勉而才有未逮事雖更歷而識則未精今䝉諭㫖下頒命以著作以僃採擇庸庸鄙暗何克仰承聖意但臣蒞豫七載舉凡施政用人一切見諸行事者無非祗凛皇上之訓誨以為遵循竊取綸言之緒餘以飭官吏謹將臣平時告誡屬員中擇其事宜切近于初任州縣者共計編輯二十條略加點定以成章句蓋以欽遵上諭訓䝉之意俾新進者先識其端而已深慙固陋未有發明無以上副聖天子誘掖整飭之盛心好問察言之至意旦夕惴惴不勝悚栗敬繕一冊恭呈御覽是否有當伏候睿裁所有奉到硃筆諭㫖并浙江督臣李衛訓誡屬員一冊相應一併恭繳為此謹奏冊留中候詳覽有㫖同日又奏為東省修建倉厫恭請聖訓遵行事竊查積貯所以儲國用倉厫原以資蓋藏仰䝉我皇上聖明洞照特頒上諭凡各省未有倉厫之州縣著詳細查明商酌即行建造其建倉之費或動正項錢糧或支給存公銀兩酌量本地情形悉心定議具奏欽此臣查豫省倉厫數年以來經臣奏明動用公項修建在案惟山東倉厫向因該省各項榖石有存價未買者有應追民缺者有虧空在官者有撥借未還者實在存貯無多所以各屬倉厫竝不詳請修建而存貯之榖或借囤民房或寄頓寺廟甚至天堆露積漠不關心因循相沿洵非各屬舊有倉厫四千一百七十五間又應行修理之舊倉五百五十二間又入官房屋堪改倉厫二十四間又各員墊銀新建倉厫二百四十三間又糧道修理德常二倉六十二間以上各倉竝官房改厫每間貯榖多寡不等共堪貯榖二百三萬五千六百二十九石零尚餘榖一百二十八萬二千一百五十二石零照河南建倉每間貯榖五百石為率應添建倉厫二千五百七十二間但此倉厫止貯現存榖石一遇盤查交代未免翻騰露積亦應照河南酌建餘倉凡貯榖四萬石以上者建餘倉三間三萬石以上者建餘倉二間一二萬石者建餘倉一間計通省應建餘倉一百四十六間其屋改作倉厫又可減省大半每官房一間給修改銀三兩至各員新建倉厫係急公墊用應照添建工料銀數給還又添建通省正餘各倉每倉基一間應酌給地價銀一兩以上添建修理地基共估需用銀五萬一千二百七十一兩東省現有存貯公用銀兩可以動支無庸動用地丁錢糧竝聲明東省濵海州縣衛所地皆沙鹻民無陶冶若倉厫必令覆瓦未免購運他處又滋腳費即用海草亦堅實經久每草房堪貯榖五百石者發工料銀十三兩等情呈詳前來臣查修建倉厫必須蓋造完固以重民儲尤必核實工料勿滋浮冒今據所報現有倉厫是否實在數目有無隱漏應建應修有民地如有官地可建蓋者另當查明節省統俟工竣報銷臣逐項確查一一核實取具細冊送部不敢令有浮冒賠墊以及派纍滋擾草率修理等弊再動用銀兩現有歸公耗羡自不須動支地丁但東省倉穀欽奉諭㫖令於今嵗買足臣現在嚴飭採買均須倉厫堆貯若俟確估到日㑹疏具修建是否允協伏乞睿鑒為此謹奏覽雍正八年正月初二日河東總督臣田文鏡謹奏為恭謝天恩事雍正七年十二月二十六日臣齎摺家人回豫捧到臣覆奏摺內欽奉皇上硃批諭㫖覽奏欣慰特為卿有通飭諭㫖頒發直省矣欽此臣復接准部文跪讀通頒諭㫖仰見我皇上仁育萬類體恤羣工特沛曲全之恩𢎞施寬大之典內外文武諸臣罔不仰䝉怙冒惟是溫綸下逮實由犬馬微軀上厪聖念皇上欲厚其恩於臣而遂廣其恩於天下是天下臣工共戴之恩皆臣一人身受之恩也臣跪讀恩㫖敬捧硃批感激恩隆手足莫措不知作何圗報方能仰酬萬一臣自立春以來氣體復元步履漸健十二月二十二日封印之期臣即出堂照常行禮恭逢元旦令節臣謹率同文武官員敬詣公所望闕揚拜恭行朝賀禮儀謹一併具奏上慰聖慈所有微臣感激微誠理合恭摺奏謝伏乞睿鑒為此謹奏覽奏知卿步履如常朕心深為欣慰雖然仍當加意節慎不可稍涉勉強同日又奏為恭報得雪日期仰祈睿鑒事臣查豫省得雪勻足經臣于雍正七年十一月二十七日恭摺奏聞兹于十二月二十七日復降瑞雪自子至酉得雪三寸二十九日天氣晴明和氣噓暖當此春回地脈之初麥苗欣滎而瑞雪應時滋潤長養甚為有益適值年節民間睹此五風十雨莫不慶戴天庥咸歌樂利所有開封省城得雪日期理合恭摺奏聞仰慰聖懷謹奏覽奏得雪情形并民間年景朕懷曷勝愈悅昨嵗實未料直省普遍沾沐天恩至如此優渥也同日又奏為欽奉聖訓據實覆奏事雍正七年十二月十五日二十六日臣齎摺家人前後回豫捧到皇上硃批諭㫖臣敬啓跪讀于臣謝恩摺內欽奉硃批康熙二十年前皇考臨幸豐澤園于稻田中偶見一穗與衆稻逈異特命記取次年春選擇膏壤布種方得此米是乃上天所賜之奇榖嗣後御厨四十餘年􅊖炊此米作膳後始漸廣然掌管之員不敢輕以畀人以故外邊罕見即朕當日藩邸亦不能得此種也若以豇豆水瀹煮其色更紅其味更厚卿如喜食候更陸續賜來今內倉頗多非復似前難得矣欽此臣跪讀之下感悚伏地竊念聖祖仁皇帝德位名夀超隆千古實上天篤生之大聖人是以穹蒼協瑞特于豐澤園中産生竒榖以供玉食此誠尚方珍品世所罕覯者我皇上藩邸之初尚難多得此種今臣屢䝉恩賚又係嶽鍾琪之姪其方寸中未必即忍負朕卿其再加訓誡驗視聞各鎮皆係本標中軍主持事務或將其中軍員缺選補一妥協幹練之人俾令匡救其失更命嶽濬留心幫助以觀後效欽此仰見我皇上推恩逮下造就成全之聖意臣當謹遵諭㫖隨事誡勉其現任中軍遊擊李登華經臣考驗尚堪任使臣惟諄諭該遊擊實心任事俾該鎮得收臂指之助如其不能協助容臣另為選擇奏聞至撫臣嶽濬與該鎮誼關手足又在同省自應共相也又臣覆奏張鏐張瀚二員欽奉硃批人實難知遷改尤難限量亦不可因朕一時之甄别遂永奉為衡鑒也欽此仰見我皇上慎重人材誠恐偶有掩抑惟是聖明藻鑑原屬精當不爽今張鏐張瀚臣現再加驗視如能奮勵自進臣亦不敢匿其所長有負以人事君之義又于臣奏明修理東省倉厫摺內欽奉硃批憶卿奏朕曽有減貯之議何得尚存三百餘萬之多欽此查臣前于均勻貯榖案內除民缺虧空及減貯外核明存倉榖一百九十三萬八千一百四十七石零存價應買榖一百二十一萬八千九百二石零二共榖三百一十五萬七千五十石零此外將價銀提解司庫因未准部覆之先各屬有將應解價銀巳買榖收貯并應追民缺榖石今共計榖三百三十一萬七千七百八十一石零此乃巳經減貯之數也今除舊有各倉竝官房改厫共堪貯榖二百三萬五千六百二十九石零尚餘榖一百二十八萬二千一百五十二石零均須建倉堆貯共應添建正倉二千五百七十二間餘倉一百四十六間是以前摺敬謹硃批酌估之價毋乃太減乎恐不敷用欽此仰見我皇上明無不照體恤周至之盛意惟是東省此價係照硃批此論是當之極宜持定主見勿被搖惑莫因節省些微致誤積貯大事必用瓦覆方為妥協欽此臣查到日臣再恭摺奏聞又欽奉硃批所請甚是應飭令速行預辦毋遲欽此臣謹欽遵聖諭當即檄行山東藩司一面動支歸公耗羡銀兩分發各屬預為採辦物料轉瞬春融即可興工不敢令其少有稽延也所有奉到原摺理合恭繳伏乞睿鑒謹奏覽雍正八年二月初一日河東總督臣田文鏡謹奏為欽奉上諭事雍正七年十月初四日臣准部咨修治直隸山東江南三省道路一案奉㫖爾工部即行文三省動正項錢糧乘此農隙之時𣲖委賢員作速興工務于明春雨水前告竣朕仍遣員往查其修過橋梁道路等項著照爾等所請交與各該地方官隨時修整并令新舊交代永著為例欽此欽遵咨移到臣臣隨檄行山東布政司遵照轉飭各地方官上緊興工其橋梁道路務令修築堅實恪遵諭㫖務于雨水前告竣竝飭道府等官不時嚴行查督又經節次檄催去後嗣據各屬前後具報應修道購僃停妥請候春融動工等情臣復飭司委員查勘竝于本年正月初七日選委臣標把總分路前往東省將修完道路逐一查驗并將未完橋梁等工趁此春融立即催其加添工匠趕修完固統俟修理報竣到日臣再另行恭奏緣奉諭㫖務于雨水前告竣所有道路修完橋閘石工現在催修情由合先奏明仰慰聖懷伏乞睿鑒謹奏乘時興工先修道路可謂得緩急之宜卿所屬境內豈止此一二事妥協巳也同日又奏為奏明事竊臣于雍正七年十二月十四日准浙江督臣李衛咨開訪獲江省謀為不軌匪犯甘鳳池訊據供稱從前犯過一念和尚案內夾過兩次馬臬司開脫有夏林生係南京人在河南固始縣賣花樹生理他說城內有一周姓富家與現獲南京周崑來名潯者聲氣相通門下黨羽甚衆更有推盤手車子多人皆暗受其約束素有大志非止一日知交十年矣今嵗九月間又見姓夏的還是這樣說話約㑹犯人前往才到鎮江被差人喚來故不曾去外有一箇常二係回教固始縣人曾在光州充過快手因賣放賊犯革役彼時雖尚無别念但本事利害勇不可當見面就甚相好他兄弟二人哥子是箇老實的等語相應專差密咨拏解等因到臣臣隨委開封府通判于林帶同浙江來員前往固始縣㑹同該州縣拏獲究訊羽黨嚴拏解浙并密行按察司轉行去後嗣據詳稱拏獲夏林生訊據供明周姓係武生周圗廉并稱周圗亷做小車㑹頭曽見周圗廉在方家集上設桌收錢伊兄周圗德幫收又有范廷侯范廷九范四胡國璽胡國英梅錫齡丁蘭生孫國彩俱與周圗廉結拜周圗廉常說我們雖然窮困中了還有出頭日子這就是他素有大志康熙五十八年替周圗廉帶一封書與周崑來是聲氣相通其推盤手車子即通行的二把手小車子雍正七年九月內㑹見甘鳯池呌周圖廉到鎮江去㑹十一月二十二日向周圖廉說知周圖廉說年近了弄不出盤纒明年去罷等語隨將周圖廉周圖德范廷侯范廷九范四胡國璽胡國英丁蘭生孫國彩并常二及周圖德供出收小車㑹錢之周錫文拏獲經署光州事通判金承勳委固始縣典史潘允瀚同浙江來員顧言并選撥兵役移㑹沿途營縣一體撥護於雍正七年十二月二十九日由固始縣起解赴浙與甘鳳池質審去訖其梅錫齡一犯因出外未獲現在嚴拏等情詳報到臣除各犯聽浙江督臣審明具奏外所有浙江督臣李衛密咨查拏夏林生等及臣委員護解緣由理合恭摺奏聞謹奏此案巳差部臣往浙審理矣李衛能于衆所忽處留心察究殊屬可嘉斯種匪類為生民害甚于盜賊孟子所謂惡莠恐其亂苗也每見地方大小臣工以為不急之務率皆膜視偶或形迹發露猶多方掩覆以博安靜之稱直省督撫中著意搜剔者惟李衛最勤是以朕深取之淺見無知輩則目為多事也同日又奏為奏明武職養廉仰請聖裁事臣查雍正七年九月內准到兵部議覆南陽鎮臣馬世龍疏請買補缺額親丁馬匹一案內稱南陽鎮所食馬糧四十八分應令該鎮遵例于標下步兵內拔補克伍其親丁應食名糧于步兵缺內照例頂補如遇離任即將所食步兵名糧交與接任官隨丁頂補報部竝通行各省遵照等因移咨到臣隨即轉行遵照在案臣查定例提督親丁糧八十分總兵六十分副將三十分參將二十分遊擊十五分都司十分守僃八分千總五分把總四分從前各官親丁內有全食馬糧者有馬多步少者有上司占食馬糧而屬員多食步糧者此外復有空糧如提鎮則虛冒百十餘分副參遊擊則數十分都守千把等官亦各多少不等營中更有扣留之公費糧幫貼糧紙張糧大抵皆藉端朦混朋比分肥所有虛冒私占之數恆倍于親丁原定之額邇年以來仰䝉我皇上加意戎行訓誨鼓舞莫不奮興整飭河東兩省營伍陋習革除殆盡惟各官親丁養糧歷任相沿馬步兼食其來巳久兹准部議通行改步伏查步糧一分除每月支米一斗外扣去朋銀小建實支餉銀九錢有零每年十二箇月合計共支餉銀十一兩四錢有奇提督親丁八十分每年約支餉銀九百二十餘兩總兵六十分約支餉銀六百八十餘兩副將三十分約支餉銀三百四十餘兩參將二十分約支餉銀二百二十餘兩遊擊十五分約支餉銀一百七十餘兩都司十分約支餉銀一百一十餘兩守僃八分約支餉銀九十餘兩千總五分約支餉銀五十餘兩把總四分約支餉銀四十餘兩臣思提鎮列在封疆不惟食指浩繁其經年差使酬應操兵犒賞之類均難缺費副參遊守等官家口多寡不等大約不下數十人微至千把亦有八口今以步兵親丁名糧計之量入為出實有不敷夫分職授糈者朝廷之典先事後食者臣子之義我皇上深仁恤下無不周至必欲其養贍寬裕俾得盡心公事以勵操守况武職親丁糧尤為計口待哺之需此外别無所資倘內顧不給而不肖員辨又或藉端蠧伍扣剋虛冒等弊更將因以滋起臣愚謂親丁名糧似應少為酌定如提督八十分應給馬步各半竝其俸薪一年約可得銀二千兩總兵六十分約可得銀一千四百兩副將三十分約可得銀八百兩參將二十分約可得銀五百兩遊擊十五分約可得銀四百兩都司十分約可得銀三百兩守僃八分約可得銀二百兩千總五分約可得銀一百兩把總四分約可得銀八十兩如此則較于全食步糧豐裕過半庶武辨飬贍有資益加勉勵操守整飭營伍圖報聖恩矣臣仰荷主眷隆逾常格凡有見聞不敢緘默無言是否可行伏乞聖明裁鑒倘䝉俞允仍祈宣諭直省畫一酌定普天率土均當欽頌鴻慈永于萬世也為此密摺謹奏兵部議覆通行改步一案朕偶爾忽略未及細心裁奪彼時因何依允追思所以然之故竟不可得俟查明端緒酌定後另有諭㫖同日又奏為恭報雨雪日期仰祈睿鍳事雍正七年十二月二十七日開封得有瑞雪經臣恭摺奏聞續據各屬具報均于二十六七等日得雪三四寸不等兹開封省城又於雍正八年正月十六日先降微雨繼以大雪自寅至酉約得五寸闔屬地方亦于是日各得雨雪四五六七八寸不等均稱沾被調勻土膏滋沃現在麥苗俱長二寸有餘青葱遍野婦子咸歡所有雨雪分寸日期理合恭摺具奏仰慰聖懷再東省濟南一府泰安濟寧兩州竝所屬各縣據報正月十六日亦各得雨雪三四寸不等統俟各屬報齊臣再續具奏聞伏乞睿鑒謹奏初春即被膏澤實屬可慶今嵗上元前後數日雨雪天恩甚溥山右通省均霑直隸亦然頃據陕西復報得雨朕深為欣幸而愈增寅畏絲毫不敢少肆志也雍正八年二月二十五日河東總督臣田文鏡謹奏為遵㫖行文事雍正八年二月初七日准內閣移㑹內開本年正月十八日奉上諭山東青州府設立滿洲駐防官兵所有建造城垣營房工程著御史偏武候補道員陳豫朋前往㑹同地方官監督修造其一應如何修造之處著都統拉錫亦往青州㑹同相度經畫定議交與偏武等辦理拉錫仍回天津地方拉錫有素知可以辦工之人准其帶往青州留于工所交與偏武等𣲖委辦事偏武所管倉工著交與御史趙華監修再著內務府總管常明監管稽查欽此欽遵移㑹到臣仰見我皇上綏輯海邦睿謨𢎞逺命官分理巨細靡遺臣聞命之下不勝欣幸臣查青州建造滿城工程浩大一切估勘核算繪圗造冊查議採辦督理各項頭緒紛繁均應先為酌定當即専委登萊青道孫蘭芬總理其事青州府知府廣夀經管察核其餘佐雜等員揀選預備分頭委用惟事屬創始其衙署營房規式竝無舊例可循隨移咨直隸督臣衙門查取天津建造滿城規式斟酌確估至青州府城外舊城基址先據勘報共計大地一十二頃五十一畝零今滿城擇建于西南角平坦之處丈出大地六頃四十六畝建造衙署營房竝留大街馬道止須大地五頃九畝尚餘一頃三十餘畝將來滋生人丁添蓋房屋均可足用等情臣因建造滿營關係永逺駐防基地最宜詳慎其城內規模似再須寬大其需用磚瓦土坯石料石灰等項有無官地開設窰座亦令查議明確招募工匠承攬置辦惟有木植一項初議赴南採買節據孫蘭芬禀稱需用木植約計十五六萬之多若盡赴南採辦必由江南太倉州劉河口出海運至山東膠州又自膠州陸運至青州計程三百六十里路經髙密草場湖地一遇雨水泥濘難行車輛不能挽運腳價倍費今查東省民間榆楸槐楊等木俱皆堅實􅊖可取材以資工用請于附近青郡之各縣就便選購榆楸等樹先令匠人看定量材取用照時價平買其不敷木植再行赴南採購既可省運腳之糜費又可令匠役先興工作等語續據山東布政司今升湖北撫臣費金吾詳稱東省榆楸槐楊等木不堪經久易于朽蛀兼之隨伐隨做滋漿尚存木性不堅况青萊等郡大木非係道路壇塋䕃木即係老民老婦留以需用者今聞各縣採號甚拂民情無寧少遲時日赴南採買其檩椽鋸板小木應即于青屬附近地方照依平價採買等情臣查北省修建衙署及民間富室蓋造房屋俱用榆楸槐楊等木竝無越省逺購之事亦未有致被蟲蛀不堪經久者况南木委員採辦往返期逺今附近所買樹木其百姓先自砍伐者巳將乾燥其現議買伐者去皮斫削待至南木到日亦已堅燥可用豈復尚存滋漿至于道路壇塋一切古木䕃樹臣巳明白飭禁不許買伐所云䕃木之外盡係老民老婦留以需用更為不經必無此理總緣東省百姓向苦官役詐派一聞選買樹木唯恐充作官用不給價值即或給價十不償一反多運交守候之苦或不免于疑慮相參逮臣剴切曉示破其疑團飭令先買後伐預給時價一切雇車運送之事毫不纍及小民賣樹獲利何至甚拂其情且木料需用甚多一尋一丈必欲出自南産需時滋費豈為良策臣知費金吾見聞未確誤聼人言當即一一指駁竝令確議造送估册尚未據報到兹䝉我皇上埀念工程緊要特遣御史偏武等㑹同地方官監督修造竝命都統臣拉錫來青相度聖慈逺注巨細無遺俾大工仰藉有人實深慶幸臣正繕摺恭奏間適欽差御史臣偏武抵河南省城臣將一切原委面與僃敘情形其應如何修造之處統俟都統拉錫到東經畫定議臣仍札諭登萊青道孫蘭芬等協心贊理所有料理滿營事宜竝御史臣偏武到豫日期合併恭摺奏聞伏乞睿鑒謹奏覽奏知卿欲即在青萊等處採買木植以圗省便但榆楸槐楊四種內惟槐木稍堪經久而又難多得殊與朕意不甚相洽且此項工程不須急促辦理便遲至經嵗無妨拉錫胸中頗有見解俟其到日令承辦各官與之商酌由南購載如慮滋費需時或從北直採辦運往較稍勝否更㑹同偏武周詳妥議本省覓買雜木之舉總宜暫緩倘臨時必用就近取材以資營造尚不致有遲誤也于此等事無庸過費精神差委京官前來正為欲卿減省心力庶得經畫地方緊要政務之意卿其知之同日又奏為欽奉上諭事竊照疏濬山東江南等州縣水道使歸宿于海一案奉上諭先期𣲖出原任侍郎阿克敦原任巡撫陳世倌甘汝來同司督修之事一切辦理機宜􅊖聽田文鏡嵇曽筠孔育珣尹繼善籌畫調度工料等費􅊖動帑金支給臣欽遵轉行間又奉上諭水道工程俟孔育珣嵇曽筠尹繼善等㑹題到日再著阿克敦甘汝來前往辦理陳世倌著暫在曲阜工程候信俟阿克敦等至山東時一同前赴工所欽此臣查此案前經署山東巡撫臣費金吾奏明經王大臣等議覆應令費金吾㑹同臣田文鏡嵇曽筠尹繼善詳確斟酌定議當于雍正七年閏七月內㑹委山東兗寧道呂維炳徑詣沛縣荆山口一帶㑹同江南委員淮徐道康𢎞勳將張孤山十字河等處查勘如何開濬其沛縣下流入運河身竝自彭口以下遇雨水過多之時可否不致礙運有無支河分流濟寧等州縣應開之河下流豐沛入運入黃最有關係一併確查妥議詳報去後嗣據詳稱濟寧等州縣積水由南陽昭陽微山諸湖下注一案查自微山湖尾閭起歷張孤山至計家山原係淤墊應挑濬河渠一十五里自計家山至荆山口計程二十五里水勢通流毋庸疏濬自荆山口橋東起抵三岔河一百四十里河身􅊖屬寬廣其三岔河東岸原有泄運河異漲入駱馬湖去路上游泄下之水可以從此分泄一半入湖三岔河迤下十二里至猫兒窩此處運河狹窄其分泄一半入運之水誠恐急不能容查猫兒窩十二里至馬莊有減水閘一座又十里至萬莊亦有減水閘一座再于此二閘適中之處照式添建減水閘兩座又八里至瑶灣有減水竹壩一座又六里至牛頭三灣有減水草壩二座以上四閘三壩可以泄水入湖以保運道及水入湖行六十五里至宿遷之三合土壩由五花橋滙歸劉老澗壩下河內歷桃源清河沭陽安東海州計程三百五十餘里止有安東沈家集迤下一帶地勢低窪河道淤淺應行挑濬之處約計一百餘里其餘河道􅊖屬深通但六州縣兩岸堤堰均屬卑淺殘缺應須增築髙厚其自龍溝以下即係大河可以引水入海順軌通行諸水皆有歸宿等情臣查此案勘議開通工程既大民生漕運關係尤深自應仰體宸衷審度兩省地勢髙下情形務須􅊖心區畫使上源積水條分支幹節節疏通而下游受水之區更宜詳慎容納源源接引即遇雨水異漲亦得循軌安流俾民舍田廬永無淹漫首尾貫通暢達于海臣因未得親往查勘于正月內河臣嵇曽筠因公查勘路過開封臣隨面與計議總期詳慎妥協一勞永逸又㑹委兗寧道呂維炳趁此春融水涸立即㑹同江南淮徐道再加查勘確議臣復揀選河南河內縣縣丞林逸熟􅊖河務檄令該道帶往由上而下一路測量水平先將東省上源濟寧汶上嘉祥巨野曹單城武金鄉以及魚沛等州縣遍加履勘逐一探明髙下情形將應挑應浚之道里逺近丈尺寬深詳加確估明白務使水無壅滯節次導引滙歸湖河其湖水瀦蓄宣泄必欲虧盈得宜而于漕運民生兩無妨礙再將江南下源各處應挑應築水道工程勘估妥協繪貼圗說造冊詳報以慿河臣嵇曽筠孔育珣等親履查勘之後臣與㑹奏明抑臣更有請者兖寧道呂維炳現經江南河道督臣孔育珣于河庫河務均關重大案內題請調補淮徐道業經奉㫖俞允惟是呂維炳節經臣等㑹委查勘山東江南兩省水道及各處湖河閘壩一切髙下地勢情形均已熟􅊖現在勘估未竣如令前赴新任勢必另委别員事經隔手頭緒不諳恐有稽延舛錯之處臣仰懇聖慈將呂維炳暫留兗寧道任俟此案勘估造冊定議具題之後再令前往新任庶大工得以早興兩省羣黎共登袵席矣臣為勘估重務起見冒昧奏請伏乞睿鑒謹奏呂維炳熟􅊖水道情形暫留東省所請是嵇曽筠亦經奏請但淮徐道之任既司出納而又兼管河務甚屬緊要候朕與大學士等再加斟酌有㫖同日又奏為恭報河東兩省同沾雨雪日期仰祈睿鑒事雍正八年正月十六日豫省闔屬得雪分寸經臣恭摺奏聞欽奉硃批諭㫖初春即被膏澤實屬可慶今嵗上元前後數日雨雪天恩甚溥山右通省均沾直隸亦然頃據陕西復報得雨朕深為欣幸而愈增寅畏絲毫不敢少肆志也欽此仰見我皇上敬天勤民嚴于宥密是以誠格穹蒼惠綏兆庶普天率土之廣靡不共慶時若也兹查本年正月三十日河南開封等屬降雪三寸通省地方均于是日各報得有雨雪三四五六寸不等又山東闔屬于正月二十二日竝三十日得雪四五六七八寸不等俱稱沾潤深透麥苗滋長現今五風十雨郊野勻和臣惟有與兩省官民益勤職業以仰副愈增寅畏之聖訓庶以上承深宫乾惕之睿懷而巳所有河東兩省同日得雪分寸理合恭摺奏聞伏乞聖鑒謹奏百凡總仰賴上蒼錫佑耳人力亦何足恃同日又奏為添修豫省各營軍器仰祈睿鑒事臣查兵丁甲械帳房關係軍需以僃差操行走其有缺少朽敝者自應查明添修務令堅固齊全以資實用經臣屢檄通飭前據臣標左右兩營竝南北兩鎮各將所缺盔甲鳥鎗帳房鑼鍋等項呈請修製前來當經飭司㑹同鎮營確查妥議竝飭將應添應修各項分别查明勿令濫開浮冒仍將需用添修價值逐一開造清冊詳送核奏隨據署布政司事按察使陳世倕㑹同查明臣標左右二營馬兵舊有盔甲朽敝不堪應按數製造馬兵花盔甲二百頂副步兵舊有鐵盔甲朽爛不堪且行走難于攜帶應改造綿盔甲輕利有益除出征兵丁製過綿盔甲一百九十二頂副竝現有綿盔甲二十四頂副外尚應添造綿盔甲五百五十頂副除舊有堪用鳥鎗外應修整鳥鎗九十桿除新製帳房四十三頂外尚應添造不敷帳房九十二頂應添製梅花樁一百三十五副除舊有鑼鍋堪用外尚應添製不敷鑼鍋二十二口共需銀二千五十五兩零南陽鎮屬七營除雍正三年內新製竝舊有堪用各步兵綿盔甲外尚應修整綿盔甲六百七十八頂副除雍正二年新造鳥鎗外尚應改造鳥鎗二百四十桿添造鳥鎗八百八十三桿除雍正六年新製竝舊有堪用各帳房外尚應添造不敷帳房三百一十七頂應添製梅花樁六百一十七副除雍正六年內新製竝舊有堪用各鑼鍋外尚應添造不敷鑼鍋二百七十九口共需銀三千七百七兩零河北鎮屬九營除舊有馬兵花盔甲堪用外尚應添造馬兵花盔甲一頂副除雍正三年新製竝舊有堪用各步兵綿盔甲外尚應添造綿盔甲九十二頂副除舊有堪用鳥鎗外尚應修製鳥鎗二百零八桿除舊有堪用帳房外尚應添造不敷帳房四十二頂應添製梅花樁三百八十六副共需銀六百八十七兩零以上臣標左右兩營南北兩鎮通計估用銀六千四百四十九兩零謹將各項工料數目另繕清冊恭呈御覽臣查修製標鎮各營甲械應動庫存公項銀兩惟是南陽鎮衙門查有收貯前任革職總兵佟世鏻所收節禮陋規銀一千八百三十三兩零又前任署總兵李永升收受軍政舊規銀二千四百九十兩又前任鎮標中軍遊擊王瑞材收受佟世鏻所給盤費銀六十兩以上共銀四千三百八十三兩零現俱存貯該鎮衙門留僃公用之需今該鎮各營添修盔甲鳥鎗帳房鑼鍋等項需銀三千七百七兩零即應在此項存貯銀內令其照數動用不必另行撥給至臣標左右兩營需銀二千五十五兩零河北鎮屬需銀六百八十七兩零俱應在藩庫所存公項銀內照數撥給速為修理俟事竣臣再確查報銷竝將南鎮所動存貯銀兩一併查取清冊咨部理合恭摺具奏仰請諭㫖遵行為此謹奏覽傅為斗朕因念伊前人擢用今職觀其質地止不過誠慤而巳未見所長或恐弗克勝任然歷俸日久營伍事務想應諳練也卿意以為何如同日又奏為欽奉上諭事竊臣查各省志書一案雍正七年二月內准户部咨開奉上諭著各省該督撫將本省通志重加修輯務期考據詳明採托精當既無闕略亦無冒濫以成完善之書如一年未能竣事或寬至二三年內纂成具奏欽此仰見我皇上慎重紀載表彰人物詳徴一代之文獻永垂萬世之章程必須選擇品學兼優之人任以考校修輯之責臣准部咨當即轉行河南布政使速為聘訪學問淹貫人員擇日開局因本省甚難其人河臣嵇曽筠薦有江南無錫縣辛丑科進士顧棟髙學問淵博堪膺斯任隨即専人往聘于今嵗正月內到豫又選有教諭朱超傅夢賚羅倬學正張星煜李洛均係文理優通堪膺分校之任業已陸續𫝊齊在省今擇吉于本年二月十二日併送入大梁書院內開館纂修其一切安置竝須用器具及供應筆墨紙張食物等項應請在于存公銀內陸續給發統俟事竣之日查造清冊逐一確核報銷臣再另行恭奏所有豫省志書開館纂修日期并應請動支公項緣由理合恭摺奏聞伏乞睿鑒謹奏筆墨之事固不宜忙迫然亦不宜甚遲作速纂修完竣庶可杜請託營求之弊也硃批諭㫖卷一百二十六之十九欽定四庫全書硃批諭㫖卷一百二十六之二十硃批田文鏡奏摺雍正八年三月十七日河東總督臣田文鏡謹奏為恭報豫省得雨日期仰祈睿鑒事竊查豫省春初雨雪沾被調勻經臣節次奏聞兹查開封府地方于二月二十五日得雨二寸又于三月初七日戌刻起至初九日寅時止得雨六寸所屬各縣亦于初八日得雨四五寸不等又三月十一日開封并所屬各縣得雨三四寸不等又十四日申時起至十五日寅時止開封省城又得雨三寸有餘其外府州縣有報于二月十九二十等日得雨霑足竝得雨三四五寸不等者有報于二月二十五及二十七八九等日得雨四五六七寸不等者有報于三月初七八等日得雨霑足及四五六寸不等者甘雨及時田疇普被合計通省均已沾潤滋足現今各處二麥俱髙一尺五六寸穗已先後吐齊髙糧長至三四寸許榖黍苗發甚旺棉花亦巳出土芝麻雜豆均各播種在地閭閻婦子樂此五風十雨靡不感戴皇仁共欣時若所有豫省得雨日期及麥苗榖黍長發情形理合恭摺奏聞仰慰聖懷再東省州縣亦據報于二月二十五及二十九日各得雨二三四寸不等合併奏明伏乞睿鑒謹奏覽奏豫省膏澤調勻麥巳結穗榖黍俱長發茂盛東省又巳及時得雨朕懷曷勝慰悅都中自入三月以來日起風霾甚覺乾旱于此奏未到之前一日荷蒙天祖眷佑慈恩甘霖大沛郊野優渥而山陕兩省亦于月之中旬各報霑足朕惟額手欣慶期與卿等共勉寅畏以敬迓秋成之嘉貺耳同日又奏為桃汛巳過工程平穩臣謹繕摺奏聞仰慰聖懷事竊臣伏查豫省黃河南北兩岸堤工頻年以來仰䝉我皇上敬天勤民之念上格穹蒼是以黃流順軌汛水安瀾河泓刷深掃壩堅固而億萬生靈靡不永安袵席矣前因桃汛將屆臣隨檄飭管河道祝兆鵬河北道朱藻等督率㕔營印河員辨住守沿河堤岸帶領兵夫加意修防巡查料理不許絲毫怠忽去後兹據該河道等報稱自雍正八年二月十八日清明起至三月初八日止黃河長水三尺三寸至三尺九寸不等今已消落一尺七寸至二尺不等竝無出槽又沁河長水一尺九寸今巳消落九寸所有南北兩岸一切堤掃工程俱各保固平穩通省臣民咸皆歡欣踴躍感頌皇仁但轉盼入夏即屆伏汛臣仍嚴飭管河各官加謹修防外所有桃汛巳過工程平穩緣由理合恭摺奏聞上慰聖懷伏乞睿鑒謹奏伏汛將屆而雨澤頗饒亟宜飭諭屬員倍加小心敬慎恐管河各官目覩河工就緒屢慶安瀾漸生怠忽之念也卿等亦當慎之益慎以防不虞將此諭令嵇曽筠知之同日又奏為欽奉聖訓據實覆奏事雍正八年三月十二日臣齎摺家人捧回皇上硃批諭㫖到臣臣敬啓跪讀于臣奏明山東江南河道歸海一案竝請將呂維炳暫留兗寧道任摺內欽奉硃批呂維炳熟􅊖水道情形暫留東省所請是嵇曽筠亦經奏請但淮徐道之任既司出納而又兼管河務甚屬緊要候朕與大學士等再加斟酌有㫖欽此查淮徐原屬要地今臣以呂維炳勘估工程請為暫天心臣惟有速飭呂維炳上緊查勘竣事以便令其馳赴新任庶以仰副皇上慎重河漕之至意又于臣奏請添修豫省軍器摺內欽奉硃批覽𫝊為斗朕因念伊前人擢用今職觀其質地止不過誠慤而巳未見所長或恐弗克勝任然歷俸日久營伍事務想應諳練也卿意以為何如欽此臣查傅為斗于今嵗正月內來至開封見臣觀其人循循本分與之講論營伍尚屬明白通曉誠如聖明所鑒查其到任以來辦事謹慎小心惟聞待兵過寬致有兵丁酗酒打架以及強買與民爭毆之事天恩簡用之隆是否克勝其任臣當再觀後效另行據實奏聞又于臣奏纂修豫省志書摺內欽奉硃批筆墨之事固不宜忙迫然亦不宜甚遲作速纂修完竣庶可杜請託營求之弊欽此仰見我皇上表彰垂信紀載核實之至意雖纂修之事採托紛繁然臣自不敢聽其延挨時日以啓弊竇務期考據詳明無闕無濫庶以仰副聖意又于臣奏東省滿營摺內欽奉硃批覽奏知卿欲即在青萊等處採買木植以圗省便但榆楸槐楊四種內惟槐木稍堪經久而又難多得殊與朕意不甚相洽且此項工程不須急促辦理便遲至經嵗無妨拉錫胸中頗有見解俟其到日令承辦各官與之商酌由南購載如慮滋費需時或從北直採辦運往較稍勝否更㑹同偏武周詳妥議本省覓買雜木之舉總宜暫緩倘臨時必用就近取材以資營造尚不致有遲誤也于此等事無庸過費精神差委京官前來正為欲卿減省心力庶得經畫地方緊要政務之意卿其知之欽此臣跪讀之下感激涕零伏以犬馬之微仰䝉聖主顧復體恤無不周至雖臣之心力臣實未能自愛至于此極也捐糜踵頂何能報稱在滿營工程重大臣既駐劄隔省未能親身相度其中機宜臣實未能曉暢今䝉命都統臣拉錫經畫定議仰見我理聽候指揮在臣惟有恪遵聖訓但竭心力辦理地方不敢有厪睿念也所有奉到原摺理合恭繳謹奏頃覽拉錫所奏區畫處逐件俱屬妥協現命議政大臣議行此建設滿城一事卿可不必勞心前諭甚明其遵奉毋違同日又奏為奏明事竊惟考察吏治固在于歷事之後而鑒别才具尤應于蒞任之先是以臣于河東兩省屬員當其初到地方每留心察核隨事䇿勉以期仰副我皇上造就人才之盛心兹查河南布政使趙國麟已于雍正八年二月初八日到任訖臣見其辦事勤力且能虛心善受不自滿假人亦和平謹飭雖有足疾步履甚艱然藩司列在大僚所資者識見謀猷足以振綱挈領非必如府州等官尚有趨蹌奔走之勞也但其才具中等見事不能透徹臣與朝夕密邇隨時隨事僃細訓勵以期精進又山東布政使孫國璽于雍正八年二月初二日到任訖其向日居官勤慎操守清廉臣所深信今䝉聖恩優渥簡用東藩益復感激圗報奮勉辦事但所虞者才情亦不甚優山左積玩之習尤貴振作臣是以將東省事宜逐條開單指示令其遵照奉行且恐其初蒞地方未能周􅊖情形按察使唐綏祖久于東省諸務明白臣竝囑其協力同心和衷贊助庶幾均有所裨又山東糧道朱㵢查于雍正七年十一月二十九日到任今春監兑事畢二月內赴豫見臣觀其語言明晰似屬通曉事務但恐此中圎活未必能錚錚自持任勞任怨臣亦面為諄諭務當盡力竭誠毫無瞻顧不可沽邀虛譽上負聖明又山東濟南府知府楊在魁荷䝉簡用來東該員先至開封見臣遂于雍正八年正月初十日到任臣觀楊在魁器識明敏才具似優臣與面語一切事宜俱能領㑹到任後凡所禀行措置亦皆井井有條若能始終不渝當為大有造就之人臣亦奬勵朂勉俾其鼓舞自奮冀與有成以上各員均係到任未久容臣細觀後效據實奏聞再開封城守尉副都統白成額到任以來臣欽遵諭㫖剴切勸勉俾其實心任事白成額感頌天恩矢切圗報亦將所奉聖訓敬謹告臣其應行事宜無不向臣商酌蒞事數月臣見其居官謹飭勤于操演兵馬亦能約束旗人地方相安從此竭誠奮勉自可不負皇上委用之隆恩臣仍留心規導務期仰副聖諭所有白成額現在勤慎緣由理合一併奏明伏乞睿鑒謹奏趙國麟等才具之長短優劣覽卿陳奏業俱僃􅊖至開封城守尉白成額尚恐未能盡職今果若此殊為可喜之事省朕幾許籌酌矣同日又奏為奏明東省營伍情形竝酌選題補人員仰祈睿鑒事竊查山東一省路當衝要逺控海濵所有各營兵馬自應整飭練習以資實用臣于雍正六年九月間赴東巡視即于經過沿途營汛查驗辨兵見其技藝生疏步伐參錯馬匹率多疲瘦臣隨照㑹兩鎮總兵官又逐一面諭將僃令其痛改積習加意整頓務將所管兵馬操演純熟餧養臕壯逮至回豫後節次嚴檄通飭冀有成效于雍正七年冬底分委豫東兩省營員逐加點看令其據實冊報嗣據各員查報登鎮所屬之左右二營膠州營即墨營兖鎮所屬之臨清營臺莊營東昌營沙溝營以上各營馬步兵丁弓箭鳥鎗藤牌等項􅈺熟次熟者多中平者少馬皆臕壯可觀又登鎮所屬之水師前營青州營武定營萊州營濟南營夀樂營兖鎮所屬之左右二營沂州營德州營髙唐營范縣營以上各營馬步兵丁弓箭鳥鎗藤牌等項􅈺熟者少中平者多生疏者亦有馬匹臕分滿歉不等又登鎮所屬之文登營寧福營安東營兖鎮所屬之曹州營泰安營梁山營夀張營以上各營馬步兵丁弓箭鳥鎗藤牌等項仍多生疏馬匹亦無臕壯各據冊報前來合之臣訪聞無異臣擬擇其營伍之最缺整飭者指名參究但查內有甫經署事及蒞任未久者其弛廢之咎多不在現任之員臣每仰見我皇上愛惜人材舉措用舍之間務得其平是以上體聖懷暫豫寬假除將兵丁技藝優􅈺馬匹頭臕者行知奬勵其技藝平常生疏馬匹臕分不足者嚴加申飭勒限三箇月一律操演精熟餧養臕壯俟三月限滿臣再另委不徇情面之大員前赴點驗如其兵丁馬匹仍無改觀臣即將該管辨員指名題參不敢少有縱庇惟是臣去東省既逺而登膠一帶地方僻處海隅尤為鞭長莫及之勢其各營將領非得實心任事訓練有方堪以委託者莫由收指臂之效查膠州營副將張孟儀即墨營參將宋愛均為勤敏強幹之員該員等于雍正七年五六月內先後調升東省今尚未滿一年而營伍改觀曽謨到任時遂有諄札囑其殫盡忠誠上酬髙厚容當察其總兵任內倘或仍前因循不自奮勵臣即據實奏聞臣正欲將各營情形僃􅊖入告兹欽奉上諭將宋愛調補汾州營參將又命署理山永協副將事務所遺即墨營參將員缺奉㫖令臣遞行題補仰見我皇上慎重營伍必期人地相宜以收實效之至意臣查宋愛之在東省臣實藉其整飭用以表率各營今山永協係邉要之地奉㫖命往署理臣亦未敢請留謹將所遺員缺再四酌選查有河南南陽鎮左營遊擊楊鐸曉暢營務居官廉幹堪以補授即墨營參將其所遺南陽鎮左營遊擊員缺查有山東兖鎮左營遊擊李登華臣前次雖經奏明該遊擊尚堪任使但以之幫助嶽含奇恐未必大得贊勷之力今請以李登華調補南陽鎮左營遊擊其所遺兖鎮左營遊擊員缺查有山東沂州協守僃王之祿才技優長熟練營伍經臣于雍正七年三月內題補守僃送部引見奉㫖王之祿人甚去得效力行間著有勞績著行文田文鏡遇有遊擊缺出題補欽此欽遵在案今請以王之祿升補兖鎮左營遊擊更必竭力圗報可以幫助嶽含奇整飭營伍其所遺沂州協守僃員缺查有山東髙唐營千總路成年力精壯漢仗亦好曽隨川陕督臣嶽鍾琪進征北川西海桌子山各處著有勞績堪以請補沂州協守僃除另行恭疏題補伏候聖裁外謹將山東營伍情形竝酌選人員一併恭摺奏明仰祈睿鑒謹奏酌選各員俱屬允協具題到日有㫖同日又奏為奏明事竊查東省營汛員辨惰玩成習不知操練營伍惟以弛縱為得計不知管束兵丁専以庇護為愛惜其或兵民相犯則營員必欲左袒其兵該管文武先相齟齬各持意見以故兵丁恣肆目為尋常臣仰荷天恩節制兩省屢屢剴切訓諭務期兵民安戢力除舊習詎知長清縣汛兵馬守業蕭殷成等白晝強拉民婦袁氏共飲不允隨將袁氏採打撕衣袁氏赴縣喊禀各兵奔至縣堂咆哮不服該縣以營兵強拉民婦凶毆撕衣且目無官長鬨鬧公堂事屬不法聲明該泛千總馬紹援公出泰安州將馬守業等肆橫緣由具詳通報臣隨批山東按察使移營革糧嚴審確情律擬招報并取該營不行約束職名報參去後乃千總馬紹援袒護兵丁竝不革糧移審反為營兵捏寫呈詞誑稱縣役黃星等與袁氏偕飲被營兵遇見觸怒縣役生計毒兵該縣張令聽信衙役虗詞捏詳等語屢次詳報泰安營參將轉報兗州鎮臣嶽含奇移咨巡撫衙門竝咨呈到臣該千總又因按察司批縣詳文有飭泰安州移營革糧嚴審取約束不嚴職名詳參之語亦稱按察司不合在臬司為一省執法大吏營兵如此不法其批移營革糧取約束不嚴職名詳參有何不合至臣忝膺總督管轄文武批令革糧該辨竟敢抗違不遵幾欲使督撫臬司亦不能懲治悍兵其意以為不革名糧則有司不得而審捏詳縣令毒兵則將鎮必然主持可以挾制問官在該辨掩飾巳過之罪猶小而庇護悍兵長惡之風實漸不可長今據山東布按二司審據蕭殷成馬守業等將強拉民婦採打撕衣以及鬧堂情由歷供不諱臣是以據實嚴參請㫖革職嚴審究擬庶幾懲一警百營員縱庇之習可除而兵丁亦稍知守法斂跡矣再兗州鎮臣嶽含奇自知前此被其欺朦將千總馬紹援約束不嚴徇庇捏詳職名呈參前來除將馬紹援繕疏題參併將據詳率轉竝不駁飭及未據揭報之歷任兼轄參將一併附參外緣此案情節臣為整除東省營伍積習起見理合據實恭摺奏明伏乞睿鑒謹奏所奏甚是此案理應嚴參示懲同日又奏為恭懇聖慈事竊臣至愚極陋遭際聖明于雍正二年九月奉命署理河南巡撫因凡有進呈奏摺既不能親自繕寫又不敢假手他人經臣恭摺奏懇請將臣壻湖南湘潭縣縣丞崔鏏掣回在臣左右以供書寫仰䝉聖恩俞允今臣現藉指臂鴻恩異數固巳感淪肌髓查崔鏏係臣妻所生長女之壻尚有臣妾所生一女臣前任吏部員外時與原任吏部員外郎存柱同為部屬因將臣次女許字與存柱次子薩來為婚雍正二年臣任河南布政司時薩來至署畢姻後即回京臣女時因抱病未能偕去迄今依留在側薩來係正黃旗滿洲杜太佐領下現充副護軍每月五班輪守禁門旗人既不得逺至他省况當差行走非經奏明給假更不敢私有所往數年以來薩來遂未至豫其父存柱併其母俱經物故臣因視壻如子念其年齒尚少恐失訓誨思欲面為教導俾得更歷世事知有長進且臣素性拘謹事無大小期于慎重即如酬應賔從𫝊述語言等類臣雖不必親歷其事亦必欲得一骨肉相依誠實堪信之人以相委託長壻崔鏏既已代臣書寫事無兼顧而次壻薩來人頗朴直略諳清字清話查護軍原非職官用是不揣冒昧仰懇咨用清字文移者竝可令其譯識亦復稍有所助臣以被恩髙厚自知身家􅊖荷生成無論公私􅊖皆仰賴聖主是以䑛犢微忱屢致上瀆天聽㷀㷀下情伏惟聖慈矜宥則臣世世生生永矢銜結矣臣無任惶懼戰兢之至謹奏巳命薩來詣豫矣卿其留署訓誨但于召見之際審視材器甚屬庸碌不堪即伊父存柱朕雖未經識面觀其罪案纍纍要非端人可知何乃與之結婚而選此一壻耶薩來在旗乃一無用少年不必拘定一二載竟可久留在豫俾令學習果稍有增進時再行奏聞然朕據其資質而論確係愚詐無識之流豈特不足委託且宜留心約束也雍正八年四月十三日河東總督臣田文鏡謹奏為恭報豫省雨澤日期仰祈睿鑒事竊查豫省三月初七初八以及十四十五等日節次時雨滋沛田疇普渥經臣恭摺奏聞欽奉硃批覽奏豫省膏澤調勻麥巳結穗榖黍俱長發茂盛東省又巳及時得雨朕懷曷勝慰悅都中自入三月以來日起風霾甚覺乾旱于此奏未到之前一日荷䝉天祖眷祐慈恩甘霖大沛郊野優渥而山陕兩省亦于月之中旬各報霑足朕惟額手欣慶期與卿等共勉寅畏以敬迓秋成之嘉貺耳欽此仰見我皇上宵旰憂勤誠格天祖而尤朝乾夕惕訓誡彌深此誠聖人無逸之心聖敬日躋之驗也兹查開封竝通省闔屬地方亦于三月二十五日普被甘霖二十八日三十日以及四月初四日接連遍沛據各州縣申報得雨七八九寸竝一尺尺餘不等咸稱髙下地畝俱已深透暢足民間歡頌婦子同聲臣惟有仰凛聖訓當與所屬官員益深誠敬嚴恪之思祗待上天秋成之賜所有豫省得雨日期臣謹恭摺奏聞再山東闔屬州縣有據報于三月初八日得雨二三四寸不等者有報于三月十一十二等日得雨三四五寸不等者有報于三月二十五三十日得雨四五六七八寸不等者所有二麥俱各秀實各項秋苗亦皆旺發理合一併奏明伏乞睿鑒謹奏朕因京都邇來亢旱日夜殷憂畿南接壤惟豫省最近正在繫念間適閲此奏頓釋一半焦思矣同日又奏為遵㫖密奏仰祈睿鑒事竊查社倉積榖每年實貯數目經臣逐一奏聞在案兹除舊管雍正六年分共捐貯榖麥豆蕎一十七萬七千八百四十六石一斗零外今據河南布政使趙國麟查據開封等八府屬汝陳等七州并所屬彚報雍正七年分新收捐榖二萬五千六百二石五斗零豆二十四石八斗蕎麥五石三斗稻榖二石八斗茭草籽六斗息榖一萬一千七百六十六石六斗以上共三萬七千四百二石八斗零實在新舊二項貯倉共二十一萬五千二百四十九石零臣并檄行各屬轉飭各州縣正副社長加謹收貯仍飭地方官不時稽查勿致侵缺至雍正八年秋收後勸捐榖石俟有成數另于次年查明奏聞所有雍正七年分各屬實在捐貯社倉新舊榖石數目理合恭摺密奏伏乞睿鑒謹奏豫省社倉緣奉行得法年來漸有成效巳有㫖諭部議敘矣但有司奉行善否尤宜體察同日又奏為欽奉上諭事雍正八年三月二十八日臣准吏部咨奉上諭武昌道徐聚倫著臣于河東二省道員內酌量一員與徐聚倫調用欽遵移咨到臣臣查豫省所屬道員內如河北道朱藻分巡三府職任修防該員吏治河工兼能整頓現據報丁母艱臣因要地幹員難以拘于成例且有荆隆口開挑引河正資儹辦業經㑹疏題請留任守制現在恭候諭㫖不便改調又管河道祝兆鵬前任歸德府時臣見其辦事勇往勤于河務因管河道員缺䝉恩垂詢經臣密舉給咨赴部引見奉㫖補授乃該道始猶謹慎近竟頓改前操恣意貪婪指稱完伊前任欣州虧空屢將屬員應領嵗修搶修銀兩勒借扣留而且發銀尅短甚屬不職臣巳訪察確實現在據實另疏嚴參所有此管河道一缺應候皇上欽簡熟諳工程人員亦非徐聚倫所宜再如南汝一道統轄南汝兩郡光汝兩州界連江楚最易藏姦民風刁悍素稱難治前任南汝道孫蘭芬振戢有方稍知斂跡至其調任後正署迭更李英撫馭乏術澆風漸長今自董自超到任以來親歷各處遍察利弊該道強幹精明不避勞怨可稱有守有為臣正需其竭力督率以資整飭亦未便移易至開歸道管理通省驛鹽糧務一切察除陋弊經理漕運􅊖其専責今該道張建德係由衛輝府知府補授開歸向在衛郡原係辦漕水次漕務本其熟諳而人又老成練達辦事精勤所以雍正七年漕米較前更早十月內即行趲運出境仰荷天恩將臣議敘准加二級在案是張建德之辦理漕糧現在著有成效臣實藉為指臂必俟豫省人員內復有經理得宜之人可以接手方可移易又臣東省所屬道員內如登萊青一道駐劄萊州控制海疆且此數郡地方距臣最逺必得深堪委信之人方免鞭長不及之慮孫蘭芬調任以來加意振作約束屬員咸知凛畏況該道又係楚人亦難用于原籍如兗寧道呂維炳業經江南河臣孔育珣題調淮徐緣其現在勘估山東江南兩省水利臣復奏明暫留東省容俟此案查明定議之後再赴新任是呂維炳亦不便與徐聚倫調換如濟東道張體仁現在曲阜廟工承辦緊要未可猝更如鹽法道楊𢎞俊甫經到任而東省鹽務該道于前任登州府時洞􅊖利弊今甫飭交辦理亦未便更易惟查有山東糧道朱㵢到任未久辦理漕務未能妥協武昌尚屬簡易朱㵢堪以調補蓋東省漕務向稱弊藪旗辨恣意掯索相習為常臣于上年將應給旗丁運辨各項用費酌量給與其額外繁費概行裁革經臣奏明于奉㫖之後即通行嚴飭并出示曉諭在案適本年二月內朱㵢前赴水次有辨丁迎至中途冒禀朝城范縣觀城三處米色不純意在欺朦該道新任借此恐嚇各縣索足舊規乃該道竝不親查但遣家人承差包取樣米呈驗并令收拾圓潔正墮旗丁之計遂爾大肆掯勒及規禮照前索足仍將原米受兑是旗丁等之種種橫索皆由該道措置失宜之故但該道未能約束失于覺察尚非贓私劣蹟似可觀其後效且河東兩省道員别亦無可移易是以請與徐聚倫相對調用是否允協天恩出自聖裁至徐聚倫行為狂縱䝉聖恩不加嚴譴仍以道員調補自必感激圗報俟其由豫赴任時臣當詳指利弊嚴加訓導即以東省整頓漕務之事責成于徐聚倫如果能實心任事辦理妥協臣不敢掩其所長倘或任性縱恣舉動乖張臣亦不敢庇其所短自當據實指參除另行繕疏具題外理合恭摺奏明伏乞睿鑒謹奏朱㵢堪與徐聚倫對調所奏是有㫖諭部矣將朱㵢極力訓誡然後命赴新任可也同日又奏為查明歸淮河道情形仰祈睿鑒事竊惟江南清口淮黃交滙有關運道民生上年秋汛極大數次清水不能敵黃深厪聖念仰䝉皇上至誠感格保護平穩旋荷頒發帑金加築髙家堰石工瀦蓄清水逼溜刷黃誠為萬年底定之計臣因淮水出湖既須激射衝流以壯其勢而上源諸水亦必暢滙入淮共成其大然後奔騰直注一往莫禦所有歸淮各河自應逐處勘明經臣覆摺奏聞當于雍正七年十月內分委黃河同知今調任開封下南河同知陳儀歸德府河務通判劉曰章原任虞城縣知縣李槃等隨帶丞簿各員分往南汝開歸四府六州等屬將所有歸淮河道一一細查有無淤淺阻塞散溢之處確勘明白即飭地方官疏濬具報茲據該同知等勘覆前來臣謹按淮水發源于桐柏縣之胎簪山洑流三十里泉源湧出是為淮井又洑流二十六丈成渠東注歷信陽正陽羅山息縣光州固始入江南霍丘縣界瀠洄豫省計長五百八十里其全豫之水來與淮㑹者共計二百七十餘道羣趨競赴于淮惟其逺近滙歸之多皆有助清敵黃之力故必一律深通方能合流奏效今查明上源各處􅊖屬暢達其間偶有淤淺者各該地方業巳遵照疏濬深通並無壅滯但豫省上源循流貫注而下源之在江南境內者亦各支支暢達則沛然滙湖可以飽蓄其勢併力抵黃臣聞洪澤湖湖水出口之處有張福口裴家場張家莊爛泥淺三岔河并天然天賜凡引河七道其天賜引河聞前巳淤淺自三月以來又復流通然亦不甚深濶此皆淮水出口之處所關甚巨若臣移咨江南督河各臣誠恐地方各官視為鄰省咨行之事未必實力疏濬仰請皇上敕下江南河督各臣將淮水出湖之處竝境內一切歸淮各河委官查勘如有淤淺處所立即疏挑并引河亦相機設法速治深通務俾暢流滙注如此則上源之水既盛出口之勢又強以之制黃而河流順軌以之刷口而積墊咸除矣謹將淮河自桐柏發源起至青口淮黃交滙處繪成總圗一幅竝將歸淮各河按照各州縣繪為一冊臣敬裝潢成帙恭進御覽伏乞睿鑒謹奏覽奏窮原竟委究派尋支分合上下籌畫無遺具見卿慎重河防實心任事之意朕深為嘉豫但専力助淮主見固是倘淮水過盛其間亦恐有不虞非經督河諸臣詳查妥計何可草率施行蓋言利尤宜先慮其害也候交河臣議覆有㫖同日又奏為通行條奏事雍正七年閏七月內臣准户部咨開大學士公馬爾賽等條奏直省各州縣令于大鄉大村人居稠密之處設立講約所在舉貢生員內揀選老成有學行者一人以為約正選朴實謹守者三四人以為直月每月朔日齊集耆民宣讀聖諭廣訓其約正每年給廪餼銀六兩直月每名每年給廪餼銀六兩六錢各于該年地丁銀內按數給發官吏侵尅者查參治罪奉㫖依議欽此欽遵移咨到臣僃見我皇上陶淑下民範圍斯世無不極其恩施優渥臣即通飭遵照去後行據闔屬祥符等各州縣選充約正之貢生白景易等直月生員裴珍等呈稱景易等生當盛世時際昌期沐聖主之深恩舉熙朝之曠典蠲免正賦遴選賢才重農勸稼行慶施仁當此時和嵗稔正思圗報無由今䝉選充約正直月自應勉力趨公敬謹宣布所有廪餼銀兩籲請免給以安葵藿下忱等情又據祥符等各州縣申稱竊念各生懇辭廪餼雖由誠心感激但卑州縣等膺兹民社荷䝉皇上隆恩賞以養廉給以公費浩蕩鴻慈有加無巳况宣講聖諭廣訓實有司分內之事此項廪餼銀兩固不敢動支地丁銷耗錢糧亦不敢俯聽堅辭仰虛盛典卑州縣等情願于養廉內照數捐給以盡司牧之責等情各呈報到臣伏查講約一事奉行巳久臣為州縣時曽按月按期實心宣布遍𫝊齊集其始雖則有人其後漸亦稀少臣是以知非講者之不力實由聽者之不前亦非未設廪餼不足以鼓舞講約之人實由聽講之人不能每月朔望齊集大抵一年之內止可于春仲秋末冬初農功告竣乘隙宣講故豫省約正直月懇請免給廪餼雖出肫誠究亦知村鄉講約實有不能按月按期舉行如式者無功食餼良有未安况約正直月既于舉貢生員內選擇充應率皆守分讀書衣食不乏之人原無藉于廪餼合計直省州縣一千四百有餘其中大鄉大村應設講約之所者知復何限應給廪餼每年不下數十萬兩在我皇上深仁愷澤下逮旁流舉凡有益于國計民生者輒不惜費帑金用以垂利萬世然果能實在舉行不致虛糜閭閻黎庶欣欣無倦臣亦何敢謬有異議但臣身親其事目覩其情今以嵗費國帑數十萬金于無益之地雖經廷臣議定臣實不敢明知而因循兹既據約正等懇辭廪餼各州縣又復情願捐發臣思村鄉講約一嵗之中不過春仲二月秋杪九月冬間十月十一月計此四箇月每月朔望宣講共有八次其約正直月承應之日甚少不妨本業似無庸議給廪餼況各州縣俱䝉天恩賞有養廉公費等項其約正直月每逢宣講月分即該州縣酌量捐酬為數無幾實皆情願在選充之生員等亦復義有可安而正項錢糧竝無濫銷侵尅之弊臣不揣冒昧另疏具題庶各省督撫見臣據實奏明亦必仰請更定均無瞻顧之慮而經費各有撙節矣是否允協伏乞睿鑒謹奏所奏甚屬可嘉無庸另疏具題即將此摺交部改本頒發諭㫖矣同日又奏為欽奉上諭事雍正八年四月初五日據臣齎摺家人回豫捧到皇上發下前任河南布政使費金吾保薦原任彰德府知府胡泰一摺欽奉諭㫖胡泰係費金吾于六年奉㫖保薦之人昨伊來京陛見復又言及其人可用卿以為何如人耶欽此竊思進賢退不肖乃臣子事君之大義我皇上求賢若渴圗治彌殷為人臣者若不能仰體天心舉所當舉而劾所當劾其負恩孰甚負罪孰甚臣查原任彰德府知府胡泰乃一柔姦之小人習成巧宦之態度外似明白和平中實詭譎難問其在彰德府任內凡委以公務無一實心辦理者是以臣當日就其徇庇武安縣唐紀虧空一事題參而其中原委有原疏所未載者謹另單僃細臚列恭呈御覽惟是費金吾于臣題參胡泰徇庇虧空之後即以巳經密保胡泰情由告知于臣并言所保不得其人惟恐天語下詢求臣善為回奏臣當日但知費金吾怕參胡泰徇庇専為保舉起見未料胡泰復有虧空且其中有如許情弊逮後臣察知原委而唐紀虧空之錢胡泰虧空之榖業已完足臣因事屬巳往費金吾又人尚明白老練堪為國家效力若以之題參未免可惜臣是以中止此臣徇庇之咎實所難辭也臣每以人材難得惟思曲為造就收效臂指即或其事有不得不參而其人尚有可用者又未嘗不仰請天恩格外録用費金吾前在臣處既深懼所保之非今在聖主之前又仍奏其可用臣雖不知其何心但胡泰如此存心行事而費金吾謂其居官敬慎有守有為有猷臣實未敢信也臣受恩至深賦性至拙惟知君父之前一字不欺一私不涉況人材之賢否䝉聖主之垂問臣又何敢稍為附和不據實直陳以蹈欺罔之罪也謹遵㫖覆奏所有欽奉硃批諭㫖及原摺一併恭繳伏乞睿鑒謹奏覽奏其中情節業俱僃􅊖費金吾是誠何心也日前對朕尚云卿因一時之怒將胡泰參劾後復深惜其人等語伊料朕必以其言為準斷不更詢于卿而為是僥幸之舉耶殊屬可笑朕初謂費金吾難以憑信卿第盛言其好今竟何如雖然老成歷練伊實有焉亦安可沒其所長姑試用看雍正八年四月二十七日河東總督臣田文鏡謹奏為奏明東省藩庫平餘仰請聖鑒事竊照藩司衙門錢榖總滙儲財賦以裕國用所關綦重收發出納之際必須矢公矢正詳慎彈兑不可絲毫重輕致啓弊竇兹據山東布政司孫國璽禀稱該司抵任後接受升司交代據冊開平餘銀二萬五千二百六十兩零一項本司未􅊖平餘始末隨經面問升司費金吾據云自雍正六年七月二十一日到任起至雍正八年二月初一日卸事任內支放過正項耗羡共銀六百九萬三千餘兩共平餘銀三萬兩零除用去銀四千九百餘兩巳經自行奏明外尚存銀二萬五千二百六十兩零此項平餘雖無定數然每平約有七八錢不等等語本司隨將升司所交在庫銀兩𫝊同庫官抽封彈兑費金吾未到任以前收存銀兩有每百兩恰符正數者有每百兩餘一二錢至三四錢不等者至費金吾任內則每百兩有餘三四錢至五六七八九錢不等者本司起初猶以為收放之間零星擠出平餘即在向日一八耗羡之內及細加查核究詰乃知東省向來一八耗羡今䝉皇上特賜蠲免二分止照一六耗羡州縣除扣留公費及解費外其餘耗羡全數解司此項平餘實在昔年一八今年一六耗羡之外且又不便明加令庫官髙下其手每平暗含此七八錢以符平餘之數在州縣則因解司時有此一項平餘是向之一八者實需一九今之一六者實需一七若多徴自民則恐上司之提封抽兑劾以重耗若實止一六則此項平餘無從出辦且查此項平餘惟支送巡撫養廉布政司自支養廉及放撫標兩營兵餉俱係原平竝無平餘外其他收放之間輕出重入方得有此平餘之數我皇上屢沛如天之恩蠲免動盈數千百萬此項平餘即使每平俱足八錢每年不過二萬餘兩且又髙下其手難為準則若留此項名色則州縣徴收錢糧難以一六耗羡遵行謹僃敘實情禀祈裁奪奏請聖鑒將此平餘一項豁除州縣起解錢糧照依河南俱令按準庫平自行滴珠本司于收兑時督率庫官釐毫不許多重至支給各營兵餉亦照依河南俱以所收州縣庫平原封給放毫無輕出重入之弊一應州縣徴收錢糧俱得約束令其遵奉恩㫖一六徴收如有絲毫重徴嚴加參核從重治罪如此則上下畫一不獨各州縣易于遵守而東省黎庶不至暗增重耗感激皇仁永于千萬世矣倘䝉俞允本司將各任交存在庫銀兩竝本司到任後所收銀兩逐封兑准將所有平餘數目另行造冊詳請奏明候充公用等情到臣臣查正雜錢糧絲毫為重職司管鑰固應撙節經費惟是本無平餘而必設此一名以重入者為收兑之餘以輕出者為支放之餘貽弊滋纍豈堪為法此甚非所以仰體我皇上加惠元元清理財賦剔蠧釐姦之聖意也今孫國璽請將平餘豁除照依豫省州縣起解錢糧按準庫平各令自行滴珠藩庫支放兵餉即以原封給發庶州縣徴收錢糧俱得令其恪遵一六徴耗是否允協臣謹據實奏明伏乞聖明裁鑒謹奏此舉甚善諸凡貽弊滋纍之陋習自應釐剔淨盡勿留端緒同日又奏為奏明東省道府倉監榖仰祈睿鑒事雍正八年四月二十一日臣接閲山東撫臣嶽濬來札云日前湖北撫臣費金吾入覲旋東道及東省府倉分貯榖石可以不必多貯從前分發州縣之榖可以免其運回存貯監榖照依常平一例糶三俾免陳腐之虞等情曽經面奏奉㫖令與督臣確商具奏今費金吾以抱疴未痊由濟寧水路赴任想其面奉之㫖自當敬録馳達不知此案應如何定議覆㫖惟祈裁示等語致字到臣臣隨查費金吾自入覲天顔回東曽兩次致書與臣其前項倉榖奏奉諭㫖緣由竝無一字言及今山東撫臣嶽濬既以此詢臣是湖北撫臣費金吾必經奏明或以病中未曽敬録諭㫖示臣臣謹將此事原委據實僃細奏聞仰請聖鑒臣查東省倉榖于欽奉上諭事案內據費金吾在山東布政司任內按照州縣衛所大中小酌貯榖石不足者將榖價撥買有餘者將榖價撥出其濟南青州萊州登州四府原存監榖照前收貯未買榖價提貯司庫經臣㑹同撫臣嶽濬據詳具題奉㫖依議欽遵在案逮雍正七年十月二十五日據費金吾詳請將兗寧道及濟青萊登四府現存各州縣榖一十三萬四千八百九十石零即存貯各州縣免其運回以省腳力每年奏銷于各州縣倉內登明道府款項造報等情詳臣核題臣隨批云從前道府設倉積榖自有深意竝非為現今買撥之各州縣而設況東省倉榖巳經遵㫖酌量州縣大小均勻分派奉㫖依議通飭遵照在案今若再令德州等三十三州縣衛分貯道府倉榖一十三萬四千八百九十餘石多寡參差與均勻𣲖貯之諭㫖有悖且兗寧道監榖巳撥三十餘萬石濟青登萊四府捐米折榖巳提解價銀一十五萬有奇較原貯之數亦俱減少不便再行分撥况濟青二府從前請撥州縣分貯奉部嚴駁該司于𣲖買案內各府報買榖石現在實貯竝無那移卸責等語是該府等倉榖俱係實貯府倉設彼時巳分撥州縣該司何不將抗違勒𣲖職名開報又何以不將此項榖石造入州縣存倉數內一併均𣲖今經一載突以道府運回需費混請分貯甚屬不合仰即嚴飭各該府著落違例勒𣲖之員速行運回府倉收貯仍查明有無抑勒屬員短發價值情弊開具侵扣𣲖買職名報參其撥借兗寧道倉榖亦即飭令受借州縣運送道倉取倉收送查等語此臣批費金吾請分貯道府倉榖之詳也又于雍正八年二月初八日據費金吾詳登萊青三府存貯監榖除新榖外其舊榖共二十二萬四千三百餘石巳存貯十餘年或二十餘年雖無黴爛俱屬陳久不便再為堆貯詳請題明出糶于秋後買補新榖以僃積貯如糶價每石不敷三錢著落雍正元年至雍正六年之正署各知府分賠如秋後買榖時價每石出于三錢之外應于存司耗羡銀內添補等情臣隨批云存倉積榖自應隨時出易以免紅朽今登萊青三府倉榖竝不早為經畫以致陳久將腐參賠亦復何辭況此項榖石原係收捐積貯竝非當日每石發價三錢採買者可比今稱買榖時價如出三錢之外于存司耗羡內添補殊屬不合飭再另行確議詳報此臣批費金吾請糶登萊青三府陳榖之詳也迄今任催未據詳覆是以尚未具題臣思分買監榖欽奉恩㫖照時價添給者因從前原照三錢一石發價所以照時補給今存府倉榖乃從前收捐之項非三錢一石發買之榖典守各官不早為􅊖心經理致積久陳腐是誰之過若所糶之價不敷秋後之價自應著落從前不出易之各知府分賠豈得以價過三錢一石請動司庫耗羡添補至登萊青三府為邊海要郡而青州府又現設滿洲官兵駐防實與他郡不同積貯寧使過于充裕不可稍有不足查登州府均𣲖案內原報貯榖十三萬一千三百石零未奉部覆之先又買榖二千六百三十九石零共榖一十三萬三千九百餘石據冊開分貯州縣榖四萬六千九十餘石止存府倉榖八萬七千八百餘石萊州府均𣲖案內原報貯榖一十八萬八千三百餘石并續買榖五千九百餘石未奉部覆之先又買榖一千八百餘石共榖一十九萬六千一百餘石據冊開分貯州縣二萬三千四百餘石止存府倉榖一十七萬二千六百餘石青州府均𣲖案內原報貯榖一十八萬九千三百九十餘石未奉部覆之先又買榖三萬二千八百餘石共榖二十二萬二千二百餘石據冊開分貯屬縣二萬七千二百餘石止存府倉榖一十九萬四千九百餘石臣查此三府倉榖存貯充裕若各減去數萬石雖不為少但所屬州縣巳按大中小遵㫖均勻𣲖足亦不便再加況分貯州縣有多至五六千石至一萬石以上者今若以府榖而加貯于州縣是但有便于勒買之知府使之脫身全不為後來承接之州縣計及也再濟寧為水陸通衢兗寧道存價未買榖除撥發各州縣買榖三十三萬一千二百餘石該道衙門惟存原榖并剩價買榖共七萬五千七百餘石據冊開分貯各州縣衛二萬六百餘石止存榖五萬五千餘石雖該道衙門存榖亦不為少但州縣各又加增數千石不等俱浮于原定之數且中衛原議貯榖五千石如東昌衛本該貯榖五千石今反分貯道倉榖四千八百餘石幾至加增一倍此實有未便者臣今再四思維各州縣應貯榖石巳按大中小酌定其分貯道府之榖數止千石以下者猶可聽其分貯竟作州縣貯倉之榖其多至數千石及萬餘石者州縣衛實亦不便多貯應否飭令運回或以道府現存倉榖不少令分貯之州縣于出陳易新時將此榖石糶價提貯司庫俟有動用再行發買至如萊州府之掖縣登州府之蓬萊縣皆近在同城竝無逺運之費應仍歸府倉不得分貯屬縣亦無庸糶價解司再積貯本為地方至計久積難免紅腐此項監榖自應照常平倉之例于春月青黃不接之時存七糶三輪年出易既于民食有濟又於倉貯有益臣謹繕摺恭奏伏乞聖裁批示以便欽遵另行具題謹奏費金吾業經物故前項倉榖卿與東撫嶽濬酌商妥協而為之可也其一人之見原無足憑况所區畫又不合宜耶雍正八年五月初六日河東總督臣田文鏡謹奏恭請皇上聖安朕安知卿精神體氣健旺如初甚為欣慰但巳年近古稀切勿逞力自矜于一切處慎重愛惜為宜莫辜負諄諄訓諭之意可也同日又奏為恭謝天恩事竊臣接准部咨奉上諭北河總督印務命臣暫行兼管除另繕奏本恭謝天恩外伏念臣至愚極陋莫效寸長仰䝉皇上眷顧逾格矜全僃至而頻嵗以來豫東兩省咸荷聖主昭格天祖錫福臣民是以年榖豐稔黃運安瀾臣幸際其盛藉免隕越然每念兩省機務至重至繁臣雖夙夜凛惕小心從事但智識短淺誠恐措置一有未當精神或有未周豈惟覆餗滋譴上負聖明抑且對影抱慚有靦面目乃䝉皇上不以臣為菲薄委任日隆復命臣兼管北河臣實益增感泣蓋此總河一官轄豫東兩省黃運湖河堤岸工程上關天庾之儲下繫民生之重查勘督率必須親身來往修防搶護尤賴指示機宜目下伏秋屆汛尤為緊要之時我皇上精誠默契河嶽懷柔自可保其循軌安流永慶底定惟是總督衙門事宜勢難離署辦理如臣前嵗巡歷東省各房書吏帶至百十餘人各項文卷拉載三十餘車今兼管北河奚能周歷調度隨途辦事況臣于河務機宜實未曉暢但䝉聖恩垂鑒命臣暫行兼管而且預厪宸念恐有懷挾私怨之人作姦滋弊嚴頒聖諭體恤周詳跪讀溫綸淚與聲墮臣雖草木具有微知臣雖犬馬矢當竭力惟有盡攄愚誠殫兹心血以期仰報天恩于萬一耳所有感激微忱合先恭摺奏謝伏乞睿鑒謹奏卿勢難兼顧朕豈不知蓋因一時不得其人而然也昨命范時繹往署河督之㫖甚明卿封疆責重祗可恆居總督任所坐理一切指授機宜耳范時繹今番若不竭力奮勉以贖前愆則非人類矣大抵于此任自必相宜俟其受事後試觀心行若何據實奏聞朕另有裁奪同日又奏為欽奉上諭事雍正八年五月初三日臣准部咨奉上諭南河總督印務關係緊要著尚書嵇曽筠前往署理北河總督印務著田文鏡暫行兼管欽遵移咨到臣除恭摺奏謝天恩外竊惟河務重大臣既仰邀恩命即當受印視事以便嵇曽筠交代起身前往新任但查黃河北岸封邱縣所屬荆隆口地方素稱險要近因黃流從黑堽口迤下自南而北三十餘里大溜頂衝直注荆隆口奔騰浩瀚勢如建瓴衝塌河崖離大堤僅五六十丈不等經河臣嵇曽筠親往勘度查自黑堽口迤下起至柳園口陡崖現有引河形勢急宜開挑導水東注可以永保無虞河頭河尾計工長三千三百五十丈于本年三月內㑹同臣等題估一面動撥河銀分委㕔汛員辨興工儹挑今河身業巳挑挖告竣惟俟汛水一至即可開放以慶底績臣查引河奏效全在開放之一時指授得宜則乘機導注享利無窮若調度偶有未合不但無益工程而且運道民生胥受其纍臣于開挖引河大槩僅得之傳述實未親身經歷不敢自信河臣嵇曽筠于開放引河則巳數經其事熟􅊖機宜臨時調度􅊖出萬全今荆隆口引河為垂成緊要之工必得藉其指示開放收功頃刻為久安鞏固之計況時巳仲夏汛水尅日可至而嵇曽筠亦為開放引河現駐工所大工未竣不能放心而去是以臣與嵇曽筠面相商酌俟其開放引河之後再為交代庶險要有可藉之人而工程無意外之虞且此旬日之間凡有河務重大事件緊要工程竝得就近臣與􅊖心籌酌庶接手辦理頭緒亦清臣因荆隆口為自來最險之地而開放引河實千萬年底定之工不敢不慎重其事是以冒昧奏請聖慈仰祈恩允俯俟河臣嵇曽筠開放引河後再為接印視事伏乞睿鑒謹奏所請甚是既有緊要工程共相籌酌便多留數日亦無不可同日又奏為欽奉上諭事竊照山東兗寧道呂維炳經原任江南河臣孔育珣題補淮徐道奉㫖俞允其兗寧道缺命臣㑹同揀選題補嗣臣因呂維炳現在委勘山東江南兩省水道請俟勘估事竣再令前赴新任仰䝉聖恩俞允兹呂維炳于四月二十一日勘畢回署其一應修濬建築等工容俟河臣嵇曽筠再行親勘商確定議㑹疏具題呂維炳勘估已竣應遵㫖令其前赴新任將兗寧道缺揀選題補惟是兗寧一道管轄運河千有餘里又有曹單兩縣北岸黃河堤工并分巡地方之責員缺甚屬緊要臣于兩省道府內幾經酌選非人地不甚相宜即本任原係要缺未便移易甚難其人惟查有山東兗州府知府王鴻勳前任河南鄭州知州係濵河要地該員才具幹練辦事勤敏雍正七年三月內兗州府知府員缺奉㫖著臣于河南山東兩省屬員內揀選題補臣因兗郡事繁賦重兼有督率疏濬運河之責當經疏請補授䝉恩俞允該員任事以來感激皇仁實心整飭努力任事若以補授兗寧道缺洵為駕輕就熟甚有裨益臣與河臣嵇曽筠面商意見亦俱相同但查伊父原任通州知州王友直拖缺侵欺銀兩無可著追應在該員名下解任追賠經山東撫臣嶽濬據情奏請仰荷皇上如天之仁從寬免其解任其代伊父賠補銀兩亦著豁免竝命𫝊諭勉為良吏該員感淪肌髓圗報彌殷正宜在知府任內黽勉效力況其由知州超升知府甫及一載今如以之題補道員似屬過驟臣因遲回至再未敢輒行疏題然員缺緊要此外又難其人不揣愚昧謹繕摺恭奏仰請聖裁如䝉天恩俞允竝懇頒降諭㫖以便欽遵臣為吏治河防起見是以逾格奏請伏乞睿鑒謹奏兗寧道一缺從前嵇曽筠曽薦托克托海以為人地相宜今覽卿奏但云以王鴻勳補授之處與嵇曽筠面商意見相同而竝未言及托克托海朕觀二人似屬皆可卿等就中酌一允協者具題請㫖惟期要缺得人何論升遷之遲速則例之合否耶日前保題之諭原料卿等自必仍保托克托海非謂托克托海不可用而命另揀别員也恐錯㑹朕意故諭及之雍正八年五月十七日河東總督臣田文鏡謹奏為引河開放成功萬年永慶底績事竊查荆隆口地方挑挖引河計工三千三百五十丈地險工長經臣奏明俟開放引河後河臣嵇曽筠再赴南工正在祗候聖諭兹于五月十六日據河北道朱藻禀稱河頭河尾工程已于本月十五日一律告竣甫完畚鍤即于十五日戌刻汛水陡漲二尺六寸漸至三尺有餘與河頭崖岸相平該道即差員飛赴荆隆口禀請河臣嵇曽筠協理河臣徐湛恩齊至河頭督率㕔營各汛員于十六日子時乘勢開放暢流奔注頃刻深通查河面原開寬十餘丈今已刷寬至二三十丈不等原開深九尺一丈不等今巳刷深至二三丈不等逮至十六日辰刻即有重載客船從新河來往駕駛莫不共頌神速等語臣查河頭河尾甫于十五日完工而不先不後即有汛水陡至自戌至子計汛到開放未逾三時而萬年底定之功成于指顧此皆由我皇上至誠至敬昭格天祖神明默相垂利無窮兩河億萬蒸黎咸登袵席羣戴皇仁所有引河開放成功緣由理合恭摺奏聞仰慰聖懷再引河既經開放臣候河臣嵇曽筠到省便當接印嵇曽筠即可馳赴南工合併奏明伏乞睿鑒謹奏覽奏荆隆口引河開放成功深慰朕念同日又奏為據實奏懇聖恩事竊臣荷䝉恩眷髙厚無比自惟竭此衰鈍仰酬萬一臣自病愈之後雖飲食如常而精力未免稍弱所恃藥餌早晚資補以時調攝但本處醫家既乏精曉之人而他省延來者又皆名不符實是以臣前此抱病惟恃按察使陳世倕開方調治曽經奏明逮至痊愈之後陳世倕仍復時為診視迄今所服方劑皆其加減殊有裨益但臣與臬司分關統屬時常出入礙于形跡今䝉聖恩署理藩司事務更繁若以醫道分其身心亦有未宜蓋以之處暫則可以之處常則不可也臣屢囑陳世倕訪求良醫又復難得其人因言伊有胞弟陳世偓者係浙江甲午科舉人現寓都門明晰醫理臨證亦多可以邀其來豫留住臣署臣隨囑其遣人相約兹陳世倕接到陳世偓家信云禮部侍郎錢以塏業經將伊保舉助教現在祗候引見等語陳世偓既係部臣保舉之員臣又何敢妄希延至惟是臣身仰荷聖恩顧復有加無巳屢䝉聖諭諄至加謹調攝臣亦何敢不重自保護在陳世倕深知臣之脈氣營衛又熟􅊖其弟之用藥治方可以信任調補伏念臣受恩最深無事不䝉垂鑒不揣冒昧仰懇聖慈俯將錢以塏保舉之助教陳世偓賞發給臣俾得留于署中長有相資診視之人則從此犬馬不衰之年皆出聖主恩賜之日也再陳世偓係大學士臣陳元龍堂姪倘䝉俞允竝懇賜諭陳元龍即可令其束裝赴豫合併奏明伏乞睿鑒謹奏有㫖諭部令陳世偓來隨伊兄陳世倕任所學習行走矣到豫之後可以資其診視但慮兄弟二人醫道未必便無同異至陳世倕係奉朕㫖醫卿原可明宣于衆出入督署亦復何礙之有其遵諭行無庸避此形迹硃批諭㫖卷一百二十六之二十欽定四庫全書硃批諭㫖卷一百二十六之二十一硃批田文鏡奏摺雍正八年五月二十三日河東總督臣田文鏡謹奏為欽奉聖訓據實覆奏事雍正八年五月二十二日據臣齎摺家人回豫捧到皇上硃批諭㫖於臣請以兖州府知府王鴻勳補用兖寧道缺摺內欽奉硃批兖寧道一缺從前嵇曾筠曾薦托克托海以為人地相宜今覽卿奏但云以王鴻勳補授之處與嵇曽筠面商意見相同而竝未言及托克托海朕觀二人似屬皆可卿等就中酌一允協者具題請㫖但期要缺得人何論升遷之遲速則例之合否耶日前保題之諭原料卿等自必仍保托克托海非謂托克托海不可用而命另揀别員也恐錯㑹朕意故諭及之欽此臣查山東兖寧道缺與河南管河道缺先後俱奉諭㫖命臣㑹同河臣嵇曽筠揀選題補臣因兗寧一道不但管轄黃運堤工并有分巡地方之責必須諳􅊖河防而又曉暢吏治者乃克勝任兗州府知府王鴻勳久于河工曽任鄭州濵河要地歷升知府才識幹練其于山東兖寧道缺可稱駕輕就熟至河南管河道缺専理河務無地方之責托克托海在豫日久熟練河工辦事勤敏其于河南管河道缺亦為駕輕就熟臣與嵇曽筠數次面議相同是以擬將王鴻勳請補兗寧道托克托海請補管河道其嵇曽筠摺薦托克托海可為兖寧道之處竝未向臣言及所以臣奏請王鴻勳補用兗寧道摺內未將托克托海敘入聲明今䝉聖諭命臣二人酌一相宜者具題請㫖但托克托海臣等已經㑹同具題請補河南管河道缺在案其兖寧道缺王鴻勳洵為人地相宜謹將原委僃細奏明可否將托克托海補授河南管河道將王鴻勳補授山東兖寧道伏候聖裁除遵㫖具題外為此繕摺請㫖謹奏如此可謂人缺各得其宜矣同日又奏為聖恩之垂念彌深臣心之感激難巳欽奉聖訓謹再據實覆奏事竊臣前奏恭請皇上聖安摺內欽奉硃批朕安知卿精神體氣健旺如初甚為欣慰但巳年近古稀切勿逞力自矜于一切處慎重愛惜為宜莫辜負諄諄訓諭之意可也欽此臣伏讀聖諭恭聞聖躬乾健景福日隆犬馬下懷欣忭無既至臣過䝉眷顧天語春溫仰承訓㫖感激涕零竊臣以去冬不自慎重感冒風寒上厪宸念君父篤愛之懷有加無巳臣每切不安撫心自疚是以恪遵聖訓加謹調護春後漸次痊愈而精神體氣均得復初兹復䝉我皇上鴻慈垂注訓諭叮嚀雖慈親之于愛子無以喻其懇摯臣何人斯仰邀顧復至于此極在臣有生之年􅊖為報恩之日敢不欽凛聖諭一切惜養庶藉衰鈍之軀少效駑駘之力但臣左腮頰上素有舊疾近今三四年來每春輒患腫痛即從腮內出膿數日旋愈率以為常今春亦復腫發却于頰外出膿其出膿之所尚有小孔未經收口忌風射入臣倍加謹慎前因疾同疥癬未敢瑣瑣奏聞惟是天恩深渥淪浹肌髓臣現延有外科加意療治今巳將次平復至臣之身體較之昔年稍弱實巳别無他恙相應據實具奏仰慰聖念伏乞睿鑒為此繕摺恭謝天恩謹奏卿體無恙朕懷深慰惟宜加意調攝凡為封疆大吏者當思此身上為國家宣力下為蒸黎造福愛惜保護凡百酌量精神而動不至勞乏致疾方謂能遵朕訓汝其謹志毋違雍正八年六月初八日河東總督臣田文鏡謹奏為恭報豫省雨澤日期仰祈睿鑒事竊查豫省五月十四十五十六十七等日節次得雨分寸透足情形經臣恭摺奏聞兹查開封府屬地方于六月初二日未時至申時得雨四寸初三日未時又得雨四寸而各屬州縣亦于六月初二三四等日各得雨三四五寸不等四處調勻沾被所有髙糧榖黍棉花芝麻雜豆等項均各滋盛非常民間欣望有秋謹將得雨日期分寸恭摺奏聞仰慰聖懷再山東各屬州縣有報于五月十四十五等日得雨四五六七寸者有報于五月十六十七十八等日得雨七八九寸以至四野透足不等者合併奏明伏乞睿鑒謹奏節序巳屆季夏正當大雨時行之際惟恐過多耳何須奏報沾足同日又奏為欽奉上諭事竊臣接准部咨奉上諭福建巡撫員缺著河南布政使趙國麟補授河南布政使員缺著河南按察使陳世倕署理河南按察使印務著田文鏡委員署理欽此臣隨轉飭欽遵兹查趙國麟于本年五月十七日卸事其布政使印務陳世倕當即接受署理訖該員補授按察甫經一載今復仰荷天恩簡署藩陳世倕感激聖慈彌矢圗報臣益䇿勵有加務令殫誠盡職上副隆眷至所遺按察使印務臣查豫省所屬道員內如河北道朱藻目下伏秋屆汛一切河工堤岸正資督率稽察未可刻離南汝道董自超所轄地方界連江楚近因汝寧守費謙流丁憂離任現又委其兼攝府事彈壓緊要亦不便調赴㑹城惟查開歸道張建德監兑漕運為期尚早該道又駐劄在省隨就近委令兼署所有河南按察使印務臣謹遵㫖委員署理緣由理合恭摺奏明再趙國麟忠厚謙謹臣甚愛之敬之惟辦事尚缺閲歷不能裁決􅊖當臣見其虛心善受隨事詳明指導期與精進今䝉恩簡任巡撫臣念福建為濵海要地習俗刁悍兵民狡黠綏輯為難臣昔佐縣閩中最所深􅊖趙國麟雖自閩藩調任風土情形諒亦略諳惟巡撫職任封疆振綱挈領肅清吏治贊畫軍戎更非藩司可比趙國麟誠朴和平安靜有餘而風力經濟尚覺未逮是以臨行之際臣諄諄勉以嚴明自持整飭為務甄察屬員懲戢姦暴寬嚴互濟冀得上副聖明委任之重臣緣受恩深厚圗報時殷不但本省屬吏訓勵最切每遇各員遷升别省臣于其地方事宜茍有所知必為僃述原委確指利弊總期吏治民生均有裨益以無負聖恩兹趙國麟已于六月初二日自豫起程赴濟寧州候㫖臣謹一併奏明伏乞睿鑒謹奏覽奏知道了命趙國麟蒞任閩撫實係不得巳之舉朕求賢若渴苦衷向誰告耶通政使革職從寬留任臣留保謹奏臣閲邸抄見因四川道員職守不専皇上特頒諭㫖令嗣後將所轄州縣命盜錢糧各案俱由道員申轉以専職守臣查山東有濟東道轄濟東二府直隸泰濵武髙濮五州登萊青道轄登萊青三府直隸莒州一州兗寧道轄兖州一府直隸東平曹沂三州凡所轄州縣之命盜錢糧各案俱直達兩司竝不由道審理申轉亦與四川無異再聞各省中道員亦多有不由其審理申轉事同一例應請敕下各省督撫畫一遵行以専職守伏祈皇上聖鑒臣謹奏聞留保條奏之摺發來卿看其是否之處酌議奏聞同日又奏為覆奏事雍正八年五月十五日據臣齎摺家人回豫恭捧皇上發下通政使臣留保條奏一摺奉有硃批臣欽遵查得守巡各道職任監司所屬州縣刑名錢榖案件若止詳藩臬而不申報道員則道員于地方事宜無案可據雖有統屬之名竝無稽督之實殊非設官本意伏讀上諭令四川各州縣案件俱由各道申轉所以飭吏治而重職守者聖明固巳無微不照也向來東省州縣命盜錢糧等案除分報撫臣及臣衙門并布按二司外仍申報該管道員至事關糧務鹽務驛站河工之參案則各由専管道員㑹同藩臬司審轉是東省州縣各案原係申報道員隨事可以查察非如川省州縣全不由道申轉毫無關涉者可比惟是各省命盜等案州縣止申報道員而不解道審轉者誠以藩臬兩司為通省錢榖刑名總滙故定例錢榖由藩司審轉刑名由臬司審轉而各道分守分巡但令稽察督催而不與以審轉之權其經畫定制之初良有以也在藩臬雖云總滙然錢穀刑名各專其責今若以州縣錢穀刑名案件俱令各道審轉縱所轄非係通省而本任專管之外加以錢穀刑名任兼藩臬之事即有肆應之才恐亦日不暇給况承審案件多一衙門則多需時日多一審轉又多增案牘上下申移頭緒愈繁且人犯多拖纍之苦解役多守候之艱而各道盤查巡歷或差委公出亦不能常在署中解到人犯未能即審押禁等待益慮疏虞滋弊道員向無承審之責招案多未練達姦胥或因之而舞弊刁犯或藉此而狡展輾轉稽延非徒無益伏思命盜錢糧歷經州縣府司逐層研審方解督撫再加親鞫成讞可謂詳且慎矣似不必復令道員審轉多經一手故各省州縣命盜錢糧率不由道審轉此亦勢使然也臣試論東省道員內如濟東一道通省驛站馬匹錢糧是其綜核登萊青道整飭海疆全資巡歷兖寧道管轄黃運河工千有餘里疏築修防事尤繁劇即豫省道員內如管河道任重宣防開歸道辦理漕務兼管通省驛鹽河北南汝兩道或兼吏治河防或任分巡彈壓其于所屬命盜錢糧東豫兩省道員竝難責其審轉再臣恭繹上諭四川州縣案件俱令由道申轉竝未有令道審轉之諭㫖而東省各屬案件現皆申報道員豫省亦然是職守竝無不専所有留保請將州縣命盜錢糧由道審轉之處似無庸置議臣謹據實覆奏是否有當伏乞皇上睿鑒謹奏分剖甚屬明悉可即繕疏具題俾直省各督撫咸知卿有此議也同日又奏為郡守才不勝任據實奏明仰請睿鑒事竊查東省萊州府知府王榮賜前任河南新鄉縣令臣因該員為人誠實辦事勤慎經臣題補陕州知州送部引見奉㫖俞允該員于雍正七年正月內到任陕州即于本年五月內奉㫖補授萊州府知府臣于其赴任時又面加訓勵王榮賜感激聖恩亦自言力圗報效及其到任以後臣察知辦理郡務竭蹶不遑臣因其初為知府民情庶政或未熟悉復隨事訓飭不憚諄諭切指該員雖深自奮勉向上無如限于才智迄今一載未見整飭之效甚覺勉強臣恐所聞未確又復致詢撫臣嶽濬亦言該守人雖朴實稽其政務接其言論誠難勝任等語臣思萊郡海疆臣等既察知王榮賜難勝斯任何敢因循貽誤但王榮賜居官尚屬謹飭可否遵照甄别知府之上諭請將王榮賜以在京部屬改補所遺萊州府員缺仰懇聖慈另簡能員補授庶邊海要郡整飭得人倘䝉恩允臣與撫臣嶽濬再當合詞具題至東省登青二府亦屬濵海地方其署登州府知府姚庭槐經臣由膠州牧題請署理登郡試看勝任再請實授兹查該員到任未久雖無循卓出人之政亦無曠廢職守之愆尚須再為試看青州府知府廣夀經臣由汝陽令欽遵諭㫖于豫東兩省人員內不拘資格題補青守到任以來雖辦事盡心才稱其缺但氣質稍粗舉動未能􅊖協亦須化誨涵養此二員者容臣與撫臣嶽濬不時察查覘其後效另行據實奏聞合併奏明伏乞睿鑒謹奏所奏皆是此萊郡一缺卿意中有勝任之人否雍正八年六月二十二日河東總督臣田文鏡謹奏為奏明事竊惟學政一官宣揚風化振拔人才職守最為清要必得矢公矢慎衡校嚴明俾鑽營幸進之徒無以施技逞姦則內外肅清諸弊可杜兹查河南學臣吳應棻今巳歷試彰衛懷開四府臣見其衡文課士一秉至公實心殫力于廪結則挨保之外增用認保互相覺察于考校則飭拏鎗手密加巡緝以防傳遞于文童則屢加覆試詳審筆跡于武場則合觀技藝細加甄取凡其録進擯斥􅊖皆精當不爽尤能督率提調送考等官謹凛襄事綜理周密無可窺伺夤緣是以士論輿情翕然稱頌至其體度峻整裁事和平更為寬嚴􅊖協臣與學臣同事地方資其整齊化導共勷聖治臣既察知吳應棻政績卓著理合據實奏聞再查東省學臣蔣蔚勤慎明白共劣生積缺錢糧竝自來多事者訪實即行黜革考察教官尤無姑容一切學政士習均能循分整飭相應一併奏明伏乞睿鑒謹奏覽奏俱􅊖但吳應棻平素非如此人也品行多屬不妥似流入鑽營奔競之習近年以來始覺奮志改勉朕向知其底裏今心行果否如一久暫有無異同卿再留意驗視具奏以聞同日又奏為奏明程家寨工程危險并搶護平穩緣由仰祈睿鑒事竊查祥符縣南岸程家寨月堤地勢窪下大河水趨南岸原屬險要經前河臣嵇曽筠題估邁掃加鑲在案時屆伏汛又值大雨時行該工于六月十四日驟長水三尺八寸全河大溜盡注該工掃外水深三丈一二尺不等堤掃蟄陷臣飛飭署開封府知府劉永錫上南河同知陳儀下掃搶救竝調河營僃辨及别汛兵夫掃手齊集保護并差臣標把總及在省試用效力人員咸赴工所以僃委用緣十五六七等日河水日長共計五尺五寸勢湧溜急新舊掃箇漸次漂走堤外水深四五丈不等巨浪洪濤奔騰衝激難以下掃惟有急加裏創以為後衛隨于十七日面委署布政使陳世倕多帶錢文赴工分發買土適河北道朱藻至省臣因其平日熟練工程辦事竭力隨又面授機宜委令協辦朱藻到工即將員辨分𣲖執事不辭勞怨晝夜嚴督夫役儹築防護臣于二十日親赴該工查看督率自十八日起至二十日辰刻水巳消落三尺查險工八十餘丈之內舊堤全刷者止十餘丈汕去十分之六者六十餘丈其新築裏創現今寬有六七丈不等髙與舊堤相等人夫共有七千餘名晝夜趕築加幫髙厚而堤外之水止深一丈六七尺護崖掃箇俱巳下齊現在疾儹簽加大樁粗纜工程可保平穩其善後事宜臣細加斟酌并搶修工料另疏具題外所有程家寨工程危險及搶護平穩情形理合恭摺奏聞此外黃運兩河工程伏汛將過均屬平穩合併奏明恭慰聖懷臣因該工水勢平緩裏創外掃均巳指示趕辦復嚴諭在工大小員辨分督兵夫星夜儹修完固臣即于二十一日回署辦事再管河道員缺前奉諭㫖令臣與前河臣嵇曽筠揀選題補臣等因上南河同知托克托海在工年久熟􅊖河務而又時屆伏汛不便乏員隨一面委護道一面題請實授臣以托克托海必當殫心竭力奮往向前豈期于此等要工不思急為搶護反因朱藻到工心懷嫉妬退縮不前查托克托海自十六日到工之後曽具一禀到臣第言水勢汹湧竝不言及在彼如何搶護如何督率臣巳疑其不􅊖心經理隨委署按察司鹽驛道張建德赴工查看托克托海竟隨協理河臣范時繹安坐一旁張建德差人邀伊看工不至隨又詣其坐處云工程何等危險如何在此閒坐托克托海答云我在此看守裹頭掃又云沒見朱藻分𣲖單子張建德隨將分𣲖單子交給托克托海插入靴內仍然端坐不動張建德見其玩工形狀因云護道在此陪坐我看工去了范時繹隨云我們也同去看看未幾托克托海又回原處安坐總之督率稽察搶理之事托克托海絶不在意至在工夫役托克托海亦不約束查察其有乘晚逸去者竟置不問經朱藻將一夫頭責懲夫役始凛然不敢偷閒臣查該工危險異常職事員辨人役猶知凛惕上緊而托克托海獨不以險工為念一味妬才嫉能挾私廢公若不嚴行參究則在工人員無所懲勸臣是以繕疏題參不敢自避保題失當之咎而稍為劣員回護也至協理河臣范時繹奉㫖令其防汛稽察臣于初見之時聽其言論似屬明白私心竊喜謂可助臣不逮今值此險工未見有督率之方稽察之明如玩工之托克托海連日侍坐其旁而不知督責其才識巳大槩可見矣臣䝉皇上恩遇至深委任至重臣不敢不據實一併奏聞統祈睿鑒為此謹奏據實糾參一無回護朕深為嘉與托克托海如此玩誤工程實屬大奇所以云小人之心不可以常情測度也題夲到日另有諭㫖同日又奏為奏明事竊臣所住衙署最後一院有樓房七間東西廂樓各三間臣因此樓閒曠無人居住遂于樓後供設家堂香火早晚掃除之外即將院門扄鑰兹于六月十七日早家人換點香燭將所用火煤紙不知誤遺何處未及查看鎖門而出及至飯後忽見樓房煙起啓門入視火巳燃上頂槅忩櫺其梁柱年久枯燥見火即燃頃刻之間樓頂塌下遂將火勢壓住惟東廂樓為火焰所射亦即塌下所幸是時無風兵役各攜救火器具協同家人登時撲滅附近之西廂樓并兩耳房俱未延燒至臣所住正房及堆貯文卷處所相距更逺竝無燬失此雖臣之家人不戒實臣供職多愆以致火災示警然樓房髙敞當火起之初樓頂立即塌下不致火𦦨逺及須臾即熄則又仰賴我皇上福庇所賜臣惟有省躬思過益加凛惕夙夜不懈而巳所有臣署失火情由理合據實奏聞因所燒係數間空房竝無燬失文卷未敢具本題報合併奏明謹奏此等事何必具本題報據云火災示警等語朕意默默中事最難知從來聖賢之所不能免者或化大為小亦未可定惟于方寸間切毋存怨天尤人之念雍正八年七月初八日河東總督臣田文鏡謹奏為河工需員甚殷仰請聖恩簡發以僃差委事竊照黃運兩河工程均關緊要時厪睿念指示修防臣䝉皇上殊恩特命掌管北河印務夙夜兢兢惟有恪遵聖訓倍加謹慎期于河流安瀾堤岸鞏固上慰聖懷第河道綿長事務紛繁如修守防險稽察趲督在在需員而管河同知通判及沿河州縣又例應題補非諳練河工不足以供任使非在工學習不能驟至諳練今查前河臣嵇曽筠移送效力人員冊開巳經取結咨部者除陸續題補竝現在委署及告假緣事回籍外僅有二員在工其餘未經咨部取結共計四十餘員現在查取家道殷實印結其是否俱係殷實尚難懸定況皆係州同州判縣丞主簿雜職及生監微末人員多係到工未久于修防事宜全然未􅊖止可在工學習奔走且為數無多苦不敷用臣思河防重務必須多得人員預為學習庶臨時差委不致乏人遇缺亦可量才委署題補臣謹仰懇聖慈敕部在于候選候補同知通判知州知縣內簡發十員赴北河效力雖此等人員平日未歷河干河務非其通曉但得明白勤幹之人在工學習自可望其進益以僃差委再效力人員例應取本籍家道殷實印結如䝉俞允簡發人員到工臣即遵例查取印結咨部留工效力合併聲明伏乞睿鑒謹奏河工效力人員候朕酌定有㫖諭部同日又奏為恭請簡發人員以資吏治事竊照吏治在乎得人而用人必因其材臣查豫省數年以來屢䝉皇上簡發各項人員命臣酌量委署試用使地方所出員缺即可因地量材斟酌委署實于地方吏治均有裨益今查試用人員或經臣題署或現在委試所餘不過數員而其才情識見僅在中平止宜于簡小地方若緊要繁劇州縣缺出即乏人署理是以臣每遇一要缺即審酌再四難得其人至于同知通判常多差遣公出又有升遷事故其所管水利糧務督捕等事亦需人署理若令知府首縣護理未免不能兼顧臣謹仰懇聖慈于在京候補候選同知通判知州知縣內簡發二十員到豫俾臣得就中酌選量才委署不致臨期乏人可收臂指之用如內有才猷敏練識見老成試有成效者臣又可于應題要缺酌量題補臣仰體皇上慎重地方造就人材至意謹繕摺奏請伏乞睿鑒謹奏亦候酌定有㫖同日又奏為程家寨工程穩固再行奏明仰慰聖懷事竊照祥符縣南岸程家寨前因汛水驟長大溜直射漂汕堤掃隨經臣將工程危險及搶護情形恭摺奏聞今查該工自六月十八日起水勢漸次消落又對岸切去灘嘴四百餘丈溜歸中泓隨督率人夫晝夜儹築裏創今巳一律完固堤外又下護崖掃及沉水大掃密簽長樁倍加粗纜儹做堅實今險下移復于下首加裏創鑲防風以資捍禦而該工西首又得回溜之勢水緩沙停逐漸淤成嫩灘全將掃壩包裹查七月初六日探量得頭壩水深僅四寸六寸不等中壩水深五寸下壩水深七寸伏查該工前此北髙南低勢如建瓴掃外水深四五丈不等洪濤衝激危險無比今竟大溜北趨掃外淤出嫩灘再遲數日即可淤平似此危險呼吸之勢轉為至平極穩之工皆由我皇上至誠感格天祖河神默佑因而化險為平如此神速然臣不敢以工程巳幸平穩稍為懈怠惟嚴督在工人員更加謹慎將南北兩岸堤掃各工先事綢繆務期鞏固再山東運河自六月十五日起至二十六七風雨交作宣泄不及濟寧嘉祥巨野魚臺汶上等處湖河亦有漫溢今幸天氣晴霽水漸消落臣巳飛飭道㕔等官上緊修堵并將縴道墊妥務使回空糧艘遄行無礙其一切應修工程及動用存庫盈餘夫錢之處容臣確核另奏合併聲明伏乞睿鑒謹奏當兹雨水過盛之際概宜加詳加慎為之雍正八年七月十五日河東總督臣田文鏡謹奏為彚奏東省被水州縣并陳賑恤事宜仰祈睿鑒事竊照兖州府屬之滋陽濟寧曲阜魚臺金鄉汶上曹州屬之嘉祥巨野等八州縣于六月二十四五六七等日連得大雨又汶泗二河水勢漲溢民間房屋以及窪地田禾不免被淹坍損俱經臣據報飭司委查隨恭摺奏聞今續據濟南府屬之歷城長山章丘淄川齊東新城兖州府屬之泗水嶧縣寧陽東昌府屬之聊城堂邑朝城范縣莘縣冠縣青州府屬之樂安臨淄直隸沂州東平州并州屬之東阿直隸泰安州并州屬之新泰萊蕪直隸莒州屬之䝉隂東平所等二十四州縣一所各報稱本年六月二十一至二十六七等日風雨交作山水陡發河水驟長平地水深數尺傍山臨河處所并窪下地方房屋多有倒塌田禾不免被淹除飛飭山東布政司委員確勘其被水情形聽撫臣嶽濬題報外臣查東省濟寧等州縣連朝大雨雖日期間有先後參差總在此旬日之內以致山水河水竝發一時容泄不及是以山隈水涯及低窪地方水勢漫溢田禾難免被淹而民間又多係草房土墻本不堅固所以易被坍損然此雨水過多皆臣奉職多愆上天示警臣據報之下不勝悚惶惕懼伏思皇上愛養黎元無所不至雍正三年山東雨水偶多上厪聖念特頒諭㫖詳察生計蕭條升斗無資以及田地被淹不得收穫房廬倒塌不安厥居者一面賑恤等因欽遵在案其時被水窮民咸沐皇恩不致一夫失所今濟寧等州縣被水村莊不無資生無䇿之窮民可否將生計蕭條升斗無資以及田地被淹不得收穫房屋倒塌不安厥居者動用存倉榖石賑濟大口每月給榖三斗小口每月給榖一斗五升各給兩箇月口糧貧民可不致有乏食之虞再其中或有極貧之人雖給以倉榖糊口有資而無力修理房屋棲身無所可否于藩庫充公銀內每户酌給銀一兩五錢以為修理房屋之費則被水窮民咸得安居粒食共戴浩蕩之皇仁於無既矣如䝉皇上俞允臣即檄飭藩司并令該管道府督同地方官實心詳察給散務期皇恩下究民沾實惠此臣愚昧之見應否如此辦理伏候聖裁再運河水勢臣委官查勘現今巳經消落臣嚴飭道㕔汛員修補縴道不誤糧艘回空黃河兩岸工程甚屬平穩豫省秋禾髙粱早榖早黍現在刈穫恐厪聖懷合併奏聞謹奏所奏是即照議作速辦理仍另有諭㫖今嵗直隸各省被水處甚多非止山左此數州縣皆緣朕躬偶失調攝不能克盡孜孜勤敬之道而又悲痛吾弟怡親王溘逝未免有傷天和之所致實朕之咎非卿等之過也至若卿等于臨民蒞政之際有無寬猛失宜緩急不當亦自應􅊖心體究我君臣期共修省以感格天心而巳雍正八年七月二十五日河東總督臣田文鏡謹奏為敬推皇仁奏請睿鑒事雍正八年七月二十二日臣接准户部咨文因江南河臣嵇曽筠奏報黃運兩河水勢情形欽奉上諭將邳州宿遷桃源等處恩賜賑濟又因山東發水之處民間田舍亦被損傷特命撫臣嶽濬遴選賢能官員查勘動支庫銀速行賑濟并應行蠲免錢糧之處確查奏聞等因臣查東省州縣夏秋之間連降大雨山水河水一時竝發容泄不及至有漫溢臣陸續據報隨經兩次恭摺具奏乃臣奏摺未到之前巳䝉聖明逺照綸綍飛頒臣跪讀之下既慶萬姓沾沐皇恩之大又愧微臣聞知奏報之遲隨即移咨山東撫臣嶽濬并飛行山東布政使孫國璽欽遵速行在案今查山東被水州縣除臣前此奏明外又續據濟南府屬之齊河濟陽青城肥城鄒平兖州府屬之鄆城城武鄒縣濟寧衛東昌府屬之館陶邱縣清平東昌衛青州府屬之益都髙苑博興夀光諸城臨朐萊州府屬之昌邑濰縣髙密直隸泰安州屬之長清直隸武定州濵州并州屬之蒲臺霑化直隸曹州并州屬之曹縣直隸沂州屬之費縣郯城直隸東平州之平隂夀張直隸濮州并州屬之觀城直隸髙唐州并州屬之禹城直隸莒州并州屬之日照沂水等三十八州縣二衛各申報被水情形到臣計前後共七十州縣三衛所臣思該州縣衛所各呈報被水雖其中自有輕重不等而一州一縣之內其村莊亦各有髙下之殊然現在委員查勘所有新舊錢糧似應暫緩催徴統俟查確之日分别應免應徴奏聞請㫖至被水較重之州縣衛所確查實在窮民遵㫖賑濟其被水稍次之州縣查明酌借倉榖其被水較輕之州縣將存倉榖石暫行出糶以平市價如此則民力可舒民食有資數十州縣黎庶咸沐浩蕩之天恩于無既矣臣敬推皇仁不揣冒昧一面札商撫臣嶽濬斟酌料理具奏務體聖心使被災窮黎均沾實惠不致一夫失所以仰副我皇上保民若赤之至意臣謹繕摺奏聞伏乞聖鑒謹奏巳有諭㫖矣雍正八年八月初四日河東總督臣田文鏡謹奏為敬陳黃運兩河工程仰祈睿鑒事竊臣猥以菲材荷䝉聖恩掌管北河河道總督印務奉命以來惟有凛遵聖訓敬謹從事兹查豫省南北兩岸險要工程臣巳嚴飭道廳等官相機料理加意防守現在堤掃各工俱保護平穩惟舊日大堤尚有卑薄之處前雍正三年奉㫖增卑培薄彼時因尚非險要暫緩加幫今連年伏秋汛漲堤外漸次淤髙堤身漸覺卑矮必須急為增修與前此增卑培薄之工一律髙寬則汛至無虞臣現飭管河河北兩道擇其應修者親勘確估俟估報到日臣一面具題一面動帑興修務于來嵗桃汛前完工以資捍禦再東省運河前因水勢漲漫縴道多有殘缺糧艘正在回空刻不容緩臣即飛飭兗寧道王鴻勳動支庫貯節省夫價速為分發修墊使回空無阻經臣恭摺奏聞臣思運河為糧艘經行要道不可不􅊖心經理今雖巳修殘補缺不誤回空然其間有先經題估而詳報尚被水占難以興工者亦有續請興修雖據估報尚應確勘者均宜相度形勢斟酌機宜分别應緩應修次第舉行為一勞永逸之計臣巳遴委在豫熟諳河務之員前往東省通行查勘俟該員回日臣擇其緊要之工再飭兗寧道王鴻勳覆勘確估具題請㫖總之臣受恩深重固不敢不嚴加稽察杜屬員之捏冒侵肥亦不敢因循茍簡致工程之臨事周章但臣智識淺陋恐措施未當謹先繕摺具奏伏乞皇上聖鑒訓示遵行為此謹奏區畫巳屬合宜無庸再訓同日又奏為遵㫖覆奏事雍正八年六月二十三日接准部咨內開欽奉上諭歸德營參將員缺著祿鼎坤補授賞銀一萬兩令其帶往河南為伊置産搬家及往來盤費之用欽此又于本年七月十一日接署兵部尚書臣三泰左侍郎臣永夀等字內開奉㫖爾等寄字與田文鏡將録鼎坤交與田文鏡留心教導伊若在河南置産著田文鏡委員代伊料理欽此仰見我皇上以天地覆載之心𢎞造就生成之德懷柔竝至教養兼施臣欽遵諭㫖將一切營伍事宜􅊖向祿鼎坤面加教導又敬宣皇上豢養優待之天恩及代為料理置産委曲周詳之聖意祿鼎坤感激皇恩喜出望外其置産之處臣現委歸德府知府萬國宣就近料理務期妥協至祿鼎坤業于七月二十五日到歸德營參將任臣復諭調任參將孫𢎞將營伍情形及該將在彼整理之處一一告知臣仍當留心隨時教導所有祿鼎坤到豫及委員料理置産緣由理合繕摺覆奏伏乞睿鑒謹奏據奏祿鼎坤巳抵參將任知道了料理甚好同日又奏為覆奏聖訓事雍正八年七月二十五日臣齎摺家人捧回臣奏程家寨工程穩固摺內奉有硃批臣伏查黃運兩河關係運道民生時厪睿念臣䝉聖恩委任􅊖心料理隨時調度巳將委員查勘并請動用節省夫役銀兩修築東省運河縴道緣由恭摺具奏現今白露巳過汛水自此漸應消落各處工程俱報平穩臣惟有欽遵聖訓倍知詳慎督飭在工大小員辨謹小慎微極力修防務期堤工鞏固以仰副我皇上殷殷教誨之聖意所有奉到原摺理合恭繳謹奏覽奏汛水漸消工程平穩朕心深慰雍正八年九月初一日河東總督臣田文鏡謹奏為兩省河務重大敬遴協理之員仰請聖裁事竊惟黃運兩河攸關運道民生我皇上時厪睿念指示修防績底平成臣䝉聖恩掌管北河河道總督印務敢不殫精竭慮敬謹從事以仰副我皇上任使之聖意惟是修防之法全在未雨綢繆而相機經理尤須親閲情形臣職守封圻未能遍歷各工往來查看誠恐先後緩急調度失宜必得一熟􅊖河務有才有識可以深信之員與臣相助為理不必臣親自到工一如臣之身歷其地平險宛在心目方可斟酌機宜次第料理庶于河工有裨臣查河北道朱藻才幹明敏洞曉河務身任勞怨毫無瞻顧事前識平險之機臨事得調度之法凡修理工程動用錢糧無不嚴查確核帑無浮冒工早完固即如雍正八年三月內荆隆口估挑引河一案該道寢食工所督率員辨兵夫晝夜儹挑于三月二十二日興工五月十五日告竣是日汛水即至立時開放頃刻成河又如六月內祥符縣南岸程家寨月堤汛水驟長全河大溜盡注該工新舊掃箇漂走堤岸坍缷危險異常臣面授機宜委令該道赴工協辦該道即一身兼任分𣲖執事同署開封府知府劉永錫等嚴督員辨兵夫儹築裏創又以北岸暗灘突出逼溜南射委員帶領兵夫切去灘嘴幸溜走中泓創堤築起掃外淤成嫩灘工程穩固又該工東首舊堤于六月二十三日四更時巡堤官兵禀報大漏一處孔穴如桌面寬大河水噴激堤外勢甚汹湧危在呼吸在工員辨兵役莫不驚惶無措該道正在督築裏創聞之飛奔至前站立漏孔處所挺然不動急呼家人兵役飛持隨帶綿衣綿被并令各夫擡土填塞其時在工夫役見該道履險如平咸奮勇爭先一擁而至隨將漏孔填塞得免潰決凡此化險為平功成神速固皆仰賴我皇上至誠至敬感格天祖河神默祐所致而朱藻于此數事亦見其有膽有識不辭勞瘁若以之助臣辦理實于兩省河工大有禆益臣受恩至深感恩至切日夜思維無可仰報惟此以人事君之誠拳拳于中是以不揣冒昧恭摺具奏可否將朱藻特賜加銜協理河務鴻恩出自聖裁再前此辦理程家寨險工各員辨著有勞績者容臣另摺奏聞外所有河務重大敬遴協理之員理合據實繕摺奏請仰祈睿鑒謹奏據奏以朱藻加銜協理北河所見是候另㫖諭部雍正八年九月初四日河東總督臣田文鏡謹奏為奏明東省賑濟事宜仰祈睿鑒事竊照東省被水州縣屢奉恩㫖賑恤令臣等斟酌料理仰見我皇上軫念黎元不使一夫失所之至意臣前因被水州縣有報稱房屋倒塌者誠恐其中有極貧之人雖給以倉榖糊口而無力葺屋棲身無所是以仰請皇上格外天恩每户給銀一兩五錢以為葺屋之費荷䝉聖恩俞允在案今于九月初一日接到部咨內開撫臣嶽濬奏稱確勘成災者約有六十餘處每處災民多者二萬餘户少者亦有萬餘户房屋倒塌十居六七若概以每户一兩五錢散給統計所需不下百萬兩之多應分為上中下三等極貧者每户給銀一兩五錢次則減為一兩再次則減為五錢核實酌散無不均不遍之弊等語臣查報水各州縣其成災不成災之處雖尚未據布政司取結詳報然陸續接閲各道府州縣來禀并面詢因公往來員辨及差往查看之員大概不致有成災六十餘處之多而成災之中又有輕重不等每處災民亦多寡不一臣現據鹽法道楊𢎞俊禀稱查過德平災民七百餘户商河五百餘户即此可見各州縣被災實在窮民不皆一二萬户之多撫臣所奏每處災民一二萬之語乃未經查實僅據州縣之率報而約略言之也至各處倒塌房屋亦非一概十居六七而倒屋之家更非盡皆無力貧民前據督糧道徐聚倫禀稱如所塌係租住之房則與住者無涉房主既能賃房其家不貧可知何庸議賞或房共七八間而倒三四間房共五六間而倒兩三間房共三四間而倒一間儘可棲身何庸議賞又如倒塌房屋本户現經修蓋不致棲身無所以及紳襟富户與有生理者是皆有力之家何庸議賞臣見其查察精細分晰明白隨將所禀辦理之處飛札各道府州一體實心辦理在案臣思賑濟原以恤貧非以繼富況此項葺屋之費尤為我皇上恩外之恩但當使貧者一夫不遺原不必令富者盡人遍及其應給葺屋之費惟最重之郯城沂州等數處或有數千户其餘不過千餘户及數百户而止以一兩五錢計算約略不過賞銀八九萬兩今撫臣欲行遍給而將凡係倒屋之家分為三等概議賑銀則需銀四五十萬不止實不免失之太濫我皇上保民若赤一聞東省被水即沛恩綸發帑發粟并將例不蠲免之漕糧特豫免徴固不惜此數十萬帑金但以賑濟之洪恩而濫及于有力之富户臣竊以為措施未當也至撫臣賑榖議內以髙地有收窪地有穗可割請將倉榖先行平糶其應賑倉榖攤作四箇月散給陸續接濟等語更屬未協夫平糶止可及于有錢糴買之户而不能及于束手無措之人今若以前項有可割收原不待賑之家而因此槩行緩賑致使嗷嗷待哺之窮民不得早沾聖澤似非所以仰體皇仁而下恤民瘼也且貧民一家數口老弱強壯不等若將口糧一時給領則貧民即可從長計議老弱者安居粒食少壯者别為營運今攤作四月散給往返領賑貧民既多守候之艱陸續給散胥役更滋掯索之弊且散榖散票多一次即多一次之事地方散賑之員亦不免過煩臣伏見皇上遣官賑濟畿輔地方特頒上諭將三箇月口糧通計給發此誠聖明洞鑒睿慮周詳今東省賑榖臣愚以為應照直隸通計給發之為妥便總因撫臣誤認凡被水者俱應銀榖竝賑故有銀分三等榖攤四月之議以致賑銀失之太濫賑榖失之太緩查撫臣前巳令查賑道員上貧給銀一兩次貧給銀六錢下貧給銀四錢今又不分有力無力一槩給與葺屋之費上貧一兩五錢次貧一兩又次貧五錢其如何為上貧如何為中貧下貧究未分晰明白查賑之員更無所適從且現今查造賑銀之户止係極貧一項今既分為上中下三等則賑銀之户又須另行查添矣緣撫臣奏摺內有與臣商酌施行之語臣不敢不將前後商酌不同之處據實奏明惟是救災務速東省被水窮黎恩綸屢沛而賑事迄今尚無就緒臣徒有勞心焦思而逺在豫省鞭長莫及賑務重大可否仰懇皇上天恩遣一賢能大員星馳赴東督同原查之道府等官速為斟酌散賑俾被水窮黎均得早沐皇恩頂感無既矣臣不揣冒昧一併陳奏是否有當伏候聖裁謹奏從來賑災如拯溺救焚曷容稍緩所奏是巳有㫖諭部矣硃批諭㫖卷一百二十六之二十一欽定四庫全書硃批諭㫖卷一百二十六之二十二硃批田文鏡奏摺雍正八年九月二十八日河東總督臣田文鏡謹奏為東省大計屆期仰請聖恩特賜展限事竊照三年舉行大計為察核羣吏激濁揚清之大典臣䝉天恩總督山東值今大計之年自當矢公矢愼與撫臣詳加考察分別舉劾以仰副我皇上澄叙官方之聖意但查東省因夏秋雨水稍多特奉恩旨賑濟撫恤道府州縣以及佐二雜職等員現在分投查勘辦理賑務賑完即須核造册籍動關倉穀錢糧甚為緊要其成災州縣又須將應免錢糧分數確核查造事務紛繁而計吏大典則該管上司凡有考核之責者又須專心辦理未便草率今二事竝行誠恐顧此失彼所係匪細臣查東省各官貪劣不職者臣與撫臣已不時察參不敢稍為姑容其才識敏幹辦事實心如登州府楊𢎞俊兖州府王鴻勳經臣遵旨揀選先後題補道員在案其餘各府或尚未到任或到任未久或循分供職或現在察試至於州縣多係署事試用及甫經到任賢否尚難遽定其有履任稍久辦事勤愼才具可用者甫於沿河沿海及直隸州各缺循例揀選題補現今尚有新改直隸之東平高唐及舊設之沂州濵州四缺因未得其人未敢輕率題補是現在所屬尚無急應舉劾之員合無仰懇皇上天恩將東省大計准於雍正辛亥年舉行俾司道府等官得以專心辦理賑務則闔省官民均沐聖恩於無既矣至屬員內如有庸劣不職者臣仍與撫臣不時查參緣非例應展限臣未敢冒昧具題是以繕摺恭奏仰請聖裁為此謹奏東省大計已據請諭部展限矣同日又奏為據實奏聞事竊臣於雍正八年八月十六日接准部咨欽奉上諭河南被水州縣之漕糧按成災分數蠲免欽此仰見我皇上軫念黎元恩施格外臣隨飛飭河南布政司糧儲道欽遵確查辦理去後今據司道詳據各府州縣所屬士民僉稱豫省屢沐皇仁至高極厚如雍正七年禾稼倍收乃䝉聖主加恩蠲免正供錢糧四十萬兩今以雨水稍多上厪聖念惟恐小民輸漕竭蹶特頒恩旨按成災分數蠲免皇恩浩蕩感激難名但今嵗夏秋之交雖雨水稍多高下地畝收成不等然實未成災不敢濫邀恩免且未奉恩旨之前附近縣城水次居民業將漕糧交倉逺處居民現在陸續完交不日即可全數通完更不敢因奉有恩旨復行領回等情詳報到臣臣查豫省連嵗豐收今春二麥又稔民間家給人足雖夏秋雨水稍多而高阜地面仍有十分九分八分不等即低窪處所亦有七分收成實未成災且豫省士民感沐皇上教養深恩咸知急公慕義是以今嵗漕糧甫經開徴即爭先輸納及聞恩旨蠲免不惟不敢濫邀皇恩而且倍加感激踴躍現據各州縣紛紛運至水次剋期交兌糧儲道張建德已於九月二十日赴衛輝府水次監兌去訖臣因輿情感戴實出至誠除恭疏具題外理合據實奏聞為此謹奏豫省民情如是急公欣悅覽焉同日又奏為覆奏聖諭事雍正八年九月十九日臣齎摺家人捧回臣奏請朱藻協理河務摺內欽奉硃批據奏以朱藻加銜協理北河所見是候另旨諭部欽此隨於九月二十四日接准部咨除欽遵轉行外竊臣前因黃運兩河攸關運道民生最為重大必得一熟悉河務之員相為協理是以將朱藻奏請䝉聖恩俞允特加僉都御史銜協理河務朱藻聞命之下感激天恩失聲哽咽自必益加奮勉力圖報效至臣受恩深重無可仰報惟有殫精竭慮敬謹從事現令協理河臣朱藻親往各工查勘將應修應築之處上緊料理務期工程鞏固仰慰聖懷所有奉到原摺理合恭繳為此謹奏朱藻親往各工查勘料理庶不致貽誤機宜惟應再三朂勉令伊竭力供職同日又奏為奏明戴村壩工程仰祈聖鑒事竊照東省漕河為糧艘經行要道全賴汶水濟運而汶水又以東平州之戴村壩為關鍵利在用其水而去其沙泄其有餘而蓄其不足是以明臣宋禮先建玲瓏壩後萬恭建亂石壩潘季馴又建滚水壩三壩接連俱僅出水三尺蓋汶水挾沙而行上清下濁伏秋漲發水由壩面滚入鹽河歸海無慮泛濫其沙即從玲瓏亂石壩之洞隙隨水滚注鹽河冬春水弱則築堰滙流濟運不致淺阻是但收汶水之利不受汶水之害其制度原屬周密逮前河臣齊蘇勒因彼時乾旱之後汶水甚微不能濟運隨將玲瓏壩洞隙堵實至雍正四年內閣學士臣何國宗又議增築石壩一道計高七尺長一百二十餘丈緊貼玲瓏亂石滚水三壩高厚堅實滴水不泄其時雖為束水濟運起見但汶河㑹泰安萊蕪等九州縣之泉水源大流長加以汛水漲發洪濤洶湧無處宣泄漫濫四出而石工橫亙既無尾閭以泄水又無罅隙以通沙以致水漫沙停不但瀕河地方連年被患而汶河挾沙入運日漸淤積亦於運道有礙河臣嵇曽筠前曽與臣深為籌慮正在計議而今嵗夏秋之交雨水過多九州縣之泉河雨水一時竝漲歸海無路奔注入運而運河又不能容納漫溢堤岸南則濟汶魚沛一帶北則東昌臨清等處均被水患而下游宣泄不及上源之水正盛致將戴村壩東北民堤衝開百餘丈直注東平淹沒田禾此雖雨水異漲人力難施亦由石壩高厚無從宣泄之故但決口之後汶水又盡注鹽河並不逹運及運河水勢消退劉老口等處沙積水淺舟行艱澀臣隨一面飛飭動用河庫節省夫價銀兩備料堵築決口一面多募人夫挑沙挖淺并開放馬踏湖水濟運回空糧船始得無誤今于九月初三日將決口已經合龍汶水仍全歸運河現今運河水深四五尺不等據道㕔各官稟報漕白糧船共有五千九百三十四隻今九月十九日以前共過濟寧五千一百二十九隻約計十月初即可全行過濟但查汶河自雍正四年戴村加築石壩以來河沙日淤河身日淺其壩根現已淤沙三尺若不急為籌酌將來貽誤匪細臣已面致協理河臣朱藻到東確加查勘細為斟酌俟其勘明回日臣再㑹同南河臣嵇曾筠定議具奏今將戴村壩漫口堵塞及糧艘遄行不致有誤情由理合恭摺奏聞為此謹奏覽奏戴村壩決口堵塞緣由已悉如果石壩與運河有礙急應籌酌具疏題奏候朕裁奪可也雍正八年十月初十日河東總督臣田文鏡謹奏為欽奉上諭事雍正八年九月二十二日接准部咨欽奉上諭著直隸山西山東河南四省督撫每省動用正項錢糧各雇腳騾五百頭厚其雇價委員解送肅州以為運送軍糧之用欽此當即飛行布政司欽遵諭旨厚其雇價分投雇覓今于九百餘頭腳騾之內選雇五百頭照依自豫至肅客商雇價遵旨從厚每頭給紋銀十二兩在于司庫內動支正項銀六千兩當官給發騾行胥役並無絲毫扣剋騾夫等俱各踴躍歡欣爭先願往其抵肅之後運糧軍前所需雇價應聼肅州辦理軍需衙門酌量給發臣已咨明內部及川陜督臣甘肅撫臣在案臣將所雇騾頭分作三運次第徐行委河南府通判馬騆為總運官又每運委吏目典史二員押送業於十月初二初四初六等日三運騾頭俱已起程訖再總運官通判一員酌給盤費銀八十兩押運吏目典史六員每員酌給盤費銀五十兩共需銀三百八十兩在雍正八年公項銀內動支除動用過正耗銀兩容臣另行報銷外所有豫省遵旨雇覓腳騾及動用銀兩并起程日期理合恭摺奏明再東省應雇騾頭臣已轉行山東藩司并將豫省辦解之處知㑹撫臣在案合併聲明伏乞睿鑒謹奏豫省所雇騾頭業已起程解肅知道了應題者具疏題明應逹部者咨部存案同日又奏為據實奏明仰祈睿鑒事竊照山東濟南府知府金允彝負恩不職抑屬婪贓經臣題參奉㫖革職審擬在案兹欽奉上諭原任山東濟南府知府金允彝被參發審久未定案聞其被參之由因與按察使唐綏祖素有嫌隙唐綏祖捏款開送總督田文鏡督臣相隔路逺據開送之款題參今嚴審多時皆無確據而問官迎合臬司意欲指坐允彝之罪以實前言以致案內牽連之人纍斃三命而不能成信讞此雖傳聞之語不能定其確實與否然外間既有此言則此案不便仍令山東官員承審現今侍郎劉於義牧可登因查賑事差往東省著㑹同巡撫嶽濬將此案秉公據實審明定擬具奏特諭欽此仰見我皇上至聖至明至公至正不欲使一人少有屈抑一事少留疑竇此案是非虛實應候欽差審明具奏臣復何庸置喙惟是外間既有浮言臣又不得不將前後情由實陳於君父之前臣查金允彝䝉聖恩由縣令超擢知府茍有人心自應感激奮勉力圖報效豈期抵任之後乖張放縱竝不實心任事臣彼時尚冀其悛改再三訓飭詎金允彝不但不知改過併且徇私黷貨作威作福日甚一日如得受參革濰縣知縣袁登陛賄銀四百四十兩改供翻案開脫袁登陛故勘平人致死之罪一款及袒庇德平縣革職知縣袁舜裔抑勒署縣安全義交代一款臣俱發河南按察使陳世倕審訊各犯供吐歷歷如繪臣因此二款已訊有確據此等負恩不職之員實不敢一刻姑容此臣參劾金允彝之情由也及臣題參之後臣親審袁登陛本案復據袁登陛自認賄求金允彝并各犯供稱金允彝刑嚇改供之處確鑿不爽又金允彝得受臨邑縣參革知縣楊掞等案內人犯周之瀚銀六百兩將周之瀚霸産霸姦不審一款查楊掞本案亦經臣審明具題其周之瀚行賄之處已據縣府司於楊掞參案內將行賄之周之瀚過付之府刑房徐之純繳銀之金允彝家人劉二均取有確供今周之瀚雖故尚有徐之純等可訊查臣原參金允彝八款除勒派所屬州縣修理府監妄斷寡婦陳氏改嫁縱令書役家人乘委驗騾頭索銀分肥縱容司獄索取進監官犯銀兩濫差府役需索等五款未經提審外其婪贓故出抑勒交代三款有於未參之前審訊明確者有於既參之後別案附審得實者是臣之題參金允彝竝非止據按察使唐綏祖之送款毫無確據而遽為題參也至案內牽連之人臣細查檔案除周之瀚係楊掞參案內取供後病故尚在金允彝參案未審之前止有妄斷陳氏改嫁款內陳氏夫兄馬昌周一犯於雍正八年五月二十日病故此外竝無報故之人而傳言竟云纍斃三命更為可異總緣此案臣因查審得實即為入告不令司道補揭亦未及與撫臣㑹稿彼時東省即有異議及奉嚴旨將金允彝革職審擬金允彝自知負恩婪賄罪在難逭遂與袁登陛等遍布謠言淆惑是非以冀僥幸萬一而縣府審訊之時金允彝又恃其親族繁盛凶橫異常不服審訊以致案不能定在金允彝與按察使唐綏祖有何嫌隙臣實未知但臣䝉聖恩節制山東之後唐綏祖亦升轉東省人人皆以唐綏祖為臣耳目各懷猜忌唐綏祖感沐聖恩又事事實心稽察不避嫌怨是以臣凡參劾訪拏之案多疑為唐綏祖開送而臣所參金允彝贓款內有袁登陛楊掞兩案又係唐綏祖審轉之事此金允彝所以指為唐綏祖揑款送參而同案之袁登陛以及金允彝之親友凡不恱於唐綏祖者無不串成一氣添捏虛詞廣為傳播咸欲借此傾陷而悉翻前案此浮議所由起也在欽差審訊之時衆證明白虛實自分但念臣一介庸愚荷䝉聖恩委任封疆惟知矢公矢慎察吏安民而於貪官汙吏又疾之若讐不知少有瞻顧故自撫豫以及節制山東七年以來怨尤叢積仰賴皇上聖明每於羣言沸起之日特䝉矜全保護之恩臣是以益加凜惕惟恐察劾失實上負聖恩下滋物議雖於佐雜微員遇有參劾亦必再三查察不敢輕率致有屈抑而况金允彝為知府大員乎若臣所參果有未確臣即當據實奏明斷不敢上欺君父下抑屬員今實係屢審有證有據之事而彼尚敢布散流言此臣之所以不得不將前後情由備悉奏聞者也謹繕摺恭奏伏乞睿鑒為此謹奏欽差奉命鞫獄諒必不被浮言所惑審後皂白自分卿駐劄河南距東省稍逺其中容有別情亦未可定經此一番推勘決定嫌疑未嘗非美事也雍正八年十月二十八日河東總督臣田文鏡謹奏為據實奏明仰祈聖鑒事竊照河北道朱藻欽奉諭旨加銜協理北河事務其河北道員缺命臣揀選具奏臣欽遵諭旨即於所屬內揀選得南陽府知府孔傳煥才具敏幹實心任事該員前在黃河同知任內不辭勞瘁悉心修防及任郡守察吏精明辦事勤謹正已率屬毫無瞻徇實與河北道之缺相宜臣己繕疏具題并給咨令其引托海參革員缺其時正當伏秋汛漲工程險要不可一刻乏員臣隨委署開封府知府劉永錫署理管河道事務臣查劉永錫諳練河務敏幹有才本年六月內程家寨工程危險該員與協理河臣朱藻併力同心晝夜辦理著有勞績今署理河道已四月有餘臣細加體察見其董率修防隨時調度無不悉合機宜臣因朱藻升任之後其河北道印務乏員署理而題補之孔𫝊煥又須給咨引見是以令劉永錫一併署理在案伏思黃河兩岸工程均關緊要時厪睿念臣受恩深重無可仰報竊欲在在得人以資料理是以不揣冒昧一併奏請如䝉皇上天恩將劉永錫補授管河道則北岸有孔𫝊煥南岸有劉永錫得此兩道分巡經理又得協理河臣朱藻指揮督率實與河工大有裨益可以稍舒聖懷至可否補授鴻恩出自睿裁再劉永錫雍正七年題署開封府知府時於十一月內引見合併聲明伏乞睿鑒謹奏以劉永錫補授管河道實屬駕輕就熟援㫖奏請可也開封府缺如得稱職之員亦遞叙摺內併請統候降㫖諭部雍正八年十二月初二日河東總督臣田文鏡謹奏為遵旨揀選具奏仰請聖裁事竊臣前因河南管河道員缺緊要將署開封府知府劉永錫可否補授管河道之處繕摺恭奏欽奉皇上硃批諭旨以劉永錫補授管河道實屬駕輕就熟援㫖奏請可也開封府缺如得稱職之員亦遞叙摺內併請統候降旨諭部欽此臣查劉永錫久任河員熟諳修防而又辦事勤愼敏幹有才臣於雍正七年十月內題署開封府知府又於本年六月內委署管河道事務迄今半載臣細加體察實能相度平險辦理妥協如䝉皇上天恩准將劉永錫補授管河道洵屬人地相宜於河工甚有裨益至開封府地居省㑹庶務倍繁前因劉永錫委署管河道往來河工不能辦理府事原委直隸光州知州劉兆幾署理開封府篆嗣因劉兆幾改署河南府事隨令祥符縣知縣劉湘就近護理開封府印務在案臣查劉湘才足理繁勤能辦事在豫年久吏治民風無不熟諳今護印月餘事無巨細井井有條堪勝首郡之任臣原擬於大計案內將劉湘卓異因本年十月間縣屬有盜案一起與例不符是以未敢入於卓薦之內但劉湘才具實屬幹練辦事亦復勇往於首郡甚覺相宜可否仰懇皇上逾格擢用洪恩出自聖裁如䝉俞允臣仍給咨令劉湘赴部引見其劉永錫於雍正七年十一月引見甫及一年應否送部引見之處伏候諭旨遵行再臣前因南陽府知府孔𫝊煥題補河北道赴京引見南陽為豫楚門户民俗刁悍素稱難治必得幹員表率彈壓是以將河南府知府程秉禮調署南陽府事又因劉兆幾前曽署過河南府事辦理妥協隨令劉兆幾署理河南府事而將劉兆幾原署之開封府印務改委劉湘護理此輾轉委署之緣由也惟是南陽府員缺甚屬緊要臣請將程秉禮調補南陽府知府劉兆幾補授河南府知府各員均能勝任如䝉聖恩俞允除程秉禮係雍正七年十一月引見奉㫖補授河南府知府今又對品調補毋庸引見外其劉兆幾係雍正五年六月引見奉旨命往河南交臣以直隸知州或知府同知酌量題補之員已逾三年應照例給咨赴部引見緣知府為一郡之表率必須人地相宜者方於吏治民生均有裨益臣仰體皇上愼簡郡守之聖心是以一併奏請伏候皇上睿裁為此謹奏請補各員有旨諭部矣同日又奏為遵㫖密覆事雍正八年十一月十六日奉到大學士公臣馬爾賽大學士臣張廷玉蔣廷錫字內開雍正八年十一月十二日奉上諭鄂爾泰奏摺一件爾等鈔録寄與田文鏡閲看彼地口供如此應將祿鼎坤解往雲南審結其摺中情節切不可令伊知之即烏䝉已經克復亦不可令伊知之只云雲南與中州相隔路逺一切難以質對奉㫖將伊解往再用好言寬慰其心今從京中特差兵部司官蘇納海到豫著田文鏡遴選精細妥帖之員同蘇納海將祿鼎坤解往途次百凡愼密勿漏信息不許一人與之往來至鄂爾泰摺中所言勿令蘇納海解員知之又祿鼎坤家人顧成祖等可另起解往勿令與祿鼎坤同行亦不可令數人同在一處途中亦須愼密防範欽此并鈔録督臣鄂爾泰奏摺一扣到臣臣欽遵諭㫖密行辦理查有臣標左營守備張瑄人尚精細妥帖堪以委解至十一月二十三日兵部司官蘇納海到豫臣即將祿鼎坤提出面諭因雲南相隔路逺一切難於質對是以奉旨將爾解往復用好言寬慰使其無所疑慮隨於十一月二十四日令張瑄同蘇納海將祿鼎坤起解仍密飭經過各州縣選撥兵役并委佐二及武辨各一員逐程護送復飛咨前途督撫一體轉飭遵照撥護其督臣鄂爾泰摺中情節及烏䝉克復之處一字不令祿鼎坤知之亦不令解員張瑄蘇納海知之仍密諭解員沿途諸事小心百凡愼密不可令一人與祿鼎坤往來其祿鼎坤家人顧成祖長隨楊明陳章等臣又於十一月二十八日及十二月初三日兩次委員起解照前撥護亦密諭解員沿途愼密防範毋致疏虞伏思祿鼎坤本係猓蠻荷䝉皇上覆載為心生全安插已為格外之恩况又授以官職加以重賚不思革面洗心感激圖報乃與子弟頭人等隂謀不軌復令漢姦劉漢英暗通信息狼子野心實赤族不足以蔽其辜但臣前於審訊之時未能將隂謀究出荷䝉皇上隆恩不加譴責臣實愧悚無地所有遵旨密行辦理及祿鼎坤起解日期理合恭摺奏覆為此謹奏知道了此事祿鼎坤知情與否亦尚在未定也雍正八年十二月初八日河東總督臣田文鏡謹奏為奏明蘭陽灘地仰祈睿鑒事竊照豫省為黃河經由之地其濵河地畝遷改靡常前於康熙六十年及雍正元年因武陟中牟黃水漫決以致陽武封邱中牟祥符等縣近堤地畝被水漲漫或流為支河或變為沙灘或變為鹽鹻於雍正三年荷䝉聖恩特諭查豁錢糧先經臣㑹同欽差戶部侍郎臣托時查明陽武封邱中牟三縣被災地畝議將錢糧豁免其鹽鹻淺沙之地限年墾復先照下則起科其沙深鹻重難耕之地俟變轉之時陸續報墾分析具題繼經臣查明祥符縣被災灘地援照陽封中之例分别豁免限年起科具題俱奉旨俞允在案惟查蘭陽縣安仁等里納糧地畝坐落黃河南北兩岸界連陽封中祥四邑彼時亦在被淹之內因積水未深停沙未厚尚望復舊是以當日不敢一例遽請恩免乃連嵗伏秋汛長安仁等里地畝屢被淹浸不能播種雍正五年以前每嵗錢糧里民尚竭蹶完納自雍正五年以後小民不能賠納地方官因其無地可耕不便嚴加徴比而奏銷期屆額賦又難懸缺經布政司與該府縣公同墊完日冀地畝變轉小民仍可耕種納糧乃今該處地畝積水益深停沙益厚鹽鹻益重變轉之期難以懸定據里民朱進玉等公籲援照陽封中祥四縣邀免之例由縣府司呈請前來臣即飭委署開封府知府劉永錫親詣蘭陽督同該縣履畝查勘安仁等里實在鹽鹻河形浮沙等地共五百三十一頃七十八畝零委難耕種每年額徴丁地漕折等銀共二千五百兩零應請照陽封中祥四縣豁免錢糧之例自雍正八年為始一例豁免此內有水淺沙薄鹻味稍淡地三十四頃八十四畝零請照陽封中祥四縣限年墾復之例於雍正癸丑年先照災則起科三年後仍復原則其水深沙厚鹻味鹹苦地四百九十六頃九十三畝零應俟變轉之時陸續報墾等情到臣伏思我皇上愛養黎元軫恤民隱聖恩浩蕩至周至渥今蘭陽灘地沙鹻益甚變轉無期臣不敢不據實奏明可否仰懇天恩照陽封等四縣之例分別豁免限年起科臣未敢冒昧題請謹繕摺恭奏仰請聖訓如䝉恩允臣再繕疏具題伏乞睿鑒謹奏蘭陽灘地與陽武等四縣事同一例具疏題請可也諭河東總督田文鏡適閲邁柱奏摺內稱東省被水窮黎挈眷流亡至武昌漢口者甚多此尚屬朕意內之事又云麻城等處亦有豫省饑民前來就食此係何故朕殊不解河南所屬地方從前未聞荒歉如是之甚胡乃一旦遂拋棄鄊井紛紛就食鄰省耶亟當加詳加愼逐一查明悉心辦理毋忽雍正九年正月初三日河東總督臣田文鏡謹奏為恭報河東兩省瑞雪日期仰祈睿鑒事竊查雍正八年十二月二十五日臣齎摺家人回豫伏知京師於十二月十九日獲有瑞雪百姓無不歡呼載道共慶豐年有象此皆我皇上誠敬格天是以京師首善之地天降瑞雪臣查東省據各屬陸續具報於十一月十六十七十八及十二月初二初三十五十六等日各得雪二三寸四五寸不等豫省於十二月十四十五十六等日據各屬具報得雪二三寸三四寸不等兹於二十五日下午起濃雲四布復降瑞雪連日風息雪緊至二十九日更餘止積雪共七八寸不等四野均霑於麥苗大有裨益所有河東兩省各得瑞雪日期理合恭摺奏聞為此謹奏覽朕聞豫東之雪尚屬不足同日又奏為欽奉聖訓據實覆奏事雍正八年十二月二十五日臣齎摺家人回豫奉到皇上硃批諭㫖一道仰見我皇上誠求保赤子惠元元之聖意因楚省有豫東兩省人民就食上厪聖懷特頒諭㫖諄切訓示臣跪讀之下不勝感激悚惶除密咨山東署協撫臣并飛行布政司委員前赴武昌漢口等處將東省在彼就食窮民招徠回籍加意撫恤外臣查豫省雍正八年夏秋之交雖雨水稍多旋即睛霽據各屬開報秋禾收成高地有十分九分八分窪地亦有七分並無呈報被水成災之處臣於秋成後復再四察訪亦與各屬所報無異即如該年漕糧二十餘萬不煩追呼依期完兌雖出士民急公慕義之誠亦因豫省收成不薄力能辦納所致惟是豫省地處天中界連直隸山東江南三省被水人民或挈眷就食或䭾載販糴絡繹赴豫臣於十一月內即發告示飭令各州縣查明鄰省就食窮民每民給口糧大制錢二十文遞送回籍並咨明直隸山東督撫轉飭一體接遞安插在案於十二月十七日接湖廣督臣邁柱札稱豫省與楚省接壤人民間有就近挈眷來至武漢及麻黃羅田等邑者現在給米養贍來春咨送回籍等語臣思豫省惟開歸所屬臨河數州縣低窪處所收成稍次至於楚省接壤之南汝二府光汝二州俱足有十分收成現今粟米一石市價銀五錢穀一石市價銀三錢小麥一石市價銀七錢土著人民更不應有就食外出之事或係素無恆業之貧民及投主種地之佃戶伊等於春夏耕種之時則向有田之家相助力作及秋收之後農工無事或另尋田主或依親傍友往來鄰境此則北省歷年所有之事臣接札後即於十八日飛檄司道府州確查尚未據稟覆於二十五日欽奉諭㫖命臣加詳加愼逐一查明悉心辦理臣隨與布政司公同捐給銀兩委員前赴楚省查明戶口籍貫酌給盤費送回本籍安插撫恤不致失所竊思豫省秋收本不歉薄祇緣鄰省被水人民紛紛就食販運以致糧價漸昻富民則居竒囤積反因以獲利而無業窮民未免以糧貴為纍臣是以酌給口糧使鄰省災黎各回本籍復糶借倉穀使本地窮民不致艱食凡應行料理之處臣無不悉心籌畫今欽奉訓㫖臣惟有倍加詳慎查明辦理務期妥協以仰副我皇上勤求民瘼之聖意其在楚人民容俟委員查明接遞回豫安插得所再行奏聞謹先繕摺覆奏伏乞聖鑒所有奉到上諭一道合併恭繳為此謹奏於數處採聼浮議朕甚疑之大凡地方豐歉皆每有之事何能必期全盛若一任屬員隱匿揑飾而褎如充耳豈特終不免物論亦且涉於無恥之類矣嗣後切須悉心訪察為務雍正九年正月初六日河東總督臣田文鏡謹奏為欽奉上諭仰請聖訓事雍正九年正月初一日准兵部咨稱雍正八年十二月二十四日內閣奉上諭著江寧將軍鄂米逹將滿洲駐防兵丁揀選一千名著副都統阿克山帶領前往西安駐防再著副都御史二格由京師前往西安統領此派出官兵著該督撫動支公用銀每人賞銀三十兩其應派官員著鄂米逹酌量派出每員各賞給一年俸銀於司庫動用銀兩支給二格著賞內庫銀三千兩阿克山著該省督撫於公用銀兩內各行寬裕幫給再撥河南滿洲駐防兵五百名著副都統白成額帶領前往西安駐防撥山西太原滿洲駐防兵三百名著城守尉察庫帶領前往寧夏駐防此二省派出官員每員各賞給一年俸銀其兵丁各賞給銀三十兩於司庫支給官員等照例給與馬匹兵丁等於每人給三馬之外該督撫酌量富餘多給馬匹其河南城守尉印務著總督田文鏡帶管另派參領一員管理兵丁太原城守尉印務著巡撫石麟兼管白成額察庫起身時著該督撫各行寬裕幫給欽此臣當即飛行布政司移㑹副都統欽遵查照在案謹將遵㫖辦理緣由逐一奏明仰請睿鑒一派出官員每員各給賞一年俸銀其兵丁各賞給銀三十兩於司庫支給之處臣查司庫銀兩原有正項公項之不同雖均係國帑似應分别支給臣愚以為各官俸銀應在司庫正項內支給其兵丁賞給銀兩應仍照賞給江寧駐防兵丁之例一體在公用內動支今查得司庫充公項下有前撫臣石文焯充公節禮銀五萬三千七百七十五兩零可否即將此項動支遵㫖每兵賞給三十兩俟動支之後再行報部一官員等照例給與馬匹及兵丁等於三馬之外酌量富餘多給馬匹之處臣查官員勘合應付之例如佐領一員應給馬六匹防禦一員應給馬四匹驍騎校一員應給馬三匹撥什庫一名應給馬一匹今令照例給與似應即照此例給與至兵丁馬匹令於三馬之外酌量多給今臣擬每兵一名再給馬一匹共派兵五百名應給馬五百匹臣查得河南駐防兵丁共八百名除撥出五百名之外尚留三百名應存拴養官馬九百匹其官員兵丁等應給馬匹可否即於九百匹之中照數給與其給與馬匹或到西安之日仍令趕回或即將此馬給與再行動帑買補抑臣再有請者滿洲官員兵丁原各有馬匹今於官馬之外再行給與乃我皇上格外之恩但䭾載什物馬匹又不若車輛為便臣查滿洲官員兵丁出京駐防原有應付車輛之例今臣酌量佐領一員給車二輛防禦驍騎校撥什庫等每員各給車一輛每兵丁二名共給車一輛凡車一輛每百里給雇價銀一兩按程給與毋庸再給馬匹不獨沿途可以更換而且裝載什物一車可當十馬之用在官兵等既屬富餘而馬匹又無煩調撥似費省而力便此係臣愚昧之見是否可行統候聖裁臣謹逐一繕摺具奏伏乞皇上訓示遵行謹奏此奏經交廷臣㑹議今將議覆之摺發來遵照奉行可也雍正九年二月初一日河東總督臣田文鏡謹奏為遵㫖覆奏事雍正九年正月二十六日新任河臣沈廷正自京陛見回豫臣一靣將總河印信委員齎送一靣即親詣河臣寓所跪請聖安隨據沈廷正敬宣諭㫖沈廷正先往查勘工程田文鏡幾時可以交印著田文鏡奏來欽此臣欽遵諭㫖仍行掌管伏念臣猥以庸材荷䝉聖恩掌管北河河道總督印務夙夜兢兢時虞隕越一載以來仰賴聖訓周詳得以知所遵循敬謹從事兹䝉皇上欽命沈廷正總督河東兩省河道仰見聖明逺照知人善任臣查沈廷正才識練逹實心任事前在豫省糧道任內臣所深知今總督北河在伊感激天恩必更加悉心竭力益信我皇上簡擢之明委任之當也至黃運兩河除已做工程毋庸置議外其現在應做緊要之工如程家寨開挑引河戴村壩請復舊制以及運河堤岸小挑工程并從前暫緩加幫堤工亟請增培等事俱經臣於封印之前開印之後勘估具題動帑興工逐一辦理在案所有黃河兩岸應積土牛椿掃料物等項又經臣於舊冬飭委各員發帑辦買以備今嵗桃伏秋汛之用是總河衙門目下竝無緊要未完事件且沈廷正巡查各工之後約至二月中旬其時正值運河小挑告竣似應將印信交送河臣以便親赴該工查勘開壩以濟新運緣係奉㫖命臣具奏臣未敢擅便謹將二月中旬可以交印之處繕摺奏明伏乞皇上批示遵行謹奏此在卿斟酌適當務期有益而為之同日又奏為恭報河東兩省雨雪日期仰祈睿鑒事竊查雍正九年正月初三日經臣將河東兩省得雪分寸恭摺具奏荷䝉聖心厪念豫東之雪尚屬不足是各省雨雪無刻不在宵旰疇咨之內我皇上之為民依農事計者實至深且切兹查東省據各屬續報上年十二月二十五六七等日得雪三四寸四五寸不等又據報本年正月十七十八二十二等日各得雪二三寸三四寸不等豫省於正月十七二十一等日據各屬具報得時雨二三寸不等又於二十二二十三等日據報得雪五六寸不等俱各四野霑足入土深透於麥苖大有裨益所有河東兩省各得雨雪日期理合恭摺奏聞為此謹奏覽較之直隸得雪分寸不及逺甚雍正九年三月二十日河東總督臣田文鏡謹奏為恭報桃汛平穩工程鞏固仰祈睿鑒事竊查豫省黃河南北兩岸堤工頻年以來仰賴我皇上誠敬格天河神默佑是以黃流循軌汛水安瀾中泓刷深工程堅固前因桃汛將屆臣隨檄飭管河道劉永錫河北道孔𫝊煥督率廳汛員辨帶領兵夫住守河干加意修防巡查料理兹據河道廳汛等報稱自雍正九年二月二十九日清明起至三月十八日止黃河水長二尺六寸至三尺四寸不等今巳消落二尺四寸竝未出槽又沁河自上年霜降後存底水六尺二寸今又消去一尺七寸南北兩岸一切堤掃工程俱各保固平穩兩河官民莫不踴躍歡呼感頌聖德惟是轉瞬入夏伏汛即至臣仍嚴飭管河各官敬謹修防外所有桃汛巳過工程平穩緣由理合繕摺恭奏仰慰聖懷謹奏桃汛巳過工程保固平穩深慰朕念雍正九年四月初八日河東總督臣田文鏡謹奏為請㫖事竊查河南城守尉印務前因副都統臣白成額前往西安駐防奉㫖命臣帶管另派正白旗護軍參領華色管理兵丁臣已於雍正九年二月十四日接印任事竝咨明兵部在案今臣䝉聖恩令臣進京調理所有城守尉印務應否即交華色署理抑俟新任撫臣張元懷到日交與管理臣未敢擅便謹繕摺奏請恭候皇上訓旨遵行為此謹奏河南城守尉印務候另有諭㫖雍正九年四月十七日河東總督臣田文鏡謹奏為恭報豫省得雨日期仰祈睿鑒事竊臣查豫省自春入夏雨𤾉時若民間二麥十分茂盛其穀黍高粱棉花等項俱巳長發兹於四月初四初九十二十三等日據各屬具報各得時雨五六寸六七寸不等入土深透在二麥獲此甘霖籽粒更加堅實旬日以內便可刈穫而秋禾亦藉以滋長百姓無不感頌皇仁歡呼載道所有豫省得雨日期及二麥秋禾情形理合繕摺恭一帶并登州府屬之寧海文登福山棲霞蓬萊及莒州堂邑等處呈報得雨其餘尚未普遍霑足而濟南一屬望雨尤甚業經飛檄各屬一體齊戒設壇祈禱臣仍在署竭誠叩求嗣於四月初五初六初七初八等日據歷城禹城章邱齊河等處具報得有微雨入土滋潤查豫省十二十三等日得雨之時臣仰觀濃雲四布雨澤必廣豫東聨界亦應得有甘霖業已飛行飭查俟報到日臣再恭摺奏聞合併奏明為此謹奏東省屢報得雨未聞缺少今云自三月以來雨澤稀少何其不相符合若是耶同日又奏為奏明豫省貢院仰請移建伏祈聖鑒事竊鄉試乃朝廷之大典貢院實衡文之重地我皇上興賢育才人文蔚起近科應試士子多至萬有餘名誠景運特隆中州極盛時也查豫省貢院向建於省城北隅地𫝑窪下惟南臨街道其東西北三靣俱係極大水塘皆高於貢院基址夏秋雨後周圍街道房舍之水滙歸塘內由塘滲入院中遂致號房等處在在有水從前冬春之時雨水稀少尚易乾涸雍正七年已酉科臣監臨入闈彼時已有積水先期即令祥符縣設法修墊其號房內士子俱用厚磚墊腳及臣入武闈時積水更大是年歷冬至春竝未消退逮至雍正八年夏秋之交雨水稍多上淋下浸貢院以內俱水深至四五尺墻垣號房塌卸大半先據祥符縣呈報臣批布政司確查詳報并面諭司道府等官親詣查看據稱院內地通泉眼竟成有源之水乾涸無期臣思貢院地𫝑本窪積水又深既消涸之無期復宣泄之無路而壬子科轉瞬即屆若再遷延觀望必至貽誤臣與司道府等官再四籌畫惟有將貢院移建高阜地方庶幾一勞永逸即差人往江右延請堪輿傅烶選擇省城東北地一區在丑艮之方地高局大秀氣凝結實文運昌隆之地一應堂宇號舍墻垣悉照舊院規制除舊存物料拆運仍用外其不敷新添木料磚瓦石灰顔料等項竝工匠及拆卸人夫搬運舊料腳價共估需銀二萬五千五百五十六兩零臣覆核無異除恭疏具題外謹繕摺奏請倘䝉聖恩俞允臣即動正項銀兩給發擇定吉日興工遴員監造俟工完之日造冊報銷伏乞睿鑒謹奏據請移建貢院具題到日有旨同日又奏為恭報豫省續解軍需馬匹起程日期仰祈睿鑒事竊查派撥兵丁赴西案內所有應採買空馬三千匹臣於本年二月初一日欽奉皇上發下廷議令展限三箇月採買另行雇夫委員解送西安交與巡撫武格收養等因到臣臣遵照轉飭四處購買并於河東兩省民間巳經交官之騸馬內解驗揀選照時給價并預備草料加意餧養業經陸續採買足數雇覓人夫分作八次起行於四月十一十二十三十四二十一二十二二十三二十四等日起程每次委管押官一員又委總解官一員其草料等項預飭沿途州縣供應竝咨前途督撫轉飭遵照并令押解各官解到之日交與西安巡撫衙門聼撫臣武格分發餧養在案所有委官續解馬匹及起程日期除咨明內部暨陜西督撫外理合繕摺恭奏至一切動用銀兩容臣核實報銷合併聲明統祈睿鑒謹奏豫省採買馬匹已起程解陜知道了交發辦理軍需處存案矣雍正九年五月初四日河東總督臣田文鏡謹奏為遵㫖酌議仰請睿鑒事雍正九年四月二十七日臣接到山東撫臣嶽濬札為請設駐沂道員等事敬録皇上硃批諭㫖命臣等商酌意見相同時題請欽此查原奏請將兗寧道所轄之泰安州及各州屬縣并安東一衛共三州八縣一衛另設一分巡泰莒沂道管轄駐劄沂州等因臣查沂州為南北衝途地方緊要向有副將駐劄今若再設道員彈壓誠為周密惟是泰安州係濟東道所轄該道駐劄省城泰安州與省城較近距沂稍逺若改歸沂州道管轄一切事務及文移往來舍近就逺未免不便而去此泰安及所屬三縣又止莒沂兩州并所屬五縣似於監司體制又未相稱臣查兗寧道所管運河千有餘里運道既逺事務亦繁是以從前係濟寧道銜專司河務無分巡地方之責逮至康熙五十三年東兗道裁汰之後始將兖州府屬歸入管轄改為兗寧道事務倍繁未免難於兼顧今沂州既復設道員則兗州府現今所屬十四州縣莫若仍歸沂州道管轄連沂莒所屬共二十一州縣至兖寧道現今所屬尚有直隸曹州東平并所屬八縣雖舊隸兗州府亦為東兗道所轄但距沂州遙逺若一併改歸沂州道又恐鞭長莫及且查曹東等州縣俱係沿河地方附近濟寧而兗寧道已去兗府十四屬止此兩州八縣尚可管理似應就近仍令兗寧道管轄如此則繁簡既均責任又專於地方河務均有裨益此臣愚昧之見業巳備細札覆撫臣商酌在案至沂州舊道衙門作何修整之處亦一併札致撫臣查明定議請㫖遵行所有奉到上諭及臣商酌緣由理合繕摺奏明伏乞睿鑒謹奏所議是㑹疏題請同日又奏為欽奉上諭事竊照湖廣運米十萬石至商州一案臣准部咨即飛咨湖廣督撫將米石在於何處採辦星即確查㑹商并飭委南陽府知府程秉禮一面親往查勘河道一靣備料雇匠打造船隻去後兹於四月二十九日准戶部咨據湖廣督臣邁柱摺奏議將存倉穀石碾米十萬石運送毋庸豫省採買緣由到臣轉行遵照在案嗣據程秉禮詳稱勘得蕭江口至荆子關計程二百六十里河濶水平雖有淺灘扒船可以行走自荆子關至龍駒寨計程三百六十里溪流淺窄灘石險峻惟有小􅤭船可以往來蓋􅤭船首尾俱尖身長而窄較扒船靈動船底係楺木打造性軟而堅即經傷損尚可修理今奉文造船必以小􅤭為最查扒船可裝米十三石􅤭船可裝米十四石通計十萬之米豫省需船一千隻即可循環運送今淅川縣有中樣扒船三百隻可以雇募在荆子關以下行運至􅤭船一項船底係楺木板片楺木係湖南寶慶等府出産若委員赴寶慶設厰造船未免往返稽遲緩不濟事即造完船隻尚須雇覓熟練溪河慣撑􅤭船之頭舵水手押送來豫方能行運通盤計算不如赴湖北雇覓為便今擬於楚省雇覓小􅤭船五百隻并於淅川打造小扒船二百隻連雇募之中樣扒船三百隻共計一千隻接流遞運等情臣思􅤭船豫省既難打造而荆子關至龍駒寨扒船又難行走必得赴楚雇募小􅤭船臣隨一面委員攜帶銀兩飛赴楚省雇覓􅤭船五百隻又恐隔屬呼應不靈復咨湖廣督臣轉飭地方官協同委員雇覓在案至所需扒船除將淅邑現有中樣扒船三百隻雇用外又於淅川設厰三處多雇匠役晝夜趕打小扒船二百隻應用再康熙五十九年運米係楚省委員押運至陜交卸沿途換船之時毋庸盤量既不耽遲時日又不折耗米粒今次運米仍應楚省將米用口袋裝貯遴委能員押運赴龍駒寨交卸豫省雇募人夫疏濬河道并預派官員料理盤剝護送出境再查襄陽至荆子關雖有沙灘石磧而水𫝑平衍一遇順風尚可揚帆自荆子關以上鸞石下灘起至龍駒寨共有二百零一灘皆陜省所轄灘俱險峻兩岸又係峭壁全憑人力牽拽從山陂沿邊而行需縴甚多應陜省委員每處雇覓縴夫四十名俟船到幫拽則船隻上灘不至十分艱難往返亦速矣以上事宜臣俱據詳分咨楚陜兩省督撫轉飭料理外所有臣料理運送米石緣由理合繕摺恭奏伏乞睿鑒謹奏計算周詳辦理妥協殊屬可嘉同日又奏為奏聞事竊查東省前自三月至四月初間微覺雨澤稀少臣已恭摺具奏今據各屬陸續呈報四月初十十二十三等日甘霖大沛入土六七八寸不等四野霑足二麥堅實秋禾滋長百姓無不歡呼載道感頌皇仁再查豫省自四月二十五日復又得雨之後連日晴霽民間正當刈穫之時二麥業已收割登場臣時加體察通省悉屬豐稔俟各屬將收成分數報齊臣即分析具奏所有東省得雨日期及豫省二麥收穫緣由理合一併奏聞仰慰聖懷為此謹奏覽奏豫省二麥業已收穫固屬可慶東省續報大沛甘霖尤為可喜從前原不憂旱今又得此應時之雨麥秋在即朕不為山左黔黎厪念矣同日又奏為奏明事竊臣荷䝉聖恩憫臣老病特命進京調理愛護成全至周極渥刻骨鏤心難以言喻臣現今將應辦事務上緊趕辦約計五月內署撫臣張元懷可以到豫臣交代明白即當進京所有家口自應悉行遣歸但臣家本寒微素無産業惟京師有住房一所計三十餘間上年又經傾圯現令家人雇覓匠役修葺臣隨帶數人可以居住至合家男婦大小尚乏安頓之處且臣數年以來屢䝉皇上天恩賞賜書籍器皿紬縀衣服等物臣皆敬謹珍藏今應恭齎到家奉為至寶𫝊之後世但家口什物從陸路搬移至京沿途腳價需費頗多今聞保定府城內有原任守道李育柱入官變價房屋一所價銀一千九百餘兩臣思保定距京城不逺臣之祖父墳墓俱在易州又與保定相近目下搬移家口由河南衛輝府水路上船直逹保府南門較之陸路行走甚屬便易臣䝉君父之前據實奏明再臣伏讀諭㫖令臣徐緩調理來京臣思起程進京之時正當伏暑若由陸路行走不免車馬跋涉而自運河乘船赴京衰病殘軀便於調理可否仰懇天恩准臣同按察使陳世倕由水路赴京統祈皇上訓示遵行為此謹奏水路乘舟徐緩而來甚合朕意雍正九年五月二十四日河東總督臣田文鏡謹奏為奏明事竊查豫省州縣應修城垣經臣擇其工程浩大地方緊要者陜州安陽等一十八處於雍正七年三月內奏請動用司庫耗羡修理奉㫖俞允臣即欽遵飭司發銀興修在案兹查前估之內有汝寧府羅山縣城垣原係估築土城需銀七千八十四兩零嗣據前任羅山縣計參知縣姚文耀詳稱該縣係沙鹻之土性不膠粘打築土城難以堅固且城之東南西南俱係臨河一遇河水漲漫直浸城根土城更易塌卸應請築磚城等情到臣隨批司飭府察勘確估去後續據汝寧府知府費謙流親詣勘估并駁縣核造確冊由司詳報前來除原估土城工料銀七千八十四兩零外今改築磚城需用磚灰工匠等項增估銀七千三百三十一兩零連前共需銀一萬四千四百一十五兩零所有羅山縣改估磚城增添工料銀兩緣由理合恭摺具奏如䝉皇上俞允臣即交署撫臣張元懷飭司在庫貯耗羡銀兩內動支給發興修工完造冊報銷為此謹奏俟張元懷到豫後再加商酌為之雍正九年六月初二日原任河東總督臣田文鏡謹奏為奏明事竊臣前以衰病陳請罷斥荷䝉聖恩高厚諭令進京調理特命浙江布政使張元懷來豫署理巡撫事務是微臣既得卸此兩省重任又得赴京仰覲天顔且就醫於輦轂之下延此殘喘感實難名喜復不勝臣聞命之後將應辦各項事宜上緊趕辦如接運楚米赴陜及軍需濶布硝斤黑鉛等類臣俱飭令一一料理停妥至司庫存貯雜項錢糧臣一一清核其應奏歸公者巳恭摺具奏兹署撫臣張元懷於五月二十九日進省六月初一日到任張元懷進省之日即與臣相見臣將緊要事宜先已大槩告知適臣又感冒咳嗽不止雖服藥清理尚須避風且署撫臣張元懷蒞任之初事務匆忙稍緩數日臣再將地方事務遵㫖詳悉指授交代明白定期起身赴京容俟起程之日另行奏聞至總督關防臣於六月初一日卸事之日委員齎送藩庫收貯在案除卸事日期恭疏題報外理合奏明伏乞睿鑒謹奏卿其從容靜攝時當盛暑不宜勞擾徐俟秋凉後擇日起程為妥遵旨行切勿勉强就道致增朕之繫念也雍正九年六月二十六日原任河東總督臣田文鏡謹奏為程家寨引河開放深通據實奏聞仰慰聖懷事竊照祥符縣南岸程家寨堤工逼近省城最關緊要因於對面北岸淤長大灘直出河心以致全河之𫝑逼射該工甚為危險必得於北岸兜灣之處挑挖引河一道引溜直行則該工不致有頂衝之患經臣於掌管總河印務時題估奉旨俞允發帑委員預期興挑在案兹於雍正九年六月初八日汛水驟長大溜直注河頭隨於初九日已刻乘機開放風利溜急全河歸注水𫝑浩瀚頃刻成河連日大溜奔注兩岸塌崖河頭現寬五十餘丈河身寬二十餘丈河尾寬四十餘丈俱深一丈六七尺至二丈餘不等往來重船遄行無阻所有舊日大河逐漸淤出新灘伏秋汛後即可淤平此皆仰賴我皇上至誠至敬崇祀河神是以引河開闢默相成功從此㑹城如磐石之安億載享平成之福在工之官辨兵夫兩河之農工士庶莫不感頌聖德歡呼載道臣實不勝雀躍歡慶之至理合繕摺奏聞謹奏據奏開放引河之際風利溜急若有神助以手加額覽焉同日又奏為覆奏聖諭事雍正九年六月十五日臣齎摺家人捧回臣奏羅山縣城垣改估磚城摺內欽奉皇上硃批諭旨俟張元懷到豫後再加商酌為之欽此臣欽遵諭旨即向署撫臣張元懷將此案前後緣由詳悉告知并敬録硃批諭旨及奏摺稿交送張元懷統俟張元懷酌定奏聞又於六月二十日臣齎摺家人捧回臣奏張元懷到任摺內欽奉硃批諭旨卿其從容靜攝時當盛暑不宜勞擾徐俟秋凉後擇日起程為妥遵㫖行切勿勉强就道致增朕之繫念也欽此臣跪讀恩㫖往復再三感泣聲咽臣何人斯而䝉皇上愛護體恤至於此極臣又何敢稍為勉強以致上厪聖衷然臣雖於六月初偶爾感冒即服藥調理今已痊愈地方事務亦向張元懷詳悉告知交代明白臣依依戀主急欲趨赴闕廷仰覲天顔原擬六月二十六日起程兹蒙聖諭諄諄臣遵旨暫緩數日擇於七月初三日自省起程由衛輝水路赴京總之臣蒙皇上如斯俯恤臣斷不敢冒昧今自量可以行走方敢就道仰懇皇上無以犬馬之軀繫念聖心益增臣之悚惶局蹐此又臣之至願也所有微臣率同陳世倕起程日期理合奏聞至兩次奉到原摺一併恭繳為此謹奏從容就道甚善如此方是硃批諭㫖卷一百二十六之二十二欽定四庫全書硃批諭㫖卷一百二十六之二十三硃批田文鏡奏摺雍正九年七月初六日原任河東總督臣田文鏡謹奏為奏明事竊臣伏讀上諭以直隸山東河南雨澤愆期聖心焦勞先期籌畫補救之策特命廷臣酌議各截留南漕米四十萬石以備濟用自古聖帝眀王視民如傷保民若赤未有如我皇上軫念民依宵旰勤求之深切者臣查豫省開封歸德河南汝寧四府及陳許禹鄭陜五州所屬節次得雨透足秋禾暢茂惟彰德一府屬并衛輝之輝縣淇縣延津濬縣懷慶之河內修武南陽之唐縣泌陽桐柏鄧州內鄉新野舞陽汝州之魯山光州之息縣未得透雨今於六月二十九日甘霖大沛凡前缺雨之處俱巳霑足據各屬稟稱巳種穀禾等項得雨暢發其未種之地詢之老農僉云乘此雨後播種蕎麥尚可豐收等語伏查豫省今嵗二麥實屬豐收每麥一石價銀自五錢以上至七八錢不等每斗碾麵十二三斤不等各處早穀髙粱不過半月之後即可收割臣思截留南漕四十萬石運至豫省原恐雨水未足秋禾失望預備賑濟之用今開歸等五府七州連得透雨早禾晚禾俱暢茂異常西成有慶雖彰衛等處得雨稍遲將來不過略減分數不致歉收且彰衛等三府現存穀七十餘萬石即欲截留漕米預為積貯在此三府實無需四十萬石之多而他府州縣又可不必分貯且豫省民人食麥麵小米等項者多食大米者少今麥麵既賤而髙粱黍穀等類又收穫在即比戶皆巳足食此四十萬石大米糶賣既巳艱難久貯又恐紅腐況米石甚多無倉可貯露囤更非良策臣再四思維若酌運米十五萬石分撥彰衛等屬儘足備用而米數既減將來糶亦稍易臣巳將此意與署撫臣張元懷面言聽其酌奏請㫖遵行臣於七月初三日自省起程初五日抵衛輝汲縣水次上船目覩沿途秋禾暢茂俱巳結穗間有未種之地原係收麥後未及播種晚禾今乘得雨之後有耕種蕎麥者有留至八月種春麥者民情甚安惟汲縣附城二十餘里尚未得透雨我皇上為豫省民生如此焦勞臣雖卸事何敢不將地方現在情形據實星馳奏聞上慰聖懷并陳愚陋之見是否有當伏候睿裁謹奏覽奏豫省得雨後情形并民間食用習俗足見留心地方候交廷臣確議施行雍正九年七月二十一日原任河東總督臣田文鏡謹奏恭請皇上聖安朕安卿近日所患全愈較前更覺健勝否新製牙香袋一枚賜卿佩帶同日又奏為再陳末議仰祈睿鑒事竊照河東兩省奉文各截留南漕四十萬石一案臣前因東省得雨果否霑足需米果否可緩臣一時知之未確不敢冒昧妄議是以止將豫省情形斟酌撥運之數恭摺具奏欽奉諭㫖交廷臣確議施行及臣至臨清面詢山東署布政使孫蘭芬據稱東省缺雨處所業巳連得甘霖秋禾可望有收似可不必預備賑濟且東省先撥南漕米三十萬石通倉粟米二十萬石又奉天先運到米十萬石共六十萬石巳分貯德州臨清濟寧及沿河附近一帶州縣原奉文於今秋易穀貯倉即有需用之處前項米石儘可動用今若再撥南漕米四十萬石實無倉可貯露囤非法久貯又恐紅腐等語臣思東省既現有南漕奉天并通倉粟米共六十萬石分貯臨河及附近水次州縣備用有餘且巳得透雨秋禾茂盛似毋庸再撥南漕四十萬石此臣所以不敢不因時變通再為瀆陳者惟是東省既無需截留南漕則應與豫省撥剩之米一併仍令原船運回通州交倉但往返需時若交倉之後復令趕回接運新漕不免急迫臣愚以為京倉積貯既多南漕似可變通查上年十二月准漕臣性桂密咨轉准部咨曾有折徴之密議今若將此截漕省分本年應徴漕米酌改折色起解其旗丁應得月糧仍酌量給與以示優恤如此則新漕不必接運漕艘無遲悮之慮旗丁仍有食用該幫無停運之苦而折徴之省分又得多留米穀以裕民食亦屬有裨於百姓之事再河南山東本年應徴漕米臣請改徴穀石留補各屬賑濟之穀以省買補之煩如來春青黃不接或需糶賣以平市價即將此穀酌量出糶是以本地之米穀裕本地之積貯而為本地之備用實於民生有益此皆臣愚陋之見原欲到京面奏因廷臣正在詳議此事是以亟為繕摺奏聞如或可採伏乞皇上敕交廷臣一併確議具奏請㫖遵行為此謹奏原議大臣速議具奏雍正九年十月二十六日河東總督臣田文鏡謹奏恭請皇上聖安朕躬甚安今歲值卿七旬夀期甲子重來又十年人世稱為難得朕差員至豫頒賜各物卿其領受不必過於張皇令人遠接此番恩賚應具疏題謝俾天下後世知朕優禮大臣之意也同日又奏為欽奉上諭事竊查今嵗夏間直隸山東河南三省偶因雨澤愆期我皇上軫念民依特命截漕備用及甘霖普被之後猶恐得雨稍遲之州縣收成歉薄諭令該督撫秉公查勘若有應行散賑之處悉心辦理臣陛辭之日又蒙諭㫖諄切臣欽奉聖訓敬謹辦理臣查豫省開歸河南汝等五府陳許禹鄭陜光汝等七州俱屬豐收惟河北彰衛懷三府屬得雨稍遲有收成歉薄之處臣自京回豫隨密諭彰衛懷知府將各屬實在歉收地方確查密報去後兹據彰德府知府萬國宏衛輝府知府馬騤雲懷慶府知府祁瑛將收成歉薄之延津汲縣新鄉淇縣原武武陟修武湯隂安陽等縣稟報到臣臣查延津等九縣雖收成均有五分以上至六分者例不成災但秋收既薄當隆冬嵗暮以及來春青黃不接之際不免有艱食之窮民臣謹仰請聖恩自今冬十二月及眀年正二兩月共賑濟三箇月每月大口賑米一斗五升小口賑米七升五合以一米二穀計算即合大口每月三斗小口一斗五升之數臣巳密諭各該縣於目下查點保甲之時將實在貧戶姓名口數默為登注造具清册臨時按册給賑既不假手鄉地自無遺漏濫給之弊而實在窮民均霑實惠其動用米數賑過戶口俟事竣日照例題銷再此項漕米除賑濟動用外其餘均應易穀貯倉以免陳腐臣查延津等九縣雖經請恩賑恤然糧價不免昻貴又臨漳武安內黃輝縣濬縣滑縣獲嘉林縣涉縣等九縣雖收成較勝於延津等九縣然不及河以南之豐收糧價亦昂臣擬分别借糶以濟民食以平市價借者於眀年麥熟還麥再於秋間易穀糶者存貯穀價俟明年秋後買穀總期閭閻蒙接濟之惠漕米無浥爛之虞臣與司道等官復加商酌無異謹繕摺恭奏伏乞皇上訓示遵行再今嵗東省亦有歉收之州縣其應賑應借應糶之處臣巳札致撫臣嶽濬令其就近斟酌辦理請㫖遵行合併陳明謹奏區畫甚屬允協照所議行同日又奏為據實覆奏事案查東省雍正八年大計屆期臣因司道府㕔等官各因查災散賑公出而州縣及教佐雜職亦各在本境分辦賑務奏請展限仰蒙聖恩准於次年舉行欽遵在案今雍正九年正當補行臣自應與撫臣矢公矢慎詳加甄别以副大典兹接撫臣嶽濬來字欲將本年補行大計再寬一年業經繕摺具奏欽奉硃批與臣商酌會題并另移疏稿到臣竊思臣與撫臣俱係在任年久且東省今嵗竝無應行展限之事難於措詞題請即部議亦恐無例可援再查計典之制自司道以至府州縣印佐教雜等員無一不當加謹考核以昭彰疸之公今撫臣疏稿內止就知府知州知縣而言且云任事不及一二年及調署新任正在試看等語臣查保薦卓異必須歷任巳滿三年之員至於干犯八法竝無在任未久得免考察之例且東省屬員有干八法者正不乏人何可因此而遂寬計察至云事蹟顯露可以不時舉劾查府州縣中一有才能出衆者或題升或調補一有庸懦不職者或參革或改教各省莫不皆然何年不當如是則是各省之大計皆可因此而停而黜陟之巨典又於何年而補再大小屬員惟知縣以上可以不時保薦至於佐二首領教雜等微員例必屆大計之期方得選舉一經停止則此等微員中即有合例應舉之賢員巳不能仰邀卓異其雖不合例而堪膺附薦者更何所希冀至於老病不職之輩皆得幸免而姑容殊非所以示鼓勵而嚴創懲也臣不敢冒昧合詞會題謹據實覆奏伏乞皇上睿鑒訓示遵行謹奏所見甚是前據嶽濬摺請寬限所以批令與卿商酌也考察大典自應照例舉行移文令伊知之同日又奏為據實覆奏事竊臣於雍正九年十月初六日准山東撫臣嶽濬鈔奉皇上硃批該撫臣奏請改徴漕穀減收耗米一摺欽奉諭㫖與田文鏡商酌行之欽此鈔移到臣伏查漕糧乃天庾玉粒例不改折仰䝉皇上軫念河東兩省今歲夏間得雨稍遲收成未免歉薄將雍正九年漕糧照一米二穀之例改徵穀石收貯平糶通省糧民既免舂碾運兌之煩復邀減糶接濟之益巳沐天恩於逾格矣自應照例正耗竝收原不必再為推廣之請以開小民無厭之求也前因豫省漕糧加耗原署撫臣張元懷奏請豁免經臣查眀每穀一石雖得碾米五斗六七升及六斗不等然除去碾費止得淨米五斗今改收二穀原無多取於民且漕耗關係運費徵穀出自特恩不過一年嗣後仍應徵米起運一經豁免無知愚民便為藉口以致運費無出臣又思一米二穀雖得連耗在內將來或借或糶斷不能以一石六七斗之穀即作米一石與民勢必仍以二穀作一米散給則不但耗穀無存即正穀必致虧缺是以臣請照例徵收也今東省漕糧事同一例應仍照徵其折色一項每米一石徵銀八錢加耗銀一錢二分應如撫臣嶽濬所奏俟起解正銀時除扣用解費外餘銀解歸司庫留充公用緣係奉㫖與臣酌行事理理合覆奏伏乞皇上睿覽訓示遵行為此謹奏交部查議俟奏覆到日有㫖雍正九年十一月二十七日河東總督臣田文鏡謹奏為恭謝天恩事雍正九年十一月十八日臣齎摺家人捧回臣恭請聖安摺內欽奉皇上硃批諭㫖朕躬甚安今嵗值卿七旬壽期甲子重來又十年人世稱為難得朕差員至豫頒賜各物卿其領受不必過於張皇令人遠接此番恩賚應具疏題謝俾天下後世知朕優禮大臣之意也欽此嗣於二十四日欽差奏事筆帖式阿昌阿齎捧皇上恩賜至豫臣隨跪迎至署望闕叩頭謝恩祗領遵㫖恭疏具題奏謝外我皇上盛德在躬太和保合乾行日健景福日隆臣實歡欣雀躍莫可名狀至臣一介庸愚七旬衰朽荷䝉皇上天髙地厚之恩巳筆不勝書口難殫述兹當犬馬加齒之辰復䝉聖恩眷注於總理萬幾之時特遣近臣至豫頒賜御書匾額對聫冠袍等件又據阿昌阿敬宣恩㫖并賜臣寶丹臣跪聽祗領之下驚喜欲狂感激涕零伏念古來明良遇合如堯舜之於臯䕫湯文之於伊呂千古稱為極盛然未聞有如斯寵錫如斯榮眷我皇上聖德神功誠遠超於堯舜湯文而臣之才則不逮臯蘷伊呂之萬一臣之遇則巳為臯蘷伊呂所未有又䝉聖恩諭令具題俾中外咸知史書特載競傳為微臣獨得之遭逢超前軼後之盛事是臣希望不及之異數我皇上特加之臣不敢自表之寵遇我皇上又諭及之臣何人斯而獨䝉此罕見罕聞之曠典為天下後世共見共聞之殊榮臣正不知何修而荷聖主知遇之隆至於斯極此即鏤心刻骨不足以銘感捐頂糜踵不足以言報連章纍疏不足以陳謝也所有微臣感激私忱謹再恭摺具奏伏乞聖鑒謹奏覽卿奏謝矣雍正九年十二月初七日河東總督臣田文鏡謹奏為據實奏聞事竊查河南布政使髙斌前臣在京時䝉皇上詢及髙斌居官如何之處臣因進京之日髙斌尚未到任其居官如何臣未能知當即據實覆奏逮臣回豫之後留心體察聽其言論甚屬明白為人謹愼辦事亦屬實心甄別屬員亦見公當不似無才之人臣竊私喜因共事未久不敢遽奏嗣奉諭㫖髙斌著以布政司銜授為北河副總河河南布政司員缺著山東糧道徐聚倫補授徐聚倫到豫後髙斌再赴副總河之任欽此臣計徐聚倫到豫尚需時日髙斌尚在辦理藩司之事臣正可再為試看奏聞旋奉諭㫖髙斌署理四川布政司臣隨委糧儲道張建德署理藩司印務令髙斌交代明白以便赴任臣正欲俟其起程有日將交代清楚赴任緣由并其居官之處備悉奏聞兹復奉諭㫖因髙斌奏稱伊母年逾八旬人子之心難以遠離著將髙斌仍留河南副總河之任等因欽此仰見我皇上軫念臣工推恩錫類之曠典臣查髙斌事無巨細俱能留心辦理今䝉聖恩仍留副總河之任臣同在豫省可以不時勉勵冀其成一國家有用之材以圖仰報朝廷所有臣察看髙斌居官辦事之處理合據實奏聞伏乞聖鑒謹奏評論髙斌居官辦事之處甚是但嫌其才具微覺狹小耳然乃心國家勉圖報效洵屬賢員今又巳另用矣同日又奏為請停民壯防護之例以收實用事竊查州縣定制原有額設民壯一項久經裁減雍正二年刑部尚書勵廷儀條奏令各州縣揀選壯丁務足五十名之數分派學習以資捍禦緝捕之用仰䝉皇上軫念文員敕部議給防護之人嗣經部議即於州縣民壯內挑選兩司各給五十名道府各四十名同知通判各二十五名州縣佐二酌與四名或六名此誠聖主愛惜臣工無微不至之至意臣查河南司道府㕔佐雜等衙門共撥民壯一千一百四十七名每年共支銀六千八百八十二兩山東司道府㕔佐雜等衙門共撥民壯三千四百二十四名每年共支銀二萬五百四十四兩查各官俱有經制皂快等役跟隨侍候此等民壯不過於本官轎馬之後隨從而巳竝無别項差使且係各州縣撥送距本官駐劄衙門遠近不等工食之外毫無出息是以殷實本分之民皆不願應募而現在充當者俱係游手惰民并貧乏無藉之輩每遇該班逃避躲閃竝恐在外為姦作匪前署廣東布政使王士俊籌及於此奏請提解工食聽其於本地召募各衙門因有即令别役充數者甚至佐雜等官或將工食入己不復雇募均在不免從前在州縣時聚集一處且有上司不時考驗尚不肯學習武藝今四散於各衙門更難取齊教習臣竊以為舉凡公所俱在州縣境內各官出署齊集公所州縣果有强幹民壯上下皆可資其捍禦無俟分派各衙門致成虛設再查直隸各省州縣所設民壯亦不必皆用五十名之多除省城首府所屬大縣仍給五十名外其別府所屬極衝之州縣酌存四十名次衝三十五名簡僻三十名亦巳敷用請將司道府㕔佐雜等衙門民壯盡行裁汰飭發各原籍地方同各州縣民壯一併考驗挑選補足各州縣應存名數其餘仍歸里甲編管惟是民壯一項與别役不同伊等亦有修飾弓箭鳥鎗等器械及製辦火藥鉛子火繩之費每名止給銀六兩實屬不敷臣請照禁卒工食之例每名增給銀二兩以作器具之資其所司者止令捍禦城署倉庫護送糧餉罪犯至緝盜一事宜專責捕役非民壯所能應請停免以便專心學習責令營員照例會同地方官按期訓練同知通判等員暇時下縣查驗俾知警惕務期操演純熟然不立一勸懲之法則官役皆不知鼓勵臣請民壯中果有年力精壯勤於學習武藝嫺熟出衆者即照河工堡夫之例拔入營伍充補守兵漸次拔戰拔馬得與考拔把總之列俾有進身之階文武員辨不勤於操練以致技藝生疏照例參處倘州縣將曠缺不即召募足數冒銷工食入己查出據實嚴參請㫖究擬如此則民壯俱收實用錢糧不致虛費文武均資其捍禦矣臣未敢冒昧具題謹繕摺奏請伏乞皇上睿鑒訓示遵行謹奏民壯一事候發廷臣議覆朕酌定有㫖同日又奏為據實覆奏仰祈睿鑒事竊查東省大路仰䝉皇上天恩發帑興修以便行旅臣入覲時跪承皇上垂詢仰見利濟天心即民間往來跋涉之微亦無時不上厪聖懷臣回任後復加查察北自德州劉智廟起南至郯城縣各屬自動帑興修之後俱係髙平大道兼之往來日久土性堅實行旅無不歡聲載道感頌皇仁竝未聞有人稱未便之處惟郯城縣諸葛店北自土地廟起至河堰止計長三百六十七丈又自河堰起至沂州交界止計長二百八十丈緣去秋山水陡發衝決河堰以致一帶大路稍有坎坷臨河水急難以堅築今於原路之東自土地廟石拉子起至交界止改築大路較之舊路稍髙業巳一律堅平至沂州大路惟有沙漲工段四處人力難施亦無别路可以改修幸地勢尚髙雨水不致為患再泰安州惟先農壇東等五處道路山水衝激又有坡水積聚隂雨難行今相度地勢現在議建石橋各一座准撫臣嶽濬會疏具題候部覆允至日確估修建臣復寄字與撫臣嶽濬并行司道府州嚴督地方官乘此冬晴農隙作速修整務使蕩蕩平平以垂永遠所有查明修整緣由理合據實覆奏伏乞皇上睿鑒謹奏留心辦理務使一律坦平勿貽行旅以跋涉之勞雍正十年正月二十八日河東總督臣田文鏡謹奏為恭請聖安仰祈睿鑒事雍正十年正月二十八日接准部咨一件欽奉上諭事伏讀上諭擬於正月祈穀之期虔禱上帝以迓天和乃朕躬偶感風寒醫家奏請避風靜攝是以未曾躬親祀典等因臣跪讀至此犬馬愛主之心實深眷戀縈結寤寐夙夜靡寧伏願皇上保合太和天行日健臣不勝虔切之至至於數月以來各屬報得雨雪未獲普遍臣自當遵㫖敬謹修省悉心訪察先事圖維不敢上負聖心謹此跪請聖安仰祈睿鑒謹奏朕躬今巳全愈矣時當春令虔求雨澤濟農播種斯為第一要務近聞豫東兩省吏治甚有不協可傳諭嶽濬共相誡朂竭誠修省更宜懲貪奬善糾謬繩愆以申明政教訪民疾苦料檢儲蓄以先事預防庶冀上格天心化災為福否則不亦有忝厥職大負朕恩耶雍正十年二月初六日河東總督臣田文鏡謹奏為恭報豫省得雨日期仰慰聖懷事竊照冬雪春雨於二麥最關緊要河東兩省自冬以來各屬雖屢報得雪然尚有未獲均霑之處正需春雨臣隨飭令各屬查明祈禱在案雍正十年正月二十八日接准部咨以近京各省雨雪未獲普遍上厪宸衷特頒諭㫖令臣等敬謹修省先事圖維仰見皇上軫念民依宵旰焦勞至深極切臣跪讀之下益深悚惕復敬謹欽遵轉行各屬一體虔誠祈禱兹開封省城於二月初二日申時起至初四日寅時止得雨五六寸四野霑足又據開封通屬及歸德府之商邱寧陵睢州懷慶府之原武武陟河內河南府之盧氏衛輝府之延津濬縣直隸許州并所屬陳州之西華商水鄭州之滎澤滎陽禹州之新鄭等處俱報於二月初二初三初四等日得雨入土三四寸五六寸不等不獨麥苗滋長而農人乘此雨後又可耕犁田畝以為播種秋禾之地實屬應時甘雨百姓無不歡呼載道感頌皇仁至距省遙遠尚有未經報到之各州縣臣業巳飛行飭查俟報到日另行恭奏外所有開封等處得雨日期合先星馳奏聞仰慰聖懷再查此番得雨濃隂連日得雨之處頗廣東省亦應獲有甘霖統俟報到日再行奏聞合併陳明為此謹奏以手加額覽之此番膏雨實大慰朕之憂懷雍正十年二月十六日河東總督臣田文鏡謹奏為欽奉上諭事雍正十年二月初七日接大學士鄂爾泰等札內開雍正十年正月三十日奉上諭京師自上冬以及今春未得雨雪即畿輔地方與河南山東看來雨雪亦少朕與諸大臣恐懼修省潔誠祈禱竝令九卿等悉心籌畫以防二麥或有歉收為未雨綢繆之計諒各該督撫自知恪謹天戒體察民隱以副朕之委任再聞豫省之河北三府上秋被旱收成歉薄小民糊口艱難此道路所共知者今當青黃不接之時該督應當速為計議或散賑或平糶務使民食有資不誤三春力作倘春間雨澤又復愆期麥收失望則小民連遇歉年必致飢餓失所甚有關係該督應仰體朕心董率有司實心撫恤從來年穀豐歉不齊全賴人事之補救不必以旱潦為諱遇歉歲而能以實情上逹使恩澤下逮此即封疆大臣為國為民之功也爾等可密寄信與田文鏡伊切勿受屬員之朦蔽倘州縣官員等有隱匿掩飾等情即行嚴加參劾以為輕視民命者戒欽此等因到臣臣跪讀再四感悚無地伏念臣猥以庸材荷䝉聖主委任臣上年入覲時仰䝉皇上面諭救災恤荒之道宜於迅速寬大又貴先事圖維勿使一夫失所又諭臣將河北三府歉收之處查明賑恤臣實刻刻在心回豫之後即宣揚聖意詳告屬員俾各仰體宸衷愛惜百姓臣於上年十一月內將彰衛懷三府所屬歉收之處查明分別賑濟出借平糶具奏䝉皇上恩允欽遵轉行在案今奉諭㫖以青黃不接之時令臣速為計議或賑濟或平糶務使民食有資不誤三春力作又恐春雨愆期麥秋失望令臣董率有司實心撫恤我皇上之軫念民依至深極切臣何敢不悉心經理仰副聖懷竊查河北彰衛懷三府上年秋雨雖則愆期收成厚薄不一其收成較薄之彰德府屬安陽湯隂衛輝府屬之延津汲縣新鄉淇縣懷慶府屬之修武武陟原武等九縣實在乏食窮民巳各賑三箇月口糧又將南漕出借平糶其收成較勝之彰德府屬臨漳武安內黃林縣衛輝府屬之獲嘉輝縣濬縣滑縣等八縣巳將南漕出借平糶查賑濟自上年十二月起至今春二月其應給口糧業經照數賑完至平糶出借二項自去冬開倉至今源源不息竝未間斷市價不致頓昂民食不致缺乏此三府實在之情形也惟是賑濟之戶臣原議止給三箇月口糧以二月為期但今青黃不接去麥熟之時尚遠似應推廣皇仁懇恩再加賑三四兩箇月口糧又上年查賑之時止就彼時乏食窮民開報其家有貯糧者不在賑濟之列然其中有彼時可以度日此時未免告匱者仍恐糊口維艱有誤春作臣請將此等人民量賑兩箇月口糧照例散給便可接至麥收矣倘地方官玩視民瘼不能實力奉行加意撫恤臣即據實題參至南漕米石現在平糶其賑濟之安陽等九縣新舊錢糧竝懇聖恩暫為寬緩至麥熟後開徴則民力更紓益戴天恩於無既矣臣䝉皇上畀以封疆之重常思民為邦本食為民天敢不仰體天心以愛飬百姓為首務況我皇上於總理萬幾之時厪念三府之民特頒諭㫖詳悉指示臣敢不確察情形實力撫恤寧使百姓之霑恩過優不使一夫之或有不獲但臣智識淺陋恐計慮未當謹繕摺覆奏伏乞皇上訓示遵行為此謹奏當勘災之際防屬員之諱匿於查賑之時杜胥吏之欺朦此最為要務所宜悉心體究不遺餘力者也同日又奏為據實覆奏仰祈睿鑒事雍正十年正月十四日准山東撫臣嶽濬鈔送敬陳海島要地等事奏摺一扣雍正十年正月初一日奉皇上硃批與督臣商酌具奏等因到臣臣伏讀諭㫖仰見聖明慎重海疆至意臣查撫臣嶽濬條奏未嘗非防姦杜匪之切慮但其於洋島情形尚未洞曉臣既奉㫖商酌敢不悉心籌度計求萬全臣於雍正六年奉㫖兼轄山東臣親到登州周歷其地凡水師巡船出入停泊之處墩鋪炮臺稽查捍禦之所又加詳晰討論節經備細奏聞在案今復查考圖案再四思維用敢竭忠攄誠敬為皇上陳之臣查沙門島在天橋口東北相距登州府城止六十里係一小島竝非可以灣泊船隻處所惟有廟島一處在天橋口之西北三十里約距沙門島五十里上有顯應神妃祠宇因東有長山島西有大小黑山二島為之翼護凡遇西北風起之時可以灣船數十隻亦止可暫時停泊若東南風則又難以停泊矣長山島較大小黑山二島亦屬小島此三島之下俱不可灣泊船隻撫臣奏稱沙門島一名廟島者非也至廟島之可以暫停船隻者亦惟自東省出口前往天津等處糧食商船因是甫行開出必至廟島設供獻神兼候風潮以便放出大洋若閩廣江浙商船往北貿易者則順南風由成山頭一直北上及回船之時則又順北風直往南下俱於大洋揚帆徑過多不繞道灣入廟島蓋廟島之下係登膠水師兩營巡哨兵船出入停泊之所巳極謹嚴倘有匪船從此外洋經過官兵不協力追擒尚干參究豈容匪船入島乎此來歷不眀船隻可以信其決不敢入若本省商民船隻自有本省之二十五處口岸盤驗放行又無庸重復查察致滋擾纍至於海船往關東夾帶私參販往南省一事姦民貪利妄行雖不能保其必無但臣自兼轄山東以來留心察訪嚴飭稽查從無此等犯案據臣查夾帶私參乃係犯法之事且又係貴重之物豈肯寄頓島民之家輕付貧人之手況沿海口岸甚多無處不可上岸若設官止於廟島一處稽查彼凡有夾帶者豈肯復入廟島其從大洋經過各船巡查員役又豈能駕舟追躡於洋面盤驗實屬無益再臣查沙門等五島居民共五百餘家墾種地畝亦止一百餘頃雖各成村落而地非膏腴民皆椎魯不過茍圖生聚於波濤震撼之中稍有騷擾即拋家棄業或入海另覓生涯以致荒廢田地此又不可不慮及者也臣愚以為島中原係蓬萊縣地方自應仍聽該縣編管若委通判一員帶役四十名每年於四月初旬赴島駐至十月回郡一以稽查船隻一以編管居民則此荒濱僻壤之中儼然成一收稅驗船口岸外而需索商民內而擾纍百姓貽害無窮如云文武可以彼此相制則官與將辨不和役與兵丁不輯必從此起伏查雍正八年欽奉上諭文員管轄武職武員管轄文職皆不可行等因欽遵在案今令文武彼此相制亦屬非宜事關海洋巡防固不可不嚴而撫綏招徠亦不可不慎臣請仍照舊例外洋責之巡哨官兵內口責之州縣有司似無庸添此通判一員也緣奉諭㫖命臣等商酌具奏事理臣謹覆奏伏乞皇上睿鑒批示遵行謹奏所議深中肯綮生一事不如省一事正此之謂也同日又奏為據實奏請仰祈睿鑒事竊臣於雍正九年八月內在京奏請豫省車兵親子弟姪內選其年力精壯者補伍如不足一千名之數另行召募充補令與大營之兵一體操演精鋭隨䝉皇上俞允面諭演習之法至詳至晰臣又跪奏山東登兗二鎮亦應照式訓練欽奉諭㫖令臣回豫知會撫臣嶽濬一例照行臣於九月二十四日回豫遵即密行知會撫臣嶽濬署登州鎮臣冉起鳳兗州鎮臣曾謨去後兹接撫臣嶽濬來字撫標巳選有車兵子弟竝食糧兵丁共一百二十名現在再挑百餘名登鎮各營巳選有一千名兗鎮各營巳選有一千名豫省南鎮各營巳選有一千名北鎮各營巳選有一千名及臣標兩營選有一百八十名又南北兩鎮募補之步兵一千名俱各遴委員辨教導訓練弓箭扁刀長鎗短棍藤牌等件又令一日之間行走數十里并身帶重物由近漸遠由遲漸速由輕漸重業巳如法操練各兵俱皆感激聖主教飬隆恩踴躍從事現在每日勤習漸至嫺熟巳有五六分成效臣查此等挑選精兵雖不令其充應别項差使然終日步行操演殊屬勞苦且不無鞋襪之費臣再四思維內除馬兵糧餉原屬充裕外其餘步兵各食守糧一分每月止領餉銀一兩米三斗車兵子弟雖䝉皇上天恩於恩賞坐糧之外每名每月賞給銀六錢米二斗然既挑入精兵數內者即屬一名正兵除飬贍外其於操有請者東省兗州一鎮如臨清沂州德州髙唐泰安臺莊等營當中東兩大路之極衝汛廣差繁額設馬步兵丁七千五百六十五名除各官飬糧及派出師車兵外止存營五千九百七十二名今又挑選精兵一千名其餘存營兵丁實在不敷應差可否照豫省南北兩鎮之例增募守兵五百名分撥緊要營汛與現在存營之兵一體操演務使技藝純熟以供差防之用於營伍不無裨益臣不揣冒昧據實奏請伏乞皇上睿鑒批示施行謹奏兗州係通衢大道非山陬海澨可比現有額兵五千九百餘名足資彈壓不必增募雍正十年二月二十五日河東總督臣田文鏡謹奏恭請皇上聖安朕躬甚安夙疾盡除矣較之去冬更覺調暢順適特諭卿知自應倍喜也同日又奏為欽奉訓㫖據實覆奏事雍正十年二月十七日臣齎摺家人捧回臣恭請聖安摺內欽奉皇上硃批諭㫖朕躬今巳全愈矣時當春令虔求雨澤濟農播種斯為第一要務近聞豫東二省吏治甚有不協可傳諭嶽濬共相誡朂竭誠修省更宜懲貪奬善糾繆繩愆以申明政教訪民疾苦料檢儲蓄以先事預防庶冀上格天心化災為福否則不亦有忝厥職大負朕恩耶欽此臣跪讀之下甫誦至第一句諭㫖不勝踴躍歡忭之至隨即叩謝蒼穹為四海臣民保護聖主隆庥再讀全㫖喜躍之後深以恐懼臣查豫省開歸河南汝等五府陳許禹鄭陜光汝等七州業巳普降甘霖麥苗長發惟彰衛懷三府尚有未獲溥霑之處至東省除登萊青三府并武定濱莒等州各所屬地方自冬及春各得雨雪原未缺少其濟兗東三府并泰安東平髙唐沂濮曹等州各所屬所得雨雪多寡不等尚未均霑此皆臣奉職多愆之所致臣查彰衛懷三府臣巳將地方情形并請加賑緩徴事宜恭摺具奏候㫖遵行其東省濟兗東三府臣亦節次移行撫臣嶽濬署布政使孫蘭芬現在減價平糶貧民不致乏食幸此三府上年截留漕米尚存七十餘萬石設或二麥歉收儘足動用臣仍敬謹修省虔誠祈禱將現在所行政務深自省察并咨詢各屬恐有不便於民足以上干天和之處力求改正惟冀廣沛甘霖仰慰聖懷從來大法則小廉表端則影正豫東二省吏治甚有不協以致上厪聖心臣罪難逭乃䝉皇上天恩不即加譴責訓誡諄􅋀臣何敢分諉於屬吏竊臣身受天恩至深極重十年以來竭盡血誠凡有可以仰報天恩俯慰民望者不敢少惜心力少避嫌怨久在聖眀洞鑒之中若不䝉皇上保全則雖千百臣身亦不能久膺重任至於今日臣雖至愚荷䝉皇上恩遇訓誨如此之隆如此之篤即犬馬禽魚亦知銜結乃敢少萌負恩之念則眀明在上實鑒臨之矣除敬録硃批諭知山東撫臣嶽濬欽遵外臣復敬録一道謹粘几案之前時時觸目警心竭誠修省仍仰祈皇上念臣庸愚憐臣衰老時加訓示遵行臣不勝感激悚惶之至所有奉到原摺一併恭繳謹奏朕之聽聞容或訛誤上天監觀豈有差忒即以卿在豫十年統而計之前數年之雨暘時若近數年之水旱災荒非明證歟上天感應分毫不爽於斯不凜然敬畏循省愆尤可乎諒卿居心自應終始未渝苐恐精神減退於前或被不肖屬員所欺蔽耳百凡處加詳加慎為之同日又奏為署司未得其人據實奏聞事竊查山東署布政司孫蘭芬原係河南南汝道經臣請調登萊青道䝉皇上逾格擢用特命署理山東藩司印務於雍正八年十二月二十四日到任臣留心體察見其才情尚好辦事亦勤臣深慶得人感激天恩於無地雍正九年七月臣進京陛見跪奉皇上垂詢孫蘭芬能否勝任臣隨回奏能勝此布政使之任復奉皇上垂詢伊性甚急臣回奏近來巳覺少改奉㫖若如此即堪實授臣回奏好臣自九月回任後正欲其同舟共濟深藉臂指之助又恐其恃才任性致誤公務屢行寄字令其就近與撫臣嶽濬商酌妥協至所辦政務或有與臣意見未符者臣即開誠布公眀白指示密與商榷總求朝廷公事辦理得宜不謂該署司自臣進京之後頓改前修仍以氣質用事臣留心試察凡於屬員賢否不定於屬員之優劣而出於一巳之好惡如試用劉書委署昌邑縣事務婪贓纍纍孫蘭芬徇庇該員密囑承審各官懸案不結及臣回任訪聞飭查方為嚴審詳參再如夀光縣知縣楊正弼勒借縣民銀兩濰縣知縣鄒孟復諱命婪贓經臣訪查孫蘭芬甚不樂聞猜擬係何人進禀於臣彼即深為不悅以致各屬避嫌不敢復向臣言一事及至審實先後糾參而人言方息又兗州府知府沈斯厚到任以來才不諳練諸事廢弛各屬解府人犯候審無期以致拖斃在獄者多臣訪聞行查孫蘭芬不但不肯揭參且逢人稱說以為好官眀欲與臣相左又試用通判楊眀德委署長山縣少年紈褲耽於歌唱不理政務縱役橫行經臣訪眀密飭孫蘭芬查察孫蘭芬止將該縣撤回竝不揭報亦無隻字回覆再東省於雍正九年䝉皇上天恩撥截南漕奉米原以備一時急需而孫蘭芬狃於米石不能耐久恐致黴爛賠纍急欲出糶一空屢行詳請減價臣因冬春雨雪稀少又奉有先事圖維之諭㫖凡事自當預為措辦恐減而又減價值太輕即為姦牙囤戶賤買貴賣致病民食且速急糶完萬一二麥歉收將來三四五六七八等月正需接濟此時再作無米之炊徒費周章於事無補而孫蘭芬執說甚堅將臣批令查議之詳竝不置議一字徑行頂回此其偏執巳見者一也再奉㫖於德州臨清建立倉厫或赴直隸買米或留截南漕存貯以備山東河南兩省不時之需而孫蘭芬竝不悉心辦理惟恐南漕大米易黴以致賠纍議截山東本省之漕折穀收貯臣以漕運小米止河南山東二省運兌京倉為數不多每年支給陵糈之後僅存無幾不可不為京倉留一地步且大米雖不比穀石之耐久即暫存一二年亦不至遽黴驟爛如謂北地不宜則通州京倉去東省更北豈獨不懼黴爛且截本省之漕以備本省之用何不即留貯各州縣倉厫一有動用取之甚便而必於臨德二處另建倉厫糜費帑項耶還須遵㫖截留南漕為是經臣如此詳晰開導孫蘭芬始行另議此其草率辦理者一也再雍正九年秋後買補倉穀款項紛繁當此歉收穀貴之時孫蘭芬竝不查察各屬穀價之貴賤倉存市賣之有無一例飭買以致存倉舊穀尚多市價甚昻原價不足者有多買之苦纍存倉舊穀本少市價未昻原價足買者有不買之空虛臣回任之時見其辦理草率甚為驚駭臣為之酌盈劑虛詳晰指示而孫蘭芬始照臣檄辦理分案具詳方有頭緒此其草率辦理者又一也以上各案臣皆就其重大而有實據者言至其日行事宜臣所未知者不知凡幾即此數事而觀其徇庇劣員既如此其辦理大案又如彼而又性情褊急舉止躁露將來必至貽誤地方所關甚巨若不急為奏聞則孫蘭芬之深負聖恩即臣之深負聖恩也臣從前未能深察其人屢行舉奏雍正五年十一月欽奉皇上硃批孫蘭芬情性太急終非大器仰見聖眀早巳洞燭其疵臣不勝欽服惶愧無地伏乞皇上鑒臣愚昧宥臣罪譴臣惟有矢公矢慎竭盡愚忠以仰報天恩於萬一耳為此謹奏此奏是朕謂孫蘭芬不勝任之諭不啻一而再再而三卿乃執迷不悟斯即被屬員欺蔽之眀驗今雖覺察具摺論列於心能不抱歉乎既經此一番則凡向日認為可以倚信之員俱當加意體究確核其實朕所慮者正恐該屬負卿不獨孫蘭芬也切莫錯會事事虞欺時時防詐庶無大謬仍候另㫖諭部雍正十年三月十五日河東總督臣田文鏡謹奏恭請皇上聖安朕躬安適如常屢次詢問卿體近時景況第見奏謝之章而厥疾曾否全愈精神增損若何竝未言及嗣後齎摺人來可據實奏聞以慰朕念同日又奏為恭報豫省得雪日期仰慰聖懷事竊查豫省河以南之開歸河南汝等五府及陳許禹鄭陜汝光等七州自冬至春雨雪均霑節經臣恭摺奏聞惟河北彰衛懷三府尚未溥遍霑足民情望雨甚殷臣欽遵諭㫖竭力修省潔誠祈禱復飭各屬設壇齊戒一體祈求兹開封省城於三月初十日未時得雪起隨下隨化至十一日未時止又十一日亥時細雨密下至十二日丑時復降大雪至午時止除消化外積雪四寸餘連前得雨雪入土共有七寸又據開封歸德河南彰德衛輝懷慶等府陳許禹鄭等州所屬地方各報三月初十十一十二等日得雪七八九寸及盈尺不等四野霑足入土深透臣於十三日親詣各壇謝神隨有百姓老幼萬餘人擁至壇前合掌望闕叩謝天恩歡聲雷動臣復傳其中老農詢問據稱今歲係有閏月節氣尚早得此大雪融化入土不獨麥苗長茂即早種之髙粱早穀等類亦皆勃發而未種之棉花早黍早穀芝麻等項又可及時播種實為應時膏澤臣與百姓莫不感頌聖德羣呼萬歲所有開封等處及河北彰衛懷三府得雪日期理合星馳奏聞仰慰聖懷至河北三府得雪之後正可播種秋禾其有無力窮民不能備辦籽種者臣巳飛飭地方官借給籽種俟豐收後交還務使野無曠土農無失時以仰副我皇上子惠元元之至意合併陳明為此謹奏豫省連得雨雪霑足朕曷勝額慶但節候未免稍遲二麥可望豐收與否從前缺雨春麥曾及布種與否所奏均未明晰雍正十年三月二十八日河東總督臣田文鏡謹奏為恭奏東省雨雪并豫省得雨日期仰祈睿鑒事竊查東省各屬於雍正十年二月初六日以前得過雨雪經臣奏聞在案惟因去臣駐劄地方路途遠近不一各屬具報雨雪之文前後參差而到未能隨時彚奏除登萊青三府及莒濱等州所屬上冬原未缺雪春來亦未少雨二麥豐收可卜外惟濟兗東三府及泰東髙濮沂曹等州所屬地方雨雪稀少今自二月十一十五十六十九等日三月初四初五初九初十十二等日或報得雨或報得雪各三四五寸不等於麥苗俱得滋潤長發亦且得以布種秋穀目下民間尚有蓋藏市糧不少民情安堵所有東省得過雨雪日期理合奏聞再豫省於三月初十十一十二等日得有大雪經臣恭摺具奏之後又據各屬具報於十九二十二十一等日復得大雨四五六寸不等值雪化未久地土津潤之際得此透雨入土霑足麥苗倍加茂盛巳種之秋禾俱各長發未種之秋禾俱得播種再開封省城於三月二十七日天氣濃隂至二十八日丑時起大雨如注四野滂沱入土深透下至辰時尚未止息而且濃雲密布雨勢寬廣白叟黃童無不歡呼載道蓋由我皇上宵旰勤求至誠格天是以大雪之後繼以透雨益信天人感應之理神而且速理合一併奏聞仰慰聖懷謹奏似此雨雪接續入土透足雖秋禾尚不敢預定二麥則大有可望矣朕不禁以手加額為豫東兩省黎元欣幸同日又奏為恭報桃汛平穩工程鞏固仰祈睿鑒事竊查豫省河工數年以來仰賴皇上至誠昭格河神默佑黃流循軌汛水安瀾中泓刷深工程堅固前因桃汛將屆臣隨檄飭管河道劉永錫河北道孔傳煥督率㕔汛員辨帶領兵夫加意修防巡查料理兹據河道㕔汛等各報稱自雍正十年三月初十日清明起至三月二十九日止黃河水長一尺八九寸及二尺八九寸今巳消落一尺一寸竝未出槽又沁河共水長八尺九寸今巳消去七尺七寸凡南北兩岸一切堤掃工程俱各平穩兩河官民莫不踴躍歡呼感頌聖德惟是轉瞬入夏伏汛即至臣仍嚴飭管河各官敬謹修防外所有桃汛巳過工程平穩緣由理合繕摺具奏仰慰聖懷謹奏桃汛工程平穩覽奏巳悉今歲夏秋間或恐雨水過多凡事豫則立及早綢繆為要同日又奏為恭繳硃批仰祈睿鑒事雍正十年三月十六日臣齎摺家人回豫敬捧皇上硃批諭㫖到臣敬啓跪讀於臣恭請聖安奏摺內欽奉硃批朕躬甚安夙疾盡除矣較之去冬更覺調暢順適特諭卿知自應倍喜也欽此臣跪讀之下踴躍起舞叩謝天祖之默佑而深為四海臣民慶幸從此天行常健聖德日躋共戴超堯邁舜之聖人於億萬斯年矣又於臣欽奉訓㫖等事奏摺內欽奉硃批朕之聽聞容或訛誤上天監觀豈有差忒即以卿在豫十年統而計之前數年之雨暘時若近數年之水旱災荒非明證歟上天感應分毫不爽於斯不凜然敬畏循省愆尤可乎諒卿居心自應終始未渝第恐精神減退於前或被不肖屬員所欺蔽耳百凡處加詳加慎為之欽此臣跪讀之下仰見我皇上聖學達天訓明理著上天之賜應即在臣心之敬弛顯而足據臣敢不凜然敬畏深自修省惟有較前更加勉勵以補精神之所不逮庶少盡此犬馬之血誠而巳又於臣奏參山東署布政司事孫蘭芬摺內欽奉硃批此奏是朕謂孫蘭芬不勝任之諭不啻一而再再而三卿乃執迷不悟斯即被屬員欺蔽之明驗今雖覺察具摺論列於心能不抱歉乎既經此一番則凡向日認為可以倚信之員俱當加意體究確核其實朕所慮者正恐該屬負卿不獨孫蘭芬也切莫錯會事事虞欺時時防詐庶無大謬仍候另㫖諭部欽此皇上知人睿哲遠邁唐虞實天下臣民所敬仰而誠服者臣心之抱歉不特今日為然但臣實愚昧每為之深必至歷久方能察識是以每為屬員所誤今既經孫蘭芬之敗露敢不深自省惕至於屬員之負臣即臣之上負皇上矣臣敢他諉并自負臣心自當遵㫖更留一番心神也所有奉到原摺理合恭繳為此謹奏奏內云屬員之負臣即臣之負皇上斯語不然凡人之遷改不常始終異趣千變萬化莫可端倪蓋有力所不能禦智所不及料者但保巳身終不被人所愚足矣何能保人之必不我負耶十年以來大臣中負朕者指不勝屈遂謂朕負聖祖可乎此念被屬員窺破即係自開被愚之門用人一節朕經數次切諭惟不逆詐不逆不詐二語守而弗失庶幾一生用之不竭雍正十年四月十三日河東總督臣田文鏡謹奏為遵㫖密奏仰祈睿鑒事竊查社倉積穀一項自定例設立以來臣於每年秋收後密飭各屬實力勸輸不論菽粟不論升斗積少成多而豫省百姓沐浴聖化無不樂善好義踴躍輸將兹據河南布政使徐聚倫造冊詳報前來除舊管捐貯社倉穀麥豆髙粱稻穀等項共二十二萬九千八百六十五石零外又於雍正九年分據開封等八府屬汝陳等七州并所屬彚報新收捐穀八千五百二十三石零蕎麥二石以麥易穀二百二十八石息穀一萬六千三百六十九石零以上共二萬五千一百二十二石零新舊二項應實在貯倉共二十五萬四千九百八十八石查雍正八年青黃不接之時各屬借出共一萬八千八百八十六石零應在雍正九年秋收還倉但上年河北彰衛懷三府秋成歉薄現䝉聖恩溥賜賑恤窮民未能如期交還各屬具報還倉尚在參差不齊是以未能核定確數合併陳明伏乞睿鑒謹奏覽奏知道了社倉之設本為利民起見借出米穀當觀地方年歲若何稍覺拮据即停其催納緩至次年交倉亦未為晚萬不可令有司因追社穀而擾纍閭閻從前楚督楊宗仁鋭意建立社倉屬員奉行不善只顧目前迎合急於積斂以致通省嗟怨此人所共知者當􅋀以為戒同日又奏為據實覆奏事竊臣遵奉諭㫖查修禹州黃花觀軒轅祠宇臣當即諭令布政司委員會同該州知州親至崆峒山逐處查勘將應行修葺之處確估詳報兹據布政司覆稱查勘得黃花觀一名逍遙觀自下觀以至上觀凡廟閣殿宇門樓房院共六十間自前明正統間重修以來歷今年久每多傾圯殘缺之處以及裝修神像修理墻垣街路共需磚瓦木植灰煤顏料釘油工價各等項共估銀一千二百一十二兩零臣隨飭布政司將臣應支恩賞飬廉銀內照數動支給發禹州先為辦料目下正當東作方興俟農務稍隙之時即委員監督興工務期堅固一律巍煥以仰副聖天子尊崇古先聖王之至意所有逍遙觀估修辦料緣由理合繕摺覆奏伏乞睿鑒為此謹奏固係美舉非急務也相度時宜量力為之同日又奏為欽奉聖諭據實覆奏事雍正十年四月初四日臣齎摺家人回豫捧到皇上硃批諭㫖臣敬啓跪讀於臣恭請聖安摺內欽奉硃批朕躬安適如常屢次詢問卿體近時景況第見奏謝之章而厥疾曾否全愈精神增損若何竝未言及嗣後齎摺人來可據實奏聞以慰朕念欽此臣跪讀第一句諭㫖仰見聖天子太和保合景福日隆四海臣民額手稱慶至臣自上年進京之後荷䝉皇上愛護顧復賜藥賜醫調理全愈臣回任以來至今半載有餘飲食如常精神强旺即偶爾咳嗽亦因不能避風所致竝不為患每日接見屬員審理案件辦理事務操閲兵丁精神實能應付諸病全愈此皆仰賴皇上再造鴻恩栽培所致前䝉聖恩屢次賜問而臣竝未明白奏及者誠以犬馬微軀不敢上瀆聖聰兹復䝉皇上殷殷垂詢臣方敢據實奏聞但臣自顧何人仰䝉恩眷臣實感激涕零雖捐糜頂踵亦不足仰報天恩於萬一又臣恭報豫省得雪日期摺內欽奉硃批豫省連得雨雪霑足朕曷勝額慶但節候未免稍遲二麥可望豐收與否從前春麥曾及布種與否所奏均未明晰欽此仰見皇上軫念民依至深極􅋀臣查豫省如河以南之開歸河南汝五府及陳許禹鄭陜汝光七州自冬至春雨雪時有土膏優渥現在麥苗髙至一尺七八寸及二尺餘不等巳經結穗十分暢茂豐收可期其河北彰衛懷三府雖自去冬以至仲春雨雪多寡不等自三月初十十一十二等日得有盈尺大雪入土深融復於十九二十一及二十七二十八四月初二初三初七等日三次連得透雨四野遍霑麥苗勃發并有結穗者數日後出穗俱全臣前委令糧道張建德往河北三府監察賑務事完回省稟稱沿途詢問老農俱稱低窪平原肥地可望八九分收成其髙阜沙岡瘠地可望六七分收成與臣差人察看并各屬所報情形無異至豫省民俗大率廣種秋麥竝無餘地留種春麥間有未種秋麥地畝皆留以播種早黍早穀芝麻髙粱豆子棉花等項自連得雪雨之後民間一律播種早色秋花青葱遍野竝無尺寸曠土理合據實奏聞伏乞睿鑒謹奏覽奏卿疾全愈精神復舊而又野無曠土麥稔可期朕實欣慰無盡雍正十年四月二十二日河東總督臣田文鏡謹奏為據實奏請仰祈睿鑒事雍正十年四月十九日接准吏部咨欽奉上諭山東布政使員缺著河南布政使徐聚倫調補河南布政使員缺著御史鄭禪寶補授欽此臣恭即叩謝天恩轉行欽遵在案然臣有不敢不據實奏請者臣查河南布政使徐聚倫學問甚優人品端正其勉力廉隅有志向上臣亦可保其無他惟是布政使一官職司理財用人綜核通省庶政徐聚倫自䝉天恩升授以來臣見其所辦事務雖無失誤然間有未甚老練之處皆由閲歷未深之故臣以為與臣同城可以不時指示開導引進成全資其佐理兹䝉聖恩調補山東布政使雖同在臣統轄地方而距臣千里之遙公牘往來每需時日究不若豫藩之日在臣左右可以朝夕提撕之為妥便臣又查鄭禪寶前任長蘆鹽政時臣於雍正六年前往山東查海該員亦因公在省與臣同辦鹽務鄭禪寶才識兼優辦事明敏彼此相較徐聚倫優於學行鄭禪寶長於政事在鄭禪寶似可以離臣稍遠亦能勝任臣不揣冒昧請將鄭禪寶調補山東布政使徐聚倫仍留河南原任似此一轉移間不特人缺各得其宜即臣與撫臣嶽濬亦共收臂指之助矣臣為兩省政務重大起見可否如斯伏乞皇上睿鑒欽定施行謹奏所請甚是候另有諭㫖硃批諭㫖卷一百二十六之二十三欽定四庫全書硃批諭㫖卷一百二十六之二十四硃批田文鏡奏摺雍正十年五月十一日河東總督臣田文鏡謹奏為恭奏河東兩省得雨日期仰祈睿鑒事竊查豫省二麥現今成熟民間收穫過半不日可以登場臣復密差人員分頭查看今麥粒比往年倍加堅實不獨河以南之開歸等五府汝陳等七州屬均係豐收即河以北之彰衛懷三府亦有六七分八九分收成不等俟查明實在分數容臣另摺恭奏至東省除登萊青三府莒州所屬原未缺雨現在麥穗垂成秋禾長發外再濟南一府所屬自四月十六日巳得透雨之後又復連得雨澤二麥收成約有七八九分可望秋禾布種者皆巳長發朱種者及時耕種惟兗東二府及泰濵武東髙濮曹等州所屬地方得雨未足二麥巳有失收秋禾尚有未種者據各屬陸續具報自四月十六七二十三五六八九等日屢次得雨或一二寸至三四寸不等各色秋花農人乘此雨後俱巳一律播種臣巳遵先事圖維之諭㫖會同撫臣嶽濬預行辦理查各屬現在貯穀五十八萬石零米三十九萬石零又奉㫖准截南漕四十萬石以備賑濟之用竝飭各屬勤慎撙節毋致遺濫嚴禁燒鍋屣麯勸令富戶出糶招徠商販米石務使民食充裕撫恤得所以慰聖懷所有河東兩省得雨日期理合繕摺恭奏伏乞睿鑒為此謹奏頃聞山東甚旱奏內未免有粉飾之詞上下一誠相通方無隔礙不可稍涉回護雍正十年五月十八日河東總督臣田文鏡謹奏為據實具奏仰祈睿鑒事竊查豫省二麥業巳收穫登場仰䝉皇上修省勤求聖德格天今嵗全省收成不但俱登豐稔而且麥粒比往年倍加堅實經臣奏聞在案惟是豫省地居天中北通直隸西聫秦晋南接江淮湖楚四方輻輳商販羣集甫得收穫之時即絡繹販運他往雖普天莫非王土遏糴在所應禁出其有餘以濟民食自無不可然河南䝉聖朝休飬有年戶口滋生食指實屬浩繁兼之愚民嗜利忘逺不知耕三餘一耕九餘三之道儘其所餘任意糶賣兹據各屬禀稱他省客商來豫糴麥者陸則車運水則船裝往來如織不絶於道臣既不可違例遏糴竟行禁止又不可任其搬運致鮮蓋藏惟有飭令地方官多方勸諭令其早為積貯以偹不虞各崇節儉以惜物力不得因收成豐稔遂忘無巳太康之戒總期糧食充裕以仰副皇上愛飬黎元至意此實臣之私心然不敢不繕摺奏明仰祈睿鑒謹奏教民積貯固是正恐乏勸諭之方耳同日又奏為遵㫖預行辦理并東兗二府現在情形仰慰聖懷事竊照東省濟兗東三府地方上冬少雪入春無雨臣自本年正月間巳􅋀隱憂思為留前裕後之圖有備無虞之計伏查東省倉穀自雍正八年被水賑濟之後所在皆空䝉皇上天恩以雍正九年漕米折穀抵賑又截留南漕通奉等米共九十萬石自前署司孫蘭芬倡為易黴恐纍之說急於出糶凡貯米各屬起而效尤不數月間糶賣四十餘萬石經臣將孫蘭芬奏參嚴飭各屬止許零星出糶以平市價以濟民食現今尚存四十餘萬石幸而濟南一府自三月下旬屢次得雨至四月十六日大雨深透今五月初五初七又連得大雨甚為普遍現在二麥登場秋禾長茂市價甚平民情安帖毋庸置議外惟東兗二府及泰武濵曹東髙濮沂八州臣通盤打算現存倉穀五十八萬有零南漕通奉米除𣲖撥别屬外現存三十九萬有零恐有不敷議請截留南漕四十萬又恐往返需時密劄撫臣嶽濬就近奏請䝉皇上天恩俞允并寬免各關口梁頭米稅以通商賈今南省商船連檣而至本處商人亦皆攜資往販據署布政司事按察使唐綏祖禀稱撫臣嶽濬之意有存貯臨倉耗羡銀萬餘兩意欲動用此項差員赴邳徐一帶買麥似屬有益應聽撫臣嶽濬奏請動用臣又嚴禁燒鍋屣麯勸令富戶將餘糧即在本地出糶并不許姦牙收囤射利病民是以各屬集市糧食尚多價值不能驟長但市糧雖屬充盈止可買食誠如聖諭不能為窮苦百姓普遍之利臣仰體聖心急籌目前接濟之策無過於散米一法於乏食災黎深有裨益現在與撫藩悉心經畫尅期舉行遴選賢員實力辦理務使窮民得霑恩澤不致流離失所以仰副皇上愛飬黎元之至意臣查東兗二府并各州屬現在二麥尚有薄收者三十八州縣二麥竟至失收者二十一州縣有此米穀儘可接至秋收止須查辦妥協不致遺漏冒濫自必各得其所近據各屬報到五月初五初六初七等日均得甘霖秋禾巳種者條達暢茂未種者現在播種各勤農業民情甚安將來再得時雨豐收可望理合將臣遵㫖辦理事務并各屬現在情形具摺奏聞仰慰聖懷為此謹奏覽奏東兗二府泰安等八州米價未昻并近日復經得雨情形憂懷為之稍減雍正十年五月二十七日河東總督臣田文鏡謹奏為遵㫖通融辦理恩賞鎮兵生息銀兩以廣皇仁事竊照馬步戰守兵丁䝉皇上逾格天恩軫念其家遇有吉凶之事費無從辦賞給銀兩營運生息以濟其用此從古未聞於今特見之曠典也夫天恩之下逮雖如雨露之潤物當纖巨而同霑然亦如川源之就下必盈科而後進是以由內及外由滿及漢由督撫提標而及鎮次第賞給至於各協兵丁自應靜候軍務告竣國用充饒之日周遍加恩乃遽欲同沾妄生冀幸此實伊等之不揆時度勢量力衡情也然臣以為協兵之未得同霑者實由督撫提鎮大臣辦理失宜之所致非盡在於推恩被澤之自有後先也蓋天下協標兵丁非隸於督提即轄於總鎮其隸於督提者原為督提之親標恩賞銀兩即應在於督提生息銀內推及其轄於總鎮者即係總鎮之親標恩賞銀兩即應在於總鎮生息銀內推及臣愚以為不獨協兵即推而至於參遊都守營分以及沿江沿海水師兵丁何莫非督提總鎮分屬之標有何區别竊恐望恩之急彼此同情非分之邀逺近一體若不遍及則施恩似有偏枯如欲同沾則經費亦當通算臣伏查此項生息銀兩乃格外殊恩原非兵丁分所應得之賞惟當視其兵丁之衆寡利息之盈虧酌量均攤通融勻𣲖多則多分少則少給如豫省北鎮九營共兵五千一百三十九名南鎮八營共兵四千九百二十一名東省兗鎮十四營共兵七千五百三十九名登鎮十三營共兵九千一百八十名查四鎮共馬步兵二萬六千七百七十九名內除四鎮隨標中左右營兵共八千五十八名得沾恩賞外尚有外營之一萬八千七百二十一名均未沾恩登鎮之兵較三鎮頗多故特賞銀一萬兩其餘三鎮各六千兩除各官飬糧公糧無庸賞給現在出征兵丁照部定數目賞給外其餘各營臣約略計算雖不能如部定馬兵吉禮六兩喪禮八兩步兵吉禮四兩喪禮六兩之數然亦得各沾實惠無庸岐視者也今據四鎮呈報每年加一五起息止賞同城中左右營等語殊未得宜臣查馬步兵丁餉則有多寡之不同而米則每月同領三斗初無分别今吉凶賞銀當此創始之時實無庸分别馬步請照月米之例一律酌量吉禮賞銀二兩喪禮賞銀四兩巳足接濟況吉凶二事非家家常有之事或一家數年而一遇或一家數年而不遇如一年之內吉喪事少銀有盈餘令於年底造報留為次年之用生息之銀既日積而日多則賞給之額亦可續增而漸廣更不必執一而論賞兵次第先鎮後協積有餘銀再及各營如此辦理費用無多可以周遍臣再查臣標及河南南北兩鎮標下原無協營惟東省兗鎮標下管轄臨清沂州二協登鎮標下管轄文登膠州二協雖稱協鎮原屬鎮標以臣愚見即參遊都守各營尚請在於該鎮賞銀內分給何況協營儘可變通似無有不能行之處從此而經費有餘再沛天恩賞及協兵亦止宜於該鎮原賞銀內加增不必另立協兵生息名色即不再賞而該鎮原賞所生之息日積月纍亦足贍給似此稍為變通方為大公庶可垂久是否可行理合奏請皇上訓示遵行為此謹奏通融辦理之議似覺不甚妥協難以施行候朕再加裁奪另有諭㫖雍正十年閏五月十七日河東總督臣田文鏡謹奏為據實奏聞仰祈睿鑒事竊照山東東兗二府今春少雨二麥歉收仰䝉皇上天恩軫念黎元恐致乏食失所特施賑恤臣敬繹恩綸或散米或煮粥或借貸倉穀原令因地制宜非令三者竝行臣因天氣暑熱粥易作酸未便煮賑外飭令地方官俾知㫖中散者指米而言借者指穀而言散米而不責償者專指赤貧饑口而言借穀以待有秋者專指有産災黎而言然而二者之中究以散米為先務蓋東省舊貯糶存南漕通奉各米共四十餘萬石又䝉恩截留南漕四十萬石儘可敷用分别大小口按月散給接至秋收貧民得食免飢不須借領責償其感沐天恩更為深至臣仰遵因地制宜之諭㫖是以散米為先務宜急借穀為後圖可緩也再履畝勘災計口授食此國家一定之常經災則必以收成分數為程賑則必以戶口册籍為據舍此常經便同棼絲難理别無簡便法門臣因奉㫖諄切貧民口食不可少緩須臾飭令一靣將原貯撥運米石查有實在乏食朝不待暮之貧民先行賑恤一靣仍遴委道員督同府州縣分頭查勘災傷編戶給票領賑庶幾無遺無濫否則逢人即給以致不應賑者賑而應賑者不賑矣臣又以為愚民不知撙節多領必至花銷誠恐地方官樂於簡便將數月口糧一時散給以致日後仍至乏食輕去其鄉此時坐視不可再賑不能豈非誤事節經臣熟思長慮以求萬全公牘書函不下數千萬言俱行山東布政司確議飭遵在案又䝉皇上恩准光祿寺卿王􅕵奏請奉㫖所𣲖兗東等本地人員即令王􅕵帶領商同辦理欽此仰見聖慮周詳以本地之人辦本地之賑自必極公至當不意王􅕵桑梓情深過於從厚不為國家度支出入亦不為災黎經理舒徐意欲將四箇月口糧減作三箇月加增戶口復欲於賑米之外再借倉穀因撫臣嶽濬有借穀不如借銀之言又欲於借給籽粒之外再借銀兩經兗沂莒道萬國宣兗州府知府沈斯厚委婉商請以甘霖普降秋禾巳種自應凛遵聖諭因地制宜而王􅕵甚為拂然遂堅執已意靣飭滋陽縣知縣茅瑛務必借給有意更張事多掣肘具禀到臣并接河臣朱藻來字亦云王􅕵辦賑甚不妥協有遍及邀譽之意等語臣恐似此意見齟齬小民無厭一聞王􅕵之言即頑紳劣襟地豪土棍本非乏食災民亦必赴官紛擾將來未能辦理妥帖即日費數萬帑金數萬倉米亦不能盡如人意於賑務深有未便臣逺處豫省既有所聞不敢不據實奏聞仰祈睿鑒臣查東省各道府州縣多係雍正八年辦過賑務諳練之員且既有命來候補候選人員選拔貢生已足差遣可否將本省人員王􅕵等掣回以杜瞻顧桑梓掠美市恩之弊理合并請皇上欽定訓示遵行為此謹奏所奏是巳有㫖將王􅕵等掣回矣雍正十年六月初三日河東總督臣田文鏡謹奏為續參市恩擾賑之卿員仰祈睿鑒事竊照山東東兗二府春夏少雨麥收歉薄䝉皇上軫念民艱溥施賑恤乃光祿寺卿王􅕵竝不敬繹聖諭因地制宜乃一味加厚桑梓更張掣肘業經臣奏聞在案臣竊以為查災辦賑國家自有一定不易之常經無庸攙入私意浮言致滋紊亂且情形時有不同不可不隨時斟酌當被旱之日野多赤地秋田無望不得不廣為賑救及至得有透雨百穀發生傭工力作即可覔值資生野䔩畦𬞞皆得易錢糊口況採山釣水果熟瓜成所在皆飬生之資無處非救飢之物所有應賑戶口自當逐一核確以杜浮濫臣是以與撫臣嶽濬商酌先將赤貧無依竝遮留歸里者給以口糧至有地拋荒無力補種者借以籽粒臣等非特為國家度支出納留前裕後也誠以窮民得早賑一日即免一日之飢姦民少冒賑一口即救一口之命兹據原署山東布政司印務按察使唐綏祖禀稱王􅕵為人剛愎自用本無學識初到時原有獨出心裁之意及閲司詳并臣節次檄飭條約茫然若失遂倡為借銀之說以示立異之意且儼然以欽差自命出示曉諭知府打恭竟不下轎語言少拂其意即毅然作色州縣而下呵斥自由竝不下鄉細查務欲廣為散給擅作主張殊與商同辦理之諭㫖相違若聽此人措置不但無益地方必致滋生事端等語又據布政使鄭禪寶禀稱王􅕵係自行奏請來東效力原非欽差可比自不宜攙越巳見紛更掣肘山左百姓連嵗疊䝉皇恩至深至重今夏缺雨較之八年被水尚有輕重之分自應先事圖維留前裕後方為萬全倘若濫行賑借糜費倉庫有何底止等語又據兗莒沂道萬國宣禀稱王􅕵諭令沂州知州葉敷凡有田多紳襟之佃戶著田主具呈借領穀石又令沂州借給籽種銀九百餘兩到嶧縣諭令該署縣王天慶將短工無地次貧之人俱填入極貧冊內一體給賑竝於通衢曉諭俱借工本立給倉糧以致該縣惶悚無措又至滕縣諭令該縣黃元軫挽運截留漕米數萬石就近借給該縣以現在奉文賑米不便再借回覆而王􅕵又云只管借給有我擔任等語竊思田多紳襟之佃戶竝非赤貧窮民何得擅動倉穀籽粒銀兩必須查明實在務農貧民現在有地未種可驗者方可借給何能預定銀數至九百餘兩之多在王􅕵不過欲邀譽桑梓罔顧糜費錢糧等語又據曹東道王鴻勳禀稱王􅕵為人執拗欲散給銀兩所帶部屬五員惟郎中尚為煥至濟寧頗覺安靜等語又據兗州府知府沈斯厚禀稱王􅕵至各縣即諭令將米借給紳襟佃戶又索取各縣賑票帶領舉人陳伸等沿途散給又批發廪膳生員等呈俱令一體賑給沿途一切儀從伺候自作威福等語又據濟寧州知州張綸禀稱王􅕵到州自坐堂上點賑放米任意增減地方官不得旁參一語又諭令生員一體借給銀兩不拘何項錢糧按名分散回以庫貯無項可動即作色云我巳摺奏貧士亦當周恤等語臣查此番賑務欽奉諭㫖交與撫藩二臣因地制宜悉心經畫之事王􅕵不過奏請自願來東協辨奉㫖俞允其請乃竝不商同臣等秉公辦理一味自專止圖市恩邀譽不顧州縣米多米少有銀無銀張示通衢號召領賑以致各屬倣徨無措强紳劣襟土豪地棍羣起爭趨反致貧民候賑無期挨擠不上司道等官皆無可如何莫能救止臣恐即有粟如太倉陳陳相因財如源泉混混不舍亦不能遍給不核之民盡飽無稽之腹誠孟子所謂惠而不知為政者也臣不敢因巳經奏聞遂爾默默理合續參伏祈皇上睿鑒施行謹奏於前次奏到即經有㫖調其回京王􅕵為人原屬愚魯粗率然居心端直尚非不肖之流伊子王柔遇事勇往向前是一實心效力之員但亦任性狂縱剛愎自用朕因惜其材器難得以故時加訓誨而驅䇿之無瑕全璧豈易覯耶雍正十年六月十三日河東總督臣田文鏡謹奏為恭繳硃批仰祈睿鑒事雍正十年六月初五日臣齎摺家人捧回臣奏請掣回王􅕵等摺內欽奉硃批所奏是巳有㫖將王􅕵等掣回矣欽此臣於未奉諭㫖之前續將王􅕵辦賑不協情由奏參在案但臣續參之後又據兗莒沂道萬國宣禀據巨野縣知縣廖開春禀稱查辦賑務既按戶分别大小口給米則婦女亦在一戶之內乃王􅕵另將婦女准給以致婦女希圖重領擁擠不散王􅕵亦自謂巨民之不可施恩束手無䇿又王􅕵將溫飽生監鄒玠等四十名每名給以兩大口准照貧民一體均賑四箇月查各生監俱有田房産業竝不乏食因有所挾立催給米不得不遵照王􅕵批准呈詞按名散給以致各生羣起效尤於六月初一日劣生徐湘等一百餘人聚集學宫勒令知縣借給穀石大聲嫚罵教官目覩不敢約束等情到臣臣現行山東布政司嚴查外臣查王􅕵與檢討隋人鵬情願來東商同辦理賑務隋人鵬分查東昌府屬悉照臣等經畫辦理竝不紛更掣肘巳於閏五月二十以前各屬先後開賑民情安帖王􅕵分查兗州府屬獨出巳裁邀譽鄉里市恩於冒濫之婦女溫飽之生監致長刁風至今未據各屬具報開賑日期反致飢民不得領米貽害民生莫此為甚臣巳密劄撫藩二臣速飭核實早為開賑臣不敢因王􅕵等巳經奉㫖掣回遂爾隱默理合奏聞仰祈睿鑒所有奉到原摺一併恭繳為此謹奏據奏王􅕵市恩鄉里致長刁風種種不協可與嶽濬商酌查明㑹疏題參同日又奏為據實奏聞仰祈睿鑒事竊照大臣官員子弟設立官號乃聖朝優待臣工賞延於世之至意典至巨也伏查定例內官員子弟應試有本係嫡子孫及同胞兄弟并同胞兄弟之子曽經出繼者俱不准入官號等語凡所以厚本支而重嫡𣲖杜假借而嚴混冒者至詳至慎從未聞有以異姓之子冒入官號濫叨中式如革職兵部右侍郎胡煦之罔上行私者查胡煦止有親生一子其長子名孟基本姓邱原係光山縣故民邱自先之子隨母胡氏改嫁胡煦時孟基年已四嵗煦將孟基作為巳子改冒胡姓入學復於雍正二年編入官卷幸中甲辰科河南鄉試第二十八名舉人濫竊名器此皆從前學臣試臣及地方官教官失於查察之故臣既體訪確實若不據實奏明將來㑹試屆期萬一僥幸中式事關科場多有未便是以不敢隱諱據實奏聞仰祈睿鑒謹奏該部嚴察議奏同日又奏為奏明事竊照按察使陳世倕胞弟舉人陳世偓素知醫道經臣於雍正八年五月間奏請聖恩賞發來豫欽奉諭㫖交臣酌量委署試用臣上年進京之日適開封府管糧通判員缺乏人臣即委陳世偓署理臣嗣奉恩㫖回豫復經臣靣奏請將陳世偓仍留臣署學習兼資朝夕診視又䝉皇上俞允欽遵在案近因臣於本年四月內感冒風寒之後兼患痢疾訪有專門世醫診脉用藥頗稱切當況臣病巳全愈止須調補氣體可以無庸再留陳世偓在署醫治查陳世偓原係奉㫖交臣酌量委署試用之員應令其及時試用以觀後效但伊胞兄陳世倕現任河南按察司例應回避不便在於豫省試用臣擬將陳世偓前往東省㑹同撫臣嶽濬遵㫖酌量委署理合繕摺奏明伏乞睿鑒訓示遵行為此謹奏卿疾雖愈尚需調理朝夕診視豈可乏人陳世偓之得䝉委署原因醫卿始邀斯恩如果才具可取將卿調治大愈時朕格外優擢不勝似伊挨俸升遷乎目下何必如是急於見用若初借醫病為進身之階未奏全功遽求速用在陳世偓則屬躁競妄舉或專係陳世倕之謀此等居心更難望乃弟將來成就設出自卿意亦非愛之之道將此所批諭㫖與伊弟兄觀之雍正十年七月初四日河東總督臣田文鏡謹奏為恭繳硃批仰祈睿鑒事雍正十年六月二十一日臣齎摺家人回豫荷䝉皇上賜臣寶丹臣恭即望硃批於前次奏到即經有㫖調其回京王􅕵為人原屬愚魯粗率然居心端直尚非不肖之流伊子王柔遇事勇往向前是一實心效力之員但亦任性狂縱剛愎自用朕因惜其材器難得以故時加訓誨而驅策之無瑕全璧豈易覯耶欽此伏查王􅕵此番辦理賑務甚缺妥協誠如聖諭愚魯粗率幸䝉聖明逺照即頒諭㫖調回然臣前既有所知不敢因巳經奏聞遂不再據實陳奏至臣與王􅕵原素未謀靣今䝉聖諭始知王􅕵并其子王柔為人益仰睿鑒至明如日月之無不照臨因材任使如雨露之無不栽培也臣不勝欽仰感激之至所有奉到原摺理合恭繳謹奏於續奏王􅕵摺內雖經批令㑹參卿其更加酌量若可以中止則亦巳焉耳同日又奏為據實具奏仰祈睿鑒事竊查東省所屬之沂州嶧縣郯城汶上嘉祥巨野魚臺各州縣界臨運河并各湖灘水匱臣因上冬少雪入春以來雨澤又稀誠恐蝗蝻易於生發欽遵上諭預行各屬於水草叢生人跡罕到之處早為巡察今據各屬具報果於此等處所生發蝻子蠕蠕蠢動竝未傷損禾苗除各屬漸次撲滅外惟郯城一縣共四十五保內生蝻之處二十四保其縣西各保撲滅約有四分縣南各保撲滅約有三分西北各保撲滅約有五分打後復生較他處為多其東南地接江南海州宿遷等處以馬陵山為界山之上下蝗蝻生發尤盛臣即飛檄所屬文武多委員辨㑹同地方官督率人夫分頭撲滅并行令地方官照依前人買蝗之法捐價買捕毋致長成羽翼飛食田禾為害鄰封并飭接壤州縣無分此疆彼界協力幫捕去後容俟各屬捕淨之日結報到臣再為核實具奏合先奏聞伏乞睿鑒謹奏螟螣蟊賊皆足以害苗而惟蝗最酷一令生翼飛騰則人力難施亟當嚴飭撲滅莫遺種類同日又奏為武職乏員急宜寬途廣拔以實營伍事竊惟用將之道任之宜專取才之途求之宜廣若必狃於往規而不稍為通變格於成例而不量為權宜則巳用之將材僅有此數而後起之將材登進無門鮮有不匱乏而拮据者也臣查臣標及臣所轄之河南南北二鎮山東登兗二鎮各營將領自調取出征遞行委署之後現在存營實授人員巳屬無幾兼之俸滿推升緣事參革因公罣誤離任者又在所不免每遇一缺出則通標遴選遞署實難其人若例應題補必須選取人地相宜員缺相當無參罰合例人員更不易得近來即委署亦有甚難之處蓋員缺例應在外補者部中巳不銓選間有在軍前推升者急猝不能到任而現在營缺悉係署員一官又不便兼理兩缺臣每遇一缺出不但在於通標遴委嘗於通省兩鎮標營通融選拔近又合兩省一標四鎮通營選拔矣無如一標缺員各標亦復如是一鎮少人各鎮更覺艱難此所以題補難委署亦難也臣查臣標二營自副將都司守備以至千把共十五員內實授者四員缺官署理者十一員南鎮八營自參遊都守以至千把共四十九員內實授者七員缺官與署理者四十二員北鎮九營自參遊都守以至千把共五十一員內實授者三員缺官與署理者四十八員兗鎮十四營自副將參遊都守以至千把共八十七員內實授者十四員缺官與署理者七十三員登鎮十三營自副將參遊都守以至千把共九十三員內實授者四員缺官與署理者八十九員似此人少缺多官皆借署營伍則料理無人日漸廢弛兵丁則約束不謹日漸驕縱所關甚巨又不獨在於題補遴署之煩難而巳臣於上年在京時曽將將材難得情由跪奏靣奉訓㫖在於兵丁內選拔仰見皇上至聖至明發揮指示皆屬不易之至論但將備辨兵自分等級以次而拔相遞而升此定制也今在上將領之缺日見虛懸而在下千把之缺每難升讓則兵丁之中雖有可用之才何由而得缺拔補兵丁不得上拔將材又何由而得人不幾與臣在京跪奉之諭㫖實相違悖臣於是推其所以然之故蓋千把末辨無不分守汛地其任內别無他事參罰惟緝盜考成人人不免必以案內盜犯全獲始為合例方得升轉然臣以為此法宜嚴於無事之時而當少寬假於軍興之日臣仰見皇上求才必得立賢無方凡督撫題升文員亦必選取合例然每於不合例之員因其才有可用即於疏尾將伊任內參罰各案查出聲明候㫖定奪每䝉皇上不拘成例量才拔用臣竊以為文武一體斯道既可加恩於文員亦不妨推及於武職臣請嗣後題補武職一時難得合例之員准照文員之例於疏尾將任內參罰聲明候㫖定奪其引見巳過三年者照例給咨送部引見至考拔千把總例不具題亦即於咨部文內將參罰聲明准其拔補俟大兵凱旋各官回任之日仍照定例遵行似此一轉移間則不合例之備辨得以升拔出缺而在下有用之兵丁亦得以依次考補將見人材日出選拔無遺矣臣為營伍乏員起見不揣冒昧據實奏請是否可行伏乞皇上睿鑒特降諭㫖敕部施行為此謹奏題升武職亦照文員之例於疏尾聲明各案參罰所請甚是候交部議覆有㫖雍正十年八月初三日河東總督臣田文鏡謹奏為據實具奏仰慰聖懷事竊查豫東二省自夏入秋雨𤾉時若其早種之髙粱穀黍等項俱巳一律登場其晚種之穀黍花豆等項亦俱暢茂條達結穗堅好據各屬具報及臣差員訪查詢之耆老農民咸稱今嵗秋收毋論髙原平隰以及傍山臨河地畝均有十分收成較之往嵗豐登更為大有至東兗二府自䝉皇恩賑恤之後百姓俱各安居粒食又仰賴聖德格天雨澤應時秋成豐稔糧食充盈市價平賤除被災之茌平縣仍賑四箇月外餘俱分别減去一月二月河東兩省人民熙熙皥皥共樂堯天容俟兩省布政司將通省實在收成分數查報齊全臣再核實奏聞又查東省所屬之沂郯滕嶧等州縣蝗蝻生發俱在湖灘水匱人跡罕到之處隨生隨撲原不為害惟因界連江南之海邳宿沛等州縣彼處生發尤甚長成羽翼負子越湖飛入東境臣據各屬具報即屢檄所屬文武各委員辨分頭撲滅并咨㑹江南督撫二臣轉飭一體協力幫捕臣復設法指示如在荒濵曠野則挑坑掘塹畀之以火瘞之以土如在穀菽行間瓜𬞞陌畔則償其籽種將生蝗之地盡力撲捕茲據兗州府等具禀各屬蝗蝻俱巳如法撲淨竝未損傷田禾臣隨檄布政司確查取結在案再秋汛水勢隨長隨落河流循軌安瀾各處工程俱各平穩合併奏聞仰慰聖懷為此謹奏覽奏豫東秋成豐稔河流順軌而蝗不為災實出朕之望外甚為欣慰同日又奏為據實覆奏仰祈睿鑒事雍正十年七月初七日臣齎摺家人捧回臣奏請將陳世偓前往東省委署摺內欽奉皇上硃批諭㫖卿疾雖愈尚需調理朝夕診視豈可乏人陳世偓之得䝉委署原因醫卿始邀斯恩如果才具可取將卿調治大愈時朕格外優擢不勝似伊挨俸升遷乎目下何必如是急於見用若初借醫病為進身之階未奏全功遽求速用在陳世偓則屬躁競安舉或專係陳世倕之謀此等居心更難望乃弟將來成就設出自卿意亦非愛之之道將所批諭㫖與伊弟兄觀之欽此臣跪讀之下不禁感激涕零伏念臣何人斯乃以犬馬微疴仰䝉聖恩垂眷至於如此之隆如此之篤臣即望闕叩頭恭謝天恩外隨傳陳世倕陳世偓同到臣署敬將諭㫖捧出令其同看據陳世倕陳世偓禀稱伏讀諭㫖惶悚無地實不敢萌此速於求用之心懇求仍在臣署至再至三臣查陳世偓自雍正八年五月內奏請聖恩賞發來豫迄今已及二年臣每年給以束修銀兩其家口俱移入臣署贍飬在陳世偓雖明醫理止宜於平時調劑稍有疑難之證便少把握臣自本年四月內感冒風寒之後兼患痢疾陳世偓診􅍺用藥兩月之久未能收功見效臣復遍行尋訪得有專習醫道之人較之陳世偓更為切當臣服其藥日有起色臣病方得全愈臣因思臣既有專醫調治則陳世偓在署閒居無事且臣仍須給以資斧實臣一點鄙吝之私起此意見冒昧奏請臣從前繕摺拜發之時敬謹慎密竝未令陳世倕弟兄得知實非出於伊弟兄之意今奉諭㫖諄􅋀所有微臣區區私念不敢不瀝陳於君父之前也臣仰懇天恩可否仍將陳世偓前往山東㑹同撫臣嶽濬酌量委署試用臣未敢擅便理合據實覆奏伏候皇上訓示遵行謹奏若據此奏而論是陳世偓醫卿毫無功效更不應邀恩試用矣卿果為惜資斧起見不欲久留署中則當令伊回京歸班銓選奚庸前往山東委署試用於情於理均屬未協如何其可總之或仍留署或令歸部於斯二者卿酌量行之雍正十年九月十五日河東總督臣田文鏡謹奏為恭奏河東二省秋收分數仰祈睿鑒事竊查今嵗豫東兩省其早晚各色秋禾豐稔情形業經臣奏聞在案兹據河南布政使徐聚倫山東布政使鄭禪寶各將合屬實在收成分數核確具報到臣臣復加查核恭呈御覽查河南開封府十四屬歸德府九屬彰德府七屬衛輝府八屬懷慶府七屬河南府十一屬南陽府十二屬汝寧府九屬各收成均有十分而開封彰德汝寧三府為尤盛陳州并所屬四縣許州并所屬四縣禹州并所屬二縣鄭州并所屬四縣陜州并所屬二縣汝州并所屬四縣光州并所屬四縣各收成均有十分而陳鄭汝光四州為尤盛又查山東濟南府十四屬一衛兗州府十四屬二衛所東昌府十三屬二衛青州府十屬一衛萊州府七屬四衛所登州府八屬四衛各收成均有十分而青萊二府為尤盛泰安州并所屬三縣武定州并所屬三縣曹州并所屬四縣東平州并所屬四縣濵州并所屬三縣沂州并所屬二縣髙唐州并所屬四縣濮州并所屬三縣莒州并所屬三縣各收成均有十分而泰安武定濮莒四州為尤盛總之今嵗秋收豐稔實出人望想之外比往常大有之年更為倍獲此皆仰賴皇上至誠昭格上天默佑是以雨𤾉時若年穀順成臻此極隆極盛臣不勝歡慶感頌之至所有河東二省核確實在收成分數謹繕摺恭奏仰慰聖懷至黃河南北兩岸堤工霜降已過水勢減落堤掃工程俱各平穩合并奏聞謹奏以手加額覽焉今嵗直隸豫東三省秋成實係望外之豐乃上天非常嘉貺大造洪恩我君臣當愈加感戴倍增敬畏也同日又奏為仰懇天恩解任調飬事竊臣一介庸愚仰䝉皇上畀以總督重任節制兩省封疆惟因才不副職是以日夜靡寧心力俱瘁而年齒亦衰自微臣報主之心而言即一息尚存不容少懈而自皇上封疆之大而言當量力引退以讓賢能是以上年春間瀝血陳請得䝉天恩解任進京調治疊荷恩賜旋即痊愈從此有生之年皆皇上再造之日也回任後正圖竭力報效以殫愚忠不謂今年四月間感冒風寒旋轉痢疾直至六月方得漸就痊可隨於八月內入闈監臨文場至九月初一日出榜回署無如身體虛弱現在加意調飬日服參苓仍不能補足氣血復原如舊轉瞬武闈即屆天氣就寒臣自揣微軀恐不能力疾從事致誤大典是以據實奏請仰祈聖恩允臣解任調治俟明年春融由水路進京仰覲天顔跪聆聖訓至河東總督原係奉㫖後不為例臣解任後自當將欽給總督關防封送繳部仍祈敕部將河南巡撫關防齎發來豫臣查副總河孫國璽在豫半年小心勤慎堪以暫署河南巡撫印務庶不致任意更張故為紛易臣性戅直又復孤介自持十年以來䝉皇上擢用之恩猶為人之所同而䝉皇上保全之恩惟有臣身所獨今以衰病日侵遽行求退犬馬戀主之私不覺情溢乎詞淚盈於楮容臣專心調攝倘得邀聖恩日就痊愈則臣之仰圖報效正自有日矣謹繕摺奏請伏乞皇上睿鑒訓示如䝉俞允臣遵即循例具題請㫖敕部施行為此謹奏覽卿解任之請深用悵然另有諭㫖交大學士轉發同日又奏為冒昧籲請天恩仰祈睿鑒事竊臣上年在京時荷䝉聖恩賞臣瓊玉寶膏臣朝夕服食消痰止嗽甚有效益前䝉恩賜巳為逾分何敢再行瀆請但臣犬馬微軀素䝉聖慈顧復不揣冒昧仰懇天恩再賞臣一服未審此膏原方可否并賜與臣得以如法修合終身服食并求皇上訓示臣不勝感激籲懇之至謹奏瓊玉膏既云有效則不宜間斷今併原方賜來如法修製頻頻服之可也雍正十年九月十八日河東總督臣田文鏡山東巡撫臣嶽濬謹奏為遵㫖㑹商據實奏參仰祈睿鑒事雍正十年八月二十九日臣等據山東按察使唐綏祖鈔録皇上硃批該司摺奏敬陳管見事一案諭㫖與督撫商酌㑹同奏請欽此臣等伏查積貯米穀關係綦重夫既於需賑不敷之時籲請截留豈不當於既賑有餘之際經營善後乃布政司不為之查議而具詳臣等身為督撫不為之核實而具奏直待按察司密摺奏聞臣等與布政司所司何事方將引過請罪之不遑而尚敢歸議於該司奏請之未是乎皇上不即據其所請而俞允特令臣等商酌㑹奏仰見至聖至明早有以知該司之所奏未必盡然而臣等之坐視南漕不為乘時料理者未必無據如果宜急糶易穀該司與臣等共事巳久何難徑與臣等商酌且與撫臣同城晨夕相見更易於進言何必密為奏請彼固知南漕之宜暫存而不宜急糶係臣等飭行各屬遵照在案自不便再向臣等商請是以舍臣等而冒昧具奏彼其意不過欲取悅於愁黴懼爛之屬員而沽名邀譽於一時耳臣查東省現在應買之穀皇恩有加無巳等事案內除雍正九年改徴漕穀抵補外尚有未買穀一百三十六萬八百三十石零又查明府倉等事案內未買穀二十三萬六千二百四十二石零一年不能俱行買足於壬子癸丑兩年各半分買經部覆准在案此外又有應買平糶虧空各項穀共四萬四千三百一十六石則是今嵗秋穀雖屬豐收而民間元氣未復本年應買之穀共八十四萬二千九百餘石之多何可復行採買以致穀少價昻有礙民食是斷斷不可糶漕易穀也況秋收既豐民間各有新糧食用市上雜糧亦多南漕大米巳難出糶該司欲於今嵗糶漕即於今嵗易穀為日不足言何貿貿即此巳可見該司之不學無術也臣查南漕之在東省夲非無用之物而該司因賑恤有餘恐致纍手鰓鰓過慮冒昧瀆奏任意更張不可不請㫖創懲以為妄奏者戒臣近於京報中伏讀上諭知江南地方又於七月十六日夜海潮湧溢被淹敕令江南總督誠心撫綏無使流離失所至於今冬冰雪嚴寒之際明春青黃不接之時敕令預為籌畫資其生計臣查江南自雍正八年被淹䝉皇上天恩特施賑救動用帑金數十萬兩各項倉糧數百萬石猶恐不敷特㫖允准浙江總督李衛奏請將浙米運至江南山東二省分截備賑在案今甫隔一年又被水患臣恐南省倉貯一年之內未必即能充實莫若循照督臣李衛運賑鄰省之例即將東省截留南米仍運回江南備賑從德州臨清張秋濟寧等處水次連檣而下挽運甚易并請照王􅕵隋人鵬之例將唐綏祖暫解按察司任即將該司所請二十萬石南漕令其雇覓船隻運至江南交與督撫布政司或散賑或平糶以濟民食事竣仍回原任再南漕係大米更為南人所宜如此一轉移間而在東不致久貯為纍既可邀譽於同官在南又得有大米資生更可市恩於桑梓諒亦為該司所願并可以不必計及倉厫之有無也緣係奉㫖商酌㑹奏事理臣等謹合詞具奏伏乞皇上睿鑒訓示施行為此謹奏此項漕米照該督撫所請行雍正十年十月初十日河東總督臣田文鏡謹奏恭請皇上聖安朕躬甚安今嵗以來覺健爽倍常此皆荷䝉上天聖祖眷佑所致實為過望卿體佳善否同日又奏為恭謝天恩事竊臣前以瓊玉膏消痰止嗽是以冒昧籲請并求原方仰䝉皇上天恩膏方竝錫并賞臣既濟寶丹此丹前䝉恩賜臣服食以來微覺精神增益今又䝉賞給凡斯上方仙藥臣祗領之下實欣幸過望隨恭設香案望闕叩頭恭謝天恩所有微臣感激私忱謹繕摺奏謝為此謹奏既濟丹朕現今日服無間考其性不涉寒熱溫涼徵其效亦不在攻治疾病惟補益元氣是乃專功卿服食將完時具摺奏請更當續賜同日又奏為恭謝天恩事雍正十年十月初一日臣齎摺家人捧回臣奏請解任調理摺內欽奉皇上硃批覽卿解任之請深用悵然另有諭㫖交大學士轉發欽此竝接大學士臣張廷玉字內開欽奉諭㫖河東總督事務朕巳降㫖令孫國璽協助田文鏡辦理其總督衙門飬廉之項著田文鏡酌分數千金與孫國璽合之副總河之飬廉期於敷用而巳其餘仍留為田文鏡之用度欽此又於十月初四日准吏部咨欽奉諭㫖田文鏡著在任調攝不必懇請辭退孫國璽以副總河協助田文鏡辦理總督事務凡似監場等事著委任代理欽此欽遵臣即恭設香案望闕叩頭恭謝天恩竝遵㫖令副河臣孫國璽考試武闈外伏念臣一介庸愚仰䝉皇上簡畀封疆節制兩省隆恩疊錫固巳浩蕩而靡涯殊眷頻加更復保全而備篤臣犬馬圖報之心早巳矢諸身世之久當此未填溝壑之日正為少盡涓埃之時何敢引退求閒自圖暇逸無如年齒益而疾痛時纒血氣衰而參苓少效甫奮興於感激之下旋恐怖於力疾之餘是以據實陳情懇請解任乃䝉溫㫖褒嘉恩綸諄􅋀仍令臣在任調攝以副河臣孫國璽協助臣辦理總督事務更以凡似武闈等事著臣委任代理且酌分飬廉仍留為臣之用度協辦則收臂指之助代理則免行走之勞聖恩之體恤甚周聖心之籌畫更至臣自揣微軀恐究不能膺斯重任然而既䝉恩諭又何敢於惜此餘生惟有殫心竭力以圖仰報皇上天恩於萬一也所有微臣感激私忱除恭疏題謝外謹繕摺具奏伏乞睿鑒謹奏覽卿奏謝知道了卿辦理一切惟宜持其大綱仍以調攝起居為要雍正十年十一月初三日河東總督臣田文鏡謹奏為恭繳硃批仰祈睿鑒事雍正十年十月二十七日臣齎摺家人回豫捧到臣恭請皇上聖安摺內欽奉硃批朕躬甚安今嵗以來覺健爽倍常此皆荷䝉上天聖祖眷佑之所致實為過望卿體佳善否欽此臣跪讀之下不勝歡忭踴躍仰見皇上乾行日健保佑天申天下臣民共戴福壽康寧之聖主於億萬斯年矣又於臣奏謝恩賜既濟丹摺內欽奉硃批既濟丹朕現今日服無間考其性不涉寒熱溫凉徵其效亦不在攻治疾病惟培補元氣是乃専功卿服食將完時具摺奏請更當續賜欽此臣屢䝉恩賜巳屬逾分乃䝉皇上令臣服完時奏請再頒聖恩髙厚實出望外臣自十月初一日起每日服食俟䝉皇上賜發內造鎗一桿錢糧一盒臣隨照式製造五桿令標下兵丁如法試放凖頭有二百步之逺既穩而便實係軍中利器今將原鎗一桿敬謹呈繳合併陳明為此謹奏此鎗造法極宜嚴密勿令匠役傳知外人敷用則已無須多製各營伍倣效製造尤屬不可留意戒飭毋忽雍正十年十一月初六日河東總督臣田文鏡謹奏為據實奏請仰祈睿鑒事雍正十年九月二十四日欽奉上諭河南按察司員缺著南汝道盧焯補授南汝道員缺著汝寧府知府費謙流補授汝寧府知府員缺著總督田文鏡於屬員內㨂選遞行題補欽此欽遵臣查汝寧一府界連湖楚所轄九州縣盜多民悍素稱難治通省開彰懷南四府同知及汝州等七州直隸知州其品級可以題補知府者寥寥無幾殊難㨂選至知縣之中不特品級相懸且多新進之士初試之員更無其人臣查原任湖廣黃州府知府蔣國祥係臣妻胞弟臣深知其為人頗有性氣然心地明白辦事勤謹其前在知府任時惟因各上司仍取餽送是以廉隅不立及督臣楊宗仁到任之後隨巳洗滌肺腸頓改前失臣在河南距黃州不逺知之最確不期仍以貪劣被參此皆伊巳改之舊愆也搜查任所財物甚為有限䝉皇上天恩賞還令其前赴臺站效力自雍正四年至臺至雍正九年撤回在站五年在蔣國祥自知感戴天恩力圖報效又䝉皇上賜復原官令其在內閣學習行走此不特蔣國祥幸出望外即臣亦感激無地何敢復有希冀然其人未老其才尚屬可用正當竭蹶犬馬以報天恩內舉不避親臣不敢仰企前芳然以人事君之道臣所素知臣又何敢因係妻弟私嫌遂致隱默可否即將蔣國祥補授汝寧府知府臣不揣冒昧奏請聖鑒倘䝉俞允彼到任後不圖報效慎矢清操臣即離去河南彼斷難瞞臣知覺臣一有所聞立即奏參亦不敢因係妻弟而稍為寬徇也臣無任悚惶待命之至為此謹奏照所請有㫖諭部矣蔣國祥到任後卿其再三朂勵令其改絃易轍勉為良吏以蓋前愆同日又奏為據實陳請再懇聖恩解任調養事竊臣前因久病未痊又值武闈考試奏請解任荷䝉恩㫖令臣在任調攝復命副河臣孫國璽協助辦理聖恩體恤至於此極臣既有孫國璽為之代理協辦自揣稍可支持則在生一日即應圖報一日何敢復請解退自就便安無如臣調理以來又經一月飲食漸减脾氣日虛今於十一月初五日起咳嗽頓發晝夜不息犬馬微軀誠何足惜第兩省封疆任大責巨實非病卧之人所能勝任伏乞皇上俯鑒微忱允臣前奏事理敕部將河南巡撫關防齎發來豫令副河臣孫國璽暫行署理臣一面將欽給總督關防封送􅌳部俾臣解任調治倘得仰邀聖恩日就痊愈容俟明嵗春融進京則瞻天仰聖既得慰微臣戀主之私而暮景餘年尚可竭微臣報國之志也瀝血陳情淚隨聲墮謹再繕摺據實奏請伏乞皇上睿鑒恩允施行臣不勝感激悚惶之至謹奏勉從所請有㫖諭部矣硃批諭㫖卷一百二十六之二十四
