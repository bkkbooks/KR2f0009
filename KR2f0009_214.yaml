body:
  text: 欽定四庫全書硃批諭旨卷二百十四之一硃批郝玉麟奏摺雍正二年正月二十一日雲南提督臣郝玉麟謹奏為奏聞事雍正元年十二月二十一日臣遵奉諭旨酌帶官兵前赴中甸駐劄揚威塞外所有起程日期先經題報在案今於雍正二年正月初六日到中甸喇嘛夷民數百餘人赴營叩見臣示以皇上恩威命臣帶兵到此保固伊等地方至意觀衆百姓感激情形出於誠實而恐懼之狀亦甚其喇嘛頭人臣各重賞紬縀煙茶等物俱歡欣領受散去至初八日千有餘人復來行營呈遞投狀情願歸順天朝隸入版圖呈開戶口名數並將羅卜藏丹津先年給與各頭目之劄付八張投繳行營臣一面令其將地方四至并戶口清册速行查報一面將中甸營官八柱金圭七里等給以外委守僃劄付頭目等給以外委千把總劄付喇嘛給以僧綱司職銜其所繳羅卜藏丹津之偽劄臣當即差送督臣訖查中甸地方前雖招撫因用兵西藏軍務紛繁原未議及歸併今復呈投戶口繳送偽劄則夷民益深向化將來作何安頓俟撤師之後另請睿裁本年正月十七日又準雲貴督臣髙其倬咨稱準兵部咨開總理事務王大臣等會議令提督郝玉麟帶兵二千名前往察木多揚威駐劄其中甸地方亦屬緊要著總督髙其倬於總兵官內選擇一員帶兵五百名替郝玉麟在中甸駐劄等因轉奏奉硃批依議著速行欽此移咨到臣臣查中甸甚屬緊要總兵一員足資彈壓兵丁五百名稍覺單弱臣愚以為中甸須安兵一千名始足以壯軍聲臣觀地理情形由中甸前進六七日至阿墩子地方乃係各處咽喉扼要據險此處須安遊擊一員帶兵五百名駐劄過阿墩子至察木多程途尚逺險要處所頗多必須預僃兵丁五百名臣屣看形勢隨處安設又調麗江土兵二百名通事十名隨營遣用前後照應聲息相通臣即應援西藏而貼近雲南之地方可保無虞再自阿喜至瓦河原有臺站去嵗藏兵撤回已經檄調回營今臣既在察木多駐劄一切軍機皆關緊要必須照舊安設臺站除咨明督撫二臣外並飛催駐劄之總兵速赴中甸臣謹遵部議即日起程前往察木多臣蒙皇上深恩畀以封疆重任今復奉命提兵出塞凡有見聞微臣力所能為惟有竭盡血誠少報主恩於萬一所有臣到中甸情形並奉旨前進調遣官兵緣由合先繕摺奏聞伏乞皇上睿鑒施行謹奏覽所奏一切機宜料理周詳甚屬可嘉朕心深為慰悅爾此番頗著勞績已諭明該部事平之後加恩議敘至西海目今情形大局既定諒從此未必有大費心力之處矣雖然仍須加勉加慎毋忽雍正二年三月二十六日雲南提督臣郝玉麟謹奏為奏聞事雍正二年二月初二日臣遵奉諭旨帶領官兵自中甸起程前赴察木多駐劄揚威先經題報在案臣出口之後即遣人於各處密探賊人信息兹據各處差人陸續回抵軍營稟稱裏塘巴塘喳呀天柱寨察木多等處四川現有官兵駐防地方安靜惟差往擦哇岡之人抵營密探得擦哇岡一帶有西海之人在奔打常川等處要馬匹硝磺鉛子等物并據達賴喇嘛差至擦哇岡辦事頭人哈浪巴暨營官順巴等專差投到番稟臣譯出內稱正月二十五日有西海差人一名札石到奔打要奪奔打地方大話恐嚇百姓説青草出時西海有兵前來番民甚是恐懼望大兵速進等語臣因擦哇岡係進藏要路此處原無官兵駐劄與西海相通羅卜藏丹津遣人由此路出來探聼軍情此必有之事臣隨即派撥漢土官兵先命遊擊李君賢等密示以擒拿賊人之法飭令兼程前往臣帶領大兵尾隨趲程而行及抵阿墩子地方接奉大將軍年羮堯令諭西寧大兵三次殺敗賊衆今探聞羅卜藏丹津遁藏敖拉木葫蘆若大兵進𠞰便欲逃入西藏命臣四處探訪如遇西海諸賊欲逃入西藏者即當截𠞰等因奉此臣已知擦哇岡奔打一帶現有賊人是以兼程而進賊人不虞大兵驟至逃遁不及於三月初七初九等日在擦哇岡拏獲姦細賊人結松翁布等四名於巴樹地方拏獲賊人扎石等三名於處扎地方拏獲賊人托各司哈等六名以上共拏獲十三名臣逐一嚴訊詰松翁布扎石布幾托各司哈托賴波羅阿麻秃敦魯汪雕等九名俱係西海遣來探聼軍情煽惑番夷之人臣詢明之日即將該犯等於擦哇岡正法示衆至披得阿幾阿前楚凶等四名臣逐一嚴查細詢實係本處之人因扎石等到此地方跟隨伺候原非同謀準其保釋再臣統領大兵一路揚威逺近聞風畏懼奔打至薄須常川一帶地方有四百餘里其間黑帳房之人向服西海管轄今聞臣到擦哇岡甚是恐懼疑惑臣乘機先遣人前往宣揚我皇上聖德神功中外一體之至意該夷民等喜懼交集有木魯巴墩地方頭人素囊工波常川中地方頭人奔特之倉竹墨巴工卡地方頭人彌納等赴營叩見咸稱情願投順天朝臣隨命開造戶口數目據開四至人數共五百五十三戶又據巴樹地方喇嘛處丕松并火頭札機等投狀內稱我們原是達賴喇嘛的百姓被西海的人時常出來騷擾正無處告訴苦情今幸大兵到此我們願百年做萬嵗爺的子民等語據開戶口四至喇嘛一百八十名戶口二百一十戶具有投誠番信共四張理合恭呈御覽查現在投誠之各地方向係擦哇岡洛龍宗營官等所管臣仍令其照舊管轄并命守僃李進帶領官兵二百名暫行駐劄彈壓再營官順巴亢者泥實屬盡心出力拏賊深為可嘉臣各加重賞併給牌奬勵外合併奏明所有臣抵擦哇岡拏獲姦細安撫夷民情由謹繕摺專差千總捧齎馳奏伏乞皇上睿鑒施行謹奏覽奏一切料理安撫妥協之至朕深為嘉悅今西海大局已定此後可免枕戈負盾之勞矣去冬值冰凍草枯嚴寒之際諭調出口日期促迫汝及將辨兵丁不知如何辛苦朕每一回思輒軫念不置幸蒙上蒼護祐大功告成不日事竣旋軍永享安間正有日也雍正二年閏四月十三日雲南提督臣郝玉麟謹奏為恭謝天恩事竊臣遵奉諭旨帶領官兵駐劄察木多於四月初三日到汛閏四月初八日據臣齎摺千總回營捧齎到聖主硃批奏摺併欽賜臣孔雀翎子暖帽一頂貂皮二十張克食一匣丸藥一匣御書福字一張又齎到永北鎮總兵官馬會伯回滇時皇上御筆特賜臣糾桓偉略綾匾一幅貂皮八張寧紬三匹又領到恩詔賞賜大縀四聫臣隨率領軍營將僃辨員逺迎跪接捧至駐劄處所恭設香案望闕九叩謝恩訖臣跪讀硃批欽奉溫綸奬勵實切赧惶復蒙賞賜尚方諸物夷漢稱榮旌旗生色臣自問何人膺兹異數感激下忱實難言罄惟有竭盡犬馬血誠以圖仰報髙深於萬一耳為此繕摺奏謝并繳硃批謹奏覽卿奏謝知道了路途窵逺此等奏謝之摺不必特遣人來或乘奏事之便或附題本齎進為是即朕硃批俟積至數件彚繳亦不為遲至若緊要機宜及特旨詢問之事則又當一論也雍正三年四月初三日雲南提督臣郝玉麟謹奏為奏聞駐劄官兵情形上慰聖懷事竊臣仰蒙聖恩帶領官兵二千名駐劄察木多迄今一載屢蒙皇上垂念將辨兵丁頻加恩賞官兵莫不感激思奮臣思駐劄官兵月有口糧鹽菜察木多食物價值雖貴兵丁關支折給鹽菜亦足日用惟餧飬馬匹草料出産無多未免價昻臣與督撫二臣商酌接濟上年十二月督臣髙其倬撫臣楊名時布政使臣李衛仰體皇上愛恤官兵之至意自臣以下或製送皮衣或捐給銀兩每兵各賞皮衣一件差員押解軍營散給今年三月又解幫臣盤費銀一千兩參將遊守千把各幫銀六十四十二十十餘兩不等漢土兵丁每名又賞銀二兩官兵飽食暖衣人人自勵踴躍歡欣臣恐上厪聖懷理合繕摺奏聞謹奏所奏知道了朕仍另有殊恩髙其倬等原係實心任事之臣皆朕素所洞悉者奉旨薦舉一摺留中同日又奏為營伍務在得人人材宜加鼓勵妄陳末議仰請睿裁事竊查雲南地界極邊民夷雜處武職雖無刑名錢榖之責然必須熟悉地理情形諳練營務之員方能和輯兵民整肅營伍我皇上眀並日月滇省副參遊擊員缺特允原任提臣張國梁越銜題補之請邉徼武臣人思奮勵惟是守僃一缺荷蒙聖恩揀選年滿千總分發補用末職微辨仰煩聖慮自必矢竭犬馬以圖報效但滇省自用兵以來現任營千把總人人用命有駐藏經年出口數次各處邉情知之最悉者倘及時收用則人地相宜即表率之官亦得收臂指之效臣愚以為揀選之千總固所當用而營中之千總亦須間補請嗣後滇省有守僃缺出先補揀選千總一員後補營千總一員臣與督撫二臣會疏保題令該辨隨本引見倘邀俞允則邉地得人而士卒辨目人人感激思奮矣是否有當伏乞皇上批示遵行謹奏此奏甚屬可嘉已有旨諭部矣雍正三年八月二十二日雲南提督臣郝玉麟謹奏為奏聞事竊臣帶領漢土官兵二千餘員名駐劄察木多揚威策應隨遣將僃辨兵於各地方不時遊巡查訪於雍正三年正月初九日據臣遣永北鎮千總張文逺遊巡蒙古揭雜處卡地方回營稟稱一路畨民各皆安靜有西海所屬覓食蒙古男婦七八十人住在蒙古揭雜處卡彼地頭人正欲帶領前赴察木多投順天朝適遇千總遊巡一同帶領頭目二人來營臣隨詢問何人部落二人名字據稟是丹仲部落因屬年八月內羅卜藏丹津與竹囊打仗差兩箇官帶兵把我們一千家百姓裹來粟魯木地方住著被裹百姓俱各四散我們二十多家百姓因沒騎馱的牲口就在粟魯木地方住下屬龍年十二月有雜處卡的人看見我們説如今察木多到了一箇大官呌作提督在那裏安撫地方你們為甚麼不去投我們聼見隨跟著他到雜處卡男人四十名女人四十一口我們是窮百姓只求做主永逺做萬嵗爺的百姓名字一箇呌卡特之一箇呌敦住等語臣詢問確實隨重加犒賞命蒙古揭雜處卡頭人將卡特之等男婦暫行看管一面報明大將軍年羮堯作何安插去後四月二十七日準年羮堯咨覆內開丹仲所遺部落現有在松潘口外住牧者應令同歸一處已咨四川撫院酌捐盤費銀兩將卡特之敦住男婦俟青草茂盛之時令其速回松潘口外與丹仲所遺部落一同住牧移覆到臣臣於五月二十二日派委營辨多給銀兩帶兵三十名將卡特之等男婦趁青草茂盛之時押送起程往松潘口外與丹仲所遺部落一同住牧訖續於八月初四日據差辨帶兵回抵軍營稟稱已將卡特之等送到彼處取有地方頭人密岡處之收明信子等語今八月初六日準駐藏松潘鎮總兵官周瑛移咨於七月二十九日自藏起程赴察木多臣俟周瑛一到即帶兵由乍丫巴塘一帶地方會勘地界所有臣在察木多料理遣回卡特之等并地方寧靜緣由謹繕摺奏明伏乞皇上睿鑒施行謹奏覽所奏料理甚屬得當知道了至查勘地界一事須悉心籌畫務期行之久逺萬全無礙方好周瑛到時與之和衷盡力辦理可也雍正三年十二月初二日雲南提督臣郝玉麟謹奏為奏眀事竊臣遵奉諭旨會同周瑛踏勘地界臣與四川提臣周瑛會勘得察木多久歸四川自康熙五十九年用兵西藏以來川省駐防官兵一切挽運夫馬畨民甚是馴熟且程途離雲南六十餘站離四川五十餘站而附近察木多如擦哇岡洛龍宗類五齊碩般多等處地方亦久屬四川徵收錢糧雲南勢難越界遙為控制即畨民亦復呼應不靈臣與周瑛會議察木多自應仍歸四川方為妥便至臣於雍正二年春奉旨帶兵駐劄察木多揚威協剿西海所屬南稱巴卡索媽蒙古揭畢利并附近小地土畨赴臣營盤投誠計二十七處臣節次造册報眀年羮堯并彚疏題眀在案後奉年羮堯令著臣就近委川滇兩省文武查勘量其逺近秉以至公應歸何省管轄臣隨檄行察木多兩省文武會勘確實去後隨又奉年羮堯令行令奮威將軍嶽鍾琪查眀投誠各地方應歸何省管轄據奮威將軍覆稱南稱巴卡索媽蒙古揭畢利四處俱與四川相近應歸四川至於小地土畨皆係僻壤未經親歷應俟雲貴提督呈覆至日仰請衡奪等因前來臣又據川滇兩省文武會詳內稱會查雜處卡各地方皆與擦哇岡察木多二處相近離雲南之中甸甚逺南稱巴卡四處奮威將軍現議歸川而雜處卡各處與南稱巴卡四處均屬相通卑職等會查各地方俱在察木多之東北西北與察木多相通似應併歸四川庶為畫一等情詳覆到臣臣據情呈報年羮堯在案今臣與周瑛又復會查察木多既歸四川則南稱巴卡并各處小地土畨俱應歸四川便於管轄再乍丫離察木多七站為巴塘裏塘之要路而巴塘裏塘係打箭爐之門戶久入四川版圖今應仍歸川省臣與周瑛親至各地方會勘確實並無異議抑臣與周瑛再查中甸貼近雲南而阿墩子為中甸之門戶其宗喇普為西奔子欄等處又皆與中甸相通應俱歸雲南實為近便易於管轄臣與提臣周瑛會查眀白隨連銜具文移咨川陕督臣嶽鍾琪雲貴督臣髙其倬應聼兩督臣詳加確商會疏具題今臣已撤兵回署所有奉旨會勘地界理合繕摺繪圖恭呈御覽伏乞睿鑒謹奏朕已降旨於嶽鍾琪命爾等兩省文武會議具奏矣覽爾此奏甚屬妥協大約與嶽鍾琪意見相同同日又奏為微臣戀主情殷恭請陛見仰乞俞允用伸積悃事竊臣一介庸愚荷蒙我皇上特達之知由副將拔至總兵未及一載畀以雲南提督任大責重蚊負堪虞到任後曾經疏請陛見未蒙恩準今臣已由察木多帶兵回署犬馬戀主之心愈深且篤伏乞皇上允臣赴京陛見叩請聖安俾微臣積悃獲伸邉地情形得以面奏臣之踴躍歡忭逈出尋常萬萬也臣無任懇切待命之至為此繕摺奏聞謹奏爾兩年以來勞於國事今暫回滇可且休息數時聼候朕旨況總督蒞任方新地方關係緊要豈宜逺離雍正四年七月十三日雲南提督臣郝玉麟謹奏為恭謝天恩事竊雍正三年十二月十八日臣齎摺千總回署捧到恩賞臣貂皮八張雍正四年三月二十四日臣家人捧到臣恭請陛見一摺回署蒙賜大福字一張臣俱出郊跪迎至署恭設香案望闕九叩謝恩祗領訖伏念臣知識短淺謬荷聖恩畀以重任所辦之事皆關軍務是以繕摺奏聞乃蒙皇上睿照仰邀恩奬復賜珍竒榮寵愈深悚惶倍切惟有竭盡犬馬血誠以報主恩於萬一而已理合繕摺奏謝伏乞睿鑒謹奏覽奏謝知道了觀爾全無漢軍頑劣習氣朕甚嘉之何有多諭但當加勉毋怠雍正五年正月二十四日雲南提督臣郝玉麟謹奏為微臣積悃未伸犬馬戀主益切叩乞聖慈恩淮陛見事竊臣於雍正三年十一月撤兵回任隨具摺叩請陛見荷蒙硃批臣欽遵祗候但臣仰望闕廷又經一載日盼恩綸未蒙下沛我皇上御極已經五載天下文武大小臣工咸得瞻天仰聖而况駑鈍如臣受恩深重如臣且荷萬里巖疆而猶未聆聖訓未請聖安犬馬之私何能自慰今察木多官兵已奉旨回汛滇省時和年豐地方人民樂業督臣鄂爾泰到任已經一載事事仰遵聖訓調劑得宜兵輯民安而臣之積悃未伸即飲食寤寐無時少息伏求我皇上念萬里微臣戀主之心益深且切允臣所請俾臣得恭覲龍顔面聆聖訓臣之踴躍歡忭更出尋常萬萬也臣無任激切待命之至謹奏烏蒙狆苖地方新定兼有安南立界之舉俱係創始之事全賴爾等彈壓綏輯豈可逺離職守且爾之來為欲聆朕訓誨耳督臣鄂爾泰乃朕之股肱心膂深知朕意之人汝但一一聼其指示相與和𠂻共事雖不來京即如聆朕面諭一般內外滿漢文武大臣中鄂爾泰實為目今第一良臣人各具有良心就爾意見以為何如寧不當視為模範而效法之耶汝若能如鄂爾泰之居心以事朕則朕待汝亦必一如待鄂爾泰也設不如是則汝亦不能邀朕如是信任如是恩寵也諸凡務勉一誠字勉之勉之雍正五年三月二十四日雲南提督臣郝玉麟謹奏為鎮沅地方平定首惡俱已就擒夷民漸次復業事竊照鎮沅夷賊勾通威逺猓黑放火焚燒府署殺害印官臣聞報之次即會商雲貴督臣鄂爾泰管巡撫事臣楊名時一面遣發官兵前往擒𠞰先經奏聞在案續據臨沅鎮協等咨報鎮沅惡夷縱火燒官盜放監犯不法已極亟宜四路合兵速行撲滅隨經各路分兵進𠞰先後拏獲賊人七名等因又準臨十四日會合直抵鎮沅賊衆各皆逃散惟革職土府刀瀚之子刀輔宸𢃄領夷目刀沛等十數人迎接查勘城內僅存刀瀚之母數人百姓兩家并兵丁家口八十二名口現兵十四名隨發告示安撫兵官孫𢎞本亦隨抵鎮沅府確查為首逆賊將已經拏獲之刀西眀陶奔歸等嚴加扭鎖禁守行營其未獲之刀如珍等分遣官兵嚴加搜緝業已陸續拏獲移報到臣臣查現在拏獲之要犯已五十餘人脅從餘犯一百餘人其未獲之犯現飭擒拏至劫去之鹽課已追出􅌳官夷民逃避者漸次復業但查元江普洱新平威逺一𢃄地方均係魯魁哀牢山箐向住各種猓賊雖設有土官土目然而撫禦失宜往往焚燒劫掠是以前督臣髙其倬參革威逺土知州刀光煥改土歸流安設文武督臣鄂爾泰到任後亦將鎮逺土府刀瀚等特疏糾參改土設流查威逺鎮沅係新經改土地方猓賊惟以劫殺為生若不趁此擒𠞰地方終難寧靜臣現赴省城與督撫二臣面商凡不法夷猓務盡根株使之懾服斷不肯姑息以貽後患至鎮沅地方題請改土歸流尚未及安營雖撥有汛防兵丁力單不能堵禦是以逆賊敢於狂逞臣與督撫二臣面商善後之計俟酌議安設官兵妥後會疏具題所有地方已經平定賊首悉已就擒緣由理合繕摺奏聞謹奏此事據鄂爾泰亦經奏聞皆因卿等公忠為國有以鼓勵兵辨俾各奮勇報效之所致朕甚嘉悅至一切善後事宜更與督臣悉心籌畫務講求一勞永逸之策而為之可也雍正五年五月二十六日雲南提督臣郝玉麟謹奏為奏明事竊照奔子欄劃分地界喇嘛東珠札什頑梗煽惑情形經臣於雍正四年十一月繕摺奏聞仰蒙皇上至聖至明無微不照雍正五年三月初十日臣蒙兵部劄付內開議政大臣會議得喇嘛東珠扎什甚屬姦詭生事不可留在奔子欄地方應行文管理奔子欄地方官員將東珠扎什拏送四川其郝玉麟料理歸入中甸管轄者甚是作速行文總督嶽鍾琪照依郝玉麟辦理可也等因轉奏奉旨依議欽此欽遵劄行到臣查東珠扎什臣未奉部文之先據雲南駐防阿墩子遊擊報稱奔子欄喇嘛東珠扎什於正月二十二日帶家人已往四川所屬之巴塘去訖臣一面飛咨四川督撫提臣就近查拏并請撥巴塘營官一人來滇管理割歸地方等因移咨去後一面行知駐防奔子欄地方文武并出示曉諭番民四月十四日據雲南委官管理中甸原任劍川州知州楊正輔遊擊顧純祖詳報內稱川省委知州張植守僃張聖學將東珠扎什帶至奔子欄會同傳集奔子欄其宗喇普等處頭人喇嘛番民宣播皇仁眀白開諭化誨頭人喇嘛番民俱各悅服歸滇出具永不滋事甘結并將改歸滇省等處地方勒石定界訖其東珠扎什川省委員接奉川省督撫擒拏赴省之文已將東珠扎什押解成都并撥巴塘營官喇嘛羅藏洛竹移交滇省委員暫行管理割歸滇省之奔子欄等處一帶地方各等情詳報前來臣查東珠扎什已去奔子欄番民又目睹聖諭俱各歡欣鼓舞心悅誠服願歸滇省而兩省委員會勘勒石立界之處亦明晰妥當今巴塘已撥有營官羅藏洛竹來滇仍舊管轄各地方則邊地自可永逺乂安矣所有疆界分定夷民悅服情形理合繕摺奏聞伏乞皇上睿鑒施行謹奏據奏川滇兩省立界明晰欣悅覽之善後事宜全賴用得其人慎之毋忽雍正五年八月初十日雲南提督臣郝玉麟謹奏為密陳安南情形仰祈睿鑒事竊惟安南一國自本朝定鼎以後首先歸順臣服近因立界鉛厰河該國王心懷怨望檢查志典開化府之馬鞍山賭咒河一帶離府治二百四十餘里原係天朝疆土今安南私侵一百二十里我皇上厚德深仁念彼國王恭順有年止立界於四十里之鉛厰河實懷逺綏柔至意該國王理應感戴聖恩益加敬謹不謂執迷不悟督臣鄂爾泰反覆開導猶未猛省昨頒發諭旨督臣差員送至開化府總兵臣南天祥差員齎赴鉛厰關前往都龍令守關土目迎接該土目黃文綏不即恭迎據稱馳報國王修寬大路然後迎接等語臣思安南偏僻一區何敢慢違或係土目不明大義彼國王竟未及知亦未可定果如土目所言兩月為期敬謹來迎聖旨臣又何言設延捱日久總不接旨國體攸關臣等身任封疆實難隱忍擬即請旨興師問罪今臣赴省會審與督臣鄂爾泰反覆詳細籌畫興師動衆事關重大莫若再行曉諭開其自新不動兵戈此為上策倘彼終始執迷則必須覆其巢穴以為不臣者戒查進兵大路一由廣東一由廣西一由雲南蒙自開化等處如果動兵必合三省之師會𠞰彼國分兵牽制勢必瓦解臣與督臣密籌飭令開化鎮臣南天祥整僃兵馬不時探聼動靜察其虛實議督標提標各僃兵一千名於各鎮協營挑備兵馬共成一萬再僃土練三千派臨元鎮臣孫𢎞本鶴慶鎮臣張耀祖分兵管領議臣督率統領由開化一路進兵貴州議僃兵五千派安籠鎮臣蔡成貴管領督臣鄂爾泰駐劄適中地方節制調度合數省之兵威而滅此小醜實有不難也臣查鉛厰河立界之處離都龍關不逺各處隘口甚多臣與督臣商酌必須親往查勘險易情形臣現在輕騎減從潛赴蒙自開化邊界審視閲看設或用兵則凡相通隘口皆當堵塞防僃未雨綢繆臣等身荷重寄敢不謹慎或探有情形另行奏聞外謹繕摺專差標員捧齎馳奏伏乞睿鑒裁示遵行謹奏未雨綢繆僃而不用則可興師問罪之舉朕意不然另有旨諭鄂爾泰矣雍正五年九月十六日雲南提督臣郝玉麟謹奏為勘明邉界情形仰祈睿鑒事竊惟安南不即恭迎諭旨臣於雍正五年八月初十日密陳彼國情形并預僃兵馬聲眀前往開化蒙自邉界審視閲看緣由繕摺奏聞臣即於是日起程於十六日到鉛厰關查得沿邉一帶關隘塘汛俱極嚴密民人安堵禾稻豐茂無比臣嚴諭守汛辨兵巡查毋懈又至臨安府所屬蒙自縣地方察看明晰於本月二十六日兼程回至雲南省城見督臣鄂爾泰僃述一帶情形隨據密探人役稟報彼國並無多兵聞天朝有僃兵之説甚是惶懼臣與鄂爾泰復加斟酌又經推誠曉諭宣布皇上聖德神威飛行開化鎮守關守僃楊顯珍傳諭去訖今於九月初八日據守僃楊顯珍稟報據安南宣光鎮土目黃文綏稟稱本月初一日夜奉本國王回音內云天朝覆載為心海涵其量本國王一心恭順始終不渝今聞天旨當委副都指揮使陳德厚就交界處齊整跪接迎領等語轉稟到臣等督臣鄂爾泰隨飛諭開化鎮臣南天祥守僃楊顯珍傳諭土目陳德厚等務須恭設儀仗敬謹祗迎臣細閲該國王回音詞語懇切上凛天威仰懷聖德實有悔艾輸誠之意所有臣勘眀邉界情形并據報該國王迎領諭旨回音恐厪聖懷謹先繕摺奏聞謹奏朕惟恐因此啓釁致生事端則國家有欲罷不能之勢今覽所奏朕懷深為慰悅矣雍正五年九月十七日雲南提督臣郝玉麟謹奏為奏聞事竊臣於本年六月奉旨會審鎮沅逆犯一案自大理府起程歷趙州雲南縣并楚雄廣通等處至雲南省城雨水調勻禾苖豐盛固已心慶有秋及至雲省屣勘開化之鉛厰關所至宜良路南彌勒阿彌臨安蒙自建水江川通海晉寧呈貢各府州縣正在收穫之際親見禾稻茂盛無比及自開化回省據臣標中軍參將稟稱大理府先農壇所植稻榖并民田禾苖有二穗三穗之異旋據大理府知府陳克復將二穗三穗禾稻呈送督撫二臣臣共相觀看慶喜非常并據鄂爾泰云今年通省田稻二穗三穗不止大理一處臣恭遇昌時欣逢嘉異不勝踴躍歡忭之至事關地方嘉禾呈瑞情形臣謹繕摺奏聞伏乞皇上睿鑒謹奏覽收穫情形洵可為滇民稱慶也雍正五年十一月二十一日雲南提督臣郝玉麟謹奏為飛報安南國迎請敇書事雍正五年十一月十九日據開化鎮臣南天祥咨稱雍正五年十一月初七日據本標署理中軍遊擊王無黨右營守備楊顯珍等稟報本月初六日午時安南國王差工部右侍郎阮仲義翰林院待制阮逢時前來迎請敇旨口稱本國備員外藩世沐天朝太平洪福身受聖主懷柔重恩鄂部堂控馭嚴仁撫提大人輯睦周摰鎮帥整綏兼施以故中外肅清邊隅寧謐今蒙皇上特賜敇書仰見聖主大造為心萬物一體本國君臣黎庶何幸邀此遴遣陪臣小吏敬備龍亭儀仗結隊出關恭迎聖旨是日午刻安南國工部右侍郎阮仲義翰林院待制阮逢時率領外郎土目六十餘人交兵三百餘名俯伏關前三跪九叩山呼萬嵗鼓樂彩旌迎進都龍關齎赴宜京等因除具文呈報督部院外相應咨報同日又準督臣鄂爾泰咨同前事並停止備兵緣由各等因移咨到臣竊照安南立界一事我皇上懷柔逺人特賜敇諭彼國即應敬謹迎領乃敢遲延時日國體攸關是以督臣商酌備兵臣復潛往各處要隘細察情形彼國土目人等覘知備兵之舉恐懼疑惑隨據守關守備楊顯珍稟報該國土目黃文綏奉國王回音差委都指揮陳德厚就交界處齊整迎領並呈送差員接旨印文情由經臣於九月十六日繕摺奏聞嗣於十一月二十二日接督臣鄂爾泰録示皇上密旨又奉硃批臣摺未雨綢繆備而不用則可興師問罪之舉朕意不然另有旨諭鄂爾泰矣欽此欽遵臣跪讀之下益見我皇上聖明逺照寬大之恩天地同量臣逐一誦記於心不敢稍有孟浪今據開化鎮臣南天祥咨報安南國另差工部侍郎阮仲義翰林院待制阮逢時等於十一月初六日迎領敇旨該國君臣感激聖主天恩詞語甚是懇切總皆我皇上德威普被海隅日出之鄉無不沐浴聖化仰戴生成臣蒙聖恩膺兹重寄惟有事事小心以盡職守仰報聖主於萬一耳所有安南國差員接旨日期理合繕摺奏聞伏乞皇上睿鑒施行謹奏綏服外夷逺藩理應如是但此事該國王遵奉領旨後朕尚另有諭旨雍正六年二月二十二日雲南提督臣郝玉麟謹奏為奏聞事竊照茶山所屬地方袤延千有餘里一帶夷民名曰窩泥性極凶悍且與􅟱址莽子老撾等國地界相連聲息可通倚為援護罔知法紀截劫客商以及拒捕傷害官兵等事毫無顧忌上年九月十八日把總王朝選帶兵捕拏惡夷麻布朋等竟被傷害督臣鄂爾泰就近調遣漢土官兵奮勇進𠞰臣一面移行飛速前進一面選差解送藤牌火器等項星赴軍前調景蒙營千總李萬春趕赴臨元鎮總兵孫𢎞本營盤聽候調遣復差幹辨目兵接踵偵探陸續據報此番進𠞰之官辨兵丁人人奮勇爭先殺賊衆夷見官兵勢大俱各哀懇投誠首賊麻布朋并伊妻子媳三名口業經拏獲其逸賊克者老二及逆黨等獲日再報各等情通報前來臣復密移總兵孫𢎞本并行副將張應宗參將邱名揚務將逸賊克者老二拏獲其餘安分守法夷民悉加安撫令其各安生業外臣思茶山界連外國逆夷肆行不法仰仗皇上天威督臣鄂爾泰調度咸宜目今大局已定然必圖善後之策邉境始得永逺寧謐臣因接奉部文奉旨雲南派兵三千進藏隨於本年正月初一日到省與督撫二人會議即與鄂爾泰面商茶山事宜細加斟酌彼地疆界形勢以及險要隘口分布汛防應否改設郡縣必使頑梗夷民得沐聖朝治化湔改舊習始為久安長治之計督臣語臣擬親自前往因西藏軍務囑臣親行查勘督臣一面奏土司頭人以及夷民百姓宣布皇仁并分别賞犒伊等俱各俯首歡呼臣細察夷情甚屬淳朴一路田地亦多膏腴即順便訪問茶山大局據稱茶山地方甚屬遼濶每年所産普茶不下百萬餘斤鹽米牲畜俱係本地出産價值頗賤民人食用俱足等語臣今於二十一日已抵普洱距茶山地方六站俟到彼查明周圍險要各處地方確實情形作何分布營汛并應否設立郡縣之處容臣會同督臣鄂爾泰定議具奏所有官兵擒𠞰窩泥情形及臣起程日期并一路新設府縣地方夷情理合一併繕摺奏聞伏乞皇上睿鑒施行謹奏覽奏知道了此畨在事官兵赤心報效奮勇爭先甚屬可嘉但善後之策尤為緊要務須綏輯得法方收一勞永逸之效全賴卿等慎重詳悉籌畫而為之如鎮雄烏蒙皆緣措置失宜委用不當所以致生事端當為前車之戒慎之毋忽雍正六年四月二十日雲南提督臣郝玉麟謹奏為勘明茶山情形並獲要犯緣由仰祈睿鑒事竊照茶山窩泥不法一事臣於本年二月二十二日業將官兵擒𠞰窩泥情形及臣親往其地查勘要隘起程日期一併繕摺具奏臣自省起程曾經督臣鄂爾泰密囑車里土舍刀正彥姦險狡詐煽惑窩泥務須設法擒拏以安百姓以靖地方臣隨兼程到倚邦行營詢之總兵孫𢎞本云刀正彥狡詐百端屢調不出昨已遣發官兵指稱搜拏賊黨稽查地方以便相機擒拏該犯心虛膽怯聞官兵有渡江之信即行潛逃臣查車里緊接莽子等國逃竄至彼將為後患隨一面寫譯緬字鈐蓋印信行文莽子老撾等國不許容留務須協力擒拏并嚴飭軍前將辨務將該犯擒解又一面調集宣慰司刀金寶并土目夷民人等齊赴軍營陳設兵威宣揚聖主恩德莫不感畏踴躍俯首嚮化其在事兵丁俱屬出力臣亦逐加犒勞即直進九龍江宣慰司地方自思茅茶山至此夷民所往皆係竹樓名曰掌子江形亦不甚寬然內外界限劃然攸分也臣到江上時訪聞莽撾等外國其一種恭順畏懼之狀不能言喻此皆我皇上德威逺被是以邉徼夷民莫不咸遵法紀也臣因刀正彥尚未擒獲隨又至橄欖壩該犯所居之地察訪蹤迹實因外國不敢容留奔逃無路乃於三月初八日據副將張應宗等報稱千總陳安邦等於三月初四日在孟臘地方已生擒刀正彥并伊子二名義子一名隨從五名將次解到臣恐途中或有疏虞隨諭遊擊祝希堯督兵護解行營嚴令官兵加謹押解赴省訖臣另由猛崙慢林蠻磚等處復至倚邦普逺猛旺他箐思茅普洱元江一帶細勘回省臣查車里茶山地方普洱思茅是其咽喉九龍江橄欖壩乃係邉界藩籬緊接莽子界址更有慢達等處五渡口在在關係緊要且一帶夷民依附心切幅員甚屬遼濶宣慰司刀金寶實實不能兼顧管理况地方所産普茶之外并有鹽井厰務必須劃明界址布置全局安設文武彈壓治理則頑蠢可化淳良邉疆永獲寧謐矣至於一切應行事宜督臣與臣復委大理府同知佟世廕等前往悉心查明俟回覆到日臣等從長再加商酌妥協另疏會題外所有臣勘明要隘形勢以及生擒刀正彥緣由謹繕摺奏聞伏乞皇上睿鑒施行謹奏此一事實緣爾布置有方所以凶苗不致漏網甚屬可嘉前於鄂爾泰奏到時朕已有旨諭部矣同日又奏為據實陳明事雍正六年二月初六日臣接督臣鄂爾泰咨為前任鎮臣等事雍正六年正月十七日準兵部咨雲南鶴麗總兵官張耀祖奏稱原任鶴麗總兵官趙坤帶兵進藏曾代兵借過軍需銀一萬一千九百三十三兩五錢恭遇恩詔豁免此內趙坤侵蝕銀四千三百二十兩再查得回師兵丁找攴司庫錢糧內趙坤又用銀四千五百兩又跟役長支折給口糧銀六百二十六兩零今既查實理合奏明將趙坤侵蝕過銀兩仰請敇諭追還滇庫等因咨會到臣臣細檢前案逐一察訪查得此內情節原任鶴麗鎮臣趙坤代兵借過銀一萬一千九百三十三兩五錢內趙坤用銀二千兩遊擊李君賢用銀八百兩守備張有義用銀五百兩千總施善元何元李遇春李成林陳尚義楊從林孫成宗七員每員用銀二百五十兩共一千七百五十兩通共用銀五千五十兩查此項銀兩實係官借原與兵丁無涉不在豁免之內自應追出還庫不應給發兵丁至張耀祖奏稱回師兵丁找支司庫錢糧內趙坤又用銀四千五百兩一項臣訪此項銀兩為造報進藏功加部費之用前任永北鎮標遊擊南天祥鶴麗鎮標遊擊王之臣原議鶴麗鎮出銀四千兩永北鎮出銀二千兩麗江土府出銀一千兩共銀七千兩除在省備禮使用及鶴永二鎮差員人役盤費等項共去銀二千兩其餘五千兩係原任永北鎮千總楊洪緒帶往四川陕西同鶴麗鎮差役用銀五百兩交提督嶽鍾琪銀四千五百兩作部費使用臣訪查前後情節如此除咨覆督臣鄂爾泰聼候查追定議具題外謹將查明情由據實奏聞伏乞皇上睿鑒施行謹奏此事據鄂爾泰備悉奏聞朕經有旨明白指示令其料理完結矣雍正六年五月十九日雲南提督臣郝玉麟謹奏為奏聞事竊照烏蒙所屬大關米貼等處界連四川巴布涼山所關緊要先經督臣鄂爾泰確訪險隘情形會同臣等悉心酌議建設文武各官調撥兵丁分布駐防合詞具題在案詎有祿永孝之妻陸氏干犯憲典抗不服拘因委副將郭夀域帶兵捕拏該將輕忽大意致被勾通夷賊傷害官兵臣聞報之際不勝憤恨因茶山公事未竣不得分身赴省嗣準督臣咨開飛遣滇黔兩省漢土官兵並照會四川建昌鎮星馳會𠞰合疏題明臣茶山事竣回省密差目兵分頭前至軍前探聼確情飛報隨據鶴麗鎮臣張耀祖咨稱統兵由左路前進先奪其險要於四月初一日大兵至米貼劄營賊已逃去初二日擒獲土人一名訊問陸氏下落據稱陸氏同賊首立之戶吞逃往井底欲奔􅋭上而􅋭上猓賊堅拒不容上􅋭遂踞住擂石臺該鎮遣兵從後山而上鎗炮齊施殺傷夷賊六十二名餘賊棄關而逃即於初三日遣遊擊等官分路飛攻井底於四月初七日同右路參將哈元生會合一日連破三􅋭直搗門坎􅋭賊巢圍困攻打陸氏堅守關隘不期哈參將率領官兵從後路潛上猓賊驚竄陸氏同衆滚箐而逃哈參將已派撥官兵極力搜𠞰本鎮又加飭催毋使脫但查黔省地界止至米貼而井底吞都門坎山乃四川地界呈請咨行四川嚴飭轉行堵禦等因又據哈元生擒獲川省德昌土司主文梁嘉楷即羅美山訊供德昌千戶幫陸氏夷兵二百名明係黨惡呈請移咨川省嚴拏究治等語當經督臣鄂爾泰一併飛咨川省去訖臣於本月十八日準督臣鄂爾泰咨據貴州威寧鎮呈報準鶴麗鎮咨開本年五月初一日有夷人阿母及到營稟稱五月初一日五更時分賊首水牛母機到夷人攴歪那租家要糧食被小的將伊捆拏追問陸氏下落説在硐裡藏著小的隨帶家人十名跟著水牛母機去拏陸氏果然在石硐跟隨賊人四五名被小的拏獲二名滚箐三名小的上前將陸氏拏獲交給官兵解赴行營拘禁本職隨賞給阿母及銀五十兩跟隨協拏陸氏夷人銀十二兩以示鼓勵等緣由具報又經督臣飛行在事鎮將等官竭力搜捕務將德昌立之戶吞等一干賊黨即行𠞰擒以盡根株等因移咨到臣並據臣所差目兵星夜赴榆面稟前情據此臣查陸氏女流何敢頑梗至此皆藉四川土司德昌黨護并通涼山巴布夷賊干犯法紀今陸氏已經拏獲賊黨不日成擒目前事局漸次底定善後之圖必須籌畫臣在省會同督臣細加商酌黔省米貼已議安設官兵或再量行添設自可無虞由江外直達建昌一路川省並無營汛聲勢隔絶恐此猓賊終屬頑梗必須將川省接壤黔省米貼等處安設塘汛官兵使內外聲勢聨絡則川黔地方俱獲寧謐已經督臣劄商建昌鎮臣趙孺俟其回覆到日咨商川省督撫提諸臣臣等當再加酌議請旨定奪所有官兵進𠞰米貼及拏獲陸氏緣由謹繕摺奏聞伏乞睿鑒謹奏所奏以上事情朕業已早聞川省亦據奏稱米貼接壤之不法凶苖如雷波德昌等土司當及時𠞰撫以圖善後朕經有旨命川提黃廷桂親往調遣料理矣雍正六年九月初四日雲南提督臣郝玉麟謹奏為稟報事雍正六年八月初八日據駐防攸樂茶山普威營參將邱名揚稟稱本年七月二十二日據駐防橄欖壩百總差兵楊顯明同客民劉之芳等赴卑職營盤稟報有刀正彥向日管轄之擺夷暨緬寺和尚於二十一日夜裏放火將客民草房燒著風急火猛沿燒刀正彥原住大樓致傷看守兵丁擺夷聚集多人特來稟報等情卑職竊思橄欖壩乃緊要之地逆夷如此不法應須預備隨整頓本營兵馬並分調各茶山火頭堵禦防範去訖陸茶山地方俱各安帖寧靜據此先於本月初一日據駐劄思茅臨元鎮總兵孫𢎞本咨報赴省會商安設營汛等事已經起程恐刀金寶年幼不能約束不可不遣大員帶兵前往相機𠞰撫隨經督臣鄂爾泰飛檄孫𢎞本速回茶山臣即行調臣標兵五百名令守備施善元管領前至軍前聼孫𢎞本調遣督臣又檄行永順鎮撥兵五百名由景東一路前赴普洱會合並行順雲營派兵前往江底地方遙為聲勢并示各鎮將方略機宜於八月初十日據參將邱名揚稟為飛報擊敗逆賊事七月二十四日有擺夷數百人各執鎗械等項聲言要替刀正彥報讎卑職即督率辨兵迎敵鎗炮齊施打死夷賊數十人餘盡敗竄又據千總燕鳴春到營稟稱奉令差查刀金寶親向千總泣訴云橄欖壩擺夷被緬和尚及刀正彥心腹叭護叭瞻等煽惑逼脅要我同反我斷不敢聼從惟有一心報效等語八月十一日逆夷聚集二三百到猛飬又被燕鳴春打敗帶傷逃去九月初一日又據邱名揚稟稱八月十八日據千總燕鳴春探差回報夷賊叭瞻等又煽惑附近橄欖壩之猛遮猛籠等處擺夷同叛口稱要分路前來等語卑職於各要隘處安設伏兵嚴整備辨待敵各等情據此臣查逆夷小醜本無能為一時被人煽惑原可不須多兵臣與督臣再四熟籌因邉疆甫經歸附且夷性反復不可不大張軍威以禠逆夷之魄更使逺近夷民畏威懷德是以遣撥各路官兵往查確情相機行事今漢土大兵雲集逆夷不日就縳俟具報到日臣當另行奏聞至一切安設事宜事定請旨遵行所有據報逆夷黨惡不法臣等調遣官兵緣由理合繕摺奏聞伏乞睿鑒施行謹奏鄂爾泰俱備悉奏聞矣善後事宜當詳審為之雍正六年十月二十日雲南提督臣郝玉麟謹奏為奏聞事竊照橄欖壩逆夷刀正彥違悖功令拒捕不法前經督臣鄂爾泰遣撥官兵業已擒獲其黨羽緬和尚暨叭護叭瞻等煽惑附近橄欖壩之猛龍等處擺夷不法又經督臣會臣分遣各路官兵進剿以靖地方并屢檄臨元鎮臣孫𢎞本統領相機調度經臣繕摺奏聞今於十月初四日準鎮臣孫𢎞本及元江府知府遲維璽等咨稟稱逆夷於九月初九初十等日聚集千餘人突至叭泥欲來攻擊在營備辨等隨令衆兵奮勇殺出賊人退散仍屯聚江上必俟大兵齊集進𠞰殱厥渠魁淨盡根株以安地方等語據此查逆夷煽惑夷民督臣先已計及業經會臣派撥漢土官兵不下四千餘員名又經發給火炮器械解送軍前接應自可尅期底定但鎮臣孫𢎞本才具遲鈍不能應機𠞰撫臣再四熟籌與督臣細加商酌緣茶山橄欖壩各處經臣於本年春間遍歷要隘形勢稍為熟悉今議微臣帶領官兵二千員名於十月二十日起程前往適中之地駐劄調遣若逆夷已定臣即會同在事鎮將等官作何善後事宜細加籌畫移商督臣裁定庶邉疆永獲寧謐矣所有橄欖壩逆夷情形及臣帶兵前進緣由理合繕摺奏聞伏乞皇上睿鑒謹奏爾親往彼處相機調遣甚好已據鄂爾泰奏聞矣詳慎為之専待捷音雍正六年十二月初四日雲南提督臣郝玉麟謹奏為𠞰平逆夷情形仰祈睿鑒事竊照橄欖壩逆賊刀正彥叭護叭瞻等煽惑夷衆燒燬民房恣肆不法督臣鄂爾泰授臣方略囑臣親往調度臣統領官兵二千餘員名於十月二十日自大理府起程經臣奏明在案臣晝夜兼行於十一月初十日抵思茅準駐劄猛養總兵孫𢎞本咨稱承準督部院照會并準臣咨即撥官兵約於十三日攻取慢顙整板小猛崙橄欖壩九龍江等處臣隨於十一日自思茅即遣遊擊徐成貞帶領官兵六百餘員名指示路徑由慢薩等處過整空拉卡江務必奪取渡口去後續於十三十五十九等日據遣發攻取慢顙等處各路將備稟報官兵奮勇分路進攻賊徒俱各大敗逃歸橄欖壩衆兵乘勢追殺於十八日直抵賊巢賊見官兵勢大不敢拒敵盡皆逃竄各等情到臣臣即於十九日帶領官兵二十日抵橄欖壩查逆夷已渡整哈江藏匿臣即於二十一日親督官兵渡江奪取渡口賊人望風而逃渡口已得臣即在整哈扎營正擬策應九龍江官兵渡江進𠞰適準鎮臣孫𢎞本報捷咨稱二十一日據遊擊郭佑民差人稟報遊擊徐成貞領兵自猛遮後路響炮從九江大渡口對岸抄出卑職佑民即應炮自大渡口督兵過江夾攻賊人大敗逃散已經官兵駐劄地方悉平等語臣查江壩等處逆賊煽惑夷衆拒敵官兵大干法紀今大兵到處膽喪魂消不旬日間仰仗皇上天威尅期底定現在嚴拏逆黨造意首惡斷難漏網獲日解赴督臣察審定擬前因賊衆迫脅宣慰司刀金寶同反金寶不從被賊衆擁挾前往猛混臣即差彼親信夷目等再四開誠曉諭給賞招徠今於十一月三十日刀金寶已回江上原處住所至被脅夷民已諭軍前各官相機善為招撫去訖臣抵壩之後陸續招出夷民五百餘戶節經咨報督臣在案其招徠各寨頭目臣宣布皇上寬大之恩傳諭人民各安生業并飭該目等管束化導隨酌加賞賚俱各歡欣踴躍未歸夷民現在源源而至所有地方一切善後事宜最關緊要鎮臣孫𢎞本病瘧痰湧已於十一月二十六日身故容臣會同在事軍前文武各官悉心籌畫咨商督臣另疏奏請睿裁所有𠞰平逆夷情形安戢一帶地方暨撫慰夷民緣由理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏深為慰悅在事將領兵辨俱屬可嘉之至具題到日另有恩旨諭部施行其一切善後事宜爾與鄂爾泰殫心籌計辦理務令妥協可也硃批諭旨卷二百十四之一欽定四庫全書硃批諭旨卷二百十四之二硃批郝玉麟奏摺雍正七年二月初四日雲南提督臣郝玉麟謹奏為微臣瞻天念切恭請陛見以伸孺慕事竊臣碌碌庸材毫無知識蒙皇上畀以提督重任屢沐殊恩涓埃未報屢請陛見未蒙俞允臣又何敢再瀆惟是臣受恩獨深與衆不同天下大小臣工無不得覲龍光臣從未泥首闕廷瞻天仰聖且臣更有面奏之事午夜思維寸心如結今口外地方安靜無事滇黔軍務俱已告竣橄欖壩逆夷督臣鄂爾泰指授方略臣統師親往𠞰撫已經底定督臣欽遵聖旨現今赴黔與廣西撫臣金鉷會商地方事宜四月間可以還滇即將來或有公務他出亦在冬季時候臣籲聖慈俯鑒愚忱準臣候督臣自黔回滇之日臣即輕騎赴京恭聆訓示俾臣孺慕之私得以稍慰而封疆職守更得有所遵循矣臣不勝激切屏營之至伏乞睿鑒謹奏朕從未見汝面數年來披覽所奏章疏及所辦事件即可知悉汝之居心為人汝縱逺在滇南一切處觀朕用人行政亦可領會朕訓誨臣工之意我君臣雖未會晤如見面然也今用卿為廣東總督可速束裝赴任到粵料理一二年周悉地方情形之後再來面朕亦不為遲旨已宣降卿其遵奉母違朕現今訓卿之旨惟務不欺不隱秉公執正旗人習氣操守一節切須砥礪察吏貴於嚴明不懈臨民須宜寬猛兼施而粵省要務弭盜之方更宜急為講求汝即來京聆朕面諭亦不出此數語其竭力加勉一一遵循至於地方上應興應革事宜朕實不敢強為知解蓋自朕御極後所用粵省督撫率皆平常供職之輩縱有道聽途説衆論朕尚未之見信何以諭汝大抵各省風氣雖有不同撫治異宜然究其要領總在察吏安民凡事順情得理而已如鄂爾泰者可以之為師範既與同事數年自必洞悉其心行朕所喜者此等大臣若能效法一分即為能遵朕訓一分也汝當量已才力倘不能效法鄂爾泰其次寧可倣李衛之實心任勞任怨慎母蹈潔已沽名欺詐不實之陋習今將朕之意指明白宣示以便汝詳擇審處而為之若慮封疆職分中事或有未諳仍當虛衷領教鄂爾泰保伊必推誠告汝果肯聽其所言奮勉思齊殊勝來京往返萬里聆朕訓諭也勉之勉之不盡之諭俟汝到任後隨事隨便再為批示以增益汝之不逮特諭雍正七年六月十二日廣東總督臣郝玉麟謹奏為欽奉聖訓事竊臣仰荷天恩畀以廣東總督重任雍正七年四月二十四日準雲貴廣西督臣鄂爾泰咨移部文到臣臣隨交代眀白即於五月初二日自大理府起程已經恭疏題報在案初九日行至廣通縣地方據臣齎摺把總捧到硃批諭旨臣恭迎至寓跪讀聖訓勉以東省政務之要指示居官取法之資天語周詳至眀至切感激殊恩不禁淚下伏念臣一介武夫仰蒙天恩授以總督重任自念知識短淺不知作何辦理旋即欽奉訓旨頓啓愚蒙不惟知所遵循且覺心膽亦壯所有地聖恩督臣鄂爾泰公忠體國精勤任事臣與同事數年知之最切其居心制行實可以為師範臣雖自量才力萬不能及然務當勞任怨幸逢聖主明並日月洞鑒其誠諸務得以就理實臣下分所當為臣願竭力效法以盡臣職斷不敢效潔已沽譽存私欺詐之輩自取罪譴也所有奉到聖訓臣欽遵緣由理合繕摺回奏伏乞皇上睿鑒謹奏從來閩地最稱難治而浙省較為尤難此乃人所共知者幸得一李衛實心任事之督臣未及二年氣象遂覺翕然丕變汝等督撫之有關於地方利害也如是不敬不畏可乎切勿以封疆任重為榮惟實知盡職之難統屬之苦方能上邀神明助祐若朕則實知為君之難居上之苦孜孜矻矻自勉力行者至於貴為天子富有四海朕實不覺尊髙可喜而有暢心適志之樂也朕向在藩邸數十年仰賴皇考福蔭富貴榮耀不減今日而安享逸豫不及當時百千萬倍言及此不禁涕泗交垂慟憶我皇考昊天罔極之深恩云爾偶因一時感觸書諭我君臣期共勉之同日又奏為恭懇聖恩事竊照廣東地方山海交錯弭盜一事最為緊要臣跪讀硃批訓旨仰見皇上明同日月無逺勿照臣思弭盜安民首在地方文官稽查化誨清其源流更須武辨整飭營務嚴謹汛防實心拏賊使盜賊知所警懼地方始得寧謐百姓始得安枕是文武各員全在得人臣猥以庸愚荷蒙皇恩畀以總督重寄查廣東地方遼濶臣一人耳目難周須得素所深知諳練才幹文武能員以備委用庶可漸次整頓臣欽遵聖旨兼程於六月初五日到黔省貴陽府將廣東地方應行整理諸務備細與督臣鄂爾泰相商督臣推誠講論悉心指示莫不深切體要又云聞東省諸事廢弛盜案尤多須揀擇幹練文武數員散布分理始有裨益等語臣聞督臣所論即與商酌擬將臣平日所知如貴州威寧府知府吳士鯤雲南開化府同知楊正輔劍川州知州李育元石屏州已告終飬知州龍為霖皆才守兼優勇於有為懇祈聖恩特降諭旨調用粵東俾臣得收指臂之效鄂爾泰知臣新任未諳亦並無難詞臣為此籲求聖恩特降諭旨賞將以上文員調赴廣東令臣遇缺具題請旨補用於地方政事大有禆益至營伍諸務在在俱屬緊要臣擬將雲南維西營參將李君賢楚姚鎮遊擊朱永振順雲營守備題補臨元鎮遊擊魏傑武定營守備王廷標永北鎮千總邱尚忠張朝翰楚姚鎮千總陳𢎞舉馮希聖提標把總梁汝楫俱久厯行間出師西藏并米貼茶山著有勞績且皆係實心任事之員堪任驅策并求聖恩調赴廣東遇缺題補則臣得收指臂之效海疆營伍漸次整頓矣臣為新任地方起見謹繕摺請旨伏乞皇上睿鑒施行謹奏照爾所請已有旨諭部矣朕勉從所請一者因汝初理地方事務二者念雲貴各員曾經鄂爾泰鼓舞訓飭必已知為人居官之道所以姑準施行雖然題帶舊屬往赴新任究非善舉定於汝無益將來或至掣肘時方悟朕言之不謬也自古知人為難人心難測事事時時留心體察方不被其愚惑萬不可過信亦不可不信人皆可信何必止信數人耶信任者多得力處廣信任者少得力亦微美惡不可預期是非不可逆料秉公據理平心看去有何可信何不可信耶凡人且用去看其所行是矣從而加意察訪其志堅定否他事亦然否事事皆是矣更觀其有無矯情能長久如是否終始不渝否如此觀人則優者愈見其是而劣者愈見其非假若預橫成見於胸中則是者不出此一是而非者定於此一非矣倘是者或有巧詐之情而不加察則誤已不淺非者或有遷改之實而不更審則寃人殊甚總之知人不易用人尤難若不費一番苦心公取捨勤訪察耳目不廣精神不到莫言知人用人之道也勉之治平之術除用人一節餘無二事如得其人斯諸務就理不得其人堯舜之政自在簡策於吏治民生何濟汝其欽承朕訓盡屏私腸於信人用人之際母任一已之喜怒好惡惟恪秉公勤誠敬而為之可也雍正七年八月十一日廣東總督臣郝玉麟謹奏恭請皇上聖安朕安覽卿到任後一切奏請及所辦理甚為嘉悅卿之立志是矣根本既端枝葉夫何足慮朕深慶粵督得人勉之勉之堅守此志母稍遷移時時記憶鄂爾泰之居心行事常存彼丈夫兮我丈夫之念則為粵省官民之福亦朕之厚幸也同日又奏為奏聞事竊臣查粵東各府州屬本年閏七月內雨水均屬調勻晚禾蒔插已遍現在發秀各屬米價上米每等再閏七月初九日風雨晝夜被風地方民間屋瓦吹飄路旁營房望樓亦多倒塌其人口田禾各無損傷訪諸土人僉稱廣省地臨濱海每年當夏秋之間海風不時舉發等語除檄行該管地方文武查修完固外理合一並具摺奏聞謹奏粵省濱海居民每有吹飄之患但看海風舉發之大小不同耳查明被災輕重加意撫恤之同日又奏為奏聞事竊臣欽奉諭旨郝玉麟到廣東新任後著孔育珣將地方事宜及鹽務等項明白交代與郝玉麟協同辦理半月來京陛見欽此臣於到任後凡地方事宜俱與前督臣孔育珣商酌協同辦理所有鹽務一事隨即咨詢將任內督辦過數目以及正羡課稅支解完欠造册移交以便查明接管去後當準孔育珣移送運司造報册結前來臣細加查核兩廣鹽務因發帑收鹽銷辦是以有羡餘一項今將孔育珣任內各年收過鹽斤彚總合算自孔育珣到任起扣至本年六月計其辦出之鹽應賣之價扣除帑本運腳支銷之外其餘止足六年以前報出之羡餘其自本年正月至六月應辦羡餘二萬有竒竟無著落隨咨孔育珣詢其原委去後續準覆稱羡餘一項雖係按年奏報原係截長補短不能扣截而計隨將各官商竈戶未完自康熙六十年起至本年六月止一切積欠以及現在各場埠已運未運鹽包造册交臣抵作未完五六兩年以及七年分上半年羡餘之項臣即將所交之册通盤合計除抵已報未完五六兩年羡餘外餘欠雖足抵七年分上半年應辦羡餘但錢糧自應各歸各款似此前後那抵且又多係逺年積欠將來不知能清完否臣奉諭旨明白交代何敢瞻顧草率遽云明白今據移送抵款之册尚須逐一清查而督臣衙門鹽政卷册零星又多舛互孔育珣奉有欽限不便久稽已於本年閏七月二十五日起程赴京陛見臣將伊所辦鹽務復加查考總緣羡餘一項自報充公以來雖每年奏報五萬餘金實非每年會計實數孔育珣自到任至今總謂可以截長補短實未計及此年之足與不足徑行奏報是以積欠未得清完臣現在細加查核合先據實奏聞仰祈睿鑒謹奏查眀之後惟以按年辦理據實奏報為是似此那新抵舊究屬欺瞞之舉切不可踵而行之百凡總以鄂爾泰之居心行事為模範而倣效之萬無一失也謹志毋忽同日又奏為敬陳兩廣鹽政之流弊仰祈睿鑒事竊臣仰蒙皇上殊恩特授廣東總督任大責重夙夜惶懼除地方事宜以及鹽政交代已另摺奏聞外臣查兩廣鹽務悉屬臣衙門管理是以前於途次一入廣西境即留心訪察一切鹽政情形到任後復細心體察迄今已及一月雖未能周知而其中之因循流弊但有所知敢不一一奏聞一逺年之積引與新引並行以致誤課難徵也一商人之挂欠鹽價以致帑本久懸不清也一廣西省辦商之糜費火足宜節省也一鹽務人役之冗濫糜費帑本也一東省官運官銷之埠羡餘未清也一場羡不據實奏報逐年牽互不清也一竈戶晒丁之走私宜設法也一地方官宜督責鼓勵也以上八條實兩廣鹽政因循之流弊臣現在清理斟酌調劑其餘未盡事宜以及臣尚未周知之利弊亦在悉心體察次第陳奏斷不敢避怨依違臣見雲南鹽政自督臣鄂爾泰李衛前後一畨清理調劑至今官民商竈無不稱便臣敢不虛心取法以冀仰報皇上殊恩於萬一謹此繕摺奏聞仰祈睿鑒謹奏閲所陳八條內有應行者亦有暫時似乎有益日久難行者即如節省辦商糜費一款宜加斟酌勿因一時除弊之見或致將來不能承辦復費經營朕意汝到任未久且守成規辦理不可造次更張俟將鹽務一切利弊洞曉無疑之後再為詳商妥議奏聞候朕批示遵行凡事不宜欲速次第整理自能就緒至若鄂爾泰李衛之調劑得宜皆因胸中先有徹始徹終之定見然後措施所以能收成效非僥幸試行而然也倘於其中利弊少有未透不可聽信一二無稽之論遂爾輕議更改恐有急遽之失特諭廣東總督臣郝玉麟署巡撫臣傅泰謹奏為請旨事案據廣東碣石鎮呈據中營守備林駿詳稱雍正七年七月十九日夜四更時候惠州府海豐縣梅隴墟鋪民徐秉間等家被盜百餘人眀火持械搶劫各鋪布匹銀錢等物鄉民潘朝柱救護被賊傷死等情又據署海豐縣會同汛辨驗報前來經前督臣孔育珣及臣等俱各星即照行碣石鎮按察司飛檄該地方文武多撥辨兵練捕速往屣緝務必全獲去後隨據提標右營守備哈雲棟報稱查得打劫梅隴墟鋪民徐秉間等各家賊犯兵辨練捕追至長樂縣山羊寨地方於閏七月十五日據賊犯謝恩榮等開報同夥姓名共一百二十三人各繳器械一同投首前來隨會同歸善縣縣丞謝進分起押解賊犯謝恩榮等到肇內除夥犯一名鍾恩趙據報病故外臣郝玉麟當即飛調惠州府會同肇慶府審取確供去後隨據該府等會訊録供詳報前來臣等將供情細加檢閲會看得海豐縣梅隴墟鋪民徐秉間等家被劫一案緣廣西賀縣人謝恩榮先與長樂縣居住之張永良余大榮等希圖在山穵礦淘沙度日從前並無劫掠搶奪等事後謝恩榮等到山不久即被驅逐各人先後下山無處覓食於七月十七日謝恩榮在煙墩墟撞遇張永良余大榮等各道貧苦當有黃天明説打聽梅隴墟鋪家有銀錢布匹好去搶劫張永良即與余大榮等商定向謝恩榮説知脅從衆人即於七月十九日夜三更時候到梅隴墟搶劫徐秉間等家布鋪劫得銀錢布匹等物謝恩榮張永良余大榮黃天明陳友華徐世英曾文張文興石漢臣鍾文材黃雲黃興繆標文等俱各加倍分贓袁文等十一人各分一分各犯劫後遂即逺逸而墟中居民救護窮追盜犯王亞貴張亞石江松林彩等在後拒捕傷死救護鄉民潘朝柱而王亞貴張亞石當被鄉民殺死此案為首穵礦係謝恩榮起意嚮導係黃天眀先行商酌係張永良同商行劫係余大榮陳友華徐世英曾文張文興石漢臣鍾文材黃雲黃興繆標文等與拒捕傷人之江松林彩共一十五名此皆法無可貸不準自首相應仰請皇上敇下即將盜犯謝恩榮等一十五名發往被劫地方當衆正法以警姦頑再謝恩榮一犯勸衆投首應否網開一線量豫末減出自聖恩至袁文等各犯共七十一人因驅逐散後又被脅從入夥並非積盜既據投首情有可原可否準豫自新照例分發當差效力統俟睿裁再李才等三十六人原未入夥為盜又未分受贓物俱係平民臣等先即檄行摘釋劫去贓物應於各盜名下追賠除將謝恩榮等􅊾行按察司嚴行收禁外臣等未敢擅便理應會摺請旨伏乞皇上睿鑒批示遵行謹奏已發三法司核擬具奏矣此案聞兵辨於追捕時甚為怯懦當嚴行飭誡雍正七年九月十一日廣東總督臣郝玉麟謹奏為粵省買補營馬領銀浮多宜定成規以杜冒銷事竊臣查得營制定例副將以下把總以上以及馬戰守兵均有朋扣銀兩收貯司庫以備操馬倒缺請領買補不致偏纍馬兵法至善也然營有大小兵有多寡及所設營馬亦多寡不一報倒請朋原係照所朋扣量入為出總不浮出朋銀之外操馬已過三年者始準報倒未滿三年者扣除賠樁蓋杜揑報冒銷此天下通例也臣查奏銷册開雍正六年分通省水陸各營共計朋扣銀兩三萬七千八百二十兩零查水師雖無操馬亦係一例朋扣至通共計經制營馬六千二百四十八匹自應按年報倒照扣領朋始與定例相符查六年分報過倒馬竟至一千五百一十一匹之多動支朋銀三萬三千九十兩零下剩溢朋僅存四千七百三十兩零各營支領朋銀不但透支陸路朋扣暨水師朋銀又已動支且通省報倒馬匹並不畫一又不計算每年各營共有朋扣若干應報倒馬若干以符朋扣之數每年通省標營共計多領朋銀六千七百七十三兩實屬冒濫所有七年分倒馬未便聽其浮報臣今酌減每年通省額定報倒營馬一千九十四匹實動支朋扣銀二萬三千九百五十八兩將來盈縮總不得浮出本營朋扣銀兩之外查水師各營原扣朋銀六千七百四十一兩零臣思水師朋銀雖無買馬之用而行駛船隻每年大修小修概係動用帑金自應將此銀兩歸公不便聽其冒領再查從前浮開冒領匪朝伊夕其來已久應否概從寬典出自聖恩其水師朋銀暨今核減除樁銀不算外計七年分約溢剩朋銀一萬四千七百餘兩零均應留充兵餉庶各營冒銷之弊可以永杜矣所有粵省浮開倒馬流弊應行酌減之處臣謹據實奏聞伏乞皇上睿鑒批示遵行謹奏卿秉公持正毫無瞻顧甚屬可嘉但甫經到任諸事須務詳慎令闔省兵辨心悅誠服後為之未為晚也同日又奏為拏獲海洋巨盜事竊查粵東廣州府屬之香山廣海新會聫界地方傍海依山最易藏姦臣於到任後即嚴檄該管水陸營汛無分疆界上緊查拏去後本年八月十二日據新會營遊擊周廣詳稱查有賊夥在廣海石橋北坑地方會集𥪡旗勒取繒罟船隻花紅銀兩隨差督標俸滿千總楊志望外委千總談仲賞外委把總薛英各帶管隊兵丁鄭兆勝等配駕哨船於八月初六日巡至香山三虎海面見有賊船七隻約共賊徒六十餘人在海遊移一見官兵追到賊即拒捕千總等督兵奮勇向前擒拏追至廣海獨涯清水灣海面拏獲賊首李奕揚夥賊楊亞干等共二十六名其餘賊犯當被官兵殺死二名打傷落水身死二十餘名赴水脫逃一十餘名打壞賊船一隻沉海漂流一隻並獲賊船五隻追出器械並贓銀帳簿書劄標帖等項委令守備凃元漢等押解賊犯李奕揚等到肇臣即親加審訊取供在案一面將賊犯李奕揚等并贓械帳簿書劄標帖等項發交按察司嚴行究審並一面飛檄該管地方文武選撥辨兵員役會同水師速將李奕揚餘黨暨脫逃之首盜王亞七等並供出之陳大樂等一夥賊犯分往確探逃匿蹤迹潛泊處所立即搜捕務獲解究去後又據遊擊周廣報稱續經拏獲與賊往來之東山寺僧茨亭一名賊黨鄧亨齊等四名又報拏獲賊黨劉自雄等三名俱行詳解前來臣俱檄司一并究審除俟夥賊全獲審擬招報到日另行會核將賊犯李奕揚等題請正法外其臣標千總楊志望等并管隊兵丁鄭兆勝等俱奮不顧身勇敢拏賊實心效力殊屬可嘉臣即按名賞給彩紬銀牌并紀勞績以示鼓勵事關海洋近日情形合將現在拏獲洋盜緣由先行繕摺奏聞謹奏此案非尋常獲盜可比該督具題到日將兵辨人等該部照軍功例議敘具奏粵省惟弭盜一事最為要務此奏朕嘉悅覽之已諭部矣但賊夥會集幾多時日未經聲明可詳悉審訊具奏以聞同日又奏為聖主之德澤日深商等之沾恩已厚請增餉課以效涓埃事竊臣於到任後即清理鹽政議增引目以資民食隨據各商等呈稱實緣雍正三四兩年雨水過多場鹽少産以致元二三四等年引目壅積未銷且廣東埠地在在難銷唯藉連樂等數埠稍易銷售通融撥抵以資課餉今若再增引目不獨舊引終成壅積即新引亦必更多延誤該商等蒙皇上發帑飬竈久沐恩膏情願按引增課每年加增六萬兩并請照舊融銷分年帶拆舊引前來臣即批仰運司確查妥議詳報去後續據議詳到臣臣復細加查核該商等未拆元二三四各年舊引實俱完過課餉因三四兩年雨水過多場鹽少産壅積未拆有案可查並非他省已拆已銷之未繳殘引可比但其中亦有完課舊商已退新商實非當日完課之人不便準其再拆臣查元二三四等年共未拆引三十七萬六千五百道內完課舊商久已告退之引六萬四千八百六十九道不準頂充新商拆銷外尚有完課未拆引三十一萬一千六百三十一道應請每年帶銷十萬三千八百七十七道定限三年為滿仍懇皇上俯準難易埠地一例融銷其該商等所請先增餉課六萬兩并懇皇仁準於本年十月行銷七年新引為始每年隨課上納報部充餉俟三年帶銷限滿無論舊引完與不完一概停止専行新引再將此所增六萬兩課銀同以後或再有應增之項一併請增引目永為嵗額則國計商民均沾裨益矣為此繕摺請旨伏乞皇上睿鑒批示施行謹奏所奏據怡親王議覆朕深以為然今將議覆之摺發來爾看可即照行將來至增繳新舊引目之時具疏題請可也同日又奏為查出東省官運官銷之埠羡以裕課餉事竊臣查得粵東各埠雖皆商辦內有廣州府屬之順德等埠因商力不繼久經改歸官運官銷則應有埠羡歸公臣隨飭現任順德縣知縣柴瑋據實開報去後續據造具印册前來臣復逐一核查每年實該羡餘銀二千二百二十七兩該縣俱未報解查該縣承辦五六兩年共該羡餘銀四千四百五十四兩並不報解本應參究但實係厯來因循流弊而該縣一經查詰即行開出自認補解且其人年力精強正堪效力臣仰體皇上愛惜人材至意細加戒飭立限半年令其照數補解嗣後每年埠羡銀二千二百二十七兩飭同正課起解歸入埠羡項下充公在案可否寬其已往冀其後效出自聖恩再查該埠自雍正二年即改歸官辦係前任知縣今升韶州府現在丁憂知府陳鴻熙承辦每年亦實該羡餘銀二千二百二十七兩該府自二年三月到任至五年八月離任四年共得羡餘銀八千九百八兩查該府曾於升任後透完過二三四年課餉之未拆引二千六百餘道共計銀一千九百六十六兩外尚有羡銀六千九百四十二兩未報未解相應勒限一年令其補解如逾限不完即具題參革究追再饒平一埠係五年分改歸官銷每年應有羡銀五百九十九兩該縣知縣董鍾晉承辦五六兩年引課共該羡餘銀一千一百九十八兩不報不解本應參追總緣流弊相仍可否仰邀寬典出自皇仁其應追羡銀臣已勒限半年令其補解清完嗣後每年應辦羡銀飭同正課起解歸入埠羡項下充公再查平逺長樂恩平三埠亦自五年分經前督臣孔育珣因商力不繼飭令官運官銷以來緣平逺一埠引多課重而長樂恩平二埠逼近場地俱不能照額行銷是以將已銷之引所有羡餘即抵補應完之課而羡出之引不能於該埠再銷只可陸續酌撥於易銷之埠逐漸融銷查三埠餘引共二萬四千八百三十七道若融銷完日則此項引課即係平逺等三埠羡餘容臣設法銷完歸入埠羡項下一併奏報充公可也所有臣查出東省埠羡緣由合即據實奏聞仰祈睿鑒批示遵行謹奏此奏交怡親王等會議今將所議發來汝其遵照奉行埠鹽官運官銷之事曾經備詢孔育珣據伊奏稱因係難銷地方無人充商承辦不得巳改歸官運等語朕意果如其言縱有些少羡餘亦不當過於苛求何則若地方可保必有羡餘則不難招商承辦何必改令官運官銷耶諸凡須詳情度理然後於事有濟稍涉偏執目下便勉強將就恐不能行之久逺一切處類推為之方無過不及之失不貽日後之悔也雍正七年十一月十八日廣東總督臣郝玉麟謹奏為恭謝天恩事本年十一月初十日據臣標把總齎捧皇上硃批并御賜貂帽哈密瓜克食到肇臣敬迎至署恭設香案望闕叩頭祇受訖所有臣具奏事件跪讀諭旨指示精詳容臣悉心辦理次第請旨遵行外又臣請安摺內荷蒙天語垂訓勉勵備至臣自顧何人膺茲異數感激涕零不能自已惟有凛遵聖訓堅持此志不敢改移殫竭心力勉效督臣鄂爾泰之居心行事以仰副我皇上教誨微臣之至意耳謹具摺恭謝天恩伏乞睿鑒謹奏覽奏謝知道了觀汝自蒞任以來一切摺奏無非以清楚錢糧為要務似此不特輕重本末失宜粵省民情惟利是趨亦與地方輿情甚不相協也果能令吏治潔清民情淳朴徐徐自有弊絶風清之效若不於根本處著力而逐末辦理豈但不勝其繁亦何有吏畏民懷之期地方官民之心既失徒恃國家法度欲令百物順軌乃斷不能之事如是以為不事瞻顧秉公無私則大誤矣再者粵東各官分為兩黨恐汝不覺兹特密諭知之兩邊各分門立戶黨首一為王士俊一即方願瑛方願瑛實屬元惡將來朕必置之重典伊不過一臬司耳能令通省之人無一不附合者因被楊文乾參奏伊嗾使上下各員羣起而攻之此等刁風萬不可長王士俊乃實心任事明體達用之員因被楊文乾委用遂為通省之所忌嫉切勿聽信屬員譛訴誤生疑惑倘錯用耳目則通盤不是矣汝第倣照楊文乾措施辦理自可望有成效楊文乾之志趣惟王士俊深悉事事與伊商酌斷不至於大差志之密之將粵省分為兩黨之由向汝自滇題帶人員密為示知莫被誘入黨中凡遇有代方願瑛訴屈者率係粵東蠱蠧即宜留心相待慎勿謬忽此種情形朕經採聽數年深悉隱微設將諭旨視為疑信之間則自誤不淺開復新用副將繆𢎞其人若好則為將來武臣中難得之員否則乃一不安分大膽狂妄人也朕未能看透汝其留心試用俟有真知灼見時具奏以聞雷瓊道王璠前於知府任內來京引見朕觀其人頗近庸劣外貌雖似誠實心術尚恐未純因孔育珣楊文乾皆力言其優所以擢用此任近聞不稱海疆巡道之職當留心察訪至陶正中傅泰盛言其好朕謂不過聰眀自了之流未必肯實心為國致身效力也汝其加意試看更將傅泰保奏并朕數次批論陶正中于其珣如何之處密向傅泰傳旨令其告汝知之同日又奏為敬陳粵東外海內河戰船情形分别小修嵗修以收實效事竊查粵東通省設有水師外海繒艍拖風等船一百六十二隻內河櫓槳急跳等船二百三十四隻配兵遊巡分班出海一切船隻限年修理船身堅固駕駛無虞本年四月二十三日準到部咨奉旨祖秉衡所奏小修改為嵗修甚屬得理著通行有戰船之地方一體遵行欽此前督臣孔育珣接準部咨當經轉行欽遵在案兹據布政使王士俊詳準水師各鎮協營均請仍照舊例小修等由到臣該臣查得粵省戰艦等船有外海內河之分查內河船隻亦有可以出海者除現檄行布政司分别查明議詳外其不能出海內河船隻遵照嵗修之例修理實屬妥便惟出海戰船勢難畫一臣查粵東外海與京口內河水性鹹淡不同且外海風巨浪猛洪濤衝擊而出洋戰艦易於朽壞是以定例海洋戰船自新造之年為始厯三年準其小修再厯三年準其大修再厯三年如船隻尚堪修理仍準其大修如果朽爛不堪修理保題拆造與京口沙船厯九年而始大修十六年而後拆造者又自不同今若照京口沙船之例將小修改為嵗修勻給工料有限嵗嵗粘補無多新造之一二年船身堅固工程簡略尚可足用若至數年之後屢經鹹水浸灌蠔蟲蛀蝕雖勤加燂洗而船身不堅釘鏽木腐更換新料則工價不敷照依嵗修則粘補無益竊恐未屆大修拆造之期而船已朽壞不堪關係甚巨仰懇聖恩俯念粵海不同京口除內河槳哨等船內有不能出海者俟查明若干遵照嵗修外所有外海戰船請停嵗修準照舊例限年分别小修大修拆造則船隻得以堅固海疆實有裨益為此據實陳奏伏祈睿鑒批示遵行謹奏閩廣二省戰船仍照舊例修理已有旨矣同日又奏為欽奉上諭密行辦理事本年九月十五日接到大學士公馬爾賽等字寄內開雍正七年八月十二日奉上諭聞得江南福建廣東及浙江之杭嘉湖三府有匪類結黨潛謀為匪其為首者係江寧人各處用銀結納等語外間既有此言不得不為留意爾等可密寄信與郝玉麟令其密密留心整飭營伍預為防範但不可驚惶聲張使屬員辨兵知覺緣由倘致泄漏於事無益徒滋驚擾若江浙有文知會時或有查拏同黨之人即便作速緝拏務使嚴密勿令一人兔脫欽此遵旨寄信到臣臣跪讀聖諭當即欽遵密為留意不敢驚惶聲張致有一毫泄漏外布應行之政事內寓防範之機宜整飭營伍勤加操練又與署撫臣傅泰密商於江西福建接壤粵省交界地方遴委親信妥當人員一面借公事名色并往浙省一并密行訪採倘有信息易於辦理若江浙有文知會時或有查拏同黨之人即行緝拏不致兔脫務期姦匪絶迹邊疆寧謐以仰體皇上治益求治安益求安之至意所有密行辦理緣由謹具摺奏聞伏乞皇上睿鑒謹奏覽奏知道了稽察匪類較之緝盜尤為緊要須不時留心多方密探方能得其蹤迹非比命盜案件有失主苦主之證據易於追究庸碌督撫往往略而不察偶遇一二敗露者輒諉之曰瘋狂率皆置之不聞不問以為何必滋事拖纍無辜惟隱飾是務所以致令吕留良輩得以數十年肆行無忌於光天化日之下也切母蹈此無知陋習以飬癰遺患此等處惟李衛深識輕重他人莫及而玷職無能之輩反目為多事豈不深可痛恨也乎粵東地處邉陲風俗欠淳且兼通海洋更易藏姦亟當再四加意時刻察訪毋忽同日又奏為敬覆諭旨仰祈睿鑒事竊臣為東省改歸官運官銷順德等埠鹽課羡餘一項繕摺奏請聖裁奉到硃批仰見我皇上聖諭周詳無微不燭臣敢不欽遵悉心籌畫伏查難銷之埠若官運官銷實有羡餘而又不能招商辦運者其中實有原委今細為我皇上陳之查行鹽埠地雖有難易之分而所獲羡餘每封實約有四五六百金不等埠埠皆然但難銷之埠或引繁課重或私鹽充斥以致額引不能全銷而商人頂充必須全納額餉所有已銷過引之羡餘僅足墊納未銷之引課商人無利可圖是以無人承充若能設法行銷緝私嚴密銷完額引何嘗無羡至若官運官銷則不須墊課銷得引一封即有一封之羡餘且將不能銷之引撥於别埠融消完課只就本埠實銷之引完納引課是以實有羡餘因官運官銷與商人行銷事有不同所以難銷之埠無商充當也理合據實覆奏伏乞睿鑒謹奏覽奏已悉請裁辦商一摺內有交部查議之處留中候旨雍正七年十二月二十七日廣東總督臣郝玉麟署巡撫臣傅泰謹奏為遵旨查奏事竊臣等蒙皇上發交條奏一摺奉旨諭總督郝玉麟巡撫傅泰有人條奏此一摺汝等可詳查議奏欽此臣等一面欽遵詳加訪察一面諭令布政司會同糧驛道確查去後兹據該司道呈稱粵省民田科則原有差等如南海縣每田額銀三分三釐額米一升三合五勺零計田三十一畝一分五釐零名為一石糧應共徵銀一兩二分零本色米四斗二升三合番禺縣每田一畝額銀二分四釐額米八合三勺九抄計田四十六畝七分二釐零名為一石糧應共徵銀一兩一錢四分本色米三斗九升二合其餘州縣徵收額數大概相同從前州縣徵收錢糧名為加耗一錢四五分實有一錢七八分不等雍正六年十一月內公同司道議定每兩加耗一錢六分核實奏銷刑名飯費另加耗九釐每兩共加耗一錢六分九釐以為通省公事及各官飬亷之用除此之外州縣並不敢有打號單銀平頭等費如條奏摺稱每兩竟要加耗三錢一二分方能完納等語實無確據且粵東貿易行使雖有銀錢並用但花戶從無以錢赴匱納糧者州縣亦未聞有收錢發給串票者又安有納銀一兩至用錢一千五百文之事即本司提取火耗每兩止提七分以為院司飬亷并通省公用又除九釐為奏銷刑名飯費其餘尚存耗銀九分即扣留該州縣應得飬亷之數多寡勻給並無有如條奏所稱提解一錢七分之處又摺稱官米三斗零三合四勺要納銀四錢四分二共需銀一兩七錢六七分是通指銀米而言但糧道衙門每年現收米二十四萬七千三百三十三石零如摺內云共需銀一兩七錢六七分是藩司衙門既經收銀又復折米銀米俱歸藩庫矣從來並無其事再摺稱徵收本色米每石有徵榖二石七八斗者有徵榖三百餘斤者每斛足一升計三石有餘亦有使用等費合而計之每石須銀一兩九錢等語查每年秋冬時將春夏碾支兵米徵收還倉例應一米二榖州縣現今照例徵收未有收米一石折榖三石之理目下米價五六七錢不等如折榖三石合米一石五斗計銀不過一兩又何用銀一兩九錢之多但糧道衙門已經收米則摺內所云納官米三斗零三合四勺納銀四錢四分益屬無據况徵收本色米原屬支放兵糧查通省各旗標鎮協營寨官兵馬匹共嵗需糧料米五十一萬一千九百八十六石除不敷糧料米石仍照部定價值折給外其額徵民屯米石現今州縣收支悉皆本色如云折給兵米只給銀七錢是亦並無其事也理合據實查覆等立即參究務期積弊盡除以仰副皇上子惠元元之至意再照摺稱本年五月內蘆包汛槳船被盜搶去并劫棉花客船一隻將鎗炮俱行帶去等因查此案專管把總邱勝宗經前督臣孔育珣咨部斥革其船內炮械俱經追回無失至疏防職名前經會疏題參又不行接續協追職名臣等復行會核咨參在案合并陳明伏乞睿鑒謹奏知道了條奏各款朕原未盡信必以為然但粵省吏治民風未為帖然就緒汝等極當協𠂻整理以期後效勉為之奏為密陳痼弊仰祈睿鑒以破貪壑以除民害以靖疆圉事竊查廣東各鹽埠勒收乾標縱私優害一項臣巳瀆陳天聽矣又何庸再為瑣奏獨是此中之痼弊最深黨固最密非經睿慮斷不能盡絶其根株永使民生樂業濱海肅清此臣之所以既言於前不忍不再窮底裏於今日也何則蓋弊之興也易剪弊之積也難除弊生於民也易治弊成於官也難清始於官流於官前後相因上下相應是以牢不可破愈久愈深致有商人辦課當道行鹽之物議伏思煮海為鹽乃天地自然益國益民之利緣産之者不盡其地而需之者不遺一家故召商以運之立埠以聚之又恐徵收無度設引以額之立法亦盡善矣在承商者循分安業在守土者持法嚴私何害之有無如利之所在人競趨焉不但市井之小人先自封疆之大吏倚勢奪埠借帑行鹽或委之子弟家人或委之親戚朋友而若輩有恃不恐靡所不為乾標之所由以作而姦宄之所自以生也一人倡始羣焉效尤迄於今更有甚焉者矣不惟官可以占埠即官之幕友親朋弟男子侄俱可霸埠不惟現任之官有埠即已經去任之官尚有埠不惟有沿海之標抑且有過山之票在董理埠務之州縣乾標外又派丁鹽在不理埠務之州縣規禮外時為苛索遂其所欲任商打標拂其所好任私四出商人辦課備價不能拆引當道欠價挂餉可以行鹽再加以從前張天爵陸曾李續祖等三案之增銷遂致積引甚多承本年之商辦來年之課拆先年之引近年雖餉課無虧商民之凋憊已極視封疆為利藪以敷衍為盡職喪盡天良羣為不覺誠可悲而可恨也固結如此民何以安臣今日不言無人肯為我皇上言矣然此猶就臣所聞見者而言其大略也尚祈聖慈垂照謹繕摺密奏伏祈皇上睿鑒施行頃有人密奏此一摺大抵浮詞無稽持論太過似非公確之奏但既經朕之耳目豈可置之不問因遇便發來爾看可將鹽務一切情形了然熟悉後再加確訪據實奏覆廣東總督臣郝玉麟謹奏為遵旨覆奏事雍正七年閏七月二十七日蒙皇上頒發密摺一扣為密陳痼弊等事奉有硃批臣敬謹遵奉殫心確訪迄今鹽務情形稍知梗概敢一一為我皇上陳之如密摺內稱商人辦課當道行鹽之物議等語臣查商人揭本辦課必拆引行鹽始能歸本獲利是以間有引多課重難於行銷無利可獲之埠即無商肯充不得已而歸官銷辦實並非課係商辦鹽屬官行之事也又大吏倚勢奪埠借帑行鹽等語臣查督撫藩臬皆為大吏臣到任後即留心密察不獨並無奪埠行鹽即家人吏役亦無倚勢行鹽之事又發乾標等語臣查沿海各埠逼近場地私鹽充斥不能禁遏如新會海豐歸善惠來等處遂有私鹽經過每擔抽錢名為幫餉給發乾標執照以致私販執標橫行影射散賣賺誤引餉臣到任後已嚴行禁飭今復確訪各商凛遵法紀不敢復蹈前轍矣又幕友親朋霸埠等語臣查幕友現在各衙門幕中辦事俱有關防豈敢出入料理埠務而其親朋或有借名霸占亦未可定臣再四密訪現在實無其事又州縣苛索陋規等語臣查康熙四十六年以前鹽政衙門固有陋規凡屬行鹽之地道府州縣亦有規例業經前撫臣范時崇兼理鹽政時題眀禁革在案臣到任後恐日久法弛又經通行禁飭惟清逺一縣係盤查要口凡鹽船經過每引一封尚有規禮三兩家人書辦亦有九錢八錢不等經臣飭查已據現任知縣陳本自認情願將伊任內所收之銀立限解繳充公臣因實係從前未盡之流弊已經飭禁容臣另摺奏聞請旨此外似屬兢兢守法又商人辦課備價不能拆引等語臣到任後查各埠商人竟有完課六七年之久尚未拆引運鹽者臣不解其故當即咨商前督臣孔育珣據云四年以前舊引俱係商人完課之後或因場鹽不敷或因該商無力措辦鹽價以致積而不銷等語此即臣前奏鹽政流弊之第一條也經臣具摺奏眀業蒙皇上軫恤商艱準其三年帶拆矣又當道挂欠鹽價可以行鹽等語臣查完課繳價而後運鹽此拆引之舊例也今各商中竟有雖完引課不繳鹽價即領鹽銷賣賣出之銀又復那完引課或稍完鹽價復領新鹽以致輾轉挂欠年復一年遂成積欠此即臣前奏鹽政流弊之第二條也實係商欠並非當道挂欠臣已確查欠數於查明鹽務帑羡不清等事奏明勒限一年清楚如限滿不完另議題請分賠矣又張天爵陸曾李續祖積引等語臣查三案積引賣抵帑項完結已久實非近年之事臣細查密摺內有全無影響者有久已禁革者有因小及大者有年逺事湮者誠如皇上聖鑒大抵浮詞無稽持論太過似非公確之奏耳兹臣略悉鹽務情形復加確訪謹據實回奏所有硃批原發密摺一併恭繳謹奏前經批諭原非公確之論今覽所奏甚眀朕洞悉無疑矣至鈔關稅務全賴地方大吏秉公協助方無掣肘之虞向日監督每被督撫刁難勒索此種陋習朕所悉知近聞傅泰與祖秉圭不睦天下未有公而不和之理二人必有一非汝宜從中調處須令不致抵牾方於國事有益慎勿岐視密之硃批諭旨卷二百十四之二欽定四庫全書硃批諭旨卷二百十四之三硃批郝玉麟奏摺雍正八年正月二十四日廣東總督臣郝玉麟謹奏為鹽政流弊仰祈睿鑒事竊臣前奏謹陳兩廣鹽政事摺內荷蒙硃批諭旨且守成規辦理不必造次更張臣跪讀之下仰見我聖主天地為心愛民恤商之至意臣今蒞任半載悉心訪查鹽政流弊極多實不能一時剔除臣謹遵聖諭緩緩次第整理而其間相沿流弊既有礙於鹽政又復纍及商民徒為官吏中飽者臣不敢因循瞻顧有負殊恩自取罪戾如鹽商行鹽地方在官不得多方掣肘勒索商人在商亦不得假引行私髙價病民經臣嚴行飭禁已據各府州縣申報遵依禁革在案詎有廣州府屬之清逺縣係鹽艘必由之要口該縣藉盤詰私鹽驗看程引名色凡鹽船經過每引一封知縣得規禮銀三兩家人九錢書辦八錢此等陋弊本應露章參揭臣仰體聖主寬大洪慈姑念流弊已久除一面示禁外隨行運司確查去後據該司詳據清逺縣知縣陳本覆稱此項陋規實係相沿日久並非抑勒今奉飭查遵即禁革情願將任內收過各商引規銀一千三百三十五兩五錢出具認限解繳道庫不敢絲毫隱聖恩又查得潮州府屬大埔縣有魚滷稅銀一項並非額設亦無解報經臣飭行運司查據該縣知縣吳車泰覆稱埔民喜食魚滷亦緣價賤但因有礙引鹽魚客情願納稅幫貼引課每年多寡實無定數自雍正五年十一月到任起至七年七月奉查止共收過魚稅錢一千八百二十餘千計值銀一千九百餘兩實係厯來相沿流弊今情願立限解繳道庫等語臣已飭該縣每年儘收儘解幫貼引課餘者歸入東省埠羡項下埔滷稅魚客情願又便於民應聽照行所有兩縣認繳銀共三千三百餘兩容臣照催完日題報歸入餉課項下再從前收取各官本應查究俯念事既久逺人已去任可否恩準寬免并應存應革之處臣冒昧奏請統祈皇上批示遵行謹奏治粵之本不在區區增益課羡為務除弊猶可切勿與民爭利能令吏畏民懷之後類此等事片紙申飭無不聽從也今於地方德意未孚官民尚未悉汝心行遽然計較瑣細安望其畏與懷耶志之汝等封疆大吏於斯曷可不慎至若他省則又當一論所以云因地制宜因人設教屬員中過者裁之不及者進之先之以訓誡繼之以激揚無心之誤恕之以寬既往有意之愆懲之以戒將來誠能如此未有不感服而畏懼者果皆感且畏矣則優者加勉劣者思奮何廢不興何政不舉若徒於案件上逐條逐款一一清釐殊失提綱挈領之道亦恐未必有如許精神力量將見此事方結彼案又起不勝其煩必至厭倦而後已究竟於吏治民生毫無裨益也從來有治人無治法地方得人始能就理汝於用人一節其勉之哉同日又奏為奏聞恭辦楠木黎民急公情形仰祈睿鑒事竊照粵省奉行採辦楠木一千一百根塊臣於到任後即備查卷案親加挑選將合式楠木敬謹收貯俟餘木辦全之日一併解送外至於未經採辦之楠木臣即檄行各地方官上緊採辦續據西寧新興陽江髙要等縣具報尋覓楠木株數候行查勘等語臣隨飛飭採辦楠木之廣南韶道李可淳星往確勘務須合式欽遵諭旨明白曉諭各該地方俱照時價公平購買運送赴厰以慿親驗又據布政司王士俊詳據瓊州府知府宗思聖報稱查得儋州黎岐地方産有油楠其質堅而滋潤經久不裂當即遵旨曉諭化誨照依時價公平購買黎人聽聞之下歡欣鼓舞踴躍急公各洞長黎人等公同開山採備其已修整成料并尚未修整者通共五百餘根塊臣思黎人逺居海外一聞採辦歡悅爭先仰見聖德廣被海隅黎夷咸知尊君親上之大義臣隨行該府作何奬賞以示鼓勵速覆去後續據宗思聖報稱所有採伐在山楠木正虞運送費重於九月初九初十兩日大雨得有大水楠木悉已出山生黎人等咸驚竒異口稱萬嵗洪福大雨隨時而沛合掌對天叩首歡欣鼓舞有生黎數十村寨情願歸入版圖同沾聖化卑府目擊輿情不敢阻抑統俟查明另行詳報等語本年正月初七日宗思聖來肇臣當即囑令該府務必加意撫綏并會同撫臣傅泰備給銀兩布匹等物即著宗思聖分賞黎夷宣揚帝德懷柔之至意并撥發船隻將瓊州府已辦楠木裝運到厰催令李可淳速將西寧等縣所報尋覓楠木確加查勘果否合式可用解送選驗仍行多方覓購務期足數外所有臣恭辦楠木緣由以及黎民急公情形理合具摺奏聞謹奏黎民急公情形欣悅覽之所以百凡宜先本而後末試觀滇黔諸務之能就緒者蓋緣本立之所致也假若風習未端營伍未整吏不畏民不懷將不思報國兵不肯用命而欲期事之集效之臻曷可得哉一切措施寧緩毋急諺云急行無好步緩事待人不遺後悔不得其人好事翻成誤舉大率如此可以類推第一要著務令文武屬員心悅誠服然此非機謀權術之所能得惟率以公忠孚以誠信而後方能感動其心也勉之同日又奏為聖德光昭卿雲逺見謹據輿情稟請題達事雍正八年正月初七日據潮州府揭陽縣稟稱雍正七年十二月二十二日辰時卑職見東方曉日初升有彩雲數十層近日青紅黃紫無不具備非霧非煙如錦如繡晶光四射輝映經時其時署外里民鋪戶踴躍歡呼共祝聖天子萬夀無疆隨據闔邑紳士商民人等具呈到縣理合繪圖具稟轉請具題以光聖治以慰輿情等因到臣臣思粵東濱海之區荷蒙我皇上大化宏敷厚生正德比年豐稔時和民安物阜月令正值嘉平慶雲現於揭邑是皆聖主孝治光昭之所致臣工黎庶無不仰戴天庥歡呼踴躍今據該縣具詳人民目睹歡頌情形呈請題達又據分防揭陽縣遊擊呈報前來臣不敢壅於上聞除行司查覆會疏具題外謹此繕摺奏聞伏乞睿鑒謹奏比年以來各省屢有卿雲現瑞之奏朕深疑之同日又奏為據實奏明事竊臣案查雍正七年十一月十七日準提臣王紹緒咨稱十一月初八日據惠州協副將鄂鼐呈稱卑職近因冒沾潮濕染成痪證惠州乃屬要地非病員所能料理相應呈請察核轉咨準題休致當經委員驗看取具親供印甘各結移咨前來臣復委員驗看正在備敘疏稿移會提臣接準部咨奉旨福州副都統員缺著鄂鼐補授臣欽遵即行知照并調赴肇慶親驗去後續據鄂鼐呈報卑職因病呈請休致後延醫調治重復藥劑日漸輕減今幸全愈理合遵檄赴驗隨於本年正月初二日到肇臣看鄂鼐行走如舊惟臉面瘦減委係初愈形狀伏讀雍正五年上諭外官告病督撫查明確實具題令其回籍調治痊可有情願起用者於本籍起文赴部引見仍以原缺補用欽遵在案今鄂鼐始因患病請休今病既痊可自應遵旨令其前赴新任除現在催令交代起程外臣查鄂鼐履厯內開年六十嵗雍正三年二月輪班引見今已過三年應否令其進京引見伏候聖旨敇遵臣謹據實奏明伏乞睿鑒謹奏鄂鼐已經升授為副都統乃代為奏請引見大錯矣況既令其交代赴任又欲令其進京何顛倒至於此耶同日又奏為遵旨奏聞事竊臣於上年六月初五日抵貴州督臣鄂爾泰為訪問廣東提臣王紹緒果否勝任之處密傳諭旨令臣到粵留心訪問試看如有不勝任處著臣奏聞欽此欽遵臣到任半載以來留心密訪提臣王紹緒馭兵嚴明軍伍整肅其辦理通省營伍事件亦無遺誤至題補水陸員辨無不慎重選擇奉職洵屬勤謹臣又訪聞該提臣自蒙皇上訓誡之後感激聖恩益加奮勵臣再當不時勸勉務期共竭公忠以報聖主知遇隆恩倘或改絃易轍臣訪聞的確即當奏聞斷斷不敢徇隱為此據實回奏伏乞睿鑒謹奏據奏如此朕省却幾許籌度矣仍竭力勸勉之同日又奏為欽奉上諭事本年正月初八日有奉旨補授惠州協副將繆𢎞抵肇隨到臣署云有聖旨臣即跪聽宣傳據稱雍正七年十一月二十六日繆𢎞蒙皇上召見飬心殿面奉安分之人恐到廣東布散流言愚民無知被其鼓惑大為風俗人心之害爾傳旨與督撫著用心密訪此項人或尚在廣東若有蹤迹根究務必訪獲其人如曾靜張熙之流言乃出於發遣廣西人犯之口幸而發覺早所以不難追問造言之人但亦不必招搖只留心暗訪若得其一二人亦好又聞廣東火耗米折俱重誠恐不便於民朕御極以來宵旰憂勤無刻不以民生為念即用人行政亦惟期有益於民生至維正之供不得不取之於民其火耗一切亦當定為畫一之制庶無纍於民間若一任有司輕重必有重耗殃民者甚非朕愛養元元至意又聞沿海窮民以漁為生每出海捕魚俱於鹽埠領票名曰乾標回水納銀名曰幫餉相習巳久皆出情願今聞鹽埠欲避乾標之名令漁船實在領鹽出口按船計數希圖多銷恐不便於窮民為督撫者此等處當細心體查務得其平使民生樂業庶不辜朕之任用一省事務全賴督撫公忠體國同心共濟方於地方有益且一省事歸一轍朕亦好辦理若各存意見將一省事分為兩途朕從何辦理如孔育珣楊文乾當時兩人雖無參奏形迹各人意見不同朕所以一同調來引見當引見時朕曉以大義反覆開導彼二人皆感激流涕誓願同心報國即回任後聞得伊等果然交往似乎相和邊海重地督撫相和是以朕心稍安不意楊文乾才故孔育珣盡變其所為當時楊文乾所行若非伊身為總督豈不能救正於生前楊文乾所行若是又豈可更變於死後人在即順之是以國事作人情可乎朕因此鄙薄其為人前日孔育珣引見時朕面斥其非伊惟有叩首認罪而已是伊之一生名節俱敗於此爾傳旨與督撫各存公忠為國之心公則無有不和即意見或稍有不同必不致大相逈別要知所辦者國事當以國事為重自然合而為一國以民為本凡有便於民生者商酌奏請施行伊等身為大吏當仰體朕心宣揚德意使邊海小民盡知尊君親上之義人心淳厚風俗丕變方不愧封疆之重寄若悠忽從事必致廢弛豈不辜負朕之任用爾將朕旨傳諭總督巡撫知之欽此欽遵臣恭聆聖訓益凛咫尺天威所有應查應禁事件臣現在悉心逐一辦理統容次第具奏外臣惟有與署撫臣傅泰矢公矢慎和衷相濟殫竭忠忱仰報高厚於萬一耳所有欽奉上諭緣由合先繕摺奏覆伏乞睿鑒謹奏覽繆𢎞所述之旨有是者有謬誤者此亦無大關繫處朕因伊赴粵之便偶然面諭令其告汝若係緊要諭旨自當特頒豈有命汝屬員口傳之理所奏知道了雍正八年三月十一日廣東總督臣郝玉麟謹奏為欽遵諭旨事本年正月十三日臣標把總齎捧硃批奏摺回肇臣跪讀諭旨荷蒙我皇上指示為治端本之要廣東人員偏黨之習但照楊文乾辦理事事與布政使王士俊商酌欽此伏查東省人員結黨一事臣到任後果聞人言臣因駐劄肇慶司道各員駐劄省城以及各府地方并有奉差未竣者會靣日少不曾深切談論其居心行事一時未能僃悉是以未敢遽行入告每於辦理之事留心查勘如王士俊才具練達辦事精明屬員之中俱不能及惟心術屬於隱微臣實不能看透未免疑似之間兹於二月初三日查勘圍基到省會商一切公事王士俊不時前來事事相商臣察其言論推其居心委屬明達有本之人誠如聖主明鑒秋毫不爽所論諸事與臣意見多相符合且深知楊文乾之立志存心臣恪遵聖諭事事與之相商辦理期其始終勿渝共圖報效仰副主知其題帶人員到粵之日臣當密行誡諭必不致被人詐誘入黨再臣密訪方願瑛實係反覆小人其狡詐情形近日粵省臣民已頗知覺並無代為稱寃者若有其人臣查明必據實奏聞決不敢容隱再奉硃批令臣試看開復新任副將繆𢎞容臣詳加試看另行奏聞又蒙敕臣留心訪察道員王璠并諭臣密問傅泰皇上硃批數次之諭旨與傅泰之奏陶正中于其珣如何之處傅泰俱一一向臣説知敬聽之下仰見我皇上察吏安民之至意臣仰沐天恩敢不悉心訪察諄切訓勉務期各員盡除積習以圖報效容臣一一訪實另行奏聞外所有欽遵諭旨緣由理合恭摺具奏伏乞睿鑒謹奏覽奏俱悉勉力效法鄂爾泰更務言行相符可也同日又奏為恭報續獲海洋盜首事竊臣前奏拏獲巨盜李奕揚等并供出積盜陳大樂王亞七梁國柱等各緣由一摺奉有硃批臣跪讀之下荷蒙我皇上訓勉周詳彌深兢惕不敢稍懈遵即飭行按察司研訊各犯嘯聚年月嚴緝逸盜取具確供詳報臣密訪得陳大樂等俱係積年劇盜潛聚於北峯黃陽各山抽剝搶劫為害地方隨飭委廣海寨守僃馮元密行緝拏去後於上年十一月內據恩平縣知縣姚孔鋅已將盜首王亞七拏獲兹於本年三月初五日據廣海寨遊擊報稱據守僃馮元呈報二月二十四日據線人陳已生探聽陳大樂同夥四人駕船一隻潛匿漕沖深灣隨帶兵前往擒拏一人跳水逃竄三人上岸奔逃守僃督兵追殺當獲盜夥三人一名陳大樂一名余文禮一名李蘭罩搜奪各器械并賊照帖一紙圖書等件外獲賊船一隻又據陳大樂供出夥黨大旗張亞八并跳水逃走賊黨混名陽江豬即遣撥目兵分頭追擒又據線人李雄等密稟案內賊首梁國柱潛匿新會古兜山隨撥外委千把胡廷佐等前去緝拏於本月二十五日拏獲梁國柱並據各兵在腰古山口卡及龜石地方拏獲陽江豬本名李亞三大旗張亞八該僃親自押解前來臣即當堂研審據陳大樂等供認先前在北峯山黃梁都古兜山地方同夥伴做歹事有十來年了抽剝船隻銀錢行劫商人貨物原有多遭事主姓名實不記得等語除押交按察司吊併先獲各犯細加確審究明在山嘯聚幾年行劫次數另行具奏查此案守僃馮元實心緝盜殊屬可嘉辨兵奮勇效力臣即分别當堂奬賞以示鼓勵一靣勒緝餘黨務獲并究外所有續獲劇盜緣由合先奏聞再照新會縣屬之北峯南峯二山界連新寧恩平開平各縣地方緊連外海山場極大樹木最多自來無業窮民就山砍伐樹木開厰燒炭以為生活因有炭厰以致匪類自霸為保厰嘯聚多人恣肆不法今欲盡行驅逐實於營業小民未便臣細加酌議查該山向有柴場一汛從前於香山新會廣海三營每年輪撥千把一員帶兵一百名前往駐防繼因營房倒塌廢弛已久實無汛兵防守以致姦匪得以托足肆無忌憚今臣現飭文武各官親行查勘該汛營房需用工料實數即為發價修整照依向例輪撥官兵駐防彈壓庶姦匪不得潛藏商民俱各寧謐矣事關地方情形一併陳奏伏乞皇上睿鑒謹奏既獲劇盜復撥汛防地方自可無虞朕嘉是覽之效力員辨仍當破格奬賞以示鼓勵同日又奏為恭請聖裁事竊廣東按察使樓儼信用革役蕭鳴一案經臣奏明奉旨樓儼必有失於覺察之處著解任來京其按察使員缺著廣東鹽運使黃文煒署理如能勝任著督撫具題請旨廣東鹽運使員缺郝玉麟等於道府內揀選具題蠧役蕭鳴強橫肆行目無法紀甚屬可惡著該撫嚴審定擬具奏該部知道欽此仰見我皇上於按察使鹽運使二缺慎重周詳務使人地相宜之至意查黃文煒蒙聖恩署理按察使事務聽斷詳明辦事努力惟是署篆無幾未敢草率入告容臣等再加詳察明白果否勝任另行具題請旨其廣東鹽運使一缺辦理五省鹽政所關最重蒙皇上命臣等於道府內揀選敢不矢公矢慎仰副聖懷臣等僃查道員或分巡海疆董修戰艦或督徵稅糧稽查驛站或現任要缺或人地不甚相宜均未便調補謹於知府內選有惠州府知府馮元方瓊州府知府宗思聖才具俱屬練達辦事亦各勤慎均堪膺監司之任此二員布政使王士俊亦力言其可臣郝玉麟會同署撫臣傅泰已另疏恭請皇上欽定一員則要缺得人鹽政實有裨益矣倘蒙聖恩俞允所遺員缺均屬緊要容臣等或於奉旨發往候補人員或於人地相宜員內揀選另行具題請旨遵行伏乞皇上睿鑒施行謹奏具題到日有旨廣東總督臣郝玉麟署巡撫臣傅泰謹奏為瀝陳辦銅下情懇祈亟賜籌畫事雍正八年二月十八日據廣州府知府吳騫等會詳稱竊查廣東上下兩運銅斤每年額辦五十五萬四千三百九十九斤本省並無開採近省又不産銅向來東洋銅斤來粵發賣近來東洋洋船俱進江浙海關並無片銅至粵是以康熙六十年準部文行令江浙二省分辦而江南承認獨辦五省之銅逮署江蘇撫院何天培以洋銅出産不敷奏請認辦三省而福建廣東於雍正三年仍舊採辦是時廣東鋪家尚有存貯銅斤可買繼後厯年承辦之員每罹參罰俱赴雲南買運萬里程途往回耽擱必經七八月始到廣東若從廣西以至滇粵接壤之百色春夏多瘴人不能行必俟霜降後方可往來江河險阻夫馬舟船之費不可勝計買回毛銅又須鎔化成條工匠炭火兼之折耗在在皆須賠墊部價銅斤每擔一十四兩五錢加入一切雜費儘力節省每擔必需十八九兩至二十兩不等每運賠墊之數不下一萬餘兩且自萬里買回勢不能依限解赴處分即至報效心殷補救無術種種下情伏望詳察亟賜裁畫庶下吏得以竭蹶辦理等情臣等當即批行布政司妥議去後隨據該司詳議前來臣等覆查銅斤關係鼓鑄承辦之員自當竭力趕辦以濟公務但採辦有難易之分購買有逺近之别現在目擊情形誠恐誤公臣等同布政司王士俊詳細斟酌查部定銅價每斤一錢四分五釐止可就近採買今逺赴買運實屬不敷可否仰懇皇上每年於部價之外恩賞協貼銀一萬兩以為上下兩運採買不敷之用此銀或於關羡鹽羡稅羡內支用臣等未敢擅便理合恭請聖裁至粵東距滇隔越三省買運銅斤往返動經半年有餘勢不能依限起運仰籲聖恩俯念粵東去滇遙逺與江浙等省就近採買者有間敕命部臣定議將粵東辦銅各員初參準其展限倘展限既滿之後起運遲延即照初參例議處稍寬數月之期俾得竭力報效感戴皇仁於億萬斯年矣又臣等據各府稟稱銅斤自滇採買轉復運至粵省始行鎔化十足銅條又自粵省起運進京往往姦匠於鎔銷之時暗中攙假銅色不足部驗仍有折耗轉輾周折更稽時日又多賠補若竟從滇起運進京設有銅色不足照例賠補可免重復虧折等語臣等細思此言似亦近理懇祈皇上併敕部臣議覆為此合詞繕摺具奏伏乞皇上睿鑒施行謹奏所奏已交該部詳議矣據此情形辦銅一事於粵東殊不相宜候部議覆到日有旨雍正八年三月二十六日廣東總督臣郝玉麟署巡撫臣傅泰謹奏為謹遵諭旨會議營制事宜仰祈睿鑒事雍正八年正月二十一日接到大學士公馬爾賽等寄字內開欽奉上諭著將王紹緒所奏四摺及怡親王等原議孔育珣後議爾等鈔録寄信交與廣東總督郝玉麟署巡撫傅泰秉公悉心詳議具奏欽此遵旨寄信前來等因欽此臣郝玉麟隨即赴省會同傅泰細閲各摺內事由看得粵省營制扼險據要聲勢聨絡相沿己久原未便輕議紛更是以怡親王等議將提臣王紹緒原奏更改營制事宜令臣等再行詳確定議臣等謹按地方形勢審度時宜詳加咨詢悉心籌畫固不敢急遽紛更以滋事亦不敢因循茍且以塞責伏查粵東僻處海隅荷蒙聖朝休養生息近來生聚日繁商賈輻輳倍於往昔其間營制似宜隨時酌改量為裒益庶緩急得宜輕重合度邊疆鞏固永享敉寧謹將提臣王紹緒原奏怡親王等前議及河道總督臣孔育珣後議秉公斟酌分别應行應止併臣等因地相度芻蕘管見另繕清摺覆奏恭候皇上採擇謹奏汝等此次所議甚屬詳悉妥協殊非草率塞責之論朕披閲之下深為嘉悅但事關更改營制重務候命廷臣再加確議奏覆有旨雍正八年五月十一日廣東總督臣郝玉麟謹奏為奏聞事本年四月初十日據瓊州鎮臣李順呈稱雍正八年三月十八日恭遇聖祖仁皇帝萬壽聖節文武各官共向龍亭公所恭申釐祝時當寅末卯初見東方祥雲朗現瑞氣高騰五彩繽紛一天金碧紅輪璀燦光華逈異是日正值操期官辨目兵齊集由卯厯辰共瞻良久士民人等環睹如林踴躍歡呼萬聲齊慶欽惟我皇上敬天法祖九州永享升平旰食宵衣萬邦咸臻郅治而且蠲租免賦閭閻浹髓淪肌是以川嶽星辰宇宙遍彰祥瑞顧兹瓊島天末孤懸內而黎岐蠻獞近多向化歸誠外而海口港門更復波恬浪息是皆聖祖在天之神靈昭鑒皇上孝思之無斁故爾感應海濵垂示靈異理合呈請題達等情到臣又據雷瓊道王璠瓊州府知府宗思聖瓊山縣知縣楊先椿各具詳報并轉據紳士耆老里民等呈稟前來臣不敢壅於上聞除行司查詳會疏另題外謹先繕摺奏聞伏乞皇上睿鑒謹奏慶雲適現於此日非尋常可比應具疏題奏同日又奏為密行奏聞事竊照廣東左翼鎮總兵官員缺荷蒙皇上將福建延平協副將李維揚補授該鎮於本年三月二十四日到任後隨至廣州省城見臣臣看李維揚年止四十五六聽其言語雖還明白觀其舉動不甚強健據稱足有風疾有時舉發步履微蹇等語臣查左翼一鎮兼轄副將四員大小十六營所轄地方有虎門澳門各險要洋靣為省城之屏藩山海之重鎮最關緊要必須精明強幹才略兼優始能勝任但該鎮甫經任事其辦事之處臣尚未確知不能懸定第察其舉動神情未免遲鈍應再試看能否勝任另行具奏今據臣所見情形理合據實奏聞伏乞睿鑒謹奏若確知有不勝任處即當一面委署一面奏聞何乃遊移其詞往返摺奏不顧貽誤重鎮耶同日又奏為據詳奏聞事本年五月初五日據陽春縣詳報四月二十九日嵗考童生有現任左翼鎮姪孫李國璧與該縣禮房買卷換錢爭論將盛水盅拍碎手有微傷誣指該房口咬率領李國璉等多人蜂擁縣堂毆打書辦該縣隨將禮房重責滿堂生童聽其指揮目無縣令竟欲自已行杖儒學巡檢屢勸不從將及二更衆方鬨然而出至次日清晨點名入場有童生汪武緯為攻冒籍將歐光啓打傷縣門槩行打碎復行罷考該縣宣示朝廷大典律例明條各童生始行赴考訖臣據詳當即批飭布按二司嚴提確審啓釁毁門及罷考各實情嚴行究擬去後又於本月初十日據封川縣詳稱奉行嵗試文武童生需用卷結卑職令紙戶照舊備刷成本令各童買交禮房彌封送印各童自買制刷者四百本有零其餘任造不堪爛紙卑職恐將來奉吊原卷致干駁結因將不堪之卷退出乃有藐法惡徒歐朝日梁性安等見其不用已卷於四月二十八日下晚公然進縣擒毆禮房書辦鬧至宅門拍案譁噪卑職隨即出堂將禮書鎖責再三慰諭勉強散出似此逞凶惡棍相應詳請嚴究等情據此臣亦批飭該司等秉公察審毋枉毋縱分別議詳會核外理合據實奏聞伏乞皇上睿鑒謹奏此事須援引豫省之例將尤甚者一二人置之重典庶幾革除陋習若照常法薄懲恐更滋長刁風但生殺大事所關甚重亦不可因奉朕一時之諭草率隨順而行也同日又奏為恭謝天恩事本年四月初八日臣標千總齎捧硃批奏摺到粵蒙皇上賜臣克食二匣臣跪迎至署恭設香案望闕叩頭祇受訖伏念臣知識短淺報效心殷措施愚拙仰荷聖主誨勉諄諄一應政事無不指示詳明恩豫造就臣惟朝夕佩誦聖訓欽遵辦理務期悉心盡力仰報主恩於萬一耳臣謹具摺奏謝伏乞睿鑒謹奏覽奏已悉但時刻母忘鄂爾泰之居官為人并伊所勸勉之言保汝一生用之不盡斷不至於大錯若遺忘一分即有一分之損縱目下不覺其損將來必為大害汝勉為之同日又奏為欽奉諭旨事竊臣前覆奏密陳痼弊一摺奉到硃批臣跪讀聖諭伏念人臣事君如子之事父凡屬同官即如昆季理當同心戮力始無厪君父之懷臣本年因會商公務在省兩月有餘見傅泰與祖秉圭雖無參商形迹而言語似各有芥蒂之處臣欽遵密旨不敢宣傳聖諭以臣已意互相規勸傅泰祖秉圭聞臣之言各有慚愧悔過之心至稅務係朝廷公事臣前經面諭各關口地方文武官辨協同巡查慎勿岐視并復檄行遵照在案臣斷不敢存彼此之見今後更當秉公照看仰副皇上誨勉之至意理合回奏伏乞睿鑒謹奏傅泰中平才具非宜粵撫之人已降旨調伊回京矣同日又奏為奏聞事竊粵東各屬銀銅錫厰奉文封禁臣到任後復檄飭地方文武嚴加防範上年冬間厯據肇慶府屬開建縣文武員辨稟稱該縣所屬之芋莢山在東西兩粵交界之處兩省共此一山俱産有金砂粵西現在委官開採有等遊手無藉之徒遂覬覦粵東界內礦砂每每暗行偷竊卑職等雖不時各差兵役巡查究恐不能禁絶相應稟報各等情臣隨酌撥辨兵協同分路巡查去後本年二月內臣赴省會商公事隨與撫臣傅泰布政使王士俊言及此事共相商酌委員前往確勘情形並驗礦砂虛實續據該委員稟稱於四月初二日到開建芋莢山細加查看果有礦砂隨雇覓本地村民開一壠口自初三日起至本月二十七日止將採出礦砂舂得淨金一百餘兩所費工銀二百餘兩該地方因有官兵巡查匪徒不敢竊取等語據此是所驗礦砂委有成效非他厰可比致匪類有偷竊之念巡防益須嚴密臣即飭將開試之隴口封閉所有舂驗礦金解交藩庫并差辨兵看守去訖至芋莢山金砂礦厰應否開採容臣遵旨會同鄂爾泰將封川開建二縣應𨽻東西二省何處管理之處悉心定議具題外另行奏請候旨遵行謹將查驗礦砂情形據實奏聞謹奏總之粵東開採一事萬不可行惟宜嚴禁稍若奉行不力即為溺職也朕頗風聞文官每欲借此圖利武員因不便破面查拏此語未審確否朕尚另有諭旨頒發且粵省文武不和實為第一惡習汝膺兼轄之責如不秉公罰懲此弊何由革除統率闔省者惟汝一人咎將誰卸耶留心誡飭務令調協勉之雍正八年八月二十六日廣東總督臣郝玉麟謹奏為遵旨覆奏事竊照廣東惠州協副將繆𢎞臣前奉硃批諭旨令臣留心試用俟有真知灼見時具奏以聞欽此欽遵臣看繆𢎞辦事好才具頗優營伍事務委能留心整飭實武臣中難得之員惟是為人稍覺偏執凡接待文僚先存彼此兩途之見其未經履任之先已見於言表逮到任後曾來兩次見臣臣已面為訓誡但察其才能厯練實屬去得近蒙天恩調補江寧城守副將仰見皇上明並日月無微不燭臣謹遵旨據實覆奏伏乞睿鑒謹奏朕灼見此人在粵無益所以調補别省試看同日又奏為奏聞事竊查觀風整俗使臣焦祈年巡察各屬地方於本年七月二十一日登舟渡海前赴瓊州寄橈海口候潮開行適於是夜二更陡起狂風波濤洶湧延至次日黎明所坐之船被風推至博漲炮臺邉擱於石上不能傍岸浪掀石撞船已破碎時經海安營遊擊錢志漢督令辨目周天方華等浮水力救隨即請起敇印并將使臣甫經扶掖離船而船已擊爛仰賴皇上洪福得於險迫之中尚獲保全所有隨從人等亦俱無恙臣據協營具報星即遣人前往使臣處問慰并行查奮勇拯救使臣之目兵到日以便奬賞以示鼓勵除擊碎船隻并淹沒兵丁顔顯郭必進曹興等三名容臣確查另疏題報外所有使臣渡海被水緣由理合奏聞謹奏覽奏知道了查明奮力拯救兵丁破格厚加賞賚可也同日又奏為奏明事竊臣前奏查驗礦砂情形一摺奉有硃批臣跪讀之下惶悚無地伏念臣以庸愚仰荷聖主洪恩由提督擢授總督任大責重圖報為難幸蒙皇上指示殷殷俾得有所遵循且屢蒙訓旨令臣以雲貴廣西督臣鄂爾泰為法夫以臣之才識固不敢望鄂爾泰之居心行事臣在滇日久實知之最詳服之最深如用人則隨才器使遇事則集思廣益大公為懷文武不分彼此至誠相感上下聮為一心不避嫌怨無隱無欺凡有膏澤下逮之處務必宣布天恩遇其栽培薦拔之人從不矜伐已德此皆鄂爾泰屢飭查禁前因開建縣之芋莢山為東西兩粵交界既經查試有驗不敢不為奏聞然亦未敢遽議開採至廣東文武聞從前原有不和之惡習自臣到任以來時加勸誡現今撫臣提臣以及司道各鎮之間亦仰遵聖訓罔敢挾私廢公兹奉硃批朂勉臣惟有欽遵諭旨將一切礦洞不時嚴行查禁并通􅊾文武各官和衷辦事如有挾私不和臣即據實嚴參請旨所有遵奉硃批緣由理合恭摺奏明伏乞皇上睿鑒謹奏此奏朕嘉悅覽之硃批諭旨卷二百十四之三欽定四庫全書硃批諭旨卷二百十四之四硃批郝玉麟奏摺雍正八年十一月初二日廣東總督臣郝玉麟謹奏為微臣戀主情殷恭請陛見用伸積悃事竊臣樗櫟庸材至愚極陋重沭殊恩􅍢刻難報上年臣於提督任內具摺奏請陛見欽奉硃批命臣速赴廣東總督新任到任料理一二年周悉地方情形之後再來面朕亦不為遲欽此欽遵今計臣到任以來巳經一載有餘仰賴皇上洪福比年收成豐稔現今米糧價值甚平凡海洋大盜山林匪類頗知斂迹惟是廣東地方山海交錯習氣相沿臣職任重大知識淺短必得跪聆聖訓俾臣有所遵循况臣受恩深重未獲一覲天顔臣犬馬之私何能自巳伏乞皇上鑒臣愚忱允臣所請準豫陛見臣即欽遵輕騎赴京叩仰天顔跪聆聖訓俾微臣依戀之誠得以稍慰而一切吏治民生之事亦得面請訓旨遵奉措施臣無任懇切待命之至伏乞睿鑒批示遵行謹奏粵東諸務尚多未經就理路途遙逺且不必來京但能效法鄂爾泰之居心行事勝如來京見朕也同日又奏為奏明事竊照前者逆賊曽靜狂悖無知仰蒙皇上如天之仁格外寬宥欽頒諭旨昭示中外俾令愚蒙之輩共曉然于大義臣欽遵聖旨通行刋刻頒發在案兹廣東修輯通志經布政使王士俊聘請浙江告養庶吉士魯曽煜董理其事據魯曽煜以所定志書稿就正于臣并向臣云諭旨內張熙口供有屈溫山集議論無不與逆書相合之語現修廣東志書纂輯從前文集有屈翁山其人恐即屈溫山等語臣正在密加察究間據逆賊屈翁山之子屈明洪現任惠來縣教諭赴廣州潮州二府出首伊故父翁山文外詩外等書語多悖逆投監認罪等情由布政使王士俊等詳報前來除會疏題參外事關逆賊私著逆書理合恭摺具奏伏乞睿鑒謹奏知道了曽靜既寬此亦當寬宥者雍正八年十二月初二日廣東總督臣郝玉麟謹奏為敬陳愚悃仰祈睿鑒事竊臣于本年十一月二十日接讀邸鈔知有滇省烏夷叛逆一事變起倉卒以致傷殘文武兵民臣實痛心切齒憤恨無極今督臣鄂爾泰既調三省官兵進𠞰諒兹釡底遊魂自當尅期而定臣愚陋淺識何敢越職妄瀆但臣在滇年久夷猓之情狀頗為熟悉凡有所知敢不冒陳愚悃伏查烏逆所恃惟在涼山大兵到日烏逆一經破敗必以涼山為竄匿之所倘涼賊拒而不納或擒而出獻事屬易結否則進𠞰機宜尤須斟酌查川省之兵與雲貴官兵相距尚逺逆賊既守各隘會兵非易則川貴官兵重在分勢夾攻而進𠞰全力惟藉滇兵督臣鄂爾泰節制三省勢難親厯行間臣自顧才雖謭劣而深受國恩涓埃莫報犬馬之私實難自巳况臣任雲南二十餘載熟悉夷情若得身厯行間加以鄂爾泰之指示臣仰仗天威必能𠞰平逆猓以報主知且夷性反覆不常善後尤關緊要臣亦可親厯其地相度情形與督撫諸臣商酌布置務期一勞永逸俾臣藉以仰報殊恩于萬一倘蒙俞允查臣巳具摺恭請陛見在先伏祈聖恩準臣赴京跪請聖訓面聆方略再往雲南料理軍務則臣所有面陳之事得以上達并臣依戀之私亦得以稍伸矣臣無任惶悚待命之至謹奏烏蒙事仰賴上天默佑業巳平復諸務俱經就緒爾殊屬多此一奏且識見亦甚卑鄙同日又奏為遊棍招搖據實奏聞仰乞聖鑒事竊查粵東鹽政流弊甚多商疲竈困臣是以事事奏請聖裁逐漸清釐整頓近亦稍有就緒商竈人等無不感戴皇仁急公承辦今年鹽足餉完毫無異議乃有江西遊棍皮應瑞者臣前聞其向曽作幕于本年正月內請其到署相幫及接見之下見其言論舉止膚浮輕躁聞其家眷現在廣城又現同刑部侍郎王朝恩之家人在連州行鹽恐其出入關防不便隨即婉辭伊即悻然别去九月間鹽道馮元方因公來肇稟云有江西人皮應瑞近日在省甚屬招搖宣言伊作一摺稿寄與舊東侍郎王朝恩代奏請借庫銀三十萬與商人今王侍郎寄信來説巳經具奏又聞伊向衆商云巳蒙皇上俞允以致各商聽信事事觀望等語臣一聞此言不勝駭異即諭鹽道嚴飭各商上緊轉輸毋得聽其狂言愚騙去後忽於十月內該棍復又到肇拜臣云有説話臣因其現在招搖不便相會託言辭去繼因臬司黃文煒公事來肇臣面問其事據云寄摺代奏之事果聞其説臣因巳經覆奏王朝恩條議鹽政一摺未奉聖諭不敢聲言豈意該棍以臣不令相會到處毁臣又見臣知而不問愈肆招搖且又揚言必再上摺等語并將摺稿鈔録令該棍商夥許紹祖交鹽道轉送臣看臣思此等膽玩棍徒若不早為懲警將來必致有壞鹽政除將皮應瑞飭行地方官暫行嚴加守候外事關宣露密摺臣不敢不據實奏聞伏乞皇上睿鑒施行謹奏此係棍徒中之尤者情狀甚屬可惡嚴拏審擬具奏以聞雍正九年二月二十一日廣東總督臣郝玉麟謹奏為奏請聖裁事竊查粵東地方山海交錯匪類最易出沒所在村莊以及緊要之處無不設立墩臺撥兵戍守但查向來修理營房墩臺等項責令附近居民料理並不動用公項雖設兵原以衛民在百姓修整營房墩臺以為兵丁守望之所亦屬分所宜然但百姓未免視為兵舍率多潦草塞責而兵丁又視為地方修整漫不經心粘補以致修整無休經時纍月兵民每起爭端不能依限完竣况營房為兵丁棲止之地若不即時修整則有露處之虞而工料出自里民若地方官稍不留心胥役人等又有侵漁之弊是營房等項令民人修理實有未便臣伏覩我皇上愛養兵民至周至渥且查山東等省修理墩臺等項俱于存公銀兩動支辦理所有粵省營房等項可否仰邀聖恩準于公用項下或雜款餘銀內動支分别衝僻蓋造瓦屋草房定以修葺年限則百姓無絲毫擾纍兵丁咸得及時棲宿地方獲藉巡防之實效兵民永戴浩蕩之皇恩矣臣因地方起見理合恭摺具奏伏乞皇上聖鑒施行謹奏公用銀兩原為地方公務而設據奏如是兩益兵民何靳而不為耶汝等計議妥協酌量行之雍正九年三月初九日廣東總督臣郝玉麟謹奏為海洋積盜悔罪投首奏明安插事竊照廣州府屬香山新會地方有百峯山及黃陽石橋等山袤延深密逼近海洋從前原有匪類聚匿時出洋面擾害商民臣到任後業巳委辨將盜首李奕揚及陳大樂等先後擒獲俱經奏明在案續又訪得尚有混名查面五即林兆榮者原係李奕揚舊夥盤踞百峰山為匪黨渠魁臣即諭令守僃馮元設法搜捕務盡剪除今據馮元稟稱奉諭帶領辨兵等入山搜探于本年正月二十日據效力李德賀功加張武等帶領林兆榮暨夥黨李亞壬葉永快李亞長林亞四黃亞二周成球等七人前來稟稱情願投首效力贖罪等語隨據該僃即押解到臣臣即親加研訊俱巳取有確供緣林兆榮等係大盜李奕揚夥黨是以從前多方緝捕今既經投首似應照例免罪安插妥協查向來所有撫丁或一二百名或𢾗十名曽經奉旨分發直𨽻等省食糧入伍兹林兆榮等久匿山中路徑熟悉蹤迹稔知倘遇匪徒潛匿可用為嚮𨗳以資緝捕且人數無多分撥約束亦不至有彼此勾引之弊此臣愚昧之見可否留於本省派撥營伍令其效力之處理合具摺奏請睿裁伏乞聖鑒謹奏既據奏稱可資緝捕林兆榮等準留督標效力行走雍正九年八月初八日廣東總督革職留任臣郝玉麟謹奏為奏明酌設緝私巡丁以専責成以裕課稅事竊照廣西一省鹽務雖額輕引少官運官銷易於辦理然亦須私鹽斂迹充斥無虞始於課稅有禆臣查西省引鹽一由廣東省河轉運至梧州府上倉一由廣東廉州府轉運至廣西江口中屯地方上倉兩處水路臣巳屢飭各該地方守口盤查人員實力稽察近日一應運鹽船户以及往來各項船隻俱不敢夾帶影射惟廣東之髙廉二府場地零星綿延𣪚漫竈曬走漏極多最難稽查又因界連廣西私販悉由陸路挑載一路衝入廣西南寧一帶蔓延思恩太平及賔州各屬一路衝入廣西鬱林等州縣蔓延梧潯兩府各屬地方動輒百十成羣逾山越嶺各州縣捕巡人役無幾莫敢堵擒臣查此等私梟原屬烏合不難堵截總緣事無専責以致橫行無忌臣現在飭行西省鹽道另募壯健巡丁一百名擬於臣標専派外委千把二員前往率領分為二路各於私鹽衝入去處駐劄晝夜巡查堵禦聽西省鹽道約束調遣并咨移西省轉飭各地方文武嚴飭汛守辨兵地方鄉練會同稽查倘遇私梟充斥協同巡鹽辨丁奮勇擒拏接應將所獲私鹽一半給賞一半充餉則私梟自可斂迹不獨官引易銷地方亦可藉以寧謐至於所募巡丁工食并千把盤費每年總於西省鹽餘內支用開銷無容動支正項臣因調劑鹽務地方起見事關動支鹽餘差委標辨赴西省巡查理合具摺奏聞伏乞皇上睿鑒施行謹奏此乃因地制宜通融辦理事務在汝斟酌為之如應達部咨部存案同日又奏為酌劑廣西鹽務裕課便民仰乞聖裁事竊查廣西引鹽經臣奏請革去辦商名色専責各地方官辦理一應鹽斤俱係該鹽道差委員役由廣東省河運至西省梧州府以及廉州各場運至廣西江口上倉存貯聽各地方官陸續領運行銷必得梧州江口倉鹽豐足無缺方可源源配兊及時運銷則民食無誤課亦易辦若遇雨水偶多場鹽少産或海運風信不常廣東省河鹽少則梧州倉鹽不繼各地方官不能及時領運不獨有誤民食因而課稅亦遲臣查廣西向有稱頭餘鹽一項若行銷迅速每年可獲餘羡銀一萬三四千兩不等名為鹽餘除每年提解一萬兩歸入廣東京羡項下報解歸公外尚可餘銀三四千兩以僃鹽船邅風失水賠補之需經臣於廣西撫臣金鉷請動鹽餘銀兩幫貼塘站工食案內奏明在案今查數年以來至雍正八年嵗底止除一切支用之外巳積有一萬六百餘兩現在道庫實屬羡餘無事支用又係厯年湊積之項久久不無牽混臣請將此項銀兩飭行廣西鹽道在廣東省河以及廉州府於西省額引之外另買鹽二萬四千包運至梧州府并江口兩處上倉存貯凡遇西省引鹽遲缺之時即將此項存鹽及時配發行銷俟引鹽運到即扺還存貯永為西省預僃鹽斤附入奏銷即遇鹽道升遷事故一體交代則西省無缺配之虞居民無淡食之慮稅課易辦官無重纍國計民生甚有禆益其一應鹽價運腳以及添蓋倉厫等費即於前項現存銀內支用經臣檄行廣西鹽道查議去後旋據覆稱實屬妥便可行但買鹽二萬四千包為數甚多挽運不易而現存之銀尚不敷用請每年買運八千包分作三年買足其不敷之銀總於雍正八年後鹽餘內添用等由到臣事關預僃鹽斤臣未敢擅便理合奏請聖裁批示倘蒙俞允臣當恭疏具題為此謹奏似此裕課便民應行事宜何故不允具疏題請可也雍正九年九月二十八日廣東總督革職留任臣郝玉麟謹奏為密拏逃盜事雍正九年九月二十六日臣因公在省據廣州城守副將毛克明赴臣行署密稟本日午刻有湖廣差官毛峻德到職衙門説稱奉湖廣總督差拏行劫江西官署盜犯沈二前解至湖廣孝感縣楊店地方脫逃奉旨嚴拏今追緝來廣查有蹤迹懇請撥差官兵協拏執有湖廣邁總督委令密拏印信牌文經職驗明合行密稟等因臣隨諭該副將帶領辨兵親往協拏務期弋獲嗣據毛克明稟稱逸盜沈二經地方文武官辨兵役同楚省差員人等追緝至桑園地面協力擒拏該犯竟敢持械拒捕衆人奮勇圍擒始得就縳并拏獲隨行王姓一犯又跟隨沈二之小子二鎖兒一名并行李衣服物件一併押交番禺縣收禁等語隨據該縣訊取各供詳報前來臣即批按察司再行確審供情嚴加肘鎖差委辨員多撥兵役協同楚省員役咨解湖廣督臣邁柱外理合恭摺奏聞謹奏緝獲要犯可嘉嚴行押解方不致有再逸之虞雍正九年十月二十二日廣東總督革職留任臣郝玉麟巡撫臣鄂彌達謹奏為奏聞事竊照粵東風俗輕悍民多愚頑臣等每於屬員因公謁見諭令不時察訪毋使姦匪潛為不法詎有饒平縣巳革武舉余貌先因窩賊犯案經潮州府通詳革究余貌仍於本年九月初二日夥同陳阿幼等在海陽縣屬之歸仁都橫溪鄉託稱拜父母會歃血結盟煽惑愚民以致聨界之揭陽縣河婆地方居民驚恐逃避當經地方官曉諭各巳安業隨據海陽縣知縣張士璉訪聞經文武官辨陸續拏獲余貌等一十三人訊據供認糾黨欲圖劫害官衙以泄私忿等因稟報前來臣等恐有别情適潮州府知府胡恂因公在省即令其星馳回郡料理出示安慰一面行司轉飭究訊去後兹據該縣稟報隔别研訊始據各犯供係余貌為首令陳阿幼等糾合會盟方行招致即為發覺等語臣等查此等匪類𣪚布流言煽惑愚民雖不足深信但事關歃血結盟此外有無通同匪類亦未可定若不親加嚴訊恐無辜者或有株纍而姦徒或致漏網隨會差官辨遍示軍民人等如有首犯余貌挾讎妄扳者槩行不究加意安撫以慰人心一面多撥兵役將余貌等提至省城會同觀風整俗使暨布按二司研審實情究明黨數另行請旨外現今地方寧謐人民安堵理合據實先為奏聞伏乞皇上睿鑒謹奏凡遇此等事件萬不可疏懈馴至養姦遺患假若稍存姑息之念希圖茍且結案以為能化大事作小事則誤矣但毋波纍無辜為要雍正十年二月十二日廣東總督革職留任臣郝玉麟謹奏為通核息銀數目酌議分給協營恭請聖裁指示欽遵事竊照廣東兵丁仰沭聖朝豢養洪恩足糧足餉咸登袵席乃復蒙我皇上垂念各兵吉凶之事不無所需敕發帑銀賞給營運生息以濟其用除駐防八旗甲兵外督撫提鎮各標又蒙恩賞帑本銀一十萬兩實亘古未有之曠典臣身膺全省之任自當悉行籌畫務祈均沾天澤以垂永久查廣東通省緑旗額兵共七萬二千六百零四名內督撫提鎮兵二萬五千八百零二名又將軍標暨十四協三十五營寨共兵四萬六千八百零二名臣標原領帑本一萬八千兩借給鹽商每月每兩二分起息先自雍正七年十一月起至九年十二月底臣標共獲息銀并原存平餘共一萬三百四十餘兩前計息銀巳經豐裕經臣具摺奏明於雍正九年正月起開賞至本年十二月底共賞過各兵吉凶事銀一千六百一十四兩外存帑本并餘剩息銀共二萬六千七百三十兩零撫標原領帑本六千兩據該中軍册報自雍正七年十一月起借給鹽商至九年十二月底共獲息銀并原存平餘共三千四百九十兩自雍正九年正月起至年底共賞過各兵吉凶事銀五百兩外存帑本并餘剩息銀共八千九百九十兩零提標原領帑本一萬八千兩據該中軍册報自雍正七年九月起借給鹽商至九年七月得獲息銀共一萬一千一百九十七兩自雍正七年十月開賞起至九年十二月底賞過各兵吉凶事銀七百三十八兩零又動支開張當鋪錢店銀八千五百二十餘兩現存貯帑本并餘剩息銀共一萬九千九百三十兩零左翼右翼碣石潮州髙州瓊州南澳七鎮原共領過帑本五萬八千兩案據各鎮報稱或借給鹽商或開張當鋪或置買田産營運生息之處或每兩二分或二分有零不等經臣據議題報在案現今行查息銀實數統於造報到日彚核外伏查臣標額兵四千五百零三名一年賞銀止一千六百一十四兩撫標額兵一千四百三十名一年賞銀止五百兩提標額兵四千三百九十七名一年有餘賞銀止七百三十八兩據此臣通盤核算即以臣標為之凖則各協營俱照此一例核算每年通省兵丁只共約需賞銀二萬五千七百餘兩今督撫提鎮各標巳現有帑本并餘剩息銀共一十二萬二千一百七十兩零通以二分生息計算每年已約可獲息銀二萬九千三百餘兩儘將所獲息銀均勻𣪚給則各兵巳得均沐恩賞不須再給帑本致年久或有侵那之弊臣愚見本年各鎮所獲息銀除行令仿照臣等標兵賞數酌量存留該鎮給賞之外悉于年底造具清册定限次年正月內同餘剩息銀解赴藩司衙門臣亦將本標并撫提二標餘剩息銀一併湊入按照各協營寨兵數之多寡均勻分給令該營將領收貯即於雍正癸丑年開賞以濟各兵吉凶之用年底造報臣衙門查考彚册報部如此則事得畫一皇上恩澤普垂久逺矣臣與撫臣鄂彌達再四籌畫意見相同謹合詞繕摺奏請聖裁如蒙俞允容臣另疏具題為此謹奏料理甚屬妥協候另有諭旨頒發雍正十年二月十九日廣東總督革職留任臣郝玉麟謹奏為海疆關係緊要酌擬升調之員恭懇聖恩以禆地方營伍事竊照粵東濵臨大海水師員辨較陸路尤為緊要兹有春江協副將陳顯患病不能辦理營務經臣委員驗實現在題報所有該協員缺係屬水陸専營副將必得熟識水性辦事勇敢之員始克勝任查有南澳鎮屬澄海協副將許大猷練水性船務辦事實心堪以調補春江協副將其澄海協副將員缺查有大鵬營恭將許國騰練習舟師馭兵有方堪以升補澄海協副將其大鵬營恭將員缺查有海安營逰擊錢志漢吳川營逰擊蔡文升俱係諳練水師勤幹之員經前任督臣孔育珣保送業蒙恩準在案仰懇皇上於此二員內簡放一員升補大鵬營參將則各協營均收得人之效矣臣因海疆地方關係緊要不揣冒昧據實奏請可否升調洪恩出自聖裁謹奏覽奏俱悉內惟錢志漢不似有膽量之人蔡文升雖心胸明白才具好頗欠誠實皆非朕所深取者今命爾赴閩署理總督印務可傳旨與鄂彌達令伊於此二員中檢選一員題補大鵬營參將可也雍正十年四月初六日廣東總督革職留任臣郝玉麟謹奏為聖恩愈厚感激愈深恭摺奏謝仰請訓諭事竊臣一介庸愚荷蒙皇上洪恩畀以廣東總督重任三載於兹涓埃莫報悚惕之懷時深朝夕兹奉恩綸命臣署理福建總督印務聞命自天感激無地伏念閩省前距澎臺諸島後係三吳門户實為邉海要區臣以庸材恭膺簡命惟有實心實力無欺無隱凡屬地方事務細加詳察敬謹辦理但臣知識淺陋福建地方緊要仰求皇上天恩俯賜訓示俾臣少抒犬馬之誠仰報髙深於萬一耳臣即於本月初六日起程赴閩外所有臣感激下悃理合恭摺奏謝伏乞睿鑒謹奏但能勉法鄂爾泰之居心更有何可訓諭竭力為之莫負朕之倚任同日又奏為奏聞事竊臣庸陋下材膺受封疆重任今又荷蒙聖恩著臣署理福建總督印務臣益兢兢惕勵敢不竭盡駑駘力圖仰報前因臺灣土番不靖拒敵官兵臣以閩省接壤緩急宜防檄令近界員辨留心探訪併檄飭沿海鎮協各營多撥遊巡密加防範嗣陸續據報凶番猖獗官兵屢被殺傷臺鎮總兵官吕瑞麟於二月初六日遣岸裡後壠二社土官齎帶元寶瑪瑙珠眉額綾襖等物前往招撫初七日阿里史牛罵土番在犁頭莊截途殺死挑販數人淡水路不通等由到臣臣探得凶番實無多人原不足慮但聞臺地客民雜處每多作姦煽惑自應懾以軍威速為殄滅安撫善良俾凶番咸知凛遵國法若未經大振軍威使其畏威懷德遽行招撫茍且完事似非奠安海疆之策臣查厦門距臺甚近一切軍機事務便可料理臣今由漳州一路先到厦門面詢提臣許良彬細訪一切情形事宜如凶番巳就擒縳臣即赴福州駐劄衙門辦事若凶番尚在未靖臣即一面相機斟酌料理務期仰體聖心悉心籌畫寧謐地方稍圖報效於萬一耳為此恭摺奏明伏乞皇上睿鑒謹奏汝其酌量行之雍正十年五月初七日署福建總督臣郝玉麟謹奏為臺疆安帖情形仰祈睿鑒事竊臣荷蒙皇上命署福建總督印務於四月初六日自粵起程因屢聞臺灣土番不法戕害官兵當經恭摺奏明先赴厦門就近相機料理隨抵漳州府地方詢問文武各員僉稱臺地尚在未靖臣即於四月二十八日渡海到厦據提臣許良彬僃言臺匪情事並云準升任鎮臣王郡移請撥兵隨經檄調辨兵赴臺䇿應署督臣阿爾賽亦檄撥兵二百名赴臺應用又見厦門商民亦多驚惶并經酌撥兵丁分行防範等語臣查土番原無足慮竊恐姦民乘間煽惑致使地方不安必須嚴加防禦隨與提臣細加籌畫酌撥陸路辨兵赴臺候調並嚴飭水陸泛防加意巡緝兹於五月初四日接到提臣王郡致署督臣阿爾賽雙羽公文一角臣拆閲內開南路姦民一事起於鳳山縣濁水溪阿猴林等處三月二十九日賊到岡山汛與兵大殺三十日賊焚舊社四月初一日焚石井猴洞豎旗招匪旗寫大明等字樣初二初三攻打埤頭營盤燒燬萬丹巡檢衙署本職隨親帶辨兵赴舊社岡山等處率同辨兵殺賊大敗守僃張玊外委千總陳學聖外委把總鄭光𢎞兵丁陳得添等八名奮勇陳亡本職於初六日回府現在賊散民安擒獲首賊蕭田等便宜正法餘孽正在搜捕惟吳福生一犯尚在懸賞購緝土番各社俱巳就撫止有大甲西首犯罪在不宥分别辦理是北路勦撫頗有就緒南路小醜撲滅巳經蕩平并止署督臣阿爾賽所撥兵丁不必過臺等語此皆皇上恩威逺播姦匪就擒地方巳獲寧謐臣隨致劄提臣王郡務將未獲凶番姦匪料理妥協使海疆得以永靖至王郡既止署督臣阿爾賽所撥兵丁不必過臺臣與提臣所撥兵丁隨檄行緩發去訖臣又接臺灣府報文本年自春以來少有霖雨今四月初七八九等日府屬臺灣諸羅鳳山三縣時雨霑足早禾雜糧芒蔗咸皆茂盛民心歡恱彰化得雨情形現在飭查等語臣閲報文不勝為臺海兵民欣幸仰沭皇上洪福於無疆矣除南北兩路啓釁緣由容臣細查諸案分别具題外切念臺地被難民番亟宜撫綏安輯出征辨兵亟宜犒勞陳亡帶傷辨兵尢宜優恤義民亦當奬勵臣謹宣揚聖恩現在逐一料理以示勸勉并行令臺灣府酌動庫項一千兩分交提臣王郡鎮臣吕瑞麟以為行間賞恤之用事竣開報會奪現在沿海一帶民人聞知臺地巳經寧謐之信兼有多船裝載米糧赴內地糶賣厦門地方米價甚平人民安堵臣謹將準到提臣王郡知會臺灣安帖情形會同水師提臣許良彬恭摺合詞奏聞伏乞皇上睿鑒謹奏覽臺郡安帖情形朕懷深慰雍正十年五月二十九日署福建總督臣郝玉麟謹奏為欽奉上諭事本年四月十二日署督臣將軍阿爾賽任內準兵部咨開雍正十年三月初十日內閣奉上諭前降旨令將福建兵丁內藤牌手挑選五百名分送京師及北直陕西山西三省以僃教習之用昨據總督劉世明奏報所挑牌手巳於二月內令其起程等語朕思此挑選兵丁所遺額缺理應召募技勇精熟之人即行充補以實營伍著傳諭署總督郝玉麟等遵照辦理欽此臣于本年五月二十四日到臣福州駐劄衙門隨查此項挑選藤牌兵丁五百名所遺額缺前署督臣業經欽遵上諭檄行各標鎮協營召募技勇精熟之人充補在案臣思此項挑選兵丁分送京師及北直陕西山西三省乃係勤勞王事逺出教習之人原籍各有家口未免內顧分心臣仰體皇上天恩現在熟籌安頓其家口俾逺出兵丁可以無慮謹具摺奏聞伏乞睿鑒謹奏安頓藤牌兵丁家口之處前經阿爾賽議奏甚屬妥協巳有旨矣可照行之雍正十年閏五月二十四日署福建總督臣郝玉麟謹奏為彚報二麥巳獲豐收早稻旋登大有據實奏聞事竊臣奉命到閩之日適值二麥收成之後巳據各屬報稱十分九分八分不等兹據布政司劉藩長彚報通省二麥收成分數臣查今年泉漳二府種麥最廣其收成十分者居多而八九分者間有一二處福興二府福寧一州種麥亦多其收成十分九分八分者各居其半若延建邵汀四府上遊之地宜於禾稻種麥者少收成七八分不等臺灣海外不種二麥然通省雨暘時若是以青黃不接之時米榖價平民食充裕至現在之早稻秀實可觀臣到省連日郊外勸農即據農人僉稱今年早稻茂盛倍於往時今巳將次收穫可望豐登臣隨查通省早稻情形據各屬所報亦與省城倣佛無異理合恭摺奏聞伏乞皇上睿鑒謹奏覽二麥豐收並早稻茂盛情形不禁以手加額為閩民稱慶也同日又奏為海疆教化宜先頑民管轄宜近謹陳漳南地界情形酌議分駐改轄事竊臣粵東受命署理福建總督印務訪聞福建漳泉地方多有巨姓自恃族大丁繁往往以強欺弱抗糧毆差械鬭匿犯種種不法官吏坐受處分鞭長莫及逮臣由粵入閩即從詔安平和等縣直至漳州府一路細加查問文武屬員僉稱惡習仍然未除復據漳州府稟稱平和縣南勝五寨坂仔洋頭等處大姓聚族環居列處每因小事動輒黨衆列械互鬭殺人竟同兒戲至南靖縣車田地方離縣甚逺俗悍民刁遇事緝犯亦俱抗匿不出前經卑府審度風土情形議將本府同知移駐南勝彈壓其南靖之車田割歸漳浦縣管轄通詳在案等因到臣臣隨查漳州府通詳原案內稱平和縣南勝地方離縣一百五十里附近五寨洋頭坂仔琯溪山隔黃井翠微三坪透龍等處民居稠密楊林胡賴葉陳張李蔡黃諸姓環列聚居且墟場雜沓厯來逋糧械鬭毆差匿犯事案疊積議撥漳州府同知分駐彈壓其地又稱南靖縣車田地方共一十五保離縣一百五十里東至漳浦縣城止一十五里其凶惡刁悍無異平和南勝等鄊議將車田十五保之田園丁口錢糧等項割歸漳浦縣就近管轄由司道會核轉詳在案臣思欲整刁悍宜先化𨗳查漳州府同知無錢糧刑名之任惟有海防之責今分駐南勝實居浦靖和詔四邑之中就近化𨗳彈壓并理海防事務每於朔望宣講上諭督率各耆民并家族房長朝夕訓誡涵濡嵗月久久自能移易甚為妥便至于車田地方丁糧田土割歸漳浦縣就近管理尤為便利詢及司道咸稱亟須變通除會同撫臣趙國麟恭疏具題外所有酌議分駐改轄緣由理合具摺奏聞伏乞睿鑒謹奏覽奏將南靖所屬車田地方割歸漳浦并將同知移駐南勝彈壓等議俱屬合宜具題到日有旨但此同知務須得人方始有益當慎加選用為要同日又奏為恭懇聖恩事雍正十年四月二十九日署督臣阿爾賽準兵部咨開本年三月二十一日欽奉通飭營伍革除空糧陋規諸弊上諭一道當即欽遵移行各標鎮協營去後兹臣準水師提臣許良彬咨開各標鎮協營每兵百名前經會奏存留守糧三名以為修理軍械及營中公事之用今伏讀上諭有營伍公用無資定有額兵百名準抽二名之諭旨今應否改為二名抑或仍照原奏存留三名咨請示覆等因到臣臣查閩省邉海重地各營公務繁多水師又有燂洗戰船等費前經提臣石雲倬督臣髙其倬提臣藍廷珍先後奏請水陸各標鎮協營每兵百名存留守糧三名以為整頓軍裝之用仰蒙聖恩俞允欽遵在案臣自粵入閩一路觀看營伍盔甲旗械名雖齊僃但內中多有舊敝鎗械亦覺參差不一亟宜修整以壯邉海軍容且年年操演鎗炮製僃火藥暨營伍一切公事所需均係公糧三名內支用所有閩省現今存留公糧仰懇皇上天恩應否賞照原存三名之數以濟修理軍裝等用洪恩出自聖裁如蒙俞允臣仍不時嚴行稽察務使核實辦理不得少有虛冒俟軍裝鎗械整齊完日臣核定公糧名數另摺請旨遵行為此恭摺具奏伏乞皇上睿鑒施行謹奏此事與阿爾賽商酌定議行之雍正十年六月二十日署福建總督臣郝玉麟謹奏為奏明事竊臣抵福建署任後據臣標中軍副將王振稟繳閏五月分馬兵六十分餉銀到臣據稱此係總督衙門隨糧即在督標三營額兵名數之內厯來按月呈繳以聽隨丁補入臣復詢問既係馬糧馬匹現在何處據稱相沿止繳餉銀實無流交馬匹細查並無案卷不知起於何年等語臣當將所交銀兩仍發王振收貯留為公用外伏查馬糧六十分一年約有銀二千餘兩雖係向來督臣衙門相傳舊例臣思從前未定養廉或留充為養贍家口之用今巳蒙聖恩賞給養廉銀一萬六千兩之多一切用費實屬充裕此項馬糧即應隨時招補惟是招補必須連馬併發今既無馬又無馬價計此六十匹營馬需銀一千三百有零實無項可動既不便令官賠補更不便令兵自僃臣再四思維查閩省邉海重地兵額不便虛曠雍正八年內經前任督臣劉世明題準臣標添設水師一營即於本標撥出陸兵七百五十名外於水師提標并閩安協調出趕繒船四隻將原配兵丁共一百五十名即為新設水師教習仍支各原處糧餉原議臣標兵丁內如有缺出即令教習兵丁照依原糧頂補自設立迄今兩載以來十分之中頂補未滿一分以致提標閩安二處額兵懸曠日久至今尚有未補戰守兵糧一百三十七名臣愚昧之見將此六十分馬糧裁改戰守兵糧補足添設原額統歸水師營管轄則兵缺不致虛曠哨巡亦免貽誤矣事關馬糧改步倘蒙俞允臣照例具題請旨遵行但臣愚昧淺見是否可行恭候聖主批示伏乞睿鑒謹奏所奏嘉是覽之前劉世明到京朕觀其人甚不妥協尚未料如此負心伊任內一切不及之處毋得代為隱諱悉行據實奏聞同日又奏為奏聞事竊照臺灣北路凶番糾衆復行猖獗據總兵吕瑞麟請迅發內地水陸兵三千名前赴聽調經臣與提臣許良彬署提臣阿爾賽檄調齊僃并將番匪情形及臣移咨提臣王郡親赴軍前調回總兵吕瑞麟禦防府治各緣由逐一具奏在案隨據軍前稟報拏獲逆番元凶大武釐姦匪溫賜等犯又據臺灣道倪象愷稟稱番逆漢姦乘前撤兵之際復起邪謀欲稱番王煽惑各社觀望效尤附近居民不獲安業兵民被害者甚多經訪拏謡言惑衆假番放火殺人之林育黃龍等杖斃漸見寧貼有近山百姓田禾布野懼番擾害不敢歸莊守僃林元稟報沙轆等社凶番聚黨數百前往中港地方擁搶港中生理船二隻殺死船上人六七名燒燬南日營盤官兵放鎗打死凶番四名餘番始𣪚又準提臣許良彬咨開準臺灣道咨呈諸羅縣莊民傅玉琳等稟縣水沙連社番酗酒意要作歹請預為防範隨咨王提督撥兵馳防又據臣差探稟報凶番聽得內地大兵將到踞沙轆地方海防廳舊署為穴砍竹圍柵中起望樓不時執旗逰巡等語臣查土番本無能為總因漢姦煽惑指使效尤不法荼毒地方擾害良民罪大惡極今據報官兵船隻即時各得順風開駕安渡重洋俱巳陸續到臺仰仗皇上天威百姓得以安堵接提臣王郡來字云臺地夏秋多有雨水九十月間進𠞰一鼓可得俟到行營相機變通不敢拘滯現在先委恭將李蔭樾統領大兵馳赴北路等語臣查臺地南北二路遼濶各要隘處務期密行布防使番逆無可逃竄隨劄囑王郡并嚴飭臺灣道府遣撥兵壯衛護民人令各歸莊收穫去訖再查臺灣道倪象愷人雖稍有才具而性情偏執與衆不睦不便留於軍前臣一面檄調該道即回府治料理地方事務一面會商撫臣趙國麟暨布按二司詳加選委署淡水同知尹士俍前赴北路軍營接辦一切事務著聽王郡指示所有土番近日情形臣謹繕摺奏聞伏乞皇上睿鑒謹奏覽奏逆番情形知道了詳慎辦理毋忽同日又奏為奏請添設鳥鎗額數以資捍衛事竊查雍正六年六月內經兵部會議沿海省分每兵一千名設立鳥鎗四百桿續經前督臣髙其倬於恭懇聖恩等事案內酌議陸路各營兵丁器械每兵一千名設立鳥鎗五百桿水師大小趕繒艍船按照配兵名數酌添排鎗數目具疏題請部議陸路每兵一千名設立鳥鎗五百桿與定例數目不符水師船隻兵數器械視船之大小酌量配撥應如所請設立應用等因在案臣查閩省地方山海交錯水路則海面遼濶巡緝姦艘應須嚴謹陸路則山深林密人民獷悍尤資捍禦鳥鎗一項水陸均屬利用臣前在廣東總督任內曽經會疏題請陸營每兵一千名應添鳥鎗一百桿共為五百桿巳蒙俞允部覆準行所有閩省陸路各標鎮協營需用鳥鎗相應仰懇皇上天恩俯照粵省之例每兵一千名於定例鳥鎗四百桿之外請添設鳥鎗一百桿共為五百桿於營伍地方實有禆益臣案查前督臣髙其倬兩次題請陸路添設鳥鎗之處部覆未允臣是以未敢冒昧會題謹據實具奏叩懇聖恩批示遵行謹奏照此具疏題來朕降旨準行先即一面預為製造候部文到日遵奉按營添設可也雍正十年七月二十六日署福建總督臣郝玉麟謹奏為調補臺澎之武職仰懇聖恩準照舊例附支俸薪以資日用事竊照閩省臺灣澎湖二處路隔重洋逺在海外從前凡由內地調補臺澎武職雖未經接授新劄仍在原營附支俸薪以資日用每年彚册奏報在案兹據福州城守副將馬召南稟稱有右軍守僃彭捷於雍正九年四月調補臺灣鎮右營守僃本年八月始行領劄在舊任附支過俸乾銀三十八兩有竒右軍千總黃起龍於雍正九年正月調補臺灣北路營千總本年八月始行領劄在舊任附支過俸乾銀四十一兩有竒該僃辨俱現在臺地藩司因近今不準附支無可著追就近在卑職營內七月分兵餉一併扣去還項現在措處𣪚給懇祈追還等語臣查閩省調補臺澎員辨因其人材可用方行揀選任以海外要地若俟接授新劄始支俸薪則周年半載之中該員所遺內地家口養贍以及辦公日用均無所資未免有艱窘之虞臣愚見除調補內地之武職仍照定例遵行外其調補臺澎員辨可否仰懇皇仁賞照舊例附支俸薪以濟日用俟接授新劄即於新任起支其從前巳經附支者免其追繳洪恩出自聖裁各員辨感激天恩自當倍加奮勵益圖報效矣為此謹奏此奏甚是候另旨諭部同日又奏為遵旨覆奏事本年七月二十三日準兵部寄到內閣大學士臣鄂爾泰等欽奉上諭據福州將軍阿爾賽奏稱臺灣地方甚屬緊要鎮臣吕瑞麟熟諳水務置之內地固為勤慎之員而於臺鎮殊覺未便今可否將吕瑞麟調補金門鎮令李之棟仍回原任其臺灣總兵一缺臣查澎湖副將章隆持重幹練才堪肆應似可委署臺鎮印務再查福寧鎮臣馮吉品才具練達留心地方或以馮吉品調署臺鎮而以章隆署理福寧鎮務倘蒙俞允其章隆所遺澎湖副將員缺仍遵前旨令陳倫炯署理其興化協副將員缺請敕令督臣遴選補授似於海疆有益等語爾等可將阿爾賽所奏密寄信與郝玉麟令其悉心斟酌若各員果能勝任著郝玉麟就近酌量於臺灣軍務就緒吕瑞麟可以更換之時宣朕諭旨應署理者署理應補授者補授令各員前赴新任一面奏聞倘郝玉麟另有所見或更有可用之人著速行奏聞請旨欽此欽遵臣查臺灣鎮吕瑞麟領兵進𠞰土番一案馭兵無術毫無籌度以致土番滋擾地方百姓受害是以調回府治彈壓該鎮既巳遺誤軍務應治以不職之罪但其尚諳水務可否革職留任調補金門鎮戴罪圖功洪恩出自聖裁至臺灣為數省籓籬所關最為緊要查署福寧鎮副將馮吉品雖辦理營務甚屬明白但於臺灣風土民情未經熟悉其餘各鎮亦俱不相宜至於章隆原係興化協調任澎湖副將巳準部咨飭令赴任乃延挨不往反行繞道來省明知軍務孔亟忽云請假修墳如此居心行事之員似不便委署臺鎮臣查有廣東碣石鎮總兵蘇明良巡察地方事務最為勤謹更能安輯兵民協和文武且才品兼優曾任閩省漳浦營守僃康熙六十年隨師進𠞰臺匪著有勞績風土民情素所熟悉若以蘇明良調補臺灣鎮總兵洵屬人地相宜臣謹遵旨敬抒愚昧之見據實奏聞再陳倫炯經臣奏請委署臺協副將奉有俞旨其興化協副將員缺巳經委員署理俟軍務事竣容臣確核軍前實力辦事之員另行具題請旨以示鼓勵合并聲明統祈皇上睿鑒施行謹奏覽奏知道了另有諭旨硃批諭旨卷二百十四之四欽定四庫全書硃批諭旨卷二百十四之五硃批郝玉麟奏摺雍正十年八月二十八日署福建總督臣郝玉麟謹奏為據報進勦番社情形恭摺奏聞事竊照臺灣北路土番自作歹以來原未懾以軍威經加懲創是以狡詐反覆焚掠村莊肆無忌憚自提臣王郡同巡臺御史臣柏修率領官兵於七月初六日到彰化縣之鹿仔港因值雨水之候道路泥濘暫住鹿仔港地方十六日天色開霽提臣即密遣官兵分作四路親身於十七日辰刻合攻附近縣治梗阻道路素稱強梁之阿束社歹番我軍鎗炮齊發社番逃遁入山官兵奮勇追趕擒殺番賊三名其被鎗炮打死者甚衆焚其草藔積聚燬其望臺瞭樓各鄉百姓奪其前被搶虜之牛羊農具不計其數提臣即由阿束社到彰化御史臣柏修亦於是日由鹿仔港到縣二十二日提臣踏勘大肚各社歹番窺伺出入要口扼守把截隨據各營報稱歹番聞知各皆畏懼不敢復出又據稟報二十三日有南投北投貓羅三社土官通事帶同番仔駕駛牛車前赴軍前稟稱情願出力報效續準提臣王郡咨稱軍前官兵現在分為五協擇地安營拒其險要堵其捷徑俟內地官兵到齊道路乾爽即便定期進勦等語臣查前撥官兵三千早經到齊欽奉諭旨指示機宜續撥之兵三千名俱巳分路近發歹番見我官兵勢衆又見提臣統兵進勦軍威震赫逃匿山林茍延喘息目今秋潦巳退溪水漸乾草木枯凋四面夾攻自能尅期撲滅臣思此種土番實與禽獸無異使經大創之後知國法凛然不可再犯當縳其渠魁宥其脅從仰體皇上好生之仁斟酌機宜行之臣巳密劄提臣去訖至於經營善後事宜俟勦撫安輯之後容臣悉心詳籌奏請睿裁為此謹奏既興此番大舉務令凶頑咸知凛畏不敢再蹈故轍庶幾一勞永逸慎勿少存姑息復遺患於將來也諸凡善後事宜合於情理酌中為之同日又奏為恭請聖裁事竊查臺灣道倪象愷情性偏執與人不睦是以由軍前檄調回府先經奏明近又因該道給民壯炮位器械等物伏路即有地方百姓喧譁謂民壯通番鬨鬧道署該道亦詳稱製給小炮箭鏃等項分遣民壯伏路乃有姦民前至本道公館砍傷壯役等語據軍前署金門鎮李之棟亦具稟到臣臣節經批司將一切報案逐一提究通詳雖虛實遽難懸定但倪象愷既不睦於同官更不得兵民之心即回府治恐亦未協且報案纍纍均非面訊不可臣與撫臣趙國麟詳加商酌會檄調回省城恭請皇上敕旨將倪象愷解任候審查臺灣道為全臺之首領統率府縣兼轄民番必須和平持正撫綏得法之員方克勝任查閩省各道員或現任要地或出差辦銅又或才情辦事好者固有而于臺地之任不相宜者亦不便輕調臣再三斟酌查有漳州府知府張嗣昌為人謹慎和平才具練達且漳州密邇臺郡彼處風土民情該府素所知悉臣會同撫臣檄委張嗣昌前往護理臺灣道印務仰懇皇上天恩俯念海外要地可否準其實授以示鼓勵洪恩出自聖裁倘蒙俞允漳郡亦屬緊要臣查有以同知銜管理晉江縣事王之琦蒞任巳將三載於一應地方實心整頓辦理妥協上年計典曾經薦舉若以該員升補漳州府知府亦屬人地相宜臣謹繕具密摺恭請聖裁伏乞睿鑒謹奏照所請行該部知道雍正十年九月十八日署福建總督臣郝玉麟謹奏為酌議臺地文員之年限以示鼓勵以昭畫一事竊查臺灣一府孤懸海外舊例文武各官三年俸滿即升嗣經前督臣滿保條奏以熟諳之員難得請將道府廳縣巳經任滿者再行加銜留任三年續又經前督臣髙其倬奏請更定四年荷蒙皇上洪恩俯念臺灣道府廳縣等官至期六年為滿又加以候缺交盤渡海之期實屬太久著令自到任之日為始將滿一年之期令督撫於閩省內地官員內揀選賢能之員到臺協辦半年之後令舊員回至內地補用并經部議期滿分别議敘加級原以調臺各員前後在臺為期不逺所以酌豫加級實為允當逮至雍正八年復經前署督臣阿爾賽以調臺各員統計前後協辦之期不過年半而獨當其任者不過半年恐庸員草率塞責請將調臺各員到任二年督撫另選賢員赴臺協辦等由奏準現在遵行臣查臺員定以二年之限又加協辦半年統計巳二年半矣再加交代渡海為期不下三年而回至內地止子加級似非仰體我皇上鼓勵海外臣工之意况查今升陸路提臣王郡前在臺灣總兵任內於雍正八年奏稱臺澎鎮協各員蒙皇上特用受恩深重應遵照舊例三年報滿候用所有參將遊擊守僃等職請以二年俸滿及交代渡海實合三年之數等由經部議覆準令候缺升用在案是同一在臺人員武職歷俸二年得邀升用文員歷俸二年半僅議加級其例似未畫一臣愚以為臺灣道員職任監司身沐皇上隆恩應照臺灣鎮協三年報滿恭候聖明酌用至知府同知通判知縣各員似應照武職𠫭將遊擊守僃等官之例俸滿升用庶文武升遷年限畫一而臺地文員自必益加鼓勵出力報效於海疆似有禆益是否可行伏乞聖主睿鑒謹奏此奏是該部議覆施行同日又奏為恭奏進勦逆番情形事竊查臺灣各番社復肆焚掠經提臣王郡同巡臺御史臣覺羅柏修率領官兵於七月十七日攻破阿束社及分協扼要定期進勦各情形臣巳恭摺奏聞今查提臣王郡於八月二十一日同御史臣覺羅柏修率領官兵三千餘名并義勇親丁人等分兵三路進𠞰倡首作歹之南大肚社先於二十日分兩路由水深流緩之處過溪設伏預防逆番來伏至二十一日丑時大軍黑夜渡溪逆番見官兵勢衆其平時埋伏暗鎗冷箭俱無所施我軍鼓勇如入無人之境直逼逆社用大炮打開連斃六七番乘勢分左右前後環攻逆社圍柵土墩臺寨周圍十餘里移時𠞰洗逆番奔竄死於鎗炮者甚多牛羊器具俱為被害百姓搶回社厝糧食焚燬淨盡中北大肚二社全社泥首膝地乞降求生又有貓羅大武南北投沙轆等社前赴軍營叩首乞命酌量安頓又岸裏朴仔阿里史三社土官通事率領男婦共二千一百餘名又大甲東南日南北等社土官通事率領男婦共六百餘名執旗挂彩跪投軍前情願出力堵截凶番嗣官兵又搜至各凶番積藏糧食之所凶番皆穿林而逃所積糧食盡行焚燬用炮火擊死衆多復又扎營貓霧捒絶其水道并安頓阿里史朴仔籬等處斷其後路南大肚社凶番懼怕畏服該社土官加九眉閣等亦各前赴軍營伏地求生提臣王郡飭令舉出凶番方準免死現在北路一帶方圎八百里地方俱巳安寧人民歸莊官兵義勇嚮𨗳全軍無一損失現今只有枋山雙藔等社亦在過溪搜勦兹準巡臺御史臣覺羅柏修等咨會併據軍前各官飛報前來臣查逆番作歹南大肚係屬強梁倡首之社仰賴皇上天威逺震將士爭先奮勇凶番一鼓成擒各社多巳來歸未靖餘孽絶其糧米斷其食鹽勢窮力迫自可尅期搜捕殲除臣現在復劄提臣王郡確查悉心籌畫再行奏請聖裁為此謹奏覽𠞰捕逆番情形深慰朕念同日又奏為遵旨奏覆事雍正十年八月二十五日據臣標外委千總朱光正齎捧臣前奏請隨糧馬兵改歸步糧一摺欽奉硃批所奏嘉是覽之前劉世明到京朕觀其人甚不妥協尚未料如此負心伊任內一切不及之處毋得代為隱諱悉行據實奏聞欽此臣查前督臣劉世明任內雖無踰間蕩檢然其不及之處仰蒙皇上下詢臣又何敢代為隱諱臣案查前督臣劉世明上年九月十七日題報恩賞兵丁生息銀兩疏內稱巳於八月內開賞臣計其月日是必開賞在先題報在後也詎今不但不曽開賞且尚有本銀八千餘兩未發臣奉諭旨詳細斟酌照依滇粵之例勻給協營通盤打算儘有寬裕現在會同撫臣趙國麟署陸路提臣阿爾賽水師提臣許良彬題覆請旨是前督臣劉世明先不能上緊料理後復含糊具題難逃聖鑒者也再查從前欽奉諭旨發往閩省試用人員委署試用之後察其人果可用自應酌量才具之長短分别地方之繁簡照例扣限題請實授如有實在不堪委用者亦應即為題參或咨回吏部使人知所勸懲實心出力報效庶於地方有益乃前督臣劉世明信用之人不得其當而又偏執巳見多不察實分别題請如候補通判王朝棟係雍正五年間奉旨交廣東撫臣楊文乾帶往福建試用若能盡力即行題補若不盡心辦事即給文咨回吏部之員歷經委署漳州府同知興化府通判仙遊縣泉州府通判延平府通判沙縣各印務是􅔜員到閩巳經六載署篆巳經六任查其到處尚能勤慎辦公至今未得一缺其餘到閩候缺候補有曽再試三試歷今三四年不等者尚有二十餘員臣除將王朝棟現在題請補用外餘亦逐一細察如從前歷試才可勝任者次第請旨遵行固不敢使才具平庸不能料理地方之員濫膺民社亦不敢使諳於吏治有志上進者一槩淹滯而不為鼓勵也又查前水師提標後營遊擊胡貴八年二月內在守僃任內經署參將鄭良逹詳委看修各營戰船嗣因胡貴護理後營遊擊不能到厰經參將張天駿另委千總許順看修後許順被提臣許良彬參革又改委千總黃良看修內有萬字二號一船係八年九月內據黃良具報興工其竣工日期亦係黃良具報並無胡貴協看字樣後􅔜船造不合式前督臣劉世明竟將胡貴題參荷蒙聖明著令引見胡貴經將修船緣由奏明蒙皇上因以胡貴監修船隻題參殊屬屈抑敕令臣等查參通省員辨聞聼之下莫不感頌聖明洞鑒隱微踴躍思報臣現在查案會同提臣許良彬題覆是胡貴之被參亦前督臣劉世明不細心查明致屬員有屈抑也以上事件皆臣查確理合據實奏覆至此外督臣劉世明有無不及之處容再另訪恭奏再查閩省風氣較之粵東大相懸殊粵省陋習仰蒙聖恩屢頒訓諭人人知改文武各員莫不歡欣鼓舞努力自效閩省文武兩途既少浹洽之心又乏踴躍之氣遡其所自總緣上下之情未孚事事交相推諉以致地方公務多有廢弛臣受聖主再造洪恩敢不盡心整頓惟是知識短淺力恐不逮叩懇聖恩指示教誨俾臣有所遵循則感戴生成之德永無紀極矣臣謹繕摺覆奏伏乞皇上睿鑒謹奏劉世明前此一切謬誤卿竭力整頓務俾各得其宜雍正十年十月二十一日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為買銅之洋船回棹有期委員之在蘇守候無益謹為酌量變通恭請睿鑒事竊查閩省承辦銅斤每年上下兩運共該銅五十五萬四千三百九十九斤例應先期輪委道府前往蘇州採辦洋銅交解第辦洋銅必須先購倭照選商給價置貨出口而倭照每年有自一番起至三十七八番不等必挨順輪番給買不能越次先得且本年倭照務至本年正月初一日方許船進東洋交界更因近年彼國産銅不敷多有上年倭照銅船在彼守候必待其依次買足方許本年倭照之船採買惟是本年倭照每為江浙等本省買去閩省辦員無可如何只得覓買下年之照按其年分番數再候上年倭照銅船買足才得銅斤計其出洋回棹之期約須二十餘月若該委員照巳買就商巳招成將價給領之後即在蘇守候亦屬無益自應回任料理地方事務乃查閩省向例委辦銅員印務即另委員署理必將銅斤交運起解清楚方許回任故該員等往往藉此逗留雖有時回閩因銅未起解亦不得接印視事臣等查道府俱蒙皇上酌量才可勝任方行補授之員今辦銅各員因守候洋船在蘇間坐不特有曠職守亦且貽誤地方即遴選委署亦難得人地相宜之人臣等悉心思維若委員承辦止遴員代理印務俟該委員到蘇買就倭照招商給價之後即令回任其在蘇設有未完首尾即一面報明在蘇辦理若無可辦之事不得藉端逗遛回任之後或探聼回棹信息止著親信家屬并妥當家人在彼守候俟洋船回棹或仍令再往收銅交押運官起解前後往返每次屈指不過數月銅斤既得照例辦解地方亦得正員料理似為兩有禆益况查江蘇承辦人員原在本省固無庸離任委署浙江委員採辦亦止委佐二暫行協理辦員到蘇招商發價後即回本任從無委署之例福建與浙省接壤所爭不過旬日路程自可仿照而行除飭查明買照招商給價出口在蘇無事之員著令回任外臣等為地方現乏道府大員辦事辦銅人員在蘇間住所有酌量變通令其回閩任事緣由理合具摺奏聞伏乞睿鑒謹奏所奏是如此庶免曠官廢職之失也福建總督臣郝玉麟謹奏為海疆要鎮重在得人據實恭懇聖恩事竊查漳州鎮總兵初有德先因生患鬢疽病勢沉重臣恐有誤地方營務經委福州協副將馬召南前往協辦具摺奏聞今􅔜鎮初有德所患之疽醫治不痊於本年九月二十六日身故臣準署陸路提臣阿爾賽咨并據漳州鎮中軍遊擊文際髙呈報除恭疏題報外伏念漳州地處濱海界連粵省接壤澎臺最為緊要􅔜鎮事務非老成持重才能練達者勿克勝任查福協副將馬召南歷練老成熟諳營伍整頓有方委係才具出衆之員臣現在委令署理􅔜鎮印務但總兵職任封疆臣何敢冒昧陳奏惟是漳州地方緊要實非他鎮可比臣既知馬召南才堪勝任何敢緘默可否將馬召南補授漳州鎮總兵洪恩出自聖裁臣因地方起見不揣冒昧恭摺具奏伏乞皇上睿鑒施行謹奏漳州總兵一缺巳有旨下部命卿會同阿爾賽酌選將領遞行題補矣同日又奏為恭報蕩平臺番大捷事竊查臺灣北路土番逞凶不法殘害百姓虜掠村莊阻梗道路勢甚猖獗據臺灣總兵吕瑞麟請兵三千飛赴援𠞰臣隨即調撥官兵遴選幹練將辨李蔭樾等統領飛渡進勦一面奏明令提臣王郡親往督征一面另行撥兵預僃欽蒙皇上睿慮深逺以撥往之兵務須多僃復經臣撥兵三千名赴臺協同𠞰捕經提臣王郡先將附近彰化縣治梗阻道路素稱強梁之阿束社一鼓𠞰除即有南投北投貓羅三社土官通事帶同番仔駕駛牛車前赴軍前情願出力報效續經提臣王郡勦滅強梁倡首之南大肚社隨有中北大肚二社及貓羅大武南北投沙轆等社乞降求生又據岸裏朴仔籬阿里史大甲東南日南北等社情願出力堵截凶番經臣節次具摺奏聞兹提臣王郡於八月二十五日分兵七路圍勦水裏逆社立時攻破遍行勦洗九月初三日有牛罵社并沙轆餘孽令加巳烏臘二名詐降狡延隨經查出立時擒獲一面分兵圍勦又據水裏社降番獻出首凶睂箸等三名又擒獲阿朥萬等四名南大肚降番獻出首凶烏臘睂仲等五名俱即於軍前正法示衆初九等日搜勦牛罵沙轆餘孽打死凶番衆多十六日勦雙藔貓盂等社用炮打死十四番中傷者甚多餘即逃入菀裏社後山十七日勦捕大甲西巢穴焚燒積糧十九日有吞霄莞東等社土官率領男婦三百餘名赴軍營乞降二十日恭將李蔭樾探聞各社逆番俱逃入小坪山稟報提臣王郡分兵三路於五鼓時直搗小坪山逆番巢穴逆番正在裝車别徙出其不意我軍掩至鎗炮齊發打死多番窮追至大坪山深林腳下逆番盡棄車輛馬匹等項惟有赤身逃入內山獲牛千餘隻馬八匹車數百輛焚燬糧食四百餘堆二十一日乘勢搜捕追至內山悠吾乃地方打死凶番甚多斬獲番首二十二日有吞霄大甲西土官率領男婦四百餘名泥首乞生二十六日有貓盂雙藔菀裏等社土官率領男婦老幼一千餘名口前赴軍前叩首乞命二十九日又據吞霄貓盂雙藔菀裏房理五社土官阿帶等帶同番衆自行捆綁匐赴軍營跪請受死經提臣王郡令其獻出首凶隨據雙藔等社獻出首番媽媽等四十二名押解彰化縣收審又擒出漢姦胡清父子並戴偉坤黃寬蔡妹等五名聼候審究又擒出久慣作歹為首凶番大匏藥瓦里二名即行處死又擒獲大甲西首凶加臘貓倫等二十一名正法另獲壯番并番婦番仔等四十二名口發縣收審又據押出牛罵社番一百九十二名沙轆社番男婦老幼二百九十餘名口交營看守究出首凶分别審擬安插其吞霄等社莭次乞生各番逐一安頓訖現今北路方圎一帶地方道路悉皆寧靜百姓安居樂業商賈照常往來無不感激皇恩歡呼載道據臣差探并軍前各官同提臣王郡等星夜飛報前來除將現獲凶番飭令從重究擬以彰國法以安地方外所有蕩平臺番大捷緣由理合具摺恭奏再查此次征勦臺番歷準提臣王郡同巡臺御史臣覺羅柏修咨報長福營參將李蔭樾事事爭先智勇出衆官兵義民人等亦莫不奮勇報效其出力用命之處容臣查明等次分晰造册題報合并聲明臣謹會同福建巡撫臣趙國麟合詞奏聞伏乞皇上睿鑒謹奏據奏凶番蕩平餘社傾心向化以手加額覽焉此次征勦官兵人等具題到日另有恩賚更有諭問之旨命大學士轉傳同日又奏為請旨事竊查署南澳鎮康陵原係金門鎮總兵於雍正九年正月內奉旨著南澳鎮總兵張起雲署理福建陸路提督印務南澳鎮總兵印務著康陵署理欽此今查署陸路提臣張起雲於上年十一月內巳經病故南澳係海疆重地臣查康陵老成練達熟於水師一切營務俱能整頓與南澳甚屬相宜可否將康陵實授南澳鎮總兵伏候聖裁再查金門鎮總兵印務經前督臣劉世明等遵旨遴選延協副將李之棟署理其延協副將等印務并經遞行委署在案除延協副將李之棟巳於署鎮任內為捏報巡洋焚燬戰船一案奉旨革職其金門一鎮亦經奉旨將臺灣鎮總兵吕瑞麟革職著在金門鎮效力贖罪外所有延協副將遞署等缺可否容臣悉心細察於現署人員內有才具果與銜缺相稱者題請補授抑或仍行署理之處合併陳明統候睿裁批示祗遵臣因海疆營務緊要起見不揣冒昧恭摺具奏伏乞睿鑒謹奏延協副將以馬驥補授巳有旨矣其馬驥所遺原缺卿遞行題補可也雍正十年十二月二十日福建總督臣郝玉麟謹奏為遵旨覆奏事竊臣恭摺奏報蕩平臺番欽奉皇上硃批據奏凶番蕩平餘社傾心向化以手加額覽焉此次征勦官兵人等具題到日另有恩賚更有諭問之旨命大學士轉傳欽此又接大學士鄂爾泰張廷玉來字內開雍正十年十一月十七日奉上諭據郝玊麟奏稱此番征勦臺番參將李蔭樾智勇出衆事事爭先等語朕查李蔭樾從前來京引見朕看伊人材精壯似有膽量原是記名上等之人今思臺灣地方緊要副將陳倫炯未知勝任與否李蔭樾既著有勞績或將伊補授臺灣副將陳倫炯調用內地是否人地相宜爾等可寄信密問郝玊麟令其據實回奏欽此遵旨寄信前來臣捧讀之下仰見聖主慎重海疆酌用人材之至意臣細察參將李蔭樾才力兼優於副將總兵均能黽勉辦理惟查臺灣副將係水師員缺駐劄安平額設戰船五十六隻有督率兵船出洋巡哨之責李蔭樾從前歷任俱在陸路而水師似未諳練臣於未奉諭旨之先巳經奏請將該員補授興化協副將現在候旨至陳倫炯先任臺灣副將升補臺灣總兵該地風土向所熟悉水師船務亦稱諳練更兼撫馭有方番民至今感頌􅔜員自本年任事以來辦理尚屬妥協臣現在委令協同臺灣道張嗣昌前往大肚溪一帶安插歸順土番務使得所而一時亦難得人地相宜之員堪以調補但臺灣地方緊要臣仍不時細察如有不甚相宜之處自當酌選妥員請旨調用斷不敢稍有草率致滋貽誤也緣蒙諭旨事理謹繕摺覆奏伏乞睿鑒謹奏所奏是候另有諭旨由內閣頒發雍正十一年二月二十日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為奏聞事竊查陳秦使違禁販鐡出洋案內無照客民方成等貨物經臣等審明題請照例入官應俟部覆到日估變但查各貨物堆貯厦門近海潮濕之地巳經三載俱有黴爛若再遲久必致漸成廢物且查方成等所帶之貨絲邉番襪等物原係販賣吕宋非內地適用之物雖有縀紬綾機槩係粉漿必仍賣給出洋商人方可得價而出洋商人向例在正月內開洋七月內回棹若過正月則各商貨物置就又不能另尋售主必須又擱一年臣等是以先行估變據牙行人等約估止報稱值銀數千兩臣等查一船貨物雖除正經大商有照各貨先經給還外現在之貨豈僅值銀數千兩查副將張天駿為人誠實併遊擊胡貴熟諳貨物行情檄令會同厦門同知胡宗文帶同牙行逐一確估除去黴爛蟲蛀物件外實值厦鋾番銀三萬二百二十三兩零較前約估相去懸殊臣等隨飭趁此商人置貨出洋之候及時變賣巳據各商照依行例先繳一半銀一萬五千一百一十一兩零其餘一半俟七月內回棹照數交繳取有殷實行商連環結保先繳之銀現飭解貯藩庫另行咨部查核外但此等瑣事原不應上瀆宸聰臣等因違禁事案理應完結謹此繕摺陳奏伏乞睿鑒謹奏如此實心任事何患諸弊不除吏治民風之不就理也殊屬可嘉朕之奬許非為區區二三萬金估變之項而發蓋取卿等之存心耳毋得錯會福建總督臣郝玉麟謹奏為遵旨覆奏事雍正十一年二月十六日接到大學士鄂爾泰張廷玉來字內開雍正十一年正月十九日奉上諭福建水師提督員缺甚屬緊要著郝玉麟於閩廣兩省水師總兵內有伊深悉可勝此任者揀選一二員密行奏聞候朕簡用爾等可寄信前去欽此臣跪讀之下仰見我皇上慎重邉海封疆至意臣查福建水師提督駐劄厦門為全閩各海口鎖鑰控制澎臺海外最關緊要必諳練水師營務熟悉邉海情形者方克勝任臣於閩廣兩省水師總兵內再四斟酌悉心揀選如粵省碣石鎮總兵蔡添略熟諳水務實心任事雖才情稍覺拘謹而人甚老成堪任提督不致貽誤閩省總兵內惟新調臺灣鎮蘇明良才品兼優水務素諳亦可勝提督之任但蘇明良甫經調臺任事方新如蒙聖恩將蔡添略補授提督臣無庸瀆請外倘蒙將蘇明良補授提督臺灣尤關緊要必得人地相宜有才有守者始克勝任查福協副將馬召南歷練老成人甚妥當以之補授臺灣鎮總兵實能勝任臣愚昧無知荷蒙皇上下詢敢不悉心揀選慎重籌思但識見短淺是否有當統祈聖鑒謹奏蔡添略既屬新進資格未深兼之粵省熟諳水務者少正亦需員彈壓蘇明良固勝提督之職但臺灣甫經底定綏輯事宜更為緊要豈可輕移至若馬召南材甚庸平向乃朕所稔悉近雖歷練何遽能改心易行耶試於此外另舉一員候朕酌奪如或不然王郡猶堪水師提督之任否總俟卿再加審度覆到之日有旨雍正十一年三月初二日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為撥運倉榖接濟鄰省事竊照閩浙兩省壤地相連年嵗米價時有傳聞上年閩省收成仰荷聖主洪福各屬咸慶有秋惟接壤浙省之福寧州地方稍有蟲傷緣通省豐收米榖源源接濟至今米價不致騰貴浙省上年偶有數處收成稍歉米價漸至髙昂臣等留心訪問今春愈為騰貴屬在鄰封理應緩急相資今準浙江督臣程元章咨開據台州府詳稱去嵗田禾間被蟲傷以致西成稍薄米價愈騰查閩省去嵗年成甚豐現今米價平減詳請招商赴閩買運榖石赴台糶賣行司議詳批令暫準海運通糶源源接濟移咨閩省出示招商并許浙商採買等語備文前來臣等傳同司道悉心酌議閩省雖連年豐稔緣山多田少産米無多兵民食指浩繁從前屢荷皇恩截運江浙米榖及江西採買米石積貯以至今日得獲充裕是本地之米原無盈餘也臣等仰體皇上厪念民生至意輾轉籌維查有臺灣府屬鳯山縣積貯各案內除本縣現存榖五萬四千餘石外另有節年收貯八社地方倉榖二十四萬四千餘石今酌撥榖十萬石一面檄飭臺灣道府迅即遴委妥員照數運至厦門以備浙商採買運赴台屬糶賣接濟民食一面知會浙省督臣僉商來厦照依時價買運臣等並檄閩省地方官出示招商買運赴台公平糶賣仍給以路照載明榖石數目到彼呈請所在有司驗明填照回銷庶姦商不致影射外運所有榖價俟秋收即行陸續買補還項在鳳邑倉儲仍多貯蓄不致缺乏而浙省台屬人民得資接濟矣事關動撥倉榖理合繕摺奏聞伏乞睿鑒謹奏籌議甚好嘉是覽之雍正十一年四月初五日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為二麥豐茂逾常早禾亦多暢茂謹據實奏聞仰祈睿鑒事臣等查閩省山海交錯人稠地狹比年以來仰荷皇上福庇屢慶有秋上年收成亦為豐稔惟冬季雨水較少今春米價稍增臣等即將存貯江浙之米行令出糶米價隨平逮至正二月間雨水雖有尚未霑足幸得三月初十日起至十五六連日大雨查據各屬報稱本年二麥結實甚屬豐茂現在收穫其早稻連得大雨及時栽插青蔥盈野倍覺茂盛米每石自一兩起至一兩一錢不等價值甚平地方寧謐又據臺灣府暨所屬各縣稟稱臺地俱係稻田種麥者少現今早禾蕃盛倍常米榖價平民番樂業等語臣等查閲稟報不勝歡忭是皆我皇上敬天勤民太和翔洽之所致也所有二麥巳經成熟現在收穫以及早禾暢發情形理合據實奏聞伏乞睿鑒謹奏覽二麥早禾併米價情形朕為閩省黎庶曷勝額慶當愈勉誠敬以仰邀天恩祐庇同日又奏為奏聞事竊準浙江督臣程元章咨開據台州府詳請招商赴閩買運榖石赴台糶賣并咨閩省出示招商買運等由當經臣等查有臺灣府鳳山縣收貯八社地方倉榖二十萬四千餘石酌撥十萬石迅速運至厦門以備浙閩商人買運以資接濟情由先經具摺奏明嗣經半月尚未有商赴買而臣等訪問台屬米價甚昻若俟浙商來買運往誠恐緩不及濟擬就厦門存倉臺榖趁此南風便利委員先行運送二萬石赴台糶賣以濟民食但查浙省原咨止有招商買運之説所有閩榖運台照依臺價并一切運費與􅔜處市價有無平減禆益於民之處難以懸定隨即差辨星夜咨商浙江督臣去後一面選委文武員辨行知厦門同知將收貯雍正九年臺榖內暫撥二萬石配定船隻等候俟鳳山縣運到倉榖補款兹準程元章覆稱台屬需米甚切若得此二萬石榖接濟實屬有禆如須再撥容當酌量另行移咨僃覆到臣等臣等即令預經委定員辨酌帶水腳銀兩於四月初三日兼程赴厦領運並咨覆浙江督臣外所有運榖接濟鄰省緣由理合恭摺奏聞伏乞皇上睿鑒謹奏覽奏運榖赴浙情節知道了凡事咸應酌其緩急權其損益而為之豈可拘執一定耶同日又奏為據情遵例代奏仰祈聖鑒事據福建巡海汀漳道郭朝鼎稟稱竊查隨任旗員子弟荷蒙皇上天恩著令歸旗學習實聖主造就人材之至意朝鼎在泉州府任內欽奉諭旨緣長子候選州同郭治向因抱病延醫調理具結報明咨部在案嗣因朝鼎仰蒙皇上洪恩授今海疆要缺職司巡海兼轄汀漳二府並有承辦修造戰船之任均關重務往來巡察督催修造不敢少懈一切稽查案卷察􅜊戰船工程俱係長子郭治在署協幫辦理今病雖痊愈現在辦事稍知頭緒奉憲嚴催起程朝鼎下情未敢上達兹奉恩旨凡子弟中有可以助其父兄辦理事務者道府等官有督撫代奏之例朝鼎跪讀之下不勝感激涕零伏念朝鼎雖生四子次子郭河年止七嵗三子寧武年止六嵗四子春泉年止五嵗俱屬幼稚惟有長子郭治年三十二嵗賦性固屬庸愚尚知謹慎小心可以稍助朝鼎辦理公事理合瀝陳實情懇請代達天聼倘蒙聖恩俞允準將郭治留隨任所不惟朝鼎得資臂指而郭治得以漸習吏治亦當同效犬馬上報君恩等情具稟前來據此臣等查汀漳道員職任巡防兼有修造戰船等事現今􅔜道名下承辦修造戰船一百餘隻責任繁重􅔜道郭朝鼎居官勤慎辦事實心今據稟稱伊子郭治向經在署幫理請留隨任學習等情臣等不敢壅於上聞謹具摺代奏可否準其隨任學習以助其父辦理事務洪恩出自聖裁伏乞睿鑒為此謹奏郭治準留隨任學習移咨􅔜旗知之雍正十一年五月初一日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為奏聞事臣等撥運厦門臺榖二萬石前赴浙江台州接濟巳於四月十三十六二十二等日陸續運送去訖正值風信順利約計五六日可到又聞浙省杭州府一帶民間食米每石價銀一兩七八錢不等被災窮民赴省城覓食者甚多惟目下正值青黃不接米價日漸增昂臣等查現今運往臺榖價值連腳費等項運至乍浦每石不過一兩二錢上下較浙省米價似覺稍賤伏覩我皇上厪念民生軫恤僃至事關民食臣等自應悉心辦理查原議撥運臺榖十萬石除巳運赴台府二萬石外現今再撥二萬石委員照前由海運至浙江乍浦地方咨交浙省督臣即照原價糶賣以濟民食其餘六萬石現在預備停妥臣等再加細查彼省米價情形酌量辦理所有續運榖石前赴浙省緣由理合具摺奏聞伏祈睿鑒謹奏浙閩連界文移甚便與􅔜督商酌辦理可也雍正十一年六月二十七日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為敬陳地方情形增改府州縣治以専職守事竊惟閩省山海交錯幅員遼濶內為各省屏藩外控海洋諸島建置尤當得宜臣等荷蒙皇上天恩畀以海疆重任凡屬地方事務共期悉心辦理不敢苟且因循致滋玩誤查福建福寧直𨽻一州東臨大海南接省會北連浙省溫處等郡西界建寧府屬悉係崇山峻嶺地方最關緊要知州本任有讞獄催徴各項公務而所轄福安寧德二縣刑名錢榖又均由其􅜊轉事務繁冗兼顧實覺勉強又福州府屬古田一縣地處萬山之中延袤九百餘里共編都保五十餘處每年額徴錢糧二萬七千三百有竒習俗獷悍犯案纍纍應納錢糧歷年抗欠縣令親往徴比或審驗案件即相率逃避深山莫可蹤迹惡習相沿竟為得計若不亟為整頓致使積惡日深罪不能逭法不可貸甚非仰體皇上如天之仁至其餘各縣以及村鎮緊要之處歷舉地方文武備載情形詳請改設移駐緣由臣等一併行令布按二司暨各道轉飭確勘妥議去後兹據司道行據各府勘議會詳前來內稱福寧一州向轄福安寧德二縣兼與福寧鎮同城一切地方事務甚屬繁雜又係自浙入閩水陸通衢咽喉之地知州一員顧此失彼照料難周實覺勉強且與總兵體制未稱應請將􅔜州改設為府除原轄福寧二邑外另設附郭一縣即以州牧原管之錢糧户口専任辦理再建寧府之夀寧一縣離建寧水陸共六百里路徑﨑嶇離福寧止二百七十里平坦易行以之改隸新設之知府管轄甚屬近便則一府四縣體制以隆而督率分理之任亦各有責成矣又古田縣地方甚屬遼濶姦匪易於潛蹤內地名雙溪一處離縣二百餘里山深路險民情尤為頑梗明季原設捕盜通判駐劄其地舊址猶存應於雙溪增設一縣即以古邑之二十至三十四都錢糧八千六百餘兩户口萬餘分撥經管就近化𨗳每遇朔望宣講上諭督率各鄊耆民朝夕訓誡涵濡嵗月久久風俗自能移易頑梗可除錢糧亦得清完其新設之縣亦隸福州府管轄又閩省下遊泉漳二府俗悍民刁健訟好鬬所轄地方太廣實有鞭長不及之處應各設直隸州互相分理內有泉屬之永春縣接連興延漳三郡姦宄易於透越重岡復嶺離府甚逺西北至德化僅三十里西南至大田一百一十里應以永春縣改為直隸州以德化大田二縣歸其管轄再漳州府所轄龍巖縣上接汀州下通延建距漳州府竟有三百餘里一切公事呼應維艱查龍巖東至漳平西至寧洋各七十里應以龍巖縣改為直隸州以漳平寧洋二縣就近歸其管轄均於地方實有禆益等語臣等查福寧州實屬邉海要區為全閩屏障應請改設知府添設附郭一縣以隆體制以専職守至雙溪地方係古田縣要隘之區四面環山每致藏姦聚匪應設縣治以彈壓化誨至永春龍巖二邑議改為州均係因地制宜臣等非敢草率更張因再四斟酌實於地方有禆其添改府州縣應需佐雜等官及各緊要村鎮移駐改設之處容臣等斟酌附疏題請惟是臣等知識淺短是否可行不敢冒昧具題合先具摺奏聞伏乞皇上睿鑒批示遵行謹奏事關增改府州縣治具疏題請候朕裁酌同日又奏為奏聞事竊臣等案準浙江督臣程元章咨撥運臺榖赴台州府接濟民食一案續據各委員毛永清等稟稱押運榖船於四月二十五并五月初七八等日陸續抵台查得􅔜處米價每石賣銀一兩三錢有零自榖船到後每石止賣銀一兩二錢米價漸平民情歡恱所有運到榖石現在地方官盤交等語又臣等前因浙省杭州府米價賣銀一兩七八錢時值青黃不接倘日漸騰貴民食維艱酌議再撥二萬石運至浙省乍浦地方咨交督臣平糶於五月初一日恭摺奏聞當即先令候補知府張良弼星馳赴浙確查米價情形迅速回報正在一面料理挽運間即準程元章咨稱閩省運到台州榖石巳行布政使派撥在案浙屬現在二麥蠶絲俱幸豐收似可無庸糶濟如有未經起運之榖槩為停止等語臣等伏思浙省春間米價增昻今二麥蠶絲旋獲豐收米價漸減此皆仰賴我皇上福庇羣黎萬民共慶臣等不勝欣慰除前經運往台州榖二萬石外其尚未起運榖石即行停其挽運矣理合奏聞伏乞睿鑒為此謹奏總惟仰賴上蒼恩慈耳覽奏曷勝欣慶或因卿等大公無我之誠念所感亦未可知封疆諸臣果能將國家政務不分彼此視為一體竭力維持自蒙天池神明垂察賜祐也同日又奏為恭懇聖恩以愜輿情事竊惟天妃明神功昭清晏德庇商民聲靈夙著於寰區顯應尤傳於閩海康熙十九年提督萬正色克復厦門神靈協助欽奉聖祖仁皇帝敕封護國庇民妙靈昭應𢎞仁普濟天妃又靖海將軍施烺進征臺灣師次平海澳時方憂旱井澤為枯因禱於神泉源驟湧官兵咸被其澤嗣後默相王師功成底定敕建神祠於原籍莆田縣湄州地方并頒敕文以紀功德又加封天后並允册封琉球國使臣海寶之請令􅔜地方官春秋祭祀在案康熙六十年臺匪竊發鹿耳門海水驟長數尺舟師揚帆直進七日之內克復全臺嗣經巡臺御史臣禪濟布等奏請荷蒙皇上特頒御書神昭海表匾額敬懸湄州暨厦門臺灣三處宸翰輝煌照臨海澨上年土番不法臣欽遵諭旨徴調官兵六千餘員名并一切錢糧軍火器械載船一百數十隻經歷重洋風恬浪靜安抵臺灣剋期奏捷是皆聖主敬禮神明得邀天后宏施庇護感應之理昭然不爽至於出哨官兵商艘賈舶往來海面洪濤怒浪神為顯佑之處不可勝紀所在沿海商賈兵民奉祀最極誠敬而於省會尤盛查福建省城南臺地方舊有神祠為萬民瞻禮之所臣等不揣冒昧懇求聖恩俯照湄州等處並頒御書匾額敕令春秋祭祀照依龍神之例督撫依期主祭臣等更有請者伏惟天后凡在江海處所靈應如響其各省會地方如曽建有祠宇而未經設立祀典之處并請降旨一例舉行則崇德酬功之令典昭垂萬祀矣為此謹奏􅔜部議奏福建總督臣郝玉麟謹奏為請旨事竊查貯庫軍器關係綦重聼其朽敝甚非所宜臣於上年赴任路過泉州府面訊􅔜府庫貯軍器據稟現存戰箭二萬枝臣調取驗看略加修整尚堪應用及臣扺任後查得省庫所貯盔甲甚多行令布政司造册具報會同撫臣趙國麟赴庫查驗除廢炮八十餘門位難以修整又甲械內實屬朽爛無用者鐵綿甲九千三百餘身鐵盔九千七百餘頂排線交鎗等一萬六百餘桿只堪鎔鐵其餘不計外查尚堪修整可備營伍之需者有鐵盔九千九百餘頂鐵甲綿甲並甲頁共一萬三百身有零鳥鎗交鎗線鎗等項除從前撥給鎮標各營並失風戰船以及征臺應用尚有堪修整者一千四百餘桿又福州府海防同知庫內大小鐵子鉛子共七萬三千六十餘斤閩縣庫內大小鐵子四十八萬六千餘斤又窩蜂子四千六百一十餘斤尚有黑鉛鐵斤并雜項鐵器甚多俱無斤兩容臣查明咨部外臣再查庫貯軍裝器械係我朝平定耿逆及鄭克塽等案收貯各庫報部在案歷來各員多不經心曬晾並不造册具報上司查驗臣因到任訪問始知而朽爛無存者巳難數計若行追賠則事經數十年官非一任難以指實著追如再因循閩省地方潮濕年復一年必致朽爛更多實屬可惜今臺地現議添兵如蒙皇上俞允軍裝器械在所必需其有堪修整者可否容臣酌量修整收拾務期堅鋭利用修整完竣分别加謹收貯取具收管備案如有應配用之處造册報部至外府各縣所貯軍器現在檄查當一併酌量辦理是否可行臣未敢擅便謹具摺恭請聖旨遵行伏乞睿鑒謹奏足見留心地方庶務嘉是覽之但不可務小而忽大須將此等事件作為行有餘力則以學文之舉方始克稱巨細不遺也同日又奏為奏聞事竊照臺灣北路土番恣肆不法仰蒙皇上指示機宜官兵剋期蕩定而逃竄餘孽務須盡其根株免致滋事經臣奏明酌留官兵駐防搜捕續據各􅔜文武呈報官兵奉行搜捕以來斬獲有名凶番一十九名生擒一名又據內山生番殺獻番首十顆番耳九隻前來軍營請賞餘番懾威膽落逃匿深山莫可蹤迹臣思搜察愈急潛匿愈深若聼民番斬馘請賞恐致冒濫妄殺之弊非所以安良番而靖地方也臣即一面出示令其自行投出聼候審訊一面著令土官通事入山曉諭嗣據報稱有大甲西等社逃番男婦一百零二名口盡行投出並無一名漏網隨準巡臺御史暨提臣王郡各咨同前由到臣所有搜捕臺番餘孽巳淨緣由理合恭摺奏聞再據總兵蘇明良並臺灣道府稟稱五月十九日夜水仙宫前鋪民陳寶蠟燭店內失火文武各員齊往協力撲救緣東南風盛人稠地狹風急火猛人力難施延燒三百餘間除被火民人行司量加賑恤並飭􅔜地方文武不時誡諭居民加謹小心防範外合併奏聞伏乞皇上睿鑒為此謹奏前經有旨防火之具不但臺灣一府凡所屬地方皆應飭令預備實力行之毋忽雍正十一年八月初四日福建總督臣郝玉麟謹奏為海嶼鎮協各營兵食最關緊要酌議分貯榖石以備接濟事竊照閩省濵海鎮協各營向係分防島嶼者本地産米稀少全資內地接濟每遇青黃不接米價增昻更或風信遲阻商販不前民有官榖平糶之資營兵未免艱於粒食即如海壇一鎮孤懸海島外附三十六嶼地不産米今年六月內因風信不順􅔜鎮總兵官陳勇以營兵乏食客販不至詳請借給倉榖二千石經臣飛飭福州府照數運借去訖臣思邉海協營如海壇之僻居島嶼者不止一處似應通盤籌畫以備接濟庶不致兵食有缺乏之虞除汀州漳泉以及延建邵武等處地方或係産米之處或商販不虞缺乏無庸置議外其福寧一鎮界連浙省前任鎮臣顔光旿奏請設立倉儲今現貯榖六千五百餘石又南澳一鎮地居海澳原任鎮臣許良彬奏請捐貯倉榖經前督臣髙其倬撥貯榖五千八百五十七石此二處倉儲巳足亦無庸置議外若金門鎮額兵二千三百餘名地在孤島之中係屬海外要區澎湖協額兵二千名􅔜協控制重洋為全臺門户閩安協額兵一千六百三十餘名地方濵臨大海産米甚少𤇺火營額兵九百名􅔜營屼立海中係與浙江洋面聨界要汛銅山營額兵一千二百名四面環海本地甚少田耕日食全賴商販凡此鎮協各營亟應按其兵額綢繆未雨庶幾有備無患臣擬於海壇鎮酌貯榖四千三百石金門鎮亦酌貯榖四千三百石澎湖協酌貯榖四千石閩安協酌貯榖三千二百石𤇺火營酌貯榖一千八百石銅山營酌貯榖二千四百石以上共貯榖二萬石於每年青黃不接之時借給兵丁免其加息秋收𣪚餉扣除買補完倉責令􅔜管鎮將盤查出結升遷離任列入交代則海疆守汛兵丁永沭皇仁於無既矣此項榖價臣案查雍正五年有浙省運閩截漕榖二十萬石現在榖價銀五萬三千八百餘兩原係題奉俞允買米存貯之項閩省本年早稻豐登現在收穫晚禾亦極茂盛應請動支前項榖價乘時採買建倉收貯以備沿海鎮營接濟兵食是否可行仰懇皇上指示倘蒙俞允另行恭疏具題臣謹繕摺具奏伏乞皇上睿鑒施行謹奏兵食最關緊要應如是辦理者照所議具疏題請硃批諭旨卷二百十四之五欽定四庫全書硃批諭旨卷二百十四之六硃批郝玊麟奏摺雍正十一年九月初二日福建總督臣郝玉麟署福建陸路提督臣阿爾賽謹奏為請旨事竊照閩省福興泉漳四府并福寧一州屏藩邊海控禦島夷設有水陸二提督以及福寧漳州金門海壇南澳五鎮互為犄角濵海營制巳極嚴密其延建邵汀四府界連廣東江西浙江三省水陸衝衢惟汀州設總兵一員其餘皆係協營控制管轄尚未得宜查汀鎮所轄邵武延平二協內延平距汀州七百五十里甚屬遼逺更有建寧一協並浙閩兼轄之楓嶺一營逺隸福寧鎮管轄相隔千餘里之外考驗辨兵往返艱苦一切往來文稟動經四五十日始得遞到倘遇緊急公事難保必無遲誤是汀鎮之於延平協福寧鎮之於建寧楓嶺等協營不獨鞭長莫及亦且耳目難周似應因地制宜未便因循悠忽臣等查建寧所屬浦城松溪等縣與浙江龍泉慶元等處山川相錯又該協駐劄府城濵臨建河實為水陸要區延平近在肘腋楓嶺即其門户應請將建寧協副將改設總兵以延平一協楓嶺一營歸其管轄控制浦城等處并扼仙霞嶺要隘與汀州福寧二鎮亦互為犄角更得聲勢聨絡矣其水路要隘之處應添防汛兵丁臣等斟酌撥補以嚴汛守至汀州鎮仍轄邵武一協暨本標三營福寧鎮仍轄連江羅源桐山暨本標共六營汛營制俱屬適均而各鎮稽查易周一切公務不致遲誤似於地方有裨緣係改協為鎮臣等未敢遽行具題理合恭請聖主指示謹繕摺具奏伏乞皇上批示遵行謹奏會疏題請聼候裁奪福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為據情轉奏事本年八月十七日據候補知府張良弼稟稱良弼家本寒微世受國恩親父傑由天靖衛守備荷蒙皇上天恩特擢廣西梧州協副將又奉命護理廣西提督印務調任廣東福建等省今現任雲南騰越協副將良弼一介庸愚毫無知識由福建福寧州知州補授本省理事同知升授知府聖主洪恩天髙地厚良弼父子即捐糜頂踵未足仰報萬一感激之忱倍深踴躍伏念良弼賦性愚拙歷任以來一切政務雖竭蹶辦理惟恐或有遺誤時懼不能勝任而於弓馬營伍事務自幼跟隨父任曾經留心學習伏覩我皇上至聖至明凡於用人之道悉皆量才任使查前任福建水師提督許良彬現任江南徽州營參將楊文成均係候補知州改補武職良弼自揣文武雖係兩途均為朝廷出力懇祈援例仰請皇上恩準良弼以武職改補則犬馬愚誠矢圗報於生生世世矣為此據實具稟等語臣等查候補知府張良弼自服官閩省以來辦事勇往直前頗為努力今據稟請援例改補武職情詞甚屬誠懇該員年力富強人材壯健驗其弓馬亦屬可觀應否準其改補洪恩出自聖裁倘蒙俞允另行給咨送部引見臣等不敢沮抑下情謹據實恭摺具奏伏乞皇上睿鑒謹奏有旨諭部同日又奏為恭報閩省早稻收成分數仰祈睿鑒事欽惟我皇上念切民依重農貴粟各省收成分數無時不在宵旰疇咨之內兹據布政使劉藩長彚報福州府屬閩縣古田永福三縣收成均有十分候官長樂二縣收成均有九分福清連江閩清三縣收成均有八分羅源縣收成七分興化府屬莆田縣收成九分仙逰縣收成十分泉州府屬晉江永春德化三縣收成均有十分南安惠安二縣收成均有九分同安安溪二縣收成均有八分漳州府屬平和詔安二縣收成均有十分漳浦南靖長泰三縣收成均有九分龍溪海澄龍巖漳平寧洋五縣收成均有八分延平府屬順昌將樂大田永安四縣收成均有九分沙縣尤溪南平三縣收成均有八分建寧府屬政和甌寧崇安浦城壽寧五縣收成均有九分建安建陽松溪三縣收成均有八分福寧州收成七分所屬寧德縣收成八分福安縣收成六分邵武府屬邵武縣收成十分建寧光澤二縣收成均有九分泰寧縣收成七分汀州府屬長汀寧化上杭連城四縣收成均有十分清流武平歸化永定四縣收成均有九分理合分晰彚報其臺灣府屬每年收穫較內地稍遲容俟報齊之日另文具報合併聲明等語臣等伏查閩省仰蒙聖主福庇連年俱慶有秋今歲收成更比往年豐稔現在米價每石自八錢起至一兩不等民食充足荷蒙皇上教養深仁風俗漸臻淳厚械鬭盜劫等案較前頗少海洋陸路地方俱各寧謐晚禾亦極蕃盛臺灣府屬早稻收成分數容俟彚報到日具奏外所有內地福州等八府及福寧一州各縣早稻收成分數理合據實奏聞伏乞皇上睿鑒為此謹奏閩省早稻收成分數以手加額欣悅覽之雍正十一年九月二十六日福建總督臣郝玉麟謹奏為姦民私載番人潛入內地事竊照閩省人民貿易外國吕宋地方及偷渡在彼久住者甚多該地番夷資財豐裕往來熟識難免引誘之弊亟當防微杜漸經臣於洋船酌添水手嚴禁偷渡案內僃將情形奏聞欽奉皇上硃批諭旨臣仰遵聖訓時時警惕刻刻留心每見文武屬員嚴令加謹稽察毋得稍懈因閩安協副將張天駿素常辦事幹練精細才具明敏特令其密加留心察訪據實速稟去後嗣據張天駿稟稱有久住吕宋福寧州民帶有吕宋夷人二名出租船番錢一百五十圎船主出有保狀與彼處夷主其番人帶有四甲箱番錢約計五千金在大擔門外雇小船乘夜到漳州福河厰蔡家村內投住欲在漳泉招人歸伊天主教等語臣聞聼之下不勝駭異適汀漳道郭朝鼎因公在省該員精明強幹才猷兼僃臣與撫臣趙國麟當即密諭令其星往確查慎勿漏泄兹據郭朝鼎稟稱訪得番人擕銀前來內地果有其事遵即密同漳州府知府王之琦選差妥役拏獲船户劉前郎水手黃祿訊據供稱有久住番邦的福寧州一人名呌蔡祖帶有番人名呌聖哥蔡祖送到後坂社嚴秀才小名登官家裹隨諭署龍溪縣知縣孫國柱帶役拏獲嚴登并搜出天主教圗像等書續於嚴登家內搜出番人一名又於嚴登家草堆內搜出番人聖哥一名現押嚴登究出蔡祖務獲嚴審引誘番人潛至內地確情清查番人帶來銀兩有無煽惑良民訊明詳報所有番人二名巳將善言撫慰安頓妥協處所等語除檄飭究審外臣與撫臣查番人住居外國若非蔡祖勾引何敢帶銀潛入內地其勾引之蔡祖私載之船户劉前郎水手黃祿窩留番人在家并搜出天主教圗像之武生嚴登等均應按法從重治罪以警愚民至番人聖哥等不應聼從引誘帶銀潛至內地誘人入教煽惑愚民惟是夷人不知天朝法紀即按律治罪彼亦何辭但臣等伏覩我皇上天地為心包涵萬國凡於外域遠人靡不恩豫矜憫應俟此番審明番人果有擕帶銀兩逐一查出即覓吕宋便船將該番並銀兩一併送至吕宋交明彼地番夷頭目收管使外夷咸知聖朝稽察周密法度森嚴不敢有犯更昭聖主寬大洪恩畏威懷德海島逺夷同聲感激矣所有臣等辦理此案愚見復經密商觀風整俗使臣劉師恕署陸路提臣阿爾賽水師提臣王郡俱各意見相符但臣等愚昧淺見是否有當伏乞皇上睿鑒訓示遵行為此謹奏嚴懲內地勾引之人從寬釋放逺夷辦理甚屬妥協雍正十一年十一月初一日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為欽奉上諭事雍正十年十二月二十日奉皇上硃批布政使劉藩長奏請賞撥海關稅餘銀兩留充公用一案并接大學士張廷玉寄字內開欽奉上諭命臣等將養亷公用各項妥帖計議辦理至於錢糧關係緊要劉藩長任內那墊之數著將劉藩長名下應得養廉全扣補完其從前潘體豐那墊未清之項著落潘體豐賠補如力不能完亦將劉藩長養廉逐年扣補欽此臣等欽遵諭旨悉心計議隨經詳細恭摺奏覆所有劉藩長任內那墊之數飭將應得養亷速即補完具報其潘體豐那墊未清之項嚴令劉藩長逐一追補去後兹據劉藩長稟稱藩長一介庸愚茫無知識仰蒙皇上畀以閩藩重任職司錢糧出入殊恩異數毫無仰報通省各員養亷巳蒙聖主賞給至於辦理公務更有耗羡抵用理應通盤籌畫權衡緩急斟酌辦理乃藩長賦性愚拙遽以耗銀徴解不齊奏請撥給海關盈餘銀兩以充公用實屬冒昧之至荷蒙我皇上洪慈不加罪斥敕將藩長那墊之數於名下養亷補完潘體豐從前未清之項如力不能完亦將藩長養廉逐年扣補欽此欽遵藩長自蒙聖訓無時不深悚惕感激愚忱即世效犬馬亦難報君恩於萬一伏查藩長原奏潘體豐任內那墊銀七萬五千六百餘兩今已據各屬完解耗羡官莊并吕大雲完解支領修城銀兩以及歸補等項共收過銀六萬三千五百四十餘兩未完銀一萬二千六十餘兩內吕大雲未補銀四千三百一十四兩現在行催完補外據潘體豐之子潘應召稟稱伊父任內前署總督史貽直長支養亷二千五百九十八兩零前總督劉世眀長支養亷五千一百五十六兩零稟請催補等語業經轉詳咨催在案至藩長任內那墊銀一萬六千餘兩凜遵聖諭巳將本任并前任內養亷湊足全數補完今據各屬將前項民欠耗羡銀一萬六千餘兩陸續完解清楚現同藩長補完之數一併存貯在庫理合分晰造册送核稟請奏逹聖鑒藩長不勝惶悚之至等語臣等查劉藩長自蒙聖訓以來感激天恩力圗報效其愧悔悚惕之心時形於色兹據稟伊任內那墊銀一萬六千餘兩已將養亷湊齊補足其各屬未完前項耗羡銀一萬六千餘兩巳據陸續完解清楚一併存貯在庫造具清册前來臣等公同查核無異除史貽直劉世眀長支養亷吕大雲未完修城各銀兩現在移行嚴催完補外所有劉藩長感激聖恩遵旨完補并據各屬解完耗羡緣由理合據實奏聞伏乞睿鑒謹奏史貽直長支銀兩著於潘體豐劉藩長名下追補還項餘俱覽悉同日又奏為欽奉上諭事本年八月二十七日接內閣字奉上諭朕聞福建古田縣知縣趙琳居官聲名甚好著詢問郝玉麟趙國麟若趙琳居官果優著伊等酌量或知州或同知知府以人地相宜之缺題補欽此臣等伏讀諭旨仰見我皇上鑒拔人材之至意查古田縣地方最屬遼濶縣治多係大山民俗獷悍趙琳化導有方寬嚴並用聲名頗好臣等正擬有相當缺出請旨升補因古田最關緊要一時未得其人地相宜之員尚未題請兹欽奉上諭聖眀無逺弗照查該員現丁母憂除會疏題請給假治喪回閩之日俟有人地相宜缺出臣等酌量請旨升補以示鼓勵合先據實恭摺奏覆伏乞皇上睿鑒謹奏給假治喪俾得公私兩全甚善似此出色之員當破格題請優擢以為親民者勸雍正十一年十一月十八日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為恭報閩省晚稻收成分數仰祈睿鑒事竊查閩省比年以來時和歲稔本年早稻收成更為豐裕業經臣等據實奏聞在案今當晚稻登場之候行據布政使劉藩長彚報福州府屬長樂永福古田三縣收成均有十分閩縣連江二縣收成各有九分侯官福清閩清三縣收成均有八分羅源縣收成七分興化府屬莆田縣收成九分仙遊縣收成八分泉州府屬德化縣收成十分安溪縣收成九分晉江惠安同安三縣收成均有八分南安永春二縣收成各有七分漳州府屬漳浦漳平平和三縣收成均有九分龍溪海澄南靖長泰龍巖寧洋六縣收成均有八分詔安縣收成七分延平府屬大田縣收成十分南平順昌將樂沙縣尤溪永安六縣收成均有九分建寧府屬甌寧建陽政和浦城四縣收成均有十分建安崇安松溪三縣收成均有九分壽寧縣收成八分邵武府屬邵武光澤二縣收成各有十分泰寧縣收成九分建寧縣收成八分汀州府屬長汀清流上杭永定連城五縣收成均有九分寧化歸化武平三縣收成均有八分福寧州收成八分所屬之福安寧德二縣收成均有九分臺灣府屬每年早稻收穫較內地稍遲前經臣等奏明兹據彚報臺灣鳯山二縣早稻收成各有七分晚稻收成各有八分諸羅彰化二縣早稻收成各有八分晚稻收成各有七分并稱臺灣地方本年秋間偶被風雨並無有礙禾稼等語具報前來臣等謹據實分晰陳奏再閩省多産番薯本年尤為豐收更資民食通省米價每石自七錢六七分至一兩零不等民人樂業海洋陸路地方俱各寧謐合并奏聞伏乞皇上睿鑒謹奏覽奏閩省晚稻收成分數及米糧價值情形朕實額手欣慶此皆卿等忠勤任事感荷上天慈佑之所致但當益加寅畏毋起絲毫滿肆之念勉之更勉可也雍正十一年十二月二十六日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為據實奏聞仰祈睿鑒事竊照臬司一官為通省刑名總滙必須事事詳慎一秉至公始為允協兹按察使李玉鋐自上年到任以來臣見其年齒雖老然於刑名案件精力尚能辦理雖遇事每多偏執臣屢次推誠誨勉該司當下亦常知省悟詎意近來情性甚覺放縱好惡偏私多以剛愎自用種種悖謬難以悉舉而且任意瞻徇姻戚毫無忌憚牢不可破臣國麟荷蒙皇上畀以巡撫重任視事之後於所屬各員賢否詳慎訪察經將按察使李玉鋐居官時有拘執之處於雍正八年十一月間具摺奏聞欽奉硃批覽奏俱悉仍當不時訪察加意體驗可也欽此維時李玉鋐旋因患病回籍上年奉旨復任臣欽遵前奉諭旨不時加意訪察婉切開導該司初時尚知檢點近來拘執之性又復如故難以冀其轉移臣等竊思辦理朝廷公事總在殫竭公忠無纖毫人我之見始能歸於至當若偏執巳性任情好惡必至悖謬所關甚巨今李玉鋐年巳七十三嵗看其辦事雖能支持然偏執悖謬之處較前尤甚動輒以年老辭官為語言詞舉動顛倒反覆恬不知怪臣等因其素常操守尚好辦事亦勤是以未即指參但臬司係風憲大員為通省百職之表率士民之瞻仰職任綦重臣等不敢瞻徇隱諱謹據實密摺奏聞伏乞皇上睿鑒謹奏李玉鋐原係庸材所奏知道了同日又奏為姦民私載番人潛入內地謹將審擬罪名恭陳聖鑒事竊查福安縣姦民蔡祖本名蔡祝勾引吕宋番人携帶銀兩潛至內地欲在漳泉招人歸伊天主教一案情由先經臣等恭摺奏聞彼時因為首勾引之姦民蔡祝潛逃臣等一面懸賞緝拏並專差星赴福安縣密諭知縣王玲務期弋獲如稍踈縱嚴行參處該令當即分差幹捕四路緝拏隨於西演地方深山之內拏解前來當即押發按察司會同布政司嚴訊去後兹據該司等行據縣府將各犯審明録供解司復訊議擬會詳前來臣等核審無異查天主一教本屬妄誕最易煽惑愚氓臣等屢行查禁蔡祝膽敢在外域吕宋地方向番人説及行教情事於雍正十一年六月內勾引番人聖哥携帶銀兩番經木箱行李等物給船户劉前郎番錢五十圎搭船於七月十九日至大擔門外前郎慮恐塘汛盤詰復向聖哥取番錢三圎雇不識姓名小漁船一隻潛入內港於二十日早蔡祝前郎同引聖哥至嚴登家住下前郎即回厦門嗣蔡祝復得聖哥番錢十五圎亦回福安縣原籍先有番人萬濟公於雍正十年間自吕宋至廣東香山澳因聞嚴登原係奉過天主教之人來訪嚴登欲行伊教遂與聖哥一同藏匿嚴登家內禮教誦經旋被訪聞拏獲尚無歸教人民再四詰訊各犯矢口如一水手邱招行保鄭瑞於事發擬合依左道惑人律絞監候嚴登合依為從屬有司者僉妻發邉外為民船户劉前郎水手黃祿合照偷渡船隻水手杖一百徒三年例各杖一百徒三年又水手邱招合依知人欲告自首者減二等杖八十徒二年行保鄭瑞合依不將偷渡情由首明例責四十板徒三年今事後出首應照知人欲告自首者減二等律杖八十徒二年均無枉縱嚴登家中搜出天主教圗像等書飭行銷毁番人聖哥萬濟公臣等宣布皇上寬大洪慈並天朝法紀該番等始則戰兢恐懼後則踴躍歡呼望闕叩頭謝恩訖隨將蔡祝劉前郎所得聖哥銀兩照數飭追以及該番帶來木箱行李番錢等物逐一交給收領差員押往厦門諭令厦門同知即覓吕宋便船令船户照看載回彼國又番人萬濟公一面差押至廣東咨眀該省督臣發交香山澳番目收管以昭聖主天恩所有審擬蔡祝等各犯罪名以及遣回番人緣由理合繕摺恭奏伏乞皇上睿鑒謹奏覽奏知道了摺尾並無另疏題請字樣何耶同日又奏為請旨事竊照閩省沿海居民多有販洋為業往來外域經物於大擔門外暗雇小船裝載回家經漳州府訊據陳魏供稱犯生向在廣東貿易於康熙五十三年買有茶葉貨物在廣搭船往噶喇吧五十五年娶了妻室楊氏原是福建人本年犯生回至廣東買了磁器等貨復往吧國賣完了貨又賣布匹稍有利息原去的船巳回棹了隨於五十六年奉禁了洋船隻稀少回來不得並不是甘心久住番邦自蒙萬嵗爺天恩開了洋禁雍正七年才得回到家裏住了三年十年上在蘇州捐了監生又買茶葉等貨仍在廣東搭船到噶喇吧原是做生意的人不能歇業歷次往來上稅照票俱托船户料理的家中尚有老母兄弟常寄銀信回家養贍今年春間妻室不在了留下三箇女兒因無子買了兩箇番妾兩箇小番使女四箇番僕都是當著荷蘭番官明白買的帶了些番米行李同家眷回歸故土侍奉老母永為盛世良民並無違禁貨物起身的時節夷目呷嗶丹配了郭佩的船本年五月裏到大擔門外犯生因今次未曾請得牌照汛口盤詰嚴謹為此雇了小船由大擔外洋回家犯生從前羈留外邦實非得已並不是甘心住在番邦的若忘了故土的人於今就不挈眷回鄉了只求詳察訊據楊營供稱小的原在同安縣做生意雍正六年正月在廣東將本銀三百兩買了些茶葉磁器搭船到噶喇吧娶了妻室郭氏是中國人原要隨船回來的小的因染了病至八年五月裏仍回廣東買了貨於九年正月又往吧國這幾次出洋納稅照票都是船主代為料理的小的有箇哥子楊課原在吧國娶有嫂子生下兩箇姪兒上年哥子不在了小的娶的妻室生了兩箇兒子一箇女兒年紀尚小又買了一箇乳媽三箇番僕俱係番官説定身價買的連嫂子姪兒共十一口向番目呷嗶丹説明搬眷情由他配給了髙鳯的船於今年六月裏到了大擔門外因沒有照怕塘汛查驗雇了一隻小漁船由大擔外洋到家就被本縣拏了小的原是守分良民自雍正五年奉恩旨開了洋禁漳泉的百姓得到番地做生意如今家給人足無不感戴國恩不但小的不敢忘本即現在外邦的俱有思歸之念小的因愚蠢無知這次誤犯私渡禁令只求超釋等情供吐在案正在敘詳間復據陳魏楊營為叩求轉逹下情事呈稱魏等邊海愚民向在吧番貿易魏因生意牽纒又因禁洋以致淹留番地營自開禁後出洋不合無照私渡回家甘罪何辭但切思漳南一帶人稠地瘠向苦食用不敷深幸比年以來聖化覃敷海洋寧謐魏等往來生理獲利豐家實皆皇恩帝澤沾被無窮今魏等情願將所獲餘資仿照社倉之例魏捐榖八千石營捐榖五千石并各造倉厫僃賑鄉黨稍伸報效以贖罪愆乞憐魏等愚蠢無知宏施祝網加惠閭閻仁澤永垂萬年等語將陳魏等分别議擬由司會詳前來臣等伏查雍正六年間前督臣髙其倬疏稱留住噶喇吧吕宋之人係康熙五十六年定例以前者定限三年之內準其回籍如康熙五十六年定例後私去者自不應準其回籍等因會題欽奉諭旨洋禁初開禁約不可不嚴以免內地人民貪利飄流之漸其從前逗留外洋及違禁偷往之人不準回籍欽此臣等伏讀聖諭我皇上訓誡愚民不思故土逗遛外地並禁其貪利飄流之漸者實屬天心慈愛之深誠亘古以來所未有也今查陳魏於康熙五十五年自廣東往噶喇吧經營生理至雍正七年始行回家係在雍正六年欽奉諭旨不準回籍之後雖據供從前因生業牽纒又緣禁洋船隻稀少欲歸不能並非甘心異地質訊鄰佑僉稱陳魏實係良民但該犯今於本年七月間未有牌照挈眷偷渡回籍實屬不合楊營雖係雍正六年奉開洋禁之後往番貿易但亦無照攜帶眷口偷渡潛回查陳魏違禁回籍之處律無正條應與楊營均照偷渡緣邊關塞者杖一百徒三年律應各杖一百徒三年船户郭佩髙鳯應照偷渡臺灣人等知而不舉例各杖一百徒三年均屬不枉今據陳魏楊營呈稱情願共捐穀一萬三千石建造倉厫僃賑里黨以贖罪愆臣等僃查各該犯攜眷回籍情形依戀故土與甘心異域者有間可否仰籲聖慈準其捐贖豫以自新船户郭佩等照依干連人犯例酌量完結洪恩出自聖裁臣等未敢擅便謹據情恭摺具奏伏祈睿鑒謹奏念若等依依故土之情應準其捐贖但飭行地方有司時加約束毋使任意他往福建總督臣郝玉麟謹奏為欽奉上諭事本年十二月初九日接到大學士伯鄂爾泰字一封內開雍正十一年十一月十一日奉上諭馬召南本係庸常之人朕知之甚悉從前在廣西時諸凡懈弛不能勝任是以調用福州城守副將髙其倬曾奏伊到閩省後辦理營務井井有條署督標中軍一切俱能切實料理管束辨兵甚是嚴明實係賢能之員可用之才等語當經朕批飭馬召南豈能如此竒特髙其倬不過見其相貌故生賞鑒諭令留心詳察又劉世眀因提督張起雲之患病保奏馬召南歷練老成可以委令前往協理等語馬召南豈協理提篆之才劉世眀所奏大誤亦當即批飭又郝玉麟因漳州總兵員缺保奏馬召南歷練老成熟諳營務整頓有方委係才具出衆之員等語又阿爾賽保奏馬召南勤敏練逹請以署福寧總兵印務朕俱未允行又因馬召南年來辦事未知何如或能革除舊習奮勉上進亦未可定復降旨詢問郝玉麟郝玉麟又極力保薦並稱到任以來實心實力辦理營務其平日居官阿爾賽稱其才具可用等語朕因郝玉麟身在地方自必知之甚確是以降旨令馬召南署理福寧鎮總兵印務近聞馬召南居心貪鄙舉止輕浮前署漳州總兵印務時因僃辦執事等物並供給宴會一切使用每營各費銀三四十兩不等又收取甕城租錢藉賞兵名色入巳又收受土儀禮物甚多歷歷有據且於一切營務毫無料理惟知宴會演戲日以繼夜起更定炮不限更次且有參革守僃張定國與戲旦當場扮演而馬召南附和取樂兵民人等俱知似此貪劣無恥行止不堪之員郝玉麟阿爾賽豈無見聞乃竟毫無覺察且謬為保薦是何意見著嚴行申飭馬召南劣迹果實著郝玉麟一一查明具本參奏絲毫不得回護前奏瞻徇隱匿欽此遵旨寄字到臣臣跪讀諭旨不勝戰兢恐懼惶悚無地馬召南本係庸常之人久在皇上洞鑒乃臣愚昧淺識祗就其平日辦理營務之處具摺保奏不意該副將於署漳州總兵任內有如此劣迹誠屬下愚不移仰見聖主知人之眀鑒察無逺弗至臣身在地方不能覺察謬為保薦咎無可逭荷蒙我皇上格外洪恩詳切訓誨敕令查明題參臣即捐糜頂踵亦難仰報君恩於萬一查福寧乃沿海重鎮馬召南似此貪劣無恥不便仍令署理臣現在酌量委員前往福寧暫行署理該鎮印務馬召南劣迹容臣逐一查眀據實題參請旨定奪臣誤保於前悔恨無及斷不敢絲毫瞻徇隱匿自罹愆咎也臣謹恭摺具奏伏乞睿鑒謹奏觀汝存心似有博取仁慈寬厚虛名景象稍若踵襲故步非徒無益於國且恐有害於已一涉善柔則與邊海巖疆之任大不相宜矣總惟效法鄂爾泰斯為盡善不可遺忘前訓誤走邪途慎之毋忽雍正十二年三月十二日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為欽奉上諭事竊臣等於上年十一月初一日會奏布政使劉藩長那墊銀兩巳據照數補還貯庫一案欽奉皇上硃批史貽直長支銀兩著於潘體豐劉藩長各名下追補還項餘俱覽悉欽此當即飭行該司速即分補完報先於上年十一月十五日尚未奉旨之前即據史貽直解補前任閩督時預支養亷銀二千五百九十八兩有零移咨臣等飭司收存兹奉諭旨據劉藩長稟稱伊名下遵旨應分補銀一千二百九十九兩有零巳經如數補完潘體豐名下應分補銀一千二百九十九兩據伊子潘應召自限六箇月回籍山東解補等語其史貽直先前還補之項應否發還臣等未敢擅便相應請旨遵行至此案補還銀兩細數統容分晰咨部查核合併陳眀伏乞皇上睿鑒謹奏既據解送到閩又何必發還史貽直巳曾奏聞矣雍正十二年五月二十二日福建總督臣郝玉麟謹奏為微辨著有勞績伏懇皇上格外施恩以示鼓勵事竊照臺灣府治全藉鳯山縣為之屏藩鳯山一邑又賴鳯彈汛為之保障是鳯彈一汛所關甚重查雍正十年四月初二日匪犯吳福生等聚衆合攻鳯彈汛營盤該汛係茨竹為城所存汛兵不滿二百汛辨係把總黃升當吳福生率賊千有餘人自四更時合圍攻擊黃升率衆奮勇拒守直至次日辰時將賊殺死五人擊傷十餘人賊隨解散至初四日賊復會聚聲勢愈重值提臣王郡督兵馳至賊乃大敗逃散鳯邑臺府均得保固實皆黃升奮勇拒守鳯彈之功臣初聞猶恐未確後提臣王郡御史柏修暨軍前大小將辨僃述始末衆口如一查黃升係臺地把總定例二年俸滿即歸內地以千總補用黃升今巳俸滿因吳福生一案準有部咨查取文武踈防各職名黃升亦在其內因格於成例未便拔補經臣調到驗看人材弓馬均在可觀甚屬可惜實係膽勇出衆功績昭著之辨臣雖在奬賞未足以酬其功可否仰邀聖恩準帶議處踈防之案補授千總或從優以守僃擢用洪恩出自聖裁倘蒙聖恩破格超用從此海外大小員辨益加感激奮勉力圗報效矣應否送部引見之處伏候批示以便遵行臣因鼓勵辨員起見不揣冒昧恭摺具奏伏乞皇上睿鑒謹奏將其拒守却賊功績僃悉聲眀送部引見題到之日有旨福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為恭報閩省二麥收成分數事竊惟省耕教稼愛養厪於宸衷問嵗祈年收穫關乎民食閩省地方仰荷聖主福庇屢慶有秋兹屆二麥登場之後據布政使劉藩長彚報福州府屬九縣內永福縣收成十分其餘九分八分不等興化府屬二縣各收成十分泉州府屬七縣內永春德化二縣收成十分餘自九分起以至八分漳州府屬十縣內除龍巖平和二邑地不種麥其餘收成有九分八分臺灣府屬四縣收成各有八分延平府屬七縣九分收成者四縣八分收成者三縣建寧府屬八縣除壽寧一邑地不種麥其餘收成有九分八分以至七分不等邵武府屬四縣內光澤縣收成十分其餘均有九分汀州府屬八縣內歸化縣收成十分其餘有九分八分福寧州暨所屬二縣內寧德縣收成九分餘各有八分又按據各屬陸續具報前來臣等詳加察核無異並據各稟稱本年自春至夏雨水調勻米穀價平臣等僃查各屬現今米每石自九錢起至一兩零數分價甚平減民食充裕通省雨水霑足禾苗滋長臣等於勸農之時通行查勘甚屬暢茂是皆我皇上精誠感格上迓天庥如響之應臣等不勝歡忭之至惟有倍加敬畏正已率屬仰副聖主垂訓之洪慈耳所有各屬二麥收成分數理合恭摺奏聞伏乞睿鑒謹奏覽二麥收成分數雨水米價情形遙顧海疆曷勝額慶雍正十二年六月十二日福建總督臣郝玉麟謹奏為奏聞事竊照臺灣番民性本愚蒙行頗恭順前因一二不法匪類滋擾地方仰蒙皇上天威逺震除惡安良各社番民得以咸安耕種軍興之際實心效力逮荷天恩添設官兵捍衛感激歡呼凡遇用夫車輛公務土官通事無不踴躍向前甚屬可嘉兹據臺灣府知府尹士俍詳據鳯山縣知縣陳同善詳稱據岸裏社通事張逹京土官敦仔阿打歪加巳眉加由麻仕菜等呈為化及不毛冥頑風動願歸版圗事詞稱竊惟內山等處生番穴居野處不隸籍中當今聖天子仁風逺播德澤宏深凡在昆蟲草木尚知鳴樂向榮生番雖居界外猶具人形能無感激之念兹沙裏社生番席由敏等願歸版圗納餉供役等情造具歸化生番户口册一本到縣隨喚通事張逹京生番席由敏瓦陳由敏等當堂驗訊據稱沙裏社界在獅頭獅尾南𫝑在巴荖逺東勢離岸裏社三百里因阿打歪敦子同沙裏社原是番親因此出來歸化願作好人大小男婦共一百九十九名口等供當經各給賞勞諭令歸社并取該通事土官約束甘結在案事關生番歸化不敢壅於上聞合就詳請題逹準豫歸化載入版圗以廣招徠等情據此又據臺灣鎮道詳報前來臣即批行布按二司確查酌議通行在案伏惟聖朝德化宏敷海嶠番黎欣欣向化兹沙裏社户口錢糧雖屬無多察其情詞甚屬誠懇似應俯順輿情遂其依歸之念除俟該司等酌核詳覆到日臣與撫臣詳晰會題外理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏巳悉會題到日有旨福建總督臣郝玉麟福建巡撫臣趙國麟謹奏為恭報閩省早稻成熟情形仰祈睿鑒事竊照本年自春徂夏雨水調勻土膏滋潤栽插之際又得大雨疊沛禾苖日漸長茂吐華結實穀穗纍纍形若貫珠臣等因公事出郊目覩嘉穀盈疇之盛隨順便勸勞農民莫不歡欣踴躍咸稱今年榖穗比往年尤為豐滿將來收成自好等語又據各屬具稟情形相同查栽插在前者現在漸次收穫其栽插稍後之處亦巳成熟市米每石自八錢起至一兩有零不等價值平減人民樂業臺灣一府據各地方官稟報雨水霑足禾苖亦極暢發臣等感戴天庥恪遵皇上敬天勤民之至意耳除收成分數容俟彚報到日具奏外所有早稻成熟情形合先恭摺奏聞伏乞睿鑒謹奏早稻成熟米價平減情形以手加額覽焉實緣卿等文武大臣能同心協力忠誠任事有以感召天和始著斯徴驗也嘉悅之懷筆難悉諭勉之雍正十三年六月初二日浙閩總督臣郝玉麟謹奏為海疆重鎮務在得人仰懇聖主簡補賢能以收實效事竊照金門鎮總兵許國騰病故經臣題報在案其所遺印務令安平副將髙得志署理臣查金門一鎮孤懸海島與厦門對峙控制外洋實為臺澎之屏障最關緊要必得幹練之員方克勝任理合恭請就熟可否補放洪恩出自聖裁倘蒙俞允其髙得志所遺員缺亦屬緊要容臣另選人地相宜之員會疏題補請旨合併陳眀伏乞皇上睿鑒謹奏髙得志原籍江南非生長閩粵者可比水務何能遂臻精熟朕知其漢仗雖好胸襟甚欠明白况既無出衆之藝又無出格之功一旦超擢鎮任殊覺太驟如不得人暫令署理以觀後效尚可雍正十三年七月初一日浙閩總督臣郝玉麟謹奏為據實密奏仰祈睿鑒事竊臣荷蒙聖恩擢用總督兼制兩省於今年四月抵浙之次即前往海寧等縣遍歷東西海塘並至尖山細加查勘建築石壩工程巳有十分之六從前深有十餘丈者今海底積有漲沙現在最深處不過二丈有餘至小塔山則止有一丈五六尺不等看來似易成功惟一路塘堤內條石塘身者堅固屹立其向用塊石砌築各塘均不若條石之堅整再原係石塘後因坍卸暫將柴薪搶修者甚不堅固此外更有草塘數千丈原因沙土浮鬆不能建築石塘止用柴土堆砌抵禦潮汐更當加謹修整至以上各塘臣訪問十一十二兩年雖經隨時搶修冬底並未加修隨於彼時同將軍臣傳森撫臣程元章副都統臣隆升欽差大理寺卿臣汪漋內閣學士臣張坦麟等面言如此險要工程搶修不過權便一時現在塊石各塘極宜補築柴草各塘均應修整以防風潮不測斷不可因十一十二兩年並未加修幸免踈虞恃以為常况前嵗蒙皇上差內大臣等來浙估築石塘共一萬丈四尺估計工料銀一百七十餘萬兩并荷睿算指示尖山石壩建後即有漲沙亦可漸次改建石塘之旨今應於緊要之處亟宜修築仰慰聖懷為是諸臣俱以臣言為然臣隨面諭布政使張若震給發銀兩採辦物料一面行令海防同知丈量緊要處所勘估册報正在恭摺請旨遵行間不期六月初二日夜風潮猛烈一切塘堤坍塌十之八九甚屬危險臣細訪從前不行加修之故實緣諸臣意見不侔十一十二兩年以來錢糧雖有節省今一旦坍卸如許之多所費加倍若非仰賴聖主福庇倘潮水灌注塘內民間田園廬舍能保無虞時屆伏秋大汛勢難刻緩而石料又一時不能猝辦只得照舊暫用塊石柴草分别搶修今工程雖將告竣仍應籌畫經久之計查搶修嵗修各塘自康熙五十四年起至雍正十三年六月歷年所用錢糧數至一百六十餘萬而塘工一遇風潮仍多坍卸不能保固是係人力未盡不可悉諉天災惟有石塘可垂久逺皇上早巳籌及指示甚明即如原任浙江巡撫今大學士臣朱軾任內所築石塘五百丈至今十有餘年毫無撼動其餘凡係條石塘身亦皆完固計有三千數百餘丈今亟應遵照內大臣海望等所估改建石塘次第興築始為萬全惟是條石一時不能猝辦臣與撫臣巳飭令多員預行分路採備屆期酌派工員各分段落趕辦趕築若地方大吏以及總理大臣秉公無私和𠂻辦理未有成功不速者無如諸臣意見不合每事齟齬將來興舉大工自必更致參差臣受恩深重何敢顧避嫌怨知而不言竊見海塘所關甚巨總理大臣未能安詳辦理除堵築尖山石壩工程巳有三分之二乃係隆升一手辦理之事其現議海塘工程可否另委賢能大員總理之處伏乞皇上聖裁再應建石塘計一萬丈餘尺若非亟亟辦理必致稽延嵗月務得多員分假趕築庶可計日成功查府廳州縣各官俱有地方刑名錢穀之責不能分身監督并祈皇上敕部揀選家道殷實候補候選人員二十員來浙照河工之例分段派委監督工程所需條石除本省採辦之外江南地方亦有石宕可採即各塘舊石亦多有堪用者一併酌量濟用大工告竣不難沿海地方民人仰戴皇恩於億萬斯年矣臣不揣冒昧謹陳愚見恭摺具奏伏祈皇上睿鑒謹奏此奏之可嘉處筆難盡宣奏內各種情形亦朕所備悉但他人不肯如是爽直耳現與廷臣周詳籌計辦理方略議定後另有諭旨硃批諭旨卷二百十四之六
