body:
  text: 欽定四庫全書硃批諭旨卷一百九十八硃批鄂昌奏摺雍正七年六月十八日陜西寧夏道臣鄂昌謹奏為恭謝天恩事雍正七年六月初十日接得甘肅撫臣許容傳帖云奉旨許臣奏摺臣即恭設香案望闕叩謝外竊臣一介庸愚粗能識字甲辰科謬叨鄉薦前歲經本旗保舉引見蒙我皇上不棄葑菲即用為户部主事甫及一載又蒙皇恩擢為道員許臣奏摺臣何人斯受此異數唯有實心任事虛心體理不敢怠玩茍安不敢沽名邀譽倘能竭盡駑駘以圖報聖恩於萬一則非獨臣一身之幸亦臣祖宗父叔之深幸也臣於四月二十九日到任目下承辦軍需渠工諸務并查受庫貯軍需渠工籽種銀兩交代至地方民情土俗一切事宜臣係新任尚未悉其底裏容臣細心咨詢俟有確知灼見不時陳奏以請睿裁今因奉到許臣奏摺之旨理合具摺恭謝天恩謹奏汝責任中事固應循分盡職至於辦理之當否自有該上司考察遇便奏聞亦可或不奏聞亦可朕斷未有不信督撫兩司而專聽信道員之理今許汝等下僚亦得摺奏者不過欲廣耳目之意於汝責任外一切地方之利弊通省吏治之勤惰上司孰公孰私屬員某優某劣營伍是否整飭雨暘果否時若百姓之生計若何風俗之淳澆奚似即鄰境逺省以及都門內外凡有駭人聽聞之事不必待真知灼見悉可以風聞入告也只須於奏中將有無確據抑或偶爾風聞之處分析陳明以便朕更加採訪得其實情汝等既非本所管轄欲求真知灼見而不可得所奏縱至謬誤失實斷不加責但密之一字最為緊要不可令一人知之即汝叔鄂爾泰亦不必令知假若借此擅作威福挾制上司凌人舞弊少存私意於其間豈但非榮事反為取禍之捷徑也當仰遵朕訓慎之又慎遇有應奏之事何妨一月屢次上聞如無可奏便數年不奏亦豈罪汝毋因無事可奏搜羅瑣細捃拾浮詞而塞責妄陳朕日理萬幾應接紛紜何暇批覽不關緊要之謬説耶齎摺人來徑投怡親王府轉奏汝受朕拔擢之恩當矢志效法汝叔鄂爾泰果能企及汝叔之居心行事則為汝叔一流人物矣於以光耀祖宗揚名青史顧不美歟第一操守堅定其次秉公輸誠毋託小廉曲謹之行而為誤國欺君之事毋徇趨利避害之心而違人臣致身之道不可傲慢上官不可輕蔑屬吏尤不可逢迎上官姑息屬吏臨民涖政寬嚴並濟懲勸兼施凡百總不必預立偏見惟宜因人隨事評情酌理虛衷以處之能如是固守根本其餘枝節邊事文移案牘之未練地方情形之未周勉力學習可計日而能也即使初歷外任措置容有不協斷不至有蕩檢踰間之失心誠求之雖不中不逺矣勉之勉之雍正七年九月初一日陜西寧夏道臣鄂昌謹奏為奏聞事竊臣到任以來欣逢寧夏今歲雨水調勻秋禾茂盛收成甚好兼之渠工告竣渠水暢流開設之新渠寶豐二縣招納之户口俱各安生樂業此我皇上至誠格天使萬民坐享無窮之福臣邊省微員覩此豐亨景象不勝慶幸之至謹奏深慰朕懷同日又奏為密陳管見恭懇皇恩事欽惟我皇上念甘肅等省歷年軍需雖動公帑辦僃亦資民力轉輸特沛洪恩將庚戌年額徵銀兩悉行蠲免此誠聖主愛恤生民天髙地厚之至意臣查甘省所屬之河東四府原係里民額徵者多銀兩河西四府原係屯民今改為州縣額徵者多本色凡遇蠲免多不免本色如今歲大兵出口河西承辦軍需十分之六七河東所辦不過十分之三四河東因額徵銀兩蒙免甚多河西因額徵本色蒙免無幾伏查此番蠲免乃皇上格外之恩非尋常可比請將西河庚戌年額徵本色內亦量免其十分之三或十分之五後不為例則四府邊民倍沐皇仁於無盡矣再查寧夏一府現貯倉糧一十一萬二千四十石零其别府大概可知明歲兵丁應支本色糧石亦不至於缺誤為此具摺陳奏伏乞皇上睿鑒施行謹奏所奏是日前業經有旨諭部同日又奏為奏明邊鎮營伍情形事竊查寧夏為邊方重地而營伍尤關緊要近因總兵官郭成功年老精神不能應事而各營將辨任意疏忽怠玩多不遵號令以致寧鎮營伍大半廢弛臣居住同城見此情形理合奏聞伏乞皇上睿鑒謹奏為此亦經有旨矣雍正八年二月十五日陜西寧夏道臣鄂昌謹奏為恭懇皇恩事竊臣查寧郡萬民衣食之源在乎大清漢唐三渠之水利所以每歲自清明起至立夏止水利同知及時疏濬修理民田得資灌溉奈歷年專司之員疏忽怠玩只圖折草折夫致各閘道湃岸逐漸損壞時有衝決渠身淤塞日見淺窄而三渠之中惟唐渠為尤甚其口過低其梢過髙水勢不能逆流而上多誤小民耕種之期前因署水利同知鳯翔府通判靳樹鍭玩忽渠務經臣詳稟撫臣許容題參奉旨將靳樹鍭枷示渠工著令賠修欽遵在案除在靳樹鍭任內衝決者令靳樹鍭修理外其從前積年損壞之處亦復不少若冉不加補築以後日復一日更難設措現在兵部侍郎臣通智等開濬惠農昌潤二渠頗悉寧夏一切水利伏乞皇上諭令通智史在甲即行查議今歲預辦料物明春動工修補務使三渠永固則邊郡黎元倍沐恩膏於無盡矣為此據實陳奏恭請聖裁謹奏此奏甚屬切要另有諭旨由部頒發雍正八年十月初一日陜西寧夏道臣鄂昌謹奏為修補渠工事欽惟我皇上念寧夏三渠荒廢日久特命大臣發帑補修以足萬民衣食之源此誠聖主格外之恩寧郡無窮之福也惟是寧夏邊居西北地氣甚寒歲修三渠必待清明冰凍初開方可動工立夏工程完畢即行放水先澆麥豆次灌稻田務使芒種以前二輪水足禾苖始能茂盛倘立夏不能放水遂致有誤農期伏查此番修理工程浩繁非尋常歲修之可比而三渠共長五百餘里閘道共十餘座若一齊興工則一月之內不能告竣尤恐限於時日忙迫之中不無草率之弊若將三渠分作兩年修理實為便易再查三渠雖俱荒廢而其中惟唐渠為尤甚伏乞皇上諭令兵部侍郎臣通智太常寺卿臣史在甲明春先將唐渠修好其大清渠漢渠仍令動歲修額設夫料照常修理至壬子年再將大清渠漢渠修補則工程既得從容就理而農期亦不致有誤矣謹奏另旨密諭通智史在甲等酌量先後次第修理雍正九年六月初一日陜西寧夏道臣鄂昌謹奏為奏聞事欽惟我皇上俯念邊土頒發帑金開濬惠農昌潤二渠又特命修補大清漢唐三渠此誠聖主之隆恩寧民之厚福也今歲唐渠工竣水勢暢流惠昌二渠之水較前頗為通順大清渠漢渠之水亦皆得澆灌兼之雨澤調勻各處山田俱遍經布種夏秋禾苖十分茂盛足望豐收童叟咸欣城鄉共慶臣職任地方曷勝歡忭之至謹奏據奏渠水暢流雨澤調順朕以手加額覽焉雍正十年八月初一日甘肅布政使臣鄂昌謹奏為恭謝天恩事雍正十年七月二十七日蒙甘肅撫臣許容案驗準吏部咨奉上諭甘肅布政使員缺著寧夏道鄂昌補授欽此飭行到臣臣即恭設香案望闕叩謝訖竊臣一介庸愚至微至陋荷蒙皇上天恩由主事而擢任道員由僉事而加銜參政今復特授臣為甘肅布政使聞命之下感愧交集驚惕難安恭記聖諭有云臨民蒞政寬嚴並濟懲勸兼施凡百總不必預立偏見惟宜因人隨事評情酌理虛衷以處之又臣叔鄂爾泰曾訓臣云虛心求理刻意去私惟公斯明惟平斯允臣惟謹將皇上聖諭並臣叔父訓言悉心體認極力遵循倘能竭盡駑駘以仰報聖恩於萬一是臣之深幸亦臣祖宗父叔之深幸也今奉到授臣布政使之旨合先具摺恭謝天恩謹奏覽奏謝知道了勉之勿懈同日又奏為奏聞事竊查寧郡今歲夏田所收麥子豌豆已得九分秋田所種稻穀青豆糜子之類現在滋長茂盛大半成熟足望十分收穫兼之渠工既緩農務愈勤小民仰沐皇上天恩家家衣食豐裕凡屬轉運軍需各俱踴躍爭先急公努力臣目覩情形曷勝歡忭之至謹奏覽收穫情形朕懷曷勝欣慰雍正十一年正月十二日甘肅布政使臣鄂昌謹奏為密奏事竊查西寧一郡地處極邊去歲秋田未收冬春之交糧價甚昻所有駐劄滿漢官兵以及馬匹應需糧料草束等項供支浩繁買運維艱臣辦理軍需目覩情形凡有可以寬舒民力節省錢糧之處敢不悉心籌畫以仰副我皇上軫念邊方之至意查辦理軍務大臣等議奏派撥西寧大通二鎮標兵二千名前往哈爾海圖地方駐防留京城滿洲兵二百名西安緑旗兵一千名至十月初旬前往扎哈素臺地方駐劄以僃接應等因奉旨依議欽遵在案但駐防哈爾海圖之西寧鎮標兵一千五百名大通鎮標兵五百名除在營照例支給行糧外其本兵應得之坐糧仍然在家關領而西安緑旗兵一千名并馬二千餘匹在寧二載並未調動其所需之糧料草束又俱按月支給本色多方採辦惟恐不及為今之計莫若將西安緑旗兵一千名移往哈爾海圖地方駐劄將前派往哈爾海圖之西寧鎮標兵一千五百名內撤回一千名暫令歸伍即將撤回兵丁之糧供支移往兵丁之用如此一為轉移在西寧鎮標兵撤回一千名既省在外之行糧而西安緑旗兵出去一千名又省內地之供應庶民力得以從容而錢糧不致糜費矣再京城滿洲兵二百名在西寧城內居住頗屬遊間統領之郎中三達禮身係文員不諳武事難以約束請將此滿兵二百名亦移駐哈爾海圖交與都統臣伊禮布等管轄且此滿兵二百名向在柴達木等處行走熟習今口外既有官兵駐防其坐卡查卡得此歷練之人更為有濟至十月初旬再派西寧鎮原撤回之兵一千名并現駐西寧之西安滿兵一百名前往扎哈素臺地方駐防接應亦屬便易臣鄙見所及不揣冒昧據實陳奏伏乞皇上睿鑒施行謹奏此奏甚是計慮殊屬可嘉候另有諭旨雍正十二年四月十三日四川巡撫臣鄂昌謹奏為奏聞事竊臣未入川境之先即聞川省今歲雨澤調勻年景甚好至臣入境到任以來見春田一切麥豆菜子等類秀實豐茂眼前收穫可得十分其夏秋田禾俱各布種以時發生滋盛老幼同歡士民咸慶臣目覩情形曷勝歡忭之至謹奏川熟則鄰省兼濟豈止蜀民慶幸已也遙矚西南一隅不禁額手同日又奏為請旨事竊思地方要務積貯為先臣到任以來細查通省各屬舊貯之倉穀不過四十餘萬石雍正九年奉旨令川省買穀六十萬石分貯作三年買足今已逾三年僅買穀四十四萬餘石細詢其故蓋緣川省穀價貴賤不齊部議每石定價三錢其穀多價賤之處三錢之內多有贏餘俱已買僃而穀少價貴之處三錢之數實所不敷且有不産米穀之處必赴鄰邑購買腳價之需無項可動以故屢請停止遂致拖延前經布政使劉應鼎奏以糧食多寡價值貴賤原難槩論若必欲通省照每石三錢之定價採買勢必有所不能至本地出産無幾不得不赴鄰邑購買運價亦所必需請截長補短各照市價運價據實買貯餘剩銀兩造請歸項等由經部議覆未準臣查蜀省如成都重慶夔瀘卭等府州屬産穀既多價值極賤保順寧敘嘉眉達綿資潼等府州屬産穀多寡不一價值尚屬中平惟雅州龍安二府及直𨽻茂州等屬有産穀無多價值甚貴之處有素不産穀無從購買之處此等地方逼近蠻疆孤懸山僻若不多為積貯倘遇青黃不接兵民何所倚食臣悉心查察并同司道等虛衷商酌各處米價既有貴賤必合省通融方可辦理請以成都重慶夔瀘等屬之有餘劃補雅州龍安等屬之不足其素不産穀之處即在附近産穀之州縣購買量給腳價隨便帶運合計所餘銀兩動用添補購買并給腳價外尚有贏餘仍可多餘買貯以備邊疆之用俱令於今歲秋收買足庶積貯充裕實有裨益俟買足之日將各處所買米價并所運腳價據實造册報部存案臣為地方起見謹據所知陳奏伏乞皇上訓示施行謹奏此案米穀前經部議有案如欲通融辦理仍應具疏題請方可降旨施行雍正十二年五月十八日四川巡撫臣鄂昌謹奏為陳明地方情形事竊查四川一省素稱沃壤先年地土多被豪強隱占自丈量以來田畝日闢糧賦倍增民間輸納俱各踴躍不待催比而自無逋欠但小民至愚惟圖一時之利每當收穫豐裕僅留一年之用餘俱減價賤糶鮮有蓋藏倘遇年成稍歉不無乏食之虞臣現在督率各屬諄切曉諭性本狡黠習更刁健捏詞興訟作姦犯科無所不為是以比年以來命盜案件十倍於昔更有一種無賴自稱為仙師專事念咒書符妖言惑衆尤可惡者學習符水慣於避刑誘人犯法則頂名到官助人為惡則代為受拷任憑打夾毫不為意以致姦淫邪盜之事接踵而生殊堪痛恨臣抵任之始行出示嚴禁并著落地鄰鄉保營汛辨兵挨戶稽查此等惡徒視禁約為具文藐刑法如兒戲今欲之賢否俟有確知灼見再當次第陳奏謹先將臣所見地方情形恭摺奏聞伏乞睿鑒謹奏覽同日又奏為奏聞事竊臣在京陛見面奉諭旨令將驛鹽道曹源邠居官辦事果係如何之處確查具奏欽此臣抵任之時初見曹源邠聰明肆應語言停妥似非無用之人及後留心試看每與之泛論事體則應對如流至問其所辦事件則支吾含混茫無定見因而加意訪察始知該道玩忽性成不親政務一切事件惟任幕友書吏辦理伊竟毫不留心其貽誤舛錯之處不可枚舉如通省行鹽該道並不招商辦課大半著落里長鄉約領引賣鹽其達部商名多係捏報正經商人十不二三且該道不計戶口不論井竈妄請增引地方不能行銷則官受參處民受賠纍不得巳而混行改撥以此地之鹽銷彼處之引該里長鄉約等又多不諳鹽務竟不照引行鹽而無賴姦棍即乘隙作弊以致川省鹽政雜亂無章又該道辦理松潘軍糧自製小斛希圖尅扣共少運米九百餘石適值前撫臣憲德交印卸事臣抵任之始未及查察督臣黃廷桂令其如數賠補遂寢其事再該道衙門從前頂補書役等缺俱勒取陋規出入錢糧亦甚不清經前撫臣憲德并藩臬兩司查有確據共議揭參督臣黃廷桂從中勸阻令其改悔自新憲德將伊痛加申飭并將伊家人重懲驅逐臣到任以來不時嚴切教誡委婉開導冀其砥礪以贖前愆詎伊悠忽如故不但無悛改之意且反尚巧詐之行殊難造就理合據實奏聞伏乞皇上睿鑒謹奏據奏曹源邠行為若此乃棄材也殊屬辜負朕恩伊初無一人保薦於引見之際朕特加鑒拔越次擢用今職何不自愛至於如是查有確實款迹具疏嚴行參劾同日又奏為奏聞事竊查川省地處髙阜民間田地多藉堰水滋溉臣自抵任之始即查得眉州地方向有蟇頥一堰洹流四十餘里灌田二萬餘畝其利甚溥邇年以來堰堤傾圯渠溝淤塞民力濬築維艱常以旱涸為令建昌道前往踏勘估計約費工料銀六百兩隨令布政司查議復據該司呈稱蟇頥一堰若得修築疏濬不特可以灌溉水田二萬餘畝即將來凡沿堰渠之旱地皆可改為水田甚有裨益請於各官飬廉截曠銀兩內動支六百兩委官督修據實造報此後每歲修濬責令需水人民按地方之逺近計田畝之多寡公估公捐交眉州州判經管辦理等情臣念水利關乎民生不宜遲緩即批令如奏明伏乞皇上敕部施行謹奏興修水利原係善舉雍正十二年八月二十二日四川巡撫臣鄂昌謹奏為欽奉上諭事雍正十二年六月二十一日承準大學士鄂爾泰等寄字內開雍正十二年六月初二日奉上諭憲德陳奏四川事宜一摺著寄與鄂昌閲看令其悉心酌量將應行之件具題奏請欽此臣謹將憲德奏摺逐細閲看悉心酌量其請將直隸嘉定潼川二州改設二府川東道所屬之順慶府改歸川北道管轄川北道所屬之直隸綿州等屬仍歸松茂道管轄渝關木稅委令重慶府經徵等事俱是應行之件惟請將永寧一道裁汰永寧所屬之地歸併川東道管轄川東道所屬之直隸達州等屬改歸川北道管轄并請於省城添設總理錢法糧餉守道等事未為妥協查川省一切經徵採買之糧雖有百十萬石然俱分貯各府州縣倉以為地方緩急之備經各該府州縣官管理即偶有軍需亦係各該道在各該地方承辦歷來妥協而鼓鑄錢法有布政司總理加以成都府成華二縣并派試用人員分管儘可辦理毋庸另設道員專司其事再查達州一屬地處東南與川東道相近去川北道甚逺若改歸川北道管轄反致鞭長莫及至永寧一道所轄敘州敘永瀘州雷波黃螂等處較之各道原屬地少事簡但敘永地接滇黔逼近烏蒙鎮雄而雷波黃螂又係新撫苖疆全賴該道彈壓且敘永雷黃去川東道駐劄之重慶府千有餘里諸事難以照管是永寧一道未便議裁而永寧一屬未便歸併川東道管轄也抑臣更有請者永寧道所屬之地與松茂道所屬之地亦有逺近交錯之處應稍為更易以便巡察查松茂道所屬之直隸資州等屬共五州縣與松茂道駐劄之茂州相距甚逺與永寧道屬敘州府隆昌富順地方相連甚近請將資州等州縣改歸永寧道管轄甚為有益再夔州府屬之新寧縣去府二百五十餘里山髙路險公文差使往返不便查新寧係新設縣治與直隸達州接連自縣至州僅一百一十里請將新寧縣改歸達州管轄一切事件得以就近料理除具本題請外理合繕摺奏聞伏乞皇上睿鑒謹奏具題到日有旨雍正十二年十月十七日四川巡撫臣鄂昌謹奏為請旨嚴飭事竊惟督撫表率文武職任封疆務宜首尚精嚴以示振肅臣自到任以來訪有州縣官貪酷枉法及廢弛政事者巳嚴參數人使衆知警懼各思奮勉惟營員素行驕縱致營兵多所不法待守令不及千把視佐雜如同奴隸其任性妄為欺凌百姓之處種種難以枚舉如地方盜案報官之後責令營兵協同緝拏乃營兵於未拏賊盜之先輒赴事主之家擁擠雜遝或稱驗看虛實或稱查驗蹤迹坐索酒飯銀錢不一而足是事主於被盜之後又受一番擾纍矣又如地方自盡人命例應文員檢驗與營兵無涉乃營兵聞風即至或云係某副爺差來查看或云係某守爺差來查問三五成羣推門擊戶不論男女不分內外恣意騷擾毫無忌憚再如遞送公文乃塘兵之専責也而各路塘兵遇有督臣衙門公文則立行飛送不敢稍遲將臣衙門公文遇便方為帶送每每遲滯至於司道府廳州縣各衙門公文竟敢堆積耽延不肯遞送甚且將查拏匪類屣緝盜賊釘封密行之文故為擦損暗自竊視以致多有泄露此等弊端臣嚴飭各營查究而伊等背後咸云此是總督所管不與巡撫相干臣每與督臣黃廷桂言之伊亦不以為意臣雖無専管武官之責然有關於地方之事何敢不為嚴究除再行申飭遇有前項不法之營兵即行重處并將該管之將備會同督臣題𠫭外懇祈皇上特降諭旨嚴飭庶營員知所畏懼加意約束實於地方有益為此繕摺懇請伏乞睿鑒施行謹奏覽奏足見度量狹隘似此心懷偏私則文武何能和衷共濟邊地巖疆防姦禦侮尤宜崇武而文次之全在汝等大吏善於調劑不致介胄之士懷嫌蓄怨胡乃妄陳不經之談祈朕特旨嚴飭倘若誤聽謬論痛加繩治俾令戎行解體將來武員勢必咸被文職挾制前明之風復見於今日矣其弊曷可勝言殊屬少年無知混行冒瀆硃批諭旨卷一百九十八
