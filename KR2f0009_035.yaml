body:
  text: 欽定四庫全書硃批諭㫖巻三十五硃批何世璂奏摺雍正四年四月初八日貴州廵撫臣何世璂謹奏為奏聞事竊臣奉命撫黔於雍正四年正月初四日自揚州起程至四月初二日抵任已將入境受印到任日期分疏題報在案臣仰體聖主軫念民生至意沿途訪問米價據土人僉稱去歲仰賴皇上福庇年登大有萬民樂業今春雨水調匀春花暢茂江蘇米價一兩一二錢不等浙江米價一兩二錢江西米價一兩湖廣米價八九錢不等貴州省城米價每石六錢各府米價每石四五六錢不等其豆麥雜糧等項現在飭查收成分數容俟覆到另報除地方事宜容臣察訪確實次第入告外所有沿途米價及雨水情形臣謹繕摺奏聞謹奏覽奏實慰朕懷全頼爾等封疆大吏代朕宣布風化感召天和以迓休徵也期共勉之同日又奏為奏聞事臣荷䝉聖恩廵撫貴州入境以來聞貴陽府所屬廣順州之長寨等處狆苖頑梗阻建營房臣抵省面晤署撫臣石禮哈及准提臣馬㑹伯咨札僉云長寨地方經前任督撫於謹陳調劑等事案内奏准設立營房防汛狆苖以出入未便遂爾攔阻曽經差員再三化導苖性頑梗如故業經令遊擊等領兵前徃𠞰撫兼施等語微臣竊思狆苖固屬兇肆然其中亦有強弱良頑之不同為臣子者果能逺布徑不熟不無磋跌之虞即使動出萬全而大兵所到玉石難分仰體我皇上好生之徳必有惻然不忍者臣以事關重大不得不極為詳愼因屢札致提臣囑其嚴飭將弁毋得奏伏乞皇上睿鑒批示施行謹奏朕並無奇特方畧諸事求合於中恩威二字惟欲得當而已鄂爾㤗非尋常督撫可比其才既優心復公誠封疆大臣中實難多得者類斯等事當聽其指揮而行不可另立主見掣肘以失機宜再馬㑹伯原屬褊急每失之於太過新任楊天縱深悉苖夷情形諸凡料理皆得其中凡事可與之同心共濟萬不可存文武各途卑鄙褊淺之見有悞地方事宜至於莅政惟勤毋怠敷奏惟實毋隱敬之勉之同日又奏為恭請聖訓指示以便遵守事竊臣前奉恩綸陞授黔撫即欲奏請陛見恭聆聖訓縁續奉有速赴新任不必來京之諭㫖當即欽遵就道是以不敢瀆請但臣鄙陋之處乆在聖明洞鑒之中今當此邉疆重地民苖雜處自揣庸愚惟恐隕越日切悚惶伏惟我皇上睿慮周詳無遠弗屆凡所以安輯民苖撫綏地方之碩畫有非臣下所能見及者仰懇聖慈將黔省要務恩賜批示摺内俾臣得有遵守免致貽誤而全省官民亦共沐聖徳於靡涯矣謹奏寄爾等以封疆鉅任朕不竭誠指示更諭何人耶但爾地方要務朕既未親歷其境何可妄以為知即有所見亦不過得之傳聞總頼爾等大臣無欺無隠凡百悉據實入告君臣同心商酌則可耳至於居心立志應如何處朕今一一訓示於爾若能實力遵奉而行於地方吏治自大有裨益也不可惟務虚名而廢實事不可但求潔已而不奉公不可以因循為安静不可以生事為振作毋偏柔善以盗寛仁之譽毋事姑息以邀屬員之感毋徇友朋之情而欺主毋受權要之託而誑君黔省錢糧有限爾之操守素為朕知此外亦無可訓諭再者武備不宜輕視稍致懈弛當十分留心時加鼓勵苖夷雖云蠢而無知然亦人也若地方有司實意矜恤令其知感營伍嚴肅令其知畏朕可保其永遠無事恩威二字萬不可偏用偏用日前雖有小效將來必更遺大患非為國家圖久安之策朕所不取鑒别屬員不可盡以科甲為人材而視他途為市井小人自古用人無方賢愚豈宜如此區别凡事虚𠂻秉公切勿預蓄成見世情難測何可逆料平心以待彼來此應何事不得其理也最要者實力奉行一語勉之勉之莫負朕倚任之重特諭雍正四年四月二十九日貴州廵撫臣何世璂謹奏為奏聞事竊臣奉命撫黔凡關官方吏治惟仰體聖懷時加察訪除現在官員賢否另摺陳奏外所有奉㫖揀選發至黔省委署之舉人李倓等十名部文内開如署任内才守兼優著有實效保題引見補用等因臣到任後即查案細訪除朱璣已經病故周載恒梁浤丁憂外所有委署婺川縣印之鄧瀾署鎭遠縣印之羅鳴序署畢節縣印之陳國棟皆安静供職至先經委署普定縣之高騰蛟署印江縣事之唐枚在任之時循分供職其先署修文縣今現委署理永從縣印之李倓與先署安南縣今現委署理普安縣印之彭月孫俱辦事勤愼查各員署事未乆賢否尚難區别容臣再加試看如著有實效自當保題送部引見再查前撫臣張謙帶至貴州以知府補用之張鉞奉㫖留黔令臣酌量題補臣見其為人勤愼明白具有才識俟有知府缺出臣即具題請㫖補用理合一併奏聞臣謹奏知道了應題者仍行具題毋謂已曽密摺奏過也同日又奏為奏聞事竊查貴陽府廣順州所屬之長寨等處狆苖頑梗阻建營房一案前經署撫臣石禮哈提臣馬㑹伯勒兵苖疆先行化誨臣到任後又仰體皇上好生之心復遣臣標守備徐希達持示前徃再行曉諭業經具摺奏聞旋據該守僃回稱苖人有欲出申訴者云畏懼大兵不敢輕出臣即諭令將欲出訴者帶至省城以便親加化誨隨於四月十七日臣標遊擊趙文英到省帶領阿􅿶之姪阿拏火連忙頭人阿猛併附近各寨頭人阿戎等共十四人到臣衙門臣宣揚聖天子威徳令其傳諭各寨頭人俾其凜遵國法請兵安營限以三日為率隨賞以花紅錢布等物令其持此前徃化誨以示鼓勵諸苖俱感激叩頭僉云情願回去勸化衆人迎接官兵進寨安營等語去後兹據徐希達持趙文英稟稱帶領阿戎等至營即令徃長寨曉諭至二十二日阿戎等回營稟稱同阿拏進寨將皇帝愛恤生靈之意再三勸化奈無知兇苖倚恃烏合之衆㫁不肯請兵進寨安營等語阿戎見他們兇頑不改只求發兵進𠞰阿戎等情願為鄉導以報天恩等語據此則是長寨兇苖頑梗狂肆不可化誨定當剪伐無疑矣臣查長寨頑苖所以膽肆抗違者不過恃其黨羽之衆結連同筍焦山等處聯絡聲援互相掎角遂爾鴟張豕突今臣等徧加曉諭俾附近諸寨如同筍焦山之阿戎等苖寨已漸次解散願為前驅各寨之羽翼既散長寨之聲援自孤雖其頑梗如故而我兵前徃攻擊可無旁顧之憂矣除咨㑹提臣令其相機行事外謹先將現在狆苖情形據實奏聞伏乞皇上睿鑒臣謹奏朕前諭甚明鄂爾㤗馬會伯石禮哈非故為生事邀功之舉伊等確見事有不得巳處方定議如此料理爾初到任未達地方委曲情節不可偏執迂論掣肘致誤機宜罪歸於汝也凡値類斯等事若稍渉罷軟因循遺害非細似此意見不到處愼毋輕作主張當以此事為終身戒同日又奏為奏聞事竊臣荷䝉皇上隆恩俾撫黔疆莅任以來無時不仰體聖心以察吏安民為念今查布政使申大成歷練有年辦事明敏但初任旬宣尚湏覘其後效糧驛道李日更勤謹供職貴西道吳應龍人亦明白貴陽府知府鄭錫爵居官謹飭思州府知府張廣泗才堪任使頗悉苖情鎭寜州知州朱齊年循聲素著現在給咨赴部引見至於貴定縣知縣荆龍章聲名不堪開州知州周恒老邁糊塗已經查明實蹟另疏糾㕘外餘者容臣細加察訪續奏再學臣王奕仁校士三載廉明有聲合併奏聞伏乞睿鑒臣謹奏察吏安民乃爾封疆大臣之專責正已率屬不容瞻顧凡百惟當一秉至公毋苛刻以示嚴厲毋姑息以邀寛譽一切預作如何若何之見者皆屬懷私不肯致身與國家之輩朕所不取也但知潔已自全而不奉公者朕深惡之當領悉朕意酌中而行勉之雍正四年五月二十九日貴州廵撫臣何世璂謹奏為盤查司庫錢糧仰祈睿鑒事竊查撫臣到任例應盤查司庫臣抵任後適布政使劉師恕陞任卸事隨檄行新任藩司申大成查明管收除在造具四柱清冊前來據冊開劉師恕自雍正元年五月到任起至雍正四年三月止任内經管錢糧并申大成本年四月初一日到任起至本月二十二日止現在任内經管錢糧除按年按月照例支放銀兩連前任撫臣金世揚收買水銀動支銀兩存有水銀可抵俟運賣完日歸項外該實在存庫銀二十二萬一千八百七十九兩零臣逐一躬親盤查現貯庫銀一十六萬六千五百七十兩零少銀五萬五千三百九兩零據單開劉師恕任内有原任威寜鎭臣麥世位虧空銀兩又江蘇湖南江西三省解官短少恊餉銀兩又管承寵衣物抵補那移猴子厰課銀兩又弁兵循例預支季餉等銀兩又各屬欠解稅課廩給併缺俸長支俸工等銀兩又文武各官領借銀兩又墊支文職各官養廉銀兩申大成任内弁兵循例預支季餉等銀兩又馬鬃嶺齊家灣丁頭山等三厰欠解鉛觔變價銀兩又文武官弁領借銀兩又墊支文職各官養廉銀兩臣隨弔取文武各官印領併查各原案雖與單開數目相符惟是庫項不便墊借乆懸除臣已檄令該司勒限嚴催解補外所有盤查司庫錢糧併新舊二司墊借未補欵項謹據實奏明伏乞皇上睿鑒臣謹奏所奏甚悉庫項墊借與兵弁尚可看其情節此外皆不法之端即具有印領錢糧豈容虛懸當勒限完補為是兵弁所借者當再斟酌之如此秉公毫不瞻狥朕甚嘉之檄催解補如有不能速完光景當題叅者即行叅奏同日又奏為奏聞事臣自䝉聖恩陞授貴州廵撫到任以來日夜兢兢目下五月間陰雨連綿惟恐有傷田禾晝夜焦心差官四處查勘據覆官舍與民屋泥牆間有倒塌而田禾却極茂盛臣於晴霽之日因出郊勸農即細加履勘與委員所覆無異當問之土人僉云五月正値插秧之時貴州悉屬山田宜多雨水秧始暢茂臣見禾苗茂盛果無妨礙將來必獲豐收此皆仰賴皇上愛民如子至誠格天之所致也所有近日雨水情形臣謹繕摺奏聞謹奏向聞貴州廣西毎於雨多之歲冀望豐收今果然矣同日又奏為奏聞事竊查廣順州之長寨者貢等處狆苖阻建營房不聽化誨情形已經據實奏聞後臣因官兵不日前進誠恐附近良民驚惶躱避廢業曠時因委思恩府知府張廣泗前徃曉諭附近長寨良民令其耕種貿易各安生業嗣據報稱良民俱各安業秋毫不擾尋據總統劉業浚報稱五月初九日協同進𠞰除劉業浚同遊擊趙文英率領馬歩兵駐劄宗角老營應援守僃周豹率兵防守定番把總史定邦率兵防守廣順外其餘諸將領兵分為三路遊擊官禄田玉率領馬歩兵分佈谷隆一路尋攻破谷隆口因此口乃長寨緊要門户遂屯兵嚴守分遣千總許朗等攻破谷隆之岩底等七寨燒燬賊巢房屋數百間前後生擒賊犯四名我兵被傷十名遊擊卜萬年詹天祥率領馬歩兵併土兵分佈焦山一路卜萬年攻破竹林翁忙井口三處遂搶長寨後梁詹天祥攻破冗甕火連忙遂入長寨賊巢與卜萬年會兵屯劄礮傷苖賊數人餘皆奔潰逃匿深箐我兵被傷二名遊擊張朝宣翁世雄率領馬歩兵併土兵從馬落孔一路而入連開關口四道由火連忙上寨巖直搗長寨復開闗口二道攻破上院寨等三處賊苖逃散現在屯守又稱頑苖將家口牲畜米糧藏匿羊城􅋭内此􅋭上平下陡四圍壁立一徑羊腸地勢險峻頗難仰攻現今陰雨連綿容俟稍晴相機進攻擒獲首惡安插餘黨以彰徳威等情到臣臣查官兵雖入長寨而渠魁逃匿未獲營房尚未建立所報果否盡實布置果否得宜容俟細查明確臣與督提二臣合詞具奏第以事闗軍務恐厪聖懷謹將據報情形先行繕摺奏聞伏乞睿鑒臣謹奏此事諸臣籌畫乆矣乃不得已必當舉行之事觀此強横不法情形豈可不動干戈而專以德化者乎汝初到任孟浪迂論於此益可見矣汝今不必驚惶但坐看伊等成功其或一時未能清理稍有守候致遲時日一切糧餉之接濟兵弁之賞犒悉當聽從督提之調度而行若少掣肘阻撓有悞機宜汝難免罪愼之愼之不可存一毫私忌之心從來文武不能合志每至悞事觀汝此奏頗露不樂成功景況朕甚憂之雍正四年六月二十九日貴州廵撫臣何世璂謹奏為盤倉事竣據實奏聞事竊照存倉米穀例應督撫查奏臣奉命撫黔准署撫臣石禮哈將常平倉存貯重農積貯欽奉三案米穀數目造冊移咨到臣臣即檄行布攻司㑹同貴東貴西二道愼選廉幹之員分徃各處併將支存秋糧一並盤查去後兹據司道各委員盤查具報前來臣逐一查核除實貯在倉米穀外各州縣内有存銀抵米抵穀者有民間借欠者有兵丁借支者有各官借欠者臣思倉糧關係國儲自應實貯豈容存銀作抵及官民兵丁共相借欠况與冊報實貯不符檄駁糧道照數完補據覆黔省向來如此從前盤查奏銷等案俱作實貯造冊報部於秋收後完補臣未敢輕信復查之各府詢之前署撫臣咸稱無異隨取各該保結存案謹循舊例據造實貯清冊報部至所少米石應照變通之例如足三年支用者即令完銀其有不敷三年支用者仍俟秋收買補以仰副皇上軫念儲蓄之至意所有盤查倉糧縁由臣謹據實奏聞伏乞睿鑒臣謹奏雖經據實奏聞更須據實料理也同日又奏為奏聞事竊照長寨狆苖阻建營房一案官兵分路攻擊已破谷隆長寨等處經臣將情形奏明續於五月二十九日據報遊擊卜萬年領兵分路搜捕見頑苖扶老挈幼跪求招撫問係各寨頭人阿􅿶等十一名隨解赴宗角行營又於六月初三日陸續據報攻破者貢羊城等􅋭寨擒獲川販楊世臣等併頑苖男婦子女均解赴行營等情旋准督臣咨札委令威寜鎮臣石禮哈徃軍前料理隨准鎮臣咨報於六月初八日自省起程到宗角行營將解營之川販頑苖及阿􅿶等照發在彼料理之知府張廣泗等訊供皆因川販李奇以長寨安營駐劄官兵伊等不能復為川販遂與楊世臣及阿搗等糾衆攔阻李奇於二月内潛徃川省頑苖之阻建營房皆係伊所指使今兵威已震羣苖已傾心向化將先獲之男婦諭令親屬認領四散之苖招回栽插其川販楊世臣等及李奇之妻妾子女咨解到臣臣即發司審擬所有李奇與在逃之川販窩家當移四川撫提二臣轉飭查拏併行黔屬經由之地方文武各官恊力嚴拏務獲至原議應設營房現飭知府張廣泗督同地方官辦料興工其餘别有議添營房及抽添兵丁之處統俟督提二臣酌議㑹疏題請鎮臣於二十七日回省二十八日晚又據張廣泗稟報官兵拏獲者貢頭人阿搗查係兇犯之首應聽劉副將專解赴省等情前來除俟解到之日發司收審外誠恐有厪聖懷先行繕摺奏聞再貴陽府屬各寨苖民紛紛赴臣衙門具呈情願剃頭改裝臣即飭令該府曉諭各頭人令其革面洗心相率勸勉共為聖世良民合併陳明伏乞睿鑒臣謹奏既有前奏在先今為此奏能不少愧乎此事非爾書生管見所能料理者已有㫖諭部矣雍正四年九月十二日貴州廵撫臣何世璂謹奏為奏聞事竊照黔省今當收穫之際所有秋成分數行司飭查去後兹據布政司詳稱今歲雨澤及時高下田禾均極暢荗早稲現今收穫晚穀已皆秀實通省收成約八九十分現今省城米價毎一市斗價銀九分折倉斗有一斗五升至各屬米價以倉斗計算每斗四分至七分不等等因前來臣訪查無異惟鎮遠縣普安州界連滇楚係水陸通衢米價稍昂若俟收穫完日價値自然漸減將見戸慶盈寜人歌大有皆我聖主生成煦育之所致也為此具摺奏聞伏乞睿鑒臣謹奏覽收成米價情形實慰朕懷蓄積乃第一要務邉省尤當加意悉心籌畫刻不可忽者也雍正四年十一月十五日貴州廵撫臣何世璂謹奏為聖主訓誡維殷臣心愧悔無地感謝陳情仰祈睿鑒事竊臣抵任之初適有長寨頑苖阻建營房一事臣圖報心切未及致詳遽慿臆見冐昩奏聞乃䝉皇上睿慮周詳洞悉機宜節奉硃批諭㫖委曲詳盡諄切異常臣跪讀之下茅塞頓開愧悔交集念臣職任封疆不能相機度務偏狥意見妄瀆聖聰實有負皇上之任使投閒罷斥乃分之宜而聖徳涵容曲賜訓誨俾臣得翻然悔悟知所遵循臣惟有恪遵訓㫖朝夕刻責鑒已徃之愆尤為終身之烱戒以仰副聖主訓誡之洪恩而已今首惡之阿搗阿撈與川販李奇等俱已就擒各寨狆苖俱已歸誠向化督臣鄂爾㤗親徃長寨等處撫循安插苖民踴躍歡舞俱極得所現獲各犯遵㫖交與究審從此頑苖知有法紀邉方得以寜謐皆皇上聖算無遺之所致也臣謹奏若能不固執已見文過飾非朕嘉而不罪也此摺朕欣悅覽之又慶封疆得人矣同日又奏為陳明續完司庫墊支銀兩仰祈睿鑒事竊照藩庫錢糧臣到任後親徃逐一盤查少銀五萬五千三百九兩零經臣分析欵項具摺奏明臣因庫項不便乆懸一面專檄勒限完補去後今據布政使申大成冊開前報劉師恕任内未完銀兩數内陸續催完銀二萬二千五十三兩零尚未完銀一萬一千五百四十四兩零内除麥世位虧欠併江蘇等三省短解及管承寵衣服抵補三項共銀四千五百七十五兩零現在催追變解外實未完銀六千九百六十八兩零均係弁兵借支統限請領雍正五年春餉扣還申大成任内前報未完銀一萬六千四百九十二兩零今已催收全完臣查庫項墊借施之於兵弁誠如聖諭尚可看其情節此外皆屬違例之事豈可因循舊習槩為支借臣嚴飭該司此後如兵弁遇有急需或可量為借給即於俸餉内扣還其餘弗得擅行借支致干功令謹將續完司庫銀數繕摺奏聞伏乞睿鑒臣謹奏若肯如此破面辦理公事朕無憂黔之心矣諸凡惟效法鄂爾㤗可也勉之勉之雍正五年閏三月二十六日貴州廵撫臣何世璂謹奏為奏聞事竊臣履任時黔西商民紛紛具呈請開礦厰臣初慮有利不能無害不敢輕率准行既而思之黔省土瘠民貧不習織絍之業復不擅商賈之資止藉耕穫營生而山高嶺峻轉運維艱惟礦厰一項乃騐羊角柞子白蜡三厰已有成效其餘所報之處現在飭司清查一有實效議定作何抽收之法再㑹同督臣確議具題至民間食用鹽觔最為急需而黔省向資川鹽山嶺崎嶇䭾載不易小民往往食淡臣思鹽乃天地所産養人之物川滇皆有何獨黔省無之故到任後徧加訪察乃知黔省非不產鹽止縁煎試無法故致湮没因原任安順府知府管承寵先因厰課被㕘今巳賠補完足在黔日乆熟悉地方情形頗知煎鹽之法故㑹同督臣鄂爾㤗咨部暫留煎試今據稟稱躧有數處其中地名白果樹小河二處者原係當年舊開之井但灰石填塞年乆今雇覔井匠探驗大有鹵氣確係鹽井業經置僃噐具雇夫開挖已深五六丈只待鹽鹵一出即可煎鹽呈驗等因前來伏思凡事難於圖始而易於樂成但得一二處有效其餘即可漸次而求幸頼聞臣謹奏覽同日又奏為欽遵諭㫖和衷辦事備悉奏聞仰祈睿鑒事竊臣受皇上殊恩畀以封疆重任自惟才短識淺積過多端荷䝉皇上優容前後屢賜硃批訓誨今歲楚雄總兵南天培過黔又口傳諭㫖臣祗領之後晝夜捧讀几百事宜無不咨商於督提二臣且上歲督臣鄂爾㤗來黔之日臣將黔省一切事務與之面相商酌深服其公誠之心才識之卓誠如聖諭毫髪不爽以臣愚昩之質實當勉為效法況兹邉徼之重敢不商酌而遽行去歲長寨初平鄂爾㤗親徃彼處安插料理諸事妥恊狆苖莫不鼓舞感戴回心易慮矣黔之西界烏蒙普雄朋比為姦鄂爾㤗自料理長寨之後前徃調兵擒捕咨臣催督糧餉併檄飭府州縣等官加意安插撫綏歸順苖民雖於征𠞰之方臣未能稍贊一籌而仰覩我袵席而黔省永無西顧之憂臣實不勝踴躍歡忭也至於黔粤之交有紅江一水界分南北南屬粤之西隆州北屬黔之普安州顧黔本無錯壤於江南而粵則有十餘寨插入於江北遂至粵㺜勾引濳匿刦爭多事臣愚以為欲杜其爭端莫若先正其疆界誠使劃江而理江以南仍屬之粵江以北盡屬之黔沿江設汛防渡永杜粵儂徃來則濳匿報前來臣復加詳議咨商應聽督臣核定㑹題則黔省又可無南顧之憂矣惟謬沖之花衣苖本屬楚省之靖州管轄逼近五開負固恃險出没行刦今既歸黔省無論其村寨是楚是黔臣等應遵諭㫖隨移咨督提二臣㑹飭黎平府恊多帶兵役併移㑹楚省督撫提臣宻定方畧奮勇𠞰擒然後委員勘定界址以專職守今准湖廣督臣傅敏咨已委署靖五協副將吳文帶兵進𠞰而黎平協副將劉頗有膽畧兼能武事臣委其贊勷機務㑹同楚員合僃悉據實奏聞伏乞皇上睿鑒施行臣謹奏覽奏朕深為嘉悦勉為之雍正五年五月十三日貴州廵撫臣何世璂謹奏為奏聞事竊照黔省地方山高嶺峻民鮮貿易專資稼穡為生於禾稲之外復藉麥荍豆菜等雜糧以濟食用今春時雨時晴麥荍不苦於霪雨豆花益見其豐茂迨自入夏以來將播稻秧之期則又甘霖疊沛稻田均得乘時栽插惟是春季遇閏節氣稍晚雜糧收割稍遲米穀價値稍昂數日臣商同督臣遵照雍正四年四月内前署撫臣石禮哈題准恩㫖於存七糶三之積貯三案米穀併足支三年之多餘秋糧内量行平糶接濟民食今雜糧已登市價亦減而夏田分數查據署布政使富貴詳報各屬現在收成内有十分並八九分不等前來臣於出城勸農之日親見禾稻之栽插者有與與翼翼之蕃雜糧之登場者有如茨如梁之慶臣目擊其盛不勝歡忻鼓舞所有夏田分數理合繕摺奏聞伏乞睿鑒臣謹奏深慰朕懷此皆卿等察吏愛民除暴安良能舒暢兵民之情上感天和之所致朕實嘉頼焉但將向日科甲朋比夤緣積習痛加洗滌竭力挽回則社稷蒼生禆益無量矣勉之同日又奏為聖壽普天同慶微臣戀主情殷仰懇天恩允准赴京恭祝用抒誠悃事竊臣於雍正元年七月内奉命督學兩浙曽經跪聆聖訓莅任未幾旋補兩淮運使復奉特恩陞授貴州廵撫屈指陛辭以來倐經五載雖䝉聖恩優渥每事詳加訓誨俾得欽奉遵行但乆未入覲天顔依戀之誠刻不能已兹雍正五年十月三十日恭逢皇上五旬大慶萬國歡呼而臣受恩深重若非恭叩殿陛曷由少伸微悃伏乞聖恩允臣所請容臣束裝赴京得同在廷諸臣叩祝萬壽無疆更可詳聆睿訓則不特臣孺慕之悃稍抒而黔省吏治民生更荷聖敎於靡窮矣為此繕摺奏請伏乞睿鑒批示欽遵臣謹奏五旬之慶已有㫖矣程途窵遠不必為此無益之徃返在任實力為朕辦理政務勝如十次來京面請朕安也當欽遵諭㫖雍正六年六月初六日吏部右侍郎署理直隷總督事務臣何世璂謹奏為奏聞事竊臣荷䝉特恩命署直隸總督事務陛辭之後於五月二十八日起程六月初二日抵任除接印視事日期業經恭疏題報并奏謝天恩外伏惟今年直隸二麥收成情形業於六月初一日據布政使楊紹彚報前來臣到任後查閲詳案除與恊理督臣劉師恕㑹摺奏聞外臣自京赴任途次連遇大雨臣恐低窪地畝或有勿市私恩以博虚譽臣恪遵聖訓沿途即加體訪遇有屬員謁見便為再三誡飭俟灼見其賢否當即㑹同劉師恕逐一據實宜盡當與劉師恕和衷商確次第舉行臣於到任某之所為容臣訪確正犯設法擒獲另行奏聞臣謹奏覽署理直隸總督臣何世璂恊理直隸總督臣劉師恕謹奏為恭報二麥收成分數事竊照今歳畿輔地方雨𤾉時若二麥暢茂俱已刈穫今據布政司將各府州縣收成分數彚報前來臣等查霸昌道屬十分九分八分七分不等通永河道屬九分八分七分不等永平府屬七八九分不等保定河間正定府屬俱十分順徳府屬八九分不等廣平府屬十分至八九分不等大名府屬八九分不等宣化府屬七八九分不等直隸天津州并所屬七分不等直隸冀州趙州深州晋州定州并所屬俱十分以至七八九分不等二麥登場實稱豐稔黎民樂業咸頌洪庥謹具摺恭奏伏乞皇上睿鑒謹奏此所奏分數皆屬太過似此虛捏何益之有凡百只以據實為是雍正六年七月二十四日吏部右侍郎署理直隸總督事務臣何世璂謹奏為恭繳硃批并奏請聖鑒事臣齎摺千總回署捧到臣前奏二摺奉有敬遵訓㫖宣誦與協理督臣劉師恕祗領欽遵交相勸勉凡事務期據實以仰副皇上生成教訓之天恩於萬一耳至直隸地方事務繁劇臣到任後檢查案巻未完事件多至數百而布按二司皆係新任臣一面與之晝夜料理一面另立限期嚴飭各屬上緊趕辦而倉庫錢糧尤恐其向多彌縫掩餙之帑項逐一盤查雖新司楊紹護司李正茂本任收放錢糧不致虧缺恐從前尚有未經清楚如前經臣等查出日㑹同劉師恕細加研審如其事之出入不甚相遠或其人尚可教誨者俱即駁發另審俾得改正期其悔悟自新苟或舛錯過甚或本人昏庸難以陛辭之先荷䝉遠勝從此日沐天恩倘得悉除舊疾奮起精神效力聖世莫非皇仁之怙冒也理合叩謝天恩一併奏聞伏乞睿鑒謹奏甚是極好朕深幸直隸得人但看今歲上蒼所賜收成即可知矣惟能確信感應之理冇如影響則一生為人之道得矣署理直隸總督臣何世璂協理直隸總督臣劉師恕謹奏為請㫖事竊照天津關務關係緊要非廉幹之員不能勝任現在各河道暨知府皆有職守難以委令兼管而同知通判知州知縣之内又無堪以委任之員惟鹽法道衙門事務不繁可以就近兼理而鹽道蔣澍年力精壯辦事勤愼居官頗知自愛若委以代理關務庶於國課有益臣等不敢擅便謹繕摺具奏伏乞皇上睿鑒批示以便具題為此繕摺陳明謹奏前者曾有此舉不過缺額時以其力能賠墊耳所以鹽道徃徃皆不情願爾等既欲委管亦未嘗不可即具本題奏雍正六年八月二十四日署理直隸總督臣何世璂協理直隸總督臣劉師恕謹奏為奏聞事臣等伏查今年直屬各府地方雨水俱各調匀收成分數雖田地高下微有不同大概俱稱豐稔現在飭查因未據各屬報齊是以尚未具奏惟宣化地方雨水稀少據口北道王棠將宣化被旱情形稟報前來臣等當即批飭確查隨又據王棠報稱宣化已得微雨數次雖不霑足而於田禾甚為有濟等語兹於八月十八日王棠來保詢據口稱宣化今歲年景得雨之處有七八分即被旱之處亦有三分又據稱本月十三日敬赴圓明園恭請聖安皇上念切民生傳㫖詢及宣屬雨水臣等仰體皇上愛養元元至意因念宣化歉收之民至冬似應接濟議於十一月十二月正月於被旱處所開設粥厰分賑三箇月應否如是恭候皇上諭㫖遵行再宣化府屬之萬全蔚州二處先據報到各有數里雨中帶雹田苖間有傷損查不成災一併奏聞謹奏朕若不傳問王棠汝等未必有此一奏也同日又奏為遵㫖密訪事雍正六年七月二十九日臣等於御賜摺匣内奉到硃批尚崇廙原奏一摺奉批此一事密訪的確奏聞欽此臣等遵即密遣臣標千總張國政星赴寶坻縣訪查該縣善家莊地方李葦根子李中節子兄弟二人同陳一鳴賭錢爭閙李中節子被陳一鳴毆打情極誤撞殞命控縣將一鳴監禁有陳君畢等五人徃來説合許送知縣徐大樑銀兩等情與奉頒奏摺内情節確實相符又查得該令罔惜民瘼催科無術濫差滋擾民怨沸騰誠為貪婪不法之員不可一日姑容除另疏題叅究擬外所有遵㫖訪察情由理合奏聞謹奏爾直省屬員俱待他處奏聞奉㫖交與方能察出情節可謂勝察吏安民之任矣雍正六年九月二十六日署理直隸總督臣何世璂協理直隸總督臣劉師恕謹奏為恭報秋禾收成分數事竊照今歲直隸地方仰賴皇上至徳格天雨𤾉時若秋成豐稔臣等通行飭查兹據各道府州將收成分數呈報前來查霸昌道屬實有十分九分不等通永河道屬實有十分九分及七八分不等永平保定河間正定順徳廣平大名等七府屬實有十分九分及七八分不等宣化府屬實有六七八分及三四分不等直隸冀州趙州晉州深州定州天津州並所屬實有十分九分及七八分不等昨據通州知州詳報士民許振祖等呈送瑞禾數本其一莖者穗長一尺五六寸並䨇穗三穗以及八九穗至十三四穗不等臣等欽遵上諭停其進獻飭令敬貯副我皇上愛民錫福之至意所有各屬實在收成分數臣等謹繕摺具奏伏乞皇上睿鑒謹奏此皆卿等忠誠任事以感召天和所致與朕何渉至於用人得當之功則朕不多遜焉勉之勉之同日又奏為要地需人能員難得據實具奏請㫖事竊照天津州知州張星瑞因承審解官張士逵侵盗鹽花銀兩一案謬擬罪名狥縱要犯經臣等恭疏隨招附㕘並聲明照例摘印委員署理在案伏查天津係新改直隸州缺又屬邉海地方不但刑名錢糧事務繁劇且有徵收海稅稽查海船並管理水利營田河道堤工之責非精明強幹之員弗克勝任今查有獻縣知縣程材傳者年富力強辦事勤敏諳練洵稱實心任事之員若以補授天津州缺實屬人地相宜於地方民生均有禆益是否有當伏候皇上睿鑒批示謹奏照該督所請程材傳補授天津州知州該部知道雍正六年十二月十七日署理直隸總督臣何世璂協理直隸總督臣劉師恕謹奏為奏聞事竊臣等荷䝉聖恩委以封疆重任凡接見屬員無不諄切告誡務各留心查緝盜匪以靖地方本月初一日元氏縣知縣孔傳焯至保臣等委赴平山縣協辦採買稻米一事因密囑其留心查訪鄰近山西一帶深山處所恐有匪類濳藏即據實密稟去後隨於十三日稟稱初九日到平山交界聞沿途行路之人紛紛私語皆云平山西南地面出一郄姓者善於法呪毎日借講上諭律例為名門下已收多人卑職欲問其詳細然後㑹同呈稟但恐彼有知覺是以即行密稟前來臣等隨密飭平山縣知縣訪確郄姓名字設法嚴拏毋令黨羽免脫亦無致地方驚惶俟拏獲審明另行具奏外事關邪敎煽惑人心理合先行密奏伏乞皇上睿鑒謹奏所奏甚是但不知平山縣令能與不能也似此委用朕殊不逹何難遣一的當人協同該縣辦理也硃批諭㫖巻三十五
