body:
  text: 欽定四庫全書硃批諭㫖卷一百六硃批張善奏摺雍正六年十一月十一日山西大同總兵官臣張善謹奏為恭謝天恩敬請陛見事竊臣蒙皇上天恩卑以山西大同總兵重任於雍正六年十月二十二日抵任當即恭疏叩謝天恩任事外伏念大同為邊陲要地總兵責任匪輕所有應行事宜雖勉竭駑駘次第料理但臣識淺才微其於撫輯兵民一切機宜必得親承聖訓庶㡬有所遵循伏懇皇上恩允容臣減從輕騎趨赴闕廷跪聆天語不惟巖疆重寄得以措置合宜而犬馬戀主之忱亦得以少慰矣為此繕摺奏謝天恩所有臣瞻戀下悃懇請陛見情由相應一併請㫖伏乞皇上睿鑒施行謹奏爾方到任未乆且不必來京地方營伍一切事宜周知後於明嵗春夏間再行請㫖可也雍正七年正月十九日山西大同總兵官臣張善謹奏為籌補軍器事竊臣自到任以來一切應行事宜俱在次第料理而操練兵馬整飭營伍之處尤闗首務查臣標下三營及協路各營旗幟帳房新舊參差鑼鍋鍬钁多有不備細詢其故緣營伍軍器一有缺損例應於公費銀内即行補製而大同鎮屬三營並協路十四營汛共止留公費糧五十三分除各營路每年奏銷兵馬錢糧冊籍紙張領餉盤費等項之外所餘無㡬此外無項可動是以上下相因不行補造今估計補造帳房鑼鍋鍬钁及大小旗幟等具共需銀八千三百九十兩零臣查有前任鎮臣祖秉衡具奏大同敎場地租並助馬得勝二路交送總兵衙門餧馬榖麥請充積貯每遇青黄不接減價平糶以濟兵丁雍正五年六年分穀麥業經減價給兵易過價銀一千八十兩零現在存貯買補又前任鎮臣祖秉衡具奏清出各營路地畝餘租易價銀二千二十八兩零奏請製造各營路歩守兵丁棉甲均䝉俞允准行在案臣愚以為濟兵造甲亦屬急公但大同地方上年收成頗好兵糧無庸接濟至製甲之請原為營伍壯觀然較有闗實用之軍器尚在可緩請將祖秉衡奏准積貯餘租造甲二項動用易價銀兩先製造旗幟帳房鑼鍋鍬钁等項以裨實用俟此項製造完傋再請補製棉甲除動用積榖餘租易價銀三千一百九十兩零尚不敷銀五千三百三十兩零仰懇聖恩准令臣在山西司庫銀内暫行借支製造其司庫懸項銀兩准於積貯穀麥并餘租銀内以雍正七年秋收後起勻作二年變解司庫還項倘䝉恩允則營伍軍需實有裨益矣是否有當伏乞皇上睿覽批示遵行謹奏所請候交廷議積貯棉甲二項與旗幟帳房之應緩應急要在權其先後而次第為之也雍正七年三月初八日山西大同總兵官臣張善謹奏為犬馬戀主情殷恭請陛見以展微忱事竊臣於去嵗繕摺奏請陛見仰䝉皇上硃批爾方到任未乆且不必來京地方營伍一切事宜周知後於明嵗春夏間再行請㫖可也欽此欽遵臣將應行事宜及奏請製造旗幟帳房等項俱巳次第辦理至前派大同營路解陜軍需馬匹並大同官兵領解右衞旗兵馬匹今准山西撫提二臣來文令臣派撥官兵解交陜西臣遵照派定官兵俱已分運解送訖仰懇天恩容臣減從輕騎赴京陛見瞻仰天顔跪聆方畧俾巖疆措置有所遵循而戀主微忱亦得少抒於萬一矣為此具摺請㫖伏乞皇上睿鑒俯准施行謹奏目下有派撥兵弁諸務湏汝在任料理候至秋間有㫖雍正七年三月二十日山西大同總兵官臣張善謹奏為聖恩高厚難名臣心仰報彌切懇請隨師進𠞰以申報效微忱事竊臣接奉部文派選臣屬老營營㕘將呂瀚河保營㕘將陳昇管領車騎營兵丁限五月二十五日以前到京臣遵即轉行現在料理至期起程外伏念臣生長西邊歴任川陜屢隨總督臣岳鍾琪克取西藏征𠞰青海其塞外行營諸務頗知大槩今値用兵之際正臣效力之時安敢尸位素餐不思報稱謹繕摺籲懇伏乞聖主恩准所請或令臣由何路領何處官兵或准臣隨師一同進𠞰以盡職分以攄犬馬報效之悃臣無任悚惶待命之至為此繕摺請㫖謹奏無庸奏請凡事遵承朕之訓諭而行雍正七年閏七月十八日署理陜西固原提督印務總兵官臣張善謹奏為恭謝天恩事竊臣荷䝉聖㫖調臣陛見即命臣署理陜西固原提督印務驚聞寵命感懼交加又䝉皇上隆恩賞賜孔雀翎絨纓㡌一頂見臣眼􅍚即賞賜洗眼藥方著太醫院為臣療治臣冐昩以私情妄瀆即䝉聖恩准給臣曾祖父母一品誥封臣子鵬䎙更䝉天恩賞列藍翎侍衞又於臣陛辭請訓之日荷䝉敎誨諄切指示周詳復賜臣紗袍紗褂火鐮鼻煙荷包餑餑果乾各一匣伏念臣邊鄙庸材毫無知識欽承皇上如此𢎞恩是皆古今臣子不世有之奇遇而在微臣更為夣想所不敢望者清夜自思感激難名惟有凜遵聖訓黽勉自勵盡此愚誠不敢稍存欺飾竭蹶供職以冀少答天恩於萬一耳所有微臣感激蟻悃理合具摺奏謝伏乞睿鑒謹奏柔善巧詐之轍萬不可蹈徇人欺主之事萬不可為能此方不負朕格外恩遇亦係保全聲名之正道若心稍瞻顧行小惠以沽虚譽或枉法徇情因私廢公被朕覺察決不輕恕汝也勉力為之同日又奏竊臣於七月初一日叩辭闕廷於初二日自京起程出居庸闗由宣府至大同渡黄河經延綏沿邊一帶抵固原數千里在在雨暘時若禾稼豐羙農工商賈各安生理莫不仰頌皇仁羣歌樂利臣目擊歡戴情形不勝雀躍理合一併具奏伏祈睿鑒謹奏凡如此等之奏不可粉飾浮詞圖美觀聽類斯習氣甚屬無味總務一眞誠為要誌之同日又奏為奏聞事竊臣欽奉聖㫖命署固原提督印務到任之後即將一切應行事宜次第料理所有陜省召募兵丁臣已遵照寧遠大將軍臣岳鍾琪照㑹數目飭行標協營路將備各官務募年力精壯技藝嫺熟之人勤加訓練臣不時合操期成勁旅以盡臣職其應需馬匹鑼鍋帳房等項另咨督臣購辦再陜省官員署任者多昨臣赴任一路凡有接見之員臣仰體聖意面加敎訓必期實心竭力仰報皇恩此中倘有貪黷乖張不肖之員臣即咨㑹督臣題㕘必不少徇情面至於固原提標營中事務據臣標中軍摺開營中前存一切錢糧已經前任提督路振揚將用過銀數奏明止下剰銀七百五十三兩零現在營中收貯等情臣遵㫖復加細查前任提臣路振揚莅任三年謹愼小心營務無悞其一切用過錢糧既經奏明無庸臣再具奏合併奏聞謹奏路振揚除操守之外一無可取巧詐不實鄙劣人也硃批諭㫖巻一百六
