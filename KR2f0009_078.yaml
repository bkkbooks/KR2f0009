body:
  text: 欽定四庫全書硃批諭旨卷七十八硃批胡瀛奏摺雍正七年二月初九日江西按察使臣胡瀛謹奏為敬陳管見事竊臣僃員江臬職司明刑夙夜兢惕惟斯寬嚴適當以仰副聖明欽恤之仁乃體察獄情參考刑書見律條內尚有未經該載及可以斟酌變通之處敬為我皇上陳之一贓數滿貫之竊盜宜定勒緝之處分一盜竊鞘餉之犯宜嚴加治罪一謀殺親夫拐逃姦婦之淫凶不宜仍引監候一軍流人犯時值冬月中途留養之例尚宜斟酌以上各條關係盜賊民命刑獄重務是否可採伏祈皇上睿鑒飭部議覆施行謹奏大學士會同該部詳議具奏同日又奏為直陳江省吏治仰祈睿鑒事竊聞民生之休戚關乎吏治而吏治之大綱無過錢穀刑名查江省錢糧自前撫臣邁柱清查之後頭緒井然年來接任之員易於經理有能按籍徵收全完者洵為稱職上司保題升調以示鼓舞實至公至當之舉也但有司職分不止催科如聽斷刑獄弭盜安良關係民生甚為緊要臣僃員江臬經理刑書每見屬員必諄諄勉勵間有能辦錢穀者不盡諳於刑名雖多方勸懲未盡改革始疑人之才力各有短長今細加體察乃知别有私心以為錢糧全完即可薦舉刑名案件尚在其次今若不行詳加考核但以善於催科即行薦舉則庸碌姦巧之徒皆得冒濫何由正人心而飭吏治乎查雍正四年三月定例文職官員任內有承追督催錢糧未完議處之案不準保題等語臣愚以為錢糧國用所關刑獄民命攸係應請嗣後薦舉保題人員除無承追督催錢糧未完處分之案外必查其行止端正聽斷明敏無已參遲延未結命盜事件俱於本內聲明方準保題則地方有司於錢穀刑名咸知並重實心辦理而無巧飾之弊其於吏治獲益不淺矣臣管窺之見是否可採伏乞皇上睿鑒施行謹奏此奏殊屬荒謬之至朕從未有但以催科甄别優劣之諭旨而國家用人亦未有將刑名輕視於錢糧之理身膺臬司之職凡通省舉劾皆任其責而聽憑督撫保題庸碌姦巧之人汝豈聾瞽乎即部中又何嘗將已參遲延未結案件概置之不問一任督撫薦舉升調耶若照所請以行止端正聽斷明敏無據空言定為考語不過開汝等不肖藩臬高下其手之端甚非察吏之良法據此汝必與巡撫不和否則或被屬員有所輕賤而懷泄憤之心耳愼為之雍正七年七月初五日江西按察使臣胡瀛謹奏為恭繳奏摺事竊臣於雍正七年二月初九日為直陳江省吏治等事摺奏奉到硃批臣謹祗領伏惟臣本庸愚受皇上洪恩僃員江臬夙夜冰兢雖地方吏治時切留心但知識短淺賦質昏庸謬陳鄙見妄瀆宸聰乃蒙我皇上憫臣愚昧訓誨諄詳臣跪讀之下恍如夢覺悚惶無地感激涕零惟有竭盡愚忱和衷供職以仰答主知於萬一必不敢自貽罪戾也所有奉到硃批原摺理合恭繳伏乞睿鑒謹奏凡為人臣者欲克盡厥職保全身名惟應務一公字捨此而巧詐自私立意沽名釣譽縱竭其伎倆未能遂志至身名俱敗時追悔無及矣古聖賢垂論甚詳且僃世人多務虛文而忽其實理每觀不肯為國致身任勞任怨恃一已智術幸免者千百中不過一二默默之中仍伏冥誅人多不得而知耳夫榮辱利害何必關心但竭盡臣節以對天即君上之喜怒褒貶尚置之度外何况宵小輩之偏好偏惡私譽私毁千岐萬派豈能一一周旋而無遺耶如得本何愁末凡夫庸流往往見不及此一生勞勞用盡巧詐究竟成一笑柄寧不可惜聽朕訓旨只在根本處研究不必逐末勉之將此批諭與汝同城官員看皆令知之雍正七年十月初八日江西按察使臣胡瀛謹奏本年八月初五日齎摺家人捧到臣前奏恭謝聖訓一摺欽奉硃批諭旨臣跪讀之下如覲天顔感刻五中繼之以泣隨遵宣上諭同城官員莫不敬聆聖訓一體周知臣伏念人臣事主當如愛親敬天其根本處只有忠孝不忠何以全孝不公又何以成忠大哉王言公之一字以之事君則能體國以之臨民則能服物徇私非公而干譽亦非公偏執非公而徇衆亦非公不特一生勞勞用盡巧詐非公即有意矯矯不能任勞任怨亦非公公之真偽默默中自有鑒觀人不得而知而惟寸心知之也兹蒙我皇上天語丁寧臣惟有銘骨鏤心勉供厥職辨賢姦以定舉劾鋤豪惡以安良善至榮辱利害古今常有只患臣心不公自干罪戾果能公忠不二可以告天地質鬼神聖主明並日月自能仰邀睿鑒也為此繕摺望闕九叩恭繳聖諭臣不勝惶悚瞻仰之至謹奏果能言行相符朕復何慮勉之同日又奏雍正七年四月內欽奉上諭各省富戶鄉紳當體恤貧民該部行文督撫刋刻遍行曉諭遵行欽此江省奉到之日署撫臣張坦麟即牌行布政司敬謹刋刻分頒曉諭去後因布政使臣李蘭轉發牌文內有令各屬將分送過富戶鄉紳姓名造册開報之語以致各屬差役社保等沿戶挨查凡稍溫飽之家著將姓名填入富戶册內報官索錢到手始免開列現據進賢縣民樊子亮南昌縣監生劉思試豐城縣監生李陳謨等各控準地方官查究在案至八月初五日李蘭始行文各府轉飭州縣停止造册一切差票盡行掣銷在布政使臣李蘭偶不經心誤添造册開報一語因而胥蠧作姦遂與上諭有毫釐千里之謬今江西一省如此臣聞江南有遊手好間之輩登門索騙富戶者有無恥生員假鄉試盤費不足之名勒索富户者經督臣范時繹出示曉諭嚴禁其風始熄誠恐各省間有奉行失實者臣不揣冒昧仰懇聖主𢎞慈再頒諭旨宣示各省督撫布按通飭州縣令其恭繹前頒上諭毋得粗心誤行查造富户名册以啓胥役滋擾之弊而無賴之憊棍劣襟亦不得借端需索則普天率土共知皇上敦厚風俗警世覺民之至意矣為此謹奏此奏可嘉處不勝批諭天下事真有可為長嘆息者所以云奉行不善即堯舜之仁皆成苛政也另有旨由部頒發同日又奏為陳請飭查罰贖銀兩以收實用事竊照金作贖刑載自虞典至周穆王而按五刑之輕重定贖數之多寡是贖鍰之制唐虞三代已有之矣我朝欽定爰書至詳至慎嫓美三代以上之治凡直省官員審理詞訟在理曲者察其有力稍有力二等春夏罰銀秋冬罰穀年底題報銀則解部充餉穀則貯倉僃賑定例昭然原毋許承審官員任意濫罰私收滋弊者也今查直省官員自理詞訟所罰銀穀多有私罰肥已不行報明歸公者臣請皇上敕部通行直省除地方惡紳劣生富豪有意犯法及犯罪至軍流者不準罰贖外至承審官員有户婚田土訐告審虛犯徒罪以下者準其照律納贖將所罰銀穀實數報明上司立案倘有隱匿不報及以多報少濫罰等弊勿論充公與否即以貪員參究臣更有請者直省城垣學校倉厫之類皆有司所必當修理者倘一一取之庫銀而正項虧矣不若以本地之贖鍰存為地方之公用惟奏銷時題明罰過動用數目免其解部充餉一則可以杜絶侵蝕二則可以整理地方三則可以免那正項於國課民生甚有裨益如果臣言可採伏乞皇上睿鑒施行謹奏勸諭富户體恤貧民之善政尚然顚倒奉行至於此極斯事如何可行徒令宵小輩妄生議論耳地方上有實心任事吏畏民懷之督撫不待朕諭自能一一斟酌舉行若遇庸劣兩司道府不過徒滋紛擾顛倒是非公然開市惠營私之門於民生毫無裨益若言及國課更屬可鄙可笑之論矣硃批諭旨卷七十八
