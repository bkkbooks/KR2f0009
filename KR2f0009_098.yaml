body:
  text: 欽定四庫全書硃批諭㫖卷九十八硃批潘之善奏摺雍正四年六月十五日署理四川提督印務川北總兵官臣潘之善謹奏為奏聞事竊臣准川陜總督臣嶽鍾琪調撥漢土官兵前赴冕山駐劄預備𠞰撫金格等蠻一案業經臣繕疏題報在案查官兵起程行裝在所必需臣㑹商撫臣法敏於司庫領支秋季餉銀散給兵丁自行製備又借支本年冬季錢糧散給各兵養贍家口以免內顧無不感激聖恩樂於用命惟土兵雖稱效順非如漢兵素食名糧可比臣與撫臣㑹議所給口糧之外再加賞賚以鼓其氣除撫臣另行預備外臣隨於川省鎮協各營存留公費銀兩內動用備辦巳於調遣土兵之臣料理設備隨後差員解赴建昌宣布聖主恩賚分别賞給庶土兵各戴皇上隆恩踴躍從事當有實效矣至金格等蠻原係小醜不恭大兵一到仰仗天威伊等自應傾心歸化無煩再為添兵但臣謂建昌環處萬山之中賊蠻種類不一若不預備兵馬恐一時有用調遣不及隨檄行各營及各處土兵再派漢兵一千名土兵一千名以備調遣臣職司軍旅不能不為萬一之慮理合繕摺奏聞謹奏凡事寧使備而不用所慮甚當殊屬可嘉之至向來但知爾之漢仗膽量未料爾有如此才情也勉之雍正四年九月二十二日調補陜西安西總兵官臣潘之善謹奏為叩謝天恩恭繳硃批事雍正四年八月初五日途次鳳縣地方遇臣前差四川提標千總捧到硃批諭㫖臣跪讀之下感懼交深伏念臣一介武夫才識淺陋荷䝉聖主殊恩畀以重鎮兼署提篆任大責重臣夙夜冰兢惟慮不克勝任隕越滋咎雖勉竭愚誠未敢信為允協乃䝉溫㫖格外褒嘉臣何人斯叨受寵渥如此其極惟有竭盡駑駘恪供職守以報隆恩於萬一耳理合繕摺叩謝天恩並繳硃批謹奏初設要鎮諸凡營務均係創始況策妄阿拉布坦狡猾非常心志莫定一切須竭力勉為之雍正四年十一月初九日陜西安西總兵官臣潘之善謹奏為奏聞事竊臣䝉皇上殊遇調補安西總兵官於本年十月十二日抵任視事查閲川陜總督臣嶽鍾琪條奏安西事宜內如移築城池安設官兵以及屯田安户等件無非仰體聖心慎重邊防規模宏遠至詳且備祇為地方起見不暇計及費用錢糧之多寡也臣到任伊始凡臣標各營及所屬地方事宜雖未能周知而略觀其大槩有應費錢糧者有應減省錢糧者有費錢糧甚多而於地方恐無裨益者有費錢糧無幾而實於地方大有功效者臣今逐一酌量其於地方事宜有可以設法措置者臣當以錢糧為重而斷不肯耗費於無用之地若地方及營伍事宜有必用錢見容臣咨商督提二臣㑹疏請本年七月初六日靖逆將軍臣富寧安因大兵撤大小共八處罔不星羅棋布哨探緊嚴矣惟是沙州之西南伊孫插漢赤落並插漢烏素腦兒去西寧撥住索諾木達什所住之柴達木約有千里其間并無夷人住牧遊巡卡路臣思此二處最為險要若不防範新設之地俱無接應矣再查沙州去伊孫插漢赤落口子并麻鞋戈必口子八百餘里實係策妄賊人偷來要路況今又值隆冬戈必正是落雪之時誠恐夷人乘隙前來有失堵禦臣罪難辭臣因先飭令沙州駐防遊擊派把總一沿途暫留目兵安設臺站防備傳遞緊急之信又查沙州東南四百餘里地名插漢烏素腦兒係哨探阿羅衣且并麻鞋鹽池戈必二口子接連柴達木來路又東行三百餘里係烏喇打班空濶地方應安住牧熟夷三百家西哨伊孫插漢赤落南哨麻鞋戈必口子自此至彼相去不過四百里易於更番巡探又插漢烏素腦兒并烏喇打班二處應安住牧熟夷三百家西南哨阿羅衣且麻鞋戈必口子南哨鹽池戈必口子接連柴達木地方路口東哨烏喇打班口外如此則熟夷哨探於外官兵接應於內少有聲息遞相傳報首尾接應一舉可擒此無事則以夷防夷而有事則以夷攻夷之道也除將前由咨商督提二臣㑹議題請外合先繕摺具奏伏祈皇上睿鑒施行謹奏爾原係朕極賞鑒之人今果不謬矣所奏可嘉之至朕欣悅覽焉勉之同日又奏為恭請聖安仰祈睿鑒事竊臣自本年正月內陛辭以來孺慕之私時切依戀兼以一年之中叨荷殊恩不一而足緣臣職守極邊不能匍匐叩闕仰瞻天顔專差臣標把總齎摺代叩聖安并進香水梨汁四瓶梨乾一匣伏祈皇上叱存少備採用庶犬馬戀主之心得稍伸於萬一矣為此謹奏前經有㫖不令爾等總兵進獻況爾在邊外新設苦寒地方何乃齎進梨汁等物朕嘉汝之誠勉為存留嗣後不可雍正五年四月十八日陜西安西總兵官臣潘之善謹奏為奏聞事雍正五年四月初三日准欽差理藩院員外郎臣盛柱駐防哈密涼州鎮臣袁繼蔭等密咨內開為移知事雍正五年閏三月二十六日謹將哈密喀倫必留夷情公同㑹議繕清字密摺具奏外擬合將清字密摺譯出漢字粘單一紙移咨貴鎮查照等因密咨到臣臣接咨之後將臣標官兵不時勤加操演馬匹加意餧養臕壯所需軍實現在設法製辦暗挑馬步精兵二千名預備相機聲援第安西新設要鎮百凡創始一切營制尚需整飭尤可慮者兵馬錢糧按季赴蘭關領動需數月此在安常處順可以從容少待若遇倉卒調遣之際未免緩不濟事臣愚仰懇聖恩俯念邊陲重地將每年兵餉預先撥貯肅州道庫無事則按季關領支放有事則就近可備軍需庶往返不致遲誤而緩急均為有濟矣臣為邊疆要務不揣愚昧妄陳如臣言可採伏祈皇上睿鑒施行謹奏所奏是極甚屬可嘉此兵餉一事朕既未思及而料理籌議諸臣亦皆忽略矣候另降㫖諭部雍正五年八月二十五日臣馬爾泰臣汪漋臣潘之善謹奏為奏聞事竊臣等奉命辦理城工事務自五月初一日啓土興工即派在工員辨分督夫役築基造城并採辦木石磚灰等項緣杜爾伯津地方土厚質潤所築城垣甚屬堅固各員辨俱勤於督工上緊築造目今鎮城土垣已經築完鼓樓亦築成臺基其餘樓臺衙署營房現在陸續建造惟城垣包磚一項工程浩大恐一時天冷土凍須俟明春和暖之時方敢動工置立窰座所燒石灰極其細膩磚瓦亦甚堅厚與內地無價口糧食用充足莫不感戴皇恩踴躍趨事兹當城垣造完尚須開濬城壕夫役數千人齊向臣等口禀我等䝉皇恩賞給米麵口糧又給工價今開壕一事不過數日於至誠不敢不為陳奏再今年嘉峪關外秋成甚好安西沙州等處收穫甚多合并奏聞謹奏覽奏秋收情形朕懷深慰雍正五年九月初六日陜西安西總兵官臣潘之善謹奏為邊地初開禾稼咸登進呈御覽以慰宸衷事竊照安西新闢巖疆兵民初集臣仰沐皇恩調兹重鎮抵任後隨親歷所轄地方考察氣候閲看土脈內有沙州新城兩處水甘土肥臣於本年春夏之交試種麥稻糜穀芝麻髙粱棉花各種盡皆秀實且幹莖顆粒較之腹裏地方無異現在居民以次開墾將見數年以後盡成沃壤但向來塞外嚴寒所種皆小麥青稞今我皇上仁風惠澤廣被遐陬以致天時應序地氣和暢初試五穀即獲豐登臣謹採各種穗頭籽粒并土産枸杞潔置瓜乾稻米二色恭呈御覽仰祈皇上睿鑒謹奏據奏安西地氣和暢禾稼咸登朕欣悅覽之同日又奏為奏聞事竊照安西新輯民户因各處道路遙遠恐一時到遲有誤春耕臣於正月間即為料理預備代種隨請商督臣嶽鍾琪䝉檄令將雍正三四兩年舊屯熟地盡行播種俟户民到日交給經管臣查舊屯熟地一萬四千餘畝止可種籽種一千四百餘石不足二千四百户民食用是以飭令兵丁再開生地一萬五千餘畝共種籽種三千石又因屯田牛騾止三百有餘不敷應用若俟請領勢必遲延不及是以撥給營馬六百匹其犁抄下籽薅鋤灌溉盡屬兵丁之力至户民於閏三月二十五日起至四月內陸續到沙者僅七百三十户無處居住即將兵房撥給但為數不足不能逐户安插臣令搘設帳房聊蔽風雨急催砍伐木植修蓋房屋於六月初一日起陸續又到五百四十四户正值天氣暑熱蚊蠓肆毒原帶牲口多有損傷又兼更換水土不能赴沙因撥給安西兵房暫為居住其續到之一百四十九户又因安西兵房缺少留住柳溝時届西成之期䝉督臣檄令將屯種地畝每户按二石有餘籽種之地分給令户民自為收穫臣屢催地方官俾令盡數赴田奈巳到沙州者砍木托坯蓋造房屋而暫住安西柳溝者實因家口拖纍及患疾病不能前往臣見户民渙散催促不前復令兵丁代為收穫今督臣檄令分田原為休息兵丁之計但户民零星散處顧此失彼不能赴田緣由督臣遠駐省城未得周知臣思田苗分給户民勢必致誤收穫是以督令兵丁同撥出户民合力公收今巳割麥百萬餘捆約估獲糧二萬二千餘石現在接食俟今冬碾打完畢得見確數另行奏聞仍照二石有餘籽種所獲之糧再為分給再查未到之民與損傷牲口之家來春耕作以今歲較之不無遲誤之虞臣以此情節咨明督撫商酌料理訖伏思安西地方新闢我皇上動費帑金招集民户其田地農具房屋等項雖巳經料理但安插之計總在地方官隨時相機籌畫不致失所方於國計民生兩有裨益今職司民牧者但知循習舊規即事涉微小亦必請示督撫動經數月遲誤之處皆由此弊臣受恩深重不敢緘默伏祈皇上簡任賢員前來專任料理庶邊末愚氓得被洪庥於靡既矣為此繕摺奏聞仰祈皇上睿鑒施行謹奏諸凡料理甚屬妥協如是方為實心任事朕深嘉之凡百咸能似此據實不隱封疆大臣中更屬難得勉之勉之雍正五年十一月初八日陜西安西總兵官臣潘之善謹奏為奏聞事竊查臣標馬匹往年於十月初一日在於本城地方收槽餧養因今歲城工興作車輛駝隻雇覓不敷所需草束拽運艱難是以臣令將馬二百零五匹飭委臣標中營把總李良策在於靖逆營之頭道溝地方就草餧養忽於本年十月二十九日據駐防柳溝堡守備報稱本月二十九日有中營兵丁金必等趕馬飲水忽有達子七名從紅柳窩內閃出各執器械前來趕馬將兵丁衣服剝去隨後沙窩裏又閃出達子二十餘名將馬匹接替竟趕往東北去了把總李良策帶兵前去追趕守備亦即派撥辨兵星速跟蹤追趕等因到臣臣於本日晚得信即差守備馬進榮把總胡發等帶兵二百名並飭靖赤二營各派兵丁尋蹤追趕即具文呈明督臣嶽鍾琪提臣宋可進肅州鎮臣楊長泰在案兹據跟隨把總李良策之兵丁華貴等報稱從布魯墩湖灘花海子等四處共尋獲馬一百一十五匹尚少馬九十匹又據前差把總胡發報稱馬守備於十一月初一日進追至鹹泉子見賊夷飛奔前往遂帶兵飛追前去先有把總張文元等追至馬鬃山打班賊與官兵彼此放鎗見後邊又有官兵到來隨即退去官兵趕過打班有四十里之地賊夷又添十數名在沿山放鎗打仗一次天晚賊夷退去初三日兵分三起趕至一百六七十里趕上賊夷又在沿山放鎗官兵直追前去亂山之中忽然又添賊夷一百餘人將官兵圍住放鎗馬守備帶領辨兵上前放鎗攻打多時天色已晚賊夷退去馬守備收兵歇息住劄差把總前來回話據此隨問你們可知此項賊夷是誰家的達子禀稱俱戴著黑白羊羔皮臥帽子穿著好像西海上的達子內中亦有穿綿甲的等情據此臣愚料此項賊夷若是厄魯特並未帶有高裝帽子況噶爾旦策楞新近差人進貢請安未必就敢起釁恐係土木扎薩去年七月內從西海分領夷人帶赴北套去的臣聞得內有馬匹乏弱留住哈密之探納慶養馬被扎薩額敏逐趕起身前往北套恐伊等仍潛藏亂山之中以打牲為名潛至境內乘隙偷趕馬匹臣查此項留住窮夷至多不過二百餘名因官兵追急故敢迎敵料此必無重大事情理應無煩聖慮但又查向來在卜隆吉住牧之阿拉布坦八素台同羅卜藏丹津一時投策妄阿拉布坦今聞得伊在遼邊住牧恐因策妄阿拉布坦病故之後乘隙由巴爾庫爾土胡魯前來妄生事端均未可定除本月初六日派兵一百五十名復令把總胡發帶往金鈎硤應援追踪訖臣惟恐賊勢重大復派右營遊擊陳進福選精兵五百名預備停當一面飭令守備馬進榮相機尾追前去若至土胡魯地方賊勢果重查土胡魯一帶與哈密相近臣即飛咨督提二臣並肅鎮外即帶領兵丁㑹同駐防哈密涼州鎮臣袁繼蔭協同𠞰殺再為具本題報事關邊徼夷情合先具摺奏聞再查賊夷潛至境內汛防官辨並餧馬辨員漫無知覺其疏防之罪實所難逭俟追賊官兵回營之日臣查明確實另為題參伏祈皇上睿鑒施行謹奏宋可進亦經奏聞此風何可滋長亟當悉心籌計務窮蹤跡朕意或恐羅卜藏丹津勾引準噶爾夷賊前來生事起釁亦未可知料青海夷人未必敢如是妄行也同日又奏為奏聞事竊臣於本年三月內因沙州户民到遲恐屯種有誤臣隨商請督臣嶽鍾琪派撥臣標兵丁一千五百名代為開荒墾種籽種三千石秋收刈穫麥捆一百二萬有零經臣具摺奏明今於十月二十八日據經理屯田遊擊陳進福報稱場事完畢共計碾打京石麥二萬四千三百餘石除還過籽種三千石屯田兵丁加增口糧九百石外尚有麥糧二萬四百餘石俱盤交沙州衛倉存貯按月支給户民口糧查沙州原議安插户民二千四百户今現到一千四百二十三户營兵所收糧石足敷户民明歲一年食用尚有未到九百七十七户若於明春正二月起發到沙長途遠涉牲口乏弱恐不能及時耕種徒費口糧是以臣等詳明督臣請將未到之户俱於來年交秋起身於八月內到沙不但牲口可免倒斃即所食口糧亦可節省半年有餘又不至妨彼蓋房之工再督臣以沙州安插户民如何於國帑無虧如何於民生有益如何於農事無誤令臣㑹同肅州道齊式漢興道尤汶確議等因臣即公議九條呈覆訖謹將原議九條録呈御覽更有請者安西新設邊鎮各處地土多未開墾成熟出産無多臣標馬匹上槽餧養所需料豆俱係赴甘糴買因甘肅收成少歉較之去歲價值昂貴況明歲城工正在興作食指殷繁恐甘肅等處仍遇歉薄採買挽運必致多費錢糧有關國帑臣仰體皇上勸諭開荒至意再三曉示據各兵內有子弟呈報情願認地墾種者准作該丁恆産仍令照例升科外但查各兵家口先搬接到安者僅三百餘家餘丁不過百十餘名臣酌議明春仍量撥營兵帶領現在之餘丁在於新城地方公種一千餘石籽種沙州協標亦有餘丁令在沙公種五百石籽種秋收之後糧食存貯公所若遇糧價昂貴之時並緊急需用之處支給兵食庶邊疆有備貯之糧兵丁免缺食之虞臣愚昧之見是否有當伏祈皇上睿鑒施行謹奏覽奏俱悉一應户民屯種等務統宜咨商嶽鍾琪定議辦理朕不便批諭當否凡事不可參差必內外畫一方能妥協雍正六年二月二十二日陜西安西總兵官臣潘之善謹奏為奏明屣獲賊蹤事竊照臣標就草餧養馬匹於雍正五年十月二十九日被賊偷趕二百零五匹責差臣標右營守備馬進榮領兵追趕緣由節經奏明於雍正六年正月三十日據臣前差分途屣探賊蹤通事魏漢竒王朝宰等禀稱奉差緝賊自肅州起身由坤都倫押斯一掏一帶到巴濟公住牧的扎㑹海必爾漢地方屣見蹤跡將番文投給阿亥台吉據云賊已拏住給有文書令小的等先來報信他們討將軍吩咐然後差人送賊等語據此臣隨將來文譯出細繹文內情由並面質差來投文之副都統噶爾架等俱有隨後送賊之語但等候十餘日並未解送前來正在復差通事魏漢竒等持文前赴北套巴濟公之弟阿亥台吉處討取賊夷間於二月十三日准振武將軍咨內開賊已拏獲一十二名解送軍營一一勘明偷馬情由咨請內部訖等因臣查金鈎硤打仗之後據守備馬進榮差把總胡發等報稱賊夷百十餘人今准咨稱賊夷一十二名與原報打仗之數目大相懸殊今振武將軍止據賊夷供稱偷馬情由並不知與我官兵打仗之事既稱咨請內部應聽部審具奏所有前差追賊守備馬進榮帶領官兵已於二月十六日檄調回營外至賊夷果否多寡之處臣責差把總朱祿通事魏漢竒併前與賊打仗報信之通事王孝等同振武將軍差人藍翎侍衛策吝及副都統都噶爾架等前往打仗之所驗看交蹤前赴振武將軍處與巴濟公之弟達什達爾架公併阿亥台吉面質賊夷多寡數目訖臣謹將屣獲蹤跡緣由繕摺奏聞謹奏夷賊盜馬情事已明晰矣雍正六年六月二十九日臣馬爾泰臣汪漋臣潘之善謹奏為奏聞事竊臣等奉命辦理安西城工事務自雍正五年五月初一日興工築土建造於八月內巳築成城垣其包磚一項於雍正六年六月內亦巳全完堅固整齊足垂久遠再黃墩踏實雙塔百齊惠回五處堡城先後俱於六月內築完臣等伏思皇上軫念邊陲特發帑金新建城堡大工今當鎮城包磚全完各堡城築造齊備理合繕摺奏聞至於各項營造如城樓廟宇衙署兵房倉厫墩臺一切工務合鎮城與沙州五堡總計其工程已有十分之七約九月內大工可以告竣臣等謹先將鎮城包磚全完五堡城垣已建緣由奏聞仰祈皇上睿鑒謹奏各項工程總期堅實完好倘少不如法寧可拆改重修切勿草率茍且務圖垂久為一勞永逸之計今日此奏非異時無據之事也慎為之雍正六年八月二十四日陜西安西總兵官臣潘之善謹奏為恭謝天恩並繳硃批事竊臣齎摺把總回署恭捧硃批奏摺二件皇輿圖十卷藥錠一匣到臣臣恭設香案望闕叩頭謝恩領受訖伏念臣邊末武夫聞見未廣兹䝉皇上頒發輿圖臣盥手開閲具見皇輿廣大巨細不遺聲教所加遐荒備載矣至藥錠捧到時適值瘟疫流行臣即仰體宸衷分發標協營路暨哈密等處文武官辨並兵民人等依方調治全愈甚多感載歡呼聲溢四境所有微臣領受輿圖藥錠感激下悃理合繕摺奏謝並繳硃批謹奏據奏藥錠分發官辨兵民調治全愈朕欣悅覽之今歲時氣甚廣幸䝉天恩溥佑所染皆輕愈者亦速同日又奏為奏聞事竊臣查得達麻林色布騰住牧之蘇賴地方出産硫磺離臣屬靖逆營約五百餘里聞得夷人向來取用臣隨差人採獲現在燒成數千斤甚屬精細又鎮城迤北二百餘里地名白芨芨南面有鉛山一座向日有人開採臣亦差人燒成鉛斤其色類白似有銀汁但邊人技拙不能爐分無從辨認再石包城以南去鎮城六百餘里之一肯薩喇哈爾金山內每年四月間冰消地解有無藉民人潛往彼處刨掘黃沙臣恐姦民雜處滋生事端是以選差辨目入山驅逐第南山一帶地方遼濶雖勞兵憊馬終難禁絶臣思金分三品皆天地寶物或因皇上廣開疆宇泄發各礦以助國帑亦未可知臣智識短淺未能灼見仰請皇上遣一幹員前來認試倘可採用似應任人開挖計牀抽稅所有鉛斤命人分燒如果山川效靈不惟國賦有增亦與新設巖疆不無小補矣今臣虔封硫磺鉛斤並購買新金恭呈御覽是否可採伏祈皇上睿鑒施行謹奏此事與督臣嶽鍾琪商酌奏聞雍正六年九月二十五日臣馬爾泰臣汪漋臣潘之善謹奏為城工告成事竊臣等奉命辦理安西各處城堡工務前因鎮城包磚全固各堡城垣築成業經繕摺具奏今鎮城及沙州五堡各處城樓廟宇衙署兵房倉厫并原題新設沿邊一十三處墩臺院牆兵房大小共一萬二千四百餘間一切工程於九月內俱巳全完理合恭摺奏聞伏查臣等原先㑹同估計共約需銀二十八萬餘兩自興工後於燒造石灰磚瓦採取木植石條等物隨時籌算不使曠工糜費較原估工數少用四十餘萬人工即少用銀四萬餘兩其挽運各項物料應用腳價又多方節慎亦少用銀數萬餘兩通計鎮城沙州五堡墩臺一切工程共用銀止在二十萬兩以內現今安西及涼甘二府存貯餘銀并用剩物料變價銀兩合計共有九萬兩零再預備支給匠夫所買口糧米麵剩有五千餘石亦實值銀一萬餘兩臣馬爾泰臣汪漋現在清查各工用過銀兩細數繪畫城堡圖樣繕造進呈用過錢糧物料清冊并將所剩銀兩移交臣潘之善同經管收發城工錢糧肅州道齊式暨涼甘二府知府等解交蘭州司庫所剩米麵已交明安西沙州地方㕔衛等官存倉變價還項臣馬爾泰臣汪漋俟各項料理清楚即起程赴京為此具摺奏聞謹奏安西各項城堡工務汝等辦理甚屬可嘉不待此奏朕於他處業俱聞之雍正六年十一月初六日陜西安西總兵官臣潘之善謹奏為恭繪新設輿圖進呈御覽事竊臣邊末武夫恭膺簡命調補安西重鎮倘於內外境汛不能周知何能彈壓斯土撫中禦外以紓宸衷西顧之殷因思臣足跡不能遍歷惟於目覩耳聞之餘細加查詢留心校正今臣自揣地理情形頗悉毫末隨命畫工繪成全圖臣復挨次考核未敢謂竟無錯謬然亦或可自信於十分之一耳除將圖冊由督臣嶽鍾琪送部備查外合將輿圖敬用黃裱差臣標把總齎捧進呈御覽伏祈皇上睿鑒謹奏輿圖留中詳覽足見爾留心地理情形朕深為嘉悅雍正七年二月十二日陜西安西總兵官臣潘之善謹奏為奏聞事竊臣於雍正六年夏秋之間眼疾復發安西地處邊末並無明醫療治日加障蔽䝉皇上天恩遣發太醫馳驛前來於本年二月初七日到安臣隨出郊躬迎跪請聖安太醫口傳諭㫖云總兵若欲在安西調理即仍住本處若欲回內地著醫官一路用心看視同回內地調理欽此臣伏聽諭㫖望闕叩謝至賜臣尋骨風藥酒醫士臣沈宏寀送赴臣署臣九叩跪受訖隨即與臣診視脈理據云臣心血大虧腎經有損肝風太旺上焦屬火下源屬寒體厚多痰恐將來成中風之證臣聞醫士之言始悟眼目之受病有由來也今䝉御賜尋骨風藥酒日飲兩次兼服湯劑覺痰涎稍減腰腿痛止夜間添睡藥力之妙漸服漸效但目翳雖較前微退而全愈須待時日若能保養心血火降水升則目疾可以全愈矣兹先將臣受病之由並醫士抵安之日繕摺奏聞謹奏據奏服藥有效朕懷稍慰務宜安心調理朕深望汝之全愈也切勿性急徐徐攝養自然收功雍正七年三月初八日陜西安西總兵官臣潘之善謹奏為奏明事竊查安西標協營路額設馬步兵丁共六千五百名所恃以壯國威而禦外患者軍裝為先臣於抵任之後隨點閲各兵不惟新經招募者全無軍裝即告住裁撥者俱係出征多年所執器械不堪應用旗幟號衣俱皆舊損鍋帳等物亦屬缺乏臣與官兵商議設法製辦嗣奉欽頒通融銀二萬兩以此轉移那借差委辨員前赴西安地方製造旗幟撒袋弓箭腰刀鞍䩞號衣等項分散各兵乃係本身佩帶之物俱皆出於情願而通融銀兩於領餉時還項至於鳥鎗一項臣遵奉部咨照依沿邊沿海之例每兵一千名設鳥鎗四百桿已經撥解足額又添造先鋒鳥鎗一百二十桿以備行走所需守護城池如宣威連珠馬腿行營各炮位巳咨督提二臣現在請撥備用再火藥一項為軍中緊要之物隨於雍正五年內咨請督提二臣於甘涼肅三鎮撥解一萬五千斤於雍正六年方始解足臣又於安西本處開局製火藥八千斤有奇暫敷應用鑼鍋帳房係督臣嶽鍾琪於甘肅撥解五百頂副聊為備用其餘尚需製造今臣查安西標路各兵器械已覺鋒利鮮明當兹城堡告竣兵馬分駐巳定正當親率將備等官時加操練務使有勇知方以紓皇上西顧之殷少寬臣罪愆於萬一詎臣眼疾復發宿病侵尋䝉皇恩賞銀遣醫容臣調理今興漢鎮臣曹勷巳經抵任臣將兵馬營汛各項事宜交代接管另疏題報外所有臣製辦過軍裝情由理合繕摺奏聞謹奏覽奏知道了務期加意調治痊愈以副朕望雍正七年四月二十七日原任安西總兵官臣潘之善謹奏為恭謝天恩事竊臣目患殘疾過䝉皇恩遣發太醫馳驛前來與臣調治臣自服御賜尋骨風藥酒及甘露左歸二飲冰臘丸等藥效驗如神兩月之間雜證全愈即雙目雲翳漸服漸退正在繕摺奏謝間於四月十一日䝉皇上重念微臣復遣太醫院眼科施世德到卜隆吉臣出郊跪請聖安醫員口宣諭㫖臣即望闕叩頭謝恩感激之私涕零寤寐惟仰體宸衷恪遵諭㫖善加調養以副聖主眷念之至意嗣醫士臣沈宏寀施世德同與臣診脈看目僉云心腎不足血虛火盛以致迎風流淚白翳遮精左目重右目輕仍用尋骨風藥酒日飲二次兼服滋腎養肝退翳湯疏經應痛丸並點光明膏不半月之間精神舒暢身體強健今右目雲翳巳經全退視物分明左目亦退十之六七不過稍覺羞明仰賴皇仁不待月餘必獲全痊此皆我皇上天地父母之恩生成育養之所致也臣惟有刻骨鏤心誓圖報效以仰答髙厚於萬一耳謹此繕摺恭謝天恩謹奏所奏欣悅覽之夙疾頓除目昏復明實屬可嘉之事更加盡力調養平復如初以慰朕念雍正七年五月十二日原任安西總兵官臣潘之善謹奏為臣病全痊懇請隨征仰祈俞允事竊臣一介武夫荷䝉皇上鴻慈擢任總兵調補安西地方任重責巨不敢稍有懈弛致厪聖慮何敢以微末殘疾瀆干天聽但臣前患眼疾雙目障蔽自謂五官巳缺其一殘廢之軀不能仰報天恩矣隨於雍正六年十二月間具本請休乃過邀皇上隆恩疊遣太醫馳驛診視日服御藥效驗如神不數月之間俾一身之雜證頓除即雙目雲翳巳經退斂枯朽回春復見天日殘喘餘生皆我皇上之所賜也今臣筋力精神自覺倍常技藝騎射宛如平昔竊臣病痊之日正天威遠震之時普天率土內外臣工凡有見聞者莫不鼓掌稱慶踴躍爭先況臣受恩深重矢報靡遑寧能安居田園終老林下伏祈皇上允臣隨征效力疆場倘獲寸功庶犬馬微忱少報髙天厚地之恩於萬一耳為此具摺懇請伏乞皇上乾斷施行謹奏覽奏深為慰悅醫官為何未具奏帖病果全愈朕自另有諭㫖隨征效力之請不必雍正七年七月二十四日原任安西總兵官臣潘之善謹奏為恭謝天恩事竊臣殘軀弱質雙目翳蔽自謂不能復愈荷䝉聖主天地再造之恩連遣太醫與臣醫治今臣仰藉皇仁雙目明朗殘病全無頻受洪恩有加無巳即粉身碎骨不能仰報髙厚於萬一於本年五月十二日業已具摺懇請隨征俾得效力疆場少舒犬馬下悃恭候諭㫖遵行兹醫士臣沈宏寀施世德於七月二十四日起身回京復命所有微臣感激天恩下忱謹繕摺恭謝伏祈皇上睿鑒謹奏朕之欣慰筆不能宣此實上天聖祖復賜朕干城良將也隨征之請前已有㫖不必汝病既痊候朕另降諭㫖雍正七年八月二十八日原任安西總兵官臣潘之善謹奏為奏謝天恩恭繳硃批事雍正七年七月二十九日據臣差家丁齎捧硃批奏摺并恩賜錦扇香袋藥錠等件到臣臣謹望闕叩頭謝恩訖伏念臣一介駑駘至愚至陋荷䝉皇上格外𢎞恩有加無已錫豫頻施誠人臣之殊遇臣愧無涓埃報效惟有刻骨銘心永矢不喧而巳所有感激下悃理合奏謝並繳硃批奏摺伏祈皇上睿鑒謹奏朕有㫖命汝署理固原提督印務矣此任乃汝叔祖潘育龍之所整理為天下第一營伍其流風餘韻至今猶屬可觀兹若不能企及何顔以對朕耶但汝叔祖之操守斷不可仿效一二必棄其所短而法其所長則汝可謂一全材勝如汝叔祖之人物矣勉之雍正七年十一月二十四日署理陜西固原提督臣潘之善謹奏為恭謝天恩併繳硃批事竊臣奉命前赴固原署理提督印務於雍正七年十月初八日途次靖逆地方遇臣前差家丁捧到硃批奏摺暨尚方嘉珍兼口傳諭㫖臣於旅舍敬謹九叩謝恩祗領訖伏思臣本樗櫟庸材仰叨聖訓擬以干城良將返衷自問愧歉益深更䝉隆恩憫念臣實窮苦出內庫以酬醫士賜竒品以賚微臣即臣愚賤家丁統邀聖賞浩蕩洪恩無微不至此誠千古之異數格外之鴻慈也臣即捐糜頂踵亦不能仰報萬一理合繕摺叩硃批再臣於奉文之日拮据就道於一月間可到固原緣臣途次甘州偶患項癰沿途療治以致遲延時日於十一月二十日抵任至臣之癰疾仰託聖主福庇今巳全痊合併奏明伏祈皇上睿鑒謹奏據奏偶患項癰巳愈朕思汝目疾之後發出小毒係屬有益之事詢據醫官所論與朕意合因將伊等奏帖一併發來爾看果如此則病根永除矣聞袁繼蔭嗜酒廢弛營務又將汝所請備用銀兩任意借與兵丁果然否新設邊鎮甚屬緊要且諸凡規制悉係汝所創建假若稍有回護瞻徇負恩莫此為甚據實奏聞以便決定去留署安西總兵官印務涼州總兵官臣袁繼蔭謹奏為恭懇聖恩憫念窮兵准開官當以濟緩急事竊臣伏見皇上特恩憫念在京八旗兵丁若有一時需用無所取辦特給內庫銀兩令王大臣等營運生息以備兵丁一時之用並外省駐防之滿洲漢軍兵丁與各省督撫提各標亦一體加恩至於各省鎮標兵丁亦將次第加恩陸續降㫖此誠皇上至聖至明仁恩周遍愛養兵丁之盛心也臣見安西新設巖疆土無出産百物價值數倍內地兵丁衣食較為艱苦其日用緩急不無藉於典質但口外並無富商大賈納稅開當之家不過闤闠小民押物求息其資本既微則取利必重竟有每兩一月之息多至三錢者窮兵以物押錢數月之後利大於本以致日用愈為困苦臣稔知其弊業經㑹同地方官曉諭禁約毋得違禁取利但前此闤闠之民因本少利微不肯當押在窮兵緩急無濟日用仍為拮据臣庫貯雖現有通融銀兩然兵丁朝夕所需其數甚微若零碎借給煩瑣非體臣伏思上諭有鎮標兵丁次第加恩之㫖安西前䝉皇上發有庫貯通融銀共六萬兩內四萬兩必奏聞始敢動用至二萬兩為平時通融之用奉㫖不必具奏而此二萬兩內除哈密存貯二千兩臣庫現貯一萬八千兩臣請於此內動支三千兩開設官當照內地當鋪例每兩每月三分起息擇民人中老成歷練者令其經管量給工食其每月所有利息謹仰體皇上恩㫖以賞給兵丁之家大事需用庶極邊汛地緩急常通無重利之苦有周濟之益矣是否允協出自皇上特恩非臣所敢擅便為此繕摺奏請伏乞皇上睿鑒施行謹奏據袁繼蔭有此一奏發來爾看豈伊欲掩飾前非而謀為此舉耶抑或地方情形果應如是辦理耶爾其據實抒情奏聞以便朕加斟酌雍正八年正月二十七日署理陜西固原提督臣潘之善謹奏為遵㫖實陳事雍正八年正月十五日臣捧讀皇上硃批署安西總兵官袁繼蔭奏摺䝉恩以開設當鋪應否如是辦理下詢微臣並荷特㫖以袁繼蔭嗜酒廢弛營務將備用錢糧任意借與兵丁著臣據實奏聞臣欽遵查得安西係新設巖疆兵丁居其六七游食與貿易之民居其二三其中原有私開小押之家取利頗重兵丁不無受纍袁繼蔭條奏開設當鋪械而外有何長物堪以質當無論三分即以一分之息取諸兵丁其與我皇上賞賚無已之隆恩似稍相左此目前之當鋪不宜開也臣愚竊以管窺冒瀆陳請仰懇洪恩出自聖裁臣未敢擅便也袁繼蔭在西寧並署涼州鎮時臣曾聞酒量甚大自到安西但聞小飲未聞其有沉湎之事臣不敢懸擬具奏至於廢弛營伍借用錢糧其情形原有相肖之跡安西正值軍興兵丁不時差遣凡遇一切牛羊馬駝糧餉俱用撥兵運送存營無幾是以停其操練似近廢弛再安西營務動需銀兩乃能措辦但通融一項有可動用者有不可動用者必須籌畫周詳方為慎重袁繼蔭與兵丁借用銀兩雖係因公時所聞大概臚列六欵另摺恭呈御覽外理合據實覆奏伏祈皇上睿鑒施行謹奏覽所奏殊屬公當同日又奏為欽遵聖訓事竊臣齎摺家丁回固臣跪讀硃批諭㫖荷䝉聖訓勉臣操守臣日夜兢惕寧敢復蹈前轍有負我皇上委任至意訓練兵馬係武臣職分但臣細查固原俱舊損臣查詢其故實係臣叔祖在日設立軍庫凡一應鉛藥器具皆有存蓄故當前次兵興之際用之不乏自康熙五十九年軍庫失火所藏軍器鉛藥毁壞無遺兼之陜提一缺自康熙五十八年至雍正四年曾易八九人大半又多署事俱未及詳加料理即前任提臣路振揚略為補葺又經二次出兵亦多損傷目今存營軍器俱應修飾補造至鳥鎗尤屬要務臣現擬整頓製辦第因營中公費於去歲供應軍前使用尚在不敷前提臣路振揚奏明閒項銀兩俱經營中動用今祇存二百餘金不足措辦除臣現在設法料理外倘銀兩有不敷之處當另奏請㫖遵行事關營伍臣不敢隱匿為此謹奏是雍正九年四月初九日原任署理固原提督臣潘之善謹奏為皇恩髙厚臣病難醫披陳下悃仰祈睿鑒事竊臣材本庸鄙更患殘疾䝉我皇上洪恩賜醫隨任醫治正月內復蒙諭㫖令臣暫行解任調理臣經恭疏謝恩並太醫院吏目臣沈宏寀施世德具摺請㫖三月內太醫口稱奉硃批諭㫖令再竭力醫治臣老疾纒綿自八年十月至今調理半載太醫等俱各竭力盡心調治奈臣目病根深已成痼疾有非藥力所可收功者伏思臣世受國恩涓埃未效值此明良盛㑹竟以殘廢退閒不克與士卒效力疆場時為踧踖再有臣前署固原提督仰沐聖恩賜臣養廉銀二千兩業於本年正月二十七解任之日住支訖臣未效寸長素餐天祿心殊惶悚兹臣閒散安逸更荷御醫每日診視在伊等雖不責臣之供給而過煩天使日逐周旋臣自愧疏慢又不敢送其回京午夜悚懼寢食不寧謹披陳下悃仰祈睿鑒謹奏如可以來京二醫一路同來倘或艱於行動不能前來隨汝之便可也硃批諭㫖卷九十八
