body:
  text: 欽定四庫全書硃批諭旨卷二百十六之一硃批趙𢎞恩奏摺雍正六年十月十五日湖南按察使臣趙𢎞恩謹奏為遵旨陳奏恭謝天恩事竊臣接怡親王大學士張廷玉寄信雍正六年八月初三日奉上諭各省藩臬有準其具摺奏事者亦有本人未曾奏請具摺朕遂未曾降旨者今思藩臬乃地方大員應準其各就所聞所見具摺陳奏且即此可以觀其人之居心辦事爾等可寄信與湖南按察使趙𢎞恩伊若有陳奏事件初次具摺差人交門上奏事人轉奏嗣後從何處轉奏朕再降諭旨可也欽此轉寄到臣竊臣一介微賤毫無報效於臣父趙世綸臣母李氏及鏽爛軍器各案內臣俱應罷斥治罪深荷皇上重疊天恩特賜寬宥復拔授按察使臣清夜自思不特功名榮祿出自浩蕩隆恩即身家性命皆蒙聖主格外保全臣雖犬馬少具人心感愧交迫寤寐警惕惟有恪遵聖訓實心實力急公辦事聊效萬一兹復蒙特諭準臣具摺陳奏聞命之下益深惶悚謹將地方事宜三條另繕一摺恭呈天恩謹奏覽奏知道了條陳三款一摺留中候朕詳閲另行批發同日又奏地方事宜謹開陳於後一湖南地方苗猺繁多內有已附州縣者有歸屬土司者有並無約束者若輩不憚箠楚惟懼殺戮肆害居民已非一日臣細加察訪起釁之初一由漢姦勾引教令一由居民借騙攘奪及至告報到官地方有司又往往袒護不究是以搆怨愈深擾害無已臣所聞既確當即嚴禁察拏其有民苖搆釁未結之案督令作速秉公清理但內地察禁既猺歷來每寨止設寨長一人遇有事件彼此推卸今應每縣僉選諸苗悅服者一二名立為苗長捕緝稽察一惟苗長是問每三年無過奬賞一次則推卸之弊庶幾可杜其無管生苗有能改邪歸正者應聽文武員辨開誠化導如其率衆投歸酌給寨長千百户執照報明督撫立案每三年無過亦豫奬賞倘再有頑梗凶橫更肆劫虜者應請動兵擒𠞰立即正法再查湖南州縣遇有苗猺劫殺民人之案文武鄰境多未會差兵役合力追擒更或互相推卸延至限滿查參或混援苗猺自相穴鬭或捏稱是讐非盜朦朧外結陋習相沿有長凶風一設立藉田攸關典禮守土官員泛視怠忽理應從重治罪前廣西桂臨縣知縣楊詢朋拋荒藉田荷蒙聖恩令其管理十年嗣後各省管理藉田官員有怠玩者即照此例行欽此臣之愚昧恐有不肖牧令於接受前官交代時因有經管十年之例思欲自卸仔肩捏揭栽陷亦未可定而離任之員仍留原任地方則交接官紳攬情説事勢所必有應請敕下各省嗣後州縣交代其前項藉田及壇宇農具有拋荒傾敝者接任官詳報上司該上司委員勘實然後將前任怠玩之員題請革職照毁棄大祀神御之物律杖一百徒三年仍照原動價值追出交給接任官酌動修整造册報銷倘接任官仍無整理或交代徇情并平時有怠荒者應令該管知府每於盤察州縣倉庫時即就便勘驗不時揭報照此究追知府徇隱失察照一大小官員荷蒙皇上格外施恩將錢糧耗羡分給養廉使之屏除苞苴悉心辦事凡有分釐之得皆是髙厚之仁然湖廣一省耗羡係按所屬額編錢糧扣算由州縣分交該管司道府廳收受如守巡各道中有每年可得銀一二千兩者有僅得二三百兩者府廳州縣可以類推多寡未均恐啓覬覦貪圖之念應請特敕督撫將通省錢糧加一耗羡槩行隨餉解貯北南兩藩庫除扣存三分公用等項外儘其所餘銀兩酌量司道府廳州縣大小繁簡派定數目按季給皇仁一體均沾實惠矣以上三條是否可採統乞聖裁謹奏覽雍正七年四月二十四日四川布政使臣趙𢎞恩謹奏竊臣接管署布政司事劉應鼎移交支存正項錢糧除江寧省協餉短少并前任布政使羅殷泰虧空於各原案歸結外應存銀七十九萬九千八十一兩零又另存案候歸入正收雍正五年自首準抵七年條糧部撥封貯鹽茶課各年續首糧課各官完貯虧空贓銀支剩扣還軍需餉米工料並各年鹽茶耗羡雍正六年條糧火耗暨暫存雍正二三四五年未領俸工花紅寄庫軍需雍正四五年耗銀報資兵馬奏銷部書飯食前布政使管承澤署司劉應鼎各任內平頭等項共銀一十八萬五千九百七十九兩零再查正項內有借墊銀一萬三百七十四兩零係未經題明之項臣隨清查檔案或係急等製僃軍裝或係接濟行間兵食以及祀典難缺皆屬詳明撫臣通融一時現有俸餉本款可以收還不難歸補再臣任內亦曽於四月十一日因提標借支修補軍裝器械銀二千兩批司查議詳明借給議俟於秋季俸餉公費內扣還在案錢糧絲毫為重臣職司出納其一切别項借墊及各營無事預支餉米臣斷不敢擅行那動惟間遇關繫軍營地方緊要事務毋庸有此等借墊除詳督撫示行外亦必據實奏聞再通省存倉米穀麥荍豆粟青稞等項臣恐州縣中有侵那虧缺之弊現已派委鄰府鄰州盤察又忠孝節義祠暨先農壇藉田臣恐有置辦未僃之處亦現在委員勘報合并陳明謹奏今命爾署理湖北巡撫印務雖係代攝為日甚久汝川藩職分內事俱當一一告之於署任庶便次第接辦湖北去川不遠仍當留心不時訪察毋謂不在其位不謀其政而置之膜外也至於湖北之任不可以為署篆而稍涉因循延諉再者改流苗民不法一事務須秉公審理尤不可借恐長刁風一語開脫劣員苗民之刁風固不可長有司逞私滋擾誤國殃民之習縱而不懲可乎必屏却一切瞻顧執法研究使無纎毫遁情方為不負朕之委任也勉之苗夀等來亦有面諭之旨同日又奏竊查前任布政使管承澤署司劉應鼎各任內積有平頭并支剩地丁奏銷飯食及雜項耗羡充公銀兩內除因公支用已經造册詳報準銷外剩銀一千九百二十二兩零俱已交臣接管臣到任以來收放錢糧亦巳餘出平頭二百餘兩隨查川省民賦奏銷現今每年有給部書飯食銀一千三百兩向係攤派州縣自雍正六年停捐臣擬將雍正六年應給飯銀於前署兩司平頭銀內動支其七年飯銀於臣任平頭內支給再有餘剩另充公用再臣衙門辦事之書辦每班三百餘人正資供辦各州縣解司條糧每百兩向有伊等飯食銀六錢查係出於州縣收糧積平銀內又有支放俸餉養廉給帖發憑等陋規每年共計約六七千兩又查伊等飯食紙筆等項每年約實需銀四五千兩臣欲僅留條糧飯食一項而目前實未敷用今將有纍屬員兵民等項陋規俱逐款嚴示禁革訖其餘無礙陋規暫為存留以資其用俟條糧墾增可得飯銀四五千兩再為漸次裁革是否可行伏乞聖恩訓示再現今丈量科則册籍臣恐各屬造報未能畫一致滋駁換耽延而書役更得藉端需索隨擬就册式詳送撫臣核定通發各屬照造并察禁府州縣均不得絲毫派擾民間合并陳明謹奏覽奏知道了照所請行移明署任可也雍正七年八月二十四日署理湖北巡撫印務四川布政使臣趙𢎞恩謹奏為恭謝天恩事竊臣於本年五月十九日荷蒙聖恩命臣署理湖北巡撫印務聞命自天戰兢無地獨是臣智短才庸撫躬愧懼受恩愈重報稱愈難惟有凛遵聖訓不敢以已卸川藩之事少為推委又不敢以署理撫篆因循延緩竭此身心矢志勤慎不避嫌怨不辭險阻以仰報聖主深恩於萬一耳臣於五月二十二日將布政使印務交送臬司呂耀曾署理交盤完畢至七月初四日起程於閏七月初二日抵襄陽府十三日抵常德府會審之案另摺奏聞再臣途中詢問年成俱云德安府屬晚禾受旱武昌漢陽等府入秋以來雨澤愆期容臣到任查明陳奏嶽州府常德府入夏少雨八月初六日起至初九日止日夜得雨雜糧蕎粟大為有益合并陳明為此恭謝天恩謹奏湖南巡撫王國棟心有餘而力不足清慎勤三字朕皆許之然不能擴充識見毫無益於地方殊不勝任今命爾巡撫湖南矣可勉竭公忠企及鄂爾泰田文鏡李衛之居心行政以副朕望諸凡不必急求速效孜孜無倦循序料理自有就緒之日汝等封疆大臣首以馭吏導民整飭風俗為要潔已立名隨事應辦皆末節也湖南兵民刁悍兵不畏將民不尊官在下有陵上之心在上有怯下之勢所以法令不行姦頑無忌甚為難治之省凡督撫其地者必先勉勵令通省共信不疑然後方可有為慎勿輕忽妄舉率意紛更一切興除動作皆須奏請斟酌妥確始見之施措於此處加謹加密更為切要至若開拓苗疆駕馭土民殊非急務即就湖南目今兵民情形而論亦非其時必待數年後威布化行民懷吏畏風俗醇朴營伍精練諸務妥協庶可言及也否則不端其本而惟末是趨恐不免有覆餗之虞慎之勉之毋忽同日又奏臣於七月初七日在四川綿州地方值家人捧齎硃批奏摺到臣當即遵旨移咨知會署印呂耀曽訖臣出川時曾將藩司衙門一切事件開單詳細告知呂耀曾矣伏讀聖諭命臣留心訪察川中事件臣當遵旨訪察凡有所聞即行陳奏今將臣目擊三條開陳於後一四川藩司現在銷算歷年軍需檔案又值丈量核册之際事冗案繁務宜精細方無舛謬臣在川時見科臣髙維新清理丈量核算科則條分縷晰頗屬明敏居心坦白亦無欺偽似堪暫為辦理藩務以清案牘者也一四川田地多有隱墾荷蒙聖恩寬其已往許以自首特遣科臣清丈今值查丈漸竣按畝計賦之際其各屬田地科則實有多寡未均之處如巴縣上田一畝合徴丁糧條銀六釐九毫零峩眉縣每畝則徴銀九分七毫有竒雖田地各有山原肥磽不一而徴銀多寡似未應如此懸殊若仍因舊則升科恐民力輸納維艱致起將來拖欠抗玩之漸仰懇皇上特敕川省督撫及清丈科臣悉心察酌將糧則過重者量為輕減則小民益知歌舞墾者愈廣裕賦便民兩有裨益再民間荒田原議勒限原業主一年開墾如一年不能開墾即撥給流民今民間多以已業難舍廣為認墾勉強目前全不計及日後力難盡耕致貽包賠之纍至無主官荒為數亦覺無多現今查出各省流民已有七千二百餘户恐將來有不敷安插之慮併懇聖恩敕下督撫科臣善為開導倘流民有無荒可給者或於荒多之業户早令佃種營生是亦安置之一法也一打箭爐地方甚屬緊要且五方雜處百番叢集況目今達賴喇嘛移駐革達離爐更近凡西藏一帶番蠻赴革逹進香順便入爐交易者必多則內地客商赴爐生理者自較昔有加其中姦良莫辦恐生事端查雅州已改府治似應添設同知一員駐劄打箭爐撫綏彈壓其外至革達內至烹壩地方俱歸該同知管轄至打箭爐既設同知所有現在驛丞一員允宜裁省驛務即交該同知管理再自雅至爐就中瀘定橋地方係各土司入爐歸總之要隘應設巡檢一員專司稽察即歸同知統屬則聲勢聯絡地方益覺寧謐是否有當伏乞聖主睿鑒敕下川省督撫議覆施行謹奏所奏三條候朕斟酌另諭川省督撫察議施行同日又奏臣蒙皇上委任會審永順土民聚衆控告潘果一案捧讀硃批臣復於閏七月十一日途次澧州見大理寺卿苗夀工科給事中唐繼祖口宣聖訓臣跪聆訖即於是日起程同赴常德於十六十七等日據土民呈詞按款研訊因有應提質審要犯及查勘卷案節次飛提於八月初六日到齊復加嚴究各犯供情臣等俱經詳訊明確按潘果確實罪款照例擬絞其各舍把頭人擅自聚衆目無法紀亦巳分别首從照例定擬至潘果任意妄行紛紛滋擾該管各上司早無聞見殊屬不合雖經揭參并自行檢舉在案而揭參遲延之咎亦屬難辭臣不敢少有瞻顧徇隱並將督撫司道等官開列職名隨本附參具題矣所有苖地情形分列七條進呈聖覽伏乞皇上訓示施行一查苗猺生性冥頑不靈且復多疑治之之道惟以忠信明決迅速簡易為當若少遷延必起狐疑臣愚以為重大案件以及土苗漢民爭殺命案仍王化一切案件按限照例遵行庶政有次第而聖德裁成於永久矣一永順乃新闢苖疆土苗野性未定俗例刀耕火種頑梗不靈今蒙聖恩準其改土歸流土民得免苛政已入學校俱已行定之後再行清理畎畝庶頑梗易於樂從矣一永順土司舊設土兵今官兵既設理應革除但一永順素無賣米行市今既駐劄官兵其需食甚多至青黃不接之時米價又復騰貴似應將兵丁冬春二季應領折色米銀先行支發令該管官辨一永順水陸道路險峻穀米內運艱難應飭各縣一查土司彭肇槐所獻官莊糧穀土司只給佃户十七石口分之外餘盡徴收潘果照苗氏之例一斗種徵穀一石共計八十四石餘種每年徵穀八百四十餘石然地有肥瘠土有厚薄一例徵收於理未協應飭府縣查明上中下田土按則徵收方為合例再永順秋糧每年徵銀一百六十兩潘果據舍把之稟每户一分徵收共計一萬九千八百餘户徵銀一百九十八兩零雖經全解藩庫餘銀準作下年秋糧遷延拉扯亦不合例應飭府縣照依一百六十兩原額分派徵收方屬妥協此條巳於審案內聲明矣一臣訊各土人俱云自改土歸流之後盡得安居聖慈教誨感化使之改過遷善前臣出川時撫臣憲德誨臣仍不時訪察以防其詐當無厪聖懷也謹奏覽同日又奏臣於四川布政使任內經手一切正雜錢糧交存數目俱分晰造册移交接署布政司呂耀曾并報明督撫訖其通省存貯倉糧臣已派委各鄰府鄰州盤察及忠孝節義祠宇先農壇藉田等項亦已分委各員查勘以及一切事案今臣卸事俱逐件交與署司留心辦理再臣以在任日期計算得養廉銀二千四百二十七兩零內除抽幫學院養廉捐給塘丁報資等公用外餘銀二千一百餘兩以作養贍家口內幕束修等費深沐聖恩舉家感戴又查臣在任三月積出平頭銀四百九十一兩零內支給過院吏奏銷飯食紙筆共銀二百四十兩零餘銀交與呂耀曾以僃湊支地丁奏銷部書飯食之用理合陳明謹奏操守第一要緊當極加砥礪汝等漢軍之鄙習人所共知者惟此貪之一字朕不能不為汝慮也同日又奏為遵旨密行事雍正七年閏七月初五日準户部咨開議得永順等處巳奉旨令趙𢎞恩料理應將鎮筸總兵官周一德鎮筸道王柔原奏發與趙𢎞恩會同邁柱王國棟查議等因奉旨依議即密行文與趙𢎞恩令其會同辦理欽此為此合咨前去欽遵施行移咨到臣臣即遵旨會同湖廣督臣邁柱湖南撫臣王國棟查議得永順土棍聚衆控告潘果一案前經據報飛檄鎮道迅往撫諭乂差委員辨持示往撫旋即解散土民俱各安業其從前議撥官兵八百名已經臣邁柱於改土歸流案內接準部咨檄飭副將朱文華迅帶原撥辰協兵丁赴永駐防並各標營派撥官兵立催赴永分防布汛現今兵威整肅地方安靜其該鎮道請撥官兵以足從前所議八百名之數分防布汛之處應無庸議再聚衆首從之舍把田爾根等四十餘名俱已陸續就獲臣趙𢎞恩業已遵旨會同苗夀唐繼祖逐一秉公審擬現經具題聽候部議發落是首從俱已治罪亦可懲一以警其餘再若請兵分布嚴追研究押令土衆舉出首惡盡行擒捕究擬勢必將散處各寨守法之人拖纍株連是滋擾搆釁之端巳息而復肇矣其該鎮道請令勒從之人舉出倡議之人盡行擒捕究擬之處亦無庸議至潘果縱役擾民激變苗衆王柔係專管之員竟無聞見聽其苛刻凌虐及舍把等聚衆拏役王柔帶兵前進身至王村頓生退悔復以駐劄遙為聲勢為解等情罪已於會審案內附參聽部議處惟是此案緣今改土為流在土民則是出水火而登袵席在舍把則如豺狼之就籠檻不能恣其吞噬遂乘潘果不善撫循之隙鼓惑號召以致聚集多人而土苗畏懼不得不惟命是從也應請凡有漢姦冒充舍把者照例移解內地安插其餘舍把頭人盡行革除再有犯法之事即行究處立移內地安插飭令新設府縣等官查明土民户口照依內地清編牌甲設立保正百甲責令管束該府縣每於朔望宣講聖諭廣訓化導愚頑如此則姦頑可變良善而土民亦無不遵法向化矣臣等謹合詞具覆伏乞皇上訓示遵行謹奏所議俱是王柔乃踴躍趨事之員但諸事急於求效不免孟浪之咎當棄其所短取其所長保全用之雍正七年九月十九日署理湖北巡撫印務四川布政使臣趙𢎞恩謹奏臣於本年九月十一日到任署理湖北巡撫印務竊查湖北省城積習訟棍滋事姦吏舞弊府縣審理案件疲玩成風任意延擱而江漢又係省會衝區易於藏姦納垢臣到任之後已將巡撫衙門蠧書姦役重懲十有餘人其餘容臣竭力清查其各屬錢糧有無虧欠現在明查暗訪務期不致少有欺隱朦蔽至於諸屬員進見之時臣悉明白指示剴切開導務期國家得人以慰聖懷若有聲名狼藉貪酷虐民者自難少緩參處其餘平庸遲鈍者或係初任之員或係迂腐之流臣愚以為宜嚴加教訓以觀後效倘至再三不能化誨或令其改教或令其罷任亦難姑容以貽民患惟是臣蒙聖主命署封疆巨任自知才短識微日夕惶恐嗣後凡有識見短淺之事惟有具摺奏聞懇祈皇上訓示遵行再奉國典再原任寶慶府知府許登瀛聽訟明允辦事勤之題授可收得人之效合并陳明謹奏今爾赴任湖南更非湖北可比須勉之又勉封疆大吏之責惟察吏一事但能令屬員知懼各皆循分盡職何事不克辦集一人之心思耳目有限安能周遍通省然欲使屬員知懼亦不在故為嚴厲動輒參劾也是非懲勸少不公明人焉肯服如鄂爾泰田文鏡李衛無他伎倆不過能令屬員心悅誠服耳湖南風俗大抵民刁兵悍武辨俯就兵丁有司縱容百姓較之他省尤為難治積習已久不可驟加繩墨亦不可因循姑息如治亂絲徐徐不間次第整理自當就緒不然非過則屬不及何望成效至於苗疆事務只就目前局勢隨宜料理切勿多事貪功致滋紛擾民俗未淳卒伍未練豈可捨近求遠輕舉此等事耶志之密之此外更有訓汝之旨隨便陸續批示湖廣總督臣邁柱署理湖北巡撫臣趙𢎞恩謹奏為恭請聖訓事案查欽奉上諭目今各省內或有尚未分給養廉之員著各省督撫悉心商酌一面辦理一面奏聞經湖北撫臣馬會伯準到部咨在案竊臣等查湖北養廉尚有多寡不均參差未當之處應請更定以裕羣工湖北每年耗羡銀一十一萬一千八百三十九兩零除糧驛二道及武昌同知另項撥給外其布政司以下州縣以上照事繁簡議給養廉並辦公務銀共十一萬一千四百兩尚餘銀四百三十九兩有零留充公用至署事之員既有本任養廉則署事之銀應給一半其餘一半留充公用凡有差遣離任之員支給半分以養家口其署事之員分領半分以辦公事至於雜職等員任輕事簡既有俸銀可供食用似可毋庸議給養廉但值奉差四出或有那借遲延之纍議於出差之時量差遠近於充公銀內撥給盤費自無誤公之慮矣是否有當臣等未敢擅便伏乞皇上訓示方敢具題謹奏舉凡直省此等奏請朕槩付之一覽而已是當與否在汝等秉公斟酌辦理也雍正七年十一月初七日湖南巡撫臣趙𢎞恩謹奏為恭謝硃批諭旨臣謹遵皇上指示次第辦理另奏外荷蒙聖訓開導愚蒙銜感五內刻不去懷以為終身之所遵至愚極陋封疆重寄責任匪輕一月以來朝夕惶皇上睿鑒施行謹奏燈下所批字畫潦草汝其詳加審視同日又奏臣到任之日經前撫臣王國棟交臣之事臣當一一辦理謹列於後伏乞聖覽一奉怡親王等寄信奉上諭各省龍神廟原為地方祈求年穀豈可聽愚民附會祈求以致褻慢欽此伏查湖南湖北龍神祠向俱潔淨供奉臣當不時稽查不許間人瀆擾一大學士公馬爾賽等寄信奉上諭凡一大學士公馬爾賽等寄信奉上諭近聞西洋之人外省府縣中尚有潛藏居住者本地無賴之人相與往來私從其教恐久之湔染益深一臣聞四川墊江萬縣七月初間百姓不容丈量扯旗聚衆約千餘人係因丈量之臣過於急遽不恐未確實理合遵旨奏聞謹奏覽同日又奏臣準前撫臣王國棟移交册內有遞往廣西軍犯達色等七人沿途布散流言一案除長衡嶽三府協營兵役已經訊明覆奏外其永州一府尚未解到應催提訊等語臣隨檄行護理按察司原任寶慶府知府許登瀛將永州府遞解兵役解臣訊問隨據許登瀛呈請將沿途住歇店家一併提訊詳報到臣臣因所詳近理當即密飭速提解訊毋得驚擾地方兹據陸續解到各鋪店人等臣俱逐一詳訊所有訊過各供另敘簡摺恭呈御覽仰見聞謹奏詳閲各供詰詢明晰殊為可嘉候另有諭旨同日又奏湖南民情蠻蠢刁悍勝於湖北少加姑息難於安帖上下各官近以寬容居心和藹處事以致案件疲緩姦胥猾吏朦蔽妄行臣到任之始即將臣衙門及兩司蠧役二十餘人嚴拏懲處凡有各官進見臣俱切實指示一切案件不許耽擱遲則查懲湖南吏治過於嚴急恐激成事端然不得不稍加一府廳州縣不能勝任者居多若驟行題參誠恐接任者又係新員反不如該員之少經歷練臣愚以為當嚴加訓飭或以文檄或用手書或革也一新闢苗疆所有府縣城垣據道臣屢請建造約用銀六七萬兩臣愚以為新闢苗疆當以撫恤化聖訓遵行與臣意見相同臣思移風易俗出示告誡恐愚頑視為具文不若奬賞羞辱二端易於感動人心臣愚以為凡有孝悌友愛端方良善人等令其按季報臣於臣養廉項內賞以花紅匾額其有凶暴匪類不守本分等人亦令按季報臣照律究處仍於該犯門首懸匾辱之或一二年間人情貪賞懼辱皇上訓示遵行一大學士公馬爾賽等寄信到臣奉上諭羅教一案當分别輕重生事倡首者不可不懲無知附和者量加寬宥總期化導愚頑去邪歸正以杜蠱惑人心之漸欽此臣即密行寄信各屬善為辦理一大學士公馬爾賽等寄信到臣奉上諭湖南匪類賣藥一案鄂爾泰緝獲江自得解楚面質令臣與王國棟詳細研究無枉無縱欽此臣查許英賢等經前撫臣王國棟已經解往江西原籍安插臣現在飛咨江西提解來楚其雲南之江自得已於十月二十五日解到臣詳細研究狡供不認俟提到許英賢等嚴審明確另行奏聞謹奏此案據滇省奏稱江自得已供認不諱其事似有影響大抵前因王國棟疏忽從事所以未能究出雖然豈可令無辜濫被寃抑須秉公研審務得實情封疆大臣於是非真偽必具確見將一派忠誠對朕方是若一味迎合揣度以為敬慎則大誤矣萬不可蹈襲此轍勉之志之湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏為奏聞事竊臣等接到瀘溪縣知縣孫鏡申報土百户吳貴三等黨占民田不納錢糧每年纍縣賠賦又土苗吳老花將鎮兵齊國俊擒拏入寨勒銀贖回是以吳老花等不服捉拏獅子山僧人入寨又放火延燒民房放鎗傷死楊桂讀楊桂景等控鎮控道各官偏袒改為偷竊傷人又吳貴三將吳老金等之妻與弟拏入寨中乾同知拘拏百户吳得勝而吳貴三統率苗衆至乾城放鎗勒釋歸寨等情到臣臣等現在飭提秉公確審另奏理合先行奏聞謹奏凡如此等事件切不可草率將就完結以滋長姦弊文武官辨中如有隱諱揑飾情形務須究明底裏嚴參重懲以示警戒雍正七年十二月初九日湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏楚南一省湖山廣濶每多盜匪臣等竊思弭盜必清其源每見追比捕役而盜風愈熾蓋因捕多養盜待至追比嚴迫始將竊賊數名支展搪塞又使積滑巨盜四出劫掠以供費用此若輩之故智故真盜終難全獲臣等以為必設法密獲真盜一二名恩威互用誘其直報實在盜匪巧密擒拏庶可以寒捕役之膽而杜盜捕通同之弊似屬一䇿臣等即以此意密授護按察司事原任寶慶府知府許登瀛悉心辦理今據許登瀛稟報拏獲積盜鄒細徠仔一名乃犯案充發逃回之犯訊據供稱認識盜犯姚士公住安慶府八卦門張九住江西南昌府廣城門又報出趙二住儀真縣龍門橋又曾住漢口還金樓詰問趙二是否即係趙七據供他又呌趙七他頭上有疤子還聞得他有弟兄六人著落儀真縣典史的捕役盧士宏就知道了等語又據報出盜匪張二住湖北漢陽縣毛老五談國亮等十一人俱住湖南衡陽縣等情臣趙𢎞恩即提到鄒細徠仔親訊該犯供吐無異隨密札江南江西安徽著拏趙七弟兄六人盧士宏姚士公張九張二并委長沙協都司謝瓏等前往衡陽旋據拏獲毛老五等十餘名現在飭審理合先行奏聞謹奏日前有諭邁柱之旨趙𢎞恩汝試問之實緣督撫庸劣不能縝密致令風聲逺播所以巨盜趙七逺揚也如終不能獲朕看范時繹邁柱何顔仍復忝居督任湖南巡撫臣趙𢎞恩謹奏臣查拏獲逃盜鄒細徠仔供出趙七等緣由臣現會同督臣邁柱具奏外查鄒細徠仔所報衡陽各盜臣於解到時當交按察使張璨帶同原任寶慶府知府許登瀛密訊務期無枉無縱旋據張璨等稟稱訊據各盜又報出各省強竊盜夥六十餘名及捕役李四何清等通同分贓臣隨又分行密拏因洞庭湖素為盜藪察緝更屬緊要復委都司謝瓏帶同積捕李四等前往洞庭一帶密買船隻令其每船撥健兵數名選帶積捕積盜各一名扮作客船在湖內往來密緝一有賊船若輩自能窺認立時就擒但差出辨兵臣酌量給賞而帶去盜捕俱屬有罪之人可否仰邀聖恩如積盜積捕能同獲實在大盜五名即奏請各減罪一等能獲十名減罪二等再多以此遞減使各知奮興出力再此等積盜徹底清查自多從前諱匿之案恐各省州縣等官畏參掩護不為聖主訓示遵行再許登瀛既於護臬司任內領臣指示查出積盜故今仍令隨同密審許登瀛亦依臣訓奏覽同日又奏為奏請訓旨事竊臣一介庸愚捧讀熙五十九年至雍正六年地丁等銀米共八萬有零細加訪察其中民欠者固有而胥役襟棍包侵者亦多在各印官每以徴輸本年額賦為急務兼之庶政殷繁雖有帶徵之名並無清追之實臣現令各州縣衛開造花名欠册擬俟齎送至日先儘欠多之處派委試用人員持册親往各鄉照依册開欠數曉諭花户清對實係自欠者催令速赴本縣上納如係已完捏載欠數者許花户稟首即於皇上訓示遵行再楚南十一月內雨雪一連十有餘日臣詢及農民皆云三冬雪足三伏雨盛來年可望大有此皆我聖主恩膏普遍之所致也臣不勝歡忭之至合並奏聞謹奏雨雪應時固屬豐登嘉兆然必待秋收後方可以為定準去歲王國棟亦曾如是奏報云云汝試問之可也似此預期大有皆屬肆志妄論嗣後不可惟以公忠念慮對越上天敬慎以俟於一切蒞政臨民處能不獲罪於鬼神雨暘時若朕可保其必然也第當務本根本既立諸凡自然順遂獲蒙彼蒼之垂祐矣勉之敬之同日又奏為奏聞事雍正七年十二月初五日訪聞湘潭縣曹家馬頭泊有扒桿船隻上插黃旗內坐龍大老爺口稱奉內府差往廣東開礦現有印牌張威揚勢爪牙亭立臣隨密差標員前往會同文武圍堵盤拏於初七日據標員等將龍琯及隨從之人拏獲并搜出諭票一張押解到臣驗看印文俱屬偽造內寫內務府奉怡親王諭委等字樣覆加審訊龍琯直認假冒不諱至票內所載王諭一道知照一角供係虛填臣思此種棍徒假印公行冒稱王差不法殊甚除鈔録諭票押發布按二司追審定擬另題外理合先行奏聞捏造原票併呈御覽謹奏此事邁柱亦經奏聞朕批諭明係棍徒假冒復有何疑今既審出實情即當徹底窮究詰其在京有無線索及同夥之人審結定案應以光棍律懲處示警同日又奏竊照長沙府前任瀏陽縣王欽命詳報生員朱汝瑚并已故劣監朱紹賢等恃襟肆慢一案已經前撫臣批司查訊臣到任之後復據署任瀏陽縣陳夢文呈驗朱姓家規一本其端稱謂一條內有侏儷左袵可變華夏二語當此堅不承認理合先行據實奏聞家規一本並呈聖覽謹奏如曾靜等此種匪類之為害於國家不啻嘉穀之有螟螣勝於盜賊數倍極當嚴究黨惡盡法懲處不可藉口草野無知疏縱養姦湖南地方稽察匪類最為要務留心緝訪不容少懈目下且毋露意俟朕寬免曾靜之諭通行頒發令山陬僻壤盡已曉喻之後然後從而盡力嚴究之硃批諭旨卷二百十六之一欽定四庫全書硃批諭旨卷二百十六之二硃批趙𢎞恩奏摺雍正八年二月初四日湖南巡撫臣趙𢎞恩謹奏為恭謝天恩事本年正月初一日臣齎摺人回敬捧御賜福字並克食到長臣即郊迎至署恭設香案望闕叩頭謝恩祗領訖隨將恩賜克食留各屬在署挨次分嘗臣等既羣瞻宸翰之光輝復共拜天厨之芬馥嵗朝得福元旦承廉謹切實無欺専尚根本不事機謀共相圖報天恩謹奏覽同日又奏臣初任封疆時深惶悚蒙皇上諭旨著臣效法鄂爾泰居心行事適督臣鄂爾泰自粵回滇路經長沙臣於正月二十七日接見相與言論四晝夜見其一片丹心開誠布公且認理的確毫無沾滯以公忠報聖主以感化待官民於臣識見未到之處分别輕重詳細指示至於封疆大任應辦應行之事鄂爾泰亦多方開導臣頗有受益之處自兹以後臣當凛遵聖訓勉力效法竭盡駑駘以仰報聖恩於萬一耳鄂爾泰已於三十日起行臣送至瓦雀溪於初二日回署理合奏聞謹奏汝獲遇鄂爾泰與之晤對講議至四五朝夕乃汝之厚幸大抵立心向上之人見鄂爾泰未有不感奮者即愚不肖輩領其言論觀其動作除禽獸木石之無知亦未有不愧勉者實屬不世出之名臣也然欲效法鄂爾泰先當求其本鄂爾泰之超乎庸常者無他不過公忠二字耳若徒以才情識見較鄂爾泰之長短則誤矣凡人各有所長率因根本既失所以耳目心思俱絀一切智力皆不及也今以種種榮辱得失之念居官為人而欲企及鄂爾泰如何可能至不能時而諉之曰才情識見有所不及實乃自誤之論傳云心有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正懷不正之心以處事待人安能得其中耶如欲效法鄂爾泰惟當返求諸本方可勉之同日又奏為奏聞事懇祈皇上訓誨遵行一臣到任之後各屬劣員尚未查明實迹未敢遽行參劾今查有屢經訓誨不能稱職如善化縣郭位等十餘員已會同督臣邁柱分别核題矣目下清查積欠委署印務俱在乏員懇乞皇上特簡州縣官二十餘員來楚俾得隨時委用理合一湖南人情刁悍詐偽臣到任以來凡屬官進見俱諄諄訓誨令其誠實無偽屏除機巧化導百姓以正風俗即臣於公所聚會之時亦惟以化導人心轉移風俗之言反覆告誡近聞附省人民漸有愧悔之語尚少悛改之實而逺處人民一時未能一臣委長協都司謝瓏等復於洞庭湖一帶又拏積盜秦三等十餘人現在飭審其湘潭武陵亦皆多盜之地臣當漸次設法查拏至長沙城內拐賣人口之巨惡李大鵬臣已嚴拏又積盜熊金魚暗約羽黨屢於常德嶽州等處往來盜竊經臣訪實設法拏獲現飭審究羽黨而長沙以及各府之有名訟棍與不法長隨並一切匪類容當次第察拏以安民生者也一厯來散賑之弊由於姦胥捏造户口地棍冒領一湖南糧船開運甚遲向來雖文報冬開實係正月盡開行惟雍正六年因糧道楊馝上緊催促故得於十二月二十九日開行臣到任後嚴飭該道實心速辦該道克遵臣訓去年於十二月十一日開行全幫北上矣一長沙協都司謝瓏擒拏盜匪頗著勤勞今有臣標右營遊擊缺出可否以謝瓏補授其都司員缺查有長沙協守備仇之苞勤慎諳練堪以補授其守備員缺查有奉旨命往臣標候補之苟思賢例應補授臣已與督臣邁柱會題統候一湖北提塘袁炎湖南提塘袁熾兄弟二人把持二省塘務結交諸屬互通信息素稱多事臣前曾告之邁柱已將袁炎革黜所有袁熾經前撫臣王國棟追繳委牌仍敢把持塘務於新中文武舉子一王國棟去年十一月初四自湖南回京到武昌時聞旨令其緝拏逸盜即回長沙王國棟不勝羞愧於本年正月初七日親往永州府緝拏荆之寶案內逸盜曾向臣言如其不獲當直抵廣西交界設法協拏聞一臣準廣東巡撫傅泰咨文拏獲私散劄付姦棍聞謹奏匪類之為害地方甚於盜賊當於平日留心搜緝何待粵省咨文始行密訪嚴拏耶此等事在湖南更為切要不時加意稽察可也同日又奏為請旨事臣等查湖南衡州府近日盜竊潛聚民情刁悍永郴等處苗猺雜處俱屬緊要其道員汪榯未能整飭吏治屏絶姦邪及委署藩司亦不過循繩守墨而已但其為人忠厚有餘操守尚好非幹練綏輯之員應以京職調用頗稱允協所開道缺查有奉旨留湖南遇缺題補之原任寶慶府知府許登瀛委署臬司清理積案俱稱平允設法拏獲大盜鄒細徠仔等賊亦屬實心不避嫌怨仰請聖恩補授衡永郴道缺庶苗疆重地有得人之效矣臣等未敢擅便伏祈皇上睿鑒施行謹奏所奏是已有旨諭部矣湖南巡撫臣趙𢎞恩觀風整俗使臣李徽謹奏為奏請聖訓事臣等準到刑部侍郎杭奕祿咨文奉旨爾帶曾靜由江寧蘇州至杭州由杭州差人將曽靜送至湖南巡撫衙門令伊回家料理家務畢著伊自行投到觀風整俗使李徽衙門聽用如伊欲他往不必阻留欽此等因到臣臣等仰見皇上聖德如天明並日月宥一囚而可以絶億萬人為逆之心寬一惡而可以開億萬人向善之路臣等每每宣布聖恩訓化官民凡有血氣之人亦皆歡欣鼓舞至於山野庸愚蠢頑無靈者恐習久而難化或生疑而從緩臣等愚見以為曾靜之感化愧悟係身親目覩聖天子之人似應令其遍厯鄉村周詳開導庶使蠢頑無靈之輩聞其言而耳目頓開心胸爽豁或可為移風易俗之一助也俟曾靜遍厯之後任其他往不必阻留其曾靜日用臣等量為捐給合并陳明再臣李徽前同王國棟會皇上批示遵行謹奏覽雍正八年四月初三日湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏為報明事臣等據新設保靖縣知縣王欽命詳稱桐油坪民人王應龍等被六里毛狗等寨凶苗石當捕等因勒索保寨舊規鹽銀不遂於二月十九日統領苗衆執械刺傷王師山一人搶虜財物燒燬房穀等情到臣臣等伏思王應龍等自改土歸流之後即係內地人民石當捕等何得仍索舊規乃敢肆行剽劫統衆逞凶若使少為寬縱勢必貽害地方搶殺之漸斷不可長臣等星飛移飭鎮筸道鎮等察度情形前往擒拏如負固抗拒即相機擒剿庶地方得以寧靜理合先行奏聞謹奏切勿輕舉妄動汝等督撫二人再當加詳加慎籌計妥確然後奏請舉行好大喜功之念萬不可存同日又奏臣等竊思永順府縣等處自改土歸流之後再將姦惡之舍把頭人革除是各土民皆知安居樂業之美矣但查六里紅苗尚未輸誠終屬隱慮臣邁柱前經奏明應俟永保桑建治立營布置詳備之後緩緩招撫將來自必向化歸誠已蒙睿鑒今永順已經設立一府四縣并設協營官兵規模已定則招撫六里之䇿正須及時籌畫臣等詳加商酌應由六里而至崇山衛直抵貴州之正大營等處逐寨招撫隨地設泛使兩省聲息相通互為䇿應其界連川黔各土司之處亦分設營汛毋得聲張并密會川黔二省嚴飭漢土官兵加意防範再有接連鎮筸四營所屬之紅苗地方亦令四營各安塘泛直通六里內外聨絡則六里紅苗孤立其中尤易就化誨至永桑西北施南等各土司係湖北恩施縣管轄其地介於容美酉陽兩大土司之中素受容美酉陽脅制侵擾多半離心近見永桑改土之樂亦有觀望之心若恩施縣令得人撫之甚易臣邁柱先因守備鈕正已向為諸土司所信服特請改補恩施知縣已蒙皇上恩準現在密令鈕正已留心辦理使此十餘土司盡皆歸化則自湖北之恩施直抵湖南之永順地界接連得成掎角之勢而容美酉陽二處中間隔斷使不能為狼狽之姦矣至於川屬之酉陽等土司近連黔楚兩省而附近湖廣者居多去川窵逺湖南諸苗向化之後或可相繼化誨酉陽歸化則滇黔川廣各省氣脈相通中無間隔矣目下楚南先務當以安兵設汛聲應氣通應令道員王柔再選文職數員從保靖交界之花薗土城起自近及逺逐一招徠由崇山衛等處直與貴州之正大營相接仍一面於三分耗羡內動支奬賞歸順之苗使諸苗既感且畏自獲踴躍向化但招撫一處即設一處塘汛隨招隨設尤易為力應選副將及同知等員辨並兵一千二百名會同前往酌量安設分布臣等仍一面相機辦理臣趙𢎞恩於接會督臣鄂爾泰時四晝夜詳細言之俱相吻合此係臣等庸愚所見謹請皇上教訓遵行謹奏事關重大交廷臣議覆後另降諭旨湖南巡撫臣趙𢎞恩謹奏為奏聞事竊臣據辰永靖道王柔面稱監守辰關稅務業經三載已有成局第道署駐劄鎮筸去辰關窵逺須皇上訓示遵行再嶽常道溫而遜奉旨清查江南積欠回期尚逺現在署理嶽常道長沙府知府孫元辦事明白居官勤慎稽察隄工並管理鼓鑄俱有條理是以長沙府缺臣前具題請以候補同知知州之趙侗斆暫為署理但該員現署道州兩月以來查其守雖有餘才幹不足首府衝繁似難久任湖南諸員中一時不能得人懇求奏覽同日又奏為酌留能員恭請聖訓事竊惟湖南吏治民風皆需整理而守令各官必得熟悉之員目今現任各官半係初試臣雖竭力指示恐一時驟難獲效臣於本省緣事離任各員內查有原任嶽州府知府李渭年富力強才能堪任係因按察使何錫祿附夾私稟案內審明止係揭報遲延部議革職繼因顧琛虧空倉穀附參注册業已獨賠完結又原任武岡州知州陳率先熟諳苗疆係因推諉盜案降調嗣因史惇化反噬許登瀛案內牽連審明完結現應赴部改補又原任湘隂縣知縣侯國正係因虧空浥穀參革限內通完題準免罪還職又原任嘉禾縣知縣王惟修安鄉縣知縣胡天界俱係丁憂離任交代清楚現應回籍以上三員亦皆才可辦事熟悉風土可否仰邀聖恩俯準將王惟修胡天界令其回籍料理喪事後仍速來楚委用陳率先侯國正亦即留楚酌量以知縣題補李渭留楚遇有地方公務差委效力俟著有成效另為送部引見候旨録用臣因地方人材起見第與成例未符未敢率題謹具摺陳奏是否可行伏乞皇上訓示遵行謹奏交部議奏覆到有旨雍正八年五月二十六日湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏為報明事竊查前據保靖縣詳報六里毛狗寨凶苗石當捕等燒劫桐油坪民王應龍等一案臣等隨飭移鎮筸道鎮察度情形前往擒拏如負固抗拒相機擒𠞰并繕摺奏聞兹據鎮筸鎮臣周一德道臣王柔文報已於四月二十九日誘獲苗犯石老滿等四名并稱石當捕已故等情到臣臣等隨令就近質取確供報酌外所有獲犯緣由理合奏聞再臣等另接鎮臣周一德致書移咨竟因此案帶領遊擊辨兵乘便招撫各里諸苗并已招賞苗目二十七名臣等以招撫六里現在具奏自應請旨辦理未便遽行隨先後移覆令其候旨遵行其已招之苗仍令撫綏防範去訖又據慈利縣知縣馬廷相設法擒獲惡棍辛得揚併伊壻劉伯宰二名其辛鳳來現在嚴緝合并陳明謹奏已經就撫之苗衆諭令周一德善為綏輯切勿因輸稅納糧等細事致滋擾纍其辛得揚之子辛鳳來一犯嚴緝務獲毋使漏網湖南巡撫臣趙𢎞恩謹奏為恭謝天恩事臣前參署耒陽縣鄒昌時鑽營狡黠實因湖南每尚夤緣兼多詐偽臣自到任以來屢以風俗人心時時勸戒化誨無如諸員尚在半信半疑未能奏謝伏念臣屢沐聖主重疊天恩破格優容感激涕零刻刻在念惟有誠實無偽共相勸勉以圖報聖主殷殷訓誨之恩於萬一耳謹再具摺奏謝天恩謹奏覽雍正八年十月二十八日湖南巡撫臣趙𢎞恩謹奏一臣因六里苗性凶頑恐難化誨故令王柔由花薗帶兵而進倘苗梗化則周一德之兵可撓其背復令周一德由陽孟寨而進倘苗梗化則王進昌之兵可擊其後臣帶提標辰協健兵七百五十名以為應援仍復聲揚大兵繼後臣至鎮筸聞苗衆俱願就撫臣宣講皇仁重加賞賚畢又因向年會勘之鎮筸紅苗內尚有實未輸誠者趁此六里苗衆感激聖慈又見臣等兵威且周一德向以鎮筸苗目食糧轉化餘苗因而苗衆服其指使即令周一德帶兵持賞又往化誨鎮筸紅苗安設四路塘汛順勢布置似易為力也鎮筸紅苗與六里接壤六里與保靖接壤此番化誨西南一帶可以聲應氣通矣一六里苗衆厯年陷匿內地人口經臣化誨之後情願獻出以贖前愆者臣俱分外給賞并將人口資給路費飭回原籍此後陸續獻出者臣當照前辦理又各苗僉稱康熙五十年間認納雜糧七十二石八斗四升今雖內有撥歸黔省寨户而楚屬苗民情願仍照原額均納情詞懇切可否仰邀聖慈特豫寬免一年以奬向化之誠此臣庸愚之見伏一臣自議撫六里之後辰永道王柔鎮筸鎮周一德副將楊凱辰州府白豐互相稟揭非好大喜功即私相妬忌臣已屢加訓飭及臣抵六里又見彼等量小識卑爭長缷過種種不合之處臣或厲色一六里毛狗寨凶苗石當捕等燒劫保靖縣民王應龍一案臣於招撫六里之時據王柔稟稱受傷之王師山已愈而行凶之石宜三被傷身死石張四在監病故請將無辜之彭老聳等釋放其起事之石老滿枷責完結等情到臣臣思石老滿等所犯在未經化誨設官以前似應從寬完結於招撫安設之事庶無畏縮隨飭令王柔照議發落理合奏聞一臣往六里之時時值嚴冬隨往文武員辨兵丁遇有衣帽盤費無備者臣仰體皇仁量加資助又自長沙以至辰州若令各自雇船不無爭鬭擾民之事臣俱照依時價代雇船隻又添補一切軍裝器械又賞賚隨臣進撫兵丁及沿途各營兵辨又賞給獻出人口之苗及備辦藥物等項臣俱飭委辦錢糧之靖州知州楊輔臣暫動公項應付共二千五百九十三兩零將來未便開銷報部已飭糧道刁承祖於臣養廉內扣除解交藩庫以歸原欵庶公項不致牽混也謹奏此等處雜費應動支公用項下銀兩者雍正九年正月二十八日湖南巡撫臣趙𢎞恩謹奏一直𨽻靖州處湖南極邊為黔省咽喉民苗雜處最關緊要武職已設協治而文員止設知州未足以資彈壓且既有催科之責復有統率屬縣之任兼顧維艱臣愚以為似應將靖州改立府治府城添設一縣同原屬之綏會通三縣歸知府統轄該州額徵錢糧等事歸新縣徵辦既設府縣則州判應改府通判并添改府縣首領佐雜以成一府一縣之制似於邉疆有益但事關更制未識當否伏乞皇上訓示如蒙俯允其應補知府有現任靖州知州楊輔臣任靖有年苗疆熟諳以之授此新設知府人地相宜合併陳明統乞聖訓以便揀選應補通判知縣等官及一切事宜彚疏另題一湖南一省幅員遼濶江湖寬廣長沙乃省會重地居兩粵之下遊為洞庭之鎖鑰嶽州常德各有水師一在湖之北一在湖之西相距甚遙臣愚以為似應於長沙添設水師營即可扼守兩粵更可聯絡嶽常水師於地方有益其官兵船隻倣照嶽常之例設備事關添設營治未識當否伏乞皇上訓示遵行謹奏此皆地方緊要重大事務應與督提悉心籌計再四商妥然後舉行今據一已之見率爾具摺奏請甚屬孟浪雍正九年三月初七日湖南巡撫臣趙𢎞恩謹奏一欽奉上諭頒發銀二十萬兩於洞庭湖舵桿洲建築石臺以為舟船停泊避風之所臣於二月二十七日抵嶽州會同督臣邁柱往勘舵桿洲建築石臺基址竊洞庭大湖當此仲春尚爾浩渺無涯夏秋泛漲洵屬危險今蒙聖恩頒帑建臺從此行舟商賈永無覆溺之虞誠補千萬年之缺陷臣等現在遴員辦理其估計工料册覽另行核實奏請所有往勘緣由相應奏聞一荆州府鈔關向來設於通逹川省之外江沙市稽查川楚商販出入上而彝陵下而郝穴設立關口而內河之草市等處亦設關卡止抵荆州之貨船一槩徵收船稅相沿雖久現今各官亦無侵隱但貨船到荆知府已徵落地稅鈔關又徵此船稅以致諸物價值昂於他郡兵民實多拮據商販亦苦煩擾臣懇聖恩俯將荆州鈔關移設彝陵州將自楚往川船隻及自川來楚船隻竹木照舊𣙜稅其餘各關口槩行裁撤貨物仍聽知府照舊徵收落地稅銀所有鈔關船木稅恩施免徵則彝陵咽喉重地稽察𣙜稅兩有實際而荆郡兵民商販頂沐聖主蠲賦惠養之殊施實無紀極臣因仰體一臣於三月初二日接準部咨奉旨山西按察使員缺著溫而遜補授欽此所有署嶽常道長沙府孫元督理堤工兼管鼓鑄盡職無誤署一湖南入春以來雨水均調米價亦平合併陳明謹奏湖南雨水米價情形知道了雍正九年七月初三日湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏為遵旨密奏事本年五月初三日臣接大學士公馬爾賽等寄信雍正九年四月初九日奉上諭桂陽州縣等處舊經開採之礦及附近省會多産米糧之州縣或果有益商民兼資鼓鑄令趙𢎞恩會同邁柱確查定議具摺密奏請旨等因欽此臣趙𢎞恩隨札商督臣邁柱以桂陽臨武綏寧三州縣議以開採商得謀利民得謀食所獲銅鉛又可以資鼓鑄臣邁柱以地方所係事尤重大開此三處雖選召殷商募用本地人夫且禁官役親識襟棍攙越等弊立法固善然利之所在人所必趨法令雖嚴弊難悉除為日既久外籍不能拒其不來食口既多米價恐貴臣等查前於三月十一日奉到上諭臣趙𢎞恩一面奏請仍一面飛飭將現開之五處於兩月之內陸續停止去後今俱已停止封禁文報在案臣等合詞議奏謹遵諭旨俟黔省之稿坪古州寧帖後再行請訓遵行謹奏停止開採甚是向後似此貪利之事不可輕舉妄動雍正九年十月初十日湖南巡撫臣趙𢎞恩謹奏一鎮筸鎮臣周一德奉旨來京陛見派往北路軍前臣隨飭司於公項內借支共銀一千兩給與製備行裝盤費之用其伊家口在楚所需養廉等項亦飭司酌議寬裕支給以副一鎮筸鎮印務已經督臣題委永順副將楊凱署理楊凱係頗諳苗情之人但性不安靜臣惟與督提二臣時加囑勸務期文武一臣一介庸愚荷蒙聖恩教誨並諭臣效法滇省督臣鄂爾泰公忠報效髙厚深恩粉身難報今鄂爾泰進京聞一從前採試桂東等處礦厰行據司道查報併據彼地文武員辨具結回稱實係有籍民人並非惠州礦徒自封閉之日立即各歸安業地方寧靜等一楊永斌諳練老成實心急公可勝巨任前往廣東時因彼地盜賊繁多官不和衷與臣商酌臣囑和衷共事景象積久諒自潛移默化臣有所聞理合奏聞謹奏覽雍正九年十二月初三日湖南巡撫臣趙𢎞恩謹奏一臣於十一月初九日自長沙起身於二十四日接見滇省督臣鄂爾泰相聚一晝夜將臣所辦事主竭此血誠於不息也今於十二月初一日回長理合將回署日期具摺奏聞一湖南武陵湘鄉湘隂平江巴陵五縣自康熙五十九年至雍正六年共積欠銀四萬三千一百四奏覽同日又奏為恭謝天恩事竊臣前遣臣子趙松紋齎摺赴京懇求聖主恩發跟隨侍衛班聯習學規矩荷蒙聖慈即賜召見更蒙天恩遣回任所教管俟二三年後再送來引見臣接奏事張文彬等來字不勝感激惶悚臣子松紋實係平庸不堪惟有恪遵聖訓嚴行教管以仰副皇上格外生成之殊恩所有臣及臣子感激微忱謹具摺奏謝伏乞聖鑒謹奏汝子松紋實可謂朽木之質不堪雕琢也雍正十年正月十六日湖南巡撫臣趙𢎞恩謹奏竊照湖南厯年自十月後至三月間隂雨不晴冬令偶有小雪正二月大雪去年三冬共有大雪三次每次雪後即晴明數日黃童白叟爭云自皇上恩加南民時頒聖訓諄諄告誡百姓皆知改過遷善是以感動天和應時落雪雪後即晴小民易於貿易營生喜逾尋常同聲異口至於今嵗豐收雖難預料臣惟謹遵聖訓實心實政念切民瘼時加修省以召天和所有去冬雨雪應時百姓感戴聖慈情形理合奏聞謹奏湖南得雪情形以手加額覽焉雍正十年閏五月初七日湖南巡撫臣趙𢎞恩謹奏為據實奏聞事本年四月十二日準户部咨據辰永道王柔條奏請令腹內農民分發苗地墾荒五金礦厰準令採取樹木分别畜伐田地按則徵糧等款經大學士鄂爾泰等議覆王柔所稱按則徵糧苗土心願樂從但滇黔從無按畝輸糧之例今湖南苗疆事屬創始應交與邁柱趙𢎞恩秉公商酌查明本地實在情形悉心妥議具奏奉旨依議欽此等因到臣臣查永順苗土諸人昔受土司殘虐自相仇殺荷蒙天恩俯準歸流兩載以來內外寧靜凡屬臣工自當因其利以利之庶可消其貪惡狡詐之故習啓其尊君親上之天良臣前冬親往六里時見永保一帶苗人鳩形鵠面鶉衣赤體者不可數計蓋因殘虐仇殺以來元氣未蘇不能盡力隴畝並非不諳耕種而必藉腹內農民指授也故臣屢飭勸墾又據臬司胡瀛條陳批令清查請給公項資助牛種行之既久自無曠土其添設之官兵原係內地食粟人口王柔所稱價昂民纍兵苦苗蠢之慮甚屬不經腹內農民自有恆産現在腹內荒地人力尚不能盡良善之民又焉肯離鄉冒險出資買墾其趨利而入者勢必強悍無賴之輩侵占爭鬬唆苗為非為患滋大王柔所請招民開墾之處合之本地實在情形於漢於苗均無裨益而有後患又五金礦厰久經封禁且苗礦雜産硫磺恐滋爭鬬王柔所請採取之處合之本地實在情形不獨無益而有後患又山林樹木砍伐出售原未禁止商運過關亦俱抽稅王柔所請伐木輸稅之處不獨含混亦屬贅詞又田地按畝徵糧查昔年苗土不得與內地人民同享安寧之福今幸歸流受撫自不忍按畝升科故前蒙聖主浩蕩天恩特免勘丈令照原額均攤苗土感激莫可名言夫按畝科糧較之原額多寡有霄壤之分人情喜愠亦瞭如指掌尚云心願樂從斷無是理王柔所請按畝徵糧之處既違諭旨復擾苗邊凡此數處皆臣身經目覩實在情形除密行兩司轉飭查議並飭不得泄漏致苗土疑畏以啓邉釁臣復咨商督臣邁柱另行會題外理合據實奏聞謹奏所奏是王柔雖識見淺狹秉性粗直然肯勇往效力操守頗廉猶係難得之員當加寬容惜其所長勉其不逮而用之毋事吹毛求疵從來上司屬員辦事不克和衷於地方無益也雍正十年六月二十七日湖南巡撫臣趙𢎞恩謹奏一湖南南嶽為我皇上主夀之山康熙四十三年內蒙聖祖仁皇帝遣官致祭隨經前任撫臣趙申喬題明北南各官捐俸修建殿宇碑亭並御書樓藏經閣數處厯今年久多有朽壞滲漏應需修理前據該縣詳報臣隨批行布政司委令衡永彬道許登瀛親勘估計造册前來查捐輸俸工久奉禁止其估計工料需銀八千四百餘兩據北南二省藩司會詳於北南公項銀內各半動支給發興修恭祝皇上無疆之夀等因到臣除會同湖廣督臣邁柱湖北撫臣王士俊咨明户工二部外理合奏一湖南早稻收成分數長沙府屬十分者十之一九分者十之五八分者十之二七分者十之二衡州府屬十分者十之二九分者十之三八分者十之五永州府屬十分者十之四八分者十之六寶慶府屬十分者十之二九分者十之四八分者十之四嶽州府屬九分者十之三八分者十之四七分者十之三常德府屬俱有八分辰州府屬十分者十之四八分者十之六永順府屬八分者十之五七分者十之五澧州屬俱有八分郴州屬十分者十之二九分者十之三八分者十之五靖州屬十分者十之二九分者十之四八分者十之四各府州屬上米每石價銀六錢起至七錢不等中米每石價銀五錢五六分起至六錢五六分不等一切麥豆雜糧價值俱各平減鹽每包價銀一錢五六七八分不等自四月至六月各府州屬雨水霑奏覽奏俱悉雍正十年八月初三日湖南巡撫臣趙𢎞恩謹奏一臣於七月十三日據永順府龍山縣知縣袁振緒稟稱訪得四川酉陽司官拏獲姚世臣等五人搜出偽劄及偽印供稱遍厯各省交結匪徒等語聞一七月二十九日永綏同知李珣詳稱六里連嵗收成苗民感激天恩歡欣樂業該同知會同副將張寉照依內地州縣定制分為四鄉八里按里清編煙户設立甲長共計二萬七千六百五十二名口數月以來苗民知有法度亦相遵守等語并造册到臣臣當加奬諭並密囑新任同知永泰不可因有小效少加疏忽仍不時謹慎防範外臣亦留心稽察當無厪聖懷也謹奏覽雍正十年九月初七日湖南巡撫臣趙𢎞恩謹奏一今嵗湖南文闈自八月初六日起至十七日天氣晴明臣率同提調道李正茂監試道孫元細心聖慈士子欣悅感頌一新例內外簾官不用本省現任州縣於鄰省調取進士舉人及奉發本省試用學習之員法至善也但彼等俱係未經出仕之員隨從並無書役查內簾不過看文呈薦無須書役至外簾五所皆有登號起批解卷巡緝之事必需書役使用臣於今科入闈之日即調取附近府縣書役二十人分派五所聽用應請聖恩飭諭各省嗣後預為調撥書吏十人衙役十人先一條例內五經卷有另編字號之例各省或有將坐號編入一號者臣思五經一途原取實學之士若五經編坐一號止須五人各治一經合來改頭換面五人皆成五經矣臣今科將五經坐號分散各處以杜湊換之弊交卷後始另編字號以便中選應請一臣前奏修葺南嶽廟宇荷蒙上諭訓誨臣歡欣捧誦不獨茅塞頓開實覺理明心暢仰見聖慈時時以億萬臣民為念當即大張告示遍諭楚民而省中百姓交云皇上因南嶽之神佑民豐嵗即一湖南晚稻之後百姓從不冬耕去嵗經臣通飭補種雜糧并委糧道李正茂親行勸諭亦有補種者春間收穫人情踴躍今嵗八月間臣與李正茂復行捐種一百二十石分賞農民現在爭相耕種數年之間交相效法南民益享充足之利矣謹奏覽同日又奏為奏聞事竊查嶽州府平江縣僧人被殺一事身有五傷該縣李鳳生驗報自殺該府崔珨審以疑竇多端請員另審臬司胡瀛詳改委員審係鬬毆觀風整俗使李徽云係自殺仍應並參知府經臬司審以身有五傷難云自殺知府並未成招定擬難以並劾因此李徽向胡瀛有操戈之勢臣嚴飭胡瀛和衷忍氣隨臣入闈之後李徽於十六日咨查胡烈賭博李升命案二事二十五日親到闈中力責胡瀛二十八日具本題參移送揭帖到臣臣見所劾不確於出闈之日已經分晰具題在案無庸瀆陳外臣知李徽素性迂腐事不諳練此人所共知者也況此等瑣碎之事臣沗封疆重任止宜化解消釋何敢因其劾臣遂懷私心瑣瀆聖聽以傷大體實因李徽既已具題理合將前後情節一併據實奏聞謹奏此互參情節於未經汝奏之先早有旨矣雍正十年十月初十日湖南巡撫臣趙𢎞恩謹奏一乾州所屬之甕流溪等九寨并新撫夯坨上下二寨苗民歸化每年願納雜糧四石二斗八升已經會題在案臣查六里苗民雜糧業蒙聖恩念其向化之誠免徵三年今甕流等苗理合奏懇聖主一視同仁伏候一奉命湖南試用人員俱已陸續委署現今修舵桿洲石臺南嶽廟宇新設郡邑城垣衙署及勸民接種雜糧晚稻需員協辦仰懇聖恩簡命雜職二十員來南隨時差委遇缺署試謹奏該部知道雍正十年十二月初四日湖南巡撫臣趙𢎞恩謹奏一今嵗湖南各屬俱係收成米價甚平人民樂業因江蘇商販米穀過多以致長沙米價驟長至九錢一兩不等經臣出示并咨商督臣北撫臣暫停江蘇販運之役米價仍復漸減并咨江蘇撫臣如一六里自勸種之後苗人踴躍從事文武諸員時時宣布皇仁苗人頗有感激情形昨因貴州臺鞏凶苗不法臣一貴州九股苗人不法已經攻𠞰數寨所調楚兵準文撤回在案兹於十二月初一日復準常德提臣張正興以奉旨令貴州提臣哈元生回黔恐哈元生經由常德即需帶兵前往已預派湖南兵丁二千名伺候等語密移到臣臣查所派即係前撥赴黔官兵前已借銀一前因苗土多荒飭令各屬勸苗開墾并動公項三月間親詣各洞發給籽粒所種數處均有五六分收成臣復令該知縣再為親行查勸播傳聖恩該知縣於十月間親厯一十六洞賞給花紅各苗鼓舞踴躍開墾因於其地見産靈芝一本即以此芝廣行開導宣布皇仁苗情更覺歡暢逈異尋常理合奏聞靈芝一本敬呈御覽一交冬以來雨雪應時於十二月初一初二等日奏逐條批諭矣硃批諭旨卷二百十六之二欽定四庫全書硃批諭旨卷二百十六之三硃批趙𢎞恩奏摺雍正十一年正月十八日湖廣總督臣邁柱湖南巡撫臣趙𢎞恩謹奏為請旨事竊查常德府知府王葉滋現經臣等題補辰永靖道其所遺常德府知府員缺不在題補之列但常郡為楚省南北咽喉滇黔要路商民繁庶政務紛紜非強幹勤練之員未足勝任查有永順府同知張廷慶才猷敏練措置咸宜若補授常德府知府洵為人地相稱其永順同知員缺有寶慶府通判朱汝珩明白勤慎厯任五載熟悉苗情以之補授永順同知亦能勝任其寶慶府通判員缺應歸部選臣等因地方需才起見理合具摺會奏請旨謹奏該部議奏雍正十一年二月初十日湖南巡撫臣趙𢎞恩謹奏一臣前因楚米販運過多米價驟長恐江蘇聞風愈加髙擡時價隨一面出示并咨商督臣北撫臣暫停商販以平市價一面移咨江蘇撫臣將楚省倉儲售運以濟江蘇民食嗣因楚價稍平臣即令將百石以內者仍許販運并經督臣通飭停收捐監穀石乃又欽蒙特敕川省速弛米禁楚食更可通融臣又遍飭無論江蘇湖北商販千百石內外槩聽販運在案至臣前奏將倉儲售運江蘇係為江省平糶之用吳楚百姓皆屬聖主之赤子各省倉糧皆屬國家之蓄積臣惟恪遵一黔省九股逆苗不法調集楚粵官兵協𠞰糧餉寧可多備鄰省理應代籌臣自去冬已飭距黔最近之沅州多動倉穀碾米運濟據報準鎮逺府覆稱黔糧尚足供支俟需米起運在案兹準貴州撫臣元展成咨撥倉米一萬石臣隨於近黔之沅陵等縣倉撥穀碾運猶恐稍需時日又將沅州前次碾就之米先行解濟仍即於沅陵等縣碾米數內扣還其沅陵等州縣動碾之穀亦即於常長衡三府倉撥補庶沅州仍有預備而沅陵等倉仍然充實臣仍不時偵探倘再需米自當再行撥運又思黔省當此用兵之際諸費浩繁庫藏或有不敷查現撥湖南協濟黔省雍正十一年兵餉二十餘萬兩部行四月完半今未便仍循往例臣已督令布政使張璨儘數先動銀一十六萬八千餘兩飛調委員尅日解黔俾得通融接濟此黔省糧餉二項一湖南通省雍正十年十月起至本年二月各屬俱得雨雪沾足春耕大有裨益現在上米每石價銀八錢四五分起至九錢一二分不等中米每石七錢七八分起至八錢三四分不等穀每石三錢五六分起至四錢三四分不等理合奏聞謹奏凡此雨雪之調順米穀之豐裕皆緣汝等大吏公忠秉心獲邀上天錫祐之所致勉之莫稍肆志愈加寅畏可也雍正十一年七月初二日湖南巡撫臣趙𢎞恩謹奏一湖南錢糧從前每屆奏期必拖欠五六萬至十餘萬兩不等雍正十年額徵充餉銀九十四萬有零臣飭藩司張璨及有司善為勸納勿事差擾刑比兹當奏銷之期已完銀九十二萬餘兩內有五十六州縣衛全數通完惟湘鄉衡陽平江等十一縣共尾欠銀一萬八千一百四十六兩零伏思湖南百姓荷蒙聖訓頻頒至周極渥數載以來漸有返朴還淳之機看一查湖南長靖等十二府州屬雍正十一年分早稻收成分數內長沙府屬十分者十之一九分者十之九衡州府屬十分者十之三九分者十之三八分者十之四永州府屬八分者十之四七分者十之六寶慶府屬十分者十之六九分者十之四嶽州府屬九分者十之三八分者十之四七分者十之三常德府屬八分者十之二七分者十之八辰州府屬實有八分永順府屬九分者十之五八分者十之五澧州屬實有八分桂陽州屬十分者十之四九分者十之六郴州屬十分者十之二九分者十之四八分者十之四各府州屬上米每石價銀八錢一二分起至九錢不等中米每石價銀七錢一二分起至八錢不等稻穀每石價銀三錢七八分起至四錢三四分不等黃豆每石價銀八錢二三分起至八錢八九分不等菉豆每石價銀八錢四五分起至八錢七八分九錢不等大麥每石價銀四錢七八分起至五錢一二分不等小麥每石價銀八錢一二分起至九錢不等鹽每包價銀一錢六七八九分不等自四月至六月各府州一今嵗湖南各屬雨水均調髙下田地俱獲收成雖值青黃不接之時米價照常惟據巴陵臨湘二縣報稱五月底雨水稍多川水陡漲所屬濵江近湖最低之田間被淹浸又據華容縣報稱近湖伍張兔湖等垸間被衝損旋即搶築并據各該縣咸稱水勢若消落迅速則受淹之禾仍有薄收且可補種晚稻民俱得所等情臣隨飭委幹員前往確勘撫恤去訖是否成災俟勘覆另報又據永順保靖二縣報稱四月二十九等日隂雨連綿溪水湧漲溪邊稻田間被淹衝合計百餘畝因係山水旋漲旋消民間當即修整補插並不成災其永桑新修城垣土性未定水浸間有塌處現在修補等情臣俱飭行確查去訖又查自六月初連日晴明水勢漸消理合一并奏聞謹奏狂則其徵恆雨觀汝所奏頗露自滿之意朕甚憂秋霖或有害稼之虞也雍正十一年七月二十四日湖南巡撫臣趙𢎞恩謹奏一於六月初七日接大學士張廷玉寄字奉上諭據雲南布政使陳宏謀條奏長沙至永州一帶縴路令臣轉飭查勘斟酌修築等因欽此臣查湖南東路由長沙至衡永西路由常德至辰靖多係兩山夾河一水中流挽舟縴路隨水消長水長則登山越嶺水退則沿河傍灘其間又有支河小港水溝缺口為之間隔縴夫行走實屬艱難蓋因夏間水漲傍河縴路瀰漫則水退必須再修冬春水平沿山縴路蒙茸則水長仍須修理今蒙諭旨臣即委員分往兩路會同各地方官逐細查勘將兩岸險峻不平之山路再量鑿寬平其沿途支河小港原通舟楫難以搭橋外將深溝缺口難行者亦酌搭木橋非係通泄民田水口可以填築者即行填築尚在水底者俟冬間水涸一例舉行以安一臣查巴陵臨湘華容三縣本年五月底雨澤稍多川水陡漲低田間被淹損委員確勘撫恤臣前彚摺奏明兹據司府并各委員勘覆被水之處甚少華邑衝損之堤亦在修補俱不成災轉報前來臣與督臣邁柱商酌雖據勘不成災然收成未免歉薄而華容被水之民更有修堤之役隨仰體聖慈分别酌動公項令該府督同各該縣寬裕賞賚加意撫恤三縣百姓俱無失所之慮矣又查長沙湘隂瀏陽益陽等縣山多溪窄之處驟雨消泄不及沿河低窪地方零星漫浸田廬路堤數段旋漲旋消又長沙有淹斃男婦大小三十四名口湘隂龍姓一家二十一口瀏陽男婦一十三口益陽男婦六口皆因住近山腳黑夜起蛟衝淹壓斃雖稱俱屬山鄉常有之事但民瘼攸關臣據報亦即商之督臣委員動項分往將被淹田廬及淹斃人口各户分别從厚賑恤逐一確勘其華容報有雨水續浸之處亦令併賑再勘并通查各屬統候勘覆另報理合一併奏聞謹奏詳確查勘加意撫恤毋忽雍正十一年九月十六日湖南巡撫臣趙𢎞恩謹奏為遵旨明白回奏事恭讀硃批目今醜虜未平正當軍需浩繁之際直省督撫在廷諸臣莫不以節省浮費為適時要務而汝獨云現今經費敷足不知具何確見而為此侈泰之言其明白回奏以匡朕之不逮欽此臣不勝惶恐戰栗之至總緣臣識見短淺管窺眇小但只就湖南一省而言未能通盤籌算一時冒昧輕率遂以敷足之語入奏仰荷皇上指訓以期臣由此漸歸老練謹飭之地捧讀再四赧顔汗背愧感交加惟自咎臣前奏之謬更不覺愈感天恩訓誨生成之切也臣謹據實覆奏伏乞睿鑒謹奏非識見短淺乃公私二字審辨未清耳若視國事如家事何至有此謬論根本處少差則枝葉俱謬但務本莫逐末志之雍正十二年正月十二日署理江南總督印務臣趙𢎞恩謹奏一江蘇一省民情頗多虛浮風俗爭尚奢侈自昔一江蘇安慶江西三省俱報得雪惟最逺之信豐等數縣尚未報到三省米價亦平百姓咸感皇仁歡欣樂業至崇明常熟等縣雍正十年偶被海潮業經賑蠲更蒙聖恩普例加賑百姓咸遂安全上年雖有偏祲然各處俱有收成且已撥穀備糶其安慶之宿州靈壁等四州縣江西之新淦等七縣各報被水亦俱賑恤是三省督撫諸臣俱仰體聖慈已經料理再恐青黃不接之際民食價昂或鄉農種籽間有不足臣又已密札各該屬或動社倉出借或將常平倉糧破例多糶或常平社倉無存又備糶之穀未敷再量為動項買運分糶以平市價偶有鄰民入境給費慰送回籍倘有襟棍藉名強買強借摘拏解懲一切事宜隨地隨時盡心辦理務使百姓普沾樂利仰副聖懷一江省積欠當照案催徵恐新餉復有包侵亦在察防其鹽政以完課疏引恤商便民為要若妄拏貧難小民縱放大夥私販以及商鹽故意逗留長價或船户盜賣捏報淹消種種弊端俱當剔除但督銷又揚州三汊河一帶為漕鹽經由之地臣現在禁革積弊督令挑濬深通理合一併奏明一江寧省城於正月初四初五連日得雪合併陳明謹奏覽同日又奏一安慶一省民情似屬醇厚比之蘇松實有不同一安慶省內鳳陽亳州潁州三府州屬盜案更多必須密察積匪窩線實迹嚴拏懲治以安良善現是在密飭文武員辨妥辦一安慶文武員辨多務虛不實經撫臣徐本懲戒之後頗知警惕而守令以及微員間有受賄徇情之事徵收漕米積弊現今亦有未概除者容臣細加察訪分别參究勸飭以副聖主澄清吏治之至意一準安慶撫臣徐本以安省收漕甚早奉旨改折之文到省已經徵收者多今應作何半本半折等因札商前來臣以雍正十一年漕米改折乃欽蒙聖主愛惜江南民力接濟江南民食之殊恩管理蘇撫臣髙其倬現將未奉上諭之先早完過半之米仍通行起運則安省已徵之米如果乾圓潔淨似應一例兑運或恐將來米價昂貴應否仍須量為截漕若干又在隨地斟酌仰行去訖理合陳明謹奏覽同日又奏一江西一省民多儉朴亦有數處刁悍動輒聚集聞一臣過九江一帶風聞署南昌鎮總兵官陳王章事竟不實心辦理臣初聞未敢深信及抵江寧密加察訪論復相同昨據該鎮陳王章送到該標後營俸滿千總蕭三汲經臣秉公考驗漢仗弓馬俱屬平常查核陳王章所出考語則稱弓馬可觀當經臣飭行不準保送在案是考送員辨瞻徇之處已有確據則彼地文武辨兵之群相嗔怨似非無因除一面再加確訪外事關鎮臣大員理合先行據實奏聞一鄱陽湖大姑山小姑山及廣信等府河道向為盜藪近雖查拏嚴切經臣一路細詢尚未全息臣到任之日即行嚴飭文武員辨實力屣緝加意查拏臣仍不時察訪整飭以副聖主弭盜安民之至意謹奏實力為之務盡根株靖盜固屬要務而察緝匪類尤宜加意何也盜賊有迹可按匪類無形可指盜為生民之害匪為國家之蠱地方大吏因其不關考成每推無證無據遂置不睹不聞且以化小事為無事一句婦寺俗談借為口實一任蔓延醖釀養姦遺患業既醉夢昏昏不省偶遇屬員發擲一二反飭為多事之舉此等邪謬意見當深以為戒志之同日又奏一湖南厯來積欠民賦以及驛站米折等銀共二十三萬有竒臣任內接催除具題豁免銀一千二百二十五兩零外今已催完銀二十二萬六千九百五十三兩零未完銀一千八百八十七兩零又雍正八九兩年僅未完銀三千九百一十九兩零雍正十年亦僅未完銀九千三百九十四兩零理合奏明一署撫臣鍾保到任之時臣將湖南一切地方土俗民情苗疆事宜詳細説知至封疆大吏以保固地方元氣為第一要務瑣碎搜察尤覺擾民亦俱切切詳言臣見鍾保為人正氣和平虛心詢問仰見聖主睿鑒南楚有得人之慶矣謹奏鍾保從前因循瞻顧惟以潔已為務不肯實心任事近復用此二任頗知改悔且經鄂爾泰勗勉開示似覺感發天良然已非上智之品究恐下愚不移毋因偶有所見遂欲確定是非須留心體訪密行探察如有所聞一一據實隨便奏知雍正十二年二月十八日署理江南總督印務臣趙𢎞恩謹奏一準前督臣髙其倬鈔録原奏江寧水師添造腳船軍械一摺奉皇上硃批具疏題請欽此又奏覆提臣南天祥請撥辨兵協防漕涇吳淞停止輪流貼防上海吳淞一團漕涇等汛之案并借支司庫公項二萬湊修軍械一摺奉皇上硃批此論似是具題奏請欽此又前任安慶按察使王紘條奏淮河設塘一摺奉皇上硃批言之督撫欽此一併轉交與臣辦理臣查江寧水師添造腳哨小船及按戰船製給軍械實屬應行之事現在查估工料具題又海疆關係重大全在平時巡防嚴謹若有虛應陋習理應實力屏除請撥請停殊難輕議至江南甲械準留公糧次第修製今經三載似將敷足臣恭繹硃批此論似是四字仰見皇上至聖至明無微不燭容臣親巡海塘及查明各營公糧已扣若干甲械現今已未修製若干另行定議請旨再兵丁腰刀鋼輕者有之其全係白鐵者原少各營因準給司庫耗羡即紛紛冒支臣在湖南俱經駁查即督臣邁柱之見亦與臣合今兩江各營亦復如是臣亦在嚴駁其實需改造者仍應同甲械一例動支營中公糧辦理以免糜費理合一併先為奏明又鳳陽府屬淮河一道上通汝潁下逹淮泗近今商船疏通已先據夀春營詳添哨船遊巡祇因估料耽延臣到任後隨令動支公項添造哨船十二隻塘房三所令沿河旱塘之兵并又於城汛抽撥兵丁湊派輪替撑駕會巡并知會河東督臣矣又安慶江西等省交界之小姑山金剛料沙包頭一帶為盜賊出沒之地向有三不管之名臣亦飛飭分汛添塘設船加謹巡緝俱嚴飭文武實力督率又三省水陸塘汛廢弛而水塘缺少船隻更屬疏忽臣亦在極力整飭設法修理臣將來親巡海塘併往驗視倘房船朽缺定參文職如兵丁曠誤必參將辨斷不敢因循怠忽合併陳明謹奏勉力為之汝能竭盡一分心力朕必有一分恩遇逮汝要在善於審擇自處耳同日又奏為察拏匪類事竊臣屢蒙聖訓不敢稍懈自到江寧隨密札三省文武各於境內留心姦匪邪教臣復不時密訪旋有風聞江西玉山縣地方有姦匪祝皆即祝龍吳自榮即吳寵又名吳宗亮并扁頭王元帥等名目散賣偽劄臣當即差官密札文武密拏去後兹據江西署布政使宋筠等稟稱據府縣將辨等官稟報已於本年正月十四等日陸續拏獲陳星即陳輝林徐易文祝方升李子蘭李孔瑞等供稱扁頭王名周果逹於正月初九日向陳星云劄付係福建封禁山拏來等語又起獲偽劄一張一面寫統兵大元帥一面寫汀州總兵周果逹字樣又在祝方升屋後山泥洞起獲磚刻偽印一顆印文與劄上無異又於陳星家起出鈔寫兵書二卷悉載五方二十八宿旗號陳圖及行兵事宜又拏獲周果逹之弟周和藍現在跟究蹤迹等情據此臣查封禁山介於三省向係姦匪巢穴復専辨星夜密咨閩浙各督撫及通飭文武添撥兵役重懸賞格分布捕緝餘黨務盡根株以靖地方嗣準浙江督臣程元章亦以訪聞浙省江山縣之民人王益善等結交匪類密移到臣臣復通行江西江南暨附近鄰省各督撫提鎮一體協拏去後隨據鈔録浙江江山縣緝牌內稱據王攀雲控府出首伊姪王益善為匪等情又吳士榮之父吳汝昆浙省已經拏獲又江西省城齋堂楊家厰等處有黃森官等亦屬同夥等語除俟拏獲周果逹并各犯一併歸案究擬外臣即日復嚴檄申飭不許借端株連無辜又復密飭三省文武時時察訪各種姦匪邪教在案所有姦匪情形理合先行奏聞再江西相隔窵逺行文查拏往返稍遲合併陳明謹奏此案日前已經有諭實力嚴緝務獲毋俾一名或致疏脫同日又奏一上元縣降調知縣陳齊東縱役栽侵捏首蘆課銀米三萬臣已訪審題參恐各屬俱有此等弊竇現經通查務必破除從前積習又重耗私派各屬亦未全除辦理命盜詞訟殊多率混而驗傷更多不實俱在悉心察懲然欲求洗除積弊及地方民生事事就緒不致始勤終怠先須司道守令得人其舉優參劣俟察訪確實陸續請旨一面不時告誡以期奮勉至於兵丁疲玩更聞有通那頂考之弊現在明白開導設法稽查整頓其各營將辨亦在分調詳加考驗訓飭理合挖其窟穴焚其根種可免生發淮安行有成效臣已通飭所屬一體察辦并知會河東督臣去訖一各屬有捐濟鄰里之士民若俟賑畢給奬不能感動羣情而轉盼青黃不接窮民望濟甚殷捐數不多仍少實濟臣查出各屬報有捐交成數者即皇仁一各屬錢文率多攙雜淮安揚州大小制錢折算一省城育嬰堂有名無實普濟堂並未設立臣欽遵雍正二年諭旨動支臣衙門江西鹽規三千五百兩置建房屋田産又每年薪水食用藥餌衣服督同各官捐資設備即有好善紳士情願代為經理當允所請惟飭不可派擾民間又生事端其江寧暴露棺骸臣亦仰體皇仁捐資料理完畢理合奏明謹奏育嬰普濟固屬應行善舉然亦不過婦女慈仁之類非急務也雍正十二年三月初一日署理江南總督印務臣趙𢎞恩謹奏一玉山縣匪犯一案經具摺奏聞復經節次嚴飭密拏今於二月十七等日據署江西布政使宋筠稟稱二月初一日已獲扁頭王即周果逹初五日拏獲李子蘭初六日夜拏獲要犯黃森官等又據稟稱二月十二日據宜黃縣解到李繼青一犯等語臣查此案同夥多江西人隨拏隨解浙省恐沿途漏泄以致未獲各犯聞風驚遁更恐其中尚有妄扳誤拏遽以轉解未免拖纍臣已節次飛飭文武一面追捕餘黨一面確審現犯務得首從謀夥各確情同偽劄書籍等項多差官辨兵役解赴江寧臣即親加細究確實一面備晰奏聞一面轉解浙省歸案擬結務期匪類不致一名漏網良善不致稍有牽纍以彰諭旨匪類王益善等一案將程元章奏摺鈔寄署督趙𢎞恩速將各犯逐一拏解浙省審擬等因欽此臣又飛行江西立即嚴拏未獲各犯一面將已獲要犯黃森官等多差兵役嚴押到臣轉解浙省勿致疏虞合併奏明一廣信府界連閩浙安徽三省而廣信鉛山二營僅共官兵七百八十餘員名分防一府七縣似覺汛廣兵單府屬各縣何處為封禁山要隘何處為衝衢要地一切酌盈劑虛之處現在檄飭察議抽添察密訪理合先行奏聞知道了雍正十二年三月十五日署理江南總督印務臣趙𢎞恩謹奏一據江蘇屬之江寧蘇州松江常州鎮江淮安揚州徐州八府及太倉海州通州等三州安徽屬之安慶徽州寧國池州太平廬州鳳陽七府及滁州和州廣德六安潁州亳州泗州等七州各所屬州縣俱報雨澤霑足大麥現在青茂小麥現在長發江西一省有新建等十數縣呈報麥苗秀盛其餘各縣未據報到其蘇城現在米價湖廣白秈米每石一兩一錢五分本地糙粳米每石一兩二錢五分各屬有比蘇城增減數分者總較往年輕二三錢一石等語此皆仰荷聖主教養殷切且蒙特沛殊恩將漕糧半本半折江省得以米多價賤日食充裕民氣和樂上協天和所致臣惟有敬遵聖訓愈加小心寅畏嚴誡屬員勿受胥役播弄勿縱捕役誣良實心實政案件速結俾得感召天和豐收有望以副聖慈於萬一也恐厪聖懷理合奏聞謹奏此奏欣恱覽焉果能勉盡感召之道朕可保徵應必如影之隨形響之隨聲也期共勉之同日又奏一臣調考江南江西各營將備千把其才技兼優者固不乏人而浮滑軟弱者十有七八馬步弓箭亦不合式而江西尤甚臣已頻加申飭并將看出各員弓馬不妥之處逐條指出行牌切責令各上緊操習一面訓練兵丁臣仍留心密察倘各員猶敢玩忽從事即嚴行參懲不敢姑容其江西各營多用伴當今聞江南亦間有濫設伴當者亦在查革理合一併奏明一安徽江西水陸塘兵勤惰已委遊擊都司守備共四員臣給盤費分往查看并令密驗塘房船隻曾否修備齊全據實覆報又此時正值開徵錢糧臣亦密委三省各道親往所屬州縣察弊其無守巡道員管轄之州縣則委府州親察至各縣監獄有無濫禁刑具是否遵制塘房船隻是否修理亦令乘其不備逐一點驗彼地有無匪類邪教及衙蠧地棍種種不法之徒更令留心訪拏仍暗查塘汛兵丁勤惰切飭其秉公慎密不得絲毫寃縱更不得多帶人役騷擾生事臣仍不時密察惟下江塘汛臣擬於赴常會勘秋審之後即順便親查并直抵海塘查勘一切情形又聞沿海墩臺從前曾被潮坍者至今多未修建臣亦嚴行申飭作速修竣候驗去訖理合奏明謹奏於汝前摺曾經批諭兩江直隸二省地方自朕踐阼以來總未得人剔除整頓今直隸經李衛振作一番不數月間已大有可觀汝現在兩江若肯如此立定志向盡力督理自當漸有起色朕斷不虛負汝之勞績一切處勇往直前不須瞻顧有朕作主汝何懼乎但慮汝等漢軍習氣每多行不逮言如田文鏡心口相符者甚屬寥寥果能照依到任以來所奏措諸實行不徒托之空言則豈但朕與汝君臣二人之福乃社稷蒼生之大幸也勉之勉之同日又奏一江西玉山縣匪類黃森官周果逹等要犯已經拏獲經臣兩次奏聞尚有要犯傅秀山改名白化龍等未據弋獲現在嚴飭分路搜拏解浙究擬兹欽奉諭旨著左都御史徐本即由安慶前赴浙江會同程元章嚴審定擬具奏欽此徐本於三月初一日道經江寧臣將前後獲犯姓名緣由一一詳細告知但徐本既經起程赴浙若各犯由江寧轉解恐致遲滯今據該臬司呈請就近解浙臣即行知在案再匪類齋堂即羅教大成教久奉諭旨查禁今黃森官等齋堂為匪事發該地方文武官員漫無覺察臣現在嚴查合併陳明一匪類為國家大蠱臣凜遵聖訓時時密飭三省文武設法訪察不敢稍懈近又於江西奉新縣盤獲道人朱一如號長珍頭留長髮隨帶藥包形迹可疑即於藥包內搜出偽造逆書一本等物已將該犯解交南昌府收審兹據署南昌鎮總兵陳王章於該府處鈔録偽書呈送到臣臣不敢隱匿謹將原本原單一併封呈一江西驛鹽道魏錫祚患病情由臣先經奏聞今於三月十一日據該道詳稱脾胃虛弱語言蹇澀勢難辦公請解任醫治等情前來除批藩司照例取結會題外臣查該道管理通省驛鹽事務兼巡瑞袁臨三府地方實屬要缺該省知府中才守兼優可信者奏誠恐道篆委署難以得人伏乞皇上迅賜簡補實有裨益謹奏覽同日又奏為奏聞事竊照雍正元年江西萬載縣有溫上貴謀叛案內餘黨龔永錫等未獲臣到任後即檄行江西按察司移行文武各衙門於棚民州縣重懸賞格選差兵役不時勒緝勿因通緝年久之案漫不經心倘有實心辦事之員留心密獲自當題請議敘以此鼓勵文武屬員在案兹於三月十四日據江西署布政使宋筠等稟稱二月二十五日有駐劄銅鼓營同知談士法盤獲溫坤生訊供據稱有原犯叛案溫上貴之族弟溫廷瑞現在山口地方謀為不軌其劄付印信自新昌天寶鄉沈子榮家發來沈子榮係大將軍軍師係溫老二名淘濵溫庭奉等在山口背後夜聚曉散操演武藝置造器械給坤生千總劄付一張銅印一顆伊不肯受黑夜逃來并已經拏獲溫淘濱溫庭奉溫廷瑞三犯等情到臣除飛檄密拏夥黨并究追印劄器械外臣查銅鼓地方係寧州山僻之區與瑞州府屬之新昌縣袁州府屬之萬載縣俱係接壤之地棚民雜處因溫上貴謀叛之後添設遊擊同知各一員以資彈壓今據稟稱該同知談士法盤獲之犯現在確查俟詳覆至日如果情實臣另疏題請議敘并將失察各員一併查參庶功過分明人人咸知鼓勵警惕矣合併陳明為此謹奏蔓草不除逢時勃發嚴飭搜緝務淨根荄毋使一匪漏網雍正十二年三月二十六日署理江南總督印務臣趙𢎞恩謹奏為據實奏聞事竊臣赴任時聞署江西南昌總兵陳王章聲名平常一面留心確訪一面恭摺陳奏荷蒙皇上硃批臣愈加秉公訪察復密詢署布政使宋筠饒九道劉均糧道高鋭原署南贛鎮江寧副將康華齡等各稟相同謹臚列奏聞一陳王章每次奏摺私派所屬各營幫給盤費每營每次繳銀三兩五兩不等係中軍遊擊史節文發札催繳據建昌營遊擊桃敏口稟相符并稱現有史節文原札存據一陳王章遇鎮營馬步兵丁缺出不即通報亦不拔補空出糧餉扣繳入已兵丁因而生怨該鎮及該中軍衙門經管各書識皆知確數有署布政使宋筠稟帖可據一陳王章平日收受屬員禮物令屬員代買紬縀米麥芝麻磁器等項俱由洪鼎臣經手中軍史節文亦知確數據副將康華齡面稟相符一陳王章濫準義合戲班挂總鎮牌名上年有戲子李景悅等誘賭經署南昌府事同知髙以靜查拏詳報乃陳王章諭令守備王錫圭説情有髙以靜可證一陳王章於地方民事混行干預文職賢否亦復議論每在巡撫前議論某官好一得巡撫之言即背地市恩密為轉告希圖酬謝與瑞州府知府楊廷翼等聨絡一氣作威作福據署布政使宋筠道員髙鋭稟覆相同一陳王章廢弛營伍貪利務外其職分應辦之事轉多玩誤如玉山匪類散賣偽劄既經拏獲更有偽劄偽印盟布確據而江西省城又有羅教大成教齋堂等事俱經拏審在案陳王章既經失察於前又復狡辨於後查匪類為國家之蠱陳王章於此等大事竟毫不經心但以取利為急彌縫為務可謂喪心負恩之至者也臣查陳王章心術巧詐品行不端恣意貪婪毫無顧忌先因廣信營參將張福詳揭勒借餽送等款革職治罪蒙皇上格外寬宥暫令署理鎮務自當痛改前非竭誠報效以贖前愆乃復益肆貪劣實屬下愚不移凡江西赴考營員及文職進見經臣詢及無不吞吐其詞半隱半露則是西省員辨人人畏懼面譽背恨怨聲沸騰誠恐貽誤地方關係匪輕謹據實陳奏伏乞皇上睿鑒施行謹奏參奏甚當有旨諭部矣同日又奏為恭請聖訓事竊臣赴任之時目擊江寧省塢間泊各項差船塞滿河干細查檔案博詢衆論知省塢額設黃快沙宣便民中划等船於雍正六年通查各省站船多設案內議裁三十七隻現尚存船二百四十二隻湖北武昌現今僅存差船五十隻江寧省塢雖屬四通八逹差使較繁但存船竟至五倍湖北為數未免猶多及查省塢近今每年應差一切船隻多則一百二三十隻少僅百隻以內况一差未必即需一年之久則是各項差船半屬空設間泊河干坐糜工食查沙船內現有三十三隻已值小修便民座船共有三十七隻亦屆拆造又有快中船十二隻划船一隻行駛實俱遲笨無益差使似均可即為裁去酌量變價舵水人等令各歸農易業停支工食以上裁船八十三隻目下即可節省修造銀一萬六千三百七十八兩又每年可節省舵水工食一萬一百餘兩以後每遇小修中修大修拆造可省萬兩及二三萬兩不等餘船一百五十九隻照舊存留應差無誤再各船每遇派差等項向有通幫捐貼之事今船既裁減幫貼未敷擬於裁減銀內每年仍酌留二千餘兩撥補以免苦纍臣現在檄行司道詳題但是否有當理合先為具摺陳奏伏乞皇上訓示遵行為此謹奏節省浮費自屬善舉具疏題請可也同日又奏為據實奏聞事竊臣於赴任時道經江西地方因吏治廢弛留心訪察聞得瑞州府知府楊廷翼貪汚殘酷狡詐乖張假公濟私作威作福臣始以各府賢否詢署布政使宋筠稟稱楊廷翼操守心術難以深信臣復密詢饒州知府青阿立袁州知府薄履青各具印稟種種款迹適糧道髙鋭赴淮進見時臣密行詢問據高鋭面稟亦復相符臣問司道因何早不揭參髙鋭回稱各人意見不能畫一容俟事竣回江與司道密商如伊等不揭則本道一人印稟揭報等語臣現在密諭各府再行確訪果否相符有無别項款迹外臣查撫臣謝旻在任四載政勤守潔安靜和平惟誤認巧詐以為能員有纍公明之望實因楊廷翼侫口巧於彌縫朦蔽兼之自恃前任廣東羅定州任內經前督臣孔育珣以貪贓參革又得現任知府人多畏怯逡巡江西一省吏治營伍敗壞廢弛未必不由陳王章楊廷翼二人所誤謹將青阿立薄履青印稟鈔録恭呈御覽容俟各府覆到臣再加詳細確查如果衆口僉同即行嚴參以昭勸懲臣不敢容隱理合先行奏聞謹奏楊廷翼屢負朕恩殊屬可惡具疏嚴參毋少寬假同日又奏一江寧省城水道淤塞火患時作臣已委員并動公項將官溝水塘疏濬深通又勸民間各將私溝逐細修刷使積水暢流總歸外河以免濕蒸成疾其救火器具除各官原設之外亦示勸民間各設水桶不時貯水以冀有備無患又米糧雜貨行販人等動輒收費斂錢傳單齊行高擡市價商民俱纍臣已嚴行示革並拏惡棍枷示又各寺院僧人停歇外客尚屬衣食之計但每每出入酒館攬事過錢殊屬不法臣亦嚴行摘禁又蘇州向為造賣賭具之地臣嚴飭府縣今已拏獲數家現在嚴究并令再加遍查理合一併奏明一江南江西州縣有圖書里書區書册書公正更有里差地差坐差副差虎踞都圖各掌一方包侵錢糧飛灑稅賦且册匿私家父故子頂世代流毒弊難悉數臣訪聞既確隨嚴示徹底革除令將册籍舊票追存官署或交户房兼管或募淳良經理並令不時察查一有弊竇即行革懲其徵收錢糧照舊刋發滚單滚催並令州縣明白開導小民使知踴躍輸將間有襟棍抗欠然後摘拘比追法因人施權自官出至已革書差仍逐名取保如原管錢糧不清底册不全或弄巧阻撓即行嚴拏監比重究理合陳明謹奏好竭力整理務使弊絶風清雍正十二年四月十六日署理江南總督印務臣趙𢎞恩謹奏一上江之潁州亳州夀州宿州及靈璧鳳臺二縣素稱盜藪而為商民之大害者尤在淮河一帶要路蓋緣此河夏秋水發寬至二三十里冬水歸槽兩岸涸出十里內外並無民居又鮮營汛故鳳臺界內之髙望寺胡家集等十數村莊居民率多盜匪其中鄧平孫劉等姓族人尤多不法除已添塘汛并前撫臣徐本飭設保正族長外臣現又極力諄飭文武辨員不時稽查并令將不事生業之輩教以耕織免其遊惰又將盜賊窩家賭博等罪名摘敘講解使其咸知為匪之罪謀生之安以靖地方一鳳陽府屬宿靈虹三州縣及泗州各屬小患疉見固由於溝洫未通隄塍未修更由於河道淤塞臣到任檢查檔案宿州靈璧現議築隄虹縣則請濬謝家溝河道而泗州又以壑鄰詳阻委鳳陽道李如蘭踏查議修安仁等閘又據糧道王恕稟稱開通小河疏睢入黃則四邑永無水患等語所見各異臣查此事既為鳳陽一帶百姓田廬所關亟宜辦理但非勘驗確切未便即為舉行即専就四邑情形定論亦恐未為穩妥正在籌畫擬議之際三月二十六日大學士臣嵇曾筠祭掃祖墓親至江寧臣見嵇曾筠備敘聖恩感激涕零凡講至國計民生之事無不開心見誠剴切商酌臣以宿靈虹泗水患之事籌慮嵇曾筠詳晰講議俟河工事務少暇親身查勘通加相度期於地方民生有益以廣皇仁等語應俟勘明商定另行奏聞以上二件乃係上江緊要之事合併備細奏明謹奏覽奏俱悉凡綜理一切政務無論巨細咸宜敬慎盡力為之不必胸中先存輕重大小之念若祗以此二件謂為緊要之事則其餘政務皆係不緊要極易措辦者乎是固不然即以此二件而論於未經措辦之前視為重大難理則先有所恐懼憂患心已不得其正以不正之心經營國計民生詎能籌畫協當耶志之雍正十二年五月初一日署理江南總督印務臣趙𢎞恩謹奏竊臣欽奉硃批汝等漢軍習氣每多行不逮言如田文鏡心口相符者甚屬寥寥果能照依到任以來所奏措諸實行不徒託之空言則豈但朕與汝君臣二人之福乃社稷蒼生之大幸也欽此臣恭讀未竟感激涕零欽惟皇上民胞物與宵旰焦勞無刻不以社稷蒼生為念普天胥慶率土均沾臣蒙聖恩特拔於趙氏敗類之中命署重任涓埃未報雖冥頑不靈之至亦未有不敬捧硃批而愈加心動神惕者大凡人之才能固有等次而上下欺朦互相詐偽權操姦吏威借惡捕辦事以掩蓋為能稱許以姑息為仁大事化小小事化無花言巧語即是能員以致政治廢弛善良嗟怨是以臣凡遇縱胥縱捕擾民侵帑粉飾含混之案必悅屬官求世俗之虛聲避貪蠧之嫌忌以負皇上諄切訓誨造就成全之至意也理合披瀝下情具摺奏聞恭謝聖訓但臣質本庸愚若非仰蒙聖主頻賜指誨何能稍有進益更乞聖恩時加提撕俾得敬謹遵守以圖報效為此謹奏好勉之又勉可也同日又奏一州縣圖書册書等役藏册舞弊臣嚴飭革除并令追出底册今下江之丹徒縣據各書役交出版圖底册合算缺田十六萬畝逮清查嚴緊始又吐出六萬畝尚隱漏十萬餘畝現在查究下江各屬於雍正十年奉文清造版圖册籍原令遴選賢員悉心妥辦勿致復被胥吏作姦乃各州縣仍令圖册積蠧開造並不親加督察是欲作弊之人清查自已之弊無怪乎飛灑無忌隱漏愈甚丹徒一縣如此各該州縣可知田額之隱漏如此錢糧之侵捏可知臣隨又通行各屬實力革除積蠧作速追出册籍悉心清查積弊以期根源清確賦額無虧便於徵輸理合奏明一武進知縣李育燾居官不職已經糾參該縣民人見委員摘印因李育燾平日殘刻百姓混於縣署之前肆行辱閙經委員嚴飭始散又奉賢知縣盧時炳居心巧詐其重耗苛徵確有實據亦經會參委員摘印乃聞縣民亦有嚷鬧之事又有稱盧時炳平日居官清廉者又聞睢寧縣貼有知縣重耗暴徵之匿名揭帖臣以知縣貪劣自有律法處治其民間辱詈嚷鬧及擅貼匿名揭帖種種惡習斷不可長隨一面嚴行示禁一面飭行司府察拏為首之人務期必獲嚴審重懲其睢寧縣知縣楊曾敏果否重耗暴徵亦在密訪合先一并奏明一太倉州捕役王泰等誣指魏進為盜逼勒銀錢搶抄衣服並縛妻賣女武進縣捕役張成承緝楊興臣盜案並不屣拏實盜乃串詐事主盤費八次誣考良善多人又嘉定縣武生陳藩於雍正十年乘有潮災糾衆抄搶擾害良民均應重治不宜姑息長姦昨據司府州審擬未協臣逐案嚴行批駁另行究擬去訖理合奏明謹奏隨宜革除次第整飭亦不可過於急迫以求速效同日又奏一鳳陽風俗素稱強悍臣屢加勸禁在案嗣聞府屬定逺縣北爐鎮地方有張大劍等夥結擡天尖刀等會逞凶窩娼擾民害俗臣密委鳳陽道李如蘭督拏據報定逺縣拏獲張大劍等十一名夀州拏獲姚天助等二名該道差役拏獲李三癩等并娼妓共三名當飭司府嚴行審報并勒拏逸犯謝昶等務獲并究去訖合先奏一臣分查各路塘汛前經奏聞在案兹據委員查覆夀州一帶塘兵間有離汛之事臣隨飛行鎮營將離汛各兵究治並取該管將辨職名一俟覆到並候互查之道員呈覆至日考對確實分别參斥以懲積玩其餘各路俟查覆另報一準部咨奉旨諭祭大學士仍管江南河道總督事務嵇曾筠之母楊氏臣即欽遵委員動項辦理兹準閣臣嵇曾筠覆稱疉荷殊恩感激涕零隨即望闕叩頭恭謝天恩訖惟是此時已赴淮安辦理河工伏秋大汛踵至現在協同署河臣竭力保固荷蒙聖恩賜祭可否於霜降後回籍之時舉行等語臣查閣臣嵇曾筠協辦河務時將伏秋不敢暫離無非感戴聖恩念切急公隨又飭行委員緩至秋汛事竣舉行祭一今嵗二麥現據江寧府屬之上元江寧江浦三縣各報有九分收成經臣差員察驗無異又上江之懷寧桐城涇縣寧國旌德貴池以及下江之長洲元和吳縣常熟昭文華亭南滙武進丹徒山陽江都太倉崇明通州如臯等州縣亦報有九分八分七分不等統俟各屬報齊另行分晰某府收成幾分各數繕摺具奏大概上江下江今嵗二麥收成俱厚聞江西二麥亦屬茂盛恐厪聖懷理合先為奏聞謹奏若能如此盡心奉職久而不渝嵗嵗必蒙上天垂賜嘉應朕可力保同日又奏一陳王章婪贓納賄各款臣前經奏聞兹於四月二十六日接奉諭旨臣遵即檄委江寧城守副將康華齡密往會同江西署布政使宋筠將陳王章摘印看守解赴江寧侯審并委康華齡暫行署理外伏查各營將備弓馬類多平常甚至塘汛兵丁或無一人在汛或公然聚賭塘汛幾同虛設似此情形廢弛非一日矣必得操守廉潔實心辦事之員方可收指臂之效伏祈皇上迅賜賢員補授並懇皇上嚴切訓誨俾有遵循從此江西營伍整頓可觀實有裨益矣一贑南道管轄三府二十五縣地方遼濶居江西之上遊乃閩粵江楚交錯之區地居衝要臣詢據布政使宋筠稟稱該道王世繩諸事模稜欲做好人不能整理等語但臣查其為人尚屬謹慎可否改用京員理合恭請聖訓其員缺查有湖南永順府知府袁承寵操守謹飭辦事勤敏隨臣六里撫苗頗著勤勞且蒞任永順新闢苗疆已屆五年例得升轉可否仰懇聖恩補授贑南道缺令其實力整頓地方如蒙俞允其永順府員缺查有乾州同知張鍾年逾六十精神頗壯久任苗疆熟悉情形以之補授永順知府亦屬人地相宜是否可行臣未敢擅便統乞皇上睿鑒施行謹奏袁承寵已允邁柱題請補授糧道矣不便改用兹若另簡别員一者不得其人二者汝正在專意興除之際恐未必能應汝手贑南道一缺於三省所轄屬員及向日湖南所知各員或他省知府同知中選擇人地相宜者無論越銜與否擬定一員知府以下員缺一併遞擬作速摺奏以聞候朕酌奪有旨雍正十二年五月二十四日署理江南總督印務臣趙𢎞恩謹奏一臣親厯各府目睹二麥豐收但刈麥之後正需雨澤以便栽插禾苗恰於五月初九等日連得甘霖廣沛四野沾足萬姓歡呼此皆聖主勤求民隱至誠感召之所致也又各屬米價俱平一山東豆貨向由海洋運至江省發賣其已入江省內地之豆原不許復裝海船出口但恐豆船自山東發行即徑自賣與海賊不入江省口岸兩省皆無稽察是仍資冦妨民况米糧出洋現在嚴禁則豆貨自應并查方免挂漏臣已密商河東督臣山東撫臣俟覆到籌辦另一據銅陵宿州江浦山陽寶應通州等州縣及泰州分司各呈報所屬蘆葦叢中間有蝻子萌動當即竭力撲淨等語臣又嚴飭務各再加搜捕勿使遺孽生翅蔓延并飭司道轉行附近各屬一體加意遍察又宿州呈報三鋪地方於四月二十六日襟間有攬事説情之人央求守令顛倒是非積習尚未全除臣已嚴飭府縣等官嗣後務須秉公執法並將慣好攬事説情之最甚者指名詳報究懲理合奏明謹奏好此種惡習亟應革除硃批諭旨卷二百十六之三欽定四庫全書硃批諭旨卷二百十六之四硃批趙𢎞恩奏摺雍正十二年六月初十日江南總督臣趙𢎞恩謹奏為恭謝天恩懇準陛見事六月初九日準吏部咨文奉上諭趙𢎞恩著實授江南江西總督欽此移咨到臣隨恭設香案望闕叩頭謝恩訖竊臣至愚極陋識淺才微四載楚南涓埃未報兩江事務甲於天下以臣之庸暫署或可勉力圖公久任必致拮據覆餗貽誤重任實非淺鮮臣雖庸愚之至尚有自量之識聞命自天惶悚無地捧咨驚惕寤寐難安惟有謹遵諭旨凡事不可預存難易之想但勇往直前秉忠循理辦去罄此心血夙夜靡寧以仰副聖訓於萬一倘至心神竭蹶圖維力絀而實不勝任之時再行據實直陳虔懇聖恩另簡賢員以副重寄斷不敢少存繫戀之心以誤國計民生之重大者也三省要務有必須面請皇上指示以開茅塞以益封疆者仰懇聖恩準臣於十月初間親詣闕廷敬聆聖訓庶犬馬戀主之心得遂仰聖瞻處併請皇上訓示遵行臣趙𢎞恩謹奏覽奏謝可謂詞能逹意矣然不在空言惟務實行為要同日又奏為恭謝天恩事臣蒙御賜翎冠悅心集御選語録寧紬袍褂紫金錠等藥臣恭迎郊外虔設香案望闕謝恩跪領訖欽惟我皇上聖學淵深窮微洞本慈訓剴切破礙開蒙頂禮御冠目睹紅燦珠光之瑞手擎雀尾心生鳶飛魚躍之歡上方降異品之香咀味頓忘暑癘內織極天工之巧衣身永錫安寧誦語録册而識生滅俱無臣愚有欲透三關之想讀悅心集而知虛靈不昧臣愚有頓開百障之思仰欽道妙菩提選前禪而擇要敬思機原本分啓後學以破參臣質庸愚妄希解脫聖恩高厚特賜提持惟有齋心虔誦認性求源期由善因以招慈果謹遵硃批太上所謂忘其身而身存之諭旨矢公矢慎竭此血誠以仰報聖恩於萬一耳為此恭謝天恩謹奏斯事無他不過自究自心之道耳如果篤信研求必有所見一有真見自然默會非倚仗語言文字而可明者亦非向人取討指證而強以為是者誠能造詣不疑境界自有一番真實解悟處汝信及此一事肯盡力體認乃極妙之舉百無所妨試勉力參究看同日又奏一江寧於六月初四初五日連得大雨四野霑足甚副民望惟省城一時積水深至三尺有餘城墻些須坍缺民間土墻房屋亦坍數十餘戶幸各處溝渠臣於二月間行令修浚深通雨略停歇立即消泄無遺所坍城垣應即修補房屋各戶亦已賞恤臣虔誠祈晴仰仗聖恩自初六起已連獲晴明臣復細查各鄉高田禾苗得雨倍茂低田久插之禾為雨瀰漫旋即消落惟最低田內初插之禾間被泥水漫壓恐難復長詢之農民僉云此地原有紅稻歷係六月十五前後一江省前有數縣呈報蘆葦叢中蝗蝻萌動旋即撲淨等情今據揚州府知府蔣嘉年等報稱各處蝗蝻俱已捕淨且五月十四五日連得風雨二十一二等日風雨間作衝無遺類督令人夫尋至蘆葦深處蝻子皆抱草自僵等語臣仍通飭不時搜一安徽省屬貢監生員盛朝等呈請分闈臣查事屬難行惟照順天鄉試之例上下兩江酌量分額取中似為妥便已與撫臣王紘面商經王紘備晰一臣奏摺厯係實封夾板進呈仰懇皇上賞賜摺匣六箇並西洋鎖鑰以便輪用封奏更為慎密理合奏請睿鑒謹奏摺匣應早行奏請何乃遲至於今同日又奏為江南港渠亟宜普修以全水利以廣皇仁事竊照江南水利屢蒙聖諭普加修浚仰見聖主軫念民依有加無已臣查淮揚諸河及通州閘壩現經興修完備蘇松常鎮之婁江吳淞江白茆徐六涇劉河七浦河等處并各閘亦俱蒙皇上命發帑金興修完竣商農樂利萬世蒙庥惟民田以內一切支港小渠萬派千尋皆承流於大河通聯於潮水旱則引潮以灌田苗潦則歸河以消積水關係並重其利亦溥祇因港渠既多地更深僻工程碎雜費用零星故厯聽民間自為修濬難以一一動帑興修無如小民勤惰不一年久竟同道旁築舍潮沙積漸淤塞日甚臣經臨蘇松常鎮一帶留心察勘在在皆然必須即為逐細疏濬一律深通庶港渠湖河內外暢逹旱潦兼資同收巨效博採輿情無不樂於興舉查江省歷來私派貼費陋規每縣盈千纍萬今臣清釐酌革民力已得寬舒所有此等土壩土洞似應即從今冬為始勸民循照舊例按田派土業戶給食佃戶出力逐一興修明白開導勸督之下百姓諒必踴躍趨事至此項工程查有部員程夢瑛謹慎勤勞實心辦事可以總理相度臣亦加意察督其分任更需多員方能細為查勘逐加勸諭現在州縣各有刑名錢穀諸務各府同知通判州縣佐雜并試用等官亦各有本任事件及别項緊要工程差委難以分身且恐濫差書役需索擾纍再四思維惟有倣照河工及前署督臣尹繼善辦理海塘將情願效力之人題請赴工之例有生長沿河及曾任沿河因公罣誤之員或向隨工員在河料理熟習河務及熟習風土之人具呈情願效力者考驗確實題請差委如能勤慎任事工竣題明酌量録用倘有怠玩即行參處又蘇松沿河塘路坍塌行旅艱難民田亦少保障或勸民力并修或動公項支應亦須漸次經理臣已備行藩司查案妥議俟覆到另為具題但臣識見短淺未知當否理合先行奏請聖訓遵行為此謹奏覽奏已悉具題到日有旨雍正十二年六月二十五日江南總督臣趙𢎞恩謹奏一江西積欠錢糧雖非江南數十萬可比然多者每至二三萬少者亦至數千上下其積欠難清之弊祗因平日推收不清戶名不確凡糧戶已經完納者並不逐日按戶挂銷甚至實徴册止列每都每圖總數一條並無花户完欠細數流弊年久業戶疊更無從根究交代之時因循接受臣訪聞此一江西清查積欠案內有已經查出之包侵銀兩先經撫臣謝旻題請再限一年完交如限內不完即照包攬侵盜錢糧例治罪未完銀兩著落失察各官分賠臣查包侵銀兩自展限以來完者甚少留心訪察類多年老貧窮無力完交從前府縣各官漫無覺察難以寬縱臣已經嚴飭布政使將失察各官造册請參一積欠錢糧率多零星小戶僅止數分數釐者前經廷議準行每銀一釐聽從民便準收制錢一文此誠便民省費良法乃姦胥以完錢既無從壓戥重收而銀匠更無從傾銷勒索遂造謠言以錢價零星尾欠小民亦必踴躍完納矣一江西山僻州縣類多棚民耕山種地日漸開墾升科且棚民之糧較土民完納尤先安居樂業讀書愈衆凡入籍二十年以上者雍正九年荷蒙皇恩準其額外考試入學在案臣訪聞土著佻逹豪強之輩多以異籍之民遇事欺陵臣思棚民入籍既久又復急公完糧即屬良民豈容若輩欺陵臣推廣皇恩一視同仁現在密諭藩臬二司轉諭各府州縣加意撫綏化導務期彼此相安共享升平之福為此謹奏覽雍正十二年七月初六日江南總督臣趙𢎞恩謹奏一江寧六月初四五及初九等日雨水過多臣即查勘賞恤并太平寧國常州鎮江等府呈報雨水大概情形一例查辦緣由俱經繕摺具奏今臣細查上江寧國等府州屬之南陵太平臨淮和州涇縣六安全椒及下江鎮江等府屬之丹徒丹陽六合江浦金壇句容江陰昭文通州溧水等十餘州縣受水稍重俱有被雨浸坍房垣之家通州泰州兩分司所屬各場草房鐅舍亦有衝塌臣又飛飭分委幹員擕帶公項飛往會同地方官細查窮民窮竈分别賞助修整俾各安居樂業間有浸塌城垣營汛墩房亦在督修並此外上江繁昌蕪湖當塗桐城無為鳳陽等州縣衛下江之儀徵武進無錫元和吳縣太倉等州縣衛各被淹低窪田地俱在嚴催委員上緊會勘撫恤一面將已涸出田地俱令補種紅稻晚稻仍有秋收本年二麥已獲豐收民食原屬充裕恐間有食指浩繁因而籽種缺乏者俱勸業戶幫給或動公項賞助務期鄉農亦得安業并將是否成災之處星飛覆報江西之浮梁彭澤上猶三縣呈報山水亦經飭司查恤此外有無被水之處并令通查去訖有等地棍劣襟刁軍惡佃動輒串捏詭名架砌重情號召鄉愚紛紛告災意在抗賦冒賑減課騙租此等積習兩江尤甚並飭印委各官詳加查察總期秉公據實不得絲毫諱捏庶窮黎咸沾實惠帑項不致虛糜再江寧地方自初十日至今天氣晴明各屬有一準工部咨奉旨嚴拏行賄作弊之學習行走張豐功臣密行各屬指示設法嚴緝已據廣德州州判孔傳橿拏獲臣隨飛飭嚴押赴省即行給咨解部并飭沿途文武小心遞護所有要犯張豐功現經拏獲起解緣由理合奏明一松江府屬民人常有逞凶打降之徒且多蓄藏鐵錘拳心等凶器以致遇事爭鬭命案疊見此風誠難漸長臣已嚴行示禁并令自繳鐵器倘再怙惡不悛即行摘拏嚴懲理合奏明一下江揚州等屬前報蝻子萌動旋即撲捕及蝗蝻因風抱草自僵等情形節經摺奏兹據上江之靈璧虹縣各報上年被水湖地之內産有魚子晴涸日久變化為蝻分路撲捕緣六月二十一日大雨生蝗之地又復積水成湖蝗蝻多浮水面現在涉水撈捉已獲十之六七等語臣恐有捏飾怠忽隨又選差臣標守備四員分往該二縣協查督捕務期刻日捕淨以免貽害田禾理合奏明謹奏觀蝗蝻十獲六七之説仍屬未盡其竭力督飭該有司務俾撲滅無遺倘少涉疏慢致令飛揚為害則責歸汝等大吏也毋忽同日又奏一田房稅契定例由布政司印發契紙契根聽民買用填納乃聞有不肖州縣官役將契根藏匿不令上稅之人親填於收稅之後起解稅根之時任意更換戶名短填銀數仍肆侵隱民間偶有爭訟敕行各省畫一施行一臣查上江之南陵縣地方向有潘茂先崇尚三乘教又名糍粑教其實即係羅教茂先久故近聞伊子潘玉衡又在合肥縣民夏公祥等家往來意在煽惑復教當經合肥縣將夏公祥等拏懲而潘玉衡先已他往臣以事關邪教隨密委安徽道梁需杞於潘玉衡原籍并各處設法屣拏務獲究治有無黨從惑衆之人嚴拏并處如有無知男婦偶墮其術者許令自首改正庶根株可淨地方寧謐理合先為是奏明一欽奉諭旨著臣切諭張勤望洗心滌慮痛改前非等因臣隨調寧國府復任知府張勤望到省宣揚聖諭張勤望跪聽之下稟稱八年京職未有片長初膺郡守徇庇屬員種種不職例應處分荷蒙皇上垂念先臣曲賜矜全惟有凜遵恩旨恪守官針不敢再負聖主殊恩等語臣又切加誡訓爾父爾叔行為萬萬不可效法當即令其回任仍不時申訓密察理合奏明謹奏更宜留心察其向後行為倘怙終不悛弗能奮勉為一良吏據實奏聞至若無心小過猶可原恕者但時加訓飭以成全之雍正十二年七月二十一日江南總督臣趙𢎞恩謹奏一欽奉硃批王紘識見似屬迂執爾意以為何如欽此臣見王紘兩次曾與細論地方之事誠如聞一欽奉硃批聞近日江省雨水過多朕心深為厪念將確實情形備細分晰具奏以聞欽此臣查江寧府六月初一至初三日小雨初四初五大雨兩晝夜方停初九日大雨餘日晴明并各府屬有云初三初四初六初九十一十二二十一二十二等日大雨河滿溝平近河近湖窪下之田多被淹浸俱經節次奏聞在案又查下江山田四分中田三分窪田三分經臣節次查詢俱云窪下之田多半退出山田茂盛之至等語上江山田多半中田窪田共居少半沿河之田農民年年預防多備黑稻以為補種之計目今兩江窪處凡退出田土俱已補種其尚有積水者統俟退清方可定局其民間浸塌房屋俱經差員查勘確實分别賞恤又各屬米價一兩以上至一兩三四錢不等人民安業合并陳明謹奏覽奏知道了雍正十二年八月初六日江南總督臣趙𢎞恩謹奏一據鳳陽道李如蘭稟稱經過懷逺鳳陽臨淮靈璧宿州虹縣今嵗年景土人俱稱十分豐稔往嵗僅收六七斗者今嵗可得一石秫秫粟穀現已成熟稻苗雜糧各皆茂盛又聞潁亳泗等屬亦頗相同間有水淹之處非逼近淮河即地勢窪下原於豐年無礙等語又據差察賑恤同知蘇士俊等稟覆相同僉云上下江各屬高中田地禾稻雜糧現一上江靈璧虹縣蝗蝻萌動臣飛委標下守備四員分往協捕今已據報乘其未曾長成之時俱已撲淨禾苗毫無傷損臣仍飭地方官不時察防外一三省倉庫恐有虧那例應不時盤察其州縣已經報支報解銀米臣又訪有壓批遞那掩蓋之弊隨經嚴行察考昨已查出泰州阜寧二州縣有虧那壓批情事當即會參一面又行藩司移飭該管道府各將所屬錢糧倉穀上緊察盤如有虧缺弊混即行詳參追補如無未清亦限兩月結報臣仍一上江茶引每引例徵紙價銀三釐三毫各屬官役人等額外苛索使費每引合算竟至二三分及錢餘不等經臣訪聞隨即嚴飭通行禁革以蘇商纍以清額餉合并陳明謹奏除弊即是恤商恤商方能裕課此舉好同日又奏一欽奉上諭江蘇等屬多雨其加意撫綏從前動用倉穀作何買補或將漕米截留若干以為備用等因臣查江蘇等處本年雨水稍多低田間被浸損而高中田禾實有豐收之象其被水人戶臣已酌量資助節次奏明又慮新穀未登市價增長并令將倉穀破例多糶在案兹蒙聖諭隨又切飭加意料理不致窮民失所至各屬從前糶賣動用以及現今多糶之穀江南戶口殷繁低田收成又薄自應俟秋成仍於鄰省産穀地方買補但恐一時採買過多有妨鄰省民食鄰省之價一昂則商販自不能流通來江江省亦必因而受纍若得量截漕米以備將來湊糶之用或將被水州縣漕糧酌量折徵則米存於民其倉穀可以相機酌買各省民食均足而蘇松常鎮大修渠港臣已欽遵硃批具題俟部覆一到即便舉行各該屬窮民可以趁工謀食又遇米多價賤家口亦得分潤飽餐但漕糧攸關天庾重計亦未敢遽議多留容臣與漕臣魏廷珍撫臣高其倬等再加察議或截留或折徵酌量確數另行會奏請一臣摺奏兩淮鹽務套壓情形荷蒙諭旨指示周詳臣當與鹽臣高斌和衷協力善為經理其緝私一節在於嚴場竈遏鄰私臣已節次申飭并咨會湖廣河南浙江督撫臣一體察拏嗣訪有竈戶私頂場役梟徒鑽充鹽快暗通煎運并拏獲鹽犯混援貧難捏稱獨子希圖開脫等弊又經咨行極力剔除其常鎮蘇松例行浙鹽地方亦有淮私透擾臣仰遵聖訓大公至正之意并經檄飭堵緝務期各行各地私販盡淨官引暢消於商民均有裨益合再奏明謹奏兩淮鹽務須大費經營汝與高斌竭力整頓殫心籌酌可也同日又奏為恭謝天恩事切臣接兩淮鹽臣高斌札致荷蒙皇上恩賞養廉三千兩欽此當即望闕叩謝訖查江南總督養廉歷任督臣俱皆敷用而臣家口頗少食用亦儉凡有親友不過少為資助其一切賞兵及製辦營中器物粘補衙署差委盤費等事之外約計尚有盈餘現在難以扣定統俟將來另行查清奏聞前據運使尹會一稟請鹽務養廉一事經臣切諭無庸議奏臣思疊荷皇恩報稱彌難現在養廉尚屬浮多何敢濫邀曠典已飭運使存貯運庫俟有公事需用之時再行支取應用永為成例其於國計民生均有裨益為此恭謝天恩謹奏此在汝酌量為之亦不宜儉約過當涉於矯廉雍正十二年九月初九日江南總督臣趙𢎞恩江寧將軍臣吳納哈副都統臣伍納策謹奏為奏明事竊查前督臣高其倬臣吳納哈臣伍納䇿會奏江寧滿洲水師添設船械一事欽蒙皇上硃批具疏題請欽此臣趙𢎞恩到任準前督臣高其倬密交接辦亦經奏明在案今臣等公同細加商酌查原奏請添腳船二十隻現隨修造沙船各本案添造至沙船一切器械內如火箭火斗噴筒綿被平時不需操演久貯恐防黴爛應緩製造其修換應用炮位添製藤牌牌刀挑刀共估工料銀二百四十六兩零飭司即於兩淮屯船陋費銀內動支造辦所有原請添設平頭小哨船六隻係因江中間有港汊沙灘沙船難到吧唬船雖能行走船小頭尖不勝風力起見今沙船現添腳船二十隻送錨坐䉡其港汊沙灘吧船偶爾遇風難行此腳船亦可抽駕應用操習巡防已俱便利則平頭哨船一項可以不必重設現在節省銀一千七百餘兩俟將來吧唬船有輪屆拆造者再行題請照依平頭哨船式樣酌改數隻亦屬可行所有江寧滿洲水師腳船器械現今酌量添設并哨船此時毋庸重設緣由臣等謹再會同據實奏明伏乞聖鑒為此謹奏所議合宜江南總督臣趙𢎞恩謹奏為奏聞事竊照江蘇等屬本年六月初旬雨水過多低田被淹房垣間有坍塌臣仰體聖慈酌量賞助平糶查勘撫綏疊經奏聞在案現今高中田地頗有收成其水退稍遲間有不能補種之窮民可於豐收之家相幫刈割糊口然各屬户口本蕃其中自有老弱疾病不能食力及傭工肩挑無處又無資本貿易之戶若概俟冬初開賑則此時即有忍飢之苦臣於委員勘水之初即經飭令會同印官留心查賑昨又密飭各道員順便親加撫恤但查賑之法務極周密救飢之道寧厚勿薄更宜及時勤加料理又聞淮徐等屬近亦晴雨未均臣敬體皇上浩蕩天恩隨又選差候補文職標下備辨共二十五員臣俱面為細加訓囑令其分往各該州縣衛場遍加查看遇被水之地再為宣布皇仁逐戶撫慰使各勤工謀食其有老弱疾病不能工作及傭工肩挑無處又無本貿易艱於粒食之戶該委員立即會同印官於縣庫不拘何項動支酌賑再加接濟以俟籌議煮賑其縣庫墊用之銀册報之日仍於司庫公項發補並飭有力可支之家不得藉端攪擾劣襟地棍不得冒災生事又示勸富饒之家推重桑梓或借給資本或幫助米糧量力樂從俟查明臣即厚奬數多者具題議敘事關民生重務惟有恪遵聖訓悉心籌畫隨時經理切實撫綏總期黎民均無失所恐厪聖懷理合再為奏聞謹奏此奏是其印委各員勤加訓飭務令實力為之同日又奏為奏聞事竊臣風聞徐州府屬銅山縣胡家口地方有李郭兩家搶奪高糧各統百人執持鎗械互相打降李姓用鳥鎗打死郭姓二人郭姓用長搶戳死李姓一人其餘死而復蘇及身受重傷者亦復不少似此雀角微嫌輒敢糾聚多人私用火器兵械肆橫殺傷戕害人命大屬不法隨於八月十二日飛飭司道府營查究嗣於十八日據銅山縣報係候選州同李縉糾領佃戶打手多人爭割秫秫起釁等語臣又細訪李縉係直隸督臣李衛堂弟而郭姓以及縣民皆稱李縉弟兄素恃顯宦占奪民業屠害鄉里等語衆口如一臣思李衛受主深恩竭誠報效素無瞻徇亦無偏曲斷不敢縱容族人肆行無忌以干國典是以臣又據訪飭行務期秉公執法窮究既不使姦豪逞志欺陵良懦亦不得因係宦弟故為屈抑庶國法昭彰而人心咸服矣臣未敢隱匿瞻顧理合先為奏聞謹奏此事經李衛屢次備細奏聞於朕從前命李綺終養之旨正為此而發也於李衛奏摺中批諭甚悉且曾令伊密寄江省督撫臣閲看今事已到案汝其揆情酌理秉公執法審理具奏雍正十二年九月二十二日江南總督臣趙𢎞恩謹奏為奏明事竊照寶應縣知縣李松泰因承緝不力降一級調用奉旨令臣等將伊居官如何之處出具考語送部引見欽此臣查李松泰才具練逹辦事勤慎不負尹繼善薦舉之意隨經出考會同蘇撫臣高其倬給咨赴部一經聖鑒賢否立定但李松泰係臣堂妹之夫臣既不敢以親謬舉亦不敢因親屈抑理合據實奏聞若仍作臣屬員臣雖恪遵聖訓不敢稍有瞻徇或李松泰借勢肆志及遇事退縮或司道府徇情庇護及故意苛察皆未可定請俟李松泰引見之時如非能員例應調用如可任用州縣伏懇聖恩用於别省庶李松泰得以盡力圖公將來或有造就咸戴聖恩無既矣為此謹奏候引見時酌定雍正十二年九月二十八日江南總督臣趙𢎞恩漕運總督臣魏廷珍蘇州巡撫臣高其倬謹奏為遵旨會議具奏事接大學士鄂爾泰張廷玉寄字內開雍正十二年七月十一日奉上諭昨朕聞得江南常州府屬之無錫金匱等縣鎮江府屬之丹徒丹陽等縣蘇州府屬之崑山吳江等縣俱因六月雨水稍多禾苗有被水淹浸者目今水勢漸退高田尚可補種而低處積潦未消時過小暑已難栽插等語朕欲寄信與趙𢎞恩令其早為籌畫今覽趙𢎞恩奏報江寧及蘇松常鎮揚州等屬多雨情形與朕所聞大概相同已據趙𢎞恩奏稱飛飭地方官細加查勘酌量資助爾等可再傳朕旨令其加意撫恤毋使窮民失所朕又思江南地方既有積水未曾栽種之處恐將來收成歉薄米價漸長民食維艱不可不預為計議聞蘇常各屬從前糶賣動用倉榖尚有未經買補足數者此時應作何買補之法以實倉儲或將明年漕米截留若干以為備用可密寄信與趙𢎞恩令其會同高其倬魏廷珍酌量本地情形悉心妥議具奏請旨欽此密寄到臣臣趙𢎞恩臣魏廷珍臣高其倬會查得江蘇省屬本年二麥頗有收成至六月初旬雨水偶多高中田禾俱可豐收惟低窪田地被水淹浸內有旋淹旋涸之處即經資助補插其積水未消之田秋成未免失望荷蒙聖恩特諭加意撫恤補倉截漕令臣等酌量議奏仰見聖主預籌民食至周極溥之至意臣等細查現今勘有成災區圖之州縣係上元江寧長洲常熟昭文新陽陽湖無錫宜興金壇丹陽溧陽溧水靖江通州句容江陰泰州江浦六合等二十州縣然各該州縣內俱有豐收之區啚並非合邑被水其勘不成災之元和吳江震澤婁縣崑山青浦福泉武進金匱荆溪丹徒太倉鎮洋泰興如臯等十餘州縣高田既獲豐收低田亦有收成民食更覺無礙但江蘇一省戶口本蕃儲備必須寬裕查從前未買足數并動糶各穀石今雖勒令照額買補現存倉穀僅八九十萬石臣等仰體聖慈再四酌議請將雍正乙卯年起運雍正十二年漕糧截留二十萬石內於成災二十州縣各就近截留一萬石或六七千石其不成災之各州縣亦每縣量留三四千石將來市價稍有增長即將此米平糶將價銀解部繼此又有倉貯及續買穀石以為後應是被水地方民食既可常年有餘通省糧價更可不致昂貴咸頌聖主特沛浩蕩天恩實無涯際臣等謹合詞具摺陳奏是否有當伏乞皇上訓示再查成災田地該徵新舊條銀若即行徴輸小民不無拮據似應緩至來年麥熟啓徵其雍正十二年應納漕南等米災田米既乏收民力現難輸將似應併懇聖主格外施恩緩至明秋折納其不能工作貿易無錢糴食之窮民已動公項酌賞不致失所但寒冬初春須得量動倉穀接賑此數事亦成災二十州縣內現今實在情形臣等敬體聖慈理合一併據實陳奏統乞聖鑒特敇遵行謹奏另有諭旨從內閣頒發江南總督臣趙𢎞恩謹奏一城垣關係緊要稍有坍塌即須修補其藉端冒銷積習更須嚴加清釐臣到任之初查得省城城垣向有坍缺昨值六月初旬大雨浸淋又有零星續坍之處隨經飭委府縣及在城同知通判公同丈估兹據覆稱江寧省城城垣周圍五十七里三分計一萬三百一十四丈內新舊坍塌每處數尺及丈餘十數丈不等合計實共坍塌墻垣三百八十一丈零并門圈一箇將舊磚逐細全行清出抵用則物料大可撙節臣現飭動公項上緊興修另行據實報銷仍令同知通判監督又委標員日逐往還巡視以杜匠役侵料偷安等弊則工費亦可奏明正臣現在嚴行查參并明立章程掃除積習其各屬盜案或隱匿不報或借盜銷案或任意縱延不緝不審臣亦在加意查催參懲其辨兵有諱縱最甚者提拏捆打以懲積玩至於小竊案件官辨兵捕視為無關參罰更多悠延臣檢查檔案江寧一府所屬自雍正六年至今通詳批緝未經報獲贓賊者即有三百七十餘件一府如此各府可知小竊不懲必致流而為盜臣亦嚴行通飭作速徹底清查嚴行緝審去訖理合奏明一私鑄錢文剪燬制錢等項姦徒臣不時嚴督察拏昨風聞安徽省屬繁昌縣深山之中有種姦徒濳匿私鑄臣隨飛飭文武密往確查尚未覆到又據江西按察司稟稱於南昌省城拏獲剪燬制錢之徐旭生等已飭縣審等語臣亦飛飭嚴究夥黨擬報并再通飭上緊察拏去訖理合先為一蘇松淮揚等處拐犯甚多迷拐幼孩肆行販賣甚至割其肢體戕其性命臣到任以來疊飭文武察拏并懸賞屣緝已經拏究數案兹又據川沙營參將暨南滙縣呈報盤獲拐犯王大等并被拐割筯子女及船隻等項訊據直供食肉食腦殘忍之惡殊堪痛恨臣隨嚴行究追夥黨併拏擬報其兵役人等臣已給賞以示鼓勵并又通行各屬留心查捕務淨根株理合奏明謹奏凶殘同類其惡甚於豺狼當嚴督緝捕務淨根株毋留餘孽遺害人世雍正十二年十月初六日江南總督臣趙𢎞恩謹奏為奏聞事竊照江蘇安徽二省雍正十二年秋禾收成分數催據各該司詳報前來查江蘇省江寧府屬收成十分者十之二九分者十之二八分者十之二七分者十之二六分者十之一五分者十之一蘇州府屬十分者十之三九分者十之一八分者十之二七分者十之二六分者十之一五分者十之一松江府屬十分者十之三九分者十之五八分者十之一七分者十之一常州府屬十分者十之一九分者十之二八分者十之四七分者十之一六分者十之一五分者十之一鎮江府屬十分者十之一九分者十之三八分者十之二七分者十之二六分者十之二淮安府屬十分者十之四九分者十之三八分者十之二七分者十之一揚州府屬九分者十之三八分者十之五七分者十之二徐州府屬十分者十之一九分者十之二八分者十之三七分者十之二六分者十之一五分者十之一太倉州屬九分者十之一八分者十之三七分者十之五六分者十之一海州屬九分者十之二八分者十之四七分者十之二六分者十之二通州屬九分者十之一八分者十之二七分者十之二六分者十之三五分者十之二安徽省安慶府屬收成九分者十之三八分者十之五七分者十之一六分者十之一徽州府屬十分者十之六九分者十之二八分者十之一六分者十之一寧國府屬九分者十之一八分者十之二七分者十之三六分者十之四池州府屬十分者十之一九分者十之二八分者十之三七分者十之三六分者十之一太平府屬九分者十之四八分者十之三七分者十之二六分者十之一廬州府屬十分者十之四九分者十之二八分者十之三七分者十之一鳳陽府屬十分者十之一九分者十之二八分者十之三七分者十之二六分者十之二滁州屬十分者十之一九分者十之三八分者十之三七分者十之三和州屬九分者十之二八分者十之三七分者十之三六分者十之二廣德州屬十分者十之二八分者十之五七分者十之二五分者十之一六安州屬十分者十之一九分者十之一八分者十之二七分者十之三六分者十之二五分者十之一泗州屬十分者十之一九分者十之三八分者十之四七分者十之二潁州屬十分者十之二九分者十之二八分者十之三七分者十之二六分者十之一亳州屬收成實有十分至本年二省各有十餘縣內被水田地未曾計入分數又江蘇等屬民間食米現今每石價銀九錢至一兩二三錢不等安徽等屬米價每石七八錢至一兩一二錢不等禾稻收成糧價平減百姓俱各安業合併陳明為此謹奏今嵗兩江地方除被水數縣外秋成豐盈如是天恩可謂渥矣其未能普被均沾者究係吏治不純之故當盡力開導屬員俾化誨兵民各修職業果能文武和衷竭誠奉公行伍整齊閭閻安阜而上蒼不賜嘉應無是理也然總在汝一人正己率屬庶幾上行下效於此若纎毫疑而未信視為渺茫則屬庸愚無識之人矣勉之同日又奏為奏聞事接大學士鄂爾泰張廷玉寄字內開雍正十二年九月十六日奉上諭前據趙𢎞恩參奏屬員摺內曾稱江南吏治廢弛現在留心整理等語至其省屬內所有才守兼優之員尚未見伊奏所以昨出揚州江寧知府二缺朕恐伊正在整理試看之際京中又現不得人是以令王士俊於河東兩省內揀選具奏或趙𢎞恩未必領會朕意爾等可傳旨密諭知之至伊三省屬員內所有確知可以升用之員著伊隨時摺奏欽此密寄到臣臣敬謹捧讀惶悚涕零仰見聖主憐恤下情無微不燭至於如此周細之至臣雖愚劣之極亦未有不觸目動心感奮激切者益惟罄此心血毫無瞻顧時凛於天地神明之前以仰副皇上鼓舞訓誨之至意者也臣自抵任以來見江省吏治廢弛上下欺朦於中摘其尤者嚴行參處立即通行三省俾得共知戒懼時而扎諭時而面訓婉轉剴切竭盡心思已歷八月之久而尚有邳州知州呂大雅私收麯稅三千餘兩丹陽縣知縣寧承謨任意婪贓亦至三千之多經臣訪實題參在案江南官民率多虛巧詐偽習氣已久原難驟為改易其中固有才守兼優之員臣既鮮洞悉之明又何敢遽為深信保薦臣惟不時留心聽言觀行不敢稍有疏忽俟有實心辦事公忠報效可以深信之員自當謹遵諭旨隨時摺奏不負賢員并勉諸屬共相奮興於光天化日之下也臣謹據實奏聞所奏是舉直錯枉進賢退不肖正乃汝職恐不解朕意因有前諭耳同日又奏一兩淮鹽政壓綱之弊臣與鹽臣高斌現在協力漸次清理所有緝私一事臣刻刻訪察刻刻申飭半載以來各屬報獲私販三百八十餘案臣又訪得興化鹽城阜寧泰州一帶地方有艒艋等船假作乞丐或運糧食蔬菜或帶銀錢布匹等貨至各場竈換買私鹽運至下河即有姦頑船頭串誘各船索費領幫或十餘隻或二三十隻不等俱至淮安寶應高郵等處賣與地棍搬運過洪澤湖西山各集由僧道橋至青山頭下江發賣或由僧道橋赴天長泗州衛各集販賣又邵伯鎮露筋廟等處亦有頭家收買艒艋船私鹽過河大害鹺政臣隨飛行道府協營多撥辨兵快役在於總滙要隘處所晝夜巡察盤詰遇有艒船假充乞丐赴場收買奏明一李縉與郭姓鬭傷人命一事因聞李縉係直督臣李衛之堂弟臣以李衛必無縱族虐民之事隨飭府縣秉公究審不得瞻顧枉斷亦不得因係宦弟故為屈抑已經奏聞在案今準直督臣李衛以李縉之爭鬭又由於伊親兄李綰之授計主使必須併究業經摺奏欽遵諭旨鈔録差送到臣臣隨又密飭府縣等官一體留心秉公查拏究擬去訖合再奏明謹奏李縉一事前經批諭第當秉公執法審擬可也雍正十二年十月十二日江南總督臣趙𢎞恩謹奏一據崇明總兵官李燦報稱崇明縣地方多種木棉本年棉花收成較往年頗豐其米價亦極平減等語又據鳯陽府知府吳同仁稟稱鳳屬高中田地收成頗好米榖價平九月內民間望雨耕地種麥恰於二十一二等日各州縣俱各得雨民情甚屬歡欣等語臣又聞三省各府州縣現今米穀價值俱平晴雨及時百姓安業其六月被水區啚現亦撫綏得所恐厪一雍正九年五月前督臣高其倬任內接準福建督臣劉世明鈔録摺奏水師戰船舵工可否援照外委千把總之例亦準給隨糧一分等因奉皇上硃批此奏好與沿海各省督臣會商行之欽此密移轉行查議未覆臣到任檢查檔案隨嚴行查催去後嗣據蘇州布政使白鍾山查明江省有京口崇明狼山川沙吳淞泰州掘港黃浦八鎮營額設戰船俱係出洋巡哨向例舵工僅食戰糧一分但此出洋之舵工實為緊要出力之人與衆不同似應仰體皇仁各給隨糧一分以示鼓勵等情詳覆到臣又即咨商署福建督臣阿爾賽以所議與福建現行之例相同咨覆前來臣現在咨明戶部兵部并移行京一鳳陽府屬人民遊惰成性不勤耕織每於交冬之際多有攜帶婦女離鄉背井出外趕唱謀食不特荒蕪田畝更且穢汚身名大關風化臣隨嚴行出示勸禁并令道府州縣留心察禁務使此等遊民以及婦女痛改積習循分守業各安故土耕耘紡織毋得任聽拋家賤行漫無覺察致干參究理合奏明謹奏遊惰之風理應禁止但相沿匪伊朝夕其間有應曲體民情處酌量為之不宜遽施峻法朕意必先加以勸誡俾各知其所行之非改業謀生有術然後繼以禁約方為妥協若一旦即行嚴遏屬員或更奉行不善愚民必致失所且恐罹法者多矣此不可不慮及者雍正十二年十一月初七日江南總督臣趙𢎞恩謹奏一江省營務廢弛各營戰船馬匹最關緊要臣於五月間經臨蘇常等營親加察驗并飭整理今已半載而上江江西臣更未及親驗雖差武職往查恐多牽制瞻徇臣今又密委三省附近各鎮標協營之各知府知州親赴各該處將各項船隻逐一查驗額數是否相符船身是否堅固風篷桅索槓具什物是否齊全捕舵人等是否在船勤加苫蓋澆洗如法有無損壞缺少以及怠惰不整之處據實造册如有赴厰興修者務查明係何月日興修應於何日完竣工料是否堅實其巡哨者亦查明係何日出巡應何日回營二併造册齎報并令將各額設馬匹逐一查看是否餧養臕壯足數有無疲缺開具花名毛齒清册如有侵缺即行嚴參究追臣仍一面留心察訪倘府州稍有徇隱臣即另委道員覆查一有實據即將府州一併參賠至各營將辨臣俱巳詳細考驗大半弓馬生疏逐一面技藝生疏弓力不過三四箇力經臣時加親驗或賞或責鼓勵羞辱之下漸知奮興技藝較前亦覺熟練弓力已加至五箇力六箇力矣再各營一切併奏明一江省各屬收糧積弊多端臣平時檄飭面訓務期革除淨盡兹值開徵南漕糧米之時恐牧令等官利令智昏仍復巧索及蠧胥滑役巧計叢生纍民守候乘機暗剝掯勒包折隨又開列條款預行出示通發三省遍貼諭禁并屢諭道府不時巡歷稽查又恐道府或礙於情面或為家人衙役得賄朦蔽釐剔不淨小民暗受其害并又選差謹慎員否實貼并暗中看其徵收情形是否悉照條約如奏明一臣風聞鎮江府城內有金壇童生於十月二十六日尚未黎明赴府應考經過旗兵所守柵欄旗兵以未及開柵之時不肯即開而各童生即與旗兵口角將柵欄推倒而去又聞有生童旗兵互毆并羣赴將軍處喊訴之事臣以赴考生童理應遵循禮法難容逞刁生事隨即出示嚴諭一面移行確查起釁及有無互毆實情究報理合奏明謹奏生童旗兵當兩懲之方足示公同日又奏為恭請崇祀火神以昭祀典以益民生事竊惟火神見於經傳列於五祀我皇上懷柔百神京師亦有火神廟宇供奉致祭而外省祗為民間供奉禱祈未列正祀臣查祀典凡有功德於民與能捍大災大患者皆宜崇祀民間祈禱火神禳除火災頗有靈應似宜仰懇敕下直省郡縣一體恭祭以展誠敬至火神廟宇各處皆有應令地方官修葺莊嚴如有廟宇卑隘及未曾立廟之處量動公項營建祭品儀注似應倣照致祭風雲雷雨山川城隍壇墠之制查現今致祭風雲雷雨諸神遵照部頒祭品每祭需銀二兩五錢今若倣行亦請於各屬存公銀內照數動用著為定額嵗底彚册報銷至每年應否春秋二祀或應何時舉行并請敕部定議通行以昭畫一臣識見短淺是否有當伏乞皇上訓示為此謹奏此事汝等封疆大吏酌宜為之則可敕下直省通行是何言歟雍正十二年十一月二十日江南總督臣趙𢎞恩謹奏一江蘇省屬數縣窪地被水荷蒙聖主大沛恩膏截漕緩徴并將應納漕南等米緩至明秋折納乏食窮民再動倉穀賑濟臣欽奉恩綸隨即出示飭發遍曉而被水人民欣聞諭旨身沐洪慈歡呼感戴淪肌浹髓臣一面現在恪遵聖諭悉心料理督率有司將賑濟等務實力奉行務期被水各戶均沾一各處私梟有妨鹽政且恐流而為匪擾害地方臣訪聞泰興縣之黃橋汛等處興化縣之大村等處皆逼近兩淮場竈為積梟巨窩出沒之地而句容縣更與例食浙鹽之丹陽丹徒等縣接壤向有誇梟挑越散賣平日各該地方官辨兵役或受賄故縱或畏縮不拏甚屬不合臣隨選差標員辨令各該地文武嚴督兵役奮勇擒拏今句容已獲梟犯二十餘名興化已獲梟犯二十餘名泰興亦獲梟犯十七名內興化縣梟犯繆瞎子等一起敢於逞凶拒捕當有兵丁劉萬卿一名奮力尾追受傷身死句容梟犯亦有余孝等一起以挑鹽扁擔拒捕經各兵併力擒獲而兵丁胡實一名受傷似此凶頑梟徒法更難寬若仍交各該地方官承審恐題者臣即審題其原非拒捕夥內罪僅徒流者即行照例批發遣上緊查拏并飭不得妄拏無辜驚擾地方在案理合奏聞一三省吏治營伍臣惟恪遵經嚴行查究龍江滸墅淮安三關恐有姦商隱漏地棍把持臣亦凛遵聖諭嚴督地方文武加意協巡而龍江一關近在省會臣準監督咨移又經遴委標員赴彼幫辦巡查更無岐視但三關有無疊索暗侵之處緣各監督俱係內務府人員歷任督撫間多趨承瞻顧臣受聖恩深重不敢稍避嫌怨因循積習亦在留心暗訪倘有實迹亦自另為據實奏聞合併陳明謹奏不避嫌怨據實奏聞方是同日又奏為據實奏明事竊臣於雍正十二年十月初六日接據江西南昌鎮今升福建建延鎮總兵官李蔭樾鈔録摺奏南昌鎮營修理甲械等項事宜奉硃批言之督臣欽此密送到臣查李蔭樾原奏內稱南昌鎮標前後二營并城守水師二營腰刀請動司庫銀兩打造盔甲旗幟鳥鎗藤牌虎衣虎帽號衣號帽等項應動公糧鹽規地租修製不敷之銀先於司庫借墊并自行捐補等語臣查江省各標鎮協營甲械荷蒙聖恩準留公糧修製各營已經陸續製造其未經修完者俟續收公糧補修其腰刀亦應於公糧內動支不應重費司庫銀兩且庫帑不便擅那兼恐各鎮營俱援例請借司庫亦難為繼又查該鎮所估尚可核減因李蔭樾旋即升任隨令接署南昌鎮事康華齡再加查估今催據康華齡等覆稱細查李蔭樾估修四營旗幟俱係雍正十年動支公糧新製之物棉甲亦有新製者均屬堪用毋庸重造藤牌兵丁已有衣帽毋庸換製虎帽虎衣其弓箭鳥鎗兵丁之號衣號帽歷係各兵自製亦無庸更張縻費其餘尚應找修之甲械督同四營將辨覆加確估實僅需銀一千九百餘兩李蔭樾原估二千八百四十六兩今核減銀九百餘兩等情是應找修甲械費銀既已核減應令將現今實存公糧速行製造腰刀亦即動製不敷之銀於雍正乙卯丙辰年公糧內陸續修理即可齊全其李蔭樾到任未幾即勉力捐銀三百餘兩誠屬急公但伊在南規均可作塘兵鹽菜等用臣先已飭令查議應俟另案議辦又奏稱南昌省城七門雖係城守營撥兵看守每門僅兵四五名今將鎮標兵丁撥出二百二十名內於七門每門派兵二十五名市口設卡每處派兵十名其一切專管兼轄仍歸城守現在呈商添設汛房等語查李蔭樾欲於每門添設標兵二十名每卡添設標兵十名亦屬加謹巡防之意但又將專管兼轄考成獨歸城守不特多添汛房糜費帑項誠恐標營辨兵視為無關考成並不實力查巡而城守辨兵恃有標兵協查竟致躲閃偷安彼此推諉轉致貽誤巡防亦未可定應令南昌鎮嗣後多差辨兵輪流在於各城門以及省城內外要地晝忽廢弛如違察出嚴行參究又奏稱各營親丁倒馬朋銀應歸入騎兵項下湊買馬匹以免私朋等語臣查前經江南提督臣南天祥以武職隨糧倒馬俱令自行捐補將額領朋銀以補營伍買馬不敷之用經臣以買補營馬兵丁互相私朋相沿已久辨兵咸各相安各官親丁準其馬步兼支出自聖主殊恩使武臣養贍充裕之意親丁之馬即在營額之內例應餧養足額遇有公務差遣一體撥給應用若將親丁倒馬責令各員自行捐買將辨如果勉力從事則養贍必仍不能充裕倘不即行買補有名無實任意延缺遇有公務差遣專將營兵之馬撥用則苦纍仍在兵丁應仍循成規照額領朋購補以實營伍等因題準部覆於雍正十二年七月初七日奉旨依議欽遵在案則江西標營自應一例照舊辦理仍飭加意稽查如將辨有額外捏名多領入已苦纍上三條臣謹分晰據實奏明是否有當伏乞皇上睿鑒訓示施行謹奏覽雍正十二年十二月初九日江南總督臣趙𢎞恩謹奏一江西新淦縣通報謝芳輝倚襟多事統衆抗拘種種不法臣到任後隨即查催復經飭令臨江府知府等督同該縣印捕員辨量帶兵役設法捕擒務將首犯獲解江西省城究報一面曉示從前附和黨從人等速自投首如執迷不悟一併拏解不得因循疏縱去後兹據知府薄履青稟稱首犯謝芳輝經原署新淦縣知縣葉重熙訪得該犯來至沙湖地方伊親皮姓之家隨經密遣丁役捕獲解聞一據江西南贑總兵官李漣呈稱龍南縣屬小水口等處有民人李鳴岐等與廣東爐匠謝乾三等燒炭砂鐵現在緝拏等情又據永豐縣稟稱豐邑長坑等處近有廣東福建流寓之人淘沙撿石燒炭砂鐵鎔鑄營生現在禁逐等情一併到臣臣隨飛飭文武一面即行封禁一面嚴究此二起私開鐵厰實係始於何日同夥若干立篷設窰共有若干座所鑄鐵斤運販何處該地文武平日有無納賄縱容情弊據實另報并通行各屬一體留心查禁其有應行開採以利民用之處亦即明白報酌不得蔽混理合奏明一據江西鉛山縣知縣俞士烺鉛山營都司楊兆麟等稟稱訪得河口地方有邪教陳大膽當經拏獲訊據供稱素習拳棒刀鎗并會符水又稱原係江南道人蕭漢文所傳蕭漢文現寓江西省城有齋堂經卷名大成教并有綾劄徒弟等語臣星飛密飭文武上緊追拏夥黨務期全獲一面將已獲之犯嚴加審究飛報毋得絲毫疏縱理合奏聞一江西各關侵隱不清臣風聞未確隨密會撫臣常安就近細查已經奏明在案今據查出潯贑兩關各員侵混數目并道員劉均等自行首報當即分别會參訖但江西官吏廢弛狡詐積習已深此外尚多巧混隱匿勢所必有除又密札撫臣常安再加徹底根究外臣仍不時密察暗訪務期貪蠧不致輕脫合併陳明謹奏覽同日又奏一江省各營馬匹戰船等項臣密委文員點驗先經奏明在案昨經察出京口水師左營額馬缺少及半臣隨具疏題參緣該營係隸京口將軍専轄歷來不無岐視以致虧缺如許其各鎮標協營縱有虧缺或未有如此之多臣亦在飛催上緊實力驗報倘稍有缺短亦即參究務期將辨知警營伍充實恐厪聖懷理合奏聞一安慶省屬夀州等處民多愚悍前經臣訪有李盛木等結夥行凶有五嶽會之名今已據報拏獲現在催令嚴審擬報又續訪有嚴寬等數十人因尚無附和行凶實迹未便概行株連臣即將伊等姓名開列出示使其警醒再稍有違犯亦即拏究是以免擾害鄉里合併奏明一據署崇明縣支本固稟稱據施天一首稱沈姓大樵山人詩集內有狂悖語句隨拏訊沈自耕供稱詩集係伊嗣祖沈倫從前所作所刻沈倫已於雍正十二年九月病故今施天一係因爭田挾嫌捏首其詩板現存蘇州沈蒼林家等情密稟到臣臣恭查奉頒歷年上諭內有雍正七年六月十五日上諭敕審逆黨沈在寬一條曾及沈倫之名是否姓名字樣偶相符同抑或今被首之沈倫即係嚴鴻逵沈在寬之流似未可定除星飛密調詩集原板細奏外理合先為奏聞一江寧省城一帶於十一月二十九日夜大雨三十日得雪百姓歡呼俱稱春麥甚屬有益其三省各屬得雪積深若干現在催查另報江寧米價一兩上下不等各屬米價亦俱平減恐厪聖懷理合奏聞謹奏覽雨雪米價情形深慰朕之厪念雍正十二年十二月二十日江南總督臣趙𢎞恩謹奏一江寧省城一帶前月得雪奏聞在案今於十二月十五日又得微雪又查據江寧蘇州鎮江常州揚州安慶寧國太平池州廬州鳳陽滁州和州廣德六安潁州泗州十七府州所屬州縣呈報於十一月三十及十二月初一等日各得雪積厚四五寸及寸餘不等其尚未報到之各府州并江西各府所屬地方得雪情形現在查催另報合併陳明至現今民間食米上下江各府州縣每石價值至貴亦不過一兩一二錢且價在一兩以內者甚多江西之米每石更僅值七八九錢不等三省米價總較向年大屬平減頃據署江寧糧道王恕稟稱親至上江一帶督兑漕糧經過太平池州安慶等府屬地方目覩米價平減民情安和隆冬嵗臘之時閭閻頗有盈寧熙皥之象道途未見貧寒乞食之人大江南北漁火商帆絡繹上下咸各寧謐等語此皆聖主休養生息隆恩疊沛之所致也理合奏一張又銀一錠重一兩二錢零該二丁義不私取據實回稟召到失物之徐祝正認領祝正相酬二丁堅不受謝等情臣查兵丁賈廷鈺朱能拾獲銀聖主德教漸摩之所致也理合奏聞謹奏覽同日又奏為據實縷晰奏聞事竊臣欽奉上諭有人奏稱兩淮衆商情願將所壓綱課如數交納惟催運稍寬其期則商力既舒辦銷亦易等語若果商人先完課銀於國帑無誤則寬其運鹽之期亦何樂而不為但恐其中别有情由令臣等據實密奏以聞等因欽此臣恭讀之下仰見皇上至聖至明早知其人之陳奏未必公當確切故欽蒙聖恩宣示臣等據實密聞臣查兩淮衆商運行各省之鹽原係先納課銀後運鹽斤然必須將鹽隨即捆運銷售俾得課本速清方可望其再納次綱之課接運下次之鹽年清年額於國課商力常有實濟凡屬殷實良商無不自行力圖祗緣衆商之中有種姦頑之輩揚州等處又有一班囤窩之人姦商樂於緩運係圖口岸長價以博厚利囤戶利於壓綱係欲囤買殘引而賣貴價江西湖廣等省鹽價每小包向定一錢二分四釐及隨時銷售原屬良法而至貴亦不過一錢三四分乃間或每包竟賣至一錢七八分至二錢不等細查場竈原未缺鹽成本並無加增此每包多賣三四五分之銀盡飽姦商囤户私槖而行引口岸每當鹽少價昂其貧寒以及刁滑之民非係茹淡以待價減即係貪賤而買鄰私銷食淮鹽之月日半為姦商囤戶之耽擱以致分年灑欠歷綱纍壓那新掩舊牽混躲閃其課雖完其鹽日積口岸疲廢遺纍全淮臣於雍正十二年二月清查時庚辛壬三綱引目竟尚壓欠四十餘萬癸綱彼時已當運行三十餘萬而一引未曾抵埠夫從前已經遞壓一綱戊申一綱又分十年帶運奏期又已改緩數月今新舊又共壓欠七十餘萬已及全綱之半不一二年必又積滿一綱之數斯時若催衆商按綱補運則口岸既不能一年兼食兩年之鹽而商力又不能一年兼辦兩年之課若再分年帶運則國課一年應完者必又拖至十年之久且又夾行帶戊勢必愈難清理倘若竟行截去一綱國課即虧缺二三百萬之多此臣與鹽臣高斌於清查之時即深以為慮者實為國課衆商大有關係非專為督銷考成起見臣等一面勸催各商速運舊欠隨一面據實陳奏嗣蒙聖諭又經遍加誥誡據各商感戴皇仁各願踴躍趕運臣等復慮新舊併運引地必致壅跌商力必致拮據又將癸丑一綱僅飭源源運濟緩其按限催較其積壓之引則屬萬難少縱致滋牽混掩蓋不獨有礙奏報之案實有關係國課誠如諭旨果於國帑無誤寬期何樂而不為也細訪此番行引地方因緝私日加嚴緝轉輸便利亦無匱乏之象如此行之三四年則壓欠或可帶銷通完將來漸復奏銷原限并從前所壓一綱或可次第調劑臣等愚昧之見採之兩淮商情亦所樂從其有未能盡合者乃係貪圖目前厚利之姦商囤戶見其破除痼弊不利已私因臣實力圖公難通賄賂於夏秋之間布散流言在聞者不悉原委不察近日衆商確情不知有關將來國課故以一面之詞冒昧陳奏緣蒙聖主預燭隱微敇令臣等據實密聞除同鹽臣高斌會奏外所有前項隱情合併據實縷晰奏聞臣趙𢎞恩謹奏覽奏已悉議論殊屬通透之至即照此隨時酌宜盡力督理可也兩淮鹽政經汝二人此畨措畫而不能徹底釐剔則無可望清晰之日矣勉之硃批諭旨卷二百十六之四欽定四庫全書硃批諭旨卷二百十六之五硃批趙𢎞恩奏摺雍正十三年正月十二日江南總督臣趙𢎞恩謹奏一雍正九年三月二十一日奉上諭江安糧道印務著王恕署理其能否勝任之處著髙其倬尹繼善程元章時常察看據實奏聞欽此欽遵在案臣到任以來亦即留心察看時加訓飭而該署道王恕感戴聖恩頗知奮勉潔已清查漕弊甚屬實心其辦理諸務亦皆勤謹理合據實奏一蘇州糧道劉柏居心甚好操守亦潔辦理漕務一上元宣城等縣上年窪地受水荷蒙聖恩蠲賦賜賑臣力督屬員加意料理務使均沾實惠臣又密委標員分往查訪具報如有散賑得法者奏明一三省渡口船戶浮橋橋夫嘗有勒索商旅之事臣屢飭地方各官稽查并刋示嚴禁在案而江寧地方乃七省通衢嵗杪之時更多商民往來恐船奏明一私鑄錢文屢經嚴禁嗣聞上江有種操舟鑄私之徒舟中只用泥罐一箇鐵鉗一把即可成錢偶聞查拏將鉗罐即擲淺水查過之時仍復取用弄巧玩法莫此為甚臣隨即檄飭密捕今又聞江西鄱陽湖中亦有此等私鑄姦徒并即密飭該地文武屣拏又通飭諸屬各於江洋湖港上緊密察得有蹤迹立即嚴拏解究其深山曠野之地亦加堵捕務期周密使姦徒不致幸脫并移鄰省督臣撫臣一體查緝在案理合奏明謹奏私鑄最害錢法應嚴懲者能如是周密察訪殊屬可嘉之至同日又奏一江寧省城一帶於十二月三十日正月初一日連朝得雪積至一尺四五寸之深紳士兵民羣相感頌聖主念切民依精誠感召所致又稱除夕元旦之辰得此大雪四野均霑時和年豐愈有可望等語臣又飛查各屬現據鎮江常州蘇州揚州淮安徐州鳳陽太平海州滁州和州等屬亦報俱於正月初一日得霑大雪民間感頌皇仁異口同聲臣恪遵聖訓愈加寅畏并勸導紳士兵民益知感悟日歸醇厚以迓天庥以副一江寧省城地方遼濶商民輻輳今值米多價減之時臣一面勸其加意撙節留心蓋藏而嵗律維新閭閻共慶豐豫歌咏太平之事仍復略聽其便用昭和樂不加嚴阻但人煙叢雜恐有竊匪乘機為害更恐有回祿之患臣又選差辨員晝夜遊巡時加照護以靖地方以衛商民理合奏明一三省塘汛臣不時稽查整飭而上江至湖北交界江蘇至浙江交界一帶江河每值嵗杪商船更屬絡繹全賴塘汛嚴謹以為保障臣隨又選委幹員分往查看告誡使各辨愈知奮勉勤力以護商旅咸得寧謐理合奏明一江寧省城現今米價熟米每石價銀一兩一錢五分次熟米每石九錢四分糙米每石八錢八分歷來民間買食多係次熟米糙米今其價值俱較往年平減閭閻實有充裕之象又查三省各府州屬米價俱平事關民食恐厪宸衷理合一併奏聞謹奏秉此公忠行去上蒼自有明鑒人事盡於下天道感於上其徵驗有不期然而然者但不可稍萌恣肆之念志之雍正十三年正月二十四日江南總督臣趙𢎞恩謹奏一江南地方生齒日繁米糧最關緊要年來疊蒙聖主浩蕩天恩截漕改折未雨綢繆上年各處高田又幸倍獲收成米多價減理所必然向有蘇州楓鎮等處姦牙膽將米糧串賣出洋以致蘇郡及沿海州縣民食常虞缺少即內地各屬亦因而價值高騰素為江省民生大纍臣到任後竭力察禁不時密訪嗣經察出王二等偷販當即嚴拏參究自此各處官辨兵役商牙人等愈知警惕現今江蘇等處米價較之往年大屬平減民食充裕户慶豐亨頂戴聖慈浹髓淪肌臣猶恐姦商地棍牙行因其米糧過賤輒萌故智兹又刋示遍發嚴禁并再行蘇州府等會督兵捕保甲在於米糧聚集之地嚴密察訪并令沿海守口員辨在於船隻出口之處著實盤堵臣仍不時密訪如員辨兵役奉行維謹即行嘉奬倘稍有玩縱或誣拏滋擾立即參懲務期私販之風全戢民間之米更饒臣一面勸導士民仰體聖諭加意撙節留心蓋藏預為青黃不接之計漸臻餘聞一臣訪聞潁州地方有種遊手好間之輩矜其膂力逞其凶潑夥稱羅漢尋事搆釁陵害良懦殊屬不法隨即密行拏究兹據署知州高淑曾詳報將黨羽毋使漏網以安良善理合奏明一江寧省城及上下兩江各屬除夕元旦得雪情形經臣奏明在案今據江西布政使刁承祖呈報江西省於正月初一初二初三等日連得瑞雪積厚四寸之深又九江饒州等處亦皆得雪萬姓歡呼咸稱今嵗春作秋成定獲豐收悉皆皇上厚澤深仁念切民依所致理合奏聞以慰聖懷謹奏江右亦獲均霑天澤深為黎元欣幸同日又奏為恭請聖訓事竊照直隸知州其責同於知府本州事簡民淳自可兼綜若地處邉要民刁政繁雖有長才實難勝任如上江之直隸潁州界接豫省地方遼濶錢穀而外刑名事件數倍他屬似應請將潁州升為府治設立知府一員附郭添設知縣一員并酌添佐雜首領該府除轄附郭一縣并潁上霍邱二縣外有直隸亳州并所屬之蒙城太和二縣境土與潁毗連城池相隔俱在百里內外潁州既升為府亳州毋庸仍設直隸可與蒙城太和二縣均歸潁州府管轄共一州五縣在知州知縣既得各辦本邑事務知府可以統率稽查巡歷整飭於吏治民風均可望有實效且查潁地適居州縣之中壓彈控馭似於形勢亦屬相宜行據司道等議覆前來但事關以州改府設縣添員臣未敢據行具題恭繕摺具奏是否有當伏乞皇上恩賜訓示如其可行臣當另為備晰題請為此謹奏照議具疏題請同日又奏一欽奉硃批江西饒州營參將彭肇槐居官何如雖係土職出身朕觀其才具頗優堪勝副將任否如以為可用與何協相宜一併奏聞欽此臣查彭肇槐為人誠實辦事克勤謹慎小心亦無巧偽可勝副將之任但生性粗笨若用之於江西上江等協俱可盡其所長下江兵民巧詐不能照察湖廣四川向所親熟萬不宜用至於總兵一任不但其才不能稱任亦且不宜加此重權合併陳明一常熟縣知縣張嘉論因經徵蘆課未完部議革職離任題請留辦吳縣部覆未準今據司道府等皆稱張嘉論為人謹慎練逹前署吳縣首邑於地方諸務甚是留心盡力等語臣查張嘉論實屬幹練勤謹可勝繁劇之員因公廢棄殊覺可惜可否仰邀皇上天恩仍準送部引見酌量録用再江寧一邑乃省會劇縣現又缺員或即以張嘉論帶革職之案署理效力臣因地方人材起見合併據實陳明是否可行臣未敢擅便統乞皇上睿裁訓示遵行一正月十一日接準部咨奉上諭聞劉藩長福建布政使任內經手錢糧公費耗羡雜項尚多未清之處著將劉藩長仍留閩省與張廷枚交代清楚再赴江蘇新任欽此臣查劉藩長先於雍正十二年十二月十七日已到藩司新任當經檄令欽遵去後隨據劉藩長以前任福建布政使任內經手一切正雜錢糧已經移交新司張廷枚兑交明白出有印結至無著硝價一項係撥為巡防臺寨火藥應於公項內咨部撥補透動船工津貼一項係改造船隻詳院批示準給且經咨部公費養廉各項支放有案藩長奉閩省督撫會催赴蘇已到新任等情詳覆前來臣因劉藩長所詳情由是否確實江省無案可稽如係督撫會催赴任勢必徒然往返轉至誤公除已飛咨福建督撫二臣確查至日即飭星速起程回閩另奏外合先陳明謹奏覽奏俱悉候另有旨命閣臣頒示雍正十三年二月初六日江南總督臣趙𢎞恩謹奏一兩江各屬徵收錢糧積弊多端以及匱書重戥稱收掯票需索銀匠低估成色多勒火錢種種纍民之處經臣上年嚴行稽察極力拏懲務期咸知改易前轍謹守法度兹又聞得有種戶書凡小民完過錢糧必要花戶會面送禮方肯將已納銀數開除若花戶不曾送禮面懇者如該額銀一兩內已納過三錢並不於實徵册內開除已完三錢之數而下次比期仍照一兩追比以完作欠實為民害臣即通行出示嚴禁現在查拏枷責以懲姦胥以恤民隱理合陳明一三省官吏向係上下欺朦交相詐偽權歸書役賂賄公行上年經臣確訪參拏各屬雖知警惕但日久不無怠玩且刑名一節尤多率混命盜大件多不依限完結支吾延緩而竊案及自理承審承追等事更復牽延拖纍承行書吏舞文巧弊朦官延擱恣意苛求陋習尤難細數兹當二月開告之始臣現在嚴行出示責成道府確查稟究臣仍密聞一上江夀州鳳臺等州縣竊劫案件多於别邑臣仰遵聖訓極力整頓屢飭文武各官密加察拏并又細加體訪查有夀州窩家吳聰子等八名賊匪蕭麻子一名鳳臺縣窩家陳秀卿等二名賊匪陳黑耳垜等五名霍邱縣窩家吕嵩麻子一名俱潛住各該州縣境內任意窩賊而吕嵩麻子又係狡猾積窩凡遇夀鳳各賊犯事無不逃匿該犯之家必須密拏方能有獲臣已密檄該管文武各官嚴拏務獲確審實情按法究懲以靖地方并飭不許妄拏滋擾以副聖主弭盜安民至意理合奏聞謹奏嚴拏窩家使盜竊無容足之處則地方自靖可謂得拔本塞源之道矣同日又奏為奏聞事雍正十三年正月二十七日據溧陽縣具稟鈔送生員羅燮鼎呈告總理陜西巡撫臣史貽直前任御覽外臣見其辭語支離不經似有挾讎串誣捏陷情形抑或另有情節均未可定當即密發蘇州按察司飛提該犯等研訊確情去後隨據署鎮江府稟稱羅燮鼎曾被史族赴府控告盜葬墳地燮鼎亦訴史宦發掘互控有案未結等語是否燮鼎藉此挾嫌誣陷又經密發蘇臬司一併確訊俟訊明到日臣再詳加細核另行具奏事關大臣不敢隱匿理合先行奏聞謹奏披閲呈詞殊屬荒唐之甚至於互控塋地其中不無倚勢欺陵致成讐怨情故事既經司由府彰彰顯露自當審明曲直題奏以聞雍正十三年二月十五日江南總督臣趙𢎞恩謹奏一臣於雍正十三年二月初六日接到大學士鄂爾泰張廷玉寄字內開雍正十三年正月二十一日因宿州等處有探花大刀五嶽擡天三乘等會聚集多人欽奉上諭一道遵旨寄信前來等因到臣欽此查臣到任之後即聞上江地方有等隨會燒香之事斂錢聚集男女混雜其中敗壞風俗包藏姦匪種種不法應宜嚴懲勿使滋蔓隨即密訪查拏去後復因江西玉山縣匪類黃森官等之事臣愈加警惕極力搜訪不時密札文武員辨一體暗察於雍正十二年四月初八十七等日據定逺縣并鳳陽道報獲擡天尖刀會人犯張大劍等十四名又於五月十二等日據合肥縣報獲南陵縣三乘會又名糍粑教人犯潘玉衡等十四名又於十一月十八日及十三年正月初七等日據鳳陽道并鳳臺縣報獲五嶽會人犯李盛木等二十三名又於上年十二月初六日據宿州報獲探花會人犯趙文龍等九名又獲大刀會湯振一等三名俱經臣一面飭發司道審擬一面奏聞在案嗣據安徽道將南陵縣三乘會一案人犯審解到臣當查審擬未協臣因江寧布政使李蘭辦事精細隨發該司就近研訊兹捧讀諭旨仰見皇上明察秋毫無微不照臣當即欽遵密札安慶撫臣及藩臬兩司一體凜遵聖訓詳悉辦理務使首惡不得漏網無知咸皆化誨其他無辜讐扳不致波及姦宄全消地方寧謐以仰奏外理合先行奏聞一江寧府理事同知係專難要缺必須勤敏強幹之員方克勝任前因同知錫昌患病解任所遺員缺於上年四月內經臣委臣衙門筆帖式巴都善署理該員為人明白辦事勤慎署事十月以來審理一切旗逃案件俱屬公平理合據實奏請仰懇聖恩俯將江寧府理事同知員缺即以巴都善補授則該員愈加奮勉而要缺可收得人之效但臣愚昧之見是否有當伏候聖裁其巴都善筆帖式員缺毋庸發補現有筆帖式赫赫一員儘足辦理合併陳明謹奏有旨諭部矣雍正十三年三月初一日江南總督臣趙𢎞恩謹奏一臣捧讀御批河東督臣王士俊奏摺仰見我皇上䇿勵臣工奠安民生至意伏查各省未墾田地勸民墾種疊蒙諭旨令直省督撫各就本地情形細加籌畫勸助墾闢其體國經野之謀至周且備臣因江南民情好逸惡勞巧於爭占到任以來即留心檄催察督又於上年八月內檄行三省各司道將各屬凡有可墾之地逐一清出册報并令籌議立法廣為化導飭有力者開墾無力者捐助牛種并嚴禁豪強不得阻撓侵奏明一江寧糧道王恕押運過淮近據稟稱淮揚一帶皇上念切民瘼聖德涵濡之所致也合併奏聞一江寧省城二月十八二十二十七等日連得大雨餘日晴雨應時臣差辨四外查看俱稱麥苗旺茂百姓歡欣目下米價中熟米每石一兩一錢次熟米每石九錢三分糙米每石九錢合併陳明謹奏據奏麥苗旺茂米價平減此誠堪為額慶同日又奏一江西新淦縣革襟謝芳輝等屢次毆官搶犯大屬不法臣到任之始即嚴飭查拏其首惡謝芳輝已於上年十一月十二日報獲餘黨陸續就擒經臣先後奏聞在案今據臨江府稟稱本年正月二十一日復獲逸犯楊榮等八名此案人犯俱已全獲等語臣查此等姦棍若不嚴行懲創何以肅法紀而安良善現聞一聞江西民間所用錢文內有將鉛私鑄成錢及薄小不堪之錢攙和使用溯流尋源明有私鑄之人臣隨疊檄嚴拏今據峽江縣報獲長簰地方私鑄鉛錢之廖從三等二犯并起獲鉛一包及鐵鉗鐵杓訊據供認不諱并稱所鑄鉛錢係換給新淦縣民廖二妹行使等語並據臨江府稟報臣即飛飭嚴拏廖二妹務獲一併嚴究黨羽務盡根株庶姦徒不致漏網錢法得以肅清矣理合奏聞一江西建昌府暨豐城長寧龍南等縣稟稱今嵗二麥前沾瑞雪又復雨水均調兼以目下天氣融和無不青蔥秀發遍陌盈阡俱皆暢茂米價上米亦不過一兩萬姓歡呼人民樂業等語理合奏聞謹奏覽建昌等處雨水二麥情形甚為慰悅但未知闔省普遍否同日又奏一江寧省城查有民人李三與旗厮任保在朝陽門外朋充柴草牙行用強邀截詐害鄉民業經臣與將軍臣吳納哈批行究處在案臣恐此外尚有生事索詐之徒隨又飭行查禁兹據署江寧府理事同知巴都善詳稱附近滿城之正陽北安小門西華四門俱有柴草民牙皆領牙帖訊據牙人陳城若不設立牙行誠恐買賣無所慿倚民人故擡其價旗厮恃強勒買不無爭執滋事應於四門各設民牙一名飭令上江兩縣另選誠實之人充當牙人抽取用錢每百只許三文等情到臣臣查所議俱屬妥協隨移準龍江關議覆相同除行該縣查照并會同將軍嚴禁旗人復串滋事民牙亦不許違例朋充多索臣仍不時密察如有前項情弊即行拏懲以安民業理合奏聞一賭博最宜嚴禁臣節遵雍正四年禁止賭博定例明白鈔録飭行各屬遍貼城鄉村市咸使周知并飭嚴拏賭犯根究賭具來歷按擬究處在案乃近訪揚州至泰州通州如臯一帶水路地方有頑梗不化棍徒以屋內聚賭兵役易於擒拏更生機詐聚集舟中停泊無定肆行賭博岸上之巡邏在所不及水師之察緝隔越他舟罪及鄰船不過暫中軍慎選幹員前往水路一帶扮作客商暗行察訪如果確實并現有賭具贓據立即擒拏解交該地方官嚴訊究治去員如有滋事驚擾定即一併重懲理合奏明謹奏覽雍正十三年三月十八日江南總督臣趙𢎞恩謹奏為奏明事竊照編立保甲乃弭盜安民之良法洵為要務臣到任後通飭三省嚴行稽察務使實力加督察務期剔釐積弊實力奉行理合奏明伏乞皇上睿鑒謹奏覽同日又奏一江南地方間發蝗蝻臣於未萌之先通飭各屬預為防範後江浦等州縣偶有萌動臣即飛飭撲捕田禾得以保護今嵗感沐皇仁疊逢瑞雪蝻子入土必深自無害稼之虞但未萌之先仍須預為防範隨又通飭各屬地方文武官萌出立即除治務期淨盡不容稍有滋蔓以保禾稼以利民生庶不有厪聖懷理合奏聞一上江鳳陽潁州亳州一帶素稱盜藪又濱淮一帶綿亘數十餘里一望皆屬波濤冬間水涸一片曠野欲設村舍塘汛又慮夏間水漲凡有漁船多伏盜匪稽查為難訓化不易臣雖不時密飭訪查嚴加拏懲第恐小民多屬愚蠢無知即使重懲一二而餘人不能盡知警誡若欲遍行曉示識字者少懶惰者多期其革面革心愚民無不洞曉實屬難事是以面諭廬鳳道范璨將強盜竊賊窩家治罪及父兄應訓子弟并牌甲不首均有干連坐罪者俟審定之日按罪之輕重輕則即於該地方嚴行枷示更使凶惡皆知警懼似於化頑懲凶或有裨益是否有當理合奏請皇上訓示遵行一江寧城守營副將康華齡臣見其為人謹慎小心是以令其署理江西南昌總兵之缺隨經密加訪察果能實心辦事因臣未敢深信前次亦未奏聞續因總兵官李蔭樾調任福建建延鎮之缺臣復令康華齡前往署理屢行密飭江西官員查訪并札詢撫臣常安去訖節經諸員稟其勤於操練不尚虛名等語又經撫臣常安札臣康副將署篆西省已歷八月文武和衷軍民胥輯頃者南回官民咸有依依不舍之意等語臣復密行暗訪所辦之事多屬妥協操守亦謹練兵亦勤可勝鎮臣之任不聞謹奏覽雍正十三年四月初三日江南總督臣趙𢎞恩謹奏一銷燬制錢例禁嚴密臣屢經檄飭各屬不時查拏按律究擬在案今於三月十五日據江寧縣報稱遵檄四路訪查在於陽字鋪甲內有朱魁之與江雲生聞爐打造甲釘暗燬錢文當即起獲已燬未燬制錢并火罐鐵鉗等物并拏獲該二犯訊供稱係高文儀呌秦大拏錢五百文來煬今年二月裏還煬過幾次每次約有四五百文還有李采臣煬過二百文拏獲秦大供亦相同復拏高文儀李采臣到案訊據高文儀雖供稱所燬係破碎小錢據李采臣供係燬的是白銅做煙袋的等語明屬狡飾且恐所燬定不止此幾次代燬亦決不止此兩人臣巳批行蘇州按察司嚴審銷燬確數及根奏明一本年正二月內雨雪應時及上年太平寧國池州三府并江寧府屬地方二麥長發情形經臣奏聞在案今又據上江安慶徽州廬州鳳陽滁州和州廣德六安潁州亳州泗州十一府州并下江蘇州松江常州鎮江淮安揚州徐州太倉海州通州十府州報據各所屬州縣咸稱今嵗連降瑞雪晴雨均調兼以春融和暖土潤澤膏查勘二麥俱皆欣榮暢茂將來定獲豐收率土歡欣萬民安堵等情理合奏聞謹奏兩江晴雨均調景況欣悅覽焉同日又奏竊照上江宿夀二州定逺南陵等縣均有無賴棍徒設立探花大刀五嶽擡天三乘等會名色聚集多人結黨行凶欽奉諭旨令臣會同新任巡撫趙國麟密行訪查將實在首惡杖斃數人則強悍之徒知警愚民不致湔染欽此臣隨密飭安慶布按二司并移安慶撫臣一體欽遵辦理將各會人犯已經拏獲緣由奏聞在案今據安慶按察使劉吳龍江寧布政使李蘭稟稱據鳳陽府將宿州探花大刀二會審供録報并將該司等核看供單呈送到臣臣查所審宿州探花會共有八人而凶淫暴惡款迹纍纍則惟趙文龍馮夢藻黃四秃子三犯實罪無可逭又審明大刀會共有四人為首之湯振一已獲病故其李進朝一犯屢行姦汚婦女挾嫌糾衆打降亦罪無可逭俱應杖斃其餘各犯分别枷責應飭令該州交與保甲管束不時查察并諄切化導令其遷善改惡以仰副聖主戢暴安良化誨愚頑至意撫臣趙國麟於三月二十一日過寧赴任經臣面商已會同遵旨辦理去訖所有審録供單理合鈔録繕摺恭呈御覽伏乞睿鑒謹奏嚴飭屬員更加訪拏究懲以永熄此風雍正十三年四月十八日江南總督臣趙𢎞恩謹奏一臣接準部咨奉上諭蘇松常鎮道員缺著蘇州府知府姚孔炳補授蘇州府員缺著廬州府知府徐大枚調補廬州府員缺著亳州知州盧見曾補授亳州員缺著總督趙𢎞恩揀選題補欽此臣現將亳州知州員缺遵旨揀選題補外伏查蘇松兵備道王澄慧辦事糊塗任用胥役不能勝任但操守謹慎為人忠厚似應調用京缺其蘇松兵備道缺查有鹽務道曾𢎞緒辦事明白但與兩淮諸商甚不相洽而商人亦不悅服鹽臣高斌與臣言之兩次商酌調用似應請將曾𢎞緒調補蘇松兵備道庶為相宜其鹽務道缺查新補之蘇州府知府徐大枚品行端方實心辦事但其才具似與蘇郡不甚相宜可勝鹽務道之任蘇州府缺查新補廬州府知府盧見曾才具優長可勝蘇州府之任其廬州府缺查有淮安府海一本年二月內有崑山典商汪正泰鋪內失火燒去貯包當樓十八間尚有旁樓十二間未燒各當主紛紛往查取贖共相爭論三月初一日該縣赴文廟行香即被百姓攔阻在內欲令勒商賠補抵暮始能得出據該縣先後詳報臣查小民質當原非得已又聞當樓有已燬未燬之處其爭執固無足怪而事外之人率衆攔阻未便任其肆行隨批令蘇州按察司速飭確查已未焚燒當物照例妥議以安民心一面嚴查逞刁聚衆為首者拏究以警愚頑又本年三月內有常熟縣民黃觀越境買鹽巡役張盛拏獲扭結墮河黃觀溺斃報縣往驗有刁民潘詳雲糾衆先毆張盛當經拏獲又有地棍周象明統凶搶犯亦被擒拏據縣詳報臣已批司飭審確情根究夥黨嚴加究治以靖刁風理合奏聞謹奏刁悍之習應行懲警固不待言或胥役誣捏虛詞以屈陷平民亦不可不防也同日又奏一江南各屬驛遞馬匹關係郵傳重務臣屢經嚴飭該管各道府實力稽察務各臕壯足額如有疲缺即行揭參復又分别等第以示鼓勵勸戒之法如有實心餧養足額臕壯者即豫獎勵次者記功或間有疲瘦餧養稍不如法者即為記過以䇿後效兹據江寧驛鹽道孔傳煥查點上江各屬馬匹分别等第前來查有鳳陽府定逺驛驛丞王聲宏經管驛馬六十五匹除足額高大臕壯外尚有預備應差餘馬四匹臣當給發銀牌以示優獎其餘依次記過更據查出舒城縣三溝驛驛丞范景濓管理額馬六十五匹內疲瘦八匹缺少十匹聞查預借民馬影射希圖欺朦點驗情殊可惡未便稍緣由理合奏聞一本年四月初七日據鎮海將軍標副將杜愷稟稱四月初五日夜丹徒縣屬之新河口地方風鼓浪猛勇俱先已搬移惟存空房至三更時陸續坍塌東岸民房五十三家西岸民房十一家搜鹽廳三間新閘橋一座民人俱無傷損等情前來臣即飛飭江蘇布政司并該府縣確勘兩岸所塌丈尺情形查明被坍房屋速為賑恤毋致失所以仰副聖主軫念民依之至意理合奏快恐厪聖懷合并陳明一本年四月內據海州詳據山東安東衛民徐盛海船舵工盧欽呈稱身船裝載諸城縣牟客料豆議送邵伯交缷於本年二月二十九日同胡德盛船行至開山忽遇賊船一隻上幫將水手吕德打落下水舵工劉永盛中傷身船隨風飄至嵐頭山口隨稟明東省安東衛驗明傷䀶緝盜追贓在案理合報明一體緝拏等情到州轉報到臣又據海州營遊擊稟稱四月初一日準山東安東衛守備移稱嵐頭山船户徐瑞呈報伊船於二月二十九日行至開山遇賊在船多人受傷水手吕德打落下水已據呈通報東省各上司移行沿海營汛協緝等情并稟到臣臣隨批令蘇州按察司速飭勒緝贓盜務獲究追並切行狼山總兵嚴飭各營將辨督兵協同幹捕一力遍行屣緝務盡根株勿得少留餘孽以靖海洋以安商旅外理合奏明謹奏已據東省奏聞矣嚴飭勒緝務獲雍正十三年閏四月初十日江南總督臣趙𢎞恩謹奏一上年六月內江蘇所屬地方雨水稍多低窪田禾收成歉薄荷蒙皇上軫念民生寬徭恤賑又復特沛殊恩截留漕米二十萬石俟市價增長平糶以便民用等因當即轉飭欽遵在案今查江南米價每石仍不過一兩內外並未增長似應緩至六七月間青黃不接之時再行酌量市價平糶以濟民食但目下麥秋伊邇又可望其豐收將來米價似亦不致昂貴若遽行減糶則恐與部價不符如令各屬收存而江南地氣潮濕米石難以久貯臣再四思維酌量權宜查各屬尚有應買均貯穀石何若即以截留之米作為均貯之項令各州縣因地制宜或借或買照依一米二穀易換歸倉即以採買均貯之銀撥還糶價一轉移間似於糶價倉儲均有裨益臣因慎重漕糧起見除一面飭司查明各屬見在均貯穀石數目妥議詳覆外理合先行奏請皇上恩賜訓示遵行一兩淮鹽政從前多因鄰私充斥商販囤壓以致官引難銷臣仰體皇上裕課恤商至意竭力清釐加緊督緝邇來姦梟之徒各知斂迹愚頑商戶亦知改悔兹據兩淮運使尹會一稟稱目今鹽法大見起色湖北漢口每包價銀一錢四分有零淮南甲寅綱窩見值七錢四五分如此疏銷綱課不難催督通河衆商莫不歌咏聖澤見在踴躍辦理癸綱殘鹽業將告竣甲綱新運亦於本年四月二十七日開江趕運銷售等情前來臣隨即飭令各商急公辦運實力疏銷不得誤運聞一江南地方易生蝗蝻未萌之先宜早防範經臣將飭令各屬預防緣由奏聞在案兹於本年閏四月初四五兩日先據上江所屬之霍邱縣文報該縣汪家集地方草場內忽生蝻子零星兩塊又據下江所屬之蕭縣文報該縣龍山湖地方有魚子化蝻狀如小蠅約十數塊并據各稱當即會同武辨督率兵役人等現在焚燒捕撲各等情前來臣即飛檄司府各縣極力驅燒捕撲雖萌動無多亟須遍加搜查不得稍留餘孽取結通報仍飛飭各屬一體及早防禦以保禾稼不致上厪聖懷理合奏明謹奏能令屬員不事隱諱於初萌時即早為撲捕自不致有滋蔓之患同日又奏一海洋口岸商艘往來防範最宜嚴密前因山東省安東衛民徐瑞海船裝載客豆行至開山地方被劫當據舵工盧欽呈報海州據詳到臣隨檄飭沿海文武員辨四路緝拏在案兹據江陰縣詳報本年四月十一日有平寧沙船户陳秀章之舵工蔣進臣水手陸振彩抱贓投首據稱二月初六日有通州陳國安來雇身船約至任家港裝載李詳生貨物初十日駕船到通停泊港內是夜即有十餘人上船將水手四人捆縛捺艙開船出港又奪崇明空船一隻在洋行劫掗分贓物數件逼令幫同駕船其時雇船之陳國安亦在船內拘管甚嚴欲逃無路今幸船隻夜行擱淺二人相約赴水逃歸等情到臣當即懸賞勒限嚴飭通州等處文武協力捕擒并飭江陰縣密帶蔣進臣認識贓盜務一據通州知州詳報督率兵役出洋巡緝於四月初十日在殿山地方拏獲賊船一隻盜犯陳四等六名見起有黃豆菉豆豬酒衣被等贓續又於小淺沙拏獲盜犯李五等五名又於薑竈港地方拏獲盜犯朱耀先一名又據盜犯一名薑鬍子自行投到又本月十一日於白茆港拏獲賊船一隻盜犯戴詳生等八名見起有贓豆等物等情到臣臣隨批司速飭傳喚開山被劫事主盧欽并江陰縣抱贓投首之蔣進臣陸振彩到通識認原贓原船究訊盜夥行劫次數追起全贓如有逸盜再行嚴緝獲究務盡根株毋使縱漏臣當將獲盜之兵役聞謹奏安民之道惟以緝匪靖盜察吏訓兵為根本要務餘皆枝葉邉事也雍正十三年五月初八日江南總督臣趙𢎞恩謹奏一前據霍邱縣并蕭縣報生蝻子經臣將飛飭撲捕緣由奏聞在案今續據上江所屬之旴𣅿泗州靈璧三州縣下江所屬之海州寶應碭山銅山清河安東及徐州衛七州縣衛先後報稱各所屬近湖之地有魚子化作蝻形萌動等情臣俱飛飭各屬文武員辨督率兵役鄉保人等多募人夫星夜撲捕見已據旴𣅿寶應泗州等處結報撲淨在案其餘各屬亦嚴飭見在竭力撲捕將次淨盡續又據蕭縣稟稱該縣龍山湖蝻子已經撲盡無遺今有崔家口李家莊地方界連豫省亦有蝻子生發如蠅並未生翅隨會同武辨雇募人夫連撲六七日夜已去十之七八計日可淨等情到臣臣因界連豫省一面移咨河東督臣轉飭協同撲捕并差委臣標把總星一下江通州地方多屬沙田滷地今嵗二麥穗出雙岐前據狼山鎮呈報前來經臣奏聞并將瑞麥已恭呈御覽隨又據上江所屬之合肥夀州鳳臺三州縣并下江所屬之丹徒金壇二縣先後具報各所屬地方麥多雙穗萬姓歡騰并送瑞麥到臣臣逐一查驗無異不敢瑣呈一據江寧布政使李蘭會同安慶按察使劉柏詳稱廣德州地方四面環山素多虎患居民每受驚害該州請捐俸照從前部定式樣製造一尺五寸長鳥鎗二十桿分給獵户等專司捕虎將所造鳥鎗造册分送文武衙門以備稽查貴池南陵懷寧等縣亦有虎患應請一併製給等情到臣臣查虎患實為民害但係猛勇之獸似非一尺五寸之鎗所能禦捕可否照營制之式製造官鎗二十桿存貯該州縣庫遇有虎發即將庫貯之鎗分給獵戶等委令員辨督率搜捕俟捕除時該委員仍將各鎗即行收繳貯庫庶禦虎有資而軍器不致民間濫用是否可行臣未敢擅便理合奏請皇上訓示遵行謹奏照式製給備用可也同日又奏一江省各汛墩臺多建河濵逼近民田向因取土辦石維艱均皆木置歷來稱便今臣又與撫臣高其倬提臣補熙面為酌商仍用木置俱各意見相同將來修葺換補亦易為力足資守望是否有當伏乞皇上訓示遵行一蘇松常鎮等屬一切支河港渠繁多因年久淤塞民間田疇每苦蓄泄無資經臣議立條規酌定捐錢數目復經題請在案今聞民情無不歡欣鼓舞踴躍趨事其有緊要河渠俱在疏濬挑浚可緩工程俟於農隙興修民田蓄泄灌溉頗有裨益二麥收成與往嵗不同每上田一畝竟有收至二石四五斗不等中田每畝收有一石六七斗下田每畝亦有石餘各處收成多皆倣佛早禾現在栽插臣赴常會勘秋審沿途目見羣黎俱皆盡力田間紛紛興作樂業歡一鎮江府城外新河口地方江岸被風浪衝坍臣恐有礙城池運道亟宜保護隨咨準大學士總河臣嵇曾筠覆稱查勘坍崖處所相距府城尚逺無關運道且目下形勢未定非樁掃所能捍禦俟伏秋大汛之後相度機宜再為斟酌等因又彼地附近向設炮位亦經將軍臣王釴暫移演武鎗厰另擇地安置各緣由經臣一一奏明旋於閏四月內經將軍臣王釴擇有鎮城北雩山腳下曠地背山面江一望平坦長江浩瀚適當厄塞建立炮房永逺無虞當即會同臣與蘇州撫臣高其倬具一蘇州按察使郭朝鼎於初到任時辦事頗覺勤敏及來省進見人亦明白乃自今春以來行事每多任性案件亦多草率又聞聽信書役未能覺察臣俱隨事批飭訓誡并留心體訪今臣赴常會勘秋審道經丹陽聞有前參革貪婪知縣寧承謨案內款犯黃聲聞等取保一事而該司衙門書役陳祿渠嚴致和等膽敢舞弊詐贓臣隨密飭鎮江府查出説合之孫尚卿巳據供認過付銀兩等語至此外有無沾染之人及贓銀確數正在飭究間而此案人犯已經蘇撫臣高其倬親提究訊臣現在仍行密察自應研究虛實務得確情無枉無縱外理合先行奏聞謹奏郭朝鼎非關任性或因遷轉濡遲興致隳頽耳原不係誠實純人吏才猶有可取加意訓戒以成就之雍正十三年五月十二日江南總督臣趙𢎞恩謹奏為奏聞事竊照江南江西三省雍正十三年各屬大小二麥收成分數催據蘇州布政使張渠江寧布政使李蘭江西布政使刁承祖各查報前來臣查蘇州省八府三州各所屬收成自十分九分以及六七八分不等安徽省十四府州各所屬收成自十分九分以及七分六分不等江西省十三府各所屬收成自十分九分以及七八分不等至三省民間米價均皆平減江寧等府屬每石價銀八九錢至一兩二三錢不等安慶等府屬每石價銀七八錢至一兩一二錢不等南昌等府屬每石價銀七八錢至八九錢不等二麥豐亨米糧價減婦子盈寧閭閻含哺大有熙皥之象理合據實奏聞所有三省麥收細數臣謹另繕清單恭呈睿鑒謹奏三省麥收分數欣悅覽焉雍正十三年六月初六日江南總督臣趙𢎞恩謹奏一本年五月二十一日據江西豐城縣稟稱該縣地處低窪全賴長堤以為保障兹於閏四月二十五六七等日驟雨連朝外江內湖一齊水漲連日督率縣丞捕巡各員協同鄉保人等在於各隄晝夜防護大修工隄均皆平穩惟上年嵗修之鄢坊壋突於二十九日夜間漫開隄壋十餘丈五月初一日江水愈泛是夜又將長樂壋隄亦漫決十餘丈但各壋內田地皆種晚禾應於五月栽插菜麥俱已收穫毫無傷損居民田舍尚皆無恙俟查確另報等情前來臣隨飛飭江西布政司星委能員前往漫潰各隄所協力搶築完固飛報并令確勘大修隄身果否平穩居民廬舍是否無恙并於水勢消退時即速布種晚禾雜糧以冀秋收外理合先行奏聞一同日又據署建昌府稟稱所屬南城縣十八都地方麻姑山白沙嶺等處地處低窪於閏四月二十七日大雨山高水急低田禾苗間有被淹但山溪水勢原係旋長旋消可以及早補種無力窮民即令借領社穀以資飯食等情又據稱所屬之南豐縣四十四都地方有長陂街井灣堡二處地居低下因閏四月望後連日雨多水勢驟湧坍缷民人草房共二十間淹斃男婦老幼十一名口俱已撈獲資助掩埋其餘田禾均皆無害各等情前來臣俱飛飭江西布政司立速遴員分途星往該二縣會同地方官確勘詳查推廣皇恩加意資助賑恤務令被水窮民安堵不致失所外一臣前據上江之霍邱等州縣并下江之蕭縣等州縣暨徐州衛各報有蝻子萌動臣即嚴飭各地方文武員辨星夜撲捕業經奏聞在案續又據下江江浦阜寧鹽城等縣亦報有魚子化蝻臣俱飛飭各地方官辨督率兵役多募人夫竭力撲捕并令凡屬交界鄰邑無分疆界一同竭力協捕又差標員一同捕查今除靈璧清河鹽城沛縣山陽碭山等六縣尚未結報外其餘各屬俱已先後文報撲捕淨盡無遺並無傷損禾稼各具務盡根株不得稍有疏懈并催靈璧等縣竭力撲淨結報外恐厪聖懷合再奏明謹奏覽同日又奏一本年五月十一日據瓜州城守營守備蔣飛鵬稟稱五月初三四等日東南風甚緊於初五日夜瓜州南水關外江邊查子港之東護崖掃工坍折約長二十餘丈濶二十丈見在上緊修築等情前來臣隨飛飭淮揚道并淮河江防同知協督河員多募人夫晝夜實力搶築多方保護不得汕刷內地續於二十一日據該江防同知李焞文報坍折之時當即協同河營備辨率領兵夫搶下長樁大掃加鑲一律已經完固平整見在住宿工所防護奏明一鎮江府城外新河口地方被風浪坍塌江岸民房情形并咨準總河大學士臣嵇曾筠指示機宜以見今土性浮鬆形勢未定從緩修築各緣由經臣節次奏明在案兹於本年五月十五日復據鎮江府稟稱新河口西掘港東岸地方於本月十三日夜又坍去江岸約長二十餘丈寬四十餘丈并坍去居民房屋八間並未損傷人口等情前來臣即檄飭蘇州布政司暨各道府等立速確勘情形將被坍房屋民人照前加意賑恤如有鄰近民舍應行遷移即令資助早為遷移并咨準總河臣嵇曾筠札覆云親往勘驗復坍江崖在新閘迤下掘港口地方並非舊坍之處查新閘崖岸從前淘成鉗口形勢未免兜灣回溜今下遊攔水尖角坍缺一塊水勢通暢上遊新閘一帶方不致回溜衝激此番塌缷實於小閘地方甚有裨益等語臣又見在咨商保固之法容俟商定妥協另摺恭請聖訓外理合一併奏聞謹奏江岸坍塌情形嵇曾筠已備細奏聞矣雍正十三年六月二十一日江南總督臣趙𢎞恩謹奏一上下兩江各屬自入夏後雨水俱各均調惟淮徐一帶從前得雨稍稀至栽插之時亦無不均霑膏雨兹據上江之寧國太平廣德三府州屬具報於六月初一二三等日得霑大雨下江之常州府報稱所屬於五月十九二十四二十九等日連獲雨澤鎮江府稟報所屬於六月初三初五等日得雨霑足淮安府報稱於五月二十九日大雨如注徐州府稟稱徐屬於五月二十八九六月初一等日各屬皆得大雨海州稟稱五月二十三四兩日連得雨澤等情至江寧地方亦於六月初三初九得霑雨澤十八日又得時雨田禾均沐膏潤惟揚屬雨澤稍稀又聞淮安府尚在望雨又上江之安慶徽州池州廬州鳳陽五府并和六潁泗四州間有雨水稀少之屬俱稱高阜田地尚有塘堰港渠蓄水可滋灌溉若再得甘霖秋成更為豐稔各等情前來臣隨飭令各屬虔誠祈禱以迓甘霖普沛聞一上下兩江霍邱等州縣前經據報各湖灘草場內間有魚子化蝻臣隨飭各地方文武員辨及時撲捕其已未結報淨盡各緣由經臣奏明在案今據靈璧清河沛縣山陽碭山等縣俱已出具撲淨並無遺類印結齎報到臣嗣又據寶應宿遷桃源睢寧虹縣丹陽銅山七縣報稱各境內間有蝻子生發隨即撲捕並無損傷田禾等語又據奉賢縣稟報沿海地方偶生蟲類形如寒蟬而小俗名紅蟲間傷豆葉無礙花稻等情臣俱飛飭各彼地文武官辨均各實力設法捕除務盡根株取結通報但查蝗蝻生發撲捕貴在神速隨萌隨聖懷合再奏明一據署潁州知州李元祥稟稱訪得州屬霍邱縣葉家集地方有愚頑多人聚衆結盟名為鐵尺會有高二王三灑宋大漢郭長腿等數十餘人於閏四月二十二日在丁屆逺家拜盟會酒演戲前搭布棚十座各執鐵尺一根高二王三灑居中擺列扁擔二條以作刑杖凡不聽指揮者以扁擔責之五月十二十三等日又在菜園內演戲三本在王三灑家聚會共有二十餘席但未獲確據及棍徒的實姓名住址見在密檄查拏等情到臣臣查棍徒聚衆結盟大干法紀隨即密飭安慶按察司暨該州密行查拏務獲并飭不許妄拏無辜滋擾一面移會安慶撫臣趙國麟一體飭拏俟獲到確審另奏外理合先行奏聞謹奏此種匪徒即如苗之有莠若不查拏懲治善良何以安枕綏輯地方此為第一要務同日又奏一下江海邊地方民情刁悍積匪尤多臣留心訪察恐有以出洋採捕為由而肆行搶劫者嚴飭文武官辨密訪確實設法擒拏并將自首減罪之條遍示曉諭在案今據常熟縣詳據賊犯張繼出首雍正十二年正六等月同夥吳大等在狼山前海洋搶劫不知姓名豬船鮝魚船麥船棉花船木船各案隨拏獲吳大等十一名尚有九名未獲等語臣當加奬勵并檄飭文武各官多差兵捕勒緝逸聞一本年六月初三日據江西吉水縣稟報該縣沿河地方於閏四月二十七八兩日陰雨連綿上流贑河水發驟長二丈低窪田禾間被水淹隨於五月初一初二三等日共退丈餘沿河查看被淹田苗俱經退出偶有傷損即已補栽晚稻不致荒棄其橋梁道路亦間有坍損等情同日又據萬安縣稟報該縣棉津汛河邊地方於閏四月二十八日大雨水湧衝坍塘路三處或長八九丈五丈不等或寬一二丈三丈不等并衝倒行人往來憩息茶亭一間民居草店三間並未損傷田禾人口其所坍塘路見在暫設渡船應付水勢亦漸平消等情各具稟到臣臣隨飛飭江西布政司委員分途前往吉水縣查明被淹田禾果否俱已退出其有低窪間損禾苗即令勸諭星速補種晚稻以冀秋收并查明萬安縣地方田禾人口果否並未浸損其衝坍各橋梁塘路亦飭作速勘估修葺以利行旅并將被水居民加意賑恤無致失所另報外理合先行奏聞謹奏凡值此等水發之處必有被淹黎庶即一二戶口亦當撫恤令沾實惠若以其數少而遂加隱諱則大失父母斯民之責矣志之雍正十三年六月二十六日江南總督臣趙𢎞恩謹奏一臣據奉賢寶山華亭三縣稟報六月初二日午後颶風大作初三日海潮湧漲直至沿海一帶土塘腳下高阜之處水深二尺低窪處所探有三四尺不等初三日巳午二時風漸回緩漲潮亦即退落高下田廬皆得無恙其塘外之田雖被潮浸旋即消退亦無傷損各等情前來臣查伏汛遇有颶風實為猛勇今邀聖主福庇各塘穩固無不共慶安瀾但查土塘身外於聖懷理合奏聞一據蘇松水師總兵官陳倫炯稟稱吳淞海口為蘇松門戶南北商艘出入絡繹而各船遇風收泊舍此一口更無他處可以寄碇奈此口並無高山大阜可為瞭望標凖每遇黑夜欲收口船隻無可尋覓只得停泊外港猝遇風浪無所逃避每至驚慌失措今巡洋目擊堪虞隨查勘吳淞港口有炮臺兩座北屬吳淞南屬川沙可於各臺上設立高竿懸挂明瓦號燈二盞竟夜長明以為港口南北標識使黑夜收風船隻望為凖繩以便入口至每夜所需燭費約計二臺一月不過四金請飭就近之寶山縣製造月給燭價交營令看守炮臺兵役然點照管仍令該縣不時稽察等情并準提臣補熙咨商到臣臣細查所議實於海洋昏夜收口船聞一兩江地方迷拐之風惟蘇松尤甚臣屢經密飭嚴行查拏上年拏獲拐犯陳虎子等一案隨經臣奏明在案今於本年閏四月內又查據崇明縣詳報有民人黃忠之子黃寶被人劈腦去足棄擲身尸等情當即批令嚴拏凶犯務獲究擬去後旋據報稱拏獲拐犯李四楊秀珍楊素小劉等供認劈腦取髓賣與人合藥情實除見在嚴飭訊究夥黨務一上江地方每有不法棍徒聚衆肆橫妄逞刁悍兹有桐城縣舉人方道章等控告錢洛訪陳覲文冒冢盜葬藐法抗斷等情經安慶撫臣趙國麟委令該縣同試用官往勘竟有事外之素稱光棍吳大桂暨錢陳二姓族人率衆攔阻拋擲石塊碎桐令汪振甲之帽并毆方姓之人復敢於六月十六日近錢姓街道罷市希圖挾制官長殊干法紀臣查此等棍徒若不大加懲創何以戢刁風而安良善隨會同安慶撫臣一體飭司嚴拏究擬外理合奏聞謹奏業經有旨批示趙國麟奏摺矣雍正十三年六月二十九日江南總督臣趙𢎞恩謹奏一本年上江所屬地方自入夏以及五月內雨水俱極均調至六月以來雨澤稀少如安慶徽州池州廬州鳳陽五府并六和潁泗四州各所屬高阜地方見在祈雨情形經臣奏聞在案續據徽屬之歙黟二縣池屬之銅陵建德青陽石埭四縣泗州并所屬之旴𣅿天長五河三縣及和州各呈報於六月初十十一十七八等日先後之貴池東流廬屬之舒城等縣望雨尤切俱在虔誠祈禱再江寧省城見今米價每石中熟米一兩一錢五分次熟米一兩四分糙米九錢四分恐厪聖懷理合先為奏聞一江西省雨水情形惟南康府之星子都昌建昌三縣九江府屬之德化瑞昌二縣南昌府屬之南勘情形及各屬見今有無得雨另報外理合奏聞謹奏覽同日又奏一江南蘇松常鎮等府屬地方支河渠港年久淤塞難資蓄泄經臣題請開浚接準部咨又經酌定條規并按畝捐錢數目題覆在案竊捐錢挑濬河渠實有利於田疇各屬民情無不歡欣鼓舞踴躍疏浚其已挑濬之處頗得資其灌溉甚為有益其因值農忙未經挑濬者務於秋成水涸後方得興工臣恐各屬收貯捐錢積久過多則民間使用不無漸少倘或錢價時昂似非流通之道當經檄行蘇州布政司通飭各屬將一切捐錢收有成數即照依市價公平儘數易銀奏明一上江亳州并徽寧池太等府屬以及江西鄱陽湖等地方每有私鑄小錢販往别省售賣者經臣屢飭文武各官密加查拏并咨移湖北督撫臣轉飭一體查拏在案今臣訪聞池州府銅陵縣大通鎮等地方有不法棍徒私鑄小錢販往湖北等處售賣大干法紀隨即嚴飭安慶按察司并池州府營及銅陵縣密行查拏務獲不得妄拏無辜仍一面移會安慶江西湖北督撫各臣轉飭一體查拏獲究外理合奏聞謹奏私鑄不除錢法終弊應極力查拏者雍正十三年七月二十一日江南總督臣趙𢎞恩謹奏竊臣春間接江西撫臣常安札云廣信一府離省遙逺請將南昌總兵移駐其地以資彈壓臣以移鎮一事所關甚巨俟細察情形博採輿論再為商定覆訖閏四月二十六日續接撫臣常安札云察勘全省形勢分别三隅廣信九江二郡俱係扼要或竟移鎮於廣信廣信參將移於建昌建昌遊擊移於省城抑或移鎮於九江九江副將移於廣信而參遊亦照前更移等語臣再四籌思總兵駐劄於南昌居中為制勝之形似應仍循其舊或以廣信參將改升副將於鎮標中酌抽辨兵添增以壯軍威似較舊制更妥等因覆商再行查酌今於七月十六日準撫臣常安亦以廣信改升副將復商到臣彼此意見相同除見在會疏另題請旨遵行外所有會商辦理緣由理合先為奏明并將查明原委另單備録恭呈聖鑒謹奏更改營制務須洞逹地方形勢詳審控扼機宜斟酌至當俾後人無可擬議方為善舉否則朝設暮移徒滋一番勞擾不特無益於事亦復成何政體耶同日又奏一上江各府州屬自五月初旬得雨之後漸次稀少不均亦有受旱之處各屬勤求祈禱至六月十五以前雖前後報獲雨澤多屬微小未能透足至十六七八九等日甘霖大沛旋於二十三四以及二十七八九等日并七月初六七日以內又復疉蒙雨澤田禾俱已暢茂秋成有望尚有安慶府屬之潛山太湖宿松三縣廬州府屬之舒城滁州所屬之來安廣德州屬之建平六安州屬之英山并潁州五州縣雖經得雨而高阜之處尚未透足其下江各屬五六月以來雨澤頗得及時秋成可獲豐稔惟上江池州府屬之東流銅陵二縣下江揚州府屬之興化淮安府屬之鹽城二縣各得雨較少其低窪田禾均各暢茂而高阜禾苗艱於車戽者未免受傷臣俱飛飭各縣出給資種勸民改種蕎麥雜糧以冀秋收至江西一省前於五月初旬得雨之後旋即稀少而南康九江南昌三府所屬望雨尤切六月初旬雖間有報獲雨澤者俱皆微小至十六七八九等日霖雨滂沱通省各屬具報得以普沾者十之八九并稱旱禾漸已登場晚禾亦復茂發尚有臨江府屬之新淦吉安府屬之廬陵撫州府屬之樂安南康府屬之星子等縣具報六月十七八日得雨未甚沾足亦尚有未據報到者俟查明續後有無得雨并報到日期及各省實一本年上下兩江霍邱等州縣前據報有蝻子萌動及俱經捕淨取結各緣由經臣先後奏明欽奉硃批一面之辭未可遽信為然須更留心體訪的確欽此欽遵仰蒙我皇上恩施教誨指示精詳臣隨即密行查訪節次嚴飭在案查前經奏明之寶山等七縣並奉賢縣所報生發之蝗蟲俱已查據各屬結報撲捕淨盡臣均在又行密訪竊又有續報蝻子萌動各屬除具報旋即撲淨查明並無有傷禾稼者未敢瑣陳外今查尚有續報山陽安東沛縣并海州沭陽泰興六州縣暨富安場一處萌生蝻子見在嚴飭各地方文武官辨兵役并令多雇人夫星夜協力捕撲其山陽一縣發生地方較多臣并委標員前往查察協同力捕均俟各屬撲捕完竣密查明確另報外理合再為奏明謹奏蝗蝻非雨澤可比猶屬人力能為之事何以至今尚有未經捕盡之地耶同日又奏一松江沿海塘工臣不時移行承辦各官實力修築小心防護以防伏秋二汛兹據蘇州布政使張渠稟稱親往上海奉賢一帶土石塘工逐加查勘堅固平穩者居多惟戚家墩西第十八號石工掘勘石料較小未能一律整齊其石塘外面新築之外貼坦坡日久堅凝查較石塘蓋土低有七八寸之處見催工員修築一律告竣至內附土塘填砌浮鬆石塘外之外護土塘逐年嵗修未見加幫高厚而石塘之外護塘之內挑挖引河尚多淺窄又金山頭土石二塘之外添築小土塘一道原資捍禦金勝二山潮頭此塘土鬆樁浮多被潮坍等情臣查修築海塘乃我皇上為生民萬世永賴之基而在工承修各員豈可因循草率除飛飭該司逐一委員丈勘明白并咨會蘇州撫臣飛移總理塘工寺臣俞兆嶽等嚴飭在工各員將前項苟簡工程一一如式修補一律平穩并令查明確實另行報參又聞塘工一切動用錢糧所有寺臣俞兆嶽九年以前文案稱係火燬臣恐其中或有侵冒難開之弊查藩司為錢糧總滙其一切支放自有卷册可稽并飭該司務宜查核清楚無任工員糜費開銷并咨移撫臣高其倬會飭確查外理合據實奏明一本年五月內瓜州關外江邊查子港地方護岸掃工坍折丈尺情形并隨據工員搶築完固平整緣由經臣具摺奏聞欽奉硃批掃工既經坍折衝決之患定應不免何以未見奏及欽此仰見我皇上宵旰憂勤痌瘝民隱無微不燭至意臣查前項坍折掃工前據瓜州營守備蔣飛鵬稟報並未報有衝決臣隨檄飭淮揚道等確查尚未文覆因念一切河務時厪宸衷未敢緩待是以先即奏明旋據揚州府知府高士鑰暨江防同知李焞覆稱前項坍折者乃江崖舊掃工程離城三十餘丈內係堤岸城濠並無衝決田禾廬舍人口等情在案兹奉硃批臣又復加確查實無衝決之處理合奏明謹奏覽奏田禾廬舍並無衝決之患可謂出朕意料之外矣雍正十三年七月二十九日江南總督臣趙𢎞恩謹奏一據蘇州府吳縣稟稱蘇城於七月二十日午後風雨交作有北亨三圖地方忽起龍雨帶坍涼棚一箇并被大風吹損城隍廟殿角屋脊茶棚屋角等項大樹二株又吹損北元一圖泥土壁巷民房四間半南二圖一帶東美等四巷暨朱家園地方各民房數間等情前來臣即飛飭蘇州布政司確查賑恤外理合奏聞一據通州分司運判稟稱石港場等地方於七月初三四五六等日連次得雨河水漸長初七日夜至初八日大雨如注河水平岸隨即督率各場大使耆保人等前往沿江沿海一帶地方并移通州州牧會同飭令民田竈場居民築壩開溝預備宣泄隄防隨於初八日午後雨止初九初十等日晴霽河水漸巳消退竈地民田一切禾苗花豆俱無浸礙等情前來臣隨飛飭蘇州藩司暨兩淮運司星速委員往勘田禾花豆果否無恙并河水消退情形另報外理合一併奏明一安慶撫標兵丁蔣榮貴與民人黃花子互扭被跌在地內傷腸斷身死尸弟蔣必貴係城守營兵丁以懷寧縣相驗不公咆哮不肯收殮復率多人拉扯該縣之轎詈罵辱官肆行無忌撫標中軍參將王珽並不喝阻已經安慶撫臣趙國麟將鈐束不嚴之安慶城守副將袁有明等并該參將王珽會參在案今據該參將王珽詳稱七月十三日安慶按察使劉柏差安慶府知府郭朝端親持印文云副將袁有明已自洗白遺禍於你若不通詳扯他將來必受他害等語當將攜來臬司印文囑珽鈔録并囑通詳至十四日朝端差人持書赴珽取看詳稿珽覆且緩乃私囑懷令陶士偰將未革糧兵丁趙廷相嚴加夾訊只要供係珽之指使珽實不知情其司府之意欲兩相殘害實有慿據等情到臣臣查同城文武應宜仰遵聖訓和衷共濟於兵民方有裨益臣屢經嚴飭不啻至再今據該參將所詳大非文武和衷之誼且係參後反噬而是否確實亦難遽信除嚴飭安慶按察司暨安慶府據實回覆并咨安慶撫臣會查外理合先行奏聞謹奏所奏不自覺瑣屑乎大凡人之舉動不本諸至誠而涉於心機作用皆無益於已亦無濟於事縱操神術竒䇿究未有不被識破者惟確秉丹忱無欺無隱任勞任怨纎毫弗事趨避方能邀朕許一是字計不出此而惟權巧迎合是務所謂欲前而却行愈見其拙矣硃批諭旨卷二百十六之五
