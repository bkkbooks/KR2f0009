body:
  text: 欽定四庫全書硃批諭㫖巻三十上硃批石文焯奏摺雍正元年四月初六日河南廵撫臣石文焯謹奏為恭謝天恩并陳愚悃仰祈聖鑒事竊臣至愚至拙毫無寸長䝉特㫖補授河南廵撫奉聖諭聞衛輝府知府吳柯聲名不好開封府知府王熹年輕不諳政務據實查奏今臣訪得吳柯不能正已率屬民多含怨王熹才具平常難勝劇郡之任誠如睿鑒容臣文闈後究叅外伏查開府為豫省首郡衛輝係衝要之區正在需人臣查郎中劉公津前任江西萬年縣知縣謹飭自守諳練有才郎中張建徳前任江西南昌府同知才具明敏實心任事請將劉公津補授開封府員缺張建徳補授衛輝府員缺庶郡守得人地方有益臣謹舉所知伏祈皇上睿裁謹奏地方拊循需人所奏甚是劉公津張建徳已發往豫省矣再者聞楊宗義舊任内多有未清爾毋以親戚瓜葛瞻狥情靣務須徹底核算虚懸之項令其照數補足俾倉庫錢糧不致少有欠缺方為公爾忘私也雍正元年五月初四日河南廵撫臣石文焯謹奏為恭報雨澤情形仰慰聖懐事臣自四月初三日到任以來查據各府屬所報得雨分數如開封河南南陽汝寧歸徳汝州等府州所屬之各州縣得雨俱已霑足惟河北之彰徳衛輝懐慶三府所屬陽武原武等十四縣與河以南之太康中牟等十餘縣得雨尚未霑足仰賴皇上福庇於五月初二初三兩日甘霖大沛逺近均沾再查開封河南南陽汝寧并汝州所屬之各州縣二麥俱好秋禾長發茂盛惟河北三府四縣種麥無幾收成甚薄今幸得雨可以佈種臣一靣遍查河北各州縣果否霑足督令乘時佈種外合將雨澤田禾情形先行繕摺奏皇上仁恩普賑以來已閲兩月但麥收甚薄不足接濟題合併聲明謹奏誠可喜也爾到任未幾即䝉上蒼如此眷佑擢爾為豫撫可謂上合天心矣更須克誠克敬懋勉厥職勿替朕因直隸近日缺雨寸心頗爲不懌覽爾此奏實減一半憂懷但一切俱當實陳不可絲毫粉飾以蹈隱諱之咎雍正元年五月十六日河南廵撫臣石文焯謹奏為仰懇聖恩事臣查祥符為省㑹首邑兵民雜處必得才猷練達之員方克勝任臣查歸徳府通判祖承祚歴任二十年老成勤幹辦事有才衛輝府通判李先益厯任四年才具敏練實心任事仰懇聖恩於二員中簡用一員或授以知州職銜或授以同知職銜管理祥符縣事以示鼓勵庶於首邑地方甚有裨益矣伏乞皇上批示施行謹奏有司固須遴才然必先看操守民情愛戴方為得人祖承祚照爾所請授以同知銜令其管理祥符縣事再有要缺將李先益題補可也同日又奏爲恭報二麥收成分數仰祈睿鑒事竊查豫省河以南各府屬地方二麥已經收穫查其收成分數南陽府屬州縣十分九分不等汝寧府并汝州所屬州縣九分八分不等開封府屬州縣八分七分不等河南府屬州縣八分七分不等歸徳府屬州縣七分五分四分不等其餘河以南祥符等縣不過四分三分至河北彰衛懷三府種麥稀少收成甚薄難計分數再查各屬已種秋禾現在長茂合併奏聞謹奏據奏二麥約有一半收成蒸黎賴以餬口天心仁愛深為感幸彰衛懷三府地方秋禾可能遍種抑或餘地尚多近日雨澤何如沿河堤岸堅固無虞否此諭問各情形作速回奏以慰朕懷雍正元年六月初六日河南廵撫臣石文焯謹奏為恭報全省雨水霑足仰慰聖懷事竊查豫省河以南諸郡雨水調勻惟河北三府尚未霑足兹於五月二十七八六月初二三等日甘霖大沛逺近髙下地畆俱已十分霑足河以南地方秋禾長發倍茂即河北三府四縣亦皆普徧優渥已種者勃然興起未種者爭施畚鍤父老兒童咸稱四五年來無此透足雨澤處處均沾是皆我皇上敬天勤民至誠感格所致我等百姓惟有户户焚香上祝聖壽無疆異口同聲歡呼遍野謹據實奏聞上慰宸𠂻臣不敢一字粉飾再查秦家厰等處工程伏汛將屆接准河臣齊蘇勒以新築工程必有蟄陷坍塌料宜多備先後共動司庫銀一萬兩預備工料嚴飭管河道張杓等率同印河各官上𦂳鑲墊加幫督令兵夫晝夜看守今已入伏汛工程平穩無虞合併聲明謹奏通省霑足大慰朕懷據奏百姓歸功於朕朕有何徳惟以手加額感上蒼之眷佑彌篤戴皇考之垂蔭無窮耳雍正元年六月初十日河南廵撫臣石文焯謹奏爲奏聞事竊查六月初八日酉刻據把總張朝弼禀報本日河水驟長黄河南岸中牟縣地方十里店西衝開大堤水向南行飛報前來臣即刻委開歸道陳時夏督同開封知府王熹星夜前往查勘并於司庫動發銀三千兩辦料去後初十日據開歸道陳時夏馳回靣禀查勘得十里店西衝開口子二處一在上流者刷寛十一二丈一在下流者刷寛十六七丈臣伏查黃河水勢因北岸秦家厰等處工程完竣之後水始復歸正河尚未刷深兹五月二十聞謹奏河南赤子黃水為災朕心深為惻然其應用之項不限多寡爾即一靣動用作速堵築一面題奏并報明該部朕念豫省諸務紛紜特命嵇曾筠率領揀選人員等前往協助爾與齊蘇勒料理河務并察賑災民均宜盡心籌畫允妥毋得少忽雍正元年六月二十六日河南廵撫臣石文焯謹奏爲謹陳河工情形仰祈聖鑒事竊查豫省黃河自秦家厰決口奪流河身淤髙漫溢堪虞一入伏汛在在危險今北岸馬營口等處自六月初一等日沁黄並漲以致堤壩多有塌卸蟄陷當即動料晝夜鑲填搶䕶無虞又北岸桃園口等處有支河三道引溜北趨堤根勢甚危險已經動支庫銀責令北河同知潘尚仁等於迎溜處下埽保䕶再南岸蔣家寨等處水逼大堤工甚危險隨飭南河同知劉永錫等備料搶䕶以上各處險工俱已搶修防䕶無虞其南岸中牟縣之十里店婁家莊二處衝開大堤漫溢之水由十里店西南入賈魯河流至朱仙鎮入洪澤湖惟朱仙鎮人煙凑集河身淺窄遂致出槽泛溢鎮上房屋間有被水淹浸晚種禾豆不免少有傷損已飭行該府縣確查加意撫恤毋致失所臣武闈事竣親赴衝溢處所查勘現因伏汛之内水勢時長時消俟水勢漸次消落便可相機堵閉至奉㫖交員外郎祖秉圭等齎到嵇曾筠條奏㑹商武陟工程善後事宜臣經咨商河臣齊蘇勒嗣准咨覆以月堤内不必下攔水埽止應將大月堤靠小尾堤加幫髙厚二舖營迤西應築格堤一體確估興築等因臣隨轉飭河道發銀辦料興築在案所有各工銀兩統俟工完之日㑹同河臣齊蘇勒嚴加核減造冊題銷外合將修築搶䕶各情形具摺陳明謹奏閱奏一一皆中肯綮南北岸堤工捍禦有方保䕶無虞殊屬可嘉凡爲臣子者果有爲國効忠之心其後必昌爾長男石禮哈可謂跨竈之子朕實代爾欣悦之至同日又奏為恭繳御批據實回奏仰祈睿鑒事六月十八日臣進摺人回奉到皇上御批據奏二麥約有一半收成蒸黎賴以餬口天心仁愛深為感幸彰衛懷三府地方秋禾可能遍種抑或餘地尚多近日雨澤何如沿河堤岸堅固無虞否此諭問各情形作速回奏以慰朕懷仰見皇上宵旰憂勤無刻不以民生為念除河工堤岸情形另摺具奏外臣查河北彰衛懷三府得雨之後遍行勸諭百姓已爭施畚鍤及六月初二三等日大雨透足據各屬禀報已經盡行補種現在長發茂盛西成可望誠足仰慰聖懷惟據歸徳府申報所屬之永城睢州等州縣因江併查如有田禾被傷之處加意撫恤外理合一併陳明謹奏河北三府窮黎饑餒之餘若不得秋禾大熟何能稍復元氣覽之欣慰同日又奏為謹陳截漕虧空仰請著落賠補以實倉廩事竊查河南省歴年截留漕糧採買米穀甚多實在存倉無幾仰䝉聖明洞鑒特諭臣詳查議奏行據糧道陳時夏逐一查明造册呈送前來臣覆查康熙四十三年分截留漕糧今止存穀二萬五千一百五十一石又五十九年分截留本折漕米今止存米三萬六千四百五十石又六十年分截留本折漕米易穀今止存穀三萬一倉十萬石此前撫臣楊宗義任内之事雖折色定價每石銀六錢五分不敷採買彼時市價相去猶不甚逺乃楊宗義一任遷延米價昂至三倍以致迄今尚未買貯照一米二穀例收貯應買穀二十萬七千四百六十二石相應請㫖著落楊宗義將不敷米價照數添足於河南府地方買穀分貯各屬再查此項未買米内有開封府屬之杞縣等縣領價採買拖欠米石今勒限一年令各縣照一米二穀例賠補貯倉如逾限不完題㕘究追倘力不能賠將本官嚴加治罪著落楊宗義賠補再四十三年缺少穀石係汜水縣革職知縣王召祥虧空未經題㕘亦應著落楊宗義賠補又已㕘衛輝府知府吳柯祥符縣知縣卞永祐等虧空五十九年領價未買米石及四十三年虧空穀後催還一半明嵗秋收催追全完還倉倘至期完不足數著落該州縣照數賠完如不完將本官嚴加治罪亦著落楊宗義賠補又五十九年六十年缺少米穀查據汲縣等縣俱稱因公那用仰請聖恩定限一年勒令賠補如逾限不完即行指叅將本官嚴加治罪亦著落楊宗義照數賠補又已叅武陟縣知縣朱凜廸虧空六十年穀石現在審追如不能完亦著落楊宗義賠補至六十年懷河二府存價未買穀石俟秋收後勒令照數買足貯倉臣謹據愚見詳議具奏未知是否伏祈皇上睿裁敕示施行謹奏所奏條分縷析欵項甚明此内有應緩者稍為寛期不應緩者即行題奏倉穀之數既清庫帑虧盈若何亦宜詳加查核爾傳諭楊宗義著伊竭力清椘虧項若能彌補全完不特保全性命尚可邀朕優容伊若觀望遷延妄希倖免則斷然難逃國憲直隷山東虧項趙之垣李樹徳俱經清椘朕巳格外從寛矣爾當詳悉開導令其醒悟不可絲毫狥庇有違朕諭徳音是一榜様爾所稔知者此輩貪饕朕所深悉今令其那私補公尚不及向所侵蝕十之二三倘伊執迷抗延如故即一靣拏問一面題㕘若為此項虧空少累吾民并累及無干之地方有司爾將來有何靣目見朕耶雍正元年六月二十八日河南廵撫臣石文焯謹奏為恭謝天恩事竊中牟南岸十里店堤工衝決臣深知罪愆莫逭刻不自安荷䝉聖恩寛宥指示周詳臣捧讀訓㫖感激涕零謹望闕叩頭謝恩惶悚無地伏念臣歴任有司素未經理河務今䝉聖明鑒念應用之項恩諭不限多寡一面動用作速堵築一面奏聞復命嵇曾筠率領官員助臣與齊蘇勒料理臣受恩愈重報稱愈難惟有凛遵訓㫖上緊堵塞慎擇用人不致無益浪費臣現在駐宿工所親督河道張杓等相機堵閉上緊儹修數日之内十里店西口可以先竣至南岸滎澤縣迤西原無堤岸今河身淤髙恐水發泛漲河臣齊蘇勒臨工親勘已彚入加幫案内估計築堤工尚未竣於六月二十一夜黃水陡長將新築堤工汕開十餘丈水勢南趨以致朱仙鎮水勢復長比前次更大四尺有餘兩岸房屋土墻被水淹浸坍塌甚多臣已委布政使牟欽元親往查勘加意撫恤毋致失所再六月二十七日據懷慶府通判髙士鑰等申報本月二十二日沁黃並漲水從姚其營無堤處漫灘而來至馬營詹家店之西新堤頭漫溢而過汕塌十餘丈又梁家營南二舖營南水從堤根漏入漸塌二丈有餘又馬營前大壩漫溢水勢直浸後大壩等情臣即委管河道張杓等上緊搶修并動發司庫銀五千兩解交應用臣現住十里店俟南岸決口工程就緒即星赴北岸相度情形親督修理為此謹奏今年河決實屬意中之事此時不過隨宜捍禦茍安目前而已斷不能奏一勞永逸之效兹特命張鵬翮前來㑹同爾與齊蘇勒嵇曾筠熟籌深計久安長治之䇿待秋汛後須大費一番經營也雍正元年七月初五日河南廵撫臣石文焯謹奏為恭報馬營水勢消落情形仰祈睿鑒事竊查六月二十二日黃沁水長交㑹泛溢汕刷堤壩情形臣一靣具摺奏聞一面即親往查勘馬營地勢窪下水從姚其營等處漫溢致將馬營等處堤壩汕刷過水漫及原武仰賴聖主至誠昭格河神黙佑大溜仍走正河此處並未成流非從前衝決可比是以秦家厰等處工程俱平穩無虞今水已消落數尺各決口悉已斷流涸出口岸現在備料募夫臣㑹同侍郎臣嵇曾筠細加相度務期補築堅固上副聖懷再中牟十里店漫口二處正在上𦂳施工俟堵閉合龍另摺奏報至滎澤新築堤工漫開之處已據同知劉永錫搶築堵閉朱仙鎮水已消退所有被水災民欽遵上諭㑹同嵇曾筠仰體聖主軫恤徳意遍行查賑姚其營等處被水田禾村舎一體查明賑恤毋致失所外再查河北未種之地悉已補種秋禾茂盛佇慶豐收理合一併奏聞上慰宸衷謹奏狂瀾順軌此中豈無神助爾中州黎庶時厪朕懷覽奏稍紓已溺之憂雍正元年七月十一日河南廵撫臣石文焯謹奏為奏聞事竊臣接准河臣齊蘇勒揭帖知於六月二十八日起程來豫侍郎臣嵇曾筠即先赴中牟查勘臣將馬營工程飭令管河道張杓等加謹防䕶臣亦回中牟㑹同嵇曾筠上緊堵閉決口並查賑被水饑民俟河臣到日將各處工程㑹商另奏外查河南全省地方自夏徂秋雨水調勻田禾茂盛長發暢遂佇慶豐登至歸徳府屬所報飛蝗已經盡行撲滅並未傷損田禾理合一併陳明謹奏今嵗秋成實出望外山東山西直隸等省大率相同朕誠感戴天庥不勝慶幸之至雍正元年八月二十七日河南廵撫臣石文焯謹奏為著落賠補虧空仰祈聖鑒事竊臣欽奉諭㫖清查河南省節年截留漕糧尚未採買並無實貯經臣詳議著落楊宗義賠補之項具奏請旨仰䝉聖鑒逐條批示諭臣傳諭楊宗義今楊宗義已到河南臣謹遵聖諭詳悉開導楊宗義感激聖恩凛畏國法據稱我䝉皇恩寛宥如此敎導若不竭力完補良心何在今已湊銀十五萬三千兩彌補虧空此外如有未清之項情愿再行湊辦等語查楊宗義任内未買五十九年漕米十萬三千七百三十一石除原存部價外按時價毎石添出銀九錢五分共該添出銀九萬八千五百四十四兩又應賠補未經查叅之汜水縣知縣王召祥虧空并武陟縣知縣朱凜廸虧空漕榖毎石照時價八錢共銀一萬一千六百零七兩以上三項共銀一十一萬一百五十一兩如數兌交道庫俟臣遴委賢員採買貯倉仍於截漕案内造冊報部再四十三年民借未還榖三萬八千二百三十四石䝉聖諭此項恐揑作民欠亦未可定汝當研究的實酌量行之若係假揑則著落楊宗義賠補若果實係民欠何必徴收一半即緩限一年亦無不可欽此欽遵臣已令楊宗義將此項民借穀石照時價毎石八錢兌交銀三萬五百八十七兩收貯道庫仍令各屬勸諭百姓聽其自行交倉以一年為期所有不能還完之數即將楊宗義所貯銀兩買補再查錢糧虧空所有臣任内查㕘之衛輝府知府吳柯等六員虧空銀米穀石現在審追如力不能完將本官照例治罪其未完之項著落楊宗義賠補再查各屬尚有未經㕘出之虧空銀一十四萬五千一百餘兩穀一十六萬三千五百餘石伏讀聖諭凡有虧空無論已經㕘出及未經㕘出者三年之内務期如數補足今臣勒限二年内將所有羡餘積累補苴不許額外科𣲖絲毫貽累百姓倘敢陽奉陰違察出從重㕘處如限滿不完將本官照例治罪外其未完銀穀亦著落楊宗義賠補如此則國法既伸帑項有著而監守倉庫之官皆知所畏矣是否允協伏候睿裁謹奏所議彌補之法甚是但必毋致苦累新任州縣各官方為善舉須通計毎一州縣應得羡餘多寡若干酌量以若干留為養㢘以若干除為補苴好言勸導令其節用省費陸續完補庻可禁其營私巧取不致朘削百姓若不量其所出所入致令資生餬口無䇿而誡之曰㢘潔自矢毋得掊克小民雖三令五申恐未必心悦誠服如法奉行也事須兩全爾其勉之同日又奏為詳議完補虧空之法仰祈聖裁事竊臣查豫省從前各撫臣及楊宗義任内已經㕘追各案虧空尚有未完銀七萬二千三百餘兩未完穀三萬三千八百餘石有本犯已經身故著落家屬追比日久無完者有本犯雖現在著追任所無可變賠者是徒有追比之名究無補苴之實臣思完補之法若以通省俸工抵補則豫省俸工因抵補軍需及堤工等項直扣至雍正九年始得補完若以通省耗羡抵補則謹飭自守並無虧空者所得羡餘反為他人抵補而奢侈妄費恣意虧空者轉累他人代賠似非情理之平查廵撫衙門向有府州縣節禮臣荷皇上知遇隆恩潔已率屬㫁不敢收受重負委任至意但原係出自耗羡之内並非科𣲖於民臣既不收受是徒有利於屬官究無益於百姓莫若將此項節禮令各屬繳存司庫留為抵補虧空之項以完國帑既非額外加𣲖有累民生而帑項亦皆有著矣臣愚昧之見是否可行伏候睿裁勅示施行謹奏朕為天下臣民主以廉潔礪風化豈可諭令督撫收受節禮凡地方倉庫之設原爲預防水旱凶荒所謂有備無患理宜實貯方克濟用汝等受朕分閫重任一省之中事無巨細莫非爾責其間截長補短裒多益寡總在汝通融而為之耳若果上不虧公下不累民一皆合乎人情物理之宜則人亦未有不諒汝心者至於苞苴之路宜絶不宜開何可以言餂之耶同日又奏為恭繳硃批事竊八月十四日臣齎摺人回奉到硃批二摺臣敬凛欽遵又䝉聖主密諭三道仰見皇上宵旰憂勤勵精圖治營伍情弊無一不在聖鑒之中再舉行社倉誠備荒之美政設立保甲爲弭盜之良圖聖諭指示周詳無微不悉臣謹盡心籌畫徐徐舉行一聖明諄諄告誡之至意也再秋汛水勢時長時落各處分數俟各屬報齊另摺奏聞外查衛輝府通判李先益臣因其署汲縣事聲名頗好經臣將祖承祚同該員奏請補授祥符縣缺荷題補令其照舊供職臣不敢不據實奏明自蹈隱飾之咎仰祈聖鑒謹奏覽同日又奏爲臨河地方緊要請定州縣調補之例以收得人之效事竊惟黃河經行豫省千有餘里自滎澤以下南北兩岸皆有堤工而北岸尤關運道均應加謹防守查江南同知通判専司河務至河南所設同知通判管轄數縣堤工而辦料募夫防䕶皆責之州縣是河南州縣官員有兼管河務之責必得勤幹之員庶不致累民悞工臣查南北兩岸之祥符滎澤等十四州縣相應請定調補之例於本省官員内選擇調補三年内果能盡心辦理工程平穩照例保題以應陞之缺即用現在官員内人地相宜者照常辦事請自雍正二年起扣算三年考核保題陞用外若不相宜者臣於本省現任官員内選擇調補庶臨河地方收得人之效矣臣謹遵酌調繁簡之訓㫖敬陳末議伏候聖裁謹奏所議是即行具題雍正元年九月初二日河南廵撫臣石文焯謹奏為恭報收成分數事竊查豫省地方自五六月間甘霖疊沛以來田禾俱已成熟陸續登塲行據布政司查報各屬收成分數開封歸徳河南南陽汝寧等府屬俱十分至八分不等彰徳衛輝懷慶等府屬并汝州所屬俱九分至七分不等是皆仰賴聖主愛養民生憂勤宵旰上感天和遂得轉歉為豐閭閻大有起色闔省黎庶共慶盈寧咸歌帝徳理合摺奏仰慰聖懷謹奏今嵗北四省收成實為朕意想之所不到浩蕩天恩惟有以手加額稱慶不已先儒有言人事修於下則天和感於上此皆汝諸臣仰體朕𠂻以實心行實政之所致也睹兹感應之速益信賞罰之徴更當時加凛惕懋勉厥職以仰答洪庥特諭聞襄南知縣周應還居官頗好未知然否爾察明據實奏聞嗣後凡有諭問皆當直陳毋得稍事迎合以失中孚之義一豫省之水利宜興也臣去時二月間過彰徳衛輝一帶地方見赤地千里民多饑色臣回時七月間又過彰徳衛輝一帶地方見禾黍滿田與前大異總之河南人拙耕種全望雨澤不能如别省之設法取水臣見山西灌田多用井四川灌田多用堰湖廣灌田多用龍骨車惟河南全不講究如漳河淇水皆可引以灌溉求敇諭撫臣開通溝洫因地制宜或築堰或鑿井或用車行之數年則旱不為災而家有蓋藏矣有人條奏水利一欵朕思農田雖仰賴雨澤全藉水泉滋潤之功長養禾稼不但河南一省凡北省近水之處皆可舉行但欲速則恐不達且愚民可與樂成難與謀始須當徐徐鼓舞勸導令其灼見有益則自然踴躍趨赴必得實心任事之州縣牧令相地形之髙下度水勢之淺深或宜鑿井以資灌溉或宜開渠以制蓄洩周詳籌畫方得要領爾等觀此條奏㕘酌豫省土俗民情悉心講究以期成效其取水等法實有益於田畆但慮北地民人性拙習懶不善製造器具不樂服役勞瘁爾等要須大費一番心力示以巧式誘以後效又從而奬勸之庶可望其通行無輟否則徒為紙上空言耳何實濟之有勉之勉之雍正元年九月二十二日河南廵撫臣石文焯謹奏爲遵㫖回奏事竊九月十五日臣齎摺人回捧到硃批奏摺䝉頒發水利條奏一件伏讀上諭指授機宜洞悉民隱臣查豫省民人耕種全賴雨澤灌溉之法素不講求設遇亢旱即致收成歉薄臣到任時見一路地多髙阜因思鑿井耕田相資為用以時灌溉補救實多已飭令各屬州縣先為如法試驗使民知有益再行勸導有力之家鑿井灌溉自是收穫倍豐人情趨利將見小民漸漸仿行矣今䝉聖訓周詳遵即轉飭州縣相度地勢凡近水之處應作何開溝引水以灌田禾確勘妥議臣著實留心料理徐徐勸導務期行之有效上副睿懷謹奏凡百事宜實心奉行自然有效若苗莠不分良楛莫辨惰者不加懲勤者不加勸則上寛下慢遞相倣效府州縣率皆草率從事茍且塞責豈止水利不能興舉地方上多一事反多一番滋擾耳何益之有哉雍正元年十二月十三日河南廵撫臣石文焯謹奏爲恭謝天恩事雍正元年十一月准吏部咨開河南廵撫石文焯三子石禮圖給以二品廕生奉旨依議欽此欽遵知照到臣隨恭設香案望闕叩頭謝恩訖臣蒙聖恩髙厚委任封疆乃賦性庸愚愆尤日積兹於感深欲泣之中益切曠瘝之懼返躬自責愧汗長流惟有矢志濯磨奮勉供職并訓臣子石禮圖隨任殫心學習共竭駑駘之力上報君恩於萬一耳爲此具摺恭謝天恩以伸感戴微忱謹奏古人敎子不以言敎以身敎自未能無忝臣道何暇論及子道諸凡總是泛泛在邊幅上修飾不肯傾肝吐膽從誠實中發出何能邀朕之信任倚托爾等老吏閲歴既久身家念重日就月將做成一個巧宦習氣難除末如之何朕如此推心置腹竟感動不出一點真心來仍然千私百弊交結於胷懷怙終不悛將來恐噬臍莫及也雍正二年正月二十二日河南廵撫臣石文焯謹奏為請㫖事竊臣衙門所有司道規例及府州縣節禮俱已盡行革除惟向例有臣衙門一分火耗留以養㢘此外不敢萌一毫私念惟是原奏將府州縣節禮繳存司庫以補虧空自臣上年四月到任至歳底止共收存司庫銀三萬五千八百六十兩又臣原奏將司道規例節省湊補楊橋工程借動之項今已節省銀二萬兩但虧空與借項既於通省耗羡内劃補則以上二項共銀五萬五千八百六十兩應行歸公或解充西寧軍餉或應作何公用伏乞睿裁謹奏助餉之説斷然不可止可留作本省公用如補苴虧項修理城垣道路橋梁堤岸及兵馬器械犒賞之需庶幾以公完公耳若以此項捐助軍餉轉借名於彼處加倍虧空諺所謂東坍西漲此等作爲朕不樂聞至地方公用之處或慮朕知之不悉不妨將用過數目逐一開除摺奏以聞特諭同日又奏爲再陳愚悃仰懇聖恩事竊查豫省黄河工程修築防䕶在在需人河官不敷委用皆係調委府州縣等官在工辦事是以一有缺出就近毎乏委署之員經臣奏請揀選候補候選人員發來河南補用未蒙俞允臣思我矣再查河南地方麥苗長發甚盛十里店楊橋兩處工程自去冬合龍以來加謹保固甚是平穩南北兩岸堤工現在擇險先修種種善後之圖臣已與嵇曾筠齊蘇勒次第商議具奏外今科場屆期臣遵例入闈監臨桃汛在即一􅋀工程事宜有嵇曾筠親督印河各官効力人員辦理無煩睿慮謹奏成之累月甚難敗於一朝甚易河堤防䕶最為𦂳要嚴諭屬員刻無怠忽同日又奏為奏明事竊以錢糧闗乎國計所當盡心籌畫務期舊有之虧空盡行補完將來之庫項永無懸缺方爲盡善臣上年查豫省歴經㕘出各案虧空從前追比年久任所無可變賠者原議將臣衙門向有府州縣節禮令繳存司庫留為抵補又未經㕘出之虧空臣議令州縣將自已所有羡餘積累補苴不許額外科𣲖俱經摺奏蒙皇上硃批訓示周詳臣捧讀諭㫖仰見我皇上聖徳如天明同日月自知前議猶未周到因細加革除地方一應公用槩不議捐以杜州縣藉口之將正項即行起解使經徴官絲毫不能侵那則庫項永無虧缺矣所有耗羡各州縣輕重不等毎兩約一錢三分有零通計全省額徴地丁銀三百六萬餘兩約耗羡銀四十萬有零除通省各官酌量給以養㢘及各項雜用公費悉於耗羡内支應不復議捐外毎年約可餘耗羡銀十五六萬兩解貯司庫彌補虧空抵還借項及辦公事之用是舊有之虧空可以完補庫帑不致懸缺矣州縣既無公捐之項所給養㢘足資食用可以永無虧空至於上司各衙門俱有養㢘不致苛求屬吏是勒索之事亦可永絶矣徴收錢糧既委員拆封州縣不能統俟奏銷時將一年所收耗羡及各官養㢘公事動用歸還借項劃補虧空各欵逐一開明具摺奏聞不敢絲毫隱飾所有贏餘收貯司庫請㫖遵行爲此具摺陳明伏祈睿鑒謹奏此奏纔見著實非從前泛泛浮詞可比封疆大吏原當如此通盤合算如何抵項如何補苴若干作爲養㢘若干作爲公用説得通行得去人心既服事亦不悞朕自然批個是字若綱領條目茫無頭緒公私上下全未安排但籠統含糊云錢糧要𦂳徒爲紙上空言有何實際譬如終日説食腹未一飽爾等不將出一個真字來欲邀朕見重如何可得且清釐積弊必毫無瞻顧毅然自任方有成效若不甄别屬吏舉直錯枉依違可否於其間即爾此奏亦恐徒法不能以自行模棱之病較之苛刻其害更甚不可不知况進賢退不肖乃行政之大本致君澤民豈鄊原所能爲之事歟雍正二年三月初三日河南廵撫臣石文焯謹奏爲奏明事竊查河北三府荷蒙皇上念􅋀民生捐收穀石爲儲備之計於本年二月初九日接准部覆現在出示開捐臣查毎穀捐一石有院司茶果儀二錢臣與藩司在錢糧耗羡内各有養㢘何敢又收此項但向來各處捐納事例正數之外皆有使費原出自伊等情愿以臣愚見莫若收貯司庫積少成多統計收足穀四十六萬石犯即行從重㕘處臣謹㨿實奏聞仰祈聖鑒謹奏可雖收存司庫不過暫寄以備地方公用斷不可歸入錢糧之内凡此等羡餘槩不得牽混正項國家經費自有常額全不賴此若將此算爲正項爾等羡餘必仍然另取不特名實相違且恐移東就西反致滋弊害事同日又奏爲恭繳硃批再陳愚悃事竊臣疊蒙聖訓諄切周詳天髙地厚之恩有加無已臣惟益深兢惕實心辦事以圖報稱不敢存一毫私見自干嚴譴臣查向來上將耗羡歸公所有一􅋀規禮臣已通飭盡行革除臣通盤合算約計一年耗羡共四十萬兩有竒酌議學政養㢘銀四千兩布政司養㢘并衙門一􅋀公費共銀二萬四千兩按察司養㢘并衙門一􅋀公費共銀一萬兩開歸道養㢘并衙門一􅋀公費共銀一萬兩管河道四千兩南汝道三千兩開封府四千兩歸徳等七府各三千兩理事同知一千延津等十二小州縣各六百兩至臣衙門舊例毎以及提塘報資添設塘馬工料貼補解費因公差遣盤費州縣起解錢糧路費等項皆於耗羡内支用總計一年約共需銀二十四五萬兩尚餘耗羡銀有十五六萬兩臣斟酌彌補虧空及抵還借項統俟奏銷之時逐一詳開清摺具奏所有贏餘銀兩存貯司庫另行奏聞至臣原奏存司庫銀五萬五千餘兩凛遵諭㫖留充本省公用合併陳明謹奏人之有技若已有之爲秦誓所稱汝此數奏係效法諾岷之所爲頗合見賢思齊之義但伊從自已創始能力行其言今汝所奏雖同亦須照伊力行方克㜶美倘行不逮言則徒多一番饒舌耳事君之道盡得一分真誠有一分便冝能盡十分真誠便有十分便宜若曕前顧後畏首畏尾自已主意不定欲討便宜反致喫虧臨時方知朕言之不謬也勉之同日又奏爲備陳補苴虧空仰請睿裁事竊查豫省虧空臣已奏明以耗羡抵補謹將各案虧空分别補苴之法爲我皇上陳之一從前承追各案虧空除已完外現在未完銀穀遵照定例嚴查必係實無可追者在所收雍正二年耗羡内劃補一臣到任後節經題㕘吳柯等十案虧空如力不能完著落楊宗義賠補不在耗羡抵補之列一各屬虧空銀穀自上年八月内具奏之後即催令各屬陸續彌補現在止有未補銀九萬五千餘兩穀一十二萬八千餘石内有罔知節羡留爲抵補此亦不在雍正二年耗羡劃補之列如此分項補苴似得情理之平是舊有之虧空約奏所言皆是但看行之何如耳雍正二年三月二十四日河南廵撫臣石文焯謹奏爲恭繳硃批併陳愚悃仰祈睿鑒事三月十八日布政使田文鏡到豫備傳諭㫖又於二十二日奉到硃批奏摺臣仰荷聖主諄諄敎誨造就成全頂戴隆恩感深涕下伏念臣本無寸長蒙我皇上逾格超擢何敢不出真心以圖報稱特是才庸識淺未能上副委任殊恩日深内愧因將錢糧一事效法諾岷而行斟酌區畫兩次奏聞更蒙睿懷至州縣養㢘蒙聖諭食指繁者未必足用仰見我皇上體恤臣工之心無所不至臣謹遵恩諭俟虧空補足時當與田文鏡斟酌另奏又緩徴州縣虧空臣與田文鏡再行嚴查如有數多者即行㕘追再收捐所有院司羡餘臣已奏明暫存司庫以爲裨益民生之用理合一併據實奏明伏乞睿鑒謹奏諸惟爾等悉心區畫認真辦理莫慮朕不見知也同日又硃批陜西山西山東江南同日得雨爾省自然普遍霑足查闔省州縣果俱報得雨是河南省均沾膏雨已在聖明洞鑒之中今南陽汝寧汝州所屬各報於三月初一初七等日得雨現在二麥茂盛收成有望民情悦豫再臣於出闈後親赴南北兩岸查勘工程平穩其卑薄堤工應行加幫之處臣與嵇曾筠酌擇險工上緊興修以資捍禦合併奏聞上慰聖懷謹奏豫省河工朕日夜厪念必使中州赤子永無衝決之患方愜朕心當督率屬員竭力興築用心防䕶時刻毋得稍忽在爾任内爲第一要務人事果修天鑒不爽尤在爾之忠誠上格庶可望安瀾之慶也内閣侍讀學士臣班第謹奏爲奏聞事竊臣到河南鞏縣祭享有宋諸陵忽有生員同百姓人等攔路訴稱知縣張可標託名預備祭祀費用强𣲖民財等情具呈控告臣所到之處一飯之外禮物概行謝絶而地方貪婪官吏乃託名祭祀科𣲖小民因交與陪祭之彰徳府知府朱鈞問明口供以便行文廵撫隨據朱鈞覆稱知縣張可標去年因驛站事曾借用部民銀數百兩此番祭祀雖亦借貸尚未全交今已退還百姓近因知縣出示生員與百姓一體當差因此生員懷怨誣告今情願息訟乞將原呈退還等語併具有情願保結及印文投遞臣復細問生員百姓等僉云知縣强借銀兩甚多不獨今日一事我等小民何敢以無影之事誣賴本官今知縣情願照數清還强借銀兩改前所行我們知縣也還老實惟有寫字人周姓與書辦劉姓者甚是兇惡我等衆人受其荼毒已到極處倘將此二人革除我等便可安枕惟求將原呈發還等語臣又暗行訪問此番首告亦非衆人本意知縣張可標素與敎官楊倬生不和因唆其生徒首吿衆人恐致情事張大故求茍且了事知府朱鈞亦恐廵撫怪其不能息事以故力為周全臣即照呈謄錄一紙收貯將原呈發還令知縣將所借銀兩清還百姓仍遵舊例不令生員與百姓一同當差將告示收回其書辦劉姓等立行逐革不可因百姓首告挾讐伺釁以求報復同敎官二人互寫保結眼同交與朱鈞臣即起身赴京此事雖屬細㣲但皇上自御極以來整理庻政務期弊絶風清似此有闗吏治民風之事臣何敢匿不上聞謹具摺備陳情由伏祈睿鑒謹奏前遣致祭宋陵班第回京奏此一事爾地方上竟有此等貪官此等惡習殊為不法之甚宜細細訪察知縣張可標敎官楊倬生欵跡併將生事之衿監及姦胥猾吏等重䋲以法知府亦豈能辭私和之咎槩難寛宥必痛加懲創一番方能革除積弊但班第既回前事已過當另爲發端以彰國憲伊不過偶爾相值即有此等事件可見爾所屬境内似此劣員穢跡刁衿蠧役豈止一州一縣自然他處更多爾為封疆領袖所司何事若不能措施政令移風易俗仍前因循闒茸則大爲溺職矣督撫大吏豈郷原所堪亟當奮勉振作以副朕委任之至意硃批諭㫖巻三十上欽定四庫全書硃批諭㫖巻三十中硃批石文焯奏摺雍正二年二月二十二日河南廵撫臣石文焯謹奏爲捧讀聖訓感愧交深謹據實陳明仰祈睿鑒事欽奉皇上硃批諭㫖併發班第奏摺等件到臣叩頭跪讀愧赧無地竊以地方有司庸劣之輩毎多藉端向富戸借貸此等惡習難逃意臣監臨文闈時乃有河南府屬之鞏縣知縣張可標巧借祭陵名色又以封櫃為辭膽敢借貸致起事端而敎諭楊倬生挾有私嫌於是從中播弄迨臣出闈即據陪祭之彰徳府知府朱鈞禀知其事臣隨以不職糾㕘立行摘印已奉㫖革職究審治罪其原㕘䟽内未曾明言其事者葢恐諭㫖而行至朱鈞原係委令前往陪祭適逢其事奉發審問口供嗣因原呈人等於班第處哀求息結故聖心時加密訪屬員之中一有劣蹟即行嚴㕘以爲貪黷之戒臣不肯舎己徇人自詒伊戚凡爲人臣分當實心爲國班第所奏是其不敢隱蔽之忠誠臣益當效法以報主知謹披瀝愚悃伏乞睿鑒謹奏諺云説得一丈不如行得一尺宣聖所以聽言必觀行也積年老吏之習不合封疆重任之體總要規模𢎞濶志慮精白不屑屑於市恩避怨方爲無忝厥職同日又奏爲據實陳明仰請聖裁事竊查開歸道兼管通省漕糧驛鹽等務責任綦重臣到任後見陳時夏居心忠厚操守㢘潔但不曾歴任外官一切政務多所未諳於採買漕米一事因部價不敷甚畏難憂懼督催兌運毎事過於寛厚弁丁遂多藐玩稽延臣謹據實奏事祖承祚臣聞其實心辦事是以奏請管理祥符縣事今查祖承祚毎事過於慎重未免失之遲鈍不能理繁治劇臣不敢以先經保奏之員遂為徇隱查許州知州王士俊係奉㫖揀選發来題補之員留心政務辦事勤敏仰懇聖恩將王士俊以知州調管祥符縣事許州地僻事簡即以祖承祚調管許州知州一轉移間則繁簡適當矣又尉民縣知縣馬作肅係山東進士到任未久臣於文闈見其年非壯盛才亦平庸難膺民社之寄伏祈聖恩將馬作肅改補敎職實爲允當理合一併陳奏伏乞睿鑒敕示遵行謹奏所請皆具疏題奏爾省中屬員養㢘甚不敷用不肖州縣竟有設法巧取之説當同田文鏡留心察訪嚴行誡飭聞吳如譯聲名不好廢弛營伍果然否查奏以聞豫省官塘以及偏僻道路烟墩俱宜整理修葺直隷山東道傍皆遍種樹木此法甚善今嵗似已過期可預行通飭備辦俟明春乘時栽植毋悞若不訓戒屬員借此或致擾民生一事又不如省一事也雍正二年閏四月十三日河南廵撫臣石文焯謹奏爲奏聞事竊查河南全省地方麥己收穫約有十分九分八分不等農夫野老歡聲遍野共祝聖夀萬年其收成分數俟各屬報齊另勿使爲害又黄河兩岸工程臣加意嚴飭防䕶俱獲平穩一􅋀修築事宜臣與嵇曾筠同心協力商酌辦理以求上副聖懷合併陳明謹奏伏汛已過之後方可言得平穩效克奏於勤患毎貽於怠慎之慎之同日又奏爲據詳陳明仰懇聖恩事竊查豫省駐防官兵嵗需米豆草束各價值例係一年兩次照時估報所有康熙六十一年十月起至雍正元年四月底止經前撫臣楊宗義確訪時價粳米毎石一兩八錢粟米一兩七錢黑豆一兩五錢草毎束一分九釐估價具題部覆行令逐一核減臣於上年四月内到任後復行確估查原估價值委因連嵗收成歉薄各價騰貴實無浮冒難以核減經臣具疏題覆又雍正元年五月起至九月底止米豆草束照依時價從減估報亦經具題在案適因四川成都府駐防官兵應需豆草米折等項銀兩戸部具題奉㫖諭吏部戸部兵部各省給發駐防官兵米穀草豆等項價值不一除已有定額省分照常給發外其餘未曾定額省分多寡不符理應將本省歴年給發之價酌處其中畫一定議價值一定便於遵行如遇年豐價平稍有贏餘於官兵亦屬有益倘嵗歉價貴該督撫據實陳奏朕自加恩欽此隨經部議定河南省粳米毎石一兩五錢粟米一兩二錢豆一兩一錢草毎束一分七釐等因具奏奉㫖依議於雍正元年七月十八日准户部咨行到臣欽遵在案所有兩次題估各價值部咨行令俱照中價折給除雍正元年八九兩月在奉文之後遵照折中數目動給外其六十一年十月起至雍正元年七月底止俱於未奉文之先早已照依時價採買供支今據布政使田文鏡詳稱此項給過米豆草束若照折中定價報銷勢必追出還項但官兵久已贍養家口餧飼馬匹若問之採買之人又係行户照時價發買並無浮冒相應請照原估核銷等情臣恭繹上諭倘嵗歉價貴該督撫據實陳奏仰見我皇上至聖至明愛養官兵之至意是定中價之後設遇歉収仍准奏請今元年七月以前所給米豆草束原因嵗歉價昂採買銀數比折中定價計多銀一萬二千餘兩屢據司詳請照原估核銷臣以事闗多給未敢市恩具題理合備叙情由繕摺具奏恩出聖裁如䝉皇上俯允將未奉文之先給過米豆草束價值仍照原估核銷仰懇敕諭該部查照施行伏乞睿鑒批示謹奏未敢市恩具題是何言歟駐防官兵不止豫省一處國家糧餉自有定制亦非朕市私恩之物具本聽候部議雍正二年閠四月二十一日河南廵撫臣石文焯謹奏爲奏明事竊查開歸道陳時夏操守聲名俱好祗因才非肆應前赴衛輝辦漕採買兌運事事遲鈍以致稽延時日是以臣奏請改補京職今䝉硃批指示仰見我皇上恩覆如天明同日月該道在省一􅋀政務臣惟與㫖具本題請外理合奏明謹奏聞臨潁縣林貽熊儀封縣袁珂二人聲名好果否真僞細訪的確并何處籍貫據實奏聞此非採之輿論因有人舉薦恐其偏袒故爾諭問汝與田文鏡合詞具奏又聞鄭州知州髙文愷捕蝗不力當確查其盡職與否若不認真辦事即應斟酌以定去留同日又奏爲凛遵聖諭次第舉行仰祈睿鑒事閏四月十三日奉到皇上硃批諭石文焯田文鏡發來條奏數事雖非地方急􅋀要務然亦不可不料理者爾等商酌徐徐次第舉行若貪求速效反致有累地方則非朕之意也又臣奏摺内䝉硃批豫省官塘以及偏僻道路烟墩俱宜整理修葺直隸山東道傍皆遍種樹木此法甚善今嵗似已過期可預行通飭備辦俟明春乘時栽植毋悞若不訓戒屬員借此或致擾民生一事又不如省一事也欽此仰見我皇上睿慮周詳指示明晰臣隨與田文鏡共商整理預之兵止係本身在墩日間或就食村莊或暫歸家室未能時刻不離汛守臣等商議選有妻室之兵臣等商酌預備明春舉行必求於事有濟於民無擾至武陟決口被衝人民我皇上御極之初即遣官賑濟河北窮黎所有水淹涸出之地畆已給籽種去秋已慶豐收今年又穫二麥瘡痍漸起元氣將復又中牟決口被衝人民已遵特諭確查賑濟均沾實恵是前後復業之民皆已得所皇上愛育元元至意緣奉特諭事理爲此一併陳明謹奏不望汝等如禹稷之饑溺存心以副朕愛養元元之意但能循分盡職安輯本境貧民使不致失業即可無愧撫綏之任矣雍正二年閠四月二十八日河南廵撫臣石文焯謹奏爲恭報二麥收成分數仰祈睿鑒事竊查河南全省地方二麥均己收穫查懷慶衛輝南陽三府屬收成皆十分九分不等開封府屬之杞縣等十六州縣收成十分至八分不等汝寧彰徳二府并汝州屬收成皆九分至七分不等歸徳河南二府及開封府屬之祥符等十八州縣收成皆八分至五分不等兩河百姓共慶豐收皆荷我皇上仁恩廣被感召天和之所賜也現今麥價毎石七錢五分至八錢不等再查各屬所種秋禾俱長發茂盛至河北地方所生蝗蝻據南汝道佟鎮禀報各己撲滅十之八九現在仍行搜捕務使盡絶無遺不致爲害合併奏明伏乞聖鑒謹奏麥秋如此收成殊慰朕懷但捕蝗一事爾河南省甚屬懈怠屬員藉諉之詞斷不可聽朕將四省情形比較觀之甚明非如爾等耳目止及於本境一偏之見也此事全賴撲捕不遺餘力方能盡絶如云十去八九譬之療疾究未除根此乃伏脈以便將來作撲滅已盡又因隣省飛來等語之張本爾等或可受屬員之欺誑懵然不覺朕君臨天下若遇欺誑之語亦漫無覺察其如萬幾何此等陋習洗滌淨盡方好雍正二年五月初二日河南廵撫臣石文焯謹奏爲恭報甘霖大沛仰慰聖懷事竊臣查明二麥收成分數已恭摺奏聞并進呈麥麵在案民間又當佈種晚穀豆子方在望雨甚殷於五月初一日甘霖大沛省城四郊均已十分透足已種之地沾濡優渥未種之地爭事鋤犁俟各屬報齊另奏外查河北地方蝗蝻臣飭委南汝道佟鎮躬率印捕等官實力搜捕并令郷民撲捉按斗給錢今佟鎮事畢回省據禀小民圖利毎處不下千餘人踴躍搜索計日掃滅臣猶恐間有遺種復飭該地方官遍行搜查務期盡滅無遺合併奏明謹奏聞爾省蝗蝻並未捕絶朕前諭何等諄切乃仍作此不了之語以相搪塞殊屬玩忽歸咎隣省之伎倆朕己道破想董其役者猶或未之聞耶更嚴飭撲滅淨盡以聞一查河南河工所需草束甚多俱𣲖各縣辦運毎草一觔開銷正項一釐在各州縣採買價值以及運送脚費大約秫稭穀草一觔需費三四釐不等合計毎縣一年辦草數次毎次不下三十萬觔除正項外毎運約賠五六百金統計一年約賠數千金承辦州縣先猶那動庫銀再圖彌補今則正項隨徴隨解火耗亦解補虧空無項可那不得不按𣲖里民押令辦運此買草之一累也一查河工搶險幫堤築壩捲埽在在需人上司按府分𣲖州縣州縣𣲖之里民約計毎邑𣲖夫八九百名不等貧民在工力作露宿風餐毎夫四名掘土方一塊定價一錢二分除節省外只給九分六釐計毎名毎日所得不過二分四釐一人赴工除起身路費鍬筐衣服州縣捐助外家中日食俱本地協助河工之需夫日衆里下之𣲖累日深此𣲖夫之一累也有人奏此一二事覽之不勝駭異朕如此推心置腹任用爾等凡有累民之舉槩令據實入告而爾等竟若罔聞政令乖方一至於此朕惟仰天淚下亦無言可諭爾等也石文焯嵇曾筠田文鏡同看雍正二年五月十八日河南廵撫臣石文焯謹奏爲恭讀聖諭據實陳明事五月十一日接到皇上發來條奏河工夫料二欵仰奉硃批臣跪讀之下實􅋀悚惶伏查豫省河工捲埽與䕶堤防風全賴秫稭穀草皆需車運民間所用四輪車止可運八九百觔最多不過千觔故用車甚多難以覔僱不得不借民力運送相沿已久臣到任後以運料一事累民適值備料防䕶秦家厰等處工程臣即發銀委員就近收買毎秫稭百觔照時價給銀二錢民無運送之累及十里店等處漫口分頭堵築需料甚多因秋收豐稔秫稭穀草在在皆有毎百觔時價不過一錢外加運費三四分不等委員自行收買毋許𣲖累小民祗因需料數千萬之多附近俱已買完而堵築工程亟須上緊告竣始發價與開歸河懷四府屬之相近州縣辦買濟用即少借民力亦出於萬不得己時值豐收之際辦買物料源源濟用以是各處漫口得於數月之内相繼堵築完工目下惟嵗修搶修需用物料無多當此豐年就近預先收買不須運送更無累民之處至於做工夫役豫省向例皆按地應夫興修大工各縣協濟毎夫日給工食外里民尚有幫貼因本省並無應募之人也今加幫兩岸堤工估計土方銀四十九萬有奇沿河各縣皆有堤工毎土一方向例定價銀一錢二分除加一節省并行硪澆水做邊等費外實給銀九分六釐江南毎日得之價比江南較少若變通其法按夫日給工價有幫貼食用之事也臣已與嵇曾筠田文鏡共商召募力作之人給以僱價但沿河各州縣在在興修所僱之夫百不及一惟有一靣儘力僱募一靣仍用里夫俟漸募漸多則里夫自可漸省矣臣仰䝉聖恩委任封疆如果有苦累小民之事臣何敢不據實入告恭請睿裁而甘自蹈隱飾之咎河南地接畿輔我皇上日月照臨事無鉅細盡在聖明洞鑒之中今䝉硃批嚴切除即與嵇曾筠田文鏡同看外理合據實覆奏伏祈聖恩指示謹奏朕無可指示全在爾等秉心公忠實力奉行耳毫無影響䜛譖之口斷不能惑朕之聽聞此不足慮也若所言稍有一二􅋀中實病之處亦非巧詞喋喋所能攴吾者但當返躬自問果無愧衾影即坦然處之若内省稍覺未慊則應悔過修己汲汲改圖以葢前愆不然雖暫時搪塞過去日後發覺將何辭以免倘能以公忠二字自律屏除私念渾然天理事事皆出於愛國愛民之誠書曰天聰眀自我民聰眀則必䝉上蒼降監神明垂佑又何慮不受知於上不見信於下也大抵百凡究宜探本尋源不必在枝葉波瀾上做工夫勉之勉之同日又奏爲恭謝天恩事五月十一日臣進摺人回奉到皇上賞賜太乙紫金錠等藥兼頒服用各方臣恭設香案望闕叩頭謝恩祗領訖恩賚自天感愧無地為此繕摺恭謝天恩以伸微悃再䝉聖諭嚴行保甲誠弭盗之良法臣已嚴飭地方官盡心編查實力奉行以仰副我皇上靖盜安民至意豫省得雨情形己於五月初二日具摺奏聞嗣據各屬呈報俱各得雨透足秋禾長發甚茂晚穀豆子俱已種完西成大有可望現在河工亦獲平穩伏汛將屆臣同嵇曾筠督率㕔縣等官加謹修防又許州知州王士俊操守才具皆好經臣調管祥符縣事已遵旨具本上年支過兵米豆草各價亦仰遵聖諭具題聽候部議理合一併具奏伏乞聖鑒謹奏所奏諸務已悉惟勤自朂勉毋稍玩愒蝗蝻已盡行撲滅否同日又奏爲恭繳硃批據實奏聞事欽奉聖諭聞臨頴縣林貽熊儀封縣袁珂二人聲名好果否真偽細訪的確并何處籍貫據實奏聞欽此查林貽熊係廣東東莞縣舉人居官勤慎聲名亦好袁珂州境内從前並無蝗蝻生發據報於五月初六日有飛蝗落地隨即帶領夫役撲捕等情臣即飛飭過布政使田文鏡合詞覆奏伏乞聖鑒謹奏覽諭石文焯向聞豫省有姦民以白蓮敎名色煽惑郷愚於汝未任之前朕經面諭汝亦曾奏朕有此敎甚密之語發姦摘伏正爾等分内之事豈可因其密而遂置之不問一任其潛滋暗長乎嗣後惟宜處處留心時時密訪第不可妄囑屬員致令擾民驚衆魁姦得以詗知消息深蔵潛匿反與事無益須不露聲色嚴加伺察少有風聲即權巧設法不惜重賞弋獲首惡必能除其敎長方為拔樹尋根之善著庶可永斷葛藤倘若處置失宜反致激出事端則又大不可也密之慎之此諭只可汝與田文鏡知之毋忽諭石文焯田文鏡聞爾河南省將州縣火耗贏餘一概盡歸藩庫以補虧空又毎千兩解費二十兩名曰平餘州縣分文不與有官窮民困之論指摘鑿鑿似無可疑然亦難遽信第不知汝等何故招此物議也果有此事否明白回奏雍正二年六月十三日河南廵撫臣石文焯謹奏為欽奉上諭事竊查姦民以白蓮教等名色煽惑郷愚行踪甚是詭祕而受其誑誘者聽信最堅奉持維謹誠如聖鑒此等姦民惟在地方官加意密訪設法緝究臣去春面承聖諭銘刻於懷不敢少懈到任之後時時留心訪察惟候少有洩露即盡力推求殲厥魁姦以除此習但未便彰明查拏以致不肖官役借端擾民復徧張收成歉薄小民謀生不贍其教亦漸衰息但若輩極其詭祕誠恐密肆煽誘亦未可定今蒙諭旨諄􅋀臣惟與田文鏡時刻留心密訪緝究以仰副皇上整齊風俗綏靖人心之徳意耳理合恭摺覆奏伏祈聖鑒謹奏涓涓不塞流爲江河所以聖人謹於防微杜漸若不除之於早其害必致蔓延此事慎毋泛泛視之一者整齊風俗潔清地方二者抑邪扶正消弭禍患於未形也同日又奏爲遵旨回奏事臣欽奉硃批諭㫖聞爾省將州縣火耗贏餘一槩盡歸藩庫以補虧空又毎千兩解費二十兩名曰平餘州縣分文不與有官窮民困之論果有此事否明白回奏欽此臣查豫省州縣徴收錢糧封櫃委拆火耗解貯司庫闔省各官分别給以養㢘一􅋀公用悉於司庫支應於正月内具摺奏聞臣復將各官養㢘及公用等數目并分别彌補虧空之法備細酌議續經具奏是豫省錢糧出納及新舊虧空各情由盡在聖鑒之中在官各得養㢘在民並無困苦至藩庫收兌錢糧原有加平二十兩内係廵撫衙門十兩藩司八兩以及庫書等費自臣奏明耗羡歸公已將此項革除今奉上諭毎千兩解費二十兩名曰平餘州縣分文不與臣查各官養廉前䝉諭㫖允准即令布政使田文鏡按季給與已於閏四月二十一日繕摺覆奏至平餘之説先據田文鏡曾言州縣拆解錢糧逐封歸併毎千兩有餘出六七兩四五兩不等少則亦有二三兩飭令州縣解司歸公或平餘之名即由乎此臣蒙聖恩至深至厚一毫不敢欺飾理合據實陳明謹奏朕豈肯因風聞不確之論即加罪於爾等雖然物必先腐而後蟲生此等浮詞未必無因而至爾等但有則改之無則加勉若謂如此流言不過費數行摺奏即可釋然消滅更加縱情肆志則將來必至於不可挽回也朂哉同日又奏爲恭繳硃批仰祈睿鑒事竊臣查豫省入夏以來雨水十分霑足前後播種秋禾俱極茂盛佇慶豐登伏汛内水勢雖長正值天氣睛明隨即漸消臣同河臣齊蘓勒前赴北岸查勘現在工程均獲平穩今將屆立秋伏汛可保無虞臣與嵇曾筠嚴督印河等官上緊防修以保秋汛從前各處所生蝗蝻俱已捕盡續後間有發生之處亦皆隨即撲滅臣復嚴飭各屬加意搜查設有生發之處務期撲捕淨盡毋致爲害所有奉到硃批理合一併恭繳謹奏堤工平穩大慰朕懷六月初間京城四日夜大雨張家灣一帶水長數丈堤岸幾處潰決朕爲豫省拳拳在念無日不神馳於黄河南北兩岸將半月餘矣仰託穹蒼垂憫河靈黙庇伏汛竟保無虞朕心歡暢筆不能宣兹秋汛在即更宜預事綢繆竭力防禦再加以忠誠之心上格神明祐助今嵗得保安全迨秋冬之際相度水勢之趨向培補堤岸之卑薄謹守三二載正流日漸通暢水由地中行將來永慶安瀾上可釋朕躬宵旰之憂下可免億兆昏墊之苦是全賴卿等實心任事服勞盡瘁之力耳克勤克慎毋怠毋忽將此諭亦令齊蘇勒嵇曾筠知道聞蝗蝻有接續生發者務必督令滅盡而後已當選委誠實勤幹之員令其不時廵訪近日山東州縣中竟有隱匿其事揑報撲盡而禁止百姓聲言有蝗者陳世倌親身察出已㕘奏矣爾屬員之内保無此等不肖下吏其欺隱之詞不可信以爲實而代爲受過也再加一番嚴飭時刻留心勿使少懈雍正二年六月二十三日河南廵撫臣石文焯謹奏為奏明事竊豫省士子毎恃䕶符武斷郷曲挾制官長動輙倡首脅衆習以成風臣出示嚴􅋀告誡并於考試敎官時靣諭約束士子安分毋許多事乃有封邱縣生員王遜等因知縣唐綏祖以時屆伏汛工程緊要按照地畆令各社出夫論方給價遂挺身赴臣衙門具呈求免隨批開封府查詢又據該縣里民黃持懸等禀稱身等在工縣官按方給價並無短少特為辯明寃累等情亦發開封府併查去後五月二十二日王遜等乘唐綏祖赴郷捕蝗至晚回縣攔阻不容進城口稱徴收錢糧應分别儒戸爲何與百姓一例完糧一例當差築堤亦不許用社夫等語臣聞報即委開歸道陳時夏前往嚴􅋀開示方各退散值學臣按考開郡王遜等列欵赴學臣衙門控告知縣唐綏祖經學臣批發開歸道查詢王遜等阻抑諸生不許赴考至期僅有生員二十三名應試又有武生范瑚等竟將童生冊巻擡去不許應試疊據開封府詳報批行布按二司嚴提究審間開歸道陳時夏因奉學臣之批詢問王遜等惟稱若要我等赴考必須免了我們按地出夫㕘了唐知縣若是不免夫不㕘官斷斷不考等語似此脅衆罷考挾制官長不法已極知縣唐綏祖既被控告臣已另疏題請解任質審惟是臣自愧庸拙不能移風易俗咎復何辭爲此據實奏聞伏乞聖鑒謹奏地方上遇有此等事出亟宜整飭一番申明國憲但若令爾等審理未免避忌袒䕶屬員輕蔑士子之嫌反有干礙朕特遣部臣前來嚴加懲創以正惡習於田文鏡前奏已有㫖矣雍正二年七月初五日河南廵撫臣石文焯謹奏爲恭請聖裁事竊查河北三府仰蒙皇上軫念民生籌畫倉儲諭臣酌開貢監等例臣隨凖照各事例酌議九欵毎石按時價連運費約計一兩二錢議定各欵收捐榖數經總理事務王大臣等議覆奉㫖依議欽遵在案於雍正二年二月初九日接准部咨轉行河北各府縣開捐照數收納穀石查豫省今歳二麥豐收雨水霑足早穀髙糧俱已成熟晚種穀豆亦己秀實陸續登場今年穀價必較上年更減小民完納錢糧全藉糶賣米穀穀賤傷農不得不爲籌計現今雖有捐穀事例但願捐者大概皆係富室穀石出自收穫無須糴買臣愚以為豫省河北三府原請收捐穀四十六萬石今自開捐以來止收穀四萬三千餘石尚有未捐穀四十一萬餘石臣請仍照原題欵項穀數毎石收銀一兩二錢革除外費令赴布政司衙門交納出給實收即將此項銀兩照依時易銀濟用所有贏餘較毎穀一石收費二錢更爲增益悉可留充裨益民生之公用爲此奏請聖裁如蒙俞允臣即具疏題改抑臣更有請者河南人情鄙吝利較錙銖查原題捐納監生係穀一百石毎石一兩二錢應納銀一百二十兩查户部事例止一百零八兩請照户部捐銀一百零八兩則人必爭先捐納矣伏乞睿鑒敇示遵行謹奏如果穀多價賤應按時價增穀收捐題請加穀方為合理設曰爲利農起見不過有益富民窮民那得千百石穀出糶此等取巧作用何可施於朕前徒自取辱耳凡百只宜抒誠不宜弄巧老姦巨猾四字不可不避此四字在市井商賈輩運其機智成家立業者或有之要非封疆廟堂大臣之體也朕最惡此習氣將爾所奏併朕諭與田文鏡看同日又奏為天恩髙厚感激難名謹具摺奏謝以伸微悃事竊臣子石禮哈以庸材鈍質荷䝉聖主逾格殊恩擢用副將甫及一年涓埃未報復奉特㫖補授貴州威寧鎮總兵官臣聞命自天感激無地伏念臣䝉皇上委任隆恩自愧才庸識淺未能圖報萬一而臣子石禮哈更䝉聖恩優擢畀以重任誠不知何以效犬馬之報上答髙厚之恩惟有嚴訓臣子盡心供職綏緝地方以仰報天恩耳為此繕摺恭謝謹奏若以資品而論爾子在爾之上石禮哈一𣲖天真爛熳開心見誠是一個盡已聽命之人不似爾前後左右四靣八方都防範到老於世故之伎倆此子本質可取將來加一番陶鎔造就朕期其可爲國家柱石非比爾茍祿全身畫地自限止於此而己者若將爾之積年本領教導他恐反至壊伊天良爾只慶幸自己有何好處育此佳兒則可若謂爾訓誨出如此後人來朕則不許將此諭亦與田文鏡看雍正二年八月二十六日河南廵撫臣石文焯謹奏為恭報秋成分數仰祈聖鑒事竊臣於六月十三日將豫省雨水霑足秋禾茂盛情形具摺奏明今各屬已報收穫查彰徳衛輝歸徳等府屬之州縣收成俱十分九分不等懷慶河南南陽汝寧等府屬之州縣收成俱九分八分不等開封府屬之陳州西華等九州縣收成俱十分九分不等其餘祥符陳留等二十五州縣收成俱八分七分不等皆由我皇上宵衣旰食無刻不以民生爲念至誠上格天心神明黙祐之所致也所有各屬收成分數理合奏聞上慰聖懷謹奏豫省如此豐收閭閻大有起色朕心不勝愉悦今命汝署理浙撫事務沿海災民當加意撫綏以副朕痌瘝之意雍正二年九月初三日河南廵撫臣石文焯謹奏爲恭謝天恩仰請聖訓事臣質本愚拙荷䝉皇上畀以撫豫重寄寸長未效踧踖靡寧乃因浙省沿海偶被漲漫特諭臣馳驛前往署理廵撫印務撫恤災民臣聞命自天感悚交集自知才識短淺非得仰請聖訓無所遵循因奉㫖馳驛前往未敢趨叩温台六府皆有沿海州縣道路綿長必得遴委幹員分頭料理方克有濟惟是臣甫經抵浙屬員才具一時不能周知查南汝道佟鎮委令捕蝗及查看墩臺實力辦事勤勞無悞衛輝府知府張建徳老成歴練辦事勤謹知州管祥符縣事王士俊勤幹有才實心任事河南府通判馬騆年富力强辦事去得又臣標遊擊馬世龍料理事務不辭勞苦以上五員仰乞聖恩准臣帶往浙省分路賑恤庶任使得人則事有實濟而無浮費災黎早受一日之恵則早慰聖主宵旰之懷抑或於此五員中恩賜二三員前往浙省委用總出聖恩爲此繕摺請㫖謹奏有㫖諭部矣浙豫兩省朕一視同仁浙江亦有特簡之員儘堪驅策第目下賑恤一事需人頗多許汝帶三人去事畢速令回任毋久覊留雍正二年十月初四日署理浙江廵撫印務河南廵撫臣石文焯謹奏爲謹陳沿海賑濟事宜恭慰聖懷事竊臣於九月初三日自河南起程於十五日抵杭受事接准部咨欽奉上諭著動倉庫錢糧速行賑濟仰見我皇上睿慮周詳軫念災黎望賑孔廹惟恐躭延時日不能即沾實恵臣即飛飭沿海州縣確查被水災民户口一靣委員前往監賑外臣查原報被水之仁和等一十六縣并海寧衛所内有平湖奉化定海嵊縣永嘉海寧衛所俱勘不成災止仁和等十一縣各被災分數不等臣仰遵諭㫖惟期災民早沾實恵以上副聖主勤恤民隱之至意竊查煑粥一事必須棚厰鍋碗多不便臣與布政使佟吉圖細加商酌照前煮粥之數毎大口日給穀四合小口日給穀二合賑給九十日口糧有穀之處動糓給散無穀之處照時價折銀給散各委大員以次賑完其平湖等五縣廣皇恩俟散賑完日將動用過銀穀數目造冊題報再查衝決塘堤己飭各地方官悉行修築以禦勘海塘容臣旋署將應行事宜另摺具奏外理合先行奏明上慰聖懷謹奏非過則不及率皆不合機宜雍正二年十月十五日署理浙江廵撫印務河南廵撫臣石文焯謹奏爲遵㫖覆奏事臣蒙聖恩命署浙撫印務抵任以來一靣料理賑濟一靣稽核案牘查有十三案無著虧空共銀九萬二千餘兩部限四年賠補此係前撫臣屠沂奏明各官公捐賠補之項毎年需銀二萬三千餘兩又額設戰船一百三十五隻部定小修大修拆造各價不敷工料之用各有津貼毎年約需銀一萬餘兩又歳解部餉約費二萬餘兩以上各項并各衙門養廉規例皆出自州縣耗羡之内但浙省賦重耗輕向來總不及加一自黃叔琳到任陋規已盡革除復將火耗減至五六分以致種種公事皆屬無米之炊難以辦理因沽一已之清名坐致公務難辦實大負皇上簡用之恩臣查豫省諸務所以辦理無悞者皆耗羡是賴雖浙省耗輕不可與豫省一例而論然舎此而外並無可以設法辦公之項佟吉圖傳奉皇上硃批諭㫖著臣等細心籌畫而為之臣與佟吉圖細加斟酌先於各州縣現徴錢糧内毎兩量提火耗二分以濟公用餘俟盡心竭力料理妥當上副聖主體恤臣工之徳意理合先行覆奏伏祈睿鑒謹奏火耗一項或以爲養㢘或以爲公用總要酌量通融辦理妥當又不多取於民方爲善於調劑今此奏是將重耗之舉缷責於朕斯豈臣下歸美於君上之道與且蓄既經奏明便可放膽施為之意如何使得此事另議具奏朕正於此處要看汝之底裏也同日又奏爲請㫖事竊查南新北新兩關税務經黄叔琳奏請以主事張崇禮趙方觀二員分理均於雍正二年七月初三日受事咨部在案查管理税務事關錢糧臣抵浙未幾各屬才守尚未周知不敢冒昧委管且張崇禮趙方觀受事三月以來臣細加察訪尚能循分供職應否暫令管理俟臣於屬官中遴有賢員再行具題委管是否有當仰請聖裁批示遵行謹奏税務正宜用此二人管理倘有差錯不過以黃叔琳身命徇之耳爾何爲伊如此關心君臣之義朋友之情孰輕孰重辦明要緊雍正二年十月二十日署理浙江廵撫印務河南廵撫臣石文焯謹奏爲據報奏明事竊查浙省沿海地方田廬被淹我皇上特諭賑濟被災乏食之民乃江浙民情刁詐毎多棍徒把持揑名冒領反使實在災民不得入冊甚有地方官受其挾制瞻狥浮開以飽其欲據佟吉圖呈稱各屬造報男婦名口甚屬浮多在災黎亟當拯恤然動用錢糧更宜慎重飛飭該縣逐户再加確查等情臣復飭催委賑道府實力速行惟浙東之寧波紹興所屬更多刁徒以致確冊尚未核定臣查各處災民先經佟吉圖等捐貲分頭賑恤因餘姚被災獨重恐前捐給未周又續發銀五千兩補賑此在未奉上諭賑濟之前己經佟吉圖奏明在案慈谿與餘姚接壌後海二十八都民竈人等有應完場課例不蠲免因該縣比催輸納遂有棍徒希圖挾官停徴倡言餘姚先行賑過縣官領銀不給藉端鼓衆於十月十三日有數百人羣擁慈谿縣署鬨閙知縣陳淖文託稱患病並不出堂將情由明白曉諭安慰候賑致被拆毁照牆暖閣打碎宅門寧波知府尚瑶隨即㑹同城守遊撃康世爵馳往慈邑傳集民竈撫諭給發食米令其各回候賑隨於十四日俱各散歸臣據府縣詳報隨批布政司速飭查賑一靣取該縣職名報㕘特是此等刁風急宜懲治若不嚴拏棍徒究處以為因事鼓衆之戒無以綏輯地方臣惟密訪確實姓名一俟賑畢即令按察司密拏解究另奏外所有慈民借端擁集情形理合先行奏聞謹奏雖係棍徒藉端鼓衆亦未有散賑而不停徴之理此無能之縣令也如云場課不應停徴暫緩追呼以俟賑濟事畢便遲數月何妨此等劣員難勝親民之任斷不可留而倡首鼓衆者必素係地方積惡巨憝萬不可使其漏網當重懲以警不法雍正二年十一月十五日署理浙江廵撫印務河南廵撫臣石文焯謹奏爲奏聞事竊查浙江沿海被水民人仰䝉皇恩俱各得所江西湖廣平糶米石陸續運至今年秋收又好民食可以無虞皆由我皇上至仁育物膏澤覃敷之所致也再衝坍海塘所有各處決口已經修築閉塞堵截鹹潮臣親歴查勘知今年風潮甚大髙過海塘是以衝決坍塌其勢最甚原屬僅見之事是以塘工不能捍禦臣查塘身應修之處分委大員丈估詳議土石塘工俱仍舊制興修土者將殘缺卑薄之處加築如舊石者將亂石理齊修砌堅固所需工料現在嚴行駁減務期節省錢糧毋致糜費至原係土塘請改石工之處臣審度形勢若改建石工果可長資捍禦我皇上念切民生亦不惜數十萬金錢以為一勞永逸之計但海潮勢大即石工亦難保無虞况需費浩繁實不敢輕議舉行惟凜遵聖訓悉心籌畫不敢一毫輕忽多費錢糧除應修海塘俟核實工料另摺具奏外爲此先行陳明上慰聖懷謹奏將爾前奏與此奏俱交與新任廵撫法海諭法海知石文焯身為封疆大吏海塘為地方要務似此東説則東隨西説則西就全無一㸃主見朕亦實難決斷矣爾今與佟吉圖悉心訪詢加意籌畫務得準的具奏朕之前諭並非為錢糧起見葢恐勞而無功徒費帑金以飽貪吏之腹耳若據伊此奏則前摺何所見而創改建石工之議豈不大相矛盾誠能一勞永逸朕何惜數十萬之費不令浙東億兆安枕也速速詳議奏聞同日又奏爲恭報晚稻收成分數仰祈聖鑒事竊浙省晚稻已經收穫查杭州嘉興金華衢州嚴州等五府屬收成八分七分不等湖州紹興台州温州處州等五府屬收成七分六分不等寧波府屬收成六分五分不等闔省咸慶有秋而沿海被水村莊仰荷皇上發粟賑濟又蒙特諭江西湖廣二省運米十六萬石至浙平糶窮民粒食有賴山陬海澨共沐恩膏咸歌帝徳臣謹將晚稻收成分數據實奏聞上慰聖懷謹奏浙省收成如此固好但爾率多依違具奏希圖迎合言不由中一事不可信則事事皆難信矣雍正二年十二月初六日調補西安廵撫臣石文焯謹奏爲恭請陛見事竊臣一介庸愚恭逢皇上御極之初蒙恩召對屢承訓㫖諄切開導旋奉恩綸補授河南廵撫撫豫以來凜遵聖訓黽勉奉職但臣才識短淺愆尤日積悉荷深仁涵育曲賜保全臣清夜捫心感深涕隕是臣兩載供職倖免隕越之虞者皆出自皇上教誨裁成之恩也今奉特㫖調補西安廵撫犬馬依戀之誠亟思趨覲天顔敬承睿謨指示仰懇皇上允准陛見臣自浙起程謹於江南宿州地方恭候俞㫖一奉恩命臣即星赴闕廷跪聆聖訓庶地方一切事宜皆知所遵循矣謹奏准爾來京陛見地方風景民間疾苦可以僃悉敷陳爾所奏一切事件朕亦便一一靣諭也硃批諭旨巻三十中欽定四庫全書硃批諭旨巻三十下硃批石文焯奏摺雍正三年二月二十九日西安廵撫臣石文焯謹所屬吏治民生事宜容臣體訪次第舉行再四川虁州府被㕘知府程如絲一案准部咨奉㫖著臣審擬據年羮堯靣交皇上硃筆諭㫖硃批奏摺與臣看臣敬謹捧讀仰見我皇上矜恤民命惟恐拖累多人不忍少有屈抑大公至聖恩賞給河南任内養㢘銀兩臣於二月初四日自京起程由山西赴陜一靣備具咨文傳併奏明伏乞睿鑒謹奏覽雍正三年五月初四日西安廵撫臣石文焯謹奏為恭報麥收分數仰慰聖懷事竊陜省地方一春雨水調勻二麥今已收穫查西安府屬三十七州縣收成均有十分九分鳯翔府屬州縣收成十分至八分不等漢中府屬州縣收成八分七分不等延安府興安州所屬地方收穫較遲尚未據報所有西鳯漢三府屬二麥豐收分數理合先行奏聞恭慰聖懷謹奏秦人食用惟麥是賴今闔省豐收朕無西顧之憂矣真可君臣相慶也同日又奏爲恭謝聖恩併陳下悃仰祈睿鑒事竊臣䝉皇上畀以西陲重寄臣聞命感激已具疏奏謝天恩惟是臣愚拙無能不能勝此重任仰懇皇上俯賜訓㫖俾臣一切知所遵循不致隕越貽羞一俟圖理琛到陜臣即前赴新任但臣到任時據諾穆渾造送交盤清楚冊結臣伏查西安藩庫從前交代雖經據冊題報皆以歴年錢糧未經奏銷是以前撫臣俱未盤查保題現在部駁查造案次欵冊且西安藩庫錢糧因值軍興頭緒繁多與别省正收正支不同即如外捐銀兩有入交代不入交代之分臣正在細加稽覈逐一駁查適奉調補甘肅之命應俟圖理琛到陜清查接受將正署兩任收支錢糧一併交代庶藩庫可以徹底清楚矣爲此據實奏明伏乞聖鑒謹奏所奏知道了竭力爲之諸凡惟絲毫無隱剖露忠誠乃人臣盡職報主之指南也雍正三年五月十八日甘肅廵撫臣石文焯謹奏爲恭繳硃批併陳謝悃事竊臣於河南廵撫任内有督催四案部議罰俸悉蒙聖恩寛免臣隨恭設香案望闕叩頭謝恩并具疏恭謝在案又臣奏河南常平倉穀冊一事欽聖主拔用之深恩下盡人臣報效之微悃所有奉到密諭事宜臣隨同岳鍾琪欽遵皇上發下臣弟石文焻一摺奉㫖令岳鍾琪同臣詳議奏聞亦經㑹議覆奏外臣將廵撫印務交送圖理琛署理臣於十九日起程前赴新任合併陳明謹奏甘肅自軍興以來屢年勞擾兵民疲困兼之西海初定幾多創置事宜實此時廵撫中第一繁劇之任也汝莅任後事事當悉心籌畫講求利弊必期行之永久無礙然後次第措施慎厥終惟其始勉之勉之雍正三年六月二十八日甘肅廵撫臣石文焯謹奏爲恭謝天恩併繳硃批事六月二十五日奉到皇上硃批奏摺仰荷天語垂問揣分難安臣舊欠官庫銀兩更荷聖恩限二年完還又河南廵撫任内罰俸復邀寛免臣恭設香案望闕叩頭謝恩訖臣弟石文焻深䝉聖主教育隆恩臣時時寄信諄囑共竭忠藎以圖報稱臣子石禮哈更荷天恩顧復敎以有成臣感戴之私實難宣之於口惟有一片真誠竭力辦事纖毫無隱以求仰答聖恩於萬一甘屬地方一切事宜正在悉心體察凜遵聖訓籌畫萬全次第具奏外謹將奉到硃批一併封固呈繳伏祈睿鑒謹奏有人㕘石禮哈一摺發來汝看汝父子果能以孤介自持任人詆訾朕自不爲浮言所動但石禮哈朕因觀其材質可取年正少壯故期望將來琢磨成器至其居心立品朕亦何由洞悉譬如年羮堯朕未嘗不望其成千秋不朽人物今敗露如此雖欲保全之豈可得乎石禮哈若果鑽營不自安分從前妄行交接之處不知改悔仍然庇黨狥私則朕又難符前諭也爾父子既有與年羮堯交好一叚形跡今汝膺甘撫之任正合洗滌一清若少瞻顧欲爲公私兩盡之舉處處巧留地歩恐城門之火殃及池魚將來貽累身家爲禍不淺矣朕觀爾所奏此數摺並無忠藎奮勉之誠大有畏難將就之意載念君恩朂哉無負同日又奏爲謹陳甘屬事宜仰祈睿鑒事竊查甘肅所屬州縣衛所山多水少惟賴雨暘時若田禾始獲收成且地氣寒冷播種穀麥較遲於他省是以六月半間方收青稞豌豆六月底收麥九月初收穀􅐘蕎麥臣入境一路查看田禾時因天道少雨已覺乾旱六月初一日臣行次清家驛得雨又初四日行次車道嶺得雨十九二十四日大雨透足秋禾長發甚旺百姓安堵惟是甘屬地方土瘠民貧當軍興之後官民兵丁種種疲困情形悉在聖明洞鑒之中幸舊年秋收頗好今歳夏禾已穫秋禾轉瞬收成邇來閭閻大有起色但元氣未復亟須拊循愛養茍牧令不得其人何能登斯民於袵席無如甘屬吏治廢弛已久若不痛加整頓無以裨益民生臣查平慶臨鞏四府所屬九州二十八縣有繁簡之别現任各官頗有人地不相宜者而河西新改四府所屬一州十四縣銓選人員惟寧朔令李鋐人明白其餘俱屬平常已䝉聖鑒無遺行令試看調補是邊疆新設重地尤須熟悉地方情形之員方能勝任而平慶臨鞏所屬官員亦須酌調繁簡甘屬共新舊十州四十二縣各官除庸劣之員查㕘外其可用者或應酌調或改補敎職容臣一一察考以定去留但一有缺出即須委署以一人而兼兩邑彼此勢難兼顧恐致貽悞地方臣爲邊逺民生起見仰懇皇上揀選人員發來補用庶可收得人之效矣再布隆吉地方建城設鎮蓋造營房臣聞建城之處地土鹻窪所蓋營房基址俱未堅實房屋間架既小木勘明確詳議作何賠修俟至日定議奏聞謹奏已揀選人員發往矣稂秀不除嘉苗不長年羮堯之逆黨私人即一員亦不可姑容然其中或並非伊之鷹犬爪牙將無干之人李代桃殭寃抑塞責則又大不可也總之日久自明斷不能逃朕之鑒照戒之戒之同日又奏爲恭報夏收分數仰慰聖懷事竊甘肅地方豆麥已經收穫臣查甘凉二府屬及肅州地方豆麥收成均有十分九分平慶臨鞏四府屬收成八分至六分不等寧夏府屬八分七分不等西寧府屬七分六分不等今於六月十九二十四等日甘霖大沛十分透足逺近均沾秋禾暢茂可望豐收糧食價值平減兵戢民安是皆仰賴聖主如天之福恩膏廣被之所致也再甘屬地處西北山髙氣寒毎嵗時有冰雹皆冷氣凝結而成臣向在洮岷所稔知者今西寧平番二縣各報所轄境内有數處村堡於六月初二初九等日落有冰雹因山多於田禾苗受傷之處不多除批司委員踏勘一靣加意撫恤并飭緩徴外合併陳明伏乞聖鑒謹奏邊省民生尤繋朕懷今收成如此遐方之蔀屋窮簷俱有起色殊慰厪念然封疆任重當思民生國計均屬緊要經理須各適其宜方爲稱職爾第因時相機秉公持正而爲之何慮庶務之不理也大抵居官以廉之一字爲根本凡食祿者俱當奉為圭璧茶馬事務亟察覈清楚雍正三年七月二十四日甘肅廵撫臣石文焯謹奏爲庫項虛懸待補官役俸食難支謹備細奏明事竊查甘省從前供應差使等項公費動用庫銀公捐還帑除已捐還外現在尚有未完銀二十九萬六千餘兩糧三萬七千餘石皆以甘屬文武各官俸工捐補文職自司道以下俸銀全捐武職自提鎮以至遊守俸銀並各役工食俱捐七留三毎年共應捐銀一萬八千四百七十四兩零計從前動用庫銀未還之數算至雍正二十年方得補完是此項供應之費雖有捐補之名實係借動庫銀虚懸待補至十八九年之久而文武各官尚未能支食全俸仰惟我皇上至聖至明以俸工為官吏養贍家口之資凡地方遇有公事請捐俸工之處永行停止行令各省督撫欽遵在案獨甘屬僻處邊陲地方寒苦而官役竟不得與各省一例沾恩未為平允臣受恩深重仰體皇上愛養臣工之至意有此下何敢壅於上聞爲此據實陳明伏乞聖鑒謹奏當日一切軍需無一不任意侵蝕而於庫帑亦任意那借有是理乎若云爲供應差使之費既係奉文差使豈無定例即應按例以正項支給何至出自地方因地方無項可支遂指俸工擅動庫帑迨庫帑頻那而俸工無幾輾轉相因終成畫餠斯虧空如許之由來也此等人員若不㕘處示警國家錢糧任其濫用反開將來肆無忌憚之端從前督撫恐招怨尤瞻狥情靣令始作俑者漏網脱將無辜之人代爲填補汝何故亦踵此陋習捐助俸工萬不可行之事捐至武弁尤其不可舎此當另行設法補苴或歴察經手之人㕘奏以治其擅動之罪否則將何辭以邀蠲免之恩宜熟籌深計而爲之毋爲人荷此重擔也供應西藏買駝餧馬奏摺已發議政矣雍正三年九月初一日甘肅廵撫臣石文焯謹奏爲恭謝天恩兼陳愚悃事八月二十五日臣進摺人回齎捧皇上恩賞鮮荔枝到蘭臣隨恭設香案望闕叩頭謝恩祗領訖臣跪讀硃批諭㫖知臣子石禮哈被人㕘奏蒙皇上格外寛容不即加以處分將原摺發去恩加訓誨又以此摺發與臣看併奉恩諭爾父子若能以孤介自持任人詆訾朕自不爲浮言所動臣捧讀之下感激涕零臣父子何人得邀皇上顧復教誨有加無已雖肝腦塗地不足以言報稱至所㕘情事虚實具奏者既指摘鑿鑿臣實不敢妄置一辭惟求皇上嚴行查究如實則將石禮哈罷斥治罪以為負恩不忠之戒臣父子均感沐深恩於無既矣仰䝉天語敎訓臣從此益加奮勉以圖上副聖懷并誡諭臣子石禮哈有過即當速改無則更加黽勉總期無負皇上天髙地厚之恩是則臣犬馬之微忱也天恩深重感戴難名謹繕摺恭謝以攄下悃伏祈聖鑒謹奏如此等奏不一而足若概行查究豈但有阻言路而亦不勝其煩朕皆明示本人又從而訓誨之或有或無已改未改其中真僞朕自能辨總之有則改之無則加勉二語包括盡矣朕非不容人遷善之主也雍正三年十月初一日甘肅廵撫臣石文焯謹奏爲恭報甘屬秋收分數仰慰聖懷事竊查甘屬河東河西八府地方氣候土宜各有不同所種秋禾係糓子􅐘子燕麥蕎麥等項今年仰賴皇上福庇雨水十分霑足到處俱慶豐收臣查蘭州河州蘭州衛河州衛歸徳所收成俱有十分又臨洮府屬其餘州縣收成八分七分不等平凉府屬十州縣收成九分至七分不等慶陽府屬五州縣收成八分至六分不等鞏昌府屬十七州縣收成十分至八分不等甘州府屬三縣收成九分至七分不等凉州府屬五縣西寧府屬二縣收成七分六分不等寧夏府屬五州縣收成九分至七分不等糧價平減戸慶盈寧兵民樂業皆由我皇上敬天勤民恩膏普被之所致也謹將秋收分數具奏恭慰聖懷謹奏通省豐收實慰朕懷惟以手加額爲我邊氓慶幸也同日又奏爲陳明各官養㢘仰祈聖裁事竊臣未到任之前經署撫臣傅徳議定以州縣徵收錢糧耗羡爲各官養㢘臣查甘屬額徴地丁銀二十六萬兩有奇糧四十九萬石有奇細查各州縣衛所徴收耗羡約共四萬餘兩内布政司有平規銀四千六百二十八兩以為養廉又奏銷造冊等費一千二百兩臬司養㢘并公費銀共二千四百兩臣衙門筆帖式三員共銀九百兩除有税規之道府等官足資養㢘槩不議給外其餘道府各給養㢘銀一千兩州縣酌給銀八百兩至五百兩不等同知通判各給銀六百兩口内外衛所各給銀四百兩以上道府㕔州縣衛所各官共給養㢘銀二萬九千七百餘兩又布政司庫官庫吏等項銀一千一百一十兩臣衙門書吏銀九百兩布政司衙門書役銀一千二百兩連前通共需銀四萬二千三十八兩又河西各州縣俱以耗糧為養㢘查甘屬應徴糧石耗羡通共計六萬三千餘石酌給各道府㕔州縣養㢘及斗級書役工食折耗等項共需糧三萬五千四百八十石毎年約可餘糧二萬七千餘石存貯以備公用再布政司養㢘尚有西寧税規銀一千一百兩雜税平規銀六千餘兩臬司養廉尚有西寧税規銀五百五十兩至廵撫衙門養㢘向有西寧靈州税規銀各一千一百兩又茶馬内有規例銀二萬四千兩經前撫臣綽奇以二萬兩爲軍需之用餘四千兩養廉再查尚有隨封等項共銀一千九百二十兩又新增茶引六千道有茶規銀六千兩以上共銀一萬四千一百二十兩理合一併據實奏明仰祈聖恩敕示以便遵行理合繕摺請㫖謹奏嘗聞古帝王垂拱而天下治朕臨御萬方持其大綱而已此等零分均派𤨏屑之舉朕何與焉爾為封疆總領一秉公清正直而酌劑之官弁兵民自有公論莫慮朕之耳目逺而弗屆也善爲之同日又奏爲奏聞事竊查駐防甲兵應支月餉原係計日授食例由布政司按月給發今寧夏將軍席伯副都統蘇圖以寧夏邊地寒冷甲兵預製皮衣遂檄令寧夏道董新策借支五個月餉銀共二萬六千八百四十兩該道以預借錢糧必須移司詳院等語呈覆而將軍席伯復行該道給發於九月二十九日移咨到臣接閲之下不勝駭異伏查寧夏駐防官員在京預支二年俸銀於四年扣除完項奏請聖恩奉有俞㫖户部方敢支給從來未有徑自行文支給之例况非用兵緊要之際乃預借五個月之多臣實不敢擅給一靣飛檄寧夏道飭查曾否給發另行具奏外理合抄録原咨具摺奏聞請㫖謹奏覽奏並咨稿武夫鹵莽不循成例殊為可笑爾查明此項銀兩曾否給發若應奏劾即行具疏董新策違例支給一併題㕘雍正四年二月二十日甘肅廵撫臣石文焯謹奏為恭繳硃批仰祈聖鑒事竊甘肅舉行社倉一事䝉皇上批示凜遵諭㫖現在與督臣岳鍾琪商酌而行又臣奏請於寧夏地方買貯米石督臣岳鍾琪已飭鞏昌布政司將米價存剩銀内動支銀一十二萬兩分發寧夏等六府委員協同地方官採買粟穀等項業經㑹疏題明倘春間不能買足俟秋收後臣再酌量具奏又噶世圖革職臣接准部咨知照並未令其回京詎噶世圖竟於二月初一日自西寧起程移咨到臣查噶世圖尚有未完事件臣已聲明咨部在案合併奏明所有節次奉到硃批一併呈繳謹奏社倉積貯最爲備荒善政兵民粒食宜於邊境先籌爾等當盡心經畫毋視為泛泛虚文也據奏噶世圖情由巳有㫖諭部矣雍正四年五月初一日甘肅廵撫臣石文焯謹奏恭繳硃批叩懇天恩俯賜矜全事竊臣一介庸愚䝉皇上委任邊疆重地抵任以來屢沐聖慈格外優恤是臣之受恩深重莫可名言今噶世圖係革職追帑之人擅自起行臣不能拘留題㕘甚為溺職䝉我皇上洪恩不即罷斥發部議處臣自知罪莫可逭惟有靜聽處分奚敢上瀆宸聰因至今未准部咨臣實夙夜戰兢犬馬私情不能自己爲此具摺跪乞皇恩恕臣愚昧倘得於無可寛宥之中俯賜矜全則始終仰沐聖主包涵之徳益當倍加惕勵竭盡駑駘仰報洪恩於生生世世矣所有奉到硃批理合恭繳伏乞睿鑒謹奏已有㫖矣凡係此等跡渉黨與瞻狥私比之行爲欲望朕從寬恩宥不可得也其他無心之過或可冀幸寛免雍正四年五月十七日甘肅廵撫革職留任臣石文焯謹奏爲恭謝天恩瀝陳愚悃仰祈睿鑒事竊照噶世圖係革職追帑之人臣不能拘留嚴㕘䝉皇上發部議處今五月十三日接准部咨於四月初五日䝉皇上寛宥隆恩奉㫖石文焯著革職從寛留任效力行走臣跪讀聖㫖感激涕零隨恭設香案望闕叩頭另疏謝恩外伏念臣智慮未周措施不當溺職之罪誠難自逭荷䝉聖恩髙厚曲賜矜全舉家頂戴刻骨銘心自兹以往臣惟有倍竭愚誠勉奮駑駘以期無負職守但臣自顧庸陋之質惟有仰祈聖主加恩訓誨一一遵行庶幾幸免隕越藉以仰報皇上洪恩於萬一耳臣不勝激􅋀冀望之至為此具摺恭謝天恩伏乞睿鑒謹奏自恃向來之摸稜伎倆但知有已而不知有君父大義以因循爲安靜以賣法爲寛仁將侵國帑剝民脂所獲之貲財以為夤緣鑽刺之費用此等行事欲望身家昌盛豈可得乎設有一實心爲國家出力者則羣起而攻之反指爲不近人情所以如爾等懦弱無能之輩以世情如何認得真一句奉爲妙訣隨波逐流俯仰數年將就亦獲陞遷遂自以爲得計殊不知黙黙中已造無窮罪業也如循此等陋習欲於朕前逞其故智以冀保全祿位斷然不能自朕御極以來譽揚爾者甚多排陷石禮哈者甚衆至今誰能助爾孰能害及石禮哈就爾父子二人言之亦當曉然明白若仍執迷不悟以為己之所行乃悠久安全之術石禮哈之作爲究係危殆之道恐將來到水窮山盡處悔之亦不及矣朕所訓誨之㫖一句未嘗遵奉不端本而逐末何能除却病根不於立心處推究祗在逐件事情上揣摩豈能於萬事萬理周旋得當耶朕實垂念爾子石禮哈之實心效力所以推恩於爾從輕發放也勉之慎之雍正四年七月初三日甘肅廵撫革職留任臣石文焯謹奏爲疊蒙恩宥感激難名恭陳謝悃事竊臣署理浙江廵撫印務為賑濟事部議以平湖等五縣海寧二衛所不行題報遽爾發賑照例革任䝉聖主天恩特降諭㫖石文焯從寛免革任欽此臣聞命之下惶恐無地竊念賑濟一事動闗倉庫錢糧平湖等五縣海寧二衛所被災分數與例未符臣酌給六十日口糧雖經具摺奏明奈臣一時愚昧未經具本題報臣罪誠無可逭荷蒙聖恩特賜寛宥此誠天髙地厚之恩感激私忱淪肌浹髓惟有益加謹凛盡心竭力以酬覆載生成之徳於萬一耳爲此繕摺恭謝天恩謹奏爾在浙江署事豈止此違例疎忽之罪有益於國計民生者曾做一事否捫心自問寧不赧然同日又奏為恭報夏收分數仰祈睿鑒事竊甘屬於五月以前各府俱得時雨豆麥已經收穫臣查臨洮鞏昌寧夏三府屬及肅州地方收成有十分至八分不等甘州凉州二府屬八分七分不等西寧平凉慶陽三府屬七分六分不等所有夏收分數謹具摺奏聞再查六月以來各府間有缺雨之州縣如臨洮屬之蘭州平凉屬之固原州鹽茶㕔鞏昌屬之安定縣㑹寧縣靖逺㕔慶陽屬之安化縣並慶陽衛目下秋禾望雨甚殷臣現在虔誠祈禱并飭地方官一體祈禱甘霖外理合一併奏聞謹奏從來人事失於下則譴告見於上汝等督撫分閫一方所繫匪輕若遇旱澇等災不知返躬思過徒事祈禱虚文於感應之理恐有未協朕亦惟朝夕乾乾竭誠省咎不以修已格天之道獨責之於汝等也雍正四年七月十三日甘肅廵撫革職留任臣石文焯謹奏爲甘霖大沛仰慰聖懷事竊臣於七月初三日將秋禾望雨甚殷具摺奏聞隨於初四日酉時得雨復於初十日起至十一日止霖雨普降臣差員四郊查看報稱俱各霑足又據臨洮鞏昌二府各報所屬俱已霑足至慶陽平凉等府距蘭稍逺尚未報齊秋禾得雨浡然興起將來可望豐收此皆我皇上至誠感格之所致也臣不勝歡欣抃舞為此繕摺奏聞謹奏禾稼須雨澤均勻滋長茂盛方期大有經此一旱之後不無焦損何言可望豐收似此粉飾之詞朕殊不入耳也雍正四年九月二十日甘肅廵撫臣石文焯謹奏為據實奏聞事竊查布政使鍾保奉㫖辦理寧夏駐防官兵糧草一案鍾保親詣寕夏料理回蘭據稱寕夏年豐嵗稔秋禾正在登塲糧草易於購買現在料理支放等語今臣於七月十八日忽接寧夏將軍席伯等咨稱官兵糧草不能按月闗支臣不勝駭異即於是日嚴飭鍾保星夜復往寧夏責令速為辦足支給如不能辦理妥協即當另疏指㕘合先據實奏聞謹奏防禦官兵糧餉甚屬緊要闗支豈容遲滯當嚴飭料理毋悞卜瑗乃一中材老成人耳非肆應才也如有不相宜處毋令貽悞地方雍正四年九月二十二日甘肅廵撫臣石文焯謹奏爲恭報秋禾豐稔仰慰聖懷事竊查甘屬八府今年夏田成熟分數經臣具摺奏明今仰賴皇上洪福齊天河水充盈秋雨霑足各屬俱慶豐穰臣查臨洮府屬之河州河州衛蘭州衛鞏昌府屬之隴西縣寧逺縣岷州衛甘州府屬之張掖縣髙臺縣收成俱報十分臨洮府屬之狄道等四縣鞏昌府屬之秦州等十五州縣甘州府屬之山丹縣以及平凉府屬之十州縣慶陽府屬之五州縣凉州府屬之五縣寧夏府屬之五州縣西寧府屬之二縣收成俱報九分至六分不等惟據寕夏府屬之寕夏寧朔二縣鞏昌府屬之安定一縣報有冰雹已經飭委該道府等踏勘情形查明傷損田禾之民人加意撫恤其餘咸慶豐收糧價平減婦子盈寧皆由我皇上保民若赤恩膏普被之所致也謹將秋成分數繕摺具奏恭慰聖懐謹奏天居髙而聽卑今嵗收成未必非因爾懺悔之所致也一念之誠天心轉移如此其速思之能不凛然爾等封疆大吏闗係綦重勉之慎之鼓鑄一事朕詳細酌定後另行諭知據前奏因私錢一時不能禁絶欲開爐改鑄制錢即以所鑄制錢再行換取私錢此是或一道但恐收燬之私錢銅斤無幾未必能敷新鑄之用耳既如此小錢之禁不可急驟暫緩候㫖密之雍正四年十一月二十六日甘肅廵撫臣石文焯謹奏爲恭繳硃批仰祈睿鑒事寧夏官兵糧草一事臣前飭令布政使鍾保往寧查放嗣據寧夏將軍臣席伯等咨覆云八九十等月草料俱己支給無悞至鼓鑄一事仰䝉皇上批示臣惟聽候諭㫖遵行小錢之禁蒙諭暫緩臣謹當慎密不敢急驟致有貽誤之處所有奉到硃批理合恭繳謹奏禁止私錢一事果如所議錢法既清而民用亦裕區畫甚屬妥協彼時朕慮未周詳故諭暫緩今己准部議矣雍正五年二月二十五日甘肅廵撫臣石文焯謹奏為聖主之恩膏疊沛㣲臣之感激靡涯敬陳下悃恭謝天恩事正月初六日臣齎摺人回捧到皇上恩賜御書福字一幅湯羊一隻臣謹望闕叩頭恭謝天恩臣自顧何人疊蒙寵賜荷聖恩之髙厚懼報稱之尤難惟有朝夕兢兢矢勤矢慎以仰酬聖徳於萬一耳臣不勝感激敬惕之至謹奏覽卿奏謝知道了程如絲䕫州慘傷私商一案汝前番審鞫大有不協之處今另行查審或著汝赴川亦未可定不必驚惶朕諒汝彼時原有許多不得已處雖然終受軟懦依違之累有失公正剛方之體不合為蔡珽所欺又欲避年羮堯向日之形迹未免傅㑹其間今恐逃坑復落塹矣總之秉心公正可以對天地神明而不愧乃為人臣之第一要訣除此别無巧法愚人毎多不解更不能信之真而守之固也殊可歎息雍正五年閏三月初八日甘肅廵撫臣石文焯謹奏為奏聞事竊招民一案前據布政使鍾保呈報各屬招獲一千五百五十八戸經臣於二月内具摺奏聞嗣據鍾保呈稱此案係奉㫖俞允之件自應如期發往趁時播種是以催令各屬速為招足今據各屬呈報前來前後共計招獲二千一百四十八户已起程者一千六百四十九戸未起程者尚有四百九十九户等語但臣近又訪聞得沙州開渠事宜尚未就理今招就戸口起程前往而渠道未開今嵗萬一不能耕種抑或耕種太遲萬一不能收穫八月以後停給口糧窮民無以餬口務期安插善全方可不致失所臣隨咨商督臣岳鍾琪續准督臣咨稱有從前官兵在沙州等處屯墾已熟之地畆萬一渠道開濬稍遲則此項屯田俱令招民耕種統俟渠道開成於明嵗再行移住沙州未始不可已檄委守備髙勉等就近勘明屯田實有多少渠道曾否開就令其飛報倘渠道未開地畆有限則將已招户口先遣往八九百户令其及時播種其餘户口俟渠道開成明嵗出口亦未爲不可等語咨覆到臣但臣查已經起程之户口俱在未准督臣咨覆之先呈報起程勢難追回除一靣行令布政司速飭各屬將未經起身之民戸暫行停止外其已經起程者查有漢興道尤汶甘山道馮敬玉在沙州估計城工事宜臣飛飭該道等務令安插得所在案所有招獲并已經起程户口數目理合奏聞謹奏此等無業窮民豈樂於離郷背井逺赴沙塞葢亦因貧起見故爾就招自應預為開成渠道指定田畆令伊等到彼無業而有業方為妥恊凡事豫則立今據爾所奏辦理殊覺遲悞矣雍正五年九月初一日甘肅廵撫臣石文焯謹奏爲恭謝天恩事竊臣前審理程如絲一案實因愚昧無知致多錯誤自奉命入川以後愧懼交集寢食不寧冒昧具摺認罪聽候處分今於八月二十七日准督臣岳鍾琪咨開准吏部咨稱七月十七日奉㫖石文焯審理程如絲一案甚屬錯誤今雖陳辯認罪總不出朕從前所降諭㫖之外石文焯畏縮因循素性如此但其爲人居官小心謹慎伊子石禮哈實能盡心辦事石文焯著從寬免其處分准回甘肅原任其俸祿永行停止嗣後當痛改前非黽勉效力倘仍蹈故轍定從重治罪欽此移咨到臣捧讀之下惶悚無地感激涕零伏念臣畏縮因循習焉罔覺蒙聖訓指示深悟前非此後當時時儆省念念提撕痛改已往之愆尤力圖犬馬之報效臣惟有與臣子石禮哈共相黽勉殫竭心力以期仰報天恩於萬一謹望闕叩頭謝恩臣於九月初一日自川起身回任謹奏知既往之非改切已之過乃凡聖樞機理欲闗鍵莫視爲易事諺云秉性難移又云熟處難忘且人苦不自知而下愚不移所以知非改過四字非有本領有力量大聰明大福徳人斷然不能果欲眞心改過須徹底掀翻痛自克責一洗其舊染之汚更加時時精進力行不倦功夫到處方有效驗豈泛泛徒修邊幅假揑虚飾甚至陽奉陰違欺天誑人而茍且自恕以爲改革也若此正所謂文過遂非久之反致敗徳僨事爲害更重耳戒之勉之硃批諭㫖巻三十下
