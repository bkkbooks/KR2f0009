body:
  text: 欽定四庫全書硃批諭㫖卷十三上硃批毛文銓奏摺雍正二年五月十四日貴州巡撫臣毛文銓謹奏為據實奏聞仰祈睿鑒事臣䝉皇上髙天厚地之恩擢撫黔疆於到任之初盤查藩庫應存正項錢糧共該銀四十一萬有竒今僅存銀一十七萬三千餘兩臣細加查詢內除各省解官輕少平頭並武職循例預支季餉等項外竟缺銀一十八萬有零始知為前撫臣金世揚用去查金世揚所用之銀惟康熙六十年備辦凱旋浙江滿洲官兵船隻據開五萬四千九百八十餘兩之一項奏明餘皆私用悉將水銀作抵臣查金世揚收存之水銀為數實多應否一面飭行藩司招勸商販悉照時價變銀還庫如還庫不足另摺奏請發金世揚來黔賠補抑或目下即令金世揚來黔自行銷賣還項至臣屬員中有柔懦無能者苗夷內有强梁不法者并臣標下兵丁不堪已極均宜加意整理容臣次第請㫖遵行外兹緣事關庫項理合先行奏聞伏祈睿鑒謹奏覽所奏甚屬可嘉如此毫無瞻顧據實直陳方不負朕委任封疆之意也勉力為之金世揚已諭部將伊發往雲南清楚錢糧完日速回貴州彌補伊巡撫任內虧空之項另有㫖外爾所奏數事交總理事務王大臣等密議一摺發來爾其照議遵行此朕諭令密議者不可入本具奏黔省吏治戎政俱懈弛至不可問矣經張文煥劉䕃樞蒞任之後更為不堪爾必竭力整飭一畨方好趙坤能清勤自勵實心任事否此任提督殊不及伊總兵之聲名爾等宜文武和𠂻互相勸勉必如滇省一般同心戮力無負朕期望之殷更聞貴州苗種不一而狆家苗尤屬凶狠近年來內地刁頑人民往往投入彼之巢穴勾連生事報復私讐而營伍中每公攤銀錢以備贖取兵辨之費竟有如此可笑之事如何其可究其所以總因武備廢弛官兵不敢正眼覷視苗猓故為此掩耳盜鈴之舉以因循自便耳有司貪暴不恤民隱驅之為盜武辨畏懦不敢察詰任其逃亡頽風積弊至於此極爾亟當悉心籌畫既不可姑息以滋長惡習亦不可急驟致激起事端逐漸整理勤而勿懈訓練營伍時時教演申飭屬員務得民心更加懲奸疸惡除暴安良行有成效庶不有忝厥職也將朕此諭亦通知趙坤或傳伊到省領㫖汝二人密相商酌諸凡講求萬全而為之果能於國計民生實有利濟處朕之耳目自能洞照也勉之勉之雍正二年五月二十九日貴州巡撫臣毛文銓謹奏為謹陳行伍情形仰祈睿鑒事竊臣撫標兩營兵丁之內原不無精壯之人但外合先具奏謹奏覽同日又奏為奏明陋規事竊臣衙門共有節禮銀七千兩臣分文不敢收受外有藩司平頭銀二千兩標下親丁銀二千一百餘兩貴陽等府州縣稅規銀三千六百兩又有官租米八百石相應逐一奏明應否作何賞給臣養亷之處伏乞皇上指示欽遵臣更有請者營兵盔甲弓刀俱屬逺年之物舊敝不堪悉須另製約計銀三千餘兩更有地方公務需銀之處亦多黔省别無所有即俸工一項現奉諭㫖地方公務不許動用俸工臣再四思維可否在於前項七千兩內擇其可收者每年量收十之六七令繳藩庫製備弓刀盔甲與夫應辦地方公務理合一併奏眀仰祈聖主睿覽謹奏歷來天下督撫之羡餘養亷一事朕從未批諭一字某項應取某項不應取也祇在爾等取所當取而不涉於貪用所當用而不流於濫須還朕一是字而已朕斷無有令爾等督撫司道以至州縣各官身受凍餒為國家效力之理即或一塵不染而毫無益於地方善者不能勸惡者不能懲甚至公務叢脞此等清宦形同木偶亦何足貴兹若令爾等取之烏乎可禁之尚多不肯遵奉竟諭令取之則何所底止若令勿取亦不可倘爾等但以潔已矯亷為極則置庶務廢弛於不問因不取而致貽誤公事則為害尤甚若止圖章奏美聽批諭合理令爾等陽奉隂違明辭暗受又非君臣交孚股肱心腹之道所以朕每訓諭爾等亷尚不可為而况貪乎惟在爾秉公執正以處之朕自能照鑒無庸奏白亦不須朕批諭也爾貴州幅􅊷不廣羡餘尚有限其他各省督撫豈朕之一言一諭所能包括無遺者歟朕惟總斷公私是非以作權衡至此等條欵煩碎細事朕實不達即如爾所奏將七千兩繳庫應辦公務一說爾意果欲如此何必冒此請㫖收節禮之名竟可𫝊集屬員將此項作何公用之處明白諭知自必通省宣聞朕諒爾之屬員亦未必不心悅而樂從寧須奏請於朕命巡撫收受節禮以辦公務耶朕實不便降諭爾其相機宜度情理實心為國計民生竭力行去莫謂朕之照察逺而弗届也勉之同日又奏為奏奏明伏乞聖主睿鑒謹奏覽奏甚屬可嘉如此方為不忝封疆大吏之任也爾等誠能實心任事朕自然知悉但天下事大抵言之易而行之難果如此奏言行相符朕得人之喜何可名言勉為之同日又奏為奏明礦厰事竊查黔省如阿都膩書猴子等銀厰已經題報外尚有釘頭山齊家灣等處鉛厰昔日俱屬私開即臣前摺奏聞之濫木橋水銀厰從前亦無分文歸公之處今臣逐一清查現檄藩司議定抽收之數俟詳議到日即會同督臣髙其倬題報歸公總不許地方各官染指分文至於巳未題報之厰非悉心調劑難免侵漁臣已頒發調劑事冝并令藩司選委賢員前往管理伏乞皇上睿鑒謹奏司事之員若令分文不染指亦是難事何則但知守分而無才術者不能紏察奸宄致令聚衆生事或懈怠因循尤滋弊竇即使遵守爾法而不踴躍從事盡心釐剔亦無益也朕意仍宜為之少留餘地俾司事之員微有沾潤庶幾賈勇向前此等事究冝委任有才情作用之人始有成效設有才守兼優者固不待言矣第恐難得其人若徒取操守而才力不及者於此處殊為鑿枘不相入也同日又奏為謹陳末議仰祈聖鑒事竊惟貴州地處邊末各官實非他省可比更有山僻州縣四面環夷錢糧不過百十餘兩即縣署恩命牧宰一方原不容因地方之饒瘠而遂分勤惰於其間今或有此等之員者總由勸懲之法不立故耳應否容臣㑹同督臣審擇山僻窮荒尤甚之州貴陽鎮逺等府及定畨廣順鎮寧普安麻哈獨山黔西大定等州畢節永寧等縣悉在崇山峻嶺之間狆苗出沒之所現在之員內亦有宜於此而不宜於彼者至若新任之員苗情未諳更難料理倘權量其才斟酌調換一轉移間似與地方有益應皇上天恩指示欽遵謹奏貴州政務不甚繁劇且有邊俸推升之例亦可謂仕路不留滯矣若因其窮苦而特開新例恐他省咸欲效尤殊為末便設如此行則所謂邉缺海缺河缺缺之苦者豈止貴州一省而已況朕原開有不次擢用之途以待賢員循吏也至於本省調補任爾量才題請如果有戢盜安民刑清政簡之能員何待三年五載亦不須大計甄别之嵗儘可隨時舉薦以示鼓勵安用拘定成規以啓鑽營以滋口實耶雍正二年七月初六日貴州巡撫臣毛文銓謹奏為奏聞事竊惟方面有司凡倉庫錢糧難容虧空地方民事不宜怠弛臣於此二者時刻留心靡敢或懈至於倉庫一項臣現在徹底清查尤不敢絲毫容其欺僞緣地方遼濶不能纎悉周知大約虧空銀兩者尚少而虧空米榖者不乏其人臣之愚見欲俟一切查明之日如其果係侵蝕不論多寡即行究參倘係黴爛或係歷任流𫝊未補勒令一併作速全完免其即挂彈章其於倉庫實有裨益理合奏明謹奏總在汝一秉至公相機度宜而整理之但須還朕一是字朕未令膠固拘泥而不通融以行政也同日又奏為奏聞設立社倉等事臣䝉皇上敕諭設立社倉以及勸農種植孶養等事仰見無不行而耕耘種植孶養之道無不備矣謹奏凡利民善政須圖悠久循序漸進力行不倦而又加以廣耳目明勸懲將公事一如家事用心未有不克辦集之事也勉之雍正二年七月初八日貴州巡撫臣毛文銓謹奏為仰籲聖恩事竊查安順府屬之普定縣知縣何經文才守實為黔省州縣中第一督臣髙其倬提臣趙坤無不深器其為人今經文之父何鼎身故遺命將經文出繼伊弟何巽為後經文聞報泣懇奔喪伏思人才難得且臣現在整理厰務業經咨㑹督臣將次具本題奏已委經文董理其事查經文實係竭已奉公之員伏乞聖主俯允在任守制俾臣得收臂指之使仰沐天恩非淺矣臣不敢冒昧題請謹具摺奏聞伏乞睿鑒謹奏不但留伊在任朕另有㫖同日又奏為奏聞雨水情形事竊貴州自五月十五日以後至六月十四日以前雨澤微少自十四日以後大雨時行髙下皆遍各處田禾十分暢茂可望有年俟至八月間查明分數另行奏報外合先奏聞上慰聖懷謹奏深慰朕懷全賴爾等封疆大吏實心敷政協贊皇猷以感召天和也此理有如立竿見影若稍存信不及之心則失之毫釐謬以千里勉之慎之雍正二年八月二十八日貴州巡撫臣毛文銓謹奏為遵㫖回奏事竊臣具奏前任撫臣金世揚私動庫銀收買水銀一事欽奉硃批又八月十二日新任貴東糧道臣李日更至黔欽奉上諭各到臣除奉發密議臣查照欽遵外竊惟我皇上聖明天縱雖在萬里之外猶如廷陛之間莫不昭晰無遺貴州吏治之壞起於劉䕃樞查劉䕃樞本非貪殘之輩但其性膠固偏執凡地方一有苗賊劫虜焚燒具報巡撫衙門䕃樞輒怒形於色屬官逆探其指惟以諱匿逢迎而各處苗賊窺見隱微遂目無法紀矣武備之弛實起於張文煥查張文煥秉性貪殘而又絶不整理營伍標下員辨賢不肖無分才不才靡别是以將士灰任以來實心任事又復清勤加意整飭地方但緣廢弛巳久一時不能奏效所以不及總兵任內之奉硃批後即知會提臣來省詣臣署跪讀諭㫖遂與臣密商整飭地方諸務嗣後臣敢不仰遵同臣未到之先督提二臣業巳咨商擬撤回該協營分防安平龍里千把二員兵一百四十名增添於定廣兩處臣到任後復准督臣知會熟商現在備查險要之所會同提臣確議將來若猶不足以不使凍餒之外斷不容其朘削民膏以肥子孫事無大小臣惟有一一凛遵聖訓悉心料理屏絶私情一種不法奸民每每從中播弄以殺虜為常臣愚以為治此等凶徒必當威先恩後然當此歷任頽靡之際如只杖斃數人猶不足以寒其心而落其膽仰請聖諭許臣便宜從事凡獲苗狆極惡之渠魁漢奸窮凶首惡立刻請出王命綁赴市曹即行處斬仍傳首諸夷示衆伊等見迅速不測如此莫知端倪則地方庶幾可望少安然臣非䇿之萬全亦不敢輕舉妄動也理合一併奏明請㫖可否之間伏候睿裁謹奏滿保孔育珣曽類此舉行過數事偶一為之以懲戒凶頑末為不可但不可過多耳設或地方上擒獲得極惡渠魁審究明白一面正法即一面將其情罪并正法緣由具奏以聞雍正二年十月二十四日雲貴總督臣髙其倬貴州提督臣趙坤貴州巡撫臣毛文銓謹奏為奏聞擒獲定廣凶苗事竊查黔省諸苗惟狆家苗一種甚為不法而為該地方之渠魁者名阿近性極凶頑恃其胞弟阿臥膂力過人復恃其所居之地名散幹者山深箐密峭石參天極其險峻欲至其穴者須由地名線塘西孟一帶而進兩邊怪石嵯峨草樹茂密惟中間一線之路二人不能並行實為天險一遇擒捕者賊黨隨潛伏兩邊放弩抗拒兵役輒被殺傷又復迫脅各寨諸苗荼毒往來商旅毫無忌憚臣等叨荷聖恩膺此封疆重任首在整飭地方今近賊如此凶頑不法若不及早規畫良圗發兵擒剪倘姑息養奸即為地方之大害然非調發官兵懾其凶威終難擒獲故臣坤即咨會臣其倬臣文銓遂調大定平逺等鎮協及提標前後營遊擊卜萬年等守備吳從周等并千把各員共官三十一員兵二千四百名前往於九月二十日從定番起行經由各寨初雖不免驚惶臣等各揭示曉諭罪止渠魁餘所不問槩免株連各寨見示莫不歡呼遵化願為前導於是官兵直至賊穴咽喉地名底塘分布環劄而近賊輒將通巢要口盡用木石壘塞臣等屢示機宜官兵用命各攀援而入阿近等遂即分逃大箐於十月初七日拏獲阿近胞弟阿卧并妻若子及辨員力行平治其餘要害之處亦皆設立汛防至於官兵口糧臣等暫令將定廣兩州存倉米石動别正法容正法後另摺具奏所有擒獲渠魁及黨賊緣由合先奏聞查此等事原不應擅騎驛馬但因平殄惡苗事關重大罔敢稽延之故伏乞皇上睿鑒謹奏如此可喜之事乘驛來奏猶嫌其遲也卿等此番戡定惡苗之勞績甚屬可嘉朕不勝欣悅巳另有㫖諭部矣雍正二年十一月十七日貴州巡撫臣毛文銓謹奏為奏請聖恩事竊查貴州苗害大則定廣次則安順再次則都勻黎平等府臣叨荷聖恩膺此重任敢不竭盡駑駘力圗報效今都勻巳獲久經漏網積年難得之凶苗羅三龍查羅三龍雖非阿近阿卧可比然亦係該地方之元凶首惡此賊一除地方亦可少安容臣飭拏夥盜具題正法外至於黎平臣巳諄諄嚴飭各該土司改弦易轍禁戢部苗現在相機整理獨安順府屬鎮寧州所轄之康佐司土官薛世幹者其罪實浮於各處土司伊住居之處名曰白老虎寨其險峻與定廣阿近阿卧所居之散幹無殊世幹每每指揮部曲偵探殷實民苗及往來商旅恣行劫殺及至嚴檄提拏而世幹竟恃險深藏藐抗不出已非一日矣臣與督提二臣再三計議若不嚴行究處不但各處奸苗益無忌憚即通省土官亦皆效世幹之所為矣若再大興師旅或恐官兵一至其地互有殺傷莫若先行化誨故臣即㑹同督提二臣遣修文縣知縣朱齊年至其寨中諭以禍福令其作速來歸待以不死倘猶敢恃險抗不到官則必立即𠞰除世幹聞諭即同朱齊年來省臣遂繫之於獄除另行具本請㫖歸流革去康佐司土官名目并於平逺協抽撥千總一員兵丁一百名即駐白老虎寨防守外至於世幹一犯固無惡不為者也但其聞諭即至省城不費一矢而除此一患者實因臣許待以不死故也今若不踐前言恐將來不能取信夷人伏望聞謹奏知道了四月九月間官兵被辱貽笑苗夷之事為何隱而未奏雍正二年十二月十八日貴州巡撫臣毛文銓謹奏為恭謝皇上御極以來選俊登庸人材輩出庸碌如臣者一長無取三黜何辭況復有以居官甚巧操守平常論奏於黼座之前者乃䝉我皇上曲賜矜全更加天語欽佩終身以仰副聖主器使殊恩於萬一理合具摺恭謝伏乞睿鑒謹奏勉之勉之第一不可趨奉權要以私害公於爾無益而反有損也宜切以為戒雍正三年正月二十六日貴州巡撫臣毛文銓謹奏為奏聞府備勒捕凶苗事竊查貴州一省惟苗夷為地方深患雍正二年十二月內據安順府報稱有狆苗焚劫唐三寨生員胡種玉等家臣即飛檄行查知為廣順州所屬地名者貢長寨凶苗查廣順州所屬者貢長寨昔有極惡狆賊之首名阿棍者與定番州已正法之阿近相為雄長者也臣到任後正欲擒滅而阿棍適因同類相殘誤中飛矢身死今焚劫唐三寨既屬者貢長寨凶苗必為阿棍黨賊無標前營守備鄥元度帶兵二百名親至廣順州商同該州盧兆鶚相機行事矣昨又據何經文等報稱有者貢長寨二處頭人見府備親往情願自行查明拏獻俟拏獻到日審題外理合先行奏聞謹奏凡事貴協於中不宜偏執遇有事時惟圗安靜則誤於因循無事時鋭意振作則失之孟浪若貪功而妄逞兵威斷然不可苖猓雖愚亦人類也豈無良心既示之以威即宜繼之以德總要武辨整飭營伍有司清白吏治數年後再無不感化之理也勉力為之同日又奏為奏聞事竊查雍正二年十二月十二日鎮逺府失火共延燒民房一百零五户並未傷人又十七日大定州失火共延燒官民房五百九十七户被燒身死者五名臣仰體皇仁已分别賑恤不致失所理合奏明謹奏此或盜賊奸宄之所為皆不可知雖然亦天災也當查明府州縣所有之火神廟宇諭令修舉典禮并飭備救焚器具庶為思患預防之道同日又奏為恭謝天恩事竊臣遣承差王三聘等奏請聖恩乞將康佐司土官薛世幹終身監禁摺內奉皇上硃批四月九月間官兵被辱遺笑苗夷之事為何隱而未奏欽此臣跪讀之下悚惕靡寧臣䝉皇上髙天厚地之恩擢升貴州巡撫雖粉身碎骨猶不足以報稱萬一寧敢一事隱瞞自外生成查定廣惡苗阿近阿卧等為害已非一日臣昔在雲南時知雍正元二年間被劾定廣副將陳元勳遣兵擒捕疊被阿近阿卧等殺傷臣到任後思阿近等斷不可一日姑容正在屢次遣人偵其虛實之時而副將陳元勳遽於雍正二年八月間並不先禀督提二臣亦無片紙具報臣衙門即帶兵三百名假以遊巡為詞潛至西孟等處僅令千把數員共帶兵一百二十名前進伊竟駐劄在外致被阿近等放弩拒敵箭傷兵丁一十二名被阿近等捉去一名旋亦放出臣探知此信即星飛知㑹督提二臣發兵擒拏官兵於九月間分三路而行有黔西協之左營遊擊郭世發平逺協之右營遊擊楊振統領官兵夜宿谷令苗寨鈐束不嚴致使兵丁失火延燒谷令之苗忽自驚疑認為官兵併欲𠞰滅伊等遂各上山放弩而官兵恐為近賊之黨亦各放鎗至曉仍即掣至定番諸將當亦傳諭頭人釋其疑畏臣據報復揭示諸苗旋各翕然遵化故官兵得移步為營前抵賊巢擒獲阿近等臣愚昧無知竟不備細奏明臣之昏庸實無辭自解乃䝉聖主寬其罪責此誠天地并包之大德父母曲恕之深仁臣感激之下涕泗為零自問此後愈不知所以仰報矣理合具摺恭謝天恩伏乞睿鑒謹奏既過矣惟改耳向後慎毋再蹈故轍同日又以致去年具奏擒獲定廣凶苗阿近等摺內從前之事誤不逐一指實聲明自奉硃批神魂飛越寢食遺忘今後更不敢避煩瀆之咎務當一一奏陳外至於阿近阿卧正法緣由欽奉硃批令臣具題但查題本似與密摺不同所有雍正元年三月以後官兵被辱之事臣愚昧無知題本之內仍未敢指實聲明合先奏乞天恩仰祈睿鑒謹奏論理本內亦當聲明何也使天下後世知我師出之有名不亦善乎總之天下無可隱諱之事當深以此為戒雍正三年十月初六日福建巡撫臣毛文銓謹奏為奏聞事竊臣䝉皇上天恩補授福建巡撫自九月十四日入境以及到省以來凡有言及鹽政者莫不云官民交困且言額外雖曽加課終屬虛名實於國課毫無禆益臣現在備細查核俟查明之日㑹同署督臣宜兆熊一一據實奏聞至福建鹽政向來係總督専主蓋因前撫臣黃國材惟督臣之言是聽相沿未改故也臣受恩深重不敢避嫌推諉合先奏聞謹奏朕早知之已有㫖矣爾其竭力為之同日又奏為奏聞各屬被水情形仰祈聖鑒事竊臣自入閩疆接閲泉州府所屬晉江同安二縣漳州府所屬龍溪漳浦南靖平和詔安等五縣各報稱八月十四五等日大雨傾盆水勢驟漲內漳浦縣倒壞民房九十餘間平和縣城垣坍塌數丈又該縣之礎溪壩一處已被湮沒淹死男婦二十名口十六日水即漸退幸各處田禾俱未傷損等因臣一靣飛檄藩司分别賑恤一面委員各處查勘臣又查得七月十七日大雨連宵有福寧州所屬之福安縣被水甚大人民廬舍漂沒最多即田地亦被衝壞四五百畝前任督撫臣滿保等發銀二百兩賑恤在案理合一併據實奏聞伏乞皇上睿鑒謹奏今歲直省在在皆有被水處必毋致一夫不獲其所乃朕意也撫恤之道不宜少怠同日又奏為謹陳厦門流匪情形并前後獲犯事竊厦門地方於八月二十五日黃昏時候有流匪數十餘人各執腰刀竹鋛欲進城劫庫當即現獲首犯郭興吳壘等一十餘名臣一聞此信即飛檄移行嚴加擒捕並立差親信之人星夜往厦門確查去後因該地念四﨑地方向有營中空房一所歷係郭興吳壘二人看守不意此二賊暗蓄不良遂密引漳州同安二處無藉之徒數十餘人到厦門假稱土地神慶夀演唱偶戲暗製器械原訂於二十六日放火搶劫至二十五日夜賊徒內有一人飲醉露形衆賊恐其事敗不及待至明日遂一擁而出至走馬路即搶刀鋪各執凶器分而為二一攻城外中營守備魏國泰衙門該備率家丁向前對敵賊遂退出一攻城內中營參將李若驥衙門該將亦率領家丁迎殺賊即由東門逃出適遇該標將備領兵前來追至海邊即先後拏獲郭興吳壘劉奪劉衆劉賞林使吳靖鄭敢林培陳五王細吳語等一十二人而官兵內亦被賊殺傷身死施勇陳辰陳紹祖等三名今復據各該文武又先後拏獲施求周好并賊屬蔡氏吳氏等共五十七名今厦門地方安堵百姓貿易如常臣現在㑹同署督臣疊檄緝拏餘黨解省㑹審明確請㫖定奪至於郭興等一夥臣聞多有營兵在內臣現在密訪一得其情即行密奏恐厪聖懷合先奏聞謹奏此事於各處奏報朕已知悉當嚴緝務獲勿使一名漏網斷不可稍有疏縱同日又奏為奏聞事竊查福建一省處於山海之間兵民刁悍而生監抗糧尤為惡習總因從前姑息成風以至於此此歷年奏報撥運浙江漳泉之米至今未經買補者甚多其撥運之米多有贏餘每次或餘二萬或餘一萬餘總之撥運多者餘銀即多撥運少者餘銀即少此所餘之項前任督臣滿保竟有取用者臣愚以為此等銀兩雖屬額外贏餘之項亦可存作正項開銷之用豈容私行取用海關稅務前任撫臣黃國材題奏贏餘之外尚有糖稅銀兩國材仍循舊轍自行收用不入贏餘查糖稅者係江浙客民赴臺灣買糖裝往各該地方銷賣過關輸稅之項嗣後臣即同贏餘一併搭解奏明臺灣一府孤懸海外該地又復五方雜處兵民更多不法而加以生􅌻各番天性凶頑務須在臺文武同心合力日夜隄防方免後患今聞巡臺御所聞不敢不奏至於該地原為反側不常之所凡屬蟻聚為匪事發類有富户人等為之謀主臣前者在京靣奉恩㫖該地富户必當設法移歸內地仰見皇上至聖至明無微不燭但查無事遷移人情不無震件一經發覺即行通報批審如內有富户人等為之謀主者除治罪外即借此押移內地不許容留在臺多事并嗣後聚衆劫殺案內有富户為之謀主者除治罪外即抄沒其家如此漸漸行之則人皇上密諭數事臣現在欽遵密訪俟毫髮無疑即口授臣子毛宗儀繕摺具奏合先奏聞謹奏所奏皆中肯綮殊為可嘉何煩朕再諭但期言行相符實力舉措以奏成效耳雍正三年十月二十五日福建巡撫臣毛文銓謹奏為再行具摺奏聞事竊臣前奏海關糖稅前撫臣黃國材自行收用一事臣再四細查乃係各省商民往臺灣販買黑白糖斤仍回各省貨賣由厦門掛號按船收取名曰驗規故每船一隻納銀一十六兩二錢非照糖斤上稅因前摺尚未分晰故再具摺奏聞臣訪得此項銀兩有云商客情願即在臺灣完納如果就臺灣完納則船隻尚多不止五六七百即每隻十六兩二錢之外猶可量增資助臺餉有云前項船隻亦有不甚情願者其說不一故臣未敢冒昧現在飭行細查容俟毫髮無疑即便舉行伏乞皇上睿鑒謹奏宜查訪的確詳審斟酌而行同日又奏為奏明養亷事竊臣巡撫衙門向有布政司羡餘銀五千兩馬械銀一千九百餘兩稅羡銀一千兩及臣標親丁銀九百九十餘兩今自海關歸於巡撫又增火耗一項查海關收稅歷分三等大商船厦門等處加二泉州等處加一小商船及漁船無耗每嵗約有二萬兩上下臣聞黃國材即以此項耗羡及布政司衙門羡餘等項作一切公用銷除臣查巡撫衙門雖有公用然亦未必竟須如許且國材尚有糖船驗規又收各屬節禮臣䝉聖恩雖一字亦不敢欺瞞今臣到任方新海關稅羡實有若干容俟一年之後共計收得若干一應公私用度約得若干另摺奏請聖裁至於關上書辦巡役人等各有飯錢臣亦准其照舊收取恐一經裁減反致别生巧攫之門合并奏聞伏乞皇上睿鑒謹奏所奏甚是知道了其橄欖木且緩起解朕諭部另有咨文行知同日又奏為仰請聖恩事竊查福建一省處於山海之間民情刁悍不但性好抗糧習嫻爭訟抑且動輒操戈羣相鬬殺而沿海各縣更多偷越外洋恣行劫掠苦害商民若非清亷强幹之員塞其作奸之路扼其走險之途則錢糧抗缺訟獄繁興以及外洋盜案勢必日甚日深查通省九府一州一十六同知通判六十一縣現在出差事故府㕔縣共缺官一十五員其餘雜職亦共缺官二十五員其間雖選補有人而迄今終未到任者總因數千里程途不能一時得至故也況臣細訪各屬不稱職者頗有其人勢須參劾以肅官方將來即有接踵到任之員亦必有接踵去任之員是缺者終缺咸在鄰封選委伏查閩省各府州縣多屬沿海未免顧此失彼仰乞皇上天恩於各省到部應選應補同知通判知縣內共揀選十員速發來閩庶得隨時委用於地方實有裨益理合具摺奏請仰祈聖鑒謹奏吏部速議具奏同日又奏為奏聞事竊臣蒞任後節據漳浦營縣各報稱本年九月二十日酉刻漳浦縣城內有奸徒一名黃尾者門首忽插榕樹青枝為記適漳浦營功加官蔡隆及馬兵黃進二人巡查地方見之因形跡可疑遂將黃尾拏獲解赴該營中軍守備成偉轉報該遊擊李彪該遊擊一面帶兵巡邏一靣即委守備成偉知照文員會審訊據黃尾供稱有一涂廷向伊云今晚有匪類進城搶奪富户你家門首插了榕樹青枝就可免搶奪等語并供夥犯游躍徐愷寧涂法涂蒲程實昻仔并涂廷等遂差兵丁前後拏獲復據徐愷寧供出林昂為首又徐貌一名又有名陳鎮者家中現藏旗一面鼓鑼各二靣單刀兩把又據兵役拏到陳鎮搜出單刀鳥鎗木棍腰刀復據供出夥犯林穆等十名㑹集於周招家中又據兵役拏獲林昂一犯訊據供稱伊係做醫生度活因林棍家中有厦門逃來流匪吳通陳罔二名請醫治刀傷即商量入夥實係林棍為首林棍是個監生旗布器械都在他家衆人在周招家等語即據兵役拏獲林棍及徐貌現解漳浦縣收審各等因到臣臣查林棍等聚衆製械欲進漳浦縣城搶劫富户實因厦門匪類郭興等一案所以聞風而起若不從重究處何以懾怖奸人之膽幸所獲已多奸徒四散逃亡人心大定臣現同署督臣星飭確審審明後臣愚以為此案奸徒雖聚衆商謀搶劫然實未上盜似與厦門郭興等公然殺害官兵者不同臣欲商同督提二臣將內為首及藏械藏人者即在該地杖斃抄沒其家外其餘夥犯嚴行枷責仍按輕重分别永行禁錮看守是否可行伏乞皇上天恩指示謹奏此案斷不可寬縱俾匪類漏脫貽害良民不特有違國法亦係大損陰德事也此等縱虎歸山之假仁慈胸中萬萬存不得但以嚴而不枉為要特諭雍正三年十一月十九日福建巡撫臣毛文銓謹奏為遵㫖密奏事竊臣䝉皇上靣諭確查福州將軍宜兆熊居官之處臣到任後將伊從前及現在所行之事細細留心訪察宜兆熊居官和平行事醇正操守亦甚亷潔每年所隨丁餉銀除捐造盤鎗火藥檔木旗纛并買稻榖及供給清書義學外尚剩銀五六百兩又訪得宜兆熊若有用度不敷之處前任督臣滿保撫臣黃國材各有些微幫助臣訪查確實理合據實密奏伏乞皇上睿鑒謹奏因伊美逾尋常朕竟至於難信所以諭汝訪察今覽汝奏果不謬矣可喜可喜同日又奏為遵㫖覆奏事竊臣䝉皇上面發福建邵武府光澤縣卓異知縣吳堂又福州府照磨升授陜西布政使照磨王家埏奏摺二件命臣查明具奏欽此臣查據吳堂奏稱光澤山稠地褊竟有無田而頂虛糧者緣民間賣田豪家乘急抑勒縮少糧數方肯售買延至田又轉售糧則仍留原户臣設法免徴節省墊解仍勸民間山腳水濵稍可開砌成田之處勻補虛糧等語查開墾之田例應造報題達升科豈容别抵虛糧況凡買地抑勒賣主少過錢糧者皆豪惡所為今若將開墾之田代其勻補則嗣後豪惡益無忌憚今惟應通行各屬確查所轄凡有虛糧各令受業之人照數收回輸納所有開砌成田勻補虛糧之處不便准行又據奏稱大户包攬衆小户錢糧藐不完官恃襟成黨縣官容之則虧課治之則招怨等語查閩省惡襟包攬甚多臣現在嚴行釐剔州縣各官專司錢榖若以招怨為憂何事不成姑息嗣後如有實心為公不畏强禦者臣即行奏薦庸懦無能者臣即當參處則地方頽敗之風庶幾得以少變焉又據王家埏奏稱閩省山多田少田不多墾米不足用仰請皇上敕諭殷實之家預發穀種牛具搭蓋草房招徠窮民在於山海邊隅之地盡力開墾成熟照例升科各分籽粒等語查開墾荒山荒地例應地方官設法借給牛種如令有力之家預發則有力者悉屬豪强一經預發日後成田無窮抑勒佃户勢不能堪況搭蓋草房閩省尤為首禁蓋慮山海之區不法之徒棲息為非故也亦不便准行理合查明具奏伏乞睿鑒謹奏凡有條奏朕皆發與爾等封疆大吏斟酌其可否自當如此據實奏覆豈可將就阿順以貽誤地方耶同日又奏為奏聞臺灣情形仰祈睿鑒事竊查臺灣府逺處重洋之外凡居彼地之人為習俗所移最易生事又有生番之患查生番殺害人民歷年不一而足即本年亦三四見矣然推原殺害人民之故悉由被殺之人自取夫生番一種向不出外皆潛處於伊界之中耕耘度活內地人民或因開墾而占其空地閒山或因砍木而攘其藤梢竹木生番見之未有不即行殺害釀成大案者為今之計惟有清其域限嚴禁諸色人等總不許輒入生番界內方得無事臣已檄行道府移會營員務令逐一查明在逼近生番交界之間各立大碑杜其擅入但地方遼濶走險之徒必有百計圖維而偷入其中者恐亦未能盡絶至於招撫生番一事地方各官亦有被不肖熟番所欺有以熟作生者在內然此係風聞之事虛實尚未分明但既得此言不敢不據實陳奏伏乞皇上睿鑒謹奏此論甚當從前嚴禁時頗屬平靜後因藍廷珍圖小利起見遂遺此害也同日又奏為再摺奏聞仰祈睿鑒事竊查厦門流匪郭興等漳浦縣流匪黃尾等二案俱經臣前後具摺奏聞除黃尾等恭候御批到日臣等審明後即欽遵發落至於郭興等一案臣初到時訪聞有營兵在內今查案內之犯吳壘一名係水師提標左營兵丁續獲陳地并未獲官勇等二名係臺灣水師營兵丁其餘有無現在細查另容密奏伏乞皇上睿鑒謹奏此等事件只宜從嚴慎毋絲毫欺隱為要外無别諭也同日又奏為奏聞事竊閩省藩庫錢糧據布政使臣秦國龍造冊請盤前來經臣逐一細盤並無虧空查秦國龍才雖中平而監守庫藏尚屬謹慎至於兑收各屬錢糧每百兩原有加平三四五錢不等放餉時在外各標鎮協營並無加平短少數十平中間有一二平短少錢餘然非國龍有意為之也其在省將軍督撫各標每百兩歷來各加三錢國龍均照舊例而行今兑收各屬錢糧臣只令每百兩加平一錢放餉時除將軍督撫諸臣各標仍令每百兩各加三錢外其餘各鎮標協營務彈兑畫一理合一併奏聞謹奏秦國龍老成人也朕可以保其操守同日又奏為奏聞事竊臣接准部咨欽奉皇上特㫖將福建鹽政命臣管理竊臣自蒞任以來即聞人言藉藉咸云福建鹽政敗壞不堪并稱雖曽加課終屬虛名經臣具摺奏聞臣今再四訪查始得其詳蓋緣閩省田地甚少窮民倚鹽為生者不可勝數如延建邵等府一切委官運賣凡有餘瀝悉為辨員人役所有失業之人無所仰賴此造言生事之所由來也至於所稱雖曽加課終屬虛名之處又因前督臣滿保將雍正元年九月奉文起至十二月底止并雍正三年正月起至六月底止徴收一應課銀槩增入雍正二年之內報作贏餘夫元年并三年徴收之一應課銀總屬朝廷國課盈此即絀彼此終屬虛名之言所由來也臣思措置之方必於國計民生兩有裨益方能經久查興泉道陶範於鹽政甚為練達人亦老成臣現與再三斟酌務求公私均利分别奏請施行臣恐新任運司景考祥未能一時即有條理欲暫留陶範在省協辦半年或十個月再令回任理合一并奏明仰祈聖鑒謹奏甚好滿保鹽務內之弊端雖毫末亦不可代為隱飾必盡情剖露方是再者景考祥非朕信用人也觀其言行似非誠實倘有不妥處據實奏聞同日又奏為遵㫖密奏事竊臣䝉皇上面諭確查前任督臣滿保前任撫臣黃國材居官之處臣到任後即細細留心訪察查滿保自雍正元年以前地方事務不甚整理各官中有逢迎合意者雖有遺誤亦不切究至於操守聞做巡撫時甚好一升總督後即變節不堪不但保題委署及年節間屬員餽遺概行接受即伊母親生日亦勒令各屬送禮自皇上即位以來屢加申飭地方事務比從前留心即操守亦稍謹飭但於節禮一項雖不明收仍令屬員私下併送此雍正元二年之事也到本年又復不堪各項都收即奉召陛見一事尚未定日起身就要各屬先送盤纒民間詞訟滿保原不染指聽斷尚屬公平本年二三月後即多顛倒臣訪係伊子博諾不肖瞞著滿保暗得賄賂所致至於黃國材地方事務頗知留心但要買名欲得紳士歡心是其受病之處若操守竟與滿保做總督時無異不惟各項都收即伊家眷起身及廣西捐穀等事寫書與各屬求其幫助盤纒惟詞訟不取臣訪察甚確理合據實密奏臣一身孤立滿保黃國材各有骨肉之親在朝若知臣如此據實奏聞必然怨恨終身伏祈聖主天恩曲賜保全謹奏可笑之極滿保黃國材二人豈待爾奏朕始知悉切毋存此鄙小之見怕人不如畏天假如將無作有揑辭陷人亦不必怕人更當畏天秉公直陳於君父之前為國家除貪懲慝乃大隂功德行事也此等公直立心行已之人若竟遭於小人怨恨之手則所謂天地神明因果報應之理皆無矣胸中倘仍存此見斷不能心逸日休久逺不渝莫忘朕面諭之㫖不可差了陛見時對朕念頭勉之勉之硃批諭㫖卷十三欽定四庫全書硃批諭㫖卷十三下硃批毛文銓奏摺雍正四年正月初四日福建巡撫臣毛文銓謹奏為據實奏聞仰祈聖鑒事竊查閩省鹽政事務紛繁辦事員役甚衆如各場館既為産鹽之地又為收課之區有總理分理之員有書役有家丁均須給以養亷紙劄工食又各場地方窵逺非廣設哨丁責成團長各給以工食俾看守稽查則不能杜私裕課至臣管理鹽政若辜皇上天恩欲於此內染指分文便為負國但辦理鹽務之書吏人等亦難枵腹日用心紅紙劄實不能無且此外尚有都察院衙門公費户部書辦飯錢與夫銅斤河工腳費皆係每年必需之項查通省徴收銀兩既已纎悉歸公即水客肩販若有額外多銷亦於飭行查議等事案內題明以作贏餘分釐皆屬正項斷不能於此內擅動絲毫矣查閩省行鹽向有錢價票錢餘鹽長價伙食鹽等五項名目所有餘利似應仍照舊例存作各項費用毋許於正項之內那用分文以公完公似屬妥便但查各項所需尚未酌定而錢價等五項一嵗之中共有若干亦難預料請俟嵗底計算如不足即於次年所收各項內通融抵補如有餘仍撥入贏餘案內充餉如此庶正課無虧而事務可以辦集矣理合據實奏聞謹奏是則因之非則革之斟酌損益在爾秉公為之朕未經親歷目睹當之與否何可懸斷於爾陛見時朕已面諭過朕不喜爾等矯亷亦未有令官吏胥役人等枵腹從事之理總之於天理人情之內秉公調劑朕無不諒之也同日又奏為遵㫖覆奏事竊臣前於奏聞事摺內附奏臺灣各官不能相和緣由奉皇上硃批訪問的確即行奏聞欽此臣輾轉訪查始知其概而不和之中惟獨巡臺滿御史禪濟布與漢御史今授運使景考祥為尤甚臣聞禪濟布欲有所行景考祥務必再三執拗兼且每在他人前訾詈禪濟布操守不潔材具不堪所以禪濟布銜恨尤深至文武中如臺厦道吳昌祚臺灣府范廷謀海防同知王作梅淡水同知王汧及升任參將吕瑞麟等皆直景考祥而即為禪濟布所不悅總兵林亮與禪濟布相得而即為景考祥所不悅不和之故皆出於此至於一切備細臣尚未深知俟訪查確實再行陳明謹奏不和之情狀已呈露朕前矣但人一不和則難辨其是與非髙其倬自京赴閩時朕另當靣諭之也同日又奏為請撫生番事竊臣據臺郡文武各官報稱查南北兩路番社甚多其為害於鳳諸二縣者惟山猪毛等社其為害于彰化縣者惟水沙連等社皆由從前不繩以國法遂使益無顧忌山猪毛等社向日擒獲凶犯四人稍知畏懼至水沙連等社從未一加懲創以致半年之內焚殺疊見為今之計當以番攻番令各社之通事土官擇其勇敢者數人為前導率領番壯直抵巢穴而使汛兵駐劄山口壯其聲勢取勝甚易今幸天假其緣凶番合當授首本年豐熟今春平糶粟價每石五錢除買補外儘有贏餘可充公用行糧火藥各有所出但剿番惟賴冬日夏秋雨水連綿鎗炮無用一交春二三月又難舉行今十月將盡冬日無幾現在會商委員尅期舉行從此海疆安如磐石等因到臣臣即會同署督臣宜兆熊再四熟商水沙連等社自正月至八月焚殺不啻再三似不便再行姑息況係以番攻番而大兵不過駐劄山口壯其聲勢實無大患故即批准并嚴飭伊等籌畫萬全舉行矣除俟續報到日作何剿撫並動贏餘若干另行具奏外合先奏聞謹奏知道了卿等自然審其可行而後行之也同日又奏為密請聖恩事竊查閩省文武生員抗糧不法不比尋常大小各官悉心整理猶懼此風不能頓改若再欲於伊等面上討好沽名曲加庇護地方即不可問矣學臣黃之雋凡各屬或因抗糧或因人命詳請斥革務必批行再審卒不除名夫伊等既犯抗糧既干人命刑訊猶且不招若有護符反肯吐露實情此必無之事也之雋若不痛改前非則將來文武生員之抗糧不法勢無底止至於文武生員即文武臣工之階級臣敢不實心樂育而肯苛刻待之乎但法若一弛則諸弊叢生即不可救藥伏懇皇上密諭學臣黃之雋嗣後務勿仍前庇護以致寖長頽風貽患海疆地方幸甚臣謹具摺奏聞仰乞皇上睿鑒謹奏果如此將黃之雋調回亦可借此以警戒天下學臣何必屑屑密諭為耶非不得人之缺可比也同日又奏為據實奏明仰祈聖鑒事竊查閩省俸工內地八府約計七萬兩向充通省公用自奉諭㫖飭禁之後前任督撫臣滿保黃國材等商量公用中如承造戰船辦解銅斤俱屬火急之務各項幫貼刻不能緩於七萬之內酌捐二萬四千有零以作前項所需餘皆給還在案至於臺灣一府俸工不過五千一百兩零內除淡水同知彰化縣俸工分釐不捐外其道府以下通共四千一百一十兩零內酌捐二千七百五十六兩以充巡臺御史兩衙門官役薪水工食餘亦給還在案以上每年動用銀兩各改名為公捐臣查閩省公務實繁如戰船銅斤各項幫貼尤為緊要實不能免即巡臺御史官役薪水工食亦所必需但因名為公捐其實即屬俸工臣䝉皇上天恩至深至厚不敢不據實奏明也謹奏知道了髙其倬抵任後爾等更當設法籌畫務令妥協雍正四年二月初四日福建巡撫臣毛文銓謹奏為奏聞事竊管理閩海關之糧驛道韓奕一年又滿且身染志報效皇恩臣聞其如此即傳該府奬勵察其舉動意甚堅而心甚切臣遂諭云爾管理一年之後果有成效便當據實保薦皇上聖明臣下忠誠未有不知該府涕泗交流唯唯而退今伊已於正月二十七日任事矣將來言行若奏明伏乞皇上睿鑒謹奏聞韓奕居官無狀向日於滿保黃國材處惟以鑽營為事已有㫖矣但所知尚不甚確查明據實奏覆同日又奏為奏聞事竊閩省自新正以來連朝隂雨一月之內僅得三五天晴霽故米糧漸貴延平等府每一倉石價銀一兩以外省城每一倉石價銀一兩四五六錢不等漳泉等府每一倉石價銀一兩七八九錢不等查延建等處原係産米之鄉聞該處蓋藏尚多可以無虞漳泉等處歷來仰藉臺灣之米從前題定有例凡正二三四五等五個月每月從臺灣撥米一萬石運赴漳泉接濟臣業經飛檄行催臺米一至價必漸落亦可無虞惟省城五方雜處兵民稠集因本屬産米無多獨賴上游之米今查上游米船每日到省雖多但因地頭既貴所以不能即平臣思每石價銀一兩四五六錢尚不謂之過髙但恐將來青黃不接之時米船不到則民情遂不免於皇皇耳臣是以預檄上游各府動支監榖碾米萬石定限於三月中旬陸續運省平糶此示一張人心大定先是福建有困窮刁惡之徒不知先之用今若檄行盡發此風一播則上游米客皆裹足不前矣臣卒不聽其鼓惑恐厪嗣後諒無久雨矣理合一并奏明伏乞皇上聖鑒謹奏據奏料理甚是積貯一事地方首務天下之政莫要於此當時刻留心籌畫不容少懈者也同日又奏為犬馬報主之心甚切謹陳愚悃密請聖裁事竊惟福建一省民風土俗大率喜爭鬬好奢靡此千百年以來之習染牢不可破者也臣默自思維奢靡之漸固不可驟除而爭鬭之源實不可不亟遏查爭鬬常始於大姓次則遊手好閒者蓋閩省大姓最多類皆千萬丁為族聚集而居欺凌左右前後小姓動輒鳴鑼列械脅之以威而為小姓者受逼不堪亦或糾約數姓合而為一遇其相持之際雖文武官員率領兵役前往押釋亦所不能臣現今通行各屬細查一邑之中大姓若干令各造冊報臣每一大姓著本族公舉品行端方為衆所敬服者各四人命其名為鄉望免其差徭凡伊本族聽伊約束即與小族偶有微嫌責令解紛倘仍有列械相持者著落協拘三年之內若無不法事由即加優賚如該族果能奉令風俗稍移即擇地建立仁里二字大坊至於遊手好閒之徒雖不比大姓然而去之最難臣嘗推原其故皆緣閩地凡武臣自水陸提督以及各鎮以下多屬本土之人其內外逺近之親自甲及乙輾轉蔓延不可勝數倚草附木羣相固結臣愚以閩省為反側不常之地防微杜漸當在平時臣請嗣後簡用武臣除水師固不能不取熟識水性者不妨多用患皆寓於此實不僅遊手好閒者無所倚賴而已也再如臺灣一府與內地相為表裏關係非輕臣查臺灣鎮臣林亮雖非傑出之才亦非庸愚之輩但其昔作臺兵今為臺鎮同伍老卒多有存者諸凡未免姑息是以各兵皆無嚴憚之心查其人尚亦屬相當可否之間伏祈聖裁此事所關甚大萬望聖恩將臣此摺留中庶不致風聲泄漏謹具摺密奏以聞謹奏封匣來往何妨乎至爾慮泄漏不但此摺一切俱當慎密中更加慎密方不負朕之任用也雍正四年三月初十日福建巡撫臣毛文銓謹奏為恭謝天恩事竊臣齎摺千總回閩䝉皇上賞臣御書福字并風羊克食臣即出郊跪迎至署望闕叩頭祗領訖伏念臣以庸愚之質荷䝉皇上天髙地厚之恩異數所加殆無倫比臣曉夜思維末由仰報惟有刻刻凛遵陛見時皇上面降諭㫖不敢瞻狥不敢顧忌於地方事務殫心整飭實力舉行仍分别次第奏聞仰賴聖明在上臣亦毫無隱匿回護之私見以自外生成也為此恭謝天恩伏乞睿鑒謹奏堅守初念不隨境而遷移乃大丈夫之所能莫易視之同日又奏為欽奉硃批先行覆奏事竊臣具奏前督臣滿保管理鹽務諸緣由及請留興泉道陶範暫留協辧一摺內荷䝉皇上硃批甚好滿保鹽務內弊端雖毫末亦不可代為隱飾必盡情剖露方是再者景考祥非朕信用人也觀其言行似非誠實倘有不妥處據實奏聞欽此查滿保於鹽務內原無染指惟有以少報多那前掩後等弊臣業經具本題明候㫖外至於景考祥臣近觀其辦事雖因到任未久猶未深悉鹽政情形但諸凡尚秉至公並無私心臣謹遵諭㫖嗣後當留心訪察倘有不誠不妥之處即據實奏聞謹奏知道了已有㫖矣此事爾所聞不公而且不實同日又奏為奏請聖恩事竊閲邸抄知臣標右營遊擊章隆奉㫖補授江南提標中軍參將所遺員缺亦經奉㫖著侍衛張起雲補授臣何敢再行瀆請但查福建山海之區巖疆重地臣兩標將領除約束兵丁整飭營伍之外臣差遣巡查之事不一而足若非幹練清勤可以深信而無疑者即難任使查臣標左營中軍守備陳徽原係皇上挑選甚好之人才具操守將備內實不可以多得仰懇皇上天恩俯將陳徽賞補臣標右營遊擊其張起雲即留閩省交與督臣衙門遇有陸路遊擊缺出另行題補如䝉恩允臣實獲收臂指之使沐聖慈非淺矣臣謹繕摺奏請伏乞皇上睿鑒謹奏朕看張起雲較陳徽更好但爾既經試驗過之人自必於任使處尤覺穩當巳准爾所請諭部矣同日又奏為據實奏聞仰祈睿鑒事竊查貿易洋船䝉聖祖仁皇帝禁往西洋等處而安南一國原不與焉是以廣東現在往來不絶獨閩省訪係前任督臣滿保欲心甚大洋商力不能支難以應命故始終被抑不行閩省山海之區民間衣食無資每多走險臣查安南原係近境若照粵東之例此禁一弛不但贍養無數窮民而於國課亦不無小補臣因不敢冒昧合先具摺奏絶無一至臣再四訪查始知各國番船無不願來中國緣自康熙五十一二年以後文武大員需索陋規日甚一日如紅毛船一隻倘挾貨百萬兩上下者督撫提鎮衙門必各索至五六千兩不等而以下之文武各員辨又種種抑勒此其所以風聞畏縮不前也臣已出示遍行曉諭所有從前陋規盡行禁革止許徴收正項貨稅閩人開洋貨行者最多伊等與商番聲息極通輾轉流傳番船將來必有至者至於别省臣雖不能深知大約必不能益再臣所委管理海關之延平府知府張道沛實屬潔已奉公之員而上年管理海關之巳故糧道韓奕原無大不肖之處惟為伊總理厦門之家人王子禮所欺臣訪得王子禮因伊主身故將兩月所收稅銀竟未交清臣因錢糧關係故行鎖拏查韓奕係福州將軍臣宜兆熊之親緣臣鎖拏王子禮似有不悅之意然臣於此等案件斷不敢瞻狥顧忌貽悮公事也理合一併奏明謹奏知道了韓奕朕已有㫖矣同日又奏為奏聞事竊臣據原任福浙總督覺羅滿保之子博諾差家人先後捧齎欽奉硃批滿保奏摺二匣并宣諭㫖交臣臣敬查第一次齎來硃批奏摺三件內除恭請聖安雨水情形無庸具奏外所有回奏福寧鎮臣顔光旿一件臣查據滿保奏稱總兵顔光旿漢仗好為人勤謹於營伍地方事務俱肯留心所轄兵民相安惟識見時有不到處不肯即為變通每多固執是其短處等因臣查顔光旿漢仗好為人勤謹於營伍地方事務留心洵如滿保所奏至稱所轄兵民相安并每多固執之處臣竊以為不然查顔光旿信用書辦程師濟父子斂怨於兵任用匪人盧兆基斂怨於民兵民殊不相安且其為人和光同塵毫無氣骨何能固執也臣又敬查苐二次齎來硃批奏摺共七件內除恭請聖安雨水情形恭繳硃批并鹽政事務三件臣業於詳請飭行查議及遵㫖察明等事各案內巳將滿保是非虛實逐一題明各無庸具奏外所有奏明原任參革浙江巳故布政使黃明之妻繳出印冊緣由一件臣查據滿保奏稱前項印冊雖據黃棟等供係黃明遺下但冊內所開銀兩俱係黃明在任動支公用自行詳明現有卷案可據者明係黃棟母子因有空白印冊自行填寫以圗誣賴幸䝉皇上聖明指出隱微始得查明實據但案內銀兩關係南巡之事臣不敢冒昧遽行具本題報等因奉有皇上硃批臣伏思聖祖仁皇帝南巡凡諸用度實因夤緣費去者居多臣跪讀硃批仰見我皇上至聖至明今查本案因提人未齊現犯在浙江署督臣宜兆熊尚未審理新任督臣髙其倬諒來不久可到故臣謹將此摺暫行收存俟其到閩交與斟酌料理外所有滿保原奏各摺共九件理合連匣一併恭繳謹奏知道了滿保之奪夀算未必不因此摺壞盡天良之所致也顔光旿爾意仍欲留伊此任抑或謂不宜於此任耶同日又奏為奏聞事竊查臺灣一府逺在重洋之外更以得人為重臺灣縣解任知縣周鍾瑄臣再四訪查歷問按察使汀漳道鹽運使等俱稱周鍾瑄實有才情操守亦好所到之處甚得民心前任諸羅後任臺灣人人愛戴等語昨自摘印後兵民無日不挑送柴米甚至欲將該員搶出先行帶赴省城鎮臣林亮撥兵防守而止如此情形則周鍾瑄之為兵民愛戴實不虛也臣又知封點伊家産時搜出現銀萬餘兩巡臺御史禪濟布指為贓銀查臺灣數年以來前任督撫兩臣奏請運浙及改撥漳泉并發糶米石約存榖價二萬餘兩臣現在疊檄嚴催買補歷據詳稱臺地米價頓長暫懇寬期今將此項指作贓銀實為寃抑但臣又風聞周鍾瑄有借給臺民銀三千兩加二起息然未審係何項銀兩并是否實有其事俟督臣髙其倬到日審訊即明臣總因皇上明目達聰求賢若渴周鍾瑄謝事之後民情愛戴如此恐為禪濟布所搆陷不敢不將臣所聞者一并據實奏聞也謹奏此事朕實難預定總俟審明後兩邊是非方始判然也汝此奏所見甚偏雍正四年四月二十一日福建巡撫臣毛文銓謹奏為奏聞事竊臣奉命管理鹽政自去冬十月中任事以來痛絶那移嚴查揑報除舊額銀九萬四百六十一兩新加銀八萬二千二百兩如數收齊外所存贏餘不減二年所報之數統俟奏銷時另摺奏聞今接准部咨欽奉恩㫖著督臣髙其倬與臣同辨俟髙其倬到任後臣等必當和衷料理仰報皇上任用殊恩又臣前奏各省所到外國洋船甚少閩省數年以來竟無一至因文武大小衙門需索陋規所致臣已不忌衆怨當經出示將陋規盡行革除臣逆料嗣後各處番商必有聞風而至者國家經費需用殷繁若得番商踵至裨益亦非淺鮮然别省陋規若不革除來者終屬無多理合再摺奏聞伏乞皇上睿鑒謹奏果以實心行實政則其效必不虛此自然之理也雍正四年五月初四日福建巡撫臣毛文銓謹奏為奏明事竊惟閩省春雨過多場鹽稀少山僻之所幾有淡食之虞臣雖移緩就急竭力經營終難遍及今幸四月二十三日以後天氣晴朗場鹽廣産各處水客趕運接濟殆無虛日不但民間無淡食之虞而各處鹽價亦復漸平恐厪聖懷理合奏聞謹奏所奏已悉凡百但以公正存心自律誠敬對越神明上蒼之感應有如影響切毋視為渺茫無憑也敬之慎之同日又奏為再摺奏聞仰祈睿鑒事竊查閩省米糧價值雨水情形經臣節次奏聞近來各處仍復如常惟泉漳等府又較前少長蓋緣粵省潮州府米價髙騰紛紛赴閩省厦門等處購為設法運濟然後各得相安至於應徴錢糧臣相調解京餉銀三十一萬兩零臣因事關重大故不敢不據實具摺仰懇聖慈免解今臣復輾轉躊躇若存此三十一萬兩零不但雍正五年春餉無憂雍正五年夏餉亦可藉以通融蓋凡外郡各標鎮協營夏餉例於三月初旬起即先後來省支領查正二兩月開徴未久歷來不過徴得五六萬兩不等而三月初旬之內所收亦屬無多夏餉約需三十五六萬兩若解三十一萬兩零是所賴者惟正二兩月及三月初旬現徴之數而巳甚屬不敷雖部撥有銀而徴收不及如何接濟伏乞聖鑒謹奏此事朕殊不深悉怡親王公正不私爾所見如果得理即應據情報部請示今便奏朕朕亦發部議也倘怡親王向爾等索使用論私費則不免勞朕一畨料理但非也觀爾屢奏急迫之情景必係報部存庫之項不足於中有遮掩之弊若有此等緣由當及早認罪檢舉若朦混摺奏希冀朕以不悉之事降㫖斷無是理此等偏聽之私朕不為也朕信得及怡親王至於爾等朕實未能深信諒怡親王必不肯將不應撥之項撥解爾但據實報部王自有斟酌料理之道設欲弄巧欺隱鑽營趨奉王斷不為搖動也真忠正賢王秉公不私實乃鐵漢非爾等庸常具臣所可比擬諸王大臣欲望朕如待怡親王信任之恩當效法王之居心行事若不能如是效法朕又何肯如是相待也勉之雍正四年五月十四日福建巡撫臣毛文銓謹奏為奏聞事竊惟閩省上年被水收成歉薄今嵗春夏之交雨水過多各處米價髙昂經臣節次奏聞在案臣查本省收成歉薄而江西一省疊准據汀州鎮臣汀州府知府咨報民間遏糴不容來閩廣東潮州又日至泉漳搬運以致米價騰貴查汀屬之歸化等邑漳屬之漳浦等邑泉屬之同安等邑每米一倉石需價二兩五六七八錢不等臣密諭各屬切勸富戶乘時出糶既可拯救桑梓復可免奸民虎視遵法者固多而囤積如故者亦復不少是以有等不法者往往百十為羣勒民罷市短價強買少不如意即行搶奪臣度其緩急量其輕重分别恩威隨時整飭現今俱各安帖獨今夲月初十日省城河下有米船數隻係興化府客人從延建等府運至該地發賣者舟至南臺即有奸民糾衆攔阻不容過橋意欲搶奪閩縣知縣前往解釋奸民不從羣起喧譁鋪民恐怖即行罷市夲日晚省城匪類知南臺之信即效尤聚衆搶奪米鋪兩家臣聞報立委中軍遊擊劉定國將軍臣宜兆熊亦竟敢無端直到臣衙門挨折柵欄進至轅門喧嚷據云平糶官米每一倉斗價銀一錢一分太貴要求減一分等語臣查官米每倉斗賣銀一錢一分可謂平減之極豈容藉口為非故臣立將為首者一十七名即時拏獲開門坐堂逐一嚴刑究處閩人懭悍非威不畏臣嚴處之後即取一百二十斤大枷原欲將伊等盡行枷斃以為不法姦民之戒緣本城各門鄉保百姓人等知臣執法甚嚴各詣臣衙門叩頭􅅹血焚香環跪代為乞命并各認保回家永行拘管不敢為非臣再三當堂親訊知其實出誠心仰體皇上如天好生之德將伊等釋放現今省㑹肅然地方寧帖因有此一端并臣處置緣由不敢不一併據實奏聞謹奏何怯懦至於此極但不知米價曾否依從減去假若彼時惶懼業已依從減價則汝此巡撫之任猶可靦然居之乎此等越格不法之事竟如是草草完結成何體統刁民如未看透汝等伎倆豈敢猖狂若此此風一長恐類斯舉動接踵至矣摺內尚奏稱非威不畏等語殊屬無耻可笑之至有玷朕之任用且大負朕之期望也同日又奏為仰請聖恩事竊查閩省自上年歉收之後米價漸長今嵗雨水過多天氣寒冷禾苗興發甚晚所以米價日騰除省城延建邵武福寧等各府州尚有市米以及存倉積穀可以支持外其餘如泉漳興化汀州等府米價日見髙昂民間類多乏食而泉漳為尤甚臣再三撥救運濟但二府民居稠密且粵省潮州府來閩搬運者又復帆檣不絶所需甚廣勢實難周兹幸臺灣大小二麥并早穀登場臣即委督標守僃邱朗星夜齎文前往斟酌採買市米并令道府先將沿海各縣易於登舟者動撥倉穀五萬石運赴漳泉查刻下泉漳二府人民赴省就食者日至三四萬人臣竭盡駑駘協同文武諸臣刻刻留心安輯約束料理至新榖收成百姓始得安心樂業臣以庸材謬當大任凡事不敢不始終籌畫閩省生齒浩繁全賴本地産米並江省粵省收成不薄然後方保無虞今粵東自顧不遑且大為閩省之纍本省自五月以來雨水調勻但禾苗興發既晚分數必減即至收成後米價必不能平若不預為之計萬一至期歉收將何救濟今臣雖現在檄司借支庫銀委員前到江西採買以備將來之用但查江省現已遏糴竊恐無益仰懇聖恩敕諭江西撫臣裴􅏍度飭行各屬動撥在倉積榖碾米十萬石各令運至閩省交界處所臣委貟齎持腳價前往盤運來省分發各府糶賣查江西産米之鄉似可通融除此之外可以仰給者惟江浙兩省查浙江原非有餘之省況臣業已發銀委員採買不便再令資助江南本地所産既饒而湖廣之米日至蘇州者不可勝數臣查蘇州之米須從乍浦由海運來閩惟用北風今值南風之時待至北風之候為日尚早如至期閩省收成不薄約可支撑除江西一路外無他求否則臣必須動發庫銀委員往蘇採買合先奏明臣緣邊海重地食為民天近日各府雖各安帖若至無可如何之後必不能保其不滋事端也伏乞皇上睿鑒謹奏此等情形何不預先奏明而為斯臨渴掘井之計今已時届仲夏乃云若至無可如何之後必不能保其不滋事端是何言歟且計閩省存留新收米榖有三十五萬餘石各府監榖一百四十二萬餘石摺內總不提起作何動用第言動發庫銀向鄰省各處採買則前項榖石諒皆虧空無遺矣爾所司者何事爾之身家性命事小朕之億萬赤子關係緊要今於爾奏到之日已即敕諭江西撫臣裴􅏍度速碾米十五萬石運赴閩省交界爾其遵照部文速速料理朕用爾為閩撫大誤矣將此諭俟髙其倬到時與看雍正四年六月二十二日福建巡撫臣毛文銓謹奏為新稻將次登場人心大定特摺奏聞仰慰聖懷事臣前因閩省各屬米價日騰民間類多乏食臣再三撥救今幸六月中旬以來如漳泉興化等府收穫甚早之處新稻漸已登場米價稍減省城雖有早稻但收割較遲延建邵多種晚禾刈穫尚需時日所以米價如舊然人心俱巳安帖矣自五月以及六月上旬米價貴時臣深慮山海之區游手好閒并一應不逞之徒藉名滋事故預先密札各屬刻刻留心防範除平糶倉米外仍令各取烟户冊查明實在無可如何之窮民即為賑恤如省城按照烟户冊窮民各給米數次外其餘各府屬缺米巳甚之所日於各門煮粥省城係臣同司道府縣捐給各府係各該地方官及本處冨户紳襟捐助臣愚以為先將實在窮民安頓外其餘有田産有藝業可以支持者烟户冊內開載甚明若敢糾衆强借强搶此即天性凶頑而别具肺腸者也自當嚴行鋤治查自米貴以來各屬禀報强借强搶雖亦時有然實在窮民既多安頓此外滋事奸民未有不即時拏獲分别究處者至於各處田禾臣差人驗勘自五月中旬以後各府雨澤不齊且禾苗亦不能十分暢茂臣細詢田父野老云十日半月之內若得甘霖大沛尚為有年等語臣即通行各屬䖍誠祈禱昨於二十二十一兩日省城大雨四郊霑足竊料外郡於此二日內亦斷無不霑足之理閩省億萬生靈無不仰賴聖德感召天和得免流移理合一并奏聞仰慰聖懷伏乞皇上睿鑒謹奏去冬今春不能未雨綢繆早為計慮致貽朕無限憂懷今何顔復具此奏髙其倬業已到閩可不須汝無用之煩瀆也雍正四年七月十八日福建巡撫臣毛文銓謹奏為聖恩浩蕩臣罪無辭事竊臣於五月十四日具奏閩省米貴情形并請可否敕諭江西撫臣動撥存倉積榖碾米運閩接濟各緣由欽奉皇上硃批臣跪讀之下恐懼慙惶無地自容荷䝉皇上天地包容臣惟有感激涕零而已至於捐積監穀除上年已賣未補及借給兵米并虧空參追各報部有案外其餘實無虧空但緣閩省不啻萬萬生靈日食甚多不敢徒恃倉儲然於緊迫之時已皆動撥協濟臣於各處採買動撥并招商客販糴作此舉動者實因愚昧無知過於憂思深慮本年萬一荒歉若倉儲一盡外糴緩不及時歲內尚可支持而次年春夏不免掣肘即臣奏請動發江西之米亦為次年春夏計也今幸六月各處米價無不漸減而各屬倉穀多有節存以僃緊急除俟飭行藩司查明存撥數目彚詳到日據實造報户部外臣緣荷嚴綸不勝俯伏待罪之至謹奏既將地方貽誤至於此極則已負重罪矣何猶言待罪耶雍正四年八月初四日福建巡撫臣毛文銓謹奏為奏聞事竊本年丙午科鄉試臣例於八月初六日入闈供事所有鹽課贏餘以及八月初六日以後地方事宜容臣出闈後另行具奏理合陳明伏乞皇上睿鑒謹奏地方事宜無庸爾另奏件件悉聽從髙其倬一心辦理不為掣肘不立異同即爾之功也雍正四年九月十六日福建巡撫臣毛文銓謹奏為奏請聖訓事竊查備荒之道莫善於社倉而社倉之設其於邊海尤宜臣細察閩省自奉諭㫖之後各屬既已無不遵行然而大有成效之處至今尚少臣現擬將各州縣分别上中下三等上等者立為十二區中等者立為十區下等者立為八區每區通計村莊若干擇適中之地令設倉厫每遇秋成地方官善為勸導就近運貯各存村莊仍令推一殷實誠篤之人輪流執掌倘遇荒歉即以某區所捐之榖借賑某區人民其倉就令本區之人挨甲看守凡諸出納務須通區共見共聞各該州縣如果措置得宜勸導有方每區各捐榖至二千石者應否容臣彚題給以紀録一次以示奬勵臣未敢擅便合先奏請聖訓謹奏此事一有考成勢必至於逼勒輸納萬萬不可者也雍正四年十月十二日福建巡撫臣毛文銓謹奏為仰懇聖恩事竊臣衙門筆帖式端揆臣查其為人鯁直奉公守法故臣特委伊在於水口關盤查私鹽自伊任事之後上游私鹽甚少即督撫之差船至關亦必逐一盤查不少假借又如鳳山縣下淡水巡檢魏如玉居官亷能辦事勤敏因升授江西南安府照磨經臣兩次咨部請留接准部咨行令具題再議又經臣㑹同督臣髙其倬題請留閩俟有相當之缺補用在案又如淡水同知王汧接准部咨因前任廣西恭城縣任內檢驗不確降二級調用臣查王汧不事昵比不畏强禦凡海洋船隻一有可疑搜剔查拏不遺餘力昨勦撫水沙連等社業經督臣㑹委王汧帶兵進攻且臣已商之督臣嗣後臺府凡有恃財不法藏匿奸匪事發皆欲委該員抄逐經理此實可信之員也除端揆臣不過將其奉公守法之處奏明魏如玉請留補用業已具題所有王汧臣現在繕本㑹同督臣髙其倬具本題留到日仰請皇上天恩俯准將該員帶所降之級留任海疆幸甚謹奏進賢退不肖乃爾等職分之所當為但看陶範張道沛即可知爾取人之識見矣凡百聽高其倬行自無錯謬此奏皆可不必雍正四年十一月初九日福建巡撫臣毛文銓謹奏恭請皇上聖安朕安今已將爾升用爾不可因離任遂怠於所事於新任未到之前更當竭力料理俟新撫到日將一切未了各件一一交代明白方為大臣之居心也若稍疏懈致有錯謬至京何顔見朕同日又奏為奏明事竊惟延平府應存倉榖雖據該知府張道沛屢次詳稱奉前任督臣諭令碾米救濟兵民所有米價現發各縣買補委非虧空等因臣緣前項榖石既無實貯不敢輕信經臣題參請㫖革職究追在案查該員經委管閩海關事務雖現今並無侵蝕錢糧情弊但或恐尚有朦混之處故特委泉州府知府張無咎接管令其徹底清查倘少有營私漏報臣即據實題參理合奏明謹奏方寸中但秉一公字何事不辦同日又奏為奏聞收成分數現今米價事竊查閩省約計各屬收成俱有七八分不等現今米價福州府屬每石一兩以及一兩三四錢不等惟羅源縣八錢五分興化府屬每石一兩一二錢不等泉州府屬每石一兩四五六錢不等惟晉江南安二縣一兩八九錢漳州府屬每石一兩三四五錢不等惟龍溪海澄二縣一兩七八錢延平府屬每石一兩二三錢不等惟順昌縣一兩六錢建寧府屬每石一兩一二錢不等惟夀寧縣一兩八錢六分邵武府屬每石一兩以及一兩五分不等惟光澤縣九錢汀州府屬每石九錢一兩以及一兩二三錢不等惟上杭永定長汀等縣一兩五錢以及一兩七錢臺灣府屬每石一兩二三四錢不等福寧州屬每石一兩一錢惟寧德縣一兩六錢五分臣謹具摺奏聞伏乞皇上睿鑒謹奏據奏收成分數米價情形深慰朕懷雍正四年十一月二十八日福建巡撫臣毛文銓謹奏為奏聞事竊查本年七八月間浙江台州府所屬黃巖洋面頻頻失事盜徒多屬閩省之人臣等無分水陸喫緊嚴拏所有盜窩業經緝獲盜夥亦獲多人惟盜首陳尾潜逃今已於十一月二十二日准水師提臣藍廷珍咨報盜首陳尾已於本月初七日在平海地方拏獲解至廣東潮州府請撥潮州鎮臣衙門兵役協解來厦等情除俟解到日聽督臣髙其倬同先獲盜窩盜夥一併押赴浙江撫臣衙門審題外理合奏聞謹奏此案盜首不致漏脫先後緝獲多名甚屬可嘉同日又奏為奏聞事竊查漳浦縣匪類黃尾門插榕樹青枝為記欲圗進城搶劫富户一案經臣節次奏聞欽奉硃批臣欽遵諭㫖當經疊次嚴行縣府司去後今據將本案人犯屢加刑審係林昻為首因林昻貧無聊賴起意劫搶與陳鎮商謀招人陳鎮遂招葉龍復令葉龍回家招人林昻亦先招有徐愷寧凃廷黃尾等三犯因所招之人尚少不能行事所以並無入城搶劫的期而黃尾凃廷回家即先於門首各插青枝黃尾遂被營兵獲解訊供輾轉妄扳陸續拘緝多人縣府司再三鞫審同夥定謀者實止林昻陳鎮葉龍徐愷寧黃尾凃廷等六犯未入夥定謀實明知林昻等欲行不法首鼠兩端者則有凃法凃蒲等十犯餘皆畏刑妄扳經臣反覆駁查歷據縣府司覆稱實無毫髮遁情臣恐有未盡復㑹同督臣高其倬提齊衆犯逐一嚴加㑹審衆口一辭實與縣府司所審無異當即商同督臣除陳鎮葉龍已伏冥誅外即將林昻押發漳浦縣杖斃通衢示衆徐愷寧黃尾凃廷各重責枷號仍永行監禁其未入夥之凃法凃蒲等十犯各與重責枷號滿日交與各該族鄰鄉保收管約束餘皆保釋理合據實奏聞伏乞皇上睿鑒謹奏原為明白此案情由今據奏既經研審已得實情則如此發落亦屬處置得宜同日又奏為再摺奏聞仰祈聖鑒事竊查閩省收成分數米糧價值臣經奏聞在案今臣復再四行查各府收成分數并米價與前無異惟漳州一府報稱所屬晚稻昨於收成後因榖粒不飽不能有七八分收成各屬地瓜係人民充作糧食者因今年早寒隕霜地瓜竟不長發枝條甚小等語故目下米價每石較前增長一二錢不等不得不預為之計臣已商同督臣髙其倬往江南山東買運米麥外又現在别省及本省收成最好之處採買運貯以備緩急之需臣料其餘各府州俱有七八分收成至明年青黃不接之時尚可支持獨漳州一府居民稠密而收成稍薄故臣等商量先將福州府倉存貯浙榖運二萬六千石至漳州府倉庶便臨時分發至於漳泉乃唇齒之邦若明春漳州米糧一貴則泉州米價勢必漸騰亦宜預備今亦撥浙榖一萬石赴泉州六千石赴厦門再查南澳雖半屬廣東半屬福建向來只藉潮州之米今潮州米價每石三兩斷不能接濟且南澳一島孤懸海外兵民雲集更宜先事圗維臣將今秋所買江西之米二千石現在飭行布政使沈廷正委員運赴誠恐不敷今又撥米一千石續行運往理合一併奏聞謹奏撥運救濟甚屬妥協知道了常賚未到之先毋因升任卸事稍為怠忽更宜上緊料理方是雍正四年十二月二十一日福建巡撫臣毛文銓謹奏為恭謝天恩事竊臣具奏臣衙門筆帖式端揆奉公守法原任下淡水巡檢魏如玉居官亷能并淡水同知王汧不畏強禦等因欽奉硃批伏念臣荷䝉聖慈畀以封疆重任不能進賢退不肖罪實無辭臣跪讀之下不勝感激涕零臣前保薦陶範張道沛二員臣實昏庸未能信其才具操守何如只以現在所聞所見者冒昧具奏於既委之後留心查察知陶範緣練達鹽務而遂有營私之處臣不敢回護即商之督臣高其倬題參究審張道沛本任內有倉榖未清并聞從前有勒借屬員銀兩臣亦不敢回護併即題參究審但識人之才實臣所短兹奉恩綸感愧無地謹具摺恭謝天恩伏乞皇上聖鑒謹奏知人原難何能保其終始如一察知其非而不袒護則無過矣朕恐爾等封疆大吏或被屬員欺蔽故諄諄告誡耳同日又奏為具奏奉發硃批原任督臣滿保奏摺事竊臣䝉皇上發交滿保奏摺三封臣敬謹檢查內有上諭一十三道清字奏摺一百七十二件漢字奏摺三十六件清漢摺一件漢字條陳二件陳受漣劣蹟欵單一紙臣謹將滿保各摺內敷陳地方利弊保奏文武官員動用錢糧彌補庫帑收受規儀等項一切大小事務逐一詳查據實分别是非虛實間亦附愚昧之見恭摺齎奏伏乞皇上睿鑒其餘叩請調養聖躬恭謝天恩奏繳硃批諭㫖恭請陛見奏報雨水米價收成等件臣不敢重復叙入煩瀆聖聰其各原摺現交督臣高其倬逐一檢查俟查清一併恭繳先此奏聞謹奏覽將爾所奏之摺發與高其倬常賚同看矣同日又奏為奏聞事竊查原任督臣滿保於遵㫖回奏事摺內奏稱臣等所奏匣內另封紙靣䝉御批總督滿保巡撫黃國材開看欽此臣等開看乃監察御史吳達禮題參安平逰擊游全興衰老應令休致摺內䝉御批此係何故確議秉公具奏欽此查游全興因精於水師調補澎湖千總康熙六十年征𠞰臺灣時游全興率領自巳船隻歸入林亮董芳隊內將鹿耳門先行攻取與賊交戰四次皆身先士卒所以將伊保放閩安守備奉部議叙加以四級故臣等保題奉㫖特授為臺灣水師營逰擊年才五十八嵗身仍壯健但日在海船辛苦顔色蒼老身體亦瘦人亦老實不解言語應酬故外靣看得似老較其實並無衰老之處等語臣查游全興於臺變時伊果實心效力與賊交戰之際身先士卒滿保所奏不虛今現任金門鎮標右營遊擊諳練水師營務但年實就衰矣理合據實奏聞謹奏爾說與高其倬留心看驗如可以坐理營務防禦地方尚不至於昏憒便多幾嵗年紀無妨同日又奏為奏聞事竊查原任督臣滿保為將督署所得之項奏陳等事摺內奏稱查臣總督署內福建藩司每年送火耗銀五千兩衙役錢糧二千兩為臣養贍家口公私賞賚之費浙江藩司無所給之項浙江鹽法道每年送銀一萬兩司道府官內有饋送禮物臣查其居官行止亦間或收留此外州縣並武職之物俱不接受等語臣查總督衙門藩司所與者每年原止有五千兩并衙役馬械銀二千浙江藩司向無所給浙江鹽法道止有一萬兩至於司道府節禮滿保俱收即州縣之禮亦接獨武職之物間或接受又奏聞事摺內奏稱杭州開捐據布政使詳稱每石折銀一兩八錢每百兩增加十兩外每石再加一錢八分除部費六分外其餘一錢二分以備各衙門使用今臣不令分給各衙門盡令備辦公務等語臣查滿保在任時杭州開捐除部費公用外滿保另有加增取用之處但尚未知確數臣既有所聞不敢不據實陳奏伏乞皇上聖鑒謹奏據此亦情理所必有之事所奏甚公同日又奏為據實奏聞事竊臣查原任督臣滿保於請㫖事摺內奏稱漳州府知府員缺要緊欲將厦門同知耿國祚補放其厦門同知員缺將福州府通判馮補放等語臣查現任漳州府知府耿國祚實有辦事之才滿保所奏不虛獨操守稍為不及並為人微有粗俗放縱之處至於馮係平常之員與厦門同知一缺殊不相宜業經督臣高其倬㑹參在案矣理合據實奏聞謹奏爾雖離任在即其耿國祚操守一節再三教訓伊加勉常賚到時亦將此諭密傳與知令其留心試看同日又奏為據實奏聞仰祈聖鑒事竊查浙江主考陳萬䇿自杭州撤闈之後來至閩省泉州原籍緣有該地方富民李尊性者於聖祖仁皇帝忌辰演戲似此目無法紀之徒罪不可逭萬䇿亦云必當詳究及至知縣教官具詳學臣並司府衙門批查之後不審萬䇿何意忽欲消弭其事此外户婚田土不問是非時復干預又萬䇿係泉州人氏家居晉江凡拜客必借提臣衙門執事八轎口出大言誇示文武各官頗多畏懼又萬䇿不顧通省大計忽欲市恩鄉里輒至明倫堂令將該縣府存倉積榖盡行動發平糶該縣向萬䇿云平糶倉榖當在青黃不接之候今尚非其時再四婉言停止萬䇿復諭鄉約遞呈請發嗣因衆鄉約亦稱實非其時而罷似此行為實乃輕舉臣不敢隱瞞理合奏聞伏乞皇上聖鑒謹奏如此據實直陳朕甚嘉之爾等外任大臣能如是仰體朕意而行將此等招搖之徒處分幾人孰敢復踵此習斯實治天下之要道毋視為深刻之舉朕亦從不好苛察也不若此天下事何能就理勉之勉之雍正五年正月初七日福建巡撫臣毛文銓謹奏為奏請聖訓事竊惟福建地方山水交錯易於藏姦必宜刻刻防間海洋已定有官兵分巡總巡之例而各處大山並無官兵巡查竊恐匪類潜匿其間日積月纍漸難捕治臣愚擬倣海洋巡查之例凡有名之大山揣時度勢或每月或每季令各該鎮守之副參遊等官遴遣標下能員酌帶兵丁改扮衣裝密往巡查是否可行伏乞皇上指示遵行謹奏曾經屢諭諸務與髙其倬㑹商爾仍只獨奏朕不解是何意見也雍正五年二月初十日福建巡撫臣毛文銓謹奏為聖恩之高厚難名微臣之感激無盡再陳謝悃仰祈睿鑒事竊臣謭劣之材庸愚之質幸叨皇上天恩由雲南布政使擢升黔撫赴京陛見又奉特㫖巡撫閩疆皇恩浩蕩聖訓諄詳雖草木昆蟲尚有知覺況臣亦存人性敢不仰體皇上生成大德冀伸報效微忱自惟才力不逮正深局踳靡寧何期恩綸下頒升臣為鎮海將軍又䝉特命來京聞命之下驚惶無地感激涕零臣犬馬之私得以仰覲天顔庶可稍慰而京口重地一應沿海機宜更得敬聆聖訓知所遵循臣即粉身碎骨亦難仰報皇上稠疊洪恩於萬一除遵例恭疏奏謝外合再具摺恭謝天恩伏乞睿鑒謹奏常賚到閩尚須時日諸事勉為之陛見之說俟到任後另行奏請或可不必至期候㫖再定同日又奉為欽奉上諭事竊臣於恭請聖安摺內欽奉硃批伏讀聖諭皇上之教臣者深望臣者切而臣之仰報皇上者即捐糜頂踵亦難酬萬一今䝉皇上天恩升授鎮海將軍臣現在閩撫之任自應在任一日盡一日之職更當竭力料理而未了各件欽奉聖諭令臣明白交代新撫是皇上之教臣望臣者如此之深且切臣雖駑駘若少疏懈致有錯繆何顔以對聖主即夙夜問心又何以為人今奉硃批臣益當仰體聖懷敬謹遵行理合奏聞謹奏因楊文乾請假故命常賚暫署廣撫已復命何天培往京口代爾署理矣爾其安心協助髙其倬料理閩省事宜可也雍正五年四月初四日鎮海將軍署理福建巡撫印務臣毛文銓謹奏為奏聞事竊查粵省潮州府因連年薄收傳聞目下米價每石約銀五兩有餘臣不敢岐視故上年曾經撥米三千石接濟潮州嗣因粵省督撫移文中止遂將前項巳運之米添濟南澳兵民查今嵗潮州米價較之去年加長臣與督臣髙其倬商量倘江米運足如可移緩就急則必酌量或六千石或八千石或一萬石陸續運濟潮州至期另行奏聞至南澳本年需米更急臣等仰體皇上一視同仁之意不敢稍諉粵東已先後運米八千七百六十餘石接濟在案合併奏聞謹奏鄰封皆係朕之赤子爾等自應不分彼此一視同仁者也同日又奏為奏聞事竊查臺灣孤懸海外有凶番之患有匪類之患而匪類為害更甚今北路凶番仰賴皇上天威業經臣等㑹委𠞰平其南路凶番尚須整頓臣等復經嚴飭料理相機𠞰撫矣獨匪類之患臣日夜繫心密飭隄防今竟有罔知法紀之陳三竒等欲在阿猴林地方蟻聚為匪糾集未成即為營縣知覺各路星飛捕緝陸續拏獲首匪陳三竒并獲夥匪林居徐龍等一十一名據該鎮道府縣歷審緣已獲之徐龍并未獲之鄭填鄭合欲謀為匪因陳三竒曉地理并識字遂糾之入夥并推為首各匪輾轉相糾除以上現獲之一十一名及未獲之鄭填鄭合二名外尚有未獲之黃六師陳老等一十一名各行分竄臣與督臣髙其倬商量海外不比內地更應從權料理以懾奸徒之魄兹經㑹行鎮道立將倡謀為首及為從而情重者俱令請出該鎮王命就地正法餘犯均各牢固監禁聽候奏聞去後兹據臺灣道吳昌祚報稱已請出鎮臣王命將為首之陳三竒一名正法將為從情重之林居黃允黃萬三名杖斃內徐龍一名亦係情重之犯因另有行劫之案應於彼案歸結餘俱監禁聽候等因前來除現獲之陳三竒一十一名外其未獲之鄭填等一十三名已據該鎮道府縣訊明悉屬同謀匪犯臣等已飛飭作速嚴拏務獲另摺奏聞謹將陳三竒等欲謀為匪及旋被拏獲并㑹行鎮道各緣由先行奏聞伏乞睿鑒謹奏知道了果地方上文武官辨根本不失此等匪類亦何能為不過自取誅戮耳朕意惟以察吏治整營伍為先百凡務本為要防匪猶屬第二義也朕先批爾奏摺可與高其倬同看硃批諭㫖卷十三
