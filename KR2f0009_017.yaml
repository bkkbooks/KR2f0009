body:
  text: 欽定四庫全書硃批諭旨卷十七硃批黃叔琳奏摺浙江巡撫臣黃叔琳謹奏臣一介庸愚智識短淺荷蒙皇上天恩擢撫浙省奉命之日夙夜畏懼恐不勝任蒙皇上訓誨周詳無微不到臣恭聆訓旨時刻銘心於三月初三日起程至四月初三日入臣屬嘉興府境當即具疏題報是日適值大雨臣詢問耆老民人咸稱今歲雨水霑足二麥可望大熟杭嘉湖三郡蠶桑甚好運河有水􅒩船巳盡出境四月初六日抵臣杭州府駐劄衙門到任訖隨經具疏題報初七日例謁文廟三學生員循例迎謁臣思教民之本始於學校宣布皇上崇儒重道至意躬謁太學釋奠增廣試額作養人才諸生務宜飭躬勵行讀書上進以仰副聖主樂育盛心諸生皆敬聽鼓舞北向叩首臣於初八日會同主考臣李鳳翥等驗看揀選各科舉人初九日考試武闈鄉試諸生十九日場事甫畢所有地方事宜皇上面諭之事及歷運銅斤虗實通省錢糧有無虧空容臣逐一確查具奏不敢少有瞻徇隱蔽上負聖主委任洪恩為此謹奏崇儒重道固為治化之源但不可徒務虛名而反縱容刁頑不法紳襟誠欲作興斯文莫若屏黜生事之豪監武斷之劣生振起躬行實踐敦讓淳朴之風始為真正崇儒重道若畏鄉曲之私評勝於廟堂之清議稍為執法懲創一二襟監即恐身被凌虐斯文之名因而一味姑容任其玩法害民傷風敗俗貽誤地方莫此為甚讀聖賢之書言聖賢之言行聖賢之行者方可謂之儒否則咸係名教中之蠱蠧衣冠中之秕莠也此輩不除真儒不出豈宜捨本逐末徒於枝節上作工夫迂濶不通猶屬小疵此習流蕩忘返必至斯文掃地而後巳凡事須要務實端本將此諭亦通知何世璂遇有玷辱士林行止不端者爾等其秉公竭力共相戒懲治之愈嚴方是真實扶持聖教處假若沽一巳之私名壞朝廷之法度甚至縱姦擾民聖賢有靈斷未有將此等居心行事而許以為崇儒重道也近年來各省刁頑襟監挾制有司欺壓小民或將本地封疆大吏竟敢造作歌謠任情譏誚此等囂風甚屬可惡爾等若不為朕竭力挽回則是不能助朕崇儒重道相為始終也勉之特諭浙江巡撫臣黃叔琳謹人情不無玩愒惟寧台道陳受漣行止不端署紹德審理旗民詞訟公平允協甚得民心臣前面奏請以升銜留任業蒙日跪領旨已寫書與總督滿保訖至提鎮武職官聲及訓練勤惰臣當密訪另摺奏聞為此謹奏朕前面諭之旨爾記憶差悮矣朕將錯訛之處俱已改眀爾其另寫書函寄與滿保可也浙江巡撫臣黃叔琳謹奏臣奉命撫浙兼理北新南新海關稅務臣駐劄省城與海關相去數百里全賴委任得人方無貽誤查寧波府同知趙永譽才具頗優人亦謹飭前任撫臣朱軾委管南北兩關從無缺額現在管理海關剔除陋弊商民悅服近準直隸撫臣李維鈞咨趙永譽因伊父原任霸昌道趙𢎞揆虧空朋建銀兩例應解任追賠發追完日仍補原官嗣據該員詳稱伊父所欠銀兩巳經變産設措於三月十五日差家人齎赴霸昌道庫完繳懇賜題明等情臣思關稅甚屬緊要趙永譽既稱家人將所欠銀兩齎交道庫伏乞聖恩將趙永譽暫停解任容臣移咨直隸撫臣查眀趙永譽所欠銀兩如果巳完將趙永譽題明仍留原任以觀後效至關稅錢糧臣不時嚴查倘有移此完彼情弊立即糾參不敢少有瞻徇臣從𣙜務起見伏祈皇上睿鑒施行為此謹奏趙世顯如何得有好孫且趙𢎞揆昏庸不孝又豈得有好子此等惡裔留於屬下非爾之福他日或受其牽纍雖悔無及矣令其解任發追為是浙江巡撫臣黃叔琳謹奏竊臣初到地方諸事未諳因管理關務猝難得人謬謂寧波府同知趙永譽可以辦事冒瀆奏請暫留原任蒙皇上硃批諭旨指示周詳念臣一時輕信將來必受其牽纍後悔無及訓誡諄切臣跪讀之下自知智識短淺遇事輕率感激天恩倍切惶悚惟益加謹慎以仰副髙厚生成之德即日委紹興府同知閻紹馳往署理海關稅務嚴查趙永譽經手錢糧勒限清楚即押解直隸撫臣衙門外理合奏謝伏乞皇上睿鑒謹奏爾到任未久看來於薦舉人處頗涉輕率嗣後當加慎重知人則哲惟帝其難之豈可易視耶如果屏盡偏私平心鑒別或能倣佛一二勉之浙江巡撫臣黃叔琳謹奏竊惟浙省額編錢糧為數繁多近年以來歲偶旱荒小民力難完辦經徵有司每屆奏銷期迫恐受參罰或以欠揑完或那緩應急就十一府之中嘉湖金溫四府為尤甚巳參之虧空現準部咨分別有著無著按年勒追矣未發覺之虧空皆上下掩飾新舊欺朦或以俸工扣捐填補或欲將應送上司節禮知府盤庫陋規抵償今俸工已奉旨支給不敢再議扣捐至節禮盤規並無完解徒滋不肖有司藉端加耗纍民凡此皆巳故藩司傅澤淵有以釀成之也臣抵任以來現在清查各屬倉庫倘有虧空著落該印官照數彌補如不能補足接因公那用庫項原詳議將雍正元年以前俸工歸補又有海塘樁木變價及買米平糶等銀約二萬五千七百餘兩因傅澤淵那帑未清庫項難懸據訖俟屬縣解到照原欵給還傅澤淵家屬收領臣查傅澤淵身為藩司受恩深重在任不能盡力報效以致浙省屬員倉庫不清銀兩不特虧帑得完凡司出納者咸知警惕矣伏乞皇上睿鑒謹奏知道了浙江巡撫臣黃叔琳謹奏臣查浙江十一府屬二麥收成約有八分蠶絲約有七分杭嘉湖紹金衢嚴七府米價約一兩四五錢麥豆價約一兩一二錢寧台溫處四府米價約一兩六七錢麥豆價約一兩三四錢不等祗緣四月以來雖有雨澤未得霑足所以糧價仍貴今當插秧之際倘得早沛甘霖便可及時播種臣又歷查浙省錢糧從前拖欠原少後因連歲歉收遞年十七八九三年舊欠於雍正元二三年分三年帶徵欽遵在案但浙省當災祲之後目下二麥雖收民力未紓若新舊數年錢糧一時並徵小民必艱於輸納伏乞皇上將浙省五十四五六七年未完銀一十一萬八千餘兩姑緩徵半年統於雍正三年徵完其五十八奏銷之前照數全完如再有未完加倍嚴行治罪倘邀聖恩俞允伏乞特頒諭旨浙省億萬窮黎共沐皇恩於靡既矣謹此具摺奏聞仰乞皇上睿鑒施行謹奏各省錢糧若皆如此特頒諭旨天下百姓觀望不前孰肯爭先輸納此風之起蓋緣聖祖寬仁屢下蠲免之詔無知小民遂生徼幸之心少遇歉收即欲藉端諉延逋欠盈千纍百積至數十年總期一免而已爾等封疆大吏應將國計民生並重不宜偏看若以此等作為妄干民譽免屬員之參罰冀圗感激惟將火耗贏餘立義學建書院以沽重斯文之虛名一任刁頑襟監抗糧欠課而不問在他人尚且不可況爾受恩深重更不當蓄此種意見也朕於去歲加恩浙省亦可為深厚矣爾雖初到亦當代浙民知感今具此奏復不肯密再宣傳此諭則恩怨必有所歸朕何嘗不願地方上感激爾等然亦不使怨望於朕方可若令止感爾等而怨朕則又豈朕所樂聞耶此事朕亦未必不允但爾須再加酌量如萬不得已當具疏題請豁免緩徵帶徵徒有名無實於百姓何實惠之有從來吏治以催科撫字兼論豈可將國賦則分作七八年帶徵虧空則參官著追而問成那移以示寬仁至數年後報明家産盡絶究於錢糧無補偶遇歉歲則具疏題免此等督撫人孰不能爾倘如此居心殊大負朕之委用矣朕意必係刁頑襟監鄉紳或不肖屬員慫慂爾為此一奏此奏朕甚不喜而疑之斯事候佟吉圖到藩司任後二人共相商酌果有難以措置處二人聨名同奏朕自有裁處此外至如虧缺錢糧盡歸無著以邀寬譽將一切事件置之不理俱推卸前任以圖省力自便之舉均屬不可而徒見棄於朕惟當殫心設法徐徐深籌國計庶不有辜知遇耳茍能大法小亷數年之間何難公私清楚若似此但知顧己之名而避難就易圖省心力於蒞任之初具此摺以收官民之心是則是矣其奈朕意不然何此一事爾大失輕重之宜矣浙江巡撫臣黃叔琳謹奏竊查原任山西平陽府知府馮國泰虧空錢糧一案臣蒙皇上聖諭留心料理臣扺任後晉省差員劉芳璧巳經回山西訖隨即查案并咨詢前撫臣李馥計馮國泰名下家産估勘銀一萬一千五百五十兩零原任河南南陽府知府沈淵認還銀六萬一千兩外又前任平陽府知府祝增等借欠銀一十三萬九千一百兩共銀二十一萬一千六百餘兩俱經李馥備造細册咨覆晉省聲眀聽撫臣諾岷查訊具題行追應候旨遵行今查沈淵名下銀六萬一千兩為數獨多此係自巳認還之項無庸晉省再行查訊臣嚴加勒追已於四月內交過庫銀三萬兩餘欠銀兩自限於五月內還足但臣於四月初十日準晉省撫臣移咨內稱馮國泰之子馮育美供沈淵於六十一年三月內取伊銀三萬二千兩代為生理又欠捐納銀七千兩咨追補完虧空等因臣復一并勒追沈淵堅不承認願赴晉省與馮育美面質等語臣將沈淵在浙認還銀兩追清之日即當嚴押赴晉與馮育美質審臣又於閠四月二十六日復準晉省撫臣咨稱馮國泰之媳張氏并幕客黎一謙所供各欠內在別省者晉省徑行咨追外其楊沛蒼祝宣朱煌吳問琰董大吕五人計銀二萬四百兩此係浙省之人聽臣查追臣現在嚴行勒追并同馮國泰估變家産另行具題完結為此謹奏此輩頗慣造言生事株連無辜之語竟達朕耳然朕豈為所搖奪耶徒可發一笑耳爾向來未經承辦類斯等事倘被狡詐之徒誑詞愚惑而優柔以處之於爾分中大有干係況狐鼠羣黨何足深惜若輩亦只可自怨自艾何不幸而為馮國泰之親友而從前受其沾潤也倘其中實非瓜葛確係寃抑誣枉牽連者爾亦當據實奏聞朕自豫以省釋假若瞻顧情面少留地步而不實力嚴行督追恐將來株連者漏網而汝等地方大吏之株連反難脫也此事絲毫無容寬假特諭浙江巡撫臣黃叔琳謹奏臣蒙皇上面諭訓練標兵其通省營伍亦著留心欽遵聖訓到任後即嚴飭臣標中軍遊擊并杭協城守副將等不時操演毋致懈弛臣自出武闈即準部文遵旨會同將軍臣安泰查追何廷圭尅扣軍餉一案未得刻暇今於辦事之餘親往教場較閲本標及城守將備兵目隊伍盔械俱各整齊鮮眀查點各營名糧除酌留隨丁外並無虛伍冒餉之弊其通省營伍雖非臣轄敢不凛遵據實奏聞謹奏覽題參請旨革職所遺印務遴委溫州府知府芮復傳署理但台郡所屬六縣負山濱海俱係緊要地方且民俗刁悍素稱難治知府一官有表率彈壓之責必得亷眀強幹之員方克勝任伏乞皇上特簡記名人員補授台州府知府迅發赴任庶於海疆要區大有裨益矣謹奏已諭部揀選發往但此等揀選之員俱非朕所深知之人係爾在京所素悉者到任後體訪驗看倘或不稱厥職一兩月之間即奏請更換亦不妨再聞紹興府知府姚鈴才具不能治理繁劇或調簡或令告休俱可此缺當題補特晉德其同知事如可兼理仍令伊兼管同知可也又聞衢州知府靳樹德聲名平常若無大過猶堪任事爾訓伊改勉倘才具亦屬平常應作何發付具摺奏來又聞秀水縣令閔汶人甚庸常不勝其任凡此皆朕訪聞之言不盡以為確爾其秉公據實察奏不可枉抑亦不可徇庇徒為他人任將來之過咎也浙江巡撫臣黃叔琳謹奏竊浙省南新北新兩關自康熙五十五年歸併巡撫管理以來臣查南新關稅銀五十九年以前並無虧欠北新關稅銀及所報贏餘銀兩五十八年以前亦皆全完此後前撫臣所委收稅各員俱有未清南北兩關通共欠五十九年六十年及六十一年稅銀五萬七千一百四十餘兩查兩關稅銀未奉加額以前按數收完之外北新關尚有贏餘南新關亦牽算清足加額之後適逢浙省地方連年荒旱客貨減少致有缺額歷年於奏銷案內業經將缺額之處奏眀但原報全完之項難容懸欠臣現在勒催完補外至本年稅銀南新關於閏四月內一年期滿額該銀三萬六千二百四十七兩零雖有抽分尚無起解北新關應於六月內一年期滿額該銀一十六萬三千五十三兩零僅完過銀一十一萬五千五百餘兩兩關虧欠甚多何以克副例限臣查關司不能兼顧不便遽行題委臣查有行人司捐升主事張崇禮候選主事同知趙方觀為人老成謹慎伏乞敷臣奏眀請旨定奪庶於國賦有益謹奏其張崇禮等引見畢候朕酌定浙江巡撫臣黃叔琳謹奏浙省鹽徒私販一事臣到任後即嚴飭印捕防汛官辨督率兵役水陸查拏又稽查場竈以杜興販之源復密訪積窩募人首告務期盡絶根株近來漸已斂迹查私販鹽徒固屬不法亦因歲歉飢民貪圖微利遂致三五成羣肆行販賣今查拏既嚴二麥亦登仰仗皇上福庇今歲秋收豐稔便可上紓聖慮矣再查江南鎮江府京口以南皆行浙引北岸之以報聖恩不但私梟屏絶即兩省軍民亦咸慶樂利於無疆矣再滿洲官兵查緝私鹽臣遍察輿情僉云兵少聖裁謹奏知道了浙江巡撫臣黃叔琳謹奏竊臣蒙皇上天恩畀以巡撫重寄抵任後惟念浙省錢糧繁重國帑所係時刻留心體察如鼓鑄銅斤一項浙江承辦三省每年額辦銅一百六十六萬三千一百餘斤自康熙六十一年委嘉興府參革知府吳永芳承辦以來止將該年上運銅斤按數辦解其六十一年下運銅八十三萬一千五百餘斤據吳永芳稱已陸續交部至今尚無批回呈驗又雍正元年上運銅雖報起解並未報部下運銅止報洋船進口先有銅二十一萬餘斤未見報交臣飭提吳永芳嚴追雖稱發價在商洋船未到但虛實未定銅斤倘有不足著落承辦之知府吳永芳及原委辦之巳故藩司傅澤淵家屬照例分賠庶銅價不致無著又雍正二年上下運銅斤係前任撫臣李馥自行承辦據稱將價銀發與洋商採買其船未到等語李馥現今往揚州質審江國英一案俟其回浙臣即勒催清項必不任其稍延倘李馥從中自皇上天恩也至臣應辦雍正三年銅斤因東洋出産不敷現在另疏題請伏乞聖慈垂鑒謹奏雖云出産不敷亦須設法購辦鼓鑄之需豈容缺乏爾前在部時係悉知者自有廷臣公議朕亦不得而私之也諭浙江巡撫黃叔琳我國家自定鼎以來輕徭薄賦小民之輸將自當踴躍向前乃竟有纍年拖欠不完者其故多由包收代納之弊如浙省之里書其害尤甚聞此役率皆祖父相承掌管一里之糧銀悉憑收解以致有需索花户并飛灑侵蝕等弊官民均受其纍著即嚴行禁革倘州縣仍違禁私用立豫參處至於徵收賦課全憑册籍務須挨户清造方可按名催比慎毋因循慢忽致滋混淆特諭浙江巡撫臣黃叔琳謹奏為欽奉上諭事臣於本年五月十六日奉到浙省徵糧上諭臣查浙省丁田賦額屢有拖欠皇上無微不燭洞悉挂欠之由皆因里書侵欺作弊夫里書者即里長革後之別名逮屢禁而屢易故又有糧現册書架書等名目數更不一而手握一里册籍飛灑侵蝕名異弊同洵為糧賦之蠧從前撫浙諸臣原皆禁革日久弊生不無陽奉陰違今臣仰遵聖旨復又通行嚴加禁絶巳據各州縣陸續申送不敢違禁復用遵依在案臣又不時體訪如有私用害民者立行參處至徵糧册籍各該屬俱係挨户開造實徵細册按照催比不敢容其稍有混淆不清謹奏此等事乃公爾忘私國爾忘家矯茍且因循之陋習秉堅忍不拔之志趣者之所能非爾輩隨境而遷沽名釣譽具一片私腸者之所能也不過於紙上言之好聽耳觀爾奏摺中巳明露自暴自棄之心如云從前撫浙諸臣原皆禁革而不能除之弊何況黃叔琳中材以下之人豈能遽然禁絶耶爾審若不能當明白奏聞以便朕另簡能辦者前來料理諭浙江巡撫黃叔琳聞浙江沿海一帶窮民多赴場竈販鹽糊口今值雨水調勻農夫力作之候爾須乘時設法勸諭歸農俾各得所其有不能盡歸農者可會同噶爾泰計議或暫令即於場竈納課以開其資生之路或以庫帑收買竈户餘鹽以杜其私販之門從前地方各官以鹽務為無預巳事率皆任其破壞而不問亦甚非和𠂻共濟之義爾當與鹽臣協同商酌辦理須於鹽政無虧方為兩全之道向後類斯有關鹽政而無礙於地方可以變通之處爾等勿拘成例斟酌奏聞亦不可因朕此諭而勉強遵奉議行總期於是當而巳特諭浙江巡撫臣黃叔琳謹奏為欽奉上諭事臣於本年五月十六日奉到浙省鹽政上諭臣查浙省地方連年歉收貧民乏食輒赴場竈販賣私鹽情雖可憫法實難寬皇上以天地之心為心軫念窮民特頒諭旨令於場竈納課或以庫銀買竈户餘鹽臣現飭商人於各場竈收買在案其暫於竈場納課之處因場地俱有竈户管業輸丁完課別籍民人無從撥授若即令其在場納課販鹽又慮紊亂鹺規以滋弊端今臣與鹽臣噶爾泰協同酌議一於濱海産鹽處所將鹽場要隘私販路徑添撥辨兵看守把截一於現行保甲督查窩頓如有違犯保甲連坐地方有司照失察例參處一訪拏護梟地棍嚴加治罪一將地方船隻編號給照如此則場竈既清其源餘鹽又歸商人運售庶積弊可除私販杜絶矣再從前地方官員不無岐視鹽政誠如聖諭臣當加意整飭各屬務令與鹽法衙門協同商酌辦理以期鹺政有裨倘仍前因循玩忽臣即據實糾參請旨從重處分再此後凡有關於鹽政無礙於地方可以變通之處臣即會同鹽臣奏請為此謹奏所奏巳悉但不以國計沽買一已之虛名即可矣諭浙江巡撫黃叔琳從來稂莠不除嘉禾不長為國家者欲綏戢人心整飭風俗首在黜邪崇正聞浙江地方頗尚邪教每妄立名號巧作幻端聚衆燒香惑誘愚民此輩蹤迹詭祕姦回莫測若不早絶根株俾致滋蔓則大費翦除矣爾當嚴飭所屬各官密訪首惡重究示懲但須授意素所倚信之人使其設法偵察慎毋通行緝捕以致擾民駭衆其附教愚民如能去邪歸正即豫寬釋有首報渠魁者隨量加奬賞務令姦萌潛消暗熄風俗人心一歸於正設或因仍茍且不行查禁及詰姦無術激出事端該管各官一併治罪朕斷不寬貸特諭浙江巡撫臣黃叔琳謹奏為欽奉上諭事臣於本年五月十六日奉到黜邪崇正上諭仰見皇上注念東南人心風俗至意臣欽遵聖諭訪聞浙省向有一種無為教名色蠱惑鄉愚出錢聚會念經禮拜男女混雜敗壞風俗又一種年老婦人號曰師娘婆偽稱神佛降身妄言禍福哄騙錢財此亦邪教之類但愚氓錮習既久尤於村野居多臣當逐漸悉心開導俾其去邪歸正並密飭屬員留心察訪並不聲張擾民如查出為首之人即嚴行治罪有能出首者即行奬賞務期邪教屏絶風俗人心一歸於正仰副皇上睿懷謹奏此當徐徐而行之事非急務也但須時刻留心不可日久而怠浙江巡撫臣黃叔琳謹奏為請旨事臣查浙省溫處道蔣敷錫因盤查一案經督臣滿保會疏題參所遺員缺甚屬緊要必得亷眀強幹之員方克勝任仰祈皇上特簡賢員補授迅飭赴任庶臣得收臂指之效再紹興府地方健訟事繁素稱劇郡現任知府姚鈴謹飭之守有餘繁劇之才不足查處州府知府蘇理事同知特晉德熟諳民情才堪理劇原係卓異應升之員請以特晉德補授紹興府知府必能整飭地方克盡職守至理事同知有審理旗民訟獄之責紹興離省百里勢難彼此兼顧伏乞皇上另簡賢員補授再衢州府知府靳樹德性情雖覺褊急年力尚堪䇿勵臣遵諭飭令改過以觀後效合并奏眀謹奏所奏俱悉其理事同知事務能否兼理之處問明特晉德若伊自云不能再行奏聞浙江巡撫臣黃叔琳謹奏竊臣才庸任重時懼弗勝於地方事宜繕摺具奏俱荷天恩批發凡臣知識未到意見謬誤之處蒙皇上指示周詳訓誡眀切臣跪讀之下如迷得悟惕目警心感悚交集從此奉以遵循冀或免於罪戾所有本年五月十六日奉到上諭三道又前後硃批奏摺共十二件理合恭繳又於六月初十日署布政使臣佟吉圖口傳諭旨臣跪聆欽遵并發到王一導奏摺二扣臣現在詳查確議容一併繕摺另覆伏乞皇上睿鑒謹奏若不誠切凜惕知過思改則實難免於罪戾也爾等為朕所擢用之人非比李紱等係向日聖祖之所簡用者朕猶可為之寬假爾等若不慎勉職守少損朕之政治功名之外豈止身家而巳哉慎之浙江巡撫臣黃叔琳謹奏竊時屆三伏正田禾望雨之際浙省自五月下旬二十餘日未雨農夫竭力車戽河流日淺於六月初十至十一十二等日晝夜大雨四野霑足河道通行詢之鄉農僉云今當大暑節氣仰賴聖主福庇甘霖大沛田禾暢茂從此再得雨水接濟年歲便是大熟目下早稻現在收穫有八九分共享盈寧之福等語復據杭嘉湖寧紹台金衢嚴溫十府屬陸續申報得雨日期相同其處郡未據報到現在行查至於米價上白米每石一兩六七錢秈米一兩二三錢麥價每石九錢其浙東地方早稻收穫之處新米每石價銀止九錢四五分此後再得甘雨時沛米價便可日減為此謹奏晚稻收穫之時其據實奏聞浙江巡撫臣黃叔琳謹奏浙省於七月十八十九兩日風雨大作晝夜不息竊慮沿海處所風潮為患臣正委員分往查看據杭屬仁和海寧二縣報稱七月十八夜至十九日早風大潮湧衝開大厦坊周家􅄵等處海塘居民房地被淹禾苖浸沒等情又據嘉屬海鹽平湖二縣報稱七月十八九日風潮冒過塘堤流入城河浮橋湧斷衝坍乍浦南門坊周家堰等處屋宇漂沒等情又據紹屬山陰會稽蕭山餘姚上虞五縣報稱七月十八晚至十九早風雨勢驟潮水淹沒附近居民塘堤損壞等情臣即飛飭布政使佟吉圖糧儲道徐琳分往各屬督同地方官逐一確查衝損塘堤多備人夫工料星夜搶修捍禦保護田畝被水民人多方拯救又委鹽驛道王鈞查勘鹽場竈户一體拯恤以仰副皇上軫恤黎元至意其寧台溫三府沿海郡邑有無泛溢一并檄行防護為此繕摺奏聞謹奏朕誤用爾為浙撫上蒼當昭示此災異乃朕之過追悔何及與爾無涉也硃批諭旨卷十七
