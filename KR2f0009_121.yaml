body:
  text: 欽定四庫全書硃批諭旨卷一百二十一硃批趙坤奏摺雍正元年五月二十一日貴州提督臣趙坤謹奏為保奏人員以資臂指事竊查臣標前營以及畢赤營平越營安南營四遊擊現在缺員例應聽候部推但臣標前營及平越營地當孔道汛防廣濶畢赤安南兩處又界連川粵逼近苖㺜非熟諳情形人地相宜之員莫克勝任臣看得平逺協右營守備卜萬年臣標左營守備田玉大定鎮標中營守備吳朝應安南營中軍守備許緯藩皆弓馬優嫺歷練營務請以卜萬年拔補臣標前營遊擊以田玉拔補平越營遊擊以吳朝應拔補畢赤營遊擊以許緯藩拔補安南營遊擊則駕輕就熟實為人地相宜緣係非保題之省分臣與督臣咨商未敢會疏具題謹繕摺保奏倘蒙皇上恩允則臣得收臂指之效於地方實有裨益矣為此謹奏照依趙坤所請補授免其引見該部知道同日又奏為奏明事竊查貴州各營路有臣衙門節禮字識養廉暨各營修理旗幟整補帳房等費之空糧除自鎮逺府起至臣駐劄安順府大路一帶經臣親行簡閲按册挑補外其僻逺處所嚴檄營路各官速行招募取具不許仍存空糧遵依册結臣復差員查驗共計招補過壯丁五百名臣恐邉徼兵制上厪聖懷所有募補空糧實額充伍緣由理合繕摺奏聞謹奏爾為朕所信任之人其恤兵清餉竭力整理處朕除嘉奬之外無可多諭勉之爾保題遊擊四員皆照依所請允行巳降旨該部矣雍正二年八月二十六日貴州提督臣趙坤謹奏為回奏事雍正二年八月初九日準撫臣毛文銓密信內開欽奉密旨可將此諭亦密通知趙坤或將伊調到省城傳旨等因臣隨星馳赴省跪聆聖旨訖又貴東道臣李日更抵任亦傳皇上諭旨臣俱一一欽承跪聆之餘不勝感激愧懼無地伏思黔之狆家苖性既愚頑習非良善漢姦貪利或潛入唆挑則報復為非狆苖之情形實難逃聖主之洞鑒臣抵任年餘未能將苖民刁頑之俗與督撫臣熟思審處驅除務盡奉職無狀罪實難逭乃蒙聖恩不加譴責著與撫臣毛文銓密商萬全而為之臣雖至愚亦稍知䇿勵從此仰體天心矢勤矢慎於邉徼要地務滌除習弊勿姑息長惡倘有多事苖目教之不改即相度機宜宣示威武懲一以警百或臣有識見不到之處必與撫臣咨謀商酌務期悉心籌畫以稍盡職守於萬一耳至於定番一帶山深箐密定廣協營額兵實屬不足分布今奉諭旨應添兵與否容臣與新撫臣會商妥確再行具奏所有臣欽奉諭旨緣由理合繕摺謹奏覽奏巳悉勉為之安靜近於因循振作近於多事迹雖相類而其實不同無事時振作不得有事時安靜不得要在審觀時勢相度機宜而為之方能中其肯綮也若一味茍且彌縫置庶務廢弛而不問則爾等職任封疆之謂何然不熟思審處謀及始終而孟浪從事脫至有損國威則尤其不可者也全在爾等文武大員正已率屬勤慎自勵誠以馭下公以考績營伍既皆整飭有司又復廉明則兵民和輯根夲固矣果能若此此等愚頑苖猓或以德化或以威服胡令不行曷禁不止耶可與撫臣同心協力治理地方務宜夙夜敬謹精勤勿懈以革除習弊置黔民於衽席之安方不負朕諄諄告誡企望之殷也勉之雍正二年十二月十九日貴州提督臣趙坤謹奏為恭謝天恩事竊臣齎摺家人捧回硃批奏摺并欽賜法琅翎管孔雀翎全副到臣臣即恭設香案望闕叩謝天恩跪讀硃批欽遵祗領訖又新任大定鎮臣丁士傑抵黔臣出郊跪請聖安鎮臣即口傳諭旨臣伏聆天語感懼無地兹於十二月十六日為平靜惡苖事件奉硃批到臣等臣與督臣髙其倬撫臣毛文銓公同欽領寵錫叩頭謝恩訖伏思狆苖凶惡蒙我皇上明燭萬里慮出機先預為指授方略是以惡苖阿近阿卧等就縛搗其巢穴擒其妻孥其餘黨衆革面向化又督撫臣仰體天心宣示威德是以各官兵感恩思奮臨事爭先至於臣毫無報效之處濫膺逾分之榮是皇上之恩施愈厚微臣之圖報愈難惟有更加勉勵將邉境應辦事宜與督撫臣同心計議協力奉行務期殫竭犬馬愚忱以仰副皇上諄諄告誡之至意為此恭謝天恩謹奏知道了但去嵗四月八月兩次官兵不戢激變熟苖竟隱蔽不奏朕甚為寒心雍正三年二月二十三日貴州提督臣趙坤謹奏恭請皇上聖安朕安爾過於慎重似近柔懦不宜貴州之任調爾進京另有用處同日又奏為欽奉上諭事雍正三年二月初十日準雲貴督臣髙其倬轉傳上諭到臣臣查黔省山髙土瘠苖多民少地之所出不敷所需凡官吏之俸工兵馬之餉乾皆仰給於他省之協濟賦稅有限耗羡無幾員缺不一養廉未均是誠不可不有以調劑之也我皇上明無不照恩無不施諭令以通省清查之項為夲省之公用此官民兩利可以長久行之而無弊者也其文員官莊耗羡應聽督撫臣清查武職官莊臣現在嚴查不容隱占黔之諸苖惟狆苖最為不法而紅苖黑苖之強悍又不亞於狆苖倚恃山箐出沒無常搶奪報復習俗使然與其有事而𠞰撫孰若未事而籌畫神謨廣運洞悉情形臣荷蒙聖恩職在統率敢不恪恭遵奉嚴飭操練振勵委靡與督撫臣籌畫萬全相機圖謀以仰副天心惟是定廣之凶苖阿近等恣肆搶奪協將陳元勳於雍正二年春間差委把總周正帶兵擒捕雖拏獲賊弟阿鈕阿由二人而首賊遁揚傷死兵丁三名八月內協將陳元勳又不預先請示自帶兵三百名假以遊巡為詞潛至西孟意欲暗擒阿近被阿近等知覺放弩拒敵傷死兵丁一十二名捉去一名旋亦放出把總周正副將陳元勳雖經咨參革職而兩次傷兵未曽具奏是臣之罪至臣等會同三路發兵中路遊擊郭世發楊振夜駐谷藺鉗束不嚴以致兵丁失火延燒草房苖民驚疑上山放弩箭傷兵丁二名實未身死於拏獲凶苖阿近時又未將此事逐細明白具奏是臣之罪恭讀諭旨愧懼無地伏念臣愚昧無知罪戾深積我皇上特頒聖諭誡飭教導髙厚之恩臣即捐糜頂踵亦何能仰報萬一所有欽奉上諭緣由理合繕摺奏聞伏乞皇上敕部議處施行謹奏仐到川省若仍似此優柔徇隱恐爾顔面難以保全也但亦不可生事貪功番夷情形嶽鍾琪最所深悉諸凡詢伊照伊指示而行毋得舛悮同日又奏為奏聞事雍正二年十二月二十一日據臣標中軍參將呈報據山京汛防把總報稱安順府屬唐三寨民劉忠魁夷民季蠟到汛口稱於十二月十二日三更時分被賊燒燬房屋趕去牛隻燒死男女四命受傷三名卑辨隨即跟蹤追至廣順州屬宗角龍井寨地方等情前來臣查宗角龍井一帶山深箐密易於藏姦隨經咨移督撫臣會飭拏究去後旋經撫臣差委安順府知府何經文前往查拏臣以知府衙役無幾難以拏獲隨委臣標守備塢元度帶辨兵二百四十員名協同前去跟緝凶犯茲於雍正三年正月二十二三四七九等日拏獲賊犯季麻阿棍阿賣阿任二月初八日追獲贓牛一隻等情具報前來尚有未獲逸賊現在緝拏俟獲日聽候撫臣審題外所有微臣遣發官兵協同拏賊情由理合奏聞謹奏凡事悉如此據實直陳方是若互相欺隱指黑為白是非莫辨成何局靣耶雍正三年十月初七日署理四川提督印務湖廣提督臣趙坤謹奏為奏明事竊臣奉旨署理四川提督印務抵任之始據署理提標中軍參將楊玉先呈開卷查前任中軍參將阮揚璟欠造各項軍裝借墊銀并解送西南兩路軍裝餉銀雇騾腳價盤費等項銀共九千三百五十四兩零夲年六月內前任參將阮揚璟備敘通詳請示經督臣嶽鍾琪批令在於各標各鎮協營公費糧內認還自夲年冬季起至明年夏季止作三季於公費糧內分攤清楚等情查此公費糧自提標以及各鎮協營共計一千一十分原為各鎮協營一切公用之費自軍興以來凡軍務公用亦皆以此資貼但臣思川省制兵三萬六百二十名內除打箭爐口外裏塘巴塘等處駐兵三千一百六十餘名留駐西寧兵三百俱尚未撤歸現在革達地方又需兵一千五百名輪流駐防再有各員辨所食親丁之糧營汛未免單薄若將此一千一十分概行招補則經督臣批示原係因公使用恐欠項無著若不招補則營汛防守事屬緊要臣再四思維請將此所存公費糧各招補一半以供差操仍留一半俾各標鎮協營漸次完欠亦可漸次添補軍裝似於營伍公務兩有所益矣伏乞聖恩教導批示遵行謹奏前事經嶽鍾琪面奏朕巳洞悉况周瑛旋任在即爾暫時署理可以不必料理此事俟其復任後將所奏知會於伊可也同日又奏為奏聞事竊臣接印視事卷查建昌鎮屬之冕山營賊夷劫殺一案經督撫臣將遊擊蘇凱以擅起夷釁致滋優害題參後將該遊擊調赴成都該遊擊在寓所自刎身死亦經督撫臣會題其夷蠻阿租等挾讐科衆肆行劫殺前署提督印務撫臣王景灝專委會鹽營守備汪雲龍前往宣布恩威嚴加化誨併勒獻凶首追還人口各緣由在案臣隨星差前往催查茲於十月初四日據署冕山營遊擊沈國卿會鹽營守備汪雲龍各報稱職等委建昌河東宣慰司瞿氏越嶲土司嶺安盤前往夷穴持示化誨追還男婦三十八名口尚有男婦十名口並牛馬財物未經送還凶首亦未獻出等情到臣臣復飛咨建昌鎮臣就近會同地方文員宣布皇上威德俾凜遵王化各安住牧務將人口盡行追還凶犯亦勿得輕縱去訖所有前後情節理合奏聞謹奏此事嶽鍾琪巳經備細奏聞伊自有區處料理之策爾尚未熟諳番情且勿輕舉諸凡悉聽嶽鍾琪主見而行可也雍正四年正月二十二日湖廣提督臣趙坤謹奏為恭謝天恩敬繳硃批事竊臣前奉旨署理四川提督印務欲將川省公糧一千一十分招一半以實營伍留一半以完欠項具摺請訓於雍正三年十二月初一日臣差自京到川臣巳來楚二十五日抵臣常德府新任蒙奏爾前任黔省之行為朕甚不取今若仍然以因循為安靜懈弛為和平柔善以取恱兵丁姑息以要結屬員而令其頌已寬厚之德此等巧術朕深惡之幸汝操守可取朕因念聖祖所用數十年舊臣所以取汝所長而略汝所短慎莫蹈襲故智以為得計須痛自悛改加意整飭否則恐傷及汝之顔面可惜一生功名付之流水則噬臍無及矣亟當勉進於是而革除其非庶不負朕始終成全耆舊之恩誼也毋疑毋執雍正四年二月初一日湖廣提督臣趙坤謹奏為奏明事竊查楚省營伍前提臣魏經國料理固屬整飭錢糧亦甚清楚惟是提標五營之旗幟緣楚地蒸濕起黴覺巳舊損又五營鉸鎗手所使之鎗類於線鎗祇可裝砂子為打牲之具非摧鋒陷敵之利器也臣標為全省表率専司援𠞰臣荷蒙皇上殊恩毫無報效願捐俸銀製造五營鉸鎗五百六十桿大小旗幟三百七十面俾軍容整肅以壯觀瞻緣係製造軍器事理理合奏明伏乞皇上睿鑒謹奏爾前任貴州時亦有此一奏除此則實心效力言行相符之處未之見也提督闔省戎政在務大體為要不以靖盜安良甄别賢否賞功懲罪為已職分之所當為而乃於此瑣屑處孜孜求見賞於朕朕甚不取勉為之同日又奏為陳情懇恩事竊惟雍正元年正月內臣入覲天顔仰荷隆恩授臣貴州提督又蒙洪慈將臣子趙秉鐸由廕監生擢補貴州提標中軍參將臣父子受恩顯榮逾分乃任黔三年毫無報稱復疊荷寵眷授臣今職皇上之恩天髙地厚臣即捐糜頂踵亦何能仰答萬一竊念楚疆勢分兩湖界連八省凡一應兵馬錢糧營汛盜案事件繁多皆須細心料理方無貽悮臣夲武人年又六十有七矢報之私雖篤而精神氣血漸不如前倘於事件稍有貽誤則臣罪難逭是以冒昧陳情懇將臣子趙秉鐸賞令解任來楚幫臣辦理一應案件並代臣書寫摺奏則臣得臂指之資皆聖主格外之賜也為此繕摺奏懇伏乞皇上睿鑒施行謹奏據爾奏請已有旨矣但朕施恩不必無望報之心受朕寵榮當思所以報之之道也其勉為之慎為之雍正四年四月十七日湖廣提督臣趙坤謹奏為恭謝天恩併繳硃批事竊臣前奏懇將臣子解任來楚幫臣辦事一摺奉到硃批臣伏讀天語不勝感激涕零至臣前任貴州奉職無狀復蒙我皇上諄切教導再三提撕臣惟有痛改前非勉其不及於整飭營伍訓練兵丁鼓舞員辨緝盜安民勸善懲惡大體大要處極力遵奉以贖前愆以圖仰報殊恩於萬一也為此繕摺奏謝併繳硃批伏乞睿鑒謹奏年紀漸老改過尤為難事於此須要見透方能遵朕訓誨而行莫看作容易徒務口舌虛文究於實際無益也同日又奏為奏明事竊臣訪得長沙協副將李登雲聲名不好藉藉人口昔任嶽州參將時曽被守備謝尚遵揭告近任長沙協又被前任都司韓公逺揭告又且指稱部費勒索銀兩徇庇員辨一味存私臣因事屬已往故未糾參然而聲名既巳有玷且又塘汛廢弛並不留心經理臣抵任以來見楚省盜竊繁多屢飭嚴謹塘汛差員分查今據差員稟稱長沙協塘汛俱草率完事全不整齊且數塘缺少兵丁又稱永州鎮左營遊擊郝賢蔭所屬塘汛煙墩瞭樓塘房久經廢壞並未修整該將甚屬溺職永州鎮臣陳尚武相去咫尺並不覺察亦有玷統轄之職除將副將李登雲遊擊郝賢蔭廢弛塘汛並永州鎮臣失於覺察緣由移咨督臣會疏題參外理合具摺奏明伏乞皇上睿鑒謹奏參奏甚當但朕知李登雲人頗敏練明白何乃如此作為陳尚武原屬平常年已老矣其為人究竟如何猶堪總兵職任否據實更奏以聞雍正四年六月初七日湖廣提督臣趙坤謹奏為恭謝天恩敬繳硃批事竊臣差員自京還楚蒙賜紫金離宫蟾酥鹽水各錠一匣扇墜五十枚臣跪迎至署恭設香案望闕謝恩祗領訖伏念臣受逾分之榮毫無涓埃之報私心自問悚歉難安惟有夙夜兢兢仰遵聖訓整飭營伍操練兵馬振勵所屬員辨俾各盡職守以仰答髙厚於萬一耳為此繕摺奏謝天恩併繳硃批謹奏覽奏謝知道了能切戒因循罷軟之病凡事據實直奏無隱秉公力行圖取後福可也勉之勉之若於此少信不及朕一番保全之恩殊為可惜耳雍正四年七月初一日湖廣提督臣趙坤謹奏為欽奉上諭事雍正四年六月二十九日蒙兵部劄開奉上諭聞得湖南沅州有姦民余景福辰溪縣有姦民謝録正沅陵縣有姦民顔正等肆行不法爾等即行文與總督李成龍提督趙坤令其會同商酌務必擒獲不得漏縱姦惡亦不得牽纍無辜欽此轉行到臣臣於本年三月內準湖南撫臣布蘭泰移咨緝拏前來臣當即密行辰沅二協選撥能幹辨兵前往擒拏去後今於四月二十九日據辰州協副將魯璵呈報要犯顔正巳經差員拏獲押赴湖南撫臣衙門審究又於六月二十日據護鎮筸鎮印務副將魯璵呈報姦民余景福畏懼自首赴鎮筸衙門投到亦解到湖南撫臣衙門聽其審究惟謝録正一犯尚逃匿不出臣現在嚴飭辰州協遣撥官兵探其藏匿何所設法擒拏不得驚擾良善波及無辜去後又謹遵諭旨會同督臣李成龍設法緝拏不敢牽纍無辜俟獲日另摺奏報外合將巳獲姦民余景福顔正緣由繕摺奏聞謹奏此等事必待朕諭而後設法飭緝可謂稱職之封疆大臣耶要犯謝録正若不能擒獲或被假冒項替恐爾領罪不起也雍正四年九月十一日湖廣提督臣趙坤謹奏為奏聞拏獲姦民事雍正四年九月十一日據辰州協副將魯璵稟稱夲月初八日亥時據差緝兵丁王之德王如佑稟稱小的等奉差查拏謝録正今有辰沅靖道差役二十餘人於九月初八日卯時在漵浦縣魚洞芭山亂巖岡將謝録正一家大小男婦一十二名口鳥鎗四桿手鎗一桿火藥一桶鐵丸子一包一併拏獲解赴辰沅靖道衙門特來稟明等情到職所有拏獲謝録正緣由合先稟明等因前來臣查謝録正係奉旨緝拏要犯今巳拏獲理合奏聞謹奏此犯不獲如何其可但爾前奉朕諄諄飭諭今賊犯仍就擒於有司差役之手尚何顔具奏耶朕實代爾愧之硃批諭旨卷一百二十一
