body:
  text: 欽定四庫全書硃批諭㫖巻一百七十七硃批性桂奏摺雍正六年八月初二日大理寺卿臣性桂謹奏爲奏明事竊臣一介庸愚荷䝉皇恩命查浙省倉庫錢糧等務臣三月二十六日恭聆聖訓隨於二十九日起程至四月二十六日抵杭州府城即㑹同督臣李衞觀風整俗使臣許容㑹疏題請分任盤查現在州縣倉庫錢糧有無虧空并咨追案件業經通飭杭州等十一府及派委各員務將咨追虧空及歴年民欠錢糧悉心稽察不使稍有遺漏又檄行沿海文武官弁嚴禁米石偷運出海凡汛口要地嚴加稽察毋致疎縱去後又恐咨追案件有資財藏匿他所田畝詭寄別戸之處即㑹同出示准其自首請㫖寛免前罪倘仍欺隱察出加倍懲處臣於五月十六日自杭州起程先抵紹興府查山陰㑹稽蕭山三縣咨追案件比別縣更多恐伊等執迷不悟又復出示諄切曉諭并飭杭州各府縣一體實力查追毋懸國帑臣正在督令清查間據寧波府屬鄞縣慈谿奉化鎭海等縣紛紛詳報缺雨隨即批令各屬勸諭鄉農上緊車戽灌溉臣乘盤查之便於六月十二日兼程星往寧郡所有缺雨各縣於二十八日大雨終日四野霑足目下頻獲雨澤髙下田禾俱慶有秋至鎭海縣乃屬近海之區臣親往查看飭令文武官弁兵丁實力稽察毋使米石偷運出洋俱各遵奉加謹防範其寧波府屬咨追各案臣督令陞任知府孫詔補授知府江承玠嚴加查追除巳經追解銀四千四百餘兩米穀共三百四十餘石未完銀米等項嚴飭該府等查追不使遺漏臣因紹興府咨追之案甚多故由寧波復至紹郡督令知府顧濟美台州府同知胡文溥嚴加查追據報前後共已追完銀六萬八千餘兩其未完案件臣仍嚴飭該府等再加搜查不使隠匿其寧紹二府屬倉庫錢糧臣所到之縣親往查驗將徵存銀兩隨飭二府督縣起解司庫毋任存留滋弊貯倉米穀飭令該縣加謹收貯修葺倉厫以免霉爛再各屬歴年民欠錢糧荷䝉皇恩准令分年帶徵臣於所到之處面飭地方官勸諭紳衿百姓凡有力之家不必拘分年之限完納果能於年限分數之外多完者凜遵諭㫖加以奬賞紳衿百姓俱各踴躍輸將矣其雍正三四五年民欠錢糧自應全完之項臣飭令於秋收時徵比完報至民欠内有胥役影射者若查出依限完補之後仍治以侵蝕之罪則將來完補者恐畏縮不前臣仰體皇仁飭令府縣勒限嚴追果能限内完補免究前罪至浙江從前虧空各案現在會同督臣李衞嚴追其州縣倉庫雖經委員分頭盤察并將各年民欠釐剔清查臣仍親往各府細心察看今於八月初四日起身往台州等府料理統容各有頭緒另當奏報合將寧紹二府各事由先行奏聞謹奏覽奏寧波府久晴得雨朕懷深慰清查各事務業有頭緒可謂不負簡命勉力為之同日又奏為密奏事竊臣三月二十六日恭聆聖訓䝉皇上諭㫖爾到浙江凡有風聞之事即行密奏欽此臣於四月二十六日抵杭州府城聞得督臣李衞差理事同知車柏台州府同知胡文溥寧紹分司徐有緯三人到西興馬厰丈量沙地去後隨即以現今種有棉花又有泥水難於丈量回稟督臣督臣云爾等就到將軍處稟知彼時將軍臣鄂密達傳進三人去云此處原係馬厰時漲時坍何必丈量再水師營我必要安在乍浦演習兵丁又近便我差人去看過竝無鐵板沙爾等將我的話告訴總督等語三人即回稟督臣竝未回別的話後同知車柏説將軍大發怒將軍説制臺賞我旗下官員帽頂也使得麽諸事欺我又説要了戲子的錢纔不禁止了架出一篇是非後督臣李衞見臣與許容云我與將軍二人之和氣皇上都是知道的我如何敢惱將軍將軍就惱我我也不肯惱將軍我明日親到將軍處講明必不致傷了和氣我二人失和氣的事小後來皇上的事闗係大就不好辦了次日督臣到將軍處備細告訴將軍臣鄂密達云我何嘗有此話制臺念旗員一時不能措置每人送給帽頂一箇我還甚是感激至如杭城戲子衣穿尚且無有那裏還有送制臺的錢這人人都是知道的彼時説破後至今相好如初同知車柏係鑲白旗滿洲人進士出身臣素不相識及見有此事臣留心訪問皆云辦事還好此事幸而李衞與鄂密達彼此説明以致相好如初若不然將來不知生出多少事來所闗非細臣謹將前後事由奏聞臣於八月初四日起身到台州等府料理凡有風聞眼見看事之緩急另行繕摺奏聞謹奏凡有所聞咸如此直陳不隱方是至於車柏乃婦人女子輩之行為何足挂齒雍正六年九月二十八日大理寺卿臣性桂謹奏為密奏事竊臣於八月初四日起身往台温處三府察看倉庫錢糧之便各處留心訪問海外港澳竝無匪類藏匿只有福建人在此捕魚為生者不下盈千纍萬更有往來貿易由内洋順便帶回米豆麥石者而寧波台州温州三府屬之民以米易魚換貨希圖厚利者有之實無接濟匪類之事臣自台温處回省之便由金華至衢州府據知府朱道等語續後臣到省亦向督臣李衞密説督臣云我早已差人密訪查拏去了再臣向聞得衢州府南接福建西通江西多有福建廣東江西三處游手好閒之輩在衢州府屬山内開墾田地任意横將知縣不動錢糧自捐俸薪添造哨船遊巡於地方甚有裨益臣看紹寧台温處金衢嚴等府知府俱皆實心效力而寧波府知府今陞寧紹道孫詔温州府知府芮復傳衢州府知府朱倫瀚紹興府知府顧濟美此四人尤為明白辦事敬謹小心臣不敢隱諱謹繕摺奏聞謹奏浙省府道皆係簡用之員又兼李衞察吏公明時加訓導鼓舞現今官常吏治原無可議所奏俱知道了同日又奏為奏明事竊臣於八月内自杭起程前往台温處三府清查已據各該府及委查官將各縣倉庫錢糧米穀盤查清楚現在俱無虧缺臣業經飭取各府并委查官印結其各縣現存銀兩飭令照數分款起解司庫存倉米穀加謹收貯至金衢嚴三府奉㫖著糧儲道蔡仕􅘎清查臣亦便道親至三府細詢各該府據金華府稱有永康縣衢州府稱有龍游縣民欠頗多積至十有餘年今已查十分之六七目下漸可查明臣看大槩亦有頭緒矣至從前本省虧空有台屬之天台縣承追前任㕘令柯燦年逺未完一案今據該府縣詳報業巳追變完銀三千五十餘兩其未完銀兩尚有查出民欠可抵現在飭令地方官催徵完補至紹興府屬咨追案内除前册開巳追完銀兩外今又據該府申報追變完銀四千六百餘兩其各府咨追等案除有產業欠項可抵之外尚有年久無著者臣仍飭各府縣細查密訪不使絲毫隠匿遺漏再分年帶徵之民欠經臣宣布聖恩勸諭輸納紳衿士民咸知感戴竟有於年限應完之數額外踴躍多交者亦有欠少小户竟能全完者至雍正三四五年分未完民欠錢糧自應全完之項原不在分年帶徵之内臣乘今嵗豐收頻檄嚴催各縣上緊徵輸不得因循掛欠臣看光景三四五年之積欠歲内大半可望全完所有臣查過各事宜竝現在情形理合恭摺奏報伏乞皇上睿鑒施行謹奏料汝斷不為欺誑之言也朕嘉悦覽之同日又奏為奏明沿海要口添設巡船礮臺以固海疆事竊臣起身往台時將沿海情形諮詢督臣李衞督臣言及台州之海門前所一帶係屬要口我本身不能親到當順路查看該地情形如有應添兵目船隻因地籌畫俟回省之日再為酌定具奏今臣清查黄巖縣倉庫之後即會同調任黄巖鎮臣方文登前至海門地方察看形勢果屬緊要查海門一汛係臨海縣所轄之地出口即屬汪洋大海乃商漁船隻往來之門户恐姦匪之徒易於出入是以有黄巖鎭標將弁帶兵三百名駐劄海門原有設立礮臺一座防守此處對岸乃係台協前所汛地原撥有台協將弁帶兵五百名防禦亦有礮臺一座布置不為不周但兩岸皆係陸路未曾設有汛船查此港東通東洋及福建廣東西通黄巖縣治台州郡城江面廣濶約計十里臣之愚見應添設小快哨船數隻責令在海門前所兩處晝夜實力巡察偷運米石夾帶私鹽等弊又黄巖至海門台州至前所雖設有臺汛數處恐鞭長難及必於海門至黄巖前所至台郡南北兩岸每隔數里各設立礮臺一座安設礮位撥兵防守建造營房永逺居住晝夜不許擅離責令將弁不時稽查則海疆重地可保無虞而偷運米石夾帶私鹽之弊亦便於巡緝難以透漏矣再臣到台州太平縣之寺前橋乃近海之區彼處有水師哨船二隻巡兵三十名把總一員而温州府屬之樂清縣紅橋二處離海不過數里雖有陸路官弁兵丁竝無哨船再平陽縣之江口汛離海亦不過數里雖兩岸設有礮臺竝無船隻此三處難以巡緝臣之愚見凡陸路臨河營汛必得照寺前橋之例每汛設立哨船晝夜巡緝則偷運米石及夾帶私鹽之弊可除地方匪類亦自聞風斂跡矣今臣於九月二十二日回省巳將看過沿海形勢與督臣面言而督臣之意亦屬相同現在斟酌妥當另行會疏具題外所有臣查過沿海情形合先奏明伏乞皇上睿鑒施行謹奏海邊要隘應加意巡防以僃不虞設臺添兵之議甚屬可嘉雍正六年十月二十四日大理寺卿臣性桂謹奏為奏明事竊臣奉命清查浙省倉庫等務已將查過寧紹台等府事由恭摺奏明臣復於十月初四日自杭州起程至嘉湖二府屬查各州縣倉庫已據題委總查之杭嘉湖道王溯維原任湖州府知府吳簡民并嘉湖二府知府將現在錢糧米穀盤無虧缺臣查驗無異復取二該府及委查官印結存案至各縣民欠錢糧内有嘉興秀水烏程歸安等縣縁事務殷繁積欠較多目下尚未查清臣復會同督臣李衞添委試用人員及佐雜等官分縣協辦勒限查竣其杭嘉湖三府屬本省從前虧空及外省咨追各案自臣抵浙委查以來據杭州府屬之仁和錢塘海寧三縣摺報共追完銀三千二百餘兩嘉興府屬之海鹽縣册報追完銀二千六百餘兩湖州府知府唐紹祖摺報共追變完銀一萬一千一百餘兩又據紹興府知府顧濟美續報追變完銀二千五百餘兩其餘未完銀兩現在嚴飭各地方官上緊查追不容絲毫隠匿再查浙省咨追案件惟紹興一府最多俟臣將杭州一府查清之後復往該郡嚴加督察追比其杭州府各縣倉庫遍歴各州縣見汥河汊港四通八達莫可勝數所以江浙二省之匪類在此二府者居多細查嘉協額設兵丁一千三百七十餘名湖協額設兵丁一千一百四十餘名除去隨丁公糧京撥等項名色雖有一千數百之虛名而無一千數百之實用地方遼濶汛廣兵單巡察焉能遍及以臣愚見嘉湖二府屬仰祈皇上諭准再添兵丁及小快船隻分防於汥河汊港各處巡查庶宵小咸知斂跡矣臣見湖協都司王泓細問太湖情形王泓云湖内有湖協及江南兵丁把守幷有哨船可供巡緝其湖邊汊港隘小哨船止可在湖面巡緝不能進港須再得設立小快船數十隻便於進港搜查臣今回省面商之督臣亦以杭嘉湖三協地廣兵少為慮如䝉皇上批准臣再會同督臣李衞酌議另奏外相應將地方情形一併奏明伏乞奏覽同日又奏為欽遵聖諭密奏事竊臣於十月初四日自杭州起身往嘉湖二府清查途中聞得臬司有摘印之説臣查完二府之事本月二十日到省纔知臬司白清為斷邵姓家産一案濫用刑夾之故被㕘臣隨密訪議論紛紛不一有云原㕘革正白旗漢軍拖沙喇哈番之類章京謝士英因將軍臣鄂密達與白清有親而當日邵九臯向在鄂宻達門下走動故得乘機從中舞弊指撞者又有云邵家曾求過鄂密達到白清處説情許鄂密達銀物託其照拂轉囑願送白清銀四千兩之數者臣見督臣李衞竝見藩司臣髙斌問及此事皆云白清顚倒是非不無情弊但將軍鄂密達先㕘過謝士英今事之虛實尚不的確現在審問臣到省聞得如此不敢隠諱相應奏聞再東洋託姦商柯萬藏帶著兩箇家人去聘請的九箇福建和尚被督臣李衞訪知已差人先在普陀山等候俱全行拏獲解到在省矣合併奏聞謹奏所奏二事朕皆已聞之雍正六年十二月初五日大理寺卿臣性桂謹奏為奏明事竊查浙江帶徵民欠錢糧臣屢飭府縣出示勸諭輸納今紳衿士民咸感皇上洪恩竟有於應完分數之外多完者其雍正三四五年地丁錢糧截至本年五月止各屬共未完銀七十七萬一千餘兩臣恐各州縣怠於催科則年復一年又成舊欠且今年收穫豐稔是以臣於秋收時勒限飭令各州縣乘時作速催徵去後今各屬頗能上緊徵追而欠户人等亦皆踴躍輸納臣隨查藩庫收銀數目據布政使髙斌冊開自六月初一日起至十一月終止各州縣三四五年錢糧除徵存縣庫未經批解外其已解交司庫銀共得三十二萬八千有奇而歲内尚有二十餘日臣仍復飭令各屬上緊徵輸源源報解謹將現在追完銀兩數目繕摺具奏伏乞皇上睿鑒施行謹奏催科有術朕甚嘉之百姓既咸知感恩踴躍輸納則徵收可不必嚴急爾當密授意於各有司稍從寛緩將朕此意亦密令督臣李衞領悉雍正七年正月二十五日都察院左副都御史臣性桂謹奏為據情陳明龍神著靈恭請敕封永鎭海疆以衞商民事竊臣於雍正六年六月間查寧波府屬之鎭海縣倉庫據該縣鄉民等僉呈以鎭民僻處海濵田多磽瘠全頼雨暘時若歲獲豐收邑有蛟門為東南海口緊要之地相傳龍神鎭守保䕶鹹潮如遇旱潦祈求必應商民咸藉以安今皇上隆恩浩蕩海宇昇平兼之龍神庇佑得慶安瀾呈請具題懇求聖主賜敕加封庶小民頼以保䕶地方受福無窮等情臣隨令鎭海縣查明實蹟去後嗣據該縣詳稱查得邑誌蛟門山在縣東約十五里環鎖海口有蛟龍穴時興風浪毎年支銷地丁錢糧於六月初一日致祭龍神載在祀典如遇雨旱縣令䖍禱有騐順治八年大兵征勦舟山出闗過蛟門風恬浪靜及至螺頭門忽起大霧逆不及僃遂得登岸圍城十日破之其後海外餘孽犯闗見龍攔潮舟不能入皆龍神衞䕶我聖朝之實蹟見於志乘者也等因前來理合據情具奏仰請聖裁應否賜敕加封伏候皇上批示臣再會同督臣李衞另疏具題謹奏該部議奏同日又奏為恭繳硃批奏摺事竊臣家人前後兩次齎捧皇上發回奏摺到杭隨恭設香案跪讀硃批訓諭臣敬謹遵行望闕叩頭謝恩訖所有奉到兩次硃批奏摺理合恭繳再有奏者臣清查浙省各縣倉庫時凡見紳衿士民即宣布皇恩勸諭上緊完納今臣行司查歴年帶徵民欠完數去後據布政司單開帶徵雍正三四五年錢糧續又解到銀七萬三千五百餘兩連前共巳解司銀四十萬一千八百餘兩尚未完銀三十六萬九千有零將來蠶麥兩熟於題銷頂限時所完自必更多再雍正六年分地丁錢糧自開徵起至封印日巳收司庫銀一百五十四萬九千九百七十六兩零統計歲内已徵完七分有餘之數較往年亦覺稍増其未完銀兩雖有六十二萬一千八百十八兩零開徵之後尚有陸續趕交可副題銷之限此係巳前辧理者今奉皇上硃批恩㫖臣已密語督臣李衞現在斟酌分別緩急以仰副聖慈軫恤元元至意理合繕摺奏聞謹奏完納錢糧固屬急公然猶為末節所慶者浙省民情風俗一旦丕變至於如是朕深為嘉賞汝等皆有功於地方之臣也勉之雍正七年四月二十日都察院左副都御史補授漕運總督署理浙江總督印務臣性桂謹奏為微臣疊沐隆恩恭摺奏謝以伸下悃事本年三月十四日臣接准浙江督臣咨准吏部咨開奉旨漕運總督員缺著副都御史性桂補授性桂奉差浙江有清查辦理之事且李衞奏請進京陛見將總督印務交與性桂署理著性桂於浙江事竣後再赴總漕之任欽此移咨到臣臣隨恭設香案望闕叩頭謝恩恭疏奏謝外竊臣一介寒微備員御史毫無寸效荷䝉聖主隆恩超授大理寺卿旋陞副都御史復荷天恩授臣為漕運總督又因督臣李衞奏請陛見將總督印務交臣署理聞命之下感激涕零惶悚無地臣惟有敬謹黽勉罄竭愚忱冀圖仰報髙厚隆恩於萬一但漕運總督關係輓運天庾職任甚鉅伏祈聖慈准臣於浙江事竣後赴京陛見叩謝天恩跪聆聖訓再往新任庶諸事得以敬謹遵循臣不勝感激瞻戀之至理合繕摺恭謝天恩伏候聖㫖謹奏陛見之行無庸奏請每歲催漕北來即可見朕且不論何職何任但肯公勤辦理無事不克就緒也汝便來京亦不過訓諭此二字而已至於汝所統理諸務朕不洞悉亦無可訓諭者日前趙向奎在京聽其論奏漕務甚覺通透汝赴任時路過蘇郡當詳詢之李衞於諸事練達亦可諮訪其言論也同日又奏為奏明事竊臣荷䝉聖恩命臣署理浙江總督印務業將受印日期題報在案今臣檢查案巻訪察民情凡有一切應行事件督臣李衞悉心辦理籌畫得宜臣俱循照舉行兹浙省士民皆感皇恩屢沛教導頻施漸成淳樸且雨水調勻春花茂盛而地方亦屬寧謐恐厪聖懷謹將現在情形恭摺奏明伏乞皇上睿鑒謹奏覽奏深慰朕懐雍正七年五月初二日補授漕運總督署理浙江總督印務臣性桂謹奏爲奏聞事竊照浙省雨水調勻春花茂盛臣已將情形繕摺奏明今杭處等十一府屬所種春花目下將次收穫蠶亦甚好其台屬各縣地氣較之省會稍異小滿後即插種早禾據黄巖太平二縣報稱入夏以來缺少雨水臣隨飛檄行查據台州府申報於四月二十二日起至二十四日郡城連得雨澤四野霑足等因到臣臣又即飭該府縣諭令鄉農乘此得雨之後以時插種臣謹恭摺奏聞伏乞皇上睿鑒謹奏據奏闔省農蠶俱好台郡亦經得雨朕懷曷勝欣慰補授漕運總督署理浙江總督印務臣性桂浙江觀風整俗使署理浙江巡撫事臣蔡仕􅘎謹奏為奏聞事本年四月十八日有海寧縣民趙聖千持刀將伊親母謝氏頭面劃傷臣等聞知駭異即密飭杭州守喬世臣星赴查察隨據禀稱查該犯素患瘋顚不時舉發正在發狂持刀之際伊母謝氏向前奪刀致被劃傷頭顱額面騐明尙可醫治不至損命巳將該犯收禁查律載凡子孫毆祖父母父母皆斬原無成傷與不成傷之别今趙聖千持刀傷母雖係素患瘋顚但此等狂疾悖亂之人不可一刻姑容聖世若由縣府成招具題反使得以茍延時日且恐有玷章疏臣等已飭該縣將該犯立斃杖下以正倫化以快人心理合繕摺奏明伏乞皇上睿鑒謹奏所見甚是應如此處斷同日又奏爲奏明事竊臣等於本年三月内有臣性桂進摺家人巴蘭泰臣蔡仕􅘎進摺家人孫從自京回浙各據禀稱伊等同行於山東鰲陽地方遇有福建延建道魏壯家人馬廷錫亦附伴同行在舟中據馬廷錫説我在京聞知皇上因欽天監啓奏紫微星落在福建地方爲此特差大人赴閩凡三歲以上九歲以下男子盡行誅滅等語臣等各聞此言不勝駭異即同赴督臣衙門與李衞共商當此太平盛世皇恩疊沛海澨山陬無不淪肌浹髓此等荒誕不經之説萬不足以惑人聽聞但馬廷錫與臣等家人初相覿面便敢放言無忌誠恐其到處傳説漸至流播不可不即為查禁特未經提到馬廷錫訊出確供何敢輕易入告是以督臣李衞委員赴閩咨提馬廷錫來浙又慮該犯狡推臣等因遣巴蘭泰孫從同赴指拘對質兹四月二十六日接准福建督臣髙其倬回咨云已拏到馬廷錫訊據供認訛言不諱但稱係在路上遇巡察山東御史臣蔣洽秀家人張文修所説巳將該犯解京請㫖敕部提到張文修質對無庸解質等語移覆到浙臣等無從再訊合將移提始末繕摺㑹奏伏乞皇上睿鑒施行謹奏此事髙其倬等業巳奏聞矣雍正七年五月二十七日補授漕運總督署理浙江總督印務臣性桂浙江觀風整俗使署巡撫事臣蔡仕􅘎謹奏爲奏聞事竊浙省自上冬至今春瑞雪凝膏惠風敷暢春花二麥發榮滋茂浙東紹寧台金衢嚴温處八府地氣較暖於四月内陸續收穫菜花豆子二麥其收成分數自七分至十分不等此八府多種早稻因甘霖連沛俱經插蒔齊全浙西杭嘉湖三府於芒種前刈穫菜花豆子二麥均有七分至十分收成此三府皆種晚稻時雨初晴溝堘含潤農夫乘時插種臣等於本月十八日分頭赴各郊外勸農秧苗遍野欣欣向榮農民歡悦頂戴天恩至浙省蠶事最為闗係今年蠶絲大熟價復不賤養蠶之家均得大利錢糧爭先完納現屆題銷雍正六年錢糧合計通省已完十分之九未完一分現在陸續完報臣等謹將查明各屬實在情形㑹摺奏聞伏乞皇上睿鑒謹奏據奏菜豆等項夏收分數深慰朕懷至於稻禾必待秋成後方敢釋念也雍正七年六月三十日補授漕運總督署理浙江總督印務臣性桂浙江觀風整俗使署巡撫事臣蔡仕􅘎謹奏爲據咨密奏事竊臣等准督臣李衞咨開爲密咨代具奏覆東洋近日情形事竊照日本蕞爾一隅全頼天朝商販貨物以資食用自開海禁以來每歲賈舶往來逺夷得沾利濟本職因海洋重大留心稽察上年查有夾帶違禁人貨出口等弊當經奏明緣由幷將犯出姦商柯萬藏等分别究治一面密差向在東洋貿易之商人俞孝行醫生朱來章前往確探信息傳播皇上徳威使之恪恭震服在案查商船回棹貨物向例四分銅斤六分係彼處海菜等貨名曰包頭客商止於銅斤得獲利息其餘之貨俱係擡算髙價原無所趁本職於春初未進京之先聞得日本頭目號爲將軍者將舊有洋客每船給與金片陋規近又加増每片計八色銀六兩約共値銀二三十萬爲數過多洋客不能如數夷人皆向彼處通事取足若輩苦於賠累遂齊行公議將各船所帶回貨減爲二分半銅斤餘悉盡撘包頭貨物從前每船該有七百六十箱之銅者今止派四百七十五箱其意欲使商客折本則去者自少倭目自然著急而彼可以將金片數目爲酌量核減地步耳夷人正在刁難之際因聞有歲前訪拏夾帶違禁人貨姦商發覺究訊之事彼國頗有懼意今據差往之俞孝行回杭稟稱彼處於今歲三四月間已知有風聲見伊時其通事中有闗切者即告以唐山近日的王家善能覺察甚是利害預先拏了許多違禁的人又要打聽我們日本各様的消息這邊甚是小心你們不可多説話犯出要肚腸的等語其所云唐山王家即稱呼天朝官府之謂也又據前差之朱來章寄稟回稱此番到時倭人頗覺疑他留在土庫相待雖優但不令出來行醫又恐其回來走漏許其船照一張以安其心目前尚未回到又據商總鄭大山等稟稱有第二番出去洋商俞枚吉與彼國通事面説一番道理宣示皇上徳威夷人頗知屈服欲改復舊額仍發四分銅斤惟恐中原笑其畏懦故同俞姓議定每船將貨加價少減折頭向日號爲金水銀兩者每萬兩内多批二三千兩以銅斤補足前數有餘其五月内出去之船每隻俱許添帶實銀二千兩之貨多准配銅珠一百二三十箱合來雖與舊額相似而每船較之往日更多便宜利息數百兩或千金不等復據鄭大威於東洋回來投到亦細訊無異其中詳細委曲之處俟俞枚吉七八月間回棹更可一一得其確耗矣事關海洋機務先次差往之人業經探有回信但本職現已聞訃丁憂不敢自行瀆陳相應備敘畧節咨請會同代爲具摺密行奏覆等因准此臣等理合㑹摺密奏伏乞皇上睿鑒施行謹奏覽奏深慰朕懷凡此皆緣李衞實心任事忠誠體國消患未萌慮事幾先之所致實屬可嘉雍正七年閏七月二十三日補授漕運總督署理浙江總督印務臣性桂浙江觀風整俗使署巡撫事臣蔡仕􅘎謹奏爲密奏事竊照督臣李衞於本月初四日遵假回籍臣等於初三日到彼敘别督臣屛人密語云江南福建廣東及浙江杭嘉湖三府有匪類結黨陰謀我遣人扮星卜打探已查出爲首係江寧人各處分㪚銀兩結納等語臣等詢其姓名督臣未即明言伏查杭嘉湖三府疊䝉皇上逾格鴻恩民情感激比戸熙恬推之他省亦當如是至閩廣與江浙陸路窵隔惟海道易通而近年洋面安靜即强竊等案亦甚稀少但預防密訪之舉乃昇平盛世所不廢况督臣既於臨行時言之鑿鑿臣等不奏請我皇上密飭江南閩廣督撫諸臣一體密察以杜微漸爲此會摺密奏伏乞皇上睿鑒施行謹奏此等處乃封疆大臣所當深爲留意者勿謂何害其禍將大故明者睹於未萌智者備於將然愼莫慢視忽而不察在凡庸無知或目爲多事殊不知省却無限事也人咸知督撫搜緝匪類不稍姑息自必斂迹逺遁縱實無其事亦屬防微善䇿何况形跡已露乎朕之信任李衞正在此等處嘉其明大體能知地方利害也汝等當效法之嚴加防範絲毫不可踈忽至江南閩廣各省朕俱經密諭矣雍正七年八月初六日補授漕運總督署理浙江總督印務臣性桂謹奏爲密奏事竊前月初三日據督臣李衞向臣與蔡仕􅘎密語江南福建廣東及浙江杭嘉湖三府有匪類結黨陰謀我遣人扮星卜打探已查出為首係江寧人各處分㪚銀兩結納等語業經臣等會摺密奏伏思我皇上深仁厚澤廣被四海凡有血氣者莫不感戴歡呼共樂昇平但臣身任封疆督臣李衞既於臨行時言之鑿鑿敢不竭力籌畫預防隨密飭各鎮協營及各府轉行密飭所屬境内凡有面生可疑之人詳加盤詰密行稽查如得姦匪實情立即嚴挐解究仍飭不許兵役總保藉端滋擾務使姦匪無潛蹤之處小民無驚擾之虞所有臣密飭各屬情由理合奏明謹奏前既奏過今又照樣抄謄瀆奏是何意見耶此等事當密為留心不宜頻頻形之筆墨倘書冩之人不謹或致洩露風聲甚覺於事無濟誤與汝等庸流言及是乃李衞之咎洵可謂失言矣同日又奏為奏明現在潮勢平和情形仰祈睿鑒事竊照海寧塘工劇險今歳秋汐潮勢尤大前經署撫臣蔡仕􅘎會同臣將勘過情形及兩次發銀預備防禦情由奏明在案嗣因蔡仕􅘎入闈在邇所有閏七月望汐經蔡仕􅘎親往查勘又復奏明兹八月初一日起又屆初汐之期臣於初二日親往海寧查勘於潮頭未來之先臣恭設香案率領在工員弁竭誠拜禱至未時初刻見潮頭自南席捲而至髙有丈許離塘約有半里忽分為兩股一股投西一股投東而去餘波纔至塘脚竝不潑激塘面復有一股小潮由東而來至小文前約離塘身四五丈逺與分往東去潮頭兩相一擊隨即會合仍投西南直去臣在塘觀看深為欣幸沿塘居民莫不感頌聖主福庇初三日係大汐之期目覩潮汐安瀾無異平日恐厪聖懷合將臣勘過現在潮勢平和情形恭摺奏明再臣於初四日回署接到江蘓布政使髙斌密寄字來因謝恩奏摺内奉硃批諭旨爾雖已經離浙當再寄字與蔡仕􅘎等令其極力敬慎預為防備復誠禱海神以期感佑庶冀可保無虞也欽此臣跪讀之下仰見皇上敬神衞民之至意查八月十三日又係望汐之期臣當先期欽遵聖諭親往䖍誠祈禱宣頌皇仁併親督在工各員加意防禦務保無虞俟臣回署再將勘過情形另行奏聞謹奏感應之效捷於影響庸愚每信不及然須以忠誠爲國爲民之念上格方能感動神明鑒佑若將此交孚至理視爲兒戲及或以世俗祈福私心處之則非徒無益而更有害也朕意致敬盡禮究不若竭誠輸忠爲尤妙汝等倘不能遵諭從事而徒致飾於儀文則可惜朕一片爲民訓汝之苦心矣敬之勉之將此諭與蔡仕􅘎看李衞回任時亦令知之雍正七年八月二十五日補授漕運總督署理浙江總督印務臣性桂謹奏爲再陳勘過望汛潮勢情形事竊臣於八月初二日前往海寧查勘塘工業將潮勢平和情形恭摺奏明兹十三日起至十八日又値望汛大潮之期臣復於十二日到海寧十三日欽遵諭旨䖍恭祈禱已於巳時見潮頭自南席捲而至離塘身約有里許分為東西兩股其東去潮頭與東來小潮一擊仍往西南而去餘波雖潑至塘脚坦水間有衝損因不甚洶湧故塘身幸無坍矬十八日乃海神誕辰臣於五鼓率領在工各員恭設祭品香燭䖍誠致祭宣揚聖徳祈求黙佑隨回至九里橋未時見潮頭自南而來其勢與十三日無異臣於前七月因潮勢洶湧故於望汛之期同署撫臣蔡仕􅘎往勘潮頭在東念里亭本月初汛見潮頭退西八里之逺在於小文前今又退西三里之逺在於薛家壩臣心駭異詢之在工各官及本地里民咸稱南邊漲沙必然衝決開濶各潮頭漸漸退向西南此説雖無確據然潮頭現在漸退向西似乎近理仰頼皇上福庇如果南邊漲沙漸次衝開潮勢不近塘身則海寧一帶可保無虞矣至六七等月坍矬坦水塘身雖經多備柴土隨坍隨修保固無虞但不過一時急則治標之計今大汛巳過自應及時購備樁石重加修築以防明歲春汛除面諭專管塘工之杭嘉湖道王斂福等查明估計造冊詳送俟署撫臣蔡仕􅘎出場後臣會同覆加確核一面撥給銀兩作速備料興修一面據實奏聞所有臣勘過望汛潮勢情形理合奏明伏乞皇上睿鑒謹奏汝與蔡仕􅘎慢視海塘幾致誤事今仰頼神明黙佑幸保無虞至善後事宜自有李衞旋任經理何用汝等庸才瀆陳耶雍正七年九月初八日補授漕運總督署理浙江總督印務臣性桂謹奏爲奏聞事竊臣准督臣李衞轉交大學士公馬爾賽等字寄雍正七年六月初六日所奉上諭向來各省督撫奏報年歲收成皆云幾分至幾分不等似此未曾分析清楚未免朦混嗣後可細加分别一府之中如九分者居十之幾八分者居十之幾照此類推據實奏報則朕可以詳悉收成之分數爾等可寄信與各省督撫知之欽此遵旨寄信前來等因到臣准此隨經檄行各屬欽遵去後兹據各州縣將本年早禾收成分數逐一分别陸續申報前來臣查各屬早禾俱有十分九分以及七八分收成理合將各屬所報分數另摺分析恭呈皇上睿鑒謹奏深慰朕懷雍正七年十一月十六日補授漕運總督署理杭州將軍印務臣性桂等謹奏爲敬陳禁城重地城上宜建營房仰祈聖鑒事竊照杭州省城五方雜處居民稠疊内有大小衙門以及倉庫錢糧所關甚重現在十城門及水門設有滿洲漢軍各旗官一員兵十五名輪班看守按時啓閉惟查城上向未設有暮夜巡邏之兵是以姦巧棍徒毎有包攬商税於夤夜深更將貨物縋城偷越等弊臣䝉皇上天恩署理將軍印務隨密諭兵丁在於城上巡察果獲有半夜上城棍徒二起押發有司審究一面諄切出示嚴禁隨即撥旗兵一百名輪流巡邏俟督臣李衞回任時㑹商永遠巡查之法今督臣業已到任臣會同詳加商酌禁城重地理應愼密城上宜建營房爲兵丁棲止之所查城上從前原有營房基址猶存臣等擬請於舊基處所酌量遠近復建營房各三間其鳳山慶春艮山三門因跨山近河偷漏較便尤爲緊要酌量加添約計共十餘處各派官一員兵十名輪班晝夜專司巡邏稽查實於地方有益如䝉聖恩俞允所有應建營房酌動鹽務盈餘銀兩交地方官確估興建仍隨時修葺毋致傾圮如此防禦不但國課有益而匪類姦徒自知斂迹矣臣謹會同督臣李衞合詞恭摺具奏伏祈皇上睿鑒謹奏城上設兵巡邏之議可行建造營房當於公項銀内動用此係創舉應行題請之事另爲妥議具題可也同日又奏爲請㫖事竊照杭城駐防滿漢旗兵荷䝉聖恩垂念籌及伊等吉凶之事賞撥正項錢糧二萬兩著令營運生息所得利銀酌量恩賞此實亘古未有之殊恩臣荷䝉特恩署理杭州將軍印務受事之後查營運銀兩前任將軍臣鄂密達將此恩賞銀二萬兩業已借給滿洲漢軍各兵毎月一分取息臣接任後見原任浙江提臣陳天培將恩賞銀兩分借兵丁奉㫖恩寛著令一一歸還仰見我皇上愛恤兵丁無微不照今鄂密達所辦之事與陳天培相同是以臣即於十月起暫停借賞外臣再四思維未收回銀兩若一時向兵扣楚實非仰體聖主矜恤兵丁之至意臣現將滿洲漢軍毎月各扣回本銀一千兩利銀一百兩計扣至十箇月本銀扣足其扣回銀兩作何營運之處臣恐一人之見未能妥協隨與督臣李衞副都統臣偏圗楊長泰陳士璠等公同商議將前項銀兩或於駐防滿漢旗員人内選擇能員令其承管於省城開張典舖照民間之例十兩以外一分取息抑或照依恩賞撫標兵丁銀兩之例亦交鹽驛道王鈞於鹽商内查有家道殷實情願領去者使各商連名互結毎月按一分生息將毎月現收各兵之銀隨收隨放按月即可得利再浙省入官田畝臣奉命清查以來應變者屢飭該地方官及時變賣而承買者甚屬無幾或以此項銀兩將入官待變之田畝照依估計報部價値繳貯藩庫將田仍聽原佃户租種除完糧公事之外應得租籽交該地方官察收委令老成旗員會同糶賣易銀交庫俟利息充足之日再行賞給實可垂之永久而兵丁人等得沾億萬年之洪恩矣臣等愚昧敬陳末議三條是否有當仰懇皇恩採擇批示俟新任將軍臣阿里袞到任時欽遵辦理爲此合詞具奏請㫖伏乞皇上睿鑒施行謹奏阿里袞即日到杭俟其接任後酌量料理可也雍正七年十二月十一日補授漕運總督臣性桂謹奏爲奏聞事竊臣奉命來浙會同清查倉庫錢糧等務業將查過情節併造册緣由先經奏明在案現據布按二司陸續造冊前來今臣雖已查核完竣但原係奉㫖會同督臣及觀風整俗使清查之案必須公同悉心會核方敢分別具題今封印在邇督臣李衞因地方公務紛繁尚未查竣容俟查竣會題之後臣即赴總漕新任恐厪聖懷合先恭摺奏聞伏乞皇上睿鑒謹奏朕另有委任之事如此摺齎回時爾尚未離浙省即在杭郡候旨遵行雍正八年二月初八日工部尚書臣李永陞漕運總督臣性桂浙江總督臣李衞謹奏爲遵旨察審事竊臣李永陞奉旨前往浙江會同審理所獲匪類一案隨欽遵於本年正月初七日在京起身至二十二日抵蘇即傳諭旨著江蘇巡撫尹繼善飛提署江寧按察司馬世烆赴浙臣於二十四日直抵杭州當將上諭分向漕臣性桂督臣李衞各宣示訖節次准臣李衞移送案巻情節併江南解到各犯字蹟符咒邪法書籍等項前來臣等逐一細加察閲隨准江省將馬世烆等押解來杭臣等會同訊問將各犯取供在案伏查馬世烆身受皇上格外隆恩畀以要地法司重任不能覺察同城反與姦匪張雲如筆籙往來已為溺職先或不知其詳情尚可原及委令緝拏遲延不解竟將搜出不法字蹟竝不公同㸃明開清事由件數封貯公所私留衙署二十餘日意欲何為又於搜查時私取一紙既不眼同看明則所稱藥方之處自屬難信且因程漢瞻前曾幫過銀兩瞻顧私情以寄信喚來揑為投到任聽張玉金在於署内向馬空北覿面求情轉以為親受累代其解紛今奉㫖詢問尚不據實供吐既以戲謔之語搪塞又以別有苦衷支吾不思辦理國家重案自當秉公執法豈可顧慮依違今俱巳敗露仍恃職銜所有通同如何商謀狥庇隱情抽匿字蹟之處只云實係我辦理錯誤將作弊之處狡口不承至江寧副將張玉金黨庇私親公然囑託行賄且令千總宋承慧預先通知要犯胡愷公三日後方拏反羅織無辜又著千總擅拘首人于璉總甲扑責民人種種不法均干功令相應一併具摺㕘奏請㫖將馬世烆張玉金革職以憑與張雲如等各犯逐一訊審實情分別定擬具題除張玉金葛繼孔郭如楩移咨江南督撫諸臣提解質訊外謹將現在審訊各犯口供另繕清摺恭呈御覽為此合詞會奏伏乞皇上睿鑒施行謹奏將馬世烆張玉金俱革職拏問嚴審定擬具奏負朕髙厚之恩未有甚於馬世烆者殊屬可惡之至即一面遵諭行文與范時繹尹繼善將馬世烆一應資産搜察封固并將伊子及其得用家人拘禁候㫖施行倘有踈縱隱匿情弊惟范時繹是問馬世烆既知此案敗露必早為搬運寄頓之計矣當令范時繹尹繼善詳審為之雍正八年三月初十日工部尚書臣李永陞漕運總督臣性桂浙江總督臣李衞謹奏為遵㫖察審事竊臣等於本年三月初八日接到皇上批回臣等前次會奏審得馬世烆張玉金通同徇私作弊縁由奏摺一件公同啓視跪讀隨即欽遵諭㫖將馬世烆張玉金鎖挐收禁審擬倂差員星飛齎文傳㫖與江南督臣范時繹撫臣尹繼善密速欽遵辦理去訖查前奏内行提之葛繼孔等先經陸續到浙臣等於二月十三日會同質訊據葛繼孔已將張玉金請去同伊親家程漢瞻商議不惜身家託其向馬空北闗説為伊求情朦混開脫復令郭如楩邀空北至寓飲酒許以事成從重厚謝多金空北彼時回其同差有人既恐在江形蹟顯露又慮浙省訪聞獲罪游移未曾全允等情供出郭如楩始雖稍有支吾見衆犯巳言實情隨亦盡行吐露質之馬空北三面供詞脗合無異惟張玉金止將馬世烆轉傳范時繹之意著令通知程漢瞻到寧即邀葛繼孔商議央同郭如楩向馬空北求為照拂併在臬司衙門與空北叩頭又借查夜為名時常進監與漢瞻私相密㑹之處自認無辭其如何通同勾結商謀前後行賄根由尚恃有副將職銜不吐實供臣等於葛繼孔馬空北二人對質明白之後隨將馬世烆雖許空北提拔功名尚屬事後即葛繼孔所言從重厚謝亦未交出現物而空北因何即肯甘心不懼國法竭力為之朦朧具稟之處向繼孔空北二人細加詰問據葛繼孔露出馬空北非是騃子自然別處還有縁故但非伊經手不敢説出等情馬空北彼時詞色倉皇畧加根究始據供出去年十一月二十四日馬世烆令同屬回教的揚州人張鎮逺來寓説合云如今有一項是五千晚生要沾光一千你到明年正月到我舖子來兌空北隨問此項到底是誰的鎮逺云是范大人那裏的傍人如何有這東西說明鎮逺即出去儘晚同他外甥楊進寳來空北寓内即將五千兩契紙交代空北而去到初三日浙江的差官到江寧提人鎮逺即不見面了及至空北十二月十三日到杭見過大人見事巳敗露將此紙實在燒燬無存當日契上的話空北記的如今錄出願同質對等語臣等當差守備李壽演齎文前往揚州江寜分提張鎮逺楊進寳到案質對適因督臣范時繹赴蘇㑹審王璣一案該備於常州相遇投文留下問話候示時繹隨差官星往揚州去後又差千總同李壽演赴寜提獲楊進寳而張鎮逺巳為時繹所差之官連夜馳驛先行喚到留在公館轅門維時署臬司劉永鐄亦因公事在蘇即備文將張鎮逺楊進寳一同起解而范時繹與臣等之咨文則稱張鎮逺有病隨後起解彼此兩相互異皆有印文可據迨張鎮逺等押解到杭臣等弔犯質審張鎮逺楊進寳不待刑訊俱各據實供招即將所供情節與馬世烆自看而世烆垂首無詞臣等伏查此事各官情節皆有直認正情無俟推鞫者有始猶狡口畧加嚇問盤詰即行實供者似此重案半夾不過四五人且多被拏獲棍徒不致脫漏業巳逐名審完其中有謀匪未成及造言惑衆或從前叛案漏網或被誘附和好事之輩情罪輕重不等現在彚核各供分别定擬另行具題合將近日所審情形奏覆竝將奉到硃批原摺恭繳謹奏詳覽所奏洵屬大竒朕諭不謬於斯益可見矣誠偽二字何能逃上天之鑒耶俟具題到日有旨雍正九年十一月十五日漕運總督臣性桂謹奏為遵㫖宻行奏聞事竊臣接准大學士臣張廷玉等字寄内開奉上諭江興二衞應追鑽夫底料銀兩朕巳降諭㫖開恩豁免但嗣後支給或照定例仍給鑽夫銀五十兩底料銀五十兩或從前給發此項銀兩之時上下扣尅原有浮冒虛銷朕以國家之加恩施惠務在受者得其實濟鑽夫底料如實係給與成造之旗丁則自應照例賞給如徒為官吏分肥旗丁所得無幾是豈施恩立法之意乎爾等寫字與性桂令其詳細確查將嗣後支給銀兩應否照從前之數酌定密行奏聞朕再降諭旨欽此遵㫖寄信前來臣遵查得江興二衞鑽夫底料銀兩從前原由糧道給發衞守備轉發各丁經管書役人等紙筆飯食之資各丁不免亦有所費如浮冒虛銷扣尅分肥等弊臣詳細密查實無確據嗣後倘䝉皇上隆恩仍准給發臣自當仰體皇上加恩施惠務在受者得其實濟之至意嚴飭該道衞凡從前旗丁所費陋規概行永禁臣仍不時密訪嚴查如有違犯官㕘吏處再查旗丁成造漕船所領料價不敷又無贍田幫貼故加鑽夫底料除鑽夫銀五十兩原無增減其底料一項係以十分計算毎分銀五兩一錢若無底料者則全給銀五十兩有零或有底料不足則照不足分數補給是以合之鑽夫一項或有共給一百兩有零者或有共給五十餘兩以及六七十兩八九十兩不等者惟俟臨時查核底料乃有給發確數如䝉皇上特恩嗣後仍照定例賞給自當臨時飭令道衞查明酌定給發臣未敢擅便伏候諭㫖遵行謹奏該部議奏雍正十年十二月十七日兵部尙書暫行署理漕運總督印務臣性桂謹奏為奏聞事本年十二月十四日據浙江杭屬富陽縣知縣朱永齡呈報米價單内開上白米毎石紋銀一兩八錢中米毎石一兩七錢糙米每石一兩五錢等情臣又聞寜波台州等府米價亦貴目今價值如此恐春天又長臣之愚見或將浙省本年糧米截留三四十萬石或將浙省積貯倉穀不拘存七糶三之例多糶數十萬石分撥米貴之各州縣令其確訪時價酌減平糶則米價可平臣仰體皇上念切民依愛育羣黎之至意今據該縣呈報時價與臣所聞寧台等府米貴情由理合恭摺奏聞是否有當伏乞皇上睿鑒施行謹奏截留浙省漕糧及平糶倉穀之奏巳命廷臣議覆今將所議發來汝看硃批諭㫖巻一百七十七
