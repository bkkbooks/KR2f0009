body:
  text: 欽定四庫全書硃批諭旨卷三十三硃批朱綱奏摺雍正二年七月十三日護理湖南巡撫印務布政使臣朱綱謹奏為恭謝天恩事臣一介庸愚毫無知識於雍正元年五月二十一日由河南按察使任內恭奉特旨湖北布政使員缺著河南按察使朱綱補授欽此臣恭聞特簡感激悚惶圗報之私粉骨難酬及至湖北藩司任內甫及三月又蒙恩調湖南一嵗之間兩邀簡擢兼免臣罰俸之案聖恩髙厚微臣頂戴難名雖潔已訓屬竭盡駑駘何能仰報萬一兹值撫臣離任回京臣循例護理印務謹繕摺恭鳴謝悃又臣於康熙五十四年二月內於趙北口地方恭迎聖駕曾蒙聖祖仁皇帝賜御書大字一幅係五言絶句一首外又硃筆另書朱綱二字於束御書紙篐之上係小字楷書筆畫秀徑非常彼時內臣云賜大人們的詩字儘有從無硃筆書名此特恩賜汝臣感激悚惶免冠叩謝又於五十五年在趙北口恭迎聖駕恩賜御書一幅係七言律詩一首臣朝夕焚香頂禮奉為世寶理合一併陳明謹奏汝誠追念聖祖當日之殊恩更宜勉圗報效於今日也勉之同日又奏竊湖南早稻收成蒙撫臣魏廷珍於離任時檄臣查齊登場分數具摺奏報臣查各屬前後報到共計七八九分不等其中收七分者有三十處收八分者有二十一處收九分者二十二處至各屬米價隨時長落不一其各州縣衛所報到七十三處現今米價自六錢四五分至八錢七八分不等其六錢四五分至八九分者有十七處其七錢至七錢八九分者有三十五處其八錢至八錢七八分者有二十一處又查雨水自春至夏皆係霑足惟交六月以來有缺雨之處現在確查然六月二十八九並三十日得有雨澤至七月初四日又得大雨透足其中晚二稻秧苗頗盛應俟登場之際查明分數屆期分别另報外所有早稻收成分數現今米價數目以及地方得雨緣由合具摺陳明謹奏覽奏深慰朕懷一切奏聞俱宜據實直告不可絲毫隱諱自蹈粉飾之愆雍正二年九月初五日護理湖南巡撫印務布政使臣朱綱謹奏臣前報早稻收成並恭謝天恩摺於八月二十九日臣家人恭齎回署臣跪接啓視奉有皇上硃批伏念臣以庸愚世受國恩今又蒙皇上教訓勉勵臣跪讀之下感激涕零雖捐糜頂踵何能少報涓埃惟有凜遵聖諭實心辦事矢志清愼愈加䇿勵以期仰報殊恩於萬一耳再臣查原任湖南布政使宋致虧空庫題請革職以便嚴追謹再據實奏聞伏祈睿鑒謹奏王朝恩廣東浙江兩任布政皆屬稱職因調伊來京引見擢補魏廷珍之缺又恐其以外吏進京或有夤緣多事之舉所以於伊未到京時即降旨補用也昨當寧對揚觀其為人於地方吏治頗屬諳練但才具微覺狹小朕經再四訓諭伊若能感恩遵諭勉力奉公可謂一好巡撫然朕尚未能深信汝其事事留心看其居心行事倘少有不妥處密奏以聞如稍隱匿不以實告朕於他處聞之則欺蔽之咎汝難辭也密之同日又奏竊查嶽州府屬之臨湘縣及嶽州衛據報秋禾被旱經臣會同督臣楊宗仁題明在案現今委員確勘並加意撫恤俟勘明果否成災另報外其餘雨澤霑足各屬中晚二稻總計收成七八九分不等七分者共二十處八分者共三十一處九分者共二十一處又查各屬米價據各州縣衛所報到七十三處自六錢七八分至九錢八九分不等其六錢七八分者有二十五處其七錢至七錢八九分者有二十三處其八錢至八錢八九分者有十六處其九錢至九錢八九分者有九處所有秋成分數米糧價值謹具摺奏報又查湖南地方早中晚稻不同之故因其地有坂田低田之分坂田土肥氣暖低田水冷氣寒所以收獲之時亦不一稻榖之外間有餘地亦偶種植蕎麥芝麻棉花苧麻以供食用如辰靖衡永所屬則多屬山場百姓栽植松杉伐賣又或栽桐樹茶樹蠟樹皆可以生息而衡屬種煙者居多至於茶葉一項各邑雖有種植惟安化為多次則益陽武岡新化等州縣之民亦賴此以為生計臣欽遵今嵗新頒勸農上諭通飭各地方官留心化導因民之利就地之宜勸其無荒無惰以仰副皇上宵旰勤民敦夲重農之至意謹將湖南風土情形一併陳明謹奏知道了通飭各有司勸諭耕桑必令無惰無荒乃為盡職蓋百姓率多愚昧無知全賴爾等大吏實心任事正己率屬不時教導訓化方可望阜安之效如果愛如赤子出於真誠自無不感動其心歡欣鼓舞而樂從也勉為之同日又奏竊查原任撫臣魏廷珍回京時交臣奏匣四個鑰匙止一把除現今具摺用匣一個外尚存匣三個臣自當於新撫臣王朝恩到任時將奏匣轉交但思臣此奏摺回日仍須鑰匙啓視謹將鑰匙暫留臣處容臣於奏摺齎回恭接啓視再將鑰匙連匣交新撫臣應用臣送印之後不敢越分奏摺如恭奉皇上硃批應敬謹看明仍行封固俟撫臣有奏摺進京時代為恭繳合併先行奏明謹奏撫臣王朝恩朕已另賜奏匣矣此分匣匙即賜爾留用但藩司例不徑奏地方事宜權不専一體統紊越於地方無益如有應行密奏之事差人齎摺至舅舅隆科多處伊自代爾轉達也特諭雍正二年十月二十八日湖南布政使臣朱綱謹奏雍正二年十月二十三日臣家人齎摺回楚臣敬謹展閲於參硃批撫臣才品已悉在皇上洞鑒之中今到任未及一月其行事居心尚難以奏查辰沅道駐劄鎮筸地方並無府縣惟鎮道同居專為彈壓苗猺而設今辰沅道張楙因重徴減則一案臣詳參解任質審鎮筸總兵戴良弼又經督臣楊宗仁以溺職題參卸事是鎮筸要地一時鎮道大員俱缺似應奏明至長沙所屬八月初間曾得大雨八月半間尚有小雨自交九月以來至今缺雨然晚稻久已收穫其早稻全賴春雨湖南秋後缺雨無妨農事臣恐上厪聖懷一併具摺陳明謹奏爾等地方大吏果能實心愛養百姓誠感天和自蒙上蒼永逺垂佑也雍正三年正月初七日湖南布政使臣朱綱謹奏竊臣恭奉諭旨令留意看撫臣王朝恩之居心行事臣即具摺覆奏於雍正二年十二月十六日又奉皇上硃批朕之前諭不過欲得其實情耳惟以愼密為期並非令爾顯露形迹挾制撫臣之意也秉公審觀密奏以聞欽此臣凜遵諭旨惟有默為留心不敢少有宣露不但撫臣王朝恩不知臣奉有皇上密諭諸人無一知者即舅舅隆科多不過轉達密奏亦不敢令聞知一字今臣看得撫臣王朝恩到任之後賀禮年禮俱未收受一切喫食等物俱收撫臣於去年十月到任至十二月十五日兩月有餘始下教場看兵標下將官千把總等諭令俟過年看箭臣奉皇上密諭令臣事事留心看此似非勵精為政之意兼聞家口約四五百人日用糜費未知何以持久臣謹將撫臣王朝恩到任後三月以內情形據實秉公密奏又常奉撫臣面諭做官寬厚和平從前參官已多我且不參官臣再四思維此語頗有關係恐或蹈市恩姑息之舊轍但臣駑駘愚昧未知深義理合一併奏聞伏乞睿裁謹奏如此據實無隱方是所奏己悉其再加審視陸續奏聞愼毋絲毫露意自蹈不密之咎同日又奏竊臣前恭遣家人進摺兼奏明湖南秋後缺雨奉有皇上硃批臣謹祗領嗣後十一月仍無雨雪至十二月初一日微雪初五初六兩日大雪約深尺許又於十二月二十八日細雨一日夜三十日大雪似此雨雪應期於來嵗春耕大有裨益謹再奏聞以慰聖懷謹奏閲奏實慰朕懷百凡惟宜據實不可稍有粉飾雍正三年四月十一日湖南布政使臣朱綱謹奏竊臣前密奏撫臣王朝恩到任後情形一摺於二月二十五日家人齎捧回署奉有硃批臣謹祗領臣蒙皇上諭旨惟默為留心密奏聖裁並不敢令妻子預聞即舅舅隆科多臣惟遵旨轉達多約五百餘人衙內至不能容半住在衙門外靣並伊弟亦在外居住出入無忌漫無關防撫臣近處同城似總未留心臣奉奏抑臣更有皇上至聖至明無微不照統冀慈鑒謹奏遲維臺引見定時另有諭旨雍正三年八月二十七日湖南布政使臣朱綱謹奏竊臣於雍正三年四月十一日密奏撫臣王朝恩一摺於五月二十七日家人齎捧回署奉有奏者臣胞兄朱絳蒙皇上特授廣東藩司聞近得痰火之症臣逺道不知詳細恐精神照料未必能如做臬司時臣謹密奏請皇上睿裁謹奏爾兄朱絳患病孔育珣亦經奏過朕惜伊是一好官調治痊否再看同日又奏為恭謝天恩事臣齎摺家人回楚恭捧皇上賜臣黃匣一個內盛太乙紫金等錠並香墜等物隨恭設香案望闕叩頭祗領訖伏念臣夲駑劣庸愚毫無知識蒙皇上特恩賞賜實為非分之榮闔門頂戴大小歡騰又於夲年七月十四日接撫臣王朝恩行知部文為臣湖北督催未滿年限一案恭奉皇上特旨朱綱著從寬免罰俸欽此臣跪讀之下感激涕零臣何人斯蒙皇上殊恩異數雖捐糜頂踵難以仰報萬一惟有夙夜兢兢勉勵盡職以期少報涓埃臣不敢輕請撫臣代題謹於奏摺時恭謝天恩謹奏受寵若驚乃臣道之當然若恃恩放恣豈能長久耶愈當加敬加勉毋忽聞得湖南布政使朱綱彈兊錢糧每一百兩收公費銀三兩又自已坐平銀一兩五錢又用偏針每百兩多敲至五錢以及七八錢不等從前原任布政使宋致任內州縣解交藩庫錢糧每百兩止有坐平銀一兩二錢今朱綱彈兊每百兩不下五兩以致州縣苦纍俱有怨言有人密奏此摺朕疑而未信爾豈忍如此負朕耶雖然茍毫無影響何由而招此物議諺云禦寒莫若重裘止謗莫若自修但有則改之無則加勉朕亦再加訪察雍正三年十月二十二日湖南布政使臣朱綱謹奏臣齎摺家人回署敬啓奏匣見內有參摺一件并奉有硃批諭旨一道到臣仰蒙皇上天語下詢感激涕零謹望闕叩頭據實逐一回奏竊惟各省每年皆有辦公需銀之處前藩司宋致任內係令各屬捐解俸工為公費自雍正元年奉旨俸工停捐是以前督臣楊宗仁行牌通飭內開己經具摺奏明兼咨明撫臣將州縣所收加一火耗內以三分隨錢糧解司充通省公費所以按錢糧一百兩核算即為火耗三兩解庫辦公臨用時仍報明督撫核允方動每月有月報册送督撫查考又督臣楊宗仁將州縣錢糧加一火耗分派辦公並分給各官養亷除以上陳明將三分解司為公費外蒙撥給一分五釐為藩司坐平所以按錢糧一百兩核算即為火耗一兩五錢係出於各州縣所收加一火耗之內臣未到湖南任時藩司鄭任鑰即如是遵行在前計一年坐平約一萬五千兩臣不敢以此坐平自用有報明督撫辦公事之案可稽辦公之外方為臣養亷至臣凡彈收錢糧皆係令解役當堂親看平針庫官照依部法彈兊實無偏針多取之事臣蒙皇上天恩粉身難報惟有自堅操守矢志惕厲勉圖報效若貪黷營私則臣罪不容誅矣今幸蒙聖恩將摺賞示臣得據實奏明嗣後當愈加謹愼如有欺飾願甘重罪伏乞皇上慈鑒謹奏知道了事之有無真偽全不在章奏之間日久自明也勉為之雍正三年十一月二十九日護理湖南巡撫印務布政使臣朱綱謹奏雍正三年十一月二十二日撫臣王朝恩奉到部文補授內閣學士將印題明照例委臣護理臣隨循例接印視事敬謹護理伏思皇上宵旰勤民因州縣與民最親每加揀選命往期於有益地方臣愚以為應將夲省州縣緊要之缺預為上聞以便部中遇缺揀選至引見時皇上酌量人地相宜補用大有裨益臣查湖南一省所屬州縣內有附近苖猺三十三處舊例俱於夲省現任官員內保題調補嗣經前撫臣趙申喬題明止以二十五缺照例選擇調補餘請歸部選後又於康熙六十一年經九卿會議概歸部選停止題補俱在案臣思湖南州縣通計止六十餘缺苖民雜處者已及其半若在夲省選擇調補未免日事紛更而究屬人才有限自不如悉歸部選為妥但部中不分緊要一例籤掣似不如將緊要各缺部中記檔遇缺揀選引見更為有益又思既蒙揀選發來如能於三年之內克盡厥職者仍準題明領咨赴部引見再請皇上量才升擢似亦鼓勵人才之道臣愚昧無知伏乞皇上睿裁再查除前撫臣趙申喬題明選擇調補之沅陵瀘溪等二十五州縣員缺緊要外尚有乾州同知與鳯凰營通判二缺原因紅苖歸誠而設其駐劄地方逼近苖巢更為緊要現在出缺急須能員料理此時量已部選有人合再陳明恭請皇上睿鑒再現今湖南地方寧謐雨水調勻謹一併奏聞謹奏所奏事宜向新任撫臣布蘭泰詳細説知妥商具奏布蘭泰非比魏廷珍王朝恩一流人也爾共事後自知雍正四年二月十一日湖南布政使臣朱綱謹奏雍正四年正月十八日臣齎摺家人回楚恭捧賜臣硃箋福字並賜撫臣布蘭泰福字撫臣與臣敬接進署各望闕叩頭祗領訖臣仰瞻睿藻輝煌不啻龍飛鳯舞福從天降恩與嵗新臣何人斯獲兹殊恩異數謹鈎摹製扁懸挂頂禮敬將御筆供奉傳為世寶臣更當日夕黽勉時思誠敬不敢少有放縱致負皇上斂福錫民至意謹奏覽爾奏謝己悉俟布蘭泰熟諳地方情形之後朕另有用爾處勉之毋懈同日又奏臣於雍正三年十一月二十二日繕摺請將湖南附近苖猺之緊要州縣嗣後缺出由部揀選引見恭請睿鑒等因具奏於雍正四年正月十八日臣齎摺家人回署恭誦欺隱以致賦役不均及至屆限升科紛紛各以老之舉其弊多端種種難以杜絶惟恐無益於國賦而徒有纍於良民是以撫臣商酌不敢輕議丈量擬多出告示曉諭寬其已往許欺隱之家自首又慮姦猾之輩未必俱肯自首然作弊已久止能瞞官必不能瞞其地鄰今議立限半年若至限滿不量給賞如係挾仇妄報亦治以法期於勸懲並行庶欺隱漸清俟撫臣酌定另摺奏請聖裁臣惟有勉竭駑駘與撫臣同心報效以仰副皇上愛民勤政之至意謹奏督撫兩司果能實心經理一體奉行何事不能辦集耶雍正四年十一月十七日湖南布政使臣朱綱謹奏臣蒙皇上天髙地厚之恩粉身難報不敢不為錢糧起見敬抒一得查湖南錢糧素難徴比臣到任屢行教誡各州縣催科撫字較之從前雖稍知勉勵但七府二直隸州幅􅊷遼濶臣惟恐耳目有所未及該管之知府直隸州其中或尚有徇隱朦混等情臣再四思維惟有調缺之一法可以徹底清釐永絶弊竇仰請皇上準將州縣官三年一調俱於同省隔府之員藩司詳明督撫酌量應調者彼此調缺互相盤查蓋以同在一府之員相調既交好而易以為情復通同而互相容隱其間不無擔代那借移新補舊等弊惟於隔府之員互換任事則利害在己既不同於監盤監查之塞責而知府各顧所屬又不肯代他州他縣之員隱蔽自必徹底清查更請皇上定為考成凡初任之內無虧空者準帶加一級至調缺之後三年無虧空者以應升之缺即用倘初任內有虧空錢糧一百兩以上者降一級二百兩以上者降二級仍準其調缺帶至新任補還方許開復如初任內有虧空三百兩以上者不準調缺即著革職追賠果有循良異等應在行取卓異之列者方不在調缺之內如此則無十年八年之久任交盤之項易清而賞罰之法亦寓庶幾虧空之弊可絶矣臣因錢糧起見冒昧條奏是否有當伏乞皇上睿鑒謹奏此法陡然行之恐致紛擾再行斟酌可耳同日又奏臣近見邸抄內皇上因浙省風俗澆漓特遣專官興行教化敦厚民風甚盛舉也臣查湖南雖係小省而民猺雜處不知禮義風俗之澆殆甚於浙臣思民風之澆漓醇朴全在士子之引誘倡率士習一端民風自厚似宜責成於學臣也但學臣每止以閲文考試為重教官亦不過以訓迪教育為具文是以不見成效臣愚請嗣後學臣任滿時應定舉劾教官之例以示鼓勵將教官內能約束士子實心奉行者具疏特薦如教官內虛應故事以致該學士子有出入衙門多事者將教官參劾究處如此則教官必皆思上進不敢坐視士子之妄為臣又思近日之教官皆係進士舉人出身之員其中豈無人才似可援照保舉州縣引見之例嗣後督撫留心察訪如有真知灼見之教官各保一人令其領咨赴部引見庶學校之中有所觀感奮勉士習日趨於醇而民風亦可漸歸於厚矣臣毫無知識謬獻芻蕘伏乞皇上睿鑒謹奏此不過與學臣開請託賄賂之門為教官啓奔競之途耳殊無益於實政雍正五年正月二十二日湖南布政使臣朱綱謹奏為恭謝天恩事竊臣接到署督臣傅敏牌開部文臣敬誦諭旨前傅敏參奏何錫祿朱綱李渭等一案彼時朕即疑朱綱未必知情故將朱綱暫行留任候審今覽朱綱奏稱此案乃按察使主稿之事其私夾稟帖及託人在部照應之處臣實不知情祈即交署督傅敏嚴究等語此案不必交與巡撫著即交傅敏一一審明具奏該部知道欽此臣跪讀之下感激悚惶難以言喻伏查童石安等展限一案經署督臣傅敏將按察使何錫祿暨臣一併題參在督臣自屬秉公但臣不敢不據實摺奏今恭接諭旨臣摺未到之先已蒙皇上洞察隱微即諒臣未必知情將臣留任暫停處分旋又蒙特恩允臣所請將此案改交督臣一一審明具奏臣犬馬下情先得仰邀聖鑒殊恩異數臣不惟粉身難報亦且筆所難宣隨敬設香案望闕叩頭恭謝現奉督臣調臣前赴湖北質審臣謹遵牌調於正月二十五日前往湖北候訊但長沙至武昌千有餘里往返需時今稟商撫臣將要緊事件逐日令衙署書吏封送沿途辦理其各屬解到錢糧以及支放錢糧之事臣委長沙府知府沈世屏善化縣知縣李夢麟暫代為支收不致貽誤合併奏聞謹奏覽奏已悉朕己用爾為雲南巡撫矣赴湖北明白此事回任交代清楚來京陛見聆朕面諭同日又奏為恭請睿鑒事竊湖南地方自前督臣楊宗仁議定各屬徴收錢糧火耗加一將此加一火耗分派司道府廳州縣各官為養亷以及充公之用惟巡撫衙門毫無養廉撫臣布蘭泰到任之後臣聞將山東布政使衙門所得養亷以為日用諸事亷潔秉公並將門包俱行革除清苦實甚逮至昨年夏秋間撫臣日用無資行牌與臣借取司庫公項耗羡銀二千兩應用臣雖遵牌借給仍於月報册內報明督臣在案聞目今又已用完無可為繼可否乞皇上開恩請於公項耗羡中每季支銀一千兩以為撫臣養廉此等瑣屑之事夲不應瀆奏但耗羡乃係公項不惟臣不敢擅專亦非撫臣可以私用臣謹奏明於君父之前是否可行伏乞皇上批諭臣實係因公起見並非諂媚於撫臣難逃皇上睿鑒謹奏撫臣統領一省需費頗繁每季千金何能敷用前者布蘭泰奏稱將伊家資變賣用度朕甚為嗔責曾經反覆批諭矣爾等撫司養廉當與接任斟酌必令敷用方是似此矯廉沽譽在爾等自為則可朕豈有令封疆大吏枵腹從事之理至於湖南藩司事務此數年來汝己熟諳漆紹文到時將一切地方利弊及汝意中欲行而未暇興舉事件俱一一詳細説知不可遺漏尤不可存私倘日後少有不符則見輕於朕矣其一秉至公毋忽雍正五年三月二十二日湖南布政使今升雲南巡撫臣朱綱謹奏為恭謝天恩事竊臣於雍正五年三月十三日奉到特旨將臣補授雲南巡撫臣聞命自天惶悚無地隨恭設香案望闕叩頭謝恩伏思臣蒙聖祖仁皇帝豢養拔擢由兵部主事歷升至河南按察使恭逢皇上御極臣涓埃未效即於雍正元年五月內蒙特簡湖北藩司到任甫及四月又調補湖南藩司旋因湖北任內解貴州餉銀解官㩦帶鉛法馬一案經部議革職荷蒙聖恩特賜矜全又因湖南童石安等展限臬司何錫祿私夾稟摺一案經督臣將臣一併題參部議一例革職交巡撫提問又蒙皇上明見萬里暫停臣之處分將此案改交督臣審訊今雖審明題覆臣實不知私夾稟摺情由臣之心迹得明然尚有疏忽之咎靜候處分何敢希冀超遷乃恭蒙特恩補授雲南巡撫臣聞命之下惶悚涕零免冠叩首不惟臣粉身難報實屬夢想不及伏思巡撫乃封疆大吏臣膺兹重任時切兢兢所最幸者皇上準臣陛見俟新任布政使漆紹文到任後臣交代明白遵旨赴京恭聆聖訓得有遵循然後赴雲南到任實心任事力圗報效業經撫臣布蘭泰代題謝恩外臣謹將感激愚衷再具摺奏謝天恩謹奏奏詞剴切朕甚欣恱爾來見朕自然備悉但期他日永久毋忘此奏之真誠雍正五年四月二十八日補授雲南巡撫臣朱綱謹奏為據實奏聞事竊查湖南攸縣田糧於雍正四年據委勘官同該縣出結詳稱田土瘠薄不能復則等情經臣轉詳撫臣布蘭泰具題奉部議行令另委賢能道府履勘隨遵照部行分别詳委嶽常道楊晏等往勘令其將攸縣從前丈量田畝弊端細加察訪不得瞻顧原案今據委員等詳稱察得康煕五十八九年間陳溥雖曽丈勘實與襟棍談金聲等串通作弊止有小户報足襟棍大户皆未報實原任攸縣知縣陳溥從前詳報乃係揑飾朦混並將經手之經承書辦姓名詳細開報前來臣思昨年雖曽據結轉詳請題斷不敢不仍行訪察情弊今既經察實若不嚴參究審則欺隱難以清理現已將府縣各官詳請撫臣督臣會疏題參臣又查有茶陵安仁酃縣黔陽辰溪沅陵等處亦俱奉文令道府分勘臣遵即委嶽州府知府尹士份等前往查勘情弊勸諭士民首明欺隱現蒙撫臣會疏題明總之湖南欺隱積弊每以鳴鑼聚衆為挾制官府之具從前督撫惟以姑息為事而地方官遂多縱容隱匿今督臣傅敏撫臣布蘭泰加意整頓庶可漸次清釐合併奏聞謹奏朕近有既往不咎之旨嗣後此事諒易為清理矣雍正五年八月初八日雲南巡撫臣朱綱謹奏為敬陳管見事竊查定例州縣官承審命案以報官之日起扣限六個月承審盜案以獲賊之日起扣限一年均無庸議外惟是奉部查審事件俱以督撫準咨之日起扣限四個月咨題不於州縣奉文之日扣算但思督撫將部文行司由司而府由府而州縣凡附近省城者得以早行接到其路逺州縣由鋪遞轉送到彼竟有遲至二十餘日以及三四十日不等者一屆限滿未覆將州縣不分逺近一例參處並無分别似未為均平可否將州縣離省之逺近分别里數酌定程限各以州縣奉文之日起仍照舊例扣限四個月咨題各省督撫先將州縣里數逺近酌定文到該衙門之程限咨部備案以杜揑飾遲延之弊至行到部文督撫與各該上司俱務於三日之內雙羽飛行不得延緩庶各衙門案件皆上緊辦理而逺近州縣扣限均平不致有偏枯之處矣如或臣言可採伏乞皇上敕部議覆施行謹奏九卿議奏雍正五年九月二十六日雲南巡撫臣朱綱謹奏竊臣以愚陋庸才涓埃未效荷蒙皇上特簡雲南巡撫臣每念邉疆重地難以勝任日夕悚惶所萬幸者到京之後屢蒙召對跪聆聖諭廣大精微開臣之茅塞長臣之識見臣從此有所遵循得以勉勵成人莫非我皇上聖恩之所造就也至臣身在途中無一日不默識聖訓因思臣一到雲南即有會審之事兼之刑名錢榖恐有堆積之案牘急須料理且至彼路逺日久惟恐或有疏漏是以即於途間晝則敬思夜則恭録謹於貴州地方遣家人齎摺恭呈御覽又將臣湖南藩司任內欽奉硃批原摺三件恭繳合併奏明謹奏所録訓旨一摺留中細閲雲南巡撫臣朱綱謹將恭聆皇上聖訓敬録進呈朕前在藩邸深蒙聖祖慈愛嘉豫誠孝然並無希冀登大寶之心及恭荷辦事自朝至夜刻無停息惟以天下大計為重此身有如此殿之涼者想亦感應之理也朕曾蒙聖祖慈訓戒急用忍故殿中扁額即用此四字仍敬書上諭二字於上朕東暖閣扁額取惟仁二字對聮云諸惡不忍作衆善必樂為西暖閣扁額取為君難三字對聮云原以一人治天下不以天下奉一人爾係逺方外吏初來見朕故特諭知之朕簡用爾等督撫第一要留心民瘼如有水旱災荒斷不可粉飾雍正元年山西荒旱巡撫德音隱匿不報朕屢加詢問堅云無災及田文鏡自山西回京將情形密奏朕幾至淚下隨速飭賑濟聞全活災黎不下七八十萬人後田文鏡到河南時值二月無雨田文鏡即具摺奏聞憂民之心備見摺內朕隨於宫中祈禱次日即普得甘霖河南二麥仍然豐收可見誠能感格爾督撫果實心愛民亦自必感召朕厪念民間疾苦每聞有被水之處恐百姓廬舍田禾驟遭水患或致流離失所即發帑金賑濟以恤民艱爾督撫須知未雨綢繆講求水利應疏濬者疏濬應防護者防護消患於未萌使近水民田不致頻被淹沒窮民得以多收籽粒方為仰體懷保斯民之意展虔祀之心曽有一次致祭時正值望雨甚殷祭後甘霖隨降自爾到京朕命爾隨祭二次天氣晴和爾已恭瞻感應矣總之神明之道體物不遺爾等地方官如不敬神明亦恐致水旱之災不可不知勉也朕思治益求治安益求安此言殊有至理惟於治安聖祖睿謨廣運深仁厚澤所致朕何敢不朝乾夕惕仰答於摺內旁注者從前繳回摺子爾看堆積甚多莫不此爾等督撫身任封疆之責朕又豈肯任其貪圗逸樂務宜勉勵為之無為溺職之巡撫有負朕簡用之恩也國家大計所重者莫過於武備朕看漢唐宋以來武備一至廢弛其國事即不可問爾督撫宜留心營伍訓練將辨仍當念兵丁之甘苦察技勇之優劣進止有成法甲械貴整齊火器弓馬皆操演精熟庶有備無患也朕念開墾一事於民最為有益雲南現有開墾事例務須實心奉行即各省中如能將荒地開墾成熟則將來民因其利多有依賴若聽其荒蕪不治民鮮耕種之田野多草萊之地殊負朕愛民之心甚為可惜也州縣自皆知勉勵若百姓愛戴州縣即與愛戴爾督撫無異朕思天下人才甚衆如各省督撫俱得其人知府等皆能仰體同心併力實在愛民期於數年之日修整倉厫經理田畝時與田間父老勸課農桑咨訪問答則不惟民情洞曉即有姦頑亦可感化方不愧為民父母之義也君臣貴一德一心朕從不預先防人之欺有欺飾者民望而畏之鮮有犯者水弱民狎而玩之人多蹈溺足信如教以耕地調理精熟焉有不能耕地之牛又止留心小事便失為政之體若將大事辦理兼留心小事更見周詳有何不可况近閲鄂爾泰所奏督撫母安可不為留心朕謂聖人統言智仁勇乃一貫之義如遇有益於民應行之善政見得透徹即毅然行之則是勇以行其覽同日又奏竊臣蒙皇上殊恩每日得跪依皇上膝前恭聆君師教誨刻腑銘心陛辭之日下情依戀不啻嬰兒之念父母須臾未能去懷也臣至雲南時當與督臣鄂爾泰互相砥礪共矢公忠以期勉圖報效謹先將沿途所見地方情形奏聞臣過直隸地方見秋成皆好米價亦平河南秋成倍好民皆樂業湖廣髙田俱各豐收雖夏間被水之處頗多幸蒙我皇上開恩賑濟又蠲免錢糧一路男婦老幼頌皇上天恩者載道現今督撫查賑撫綏可慰聖懷臣留心問荆襄以至常德米價皆云四川大熟川米已下湖廣目今荆襄米價每石八九錢不等常德府米價更平民心甚安又臣在京時奏請將湖南省城內善化縣裁汰歸併長沙縣一事恭蒙聖諭令臣説與王國棟可行可止斟酌具奏欽此臣已敬述與湖南撫臣王國棟矣伏乞皇上睿鑒謹奏覽所奏自直隸至豫楚一路民情安帖米價平減深慰朕懷幾務偶暇將爾所録訓旨已備閲矣朕因求治心切未免詞句繁多爾能一一記憶不忘足見留心其少有差誤處悉已刪改爾其敬守凜承毋怠雍正五年十月二十四日雲南巡撫臣朱綱謹奏竊臣於十月十七日至雲南省城見督臣鄂爾泰恭請聖安隨將臣在京陛辭時靣奉諭旨敬謹傳述臣又至督臣衙門內恭傳皇上密旨富貴到雲南布政使任時爾與總督鄂爾泰留心看伊居官辦事如何做得外官與否各自據實密奏鄂爾泰已欽遵祗領臣連日以來與督臣議論吏治商酌公事見督臣心純守正識見𢎞逺辦事公忠凡有益陸續陳奏外謹先將到任日期繕摺陳明謹奏覽雍正五年十一月初十日雲南巡撫臣朱綱謹奏竊臣到任後留心檢查案卷知楊名時立心徇隱諸事廢弛臣是以將楊名時姑容茍且溺職等情臚列題參請旨將楊名時革職留滇庶屬員無所瞻顧臣易於訪查清楚並將常德夀違例那移濫借藩庫不清等事皇上密諭富貴到雲南布政使任時爾與總督鄂爾泰留心看伊居官辦事如何做得外官與否各自據實奏臣與富貴共事之日無多然看其為人耿直心地誠實辦事勤謹此臣所可信者但知富貴不識漢字藩司衙門一切批詳文移與錢糧册籍皆係漢字而且頭緒紛繁悉費稽察惟恐日久或被吏胥欺朦致有貽誤則可惜國家之人才矣臣是以據實具皇上聖裁或將富貴內用特簡諳練錢糧之藩司來滇經理則與國計民生均有裨益臣素知趙𢎞恩居官幹練才守兼優近見邸報皇上已授趙𢎞恩為湖北守道但此缺雖屬緊要未如滇藩之重湖北去滇不逺仰懇皇上命趙𢎞恩星馳赴滇署理藩司事務照試俸三年之例如三年內藩庫清楚銀稅銅錫等項皆能籌畫著有成效督撫會題實授則趙𢎞恩自必益加鼓勵而臣與督臣亦皆贊理得人矣謹奏藩司之缺將張允隨補用趙𢎞夲亦係幹練才守兼優之員將伊用為臬司則兩司均得勝任者矣同日又奏竊查臣巡撫衙門從前歷任撫臣俱有護衛敕印隨丁一百名咨明兵部食糧臣因初到滇省諸事未諳隨與督臣面商據鄂爾泰云總督衙門例有隨丁一百名巡撫衙門例應隨丁八十名蓋因邉徼蠻方不比內地此隨丁糧內尚有賞賜俸滿千萬壽聖節羣臣拜祝之時天氣開霽晴明輿情莫不歡忭合併奏聞謹奏覽雍正五年十一月二十日雲南巡撫臣朱綱謹奏十一月十九日自辰刻微雨至申酉之間復下大雪頃刻盈寸臣隨訪問土人咸云康熙六十一年十二月內曾下大雪所以雍正元年年景甚好今又得大雪應時明年麥豆可望豐收等語臣具摺之際正值得雪之時雪尚未止臣謹據實奏聞仰慰聖懷謹奏實慰朕懷恆能以誠敬二字仰迓天庥將見其應如響自無不蒙垂佑之理同日又奏竊臣於十一月初十日將前撫臣楊名時徇隱廢弛並藩庫不清等情題參在案臣查題參之後各屬米穀紛紛報補即庫中借支亦有陸續還項者實因督臣鄂爾泰自臣未到任以前即勒限催補是以漸楚若盡委之楊名時滇南不知到何等情形矣又聞滇南有公件之説臣檢查案卷始知滇南從前私派甚多每年不下三四十萬兩至楊名時到任額定各屬公件銀兩統計通省約十一萬有零照糧均派隨徵完納勒石曉諭禁止加派名曰公件民困較前少蘇楊名時因此亦甚得名但查彼時酌定仍有不均亦不知所留之公件果否悉辦公事臣聞雍正四年督臣鄂爾泰到任實在辦公其康熙六十年正月內楊名時為雲南巡撫以至雍正三年此五年之內每年以十一萬計之應有五十餘萬兩臣愚以為此項並非火耗楊名時雖取名公件未曽奏明與私派無異應將此五年之內各府州縣所得皇上開恩但牽扯多人一時難以驟楚至嗣後如何經理則現有督臣鄂爾泰之摺奏條分縷析開載甚明誠公忠體國之道臣識見淺陋不及督臣逺甚督臣將奏稿開因循玩視有負皇上天髙地厚之恩謹奏覽同日又奏竊臣在京時恭蒙皇上密諭爾往雲南朕未必不尚有别用之處爾家眷且不必同往欽此臣係山東人住居濟南府城因恭奉聖諭馳驛赴任是以由保定府驛路往滇未敢繞道復回山東令家眷在家暫候不必遽赴滇南今臣於十月十八日到任業經照例題報在案不意臣弟朱纘不候臣示聞臣已赴雲南之任竟由東昌取路帶臣家眷同來及臣聞知已離貴州不逺臣輾轉思維若阻令回家則己跋涉數千里往返甚難敬思皇上聖意原係體恤微臣恐致往來盤費隆恩髙厚無所不至為臣子者既有犬馬下情理應奏明不敢隱諱如奉旨别用臣遵旨先行仍不致貽誤伏乞皇上睿鑒謹奏此奏朕欣悅覽之初意原欲命爾暫撫滇省仍另有調用處念長途萬里行李往來跋涉不易故有前諭及爾赴滇之後值西藏有事滇境亦有軍需等務況數處番夷甫經改流巖疆保障正須賢能撫臣協同督臣鄂爾泰料理朕為此頗悔前諭之誤今覽所奏恰合朕意即另用爾他處㩦眷同往亦未嘗不可也實喜慰而批諭焉雍正五年十二月初六日雲南巡撫臣朱綱謹奏竊臣自到任以來先於藩庫倉儲盡心稽查所有藩庫借支等項臣將武職各官之借欠移咨督臣鄂爾泰核酌清補前疏己經題明今又查此項借欠不在恩免之內謹再奏明兹因藩司富貴於十二月初一日病故已經照例題報但藩司員缺緊要且藩庫內頭緒紛繁不清除借欠之外尚有因公動支而楊名時未曽皇上迅賜能員來滇經理庶於國帑有益今督臣會臣檄委鹽道劉業長署理清查俟查明確數具詳到日臣另行題明至通省倉儲臣訪聞存銀未買者頗多臣到任日淺尚未得其詳現在挨次查催買補貯倉飭取倉收備案俟將來取有倉收若干臣具摺奏聞即可知滇南從前倉儲之情形矣如有因循怠玩之員或併銀無存貯者臣查明題參追補伏乞睿鑒謹奏勉力為之大約滇省之吏治及倉榖等項經鄂爾泰料理一番諒皆改觀矣其猶有那移虧空未能遽清之項其中或另有可原之情參處屬員亦不必過於嚴刻此案內止楊名時一人可惡爾此番能不瞻前顧後殊為不負朕所委任朕深為嘉恱前諭甚明其一秉至公審理密之滇省一切案件爾既破靣整飭毫不顧忌同事之人及屬員輩未免少生嫌怨朕不忍令爾居為難之地已有旨調用閩省矣可將參案辦理清楚一面奏聞一面即赴新任到閩後朕另有諭旨同日又奏竊查滇南於十一月十九日得雪臣前於繕摺之際正值得雪之時隨即奏聞今臣於雪晴之後留心訪察雪盈二尺有餘尚有幾及三尺不等之處四野霑足黃童白叟皆以為數十年所未見明年豐收可望春熟無虞臣謹將邉疆得雪黎民歡忭情形再行奏聞謹奏覽得雪情形深慰朕懷雍正六年正月初八日雲南巡撫臣朱綱謹奏竊照奉撥滇兵進藏部文係於雍正五年十二月二十一日接到正值封印之時臣思軍務係督臣専責而運送糧餉乃臣之責任斷不敢少有稽遲隨與督臣逐欵商酌提臣郝玉麟亦於雍正六年正月初一日到省臣同提臣偕至督臣署中並與署藩司劉業長等會同籌畫督臣鄂爾泰分别緩急斟酌輕重主稿定議臣與提臣所見皆同隨經督臣聫名會奏恭請皇上睿裁至開印之後臣仍遵定例由臣衙門主稿與督臣會題請撥協餉以接濟軍需現在藩司各衙門俱己遵照辦理不致有悮至臣才識短淺伏乞皇上密示機宜庶臣得知所遵循實為萬幸謹奏所議甚屬周詳妥協候朕另有交部之旨同日又奏竊臣蒙皇上將山東撫臣塞楞額覆奏之摺發臣密看臣細閲之下知田肇麗年己六十八嵗衰邁病廢臣以為此人不能為國效力皇上置之不問矣及敬誦諭旨塞楞額回奏田肇麗一摺發與爾看田肇麗甚屬可惜但六十八嵗尚不甚老朕不忍棄置命該撫存問調治再看欽此臣再三捧誦仰見我皇上求賢若渴愛惜人材至於如此不但田肇麗粉身摺另封恭繳謹奏朕嘉恱覽之但此乃出於朕之天性非有一毫為汝等見聞感激起見而然也類彼鄙猥作用朕實恥而不為愼毋錯會朕意雍正六年三月初三日雲南巡撫臣朱綱謹奏竊臣於夲年三月初二日接到部文恭奉特旨調用福建巡撫等因欽此臣又先於奏摺內恭奉諭旨可將參案辦理清楚一靣奏聞一靣即赴新任欽此欽遵臣現飭行新任藩司張允隨令其將參案完欠分析查明詳報以便臣遵照上諭勒定限期繕疏題明即將印信交督臣鄂爾泰兼理恭報起程日期前赴閩省新任伏念福建乃海疆重寄兼有臺灣要地關係重大臣聞睿裁謹奏覽同日又奏竊臣於二月初十日恭奉皇上密諭滇省一切案件爾既破面整飭毫不顧忌同事之人及屬員輩未免少生嫌怨朕不忍令爾居為難之地己有旨調用閩省矣可將參案辦理清楚一面奏聞一面即赴新任到閩後朕另有諭旨欽此臣再三捧誦感激涕零臣蒙皇上密諭不敢不行密奏臣自與督臣鄂爾泰共事以來凡於地方公務無一不與鄂爾泰商酌料理惟題參楊名時藩庫借欠不清倉儲虧空未補並臣會據實秉公無一事虛揑楊名時並無可置辨可服天下人心仰恃皇上至聖至明自有睿鑒得以無所顧畏兹復蒙皇上如此體恤雖木石亦應感動何況臣具有心胸豈有不鏤之肺腑不但不敢泄漏上諭且並不敢露一毫形迹於詞色之間也伏乞皇上慈鑒謹奏楊名時明白回奏疏內朕降旨甚明此事即使楊名時無侵冒情弊而其欺詐之罪己甚矣總之爾此番料理甚屬可嘉通盤全是諸臣果能悉如此破面糾擲若輩姦狡伎倆何能展施耶同日又奏竊臣蒙皇上天恩補授滇撫以來所有臣已經題達各案均無庸贅陳外尚有臣與督臣鄂爾泰同心計議雖行而未及奏聞及商酌而未行之事臣謹分析臚列於後伏乞睿鑒查雲南督標五營撫標兩營城守一營舊例每於嵗底兵丁必預借一個月糧餉以為度嵗之需作十個月扣還昨年經臣題參藩庫未清諸欵後署藩司不敢復行預借督臣與臣相商當兹嵗暮之時營兵望餉甚殷雖藩庫錢糧難容借欠而邉疆兵餉亦不可拘泥隨同臣面諭藩司仍照舊例準其預借定於六個月扣還月應領餉銀該中軍官俱從藩庫領出而兵丁實止領餉銀一個月將兩個月餉銀存於中軍署內以備兵丁等一時之那借通融其中不無弊端因又查督標五營與城守一營領餉之例俱係按月向藩庫支領即按月給散衆兵並無預領之事臣思在省八營事同一例理應畫一豈可互異市恩除春季仍照舊例支領外臣咨明督臣諭明將辨自夲年四月為始嗣後在省八營一例領餉按月支放撫標兵丁不得互異有干功令督臣回咨以臣言為是臣標兵丁帖服無詞此臣與督臣商酌而行未及奏查茶山夷猓每多梗化滋事經督臣酌量機宜撫綏擒𠞰又目今提臣前往茶山一帶看視地方情形大約將來留車里宣慰司以為外藩而於茶山或有欺隱三五年後自然清楚不必急遽吹求軍威不可不整要以先聲奪人相機而動庶自兹以往雖無知之苖猓亦莫不在皇上教養化育之中臣之愚志如是此督臣與臣商酌而未行之事一也查滇南公件一事關係通省先經督臣鄂爾泰奏明酌均公件耗羡以昭畫一摺內奉皇上硃批料理甚屬妥協但此歸公銀四萬兩係作何用朕初未解若歸帑項斷不可行如為夲省舊例之公用尚可倘公用有餘各員養亷仍宜加增方為允當欽此臣將楊名時康熙六十年正月內到任起至雍正三年止此五年內所得公件銀五十萬餘兩是否辦公徹底清查等因具奏恭奉皇上硃批此議好應如是欽此督臣自奉到硃批之後即飭司道妥議以事關通省未敢草率至今尚未議妥臣今奉特旨調補福建巡撫不及與督臣會商料理謹將臣所奏情由並臣恭奉皇上硃批俱告知督臣聽督臣斟酌覆奏總之滇南公件一事莫非出於百姓地土之內從公件難以並徵督臣鄂爾泰前奏公件摺內亦聲明及此此臣與督臣商酌而未行之事二也為此具摺奏聞謹奏覽雍正六年三月十二日雲南巡撫臣朱綱謹奏竊臣恭奉特旨著朱綱審理楊名時虧空那移案畢調用福建巡撫欽此臣今已審理明白楊名時無可置辨俱分析勒限詳載夲內不敢再為重敘臣定於三月十五日一靣送印一靣起身赴閩謹據實奏明臣因臨别將海疆事宜與督臣鄂爾泰虛心商論據鄂爾泰云海疆不比內地先要相安然後可以有為須體貼此四字臣云相安之説甚是但須加意理會急遽嚴切固不可謂之相安姑息因循亦不可謂之相安大約外嚴而內寬緩急以相濟聞謹奏春雨應時深慰朕懷雍正六年五月初十日福建巡撫臣朱綱謹奏臣於雍正五年十月十八日到雲南巡撫任於雍正六年三月十五日送印缷事即於是日遵旨赴閩計臣在任以至起行共得養亷銀七千七百兩臣靣問督臣據鄂爾泰云所得養亷銀兩督臣衙門與臣衙門無異臣方敢於收受沾皇上天恩以為犒賞兵辨幕賔束修日用薪水並赴閩盤纒等費此外到任賀禮臣出示嚴禁並未收受不敢一字粉飾於君父之前至臣起行之日滇人焚香送酒欽遵聖諭榮臣之行督臣差家人送臣出境方回皆我皇上天髙地厚之殊恩臣雖肝腦塗地亦難報稱謹將在滇始末據實奏明臣今途次江西南昌府恭進奏摺合併奏聞謹奏覽第一要著以誠格天乃為人受福之基至於處事但以公正二字自律何事不辦集即切勿有心卜度以迎合朕意為務朕意無他惟望卿等諸凡合於是當而已試觀今日用朱綱之道即可知朕用人行政之心也用汝之由信汝之故在他人容或不知汝自當知之朕待封疆大臣不過如此其他微末小吏豈有預蓄意見之理一切秉公為之盡去偏私勉力效法鄂爾泰田文鏡之居心行事朕自能鑒照然秉公除私之道究非一誠字斷不能也直省督撫中將來能及此二人者朕深有望於朱綱王國棟餘則朕不敢期必勉之勉之同日又奏竊臣蒙皇上特簡滇撫伏念聖恩髙厚稍有一得不敢不據實陳奏臣聞滇省從前各衙門有官莊之説因思臣衙門若不先行清楚何以表率通省隨嚴諭該中軍查報據曾長治鄭璉稟覆夲標左右兩營老丁田六百七十畝又新墾田七百五十三畝又墾草地七十七畝安阜園地十二塊計九畝俱係己交租者又有查出麻園圍等草地內淤田尚未收租等因又草場地共八百十五畝俱係割草供應巡撫並兩營將僃各衙門之用以上所開地畝歷任撫臣相沿己久皆未曾將此項清楚查核臣思民間之地尚令首報欺隱豈可撫臣衙門反暗存地畝以開欺隱之端臣己行藩司查議又咨明督臣核查妥酌施行外謹繕摺奏聞伏乞皇上睿鑒謹奏所奏甚屬可嘉然此亦屬細事官莊一項直隸各省雖多寡不等率皆有之近來各提鎮亦有漸次奏出者朕俱令歸公以為營伍之需如撫標督標尤其不可者也同日又奏竊臣蒙皇上特恩簡用每思傾竭愚誠以仰副我皇上愛養民生之意故雖在途中稍有見聞不敢膜視臣前任湖南藩司時聞湖南百姓有溺女之惡俗隨出示曉諭嚴禁以為此風己經革除矣不意臣昨年由湖南沅州至鎮逺今復由鎮逺過武陵至長沙每於旅店遇村莊老嫗臣家下人等問及溺女風俗皆恬然不以為怪詢其忍心害理之由則云貧苦者目前無力養贍稍可度日者又慮及日後嫁奩需費所以女多者於初生時即以勺水斃之鄉風如是復據云衡永寶辰郴靖等處附近苖猺之區較之長嶽常各府屬溺女更甚等語臣謹密奏伏乞皇上特敕湖南撫臣諭令各地方官嚴禁溺女之風務期設法勸懲實心教戒不得虛應故事庶可轉移薄俗保全無限赤子莫非皇上如天好生之聖懷也謹奏湖南此風奏聞者不一而禁約之諭亦不啻至再至三無如習俗相沿猶然如故蓋有司因無關吏治民生之考成而百姓又皆習慣流而不返今若一旦峻法嚴禁恐滋紛擾即或能止其溺能保其不變他術以斃之耶襁褓嬰孩不加意乳養數日即可絶其性命設令嚴察比户不許傷殘一女則凡生産之家先不勝其纍矣蓋地方胥役人等借端恐嚇騙詐必諸弊叢生小道可觀致逺恐泥正此之謂夫治天下之道革其俗不若革其心且令不行禁不止所關匪細凡所欲行者必行欲止者必止方合於民無信不立之道類斯等事須得賢員以為牧令百姓愛之如父母敬之如神明徐徐開導醒悟愚頑興發其怵惕惻隱之心使其秉彝天良油然感動於中將見不禁而自止矣豈可徒以法繩之乎為大臣者識見要廣濶不必在此等小事上諄諄留意器量心思一涉卑淺則大者逺者反致貽悮勉之志之同日又奏竊臣赴閩省之任路由湖南聞桑植保靖二土司皆以改土歸流地方寧謐但額外同知鐵顯祖縱役私派業經撫臣王國棟特疏題參候旨在案而臣有不敢不據實奏明者臣昨年於湖南藩司任內為桑植保靖二土司改土歸流之事與督撫臣商議因一時不得其人見鐵顯祖為人耿直令其探訪土司情形敢於任事無庸懦積習是以臣言其才有可用隨經督臣傅敏主稿定議具摺密奏委鐵顯祖到彼安撫料理後聞其不候副將楊凱同進竟直入土司之內宣布皇仁土民皆羅拜迎接歡呼歸附臣私心快慰今忽聞鐵顯祖有縱役科斂之事是臣無知人之明謹將始末奏明恭候處分臣心始安臣更有密為奏聞者臣見滇南凡改土歸流與用人用兵等事督臣鄂爾泰皆議給養亷豐其賞犒今聞副將楊凱同知鐵顯祖皆未給與絲毫養亷臣聞督臣邁柱撫臣王國棟皆公忠為國但俱係初蒞楚中臣謹密奏皇上恭請睿裁敕諭該督撫會同議定副將與同知之養亷庶可以善後垂久伏乞皇上睿鑒謹奏用人如何能保其始終如一至於操守尤為難信必須時加訪察而後可深悉也此一著切記不可被屬員之所欺誑所奏知道了雍正六年六月初七日福建巡撫臣朱綱謹奏竊臣於六月初二日抵閩省到任受印伊始一切錢穀兵刑事件未及周知容臣愼細查閲分别應題應奏陸續上聞外惟是臣抵閩以來留心訪察年景收成分數約八九十分不等福州延平一帶五月以來少雨臣入境之時地方官正在祈禱於五月二十八日得大雨於六月初二日又得細雨臣一路見禾苗滋長可卜豐收但聞民間疫氣尚未全消皆由湖南江西傳染臣伏思皇上垂念民艱於災祥感召之理教誨臣工周詳諄切臣仰遵聖訓不敢壅於上聞謹奏汝到閩省若仍係去年見朕時之心志毫不改移則上天之垂佑雨㿩之時若朕可為汝力保也同日又奏竊臣於六月初二日抵閩到任照例題報在案尚有應奏請諭旨遵行者督臣髙其倬將鹽務印篆委員齎送到臣臣隨恭設香案望闕叩頭謝恩凜遵諭旨竭力盡心協同辦理外伏查閩省鹽政印信原係在督臣衙門其一切鹺務俱督臣主稿會同撫臣聨銜施行蓋以印信在彼掌管例應如是也臣現印信在督臣衙門少存推諉之見但外吏情形臣知之頗悉凡掌印主稿衙門一切案卷書吏俱在臣掌管主稿臣聨銜協同辦理或交臣掌管主稿督臣聨銜協同辦理之處臣不敢不備細奏明泰請皇上批示遵行謹奏覽雍正六年七月初六日福建巡撫臣朱綱謹奏竊查臺灣一郡孤懸海外民夷雜處最為緊要之區臣到任以來時刻留心體訪彼地年景聞昨年十分收成榖價平賤今嵗雨水調勻民皆樂業適值原任臺灣道今升山東按察使吳昌祚赴任過省臣細問臺灣吏治民生據吳昌祚極稱有臺灣府經歷左懋源才能操守實屬賢員在臺七載實心效力等語臣雖未見其人但吳昌祚力稟如是自必有深知確見伏思我皇上屢頒諭旨用人惟賢原不在官之崇卑左懋源如果堪任使似應及鋒而用何忍使賢能之員在臺灣效力七載竟壅於上聞臣謹將左懋源送部引見俟其到省時臣再面詢臺灣民情土俗緩急事宜看其應對如何出具考語送部另行奏聞臣未敢擅便伏乞皇上睿鑒批示施行謹奏如此方是己諭部調令來京引見朕審觀其人量加擢用同日又奏竊查設立先農壇舉行耕藉典禮一案先於雍正四年九月內奉旨通行直隸各省轉行所屬欽遵守土各官無不凛遵諭旨選擇潔淨豐腴之地建壇置田照例舉行嗣於雍正五年六月內又奉部文令各省宜擇東郊官地之潔淨豐腴者立為藉田田後建立先農壇等因閩省州縣等官以為前此己建之壇已置之田非在東郊者悉應改歸東郊但地利各有不同勢難畫一向臣靣稟臣查閩省係山海交錯之區各屬非依於山即濵於海各州縣之藉田不能不各因地制宜若以已成者改置東郊勢須拆彼移此不惟徒多耗費兼恐各州縣中有東郊無潔淨豐腴之處者強之使行潦草塞責反致褻瀆臣愚以為凡已建之壇已置之田可以聽從其便屆期虔誠恭敬實心奉行似可不必拘泥定在東郊也臣識見淺陋未知是否有當伏乞皇上睿鑒指示施行謹奏鑿定東郊乃部臣拘泥之見膠柱鼓瑟殊覺可笑爾所奏甚是己有旨諭部矣不必改置候旨到遵行爾參喬學尹一摺於未到以前朕己有旨所奏與朕意暗合如此秉公據實可嘉之至摺留中同日又奏竊惟雨水情形米糧價值有關小民生計常厪聖懷臣時刻仰體不敢少有怠忽伏查各屬米價如福州建寧興化等府屬每石一兩一二錢不等泉州漳州延平等府屬每石一兩三四錢不等邵武府福寧州每石一兩零不等汀州府屬每石一兩五錢不等臺灣府屬每石一兩二錢不等至各屬晴雨不一其漳汀二府屬並臺灣府俱報雨水霑足惟福興泉三府及延建邵福寧州所屬地方雖亦有雨尚未透足臣同督臣髙其倬將軍臣蔡良率領各官虔誠祈禱於七月初三日夜間得大雨至五鼓方止民情少慰隨訪之土人咸謂雨尚不敷如初十日以內再得透雨晚稻可望有收等語大約低田俱好髙坡沿山之田恐分數少減臣謹將目下情形據實先行奏聞謹奏命爾巡撫福建想上天必賜應時甘霖也専待霑足之喜報雍正六年七月十六日福建巡撫臣朱綱謹奏竊臣到任後於七月初八日據臺灣縣知縣張廷琰報稱遵檄已將鳯山縣印信臺灣府印信暨該府所護臺灣道印信俱己摘取封貯縣庫等情到臣隨檢查案卷緣臺屬鳯山縣有民人寥考身死一案覆參限滿未據審解經按察司將承審參展限滿遲延不結之鳯山縣知縣蕭震臺灣府知府俞存仁該按察使喬學尹職名開報前撫臣常賚於雍正六年五月十五日具夲題參並行布按二司摘印委署參夲內聲明按察司似可邀免其道府大員或應摘印或不應摘印竟未聲明臣又查案據常賚以臺灣地方緊要知府一官全府資其統理該府又現護道一經摘印乏員彈壓會同督臣於五月二十六日一靣分檄兩司暫緩摘印候部覆到日委署一靣咨明吏部在案計前此所行摘印之文與後此咨明免摘印之文相去已十有二日臺灣孤懸海外摘印免摘竟成兒戲臣私心不勝悚惕因臺灣緊要之區隨即一面飛檄徑飭臺灣府俞存仁開印管理一面徑飭原奉委摘印之知縣張廷琰遵照以便其交還府道印信去後臣思臺灣逺隔海洋民情狡悍異常如遇有臺屬府道應劾參之事自應先籌畫接管彈壓之員庶免貽悮何得於具疏題參十二日之後始計及臺郡緊要續行布按二司暫緩摘印詎知按察使喬學尹又復遲延玩視以皇上睿鑒謹奏所奏知道了常賚喬學尹若非如此行為何至於此極耶正所謂自作孽之輩可憐之人也同日又奏竊閩省入夏以來早稻俱已收穫以及米價雨澤情形臣先於七月初六日繕摺奏聞但晚稻尚在望雨臣留心細訪聞各府州俱已得雨低田悉已栽插可保無虞惟山田未得霑足七月十二十三兩夜省城附近一帶地方又得大雨訪之土人僉謂此雨己遲且不能遍及低田自好山田收成大約歉薄又泉州府屬多種地瓜名曰番薯以此為窮民糊口之計種稻者少聞瓜苗多被旱損福清縣地方田少園多亦種番薯以為糧食且係沙地無水道相通亦有旱傷臣現在飛檄通查如有應行賑恤臣自當據實題報至於省城米價現在不至騰貴地方安靜惟是福建乃邊海要區臣通盤打算一嵗錢糧即使全完止可敷一嵗兵餉現今各屬因雨澤愆期未免徵輸不全倘有成災之處勢必照例緩徵查兵餉乃計口授食之需豈能緩待此等甚關緊要之事臣不敢不深思逺慮先行密奏恭請睿裁伏乞敕部預撥别省協餉銀二三十萬兩解閩存貯庶幾有備無患即或目前不用留為將來緩急之防甚有裨益但請撥協餉必須具題臣不敢冒昧遽行謹據實奏聞伏候睿鑒批示遵行臣現患脅瘡不能親寫奏摺係託親信之人代寫合并奏明謹奏該部議奏雍正六年八月初一日福建巡撫臣朱綱謹奏竊閩省自六月以來雨澤情形經臣兩次奏聞伏念我皇上最重民瘼於受旱之處地方官必須早為籌畫臣何敢不時刻留心隨又通檄行查幸而延建邵汀漳興六府並福寧州俱已得雨霑足至於臺灣府屬雨澤調勻更勝內地惟福泉兩府屬雖報得雨但未普遍髙田俱未霑足臣現在飭查撫恤隨據泉州府知府劉而位稟稱泉郡之晉江惠安地方久乏雨澤地瓜亦少暢發雖曾有臺浙米穀可應急需然户口繁多恐難遍周現今厦門時有臺郡及外省商販米艘至境請發銀一萬兩卑府親往買米存貯以備將來平價糶賣等語臣查泉郡雨水未足收成歉薄將來米價不無騰貴事關民食該府請發銀買米存貯備糶誠屬有益臣一面飭行藩司即於存庫項內動銀一萬兩發給乘此商販米艘雲集之候作速買貯以備將來平糶俟糶竣仍將價銀歸還庫項臣謹先將泉州府情形奏聞伏乞皇上睿鑒謹奏料理甚屬合宜雍正六年八月初八日福建巡撫臣朱綱謹奏竊查閩省雨澤情形經臣屢次奏聞但自入七月以來省城附近之州縣甚旱雖間有微雨總屬無益現據閩縣侯官福清閩清長樂等縣報稱雨水不足其己種者近溪通泉之處尚有水滋潤其餘赤地旱久苗多枯稿未種者土燥不能栽插等語臣現飭查勘確實被旱情形隨後照例題報外合先奏聞至於現今米價幸不騰貴軍民俱各相安若有應設法撫恤平糶濟民之處臣自當一面酌行再為摺奏合併聲明謹奏據實直奏毫不諱飾可嘉已有旨截漕運閩令爾等會商辦理矣同日又奏竊臣據新任布政使趙國麟册報閩省公捐俸工一項為津貼修造戰船工料等項之需等因到臣查前任布政使秦國龍等公議情願公捐協助共銀二萬四千餘兩具詳前任督撫批允準行在案竊思修造戰船等項公務原係必須辦應之事業經歷任相沿臣請將閩省捐解俸工仍循其舊愚昧之見是否可行伏乞皇上睿鑒批示遵行謹奏所奏已交發怡親王暨部臣等密議奏覆今將朕諭部議之摺一併發爾看明遵照施行雍正六年八月初十日福建巡撫臣朱綱謹奏為恭謝天恩事臣齎摺家人回閩蒙皇上賜臣紗四聯扇二匣磁器一匣到臣臣隨出郊迎接恭設香案望闕叩首祗領訖伏念臣謬膺重職疊沐殊恩感寵渥之頻加愧涓埃之莫報自公退食每懷報稱之難爾室捫心日凛冰淵之戒敬瞻君賜益勵臣衷臣謹繕摺恭謝天恩謹奏覽奏謝已悉嗣後奏摺應愼密者親書其餘俱可令人代寫不必逐件耗費精力聞爾瘡已痊愈深為慰恱雍正六年九月初八日福建巡撫臣朱綱謹奏竊臣由滇赴閩一路受暑甚重以致兩脅生瘡不能親繕奏摺經臣摺內聲明嗣醫治既痊又經奏明今忽於八月十五後左背上又生一瘡日加赤腫現令醫人看治據云無妨連日以來勢亦漸收凡臣衙門應行事宜仍逐日辦理並無貽誤臣自覺精神亦好但臣奉旨會同欽差西柱審理周鍾瑄一案計欽差到閩之時臣萬難會審謹將犬馬下情繕摺敬奏跪懇皇上俯賜矜憐賞給臣假調理或此摺未回之日臣瘡症已愈臣即當秉公會審不敢拘泥統乞皇上慈鑒批示遵行謹奏須加意調養不可勉強支持况此案審鞫頗難非用精神料理何能妥確西柱係間散之員便羈遲數日無妨俟爾全愈精力復元之時再行遵旨料理可也硃批諭旨卷三十三
