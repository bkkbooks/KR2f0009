body:
  text: 欽定四庫全書硃批諭㫖巻一百七十八硃批徳明奏摺雍正四年十二月二十八日山西巡撫臣徳明謹奏為奏聞事臣遵㫖於十二月初八日自京起程於十六日入山西境至二十日抵太原府巡撫衙門到任經臣先後具䟽題報在案臣自入境後沿途過平定壽陽樂平盂縣榆次太原陽曲各州縣地方留心體看俱得雪九訓㫖事宜容臣次第詳晰確查具奏請㫖遵行外所有臣入境後查訪地方得雪米價平減縁由理合繕摺奏聞以慰聖懐謹奏爾此奏不但不能慰朕徒煩朕心摺内定獲豐收米價甚賤二語殊無足取朕以為爾知朕意赴任後必能仰副所以甚為晉省寛懐今覽初次奏摺光景殊不能體朕之意矣奈何雍正五年正月十九日山西巡撫臣徳明謹奏為欽䝉聖訓恭謝天恩事竊臣標把總齎回臣奏地方得雪米穀時價一摺䝉皇上硃批誡訓周詳深切臣跪讀之下惶悚無地伏念臣愚昧無知於到任之初不能仰慰聖懐乃以矜誇放縱之言附入奏摺煩瀆聖心臣實愧悚之至今䝉皇上天恩誡訓諄諄臣惟有欽遵訓㫖兢兢業業實心任事以期仰副聖主諄切教訓之隆恩所有奉到硃批理合恭繳謹奏一切處不可率易遇好境不可肆志但以敬慎二字處之無往而不是矣同日又奏為奏聞事竊臣欽遵面奉守法於地方尚屬有益之官所有㣲臣察訪過縁由理合繕摺恭奏仰祈皇上睿鑒謹奏謝王寵不失為端方正直之人若不迂腐則甚可任用雍正五年二月十三日山西巡撫臣徳明謹奏為奏聞事竊晉省錢文一事臣於湯山行宮面奉上諭令臣將民間廢銅多多收買設局鼓鑄試看欽此欽遵臣到任之後即查各州縣收過廢銅數目止據祁縣等五十九州縣共收過廢銅三千四百三十斤四兩共收過小錢計重九千四百三十一斤臣恐地方官奉行不力以致民間觀望遷延藏匿聞謹奏固不宜懈亦不宜急凡事如此方為得中同日又奏為奏聞事竊臣到任後查原任兵部武選司員外郎崔致逺係曲沃縣人嗣曲沃縣知縣葉華晫到省臣即問該知縣聞崔致逺在籍甚不安分從前曾約束訓飭他沒有隨據葉華晫回稱崔致逺居鄉人皆説他不安分但無確實款蹟前任總督伊都立曾令知縣查過等語臣即諭知縣葉華晫崔致逺在地方上不安分不可給他體面即出示嚴行約束不時差人訓飭不許他在地方上妄行多事臣亦時加嚴飭外理合繕摺恭奏伏祈皇上睿鑒謹奏觀此則葉華晫必有科甲年誼所以彼此互相袒護如葉華晫果係沽名釣譽取媚紳衿之員則當一體㕘處既據鄉人僉有不安分之語豈竟毫無確據此等巧詞只可朦混伊都立徳明等巡撫耳設云崔致逺居鄉安靜守分反為近理可信若似此不即不離依違兩可之語朕前如何行得縱該縣不肯秉公據實直言爾等豈再無訪聞之術耶此奏甚屬不合同日又奏為恭繳硃批事雍正五年二月初二日奉皇上硃批訓㫖臣跪讀之下感激涕零竊臣至愚至陋荷䝉聖恩特授巡撫重任臣雖事事實心加謹辦理每多失於粗率時切惶悚今䝉皇上訓諭敬慎二字實居官行事之寶鑑臣銘心鏤骨永逺遵守刻刻以敬慎二字存心行事庶將來獲免過愆皆荷皇上洪恩教訓矜全之所賜也謹將奉到硃批原摺恭繳伏祈睿鑒謹奏教訓何惜矜全莫望凡事須還朕一是字方可雍正五年閏三月初七日山西巡撫臣徳明謹奏為奏聞事竊臣前奏沁水縣店家㢘崇照代吳竒明赴縣遞呈一案續據沁水縣報稱選差的役押同店家追至翼城縣地方拘獲原具呈人該縣訊據供稱實名李亨榮係臨汾縣學生員又追獲同行人田帝簡該縣小心看守按時給以飯食李亨榮堅執不食此二犯該縣現在起解赴省尚未解到又據臣差千總前赴臨汾縣拏獲李明端併田帝育之父田自香趙學朱之弟趙學鼒押解到省又據臣差守備前赴直隸任縣拏獲張文斗張禄紫張弄戈張文標段竒劉起鳳周有懐田帝育在各家細細搜檢竝無簿籍等物惟張文斗家内搜出長鎗一杆腰刀一口又赴南和縣拏獲趙學朱稟報到臣是案内要犯巳經就獲俟押解到日臣即審明虛實另奏外所有獲犯緣由理合先行奏聞謹奏李亨榮始初尚欲投案作證今經就獲而反不食難解其意矣總之審明自得真情亟當細心研究不可寃抑無辜至追獲此案之捕役人等宜重賞以示鼓勵雍正五年閏三月十二日山西巡撫臣徳明謹奏為奏聞事竊臣屬太原府地方於本年閏三月初二日得雨一寸有餘初三日得雨二寸有餘初七日得雨三田俱巳播種理合繕摺恭原臣現在究審合併奏明伏乞皇上睿鑒謹奏知道了硃批諭㫖巻一百七十八
