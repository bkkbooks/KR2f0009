body:
  text: 欽定四庫全書硃批諭㫖巻八十五硃批張元佐奏摺雍正三年五月二十五日四川川北總兵官署理松潘總兵官印務臣張元佐謹奏為恭謝天恩事雍正三年五月初一日承准督臣年羮堯照會内開為請㫖事准兵部咨稱雍正三年三月初九日議政王大臣議覆條奏内地闗繋𦂳要官兵不可裁汰一疏於雍正三年三月二十三日題本月二十五日奉㫖張元佐著補授四川川北總兵官仍署理松潘總兵官印務李如栢著署川北總兵官印務欽此等因照會到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣邊鄙武夫才疎質陋隨師軍前愧無寸報蒙我皇上隆恩擢補陜西洮岷副將復奉恩㫖署理松潘總兵官印務臣遵即抵松署事自慚蚊負時切冰兢臣雖署事總兵而職任副將亦未敢具摺奏謝兹䝉聖恩授臣總兵官臣聞命自天感激無地除欽遵任事仍署理外臣惟有矢竭駑駘盡心盡力仰荅高厚於萬一耳為此繕摺奏謝伏乞睿鑒謹奏聞汝居官為人俱好愈勉公忠莫負朕之任用雍正三年六月初一日四川川北總兵官署理松潘總兵官印務臣張元佐謹奏為微臣戀主情殷恭請陛見事竊臣叨䝉聖恩補授川北總兵官仍署理松潘鎮印務接任署事仰頼我皇上徳威逺布内外寧謐川北雖屬重鎮猶在腹裏而松潘内環番居外住夷牧誠極邊重地所闗𦂳要臣智識短淺受兹鉅任實切悚惶仰懇聖主俯鑒下誠准臣赴京陛見俾得仰覲天顔恭聆聖訓庶巖疆事務有所遵循而孺慕之懐亦得以少伸矣臣不勝懇切待命之至伏乞睿鑒施行謹奏事事悉依岳鍾琪指授而行於周瑛回任時具摺請㫖可也雍正四年正月十九日四川松潘總兵官臣張元佐謹奏為恭請聖安事竊臣前具恭請陛見一摺奉有硃批臣自受命以來宣布皇上徳威地方寧謐獨是松潘夷番雜處為蜀西重鎮臣識淺才疎蚊負是懼臣惟期具摺懇恩俞允趨赴闕廷跪聆聖訓庶㡬臣有所遵循而犬馬戀主之心亦得少慰但臣因近奉部文内開奉㫖四川松潘口外各番著張元佐前往料理務使千里邊疆歸順之畨人俱得安生樂業欽此等因到臣臣欽遵擬於本年三月内出口料理俟起程之日另疏題報是以不敢遽請陛見臣寸衷鬱結寤寐難安謹冒昧繕摺恭請聖安伏乞睿鑒施行謹奏陛見之行聽候朕㫖不必再三凟請所奏知道了勉力為之雍正四年九月初三日四川松潘總兵官臣張元佐謹奏為奏聞事竊臣所屬漳臘營管轄祈命之黒思漫寨番民爭壩他等五人於雍正三年九月内出黄勝闗口外貿易被竹浪所管之哈納撤賊夷刦殺據漳臘營遊擊邱名揚稟報前來臣即咨商副都統臣達鼐作何查追去後嗣准咨覆希於㕘將遊擊内速派一員帶領有名漢番人役於六月二十以内至公厄爾克代青處所會同本副都統派委來員秉公嚴查剖斷等語臣隨行委遊撃邱名揚前往會查兹據該遊撃呈報卑職隨帶官兵五十二員名於六月初十日起程前至公厄爾克代青營上等候多日未見副都統達鼐差員前來於本年六月二十七日接奉本鎮令牌發到卑職陞任雲南普威營叅將劄票會查事宜著交隨帶之千把總張興林湯義羮在彼完結卑職於六月二十九日自公厄爾克代青營上起程先遣通事等十名押解䭾子前行卑職在後約行三十里至姜墮地方突出賊畨數十餘人執械攔路邀截將前行馱子馬匹等項盡行刦搶卑職星率目兵馳至姜墮地方追捕而賊畨業巳逺遁因劄票限期屆廹不敢緩延是以回漳交代起程赴任理合稟報等情臣據報一面檄行該營確查係何處賊番一面揀差能幹兵役前往口外躧捕賊蹤在案今據差役馬應等捉獲賊番絨孝等二名當即審訊據供實係下郭羅克賊番喀頼林噶布為首率領賊番四十二人刦奪是實臣即撰冩夷信揀差幹役前往著落上中郭羅克土目旦増拆旺他等務擒賊犯追賠搶去馬匹物件倘番性愚頑未肯實力奉行臣酌調鎮屬土兵揀差能幹外委撫夷統領前徃擒拏賊犯俟擒拏至日照番例完結外為此繕摺奏聞伏乞睿鑒施行謹奏據奏所事與内地强盜行刦相同耳然此風豈宜使其滋長但亦不可渉於多事邀功凡百總聽岳鍾琪指示而行母違雍正四年九月二十二日四川松潘總兵官臣張元佐謹奏為奏聞事竊查漳臘營遊擊邱名揚於姜墮地方被賊番刦奪䭾子馬匹一事臣當即揀差通事馬應等捉獲賊番絨孝等二名並差幹役前往口外著落上中郭羅克土目旦増等曉以利害勒獻賊首追取馬匹物件去後兹據該差袁受等於九月二十日回松稟稱查前刦奪馱子馬匹實係下郭羅克賊番當據土目旦増等供稱搶刦各物為首賊番絨孝等二名巳經拏獲其賊番喀頼林噶布與為從賊番聞賊首絨孝等既被擒拏遂各棄贓逃避將搶刦馬匹物件盡數追出収領回松等情到臣臣生長松潘稍知夷情荷䝉皇恩簡拔重鎮受事以來惟有仰體我皇上如天之徳撫綏彈壓力圖安靜但查下郭羅克番人不務耕種專以搶奪為事且伊等住牧去内地甚遠鞭長莫及至於刦去馬匹物件巳經追出賊首既擒惟賊番喀頼林噶布與為從賊番尚未盡獲以臣愚見莫若先將捉獲賊首絨孝等二名梟斬首級傳示下郭羅克地方土目牌番宣布天威使知畏懼外應否俟明歲青草茂盛之時調集鎮屬漢土官兵臣親身統領前往嚴加𠞰洗誅其首惡分㪚其勢庶内外肅清一勞永逸矣為此具摺奏請伏候聖裁批示遵行謹奏此事與岳鍾琪商計妥協具摺奏請候朕酌定雍正七年五月初九日四川松潘總兵官臣張元佐謹奏為恭謝天恩事竊臣邊地庸材叨䝉聖恩簡用總兵莅任四載毫無報稱寤寐兢惕自覺難安今奉督臣岳鍾琪密飭整頓鎮屬馬歩兵丁一千名聽候調遣並令臣預備一切軍裝器械俟至期行知等因奉此臣不勝歡忭踴躍斯正臣報效聖主少酬涓埃之日是以製辦齊全候期起程繼奉督臣令諭速遣妥差星至西安請領皇賞銀兩臣遵即揀差星馳前往於本年五月初八日領到聖恩賞給銀五千兩臣望闕叩頭謝恩祗領訖伏念臣受恩深重邊廷效力係臣職分之常乃䝉聖主施恩格外特賜帑金顧高厚之難酬彌感激而自奮惟有殫心營務䇿勵戎行以仰報隆恩於萬一而巳為此繕摺奏謝伏祈皇上睿鑒謹奏是役乃朕不得已而為之舉經密與大將軍岳鍾琪熟籌審計數年矣汝到肅後自知至於選派將領悉係鎮協中優等人材揀擇兵丁率皆行伍中出格精壯殊非草草從事汝今起程前往須將馬馱裹帶等項一一製辦停妥惟望汝等同心合力戒驕戒懦鼓勇向前感䝉蒼穹慈佑早建功勲速奏凱旋之歌上以慰聖祖在天之靈次以釋朕躬宵旰之懐君臣歡然相見再邀朕格外之恩可也勉之勉之硃批諭㫖卷八十五
