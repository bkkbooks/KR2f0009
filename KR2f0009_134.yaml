body:
  text: 欽定四庫全書硃批諭㫖卷一百三十四硃批焦祈年奏摺雍正八年十月初九日廣東觀風整俗使臣焦祈年謹奏為感荷聖恩敬陳下悃仰懇睿鑒事竊臣一介庸愚䝉皇上天恩疊加擢用授為廣東觀風整俗使臣何人斯受恩優渥清夜自思捐糜未報兹復䝉天恩命大學士公臣馬爾賽等寄信責臣令臣恪遵聖訓毋負皇上深加任用之至意臣捧讀之下愧感交集銘心鏤骨夙夜服膺若此後稍有懈志稍有罔念不但仰負聖主顧復之隆恩罪固難逭亦斷不能自容於髙天厚地之中幸逃鑒觀之譴責也惟有冰兢自矢時時以虛公存心和衷濟事以期仰酬聖恩於萬一耳所有微臣感激下悃謹繕摺陳奏伏乞皇上睿鑒謹奏空言無益實力遵承見之於行事方好同日又奏為酌修塘汛之費仰懇睿鑒事竊查廣東各營塘汛設有兵房煙墩炮臺所以保障地方安辨兵而資守望但每經風雨損壞不無坍塌則修葺之舉自不容緩查此項修葺之費例無開銷間有一二州縣捐修者大抵皆派之里民邇來州縣中之私派等弊嚴行革除只此修理塘汛一項尚不免派纍殊違我皇上愛兵愛民多方蠲恤之至意以臣愚見合無將廣東辭謝每年約正值月之廪餼銀兩均勻酌給令督撫提鎮各飭該汛辨㑹同該地方官詳查估計修葺堅固定以年限按期修整其邊海處所風信靡常易至損壞者不在限年修理之列文武該管上司嚴加核查如有仍前廢弛等弊及該管官不行揭報并加參處如此則汛房墩臺在在整頓辨兵之防禦得所民間毫無擾纍矣是否可採伏祈皇上睿鑒施行謹奏此當言之該督撫者辭謝廪餼銀兩為數幾何焉能敷用似此沽譽之舉少不慎密悔吝隨之矣志之莫貽後憾雍正九年三月初一日廣東觀風整俗使臣焦祈年謹奏為密奏事竊臣准督臣郝玉麟咨開准部議該督將東省硝斤欲召募殷商雇工設爐採買鹽土淋煎磺斤將鉛沙用罐熬煎庶免鄰省挽運不致腳價繁多等語但硝磺等項軍務必需關係綦重若召商設爐煎熬不便據咨遽議應令該督具題到日再議等因臣不揣冒昧竊以為東省硝磺向在廣西湖廣地方採買久有成例今督臣籌及腳價繁多飭行查議據詳欲於廣州小東門外設爐五十口募商雇工給價採買鹽土淋煎硝斤以供營伍之用非不便易第每爐一口需用工匠十餘人計爐五十口約用五百餘人又加以挑運鹽土絡繹往來總計不下千餘人此內恐未必皆係土著良民人多則易於滋事類雜尤易於藏姦雖委員督理稽查保無有貽害地方之處至於磺斤又云據廣韶二府詳稱仁化等處現出鉛砂若用罐熬煎亦易成省力因欲委員前至該地動給公用銀兩雇募煙民煎取陸續運歸官局夫仁化一帶地方與湖廣廣西接壤民猺雜處最易藏姦今若令煎磺之輩屯聚其中則日聚日多勢必有外來流匪影借潛藏勾引不法等弊不止於干礙民間田園廬墓而已又督臣慮及從前奉差員役或額外夾帶沿途私賣若本省就近熬煎較之外省買運諸弊可杜臣以為鄰境採買人員縱有不肖營私其弊猶易杜絶如本地開煎或兵役交通或姦徒接運外省私販皆得乘機盜買分往各處售賣而附近猺狼匪徒亦難保其無偷買私製火藥為害地方之處查從前原設有硝爐五十座因姦商販賣無忌接濟盜賊是以康熙二十四年間奉准部文行令禁止在案是當日停煎已熟悉其情形則今日議開不可不預籌其利害以臣愚見仍照舊例向鄰省採運為便為此密摺陳奏伏祈皇上睿鑒施行謹奏户部密議具奏雍正九年六月二十九日廣東觀風整俗使臣焦祈年謹奏為密奏事竊臣查潮州府之饒平縣地處東偏與福省之詔安縣緊接負山帶海宵小易於潛蹤臣蒞任後見該縣竊劫之案纍纍幾經嚴飭加意巡防多方屣緝臣訪得有詔安縣窩棍黃五舍者倚恃世族慣藏姦匪勾通饒邑之武舉俞猊狼狽作姦凡有竊劫多攜贓遁至福省銷賣驟難弋獲更交結吏役練捕人等每遇事輒通同隱缷實為地方積棍為害鄰境匪淺查俞猊巳於鄭汝式等案內因窩藏盜牛賊犯現經革去武舉枷責發落在案而隔屬之黃五舍經移明福省地方官嚴行查究去後及臣親至饒平之黃岡細加訪察竝密詢黃岡副將焦應林據云迄今仍然窩匪作姦似此以清盜源以靖地方者也謹據實密奏伏祈皇上睿鑒施行謹奏諭劉世明阿爾賽趙國麟汝等職任封疆平時閉塞耳目並不留心察緝匪類及至鄰省移咨照㑹又不盡力查究未知汝等是何心行具何面皮也今接朕諭若復漠視不加意訪究懲治或從而粉飾欺隱及反行開脫亦任汝等為之耳同日又奏為密奏事竊廣東各處山場歷有礦徒聚族私挖屢奉諭㫖查禁年來該地文武官辨欽遵奉行漸次寧謐臣前於本年春間訪聞惠州府和平縣有礦徒八十餘人欲往湖廣之桂東縣刨礦臣以聚衆越境恐滋事端當即咨㑹督撫並飭該地方文武嚴查分别發落押解管束在案又訪聞廣西梧州府懷集縣地方礦場現在開採聚集人衆至於數千臣以懷集地方與廣東山連水接礦徒趨利如騖恐致越境潛往當經咨㑹督撫並密飭各該地方文武官辨於兩廣水陸隘口處所嚴行查察亦在案今臣於五月二十一日旋臣駐劄衙門接到督撫密咨內開大學士奉㫖寄信湖廣桂東等處停止採礦著廣東督撫查禁越境礦徒毋使流散生事仰見我皇上睿慮周詳防微杜漸當經密飭嚴查多方曉諭謹將從前訪聞查禁之處據實具奏以仰慰皇上寧人息事之至意謹奏覽粵東礦厰除嚴禁之外無二議也實力訪察禁約毋懈倘地方有司有貪利故縱者當嚴參示警至於鄰省開採之處無依小民偶或越境謀食又當一論該省之不宜開採蓋緣米價昻貴盜案每繁之故不然何疏於湖廣廣西而獨嚴於粵東耶將此意隨便令粵省官民知之假使粵東民俗一旦捨末趨本盡力耕耘至米糧充盈盜風寢息時礦沙乃天地自然之利亦何靳而不令為之也若以目前土俗人情而欲望開礦謀食斷不允行者同日又奏為據實密奏事竊臣蒙皇上天恩優渥疊加擢用前曾於恭請聖諭之日跪聆天語諄諄以廣東從前樹黨積習諭臣嗣於雍正八年十月初八日欽奉上諭厪念粵東文武不和令臣留心稽察臣跪誦之下時切凛遵伏惟臣抵任以來今逾一載每留心體察從前積習皇上聖明燭照力破黨援及上年冬間祗承諭㫖之後大小臣工交相警惕爭自濯磨多以懷私干咎為懼是邇年來粵東官常悉賴我皇上天地父母開誠化導之深恩可以仰慰聖懷逺注之至意至臣去年巡歷肇髙雷瓊等府地方今年春夏巡歷惠潮等府地方惠潮兩府風俗素稱刁悍今所至詞狀簡少連嵗豐收米價平減民皆樂業逺至南澳碣石之海島邊疆總屬寧謐臣謹據巡歷情形一併奏聞謹奏據奏粵東官常民俗朕疑信相半歷觀外吏大都于初到時必過言地方之廢弛及稍遲嵗月必極言風習之整理每每皆然覽之厭矣何能慰朕逺注之懷但當一秉忠誠竭力勉為之何在於言論章奏間耶地方情形果如所奏不但朕必知必聞天下人耳目自不可掩毋因一府一縣少有可觀及或誤聽誑辭聞見不真遂視全省為巳治已安而生懈弛之念也同日又奏為奏聞事竊臣查韶州府英德乳源等縣逼近猺峝重巒深谷素稱宵匪藏姦之地前英德令陳志儀弭盜無方因循諱飾以致多有竊劫之案業經㑹疏題參查該地各案多係柳坑猺賊為害經撫臣委令曲江乳源二縣協拏臣咨㑹密檄以猺獞為盜宜相機設法購緝不得妄拏滋擾時乳源曲江二令親帶練役裹糧入山如法屣緝巳據陸續拏獲猺賊鄧進寶盤雲才等二十餘人起出贓物俱經各事主認明給領其餘盜或自行投首或别猺縛獻除該員確審分案究擬聽候督撫二臣㑹題外緣係猺峝盜夥今經拏獲各處猺山俱屬寧謐理合據實奏聞謹奏緝捕有方自無滋擾辦理可謂是當雍正九年十月二十一日廣東觀風整俗使臣焦祈年謹奏為奏聞事竊廣州省㑹之地五方雜處易於藏姦臣不時嚴飭南番二縣並城守營曉夜巡查兹於九月間有湖廣差官毛峻德外委把總劉成後齎奉督臣邁柱密票禀稱有行劫江西官署案內盜犯沈二解至湖廣孝感縣楊店地方脫逃奉㫖嚴拏今特一路蹤跡前來懇即添差查拏等語城守副將毛克明當即密令千把目兵並該縣捕壯同來差四路截緝當將沈二獲住并獲隨從二人一名王廷魁一名宋二鎖子起出衣飾各贓逐一登記明白禀報前來經㑹同督撫飭令番禺縣訊供據沈二將行劫江西官署後解至湖廣地方脫逃直認不諱其王廷魁供係雇來煮飯宋二鎖子供稱賣身跟隨除現將沈二等三人並起出各贓㸃交來差一面多撥兵役小心護送遞解外事關拏獲鄰省大盜合行奏聞謹奏此案盜犯之緝獲殊屬可嘉有㫖諭部同日又奏為據實奏聞仰祈睿鑒事竊查廣東州縣地方緊要巡檢三十三缺前曾准部議比照州縣繁簡調補之例於通省雜職內選才能强壯之員調補如果巡緝三年並無盜案准其即升業經遵行在案查有廣州府番禺縣茭塘司巡檢李藻才力强幹一切查姦緝匪不遺餘力地方寧謐督臣題請升補縣丞因格於部議仍留該司供職又有潮州府惠來縣葵潭司巡檢黃繩中才具敏練殫力查緝宵小屏跡該府以饒平縣之黃岡司密邇福省盜賊易於藏姦曽將該巡檢詳請調補亦在案臣思巡檢一官専司捕緝查察地方最為緊要廣東山海交錯之區既當嚴行甄别以専責成更宜格外奬賞以示鼓勵今李藻黃繩中實係才識兼優之能員所轄地方卓有成效臣體察既實不敢壅於上聞倘蒙皇上天恩不拘資格特加擢用以展其才敕諭督撫咨部引見凡在微員益當感激鼓舞勉圖報稱矣為此據實具奏伏祈皇上睿鑒施行謹奏有㫖諭督撫二臣矣汝亦將曾經奏朕之處更面言之雍正十年二月二十八日廣東觀風整俗使臣焦祈年謹奏為奏聞事竊照廣東地方今春正二兩月雨水霑足正值春耕之候得此膏雨時沛髙下原隰咸皆以次蒔插將來可卜豐收粵東二麥甚蚤此時皆已茂秀春間米糧每石價銀六七八錢不等其産榖最少之州縣間有價至一兩者至於各鎮協營遊巡駐防凡一切查緝事宜應與該地方文武協理之處俱各以時具報近來盜賊亦漸稀少地方寧謐理合繕摺奏聞謹奏粵東雨水米價情形以手加額覽焉同日又奏為奏聞事竊查匪犯俞猊與福省詔安縣黃五舍朋謀作姦臣前訪察確實業巳摺奏詎俞猊梟性不悛於去年九月間糾黨歃血拜盟種種不法經黃岡協暨饒平縣拏獲並匪黨陳阿幼等犯押解來省質訊之下供招結黨拜把謀為不軌歷歷不諱又據俞猊供稱八月十五日下午曽到福建下葛墟黃五舍家商量報讐的事要他招些人來幫我黃五舍說我這裏容易那江歆也可以招得約定九月十三夜在青峯山㑹齊打搶潮州府城不想黃五舍被福建上司拏去了他留下話與黃加皮黃亦寬黃金說如俞猊來要人你等可約些人去小的又約九月二十三日在南門外㑹齊後因海陽縣訪知都拏去了等語隨經㑹同督撫咨提黃五舍前來經藩臬兩司道府在於撫臣署內分别質訊據黃五舍將俞猊所供之處俱各一一招認臣思俞猊黃五舍二犯雖一在潮州饒平縣一在漳州詔安縣但適當閩粵交接之地呼吸相通從前窩盜窩贓既已無所不為今又包藏禍心招人歃血拜把圖謀為匪現在供認確鑿不亟剪除將來海疆重地貽害匪淺除現在移咨㑹提供出之黃加皮黃亦寬黃金到案嚴訊幫人約㑹實情另行奏聞外所有提到黃五舍供認招黨謀匪實情理合具奏伏祈皇上睿鑒施行謹奏事關紏黨圖謀為匪務須徹底嚴究毋得草率完結雍正十年五月二十九日廣東觀風整俗使臣焦祈年謹奏為奏聞事竊照廣東入夏以來五風十雨極其調順目下各屬早稻茂秀旬日之間即可登場蓋粵地五月天氣每慮雨水連綿曠日不雨又慮苗乾今恰得隔日即雨一雨便晴真所謂雨𤾉時若也聞廣西雨水頗多自梧州而東下流入三江一帶廣州之南海三水等縣肇慶之四㑹開建等縣地多基圍而勢當西水之衝今年西水頻發而隨長隨消各處基圍保固無虞五月內各屬報到米價較三月更加平減人民樂業近聞科臣徐杞巡查惠潮兩府山場如惠屬之博羅永安歸善等縣有名鍋底山鳯凰嶂等處衆山綿亘係歷來隴口最多礦徒出沒之藪今隴口俱經封塞多有青草長平非同時開時閉之形邇來礦徒實屬斂戢稀少目下因大官田新設鶴山縣一帶地方查其可墾之荒田甚多現與督臣撫臣議商招集惠潮各屬無業之民安插耕種俟科臣回省與督撫㑹議酌定奏聞際此時和年豐皆蒙皇上洪福廣被澤遍海疆臣等身任地方之責務期人有利賴俗盡還淳以仰副聖天子教養斯民之至意為此具摺奏聞謹奏以手加額覽之雍正十年八月十九日廣東觀風整俗使臣焦祈年謹奏為奏聞事竊照香山縣屬淇澳麻子二村因其獨處海中居民每多為盜經督撫與臣訪知各犯姓名委員並檄飭該縣協按名密拏當經現獲羅象茂等三十餘名自行投首歐陽德輝等四十名現在分别究結已經㑹同督撫合詞具奏無庸瀆陳外再查新㑹新寧開平等縣交界之處有百峰山綿亘數百餘里向為盜藪急則直趨香山廣海寨一帶洋面往來飄忽劫奪時聞最為民害臣與督撫多方設法併密飭文武用心緝拏今據開平縣自行投首賊首李雅拱一名又廣海寨署遊擊馮元報稱擒獲楜椒四等九名又新寧縣報稱首獲乂腳三等四名又肇慶府禀據開平縣張令陸續招到陳上滑等三十三名及新寧縣拏獲鄺天逺等五名此數十名者俱係著名積盜非尋常匪竊可比除有案者歸案究擬投首招致者令其緝賊贖罪仍一面嚴飭該地方文武逐細搜捕務使驅除淨盡不留餘孽以靖根株所有續獲百峰山等處各盜緣由理合繕摺奏聞謹奏據奏粵東積賊陸續首獲盜風漸次止息嘉悅覽焉勉之同日又奏為據實密奏事竊照廣東從前文武不和樹黨營私之積弊蒙皇上洞察嚴加懲剔又特頒諭㫖遍行刋刻宣示勸戒近年以來督撫提鎮咸以和衷相率而各屬員辨亦頗知凛遵懼蹈隕越目下粵省局面實不比往年此臣之不敢壅於上聞理合據實陳奏者也抑臣猶有不敢隱諱密行奏聞者如肇慶府陽江縣衙內偷盜餉銀該縣參革知縣邱慤隱諱不報濫拏無辜疊夾又復𣲖紳襟貸償經肇羅道張渠訪實飭肇慶府查究諱盜濫夾並𣲖償是真嗣肇羅道至省在巡撫官㕔司道官員㑹集之所按察司黃文煒倡言邱慤係湖北王巡撫特薦之人肇羅道此番嚴查邱令若罹參革王巡撫當有降調處分同衆面責張巡道之非張渠答云稽查盜案本巡道之責非為多事兩相爭論嗣經升任撫臣鄂彌逹將邱令㑹疏題參而司道之情形猶未釋然又髙州府通判管復始委修海船事務該通判侵蝕船料銀兩經髙雷亷道毛世榮查出詳揭詎髙州府知府張兆鳯徇情曲庇屢向該道求寬該道因將張兆鳯一併附揭嗣道府先後至省按察司黃文煒設席衙內招毛世榮飲酒勒與該府張兆鳯講和毛世榮云法之所在理應揭參原非為私情起見無庸和息按察司厲色相加立促張兆鳯㑹飲而散又督臣通飭文武嚴禁米榖私鹽出入口岸一案按察司黃文煒直用文申飭提督語言過當以致提臣張溥據文通咨又訪察得近來署督臣鄂彌逹因臬司行止乖張曾經面飭而黃文煒致生怨懟頗以為言臣竊以為現今通省文武羣相砥礪漸化積習臬司大員如此行徑恐生嫌疑之漸於粵東官方所關匪輕臣受皇上重恩不敢稍有欺隱為此據實密行奏聞謹奏此奏是意見亦屬公當另有諭㫖從部頒發雍正十年十一月十九日廣東觀風整俗使臣焦祈年謹奏為奏聞事竊照廣東今年雨𤾉時若早稻豐登米價甚平臣經具摺奏聞兹秋收告成據各屬呈報年登大有兼之嘉榖蕃生一莖自雙穗以至七穗一本自十數穗以至一百二十九穗自四五尺長至一丈一尺不等各該地方文武官辨齎送呈閲前來巳經督撫與臣合詞奏聞并函匣繪圖遣員恭進在案且粵東地方遼濶通省亘數千里十府二州收成分數大率如一現在天時和暖播種二麥早已青蔥米價自六錢以至八錢九錢不等地方處處寧謐萬民樂業所有特産嘉榖及年嵗順成緣由理合奏聞謹奏覽粵東收穫情形欣慶之懷莫可言喻同日又奏為奏聞事竊照香山縣依山傍海素稱積盜之區除擒撫麻子淇澳二村各盜共八十餘名巳經督撫與臣合詞具奏嗣督撫與臣復面諭該縣協用心訪查務盡根株以仰副皇上除盜安民之至意今於十一月十四日據香山協副將黃錫申香山縣知縣魯遐齡報稱查張婆澳圓山仔等處良匪不一親詣該地方宣揚聖德天威多方招撫自八月二十七日至十月二十四日又陸續投首林開運等共四十二名等情現俱行司審擬在案又新㑹新寧等縣交界之百峰山尤為盜藪臣與督撫密飭該文武實力緝拏除擒撫積盜李雅拱等數十餘名之外但山深林密恐猶有匪竊潛藏一時搜捕不到有署廣海寨遊擊馮元實心捕盜歷著勞績前在百峰山擒撫各盜該員出力居多今該員又於十一月初八日招撫人地相宜伏祈皇上諭令督臣酌量題補實為恩便至前後擒撫各盜或於本省酌量安插或仍照舊例分發各省現在遵照奉到皇上硃批督臣㑹同奏摺諭㫖督撫與臣密議按其情形詳加酌定另行具奏所有香山百峰山續行招撫投首各盜緣由理合具摺奏聞謹奏覽硃批諭㫖卷一百三十四
