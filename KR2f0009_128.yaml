body:
  text: 欽定四庫全書硃批諭㫖卷一百二十八硃批許國桂奏摺雍正元年十二月十五日署理宣化總兵官正黃旗副都統臣許國桂謹奏為據實奏明事竊臣恭膺特㫖署理宣化總兵官印務聖訓詳明洞悉幽隱臣鏤心刻骨寤寐不忘入境以來虛心體訪茍有關於營伍利弊者皆當次第興除以副我皇上撫綏至意訪得前任總兵臣張自成諸事闒茸辨兵效習成風向有空糧今雖添補然新募之兵弓馬技藝不無生疏臣嚴行訓練務收實用又臣將親丁糧六十分俱照數招募頂補屬員節禮陋規出示禁止各屬又有總兵之掛糧臣面誡屬員嚴令速為募補又查宣化教場餘地二十四頃每年租銀四百三十餘兩城內菜園八十畝每年租銀十三兩沙城西城各房一所又鄧家窰一處每年共租銀四十六兩又馬厰餘地每年交黑豆二百石草九千束歷任總兵取為饔飱之資雖無害於兵民但以官地所産臣若擅自收納心實未安謹據實陳奏伏祈皇上睿鑒施行謹奏諸凡須行與朕看不在此數行摺奏也應取者取用亦豈有嗔責之理總要還朕一是字而已所奏防汛添兵之摺已發部議爾雖初到看所料理處頗屬可嘉勉之同日又奏為遵㫖奏明仰請睿裁事竊臣欽奉皇上面諭修葺宣化城垣事宜臣於抵任後遵即㑹同宣化知府郭維寧俾率宣化知縣楊蔚親臨閲視城垣坍塌處所共計八百八十五丈以及城樓角樓等項悉皆倒壞據該縣印冊估銀十三萬三千八百四十兩零惟是宣郡城內卑窪北門之外東門各道山水洶湧奔注舊建石堤土堤以禦泛濫而固城垣因年久未修石堤衝開四處土堤衝開三處山水直灌城根北面城墻磚石無存者共七十一丈其僅存薄土四五尺者二十八丈若不及今修堤恐來嵗春夏山水一發倉庫兵民難保無虞恭請皇上敕令先修堤工俾水歸故道以次修城始得完固復於修堤之時遵倣古蹟修復閘口俾其蓄泄有時旱潦有備宣府百姓共沐皇仁於無既矣再知府郭維寧職司民社仰請敕令一體監修則臣臂指得人而工程可以速竣為此具摺奏聞伏乞睿鑒施行謹奏所奏是自應先修堤工令郭維寧一同監修爾即傳㫖知㑹撫臣可也雍正元年十二月二十八日署理宣化總兵官正黃旗副都統臣許國桂謹奏為報明事竊臣於本月二十七日據張家口副將馬承璋報稱據巡街把總稟稱卑辨帶兵巡街至通橋門街市見有旗人飲馬將街攔住有柴火車一輛又有婦女車二輛擁擠一處一夥旗人只顧飽看婦女拉車之人急欲前行反將拉車之人渾罵卑辨同兵向前勸阻豈期伊等恃威將卑辨及兵丁百般辱罵肆行毆打卑辨現將旗人兩箇扭住聽候查問等情據此隨同韓參將詢問你是那旗人屬何佐領據稱我是正紅旗人一箇呌莊兒一箇叫王國賔我們是敦郡王肉房茶房內務府佐領下人你管不得我你問我做甚麼你送我一箇地方去罷等語本職未敢擅專理合具文報明等情到臣據此臣隨檄令遊擊史蘭馤等將莊兒王國賔即行鎖拏嚴加看守外事關旗人騷擾地方不敢隱諱理合據實具奏請㫖謹奏如此執法方見是實心任事朕甚嘉之將二人生事情由備細聲明鎖解咨部請㫖施行雍正二年正月二十二日宣化總兵官臣許國桂謹奏為據實具奏仰籲天恩事竊臣據臣標所屬各營路將辨等官魏麟等合詞詳稱據出師兵丁王萬傑等公同稟稱役等遵於康熙五十九年調往陜西出師荷䝉聖祖仁皇帝隆恩每兵賞給䭾載馬二匹兵丁五百名共領馬一千匹跋涉三載沿途倒斃當即報明隨征兵部䝉令賠補役等無奈各將支領餉銀隨倒隨補及回營之日並在途所補之馬十無一存領兵陳副將諭令役等每一名繳銀十六兩以足兩馬之價但思役等身充營伍養生度日惟賴餉銀兹議以餉銀抵補役等憑何度日近聞保定城守尉滿洲兵丁古北口提標緑旗兵丁倒斃馬匹均䝉皇恩免賠役等奉調出師事屬一體伏乞詳請題達仰邀聖主恩典一視同仁從寬免賠則生生世世頂戴皇恩於無既矣等因到臣臣職司所在不敢壅於上聞可否免其賠補出自天恩伏乞皇上睿鑒施行謹奏總兵許國桂所奏該鎮兵丁軍前倒斃馬匹一項念伊等出征勞苦從寬免其賠補該部知道雍正二年二月初三日宣化總兵官臣許國桂謹奏為遵㫖監造沙城敬陳末議事竊照雍正二年正月二十七日奉兵部劄付內開欽奉上諭原任提督左世永著派往沙城修造城池并著給事中戴錦監督催修左世永如力不能完工即令戴錦協力幫助將二人俱交許國桂照伊指定處所修造等因劄行到臣臣隨於二十八日親詣沙城㑹同戴錦左世永逐處勘閲城工悉照舊制指明俾其遵式修築俟興工之日臣不時單騎前往查看催趲隨據耆老鄉約人等稟稱東堡外東北角向因山水灌注漸至城根居民搬運山石欲築堤一道自地震後居民窮苦無力建築今䝉天恩造城萬民有幸懇求一併造堤用成萬年不拔之計臣閲城外東北角正當山水所衝必須築成石堤方可以防泛濫之虞向時居民搬運石料猶存相應並令造堤以護城垣臣更有請者查沙城之內西係保安州治東係懷來縣治一城兩管既無專屬又無一官在地駐防今值興造城垣丁夫工匠蝟集蜂屯其間良善固多宵小亦復不少必得專員方資彈壓查有糧捕同知滿雲鷫駐劄新保安城內去沙城僅二十里仰請聖㫖令其來往稽查緝捕甚於地方有益但同知滿雲鷫乃屬文員臣何敢擅為越俎之謀緣䝉我皇上委任優隆用是謹陳一得之見繕摺請㫖伏候皇上批示遵行謹奏將爾所奏情節知㑹撫臣李維鈞諒伊自有措置此所奏是但不知滿雲鷫向日居官何如雍正二年二月十八日宣化總兵官臣許國桂謹奏為奏明事竊照修造沙城業將興工日期另疏具題外臣於查看沙城之時監督臣戴錦議將沙城舊基盡行剷平走夯另造臣思沙城墻垣雖盡倒塌而坐地基址仍然堅固若必剷平舊基走夯另造不惟曠日持久抑且一工數費似屬無益況新走之夯未免鬆浮終不若舊基堅固臣令其照舊基修築逮沙城工完之日倘有餘資則附近城堡倒塌正多或可再興一工禆益匪淺臣之管見如此伏祈皇上睿鑒施行謹奏爾此見甚好今有居官貪叨之原任大興令髙純嘏十餘年來婪贓不下數萬發往助修城工爾查就近一切城垣堤路如有應修理處酌量伊等力之所能令其修理雍正二年三月初三日宣化總兵官臣許國桂謹奏為據實奏聞仰祈乾斷事竊照修造沙城臣奉㫖管理業將指定處所緣由并報到興工動土日期繕疏具題臣復親至沙城㑹同戴錦左世永繞城閲看一應修造之方詳細指明令其作速修造臣回署之後復經疊催詎意延今一月尚未修造臣細揆之緣地方棍徒暗地鑽營欲行包攬戴錦自恃監督假公濟私或就中分潤而左世永窺破隱情多方拒却必欲另覓工役且又希圖協助種種延挨似此各挾私心互相虞詐尚無修造之期安有完工之日臣若徇隱不言難辭朋比之咎所當據情奏明伏乞皇上乾斷施行謹奏所奏甚是爾多方開導如怙終不悛即行參奏候朕嚴加處分同日又奏為恭報宣化得雨日期事欽惟我皇上念切民依不遑宵旰今宣化地方於本月初二日夜甘霖大沛四郊霑足㑹見豐收有望萬姓共沐皇仁理合奏報謹奏覽奏地方及時得雨殊為可喜真所謂天恩浩蕩也雍正二年四月二十二日宣化總兵官臣許國桂謹奏為恭繳硃批諭㫖事竊照雍正二年三月十七日臣標把總齎到皇上硃批原摺一本遵即行文直隸巡撫順天府尹等衙門疊催去後今髙純嘏尚未到工俟其到工之日取有興工日期另行題報合將原摺恭繳謹奏知道了張自成猶屬曾經出力之人因其居官不職所以罰派此差今業已身故向日貪得多寡諒皆爾所知悉不必過於苛刻雍正二年六月二十一日宣化總兵官臣許國桂謹奏為奏聞事竊臣荷䝉皇上委任監理修造城垣堤路今查得沙城堤壩已經修完中堡磚城亦經修完惟城樓尚在蓋造即日告竣其東西二土堡現在上緊修造新保安城堤壩二道亦已修完現在清理城基除宣化府城工現在刨沙修築容臣另行具奏所有做完工程理合奏聞謹奏據奏各項工程已悉其南口居庸一帶大路當加意監督修理雍正二年七月二十八日宣化總兵官臣許國桂謹奏為據實奏明仰祈聖裁事竊張文燦修造宣化府城以贖伊父前愆臣約估其力可出四五萬金前堤工雖經報完而甕城尚未告竣城外之沙僅刨去一丈其所作工程約費三萬六千五百餘兩實止發過銀二萬五千七百餘兩未奉㫖下問之先尚陸續發銀修工及奉㫖下問之後張文燦隨口稱力竭工料等項缺銀不發以致匠役停工事關欽工豈容稽遲推卸倘再延挨臣即另行參奏合先奏明或令其將甕城修完免其再修或令其將城外之沙再刨去五尺臣不敢擅專伏乞皇上睿鑒批示遵行謹奏張文燦效力至三萬餘金可以寬免今派遣原任雷瓊道沈澄來工效力應交付某處工程爾其酌量撥與修理雍正二年八月二十六日宣化總兵官臣許國桂謹奏為恭謝天恩事雍正二年八月十五日據臣標把總恭捧御賜月餅到宣臣出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣一介庸愚至微極陋荷䝉天厨寵賚感激惶悚惟有勉竭駑駘圖報皇恩於萬一耳理合奏謝謹奏凡百惟務真實方能永久䝉朕眷顧不可絲毫放縱有負委任之恩雍正二年九月十一日宣化總兵官臣許國桂謹奏為恭繳硃批諭㫖事竊照雍正二年九月初一日臣標把總恭齎到皇上硃批原摺臣捧讀之下惶悚無地前奉部劄惡僧正修一案奉㫖著臣明白回奏其明白回奏之處令其送部不必自行摺奏臣恪遵諭㫖所以不敢具摺冒瀆天聽今䝉聖訓諄切感激涕零除將明白回奏之處具疏奏明外謹將實情附奏竊臣原與此僧素不相識因口北道范𢎞偲送來募化云係舊相識臣一時愚昧給銀六兩但臣不能早燭姦邪於未露之先疏略之罪實何敢辭所有奉到硃批原摺理合恭繳謹奏此事甚屬愚昧無識陋習不除殊可痛恨爾試思有是理乎雍正三年四月二十六日宣化總兵官臣許國桂謹奏為奏聞事竊照雍正三年四月二十三日卯刻據四門守門兵丁稟稱口北道年裕吩咐今早城門不可即開不知何故臣隨差人訪問知係教書之人乘夜逃走遍城尋覓無踪等情理合具摺奏聞謹奏凡百照此據事直陳方是爾觀年裕之居官為人如猶有優處則已若竟不妥又有此甚可笑之事即行具摺參奏可也雍正三年五月初二日宣化總兵官臣許國桂謹奏為遵㫖奏聞事竊臣奉到皇上硃批諭㫖遵查口北道年裕到任未及三月居官尚不敢多事但其為人瑣屑況舊染脾疾飲食少進形神倦怠強為支持臣思辦事全賴精神若身軀疲憊難免曠官謹據實回奏伏乞皇上睿鑒施行謹奏既云竝無劣蹟未有因病加罪之理再看幾時另行奏聞雍正三年五月十九日宣化總兵官臣許國桂謹奏為奏聞事竊照原任學道張學庠係考核學道案內因聲名不好革職派令修理居庸南口道路之員理宜實心效力不意張學庠詭詐居心姦巧成性於雍正二年六月內奉㫖發往南口效力延挨至十一月始到工所因天寒停工止用過揀石銀二百三十餘兩今春修堤墊道皆令工匠代為墊用所做工程約費五千餘兩而止給銀七百兩以致工匠紛紛索價停工以待而張學庠又云必須家中協力設處方能接濟臣查張學庠居官聲名既已不好豈無餘資而伊父張孟球又屬原任開歸道並未與張學庠分家銀錢皆伊父張孟球掌握現住蘇州本籍年猶未老可以幫助其子以臣愚見莫若令張孟球前來工所幫助備辦既可早竣工程又可為詭詐姦巧者之戒謹據實奏聞如果臣言可採伏乞皇上批示以便遵行謹奏斷未有因子罪及其父之理將應需錢糧酌定數目援㫖行文江蘇巡撫追變張學庠之家産可耳雍正三年六月初六日宣化總兵官臣許國桂謹奏為奏明事竊照臣於署理宣化總兵印務時奉皇上面諭著令原任宣化總兵官張自成修理宣化府城刨除沙土并著伊子張文燦前來幫助經臣奏明即將清河北壩先令其修完後將甕城城樓刨沙等工指示修作今已告竣共用過銀三萬六千五百餘兩至張文燦修壩時借用過舊城磚五萬一百零六塊共該銀一千五百三兩零此項銀兩或令其陸續交存口北道庫或邀恩豁免臣不敢擅專伏乞皇上批示遵行謹奏此項銀兩免其賠補可也雍正三年六月二十五日宣化總兵官臣許國桂謹奏為奏明事竊照雍正三年六月十一日發到條奏洋河橋一摺奉皇上硃批著沈澄添修此橋欽此臣遵即親往閲視查此橋在城之南關外為蔚州南山往來䭾煤之道非通秦晉三口之大路考其衝塌之故蓋因當年建造時上下寬濶一樣是以橋面勢重易於傾圯又因橋底脣短水洶沙旋根腳不牢以致坍塌目今之水現在流注橋南並不由橋下出入以臣愚見合無就可渡之處著沈澄另造長石平橋一座即運廢石以築橋基另採新石以鋪橋面庶橋工更可久逺而民無病涉矣臣管見如是是否有當伏乞皇上批示遵行謹奏依爾所議行但改造平橋所需較之修治舊橋所需銀兩必有增無減爾方可免人談論於此處亟當留心同日又奏為參奏事竊照奉㫖發來修城效力之原任大興知縣髙純嘏秉性姦巧居心狡詐自雍正二年閏四月初九日動工興修新保安城至九月內因天寒停工所做城門及堤壩工程無多今年自春至夏臣屢經嚴飭而髙純嘏詭計百出託言某日動工至期寂然臣疊行嚴催髙純嘏始開出房屋田地並不開明數目及坐落地方據云無人敢售惟以虛辭巧飾延挨時日玩誤欽工莫此為甚理應行文江蘇撫臣變其産業以早竣城工伏候皇上批示遵行謹奏此事爾奏遲矣髙純嘏到工業已二年縱有資産早經隱匿即使行文江蘇止不過得一家産盡絶之覆文耳於事何益今不若將髙純嘏嚴拏交爾追比將來不能完工髙純嘏固不免延捱之罪爾亦難辭袒庇疏縱之咎也應否行文在爾斟酌朕意不必爾若謂有益傳㫖行文亦可雍正三年七月二十一日宣化總兵官臣許國桂謹奏為欽奉上諭事竊臣准兵刑二部劄開奉上諭令直省督撫提鎮通行各該地方文武官員嚴查年羮堯寄放之資財産業等因到臣臣遵即遍飭所屬嚴加屣訪臣又細加查察查得張家口居民卜爾介向係年羮堯販買馬匹之人恐其領伊資本隨即傳訊據供並未領有資本小的兄弟卜爾耀因趕馬流落陜西年羮堯的馬販子髙文顯係裕親王屬下人認得小的兄弟於康熙六十一年同到張家口住在小的家裏買馬五百餘匹雍正元年又買馬一千餘匹雍正二年又買馬七八千匹馬販衆人私帶之馬在外張家口之馬價每匹八兩上下趕到陜西年羮堯與衆人私帶之馬與營兵係十二兩一匹他的馬是多少價銀小的不知道小的兄弟尚在陜西未回等情訊供在案緣係臣地方之事既經訊明敢不直陳應否敕下川陜督臣曉諭兵丁其馬價未給完者俱不准給還其已給還者俱令照張家口八兩之價餘銀追繳是否有當伏乞皇上睿鑒施行謹奏此事著年羮堯明白回奏并著總督嶽鍾琪察明奏聞雍正三年八月二十四日宣化總兵官臣許國桂謹奏為恭繳硃批諭㫖事竊臣標把總恭齎皇上硃批原摺到臣臣跪讀之下益加兢惕實力遵行合將原摺繳進謹奏爾近日以來甚屬不妥慎之硃批諭㫖卷一百二十八
