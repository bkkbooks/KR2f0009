body:
  text: 欽定四庫全書硃批諭㫖巻一百三十二上硃批憲德奏摺雍正四年四月初九日湖北按察使臣憲德謹奏爲恭報微臣到任日期事竊臣世受國恩由廕生歴任部曹勉力供職自愧庸愚涓埃莫報今又䝉皇上天恩簡授湖北按察使臣聞命之下不勝戰慄惶悚嗣於養心殿仰覲天顔恭聆聖訓敎誡詳明惟務無欺無隱不可絲毫瞻顧勉勵諄切臣謹鏤心版時刻不忘卽於二月二十八日束裝起程至四月初一日抵武昌臣署接印視事所有一切案件容臣次第辦理臣自分才力短淺初膺外任而臬司衙門尤爲刑名總滙關係匪輕必矢愼矢公惟勤惟詳方爲無忝厥職臣惟有凜遵天語夙夜恪勤勉竭駑駘以仰副皇上敎誨生成之至意謹將微臣到任日期繕摺奏聞伏祈睿鑒謹奏覽勉爲之雍正四年六月初八日湖北按察使臣憲德謹奏爲密陳事竊臣以愚昧之質荷䝉皇上隆恩簡畀湖北臬司於四月初一日到任不數日内忽有原任藩司張聖弼來署請見緣稱原任藩司遂容其進見臣詢其履歴稱係正藍旗漢軍臣云旣已退任何不歸旗答云尚有拖欠未淸臣不知其欠者何項原擬有無罪名及應行監追而竟未行收禁并類此等事尚有幾案隨牌行所屬八府令各府照案註明一一造冊送司以憑查閲續據武昌府知府章培基造冊送司臣細閱冊内開除因虧空革職糧道許大定及革職守僃劉世傑等現在監追外有因虧空革職擬斬之原任藩司張聖弼未曾監禁現交管押竊思此係臣之專責若不嚴行禁飭是臣上負皇恩而壞國法甘蹈罪愆而爲他人任過也當即牌行該府令其立拏監禁具報去後於五月二十八日據該府報稱應行監追之張聖弼巳於二十七日送入府監訖至二十九日有總督李成龍來文一紙係張聖弼所投懇請寛免監禁呈詞奉批按察司查覆臣隨將到任以後牌行報查勒令入監二十八日巳報送監等情僃叙詳覆奉批據詳已悉各在案楚省各署歴有督撫兩院事宜報單送閱臣見五月二十七日報單内開張聖弼差人到督院投請寛免呈詞收入此即批臣查覆之紙矣本日張聖弼又差人到撫院先投禀一封又投請寬免呈詞未收此俱未入監之前一刻也五月三十日報單内開張聖弼差人到督院投禀一封此則已入監覽抑臣再有請者臣於二月二十六日進養心殿恭聆聖訓奉轉奏伏乞皇上批示遵行謹奏覽奏可嘉之至若能事事如是永逺如是即將此志堅操不移將來可望成一人物也勉之勉之雍正四年七月二十二日湖北按察使臣憲德謹奏為遵㫖密陳事竊臣前奏監禁張聖弼一事臣家人捧摺回楚奉到硃批遵即訪查督臣李成龍所辦各衙門事跡因履任未久不能周知就臣一署之事觀之大約李成龍歴練多年頗屬能事然俱不過敷衍完局毫無實心實意即以張聖弼一事言之李成龍身爲督臣䝉皇上不次之恩且業已明白指示密諭在前而猶收其懇請寛免監禁呈詞以明知之事而又批司查覆則其居心姦猾不問可知再查知府章培基係紹興人氏年六十有餘雖任武昌守十餘年毫無善政可紀前督臣楊宗仁屢行申飭特以無甚大弊未曾㕘革耳今年齒愈老實罷軟不及人不勝任至於未曾監禁張聖弼一事則咎在上司之徇庇非府縣之敢於私自縱容也再張聖弼之事原係武漢二府審追緣該犯在武昌而不在漢陽前送臣冊籍亦單係武昌府造送是以臣前奏摺單言武守章培基而未及漢守郭朝祚今皇上問章培基何如知府故臣將郭朝祚亦係承審承追之員因隔府居住冊在武昌府故前摺内未曾叙及漢守情節今補行奏聞統祈皇上睿鑒裁奪外所有奉到硃批理合恭繳謹奏凡事以眞實爲主而出之以公正自無不獲福之理勉之向聞郭朝祚才情官聲俱好爲湖廣知府中第一斯言確否雍正四年九月十九日湖北按察使臣憲德謹奏爲據實囘奏事竊臣前奏督臣李成龍及知府章培基一摺奉有皇上硃批臣跪讀之下不但爲臣居官辦事之指南實爲臣安身立命之寶訓雖父母敎子無以踰此惟有祗承聖訓力勉誠實敬效犬馬於光天化日之下耳再臣看得漢陽府知府郭朝祚爲人謙遜和平辦事穩妥洵屬循良之員但性情畧多退守似於卓然自立毅然任事處微有不足兹奉㫖詢問理合據實奏聞謹奏覆奏郭朝祚居官爲人之處甚屬公當雍正四年十一月二十四日湖北廵撫臣憲德謹奏爲敬抒忱悃事竊臣謭劣庸材下愚陋質仰䝉皇上隆恩簡畀臬司甫經七月今荷特恩授臣爲湖北廵撫刑名而外兵民錢穀皆臣應辦之事凡有乖謬臣爲罪首悚懼之心實深寤寐臣甫到任諸務茫然伏乞皇上容臣入京陛見恭聆聖訓俾臣知所遵循囘署之日臣將地方事務細加體察如遇各屬敷衍朦朧事内應行奏聞者臣不敢顧忌亦不敢徇隱自必次第奏聞懇請皇上指示遵行臣非欲以多事爲詳愼以苛求爲明察妄邀君寵有妨民務也如遇敷衍朦朧事内非關緊要無甚弊端不必奏聞自應更正者臣即自行更正亦不敢瑣瀆天聽臣非敢出入其間上下其際巧爲干譽乘機媒利也臣愚以爲爲臣之職實有不可不如是者書曰臣無有作威作福易曰地道無成而代有終大義昭然敢不恪守總之臣之駑鈍萬不能副皇上擢用之恩而臣之愚衷無一不在皇上洞鑒之内爲此敬抒忱悃恭請陛見伏乞皇上批示遵行謹奏覽奏深為嘉悅勉之爾若無可取之處朕豈肯如此驟加擢用從此當更加努力以全朕用人顏面至陛見之請竟可不必即來京仍不出前次陛辭之訓㫖朕之居心及一切用人行政福敏悉知命伊詳細傳述與爾即如面朕一般何必曠廢職守爲無益之奔馳也雍正五年正月十九日湖北廵撫臣憲德謹奏爲恭謝天恩事雍正五年正月初五日臣齎摺人回恭捧御書福字及十思疏併風羊哈密瓜到臣臣跪迎至署望闕叩頭祗受訖伏讀硃批諭㫖朕之居心及一切用人行政福敏悉知命伊詳細傳述與爾即如面朕一般欽此臣即恭詣署督臣福敏衙署告以諭㫖經福敏敬將皇上用人行政居心處歴歴告臣仰見我皇上明同日月治邁唐虞建中立極與天地合其德法祖勤民與四時合其序無怠無荒兢兢業業無偏無黨蕩蕩平平克勤於邦每以一身先天下克儉於家未始以天下奉一人凡所以範圍宇宙曲成萬物而不過不遺誠亙古未有者也在福敏宣揚之際深以爲帝德淵微不能仿彿於萬一而在臣敬聆之下已不啻覲天子之光仰天顏於咫尺矣臣欣逢盛世幸遇主知雖自顧庸愚報稱無地而丹誠耿耿矢志有年惟抒犬馬之微忱竭力於堯天禹域中耳為此繕摺恭謝天恩謹奏覽奏謝知道了為君難為臣不易我君臣期共勉之同日又奏為密陳事竊思辦事惟在得人外省官員督撫而下司道所闗最要臣謬膺簡命廵撫一方若於司道之賢否優劣不細加體察則為勤愼之員此數人者皆就臣所見據實奏聞非敢有一毫私意於其間也但未奉皇上詢及冒昧陳詞臣不勝惶恐之至為此謹奏但能留心察吏明以持衡又從而秉公舉劾諸事不難就理矣朕於楚省夫復何憂此一節為汝等封疆大吏之専責要務勉之勉之同日又奏為奏聞事竊照荆州府屬之長陽縣與容美土司界址相接自明末兵燹之後田地荒棄漢土淆雜附近於土司者不無被其侵占以致漢土人民互相搆訟歴有年矣先因土司侵占柑子園魚翅灘等處經前督臣楊宗仁委令縣營㑹勘柑子園魚翅灘等處係土舍用價一百八十兩契買漢土雖經前督臣斷給長民但未給價贖歸因循至今葛藤未斷又上年三月土人向彩等率衆爭奪蹇家園上洪宇等處將民人蹇鳳家搶擄阻墾經長陽縣營會同拏獲土人向彩等並先經被擄在土之民人覃顯勲等具報通詳經臣於臬司任内會詳督撫委令荆州道高淳及府縣等前赴彈壓勘審嗣據該道府縣將搶奪情由審擬軍戍照例分别枷責詳結惟是秋水泛漲不能清勘地畝詳請俟秋水平退之日㑹勘結案等情迨秋水平退緣該員均値賑濟復經臣㑹詳改委蘄州知州王玠於公捐耗銀内給銀一百八十兩令其帶往贖取從前勘斷之柑子園魚翅灘等處地畝並會勘蹇家園等處囑令秉公確查永息爭競以結先後各案去後今據該知州㑹同長陽縣申稱職等遵即前赴蹇家園地方據土司委令伊弟田琨如等移送退贖柑子園魚翅灘依領並造具圖冊前來職等隨將贖田價銀交給該土員領收訖住種土人已經搬移結案其蹇家園地方隨經查勘傳集漢土人民宣揚皇上恩威諄諄化導漢土人民莫不輸服并據該土司出具印信遵依不獨從前爭墾之上洪宇地土盡聽蹇鳳等耕種陞科并接壤之下洪宇田地俱情願退歸蹇鳯等管業住種土人現在搬移立碑嚴禁永爲遵守取具印領遵依圖冊碑刻申送到臣查柑子園魚翅灘等處地畝被土人侵占多年今俱悅服退歸誠我皇上天威聖德之所致也臣不敢壅於上聞為此繕摺謹奏前據譚一豫條奏此事朕久欲交發汝等查議為因近日烏䝉涼山普雄狆苖等處現在整理未竣其地皆與楚省隣近且湖南又有謝錄正一案若復議論及此天下人必謂朕為有意多事好大喜功是用遲疑未果今覽爾此奏深為慰悅故將其奏摺亦發來與爾同福敏閒看雍正五年三月十六日湖北廵撫臣憲徳謹奏為奏聞事雍正五年二月二十日據前撫臣鄭任鑰家人元應芳呈稱為捐充公用事切芳家主都察院左副都御史鄭任鑰前任湖北廵撫身受國恩天高地厚今已内補離任情願捐銀二千兩以充修城等項公用伏乞批示等情到臣查鄭任鑰前任起程時並未向督撫言及情願捐銀効力之事至伊進京臣又不知其有無奏聞臣當據伊家人具呈即批令布政司查收貯庫訖臣不敢隱蔽謹繕摺奏聞謹奏鄭任鑰如此譎詐甚屬無恥可交與福敏連前事一併察議奏聞同日又奏為據實陳明仰懇聖恩事竊照湖北廵撫有兼收荆關木簰船料等稅一項除正額按季交貯藩庫彚行解部外尚有贏餘每年約萬數上下不等歴任撫臣因係自理闗務贏餘未經奏明奉㫖皆自取為衙署用度伏思臣以駑駘之質過邀聖恩凡職内應盡之事自視缺然焉敢於國課之餘竟謂已所應得黙為收受也臣請嗣後除正項銀兩照例交貯藩庫解部外其餘銀兩臣亦按季查交藩庫年終另行核實奏聞聽候撥用庶臣不致有朦朧専擅之愆再前督臣楊宗仁於加一耗銀内分派各官養廉自司道府以及州縣無不均遍而督撫衙門未經議及臣自祖父以來世受國恩家道頗為豐裕至臣二十年來仰事俯育諸事繁多家道蕭然一無田産臣撫署用度勢不容已臣不敢矯飾交納贏餘之名别為營取是又不得不懇乞皇恩者查湖北藩庫嵗有耗羨三萬餘兩係楊宗仁議為省中公用之資伏乞皇上洪恩敕於此項内酌定一年賞臣若干兩則臣署公私之用可以無缺而俯仰之下莫非明受皇恩矣臣不勝冐昧惶悚之至謹奏據奏家道蕭然可謂大笑談即使極其豐裕亦未有令爾賠累産業居官之理與督臣福敏酌定取用可也雍正五年閏三月二十四日湖北廵撫臣憲徳謹奏為奏明事竊臣於閏三月十二日自武昌起程至荆查得程如絲案内受傷身死陳堯之親屬陳典等與受傷現存之王四等十餘名臣親帶往赴川其沿途夷陵歸州巴東等處聞俱有被害之人容臣到彼逐一查出帶徃質審所有武漢等府屬業經屢次飛檄飭查凡有查出之人亦即委員解送臣欽遵諭㫖務必盡力查出决不敢致有遺漏有負聖主愼重民命之至意也祗是臣入川事竣之後正値五六月川水長發之時舟楫難行必由西安府陸路囘楚臣受恩深重犬馬戀主愚忱實切寤寐西安離京僅一二十程懇乞訪察合併陳明謹奏此一案岳鍾琪自不便出頭辦理爾其竭力秉公審究朕惟欲得事之眞情而巳一無意向於其間絲毫不必瞻顧揣度但只據實料理可也雍正五年六月二十四日四川廵撫臣憲德謹奏為仰乞聖鑒事竊臣自奉命撫楚數月以來一事未能清理今荷䝉聖恩調撫川省感愧交集雖捐糜頂踵亦不足圖報萬一臣因㑹審入川由蘷順二府以抵成都見沿途居民原係本籍者不過十之二三其餘十有六七非秦即楚有數年來新附入籍者有尚未獲入籍懸待觀望暫為末業者至今歳陸續來蜀者又復絡繹不絶其本地人民地畆原墾闢者不能保其盡無欺隱而外附之民新墾闢者數倍於昔謂其盡巳報出可乎其間安插和輯清查均賦之事良非易易再若城工若軍需皆奉㫖清查案件迄今茫無頭緒而地方命盜事件沉積未結者又復不少於臣到任數日内按察使葛斗南到蜀布政使尚未到任臣巳無肆應之才而値茲民多新附地多新闢賦稅未清沉案疊積番土伊邇夷務孔殷撫臣藩臬皆係新任民情凑雜亟宜整飭吏治懈弛尤須振刷臣之庸碌未能隨事經理左右咸宜此臣之所以兢兢惶悚朝惕而夕懼也兹臣竭力逐次辦理如有可依限完結者臣不臣惟預為請㫖批示遵行庶不致有毫釐千里之差矣臣與馬㑹伯已各面行交代合併陳明謹奏覽汝敷奏情詞朕甚嘉悅何也天下事知難則不難看易殊不易大抵為督撫者但知專閫之榮初未嘗思及統率之難也為君難為臣不易旣知其難故不得不殫竭心力以講求其宜而諸務於是乎就理矣夫為君者撫馭寰區裁成萬彚為臣者奉命宣化分理羣氓茍有一夫不得其所一事一物偶或乖違不恊何莫非其責耶念及此則誠為一大苦境也止可盡此天地父母所生之身思有以利益社稷救濟蒼生巳耳若將此苦趣視為樂境復從而興造無窮之孽豈非苦中増苦釋氏所謂深可悲憫者乎爾其勉之然於一切事雖知其難又不宜稍渉畏縮況辦理惟貴勤誠全不在生踈熟諳原係借衆力而為之一人伎倆能有幾何如朕初即位元二年間實一人不知一事未諳殊覺甚難顧無可辭卸因而坦却胸懐但誠敬對天勤恪遵祖隨事隨物盡心審度以順酬中外之宜數年來始覺稍有頭緒此皆朕一念赤衷感䝉上天聖祖垂佑之所致耳卿今知此但具一忠勤之心盡力行去上天自有鑒照神明或將黙助其中實有莫之為而為者於此根源之理若少見不透一任超羣出衆之才卓越瓌異之資亦終無濟於事也忠誠二字感格人天為最要察吏一節涖政臨民為先務勉之勉之毋忽同日又奏為奏聞事竊臣於六月十三日任事至十九日提臣黄廷桂向臣說前日有一瘋子在城内沿街喊呌說總督岳鍾琪帶領川陜兵丁作反等語被我標下廵風兵丁拏獲我著千總問他滿口胡說像是瘋子我隨著交與成都縣収管臣隨問成都縣知縣王紹文禀稱瘋病得狠其原籍乃四川重慶府長夀縣人名盧宗漢臣思既係瘋人不必留在省城隨牌行成都府縣令押解原籍交與地方官看管毋令出境生事去訖臣思岳鍾琪作反之說揆情度理決無其事但此人若實係瘋病應置勿論倘若假瘋自别有故或另有播弄唆主之人似宜窮治以除姦詭而臣未曾究訊一語即令押交原籍者葢緣川省近來移居之人甚多間雜而處風習民情頗未浹洽捏造謠言無名揭帖一有讐隙便爾誣陷自州縣及省㑹俱不能免若確係生事之人則申刑憲而懲頑囂自不容緩倘未得實據一有見聞驟爾騷擾則無稽之談反使惡徒得計恐非所以禦姦宄而靖囂紛也况邊地甚易訛傳倘衆人不知臣意恐係假瘋所以推求欲究治播弄唆主之人而竟謂新廵撫來窮治總督謀反之事是猶治絲而棼之也寧可令衆庶見乎此臣之所以竟之處而臣甫到川一無耳目見聞即漸有所獲亦必多需時日此又微臣現在之苦況也臣身任邊疆神馳闕下敬瀝愚忱統祈聖鑒謹奏耳目見聞之論朕殊不以為然若能用耳目即道路之人皆可為我之耳目否則左右前後無非蔽明塞聰之輩偏用一二人寄以心腹非善䇿也朕御極之初實一人不識然彼時之耳目甚公且確近數年來股肱心膂大臣多矣而耳目較前反似不及訪察二字不被人所愚弄甚屬難事至於用耳目惟宜於新勉之愼之古云聽言當以理察於博採廣諮中要須平情酌理辨别眞偽方可以言用耳目也雍正五年六月二十九日四川廵撫臣憲德謹奏為奏明事本年六月十九日據提臣黄廷桂向臣告訴拏獲瘋人盧宗漢一事臣隨牌行成都府縣令其押解原籍長壽縣收管緣由於二十四日具摺奏聞後於臣奏摺起程之次日又據成都縣詳稱奉督院批要犯盧宗漢已經本部院具奏請㫖發審今應否解囘長壽縣收管仰再詳請撫都院批示繳奉此理合具文詳請批示等因到臣臣先因不知督臣岳鍾琪奏請發審之事故令押解回籍旣經奏請發審自應覊禁候㫖遵行除批令該縣仍將盧宗漢收禁防守外所有未經押發原籍情由理合繕摺奏聞謹奏巳有㫖矣務將實情審出朕意此事必有從中指使之人也雍正五年八月十八日四川廵撫臣憲徳謹奏為恭報秋成事竊照川省本年夏秋以來雨暘時若田禾暢茂兹查據布政使管承澤詳報成都府所屬各州縣收成十分其重慶遵義順慶敘州等府及嘉眉邛雅等州各報收成十分九分蘷州保寧馬湖等府並潼瀘等州建昌屬之衞所及松潘等衞各報自七分至八九分不等總計全川年景豐稔閭閻安阜我皇上惠養元元無時不念切民依臣恐上厪聖懷謹將各屬秋成分數繕摺奏聞謹奏深慰朕懷凡此皆仰賴上蒼垂庇竝聖祖黙佑之所致我君臣期共加勉勿怠同日又奏為奏明事雍正五年八月十一日准刑部移咨欽奉上諭程如絲名下應追贓銀甚多其原籍家產交與浙江廵撫李衞查明其任所貲財交與四川廵撫憲徳查明勿令絲毫隱匿欽此臣隨傳集布按二司遴選能員連夜搜查程如絲貲財之際有潼商道孟以恂差家人呈報伊從前借去程如絲緞疋首飾等物雖俱照單查収而孟以恂與臣乃兩姨兄弟也臣不敢為之隱飾俟查訊完日一併彚行題報外合先奏聞謹奏孟以恂與蔡珽程如絲皆同心一黨之人伊今若知悔懼將蔡珽等所有過犯盡行吐露無遺則予姑寛倘仍念舊好猶懐比周私情切勿稍顧親誼當嚴加處分蔡珽於朕前保奏孟以恂尤在程如絲之上引見時朕觀其庸碌所以發往巴里坤試用果應朕言平常人也所奏巳悉因私廢公之舉汝斷不為朕信得及同日又奏為奏明事竊臣查康熙六十一年及雍正元年蔡珽任内軍需捐納等事皆錢糧所闗必須質對明白方可定其應追應銷現今查出各款内應訊之蔡珽者六七萬兩臣因蔡珽現在川省是以飭令布按二司逐款查對訊取確供又有現不在川原係經手之遲維臺高其佩馬世珩等所辦冊内止有總數並無作何用去細數無憑定其追銷者現在另疏具題懇乞皇上敕部分别或將人員發川查對或令各造冊發川應俟到日查核各案清楚之日一併彚題又程如絲任所家産現在搜查但程如絲狡猾異常或别為寄頓藏匿皆未可定容俟臣嚴查明白之日即為造報另庫並未入冊者有巳派徴竟無存貯者巳查明據實會㕘矣現在飭令兩司按款訊取確供應俟供上各款合先陳明其餘地方諸務臣竭蹷駑駘挨次辦理其應請訓㫖者容臣節次奏請可也為此謹奏覽同日又奏為仰祈聖鑒簡發能員以裨吏治事伏查川省鹽茶素無成例歴來欺隱者不可勝數臣未到任以前巳經岳鍾琪馬㑹伯檄查臣到任以後亦屢行催查雖産鹽茶各州縣現在紛紛呈報俱謂確無隱遺而自臣視之則未敢信其盡實何則葢歴來章程未定欺有餘而肆應不足雖非茍且之人而於理繁治劇之處恐不能拔本塞源若不為之變通特設專員則鹽茶舊弊不能悉除是以臣商之督臣岳鍾琪具有添設驛鹽道員之奏如䝉俞允更求簡賜練逹明白勤敏能事之員令其速行赴任乗此諸務清查之際力為搜剔庶於一年之内可得大槩而酌其因革損益題請定為章程則商民均便而於國帑大有増益矣臣受恩深重諸務惟望速為辦理而鹽茶一項自揣茫然是以於題疏之外又亟為奏請伏乞皇上睿鑒施行謹奏川省應設驛鹽道一員専司其事准照該撫所請行此缺將尤淸補授該部知道雍正五年十月初一日四川廵撫臣憲德謹奏為冒昧陳情事竊臣至愚極陋謬膺重任每遇地方重務仰頼皇上訓示遵行奈川省去京甚遠凡臣應奏請聖訓之處甚多每一差家人齎奏即包程往返亦必須兩月有餘方能到川如有緊急事件未免曠日持久臣請嗣後凡臣奏摺有非係緊急者臣仍照舊差家人包程齎奏如遇有緊急事件伏乞皇上容臣由驛遞咨兵部轉呈御覽所奉硃批亦即發於兵部限日遞囘則遇緊急事務庶臣可早得奉命遵行不致濡滯失措矣伏乞皇上敕部施行謹奏非闗軍機重務如何其可同日又奏為懇乞簡選賢員赴川委任事竊查從前奉命來川委署試用舉人今俱巳委署於缺出之各縣試用尚有富順等縣各缺因無試用之員俱令現任州縣等員兼攝臣現另疏題請敕部銓選伏思四川距京甚遠且現今來川之人民雲集其為安插稽查丈量開荒以及改土歸流等件皆蜀省現在重務須人料理伏乞皇上揀選應用州縣能事之員共一二十名即命來川以便遇缺委任則於地方諸務料理不致乏員矣為此謹奏於此奏未到之前已諭部矣雍正五年十一月初六日四川廵撫臣憲德謹奏為密陳事竊查建昌一鎮乃番夷環遶雜處之地所賴鎮臣明决果斷能以威懾蠻情地方始得寧謐臣一到川卽聞建昌鎮臣趙儒寬厚過度委靡不振彼地番夷每多玩視今歲冕山之役洮岷協副將王剛實有力焉臣猶未敢盡信乃邇來訪聞得建昌地方十月十一日夜有生員陳萃家被賊夷偷去牛馬各一頭十三日生員王尊爵同子王元敬赴山採樵被賊夷將王元敬綁去將王尊爵砍傷幸不致命十六日寡婦邢氏子曽伯同伴七人入山砍柴被賊夷數十砍傷二人搶去馬匹衣服等物七日之内三次失事則夷人之玩視鎮臣信不誣矣臣身任邊疆馭蠻無術揆之職守允屬睿鑒謹奏將此情節密令岳鍾琪知之爾等督撫共事一方當同心合德彼此視為一體方於地方有益若互相隱瞞則必致誤事矣同日又奏為請㫖事竊查川省田糧歴來欺隱者甚多近來雖有報増亦不過少為塞責並未儘數首報兹自督臣岳鍾琪前撫臣馬㑹伯實力勸諭是以今年報増之數較之往年倍加増益矣前據溫江等五十州縣首報糧銀四千三百五十兩零随經臣題請照例於本年徴收在案嗣於雍正五年七月初五日准户部咨開内閣交出為各省巳墾未報田畆奉上諭朕特沛寬大之恩准各省官民自行出首將從前侵隱之罪悉從寛免其未納之錢糧亦不復追問定限一年令其首報統於雍正七年入額徵解倘逾限不首後經查出在官在民定行從重治罪著各該督撫轉飭地方官通行曉諭等因欽此臣即檄行布政司轉飭各屬大書告示遍貼城市鄉村廣為曉諭去後兹據布政司詳稱今歳各屬首報田糧共應徵銀一萬五千四百兩零先據溫江等州縣送到茅冊共應徵銀四千三百五十兩零米五十石五斗零巳經詳請題明在案尚有未經送到茅冊之各屬共應徵銀一萬一千六十七兩現在檄行催造第恐内有七月初五日奉文以後首報人户雜入冊内未經分析相應通飭各屬將未經奉文以前者仍以詳請通飭等事齎送其應徵銀兩隨冊批解所有奉文以後首報人户應飭知摘出另造清冊填註欽奉上諭事註語統入雍正七年徵解理合詳請核奪以便遵從等情到臣臣惟川省隱田較别省不同别省之欺隱不過十之一二而川省之欺隱則所在皆有且俱隱匿有年又非若他省之初墾隱漏者比也況本年首報之户事同一轍其先行首報者業巳題請於本年徵收而後報人户反得於雍正七年徵收是延挨後報之户更邀恩於急公先報之人矣臣之愚見既䝉皇恩寛其從前欺隱之罪則續行首報之糧亦應一例於本年起徵庶歸畫一但臣愚昧之見未敢草率具題合先奏請皇上指示以便遵行謹奏所見甚屬公當具疏題奏可也同日又奏為欽奉上諭事竊臣接准部咨奉㫖程如絲名下應追贓銀甚多其原籍家產交與浙江廵撫李衞查明其任所貲財交與四川廵撫憲德查明勿令絲毫隱匿欽此臣即檄行布按二司并遴委賢員恊同將程如絲任所所有貲財嚴行搜查臣復親加查訊除搜查過任所貲財現在封固造冊送部另疏具題外查程如絲原籍家産䝉皇上諭㫖雖交與浙江撫臣李衞查明但程如絲現在川中其原籍家產實有若干之處似亦應於本人是問臣不敢謂巳交浙撫自避越爼之嫌是以提取程如絲到案當堂逐一審訊據程如絲供犯官弟兄三人原籍有當舖三所犯官父親將湖州府城内源益字號典一所分與犯官名下二胞弟分得在德清縣榮萬字號典一所三胞弟分得在崑山縣東昇字號典一所其典中本錢因浙地出當絲米本利消長無定難於懸擬犯官所託管當人是姪子程厚并友人王名卿典中銀數分毫皆有賬目一查便知不能隱匿犯官典房及二弟典房俱自置買的惟三弟典房係賃租的住房也是租的至家中田産記得有全柯地方山莊一所此外記不清了再詰其原在典中本銀與歴年贏餘利息及房屋山莊價直并此外另置産業若干豈有不知數目之理再將此處逐一嚴訊據供犯官源益典内本銀原有二萬兩但每年所餘利銀消長不一實在不知確數至房屋山莊價直并此外有無另置産業犯官自㓜在家讀書原不經理家務今出門日久實在記不淸楚等語據此查程如絲所供原籍家産雖無實在確數據伊大畧如是其中有無捏飾隱匿情弊應聽浙江撫臣查勘外所有臣查訊緣由理合奏聞謹奏知道了其原籍家産既經詰訊應將所供僃録咨明浙撫雍正五年十一月十八日四川廵撫臣憲德謹奏為陳奏事竊臣愚昧不職上負聖恩致重犯程如絲在監自縊不但無以仰對兩至四兩不等以供食用自十一月以後經臣向伊當面議定歳給養亷三千兩其銀係撫臣衙門養亷内出二千兩布按二司湊出一千兩按季捐給至其船隻馬匹仍令地方供應葢四川僻壤居多恐雇覓有誤也合併奏聞謹奏知道了雍正六年正月二十二日四川廵撫臣憲徳謹奏為奏聞事竊惟上年川省收成頗稱豐足因商販絡繹買運者不可數計以致秋冬之間米價漸長先據重慶等處地方各官將販運甚多致昂米價等情具報到臣臣因遏糴阻運久奉嚴禁在案是以飭令照常販運不許阻遏去後詎入冬以來重虁二府米價甚是騰貴不但該地方文員節次申詳復於十二月間據重慶鎮臣任國榮及提臣黄廷桂俱移咨到臣内稱遏糴雖奉嚴禁而救弊尤貴變通今川省米石外省之人販運甚多若不急為籌酌必致兵民俱受艱窘等語臣思據實奏聞抑臣更有請者川省各屬倉糧現在分委各道府親徃盤查巳據永寧松茂二道所轄等處具報俱係實貯在倉並無虧空雖川東建昌所轄之處尚未報到諒亦實貯無虧臣恐三四月間米價仍貴請於靑黃不接之際將所屬倉貯米穀酌量發出平糶以濟民食俟秋收照數還倉如䝉俞允或遇應用之時臣一面徑行發糶一面具疏題報合先陳明請㫖以便遵行再僃兵接運之糧石巳於正月二月内自嘉定雅州等處陸續輓運矣其口外購買炒麵雜糧等項亦巳委員前往僃辦至所買出兵馬匹現今交收未完約於二月初旬俱得齊僃矣惟思臣標官兵五百名係派為沿途護糧安站而設現今輓運軍糧採買炒麵等處俱需官兵護送若與大兵同進恐致遲誤臣巳於正月二十日令其先後起程除另疏題報外合併陳明謹奏據奏派遣撫標官兵巳令其先後起程等語類斯軍需事件非爾所素諳當與岳鍾琪熟計而行方是今不候大兵遽令早進邊外青草尚未生發倘致牲畜倒斃寧不誤事乎似此亂舉朕甚憂之况此等事朕經有㫖悉令岳鍾琪督理而摺内乃竝不言及曽否與岳鍾琪咨商㑹同派委之處朕不識爾此舉係遵朕諭或奉部文抑或竟出已見及准岳鍾琪之咨移而行也朕如何批示同日又奏爲據實陳情事竊臣前奏聞建昌賊夷屢行刦竊一摺奉有硃批臣遵即將從前屢刦情節及現今綑去之人已經追出刦去馬匹已經得囘而首犯尚未弋獲等事體皇上同心合德之訓㫖致誤王事也再臣奏聞程如絲在監自縊一摺奉有硃批嚴㫖臣跪讀之下魂膽俱喪俯伏自思置身無地之小鈔到在前五天十月之二十四日部文單行臣署臣得而密之若小鈔則川省之文武大小各衙門皆有一齊俱到一看皆知則是程如絲斬决之信在部文未到之先已宣露五六日矣通省有憑有據臣寧敢捏奏乎且程如絲等詭詐莫測小鈔之前遽得的信亦未可定總之監内防範如果嚴密伊亦烏能自縊臣之所以陳此者不敢推京鈔圖謝一已之罪而京鈔漏洩之弊若此不得不直為皇上陳之以臣愚見不若將提塘一項盡行除革各驛量加夫馬一應公文總自部收部發公文箱内不許容帶私書或可少杜漏洩之弊如果臣言可採伏乞皇上敕部議覆施行謹奏小鈔之洩露朕未料及候再為斟酌降㫖諭部同日又奏為據實奏明事竊照外省督撫衙門除額設經制差承而外尚有吹手執役人等在所必需臣前在湖北撫任時俱係屯丁應役及到川省聞知陜西督撫衙門亦係屯丁承充而川省緣無屯丁是以撫署雜役人等歴係本標兩營兵丁撥充此等人役名雖兵籍身隸公門祗知食糧領餉並不差操臣思衙門各役固不可少而額設標兵豈可濫充虛應臣擬將臣衙門現在各役内凡係兵丁撥充以供差遣如此庶公務不致遲誤而營伍亦無虛糜缺額之弊矣理合據實奏明伏乞皇上睿鑒施行謹奏以營兵充役直省多有此弊悉令歸伍甚是近日據塞楞額亦奏聞撥站之兵一事爾其秉公斟酌料理可也同日又奏為請嚴懲提塘指撞以肅法紀事竊查户刑二部飯食銀兩已經奏明由各省廵撫衙門給批解部者正以杜此外私相與受之弊也先於上年三月内川省解送刑部飯銀一千兩該提塘謝廷傑竟敢於此内扣尅二百兩後因刑部行文催取該提塘不能隱飾具禀到臣經臣移咨兵部斥革提塘並咨刑部嚴拏究追在案嗣又據成都府知府王凝詳稱佛喜指奏銷部費濫派各屬亦經臣據詳題㕘現在審擬是以上年奏銷之期臣僅給批解户部飯銀一千三百兩其餘布政使管承澤並無額外多給至於驛站奏銷行據按察司覆稱訊之經管各書役人等供稱向來並無解送飯費今乃有該提塘謝廷傑等具禀内云户部奏銷飯銀除批解一千三百兩外另有費銀一千六百兩又稱驛站鹽茶奏銷向有飯費銀八百兩各處催逼甚嚴懇賜給發等情到臣以及藩臬兩司臣思此事必係在京提塘串同部吏作姦侵蝕情弊臣不敢隱匿理合據實具奏伏祈皇上敕部嚴懲飭禁施行謹奏此奏甚屬可嘉如此方是天下督撫悉肯如是居心何愁不奏弊絶風清之效也巳交部嚴察矣雍正六年三月初二日四川廵撫臣憲德謹奏為奏聞事竊有奉命來川查勘地畆之高維新等大小各員已於二月内先後抵川伊等當即掣定地方恊同川省四道各為分理其一應查勘事宜臣現在一同悉心籌議務期流土胥安以副皇上視民如傷之至意又准楚省督撫臣邁柱等節次委員攜銀來川招徠情願囘籍之楚民交該委員給發口糧送囘原籍安業是今入川人民去留俱得安堵不致有流離失所之虞矣臣恐上厪聖懷理合繕摺奏聞再川省自冬至春雨水調和現今豆麥暢茂春収豐稔可期合併奏聞謹奏覽奏深慰朕懷但不可肆志當愈加寅畏正巳率屬以敬迓天庥同日又奏為請㫖事竊照建設城垣乃護民之保障遇有坍塌之處自應及時修葺以壯金湯查潘州兩河口城垣營房經臣題請動帑興修巳䝉俞允嗣因川省安插流民與僃兵進藏等事恐一時不能兼顧且彼處尚未駐劄官兵是以復請暫緩興工至松潘城損壞處所亦經督臣岳鍾琪奏准補修隨委員查丈確估去後續據該委員詳稱松潘城堡估計銀七萬一千有竒又據虁州府詳稱蘷郡城垣週圍一千零三十丈僅存十之一二其餘頽塌無存約估工料銀四萬兩有零又准建昌鎮咨稱建昌衞城垣倒塌數處亟宜修理等因又據成都府知府並城守營㕘將報稱成都省㑹之城垣垜口以及馬道礮房等倒塌處所臣屢行駁查今核實估計銀三千餘兩臣以省城所費無多現於歸充公項之鹽茶羨餘銀内飭令驛鹽道動支修葺無庸請帑所以未經題報應俟工竣統奏用過歸公銀兩數目之時核實入奏其餘各處動關數萬餘兩現今僃兵進藏及安插流民等事帑項需用浩繁伏思正定永平等處俱䝉皇上發有修城效力之員臣之愚見懇求皇上訓示容臣另將應修各城工緣由繕疏具題為此謹奏覽雍正六年四月初二日四川廵撫臣憲德謹奏為奏明事竊查四川廵撫衙門向有健丁名糧八十分歷來俱捏開撫臣家人姓名造冊報部以作養贍家口之資自康熙六十年經年羮堯條奏請撥滿洲閒散四十名在廵撫衙門學習事務將此健丁八十名内開出四十名令伊等頂補其餘四十分糧仍係撫臣衙門支領臣查從前廵撫衙門之有此健丁名糧彼時因未議給養亷今䝉皇恩溥及臣等俱賞有養亷則衙門用度巳敷臣請將臣衙門健丁名糧四十分悉行開除召募新丁頂補原額歸於兩營入伍差操庶軍務得收實用錢糧不致虛冒矣俟奉㫖俯允到日臣即召募額兵另造花名清冊送部其餘四十分名糧現係滿洲餘丁頂補理合據實陳明謹奏督撫衙門此數十分名糧可以不用理應開除歸入營伍但爾此舉係效法布蘭㤗之行事不得巳而後奏請也雍正六年六月初四日四川廵撫臣憲德提督臣黄廷桂謹奏為奏聞事竊臣等於本年六月初三日據上年差往义木多坐臺探聽西藏信息千總吳鎮稟稱五月二十日有駐藏之馬兵黄正文齎到欽差大人奏摺三件淸字咨文三角除周大人咨文一角千總派兵由藿爾一帶迎投外逹賴喇嘛奏匣一封顏㕘將禀報二封到义木多千總當即派撥臺兵通事等限一日一夜飛遞乍鴉併傳知乍鴉及巴裏二塘外委隨帶通事蠻人等定限六日飛遞打箭爐由驛呈投憲轅再千總接顏㕘將來字云黄正文齎來奏摺乃係逹賴喇嘛於五月初五日特差阿爾布巴即噶隆貝子同角木隆堪布親迎周大人緣由著千總暗暗偵探果否迎接恐人心難料即著千總覆知該㕘將等語復據黄正文口稱噶隆貝子於本月初四日晚三更即便起身次日大人方知正文行至綠馬嶺遇見噶隆在彼劄營等語千總查綠馬嶺至工布江逹計程八十里由西南進去即係噶隆巢穴噶隆既係逹賴喇嘛差迎周大人何得乘夜潛行其中不無疑似千總當即選派通事給付盤費前去工布一帶假以接彼為名探聽虛實另行禀報去訖等因到臣等該臣等㸔得藏内事宜欽差已經奏聞今據千總吳鎮所禀則是噶隆貝子已離藏逺來其途中情形駐藏諸臣似難盡悉是以臣等先將原禀恭呈御覽嗣後該千總探確一有禀報臣等再行馳奏除専差寄知督臣岳鍾琪理合彚摺奏聞再臣憲德更有請者前因大兵起程進藏又兼烏䝉進兵兩路軍需浩繁川庫各項撥供銀兩除動發之外所存恐將來不敷支用已於四月内㑹同督臣合詞具題請酌撥預僃軍需銀兩迅解來川以應供支續又有喇汝窩雷波等處發兵征勦建昌添設新兵等事伏祈皇上敕部速撥軍需銀兩解川以僃供支謹奏覽奏俱悉撥餉之事已諭部矣雍正六年六月二十九日四川廵撫臣憲德提督臣黃廷桂謹奏為奏聞事雍正六年六月二十九日據駐藏陜西莊浪營㕘將顏清如禀稱本年五月二十一日戌時據阿爾布巴等報稱有頗拉奈帶兵七千有餘由楊八景曲暑等五路前來等情卑職隨具禀督憲在案於二十五日有頗拉奈果領兵由盤玊溝突出至噶巴下營先發兵千餘來攻藏東十五里之噶木旁卡子當有隆布奈領兵拒險堵戰伊等即請卑職同二位大人俱親臨目覩自午至酉未見勝負卑職隨同二位大人令隆布奈好生謹守卡隘卑職等即回西藏於是夜有西藏在卡各兵悉行歸順頗拉奈裏應外合於二十六日辰時頗拉奈統兵奪卡至藏隨令各兵將布逹拉週旋圍住於二十八日有各寺喇嘛已將阿爾布巴隆布奈札拉奈三人獻出交頗拉奈收禁頗拉奈即帶隨從前來向二位大人陳情今二位大人現在將頗拉奈恭順至藏拏獲兇首情由商議具奏外所有前情卑職合先禀明等情到臣據此理合馳奏伏乞聖鑒謹奏據奏駐藏㕘將禀報情形深慰朕懷雍正六年八月二十六日四川廵撫臣憲德謹奏為覆奏事竊臣奏請將臣衙門歷來充役之撫標兵丁盡令歸伍擬於各州縣現役内各取一名在院輪流承値一摺内奉硃批輪流承値殊非長計且有許多不便處當另為籌畫欽此臣查川省自駐劄滿兵以來所有副都統衙門雜役人等歲需工食銀兩歷年係於成都府稅銀内支給臣因各闗稅銀奉㫖儘收儘解未便仍於稅銀内動支隨與督臣兵鍾琪從長酌議查川省各官養廉内有離任之員而接任官未及到任之日尚有截曠銀兩一項原令布政司清查季報以充本省公用之需是以副都統衙門雜役工食銀兩議於此項截曠銀内支給今臣衙門各役内查吹手人役凡行營操練之際原有伊等吹手應差者無庸更換外其餘所充傘扇執事等役之兵丁槩令歸伍差操臣另行召募人役頂補承値其所需工食銀兩臣請亦於各官養廉截曠項内動支給發庶免派擾之煩亦無更換之累矣是否允協伏祈皇上批示遵行謹奏所請可行將此項銀内動支若干數目彚入該省公用冊内報部可也同日又奏為恭報秋成事竊查秋成分數理應奏報兹行據布政使管承澤詳報成都蘷州二府屬收成八九十分不等其重慶保寧順慶叙州龍安遵義等府及嘉眉邛雅潼瀘資綿等州建昌松潘等處所屬之衞所各報秋成自七分至八九十分不等總計全川歲登大有萬姓盈寧現今成都所屬米價倉斗每石僅五錢五分零臣恐上厪聖懷謹此繕摺恭奏再本年五月間松潘茂州等處山水陡發衝壞橋路數處臣隨會同提臣派遣文武員弁前往踏勘併飭布政司於公項内動銀六百兩酌交松潘鎮臣差員修理早報完固都江堰口亦少淤塞臣親往灌縣率員鳩工尅期疏濬田禾人畜並無傷礙合併奏聞謹奏覽秋成分數米價情形朕懷深慰同日又奏為敬陳管見事竊川省歷來鹽茶二項大有欺隱臣恐臬司兼理未必能搜剔根株所以臣一到川任即題請另設専員以司其事巳䝉恩准敕令尤清來川専管鹽驛該道到川巳踰半載臣查雍正五年鹽茶正項照額巳交司庫現今查出耗羨銀兩除奏明賞給督撫及該司養廉數外餘已解交藩庫充為軍需等公用者二萬餘兩較前固已增加然就鹽而論尚不可信無贏餘至就茶而言更難稽查不但臣固茫然即専司之該道亦毫無端委也查現今増出數目不過據各屬之自行首報若有隱匿不報者亦無從搜查臣細思其故葢一人不能遍行州縣挨查之故耳今科道髙維新等在川辦理丈量一事甚屬盡心以臣愚見若令伊等各於分行查丈之時併將鹽茶二項乘便挨查則其所産實數若干官引之外有無私行所納引稅曾否盡報自能徹底清出但又添查鹽茶未必不躭延時日然一勞永逸惟求皇上寬予限期庶積弊可清章程一定則奉行亦易矣臣之管見如斯未知可否倘䝉恩允伏祈皇上特諭施行謹奏此奏不是矣川省鹽茶二項既經特設道員専司其事自應責成該道令其公勤督察期於清楚倘不能勝任即屬溺職當予㕘黜另用賢員今乃言該道亦茫無端委則設立專官何所爲耶至於差往科道京員係為清理地畝以息豪強之爭奪兼安插流民使之得所儘足辦理矣若又將鹽茶等事交與經營便寬予期限豈如該道之久在川省可比稽查過於緊急必致騷擾民間滋生事故脫有遺漏將來反得推卸欽差且據汝奏内搜查挨查之說更屬妄謬鹽茶積弊相沿巳久自應商酌從容清理之法安可如此嚴急從事况今現有苖疆定界西藏運餉諸務何一不資地方辦集觀汝一切料理處過緊而欠通變只圖已身免咎而巳不肯擔承利害實心任事於此一奏心行畢見非朕委信之意也嗣後當深以為戒諸凢必籌畫始終萬全方可舉行即欲秉公執法亦非可乘一時高興率意而為之者敬之勉之雍正六年十一月十六日四川廵撫臣憲德謹奏為士民感沭皇恩樂輸軍糈事今歲川省辦理西藏烏䝉各路軍糈俱先將附近州縣倉穀碾運至秋收動用軍需銀兩買補還倉經臣題明部議允准除辦米州縣已自倉領穀碾運者現在發銀催令買補外有成都府屬之崇慶州原於碾辦之時傳令里民領穀碾辦據各里民詞稱各家俱有現食餘米可應軍務若領穀碾辦恐致遲誤不若先將各家現有之米攢湊應付其穀石暫貯在倉俟用時取領等情申報前來臣隨檄令百姓照數領穀官吏毋得遲累侵扣去後茲據成都府詳稱據署崇慶州申報該州紳衿士民舉人李清霔等詞稱崇慶州僻處川西仰沐聖祖仁皇帝六十餘年深仁厚澤淪肌浹髓復逢我皇上繼統以來勵精圖治念切民生是以雨順風調年登大有兹因西域小醜未平更値南川苖夷狂悖致勞王師所有崇慶州先後共計攢湊過軍需米一千五百石屢奉諭令里民花戸人等赴倉領穀但霔等受恩深厚願效涓埃已攢之米俱踴躍樂輸應領之榖乞留倉積貯等情疊次聯名具呈不巳臣不敢壅於上聞為此據實陳奏㐲乞皇上睿鑒施行謹秦覽崇慶州紳士里民樂輸情詞朕甚為喜悅另有施恩諭㫖由部頒發文到之日僃將朕意宣示可也硃批諭㫖巻一百三十二上欽定四庫全書硃批諭㫖卷一百三十二中硃批憲德奏摺雍正七年正月二十四日四川廵撫臣憲德謹奏爲恭謝天恩事竊臣齎摺人回恭捧御賜臣福字一幅貂皮二十張平安丸一千丸風羊一隻哈蜜瓜一箇到臣隨恭設香案望闕叩頭祗領訖又接家信知臣次子查哈燕䝉國恩永世巳難圖報兼之臣本庸愚謬膺重任未有寸長之效每多叢脞之尤荷䝉聖主洪恩格外矜全寛宥復邀殊寵洊加及於臣子臣父子雖捐糜頂踵亦不足仰答萬一惟臣子查哈燕年幼質愚未曾經歴世務而於鞍馬奔走之役尚堪驅策若在旗下行走終屬少效犬馬則不但臣父子荷沭生成之恩卽臣之祖父亦重沾高厚之恩於靡既矣爲此繕摺恭謝天恩謹奏覽同日又奏爲奏聞拏獲重犯事雍正六年十二月二十三日據直隸逹州知州孫廷正報稱拏獲遊僧一名正空本名淨一道人係奏請誅大逆案内通緝查拏之犯相應詳報等情前來臣隨批行按察司飛飭㑹委文武官弁多撥兵役嚴行押解至省遵照原行部議委員解部并僃原供飛咨刑部外相應奏聞謹奏據奏巳有㫖諭部矣此等莫視為偶然倖致若非上邀神明許一是字不能有此事機巧㑹也勉之勉之聞南川縣令王國定聲名甚劣爾其詳加察訪果係劣員援㫖嚴㕘示懲如風聞之言不實其人猶有可取處毋令橫被寃抑又諭同日又奏為據實補奏仰祈聖鑒事竊查崇慶州紳衿士民樂輸軍需米石經臣據情奏請荷䝉恩㫖將崇慶州雍正七年分額徵錢糧全行蠲免此聖主特施之洪恩從古未有之曠典也臣隨欽遵諭㫖傳集崇慶州在省之紳衿士庶及本城官民人等當面詳悉宣布聖意並令成都府知府王􅕵親往該州遍行曉諭兹據闔州紳衿士庶歡呼感戴踴躍環籲呈請叩謝天恩除另疏代題恭謝外臣查先於上年九月間有瀘州里民王在廷曾經具呈該州據稱皇恩浩大歲値豐登各民俱有餘穀今攢湊軍糈情願捐輸不領倉穀等情由司轉詳到臣臣因建昌永寧各路軍糧多出深山峻嶺俱係派撥就近州縣里民背運自到站背米之日始發運價其餘往返盤費以及鞋脚衣物皆里民自僃而瀘州里民亦在派撥之内臣愚意謂不便再令捐輸是以好言奬其急公未曾允其所請亦未代為奏聞後至十一月又據崇慶州里民具呈樂輸臣查崇慶州並未派夫背運故敢據情奏請一同急公樂義之小民臣並不敢岐視有奏有不奏也今䝉聖澤覃敷恩施格外是以臣將從前瀘民急公報效之誠臣先未曾代為轉奏實情不敢不補行奏聞為此謹奏補行奏聞始不没瀘民急公之誠朕嘉是覽之君臣之間惟貴眞實相孚凡渉矯情回護皆屬不忠其中設有干礙政體民情處不妨於大廷廣衆中斟酌講求以期盡善股肱心膂之間何嫌何疑之有所事候㫖諭部雍正七年二月初十日四川廵撫臣憲德謹奏為密行奏聞事竊查川省丈量地畝一事於雍正六年夏間未曾開丈之先御史吳鳴虞即頒示松茂道屬之州縣明朝原納錢糧舊額數目諭令復額臣以丈量地畝必俟清丈之後計其增出之數諭令百姓輸納錢糧自然俯首無詞若未行丈量先開明時額數期以復額而止是查丈端為復額矣且川南川東等處同一丈量並不言及復額獨川西一隅為然百姓未有不驚慌者臣即面㑹該御史婉言致之復額之舉因為中止續於開丈之初又出一告示諭令百姓各將屋基墳墓界埂水溝園林五項一體丈量輸納臣查川南川東等處俱除此五項免其丈量百姓帖然今松茂道屬獨加丈此五項無惑乎百姓之皇皇也臣隨面商該御史議令免除獨園林一項零星者免丈若有成塊廣種之地則所産較田畝更肥相應一體查丈臣另通行告示外屢據護松茂道事成都府知府王􅕵禀稱該御史種種苛索政聲狼藉民怨沸騰等情至新任松茂道髙紱到任後面禀亦與王􅕵約畧相同與臣訪聞無異兹於本年二月初十日又據高紱王􅕵等禀稱御史吳鳴虞於各州縣丈量時並不用各州縣之弓算手惟用伊所挑定弓算手數人帶往任意丈量凡查丈之處每畝索銀五釐係弓算手經收與伊家人分得地方官不能申禁並各開呈該御史贓劣款蹟到臣臣不敢壅於上聞謹將高紱王􅕵所投呈詞繕摺密奏伏乞皇上睿鑒施行謹奏不徇不隱殊屬可嘉已有㫖矣同日又奏為奏聞已㕘之知府通揭鎮臣事竊臣查保寧府知府吳應濟於上年冬月奉委前往松潘料估城工不意在彼敗行多端物議沸騰甚至釀成人命已故守僃馮國禮之妾何氏及何氏之子馮君詔二人身死不明案據何氏長子生員馮君裕告發臣於正月二十六日具疏題㕘矣詎料伊自知所犯之法决無不㕘之理即於臣拜疏題㕘之日忽以松潘鎮臣張元佐修葺住宅私用倒塌城工磚石等事通揭到臣臣伏查鎮臣張元佐如果有私用城工磚石之事吳應濟在彼查勘時何無一言申報即回省半月有餘經臣幾次當司道面前問及城工併何氏母子身死等事亦未言及一語其通揭呈詞毫未切實所有吳應濟通揭鎮臣張元佐情由臣不敢隱蔽謹另繕摺附呈御覽伏乞皇上睿鑒批示遵行謹奏此奏是已有㫖矣雍正七年二月二十二日四川廵撫臣憲德謹奏為據揭陳奏事雍正七年二月二十日據成都府知府王􅕵詳稱四川學政宋在詩於本年二月科試成都府十七日考試成都縣文童首題出子欲居九夷或曰陋如之何子曰君子居之何陋之有題面生疎罔顧諱避卑府職司提調曷敢緘黙不言理合據實開揭等情嗣准宋在詩咨稱視學全川嵗科兩考以及觀風月課覆試補考拔貢歳貢並武生武童出題約有數千既避前院已出之題又避各府州縣之題又避極熟習易於鈔襲之題是以不能字斟句酌使皆歸於冠冕等語臣不敢隱蔽為此據實具奏伏乞皇上睿鑒施行謹奏經書中類此等句有何可避諱處乃王􅕵多事過於苛求耳當再三訓飭之但宋在詩係無能為之人恐於整飭學政約束士子處善柔沽譽因循委靡之疵或不能免兩年以來聲名何如據實奏聞同日又奏為請㫖事竊臣准川北鎮臣張成隆咨稱雍正七年二月初八日據廵查兵役等報稱府城内外百姓因聞保寧府知府吳應濟被㕘各街舖面俱各闗閉未開等語據此當經傳諭閬中縣吩咐照常開張訖隨於初九日據郡城内外商民百十餘人具詞籲懇轉請題留前來除將罷市請留情由並呈咨督提外相應咨明等因到臣看此罷市籲懇請留是臣之題㕘吳應濟似有寃抑情事臣不得不據實陳之查吳應濟居官甚屬平常臣於雍正六年九月初八日接奉甄别知府之上諭後不數日内臣即寄札於督臣岳鍾琪云保寧府知府吳應濟察吏之才似屬不足相應題請改補督臣亦札覆云吳應濟現在委赴松潘查勘城工將此缺預選賢能二員擬定正陪即為示知俟吳應濟事竣之日再為斟酌保題改補等語是吳應濟之才力不及方在督撫議欲遵㫖題請改補之内有何德澤深入民心直至罷市具詞籲懇題請也且何氏母子身死不明一案現有屍子馮君裕指名控告臣身任封疆寧有遇如此事件而不據實題㕘者乎至臣之與松潘鎮臣張元佐雖同任西蜀從未覿面祗以張元佐勤敏誠實馭兵有方臣深重之歲時往返修書致意而已吳應濟在松潘之耶疏題㕘是臣之㕘吳應濟緣伊自為招尤屍子指名控告初不在張元佐之寄札與否也伊乃疑係松潘可問矣今又有保寧罷市懇留吳應濟一事臣不敢謂必係伊之賄囑指使然臣亦不敢盡信謂必懇乞皇上另派賢員秉公審理自必水落石出如果臣有寃抑題㕘知府之處臣罪自不容逭無庸臣之置辯也至欲為撫臣寃抑題㕘之證據其情更堪髮指統祈皇上睿鑒施行謹奏覽雍正七年四月初二日四川廵撫臣憲德謹奏為奏聞雨澤事竊查川省自正月以至三月雨水調勻春花茂盛及今二麥漸次登場已見春收豐稔農人皆趁此雨澤霑濡土膏滋潤之候播種耕耘及時力作伏思我皇上念切民依時厪聖慮今雨暘時若皆我皇上重農貴粟有以感召天和故雨澤頻施為春田長養之資以慰聖天子祈榖祈年之意也所有川省今春雨澤霑足緣由理合奏聞謹奏秋收後方可言其必然也今但益加誠敬以迓天庥切勿稍有肆志同日又奏為遵㫖覆奏事竊臣前奏拏獲淨一道人一摺内奉硃批聞南川縣令王國定聲名甚劣爾其詳加察訪果係劣員援㫖嚴㕘示懲如風聞之言不實其人猶有可取處毋令横被寃抑欽此臣查南川縣知縣王國定原係貪劣之員先因縣民王朝宣將糧民程自玉等墾熟田地捏報荒田赴縣請照認墾王國定得贓給照後被告發經臣於雍正五年十一月具疏題㕘奉㫖革職審擬於雍正六年五月審明得贓并縱容家人衙役勒索婪贓是實已照律擬題准部覆奉㫖依議欽遵發落追贓訖於雍正六年十一月初六日給咨押解遞囘湖南永州府零陵縣原籍在案理合囘奏伏乞皇上睿鑒施行謹奏此案朕偶爾遺忘今覽奏巳悉從來是非原有公論即此亦可見人言之不謬也雍正七年五月二十二日四川廵撫臣憲德提督臣黃廷桂謹奏為奏聞事雍正七年五月十九日據順慶府詳據蓬州詳稱吏目夏賢禀稱本年五月十二日舟口總來禀說有二人來官店住下粘貼曉諭一張不知其人來歴特來報明後有一人突至州㕔持順天廵察世襲侯王官銜字條並拏忠心報國勸世曉諭命我實貼州城外并開盜賊及造假銀人名數箇仰蓬州捕衙差拏職隨過舟口見他說係平凉侯王進保之孫去歲三月岳公爺薦他到貴州總統張老爺做謀士今歲三月又奉㫖到貴州命他廵察天下自貴州由重慶合州岳池至蓬州看他語言支離行止不像侯位體段請他進州細加詢問彼云奉㫖廵察但並無㫖意又云貴州總統委來又無委票又問有何憑據彼云㫖意在身上職即求看彼解衣職看前心刺書墨字一行赤膽奉明君後心刺書墨字三行中行忠心報國效右行報國撫民左行忠心大孝右脇墨刺定國二字左脇墨刺安邦二字窺其動作覺似蠱國害民之徒隨即鎖拘收事闗假冒先行飛報一面差役人文並解等情又據順慶營遊擊李鶴報稱據駐防蓬州把總張惠禀稱本月十二日有假冐欽差大人名呌王三清係貴州定遠府人在舟子口貼勸農告示一張同日又至蓬州舟口有蓬州夏吏目在舟口請到店内安住有防汛廵街管隊張朋兵丁曾聯捷二人一同到店問其奉㫖情由有何憑據伊云有牌票在身上即脫去衣服其前心後心左右兩脇俱刺有墨字夏吏目隨後到店一見此事將假充欽差之人帶至衙内眼同開看包袱内有木印一顆鐡尺一把算命書一本䥷藥刀一把交與該州吏目審訊並不招認語言狂誕吏目隨即監禁將舟子口勸農告示並搜出木印等項俱存吏目衙内相應禀明等情禀報到職為此専差稟明等因各到臣等該臣等看得姦民王三清舉止狂逆語言悖謬更遍身捏刺墨字妄誕惑衆實屬逆惡渠魁巻查上年有姦民張熙報遞逆書一案今春三月間准湖廣撫提二臣咨據辰沅靖道王柔拏解匪類許英賢等訊供各犯等因移查緝捕前來今被獲之王三清行蹤詭祕不法或係張熙案内要犯或係許英賢等所供渠惡均未可定臣等不敢隱蔽理合㑹同據實奏聞抑臣憲德更有請者姦民王三清是否張熙及許英賢等兩案内正犯雖尚待嚴訊但其語言舉止悖逆已屬顯然應否解部嚴審抑或仍命臣究擬之處理合恭請訓示遵行謹奏捉獲姦民未經訊究遂疑為張熙許英賢案内之犯殊屬可笑之想汝等意謂但係匪類即不出此二案乎前二案並非聚衆謀為不軌之事可比何識見卑陋至於此極乃欲稽延時日解部卸責更屬可笑矣速將王三清嚴審務須徹底窮究定擬具奏若審係小事不必題疏仍即具摺奏聞可也此緝獲之員弁兵役等當重加奬賞以鼔勵之四川廵撫臣憲德署松茂道給事中臣髙維新謹奏爲請㫖事竊查川中清丈田地臣高維新分辦永寧道屬地方按其户口次第清理其丈過田地數目臣憲德業經代為題明在案查永寧道屬州縣十五處建武㕔九姓司二處新舊承糧業户共五萬四千九百三户内有二百五十七户其承種田地經中書勘丈按之量冊共缺糧六十四石八斗零再三詢問緣由或係溝峽之田曽遇山水陡發沃壤半為石沙或係愿樸鄉民不知畝數因屢次自首隨衆報増及至丈量始知田少糧多又查有糧冊無名三百九十七户共田地八十二頃六十四畝零或係山嶺灣曲人蹟罕至之處内藏塊段或係香火田地廟宇毁圯借以影射經中書勘丈共應徵糧一百五十五石八斗零其餘五萬四千二百四十九户雖皆糧冊有名然多係隱漏田畝之户現在丈出一萬六千二百四十九頃零悉皆按照各州縣科則核令加增造冊至田少糧多之户歴來州縣官徵收錢糧惟知照額徵比原未問及畝數今丈量地畝始能逐户分析雖總計不及百分之一然民隱攸闗不敢緘黙臣等面相㑹商凡欺隱之户既皆令其按畝輸糧所有田少糧多之户亦應照畝徵收始得均平但開除錢糧出自皇上洪恩非臣等所敢擅便也再查建昌松茂川東各道較之永寧道所屬地方既廣户口更多其中或有田少糧多之户亦未可定均應沾沐皇恩合併奏請如臣等言果不謬伏乞皇上敕部議覆施行為此謹奏此事交怡親王大學士等詳議候㫖遵行四川廵撫臣憲德謹奏為請㫖事竊查川省前因懸缺甚多䝉皇上簡發人員陸續來川隨到隨補及今委署已完尚有州縣十七缺經臣題請歸部銓選在案但一省之内各官陞遷事故不時皆有現在缺多員少半係一官兩印兼攝署理恐顧此失彼難免貽誤之愆臣仰懇聖恩將臣題請歸部銓選之十七缺敕部催令速赴新任此外再懇於候補候選州縣内簡發一二十員來川俾臣得以委署試用庶地方不致懸缺待人屬員無兼攝曠官之慮矣再臣查丈量欽差科道等所帶中書等官在川已經一載有餘且上年於春耕停丈時經臣奏請借署各州縣印務其於川省地方多曽經歴臣不揣冒昧可否俟伊等丈量造冊事竣後留川令臣就其人地相宜酌量補用出自聖慈抑臣更有請者川省佐貳雜職内現出二十八缺内有已選而未到任者亦有尚未銓選者懸缺視正印為更多查別省州有州同州判吏目縣有縣丞主簿典史佐理多人偶有一缺尚可兼署至若川省凡州牧外多止吏目凡縣令外盡止典史且有如建始汶川保縣等縣止有知縣一員並無典史者目今州縣或經兼併地方或經開闢田畝加増課稅其分廵協辦署理尚屬無人需員尤為孔急臣愚欲再懇聖慈併將候補候選雜職内揀選二三十員勒限來川使臣分别委用則正佐俱無空缺似於地方大有禆益也臣因地方起見瑣屑陳奏伏乞皇上睿鑒施行謹奏前據趙𢎞恩奏請經朕允准隨命揀發十五員來川矣今又諭部揀選州縣佐貳等員候得人時陸續發往同日又奏為請㫖事竊查川省丈量一事前䝉皇上欽差科道諸臣來川㑹同四道分路查丈今永寧道屬早巳告竣經臣題報在案建昌道屬亦已將完松茂道屬所有吳鳴虞勘丈未完不妥之處業䝉皇上敕令給事中高維新現在料理庶無違誤惟是川東道屬係御史吳濤辦理據臣看得川東所屬乃重蘷保順四府地方較之永寧等三道所轄本屬遼濶而吳濤辦理又稍迂鈍誠恐完功既遲而造冊之時核算丈出田畝照各州縣科則增徵錢糧數目更滋繁劇臣不揣愚昧仰懇聖慈敕下工科給事中馬維翰令其於建昌道屬丈完查造事畢即至川東幫同吳濤恊辦查丈造冊核糧等事庶得妥恊告竣不致遲延舛錯矣是否可行伏乞皇上睿鑒施行謹奏此奏是照所請令馬維翰協辦可也同日又奏為遵㫖覆奏事竊臣前奏成都府知府王􅕵揭報學政宋在詩一摺奉有硃批臣隨傳集司道及該府王􅕵面加訓誨諄諄敎導詎意王􅕵全不改悔又復妄言高維新因嗔惱㕘奏吳鳴虞意圖報復等語又於臣考驗騎射衆目之地放縱無禮酣睡座傍是以臣即具疏題㕘在案至宋在詩誠如㫖詢問理合據實囘奏伏乞皇上睿鑒施行謹奏題㕘王􅕵一疏已有㫖矣似此使氣陵下性情當深以為戒凡渉驕傲自大乃屬𥚹淺小人之態度切不可蹈汝等封疆重任惟當以公正和平含𢎞寛恕為務若好較量區區目前小節未有不至失體招尤者且不但有礙國家體統亦非自全之道須威而不猛和而不流方稱善於御下然非大智慧人不能也勉之同日又奏爲恭謝天恩事本年四月臣齎摺人囘川知臣子查哈燕䝉皇上特放侍衞臣聞信之下不勝感激惶悚恭設香案望闕叩頭謝恩竊以臣之疎庸既䝉皇上委畀封疆重任以臣子之謭劣復荷皇恩使其侍直内廷父子䝉恩實聖主寵施格外臣銘心不盡圖報難名惟有寄囑臣子令其黽勉供職矢志辛勤以仰答天恩於萬一耳所有微臣感激私忱理合繕摺恭謝天恩謹奏覽奏謝知道了以汝族分而論應有一二人在内廷執事今選汝子為侍衞可寄信時加敎訓令其黽勉成人同日又奏爲恭請陛見事竊臣庸劣菲材䝉皇上隆恩不次超擢由部曹而畀以封疆恩深任重報稱維艱幸荷聖主裁成之德遇事必加訓誨欲使臣知所遵循以供職守臣感深刻骨念切瞻天雖每接諭㫖於拜讀之下不違咫尺而瞻仰天顔之念究未能少釋兹値西藏烏䝉皆已仰仗天威蕩平奏凱丈量之事現已陸續告竣至安插一節業經分咨各原籍此時流寓多係依親傍友營生有業之人俟各省查覆到日辦理亦易川省目今庶務似稍緩於去年而微臣依戀私衷實倍殷於往日伏懇皇上准臣於八月内自川起程進京陛見俾臣得跪請聖安親承訓㫖則臣瞻戀愚忱庶可少伸萬一也爲此繕摺請㫖伏乞皇上睿鑒批示遵行謹奏陛見之行今且不必如有訓諭自於奏摺内不時批發爾來不過為君臣相見之小節地方要緊再料理二三年自然召爾來京也雍正七年六月十一日四川廵撫臣憲德謹奏爲密奏事竊川省重慶府合州劣紳捐納副使道職銜李亨時者於雍正五年内經前撫臣法敏以狂悖兇滛等事列款題㕘奉㫖革去職銜嚴審定擬欽遵在案嗣因㕘款内要犯鎮雄土司隴慶侯尚在貴州聽審各案經臣移咨雲貴督臣俟彼案審明之日移解來川質審後於雍正六年十月内准雲貴督臣鄂爾泰將隴慶侯移解到川臣隨發承審官取供質審今於本年四月内據布按二司將李亨時一案會審招解前來臣覆加親審查招内供情甚是不符問擬均屬不當臣即逐款駁飭司道㑹同確審另擬去訖但臣於親審訊供之下據李亨時供稱伊所娶係宗室之女今尚在京城等語臣聞之不勝駭異隨詰問其旗色佐領姓名據稱係滿洲姓名記不清楚復詰其居住何處據稱在西華門外騾馬市居住等語臣思宗室之女從未聞有許配外省民籍之人今聞既有住址地名伏祈室之女則李亨時似不便於外省審結可否將本案各犯供情僃録送部將李亨時嚴拏押解赴京敕部定擬完結之處伏乞皇上睿鑒批示遵行謹奏果否聘娶宗室之女與彼原案無渉此奏可謂荒謬之至朕實不解堪發一大笑雍正七年閏七月十三日四川廵撫臣憲德給事中臣高維新馬維翰御史臣吳濤謹奏為請㫖事查得歴來川省田地其頃畝欺隱科則混淆俱毫無定凖荷䝉皇上念切民依爰命科道臣等來川分路清理今辦理永寧道屬臣高維新辦理建昌道屬臣馬維翰已先後告竣丈過數目俱經臣憲德題明在案兹查各屬徵糧科則輕重懸殊未獲平允臣等仰體我皇上愛養黎元一視同仁之至意公同商酌除科則均平之各州縣仍照舊則徵收無庸另議外其科則原重之田地凡屬接壤地方宜令相等容商同司道於就近適中之處一體比照科算其糧輕之處亦應令其按則增添俾小民不致偏枯再川省徵糧之例先按畆分派糧數後以糧石科算條糧銀數又將糧石載丁再於每丁科銀若干轉折合併始得每畆應徵銀數愚民無知不能盡曉算法其中胥役灑派侵漁之弊實所不免並請嗣後徵糧不必輾轉折算竟以每畝該徵丁條糧共銀若干使通省畫一易曉無致參差庶川省田地頃畝既無混淆而科則亦得平允矣至川省丈量一事係通省清釐要務將來永遠遵行不特冊籍繁多而考核更定尤須愼重周詳今丈出頃畝雖有數目因科則未定難以造冊且現在給發聯票民間又有續首零星田地俱應一體入冊若得於年内議定各則庶丈出地糧可自庚戌年按限徵輸事關錢糧定額臣等未敢冒昧謹㑹商合詞陳請如有可採伏乞皇上批示臣等迅即酌量比照定則合詞具題仰祈睿鑒敕部議覆以便遵奉施行謹奏所奏甚是已交該部議覆矣四川廵撫臣憲德奏為奏聞事竊查蜀省川東所屬地方遼濶民俗刁頑而御史吳濤才稍遲鈍臣恐辦理稽延將來造冊核糧更屬費事是以前經奏請令馬維翰協同辦理巳䝉聖慈俞允馬維翰遵即起程赴川東協辦去訖但馬維翰赴彼未幾從前吳濤查丈過地方多有不妥今據蘷州府禀報萬縣里民聚集多人聲稱丈量不公糧耗過重扯旗申訴等語臣即委署按察司事高維新前去曉諭安輯并囑令密拏為首姦徒嚴加懲治再查前因分辦川西御史吳鳴虞奉行不善䝉諭㫖將伊勘丈未完不妥之處敕令高維新辦理伊即親往潼綿等處明白開示現巳漸次清理川西丈量之事大約於臣出場後即可具題報竣臣請川東各屬如有馬維翰吳濤未能遍歴之處亦令高維新協同分辦庶使遼濶之地得及時告竣而姦民不致恣肆妄行矣理合繕摺奏聞伏乞皇上睿鑒施行謹奏川東地畆亦令協辦甚好朕未料高維新能如是敏事亦未料餘人如是無能辜負朕之委任也同日又奏爲請留熟練能員禆益地方事竊查川省屆在邊圉庶務緊要分猷辦理實藉熟練之員臣查保縣知縣今陞廣西桂林府同知張泰國居官謹愼歴經委辦糧運及赴西藏屢效勤勞目今奉文建設吹音堡三渡營房臣以該員熟悉邊境現在委令查勘料估伏乞皇上恩准以陞銜暫留原任候川省有同知缺出題補再各屬丁憂囘籍人員内有雲南舉人李旭楊重光係雍正二年内命往川省委署試用之員歴經委署各任俱能勤愼供職實心辦事又貴州舉人陳旭係原任蓬溪縣知縣明白幹練前經委辦軍糧勤勞無悞查此三員現在俱已囘籍守制臣愚欲仰懇皇上洪慈准令即來川省委署題補則該員既得駕輕就熟裨益地方而臣亦得收臂指之效矣再有建昌衞裁缺守僃孫之爵寧番衞裁缺守僃胡漪因建昌改設府縣俱應赴部另補但該員等前經委赴結覺沙罵等處軍前隨營辦理糧運俱能盡心無悞且久任邉境熟悉夷情今川省現在新設雷波衞所有缺可補并懇聖慈亦准留川補用則於邊方要缺更屬相宜倘䝉俞允其胡漪孫之爵二員容臣即於新設之雷波衞所酌量一員另疏題補其一員遇有缺出再行補用臣為地方起見冒昧陳奏伏乞皇上睿鑒施行謹奏候交該部議覆有㫖同日又奏為請㫖事竊查川省向來糧冊紊亂無章目今丈量逐漸告竣頃畝界址徹底清釐巳與向時冊籍㢠别各府州縣所有原冊盡置無用均須另為改造始足以定章程而垂永久但此番更造逹部存司送院以及各州縣衞徵糧底冊爲數繁多其紙張飯食人工等項通省計算爲費不貲各屬中遂有議於每户派取以作此項費用者臣已嚴飭禁約不許擾累民間再四思維川中公項現止有鹽茶耗羡一項仰請皇恩將造冊之費在於鹽茶耗羨内酌量動用事竣核實報部庶公務得以就理里民不致紛擾矣至此番查文冊籍尤繫更易攷定永遠遵循之事若聽各府州縣仍於各該處造送則地遠勢隔恐未能畫一臣擬俟科場畢後於貢院内設立總局將報部存司送院以及各州縣衞徵糧各冊彚齊攢造派委賢員承督經理造齎欽差等彚總核正俾得通省畫一不致差訛伏乞恩鑒訓示以便遵奉施行謹奏此番攅造冊籍甚屬緊要候另有諭㫖同日又奏爲恭䝉聖訓敬陳愚悃事竊臣前覆奏遵㫖敎訓成都府知府王􅕵一摺奉有硃批臣跪讀之下感激痛心不禁淚從中出聖訓諄諄不但父母敎子之言無以踰此即父母愛子之心亦無以踰此矣臣不獨心切畏懼不敢有違聖訓即具有人心稍知感激者亦何忍有違聖訓也惟有矢敬矢誠兢業自持深以使氣陵下為戒以期無負我皇上訓勉洪恩於萬一耳所有臣恭䝉聖訓感激愚悃謹繕摺敬陳伏乞睿鑒謹奏尚氣二字亦非汝一人為然乃滿洲人員之通病亟當悛改者雍正七年閏七月二十日四川廵撫臣憲德提督臣黄廷桂謹奏爲請㫖事竊查新設栢香靖遠永定等處修築城垣營房一事行據寧遠府約估銀六萬九千餘兩通報經督臣岳鍾琪駁飭㑹委文武再行逐處確估定議現在另委文武各員挨次㑹勘確估兹據建昌鎮臣趙儒咨稱查新設之栢香靖遠等營添設官兵雖已飭令分撥派往因未築城葢房衆兵露處俱各懇切具呈該營將僃轉請咨商迅即委員僃辦工料早建城房俾得安處等情但營汛遼濶營造之頭緒繁多每至一處動需匝月方能估報必致蹉跎時日轉盼入冬土脈不堅難以築城所需料物等項必須早為僃辦方能濟用似應預為籌畫況營制已定汛防已設則建造城垣修葢營房尤不可緩等因咨商到臣等臣等公同商酌趙儒所議似屬允協仰懇天恩敕部先撥庫銀二三萬兩檄發該管地方各官先期僃料俟所委各員確估詳報定議具題之後即可動工修築其不敷銀兩一併題請補撥統於工竣之時造冊核銷在公帑原無糜費而城垣營房即可及時建造矣理合繕摺㑹奏伏乞聖鑒施行謹奏據奏撥帑辦料已有㫖諭部矣雍正七年閏七月二十六日四川廵撫臣憲德謹奏爲懇恩敕議事竊查川省屆在邊方歴來命盜案件上下各官因循茍且外結者多題逹者少是以通省州縣設立監獄者十無二三至若主守廵邏人役均非經制額設給有工食之人率皆百姓掛名輪流應値是以間有監犯越獄之事臣於雍正五年十二月内接准部咨奉㫖各處越獄之風尚未止息著各省督撫按察司各就所見應如何料理可免重犯疎縱之處令各具本陳奏欽此移咨到臣隨將川省各該州縣監獄俱未齊全禁卒更夫名數俱未額定請動用正項錢糧修建召募設立等因陳奏在案迄今一載有餘尚未准有部覆葢緣此事係奉㫖著各省督撫臬司陳奏令九卿斟酌定例之案部内自必彚齊各省章奏始會同九卿定例是以一時未得即行議覆但川省非若各省原有監獄禁卒齊全者可比即奉准行清查估計建造召募尚需時日臣不揣冐昧伏懇皇上敕部將川省請建監獄一案先為議覆俾得奉文修建及早舉行工竣核實報銷則囹圄堅固防範謹嚴罪犯無虞疎縱矣為此具奏伏乞皇上睿鑒施行謹奏有㫖諭部照所請行矣爾其酌量即行料理可也同日又奏為奏聞事竊臣前因分辦川東丈量御史吳濤辦理遲鈍所以奏請令馬維翰協同辦理嗣據蘷州府禀報萬縣里民聚衆扯旗聲言丈量不公臣復委署按察司高維新前往曉諭安輯先後繕摺奏聞續於高維新尚未到彼之先巳據蘷州府及蘷恊遊擊禀稱該員等會同齊至萬縣訓諭開導衆民感悟解散現在領單另首各回安業等語兹於閏七月十六日准工科給事中馬維翰移㑹為移明代奏事本科昨於七月初六日至重慶府恊辦川東丈量事務面見吳濤當經詳問據稱各處俱巳竣事止有一兩處未完即日親赴忠州查勘等語本科因經由榮昌永川等縣察聽一路傳聞尚無一處清楚了結又各業户呈訴絡繹未敢遽信為實隨詳問川東道陸賜書稱因奉委各處查採欽工楠木敬謹辦理丈量事宜未能同往查勘自五月後據各州縣將從前開摺具報御史吳濤田地數目照所頒冊式合總齎投查各總冊開載田地率多混淆失實并多苛刻巳陸續駁查并提取底冊查對當經會同本科分頭將各州縣首呈丈冊等項逐一稽查見各冊開載多係約畧估首並無弓口細冊且混將石嶺石坡難以開懇之山概行填凑頃畝種種舛謬不可枚舉因迅委庶吉士中書等分往各處覆勘一面即將巴縣十二里各冊查核計不敷原糧之冊共三千三百九十八户現令署縣王愿覆勘的係所報不實但向係因糧算田其間亦有實係缺額者總因各處從前俱責令約估多首並無四至弓口或一二倍至三四倍不等且有執一户欺隱勒令通里照數呈首與頒定條約顯然違背民間自不能帖服連日人言藉藉傳聞萬縣姦民糾衆喧囂所有吳濤從前丈量不妥之處理合據實移明希煩查照迅即奏聞等因看此是川東丈量不妥之處不止萬縣若令高維新馬維翰在彼幫同吳濤協辦則先後依違不無掣肘恐於公事無益仰懇聖慈敕令高維新馬維翰専任辦理川東丈量事務將吳濤以前丈量不妥之處盡行秉公清查改正庶得允協輿情丈量妥適矣為此繕摺奏聞伏乞皇上睿鑒施行謹奏已有㫖矣似此辦理無術不妥之員事畢一一分別㕘奏以聞雍正七年九月二十一日四川廵撫臣憲德謹奏為奏聞事雍正七年閏七月十八日據護蘷協遊擊報稱建始縣民向京甲等呈稱有容美司差黄廵簿田前營帶領三十餘人至李家壩等處欲將各處居民一併驅入土司伊等連夜奔逃至景陽大里地方暫住禀求安插等語並據蘷州府報同前由隨飭司轉行蘷州府將逃竄人民善加撫恤並會同提臣移咨湖廣督臣邁柱嚴飭容美司不得越境滋擾即有雜處内地土人著將姓名户口查明實據移咨過川㑹委文武逐一確查起發使流土相安不致驚擾去後嗣准邁柱咨據彝陵鎮呈報移查前來隨將先據蘷郡文武呈報即行司轉飭善加撫輯安業並經會咨緣由咨覆訖又於八月二十七日據蘷州府轉據建始縣報稱草塘壩地方居民三福保等五户被土司驅入其餘驚散逃避者五十三户候示安頓等語隨又飛咨湖廣督臣邁柱轉飭容美司將驅入之建民三福保等各照名口放囘安業並飭遵照定界不得擅自出入俾驚散之户仍回原地方安業等因俟查明移㑹到日分别安插外理合先行奏聞再查建民所受容美司劄付經臣會同提臣黄廷桂兩次具摺恭繳在案兹於閏七月内據蘷州府禀稱據建民黄大鼎等自行首報并續繳出劄付三十四張查其年分俱係先年給與所授俱係知州同知㕘將千户等職銜與前所繳劄付大畧相同若再齎呈御覽恐致煩瀆宸衷特暫留臣署可否移送湖廣督臣邁柱併案查銷歸結之處臣未敢擅便伏乞皇上訓示遵行謹奏將此所首劄付移送楚督邁柱令其於併案察結之後仍隨便齎呈朕覽同日又奏為恭報秋成事竊照四川通省秋收分數行據布政司冊報前來臣查各屬今嵗秋收十分者九州縣九分者三十九州縣一司八分者四十三州縣㕔衞所七分者二十州㕔縣六分者五縣五分者三州縣理合繕摺奏聞再查本年九月據護松潘鎮報稱上中下阿壩等番各寨青稞被霜雪打傷准建昌鎮咨稱寧番屬糯白瓦苖术小村被水衝去地塊不能上納蕎糧咨請豁免等因隨即飛行布政司確查雪傷青稞果否成災水衝地塊應否豁免俟勘明到日或有應請豁免者另疏具題又本年六月内據護松潘鎮禀報雄溪屯等處河水泛漲衝塌道路數處七月内據化林協守僃報打箭爐烹壩地方山水偶發衝淹房屋數家俱即飭行司道轉飭勘明並不有礙田園廬舍未至成災查估修理賞恤等項每處需費數十金或百餘金不等隨於鹽茶耗羨銀内動支委員前往補修堅固撫恤得所訖動用過銀兩臣於報銷公用耗羨册内造報理合一併奏聞謹奏覽奏俱悉凡係番苖所納田賦概行從寛為是但勿使貪吏姦胥就中舞弊飽其私槖也雍正七年十月二十一日四川廵撫臣憲德謹奏為奏聞事竊據代理打箭爐等處地方稅課事務工部即中趙世熙呈為行知事雍正七年十月初八日准欽差副都統鼐格咨本年九月十一日准欽差内閣學士僧格護軍統領邁禄咨開照得今年係逹賴喇嘛請皇上聖安遣堪布囊素之班堪布從達賴喇嘛處派往囊素自貝子頗拉奈處派往達賴喇嘛進上物件頗拉奈進上物件及送達賴喇嘛處物件共一百馱交與囊素嘛呢綱巴於七月十九日自藏起程前往裏塘訖其囊素到日貴副都統即日將達賴喇嘛之使者衞送打箭爐收稅監督處令打箭爐監督轉奏等因又據在裏塘管理達賴喇嘛賞上事務洞濶爾丁濟鼐呈稱昨日自藏送來馱子共一百馱内除頗拉奈送達賴喇嘛物件馱子外如今達頼喇嘛進獻皇上丹殊格物件又達賴喇嘛請安進獻物件貝子頗拉奈進上物件公索諾穆達爾乍請安進獻物件共計進獻馱子及堪布囊素行李跟役牛馱子共九十五箇交與堪布多爾巴囊素嘛呢綱巴等於九月二十八日自裏塘起程等因前來本副都統據此擬合行知為此合咨貴監督俟達賴喇嘛之使者堪布囊素到日查照定例遵奉施行等因准此除俟達賴喇嘛之使者到日遵奉定例暫留打箭爐外卑職係代理之員不敢擅奏相應一併報明俯賜查閱轉奏等因到臣據此理合轉奏伏候諭㫖遵行謹奏議政王大臣會議具奏雍正七年十一月十六日四川廵撫臣憲德給事中臣馬維翰布政使臣高維新謹奏為㕘奏事該臣等查得川省丈量一案原以清疆界而杜爭端辦理之員務應實心實力多方開導秉公查丈始不負我皇上軫念閭閻之至意乃原丈川東道屬御史吳濤從前既未能明白曉諭令人爭先從事又不能清查欺隱使人畏法知懼忽然中道改轍不問各業户實在田地多寡止令按户約計勒增且伊所出告示中有少者增少多者増多二語民間互相傳播以致巴縣銅梁等處愚民有故行短少原額自數户以至數千户不等再丈量田地既於雍正六年分舉行其本年自供首報之田即係新丈首增如此外尚有欺隱自應查出懲治乃該御史不問虛實概作原數既令遵示補首又令計種添畝此外尚有暗加之畝苛勒不巳以致梁山萬縣等處有無田加畝之控再從前民間不知弓口頃畝歴年隨例首報實有糧浮於田之户且既經部覆轉飭丈量之員照永寧之例開除自應確查清丈將此等不敷原額各户遵奉恩㫖一體開除乃吳濤並不覆勘確實止責令概行加倍首報遂致合州定遠等處有苦樂不均之控再水溝石灘既毫無出産原無查丈之理乃吳濤勒令將石嶺石坡不可開墾之處始則包山綑丈繼則隨指頃畝填凑入數以致墊江忠州等處有丈量不公不堪再加之控雖據地方官及中書等勸阻竟執意不從似此偏私卑鄙罔恤民瘼實有負我皇上委任至意雖現在川東丈量事畢其該御史吳濤種種劣蹟臣等不敢徇隱為此合詞據實㕘奏恭請睿鑒敕部議處施行謹奏該部嚴查議奏四川廵撫臣憲德謹奏為遵㫖查議事竊查江西南康府知府董文偉條奏四川灌縣之都江堰嵗修派夫一摺奉硃批有人條奏此事可詳細察議奏聞欽此欽遵臣即行令成都府詳細察議去後嗣據成都府知府項誠詳稱郫灌等九縣用水之户從前係照田計塊派夫折銀修堰俱由里甲經手不無指少派多情弊今議令各縣按畝均攤以得水之遠近定出銀之多寡酌定銀數刋刻木榜通行曉諭照依江南河工嵗夫折銀之例官徵官解給以由票此項折夫銀兩不加火耗永為定例如有餘剰存貯同知衙門以僃夏秋修築之費等因到臣隨檄行布政司令其秉公查核妥議詳覆今據藩司髙維新禀稱本司查勘郫灌等處田地其各邑用水原有遠近遲早不同每歲修堰之費該府議以按畝派銀仍以水之遠近定出銀之多寡實屬均平至稟稱所派銀兩不加火耗官徴官解除每嵗用過實在數目報銷外其餘剩之銀存貯同知衙門以僃夏秋水發衝塌之患亦屬妥恊等因到臣臣覆核無異為此請㫖伏乞皇上睿鑒謹奏爾審度事果應行竟作爾意具疏題請可也同日又奏爲密行陳情事竊照一省之政務挈領提綱責在督撫敷猷助理全在兩司是藩臬之闗係實非淺鮮也今川省新補布政使高維新才智深沉和平公正旬宣之任巳慶得人至若按察使呂耀曾臣當接見之初察其刑名雖非諳練而為人尚屬謹飭乃未四月而聞訃丁憂復䝉恩㫖在任守制往籍治喪畢回任之後又䝉㫖令伊署理藩篆遂爾放逸肆志頓改前轍政務之叢脞舛錯經臣駁令更正者不可勝數臣正在繕摺奏聞間兹値該司又聞訃丁母憂矣其臬司印務本應蓍藩司兼管但高維新接任伊始交代未清且丈量册籍現在攢造甚屬紛繁是以將臬篆暫令建昌道劉應鼎署理自臣到任以來刑名諸務甚需整理若非幹員實難勝任看得兵科給事中馬維翰在川二載辦理兩處丈量才識洵屬明敏復能於經歴之地采風問俗留心時務川省民情頗覺熟悉似可勝臬司之任倘䝉聖恩俯准即以補授呂耀曾員缺則川中藩臬各得其人臣亦收贊助之效矣是否允恊伏乞皇上睿鑒謹奏朕未料呂耀曾如此辦事也至若馬維翰才具究屬中平不及劉應鼎候另㫖諭部汝新題請順慶府之馬世煓朕觀其人庸碌性似輕躁恐未必能勝府任汝何所見而題補之耶到任後當留心試看同日又奏為奏明事本年十月於臣出武場後提臣黄廷桂向臣説貢院之外圍墻俱屬無用與其倒塌之磚石被竊無存不如將未倒之墻垣拆毁鋪墊城内低窪處所等因具奏奉硃批告知廵撫憲德欽此臣伏查貢院之外圍墻西面一帶即係滿城界墻不便拆毁外其餘三面委屬無用拆取磚石鋪墊低窪處所誠有禆益先於秋末冬初之際因東門内大街一段係商賈往來要路低窪積水不利行人有已倒之磚石約敷鋪用派員修墊需力無多臣隨諭布政司飭令地方官運墊現已告竣闔城内低窪街道應需鋪墊處所較之東門内大街一段尚有數十倍之多通計將未倒之墻垣拆毁鋪墊經理員役實屬不少現今革逹雷波松潘建昌四路奉文修建營房城堡一處一官即需數十員又各州縣監倉不僃經臣奏明亦現在紛紛查估修建處處需員以臣愚見將未倒之圍墻通行拆毁鋪墊城内低窪處所似可少緩俟各路營房城堡將次告竣之時派員經理庶為均便臣已將此情由告知黄廷桂矣理合奏明伏乞皇上睿鑒施行謹奏覽黄廷桂人何如近見其諸凡陳奏多有不恊處才所限耶心有私耶據實奏聞雍正七年十二月十八日四川廵撫臣憲德謹奏為奏明事竊臣准廟工欽差趙殿最等咨稱本年閏七月二十六日高楊夫役曽以天氣漸寒懇乞放回等情具呈隨批工程告竣在邇一完即行放回乃衆夫竟敢藉口已經具呈紛紛私逃隨據大頭人高萬修等呈稱係刁夫高續英等串謀私逃查高續英等身應夫役輒敢率衆私逃刁玩巳極且在途口稱有少給伊等工價之語事闗錢糧或係大頭人等扣剋或係逃夫高續英等刁誣之處除牌行署土司務必拏解工所以便對質發落外將給過高楊夫役工價細數另單僃録等因移咨到臣臣隨檄建昌道轉飭天全州嚴審究擬去後嗣據該州詳稱審據高續英等僉供衆夫工價並無扣剋亦無在途刁誣等語並呈驗在工領銀單目與發審黏單銀數相符至衆夫私逃緣由堅供委因天氣寒冷各夫未帶綿衣具禀欽差放回土民無知未候發放並非敢於私逃研訊再四雖係實情但未候示輒敢私回咎無可逭請將逃夫高續英等照律責懲以儆效尤其餘邀免概究頭人高萬修等審無扣剋情弊請免置議等情前來臣即批令該州就近發落訖查廟工夫役現在遵㫖分别給賞今高楊夫役既經私逃自不得與在工竣事各二夫一例賞給以别勤惰理合將高楊夫役私逃審究過緣由繕摺奏聞謹奏據奏逃夫免其給賞之䖏行令諾穆圖趙殿最酌量命伊二人將所處公當與否具奏以聞硃批諭㫖巻一百三十二中欽定四庫全書硃批諭㫖巻一百三十二下硃批憲德奏摺雍正八年正月二十二日四川巡撫臣憲德謹奏為遵㫖覆奏事竊臣於前奏明事一摺内奉有硃批遵查得提臣黄廷桂為人精細明白留心地方洵為有用之才但器局𥚹淺規模狹隘欠敦厚少豁硃批臣跪讀之下惶恐無地仰見聖明洞照無遠弗届今蒙皇上特授劉應鼎為按察使即以馬維翰為建昌道則川省臬政可漸整理矣至馬世煓臣於題請之前每每試看其德行臣亦未敢深信前歲馬湖一帶軍需緊急而該員最後派徃赴彼竭力幫辦未至遲誤其人雖非超越之才似屬尚堪驅策此臣之從前謬見題請也今蒙聖恩訓示明切俟馬世煓到川之後臣必留心試㸔一有乖違臣必據實㕘處斷不敢以馬世煓係臣舅氏之族徇私廢公自取罪戾重負皇仁也臣不勝激切惶悚之至謹奏馬世煓前於乾清門引見時或係内懷恐怖之故舉動奏對似屬不及後召入飬心殿靣訓之際審觀其人甚覺明白歴練儘堪勝知府之任但恐過於巧黠耳巳向馬世煓明白降有諭㫖令伊來川靣傳與汝也同日又奏為欽奉硃批事竊臣齎摺家人回川恭捧臣奏摺匣内有奉發硃批提臣黄廷桂所奏三摺臣遵諭將伊原奏逐一細㸔硃批諭㫖一一跪讀謹據臣愚見及地方現在情事敬為我皇上歴歴陳之黄廷桂奏將黄螂國保安插成都一摺臣查恩賞國保之銀現據黄廷桂令將弁代為擇買田房料理照看國保之弟木姑等臣已㩀黄廷桂移送户口册籍發令布政司酌撥附近荒田交令承領不至失所此外一切招回多年被擄之人現巳分插各州縣者臣自當仰體聖意不時稽察務令充裕感悦以廣徠墾種一摺臣查天下地利固不可不盡而内外情事之緩急亦不可不詳為審度如川省丈量之事雖畢而核查造册三五月内不能遽畢原經部議清丈完日將清出地畝分别科則編列字號計留川人戶之數均分􅍐定認墾是安插之事應俟册籍就理方可議舉内地州縣尚須節次施行蠻夷之地何可遽議招墾乎今黃廷桂乃以甫經𠞰撫尚未經理之處遽議招徠墾種固是急公之舉然所見不廣誠如聖諭所謂孟浪無知也若夫添設營汛一事黄廷桂曽力言其當増臣於地勢道路情形未能盡悉恐據繪圖而論或有不周到處故未敢酌議惟是修葺是城池建造營房値今川省百役皆興之時臣恐不能兼營並舉也又黄廷桂奏請雷波黄螂等處開礦一摺臣查開採礦厰必致聚集流匪最易滋事况新撫苗疆尤宜鎭静誠如聖明洞鑒不可與之爭利致啓釁端是以上年屢據各屬商民紛紛呈請開採礦厰經臣嚴批不准現俱有案雷波黄螂一帶方在改設流官經理未乆尤不宜先行此舉臣今欽奉諭㫖現已飛行司道轉飭嚴行禁止臣復不時訪察倘有不法姦徒勾通作弊或該管官弁陽奉隂違故縱開採臣自當嚴行拏究㕘處以靖地方决不敢皇上睿鑒謹奏所奏俱悉雍正八年三月二十日四川巡撫臣憲德謹奏為敬陳管見仰祈睿鑒事竊臣於雍正七年十一月内署理成都副都統印務見一切文移檔案每多草率辦事之人止有筆帖式一員倘遇疾病事故即辦理無人今如筆帖式張竒於三月内病故現在無人辦事以臣愚見請再添設筆帖式一員協同佐理庻公務不致稽延草率再副都統衙門筆帖式原未議給養亷向俱於八旗兵糧内酌量給與一二分以資用度但駐劄省㑹滿兵非綠旗兵丁可比不便照親丁坐糧之例致使額數懸缺臣請將副都統衙門筆帖式養廉每年於藩庫公項銀内支給四百兩以作日用之資如蒙恩准添設則該員房屋亦所必需倂請亦於充公銀内支給置備俾得居住庶副都統衙門辦事有人而筆帖式養亷有項不致甲兵缺額實於公務有所禆益也是否有當伏乞皇上睿鑒勅部議覆施行謹奏所奏是具本題請可也但只聲明添設緣由養亷之議准照所奏支給疏内無庸敘入四川建昌道臣馬維翰謹奏為敬陳一得仰祈睿鑒事竊臣自丈量事竣正擬册籍造完赴京復命又荷天恩授臣建昌道現在接辦軍需重任夙夜兢兢惟以勉竭駑駘為念至臣歷任京職屢次恭聆天語無時不以官守民生諄切皇上陳之一川省各州縣詞訟繁多即如互爭田地屢控屢翻從無信讞實因沿習茍簡有斷無案之故查州縣承審果能秉公確訊於情事自不相遠至加看存案留為柄據地方事繁勢有不暇必藉幕賔資其㕘酌但從來作幕之人或歴年書吏或專習吏事既無上進之路又去留任意徃徃為利之念重而為名之心輕况川省地遠作幕者少政事或致廢弛堆積臣愚以為各官平素知交豈無一二通習吏治者除舉貢即有應得之官難以取用外其餘不論生監及書吏俊秀請令州縣各舉二人簡僻地方一人司道府各舉三人簡僻地方二人督撫或舉五六人俱將姓名履歴咨部註册彚題各依衙門比㕘處一倂分别治罪其賢能之員著有實效卓異陞轉幕賔亦加議叙量才擢用則幕賔俱圖上進不特為國家立賢無方之一道且辦事可得諳練之助矣一川民土著甚少輕於遷徙總不為乆遠之計又因磚瓦難得瓦房稀少鄉民無論貧富多搭草棚居住所以一渉忿爭或即將自已棚房拽倒至有㸃火燒燬遂以打搶焚刦捏情具控臣三年來所見各處呈詞大畧相同實為川省惡習至於城郭市鎭居人稠密院宇墻垣旣用竹笆又雜葢茅柴屢致火災草性輕掦延燒每難撲滅習而不察更為可憫臣愚以為刁控惡習除嚴飭該管官秉公查究外宜令各州縣隨地方習熟燒造民間有願承頂者該州縣取具隣保各甘結具文詳請咨部漸次撤去官窰名色聽民自便行之既乆瓦屋鱗次既可生其安土重遷之心亦可隱杜打搶焚刼之習又弭火患於無形於川民實有禆益以上二條一係破格給與職銜一係特支公帑開設均非常例臣因奏今將馬維翰條奏二款暨朕之批諭併錄付汝一觀此係汝所保薦可勝大僚之人物其識見經濟乃如是耶雍正八年五月二十二日四川廵撫臣憲德謹奏為奏請事雍正八年五月十三日准户部咨據署理川陕總督印務查郎阿摺奏守僃楊鶴等拏獲姦徒楊成勲黨犯陳文魁楊成禄等搜出訴狀怨白中有奉旨欽命丈田情詞縁由欽奉上諭一道欽遵咨行到臣臣跪讀畢隨備錄行令布政司刋刻刷印多張分布曉諭闔屬務使遠鄉僻壤無不周知訖臣伏查清丈之事始於馬㑹伯之奏繼經臣憲德詳議題覆又經九卿㑹議始奉恩允准行之始末户部原文一一備載先於雍正六年正月初六日到臣臣随行令布政司備錄通行闔屬二月内又有欽差髙維新等四人到川卽聨銜初次頒貼闔屬告示内亦有特允督撫臣奏請之語然今現有姦黨楊成祿等揑言滋事則臣宰制一方不能宣丈量告竣之夲巳俱接准部覆惟川東告竣之本尚未接有部覆今丈量册籍現在將及造完若告竣之部覆不到則册籍雖畢不敢題逹且原經部議清丈完日將清出地畝分别科則編列字號計留川人戸之數均分􅍐定認墾等語是册籍不定則安挿之事亦不便議舉而今年現徵之丈出田地錢糧復多有遲礙川東告竣之本仰懇皇上敕部速為議覆迅發來川以便挨次辦理庶免違誤臣為地方要務起見冐昧陳情伏乞皇上睿鑒施行謹奏川東丈量告竣之本該部業經議覆巳奉㫖行知矣同日又奏為妄行保舉臣罪難寛事雍正八年五月十八日髙維新恭捧伊摺内奉有硃批此諭與憲德觀之之㫖示臣又臣奏摺匣内奉發馬維翰條奏一摺欽奉硃批今將馬維翰條奏二款曁朕之批諭倂錄付汝一觀此係汝所保薦可勝大僚之人物其識見經濟乃如是耶欽此臣一一跪讀不勝駭異二人所奏實不可以空言畢事者及分行查丈之後髙維新首為告竣屢聞民情歡戴馬維翰次為告竣頗能井井民無異議後經臣奏呉鳴虞吳濤丈量川西川東不妥蒙恩又令伊二人前徃接辦更正伊等復能清釐竣事游刃有餘臣以為才具優長所以密行保奏兹乃見伊等之奏摺悖謬荒唐如此臣始知從前之保薦奏請盡屬謬妄昏昧輕率之罪臣復何辭惶悚之下實無地自容也臣不勝感愧零涕追悔無及抑臣敬有陳者川省向緣裁去川北道而保寧一府竟不屬道轄雍正五年冬臣以川東道所屬之遵義一府旣議定改歸黔省則不隸道屬之保寧一府請就接壤併屬川東道管轄等因條奏後經部議奉㫖准行在案今見川東所轄太為遼濶該道委有鞭長莫及之勢髙維新請裁驛鹽道為川北道誠屬妄謬然保寧在川北而隸川東實屬不便今川省又有開採鼓鑄一事臣㑹同署督臣查郎阿等議請將開採鼓鑄之事於分巡四道内揀選一員經理已經部覆奉㫖令臣等揀選題請以臣愚見不若仍復舊制添設一川北道駐劄保寧府即將川東道所轄之川北地方及松茂道所屬附近川北之州縣酌倂歸川北道管轄而以松茂道卽為守道兼司開採鼓鑄之事如此庶川東道無鞭長不及之虞而松茂道所屬亦為減少題事關復設道員臣未敢擅便伏乞訓示遵行謹奏覽雍正八年八月初六日四川巡撫臣憲德謹奏為奏明事竊臣先於雍正八年七月二十七日准部咨内開據䕫關監督隆昇㕘奏䕫州府知府周彬侵隱關稅一案奉㫖著廵撫憲德秉公查審欽此移咨到臣臣欽遵隨卽委員前徃確查周彬任内在涪州公攤曾否徴收商稅並行調周彬及提案内有名人等來省以便審訊去後兹於八月初六日復准戸部鈔發臣奏聞周彬隆昇互相指揭一摺奉㫖著將周彬隆昇咨詳一倂交與憲德查訊欽此臣查此案止咨查而不令面質不惟文移徃返有稽時日其中是非虗實亦難懸定但監督隆昇一經來省則䕫關稅務乏員管理臣查重慶府知府張光鏻辦事素稱謹愼勤敏隨委該府前徃䕫關暫行代管更替隆昇來省以便秉公查訊除將飭委更替緣由咨部外理合繕摺奏明謹奏覽奏知道了查訊此案絲毫毋得偏徇若稍渉不公日後必身受其累也同日又奏為請嚴定欺隱田糧之例以清積弊事竊查川省丈量田地冊籍已經完畢其丈出地畝錢糧數目臣已具題報部并將冊籍差員分送部科訖惟是田地錢糧數目較先倍增則從前欺隱委係十之五六蒙皇上寬大之恩俱不治其欺隱之罪則此番丈量在民自不應少有隱漏重蹈欺罔在官亦不應少致遺闕自干罪戾但川省遼濶地方險隘頗有人跡罕到之處且冊造五十餘萬户之衆臣不能保無一二户之未盡未實者夫當此浩蕩𢎞恩槩免從前之欺隱倘仍復有隱匿若不嚴定處分則官民無以知儆臣請敕部嚴行定例嗣後川省田糧倘尚有隱漏未盡者或被告發或被訪聞或被後任官察出除將田地照律入官外其欺隱之户應請加等治罪至經辦各官自道府以及正佐亦應分别承督知情失察從重定以議處之條庶官民各知儆惕川中積弊得清矣伏乞皇上睿鑒敕部議覆施行謹奏惟恐將來累及於巳而欲增例外處分之條甚屬私心謬論或俟數年後新墾地畝漸廣許令再行首報又在汝等臨時酌量而為之耳目下丈量甫定復滋紛擾於情於理均有未恊雍正八年十一月初九日四川廵撫臣憲德謹奏為奏聞事竊查䕫關監督隆昇䕫州府知府周彬互相指揭一案屢奉諭㫖令臣秉公查審臣何敢少存私見以蹈狥庇之愆隨經調齊至省臣親擬問語令伊二人親自錄供所有周彬未令商人親塡部檔之處巳據周彬自認情實其周彬任内曾否於涪州收税一節臣差員徃查覆稱周彬雖未收稅而曾經差役廵查張掛告示并伊家人私自得銀數兩俱實有其事詰之周彬巳俯首無辭至實在侵蝕關稅之處即隆昇亦無指實現在行令兩司將書廵人役嚴加鞫訊臣仍親審不使毫有遁情惟是監督隆昇於初問時亦親自錄供次日卽云不善書寫令人代錄其供詞支離含混竟有所答非其所問之處且於供詞内有謂臣何必明知故問之語是其不服臣查訊之狀已情見乎辭矣且查出伊任内亦有不令商人親塡部冊并重戥苛徵到任後即更例增收揑塡檔冊等事俱有確鑿證據而隆昇並不輸服塡供臣不敢不據實奏聞伏祈皇上睿鑒施行謹奏天下未有秉公而人不輸服之理汝不能令其輸服即奏聞於朕亦何濟於事耶同日又奏為敬陳邊方寧謐情形恭慰聖懐事竊照烏蠻不法甫經聞信之時接壤滇疆等處居民不無驚擾惶惑亦有搬移家口欲行遠避者臣即飛委永寧道馳徃分頭趕回曉諭安撫旋有官兵前徃沿境堵𠞰近准據各鎭將移報已於十月初十日十一月初四五等日恢復大關小關豆沙關等要隘逆蠻奔逃現巳進攻深入並將讐殺阿興土千户安永長之檜溪逆夷攻克斬殺現在摉𠞰逸賊沿邊居民俱各安堵地方寧謐惟是初聞賊警之時雷波黄螂工所之匠役小夫多有聞風潛逸欲令暫行停工又恐從前所做未完之處一時損頽不無虛糜錢糧現雖嚴催各州縣令其押解夫役急赴工所又值分催背運各路軍糧需夫既多且急工程或少遲延耳茲恐上厪宸衷謹將沿邊地方寧謐情形據實奏聞謹奏民夫既有背運軍糧之役督催工作不應過急一切雇募價値應從寬裕者據實題請務令小民樂於趨赴毫無苦累酌量辦理可也雍正九年四月初一日四川巡撫臣憲德謹奏為據實奏明軍需銀兩事竊照川省從前軍需並無繩墨節制承辦各員俱得任意開銷雍正四年内前撫臣法敏據建昌道劉應鼎將應用軍需逐加查核酌定例冊詳請具題以便遵辦嗣蒙部議發交川陜督臣岳鍾琪再加核議於雍正六年内經岳鍾琪核定題請遵行辦理在案今雍正六年内進兵西藏並雲南烏蠻米貼祿氏不法川兵於建昌之涼山阿驢敘馬之雷波等處堵𠞰動用過軍需銀兩據建昌道今陞按察使劉應鼎詳稱各糧務委員遵照例冊承辦但地方有險易之别物價亦隨時各異各委員相機酌辦有通融支用減於例冊者通計六七兩年分其節省銀八千七百七十九兩零又有勢處於無可如何不得不用浮於例冊者且甚有例冊未經議載用與例冊不符者通計共銀六千八百一十三兩零仰蒙上諭軍需令其據實報銷欽遵在案豈容稍渉欺偽理合詳明等情到臣該臣查得前項通融支用減於例冊節省之銀兩應請收歸軍需原項接支應用其有不得不用浮於例冊且有不合例冊之銀兩應責令各委員賠補但實係急公用去之項與糜費有別而軍帑又難以虛懸以臣愚見即將此浮用銀六千八百一十三兩零仰懇皇仁請照雲南之例於川省鹽茶耗羡充公項内撥補庻軍需造報既不失實而委辦各員均沐皇恩於無既矣是否有當伏乞睿鑒訓示施行謹奏既稱有節省銀兩即應以減用之數議抵浮用之數奏明請銷何必又於鹽茶耗羡項内撥補多此一番曲折未解汝意雍正九年五月二十八日四川巡撫臣憲德謹奏為據情覆奏事竊臣前以雍正六七兩年軍需内節省銀八千餘兩請歸入軍需項下其浮用六千餘兩請於鹽茶耗羡銀内動撥繕摺具奏奉有硃批臣跪讀之下悚惶無措伏思若無節省銀兩或節省之數不敷浮用數目或可仰懇皇仁動撥别項今節省之數儘可補其浮用數目尚有餘銀自應以節省數内請補浮用而外餘者請歸入軍需項下庻為直截了當乃臣於具奏之時昧於所見祇以軍需冊内臣既不敢令其通融捏造而浮用各欵又恐内部不准開銷所以越想越渾愈辦愈拙也現今催令造冊將減用浮用各款俱於項下登明於題本尾内請以節省銀内補其浮用之數餘者請歸入軍需項下等情具題外謹將臣從前愚昧卑鄙之見據情奏聞謹奏但改勉愚昧卑鄙則朕委任封疆之寄是矣總因私心未能屏除淨盡遇事必不妥恊也雍正九年六月初八日四川巡撫臣憲德謹奏為請遣員䆒審以伸國法以懲姦邪事雍正九年六月初五日臣等在㑹府公坐處有按察使劉應鼎禀稱訪聞得有本司衙門緣事已革之書辦彭懋輝承差唐現章等又復賄投督院衙門充役隨差人拏獲昨於衆司道齊集時質審得行賄立約情由供出提標提塘楊姓說合手札内有昨日已向敝友說白等情本日又據劉應鼎來院禀臣說今早有署督標中軍傅𢎞禮向本司說楊提塘手札内有所謂敝友者我已經訊問據楊提塘供係撫院衙門趙相公等語臣隨將臣衙門繪畫之趙瓚立刻差員押送臬司對質研訊又據臬司禀稱反復質對即楊提塘亦供委不與趙瓚相干等語臣恐此事或劉應鼎因趙瓚係臣衙門延請之人致有瞻徇或𫝊𢎞禮假捏楊提塘之供誣頼趙瓚以杜撫臣之口并使臬司掣肘勿得深究均未可定伏乞皇上密敕大臣來川嚴審究出札内所謂敝友之人定擬總不假手於川員庻姦徒無所肆其伎倆而執法之員各得盡法矣又有貢生簡宣家被盗一案先經該府縣審詳謂簡宣家捏報已咨部暫將簡宣斥革研審後有簡宣妻子來省訴寃又有首告共盗知情之人經臬司提審謂已得大槩復令府縣虛公核審隨互相指摘不休劉應鼎亦稱寃不了如蒙皇恩遣員來川審究前件並祈將此一案亦敕差員定審以上二事或已革之胥役賄求復充串通之中保希圖漁利或未被盗而報為大盗或刦盜而硬謂捏報皆屬常有之事祗宜法在必行耳無論為文為武或憲或屬一有偏私便分黨羽此則必不可有之勢臣所以亟亟入告干冒聖聽也伏乞皇上俯允施行謹奏覽奏類如趙瓚無益之輩招置署中何用况封疆緊要案牘殷繁奚暇留心繪事耶似此本省所屬些小案件尚不能服人心口輒請差員審理朕實代汝愧之未知汝具何靣皮公然奏請也雍正十年九月二十九日四川巡撫臣憲德謹奏為恭謝天恩事雍正十年七月二十二日臣齎摺人回川恭捧御賜荔枝一瓶到臣臣隨恭設香案望闕叩頭祗領訖理合繕摺奏謝天恩謹奏覽聞川省今歲科場主考聲名甚屬平常詳細訪察據實奏知同日又奏為覆奏事竊查川省軍需承辦各項俱於雍正六年定有例冊而六七兩年承辦各冊内有用減於例冊者亦有用浮於例冊者臣前以浮用各款誠恐内部不准開銷是以請將用減於例冊之節省銀兩收歸軍需原項接支而用浮於例冊銀兩請於鹽茶耗羡充公項内撥補等情欽奉硃批既稱有節省銀兩即應以減用之數議抵浮用之數奏明請銷何必又於鹽茶耗羡項内撥補多此一番曲折未解汝意欽此欽遵臣隨催造軍需各冊令將減用浮用各款俱於項下登明兹於本年九月内據該司造清齎送雍正六七兩年用減於例冊節省銀兩共計二萬九千五百二十二兩零用浮於例冊銀兩共計六千八百一十三兩零臣已於題本内請以節省銀兩補其浮用之數外尚有餘銀二萬二千七百九兩零歸入實存軍需項下接支等情具題請銷伏乞聖慈敕部核銷施行謹奏覽奏知道了候具題到日有㫖雍正十一年二月初七日四川巡撫臣憲德謹奏為欽奉上諭事雍正十一年正月二十四日准戸部咨雍正十一年正月初七日内閣鈔出命臣速弛米禁上諭一道轉發到臣臣跪讀之下不勝悚惕伏思我皇上中外一體天下一家臣叨沐隆恩職任封疆惟應仰體睿懷無分此疆彼界何敢自干遏糴之戒祇以雍正九年川省米價頗昂各路碾辦軍糈需米甚殷經臣奏明暫遏商販亦係禁止大艘夥販並漏稅不法之徒至於滇楚二省差員入川買米臣俱行令各地方官任憑採買而販運米石之小商亦仍聼徃來查雍正九年䕫關米稅收銀計五千八百餘兩原未敢一槩杜絶也迨至雍正十年川省大獲豐登民間米價日減臣於上年九月内㑹摺奏請弛禁隨於十一月初七日恭奉硃批當即欽遵諭令布政司轉飭開禁並屢次批行弛禁在案總緣成都距䕫路途窵遠沿江州縣以及隣省商賈未能立即周知是以米糧尚未各處流通上厪天心特頒諭㫖訓飭臣捧誦嚴綸實深惶懼復又立即行知布政司䕫關遵照更專差馳諭沿江各州縣凡有販米商賈一體欽遵放行毋許禁阻並通咨楚省督撫諸臣外所有欽遵弛禁緣由臣謹繕摺恭奏伏乞睿鑒謹奏如果將弛禁之處明白曉諭負販商賈輩各具有耳目何以至今米穀尚未流通耶以此一𣲖勉強支吾之詞公然奏辯亦可謂厚顔矣雍正十一年八月初二日四川巡撫臣憲德等謹奏為鹽道任意率行辦理失實飛灑累商引滯難銷事竊查川省行鹽引目先於欽奉上諭事案内議請按照各州縣户口分引行鹽嗣據該道曹源邠以人民散處靡常各州縣内有額引不敷民食者有分引太多者請將各處引目改撥代銷等情節經據詳題逹在案但改撥代銷原因户口偶有增減之所不得不權宜變通未可恃此而竟任意混撥者今見該道將各州縣𣲖定引目紛紛改撥不但案牘繁多抑且糾纒不了節經各屬禀詳改撥不當積引難銷商民稱累等情到臣臣隨批布按二司移詢該道確查詳議去後兹據該司等詢查㑹詳前來臣查鹽從井辦引按鹽銷計口受鹽法至善也經理之員茍能按其實在户口察其道路遠近因地制宜均勻分配不特鹽無壅塞引目易疏而課稅亦自充裕無如曹源邠一味草率從事並不實心經理以致官民稱累商怨沸騰殊忝總理鹺政之任除嚴飭該道㑹同兩司分行各地方官將實在户口鹽觔徹底通查妥為酌議外所有該道曹源邠辦理不實及現今通行查議情由臣不敢隱蔽謹㑹同督臣黄廷桂合詞具奏伏乞皇上睿鑒敕部察議施行謹奏舉凡一省中鹽課引務莫非汝等督率之責果曹源邠著有貪婪不法形迹即當列款糾㕘若止改撥不當汝等何難商酌合宜而更正之今但云不敢隱蔽祈朕敕部察議竟將鹺政一項視如無渉然不知是何意見覽奏朕甚鄙汝等有玷督撫綂轄訓飭之任也雍正十一年九月初六日四川總督臣黄廷桂巡撫臣憲德謹奏為恭報秋成分數事竊照年穀收成理應分析奏報臣等行令布政司確查通省收成分數據實詳報去後兹據該司查明秋成分數分析造冊申送前來臣等伏查川省秋禾上年既獲豐收今歲復登大有合計通省收成實有九分以上現今成都一帯米價毎倉斗一石不過三錢四五分不等其他各府州縣據報米價數目較前俱屬平減似此連歲順成人民樂利皆出皇上敬天勤民德洋恩普之所致臣等不勝歡忭謹將該司冊報秋成細數另繕清摺敬呈御覽仰祈聖鑒謹奏秋成細數欣悅覽焉其中一㕔四州縣何故不産秋禾查明緣由奏朕知之雍正十一年十一月初三日四川巡撫臣憲德謹奏為恭請陛見事竊臣謭劣庸愚遭逢聖世屢蒙皇上簡㧞之恩疊荷聖主曲成之德洪恩優渥浹髓淪肌感激微忱銘心鏤骨伏念臣自雍正四年二月内奉命出京迄今巳經八載未得一覲天顔身在蜀西心依北闕瞻戀愚誠夙夜耿耿前於雍正七年具摺恭請陛見未蒙俞允嗣因軍務倥偬不敢遠離今川省所有西藏以及松爐諸路駐防官兵俱巳撤減年嵗屢豊地方亦甚寧謐懇祈皇上天恩鑒臣愚悃准於來春自川起程進京陛見俾臣得跪請聖安親承聖訓庻臣犬馬戀王之心可以少伸於萬一倘蒙恩允臣巡撫印務應交署理之處伏乞皇上訓示遵行臣不勝激切待命之至謹奏朕正欲見汝覽入覲之請恰合朕意候另㫖由内閣頒發雍正十二年正月初六日四川巡撫臣憲德謹奏為恭謝天恩事雍正十二年正月初四日准署理陜西巡撫印務兵部尚書臣史貽直咨雍正十一年十二月二十三日准兵部遞到内廷頒發奏匣一件雍正十一年十二月十三日内閣奉上諭憲德補授工部尚書四川巡撫員缺著鄂昌補授令馳驛來京陛見後再赴新任憲德暫不必來京俟鄂昌到任將四川一切事宜詳悉講論交代清楚再起身來京欽此擬合移咨煩請查照上諭内事理欽遵知㑹施行等因到臣隨恭設香案望闕叩頭謝恩訖伏念臣謭劣庸愚蒙皇上委以邊方重任凡辦理地方事務無不仰蒙聖訓涵育成全臣自愧愆尤日積仰報無能方待罪不遑時深兢惕乃又沐殊恩受兹超擢位愈髙而責愈重恩愈厚而報愈難惟有益凛小心倍加黽勉以期仰酬皇上洪恩於萬一今恪遵聖諭俟新任撫臣鄂昌到任將四川一切事宜詳悉講論交代清楚星馳北闕日覲天顔時聆聖訓竭蹶駑駘趨承於堯聰舜哲之廷臣不勝感激懽忭之至除俟開印日另疏題謝外合先繕摺恭謝天恩為此謹奏近日以來部務乏人料理不得巳召卿内用品秩之卑高無庸計論也硃批諭㫖巻一百三十二下
