body:
  text: 欽定四庫全書硃批諭㫖卷一百二十四硃批紀成斌奏摺雍正二年十一月二十二日河南河北總兵官臣紀成斌謹奏為聖恩髙厚難名微臣圗報心切罄竭愚誠仰祈睿鍳事竊臣武夫末辨荷䝉皇上格外洪慈特放河北總兵臣何人斯被此寵遇惟有䇿勵精神整頓營伍懲勸士卒以效犬馬之報於萬一耳伏查開封一營設於省㑹重地五方雜處士商輻湊該營都司有彈壓巡防之責最關緊要自都司劉以灝被𠫭員缺本年三月二十五日部掣廣東潮州衛守備馮重臣迄今九月有餘並未到任據該營員役禀稱守備馮重臣在途病故勢必報部另掣是到任之期杳無月日署理之員曠日遲久不能保其兼顧無虞再查磁州營都司陳之璠員缺亦屬衝繁均以得人為要臣伏見侍衛宋愛為人端謹才具幹練侍衛楊永和技勇優長持身謹飭俱係臣深知熟悉之員如䝉天恩將宋愛楊永和補放開封磁州都司二缺俾其自京赴豫不過半月即可抵任庶要缺不至久懸地方均有禆益至磁州營守備原非題補之缺但臣看得開封營千總徐世俊自委署磁州守備以來辦事小心勤於操練如䝉皇上加恩補授實為人地相宜倘格於成例祈將在京㨂選記名千總內補放以免懸缺久待臣為地方得人起見冒昧具摺陳請伏候聖裁謹奏俱照爾所請諭部補授矣但須秉公除私方為不負朕之信任也勉之雍正三年二月初一日河南河北總兵官臣紀成斌謹奏為奏明事雍正三年正月二十三日新補臣標開素無交情臣受皇上信用之隆恩也理合將臣愚衷據實奏明此係密摺臣不敢託人係臣親書但武夫不通文理不㑹寫字伏祈皇上原宥謹奏閲爾字畫頗屬清楚向後如有密奏親筆書寫甚好同日又奏為陳明請㫖事竊臣荷䝉皇上天恩畀以封疆重任自受嚴飭辨兵巡查防禦務期盜息民安不使稍有踈縱臣見各營旗幟號衣等項俱巳舊敝詢稱向係兵丁自備因年嵗歉收是以未及更置臣仰體皇上愛恤士卒至意不忍纍兵將臣標左右及開封等六大營每營暫存公費步糧二十分嵩縣王祿店並無子母炮位臣從戎年久深知此炮有益現在聞一面將各營舊存公費名糧逐一募補實伍以上巳得不上瀆宸聰請㫖遵行查臣標八營馬兵俱有盔甲至步兵惟開封一營尚有盔甲係前任撫臣趙𢎞燮捐造但巳年久庫清項庶皇上睿鑒施行謹奏所奏俱悉同日又奏為請㫖事竊查臣標八營除左右兩營防守懷慶縣屬外其開封衛輝磁州王祿店等四營雖俱地廣兵單路當衝要然汛地平坦即或間有盜竊可以追逐緝拏無恃險負固之足慮也獨河南及嵩縣兩營地處萬山之中深林密箐最易藏姦實屬險要查河南營止設都司一員守備一員千總二員把總三員馬步兵共六百四十八名管轄一府兩州一十四縣至嵩縣營止一守備並無千把管轄嵩縣永寧盧氏三縣地險汛逺勢難兼顧臣意欲請增營汛官兵以資彈壓現在同撫臣田文鏡商酌㑹疏具題臣無庸再奏惟是議添官兵處所俱係險要重地倘䝉皇上俞允則新設營汛防禦最關緊要恐部選之員未能遽得人地相宜但豫省無題補官員之例臣不敢擅違合無仰懇皇上格外隆恩容臣於豫省武官內揀選才技優長諳練營務者㑹同撫臣酌請題補庶要地得人而臣亦收臂指之效矣理合請㫖遵行為此謹奏爾同撫臣田文鏡將增添營汛之處㑹疏題請俟該部議覆到日然後與撫臣擬定人缺密摺具奏以聞同日又奏為恭謝天恩事雍正二年十二月二十六日臣進摺家人回署齎捧欽賜臣湯羊哈密瓜到臣又於雍正三年正月初四日准河南撫臣田文鏡差官齎送欽賜臣御書福字一幅到臣臣節次郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣以一介武夫䝉我皇上天髙地厚之恩由末辨拔置總兵重任復䝉宸翰遙頒賞賚稠疊臣何人斯受此異數臣即肝腦塗地亦不能仰報皇恩於萬一為此繕摺奏謝併繳硃批謹奏覽奏謝知道了據爾看年羮堯係何如人耶伊竟忍如此負恩洵屬竒事殊令朕愧見天下臣工雍正三年四月初十日河南河北總兵官臣紀成斌謹奏為奏聞事竊查臣標八營所屬地方本年自正月二十四日各處得雨三四寸後至三月二十暨二十一日得雨一寸至三寸不等又於四月初三初六兩日得雨一寸至四寸不等均未霑足有渠水灌溉之地麥苖現在秀實仍約有七八分收成其窪下田地麥苖亦約有五六分收成至髙阜之地麥苖大約只可三四分收成查臣標左右衛輝磁州河南嵩縣王祿店等七營汛地麥苗大槩相同惟開封一營汛地得雨較少且從前生有旱蟲麥苗尤被損傷各處巳種秋禾得雨滋長未種地畝得雨深者現在播種臣仰體皇上軫念地方至意所有屬汛雨澤及二麥情形理合據實奏聞併繳硃批謹奏雨水麥苖情形知道了凡百處務須據實為要雍正三年五月二十二日河南河北總兵官臣紀成斌謹奏為遵㫖回奏事雍正三年五月十一日臣奉到皇上硃批臣奏摺一封當即叩展跪讀細繹聖諭因思年羮堯父子兄弟世受國恩昔年年羮堯荷聖祖寵眷加恩宥過巳非一日又䝉我皇上推心置腹異數頻施在年羮堯身被殊恩自應鞠躬盡瘁始終不渝斯為盡職乃年羮堯自西海平定之後忽爾恣肆驕縱諸事踈慢不敬頓異夙昔行為誠為竒事年羮堯病狂喪心如此背恩負國應即治罪以正國法彼亦無辭且足以快天下臣民之心乃我皇上猶復包容仍將年羮堯調補浙江杭州將軍益見年羮堯之負皇上而我皇上寬容之量更為千古帝王未有之盛德也臣因年羮堯自西海平定後任性狂為大不類於往時私心驚疑巳久但非微臣所宜言之事故不敢妄言今欽奉硃批下詢臣謹略陳愚見伏惟睿鑒謹奏覽爾此奏其議論年羮堯處甚不通暢頗留有餘不盡地步可惜爾如此漢仗人品兼立有戰功當務為國家棟梁豈宜屈身人下重小節而輕大義貽譏天下後世哉年羮堯今日負朕髙厚之恩凡有血氣者聞見之下若不髮指眥裂深惡而痛絶之非大清臣子也其向日之樹私黨市小惠負君竊柄等行為何可絲毫瞻顧為之掩飾耶審思之雍正三年六月二十八日河南河北總兵官臣紀成斌謹奏為奏聞事竊照臣標所屬地方六月內各處俱得透雨或兩三日連雨或三五日一雨普遍霑足早禾將次登場晚禾茂發秀實將來俱約有十分收成此皆由我皇上聖德至誠默契天心故致五風十雨年登大有物阜民安臣仰體皇上軫念地方至意合將屬汛雨澤霑足及秋禾茂盛情形據實奏聞謹奏覽奏雨澤禾稼情形知道了朕懷甚為欣慰同日又奏為瀝陳愚𠂻仰祈聖主睿鑒事竊年羮堯恩負國前欽奉諭㫖問臣看年羮堯係何如人臣因年羮堯狂悖不臣之處其顯然外著者俱經直𨽻督臣李維鈞及鑲白旗都統臣范時捷等列欵糾參無庸臣再為復述至年羮堯心姦行僞招權納賄植黨營私附巳者立拔顯要拂意者百計中傷官民切齒道路怨騰但形跡詭祕非與彼聫手共事者難以悉其始末臣自服官以來從未與年羮堯辦理一事即雍正元年十二月內臣隨四川提督嶽鍾琪自川赴寧三日後年羮堯以四川雜谷土兵性野內地不便存住即令臣帶領口外白塔兒駐防嗣後進𠞰爾郭隆寺及西海桌子山等處逮凱旋西寧臣養病未幾即奉㫖赴京陛見是以年羮堯罪惡多端臣祗得於道路之傳聞其原委確據未能深悉故臣前奉諭㫖不敢冒昧入告祗以年羮堯負國背恩之語回奏兹奉硃批嚴切臣跪讀之下惶悚汗流罪實難逭惟是臣歷來從未受年羮堯恩惠臣雖賦性愚頑頗知大義年羮堯負國竊柄罪不容誅即今之亂臣賊子也臣若懷私瞻顧亂臣賊子臣亦即亂臣賊子也豈可容於光天化日之下乎謹將年羮堯往年之待臣及臣䝉恩進身之由略陳梗槩仰邀天鑒臣昔年在川時因質直迂拙不肯黨同趨奉致年羮堯忌恨屢欲加害令有司官訪查臣事欵一月一次密報因臣氷兢自矢無隙可乘幸免陷害康熙五十九年四川化林協副將缺出臣彼時係龍安營參將經署提臣路振揚將臣保舉㑹題到省年羮堯駁回又康熙六十一年軍政提臣嶽鍾琪將臣保舉卓異又被年羮堯駁回臣彼時若肯貶節逄迎拜門生通賄賂附黨鑽營以取年羮堯歡心臣之姓名巳早達天聽矣嗣於雍正元年六月內經提臣嶽鍾琪欽遵上諭各舉所知將臣單題保舉奉㫖特授臣雲南援𠞰右協副將此案若係㑹題又必致年羮堯駁回矣彼時臣因受恩深重正值軍興旁午之際不敢脫然赴任以圗安逸故告隨提臣嶽鍾琪軍前效力以報皇恩逮後仰賴皇上天威指授方略進𠞰各處蕩平逆寇年羮堯祗據提臣嶽鍾琪開報將臣行走之處以實奏聞嗣䝉召見放臣總兵出自皇上特恩此番年羮堯祗不過公道難泯未掩臣之行走處耳亦非深恩厚惠令臣感佩而不可忘也臣猥以微賤䝉我皇上天恩寵榮至此即使向日是年羮堯門下黨類彼巳顯背君父罪惡昭著為國之賊臣亦當執大義而攻擊其惡况臣歷來並未受彼私恩小惠豈肯絲毫瞻顧重小節而蔑大倫以自取罪戾哉總因臣愚魯粗疏並不留心於年羮堯故彼之罪惡纍纍臣未能詳悉臚列罪實無辭為此繕摺奏聞併繳硃批謹奏覽此奏朕心釋然矣爾原係朕最賞鑒之人况爾之升擢實緣自有勞績所以䝉朕計功授職並非因年羮堯噓植而然也恐爾不審所由昧於大義故有前諭今爾既不自棄朕豈忍棄爾從此但將欺君罔上辜恩負義之年羮堯視如仇讐豈特保全名節不貽笑於天下後世且堪成就現在之功名也實力勉為之若於此中少有不能决絶仍存瞻顧徘徊之意亦何能逃朕照察日後至敗露時譴責自必加倍勉之慎之雍正三年八月十八日河南河北總兵官臣紀成斌謹奏為恭謝天恩事本年八月初九日南陽鎮臣董玉祥赴任敬將面奉上諭宣傳到臣臣跪聆之下當即望闕叩頭謝恩訖伏念臣以一介武夫至微極陋荷䝉聖主隆恩由末辨拔至總兵重任蒞任以來寢食夢寐時存兢惕惟恐有負天恩臣雖才具踈庸自愧無能報效而血誠愚衷實可矢諸天日邇者年羮堯諸惡敗露欺君虐民罪不容誅臣昔年在川屢被其遏抑至青海之役臣行走之處年羮堯難以掩蔽所以奏聞保舉夫以亂臣賊子所保舉豈復有忠良之輩臣反覆思維先巳自疑且臣愚魯粗踈又未能將年羮堯不忠不法之惡跡詳悉臚列直陳其罪臣安得不愧懼驚惶時凛待罪之心乃䝉我皇上天地之恩既寬臣罪復鑒臣衷令南陽鎮臣董玉祥宣傳聖意明示恩綸臣叩聆之下感激涕零即捐糜頂踵難酬髙厚惟有凛遵聖訓益加砥礪實心辦事竭盡駑駘以仰報天恩於萬一耳為此繕摺奏謝謹奏人非聖賢孰能無過不但爾從前誤認年羮堯甘為其所保舉即朕亦何嘗未誤耶朕所惡者固結私情而忘公誼之流如能明大義改過從善則何罪之有朕從來心口一如無虛語也王嵩甚不妥當爾曽與之同事必知其居心為人據爾所見秉公奏聞密之雍正三年九月二十六日河南河北總兵官臣紀成斌謹奏為遵㫖密奏事雍正三年九月二十二日臣家人齎捧皇上硃批奏摺到臣臣叩頭展視伏讀諭㫖遵查王嵩原係陜西督標守備升轉俱在陜省至臣往年服官二十餘載俱在川省與王嵩從未謀面惟於去年同事軍前與王嵩始相認識臣見其為人言過其實又極善於趨奉年羮堯所以由守備兩三年間題補至總兵至王嵩之居心臣因彼時所領係四川官兵王嵩所領係陜西官兵各自領兵分𠞰並未與彼同辦軍務且相交又淺是以未能深悉其隱微我皇上明並日月無逺不照自難逃聖明之洞鑒也今奉硃批下問謹將臣愚見秉公據實親書密奏伏祈皇上睿鑒併繳硃批謹奏所奏甚公向聞王嵩係一儒將頗有胸襟抱負今據各處參奏觀之大抵居心巧詐調來親看何能逃朕鑒察至事明後爾等自然領悉同日又奏為恭謝天恩事竊臣進摺家人回署齎捧欽賜哈密瓜到臣臣隨恭設香案望闕叩頭謝恩祗領訖伏念臣一介武夫至微極賤䝉我皇上天地宏恩畀以封疆重寄抵任一載虛糜厚祿涓埃未報負愧良深乃屢荷賞賚有加無巳且又以逺方珍品頒及微臣聖恩愈髙愈厚微臣圗報愈難惟有益加黽勉竭盡駑駘以仰酬皇上天恩於萬一耳為此繕摺奏謝天恩謹奏覽奏謝知道了嗣後如再接頒賜食物些小恩賞無庸特差人來齎呈奏摺遇便附謝可也雍正三年十一月二十二日河南河北總兵官臣紀成斌謹奏為奏聞事竊臣因標下八營守兵惟開封一營原有盔甲其餘七營歷來並無盔甲於本年二月具摺請㫖製造欽遵硃批移准河南撫臣田文鏡轉檄布政司照依約估發存庫耗羡銀六千四百六十三兩零於六月初二日領齎到臣七月初二日開工查照七營守兵名數共成造鐡盔綿甲二千八百八十九頂副於十月二十日完工隨准撫臣委員驗明照數分發各營給兵披戴查原領約估需用銀六千四百六十三兩零今逐細核減製造實止用銀五千八百四十七兩零餘剩銀六百一十五兩零巳照數繳還司庫訖所有造完盔甲頂副用過及餘剩各銀數併完工日期理合奏聞謹奏所奏知道了朕將王嵩調到看伊竟是一不堪棄物滿面鄙俗之氣年羮堯乃稱之為儒將比嶽鍾琪更優等語殊屬可笑之極據此觀之真係年羮堯之犬馬也雍正四年四月十二日河南河北總兵官臣紀成斌謹奏為恭謝天恩事雍正四年正月十九日臣進摺家人回豫齎捧欽賜臣御書福字一幅臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣以至微極賤之身屢荷皇恩賞賚天髙地厚之德久巳淪肌浹髓矣兹又䝉宸翰下頒臣何人斯欽承異數即肝腦塗地難於圗報惟有益加砥礪竭盡犬馬之力以仰酬天恩於萬一耳為此繕摺奏謝謹奏覽奏謝知道了爾居官聲名中平當加勉自勵毋稍怠忽若不感奮做一優等出色總兵仍屬虛負朕之知遇也勉力為之同日又奏為奏聞事竊查臣標所屬地方本年入春以來各處雨澤不均河南府及汝陜二直𨽻州各所屬地方屢得透雨彰德府屬之林縣懷慶府屬之濟源縣亦俱霑足其餘各處地方雖屢次得雨一二三寸不等但俱未霑足幸去年秋間多雨土膏滋潤不至大乾目今春夏之交正二麥秀實秋禾播種望雨甚殷之時於四月初四日大雨一夜又初六七八九等日大雨四晝夜各處俱巳霑足深透其從前得雨之河南府等處地方今又透霑膏雨秋禾茂發二麥秀實大約俱有八九分收成其現今始得透雨地方秋禾巳種者得雨茂長其未種者處處播種雖地土有肥磽不一髙下不等然大槩俱屬有收至彰懷衛三府所屬地方二麥俱約有六七分收成惟開封一府所屬地方從前間有旱蟲雖不大為害然麥苗未免有所傷損大約只有四五分收成理合具實奏聞謹奏覽奏雨澤情形大慰朕懷雍正四年十月初二日河南河北總兵官臣紀成斌謹奏為回奏事雍正四年五月十五日臣家人齎捧皇上硃批奏摺到臣臣叩展跪讀不勝惶愧伏思臣一介微陋仰䝉皇上隆恩簡畀總兵寵榮非分更屢荷聖慈宥過曲成諄切訓諭誠天地父母之恩人臣難得之異數也臣雖至愚未有不感激而思奮者惟是臣質愚才庸心欲酬夫髙厚力實限於駑駘尸位素餐有負重任撫躬循省每切悚惕復䝉皇上天恩格外成全訓示勉勵臣叩誦之下愈覺愧感無地矣嗣後惟當益加砥礪竭盡血誠以期上報皇恩於萬一耳為此繕摺奏聞併繳硃批謹奏知道了常存治愈求治精益求精之心則日見增長之效也同日又奏為奏聞事竊查臣標所屬地方本年自夏徂秋雨𤾉時若每值望雨之期即有時雨之降並無烈風迅雷此皆我皇上至聖至仁上合天心以致斯五風十雨年登大有之祥今查各處秋禾俱屬豐收二麥又皆廣種百室盈寧軍民歡慶臣覩兹富庶不勝欣幸仰體皇上軫念地方至意所有屬汛秋收豐稔情形理合據實具奏以慰聖懷謹奏實慰朕懷此皆爾等封疆大臣文武和衷安輯兵民上感天和之所致何獨歸功於朕勉之敬之雍正五年二月初十日河南河北總兵官臣紀成斌謹奏為微臣居川年久懇恩賞賜入籍事竊臣原籍陜西莊浪衛人臣父紀法原任陜西甘肅下古城守備於康熙二十一年內因逆夷犯邉臣父帶兵截殺中傷陳亡臣母曹氏因此感傷致病亦相繼而歿時臣年方九嵗並無兄弟貧而無倚寄食於親族之家逮後稍長成人臣投赴天津鎮臣嶽升龍轅門效用隨嶽升龍出師口外征𠞰噶爾旦䝉給外委千總䟎運軍糧凱旋後鎮臣嶽升龍升授四川提督將臣帶赴川省臣於是即在成都為人贅壻始有妻室三十六年䝉兵部議叙臣以營千總即用得補四川提標千總歷至參將俱在川省雍正元年特奉恩㫖升授臣雲南援𠞰右協副將告隨原任四川提臣嶽鍾琪軍前效力仰賴皇上天威蕩平西海逆寇雍正二年䝉恩召見特放臣河北總兵此臣入川出身之始末也竊思臣原籍舊無一椽而川省亦無寸土在川在陜固皆無可戀惟是臣入川備員將及三十年凡娶妻生子聫結姻親俱在川省於川中風土人情久成習慣伏查定例提督總兵副將俱不許在任所置産入籍其參將以下等官任所置有産業欲在彼入籍者許令地方官報明督撫准其入籍等語臣在川官止參將雖於定例無違但現在䝉恩拔擢總兵一旦入籍他省不敢不瀝情奏請伏祈皇上准臣入籍四川成都府俾臣子女姻親得相團聚不但臣戴髙履厚犬馬報效之忱永矢弗諼即臣子子孫孫亦莫不頂感皇恩於生生世世矣為此繕摺謹奏覽奏巳悉具疏題請可也疏內但摘緊要數句叙入無須如許情節題到之日朕自降㫖允准此奏併朕批諭俱不必援引雍正五年六月十三日河南河北總兵官臣紀成斌謹奏為奏聞事竊查臣標所屬地方本年春間雨𤾉時若二麥處處豐收自入夏以來查開封河南二府及汝陜各所屬地方屢次得雨二三四寸至七八寸不等彰德衛輝懷慶三府所屬地方屢次得雨二三四寸至五六寸不等各處早晚秋禾俱經播種自今大雨時行早禾漸巳結實晚禾正當茂長此皆我皇上盛德至誠感召天和故致風雨調順二麥既巳豐登秋成又有可望禾黍遍野瓜果盈疇軍民欣欣含餔樂業莫不感頌聖天子之弘庥臣仰體皇上軫念地方至意所有汛屬二麥豐收及在地秋禾得過雨澤情形理合據實奏聞謹奏覽奏二麥豐收秋禾得雨情形朕懷深慰同日又奏為恭謝天恩事竊臣前因居川年久懇恩准其入籍繕摺具奏嗣奉到硃批臣隨恭設香案率領妻子望闕叩頭謝恩當即欽遵訓㫖於本年三月十二日繕疏恭進經兵部議覆委於定例有違乃䝉皇上特恩准臣入籍四川臣接到部文隨於本年四月十五日具疏恭謝天恩訖伏念臣䝉皇上知遇隆恩特畀總兵重寄履任以來三年尸素愧無絲毫報效屢荷聖恩格外優容寵賚頻加即寢食夢寐之間常切驚惕頂沐仁恩久淪肌髓兹因奏懇入籍四川臣亦自知詞意繁冗仰䝉聖訓周詳開示愚昧此誠天地父母之恩不識微臣何修邀兹異數從此臣䝉恩得以入籍川省不但臣犬馬之忱固當永矢弗諼即臣子子孫孫亦莫不銜結天恩於生生世世矣為此具摺奏謝併繳硃批謹奏覽受恩易報恩難竭力秉公勉為之雍正五年七月初八日河南河北總兵官臣紀成斌謹奏為奏聞事雍正五年六月二十日據臣標中軍逰擊禀據防守懷慶府河內縣窰兒頭地方兵丁禀稱聞得過路人說山西澤州大箕村於十九日晚上有三百餘人持械扎傷捕役一名臣以該村鄰近河南隨一面添撥辨兵凡與晋省接壤隘口及道路墩鋪加意巡防盤詰一靣差親丁赴澤州地方查探起釁情由嗣據該丁禀稱訪得因大箕等村有等拳徒素日羣聚飲酒賭博不事生業該州牧借點保甲捉拏二名乃該村匪黨竟聚衆於中途劫回更將州役搶去十三名打傷一名且恃聚强約鄰近村人該州將城門衙署關閉防間嗣經紳襟講和彼始將衙役放回其附和者漸巳解散該州牧密諭各村保地舉首匪類隨拏獲十餘名尚有三五十名逃匿晋浦山中等情臣因該丁查探起事情由不甚明確復另差幹丁再赴澤州細加查訪去後六月二十七日澤州牒移懷慶府內稱濟源縣南門外西劉村有一翟神仙㑹看風水行醫是其軍師即此處頭目靳廣焦養祿等俱逃赴濟源投奔其家等情牒府移營臣當即選差辨兵協同府縣官役飛赴密拏查並無靳廣等蹤跡隨將翟神仙拏獲押解來府旋即護解澤州訖今據前差去兵丁回禀細訪得此事原因澤州民王泰來家人靳廣因伊主待伊刻薄紏合魏姓義子併家人陳桂及拳徒焦養祿等二十餘人在大箕村聚衆欲打劫王泰來家復糾合泰來不知姓名家人入夥彼即密禀伊主首告澤州查拏魏姓義子聞知自縊身死匪類王君祿隨即被獲詎靳廣同陳桂等紏合人衆於中途將王君祿劫回拏住州役九名俱行打傷次日該州牧委教官等勸諭彼始將州役放回匪黨亦各自逃散嗣經州牧陸續緝獲焦明山等共三十餘人現在審解其黨犯前有逃匿晋浦山中今巳盡獲其餘未獲之犯現在嚴拏等情臣思此類不過係逰手無賴之徒其意在於劫掠富户似非謀為不軌之類况巳緝獲三十餘人餘犯自不難於弋獲結案但係鄰省地方有此聚衆不法之事理合將兩次差查情由備録奏聞伏祈皇上睿鑒施行謹奏出語可謂亂道之至試思此等匪類目無法紀劫掠富户之後將作何結局身膺封疆之責凡百寧過於慎重小事如大事辦理方是似此立意寬縱疏忽甚負朕之任用雖屬鄰省皆係國家地方遂乃膜視於己無涉是誠何心所有逃匿人犯竭力協同擒捕務獲凡地方上遇有此等事件外貌故作不知自以為能將大事化小事小事化無事此種因循懈怠之風斷乎不可再若如是居心行事將來必罹重譴慎之戒之切記切記雍正五年八月二十八日河南河北總兵官臣紀成斌謹奏為奏聞事竊查臣標所屬地方本年自夏徂秋各處雨澤頻霑今當納稼之時早晚秋禾俱屬豐收二麥又皆廣種童叟軍民熙熙皥皥臣覩此屢豐之象不勝歡忭仰體皇上軫念地方至意所有屬汛秋收豐稔情形理合據實具奏以慰聖懷謹奏秋收豐稔實慰朕懷同日又奏為微臣愚昧無知聖恩天髙地厚欽奉訓諭愧悔無極恭謝天恩事竊臣因山西澤州地方有匪類聚聚將臣兩次差查情由具摺奏聞奉到硃諭臣跪讀之下䝉我皇上訓示詳明始豁然開悟惶愧汗流臣前摺奏稱此類不過係逰手無賴之徒其意在於劫掠富户似非謀為不軌之類竟未思及劫掠富戶之後作何結局臣言誠為亂道臣罪洵無可逭至鄰省皆係國家地方臣豈敢有異視亦斷不敢因循懈怠上負聖恩兹查此案匪類河南地方除前獲解翟神仙外續又拏獲楊世龍楊鐡山陳志榮陳雲州周叔方程廷賓張三等七人俱巳解赴山西收審訖至案內脫逃未獲要犯有在懷慶府居住之革職千總楊廷選及自山西逃入河南地方之靳廣等臣現在懸賞嚴緝務期必獲移解外惟思臣䝉皇上天恩拔置封疆重任乃不知謹小慎微之道如此輕忽其事應即嚴加重處復䝉聖主矜憫寬宥臣跪聆訓誨感激涕零即肝腦塗地不足以報髙深惟有欽遵聖諭嗣後凡事寧過於慎重將小事如大事敬謹辦理勉效駑駘以贖罪愆以仰報天恩於萬一耳臣不勝惶悚愧懼感奮之至謹奏有過知改則識見日漸增長如過而不改執以為是將來必至大過追悔亦莫及也所奏知道了硃批諭㫖卷一百二十四
