body:
  text: 欽定四庫全書硃批諭㫖卷八十四硃批邊士偉奏摺雍正元年九月二十日廣西左江總兵官臣邊士偉謹奏為奏明事竊臣一介武夫至愚極陋叨䝉皇上洪恩擢授左江總兵官於到任後查臣所屬地方幅員遼濶水陸分岐外控安南內有土司及猺獞雜處在在需兵防守何敢多占空糧臣遵例留總行禁革以清夙弊臣標下四營盔甲器械逐一親加點驗多皆舊敝除堪用者現在修整外臣率同遊守公捐補造義子鎗二百二十桿盔甲六百四十頂副再查營伍並無炮位亦無藤牌臣復捐造行營炮四十位藤牌二百面俟完竣之日配兵操演勤加訓練以肅戎行臣屬左江河道甚屬遼逺商旅船隻來往絡繹防範宜嚴雖設有塘汛撥兵刀等項著該汛千把督率兵丁在河晝夜上下遊巡如此庶塘兵依哨船而助威哨船藉塘兵為眼聖聽伏惟我皇上勵精圖治無日不以地方營伍為念是以謹將臣到任料理各事宜據實奏明伏乞睿鑒謹奏所奏俱悉向日聞汝居官為人聲稱皆好勉力為之孔育珣韓良輔均係督提中上等優者爾當與之同心協力輯兵安民以綏靖地方可也雍正二年四月二十二日廣西左江總兵官臣邊士偉謹奏為恭謝天恩事竊臣總兵名下親丁遵照定例留糧六十分前經奏明兹者督臣孔育珣札致提臣韓良輔云聖恩寬厚優恤武辨令各得養廉只要勤加訓練器械整齊即各員親丁糧於定例之外量加幾分少資養廉我皇上必曲體下情等語提臣韓良輔轉𫐠到臣臣隨與督臣孔育珣商酌於定例親丁六十分之外量加二十分其將備千把亦各於定例之外量加四五分至一二分不等臣本庸才荷䝉諭㫖令臣等各得養廉聖恩優渥有加無巳受恩愈重報稱愈難惟有恪遵聖諭勤加操練兵馬修理軍裝務使技藝嫻熟器械整齊稍盡職守上報洪恩於萬一耳為此繕摺奏謝伏乞皇上睿鑒施行謹奏知道了聞爾官聲甚好益當加勉恪盡乃職以期無負朕任用之恩同日又奏為奏明事竊臣到任後隨將捐造軍器等項緣由具摺奏明兹據臣所差遊擊自廣東運回義子鎗四百桿新造盔甲一千頂副併修整舊盔甲三百六十頂副藤牌二百面子母炮二十位鈎鐮鎗四十把挑刀四十把哨船八隻到營隨分發四營配兵操演巡防外臣前摺奏明擬造行營炮四十位盔甲六百四十頂副其行營炮因廣東工匠不諳製造遂添造義子鎗共四百桿再盔甲因咨明督臣孔育珣督臣以六百四十頂副尚少恐不足以壯軍容特幫銀一千兩囑臣增製造盔甲一千頂副如有未敷再行找給臣遂製造新盔甲一千頂副現今臣標新舊盔甲共一千三百六十頂副軍裝業巳整齊督臣時囑臣以訓練為急臣遵循操演今營伍兵丁技藝頗覺嫺熟足資實用但粵西地方濕熱所造號色船隻易於黴黯損壞臣與督臣提臣商酌就於臣標四營內准留糧一百分以為每年修理軍裝哨船併演放鎗炮火藥鉛彈之需庶營伍永不致廢弛矣理合奏明伏乞皇上睿鑒施行謹奏此係爾與孔育珣韓良輔共相商行之舉自必與事理相協知道了不特此也百凡總要據實無隱為益甚大君臣之間應當如是上下少有間隔即如一身氣血阻滯不能流通則諸病叢集矣爾等封疆文武諸臣能見及此屏除虛僞一以誠意相孚天下何愁不常保萬年太平也勉之雍正三年七月初三日浙江溫州總兵官臣邊士偉謹奏為革除漁船陋規清夙弊以靖海疆事竊照溫州地屬海濱窮民多以捕魚為生其業最苦臣時加察訪凡有妨於魚業者悉心革除隨查溫州各嶴漁船每年有總兵陋規銀二千餘兩伏思定例稽察船隻原為防禦姦匪以衛商旅總兵一得陋規非特苦纍漁民且將辨巡察亦將不敢過於嚴密任其船隻出入汛守既弛姦良易混殊非靖海安商之法臣隨將總兵漁船陋規臚列數目出示概行革除嚴飭將備千把務秉公忠實心巡緝庶幾漁民得以樂業而海疆得以永靖矣除報明督臣滿保撫臣法海提臣楊長春外理合奏明伏乞皇上睿鑒謹奏果能如是殫心革弊實力奉公可嘉之外更有何諭勉之同日又奏為整備軍裝以肅戎行事竊溫州襟山帶海實為扼要重地必須軍裝整齊庶可以奠海疆而靖宵小查臣標三營馬步兵丁舊有之甲多巳朽敝除應加修整之外尚缺步甲一百餘身亟宜添補再海洋禦侮鎗中惟鹿鎗最利現在營中鹿鎗少而鳥鎗多亦應改造又出洋哨船所配火斗火罐噴筒火箭等項為攻擊要具因歷年已久悉屬不堪須另製備至臣標中左二營係屬水師額設大小戰船一十八隻每次哨巡總巡用船十隻各配炮位輪流出洋應令水兵時加演放方能純熟所需火藥鉛彈必多置備庶足應用以上鎗甲火具等項種種需費不一而足兼之浙江地氣潮濕軍裝易於黴損若不時加整理何以壯軍實而靖地方但一切費用營中並無所出難以措辦臣荷䝉聖恩膺此海疆重寄何敢因循貽誤謹將親丁糧六十名之內撥出三十名分發三營將備每月將所領糧餉以備軍裝庶戎行得漸整肅矣為此繕摺奏聞伏乞皇上睿鑒謹奏據云軍裝等項營中並無所出難以措辦何不暫存前項規禮添凑修整俟通融辦理之後再行裁汰耶今既經革除免纍漁民亦屬美舉又將親丁名糧撥出以充修整軍裝之用殊屬可嘉所奏知道了硃批諭㫖卷八十四
