body:
  text: 欽定四庫全書硃批諭㫖卷二十三上硃批黃炳奏摺康熙六十一年十二月初四日護理山東巡撫印務按察使臣黃炳謹奏為奏明事竊臣一介庸愚䝉先帝豢養深恩不次擢用由筆帖式數年間歷升山東按察使國恩深重雖捐糜頂踵未足仰報萬一今恭逢聖主臨御方新凡關國計民生罔不上厪睿慮臣在東日久地方諸務敢不竭力以效涓埃之報查本年登萊青三府自入冬以來雨雪調勻二麥俱己下種濟兖東三府雖雨雪稍遲近據各屬俱報得雨雪現在補種春麥地方俱各安靜惟因六十六十一年東省天時亢旱二麥失收荷䝉先帝特沛洪恩緩徵賑濟所有六十年地丁錢糧未完七十餘萬兩現今奏銷期迫其不及分數各官臣自當另行查參聽候部議外但恐各官自顧考成嚴行追比徒事刑敲終屬無益可否緩徵或帶徵容臣隨奏銷另疏題報伏乞聖主睿斷批示遵行再前任布政使王用霖任內因公那用過庫銀四十九萬餘兩經前撫臣李樹德保奏濟東道程光珠署理布政使情願限年補完蒙先帝俞㫖著交該撫將此項那用銀兩務於二年內補完欽此欽遵在案後又續查出因公那用銀十三萬餘兩時李樹德因已經摺奏不敢又瀆宸聰原擬同前項那用銀兩一併設法彌補今臣查己經奏過者補完銀二十三萬七千餘兩未完銀二十六萬一千餘兩並續查出未經奏明銀十三萬餘兩臣再四思維若據實題報不惟與先帝二年彌補之恩㫖有悖且與錢糧究無裨益若竟朦混報完則聖明洞燭之下臣欺罔之罪實所難辭伏念國帑關係重大既已悉知敢不據實奏明為此謹奏向日聞爾聲名頗好覽奏地方年歲情形錢糧虧缺緣由甚為備悉周詳朕今擢用爾為山東巡撫爾當追感皇考深恩竭力效忠以圖報稱但東省諸事廢弛已極必須加意整飭盡心釐剔務令地方大有起色方不負朕委任之意也山東巡撫臣黃炳謹奏恭請皇上聖安朕安知府李元龍係貪官李國亮之子竊位登守家私百萬而猶婪贓不己且與李樹德聨宗相昵通同虐害百姓此等不肖之員當一靣拏問一靣糾參將伊財産追出以養窮黎地方寃抑之氣庶可少伸爾絲毫毋得瞻狥向日情靣謝絶一切請託嚴行搜查從重究擬以為貪黷者戒特諭雍正元年正月二十五日山東巡撫臣黃炳謹奏竊臣查得分貯監榖一案自康熙四十五年開捐起至五十三年停捐止共收穀三百一十一萬一百六十石經原任撫臣蔣陳錫收官生穀石每穀一石折銀一兩共計折收銀三百一十一萬一百六十兩除分貯各官每石折銀三錢各官共領過銀九十三萬三千四十八兩尚該餘銀二百一十七萬七千一百一十二兩俱為蔣陳錫鯨吞蠶蝕伏思積貯米穀原為賑荒備用充兵餉再查監穀銀兩各屬均有分貯除因地方災歉奉文撥賑實在無存者不議外其餘確係虧空並存剩無幾者容臣逐細確查統歸於虧空案內另行奏報再查現任湖北驛鹽糧道許大定前任兖寧道時將分貯監穀銀兩任意侵用其虧缺之數於交代時抑勒宋基業接受己經出有印結但宋基業現己被參向伊嚴追恐終與國帑無益查該道分貯倉穀七十一萬石零除參過黴爛借給窮民及現在存倉穀石併穀價銀外尚缺銀五萬餘兩容臣確查是否實係許大定名下應追之項另行查追再有效力河㕔吳近宸前曾借缺許大定銀三萬兩許大定亦將此項借劵抵作虧空現據吳近宸還過銀八千四百兩尚缺二萬一千六百兩臣受聖主隆恩惟知國帑為重現在分咨湖廣巡撫併總河嚴飭該員等臣更有請者所有分貯各屬監穀銀兩若令其照數買穀貯倉現今時價騰湧民間粒食艱難實亦免小民賠纍之苦為此一併奏聞伏乞睿鑒批示遵行謹奏所奏俱悉同日又奏為遵㫖奏明事雍正元年正月十七日臣齎摺家人回省恭捧上諭到臣臣叩首開讀仰見聖主恩靡不周德靡不遍雨露與雷霆並用懲姦與防弊兼施前臣摺奏東兖兩屬荒歉小民困苦情形併請截留漕米一事䝉恩諭動用倉儲遴選賢員確查乏食窮民分頭賑濟務使均沾實惠至鄰省流移之民亦宜一體撫恤煌煌諭㫖臣自當欽奉遵行因查所屬存倉米穀寥寥無幾窮民分頭賑濟並遇有鄰省窮民亦即一併撫恤再請截留漕米一項諭㫖甚明臣應候題覆允准遵行查各屬漕船現在開幫北上若令其停留候㫖恐致遲延有誤漕糧是以不揣冒昧先於德州水次截留十萬石分貯沿河各州縣以備不時需用臣現另具疏題明伏乞睿鑒再知府李元龍居官婪贓虐民臣伏讀諭㫖仰見皇上至聖至明洞燭幽隱時時以吏治民生為念臣於十七日奉到密諭適該府於二十日至省稟見當即傳集布按二司當堂鎖拏發交按察使監禁現在題參請㫖革職嚴審將李元龍詐害贓私盡行追出並侵欺錢糧追補庫帑然後請聞謹奏覽雍正元年三月十七日山東巡撫臣黃炳謹奏為遵㫖保奏事竊臣叨䝉聖主隆恩惟恐有負知遇故於屬員賢否不拘常格前經據實奏明仰邀聖明洞鑒矣兹有濟東道程光珠升任員缺應否將臣前奏之東昌府知府吳興業補授吳興業員缺應否將前奏之海豐縣知縣湯豫誠補授東昌府同知吳應臨捐升員缺應否將前奏之樂陵縣知縣王協燦補授益都縣知縣吳鼎被參員缺應否將前奏之泰安州吏目趙綸補授茌平縣知縣馬斯良病故員缺應否將前奏之談城驛驛丞沈一正補授以上各官於例雖皆未符論銜亦有越等臣何敢輕為瀆奏但人才難得臂指攸資伏見聖主御極以來用人無方不拘資格為此遵㫖保奏伏祈睿鑒施行謹奏吳興業等俱照爾所請補授督糧道佟世祿革退員缺已將余甸調補余甸員缺將徐湛恩補授矣同日又奏為據情請留賢將以重地方以裨漕運事竊臨清一協當水陸要區彈壓地方催趲糧艘必須得人為要今該協副將黃元驤奉部調升廣西梧州協副將臣因遵㫖挑濬運道查閲河干據所屬兵民稟稱該協平日辦事為人俱好兵民相安等語臣目擊愛戴情形不敢壅於上聞可否准其以升銜留任出自聖主睿裁謹奏據奏黃元驤與地方兵民相安著以升銜留任可也雍正元年四月初三日山東巡撫臣黃炳謹奏為請補賢能郡守並酌調繁簡以收實效事竊查濟南府知府張振偉捐升員缺臣昨閲邸報見部選現已有人伏望皇上俯念濟南地當省㑹事繁倍於他郡於其引見時縣楊一正辦事去得為人坦直伏乞皇上於此三員中欽點一員補授濟南府知府再青州府知府陶錦題參邵宗應與黃縣知縣盧承綸調補壽光縣知縣吳暄應與壽張縣知縣陳從善調補滕縣知縣張觀海應與平陰縣知縣顧彩調補一轉移間於地方實有裨益為此繕摺請㫖伏乞睿鑒施行謹奏覽雍正元年四月二十二日山東巡撫臣黃炳謹奏為奏地田禾多有損傷黑土之地無甚大礙惟搖動麥盛京員外查該州地方適被風災保釐撫恤正在需人以臣愚見或令該員仍留原任照舊辦理地方事務謹繕摺一併陳明謹奏將黃廷鈺具本題留可也但其居官賢否若何未據聲明既經題留汝當極力朂勉令其勤慎供職雍正元年五月初四日山東巡撫臣黃炳謹奏為恭報得雨日期事竊查五月初二日夜省城得有雨澤於近城地方臣差人查勘入土五六寸不等俱已霑足又據濟東道吳興業禀稱髙唐州等處俱於初二日夜得雨透足所有窮民俱己給與粒種現今補種秋禾又據泰安州平原縣濟陽縣聞伏祈皇上睿鑒謹奏覽所奏得雨情形深慰朕懷高唐州等處窮黎及此時雨補種秋禾皆爾撫恤得宜之所致也爾前禱於泰嶽今即有甘霖之應可見人神交感之理分毫不爽自茲爾可不更加誠敬歟勉之雍正元年五月二十四日山東巡撫臣黃炳謹奏為清查庫項據實陳明仰祈睿鑒事竊臣查李樹德己完銀二十五萬一千餘兩尚有未完銀十四萬九千餘兩而王用霖之家屬至時難以追償今於每季放餉時陸續扣除又有墊發軍前效力運米各官盤費銀三萬七千餘兩原係通省州縣情願公幫之項今仍催各州縣上緊補還又有各官借領銀四萬五千餘兩地方公務那用銀二萬六千餘兩其借領者現在嚴催原借之本人清還其那用者雖係前任之事臣亦何敢推諉今與佟吉圖程光珠等竭力籌畫務期陸續補完又有本年奉㫖賑濟災民挑挖淤淺并從前李樹德任內建築河堤各項共用銀二十七萬四千餘兩此俱係應行題銷之項現在催令各屬備造清冊分案具題此藩庫之已經查清而無餘弊者也伏查目今奏銷期屆而藩庫內尚有未完前項銀兩若作實在存庫題報是臣之欺皇上也臣斷有所不敢若作各員之虧空題報是臣之寃屬下也臣又有所不忍倘得寬限一年便能逐欵清楚不致少有虧缺除將目下不能奏銷緣由另疏題請展限外但恐部議格於成例不准所請合先具皇上乾斷特賜俞允又查各州縣錢糧統計自康熙四未經交盤者有身任職守而那移缺額者皆由從前之上司不能實力稽查以致輾轉虧空今蒙皇恩浩蕩令其三年補完臣請將各員之虧空無論新舊多者限三年次者限二年少者限一年務期如數全完不令絲毫缺額若已升而現任他省之員殊難甘心代賠使其脫然事外似應著落伊等現任之地方追賠庶無幸免若現在已升及將來應升而未赴新任者似應仍留本任限年勒追全完之日再行升轉如此則州縣之虧空俱有著落而漸次可復還原額矣如果臣言可採容臣另疏具題請㫖遵行謹奏此事不必另疏題奏朕已將爾所請發議矣爾但殫心竭力督令補苴倘遇牽制難行處仍具摺密奏可也同日又奏為恭報地方情形仰慰聖懷事竊查東省於五月初二初四初五初九等日得雨二寸三寸五寸八寸不等遍查通省只有濵州等四州縣尚未得雨再青州府屬之臨胊縣連年失收小民艱於粒食臣於陛見時蒙皇上諭令加意撫恤臣回署後撥給穀八千石令該縣俱可盡力南畝矣再臣遵諭㫖五六兩月小民糊口艱難務須賑濟方好今臣行前泗水等處十一州縣被災尤甚蒙臣已遵聖懷理合奏聞再查恩科武闈六月舉行例應初七日開考臣因時當盛暑今定於初一日開考每日早晚較射日中停止俾時日少寬得藉早晚之涼爽從容試技有長畢獻臣於題本內仍填初七日開考以符定例合併奏聞伏乞睿鑒謹奏武闈起於初一日試技即據實題奏亦無不可何故因小節而涉虛誑嗣後似此等事切不可所行與所奏致有異同以滋衆論特諭雍正元年六月初一日山東巡撫臣黃炳謹奏為秋禾望雨正殷甘霖及時普降恭慰聖懷事竊臣遍查闔省補種秋禾前雖得雨尚有未經霑足地方臣思泰山為五嶽之尊岱宗乃東皇司命而泰頂碧霞元君聲靈赫濯護國庇民臣於五月二十六日親赴泰頂薰沐齊修祈禱雨澤仰荷皇上聖德感孚休徵立應即於二十七日大降甘霖徹夜滂沛附近泰安各州縣雨澤霑足入土或八寸聖懷再查運河水源俱係泰安一帶泉脈濬歸汶河流入運道以濟漕艘今臣親見泰山萬壑爭流俱歸汶河滙入運道想近日水勢增長可無煩聖慮也為此謹奏朕命部院堂官二員前往封閘看水同爾籌畫運道至賑濟一事亦遣官二員來協助料理爾等宜同心協力經理漕運并加意賑恤災黎務期不至失所以副朕懷內博爾多者乃朕藩邸舊人因其人猶老成故差來同爾審李元龍之案博爾多未到之前毋得預為宣露慎之特諭雍正元年六月初二日山東巡撫臣黃炳謹奏為伏請聖躬稍節哀思以慰臣民事本月初二日臣驚聞皇太后於五月二十三日賔天臣五內崩摧哀痛靡己竊臣蒙皇上殊常恩遇有逾家人父子伏知皇上至仁至孝盡禮盡哀孺慕之殷無時或釋惟是我皇上為祖宗社稷所憑依為天下臣民所託命總攬萬幾所關甚重伏望節哀忍痛珍重聖躬則率土臣民實所嘉賴再臣備員巡撫兹聞皇太后哀訃分應奔哭梓宫並匐請聖安山東密邇神京往回不過十餘日所屬地方比來甘霖普降民情帖然一切事務沿途亦可辦理不致有誤叩乞聖慈允臣赴京俾臣分稍盡則臣心稍安矣臣不勝哀懇待命之至謹奏所奏己悉官守任重不必來京一切諸務於謹慎中更加謹慎勿因地方得雨心遂放恣邇來東省疲敝己極非勤苦三年不能復其元氣也勉之勉之雍正元年六月初八日山東巡撫臣黃炳謹奏為敬陳窮民苦纍請照按地攤丁以蘇積困事竊國家惟正之供原有地丁兩項丁自為丁地自為地本不相涉也惟查各州縣中往往有田連阡陌而全無一丁者有家無寸土而承辦數丁者窮民在豐稔之年已難措辦設遇歉收之歲更無力輸將此東省之民所以易去其鄉而不顧也臣訪知浙省丁銀俱隨地辦納有地則有丁無地則無丁苦樂均平誠為善政今請將東省丁銀援照浙省之例攤入地畝輸納其中裒多益寡務期斟酌盡善仰祈皇上敕部查議如果臣言可採并請通飭北五省一體遵行則窮民之苦纍永除而感沐洪恩永垂不朽矣是否有當統候皇上睿鑒施行謹奏攤丁之議關係甚重豈可草率從事爾將一省內之刑名錢穀案件循規蹈矩一一秉公料理尚恐有所未協何得於事外越例搜求况賦稅出自田畝連年北五省率皆薄收正供維艱何堪再有更張之舉觀爾近來所奏每多涉於孟浪朕正當大事在身爾自應惓惓以節哀為請方合臣子之誼乃毫不關切並無寬慰婉辭將此等變易舊章之奏冒昧瀆陳殊為無知之甚今後宜謹慎小心於地方諸務兢業遵守倘再有差謬斷難為爾姑容也雍正元年六月十一日山東巡撫臣黃炳謹奏為奏聞事竊臣據兖州府通判陸允欽報稱本月初八日山水驟發運河水勢急溜沙灣子堤被水衝開一處等情到臣臣查此堤原係運河縴道前因黃沁水田無害目下天氣晴明便可興工堵築復聞河臣齊蘇勒布政使佟吉圖俱詣沙灣決口處所查看復思齊蘇勒久諳河務佟吉圖辦事勤慎自能料聞謹奏知道了河工修築機宜不可自作聰明一切俱聽齊蘇勒調度但將錢糧及夫料等項預備充足不致遲誤汝即可告無過矣奏摺不宜與河臣參差汝二人意見符合方期成效脫有異同朕亦必在齊蘇勒處畫一也特諭總理事務王大臣廉親王臣允祀等謹遵㫖議得山東巡撫黃炳所奏各州縣虧空錢糧約計地丁共六十餘萬兩倉穀九十餘萬石分别追賠具奏前來查東省虧空己蒙皇恩令其三年賠補其身任職守而那移缺額之員應如該撫所請酌量數目之多寡定其賠補之年限多者限三年次者限二年少者限一年務期如數全完仍令該撫將虧空各官所缺銀米數目及勒完年限逐一分析奏明如逾限不完將虧空之員從重治罪其巡撫以下督催各上司一併嚴加議處照定例分賠其現在己升及將來應升而未赴新任查出虧空者亦應如該撫所請停升留任亦令該撫奏明虧空數目及勒完年限如能限內全完准其開復升轉如逾限不完從重治罪其督催各上司亦照定例議處分賠其有升遷事故而留交後任者據稱己升而現任他省之員應著落伊等現任地方追賠等語查定例錢糧虧空惟於出結之官是問該員既有虧空該管上司因何不行查參接任官因何不行揭報令其前赴新任茍非上司受賄寬縱即係後官狥情擔任責無他諉罪有攸歸若因一省而牽連他省恐滋煩優况丁憂事故離任之員又將何從追補應令該撫查明如係有抵之項令後任出結之官勒限全完如係無抵之項該管上司勒令後任官收受交盤者應令抑勒之上司與出結官照數分賠逾限不完均照例治罪其虧空州縣倘有不肖之員混稱民缺額外加派貽害地方者該撫據實查參如通同狥隱將該撫一併從重治罪其或有缺在民者應令該撫查明實數分别緩徵帶徵確議另行具奏務期三年之內徹底全完以仰副皇上格外施仁體恤官民之至意謹奏汝所奏各州縣虧空一摺據王大臣等逐欵分别議覆朕再四躊躇不便發出何也朕原有㫖凡虧空官員不許在任設法彌補恐其借端纍民今汝奏稱若概行參追雖粉骨碎身不能追完等語是必將本人仍留在任方能賠補但仍留在任而又不剝削小民其填補之資究從何出此朕之所未解即王大臣等議覆亦難允行也故將此事暫且按下並未宣之於部如果不纍小民而虧空既可清完伊等功名又可保全係全美之事朕何靳而不為總在汝善為設法行之但不可公然陳之於章奏耳假若借此少有煩擾百姓或揑作民缺致生種種弊端則將來罪歸於汝也慎之慎之其己升他省各員著落伊等現任地方追賠之說尤不可為訓在本省者朕尚恐纍及編氓何可因汝山東虧空之故滋害於他省百姓豈朕勤恤民隱之政耶但當查其虧空果有真實憑據不妨遣人往詢本人若係應賠者彼自無不願賠以全其功名倘不肯認賠莫若參革離任以正其罪為是即類此者亦必確查其拖缺數目之多寡指名奏聞然後方可見之施行至汝所奏虧空銀六十萬兩糧九十萬石究係何州何縣某人名下若干之處均未明晰再李元龍等數員貪吏今作何處置亦未見汝奏到先將大槩情節約略具奏以聞特諭雍正元年六月十九日山東巡撫臣黃炳謹奏為覆奏事臣齎摺家人回東恭捧御批各摺臣跪讀之下仰見我皇上睿慮周詳無微不照至臣所奏虧空銀六十萬兩糧九十萬石此指通省各屬而言也現在設法漸次彌補其中欵項繁多頭緒紛雜無庸分析瀆奏其餘御批事宜臣仰體皇上訓㫖敬謹遵循務期妥協所有批摺并總理事務王大臣議覆奏摺理合一併恭繳伏祈睿鑒謹奏雖云虧空欵項頭緒紛雜無庸分析瀆奏但汝前摺奏稱著落已升他省各官追賠之語究屬朦混不特别省恐滋擾纍且嫁禍於無辜之人情理亦甚不合向後類此等事當備細斟酌周詳籌計毋得率意自恣也慎之同日又奏為欽奉上諭事竊臣准部咨開奉上諭議令將江西尾幫船糧截留二十萬石在東省分貯府州縣地方酌量備用仰見我皇上軫念民瘼加惠元元至意第查此米易於紅朽又兑漕糧時飭令有漕各州縣於應解數內均勻截留分貯備用一轉移間則救荒有備黴爛無虞可否允准伏祈皇上睿鑒施行謹奏截留本省小米之說似是而非斷不可行此不過借以為彌縫虧空之計耳與小民無益閭閻饑饉之餘草根樹皮尚將糊口何有大米小米之分耶山東巡撫臣黃炳太僕寺少卿臣須洲户部郎中臣博爾多等謹奏為覆奏事臣博爾多等至山東省城即將柯喬年條奏密摺并硃筆諭㫖俱面交撫臣黃炳並宣傳靣奉諭㫖訖臣黃炳竊查柯喬年條奏內云入境數百里未經種麥等語查柯喬年往來經由之處惟德州以至省城一帶該地方不過收成歉薄並非未曾下種此言似屬過甚東省連年歉收小民窮苦是實目今甘霖普降田禾暢茂將來秋收大有可望况六十年未完錢糧臣己題請分年帶徵而六十一年民缺錢糧雖未具題臣已飭令緩至秋成後徵收柯喬年條奏內云萬姓嗷嗷命懸旦夕果如所言則延今數月生民之死於溝壑者當不知凡幾矣過情之言不應於君父之前冒奏也且皇上重念東省小民積困之後已經動帑賑濟挑河寓賑截漕平糶助給籽粒今又恐小民乏食諭令截漕備賑是皇上時刻以民瘼為念臣何敢不仰體遵循臣等會議除登萊二府屬麥收頗好無庸賑濟外其濟兖東青四府所屬州縣衛所槩行查賑計户口之數目以定賑銀之多寡仍遵㫖先動藩庫銀兩俟賑濟完日勒令李元龍等三人補項所有臣博爾多等到東議賑情形合先會摺奏聞抑臣黃炳更有奏者東省現在賑濟需人料理今有東昌府屬之臨清州恩縣濟南府屬之德州俱已缺員查原任濵州知州徐石麟今升廣西思恩府同知原任掖縣知縣陳留武今升陜西葭州知州原任堂邑縣知縣盧承琰服滿候補可否將徐石麟以同知管臨淸州事陳留武對品補授德州知州盧承琰補授恩縣知縣令各辦理賑濟事務庶免貽誤俟賑濟完日仍令各赴本任盧承琰仍令候補為此合併附奏請㫖定奪伏祈睿鑒謹奏總理事務王大臣會同吏部速議具奏雍正元年六月二十五日山東巡撫臣黃炳謹奏為自陳罪戾恭謝天恩事竊臣齎摺家人回東蒙皇上天地為心包涵曲宥臣惟有且感且愧劼毖將來人夫臣已遵㫖催備齊足移交河臣上緊督修定自無誤再奉御批沙灣決口究因當日堵築不固所以易致衝決臣奏伏望皇上慈鑒恩宥謹奏覽雍正元年七月初十日山東巡撫臣黃炳謹奏為覆奏事竊查東省自甘霖霑足之後各種糧價每石遞減二三錢不等今新米己經上市至七月二十日既經河臣奏聞臣無庸再為煩瀆再蒙皇恩截留江西尾幫漕米二十萬石臣前將不用截留情由奏明聖鑒蒙硃批既不能應用即備細聲明具題不必截留可也欽此臣已遵㫖另疏具聖裁其散賑一事臣會同博爾多等已於六月二十三日公同驗發藩庫銀二十三萬四千兩分委各州縣前往散賑俟賑完之日另疏題明再臣前奏東省虧空銀米一案原指通省所屬而言也有係現在供職而虧空者亦有已升他省而實係原任虧空者查一百零四州縣中求其實無虧空者止有數處臣現在設法漸次彌補查各屬原有火耗一項從前所收加二五加三不等臣前於陛見時曾經奏明聖鑒今仰體皇上恤體臣下并愛養民生至意通盤打算量加核減除每年留給通省各官養廉外餘剩若干儘數補項即以其本來應得之規補其原額虛懸之項如此三年內庶幾漸次彌補矣至其已升他省者臣遵照前批諭㫖按其原虧之數移追解補如有任意抗延者臣奏請聖裁題參追解庶人人知警國帑可免虛懸矣為此具奏伏祈睿鑒謹奏已升他省各員朕屢經批示爾何仍執此說當日既虧空未清何以交代令其脫然往赴新任其中或有上司逼勒後官接受情由即應查出向其上司追究然後拔樹尋根追及本人則可若如此含糊參追殊失溯流窮源之道當仍遵前諭且遣人往詢其虧空緣由并願甘賠補與否如有狡賴不肯認賠者爾指名密奏以聞朕自另有處置同日又奏為奏明事臣接准工部咨開王大臣奉皇上靣諭行文巡撫黃炳將佟吉圖余甸陸允欽俱各拏送齊蘇勒處會同嵇曾筠嚴審議罪具奏欽此欽遵臣即將佟吉圖等逐名嚴拏隨於初十日差員管押解赴齊蘇勒處聽候㑹審伏思我皇上德同天地明並日月凡屬臣工俱在照臨之下何庸臣之瀆奏但臣受恩深重非比尋常既有所知又何敢緘默不言致蹈欺恩深厚之人所有一切公務俱當協力同心和𠂻商酌奏明統祈睿鑒謹奏佟吉圖所省堤口錢糧之數較之楊宗義捐助河務及德音匿災不報所省之數未必過多也一句為錢糧一句慰聖懷此二語即足以喪其軀矣魯論赦小過虞書宥過無大恕其誤犯也若至如此有心之大過何可因其勉效數月之微勞遂相抵釋耶自既不諳河務而又逞其胸臆違抗上官此端一開凡外任大臣如何代朕經畫封疆重務是非曲直一審自明設與齊蘇勒所參之處不符則佟吉圖原為無罪之人若所參俱實朕必將伊正法以為狂妄無知越分膽大者戒不然朕與佟吉圖寧有向日之私誼乎何故因伊而啓天下懷疑竊議之端內外臣工凡受朕格外簡拔之恩者皆當恪勤奉公還朕一是字方可免自暴自棄之咎天難諶命靡常朕雖不敢言能法天亦不敢違天朕不作孽於人若人自作孽則安可屈法以逭之雍正元年七月十四日山東巡撫臣黃炳謹奏為奏聞事竊臣准吏部咨馬營復决黃水勢必衝突張秋之沙灣請敕臣親往張秋作何保固運道作何催趲糧船聼臣相機料理自行奏聞奉㫖是等因到臣欽此欽遵查得河南馬營口潰决黃水並未流入東省而運河水勢亦甚平穩糧船正可遄行臣己委濟東道吳興業臨清協副將黃元驤等在沿河一帶稽查催䟎不許片刻停留其沙灣子堤決口雖己經合龍恐有未堅關係運道己委署布政使須洲前往張秋查勘今准部咨特命阿克敦江球前赴張秋㑹同臣查勘水勢臣因恩科武闈監臨主試未敢擅離俟武闈事竣臣即赴張秋遵㫖料理為此謹奏前因黃水衝决馬營恐患及沙灣一帶故命汝親往相機料理今既平穩無事張秋之行可以中止汝援朕諭㫖聲名緣由復部可也雍正元年七月二十四日山東巡撫臣黃炳謹奏為恭進瑞穀以昭聖治事竊臣據濟南等六府呈稱東省地方自仲夏普降甘霖之後雨暘時若秋禾暢茂雙穗之穀處處挺生用敢採取敬獻伏乞轉達等情到臣臣伏思我皇上御極以來宵旰憂勤無時不以天下蒼生為念是以精誠格天嘉禾志瑞理合據情轉達進呈御覽仰祈睿鑒謹奏此誠天地神祇並皇考聖靈垂祐之所致也今歲北四省之豐收實出望外朕不勝慶幸之至亦必爾等封疆大吏治理有方始克睹嘉穀之祥念茲感應神速當愈加勉力勤修職業以仰答天庥特諭同日又奏為覆奏事竊臣前奏佟吉圖一摺欽奉硃批跪讀之下仰見聖明如天無微不照臣實識見短淺惟有惶悚無地而已其截留漕米之司官等臣即傳㫖伊等已於二十四日起程回京又蒙硃批教訓臣自知不學無術公慎二字惟時刻謹記在心再查郯城縣嶧縣地方偶有飛蝗經過其未經收割田禾不無傷損臣現委賢員攜帶司庫銀兩前往查勘設應賑恤即將差去官員留彼酌量料理務使小民安居樂業不致失所至如此等小事臣不敢開銷錢糧亦不敢率屬公捐容臣於自己所得養廉內陸續補還庫項合併奏聞伏乞睿鑒謹奏所奏俱悉飛蝗傷損田禾為數無多否若爾力有未逮不可勉强即動庫項朕亦何惜之有雍正元年八月二十一日山東巡撫臣黃炳謹奏為致治務在得人敬陳管見仰請聖裁事竊太僕寺少卿須洲奉㫖著伊署理佟吉圖員缺前往齊蘇勒處照齊蘇勒指示行走臣即遵㫖令須洲前赴齊蘇勒處行走伏思河工事務固屬緊要而布政使衙門乃通省錢糧總滙關係亦重頭緒紛繁萬難離署辦理且庫藏尤不可一日乏人掌管臣不得不鰓鰓過慮今須洲駐劄河干勢必顧此失彼將來事體必致件件貽誤臣甚為焦心是以暫令登萊青道徐德俶代為辦理然究非常久之計至於藩庫之虧空雖清尚有因公那借等項已蒙聖恩寬限一年准臣與程光珠清理完結但既係程光珠經手之事未便另交他手且所辦之事目今已有頭緒臣再四思維惟有將藩司事務令程光珠照舊辦理臣亦便於責成似於公務有益可否實授之處應請㫖定奪如蒙恩准其所遺臬司員缺看得户部郎中博爾多為人老成勤慎誠如聖諭可否補授臬司洪恩出自聖裁再查張秋地方原有分司一官於彼駐劄管理河務後雖奉裁而衙門仍存臣看須洲為人誠實業將諸湖蓄水估修堤岸閘座之事交與總理題明在案則將來估計興修正需時日而年來沙灣一帶屢遭水患實關運道民生諸務紛繁河道一員委難兼顧應請令須洲駐劄張秋專管河務就近可以保護沙灣監察河員估計興工之後往來查驗工程來歲重運臨東兼得催䟎以省欽差䟎運之煩如果臣言不謬伏祈敕部議覆給與印信實授任事如此則河工事務既有專任而藩臬事務亦各有責成矣為此繕摺具奏伏乞皇上訓示遵行謹奏已有㫖矣修濬蓄泄各務雖係河員專任其夫料等項一切皆取辦於地方全賴爾地方各官戮力同心共勷厥事以河漕二臣呼應不靈也爾當悉心辦理稍有閒暇親赴看視盡力督催若至明歲事不齊備則疏慢諉延之罪百喙難辭與齊蘇勒張大有再四會商妥協而行朕另有㫖與張大有令其靣諭於伊將到時爾迎至中途聽㫖凡關係河運諸務不時訓飭屬官必勤敏從事毋得纍民毋得草率塞責貽誤是虞倘河漕屬員暨奉差督察各員如須洲等有騷擾地方有司以及借端苛求者爾察明欵據參奏若爾地方官內有怠玩遲誤工程者致被河臣等題參則佟吉圖余甸即是榜樣爾其加意料理慎勉毋忽特諭雍正元年九月二十日山東巡撫臣黃炳謹奏為感激天恩事竊念十月三十日恭逢皇上萬夀聖節臣本擬奏請給假半月親赴闕廷隨班叩祝今蒙皇上命臣查看河工臣即遵㫖前往但此一點微忱殊難自已查諸湖蓄水之處離泰安州不遠擬於辦理河務稍暇臣親詣泰頂䖍誠薰沐持齊七日就於碧霞元君殿前泥首百叩恭祝聖壽無疆祈保聖躬安泰以少盡微臣感激之私仍凛遵諭㫖不敢建立道場合併陳明至臣處存有西洋所産微物數件可否容臣恭進得蒙皇上賞收一二件則臣不勝榮幸之至矣為此具奏伏祈皇上批示遵行謹奏日前朕有明諭下頒督撫諸臣槩不許進獻爾此意甚屬不合况我華夏無物不備西洋竒巧更無所用徒使外夷占中國之利耳遇便亦寄信爾父切勿更為此舉也同日又奏為覆奏事竊臣齎摺家人回東跪讀硃批蓄水一事仰見聖訓明切臣即遵㫖前赴濟寧候漕臣張大有到境傳宣聖訓欽奉遵行并親歷諸湖查看情形務與河漕二臣副我皇上委任至意再臣前因藩司衙門與河工事務均關重大須洲難以兼理是以據實奏請荷蒙聖明即著須洲督理河務博爾多署理藩篆乃須洲反是以並不與較再臨關缺額一事前蒙㫖具本求請寬限而求免興慶閣銀兩則不敢開端合先覆奏伏乞睿鑒謹奏覽雍正元年十一月十二日山東巡撫臣黃炳謹奏為欽奉上諭事竊臣遵㫖查視湖堤前赴濟寧州㑹同漕臣張大有南下至嶧縣地方相會河臣齊蘇勒公同商議會摺奏聞外臣看得獨山湖一帶土堤係運河之東岸計長八十里俱卑陷不堪茲據兖寧道徐湛恩等公同確估共需銀二萬五千餘兩前己奏明是以動支庫銀委官二十員分假儹修尅期告竣至此處運河之西岸舊有減水閘十四座盡皆坍毁應急為興修於來歲重運未到之先務期工程完竣再馬場一湖為運河蓄泄之區所有堤岸殘缺應修但目下天寒難以動工俟來春再為興修又兖州府河道臣亦親詣查勘其金口壩之上流悉係沙土每易淤塞必須不時疏濬又看得東平州之戴村壩實為全河屏障今因年久亦多坍塌設有疏虞則水勢直泄鹽河何以濟運所關甚重應否修整臣未敢擅專合先奏聞請㫖定奪謹奏覽奏湖河情形甚明查勘實屬詳悉周到照爾所議修理即行具題可也同日又奏為覆奏事十一月初七日藩司博爾多至臣署傳㫖云皇上兩遇大事俱至哀毁骨立近今聖體安和仍復如舊將此傳與臣知著臣放心跪聆之下如覲天顔臣實不勝欣慰之至所有通省虧空臣因念錢糧關係國計恐致虛懸是以請為設法彌補實係愚昧之見今蒙聖恩訓諭諄切臣如夢方覺且復接奉部文虧空之員著令解任賠補自當恪遵定例逐一清理再有臣前無成議覆到容俟各屬議覆到日臣與司道等官商酌舉行所有博爾多傳到諭㫖緣由合行覆奏謹奏社倉固屬善舉惟宜乘時相機徐為勸導若輕躁欲速稍涉勉强翻為苛政矣同日又奏為奏明地方情形事竊查通省麥田自九月至十月中旬得有雨澤布種約有十分之五其餘地畝留種秋田地方情形較之春間大有起色臣因今歲豐熟恐小民無知錢財在手易致耗散是以俱令開徵臣所經歷之州縣大都如此惟各汛營兵多有不堪實因貧窮所致臣與鎮臣商酌每年必需各加賞給以助其衣服器械之資現在商議舉行合將地方情形據實奏明伏祈睿鑒謹奏地方武備甚為緊要年來置訓練於不講營伍廢弛己極類此者不可枚舉亟當加意整飭庶幾改觀若仍然因循怠忽不實力振作徒事欺飾逮三年後朕嚴申考察之典臨時恐爾等噬臍莫及也勉之同日又奏為請㫖事竊查東省所有堤岸閘座現在估計造報題請發帑興修雖有河員專司其事但地方遙遠工程浩大正需多員辦理今查有候補道員張振偉解任知州王景亮丁憂同知徐石麟均係閒散之員應請仍留東省派令赴工效力俟河工告竣之日分别勤惰或令歸旗或留補用另行請㫖定奪是否有當伏候皇上批示遵行謹奏照爾所請將三人留工董役試看其效力何如雍正元年十一月二十二日山東巡撫臣黃炳謹奏為恭謝天恩事十月二十九日接奉閩浙督臣滿保暨臣父國材寄字內開奉硃批諭㫖朕亦非令爾等分文不取但當斟酌揆度將應取者用以辦理公事有何不可百姓屬官俱各感戴爾等受朕之恩又各富足豈非美事果地方寧謐上天眷佑年歲豐收百姓咸得安居樂業則總督巡撫豈有窘乏之理至若薦舉屬員受賄斷乎不可一則涉於無恥再則何顔作彼上司亦難於仰對上天將朕此㫖亦密諭黃炳欽此密傳到臣臣跪讀之下仰見聖訓明切睿慮周詳此誠大小臣工所當奉為典謨者也臣伏查山東巡撫衙門舊有各屬節壽禮銀六萬餘兩丁地規禮銀一萬餘兩司庫羡餘銀三萬兩驛道糧道規禮銀各二千兩鹽道及鹽商規禮銀各三千兩通共計銀十一萬餘兩臣自到任以來因念各官虧空甚多一切節壽規禮並未收受惟有鹽商規禮銀三千兩於接奉硃批之後始行收受隨經賞給撫標兩營及城守營兵補還臨關缺額并從前借賑蝗災銀兩及將來賞賚兵丁之用至於保舉屬員自當悉秉至公斷不敢少存茍且之念致負聖主知遇之恩也為此繕摺恭謝謹奏知道了百凡總期上下一誠相孚無容絲毫欺隱於其間也同日又奏為據實奏聞事竊查各衙門餽送規禮積習相沿己久在聖明洞鑒之中無容巧為諱飾者也查臣前任按察司時向有鹽商規禮六載於茲共收銀三萬兩但臣於六府中各造義學一處每歲給與膏火之資資助故官家口回籍賑濟逃荒饑民修造橋梁道路置買義冢給囚衣食種種公費又如六十年鹽徒竊發臣即重勞兵辨捕役人等竭力擒拏旋獲巨魁所費多金亦俱取給於此近聞欽差在津清查此項所有微臣前任內收受鹽規并為公費緣由理合據實奏聞抑臣更有奏者原告商維新欲將各衙門規禮誣作命案之費臣聞此言不勝駭異臣在東省六載不狥情靣不與外事人所共知况此案事關鹽政從前並不與聞亦無行知案卷在欽差聽斷之下自有公論但臣聞此妄誕之詞有關終身名節心實不甘合併奏聞伏乞睿鑒謹奏有其事自難逃朕之鑒察何必奏辨無其事更不必奏辨其間果有暗昧之處寧以此片言先入而遂可消釋耶審明結案之時自有公斷此奏不合雍正元年十二月初一日山東巡撫臣黃炳謹奏為覆奏事竊臣接奉硃批諭㫖四條跪讀之下仰見我皇上至聖至明洞悉利弊反覆告誡諄切周詳臣雖愚昧敢不實力遵行以副聖主維新之治伏查空糧一事山東巡撫衙門從無此弊向有材官六十名即係本標兩營之兵輪流該班效力仍俱無誤差操名雖在官實原在伍至於操演兵丁前以公務無暇未曾親閲今於查河回聖明鑒察諭令概行裁革臣已遵㫖嚴飭各屬一體遵行即欽差往來亦不得濫行餽送并聞近來密諭事理理合逐一覆奏伏乞睿鑒謹奏覽同日又奏為奏徵漕之耗所以較地丁錢糧加重者實因旗丁俱有使費若再裁減則州縣不無賠纍之苦又查得各處米糧俱皆充足市價亦頗平減較之夏間每望理合奏聞以慰聖懷謹奏雨雪光景大槩通省皆然乎於某月某日或雨或雪有無多寡異同查明更奏以聞同日又奏為微臣依戀心切懇恩俞允躬請聖安面聆聖訓事竊臣自春間親承天語以後諸事有所遵循庶得免於隕越茲幸值秋收豐熟凡從前窮苦之家今皆為溫飽之室此皆由北闕擬於封印後趨赴京師躬請聖安元旦之期隨班朝皇上天恩俯鑒愚忱特准所請臣得以少慰依戀之私為此謹奏不必來京朕萬幾待理無暇他及直省督撫中未經陛見者尚多相形之下未便異同爾咫尺山左詔㫖可以時宣何待朕一一靣諭耶雍正元年十二月十三日山東巡撫臣黃炳謹奏為欽奉上諭事竊臣接准兵部咨文內開九月二十三日法敏等靣奏截留漕糧一事奉㫖糧船回空緊要朕為此事甚為憂心著總理事務王大臣等行文直隸山東巡撫嚴督沿河官辨晝夜上緊催趲勿得虛應故事欽此臣跪讀之下仰見我皇上慎重天庾至意臣既身任地方敢不仰體宸衷實心辦事今歲回空糧船一入東境臣即飛委文武多員分段嚴催不遺餘力前將催進臨清口閘及過張秋情由奏明在案今幸十一月內尚未結凍是以夫役俱免敲冰壓凌之苦而回空各船已於十二月初二日全數催出東境南下訖緣係欽奉上諭事理理合奏聞謹奏己據漕臣張大有奏聞矣實愜朕懷汝奏請委員辦理工程之摺留中未發朕另有㫖同日又奏為欽奉上諭事竊臣接准户部咨文內開山東省虧空無可著追銀一十五萬六千三百四十四兩零穀八千五百六十六石零經原任巡撫李樹德疏稱請公同捐補限五年內補完等語查前項無著銀兩該撫既稱公同捐補自應作速補完何俟五年應限四年內補完其有著銀兩照例催追完報自奉㫖之後如有人亡産絶不能追完者該撫即照無著銀兩所定年限內補完報部仍令各該撫每於歲底將完過若干之處逐一分析具題等因到臣臣與博爾多即檢閲舊案查李樹德所題無著銀穀俱係約略摹擬並非確實核算如伊疏稱已經參出虧空之無著銀二萬九千三百餘兩穀八千五百餘石確係某案某人之數並無冊籍可稽礙難分派又如流抵未清之無著銀十二萬七千兩零查流抵一項並不止此十二萬七千兩實有二十七萬餘兩皆係從前州縣各官之虧空上司狥庇允其詳請陸續捐俸補還之項名則俸工捐補實則虛懸無著况捐俸已奉停止無項可捐實難遵照部行依限賠補又五十八九兩年靑萊登各府屬煮賑動用倉穀十一萬七千餘石原議以俸工補還亦係虛懸無著則此無著銀三十餘萬兩穀十二萬五千餘石皆係前撫臣李樹德任內未清之項委難捐補應請仍著落李樹德補還以清積案理合奏明伏候皇上乾斷施行謹奏將銀穀虛懸始末並應著落補還情由備細聲明具本題奏硃批諭㫖卷二十三上欽定四庫全書硃批諭㫖卷二十三下硃批黃炳奏摺雍正二年正月初一日山東巡撫臣黃炳謹奏欽惟我皇上繼天出震紹統乘乾仁育萬方庶彚仰生成之澤恩周四海閭閻遊浩蕩之春當茲斗柄建寅正遇泰階履吉幸值春王正月欣逢天子萬年臣職居外吏不獲九叩揚庥心戀闕庭惟願一人有慶敬抒寸悃恭請萬安臣炳不勝頌禱之至為此繕摺謹奏朕躬大安三陽開泰萬象維新願爾闔省風雨應時兵民樂業共享升平之慶也雍正二年三月初三日山東巡撫臣黃炳謹奏為奏聞事竊查東省各屬望雨甚殷臣即䖍誠祈禱特委員前往泰頂焚表叩求雨澤於二月二十一二等日兖青二府屬紛紛報有得雨之處尚未霑足今三月初三日濟南省城甘霖大沛歷城縣等處入土五六寸俱各霑足且陰雲滿布大約得雨地方必廣我皇上宵旰憂勤無時不以民生為念合將得雨情由繕摺奏聞以慰聖懷謹奏時屆暮春畿內望雨更殷初三日甘霖大沛竟日方止已十分霑足矣乃東省亦於是日得雨天恩溥博朕不勝愈悅之至同日又奏為恭謝天恩事竊臣父子兄弟共沐國恩同登仕籍一門知遇備極寵榮今復蒙聖恩將臣親姪承培選授順德府同知員缺臣聞命自天感激無地為此繕摺恭謝天恩伏乞睿鑒謹奏一門榮寵固幸遭逢然必能互相朂勵感恩圖報方期福澤綿遠若倚恃家庭顯耀任情縱恣朋比黨援轉相請託順之者曲意容隱逆之者多方排擠甚至欺君虐民有所不顧如此行為則目前富貴非為福基翻為禍媒歷觀古今人事履盛滿之時不惟不敢稱慶且更加謙謹所以世代子孫獲長保安全也將朕此諭不必傳録祇作爾意凡爾親族人等之在仕籍者俱令知之特諭雍正二年三月十七日山東巡撫臣黃炳謹奏為再行奏聞事三月初三日天降時雨業將省城得雨情由奏聞在案今查各屬呈報得雨分寸惟濟屬之霑化兖屬之曲阜單縣東屬之邱縣夏津萊屬之即墨登屬之寧海文登等處尚未霑足其餘各屬俱皆霑足透潤不特麥苗賴以滋長而秋禾亦得乘時播種此皆我皇上念切民瘼憂勤感格之所致也合將通省得雨情形再行奏聞謹奏據奏霑化曲阜等州縣尚未霑足未悉此數處得雨幾分或係少有缺缺抑或大有不足確查情形再為詳細奏明同日又奏為覆奏事三月十六日臣齎摺家人回東接奉硃批諭㫖跪讀之下反復細繹誠千古不易之至言萬代臣工之要法也臣不勝敬凛之至但臣自蒞任昧自當敬謹遵行總之有私無私難逃聖明之洞鑒也又奉硃批畿內望雨更殷初三日甘霖大沛竟日方止已十分霑足矣乃東省亦於是日得雨天恩溥博朕不勝愈悅之至欽此竊思時雨普降洵屬天恩然非聖天子宵旰憂勤誠敬祈禱焉能感格書云一人有慶兆民賴之正此謂也理合覆奏伏乞皇上睿鑒謹奏覽同日又奏為請㫖事竊查運河內之袁口栁林寺前三閘於康熙六十一年經前任河臣趙世顯撫臣李樹德咨商修築共用過運河㕔庫銀四萬五千六百二十餘兩議以八年之後捐工捐賑完日捐俸還項在案伏查河庫錢糧每年奏銷事在總河歲底盤查責在東撫臣於前屆盤查時因未曾親閲工程不敢冒昧瀆奏今查看三閘雖係新修恐不堅固且錢糧動用必先奏聞工完據實造報即欲捐補亦應作速還項未便久懸今趙世顯李樹德動用錢糧之日並未奏聞工完之後既不報銷又不彌補懸項久待完結無期況捐俸現奉停止無項可捐臣有盤查之責不便任其虛懸應請將前項修閘銀兩著落趙世顯李樹德二人名下分賠以清庫項是否有當理合請㫖定奪再臣屢以類此之事上瀆奏此等事豈得於摺奏之中巧施詭譎乎盤查之責雖云在汝奏銷之責則在河督以二人均任之事而一人專擅殊屬孟浪雍正二年四月初三日山東巡撫臣黃炳謹奏為覆奏事竊查山東藩庫未清各項經臣分析奏明請㫖扣追荷䝉允准在案今查借支兵餉與各官借領那用共銀二十三萬餘兩自上年七月起至本年三月止俱經陸續扣補全完緣係從前摺奏交臣清理之事今既扣追還項理合覆奏伏乞皇上睿鑒謹奏借項固應清理但如許多金於三季之內扣完似覺太驟兵丁月費無支不致拮据否同日又奏為敬陳府倉之捐米請分貯州縣以廣積儲以省運費事臣查得濟靑萊登四府從前開捐所收米石除陶錦李元龍耿綋祚等虧空各數已經參追外所有青州府倉存銀兩奉部議買補還倉因在府倉一處收買則米價必致騰貴是以交與青屬之各州縣照依時價陸續採買不許派纍小民又查濟南府倉除實存米石外所存米價銀兩據原任知府張振偉稟稱從前接受交盤時原係六錢一石收受共銀四萬二千七十餘兩並無虧空等語查現今之米六錢一石價值不敷應令照依時價一兩一石合算每石加銀四錢以便買補嗣據該府照數賠出銀二萬八千四十九兩零當即援照部議分發濟屬之各州縣買米存倉又查萊州府倉存銀兩亦援照部議分發萊屬之各州縣採買但三府之州縣附近府治者無幾而窵遠之處甚多若令其各運至府倉則所費腳價每石需銀二三錢不等以臣愚見莫若將此項米石即令現在採買之州縣加謹收貯並令知府按季盤查如此則州縣之倉廩盡皆充裕而適有需用之時可無撥運之費矣是否可行理合請㫖定奪謹奏四府收捐米石原經部議買補還倉其分貯各州縣之處仍應具題聽候部議摺奏請㫖不便批諭同日又奏為奏聞事前於三月初三日普降時雨業將通省情形奏聞今於四月初二日復大沛甘霖查得歷城縣四境俱各得雨入土五六寸不等目今正值麥秀之候得此雨澤甚為及時除各屬有無得雨另行查奏外所有歷城四境得雨情形合先奏聞伏乞睿鑒謹奏此番甘雨未據他省奏報爾山左可謂先沾天澤矣二麥自必異常茂盛誠應時雨也大慰朕懷雍正二年四月十一日山東巡撫臣黃炳謹奏為奏聞事前於四月初二日業將歷城地方四境得雨情形奏聞在案嗣據濟屬之長清等二十五州縣兖屬之東阿等十州縣東屬之聊城等十七州縣青屬之益都等八州縣萊屬之掖縣等五州縣登屬之蓬萊等六州縣俱報是日得雨霑足惟濟屬之利津等五州縣兖屬之滋陽等十七州縣東屬之朝城縣靑屬之壽光等六州縣萊屬之即墨等二州縣登屬之寧海等二州縣雖於是日未得雨澤後復陸續得雨諒俱霑足又查三月初三日所奏未霑足之霑化曲阜單縣邱縣夏津即墨寧海文登等處是就彼時而論嗣後於三月之二十五二十九四月之初二初三等日皆得雨澤並無不足之處昨初十日歷城四境又得甘霖入土各有三寸此雨亦甚得濟理合據實一併奏聞伏乞睿鑒謹奏朕亦聞得山東今歲雨澤優渥但汝總宜據實上奏不可絲毫粉飾言過其實也同日又奏為敬抒下悃仰祈睿鑒事竊臣猥以庸愚荷䝉聖恩不次超擢時降溫綸成全教誨之恩有加無己臣雖至愚具有心胸敢不竭盡忠誠以仰酬髙厚於萬一昨奉硃批以臣於諸事率多逞才自用欺飾不真恐未必能小心翼翼克全忠孝欽此臣跪讀之下不禁汗顔愧赧惶悚怖懼之至伏思我皇上聰明天縱睿哲性成照臨臣下無微不燭臣何敢逞才舞弊自蹈愆尤故臣自任事以來所有一切倉庫諸弊悉皆據實奏明不敢少存欺隱總之臣受恩深重非比尋常斷不肯自暴自棄致負聖主特達之知也再河庫錢糧一事臣愚以此項銀兩原議俸工補還無庸奏銷而盤查之任責在巡撫是以未經會同河臣合詞具奏臣實孟浪罪無可辭今已遵㫖移商河臣在案合併聲明為此謹奏觀汝於地方上一切事務非過則不及皆不合時措之宜今發來諭㫖二道雖大槩相同而微細處有異汝與博爾多悉心體究殫精籌畫應行者舉行毋得將諭㫖引入本內以恫疑虛喝使部臣不敢開口論汝等之是非也此係密諭汝等當領㑹遵奉更勿宣揚雍正二年四月二十七日山東巡撫臣黃炳謹奏為奏明地方情形事竊查東省各屬普得時雨業經奏聞在案臣伏見我皇上宵旰憂勤無時不以民生為念臣身任地方敢不仰體宸衷留心民隱是以時遣親信之人前往各屬查看據秋穀出土者已有寸許現在地脈濕透秋禾俱易滋長地方大有起色惟濟兖東靑四府屬間有十數州縣生發蝻子臣已檄行各州縣令其上緊撲行申飭務期廣為搜捕無留餘孽也所有地方情形理合據實奏聞謹奏蝗蝻生發朕已聞之矣亟當嚴督屬員盡力撲捕勿稍懈慢致令養成羽翼損傷禾苗既盡人事然後竭誠祈禱神佑庶望消弭災眚也同日又奏為覆奏事竊臣齎摺家人回東捧到臣前奏清理藩庫一摺奉硃批如許多金於三季之內扣完似覺太驟兵丁月費無支不致拮据否欽此仰見我皇上時時以軫恤兵丁為念查此兵餉一事係陸續扣除兵丁並無拮据之處又硃批分貯捐米一摺現在遵㫖具本奏請理合覆奏伏祈皇上睿鑒謹奏所奏俱悉凡事惟據實直陳弗飾辭隱蔽庶盡事君之誠兼亦自愛之道勉之雍正四年十月初一日刑部左侍郎臣黃炳謹奏為恭謝天恩事雍正四年九月二十四日臣父國材差人到淮得接家信知九月初五日奉㫖將臣兄黃焜補授鑲白旗漢軍副都統臣隨望闕叩頭謝恩訖伏念臣兄係負罪之人情甘擯棄乃䝉皇上天恩不加譴責特授副都統之職恩逾格外寵越尋常臣父子兄弟膺此殊遇考諸史冊實屬希有但受恩愈重圖報實難惟有交相勉勵共盡職守以仰答皇上髙厚之恩於萬一耳為此具摺恭謝天恩伏祈睿鑒謹奏此等奏謝之章竟成故套朕殊覽之厭矣須盡實行莫務空言自於勉勵二字尚恐未能何暇交相勉勵耶刑部左侍郎臣黃炳蘇州織造郎中臣髙斌謹奏為請㫖事竊臣等接准部文據年希堯參奏慶元劣蹟內有訛詐淮民李宗奭銀二千兩一欵臣等即遵㫖提集人犯逐一研訊緣李宗奭家於雍正元年九月間秋收糧食堆積莊房有族人李藏麟者因借貸不允在慶元任內揑告收囤雜糧堆積棧房店內布匹揑稱漏稅慶元即將李宗奭父子拏禁關上訛詐銀一千四百二十兩是實俱係家人陳八等經手後宗奭之子李懏心懷不平意欲控告適有程埈即程眷穀者從旁勸阻因而中止後慶元自知作惡多端官聲狼藉欲退還此銀本年七月間適程眷穀赴關交納鹽鈔未得交納將原銀帶回慶元家人陳八即煩彼寫字招李懏至伊家講話程眷穀即行允從至七月初七日陳八李懏先後至程眷穀家陳八遂令程眷穀將前日未上納之鈔銀內兌一千四百餘兩給付李懏以圖消弭此慶元訛詐還銀之原委也但查程眷穀一犯若據其與陳八往來託為心腹應照律內投託勢要作為心腹者枷號一個月發烟瘴地方充軍擬罪若據其將應納錢糧任聽陳八私借還贓應照律知借貸錢糧匿而不舉及故縱者並與犯人同罪至死減一等律應擬杖流是該犯實有應得之罪已以贖其罪可否如是仰請皇上批示遵行再朱家海工程恐有關緊要臣等與河臣㑹議河臣齊蘇勒應往彼處照管工程臣等本應偕赴工所會同審理緣案內應質訊人犯甚多皆居住淮安若往來查取提問未免有跋涉之纍蘇勒審擬具奏再淮安府知府劉之頊於九月十九日在河間府東光縣地方追及慶元船隻搜獲銀五萬九千餘兩尚未到淮俟到日查明另奏外合先奏聞謹奏知道了慶元業經物故可於其贓銀中酌量動用料理棺衾命伊家人送歸雍正四年十一月初二日刑部左侍郎臣黃炳河道總督臣齊蘇勒內務府總管管理淮關稅務臣年希堯蘇州織造郎中臣髙斌謹奏為奏聞事竊查慶元嚇詐潘尚智一案臣等遵㫖研訊之下慶元固屬有心嚇詐潘尚智亦屬有意行求繼恐事敗慶元退還原銀復令家僕搶奪緣由二萬餘兩去年我進京時我主兒原呌我向秦四說呌他埋在對過新買房子內後來埋了不曾我不知道等語復將陳八嚴行夾訊問其此外所少銀兩甚多俱藏匿何處據供還有銀二萬四千兩是我同秦四張文運埋在五間照房前土院子裏了這是去年十月內的事等語又將陳八夾訊問其除現供之外所少銀兩仍多務將藏匿地方銀兩實數逐一供出研詰至再據供我去年進京時有銀三萬四千兩交給管家余二陸續運往通州問其此外有無借放與人據供我主兒有四萬兩銀子借與鹽商程樹先是分半利息我也有一千兩銀子借與他生息是二分利錢等語隨將程樹先之父程巨函行提到案訊據程巨函供我兒子往京裏去了我兒子平日時常與陳八相與往來是實今陳八既說我兒子借他四萬一千兩銀子我情願認還等語復將慶元信用書辦楊培元嚴加刑訊據供慶元任內三年嚇詐等項算來得有詭譎私自藏匿事所必有且伊家人余二向在京程樹先之借項雖據伊父程巨函情願認還然程樹先未經到案似難遽為懸斷茲正在行提間據程巨函具呈代男償銀循例納贖仰懇皇恩寬罪事呈稱情願代男程樹先照數認還所借慶元及家人陳八本銀四萬一千兩又共該利銀八千六百八十兩并稱商男與陳八相識往來即屬不合照律擬議夫復何辭請照康熙五十年江南詐李宗奭案內鹽商程眷穀具呈為循例納贖叩懇皇恩寬罪事呈稱商懼慶元家人陳八威勢代為寄信傳喚李懏又將鈔費轉付即屬不合認罪奚辭請情據此以上二案可否准其納贖臣等未敢擅便理合請㫖定奪再臣等惟恐慶元此外尚有隱匿贓銀陳八狡獪不吐將跟隨陳八僕人夏玉之小厮髙大行提到案訊據供稱去年有陳八的叔伯哥子到關上來過他住在涿州東北采育地方陳八有八箇箱子差我主兒夏玉同他叔伯哥子送回采育等語隨詰問陳八據供八箇箱子內裝載衣服銀縀此原籍房地當鋪借項共銀九萬餘兩俱己查明封固另入正案歸結其慶元家私船隻前據知府劉之頊在東光縣地方追及查有銀五萬九千餘兩業已奏明在案今將在東昌府趕回船隻以及陸路追回箱籠內又查有銀六千餘兩所有慶元家私衣服等物為數甚多臣等俱已查明封固另入正案歸結外理合繕摺奏聞伏乞皇上睿鑒謹奏所奏俱悉同日又奏為奏聞事竊准刑部咨開欽奉諭㫖將慶元任內錢糧簿冊共六十一本紅紙單六張著即遞發侍郎黃炳一併查審具奏欽此又准馬爾賽等咨開我等將慶元任內收稅檔子核算除他應交並各項用度外還得銀二十七萬兩等因奉㫖此不過簿籍中顯然開載者此外尚有伊額外加徵火耗并侵欺嚇詐之項黃炳等不可以此簿籍所開即作實在之數欽此等因各移咨前來臣等即提集慶元任內經手書辦將發來各冊逐欵訊問據供發來各冊內大簿子係慶元三年任內徵解錢糧的底冊其餘小簿子係今年五月內造的慶元原欲㩦帶回京以備查問內中徵解各欵俱是人人知道並無隱匿等語復將慶元信用書辦楊培元嚴行夾訊據供慶元在任三年零二十八日共收正額浮羡火耗銀一百三十三萬七千九百六兩零內除加平庫飯等項用去銀三萬八千六百八十七兩有竒外其所收正稅贏餘以及火耗銀兩俱各解部並無絲毫隱匿如果冊內有隱匿銀二十七萬兩這樣冊子他豈肯留著等語臣等即弔取批領案卷並發來各冊又淮關所存底冊公同核算查慶元在任三年零二十八日共收正額浮羡火耗銀一百三十三萬七千九百六兩零內除解發過銀九十二萬三千三百一十八兩零俱有批領案卷可查止有第三年第二季解部船鈔供漕銀二萬四千七百六十六兩零第三季解部船鈔供漕銀二萬四千七百六十六兩零第四季解部船鈔供漕茶稅商稅灰契四稅銅斤水腳節省光祿寺內務府庶吉士銀九萬九千一百八十七兩零又解部贏餘銀二十萬七百五十七兩零又續收二十八日解部船鈔供漕灰契商稅四稅銅斤水腳節省光祿寺內務府庶吉士銀一萬三千五百七兩零又解部贏餘銀一萬二千九百一十八兩零雖有案卷可查並無各衙門回批存照仰請皇上敕部查明是否解部收庫其下剩銀三萬八千六百八十七兩零雖據書辦口供并冊內開載俱係加平庫飯用去然此除儘收儘解之項自應盡行解部慶元既有入己銀兩加平庫飯應用已銀何得借此名色私自開銷相應於正案另行斷追為此繕摺奏聞伏祈皇上睿鑒謹奏閲前後供詞諒係實情黃炳即日回京自可逐案向各衙門行查何須朕敕部察核命爾等鞫獄但欲得其實情耳慶元罪案即據潘尚智之事而論種種違法負恩已屬死有餘辜若稍涉文致轉非信案聽斷失實矣觀爾等於此一事頗有迎合强揑光景豈不大謬如欲迎合朕意惟當一秉公忠朕有何意見需爾等迎合耶諄諄訓諭總不肯傾心體信遵奉改易朕亦末如之何也已雍正五年五月二十八日刑部左侍郎臣黃炳川陜總督臣嶽鍾琪湖北巡撫臣憲德四川巡撫臣馬會伯謹奏為奏聞事臣等公同審得程如絲販私殺人以及重賄蔡珽一案程如絲俱已直認不諱即質之蔡珽亦云曾受過程如絲銀六萬六千兩金子九百兩是實復詰問蔡珽程如絲前任夔州府時侵蝕稅銀復販賣私鹽你不惟不行參究反在皇上跟前保奏他為四川第一好官欺罔君上是誠何心據蔡珽親筆供稱程如絲如此貪殘橫行種種不法我從前不參他反說他是好官是我受賄存私該死有何辨處當堂輸服無辭是程如絲之貪殘橫行蔡珽之受賄妄奏均屬顯然除將被害人等供情詳悉叙明將程如絲蔡珽按律定擬另奏外合將審過情形先行附摺奏聞謹奏天理昭昭不爽覽奏不覺為之悚然朕初意以此案事情或未必真確所以前未深究不料人情險巇詐僞至於此極可見天道好還網疏不漏如此顯明迅速人可不益加凛畏耶同日又奏為參奏事臣等公同查審得喬鐸侵蝕稅銀程如絲扶同隱匿一案取據喬鐸等各供臣等伏思我皇上宵旰憂勞勤求治理內外臣工自當洗心滌慮共遵法守乃程如絲教令喬鐸隱匿國課復令其差人赴部料理通同作弊情屬可惡喬鐸程如絲俱應按律究擬但程如絲已於販私殺人及貪婪各案內擬罪喬鐸已於侵蝕關稅案內擬罪俱應在彼案從重歸結佛喜法敏利欲薰心代為轉詳具題已屬不合而佛喜又為其寫書託人更為不法佛喜法敏均應交部嚴加治罪至書辦章孔昭玩法作奸殊屬可惡仰請皇上敕部將章孔昭密拏到案嚴審治罪塞欽劉師恕有無代為料理作弊之處亦請敕部訊明章孔昭一併交部嚴加治罪為此具摺請㫖謹奏知道了已將章孔昭拏獲交發該部審擬至案內所干人員等亦俱有㫖矣雍正五年十一月二十日刑部左侍郎臣黃炳雲南巡撫臣朱綱謹奏為欽奉上諭事雍正五年八月三十日臣黃炳在四川接准吏部咨文內開內閣吏部奉㫖侍郎黃炳著前往雲南俟巡撫朱綱到日有交與會審事件欽此等因移咨到臣臣遵即束裝起程於十月十八日到雲南省城臣朱綱亦於是日到任隨恭設香案將所發摺匣公同開看內奏摺一件為查參事內欵列雲撫楊名時臬司江芑通同欺蔽各實情臣等遵㫖提犯研訊據各犯供吐確鑿詳查案卷又各相符是楊名時之朦朧隱諱狥情營私毫無疑議查楊名時身任封疆大吏不思一秉公忠整飭地方乃因循怠玩茍且塞責而又同汙合流以取媚於世矯廉假節以盜竊虛名其保舉之潘允敏龍為霖栗爾璋俱係進士出身而栗爾璋係楊名時所中舉人實屬門生至伊所得康熙六十年暨六十一年鹽規等項銀八萬兩又得過范溥金杯縀匹等物即據楊名時亦自認不諱是楊名時並非一介不取者也當審問之時猶援古證今毫不為恥忽講家語忽引魯論口不絶詩書之文行實與語言相悖楊名時既得過鹽規等項銀兩又得范溥金杯縀匹合依有祿人不枉法贓一百二十兩以上絞律楊名時應擬絞監候秋後處決其所得銀八萬兩內據楊名時供稱因銀厰缺額捐補過銀二萬一千餘兩等語應免其查追外仍應於楊名時名下勒限一年追銀五萬八千四百三十九兩其所得金杯縀匹應照例追價一併入官至馮慶長從前領銀辦買軍需草豆查實係原任趙州知州陳士昻差家人同經承辦買存貯趙州地方已出有收管及其變價之時又係陳士昂家人變賣所變價銀亦係交與陳士昂况檢查案卷陳士昂已經自認清還今既經離任回籍應行文浙江巡撫李衛著落陳士昂名下追銀三千九百四十兩以充軍餉至此項草豆既係陳士昂收管尚未變價繳還毛文銓何得以俸工代為補項殊屬不合應請交部嚴加議處再查范溥承管錢局虧空髙其倬楊名時江芑明知不參已屬狥庇又各幫銀兩代為完補通同作弊殊屬溺職除楊名時江芑從重歸結外髙其倬應請交部嚴加議處再查雍正二年間江芑奉委稽察錢局時范溥即虧空銀一萬餘兩而雍正三年五月內李衛於奏銷時並未揭報狥庇亦屬顯然李衛應請交部嚴加議處至江芑署藩司任內所收厰課錫既有贏餘自應全數報明何得私自入己江芑應照律杖一百流三千里仍於該犯原籍勒限一年追銀二千五百八十九兩還項餘審無干俱應省釋查馮慶長雖未到案而案內各欵既已質訊明確不敢稽遲理合先行具奏俟馮慶長到案之日另行訊明再奏外伏乞皇上睿鑒敕部議覆施行謹奏該部嚴察議奏李衛髙其倬著明白回奏黃炳交審案件已結著馳驛回京楊名時卓異薦舉者既皆係科甲伊任巡撫六七年曾參劾科甲出身官幾員著該部查奏與督臣會題者不必查同日又奏為奏聞事竊臣等審理楊名時狥情營私一案訊據范溥供稱毛文銓升了貴州巡撫時藩司任內有虧空不清約銀二萬兩將各屬送督撫的節禮交在藩庫給毛文銓補了虧空這是總督髙其倬巡撫楊名時前任布政使李衛大家商量的雍正二年分我送督撫節禮銀一百八十兩係繳在藩庫的據楊名時供毛文銓原虧空銀二萬兩髙其倬因與伊係親戚曾向我說我們大家幫幫他罷彼時李衛就說何不將兩院不收的節禮給他補了虧空呢這件事是有的據江芑供雍正二年我送督撫的年節生日禮俱呌交在藩庫收存說是給毛文銓補虧空這事原是有的各等語又臣等檢查原任永平縣知縣馮慶長領辦軍需草豆案卷見有原任趙州知州陳士昂呈詞內稱李衛進京之時面諭我云永平縣未完軍需草豆銀三千九百四十兩因毛升司有虧空移交抵欵之項不得不為詳請今本司庫項凡軍需賠纍者俱經豁免你只管收拾回去交代冊上已無此項等語臣等伏念䝉皇上特㫖發審此案凡有所聞雖係案外之事亦理應據實奏聞恭請聖裁臣等止知有君父厚恩斷不敢少有瞻狥代伊等隱瞞致有負皇上天恩伏祈睿鑒為此謹奏此事爾等既不隱瞞又另摺具奏料理甚屬可嘉此事原因楊名時可惡起見髙其倬李衛二人亦不能免過但伊等雖有狥庇親朋情靣之私並未那移庫帑尚在可恕所以朕將此事未經發出爾等亦當密之雍正五年十二月十三日刑部左侍郎臣黃炳謹奏為微臣願效馳驅少報涓埃特抒下悃仰祈睿鑒俯賜恩准事竊臣前奉差四川時聞西藏有康濟鼐被擒一事臣因奉命復有滇南之差是以未經奏請今臣奉命審理事件已竣現在滇省候㫖伏思臣自筮仕以來竊祿多年寸長未效而受恩深重圖報無由清夜自思寢食難安且臣年富力强正可驅策奔走之時若貪戀安榮坐享逸樂非特臣心不忍而亦無顔立於人世仰懇皇上開天地之𢎞恩俯准微臣前往西藏效力辦事庶臣一點血誠可以少盡故特披瀝愚悃仰干宸聽倘䝉天恩允准下情或令臣即從滇省起程或令臣馳驛進京面請聖訓再赴西藏統候皇上批示遵行臣不勝激切待命之至為此謹奏覽奏可發一大噱文事若不克修恐武功亦不易建汝奉㫖鞫獄尚未復命何必作此分外之想仍遵前㫖來京可也硃批諭㫖卷二十三下
