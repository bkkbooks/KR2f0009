body:
  text: 欽定四庫全書硃批諭旨巻二百二十二硃批任蘭枝奏摺提督四川學政臣任蘭枝謹奏爲敬陳下悃事臣一介庸愚䝉皇上簡任四川學政自到任以来感荷聖恩時切悚懼於考試文武生員等第及文武童生入學務在嚴以核實寛以取才實不敢分毫苟且亦不敢一念草率負深恩而干大戾至於蜀省學臣竝無學田公項可以養廉衆士子亦共知之其文武童生入學者於發案之後願送贄見以佐用度臣酌量其中力量能者以十二兩爲止不能者減之極貧者分文不取人情悦服到處頗無異同臣三年之中一切用度皆出於此總之臣受皇上深恩臣之名節惟恃皇上聖明故能保全臣之身家亦惟恃皇上聖明自加體恤覆載生成從何報效臣之下悃於開考時即應奏明因奉有訓旨四川路逺不必輕易差人来京故未及陳奏今離闕二載瞻戀天顏雖夢寐之間不忘感泣謹遣家人齎摺恭請聖安所有微臣實情理合奏明伏惟聖鑒謹奏所奏知道了加勉加愼爲之可也提督四川學政臣任蘭枝謹奏恭請皇上聖安朕安凡事秉公毅然而行不必迎合阿順該督撫如督撫有藉端搜尋於爾之處差人齎摺密奏朕知提督四川學政臣任蘭枝謹奏爲欽奉上諭事竊臣接准川陜督臣咨文開奉上諭凡内外文武官員曾經面奉諭旨除不能記載者俱將訓旨一一詳細將年月日一同繕寫進呈御覽内外文武大吏著自行封進其不應奏摺之員著封固交與該上司轉奏欽此臣前赴任四川於雍正元年十一月初一日恭請聖訓曾經面奉諭旨臣係小臣本不敢援大吏自行封進之例因䝉聖恩許臣差人奏摺理合將前奉過諭旨一一詳細繕寫封固進呈御覽其應行回奏事情俱於遵旨回奏事内摺奏合併聲明謹奏是惟當密之又宻提督四川學政臣任蘭枝謹奏爲恭繳御批事臣於本年正月十三日在成都衙門廵撫處送到發回臣請安一摺奉有硃批諭旨仰見皇上訓誡公忠體恤下情之至意捧讀再四感激涕零竊臣職司學政凡遇公事與督撫文移往来俱照衙門舊例其餘各不侵渉至考試之事聞向来督撫皆有棚規臣仰恃皇上聖明志除陋習不用迎合此項實不能給在督撫亦竝未有搜尋難爲之處如有此情臣自不敢隱匿爲此據實回奏所有奉到御批原摺理合恭繳謹奏前諭因年羮堯在任而發或恐爾念差錯誤入邪途今巨憝已除可不必矣覆奏一摺留中甚屬公當朕殊嘉之兵部右侍郎臣任蘭枝江西巡撫臣謝旻謹奏爲奏聞事竊照江西廣信營㕘將張福掲報南昌總兵陳王章扣侵公費等款一案臣等遵旨㑹審查得陳王章於雍正六年奏定每兵百名存糧五分爲各營修整甲械公用乃陳王章於奏定後仍借大公費名色令各營按季繳銀共收過銀四千七百二十六兩零詰訊陳王章業已直認無辭但據呈有支銷清册臣等查册内所開除一切營中公用銀二千五百八十八兩零應准開銷外尚有應追那用銀一千七百八十五両零其酬應私情擅支公項銀三百五十二兩零應照監守自盗例定擬按數追賠交部治罪至張福於雍正七年九月到任至八年夏季已歴三季該營公費銀兩亦俱照舊繳送竝無異辭其致隙之由葢緣八年七月中陳王章將張福所送考㧞外委目兵責懲申飭又張福曾隨陳王章赴教場未經命坐嫌其不加禮貎以致彼此成隙猜嫌日起張福遂於八年八月内将陳王章收用公費通詳而陳王章亦以張福濫責目兵徐天祿致令身故欺凌守僃髙有賢致令目盲具禀督臣高其倬經督臣檄司查驗而張福心生疑懼揭報部科此兩人搆釁結怨之情節也除餽收土儀濫責目兵欺壓屬員及用空白文册等輕罪均於題案内分晰聲明外至臣等查審之下張福所揭陳王章收受公費原係實情竝無虛捏而張福以弋陽縣知縣趙憲清奉委將徐天禄檢驗據實報傷遂指陳王章賄囑通判許天竒轉囑知縣趙憲清捏報陷害及至三面質訊所稱賄囑捏報張福毫無指實并查趙憲清審詳案巻竝無陷害張福情由其為誣揭是實張福照例擬以誣告加等聽部定議所有查審此案情節緣由謹繕公摺恭齎奏聞伏乞皇上睿鑒謹奏覽奏知道了任蘭枝審理此案殊屬公當妥恊硃批諭㫖巻二百二十二
