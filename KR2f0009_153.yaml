body:
  text: 欽定四庫全書硃批諭旨卷一百五十三硃批舒喜奏摺雍正七年五月初二日巡察直隸等處農務御史臣舒喜謹奏為萬民歡欣感戴二麥豐茂情形仰祈睿鑒事竊臣一介庸愚荷蒙皇上鴻恩畀以直隸巡農重任自受事以來幾經兩月於保定正定順德廣平大名五府之內巳歷四十餘州縣凡遇市集村莊暨鄉僻農民稠密之處臣必將皇上重農務本愛育羣黎之至意諄諄訓誨鄉民盡皆歡躍伏地叩頭齊聲呼佛頂祝皇上萬壽無疆今年春季雨潤風和二麥暢茂將次納場豐收可必其餘高粱豆榖等項俱各一望靑蔥至於新開水田阡陌成行溝洫流通目下將近栽插臣巳再三勸民及時耕耨毋惰農功又復誡飭州縣勤加督率矣其未到州縣俟臣次第查閲多方勸課冀小民悉盡力東作收效西成以仰報皇上簡任微臣之恩於萬一耳謹先將萬民歡欣感戴暨二麥將登情形具摺奏聞伏乞皇上睿鑒謹奏覽奏知道了但凡百處不可欺飾雍正七年六月初四日巡察直隸等處農務御史臣舒喜謹奏為請建倉房以免積榖黴爛以杜規避交盤事竊臣職司勸農分外之事何敢更參末議但州縣官吏以地畝錢糧倉榖皆農務所自出無不列册申送到臣臣因得以勸課之暇細為查閲所過六十餘州縣內倉榖存貯多寡不等而其中之最易於黴爛最難於交盤者未有如廣平府所屬之清河縣也查該縣各項存貯之榖通共四萬四千八百三十九石之多而倉房則僅十間止容榖一萬二千石其餘則土囤四十六所民房十二所祠廟二所俱各散處不倫看守甚難兼之地形卑濕易於黴爛是以歷來接任各官寧甘受交盤規避之處分而冀免日後黴爛之貽纍臣思倉榖原以備賑所關甚重仰懇皇上敕下地方官吏擇縣中高燥之處創建倉房數十間將四散之榖總歸一處則看守既易黴爛可免有司之交盤自無規避之弊矣臣謹具摺奏聞伏乞皇上睿鑒施行謹奏該督唐執玉察明具奏雍正七年七月初四日巡察直隸等處農務御史臣舒喜謹奏為特參受賄濫派之員以抒民怨以肅吏治事竊臣於六月十八日巡至河間府獻縣地方見百姓百餘人遮道喊寃口稟河衙主簿王永任受賄違例濫派民夫有錢者免無錢者拏正值農忙籖票疉差乞救民命等語臣當即以好言解散面囑知縣李思鄴細查的實情由速即詳覆臣於二十三日巡至寧津縣乃獻縣詳文未到而鄉民呂世恩等十餘人復追至二百里之外具呈哀訴據詞內稱獻縣有漳河洋河二水築堤一道以禦水災舊例額設淺夫挑濬頂堤地主修堤不煩衆力固各司其事各安其業者也今河衙王主簿私受頂堤地主王進才劉順廷制錢八千濫派合縣百姓修築以致小民地畝拋荒棄家逃避等情臣於二十九日巡至河間府查得康熙五十三年小民亦因派夫不公紛紛呈告總督批示悉照舊遵行不得擅派鄉民於五十五年建碑在府衙之外乃主簿王永任不遵舊例竟敢受贓私派似此貪婪不肖之員相應參處以肅吏治者也再防河堤工自應每歲興修以堵水患臣請皇上敕下督臣嚴飭管河官吏遇修築之時悉依舊例禁止濫派則百姓自無怨尤後之司事者亦不敢再為更變矣臣謹具摺奏聞伏乞皇上睿鑒施行謹奏該部嚴察議奏同日又奏為恭報秋禾豐茂萬民歡悅事竊臣自任事以來巳歷八十餘州縣矣前五月內雨水尚少今於六月初二日起至初八初九日止各州縣俱申報四境雨水霑足臣巡行得雨地方遍野秋禾豐茂異常萬民歡欣載道臣下馬勸農百姓向臣云民等叨蒙萬歲洪福現今時雨下沛將來秋苖可望十分收穫等語臣復將皇上宵旰精勤時切民瘼之意反復誡諭爾等果能戒率子弟務本力農不致遊手好間以仰體皇上愛民如子之心則感召所致自必歲登大有永享太平之樂於無既矣鄉民皆點首會意臣謹將秋禾豐茂萬民歡悅情形具摺奏聞謹奏秋禾雖云現在豐茂屆收穫之期尚早何遂預定十分多此一番瀆奏也同日又奏為縣令屢更吏治闒茸非老成練逹之員難以整理事竊臣巡至順德府屬之唐山縣問以八品頂帶之老農行來巳經多年何以尚無一名據知縣趙杲稟稱唐山縣自雍正三年七月起至雍正七年五月四年之內中間升任調補參革署事之員共換過十一人任事不過半年三月縣中錢榖民詞甚繁是以未暇議及保舉老農之事臣思歲舉老農乃國家曠典司事者尚且因循怠忽則凡事之廢弛不問可知矣臣訪得邑中錢榖虧空不淸百姓刁頑健訟現任知縣趙杲臣視其年紀尚輕又且筮仕方始未經歷練恐不能勝此繁劇之任臣請皇上敕下督臣揀一精明歷練才猷素著之員調補此縣庶廢者可舉頑者知警錢糧倉榖亦得淸結矣臣不揣愚陋謹具摺奏聞伏乞皇上睿鑒施行謹奏據奏該邑於四年之內巳換過十一人等語今若又將趙杲改移則係十二人矣思之雍正八年四月十六日巡察直隸等處農務御史臣舒喜謹奏為恭報二麥豐茂萬民歡悅情形仰祈睿鑒事竊臣荷蒙皇上鴻恩再任巡農直省愈增感激之心倍切報效之志於四月初間巡至大名府屬州縣鄉民告臣今年麥子被二月二十五日一晝夜風霜侵損第二日天晴起視皆葉捲支垂間有幾至枯稿者民等甚為憂慮忽以三月初旬連得和風暢雨不幾日而向之支垂葉捲者暢茂條達幾至枯稿者遍發新支大長麥穗此皆萬歲愛民之心切故有默佑之者使枯黃之麥復生豐茂之穗民等不勝歡幸之至續又據大名府魏縣申報亦同前由臣訪得順德廣平大名三府州縣百姓每歲惟仗二麥豐收以為賦稅養育之需故地畝之種二麥者十居八九自風霜侵損之後諸榖之價值日增今者雨順風調麥穗足實市價仍舊和平百姓歡聲載道目下將次收割豐登實可預期此誠國家之上瑞黎民之大慶也理合據實奏聞伏乞皇上睿鑒謹奏覽奏二麥豐茂情形知道了所奏老農一摺交部議矣雍正八年六月十三日巡察直隸等處農務御史臣舒喜謹奏為功績及人深遠士民感激靡涯懇請上達以伸情悃以志不忘事竊臣於六月初八日接得順德府詳據署任縣知縣王廷棟詳稱任縣闔邑士民趙懷玢等呈稱任邑東北有大陸澤為沙洺馬泰等十七水之滙而以澧河為渠由穆家口而隆平而寧晉下達天津水有所歸任不受害自澧河塞而大陸之水遂有蓄無泄沒民田千有餘頃自元時至本朝康熙年間雖有開導澧河之議民心未一民力未濟以故任境內四十餘村千百年來瀰漫汪洋公私甚苦欽惟我皇上如天好生軫念民瘼特命怡親王省視河防量度築濬我王仁慈明敏勤宣德意雍正三年抵任境問民疾苦親詣踏勘察諸流之源委相地勢之高下爰赴闕請命發帑金二萬餘兩於四月興工挖河自穆家口橋北起至寧晉縣界袤延四十餘里為民興利逮功成而大陸作不特附近村莊永無被水之虞即豁免之田可以漸次墾種者且二百六十餘頃矣玢等竊謂我王盛德獲福方興未艾孰知勤勞成證至今歲仲夏而不諱也耶棠隂方茂天問無從感激涕零情何能巳禮曰法施於民則祀之能捍大患禦大災者則祀之玢等不揣愚昧意欲卜地建祠春秋享祀以略申報本之微誠以稍酬深仁於萬一特以天潢之尊理合請命不敢擅便伏乞轉申懇題俯遂愚忱俟工竣之日再行恭請宸翰匾額對聯以昭誠敬俾聖朝之盛典遐彰而賢王之懋績永著矣為此銜哀上呈等情到縣詳府轉詳到臣臣不敢壅於上聞謹據實繕摺具奏伏乞皇上睿鑒施行謹奏交該部議覆候旨遵行雍正九年四月二十二日巡察直隸等處農務御史臣舒喜謹奏為敬陳被水州縣民地情形仰祈睿鑒事竊臣奉命巡農自二月十二日出京以順德廣平大名三府去年偶被水災恐有積水未消耕稼未遍之所因而先行巡視凡過州縣被水村莊務必繞道查驗第見靑黃滿目高下遍栽百姓安堵惟巡至大名府屬長垣縣境見一路扶老携幼紛紛投縣者絡繹不絶臣駐馬詢問據稱我等俱係垣邑百姓縣中現在施粥來此就食臣即查問邑令我皇上發帑賑濟未久何得又有此等窮民縣官稟稱舊年散賑止將朝不謀夕窮民注册給發其外有兩三月口食之家不曾散給今者餘糧告匱靑黃未接因邑中紳襟捐榖施粥所以咸來就食等語臣隨將垣邑貧民情景移咨總督總督亦於臣移未到之先訪知垣邑有乏食貧民差人捐銀資助今又見臣移咨到時自必加意撫恤諒垣邑貧民決不至於失所也再今四月初七日起至十二日順廣大三府各州縣申報得雨分寸四境沾足將來二麥豐收藏榖之家盡皆糶賣米價自必頓減兹臣於四月二十日順廣大各州縣俱巳巡遍理合先將三府民地情形具摺陳奏伏乞皇上睿鑒施行謹奏觀汝所奏大似偏於粉飾雍正九年五月十五日巡察直隸等處農務御史臣舒喜謹奏為敬陳因地制宜以資民用仰祈睿鑒事竊臣巡至順德府唐山縣境見周圍數里間有浮沙地數百餘頃並無種作因詢鄉民如何不行播種任其荒蕪據云此地浮沙衝壓巳久人力難施不能種植五榖若刨開浮沙亦可栽插榆柳以收地利但繫官土所以無人敢種任其荒蕪等語臣仰體皇上重農務本愛育羣黎至意細察此地實繫沙磧不堪五榖然與其拘為官土任其廢棄何如因地制宜收其利用況以公家之曠土佐閭閻之謀生甚為有益懇請皇上敕地方官凡有沙磧官地如唐山縣者俱各造册申報除內中人力可施稍堪種五榖者仍勸民樹藝五榖照例報查外餘則丈明畝數給付附近村莊願開種樹木之居民令其管業種植將十年之後斧斤可施材木可用倘或土性相宜可以栽培果木則落實取英於民更為利益矣臣管見如斯謹具摺陳奏伏乞皇上睿鑒施行謹奏該部議奏雍正九年七月初一日巡察直隸等處農務御史臣舒喜謹奏為奏聞事竊臣巡至河西務地方訪得六月十九日正值會集之期四鄉居民貿易甚盛不謂有修築河堤工徒齊聚數十人攔阻運河同知程恂於集上需索修堤工價拉住馬鐶圍繞喧閙觀者如堵參將馬國竒聞知即帶守備等員至集彈壓方行解散臣思河西務一帶堤岸歲歲興修工役頗多從未聞夫役敢如此肆行無忌者今此之舉實所罕聞如實係散給工價不淸致起釁端則責有攸歸若係刁徒故意凌辱官員則風不可長臣職司言路訪聞既確不敢默而不言謹具摺陳奏伏乞皇上睿鑒施行謹奏朕巳聞之業差原辦此工之大臣前往察究矣雍正九年八月二十九日巡察直隸等處農務御史臣舒喜謹奏為敬陳管見仰祈睿鑒事竊直省去年被水州縣荷蒙皇上鴻恩發帑賑濟民慶安全而又以秋成淺薄糧價昂貴命直省州縣概行減價糶賣倉穀以裕民食準部議凡州縣存貯倉榖五六萬石者糶三存七若一萬石以內者糶五留五至存榖最少不敷糶賣之處於鄰近榖多州縣通融酌撥補賣所得價值交貯司庫俟辛亥年秋收之後領回原價買補等因在案不料今年五六兩月雨水缺少榖價昻長六月二十以後始得甘霖時沛早種之榖似可無憂而晚植之榖不無稍嫌其遲恐將來榖價未必能即時平定若秋成後各州縣謹遵部議不論價值貴賤務必買足方巳則榖價又必分外加長矣據臣愚見除今年秋收豐厚榖價平減之州縣聽其自行買補再存貯倉榖僅四五千石之州縣又經糶五之後為數太少似應亦就今秋買補外至向來積貯五六萬石一二萬石之州縣所賣不過三分現存二三萬石一萬餘石在倉不為無備倘可暫停採買俟壬子年秋書大有之後買補還倉或今年先買一半明歲再買一半補足原額則榖價不致甚貴而貧民更沐皇仁於無既矣臣管見如斯是否可伏乞聖裁謹奏言之該督酌量而行同日又奏為恭請移駐兼轄之員以資彈壓以重地方事竊臣巡至宣化府屬之沙城地方見地當孔道城連三座中分界限東屬懷來縣管轄西屬保安州管轄居民商賈稠密繁雜其中非但無大員彈壓即一巡檢把總亦未曾有倘稽察無人或宵小之輩見地方殷實潛行偷竊懷來保安相隔五六十里均屬鞭長莫及難以照應臣查得沙城西去二十里有新保安城內設參將一員守備千把等辨又設同知一員兼轄沙城事理夫當年設官分職自必就地方之形勢人民之衆寡以定而時地前後不同户口日增蕃庶就今日之沙城而言則遠勝於保安多矣乃保安則文武多員而沙城則微末全無臣思保安同知既可駐劄保安兼管沙城亦可駐劄沙城兼理保安況查沙城中堡舊有察院廢址今雖改為義學略一整頓可為衙署懇請皇上敕下督臣即將保安同知移駐沙城以資彈壓則巡緝有人而盜竊皆知警惕此不必設官添役糜費公帑一轉移間似於地方民事大有裨益矣臣為愼重地方起見謹具摺奏請伏乞皇上睿鑒施行謹奏此事亦言之於督臣唐執玉雍正九年九月二十六日巡察直隸等處農務御史臣舒喜謹奏為恭報嘉禾獻瑞闔邑歡慶仰祈睿鑒事竊臣於九月十八日接得永平府昌黎縣詳稱邑內四境秋禾俱實有九分十分收成有農民王廷佐等詞稱刈穫高粱得一莖四穗及五穗甚有至六穗者佐年六十五歲實平生之所未見此皆萬歲愛民之所感召不勝欣喜呈驗為此謹加收貯在縣等情臣於本月二十一日到昌黎縣知縣劉玉林將四穗高粱四株五穗者二株六穗者二株呈驗臣恐此係常有之事因召鄉民農官等至署詢問俱云從未經見臣自昌黎起程歷巡樂亭灤州等處一路細詢鄉民耆老皆云非特目不曾見抑且耳未曾聞等語欽惟我皇上重農務本敬天勤民今者嘉禾獻瑞於昌黎闔邑欣傳為上瑞臣既經目睹且訪問再三異口同聲咸稱罕見臣不敢壅於上聞謹據實具奏再各府州縣申報秋成分數因臣行蹤無定一時難以取齊容臣回京另摺陳奏合併聲明伏乞皇上睿鑒謹奏據奏昌邑嘉禾知道了爾於回京時攜帶數株呈覽雍正十年五月二十七日巡察直隸等處農務侍郎臣舒喜謹奏為請旨事竊臣奉命巡農歷經三次向遵諭旨於二三月間出京巡察農務九十月內回京復命今蒙皇上天恩特升禮部侍郎之職伏思巡農雖屬要務而部案尤為重大臣冒昧請旨伏乞皇上另差巡農之員命臣回京恭聆聖訓學辦部務勉竭犬馬之勞報天恩於罔極謹具摺請旨伏乞聖裁謹奏覽奏知道了巡農事畢然後回京赴部可也雍正十年六月十七日巡察直隸等處農務侍郎臣舒喜謹奏為秋禾豐茂情形據實陳奏仰祈睿鑒事竊臣奉命巡農自五月間至今巡行保定正定河間等處地方甘霖時沛各處均霑榖子高粱俱巳發穗吐華其餘晚種雜糧等項亦皆蔚秀可觀又據各府州縣將得雨日期絡繹申報俱稱霑足臣巡行數載未有如今歲秋禾之豐茂也遍野農民靡不歡呼預慶咸稱如此風雨常調今歲豐收可保伏思我皇上愛養黎元時以農務為心故敢冒昧先將此時目擊豐茂情形與百姓歡慶景象據實陳奏容臣次第巡遍再俟收割之候另將收成分數具摺奏聞伏乞皇上睿鑒謹奏以手加額覽焉硃批諭旨卷一百五十三
