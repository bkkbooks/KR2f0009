body:
  text: 欽定四庫全書硃批諭旨卷一百十八硃批顔光旿奏摺雍正三年三月十九日福建福寧總兵官臣顔光旿謹奏竊臣於上年五月內入覲天顔奉旨令臣到光祿臣林祖成家中問伊生長福寧州於營伍地方事宜或有所知所見對臣直説據林祖成云福寧州東沖地方係福安福德福寧三處海口稽查賊船併嚴禁米穀出洋要緊三沙地方每年魚船在此住泊人迹繁雜姦良莫辨出入更冝嚴查福寧州庫貯火藥年深日久未免退性須要試放方可備用等語臣回任後隨即親往海口勘驗查東沖鑑江二汛己經督臣滿保設立有炮臺哨船題報在案但海門甚寬遇天有雲霧即日間揚汛出入其曾否挂號之處兩岸營汛俱不能稽查今臣擬令二汛各𥪡大木一桿以為掎角之勢凡遇洋中賊船及偷越米穀販私等船追逐之際風順則以放炮為號風不順則以升旗為號以通聲援互相堵截庶姦宄遁迹而商艘可保無虞矣再三沙海汛漁船出入臣即令該汛辨嚴加稽查外復設立一循環號籖凡漁船出口時務將此籖領出入口時繳回再出再領如不領繳而徑行出洋者明有離䑸作反情弊立即查究庶稽查嚴而姦匪可杜矣至所云庫貯火藥臣今仿照出陳易新之例將庫內舊藥發出分給兵丁演放所有捐製新藥抵還庫項俾火藥無退性之虞再臣前面奏編查保甲開造指掌册臣現在措置舉行巳經督撫臣逐一條議請寬兩年之限將編查舉行有無禆益合詞題報再臣奏請營中設立一儲備倉接濟兵食荷蒙皇恩令督撫臣會議具奏兹督臣檄行司道會議今議撥出福寧州倉穀三千石與臣營中試行一二年以觀成效臣蒙聖恩諭臣詢問福寧形勝及奏請事宜謹將奉行過緣由具摺奏聞謹奏知道了凡事不可因循懈弛固宜振作然亦不可生事邀功勉為之慎為之同日又奏竊查川陜督臣年羮堯雖有安邊之功皆出於聖主睿謨勝算所致皇上聖不自聖俱指為臣下之力大加寵錫為人臣者自宜受寵若驚愈加謙抑臣前聞年羮堯在西寧時其體統尊大中外無與比倫出入以土墊街以水壓塵其巡撫提督等官名雖平行實同下屬凡直省之督撫附近之提鎮或營謀請託或勉強趨奉者指不勝屈臣一介椎魯頗知大義聞聽之下實深駭異臣前陛見時因事係風聞職非言路謹以皇上酬勳之典過于隆重冒昧瀆奏近閲邸鈔深仰我皇上身居九重明察萬里綸言告誡洞徹隱微曲加保全功臣之處中外臣工莫不感切臣前蒙聖訓示以朋黨之誡時惕于心兹讀諭旨倍加謹凜惟有力絶朋比勉竭愚誠圖報主恩於萬一耳所有臣慶幸歡忭愚衷謹具密摺奏聞謹奏此奏甚為可嘉但稍遲耳然能見及此而抒誠上奏仍屬可嘉雍正四年四月初八日福建福寧總兵官臣顔光旿謹奏為遵旨奏明事竊臣于雍正二年五月內赴京陛見不揣冒昧奏請營中設立儲備倉預備米穀接濟兵丁蒙皇恩令督撫臣會議具奏嗣經督臣滿保議撥福寧州倉穀二千石交臣試行一二年以觀成效三年五月內福寧州知州撥出倉穀三千石交臣營中積貯彼時民間穀價值銀六錢臣將倉穀借給兵丁每石價值酌減至五錢五分嗣于是年秋冬將銀湊齊買米還倉每穀一石需銀四錢五分約計三千石之穀共溢出穀六百六十八石臣又將所買之穀湊添三百三十二石以足一千石于雍正三年十二月內償還福寧州倉訖其餘二千石期于雍正四年五年冬還清以符督臣三年償完之議然三千石之穀大約三年內只可溢出二千石為數無幾難以敷用臣情願將應得俸餉用度之餘陸續捐買穀石至雍正五年冬除還清福寧州倉穀外合計溢出之數并臣捐助之數約可積穀四千餘石收貯公倉按時斂散庶可垂之永久兵丁均獲裨益臣謹將先還過倉穀一千石緣由具摺奏聞謹奏此所奏設倉濟兵一事髙其倬察議具奏不知顔光旿料理果否如何或恐有纍營伍則無益也若實區處得法有益無損據實奏聞以便加恩議敘雍正五年四月初八日福建福寧總兵官臣顔光旿謹奏為恭謝天恩事竊臣蒙皇上賜臣墨刻御書魏徴十思疏一幅到寧臣郊迎至署恭設香案望闕叩頭謝恩祗受訖謹供奉中堂焚香虔禮所有感激下忱理合繕摺奏謝臣謹奏覽便中所賜非特賞可比無庸專差奏謝路途遙逺嗣後遇此等事應於奏事之便附謝便遲數月亦無妨也數月內若無應奏之事轉交與督提齎摺之人代為呈進亦可同日又奏為遵旨奏明事竊臣沐皇上天恩準臣營中設立儲備倉一案臣于雍正三年間借出福寧州倉穀三千石本年冬季溢出穀六百六十八石除三年還過州倉穀一千石數月業於上年四月間具摺奏明所有存貯穀二千六百六十八石臣又于青黃不接之候借給兵丁嗣于秋冬二季將所還穀價採買還倉又溢出穀六百六十七石臣又捐買穀六百六十五石共儲穀四千石除雍正四年分應還州倉穀一千石業巳償還訖更存穀三千石現在陸續借給兵食容臣于雍正五年冬償還福寧州倉穀明白後將三年內共溢出實數繕摺具奏今將雍正四年分還過倉穀一千石緣由繕摺奏聞謹奏此舉朕原極為嘉奬況料理頗屬妥協所奏欣悅覽之爾居官之聲名及實心效力處朕皆一一備悉勉為之雍正六年四月十八日福建福寧總兵官臣顔光旿謹奏竊臣於本年二月間準督臣髙其倬委臣署理泉州提督印務看其營中旗幟鮮明甲械可觀但兵丁驕悍漫無紀律固泉漳地方習氣使然實係丁士傑約束不嚴所致又丁士傑揀取馬糧太緊併應補名糧不即發補以致兵多怨望今新任提臣石雲倬臣向知其鯁直歷練自能調劑得宜也再者漳州去年冬間欽差阿彌達同知府潘體豐查出欺隱地畝一案臣於雍正四年曾署漳州鎮臣印務知漳州地瘠民貧安得有欺隱地畝如此之多因細加訪察乃知漳州之田約有五等一曰洋田一曰山田一曰洲田一曰埭田一曰海田總以依山濵海故田之髙下肥磽分此五等康熙九年間龍溪縣知縣利在三曾將該縣田地通行丈量見得田有髙下賦難重輕因于丈量之時先分田為上中下三則又分弓步大小不等上則之田弓步若干中則之田弓步若干下則之田弓步若干并有以二畝只抵一畝者自是以來國家生齒日繁豈無陸續開墾然在今日之新墾未報者少而在當年之因田磽瘠分定者多今若概以丈量弓步令其一例加賦而弓步又非出一人之手未免苦樂不均且恐初登仕版之人急公念切致小民稍有驚懼臣仰思聖明自有乾斷但臣身到其地既知其事有闕于民情不敢避越俎之嫌謹具密摺奏聞謹奏此奏可嘉之至清丈一事朕曾屢降諭旨若不得其人奉行不善不特無益反有害也然地方之姦民土棍恃強隱占阻撓玩法又不宜槩行疏縱竟置之不理須得公明有司斟酌調劑而為之方克奏效已有密諭飭行該督撫矣此乃地方情形應奏聞之事何言越俎閩省在在虧空事事欺隱因爾未經奏聞朕懷至今尚未釋然向後凡有聞見皆當秉公據實入告若少存私見惑朕耳目但試看如何勉之同日又奏為敬陳管見恭請聖裁事竊照臺灣全鎮駐防兵丁俱由內地標營抽撥往戍從前多有頂替逃匿勾結為非之弊自蒙諭旨誡飭封疆諸臣凜遵功令凡戍臺換班俱揀選有父母妻子人材壯健之兵方準起送目前往戍兵丁因逺阻巨洋家口食用無資具呈公懇每兵每月留餉銀五銀以養贍家口現經督臣議準通行在兵丁固可無內顧之憂惟是在臺三年每年只領銀八兩四錢米食似可足用而衣帽之屬及往返路費所需甚覺不敷臣再四思維惟有加賞之法方為有益臣看得福建山海交錯騎卒似緩於步卒臣擬將臣標三營馬兵四百八十名內汰去二十名懇請諭旨即將此節省之銀分給臣標戍臺之兵二百餘名每月加銀二錢五分足充往來水陸路費及添製衣服之用更有請者閩省兵丁內無妻室者甚多蓋因閩俗嫁娶之時必需財禮即至窮之人亦必需二十金方能完娶倘蒙皇上格外施恩加此月賞則有室家者將每月五錢之餉支給養贍家口而無妻室者將每月五錢之餉交本管將備收存俟本兵戍滿回營給領以助其完娶室家之用祗一截長補短之間餉不加增而兵沾實惠倘各營俱畫一行之庶逺戍有裨而海疆永固矣是否可行伏乞睿鑒採擇施行謹奏朕覽所奏甚屬合宜可與督提二臣會同商酌如應具題即具本題奏雍正七年四月初四日福建福寧總兵官臣顔光旿謹奏為敬陳指掌册事宜仰祈聖明敕令武職畫一遵行事竊臣于雍正二年陛見之時恭呈指掌册一款原與編查保甲之法事同一體其中立法嚴密又明白顯易按册而稽明如指掌蒙皇上洞鑒命前任督臣滿保傳臣詢問如何措置妥協之處詳議具奏經督臣滿保撫臣黃國材同臣會奏在案臣回任後因福寧州新舊官屢次更換未得成造至雍正六年新任知州郭朝鼎到任後始得編查清楚但指掌册係雍正四年編造之册至今二年其中不無遷移增減者臣復派千把等員將本州所轄村莊按汛防之地分令遊巡因遊巡之便又將户口人丁清查更令造册申報到臣隨移知該州亦按季差鄉保人等稽查申報務期兩相符合俱無舛錯遺漏是文員因有武辨之巡查不被鄉保之蒙蔽武職因有文員之稽考亦不受辨目之欺瞞至申報之時不過于册籍上照户注查户口之時見鄉長所轄之村逺近多寡不等地方遼濶勢難兼顧不無徇私隱漏之弊今臣復改為村長不過令其知村中某人是姦是良某家增減遷徙及有窩盜賭博者告知汛辨鄉保令其轉各員呈報更正因無督理之員恐有不實之弊嗣後當委臣中軍守備專理其事申報到臣復加詳御覽伏乞睿鑒施行謹奏覽同日又奏為謹抒一得之愚以防侵那之漸事竊查州縣倉糧例應上司盤查上司不能親臨多委鄰近州縣彼此互查其中即有互相容隱之事又州縣中有侵那倉穀致被參處者仍借黴爛名色掩飾買補希圖開復又有借給兵食只還穀價每年虛報實貯在倉者亦有只換印領無價給還每年只據印領借數而虛報實貯在倉者種種弊端總因州縣倉糧乃文員職掌出納得以自如同城武職不得過問之故臣請嗣後州縣倉穀經前後官交代明白之後即將實在數目知會同城武職該營亦即報明本管上司移明藩司存案眼同封固若有收放之時武職即將數目具文申報倘武職有徇私揑報情弊致成虧空者事廢之日或令分賠或議降罰伏乞皇上敕部詳議處分如此則武職不敢揑報隱諱而上司得因武職之申報可以知州縣倉穀之實數自永無侵那虧空之弊矣可否採擇伏乞皇上睿鑒施行謹奏此奏殊屬不通之至新舊二人彼此交代其弊尚無窮若再增一武員其中紛亂叢生莫可究詰則總無交代清楚之日矣况亦未有令有司受制於武辨之理是乃可笑之見解也硃批諭旨卷一百十八
