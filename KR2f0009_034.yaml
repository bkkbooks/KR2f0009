body:
  text: 欽定四庫全書硃批諭㫖卷三十四硃批李成龍奏摺雍正元年三月初九日安徽巡撫臣李成龍謹奏恭請皇上聖安朕安爾向來官聲中平雖無貪黷穢跡而亦無清勤美譽朕念皇考委任封疆有年容爾黽勉自新此後若仍然狥情面納賄賂交結權要從事鑽營國法無私追悔何及特諭同日又奏為凜遵聖訓叩謝天恩事臣齎摺人回恭捧欽賜黃匣內係緑端硯眼鏡鼻煙壺火鐮包荷包阿膠到安慶臣隨即率同屬員郊迎至署叩頭祗領除將感激下情另疏奏謝外竊臣至微極賤受先帝殊恩由縣令洊擢巡撫才庸識陋每以不能稱職夙夜抱慚今䝉皇上硃批嚴切教誨臣跪讀天語悚惶恐懼感激涕零惟有凜遵聖訓時時兢惕潔已奉公以期仰報高厚於萬一至於地方官員內或有太監之子弟親屬捐納成名或無賴之徒投入諸王阿哥府中借勢生事擾害地方者臣現在遵奉諭㫖細心密訪有則即行據實參奏不敢容隱為此具摺恭謝天恩謹奏覽奏已悉念爾本門主怡親王公忠自矢匡襄政務朕所以推恩下逮於爾父子爾其知之當砥礪自新愛民勤政以全爾主王之顏面密之勿令人知雍正元年四月二十八日安徽巡撫臣李成龍謹奏為恭報二麥豐收分數仰祈睿鑒事欽惟我皇上念切民生恩周蔀屋天心協應年歲順成臣所屬安徽等處今當二麥成熟據各屬具報收成分數前來安慶徽州寧國池州太平廣德六府州收成十分九分不等廬州鳳陽滁州和州四府州收成九分八分不等安慶米價每石九錢大麥每石三錢二分小麥每石七錢六分民生安堵理合恭奏上慰聖懷伏乞睿鑒謹奏知道了向後一切雨水年歲及吏治民生總宜據實上達若仍前以寬慰聖懷恐煩睿慮為辭粉飾欺蔽而託名忠順經朕燭照必治以重罪德音是爾等前車之戒也君臣本為一體中外原無間隔要當彼此披露毫不隱諱上下同心和氣充滿則自能感召天庥百物阜成萬姓䝉福矣爾其勉之雍正元年九月二十六日安徽巡撫臣李成龍謹奏為恭報上江秋成分數仰祈睿鑒事竊臣所屬上江地方秋禾已收據各府州具報收成分數前來安慶徽州寧國池州四府九分八分及七分不等太平廬州滁州和州廣德五府州八分七分不等鳳陽府八分七分內間有被蝗之處所傷甚少並非闔縣皆然又安屬之桐城太湖二縣并滁屬之全椒縣禾至將成之候雨澤未遍近山髙田雖經被旱然窪地仍係有收臣查此時稻正登場民食尚無不足當與督臣㑹商俟十月以後將被旱蝗之處先行減糶以平市價再行煮賑以救乏食窮民臣等自應設法撫恤務使得所不敢以數處微眚上煩睿慮相應據實陳明再臣齎把總恭捧硃批三道到臣欽此欽遵竊惟禁止供應緝除盜賊以及力行保甲社倉皆休養民生安戢地方之要務臣跪讀之下仰見我皇上教誨周詳無微不悉臣惟有時時黽勉實心奉行以仰副皇上治益求治之至意謹奏凡事惟貴力行愼勿陽奉陰違苟簡塞責言雖可聽考其事則大不然究復何益汝年齒稍邁恐精神不充或致廢弛諸務夫一人之耳目有限安能照察無遺即少年人止恃一已聰明亦不能周到總要勤以補拙心口勿怠甄别屬員之賢不肖公正嚴明時加訓飭則事亦不難辦理倘少涉偏徇不能擺脫情面一二私人掣肘衆心不服事無大小胥難期成效矣勉之戒之查弼納乃係簡用之人當與之同心協力料理一切如仍前積習不除經朕訪聞則是爾自貽伊戚寧不辜朕許爾自新之恩耶奮志自強勉為良吏特諭雍正二年閏四月十六日安徽巡撫臣李成龍謹奏為恭報二麥收成分數仰祈睿鑒事竊臣屬安徽等處二麥暢荗情形前已具有七分不等米價平減小民樂業謹具摺恭不能為害已嚴飭文武官辨協力撲滅合併陳明伏乞睿鑒謹奏據奏蝻初萌發尚未生翅切勿漫視麥田雖未受害若至飛起則貽害秋田不淺矣此係人力可以消弭之事飭諭該地方官務令設法撲盡朕已嚴諭查弼納協同爾遴委勤幹之員俾實心任事毋得稍有怠忽倘致滋蔓則因循之咎爾等百喙何辭亟當嚴督撲捕以釋朕慮近來聞爾聲名頗好政績較前大改觀矣如此方是人不患有過過而能改即屬懿行必照此久遠遵守始不有負朕寬容之恩不可以為好字既入朕耳復循故步放逸自恣恐禍不旋踵也勉之雍正二年九月二十八日安徽巡撫臣李成龍謹奏敬請皇上聖安朕安朕今日賞爾翎子與夫爾之功名身家得以保全者皆由爾本主王忠勤為國朕所嘉念因而推恩及汝耳但又不可倚賴本主王在內而肆志貪縱國法無私至噬臍莫及時爾本主王亦難以護庇矣倘竟有違明訓辱及爾本主王之顔面有負朕任用之恩爾試思當作何懲處以蔽其辜朕自御極以來用人行政爾具有心胸諒應知悉亟當加勉以當代名臣自勵以仰答朕恩并慰爾本主王之期望若徒在爾本主王前妝飾清苦冀圖惑朕耳日斷然不能也况汝本王亦非苛索汝輩之主爾今年將耆艾子巳成立諺語云兒孫自有兒孫福何靳而不為一出類拔萃之巡撫以風示臣僚勉之封疆大吏最忌柔軟姑息涇渭不分玉石莫辨必至一事不能辦理如此剴切訓誨不啻家人父子爾宜謹志弗忘拳拳服膺切不可對衆宣揚以誇示榮寵自取殞身之禍也密之同日又奏為恭報秋收分數仰祈睿鑒事欽惟我皇上勤政愛民無時不以稼穡豐歉為念臣屬上江地方今歲秋禾暢荗蝗不為害情形前已具奏兹據各屬申報收成分數前來徽州寧國池州鳳陽廣德五府州收成九分八分及七分不等安慶太平廬州滁州和州五府州收成八分七分六分不等安慶米價每石一兩零五分大麥三錢二分小麥八錢二分小民樂業為此奏聞恭慰聖懷謹奏年歲順成蓋由人事克修也念兹感應之速能不愈加凛畏乎二年以來汝之政聲較前豈可同日而語勉之聞朱作鼎人甚糊塗居官平常其據實奏覆雍正二年十一月初十日安徽巡撫臣李成龍謹奏為奏聞事臣具摺恭報秋禾收成分數奉皇上硃批聞朱作鼎人甚糊塗居官平常其據實奏覆欽此欽遵臣查朱作鼎近年以來經臣時加訓飭雖自勉勵而糊塗平常誠如聖鑒理合據實奏聞伏乞皇上睿裁謹奏所奏巳悉朱作鼎為爾屬員頗有年矣其辦理事務猶有可惜處否爾如不惜即將伊革黜另簡賢員補放也雍正三年正月十一日安徽巡撫臣李成龍謹奏為再行回奏仰請聖裁事臣回奏按察司朱作鼎一摺欽奉硃批臣跪讀之下仰見聖主體恤下情無微不照臣敢不永矢犬馬愚誠上圖報效竊朱作鼎自臣到任後辦理事件原無貽誤江省民情亦所熟悉近年來䝉皇上諄切垂訓更加凜惕似可暫留䇿其後效倘不益加勉勵臣當不時參奏可否留其在任臣不敢擅便謹據實回奏伏乞聖恩裁奪謹奏年羮堯屢奏朱作鼎斷不可姑留朕採訪輿論不過言其庸碌並未聞有甚劣之蹟所以諭問爾既欲策其後效何必革黜近日年羮堯擅作威福逞姦納賄朕甚惡之聞爾與伊原係世誼爾子現在陜西通情敘禮則可若畏勢比昵附和則恐為伊連纍也諸凡亟當愼之朕以大公無我之心普照萬方不但年羮堯倚仗不得任誰亦不能降禍福於爾等除爾本王之外惟宜孤介自持今已雍正三年矣爾等向日之得心應手處皆不靈矣戒之勉之雍正三年七月二十二日安徽巡撫臣李成龍謹奏為恭謝天恩事竊臣前齎摺千總捧回欽賜內製各色錠藥一匣今齎摺把總又捧回欽賜鹿尾六箇到臣臣俱郊迎至署恭設香案叩頭跪領訖伏思臣一介庸愚竊祿曠官愧乏涓埃之報更䝉天恩髙厚賞賚頻加臣惟時時以君恩在念深思地方為重益加兢惕小心謹愼奉職以圖報稱於萬一耳為此具摺恭謝天恩謹奏朕今巳用爾為楚督矣其加勉毋怠莫負朕恩照此三年居心行事庶可永保無虞也愼勿再蹈前轍因循自便事事舉頭看天件件捫心自問凡起一因私廢公之念隨即慚而不忍為則漸近自然矣湖廣盜案繁多當竭力整頓能清盜源始為上策不揣其本而齊其末可憐無藉窮黎比比陷於誅戮殊覺惻然爾悉心講求良法而力行之雍正三年九月初十日安徽巡撫臣李成龍謹奏為敬陳微臣感激下悃併報鳳陽關稅足額贏餘仰祈睿鑒事臣蒙皇上諄切教訓得以勉奉職守涓埃未報悚懼不安今又䝉特恩補授湖廣總督驚聞感激下悃併贏餘數目繕摺具奏伏乞睿鑒謹奏知道了雍正四年正月十七日湖廣總督臣李成龍謹奏為據實奏明仰祈睿鑒事臣蒙聖恩簡任總督全楚地方重大夙夜兢兢惟恐措施未得其宜至於錢糧關係國計民生尤當經理盡善查湖北湖南各額徵銀一百一十餘萬前督臣楊宗仁定以加一耗羡以三分解交各司庫作起解錢糧飯銀及闔省各項公務之用以七分分給司道府㕔州縣各官為養廉之需一切上下餽送盡行革除聞其曾經奏委任祗此勉效清愼或可稍報高厚於萬一耳為此據實奏明伏乞皇上睿鑒謹奏果肯實力釐剔如楊宗仁所為冉兼以爾之和平歷練夫復何諭朕之格外加恩於楊宗仁者欲為天下後世勸也勉為之雍正四年三月初三日湖廣總督臣李成龍謹奏為恭繳硃批仰祈睿鑒事竊臣具據實奏明一摺奉有硃批臣跪誦之下感激難名臣才微任重若非聖主訓誨周詳何能免於隕越謹當凜遵天語時時省惕勉其所難以期稍盡職守於萬一所有奉到硃批理合恭繳至臣屬湖北湖南地方現在雨水霑足麥苗暢發合併陳明伏乞皇上睿鑒謹奏極當聚精㑹神以敬敷治理若祇不過料檢文書章奏以及刑名錢穀之案牘而謂克盡乃職則末也封疆任重必夙夜思維凡關闔省之吏習民風事無大小纎毫不遺毅然秉公持正以進賢退不肖為已責方不有負朕之任用倘欲以因循茍簡之積習邀安靜持重之美名乃朕所深惡而不取者戒之雍正四年三月二十日湖廣總督臣李成龍謹奏為據實具奏仰請睿裁事本年三月初四日辰沅靖道張廷樞引見回楚密傳諭㫖前任總督楊宗仁審理張聖弼一案尚未公當致多物議著總督李成龍秉公審理如有情弊不可輕縱如有寃抑亦當據實具奏欽此臣查核原卷前任湖北布政使張聖弼先經督臣楊宗仁以司道朋比侵銷俸工等銀題參續經撫臣納齊哈以虧空庫銀題參俱奉㫖審擬經督臣楊宗仁撫臣納齊哈公同㑹審分别擬罪著落追賠具題經部議覆於雍正二年九月十八日奉㫖依議轉行欽遵在案除張文燦續經身故并張連登呂猶龍牟欽元等應追銀兩已咨原籍本旗著落杏追外張聖弼許大定現在湖廣嚴追今杏原報有著可抵銀九萬三千三百一十四兩內已完補銀六萬三千八兩原報各屬可催俸工等銀一萬七千七十六兩內已完補銀一萬二千五百二兩原報張聖弼名下應追銀二萬三千六百二十四兩內巳續完銀六千六百兩又查另案所參朋比侵銷俸工等銀一事張聖弼應追銀八千三百二十兩內已完銀二千七百四十兩又另案題參張聖弼將州縣起解地丁違例扣批混抵捐項應追銀五千六百四十一兩未完俱於原案報部未完銀兩各將承追官扣限參處是前後各官扶同侵那虧空既實照例問擬追賠似無寃抑臣謹查明原案據實具奏應否再審伏候睿裁批示遵行謹奏覽奏可謂明晰之至朕意浮言之起不過因楊宗仁無隙可尋於其身後將此等舊案吹毛求疵以來熒惑朕之耳目耳然朕凡有所聞務必追究根源不容糢糊過去也諭湖廣總督李成龍巡撫法敏等朕聞有名高符吉者籍隸楚省之漢陽縣年羮堯於任川撫時即託伊執掌貨賄貿易江湖興販米糧木植家纍巨萬以故隱匿年羮堯資財甚多爾等速行查究搜追毋使姦徒得以詭寄運藏也李成龍與年羮堯原係世誼今年羮堯罔上營私罪譴重大李成龍當愼瓜李之嫌勿稍瞻狥以自取波纍特諭雍正四年五月初四日湖廣總督臣李成龍謹奏為恭繳硃批仰祈睿鑒事臣前具恭繳硃批一摺續具前任湖北布政使張聖弼虧空錢糧一摺俱奉批示到臣當即恭設香案叩頭跪誦祗遵訖所有䝉聖主指訓之處臣惟時時留心省惕勉力奉行以期無負我皇上諄切提撕之至意謹將硃批二件恭繳伏乞睿鑒謹奏務須實力奉行始不有忝厥職如滿保黃國材三年以來何事不批諭天下督撫中惟於伊二人批諭甚多硃筆所書不下數萬言閲其所奏天花亂墜朕亦無數嘉奬格外優恤及至於今考其作為何嘗實力奉行一事言念及此殊無意味每不禁為之面赤也縱不惜朕恩其如昧自心何其如上蒼之鑒察何爾萬不可效法若輩之居心行事而為宇宙所不容也向來負國辜恩欺天罔上朋比為姦夤緣作弊種種巧詐鑽營之積習惟賴內外大臣痛加浣濯力為剗除訓飭子弟勸戒親友正已化人上行下效庶或挽回澆漓而漸幾於返朴還淳也否則不特非國家之福基亦為爾等之禍囮流蕩不已且恐殃及於後世子孫讀朕此諭當恍然警悟如遒鐸振耳晨鍾醒夢各皆心悅誠服樂從朕訓而行將見我大清太和翔洽悠久無疆福祚寧可量耶勉之勉之朕以四十年來所真知灼見者於此三年內備悉開導曉譬萬端誠不啻舌敝唇乾矣而內外臣工竟不見有翻然悔悟者仍然固執陋習疲玩如故朕實有所不解不知諸臣何靳而不樂從也俗尚之難移一至於此朕時惟仰天歎息自愧無能耳雍正四年七月十一日湖廣總督臣李成龍謹奏為恭繳硃批仰祈睿鑒事臣前具摺恭繳硃批奉皇上批示到臣當即恭設香案叩頭跪誦祗遵訖臣䝉聖主教訓周至感激涕零每念身受皇恩至高至厚日思捐糜頂踵以圖報效惟是才識淺陋無以仰副委任至意晨夕惶悚不能自安謹當實心省惕知改知勉以期仰報天恩於萬一合將硃批恭繳伏乞睿鑒謹奏必將從前得心應手之老練故智盡情洗滌絲毫毋存方能仰承朕訓不然恐終不能保全令名也今將朕批示石文焯之諭㫖發來爾看即可知朕意之所向矣硃批諭㫖卷三十四
