body:
  text: 欽定四庫全書硃批諭旨卷一百五十一硃批沈翼機奏摺雍正二年九月十五日提督江西學政翰林院侍讀學士臣沈翼機謹奏為恭請聖安事竊臣一介寒微叨沐天恩命臣提督江西學政伏念臣才庸識淺膺斯重任時深兢業早夜惶悚惟有凛遵聖訓實心校士剔除積弊庶幾仰報皇恩黽勉供職臣瞻望闕廷戀慕聖主寤寐虔切為此恭具奏摺敬請聖安臣謹奏欲端士習全在奬善黜邪虛文偽譽無益於事勉為之張廷璐乃一榜樣也雍正三年六月初十日提督江西學政翰林院侍讀學士臣沈翼機謹奏為恭請聖安事竊臣一介庸愚疊受皇恩督學江右仰荷聖諭欲端士習全在奬善黜邪虛文偽譽無益於事訓勉周至教誨諄切臣即駑駘下質亦知感激奮興務期恪遵聖諭盡心考校實心懲勸黽勉供職臣望闕瞻依寤寐虔切謹具摺恭請聖安敬繳批摺一件臣謹奏知道了惟宜公正自持庶無忝厥職都中一切處夤緣締交皆徒有害而無益也於此須要見透方好硃批諭旨卷一百五十一
