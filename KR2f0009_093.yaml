body:
  text: 欽定四庫全書硃批諭旨巻九十三硃批李燦奏摺雍正七年四月十八日浙江黃巖總兵官臣李燦謹奏爲敬陳末議㳟請睿裁事竊臣山左武夫毫無知識荷䝉皇上𢎞恩超擢温州總兵任事未幾復奉恩綸調鎭黃巖疊莅海疆益虞隕越舉凡剔除弊端振刷營務悉與督提諸臣斟酌辦理不敢摭拾條陳上瀆天聽惟管見所及有關營伍巡防練習優恤事宜非䝉我皇上聖裁未能畫一謹攄愚忱敬爲皇上陳之一戰船之捕舵椗繚斗手什長宜分别軫恤也一沿海陸路官兵之宜練習水務也一戰船水兵之宜照額分補也一内洋船篷之宜變通也以上數條識慚蠡管語愧芻蕘如或臣言可採伏乞皇上睿鑒施行謹奏所奏四條交督臣李衞提臣陳天培會同詳議奏聞雍正七年九月二十四日浙江黃巖總兵官臣李燦謹奏爲海洋寧靖年歳豐登仰祈睿鑒事竊臣本年四月出洋巡歷所至海不揚波商漁樂業今當秋汛臣於八月往南北内外洋面親巡各汛官兵勤惰并遍歷島嶴有無宵小往來巡察仰賴皇上聖治𢎞敷海洋寧謐並無姦匪至臣所轄各協營台州府之臨海黃巖太平寧海天台仙居等縣寧波府之鄞縣慈谿奉化象山等縣地處山海士民皆以務農爲業早稻於七月初旬收割中稻於八月登場晚稻現在刈穫今歳自春至秋雨暘時若萬寶豐登收成實有十分白叟黃童咸歌大有此皆聖德涵濡上格天心是以降此豐稔臣際此海宇淸寧目覩人民懽樂深爲忻慶之至理合具摺奏聞伏乞皇上睿鑒謹奏覽奏海洋曁年歳情形朕懷深慰雍正九年四月初六日江南崇明總兵官臣李燦謹奏爲奏請諭旨事竊臣荷䝉聖恩調補崇明總兵官臣到任後凜遵訓旨不敢懈弛三月以來於淸查地方營伍戰船事務加意經理以期仰報皇恩於萬一伏查崇明四面環海爲全省之藩籬實水師之要衝現在臣屬各營遊擊守僃等員俱年力強壯辦事盡心惟於外洋船隻水務實少講究若有熟諳船務之人逐漸指點臣再不時教導將來自能通曉至於千把等官臣每於因公接見之時委婉詢問聽其所答之言皆非諳練實不如浙閩水師官兵之熟悉臣仰懇聖主天恩將浙江三鎭水師千把揀選四員與臣標千把對調俾隨船教習則崇明水師官兵漸次可期熟諳而臣實收臂指之效矣再兵丁在船演練首重火器查浙閩水師各營篷索之外又有藥械銀兩按年動撥公項支給專爲出洋修製器械配合火藥洗演戰船礮位之用是以各鎭官兵俱得就船時常演放緩急便利查江省止有篷索一項並無藥械銀兩雖據四營將僃稟稱自僃仍係有名無實臣又何敢隱諱不據實奏明今器械一項已䝉皇恩准給公糧以資修製而戰船洗放之火藥可否援照浙閩之例撥動公項每年按出洋船隻交給俾得洗演各礮以資利用實出聖主天恩非臣所敢擅請也爲此具摺奏聞伏乞皇上睿鑒施行謹奏所奏皆當言之督臣會商定議者雍正九年十月初一日江南崇明總兵官臣李燦謹奏爲海洋寧謐年歳豐登仰祈睿鑒事竊臣荷䝉皇上天恩調鎭崇明到任以來凜遵聖訓整頓營伍操練兵丁朝夕兢兢不敢怠逸每逢將僃千把出廵内外海洋臣必親赴各船點驗礮械扛具等項飭令加謹梭織遊廵不時督察以稽勤惰仰賴皇上政教𢎞敷德威遠播島嶼淸寧並無宵小濳踪來往商漁各安生理兹當九月底巡期巳滿外洋􅙔船循例撤回而内洋之沙船臣仍照例飭令僃弁往來哨巡不許少懈其内外各沙陸汛每當收穫之時臣俱撥僃弁分段遊巡地方俱各寧謐至於崇明本年夏秋以來雨暘時若所種禾稻木棉悉皆茂盛今巳刈穫收成實有九分黃童白叟共慶大有臣覩此豐稔景象不勝歡慶之至理合具摺奏聞謹奏覽今命爾署理浙江總督印務須當竭力黽勉諸凡加詳加愼毋得率意徑行以爲盡心效力也太過猶如不及酌中爲之事事遵守李衛之成規辦理不可另立意見而欲炫長邀美於巳勉之雍正九年十月二十八日江南崇明總兵官臣李燦謹奏爲微臣力小任大驚懼難安謹瀝下情叩請聖訓事竊臣荷䝉皇上洪恩著令暫署浙江總督印務接到部文感激惶悚無地自容當經繕疏恭謝天恩在案伏念臣一介武夫仰邀聖主逾格超擢授以崇明總兵官自惟粗魯之質膺此海洋重鎭巳覺竭蹶不遑時切惴惴今總督之任凡吏治民生之大綱選將練兵之要務一切經理調度所繫非輕臣何人斯敢當重寄伏承恩旨令督臣李衞詳加教導倣傚辦理但封疆機務均關重大臣識見淺陋豈能因此識彼推類而行措置一有失宜罪愆何以自逭聞命以來徬偟驚懼刻難自安現在遵旨於十月二十九日由崇明起程赴浙聽督臣李衞指授外仰懇皇上隆恩俯賜訓誨開導愚昧俾臣有所恪遵暫時黽勉供職或免貽誤感戴洪慈於生生世世矣爲此繕摺奏請聖訓伏乞皇上睿鑒謹奏一一遵循李衞之所指授竭力勉爲之爲時無幾不過數月之間耳雍正九年十二月初七日署理浙江總督印務崇明總兵官臣李燦謹奏爲恭繳硃批叩謝天恩并陳地方情形仰祈睿鑒事本年十一月初十日臣家人齎回臣恭奏崇明海洋寧謐年歳情形原摺一件欽奉硃批竊念臣以一介武夫叨䝉格外隆恩暫署浙江總督印務自問知識魯鈍何堪膺此重任感荷天語教誨諄諄惟當敬遵聖訓加詳加愼不敢率意孟浪妄立意見亦不敢推諉因循貽悞地方一切事宜俱照總督臣李衞之成規倣傚辦理竭盡愚誠以冀仰報高深於萬一所有原奉硃批奏摺理合恭繳臣於十一月十九日接印任事與文武各官照常辦理地方俱甚寧靜再查各場竈鹽旺產夏掣引目巳經溢額八萬道現今冬掣築運頗多將來配足正額之外大有贏溢臣已將杭所擇期開掣復親詣嘉所照例掣驗容俟四所掣畢之日將正餘各數另行具奏又准署撫臣王國棟咨准戸部咨文荷䝉皇恩俯念嘉興府屬之七縣并杭州府屬之海寧一縣田禾間有蟲傷特沛恩旨漕糧減價折徵署撫臣卽會同臣出示遍行曉諭宣布皇仁一面檄飭徵漕各員遵旨辦理再臣接據江南提標中軍㕘將黃欽揭報部科并江南督撫及臣署理衙門之文内稱松江城守營遊擊馬勇志因借鹽務經費銀兩不遂挾仇於伊叔新任署提督馬世龍到任之後唆聳陷害等情臣查閱揭文有前提督王紹緒動用各營馬匹草豆公糧截曠等項銀兩黃欽身任中軍不行阻止聽其私取厥咎難辭所揭馬勇志各條亦屬一面之詞未可遽信但馬勇志向日居官逢迎卑汚臣前在崇明時巳有所聞今彼此互訐應聽兩江督臣查明題㕘續又准署理江南提臣馬世龍移送會稿以中軍㕘將黃欽營私科派侵蝕營中公銀等情會疏糾㕘各到臣臣因督臣李衞䝉皇上交辦下江督捕事務原有考覈軍政之責且所揭欵内渉有兩浙鹽務經費之事今臣䝉恩暫署接辦不敢隱匿相應一併陳明伏乞皇上睿鑒施行謹奏所奏知道了下江事務汝可不必兼管雍正十年正月二十四日署理浙江總督印務崇明總兵官臣李燦謹奏爲恭繳硃批叩謝天恩事雍正九年十二月初七日臣家人捧回臣恭請聖訓一摺奉有硃批本年正月十三日又據臣家人捧回臣恭繳御批并陳地方情形一摺奉有硃批伏念臣才識魯鈍荷䝉皇上隆恩著臣署理浙江總督印務兼管鹽政捕盜幅員遼濶心力難周任事以來實深悚懼仰沐聖恩諄諄訓誨更荷皇上格外矜全諭臣不必兼管下江事務臣謹欽遵諭旨將一切浙省督鹽事務效法李衞竭蹶辦理以冀仰報隆恩於萬一耳所有原奉硃批奏摺理合恭繳伏乞皇上睿鑒謹奏覽切以粗率輕浮爲戒凡百敬愼持重爲之勇敢任事固屬可取然須看得透認得眞始宜見諸施行非可從外像孟浪效法者於此當詳審毋忽雍正十年三月初三日署理浙江總督印務崇明總兵官臣李燦謹奏爲恭謝聖訓事竊臣於雍正十年二月十八日接督臣李衞來札内開雍正十年二月初一日面奉上諭杭州各官正月初一日拜牌時向例鋪氊三條署總督李燦因王國棟退縮在二班地上行禮李燦卽親提氊子轉身遞與王國棟接取朝賀有關大典二人甚屬失體孫國璽在旁不敢入班且聞李燦署總督印務以來諸事急遽無序舉動多有未協之處王國棟軟弱游移可寄信去著實嚴加申飭欽此遵旨寄信前來等因到臣臣跪讀諭旨悚惶無地感激難名臣於正月初一日朝賀之後遵照向例恭詣聖因寺叩拜聖祖仁皇帝龍牌時冒昧失體咎實難辭至於署理督篆辦理一切事務未能從容展布以致急遽無序舉動多有未協之處今䝉天恩浩蕩不加重譴命督臣李衞傳旨嚴加申飭聖德彌宏臣心益懼惟有凜遵聖訓改革前非時時警惕朝夕不忘嗣後辦理舉動愈加詳愼以冀仰報高深於萬一耳爲此繕摺恭謝聖訓伏乞皇上睿鑒謹奏據奏警惕改革等語能改甚善但恐秉性難移耳雍正十年八月二十一日署理浙江總督印務崇明總兵官臣李燦謹奏爲奏明撥發義倉米石賑恤蕩竈仰祈睿鑒事竊臣前據江南松江管理下沙頭二三場靑村場各場員稟報七月十六日陡遇風潮沿海居民竈戸房屋竈舍衝壞人民溺斃等情臣卽檄行鹽道動支鹽務僃公銀兩委員分往各場查勘酌量軫恤當經具摺奏聞仍一面飭令確查去後續據松江府南滙奉賢二縣曁各場員具報蕩戸被颶風潮湧淹没人口坍塌房屋田禾俱被浸壞等情前來伏思煎竈人等臣已動僃公銀兩先爲軫恤并借給帑本修理竈舍僃辦煎鹽以濟冬掣至於蕩戸亦被潮災收成失望口食無資亟當一體矜恤查江省督撫二臣現在委員勘賑但念此蕩戸人等雖屬江省人民現納浙江場課臣何敢以奉有仍回崇明之恩命交代在邇觀望貽悞今臣巳飭令鹽道撥動鹽義倉米三千五百石飛委嘉松分司運往各場會同各該縣查明被災戸口一體酌量賑給務使實在窮丁咸沾惠澤如有不敷再行續發俾此沿海被災煎竈蕩戸人等餬口有資不致流離失所以副聖主軫恤災黎之至意爲此繕摺奏明伏乞皇上睿鑒謹奏浙省種種災異蓋緣汝與王國棟皆係薄福小人見責於天之所致汝等猶不自省自愧耶硃批諭旨巻九十三
