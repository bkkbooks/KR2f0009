body:
  text: 欽定四庫全書硃批諭旨卷一百二十七硃批高其位奏摺雍正元年四月二十七日江南提督臣髙其位謹奏為恭請聖安仰慰睿懷事欽惟我皇上純孝性成哀思篤切自聖祖仁皇帝龍馭上賓歷今五月皇上撫時悲慟感物傷懷愈久彌殷追慕無極亙古帝王之大孝未有如我皇上之肫誠篤摯者也臣前在京跪送梓宫起行時伏見皇上扶行哀號悲慟不自知慘怛之至亦頓忘聖體之勞臣即奉命南旋北望淚零五內摧裂伏思聖祖仁皇帝臨御六十餘年深仁厚澤普被萬方我皇上以聖明仁孝治天下承億萬世之丕基薄海遐荒罔不瞻天仰聖在我皇上之孝思不匱原無盡時惟念宗廟社稷所憑依四海臣民之仰戴恭懇少紓哀痛保護聖躬以仰慰聖祖在天之靈永垂萬世無疆之治天下臣民幸甚為此具摺謹奏覽高其位此奏字句之外實有一片愛君之心發乎至誠非泛泛虛文可比朕觀之不覺淚落該部傳諭嘉奬之以表其誠雍正元年六月二十五日江南提督臣髙其位謹奏為遵旨據實陳奏恭繳硃批奏摺事竊臣欽奉諭旨查江南米價時值青黃不接之際目下稍昻每石一兩一二錢不等自春至夏四五月雨水充足至六月中旬雨澤未降臣親率文武官員齋戒設壇祈禱于二十四日甘霖大沛田禾茂發謹先據實奏聞又接署撫臣何天培遵旨以海口各處墩臺炮臺修整密行知會到臣臣已不時嚴飭營員照例移催地方文職勉力修整在案聖懷又松境􅍩澱二湖接連太湖為匪類出沒之所今臣添設巡船十隻挑選幹辨帶兵防緝更換輪巡地方幸得寧靖合併奏聞伏祈睿鑒謹奏所奏知道了雍正元年七月初三日江南提督臣高其位謹奏為請旨事竊臣接到部文臣標中軍參將張君烈已蒙特旨補放山東沂州副將臣查中軍員缺例應題補今選得劉河營遊擊鄧良臣堪以補放至劉河營遊擊員缺亦係例應題補今選得臣標前營中軍守備金騰鳯堪以補放至臣標前營中軍守備員缺亦係例應題補今選得臣標前營千總賀升堪以補放第查遊擊鄧良臣係署都司僉書管遊擊事守備金騰鳯係署守備管守備事銜缺俱不相當守備員缺現有部發年滿千總奉旨令督臣撫臣考驗補授臣皆不敢違例遽行具疏題補但為地方需才起見相應瀝情繕摺請旨謹奏照依此摺具本題奏將不合例緣由本內聲明可也雍正二年二月二十一日江南提督臣高其位謹奏為奏聞事竊浙省緣舊嵗歉收時有飢民乏食負販私鹽濳入江境百姓貪其賤價羣相聚買臣恐日聚日多致生事端即遣將辨率兵協同地方官捕曉諭驅逐旋經四散回籍但今二麥未熟猶恐窮民貪利或為姦梟地棍煽惑難保其不復來境臣又移咨浙省撫臣提臣加意撫綏查禁並會同督臣查弼納署撫臣何天培協拏窩梟地棍以絶根株合將驅捕鹽徒情形恭摺奏聞謹奏覽奏已悉如此會同料理甚是據查弼納亦經奏過與爾意見相同雍正二年三月十八日江南提督臣高其位謹奏為奏聞事竊臣於本年三月初三日自松起程前赴沿海查閲水師操練以及炮臺墩臺官兵瞭巡勤惰并太湖􅍩澱諸河防範疏密隨看經過營汛兵馬事竣抵松經臣先後恭疏題報外其江浙分屬之􅍩河澱河澄河港汊叢雜洵屬姦宄易滋之地目今太湖現奉諭旨業經會同督撫臣公同確議稽查防範之法會題在案若􅍩澱諸湖亦與太湖毗連界沿兩省預籌防禦之法前經兩省督撫臣暨臣會委文武查勘其間支河汊港繁多計松江府所屬者一百一十浙省撫臣飭行所屬將支河汊港照此一例堵築以杜姦宄出沒之路計臣所歷由海口以及內湖約經千里苐見雨㿩時若麥豆向榮米價平減兵民樂業臣不勝慶幸之至合併奏聞謹奏覽雨水米價情形深慰朕懷揆厥所由緣爾等文武和衷實力奉公能令兵民心志舒暢有以感召天和之所致也勉之雍正二年六月初十日江南提督臣高其位謹奏為恭請聖安事竊查今年四月下旬海潮溢入蘇松內河臣親加查訪海塘岸址依然無恙蚤發之秧偶有損傷幸閏四月芒種節前後連得大雨水淡如故秧苗茂發插蒔及時再今嵗當二麥已收秧苗未插之時上江廬州池州下江揚州鎮江等處間有蝗蝻生發遍行竭力撲捕突於閏四月二十七日有飛蝗大陳過松江府之神山忽然雷電大作土人見烏鴉千萬成羣啄食飛蝗一時盡滅無遺禾苗毫無損傷目今田禾茂盛若六七月內再得甘雨可望十分收成目下米價上白每石一兩二錢四五分不等次白一兩一錢五六分不等再者太湖港瀆應否釘築之處臣現會督撫臣確議奏覆所有應添兵丁五百名臣稔悉江南形勢在在汛廣兵單不敷防禦今酌量自提鎮以至千把捐抽隨丁以足五百名之數臣亦現在咨會督臣查弼納酌核具奏合併奏明伏乞睿鑒謹奏覽奏禾苗茂盛大慰朕懷但諸如此等之奏務須據實若涉絲毫粉飾則為欺誑也切記切記雍正二年七月二十五日江南提督臣高其位謹奏為奏聞事竊臣據濵海各營報稱七月十八十九兩日晝夜狂風驟雨海潮飛湧漫溢塘堤進內四五里沿邊護堤衝汨殘缺甚多民人皆避登高阜其有黑夜不及走避者即遭沉溺室廬六畜亦多漂沒幸塘外海潮旋退而塘內之水從支河小港泄於黃浦吳淞二江近塘之禾豆木棉漸經涸出雖為鹹水浸漬尚有一半生機內南滙川沙二處比他處被傷較甚至崇明一邑四面皆海被傷尤甚土人名曰海嘯臣即星差各營將辨四出遍行查勘一面飛咨督撫臣安輯被災黎民不致失所并檄飭松江府迅往查勘并將衝缺要口星飛搶築外臣今現在清查海塘殘壞處所及沿邊炮臺墩臺𤇺寨營房等項均關係地方民生並移會督撫臣作速檄飭有司設法漸次修整完固叧行具奏合將海溢情形據實奏聞謹奏知道了據查弼納何天培陳天培俱奏過矣海嘯為災甚屬迅猛居民走避不及被傷必重爾等當加意撫安地方為要雍正二年八月二十六日江南提督臣高其位謹奏為請旨事竊照江南金山營參將鄧良臣欽奉俞旨準補京口水師副將所遺金山營參將一缺係應行題補地方且金山營逼臨大海係江浙之首衝最為險要參將一缺非得熟諳邊海人員不足以資彈壓今臣看得臣標左營遊擊侯宗周蘇松水師鎮標中軍遊擊冉起鳯二員現經督臣欽奉上諭會同臣保題引見在案查該員等操守清潔訓練勤謹均堪選補金山營參將第侯宗周係署都司僉書管遊擊事冉起鳯係守備管遊擊事銜缺各不相當臣是以未敢擅會督臣具題臣為地方需才起見理合繕摺請旨伏乞睿鑒謹奏知道了侯宗周冉起鳯到京引見時候朕另有諭旨同日又奏為恭謝天恩事竊臣齎摺把總回松恭捧賜臣御書聖製七言律詩金扇一柄到臣臣隨出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖臣前奏摺奉有皇上硃批覽奏禾苗茂盛大慰朕懷但諸如此等之奏務須據實若涉絲毫粉飾則為欺誑也切記切記欽此臣跪讀之下不勝戰栗臣本一介微賤叨沐聖祖仁皇帝暨我聖主豢養之恩由京職洊歷外任已經五十餘年自愧毫無報效惟恃此區區血誠以仰答洪恩斷不敢以地方無據之事妄陳於君父之前况逢聖主明同日月臣何敢有絲毫粉飾上負國恩以貽罪戾今蒙皇上諄切告誡臣惟益勵精忠愈矢誠實以仰副切記之恩旨為此繕摺謹奏朕前諭爾據實直陳毋涉粉飾者蓋指奏報收成分數而言非有他意也雍正二年九月二十四日江南提督臣高其位謹奏為奏聞事竊照江南省今嵗收成除沿海沿江風潮處所應聼督撫臣確勘分數奏報外今臣通查上下江合計各府州收成實有六分七分之數所有米價目今上白米每石一兩三錢二三分次白米每石一兩二錢四五分理合據實奏聞謹奏據奏已悉米價目下如此恐至來春更昻地方被災雖經賑恤但一切防禦刻不可忽亟當嚴飭屬員緝訪匪類不時稽查至於沿海一帶關隘炮臺尤宜上緊修整勉之勿懈雍正二年十月初九日江南提督臣高其位謹奏為奏聞事竊臣據臣標黃浦水師營守僃盛天福呈送玉印一顆蘷龍雙鈕據稱民人何生於黃浦地方遇漁人捕網得之海邊出錢二百文買歸洗滌沙泥知為玉印不敢私藏投送守偹轉送臣衙門臣隨細詢買獲民人委係得之海邊漁人不知姓名出錢買回原無篆刻臣發銀賞給外理合恭摺奏進伏乞聖主睿鑒謹奏此事若出自他人非卿奏聞朕不信也卿乃忠信老成封疆大臣斷不至有捏造虛誕之舉以阿諛取容此或神明表卿敬君愛國之心所以於卿統轄地方昭錫嘉瑞今賜卿數物以示朕欣喜之意雍正二年十月二十八日江南提督臣高其位謹奏為請旨事竊臣前奏金山營參將員缺將臣標左營遊擊侯宗周蘇松水師鎮標中軍遊擊冉起鳯均堪選補因銜缺未符經臣恭摺請旨兹蒙皇上硃批欽此欽遵臣會同督臣撫臣繕疏具題給文侯宗周冉起鳯赴部引見仰祈天恩或於此二人中揀選一人補放金山營參將抑或於記名人員內揀選補用惟候敕旨遵行臣謹恭摺奏明謹奏朕觀冉起鳯為人老成侯宗周過於機巧此等質性不宜於武職大員當留心用之雍正二年十二月初四日江南提督臣高其位謹奏為恭謝天恩事竊臣齎摺家人回松恭捧皇上特賜微臣四團龍補褂蟒袍一襲人參九斤貂皮九十張臣恭設香案望闕叩頭謝恩祗領訖伏念臣本一介庸愚深沐聖朝知遇未報涓埃兹復恭膺殊寵實屬千載非常之榮臣惟有竭盡愚忱矢心精白聖明睿照臣當即知會督撫臣酌平市價以舒民困至臣勘委文員作速修整在冬杪春初可以告竣合併奏聞謹奏關隘炮臺巡防攸賴修整速竣甚好雍正三年正月二十六日江南提督臣高其位謹奏為叩謝聖恩仰祈睿鑒事竊臣齎摺家人回松蒙皇上將江蘇布政使鄂爾泰奏摺發臣閲看臣跪讀硃批諭旨不勝惶悚俯伏涕零緣康熙六十一年八月臣奉聖祖仁皇帝特旨署理兩江總督印務時因江寧將軍嶽吉納移咨修葺江省城垣江蘇布政使李世仁安徽布政使李馥會議詳請暫動庫帑估修即以各官俸工抵補係屬江南舊例臣隨循例允議興修值督臣查弼納到任臣即交印卸事恭逢聖主登極奉恩旨免捐各官俸工其時李馥升任浙撫已將城工一項照分彌補而李世仁則列入虧空案矣臣署督篆未及四月日矢氷兢惟此城工一項係臣經手之事國帑所係分賠亦臣分所宜臣何敢辨今蒙聖主格外加恩如此深重實覺夢寐難安臣恨年老力衰不能為我皇上出力報效惟有任一日之職盡臣一日之心竭臣一日之精神辦國家一日之公事以仰酬高厚之恩於萬一耳為此繕摺恭謝謹奏朕觀爾尚未衰老似爾如此大臣便間住任所亦可為朕坐鎮封疆勉為之但防屬員欺隱之弊要緊雍正三年四月二十四日江南提督臣高其位謹奏為恭謝天恩事竊臣齎摺千總回松恭捧皇上欽頒摺匣四箇到臣臣隨望闕叩頭謝恩祗領訖再照蘇松沿海一帶上年潮患歉收蒙聖主軫念飢黎邊海皆經設厰賑粥又得平糶米麥接濟萬民得所莫不歡呼且自春入夏雨水調和二麥豐茂現在收割今又蒙聖主減免蘇松二府浮糧四十五萬兩并租田耕種之窮民荷蒙聖恩敕議減租此誠數百年來希遇之曠典惟見黃童白叟士農工賈莫不衢歌巷舞歡聲如雷以仰頌聖天子萬夀無疆目今米價上白每石一兩三錢二三分次白一兩二錢三四分理合一併奏聞謹奏覽爾諸弟內高其倬頗好當奬勸之令其加勉惟高其佩甚屬卑汚鄙賤日以逢迎年羮堯為事亟宜再三訓飭令其悛改雍正三年六月二十二日江南提督臣高其位謹奏為恭謝天恩事竊臣齎摺家人回松蒙皇恩頒賜錠子藥及扇墜到臣臣隨跪迎進署恭設香案望闕叩頭謝恩祗領訖伏讀硃批諭旨臣不勝悚惕惶懼伏念臣弟雲貴總督臣高其倬荷蒙天語褒嘉恩榮莫並臣謹遵旨馳寄家信赴滇宣逹聖主之殊施朂其始終不渝仰答高厚臣弟正紅旗漢軍都統兼刑部侍郎臣高其佩卑汚鄙賤逢迎年羮堯之處蒙聖恩洞鑒不加罪譴諭臣訓飭臣不禁警惕汗流臣思欺君負國如年羮堯誠為當世之罪人凡屬臣王俱當痛以為戒臣即欽遵恩旨星寄家書嚴加訓飭令其洗滌肺腸痛自刻責務與年羮堯絶交俾得悔罪更新以勵臣節仰副聖主矜全訓誨之洪慈為此繕摺奏謝謹奏如年羮堯負心背恩欺君辱國之人當發願世世不與為同類豈僅絶交遂可為悔罪更新之道乎雍正三年九月初四日江南提督臣高其位謹奏為恭謝天恩事竊臣齎摺家人回松恭捧皇上賜臣荔支一瓶到臣臣隨出郊跪迎至署望闕叩頭謝恩祗受謹繕摺恭謝天恩臣更有奏者臣於雍正元年陛見時曽以臣年衰老懇請聖主㨂選賢員補授臣標中軍參將協助辦理荷蒙聖恩以臣保舉之右營遊擊吳進義特擢中軍參將交臣試用及今三載吳進義辦事明敏諸務勤謹訓練有方寬嚴得當實於營伍地方有益今臣蒙聖恩內召而吳進義係奉旨交臣試用之人洵屬能員臣謹據實奏覆伏乞睿鑒謹奏覽卿奏謝知道了吳進義之優處卿於到京之日面奏可也雍正三年九月二十四日江南提督臣高其位謹奏為奏聞事竊臣通查上下江各府州所屬收成分數自十分九分以至八分七分六分不等雖有多寡不同但被水受旱之處止有睢寧宿遷江都寶應興化山陽清河沛縣旌德太平儀徴泗州盱眙等州縣而內中受傷者亦不過幾處鄉村統計通省實多豐熟是以現今米價已減若至十月米糧盛出米價定當再減草野咸歌樂利海疆悉頌休和為此繕摺據實奏聞謹奏覽奏深慰朕懷總賴聖祖在天之靈默為佑庇也雍正三年十一月二十九日太子少傅內閣大學士暫理江南提督事務臣高其位謹奏為恭謝天恩事竊臣於雍正三年十一月初十日接臣孫高琦家信報稱九月內奉旨高其位著補授文淵閣大學士兼禮部尚書臣隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚毫無知識荷蒙聖恩特授樞機重任緣遵旨候新調提臣魏經國到松交印是以未得趨赴闕廷仰覲天顔乃蒙皇上天恩高厚授臣為文淵閣大學士兼禮部尚書臣何人斯仰蒙聖恩有加無已臣即鞠躬盡瘁亦何能報稱於萬一今計奉旨兩月有餘微臣感激之私不忘寤寐祗以部文未到不敢違例具本又不敢以未接部文而稽延謝恩之微悃臣心歉仄難安謹繕摺恭謝天恩伏乞睿鑒謹奏周瑛已從塞外抵川赴任矣卿來京見朕指日可期硃批諭旨卷一百二十七
