body:
  text: 欽定四庫全書硃批諭㫖卷一百三十硃批陳天培奏摺雍正二年六月初一日江南崇明水師總兵官臣陳天培謹奏為聖治彌隆海疆寧謐事竊臣於二月初一日帶領官兵駕船出洋巡哨五月以來風恬浪靜盜息民安商漁船隻往返游行毫無阻礙臣身任封疆覩此升平之象不勝踴躍歡忭為此繕摺奏聞謹奏知道了勉力做好官以副朕委任之意雍正二年七月二十二日江南崇明水師總兵官臣陳天培謹奏為海潮泛溢田地被淹事竊查七月十八日夜天降大雨陡起颶風海潮湧溢崇明闔邑田地盡被水淹海邊居民房舍多被漂沒內地屋宇幸保無虞其風勢至二十日稍緩潮水漸退崇明城內水深四五尺不等臣督令文武屬員晝夜防護仰賴弼納署撫臣何天培聼候委員查勘設法賑濟外所有被災情形理合繕摺奏聞謹奏所奏巳悉據督臣查弼納奏到已有㫖矣雍正三年六月初一日江南崇明水師總兵官臣陳天培謹奏為恭謝天恩事竊臣齎摺千總捧回欽賜福字到崇臣郊迎至署恭設香案望闕叩頭謝恩祇領訖伏念臣身任封疆寸長未效荷䝉天貺頻加宸章寵錫循分思省彌切慚惶惟有矢竭駑駘益勵職守以仰報髙深於萬一耳為此繕摺恭謝天恩謹奏知道了爾之整飭營伍實心盡職處朕皆悉知惟操守一節輿論不一其加勉毋忽雍正四年六月初二日江南崇明水師總兵官臣陳天培謹奏為奏聞事竊臣於二月初一日帶領官兵駕船出洋往返遊巡仰賴我皇上恩威逺播風恬浪靜宵小潛踪至於崇明地方雨𤾉時若二麥豐登咸頌一人有慶羣歌萬夀無疆臣目擊輿情歡恱不勝欣忭理合繕摺奏聞謹奏據奏崇邑豐收洵所謂否極泰來也當加意撫恤兵民勉之更勉雍正五年六月初二日江南崇明水師總兵官臣陳天培謹奏為奏聞事竊臣於二月初一日帶領官兵駕船出洋遊巡五月以來海疆寧謐商賈無虞至於崇明地方二麥豐收萬民樂業皆由我皇上仁德覃敷之所致也理合繕摺奏聞謹奏覽奏朕深為慰恱但當安益求安勉盡職守不可稍有肆志也雍正五年十二月初二日江南崇明水師總兵官臣陳天培謹奏為恭繳硃批諭㫖事竊臣荷䝉皇上欽賜御書魏徵十思疏又䝉恩賞福字業經具摺恭謝天恩所有春哨地方情形亦經具摺奏聞俱䝉皇上硃批到臣臣隨即恭設香案叩頭祇領訖理合將奉到硃批繕摺恭繳謹奏覽朕欲擢用爾為浙江提督但崇明一鎮甚屬緊要尚在未定若一得人即命爾往浙爾此任甚好至新任時全省所繫綦重當更加十分勉力也雍正六年四月十八日浙江提督臣陳天培謹奏為奏明事竊臣䝉皇上隆恩補授浙江提督到任後查看五營兵丁其人材雖多少壯然弓箭鳥鎗藤牌等技盡屬生疏演列陳勢亦未純熟臣現在立限教演務期精鋭惟有營中馬匹率皆疲瘦不堪難以差操其缺額者一時驟難買補臣細訪其由皆緣藩庫內官朋銀兩不肯預為支借而調任提臣石雲倬又過於拘謹不肯向布政司商借朋銀差員赴張家口採買惟遵隨倒隨補之例零星領出朋銀在杭州買補殊不知杭州非産馬之地買回者皆退槽勞傷馬匹疲瘦不堪且又易於倒斃臣愚請於每年五月終向藩庫借出本年應領朋銀差員赴張家口買馬回營分給兵丁不獨營中皆有好馬差操而藩庫亦無虧損一轉移間則於營伍大有裨益矣是否可行伏乞皇上批示以便欽遵謹奏南方馬匹原係難處之事與督臣商酌而行同日又奏為微臣親查營汛以勵官兵以整戎行事竊臣䝉我皇上補授浙江提督任大責重時慮隕越伏念浙江地方山海交錯若非親歷其境則山川形勢之險易終屬懸揣全省屬員之賢否不能遍知臣愚以為必得親自巡查庶將辨之賢不肖方能盡悉且灼知山川形勢之險易設防安汛似可布置合宜伏乞皇上御批准行臣即當不時輕裝減從詳加查閲務使戎行整飭萬姓安寧以仰酬聖恩於萬一理合繕摺具奏伏乞皇上睿鑒施行謹奏諸務與督臣會商而行如應具題即具本題明可也同日又奏為恭懇聖恩准調能員以資任用事伏念臣本才識短淺今當提督重任經理浙江全省地方必得才具優長之員委任助理庶可漸收實效臣查江南崇明鎮標右營遊擊顧金䇿竒營守備邵廷瑞左營千總吳恱江南提標右營遊擊葛世雄松江城守營把總王三元湖廣鎮筸鎮標右營遊擊王進昌此六員者臣盡知其素行兼悉所長伏乞皇上准臣調來浙省遇缺補用一轉移間於地方營伍大有裨益矣仰懇皇上批示以便欽遵謹奏隔省調員不可何營非要地何省不需好員若陸路之辨員有識水性者調補水師尚可亦與督臣商定會題雍正六年四月二十六日浙江提督臣陳天培謹奏為奏明事竊臣於本年四月二十三日准福建提臣石雲倬密書一封內單一紙將伊浙提任內奏摺三件并欽奉硃批諭㫖等因抄録到臣臣查所奏浙省各鎮營環山抱海應須親歷其境方可因地制宜一事臣於未准密書之前已具摺奏請親查惟候諭㫖欽遵至於處州鎮臣王安國奏明四季遊巡一事督臣李衛曾議及恐纍鄉民此語雖甚得情然屬員難以輕信據臣管見不必拘定四季莫如輕裝不時巡查之為便也又查先發隨糧等事案內浙屬各營已造之軍裝甲械經調任提臣石雲倬親驗之後又送督撫衙門驗過若再行調驗反覺煩擾惟俟我皇上准臣親查營汛之時就近點驗似覺妥便其接造之甲械容臣陸續驗明之後自當仍送督臣查驗至於各營公糧冊籍現在催取尚未報齊一俟催齊即當按營確查繕具密摺奏聞為此繕摺謹奏實力敬慎為之可也凡料理一切事務不必要見已長只秉公盡力辦去辦理合宜長在其中矣從來一動不如一靜過猶不及更改損益皆出於不得巳補偏救弊之術但毋致因循廢弛可耳若無事尋事反為不美矣勉之雍正六年六月二十九日浙江提督臣陳天培謹奏為恭謝天恩事竊臣齎摺把總恭捧欽賜孔雀翎緯帽一頂紫金錠藥一匣到寧臣隨郊迎至署望闕叩頭謝恩祇受訖伏念臣猥以庸劣菲材屢沐皇仁不啻如天覆冒兹復䝉寵賚稠疊天恩有加無已臣惟有頂戴皇仁廣敷聖澤以期仰報髙厚於萬一耳理合繕摺恭謝天恩謹奏覽將一切私腸屏除淨盡惟存一公字而誠以行之何事不可辦集耶竭力勉之同日又奏為敬陳管見仰祈睿鑒事一領支兵餉之宜變通也臣查浙省兵餉向例俱係藩庫行府於各屬地丁銀內就近兌支逐月給兵自原任福浙督臣梁鼐題請改歸司庫著為定例欽遵在案自此通省兵餉俱於季中盡赴司庫支領竊思前督臣梁鼐所題實緣坐縣兌餉耗羡不能歸於藩庫之故今臣查浙省十一府除杭州府附郭不議外其嘉湖嚴紹金衢六府亦離省相近惟寧台溫處四府其間距省窵逺水陸夫船腳價悉屬營員捐用臣愚以為不若仍歸各縣解府銀兩有一定之火耗臣請各縣於支給兵餉若干之中有應解之耗銀若干仍照例扣解則於藩庫皇仁於不朽矣一浙省郡縣河道亟宜疏濬也臣查浙江十一府惟杭嘉湖三屬之河道淤塞者荷䝉皇恩現在開濬其嚴金衢處四府多屬溪河其雨澤之多寡惟聼諸天原非人力所能蓄泄者至如寧紹台溫四府內除紹郡之蕭山山隂會稽三縣河港繁多間有淺處其寧台溫三府負山濵海河道無多有河處所全在平時蓄水庶可禦旱無如紹屬之上虞餘姚二縣河道甚屬淺窄寧波一府河道亦屬淺窄并多淤塞是以今嵗自五月初旬大雨之後逮至月終不過二十餘日天未降雨四鄉農民輒以亢旱紛紛見告揆厥所由皆緣水利不舉之故伏乞泄使浙省農民永沾水利則我皇上之深仁厚澤昭垂於萬萬世矣理合繕摺陳明伏乞睿鑒施行謹奏覽雍正六年九月十三日浙江提督臣陳天培謹奏為奏明收過公糧製辦軍械總數仰祈睿鑒事竊臣於雍正六年三月十九日到浙任事於五月二十四日接准浙江督臣李衛咨為公糧之奏定巳久收用之確數宜清等事內開准前任提督石雲倬咨開各標鎮協營公糧製造軍械應於年底彚核奏報因奉命調繁已將稽查不及緣由并浙省現造甲械旗幟約略彚敘奏明祈飭各營查造細册通送察考等因前來查通省現造旗幟甲械奏報之後續又造完何項旗甲若干并開銷料價銀數若干之處應需彚報今准調任提督石雲倬知會此案摺奏緣由又經奉㫖交與提督在案擬合咨明應聼貴衙門主稿奏報并准調任提督石雲倬知會遵㫖交臣接辦等因各到臣准此臣接任以來陸續查據各鎮標協營將收過公糧細數及新造修整過軍裝甲械料價數目册報前來合計通省自雍正五年四月分起至六年二月止先後收過公糧及公糧一時未足各官捐墊隨丁餉銀糧米共銀一萬三千二百一十兩零所有新造修整過軍裝各項通共用過銀一萬五千八百六兩零將收存銀米抵用外實透用銀二千五百九十六兩零即將雍正六年三月以後所收公糧銀米抵項臣於八月內已將通省各營册檔敘為總册移送督臣會核續准督臣咨稱覆核相符等因到臣除將自臣到任起至年底止續收續造各項容臣於下年接續奏報外理合將調任提臣石雲倬任內修製軍械數目先行奏明伏乞睿鑒謹奏此奏殊屬庸愚不達亦可謂不體朕之至朕日理萬幾何暇覽爾營伍細帳況將該督咨文盡敘入奏中亦甚失體爾自蒞任提督以來覺有張皇失措光景前諭甚明何不聼受遵奉乃事事欲自立主見動輒煩瀆朕聼觀爾必與督臣不協欲借曾經奏聞四字以相要挾之意若果存此見爾則大謬矣雍正七年六月初九日浙江提督臣陳天培謹奏為選補能員以資整頓事竊照寧海營參將袁漢左營守備王仲廢弛營伍經督臣李衛會疏題參奉㫖革職在案臣查寧海地方山海交錯且該營前既廢弛必須精明强幹之員庶足膺此職任遍查浙省遊擊內能勝此任者實少商諸督臣李衛選有江南提標右營遊擊葛世雄操兵緝盜頗稱嚴肅堪膺寧海參將之任第李衛正報丁艱不及具題臣又無隔省題補之例謹先行具摺奏明其遊擊葛世雄應否題補寧海營參將員缺伏乞皇上批示以便欽遵再有寧海左營守備一缺臣並查有奉命來浙之候補守備倪存質徐良棟仰懇我皇上欽點一員補授俾之協辦營務庶臣得收臂指之效矣理合一併具摺奏聞伏乞皇上睿鑒施行謹奏寧海參將例應部推之缺況爾奏巳遲業經補授有人矣至倪存質等二人理應題補者何必又多此一番瀆奏耶硃批諭㫖卷一百三十
