body:
  text: 欽定四庫全書硃批諭㫖卷一百七十九硃批朱杰奏摺雍正六年六月二十一日福建汀州總兵官臣朱杰謹奏為奏聞事竊臣叨沐皇上格外殊恩擢用今職履任以來日切冰兢恆虞隕越惟時飭晝夜巡防消弭姦宄文武和衷地方寧謐以仰副皇上宵旰勤勞之至治今春雨𤾉時若農務耕種入夏又風調雨順秋成豐稔第汀州一郡地處巖谷之中山多田少素非産米之區惟藉江右挑販接濟若江右獲遇豐年則汀郡竝受其福臣自上年九月抵任迄今數月以來白米價值每石一兩一錢麥每百斤價值一兩三錢户慶盈寧兵民樂業理合繕摺奏聞伏乞皇上睿鑒謹奏據奏汀郡山多田少素非産米之區惟藉江右挑販接濟等語如今嵗江右之收穫即不為豐稔可奈何大凡本土不敷所食而藉他處以為接濟者皆緣百姓不肯服勤務本未盡地力之所致耳若果山不可耕居民亦必稀少斯人斯土未有盡地力而不敷食用之理當勸諭兵民務農敦本毋循舊染怠惰之習竟以為分應如是也將朕此諭亦通知有司各官令其領悉汀州一鎮緣陳有功罪魁久任十八年以致廢弛不堪大扺兵丁老弱隊伍不齊盔甲器械敝毁鏽壞陳祖訓接任後又復因循未理至初有德署事力為整飭方少有可觀朕之所聞營伍情形如是果不謬否汝承此敝壞之後當倍加心力整頓萬不可茍且塞責况今廢弛日久甲胄器械縱需費用猶易料理至於兵丁必皆偷安習懶荒怠性成若不大費一番精神教導訓練何能改絃易轍倘或以咎在前人於已無涉而推諉膜視則罪更勝於陳有功也勉為之此等處因汝竝未奏及朕疑有隱匿瞻顧情景所以諄切降諭汝意豈欲效法陳有功之故步耶同日又奏為微臣教子不嚴瀝陳請罪仰祈睿鑒事竊臣猥以庸愚荷䝉皇上隆恩兩畀封疆重任而臣子朱常表於雍正四年十月十八日以廕生改武䝉皇恩賞賜藍翎粘桿行走是臣一門父子均受天高地厚之深恩雖捐糜頂踵不足報稱萬一乃本年五月二十三日臣子朱常表回抵臣署具陳於雍正五年十二月二十六日粘桿大人帶領引見以差使懶惰奉㫖革退於本年正月自京起身因憂悸患病一路耽延至今未愈臣聞不勝悚栗痛加懲戒泣思臣受國家殊恩豢養四十餘年雖不敢謂奉職無愆竝不敢少有懶惰而臣子朱常表乃不肖若是良由臣教子不嚴以致隕越罪何可逭理合即時具摺請罪緣臣恭請陛見伏候敕㫖兹於六月十八日䝉兵部劄行到臣奉㫖朱杰不必來京陛見該部知道欽此臣隨望闕叩頭欽遵外惟有竭盡駑駘保固地方和輯兵民以仰報皇恩於萬一耳抑臣竊有冒請者臣子朱常表初得奔走闕下冀稍成立以圖報效今在臣署容臣著實教訓鞭䇿勉其成人倘邀皇上宥過之仁豫以自新之路發在苦差行走練習勤謹皆出自特恩殊典格外栽培臣一片愚誠罔識忌諱不勝激切待命之至謹奏子弟之賢與不肖何能強其必然為父兄者只可盡其在巳之道汝此子甚屬平常似非教訓鞭䇿所堪造就者朕每於督撫提鎮之子姪中擇其可望成立者留京教導以為將來任使之用耳其如朽木糞土何八旗行走苦差之人頗不難得奚用汝等子姪充數強留之或恐反纍及汝等朕深知無益所以將難望成立之輩悉皆發回也雍正六年十月初二日福建汀州總兵官臣朱杰謹奏為遵㫖奏聞事雍正六年九月十九日臣家人齎摺回汀恭捧硃批諭㫖臣恭設香案望闕叩頭謝恩訖伏讀聖諭臣遵即將㫖意通知汀州府屬有司官勸諭兵民務農敦本盡地力以敷食用不可因循舊染惰習仰藉他省之接濟除實力奉行外臣查得汀郡本年入秋得雨晚禾有九分收成豆麥較上年有十分收成民人樂業地方寧謐伏乞睿鑒至於汀州營伍前鎮臣陳有功在任十八年諸凡廢弛種種不堪臣前任興化副將時即巳周知素所鄙薄陳祖訓接任亦屬因循營伍情形誠如聖諭臣以菲材受皇上擢用隆恩惟有竭盡心力料理整頓雖肝腦塗地亦屬不辭復何敢以咎在前人推諉茍且復蹈陳有功之故步臣自到任以來凡遇將辨諄切教誡老弱兵丁悉巳汰除甲械皆各整齊臺汛俱行飭修按期操練時刻察訪務求營伍改觀以仰報聖恩於萬一兹伏讀聖諭未見臣奏及此臣不勝惶恐戰栗臣實見識愚昧以事必著有成效方敢據實具奏惟有仰遵敕諭開載事宜朝夕諷誦實力奉行無敢因循怠忽以盡職守今䝉皇上指示嗣後有當奏聞容臣繕摺具奏臣不勝惶恐戰栗之至為此謹奏好勉力為之果能克盡厥職朕自有鑒照也雍正七年三月二十二日福建汀州總兵官臣朱杰謹奏為奏聞事竊臣於雍正六年九月欽奉御批摺內以汀郡食藉他處皆緣百姓不肯服勤務本未盡地力之所致當勸諭兵民務農敦本未有盡地力而不敷食用之理大哉王言誠足食裕民之要道當經通知汀郡有司遵行外時維十月萬寶告成民人收穫蓋藏之後正臣巡查各汛之期隨於十八日輕騎減從親往巡查各汛核其名數虛實考其技藝優劣分别勸懲於衝僻要害處所添兵責令汛辨防守因於巡歷之時兼察民情風俗由縣治而過接見有司紳襟臣則宣布聖諭使之勸諭民人當盡地力以敷食用其由郊野所經當人煙輻輳之處臣亦親講聖諭從容勸導兵民聞之莫不歡欣鼓舞臣於十一月十六日巡察各汛事畢方抵臣署至於本年陸路提臣石雲倬為奏請公糧等事除營中各官隨丁外每兵百名收入守糧三名為軍裝之需奉㫖允行在案因公糧一時難於驟得臣先將本身隨丁糧內每營捐出四分發交三營將僃為營中軍裝之需俟公糧滿日則由把總千總守僃遊擊至臣以次仍照原額收回現今臣標修造盔甲一百頂副巳經造完送督提二臣閲驗訖其三營之排鎗藤牌腰刀大刀應行修改者俟完竣之日另摺奏聞又本年為欽奉上諭事部議每兵一千名配威遠炮四位其子母炮應行解京臣標向無威遠炮仐每營各將行營炮四位暫充威遠炮現在操演三營共應製造蕩寇炮一十八位以抵子母炮方符兵千炮十之數臣現差把總赴省製造尚未回營其旗幟號衣器械等項隨時修理務極鮮明臣標三營馬步兵丁逐日訓練時加考核今技藝稍有可觀但必求其精熟此則臣職之所當自盡者也汀郡入春以來雨水調勻麥苗茂盛兹當播種之時米價均平兵民樂業臣謹將地方營伍情形繕摺具奏伏乞皇上睿鑒謹奏覽奏深慰朕懷但一切奏聞務須據實直陳不可絲毫粉飾涉於欺誑雍正七年九月二十一日福建汀州總兵官臣朱杰謹奏為據實奏聞事臣伏讀硃批諭㫖感懼交集竊臣賦質庸愚知識淺陋自任遊擊以至偏禆惟以無欺為本歷奉上司所言所行未嘗敢有一毫欺誑因得循分供職雍正五年臣年六十七歲荷䝉皇上擢臣總兵格外隆恩天高地厚自矢報主之心長恆恐效力之日短當此而尚懷粉飾臣雖至愚斷不敢出臣今將臣標近日營務情形謹為我皇上陳之除前修造盔甲改造排鎗經臣具摺奏明者不敢復瀆宸聰臣標三營藤牌手向用腰刀未能如式現在改造牌刀一百口復添造牌刀一百一十口每營分配七十口共改造牌刀二百一十口併前修理藤牌一百面又修理藤牌一百一十面俱巳完竣又修造護炮大刀閩營呼為雙手帶共六十把製造長鎗共一百五十桿各營分配亦巳完竣又臣標應製造蕩寇炮一十八位以抵子母炮臣前差員赴省局製造今巳完竣又臣標三營龍纛原各十二桿而外汛間用飛虎旗新舊參差不一今三營各製造緑緞龍纛八桿共二十四桿合成龍纛六十桿存城存汛一色鮮明俱巳完竣所有前項器械炮纛經臣差員齎送督撫提臣閲驗訖其餘軍裝隨時修整臣標三營馬步兵丁照常操演而近日尤覺矢志上進皆由皇恩浩蕩兵心感激而然也所有營務情形理合據實繕摺具奏伏乞皇上睿鑒謹奏覽奏知道了砥礪操守最為要務汝等武臣於此多不檢㸃徇目前之小利忘身家之大害者十居八九况血氣既衰戒之在得尤為難事勉為之莫負朕恩保全始終留令名於子孫勝如金帛田産多矣切勿輕重倒置勉之慎之雍正八年三月二十二日福建汀州總兵官臣朱杰謹奏為據實奏聞事竊臣跪讀硃批諭㫖感激涕零懼併汗集伏思人臣文武雖屬分途而報國之心則一武臣中往往不知檢㸃徇目前之小利忘身家之大害者誠如聖諭蓋輕重不容倒置公私不能竝立惟一念稍涉於私則身家之念重奉公之念輕遂至蕩檢踰間無所底止臣居官日久見武臣中有操守好者身名俱全未嘗不肅然加敬有操守不好者身罹法網貽害子孫未嘗不悚然加懼也且人年老戒之在得聖訓昭然夫利令智昏雖少壯亦且不免況垂老之年桑榆暮景冀圖小利以為身後之計不知立身一敗萬事瓦裂福善禍淫天理不爽妄求所得究與巳身何涉臣雖至愚頗惜亷恥任事以來夙夜戰敬謹鈔録聖諭朝夕供奉觸目警心矢志不移務期保全一生無負我皇上擢用教養之隆恩而巳臣標營務情形經臣具摺奏明不敢復瀆宸聰所有臣標三營馬步戰守兵丁盔甲臣公商之將僃等閲驗挑出現在披戴新鮮花素盔甲一千四百四十頂副尚宜修造花素盔甲一千四百一十頂副所需銀兩臣俱設法借貸於舊年十月內興工至今年三月完竣其借貸之銀按季公糧關出清還至於臣標兵丁照常操演觀風整俗臣劉師恕巡視到汀巳於三月二十日同臣閲驗訖汀郡舊冬十分收成實為數十年未有之豐登今春正業臣謹據實奏聞謹奏覽雍正九年三月十五日福建汀州總兵官臣朱杰謹奏為據實奏聞事竊查汀郡八邑今春雨暘時若二麥十分秀實現在米價每石銀七錢地方寧謐民人樂業臣標三營製造盔甲器械經臣陸續摺奏兹軍裝軍需隨時修整按季冊報督提二臣察核不敢復瀆宸聰臣標三營兵丁按期操演技藝頗諳有志上進各安營伍臣謹據實繕摺具奏伏乞皇上睿鑒謹奏覽凡百據實無纎毫粉飾之辭方為不欺也雍正九年十月十九日福建汀州總兵官臣朱杰謹奏為據實奏聞事竊查汀郡夏秋以來據各屬所報亦有晴雨不齊但晴久即雨雨足而晴竝無旱潦之患是以閩省八郡年成尤推汀州為最現今米價每石七錢民人樂業地方十分寧靜臣標三營本年四月內製造會哨循環號旗一十二面六月內製造帳房一百五十頂又製造大緞纛二十六桿副什長旗一百三十桿面紅旗二十六面其動用公糧銀兩數目俱經該將僃等造冊報明督臣提臣察核奏銷此九月二十九日觀風整俗臣劉師恕巡視到汀同臣於十月初六日閲操訖各兵技藝較前俱覺純熟臣不敢毫有粉飾謹據實繕摺具奏伏乞皇上睿鑒謹奏覽奏知道了操守為第一要務時自檢查不可少忽雍正十年四月十六日福建汀州總兵官臣朱杰謹奏為據實奏聞事雍正十年正月十六日臣齎摺家人回汀捧到硃批諭㫖臣恭設香案望闕叩頭謝恩訖伏讀聖諭操守為第一要務時自檢查不可少忽欽此臣於雍正七年十一月初四日䝉皇上硃批臣摺砥礪操守最為要務汝等武臣於此多不檢㸃徇目前之小利忘身家之大害者十居八九況血氣既衰戒之在得尤為難事勉為之莫負朕恩保全始終留令名於子孫勝如金帛田産多矣切勿輕重倒置勉之慎之欽此臣敬謹鈔録聖諭朝夕供奉觸目警心務期保全一生無負皇上擢用教養之隆恩兹復仰承天語煌煌臣敢不益加勉勵臣竊思武臣之務誠莫要於操守而操守之端與不端比文臣之賢否尤為易見蓋兵只有此數非如百姓之散處不齊朝夕皆有見聞操守既端則號令賞罰兵皆肅然而畏執巳意或瞻徇情面言出而兵不信法嚴而兵不服嘖有煩言甚且互相詆毁此前車可鑒也臣自初任遊擊即誓不賣一糧不虛一餉與文官同城公事相見外毫無交結從不說一情講一事歷任至今惟有清白乃心始終如一以自刻勵上司文武莫不共見共聞總求上無負於國家下無愧於兵民而巳上年臣標䝉皇上恩賞生息銀一萬二千兩臣以汀郡地僻民貧難於營運又恐付託非人貽誤不淺是以懇呈督臣劉世明題請就省給交鹽驛道楊宏緒收貯代為運鹽生息自雍正九年二月二十五日起據鹽驛道咨報每季得息銀四百八十兩零至今年二月四季巳足應得息銀一千九百二十兩俱現貯道庫臣伏思國帑一萬二千兩而其為息計自分毫一年之內積成一千九百餘兩倘委託非其人年久月深授受之際幾微不清則為操守之纍不少矣臣所以力請代題營運三營官兵咸共諒而胥服者也臣敢因聖諭而據實陳之伏惟聖明照察汀郡舊冬巳極豐登臘月雨雪今年入春以來亦復雨雪但二三月雨水稍多幸閏三月杪至四月初天時少霽臣親往各郊查勘禾秧遍插二麥穗子飽滿據各鄉民稱麥子有九分收成禾苗青翠所種俱各豐茂民間食米每石價銀八九錢不等地方十分安靜四民樂業至臣所轄延平邵武二府地方寧謐雨水霑足米價均平合併奏明伏祈皇上睿鑒謹奏覽雍正十年九月十二日福建汀州總兵官臣朱杰謹奏為據實奏聞事雍正十年六月初五日臣齎摺家人回汀捧到硃批諭㫖臣隨恭設香案望闕叩頭謝恩跪誦之下惶悚無地伏念言易行難聖諭煌煌誠不易之定論第臣非敢為空言也臣自任汀以來經今六載竊見數年中米榖頗稱豐稔地天聽若夫居官之道有為不可無守有守不可無為訓練精而益求其精操守潔而愈求其潔此臣之夙夜殫精竭力詳慎始終而不敢須臾稍懈者臣雖駑鈍尚堪鞭䇿惟有凛遵聖訓深自勉勵以仰報皇恩於萬一耳臣查本年汀郡暨延平邵武地方夏秋雨水沾足秋成實有九分米價每石八九錢不等民人樂業地方寧謐再七月二十五日接署督臣郝玉麟照㑹緣臺灣北路土番不法檄撥福寧鎮標兵丁三百名往臺𠞰捕該處汛防亦關緊要合就檄撥汀州鎮標三營內撥兵二百名前往福寧分發貼防等因到臣隨即轉行三營派撥戰守兵丁二百名令左營右哨千總張朝任管押於七月二十九日起程去訖合并繕摺具奏伏乞皇上睿鑒謹奏覽奏知道了硃批諭㫖卷一百七十九
