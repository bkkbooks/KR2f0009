body:
  text: 欽定四庫全書硃批諭旨卷二百二上硃批郭鉷奏摺雍正六年三月十九日廣西布政使臣郭鉷謹奏恭請皇上聖安朕安覽所奏數摺已悉汝之心志矣朕甚為嘉悅勉之勉之果如所奏咸能行與言符上蒼斷無不賜鑒照佑助之理從來公誠二字為受福根基根基既固何有傾覆之虞縱更加以格外恩榮委任必克負荷愈覺智力增長否則器小易盈鮮有不隕越者朕見比比皆然蓋由在巳無藏福之基也可不懼乎同日又奏為據實奏聞事竊臣由山西廣昌縣知縣離任候補知府銓選無期耕種屯內猥蒙皇上天恩特拔授為山西太原府知府歷俸五年毫無報效乃皇上不賜罷斥又復超擢廣西按察使到任未及一月旋又升授廣西布政使臣即木石亦當撫躬自量臣何人斯頻膺皇上委任之重庶有以仰報天恩於萬一兹臣於雍正六年正月初八日接授布政司印務兩月以來悉心查核務令徹底澄清所有應存司庫地丁一切銀兩業經清查並無虧短惟俸工一項查係雍正元二兩年通省官員為聖恩高厚仰報無由願捐俸工稍佐軍需事案內共捐銀五萬五千三百餘兩當經解交西安布政司三萬兩水腳費用一千二百兩外其餘存貯司庫以僃公用又有穀價盈餘銀六百四十九兩零以上二項臣逐細查核除解餉添平實在公事用去外查出不關公務院司徑行支取及院司公同動用之事臣現在據册詳明督臣俟批示到日臣據實報部查追以清庫項至於倉穀一項通計全省共一百五十二萬餘石臣到任後即委員分途盤查緣廣西地方遼濶往返需時故各屬多未詳報所有報到之州縣如原任臨桂縣楊詢朋虧空倉穀又原參署靈川縣楊朝璘虧空米穀查出撫臣李紱逼勒交盤等弊臣業巳揭報署撫臣阿克敦題參不敢稍為徇隱其應買補還倉穀石通省共三時已飭各屬暫停採買俟秋成後再令全買還倉但臣接受交盤之時正撫臣三月限滿例應保題之際臣方在清查務期確實不敢因例限巳屆草率冒昧出結臣寧甘受遲延之咎總求一清百清顆粒皆歸公貯決不敢絲毫隱漏以致聞伏乞睿鑒謹奏肯如是奉公盡職何煩朕之多諭勉之勉之同日又奏為敬陳管見事竊惟州縣地方本有大小之異而居官才具實有短長之分以長才而處小邑固為未盡其能以要地而畀短才必致有虧厥職總緣州縣官員大半係初登仕籍其平日未嘗經練故人與地相當之處未能懸定一旦憑籖掣缺縱有才能出衆者無由區别或以庸員而得要地竟將皇上之人民財賦令其嘗試及至地方廢墜不修始行罷斥則其貽誤巳多臣愚以為未能懸定之中而預為地方安全之計無如斟酌人地一用調繁之法在國家調繁調簡原有成例然各省督撫不過間有題請而未嘗廣為推行遍察通省之中條分縷析盡求人缺之相宜也伏查州縣要缺之必需賢員者共有四等一地當孔道者為衝一政務紛紜者為繁一賦多逋欠者為疲一民刁俗悍命盜案多者為難就此四等之中有專者有兼者有四等俱全者臣愚請除雲南廣西題定煙瘴調補者仍照舊例外凡直隸各省俱請敕令各督撫先將各屬州縣一一查核的確委係衝繁疲難四等之地或專或兼或四者俱全分别注明造册題達其簡僻易治者一槩著為常缺則凡天下之州縣固巳較若列眉矣再請飭令吏部凡初任銓選州縣悉於常缺籖掣所有四等要缺令該督撫於現任州縣內酌量人員與四等中何地相宜題明調補試用俟試看一二年內如克勝任再行題準實授如試看後人地仍有不相宜處不妨許該督撫再請改調則督撫不至有瞻顧畏葸茍且包容之弊而常缺要缺均各得人於吏治民生似有裨益臣識見庸鄙冒昧陳獻伏乞聖裁謹奏此奏可嘉之至向來調繁調簡流弊相沿竟為督撫射利之藪若槩不令更調又恐貽誤地方所以每遇督撫奏請偶一行之不過以為暫時權宜之道常時因斯繫念究未得有定法今覽所奏深愜朕懷從未經人議論及此如是方稱中其肯綮巳交該部議覆矣同日又奏為敬陳管見事竊臣前蒙皇上天恩補授廣西按察使時初入廣西全州境地方官即撥有站夫應用臣以上任之員非比欽差公務當即發回自行雇覓隨查得廣西之北由全州歷興安靈川至臨桂即為省城凡四州縣每處額設站夫九十名每夫一年須工食銀一十四兩四錢又永福縣有站夫三十名通共五處共開銷工食銀五千六百一十六兩在額設之初原因該州縣地當孔道凡公務官員往來必須轎夫扛夫並隨從所坐竹兜亦須人役故預設此站夫以僃用但臣查公務往來有時站夫之在地方有應役之日亦有不應役之日即應役或僅數名或數十名而不必盡如九十名之額數是用其力而給之食本為當然而不用之日率皆遊手以養惰約略一歲之中糜費工食不啻大半臣愚竊謂站夫一項理應裁革額設銀兩悉宜解歸司庫每一州縣每年量其大小約存留銀二三百兩遇需用夫役之時竟令地方官將現銀雇覓以省無事之虛糜並禁止一切濫派濫應即準用夫役之員亦當如驛馬之例議有定數其係奉欽差者部中給以勘合其係盤查及差委者每到一州縣即給印票一張令地方官按數雇覓其票存地方官處統候奏銷之時地方官造册申送驛道查核儻有濫索濫應者許驛道揭報題參如遇有餉鞘大差經過需役衆多自有成數其不敷之處許另文詳請補發如此則差役無誤而經費亦不至虛糜矣再查南方水次州縣額設站夫所在皆有不獨廣西為然伏乞皇上敕部查議裁革均照時價雇覓似於國家經費不無裨益為此繕摺奏聞伏惟睿鑒施行謹奏此事於元二年間曾有人條奏經廷臣再三詳議僉云不可全裁所以飭諭各省止減其浮多而巳但從前所奏不似爾此奏明切交部再議看究恐未必可行也同日又奏為奏聞事竊臣自到任後凡全省所屬府廳州縣佐二等官臣俱一一留心訪察緣地方遼濶屬員因公至省臣所經見者僅十有餘員但據臣所訪察大約小心謹守者居多容臣再加細訪倘有貪婪敗檢之仇殺固所時有然臣查其所謂仇殺者其先實原有寃抑事件官府不能為彼伸理故遂激其凶悍仇殺之風諒可漸次而息其有梗化苖獞凶悍不改者務必嚴拏盡法以警其餘則恩威並著而野性亦知所畏懼矣現在據西隆州西林縣詳稱顏光色岑顚等虜掠村莊聚衆焚殺經提臣咨商撫臣巳發官兵前後堵𠞰不日溪洞肅清苖蠻咸知有國法凡邊徼之民亦無不知堯天舜日之下斷不使凶徒得以僥幸也再查向來土司之中有敢於恣肆者多由該管知府貪其土物貨賂以故土司有所挾持益剝取土民肆行不法如此目今泗城府官莊役田及穀價等項臣巳詳委道府等官前往丈量逐一清查再歸順土州經督臣孔育珣題明苖價銀兩一案臣巳飭委田州土司協同思恩府知府按畝查勘如差委官不實心辦理及土司聖明之世也所有地方官屬及苖獞土司事情理合奏聞伏乞睿鑒謹奏嘉悅覽之再所奏武員優劣一摺留中評論甚屬公當之至胸中頗有衡鑑凡為大吏者但目能識人其餘復何足慮觀汝可成一大器勉之勉之提督田畯未料如此稱職常慮其善柔無能致有貽誤果若是朕釋懷矣馬召南係一俗品即其儀表而論亦無甚可取因其侍衛年久向未認識朕踐阼之初一時不得人而用者張傑漢仗好為天津守僃時有名但恐巧黠不誠亦非大器其餘所奏皆是雍正六年七月初六日廣西巡撫臣郭鉷謹奏為恭謝天恩事竊臣一介庸愚至微極陋於雍正五年七月內蒙皇上天恩由知府特授廣西按察使赴任未幾旋即蒙恩升授廣西布政使臣方念錢穀總滙非臣之愚所克勝任正在兢業弗遑兹復奉特旨授臣廣西巡撫聞命之下心神俱驚手足莫措計臣赴粵以來始及半載遽爾膺此重任內問諸心何以報稱惟殫竭血誠天恩於萬一耳所有微臣感激私忱業經恭疏題達外理合奏聞謹奏終身不忘今日之感畢世不移所立之志則愈久愈純報稱之道不外是矣何庸更覓他途别謀善䇿也同日又奏為遵旨恭繳硃批奏摺事竊臣於本年六月十二日接受廣西巡撫印務準前署撫臣阿克敦交到奏摺一件奉皇上硃批命臣看過代為恭繳欽此欽遵臣查看摺內因原任撫臣韓良輔條奏左右兩江土司事宜五條阿克敦分别覆奏業蒙皇上睿鑒逐條奉有硃批仰見聖慮周詳無遠弗照臣今接任自當一一凛遵聖訓實心辦理所有署撫臣阿克敦覆奏原摺理合恭繳抑臣愚見改土歸流之議如土龍州改設之二巡檢誠宜如阿克敦所奏事屬可緩然各屬土司實有大小強弱之異自當因其時勢相厥機宜查土司惡習每多仇殺相尋阻兵自固者大率皆由地廣而人衆地廣則易於藏姦人衆則易於相煽往往醖釀為非致貽地方之纍則先事之防似不可不預為區畫臣查有慶遠府屬之東蘭土州與永順長官司二處在粵西土司中素稱強大近年殘害土人皆有案可據臣愚竊謂該府所屬土司二處俱當因地制宜收入版籍以昭聖朝一統無外之治如蒙皇上俞允臣即咨商督臣會疏題達所有愚臣一得之見合先附奏恭請聖裁謹奏朕未深悉地方情形何可懸定行止全賴汝等詳慎籌度務使無過不及斟酌盡善奏請施行耳同日又奏為恭繳硃批奏摺事竊本年三月十九日臣在廣西布政使任內恭進奏摺蒙皇上天恩批發到臣一一跪讀硃諭奬掖戒勉委曲周詳凡天道人事臣職官方無不指點親切雖臣之愚未足以仰副聖訓而在皇上作君作師之心所以期望臣子者無所不至臣受硃批奏摺理合恭繳再蒙皇上密發督臣孔育珣奏摺一件臣恭誦硃批仰見聖心公溥臣何能更奏一語惟有感嘆誠服頌聖明於無疆而巳至提解耗羡一節緣廣西地方自原大不能保無公事臣因斟酌詳請督撫二臣通計廣西錢糧三十餘萬兩提解耗羡二分共得銀六千餘兩以僃通省不時之需臣已回明署撫臣阿克敦具摺奏聞故臣前次進摺時未經具奏兹蒙發下督臣摺稿臣遵旨看過一併恭繳至督臣孔育珣名下應還俸工銀兩據布政使詳報業經解交藩庫合併奏聞謹奏朕非崇尚深刻之主凡百但欲適得其中秉公執正而已倘或錯會則差謬非淺汝等大吏第一當知朕心所向為要同日又奏為奏聞事竊查欽差使臣左副都御史杭奕祿內閣學士任蘭枝前往安南事宜據左江道閻純璽具稟到臣該道出關候送之次二使臣面語該道云安南國預僃龍亭極其輝精潔儀仗亦甚整齊陪臣叩謁謹守禮數鼓舞歡騰恭順之極隨又經臣查探二使臣於五月二十四日出關由諒山前往聞安南沿途設立住宿公館一十六處二使臣巳於六月初八日到黎京十六日宣布聖諭定期十九日起程回京復府屬臨桂靈川興安全州數處從六月初一日至二十一日雨澤愆期早禾乾涸臣正在焦思於二十二日以後陸續得雨十數日查據臨桂等縣報稱晚禾竟無傷損早禾黃稿之葉復皆發青收成大有可望其早晚二禾收成分數至期再當具奏所有目下得雨情形合併奏聞謹奏但能黽勉吏治清理刑名誠以格天敬以律巳地方上之雨暘時若徴應諒必不爽設理不勝欲公不勝私則其應亦必相反矣勉之慎之同日又奏為奏聞事竊查得西隆州八達寨惡目顔光色光東勾引西林縣岑顚岑扭聚衆焚殺一案業經提臣田畯發兵堵捕據各官辨陸續報稱其岑扭一犯巳經誘獲前後殺死賊人約四五十名傷壞官兵一名土兵九名乃光色等暋不畏死竟敢潛伏箐中偷劫糧米以致傷壞把總李光玉並官兵六名土兵一名官兵亦殺死賊人四名隨經右江鎮臣段宗嶽率領官兵親身督𠞰其岑顚一犯聞大兵將至逃竄雲南廣南府屬之科索寨等情臣當即咨移雲南署撫臣鄂爾泰檄廣南文武官一體協拏務獲隨準鎮臣咨稱六月十二日已抵八陽察其巢穴實係深溝高壘道徑迂回且八達寨後逼近雲南猓猓為惡目挽運糧道地勢尤險非多兵圍困絶其糧道恐一時難於擒捕今現兵雖有二千餘名尚不敷調欲咨移本省添撥途遙不及緣本鎮與貴州安籠鎮雲南廣南營相連已咨會安籠廣南二處就近遣撥會合進𠞰臣正在準咨間據左江鎮標遊擊塢元度具稟提臣稱賊勢甚為凶逆六月二十日鎮臣業巳分派官兵奮勇攻寨無奈賊人恃險高築炮臺排柵反致傷壞千總一員及官兵二十二名官兵亦殺死賊人二十餘名自已至申竟不能破時提臣因會審羅文剛案在省與臣面商隨即檄調平樂協副將胡灝帶領鎗炮藤牌手共四百名前往協助該將頗有膽略諒此頑苖必當殲滅如果地勢險隘尚需時日即未可徒仗兵威固當以計取之矣督臣相隔遙遠臣惟有竭力殫心與提臣協恭辦理務期擒獲凶頑以安邊徼斷不致有煩聖慮也為此謹奏田畯於一切調遣派委俱甚屬乖違凡此皆緣常顯虎等坐失機宜之所致將易了之案釀成難處事矣雍正六年八月初七日廣西巡撫臣郭鉷謹奏為奏聞事竊本年八月初六日接準右江鎮臣段宗嶽咨移內稱七月二十一日卯時分路進取顔光色八達寨至申刻不下隨即收兵據逰擊常顯虎等各報稱傷壞漢土官兵共十一名被傷者二十四名本鎮亦傷壞兵丁九名被傷者一十二名又據貴州安籠鎮逰擊賀成田昌友呈稱傷壞守僃李文仲把總王承文被傷千總袁登貞陳思儀傷壞漢土官兵共三十九名被傷者五十八名切思官兵既令會合進𠞰自當彼此相援不料憲臺所存何意按兵不動使我兵困極傷亡如此之多等情前來本鎮照得三路進取蓋令各取一路先得者為頭功詎意田將輕敵進老其師遂致有失等語咨行到臣衙門臣接閲咨文不勝駭異伏查鎮臣段宗嶽前於六月二十日失機當即卸過於田州土兵西隆州土勇隨咨請貴州安籠鎮雲南廣南營二處官兵會𠞰臣見該鎮臣如此舉動即與提臣田畯面商檄令平樂協副將胡灝前往協𠞰乃該副將等未到之先該鎮臣業於七月二十一日進兵又有此失則官兵之氣必餒賊人之志益張該副將等即到究必以該鎮臣為主軍儻仍調度乖方恐亦未能破賊於旦夕況據貴州逰擊賀成等既稱該鎮臣坐視不救後此進攻恐黔兵亦復因循彼此瞻顧甚非所宜臣當巳飛札致商提臣田畯兼程親赴軍前統率大兵進𠞰庶主將得人兵勇盡力小醜可一鼓定也所有鎮臣失機並札致提臣緣由理合繕摺奏聞恭請皇上睿鑒謹奏此事朕巳聞之矣一者主將韜略不及二者廣西兵辨廢弛巳久料此凶苖必待滇黔官兵會𠞰方克收功也雍正六年八月二十四日廣西巡撫臣郭鉷謹奏為奏聞事竊查廣西收成夏間麥秋之時麵麥蕎麥之屬俱極豐碩收成足有十分其稻田早禾查桂林近省州縣自六月初兼旬乏雨禾苖乾涸至二十日外連雨十數日枯黃之葉悉皆回青抽穗其有先巳抽穗而被傷者旁復發生新苖一同抽穗結實現今各屬詳報早禾收成仍有七八分不等至在田晚禾並未傷損若雨澤應期收成大有可望再查各屬米價每石自一兩二錢起至六七八九錢不等至西隆州惡目顔光色一案業於本月初七日專摺具奏隨後準提臣田畯咨稱初八日親往督𠞰又續到雲南廣南營漢土官兵合計兵辨一萬有餘四路堵截現查得顔賊久經困圍之後糧食將竭凶黨傷殘者亦衆掃蕩之期不過早晚間事捷音一到臣即星飛題達再查得慶遠府那地土州羅鳥一案緣羅鳥與土官羅會禧有隙於雍正五年十二月內糾合賊衆騷擾地方經督撫臣飭該管文武各官查拏有羽黨羅將被貴州都勻營拏獲移解到粵其羅鳥並羽黨羅中興韋同保等俱恃險潛匿逡巡不出今臣飭令該府等傳諭招撫於六七等月內羅鳥羅中興韋同保等俱各抒誠到案現在飭司審擬歸結羽黨解散地方悉巳寧靜理合一併奏聞謹奏覽奏朕懷深慰凡奏地方事情惟以不欺不隱為要纎毫不得含糊粉飾如恐煩聖慮此乃小事何必上瀆宸聰等論咸係欺隱巧詞當切以為戒昨官兵進𠞰八達屢次敗北兵被賊擒渠魁高坐山頂歡呼飲宴將兵射死此種情形朕在京尚聞汝身在粵豈竟未之聞耶必橫有意見於胸中如朕所諭是以諱而不奏於此若見不透務愛君之小節違忠告之大義則深負委任矣須知為大吏者一切無分巨細據實直陳方堪倚信且於無奏之時亦可放懷釋慮否則朕疑念無刻少間於閲奏時固料隱諱者凡幾於不見奏時更恐隱諱者無限是汝等愛朕適所以苦朕亦復何益之有既受封疆重寄當具洪量遠識慎勿惟小是務而反於大體有虧豈特有忝厥職而巳即大臣之名亦不稱也勉之戒之同日又奏為奏聞事竊查臣巡撫衙門舊有吏役廪工飯食銀兩均屬必需之項每年支給一係梧厰稅課於一分項下每年解銀一千零四十一兩四錢一係潯厰稅課於一分項下每年解銀八百六十五兩五錢零一係南寧府每年捐解三百零二兩一係懷集縣每年於稅課內抽解三百九十二兩零一係北流縣每年於稅課內抽解一百四十一兩零以上共銀二千七百四十三兩零臣細查得梧潯二厰廪工於一分項下起解經前撫臣韓良輔業已奏明現今照數起解南寧府廪工原係自捐現今亦照數起解惟懷集北流二縣共廪工五百三十四兩零向在稅課內抽解查稅課俱應歸入正項且並未奏明抽解廪工不便照數起解除懷北二縣本年應解廪工銀兩飭令該縣歸入正項外則巡撫衙門廪工實缺銀五百三十四兩零臣前於布政使任內查有鹽道解歸藩庫支給兵餉銀兩每銀一千平頭十兩共該平頭四百七十六兩本年平頭臣巳詳請署撫臣阿克敦歸作公用抵補巡撫衙門所缺廪工在案但除此之外尚缺廪工五十八兩零今臣批行布政使在耗羡銀內動支補足原數伏念此項細故不應上達天聽但臣受皇上隆恩一事不敢隱默所有抵補撥動廪工銀兩原由理合奏聞謹奏覽凡關錢糧事件但令勿欺隱而巳不可過刻至於督撫以下各官養亷務宜詳籌熟計俾其足用方是當領悉朕意揆情酌理而為之同日又奏為奏聞事竊臣在藩司任內接閲邸鈔户部題為敬籌參追之員等事案內將山東河南等省虧空未清之案開列滿漢京堂科道恭候皇上欽點各二員分往各省會同督撫清查惟廣西一省部議虧空無多令該督撫自行據實查明勒限嚴追補項毋庸遣員查察臣當即詳明督撫請將粵西虧空各案遴委能員專司其事尚在未經批行今臣仰邀聖恩畀以巡撫重任自應經營籌畫徹底澄清斷不便仍如昔日之循名鮮實勒限參追而巳但綜理其事必須能員臣現在選委桂林府知府耿鱗竒飭將通省虧欠各案弔集官犯卷宗逐一審追務期皆有著落無令支飾遷延俟清理之後或應具題或應咨部者酌量各屬案情分别咨題歸結所有飭委知府清查虧欠緣由理合先為奏聞謹奏能矯因循舊習諸務何難辦集可嘉之至勉力秉公為之雍正六年十月十一日廣西巡撫臣郭鉷謹奏為恭繳硃批奏摺事竊臣於本年七月初六日恭進奏摺九月十五日蒙皇上天恩批發到粵臣叩頭祗迎一一捧讀硃批仰見皇上覆載生成之心即堯舜執中之旨於以識題達在案兹據西隆州詳稱有顔賊餘黨二百餘家男婦共五百餘口自行投誠懇求安插耕地輸糧該州當即親勘平坦之處令其蓋造房屋居住所有招回餘黨緣由合併奏聞其應置官辨事宜俟臣等酌量後恭疏題達所有硃批奏摺理合一併恭繳謹奏覽同日又奏為遵旨奏聞事竊臣領到皇上硃批奏摺內有兵部職方司主事臣田㴶條奏練團保固及委用土舍二事奉有硃批臣遵查廣西州縣漢民地方則立團總練總保長保甲猺獞地方則立猺長獞長其餘仍有鄉老村老老人等稱蓋因各村大小散處不一從練總保甲分出總之漢民地方其責成悉歸之於練總保甲今各州縣遵照雍正四年上諭編設保甲俱奉行在案外此地方人役則莫善於練總莫不善於土舍蓋練總之設由地方官點選良善可用之人有事則呼之立至無事則聽其歸農是力效於下而權仍在上故各屬詳報畫一遵行甚便而土舍則不然土舍之名土人甚重之不知其所遵何例此名一立彼即侈然自肆始則魚肉鄉愚繼則煽聚匪類日積月纍遂至劫奪仇殺無所不為地方官稍繩以法則糾衆抗拒毫無忌憚此外又有兵目名色與土舍相等均為地方之害不可姑留如日前思吉鎮韋兆彪之爭奪八達寨顔光色之抗逆正其類也目今土舍名色臣正在查核裁革豈可復行聘用以滋事端而主事田㴶所稱或一時偶爾權宜幸獲無事斷非為政之常經也謹此繕摺奏覆伏乞睿鑒謹奏所見是凡有類斯條奏外省事宜槩發與督撫酌議者或庶幾有補於汝等之意並非是其言而欲令施行也可行與否當如此據實直覆汝其領悉朕意同日又奏為奏聞事竊臣領到硃批奏摺蒙皇上批及李紱剛愎之人也查伊任內有不協處悉行摺奏以聞欽此臣愚看得李紱之剛愎誠如皇上聖明照鑒敗露以來內外臣工已無一人不以為戒臣在藩司任內迹其袒護鄭采宣逼勒楊朝璘接受交盤一節益知其為剛愎之甚臣業經確訊得實詳請題參在案其他委曲徇私掠取虛譽師心自用尤為可恥如巡撫衙門未定養亷之前各屬厰稅繳到茶果銀共一萬三千二百兩李紱則陽為亷潔之操隂為曲折之計明取銀八千兩而以五千二百餘兩發貯司庫又復借修省城刻志書書院膏火名色陸續取回銀四千餘兩僃查其用去實數共止銀一千二三百兩其餘仍歸於已至李紱於屬員之間尤多偏徇以朝廷卓異大典而彼之所薦舉者則請託之鄭采宣與同年之王勀再武宣縣知縣陳棫亦以同年題補賔州知州此三員者業蒙聖明斥革在案臣閲李紱所修廣西志書敘至名宦一傳凡係彼江西同籍悉行濫載考其政迹實無可稱若夫裁減火耗一節輕賦以利民名非不美第國家立法固欲行之上下而皆便如廣西一省錢糧三十五萬餘兩僅足以支給兵餉若無公費則公事何以辦理今李紱不達政體遽為裁減以致公費寥寥豈李紱視全省之大竟無公事需用乎夫公事至繁無過城垣為重現查廣西各屬如西隆州河池州西林縣天河縣思恩縣荔波縣共六處俱無城垣李紱身任封疆從不計議修建即其任內天河縣劫奪獄犯莫東旺一案非無城垣何以至是而李紱以為美名所在不可旦夕姑緩遂汲汲焉裁減而不顧其他諸凡任內徇私之惡習類如此矣緣奉硃批事理臣謹一一據實奏聞伏祈睿鑒謹奏此等人之心迹如何能逃天鑒是所謂自作孽者也雍正六年十一月初十日廣西巡撫臣郭鉷謹奏為奏聞事竊照廣西早禾分數經臣前巳奏聞兹晚禾分數據桂林等府查報前來並經臣四路訪察有七分者有八分九分者有十分者合計全省收成約共八分有餘其各屬米糧時價每石自一兩一二錢至六七八九錢不等至於一切雜糧俱皆足收目下雨澤正調麥種悉播種在地來歲麥秋大有可望前奉硃批上諭但能黽勉吏治清理刑名誠以格天敬以律巳地方上之雨暘時若徵應諒必不爽設理不勝欲公不勝私則其應亦必相反矣勉之慎之欽此臣伏讀聖訓諄切至是敢不竭盡愚誠敬慎為懷以感召天和而仰副皇上誠求保赤之至意所有前次硃批奏摺理合一併恭繳謹奏勉遵朕諭力行無間試看何如同日又奏為請旨事竊查雍正元年四月二十五日兵部傳旨如無緊要摺奏不可擅騎驛馬臣自到任以來仰體皇上慎重驛站至意原未敢輕用驛馬遞送摺奏但臣所轄廣西一省去京甚遠中又隔以洞庭之險往返即速亦需兩月有餘稍有耽遲即至七八十日不等每當進摺之後望闕候旨屆期不到懸切倍常緣廣西至京湖南一帶從無騾馬可雇必至武昌方可雇覓而自京回粵之人武昌騾匹又從不肯雇至粵西且一路並無歇店是水陸二途均無致速之䇿可否仰請聖恩許臣摺奏由驛站竟至武昌後臣令齎摺人雇騎至京俟摺奏發下齎摺人仍雇騎兼程至武昌再由驛站回粵則臣所進之摺早到一日早得敬頌諭旨於地方事件裨益實多如蒙俞允臣即咨移湖南湖北二省撫臣粵西齎摺人役竟用臣關防印票到驛驗照給馬該地方官據臣印票造報驛道查核臣不揣冒昧恭懇聖恩俯念粵西遠隔洞庭允臣所請伏候批示遵行謹奏據奏巳悉但用印票則屬違例候降旨諭部賜爾火牌十張用完再領庶幾猶可如非緊急要務又不若隨本附齎為便酌量行之可也同日又奏為奏聞事竊查湖南寧遠縣荆之寶家被盜一案陸續準湖南撫臣王國棟關會密拘廣西一省盜犯八十三名內除兩粵通緝之犯二十名實廣西盜犯六十三名經該地方官拏獲四十一名尚有未獲二十二名其通緝之犯經兩粵共拏獲十三名尚有未獲七名查得廣西賀縣盜犯一名陳仲禮準湖南撫臣咨據署寧遠縣詳稱從前各盜供稱陳仲禮花名甲四今現在之陳仲禮又名陳老晚恐有别情訊問夥盜莫紅球據供陳老晚乃陳仲信係陳仲禮之弟當日並不在場隨弔陳老晚質訊堅稱巳即陳仲禮再三研訊始行實供原係陳仲信並不曾打劫荆家因賀縣緝拏哥子小的想做了強盜是要殺的哥子現有嫂子姪兒小的沒有娶親想頂著哥子來認了哥子就不用出來誰想他們又將情由供出再弔各盜質訊俱與莫紅球供同該縣並稱陳仲信鄉野愚夫不顧重辟代兄認罪義氣可嘉賞給盤纒回籍并移明賀縣嘉奬等語咨行到臣該臣看得陳仲禮身為不法自當按律以警盜風而陳仲信情則何辜乃獨甘心以代兄罪既據移行理應具奏其陳仲禮一犯當即密行該縣緝拏巳據獲解再查兩粵解楚盜犯聞有五犯在寧遠縣越獄當即拏獲二犯其三犯竟皆逃逸合併奏聞謹奏陳仲禮一犯據奏巳獲餘犯盡力督緝勿令致有疏縱同日又奏為奏聞事竊查西隆州八逹兵目顔光色等恃其險遠拒捕不法祖父相傳巳不止百年矣西隆州知州劉德健到任後又復藏匿亡命再三招撫不服本年二月內該州請發官兵原有不可再緩以長姦宄之勢臣因顔賊雖恃險負固本非大冦不欲輕動官兵當令西隆州西林縣共撥土勇四千名遣文武官帶令前去以土勇而攻土賊最屬便利如或不能即為殄滅再發官兵征𠞰可無輕率之虞乃提臣督臣聞請征𠞰當即行文發兵臣隨向原署撫臣阿克敦面言請移咨暫行停止姑緩二十日俟土勇進𠞰之後預僃官兵以待進發阿克敦不允遂聽調兵齊赴八逹而遊擊常顯虎蠢拙無謀巳荷聖明洞鑒督臣孔育珣見賊久不下遂委右江鎮臣段宗嶽親𠞰鎮臣出兵之後亦束手躊蹰未展一䇿臣於六月十二日到巡撫任檄行布政司接濟軍餉并飭西隆州西林縣盡心挽運又勉勵行間文武和衷協力而鎮臣前因調取西隆土勇三千名該州以軍糧緊急負戴挽運正須土勇回稱不能如數又進四路並攻之議謂賊衆僅七八百人官兵四千餘人師勞兵疲坐廢時日宜分别賞罰及時進取且願身領土勇獨當一面設有疏虞聽從軍法鎮臣嗛其越爼言事遂與該州劉德健不協逮鎮臣段宗嶽咨會貴州安籠鎮遣兵協攻而提臣田畯亦委平樂協副將胡灝統領軍務前往臣念軍糈緊要恐西隆州縣力不能支隨委平樂府知府胡醇仁同赴軍前協理幸而兵糧無缺七月二十一日安籠鎮標遊擊田昌友等奮攻賊寨致傷守僃把總以及兵丁等臣即檄飭胡醇仁賞給銀兩而提臣田畯亦即於八月初八日起程親赴軍前八月二十二日胡灝胡醇仁先到寨民抱金抱添即於是日斬顔光色光東之頭呈繳安籠鎮營內然賊首雖誅羽黨仍恃險不服時三省官兵雲集胡灝胡醇仁恐延久復生他變決意會兵進攻八月二十八日派定官兵分路而進奪其炮臺平寨等處至二十九日蕩平賊巢臣準提臣田畯九日據西隆州知州劉德健詳報州屬泥洞坡舍二寨向皆依附八達經該州持示曉諭兩寨悉行投順該州當即革去兵目名色設立里長甲長令自行輸納錢糧以免需索俱各歡欣踴躍遵依樂從十月二十三日據隆林營遊擊左吉具詳到臣據西隆州老農幸際昌等六十餘人呈稱該州劉德健身在行間六月有餘軍興用度一切不取於民今幸民害巳除目擊該州清苦情願公幫凍銀八百兩因該州峻辭不受呈請該逰擊代詳懇祈批示收用當經臣批示嘉奬仍不準其所請並飭甲長人等不得借端派纍批行去訖理合一併奏聞謹奏多有人於朕前參奏劉德健云八達寨一事皆由伊激成孔育珣亦奏稱劉德健不宜此任今據爾奏乃屬賢員可見毁譽之難憑如此而用人之難之苦更不待言矣前據參奏隨經諭知鄂爾泰汝今僃將劉德健優處向鄂爾泰言明可也硃批諭旨卷二百二上欽定四庫全書硃批諭旨卷二百二中硃批金鉷奏摺雍正七年二月初四日廣西巡撫臣金鉷謹奏為恭謝天恩事竊臣進摺差役回粵敬捧皇上賞賜哈密瓜到臣當即出郊祗迎恭設香案望闕叩頭謝恩訖隨陳於內署薦之先臣躬自剖分用彰寵賚凛天威之不遠正席先嘗體聖澤之無私全家遍及仰荷恩施下沛即奕世尚有光榮自慚報稱何能願每食無忘忠愛所有微臣感激私忱理合繕摺奏謝伏祈皇上睿鑒謹奏覽奏謝知道了爾凡所辦理及一切奏對俱屬精詳妥協朕甚為嘉悅深慶得人勉之莫移此志爾等漢軍之貪黷風習切勿稍被所染尤當加勉自礪者同日又奏為恭繳硃批奏摺事雍正六年十月十一日臣恭進奏摺十二月初八日蒙皇上天恩批發到粵臣跪讀硃諭伏思廣西一省猺獞雜處素號難馴加以前任廢弛之後整頓方新所有地方應行事宜若非督撫二臣覿面細商即文移書翰絡繹於途其間委曲繁重終有不能盡達之處臣跪接赴黔諭旨益仰皇上聖明雖萬里封疆之遠悉在九重宥密之中當即咨移督臣去後續又奉到諭旨廣西提督印務著金鉷暫行署理俟張溥到粵再行交代欽此臣復致札督臣鄂爾泰俟張溥到粵臣將提督事務交代畢即當赴黔會商一切公事再查粵西軍務臣自蒙恩升授巡撫以來於臣標兩營將辨兵丁不時嚴加整飭近皆可觀其提標軍務臣今署理印篆細行查驗多有不合機宜之處現在嚴飭各將辨加意整頓新經招募拔補得四百餘人俱勤加訓練但其中原有牽於舊制勢處難為者查提標中軍前後左右凡五營共兵三千九百餘名究之抽撥防汛散處各郡邑者已去兵一千七百餘名今除各官辨親丁外現在存操經臣招募後僅一千七八百名所以八達之役一經調遣而提臣駐扎之處更無餘兵可恃查左江鎮標兵三千一百餘名除抽撥防汛外存城僃操亦止六百餘名臣自署篆以來始知其中委曲若撤回汛兵則防範地方實不可少若議增設則汛地甚廣又不勝其增再四思維惟有屯田一法既可以盡地之宜即可以救兵之弊查桞州等府頗有餘地可以耕種緣其地磽瘠故開墾無人臣愚請廣行招徠資以牛種令民得以盡力耕種倣佛寓兵於農之遺稍變井田畫畝之制為之設立都司各員當耕耘之日則督之力農當農隙之時則教以技勇但藉其力不稅其糧惟每名給水田十畝外令耕公田一畝旱田三十畝外令耕公田二畝其公田租穀照社倉之例存貯公用查柳州府水田約一萬餘畝旱田三萬五六千畝所需牛種銀不過二萬兩擬請借動正項給發分作十年每嵗以公費銀二千兩扣補還項其南寧等府現在查核俟查核清晰亦應舉行是屯田一開凡曠野之鄉皆為耕鑿之地其耕鑿之地皆有捍禦之人行之一二年則扼要之處俱有所藉以防間而分汛之兵自可以漸次議撤一勞永逸一舉兩全據臣之愚實為切務其應行與否及設立官職一切僃細事宜容與督臣面商後再為詳悉合詞具題謹將臣大槩愚見先行奏聞所有硃批奏摺理合一并恭繳謹奏所奏甚屬可嘉朕欣悅覽焉更與鄂爾泰從長商計其各標營如果兵單應行添設糧餉需費乃屬末節今國用頗充不必顧慮酌定後即會疏題請可也同日又奏為恭謝天恩事竊雍正六年十一月內臣接閲邸鈔臣胞姪原任山東金鄉縣調任蓬萊縣知縣金允彝奉旨補授濟南府知府十二月內又接閲邸鈔臣胞姪原任江南天長縣知縣金允中經臣保舉奉旨引見補授山東濮州知州當俱恭設香案望闕叩頭謝恩訖伏念臣以愚陋忝在封疆夙夜自思正愧涓埃未報今臣兩姪又復頻邀異數受恩愈重報稱愈難臣惟有益加黽勉並不時寓書勉臣兩姪殫心竭力勉盡職守茍臣姪有絲毫不肖不但東省督撫二臣執法難欺但經臣訪聞得實立即具奏斷不容其上負皇恩下背家訓也所有微臣感激私忱理合繕摺奏聞謹奏覽奏知道了朂勉伊等砥礪操守最為切要雍正七年六月初四日廣西巡撫臣金鉷謹奏恭請皇上聖安朕躬甚安今嵗愈覺健壯此皆仰蒙我皇考聖靈佑庇之所致詩云欲報之德昊天罔極朕三復斯言增感曷巳廣西巡撫臣金鉷謹奏為奏聞事竊臣奉旨命往黔省與督臣鄂爾泰商酌籌畫整理地方臣於本年三月二十六日抵黔四月初八日起程回粵與督臣聚晤凡十有二日旦晚講論觀其才猷之卓越器量之淵宏學問之精醇品誼之正直洵無一端不超出於尋常萬萬凡所為體國利民之事悉本之躬行實踐非徒致飾於空言必思及百世千秋不止求全於目下以臣之淺陋不皇上天恩增給養亷銀兩於五月十七日準到部文隨即率同各員望闕叩頭除恭疏題謝外合並奏聞至臣敬陳屯田一事臣亦面告督臣督臣甚以為宜至添兵一節敬捧硃諭仰見聖心所照雖萬里之外不啻目前其應添之處業巳與督臣商及俟咨會提臣後合詞具題再臣先準督臣咨移攜帶將辨二員平樂協副將胡灝臣標遊擊鄭元文隨赴黔中以僃差委之用及臣到黔時督臣告臣丹江之事俱經平定惟公鵝雞擺尾二寨未下臣觀督臣一切調度悉中機宜諒可指日奏捷故臣所帶廣西將辨無所需用督臣但加考驗仍復令其隨臣回任所有微臣奉旨往晤督臣鄂爾泰商酌事理及帶回將辨緣由理合一併奏聞謹奏凡汝一切摺奏甚屬明晰朕觀覽之下每生愈悅諒非汝言詞之所能致蓋從誠敬中出故能感發朕心也當堅持此志更加勉力勿致日久稍懈同日又奏為奏聞事竊查廣西麥秋收成臣於回粵中途據各屬稟稱凡有麥田之處四月間俱已收穫麥秋豐碩足有十分又自春夏以來各屬雨澤俱皆應期到處霑足目今秧禾密布甚為蔥鬱可觀繼此時雨如前應期秋來粵右收成必有盈寧之慶也再臣經歷黔中歸由湖南一帶地方二省麥收俱屬豐稔亦且雨暘時若惟常德一府雨水稍為不足然臣由該郡起身之日業巳得雨隴畝之間各處歡欣鼓舞此皆由皇上盛德感召福庇羣生故三省地方無非太平景象理合據實奏聞謹奏據奏雨澤應期深慰朕念至若收穫必待秋成方敢釋懷也同日又奏為奏聞事竊泗城府田畝一節先準部咨行令丈勘升科經臣會商督臣鄂爾泰以邊方甫定未便紛擾令其暫停丈勘兹將泗城應納錢糧面同督臣商酌查泗城江南內外哨現存原額報部錢糧止七百二兩零土府每年加徵加派及陋規凍銀等項每年約共六千四五百兩今改流之後添設官兵衙役數倍於前俸餉殷繁額糧太少不敷抵兑自應酌量加增除土府婪派入巳之項槩議革除外其原係地方經費必不可缺者共酌存銀四千餘兩作為正額按年徵收臣等商議該府錢糧新經定額開徵又江北地方係歸黔省永豐州轄屬必須彼此均平輕重得當使小民踴躍輸將方可遵行永久今一面先將應革陋規及應納錢糧數目會同出示並令該知府家喻户曉使土民自行完納自本年錢糧果能依限全完再行具題倘有應行酌減之處即會同酌減但期妥協不執成見緣係錢糧定額恐一經題報未便更改不得不慎重於始也至泗城府雍正六年原額錢糧七百二兩零因規制未定兼知府先後更換並未徴收例宜帶徵但新定之地新舊併徵恐邊愚不能深悉似乎賦額繁多可否徵其新糧免其舊糧特恩出自睿鑒再官莊等田先經原任撫臣韓良輔題報每白收米五百斤現貯米二十六萬三千斤可賣銀二千餘兩並請將清出官田變賣售主等語當飭該府將官莊出示召買至今並無承買之人臣等細查土府官莊田共五百二十六白分與各亭里民出力耕種每白派收穀一千斤二榖一米折算每白收米五石但土屬所種一白止比內地畝半二畝不等以畝半二畝之地勒供五石租米原係土府派纍亭民之苛政今若每白定額收米二石五斗似屬民力之所能供除遵旨量給岑映翰存祀田一百二十白及水衝荒田六白外尚餘官莊田四百白應每年按白收米二石五斗一米二穀折算應收穀二十萬斤除發給牛租穀種等項外每年約可碾米九百餘石以供右江鎮兵米至五年分官莊租穀內查有佃丁缺欠穀二十一萬五千一百九十斤計折米一千七十五石零俱係種地窮民力難完納徒費敲撲轉益紛繁又土官之母借支過穀三萬斤計折米一百五十石係在未奉改流以前現蒙恩賞伊子岑映翰祀田則此項亦應免追庶邊鄙窮民咸沐洪恩浩蕩而新額錢糧亦易於催收矣所有臣面同督臣鄂爾泰商酌經理泗城府錢糧事宜并懇請皇恩之處理合備細奏聞謹奏所奏六年分額徵錢糧五年分缺欠租穀均豫寬免與督臣鄂爾泰會商遵旨辦理可也同日又奏為奏聞事竊臣奏請粵西開採一節本年三月初五日部文到粵令臣會同督臣鄂爾泰查明辦理兹臣業經回任所有開採事宜容臣節次妥辦後再行會題而委任官員最為緊要查按察使元展成才猷敏練諸事精詳而錢局一事尤為熟諳臣謹將鼓鑄及銅礦令該司總理其芋莢山官開之金礦更屬要地查蒼梧道張體義賢能素著操守可信臣將官開一事令該道總理但總理雖委該道而管辦工程尤必於地方官中擇其才守兼優之員重其責成在梧州府袁機亦可委用但該府業已管理稅厰恐難兼顧令梧州府同知專司其事甚為妥便而部選同知陳圖尚未到任復準部咨該同知員缺許臣題補兹看得桂林府臨桂縣知縣劉永濬才堪肆應操守亦好臣擬將劉永濬題請補授梧州府同知其新選同知陳圖到任另為調補他處臣在黔時亦巳與督臣商定至各處開採所需辦理之員或於發粵試用人員內或於現任正雜官內擇其有才有守者一一派委其一切礦務統容臣咨會督臣鄂爾泰後再行繕疏題達總之開採一事司臣元展成皆極熟諳臣可以悉心酌辦可免無數耽慮臣益仰頌皇恩任用得人私衷感激尤非陳奏所能悉也所有分委司道督理開採情由理合先行奏聞謹奏但樂與正人共事何務不克辦集也同日又奏為恭繳硃批奏摺事竊臣本年二月初四日恭進奏摺奉有硃批伏思臣駑駘下質荷蒙皇上逾格隆恩雖竭力辦公思圖報效究恐為才識所限未合機宜用常惕然五內乃蒙皇上溫諭包容寓以鼓舞跪讀之下倍切悚惶臣惟有益加奮勉不敢稍有一念怠忽庶將來不致有大端取咎是則蟻衷之所自警耳至於漢軍貪風睿鑒照臨洵足令為臣子者人人汗下竊念君父之前茍有不堪上達者固不可故為粉飾茍有稍可自信者不行上達亦非股肱一體之意臣生性硜介取與必慎不惟居家自甘淡泊即筮仕亦然蓋臣粗知事君致身之義所重原不在此此實臣之可以自信可以直陳於皇上必不敢有所背負者也然有初鮮終人之通患歷來人臣中豈無始而潔清自好後來忽成貪黷者此其始念必已出於偽飾或勉強而未底於自然故不能不久而變易今臣即不敢偽飾亦豈敢遂謂自然幸奉皇上諄切訓諭臣得以朝夕警凛口誦心維務期百年之久此念常如一旦庶異時附於青史之末亦得稱為良臣何莫非皇上高厚之恩有以覆載而曲成之也所有奉到硃批奏摺理合恭繳謹奏勉之勉之覽汝所奏朕若竟言盡信無疑則為誑汝之詞矣止據汝目下所立之志而論通篇無一字虛假亦屬誠然但人事紛雜外緣之搖奪莫測此中之遷轉靡常日異月新千變萬化非大丈夫豪傑安能期其終始不渝也設不能兢業自持勉圖上天許一是字以默邀神明之佑助徒恃血氣之性得失榮辱之心而欲成就千秋不朽之業恐不易得至若言顧行行顧言險易一如操存由巳斯乃賢聖工夫豈常人境界汝其勉之譬如伐木能拔其本則枝葉不剪而自落矣但當務本可也同日又奏為遵旨事本年五月二十五日廣西駐京提塘喬殿元齎捧上諭九本到粵臣當即出郊跪迎入署並接得內閣大學士等移會本年三月二十四日奉旨所有頒發上諭每省應發若干爾等酌量頒發令該督撫將軍提鎮等轉飭各屬廣行宣布務使窮鄉僻壤家喻户曉欽此欽遵將齎到上諭九本除臣恭領一本外隨即分發提臣布按兩司臣左右江兩鎮臣學臣各一本又樣本二本隨發與布政司照式刋刻印刷分發各道府州縣並交與各提鎮分發副參遊守都司千把等官務令廣布宣傳實力奉行使官吏軍民悉皆喻曉無或遺漏之處竊臣前閲邸鈔知有湖南逆賊曾靜造為逆書一案究未僃悉逆賊罪狀今跪讀聖諭始知逆賊之狂悖凶頑誕幻怪異實為耳目聽覩之所不及擬其罪名於律例竟不勝誅比於惡獸之窮竒殆為更甚此在凡有血氣之人聞之無不髮衝齒碎有不共戴天之恨固不獨大小臣工也所有頒到上諭遵旨轉發文武各官及行令刋刻緣由理合奏聞謹奏既遇斯等窮竒不得不有一番處置傾耳以聽朕結此案可也雍正七年七月二十一日廣西巡撫臣金鉷謹奏為奏聞事竊查湖南江華縣鴨頭源張家寨兩案盜犯臣前後準到湖南撫臣王國棟咨移據夥盜供出廣西盜犯共五十一名當經嚴飭各該地方文武官辨協力設法擒捕業經陸續拏獲四十九名押解赴楚所餘未獲二名仍在屣緝其湖南道永等州及廣西富賀二縣係楚粵接壤之處現在兩省督撫臣咨商設置兵汛官員以資彈壓容臣等商定後即當會題合併奏聞謹奏此兩案盜犯緝獲如許名數殊屬勤敏可嘉之至同日又奏為奏聞事竊本年三月十九日準廣東督撫二臣咨移廣東採辦萬年吉地楠木議由廣西一路運至湖廣臣即預檄經過各地方官敬謹小心協理接運兹廣東海防同知李達德運送圓方楠木共二百八十根塊另鐵梨木九件於六月十七日入廣西之梧州府於二十一日開船雖泝流而上每日俱得順風於七月初四日即抵桂林府臣隨出郊祗迎親看旋於初六日祭江自省開行共船八十隻運送前進由靈川興安全州一路送至湖廣隨據興安縣具稟到臣初八日船抵陡河是時陡中水淺該縣正恐船重難行是夜四鼓忽大雨滂沱陡水頓長順水順風直行無滯兩岸田夫野老無不仰頌皇上福隆德盛感召天和是以時雨應期溪流效順而一時在事官民莫不同沾聖澤於無疆也除將楠木入境情節另疏題達外理合奏聞謹奏覽奏時雨應期溪流效順乃汝之誠敬所感與朕何涉雍正七年八月初一日廣西巡撫臣金鉷謹奏為恭繳硃批奏摺事竊本年六月初四日臣繕進奏摺蒙皇上硃批請安摺內朕躬甚安今嵗愈覺健壯此皆仰蒙我皇考聖靈佑庇之所致詩云欲報之德昊天罔極朕三復斯言增感曷巳欽此欽惟我皇上乘乾不息應地無疆以德潤身積中發外微臣跪讀之下依戀愚忱不勝歡欣舞蹈伏思天人之理一氣相通慈孝感孚至微至顯所謂文王陟降在帝左右者此也而皇上一言一事無不推溯本源時時感念聖祖詩云永言孝思孝思維則孟子云大孝終身慕父母臣於此益仰見皇上大孝思慕之心永永無窮臣不覺敬捧御批感頌聖德至於欲泣而難名也再臣前奏恭繳硃批摺內荷蒙硃諭諄切訓誡惟在上天許一是字伏念天即理也理之所在一天之所在臣敢不事事盡心務窮其理之至當仰體皇上神聖本天之心以為心無過不及庶幾天高聽卑臣得常遵聖訓有所持循冀稍以副聖明期望微臣之至意耳所有奉到硃批奏摺理合一併恭繳謹奏理之一字原屬至精至要無如世人認理不明説理各異有偏執巳見自信以為得理者有巧舞私智牽合陳文以強詞奪理者有錯會先賢之意反以背理為理者有被庸師邪友蠱惑謬以似理非理而指為理者種種不可枚舉朕意不若一誠字之無可遊移辨論也誠字所包之義甚廣公忠敬慎真實無偽俱從中出爾當於是勉之雍正七年九月二十四日廣西巡撫臣金鉷謹奏為奏聞通省年成事竊廣西一省早晚二禾收成分數據各府州申報前來桂林平樂梧州潯州柳州慶遠思恩泗城等八府所屬均係十分南寧府所屬十分者十之九九分者十之一太平府所屬十分者居半八分九分者居半直隸鬱林州所屬博白北流陸川三縣俱係九分興業一縣八分直隸賔州所屬均係十分直隸西隆州所屬均係九分至於全省穀價俱屬平易自二錢起至三錢一二分而止惟邊遠之西隆西林二州縣價自四錢至四錢七八分較昂於他處臣看得粵西地方即向來平價每穀一石亦須六七錢不等從無如今嵗之亷者再據桂林南寧柳州等府稟報該地所屬俱産有嘉禾自一莖二穗三四穗以至五穗六七穗者每樣呈送到臣臣祗遵雍正五年十月內上諭不敢進獻但事關嘉禾瑞應亦不敢不行陳奏理合一併奏聞謹奏覽奏實慰朕念雍正七年十一月初七日廣西巡撫臣金鉷謹奏為奏聞粵西礦務事竊照芋莢山官辦之金礦據蒼梧道張體義報稱自七月初六日興工至八月十五日節次舂淘金沙共煉毛金三百五十兩零傾得實金三百四兩零查此八十五日內議定在山各官役飯食燈油紙張暨鎚手工匠人夫工價及搭蓋房屋等項通共支用過銀一千四百二十兩零約去金一百七十餘兩尚餘金一百二十餘兩又據該道口稟九月分內共得毛金二百十七兩零除去工本可餘毛金一百五十餘兩較前所獲巳多臣僃細查核大約龍口漸開則金沙愈出而章程既定則工料亦減如遇沙多礦旺之日難以先為計算總期儘得若干據實貯公不使稍有欺隱容開至來歲四五月通算一年所獲臣再行節次奏聞其銅礦一節係委按察使元展成督辦據該司面稟目前雖未值旺盛之時然各處商人巳在紛紛趨赴礦銅成色頗好如開採得法將來自必漸旺計每銅一石給官價銀六兩連水腳盤費到省約需七兩有零向來各處購買雲南銅斤每石需一十三兩今廣西銅斤酌量開爐鼓鑄數足即可轉發他省其所發價值應照依雲南之數雖粵地較近於滇但粵西木炭等費比之滇省工本較多耳至各處銀鉛錫鐵等礦俱歸藩司衙門係布政使張元懷督辦有巳經開採者有現在招商者臣原奏三分抽砂未免仍須人夫工本今臣等公同酌量止照銀鉛數目多寡抽收通長計算究亦相符現今陸續解交藩庫總以各礦利益不齊得砂贏絀亦異俟再開採數月自當妥議畫一統行奏鼓舞祝頌皇仁所有七月以來粵西開採情形理合繕摺奏聞謹奏凡如此舉切勿與爭小民應得之利則分應歸公之項民亦自無覬覦之心據云目下感恩欣躍但利之所在日久未有不欲染指者即司事之人亦未有不動侵隱之念者須於創始之初措置妥協必使上下各有餘步庶幾可保永遠相安如是料理之後倘偶有越分妄為者從而置之於法宵小亦無緣藉口以搖惑衆聽矣總之聽從鄂爾泰之指示而加以小心奉行方無意外之虞也同日又奏為奏聞事竊查廣西慶遠府荔波縣高黑村撥兵駐防一節並直隸賔州上林縣西撫蠻洞𠞰捕積盜一節臣俱於本年八月內奏明在案兹高黑村地方據該府報稱安設營汛事宜一切俱巳妥協至西撫地形甚險巢穴甚多故該犯竄匿奔逃驟難就捕兹據該知州稟報會同慶遠協武員帶領漢土官兵四路堵禦極力窮追先後焚其巢穴數處今賊首樊匡料巳於十月間被官兵殺死賊首樊李王並黨羽樊國響等旋亦擒獲現在取供究擬招解以清積案臣查西撫蠻洞最號險惡久為地方之害今既巳蕩平則賔州一帶量可安靜但善後事宜不可不區畫盡善臣即當會商督臣鄂爾泰妥議安置所有擒𠞰蠻賊情形理合奏聞謹奏所奏欣悅覽焉同日又奏為敬陳倉穀事宜仰祈睿鑒事竊查粵省捐穀分貯各府州縣七十九萬八千石零又各屬常平倉穀四十四萬三千石零又米改穀并社倉穀及各項穀二十九萬三千石零合計共一百五十三萬餘石以大省較之似不為多而以粵西地方情形核之實為過多兼亦處置不當粵西田畝雖云瘠薄而一歲所出敷一嵗之用尚屬有餘可以不全賴倉穀之糶賣而倉穀當日分貯各屬之數多寡又不得宜查地方有通水路者有不通水路者其通水者本處即無所需穀自可接濟鄰封其不通水者僻處叢巖密箐之中而欲運至他處山路攀緣必需肩挑背負如一石價值一兩腳價轉多至二兩其勢萬難出糶是以有用之倉儲置之無用之僻地令其黴浥折耗損物纍官甚非仰體皇上慎重倉穀之至意臣今細將各府州縣逐一分晰又復通盤計算合各項穀一百五十三萬餘石請共貯穀一百萬餘石酌量地方之大小繁僻及通水之遠近以為增減如不通水路不能接濟鄰封止可僃本處之用者減十分之七如地居上遊而路稍迂遠穀貯過多者減十分之二三至南寧太平二府均係南交門户邊徼重地而又據上流之勢仍可接濟鄰省積貯不可不豐今南寧府原貯穀六萬六千六百餘石應增至十萬石太平府原貯穀一萬石應增至四萬石宣化縣係南寧之首邑原貯穀三萬石應增至四萬石崇善縣係太平之首邑原貯穀八千石應增至二萬石至梧州潯州平樂三府均在廣東上流挽運甚便各府原貯穀有四萬餘石者有二萬餘石者今再為酌量大抵俱以三四萬石為率至於桂林府以及臨桂縣雖居省會但該府兼有管糧通判收貯民間改徵之穀現積二萬一千四百餘石且去東省較平梧等府差遠今府倉貯穀七萬三千餘石縣倉貯穀四萬石均屬太多應酌存府倉四萬石縣倉二萬石巳足僃用其餘因地制宜一一俱量為增減臣合通省計之共貯穀一百六七萬石有零所餘倉穀四十五六萬石概請糶賣以充兵餉是則一變通增減之間平時過多之穀不致黴浥國家之積貯顆粒皆歸有用而地方彼此無不適均矣臣前在黔省業與督臣鄂爾泰面商相合但倉儲係臣專責若非通長計算妥當斷不敢草率奏聞今悉細行籌畫謹抒一得之愚伏祈皇上睿鑒如蒙恩允臣再當繕造細册恭疏具題以聽部核謹奏據奏增減存倉積穀此事當與督臣鄂爾泰商酌為之朕之自信有時尚不及信鄂爾泰之深舉凡地方諸務一一虛懷咨詢心悅誠服率屬力行未有不允協就緒者若必欲自見所長少立異同試行看未有將來不貽後悔之理朕實有所見云然非目下信任太過而故為偏論也如汝等何嘗不是亦未有不善處第較之督臣鄂爾泰其間相去奚啻什伯為人臣者必邀人主如是見重方不虛負一生宜勉力效法之然此非可以力求惟克盡一誠庶幾有效朕之觀人實另有一番至理設不能竭其誠純其忠致其敬極其公徒恃學問本領聰明作用盡力於揣度迎合而欲希朕如是信重則誤矣勉之勉之同日又奏為恭繳硃批奏摺事竊本年七月二十一八月初一二十八等日臣三次繕進奏摺先後蒙皇上硃批到粵臣一一恭捧跪讀伏覩天語周詳無微不到特將臣恭繳硃批摺內天即理也理字改為誠字並僃將謬認理字之弊分晰宣示總以一誠為指歸臣反復體味頓啓愚蒙竊思自昔聖賢教人無不以誠為切要一經皇上闡發益知聖學之傳千秋相印而又揭出公忠敬慎四字為要旨俾愚臣有所持循仰見作君作師之心諄詳懇到臣實感激難名惟有敬遵聖訓時加省察斷不使有一念虛妄相參至負我皇上造就微臣之至意耳所有三次硃批奏摺理合一并恭繳謹奏時加省察甚好應如是自勵勿懈金允彞負朕之恩辱汝之面不解伊具何肺腑忍如是自暴自棄也遇斯等薄福小人竟無法可施雍正八年二月初四日廣西巡撫臣金鉷謹奏為奏聞事竊督臣鄂爾泰請旨巡視粵右地方於雍正七年十二月十九日抵臣駐劄之桂林府臣於聚晤將匝一月細察其精神氣皇上德至福隆上天默佑賢臣以佐聖主臣心不勝欣慶所有商酌事理臣俱面為僃細咨問凡臣所識見未到之處一經剖示無不洞然明決其古州諸葛營用兵一節先經調撥廣西提鎮兵一千二百名業委慶遠協副將潘紹周總統前往續又撥臣標兵三百名並賓州營兵二百名令桂林協副將董芳帶領赴平宇地方堵禦以防凶苖逃逸臣查黔省黎平府屬有都江河道上通都勻下達粵右督臣欲開通此路以便商賈往來恐未就撫之山苖不無阻撓生事必當使之中心帖服懷德畏威而後可為永久之計故因通河一節奏覽同日又奏為奏聞事竊有賓州來賔縣獞民韋學祖素行不法姦占虜掠殺害一家數命來賓馬平等縣俱有犯案久經地方官嚴拏而該犯恃其山洞深邃人迹難到日久未獲兹嚴飭各官設法購緝巳於雍正七年十一月內拏獲現在嚴審分案具題又來賔縣獞民覃妙印於雍正五年六月內因仇用鳥鎗打死遷江縣民婦盧妭石六年四月內覃妙印巳經拏獲有土舍石良玉糾集黨類搶回覃妙印歷久未獲業將此案彚題飭令文武各官嚴拏審解兹巳於雍正七年十二月二十八日拏獲現在檄行審擬具題以上二犯皆係積久稔惡之土霸今俱節次就捕則地方良善可以寧謐理合一并奏聞謹奏稂莠不除良苖不長能使凶犯不致漏網可嘉之至同日又奏為欽奉上諭事竊臣奉到上諭京官自學士侍郎以上外官自藩臬以上各密保一人將其人可勝督撫之任或可勝藩臬之任據實奏明欽此臣謹遵奉諭旨據臣所知密為奏薦緣有廣西按察使元展成共臣辦事以來觀其居心制行實為公正亷明每與議論或試於不經意之處其器量亦甚開拓識見亦甚精到據臣之愚似可勝撫臣之任但目今粵西諸事臣正相資為治而銅礦鼓鑄又係該司督辦如蒙皇上天恩不以臣之薦舉為謬或稍緩其擢用俟粵西諸事就理是又臣之私衷下情懇祈睿鑒者也謹奏所薦甚是今巳將元展成擢授藩司矣但伊曾經具摺懇恩稱伊父年近八旬朕深為惻念正在與鄂爾泰商酌尚未降旨其所督辦各務計需幾多月日始可就緒爾其奏朕知之同日又奏為恭繳硃批奏摺事竊臣前恭進倉穀奏摺奉有硃批伏念臣本庸陋蒙皇上天恩訓勉委曲教導復指示以當前可法之人令臣視為成式有所遵循君父之期望臣子者至於如此之極而督臣鄂爾泰為人自蒙效法臣之服膺督臣實出一念之篤摯故諸事無不乞其指示在督臣亦不以臣駑下凡是非可否俱無不推誠見答所有倉穀事宜督臣抵粵之時即據臣之所見面為商酌隨將奉到硃諭鈔示復將全省倉貯數目僃列清單送其查核如謂可行臣即會同題請如不可行自毋庸議若臣稍立異同以分彼此非惟事之所不敢出實亦識之所不容強也又臣奏聞開採一摺奉有硃批竊惟督撫之責察吏為先臣因礦務所委人員頗亦各能盡力遂爾過信冒昧陳奏一經恩綸指點再三體味不覺倍常悚栗從此惟有益加精警無致為屬寮所欺有負皇上澄清吏治之至意至於開採一事今粵西係屬創始一切事宜悉皆咨商督臣大概仿滇南成例酌行今復奉到硃諭臣益當盡誠致敬一聽督臣指示總期上下咸宜官民胥便既不失之疏漏亦不傷於刻核庶有以仰體皇上大公至正惠飬羣生之聖心耳所有硃批奏摺理合一并恭繳謹奏所奏俱悉至於察吏之道萬不可預立成見不逆詐亦不逆不詐是非得失因其來而應之方合中道勿以今日之是遂定異日之必不非勿因此一事之失遂疑將來事事之皆非日日留意事事體察則是者愈可著其是非者何由掩其非粉飾自得者莫能售其詐疏忽偶失者猶可贖其愆不寧惟是即上智下愚不移者亦可以真知灼見其隱微也偶因一時所見遽定棄取於胸中豈不謬哉思之志之同日又奏為恭懇天恩事竊臣看得梧潯二府俱為粵西緊要地方查潯州府知府秦休雖恪守官針而讞斷無才不宜知府之任臣巳與督臣鄂爾泰面商於甄别案內會題歸部補用至梧州府知府袁璣居官亷潔亦能辦事但梧州原係劇郡近兼關稅礦厰則今日之梧郡實非袁璣之才所能兼顧昨督臣至粵臣僃悉面為商酌並乞督臣揀擇二員題補梧潯兩郡督臣細為籌畫亦謂一時難得相宜之人惟稱威寧府知府吳士鯤用於梧郡開化府同知楊正輔用於潯郡甚屬妥當前原擬用之粵西緣廣東督臣郝玉麟赴任之時請帶官員四名吳士鯤楊正輔業在帶往之內以此甚費籌度臣因梧潯二郡急需妥員遂札致廣東督臣從公商議嗣據郝玉麟回札云題帶之員原令出力報效朝廷今在東在西均無不可况兩粵共一鹽務該府得人亦同一體其應摺奏具題之處令臣酌行據此則廣東人員似巳足用臣為地方起見用敢繕摺具奏恭懇皇上天恩將吳士鯤楊正輔二員準於粵西梧潯兩郡補用不惟臣等得人相助其於地方吏治實實大有裨益再袁璣一員仍懇留於粵西容臣會商督臣鄂爾泰酌量題補更荷天恩於無既也為此繕摺奏懇統祈睿鑒施行謹奏照所請行巳有旨諭部矣同日又奏為欽奉上諭事雍正七年十二月二十二日接準部咨臣姪原任山東濟南府知府金允彝為負恩藐法抑屬婪贓等事經河東總督臣田文鏡參革奉有諭旨訓戒各省督撫頒發到臣隨荷蒙硃批金允彝負朕之恩辱汝之面不解伊具何肺腑忍如是自暴自棄也遇斯等薄福小人竟無法可施欽此竊臣姪金允彝自蒙特授濟南知府以來臣不時寓書飭勉痛切諄詳幾於披肝瀝血即臣姪家書稟覆亦自言矢心竭力勉為好官以報皇上知遇豈知其口是心非言行相背上而負國下而欺臣竟至於此臣於聞信之下愧恨羞赧誠不料臣之家門有如許贓迹纍纍如金允彝其人也至督臣田文鏡向任山西藩司臣時為太原知府其公忠鯁介之性本臣之所深知即臣之駑下亦頗為田文鏡所許前臣蒙恩升授廣西按察使便道過豫以舊屬禮進謁見其一飯之間言及皇上隆恩感而垂涕者至於數次似此存心忠愛之人豈有屈抑國家人才之事臣於參劾臣姪一節益覺倍常敬服不惟不敢稍存嫌隙以蹈背公營私陋習亦不忍萌此無耻之肺腸甘自暴棄於聖世也兹因奉到諭旨理合據實奏聞謹奏所奏朕甚嘉之不但為臣之道為人之理應如是興福造孽之基正在於斯親友子弟猶屬他人即已身被參亦當返省自責豈可妄生仇恨似此居心方可謂之為大臣若區區惟以恩怨報復為事則屬小人之常態何堪受寄封疆重任耶果如所奏毫無嫌隙自必仰邀上天神明之鑒佑朕生平實能恩怨不介於胸懷數十年來為皇考之所洞悉是故每以不宿怨三字許朕也此係內廷人所共知汝或未之聞耳雍正八年五月初八日廣西巡撫臣金鉷謹奏為奏聞事竊查廣西省二麥收成據各府州陸續具報前來有八分者有九分者有十分者臣通行計算約共九分以上其各屬現在米價每石自四五六七八錢以及九錢八九分不等所有廣西省麥秋收成暨時下米價平和理合一併奏聞伏祈皇上睿鑒謹奏深慰朕懷同日又奏為遵旨奏聞事本年二月初四日臣奏薦升任按察使元展成摺內奉有硃批仰見皇上聖明屬在賢員久經睿鑒而且愛養人才體恤臣工之至意無不極盡周詳委曲臣伏讀之下不勝感頌伏查開採之舉原以惠民通商既欲下達輿情復欲清查弊竇非智慮周詳隨事設措則斟酌損益之間不能洞中機要如該司元展成者實不易得兹該司蒙恩升授廣西布政使方經月餘所辦各處厰務以及查荒修河等事悉能盡心籌畫臣正在相資為治乃復奉到恩旨因該司之父年齒老邁惻然厪於宸衷凡為臣子者聞命之餘應無不感至欲泣仰頌聖德之難名臣查該司之父年巳七十有五而步履服食甚為矍鑠膝前雖無子嗣侍奉其孫男二人俱中巳酉科順天鄉試悉能搘持門户臣愚謂該司欲申孝養之情亦可迎至任所定省晨昏既不廢人子之禮而辦理公事上報主知亦不負皇上數年以來整飭邊方之至意則得人之效又不止開採一事而巳也伏承天語下詢諸事就理月日以臣之愚何敢臆度今該司又蒙恩升授藩司謹仰懇皇仁垂念臣之蟻衷惟欲得人相助恭祈睿斷謹奏殊可謂不體情之至也同日又奏為奏聞暫緩鼓鑄情由事竊查鼓鑄制錢一節屢經準到部咨即臣奏請粵西開採摺內原擬得有銅斤即行鼓鑄俱蒙皇上睿鑒但審度時勢因地制宜似亦有宜於變通者查粵西制錢經督臣鄂爾泰題請以雲南所鑄制錢運供廣西等省搭放兵餉又經左江鎮臣齊元輔條議每年撥發滇錢六萬二千餘串運至廣西悉皆奉旨遵行無如蚩蚩之氓漢苖雜處狃於積習行使舊日雜錢巳久非不嚴行禁止而小民究若強其所難兹據布政司具詳前來臣等細加籌畫欲行鼓鑄必當先去雜錢欲使知雜錢之非宜當先使知制錢之可貴今議本年徵收火耗許令銀錢兼輸將來徵收錢糧二錢以內者皆許以制錢完納如此則凡有錢糧者咸以制錢為便行之既久必視雜錢為棄物不用别行嚴禁自爾日散月消將見制錢日益流行是亦疏通之一法也查滇省所運制錢巳有六萬二千餘串而本省又為設法疏通則粵西鼓鑄似可暫緩現在廣東採買銅斤仰資於廣西甚急即將粵西所産之銅轉售於東省俾三省皆無有餘不足之患雖與臣之前奏不符實宜因時而酌盈劑虛者也所有暫緩鼓鑄情由理合繕摺奏聞伏祈睿鑒謹奏總與督臣鄂爾泰商酌行之同日又奏為奏聞事竊臣接到大學士公馬爾賽等來字雍正八年四月十一日奉上諭爾等可將憲德奏摺及所取供單鈔録密寄與廣西巡撫金鉷將王廷鈞等即速查拏務獲解送四川審究勿令逃脫欽此欽遵刻即密傳臨桂縣查拏據該令回稱廣西省城果有王廷錫查即王廷鈞原係辦理廣東銅務之人今王廷鈞並不在寓訊之鄰佑先於四月二十四日巳經他往並不知其去處等語隨又面飭該令查明該犯蹤迹自何路逃去旋據該令查明五月初一日有人於全州河中見該犯坐船二隻前赴湖南地方臣星即遴委把總高麟帶領兵役並認識之人沿途密緝務期拏獲解交川省但該犯行蹤詭祕既代廣東升任驛鹽道黃文偉辦銅或再回東省亦未可定仍密札致廣東督撫二臣轉飭查拏所有奉旨密拏王廷鈞等緣由理合奏聞謹奏高麟如能將王廷鈞尅期緝獲當越格奬賞示勸觀其材質酌量應得之缺或即於汝撫標下指名題補將伊效力情由於疏內聲明可也雍正八年八月十八日廣西巡撫臣金鉷謹奏為奏聞事本年七月初六日臣轅門外忽有一人自持紅紙單帖上寫真明天子劉芳傑拜口稱特來拜臣當經員役人等拘拏隨發與兩司勘問據供原籍江南六合縣人自幼即到河南固始縣雍正二年跟隨奉議州州判邵銓來至粵西雍正四年該犯復回河南本年正月邵銓有字到固始云該犯之母身故令該犯來粵搬柩而該犯即於正月間為邪祟所憑自云常有神道在其頭上以故來到廣西妄行至此隨查拘同舟客民方漢三胡耀章二人訊問同供該犯原係邵銓兒子邵子璉託其帶來曾説該犯近日有些著魔的樣子正月裏曾經自縊不死夜間往往向空中叩頭你們水面上須為留心及至帶到舟中他總不説話每日兩飯外只在艙內熟睡六月間到全州地方忽自搶拏行李奔跳上岸一時追趕不及不知他竟到省城如此行為等語據此臣復親提嚴訊實係瘋魔毫無可疑之處臣又差查州判邵銓令其僃細具陳原委但該犯即係瘋狂於他事可恕光天化日之下豈宜怪誕至此若復丐以餘生恐好事者因其不死轉致惑亂人耳目臣愚俟州判邵銓回覆到日確無疑惑追求之處即於廣衆之中盡法處死以警地方為此繕摺奏聞謹奏如果確係瘋病何必處死但隔數千里外朕莫審其真偽要在汝合情凖理而為也同日又奏為據實陳明恭祈睿鑒事竊臣姪原任山東濟南府知府金允彝經河東總督臣田文鏡列款糾參臣聞信之後深恨臣姪不肖曾經繕摺具奏業蒙皇上天恩鑒臣愚悃臣之所以痛恨臣姪信其參款之不虛者實緣臣姪平昔恃有微才每多矜傲因是不為臣所深取而督臣田文鏡之公忠鯁介又屬臣所素知是以彼時據情直奏臣並不敢有所矯強稍不本於中心之誠也兹據臣屢次密訪合之臣姪家稟其中情節臣實有不能無疑者緣臣姪與按察使唐綏祖平日辦公上下抵牾致成嫌怨今臣姪參款聞係唐綏祖開送又聞臣姪被參之後濟南士民轉稱臣姪清正有扼腕可惜之辭四月間在城隍廟中兩次研審臣密遣體訪之人雜於稠衆之內見一時觀者甚為稱屈而臣姪惟口頌皇上聖明僃辨寃情不甘屈服問官因藉口請刑另日再問含混罷審是衆好在所必察而妒口亦屬難憑臣不敢定臣姪之即為好官實亦不敢定唐綏祖之所惡果否足據此臣心之不能無疑者也尤可疑者臣姪管宅門家人原係李文其王保乃一少年蠢僕不過相幫使用諸款理宜審訊李文今則舍李文而獨訊王保即云説事過錢係是王保亦必當面質對明確然後足以服人乃王保自拏去之後臣姪屢求與王保對質問官總不令之見面而亦無他駁問之語第云制臺訪聞豈肯認錯又云這樣口供如何敢回稟臬臺問官口吻似此成何信讞據臣之愚督臣田文鏡之察吏更復何議或者耳目未周據傳聞之過甚耳再聞督臣田文鏡牌飭續訪肥城縣朱曰琯之妻自縊一案未經續參將案內人犯即行連夾數次俱無口供致案內之陳夫公及牽連之王公明周之翰等先後或經刑斃或經監斃臣不惟有疑亦且不忍徒以臣姪之故纍傷多命伏乞皇上天恩遴選公正大臣一員赴山左審訊定案如臣姪婪贓是實毋論數之多寡立即正法以警貪吏免致拖纍無辜如或婪贓涉虛臣此時不言伏惟皇上聖明無微不照一經察出降旨詢問到臣則臣將何辭奏對臣以此益深悚懼用敢密攄愚悃繕摺奏聞並將臣姪家稟二函鈔録上呈伏祈皇上睿鑒謹奏知道了候另有諭旨雍正八年十一月十五日廣西巡撫臣金鉷謹奏為奏聞事竊太平府屬寧明州之鄧橫寨劫掠為非經提臣張溥委思恩協副將尚清領官兵一千九百名前往𠞰捕後又添撥兵四百名於八月初一日抵該寨地方乃該副將不察機宜舉動輕率於初二日即行進攻不但不能入寨反致虧損兵丁自此之後遂束手無䇿臣與督臣札商令左江鎮臣齊元輔赴軍前辦理而鎮臣即於九月初一日親抵該寨又帶兵一千零八十名亦復無䇿至十月初十日四路進攻據報巳攻進寨柵二層緣該寨堅完再難進步是以不能克捷官兵又多傷損臣查該寨有三共聚一處有四甲六甲九甲之名內外箐密墻堅塘深徑窄固難驟進但周遭不過三里又無崇山峻嶺其人數合婦女幼稚不過千人強橫者不及四百人如鎮臣果有智術審機度勢豈有不破之賊巢乃一味觀望不進以為持重及至無可如何始一往奮攻徒致損傷多衆則鎮臣等庸鄙無謀事定後督臣必有措處但以大帥經臨相持三月之久合漢土官兵數至六千以外攻一彈丸村寨不能計日成功目下即至蕩平業巳曠廢時日損傷兵卒也所有鄧橫寨軍務情形理合奏聞謹奏令汝親往亦未必能計日蕩平或恐尚清之不若也間坐評論原屬甚易觀汝此奏情形軍需糧務必有料理不妥以及遲誤之處同日又奏為恭繳硃批奏摺事本年十一月初一日接讀邸鈔欽奉上諭將臣姪原任山東濟南府知府金允彝被參一案命侍郎臣劉於義牧可登會同山東巡撫臣嶽濬秉公據實審明定擬旋於初四日接到臣八月十八日奏摺奉硃批知道了候另有諭旨欽此竊思臣姪被參八款列狀多端伏蒙我皇上至公至明不偏不倚特差大臣審定其案情之虛實自難逃皇上睿鑒然在臣此時跪捧諭旨實巳感頌聖恩涕泗交頤不能形於言語所有微臣感激私衷敬因恭繳硃批奏摺一并奏聞謹奏此事恐致纍及於汝亦未可定何謝之有雍正九年三月二十八日廣西巡撫臣金鉷謹奏為恭陳愚悃懇請陛見事竊臣於雍正五年九月內引見之後抵粵以來業經三載有餘犬馬戀主之心時形寤寐本擬於雍正八年秋冬之際繕摺懇請陛見不意鄧橫蠻賊拒捕致動官兵出𠞰不敢遽行奏陳今查行間事宜該寨被圍巳久計窮勢蹙蕩平之期諒必在即其古州軍務業經大為懲創現在各寨俱巳陸續投順俟布置妥協之後即可班師回粵至所需用兵糧臣等從長計議現今造就船隻運送古州往返甚便可以無誤伏懇皇上天恩允臣陛見俾臣得以仰覲天顔恭請聖訓庶數載依戀下情藉以稍抒萬一為此繕摺奏請伏乞聖恩批示謹奏觀汝心行甚不似從前謹慤總之私念一萌舉凡聰明見解悉生障礙況原係中才自不能不隨境遷移於金允彞之陳明則汝之心迹畢露矣於張體義之參劾則汝之愚私彰著矣著意開採操守可知矣諱盜縱姦隱飾可見矣汝等督撫每至自覺不妥自信不及率皆有陛見一請朕實覽之厭矣嗣後若再不痛自改悔懇求陛見得乎慎為之同日又奏為恭繳硃批奏摺事竊臣齎摺家人回粵捧到雍正八年十一月十五日臣恭進奏摺荷蒙皇上硃批訓諭並大學士公馬爾賽等宣傳聖訓寄字申飭臣跪讀之下不覺手足戰兢伏地不能起立反復內訟慙懼悔恨直無一隙可以自容至摺奏按察使張體義一節原因該司自升任以來性情忽爾躁妄是以據實奏聞乃竟不思臣於該司本有不能教導屬員之咎又復詞語支離煩瀆聖聽再四查看原摺愧汗交流臣更無一辭可以自解謹遵旨敬將聖諭及臣摺奏情由知會督臣鄂爾泰前去兹接到督臣回字深以不識大體切責臣躬臣惟有敬遵聖諭隨時勉力逐事警心庶有以稍贖前愆之萬一所有奉到硃批奏摺理合恭繳謹奏愧汗交流亦復何益返躬自省改悔自新為上雍正九年七月初六日廣西巡撫臣金鉷謹奏為恭謝天恩事本年七月初三日準到吏部咨欽奉上諭將臣前題酌遴現任教職等事紅本擲還到臣跪讀之下惶悚交并惘然莫知所措竊臣智慮粗疏識見短淺妄擬於教職之中遴選民社之寄彼時卑陋愚衷自謂可示鼓勵而不知訓士理民之大法封疆學政之專司一為悉心推究則其悖理之處甚難枚舉今經皇上聖明指出臣始知奏陳之妄事涉沽譽追悔無從荷蒙高厚隆恩不即加臣罪譴愧恨之餘倍深感頌惟有益加刻責以冀力圖補過於將來耳所有微臣感激私衷理合繕摺奏聞謹奏但恆於此等處倍深感頌則朕不為誤用汝矣同日又奏為奏聞事竊廣西通省年成查四月間麥秋登場在處豐稔目今早禾巳割高下悉皆豐收容俟晚禾續登之奏再本年五月二十九日慶雲現於南寧府業據該地方官詳報題明在案兹又據左江道轉據南寧府隆安縣暨土忠州詳報並繪圖前來俱於本年五月二十九日自卯至巳仰見日麗東升慶雲環繞繽紛五色輝映三時中復結為異彩宛然山字一時居民以及猺獞莫不歡呼稱慶跪祝皇上萬夀無疆臣查隆安在南寧之西北忠州在南寧之西南相距各三百里而遙同時呈億萬年之瑞遠邇咸瞻具見恩光普被苖蠻共仰益知聖澤無私緣其報到之時巳在題達之後是以不及一并上聞理合繕摺具奏統祈皇上睿鑒謹奏莫非金鉷之公忠所感召也與朕何涉實觀之厭矣同日又奏為恭繳硃批奏摺事竊臣前奏恭請陛見摺內欽奉皇上硃批訓飭痛切諄詳仰見皇上天心不即置臣於不屑教誨之列再三跪頌感激難名臣之愚見竊以職任封疆巳逾三載理應懇恩陛見仰覲天顔適值臣志慮昏蒙之時誠如奏臣姪金允彝被參婪贓一案業經欽差大臣劉於義等審明奏陳按察使張體義之事現在奉旨交與督臣鄂爾泰審理俟督臣審定之後所有臣與該司意見之公私悉惟皇上睿斷而該司揑揭臣以每每諱盜之名臣固不能恩升授粵撫三載於兹凡各屬詳報劫盜前來無不嚴飭查拏務在必獲茍有實心緝盜之員無不加意奬賞以示鼓勵計此三載之中合前撫臣任內盜案及臣任內盜案經臣歸結者共拏獲強劫盜犯巳六百二十餘名故在今日雖不敢謂盜賊全無而較之從前直不啻十減七八目今商賈行舟隨地皆可以泊宿是盜風之戢必在乎加緊擒拏豈反在乎有意諱縱而該司因伊巳有妄揭之愆見臣題明遂益誣臣以諱盜伏惟皇上聖明如臣果有治盜疏懈之處但求密俞旨當即允臣所懇自開採以來官辦商辦各礦合省貧民沾被聖澤者殆不可以數計臣於各處礦務但有推廣皇仁嚴絶弊竇並未嘗存一覬覦茍且之念若或有意徇私忍心欺罔默有綸音痛自刻責改悔六字日誦數十百遍不敢一事自寬不敢一時有間務盡血誠至於沒齒庶稍有以硃批奏摺理合一并恭繳謹奏覽雍正九年十月初十日廣西巡撫臣金鉷謹奏為恭繳硃批奏摺事竊臣進摺家人回粵捧到臣七月初六日繕進奏摺蒙皇上硃批訓示臣跪讀之下身心惶悚無地自容伏念臣以愚昧之質膺斯重任省躬思過實滋恐懼屢荷皇上矜全寬宥復隨時隨事訓誡警惕臣感激聖恩之高厚欽凛天語之提撕惟有益加改勉務竭實行畢盡血誠以冀仰報天恩於萬一耳所有硃批原摺理合一并恭繳謹奏亦何必更有所改勉但能如初被擢用時存心立志不變不渝則期望於汝之念足矣同日又奏為奏聞陡河工程情形事竊照興安陡河欽奉諭旨交臣查議經臣將一切應行修理開鑿之處查明確估具題接準部覆隨動支錢糧委員監修現今興安陡河至全州一帶工程業巳告竣其臨桂之鰱魚等陡及雒容驛路亦可即日完工容臣覆加驗看并確核用過工料銀兩統於嵗內具題造册送部核銷再查興安陡河自海陽發源流於縣城北三里之分水塘南北分注北流者為湘江達於三楚南流者為灘江達於兩粵舟楫之利甚廣灌溉之功甚巨宋經略使范成大建海陽寺於北陡之沙洲請封海陽之神為靈應侯每歲九月九日縣官支正項錢糧致祭後因洲被水衝寺宇遂廢基址猶存每逢祭日設位河干似於妥神之道未洽臣仰體皇上懷柔百神報功崇祀之至意并據輿情巳同督臣飭議建復廟宇估計興工在公項銀兩內動支建造嵗內亦可告成臣伏思雍正七年五月內準到部文奉旨查修陡河即於是年七月內恭值廣東運送萬年吉地楠木經由興安之日河水尚淺是夜大雨陡河盈滿不費人力臣以實有神助曾繕摺奏聞嗣後每逢楠木到境無不晴雨應時連檣飛渡刻無停滯兩岸童叟咸稱竒異伏思我皇上誠格蒼穹百靈協應雖視此極為平常而河神連年效順臣不敢不上達天聽臣愚擬於神祠告成之日恭疏仰懇天恩敕賜匾額以彰神功合先奏聞謹奏神祠告成之時應懸挂匾額處及或應加封號一併具疏題請可也同日又奏為奏聞事竊照粵西金銀銅鉛等礦厰自雍正七年開採起至雍正八年年底止所有動支工本及採獲抽收各數目臣已具疏題明咨部在案內金山出産原自無多工力猛鋭搜採無餘業經封閉其採獲共金三千一百四十餘兩換銀二萬五千二百一十餘兩除還工本外計贏餘銀一萬四千六百五十餘兩及銅厰辦獲課餘銅斤除工本各費外約餘息銀五千四百七十兩零又各厰抽收課銀并鉛錫雄黃硃砂等巳未變價共計銀七千九百四十餘兩俱現貯藩庫外今臣復查本年春夏秋三季銅厰官辦及收課餘銅共獲銅十萬三千餘斤除抵還工本外約餘息銀五千七百餘兩又銀鉛各厰共抽課銀六千五百餘兩課鉛十萬餘斤除遵旨賞給通省兵丁陸續支領演習外餘剩鉛斤統俟年底同各厰收除實在各數核算明確於壬子年造報奏銷之時分晰具題所有雍正九年春夏秋三季收獲各礦厰銅斤銀鉛各數目謹先繕摺奏聞謹奏凡此礦厰事務內如有應得羡餘何妨奏明取用朕自當俞允若私行染指涉於欺隱不但為屬員之所挾制日後必有悖出之纍於此須要見透志之硃批諭旨卷二百二中欽定四庫全書硃批諭旨卷二百二下硃批金鉷奏摺雍正十年正月十二日廣西巡撫革職留任臣金鉷謹奏為奏明感激天恩事竊臣前奏各礦厰收獲銅斤銀鉛數目一摺奉有硃批跪讀之下感激涕零臣自任巡撫以來蒙恩添給養亷共銀八千四百兩臣署中儘可敷用何敢再有取用惟是遠在邊隅苖疆重地每有調遣差使文武勞賞捐恤等項衙門體統有不得巳之費用又不應在存公銀內支取者此種所需實屬拮據不獨臣為難即提督總兵除營中公費之外亦不無些微賞勞以勵辨兵再廣西學政舊無養亷每取進文童一名繳送書價銀四兩或六兩不等兩約共銀五六千兩欲俟查明可動之項方敢僃細奏請今蒙聖恩指示正臣子下情急欲伸達之時為此繕摺先為奏明統容臣於查明款項之日酌有可動之項將臣衙門及提鎮學臣添給養亷之處再行奏請所有臣感激天恩及未便遽行奏請情由理合奏聞謹奏汝近日一切所辦多有未協較初任時竟似二人其他猶可倘若操守少有玷缺必至纍及身家性命也將朕此諭謹志勿忘愼為之同日又奏為奏聞事竊照臣標兵丁蒙恩賞給銀六千兩營運生息一案先於桂林省城開設當鋪一座及買米置貨貿易生息自雍正七年八月起至八年年底止實得息銀五百六十餘兩已經咨明户兵二部在案雍正九年四月內收回買貨之銀又在桂林添設當鋪一座本年一年共計淨得息銀六百五十餘兩連前共實得息銀一千二百餘兩將來遇有兵丁吉凶之事遵旨酌量給與濟用臣復查桂林城守一營雖屬提標管轄而駐劄省會與臣標兩營實為一體因咨商提臣張應宗於恩賞提標生息銀內酌令該營先後領回銀二千兩入臣標所開二座當鋪內作本代為營運其應得息銀另行登記俟充裕之日仍咨明提臣以聽均勻酌賞俾得同霑聖澤臣仰體皇上恤下隆恩即將前項銀兩交與臣標中軍一併營運令其悉心辦理務使兵民兩有裨益理合奏聞謹奏盡心經理毋忽同日又奏為奏聞查拏姦匪事竊照廣東偽劄一案匪首李梅在逃同類匪黨竄匿兩省臣接準廣東督撫密咨飛即委員並密諭各該管地方官嚴加緝拏隨據藤縣申報拏獲陳倫美鄧志廣等平南縣申報拏獲曾先生即曾窗賢蒼梧縣申報拏獲玉龍太子曾合即張大鼻等懷集縣申報拏獲陳夢濟陳夢吉錢珍等俱解交東省收審去後臣思粵西地廣山多恐易藏姦貧民愚獞不難扇誘既有此等姦匪必須淨去根株以靖地方因差員密諭將續獲之犯提解到省審究如有供出夥黨即可分路密拏庶免縱逸之虞續據平南等縣將拏獲之羅京相陳彥清韋朝明李滿等十餘名及自行投首之蔡起榮羅新秀等批解前來臣正在研訊間準廣東督撫咨提各犯質審臣即便差撥兵役押解廣東去訖前後準咨查拏之犯三十六名經各縣陸續稟報拏獲之犯已四十一名及搜獲偽劄旗印符書等項俱解往東省與東省案內各犯質審其尚有查拏未獲及續據供出之犯現在嚴飭各屬實力緝拏加意根究不留餘孽庶姦匪無所容匿而愚民永得安全矣所有拏解姦匪緣由臣謹繕摺奏聞謹奏覽奏知道了姦匪剗除不淨日久蔓延則貽害非輕亟當盡力搜緝纎毫不可疏懈同日又奏為奏明收捐開墾實數仰祈睿鑒事竊臣查粵西荒土遵照滇例認墾報捐欽奉俞旨允行自雍正八年十一月十五日開捐起至雍正九年十二月止共收過官生捐墾銀二十五萬九千餘兩又實墾過水旱舊荒老荒田地共二萬六百八十畝俱經成熟升科所有捐墾各數自收捐日起至九年夏季止已經造册報部其秋冬二季現在查核咨送理合先將大總實數恭摺奏聞再照粵西地廣人稀民苗雜處山坡嶺側荒地尚多雖例有招募佃民給與工本牛種令其認墾之條屢經曉諭無如邊鄙愚民囿於習俗惰而且暗承領墾種仍復寥寥若非再為變通難以倡率鼓舞上年十二月內臣據布政司詳稱有荔浦縣革任知縣潘治在臨桂縣地方捐資墾出荒田三千畝巳經成熟當年升科呈請比照營田開復之例具題等情前來臣查粵西事例雖無復職之條而潘治先以保舉生員庸劣革職後以失察家人犯贓革任情有可原人尚可用急公開墾鼓勵邊民實為有益臣業經僃敘情節繕疏具題仰懇皇上天恩準其復任仍留粵西補用俟三年無過再請開復並請嗣後如有罣誤革職官員情願實在墾田者可否亦照營田之例準其開復現在題明候旨遵行倘蒙聖恩俞允則土無不闢廢員得以自效而業歸墾户貧民得有恆産均沐皇仁於無既矣合併奏聞謹奏豈有如是鼓舞墾荒之理乎不學無術何乃謬誤至於此極雍正十年四月十六日廣西巡撫革職留任臣金鉷謹奏為奏聞事竊照廣西本年春雨沾足二麥現在刈穫收成有八九分不等稻田亦已播種秧苖暢茂民間米穀山鄉價值不異上年惟近江通津之處因廣東有湖州碣石等處赴彼搬運市價驟貴來西販運者多因之今春穀價亦覺漸長每倉斗一石自三錢二三分起至四錢五六分不等將來恐致騰貴臣伏讀上諭先事圖維悉心料理酌商預僃查上年動用封貯銀兩採買穀石案內有未經糶賣者遵照部議現在撥補古州軍糈動用之倉穀其已經糶賣之銀飭令解還司庫歸項約計餘息可得六千餘兩臣查賔州所屬地方穀價尚平可以採買即令布政司將賣穀餘息銀兩發交該州酌量採買暫貯或僃本省平糶或接濟鄰封以仰副皇上預籌民食之至意容俟將上年採買穀石一案歸項撥補事竣之日題明造册送部查核為此繕摺奏聞謹奏有僃無患斯為善政覽奏朕懷曷勝欣慰同日又奏為恭繳硃批奏摺事本年三月二十八日臣齎摺家人恭捧臣前奏感激天恩一摺到粵伏讀聖諭汝近日一切所辦多有未協臣惶悚汗流憬然覺悟既蒙洞鑒復荷恩容且以臣之操守上厪睿慮提撕警誡勉以愼為仰見皇上矜全至意惟恐初終易操纍及身家性命臣服膺聖訓斷不敢少存不肖之念上負髙厚隆恩即臣每自念操守亷潔乃人臣之常分必須何顔面以對神人此臣區區微忱惟望聖聰照察者也至於沽譽市恩凡為臣子者若稍萌此念即罪不容誅臣亦熟見此種心涉欺罔之人幽明無不立即加譴臣每深以自戒併以戒人今凛遵聖訓惟有隨時隨事益加愼密不敢稍有冒昧務竭血誠仰副天恩警勉之至意耳所有奉到硃批奏摺理合恭繳謹奏覽奏巳悉務期言行相符為要汝等漢軍習氣每以對神盟誓視同兒戲大率皆然目擊遭報者未經漏脫一人朕殊不解具何肺肝而亦實不能相信矣聽言觀行朕於魯論深有取焉同日又奏為遵旨賞給事竊臣齎摺家人旋粵捧到內廷發出檳榔膏八瓶傳奉恩旨著交與臣凡駐防有瘴氣地方之官員兵丁俱著賞給此檳榔膏能去瘴氣欽此欽遵臣查明駐防各標協營之新太思恩慶遠白色泗城鎮安東蘭隆林皈樂上林龍憑馗纛等處度彼地瘴氣之輕重分别官員兵丁之多寡逐細開單敬謹封識委員齎往宣揚恩旨遍加賞給使駐防將士咸知皇仁廣運於萬幾勤政之餘垂念瘴鄉自官員以至兵丁均沾再造之恩同切萬年之頌所有遵旨賞給緣由理合奏聞謹奏偶爾頒惠何必過於稱頌鋪張即此可見語言之浮夸不實也同日又奏為恭謝天恩事竊臣前以臣姪金榮奏請聖恩隨臣任所約束教訓兼令學習弓馬文藝並請將廣西驛鹽道耿鱗竒之子耿育青令其隨任幫辦伊父鹽場事務等情準兵部知照奉旨照所請行該旗知道欽此臣率同臣姪望闕叩頭恭謝天恩自今以後臣惟有勤加教訓勉其學習俾得稍有寸進仰報皇上隆恩於萬一耳又據驛鹽道耿鱗竒稟稱鱗竒一介旗員至愚極陋荷蒙聖恩由同知於四年之內用至監司今長子育青例應回旗學習復蒙聖恩準留在粵幫辦鹽務是鱗竒父子疊受皇上豢養造就均逾常格聞命自天感激無地鱗竒父子惟有益竭駑駘勉供職守以盡報效之悃為此瀝懇代奏恭謝天恩理合一并奏聞為此謹奏覽奏謝知道了從來受恩者多酬恩者少試行與朕看雍正十年十一月十九日廣西巡撫革職留任臣金鉷謹奏為據實密奏事竊照提臣張應宗特參中軍參將周文統違禁盜賣硝斤一案奉旨著臣秉公審明具奏臣欽遵檄行確審復密加察訪查得周文統賣硝情由緣雍正八年征𠞰鄧橫軍營合配火藥需硝甚多周文統曾差百總辛茂買硝五百餘斤因低潮不堪配藥欲發另換又恐往返遲誤遂令兵丁洪玉龍等就近賣與傾銷錢糧之銀匠及花爆小鋪共賣銀一十三兩零就近另買好硝應用又因鬱林營守僃張廷桂調赴軍前缺硝配藥差人持價托周文統代為購覓文統以軍需緊急先令兵丁李得將存局之硝發給一百九十二斤收價八兩仍即買補以上二次賣硝俱屬一時權宜銀未入已亦未賣與土司地方臣思周文統官至參將應知自愛豈肯因二三兩之微利干盜賣硝斤之罪名雖至貪至愚亦不為此且查該員年力方強營務熟練正可為國家效力方今用人之際臣仰體皇上至公至明原情宥過之至意謹據實先為密奏仰懇天恩於現在需人之處將周文統補用以示鼓勵臣更有請者有上林營參革守僃熊文舉先經前督臣鄂爾泰會疏題參經臣遵旨嚴審除審無實據各款不議外惟減買馬價銀一百九兩零業已稟明調任提臣張溥封貯在營交與接任官贓未入巳因不合依律應擬杖徒巳於本案革職照例免罪業經具疏會題在案但臣前於庭訊之時見熊文舉年未四十才力正堪驅使且其報效心殷言詞激切臣雖未敢即於疏內聲明惟是人材難得臣既知有此等可以出力之人不敢緘默任其廢棄仰懇天恩準令送部引見量材補用倘蒙聖恩俞允則周文統熊文舉於廢斥之餘感激髙厚其奮勉竭誠以圖報稱更倍尋常矣為此繕摺奏聞謹奏覽奏知道了候另有諭旨雍正十一年四月初二日廣西巡撫革職留任臣金鉷謹奏為密陳請復祭祀額編銀兩以昭盛典事竊照廣西各屬一切祀典及官役俸工等項原照各該府州縣錢糧定額派編存留支給向因荒額未復祗照現徵熟銀扣除支銷此通例也臣思祀典一項事關崇德報功非官役俸食可比今查粵西各屬祀典銀兩照額全支之處固多其除荒支熟之處有每祭支銀三兩四五錢及二三兩不等者除荒過半支熟無幾地方官承辦牲幣祭品即無敢有派取短價之弊恐難免儉陋簡略之患臣查廣西通省地丁錢糧原額四十萬七千有零從前缺額銀六萬七千有零自康熙三十二年至雍正五年共增徵銀一萬三千八百餘兩又自雍正六年至十年臣任內共增徵銀二萬三千八百餘兩雖舊荒原額未能全復其新增之正賦亦不必皆係舊荒之田畝而各案開墾田畝至升科年分自必嵗有所增原額四十萬有零之數諒易符額前項祀典銀兩臣查明通省除荒銀共計三百六十二兩若俟荒額全復之後始請全支似非仰體皇上明禋崇報之意臣謹密行陳奏如蒙聖恩俯採特頒諭旨將廣西祀典除荒銀兩令照額編全數支應則至治馨香光昭萬古至於直省亦必有祀典除荒之處可否通行議復惟乞睿裁謹奏另旨諭部同日又奏為恭報地湧瑞泉益彰聖德廣被事雍正十一年二月十八日據直隸鬱林州申稱州屬地方稅額已復荒土尚多仰體皇仁多方勸諭士民踴躍報墾將來開墾漸廣約計可得萬畝有餘兹據富民鄉認墾人文廷瑛報稱開出天然泉眼二箇源源不竭灌溉有資因即親往彼地細看四圍並無山巖亦無溪澗平坡之上忽湧二泉出自天然相距五六十步其泉口圍圓一過六尺一過四尺皆深丈餘清流湧溢其出無窮其地現墾田三千餘畝引入溝塍咸資灌溉士民歡慶謂從來未有之上瑞實由皇恩浩蕩聖德感召所致等情具報到臣臣即批行布政司委員確查該地現墾田畝并令將瑞泉二處繪圖詳報應俟詳覆到日臣恭疏具題所有鬱林州因勸墾田畝開出瑞泉天然灌溉益徵我皇上湛恩汪濊廣被邊隅有此嘉祥協應合先恭摺奏聞具題到日有旨士民田畝果資灌溉之利則當建立祠宇以仰答神貺雍正十一年五月十二日廣西巡撫革職留任臣金鉷謹奏為奏明粵西官兵協𠞰逆苖奮勇克捷情形仰祈睿鑒事竊照黔省九股逆苖不法調撥粵西漢土官兵前往聽候遣用自克復臺拱之後逆苖竄聚險阻依然抗拒仰賴聖明遠照仍遣貴州提督哈元生回營軍威始振兹於四月二十四日接準貴州提臣飛咨大捷又據梧州協副將王無黨申報大捷各等因到臣所有提臣親赴番招逼近巢穴分路合𠞰於一日之內攻破賊巢斬獲𠞰捕情形自已僃悉奏明在案臣無庸復敘竊查死事之左江鎮左營守僃何英原係臣標千總前在古州有功蒙天恩擢補守僃甫經到任即赴軍前是日派攻東北一路山高路險官兵不能並進何英與永寧營千總秦登魁左江鎮標把總關志奮勇攻入土城奪占炮臺有逆苖數百從巢穴小路衝上一面暗放鎗炮一面􅍆死對敵何英立定城內不令奪回炮臺連斬苖級四顆致被亂鎗殞命實屬忠勇應聽督臣核實題明邀蒙聖恩優恤臣查何英家屬尚在桂林有子二人尚幼先為撫慰資助有親弟何勝現食馬糧弓馬亦有可觀臣擬有千把總缺出先請以何勝拔補以慰忠魂以示鼓勵至千總秦登魁把總關志同時搶上山梁接應何英各殺一賊奮勇血戰欲救出何英身尸亦被逆苖炮傷陳亡均屬忠勇將來俱得仰先陳亡被傷者頗多領兵副將王無黨督率力攻奮勇益倍自辰至酉卒能復奪險隘焚燬賊巢各路會合攻擊一日成功此皆聖主知人善任特命提臣哈元生回任以彰天討而提臣哈元生實能仰體宸衷親臨督率是以成功速而大局得定也所有粵西官兵忠勇奮力情形臣謹繕摺奏聞為此謹奏士卒之於將領臨敵對壘當如子弟之衛父兄手足之捍頭目此番黔苖之役三省合𠞰惟粵西兵丁甚屬不及即斯一二奮勇捐軀者固屬盡忠報國亦皆由兵丁退縮不與同心戮力之所致若謂粵西官兵人人忠勇奮力乃欺誑之語汝何得信以為實有旨諭霍升矣同日又奏為奏明試銷古州鹽斤餘息事竊臣於上年將粵西善後鹽五百包委員運赴古州試銷一案欽奉俞旨遵行其古州設埠發賣議定價值及東省酌撥帑鹽運往接濟緣由亦經臣繕摺奏明兹據驛鹽道徐嘉賔申據貴州黎平府批解試銷鹽價銀一千六百六十八兩零照數兌收巳清前項臣查此善後鹽五百包除去滷耗升出稱頭合計淨鹽八萬四千二百零七斤每斤定價二分一釐共該銀一千七百六十八兩零每包扣去火足銀二錢共扣去銀一百兩實解銀一千六百六十八兩零內除鹽本銀九百八十七兩又除運腳銀三百五十兩尚餘息銀三百三十一兩零歸還原項僃用又查此項鹽斤在梧州收買每斤給價一分二釐較之帑鹽價費加倍有餘其自梧州運至古州腳費每包共銀七錢每斤合運腳銀四釐六毫零除淨外每斤尚有餘息銀四釐三毫零每包共有餘息銀六錢五分則運銷帑鹽鹽本既賤餘息更多是試銷已有成規理合奏聞謹奏暫時試銷豈遂足為憑須行之久遠方可定成規耳雍正十一年五月二十二日廣西巡撫革職留任臣金鉷謹奏為奏明拏獲匪首李梅撥兵解往東省餘犯分别完結仰祈睿鑒事竊臣委員查拏匪犯王公一案業經恭摺奏聞隨於五月十四日據永福縣知縣吳王坦稟稱接奉密諭令至洞拱村陸勝日家搜拏王公隨即前往查拏該村離縣治二百餘里恐泄露風聲半路改換服飾帶役分路步行於十二日卯刻到洞拱村率同衆役將該犯拏獲現在親身押解來省其陸勝日一犯是日巳往修仁尚未拏獲等情十六日該縣吳王坦押解王公到省臣即委全州知州王勍昭平縣知縣管子傳即提出玉國文玉文德張士俊王保廖扶全等逐一識認皆稱確是王公無不切齒痛恨向該犯質證上橋挖銀之事該犯惟閉目不語當晚令押赴按察司衙門收審該犯恃有邪術閉目運氣聲息全無十七日經臣訊驗王公後仍令原問官押赴按察司細審有投到窩留王公之陸勝日面質王公即王子連原從韋元惠家識認要尋古窖挖銀子去年十月來住了些日子今年二月請他教書及訊該犯仍不吐供屏息運氣如前因塗以穢物破其邪術方始吐供我是王子連人呌我為王公訊其住址始稱永安州人繼而供認廣東詰以何府州縣則又混供不記得也説不得等語是該犯之為王公即王子連巳衆口僉同亦自認不諱矣但其是否即係李梅本案現獲各犯多係韋元惠勾引上橋之人止能質認王公不知其是李梅即臣驗看年貌揆度情形并臣前訪知李梅身上暗記查驗疑其即是李梅而案情重大該犯既不承認又無人質證因令東省先經差來之訓導羅卿從當堂識認隨據稟稱康熙五十四年間該犯為東安縣小書曾經相識本名李贊韜又名李世信其散給之劄付內又名李梅今巳隔多年惟覺蒼老肌瘦其面目却是李梅向習黃山法善於缷鎖運氣挨刑等語復於十八十九二日再令承問官並傳羅卿從齊赴按察司署覆訊給與該犯酒食紙筆因邪術已破天奪其魄援筆親書是廣東東安縣人當過本縣書辦原名李贊韜後改名李梅有兄弟三人及妻室子女姓名又供雍正九年來廣西平南縣認識妹夫葉標家遇見韋元惠説起尋古窖挖銀子的話就到韋元惠家住了些日子今年二月在陸勝日家開蒙館等語問官公同訊其兩廣散劄之事含糊不吐又再三誘問始向羅卿從云廣東的事我慢慢與你説罷據此則現獲挖銀惑衆之王公即係歷久查拏之匪首李梅是一非二已屬無疑隨於五月二十一日即委臣標中軍守僃陳廷章帶兵三十名星馳護解廣東去訖所有拏獲李梅日期並歷訊供認情節理合繕摺奏聞伏查此案臣疑王公即是李梅因差委員辨并密諭各屬務令設法查拏是以經四閲月之久猺山獞洞無不遍歷巳據供出橋人先後拏獲共數十名務期淨盡根株不使姦匪萌孽即王公一犯亦因四處搜查嚴緊不敢行動在於陸勝日家躲避經臣訊據韋元惠之子韋扶亥供出因密諭吳王坦親往擒拏到案連日委官審訊既據供認確係李梅自應解赴東省歸結重案其餘各犯臣查自雍正九年李梅到廣西改易姓名先住平南縣葉標家遇見韋元惠遂招引該犯到家同到各處往來專以尋窖挖銀誘惑愚民哄騙酒食亦有給與符紙詭稱可以保命猺獞貪愚謂得有符號果可挖銀遂將酒食供養亦有送給盤纒不知一墮其暗行招致之術即為附和為匪之徒是以臣於未獲王公之先無論是否李梅務必窮究到底期於必獲後已今該犯果巳就擒將現在人犯張士俊玉國文玉文德王保廖扶全陸勝日等再四質訊衆犯爭認王公無不切齒痛恨察其情形實屬貪愚被惑悔恨迫切即訊據李梅亦供在廣西沒有散甚麼劄付並這些人亦都不曉得我姓李等語則此一干人犯其情似有可原仰懇皇上天恩令臣酌量情罪輕重分别枷責完結以省招擬案牘之繁惟韋元惠一犯實為此案罪魁上年於陳漢案內據修仁縣拏解東省臣業經咨提俟東省移解來西臣訊明盡法重處以結此案經此一番搜拏懲創猺獞人等知畏法令之嚴牽連各犯均有自新之路但臣未敢擅便伏乞皇上睿鑒恭候批示到臣欽遵發落至於永福縣知縣吳王坦前經拏獲要犯陳漢解往廣東今又親身改裝冒險拏獲匪首李梅且其平日居官誠實謹愼臣擬俟有同知缺出會同督臣即以吳王坦請旨補授以示鼓勵臣謹一併奏聞謹奏果是李梅就獲可嘉之至該令自應破格奬勵其一干牽連人犯酌量情罪輕重分别完結所奏俱是但發落後仍應交該地方收管勿令遠去須候東省彼案審結方可聽其行動不然倘有對質處又費周章也雍正十一年七月十六日廣西巡撫革職留任臣金鉷謹奏為據情代奏恭謝天恩事竊照臨桂縣西鄉河道經臣據呈勘估修建橋梁陡座恭摺奏明蒙硃批俞允臣隨飭委上緊興修旋據紳士里民楊家修等數百人齊赴慶祝萬夀宫執香叩謝天恩歡呼載道復集臣衙門環請據稱從此田疇舟楫之利均沐皇上浩蕩之恩所有感激私情聨名匐懇代奏情詞肫切臣不敢壅於上聞理合據情代奏臣謹奏聞如果士民感激肫切何不具疏題奏以聞雍正十一年十一月十八日廣西巡撫革職留任臣金鉷謹奏為微臣感激天恩敬瀝愚誠仰祈睿鑒事竊臣先因拏獲匪犯王公據供自認李梅誤以為實遂以獲解李梅具奏復於題補官員疏內稱永福縣知縣吳王坦擒獲李梅嗣經解回覆訊雖係王公實非李梅臣隨自行檢舉部議不行詳查照例罰俸誠為至當蒙皇上特恩寬免臣恭疏奏謝天恩外伏念臣之賦質至愚惟聖主諒之屢命閣臣傳諭以使知警臣之辦事以實惟聖主鑒之復荷洪恩宥過以示從寬臣感激愈深䇿勵益切不敢云報稱之難而稍紓於夙夜惟自矢血誠以仰答高深現在通飭密拏務期必獲若李梅在臣境內斷不使其漏網即或在鄰境而臣有所訪聞亦必密為咨商緝獲但查從前所開年貌多不畫一臣復咨詢東省確查的實年貌去後兹於十月二十四日接準廣東督臣鄂彌達咨開訊據匪犯陳漢供稱實與李梅不相認識前審供王公即李梅在廣西設教的話原是混供等語又訊據李梅親鄰人等開具年貌移覆前來與臣密訪李梅之年貌俱經遍發各屬懸賞緝拏以遵聖諭以盡愚誠所有感激下情嚴緝緣由臣謹繕摺奏聞謹奏覽奏知道了李梅不獲汝終不能免過同日又奏為奏聞事竊照廣西産硝地方酌議歸官開採一案蒙皇上硃批提臣張應宗所奏令與臣商酌妥協辦理臣欽遵檄行查議量給工本委員試採業經先行奏明嗣據布政司議詳動支公項銀兩令各府請領轉給産硝州縣試採并建設厰局收貯硝斤委官煎提發買一切事宜務期妥協今查桂林府之陽朔縣平樂府之平樂恭城荔浦昭平等縣南寧府之新寧州梧州府之懷集縣各領工本開採水硝運赴各就近官厰煎提收貯每水硝一百斤提淨牙硝八十餘斤計工價腳費及所用煎提灰柴器具等項每提淨牙硝一百斤實計工本三兩一二錢不等議以本省營伍照各營貴賤適中之價暫定三兩二錢東省採買酌照行户交易之價暫定三兩八錢除陸續歸還工本外以所收餘息為修理厰局及人役飯食雜用等費計一年餘息僅可得銀七八百兩即再加增價銀一二錢亦不過一千餘兩約可敷用以定成規數月以來各屬辦獲硝斤除賣與兩省標營外現在尚存牙硝約有十萬斤通計一年可辦獲硝三十餘萬斤以僃兩省營伍採買之用其赴厰採買者本省令該營報臣衙門檄行知照方準發給東省照例督撫給咨委官採買亦經臣衙門行知發給并沿途查驗以免影射夾帶之弊至於民間傾銷銀兩及花爆等項需用硝斤令鋪户照本省定價赴局領買仍將賣出硝斤數目姓名造報僃查以嚴私販如此辦理窮民所得工價與向日私賣之價相同則自不犯法營伍隨到隨買無守候時日之費官硝既行而私硝易於稽察矣緣係奉旨事件臣悉心辦理試採有效理合繕摺奏聞謹奏斯事須嚴愼辦理倘稽察疏慢致滋種種弊竇及或有借此射利者其咎總歸於汝也同日又奏為密陳愚見仰祈睿裁事竊惟我皇上睿慮周詳恩施優渥欲武臣等養贍有資以勵操守自提鎮以下酌定馬步名糧較前頗為豐裕此外不許一名虛冒定例綦嚴凡屬提鎮等果皆恪遵定額弊絶風清自然威行令肅將辨奉法操練精勤無不整飭之營伍矣但臣留心體訪仍不無有相沿積弊將辨以扣繳為名每多巧取提鎮之操持不愼易墮局中於定額名糧之外或仍有坐糧數十分至一二百分不等因而將僃遞有私留抑且開除兵馬及頂補各日期造報多不以實支銷公費名糧亦有浮揑分肥即總督稽查嚴明稍兢凛於一時難免沿襲如故或遇新舊交代暫為募補以示無私并有焚毁底册以泯其迹者至於同城文員監放糧餉臨時亦只得遵例出結究無從察其虛實此營伍之弊實難徹底清查者也如提鎮之操持不能自勵則有欲不剛恐失衆心因博寬厚之名姑容輕縱以邀譽於辨兵即操練整頓亦屬具文總由源本不清互相掩飾此又大槩營伍之通弊也臣仰體聖明整飭至意伏思各標俱有中軍凡兵馬錢糧出入數目中軍無不悉知中軍剛正則上下皆有顧忌中軍庸劣則惟事迎合取容是中軍一官實關緊要以臣愚見請令督臣將統轄省分撫標提標鎮標之中軍等官許不時揀擇調換稽查如有虛冒等弊令其密稟督臣若所調之中軍有不能覺察或涉蒙蔽之嫌督臣即調回改委如查訪確實一併參究如此則中軍皆畏法紀將辨無不􅏮遵凡營中之陋弊督臣無不周知而各標之良法彼此互相則效督臣寄耳目於各標之中軍中軍盡心力於所管之營伍稽查既易虛冒自清虛冒既清訓練必力臣愚一得之見是否有當倘蒙睿鑒以臣言可採伏懇聖恩將臣此摺留中謹此密行陳奏據奏營伍通弊乃內外之所共知相沿匪朝伊夕但所陳調換中軍覺察虛冒殊屬戲論若提鎮不得其人豈寄耳目於中軍遂能禁制主帥使不作弊耶總之督撫提鎮公亷明察則何弊不除設用違其材亦無法可施從來有治人無治法似此徒欲以術馭人之論朕甚不取果如此行其中翻滋紛擾有損無益處指不勝屈汝試詳思自當默會也雍正十二年三月二十四日廣西巡撫革職留任臣金鉷謹奏為奏明事雍正十二年正月初九日接準內閣奉旨密諭據張溥奏稱廣西遷隆洞土官黃震中聽練總廖廣圖利與安南之萬寧州土目搆釁等語著尹繼善金鉷張應宗等密差查隘先將練總廖廣嚴拏究治如地界果有侵占即明示賞還不可支飾回護欽此臣職守封疆跪讀之下倍切凛遵伏查雍正十一年十月初間臣訪聞有內地棍徒在安南地方私收鹽稅爭利生事因未悉其詳當即飛諭南寧府密令確查稟報去後於十月十七日準安南國來咨內開據萬寧州土目呈稱有遷隆州差目不於內地隘口設汛乃過河到本州之北巖巡居住又於古𢎞社之渠那村禁伐竹木待建營盤爰具情由申辨希惟洞悉遠情查明舊迹使中外封域截然依舊邊鄙黎庶翕爾相安等因前來臣以事關邊境隨飭司府嚴查明確據實詳報以憑參究並通咨總督提鎮暨咨覆安南在案至十二月初八日據南寧府將查過安南之渠那等八舍地方邊隘及土練廖廣等先因鹽利生事後又畏罪潛逃并行據遷隆洞土官黃震中申覆各情由稟覆前來臣以中外疆域既稱以河為界今安南來文有過河字樣似遷隆越境該土官雖稱渠那舊隘廢撤多年基址磨滅詞多支飾難以憑信若不確勘終屬遊移所有應設隘口必須親歷勘明以杜姦匪私鹽之出入均應查明辦理復經批飭去後嗣據該府鈔送先經委查之上思州知州仇雲標稟稱雍正十一年十二月二十二日會同左江鎮標千總伍宏明前往查勘渠那係八舍中之一村其地實屬安南而該土官所稱舊隘廢撤毫無憑據等語此臣未奉諭旨之先飭查辦理之情節也今蒙聖諭指示臣益得遵循措置隨復諭南寧府欽遵密查妥協辦理先將廖廣等嚴拏務獲究治續據該府節次來稟巳將廖廣黃元光拏獲到案又查有廣東參革守僃何大武向與夷目往來勾通販賣私鹽遂有廖廣等假借設隘為名私收鹽稅何大武恐奪其利因聳夷目與遷隆以筆舌相爭此中播弄總因鹽利起見除廖廣等業經弋獲外適東省提臣張溥差人傳送諭旨前來臣將何大武販私爭利緣由密札通知就近查拏究治亦不便於輕縱也安南地界既據該府親詣遷隆查詢明確與仇雲標所稟無異臣欽遵諭旨即將渠那等八舍地方咨覆安南仍歸萬寧州管轄各照舊日疆域巡查姦匪私鹽勿令出入隘口則邊境永寧矣再查雍正十年三月間臣委右江道黃嶽牧查勘隘口該道據委官仇雲標轉據遷隆土官詭稱該洞原於渠那設隘之語該道等欲至渠那查勘因懸崖險峻溪河阻漲難行該土官設詞勸阻遂將渠那應設總隘之處造册詳報臣據以題達準部議覆在案伏讀諭旨內從前勘界委員或未經詳查惟聽土官之言遂爾立隘設防之天語臣等誠難辭咎容臣將該土官揑詞蒙混緣由具疏題參一併據實聲明仰祈恩鑒至現在遷隆邊隘巳據南寧府查明應移設於剝馬柏心二村實為總口於此二處設立隘房撥兵巡查姦匪私鹽不能逾越似於邊防鹽政均有裨益緣奉旨密諭事理臣不敢稍有支飾回護謹將臣先後密查辦理緣由恭摺奏聞為此謹奏中外疆界稍有不清即為啓釁搆患之端此等大事久被屬員欺朦毫無覺察是何理也同日又奏為恭繳硃批奏摺事竊臣前奏試採硝斤等事一摺蒙皇上硃批斯事須嚴愼辦理倘稽查疏慢致滋種種弊竇及或有借此射利者其咎總歸於汝也欽此臣伏讀聖諭感激難名伏思硝磺最關緊要臣先後奏明歸官辦理以杜私除患借動工本委員經管以所得餘息為官役食用不足則酌量墊給有餘則歸還工本按月由司核轉仍不時稽查罔敢疏忽今所獲硫磺約敷一二年之用已於上年秋間暫行封禁看守至於各屬採辦硝斤一切事宜經臣悉心酌議因地制宜所有實需工本銀兩及分别本省鄰省價值節經通咨在案或稍有硝斤數目不符與未準提鎮及鄰省督撫咨移到臣者必咨詢明確方始行知收價給硝經過關津各令驗報硃批原摺理合恭繳謹奏人之所以不能為賢為良而往往墮於愚不肖之域者大率皆緣利欲薰染本念不固之所致豈有甘居下流願投法網之理乎惟明理達識大丈夫方能勘破執定非凡材庸質暫時強勉所可企及者凡庸之輩不愼巳為而防人知是不清其源而欲流之潔也亦復何益里巷小民尚有若欲不知除非莫為之諺況封疆大吏表率羣僚十目所視十手所指之地幾微負疚則衆論沸揚曷可當耶愼之勉之雍正十二年九月十九日廣西巡撫革職留任臣金鉷謹奏為恭報秋成大有事竊照廣西通省本年春夏雨澤及時收成之際又復隂晴應節高下皆宜兹據桂林等十一府及直隸鬱林州稟報所屬早晚禾稻收成分數臣確查統計十分者十之八九其九分者僅十之一二至於土屬地方向年據報不過六七八分今嵗皆八九分至十分不等至現在穀價自二錢一二分至三錢七八分止閭閻蓋藏不乏商販亦復流通所有本年秋成大有情形理合繕摺恭報為此奏聞謹奏收穫既豐穀價自賤邊氓樂利可知矣以手加額欣慶覽焉雍正十二年十二月十七日廣西巡撫革職留任臣金鉷謹奏為據實密陳仰祈睿鑒事竊照廣西右江道一缺管轄柳慶思泗等府苖疆要地必得公正明察之員分巡整飭方可任為耳目臂指之寄今現任右江道王鍾珣於雍正十二年六月內到任來省謁見臣觀其為人言論即不甚明白因隨事留心察訪該員才具甚是平庸性情亦復乖謬袒庇衙役任性重刑經臣檄諭嚴飭雖曾引咎檢舉數月以來任性縱役依然不改種種作為頗多乖謬以致軍民惶懼俱有怨言臣思苖疆地方人情已屬刁悍該道非但不能整飭化導乃縱役長姦冒昧自用總由心地糊塗即使操持亷潔亦無足取况察其所為臣又不敢必信其有守也該道雖到任未久臣何敢因循貽誤謹據實密陳伏乞皇上俯鑒將王鍾珣調回可否另用之處統候睿裁又潯州府知府謝莘到任將及一年優柔寡斷不能約束兵民亦不能稽查屬吏實因限於材質難以望其奮勉伏思潯郡係水陸要衝所屬皆猺獞雜處且有經管關稅之責錢糧尤宜愼重謝莘既無表率之才難勝方面之任並懇天恩垂察將謝莘一併調回使中材之員益加奮勉以勵官方如蒙諭旨允行則所遺右江道及潯州府二缺均為緊要恭懇揀選賜發速令赴任臣感激聖恩無既矣再查廣西本年補行大計內有臣等薦舉卓異之南寧府知府張漢及附薦之全州知州王勍皆亷能可用之員可否仰邀聖恩俯賜查察即以分别擢補使之駕輕就熟可收人地相宜之益而該員等感戴特用之恩自必益加鼓勵以圖報稱矣伏候睿鑒臣謹密陳請旨為此謹奏有旨諭部矣舉凡地方大吏於去取人才之際不容纎芥存私倘少徇愛憎目前雖屬無害久後安能掩飾為逞一時之快意而貽將來無限憂虞豈非庸愚之行乎此當以為終身戒雍正十三年四月二十日廣西巡撫革職留任臣金鉷謹奏為遵旨奏明事竊臣因粵西額荒難復設法定限清丈於雍正十二年十二月內僃陳原委繕摺具奏本年三月初一日接到內閣遵旨寄字奉上諭爾等可將廷議鈔寄金鉷閲看並令金鉷將原摺及朕此旨録寄總督鄂彌達商酌會議回奏欽此臣欽遵録寄督臣會商去後四月初二日接準督臣覆札并擬摺稿相商以粵西全省久享國家升平之福地闢民聚而缺稅幾及百萬自未便任其侵隱然必須分别次第料理總計缺額九十九萬零而桂林居五十七萬有竒蓋粵西紳襟莫多於桂林而桂林紳襟又莫多於臨桂其中田土不無藉勢欺隱以致缺額獨多請先將臨桂一縣之荒田悉行查出其餘府州縣遍行明白曉諭令紳襟吏役百姓人等據實首報立法嚴明諒不致滋事擾纍等語與臣前奏大略相同其餘事宜臣復加斟酌聽督臣定議主稿回奏間隨於四月初七日臣準部咨凡有從前開墾成熟首報未盡地畝統自雍正丙辰年為始定限一年之內悉行據實首出詳報如逾一年之限仍有首報未盡者將不行首出之業户照律治罪奉行不力之地方有司以及督撫司道等官分别議處等因臣思既經部議通行奉有俞旨自應一體欽遵當即檄行布政司轉飭各屬遍行曉諭凡有額荒未復之州縣務令徹底清查據實首出倘有界址不清之處該地方官即帶弓手親詣勘丈如紳襟吏役抗違阻撓詭寄隱占即令詳報分别革究其地方官清查不力詳報無多臣即先行題參以為庸惰者戒如此則紳襟吏民皆知臣志在必丈惟恐水落石出則首報必多於開墾實為有益至廷議謂臣所奏似不可行誠為愼重周詳但粵西猺獞雖多額荒實少只須曉諭首報原可不用丈量其紳民田畝應須丈量之處人役飯食等費量為給發不許私毫需索且於農隙丈量祗期行之妥協稽察嚴謹不致擾纍妨農即有一二抗頑阻撓臣既身任其責自當不辭怨咎前摺奏請臣籌之巳熟今遵照部咨竭力曉諭首報倘丙辰年限內仍有不盡首出之處伏乞聖恩即許臣等一面將奉行不力之官查參一面即另委賢能之員丈量則欺隱之業户知臣等將來必行丈量爭先首報額荒易復魚鱗册籍不勞而辦永享息訟寧民之福矣伏乞睿鑒為此謹奏總與督臣鄂彌達妥計熟籌必意見相同毫無參差然後舉行切勿獨任巳見輕率從事同日又奏為奏明去任賢員仰祈睿鑒事竊查廣西太平府降調知府屠嘉正因保舉陳克鎬一案部議照濫舉匪人例降二級調用奉旨依議欽此臣接準部咨伏思各舉一人之案定例綦嚴不敢冒昧題請即令離任交代並給咨赴部但查屠嘉正自雍正六年奉旨命往廣西以知府試用先經臣委署直𨽻鬱林州事務嗣即題補太平府該員為人端介操持不茍辦事實能盡心於刑名事件尤精明允當臣屢欲奏請擢用祗因該員器度尚少寬洪經臣加意開導諭以因地量材稽察不可不嚴用人不能求僃之意該員亦深知改勉竊思人材實難如屠嘉正之才具操守洵有可用今赴部引見倘蒙聖恩鑒察經天語提撕化裁神速當必益加奮勉有以仰答隆恩也臣既知之有素不敢因巳經離粵而遂不以上聞伏祈睿鑒為此謹奏此奏未到之前業經降旨復用矣屠嘉正委係應惜之員如是愛才舉能乃朕之所望於諸大臣者同日又奏為奏明事竊照粵西墾田捐納一案臣查自雍正八年十一月起至本年三月底共收過折捐銀九十八萬六千四百餘兩實貯司庫又節年官生里民實墾舊荒老荒田共八萬九千九百餘畝俱經臣委官查勘明確出給實收並完納錢糧在案理合奏聞謹奏力行與否公亷與否乃萬耳萬目見聞之事縱或粉飾一時豈能掩覆於永久加愼為之可也同日又奏為奏明事竊照廣西各標營恩賞給營運生息銀兩一案臣標在桂林城內設立當鋪二座各年所獲利銀臣巳節經奏明今查臣標原領本銀六千兩又提鎮各標協營分領本銀多有地方偏僻不能營運之處本銀存積不但利息無多兼慮虧缺滋弊先經臣咨商準其解赴省城代為營運均勻撥賞今計節年解到之銀共七千四百兩俱收貯臣標當鋪陸續添本之外尚有餘剩必需另籌營運務使利銀充裕庶兵丁之沾沐皇恩可以源源相濟臣查桂林省城惟藥材一項竟無大鋪又少良醫官民遇有疾病往往藥料不佳庸醫誤用多有未便臣再三籌畫將現存餘剩本銀令文武員辨商酌辦理開設廣仁藥店一座并覓明理醫生監看用藥可以推廣皇仁便民利濟又於廣東及漢口等處收買各省藥材轉發附近藥鋪並通客商販易自上年十二月內開設起僅百餘日臣據報查核將來所獲利銀似可勝於當鋪並不與民爭利而實於民生有益容俟本年年底核算一併彚册報部外所有現在辦理緣由理合先行奏聞為此謹奏益兵兼以通商籌畫可謂周到雍正十三年五月二十一日廣西巡撫革職留任臣金鉷謹奏為愚忱密舉所知仰祈睿鑒事竊惟提鎮之任古稱大帥得人最難必其約束嚴明而公平足以服衆膽略勇敢而功能不自矜誇平時存不欺之心以報國恩斯臨事有擔當之力以見經濟臣因黔苖滋蔓夙夜思維有湖廣提臣董芳由桂林副將出師古州功績最著蒙恩升用臨沅總兵適普思有事兩載勤勞在皇上洞鑒之中即用之於兩湖最要之地臣私心深慶得人又左江鎮臣王無黨勇而好謀嚴而公正前年克復台拱首功能讓巳蒙聖恩補授總兵今督臣鄂彌達委令總統粵西官兵巳赴古州此二人者不但苖蠻畏服兵民亦素所愛戴如蒙皇上準遣重臣臨邊將此二人指示調度自可早靖逆氛而苖疆善後之圖并可僃重臣咨詢採擇必不致有欺飾以負天恩也伏乞睿鑒留中臣謹密奏密舉所知固屬體國之誠然奏內亦有不協處雍正十三年六月十三日廣西巡撫革職留任臣金鉷謹奏為奏明事竊照黔省逆苖不法調撥兩粵官兵前赴古州所有協濟黔糧及應需兵米經臣先後撥運粵米三萬餘石其動支水腳銀兩應照例在於正項開銷兹據布政使張鉞詳稱黔疆有事以來撥兵籌餉需用浩繁鉞謬叨大吏深受皇恩願將撥運桂林府倉米一萬石水腳銀兩自行給發不必動支正項等情臣查運米水腳自桂林至古州約需用銀五千餘兩粵西墾田捐納一案係藩司衙門經管每收捐納銀一百兩原有餘銀一二兩不等查布政使張鉞任內經收七十餘萬兩據該司面稟內有祗收正銀並無餘銀者約十餘萬兩計歷年所收將及萬金除自已用度外請以尚存之銀給發桂林運米水腳臣以該司所得之項為急公之舉事屬可行是以準其發交運米之員支給水腳謹將該布政使張鉞給發水腳銀五千餘兩緣由並此項銀兩情節據實奏明伏乞皇上睿鑒為此謹奏覽歷來辦理軍需不一其人有專欲潔巳於出納之際過為愼重稽遲誤事致罹重譴者更有興心叨餮當調撥之時巧於乘機混行侵冒纍及身家者前車不戒覆轍相尋無怪其然也惟一塵不染奉公不二庶能免此兩失亦在詳擇審處而巳硃批諭旨卷二百二下
