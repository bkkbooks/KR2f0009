body:
  text: 欽定四庫全書硃批諭旨卷六十八硃批樓儼奏摺雍正七年四月二十六日署理廣東按察使臣樓儼謹奏為遵旨明白回奏事本年四月初二日署撫臣傅泰傳臣同署藩司臣王士俊入署恭宣皇上硃批左翼副都統臣吳如譯奏摺此所奏四摺著孔育珣傅泰王士俊樓儼具摺明白回奏覽吳如譯奏詞儘有不通識見卑鄙處但粵省吏治民風至於如此在傅泰初到姑置不論外如孔育珣王士俊樓儼三人受朕格外成全委任捫心自問當如是報朕乎能不汗顔乎乃王士俊反有開礦之請是何意見耶嗣後若不實心整飭貽誤地方不但法難寬恕亦何靣目立於鄂爾泰田文鏡李衛等數人之列也朕實為汝等愧之為粵省憂之奈何欽此臣跪讀之下悚惶無地伏念臣一介庸愚寸長未效乃於數年之內蒙我皇上不次擢用由理猺同知歷升府道又奉特旨署理廣東臬篆寬免各案處分仰邀皇上格外成全委任臣感恩甚切圖報彌殷自署臬篆以來無日不以吏治民生為念兹捧讀硃批恍如入覲天顔面聆聖訓凡皇上之所以責臣而勵臣者益加矢公而矢慎謹遵諭旨將如譯所奏各欵逐一另摺據實明白回奏外為此謹奏覽奏知道了朕巳有旨實授汝為按察使矣竭力秉公黽勉盡職勿怠嗣後奏摺差人齎交大學士蔣廷錫轉奏雍正七年閏七月初四日廣東按察使臣樓儼謹奏為恭謝天恩事雍正七年七月二十三日奉署撫臣傅泰交送皇上硃批臣摺隨即跪領進署恭設香案敬誦硃批仰蒙訓諭感激涕零敢不秉公勉力圖報萬一伏思臣本書局備員家素寒微甘心淡薄賦性硜執亦少交際若貪婪敗檢之事臣不敢為第恐才識疏庸職任刑名動關出入夙夜悚惕惟有詳慎以仰副地方緊要事宜容臣次第奏請睿裁外謹此繕摺差家人齎交大學士臣蔣廷錫轉奏謝恩所有奉到硃批理合恭繳謹奏每見出於寒微者識多鄙陋未必皆甘淡薄賦性硜執當以義理融化氣質之偏至於疏庸二字尤非大吏所宜有似此浮泛文詞向後不必果如所言豈夙夜悚惕遂能仰副朕意耶惟有不避嫌怨一語乃真實得力處從此加勉自勵可也同日又奏為備陳地方情形仰祈睿鑒事竊查廣東一省北接湖廣廣西南通西洋南洋幅􅊷遼濶山海交錯山皆不毛之土惟産金銀銅錫久巳嚴行封禁而民間偷穵礦砂無日無之雖文武官辨不時查拏驅逐無如旋散旋聚內海賴有魚鹽之利稍為窮民活計而興販私鹽者又絡繹不絶此礦徒鹽梟二者皆以無術謀生甘蹈法網而不顧也至於偷兒掏摸強徒劫掠盜賊之多亦莫甚於廣東臣任事以來凜遵聖諭嚴拏窩家積盜勤為宣布皇恩剴切勸諭雖盜賊較往年略少然如南海縣之三江江浦番禺縣之沙灣茭塘等處素為盜藪彼蓋童而習之以竊盜為生即身不為盜亦無非盜之族黨雖稍有衣食亦相率為匪更有窩家多係紳襟富户盜匿其家則不可捕贓入其室則莫可搜盜賊到官為之打點衙門皆是窩家長技而盜則死不供窩是以敗露者少大都民情絶不知有廉風之治可見於邉海窮鄉矣臣為地方起見理合奏請睿裁謹奏此奏是閲所議論處深中地方肯綮同日又奏為職官窩盜殃民據實奏明事竊臣奉命署理廣東臬司印務任事之始見省城附近劫竊頻聞因訪有積賊黃富文嚴拏到案究其窩家據供族兄黃凱文即黃元捷原任高州府信宜縣教諭因候補在家現住大新街尾小的常在其家往來住宿贓亦交藏其家當委廳員往搜贓物起出軟甲藤牌器械鎗炮等件凡鎗炮俱裝火藥併金銀首飾細縀服物甚多當票二紙又於地窖下起出黃銅板及違式各器物俱逐一造册在案又據其第四子知禮第十四子無忌赴司自行投首乞求免罪內稱伊父窩賊是實隨查其第二子係武生學名髙華逺頗有膂力據知禮無忌咸供家中諸事要問二哥當將黃元捷髙華逺詳請參革究擬奉署撫臣傅泰批令確審窩賊分贓實情而各犯因未經署撫咨𠫭且一時審訊之際未據有賊犯認械失主認贓稍變前供臣又復詳解署撫參革嚴究署撫旋發諭單駁飭內稱據黃凱文供富文是其族中兄弟有時來省在其家住至窩留竊劫收藏贓物並無此事又以富文供出夥黨馮舅阿車等五名皆未弋獲對質是否窩賊尚無確實憑據等語署撫一味慎重不肯遽爾參革但臣統查起出各械各物總非士民之家所宜有即使械無賊認贓無主認亦屬可疑而其子知禮無忌聞拏自首供出伊父窩賊窩贓希冀免罪此即為窩之確實憑據從此參革嚴究直窮到底自必和盤托出若謂罪疑惟輕姑從寬典則各犯亦必盡翻前供將就完結誠恐自此以後凡有積窩積匪皆恃無人對質得為漏網之計窩家斷不能除盜賊斷不能息實為地方隱憂再查黃凱文素有富名又素有惡名失主不敢出認地鄰坊保不敢過問竊思私藏鳥鎗一桿即干處分今藏如許炮械若非臣為搜查此時尚在藏匿何可置之不究且其子二十四人盡皆遊手遊食又有婢妾數十人醜聲外聞現奉定例盜賊必究其何人出械窩家妻女有無與賊通姦今黃凱文家現有炮械多件現有婢妾多人又據伊子自行出首其中曖昧不法情形難逃聖明洞察臣為弭盜安民起見任其巨富止知執法即使因此得罪亦無所顧恤為此繕摺奏聞伏祈皇上睿鑒謹奏粵東素有窩盜惡習觀汝主見甚屬果決此案如有真知灼見處與傅泰力爭可也倘仍掣肘不允汝詳不妨將此摺所奉批諭密與觀之抑或口露朕意示之亦可同日又奏為奏明潮屬水利仰祈睿鑒事竊臣抵潮之日查閲水利情形府城東門外曰韓江古鱷溪也其江上流自惠州府來者有興寧通海河合長樂十六溪之水其自江西贛州來者有程江梅溪之水其自福建汀州府來者有大河之水自漳州府來者有清逺河之水其自程鄉來者有小河之水綿延七百里皆注韓江至廣濟橋分流入海瀠洄橋下二十三墩之間水勢稍紆而橋下又有鳳凰一洲上建石臺以為中流砥柱始不為患自屢遭大水橋墩衝壞臺亦傾圯每遇水發之時奔騰浩瀚以致堤圍潰決田廬皆淹連歲歉收臣因急圖修復苦無工費適在城有開元古寺歷來士民施田萬有餘畝久為不肖寺僧私典及官吏襟監土豪強占殆盡寺僧普光來請清釐其租榖除完糧香燈及僧人飯食外願充修復墩臺公用臣因按其有册可查有佃可問者委員清釐不下二千餘畝其外有别寺之田亦被侵占情願照例充公者悉如其請一切租榖羡餘委官收支即選本城耆老襟監辦料監工自雍正六年七月興工至七年二月告竣橋墩巳復據該府縣報稱今年水亦甚大勢少瀠洄由橋以至海口堤岸田廬皆保無恙田稻加倍豐收等語惟臺工正在應興而臣又蒙魚溝之建閘梅溪海口之刷沙亦宜次第料理又如廣州府有三江之潦北發源於南雄東發源於奏明并繪橋圖恭呈御覽伏祈睿鑒謹奏覽雍正八年三月二十七日江西按察使臣樓儼謹奏為運榖原借稅羡籲請天恩分年補還事竊惟潮州府自雍正四五兩年被水歉收米價騰貴臣於雍正五年七月赴惠潮道任誠恐來年仍復米貴公同司道會詳請撥廣西榖五萬石海運回潮平糶以濟民食但運榖水腳之費無出又經司道會詳請借稅羡銀四千兩俟榖石平糶秋收買補之時倘有羡餘亦可還項即有不敷潮屬公捐補還詎料榖船次第出海而前藩司官逹即改令撥貯潮屬各縣隨經議詳造册咨部是榖石不能平糶水腳無項可抵而各縣耗羡有限不能盡捐以致懸項未補督臣孔育珣署巡撫任內將臣題𠫭部議革職蒙恩寬宥所借稅羡銀兩勒限清追臣原經手借領自應照數還項但臣家素貧無力完補僅可節省飬廉陸續交庫巳於雍正七年廣東按察使任內共完過銀一千一百兩尚欠銀二千九百兩伏懇皇上天恩容臣帶於江西新任分作三年清補則庫項必不敢久懸而臣力亦得稍紓矣理合據實具奏伏乞皇上睿鑒謹奏照所請寬限五年補清庫項該部知道同日又奏為酌寬盤倉限期以免交代遲誤事竊臣查州縣官交代倉榖例限兩箇月盤完遲延則干參處隨又接扣限期再遲則有易結不結之處分部議革職定例甚嚴今幸倉榖五萬石以上奉旨多展限一箇月蓋念倉榖必須盤量動關時日皇上聖明無微不燭誠保全臣工格外之𢎞仁惟是五萬石以上方得展限若四萬九千石則亦不準展限矣往往有舊任正在交盤而新任又催接盤奔走往來未免顧此失彼安能皆於兩箇月內交代清楚藩撫照例嚴參竟有可用之才而一旦罜誤殊為可惜臣請將倉榖五萬石以上者照例多展限一月如二萬五千石以上者亦許多展限十五日或一人而有兩縣交代者則許多展限一箇月庶立法至公而交代免干溺職之咎矣如果臣言可採伏祈睿鑒敕部核議施行謹奏倉糧交代寬限之請甚是候發該部議行雍正八年五月十八日江西按察使臣樓儼謹奏為據實陳情仰懇皇恩事竊臣於本年三月二十六日蒙恩補授江西按察使四月初九日恭請聖訓荷蒙𢎞慈以臣母趙氏今年八十二歲住居松江準臣從江南水路省親迎飬且賜臣母大縀四聨貂皮六張此誠皇上錫類仁恩至深至厚也臣歡欣踴躍榮寵非常滿擬齎捧回家臣母逺迎率臣望闕謝恩詎料臣於五月初九日舟次蘇州府滸墅關外得接家信知臣母於三月三十日去世臣於五月十一日抵家恭呈恩賜告母几筵鄰里爭觀舉家感泣兹臣再有懇者臣母於臣理猺同知任內巳蒙覃恩誥封五品宜人今臣補授按察使仰求皇上天恩俯憐臣母三十年孀守教子辛勤持家刻苦恩準給與三品淑人封誥俾臣母得邀錫命於泉壤臣生生世世銜結無涯矣臣於到家之日以聞訃日期報明上海縣移原籍申詳照例守制外謹此繕摺奏懇天恩伏祈皇上睿鑒謹奏汝母既故所待者身後之榮汝當黽勉上進至一品二品於時乞恩請封以光泉壤不亦美乎目前何必汲汲雍正八年十二月初七日江西按察使在任守制臣樓儼謹奏為請定藩臬新任展限之例以便詳慎辦理事竊查定例內開凡督撫新任及署理印務如欽部等事件難於完結準分别展限原限四箇月展限兩箇月原限六箇月展限三箇月等因欽遵在案誠以督撫統屬全省或兩省初到任所諸務紛紜必得寬展限期方可從容辦理也獨藩臬兩司亦係統屬全省並無展限之例到任之日一切錢榖刑名非不欲逐件細心查核審擬無如計算限期巳滿不得不汲汲趕辦雖不敢有疏漏然事繁限迫焉能保其必無錯悮臣愚以為藩臬兩司係承上接下諸事彚集之地辦事貴於詳慎不宜專顧限期急遽完事請嗣後如藩臬兩司到任或署理時若遇案件例限尚有一二月者不準展限如到任時限期不滿一月者許於其定限之外照州縣接審官例展限一月庶得細心查辦不致局促了事似於承辦案件有益是否可行伏祈皇上敕部議覆施行謹奏宜商之於該撫若意見相符具題請旨可也雍正九年三月十二日江西按察使在任守制臣樓儼謹奏為請開供首唆訟之路以除刁攬事伏讀訴訟律例特載教唆詞訟一條內開凡教唆詞訟及為人作詞狀增減情罪誣告人者與犯人同罪至死者減一等誠以誣告之舉原係本犯起意而教唆之人但為之商謀作狀增減情罪所以本犯罪至於死教唆者與因人連纍之義相近得以從寬減等惟是誣告一項本犯有刁頑愚昧之不同教唆有增減造意之各别其本人原欲誣告又遇有教唆者按律同罪至死減等原屬允協尚有一種鄉愚無知之輩事本細微初意並不欲告亦不知如何可以誣人乃有攬訟刁棍瞷其有事或乘機圖騙伊財或素與被告有隙或藉此包訟以為訛詐張本於是嚇以利害之言騙以決勝之説憑空代作詞狀使之控告而聽唆之人遂視彼為靠山供其食用任其指使及至庭審之時虛誣畢露詰問主唆之人該犯則一口咬定堅供並無其事復究其狀係何人所作非稱過路外客即云算命先生反復根究抵死不吐逮招案既定而訟師置身局外又復别圖包攬此等刁惡訟棍實堪痛恨各處皆然若不設法矯偏救弊急除唆使惡棍恐訟端無由而息惟是唆訟之徒姦狡詭詐難致敗露臣請唆使情實將唆使之人照誣告律治罪其本犯比照竊賊將同夥贓數據實供明并案內各犯指拏全獲準其減一等發落之例亦減一等治罪如此則被唆者求寬巳罪方肯供首而訟棍狡計不能自保或畏法斂迹釀訟生事之弊可以杜絶矣是否有當伏祈皇上敕部議覆施行謹奏殊屬迂濶不通之至雍正九年五月二十一日江西按察使在任守制臣樓儼謹奏為謹陳江西雨水及禾苖情形仰祈聖鑒事竊江西一省三面距山惟南昌及饒州南康九江迤北一帶負江依湖地皆平原水勢易泄而難蓄故雨不厭多今自三月初旬起至四月下旬止天雨連綿晴日無幾處處扶犁民間並不苦雨而江西土俗俱種早稻插秧者均得乘時栽插完畢現在禾苖芃芃暢發大有之兆巳成將來六月即可食新臣奉職茲土目擊太和景象無任歡忭理合恭摺奏聞謹奏覽江右禾苖雨水情形朕心深慰同日又奏為請敕通行一米二榖交代之例以杜弊端事恭惟我皇上加意民生首重積貯因南方地氣濕熱將倉米每米一石改榖二石可以久貯更立存七糶三之法不致榖有黴變此誠萬世不易之良規天下臣民所倚賴者也惟官經更易必須交盤在交出之員惟以照數量斛不致缺少即可完事而接受之員又以榖色不淨苛勒留難每致互爭延諉交代遲延伏思貯榖之法原以代米一米二榖民間通行若將倉榖碾試每榖一石可碾米五斗者即於米數無虧儘可接受其不足五斗之米者自應統計照數補足方為得平查雍正七年五月福建撫臣劉世明於掯勒交盤疏內題明福建地方交代分别淨榖毛榖每石總以碾米五斗為率不足照補經欽差廣東撫臣楊文乾等議行在案但止行之閩地未經通行各省臣愚以為同屬倉穀似可畫一飭遵庶交代接受之員各無藉諉苛勒遲延之弊矣是否可行伏祈皇上睿鑒施行謹奏爾稟商該督撫將本省倉榖援照閩省之例奏請可也同日又奏為請定內缺委署積算之例以示鼓勵事欽惟我皇上軫念地方無時不以用人為急凡直省邉疆海疆及繁劇難治州縣定例由督撫題請補授而又發試用人員一遇缺出即行委署其試用人員內有分别扣限一年二年果能稱職題請實授升補誠不易之良法也但查試用中有題署委署之不同而署事亦有久暫之不一如外省丁憂事故出缺謂之外缺可由督撫題署則各按其年限滿日具題若屬升遷處分等缺應聽部中選人者謂之內缺此不過暫時乏員督撫委署新任官一到即要卸事無缺可授故止報部而不具題此等署員或三月或半年以其才堪辦理甫經前署卸事旋又另委他處仍係內缺前後竟至一年有餘者因委署之時未經題明皆不算入定例一年二年之數竊思同為試用人員其外缺題署者有期滿題達之例而內缺委署者即過一年兩年而未遇外缺竟不得與於一年兩年之例未免偏枯伏見各省以簡調繁之員內有試用者皆計其前後署事月日積算具題實授臣請嗣後暫時委署之員如果試用勤慎才堪稱職者仰懇皇上天恩即照此例計其先後署事月日計算如原銜係應選知縣巳滿一年或佐二借署知縣已滿二年均各擇其人地相宜之缺一體同外缺人員保題升補俱免其再署外缺另扣年限如此則不必有內外缺之分而總以嵗月之久暫該員之賢否為衡暫署之員莫不爭相奮勉力圖報效矣是否有當伏祈皇上睿鑒施行謹奏此奏迂謬處不勝批諭總之心一存私出諸口者焉有是當之理雍正九年八月初八日江西按察使降級留任在任守制臣樓儼謹奏為恭謝天恩事雍正九年六月二十八日臣準布政使李蘭移奉撫臣謝旻牌準廣東撫臣鄂彌達咨刑部題覆惡棍蕭鳴誘搶黃氏為妾囑賊扳窩一案本年四月初六日奉旨蕭鳴著即處斬樓儼著降一級從寬留任餘依議欽此臣隨恭設香案望闕叩頭謝恩訖伏念臣身任臬司失於覺察部議降級調用荷蒙聖德如天從寬留任聞命之下感激涕零自問何人仰邀聖天子保民若赤之天心勉盡臣職於萬一耳所有微臣感激私衷理合恭摺奏謝伏乞皇上睿鑒謹奏覽同日又奏為再陳江省早稻收成分數晚禾現在情形并各屬米糧價值仰祈睿鑒事竊江西一省本年自三月初旬至四月下旬雨澤霑足禾稻暢茂前經臣具摺奏聞今江西早稻於六月下旬收割至七月中旬俱巳完畢統計收成有八分九分十分不等省城米價前每石至一兩以外者今巳減至七錢七八分上米亦不過八錢五六分外縣俱減至每石五錢八九分上米亦不過六錢五六分惟廣信饒州九江三府每石九錢二三分上米九錢七八分至一兩二三分不等其餘各府則皆七錢五六分至五錢二三分訪之輿論必俟晚稻全穫其價始定而晚稻形勢因五六兩月雨水調勻灌溉巳足雖省城七月內少雨亦不苦旱外府仍陸續有雨今省城又於八月初六日得雨田禾暢茂將來收成可有十分之望理合恭摺奏聞謹奏業經督撫數次奏聞矣何必多此一番瀆陳同日又奏為恭謝聖訓敬繳硃批仰祈睿鑒事竊臣前奏請將暫時委署之員積算月日分别保題升補一摺奉硃批此奏迂謬處不勝批諭總之心一存私出諸口者焉有是當之理欽此仰見我皇上聖明洞照訓示臣工必歸於至公至當之盛意臣跪讀之下實深惶悚緣臣以庸材淺識罔知大體惟念受恩深重報稱無由每有管窺蠡測之見輒斤斤自得上瀆聖聰此種私衷實類野人獻曝初不知迂謬錯悮之處巳不可勝數乃蒙皇上不即加以議處恩賜明切批示臣實如夢覺醉醒愧栗無地理合具摺恭謝並繳硃批奏摺伏祈聖鑒謹奏若不於根本處黽勉徒於枝葉邉揣摩如夢之錯悮將不勝其覺矣愧栗何益同日又奏為恭請聖裁事竊查外省秋審情實重囚向無三覆之例雍正二年四月蒙皇上如天好生之仁敕下法司亦照朝審之例三次覆奏且往往仰沐恩綸停決若情稍可矜者則莫不豫以末減至所擬緩決人犯內或因忿激還毆殺非有心或因無知聽從首凶巳決或因卑幼犯尊長情尚可原并有竊贓滿貫審無拒傷情事及續獲夥盜逃犯未獲監候待質者每嵗俱沐皇恩準豫緩決普天率土共沐我皇上寬大洪仁尚有何可妄陳末議之處惟是此等緩決人犯皆係歷次奉文監候歲復一歲每至七八九年仍復監禁甚有巳歷秋審十次之外自犯事審招至今其錮禁囹圄者巳十有餘載此雖罪犯應死法無可逭第既久沐皇仁歷豫緩決則巳得有生機若仍遞年淹禁必致久化獄磷無以昭示皇上矜恤民命之至意臣愚以為此等秋審巳歷數次緩決人犯如巳不復論決者仰懇皇上天恩敕部酌量情罪重輕作何減等發落庶餘生之犯得以始終沾沐天恩而牢獄無積年淹禁之囚矣臣之管見如斯是否有當伏乞皇上睿鑒施行謹奏殊屬聾瞽之論奏也硃批諭旨卷六十八
