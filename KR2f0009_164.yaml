body:
  text: 欽定四庫全書硃批諭㫖巻一百六十四硃批髙鑛奏摺直隸通永道臣髙鑛謹奏為恭謝有以勢挟持生事不法之徒自聖明御極以來宣仁布徳振綱肅紀咸皆斂迹臣職司整飭首重彈壓尤必仰體皇仁子恵至意勸勉善導與旗民共戴徇再查通永道厯任交盤張安世李繼謨虧項纍奏覽直隸通永道臣髙鑛謹奏為奏陳私悃懇恩賜覽事竊臣祖固山大髙必光以指揮使後裔從龍入關分隸鑲黄旗施茂安佐領下順治十二年施茂安病故其家乏嗣將本佐領下阿達哈哈畨常登補授常登告退後臣伯父髙璘蒙世祖洪恩由侍衞賞補佐領髙璘病故後臣伯父髙璉承􅊞髙璉告退彼時臣父兄皆在外任此缺係通政使王守才兼管年老告退後仍將臣族姪髙允中補授因陞廣東駐防協領後臣堂兄髙銓補授於本年正月内病故臣家承襲佐領四輩共厯四十餘年今當本旗選員奏補之際臣謹將承襲緣由繕具奏摺外附臣在京兄弟等履厯清單預行妄凟天鑒伏念臣宗祖從龍以來六十餘年世受國恩子孫多登仕籍而佐領為根本之地如别佐領下人兼管則受其挾制操縱辱沒不可勝言此等情弊久在聖明洞察之中用敢仰邀聖主曲賜矜全則臣闔族均叨恩榮於萬世矣謹奏本朝佐領承襲甚有關繫聖祖御極六十餘年於此一事未嘗少忽該都綂當有一定公議朕不便偏徇俟臨期酌量汝家如有可管之理朕自加恩賞補也硃批諭㫖巻一百六十四
