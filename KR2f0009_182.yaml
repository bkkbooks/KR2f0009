body:
  text: 欽定四庫全書硃批諭旨卷一百八十二硃批禪濟布奏摺雍正二年閏四月二十一日巡視臺灣御史臣禪濟布臣丁士一謹奏為恭謝天恩併報微臣接任日期事竊臣等奉命巡視臺灣於雍正二年二月初六日恭請聖訓仰承天語諄切敢不力圖報稱於四月二十五日至福建省城於閏四月二十一日到臺灣臣等恭設香案望闕叩頭謝恩前任御史臣吳逹禮黃叔璥口傳硃批伊等奏摺將數年經歷民情土俗一切地方事宜備悉令新任知悉欽此臣等跪聽之下感激難名惟有勉竭駑駘益加策勵以上副我皇上委任至意至一切事宜容臣等細心咨訪次第入告外理合具摺恭謝天恩謹奏知道了汝二人勉思盡力毋忝厥職應奏聞之事絲毫莫隱據實入告雍正二年六月初四日巡視臺灣御史臣禪濟布臣丁士一謹奏為奏聞事竊據臺灣府知府髙鐸報稱本年閏四月二十七日有琉球國番子小船一隻內番子一十六人被風飄至澎湖業經澎湖副將陳倫炯解送提督轉遞到省等因臣等隨飭該地方官加意撫恤去後又據臺灣府報稱據諸羅縣申稱五月初七日外海有雙桅船一隻被颶風飄泊至八里岔地方係中山國琉球番船內番男番婦共二十八人奔投上岸船即擊碎飄散無存解遞來府轉報到臣衙門臣等會同鎮臣及該府當令臺協辨員伴送厦門交提督轉遞到省聽督撫二臣優恤安插在案臣等隨捐給銀米併飭該地方官沿途保護毋致失所以仰副我皇上懷柔逺人之至意謹奏荒外逺人理應加意存撫以示中華廣大之仁雍正二年六月十五日巡視臺灣御史臣禪濟布臣丁士一謹奏為恭報雨水田禾地方情形事臺灣氣候物産與內地不同種早稻者少雜植菁麻豆蔗栽插晚稻在五六月之交於閏四月二十八九等日連得大雨五月及今甘霖疊沛所種早稻菁麻豆蔗俱極茂盛晚稻悉得及時栽插現今榖價每石三錢五六分米價每石八錢二三分全郡大槩相似地方安靜民番樂業文武各官悉皆和衷辦事合併奏聞謹奏和衷二字最為官針之要倘有意見不同處秉公據實密奏不可匿怨而友尤不可徇友誤公雍正二年八月初四日巡視臺灣御史臣禪濟布臣丁士一謹奏為奏報颶風情形事臺灣於本年七月二十三四等日大風雨非常迅烈臣等親身查勘附近里莊草房間有倒塌雖早稻吹損幸臺邑布插無多晚稻出水二三寸許並未摧折臣等隨差員分頭星往南北二路查勘鳯山縣屬早稻被風之處與臺邑相同晚稻無損自諸邑北至彰化縣風雨俱不甚迅烈至於被風兵民房屋及各港口擊壞商哨船隻臣等飛飭各該地方官辨逐一確查詳報督撫題逹外所有颶風情形理合具摺奏報以聞謹奏往返萬里惟憑一紙之奏總宜據實為務雍正三年三月十六日巡視臺灣御史臣禪濟布謹奏為奏聞事竊臣一介庸愚蒙皇上天恩特命巡視臺灣海疆要地時切冰兢惟思勉竭駑鈍仰報皇上髙厚之恩於萬一兹臣查閲郡治自荷國恩休養至今生聚日繁閭閻稠密而背山面海一望曠遙既為四方雜處之區乃無一尺藩籬之衛姦良來往不易稽防倉庫監獄更關重大臣再四思維與升任御史臣丁士一鎮臣林亮臺厦道臣吳昌祚公同確商建城則工料浩繁壘土又沙浮易陷臣等籌酌樹以木柵其基三面環山周經一千八百丈每丈木植釘鐡灰土人工料估用銀四兩木長一丈六尺下栽四尺用石灰沙泥填築木杪上頂釘以鈎釘用木板上中下橫連三道釘固每隔四十丈蓋小望樓一座上安炮位撥兵支守於要衝之處開闢四門各築門樓安設炮位木柵之西兩頭俱抵海邉各設炮位千把總輪值以司啓閉以固屏障臣與丁士一林亮吳昌祚暨各文武辨員皆協力公捐復據闔郡紳襟士庶人等相率環署籲請捐輸又據臺灣縣知縣周鍾瑄詳同前由士民皆歡欣踴躍自一二尺起以至一二丈不等樂願捐備並無抑派今據臺厦道吳昌祚擬擇本月二十七日興工仍經報明督撫專委臺灣縣周鍾瑄親董其事經理收支召匠購料工完造册報銷外所有建築木柵情由理合繕摺奏聞謹奏兩年以來臺郡文武官辨與禪濟布等俱能實心任事即此建築木柵一事籌畫甚屬允妥深為可嘉將摺內有名官辨該部議敘具奏同日又奏為聖德覃被無疆生番歸化日衆事前據升任臺灣知府髙鐸招徠北路山前巴老遠社等四社又據臺厦道吳昌祚招徠捌里罔卑南覓等六十六社歸誠俱經題報在案今據該道報稱又招徠南路生番貓仔等社土官妹羅裙新蟯老務等三十五名經地方營縣差員伴送來府并齎獻戶口册內開貓仔社紹朥釐社等一十九社前來歸化等情到臣隨會同鎮道暨各文武辨員宣布皇恩遍加奬賞令通事人等伴送各番回社飭令地方官加意撫綏嚴禁擾纍俾各安居樂業外其户口册籍聽督撫臣會疏題報所有生番歸化情由理合具摺奏聞謹奏覽奏生番歸化巳悉更聞生番有傷人之事為何不行奏聞同日又奏為恭報得雨日期事竊據臺厦道吳昌祚報稱臺灣府屬四縣地方於二月十二十九二十一等日俱得雨八九寸不等本月初二初三十三等日又雨四野霑足各處芒蔗芝麻雜糧早稻巳經及時栽種春花黃豆大小麥等項俱各豐收到臣臣覆查無異此皆仰賴我皇上洪福民番樂業文武和協地方安靜理合具摺奏聞謹奏據奏臺郡雨足麥熟深慰朕之逺懷雍正三年五月初四日巡視臺灣御史臣禪濟布謹奏為恭謝天恩事竊臣蒙皇上特簡巡視臺灣迄今一載凛惕彌深常憂隕越今接到都察院劄付恭沐天恩俾臣再任一年臣聞命自天惶感無地惟有益勵冰兢以圖報稱臣又接兵部來文於鎮臣摺奏生番歸化事敘及臣與丁士一吳昌祚等欽奉御批林亮等從優議敘疊荷聖恩直同覆載伏思生番來歸實惟我皇上恩溥德洋以致遐方慕義輸誠即捐賞招徠亦鎮道臣共謀協力克宣德威臣無毫髮之功而濫叨賞格清夜問心實深愧悚伏乞皇上俯鑒愚誠留此殊恩以賚有功庶犬馬微忱得以自安為此繕摺恭謝天恩謹奏但能將地方諸務殫心糾察共相經理事事據實上逹勿隱則居之無愧何不安之有勉力為之雍正三年九月初九日巡視臺灣御史臣禪濟布給事中臣景考祥謹奏恭請皇上聖躬萬安朕安風聞爾等臺灣文武不和諸事互相掣肘果若此於地方甚無益兵民胥至受纍朕殊為此厪念如有則改之無則加勉倘被朕訪知的確降旨譴責爾等其將何詞解免耶同日又奏為恭報雨水田禾情形事竊今嵗臺灣自春月即有雨澤入夏以及七八月以來雨水連綿四境沾足所以田禾之盛逾於往嵗民間早稻已登雜植菁麻豆蔗俱獲豐收皆我皇上深仁至德感召天和因而雨暘時若百姓盈寧也理合據實奏聞謹奏據奏收穫情形深慰朕懷同日又奏為海神效靈懇頒宸翰以昭崇報事臣等聞前靖海將軍臣施琅征服臺灣之時舟師戰於澎湖隱隱有神兵助陳是日海神天妃廟中見神像皆有汗下大軍既集島中乏甜水臣施琅禱於天妃廟移時水泉溢出足供數萬人飲及至臺灣之鹿耳門乃全臺鎖鑰僅容一舟止可魚貫而進乃潮水驟長五尺益以順風舟師聨帆直入遂定臺灣經臣施琅恭疏具題聖祖仁皇帝敕建天妃神祠其原籍興化府莆田縣湄洲勒有敕文以紀功德隨又加封天后康熙六十年臺匪竊發其時水師臣藍廷珍林亮等率師至鹿耳門水亦驟長舟師揚帆並進七日克復全臺此天后屢顯靈異以勷耆定之績者也臣等竊見復臺以來凡大小臣工片績微勞俱蒙寵賚况天后之靈感昭昭在人耳目臣等仰懇聖恩親灑宸翰製成匾額臣等請恭摹為三一奉於天后原籍聖祖敕建之祠一懸於厦門鎮祠中一懸於臺灣府祠中不特海神增光爼豆翼戴無疆且使梯山航海負氣含生之衆無不就日瞻雲共仰天顔於咫尺矣為此恭懇聖恩伏乞睿鑒施行謹奏國家崇德報功人神一理該部查議具奏雍正三年十月初七日巡視臺灣御史臣禪濟布謹奏恭請皇上聖躬萬安朕躬安覽爾所奏之事咸係爾職分中應奏聞者一切悉照此秉公無隱甚屬可嘉殊為不負朕之任用也爾本係一誠慤謹慎之人諸凡就此誠實本分一邉行去自無差謬切毋稍涉欺飾弄巧反成拙也勉之同日又奏為恭謝天恩疊錫事竊臣於生番歸化事蒙恩議敘加級又臣籌臺灣府治建築木柵事與升任御史臣丁士一鎮臣林亮臺厦道臣吳昌祚等公議協同具摺奏聞欽奉御批將摺內有名官辨該部議敘具奏欽此跪讀之下頂踵難酬臣何人斯獲遭隆遇至此惟有朝夕與臺灣文武各官互相勸勉共矢冰兢揆日課工務求堅固撫番保庶益躋熙皥以樂升平庶竭犬馬之微勞上報髙深於萬一理合繕摺恭謝天恩謹奏覽爾奏謝知道了爾等官名監察顧名思義凡事秉公一無阿徇乃職分當然但以無隱為要勉力為之至於密摺奏聞之事在朕斟酌偶一宣露則可在爾既非露章惟以慎密不泄為要否則大不利於爾而亦無益於國事也其凛遵毋忽雍正三年十月十六日巡視臺灣御史臣禪濟布給事中臣景考祥謹奏為恭報地方收成榖價仰慰聖懷事竊臺灣自二月初旬至九月將盡雨澤從未欠缺十月內禾稼盡登十分收足誠為大有之年目下臺灣府治榖價每石三錢三四分不等鳯山彰化二縣每石三錢諸羅縣每石二錢六七分商民人等無不歡欣鼓舞理合據實奏聞至於建築木柵之事於十一月初旬必能完工俟工竣之日另行摺奏合并聲明謹奏據奏全臺年豐榖賤大慰朕懷同日又奏為據實陳情仰慰天鑒事竊臣禪濟布前奏生番歸化一摺奉到硃批聞生番有傷人之事為何不行奏聞欽此臣等查得本年二月十九日臺灣之羅漢門地方有汛兵林觀董廣楊捷賴雲齊歡等五名奉差至坑口伏路林觀董廣夜遇生番鏢傷斃命楊捷等三人執械相持幸有巡夜兵丁接應殺死生番二名餘番逃竄拾得鏢箭具報諸羅縣立即差押通事拏獲凶番四名通報在案臣等即欲奏聞緣查閲舊案生番傷人前任御史臣吳逹禮黃叔璥皆未陳奏俱由地方官照人命例審擬題結臣等一介庸愚蒙皇上委任其有利弊所關督撫提鎮未及奏陳者敢不據實奏聞至於人命盜案等事地方官自當照例具題臣等何敢冒昧輕瀆聖聰臣等巳與鎮臣道臣并府廳縣公同商酌務將就近一帶生番之為民害者或用招撫或用𠞰捕必審時度勢謀出萬全尚未敢輕動也今蒙皇上天語垂問謹將生番傷人情節及臣等愚悃據實陳明伏祈聖鑒謹奏生番乃未沾王化之人爾等相機隨宜招撫則可𠞰捕必致戕害生命有傷天和不可輕舉妄動也雍正三年十二月初二日巡視臺灣御史臣禪濟布謹奏為奏聞事竊臣去嵗閲視臺灣鎮協水陸操演半係新換兵丁俱屬平常隨飭訓練至本年十一月十六日鎮臣林亮知會臣暨道府縣驗閲陸師大操計三營額設馬步戰守兵二千七百名除分防各塘汛撥守各營盤及各官隨丁并先到馬兵除分撥南北三營外現在馬兵一百二十名步兵一千六百名本日合操馬步各兵軍火器械頗皆諳熟步伐止齊俱各有方時即嚴飭臺協將領悉照陸師勤加操演俾其平地熟習則戰艦施演自無倉惶失措之虞其澎湖協營向例臺屬文官一員看操兩載未有具報臣并商鎮臣飭行澎協按期操演至明春大操照例報知合將臺鎮陸師情形據實奏聞至於臣前奏請酌撥內地四十三營馬兵三百名防臺經商鎮臣委員到厦看驗如有廣馬騍馬以及不堪者發回更換務要臕壯足額以濟實用現在催趲前來俟齊足之日另行具奏合并聲明謹奏覽奏朕深為嘉悅三年以來聞爾聲名頗好所以兩次留爾巡臺近日景考祥參奏爾之過咎爾今又參伊之欵迹事難臆斷只得令爾赴省與景考祥對質自然水落石出皂白判然矣雍正四年二月二十一日巡視臺灣御史臣禪濟布謹奏恭請皇上聖躬萬安朕安所事閲爾奏摺始洞悉原委不然則舛錯至不可問矣朕今即交與髙其倬審理爾但坦懷勿慮致有寃抑也所幸者有此一奏否則朕亦幾被所愚設或審理時少涉枉屈朕必調爾等來京親加覆鞫以定是非曲直硃批諭旨卷一百八十二
