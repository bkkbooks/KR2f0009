body:
  text: 欽定四庫全書硃批諭旨卷九上硃批楊文乾奏摺雍正三年二月初二日河南布政使臣楊文乾謹奏竊臣受恩深渥凡事關地方緊要雖非専責亦必留心察訪入境之後見黃河堤工物料並無備辦即詢問河員及沿河地方官皆云因河道陳世倕不肯發銀未經採辦經副總河催之再三止發銀十之三四尚未辦到將來延至新年料價漸昂購買艱難等語臣思豫省河防最關緊要時時上廑宸衷前嵗衝決以後蒙皇上特遣副總河臣嵇曽筠指授方略河臣仰體聖心率同河員辛苦經年始將各處隄工修築完固但新築堤岸雖巳告成全在次年保固必須預備物料隨時搶修庶可無虞今物料不備一遇桃汛伏汛倘有疏失將前此所費無限金錢盡歸烏有萬姓復致流離關係匪淺臣受皇上重恩何敢瞻徇隱諱為此據實密奏伏乞睿鑒施行謹奏此奏甚屬可嘉巳有旨矣雍正三年二月十九日河南布政使臣楊文乾謹奏為奏請睿裁事竊照布政使專責在於庫帑今查豫省藩庫內有前任布政使因黃河各口漫決支給銀五十八萬九千有竒今工完水退日久尚未具題請銷以致錢糧欵項久懸臣思錢糧重大例應奉有諭旨或接部文方可支給但黃河水勢緊急一遇湧發地方安危係於呼吸布政使若不給發倘有疏失關係非小若從權支用不即題銷又慮庫項無著臣再四思維去嵗河工方才告竣保固全在今年恐嵗修銀兩不敷所用查彰衛懷三府捐納貢監事例原議每穀一石撫司銀各一錢陸續收貯藩庫現計有二萬餘兩臣請將此項或撥一萬或撥二萬解交河庫遇急取用此非正項錢糧止令河道報明河撫二臣稽核摺奏此後再欲動支必俟部文知照方行給發如此則新築河堤既得隨時保固而國帑亦不致擅自那移矣謹此密奏伏乞皇上睿鑒施行謹奏覽奏料理得當甚可嘉奬朕専為此事巳有旨矣同日又奏為奏聞事竊查豫省從前連被水旱百姓流移荷蒙皇上念切痌瘝蠲糧賑濟發帑修堤田地涸出民歸故土復蒙天恩特命行文巡撫查明實在舊欠分作三年帶徵旋經撫臣石文焯遵旨具疏題請部議五十九六十兩年舊欠錢糧於雍正二年帶徵六十一年開歸彰衛懷河六府地丁漕米分於雍正三四兩年各帶徵一半除雍正二年帶徵五十九年錢糧所欠無幾其六十年錢糧開衛懷河四府尚多未完今雍正三年又應帶徵六十一年錢糧再加雍正元二兩年及今嵗本年錢糧共係五年並徵約計每年欠至數萬兩及數十萬兩不等一齊彚催民實難支可否將歷年舊欠銀兩稍寬年限除六十一年錢糧仍於三四兩年帶徵其六十年並雍正元二兩年未完錢糧準於雍正五年起每年止帶徵舊欠一年三年可以全完則民力得舒而國課亦易辦納矣但格外皇恩出自聖裁非臣下所敢沽名請寬者為此密奏伏乞睿鑒施行謹奏此事應與撫臣商妥具奏雍正三年三月二十三日河南布政使臣楊文乾謹奏為奏請聖裁事竊臣初任山東曹州時素悉州之西南有桃園集地方雖名屬曹州而界連三省壤接七縣實係山東河南直𨽻交會之區查桃園集去各州縣城池相距或一二百里或七八十里地形遼遠文武兵役巡察難周其間匪類溷迹姦宄潛蹤習尚強梁遇有水旱事故即藉名糾黨乘機搶掠地方不敢問州縣不及知緣離城窵遠姦民朝居此省暮移彼境出沒無常縱有差捕亦難弋獲以致三省匪類流聚於此日久養成錮弊非有専員不能彈壓臣今蒙聖恩簡畀河南布政桃園集又適在豫省交界密訪近日情形依然如故臣查曹州原有州同一員並無専司似可移駐桃園集但州同衙役無幾請將曹州曹縣民壯內各撥二十名再於連界之六縣內各撥十名共湊一百名責令該州同帶領巡查遇有盜賊匪類不分何省地方何處人氏概許擒捕解送印官審究并編查保甲互相稽察庶姦徒不能托足地方永受敉寧之福矣是否可行伏乞皇上敕下山東河南直𨽻各督撫遴員踏勘會同議覆施行謹奏如此留心地方竭忠入告方不負朕任用之意朕實嘉之已有旨矣部文行令三省會議時爾將所見備悉開陳同撫臣田文鏡會商直𨽻山東督撫酌定具奏雍正三年十月十五日廣東巡撫臣楊文乾謹奏為奏謝聖恩訓勉事竊臣家人齎回御批奏摺至九江地方臣隨恭設香案望闕叩頭敬謹開看內代臣父楊宗仁恭謝天恩一摺奉到硃批臣跪讀之下仰見皇上聖德如天至明如日教忠教孝鼓勵臣工無不備至不特上天之報應分毫不爽而皇上之鑒别賢愚尺寸無踰臣上荷君恩至深至渥下遵父訓維切維嚴兹蒙皇上聖諭惟有益加惕勵竭盡駑駘務期無欺於上天即無欺於皇上也為此具摺恭謝天恩謹奏覽奏披露衷誠朕甚嘉悅從兹弗移此志自有後效也勉之諭楊文乾爾父朕實深為惋惜曽為之垂淚數次至朕之加恩處諒爾自皆知悉今因廣撫不得其人命爾在任守制朕心實為不忍爾其仰遵朕命忍痛竭力為之前爾巳獲解任赴楚侍奉爾父兩年昨赴粵任又經路過定省爾父可謂子道巳盡爾父年及耆艾僃蒙朕恩巳成全千百年一人物矣爾雖抱罔極之痛言念及此復當代爾父慶幸也死生有數不必過哀今即令爾丁艱守制巳不及遂爾慎終之志矣當思移孝作忠勉圖報效再者爾列欵條奏一摺朕已留中閲爾此摺似在昏憒匆遽之際所奏朕亦不即為慿今既命爾在任守制於回任後再加詳悉一一斟酌奏聞不必過忙徐徐料理具奏可也特諭雍正三年十二月初十日廣東巡撫臣楊文乾謹奏為奏覆事竊臣齎摺家人回至江西九江地方奉到硃批諭旨臣敬謹跪讀伏念臣父生前殁後疊蒙皇上寵眷逾常得為千百年一人物不特臣當代臣父慶幸即臣之子孫生生世世亦永戴鴻恩於勿替且聖訓周詳委曲指示至再至三實不啻家人父子臣五中感激涕淚交流惟有矢竭赤心於地方一切利弊及同官屬員之賢否凡有耳聞目見即據實密奏一面殫力辦理政務愛惜百姓以仰副皇上惠養元元委任微臣之至意伏查臣於八月間摺奏奉旨面交各事件今奉諭旨將臣摺留中令臣再加詳悉一一斟酌徐徐料理具奏除老戶一件巳蒙御批臣欽遵密囑布政司及各地方官實力奉行外其餘各條現在逐件細加訪查必有益於國家有利於百姓斟酌妥當陸續具摺奏請睿裁所有奉到硃批諭旨理合恭繳謹奏一切俱當黽勉實力奉行同日又奏為奏聞事竊查廣東地方晚禾收成分數據各屬詳報廣廉二府屬并羅定州屬俱有七分韶惠潮雷四府屬俱有七八分肇慶府屬有六七分南雄府屬有六分髙瓊二府屬俱有五六分目下米價廣州南雄韶州惠州潮州肇慶等府屬每石六七八九錢至一兩一二三四錢不等髙州府屬每石三錢三分至五錢五分不等雷州府屬每石四錢六分至八錢五分不等廉州府屬每石六錢五分至七錢不等瓊州府屬每石六錢三分至八錢五分不等羅定州屬每石八錢一分至一兩不等再查粵省除南海髙要髙明四會三水等縣被水之後收成歉薄其餘皆屬豐稔現在地方安靜百姓樂業臣謹繕摺具奏恭慰聖懷伏乞睿鑒謹奏據奏地方收成及米價各情形深慰朕懷同日又奏為奏聞事竊臣自楚回任據文武各官報稱廣州府龍門縣上坪山有礦徒三百餘人帶有風箱器械潛來偷挖又惠州府長寧縣米篩山有礦徒數十人偷挖錫砂河源縣鳳凰山桃子科各山場有礦徒二百餘人永安縣貓公坑有礦徒千餘人偷挖銅砂俱無擾害地方等因到臣臣聞報隨飛行該管文武帶領鄉勇辨兵協同前往將首犯擒拏究解餘黨悉行驅逐并飛移督提二臣轉飭協捕去後現今巳有解散者尚有未經解散者俱在嚴催捕逐俟驅逐淨盡後再將臣前摺所開大岐山等處選擇殷實之人取結承辦止用本處人傭工不許異籍流棍攙雜在內如此不特銅斤可裕鼓鑄而窮民亦得藉以資生且各山既有官商承管流棍難於托足更可免易聚難散之患矣除開採事宜容臣細訪酌妥另行奏請聖裁外今將礦徒緣由先行密奏伏乞皇上睿鑒謹奏雖云令本地人民開採可免易聚難散之患然官商二字究非善政亦不宜聚集多人此事當與督臣孔育珣詳審商酌會奏慎毋涉於輕率孟浪同日又奏為奏聞事竊臣自楚回粵行至江西贛州地方接到署廣東布政司惠潮道方願瑛稟帖內稱告休藩司朱絳虧缺庫項銀三萬一千四百餘兩未敢接受朱絳係總督兒女姻親諭令出結交代願瑛不敢出結總督即面委糧驛道殷邦翰接署司印邦翰亦云若有缺欠不肯出結總督因而中止但庫項虛懸未便等語臣隨令署司差人速回傳諭令朱絳趁臣未到之前作速賠補若到任後盤出虧少惟有據實題參欲求徇情擔延代為容隱斷斷不能等語去後復據署司報稱朱絳聞信畏懼自交出銀并總督代為彌補所有虧空之三萬一千四百餘兩陸續俱巳補足等語臣到任後親赴藩庫逐一盤查所有應存正項銀兩果巳交補足數並無虧缺矣至粵東從前因辦理公事需用銀兩遂將各屬俸工并火耗銀兩紛紛提解以致不肖州縣竟有藉端加耗私行科派等弊且提解不均州縣有坐享厚利者有養贍不足者種種偏枯不一而足臣現在將通省耗羡確數徹底清查明白通盤計算使督撫司道府廳州縣各官均留養廉之費并將公事之中確查明白核定實數將從前浮費通行裁減州縣加派等弊盡飭革除務使小民咸沐浩蕩皇恩於靡既除作何酌定之處俟臣等公同會議妥當立有章程另行密奏外所有著落朱絳補足原缺庫項及斟酌藩庫章程各緣由謹先繕摺奏聞謹奏司庫此項那用孔育珣曽經奏過爾等封疆大吏惟宜一心一德以和為主切毋聽信屬員離間之言以至好惡參差也孔育珣乃督臣中之優者爾當與之協衷共力代朕整理地方勉之同日又奏為奏請聖裁事竊臣於回任後檢查命盜案卷自雍正元年起至本年十月以前通計三年之內命案共有七百零七件內除審題並外結過各案外現在未結尚有一百零一件盜案共有二百八十九件內督臣巳參疏防者二十八件除審題并外結過各案外現在未結尚有一百七十七件臣於五月間入覲陛辭時荷蒙諭旨若命案內有情罪稍輕或尸親願息者許臣審明酌量完結彚齊摺奏臣現在欽遵酌其情罪稍輕者即為審明完結每月具摺奏聞外至粵東山賊洋盜處處皆有是以劫掠頻聞現今已參未參案內盜犯充滿監獄報病故者殆無虛日將來春氣一發瘟疫纒染恐多瘐斃臣仰體皇上如天好生之德現在嚴催按察司將從前積案飛速招解臣不拘早晚隨到隨審將已參疏防之案繕疏具題外其未參之案可否酌其情罪分别速結以免目前監內之擁擠并免將來春氣之瘟疫作何發落臣亦照案每月彚齊摺奏嗣後凡有督臣參過疏防之案臣照例審明具題如督臣未參之案俱照此完結每月繕摺密奏是否可行臣未敢擅便伏乞皇上批示遵行謹奏盜案非命案可比命案遲延拖纍無辜固屬不宜若因監斃者多遂立意輕縱盜犯尤為不可此事朕難批諭况亦非摺奏完結之事倘慮積案拖纍在汝秉公嚴催詳情度理而為之耳孔育珣於緝捕盜賊甚為盡力彼擒之汝縱之恐汝難當此論縱虎歸山豈為仁政此等作為非積陰功乃大壞德行事也若不加意斟酌萬萬不可雍正四年正月十九日廣東巡撫臣楊文乾謹平政事每多廢弛巳經赴京引見自難逃聖明洞鑒惟是此缺非有才守兼優熟悉風土之員實之所為粵東西面門戶甚關緊要非有強幹廉潔現奉旨調赴引見自難逃聖明睿照之中臣所有一二深知之員與例不合巳經另摺密奏伏乞皇上特簡賢能賞補至按察司一缺為通省刑名總滙旨帶往粵東題用之道員殷邦翰經督臣題補廣東糧聖恩也俟宋瑋引見回日仰懇睿鑒抑臣更有請者嗣後遇有要緊缺出如品級相當之員臣具疏題補倘人地相宜而品級不合者臣即具密摺奏請聖裁批示遵行謹奏第一務縝密要緊再者爾等督撫指缺題人多有論奏此法不妥者朕近有旨令爾等將賢能之員預保送京引見遇有人地相宜缺出再密摺奏請此法最善亟當遵行也同日又甲精細詳密緝捕盜犯甚多後於湖廣總督任內奏請改補漢陽縣知縣業巳奉旨允準復因兩廣督臣楊琳保題遊擊是以現在臣標臣查其操守廉潔粵省民情甚為熟悉又奉武官終其身甚為可惜可否仰懇天恩嗣後有緊要缺出容臣將范宗堯題請改補府廳聖裁非臣所敢擅専也再臣兩次由楚赴粵經過江西聞現任南康府通判胡恂才具優長聽斷明敏臣看其人品端正年紀五旬內外正可效力并問其居官為政之道應對條暢諸事諳練臣思胡恂在江西不過佐二間曹若得仰邀隆恩亦非臣所敢擅請也又河南省原任鄢陵縣知縣孫國璽臣在河南時深知其辦事勤慎操守廉潔又候補同知黃文煒臣在陜西時見其在軍前效力老練勤敏才具年力皆堪任用可否仰懇天恩將孫國璽黃文煒敕發來廣俟有緊要缺出酌量具疏請旨補用則人才不致淹滯而重地可資治理矣為此一併繕摺密奏伏乞皇上睿鑒施行謹奏孫國璽等俱照爾所奏敕發但若因自所保薦之人袒護其短則萬萬不可且更當加一番琢磨以服衆論方為合理况人心最易動變日後改絃易轍即係親子亦難永保第一要不被人愚時時留心察驗方與國事己身兩俱有益若不如此稍涉於偏私或失於不密則公私皆有損也慎之慎之同日又奏為奏謝聖訓事竊臣齎摺家人捧回臣奏謝聖恩訓勉一摺奉到硃批臣跪讀之下愈覺感激無地伏念廣東巡撫乃臣父楊宗仁舊任之地臣若不時凛冰淵稍移初志不特欺瞞皇上為上天所不宥而遺囑有違亦無以對臣父於地下是以回任後矢竭忠誠一塵不敢沾染一刻不敢偷安存心舉念惟思上報聖主施政行事惟期下益民生薦劾官員不敢少徇情面興除利弊不敢拘執偏私若事屬疑難或案情重大臣不敢自主者繕摺奏請聖裁批示然後舉行為此具摺奏謝併恭繳御批謹奏報效之心雖切遇事不可過於急驟凡百慎重徐徐次第為之雍正四年二月十二日廣東巡撫臣楊文乾謹奏為恭謝天恩事竊臣父楊宗仁生前殁後屢荷皇恩巳非尋常可比前蒙賜恤賜襲加贈加祭曠典頻頒既深且渥今臣遣臣子楊應瑤扶柩進京又蒙特旨遣親王大臣致奠送殯逾格恩施至優至渥臣銘心刻骨涕淚交流臣雖肝腦塗地猶恐不足以仰報天恩惟有凛遵皇上聖訓恪承臣父遺教殫心竭力整飭地方以勉盡臣職圖報聖恩於萬一耳緣感激下忱章疏未悉謹再繕摺恭謝天恩謹奏知道了何用爾奏謝朕待爾父之恩爾如何寫得出感激之情朕意加恩於爾父作一標榜以為天下後世之封疆大臣勸也勉效為之同日又奏為恭聆聖諭事本年正月十九日布政使臣常賚到粵宣傳上諭臣跪聽之下仰見我皇上天地為心無不覆載臣自抵粵後凡見西洋人必宣示聖天子恩威普被中外一體今奉密旨臣益當謹記恪遵加意撫恤以仰副皇上懷柔遠人之至意再粵東盜賊甚多實非他省可比聖諭盜不息民不安誠為千古至論臣敢不著實留心現在將各府地方形勢何處山深箐密盜賊潛藏何處海口港汊姦匪出沒一一確查明白并令各有司因地制宜商議作何防範消弭之法容臣細加籌畫斟酌妥當另摺奏聞謹奏知道了徐徐籌畫萬全善策具奏又聞人言廣州府屬之市橋紫泥大小龍石基等村素稱盜藪比戶皆賊而惟市橋為尤甚文武官不敢正視任其肆行彼中倘或有一二欲出首以求自免者闔村必害其全家後雖添設遊擊亦不過袖手旁觀竟無如之何云云此當加意設法以消弭之不必急驟且聞粵省有數種賊船名為蝦勾花魚嬭船之類其行甚捷賊皆乘此行劫云亦當設法稽察嚴禁也同日又奏為恭繳御批事雍正三年十二月十六日臣齎摺家人回署捧到硃批臣謹祗領訖今布政使臣常賚於本年正月十九日到粵臣看其為人謹慎言語和平仰見皇上鑒别人才毫釐不爽查廣東藩庫因告休前司朱絳病後諸事叢脞必得才具優長之員方能清理今幸蒙特簡常賚補授臣自當凛遵聖諭共相勉力惟以地方民生為重料理妥協庶幾不負聖恩委任臣兩人之至意為此繕摺恭繳御批謹奏大凡人改換境遇而心不隨之更移者少朕但信其從前而不敢保其向後也汝與之共事再看如少有瑕疵據實奏聞同日又奏為奏請聖裁事竊惟察吏即所以安民貪員不去百姓難安如貪婪不法之饒平縣知縣魏沅程鄉縣知縣髙彥登重耗加𣲖之文昌縣知縣沈元滄勒索屬員之奏惟是瓊州一府孤懸海外距省一千七百餘里耳目難周兼之民黎雜處務須調劑得宜非有才守兼優之員難勝其任查原任河南祥符縣以知州管知縣事王士俊係奉旨命臣帶往粵東補用之員其操守才能久荷天恩非臣所敢擅請者為此具摺密奏伏乞睿鑒施行謹奏覽同日又奏為奏聞事竊照粵省廣惠潮肇四府人煙稠集出産之米不足供民間食用向來原藉粵西販運接濟今聞粵西買補倉穀商販聞風裹足是以今春四府米價比前昂貴伏查廣州省城係五方雜處戶口繁衆需米最多商販三日不至市價即時騰貴目下西販不來省城米價日增小民艱食臣仰體皇上愛育羣黎之至意欲發銀買米減價平糶但一時無項可動臣因民食起見暫借太平關稅鈔贏餘銀一萬兩委員往廣西梧州南寧等處採買米穀今已買到數千石現在糶賣所賣之價歸補原項其惠潮肇各府州縣倉穀雖有糶三之例因督臣題請碾支各鎮協營兵米所餘無幾不敷平糶臣思米價關係綦重無可設法只得令米貴各州縣於糶三額數之外酌量多糶一二分以平市價早熟之後即責令照數買補還倉因與定例未符不敢具疏題報為此繕摺奏聞謹奏雖與定例不符因時制宜當如此通融但倉庾積貯所關甚巨必周詳籌畫而後舉動不可漫忽雍正四年四月初三日廣東巡撫臣楊文乾謹奏為奏聞事竊照粵東山多田少米糧向藉粵西接濟春天雨水過多商販稀少各府米價稍昂惟潮州府為更甚臣與督臣孔育珣會同商酌將鄰近各縣倉穀移多濟少撥發運往減糶以平市價今賴皇上福庇巳於三月二十一日雨止天氣晴暖各處禾苗悉皆滋長現在布種可望豐登二麥已收約有七八分民情安樂誠恐遠厪聖懷為此具摺奏聞謹奏覽奏深慰朕懷旗兵無禮之奏料理甚屬可嘉朕深為欣悅李杕此等行為何能勝將軍之任巳有旨命石禮哈前往更替石禮哈實心效力明大義人也其病亦只恐太過耳廣東駐防向日習俗不善經管源忠茍且姑容諸事廢弛非石禮哈其他恐不能移易其舊染之俗伊到時爾與之同心合德料理此事奏摺巳交與阿克敦帶來口諭此摺內之諭且暫密之不可再令一人知也同日又奏為敬聆聖諭勉力遵行事竊臣齎摺家人回署捧到臣奏命盜二事一摺奉有硃批臣跪讀之下惶悚無地伏念地方大患莫過於盜賊若盜賊不除良民不能安枕地方豈能寧謐臣叨荷非常厚恩身膺封疆重寄如敢輕縱盜犯圖積陰功一萌此念實屬大壞德行事也今奉諭旨臣自當愈加勉力以期無負皇上除盜安民之至意再查廣東省城盜賊甚多皆係旗人兵役窩留臣思非編查保甲不能清理但廣東駐防旗兵不比别處另設一城皆與民人接連而居從前督撫亦有舉行保甲因旗兵不遵隨即中止臣為地方起見不肯因循是以會同將軍及在城文武不論兵民旗漢務必逐一編查徹底清理省會之姦匪既清則各府州縣亦可逐漸舉行盜風庶可少息矣為此具摺奏聞謹奏此見甚好石禮哈到時與伊同心竭力為之務期實在通行弭盜之法此為探本窮源之上策所以朕近日復嚴飭爾等也勉為之雍正四年四月十四日廣東巡撫臣楊文乾謹奏為恭謝天恩事竊臣子應琚來粵恭捧欽賞各種克食臣隨出郊跪迎回署臣子敬述皇上聖諭臣跪聽之下感激涕零恭設香案望闕叩頭謝恩訖伏念臣何人斯邀此異數殊恩感激之深銘勒肺腑惟有凛遵聖諭同寅協和一切公務會同商酌細心辦理諸事慎重徐徐次第舉行益竭愚誠愈矢忠悃以仰副聖天子委任期望之至意為此繕摺奏謝天恩謹奏同寅協和四字最為要緊一著如有勢不能和心迹逈異處不妨據實密奏斷不可匿怨於𠂻彼此借事巧陷蓋上司秉公而相協和則不肖屬員無所施其詐偽宵小之輩往往啓釁唆挑致令上官不睦乃就中取事以為兩倚之局久之必有一邊袒護於己以自利也此等羣小伎倆爾等大吏若看不透致被愚弄受害甚巨即朝中黨援亦皆由此分門立戶而生恩怨也看透此者亦惟當年雍親王一人耳其黽勉公和屏絶私比竭力遵奉朕諭行之久久自知其妙也勉之同日又奏為奏聞事竊查粵省辦理公務從前每年用至六七萬金于火耗內提用臣細查從前公務開銷銀兩之數尚有儘可減省者是以會同督臣及各司道府公同商酌先將公務中之可省者盡行裁減今所存必不可少之項每年約共需銀四萬兩隨查廣東民間置買産業推糧過割向有州縣公費一項臣思此項非正項錢糧合計通省約有二萬餘兩可提作公用又廣東奉裁衛所三十八處其屯戶錢糧火耗每年約有萬餘兩今既歸併州縣徵收此項亦可提作公用兩項合計約略可為辦理公務之用似無庸再藉於火耗矣又各官養廉一頂州縣徵收火耗每兩定於加一其實連戥頭并封積零合算每兩原有一錢三四分不等今止令解司平頭三分實存州縣尚有加一外有部議捐修戰船約去一二分按察司及道府廳員今酌定幫助養廉之費令州縣各自繳送約再去二三分是州縣每兩約實存五六分儘足養亷其解司平頭粵東每年額徵銀一百餘萬兩每兩三分約共三萬一千餘兩內除每兩三釐為布政司衙門首領庫役人等養廉餘銀督撫藩司均分為養廉之費各得銀九千餘兩俱可足用至於屬員餽送臣槩不敢沾染即通省各官凡屬員餽送禮節等項亦盡皆嚴禁如此則上司不索於州縣州縣不索於百姓庶幾民困少蘇矣謹將應用公費及養廉各細數另行開列繕摺密奏伏乞皇上睿鑒謹奏但務得中為是若暫邀一時之名使將來至於難措非善舉也民情亦不可令至驕慢屬員亦不可令至窘乏天下事惟貴一平所以古人有平治天下之語若一偏之見致遠恐泥故君子不為利不什不變法害不什不易制似此通盤更移之舉必須徹始徹終籌畫計量妥當而為之慎毋逞一時之興而輕舉也同日又奏為奏請聖恩欽差確審事竊粵省旗厮姦棍開設米鋪髙價病民擁至臣衙門喧鬧一事業經臣具摺奏聞在案其中有無主使彼時尚未周知今據布按二司公同審訊各供臣細查其情節始則鑲黃旗披甲閻義臣等誘集無賴棍徒赴厰搶穀又打散買米窮民并打傷監糶官員及巡檢赴臣衙門控訴旗兵等即赴將軍衙門喊稟將軍傳諭令往巡撫衙門去講伊等即至臣衙門喧擠及臣拏獲棍徒將軍李杕隨來臣署令臣釋放臣未敢聽從李杕於次日又傳理事同知汪苕文囑令求臣從寬完結臣終不敢聽從李杕始將鈐束前營兵丁王有才不嚴職名反樂於地方多事李杕之處心積慮臣誠不解是何意見但事關旗兵鼓衆臣不敢承審致啓嫌疑伏乞皇上欽差部院大臣來粵確審按律定擬以彰國典如審出臣有不職之處仰懇天威即將臣先賜罷斥治罪以為辜負君恩怠忽民事者戒為此繕摺密奏伏乞睿鑒施行謹奏汝於此一事甚屬可嘉前巳有旨兹不復諭也同日又奏為奏聞事竊查臣標中軍遊擊范宗堯臣見其為人直爽操守亦好又因從前編查保甲妥協是以密摺保奏在案今三月三十日旗兵棍徒至臣衙門喧閙臣令該中軍出外傳諭見伊倉皇失措茫無主見大非平昔光景及至旗棍擁至大堂時該中軍又潛往將軍衙門躲避逮事後行令布政司等查詢緣由雖據范宗堯回稱見擁入轅門者率多旗人是以奔請將軍來轅驗看等語但因旗棍聚喧小事奏伏乞皇上睿鑒謹奏更有可笑處前據李杕摺奏云汝使范宗堯去求伊解事朕未經批諭朕曾記范宗堯人甚精彩但恐過於聰明耳汝如不信遲數年來見朕時面與汝看大凡聰明人率多有此一病同日又奏為奏聞事竊照粵東入春以後各處米價漸增潮郡尤甚臣酌於存七穀內撥糶一二分接濟民食前經奏明在案旋因雨水連綿米船不至而惠潮米價竟有數日每石糶至三兩臣即會同督臣將各屬倉穀移多就寡撥運糶賣又經奏聞在案至碣石地方孤懸海外兵民稠聚需米尤急臣等將惠州府倉穀前後共撥一萬七千石由海運糶并將惠屬附近潮城之興寧長樂二縣倉穀撥運一萬二千石赴潮州府及南澳地方平糶餘俱就本縣存七倉穀內通融動糶所賣之價令其貯庫悉於秋收照數買補不致虧缺幸三月二十日以後天氣晴明現在禾苗茂長將來可望豐收日內米價漸巳平減民情相安謹將惠潮一帶撥糶倉穀緣由繕摺奏聞謹奏相機調劑係爾等封疆大吏之専責所奏知道了地方蓄積為第一要務刻不可忽天時難以期必百凡預之一字當時時留意講求者也雍正四年七月初九日廣東巡撫臣楊文乾謹奏為奏聞事竊查粵東自三月二十日以後晴雨及時穀穗堅大目下正當早禾收穫廣州府屬收成皆有九分十分不等其餘各府收成分數現在飛檄確查到日另奏外現今米價俱已平減至各屬晚禾皆已播種雨水調勻生發暢茂豐登亦可預卜此皆仰蒙皇上福庇之所致今將粵省廣州府屬早禾收成分數及晚禾播種茂盛情形先行繕摺奏聞謹奏但將為國為民之一誠感格上蒼再無不響應之理總要方寸中信得及勉之至於聰明作用虛文祈禱皆無濟於事惟以此心敬告天地神明行久有效爾方欽服朕旨之毫髮不爽也同日又奏為奏繳御批事竊臣齎摺家人回粵臣跪讀各摺硃批周詳精切深中事機指示如神無遠弗照臣謹凛奉遵行如粵東盜賊公行紳襟富戶有懼盜資助以圖自全者臣自當詳慎料理原情定罪人命事多報案殆無虛日臣自當竭力詳審分别輕重除具疏天恩允準臣更益加琢磨不時稽察如敢少易初心微有不符臣即據實糾參今蒙聖諭諄切惟有益加慎密留心察看斷不敢以曾經保薦遂袒護其短姑容貽害有負天恩謹將敬遵緣由繕摺覆奏并繳硃批三合伏乞皇上睿鑒謹奏可信者人而不可信者亦人萬不可深信人之必不負己也不如此不可以言用人之能聞知縣張象乾人甚去得官聲亦好如果是實即當保題凡此等批諭具本時不必引入同日又奏為奏聞事竊六月初八日原任廣州將軍李杕接到部文奉旨石禮哈著升補廣州將軍次日即有紅紙匿名帖粘於將軍衙署照壁上內稱將軍奉旨進京凡我旗營兵丁約齊往萬夀亭抱牌保留如不能挽留兵情願去糧為農旗亦情願棄甲回京十七日往大佛寺會議等語臣恐旗兵棍徒借此聚衆生事不法隨委按察司往向副都統等令其傳諭八旗四營兵丁各安本分倘敢鼓衆滋事即當據實具疏參奏臣復密遣兵役嚴加巡緝至期棍徒竟未敢到寺聚集此後旗兵俱漸安靜矣七月初一日兵部侍郎臣阿克敦抵粵接署將軍印務李杕即於是日登舟七月初四日欽差兵部侍郎臣塞楞額抵粵即於初六日先將原獲各犯會同審訊因本內供出未獲之人未經提齊現在催拏擬過初十日齋戒之期再行確審俟審定之日即當摺奏外謹此先行具摺奏聞謹奏知道了此貼單約人之舉或係陷害李杕之作用亦未可知為何不曽訪拏追究此輩即是生事之人也安可令其漏網雍正四年七月二十六日廣東巡撫臣楊文乾謹奏為奏請睿裁事竊照外省駐防八旗原為國家股肱心膂之寄關係綦重查粵東上三旗俱係逆藩舊人恣意妄行生事不法其性情習氣與下五旗逈不相侔同為旗下勢如水火從前藩下人俱不挑拔官員自原任將軍管源忠受其賄賂漸開拔補之例甚至有題至協領參領者伊等同氣相應上下黨庇固結莫解難以整頓此種之人倘遇有事不特不能出力且恐為腹心肘腋之患臣請皇上密諭將軍將現今旗員中共有藩下若干員陸續輪流送京引見皇上觀其人材或留京補用或調補别省移調之時凡本員之弟男子姪以及族中之人俱令㩦帶同往如此二三年間將藩下人員暗暗盡行移換則廣東駐防數十年驕悍之習可以潛消默化矣是否可行伏乞皇上睿鑒施行謹奏此奏是朕亦早有所聞石禮哈實心為國人也今命伊來廣州料必自能整理爾試觀之同日又奏為奏請御批以便遵行事竊臣據髙州府電白縣知縣周文傑稟稱伊子周開捷原係江西袁臨協副將進京引見蒙聖恩補授西寧總兵并奉諭旨爾可寫字與爾父具呈辭官來京謝恩欽此文傑履歷雖開五十四嵗實在年已六十有二精力漸衰稟請告辭等情到臣伏查此事未經準有部文據傳旨意不敢輕信况周文傑臣看其精力尚未衰邁若以年老請休事涉虛假臣謹繕摺密奏伏乞皇上睿鑒批示遵行謹奏朕原有旨諭周開捷令伊父周文傑告老來京可也如仍可用朕另有加恩處同日又奏為酌議積貯以備接濟事竊照廣東戶口繁多本省所産之米不敷民食每藉粵西湖南販運接濟至本省各府州縣雖有積貯常平倉穀但陸運則山嶺間隔海運則風信靡常遇有需用欲移彼濟此深苦輸挽維艱今春米價昂貴臣與司道府等多方籌畫買穀平糶捐米賑濟并招徠商販使之少臣伏讀皇上屢次敕諭令各省預籌積貯仰見宸謨廣運事出機先有備無患法垂千古臣欽遵奉行今擬將巳裁廣州右衛舊署修改作倉臣與常賚諸事竭力節省將公費餘剩銀兩買穀入倉每年約可積穀三四萬石四五年內可積至二十萬石則省城可無艱食之虞矣至外府州縣臣擇大路總口或由陸路或由水路可通達數州縣之適中處所不拘城市大鎮建倉貯穀如遇某州縣需用米穀即可就近撥運朝發夕至不特腳費可省并免海運風濤之險况每年米貴地方亦不過數處而各州縣原有常平倉穀再加此項幫助接濟移此就彼俱可有益矣臣現在查明通省應設倉厫幾處應貯穀石若干酌定地方議定數目另行具疏題請外至買穀價銀查廣東落地稅一項除正項之外督撫司道以及府州縣俱有規禮今奉部文令徹底清查盡歸公帑每年約可得數萬金可否即以此項贏餘銀兩買穀積貯若收成豐熟則二三年便可買足若收成歉薄則分四五年逐漸採買俟採買數足將稅課贏餘或歸司庫或解戶部另皇上批示遵行謹奏覽雍正四年八月初五日廣東巡撫臣楊文乾謹奏為奏聞事本年七月二十五日據惠州府歸善縣報稱七月十七日起至二十日止颶風暴雨二十一二兩日水漲浸入城內房屋墻垣有被淹坍倒窪地晚禾亦被淹浸等語附近惠州之博羅增城東莞等縣亦報發水臣聞報即行令該府吳騫查看情形賑恤被水窮民去後今據稟稱二十三日以後水勢漸已消退並無傷損人口其被淹田禾尚可補插等語臣隨飛行將被水窮民設法捐賑不使失所并勸諭及時補種田禾無誤冬收外臣查惠屬一帶因河道窄狹水流遲緩是以每遇驟雨便至湧漲今年水勢頗大然隨漲隨消幸不為害至廣州府之南海三水及肇慶府之髙要髙明四會等處上年被水各縣俱有圍基今年至七月間粵西水發臣預先分委官員備料搶築是以雖有衝決即時修復無礙田廬合并聲明謹奏此雖係沿海常有之事若可以用人力預防得不致為害究當圖維一勞永逸之策徐徐籌畫為之雍正四年十月二十一日廣東巡撫臣楊文乾謹奏為遵旨保送千總事竊臣接準部咨欽奉上諭令臣保送千總一員如千總不得其人準於把總兵丁內挑選即補放千總保送欽此臣因現在千把總內不得其人謹遵旨通營挑選今挑得兵丁郭公漢一名弓馬嫻熟人材壯健隨補放千總除另疏具題并給咨令其赴部引見外合將緣由據實奏聞謹奏俟其到京引見時酌定朕原欲得出色人材若並無軍功超卓之資不過弓馬嫻熟人材壯健從陜西調取來京武科進士可用者甚多引見之後似此等中材仍發回爾本省留用耳同日又奏為奏聞事竊照粵省歸善博羅東莞增城等縣於七月間被水禾稻尚可補插等情臣經具摺奏明在案八月初間晚禾正在長發不意十七至二十等日大雨如注以致近山沿海之數縣復被水浸雖水勢比七月間減小尺餘但時過白露禾稻難以再插恐致成災業巳據實具疏題報除委員分往勘明果否成災及輕重分數另題外至此數縣之髙阜地方及通省各府州縣臣復遣員細查田禾俱極茂盛冬收約有八九分誠恐上厪聖心謹繕摺奏聞伏乞睿鑒謹奏因廣東民食維艱朕甚為繫念現命廷議資助之策尚未覆到今覽汝此奏通省田禾茂盛朕深為慰悅同日又奏為據實陳明事本年九月初三日候選同知奉旨發粵題補之黃文煒到粵宣傳上諭臣跪聆之下不覺愧感交集惟有敬謹銘心凡遇一切政務必輾轉籌畫求一當字然後見諸施行百餘兩為數無幾但伊積欠債負甚多日受催迫而二參限期將滿又恐易結不結處分因用刀抹李濵抹頸壞官還債無日相率揑傳殷邦翰刻薄巡撫急躁等語今蒙皇上垂訓臣是以備細直陳若有一字欺隱自難逃給咨令其赴京引見伏乞報效如不實心圖報即治以負恩之罪為此繕摺具奏伏乞睿鑒謹奏覽雍正四年十一月十四日廣東巡撫臣楊文乾謹奏為奏請睿裁事竊照惠州府知府吳騫因海豐縣盜案承審遲延覆參限滿經臣照例題參部議革職奉旨依議員缺即將奉旨命往粵東題用知府之楊以寧題補在案查吳騫操守頗潔居官謹慎在知府中亦屬廉謹自好之員其承審盜案實因武辨不將出首之人解送以致難以質審定案但因再限巳滿例應糾參臣不敢違例庇護而該員操守政事俱有可取臣又不敢壅於上聞有負皇上慎重人才至意可否準其赴京引見其賢否難逃聖明洞鑒如果尚堪驅策或再令其效力臣未敢擅便伏乞睿鑒施行謹奏好給咨令伊赴部引見將此摺封固交與伊帶來呈進同日又奏為奏繳御批事竊臣奏謝臣子應琚宣述聖諭一摺奉到硃批臣跪讀再三恍如面聆天語聖訓精詳臣惟有時時凛奉將黽勉公和屏絶私比八字敬録懸挂朝夕瞻仰永久遵行又奏糾參嶽綸等各員保奏王士俊請補瓊州知府一摺恭蒙硃批祗領之下仰見皇上天地為心恩威並濟臣惟有仰體宸𠂻秉國法以重名器存忠厚以育人材期於至當而巳又奏電白縣知縣周文傑應否以年老告休具疏題請一摺恭蒙硃批臣謹遵奉知會周文傑令其具文告休容俟詳到具題所有奉到御批謹一併恭繳伏乞皇上睿鑒謹奏知道了巡撫之任統率闔省時刻以不被人欺四字置之目前大有益處同日又奏為奏覆事竊臣前回奏布政使臣常賚一摺恭蒙硃批臣祗領欽遵查常賚自到粵迄今將及一載臣時刻留心訪察其為人謹慎待人和平錢糧出入並無苟且操守亦屬廉潔雖向後此心有無更移誠如聖諭未敢輕保但就其抵任以來實未有瑕疵可以指摘除遵旨不時細看少有瑕疵立即據實奏聞所有常賚現在居官情形合先密奏伏乞皇上睿鑒謹奏看其光景甚好恐粵省留伊不住矣同日又奏為奏聞事竊照新任廣州將軍臣石禮哈已於十一月初九日抵任署將軍臣阿克敦於十二日自省起程前往肇慶署理兩廣總督印務擬於十六日抵肇接印聞督臣孔育珣即於十六日交印起程理合奏聞謹奏知道了石禮哈實心與朕效力之人乃少年中希見者當與之和衷共相懋勉雍正四年十一月二十四日廣東巡撫臣楊文乾謹奏為老戶改立的名行之有效事竊照粵東民間納糧俱用老戶一事臣已於上年十二月內奏明在案今據各屬申報或因墾買過割之際就其本名注入册內或就其赴縣完糧時問明辦糧之人的名登於原册老戶之下在百姓初時不知原委及改注數戶之後深知分立的名則己身完賦之後他人未完者不致干連催擾而就糧管業界址分明不致有詭寄飛灑諸弊咸稱盡善盡美萬世無弊之良法俱爭先開報約一二年後通省各屬可以改注全完矣至丁銀一項從前丁銀地糧原係各辦自康熙五十年審定之後奉聖祖仁皇帝諭旨不復加額是以粵東各屬丁隨糧辦者已有十之四五其餘未隨糧轉者臣巳令布政司并各府州縣將丁銀盡行歸入地糧之內併項輸納永免無糧徵丁之纍貧苦小民感頌浩蕩皇恩歡欣載道矣為此具摺奏聞謹奏覽所奏深慰朕懷同日又奏為覆奏事竊臣齎摺家人回粵捧到臣奏保舉人才一摺恭奉硃批臣捧讀之下仰見皇上至聖至明無微不照臣謹凛奉遵行查張象乾原係惠州府和平縣知縣臣抵任以來見其辦事有才但性情舉動頗覺狂妄乖張向與文武同寅及該管知府多參差不和必須磨礪方能有成查廣州府香山縣原係應調之缺素稱難治非強幹之員不能彈壓且離省甚近臣可不時稽察教誡是以四月內具疏題請調補已經奉旨準允該員巳赴香山新任今蒙諭旨臣俟有人地相當之缺即遵照題用今將該員為人居官之處先行繕摺覆奏伏乞睿鑒謹奏張象乾朕巳有旨用知府矣若剛方不肯混俗又當一論朕意位居下僚敢與人不和者非徹底糊塗人必有自信處具有氣概之屬員須防人撥弄之言全在爾等大吏為之主持也譬如爾等封疆大臣朕若惟人言是聽則爾等不得不務與衆取和為要著孰肯孤介自立耶觀人之法但以其所辦之事件并其操守聲名上定為準則方好若祗以與衆不和遂以為乖張狂妄朕不取此論雖然仍留心試看倘有不妥處亦不可迎合朕意而不奏聞同日又奏為覆奏事竊臣二月內回奏消弭盜賊一摺奉到硃批臣即欽遵奉行除蝦勾艇等違式賊船巳經查禁拆毁外其盜藪賊巢臣責令州縣印官力行保甲設法巡防并遴選捕巡等官分往各要緊村落山洞設法搜擒誘令投首並著同族之人據實首報以冀漸次消弭不敢急驟惟是粵東從前地方官必放火傷人及數十人之盜案始行通報其餘概不通詳上司又將案情略輕者留為外結是以歷查疏防參案似覺寥寥而被劫者實巳不可勝數臣嚴飭各州縣凡有地方被盜無論案之大小不許一件隱瞞務必即時通報本年自正月至今通計據報有八十五案內督臣巳參疏防者四十八件其餘限期未滿督臣尚未題參臣復細查通省民間失盜實數較之往年約已減少十分之二三此皆敬凜皇上宸謨指授除盜安民之所致也為此繕摺奏聞恭繳御批謹奏凡事只一真字好應如是各令其通報也同日又奏為遠洋遣員朝賀恭報起程日期事竊西洋國王聞聖天子新登大寶専遣親信內員麥德樂恭齎方物遠來朝賀先經具疏題報在案今麥德樂擇於十一月十六日自粵起程臣照例給與勘合但定例勘合內所填止有二十餘人因麥德樂所齎方物甚多跟隨共四五十人臣於勘合外另支公費銀一千兩給為盤費并遣員伴送赴京為此繕摺奏聞謹奏此事爾等所辦稍欠允協巳差官往迎矣所奏知道了雍正四年十二月十八日廣東巡撫臣楊文乾謹奏為奏聞事竊照粵東今年早收豐熟兼以粵西販米頻來自六月以後米價平減近因粵西買補倉穀禁止商販轉運其東莞等被水各縣又赴省城搬糴而米行射利之徒藉端昂其價值是以十一月間每米一石賣至一兩七錢潮州亦賣至二兩以外臣思米價驟長小民便難糴買所有奉旨準撥粵西倉穀三十萬石大約明嵗三月間方能有穀運到再從前題準將惠州府五萬石榖價撥令潮州府買穀存貯亦因價貴未買臣思廣潮二府均關緊要酌撥接濟不可刻緩除一面移咨粵西撫臣不可遏糴外伏查各府惟髙雷廉為産米之區三府各屬現貯倉穀三十餘萬石彼處米價平賤無庸糶賣且年久恐致黴朽若暫為撥用發價買補亦屬甚易臣隨酌撥髙州府倉穀七萬石雷廉二府各三萬石委員押運將八萬石貯於廣州省城將五萬石貯於潮州以備糶濟即將廣州府倉今春平糶穀價惠州撥解潮州穀價照依時價發交髙雷廉三府令其照數買補還倉臣撥運之文甫發米行人等并積糧之家聞之即不敢閉糶市價頓減俟髙州等府之穀運到并粵西倉穀運送前來自當日減一日市價平而小民無艱食之虞矣為此繕摺奏聞謹奏雖云因撥運而米價頓減但平糶之舉必看地方情形察訪本處富戶積蓄及倉廩中存貯之多寡熟籌得當方可舉行不可性急輕舉止圖價平取快一時倘遇緊要之際積貯巳至空虛所關甚巨設負販小人輩探知爾意欲求平糶但齊行長價數日即可遂其願矣以有盡之倉糧何能應無厭之懇求果倉糧有餘原係善政何妨轉移若不能接續買補慎毋輕動總之爾等大吏必胸存遠大長久之謀斟酌輕重緩急之機無過不及適中合宜方不忝封疆重寄至於米價因平糶而減係自然之理亦非竒特之籌策也凡百不可為目下小利髙興於一時事事當詳慎為之同日又奏為秋審緩決人犯密奏請旨以廣皇恩事本年十二月初六日臣接準部咨奉到皇上欽恤刑獄諭旨臣隨通行各屬現在凛奉遵行以仰副聖心伏惟我皇上天地為心恩被萬物而慮囚決獄更復哀矜慎重其蒙特恩寬宥者不知凡幾八月內大沛恩綸將保辜五日外殞命之案何純恭等一百一十七名從寬追埋釋放今年秋審情實人犯又奉特旨停決雖堯之三宥湯之開網無逾於此臣仰體聖慈因思秋審案內有緩決人犯一項為數最多論其情罪雖非可矜而亦不至於情實所以一次緩決之後逐年皆擬監候有歷五六年始改可矜者有歷十餘年尚未減等者此項人犯在獄日久懦弱者或因衣食不繼或因疾病纒綿歷年久遠遂化獄磷殊覺有負聖主好生之至意至於狡黠者與獄吏禁卒狎習串通魚肉新犯名曰牢頭竟成獄中之蠧並無改悔之心且伊等在監情熟越獄逃監等事亦由此種人犯倡率所致臣愚以為除秋審緩決一兩次者仍行監禁再行詳審外其已經三次緩決者可否槩豫減等發邊逺為民如此則瘐斃之慘可免而犯少獄清易於防範并可免越獄逃監之慮矣但此法外施恩出自聖裁非臣子所敢擅請者為此繕摺密奏如果可行伏乞皇上睿鑒謹奏此所奏斷乎不可身為封疆大吏切勿崇尚婦人之仁犯人中如有不知改悔公然為牢頭為獄中之蠧者當題請改其緩決仍從重議則可今日之豫以緩決者皆朕姑息之恩令其茍延性命之輩實無有可寬者在內也朕甚不取汝此奏且恐汝務小而遺大寬嚴不得其宜朕甚憂之大凡應嚴者既不能嚴則應寬者亦必不能寬寬嚴失宜則賞罰顛倒賞罰顛倒則吏治何有凖繩也誠欲積陰功為子孫造福惟有一秉赤衷為國家旌善懲惡當於此求之若枉國法以宥人乃損陰功殃及子孫之心行有何福可造耶總緣中下之材居多識見通達者少率皆不究根本不權輕重被世俗小知小見朦蔽己靈方云造福不知巳種無窮罪業方謂有利不知大害已隨及至通盤大錯尚不悟已罪之由來反怨上天辜負好心之人殊不知皆其自取也讀朕此諭當警省勉為之果能以公忠血誠對越天地神明刑所當刑即決人亦造福之事何况其他勉之勉之同日又奏為遵旨具題再行覆奏事竊臣前奏設法積貯并懇將落地稅贏餘買穀一摺奉到硃批臣謹欽遵將十府一州之各大路總口查明可通達數州縣之適中處所建立倉厫酌定應貯穀石數目并將酌開捐納欵項各具疏題報外又查廣肇兩府地勢低窪每年受西江水發之患是以民間築有圍基以為捍禦從前皆係土基不過為一時之計水勢猛急隨築隨坍欲圖永遠堅固必須石工樁掃方能抵禦狂瀾然工程浩採買運貯臣本應先行摺奏候奉有批諭然後具疏但捐納一疏已遵旨同積貯一案題請今圍基先借支庫項亦擬於捐案彌補是以一併具題至於圍基受害之由臣巳僃查的確并將髙要等五縣圍基險衝平易逐一委勘明白及開濬盧包口淤塞舊河修復各圍內陂塘閘竇等項詳悉具人員協同辦理倘蒙恩允則聖恩浩蕩實拯億萬生民於飢溺中矣至捐納條欵因有圍基一項需費是以於捐監之外擬添數條庶可敷用合併聲明伏乞睿鑒謹奏覽同日又奏為奏聞事本年十二月初九日巳刻忽聞各旗官兵將歸德門城門及街道木柵盡行關閉持弓挾矢戒嚴防守人民驚惶罷市旗員稟報將軍石禮哈而石禮哈即傳八旗官兵各帶器械圍署防護臣飛查緣由因有賣柑人以柑為賭勝負不均致搶奪追趕奔走喧嚷忽訛傳南海縣監犯越獄一語旗員遂將城門關閉木柵封鎖官兵戒嚴臣即令司道等員往將軍衙門問其閉門之故石禮哈云外邊紛傳越獄所以如此據守堆兵獲解二人云越獄之言即係二人所説遂將二人交送到臣而石禮哈遂將城門木柵即行復開官兵散去臣將二犯發交按察司嚴訊據供俱係南海縣民壯因旗兵忽關城門伊等有防護監獄之責所以往查不知旗兵為何將伊擒解等語臣思將軍臣石禮哈既巳戒嚴拏獲若不將二人懲處難以完結此事因將二犯枷責示衆又令該府遍曉鋪戶居民照常安業矣惟是粵東邊海之地省城又洋商輻輳之區裨益矣謹奏待伊奏到朕自批諭以訓誨之石禮哈雖於此一事頗欠鎮靜但其人究係好者雍正五年正月初三日廣東巡撫臣楊文乾謹奏為奏聞事上年十二月二十六日申刻忽報番禺縣監犯越獄臣隨遣標下官兵疾馳前往將軍標廣州鎮協標兵丁亦來協拏又署廣州府胡恂親身督率兵丁奮力擒拏查逃出犯人共三十九名當下獲回三十四名當場拒捕殺死五名未至三更俱巳全獲居民並無擾動除現在查明各犯案由并行按察司確訊逃越實情照例加等問擬具疏題報外合將越獄獲回并殺死五犯緣由先行據實奏聞謹奏越獄各犯當即擒獲殊屬可嘉觀此則日前石禮哈之舉動又不為孟浪矣雍正五年二月初十日廣東巡撫臣楊文乾謹奏為覆奏事竊臣齎摺家人回粵臣敬謹拆閲內有條奏瓊州事宜一摺奉有硃批臣謹祗領隨將摺內各項逐一確查并遣人密訪情由謹臚列奏聞一原奏稱瓊州離省窵遠每多苛派交府者名曰府平臣到任之後即詳明督撫盡行革除等語臣歷查卷案瓊州向有陋規康熙五十八年知府俞存仁曽具文報稱革過府平陋規等項至知府嶽一原奏稱黎糧交納輒用重稱加倍徵收臣已經禁革等語查黎人完糧向無加倍之事但黎人不知糧賦科則俱係託人代納其代納之人或有多納一原奏稱瓊州土地平曠儘可開墾而居民以樹一原奏稱瓊州生黎往往以採取梨木騷擾致使不安其性所宜撫綏馴致等語臣查生黎性多獷悍從前採取梨木香片每致騷擾生事臣囑令各屬設法化導現據崖州知州程哲等詳報招到生黎戶口臣已批行確查丁糧各數目俟到日另疏題報外臣又飭各屬竭力撫綏寬以時日示以恩惠則邊海生黎盡可為聖世良民矣為此繕摺覆奏伏乞皇上睿鑒謹奏覽雍正五年三月十二日廣東巡撫臣楊文乾謹奏為恭謝天恩事竊臣接閲邸抄奉上諭著準楊文乾所請給與半年之假料理伊父葬事廣東巡撫印務著常賚署理欽此臣捧讀之下感激難名涕泗交流隨恭設香案望闕叩頭謝恩訖伏念臣父畢世寵榮皆天恩之所賞賚一生名節皆聖德之所矜全及今歸土一事猶荷睿慈俯允在臣父則始終戴德自必銜感於九泉而臣則私願獲伸尤當圖報於百世凡此逾格遭逢實屬古來罕覯而臣父子一門得邀曠典至極莫加臣清夜細思愈深感惕惟有益殫忠藎益竭駑駘不敢絲毫欺飾不敢一念懈弛以冀報效天恩於萬一除俟部文到日臣將巡撫印務交明常賚署理具疏題報恭謝天恩外所有臣感激微忱合先繕摺奏謝謹奏諒汝感激之心豈此筆墨所能宣也知道了朕從來不問人之感與怨但自信己之賞與罰耳同日又奏為奏聞事竊照粵東惠潮兩府今春麥苗茂盛皆髙數尺將來豐收可以預卜惟是潮州各屬地方人多田少又兼上年被水各縣冬間米價稍昻貧民有往髙雷廉等府就耕謀食者今聞二麥茂盛俱陸續回籍力田亦間有未回者臣巳捐發盤費口糧委員前往查其盤費不敷無力回籍者量給盤費領回安插至粵西撥運倉穀將巳陸續裝運前來省城米價甚平兵民安貼三月以來天氣晴和大非上年春間光景誠恐上厪宸衷為此繕摺奏聞謹奏據奏農民歸業大慰朕懷爾等封疆之任但以勸導百姓力田務本為要耳雍正五年閏三月初一日廣東巡撫臣楊文乾謹奏為奏聞事竊臣蒙皇上格外洪慈準臣所請給假半年臣於三月十八日交印除具本恭謝天恩外隨於二十二日起身路經清遠英德曲江等縣地方見麥巳將收禾苗初插正值望雨之時幸賴皇上福庇連日大雨臣親見路旁禾苗青蔥百姓歡呼誠恐上厪聖心合將臣舟次所見情形具摺奏聞謹奏覽奏深慰朕懷硃批諭旨卷九上欽定四庫全書硃批諭旨卷九下硃批楊文乾奏摺雍正五年八月二十八日廣東巡撫臣楊文乾謹奏為覆奏事竊臣蒙皇恩準假赴京自四月十九日入覲天顔至六月十五日陛辭南行跪聆下與福建總督髙其倬聖諭臣於八月十二日抵閩即向福建督臣髙其倬敬謹宣示髙其倬免冠叩首云倉穀不能清查屬員不能整肅罪不容誅自此之後事事務期切實刻刻痛改寬懦若有一毫庇護屬員一事仍循舊習不待皇上加誅即當自領斧鉞等語臣復再三勸伊加意整上諭及髙其倬回覆奏詞各緣由理合繕摺奏覆謹奏覽同日又奏為奏聞事竊臣奉命前往閩省清查倉庫於八月十二日抵福州省城同許容鄂彌達伊拉齊等商議先將省城府縣各倉委員盤查其餘因撫臣印信巳送前途候常賚到日用印行文方有憑據今常賚於八月二十二日所助銀兩出於庫項原令設法補苴而不肖州縣藉此任意狼籍上司因有補項不便禁止是滿保縱放於前毛文銓徇庇於後雖髙其倬到任以來稍知斂戢而此風究未盡除其征臺官兵需用米糧滿保將州縣倉穀動支碾米又雍正元二兩年滿保將閩省倉穀碾米運浙糶賣後俱發給穀價令州縣採買補倉因發價短少不敷採買是以將原價存庫以致延捱至今此米穀虧空之所由來也臣等到閩之後據布政司册報閩省內地八府一州額貯穀一百六十六萬九千餘石除開銷各項外應實存現穀八十八萬二千餘石虧空穀五十三萬四千餘石虧空之中有價者四十八萬三千餘石無價者五萬餘石除虧空之外其實存之數果否現貯難以遽信非徹底清查不能洞知底裏臣等查得八府之中其最緊要者惟福漳泉三府今福州府有臣等駐劄就近委盤其漳州府臣欽差郎中臣鄂彌達前往督察泉州府共擬委命往候補知府劉而位署印盤查平府盤查其建寧府倉庫共擬另行委員盤查其餘府州擬於候補知府內委署若不敷委用即於酌補知府同知人員內暫為委署盤查至於督撫未參之各州縣雖云倉庫無虧但恐將本年現徵錢糧那新掩舊亦未可定臣等細加斟酌必將各員交錯調換其調換各員即委命往之員暫署盤查本身一離原地諸弊盡露若有虧空立即題參究追臣受恩深重刻圖報效惟有實心實力徹底盤查務期上裕國儲下益民生以仰副皇上委任之至意為此繕摺奏聞伏乞睿鑒謹奏料理頗好竭力為之須務言行相符為要同日又奏為奏請聖裁事竊閩省州縣聞有奉臣當仰遵諭旨倘所存價銀足敷採買并素日做官好者似應少寬期限俾其陸續買補若過限不補再行參究惟是委員盤查一事其候補各員內或一時不能到齊或辦事未經熟練誠恐不敷所用臣與常賚商酌於原參離任倉穀巳補各員內選擇居官素好者委其盤查或於各州縣現任佐二中有才識出衆者公同委查如果勤謹勝任另行具疏題請補用是否可行伏乞睿裁批示又閩省藩鹽二庫臣等應否一併盤查因未奉諭旨不敢擅専仰懇聖諭以便遵行謹奏買足者與未買者原經虧空即屬一體豈可因其現在買足與否而分别之耶若如此不論居官之賢否止看地方豐歉竟論造化而已爾此請旨大謬矣果皆一概秉公得當自然日後無事倘於中少有瞻顧徇情便今請旨準行他日脫有參差之處較未請旨更重也朕意無他將通省人員於此倉穀一案內查其好者概留劣者盡去此二句乃朕之本意要在爾等秉公論人辦理若請旨將事辦人則私端開矣朕亦難以詳悉指示總期通盤還朕一是字或能與不能關係爾一生榮辱要看爾之福量何如耳朕亦不得強之使然勉之勉之朕今此論仍係爾未出京之面諭也同日又奏為覆奏事竊臣面奉下與福建布政使沈廷正諭旨臣於到閩之日即向沈廷正敬謹宣示沈廷正跪聆之下惶悚感戴免冠叩首云沈廷正受聖訓愈加殫竭心力以期仰報天恩等語又臣欽遵面奉諭旨抵閩之日即將福建鹽驛道陳豫朋辦理鹽務如何密問髙其倬據云陳豫朋辦理鹽政以來雖尚無敗檢之處但一切辦理率多寬泛依違未能切實籌畫福建鹽政頭緒頗繁規模未定必得精密繕摺覆奏伏乞睿鑒謹奏覽雍正五年九月初九日廣東巡撫臣楊文乾謹奏為恭奉御批事本年九月初一日福建撫臣常賚齎到御批常賚奏摺二件臣敬謹跪看所奉硃批除廣東曲江縣􅈨洞地方堆有銅砂容臣於回粵之日委員密往勘明并煎試的確酌定作何開煽之法奏請聖裁外其未參疏防盜案臣回任時自當將未獲賊犯嚴催勒緝務期速獲巳獲賊犯嚴催審解臣親審明白分别輕重有法所難寬者即遵例盡法處治其原摺即交常賚齎回所有臣奉到御批日期合先繕摺覆奏伏乞皇上睿鑒謹奏詳細斟酌據實摺奏應具題者即行具題同日又奏為據實密奏仰祈睿鑒事竊臣在閩聞廣東廣南韶道林兆惠奉委採買木料六月間差役往從化山內辦取被盜虜去十二人拷打先放回四人令其寄信勒要規禮銀數百兩始準回贖又聞五月間有大盜數百人商謀行劫苦無器械遂至龍門營七子汛將器械鎗刀盡行搬搶往各鄉村恣意肆劫失案纍纍署督臣阿克敦並不具題反勒令地方官止報十餘人又勒令審作兵丁睡熟被賊偷械從寬批結又聞五月內髙州府電白縣山內聚有盜賊千餘人白日沿鄉劫掠竟至一日之內連劫二十七家其練勇往追被賊捉入山內將一人割去兩耳令其寄信不許復追又聞有將軍標兵丁張萬良窩藏盜賊獲贓敗露署撫臣常賚咨提此兵將軍臣石禮哈不惟不肯革糧反令審作誣良常賚不敢執法懸案莫結以致省會之地盜風日熾常賚署內亦被盜偷去首飾木匣衣箱連御賜摺匣之鑰匙俱皆失去密向石禮哈借取鑰匙開鎖遂將此二事彼此隱匿不奏目今百姓寢不安枕人人自危是以民間有孔督去阿婆來盜結黨民何賴之謠紛紛傳説由粵達閩臣聽聞之下不勝驚駭焦思謹繕摺密奏伏乞皇上敕諭督臣孔育珣通飭文武勒定限期嚴加緝究則邊海要區獲享敉寧之福感沐洪恩於靡既矣謹奏如此據實陳奏方是爾若身在廣東任所又未必肯如此直達也已有密諭交新任雷州府知府甘世琦前來面傳於爾爾其欽遵領悉雍正五年十二月初一日廣東巡撫臣楊文乾等謹奏為閩省盤查巳竣謹合詞奏聞仰祈聖鑒事竊查福建通省九府一州應存監穀并官民捐積穀共一百八十一萬五千五十石零除軍需用去賑給災民等項又從前參出虧空穀石及臺灣府除額徵正供粟米之外所存捐積穀石巳經委員察盤外據布政使册報內地八府一州共應存貯監積穀一百六十六萬五千一百九十九石零內未經買補穀六十二萬七千四百二十九石零借碾兵米穀九萬三千四百六十五石零經督臣及署撫臣查參虧空穀九千五百六十三石零實存穀九十三萬四千七百四十一石零今據委署各員盤查得實存數內又有虧空穀一百七十一石零黴變穀一十二萬七千四百一十七石零盤量折耗及碾米折算不敷穀一萬一千二百七十石零又揑報買補今仍未買穀四千五百一十九石零俱經另疏題參其未買補數內臣等已督催買補穀一十二萬八百一十七石零借碾兵米數內已徵米抵穀一萬五千九百一十八石零又各虧空案內巳追完穀二千九百五十石又新收雍正四年官民捐積穀七百一十石零現在實貯穀九十三萬一千七百六十石零尚未買補穀五十萬六千六百一十一石零借碾未徵還穀七萬七千五百四十六石零又據布政司册報自康熙五十五年起至雍正四年止共未完地丁等銀四十三萬四千四百八十八兩零今據委署各官查出虧空銀一萬三百五十七兩零并胥役侵收以及揑作民欠等項銀兩俱經另疏題參外其實在民欠內臣等巳督催完銀六萬六千四百九十四兩零尚有歷年未完之民欠銀三十六萬七千九百九十三兩零所有各項虧空臣等現在逐一嚴查定擬勒限追賠凡有無可著追之項俱著落毛文銓賠完又八府一州平糶存價未買穀石臣等俱已勒限買補如有價值不敷所需搬運腳費亦著落毛文銓賠補臣等公同定議現在另行繕疏會題伏候聖裁外誠恐上厪聖懷合將盤查情由先行會同具摺奏聞伏乞睿鑒再照社倉穀石收掌在民不入盤查合併聲明謹奏辦理殊屬清楚詳妥朕欣悅覽之同日又奏為邊海重地揀材宜急事竊臣查閩省內地八府一州自知府同知通判以及州縣共八十員內前後陸續題參革職并勒令解任及改教休致各項卸事共糾參去任五十餘員其餘除同知通判外所有倉庫無虧做官尚好未參之縣令十餘員俱交錯調用亦不使仍在原任致滋弊端所出各缺在先後命往人員內臣與督撫布政使細加斟酌量才題補至罣誤之員素日居官好者容臣於題補各官後詳細開列另行密奏外惟是閩省邊海重地俗悍民刁難於治理今新補各官多係初任不能諳練若責其典守倉庫則為有餘設遇邊海有事堪供驅策者頗難其人臣受恩深重雖非専管地方總屬公事何敢緘默不言伏乞皇上俯念邊海要區或再將曾經熟諳民事者命往數員交與福建督撫酌量於緊要縣缺補用庶可收得人之效矣謹奏此奏可嘉之至巳有旨矣爾見諭旨時保爾必深服朕此一出竒料理之意想也同日又奏為覆奏事竊臣欽遵面奉上諭於抵閩之後即細查密訪福州駐防兵丁從前習氣果甚不好自將軍臣蔡良到任管束頗嚴訓練甚勤旗營官兵凡有違犯並不庇護縱容是以各守紀律殊覺安靜至將軍臣蔡良臣看其為人謹慎管兵嚴明操守頗好實稱將軍之任臣與之細細談論見其於駐防事務實為熟練而於民情吏治等事似不甚明晰若任地方大事恐不能稱職謹密訪福建旗兵及將軍蔡良各緣由據實覆奏伏乞皇上睿鑒謹奏所奏甚公朕亦聞蔡良此任甚好但還欲調伊廣州尚在未定此意不可向伊宣露凡此等預聞之事最宜慎重否則毫無益而大有害况爾等封疆任重少不謹密招禍更不淺也切記同日又奏為覆奏事竊臣密奉上諭汀漳道劉燦為人到底何如爾細細物色具奏欽此查劉燦居官操守雖好而為人粗鹵不識大體且其才具甚屬平常汀漳道係邊海要缺非粗淺平庸之人所能勝任至其在閩到任未久雖因耿國祚重價賣米劉燦稽查禁止一事百姓一時感頌其餘並無善政可稱就其才具或內地偏僻道員或在京間散之缺庶幾人地相宜才稱其職矣為此據實覆奏伏乞皇上睿鑒謹奏所奏甚屬公當巳有旨矣同日又奏為覆奏事臣於初抵閩省宣傳上諭時見髙其倬羞慚悔艾無地自容臣已將情形具摺奏聞今臣數月以來常與髙其倬談論看其居心惟知感激皇恩做官惟知愛惜百姓一切名譽身家皆所不顧自奉聖諭訓勉之後凡行一事惟恐或蹈護庇屬員及因循舊習之愆即如通省倉庫凡有從前所知者及現在訪聞查出者無不向臣等詳告并多方籌畫是臣沈廷正摺內奉到硃批臣自抵閩以來細看沈廷正面貌雖瘦但精神充亦未見有困倦之態謹將臣所見沈廷正精神氣色據實一併奏覆伏乞皇上睿鑒謹奏覽同日又奏為奏聞事竊臣據郎中臣鄂彌達因往查漳郡倉庫回省云漳州兵丁頗好一入泉州境見陸路提標所轄地方營伍散漫汛守懈弛器械不堪又員外郎臣伊拉齊往查泉州倉庫回省云提標兵丁抗糧成風歷年未完錢糧提兵抗欠者甚多而且恃兵藐法聞厦門水師提臣藍廷珍患病日久不離牀第標兵探知情由遂各不守紀律等語臣思閩省水陸兩提俱駐劄泉州地方原因泉郡密邇臺澎且為省城屏障今水師提督則患病臥牀陸路提督則寬縱廢弛海疆重地彈壓無人關係非細臣受恩深重凡有所聞不敢隱匿謹具實奏聞伏乞皇上睿鑒謹奏陸路提督已用一上上好者前來矣惟水師提督實難得人藍廷珍雖病大約不妨雍正五年十二月二十一日廣東巡撫臣楊文乾等謹奏為奏聞事竊照閩省州縣經徵錢糧外有溢額之項臣等抵閩時嚴諭各屬據實查明開報去後已據陸續報有銀八千餘兩米五百餘石又查有年久寺廢歸官田租八千餘石除完納錢糧外餘充公用再查閩省濵山環海原額地畝內間有被沙壓水衝不能耕種人戶因之逃散以致錢糧有額無徵是以即將此項溢額抵補完解雖屬以公完公但未經清釐私行抵解或其中仍有贏餘未便任其侵隱伏懇皇上準令督撫臣會同將通省州縣凡有溢額銀米及無徵錢糧盡行查出其溢額一項除抵補無徵外所餘銀兩解貯司庫積有成數即於本省置買義田每嵗租息收貯在官以僃公用至寺田一項應即作為義田其所收租息除辦賦之外亦收貯在官以僃公用庶溢額之項不致官役侵隱而寺田之租皆可積貯公用矣除移咨督撫二臣嚴催各屬查報外合將查出溢額寺租情由會同繕摺奏聞謹奏此事當移咨閩省督撫著伊等斟酌料理具奏同日又奏為覆奏事竊臣前奏分别限期採買倉穀一摺奉到硃批臣謹祗領伏思府廳州縣為親民之官地方安危百姓苦樂全藉此官為轉移關係匪輕臣赴閩清查自當論人辦理方於公務有益不當將事辦人以致漸啓私端聖明指示精詳臣實敬聞恍悟查閩省八府一州之中居官不能稱職者臣等即就其倉庫不清糾參離任各員內有應另補者俱令送京引見另補其餘或係新授初到或係甫經題補或係現今改調所有正印各缺並無舊任之員上厪聖懷矣謹奏目今雖經清查亦需後人接續料理不然仍無益也同日又奏為覆奏事竊臣於十二月十八日盤查事竣即宣旨福建鹽驛道員缺緊要陳豫朋不勝此任著伊拉齊補授鹽驛道陳豫朋交與福建督撫酌量於别處題補臣又宣旨伊拉齊朕亦不保其必能勝任説與髙其倬常賚若因朕所擢用包衣人員遂爾瞻徇則大誤矣著伊等留心試用髙其倬常賚俱敬謹欽遵外臣又欽遵面奉上諭自抵閩以來細看伊拉齊行事端方居心潔淨雖外官事務未能熟練若加學習便可料理數月以來所辦之事並無偏袒之處臣謹據實密奏但福建鹽政頭緒紛繁一切諸務非細加搜查不能保其必無隱漏况伊拉齊初任外官更非急遽所能奏效查交盤例限兩月可否寬給限期俾其徹底清查庶於國課有益為此具摺奏聞伏乞皇上睿鑒謹奏巳另有旨矣髙其倬自然為之斟酌同日又奏為奏聞事竊臣遵旨帶領命往官員楊𢎞緒等赴閩隨公議將候補各員先行委署盤查今巳告竣除將應補各縣缺之繁簡并各員之人才辦事於疏內分别聲明具題其知縣中之居官好者巳經另行摺奏外謹將知府同知通判各官為人辦事詳細開明奏員擬補漳州府知府潘體豐人有才幹膽量甚好但擬補泉州府知府劉而位辦事勤謹人亦有才但但少年可教不服水土不時抱病擬補福州府通判張煦才具亦好辦事勤謹為此謹奏知道了同日又奏為奏聞事竊查閩省州縣中民刁役玩難於治理者以侯官縣為最臣等委令候補知縣梅廷謨署理該員急公辦事不徇情面搜查弊端十分盡心而結怨招尤亦巳十分深重誠恐久留侯邑或致被人傾害是以臣將梅廷謨題請補授南平然尚在福建究恐不能免禍伏乞雖有提督標兵搶犯一事巳報提督未經通詳乃因初任不諳之故臣為愛惜人材起見謹將實情奏聞又建寧府之建陽縣事繁民猾非幹練之員難勝其任查崇安縣縣丞郭尚墉老成諳練此番盤查又極盡力是以臣等公議見郭尚墉係未經引見又閩縣為省會首邑政務殷繁必須幹練之員方能勝任日前臣等會查福寧州州同李芬辦事勤敏公擬先委署印觀其居官奮勉實於地方有益倘蒙皇上準其實授庶要地收得人之效矣理合據實密奏伏乞睿鑒謹奏覽同日又奏為遵旨密奏事竊臣欽遵面奉密諭於抵閩之日即於罣誤各官中細加密訪緣閩省吏治頽壞日久欲求秉公辦事並無瑕疵者不可多得今訪有數人謹將其居官為人好處與不好之處僃録恭呈御覽計開程光鏞原係命往以知州補用之員該督撫題請以知州管順昌縣事辦事有才聲名亦好因代買前任流交倉穀三千餘石未經上倉被參原疏聲明旋巳全完今覆盤巳報實貯業經題請免議給咨赴京引周偉原係邵武縣知縣百姓感激人亦老成因領買穀石揑報實貯濫邀議敘案內準部議革職臣查周偉於雍正二年大計卓異十二月內離任進京引見至雍正三年十二月回任而前督臣滿保周鍾瑄原係郎中管臺灣縣事福建大小官員無不稱其做官辦事實屬出衆之員自離任二年以來日用養廉皆係臺民供給且聞伊前任諸羅縣時教民開挖溝渠民享其利又為遠汛兵米取給諸羅民苦挽運就營召墾給兵又移借社穀賑糶皇上調令赴京引見可用與否難逃聖明洞鑒張無咎原係泉州府知府因揑報泉防廳倉穀實上聞謹據實奏明伏惟皇上睿鑒謹奏覽雍正六年二月初一日廣東巡撫臣楊文乾謹奏為恭報時雨事竊查粵東目下田間麥菜正需雨澤兹於正月二十九三十兩日連得大雨遠近髙低田地盡皆霑足麥菜生發茂盛雨潤土鬆百姓咸得盡力播種此皆仰賴皇上福庇將來早收可以有望謹將巳得時雨緣由繕摺奏聞謹奏覽得雨情形深慰朕懷但不可少肆乃志敬之一字時刻毋得釋諸懷抱同日又奏為密奏事竊查廣城內向有刁棍謝禹臣者窩賭為非生事不法曽經從前訪拏未獲之人臣於上年赴京後謝禹臣因布政使官達初任不諳鑽營入其幕中與庫官陳成元閩人林公官等內外勾通招搖行賄以致官達聲名甚屬不堪至官達奉旨解任於去年十一月初四日準到部文署撫臣石禮哈留其候新任交代直至十一月二十九日離任其間二十餘日謝禹臣更恣意招攬不論事之順逆銀之多寡槩行接收將案件逐一顛倒翻騰臣回任開印視事數日內其被害及經手過付之人紛紛向臣衙門具呈首告臣將贓明證確數呈內之要犯謝禹臣林公官等拘到訊據林公官等咸稱贓銀俱係官達所得等語臣思官達身受皇上髙厚之恩自當勉力圖報若竟如此婪贓少有人心者必不肯為今據首告紛紛指供鑿鑿或係謝禹臣暗地播弄官達受其欺朦或竟係官達變易初心見利忘義俱未可知但查官達係别案巳經解任之員應否具疏題參將官達交與督臣質審伏乞皇上批示遵行謹奏官達著革職交與該督嚴審定擬具奏該撫若有續參案件一面題參一面移咨該督一併審明具奏該部知道雍正六年三月初二日廣東巡撫臣楊文乾謹奏為恭報再得時雨事竊粵東耕種禾稻較之别省更早是以有清明得雨十分收之鄉諺今於二月十九二十兩日連得大雨二十二日又大雨竟日髙低田畝逺近霑足農夫野老咸頌皇上聖德廣敷感召天和之所致且米價平減黎元樂業臣密訪四鄉人民安恬歌咏有年光景甚好理合奏聞恭慰聖懷謹奏深慰朕懷爾等督撫果能居心誠敬秉公為國家辦理庶務察吏緝盜愛養百姓則上天之垂佑賜福朕可保其必也如河南雲南二省朕實可力保勉之勉之同日又奏為奏聞事竊臣據臣衙門舍役莊耀首稟去嵗九月內有內班門子胡龍超發出署巡撫阿克敦諭帖一封令其往虎門調取暹羅國船主到省押同允升行主崔峻觀繳銀六百兩與王堂官胡門子收進方準開艙起貨等語又聞暹羅國船主葉舜德番官乃啢等口稱我們仰慕天朝航海載米來賣被風飄流到粵遭署巡撫索去銀兩將來國王不準開銷著落賠補關係身家性命等語臣聞之不勝駭異隨發交司道等公同查訊隨據録報船主葉舜德等供稱去年八月載米糶日催逼無可奈何將米賣銀六百兩交王堂官親手收去等語訊之經手莊耀等吐供相符又據番官乃啢等供稱葉舜德係初次來粵貿易船巳進港無奈曲從等語臣思皇上德威遐播遠方絶域重譯來朝竭誠進貢實為從來之所未有皇上格外加恩何等深厚而阿克敦反向遭風之夷商勒索規禮若傳布遐方在阿克敦之聲名固不足惜其如我天朝國體何臣再四思維即暫借公項銀六百兩令司道公同傳齊番官番商當堂曉諭此項銀兩並非署巡撫阿克敦所得俱係衙役家人指名勒索今巳究出照數發還免爾等回國賠補葉舜德等感激皇恩歡呼載道俱稱我等仰慕聖朝髙厚今次愈加深切共皆舞躍而去臣謹將前後情由據實奏聞伏乞睿鑒謹奏料理甚當可嘉之至但此事朕殊不信阿克敦有如是理乎或係伊家人之所為亦未可定今諭阿克敦回京便道至廣東汝必將此事根究明白奏聞此時不便明言為此一事但諭伊詣廣州俟伊到時再傳旨審訊明確可也同日又奏為奏聞事竊臣據監生汪肇英呈稱於上年十月內被劫番禺縣知縣改換報呈獲犯不監亦不追贓審究等情臣隨批司提審兹據審明此案同夥七人內有將軍標兵丁朱國用等四名旗下壯丁小衛一名民人二名共行偷竊而將軍標各兵復糾同撫標兵丁一名於十一月二十二日行竊寡婦沈氏家署番禺縣知縣余祖蔭將為首之朱國用審作仇扳釋放供出小衛不行移提現獲之犯又不嚴審監禁至各兵雖據營文報係事前革糧旗厮係預先逃走今審各兵俱供行竊之夜朱國用現在將軍衙門該班各兵俱係倒提月日詳革名糧等語詳覆前來臣標兵丁林朝貴名糧亦係倒提月日詳革臣現在將徇情縱賊之知縣及失察兵丁為竊之將備辨員具疏題參外至壯丁小衛係積年慣賊現據旗員覆稱尚縱兵行竊倒提月日革糧各官查參庶官兵知畏姦匪潛蹤矣抑臣更有請者官兵糧餉俱由巡撫衙門行司給領臣請嗣後凡有開除名糧即日呈報巡撫衙門存案則倒提月日詭避處分之弊可杜又各鎮營凡有革糧兵丁於開除之日向皆任開除之日即押解原籍交明地方官編入里甲并令鄉保約束庶不致流為匪類矣至臣標中軍遊擊丁銓生辦事勤謹營伍整頓其倒提月日詳革兵糧據稱因將軍現署巡撫不敢與將軍標各兵明附參但丁銓生才具可用可否從寬免議伏候聖裁謹奏覽同日又奏為奏聞事竊臣於回任之後細查去年運到粵西倉穀三十萬石除三水縣賑濟災民穀并阿克敦常賚撥發平糶穀又常賚與石禮哈奏明買穀捐賑實未買穀即於粵西穀內借動煮粥各項共動用十一萬餘石去年秋收價平未經買還今則青黃不接米價昂貴更難採買臣現在與督臣孔育珣署布政使王謨設法購買其餘通省常平倉穀內有平糶未經買補碾支兵米未經徵補還倉等項現據各屬有報巳經徵買完足者有報現在徵買者俱難憑信臣現在委官盤查并密行確訪其雍正五年分平糶碾支之穀查明確實準其作速徵買勒限補倉其四年以前碾糶之穀若未經徵買揑報實貯者臣現在陸續題參著落歸補即使從前奏銷時臣等據結保題之項臣亦不敢怙過隱飾扶同欺罔統俟查明的實勒補完足再行奏聞謹奏嚴參揑報以實倉貯甚好酌量為之若遇有才有猷之員仍當少為從容汝二人商酌而行但須一一據實摺奏不可絲毫隱諱將此諭亦令孔育珣知之今將官達初到任之奏并朕之批諭發來爾看又一人參奏一摺亦發來與爾看尚有石禮哈常賚等之奏摺不便發與爾看者猶多爾試想朕將汝父成全千百年一人物不特此恩深厚汝難圖報即將汝告終養之一道員不二年間擢至開府類斯等參奏頻達朕前而未之加罪此種保全愛護之恩非比尋常汝於夢寐中若存有絲毫負朕之念必無善慶寧不可惜亟當勉力做一全人以仰答朕恩至參奏雖多餘皆不足信惟此洋行一事乃確鑿可據者更有何詞汝大謬矣汝意以為上不關國計下不纍民生巧取暗獲名實兼收殊不知人之耳目難暪但一圖利誰肯心服汝既巧取獲利而居清官之名屬員亦必令有巧利方可禁其婪取否則雖令不從此干係屬員生效尤之心也至於百姓汝曽經奏朕粵人惟利是嗜身命皆視為次既知此汝一徇利則百姓孰肯感服聽從耶為督撫大吏者既失屬員百姓之心而欲地方就理豈可得乎總之天下無巧事設欲巧莫若大拙則巧在其中矣夫名實兼收之説原言有其實而名必副之也豈有實取利而反得廉名實行惡而反得善名實欺詐而反得忠名之理循此以求名實兼收終必至於名實俱喪斯理一定不易愚人不能領會每致錯解耳汝今倘不知愧悔仍思粉飾則錯中更錯矣其他猶可如奏中云汝託進上之名將洋貨盡收入署中撿擇天日昭然二年來汝有何希竒之物進獻耶奚必如此之甚但令粵東一省有一人知楊文乾購覓洋貨進上只此一句在楊文乾自問於心忍乎汝大誤矣若不深自愧悔痛改前非必至噬臍不及矣假若以朕之愛惜為足倚汝自料汝之才情本領較年羮堯何如若言朕之恩重為可恃汝自思較傳鼐知遇之恩又何若亟當洗滌肺腸痛自刻責方能永保朕之眷顧慎毋謂此數人如此參奏尚不能移動上心其他奈我何若作此想則謬之至矣從來恃恩怙寵為臣子之大忌况朕之用人行政大公無私天下皆知即今日如此訓諭猶欲借私以全其公也汝若執迷不悟將來亦不過成朕之大公耳汝至彼時揮淚流涕思今日之諭巳無及矣汝既經此一番物議即粵省一錢之利亦不可沾染勉之慎之若稍見理不明立志不堅則朕亦無可奈何君臣情分朕除此一篇訓諭之外餘無法矣苐一緊要者公之一字果於百凡處盡屏私心則人人無不起敬重之心兹令通省大員交口談過巳為負朕若再不痛加悔艾改革更掃朕用人之顔面矣楊文乾自思其如天理人情何再者不欺二字亦關緊要汝心稍涉欺隱必損己之福况終必敗露何以欺為不但朕如此留心勤於訪察之君即遇昏憒懦弱無能之主亦斷不可欺天地神明實昭昭不爽信得及一分增一分福信不及一分加一分孽可不凛畏乎勉之又勉特諭雍正六年五月初三日廣東巡撫臣楊文乾謹奏為敬聆訓諭據實陳明事竊臣齎摺家人回粵奉到劾乃蒙天恩垂鑒不即擯棄將奏摺發臣閲看又俯賜硃筆諭旨訓勉開導愛護保全之恩至矣極矣臣非木石有不感悟動心痛自刻責竊念臣父楊宗仁仰邀聖主恩施得成千百年一人物臣以終養道員又蒙聖主於二年之內拔至巡撫疊沐𢎞慈有加無已臣於到任之時上念君恩內思父志曉夜焦勞不敢少踰尺寸惟恐有負聖天子擢用之至意玷辱臣父教訓之苦心凡一切陋規禮節盡行革除此固闔省官民之所共知而亦久在一參之後同城將軍署撫臣以及藩臬大開宴會設席置戲輪流作主肆行無忌經月不輟甚至官達請阿克敦石禮哈并傳喚同城文武俱到伊衙門赴席演戲兩三班設席五六十桌歡呼劇飲通省官民莫不驚訝直至聞有發還糾參王士俊原本之恩深重斷不因伊等如此傾陷此次回粵輒變初心况臣於去嵗陛見時蒙皇上每日召見諄諄訓誨無所不盡逈踰常格凡稍有人心者亦知感悟且屢蒙恩怙寵以為如此數人若此參劾尚不能動皇上俯賜垂鑒謹奏覽同日又奏為恭報三春得雨二麥豐收事竊照今嵗惠潮二府大麥小麥盡皆十分收成夏田得雨又極茂盛廣州等府自二月起至今止每當望雨之際輒得甘霖大沛且一經霑足之後隨即晴霽田禾易於生發現在四野青蔥暢茂早禾收成豐稔目下省城以及各府米價俱巳平減闔省民情甚為安樂此皆我宸𠂻所有惠潮二麥豐收各府雨水米價理合繕摺奏聞謹奏深慰朕懷汝等督撫大吏果能恪遵朕訓深體朕衷殫心辦事誠敬格天則天和下應雨暘時若朕可預保其必然也但須實力勉竭一誠聰明機巧概不必用實無可用之處勉之勉之若信不及見不透將來必致受纍祗將此心對天此身靠天乃為人第一妙訣餘無二策汝其識之同日又奏為覆奏事雍正六年四月初八日廣州將軍臣石禮哈將所奏連州人黃翰臣等擕眷逃赴楚省一摺欽奉硃批傳諭臣知欽此臣查黃翰臣等因鄧姓墳墓於上年十一月內𥪡旗脅衆奔往鄰境臣於今年正月間回粵聞知其事雖據報巳經押回但為首四犯未經就獲臣隨嚴飭查拏務獲去後兹巳據報黃翰臣等為首四名均巳拏獲隨經發審嚴究但查黃姓族大丁多素稱強橫今因爭墳細事不服官斷𥪡旗脅衆揑稱寃民逃赴楚省希圖挾制官長若不嚴加懲創恐刁悍之風不息是以知會督臣孔育珣會疏題參在案連州地接排猺界連楚省民刁俗悍更與别處不同其作何防範彈壓之處臣現在與督臣籌畫立法另行奏聞謹將奉到硃批諭旨緣由先行覆奏伏乞皇上睿鑒謹奏所奏是須盡心徹底詳細料理不可草率從事貽纍後日又費周折也同日又奏為奏明事竊臣去年奉旨赴閩盤查倉穀親見閩省各府州縣吏治不堪因具密摺奏請皇上將曽經出仕熟諳民事者命往數員交與福建督撫酌量補用奉硃批巳有旨矣爾見諭旨時保爾必深服朕此一出竒料理之意想也欽此昨臣準到部文奉諭旨著各省督撫於所屬知縣內除川陜雲貴廣西每省揀選一人務在歷任年久官員中擇謹慎老成才猷敏練者一面具奏一面咨送閩省交與髙其倬常賚酌量於緊要縣缺補用欽此等因到臣臣捧讀之下不勝歡忭之至伏思皇上擇各省之賢能補閩省之州縣求什一於千百在各省自不乏人聚良吏於邊方在閩省大受其益聖主神竒妙用實出臣意想之外而臣私心悅服又百倍於尋常之外也臣凜遵諭旨於粵東州縣中擇有瓊州府陵水縣知縣冷岐暉才猷練達實心辦事該員歷任五年雖俸滿應升準有部覆但似此賢員堪膺揀選臣巳檄催該員到日即當咨送閩省業於本內聲明以升銜補用洵屬人地相宜謹奏覽此番辦理雖出朕一時之權宜料汝必深為欽服也雍正六年五月二十四日廣東巡撫臣楊文乾謹奏為早禾成熟事竊廣省早收有小暑禾大暑禾二種今小暑禾業巳成熟大暑禾現皆秀實約計收石竟減至一兩零幾分髙雷廉等府較之惠潮更奏覽奏欣悅但宜黽勉吏治汝等督撫有幾分吏治幾分公忠朕可預定上天垂賜幾分嘉應也此理朕實見之透徹勉之敬之同日又奏為奏請聖裁事竊照南海縣一缺前準吏部咨稱係丁憂在外所開之缺應聽該督撫等於試用人員內酌量委署臣查南海係省會首邑旗兵駐劄事務紛繁必須幹練之員方能治理非試用人員所能勝任今查得福建侯官縣知縣蘇本潔從前委署晉江縣辦事實心清查盡力臣巳具摺奏聞前閲邸抄該員巳因提督標兵搶犯案內降調又原任陜西米脂縣知縣髙純勳臣在榆林道任內帶往邊地賑飢委署綏德州竭力招撫盡心辦事陜西撫臣圖理琛奏其平常供職奉旨原品休致臣於上年陛見時曽經具摺奏明在案臣查蘇本潔髙純勳才情辦事均為有用之材遽為棄置甚屬可惜伏乞皇上調赴引見於此二員中恩準以一員補授南海知縣則首邑重地得收臂指之效矣又查福建南平縣知縣梅廷謨臣曽將該員急公辦事搜查弊端結怨招尤久留閩省必致被陷等情具摺奏明奉硃批賞與臣以粵省同知知府題請補用欽此查肇慶惠州二府現在出缺均係緊要况目下正當清理倉穀之時需材更急仰懇皇上俯準將梅廷謨於肇惠二府補授一缺則該員必能感激天恩愈加出力報效所餘一缺并祈特簡一員來粵補用庶邊海要區咸慶得人矣為此謹奏肇慶惠州兩府之缺巳早有旨矣梅廷謨朕欲調來看後再定蘇本潔髙純勳爾惜此二人甚是當為國家愛惜人材照所請調來引見時另有諭旨同日又奏為據實奏明事竊湖北撫臣馬會伯摺奏解任江西按察使柳國勳前於湖北驛鹽道任內收受各項陋規銀兩因臣從前錯誤保薦奉旨著臣明白回奏臣接準部咨現在繕疏遵旨明白回奏外伏思國家以人材為重臣受恩最深圖報心切自念一人之精力有限故留意人材力為保薦使得各盡所長亦可仰酬聖恩於萬一查臣數年以來所保薦者如王士俊胡恂孫國璽黃文偉俱才守可觀足供任使其餘如樓赴京保伊署理撫篆及臣離粵之後並不料理地方政務一味徇縱又擅取關稅銀一萬餘兩不但皇上委任之至意即如柳國勳蒙皇上由知府擢補驛鹽道實能竭力整理地方臣兩次路經楚省見其辦事急公不辭勞苦捐資煮賑百姓感激且柳國勳之祖於順治年間全家三十餘口殉難於山西柳國勳之父於康熙年間全家五十餘口殉難於江西每言及此事臣見伊涕淚交流淋漓慷慨必欲竭力報效朝廷期無忝其祖父忠義之志是以臣於陛見時即以其居官為人之處據實陳奏今聞其為收受各項陋規尅扣驛站銀兩被參臣不勝驚駭兹巳蒙皇上諭令湖廣督撫臣會同審理虛實自難逃睿鑒但臣據栁國勳素日居官為人光景似不應有此負恩之事或收受陋規等項亦係以公完公未必侵吞入己若果將此項銀兩入己則柳國勳不但深負皇上𢎞慈亦且永墮伊祖父之家聲此等人留之何益祈皇上嚴加重處以為天下不忠不孝者戒為此繕摺密奏伏乞睿鑒謹奏朕亦不料其人竟至如此事結之後再看同日又奏為覆奏事竊臣齎摺家人回粵捧到臣奏報給還暹羅國米船被勒銀兩一摺奉有硃批除臣俟阿克敦到廣之日欽遵傳旨將此事根究明白奏聞外又臣前奏阿克敦常賚於署廣東巡撫任內將粵海關銀兩帶去一摺奉硃批行咨問二人明白回奏欽此臣隨欽遵行咨移詢去後除常賚處路遠尚未覆到俟其咨覆到日具奏外其阿克敦處巳據差役回稱不肯給發回咨只發名帖令其領回云回咨緩緩的從塘遞上寄去等語臣想阿克敦或因難以回答竟不給發回文臣無憑覆奏但查伊等帶去關稅銀兩數目及繳收日期均取有管關書辦及管理關務廣州府知府張鋗的確慿證印文應否俟阿克敦到廣時將關稅銀兩一并傳旨問明覆奏臣未敢擅便伏乞皇上睿鑒施行謹奏朕巳有旨著將二人革職俱令來粵到日將此事一併審理具奏同日又奏為奏聞事竊臣自閩回粵路經惠州府聞有礦徒聚挖即諭該府縣確查去後今據報稱歸善縣之白馬山石門仔山及永安縣之鐵嶂山俱有礦徒潛聚挖沙雖無擾害地方但紛聚多人自應驅捕臣隨嚴行該管文武帶領辨兵前往將首犯擒拏餘犯相機驅逐不致張皇併知會督提二臣飭捕今準督提二臣咨覆分遣將備帶兵查拏俟捕獲之日臣與督臣會商懲處并作何安頓外所有捕逐礦徒緣由先行繕摺奏聞謹奏知道了孔育珣巳奏聞矣凡遇此等事件斷不可姑息因循而蹈隱諱之咎此等陋習所關甚重汝等封疆大吏若稍見不透則遺害非細亟當竭力料理更宜克詳克慎倘輕忽從事或致錯誤較之草率塞責尤其不可者也硃批諭旨卷九下
