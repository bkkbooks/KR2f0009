body:
  text: 欽定四庫全書硃批諭旨卷九十五硃批楊長泰奏摺雍正二年十二月二十五日陜西肅州總兵官臣楊長泰謹奏為恭謝天恩事雍正二年十二月二十三日臣於吐魯番軍營接臣兄楊長春家信知仰沐殊恩特授浙江提督臣即恭設香案望闕叩頭謝恩伏念臣兄弟二人材本庸劣均蒙皇上簡膺重鎮揣分自思巳出望外今長春更蒙聖眷優渥擢任提督兼荷訓諭諄切錫賚便蕃臣兄弟夙世何修叨此異數惟有益深勉勵共竭愚誠愛養兵丁整飭營伍以仰報聖恩於萬一耳為此繕摺奏謝伏乞皇上睿鑒謹奏覽奏謝知道了爾兄楊長春所謂德勝於才之人也雍正三年八月二十日陜西肅州總兵官臣楊長泰謹奏為恭􅌳硃批奏摺事竊臣前因臣兄長春仰蒙聖眷特授浙江提督具摺恭謝天恩於雍正三年七月二十七日臣帶領吐魯番撤回官兵至巴爾庫爾蒙靖逆將軍大學士臣富寧安捧交聖主發到奏摺臣恭捧至營跪讀硃批諭旨不勝感激隨望闕叩頭謝恩伏思臣兄長春猥蒙聖主畀以重任寵榮巳極茲更荷溫旨褒嘉逾分犬馬之質實難承受臣兄弟惟有共相勉勵益深感奮矢報聖恩於萬一耳所有奉到硃批奏摺理合進繳伏祈皇上睿鑒謹奏汝兄長春和平忠厚謹慎有餘所嫌者稍覺偏於善柔耳雖然武臣中可謂一好提督雍正四年二月二十一日陜西肅州總兵官臣楊長泰謹奏為恭繳硃批奏摺事雍正四年二月初二日臣齎摺把總恭捧硃批諭旨到營臣隨跪接開讀望闕叩頭謝恩伏念臣兄弟仰沐隆恩畀以提鎮重任涓埃未效實切悚惶荷蒙聖慈寬容巳屬榮幸乃臣兄長春疊邀溫旨褒嘉跪讀之下感愧靡寧臣兄弟惟有益相砥礪共竭駑駘以期上答聖主優寵之恩下盡臣子矢報之誠於萬一耳謹將奉到硃批奏摺恭繳伏祈皇上睿鑒謹奏朕觀汝兄長春善柔之病竟不悛改汝當寄字勸勉囑伊剛方自勵雍正四年九月初六日陜西肅州總兵官臣楊長泰謹奏為奏聞事竊臣於雍正四年八月初六日統兵回肅業將任事抵署日期繕疏題報在案今臣將協路遊守千把等官酌量地方緩急輪流調至肅州同標營將辨親加試驗除堪奉職各將辨令其益加勉勵以報國恩其才具昏庸弓馬不堪辨員咨呈督提二臣報部斥革外隨查看標營兵丁演試弓馬鎗炮見其部伍不齊技藝生疏者多此雖由從前將辨操練不力所致亦緣肅鎮地處衝要自五十四年軍興以來口外安臺及護送銀糧等事差務紛繁以致不能按時操練漸次廢弛臣目擊形狀惶悚弗寧惟有實力整飭務期營伍可觀兵馬熟練地方寧謐軍民相安以副我聖主慎重邊疆至意并仰報隆恩於萬一所有臣抵肅驗看官兵營伍緣由理合恭摺奏聞伏祈皇上睿鑒謹奏但當勉力巳任內事何必言人之短將來爾升轉後其接任者亦復照此論奏若據所言甚屬可聽及察其本身廢弛較前人尤甚朕覽之厭矣只在力行不在空文也勉之雍正四年十二月二十七日陜西肅州總兵官臣楊長泰謹奏為恭謝天恩事竊臣於本年十二月初三日親赴鎮屬之南山北邊一帶查看初十日行至永固城地方臣家人齎捧皇上欽賜御書十思疏一卷併硃批奏摺到臣臣即恭設香案望闕叩頭祇領訖伏思臣一介庸愚毫無知識荷蒙天語垂訓教誡諄切不啻家人父子跪讀之下感激彌深敬將奉到聖訓時加警惕盡心勉力以圖報效今臣查看所屬地方凡邊牆傾圯者即報明督臣明春開凍後照例補葺其兵馬營汛飭令嚴加操防務期地方寧謐軍民安堵以仰副皇上慎重邊疆之至意茲臣於十二月二十日回肅謹將查看汛隘緣由具摺奏聞併叩謝天恩恭繳硃批奏摺伏乞皇上睿鑒謹奏好凡所行為莫謂相隔遼逺朕自有鑒照但竭力加勉可也雍正五年十一月十二日陜西肅州總兵官臣楊長泰謹奏為奏聞事竊臣本年三月內陛見曽將吐魯番遷來回目托克麻木特感激皇上隆恩欲進京叩謝緣由奏聞靣奉諭旨俟伊等安插之後具題候旨遵行欽此欽遵今巳蒙皇恩在威魯地方與遷來回子修築城垣蓋造房屋賞給田地牛羊農具口糧等項無一不備回人男婦老幼無不踴躍歡呼感頌聖恩臣巳據回目托克麻木特遞到稟內感激情詞及請赴京謝恩緣由咨呈川陜督臣嶽鍾琪具題請旨外理合繕摺奏聞謹奏候具題到日有旨雍正六年三月初十日杭州左翼副都統臣楊長泰謹奏為恭請陛見事竊臣仰荷皇恩補授杭州副都統業即繕本奏謝在案但杭州乃江海要地臣材質庸鈍恐有未諳若不恭請聖訓無所遵循且臣年逾六旬犬馬依戀之私時深下懷倘蒙聖主恩準陛見臣由潼關先赴京都叩瞻天顏恭聆聖訓後再赴杭州新任俾臣有所遵循而依戀之忱亦得以稍慰矣為此繕摺請旨臣無任瞻仰待命之至謹奏前嵗甫經陛見為日未久何必又請赴京於爾謝恩本內已有諭旨矣硃批諭旨卷九十五
