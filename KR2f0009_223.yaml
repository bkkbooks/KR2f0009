body:
  text: 欽定四庫全書硃批諭㫖巻二百二十三上硃批尹繼善奏摺雍正六年六月二十八日内閣侍讀學士協理河工事務臣尹繼善謹奏爲恭謝天恩事竊臣父子兄弟闔家受恩至深至重毫無報稱萬一臣自拔置詞林甫及五載䝉皇上異數疊施不次遷擢命署粤東臬司印務朝夕兢兢盡心學習方懼識短才庸萬難勝任復䝉聖恩授為内閣侍讀學士協理河工事務聞命之下感愧無地伏思河工闗係甚重臣雖毫無所知當此伏秋水汛之時赴工心切於半月内将未完事件辦理清椘隨詳請委署經督撫委糧驛道何師儉署事臣於五月十六日交印二十四日起身至南䧺府接閲邸鈔見奉㫖著將任内命審數案審理完結再赴河工臣任内奉㫖查審各案俱已審明經督撫㑹審題奏在案新任按察使公元巳於南䧺相遇臣不敢無事遲留現在星夜兼程前赴工所惟有矢竭愚誠益加勉力無欺無隠必慎必勤工程務期堅固錢糧勿使浮冒以供厥職求我皇上聖謨訓諭俾臣有所遵循庶㡬少免隕越除一面前赴河工外為此繕摺奏謝伏祈睿鑒謹奏勉之勉之切不可效法汝父瞻徇錮習負朕深恩一者朕憐其衰老二者觀汝尚可造就為國家效力之人所以姑寛已徃俾獲倖免不然禍早及身矣設或以汝父之居心行事遂謂計之得而奉為渉世良規則一誤豈容再誤施之於汝父之身者斷難復施之於汝也百凡事務處之以誠行之以力勿忘勿替期於始終如一特諭雍正六年九月二十六日署理江蘓巡撫臣尹繼善謹奏為恭謝天恩事竊臣鄙陋無知荷䝉聖恩命臣協理河務於七月十四日到清江浦仰體皇上教育之心諸事依總河齊蘓勒指授悉心學習随查髙堰山旴一帶工程見秋汛平穏河堤保固善後大工又次第告竣皆我皇上至誠感召共慶安瀾不勝歡忭嗣奉㫖令臣徃福建查審事件正欲束装起程於八月十五日接到部文奉㫖命臣署理江蘓巡撫印務聞命之下愧懼交深隨将感激微忱咨呈總河齊蘓勒代為題謝臣於八月二十八日自清江浦起身九月十一日到任業将到任日期另疏題報外伏念臣一介庸愚䝉皇上不次擢用五年之内即畀封疆重任遷轉之速遭際之隆從古罕有臣家人齎摺囬南跪讀硃批諭㫖奨勵逾分又䝉我皇上天地父母之心憐臣父衰老格外矜全臣之舉家疊受皇恩至深至厚雖生生世世永效犬馬實未能仰酬萬一惟有凛遵聖諭益加黽勉實心實力自矢愚誠以供職守斷不敢因循瞻顧有負聖主訓誨之至意所有臣感激天恩微悃理合繕摺奏謝伏祈睿鑒謹奏如此矢志甚好勉力為之以副委任同日又奏為奏聞事竊查江南為財賦重地清理錢糧最闗緊要通省積欠甚多久在聖眀洞鑒之中臣到任後即稽查歴年各案虧空贓罰銀至二百五十餘萬兩糧至數十萬石問之官吏多以年久無著難於追補為辭伏思既有虧欠之人自有著落之處乃向来承審承追督催各官惟事寛縱承審時任其借端開脱并賄買吏役分認欠數缷重為輕即使夲犯供出上司抑勒餽送之處亦多瞻徇情面不予追求及至定案承追雖有資産任其寄蔵隠匿嵗月既久在上司不過目為具文在屬員亦止奉行故事在前官既坐視其花銷在後官亦静聽其沉擱此數百萬之錢糧所以積欠不清也更有業經追出之贓物上司不速行催觧又被後官侵那復成虧空有入官易價之田房州縣不即行轉售仍令夲家盤踞私收租息種種欺隠不可勝言若不徹底澄清誠恐愈久愈難終無著落臣識見短淺事多未諳似此積欠纍纍敢云一時可以清理但世受深恩肩兹重任何敢瞻顧因循仍蹈前轍臣現悉心籌畫飭行布政司并府州縣官将各案虧空現在著追之人夲身家屬逐一提究或有寄藏隠匿之資産或有抑勒餽送之上司或有賄買吏役分認之欵項竝已經追出復被侵那之贓物業經入官尚未易價之田房逐一究眀分别著落勒限追賠如仍不及數則歴任承審承追督催各官均難免分賠之責庶國帑不致久懸而貪汚咸知警惕矣至於現在各州縣倉庫錢糧有無侵那情弊并司道庫有無未清之項俟盤查另摺奏聞謹奏江蘓吏治民風頽敝已極而錢糧一項積欠纍纍尤屬混淆鄂爾泰於布政司任内雖少為整頓縁旬宣之職既與督撫有間又莅事未久是以弗克徹底清晰今復因循數年更不堪過問矣總不得人為之奈何此原係第一繁劇之任非秉公破面未易振刷初到地方庶務紛紜殊難一一指諭且就汝力之所能聚精㑹神次第料理漸期就緒不但朕恩不宜辜負以汝青年畢生事業暨千百載之名譽寧不自惜如欲保全始終惟有於一切處無欺無隠将純然忠誠之念對越天地神眀置已身利害於度外能如是居心行事自䝉天祖鑒察神眀錫佑尚不止保全二字而已也湏見透守定為要雍正六年十一月初九日署理江蘇巡撫臣尹繼善謹奏為奏聞事伏惟我皇上旰食宵衣澄清吏治凡内外大小臣工無不諄諄訓誨共被陶成復以知府一官管理通郡有察吏安民之責特諭各省督撫詳加甄别臣䝉聖主隆恩簡畀重任敢不悉心體察以仰副我面俱堪勝知府之任惟淮安府知府申程章過於忠厚難以統理鎮江府知府毛徳琦雖才情歴練但未免巧滑俟臣再細加試看遵㫖具題其直隷知州内太倉州知州翁甫生辦事勤謹通州知州李世裔雖欠歴練尚堪學習海州知州李震見過一次徐州知州白潔新任未見俱未深知邳州知州吕大雅臣在河工時見其辦事明敏實屬能員前因舊任交代失報蝗蝻經督臣題㕘䝉所見據實奏聞至州縣各官尚未周知現在令該管府道分别賢否臣一面輪流調驗并加宻訪統期矢公矢慎以嚴舉錯以肅官方謹奏秉公察吏甄别賢愚封疆之能事畢矣朕之責任亦不過擢用汝等數員督撫而已雖然人不易知才難預擬姑且試用再定髙下耳觀汝品評大畧似無忝表率之職朕深幸簡畀不謬勉之同日又奏為請㫖事竊查江蘇地方習尚儇巧民少樸誠拖欠錢糧尤為積弊臣值此莅任之初正衆民觀望之時若仍踵舊習姑容取悦則千百萬之舊欠愈難清楚臣是以一面出示徧行曉諭一面行文通飭州縣清查糧冊歸併子户改正詭名飛灑包攬逐一跟求務使皆得著落欠多之州縣責令該管道府親徃督察分委佐貳協力查比期於徹底澄清但臣愚以為有治人斯有治法現在江南州縣能理繁治劇者十中不過二三其試用人員一切吏治尚未歴練似此冊籍混淆安望一時清理且通省之内情勢不同弊端各異無論臣識見短淺不能有畫一之良法即使立定章程而各州縣才力難勝不能奉行終歸無益臣晝夜思維計無所出竊查江南有因公罣誤知縣陳陛諴羅繼洪嚴接江之煒等四人訪聞素日居官聲名頗好伊等因事進見聽其言論於人情風土又甚熟諳可否仍留江南於舊欠不清之處委其協助料理似駕輕就熟可收臂指之用抑臣更有請者現在赴部候補及他省因公罣誤之員其中有辦事歴練精於錢糧者求皇上飭下廷臣各舉所知揀發二十員来蘇俾臣酌量繁簡分委各處協理倘能将舊欠册籍查清其候補人員即行題補因公罣誤者臣亦據實奏聞仰邀聖恩准其開復於江南補用其不實心任事者不時訪察據實題㕘如此庶任用得人而於錢糧大有禆益謹将陳陛諴等因公罣誤縁由另摺奏聞如䝉恩允求敕下該部免其回籍以便委用為此具奏伏乞皇上聖鍳施行謹奏江蘓積欠為數太多非汝獨力所能辦理已另有諭㫖矣同日又奏為奏聞事竊臣荷䝉聖恩身任地方凡有見聞理應陳奏不敢稍有欺隠兹於十月二十四日臣衙門禀事官傳禀有浙江理事同知車柏求見臣思車柏係現任職官或因浙省差遣至蘇何竝無公文投遞只有清字一紙又冩車松名字隨即著禀事官查問原係車松竝非車柏據稱因恐寫出車松名字被登記人役知道不便故假稱伊堂弟車柏等語臣因形迹詭詐不令進見查車松係鑲白旗滿洲原任翰林院檢討後在銅板館行走好交接閒逰臣在亰時見過一面素無徃来今不知何事到蘇又假冒現任職官臣恐其在外多事業已密遣人尾隨其後看其同行㡬人前往何處相見何人所幹何事将伊行蹤探聽眀確另行備細奏眀外合先繕摺奏聞謹奏所奏嘉悦覽之其加意察訪毋忽倘有借端生事處一面覊禁一面題㕘無論其有無過犯以旗籍之人任意在外逰蕩即屬不法之極各省督撫大吏咸肯如是不事瞻徇秉公執法則此種狂妄之徒何敢公行無忌而不斂迹潛蹤耶雍正六年十二月十一日署理江蘇巡撫臣尹繼善謹奏為恭報得雪日期事竊照江省地方今嵗仰賴皇上福庇大獲有秋禾稼登場之後米價甚平晴雨及時二麥亦皆播種今於十二月初二日蘓州一帶俱得雪四五分江北至江寧一帶據報於十一月十七十八日并十二月初二日先後得雪七八分一寸不等似此嘉祥有兆来嵗豐稔可以預卜所有得雪日期理合恭摺奏報伏祈睿鑒謹奏今冬北五省皆得盈尺瑞雪矣似此分寸沾濡恐無濟於事當竭誠修省黽勉吏治務有以感召天和獲䝉春雨接續方可冀来嵗豐登之慶也同日又奏為奏聞事竊照松江海塘闗繫民生䝉皇上軫恤深恩改建石工萬年利賴臣身任地方當此鉅工更宜慎重辦理經臣知㑹浙江督臣李衛署江南督臣范時繹齊集来蘇公同㑹商查得從前工程式様不妥物料不敷所修多未如式今将一切應需工料逐款核實不足者加增無益者議裁斟酌式様另立章程不敢仍前苟且伏思興修此等大工總理分任務在得人從前委官僅止六員一應辦料監工俱令兼任且内有現任地方印官不能朝夕在工從中工匠人等偷減夫工扣尅物料在所難免今奉㫖差通政司㕘議俞兆岳前來督工年紀雖老頗能勤慎臣等公同在水利效力人員并同知通判佐貳等官内共挑選得二十員分任責成監工辦料各司其事庶無貽誤現在将議定工料應需費用詳細造册繕疏具奏一面委員採辦物料俟物料齊備眀年定期興修臣工程未諳一切事宜皆與李衛范時繹悉心商酌而蘓州去海塘甚近興工之後自當親身查看竝不時嚴加稽查斷不敢一毫怠忽有誤大工誠恐上厪聖懐理合繕摺奏聞謹奏海塘工程緊要極宜盡心辦理諸凡能與李衛和衷協力可無舛謬之虞矣同日又奏為欽奉上諭事竊臣前經接到怡親王大學士張廷玉等字寄奉㫖著臣加意查訊防範日夲外洋事宜欽此欽遵臣先於抵任之初因江南崇眀吳淞一帶沿海地方逼近外洋甚為𦂳要即經留心嚴行沿海将備加意巡察各處城堡營汛墩臺飭令修整以資防守奉到上諭又經密飭沿海隘口加意整頓不時巡哨一切水師器具脩理整齊務使防範嚴宻國威逺播無隙可乗竝不稍露圭角使海隅驚惶至於出洋商人往来彼處尤宜留心經浙省督臣李衛署督臣范時繹竝臣㑹同商酌點立商總八人江浙兩省各分派四人稽查凡出洋之船令商總出具保結牙行保甲人等出具甘結合夥商人各出具連環互結使彼此覺察臣等并酌定稽查條規飭行沿海地方文武各官及管税闗口編㝎船隻大小字號查眀人數年貌籍貫檢點出口貨物驗對本商票照一出一入均湏查對眀確搜檢無遺如文武各官稽查不力即行題㕘以示儆戒臣留意查訊彼處消息凡内地商人到去原另在土庫居住自来防閑甚宻外番之人視中華之物新竒可喜往往多方購求從前洋商有将書籍象馬杭州畵景及教習弓箭之人帶去者皆係貪圗小利㒺知禁約浙江督臣李衛所拏鍾天覲等已在蘇㑹訊其打造戰船之處尚未確實總之邉防不可一日不備訪緝不可一日不嚴臣現在謹遵諭㫖留心訪察加意防範如有應行奏聞之處即當密摺具奏擬俟眀春往松江料理海塘之便再往寳山嘉㝎太倉等處沿海一帶查看情形并各處城堡營汛船隻如有未合機宜或應行添設修整之處逐一斟酌具奏理合先摺奏眀伏祈皇上睿鑒謹奏覽奏巳悉諸凡酌宜料理務以從容不迫為貴不可虚張聲勢同日又奏為奏聞事竊照江蘓虧空纍纍積案未清臣抵任後一面具摺奏聞一面嚴飭各州縣上緊清理三月以来其中一切弊竇亦漸次敗露查確者業經陸續題㕘今奉㫖㑹同清查之監察御史臣伊拉齊已經到蘓臣知㑹署督臣范時繹并巡按御史臣戴音保前撫臣陳時夏公同㑹議查得江蘓本省虧空共二百六十餘萬贓罰等銀共二十餘萬兩米榖等項共五十餘萬石外省咨追銀共一百七十餘萬兩雖徔前已經查過任所咨追原籍但皆虛應故事原未認真清理臣等一槩從新查審務将原籍任所産業資財并隠匿寄頓及上司勒索餽送通同侵蝕等項逐一究出抵補惟是各案歴年已久䑃蔽甚深又恐州縣各官從前既經失察此後仍然徇隠臣等公議湏派委幹練之員㑹同該州縣查審務使毫無遺漏毫無欺隠至於現在倉庫有無虧缺自應将各州縣錯綜調任清查但江蘓等屬州縣多半新任且一槩調任恐人地不能相宜事務多致遺誤臣等公議擇其在任年乆者錯綜調任其在任未滿一年者委官盤查其餘甫經到任未經出結并現在員缺候新官到任之州縣即責令新任官嚴行清查内有糧多未清之處或人不甚諳練恐被前官欺朦者俱委官協查務令将錢糧倉榖徹底查眀其有侵欺那移倉穀霉爛揑稱民欠等弊分别題㕘追補但查審虧空清理倉庫均需員委任雖有命徃来蘇候補之州縣等官現在各屬出缺甚多需員委署不能分任臣等公同酌議現擬另疏具題請㫖敕部挑選曾經出仕之候補州縣官二十員并通判同知知府等官十員来蘓分委辦理但恐部内挑選一時未必得人且江省錢穀頭緒紛繁若非熟悉之員恐為各屬朦混是以臣先将江省因公罣誤諳練錢穀之江之煒羅繼洪嚴接陳陛諴四員具摺奏請留用今臣等又在廢員内挑選得原任徐州知州張昕原任長洲縣知縣薛仁錫原任奉賢縣知縣張䕃圻原任蕭縣知縣吳大成原任儀徵縣知縣郭純共五員均堪委用再核算錢糧查對冊籍并需員協理令各府州擇佐雜教職中能辦事者共數十員一并委令協查亦經於疏内題眀臣等若聚集一處仍恐各員因循遲誤今擬督同各道府州分地稽察一切事件公同商酌現在上緊料理俟各該員到蘓陸續分委除㑹疏具題外合将㑹議清查縁由繕摺奏聞謹奏觀所區畫可謂切中肯綮但湏揆情酌理為之固不宜疎懈亦不宜急廹秉公執法循序辦理同日又奏為備陳江南積欠之弊仰祈睿鑒事竊照江蘓地方歴年積欠錢糧除康熙五十年以前者均䝉特恩蠲免自康熈五十一年以後至雍正元年積欠地丁六百餘萬兩加以漕項等銀共九百餘萬兩仰沐皇恩浩蕩分為十年十二年十五年帶徵為時甚久民力甚紓正宜上緊輸将按年完納不意舊欠難清復有請照新糧均攤之議以為舊欠之積年既久民間之産業不常或先富後貧無力措辦或産去賦存懸欠難追不若攤入新糧業户照數均徵尤屬衆擎易舉初聞其説似屬為公再四思維實有斷斷不可者夫朝廷立法勸善懲惡大扺欠糧之徒均屬頑梗之輩而完糧之户實皆循分之民今以頑户之抗欠派之循分之良民何以示懲勸而彰國法雖此積欠之中原亦有産去糧存貧窮無力難以著追者然約畧言之至多不過十之三四其餘大户之抗玩圗書之包攬吏役之侵蝕花分詭寄易冊改名弊端百出何得俱云無著如果徹底清查跟究確實使田歸的户户歸正名抗玩者嚴行究追包侵者不得倖免詭寄花分者不使朦混掩藏則實欠之數既和盤托出似不難依限完納其餘實在産去糧存貧窮無力難以著追之項方可分别確數據實奏聞但事闗重大為臣子者非分晰至清不敢冒昧入告而積習已久弊端甚深即多方設法亦斷不能一時分晰臣前已具摺奏請候補及因公罣誤諳練之員協同州縣清查現在又㑹同欽差臣伊拉齊等請發人員查審從前虧空及現在倉庫錢糧一時難以兼顧俟查審稍有頭緒即分委各員協同州縣将歴年民欠逐一清查料理謹将民欠情由據實奏聞謹奏清理此項積欠朕已確有定見矣趙向奎到蘓傳諭汝等自當備悉也同日又奏為奏眀事雍正六年十一月十一日接總漕臣張大有知㑹山東濟寜州查拏盜犯情由到臣隨即飛飭江省附近山東地方文武各官謹密防範如有彼處盜犯潛徃江省協力查拏并密移附近東省之狼山鎮臣王安國一體知照復委員前徃交界地方探聽星即具報嗣於十一月二十二日准總河臣齊蘓勒咨提濟寧案内潛逃盜犯周佳士臣即刻差委標下中軍遊撃武進陞密拏該犯先已蔵匿在山為僧當夜跟追擒獲已觧赴河臣衙門收審復查盜犯宋姓有家人季二適自東省回蘓恐亦係彼處盜犯傳遞消息隨即密拏并移咨河臣確查觧審再據季二供稱宋五住居山東伊妻父黃炳荘上是否係原任山東巡撫黃炳之婿黃炳現在東省亦經咨眀河臣就近確究臣謹繕摺奏眀謹奏周佳士當即拏獲深為可嘉捕役兵丁人等亟應破格賜賚以鼓舞将来近年巡捕亰營兵弁重賞之下人人踴躍以故劇盗積窩緝獲者甚多漏網者殊少而一切要犯率不旋踵就擒此其眀驗若吝惜小費則必至貽誤大事矣所當法之者同日又奏為恭謝天恩事竊臣父尹泰本閒𣪚之人䝉我皇上不次擢用㧞之泥塗之中置之青雲之上夙夜兢兢思圗報效奈年已七旬精力不足數年以来錯誤甚多幸賴皇上天地父母之心諄諄教誨事事包容且父子兄弟闔家疊受殊恩臣之一身尤邀異數中心感激莫可名言及臣父獲罪䝉皇上憐念俯賜矜全第革去職銜已出望外又䝉聖眀洞鑒微情復還原職昨臣父寄信與臣感皇上再造之恩自愧年迫衰暮恐難仰報深切惴惴勉臣務竭公忠實心出力臣望闕叩謝感愧交并伏念臣父子受恩至此即使糜頂捐踵亦不過職分當然難云報稱惟願生生世世永效犬馬微勞以仰酬髙厚於萬一耳為此恭謝天恩謹奏汝父原無罪譴何所用其寛宥朕從不枉法寃人亦不違法宥人若濫以使過之仁歸美於朕則恥而不居公平二字實可質諸天日也雍正七年正月二十五日署理江蘓巡撫臣尹繼善謹奏為奏聞事竊臣於本年正月初間聞得河臣齊蘓勒患病當即差員前徃㸔問據差員回蘓禀稱病勢漸重現卧牀褥已近二旬河務緊要臣正在繕摺奏聞於二十四日又准河臣齊蘓勒咨㑹已将患病縁由具奏并奏眀将總督河道印務咨臣赴工接署查河工修防機宜刻不容緩今臣於二十五日起程星夜趕赴工所暫行料理俾河臣得以安静調攝除将起程日期并到工接印縁由另疏題報外謹繕摺奏聞抑臣更有請者臣任内巡撫事務俱帶徃河工儘力辦理但通省現在審追虧空清查民欠修築海塘一切事務繁多河務又湏隨時調度方無貽誤誠恐河臣一時不能痊愈臣才識短淺勢難兼顧理合一併奏請聖鑒臣無任激切待命之至謹奏覽奏起程前赴河工情由知道了已有旨矣同日又奏為請㫖敕部議處事竊臣才識短淺事多錯誤去年十二月間據革任按察使董永芠将揚州商人安瑞成僕婦程氏夫婦命案審供詳掲請㕘並請提安瑞成等質審前來經臣據詳具題在案今臣接到部咨伏讀上諭始知其中多屈抑情莭董永芠似此營私煆煉顛倒是非不能詳察冒昧具題罪實難逭除将此案人犯遵㫖觧部審理外臣謹恭摺具奏伏乞皇上敕部将臣一併嚴加議處臣無任惶悚之至謹奏此事於汝毫無干渉人命案件既經臬司詳掲安得不據情具奏也雍正七年二月十二日署理江蘓巡撫臣尹繼善謹奏為奏聞事竊臣先因總河臣齊蘓勒患病咨臣赴工署印河防𦂳要不敢遲誤隨即起程将巡撫事務帶往工所辦理一面具摺奏眀嗣於途中聞河臣於正月二十日病故臣趕赴工所於二月初八日接印署事業經另疏題報其一切修守事宜俱備細體訪加意咨詢悉照齊蘓勒現行成規辦理并恐各河員因河臣患病乗此有偷減怠玩之弊現在委員分頭查點各工料物各處工程轉瞬即屆桃汛務使上緊修防以資捍禦惟是臣以庸愚當兹任大責重不勝悚懼奏聞謹奏黽勉從事敬慎為之河工修守機宜闗係非輕惟確秉忠勤之志兼祈天神祐助方可期底定之效雍正七年三月初三日蘓州巡撫署理總督河道仍協辦巡撫事臣尹繼善謹奏為恭謝天恩事竊臣接准部咨奉㫖命臣補授蘓州巡撫署理總督河道印務仍協辦巡撫事欽此欽遵移咨到臣隨望闕叩頭謝恩恭疏具題又接大學士張廷玉等敬録諭㫖寄信與臣伏念臣才識庸愚荷䝉聖恩簡畀封疆重任雖夙夜兢兢勉圗報效毫無片長足録仰答髙深又䝉恩實授巡撫署理河道總督復慮臣初膺重寄未諳工程示以遵守成規勉以細心採妨恐拘文牽義而盡信書本之言恐輕事更張而妄聽無稽之論特頒密㫖敎誨諄諄臣跪讀之下感懼彌深惟有仰遵聖訓恪守前河臣齊蘓勒之成規日與淮揚道白鍾山廣宣聖意殷殷戒飭即效力各官必一一驗㸔挑選誠實可用者催儹工程盤查物料以領帑修工專責之㕔員而物料到工之數目工程現修之丈尺俱令汛官月報以憑稽查臣目下将所積案牘上𦂳清理懈弛即起無窮弊竇其可寛之過臣斷不刻意吹所有感激微忱理合繕摺恭謝天恩謹奏所奏嘉悦覽之孔毓珣到任為期尚早毋因暫署率忽從事務湏竭力整飭以副委任齊蘓勒之治河精勤允當可謂盡美盡善纎毫無庸改張若伊之察吏則未免過於寛厚要當加意甄别况孔毓珣又係偏於善柔之人倘此際不力為振刷因循日久委靡更甚将来必至有掣肘之虞矣即伊到任後仍命汝協理切毋少懐推卸之念同日又奏為奏聞事雍正七年二月二十七日署巡撫臣王璣到清江浦臣即於是日交印已經另疏題報署撫臣口傳訓㫖令臣等和衷共濟竝教臣於河工事務小心辦理用人期於慎重寛嚴在乎得宜雖父母愛子之心無所不至亦未有如此之諄詳懇切也臣受恩深重自愧駑駘難以稱職凡見聞所及心力所到務與署撫臣同心協力共效公忠臣任内經手一切吏治民生地方利弊恐署撫臣新到不能詳悉皆備細吿知雖相聚二日已皆仰遵聖訓諸凡商酌開心見誠無分彼此嗣後一切緊要事件仍公同酌議舉行臣自思年少無知䝉皇恩如此委任諸事不敢稍有推委茍且畏難亦不敢妄立意見互相掣肘惟有不揣力量上緊料理以期稍竭犬馬報效之心臣謹将㑹見署撫臣王璣敬領諭㫖欽遵縁由繕摺奏聞仰祈睿鑒謹奏王璣頗屬聰眀諒汝等自當和衷共濟天下未有公而不和之理凡共事而至於乖異則二人中必有一私不勝公者勢不得不相水火也同日又奏為奏眀事案照江省蘓郡後幫千總杜𢎞昌督押旗丁丁能調等五十九船領兌蘓州府元和縣雍正四年分漕糧勒索銀兩一案據按察司将五十九船旗丁并駕船柁工水手人等一併問擬徒杖所得銀兩照數斷追招觧前來臣查各船旗丁給以屯衛地畝養贍家口領運北上又有五米十銀等項以資沿途用度原不應向州縣分外苛求惟查各丁管駕漕船雇覔柁工水手置買篷桅以及交納茶菓等項通算實有不敷况從前赴淮盤驗俱有費用現奉聖眀鑒照差御史臣前來稽察是從前旗丁之領運原不無浮費也前任布政司鄂爾泰任内曾經議定每州縣每石漕糧收銀六分幫給旗丁每船銀二十兩餘為修倉運脚之需是各州縣原有收漕羨餘應行幫貼旗丁之項不過丁能調等勒索太多耳今若俱作贓銀槩行擬追於情法似屬未當但此項幫貼原係私議若将縁由叙入本内一經題眀便為成例恐各旗丁藉此以長刁風各州縣因之以增重耗又有未便臣是以於㸔内将旗丁向來幫貼之項并各項零星銀兩另行斟酌措詞議請免追其餘多索銀兩仍照追入官再查各旗丁勒索銀兩雖係五十九船管船旗丁并各船柁工水手分用但出名勒索者實止頭船丁能調等四人臣愚以為朝廷立法懲一儆百此案惟應将為首為從數人重治其罪使嗣後各旗丁咸知畏懼其未經親往勒索之船丁及各船柁工水手無知窮民似應槩請從題外理合将案内實情繕摺奏眀再查州縣徵收漕糧每石收銀六分以為幫貼旗丁并修倉運脚之需臣去年抵任後即值收漕隨據各州縣禀眀前來臣初到地方未能深悉其中利弊過寛恐苦累百姓過嚴又恐苦累旗丁是以未敢率定仍照舊徵收幫貼惟嚴加稽察不時差人密訪雖斛面較徃年畧減而州縣之所收仍不止六分旗丁之需索仍不止二十兩而各屬州縣并各旗丁俱彼此相安臣㸔此一年光景頗知大槩而現在過淮使費又奉㫖查禁漕弊漸清臣當與署撫臣公同斟酌嗣後務使旗丁不致額外需索各州縣亦不許額外多收庶官民兩便均沐皇仁於無既矣謹奏兌漕利病朕早洞悉情形既因張大有罷軟無能又兼歴任巡撫皆係沽名釣譽之輩所以未經飭令清釐此事湏撫臣與漕督通盤查確徹底講眀務俾旂丁無賠累之苦百姓免勒索之患方可永久循行昨趙向奎陛見時論奏及此甚屬眀晰待新任漕臣性桂抵任後汝等詳籌熟計合於至當而行即倉場二臣亦當與之商妥揆諸情理之中除却偏枯之弊於以立定成規縱使有一二刁徒欲逞故智亦無所施其伎倆矣勉為之雍正七年四月十二日蘓州巡撫協理河工事務臣尹繼善謹奏為奏聞事竊查今春桃汛水勢仰頼皇上福庇各處安瀾工程保固業經恭疏題報且雨水調勻於三月十二四月初四等日俱得徃各工查看今李衛祖秉衡到清江浦已将戰船㑹議具題訖臣於四月十七日即前徃安東以至徐州一帶查看工程督率修防點驗河兵盤查料物其去年嵗搶修工程用過錢糧例應今年四月内請銷但事闗錢糧重大臣未經親勘眀確不敢冒昧草率雖去年做過工程已經桃伏秋三汛現在丈尺難為確據然其大槩規模尚可約計容臣逐工確看回日即核眀次第請銷除另疏題眀外理合繕摺奏聞謹奏錢糧猶屬小事工程所係重大當以全副精力籌畫備禦毋因養指而失其肩背也朕因時屆伏汛念兹在兹汝膺專責尤宜警凛惟辦一誠祈天籲神庶冀淮黃奠定運道民生克保無虞至如天然壩之啟閉全河樞紐攸闗一一遵循齊蘓勒舊規不可誤信謬論輕率更張脱至意外蹉跌汝罪擢髪難數矣元年以來河工局勢敝壊已極齊蘇勒於三載之内整頓完全若非實能憂勤匪懈寧邀河靈黙助成功耶今縱有超越識見詎便鹵莽施措亦湏先将通身利病周詳審度奏眀於朕然後相機擇時舉行耳譬之作文於詞賦中忽夾對股時文成何體段凡天下事必有確乎不㧞之志屹然不動之守方可迄於有成倘稍渉狐疑不定必致進退兩難前後俱失莫能收束矣勉之慎之同日又奏為奏眀事竊思河工錢糧所闗甚重臣署事以來将新舊錢糧加意稽察逐項清理如已經咨題有案虧空合計銀三十餘萬歴年久逺完觧無㡬若再不查追歸結愈久愈無著落臣已經飭令淮徐淮揚二道徹底清查亦如江蘓各案一體辦理又有已經發覺數年尚未㕘出虧空約計銀三萬有餘或係未繳節省或係應追核減或係拖欠柴價認還借欠等項原非真正侵蝕可比是以前河臣齊蘓勒未經題㕘但究屬帑項虛懸未便日久沉擱現在行該道等令其勒限催比如逾期不完即行㕘追至於各屬經手錢糧有無虧缺先經臣奏眀委員盤查今據各員盤查造册到臣計其存庫款項收領銀數應銷工程并在工物料細細核算其中頗有缺少有稱發銀購料者有稱於去年霜降後修工動用者竝有稱前任交代原無現銀向以料船房田等項流抵者種種遮掩情弊百出但河工局靣與地方州縣稍異臣若據册即行題㕘而本年錢糧工程業已經手一旦半途更換貽誤實多臣是以姑從寛緩如稱辦料者即委員查其何處購買押送到工如稱做工動用者即查其係某段工程髙寛丈尺與所用之料是否相符如銀兩畧有那移查後自行補足臣亦不復苛求倘查出從前虧空實據自當嚴㕘究處懲一儆百伏念河工責任重大以臣之愚昧即竭力殚心尚不能報效萬一又何忍以暫時署理稍為推卸惟有事無大小經手辦理必逐一用心於遵守成規之中斷不敢存茍且因循之念理合據實奏眀謹奏如此方是秉公殫力為之若少渉推卸孔毓珣到任後一一奏出汝何顔對朕耶河員既與地方有司不同自不應遽列彈章但将諸凡情弊徹底查清姑容補足予以自新之路亦不得謂為苛刻矣題補河南効力人員一摺所奏甚是已交部議雍正七年五月二十九日蘓州巡撫協理河工事務臣尹繼善謹奏為恭報二麥收成分數事竊照今春雨暘時若先經臣将麥苗茂盛縁由繕摺奏眀今臣赴淮安徐州邳州所屬一帶地方看工正值二麥收穫之期詢之農民俱稱收成有八九分不等并據江寧蘓松等處各報稱有八九十分不等目下米價甚平中米八錢八九分至九錢五六分不等上米亦不出一兩一錢四五分兩月内雨水調勻理合一併奏聞謹奏覽奏二麥收成分數知道了至於禾稼目前雨澤雖調秋成尚早何敢預期加勉誠慎以敬迓天庥可也同日又奏為奏聞事竊臣自四月十七日由山安桃源至徐州一帶查工不惟於歴練河務之員隨時講究即向河兵野老亦必虛懐詢問博加採訪每到一工尋其源流量其形勢分其緩急宜鑲墊者鑲墊宜增修者增修宜加髙培厚者加髙培厚埽壩堤工已皆一律完整一年之工多半在於桃汛此時若不細加查看伏水一長已做者無可考據将來勢必冒銷臣歩履河干逐段丈量不使少有朦混各處工所謹遵皇上訓誨多備物料不足者發銀購辦疲玩者委員監催於足用之外仍行多備俱於五月半前陸續運工又令汛守各官督責兵夫於各工堤岸多積土牛以備不時之需至河員無論文武修防是其專責乃文官多任意偷安竟有一兩月不到工者臣不分文武俱專責成将本工事宜必一一盤問其有漫不經心竝在地方多事者已經分别責懲斥革俾知踴躍赴工以期同心共濟然工程之督率固在官員而河干之力作全賴兵目臣逐名點驗竝查其怠惰老弱者革除另募稍有辦事勤慎眀白工程者必加奨賞以示鼓勵再伏汛在邇若不通盤計算先期籌畫必致臨事周章因派定諳練之備弁分守大工熟習之兵目調換要汛能事之效力官分地防險臣率同各員敬慎小心往來督查不敢一毫怠忽有曠職守上厪聖懐但河工修守機宜其理甚㣲臣初任未諳雖勉力料理實心懐惴惴用敢備細陳奏伏祈皇上指示俾臣有所遵循謹奏嘉悦覽之能如是虛懐詢訪悉心措畫可謂不負朕之任用矣然河工之事人力固宜克盡而安瀾順軌全賴天地神眀之隂相黙祐也果能必敬必誠則平穏可保汝其勉旃同日又奏為敬承聖訓恭摺奏謝事本年五月二十日臣齎摺家人回南奉到硃批諭㫖訓誨諄諄跪領之下竊念臣才識庸愚䝉聖主髙厚之恩簡署重任敎以恪守成規小心敬畏提撕誘掖至再至三數月以来事無大小無不凛遵聖訓黽勉歩趨自愧質本駑駘雖率由成法尚竭蹷不遑不但不敢少萌更張之心亦實無所用其更張之事即或應有隨時措置亦必恭請在繕摺奏謝間適浙江總督臣李衛過清江浦恭傳諭㫖教臣敬謹辦事其天然壩之啟閉暫依舊規辦理又吿臣曾面奏黃河水淺等語伏思皇上聰眀睿知聖學髙深凡平成之方畧河道之情形前河臣數載之運籌與現在李衛之議論其是非得失無一不在聖眀洞鑒之中何庸臣之𤨏凟但河工事重誠恐上厪聖懐有不敢不據實敷陳者夫治河之道不在水之淺與不淺只在底之深與不深而欲知河底之淺深又視兩岸埽工出水之多寡數年以来仰賴上天黙佑又䝉指示周詳前河臣齊蘓勒恪遵經理河由地中一律深暢今春桃汛以後水勢平穏比常年五月小三四河底深通竝無淤墊共見共知此現在水勢情形乃不知底深而岸髙反以水小為河淺此誠不諳皇上一言備之矣竊查淮水東注歸洪澤湖北出清口與黃相㑹其所以敵黃者在清口瀦湖水以蓄其勢者在髙堰堤工惟恐湖水過多泛漲故留天然壩以為宣洩之路使當啟而閉則湖水過盛勢必大堤受險且運道難以容受使當閉而啟其髙郵兢兢惟時時小心敬慎事事恪守成規凛遵訓誨之精詳以求少慰聖懐於萬一所有奉到諭㫖理合繕摺恭謝伏祈睿鑒謹奏覽奏嘉與之懐筆難宣諭朕但為國家慶得人而已勉之硃批諭㫖巻二百二十三上欽定四庫全書硃批諭㫖巻二百二十三中硃批尹繼善奏摺雍正七年七月初十日蘇州巡撫協理河工事務臣尹繼善謹奏為敬陳水勢情形事竊臣於六月十一日前徃揚州𤓰洲一帶查勘工程隨路探量運河水勢不大不小通身暢流兩岸閘洞皆分先後緩急相機啟閉使民間田畝得以灌溉亦不令運道消洩過多𤓰洲江工因江中正人洲長後十數年来汕刷北岸雖江水平稳但花園港壩工離𤓰城甚近頗為險要臣住宿二日相機調度督率下埽簽樁并調諳練工程之員悉心商酌令協同該㕔并力修防加意保護於二十二日回清江浦黃河水勢隨長隨消消長皆不出數寸漸而不猛雖比五月間較長尺餘比常年尚小二尺工程處處平稳惟洪澤湖水尚未長發天然壩且無庸開放目下伏汛已過河水安瀾實仰賴我聖主至誠感孚是以神眀眷佑臣身任宣防心懐敬惕秋汛在邇何敢一刻偷安一念怠肆惟有愈加敬謹慎終如始以求勉盡職守現在各㕔料物堆積二三十萬四五十萬不等俱已充足臣時時仰遵聖訓務期多備但發銀過多又恐其那用一時料物不到更費周章今年料物甚賤臣令各㕔先量力購辦如到工料物既多委員驗收然後發銀則帑銀不得虧缺而料物源源接續俟秋汛平穏其多餘者可留作来年之用臣即徃髙堰山旴一帶查㸔洪湖工程先将水勢情形據實奏聞謹奏朕懐暫慰必待霜降後方敢全釋也敬之慎之切勿稍渉矜肆今夏各省缺雨處頗多上流涓細河水自應安瀾秋汛恐非伏汛可比當確秉䖍誠以祈神眀祐助同日又奏為請㫖事竊查前河臣齊蘓勒因黃運兩河堤工緊要請嗣後堤頂民房如遇傾圯一槩禁止重修令其移居髙隙之處以免作踐堤工經部議准轉行欽遵在案及署撫臣王璣到清江浦又傳諭㫖命臣於堤上民房一事妥協辦理仰見我皇上愛民如子惟恐一夫不得其所以安土重遷不忍催迫直待房屋傾圯方令移居仍恐臣等奉行不善或至擾累復令悉心籌畫此誠恩周蔀屋澤遍茅簷矣臣仰遵聖訓時刻留心查工時遍歴河干見黃運兩岸堤上居民不下數萬餘家稠密之處比屋相連長至數里其上下徃来實不無少有踐踏但臣細查堤上之民竝非擇地而居也原因卑下之地積水恒多髙阜之田有主管業不得已而向長堤托處子孫相傳安居樂業者已非一日若少有損缺即不准修葺勢必擾累窮黎殊非仰體我皇上愛養元元之至意若待其房屋傾圯然後禁止重修小民樂於便安眀知傾圯之後便需遷移勢必隨時粘補百計支撑是民房常見完整而官堤無人愛惜雖嵗費無數之金錢終不足以供無窮之作踐也臣愚以為嗣後堤工或大有衝刷之處仍動帑興修外其餘民房左右或稍有殘缺於農事已畢之時即勸率居民各行墊補仍畧為培植此不過一舉手之勞而堤日見其髙厚民仍見其安堵雖平素少有作踐而年年漸次增培在窮民得地而居而微勞竝非苦累如䝉恩俞允臣當仰體聖心遍示曉諭使小民知給求養欲實聖天子覆載之恩竝知奉上急公即保守室家之道似於河道民生均為兩便臣識見淺陋是否有當仰懇聖鑒指示以便遵行謹奏此非輕率可定之事據奏小民樂於便安云云等語俟朕廣諮博採詳細思維得有主見後降㫖示汝方可通行曉諭永久遵行兹且宻之不宜宣露同日又奏為欽奉上諭事竊臣接准部咨欽奉諭㫖以泗州虹縣等五州縣新淤之地從前委員辦理草率所報之數未盡確實或至賦浮於田令臣㑹同范時繹再加確勘據實陳奏欽此仰見我皇上惠愛黎民至意臣隨咨㑹督臣并檢齊從前查丈册籍詳悉察核現在挑選辦事細心之員令其分徃泗虹等處㑹同州縣官相度地勢體訪輿情核對原糧科則備查新墾坐落分别黃水經由處所先行確勘繪圗造册申送臣乘秋汛赴宿虹邳睢桃源一帶看工之便再親徃查丈其實在淤地不肯任其遺漏如原非新淤亦不敢稍為牽扯倘雖非新淤或舊有欺隠情弊亦必另行分晰務期竭力料理不敢復有草率統俟查丈眀確備細奏聞所有奉到諭㫖辦理縁由理合繕摺具奏伏祈皇上睿鑒謹奏田賦重務切湏查丈清晰據實具奏以聞同日又奏為奏聞事竊照淮北一帶向有山東河南侉梟私販因夥衆力強兵役眀知不敢擒拏徃徃私販成羣肆行無忌臣至淮上即飭行各屬文武官員留心察訪如有梟販經由即刻禀報以便撥兵協力擒拏於本年六月初三日有積梟王禄安張二王四海胡美公劉貴李同等聚衆興販清河縣知縣李必成帶同典史汛弁率領兵役前徃擒拏已獲梟夥八人復於桞園中突出多梟刦去夥犯兵役併力抵敵致被扎斃兵丁姜必陳據該縣禀報到臣臣即當夜差淮安城守營㕘将烏麗珠等帶兵追擒伊等聞追緊急捨棄私鹽分路潛逸隨密差員役查訪各梟下落訪得梟犯葛順家住清江不逺料其来家隨令裏河同知夏建徳密差幹役伏於左右附近地方次日夜間果獲王禄安使来探信之夥梟葛亮吳七竝素曾同夥之朱六等供出王禄安等已潛赴上江之旴𣅿定逺等處臣復選差能員幹役帶同朱六等作眼懸以重賞分往各處緝捕仍一面咨眀督臣飭上江一體嚴拏隨於定逺縣地方拏獲首梟王禄安臨淮縣地方拏獲王四海張二旴𣅿縣地方拏獲楊三趙林等寳應縣地方拏獲李同又劉貴竝同夥徐姓自料不能漏網隨到江寧投首又陸續拏獲是日不在場之積梟十餘人俱現在發司審訊嚴行定擬臣身任地方似此大夥私梟未能盡息疎忽之咎實所難辭除被傷兵丁及緝梟兵役分别給賞外謹将拒捕及拏獲情由據實奏聞謹奏此事朕早聞之羣梟拒捕肆無忌憚法紀何在要當緝獲正犯重懲示儆倘以别案私梟逼勒供認希圗了事則為無恥之甚矣試思地方大吏如果平時嚴眀素著縱有姦頑之徒何敢如是強橫事後但以疎忽之咎實所難辭一語奏覆遂可以邀朕心之原恕乎其将已獲者審眀定擬未獲者盡數擒挐不致一名漏網庶或少遮汝面之慚耳雍正七年閏七月初九日蘓州巡撫協理河工事務臣尹繼善謹奏為敬陳秋水情形仰慰聖懐事竊照今嵗荷䝉皇上福庇伏汛安瀾已經恭䟽題報在案秋來水勢愈加平稳處處埽壩堅固隄工仰賴我皇上宵衣旰食敬天勤民道中已徹底澄清浮沙全去現在黄水日消清水日長黄河埽髙出水至少者五六尺運河水勢至淺者丈餘是從前黃強淮弱既免黄淮竝漲之虞天人感召㨗於影響我皇上諄諄教誨謂宜誠敬以迓天和實歴歴其不爽也雖白露在邇水勢漸平然一念之幸喜即足以起百念之懈弛臣惟有兢業存心慎終如始表率各屬愈加勉勵以求仰慰聖心於萬一耳所有水勢情形據實奏聞謹奏天人之際有感必應其理顯而易見凡庸之流或昧理妄求以徇已欲則亦漠然弗應一不應遂以蒼蒼者為無靈而𣺌茫視之矣夫始以邀福之心繼以不信之見則亦何所不至故曰小人而無忌憚也然信生於誠誠者無私之謂即聖賢克已復禮之功果誠矣信矣凡興一役舉一事必先盡其心殫其力謀之人聽之天而後冀有成功能如是将見人事盡於下天道感於上不期其應而自無不應矣如但知人力為可恃及徒事祈禱以僥倖者皆井蛙籬鷃之淺見狹識均無足取天下事無論鉅細莫不皆然汝其勉之敬之試體驗之同日又奏為奏聞事浙江總督臣李衛回浙寄信恭傳諭㫖海塘工程緊要令臣等上緊料理不可仍前草率欽此仰見我六千餘丈不難於興工修築而難於採取石料去年㑹議之後臣隨委多員徃各山採辦正值水凍之期不能採鑿至二月春融開採以後差􅊾交催日以冀同心協力相與有成誠恐上厪聖懐理合繕摺奏聞再逺近居民聞皇恩發帑為百姓謀安全為萬世計利賴莫不歡欣鼓舞感戴題請㫖合先具摺奏眀謹奏覽雍正七年九月初六日蘓州巡撫協理河工事務臣尹繼善謹奏為敬陳秋汛安瀾事竊臣前因伏汛平穏具摺陳奏欽奉皇上硃批訓誨夙夜兢兢勉勵各屬交相儆惕於各工多備料物多積土牛河灘産草甚多約得三四百萬束用以鑲墊工程勝於秫稭且近在工所緩急便用臣已遍發刀工令其全數搜採源源濟工又恐各工汛地綿長汛員不能兼顧兵丁未免偷安因分派效力人員按工防險以備秋汛自閏七月十五日以後寧夏連報秋水陡長至八月初旬黃水驟大比伏汛髙四五尺臣當此際寝食俱廢夢寐皆驚住宿工所上下接應分委能員晝夜徃来巡查搶護幸料物有餘水勢逐日加長而工程亦逐日增髙尤仰䝉聖眀指示恐秋水加大今年天然壩總未開放以故淮水勢均力敵雖淮黃交㑹之處清水阻滯數日不能暢刷黃流而黃流被清水抵禦亦不能涓滴入運仰賴神眀黙祐聖主福庇於八月二十後黃水退消十日之内漸消三四尺工程處處平穏湖水比去年大二尺現在逐日加長運道清口通深暢流今時值霜降水勢安瀾敢謂幸保無虞稍萌肆志第念臣愚魯無能仰䝉我皇上提撕誘掖敎誨諄諄諸事敬謹遵循庶㡬少免隕越臣不勝惶悚戰慄感激天恩之至臣現在起程查看宿桃邳睢工程隨徃徐州謹奏欣悦覽焉今嵗朕之憂慮河工倍於徃昔兹秋汛已過全河幸保無虞皆爾忠誠之念有以感召神眀黙佑之所致也孔毓珣不日南来汝職雖協理毋得私毫推卸倘孔毓珣弗肯殫心竭力渉於瞻顧因循汝其進言規勸并一一據實奏聞同日又奏為奏眀事竊惟河道工程闗係甚重河工錢糧難容虧缺查有各項虧空年久未㕘者甚多一面勒限嚴催經臣繕摺奏眀俟逾限不完即行㕘追隨又逐案細核通計未㕘虧空銀八萬兩有竒或係核减或係節省或係認還借欠或係蕩柴價值因從前未經㕘追承追者視非部案不肯上𦂳而虧空人員亦遂任意捱延以致數十年積案纍纍不能清結臣查此等銀兩雖與實在侵蝕者不同但總係庫帑虚懸豈容怠玩且細加察訪多係有著之項因竭力查催自二月至今已陸續完過銀四萬餘兩尚有四萬餘兩未經完補而各員視為未破之項有觀望因循不肯上緊者有本人早已陞遷他徃者且有家口已經囬籍者若不題眀定限行催終久必致無著臣現在具疏題㕘請勒限一年追完如再不完即革職離任究追嚴查産業抵補再從前已㕘各案虧空臣到任後追補過銀一萬二千餘兩查出田房等項約值銀一萬數千兩咨查各處原籍家産尚未覆齊現在逐案辦理亦照江省虧空一體清查至於各㕔厯年庫貯除桃源㕔張充國署山旴㕔鈕天麟虧空銀兩業已特疏題㕘究追外其餘委員徹底盤查已漸次清椘又責令淮徐淮揚二道逐一清盤不使徇隠臣䝉皇恩委畀重任惟事事均期實在不敢一毫茍且上負髙深理合繕摺奏眀謹奏可嘉之至但能一無瞻徇秉公執法何事弗克辦集也如是居心豈止被朕奨許必䝉上天之庇佑矣勉之勉之同日又奏為恭報秋成事竊查今嵗江南地方風雨調和四境大熟各種齊收連年共慶豐登今嵗秋成更稔現在米糧價值每石六錢至八錢不等比户盈寧羣黎樂業此皆我皇上敬天勤民至誠感孚之所致也臣身膺民社職任宣防仰賴聖主福庇淮黄奠定百穀用成臣無任歡忭之至兹據各州縣具報前来臣細晰府州分數另行開摺恭呈御覽伏祈睿鑒謹奏覽江省秋成豐稔情形朕懐深慰汝等督撫但能秉心忠誠布政平允未有不上感天和克致休徵者覩此應驗㨗如影響當愈加寅畏勿稍渉驕矜朕亦如斯期共加勉欽哉天地生成之徳聖祖垂庇之恩寧敢負乎奏為據實奏聞事竊照知府一官有監臨州縣之責必湏持身端正操守清廉始足以表率屬員而於地方事務方無廢弛有揚州府知府楊繼椿者性情貪鄙㒺䘏民瘼無論臨民接物凡事刻意苛求商民咸畏其威無不極意逢迎以厭其欲而冀免於禍揚州裏河仙女廟鎮有閘通揚子江繼椿遣其門人苗相功把守閘口盤查私貨鎮上居住之監生旋元乾家資富厚廣好交逰即與守閘之苗相功彼此徃来遂将元乾富厚情形聞於繼椿繼椿即令苗相功轉向元乾陳説繼椿利害并言以禮交際極可親近之状元乾因凂苗相功説合於今年六月間備銀一千二百兩拜為門生隨禮一百二十兩把門家人李兆元收繳維揚臣室以及商賈聞風莫不趨承恐後六月二十四日紳商樊經汪晉徳馬裕等延請繼椿設席方園因時天旱書辦進牌禁屠把門家人傳諭今日赴席另期祈雨竟徃就酌演戲引觴盡歡而散由是朝飲暮樂殆無虚日此繼椿六月内之近事如此由前而論則依官嚇詐違禁擅收門生也由後而論則視宴樂為美觀置民瘼於不問也臣思人臣事聞謹奏有人㕘奏楊繼椿如此貪鄙汝其確訪嚴㕘以為溺職者戒朕觀所奏欵跡鑿鑿十有八九毋因從前失於覺察而少為回護将朕此諭亦宻令范時繹知之事果不虚一面具疏糾劾一面拏禁任所贓私即行查封原籍産業咨眀晉撫勿使轉移庶不致得以施其三窟之伎倆也雍正七年十月十三日蘓州巡撫協理河工事務臣尹繼善謹奏為奏聞事竊臣齎摺家人囬南恭奉皇上發出硃批奏摺為㕘奏揚州府知府楊繼椿貪贓玩法奉諭㫖令臣留心訪察嚴㕘不可因失於覺察少有回護臣欽遵宻訪除奏摺所㕘欵跡外更訪得有貢生項立髙拜為門生送銀一千六百兩又繼椿家人偷運贓私回家在途被盜打刦并任用書辦在外招搖納賄各欵臣訪聞既確隨一并入疏題㕘一面将繼椿拏禁差員查封任所竝密移山西撫臣嚴查原籍家資務将所得贓私逐一追出不使稍有隠漏以為負恩者戒臣䝉皇恩簡畀重任地方有此婪贓壊法之員不能及早覺察此實臣之愚昧無才仰荷聖恩原宥不即嚴加譴責命臣訪察㕘處實不勝愧赧悚懼之至謹奏如此方是地方遼濶屬員衆多焉得事事早覺人人預察但一有覺察即不姑容夫何過之有同日又奏為奏眀事竊據署撫臣彭維新查出江都縣知縣陸朝璣住居蘓州地方先曾充布政司衙門書辦改冒浙江籍貫由監生捐納補授江都縣知縣未行呈首咨送題㕘㑹稾到臣查官員例應廽避本省况先充本省上司書辦乃竝不呈首理應題㕘但該員居官幹練辦事眀敏留心察訪實理繁治劇之才署撫臣彭維新疏内并㕘其用刑未免過重民有怨言實屬未確臣思人才難得正在繕摺具奏間適浙江督臣李衛過淮論及該員居官亦云此當公同奏聞臣謹據實具奏伏祈皇上睿鑒施行謹奏冒籍行已不端不首更屬藐法縱有理繁治劇之才亦才勝於徳之小人耳何足深惜前於范時繹奏聞摺内業經眀白批示汝試詢之凡遇此等事件祗應依律處斷以申眀功令為是奚容猶豫若稍存違道干譽左袒屬員之見被衆窺破目下雖邀稱頌虚聲将来必至諸務廢弛斯一節乃為督撫者所宜切戒雍正七年十二月初四日蘓州巡撫協理河工事務臣尹繼善謹奏為奏眀事竊照江省徵收漕糧積弊多端上厪聖懐特頒諭㫖聞命之下殊深惶悚臣日夜圗維留心體訪凡民間完漕耗費州縣辦漕需用以及旂丁輓運用度細細察核務期與漕務官民均有禆益方可永逺行之無弊查鄂爾泰先任蘓州布政司時曾有每石收漕費六分之議内一半幫給旗丁每船銀二十兩一半給州縣為辦漕之用臣通盤合計在從前旗丁抵通過淮浮費甚多原不敷用今䝉聖眀已将旂丁一切浮費禁革伊等原有行月錢糧又加額編五米十銀每船再幫銀二十兩儘足用度旗丁既有定規州縣不被勒索有此三分一石亦可辦公即民間完納漕糧每石止令交費六分一切耗米斛面盡行禁革亦不為苦臣在清江時即經擬定規條聞署督撫諸臣因先奉諭㫖發鈔奏摺内開有江省收漕每石應收漕費三分官吏多收六七分不等之語欲避此名色署督臣范時繹行司議詳每石止許收費三分署撫臣彭維新飭令每米一石准其折扣九斗臣查九扣收漕每石已加米一斗一升怕存六七分之名隂行八九分之實小民豈能受恵此議斷不可行至若每石收費三分以一半給旂丁每船止得銀十兩以一半給州縣每石止一分五釐一切鋪墊人工脚價實不敷用夫處事必求其當立法務在可遵若矯枉過正雖小民一時感頌而公事難行将来勢必復增况奏摺所稱既收費六七分又復加米兩項合計實在浮多如米糧不許升合加增僅收漕費六分原屬官民兩便臣隨咨㑹署督撫及漕臣商定畫一收費六分通飭遵行再向来隨漕收取餘米最滋弊混易於侵冒其常平社倉捐榖一項原係勸民樂輸而近来竟隨漕勒收亦一併飭禁至旗丁既經定議每船幫銀二十兩自不許仍向各州縣勒索而州縣又向有呈送各衙門徵漕陋規近年以来雖院司道府衙門已俱不收取其監兌押運等官以及吏役催漕人等仍有浮費若聽其因循則弊不除根州縣仍得藉口亦一并條分縷晰出示嚴禁今嵗法令之初猶恐官吏奉行不力臣督率司道各官俱時時加意處處留心除玩法之興化縣等已經嚴㕘鎻拏各處現在宻行睿慮理合奏眀伏祈皇上聖鑒謹奏辦漕一事籌計精詳識見確切洵屬允當之至即照所議定為成憲永久遵行可也同日又奏為奏聞事竊臣回任後接到浙江督臣李衛来咨内稱沿海等處有自稱侠士豪傑學習拳棒造作符咒隂謀不軌者移臣一體協拏臣隨差幹員将咨開各犯陸續密拏獲觧於所獲無錫之范龍友處搜出書籍係道家行功畫符之法繼復節次准咨續拏各犯有係蘓城踹匠拜把結盟之二十餘人當即拏獲竝搜出結拜盟單又李衛令臬司馬世烆拏獲賣卜并講坐功之張云如於伊家搜出徃来拜帖姓名内紳衿鹽商旗民不等共五十餘人移督臣范時繹就近嚴查督臣已将揚州商總程兆庚并原任翰林唐建中等提拏臣現在宻加根究将未獲各犯設法查拏一面宻諭地方各官善為奉行勿使輕舉妄動惶惑人心事闗地方理合奏聞除搜出道書已經浙省差員帶去謹将追出踹匠盟單抄呈聖覽謹奏凡李衛移咨查緝人犯務湏照數捕觧若致一名漏網汝等責有攸歸慎勿泛泛視之也録呈盟單之意朕殊未觧雍正八年二月初三日蘓州巡撫協理河工事務臣尹繼善謹奏為覆奏事竊據原任蘓州巡撫陳時夏㕘奏泰州知州褚世暄挑河冒帑誤工郎中程夢瑛捏報驗收范時繹鄂禮不肯㑹稿題㕘奉㫖将奏摺竝議覆摺片令臣秉公查奏交發到臣伏查原任泰州知州褚世暄承挑中竈起至王家港海河工程三千一百丈於去年六月報完嗣據呈稱工近海口連日大雨油沙泛漫間有淋卸淤淺詳請查驗等情鄂禮陳時夏赴工查驗河身浮沙淤淺兩岸坍卸不能如式之處逐段丈量飭令該州撈浚修整隨據監督河務郎中程夢瑛具詳驗眀如式一律深通等語陳時夏謂褚世暄冒帑誤工程夢瑛代為揑報欲㑹稿題㕘鄂禮以海河浮沙易淤其不合式處已責令修整况錢糧竝未領足程夢瑛既有一律深通之詳尚未親徃覆勘不便即行㕘奏及與范時繹㑹稿范時繹以該州曾經報眀油沙泛漫雨水淋卸已令如式修浚與冒帑者異行令淮揚道確查淮揚道查眀兩岸原係雨水淋卸河身已重浚深通俱合原估報眀范時繹因遂咨覆陳時夏免㕘此事厯厯有案可稽有工可驗范時繹鄂禮不肯㑹稿竝無徇縱之情弊也其所奏褚世暄扣尅工銀髙擡錢價及承挑各員土方不發足九分之處臣查挑土工價定例每方銀九分開工之後遇有隂雨重復戽水或有淤卸復行修濬或人夫透領逃走另行雇覔俱在九分之内凡河工人員即廉潔自好者亦必不能於挑土夫工發足九分不得以此槩指承挑各官為侵蝕但細加查訪褚世暄任用幕友家人作弊勒掯工價侵扣戥頭折米給夫髙擡價值實有扣尅帑銀苦累夫役之弊臣已行令揚州府将伊家人幕友等嚴拏究訊俟審眀之後将不行查出掲報之程夢瑛一併題㕘嚴審縁奉交臣密查事理實無情弊之事臣不敢附㑹確有作弊之處臣不敢欺隠理合将前後情由據實奏聞謹奏覽奏已悉程夢瑛前據范時繹破格保留此外居心行事何如果係可用之員否假若謬誤處少勤幹處多則當功過相抵權宜處置豈因其稍失檢點而遂棄一能吏乎雍正八年三月二十二日蘓州巡撫協理河工事務臣尹繼善謹奏為聖治漸摩民風敦厚據實奏聞事竊惟民俗闗乎治化聖世必有仁風我皇上建極綏猷厚生正徳煌煌彛訓誥誡多方凡所以正人心善風俗者固已無微之不周而無逺之弗屆邇年以来萬邦協和四方從欲山陬海澨咸講讓而興廉村婦耕夫俱向風而慕義即江南民俗素尚浮澆鮮敦實行今則沐浴天恩靡不淪肌浃髓薰陶聖教亦知革薄從忠有能睦族好義如蘓州府吴縣候選知州范瑤者係宋儒范仲淹後裔也仲淹當日曾置義田贍養宗族海内皆知范氏義荘子孫至今世守近因支派繁衍給用不敷范瑶家非素封所有之田不過一千餘畆乃能自甘澹泊捐田千畝歸入義荘收租贍族據范姓合族公懇飭縣推收存案具呈前来臣伏讀聖諭十六條有曰敦宗族以昭雍睦御製廣訓有曰置義田以贍貧乏去年又特頒諭㫖教富户以睦婣任䘏周濟貧乏之道而范瑶仰遵聖訓逺紹前徽以萬金之良田為合族之公産此實由我皇上至徳感孚聲教洋溢是以化行俗美羣黎徧徳三吳士庶莫不聞風興起詠歌盛世傳為美談臣目撃其事不敢壅於上聞應否具題恭請旌奨以示鼓勵未敢擅便謹奏地方上偶一善事何得遽云化行俗美羣黎徧徳題請旌奬鼓勵義風則可但不須如許張大虛詞耳同日又奏為奏聞事竊照私鑄錢文屢奉諭㫖嚴禁臣因江省用錢有雜錢攙和恐地方潛匿私鑄嚴行稽察臣復宻加察訪聞有吳江縣民周寧書私鑄販賣一面遣員搜查即獲私錢并私鑄器私鑄棍徒均經拘獲其蘓州鎮江淮安各處販賣之人亦分别查拏逐加追究俟訊眀分别私鑄年月将失察地方各官題㕘外再審訊各犯據供伊等所鑄俗名鉛錢本地不用俱係江北客人販去而江北客人攜帶南来則為沙板錢係鳯陽府毫州竝山東地方所鑄等語臣亦現在究訊住址差人訪拏并咨㑹山東安徽撫臣嚴加查緝一體嚴禁查雍正四年二月内定例通行直𨽻各省多張告示令經紀舖户人等将私錢赴官首眀量給官價使私錢不行則私鑄自息立法誠為盡善因雜錢攙用日久地方官不能善為開導實力稽查各處尚在公行今各省現開鼓鑄若不設法查禁制錢不得流通似應再行定限曉諭首報凡有私錢盡行交官自限滿之後不許攙用一文違者照例治罪庶私錢不得攙用私鑄方可止息但此必得各省畫一遵行方能共收實效伏候皇上睿鑒謹奏據奏私錢如不設法查禁制錢不得流通等語此論非也葢私錢之未净盡縁制錢不敷所用故耳直省莫不皆然今若不揣其本而齊其末一味峻法䋲治是使小民無錢可用矣故曰私錢之禁嚴與寛湏視制錢之敷與不敷至制錢敷用時然後齊之以法則私鑄自當止息否則徒滋紛擾究屬無益亰師從前經收小錢晉撫伊都立亦曾請禁雜錢旋即中止而反致錢價大昻斯即眀驗兹令各省收黄銅開鼓鑄之意正為此也所奏必待錢價大平方可舉行目前不宜急遽况府縣守令現俱清查積欠亦難分身兼顧為今之計但當禁止盗銷私鑄各省督撫若果實力奉行不數年後朕可保錢法必能畫一也同日又奏為奏眀事竊臣先於署撫時因查吳存禮虧空銀四十餘萬兩開報産業無㡬将伊在蘓家人提究止據開出借欠餽送等項臣以吴存禮歴任貪婪必有隠匿財産當即具摺請㫖将吳存禮長子甘肅遊撃吴永年觧蘓究審又准部将吴希聖等押觧来南臣於去年十一月回任此案尚未審定隨将吴永年吴希聖等嚴加審追據伊等供出在亰并江南髙郵吳縣等處地畆房屋又各名下首飾什物人口等項以及吴永年吴希聖自行餽送各人員銀物臣再行嚴究此外有無隠匿資産将餽送各項内含混不眀竝實在無著者逐一核正分晰具題再吴永年等在監臣令人不時察其動静以便根究兹於監所檢出去年来時於途中寄徃陕西家信底稿内云凉荘道殷邦翰永昌縣楊汝楩将我家中物件留下應允幫助又云上亰騾轎駝子要少所有物件就在彼處變賣免致招搖家人留㡬家住陕等語查虧員子孫奉㫖提審殷邦翰等何得将所有家資通同隠匿臣現在密咨甘肅撫臣查究寄頓何物陕省留住家人若提督柏之蕃差家人来蘓四次送吳希聖等銀三百兩地方大吏於監禁重犯著人来徃送銀甚屬不合相應一并奏聞謹奏覽栢之蕃餽送銀兩之奏朕不覺愕然以地方大吏如此周旋監禁重犯是何情由所以用人苦衷惟上天鑒之耳再如范時繹馬世烆近日心行豈不出人意外乎范時繹姑置不論馬世烆䝉朕赦過棄瑕之恩不思致身圗報而乃為私徇匪徒之舉世情難量有如是夫汝等切勿以少年意氣過信於人湏歩歩留心體察方能辨别姦良若稍渉疎畧未有不貽後悔者固不可以小人之心度君子亦不可以君子之心待小人誌之雍正八年四月二十四日蘓州巡撫協理河工事務臣尹繼善謹奏為據實陳眀事竊據御史鄒光濤條奏江南漕糧一事奉硃批鄒光濤如此條奏汝可查議奏聞應整剔者加意辦理禁革如所陳荒謬不實眀白回奏以聞欽此将原摺交發到臣捧讀之下不勝惶悚伏查江南徵收漕糧從前積弊多端州縣加二加三貪取無厭旗丁毎船五六十兩需索不休且上下衙門層層俱有使費臣去年将陋規痛革每石定收漕費六分以三分給州縣以三分幫旗丁收米平斛响攩不許多取升合各屬兢兢守法糧户咸感皇恩完漕最速開兑獨早此衆耳衆目共見共聞乃鄒光濤以此六分之費加以科𣲖之名臣實不勝駭異竊思各省糧米之有耗費猶之錢糧之有耗銀州縣藉以為修倉鋪墊人工脚價之資旗丁賴以為增補棚索添雇水手等項之用此公事之所必需而勢不容已者今光濤以為科派勢必粒米毫銀不取於民使州縣不能辦漕旗丁不能挽運公事坐誤如何可行且謂耗米已經編入正項此言更屬不經其所謂耗米者必指五米也查五米隨漕徵收隨正報銷由来已久此係支給旗丁之欵竝非歸入正米之耗光濤竝不細查而輙加以歸耗入正之名其意何居至於漕糧定例十月開徵嵗底完兌臣去年十一月初九囬任各屬多未開倉星夜催督糧户衆多擁集交納即使隨到隨收守候勢所不免乃謂揀選米色有累於民殊不知皇恩浩蕩已准紅白兼收而天庾正供亦湏米色乾潔若只圗百姓感譽不論米之好醜令一槩全收不但難以受兌亦且縱長刁風鄒光濤以為挑選米色即是累民即是作弊此偏私之見不近情理之論也鄒光濤係臣同年去嵗入都路過清江再三求見問以地方之事則大不足於署武進縣王喬林臣素知王喬林居官係州縣中之出衆者問其有何劣跡則止云居心太刻執法太嚴語言之間深怨其相待寡情止送盤費二兩臣知其挟私誣陷以言拒之頗有愧色臨別又求臣多贈以有同年之誼些微資助拂意而去此人之行徑如此臣非欲掩已之非攻人之短我皇上眀竝日月硃批荒謬不實早已洞鑒其心臣之一舉一動難逃至聖之照臨自亦無庸置辨惟有愈加儆惕愈加黽勉以求仰報髙深於萬一耳謹奏朕向曾有㫖地方大吏凡遇親友請託皆直據其事密以奏聞諸臣果肯實力遵從惡習可以永杜如此誡諭不啻再三日前有行之者朕俱顯示奨勵汝豈未之聞耶試思置辯於今日何如奏聞於當時經此一番仍不愧赧銘座書紳以為終身之戒至受累時追憶朕諭但祇自怨自艾慎毋尤人為也雍正八年六月初三日蘓州巡撫協理河工事務臣尹繼善謹奏為奏聞事查得崇眀縣地方孤懸海外民俗強悍動輒生事有鄊村佃戶以業主催討麥租緊急聚集喧譁強勒閉市臣思民間種地完租乃分内之事豈容刁佃頑抗即或麥秋稍薄亦應求業主情讓何得聚集不法臣於揚州舟次聞信其為首之人已訪知名姓一面委員飛查一面檄飭蘓巡道親赴該縣地方查拏嚴究聞該縣知縣祖秉鎮沽名邀譽竝不約束查拏且有即抄搶富户我知縣亦不管之語眀係有心故縦慫恿生事近訪得該員居官操守亦甚平常現在一并確查似此營私廢法縱惡長刁之員實堪痛恨俟查復到日當即具疏嚴㕘拏究又佃户傳帖内有惡户施大受将美女金帛聞謹奏確查起釁之由如該令果有故縱實據具疏嚴㕘可也雍正八年十一月二十四日蘓州巡撫協理河工事務臣尹繼善謹奏為恭報瑞雪事竊照淮徐一帶民食全資二麥今秋收成歉薄惟賴春花被水地方䝉皇恩浩蕩蠲賑宏施比户寧居羣歌樂利臣令州縣勤宣聖徳勸諭各鄊農民及時種麥正在播種齊全於十月二十一日徐州地方得雪五六寸邳州宿遷海州沭陽等處得雪三四寸淮安清河得雪二三寸再江寧鎮江等處亦得雪一二寸似此瑞雪應時民生攸賴皆我皇上保赤心殷至誠感召之所致理合繕摺恭報謹奏微雪沾潤且又不過江北數處何湏大言矜肆嗣後似此虛飾之文更勿復爾誌之同日又奏為奏眀事竊惟各省虧空積案纍纍䝉聖恩浩蕩格外矜全凡雍正三年以前之事分别情罪酌量寛免現在各省陸續造册送部查核臣思虧空册籍必湏徹底清晰而已完未完最易乗機朦混其最易朦混之處不在銀兩而在産業葢入官産業有已估而達部者有估而未達部者有雖經報出尚未估定者有已經開報因未勘估尚係本人管業者有本省虧空等案究出外省産業移咨尚未確覆者有外省虧空等案咨查原籍查眀産業尚未知㑹者并有虧空等案開出借欠而借欠之人復将産業抵報者各案産業種種不同雖前准部咨令将已完之數不許隠漏却未指眀房産而無知之人即疑所謂巳完專指銀數未免妄生希冀嗣奉諭㫖恩免各案部文内雖聲眀已經估報産業催令速變而人即以為未估産業似不在應變之列又有部文内但渾言某案寛免未經聲説産業而人混以為産業均在邀免之内議論參差以致地方官意見不定紛紛請示臣思我皇上如天之仁有加無巳為臣子者自當事事仰體聖心而帑項所闗亦宜加意慎重臣逐案細查除本人未交銀兩未報産業竝開抵借欠未遽交出銀兩報出産業者俱作未完外若田房産業已經報部者固作速變價未經報部者亦入册咨眀已經估定者固即扣清完數未經估定者見催確估歸除其未准部文但准各省咨追者亦将查出産業咨眀各省以免岐誤本人開出借欠而借欠之人據報産業抵補者仍在借欠項下登眀以免遺漏總期無隠無欺無枉無縱臣知識愚昧通身籌畫徹底推詳知其中頭緒紛繁倘心思稍有未到奉行稍有不善或将未經估定達部之項退還本人或将外省咨追案内已有查出産業因未咨眀外省無可對證從寛沉閣屬員乗機朦混書吏借端撞騙所係匪淺事闗各省臣既有所見曷敢不詳悉陳奏仰懇聖眀裁酌敕諭該部行文督撫凡虧空咨追贓罰各案已完未完查核確實該部分晰詳眀具奏将應免不應免之項眀白知照畫一遵行則於國帑民生兩有禆益矣謹奏此奏可謂情理兼得尹繼善不避嫌怨實心任事深為可嘉但若照依所奏固云杜絶朦混之弊而奉行不善則開官吏留難之端既不令姦貪者於朕恩免之外得以僥倖遺漏又不致不肖官吏借詞需索髙下其手方為盡善該部悉心斟酌詳議具奏雍正八年十二月初八日蘓州巡撫協理河工事務臣尹繼善謹奏為奏聞事竊照邳徐淮海一帶䝉皇恩浩蕩發帑賑䘏兩月口糧已於十一月賑完又䝉皇恩軫念寒冬加賑一月現在倉糧撥運齊全臣㑹同侍郎臣馬爾泰等定於十二月十六日開賑已多派妥員協同州縣料理俾窮黎歳底新正得有接濟從前被水之初無業小民一時倉皇間有外出者後皆陸續歸里雖賑銀已竣臣酌撥公銀給發州縣現令查眀照數補賑加賑米糧之時亦一體入册給領使得共沐皇仁間有外省之民来至江省覔食者時屆深冬寒冷若一時遣送回籍長途䟦渉實滋苦累臣同馬爾泰彭維新悉心商酌飭發公銀令各州縣暫行撫恤聽其謀食俟天氣和暖再酌量送回目下淮揚米糧每石九錢一兩不等徐邳一帶小米一兩上下糧價不甚昻貴臣已撥定揚州鹽義倉米榖令州縣領運俟賑濟之後繼以平糶源源資助務期緩急得宜民生有益謹奏料理甚屬允協至於外省流移所謂率土之濵莫非吾民自當一體賑恤何分彼此惟飭諭屬員實力奉行為要耳雍正九年六月初六日蘇州巡撫協理河工事務臣尹繼善謹奏為敬陳清查情形仰祈睿鑒事竊江南積欠奉㫖清查訓諭諄切務令官侵役蝕民欠徹底分晰以清積弊以除民累又䝉恩施格外准其自首臣等謹遵辦理多方開導其吏役之感恩畏法悔悟自首者甚多而不肖之徒又徃徃詭計百出或本係侵蝕而誘哄糧户認為民欠或已經自首而希圗翻案揑造浮言又或掩藏實在侵蝕而反将民欠混首搪塞以淆人之耳目查辦之員少為寛鬆未免被其朦蔽一加嚴切又至過當失中二年以来自首查出之數已至四百餘萬其情弊確鑿者原無可更易而其中或民間記憶不清或吏胥心懐畏惧印協各員不能詳細剖晰虚衷體察間有以民欠混入侵蝕者臣思除弊之道不可不盡亦不可不實不盡則姦頑得以漏網不實則良民竝受苦累臣悉心採訪因與總理諸臣再三商酌於二月内通飭分查大員督率各屬細加分别除侵蝕有憑有據有與有受質對眀白者不許任其翻騰狡展外或其中稍有游移纒混之處務必推敲確實秉公改正不得揑飾朦混三四月間據各分查禀報遵循核改惟常州所屬頭緒更繁分查馮㬌夏盡心竭力不辭勞怨而錯認之處未免膠執臣秋審後在常親身料理分派人員抽圗查對喚圗書糧户質訊擇其侵蝕項下之毫無確據者俱一一改正使經承圗差之實在侵蝕不得混淆而於清查案内生事嚇詐之蠧書已訪確拏究現今造册之時各處俱在磨對更正不敢怠忽草率此係臣等應凖情度理料理之事未敢煩凟聖聰今䝉恩㫖教訓務令分别確當不可使民欠混為侵蝕皆由加核實務期無枉無縱約於七八月内可以完竣臣謹将遵㫖辦理縁由繕摺奏聞謹奏朕實代汝等愧之但人心之不同猶如其面汝等具何心思具何面目朕則未之知也雍正九年八月二十一日署理江南總督蘓州巡撫臣尹繼善謹奏為恭謝天恩事竊臣質本庸愚事多未諳荷䝉聖主深恩畀以江蘓巡撫重任涓埃未效正切悚惶驚聞寵命令臣署理總督印務益深凜惕伏思總督統轄三省調度文武經理疆隅訓練士卒責任愈重仔肩愈難愚昧如臣自分何以勝任惟有俯竭駑鈍自矢愚誠心力所能到者不留有餘即心力所難周者亦黽勉學習斷不敢存絲毫怠忽茍且之念有負養育造就之深仁八月初四日署撫臣王國棟到任臣将辦理事宜地方情形屬員賢否一一詳悉告知於八月初八日自蘇起行至𤓰洲查勘江工一面約河臣嵇曾筠同至工所面籌保護之法竝商酌駱馬湖髙堰各處工程再丹徒丹陽清查将竣臣親行查核尚有辦理未妥之處恐分查道朱鴻緒回護前非又令郎中張勤望帶同委員料理更正今於十五日到江寧任所江蘇之事係臣經手不敢因署理總督即欲總其大綱稍生推卸凡事無大小自當與署撫臣同心協力料理其上江江西臣初到任雖未知其詳但訪查大槩湏整頓之事尚多自當悉心籌畫次第辦理叩懇聖恩指示訓誨俾臣祗遵奉行地方幸甚微臣幸甚所有感激下忱理合恭摺奏謝謹奏能矢志以自警䇿固善凡百一無欺隠尤所當務葢蹇蹇匪躬之義言不為身謀也可不朂諸同日又奏為請換老邁之總兵以重地方事竊查整飭營伍訓練士卒甚為緊要臣䝉皇上隆恩身膺三省重寄一切戎政亟應竭力整頓而相助為理全賴總兵一官現在崇眀總兵李燦為人勤慎辦事用心頗能督率料理狼山總兵王安國為人雖甚朴實但年已七旬精力不及諸事未免懈弛昨来蘓相見臣因其老於營制與之詳細考究不但毫無籌畫竝其所管地方多不記憶屬員賢否不能周知海疆闗係甚重狼山所轄又甚遼濶非老邁之人所能勝任臣不敢因循謹據實奏聞仰懇聖恩另簡賢能之員庶於地方有益謹奏所奏是朕一見王安國知其為庸愚無識之人及考其厯任以来竝未見有錯誤處是以姑留至今此缺甚難其選候朕斟酌有㫖雍正九年十一月二十九日署理江南總督蘓州巡撫臣尹繼善謹奏為奏眀事竊惟江蘇漕務䝉我皇上諄諄教誨臣實力遵循悉心籌畫邇年以来官吏弁丁方知奉公守法新糧道甘汝来現因給假在籍未得赴任馮㬌夏清查雖竣糧務業已經手是以尚未赴江寧布政司之任現在藩篆係驛道陳𢎞謀署理為人眀白實心任事於吏治頗能整頓上江漕務雖經前撫臣魏廷珍酌定每石加一收耗但積玩成習弊端甚多臣現與撫臣嚴加察訪徹底清釐不肖吏胥始稍知有畏惧署理江安糧道王恕奉㫖令臣等時加察看據實奏聞臣留心體察王恕操守謹飭辦事細心但才情稍覺遲緩臣隨事䇿勵勉其不逮尚可供職無誤至於文武屬員臣凛遵聖訓處處留心體察時時諄切勸勉以期澄清吏治但江西相隔較逺向来惟武職調考文職俱不赴驗雖居官之賢否固可留心考查但總督有統轄之責而屬員從不識面惟憑文檄徃来終覺間隔臣愚以為一江上下不甚相逺除州縣繁多應免調驗外其知府甚屬緊要自當輪流赴省驗㸔一次既可詳問事宜亦可隨事開導庶於察吏有益伏祈聖恩訓諭欽遵謹奏時有忙閒地有逺近調驗之舉在汝酌量為之至於署事之員雖去暫攝亦湏才當其任方可硃批諭㫖巻二百二十三中欽定四庫全書硃批諭㫖巻二百二十三下硃批尹繼善奏摺雍正十年正月二十八日署理江南總督蘇州巡撫臣尹繼善謹奏為恭謝天恩事竊臣才識庸愚荷䝉聖主深恩畀以封疆重任殷殷期望事事提撕勉臣以所未能宥臣之所不建成全教養髙厚難名自愧巡撫三年毫無寸長報稱署理督篆以來雖竭力殚心倍加奮勉而地廣事繁不能勝任寤寐之中悚惶無地兹荷寵命協辦江寧将軍復奉恩綸總理兩淮鹽政臣聞命之下感懼彌深伏思江寧八旗從前廢弛自鄂密達辦理二年已經漸次整頓若一經放鬆則廢弛甚事商酌盡心協理不敢一毫諉卸上厪聖懐鹽政所闗甚重臣雖未諳事機敢不加意整頓惟有仰遵訓諭悉心禁弊設法緝私凡有應行籌畫之處務與髙斌和衷共濟妥協料理以無負我皇上逾格加恩陶成委任之至意所有感激愚忱謹具摺恭謝天恩謹奏竭力勉之但確秉公忠告天而行諸務無不就緒之理根本既固枝葉自必敷榮也馬世龍何如可勝此任否同日又奏為備陳長江情形酌籌水師營制仰懇䝉聖主深恩署理總督印務懼職任之難盡恨營伍之廢弛數月以来竭力整頓設法稽察務冀技藝純熟汛防嚴密以無負我及有不敢不據實陳奏者亰口為江淮鎖鑰南北咽喉将軍親標兩營駐劄府城俱係陸路江隂副将左右兩營雖係水師止守沿江汛地所有亰口沙船五十六隻艍犁船三十二隻配答八旗官兵乗坐操演實為江省水師之重鎮今查兩項戰船共水兵一千四百餘名却為将軍親標陸路兩營管轄陸路将弁既不熟諳水性且船隻水手駐劄之髙子港去鎮城數十里不能兼顧除春秋兩操而外俱各㳺手好閒不但無人訓練亦且並無器械徒有兵名究無實濟此京口水師不妥之情形也江寧為省㑹重地襟帶長江居京口狼山上㳺從前並無水師雍正五年欽奉諭㫖令江寧駐防滿洲官兵學習水師部議於八旗滿洲䝉古馬兵内挑選一千名派協領四員佐領防禦驍騎校各十二員撥京口将軍標沙船二十隻共水手三百餘名令江寧将軍督率每逢春秋二季操演八旗官兵實為有益但教習水兵必得設有専員當日部議止令於鎮江千把内揀選四員遇水操之時令其前徃江寧分配旗員教習至止操之時仍回原任無論暫時派撥之員並無責成難收實效即鎮江千把亦不能教習水師而佐領等官不能熟諳旗下事多不能在城外彈壓雖輪班照㸔並無専責至今三百餘兵不但未置器械未習技藝且家眷仍在鎮江髙子港春秋臨時應差其餘之日多半来徃京口而經管旂員除捕盗舵工之外尚皆不能熟識一旦需用官兵俱不聨合人船總不湊手此江寧水師不妥之情形也狼山為長江尾閭大海門户總兵親標三營有戰船二十二隻定例春秋出洋操練江汛每月㑹哨邇年以来狼山營伍疎懈春秋不過駕沙唬船數隻每船配兵數名並不出至大洋止於江口来徃㡬次草率塞責水面不能熟嫻焉望衝鋒破浪至於江汛㑹哨虚應故事止以空文具報㑹與不㑹漫無稽查更可異者趕繒大船原係出洋利艘而竟泊於狼山港内髙閣沙灘從不出洋操練廢棄戰船虛糜糧餉此狼山水師廢弛之情形也現在狼山營務臣已面交署總兵王廷梅令其逐事詳禀徹底清查将船隻之安放不妥者擇地位置水兵之漫無紀律者教以技藝並諭以㑹哨之法令其實力操演臣復派員前徃監查務必力挽積習實心整理外其亰口将軍標水兵一千餘名若不另行籌畫難收實用請将現住髙子港水兵一千四百餘名另設水師都司一員千把各一員駐劄髙子港専管船隻督率水師並歸江隂水師副将兼轄除春秋與旂兵合操外閒暇之時即教習籐牌挑刀各種技藝則駕船之水手即精練之勁兵操船則馳縱江洋停操竝可資防禦庶無用者咸成有用矣江寧将軍船隻俱在江邉停泊其水兵三百餘名因無棲身之所前将軍鄂密達曾經商酌臣已撥與隙地似宜酌葢營房将水手家眷搬至江寜以免數百里徃返奔走請另設水師守備一員把總二員専司其事仍歸将軍統轄其素日管理水師旗員仍令兼管除配八旗官兵按期操演外平時責成守備看管船隻教習兵丁技藝與西岸浦口營相為對待再添吧唬船四隻以便巡緝則城外江邉又有營頭防守實為嚴密抑臣更有請者江寧京口旗下官兵雖一年兩次操演而此外總不駕船終難熟諳以後京口江寧應每月各於佐領協領等官内派出二員輪駕船隻酌帶兵丁巡查江面其狼山鎮標除専管海汛之右營官弁每月駕船巡視海面外中左兩營亦宜每月輪派将備駕沙唬船二隻於江面游巡如此則水手得以熟習旗兵又可勤練而長江數千里形勢連絡逺近聲援庶於武備少有禆益矣為此據實陳奏伏祈聖主訓誨遵行謹奏此奏可嘉之至欣悦覽焉将所議機宜與該将軍等悉心籌畫務期盡改舊習整理妥協應奏請者具疏題請勉之其間設有立異掣肘不肯實力奉行之人宻摺奏聞朕自另有處置同日又奏為奏聞事去年十二月二十日常州府知府魏化麟因公赴蘇二十一日晚府堂上忽有皮箱一隻隨經營縣各官公同啟視内有圎木戳六箇上刻花紋又方木戳五箇俱無字跡又方木板一塊上刻人首龍身中刻辛字又一塊四角刻十兩銀子四字中刻亥字又紅手本一箇上書中天淨梵王頒行鈔格鑿定辛亥十兩銀子敕命御弟同受掛印兼領鑲旗排日輪管印鈔令御弟十五同伴看印半月接駕以刻壬子此敕等語甚屬誕妄宻飭知府遊擊訪拏嚴究随獲道士趙秉中據該府訊供因昔年請仙有云號作中天淨梵王筆端常吐玉毫光所以自稱中天淨梵王圎木戳係中天淨梵王印方木戳係侯印木板刷印即代銀用并稱字帖内同受二字下有排日輪管四字兩句内暗装管同受三字先年曾被管同受出首伊銅銀一事致受枷責欲借此報復故将此送至府堂等語及𫝊管同受到案質訊雖曾有出首假銀之事而道士語言怪誕非盡實情再訊據伊徒吳康生供稱有江都邵伯鎮道士劉譽山丹陽東嶽廟道士周丕文還俗道士曹子斌俱與趙秉中相好周丕文曾送一本竒門遁甲與趙秉中曹子斌平日同趙秉中密商云蘇州沒有人那些鹽販子漢仗倒好等語又於趙秉中處搜出手本自稱係宋朝之後肆行狂吠悖逆之至臣思道士趙秉中雖故作瘋癲而膽敢狂肆妖言惑衆必有姦徒黨羽助惡為匪自宜直窮到底盡除根株臣已差員飛徃親提該犯細心究審将供出黨類一並嚴拏外合先繕摺奏聞謹奏事非偶然豈無情故凡值此等案件務湏窮究根底毋得稍有疎畧若信其瘋癲遂朦朧縱捨以為省事之舉則大誤矣雍正十年閏五月十五日署理江南總督蘇州巡撫臣尹繼善謹奏為請留効力人員事竊照江省庶務殷繁差遣委用在在需員現在辦理版圗順荘清釐口岸私鹽積弊幅員遼濶頭緒繁多必才具敏練熟諳風土之員方為有用臣仰體我皇上愛惜人才至意留心體察有原任上元縣知縣唐際運因審理竊案未協經前署督臣題㕘革職原任徽州府通判李鍠因署合肥縣任内失察户書侵蝕部議革職原任鎮洋縣知縣陶士偰因帶徵錢糧未完部議降調先經送部引見奉㫖著照所降之級調用此數員者為人謹慎才具可用皆臣素知且均係因公罣誤任内並無大過又有原任河標右營遊擊白舉因公出境遲報盜案經前河臣題㕘革職該員弓馬嫻熟辦事敏幹若委緝捕巡鹽甚為得力可否留於江省差遣効力酌量委用伏候諭㫖将唐際運李鍠白舉送部引見欽定臣因地方公務需員冒昧具奏伏祈睿鑒謹奏唐際運等准照該督所請留於江省酌量委用免其送部引見該部知道雍正十年九月初七日署理江南總督蘇州巡撫臣尹繼善謹奏竊照安徽巡撫臣程元章奉㫖署理浙江總督印務於九月初三日送印到臣暫行接受署理署撫臣徐本尚無到任日期其一切事務現在日夜兼辦上下兩江學政印務䝉恩交臣暫署凡録遺補考之事已經辦理清楚俟兩學臣科場事畢即行交印抑臣更有請者江南為人才之藪文風甚盛但邇来好逞才氣未免趨於華靡近奉諭㫖訓導務令文體雅正此誠崇實去浮表正風俗之要道而司其事者全在學臣江蘓學臣張廷璐為人謹厚鑒别公眀處處人情帖服今嵗十月例應報滿仰懇聖恩再行留任定能仰遵訓誨㧞取實學轉移文風於士子甚有禆益為此不揣冒昧具摺奏聞謹奏張廷璐留任江蘇朕原有此意未及降諭耳上江學臣王蘭生聲名如何朕亦欲再留一任雍正十一年六月二十九日雲貴廣西總督臣尹繼善謹奏為恭報大㨗事竊照元江臨安一帶賊勢猖獗臣到任後查得軍前官兵單薄隨星飛調派委鶴麗鎮總兵官楊國華帯領前徃元江總統與臨元鎮總兵官董芳協力勦除適逆賊分攻元江瓦渣兩處幸大兵一到立時奔逃臣復嚴行臨元兩路總統分遣将備竭力追勦務在探確賊蹤擒拏賊首不許止圗趕散以貽後患嗣因分路追擒賊情窘廹欲侵䝉自内地而佈置甚嚴不能飛越欲竄入普思茶山而江邉要隘防範更密旋據禀報逆賊多人藏聚於元屬之腊縱地方恃險抗拒臣即飛催兩路官兵尅期進勦於五月十八日直抵賊巢合力圍攻半月奈賊寨懸崖絶壁栅固壕深鎗礮標弩滚木擂石無一不備官兵自下而上用力甚難傷損兵練不能遽破臣以行軍之道巧力兼施賊寨雖堅或宜黑夜火攻或用夷人作線内應自應多方設法若曠日持久軍力疲憊勢必致賊逺颺隨遣標員執持令箭徃軍營守催如有退縮不前者即以軍法從事兹於六月初九日總兵董芳用附近夷人夜間潛入賊寨舉火各路官兵土練奮勇衝入乗勢斬殺共斬逆賊首級一百有餘生擒六十九名奪獲從前所失鎗礮並刀弩器械甚多查點是日損傷兵練共十餘人所斬首級一一令賊犯識認有腊縱賊首波舖波蘇過布渣罵賊首比戛米克賊首又𣺌俱已被殺腊縱賊穴始克蕩平臣甫經到任諸事未諳正值賊勢猖狂非不知瘴烟暑雨天時地利均處其難但希圗省事必至蔓延茍且目前終為大患是以日夜經營不遑寝食與撫提諸臣悉心商酌和衷共濟仰賴皇上天威攻克賊巢逺近兇頑無不聞風儆懼元臨内地已皆處處安堵但逆巢雖已勦滅餘黨尚宜清除乗此兵威大振臣飛飭總兵楊國華清理元江之永豐里渣罵一帶總兵董芳清理臨安之藤條江一帶務使妖氛肅靖邉境安寧以盡職守仰慰聖懐再普思攸樂一帶餘孽未清先經酌派官兵前徃駐防現在雖不敢猖肆而畏罪蔵匿山箐者間有為饑餓所廹黑夜搶擄一經官兵追拏即逃躱無蹤臣嚴飭文武各官一面搜擒一面上緊招撫陸續已有投出之户俟臨元軍務一竣相度情形次第料理所有元臨報㨗縁由合先繕摺奏聞謹奏以手加額欣悦覽之汝甫經到任兩路官兵俱各報㨗可卜天心嘉佑於汝朕深為汝慶但能秉此忠誠對越天地神眀自必利有攸徃切勿稍存矜伐之念勉之雍正十一年九月二十一日雲貴廣西總督臣尹繼善謹奏為奏報年嵗豐收事竊雲貴二省今嵗雨水調勻禾苗暢茂兹值西成天氣晴霽稲榖籽粒飽滿堅實荍豆雜糧俱各十分豐熟現在處處收穫廣西一省夏間雨澤稍遲收成較遜約有七八分不等若雲貴二省詢之農民咸稱今嵗較徃年所收實一年有二年之獲米糧價值日漸平減窮簷蔀屋共慶盈寧此皆仰賴我皇上敬天勤民福澤廣被萬里邉陲年登大有理合據實奏報恭慰聖懐謹奏覽三省收穫情形深為邉氓額慶雍正十一年十一月二十九日雲貴廣西總督臣尹繼善謹奏為奏眀元新賊首盡行投誠事竊臣因去年新平賊首楊昌奉普成忠普阿黑等並今嵗元江賊首播荷老常小名頭三比等尚未就擒於元臨兩路仍留官兵駐劄令總兵董芳楊國華居中調度分遣各土目四路查緝一面出示招安諭以投誠減罪所有逃竄逸賊俱即陸續獲觧其賊首數人自料不能走脱隨據㕘将吴朝應禀報普成忠普阿黑自磨沙江到營來投適值派撥土練進勦普洱懇求效力贖罪已准令隨營前徃又據總兵楊國華禀報土弁施膩勒自江外帶賊首楊昌奉並伊大頭目普兆龍卞朶楊昌祹及後生四十餘名到他郎行營来投又有新平賊首烏圖哈厄朱榮章保得甫楊哈資哈牛老八元江窩泥賊首李正同伊子老大阿二等俱各先後投出再元江一帶播荷老常小名頭為倡亂渠魁被土弁施糯利遣人尋獲欲求招安臣以既經尋獲非悔罪自投可比不准招安現在押令緝拏三比如逾限不獲即行拏觧又據土目方景眀将三比之賊黨使扒阿打合家拏觧供出三比蔵在翅古箐内已經派練徃拏大約不日可獲統計去嵗圍攻新平及今年侵擾元臨之大賊首除從前擒斬並觧省外餘皆陸續投誠伏思此輩蠢猓聚衆作惡罪不容誅今既出投何難立時擒斬但臣出示招來誘而殺之不足示威彰信且恐餘黨聞風不出孽根難淨故懇求用命殺賊者已令隨營效力情願招擒逸賊者己令人管押訪緝總俟軍務完竣之日拘至省城除拏獲及尋出者法無可寛外若自行投誠又實在效力者仰懇聖恩姑免其死發至黑龍江等處永逺監禁庶足以彰軍威而昭誠信申法令而靖地方所有賊首投誠並據臣愚昧之見具摺奏眀恭請皇上訓示以便遵行謹奏觀所料理頗屬妥協周宻惟自行投誠之輩既云不忍誘殺許其隨營效力事竣之後又復充發監禁仍不足以示威彰信朕意應拘集省城分别約束安插為是如再干法紀宣示其惡誅之未晚至於烏圗等屢次反覆非他賊首可比於大軍凱旋時𫝊齊各土目眀以正法示衆可也同日又奏為奏眀普思軍務勦撫情形仰祈睿鑒事竊攸樂思茅一帶餘孽未清經臣𣲖調兵練選委将備統領進勦業經繕摺具奏查普思地方遼濶大兵一到勢必四𣪚奔竄必湏分路宻佈併力進攻方克有濟隨與撫提諸臣悉心商酌将進勦兵練分作東西兩路東路之兵一由紅籐箐黨戛黨别出慢岔河底一由思茅糯竜那列慢蚌等處至茄色猓所及磨胖三達一於孔眀山莽通莽瓦以及小猛崙等處分佈堵勦俟三路事竣即㑹合攸樂清理三十六寨西路之兵一由闗舖板角一帶一由白馬山圈羅一帶搜勦俟兩路事竣即㑹勦六困復恐逃徃江外又分調各土目沿江堵禦隨據總統護鎮周儀具報各路兵練俱於十月初間先後自普洱前進臣又思思攸一帶地廣箐深若不恩威並用勦撫兼施不特遍行搜𠞰曠延時日且頑苗性多疑畏必致蔵匿反覆查有刀興國之胞弟刀輔國前因律應縁坐觧省覊禁但輔國當伊兄悖叛之際即出示安慰夷民撥人守護城池又搬運糧米進城並無異志著有勤勞又甚得彼處夷心故不敢拘泥成例将伊家口留省看守令其隨軍效力並查元江投誠賊首普成忠普阿黑熟習彼地情形適當派兵進普二犯懇求前徃亦令隨師效力續據周儀禀報兵至腊門口攻開賊栅一十五道追至龍潭箐見賊寨五所羅列山頂山勢險峻即督兵練奮勇直上逆賊踞險拒敵我兵鎗礮齊施打傷甚衆餘皆滚箐又據逰撃張其貴禀報率領兵練前至圈羅一帶躧見賊扎木城二道當遣刀輔國前徃招安各賊即俱觧戈投誠又陸續據各路将備禀報沿途攻勦所到必克斬獲頗多官兵止傷數人先後招出夷民八十餘寨皆云從前實係被脅從賊今俱傾心投誠哀號懇泣臣等飛飭地方官查眀安插復愷切曉諭不致復被煽惑又據總統周儀稟報黨戛黨别莽通莽瓦等處賊人因官兵屢次撃敗俱遁聚於糯怕地方現在分路圍𠞰等情臣查糯怕與九龍江橄欖壩等處逼近即飛飭将各處隘口嚴行堵禦合力擒勦務期一鼓成功其去年漏網賊首數人飭令設法追拏務期必獲在案兹於十一月二十四日接到皇上硃批奏摺竝大學士鄂爾泰頒到上諭覽尹繼善所奏一應料理似俱妥協元臨一帶雖現已平定若賊首尚有未獲即草率完局目前欲圗省事日後仍将多事是當乗勢清除者至攸樂思茅一帶路通莽緬外夷又非元臨内地可比若徒恃兵力無術以制其心恐進則竄匿退復猖狂縱隨𠞰隨撫亦終無以善後擒縱之間著尹繼善周詳籌畫慎重為之欽此臣跪讀之下仰見我皇上聖謨廣運睿慮周詳髙出尋常萬萬伏思攸思一帶實非内地可比撫治外夷之道實與内地夷人不同不用兵威固不足以示懲創徒恃兵力亦終無以服其心臣知識短淺未諳機宜惟有仰遵聖訓與撫提諸臣詳悉籌畫務在多方設法操縱得宜以期寧静邉疆永逺善後所有現在勦撫情形竝欽遵諭㫖料理縁由謹具摺奏聞謹奏𠞰撫名雖二事恩威用豈兩端當撫者未妨眀示優容當𠞰者亦宜顯施斬馘俾其知順則利而逆則害方可期近者悦而逺者来今此目前攻心之師即寓将来善後之舉是乃仁術非闗詐謀寧止綏靖普思将見信孚莽緬也識之同日又奏為要地亟需幹員仰祈睿鑒事竊總兵一官有弹壓地方督率營伍之責而邉疆重地尤為緊要必湏精眀幹練之員方克勝任查得開化鎮總兵官仇元正才具庸平年近七旬精力衰􅉵諸事不能整理開化地方南接交阯西控元臨實非衰老之人所能勝任其平日居官尚奏請伏祈睿鑒謹奏覽雍正十二年二月二十九日雲貴廣西總督臣尹繼善謹奏為奏眀辦理元新賊首情形恭請聖訓事竊元新賊首楊昌奉等前經陸續投出臣以各犯聚衆作惡罪不容誅今既投出殺之不足以示威彰信當經繕摺奏請俟軍務事竣将各犯調至省城發遣黑龍江等處監禁以伸國法以靖地方隨據總兵楊國華具報賊人三比藏匿翅古箐内逞兇拒捕現令土目帶練押同投出之賊首老常小名頭前徃擒拏等語臣查三比一賊甚屬兇頑老常小名頭原係一黨責成擒獻支吾多日並不實心出力不便再留軍前致有他虞即飛飭派撥官兵速擒三比一面将老常小名頭先行觧省去後乃楊國華専任土目遷延月餘既不發兵又不将老常小名頭拏觧臣嚴飭再三楊國華始令守備馬漢勛帶兵前徃而三比先已脱逃老常小名頭見三比未獲亦畏罪遁匿臣聞報之下不勝憤恨現在嚴飭楊國華勒令守備馬漢勛土目施糯利跟蹤窮追設法緝拏此雖楊國華奉行不力之咎即臣調度未妥之罪也因思投誠各犯多隨軍前若不及時辦理必致乗機效尤況烏圗一犯前雖據報投誠已經露面而性情狡猾止以招覔逸賊為詞總不肯親到大營誠恐已投賊首被其煽惑復至漏網所闗甚鉅隨飛行楊國華将楊昌奉等作速調齊眀白曉諭押令来省普阿黑普成忠二犯在普洱軍前又飛行副将周儀将伊等所帶後生先行分遣即将普阿黑等拘送来省乃楊國華脱卸巳責将楊昌奉等各賊首先已押交新平臣因飛諭新平文武作速押送恐其抗違不服必先預備防範然後舉動乃於正月十四日𫝊齊曉諭令其来省而賊首楊路支等抗不遵依身帶利刃蜂擁奔逃其後生數十人亦羣起猖肆當經新㠄營㕘将魏眀等督率伏兵立将楊路支楊哈資卡朶普兆龍普光天普宏得耶体奈七犯登時斬殺並将兇惡後生斬殺十二名餘皆拏禁幸未脱其楊昌奉楊期得未敢放肆已遵諭觧省隨據周儀将普阿黑普成忠亦經觧到臣以各犯原係投誠當撥給房屋居住並将伊等妻子給還加謹看守恭候諭㫖再行辦理烏圗一犯看其情形不肯實心就撫已自回元江老是達地方現在設法擒拏務期必獲以除後患兹於正月二十九日臣齎摺人回欽奉硃批諭㫖臣跪誦之下仰見我皇上睿慮髙深聖謨廣逺於用威彰信之中寓仁至義盡之道臣才識短淺荷䝉聖恩逾格奨勵指示周詳敢不悉心籌畫妥協辦理伏查楊昌奉等久居新平兇惡素著前嵗倡首悖逆攻城刼寨殺掠焚燒元新一帶處處受其茶毒現在人民莫不痛心切齒昨自新平起觧来省沿途夷猓見者無不跪拜畏之如虎誠有一呼百應之勢今若仍将伊等安插原籍則觸目成仇餘黨易集斷不能相安無事若即在省城安插又不便嚴加禁守此輩秉性兇頑難受拘束倘或逃走滋事必致又費周章且内中普阿黑原係發遣江南逃回之犯相隔萬里尚能逃回故土勾結悖叛咫尺本省安能保其帖服臣輾轉思維不揣愚昧再懇聖恩可否俯如臣前摺所請俟軍務事竣将伊等觧部發黑龍江等處監禁或即在雲南省城給以衣食永逺拘禁庶頑夷知有法紀而地方可免後慮臣因慎重邉疆起見冒昧瀆請伏祈皇上訓示遵行謹奏覽奏知道了楊昌奉普阿黑原係舊土司支派名雖投首實難望其自新兹觀楊路支等抗肆情状則若輩亦何容姑息自應觧部發遣黑龍江安插免貽後患至於三比烏圗等犯尤屬渠魁斷不可疎漏乗此兵威嚴飭楊國華速行盡力擒拏梟斬示衆倘不就獲楊國華性命繫焉将朕諭㫖眀白示之同日又奏為奏眀整頓三省營伍情形仰請聖訓事竊惟雲貴廣西均係苗疆接連外域修眀武備最為緊要臣赴滇時隨路考驗到任後悉心體察三省營伍因連年出師一切軍装器械頗多損壊兵丁技藝甚覺生踈不肖營員尚有佔食空糧而匠役㕑夫以及書辦頭目所佔之伙糧為數不少臣目撃情形心懐悚惕因痛指積弊通檄嚴查除頭目伙糧前已奏請清出另養餘丁外其㕑夫人役所佔之糧已嚴行禁革佔食空糧之将弁已經查出嚴行糾㕘營中書辦一分歩糧實難辦公現在核減酌留不許仍前多存空糧以虛營伍鳥鎗一項實為營中利器乃各營之鎗大槩長短不齊鏜口不淨不能有準致逺雖經提臣蔡成貴條奏動項修製經部議准尚未即辦臣以此事萬不可緩但通身另造未免糜費因令滇省各營細加選擇可用者存留不可用者改製恐各營不能合式特製様鎗令其照造已經陸續動工其黔粤二省亦咨商提臣通身確查一體整理鳥鎗之法固不外進歩連環務期手足熟嫺進退便㨗施放聨貫中的有凖方為有用臣親操標兵指示法則以為表率並於通省毎營調鎗手一排隨標學習熟練之後發回本營照式教演其餘弓箭籐牌俱皆勒定限期上緊操練但思教兵之法必長兵短器交相為用而後逺近有備廼邉省所恃者惟在鳥鎗夫鳥鎗原係利器第苗猓夷人多用長杆環刀如﨑嶇山徑或黑夜攻營一旦撲挑近身鳥鎗凑手不及雖有腰刀又素未學習刀法持二尺之鈍鐵敵丈餘之長桿兵丁膽怯必至受累前車之鑒厯厯不爽臣過鎮逺時與哈元生細談及此亦深以為然臣隨細心商酌添製雙手刀竝長鎗二種令弓箭手分學凡鳥鎗手亦必兼學單刀已從别省尋覔教師教習標兵並於通省每營各調數人學習分教三省撫提諸臣亦皆同心協力現經一體辦理平日操演即於鳥鎗之後以籐牌二名雙手刀二名長鎗二名聨為一排鳥鎗放畢即長短相間突出衝撃庶乎逺近有備可以緩急無虞再用兵之道固在隨機應變因地制宜而一切規矩凖䋲所以熟其耳目練其手足鼓勵其忠勇之志氣者全在講究於平日乃各營所演陣勢多事虛文並無實濟且一省之中彼此不同甚非體制臣咨行三省自撫提總兵以至将官俱令各就所見将平日操演之法造册送閱不但驗其才識竝以廣臣見聞今據陸續送到内惟哈元生之式尚屬簡眀其餘俱㕘差無當而亦有可以節取者臣現在悉心考訂斟酌繁簡将何以行軍對陣何以設伏安營何以視金鼓旗幟為分合進退縱横變化之道一一講求俟規模酌定仍與撫提各鎮諸臣細心啇確然後繪圗貼説分發三省使皆畫一遵行但恐奉行不力仍屬故事臣並勒定限期操演純熟使各營出具甘結到日再委鎮協大員錯綜查驗分别勸懲仍諄致撫提諸臣共殫忠誠相助為理務期營伍整頓武備修眀以仰副我皇上慎重邉疆委任臣工之至意但臣才識庸愚深恐料理未當仰懇聖恩詳加指示以便有所遵循謹奏整頓營伍修眀武備原為封疆第一要務果共殫忠勤亦何難料理汝見及此深惬朕懐惟是操兵之法無論聨排聫伍用短用長總期熟嫺方收實效即雙手刀長鎗等械固宜兼學亦未可一律拘泥至云熟耳目練手足鼓勵志氣是矣若臨敵對陣縱横變化之術豈繪圗貼説定限取結而兵弁遂能演習精妙者乎故曰神而眀之存乎其人徒法不能以自行也此諭其詳加體㑹同日又奏為備陳清查雲貴廣西三省各營公費生息情形仰祈睿鑒事竊查每兵百名存留公糧二分以為營中公費誠我皇上體恤兵弁之深仁整頓營伍之良法為武員者自當悉心料理盡歸實用方於營伍有益乃查三省各營公費多不清楚或任意濫費浮冒開銷或竝非公事混行私用或借造册為名而司道書役恣意分肥或指稱打點部費而亰外提塘暗中索取以有限之公費混用者去其大半所有軍装器械焉能整理臣到任後通身嚴查立定章程應用者分晰欵項浮費者痛加減裁凡從前用之不當者臣凖情酌理可寛者免其已徃應追者責令賠償其中有玩法太甚者自當查眀㕘究並㑹商提臣通頒册式令各營将所用公費條欵詳細登註按季造報逐欵查核不許絲毫冒濫此臣清釐公費之情節也再生息銀兩我皇上愛養兵丁特發帑金賞給營運以資窮兵緩急此誠曠古未有之鴻恩陞任督臣鄂爾泰仰體皇仁通盤籌畫議将督撫提鎮各標所領銀兩一體均分各營營運凡經管将弁自當實力經營俾本銀清椘利息充盈窮兵早得接濟乃雲南生息銀兩多有營員借用客民借貸及放債兵丁取利盤剝者伏思皇恩賞給原令設法營運若取兵之利以為賞兵之用似覺於理不順况遇逃亡事故無人賠墊勢必虧空至於官員私借更屬違例借端一開人人皆生覬覦交相弊混彼此通那日久無力清還帑項必歸無著臣深悉其弊不敢因循現在委員徹底盤查凡官員之借欠立刻嚴追客民之借貸勒限歸款其兵丁之借項行令分季扣還所開典當有不值號件俱著落經手之人償補俟查眀之後有情弊不可寛恕者定行嚴㕘究處務期徹底澄清再為因地制宜熟籌營運使帑項不至侵虧兵丁早沾實惠再貴州廣西生息銀兩從前題准亦照滇省均分辦理迄今二載貴州止有撫提並安籠鎮標己經領銀營運其餘尚未分領臣思黔省山多地僻貨販稀少若将銀兩按營分𣪚則偏僻之處勢難生息必至本銀沉擱且過於零星礙難稽查莫若将通省應領之四萬餘兩儘巡撫提鎮大標及衝繁營分之地成總營運将附近僻小營分應領之數歸併帶辦所得利息算眀均分給賞不但查核甚易亦且滋生倍多現在咨商撫提行司詳議廣西生息銀兩久已分定厯年營運頗有利息但偏僻營分本銀尚多壅滯亦經㑹商撫提裒多益寡通融辦理其現存利銀據撫臣金鉷行令分貯酌借臣以借之一道總非善䇿查扣至去嵗年底已共有利銀九千餘兩量入為出儘可敷用隨酌定賞格自本年正月一例開賞其各營有無虧空亦現在委道府各官通身盤查出結具報所有清理三省公費生息情形理合據實詳細奏眀仰祈睿鑒謹奏存留公糧原以資助辦公凡應用之項自不宜過於裁減若指借名色濫費浮開既無補營務且反滋弊竇則是無故多此一事矣應徹底清釐者至於生息銀兩經營固湏有法委託尤在得人該将弁等果肯盡心籌畫如自理家財即僻地小營未嘗不可滋息倘或膜外視之雖大標衝郡取贏較易亦豈能免借貸通那之弊乎所奏已屬周密其更加詳察妥酌勉力為之雍正十二年七月二十三日雲貴廣西總督臣尹繼善謹奏為滇粤全河告成事竊查滇省僻處邉隅不通舟楫處處崇山峻嶺商旅難行百貨騰貴是以開通河道甚闗緊要查由滇通粤有土黃一帶河道發源於滇省廣南府之分水嶺合師宗州西隆州諸山之水滙聚成川自土黃起經西隆西林土富州土田州諸境過剝隘而至百色共計七百餘里可以直達兩粤旁通黔椘前督臣鄂爾泰以此河若得開通滇粤兩省呼吸聨絡招徠商賈轉運糧糈實為萬世攸賴因於彚陳全滇水利疏内並請勘修旋值鄂爾泰進亰而粤西屬員怠玩因循多稱難於開濬遂至彼此益生疑沮委勘數年竟無定見臣到任後備考圗籍密訪情形稔知此河水源長逺易於施工據實估修所費有限隨遴委王廷琬前徃確勘總理又委粤省之泗城府知府張任滇省之原任昭通州知府陳克復督率各地方官協力分辦於滇省司庫官田變價項下撥銀六千餘兩齎徃招募夫匠分段興工疏濬䦕鑿計自雍正十一年十二月起至本年五月已将全河七百四十餘里一律開通隨照貴州湖廣灘河駕使之麻陽船鰍船式様成造試行徃返無阻現在廣東之三板等船已有載貨前来沿河交易嗣後四方商賈聞風奔湊財貨可以流通且運鉛運錢可省數百里之旱路滇粤兩省受益實多除沿河安設塘汛建葢店房等項次第料理現飭承修各官俟水落之後再将新修各工收拾完備委員確勘酌定嵗修務期永逺鞏固並查實用過工料銀兩造册報銷外所有全河開修告成縁由相應先行奏眀再土黄地名原係土人傳述誌乗無稽此河在西林縣境居多西林為古上林地方伏懇皇上寵錫嘉名用昭久逺再全河七百餘里賴有神靈保護素聞土黄一帶三四月間即有瘴氣且山水暴發不常今自開工以至竣工河流平穏天氣晴眀人力易施事半功倍且匠夫數萬一無傷損實有黙助成功倘䝉皇上敕建河神祠宇獲從報享之典則皇仁優渥宣播遐方山川均被光華邉氓益增慶慰矣是否有當統請聖裁謹奏此舉可嘉之至其建立祠宇併祭祀典儀交該部議奏矣候㫖遵行雍正十二年十月初十日雲貴廣西總督臣尹繼善謹奏為恭報三省豐收事竊查雲貴廣西三省禾苗自栽秧以来雨暘應時長發暢茂兹雲省於八月後天氣晴眀早稻晚榖顆粒堅實現在收穫登場約計通省十分者多間有八九分不等荍豆雜糧較徃嵗更為加倍米糧價值日漸平減荍麥賣至三四錢一石洵稱大有之年貴州廣西二省收成亦與雲南大槩相等閭里盈寧羣歌樂利伏念雲貴地方自夷猓滋事連嵗出師民生困於兵火民力疲於轉輸休息無時補救匪易幸䝉上天宏慈黙佑我皇上㬌福駢臻於地方安定之後屢慶豐年得以少蘓民困臣身膺重任欣感靡涯惟有愈矢氷兢不敢一毫少懈愈加奮勉不敢一念自安而已所有三省豐收情形理合具摺奏聞仰慰聖懐謹奏覽奏朕懐深慰縁卿忠誠任事有以感召天和雨暘調順故爾三省俱獲豐收邉氓何慶如之天人交感㨗如影響此理昭然不爽當深信勿疑愈勉寅畏可也同日又奏為恭謝天恩事本年八月十二日臣齎摺人回䝉皇上賞賜香珠藥錠茶扇等件臣謝恩跪領又於九月二十五日臣齎摺人回重䝉賞賜端硯磁器花絹香珠荔枝茶葉等件臣謝恩跪領伏念臣才識庸愚忝膺重寄撫心自問未效寸長仰荷我皇上聖心眷注訓誨多方既温諭之頻頒復錫予之稠疊似此非常遭際實為逾格殊榮夫人臣輸忠效力原屬職分當然豈因受一層深恩始加一倍勉勵但受聖心勉盡職守所有感激微忱謹具摺恭謝天恩謹奏誠能慎終如始何慮地方之不寧謐政治之不修眀也勉之雍正十三年二月初四日雲貴廣西總督臣尹繼善謹奏為奏眀雨雪應時春苗茂盛事竊查滇省迤西一帶大理等府於年前十一月間即經得雪順寧䝉化等府氣候温和向来雪少俱經得雨滋潤迤東一帶昭通東川等府亦於年前十一月間得雪至正月初二等日昭通復得大雪積厚尺餘開春以來望雨正殷於正月二十五六等日大雨普霑逺近周渥豆麥菜花及時發生青葱暢茂處處民苗樂業米糧價值甚為平減貴州所屬台拱遵義等處年前亦屢報得雪入春以後通省雨水甚屬調勻臣謹具摺奏聞仰慰聖懐謹奏冬春既獲應時膏澤春苗自必長茂矣深慰朕之逺念雍正十三年四月十六日雲貴總督臣尹繼善謹奏為奏眀雨水調勻豆麥豐熟事竊照雲貴地方自入春以来雨暘順序耕種及時豆麥發生極其暢茂今交夏令漸次成熟現在豆已登場二麥結實徧野四月以内即可全穫詢之農民咸謂今嵗春收十分大熟一切菜花荍麥亦皆處處茂盛米糧價值仍似去冬平減四月初間又連得大雨逺近霑足臣謹具摺奏聞仰慰聖懐謹奏覽雨水豆麥情形欣慰曷似雍正十三年六月二十九日雲貴總督臣尹繼善謹奏為恭報大㨗及現在進勦情形事竊黔省下游生熟頑苗勾結悖逆於本年四月内焚刦重安凱里攻陷黃平新州阻塞驛路蔓延内地臣札致提臣哈元生親徃清平就近調度並咨調湖廣廣西官兵及飛調滇兵三千馳徃䇿應業經繕摺奏眀奈提臣隨行兵單所調之兵不能猝至雖分頭堵殺而苗類衆多勢甚猖獗於閏四月初三日逆苗漫入黄平舊州人民逃空撥防兵丁僅一百五十名力不能禦被賊入城焚燒房舎臣據文武禀報隨查平越甕安餘慶相距舊州俱不過數十里此際急宜駐兵打鐵闗以衛平越城并分兵防守甕餘二縣一面飛咨提臣一面星催前調滇兵趕赴軍前應用總因官兵不敷提臣雖調撥分防僅能謹守打鐡闗其甕餘二縣止各撥兵五十名前徃逆苗窺伺兵單十八日復湧入餘慶城内焚掠文武員弁俱奔拒城外未遭殘害提臣隨撥兵飛堵馬鬃嶺隘口甕安得以保全清平之賊先於初十日蟻聚攻營大定協副将紀龍正在督率官兵出營對敵不意姦細暗入城内放火知縣邱仲㫜並無防範以致監犯悉行􅊵脱提臣急遣官兵䇿應副将紀龍奮力截殺逆苗始行敗遁城池倉厫俱得無虞業将邱仲㫜㑹㕘在案其台雄丹江逆苗因總兵卜萬年柔懦無能軍威不振於四月二十六日圍攻排咱營汛卜萬年遣逰撃姚宅中等帶兵徃援因調度失宜傷損官兵不能取勝及卜萬年親自率兵前徃又復退回排咱營盤口糧已斷於閏四月二十一日守備髙謀把總王興泰蔡文魁等帶兵衝出四面受困對敵陣亾並亾兵丁四百餘名丹江鷄講悉被圍困臣據報又一面飛調滇兵一千三百名並将前遣貼防安籠威寜之滇兵五百名亦行調徃飛咨提臣如滇兵一到即分一路由清平重安而出一路由打鐵闗出舊黄平以達新州兩面夾𠞰開通大路先固内地再𠞰新疆隨於閏四月二十以外前調滇兵陸續先到惟時清平之賊屢經副将紀龍奮力𠞰殺附近逆巢已經焚洗提臣哈元生隨令廣羅協副将周儀帶兵駐劄清平換出紀龍徃攻重安遣㕘将哈尚徳帶兵出打鐵闗攻舊黄平哈尚徳督率官兵奮勇𠞰殺於閏四月三十日五月初一日連復新舊黄平二城直至重安而重安之賊先於閏四月二十七日又犯清平副将周儀督兵奮撃賊衆大潰追過大風硐連破老君山險􅋭五寨副将紀龍乗勢渡江殺𣪚賊衆駐劄江岸與哈尚徳㑹合逆苗畏懼兵威俱逃躱山箐紀龍哈尚徳又連日将附近重安之賊分路搜𠞰斬殺甚多五月初七日提臣遣都司陳思儀帶兵由新黄平而下㕘将崔傑帶兵由偏橋而上将沿途阻路逆苗悉行𠞰𣪚驛路俱通其餘慶縣城賊悉逃遁亦經乗勢恢復隨於重安黄平餘慶及各闗隘佈兵駐防搜洗山箐餘孽斬殺生擒數千餘衆拏獲賊首羅萬象黎登髙王國俊安國林馬陞雲宋藍保龍登威龍貴林等黄平一帶業已平定難民漸次復業其仍有蔵匿山箐者現在搜𠞰廣西官兵二千於五月初間已經到齊總兵韓勳當遣七百名徃八寨援𠞰遣五百名徃黎平貼防又節准廣東督臣鄂彌達咨㑹因聞黔苗猖獗先後調廣東兵四千九百名委髙州鎮譚行義總統前赴古州協𠞰又撥廣西撫標兵五百名駐劄丙妹又調廣西左江鎮總兵王無黨來黔總統廣西官兵臣思廣東距黔遙逺師行甚為勞費但准咨之日起程已久阻止不及且貴州逆苗蔓延亦湏多兵分佈旋據韓勳具報廣東頭撥官兵一千已於五月二十四日到古臣查古州既有廣東官兵前来則廣西之兵可以撥出另用丙妹地方現有黔兵駐防可無他慮廣西之石碑汛界連古州甚為緊要隨咨商提臣飛行韓勳将駐劄丙妹粤兵就近調赴古州将廣東後撥在途官兵留五百名駐石碑堵禦其餘廣東官兵俟續到日再撥五百前徃八寨兼防都勻撥一千名駐黎平府貼防餘俱留在古州備用鎮逺一路前調湖南官兵三千於五月内已到一千八百正在沿河安營保護糧運分堵隘口乃有沅州協副将傅為斗於横塘地方與賊對敵賊衆兵單陣亾兵弁八十餘名賊勢猖狂四出黔椘官兵分應不暇於五月二十七日逆苗越入青溪城内燒燬衙署倉房副将桞定國等聞信飛援當時逆苗奔退城池保全臣以提臣相隔尚逺鎮逺一路必得大員統領隨㑹商提臣委左江鎮總兵王無黨帶廣西兵八百名前至鎮逺總統此路官兵清理内地援應清江勝秉𠞰洗倡首惡寨其清江勝秉二處屢遭逆賊圍困俱被官兵殺退幸無損失台拱道路雖有阻隔而近城一帶尚在無事隨又據台拱鎮總兵卜萬年報稱小舟江汛地於五月初五日被苗攻破千總劉文魁等陣亾兵丁尚損一百餘名其丹江營並鷄講汛十分危急提臣派令副将周儀紀龍帶兵二千餘名進攻凱里援應鷄講丹江又令滇省逰撃王先帶兵一千餘名由麻哈平定等處沿途𠞰賊前至卡烏並令八寨副将馮茂帶黔粤兵一千五百餘名由八寨一路𠞰賊至卡烏與王先㑹合進𠞰九門等兇寨兹據副将周儀紀龍具報於五月二十九日渉水渡河頑苗數千拒敵督兵撃敗克復凱里連日破險焚巢於六月初四日直通鷄講城汛保全初五日又通丹江前後焚洗逆巢數十𠞰殺逆苗千餘弁兵止傷數名逰撃王先副将馮茂等亦将九門等寨悉行焚𠞰副将康世顯㕘将崔傑哈尚徳又将沿江最險之螃蠏等寨𠞰洗擒獲大賊首阿九軍威大振逆賊奔𣪚逃竄将擒獲之賊逐一究訊知大賊首枉汪等聚於空拜等寨築􅋭負固此最係兇惡巢穴現已嚴飭諸将分佈周密併力𠞰擒其古州之八妹等寨臣因内地未静難以齊舉是以密令韓勳蹔緩深入今據韓勳禀報已将附逆之山㜑寨𠞰洗駐兵山舟等處扼要控制其附近古州以及上江下江一帶俱各安帖六月十三日接大學士鄂爾泰等字寄雍正十三年五月初四日欽奉上諭又調湖廣兵二千名来黔協𠞰復慮逆苗敗遁攻犯古州著𣲖廣西兵三千名星徃應援仰見睿謨逺照籌算無遺又於二十三日臣齎摺人囬接到大學士鄂爾泰等字寄雍正十三年五月十八日欽奉諭㫖一切𠞰撫機宜無不周詳指示臣跪讀之下感愧交深查廣西官兵先已調撥二千五百名今廣東又發官兵四千九百名是兩粤官兵調出已多廣西同係苗疆亦湏彈壓經臣咨㑹廣西督撫提臣停其調遣湖廣官兵已准督臣邁柱咨㑹遵㫖再調湖北兵二千名委㐮陽鎮焦應林總統已經起程現在清平黄平餘慶平越等處俱已平定鎮逺施秉偏橋都勻黎平俱無疏失大道已經開通其鎮逺上下尚有數處逸賊出沒正在搜𠞰至上㳺地方俱各處處安静從此大兵雲集臣凛遵聖諭與哈元生悉心商酌竭力辦理誓必淨掃妖氛不敢稍存姑息仍貽後患所有屢報大㨗及分路進𠞰情形臣謹據實奏聞謹奏覽頑苗如此一番猖獗朕與鄂爾泰暨汝等實無顔以對被害之邉氓也若不加意撫綏致使鋒鏑之餘復填溝壑於心安乎湏極力辦理務俾一一安集得所以贖前愆倘吝惜帑金及或貪官汚吏乗機侵冒而令無告窮民不霑實惠則更不可矣地方守令等官如有奉行不力潦草塞責者無論向日之官聲優劣即以溺職㕘黜其侵蝕冒銷者一面拏究一面題請正法示懲将此諭遍宣滇黔在事各員悉令知之同日又奏為奏聞事竊元江賊首老常小名頭二犯實係兇惡巨魁先經軍前尋獲因鎮臣楊國華不即拏觧令其招緝逸賊以致脱逃遁入外域臣已據實奏眀欽奉硃批諭㫖指示諄切令速行盡力擒拏臣凛遵辦理嚴飭文武多方躧緝嗣據楊國華報稱二犯攜帶男婦一百六十餘人由普洱整法出口逃入南掌守備馬漢勛等帶領兵練追至交界有南掌頭目叭細里松法具結承認拏賊獻出等語臣查南掌原係恭順之國今賊逃入彼境止湏行令拏觧仍於交界要隘處所駐兵堵禦不許越境騷擾當即飛行遵照嗣據普洱文武禀報據南掌叭猛花禀稱雍正十二年例屆貢期該國已恭備象隻即擬起程因逃賊老常小名頭勾結該國卡髙夷民肆行滋擾現在督兵𠞰擒俟拏獲逃賊時同象隻一併觧出等語臣因飛行奨勵飭令速拏逃賊不可縱容貽患一面先行入貢母得稽延去後節據文武禀報雍正十三年三月初七日南掌差夷目觧貢象二隻到普據稱表文貢使因叭猛花帶兵拏賊未能料理俟續後到普等語又據叭猛花禀稱逃賊勾結卡髙甚屬肆横該國土兵懦弱兼少火器請發官兵幫助前来臣當即詳細指示鎮臣楊國華令其相機辦理隨經楊國華令守備趙𢎞祖帶領兵練駐劄猛腊界口遣把總李燦帶領官兵五十名土弁施糯利等帶土練四百名於四月内前徃南掌補按地方協助𠞰撫而卡髙各寨夷人一見官兵臨境即皆威畏投誠老常小名頭勢孤力竭無路可逃於閏四月初九日帶同男婦一百餘人赴營求撫把總李燦将該犯等一併帶出普洱南掌地方已經平定臣據報飛諭楊國華等立将老常小名頭鎻拏觧省去後兹於六月十八日已将老常小名頭並其妻子等觧到發司收禁審擬正法並據該鎮府具報五月二十日又據南掌觧到餘象三條六月初二日自普起程赴省貢使表文隨後起行等情到臣查元普賊首早已斬擒净盡惟老常小名頭二犯逃入外域今仰賴皇上徳威逺播訓示周詳二賊俱已就擒南掌人民莫不感戴天恩歡聲雷動除俟貢使到省另行題報外所有擒獲賊首及南掌入貢縁由臣謹恭摺奏聞謹奏此二要犯既經就獲元江地方嗣後可望無事矣硃批諭旨巻二百二十三下
