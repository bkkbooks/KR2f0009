body:
  text: 欽定四庫全書硃批諭旨卷七十二硃批赫碩色奏摺雍正六年二月十五日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為恭報微臣受事日期仰祈睿鑒事竊臣等一介庸愚荷蒙皇恩欽命巡視臺灣於雍正五年十一月初二日恭請聖訓初四日自京起程臣夏之芳復遵旨領齎部鑄學政關防均於雍正六年二月十二日到臺循例於駐劄公所恭設香案望闕叩頭謝恩受事訖伏念臺灣逺隔海洋地方緊要臣等入境受事自當親歷巡查小心體察其應行事宜容臣等次第料理外所有受事日期理合繕摺奏明伏乞皇上睿鑒謹奏覽奏知道了勉力和衷盡職莫效禪濟布等寡廉鮮恥無知妄為虛負朕之委任也雍正六年五月初六日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為恭報臺灣雨水情形米榖價值仰慰睿懷事竊查臺灣地廣人稠歷年風雨調和收成豐稔地方相安無事臣等於到任後凡係天時風雨民間種植一切事務飭令地方官十日一報以資見聞兹據各該縣報到三春雨水調勻麥收約八分有餘目下插秧之時甘霖疊沛四野霑足農民歡呼正在及時耕種至各處米價每石一兩至一兩二三錢不等民食充足地方安靜理合奏報上慰睿懷謹奏據奏臺郡麥巳收穫雨水及時米價平減朕懷曷勝慰悅同日又奏為敬陳臺地事宜仰祈睿鑒事竊臣等奉命巡視臺灣欽遵訓旨於到福建省城之日向督臣髙其倬請出欽交條奏臺灣諸摺敬謹詳看隨於到任之後悉心體察逐一採訪查得臺灣負山面海地方遼逺形勢險要實屬閩廣江浙諸省之屏障其間番民雜處而外來之民尤紛雜難齊姦良不一最易生事巡防兵丁亦不盡守法文武官辨祗循故例就事完結不能杜絶弊端臣等以為法不嚴密積弊不能盡除謹將愚見所及臚列四條敬為我皇上陳之一宜嚴定處分以重稽查也查內地渡海例給印照從厦門出口至鹿耳門入口皆由同知查驗已經例有處分近有一等棍徒不雇客船並不從厦門鹿耳門出入賄約多人置買船隻出沿海小口偷渡到臺各口汛亦有拏解者亦有賄縱反為指引者及犯事逐水或有故回籍亦並不問其渡臺來歷是根本不清終難查核臣等請嗣後給照來臺者令海防同知並各地方官注明册內其從前來臺者亦於保甲牌內注明來臺年月遇有事故一宜嚴定條例以懲姦匪也臺民刁健每多冒險為非近來嚴禁偷渡賭博姦竊結盟等事而犯者不少總因臺民犯事不過枷責逐水該犯狡獪性成逐水未及數月又頂替夾帶過臺仍然為害再犯再逐循環不已弊終不絶臣等請嗣後初犯法者重責枷號將該犯面上刺字解回本籍收管面一宜互相查察以肅軍紀也臺地兵丁皆三年更換而內地各營撥遣換班之兵不盡過臺每有半途賄買頂替者凡熟習臺灣積慣生事之兵前期換回轉眼復來到臺查點不無容隱臣等請嗣後凡換班兵丁到臺皆令臺灣道會同該總兵副將對册查點如有一名頂替先將押送武辨議處再將兵丁重責刺字逐水並咨回本營革除本兵及一宜添設官員以密防守也查臺灣一府內臺灣鳯山諸羅三縣開墾巳久人民湊集文武員辨駐劄相近耳目易周惟彰化一縣地方空濶谷邃山深姦民易匿其地文官止同知知縣典史各一員知縣有刑名錢榖之責典史力微不能逺巡止靠同知一員巡查七八百里﨑嶇之地實難遍及臣等請於彰化縣之東南沿山一帶並彰化縣之西稽查亦易遍矣以上四條芻蕘之見是否有當伏乞皇上睿鑒施行謹奏前三條果能照所奏實力奉行朕不為臺郡顧慮矣但可保必不能而亦必不肯也所以不批嘉是二字雍正六年八月十八日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為敬陳臺地雨水榖價仰慰聖懷事竊查臺灣各屬地方自春入夏雨水調勻早禾已經收穫惟七月望後雨澤稀少晚禾正在須雨之時臣等率同該地方官設壇祈禱屢次得雨而未能普遍及八月十三四日大沛甘霖四野霑足據各該縣飛報前來全臺俱經得雨晚禾秀茂農民稱慶秋成已在望矣至近來米榖價值據各該縣稟報米價每石一兩五分至一兩二三錢不等榖價每石四錢一二分至五錢不等民食充足地方安靜理合繕摺奏聞上慰聖懷謹奏晚禾得雨朕懷深慰但一切奏聞惟以無欺隱不粉飾為要同日又奏為敬陳臺地事宜仰祈睿鑒事竊臣等奉命巡視臺灣到任以來日夕冰兢凡遇關係地方事務時加訪察今有愚見所及三條不揣冒昧敬為我皇上陳之一清查姦匪宜責成業主也一操練兵丁宜嚴查器械也一澎湖兵米宜就近存貯也以上三條皆因臺地孤懸海外素屬巖疆必令有備無患永為保固之計臣等受恩深重日思報效敬將芻蕘之見直陳君父之前如有可採伏乞皇上飭下督撫詳議施行為此繕摺奏聞謹奏覽所奏三條甚屬可嘉候另有諭旨雍正六年十一月初四日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為恭報臺地收成分數米榖價值仰慰聖懷事竊查臺灣所屬地方自春及夏雨水調勻惟七月間雨水稍覺愆期至八月即連得大雨田禾霑潤各種稻榖以及麻豆芒蔗一切雜糧俱已成熟今值收穫之時據臺灣縣詳稱收成計有七分米價每石一兩三錢零榖價五錢零鳯山縣詳稱收成計有七分米價一兩二錢零榖價四錢零諸羅縣詳稱收成計有八分米價一兩二錢零榖價四錢零彰化縣詳稱收成計有八分米價一兩零榖價三錢零各等因到臣等查田地有近山近水之别故收成分數不等米榖有運費多寡之分故價值亦復不一然就通臺合算俱屬豐稔米價亦平所有臺灣全郡收成分數及米榖價值理合具摺奏聞仰慰聖懷謹奏據奏通臺豐稔則米價即應大減今每石至一兩二三錢仍屬昂貴是何故耶雍正六年十二月初六日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為奏聞事雍正六年十二月初一日據臺灣縣詳稱該縣東安坊糧長報稱本坊居民魏連妻陳氏於本年十一月十四日一産四男經該縣取結詳報到臣衙門又於本月初五日據該縣詳稱本縣東安坊士民等報稱本坊居民楊紹芳夀登一百七嵗例應舉報隨經該縣確查取結亦詳報到臣衙門臣等查臺灣久沐國家飬育深恩歷年海不揚波時和嵗豐人民皆安居樂業今添丁則一産四男飬老則年逾百嵗皆由聖朝久道化成太和洋溢之所致也臣等目覩太平嘉瑞理合繕摺奏聞伏乞皇上睿鑒謹奏類斯例應題奏之事何必多此一番瀆陳耶雍正七年正月十八日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為恭謝天恩事本年正月十五日準督臣髙其倬咨文內開雍正六年十二月十二日準都察院咨開奉旨赫碩色夏之芳著再留臺灣巡視一年欽此移咨到臣臣等隨恭設香案望闕叩頭謝恩訖伏思臣等奉命出巡一年以來毫無報稱兹復蒙天恩再留一年聞命之下益切悚惶惟有和衷料理實心辦事竭盡愚誠保固海疆以仰酬髙厚於萬一為此繕摺恭謝天恩伏乞皇上睿鑒謹奏勉力盡職以期無負朕之委任同日又奏為奏聞事本年正月初三日臣等訪得臺灣府屬之鳯山縣地方有傀儡生番殺人一事隨即行文該府並該營辨確查去後續據該府詳稱番民舊有一定界限因雍正六年十二月二十八日鳯山縣長興莊管事邱仁山等領本莊佃民越界侵入傀儡山開水灌田致被傀儡生番潛伏殺傷邱仁山等一十二人復追入竹葉莊殺傷佃民張子仁等二人當經該縣勘明舊定番界並親行相驗據稱長興莊開水之處並竹葉一莊實係界外番地莊民擅入番界以致被殺等因到臣衙門臣等查番民地界久立定限不許民人侵入番界己經屢行嚴禁兹愚民貪開水利擅入番界被殺雖與生番出山擾害不同但殺傷人命至一十四人之多亦漸不可長除一面飭令該地方文武官辨設法緝捕凶番並移知該督撫查參失察職名外所有生番殺人緣由理合繕摺奏聞謹奏此事係內地佃民有以自取其禍率因地方官平時不行實力嚴查之所致即爾等亦安能辭疏慢之咎業既生出事端飭令設法緝捕究有何益前於汝等出京時朕諄諄訓誨但當劃清界限使生熟番夷及內地百姓各安生理兩不相侵始可免意外之虞爾等豈遺忘此諭耶明者逺見於未萌智者防患於無形若似此逐案推求隨時整飭皆屬事後之補救亦恐不勝其煩總之汝輩庸流因循不振者多實心任事者少奈何雍正七年三月十六日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為奏聞事竊查鳯山縣長興莊民邱仁山等被生番潛出殺傷一十四人已經臣等據實摺奏正在移知該督撫並經鎮臣王郡道臣孫國璽酌量𠞰捕間又據鳯山縣報稱本年二月初一日生番又行潛出殺傷熟畨七命等因前來隨經該鎮道一面申報該督撫一面撥遣官兵並番丁民壯於二月十六日前往山豬毛山里目等社搜捕凶番去後今據領兵文武各員陸續報稱進山搜捕數次殺死生番七人擒獲生番二十人即於三月十四日將兵丁番壯撤回各等因具報到臣衙門臣等除飭令該地方官將所擒生番是否殺人凶犯分别審擬詳報該督撫定案外所有𠞰捕生畨緣由理合繕摺奏聞再臣等查海疆重地知縣一官必得勤謹廉幹實心辦事之員方能勝任今署鳯山縣知縣彭之曇到任月餘不能嚴加防禦竟致生番屢出傷人及至撥兵𠞰捕在該縣境內而該縣置若罔聞全不料理反乘此時通詳告病借以謝過似此怠玩推諉殊為溺職若仍姑留海疆官員從此效尤何以整理地方除一面移知該督撫另委賢員署理外所有溺職知縣彭之曇理合一併附參伏乞皇上睿鑒施行謹奏所奏是此等劣員豈可姑容況臺郡險逺非內地可比官辨尤為切要但須平情處之毋得過苛同日又奏為敬陳臺地事宜仰祈睿鑒事竊臣奉命出巡一年以來悉心採訪凡關地方事務皆思斟酌調劑隨時措置保護海疆兹有臺地尚須斟酌事宜謹據愚見所及為我皇上陳之一番民界限宜定例嚴禁也查臺地番民共處止可令其各安本分不可令其互相固結在熟番納餉當差甚屬醇良獨生番性極蠢頑好以殺人為事從前雖經畫界禁止民人出入而生番之害不能盡絶臣等細察情形聞向來內地姦民間有學習番語娶其番婦認為親戚居住生番界內並將鹽鐡火藥等物販賣與番及今不為嚴禁將來關係不淺臣等愚見請嗣後更定嚴例畫定生番界址不許番民出入販賣物件一切火藥鹽鐡尤宜查禁將生番社內通事一概革逐如有擅入生番界內並販賣違禁物件者定例置以重典其地方一試用人員宜量發海疆也查臺灣逺隔重洋所有道府縣以及佐二等官遇有升遷事故離任者委員署理海上風信靡常一時不能驟到每致人缺虛懸似此海疆重地恐有貽誤臣等已移知該督撫必令署事與離任之員人文一齊並到以免員缺久懸之患但臣等細思地屬巖疆非得歷練之員難以勝任與其臨時委署不若預使練習可否於本省揀發人員內令該督撫選其老成廉幹者預發一二人令其先駐臺郡給與本職額俸平常無事凡地方人情風土既可親切見聞或有要緊公務聼道府委派協辦一遇有升遷事故離任之缺即著署理試看果能勝任該道府申詳督撫酌量題請實授其不稱職者令回內地或竟行揭參該員委署之後再詳明督撫揀發以便將來遴委如此以上二條臣等因海疆重大起見如果芻蕘可採伏乞皇上敕下督撫詳議施行謹奏覽雍正七年閏七月二十九日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為奏聞事竊照臺灣地方於本年七月二十六日海風大作飄失船隻人口吹倒房屋經臣等飛飭詳查去後兹據臺灣府彚報內稱各處倉厫完固禾苗茂盛無損查得南北一帶海口擊破民船一百餘隻溺死船戶水手二百餘名又府治木城吹倒一百三十餘丈臺灣縣各坊里吹倒瓦房二百餘間溺死二人餘者俱無傷損鳯山縣吹倒草瓦房七十五間諸羅縣吹倒房屋三十八間人口無損擊碎民船一十隻飄去塭丁六人己經將被風窮黎設法賑濟加意撫恤其彰化一縣澎湖一島風小無損各等因到臣又據臺灣鎮臣王郡咨開安平鎮水師各營擊碎營船三隻大壞二隻微損一十五隻溺失兵丁一十一名並炮位軍器等物又南北陸路墩臺營房倒壞十有五六各造清册細數到臣衙門臣等正在具奏間又於閏七月二十三日海風復起府城以南風勢尚小據淡水同知報稱府城外海邉擊破民船三隻溺死水手十二名北路海豐等港共損壞民船一十七隻溺死十一人各處吹倒房屋數十間正在確查又諸羅縣報稱該縣禾苗無損臨海地方吹倒房屋三十四間壓死人一名擊碎民船十一隻溺死水手三名又彰化縣報稱該縣禾苗倉厫並無傷損倒壞番房二十八座壓死番婦二口又城內外草房共吹倒八十餘間人口無損又澎湖通判報稱本月十三日風勢狂烈民間房屋吹塌甚多人口幸俱無損商哨等船灣泊澳內者多被風擊壞並飄出各處正在查驗又澎湖水師副將報稱營船多飄散打壞拖擱案山並營房兵丁飄損之處正在確查等因各到臣臣等隨飭令各該管衙門加謹料理安插並一面移知督撫外所有兩次被風情形理合具摺奏聞謹奏覽奏知道了臺郡被風情形已據署督史貽直備悉奏聞矣雍正七年十月十五日巡視臺灣吏科給事中臣赫碩色兼理學政監察御史臣夏之芳謹奏為報明臺地收成分數米榖價值仰慰聖懷事竊查臺郡收成分數據該府詳據臺灣縣報稱該縣收成東北俱八分五釐縣南九分西臨大海並無田畝鳯山縣報稱該縣收成縣東八分五釐縣北八分縣西七分五釐南臨大海並無耕種諸羅縣報稱該縣收成縣東八分五釐縣南九分縣山縣每米一石銀八錢二三分榖價四錢諸羅縣每米一石銀八錢四分榖價四錢彰化縣每米一石銀七錢八九分榖價二錢二三分通臺民食充足地方安靜理合具摺奏聞仰慰聖懷謹奏覽同日又奏為報明看操日期仰祈睿鑒事竊查臺灣地屬海疆水陸軍務關係甚重每年舊例於秋冬間閲看水陸兩操兹據安平鎮副將祁進忠移送該鎮三營兵辨船隻清册到臣臣等隨於九月初九日公同閲看水師兵丁操演又據臺灣鎮臣王郡移送該鎮三營將辨兵丁清册到臣臣等隨於九月十一日公同閲看陸路兵丁操演水路軍務尚屬整齊嫺熟其盔甲器械現今奉旨另行修理更換巳據提臣藍廷珍委員遍將各營清查另造補換俟換齊之日臣等再細行查看至澎湖水師二營前據該副將陳勇報稱閏七月大風船隻多受損傷現經設法修理等因前來臣等正在行查並委澎湖通判王仁協同該副將查閲確報俟船隻修完册報到日另期閲操合併聲明為此具摺奏聞謹奏日前據稱營船多被海風損壞果如所言一介武辨將設何法以修理耶所奏朕殊不解硃批諭旨卷七十二
