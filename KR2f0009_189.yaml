body:
  text: 欽定四庫全書硃批諭㫖巻一百八十九上硃批張廣泗奏摺雍正六年二月二十五日貴州按察使臣張廣泗謹奏為恭請聖訓事竊臣至愚極賤由貴州黎平府知府荷䝉聖恩逾格著令署理貴州按察使印務未及一月復䝉特予補授聞命之下實切悚惶所有感激蟻忱已經詳懇署撫臣代題恭謝天恩外伏思按察使為通省刑名總滙而黔省更屬苗疆要地臣才識短淺一切措理恐多叢脞謹冒昧具摺跪求皇上俯賜訓諭庻臣於萬里之遥得以祗承天語時加惕勵恪供職守皆出聖主生成之賜矣為此謹奏覽奏謝知道了勉力奉公勿懈諸務必深知灼見後方可舉行若緣圖報心殷涉於孟浪有損無益過猶不及也當切以為戒雍正六年八月二十日新授貴州廵撫臣張廣泗謹奏為恭謝天恩事雍正六年七月二十二日臣在凱里附近地方行營接准貴州巡撫臣沈廷正咨准吏部咨開奉㫖雲南廵撫員缺著貴州廵撫沈廷正調補貴州廵撫員缺著將貴州按察使張廣泗補授等因欽遵轉咨到臣當於行營恭設香案望闕叩頭謝恩訖又於七月二十九日准調任雲南廵撫臣沈廷正咨准吏部咨開内閣交出奉上諭張廣泗現有化誨生苖等事其貴州廵撫事務仍著沈廷正署理令張廣泗得以從容辦理俟張廣泗到任後沈廷正再赴雲南新任欽此移咨到臣跪讀之下仰見聖主睿慮周詳無逺弗照臣欽遵逐一敬謹從容辦理務期蠢爾愚䝉咸通聖朝治化邊界良民永資寧謐以上副聖主軫念遐荒之至意除將現在辦理情形另行具奏外理合繕摺恭謝天恩謹奏覽奏已悉凡百不可固執惟以相機合宜為貴縱始初稍有見不到處一片忠赤報效之心自在慎毋回䕶前言勉强從事設或苗情頑蠢一時辦理過激致傷多命奏效雖速朕心有所不忍原係化外蠻夷非内地叛逆之可比也當仰遵訓諭詳慎為之同日又奏為奏明開通苖疆情形仰祈睿鑒事竊查黔省自黎平府以西都勻府以東鎮逺平越等府以南廣西之柳州慶逺等府以北中夾一段地方介於數郡之中延袤千有餘里寨分千餘人丁户口不下十數餘萬皆係生苖不服約束為害巖疆其逼近黎平者則為八萬古州逼近鎮逺者則為九股逼近都勻者則為八寨逼近凱里者則為丹江均係地面寛廣户口稠繁更為各郡要隘之區臣去歲於黎平知府任内奉督臣鄂爾泰檄令相機化誨曽兩至八萬古州曲加開導彼等已知凛戴願行内附隨僃叙情形禀覆督臣并臣今春奉調赴滇又䝉督臣面囑機宜委令從長布置勦撫兼施臣即遵照於五月内起程先抵都勻府料理八寨等處逐一宣揚我皇上如天之仁曉以歸誠向化之樂其有稍稱淳良者隨即匐匍行營矢願歸化臣當即重加賞犒申明約束嚴禁騷擾其中狡黠初懐觀望并欲妄行拒阻者迨畧試以威旋亦覺悟俱来投撫臣亦一體量加賞賚諄切宣示察其田土肥磽人户衆寡令其認納糧賦使知任土作貢之義并查明户口冊報督撫諸臣察核以及行知鎮逺文武各官就近將九股生苗相機化誨亦多感悟就撫將户口開造到臣合之臣所撫八寨共計大小二百三十餘寨男女共二萬餘丁口惟丹江一處倚衆恃險不遵化誨臣遣通事人等前徃再三曉諭始終執迷不悟且將欲行向化各寨多方阻截不容歸誠并將八寨内已撫之楊牌楊堯等寨設計勾串希圖反復及官兵臨境竟敢公然抗違益肆頑梗則是恩不能用非威不可矣臣隨飛咨請商督臣鄂爾泰并調任撫臣沈廷正提臣楊天縱意見僉同各𣲖遣官兵前来臣凛遵諭㫖從容辦理惟當慎重圖維敬謹匪懈擬將丹江一處𠞰撫竝施布置妥協則古州八寨以及九股等處其已就撫者自必懐徳之心益堅而尚在觀望者亦俱知凛惕咸可漸歸約束矣所有現在辦理情形理合繕摺奏明伏祈皇上睿鑒謹奏已差牧可登春山密齎敕諭來黔矣爾接諭後相機審勢加詳加慎為之同日又奏為恭繳硃批事雍正六年五月十四日據臣家人自京捧回臣恭請聖訓一摺奉有硃批臣跪讀之下如瞻天表感激悚惶仰見我皇上惟聖惟明執中建極訓誨臣工務期詳慎至意伏思人臣事久遽荷聖主特逹之知惟有勉圖報效今恭承聖訓加意提撕臣當字字精研言言省悟諸凡務求了然於心而後措之於事不敢輕蹈有過不及之愆以上副聖主格外造就隆恩下盡㣲臣駑駘之報於萬一也所有原奉硃批理合恭繳謹奏覽同日又奏為謹陳蟻悃跪懇天恩事竊臣父原任山東兗州府管河通判張鎬於康熙五十七年丁憂回旗候補於雍正四年䝉皇上天恩命徃水利營田效力因臣父奉委賣米有應交米價銀兩遲延日久始行繳納經總理水利營田使怡親王叅奏奉㫖交部議處昨閲鈔報内開刑部題為特㕘虧空等事將臣父擬以枷責等因具題奉㫖依議欽此臣跪讀之下戰慄惶恐感激涕零伏念臣父以閒廢之員䝉我皇上天恩錄用命徃水利效力臣以庸劣愚賤之人䝉聖主拔擢廵撫隆恩異數榮寵非常臣父子既受我聖主格外之恩今臣父有罪亦宜從重加倍究治乃復䝉皇上如天之仁僅將臣父予以枷責臣惟舉家頂戴何敢復有瀆陳但思臣父犯罪則臣係罪人之子何以表率寮屬忝任封疆又據臣在京家人禀稱臣父在順城門内枷號二旬因患病求保俟病稍痊再行赴部領罪尚未䝉准等語伏念臣父受皇上天髙地厚之恩不能竭力圖報自取重咎雖駢首待死亦罪所宜然惟是臣父年近六旬素有弱疾今復染重病若不能保出調養勢必旦夕就斃長戴此罪名以没世矣雖欲改悔遷善其道無由為此跪懇天恩將貴州廵撫員缺另簡賢員准臣赴京代父加等領罪或容臣遵㫖敬謹竭力辦理生苗事竣即星馳赴京代父領罪使臣父得以洗心滌慮痛加改悔則臣父子均沐我皇上賜以再生之恩自新之路雖捐糜頂踵肝腦塗地不能仰報於萬一也臣無任戰慄哀籲之至謹奏此奏朕嘉悦覽之殊不料張鎬生汝此等佳兒暨趙世錫生趙宏恩郭維莞生郭鉷皆屬竒事雖然人材後勝於前正乃國家之福也汝父之居心行事汝為其子自不敢言姑平心一思是耶非耶但既生汝如是為國宣猷奉公效力之子則諸過悉可抵除已有㫖盡寛爾父之罪矣至汝父之心行當以為終身戒萬勿稍蹈一二切湏砥礪操守若似汝父是所謂孝子慈孫百世不能改者雖悔何及謹誌朕恩莫致有負勉之勉之八萬古州之事設撤兵罷𠞰可以如舊相安當領悉朕意無庸勉强經營諭貴州廵撫張廣泗從前石禮哈署理廵撫印務時曽經摺奏古州八萬苗地不入版圖其人兇悍成性徃徃仇殺且時出擾累居民今各處蠻夷咸傾心向化獨此一隅未通聲教應請用兵𠞰撫等語朕彼時批伊摺内苗人愚悍仇怨相尋固屬可憫但興兵進𠞰戕害生靈朕心不忍豈可孟浪從事石禮哈遂奉諭而止頃因爾稱奉差經過其地苗衆歡欣接待禮體恭順僉稱願附版圖朕又訪之從滇黔旋京大臣等亦云夷情恭順誠然因思内地與苗疆莫非吾之赤子既有抒誠嚮化之心豈忍置之膜外是以准爾所奏專委撫綏以慰答苗情近聞爾在彼𠞰撫兼行諒因苗寨繁多心志不一有實心歸附者亦有中懐疑懼者不得已有干戈之舉也但倉猝脅以兵威未免多傷苗命且强所不願非朕本念今特遣翰林官二員前來宣示諭㫖伊等到時若招撫之事已竣則當加意綏輯倘或執述不悟切勿徒恃殺伐統俟從容化導以副朕胞與之懐為此特諭雍正六年十月二十二日貴州廵撫臣張廣泗謹奏為欽奉上諭事雍正六年十月十七日臣在八寨行營有欽差國子監司業臣牧可登翰林院侍講臣春山齎捧上諭一道到臣臣跪讀之下仰見我皇上天地為心胞與為量雖苗夷蠢類既不忍擯於化外尤冀其覆育安全臣雖至愚敢不凛體并又接怡親王暨大學士等寄到公字内開字寄廵撫張古州八萬苗人雖云互相仇殺出境刦奪尚無顯然抗違國法之罪祇因從前聞得招撫甚易聖意不忍拒之化外故令舉行今聞苗衆之心不一似非撫綏可以竣事但用兵𠞰滅盡收其地而將来料理措置亦非易言是以皇上特發諭㫖與廵撫并頒敕諭曉諭苗人令翰林二人齎捧前来若苗衆原欲就撫易於招徠不至大有誅戮則仍照廵撫前請施行或撤兵有不便之處亦就近商酌倘撤兵可行廵撫應將敕諭鈔錄宣示苗衆俟其敬謹恭迎然後將敕諭發徃一切事宜欽差與廵撫面加酌量廵撫不必因從前所奏存回䕶為難之心此事本應行文與鄂總督因滇省路逺徃來又需時日是以敕令欽差逕至廵撫處商酌諸事可以口悉也等因臣愈得詳細領畧伏查臣先於黎平府任内曽兩至八萬古州曲加開導已願内附隨將情形禀覆督臣鄂爾泰迨臣叨䝉天恩擢為按察使奉督臣調赴滇省面囑機宜議令𠞰撫兼施臣即前至都勻府之八寨地方布置并將黎平之古州以外生苗行令黎平文武從容化導以及附近鎮逺之九股清水江等處生苗亦行令鎮逺文武先為料理已陸續據報九股向化者十之七八其古州以外并清水江就撫者亦多所有八寨經臣親為區畫始猶觀望迨畧示以威即知悔悟歸附惟丹江一處竟敢抗違且將他處願歸寨分以强勢壓制不容前來經臣親徃開示復敢拒敵傷兵臣隨飛咨請商督撫提臣意見僉同各派遣官兵前來兹於十月初五六等日將八寨内倡首反覆之楊牌等寨及官兵已到猶敢附惡抗違之甲些者良烏歸也條等二十餘寨俱行懲創其餘竝未附和反覆者更加以奬賞撫恤并曉示首惡寨分業經整頓所有附和各寨既已知威仍准投撫隨俱匍匐投赴行營悔罪求生是八寨𠞰撫大局已定惟有謹遵聖諭加意撫綏務使得所俾共入版圖永沾聖化至於丹江苗衆臣正擬尅期前進𠞰撫兼施今恭接上諭指示諄切臣何敢徒恃兵力冒昧舉行因與牧可登春山等再四商酌思維暫緩進兵但恐苗性至愚未能驟曉大義目今不敢遽宣敕諭祇先將臣等之意再為詳切開導俟其少有省悟之機即恭錄敕諭宣示苗衆務令其明白感激實心恭順且使先經就撫各寨聞聼之下莫不羣思凛戴然後撤兵則於國體無損而於苗疆久逺之計亦大有裨益若復經開導之後始終抗違而竟停討問是彼既不知保全之恩又安解撤兵之意臣愚以為仍應進兵以示法紀縱有誅戮不過丹江内强暴頑苗而其餘聞風凛惕已就撫者懐徳益堅未就撫者咸思依附則懲創者少而保全者多也再據牧可登等恭述上諭此事應慎密欽此臣當敬謹凛遵但思此案原係督臣鄂爾泰總理其事況臣識見淺陋恐所籌畫多有未當鄂爾泰認理深細見事明決且怡親王等公字内亦開有此事本應行文與鄂總督之語是以臣不揣冒昧敬將上諭恭錄併鈔公字差員星飛捧齎交督臣閲看竝酌核臣現在所辦情形是否允協仍致囑督臣務湏慎密外自軍營至滇不過十二日可以徃返至臣遣去丹江曉諭之人亦約十餘日可以週到俟看丹江苗衆是否實心恭順抑或終於抗違即可酌定行止亦不至多遲時日臣當與牧可登春山等逐一敬謹商議總期妥帖辦理以謐苗疆緣接奉上諭事理恐厪聖懐謹將酌議辦理情由先為繕摺奏明伏祈皇上睿鑒謹奏古州八萬化誨生苗一事據各處奏報紛紛不一遣牧可登春山前來盖恐汝進退兩難或且暫緩徐圖之意今覽爾奏朕洞然無疑矣如果向化者十已七八止餘丹江一隅自不應獨留遺孽任其滋蔓分剖甚屬明晰朕深嘉之汝力能擔荷此事商之鄂爾泰伊何不樂從之有倘力不能辦鄂爾泰斷不令汝勉强從事也所奏嘉悦覽之諸凡惟宜慎重籌畫萬全而行勉之勉之觀此光景宣示飭諭之舉可以中止朕原命牧可登春山密齎前來與汝商酌者廷臣亦未與知今仍令二人齎回可也特諭同日又奏為奏明事雍正六年十月二十日准署理貴州廵撫臣沈廷正差委把總徐詔齎解銀二千兩到臣行營竝札開前將送徃軍前預備賞賚等項銀兩具奏今奉諭㫖張廣泗軍中如有所需當寛裕接濟俾不致拮据將朕此㫖即行通知令伊源源檄取可也欽此欽遵現在軍需浩繁從前齎送之銀為日已久諒不足用今特動支庫銀二千兩專委把總徐詔管送查收倘隨後再有所需祈即通知等因臣當查收訖仰惟聖主體念臣工纖㣲必燭且使因公措理不致稍有缺乏臣查調集官兵除每日支給行糧外其餘竝無需費惟奮勇出力之官兵并通事嚮道人等實心招徠以及就撫苗民俱應隨時賞賚之處不無所用已先准署撫臣沈廷正差送公費銀二千兩前來臣逐一撙節現在尚未用完乃今荷䝉諭㫖諄諄以寛裕為念臣益當欽承并有督臣鄂爾泰恭錄諭㫖通知事理臣謹繕摺奏明再據把總徐詔禀稱奉有上諭黔省現有𠞰撫古州八萬之事又協𠞰粤西不法㺜苗額設兵丁或不敷用著將湖南就近營兵酌撥一千名來黔聼候督提調遣并預撥荆州滿兵一千名前徃常徳府駐劄等因巳經行文到黔欽此仰見我皇上慎重巖疆布置周密查粤西㺜苗之事於九月内已經完竣至黔省生苗一案各處多願就撫惟丹江一處現在再為詳切曉諭冀其省悟倘若終於抗頑應行進兵則有臣所領官兵除酌留彈壓新撫之地方外尚餘漢土官兵五千餘名亦儘足前進丹江之用恐上厪聖慮合併陳明謹奏兵威壯盛方於事有濟切不可稍涉輕忽雍正六年十二月二十五日貴州廵撫臣張廣泗謹奏為恭謝天恩事竊臣前具奏懇請代臣父張鎬赴京領罪一摺奉到硃批臣跪讀九叩感激涕零伏思臣父身罹重罪既䝉天恩宥免而臣之愚昧尤荷訓諭周詳勉以終身戒以操守臣恭繹之下愈増凜惕在我皇上之矜全備至無非勸孝勸忠而臣父子履戴髙深敢不加儆加勵況臣以至愚極賤之人䝉皇上特逹之知授以封疆重任縱使肝腦塗地亦難少報涓埃乃更以臣父之罪䝉聖主格外寛宥至於此極嗣今以後臣父子惟有共相誓勉洗心滌慮省罪愆於既徃效犬馬於將來斷不敢自外生成以期仰副我聖主造就洪恩於萬一也理合繕摺恭謝天恩跪祈皇上睿鑒謹奏覽汝奏謝剴切真誠朕甚為嘉悦終身莫移今日此心可也但汝方值壯年䝉朕不次擢用又兼建立竒功切勿自恃致生驕傲胸中竟能忘此顯榮則髙天厚地斷無不錫鑒祐之理一切居心行事以鄂爾泰為楷模而效法之將來亦必為國家棟梁之臣也勉之同日又奏為奏聞事竊查丹江苗衆於臣復行曉諭之時仍敢將附近欲歸之苗民男婦綁擄而去强悖愈甚則是彼等自外生成若不稍加懲創何以儆遏悍頑為巖疆久安長治之計正據遣去化導之人回覆前來而督臣鄂爾泰回劄亦至内開丹江一帶生苗强悍殺刦為害地方兹奉上諭周詳仰見我皇上如天好生之至意我輩惟當凛體欽遵敬謹從事殺一良懦如殺眷屬觀縱一兇惡如縱狼虎觀𠞰撫竝用意主於撫庻幾殺亦為恩而恩可埀久等因臣當於十一月初九初十等日派遣官兵陸續分路前進臣於十一日亦親徃適中之烏耶地界調度聲援其奉派右路之定廣協副將蘇大有於二十日帶領官兵進至小丹江各寨所有頑苗俱堅築墻壕環繞迎敵經該副將奮勇爭先將小丹江各寨克取臣即乘勢於二十八日移兵進大丹江各寨或𠞰或撫俱於十二月初三初五等日布置就緒當有欽差司業臣牧可登侍講臣春山等於初七日前來大小丹江察看明白敬齎敕諭於初九日自凱里起程回京復命訖因尚有附惡之雞講等寨頑苗仍不悛悟臣隨派令官兵復於初十十一等日將雞講大小十一寨悉行攻克隨有接聫丹江之上九股以及附近山苗俱赴行營輸誠投撫臣逐加賞賚准其收錄至大小丹江雞講苗人從前之敢於抗拒者倚衆恃險以為懲創必不能加因而怙執如故迨見官兵經臨有如摧枯拉朽彼已伎無所用而又見凡來就撫者恩恤備至遂亦翻然悔悟隨於十四十五等日以後相率匍匐投赴行營悔罪求生認納糧賦願為盛世良民臣俱諄切宣諭一概准撫仍於科糧從輕事例從簡俾樂輸將而易遵奉所有苗民男婦現已復業安居即曽被攻燬寨分亦盡來歸故土其應因地制宜經久善後之處容俟臣與督提暨署撫諸臣悉心圖維擇人分任庻新闢巖區漸次寧謐而内地良善永沐安恬矣又黎平之八萬古州經臣化導在先并九股生苗於本年六七月間經鎮逺協副將張禹謨等亦漸次招撫在案但地廣人衆猶湏臣親身前徃宣布皇上仁威俾其依向堅切竝察議經久諸事以及附近鎮逺府之清水江一帶屢據知府方顯禀報情願歸附者已有其半臣當飭令從容開導善加撫循總期彼等共入版圖咸叨聖朝治化臣謹將辦理丹江就緒情形先行繕摺奏明謹奏嘉悦覽焉善後事宜與督臣鄂爾泰詳細商酌料理允妥以慰朕懐同日又奏為恭謝天恩事竊臣於開導苗疆一案已將丹江一帶料理底定臣一面安插招徠正在繕摺具奏間據臣標把總齎回臣前奏欽奉上諭一摺奉有硃批竝䝉欽賜貂皮湯羊哈密𤓰菓子平安丸到臣隨恭設香案望闕叩頭謝恩訖伏讀綸言欽承賜賚感戴莫罄奮勉靡從惟有益矢丹誠敬謹匪懈至於八寨丹江九股等處生苗𠞰撫事務甫竣臣尤當圖維善後之計請商督提署撫諸臣公同㑹核次第舉行不敢稍有忽畧俾仰副聖主期朂殷懐以展㣲臣駑駘之報而已所有原奉硃批敬封恭繳外理合繕摺跪謝天恩謹奏苗疆開通固屬不易而安插撫輯為尤難諸凡善後事宜正爾職分中之要務今日措置一分妥協將來省汝一分心力也詳悉籌畫為之雍正七年正月三十日貴州廵撫臣張廣泗謹奏為奏明事竊臣於辦理開通生苗一案已將八寨丹江雞講九股等處𠞰撫就緒并此外之八萬古由於雍正六年十二月二十五日在丹江行營具摺奏聞伏查丹江八寨等處均屬要區今開通既定其一切善後事宜闗係綦重是以臣備叙情形咨請督臣鄂爾泰詳核指示去後嗣准督臣覆稱設鎮安營建官畫界等事必湏面商熟籌庻為久安長治之計非可約畧輕易亦未可懸擬遥度應即接印視事以便署撫沈廷正赴滇到任鄂爾泰方可起程來黔面議種種等因臣未便躭延因自行營旋省於本年正月十七日抵廵撫任接印視事業經恭疏題報外現在新附八寨丹江九股等處酌量險易分委定廣協副將蘇大有鎮逺協副將張禹謨都勻營叅將趙文英長寨營叅將官禄統率官兵彈壓拊循俱各寧帖惟俟督臣鄂爾泰不日到黔㑹商妥協當如何措理另摺宸𠂻至臣荷䝉聖主逾格隆恩由知府㣲員於一年之内擢授廵撫夙夜冰兢實深不能勝任之懼兹值苗疆事務初竣尚湏料理又未敢冒請叩謁天顔親承聖訓謹將臣旋省到任情由繕摺具奏竝跪懇聖慈訓誨指示庻㣲臣有所遵循不致隕越統祈皇上睿鑒謹奏常思不辱朕用人顔面則一語可行之終身矣雍正七年七月二十二日貴州廵撫臣張廣泗謹奏為奏明事竊照清理苗疆一案仰頼我皇上仁威逺播兼䝉訓諭周詳臣欽遵逐一敬謹辦理得以漸次就緒嗣於本年三月初七日督臣鄂爾泰抵黔省臣將前後所辦之處竝苗情地勢面述請商又荷督臣確核裁示臣諸事更獲依循當於三月二十七日自省起程復徃鎮黎各郡察勘布置業經恭疏題報在案查八寨丹江九股等處既已料理告竣此後應接聫布置者則係清水江縁江之南北兩岸寨分稠繁人丁衆多所有北岸各寨臣於駐劄丹江之時即令鎮逺文武相機招徠已俱就撫而南岸各寨頑良不一尚在觀望是以臣檄委鎮逺協副將張禹謨帶領官兵公同鎮逺府知府方顯前去將已撫北岸各寨地方察勘宣諭即可體詢未撫者之向背情形及張禹謨等逐漸進至柳羅駐兵對臨南岸即有公鵞寨苗衆聼信漢姦唆撥遂勾結柳利雞擺尾等二十餘寨渡江攻營當被官兵迎殺頑苗數十人我兵亦傷亡十九名臣聞報㑹商督臣一面飛飭張禹謨等加意固守臣即一面星馳前去自臣到營之後該苗人等斂跡不出無敢復過江者又有柳利苗人不招自來喊求叩見臣知頑苗已有畏懼渙散之意遂分遣通事人等潛徃各寨解其黨羽公鵞遂成孤立而防守亦懈臣於五月十四日子刻先令勁卒善水者乘霧浮江而過奪取其船官兵由上游渡江奮勇攻殺頑苗不支俱各奔竄十五日又邀同雞擺尾等寨前來攻營復被官兵衝擊頑苗傷斃甚衆大潰而返始知畏懼求生縛獻漢姦繳納軍噐匍匐投誠殆無虛日又江北岸有平夏一寨向來肆惡無比於去歲官兵清理苗疆之時猶敢殺擄順洞糧苗難以姑宥臣亦乘機發兵嚴加懲創仍令繳納鎗械并擒獻兇首發審在案其餘未歸各寨俱望風歸化約可萬户臣隨傳集苗衆人等宣布皇上天地覆載之恩不忍一介蠢頑棄置化外之至意該苗聼聞之下俱歡忻曉悟查清水江兩岸新附之區即接聫九股丹江延袤千有餘里布置甫定其防維綏輯之方必得賢幹大員始克勝任臣隨請商督臣𣲖令新陞鶴麗鎮臣蘇大有前來臣將諸凡事宜詳細諄囑即於六月二十五日從清水江起程前赴黎平料理八萬古州事務再臣於五月内在清水江行營接據駐劄丹江副將官祿禀報丹江内之桃繞等寨苗人聽信漢姦殺害差兵通事并糾衆乘夜衝營經官禄指揮弁兵將頑苗擊退等情臣隨抽撥官兵五百餘名著令馳去以資防禦而督臣亦自省耑委安籠鎮臣哈元生前赴丹江相機調遣今該苗等巳縛解漢姦呈繳鎗械又認罪求生并願拏獻兇首各緣由現在定擬完結所有一切情形緣督臣現駐黔省已不時摺奏以及𠞰撫生苗就緒之處又經㑹疏題逹在案是以臣不敢冗贅上瀆宸聰謹將臣察勘鎮黎邊境竝料理清水江事宜繕摺奏明謹奏鄂爾泰亦經奏聞矣朕懐深慰此事之成功就緒皆仰賴上天埀祐鄂爾泰暨汝一念忠誠之所致但嗣後一切措置尤當加意圖維毋涉輕忽倘少不妥協豈但前功盡棄且將貽笑於天下後世其害可勝言哉敬慎為之同日又奏為奏聞事竊查黔省今嵗夏田情形併豆麥春蕎仰荷皇仁收穫豐足業經督臣鄂爾泰於五月内查明分數具奏在案臣以察勘苗疆於三月二十七日自省起程經過沿途地方正當播種之際雨水即已霑足迨抵行營駐劄目覩苗民栽插晴雨應時青禾秀發嗣臣布置清水江已竣前赴黎平更見早稻已有收割者其晚稻皆頴栗堅好逈異尋常有莖長七八尺者有兩岐者又有兩穂三穂至於徧畝者臣凡到一處即詳悉詢問據民苗人等歡呼禀述以為從來未有之竒且非特郡縣之間景象如此即僻逺苗寨以及新撫夷蠻之地臣或已親歴或遣人探查咸以十分豐熟見告兼據司道等禀稱上游五枝苗有獻嘉禾者一莖竟至十二三穂此不獨邊地所未覩尤屬遐邇所罕聞因奉有特命停獻嘉禾諭㫖臣不敢恭進所有臣親歴各處目擊豐稔情形理合繕摺奏聞伏乞皇上睿鑒謹奏所奏欣悦覽之似此異常嘉禾實屬難覯如尚有存留者附便進呈仍不必題奏同日又奏為恭謝天恩事雍正七年三月十七日臣家人捧回臣因臣父張鎬獲罪荷䝉聖慈宥免敬攄蟻忱恭謝天恩一摺奉有硃批竝䝉欽賜貂帽孔雀翎袍褂寧紬又䝉特給奏摺匣四箇并鑰匙二枝到臣當即郊迎至署恭設香案望闕叩頭謝恩訖伏讀硃諭以臣建立竒功切勿自恃致生驕傲胸中竟能忘此榮顯則髙天厚地斷無不錫鑒祐之理欽此竊思開通苗疆一事實由我皇上聖徳神威徧播遐荒一道同風所致又加以督臣鄂爾泰敬凛宸衷處置安詳指示明晰臣不過遵奉而行兼之凡有宣力之處又皆將弁軍士各供驅䇿共矢勤勞逐漸經理就緒臣何敢靦顔竟居功之一字而自恃驕傲耶又伏讀硃諭一切存心行事以鄂爾泰為楷模而效法之將來亦必為國家棟梁之臣也欽此伏惟鄂爾泰忠誠素著學問淵深處事剛明率屬公正臣向在其屬下遇事多承啓廸今更欽承聖主造就殊恩指示效法臣惟愈加凛體於察吏安民之道存心行事之間竭力歩趨虚衷則效縱臣智識不逮或冀仿彿獲有寸益則可無負聖訓即㣲臣亦得漸就成材勉圖報稱也為此叩謝天恩竝繳硃批謹奏古人云有為者亦若是如此矢志甚好近日朕於後進撫臣中深有望於汝與金鉷二人也勉之同日又奏為恭謝天恩事雍正七年四月十五日臣標把總捧回臣於抵廵撫任後具奏一摺奉有硃批竝䝉欽賜果子二匣到臣當即恭設香案望闕叩頭謝恩跪讀祗領訖仰惟我皇上至誠臨御凡所以䇿勵臣工之處無不委曲諄詳從來君明則臣良我皇上為堯舜之君當必有臯䕫稷契之臣庻以贊佐聖治於萬一如臣猥以庸愚叨荷封疆重任臣縱不自愛獨不懼為盛世之羞乎且臣以外任㣲吏半載之間遽邀簡擢殊恩逈逾常格臣之賢愚實有闗我皇上知人之明今䝉聖主期朂至此臣跪讀涕零不知所云嗣此以後惟有恪遵訓諭時時凛惕竭盡駑駘期於始終匪懈而已臣不勝惶恐感激為此繕摺恭謝天恩謹奏汝能深體朕之苦衷夫復何諭但加勉言行相符莫辜負殷殷期望也同日又奏為奏明事竊臣有堂叔張鈺係候選知縣職銜於雍正五年三月内欽奉上諭興修江南水利一案具呈吏部帶領引見命徃效力臣知其外貌雖屬可觀而向來舉止乖張性情疎謬但思彼既䝉聖恩揀發或知檢束自愛漸就成材臣以相隔遥逺不能深悉惟於江南徃來便差有認識者留心詢問據云頗不安靜且因臣荷䝉簡擢廵撫之後即在江南以臣係伊子姪為辭向人招揺雖尚無實在款蹟設有愚昧無知之輩遇事輕聽入其術中則臣罪莫可逭矣臣查張鈺已經原任山東撫臣陳世倌於題明各員分委過工程效力縁由内稱候選知縣張鈺賦性浮夸不便留工委用應令回旗以聼部議等因聲明具題在案何竟仍事淹留招揺無忌為此具摺陳明仰懇皇上俯賜敕部飭查張鈺如尚在江南應行督撫催令回旗拘管約束庻妄誕之徒不致滋事㣲臣得免逺顧皆我聖主格外矜全之賜也臣不勝惶恐激切之至謹奏覽奏朕甚嘉之為大臣者當如是居心也雍正七年八月初六日貴州廵撫臣張廣泗謹奏為恭逄竒瑞疉見謹據實奏聞仰祈睿鑒事竊臣前因察勘苗疆駐劄黎平府時接據思州府禀報府治於七月初八日有慶雲呈現嗣又據禀報初九初十十七十八二十二等日俱見慶雲異彩竒形官民驚喜實為上瑞等因迨臣前進古州行營又據黎平協副將趙文英禀稱於七月二十五日在生苗梅得寨之後山忽覩祥雲自未至酉光華燦爛映射旌旗等語及臣旋省正值萬寶告成之後據各屬紛紛禀報齎驗前來稻穀有毎莖十餘穂者有兩歧三歧者有髙七八尺至於徧畝者甚至髙梁亦有五歧六歧者小米有穂長二尺并二十四穂者他如秋蕎紅稗以及菜蔬瓜果之類咸俱發育茂盛且非特郡縣内地一概如是凡深僻苗地并新開之丹江八寨九股清水江古州各處亦皆十分豐稔逈逾尋常是皆我聖主至誠感孚以致太和洋溢疉著休徴徧處陽春年書大有皇猷懋建永永無既也臣犬馬寸衷歡忭無似所有據報慶雲已經督臣鄂爾泰㑹疏具題在案至於嘉禾瑞粟等項現在通查各屬俟秋收之後統行彚核奏報謹將臣目睹竒瑞豐稔情形據實繕摺奏聞謹奏以手加額覽焉斯皆卿等竭誠奉公感召所致慶幸之懐筆難悉喻目擊響應之理當愈加寅畏勉勵公忠以仰答天貺可也同日又奏為奏明事竊臣前以察勘苗疆竝將清水江布置就緒以及親赴黎平料理古州事務縁由業經繕摺奏聞昨臣已抵黎平將附近古州之岑梗梅得兩寨頑苗令副將趙文英領兵進𠞰苗等畏懼俱已繳械投誠其古州苗人咸各相率就撫所有新闢地界經臣身歴目覩悉心體察其形勢險阻而又貼近腹裏之區綿延周匝統計有二三千里已居黔省舊管幅員十分之七兼之大小寨分聫絡相應男婦丁口更為稠蕃今既循次開通則彈壓撫綏必當詳慎周密有應向外控制者有應深入扼據者在目前新苗初定我兵心力宜使聫聚不可渙散應先安設大營次議分布塘汛所有營制臣業與督臣再四酌議共需兵八千名除於各協營可以抽減二千餘名外尚應請添兵五千餘名再此等處所若以地界遼濶户口衆多而論本可設立二三郡但苗夷初歸祇湏約束拊循事務頗簡若設立府縣正印官徒増經費且新開之處一切經理創作尤藉資附近之各府地方若遽行分割另立郡縣則新疆與舊轄官民人等俱未免岐隔不能聫絡是以酌議即於鎮逺黎平都勻三府各添設同知通判等官俾以理苗之責專駐其地既為府佐不獨於新疆治理有益凡係該府舊轄之處該丞倅亦呼應得靈兼可使民苗情勢相通日就觀感并擬於黔省下游請添設一道員以統轄之俟撫綏約束二三年之後法制既行勸施有效另當分疆畫界以定郡縣規模再俟數年地方大定則將所安八千兵丁之内亦可酌量抽減也臣察議如此因科塲屆期而督臣鄂爾泰來黔已久兼有老撾國輸誠進貢一事亟湏回滇料理臣當於閏七月初七日自古州起程於十八日已抵臣署又將措辦情形暨所議之處向督臣詳細講論督臣意見亦同現在備叙諸凡事宜開送督臣稽核另行㑹疏恭請聖鑒指示以便遵行外督臣即於閏七月二十一日自貴陽起程回滇訖合併奏明謹奏設官安營各事宜㑹題到日交部議覆有㫖同日又奏為奏明事竊查黔省上游之貴陽安順威寧三郡素稱産米之區所以向來積貯亦多而下游之平越都勻鎮逺思南黎平等府産米有限所以向來積貯亦少經前署撫臣石禮哈議將下游米少之府州縣舊存米二千石者再買貯一千石舊存米不及二千石者俱買足二千石通計下游府州縣共十五處應買補米一萬五千一百石并將上游貯米太多之府州縣除酌數留貯餘則出糶以免朽腐之虞業已部議允行嗣因去年米價髙昻難於採買又經前撫臣沈廷正咨部展限接准部文令於今年秋收後查明時價報部買補等因是此一萬五千一百石係應亟為購買毋庸延誤也但黔省年來屢次動兵暨清理苗疆一案多於下游各屬撥用米穀則前有之存貯已為空虛且現在新開之苗疆等處俱各駐劄官兵所需口糧尚應源源撥給是於原買補之外更湏分别再為多貯庻不致有匱乏應請俟秋收米賤之時於附近八寨丹江之都勻麻哈清平等府州縣附近清水江九股之鎮逺黄平施秉等府州縣附近古州之黎平開泰等府縣各分别添買米數千石及一二千石不等以備供支竝為儲蓄之用臣於旋署之日即面商督臣竝與司道等詳悉妥議意見僉同縁秋收將屆若俟奏請部覆到日恐致躭遲是以一面酌動藩庫銀兩發交各該府州縣將原行買補暨議請添貯之米均照時價採買其動過銀兩買米價值數目另行詳核具題外臣謹先行繕摺奏明再黔省地處遐邊額賦無多所以耗羡甚少凡有一切必不可已之公費恒苦不足臣抵任以後曽與司道等詳為籌畫適值督臣來黔亦以為宜圖所以裨補之法查上游之銅厰鉛厰等項俱係聽民開採官不過照例抽課毫無稽查以致其間有當加以調劑俾有起色者有應釐剔積弊者并可倣照滇省買運銅鉛之例動帑收買發運四川地方轉售臣已面請督臣指導即經委員前徃確查措辦頗有頭緒現議在於附近各厰之畢節縣開爐鼓鑄所需銅鉛籌備足用之外逐漸經理既使商民稱便并可節省錢糧兼有餘息通計毎年約可得數萬兩實於國帑有裨公費有濟今督臣已經回滇臣復公同司道詳細酌議開送督臣再加稽核會疏題報理合一併附陳統祈皇上睿鑒謹奏籌畫甚屬妥恊照所議行具題到日有㫖同日又奏為奏明事竊查向隸川省之遵義一府并所轄正安遵義桐梓綏陽仁懐五州縣因去川省甚逺離黔省頗近於敬陳黔蜀粤西三省調劑疆域等事案内奉㫖改歸黔轄以資治理官民稱便緣該府在川時有安插流民查丈田畝一案荷䝉欽差到川分定處所公同各該管道員辦理嗣以遵義歸黔經川撫臣具題交與黔省查照措辦即經前署撫臣沈廷正檄委貴西道王廷琬前徃督率各該地方官逐一清查去後臣於本年正月抵任因安插查丈事務闗係重大復檄調該道至省細詢情形查遵義一府切近黔地於明末闖賊之變受害猶淺是以民多土著在從前田地雖亦有荒棄者今太平日久多已自行墾闢少有閒曠别省之人入川者見其地無荒可墾不能駐足皆過而不留現在遵屬竝無流民應予安插者惟田畝一項欺隱實多當與川省一體查丈辦理臣當將欺隱弊端備細諭明該道令其詳慎清查去訖迨該道抵遵之後實心區畫勸誡該府州縣等亦皆黽勉奉行士民俱各踴躍遵從所有從前欺隱糧賦各行首出其一次舉首未盡者首至兩次三次至一切插荒墾占朋名立户包免免荒詭寄飛灑混列四至捏造契照等弊悉已逐一清釐咸予更正現據該道禀稱遵義一縣將次告竣正安桐梓綏陽仁懐四州縣俱有成局因遵屬田畝向不按畝定額祇論榖種科料今既經首出欺隐清釐諸弊正當乘此將糧户的實姓名田地坵段畝數弓口四至俱逐一分晰里甲攢造魚鱗冊籍毋致仍前訛錯遺漏庻官民永逺遵照以仰副聖主恵育羣黎之至意除俟科塲事畢臣檄令該道再徃督率經理完竣另行㑹疏題逹外所有現在辦理情由臣謹繕摺奏明再查遵屬州縣向在川省輸納錢糧火耗係按加三徴收起解歸公又於正耗之外有幫貼一項毎兩自五分一錢以至二錢五分不等黔省火耗毎兩自加一加一五以至加二而止再無絲毫加派是遵屬較之黔例毎州縣徴收火耗幫貼核算竟有加五五者實為偏重在從前民間田糧多有欺隐尚不為累兹既清查増額似宜量予輕減且按川省清查原巻亦有查丈清楚火耗可以遞減之議今臣與藩司議令遵義各屬火耗俱照黔省加二之例徴收至幫貼一項本應豁除因細詢該州縣地方實在尚有不可已之經費故酌定除完正耗外毎兩只暫收幫貼銀五分俟清丈之事告竣并諸務興舉之後即當革除與黔例同歸畫一公私均獲裨濟矣理合一併附陳統祈皇上睿鑒謹奏具題到日另有諭㫖遵義一府雖改歸黔省諸凡措辦處必與川省畫一方合不宜參差互異也若川省之所料理或有不協當一面密咨商酌一面奏聞請㫖雍正七年九月十六日貴州廵撫臣張廣泗謹奏為奏聞黔省年歲大有情形竝米糧價值事竊黔省今歲自春涉夏以至秋成雨𤾉時若百穀豐稔業經臣兩次摺奏兹奉到硃批所奏欣悦覽之似此異常嘉禾實屬難覯如尚有存留者附便進呈仍不必題奏欽此仰見聖主惟誠惟敬不言祥瑞而重念民依無時或釋之至意然臣彼時所奏係就鎮逺黎平兩府經由目擊者而言迨臣於閏七月内旋省之後據通省地方文武紛紛禀報無論漢土苗疆髙低原隰所種稻禾以及黍粟等類莫不蕃實暢茂嘉禾瑞穀難以悉數其稻穀則自一莖兩三穂起至十五六穂不等其粟米則穂長一尺四五寸至二尺不等更有稻穀一本三十穂者粟米一本四十八穂者甚至一穂之上復生為六岐九岐者不獨天末遐邊從來未見即中州沃壤亦所稀聞是皆我皇上敬天法祖念切民依至誠感召之所致理應據實奏聞請㫖宣示中外備書史冊昭埀萬載以光聖治除㑹同督臣另行繕疏題報竝將嘉禾瑞穀敬貯萬八千穂繪具全圖委官領齎恭呈御覽外臣謹繕摺奏明再收成之後所有通省米糧價值毎石自四錢起至五六七錢不等即産米頗少之處毎石亦不過七錢以至八錢有零合併奏聞統祈皇上睿鑒謹奏據奏黔省秋成大有情形朕懐曷勝欣慰以手加額覽焉同日又奏為懇請題逹叩謝天恩事竊查雍正七年五月内准到部咨欽奉上諭各省督撫提標俱倣照八旗兵丁之例按兵丁之數分别給賞銀兩交與該督撫提督委員料理營運以恵濟兵丁臣標兵丁一千三百八十名䝉恩賞銀六千兩又於雍正七年七月内准到部咨欽奉上諭數年以來甘肅四川雲貴廣西五省有用兵等事其一切軍需皆動公帑備辦秋毫不派及於民間而糧餉轉輸亦有資民力將貴州庚戌年額徴地丁銀七萬四千有竒特予蠲免各等因欽此臣隨先後轉行布政司暨臣標中軍遊擊通飭遵照去後迨於八月初六日臣入闈監臨又接到部咨内開奉㫖黔省鄉試文舉中額加増六名武舉中額加増三名等因欽此臣復欽遵行司出示曉諭在案昨以試事告竣掲曉臣出闈之時正值多士雲集在省合同耆老兵民人等赴臣衙門伏地歡呼懇臣代奏并各具呈由布政司中軍等衙門詳請代題叩謝天恩前來除各照例具本題逹外臣目覩輿情感戴實深欣慶之忱理合繕摺奏聞謹奏睹兹軍民士子感戴情形我君臣愈當共加黽勉檢身敬事絲毫勿涉驕矜恣肆若少存自滿假之心必招不知足之報此理實㨗如影響也戒之慎之雍正七年十一月二十六日貴州廵撫臣張廣泗謹奏為恭進稻孫靈芝事竊照普安州地方於收穫之後復長瑞穀并據都勻府送到苗地石上所産靈芝恭逄萬壽聖節官民稱慶望闕嵩呼各情由業經臣㑹同督臣鄂爾泰另疏具題在案伏查他省田土或有一歲收成兩次者皆因地煖早收復行播種所致黔中土薄性寒雖稻穀之成熟有早晚不同而從來未有播種兩次者今普安州所屬竟以遺留在田之稻根自發禾苗不藉人力不費耕耘漸至成熟且盈阡滿陌復覯豐稔是誠農祥竒特自有書契以來所未載者至於芝草之生古來稱為上瑞紀述亦繁或係依附草木或係叢生於地今都勻府齎到靈芝乃全不附藉於草木竟從石上雙幹挺生長幾盈尺且其芝盖連理五色煥彩是誠我皇上萬年仁壽之徴全黔民物之慶臣犬馬愛戴㣲衷莫可言喻敬將稻孫靈芝耑差臣標把總捧齎恭呈御覽伏祈睿鑒謹奏覽所奏并齎來稻稆芝草朕實為欣慶我君臣惟凛敬畏之誠毋致稍縱乃志從來休咎共域禍福同門皆在人之自取書曰天難諶命靡常曷可一時不慎耶睹斯影響之昭示益驗感召之㣲妙能於幽獨處不愧庻幾立身之本得矣勉之同日又奏為奏聞事雍正七年八月二十日據黎平府知府張鉞黎平協副將趙文英公同報稱卑職等奉委帶領官兵在古州駐劄撫綏於本月十五日有土通事楊士竒禀稱在營盤外檢著布包一箇内係散碎銀兩不知何人失落不敢隐瞞特送臺前收明俟原主找尋給還等語至下午時分有利洞苗民老頓等五人赴營禀稱同夥賣猪肉生理共有紋銀十三兩三錢零本日早間失落今知有人拾得送官懇為查給緣由隨檢閲包内數目字記相符當即給還而老頓等感激楊士竒以銀二兩酬謝楊士竒亦不肯受卑職等當將楊士竒奬賞以彰善俗理合報明等情又於九月二十四日據署貴定縣知縣陳以明報稱本月十九日據縣城鄉約鄧起龍等禀稱本日係趕場之期有民人王明在場失落銀包一箇内銀三兩零竝契約一紙遍場尋找忽有麥董寨狆苗阿羅認承拾得銀包憑著郷約等當衆開看銀數契紙俱合即行交還王明願請酒謝銀伊竝不要如此見財不取衆民歡悦只得具報等情卑職一面給以花紅合將緣由具報等情據此經臣先後檄司奬賞竝飭各該地方官給予匾額以示奨勸外伏思楊士竒係苗邊土役其阿羅係夷狆之流生性最重貨財乃竟能拾金不昧却辭謝資咸知好義誠由我皇上聖徳感孚潛移黙化所致臣曷勝欣躍謹繕摺奏聞謹奏據奏邊民有好義之誠朕深為嘉悦候另有諭㫖同日又奏為恭繳硃批叩謝天恩事竊臣家人自京捧齎奏摺匣回黔竝䝉欽賜貂皮大緞寧紬哈密𤓰到臣臣郊迎至署望闕叩頭祗領訖隨敬開摺匣有臣具奏黔省慶雲以及豐稔情形一摺奉有硃批臣跪讀再四不勝敬慄伏思整理苗疆之舉總由聖主徳威遐播且非祇寧謐巖疆奠安庻民而已俾此數十萬之愚䝉從古未霑治化者一旦超出沉淪共為赤子所以上協天心休徴疊應用慰我皇上憂勤懐保之至意所有苗疆一切善後事宜臣惟恪遵聖訓加意敬謹辦理不敢稍有疎畧即督臣鄂爾泰雖在滇省百凡告誡備極周詳近因前赴粤西尤以各處行營駐劄文武各員不能和衷不能鎮靜為慮諄諄致臣就近提撕其札開有云苗疆之役始急講者專在馭將將果得人而苗不必患矣又云駐劄苗疆諸将湏頻頻告誡勿玩事勿生事勿爭大敵當前不難操縱何況蚩蚩苗猓哉目下治苗專以不生事不啓釁為主所以上慰聖懐下安兵民保前功而毋貽笑者全在於是等語此人等俱各感戴皇恩和衷撫戢其出師兵丁内有因患病回營及差遣缺額者應行撥補并現在題請設立鎮營尚湏添募兵丁應上緊招募足額以及將來新兵所需礮位鎗械之類應預為估製凡此經提臣楊天縱昨遵㫖到省㑹考武舉之際臣俱逐一面商辦理又各處安設營制應建城垣臣已請商督臣若用磚石不但工費浩繁抑且動需時日今酌議概以土築量加堅厚即可經久以及官署營房先行酌給銀兩預聖主訓諭切至勉以寅畏朂以公忠敬承之下敢不凛宸衷垂注稍盡臣之職分也再臣原奏黔省應買貯米石并收運鉛斤以及辦理遵義府地方清丈田畝等事現在遵奉諭㫖逐一詳核另疏㑹題外合將奉到硃批五摺恭繳竝跪謝天恩伏乞皇上睿鑒謹奏覽硃批諭㫖巻一百八十九上欽定四庫全書硃批諭㫖巻一百八十九下硃批張廣泗奏摺雍正八年三月二十七日貴州廵撫臣張廣泗謹奏為恭懇聖恩揀發人員以資委用事竊照黔省現在州縣内除已於苗疆要地或例應揀選題補或因督臣遵㫖遞行題補所出之缺前於督臣鄂爾泰經由黔省時臣將人地相宜之員詳細酌量逐一開送督臣聽候確核會疏題請補授此外可用之材頗少至從前奉發來黔之試用知縣祇剩四五員知縣以下試用者亦僅五六員又俱已委署差遣凡有州縣等缺出毎致委署乏人伏查近准吏部咨開欽奉上諭㑹試中額廣至四百名其中必有可供任使之人而直省選拔貢生陸續來京亦可揀選教導而成就之以備庻官之用欽此仰見我皇上勤求吏治博攬人材至周至備兹黔省既在需員臣跪懇天恩准於㑹試中式之進士内并在部候補候選之知州知縣内敕諭揀選十餘員恭候引見命來黔省俾遇有州縣缺出分别繁簡酌量委署庻員缺不致曠延矣再查各府州縣之經厯吏目典史等官有耑司緝捕防範監獄之責至苗疆要區尤不可一日缺員并請敕部在於知縣以下之候補候選人員内亦行揀發二十員來黔以便遇缺借補委用庻臣得資臂指之益臣謹繕摺奏請伏祈皇上睿鑒謹奏有㫖諭部照所請揀選發徃同日又奏為奏明事竊臣自抵任之後撿閲巻宗欽遵上諭查得黔省各官於雍正三年起荷䝉皇上俯准分給養亷以來迄今數載實無上司仍受屬員節禮陋規之事惟養亷一項自廵撫以至州縣業叨聖恩賞給其餘佐貳雜職等員并各學教官從前俱未議給所當凛遵諭㫖悉心商酌况近今新設苗疆道㕔等官亦應給與養亷以及通省地方公務經費不敷均應從長調劑今擬將貴州礦厰所産倭鉛照滇省之例動帑收買運售除歸還課項外毎年餘息約可得銀五六萬兩仰懇聖恩即將此項餘息銀兩賞給黔省以為養亷之需竝一切公事之用則諸凡皆得充裕羣工均戴皇仁於無既矣臣謹與督臣備細籌畫暨司道等核議僉同謹繕摺奏聞所有公費養亷數目另繕清摺恭呈睿鑒謹奏各官養亷一節亟宜措畫但直省從無議及教官者爾此舉似有示恩沽譽之意將朕所諭密令鄂爾泰知之同日又奏為恭謝天恩事雍正七年十二月初一日臣標千總自京捧齎奏摺匣回黔䝉欽賜哈蜜𤓰一箇臣即郊迎至署謝恩祗受隨敬開摺匣内臣具奏黔省士子兵民同時叩謝天恩一摺奉有硃批又於雍正八年正月二十九日臣標把總自京捧齎奏摺匣回黔竝䝉欽賜御書福字一幅荷包一對菓子二匣臣即郊迎至署謝恩祗受訖臣又敬開摺匣内臣恭進靈芝暨稻孫一摺奉有硃批伏念臣本庸材䝉皇上賞賚頻頒復荷訓誨提撕至詳且切臣感戴之下惟有細心領㑹力圖步趨克去驕矜勉積敬誠以仰副聖主委曲告誡於萬一若臣稍存慢斁於立身之本有虧是臣上負訓㫖罪戾更何可逭乎為此繕摺跪謝天恩竝繳硃摺謹奏覽奏謝知道了砥礪操守為第一要務若稍失檢㸃毫髮有瑕朕實為汝惜之勉之毋忽雍正八年六月初八日貴州廵撫臣張廣泗謹奏為奏聞黔省夏田收成情形竝米糧價值事竊照黔省自去冬以迄今歲春夏之間雨水均屬調勻所有民苗布種麥豆春蕎油菜各項雜糧咸皆茂盛結實現在收穫已竣據布政司彚報前來查各府州縣收成分數俱有九分十分再入夏栽插之後雨水霑足稻禾挺秀并豆粟髙粱稗穀之類亦俱發育壯盛今已屆六月時雨不缺若於秋成之前再得時雨一兩次可期大有至於現在各屬米糧價值毎米一石自四錢五錢以至七錢不等麥蕎雜糧毎石自二錢以至四錢不等即産米頗少之區毎米一石亦祇八錢有零以至一兩不等臣叨任封疆目覩熙和懽忭靡既理合繕摺奏聞伏祈皇上睿鑒謹奏夏收分數已悉至於秋成尚早非肆志自喜之時惟當竭力加勉敬誠以待同日又奏為恭謝天恩事雍正八年六月初四日臣標把總自京捧齎奏摺匣回黔竝䝉欽賜錠藥一匣臣郊迎至署恭設香案望闕叩頭謝恩祗受訖隨敬開摺匣有臣恭謝天恩一摺奉到硃批諭㫖臣跪讀之下感激悚惶伏念臣一介庸愚仰荷聖恩於半載之間由知府㣲員㧞置廵撫臣敢不勉圖報稱時切奮勵惟限於才具思慮不能周到於事聖主訓諭期勉至詳至切臣少具心知敬謹凛體常念操守乃居官為人之根本若根本尚不能端正何以克承聖訓而無忝官守非僅辜負聖恩抑且赧顔於人世矣兹復欽承硃諭惟有益加敬凛觸目儆心矢竭血誠力圖報效庻仰副聖主提撕矜全於萬一耳所有㣲臣感激蟻忱謹繕摺跪謝天恩伏祈睿鑒謹奏果能言行相符朕復於汝何慮同日又奏為奏明事竊臣前奏辦理運售鉛觔所有節省餘息銀兩以作黔省公費暨増給各官養亷一摺奉有硃批臣跪讀凛承惶悚無地隨謹遵諭㫖敬錄密送督臣鄂爾泰領悉外伏查教官養亷一項縁先准部咨欽奉上諭今觀山東廵撫司道等官之私收陋規如故則他省或有似此欺隱私受者亦未可知在地方官薪水之資自不可缺但於屬員之手接受節禮陋規斷乎不可今各省内或有尚未分給養亷之員著各督撫悉心商酌一面辦理一面奏聞欽此欽遵仰見我聖主務期臣工謹飭亷隅使苞苴永杜之至意現在黔省自州縣以上凡有從前陋規節禮業巳盡行剔除惟查教官等染於積習於生童進學則仍收受贄見之禮以及補廪出貢丁憂起復等事莫不需索紙筆之費竊念士習為民風之表率而士子之優劣俱責成教官稽核舉報若操守不潔何能悉出於公是以臣遽將教官與雜職等一同議給養亷冒昧陳請乃竝未細思直省從未議及其勢難以周溥此實臣愚昧之咎悔懼無及斷不敢稍萌沽譽之念上負聖恩下滋臣罪也荷䝉聖主訓諭諄切臣不勝感激惶悚除俟督臣鄂爾泰再為妥核奏請外臣謹抒蟻悃繕摺奏明伏祈皇上睿鑒謹奏斯當深以為戒朕毎見凡存沽譽之念者必至敗名而後已稍懐市恩之心者必至被怨而方休設或不信試行看他日自知雍正八年九月十八日貴州廵撫臣張廣泗謹奏為奏聞黔省秋成豐稔情形竝米糧價值事竊照黔省秋成臣據署布政司接據各屬開報前來所有貴陽安順等十三府定番廣順等十四州貴筑龍里等三十三縣共計六十府州縣無論内地苗疆髙低原隰所種稻穀竝雜糧悉皆蕃盛結實十分收成至米糧價值貴陽大定二府暨所屬州縣毎米一倉石價銀自三錢二三分以至四錢有零髙粱蕎稗毎石自二錢以至三錢有零其平越都勻思南石阡遵義等府與所屬各州縣暨鎮逺府屬之施秉縣黎平府屬之天柱縣米價毎石則自四錢以至五錢有零即鎮逺府與所屬之鎮逺縣黎平府與所屬之開泰錦屏永從等縣銅仁府與所屬之銅仁縣思州府與所屬之玉屏青溪二縣暨威寧一州向來産米最少今米價毎石祇七錢以至八錢有零其雜糧價值均與貴陽等屬不相懸殊俱甚平減兵民樂利臣謹繕摺奏聞伏祈皇上睿鑒謹奏覽黔省秋成并米價情形深慰朕懐雍正八年十月十七日貴州廵撫臣張廣泗謹奏為奏聞大兵克復烏䝉府治情形仰祈睿鑒事竊照烏䝉猓衆搆逆不法并滇黔兩省調遣漢土官兵布置方畧等縁由經臣繕摺奏明兹於十月十五日酉刻接准安籠鎮臣哈元生咨為恢復烏郡飛報大㨗事内稱本鎮於本月初八日自得勝坡督兵進𠞰前至以那劄營有叛逆二萬餘衆竟在對面山梁張旗呐喊連站十有餘里我兵雖强幾有衆寡不敵之勢本鎮籌思非用竒兵曷克制勝是以兵分三路左右埋伏於初十日本鎮由中路對敵逆賊不虞左右伏兵兩路夾攻賊衆披靡大敗四奔我兵奮勇追殺連踏賊營八十餘座鎗礮打死不計其數追至稻田壩官兵奮力冒險殺過松林直搗巢穴恢復烏郡實為大㨗理合通咨等因到臣臣閲讀之下深為額慶所有大兵進𠞰烏逆克復府治情由理合據實繕摺差員馳驛奏聞謹奏據報克復烏䝉情形朕懐深慰以手加額覽之同日又奏為奏明事竊照烏䝉賊猓勾結東川鎮雄以及威寧所轄阿底之夷衆跳梁不法勢甚蔓延必湏多調漢土官兵始足聲援制勝今計督臣鄂爾泰𣲖徃東川一路漢土兵丁約有一萬五千餘名黔省經提臣楊天縱與臣先後遣撥赴威寧鎮雄者計官兵二千七百餘名從下游苗疆撤回上游協營竝提標兵丁遣赴威寧者二千餘名又督臣檄調滇省之漢土兵丁一千三百餘名來威應援合之黔省所調土兵四千餘名統計亦有萬人所需糧米除東川係督臣委令滇員經理接濟外至威寧一路需糧亦多闗係重大臣於據報之始即與司道定議就近將大定黔西平逺畢節等府州縣存倉之米撥運赴威六千餘石續又分撥三千餘石共足萬石之數專委貴西道賈擴基總理督運以共支威寧一路官兵無分滇黔計算可敷三月口糧嗣後如有不足再行陸續運送至於奮勇官兵并夷目土兵人等之輸誠效力者皆應臨時分别奬犒需費頗繁臣巳節次動支公費銀二千五百兩竝購備緞疋等項送與鎮臣哈元生行營收用其餘在於威寧畢節鎮雄各處有功效力之漢土官兵臣俱酌發賞需令該管文武分别給賞又從苗疆撤回之上游兵丁以駐防苗疆既久今甫經抽撤即赴威寧出師殊甚勞苦是以過省之日臣俱傳集慰諭并厚加犒賞該兵等咸各鼓勵踴躍所有上游倉儲既已撥運軍營今值秋成豐稔米價甚平昨經督臣囑商應行買備以資儲蓄臣現與司道暨各該地方官詳加酌定另為㑹疏題請外總之此等軍需事務固當籌備克裕而錢糧公項所闗亦不敢不慎重出納臣惟公同司道悉心料理以冀妥協所有措辦緣由臣謹繕摺奏明伏祈皇上睿鑒謹奏覽奏朕甚嘉悦舉凡一應軍需犒賞之項勿使冒濫而已自當充裕為是斷未有譴責汝等糜費之理若但以節慎錢糧為潔已免咎之良圖致令將士灰心地方不寧生民勞擾其間相去奚啻什伯豈節省數兩庫帑幾石倉穀遂能償其過乎誌之兹所辦俱屬妥協内惟苗疆撤回之兵弁又調赴行營止慰諭以空言安能鼓舞令其踴躍用命雖據奏稱厚加犒賞竝未聲明若何給與當傳宣諭㫖更為從優錫賚必使人人過其所望方愜朕懐作速酌量辦理具奏以聞雍正八年十二月初一日貴州廵撫臣張廣泗謹奏為奏聞大兵進𠞰逆夷連㨗情形仰祈聖鑒事竊照烏䝉猓衆不法所有官兵於十月初十日恢復郡治緣由經臣繕摺奏明嗣鎮臣哈元生駐劄烏䝉行營躧探搜捕陸續救回被難之兵民男婦大小五六百名口并傷故官弁之眷屬子女數十口又分遣漢土官兵令㕘將康世顯等由魯甸而至牛欄江邊以接應東川令遊擊曽長治等由龍門硐山攻打法漏􅋭以為鎮雄援助緣烏逆悖叛之後東川諸夷皆被勾連遂將東烏道路隔絶迨㕘將康世顯等領兵前抵江邊於十月二十九日有滇省遊擊王先等自東川領兵過江與康世顯等會合而東烏聲息始通其鎮雄營㕘將韓勲於遊擊曽長治未抵法漏􅋭之先已將逆目施額法漏并賊夷黨衆屢次攻𠞰暨搗其巢穴復由戈魁河銅厰溝一帶沿箐搜擒獲有賊夷男婦一千八百餘名口先將鎮雄界内賊黨𠞰撫安帖然後率兵前進烏䝉直抵伐烏闗甕迭􅋭等處相機布置於十一月初六日進取大闗雄魁與賊對敵連破牌柵五層賊人敗潰隨即克復其川省之領兵官李繼經等從筠連一路克取豆沙闗攻破小闗大闗與叅將韓勲官兵不約而同聲勢聫絡臣查烏䝉地方形勢深險除郡城之外其大闗米貼兩處最屬扼要所以於大闗之雄魁腦地方分駐通判米貼則改為永善縣并各安設營汛官兵以資彈壓自郡城失陷而大闗米貼俱被賊黨所踞前日鎮臣哈元生提師直進恢復府治今則㕘將韓勲等一鼓克取大闗所有米貼各夷一經官兵到彼諒必不敢抗違此皆仰賴我皇上天威逺播鎮將弁兵奮勇用命督臣鄂爾泰調度周詳之所致也現在川省官兵已經㑹合并准鎮臣哈元生咨稱復自烏䝉分兵三路拔營前進其逆猓遊魂不過藏匿溜筒江邊一帶巖硐深箐之内已布置周密四面搜𠞰等語則是尅日可靖餘孽大兵凱旋以上慰聖懐臣謹將大兵連㨗情形繕摺奏聞謹奏觀此情形事之克㨗實賴上天埀佑所致殊非人力之所能者同日又奏為奏明事竊照黔省下游苗疆安設鎮營各處官署營房逐一估計盖造其城垣乃保障要資尤闗重大現在清水江丹江雞講城垣已陸續報竣惟八寨古州尚在趕辦春初可以完工至於各處苗情均屬安帖祇有續行開通之都江山苗滾踪等寨毎毎潛行出没伏草傷人鎮臣蘓大有遣兵前徃究懲傷故千總一員兵丁十五名又有定旦革招等寨或於夜間潛來營盤左近放火以圖驚擾或於沿江零星伏草傷害貿易民人因之凡有緊要文移差使俱於各行營挨次撥兵䕶送昨據駐劄都江之黔粤將弁等禀稱十一月初六日有定旦營盤撥送臣衙門齎文差役赴來牛之兵丁回至髙孖地方忽有頑苗突出阻截於山上木石齊下兵丁立脚無地遂致傷損四十餘名等情由臣查都江乃黔粤河道通逹要區鎮臣蘇大有已於十一月十三日病故古州總兵之缺督臣業委領兵在黔之廣西桂林協副將董芳䕶理臣當飛致䕶鎮臣暨諄諭在事文武和衷共濟務將滾踪定旦革招等寨嚴行究懲現據報稱清江協副將趙文英慶逺協副將潘紹周已帶領官兵前徃布置諒此數寨遺孽不難𠞰除而巖疆水陸一帶自無阻隔之患矣再查上游長寨地方狆苗從前恃險肆惡幸於雍正四年督臣鄂爾泰殲其渠魁撫其餘從并安營設官彈壓比年以來得以寧謐緣長寨一營初係安兵八百名續因歸化設營撥去二百餘名除分駐各汛塘之外存城已屬無幾派遣苗疆出師者尚未撤回昨值烏䝉之事復經撥兵一百五十名前徃應援則是愈為空虛近聞苗人等因年嵗豐收照依俗例衆寨㑹合要砍牛數十條祭賽祖先等情臣思長寨自從整頓約束以來已厯數載未敢舉行此事今乘斯營汛兵單之際忽思仍蹈前習必非無故臣當密飭廣順州知州暨長寨營㕘將一面宣諭禁止竝留意稽查而提臣楊天縱亦委員帶兵二百名前去各該寨遊廵體探逐為示諭該苗人等隨俱凛遵中止但長寨終屬巖區撫戢之方不可稍致疎忽現在該營調徃烏䝉兵丁已先有撤回者提臣亦量留遊廵之兵暫駐貼防并傳喚各寨之管事頭人數名就近赴安順詢問若彼毫無詭異情迹則已倘果前日有何不法之念推詢得實臣當㑹商督提二臣設畫安揷妥善毋使得以作姦貽患也所有情形臣謹繕摺附奏伏祈皇上睿鑒謹奏一切安揷撫輯機宜悉心與督臣鄂爾泰商酌行之同日又奏為敬陳一得之愚恭請聖鑒事竊查直省督撫等衙門毎遇大計之期除卓異八法照例舉行外其不入舉劾之員俱密填考語送部部臣列定等次進呈御覽即於部内存記檔案未奉行知是各該員之優劣其本人暨通屬皆不得與聞而各督撫所註考語既係密填密送無從彰露或仍有徇情任意之私亦未可定今雍正八年分恭值大計之期所有黔屬各官除應附薦官二員不謹罷軟年老有疾才力不及等官十八員照例具本題達外其不入舉劾之員臣俱逐細密填考語送部應俟部臣列定等次進呈御覽之後即請㫖將所定等次飭部開列行知以便與原註各該員考語一併印刷粘單通知各屬俾其彼此優劣相形尤易觀感興起且其中才具操守互有短長使知一經考核悉達天聽則才具政事雖優而操守平常者必知儆惕加勉或操守雖好而才具政事中平者亦必力圖振作竝請敕諭督撫等將此屆所定等次俟至下屆考核之期詳慎稽覈如有自恃優等怠惰前修者不妨降為劣等如有悛改舊習奮勵上進者不妨陞為優等逐一據實填明出具考語送部以聽部臣考察不得瞻徇失實如此課職程能似可推廣聖主䇿勵臣工核實吏治之道於萬一也是否可行伏祈皇上睿鑒指示謹奏吏部議奏雍正九年二月十八日貴州廵撫臣張廣泗謹奏為奏明事竊照銅仁府屬附近三不管苗地坡東坡西各寨新經就撫緣係黔楚接壤之區督臣鄂爾泰前自廣西廵厯回滇路過長沙與湖南撫臣趙宏恩暨辰沅道王柔面議紅苗事務并經由鎮逺指諭銅仁府協等辦理之方嗣經湖南撫臣趙宏恩辰沅道王柔俱奏請奉㫖於上年十月内來至六里招撫措置准督臣知㑹到臣隨檄令銅仁協副將張禹謨酌帶官兵前徃適中之地駐劄彈壓并令知府姚謙公同楚員聼候撫臣趙宏恩將所招三不管苗地先行判劃黔楚疆界然後查明寨分户口作何設汛安兵與楚省營汛聫絡闗照竝一切善後治理事宜詳加妥議繪圖具覆以便咨商督臣確核飭遵去後續據該府協禀稱業將黔楚地界割定管轄傳集各苗目砍款賞犒宣述皇仁倍加歡悦現在委員分徃坡東坡西料理清編訖卑府協已於十二月初六日回郡容俟定議營汛諸務再行繪圖禀奪等情臣查苗人甫經歸附正湏大員在於適中之地駐劄料理停妥何得府協二人俱匆遽旋署甚為疎忽當即飛檄嚴飭乃忽於十二月二十一日據該府協會同禀稱親厯已撫之三不管各寨清查賞諭已畢復委令吏目張公佐把總張文炳前徃坡西核清糧銀編查煙户内因稿坪落唐等寨有命案兇犯石老明等該員弁勒要獻出詎石老明等硬不肯出邀齊落唐稿坪各寨苗子一二百人於十二月初九日早假裝來看上糧各執棍棒擁進苗目老求屋内將吏目張公佐把總張文炳登時打死在地隨去兵役一齊捉住理合據實飛禀等情到臣隨一面專委鎮逺府知府劉馳徃確查一面就近知㑹提臣楊天縱酌撥官兵以俟進𠞰續據劉禀稱細查稿坪等寨苗人起釁之由因吏目把總收糧太緊毎户索銀錢餘以致苗人銜怨滋事等語則是該吏目把總藉端勒索禍由自取該知府副將既未措置妥協俱即輕離又委託不得其人致起釁隙而臣之教誡不周致初歸苗人激令生事罪實難辭臣即將委查情由致明督臣竝咨請主稿㑹疏題㕘在案至原報所稱捉去兵役現已陸續俱行追出在該苗人等實因激成起釁是以被捉兵役尚不敢一有傷損但已經歸撫輙敢因事糾黨毆斃職官何可寛宥所有兇首以及隨行不法者必應擒𠞰示儆查現在黔楚調集官兵三千名以之直臨兇穴儘足遣用緣該府協與鎮筸鎮臣周一徳等㑹商彼處山箐甚大路徑叢雜并一帶均係新撫苗人凡未與附和者先湏曉諭安輯無使驚惶然後分布堵禦進𠞰庻兇類不致漏網可以一舉而定矣容俟布置完結另行奏報外合將據禀暨臣等委查辦理情由繕摺奏明伏祈皇上睿鑒謹奏其未與附和者自當先行曉諭安輯俾兇良有别諸凡慎為之不可輕忽從事同日又奏為敬抒愚忱恭請陛見事竊臣一介疎庸荷䝉皇上隆恩數年之内由知府簡畀封疆重任聖恩髙厚莫可名言臣感激悚惶實不知所措當恭承恩命之下警惕靡寧即擬披瀝誠悃叩謁天顔緣清理古州苗疆一帶尚未告竣繼以烏䝉用兵之事一切軍需應行料理是以輾轉稽延不敢冒昧奏請兹烏䝉首逆就擒黨類俱巳殲除而古州等處布置均各就緒臣俟布政使常安到任即當請商督臣鄂爾泰定期前徃古州等處逐加查勘所建城垣營房官署是否堅固合式所開河道是否通行無阻新議都江一帶安設營汛處所是否扼據險要以及所辦事務是否因地制宜悉合輿情可以埀久而無弊與鎮將暨該管文員等面為講論一切以資拊戢治理并就便前赴銅仁所撫之三不管苗地察看形勢悉心詳酌將諸凡事務備細請商督臣應辦理者即行辦理應奏請者即行奏聞務期巖區永靖章程不致疎畧以收寧謐之效伏懇皇上天恩准臣於苗疆廵厯既畢兼程赴京跪謁天顔恭聆聖訓不獨居官莅政之要臣獲以一一遵循即臣萬里瞻戀蟻衷亦得稍慰矣抑臣更有請者臣受恩深重未報涓埃毎清夜自思汗淚俱下伏查西陲正在用兵以臣駑鈍下質固不敢言可供驅䇿但臣年齒正壯且比年以來曽在苗疆行走於鞍馬行伍之間尚能努力倘䝉我皇上鑒察埀詢令臣前赴西陲軍前酌委效用俾臣得盡犬馬㣲勞尤出自聖主矜全造就之賜也臣謹繕摺奏請跪求俞允曷勝激切統祈皇上睿鑒謹奏所請俱可不必但盡職守何湏思及於分外雍正九年六月十五日貴州廵撫臣張廣泗謹奏為奏請聖鑒事竊照自京發遣各處罪犯徃徃途間㑹集擾累索詐一無顧忌於雍正六年内經河東督臣田文鏡於解犯排黨等事㕘奏犯人傅通索理等詐財辱官一案請將嗣後犯人酌定名數分起解送毎五名作為一起等因經部定議奉㫖通行欽遵在案所有黔省自雍正八年六月至今准刑部陸續發遣安插之偷刨人參罪犯計二十四起共一百六十餘名其有發遣雲南安插經過黔省遞解前進者亦屬相等緣以上人犯當日部中雖係分起遣解但毎遇一起内竟有二十餘名以及十餘名不等者或毎起内雖各祇數名而於分發兩三省之犯一日遣解如雲南貴州係屬一路仍致多犯同行又或幾起人犯兩三日内接連僉發而狡猾之徒明知伊同夥人犯後起即來遂於途間藉故延待因之逐漸擁集至五六十名之多一齊解送在各犯雖不敢似傅通索理等恣横不法之甚然人數既衆毎至一處需索酒食多討夫價擾累店民等項在所不免且犯人起解時例有鎖填註解牌甚明乃中途竟行開放不無疎脱之慮臣用敢據實奏請皇上俯賜敕諭部臣嗣後解犯務照定例名數分起僉發倘犯人雖係分發各省而總經由一途者則應酌量間日遣解免致擁集滋弊并通飭各省督撫轉檄州縣地方悉遵部發火牌火票將犯人照起解送前進務湏鎖如式不得私行開放及任聽狡延會集擾累倘有故違經督撫查出即行題㕘如此實力奉行庻解犯無滋擾疎脱之虞而地方有司亦不敢膜置怠忽矣臣謹繕摺奏陳伏祈皇上睿鑒謹奏該部查議奏聞雍正九年九月十五日貴州廵撫臣張廣泗謹奏為再抒下忱恭懇聖鑒事竊臣前摺奏請陛見并徃赴西陲軍前效力未邀俞允嗣值督臣鄂爾泰奉有諭㫖著令赴京陛見現在署督臣髙其倬尚未到任臣又不敢冒昧題請趨覲天顔惟念臣謬叨特擢重任更屢䝉聖訓周詳臣獲以凛承竭蹶駑駘勉供職守其實未效涓埃伏查黔省連年豐稔民情豫暢所有苗疆各處業俱布置開通暨臣昨徃察勘諸凡規模治理雖驟難竝埓内地而亦均有可觀且署督臣髙其倬不日赴任過黔臣即將黔屬邇年之吏治苗情一切事務詳細備述以便面為核商并俟督臣鄂爾泰赴京抵黔之日臣亦將諸事與夫苗疆善後要務請商酌示俾可就近督飭各該文武等措辦以期妥帖不致稍有疎忽上厪宸懐臣用敢再懇我皇上俯賜准臣俟署督臣髙其倬任事三兩月後諸務就緒臣於明春二三月内赴京得以瞻謁天顔恭聆聖訓庻臣數年依戀蟻悃獲申萬一為此繕摺奏請伏祈皇上睿鑒指示謹奏明知鄂爾泰進京陛見髙其倬初徃署事猝難就緒而頻頻奏請來京實不解汝具何意見也觀汝諸凡奏對大不似從前矣莫移初志專務一誠字為要將鄂爾泰之所指示時刻不可去懐勉力效法其居心行事方好同日又奏為奏明事竊照黔省新闢古州等處苗疆安設鎮營開通河道已經建造之城垣衙署營房等項并一切創設章程闗係久逺不敢輕委他員稽查遽為倚信是以臣於上年九月内具摺奏請聖鑒准臣親為廵厯察勘奉有訓㫖臣即欽遵致商督臣鄂爾泰去後接准覆稱事闗重大應徃稽查其一切事宜湏臣細加勘議備覆以便核定㑹題等因兹臣已逐一查勘業將起程及旋署日期緣由先後恭疏題報在案臣於所到之處率同各該文武等逐加察勘所有古州城垣礮臺建築已竣闗箱街道布列成行其衙署營房亦俱盖造完好兼有都江河道上至黔省都勻府屬下抵粤西栁州府屬古州重鎮處在居中現在商賈舟楫徃來停泊儼然一大都㑹較之黔屬内地尤覺形勢有加至於清水江河道上自都勻府治下抵楚省紅江大河兩岸苗寨稠繁與鎮逺黄平施秉天柱等府州縣暨古州九股丹江各處新疆俱攙雜通聫形勢險要所設之清江協係在適中以資控馭應建城垣礮臺衙署營房皆已完整現在船隻客貨亦絡繹通行以及八寨丹江雞講等處之城垣礮臺衙署營房俱經建造外尚有各處應分汛塘之衙署營房等項臣已催令該管各員乘斯三冬農隙之時速行趕辦勿致遲延并清江河道内有灘石數處雖經修鑿尚未妥順又都江河道有零碎灘石應行揀修以及三難灘一段從前大石横攔不通舟楫今雖開鑿但未甚坦適暨各岸縴路未經修完開整之處臣俱親厯指示各該員務於春水未發之前如式修治完竣即可永埀利濟矣再查各處苗寨所有礮位鳥鎗暨盔甲刀弩之類陸續查收以來巳共計三萬餘件而此外有可收者尚多臣亦諭著該文武由近及逺一體查明收繳總之新疆治理全在得人今文武各員係於通省遴選居官好者始行題請補授臣所到之處於文武各員考其辦事之得失就其才情之短長諄切勉誡其中實有勤勞應予奨拔或人地實不相宜難期勝任者臣旋署後業俱密開致商督臣以待核奪至目下苗情久經安靖各處額兵俱已到齊以情勢論所有貼防兵丁似可抽撤但於上年烏䝉之役將出師苗疆兵丁多已調回現在貼防古州清水江丹江者亦屬無幾臣已商之督提二臣酌量陸續抽撤毋庸急驟又都江除所駐黔兵外調來粤西之漢土兵丁四千餘名其土兵先經全撤所有貼防古州一帶官兵臣亦致商督臣酌量分作三次抽撤仍留千餘名暫資彈壓俟都江議設新兵募集到營之日然後概行撤回實為妥便所有都江九股因地廣人繁酌議添設協營兵丁并新疆善後諸務臣俱詳細備敘商候督臣覆核題請外臣謹將察勘過苗疆情形事宜繕摺奏明統祈皇上睿鑒謹奏覽奏俱悉善後事宜最為切要全在文武官弁撫馭得法不可絲毫致涉欺凌必實心教養務令苗漢相安數年後方可言成效也目今鄂爾泰來京陛見或多留數時亦未可定百凡更當加詳加慎辦理勉之毋忽雍正九年十二月初一日貴州廵撫臣張廣泗謹奏為奏請聖鑒事雍正九年六月二十九日准督臣鄂爾泰咨為題明事内開本部院齎摺家人回滇欽奉硃批諭㫖張體義著與張鉞對調欽此欽遵除行廣西按察使張體義遵照速赴貴州按察使新任其印務飭委驛鹽道耿鱗竒暫行署理并行貴州按察使張鉞遵照俟張體義到黔交代清楚再赴廣西按察使新任及行布政司知照外相應咨㑹查照等因到臣欽遵在案嗣於十月二十六日新調按察使張體義已到黔任調任按察使張鉞交代清楚即於十一月初十日自黔起程前赴粤任訖臣伏查張鉞仕黔稍久熟悉風土情形現於刑名事件頗能細心承理先在黎平知府任内曽隨臣前進古州布置於苗疆情勢亦所諳曉今䝉恩㫖著調粤西雖張鉞在黔在粤報效相同惟是黔屬之司道等官祇有貴東道方顯熟悉苗情係分駐鎮逺府地方現在省㑹之司道各員只可循分辦理職守於苗疆事情皆未諳悉臣以庸拙之人遂不免有措畫不周之慮兹值督臣鄂爾泰進京陛見過黔臣將此情由詳悉告知據督臣云張體義於具揭廣西撫臣金鉷等徇庇諱盜一案審屬全虛業經審明題覆在案則是張體義倘䝉聖恩尚留黔任臣當加意勉其恪慎供職如應處分離任所遺員缺臣不揣冒昧仰懇皇上可否賞將張鉞仍調貴州按察使庻駕輕就熟諸事獲有成效臣併得資劻助之益皆出自聖主格外之恩施也為此謹奏已有㫖矣同日又奏為奏明事雍正九年四月二十九日接准户部咨為遵㫖議奏事内開大學士公馬爾賽等奏稱雍正九年三月二十六日欽遵上諭議得技勇之士所以為國家備干城之寄我皇上鄭重武備留意人才特命直省督撫揀選送部以備訓練臣等就直省地方風氣酌量技勇分别多寡以足二千名之數另單恭呈御覽伏候欽定俟命下之日臣等行令各該督撫遵奉揀選送部等因雍正九年三月二十九日奉㫖依議欽此查奏單内開貴州七十名相應行文該撫作速揀選送部等因到臣遵即分檄各屬凜遵召募暨屢次指催去後伏查黔省遐邊苗猓雜居漢民本少兼之風土薄弱其人材固不能似西北之雄偉且又習俗愚拙藝勇亦逺不及他省雖據各屬陸續送到者多人迨公同司道并在省文武諸員詳加考驗之下可以入選者無幾當又駁換另送再四挑選直至冬月方得揀足七十名臣等仰體聖主愛養人才至意何敢稍有率忽但限於地方風氣謹就地取材或弓馬稍有可觀或於鎗刀技藝畧曉一二或漢仗膂力稍勝中人至於超羣出衆則實鮮其人除行布政司動支公用銀兩給與路費委員管送各壯丁於十一月二十九日自黔起程進京赴部交收外合將挑選辦理與期限遲延緣由臣謹據實繕摺奏明伏祈皇上睿鑒謹奏何地無材限於風土之論謬矣果加意搜羅不得其人當據實奏明為是豈可濫選湊數且又躭延時日直至於今到京後候朕揀閲若逺遜於他省惟汝是問似此預為粉飾之詞遂能獲免於過耶同日又奏為奏明事竊照黔省苗猓種類繁多習俗淳頑不一比年以來荷䝉我皇上仁威逺播荒服傾心督臣鄂爾泰仰承聖訓公忠籌畫整頓招徠胥歸寧謐所有烏䝉軍務早經告竣因尚留貼防官兵至本年六七月間亦陸續俱行撤回而古州苗疆事宜於本年八月内通盤𠞰撫事竣以及銅仁府之三不管生苗一案亦於本年八月内料理就緒訖以上各寨軍需用過正項銀米暨公費賞需等項應分案確核備敘題銷但款數紛繁尚需時日因係各案軍務俱巳告竣動用過錢糧公項攸闗臣謹先將大概總數另摺奏明伏祈睿鑒謹奏軍需糧餉自應具本題銷何必多此一番瀆奏雍正十年三月二十三日貴州廵撫臣張廣泗謹奏為奏明事竊臣接准吏部咨為欽奉上諭事内開雍正九年十二月二十五日内閣奉上諭貴州按察使員缺著貴東道方顯補授貴東道員缺著南籠府知府黄世文補授南籠府員缺著雲南武定府同知王元烈補授欽此為此合咨前去欽遵查照施行等因到臣隨經轉行欽遵知照外應聽方顯即來赴按察司新任緣新闢下游苗疆内之九股一處寨分繁多苗情素悍又為清水江丹江適中扼要之區上年十月内經大學士總督臣鄂爾泰於黔省苗疆事竣等事案内㑹疏題請於九股適中之台拱地方添立一營設㕘將一員兵丁一千名等因在案俟不日接有部覆即應前徃安設不便遲延但一切布置全在得人必需熟諳之員方可倚藉料理今新陞貴東道黄世文才可辦事而於此地形勢竝未閲厯是九股安營一事仍得方顯同辦庻乎有益臣將此致商署督臣髙其倬會奪去後兹准札覆與臣意見相同除一面檄行方顯暫緩赴臬任俟九股安營之部覆到日即公同鎮道等帶領官兵前徃先將設營駐兵係為地方保固防䕶之大義宣告明白并嚴禁騷擾使苗人俱曉然安堵迅將應立營基分同勘定俾大概規模皆有條理然後將一切工程暨善後諸務詳細講求交與該鎮道率同各文武員弁逐為措辦方顯即回省到臬司任如此則方顯不過暫緩任事三兩月之期而新疆安營要舉可期完妥矣至於臬司印務臣已㑹商署督臣業委貴西道賈擴基暫行署理亦不致有貽誤為此繕摺奏明伏祈皇上睿鑒謹奏方顯將設營駐兵諸務料理完畢然後再赴新任此議是所奏知道了硃批諭㫖巻一百八十九下
