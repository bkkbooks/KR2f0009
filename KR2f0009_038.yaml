body:
  text: 欽定四庫全書硃批諭旨卷三十八硃批李馥奏摺雍正元年三月十六日浙江巡撫臣李馥謹實然念我皇上留心各省地方無逺不照况閩省係臣本鄉又與浙江連界不敢不預為奏聞伏祈睿鑒謹奏所奏甚是一切無隱方不負委任封疆重寄不但朕前理應如此即鄰省地方舉錯偶有得失爾等大貟亦當彼此針規互相勸戒同心合德以奉公敷治與國計民生大有禆益也勉之雍正元年四月初一日浙江巡撫臣李馥謹奏為恭報麥苖情形仰祈睿鑒事欽惟我皇上精勤布化感召天和浙省自入春以來雨澤順時屆今四月正二麥蠶桑將成之候臣委員查看據報麥皆結穗桑葉價賤蠶事方興其菜豆等亦各照常晴霽旬日便可豐收至於糧價白米每石一兩三錢五分秈米一兩二錢五分麥九錢五分一俟春熟當更平減所有麥苗等現在情形臣謹繕摺奏報仰慰聖心伏祈睿鑒謹奏據奏雨澤調勻桑麥俱茂農蠶正殷朕覽之不勝欣悅此皆爾等封疆大吏乂安地方暢遂民情方能感天和之下應也更宜加勉勿怠雍正元年五月十二日浙江巡撫臣李馥謹奏為恭請聖安以抒愚悃事欽惟我皇上至孝純篤度越古今親送梓宫躬捧神主哀動臣民誠格天地享殿奉安事畢猶復攀慕無窮至羣臣敦請還宫然後回鑾竭誠盡禮實從來所未有者仰惟孝思罔極誠恐聖躬過勞臣方在鎖院犬馬依戀之忱未即具摺陳奏今場務初畢謹繕摺恭請聖安伏祈從此少節哀思俯慰天下臣民之望臣不勝迫切瞻依之至謹奏朕安不必為朕過慮爾官聲頗好惟前於布政司任內少有物議亦屬小疵第應懋勉母懷畏懼也同日又奏為恭報春熟收成分數仰祈睿鑒事竊臣於四月初一日先將二麥情形具報以慰聖心今據各屬所報髙下田畝收成分數不等通計一省二麥杭州嘉興湖州紹興嚴州溫州台州處州等府有七八分金華衢州寧波等府有六七分各處菜豆蠶絲皆有七八分食物價平人情安樂皆感頌聖主敬天勤民所致臣仰體皇上念切民依至意所有春收分數理合奏明其閩地近日情形容臣再行密訪具奏統祈睿鑒謹奏覽奏深慰朕懷但一切摺奏俱當據實直陳若絲毫粉飾即涉於欺隱矣雍正元年六月十八日浙江巡撫臣李馥謹奏為遵旨奏明事臣於三月十六日密陳閩省情形奉御批命臣細訪密奏仰見聖心加意海疆無微不及臣即密令親信子弟四處體訪的實乃敢奏聞查臺匪越獄六十餘人官兵追至土牛大樟地方當場殺傷及擒回梟示者共五十八人投江溺死及餓斃山中者六人計皆全獲匪類盡絶地方帖然全閩人民共沐聖主仁恩安居樂業至於天語丁寧諭臣於鄰省地方舉錯偶有得失彼此針規互相勸戒仰見我皇上廓然大公之至意臣雖至愚極陋守分不敢越爼然偶有見聞敢不彼此規戒合德同心共襄盛治所有閩省近日情形據實奏眀伏祈睿鑒謹奏覽爾所奏朕疑懷巳釋君臣一體天下一家休戚相同何分彼此惟期諸臣共以一誠相孚無絲毫間隔於其間何慮四海不致升平蒼生不蒙福澤也隱諱承順最為陋習朕深不取切不可以仰慰朕懷為詞而涉於阿諛逢迎之迹戒之勉之再諭粵溯道統之傳堯舜以至周公孔子聖聖相承精一不雜原無藉於釋道自漢以來三教流傳炳若三光屹然鼎峙歷千百年而不廢不墜豈非道並行而不相悖歟吾儒正心率性釋家明心見性元門修心煉性以言乎體則同聖人之明德新民如來之自利利他太上之度人無量以言乎用又同中庸曰戒慎乎其所不睹恐懼乎其所不聞內典云六塵涉境心不隨緣道德經云不見可欲使心不亂以言乎進修工夫亦未嘗不同何下士往往以管蠡之見縱橫辨駁以逞其胸臆蓋止據形迹而論而實未窺其奧藴也其言以為二氏之學全無關乎世道人心而孰知有不然者夫積善之家必有餘慶積不善之家必有餘殃理載於周易善惡之報如影隨形義著於感應篇四生六道因果輪回之祕諦散見於大藏諸經其所以警戒提撕誘掖奬勸若合符節究其指歸無非勉人為善而巳況細而閨闈里巷逺而海澨山陬有不可以禮樂維持詩書訓導者而二氏之教皆足以感發其皈向之誠消磨其隱微之慝由是觀之釋道寧無補於王化也哉試問中國將此三途去二留一能乎否耶不能則何必分門立户互相排擠有若聚訟然顧兹末法黃冠緇流下愚者多率皆餓夫懶漢茍希利養以故招提蘭若竟成藏垢納汚之地此輩猶如榖之有稗粟之有秕惟在分别孰稗孰粃豈可併榖粟而概棄之乎朕向來三教並重一體尊崇於奉佛敬仙之禮不稍輕忽每見章句之士鄙薄二氏動輒輕蔑擯斥而託名理學者尤甚及考其操履與理學真詮又大相徑庭此不過井蛙籬鷃之徒耳何足與較浙江俗稱僧海乃衲子卓錫勝地近十年來不特指月清機宗風透徹者罕見即精通教律者亦未聞其人叢林凋謝可勝太息汝仰體朕意於公務之餘留心護持使不至過於寥落傾頽不必著相莊嚴也此諭汝自領會毋令衆知何也士子聞之徒為好佛之譏釋子聞之致增我慢之相其中庸流或因而縱肆甚至紊亂清規有干法紀是朕憐之而反害之也密之雍正元年七月二十四日浙江巡撫臣李馥謹奏為夏秋雨澤情形事竊浙省自春收以後髙低插蒔禾苖甚覺滋長及交六月久未得雨臣率屬祈禱至二十四日得雨雖節次灑潤均未沾足立秋以來田稻專賴水養而雨澤愆期農望甚殷臣諄勸竭力戽救一靣步禱甘霖竊念我皇上愛養黎元夙夜軫念飭諭地方大吏遇郡縣偶有旱潦當先事圖維早為儲備兹者浙省夏秋少雨情形臣謹據實奏聞嗣後有無雨澤果否成災容臣陸續據實題達以體皇仁為此謹奏直陳甚是總不可隱諱但浙省民情多詐爾當細心體訪毋被欺瞞況湖港河渠環繞境內水澤頗寬不比他省雖稍被旱猶可藉人力以施灌溉之功倘致為災爾即酌量撫恤毋俾失所今歲蒙上蒼眷祐各省收成雖未報齊大槩俱皆八九分以上惟爾一省如此亟當省察政事刑名有無舛謬屬員有無貪劣害民速行整頓庶為弭災之道據奏六月初缺雨何至七月下旬始行具奏甚為遲誤特諭雍正元年八月初一日浙江巡撫臣李馥謹奏為恭謝天恩密覆諭旨事七月二十五日臣進摺人回捧到皇上賜臣內府磁器二種臣恭迎至署叩頭祗受聖恩優渥臣何敢當謹什襲珍藏奉為世寶細繹御批仰見我皇上總持萬化廣大精深學無不綜理無不貫雖治本純儒而道通二教竊念儒與釋道不同者迹所同者心故妙明虛靜之常為仁民愛物之本合之中和誠明體用一源顯微無間臣向閲其書即識暗未解一二而心敬其説今讀訓諭益信聖人之心明通公溥透要會宗非流俗所能窺測萬一也臣承旨之後即歷湖山一帶寺院減從瞻禮竊見雲林雲棲淨慈像教莊嚴威儀整肅即小有傾圮臣當不時修葺其昭慶香積諸梵宇亦皆完好惟理安法界深嚴清規恪守寺在衆山之中殿柱簷楹山泉滲溜宜加整理即為捐資修補至於上天竺山門大焚修以祈福國祐民伏惟睿鑒謹奏修補傾圮固屬善舉萬不宜太過更不必令知朕諭即理安僧衆亦皆凡庸之流向來規範較他叢林此勝於彼耳近年來總不見一出色善知識可以振興法教者人能𢎞道不得其人亦無可如何朕意不過存其教像儀則勿致頽敗而已非命爾分外越格相待也可使由之不可使知之特諭雍正元年九月十四日浙江巡撫臣李馥謹奏為直陳司道知府官方事竊查浙江十一府七十職之員參劾稍遲除府縣中一二賢劣密薦特參外府佐州縣而下容臣於計典中分别優劣照例薦紏惟是司道知府有表率一省一郡之責尤為聖明加意臣詳看其人品等級敬為我皇上陳之查布政使傅澤淵按察使王之麟皆年邁六旬久於其任各稱循分守職而王之麟較為有才寧台道陳受漣辦事明曉鹽驛道馬鍾峯居心謹厚各為稱職溫處道蔣敷錫朴願無他循分辦事其糧儲道張楷尚未到任嚴州府吳昌祚廉能勤敏臣於計典中擬定卓異金華府張坦讓守優於才衢州府靳樹德才優於德並堪鼓勵杭州府張為政年艾勉力湖州府吳簡民初任勤習寧波府尚瑤拘守繩尺處州府蘇稷地簡相宜臣各勉其益加勤謹以期後效其台州府髙泓現在試驗再定去留臣受恩深重惟恐督率無方何敢少涉偏私以蹈欺罔謹即奏三年考績黜陟幽明載於虞書國家政事寧猶有重於此者乎向來督撫每值計典非賄賂即請託何異商賈貿易之習其中一塵不染者僅一二人而巳非爾等之所企及也既往朕槩不咎向後惟痛改舊弊秉公舉錯以昭示勸懲庶為自愛之道耳諭李馥聞得杭州府知府張為政人甚昏庸操守亦屬平常縱容此等劣員貽纍地方欲望民心舒暢時和年豐豈可得乎但伊曽經朱軾薦舉或保後改絃易轍或朕聞見不確均未可定爾秉公察核據實覆奏如果昏庸亟應擯斥以肅官針即爾近日聲名亦不聞有嘉美之處勉之慎之雍正元年十二月初四日浙江巡撫臣李馥謹奏為恭覆諭旨事竊查杭州府知府張為政人才操守誠如聖諭該員歷任十年機巧圓熟隨時變換故前於撫臣朱軾在任之時頗事修飾薄有聲名及薦舉之後漸改操守臣入境即提其用事書辦重懲枷責該員畏法稍知收斂然其居心終難保信皇上聞見至確似此昏庸不勝任之員若再姑容必至貽誤地方臣謹遵不時察參定例繕本據實紏參伏候聖裁至臣蒙皇上特拔受非常之眷渥乃不克自奮勵無出衆之聲名致上煩聖主諄切訓諭臣雖至愚敢不痛自改悔勉竭駑駘以圗報效於萬一抑臣更有請者杭為大郡軍民雜處必得才守兼優之員方克勝知府之任伏祈皇上特簡賢員補授則於地方既有禆益而臣亦蒙恩無盡矣謹奏知道了杭州府員缺巳特簡一能員發往矣雖係簡用之人亦須留心試看如有與朕旨不符之處仍當據實直陳不可以誠如聖諭四字將順姑容貽害地方朕近日所用亦不過採取於輿論者非真知灼見之人也爾膺封疆重任干係匪輕一切俱應實體朕心公忠無隱毋得稍事迎合特諭雍正元年十二月十九日浙江巡撫臣李馥謹奏為雨雪應期仰慰聖懷事竊浙省秋旱致厪宸衷恩典頻施天和即應自交十月以後甘雨時降水泉滋長今十二月十三日宵雨徹晨十四日早大雪達夜自後陸續得雪積厚盈尺春種在地青蔥滋潤今蒙皇上於通省州縣分别蠲貸外又荷特恩改折三郡漕米之半存留優裕且河道流通商販雲集故米糧價值漸就平減白米每石一兩五錢秈米每石一兩四錢麥子每石一兩臣謹據實奏聞以慰皇上眷念斯民至意伏祈睿鑒謹奏覽奏雨雪雖云霑足春熟尚難預定且勿遽然稱慶爾等封疆大吏果能仰體朕懷正已率屬進賢退不肖實心布惠愛養兵民則天和下應雨暘之時若朕可以持左劵也若縱容貪劣諱盜隱災濫繫酷刑重耗苛斂而妄冀天庥如何可得朕命爾等分閫宣猷爾等之臧否即關朕治理之得失可不勉歟朕如此諄切提命若不痛自省改革除陋習乃所謂自暴自棄也前者孫文成有捐修磬山之舉向來奉差織造人員往往自任捐修之名而私向地方督撫司道等官假託上意勒令捐助從中反巧取餘利以飽私囊而於正項又復剋扣借詞某工用費若干種種陋習朕所深悉前經密諭戒伊不可仍循此等作為但此輩皆包衣下小人雖奉嚴諭或恐未必凛遵倘蹈故轍爾等斷不可私相幫助爾等聲名之賢否朕自有鑒察豈肯以封疆大臣之去留決定於微末小人之口爾等若不務本只在枝葉上用心夤緣攀附冀朕見重則大謬矣將孫文成有無假託勒捐之處密奏以聞雍正二年正月二十二日浙江巡撫臣李馥謹奏為恭謝天恩事正月初九日伏奉御批摺子到杭兼賜臣御書福字臣恭迎至署叩頭祗領臣仰瞻宸翰龍飛鳳舞日麗星輝恩光照曜不獨臣合門受祉兼使通省生春至杭州府缺伏蒙特簡賢員復荷聖諭諄諄仰見皇上揀選良吏無非念切斯民臣敢不祗遵聖訓加意考課斷不敢姑息容隱以自蹈欺罔之咎謹繕摺奏謝伏祈睿鑒謹奏朕御極之初諄切降諭寬爾已往誡爾將來孰知竟不仰體朕意怙終不悛今有江國英一案可愧之事國法無私朕亦不能為爾寬貸也硃批諭旨卷三十八
