body:
  text: 欽定四庫全書硃批諭㫖巻九十六硃批徐鼎奏摺雍正五年七月二十四日浙江杭嘉湖道臣徐鼎謹奏為恭謝天恩並陳微忱仰祈睿鑒事竊臣一介庸愚䝉皇上殊恩補授今職於本年二月初七日到任巳經報明督撫在案兹於六月二十九日准署布政使臣許容移稱杭嘉湖道每年養廉心紅紙劄給銀二千兩以奉㫖之日起支等因到臣臣自顧何人疊䝉異數感悚交集不能自巳前䝉賜臣摺奏隨繕摺恭謝天恩至臣家祖父以來仰荷聖朝豢養之恩衣食頗可自給臣歷任京職别無浮費俸廩之外稍借家中幫補即可用度無缺今在外任雖不免有延幕及差遣等項而際此天時調和臣鄉麥收大熟浙西現在禾苗甚茂將來豐收米賤支持尚易臣請將頒賜銀兩除心紅紙劄係衙門經費仍照原議支領四百兩外其餘臣不敢妄動絲毫亦不敢矯飾立異惟請留濟公務如編造保甲倡率社倉勸賞捕盜等類容臣按季預領隨時酌用仍於嵗終開報院司倘臣果自缺乏必須動支亦即據實開入日後另簡賢員不作常例仍照原議賞給如此庶臣分可安而公事亦不無小補矣合併陳明謹奏覽奏養廉之項支領多寡在爾自為無庸陳奏但不可矯廉立異亦未有家中幫補用度居官之理操守原為一生名節所闗果能此何事不能為耶勉之同日又奏為浙西民戸叢雜田糧滋弊請就保甲以寓順莊靖地方以便徵輸事竊查保甲一法屢經奉㫖通行而浙西里書之弊又久䝉皇上洞悉曽頒來最難防範沿岸之寄囤窩引最難蹤跡無事則均屬平民遇事則頓作匪類必得水陸一體俱立保甲且不徒空造文冊務在挨戸核實按船編號方可釐剔至錢糧包攬飛灑以致歷年拖欠亦由戸名不清村莊不順所以里長雖行禁革而變為圩頭圖總甲首種種名色甚且有衿監吏胥暗占為缺者葢浙俗糧冊並無的姓的名或子孫分析承用詭名至輾轉授受又聯合數姓報作一戸因而互相推諉並不知為何人或投託豪戸名下代是滚單不能挨送不得不用一熟識根柢之人令其查造傳催伊等既操其權遂致從中舞弊若果按保甲之實戸問田産之坐落以田産之的名編行糧之圖甲挨莊順叙戸戸可稽則錢糧何從詭寄抗欠何難追比乎但浙西州縣事務極繁保甲順莊以及船隻編號等事有司實無專功親身查驗一惟虛應故事終於無濟臣巳禀請撫臣於命徃浙省試用人員内派撥數員酌量委辦即以試其才否但試用知縣止有六員臣未敢遽請俱撥與臣所有派給二員祇可儘緊要處所令其試辦倘者無可藉口阻撓行之自有成效第既成之後民間遷徙不常田畝時有典賣必得隨時推收過戸始不致日久混淆而税契亦不至於隠漏然欲令敕行蘇松等府庶太湖泖湖連界處所姦民無所隠避而三吳田賦均得清釐矣是否有當伏乞皇上睿鑒指示遵行謹奏覽所奏係從苦心中議出甚屬可嘉但未思及得人之難也天下原無不可辦之事所難者惟在得人一事耳追比盜贓一摺留中候交廷議雍正五年十月初二日浙江杭嘉湖道臣徐鼎謹奏為敬繳硃批恭謝天恩事竊臣於七月内差家人齎進奏摺荷䝉皇上硃批發交原人捧回臣跪受開讀仰見皇上睿慮精詳指示開導無微不至臣感激奮勵惟有天恩至揀發人員之處臣當即欽遵具詳撫臣聽候酌議題請外其保甲順莊等事臣於具摺之後一靣即令派到試用知縣徐元肅葛大梁就近先於嘉興秀水二縣試行又有原任海鹽縣行取知縣梁澤因民欠調回清比羈留無事伊曽行過此法臣亦令其協辦先將里書等傳集按實徵冊審問確實戸名住址編為草冊目下巳有首出飛灑詭寄田畝俟核實冊籍完日尚須各員親詣村莊逐戸查詢必更有不能隠匿者其中或有混淆太甚必須清否清確因時權度並可倣照成式推行又現奉諭㫖令州縣會同教官於貢生生員中各舉孝友端方才可辦事之人此誠我皇上旁求無巳之盛心亦期盡脱科場黨援之弊也但州縣官於生貢未能徧知而教官虛公有識者甚不許妄舉如此淘汰則每學不過十餘人再於此内觀其言論舉止既已知其品行當令試辦一二公事方可以覘其才具倘䝉皇上採用臣議則如順莊一事即可令所舉之人試辦果能料理無誤然後送入引見庶選取有據不致虛此盛典矣謹冒昧附陳伏乞皇上睿鑒指示遵行謹奏覽雍正六年二月初二日浙江杭嘉湖道臣徐鼎謹奏為欽奉上諭敬陳愚忱仰祈睿鑒事雍正六年正月十七日准藩司轉行欽奉上諭令京官自翰林科道郎中以上外官自知府道員學政以上每人各舉一人欽此移㑹到臣竊臣生平交友最少在京在外實無深知之人惟前年䝉等語臣隨於赴浙時經過清江浦相訪不遇是以未見其人亦未考其操守何如今奉㫖薦舉未知陳儀曽否舉出此人乞傳問備細或調取引見或賞與臣衙門細察其品行才具俟有灼見另行保舉統出聖裁再臣有表兄徐備係徐州生員與臣自幼同學其奏請伏乞皇上睿裁指示遵行臣曷勝惶悚待命之至謹奏覽同日又奏為敬體皇仁仰請恩出上裁事竊浙省荷䝉特恩將正項錢糧扣存十萬兩并耗羡十四萬兩通計賞作公用及官員養廉之資從此州縣以上各官無不均沾優渥而各項微員未經議及今我皇上軫恤羣工賞給銀兩諒䝉一視同仁但由督撫題恩綸其為風動鼓舞入人尤深查浙省首領佐雜雖有二百三四十缺然除鹽場税課等官並稍有成例可以自給者其餘不過百餘員若按其緩急輕重量為派分在應得養廉各官所減有限而下吏均沐膏澤人人感激思奮矣是否有當伏乞皇上睿鑒施行謹奏諒李衛自必有得當之料理雍正六年九月二十五日湖北布政使臣徐鼎謹奏恭請皇上聖安朕安閲爾記述訓㫖之摺甚為詳備他人所記述似此詳備者甚少朕嘉悦覽之既能記之於心自能見之於行事也勉為之摺留中同日又奏為感荷天恩勉圖報效敬抒下悃仰陳聖聽事臣猥以庸愚䝉皇上不次擢用畀以湖北藩司重任赴京之日疊䝉召見訓諭諄切賞賚便蕃體恤備至臣稍有知覺寧無至性感發謹遵㫖恭繹聖訓敬繕清摺進呈御覽臣到任以來寤寐服膺未敢暫釋查得藩庫書吏歷來勾串縣胥將州縣解來錢糧壓批不投私自那用移後補前通同舞弊現經臣拏究通詳交與府縣嚴加審追凡此病根皆由衙役積戀未盡剔豈能檢收若遽將伊等斥逐則或私自挾藏或投諸水火一旦需用無從查問以此因循遂難更改臣現將作弊有據之人先行責革其餘且為多方開諭令將歷年冊巻編寫號目不許隠漏一面詳請督撫召募農民考驗學習俟編造彚齊新募有人學習漸熟即令各按號㸃查照例設立架擱庫革吏亦不能指撞矣再臣衙門先經督臣楊宗仁將通省錢糧加一火耗内坐派一分五釐合計銀一萬一千六百餘兩為奏銷解餉飯食及養廉之費臣查奏銷解費必不可缺而藩署公私雜用亦難悉數臣家衣食粗足前在京在浙臣父俱稍為幫助今藩署用度實繁臣父亦日就衰老不能供地方公務斷不敢一毫隠匿以為身家計也合併陳明伏冀睿鑒謹奏覽同日又奏為承宣任重報稱維難謹竭愚慮通計湖北情形仰祈睿鑒事竊臣受命抵楚急圖報效每思通省政務非得頭緒無從著力是以夙夜籌畫竊見楚地山川交錯絶少平原水多則苦流潦稍旱則又慮熯乾勢難均平無憾其民性情躁動古稱剽悍寛猛尤須合宜近來吏治澄清一切弊政固巳剔除無遺惟在恩威並用隨時調劑而巳至於錢糧拖欠歷來不過數處如沔陽其最甚者此地雖常遭水患然亦未嘗不受水利其拖欠之故非盡由於被災總因水鄉東坍西長豪强乗機兼并飛灑詭寄以致糧冊混淆是以有田無糧者脱然事外有糧無田者追比不前又戸名里甲任其參錯執糧名以求其人則不知為何人就田畝以問其居又不知在何處此里書之所以不能去而滾催之所以終不行也臣前在浙省曽經奏明就保甲以行順莊雖推行未竟而嘉秀二邑似覺試之有效今以湖北情事言之大約相類擬亦於拖欠最甚之處試行此法不惟積欠可以清查而欺隱之弊亦當漸無所容如果有效再為量地制宜多委幹員協辦推廣其法容俟妥議詳明督撫酌定謹先就臣愚見所及冒昧瀆陳伏乞皇上睿鑒指示遵行謹奏汝此見甚好據邁柱亦曽奏請一如江西徹底清查未知意見與汝所奏合否汝等督藩同心協力斟酌為之雍正七年三月初八日湖北布政使臣徐鼎謹奏竊各官養廉一項䝉皇上杜絶陋規體恤臣下諭令督撫將未經分給之員一面辦理一面奏聞寧可以州縣應出之項解至藩庫從公發給而不可使其自相授受欽此轉行到臣臣即與督撫二臣悉心籌畫通盤合算湖北額徵錢糧通共一百一十一萬一百餘兩照加一耗羡合算共銀十一萬一千兩零自督臣楊宗仁酌量派分於加一耗羡内以二分作公用以一分作起解部餉之費統計三分共銀三萬二千兩有零尚有七萬八千餘兩以額解司餉内每兩之一分五釐作布政司養廉以合省錢糧内之六釐作按察司養廉以額解糧驛二道銀米内之一分五釐作二該道養廉以各道府所管州縣錢糧内按股均攤為各道府養廉留三分二釐作各州縣辦公養廉之用其錢糧不及五千兩者即將耗羡盡行給予至同知通判有管關税者有管糧管鹽者相沿自有養廉大半未經分給其佐雜等官亦未議及且州縣錢糧有止三四百兩者加一耗羨雖全留不解亦僅三四十兩至稍過五千兩之處便應照額起解耗羨則所存亦復無幾臣細加體訪此種州縣雖名為加一火耗實有一分一二釐合計尾數積零至加一三者有之又額徵三四百兩之州縣尚有民差民當之説遇有公費仍出民間理應一併更改但計湖北通省大小官員除驛丞教職外共二百六十六員槩從節儉分派就其多寡牽撘合算約須銀十餘萬兩今除存留三分耗羡外所餘僅七萬八千餘兩尚缺銀二萬三四千兩無項可動再州縣繁簡參差何止數倍若限以上中下三等分給亦尚有苦樂不均之處以臣愚見似應將州縣暫循楊宗仁所贏餘既有確數田畝漸次復額然後更定始可永著為例惟是州縣分解各衙門養廉或逢迎豫送或索取豫支甚而隨封門禮皆所不免日久流積便成虧空自應遵㫖將州縣應出之項統解司庫從公發給再查佐雜微員廵查地方看守堤工歷來均有陋弊自應一并議給養廉以便嚴行禁絶統計議分各官約有一百六七十員須銀五萬餘兩今將原派分司道府㕔之項計銀三萬八千餘兩裒多益寡均勻攤派亦尚未敷現在禀商督撫或請於三分公項内動用或請於商捐銀兩内支銷仍懇豫為撥定按季通融墊發隨時徵催歸補庶不因錢糧分數未完致各官養贍有缺統俟督撫二臣核定另開細數具奏謹先將臣奉行籌畫之處繕摺奏聞伏乞皇上指示遵行謹奏辦理此事要須公當同日又奏竊議給養廉一項臣巳就耗羡銀兩通盤籌畫另摺奏聞但耗羡尚未敷用且每年錢糧亦未能全數通完臣復於前摺内請動三分公項或動商捐銀兩但商捐即係鹽規因鹽規悉行禁革其每年應費之項理應捐出充公聞向日鹽規每年約有十五六萬兩今止令每年捐銀十萬兩本屬省減而各商並未能應時交完如雍正六年二次具呈捐銀六萬令隨引起解另為存貯除充公用之外懇乞謹奏覽同日又奏竊臣以駑鈍庸材䝉恩深重亟圖報效每念藩司一官雖以錢糧為專責而通省事無大小實無一不當經心而切計者也自去冬臘雪頗大新正連得大雪二月以來數日一雨處處調勻麥苗巳將吐秀春花可卜收成因武昌係重兵屯劄荆州駐有八旗大營誠恐青黄不接或致米貴奉督臣酌示動支商捐銀兩買米以備平糶今雖未能多買看來米價不致甚昻似巳無慮第查荆州兵餉每月由藩庫解至該府領催於府堂自行彈兑其銀兩必欲加重除臣自給添平外知府仍賠銀百餘兩不等在知府從前管税隱匿者多不敢爭執遂至習以為例今闗税巳令奏至堤工一事向係民修䝉我皇上特發賞銀助其力作民情莫不歡呼第從前估報固現在陸續竣工應聽督臣核題再積貯榖石於地方民生最有裨益從前借用之穀乗去年豐熟臣督催買補但楚地濕熱其截漕易穀及採買之穀例只歉嵗平糶並不令出陳易新將來買足之後嵗值屢登不無紅朽臣以為宜照常平倉之例亦令存七糶三庶得永久現在詳聞謹奏覽雍正七年六月初七日署理湖北廵撫印務布政使臣徐鼎謹奏為聖主之殊恩逾分小臣之報稱愈難叩鳴謝悃仰祈睿鑒事本年六月初五日奉督臣邁柱檄行内開五月十六日内閣欽奉上諭湖北廵撫印務著布政使徐鼎暫行署理欽此欽遵轉行到臣并將印篆齎送前來臣隨恭設香案望闕叩頭謝恩祗受伏念臣一介寒微至愚極陋荷䝉皇上天恩歷加拔擢畀以藩司重任受事以來愧未有寸長報效兹復奉特㫖令臣暫署撫篆聞命之下慙悚交集縱竭盡駑駘之力恐未能勝任惟有恪遵訓諭益加警惕夙夜祗懼黽勉供職以冀仰報高厚於萬一耳除接印受事日期恭疏具題外所有感切愚誠理合繕摺奏謝謹奏勉力為之汝若器量再加宏濶識見能務遠大何任不克勝耶勉之同日又奏竊湖北堤工一項最闗民生休戚向來例係民間嵗修去年䝉我皇上頒發帑銀加以奬賞助其力作凡有缺損之處俱巳陸續竣工經督臣具題報銷在案今年春夏以來雨水調勻二麥豐收秧苗栽插及時大有可卜乗此年嵗順序江漢安瀾益將堤工防護加培方為未雨綢繆之計臣仰體皇上念切民依之至意詳明督撫正擬於伏秋汛内親歷各工查勘適奉疏題報外理合附摺奏聞謹奏覽雍正七年七月初四日署理湖北廵撫印務布政使臣徐鼎謹奏竊查湖北省入夏以來二麥豐登秧苗俱得時雨惟至六月十四日以後省城附近天氣亢暘臣隨飛飭各屬查報據襄鄖潛沔等處俱稱雨水無缺其武漢黄荆等府屬得雨參差不一未能普徧凡濵江倚湖之低田苗穗倍盛至高坡之處塘水不敷灌溉望雨甚殷督臣邁柱偕臣率同在省官員敬謹祈禱於七月初二日省城得雨數陣似覺地氣通和可望再沛甘霖臣一靣復飭各府州縣確查得雨日期并分别早稻收成分數續報一靣仍隨督臣率各官再行䖍禱務期隨事修省此時倘得霑足晚禾仍無妨礙現今米價照常民情安靜誠恐有厪聖懐謹將目下雨澤情形據實奏聞謹奏湖廣督撫不甚妥協所以雨暘未能時若況兼兵民風俗又欠醇良何敢期望年豐嵗稔耶大吏之不妥協處在不能化導整飭非懈弛事件貪婪屈法之謂亟當修省黽勉誠敬上格若不講求根本之理徒從事於祈禱儀文恐未必能挽回上天之譴罰也同日又奏竊查湖北荆闗口岸十一處内有徐家口一處原名徐闗經撫臣馬會伯題請移設田家洲更名田闗業䝉俞允欽遵在案今於六月十八日據委管闗務襄陽道趙之均報稱五月二十六日將徐闗移駐田家洲建立闗篷旗桿至六月初十日有地棍多人穵旗拆篷搶去告示課銀等項臣正在飛飭確查棍徒各姓嚴行究處又於二十日據潛江縣詳稱有陜西客民陳一高投到供稱因販木到闗多勒税銀起釁各船一時鬨鬧以致拆篷各船隨即開行一高因木牌難行是以未去等情到臣臣思徐闗改設田闗即有多勒税銀情弊與居民並無交涉何得有地棍鬨鬧一靣密加訪察始知田家洲原有三條支港農船往來可以自便水長之時小販船隻乗機偷越附近小民或為勾引安頓得分餘潤今立闗於此伊等遂覺不便於巳所以隨聲附和此等倡首之人若不審明按律治罪無以懲刁悍之習第目下居民並不承認而商人又以闗上任意多索銀數為詞或因新移闗口經收吏役調劑未善亦未可定容俟確查實情並嚴究姦民務獲分别審擬另行核題外事闗多人搶闗理合先將訪察情節據實奏聞謹奏此等刁風萬不可姑息將就完結以圖了事務須究明原委莫使姦徒得以漏網類斯案件盡法處治一二向後可保永久相安若稍為姑息恐各屬效尤將不勝其料理矣地方上既遇此等事出不得不懲創一番以警戒將來雍正七年七月二十二日署理湖北廵撫印務布政使臣徐鼎謹奏竊查原署江夏縣事王琪嚇詐銀兩一案緣雍正五年間驛鹽道書吏陳臯聲私刻道印假造行鹽水程經襄陽府同知李昌期盤獲詳報彼時鹽道栁國勲業將陳臯聲所覓刻字匠楊正乾雕刻假印實情審出乃並不查拏即交王琪收審王琪遂乗機詐財揑坐於臯聲之僕陳全義混稱造而未成問擬徒罪臬司王肅章主稿㑹同栁國勳即為轉詳前督臣福敏批駁國勳私求福敏又復頂詳福敏罰伊銀一千兩買杉木於荆州堤旁釘樁於馬會伯到任前一日急為批結其實樁木未釘臣巳詳請題㕘部覆分别議處在案至王琪婪贓之由實因假印起見臬司王肅章與臣會審不肯深究臣隨將不便會行緣由詳明督撫王肅章止以疎忽自行檢舉䝉督撫飭令臣會同在城各道公同審擬據提回錯擬徒罪巳經發配之陳全義供出假印水程實係伊主陳臯聲覓青龍菴刻字匠楊正乾所刻曽印過二千餘張事發之後臯聲令其代為承認不過徒罪及質之臯聲亦供吐不諱與栁國勳初問供情相符且印文清漢分明難於掩飾而王琪當日敢於改換初供必有所恃訊據王琪供稱栁道曽説問擬徒罪外結了罷等語是栁國勳當日懐私故縱王肅章亦扶同徇隠衆證鑿鑿今栁國勳巳䝉皇恩念其先世殉節將收受陋規一萬四千餘兩並所擬重罪盡行寛免令其引見遂於此案倚恃恩㫖輾轉狡飾臣未便冒昧嚴訊謹先具摺奏聞伏乞皇上睿鑒指示遵行謹奏未便嚴訊是何言歟朕因憫念伊祖殉難忠節推恩寛其從前之罪而巳未有栁國勳一切過愆槩不必究之㫖也秉公審理不必瞻顧同日又奏竊查湖廣南北兩省界連苗疆而湖北所屬惟容美司為大頻年以來漢土相安該土司田旻如未嘗不知感戴皇恩畏服天威獨與各上司文書往往似有驕抗之處臣心每為詫異詎料此等情事半由於舍把漢姦勾串為之也凡土司衙役頭目名曰舍把每扮作客販潛住省城與各衙門胥役交結為伊主打㸃公事實則樂起釁端方可就中取利或架言恐嚇其主遂將空白印紙付令帶至省城隨事探聽即倩胥蠧代作文書任意抗辯以至陷土司於罪戾而不覺茲因查勘漢土界址一案與容美從前所擄保靖司人口之事俱奉督臣批查詎料臣等詳文甫出而該土司辯白之文遂即或先或後徑投督臣衙門督臣邁柱查對月日究出舍把唐遇世發武昌府嚴審供稱係從藩司衙門書吏探聽總督衙門書吏代作辯呈將所帶空白印文寫就投遞臣隨查出該管經承并交武昌府究訊督臣亦將書吏押發該府收審應俟審明定擬聽督臣核題外事闗土舍交通胥役積弊理合據實附奏伏乞皇上睿鑒指示遵行謹奏此事發擿姦伏得情理之當辦理甚屬可嘉朕欣悦覽焉雍正七年八月初四日署理湖北廵撫印務布政使臣徐鼎謹奏竊湖北夏月雨水情形並早稻收成分數巳經先後具摺分析奏聞入秋以後得有霖雨數次頗稱普霑大勢均望有秋惟高坡田地未免受旱在先不無數處晚稻稍減幸蕎麥遍布襄鄖等屬原多播種雜糧俱極茂盛又向來被水之鄉今年實為倍收是以米價甚平臣惟恐冬春之交米或昻貴謹與督臣邁柱預為籌畫將商捐銀兩先動支一萬兩酌量分發地方官令其各向産穀處所及時採買運貯以備平糶之用凡有應行安頓之處均當隨時斟酌務期民安耕鑿不致有厪聖懐為此謹奏覽奏深慰朕懐雍正七年九月初八日署理湖北廵撫印務布政使臣徐鼎謹奏為奏明事竊本年巳酉科湖北鄉試臣因暫署撫篆循例入闈監臨但查京闈三場畢後内外截然不許出入外省廵撫藩司多在闈中地方公事每有必須禀商者故向來相沿三場後遇有緊要事件屬員例得於開門時進見臣照舊循行八月二十六日有武昌道徐聚倫言奉督臣諭來商公事乗轎而入臣與提調監試等官一同接見據稱督院倡捐起造劉猛將軍祠廟委伊監修令臣協同公捐等語又向臣密言武昌闗税弊端經伊訪拏詳報之後所收錢糧反較前増多等語臣以為此案奉批藩臬會審自有公議無庸預先言及促令出闈乃該道復於次日又傳有督臣面諭相見詢其緣由仍係建廟之事復言料厰税務自武昌府張淑郿監收苛取重耗經我訪拏秤收輕減而税銀反増可知從前大有侵蝕豈可因係督院題委之人不為嚴審等語查徐聚倫訪拏厰税重戥侵欺一案於閏七月初四日詳報及批兩司㑹審提犯到案臣隨會同臬司研訊因該府家丁周二供稱厰内另有伊主印簿臣等以各闗定例止用頒發親填簿扇今私設印簿恐有情弊隨檄調查對尚未送到而臣於八月初六日遵例入闈有何瞻徇乃徐聚倫私意揣度借端入闈似欲恐喝甚屬不合臣當即靣斥而出緣臣在闈中事非闗涉科場未便冒昧瀆奏兹於九月初四日發榜事竣除厰料一案俟㑹審明確另詳請題外所有武昌道徐聚倫借端入闈情由理合據實奏明伏乞皇上睿鑒謹奏果自信無他凡似此預為防範之舉皆可不必倘有自歉處即先入之言亦何能惑朕耳目耶至如品定屬員賢否惟以其立心行事為憑向來若係秉正無私實心奉公之員便有此等小節不協處不為絲毫介意方可身膺封疆重任一不能容納則失大臣器局矣朕前批汝器量不宏再加擴充則善之訓實屬不謬汝其誌之勿忘同日又奏竊查御史高山條奏請令藩司衙門照臬司之例一體封鎖欽奉諭㫖著實力奉行仰見我皇上整飭吏治務期政肅風清之至意臣一靣將更定事宜議詳督撫實力奉行外竊思立法闗防期於杜絶弊端總貴奉行實意非可徒徇虛名似宜於條陳之内酌通其意以期永遠遵守葢各衙門吏胥弊竇多端全在該管官實力稽察不在換班之遲速若定限一年一換伊等小人或有内顧牽縈則辦公恐有貽誤至藩司衙門冊籍紛紜積久愈多下班接手頭緒生疎尤慮舛錯似應仍照臬司衙門之例按季輪換惟應一體嚴禁外班勿令暗自盤踞并約束下班書役原居省城者不許探聽招揺原居外府者不許逗遛影射則諸弊自可杜絶矣至捐給書吏飯食臣等叨䝉皇上恩賜養廉銀兩以公辦公理宜分給至伊等除捐給飯食之外其有瑣屑之需未便盡出於官者似應仍聽自行買備第將所開單帳俱送内衙另為彚總開單交發買辦之人買進什物覆加檢閲發房則字跡不出門亦無所容其姦弊矣緣係遵㫖實力奉行謹悉心籌畫冒昧具陳伏乞皇上睿鑒指示遵行謹奏遵照諭㫖行觀汝等各省不能效法豫省田文鏡也硃批諭㫖巻九十六
