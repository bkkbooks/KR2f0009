body:
  text: 欽定四庫全書硃批諭旨卷五十三硃批武格奏摺雍正七年四月初八日西安巡撫臣武格謹奏為奏聞事竊臣於三月初十日自京起程於四月初二日已抵西安府臣署任事隨另具題奏恭謝天恩伏思臣庸愚下質荷蒙異數隆恩至優至渥感激之忱實難言喻惟有凛志黽勉永矢勿諼而已臣起身之日住長新店是夜霖雨大霈次日住涿州復夜雨達旦二十一日行至山西祁縣地方春雨連綿四野霑足二十九日過蒲州府得雨雖微然晴日未久土脈益覺滋潤沿途惟見麥苗靑蔥秀發逮潼關至西安府城麥苗愈見蔥鬱已有吐蘂出苞者現在糧價平減羣黎共樂盈寧至沿途錢價每兩換大錢一千文間有低昂相去亦不過一二分再所過村莊房屋每多修蓋臣目覩情形深為慶幸理合繕摺奏聞仰紓聖懷謹奏近日聞得陜甘微覺缺雨爾等督撫惟當恪秉一誠上格穹蒼河南望雨甚殷直隸南四府亦甚望雨近京一帶雖不至旱雨澤亦未為調勻朕因此深以為憂也朕另有諭汝之旨令學士德祿到西安口傳雍正七年五月十一日西安巡撫臣武格謹奏為叩謝天恩事雍正七年五月初七日內閣學士德祿至陜臣迎接郊外跪請聖安德祿密宣上諭武格前在署理奉天將軍任內不應將一年養廉銀二千兩全行支領著即差人送與現任將軍多索理等因欽此臣跪聆之下惶懼愧悔無地自容五月初四日接奉怡親王諭帖當即將臣巡撫任內養廉銀二千兩差家人起解間又想起在署將軍任內曾領過本年春季分執事銀一百六十二兩於五月初六日一併送交奉天將軍矣臣仰蒙恩遇至優至渥乃不深自警省始則冒昧關支繼又不行奏明踈忽昏昧罪復何辭今蒙皇恩寬宥指示教誨即天地之包容父母之慈愛亦不能至是惟有銘勒肺腑於操守一節朝夕冰兢凜天威於咫尺期補過於將來而已為此繕摺叩謝天恩謹奏汝之操守二字朕難信矣愼為之以後諸凡過誤朕皆原情恕宥若於此一節再有毫釐干犯必置於法斷不姑寬非朕獨嚴於汝蓋緣用人顔面攸關其勢不得不然耳時當捫心自警更將陛辭時面奏之語常念勿忘雍正七年六月十八日署理總督臣查郎阿西安巡撫臣武格謹奏為奏請聖鑒事竊惟為政首在得人安民尤貴察吏臣蒙皇上天恩畀以封疆重任於到陜之初未知屬員賢否因思司道府直隸州均有表率屬員之責臣即分檄密查令將所屬賢否據實開報并飭令各舉所知去後隨據各司道府直隸州陸續開報大率惟以屬員蒞任不久未知確實遊移詳覆者居多臣思陜省州縣正印幾及百員何至俱屬新任隨細加確查始知試用人員有委署二三月而即行改委者又有未及一年而三易其地者無怪乎均有蒞任不久未知確實之詳也臣查試用人員原經奉旨如好具題補授如不能辦理地方事務該督撫將該員出具考語送部引見請旨其庸劣者即行題參欽此嗣經部議試用人員扣限一年分别具題等因奉旨依議欽遵各在案今陜省一年之內屢經改委如係調繁則該員必屬才守兼優應即遵旨具題補授如係調簡則該員必屬不能辦理地方事務應即遵旨送部引見今若不行題請屢次更易在該員尚不知民情土俗而上司何由知其才具操守耶臣愚以此等試用人員有庸劣者應遵旨即行題參如有才守出衆者亦即據實保題其餘委署試用人員不得於數月之間擅行更調均請照例扣限一年俾得體察民情土俗從容料理展其所長則才守優劣判然可見如果實心盡職具題補授如不能辦事將該員出具考語送部引見庶人材得收實用於吏治民生似有裨益臣等愚昧之見未知可否謹會同繕摺恭奏伏祈皇上睿鑒施行謹奏汝等既欲如此辦理姑試行看但恐拘定例限不得任意調用反覺窒礙難行必至後悔況改調之權操在汝等與他人無預若能令庸員久試劇任賢員久任簡地不煩更易而事亦不誤乃朕求之而不得者豈有將發往人員喜令汝等朝更暮易之情理耶今係出於汝等奏請若朕勒令為此力所不能期必之事則心有所不忍也此奏甚屬無味西安巡撫臣武格謹奏為奏請聖鑒事竊查錢糧倉儲最關緊要臣到任兩月以來屢檄飭查據司道府直隸州申覆細為查對多不符合皆以錢糧之欵項繁多完欠出入一時不能畫一無憑核實開報則是必待奏銷後始有册籍可以稽查如果挨年奏銷亦必於次年五月方知上年確數而况陜省自雍正四年至今不行奏銷已三年矣倘內中有那新掩舊以完作欠出入混淆借名影射等弊何由查究今臣輾轉思維行令各州縣立一印信月報於每月初三日將前月徵收解支各項開列欵目填注細數造具四柱印單徑報臣衙門查考其一切正雜新舊錢糧俱有欵額每月將徵存解支四柱細數開報委員拆併盤驗便難掩飾惟倉儲陳陳相因糧數繁多非徹底盤量虛實難知今現在委員分頭處處盤量但盤淸之後若不立法令其按月開報恐弊竇復生今令照錢糧報單欵式每月將額徵民屯本折若干支兵起解若干取獲批收月日出糶者銀存何處已借者按例催追一切數目俱令開明申報使之不能欺隱便易盤查再課稅贏餘未必全數實報恐有不肖之員或稍報些微外博無隱之名內侵贏餘之實至牙帖雖由布政司頒發然州縣之濫給地棍之朋充剝民膏而漁利者恐復不少也今併令行月報之法則綱舉目張明若列睂便易稽查夫每月將倉庫各項使之和盤托出自當觸目警心知所顧忌併行各該管道府直隸知州俱各造送月報以防州縣之揑開俾道府州亦得勤於察查臣復按月報各單細加磨對并密委賢員不時稽察如此則盤查嚴密而於錢糧倉儲不無裨益矣是否可行伏祈皇上睿鑒訓示謹奏所奏未嘗不是但汝甫經到任一切未能洞悉現在又值大兵出口軍需事冗如此急遽辦理殊覺太驟果具有燭姦釐弊心力盍且密察暗訪胸中一一了然無疑之後方徐徐次第施設不但不被人欺亦可自免乖謬之咎於汝陛辭時朕經切諭似此舉動毫無從容氣象為汝甚憂之查郎阿和平穩妥事事與之商酌而行不可自恃臆見以求速效雍正七年七月初九日西安巡撫臣武格謹奏為奏聞事竊臣來陜時蒙聖主知遇之隆不以臣謭劣恩命提撥將軍常色禮臣欽領訓旨謹志肺腑到任以來凡將軍一切事務無一不隨處留心臣聞得將軍與副都統辦事各執已見不能和衷因此臣面問將軍常色禮據云西安八旗原設先鋒二百名嗣經陸續挑選增添統計前後共有六百名然先鋒每月錢糧仍照兵丁二兩之數支給雍正元年年羮堯傳旨將八旗先鋒每名每月加增銀一兩經原署將軍伊理布代兵丁具題謝恩在案今副都統琢鼐以為續添先鋒名數過多應酌議裁減但兵丁內惟先鋒最為緊要況蒙皇上恩賞錢糧已經奏謝不便請裁等語臣對常色禮云當查明添設先鋒緣由與副都統等斟酌辦理不必固執又常色禮向臣云副都統蘇穆爾濟謝恩摺子蒙皇上硃批訓旨西安駐防事務俱著照寧夏將軍席伯之所行辦理欽此我遵旨要將寧夏所行之例傳諭八旗因同副都統等商議據蘇穆爾濟琢鼐二人云寧夏例佐領等官街上遇見將軍副都統俱下馬站立今應傳諭西安八旗佐領等亦照寧夏之例下馬再者西安有臨潼湯泉應將旗下婦女坐湯一事永行禁止如有違禁縱容婦女坐湯者將伊夫男併伊長親嚴行治罪我因回云佐領等官路遇將軍副都統下馬之處自有一定儀注不便拘定照寧夏之例應照儀注定例遵行再婦女坐湯一事原因有病方去坐湯若無病而婦女出外遊玩自應嚴行禁止今不行分别概行嚴禁似屬未協除此二事之外一切事務俱遵旨照寧夏之例多寫告示傳諭八旗告示業已寫就琢鼐蘇穆爾濟云不將此二事敘入我們不放官銜因二人意見不同是以告示至今停擱等語臣對常色禮云伊等雖各執意見自應遵旨一面辦理一面密奏不宜停擱細看將軍臣常色禮與副都統臣琢鼐等彼此不能和衷辦事恐於地方無益謹繕密摺奏聞伏祈皇上睿鑒謹奏此所奏已悉又張正文與常色禮較論收馬之處為何隱而未奏同日又奏為奏請睿裁事竊臣細查各州縣存倉糧石有興安州於康熙四十五年江水泛漲衝塌城垣房屋漂沒各項倉糧共六千四百四十九石零前撫臣鄂海以此項漂沒糧石皆兵丁積蓄之需不便虧缺題請令官紳士庶不拘多寡儘力捐輸按年咨部足額停止在案現在按限每年咨報但自四十五年題請捐補以來至今二十餘載止捐過糧共七百九十餘石尚虧欠糧五千六百五十餘石零若聽從民便捐輸究無完補之理若嚴催勸捐又恐不肖官吏借名勒派伏思我皇上念切民生凡有利益於地方者不惜數百萬帑金恩賜蠲免今此數千石之糧臣愚以為似可不必勸官紳士庶公捐以致積歲纍年有名無實徒使倉儲虛懸臣查陜省現動五分耗羡發各州縣採買糧石存貯社倉興安州漂沒之糧應否竟動五分公項買補足額以免催捐之纍以實倉儲之用謹密摺奉聞伏祈皇上睿裁施行謹奏此奏是候朕另有諭旨聞爾懶接屬員倚信所用堂官其人雖無勒索情弊每虛張威勢惹人厭憎汝等督撫大吏若深居髙拱怠於接見屬員則斷不能無忝封疆之任况爾於漢字文檄未諳土俗民情未悉如又不謙恭延訪虛衷博採何以知利弊之應興應除何以知有司之某優某劣且上下情意既不浹洽諸事何由斟酌損益所難者守令分治各地相隔遼遠不便常時調至相商耳豈有到門守候致令空回之理觀汝大有亡而為有虛而為盈驕矜自是不稱厥職光景現在事務不悉心向是當處講求惟以搜剔已往苛刻為事是乃所以自誤也嗣後當平心靜氣謙虛下人隨辦隨學今奉朕如此訓誨倘仍不返省已過竭力改勉則誠為辜負簡擢一無用之物矣况堂官之稱朕經屢禁督撫不許復用何得重蹈故轍觀爾自到任受事以來所奏所辦率多任性自用無非一已之粗淺識見而已至於朕所教導者一事未能遵行得無將朕之訓旨盡皆遺忘乎試將日前於陛辭時數次所奉之旨以滿文備悉録出齎呈朕覽雍正七年閏七月二十日署理總督臣查郎阿西安巡撫臣武格謹奏為回奏事竊臣等前奏委署試用人員一摺於雍正七年七月二十一日奉到硃批諭旨臣等跪讀之下仰見我皇上詳愼用人務期至當臣等才識粗鄙不計事之可行與否冒昧陳奏實屬草率今奉諭旨訓示臣等恍然省悟惟有細心斟酌因材任使務期吏治民生均有實濟以上副聖主誨勉之至意理合繕摺回奏恭繳原奉硃批伏祈皇上睿鑒謹奏汝不計事之可行與否冒昧草率猶幸於朕前陳奏尚可蒙朕訓諭令汝恍然省悟若任此粗鄙孟浪強不知為知之心措置地方事務恐屬員未必盡情直言規諫汝等也其害可勝言乎朕昨批諭武格摺內有凡事必須了然明白胸有成竹之後方徐徐次第料理如此急驟恐有乖舛之訓誠不謬矣不寧惟是即此朕前孟浪陳奏觀之地方上必有區處不協事件宜詳加體察更正不可粉飾自欺致令有所貽誤至於統率屬員之難再經幾時益當洞然明白是乃苦事非榮事也所以聖人有為臣不易之語非明達公忠之賢臣不可與言此不易二字愼為之總之若不虛已廣咨斷不能有所長進也試行看同日又奏為回奏事竊臣前奏設立月報淸查錢糧倉庫一摺於雍正七年七月二十一日奉到硃批臣跪讀聖訓感悚交集臣質本庸愚遇事急遽未能詳悉慎始豈能措置合宜今蒙聖恩高厚諄切訓誡皆由皇上愛臣之深望臣之切務使臣小心謹愼不至欲速誤事實臣之所感泣銘心而不敢不痛加改勉者也臣欽遵訓旨嗣後凡事當密加察訪會同署督臣查郎阿細為商酌次第舉行不敢自恃臆見以求速效致有貽誤理合繕摺回奏所有奉到硃批一併恭繳謹奏應痛加改勉與否在汝之捫心自問也同日又奏為據實陳情仰祈睿鑒事雍正七年閏七月十三日齎摺家人回陜臣跪讀硃批諭旨感懼惶悚無地自容謹將陛辭前數次所奉訓旨恭録滿文另摺敬呈御覽外伏讀諭旨以臣懶見屬員擅用堂官上厪宸衷臣不敢不據實陳情臣謬膺封疆初任外吏地方踈懶也再臣深慮堂官滋弊况欽奉飭者甚多從不敢瞻顧徇情伏思臣至愚極陋一無知能仰沐皇上天恩洊歷封疆重任所恃以仰答聖明者止此一點微忱不敢因循遊移此實臣之下情也今蒙聖主垂念教訓臣自當欽遵凜志平心靜氣謙虛下人隨辦隨學以仰副我皇上屬望之至意謹繕摺奏聞恭繳硃批謹奏能否欽遵凜志須看汝祖父之積德暨汝之福量何如亦非朕所能強者同日又奏為奏聞事竊臣前奏將軍常色禮與副都統琢鼐等不能和衷一摺奉有硃批臣伏查大兵西征摘發西安駐防八旗馬九千匹每馬一匹照例價銀八兩在司庫給發將軍副都統分給八旗官員買補後據八旗官員買到馬匹內有騍馬將軍副都統驗收時常色禮要將騍馬一併驗收副都統張正文云我已傳諭所管漢軍不收騍馬常色禮云若不收騍馬兵丁等如何擔得起張正文云我不收騍馬情由將軍不妨具奏因而彼此較論後八旗滿洲蒙古漢軍已將騍馬一例驗收矣是以臣不敢具奏茲奉諭旨下詢臣謹繕摺奏聞併繳硃批奏摺謹奏凡有奏聞當盡情無隱若藏頭露尾或於事中擇一二件或於言中擇一二句巧為陳説以作曾奏過三字地步朕所深惡者汝此奏即係不盡情之一端也志之戒之雍正七年九月初三日西安巡撫臣武格謹奏為恭繳硃批奏摺事雍正七年八月二十三日奉到硃批諭旨四摺臣跪讀聖訓不禁感激涕零悚愧交集竊臣至愚極蠢事多孟浪蒙皇上天恩不加譴責乃諄切訓誨反覆開導使臣得以悔悟修省臣感戴皇仁凛遵聖訓惟有刻自改勉事事體察小心謹愼虛已學習勉效駑駘以仰副皇上勉勵之至意所有奉到硃批四摺臣謹繕摺恭繳伏祈睿鑒謹奏修福作孽俱在爾自為朕何能強之使然耶一六月大旱督撫率同各官在龍神廟祈禱雨澤正齋戒禁屠時將軍常色禮屢請兩院喫肉頗有物議又巡撫於齋所坐間向署督談及五月十三牛肉之美言之津津吩咐縣官八月丁祭必要肥大之牛聞者莫不掩口又齋戒時院署仍要鵝鴨等物時百姓望雨甚急謂官員並不誠心祈禱大有謗言此固小疵但地方大吏一舉一動萬耳萬目觀瞻指摘大吏等任性而行信口而談自難免於萬口之訾議也一署督查郎阿初歷外任於地方事未能深悉但平易近人留心訪求頗有虛懷受善不自滿假之意每自以不通漢文專靠幕賓為憾一巡撫武格數月來操守固無可疑但凡事不知本末不識緩急如四五月內大將軍出師時正在軍務殷繁無一間員忽將府廳州縣飛檄紛委各屬盤糧有以軍務緊要稟請寬限者即加嗔責致各員顧此失彼周章失措夫盤糧寧非正事但軍務更為重大盤糧稍緩時日未妨也又嚴飭查報月摺所列欵項重復瑣屑全無關係令道府州各將所屬官員一月內事實於每月初開列呈報今日審狀明日比糧今日相驗明日查勘開載紛繁無關緊要且妄駁文移不按繩墨舛錯倒亂前後矛盾致下屬莫知適從競傳其所用幕賓林姓乃前撫西琳舊幕王姓係前甘撫莽鵠立舊幕巡撫誤信前撫之言任用不疑巡撫原於漢文不諳而地方事務全係漢文故幕賓得以恣肆也即署督查郎阿亦對司道有撫院相公果然混閙無怪外邊議論之言而藩司張廷棟臬司碩色亦各懷疑二時有憤悶不平之語再巡撫初到任審訊參革淸澗令陳錦私派一案當堂只説得一句你要據實供其後總是書辦在旁問供後書辦説此案須駁巡撫點首而退傳者駭異嗣後審事多係書辦問話初臣未信曾面詢岐山縣盜案內犯官莊秉中王嘉賓等謂果係書辦問話又督標中軍署副將王友詢街中遇巡撫家人騎馬衝撞標役原未認得呵斥是實巡撫家人即大怒以鞭趕打王友詢欲稟巡撫為撫標中軍孫王法勸止閏七月十五日王友詢循例上衙門稟揖巡撫傳進待茶友詢一嘗即回巡撫此茶是毒藥巡撫笑謂拏來我嘗大加驚詫王友詢因備述前事巡撫乃諭令責處家人以好言安慰而出當經王友詢稟知署督而遍城皆傳究未知茶內果著何穢物聞亦非毒也以臣細察巡撫外貌似有才情可以辦事但心不虛公徒形其剛愎之氣故善言不入而耳目壅蔽識見偏僻不順乎情理之宜故任意妄行而張弛悖謬遂致內幕之欺朦蠧吏之舞文家人之狂誕俱在所不免矣一閏七月初二日各官齊集城隍廟宣講上諭藩司傳集奉旨發來補用人員驗看內有朱一蜚者督撫謂此禮部錢大人外甥可委署髙陵縣知縣時驗看各員俱露不平之色於督撫既散後有監生范榮者跪於藩司張廷棟之前大聲謂卑職等俱係奉旨保舉來的如卑職等辦不得事情願咨回藩司默然司道散後各員又向府廳等官紛紛有言大概謂大人徇私廢公之意由錢大人一語招之也一鳳翔縣額徵鹽課銀六百餘兩知縣任樞南按丁加派至一千二百兩署扶風縣知縣陳恭徵收鹽課耗羡重至加三且以大戥稱收貪縱無忌寶雞岐山郿縣三處鹽耗亦重加三查陜省徵收地丁耗止加二俱解司庫充公今鳯翔等五縣徵收課銀或倍徵或重耗並不歸公侵蝕銀二千二百餘兩臣職司鹽法訪察確實於本年五月十一日詳報督撫鹽三院惟鹽院嚴批總督因出師在即軍務倥偬未及批示巡撫不知何故置之不問至今已逾三月竟視為尋常不干功令之事矣及任樞南因考棚科派為學政朱曙蓀查出題參督撫亦隨趕參查派數無多贓非入已視倍徵鹽課婪贓入已為數又多者輕重大懸乃舍大參小未審何以顚倒至此也今被人如此譏議試回思前此數次批諭無一語不中汝病大抵身居上位衆目之所具瞻茍一言一動不加詳愼人即從而輕蔑哂鄙之矣一為屬吏兵民之所哂鄙尚何令之可行何事之可舉也外任地方尤非滿洲旗下相習可比稍不檢點輒致物議即如今日爾之顔靣安在此等雌黃之語汝何由得聞方且日受欺諛之詞泰然自足居上位之難於斯不更可見乎若不廣開耳目虛己以求直言徒尚一偏之見汝雖自以為是爭奈人不以為是何嗣後仍不痛切改悔逐處省察加意勉勵則真為一無用之棄材矣雍正七年九月十五日西安巡撫臣武格謹奏為遵旨回奏事雍正七年九月初八日奉到硃批諭旨發來一摺汝同查郎阿看畢各具摺回奏欽此又蒙聖恩訓誨諄諄臣跪讀之下不勝戰栗悚懼之至謹遵旨將奏摺內所列各欵逐一登答據實奏聞仰懇聖主鑒察一摺開六月禱雨齋戒時將軍常色禮屢請兩院喫肉等語臣查本年自六月十七日得雨之後天氣稍旱隨於六月二十六日會同督臣並司道等官設壇祈禱即陸續得雨將軍常色禮七月初八日還願請臣喫肉一次在開屠之後並非齋戒之時又摺開臣於齋戒之所向署督臣談及牛肉之美吩咐縣官八月丁祭必要肥大之牛等語臣查丁祭乃現在一問虛實立辨又摺開臣於齋戒時仍要鵝鴨等語齋戒係臣等督撫專主之事臣於祈雨三日前出示齋戒禁止屠沽誠恐軍民人等或有犯禁時加嚴查豈有臣衙門竟先犯禁之理臣衙門執事員役甚衆有無此事衆人皆知斷難掩飾一摺開臣不識本末緩急正在軍務殷繁紛委各舍急就緩亦並無屬員以軍務緊要稟請寬限之事現有委盤之州縣可證一摺開臣查報月摺全無關係等語臣到任後查得自雍正四年以來各項錢糧尚未奏銷各屬申報庫貯混雜不淸通省完欠實在數目臣衙門並無册案可查是以每月令各屬造送月報以防州勘一切瑣屑之事故為苛察也一摺開臣妄駁文移所用幕賓林姓王姓誤信前撫之言任用不疑故幕賓得以恣肆等語臣之幕賓林蘭王孟學二人雖係前撫臣西林莽鵠立之舊幕皆臣前在京時訪問延請並非莽鵠立等所理了然胸中方敢舉行並無幕賓恣肆之處一摺開臣審事多係書辦問話等語臣蒙一摺開臣家人於督標中軍副將王友詢稟揖之時茶內著以穢物等語閏七月初十日臣赴會府臣家人六兒後來路遇西安城守參將王廷極跟役呵斥下馬與臣家人分辨而散臣實未之知也穢物也一摺開督撫於貢生朱一蜚謂係禮部錢大人外甥委署高陵縣徇私廢公等語緣臣本年閏七月初二日在城隍廟宣講上諭適布政司張廷棟傳集試用人員驗委高陵縣員缺臣與查郎阿欲將監生韓鏞委署高陵張廷棟署臣觀朱一蜚為人似屬明白隨同署督臣委署高陵縣事臣實不認識所稱錢大人也一摺開臣於鳳翔等縣額徵鹽課重收火耗已經查報置之不問等語本年五月十一日據糧鹽道杜濵詳稱訪查得鳳翔府屬之鳳翔等五縣加派重耗臣隨即批行布政司嚴查在案於五月十六日據布政司等詳各屬自首陋規內有鳳翔府申報府屬自首鹽規耗羡銀兩臣思鳳翔府屬既經自首在案何糧鹽道杜濵又稱係伊查出之項隨復批司確查去後旋據布政司詳稱鳳翔府知府劉柏於本年正月二十一日將收受五縣鹽規首明歸公經署司杜濱於正月三十日批明仰候彚轉又於三月初五日劉柏將所屬鳳翔等五縣鹽規耗羡俱行首出則非由杜濱查訪可知臣因彼時各府州縣一切陋規尚未徹底查淸俟查淸之日將此項彚案奏報是以未經奏明今摺內云臣已逾三月竟視為尋常不干功令之事臣現有批查卷案可據並非置之不問也又云臣於鳳翔縣知縣任樞南因考棚科派經學臣朱曙蓀查出題參督撫等亦隨趕參等語查任樞南科派棚費朱曙蓀於六月二十九日題參並不移會臣於七月初五日始據鳳翔府由司轉揭隨即會疏糾參在案並無徇隱至此項私派係應參之案其前項鹽規既經劉柏等首出係不以上各條謹據實陳明臣識見粗鄙仰蒙皇上恩遇教誨提撕至再至三夙夜兢惕惟恐上負聖恩乃不料有此摺奏臣之肺腑久蒙聖主埀鑒臣亦何敢辨論但既有此奏倘不根究明白臣之悚懼恐惶即夢寐亦不能自安仰懇聖明鑒察如果臣有前項過愆情甘坐罪理合據實回奏伏祈睿鑒謹奏從此益當知為臣之不易居上位之尤難於一切處謹言愼行檢察防範可也將前數次所奉批諭時繹毋忽雍正七年十月初四日西安巡撫臣武格謹奏為遵旨回奏雍正七年十月初三日署督臣查郎阿面交奏摺一件傳旨命臣明白回奏臣跪讀硃批諭旨竊思以臣之愚鈍上厪聖懷望切憂深恩賜教訓臣敢不益加謹愼痛自改勉以仰副聖恩至摺奏情節臣前同查郎阿看畢已於九月十五日逐欵聲明據實回奏所有奉到硃批諭旨理合恭繳伏祈皇上睿鑒謹奏覽奏已悉雍正七年十一月十一日西安巡撫臣武格謹奏為請旨事竊照協領莫爾渾自藏帶回兵丁沿途擾民一案雍正七年五月初十日準兵部咨奉上諭莫爾渾著革職拏交將軍常色禮巡撫武格將伊及兵丁沿途肆行之處嚴審定擬具奏欽此欽遵移咨到臣臣即會同常色禮將案內犯法官兵正在嚴查究擬間接奉諭旨命常色禮帶領兵丁前往涼州駐劄臣因此案尚未審結隨與常色禮并署將軍臣查郎阿面同商酌查郎阿以奉旨指名發審之案不便越爼常色禮隨將此案應轉交何人會審之處具奏請旨今於十一月初九日據常色禮自涼州差家人來臣衙門面稟具奏會審莫爾渾一案奉到硃批承審之處與常色禮無涉臣隨與署將軍臣查郎阿面同酌議而查郎阿仍以奉旨指名發審之案不便會審為詞臣思此事係奉旨發交將軍與臣會審之案署將軍既不會審臣亦何敢自行審理但例限已逾不敢再緩仰懇聖恩訓示或令查郎阿同臣會審或令臣自審之處恭候訓旨欽遵奉行謹奏此案查郎阿理應會審屢次推諉識見甚屬卑鄙將朕此諭令查郎阿知之雍正八年正月二十九日西安巡撫臣武格謹奏為遵旨回奏事雍正七年十二月十九日總理稽查軍需兵部尚書臣查弼納等到陜口傳諭旨爾到陜西傳旨與武格伊為地方巡撫將緊要軍務不上緊辦理至於遲誤甚屬不合向後如有遲誤爾等即行查參欽此臣跪聆聖訓不勝惶悚戰栗之至伏查西安一切軍需經大將軍臣嶽鍾琪辦理之後未完事件本屬無多所有接辦騾頭馬匹以及口袋鐵掌之類臣悉遵條欵照數備辦如期解送其續買解甘補換騾頭並準查弼納等咨買僃用騾頭以及鐵掌籠嘴腦包等項亦經如數解送會同署督臣查郎阿另摺奏聞兹奉訓旨嚴飭臣嗣後惟有益加小心兢業黽勉從事以仰副皇上委任至意理合繕摺回奏伏祈皇上睿鑒謹奏朕若不差查弼納等前來料理汝等甘陜督撫必至貽誤軍機難保首領也不能鼓舞勸懲令屬員知感知畏如此繁劇事件豈一二人所可辦集者乎不過束手待罪而已無恥無能之輩種種不協朕亦何勝批諭雍正八年十二月初二日西安巡撫臣武格謹奏為奏聞事竊臣查陜省秋禾豐登二麥播種本年十月二十一日各屬得雪自六七寸以至一尺有餘不等已經署督臣查郎阿會摺奏聞又於十一月十四日普降瑞雪據西安府屬申報積雪三四寸不等據鳳翔漢中等府乾商等州各屬陸續報到同日得雪積地四五寸不等農民歡悅豐稔預兆臣不勝慶幸之至所有十一月分得雪日期理合繕摺奏聞伏祈皇上睿鑒謹奏俟明歲收穫後再為慶幸亦不為遲似此放言肆志朕不但毫不慰悅且代汝憂之雍正九年三月十三日西安巡撫臣武格謹奏為請旨事竊查陜省現在辦理軍需凡有應行請旨與奏聞事件俱關緊要難以刻緩臣若遣家人齎摺由西安赴京程途二千餘里未免多需時日恐有遲延仰懇皇上天恩俯念軍興之際凡應奏事件容臣由驛遞齎送兵部轉奏庶不致濡滯時日而臣於承辦事宜皆得恭請聖訓隨辦隨奏亦不致少有舛錯理合繕摺奏請伏祈皇上睿鑒謹奏另有諭旨命大學士轉傳西安巡撫臣武格工部侍郎臣馬爾泰謹奏為奏聞事竊臣等節準部咨欽奉上諭撥江寧滿兵一千名河南滿兵五百名直隸緑旗兵一千名河南緑旗兵一千名來陜駐防又經廷臣議奏撥上駟院馬並直隸山西山東河南馬共一萬匹以供甘肅調撥官兵之需奉旨著將上駟院之馬一千七百匹解送西安交與巡撫武格分發餧養欽此嗣準署督臣查郎阿來咨準大將軍臣嶽鍾琪咨開直隸山東馬匹分發陜省餧養山西河南馬匹分發甘省餧養先將臕壯之馬挑選起解赴肅其不甚臕壯者仍留餧養次第起解等因俱移咨前來臣等隨將來陜滿漢官兵住居房屋並餧養馬匹事宜預為料理酌定江寧河南滿洲官兵會同將軍秦布安置滿洲城內其河南滿兵隨帶餘馬一千五百匹分發督撫兩標並城守營牽領餧養直隸河南緑旗官兵臣等即於西安城內之城隍廟開元寺空間房屋并一應入官房屋分派居住上駟院馬匹並直隸山東馬匹分發各州縣牽領餧養一切棚槽草料等項俱經預僃齊全隨於本年二月三十至三月初七等日據河南副都統白淸額帶領滿兵馬匹先後到陜臣等隨將官兵安置滿城其兵丁所帶餘馬一千五百匹尚欠臕壯俱難起解隨即分發督撫城守標營牽領餧養復於三月初四五六等日據侍衛奇通阿等解送上駟院馬共一千七百匹據稱沿途倒馬二十三匹臣等亦即會同親驗內有可以起解之馬一百四十九匹現在分發咸長二縣休養數日委員解赴肅州其餘馬匹看其臕分不便即為起解隨即分發各州縣餧養俟其臕壯再為陸續起解至於江寧滿兵並直隸河南緑旗官兵以及直隸山東撥解馬匹尚未到齊統俟到齊之日次第奏聞另行彚疏題報所有上駟院解陜馬匹並河南來陜駐防滿兵以及隨帶餘馬到陜緣由合先繕摺奏聞伏祈皇上睿鑒謹奏馬匹最為緊要督令盡心餧養不可稍致忽略雍正九年五月初六日西安巡撫臣武格工部侍郎臣馬爾泰謹奏為奏聞事雍正九年五月初二日準戶部咨開議覆寧遠大將軍嶽鍾琪續奏西鳳運米一事倘山路難以車運腳價或有不敷令臣等據實議加將來或有續運令臣等確為妥商毋以巳定本運固執原議等因奉旨依議欽此欽遵咨行前來臣等竊查挽運西肅甘涼兵米一案前奉諭旨隨悉心商議再四籌畫酌為本運之法派定起運日期於本年三月十六日為始將第一運糧石挽運起程已經僃由題報在案今查前項軍糧各州縣接連運送者約計十萬餘石第一運糧石於四月十六二十等日隴州汧陽縣已經運到甘州交收蒲城縣已經運到西寧交收其未經運完糧四萬餘石現在源源進發據委查糧運文武員辨以及經過糧運之各州縣絡繹稟報沿途糧運並無擁擠一路口食草料俱經預僃足供運夫買用駝運者由六盤山程途直捷車運者歷固原草地轍迹平坦牲畜車輛分途行走各無阻礙至於運送腳價每日每百里給以一錢六分諒足敷用臣等現在仍行悉心察訪果有不敷自當據實辦理議奏斷不肯苦纍運戶是此番挽運軍糧現在兩省情形實無難行不便之處惟是事無一定自當因時制宜將來或有續運糧石臣等又何敢以本運已定固執原議除俟糧運事竣另疏具題外所有現在挽運糧石情形理合據實奏聞上慰聖懷謹奏據奏挽運糧石情形嘉悅覽焉但軍需事關重大惟宜直陳不可絲毫隱飾硃批諭旨卷五十三
