body:
  text: 欽定四庫全書硃批諭旨卷一百十硃批吳升奏摺雍正二年五月十八日福建陸路提督臣吳升謹奏恭請皇上聖安朕安聞爾向日居官聲名甚好朕深嘉之爾其加意愛身保飬精神多為國家出力數年同日又奏為恭謝天恩事雍正元年十二月十一日臣家人恭捧御賜貂帽一頂到泉州府臣即郊迎至署望闕叩頭謝恩祗領訖伏念臣老邁庸愚諸務不諳我皇上開天地覆載之恩沛雨露栽培之德曲賜優容畀任封疆已屬過分復屢荷天語褒嘉更以貂帽賜臣輝煌華美頂戴殊榮不獨臣踴躍鼓舞喜出望外即舉家子孫相率叩頭瞻仰莫不歡呼感頌皇仁為此繕摺恭謝天恩伏乞皇上睿鑒謹奏覽卿奏謝知道了地方上一切事宜或夲省或他省凡有所聞所見與吏治民生有益者不拘文武兩途俱當竭誠入告莫負朕信任之意同日又奏為恭謝天恩事雍正二年二月初七日臣齎摺人回恭捧欽賜御書福字一幅人參四斤克食一匣到泉州府臣即郊迎至署恭設香案望闕叩頭謝恩祗領訖隨敬展奏摺跪讀硃批臣不禁汗流浹背感激涕零自揣忝任封疆四十餘年虛糜祿俸無為國家出力之處不行擯斥已屬厚幸何期聖恩浩蕩奬勵至此慚愧滋甚惶悚無地即捐糜頂踵何能仰酬髙厚惟有益竭駑駘勉供職守以期上報天恩於萬一為此謹奏凡此恩施緣卿數十年來公忠奉職勤慎持已有以致之也朕為天下臣民主從來待人不肻偏私每念所加之恩尚不及卿之勞效勉之雍正三年正月十八日福建陸路提督臣吳升謹奏恭請皇上聖安朕躬甚安京都內外寧謐雨㿩應時特諭爾知聞爾精神強健朕甚欣悅同日又奏為恭謝聖安髙世定面傳所奉諭旨臣跪聆之下當即望闕叩頭謝恩又十二月十八日臣齎摺人回敬展硃批奏摺叨蒙酬萬一惟有朝夕焚香頂祝萬夀無疆少伸銜結之誠耳為此恭謝天恩謹奏覽雍正三年五月二十六日福建陸路提督臣吳升謹奏為遵旨回奏事竊臣奉到硃批命臣密訪髙世定在京被隆科多嚇詐銀兩一事據實奏聞欽此臣自當欽遵密訪以副諄命至意但臣與髙世定素未謀靣僅上年到任由泉經過一晤而已二人果有私相授受之事焉肻向臣微露且事關機密臣又不敢假手他人致滋漏泄臣實無從探訪理合具摺回奏伏乞皇上睿鑒謹奏知道了黃國材向日居官是一巧宦為人所共知近年來輿論不一有言其已遷改者有言其少改者亦有言其外似知懼內實仍然如舊者爾意以為何如據實奏聞不可少隱聞滿保操守較前大改果然否此二人吏才儘有但廉之一字甚不足若此字不能必至事事涉私則百弊叢生矣如爾者千百中無一也賜爾平安丸二百丸以備營伍中兵丁需用此藥竒效且有益無損性味和平無病之人亦可服雍正三年九月二十日福建陸路提督臣吳升謹奏為遵旨回奏恭謝天恩事竊督臣覺羅滿保撫臣黃國材從前居官操守久在聖明洞鑒之中今蒙硃批下詢臣欽遵訪聞得撫臣黃國材操守較前稍好又聞督臣滿保近來勉勵操守言者異口同聲是皆我皇上訓誨激勵所致理合據實回奏至微臣年既老邁質復庸愚調任以來涓埃未效奉職無狀莫甚于臣者乃荷天語褒嘉臣聞命自天汗流浹背不惟不敢承受抑且不敢辭謝不知夙世何修邀此異數惟矢生生世世捐糜頂踵以期仰酬髙厚于萬一耳為此繕摺回奏叩謝天恩謹奏所奏甚公知道了雍正三年十一月十六日福建陸路提督臣吳升謹奏為奏聞事雍正三年九月二十六日據漳浦營逰擊李彪報稱九月二十日酉刻漳浦縣城內有姦徒黃尾一名在伊家門首忽插榕樹青枝為記時有功加官蔡隆馬兵黃進巡查地方見其蹤迹可疑將黃尾拏解送營該逰擊一靣帶兵巡邏一面即委守備會同文員查訊據黃尾供有凃廷向彼聲言今晚有匪類進城搶奪富戶你門首插榕樹青枝即可免搶等語并供出夥犯遊躍徐愷寧等隨差兵役拏獲訊據徐愷寧供出林昻為首併供出陳鎮家中藏旗三靣鼓二靣鑼一靣單刀兩把等語隨拏獲陳鎮訊據供出夥犯林穆林惠周招等十犯即會集周招家中又據拏獲林昻一犯訊據供稱伊係行醫度活因林棍家中有厦門逃來流匪吳通陳罔二名請伊醫治刀傷即商量入夥實係林棍為首等語又據兵役拏獲林棍等現解漳浦縣收審等情到臣臣即嚴諭該逰擊會縣立行緝捕務淨根株併移漳州鎮臣髙世定會飭各去後理合奏聞再照此案乃棍徒訛言雖聚夥商謀搶劫實未上盜現今地方安靜且獲到之犯巳交有司審訊通詳其起意實情同夥確數作何分别重懲應聽督撫二臣定擬請旨合併聲明伏乞睿鑒謹奏所奏已悉此等匪類雖云尚未上盜其情事已真當嚴加懲處至蔡隆等當從優奬賞也雍正四年五月二十日福建陸路提督臣吳升謹奏為奏聞事竊照閩省去嵗收成歉薄民乏蓋藏今嵗自春至夏雨水過多米船鮮至禾苖發晚米價處處騰貴惟福州延津邵武福寧各府州尚有市米可以支持其餘如泉漳興化汀州米價每倉石賣銀二兩五六七八九錢不等臣準據各該鎮協營咨報即飛移撫臣毛文銓設法接濟而撫臣立即檄飭該府縣動撥倉榖發糶仍差員前往溫州買米分濟又檄行臺灣府買運米麥運至泉漳分發並出示招商給照令往江浙等處販運來閩查各處人民赴泉州買米者日有萬餘人赴漳州買米者日有三四萬人今嵗早禾茂盛將來豐收正未可定然應于六月中旬後方得節次登場計期尚早除再咨撫臣多方接濟外理合將民間米貴情形繕摺具奏但米價雖貴百姓俱各安業臣巳移飭各鎮協營嚴加防範務期寧謐合併聲明伏乞睿鑒謹奏爾等封疆大臣見地方上此等光景當及早奏知以便預為凖備今巳六月將盡始行奏聞於事何益猶幸地方寧謐倘有些小事故咎誰歸耶大負朕之任用矣雍正四年六月十八日福建陸路提督臣吳升謹奏為遵旨回奏事竊臣前奏功加官蔡隆馬兵黃進拏獲漳浦縣城內姦徒黃尾一摺奉有硃批臣遵查功加官蔡隆馬兵黃進巡查地方緝獲姦徒係營兵分內之事今奉特旨賞賚實屬曠典臣欽遵諭旨捐出俸銀七十兩內蔡隆賞銀四十兩黃進賞銀三十兩發交該營逰擊李彪當官宣揚聖主德澤分給承領取領狀存案外合將遵行緣由具摺奏聞伏乞睿鑒謹奏賞此些須何足鼓勵兵心此事交與高其倬將蔡隆題請實授黃進超拔千總以示優典即將此摺付髙其倬看硃批諭旨卷一百十
