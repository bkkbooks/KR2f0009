body:
  text: 欽定四庫全書硃批諭㫖卷八十八硃批佛喜奏摺雍正四年五月十一日四川布政使臣佛喜謹奏為遵㫖據實密奏事竊臣欽奉聖主密諭聞羅殷泰操守平常爾到四川留心察訪密奏欽此欽遵臣到任之後查川省地丁稅課錢糧共計三十四萬三千一百四十四兩九錢舊例各屬加解耗羡銀共二萬八百七十六兩零又各屬解稅規銀二千九百七十六兩以上共羡餘銀二萬三千八百五十二兩零內除分解督撫銀九千九百九十兩及布政司衙門書役飯食紙筆油炭等項銀又二千七百九十六兩零尚存羡餘銀一萬一千六十六兩零是不惟足以養亷亦且可以辦公矣乃原任布政使羅殷泰仍沿舊習收支用兩副平盤出入暗為輕重其收銀之平每百兩暗重八錢共重收過銀二千一百七十五兩零其放銀之平每百兩暗輕八錢共短給過銀四千五百三十兩零此即係羅殷泰額外多要之錢也查羅殷泰於雍正元年五月到任起至雍正四年正月離任止歷年收放錢糧銀數參差不一共計多要銀一萬七千六百五十兩零除羅殷泰經手一切未清庫項及城工軍需錢糧遵㫖徹底清查據實詳報外理合將現在查出情弊數目先行奏聞至臣到任後收放錢糧仍照舊例彈兑謹將餘剩銀兩另行封貯臣不敢自專即行革除以沽名譽仰懇聖主批示遵行謹奏羅殷泰所得不止於此再加察訪奏聞至各省錢糧羡餘之應革應留朕槩不批諭全在爾等秉公執正而行還朕一是字而已固不必沽一時名譽俾將來至於難措更不可因循陋例置應除者不除總須爾等揆情酌理而為之朕既未有真知灼見如何批諭應革應留耶勉為之近日如馬哈之負朕殊可詫異世間既有馬哈年羮堯輩如此喪心之人朕亦難深信爾等也可愧之極雍正四年八月初六日四川布政使臣佛喜謹奏為恭繳硃批事竊臣前奏原任布政使羅殷泰一摺奉到硃批臣捧讀之下感愧汗流伏念臣以一介庸愚至微至陋由部郎隨班引見䝉我皇上拔臣於衆人之中特授安徽按察使旋復改授四川布政使臣自顧何人恭膺異數此臣祖父從龍以來未遇之隆恩也臣雖至愚亦具有人心何敢欺罔徇隱上負君父之恩自棄於聖明之世川蜀雖逺天鑒孔昭終難逃我皇上照臨之下惟有欽遵皇上勉為之㫖誓毋自欺以報君父耳所有地方事宜并前司羅殷泰之事除另摺奏聞外所有奉到硃批理合恭繳謹奏覽汝此奏出於真誠朕甚嘉悅果若如此立心自䝉上蒼照察獲福不盡勉之勉之同日又奏為奏明司庫錢糧事臣於本年七月十五日恭領硃批諭㫖羅殷泰所得不止於此再加察訪奏聞欽此臣於到任後查出司平重入輕出之弊巳於五月十一日具摺奏聞隨將羅殷泰任內經手出入卷宗徹底清查查出羅殷泰共擅動庫銀六萬一千六百六十一兩零因係擅動庫銀虧空正項錢糧無庸先具摺奏臣已㑹同按察使臣程如絲陸續㑹銜詳揭經撫臣法敏據揭題參候㫖審追其城工軍需案內擅動庫銀冒費錢糧現在逐細嚴查俟孟以恂石如金到川質訊明白即行詳揭題參再羅殷泰有恣意侵漁之處容俟臣密訪查明即行奏聞至臣查出羅殷泰收放錢糧司平重入輕出陋弊暫將陋弊銀兩封貯今跪讀硃批聖訓即將積弊平盤銷毁永行革除所有封貯各鎮協營汛併文職俸工輕平銀兩隨即各按原領數目造冊通行找給訖惟地丁項內重平封貯銀兩共計一千四百九十五兩零因各州縣花户零星勢難分給臣現在條議設法勸諭川民自首開墾內有里民急公自首及盡力開墾者酌計畝數多寡賞給花紅扁額等項以示奬勵臣捐給州縣置辦令其實力奉行今將地丁重平一項分給州縣以公濟公令其一併作自首及開墾奬賞之用民情易於鼓舞既暫寬其欺隱之罪復先示以奬賞之榮彼效順急公者交相勸勉樂趨恐後於國賦亦不無少補矣是否有當伏乞皇上睿鑒施行謹奏如果行之有益莫善於此但恐乘一時之興為此沽名之舉至後日力不能繼而止亦為不妙總在爾實心秉公斟酌為之朕不達外吏之事不便諭是否也同日又奏雍正四年六月十九日撫臣法敏遵㫖傳臣暨按察使臣程如絲密看皇上硃批伊所奏邊情丘形一摺臣跪讀之下仰見我皇上睿慮周詳無微不悉兹丘形號數一事臣㑹同程如絲現在確查俟有成見將應行事宜遵㫖詳議具奏所有恭閲諭㫖緣由合先奏聞伏乞皇上睿鑒謹奏知道了程如絲如肯秉公報效實屬能員倘私心過勝則其險叵測若因少年習氣而有孟浪從事之疵猶屬無妨所慮者恃才懷詐耳朕料伊不忍辜負知遇但未知立意果否如何據實奏聞密之同日又奏為奏明事竊照督臣嶽鍾琪具摺奏聞行令進勦賊蠻一案署提臣潘之善派建昌鎮標兵六百名提標兵六百名化林黎雅冕山兵丁各一百名後督臣嶽鍾琪以所派提標化林黎雅等兵不便擅發行令撤回而署提臣潘之善因建屬各營兵丁有分防汛地堵截要路之責難以抽撥且相機進𠞰之時改調兵丁恐失機宜以仍令駐劄咨覆督臣今提臣周瑛亦以所派提標等兵不便擅發行令撤回等因各在案臣看得提標等兵前調冕山相機進𠞰其䭾載馬匹鞍屉係必需之項自應支給購買俟事竣變價還項業經撫臣法敏具題臣動支備辦訖今周瑛具題行令撤回即應變價還項但提標等營出師冕山兵丁已將本年秋冬二季餉銀照出師兵丁舊例預支以為置辦軍裝之資今撤回之日即令將鞍屉等項變價還項是秋冬既無可領之餉銀而勒令變價還庫必至拮据臣請將前項銀兩稍寬時日俟明年領有春夏餉銀令其陸續還項則庫帑仍不虛懸而兵力得以少舒矣倘䝉俞允臣即申詳督撫具題伏乞皇上睿鑒施行謹奏所奏甚是周瑛此舉大誤已另有㫖矣同日又奏為敬陳末議仰祈睿鑒事竊查川省賊蠻金格等肆行無忌經督臣嶽鍾琪具摺奏聞行令調集漢土官兵駐劄冕山相機進𠞰雖事關軍務機宜不敢越爼妄議但臣身膺地方重任有所知聞敢為我皇上陳之查建昌鎮臣趙儒於七月初八日差李馬二把總瞿領二氏土司往梁山調關夀等乃賊蠻竟留馬把總為質只放李把總兩土司同關夀到冕山見鎮臣趙儒之後關夀同瞿氏復往梁山以招金格馬把總方回冕山又於七月二十日瞿氏報稱金格阿租要來求見但必得一人過河為質鎮臣准令馬把總前去為質午間金格阿租到冕鎮臣即傳見訊問據供有箇凶首走在虛浪溝水田上去還拏不著今往乾縣地方去拏關夀們拏著凶首也是來的鎮臣即令人記明口供等由臣看得此案賊蠻皆叔姪兄弟世濟其惡名雖復讐其實攫利如金格即已死姑姑之堂弟阿租糯咀即姑姑之子關夀與姑姑係郎舅結黨搶虜皆係罪魁惡首今以留質馬把總始行出見揆之此心未必即是歸誠若以出見而遂賞釋既無以服民心若以誘見而即正法亦無以信蠻人况金格等統領衆蠻抄搶邊民即係為首正犯何必更求凶首今陸續去來必求質而出見藉口别拏凶首不過巧為掩飾探我軍情而已以臣愚見既據金格等往返甚便離彼蠻巢自不甚逺非脫逺竄者可知何難一鼓而進擒出正犯安其黨羽俾各種番蠻知所畏懼邊境得永逺謐寧臣受恩深重故不敢避越職之嫌冒昧以陳伏乞皇上乾斷施行謹奏覽汝所奏足見忠誠朕甚嘉之如此方是嶽鍾琪已將此事籌畫盡善事畢爾自知也周瑛未審其中詳細機宜孟浪抽調甚屬差謬巳有㫖矣雍正四年十一月二十六日四川布政使臣佛喜謹奏為據實密奏事竊臣欽遵硃批諭㫖看得程如絲辦事實屬才能並未見有恃才懷詐之處臣常聞程如絲自述原係不想復活之身荷䝉皇上鑒察不惟復生且䝉特授按察使之職有生之年皆我聖主再造之德但受恩深重無以仰報等語臣實見其有感激圖報之狀並非甘於自棄之人至有不無孟浪之處實屬少年所致近來審理案件臣亦喜其虛公詳察此係臣所見程如絲之行事立意如此理合據實密奏伏乞睿鑒謹奏此奏朕欣悅覽之程如絲朕頗賞識其才伊寃得雪在蔡珽未到京之先蔡珽並未向朕言其才品朕一見即加奬許曽詢蔡珽如此人材為何不行薦奏據其回奏雖係屬員只經數面未與深談云云而蔡珽乃假朕恩以市德自居薦舉之功蔡珽若不負朕便作因伊薦舉所致能同心協力奉公盡職亦美事也庸何傷無如蔡珽之狂悖負恩今一一敗露程如絲未必不驚疑自恐倘露有如此光景汝作已意開示令伊毋恐但言皇上從不株連無辜之人爾便係蔡珽所薦若能以天經地義分别重輕自蒙皇上照察况爾實非因蔡珽所薦而獲知遇復何嫌何疑如此開導之可也同日又奏為奏聞事竊照冕山賊蠻狂悖肆行自取滅亡宜用𠞰而不用撫前經臣摺奏併業經題明事理俱不敢瀆陳外今准建昌鎮臣趙儒咨稱普雄地方雖有田榖已被賊蠻收割大半所遺盡算建昌所屬出陳易新倉糧先經碾運據總理糧建昌道動軍需銀一萬兩乘此秋成米賤之時即在附近建昌冕山地方採買米石預備不惟可無誤兵糧且可節省逺運腳費大兵所到賊蠻授首則所買米石備而不用於明嵗青黃不接之時即再臣接提臣周瑛咨開冕山出師雖非口外然蠻地險阻倍覺艱難且衝鋒破敵莫非王事一切軍需均照口外之例支給兵丁咨商督臣裁商督臣且督臣嶽鍾琪已奉上諭親赴川省駐劄調度凡動支庫頊錢糧應聼督臣題請支給合併陳明伏乞皇上睿鑒謹奏覽同日又奏為欽遵聖訓敬陳一得仰祈睿鑒事竊臣於本年正月二十二日在圓明園跪聆聖訓地方內城池橋梁最關緊要或有坍塌毁壞之處須設法修理完固欽此欽遵臣自本年三月入境見川北一帶地方盡無城垣到任後即檄查各屬繪圖申送迄今半載以來屢據各屬覆齊有傾頽而僅存基址者有荒廢而基址俱無者伏思川省夙號巖疆城垣亟宜修理但工費出自民間則小民不無擾纍若動支國帑興修川省額徵地丁銀止三十餘萬兩兵餉尚資協濟亦難以設法變通以臣愚見請援康熙六十年兵部遵請㫖事捐納貢監一條於川省各州縣開常平倉事例令各州縣秉公收捐按季造冊報部如有勒掯需索等弊臣立即詳參但川省雖係産米之地嵗無荒歉然積貯之計不可不預為籌畫可否約計十分之二令各州縣買榖貯倉以十分之八作建築城垣之費臣飭委亷幹之員確估工料查各屬報捐之數約計若干即委員興修按城造冊報銷臣愚蠢無知冒昧陳請若䝉俞允即詳請督撫具題聼部議覆為此謹奏此議似屬妥協可呈詳該督撫商酌為之雍正五年正月十二日四川布政使臣佛喜謹奏為奏明事竊查川省關稅鹽茶等項原係藩臬分管但均䝉皇上畀以重任自當秉公㑹同徹底清查前同按察使臣程如絲面禀撫臣法敏以暗增明報孰為得當撫臣答云應摺奏請㫖續據撫臣云已經奉㫖明報為是隨即欽遵嚴查確數令各屬據實增報去後於雍正四年十月據叙永同知杜士秀增報甚少時值撫臣委杜士秀前往烏䝉隨詳委布政司經歷李盤代理清查稅銀嗣據李盤報稱叙永同知額解雜稅鹽稅六百兩有零實可增報贏餘四千兩等情又於四年十一月據夔州府知府喬鐸除前報二萬兩有零外續據添報三千兩隨又令其儘收儘解間於十二月內督臣嶽鍾琪到川禀明清查事宜除委回避之東川府知府周彬代管夔關外其餘稅口或專委清查或稽察報增總期裕課通商至按察司所管鹽茶等項現在陸續詳明督撫二臣逐一清查隨收隨解盡歸公帑再查雍正四年據各屬增報數目除夔關外其餘不過數十兩或百十兩不等臣密訪大小稅口各官儘有情願報解而仍觀望因循者緣從前各該管上司不實心清查將贏餘盡作養亷名色逐漸花消今一旦據實首報即有從前欺隱之罪勒追解繳之難以致有瞻顧情弊伏乞聖主再施格外之仁豫以自新之路准照冒濫軍功自首免罪之例特降諭㫖准各關稅口各員即儘數首報免其從前欺隱追賠則各員毫無顧慮爭先報解而國賦日增矣如果臣言可採伏乞皇上特降諭㫖施行謹奏所奏知道了為夔關一事已另有㫖再奏一摺留中同日又奏為據實奏明敬陳管見仰祈聖鑒事竊督撫提鎮藩臬等官俱係我聖明之治然人各異心未必皆一稍有聲援瞻顧未有皇上拔擢於衆人之中疊加教訓又恩許摺奏臣仰體聖心欲臣秉公據實言人所不敢言之事臣若稍有畏勢趨炎瞻顧欺隱皇上即不加罪而臣捫心亦難自問今將臣心所疑慮不能釋然者為我皇上陳之查川省古號巖疆番夷雜處距京遼逺僻踞萬山而巡撫提鎮非係督臣嶽鍾琪親戚故舊即係舊日門下長隨今撫臣馬㑹伯乃督臣妹夫之親叔川北鎮臣馬紀勳係撫臣之姪建昌鎮臣趙儒係督臣父親嶽升龍之長隨而趙儒之弟趙黑子現為督臣之長隨稱為堂官即阻撓大金川不造送宗圖冊結之小金川湯鵬亦係督臣家人張姓之義子至副參遊守非係親舊即係同鄉不可勝數各擁重兵分布鎮協雖皇上神聖文武伊等安敢異心但以年羮堯之受恩深重尚敢種種欺妄是防微杜漸不可不慎臣思安不忘危不能不深為疑慮者也以臣愚昧之見似應斟酌調開以分其勢而後可臣為地方重大起見故敢冒昧據實奏聞伏乞皇上睿鑒施行謹奏覽汝此奏汝必有不妥協處畏嶽鍾琪參奏故以先入之言聳朕聼聞為預防之計汝所舉數人朕皆悉之內中無一人因嶽鍾琪保薦而用者朕秉性不畏人只畏天年羮堯因深負朕恩擅作威福開賄賂之門奔競之路因種種敗露不得巳執法以為人臣負恩罔上者戒非為其權重勢大疑懼而處治也嶽鍾琪如果踵而行之何能逃朕之照察汝此等挾私誣人之密奏更冀朕以忠誠謂汝似汝不知朕為何如主之輩徒自陷耳此奏姦險甚屬可惡慎之雍正六年閏三月初八日四川布政使臣佛喜謹奏為遵㫖覆奏事竊臣前奏修理川省城垣敬陳管見一摺奉硃批遵即詳請督撫具題俱未奉准行臣查修建川省坍毁城垣在歷任各官皆視為不急之務殊不知欲圖久安長治之道城郭實為地方之保障今詳議修建固非旦夕即可奏功但因循不實力料理似非所以保固地方仰體皇上政無不舉之聖心督撫雖不准具題而城垣理宜修建實於邊地有益謹將原詳督撫詳文備繕恭呈御覽伏乞皇上睿鑒施行謹奏此原非甚急之務在嶽鍾琪目今所處地步若以修理城垣為急務恐招無知小人之謗議也宜諒其情但城垣一事不止四川一省當修直省皆然為此條奏者亦多候朕徐徐次第籌畫自另有措置同日又奏為恭謝天恩併繳硃批事竊臣進摺家人恭齎皇上硃批臣摺併欽賜御書福字到川臣恭迎進署望闕叩頭祗領伏念臣一介庸愚識淺才鈍地方應行事宜深愧未能奏效所有摺奏事件屢䝉聖主硃批奬賞臣已榮逾格外今復䝉恩賜福字臣何人斯得邀聖眷至此惟是聖恩愈重報稱愈難臣惟有矢勤矢慎一切據實直陳以冀無負皇上擢用之隆恩得長䝉聖世太平之景福仰報髙厚於萬一耳為此繕摺奏謝併繳奉到硃批奏摺謹奏受福易享福難福之一字非真實公忠內省無疚之人鮮克有終也勉之同日又奏為備陳冕山兵勢仰祈聖鑒事竊查去年十二月督臣嶽鍾琪抵川時據建昌鎮臣趙儒報解拏獲關夀金格阿租到省共快擒獲元凶餘黨不難懾服今臣陸續據建昌越雋鹽井寧番各㕔衛報稱賊蠻持刀放箭搶劫楊貴季瑞廷張玉國等一夜連劫數家民不安枕又據報稱押運兵糧赴行營離大營一箭逺忽然羣賊突出砍傷跟役併綁虜百姓搶掠牛馬猪隻等情夫現今大兵雲集賊蠻尚毫無畏懼任意搶虜倘撤兵之後則邊境生民其能安枕乎至拏獲關夀等實緣潘武舉圖功設計將白鹿衆屯百姓併一家人口保伊不死作當哄出叛蠻關夀等被擒雖兵行詭道貴乎不測但大兵進𠞰此區區賊蠻而用我皇上百姓作當誘哄非特不足以示兵威而且非所以崇國體亦何怪大兵在前而賊蠻夥黨仍然膽玩搶虜如故也臣訪聞既確不敢瞻徇除詳請督臣批示料理外理合據實奏聞謹奏此事爾所見淺矣新平畨夷禽獸之類冥頑何能驟改經大兵𠞰後難免無一二逃竄凶徒急求衣食以救飢寒即內地盜賊亦時有之事嶽鍾琪自然次第料理爾無庸過慮同日又奏為遵㫖覆奏事臣䝉皇上硃批諭㫖問程如絲立意若何欽此臣前據實密奏復䝉皇上硃批令臣開示臣遵㫖於二月十五日遇辦公無人之時詢問程如絲你得做臬司是誰保薦的程如絲云從前我得雪寃得臬司出自皇上特恩人皆不知道我於引見時已曉得今日問及此語想你疑我是蔡府丞保舉的麼臣云是又何妨隨將皇上不株連無辜之人你便係蔡珽所薦若能以天經地義分别重輕自䝉諭㫖作臣之意一一開示訖理合繕摺覆奏伏乞睿鑒謹奏不料程如絲竟如此負朕真小人曷克負荷寵遇况造無窮之孽為鬼神所不容自必天奪其魄安望能保令終耶硃批諭㫖卷八十八
