body:
  text: 欽定四庫全書硃批諭旨卷一百六十硃批苖夀奏摺雍正六年八月二十四日巡察順天永平宣化三府監察御史臣苖夀陶正中謹奏為敬陳約束在屯旗莊事宜仰祈睿鑒事竊照旗莊散處鄉屯向有各佐領挑放領催一名稽查逃盜賭博酗酒不法等事合屯有所畏憚後因各處住居人等旗分混雜雖有領催不能兼攝以致旗人相習為非比年以來各州縣欽奉諭旨嚴飭旗莊一體彈壓其各鄉村設有地總保長等名目似足兼辦領催之事但各州縣旗民繁雜與鄉屯僻逺處所尚有一二倚仗旗籍不循有司約束致令鄉保掣肘難施者臣等竊念宜就各旗戶中量用管攝之人酌復領催之舊仰請嗣後各旗管屯領催不必由佐領挑放各屬境內凡八旗另戶間散住居人等竟令州縣官就近積算每十戶以上不論滿洲蒙古漢軍旗分擇其平日安靜謹慎者一人令加約束統計境內需用幾人總列各姓名及分管各戶數目申報總督至內務府莊頭包衣下人等及親王以下間散宗室以上各名下莊頭包衣人等向無管屯領催亦請照八旗之例該州縣不論旗分酌量選擇一二名開明分管人戶詳報總督口外莊頭由該管之各路理事同知就近聨絡酌量選擇幾人開明分管地方人戶詳報總督總督彚齊咨明內務府及各管旗大人行知各門包衣逹包衣參領佐領記檔存案此選擇舉報人等非給有慿據難以管攝應將本分內稽查事件及管攝各人戶填注清單上用州縣官及理事同知印信關防鈐蓋各給一紙以示責成倘所管人數內有不遵法度者許其查明首報地方官照例懲治如有扶同徇隱者察出照京城領催例治罪本身兄弟子姪有犯加倍懲處再查各屬旗莊人等多有攬種官地及質典民産應納州縣租糧者不無抗違拖欠州縣礙難追比又旗民互控到官之案州縣行拘旗人輒以上城當差藉口經年懸案不結並請嗣後州縣官凡有催提先令衙役傳知一次倘有託故推諉者即責令該地方管攝之人協同拘追庶幾旗人不得支飾狡延矣如此內有效力三年約束嚴謹毫無過犯者應令該有司秉公保送直𨽻督臣咨知內務府各旗彚齊核實具奏懇請天恩以示鼓勵臣等一得之愚如或有當伏祈敕下內務府八旗議覆施行謹奏交內務府王大臣會同八旗諸王大臣確議具奏以聞同日又奏為敬陳編造旗地清册事宜以正賦額以杜訟端事竊照地方官有守土親民之責境內戶口田畝均宜灼見周知以便查理直屬近畿州縣荷蒙皇上一視同仁不論旗民均編保甲各屬欽遵奉行在案惟是旗莊圈賞投充地畝册貯內府及戶部衙門歷年久逺其間移换授受歸并分析更張既多難憑核實且州縣查核原檔例應申詳該管上司經直𨽻督臣咨請轉行知照往返動需歲時臣等歷據三府民人控告旗莊強霸事迹不外占奪官荒欺隱民産考其稽案不結之由總因檔册不易清查州縣官不便懸斷以致旗莊益得恣行兼併仰懇皇上敕下內務府宗人府及八旗都統其內府大糧莊頭及包衣官兵投充當差人等現在實有地畝由內務府各司查明實數并坐落州縣村莊名色地段四址造册鈐印咨送戶部其親王以下間散宗室以上莊頭及包衣官兵投充當差人等現在實有地畝由各門包衣逹包衣參領佐領等官查明造册覺羅八旗莊頭及官兵投充當差人等現在實有地畝由該旗參領佐領等官查明造册俱送該旗管旗大人處鈐印送部此造送清册務各一樣二本一留戶部存案一由部轉咨直𨽻督臣發布政司衙門彚齊各册按照地土坐落之各州縣衛所分晰編造各清册一本鈐發該地方印官與民人糧地清册一同存貯嗣後有旗民互爭之案檢册查對不難勘文訊斷再臣等查得此內惟帶地投充人戶先因直屬糧地未清報投時往往以多報少任意開除有一旗戶而隱地數頃或數十頃者此地不辦旗差不完民糧沿習數十年漫無稽考有違任土作貢之大義今既造報檔册自應徹底清晰仰懇皇上洪仁俾照民人首報隱匿地畝之例勒以定限準其據實首明該管處所該管大人除本身現在當差地畝之數記檔咨送外餘地另册報明户部彚題請旨歸著輸納差糧以正賦額至此項檔册領發以後每年不無移换應於歲底由兩翼稅課司彚報戶部咨行各屬知照記檔如此則近圻各屬有司均得灼知境內地土旗産民産瞭如指掌於以清賦稅而杜紛爭於政治或有禆益是否可採伏祈皇上睿鑒施行謹奏旗地清册應如何編造畝數應作何清晰之處該部議奏雍正六年十一月二十七日巡察順天永平宣化三府監察御史臣苖夀陶正中謹奏為敬陳清釐官守之管見以熙庶績事竊惟國家設官分職期於敷政寧民臣等伏查順永各屬州縣向係統𨽻大部官司職守視外省較殊歷來因時變通互有沿革不無一二曠職侵官有待董正之處謹條具管見所及敬為皇上陳之一道員之職掌宜專責成也一重案之審轉宜有專員也一旗民互控細事應歸印官就近查審也一佐二雜職分轄地方應飭印官嚴加彈壓也以上四條臣等不揣冒昧敬獻芻蕘如果言有可採伏祈聖主睿鑒敕部議覆施行謹奏該部詳議奏聞硃批諭旨卷一百六十
