body:
  text: 欽定四庫全書硃批諭㫖巻六十二硃批甘汝來奏摺雍正四年七月初三日廣西廵撫臣甘汝來謹奏為奏聞事竊臣以謭劣庸材荷䝉皇上畀以封疆重寄朝夕冰兢惟力圖綏靖地方以仰副皇上委用之殊恩廣西幅員遼濶土司猺獞雜處過半撫綏事宜尚在次第斟酌仰請聖訓敇行查廣西九府二州屬仰賴皇上深仁翔洽感召地方官區處得宜随即安静獨廣東開建地方界連廣西梧郡四月内窮民呼羣引類潜入蒼梧之方自獲寧謐矣抑臣更有請者臣䝉聖恩簡畀廵撫凡有陳奏之事俱關國計民生臣雖敬謹宻封但恐長途齎捧或有意外奏達庶堅固謹宻而臣得免隕越之懼為此繕摺奏聞謹奏知道了雍正五年四月二十日署理廣西廵撫印務都察院左副都御史臣甘汝來謹奏為奏明事竊廣西人民種類不一兇頑獷悍由來已久臣䝉聖恩超擢廣西廵撫在任四月力圖漸次整頓旋因趨覲闕廷時得面聆聖誨臣雖顓䝉無似心胸自覺漸開兹復欽遵諭旨署理廵撫印務受事之日接准撫臣韓良輔移交案巻有上林之思吉鎮韋兆彪等與土舍莫元紹争奪土舍焚村距鎮業經韓良輔據報前後檄飭驅拏審究在案餘黨雖已驅逐首惡監禁審擬然此輩凶惡不悛尋仇伺釁終未解㪚臣一面備查始末檄行布按二司㑹議作何區畫始能善後不敢茍且目前仍貽他日之患其經理事宜容俟定議妥協另行奏報伏乞皇上睿鑒為此具摺奏聞謹奏好惟在實力奉行不在章奏空言也雍正五年六月二十四日署理廣西廵撫印務都察院左副都御史臣甘汝來謹奏為請旨事竊照羅文剛等一案欽奉諭旨擒拏先經撫臣韓良輔将羅文剛投到日期繕疏題報臣接署以来據報陸續全獲案内人犯前後解省随經據詳題報昨閱邸抄見撫臣韓良輔題報羅文剛之疏奉旨該部知道欽此未䝉聖諭作何𤼵審臣愚昧無知無所遵循謹繕摺請旨伏懇皇上或差部院大人來粤審理抑或敇令兩廣督臣就近審擬伏乞皇上批示遵行謹奏已有旨矣思眀州地方就近歸併同知管轄一摺已交該部議奏同日又奏為奏聞事竊臣准雲貴督臣鄂爾泰廣西撫臣韓良輔咨移内開本年六月初八日據泗城土府知府岑映宸自知罪莫能逭所管地方遼濶不能約束目民跪繳印信號紙呈懇改流存祀現在委員編查户口清理錢糧㑹議具題并咨稱改流設官清查户口以及設立營汛派撥遊守等官駐防稽查清理黔粤兩省分界事情縁邊地重務正需文武大員協同料理彈壓行調各標協逰守千把各官共帶兵一千名馳赴百色地方駐劄聽左江鎮臣調度等語臣接准咨移即撥臣標千總何斌帶兵一百名星馳前赴其在事各兵糧餉俱已預先料理妥協委員先行督運矣理合據咨奏報伏祈皇上睿鑒為此繕摺奏聞謹奏據奏撫標為何僅撥兵一百名其一切糧餉當竭力詳慎料理毋忽同日又奏為恭報雨水米價情形仰祈睿鑒事竊臣查廣西九府二直隸州屬五六兩月雨水過多然近水之田幸無淹浸髙田則又相宜故現在禾苗茂盛豐熟可期查各屬早禾俱有扵六月内收割者但此項栽種者甚少其次則扵八月登場最遲者則在十月收穫始畢是以近日米價止有梧鬱二府屬較前甚平桂林省㑹居民稠密米價稍貴藉有官穀減價平糶始無缺食之虞南太兩府兵民錯處米價較別府為稍貴然均賴糶三之穀接濟兵民俱各無憂臣仰體另繕清摺奏報伏乞睿鑒謹奏廣西米價從來未聞如此昂貴一切事宜亟當悉心預為籌畫同日又奏為仰體亦有九案經臣審擬㑹題内有一起稟報事案犯農几咸等糾黨占村報讐誤殺官兵擬斬者共二十四名除首犯農几咸病故韋光祥等五人已經正法其餘一十八名先後事歴一十四年秋審經十一次終年監禁一屆審上諭京城直隸各省緩决人犯除一二年不議外至三年者總屬不决何必只管監禁嗣後應減等發落爾等㑹議具奏續經部㑹議覆奏通行在案候多年者従寛減等𤼵落嗣後定以三年五年之限至期仍擬緩決者悉予減等永著為例不惟罪囚不致終斃獄底亦可使囹圄一清各省無案牘皇上睿鑒謹奏此事朕原蓄有或可酌行之念近被汝等科甲朋黨之流交章瀆奏啟朕疑懐想汝等必有私為一二人在内故爾擾亂國是今立意不舉行矣雍正五年九月初七日都察院左副都御史臣甘汝來謹奏恭請皇上聖安雨露施扵君子風霆加於小人姦邪不悛朋黨不解風霆竟不便停止奈何卿等其諒之雍正五年九月十九日都察院左副都御史臣甘汝來謹奏為奏聞事竊查天河縣監犯莫東旺扵雍正四年十一月十八日糾集蠻獞刦獄脫逃随經撫臣韓良輔奏明臣抵署任後嚴飭該管文武設法擒拏務獲並懸重賞買線購緝仰賴天威扵本年七月初七日據慶逺府知府徐嘉賓詳稱莫東旺一案飭經署縣陳舜明協同員弁駐劄賊巢分佈搜擒先獲其子莫朝順供出夥黨窩蔵住址扵六月二十八日在長峒地方拏獲莫東旺并前獲之黨羽韋扶講莫文光等經臣批飭臬司究審現在審解到省招解撫臣韓良輔審結所有臣署任内先據詳報拏獲日期理合奏聞為此謹奏覽若不如是李紱甘汝來欲免失職之誅不可得也同日又奏為遵旨明白回奏事竊臣至愚極陋屢荷聖恩由知府洊陞廵撫去冬入覲又䝉擢補左副都御史方且日夕冰兢冀圖報稱不謂質本疎庸愆尤日積䝉皇上格外施恩優容教誨仍命署理廣西廵撫印務臣雖肝腦塗地亦不足仰酬萬一比因秋審之期臣親加詳讞見積年罪犯得荷皇仁矜恤詳慎屢勅監候緩決臣因待罪法司刑名乃臣職守仰體聖慈妄陳管見䝉皇上硃批嚴切跪讀之下如夢初覺無地自容仍荷聖恩不即加罪令臣明白回奏臣感激愧悔更有何詞可措伏念皇上繼統以來遵守聖祖成憲事事周詳盡善臣援引四十五年之例實係一時愚昧就事敷辭並非別有心迹若稍有一毫私意皇上聖明洞鑒目前即荷開恩不即懲治將來別有敗露臣更何所逃罪伏乞聖主洪恩矜臣無知妄奏曲賜寛宥俾竭犬馬微忱力圖仰報頂戴之私生生世世以之矣臣謹瀝情回奏不勝惶悚懇禱之至謹奏若無善策陳奏牽混支吾如何其可硃批諭㫖巻六十二
