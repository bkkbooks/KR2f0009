body:
  text: 欽定四庫全書硃批諭旨卷一百八十六硃批潘體豐奏摺福建布政使臣潘體豐謹奏為恭謝天恩並陳管見事雍正八年三月初四日福州將軍臣阿爾賽自京回閩傳宣上諭汝到任時下旨與潘體豐此後命伊奏摺其奏來之摺交大學士張廷玉代為轉逹欽此臣跪聆欽遵隨望闕叩謝謝恩訖竊念臣一介庸愚至微極陋蒙皇上天恩以侯補主事同知於雍正五年六月內命往福建以知府補用二年之內仰荷聖恩不次超擢由知府臬司洊歷今職臣何人斯竟上邀聖主隆恩優渥至此感激涕零之下惟覺恩重身輕即捐穈頂踵實難仰報於萬一今蒙特命奏摺此千載一時之隆遇敢不殫竭愚誠敬獻芻蕘伏查閩省風土民情內地八府一州地土之腴瘠各别習俗之淳澆不同如延建邵汀四府小民多以耕種為業習尚良朴但山多田少民鮮蓋藏蓄貯愛養事事須當悉心籌畫而禮教為首重福興泉漳四府福寧一州依山傍海魚鹽種植之利均可資生但俗尚爭競人多虞詐欺凌刁悍之風未能悉泯而化導為尤切則夫端本澄源因地制宜之道全在親民之州縣官不尚浮文不沽虛名不辭勞瘁煩瑣事事與民相為休戚始能隨時隨地殫心竭慮力行鼓舞勸勉以收教養之實效但通省州縣繁多委難盡得夫良吏而督撫藩臬總理大綱得之訪察不如事事親見之為確切詳之文檄不如時時倡督之為實在其與州縣最親民情最切之員莫如承上接下之知府茍知府各得其人斯可就近共相規勸浮囂者務勉於誠實遲鈍者務振其委靡而人材均可造就利弊無不興除庶幾吏勸民安仰副我皇上宵旰勤求之至意兹閩省現在知府俱蒙聖恩㨂授雖各知自愛居官謹飭但於地方利弊未免視為積習難移弗肯力圖倡率督撫及臣不時申飭勸導僅見彼善於此究難強致其公忠篤實勵已率屬之誠心且每年上下兩運差委辦銅動輒經年再遇升遷緣事一時兼署之員更難期其實盡察吏安民之道此感通移易之所以甚難也臣不揣冒昧謹將閩省官民現在情形據實陳奏仰祈皇上天恩俯念邊海巖疆事事較他省為難治懇於聖鑒之中賢能知府命往二三員來閩以備委署補用俾臣得與協力同心力行教養庶可使屬吏羣知觀感奮興而地方亦可漸次風移俗易矣臣欽遵諭旨謹將關切吏治民生之事恭繕四摺具奏是否可採伏乞皇上睿鑒施行謹奏所奏知道了但詞語太覺繁絮朕何暇細閲同日又奏為薦舉之員宜注明事迹確據以鼓人心以勵實政事竊思設官分職有一官即有一官之責而實至名隨行一事必有一事之徴世無能盡其心而事未協者亦無事既協而無實效者臣愚以為端本澄源莫要於事事察其確據務使毫無假借似為鼓勵實政之一道請嗣後外官不論特薦保舉及題升調缺除首先分别其操守才具外如司道知府直𨽻州皆有察吏率屬之責督撫必細察其居官辦事如何勤愼甄别屬吏如何公明某事某員可為據證如州縣為親民之官必細察其錢穀刑名如何措施得宜境內民生如何安輯得所地方如何日有起色某某事可為確據果能於教養之事實心實力辦理者將事迹指出於疏內聲明恭請聖明睿鑒其有薦舉保題之後或升本省或遷調他省誠能照舊事事實盡心力著有實政再列薦舉者聲請加一等議敘倘有升調之後即不至頓改前操或恃才驕矜或悠忽怠玩並其原薦之事迹亦皆更易致被參劾者亦聲請加一等議處如此分别查察先後較量庶已邀薦擢者必益矢奮勵即未邀薦擢者亦爭思勉圖似於吏治實有禆益矣謹奏言之似易行之甚難况激揚自有大典此議可以不必同日又奏為糧戶之的名宜清保甲之編查宜嚴請專員辦理以收實效事竊照糧戶保甲皆地方最要之務惟在查察周密則包寄脫漏之弊自除各州縣既以簿書紛繁難於分身又以茍且因循者多實力整理者少所以屢經立法申飭仍不免草率塞責若非專員清釐編查究屬有名無實臣愚以為每縣似宜專委試用官一員再委該縣佐雜官一員協同挨戶查察一面清釐糧戶的名即一面編查保甲則一舉可以兩得第查歷次奉命來閩人員除委署試用并參革事故外現無間員兹欽奉上諭以進士章有大等十五員來閩學習伊等新進之士大抵謹飭者多似可分委稽查兼可就便涉歷風土民情但閩省內地一州五十七縣止此十五員輪辦不免太遲仰懇聖恩敇部於侯補侯選知縣人員內再揀選十二員來閩以便酌量縣分大小分委查辦請俟各員到縣之日為始大縣限一年中小各限八箇月俾令從容細查先於沿海緊要處辦起竣日再各委辦一縣總計二年內可以周遍俟各委員清查事竣即以其所辧之事核其優絀好者請以知縣題補平常者酌量人缺委署試用應學習者仍令學習如有滋事擾民及辦理怠玩者不時查參佐雜官果實心協辦擇其最優者另請議敘平常者分别功過警勉庶事有專責人知鼓勵而糧戶保甲可使澄清以收實效矣謹奏種種不通處難以枚舉同日又奏為竊盜之查緝宜嚴請分别勸懲以安民生事竊惟安民莫先於弭盜乃閩省州縣惟於竊盜情重贓數多者始具通詳其贓數無幾如掏摸鼠竊盜粟偷牛之類率多悠忽漠視匿不申報亦不嚴行緝拏是以上司無從稽查宵小未能悉除臣請嗣後除竊盜贓多情實而諱匿不報者俱照例參處外凡地方中但有竊盜發覺事主呈報到官該州縣務將失竊情形贓賊實數勘詢明確就近即報本管道府依限緝獲追贓刺字完結銷案總不許以其失物細微藉口諱匿該道府按季彚册注明巳未獲賊完結緣由移報臬司稽核轉報督撫查考如州縣於贓數無幾之竊盜諱匿一案者查出記過一次諱匿二案者查出記過二次仍勒限緝拏務獲銷案如至三案不報而賊又未獲者即備敘情由照溺職例參處知府直𨽻州照失察例議處以示懲警果能查緝嚴密一年之內並無鼠竊等案或偶有一二案即能旋報旋獲照例完結者記功一次如至二年並無諱匿實無鼠竊等案者記功二次若至三年能使地方寧謐委無竊案者道府查實由臬司申報督撫核明即將本員平日居官辦事如何之處開明事實出具考語保題以示鼓勵如此庶各官知所警勉而查緝防範之克勤自可使宵小斂迹民生安樂矣謹奏為竊盜一事條奏者頗多率皆似此不通謬論同日又奏為請嚴保長之選舉立法勸懲以正地方事竊惟十家為甲十甲為保各州縣鄉村於保甲中設有保長一役所以稽查匪盜和睦鄉里以期保正一方役雖微賤有關於地方甚重閩省習俗刁頑從前所設保長非姦棍謀充即豪強占當每多恣意武斷顚倒公評因之訟端易起風俗澆漓若不嚴行選舉立法勸懲積弊難清臣請敇下督撫嚴飭各州縣確查凡有從前謀充占當及有犯案者槩行請革務選老成正直農民取具約正族鄰公結該州縣驗明給照委充仍將所屬鄉村實須保長及選舉名數造報司道備案遇事故革除頂補等事並報查核每於月朔著傳集耆民同約正值月齊至講約處所聽講聖諭廣訓責令協力共相勸勉遇有批查之事務於五日內秉公查明據實稟覆倘藉端滋事或徇延不實一經查出加凡人一等書明事由於地方枷示警衆如能竭力奉公三年毫無過犯者州縣官量行奬賞若五年全無過犯並能和息爭端者申詳道府給匾鼓勵如至十年無過且善於勸導稽查能使保甲中鼠竊姦匪屏絶地無曠土民無遊惰者州縣查明取結開具事實由府核確申報督撫查實比照老農之例題請給與八品頂帶榮身若州縣不查實率報察出照濫舉匪人例參處如此庶源清流潔保長之選可得正直之人將見地方中勸導觀感而澆漓之習自日歸淳正矣謹奏應稟請該督撫商行福建布政使臣潘體豐謹奏為奏聞事竊照閩省仰賴皇上至德覃敷連年收成豐稔山海寧謐今歲自入春以來通省雨水調勻兹於五月內據各屬陸續開報二麥收成分數臣細核總計約有八分收成值此春夏之交小民得以接濟洵為有益再查通省栽插得時禾苖俱好至於各屬米價甚平現在臺灣府屬據報民間食米價銀每石陸錢至柒錢陸柒分不等興化府屬每石柒錢捌錢不等漳州邵武汀州三府每石柒捌錢至一兩不等泉州延平建寧三府並福寧州每石八九錢至一兩一錢不等惟福州府地處省城兵民雲集食指浩繁米價向比外府稍貴自上年冬至今春三月內每石價銀祇在一兩上下逮夏初稍覺微長而四月二十七八等日每石米忽長價二錢有零臣察訪其故蓋緣省會食米全賴上遊一帶商船運糶適今春鄰近江浙地方米價騰貴小民圖利率多聞風販賣又以四月內連次大雨溪河水漲小舟莫敢載運偶值米船稀少致價稍昂臣當即詳明督撫二臣將福州府及閩侯二縣所貯平糶江浙米榖乘時開糶米價旋即平定指日早稻登場自更可平減再有連江羅源福安寧德等縣地處山海交錯當此青黃不接之時民間食米亦覺缺短臣酌量數目詳明督撫飭行地方官將存貯積榖減價平糶併據各縣出具秋收買補印結存案則民食得濟而將來倉項亦可不致虛懸所有閩省現在米價並二麥收成及早稻雨水情形理合恭摺奏聞謹奏據奏二麥已收米價平減雨澤及時禾苗豐茂以手加額覽焉同日又奏為報捐積榖事竊照積貯倉為地方預備之良法今查閩省積榖民捐自康熙二十一年起官捐自康熙三十一年起迄今通省官民捐貯積榖除各案虧空參追外現存官捐榖一十二萬五千五百八十石零民捐榖一十六萬四千三百石零俱實貯在倉但此項乃積貯於平時取用於歉歲惟在實力勸導不事勉強俾官民知所樂從始為愈久愈善之計案查從前每年官民捐積尚至二三千石及四五千石不等近年以來未免視為不急之務每歲捐數無幾臣仰體皇上軫念民生重農務本至意夙夜兢兢刻思為民預備因於上年秋成後先捐榖四百石分貯府縣各倉隨會同在省司道詳明督撫通行各屬量力捐貯并勸勉紳士富家務期各自樽節有餘以備不足當奉督撫二臣各捐榖二百石臬司及道府廳縣亦陸續報捐其聞風向義捐數最多者如仙遊縣侯選州同徐華生員徐升兄弟二人共捐榖三千石兼願自建社倉存貯又侯選縣丞李長華願捐榖五百石附入倉內當據興化府詳報臣俱轉報督撫批行奬勵以為聖世好義急公者勸查現在通省官民捐積榖石並願入社倉榖石約計已有一萬二千石有竒臣仍不時勸導若至本年二稻收成之後自必捐積倍多從此源源增積則倉儲日見充盈海疆愈為有備矣理合恭摺奏聞伏乞皇上睿鑒謹奏捐積倉榖以備緩急原屬極美之事但不可涉於強迫同日又奏為奏明分貯各屬帑銀數目仰祈聖鑒事竊閩省山海巖疆儲備為重兹蒙聖恩念及辦理軍需及事務繁劇之州縣均倣照大宛二縣之例酌留帑銀以備急切公事之用仰見我皇上聖明逺照為臣民籌畫萬全者至周且渥雍正八年十二月初九日臣奉督撫牌行準戶部咨協撥浙江省銀二十萬兩解閩交督撫布政酌量分貯等因捧讀之下不勝踴躍歡忭遵即詳察各府州地方情形分别沿海衝僻以酌銀數多寡擬福州府分貯銀三萬兩興化府分貯銀一萬兩泉州漳州二府各分貯銀三萬兩延平建寧二府各分貯銀二萬兩邵武府分貯銀一萬兩汀州臺灣二府各分貯銀二萬兩直𨽻福寧州分貯銀一萬兩伏思帑銀分貯府州庫以備公用乃千古難逢之曠典凡存貯動用之處均宜嚴加查察以防弊竇除照依部文通行各府州縣遇有實在急切差使刻不可緩之事一面備文赴該府州具領該府州即行核明給發通報查考如有虛冒情由即揭報參究至各府州存貯銀兩援照察盤倉榖之例每歲底責令各該管道員於盤倉之時乘便盤驗出結由籓司核轉督撫咨部查核如敢扶同徇隱察出將該管道員一併參賠以杜府州日後虧空之端此臣謹小愼微之見經詳明督撫批示將浙省解到銀兩照數給發各府州分貯訖所有微臣遵旨辦理緣由理合繕摺奏聞謹奏詳加斟酌辦理毋得粗率從事福建布政使臣潘體豐謹奏為恭謝天恩事雍正九年十月十二日新任福建按察使劉藩長抵閩傳聖主訓示雖犬馬圖報之心時時策勵毫不敢瞻顧因循而才識短淺自不覺愆尤叢集實臣寤寐難安之隱𠂻今跪聆皇上教訓容臣愚昧勉臣疏庸臣自顧何人仰蒙聖主造就矜全至於斯極惟有恪遵上諭益加黽勉殫臣耳目心思之力務期公忠自矢誠一不移隨時隨事詳愼斟酌以仰報我皇上髙厚隆恩於萬一耳所有微臣感戴下情理合恭摺奏謝伏乞睿鑒謹奏諭既錯傳此奏朕不全覽也同日又奏為酌議分買榖石以裕倉儲事竊照閩省於雍正四年偶因秋旱歉收蒙我皇上特頒恩旨撥江西倉榖碾米十五萬石運閩平糶適江西是歲秋亦被水除己運五萬石外餘改撥江安二省將截漕米先撥十萬石運閩仍令江西運還江安俱經運收明白正在清理還項間奉準部文據江西撫臣謝旻以江省倉榖充裕毋庸買補請將米價留閩買榖貯倉腳價併留閩充餉蒙皇上恩允奉督撫行臣酌量辦理臣遵查前項米石早經盤收內有當年已經隨時平糶者亦有隨後價平未買及價存縣庫尚未解司者更有各屬虧缺黴蒸參追未完者臣俱逐一剔清歸欵現存司庫米價銀一十一萬九千二百十九兩零內除應還江省腳費銀二萬七百四十九兩留閩充餉外實存銀九萬八千四百七十兩零查閩省榖價多少不等今照限在時價酌中每石以四錢五分勻算約可買榖二十一萬石有竒邊海地方多為積貯誠屬有益但若將前項榖石並買於一時竊恐市價髙騰有妨民食臣因悉心籌酌揆度地方情形及各屬存榖多寡並查其本處是否産榖照依大中小縣分别採買數目其買榖亦不拘定限期總視年成豐歉為凖如遇豐收即令乘時買貯倘收成稍薄即存價以待再閩省地氣卑濕倉榖易於黴朽定例存七糶三出陳易新而各屬於青黃不接之時惟慮山海地方糶出易而買補難往往一任檄催率多以毋庸平糶為辭輾轉遷延以致積榖莫能流通更易此不惟有關於倉儲抑且無益於民食臣復細加酌議將前項買添之榖收貯後於次年青黃不接之時即令將陳榖照買添之數平糶其價銀就近解貯府庫秋收復令領回買補至次年又將陳榖照買數出糶似此新榖先入舊榖後出各屬無所畏難自必踴躍樂從而年年輪换不數年間從前陳榖盡可易新民食亦得常常有濟矣臣因倉儲民食起見業將情由詳請督撫二臣所有現在奉行辦理緣由理合恭摺奏聞謹奏既經詳明該督撫候奏到有旨同日又奏為奏聞事竊查閩省欺隱田地蒙我皇上恩綸疊沛許民自首宥其欺隱之罪免追從前之賦復寬以限期令其陸續首報天恩浩蕩至優至渥臣欽遵勸勉查自雍正七年以後內地自首及開墾田地共四百四十四頃七十九畝零共該糧銀三千二百二十二兩零米六十五石零臺灣首報及開墾田園共一萬八千七十五甲零每甲計田一十一畝共計田園二千六十餘頃共應正供粟五萬八千九百六十餘石稅銀一千一十餘兩以上俱援奉旨自首免罪例併免追從前欺隱之賦即遵照於雍正七年入額起科徴解又內地陸續報墾田地共三十四頃二十六畝零共應糧銀二百三十二兩零米二十石零俱照例分别水旱限年升科臣查核明確先後造册詳報撫臣具題在案但臣細加察訪閩省地方遼濶其山陬海澨窮簷蔀屋之民以有司之查察難周已墾未報者正復不少祇以巖疆重地未敢過為督責滋擾惟有恪遵歷頒恩旨董率屬員多方警勉開導令其自相首報如果係冥頑不化查實照例究治懲一警百如果有坍荒難墾之處亦令據實造報免纍貧民至於歷年久逺祖父流傳之業內有隱匿漏課者亦必凖情酌理詳察其隱匿情由是否有心細為分别查辦固不敢輕為縱容亦不敢絲毫率忽總期於執法之中寓體恤之意以仰副我皇上軫念海疆愛養元元至意所有閩省連年首墾田糧數目並臣現在辦理緣由理合繕摺具奏伏乞睿鑒謹奏覽奏閩省首墾田糧數目情形諸凡辦理及所立主見均屬協當福建布政使臣潘體豐謹奏為奏聞事本年正月十四日夜三更時分臣署內堂側小房內家人一時昏睡燈火延及紙窗接連頂棚燒上板房臣聞聲立起奔救並即搶護內堂供奉敇書上諭等書詎火熖甚熾已不能近前臣見火勢猛烈徒手難援而錢糧重地外人未便輕入當即親齎印信趨赴庫堂保護庫藏一面遣役飛報督撫撥兵救援乃夜靜人稀各衙門重重封鎖救火兵丁一時未及趕至逮督撫二臣到時其內堂及接連之房屋已皆焚燒無存臣督令兵役極力救護止於東西兩處拆截火路猶幸庫藏保護文卷無失附近居民亦無損傷此皆仰賴我皇上洪恩庇祐之所及也惟是臣既不能預防於事前又未及救息於臨時疏忽之咎實切悚惕伏祈聖慈俯賜訓誡庶臣知所遵守將來益加黽勉省疚以贖前愆至於燒燬房屋共計大小八十三間臣奉撫臣趙國麟批查燒燬署房修補之例隨查閩省從前督臣滿保撫臣卞永譽按察使臣郎廷極衙署焚燒其建造俱出自地方公捐兹值上下肅清之時臣斷不敢復循舊例况臣蒙我皇上厚賞養亷闔家均沾聖恩惟有撙節用度以圖完補現在商請督撫二臣興工辦理除循例詳請撫臣具題外所有臣署失火情形並現在辦理緣由臣謹繕摺恭奏伏乞皇上睿鑒臣不勝戰栗悚惶之至謹奏當警惕自省極加戒愼可也硃批諭旨卷一百八十六
