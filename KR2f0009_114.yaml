body:
  text: 欽定四庫全書硃批諭旨卷一百十四硃批趙國瑛奏摺山東兗州總兵官臣趙國瑛謹奏為敬陳因革事宜仰祈睿鑒事竊臣蒙皇上洪恩擢用總兵於本年九月十八日抵兗州署巳具疏報明外臣查東省營制廢弛日久而兗鎮新設措置亦未盡善臣謹將應留應革之項為皇上細陳之一查臣衙門留有養糧四十分養贍家口此外尚有守糧三十分以僃修理衙署及一切公費者今酌留二十分以充公用餘糧十分仍招募補伍一查前鎮臣馮傑另有長隨馬步糧六十五分現在虛懸者十之七八今巳令招募補實歸伍當差一查各營兵米每石折價一兩司餉姦書每石有使費銀四分臣今巳通行禁革一查大小各營向日酌留公費糧十分六分不等為製造火藥器械等公用臣令存此一項僃辦公事每年歲終查核銷算餘銀儘數製辦綿甲一查各營餽送臣衙門節禮季規每年約六千金臣思此項銀兩各屬從何措辦必皆取於空糧今巳將一切陋規通行革除嚴飭各營將歷來空糧盡行補實如有虛冒隱瞞者容臣密訪糾參以上數條係臣現在因革事宜理合繕摺奏聞謹奏實力秉公而行朕自然洞悉勉為之山東兗州總兵官臣趙國瑛謹奏為遵旨密奏事臣入境後訪得臨清協副將吉自隆實力催漕勤於操演臣十月內赴臨督催果見其人誠實勤慎但查其履歷中有年羮堯題補成都參將一案即細加查駁據伊僃述進藏題敘皆係平逆將軍延信任內之事年羮堯止據功册題補臣究未深知不敢懸斷我皇上聖明自能洞照因一面給文令其赴部引見伏乞睿鑒施行謹奏所奏知道了朕如何肯令無辜之人致罹寃抑山東兗州總兵官臣趙國瑛謹奏為奏聞事竊臣近聞沂州郯城一帶有負販私鹽出入其間臣巳委員分頭巡查現今拏獲數起移送有司照例究治外今據撫臣陳世倌咨商欲於兩省交界私鹽出沒處所添設僃辨及兵役分防臣思設官添兵所係匪輕茍措置少不合宜不但虛費錢糧且於地方不無滋擾臣擬親歷其境相度情形應否添設官兵之處臣斟酌妥協繕摺奏聞請旨俞允之日再會同撫臣另疏具題為此謹奏果若斟酌妥協有應添設之處即當會疏具題何云請旨俞允再會撫臣具題豈有如此煩瀆之理直𨽻天津總兵官臣趙國瑛謹奏為奏聞事竊臣蒙聖恩調任天津於四月十五日恭請聖安後隨於十七日起程二十日抵任巳經具疏報明外查臣前任山東曾請將守僃黃欽千總靳士正劉士美三人隨帶前往蒙皇上俞允今黃欽巳蒙特恩補放夀張營遊擊其千總靳士正劉士美未經題補今蒙恩調補天津思此二人係皇上準臣隨帶者今復帶至新任倘有補用之處求皇上仍準臣具奏請旨敬將硃批一摺呈繳謹奏知道了題補靳士正等時將緣由於疏內聲明可也直隸天津總兵官臣趙國瑛謹奏為遵旨奏明事我皇上御極以來整飭官方澄清吏治慮旗員受該管勒索之苦特申誡諭凡本旗諸王以及佐領概不許需索外官違者照律究擬今有本鎮佐領韓塏奉差前往灤州查看地畝揚言係臣該管佐領妄受灤汛千總豬酒事畢又繞道於本月十九日至臣衙門需索嵗額幫貼臣凛遵聖諭不允所求誠恐事發有蹈隱匿之罪因據實奏聞伏乞皇上睿鑒施行謹奏凡百悉能照此直陳朕實嘉之必事事咸能如此始為純然不欺若因向日之恩怨而分别隱露則朕只嘉奬一半耳勉為之直隸天津總兵官臣趙國瑛謹奏為奏聞事臣查得津鎮衙門效用白役甚多實為地方之害兼且躲避差徭臣一衙門裁革者四百七十餘人并通行各營盡行裁革造册移明有司一體均役再查各營向有公費守糧為僃辦火藥旗幟等項而設今酌量營頭大小水陸衝僻量留名糧六七分此外悉行募補再臣查閲舊時盜案頗多半由於歲歉飢寒所迫各營遊巡兵目皆虛應故事以漸消弭至於今歲麥田大收運河水滿南來糧船甚速目下過關者巳十之八九矣合併奏明謹奏所奏俱悉直隸天津總兵官臣趙國瑛謹奏為奏聞事竊查侵課脫逃銀匠夏文熊等於本月二十五日被城守營番役屣緝至王家院地方王莊頭家拏獲交送天津鹽道衙門收審訖理合奏聞謹奏好能如此實心任事何慮諸務不辦集耶勉之直隸天津總兵官臣趙國瑛謹奏為奏聞事雍正四年九月二十五日據江南淮安府知府劉之頊直隸河間府東光縣知縣董翰芳臣屬河間協標右營守僃繆允斌公呈內開知府劉之頊奉欽差刑部左侍郎黃炳部牌追趕淮安關任滿監督慶元船隻並緊要家人於本月十二日趕至東昌府東關地方趕上慶元大沙飛船三隻會同東昌府東昌營將三隻船上所有資財箱匱物件共封貯二百八十號又拏獲慶元緊要家人李福等十三名巳委員督押資財船隻以及緊要人犯往淮去訖劉之頊又訪聞得慶元尚有前行船隻又星飛兼程追趕於九月十八日前至直隸東光縣地方趕上沙飛馬溜等船共計六隻拏獲總管康二并緊要家人孫應仲等隨搜查船上有銀三十七大包又一小包共計銀五萬九千兩其餘各項箱子資財物件尚多現在公同文武各官逐一封固因係臣之屬境詳報到臣理合繕摺奏聞謹奏知道了貪汚尚屬慶元之小罪負朕髙厚之恩深為可惡直隸天津總兵官臣趙國瑛謹奏為奏聞事竊臣蒙皇上令臣會同侍衛蔡勇藍翎林全將閩浙江南三省製造之天津水師戰船相度海口水勢編列號數一同管理至船上需用物件舵工水手工食銀米等項亦令臣咨明督臣在於天津倉庫就近支領俟都統臣巴顔德到任時交管今查閩浙二省大小戰船二十隻於八月初八日進口臣會同蔡勇相度水勢停泊並咨明督臣挑穵船塢以蔽隆冬風雪外其江南船隻尚未進口誠恐三省舵工水手工食數目不一因閩浙船隻先到臣酌量每人先支借銀二兩米三斗咨明督臣在於天津就近支領俟江南船隻到齊之日臣會同林全將舵工水手酌定與閩浙畫一然後咨明督臣支領至於編列號數伏懇皇上欽賜船名臣會同蔡勇排列號數以肅軍威以垂永久伏乞皇上睿鑒施行謹奏好蔡勇漢仗壯健心性耿直係勇猛向前之人但少覺粗率耳百凡當分任其勞不可推諉於伊一人令伊難於辦理直隸天津總兵官臣趙國瑛謹奏為恭請睿裁以重海防事竊臣前往查看沿海一帶地方查得大沽海口炮臺一座尚在堅固安設馬步兵二十名防守其餘營汛木樓炮臺墩臺均係歷年久逺不行修葺多有損壞以致雖有設兵之名而無防守之實臣今度其地勢之緊要仍留木樓土墩設兵防守其不關緊要者量行裁減惟沿海炮臺俱係緊要臣愚請照沿路墩臺之例每炮臺一座安炮二位蓋房十二間派馬兵一名步兵五名㩦眷居住防守於沿海甚有裨益至於修理炮臺木樓建蓋兵房移咨督臣委員辦理是否可行伏乞聖裁批示以便遵行謹奏木樓炮臺損壞豈止此數處直隸一切煙墩汛房皆然且不但直隸各省廢弛者亦甚多焉有許多錢糧一時盡行修理此事爾與督臣密商請旨則可移咨督臣委員辦理之言甚屬差謬硃批諭旨卷一百十四
