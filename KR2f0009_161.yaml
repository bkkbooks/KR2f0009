body:
  text: 欽定四庫全書硃批諭旨卷一百六十一硃批李如柏奏摺雍正三年五月二十五日署理四川川北總兵官臣李如柏謹奏為微臣依戀情切恭請陛見少展孺慕以抒積誠事竊臣於雍正元年六月內由三屯營副將加總兵銜赴陜效力入覲天顔荷蒙聖王隆恩賜賚稠疊溫諭諄切臣三復思繹兢兢恪遵抵陜以來時刻不忘今託賴皇上天威青海既巳底定萬民盡皆安居臣現在署理之川北一鎮地當秦蜀之衝非請聆訓旨無所遵守臣前赴陜時巳蒙天恩允臣西事平定之後進摺恭請陛見兹幸逢萬夀聖誕不逺臣離闕廷已逾二載犬馬依戀之情日深一日伏祈皇上允臣所請準臣輕騎入京叨隨班末叩祝聖夀跪受聖訓庶臣孺慕之忱得以少抒而於職分之當盡者益有所遵循矣臣不勝瞻依待命之至謹奏年羮堯奏爾斷斷不可任用其言固不足為重輕但朕觀爾頗有恃才景象遇年羮堯此等不公不平之上司猶可原恕若清正秉公之大臣𨽻彼所屬少涉傲慢失體如何其可今嶽鍾琪非年羮堯之比其居心行事人品才情為朕所嘉許倚重爾當謹慎謙虛聽伊指揮領伊教導在地方上愛兵惜民勿逞血氣而冒多事之嫌即來陛見聆朕訓旨亦不過此數語耳況爾係朕熟識之人何必僕僕道路徒勞往返至於地方情形任內事務朕未身經目厯洞悉其詳從何訓誨百凡慎為之毋合年羮堯之謬論全朕用人顔面即屬爾克盡報效之誠矣勉之同日又奏為敬陳管見事竊臣一介微末至愚極陋荷蒙聖祖仁皇帝天地洪恩捐糜難報復蒙皇上隆恩疊沛數年以來寸長未效今有一得之見敬為我皇上陳之夫舉賢薦能雖屬督撫提鎮職分所當然而進退人材實乃皇上大權之所在使用一人而曰某人之舉薦升一官而曰某人之保題是人者即不好利安知不市恩即不市恩安知不樹黨即謂心實無他惟竭盡忠誠為民社地方營伍起見而被其保題者未有不感其恩德者也臣以為大計軍政激揚之重典所係河工保舉考功之定例攸關無容輕為更易除此之外至於遇缺準其題補乃恭請武員辨皆止知感戴皇恩而報禮愈重矣若保題一人方用之時與既用之後而人知為某人之保題則保題人者其於好名嗜利市恩樹黨數者之中必居一於此矣謹此繕摺陳奏伏乞聖主睿鑒施行謹奏粵稽古帝王統世御極使宅百揆亮采惠疇亦惟簡任輔弼之臣若將百工庶僚皆令上感君恩而黜陟不關嶽牧殊無是理今設遇好名嗜利市恩樹黨及攬權作威之大臣俟其敗露後再當作何處置耳豈可先懷猜忌以待之大抵如年羮堯隆科多輩世不數數見試由今日觀之是福耶禍耶抑利耶害耶是在為大臣者各自審擇慎檢而巳非可法繩術馭之事汝少年武夫識見安能臻此因汝言及聊示朕意云爾同日又奏為敬陳芻蕘之見以固疆圉事竊以國家設立城池原以防守邊疆保障黎庶要必城髙池深而後可以永久無虞臣自奉命來陜即署理延綏總兵印務一抵榆林見其城東西南三面堅固髙峻惟北面一帶沙擁城上髙出一二丈不等可以騎馬往來細為查閲舊築有擋沙月城一道巳被沙壓不見臣隨於雍正元年十月內撥派四營兵丁併民夫等捐給飯食親身督領扒攤半月至城墻根其墻堅固可觀不數月沙又擁至臣復帶領兵民扒攤十數日仍至墻底觀此形狀旋扒旋擁為害無巳臣查榆林城西亦是黃沙圍繞幸有河水之隔沙遂止於河西欲除城北沙害莫若挑河引水以隔之至挑河道路臣看得邊外有頭道河一道水雖不甚多乃長流之水在常樂堡之北距榆林約有三十餘里度地形以揆水勢髙在榆林城頂之上雖間有一二土坡亦易為挑決若自邉外疏通此水引入內地由城東北角繞北月城至西而入於河則沙擁之患可以永除而於地方大有裨益約估所費不過一萬有餘銀兩即可成功臣受恩深重毫無報稱前在榆林時久蓄此心今敬為陳奏倘臣言可採伏祈睿鑒差實心辦事臣工踏勘施行為此謹奏所論雖是或恐於內外界防有礙況開挑引河中隔土坡有三十里之遙萬金豈能敷用非急務也且宜暫緩雍正三年七月初八日署理四川川北總兵官臣李如柏謹奏為敬陳愚見事竊惟進退人材天恩出自皇上實大權所在也乃川陜督臣年羮堯之舉劾茍非門生故舊依附於彼者縱令材能出衆必設法以參劾之不去其官守不巳若係依附於彼者縱穢迹昭彰必巧為曲護越次以保題之使深感其恩始終不忘如嶽鍾琪王景灝之類是也臣奉旨署理川北鎮赴任之時途遇署川提臣納欽向臣言川提有八百分公費伊止食四十分臣甚駭異及臣抵保寧查閲營中兵馬見旗幟軍器等物敝壞者十居七八詢諸將僃為何不及時修理據稱前任年總督在川時闔鎮設公費九十分每至年終造册送川督銷算凡所有羡餘俱解交川督逮至年總督升任陜西即將公費俱交於嶽提督至今公費銀兩俱是在省支去並不發回所以軍器等項不能修理臣目擊營伍廢弛不敢坐視隨具文咨移署川提撫臣王景灝煩請發回公費修理營伍乃遲至一月有餘方接準王景灝咨覆內開據提標中軍參將阮揚璟回稱各標鎮協夲年夏秋二季公費銀兩前於三月內詳懇憲恩預支領出所有冬季分川北鎮標公費銀兩請全發回除僃録詳請署督院嶽懇請批示外理合具文呈詳本提督據此除批詳仰候督院批示録報外擬合咨覆臣查咨文內稱各標鎮協公費銀兩預支領出等語回想納欽之言川提有八百分公費誠非虛謬獨是設立公費既為營伍起見撫臣王景灝大吏也當其署理提督印務蒞任伊始即當查出公費發回各標鎮協俾其修理營伍不致廢弛方是臣子公忠報國之道及臣具文移咨之後王景灝如即將各標鎮協公費發回猶是知過能改之人乃王景灝俱不出此而猶候署總督嶽鍾琪之批示則其依附於嶽鍾琪者已和盤托出矣且臣查初設公費繼而送於嶽鍾琪者年羮堯也將公費拏至成都者嶽鍾琪也王景灝所以不將公費發回者一則恐更易年羮堯之事而負年羮堯保舉之恩再則嶽鍾琪現署理川陜總督恐彰眀嶽鍾琪之惡而懼其隂為參劾是王景灝嶽鍾琪之結為黨援牢不可破而不肯背年羮堯之恩者迄今猶昔也臣謹據實奏聞或允臣具本題參或留此摺以為後驗伏候聖裁謹奏此奏甚屬不合僭妄之至豈有總兵官擅自題參督撫之理況所指摘又無真實憑據觀汝識見糊塗舉止冒戅光景將來必致辜負朕恩也雍正五年三月二十七日直隸宣化總兵官臣李如柏謹奏為恭懇聖慈眀白訓導事竊臣前在陜西見西安寧夏榆林等處步兵所穿綿甲皆止甲身不用甲裙所戴之盔皆止鐵盔不用撾纓腦包細察其故緣步兵超澗踰嶺不用甲裙欲其捷便不用撾纓腦包取其舞藤牌使刀無所窒礙及訪問曽出過兵之官辨所言大率相同臣查宣鎮有製造綿甲公費糧八十六分尚有應造之綿甲二千五百餘副計算一年所造尚不足六百副必俟四年半方克造完逮造完之日而初次所造之甲又成舊甲徒耗費銀兩營伍究竟不能煥然一新查現今所造之綿甲俱有甲裙與撾纓腦包每頂副需銀一兩六錢有餘且纍贅而不輕便臣之愚見莫若減去甲裙並鐵撾纓腦包每頂副可省銀五錢有餘將此造兩副甲之銀即可勻造三副不惟披戴輕便而公費糧亦得早募精壯補伍再查製造綿甲經前鎮臣黃廷桂奏眀委令左營遊擊石文彪監造臣愚以為公費糧既出自各協營路而各協路之副參遊都皆有營伍之責與其専委之左營遊擊監造孰若責之於各協路將伊營中原存公費糧發回照伊應造之甲數發給式樣令其自為製造如能合式急速製造不侵蝕銀兩則其勤慎辦事留心營伍大槩可見如所造不能合式遲延怠玩或侵蝕銀兩則其平日之行事不端不實心任事亦從可知倘有似此官辨即當指名特參豈可姑容以貽誤營伍如此一為轉移不但所造綿甲得以早完而空糧不致久懸即官辨之賢否亦可借此分別矣臣管窺之見是否允協伏乞睿鑒批示遵行謹奏製辦綿甲減去撾纓甲裙等物所奏是至監造之事仍宜委令専員料理若以公費錢糧作為試人之具非也將來拖欠貽誤勢必至於參處賠補則不勝其繁矣窮苦將辨徒受罰懲究於公務何益雍正五年四月二十六日直隸宣化總兵官臣李如柏謹奏為敬陳芻蕘恭請睿鑒事竊照尊卑各有定分人神初無二理是以生前之安富尊榮與身後之諡典褒封其義一也臣稽夫關聖帝君我朝自定鼎以來即為特立廟宇五月致祭春秋致祭及皇上御極又為追封三代設立博士所以特致其尊隆者蓋以關帝植綱常扶名教立人倫之至故不惟不欲與名賢碩士其他神眀等量齊觀直欲與至聖先師孔子尊崇如一臣厯任數處每逢朔望恭講聖諭廣訓若遇乏潔淨公所處即在寺廟之內臣見武廟中正位則武成王而關帝或於四配同侍或於兩廡列坐至寺廟中竟有塑關帝聖像侍立於旁者亦有偏坐側室者非僅一處似此位置關帝不但考之往代封王封帝之意甚為不合揆之我朝與至聖先師孔子並尊之隆禮實大相懸殊將謂列於武廟原為享祀今既有五月春秋之特祭似可無武廟之兼及且武成王王也皆有専為關帝修建之廟請將武廟並各寺廟關帝神牌塑像侍立偏坐側室者俱飭令請於就近専為關帝所建廟中抑或將武廟關帝牌像即與武成王並坐庶尊卑不淆而神眀相安矣臣管窺之見是否允協伏乞皇上聖鑒施行謹奏三代以上之王號即後世之帝稱非諸侯王之謂也汝奏內不將武成王與關帝並擡殊違體式朕將尊卑序淆等語業經悉行刪改照所改另具一摺齎進候交該部議覆施行雍正五年五月初四日直隸宣化總兵官臣李如柏謹奏恭請皇上聖安朕安聞爾近日嗜酒任性果如此則是大負朕恩自暴自棄矣半世功名一生品行甚屬可惜思之同日又奏為奏眀事竊臣前奏敬陳芻蕘一摺荷蒙硃批三代以上之王號即後世之帝稱非諸侯王之謂也汝奏內不將武成王與關帝並擡殊違體式朕將尊卑序淆等語悉行刪改照所改另具一摺齎進候交該部議覆施行欽此臣跪讀之下大開愚蒙以臣之淺陋沐聖主之洪慈實如蒙童獲眀師嬰兒得慈母稽諸往古誨示臣工者未有如我皇上今日之訓臣至眀且晰也臣謹欽遵硃筆刪改敬繕一摺齎進外所有臣遵旨具奏緣由理合奏眀再宣鎮所屬各營路地方於本年五月初一日雨澤普降四野俱各霑足止有張家口協一處尚未霑足相應一併奏聞謹奏今嵗直𨽻各屬雨澤不均目下都城左近地方日望晴霽不敢因一隅未足而萌祈雨之念也雍正五年八月初七日直隸宣化總兵官臣李如柏謹奏為聖諭自天警惕無地事竊臣齎摺人回捧到臣恭請皇上聖安一摺欽奉硃批諭旨臣跪讀之下惶懼靡已伏念臣蒙皇上隆恩畀以封疆重寄抵任以來兢兢業業時凛冰淵凡遇屬員有不是處再三眀白訓導冀其改過自新即兵丁有過臣亦諄諄教訓未嘗加之以刑臣之屢沐殊榮皆我皇上特賜之恩並非有人舉薦若稍冇不肖之處關係天顔臣非木石何敢自暴自棄沉湎於酒不度理而任性有負聖王優渥隆恩也今蒙聖諭諄切不啻父母之耳提面命臣惟凛遵訓旨愈加警惕日夜思省有則改之無則加勉以仰報髙厚洪慈於萬一耳為此繕摺奏聞臣不勝惶悚戰栗之至謹奏任性二字猶可虛捏妄加嗜酒一節何能憑空誣賴久而自明無庸辨者且處此不難即使從前嗜酒果實以後戒飲人亦不以為非也雍正五年十二月初九日直隸宣化總兵官臣李如柏謹奏為恭懇聖慈俯準開墾裕國賦以益民生事竊照宣鎮所屬深井堡東有海子一塊並周圍草灘約有百十餘頃除海子占地三十餘頃我朝之初巳報承糧熟地三十餘頃尚有荒灘六十餘頃厯來相沿為鎮臣牧馬之所臣查宣鎮牧馬厰尚有二處俱係山場離居民甚逺而此處馬厰附近深井又非前鎮臣黃廷桂奏眀每年收租為鎮臣養廉之地臣思既然附近民居是為有用之地豈可任其荒蕪經臣出示曉諭附近之民有情願開墾者具呈開墾隨據深井等處百姓李光先等遞呈到臣情願將此六十餘頃荒灘自僃牛種開墾按年限照例起科臣當將百姓所遞呈詞交與宣化知縣俞士恆親往查勘據該縣回覆百姓情願開墾等因臣之愚見深井彈丸之地若開墾此六十頃田而百姓多有此六十頃之恆産按年起科年復一年於國賦不無小補於民生亦稍有裨益至於如何按年定限如何照例起科可否允行伏乞皇上睿鑒敕部議覆施行謹奏此事與該督提宜兆熊楊鯤斟酌妥確會疏具題候朕裁奪雍正六年二月十五日直隸宣化總兵官臣李如柏謹奏為恭懇聖慈俯準查閲邉汛事竊臣自抵宣以來屢行嚴飭各協營路汰除老弱兵丁召募精壯補伍凡營伍應用之物應修補者修補應添造者添造務期足僃旗幟器械必須鮮眀以及弓箭鳥鎗手除應操戰箭火藥外令各預僃戰箭火藥鉛子等項至於操練務要技藝精熟進止如法雖據各協營路造具册結呈送到臣俱稱一一遵行但宣鎮地方廣濶城堡頗多官辨半係獨居専城特恐其中倘有陽奉隂違不實心任事者臣未經親至其地不敢信其盡如臣之申飭仰乞皇上允臣減從輕騎自僃盤費不擾纍官辨逐處細心詳查再面加教誡俾官辨惕然知警庶於營伍地方有所裨益臣不敢擅便伏候諭旨遵行謹奏親往查閲邉汛乃職分當行之事具本題明可也雍正六年五月初一日直隸宣化總兵官臣李如柏謹奏為奏眀更造軍器以期適用事竊臣卷查各營路鳥鎗內有筒短鐵薄不堪用者共八百四十三桿經前任鎮臣黃廷桂奏眀以各官署事一半親丁銀並鎮臣每年捐銀五十兩添鐵更造據遊擊王從繩造過鳥鎗一百二十桿報眀在案臣接任後仍照前鎮捐銀五十兩又將製造演放神功神威炮火藥餘銀二百八十二兩零給發更造嗣據遊擊王從繩呈稱又造起鳥鎗七百二十三桿前後如數造完今將陸續收過署事官一半親丁並捐發銀兩及造鎗數目僃具清册呈報到臣除將鳥鎗給兵執持其清册咨送提臣楊鯤轉送兵部及咨直督存案併嗣後署事官一半親丁銀兩應作何項使用統請妥議摺奏今準咨覆內開查更造各營路鳥鎗原係前任宣鎮黃廷桂奏眀之案今既造完給兵自應仍由貴鎮繕摺具奏其各官署事一半親丁銀兩應照貴鎮前奏儲節省以僃公用事摺內之議遇有調遣會集處以為添辦兵丁行裝之需等因咨覆到臣所有造完鳥鎗數目理合具奏至嗣後署事官一半親丁銀兩應否如臣等所議交臣標中軍遊擊收貯每至年終臣確查存貯實數摺奏設遇有調遣會集處以為添辦兵丁行裝之需臣未敢擅便伏乞皇上睿鑒施行謹此事亦與該提督楊鯤商行聞爾近日戒酒勿飲可謂改過不吝矣雍正六年五月十二日直隸宣化總兵官臣李如柏謹天恩普被田野黎民感頌皇仁遍及今據標下兩營六路參遊都守等各報到臣理合繕摺奏聞伏乞皇上睿鑒謹奏覽同日又奏為恭謝天恩事雍正六年五月初六日臣齎摺人回捧到臣奏眀更造軍器以期適用事一摺欽奉皇上硃批聞爾近日戒酒勿飲可謂改過不吝矣欽此並恭捧皇上欽賜錠藥一匣到宣臣隨郊迎至署恭設香案望闕叩頭祗受訖伏念臣一介庸愚蒙皇上畀以封疆重寄即竭盡駑鈍時時恪凛聖訓事事謹遵天言尚恐奉行未及不克勝任何敢以喫酒一事致忝厥職有負我皇上諄諄戒勉深恩今蒙皇上燭微批示恩賜錠藥臣跪領之下畏感交集自兹以往惟有觸目警心益加惕勵期報洪恩於萬一耳理合繕摺奏謝伏乞睿鑒謹奏每見好飲之人戒酒最難莫視為易事要看汝一生福量後半世造化何如耳極宜竭力操持加意警勉母得自暴自棄可惜爾父母養育之身可惜朕之恩遇二語當畢世佩服無斁雍正六年十二月初七日直隸宣化總兵官臣李如柏謹奏為鳥鎗兵丁火藥不敷據實奏眀事竊查宣鎮各營路空糧八十六分製造盔甲工竣臣巳另摺奏眀惟是盔甲造完所有空糧即應分發原伍招補但查臣屬各營路鳥鎗兵丁共計二千四百五十二名前鎮臣黃廷桂奏準請給空糧三十分製造火藥以為演放之用今每年春秋兩季開操按日演放火藥率多不敷臣查古北提屬各營每鎗手一百名留給空糧二分製造火藥宣鎮鳥鎗手兵事同一轍亦應援照此例設留空糧除原有三十分外現今盔甲造完即請於此八十六分空糧內再行扣給二十分添造火藥以符每鎗手百名留給空糧二分之數庶火藥足資演放洵於營伍有益倘蒙俞允尚餘空糧六十六分查臣現荷天恩賞給親丁名糧六十分而臣標兩營一時驟為開除恐有滋纍之處合無並懇聖慈準將此項名糧暫留六十分以為養廉俟臣標陸續出有糧缺一面扣抵一面將此空糧發還原營招補方為妥便其餘空糧六分應先發還各營臣經會商提臣楊鯤是否允協臣未敢擅便謹先繕摺奏眀伏乞皇上睿鑒施行謹奏所奏可行汝等商酌為之雍正六年十二月十七日直隸宣化總兵官臣李如柏謹奏為奏明事竊臣訪得獨石路屬鎮安堡邉外曹碾溝地方約聚百十餘人偷開礦洞煎銀熬鉛查鉛乃火器要需關係至重久經奉旨嚴謹盤查勿令夾帶出口豈可容邊外偷礦熬鉛貨賣隨飭令獨石路參將張漢傑鎮安堡守僃劉永年移知獨石口章京轉移該管章京查拏去後臣復於本月十一日帶兵數十名親至曹碾溝捕獲偷礦人楊得崇等八名搜出鉛二百餘斤查有礦洞八九十座訊據偷礦人犯供稱偷礦之人原多時因天冷四散亦有獲利他往亦有畏拏逺揚等語除將偷礦人犯並鉛斤交發宣化縣收禁並咨眀直隸督臣何世璂等飭行文員嚴訊務獲餘犯並搜追此外藏匿鉛斤臣復咨移獨石口並黑河章京嗣後嚴加巡查勿致匪類再聚偷礦熬鉛貨賣外理合繕摺奏眀伏乞皇上睿鑒謹奏查拏匪類以寧靖邉圉此舉好嘉悅覽之雍正七年三月十五日直隸宣化總兵官臣李如柏謹奏為恃官夾帶禁物傷兵強出邉口事本年三月十二日據臣屬張家口路參將沈力學呈據柴溝堡守僃尤尚忠報稱本年三月初八日子時據兵劉自鼎范思德呌開城門到署口稟張世䘵賈治安輪流巡邉小的等同楊正在汛防守於一更時分有蒙古十餘人至邊口小的等聽得馬駝聲響即出汛盤問蒙古説我等是官兒快快放我們出口小的等説此處不是關口如何放你們出去不料蒙古竟將小的二人拏住小的等見人多又係官兒因此不敢動手只得挣脫跑回報官楊正懼怕亦隨後奔山跑走被蒙古連放三箭射中右腿帶傷甚重蒙古竟行出口復回兩次尋取彼箭小的在半山黑處他未看見止將皮襖二件弓一張把箭五枝火藥葫蘆二箇連藥舊氊二條米口袋一箇米二升盡行拏去小的等見夜深人多不敢追趕只得稟眀等情到守僃據此隨帶兵丁數名趕出口去約有二十餘里趕上將蒙古藍翎侍衛趕回又拏獲男婦大小共十口內有漢人小子三名馬三匹駝六隻馱子未曽驗看除報眀提憲併副參外理合報眀等情由參將沈力學呈報到臣臣隨同該參將親詣水關臺口勘驗強出邉口情形並射傷汛兵事迹復同張家口理事同知白石適因正黃旗副總管眀安同捕盜章京吉蘭泰拏來走脫之根敦渣布到陽門堡一同面問正黃旗藍翎侍衛朱骨啜兒稱係阿敦下在京當差回家買來盔甲二副漢人小子三口蒙古女人一口小子一口共十二人並同王策楞王布藍翎下何通等四人恐張家口不放出去於初八日晚走出水關臺口根敦渣布並何通等巳經跑脫等語又據汛兵楊正認定藍翎侍衛朱骨啜兒射傷等語據此查得臣屬柴溝堡之水關臺口久奉封禁設兵汛守詎有正黃旗查哈兒色不特佐領下鄂勒特藍翎侍衛朱骨啜兒於三月初八日夜強出邉口更夾帶盔甲買取漢人射傷官兵拏去火藥弓箭引領逺處蒙古出邉種種甚為不法但朱骨啜兒係蒙古侍衛不吐實言臣等不便過為深問暫將朱骨啜兒等十一人並盔甲弓箭等物轉交懷安縣收管其根敦渣布仍交副總管眀安帶回除咨眀直隸提臣楊鯤外理合繕摺奏請伏乞皇上睿鑒施行謹奏此事著侍讀學士多爾濟乾清門侍衛殷札納速往審理將案內干係人犯按名拏究定擬具奏雍正七年三月二十四日直隸宣化總兵官臣李如柏謹奏為恭懇天恩事竊臣一介寒微叨沐皇上洪恩由侍衛擢授副將升任總兵疊荷寵榮逾於常格捫心自問慚無報稱今於本年三月十六日準直隸提臣楊鯤來咨內開應派直隸河南山東山西等省車騎營兵九千名欽定正定總兵臣魏麟河北總兵臣閃文繡統領將辨是魏麟閃文繡等將得用力報稱矣但臣受皇恩獨為深厚而於可用力以圗報之時猶然畏避何以盡臣道而得心安伏懇皇上天恩俯賜派臣協往統領將辨或管理車騎營兵俾臣得稍盡愚忱則感戴洪慈靡極矣為此繕摺奏請伏乞皇上睿鑒施行謹奏若據職銜而論原可協往統領但爾情性偏於冒戅所以不可用耳雍正七年十一月十一日直隸宣化總兵官臣李如柏謹奏為據稟奏參事竊臣卷查雍正六年九月內欽奉上諭令各省督撫遵照京城置僃救火器具以資防範倘遇火警文武各官派定人役兵丁齊集救護即時撲滅其或赴救不力以致延燒多戶著上司嚴查參劾不得徇情隱匿欽此仰見我皇上睿慮周詳愛民之心無所不至兹臣所屬張家口路之市圈於夲月初七日夜三更失火據署張家口協副將楊繡暨署參將張漢傑各稟稱職等聞有火警即帶協路官辨兵丁攜救火之具前赴市圈救火被守門章京并披甲人等攔擋止將各官辨放入兵丁概不準入至初八日辰時火方救息等語臣隨差標員前往查驗回稱延燒樓房小房上下百餘間人畜無傷等情到臣伏查市圈客商萃聚貨物雲屯該署副將等既帶官兵前往救火理宜齊入救護即時撲滅豈可因章京等阻攔竟將兵丁留於市圈門外眀係赴救不力以致延燒多房商民受纍相應指參臣係總轄疏虞之咎亦所難辭伏乞敕部一并議處臣更有請者救火利器無如水銃臣查宣化各屬預僃水桶等項者間或有之而水銃尚未全備臣前蒙聖恩賞準將教場地畝等項所收銀穀以為臣養廉之需臣仰體我皇上恤民禦患之至意情願將此項所收銀兩置造水敕令直隸督臣轉飭宣屬各州縣務必欽遵前奉諭旨備造救火器具以防未然庶祝融不致肆虐而萬姓均沐皇仁矣為此謹奏皆係該部通行有案之事何庸更為敕諭雍正八年四月十三日直𨽻宣化總兵官臣李如柏謹奏為遵旨議奏事竊臣接兵部劄開古北提臣魏經國敬陳末議一摺奉上諭令臣等各就本地營伍情形悉心妥議具奏欽此臣查兵丁糧餉除月米朋銀小建外馬糧一分每年實支銀三十三兩有竒守糧一分支銀一十一兩有竒步戰糧一分支銀二十二兩九錢有竒雖各營設立馬守步戰多寡不一要皆因地衝僻差務繁簡斟酌定制並非浮設況武職均典戎行平居同一訓練差防遇有調遣同一勤勞公事既蒙皇恩賞給養糧以免內顧之憂則職同者自應均平畫一豈可豐嗇懸殊其止有步戰而無馬守者即未食馬糧每年所得餉銀巳較多於馬守各半而又無養馬之費此營制巳然固無庸議至馬糧甚少與止設守糧之營以二守抵一馬不惟所入餉銀之數甚少於馬守各半仍難免官辨內顧之憂即以差防而論二人自能分辦兩處之事一人一馬安能兼應二人之差若以二守抵一馬是各營減許多應差之兵官辨究未得均沾實惠大非我皇上俾得養贍從容之意臣愚議得宣鎮官辨親丁糧仰懇天恩仍照河東督臣田文鏡所奏遵行嚴飭各官俟有事故開除馬糧陸續扣留勿得藉端斥革其専城把總間有無馬糧者就在該路給馬糧一分仍造入該路册內奏銷無庸另立款項既留親丁馬糧之後如遇緊急公務營馬不敷應用即以各官親丁馬應差令本官出馬盤費如遇調遣需馱載馬時與其現購草臕馬不如將各官數年餧料之親丁馬給兵馱載尤堪負重致逺其購馬銀兩發給夲官買補親丁馬數則大小官辨共沾聖恩而無不均之弊營伍不致減許多應差之兵至於軍務不止無礙尚有裨益臣更有請者營馬倒斃動朋銀買補乃皇上軫恤窮兵賠補之苦非為貪官侵蝕之地從前竟有不肖官辨將親丁馬匹年限雖滿尚堪乘騎者揑報倒斃冒領朋銀數年以來荷蒙皇上訓誡整飭莫不改悔前非兹若復蒙皇恩均賞馬守各半之親丁儘足供養贍之需凡親丁馬匹倒斃一概停其支領朋銀請照前任宣化鎮臣黃廷桂所奏張家口馱載馬倒斃之例扣四箇月乾銀買補報眀該管上司查驗則朋銀不致虛糜而官辨亦無賠纍是否允協伏乞皇上睿鑒批示臣謹恪遵具題為此謹奏照此具題俟該部議覆到日朕再酌定雍正九年八月十二日署理山西太原總兵官印務直𨽻宣化總兵官臣李如柏謹奏為請旨事竊臣一介庸愚屢邀寵眷毫無報稱今嵗復蒙特恩命臣署理山西太原總兵印務臣自抵任以來日夜兢兢竭盡駑駘之力整飭營伍訓練兵馬文武和衷兵民輯睦稍報隆恩於萬一但太原一鎮所轄六府七十五州縣地方遼濶汛廣兵單必須時勤巡查方於地方有益所有各營路汛界之逺近山川之險要官兵之勤惰技藝之優劣臣雖屢經申飭務令操演畫一嚴謹巡防然未身經親厯終難自信伏乞皇上允臣所請於秋成之後減從輕騎親厯各營操練兵馬彈壓地方庶於汛防營伍有所裨益為此繕摺奏聞謹奏應否親往查操及於何時相宜之處與撫臣石麟商酌行之雍正九年十月二十四日署理山西太原總兵官印務直𨽻宣化總兵官臣李如柏謹奏為遵旨覆奏事竊臣前因太原鎮屬各營兵丁并地方形勢未經親厯欲乘農隙之時遍厯操閲繕摺請旨奉硃批應否親往查操及於何時相宜之處與撫臣石麟商酌行之欽此接奉硃批之時正值有挑選技藝精兵一事臣隨將欽奉硃批并精兵緣由會商撫臣石麟去後嗣準撫臣覆咨巡厯地方查閲兵馬乘此農隙之際親行周遍於地方營伍均有裨益自宜舉行今查操練精兵等事擬在省城辦理巳經恭摺奏眀應將各營兵丁如數挑選赴省之後即可周巡地方操演兵馬是否妥協煩請酌定覆奏相應移咨等因準此臣隨將挑就各營技藝兵丁一千名分作八起陸續起發赴省聽撫臣挑選教演於十月二十六日照數起發外謹將遵奉硃批商酌緣由繕摺覆奏所有微臣起程日期另疏具題謹將奉到硃批奏摺一併恭繳伏乞皇上睿鑒謹奏今命爾暫署大同總兵印務速往接受毋遲雍正十年五月二十六日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為奏眀事竊臣案照本年四月十二日奉戶部劄開為遵旨議奏事大學士鄂爾泰等議奏大同餧養之馬令大同鎮標辨兵趕送歸化城交與丹津派撥土默特兵丁於好水草處牧放等因奉旨依議欽此劄行到臣隨欽遵移商撫臣石麟以馬四百匹為一起隔三日再將後起之馬趕送以免沿途擁擠其馬匹數目俱令文員造册交給營官以便送都統丹津查收至趕馬辨兵派撥參都守備千把等官三十員撁馬兵丁二千三百餘名按日在大同府庫均領盤費於四月二十五日頭一起先行其餘挨次趕送去後節據送馬參將盧大位等呈稱五月初五六七等日送到歸化城馬六千九百餘匹都統丹津嫌馬疲瘦駁退二千八百二十餘匹堅執不收職等無可奈何在附近之處帶兵牧放等情到臣臣查此項馬匹關係軍需採買發餧者係都統丹津等餧養者係各府州臣標辨兵不過撁送交丹津查收而巳並無到歸化城牧放馬匹之旨其毛齒數目鼻病瘡瘸俱有文員清册逐匹可稽既到歸化城都統丹津理宜按文員清册與送馬營員當面逐匹查收交土默特兵丁揀好水草處牧放飭令辨兵早回各汛方為遵旨慎重軍需如馬匹內果有實在不堪用者自可按册與採買餧養並發餧者查詢亦不得於送馬官兵是問豈可將送到馬匹勒掯不收致令官兵將按日帶去之盤纏花費烏有􅑎腹牧馬之理臣隨兩次飛咨都統丹津煩請照文員清册將駁退之馬查收而丹津兩次來文斷不肯照册收馬臣將令送馬官兵久住口外而營務汛防關係緊要既不便任其久住將令各回營汛而丹津不肯收馬將馬交與何人又不便令其各回隨咨商撫臣石麟飭令文員前往歸化城將丹津不收之馬照册查眀經管守候交收令辨兵各回營汛外事關奉旨趕送軍需馬匹丹津不肯遵旨查收不得不據實奏眀伏乞皇上睿鑒施行謹奏已有旨矣雍正十年六月十三日暫署山西大同總兵官印務直隸宣化總兵官臣李如柏謹奏為奏眀事竊照雍正十年二月內蒙戶部劄開經大學士鄂爾泰等議覆直𨽻古北口提臣路振揚等奏敬陳查邊事宜一案殺虎口添炮十二位交與造炮處製造子母炮十二位遇便送往等因奉旨依議欽遵在案臣查殺虎一協誠為要口議準添炮洵為慎重邊疆之至意但附近殺虎協之朔平城相距咫尺勢為掎角舊有旗兵駐防近蒙皇恩加添兵馬設立參將其地尤為衝要而子母炮乃防守利器必須亦設十位以資應援臣標新設之前營原因地方緊要故為加添官兵查標下中左右三營各有舊設子母炮十位而前營事同一例亦應設炮十位以濟防禦惟是殺虎朔平前營應設之炮共計三十二位除殺虎口舊有子母炮五位尚應造炮二十七位若俱請於造炮處製造不惟工料以及解送需費浩繁而製造必需時日臣查楊和城舊有貯庫報部不堪用之九龍銃者其名雖殊其實則子母炮也其身柄膛口一加修理即屬堅固可用所少者不過子炮耳與其聽其日久鏽壞何如加添子炮以為防禦利器再各營路經臣查出不堪用之廢壞鎗刀等項纍纍以之製造子炮既無庸買鐵而所費工資無幾成功亦易既可節省正項錢糧又可免其解送更可俾各營早得炮位早為演習其為裨益實多臣隨與撫臣商議飭令臣標署中軍遊擊睢世俊監管每母炮一位照例造子炮五位務必精工合式其所費工資食用炮架等項俱動餘租易價等銀製造去後續據該遊擊報稱子母炮二十七位巳如數造成臣逐位試看打放最逺頗稱便捷隨將炮位發給殺虎朔平暨鎮標前營並報部請將前奉部文交與造炮處製造之子母炮停其送往外再照既有炮位必須炮子方為全僃臣查各營路有地非衝要而舊貯炮子甚多者有地處衝要而炮子無幾者亦有竟無炮子者殊非因地制宜之道仰祈皇恩準臣與撫臣石麟商酌察其沿邉營路最衝與次衝者將舊貯炮子量為撥給務期多寡允當防範有資俟撥定再為報部緣係添造炮位酌撥炮子以益營伍以濟實用理合一併奏眀伏乞皇上睿鑒施行謹奏總與撫臣石麟商酌行之雍正十一年三月二十五日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為敬陳芻蕘事竊照硝磺火藥鉛彈廢鐵逃盜匪類久奉諭旨嚴拏不許出口臣抵任以來屢經申飭沿邉官辨務必實力奉行毋令偷出邉口而提臣石麟時加嚴飭亦至再至三臣又與提臣商酌邉墻最關緊要雖因需費浩繁不能一勞永逸是以奉旨無庸修理若將近邉百姓免其雜差徐徐修補堅固亦可少盡報效之誠而提臣石麟深以為然今臣於雍正十年三月內檄行沿邉官辨陸續修理去後於五月內據該將等稟稱近邉百姓俱各欣躍急公於耕種之暇即來修邉俱巳修築齊全臣隨親往查看新舊畫一後因大雨時行雖有被水衝塌者而今修補之處尚存十之三四是以雍正十年一年之內拏獲馱載鐵器及貨物越邉者一十七案臣私幸防範漸臻嚴密孰意尚有睯不畏法之徒於載貨車廂重用夾板暗藏火藥鉛子並鉛希圖夾帶出口於夲年三月十九日經殺虎口防口辨兵搜獲交右玉縣審究臣正在繕摺條奏間又於三月二十日拒門口防兵通同受賄縱放載鐵器車一十四輛出邉經該管助馬路參將馬世勳聞知趕至邉外二十里同張家口千總梁化龍將車輛人畜一併拏獲該汛把總郭元卿並無覺察據該參將揭報前來臣隨移咨提臣石麟咨部斥革併飭令馬世勳將拏獲之鐵器人畜及受賄兵丁交有司嚴審並移眀口北道王棠轉行張家口同知白石多派幹役在邉外巡拏外若不將汛辨並受賄之兵重加究治則私縱出入邊口之弊斷不能除伏乞皇上敕部行令有司將汛辨並受賄之兵重加懲治以警效尤臣更有請者邉內如此嚴拏而射利姦民猶敢偷越邉口營兵猶敢賄縱總因邉外地方遼濶巡察同知鞭長莫及違禁貨物出在口外不能一一拏獲故姦民敢於往外販賣當此軍興之際火藥鉛鐵乃軍器要資若不設法邉內邉外一同嚴拏則弊端斷難盡絶況古北口屬之薊協邉外并熱河兒宣鎮所屬之獨石路邉外各處俱有礦洞礦賊偷熬鉛斤不敢進口貨賣勢必賣與逺方蒙古其為貽害誠非淺鮮再邉外墾種多年人口生聚甚繁熱河兒喇嘛寺妥樂廟歸化城皆為商賈雲屯之地匪類逃盜潛藏甚多臣既知其弊何敢緘默伏查我朝成例沿邉設立衛所原以彈壓地方盤詰姦宄收屯糧石以實邉儲教習丁壯以固疆圉臣之愚見請循成例自山海關以西至於延綏邉外一帶凡有百姓種地之處以及買賣人稠密者量人民之多寡地方之寬窄應設衛僃者設立衛備應設衛千總者設立千總即在邉外人煙稠密之地居住將所屬之民照內地編立保甲以便稽查則匪類逃盜口外無所藏匿矣凡應收之牛犋銀兩令其按畝起課收納本色在邉內城堡屯積令營官看守邉外無庸築城蓋倉則田地不致隱占年復一年而邉儲可充矣邉外既有衛所各處礦洞有官勤查則礦賊偷熬鉛斤賣與蒙古之弊可絶矣至於違禁貨物既有汛辨嚴查於邉內又有衛所訪拏於邉外則夾帶違禁貨物越邉販賣之弊可杜矣農隙之暇衛官與汛辨同率近邉百姓以及汛兵互相修理被水衝塌之邉口則沿邉墻垣可保永固矣其衛所應需之衙役捕快查各州縣俱有民壯其中有不可裁者亦有可以裁減者請將應裁之民壯撥為衛所之衙役以捍邉圉則可節省工食矣然設衛所以益邉防則應𨽻何官管轄不可不為籌畫衛所既收糧石判理民事則屬附近文員管轄固不待言但修理邉墻盤查匪類逃盜若不令附近副參管轄則及時修邉垣急切拏匪類必至呼應不靈臣請令副參管轄如邉內汛辨縱放匪類並違禁貨物出口經衛所拏獲者即將汛辨揭報該管副參詳報重處如邉外窩藏匪類並偷賣違禁之物衛所不為查拏經汛辨訪拏者將衛所揭報該管副參詳報重處如偷出邉汛而本汛辨兵尾追拏獲者均無庸議如此則各辨互相惕勵邉防嚴密而陋弊盡絶矣微臣愚昧之見是否可採伏乞皇上睿鑒施行謹奏據奏沿邊設立衛所事關創始當與署提臣石麟詳細會議具奏以聞雍正十一年七月二十五日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為奏眀事竊臣蒙戶部劄開奉旨命臣造過山鳥炮一百位並馱架齊備運送軍營再多造一位並馱架送京存樣等因劄行到臣當經臣欽遵諭旨擇吉於夲年五月初十日興工先造過山鳥炮二位架二副隨炮各項器具並打放及逺之木板凖則差員恭呈御覽即請留京在案今臣朝夕督催匠役於七月二十日造成過山鳥炮一百位並炮架鞍轡隨炮之雨旱罩油單炮探火藥葫蘆皮搭等項又將炮位編定勝字號照各位膛口各造鉛彈一百顆共鉛彈一萬顆俱巳齊全炮位造成之時臣親至郊外演放其所及之逺俱合所定之凖則隨將炮位等項由大同起程運至歸化城交都統丹津雇募牲畜運送軍營一面呈眀靖邉大將軍俟到軍營時照數查收即令管押之辨兵將裝放進步之法教習軍營兵丁俟純熟後即令回營所有造成過山鳥炮一百位起程日期理合繕摺奏眀伏乞睿鑒謹奏覽奏知道了雍正十一年八月初十日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為遵旨奏眀事竊臣奉諭旨在爾意郎瀚為何等知府秉公據實奏聞欽此仰見我皇上為官擇人量能授職其難其慎之至意伏查大同一府東拱神京西通歸化南達太原不時辦理西北兩路軍需誠衝要繁難郡也膺斯任者於刑名則詳慎俾無寃抑於錢糧催科之內則寓以撫字於弭盜安民無往而不兢兢究心期於允當於辦理軍需上而宣布聖德使小民踴躍趨事下而憫恤黎庶俾吏役不敢騷擾軍需錢糧應行節省者不敢多糜軍需事務既能速辦而又妥協正項省而公事治公事治而民不擾方可謂賢能之員若郎瀚者拘謹自守才非肆應僅可謂平常郡守臣謹欽遵秉公據實奏聞伏乞皇上睿鑒謹奏所奏是已有旨矣雍正十二年四月二十日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為恭謝天恩事雍正十二年四月十八日臣承內閣大學士鄂爾泰等寄字四月十四日奉上諭朕因李如柏擅令官兵變賣馬匹一事料其辦事必不妥協留心訪察聞伊操守甚屬平常凡考補千把外間俱有口聲又如該鎮新添兵丁馬匹從前發價短少今恐露出弊端遂不候諭旨擅令官兵變賣馬匹槩令繳銀十五兩以掩飾前此冒銷之弊衆怨沸騰再伊在宣鎮任內放家人二名為把總李姓者巳經後任革退王姓者現係經制員缺又在大同任內放一任姓家人為把總係伊平日親信用事之人李如柏受朕深恩不知潔巳奉公勉圖報效而乃營私貪利劣迹種種夲應從重處分以為負恩溺職者之戒因念伊漢仗尚好平日於營伍事務尚屬盡心姑且從寬容其悛改爾等可密傳諭旨嚴加訓飭俾知此次寬宥乃朕莫大之恩倘不洗滌肺腸痛自改悔後此再有過犯經朕訪聞必加倍治罪不稍寬貸欽此遵旨寄信到臣臣聞命自天恐懼無地神魂飛越踧踖靡寧臣以至微至賤蒙聖祖天恩拔中狀元放頭等侍衛虛糜廪祿十有餘年涓埃未報又蒙皇上隆恩御極之初即放臣乾清門侍衛十二年來厯副將二任總兵五任殊恩優渥天髙地厚臣實捐糜頂踵不足仰報萬一何敢貪婪存心自罹法網辜負皇上天恩行不忠不孝之事為天地所不容神人所共憤今我皇上聞臣營私貪利不立加重處猶恩施格外密傳諭旨嚴加訓飭俾臣洗滌肺腸痛自改悔深蒙皇上至聖至眀始終保全容臣悛改實從古所未有臣自今以後之嵗月皆我皇上特賜之嵗月臣自今以後之爵䘵皆我皇上特賜之爵祿臣又何敢自辨上瀆聖聰愈滋罪戾惟有錐心瀝血時時恭讀聖訓刻刻如覲天顔洗心滌慮以仰報聖主寬宥洪仁於生生世世而巳所有微臣感激下衷理合繕摺恭謝天恩伏乞皇上睿鑒謹奏朕實代汝愧之代汝惜之近日以來想復在醉鄉矣雍正十二年八月二十一日暫署山西大同總兵官印務直𨽻宣化總兵官臣李如柏謹奏為恭懇聖恩俯準陛見事竊臣邉陲微末蒙我聖祖我皇上天髙地厚之恩二十餘年毫無報稱前聞噶爾丹策凌父子濟惡臣恨不得食其肉寢其皮少盡犬馬愚誠仰報隆恩於萬一今幸接兵部劄開荷蒙恩旨命臣總統直𨽻山東山西河南四省緑旗官兵前往北路駐劄臣聞命自天喜而不寐踴躍非常臣今得以滅除醜類上報天恩殫數十年仰酬之微志矣所有挑選官兵並行營一切應需各項除會同撫臣石麟現在速為辦理聽候諭旨即便起程外惟是臣至愚至蠢行多冒昧久在皇上聖鑒之中今膺此重任伏乞皇上洪恩念軍務為重準臣陛見跪聆聖訓得所遵循早奏凱旋以仰副我皇上聖懷則微臣幸甚如蒙聖恩允臣進京其大同總兵官印務臣查署殺虎協副將董維平營伍熟習厯練老成前曽署過鎮篆今請即令暫為代理臣無任懇切待命之至為此具摺請旨謹奏為期尚早候旨遵行硃批諭旨卷一百六十一
