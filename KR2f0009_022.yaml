body:
  text: 欽定四庫全書硃批諭旨卷二十二上硃批李紱奏摺雍正元年八月初一日都察院左副都御史臣李紱謹奏爲據實奏聞事欽惟皇上愛民如子視民如傷比因山東連嵗歉收倍加軫恤發帑挑河寓賑於役截漕散給民慶更生臣催漕所至濟寧魚臺滕嶧等縣小民環擁臣舟懇臣代奏叩謝天恩和氣所蒸秋稼十分豐茂惟是將收之際忽生蝗蝻滕嶧等縣甚有損傷連及江南邳州宿遷等處沿河皆有成災與否未能周知但臣奉使在外目所親覩不敢壅於上聞臣謹奏據黃炳所奏情形較輕而張大有所奏又似過重可將爾所見所聞蝗蝻生發究竟若何光景據實詳悉再奏以聞雍正元年八月二十日都察院左副都御史臣李紱謹奏為據實覆奏事昨臣因山東小民懇臣代謝天恩因附奏沿河州縣蝗蝻生發情形奉有硃批命臣據實詳悉再奏以聞欽此臣前所奏止就催漕所歴濟寧以南沿河一帶之地故謂成災與否未能周知今奉旨以後臣密加體訪數日又臣催漕已至臨清渉歴加廣情形加悉敬為皇上陳之大約今嵗蝗蝻起於山東與江北交界之間江北宿遷為甚損傷至七八分桃源邳州沛縣次之山東嶧縣為甚損傷至七八分滕縣次之至江北之淮揚徐三屬及濟南之沂州郯城費縣等處聞俱有蝗蝻臣未目覩不能確定分數若濟兖二府北境及東昌一府俱未生蝗蝻至七月之末蝗蝻生翅望西北羣飛三府所屬始各有飛蝗暫停即過是時秋收將完所損或數頃或數十頃俱不成災其登萊青三府則飛蝗亦未聞及境蓋今嵗山東秋稼原屬十分豐茂足稱大有之年惟蝗蝻所生數州縣為不足耳撫臣駐劄省城止見飛蝗故覺其輕漕臣與臣親歴蝗蝻所生之地故覺其重臣謹就見聞所及據實上聞謹奏知道了所奏情形甚為眀悉雍正元年十月十三日兵部右侍郎臣李紱謹奏為恭報起囤漕糧事臣奉旨於天津衛截留湖南等幫糧船暫行囤貯九月二十六日到衞偕鎮道諸臣率同府廳州縣及漕標等官買辦蘆蓆葦把造立囤底十月初二日開斛起米大小臣工踴躍趨事至十二日軍船四百五十六隻所載米三十萬零三千二百餘石盡數起完囤好其船陸續催趲回南旗丁水手萬衆歡呼感激天恩揚㠶南歸前船已過滄州小雪前可盡出直隸南境今嵗軍船保無阻凍明年新運不憂遲誤沿河小民亦免打冰之苦矣此外尚有船一百九十六隻載米十二萬六千七百餘石現在起囤亦數日可完誠恐上厪聖懐先行繕摺奏聞臣謹奏覽奏欣悦此一事料理迅速妥恊乃爾之力也雍正二年三月二十四日兵部右侍郎臣李紱謹奏為奏明起米情形事竊臣奉旨前至天津起運截留漕糧募僱民船一千四百餘隻共起過正兌米二十七萬有零發往通州因河乾阻淺又兼連日大風回空遲滯停斛七日現在頭運船回空抵津大約四月初旬可以全完目下所起米色並無霉變按查囤口原數亦未見虧折除起米細數應俟全完之日另摺奏明誠恐上厪聖懐先此恭摺奏聞又江西南昌幫内運丁朱戈明等原變色米二十二船當經臣請旨交與倉場督臣估定成色即於天津變價經部議覆奉旨依議欽遵在案今已准倉場督臣將估定成色咨行到臣惟未准到部咨但春深雨水漸多其米原經變色若再雨濕恐致損壊臣謹照倉場督臣所估成色變價購買好米趁現僱船隻運交京通各倉以完截漕事務理合奏明臣謹奏如此辦理爾之勞勩洵屬可嘉雍正二年七月初三日廣西廵撫臣李紱謹奏為敬陳廣西目下情形事竊臣荷蒙皇上天恩簡任廣西廵撫復䝉天語訓誨政毋欲速臣夙夜祗懼欽遵奉行但廣西目下情形不敢不先陳大概以俟次第請旨逐一設施臣查廣西地僻民淳向來從無虧空自捐納開而錢糧耗於榖自鹽政壞而錢糧復耗於鹽今且合鹽榖與銀混而為一而虧空愈不可稽矣從前捐榖每石收銀一兩一二錢及發交州縣每石止算三錢轉相交盤近年奉旨積榖並須本色歴任撫臣漸次買補十之六七然交價不敷買價勢必賠累而錢糧耗於榖矣鹽法陋䂓過多商不能支州縣始私那庫帑運鹽自賣以應引課然官不能親臨各埠勢必假手於人奸商余聖顔等代官行鹽奢侈花費鹽課未足而錢糧又耗於鹽矣現在各州縣頗多虧空各自支吾問其庫帑則曰借出運鹽問其鹽包則曰現發民買榖於是銀與鹽榖混而為一而錢糧愈難稽矣幸而今嵗頗豐早稻約七分收成米價五六錢不等六月中旬以後甘霖時降晚稻可望全收即倉榖可以全補不致那用鹽包而鹽引官運官銷亦不必假奸商名色致令花費而庫帑亦漸可清查矣統俟臣稽查清楚之後將細數逐一恭摺上逹睿鑒再行請旨施行臣謹奏所奏鹽榖各原委明晰周詳之至其徐徐次第料理以爾之才情識見亦不難釐剔清楚也同日又奏為欽奉上諭事臣於四月二十二日恭請聖訓仰䝉天語詢及淮揚河工危險水高於城作何濬築可保無虞臣即就臣粗鄙之見冒昧奏陳面奉諭旨此䇿甚似可行向來未有人言及但總河齊蘇勒身任其事現在淮安知之必悉汝此去迂道與齊蘇勒商議斟酌行之茍有益於國計民生雖費不惜欽此臣隨於二十四日出京至閏四月初十日至徐州適逢河臣在徐隨即傳旨會同商量河臣亦以為似屬可行其工俟秋冬水落相度地勢高低估計物料聽河臣逐一詳奏縁係奉旨事理合行恭摺奏覆伏乞睿鑒施行臣謹奏已據齊蘇勒奏過知道了雍正二年七月二十五日廣西廵撫臣李紱謹奏為備陳貪守劣蹟事竊臣仰䝉聖恩畀以封疆重任日以察吏安民為心而南太慶思四府土司所隸尤為難治知府非才守兼優者不能勝任臣到任後加意體訪惟太平知府甘汝來才守為九府之冠此外慶逺府現在缺員思恩府平常供職若南寧知府慕國琠則貪劣不堪刻不可容者也查慕國琠久任廣西向與沈元佐黄之孝李世孝三人專司廣西捐榖事例人各婪贓數萬國琠尤貪屬吏受其勒索多至虧空今沈元佐如故因下雷土州官男許乾毓承襲出結索銀二百二十兩又巧為脱卸云將此銀留充修城等用臣查外官詞訟私罰銀兩動稱修學修城不報院司無可稽查其實皆入已贓也他如攝新寧州印以置辦執事科派致民人執票鼓譟又風聞因事受陳監生銀六百兩似此貪婪之員臣己特疏題㕘因念係經督臣保調故復恭摺奏聞臣謹奏如此方見果於懲貪激濁揚清惟宜一秉至公原不容絲毫顧忌稍渉於私也同日又奏為請均撥貯捐榖以濟實用事竊查廣西捐榖專積於桂林梧州柳州南寧四府聞開捐之初實由四府任事之官欲專其利非實為備荒計也如果為備荒計自當九府分捐何獨積於四府且桂梧南柳之民不甚加多其餘五府之民亦不甚加少一有荒歉廣西地方遼濶動輙千里移粟移民猝難呼應此所謂有虗名而無實用也至於原收捐價毎石一兩一錢發給州縣存貯毎石止給三錢或止二錢四分不敷採買照民價買則官賠累短價發買則民賠累尤非四府官民力所能支臣細思救弊之法請將四府捐榖分貯九府仍照地方大小酌量多寡庶官民賠累以分任而稍輕又臣前覆奏墾荒事宜請將捐榖借給牛種九府各有荒地則九府各有墾荒之人勢不能俱就四府借給牛種如九府並貯有捐榖可以隨地借給又近日奉旨設立社倉督臣孔毓珣請將常平倉榖借民取息為本意亦甚善但常平倉榖止四十餘萬而糶借兼用捐榖一百一十餘萬而糶借兩無所用似未為調劑之平若各府均貯有捐糓則以捐榖借民取息為社倉之本而常平倉榖可專存為平糶之用矣蓋一轉移間而捐榖不憂朽蠧不累官民各府墾荒有資社倉有本較之偏積四府似為妥便可以久行如果臣言可擇伏乞皇上睿鑒批示臣再行繕疏具題臣謹奏具疏題奏候朕裁定雍正二年八月初四日廣西廵撫臣李紱謹奏為敬陳粤省礦徒情形事竊惟開礦一事臣陛辭之日恭承天語時刻留心查廣西賀縣礦山五里外即為廣東之梅峝汛又數里即廣東連山縣之宿塘寨皆礦徒蟠踞之所眈眈於廣西之大金蕉木等山故督臣孔毓珣撫廣西時有設兵添汛之請臣至廣西即擬奏請嚴禁續聞督臣條陳開礦恐所奏異同有傷協恭之誼因而中止近經平樂府報稱外省無籍可歸之礦徒二百餘人流入蕉木山驅逐不退隨飭賀縣知縣傳齊鄉勇㑹同富賀營守􅍯千總三路並進始行退入廣東臣訪聞廣東連山縣宜善司廵檢詳報梅峝宿塘等處礦徒梁老二聚集多人汛兵子弟亦往附合勢難防緝自願罷職以全性命等語即提臣韓良輔遺札與臣商酌亦深以為憂臣思開礦之舉甚有闗係目下即幸無虞將來或恐滋事謹將現在情形奏聞伏候聖裁謹奏礦沙之利窮民私採猶當禁止何况明目張膽而行之者此中利害朕深知之今既聚衆自立頭目是斷不可一日姑容少寛禁捕者也今將批諭孔毓珣之旨抄録示汝汝等可協力設法嚴禁永令地方無此等事方好須再三留心籌畫而為之愼毋輕忽孟浪凡事悉如此據實入奏纔是此奏朕甚嘉之如宜善司廵檢所言即使少過朕亦樂聞而不加責也諸如此類何妨預防於未然耶雍正二年九月二十八日廣西廵撫臣李紱謹奏為粤西年嵗豐稔事竊查廣西今嵗收成臣初抵任時沿途詢問據云五月小旱早稻可七分收成及臣抵任後六月七月甘霖時降早稻收完之後詢之農民實有九分收成至於晚稻初時望有十分後至八月雨水鮮少榖實少減約有八分然在廣西農民並稱今嵗收成為十年來所未有目下米價惟逼近雲貴中隔土司最逺之一二州縣毎皇上南顧之懐惟是目下久晴雖晚稻已收於田功無傷然間有種麥之地亦尚望雨兼之久晴風烈時有火災栁州延燒三百餘家臣衙門亦燒去旁邉小竹屋三間現在通飭各屬預僃救火之具合併奏聞臣謹奏類斯等災惟以誠敬省過為禳解之良術更於省中訪詢火神廟宇修補完整選擇老成僧道敬禮供奉即可漸致消弭也同日又奏為實陳倉儲榖石事臣查廣西捐榖之始毎石三錢發給州縣建倉之費亦在其中而榖價常在三四錢以上難於購買止以價銀遞相交盤後經接任各撫臣陸續責令買補前任撫臣孔毓珣尤加嚴催雖現在州縣頗苦賠累然倉榖亦十補其九矣臣到任後逐一稽查尚有八九萬石未買臣不時督催又買補四萬石有零尚有四萬餘石未經買補然現在俱經清出價銀十月内可以照數買榖顆粒無虧近准部行廵撫到任限三個月盤查倉貯米榖造册保題若俟十月買榖全完之後具題則逾三月之限若將未買之榖盡行叅出則實非現在州縣之咎且一月後便可全買無庸多此叅劾臣仰體皇上如天之仁止求公事無虧不必多㕘屬吏以示威猛謹遵三月保題之例具本保題外仍將現在倉榖實情恭摺奏明俟十月全買入倉之後臣再繕摺奏聞臣謹奏應如是可謂情理兼􅍯知道了同日又奏為恭謝天恩事臣家人自京齎囘皇上硃批摺子到粤併齎到皇上御製賜臣詩扇一柄及本匣四個黃袱四件臣即出郊跪迎至臣衙門恭設香案望闕叩頭謝恩訖仰瞻宸翰龍飛鳳舞捧誦天章嫓美謨誥至於聖意諄諄奬勵交至悚惶踧踖莫敢仰承伏念臣粗疎之性廢棄之身仰沐天恩有加無已去冬䝉御書賜臣奉國罄心扁額又賜御書福字今嵗復䝉御書賜臣母北堂鶴算扁額奎章照耀子孫世寳今復蒙御製詩章鈞天廣樂簫韶九成躬承鉅麗之觀謬附允諧之列豈勝慙懼莫報高深雲漢為章永昭垂於奕世草環微末矢銜結於此生為此恭摺奏謝臣謹奏覽奏謝已悉爾實非他人可比務宜屏盡一切私心始不負朕特用之恩兼可成全朕之顔面若絲毫不謹致有紕繆朕殊難以為情也其加意勉之雍正二年十月初六日廣西廵撫臣李紱謹奏為恭領御製叩謝天恩事臣家人在京恭齎御批奏摺回南准兵部發給内閣交出欽頒御製朋黨論東紙卷一通滿漢文各一本到粤臣即出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖欽惟皇上聰明睿知聖神文武旣已立萬古之君極又頒發訓諭誡飭臣工示萬世之臣極今復以古來積習人臣狥私植黨者多特製朋黨論訓誨内外諸臣天語煌煌包含五經嫓美二典俾植黨者惕然而知悔孤立者有恃以無恐同歸王道之蕩平共學聖人之公正大小臣工有所循守而臣性迂拙無助伏讀聖製較之羣臣尤深感激謹繕摺叩謝天恩臣謹奏誠然不黨者李紱也更將向日𤨏屑情分私恩小徳擺脱浄盡可以造就成一全人勉之同日又奏為欽奉上諭事竊臣准吏部咨開前事奉旨著廵撫於道府同知通判州縣内保奏二員欽此欽遵仰見我皇上闢門籲俊至意臣本愚昧無識又到任未久屬吏未能周知但既䝉皇上委任封疆之重無日不以察吏為心臣所灼知者止有義寧縣知縣黒天池一人臣昨經題請調補北流縣在案此一員者才守兼優足當保舉其餘尚有數員守清而才不能肆應亦有才長而守未敢遽信者容臣試看確實再行補奏一員臣謹奏己據保奏超擢為南寧府知府矣朕如此推心信任爾若忍一毫挾私負朕上蒼寧不鑒諸況爾乃不由旁人薦舉為朕所特用之人須以全朕用人之面為念勉之同日又奏為欽奉上諭事竊臣准吏部咨開前事奉旨著廵撫於道府同知通判州縣内保奏二員此保奏内不必將朕特用之員保題特用人員内有才守兼優者不拘人數亦另摺奏聞欽此臣查廣西地方皇上特用人員甚少惟太平府知府甘汝來一員係皇上特授之員自到任以來將知府䂓例盡革一文不取土民悦服實係才守兼優之員足當保題抑臣更有請者太平界連交趾固為要地南寧一府與太平唇齒相依接連廣東高廉瀕海之地水陸交會重於太平鹽徒山盜出没其間控制土府州縣尤多武官設有左江鎮總兵文職設有左江道兼轄潯南太三府今左江道現在缺員若䝉皇上特旨再將甘汝來陞補則太平南寧俱可藉其料理矣又南寧知府慕國琠姦貪經臣題㕘現今缺員例應調補但此缺甚屬𦂳要現在應調之員臣俱未能深信此外有候補知府趙庚一員亦不知才守何如仰懇皇上於卓異記名人員内特授一員則南寧得人而廣西南境可藉以撫綏矣臣謹奏照所請行矣雍正二年十月二十五日廣西廵撫臣李紱謹奏為敬陳戎政事宜仰懇聖訓事臣䝉天恩簡任廵撫臣標兩營及城守協標兵丁臣俱有操練之責除舊有營䂓照常舉行外以臣愚昧増所未備共計五條可否施行莫敢自定恭惟皇上聖神文武備於一身敢懇聖訓指示以便遵行一操練宜嚴也凡操練須先定操地今馬歩箭及鳥鎗虛演連環進歩并演籐牌單刀俱在臣衙門箭道施放五子礮及鳥鎗加鉛子演準頭則往小教場合操演陣法則往大教場次定操期每逢一二日操左右營馬箭俱帶演單刀逢三四日操左右營歩箭俱帶演籐牌逢五六七八日操左右營鳥鎗九日合操演習行陣十日休息其不值臣衙門操期者仍於本營遊撃衙門操演次嚴賞罰凡馬歩箭鳥鎗每中一箭一鎗賞錢一百文連中三箭三鎗者加賞小銀牌一面其馬箭未及放歩箭一行陣宜變通也臣初到任閲兵止有四門方陣詢以其餘陣法皆不能知臣查行陣除山路連環陣須挨肩雁翅而進其餘皆行間容行中虛五尺庶便進退不致擁擠但陣法各有所宜四門方陣止可施於平原曠野而廣西援剿常在山谿之間凡背山而戰用一字陣山曲之間用三才陣夾溪而行用䨇龍陣八面受敵用八門陣四圍合攻用圓陣亦曰風雷掃地陣羊腸鳥道用山路連環陣今臣令兩營演習漸知大概惟山路連環陣其法專用鳥鎗鎗分上中下三停一人立放前一人蹲放再前一人伏地放毎三鎗齊放一行之人抵三行之衆若路稍寛則兩行雁翅挨肩而進六鎗齊一單刀宜通習也兵丁無論馬歩莫不各帶腰刀然嘗詢之兵丁能用此刀者百無一二是有刀與無刀同也臣初操練詢以單刀之法全標一千五百餘人惟二三人通曉臣令兩營通習今已有五十人精熟其粗通者亦有二百餘人臣立定拔補之例凡拔補兵丁把總除弓箭鳥鎗外須兼習單刀方准㧞補今人人學習數月之後可望全營盡熟再查為馬兵者當知馬上單刀之法為歩兵者一五子礮宜添製也臣查礮火之威所向無敵可以及遠廣西猺獞土苖皆善用鳥鎗其鎗較營鎗更長可及百五十歩惟礮可以制之臣至廣西查撫標礮位共九十三位内百子礮八十三位五子礮止十位其百子礮裝藥施放甚不便利惟五子礮一礮頭施放餘四人裝子礮五子互換迭放不窮較連環鎗尤甚敏捷臣擬將營中百子礮盡改為五子礮又置稍尺以規逺近設中針以定準頭懼矣一鑼鍋帳房宜添設也廣西山賊不時出沒調兵剿擒行裝必備非有帳房鑼鍋必􅈬村莊借居買食雞犬之擾不能無矣臣標現有帳房四十頂惟鑼鍋全無現在置辦再擬行查通省營汛俱俟眀年稅羡逐一捐添大約每營帳房四十頂鑼鍋四以上五條􅈬臣愚昧之見奏陳可否採用伏乞皇上批示施行臣謹奏如此留心武備殊屬可嘉但須實力行之方有成效同日又奏為請旨事臣查廣西南太思三府西南土司界連交趾沿邉千里既無邉牆間隔田地相連村落相望而土夷積習搶奪刦掠視為泛常現在有安南那陽夷州夷官率領禄州夷兵數百屯於邉境欲與思陵土州爭那窩村地界雖經臣飛飭思明同知㑹同弁目前徃勘明解散併令新泰營叅將嚴加防守但夷州有中外之分素無文移往來未便行文戒飭臣思安南在藩服中最稱恭順此等争地之事伊國王亦未必盡知若行文安南國王令其禁戢亦屬甚易查康熈五十九年因商人買銅一事曾奉聖祖諭旨令廣西督撫行文在案臣愚以為將來遇有邉境土夷仇殺搶奪細故舊例原不奏聞合無比照買銅前事會同督臣請旨行文安南國王彼此自行禁戢既免啓釁亦不致瑣瀆聖聰倘臣言可採臣即㑹同督臣將思陵州事題請行文伏乞皇上批示施行臣謹奏甚好會疏具題可也雍正二年十二月二十六日廣西廵撫臣李紱謹奏為據實奏明事臣前月恭摺奏請均撥捐榖分貯九府奉有皇上硃批臣謹遵旨照原摺具題外中間惟原捐榖價本内未便寫入臣訪聞從前粤西捐納毎榖一石收銀一兩一錢及至發給州縣毎石止給銀三錢其餘八錢聞係當日任事諸臣私分入已總督一錢廵撫一錢布政司一錢按察司與道員共一錢管捐府㕔二錢部費二錢其部費係布政司轉送聞只有一錢到部而院司尚有以空名索取倉收者大約廣西捐納實收銀一百三十餘萬兩僅將三十餘萬兩散給州縣買榖其百萬兩皆當日諸臣分歸私槖而三錢之價除建倉三分實止銀二錢七分雖豐收之年不能買補止以榖價轉相交盤及接任撫臣叠奉部文倉榖必須本色節次嚴催州縣計無所出則那庫銀添入榖價以致從無虧空之廣西遍地皆有虧欠矣臣於摺不究臣思近奉聖諭特停捐納將來此弊不禁而自無其從前侵欺各官或可仰邀臣謹奏已將陳元龍王沛憻等發來粤西令其清楚前項不可徒為他人任咎須當徹底查覈愼毋絲毫瞻狥情面勉之同日又奏為欽奉上諭事十月二十六日提臣韓良輔差遊撃金國泰齎捧皇上硃批摺子到臣衙門臣恭迎捧讀係提臣謹陳撫綏土民之道勸懲土官之法仰求睿鑒俯賜訓誨一摺并提臣奏為提標續造之軍裝告竣營兵教操之武藝漸􅈺謹繕摺奏聞附陳綏靖地方機宜一摺俱奉有御批命與臣看臣恭讀聖訓仰見我皇上睿慮周詳無微不照既廣大而精微亦仁至而義盡臣謹抄存曕奉遵為法守至於提臣所奏之言臣現在亦次第施行特為之有漸不敢造次上聞今恭繹聖訓竊自幸未甚違戾敬為皇上逐一陳之臣伏讀御批謂勸墾在州縣所屬不可侵占土司地土臣昨題覆開墾本内止議流官六十州縣毫不及於土司正慮百姓侵占土司地土也又伏讀御批謂土官相襲已久若一旦無故奪其職守改土為流誰不驚疑則聖鑒尤為周到臣到任後訪聞土司暴斂心竊恨之然細求其端半出於不得已土司所親切而敬畏者惟知府若知府廉能土司即不敢為暴從前調補南太慶思四府知府時有需索土司因而科斂用一派十土民不支因而為盜豈可猶罪土司乎數十年來土司足跡不敢至府畏拘留而需索近日惟太平知府甘汝來到任後盡革規禮土司至府親受約束永不科斂者十已八九而新補慶逺知府劉之頊臣再三勸勉彼亦盡革規禮土司至府願受約束者十亦五六若南寧一府再䝉皇上簡補賢員則舊習未能盡變者惟思恩府耳至於㝠頑不化其中容有一二或當如提臣所請稍加懲創然亦不至於改土為流之甚此臣近日料理土司之大槩約至一年後似可令盡遵聖朝徳化若夫猺獞所居則在六十州縣流官所轄家蓄刀鎗收之不勝其收誠如聖鑒然其為盜亦由貪吏所廹不盡由於蓄鎗但使吏皆廉吏則盜源漸清而收其鳥鎗之法臣曾與副將髙世定商酌凡猺獞仇殺搶奪者必治其罪因而收其鳥鎗彼亦無辭其餘槩置不問又特嚴硫磺之禁彼不得硫磺即有鎗無用庶頑俗可以漸化而人情亦不至驚擾又提臣請於霜降後拘捕兇犯伏讀御批謂國家立法必俟有罪而後加刑若無罪此等事萬不可輕動此誠皇上愛惜民命愼重軍機之至意也但臣思提臣所謂兇犯亦正謂有罪而負固拒捕者耳此事臣亦曽札致提臣近又咨商督臣廣西仇殺搶奪積案不清擬欲擇情重之案不服拘捕敢於放鎗恐嚇兵役抗不到官者稍撥附近營汛協拏葢營汛原有捕盜之責並非用兵之比然亦懲一警百而己非敢遇事輙用此皆臣近日斟酌輕重次第舉行之事據實奏陳伏乞睿鑒臣謹奏斟酌處頗為合宜諸凡總在爾等封疆大吏審擇中道而行也雍正二年十二月初四日廣西廵撫臣李紱謹奏為奏明前摺事臣於本年十月二十五日因交阯夷人與廣西所屬思陵土州爭占地界一事臣一面遣官勘明解散仍具摺請旨行文安南國王諭令禁飭邉夷目今尚未奉到諭旨昨已據太平府知府甘汝來報稱夷人己經退散又准督臣孔毓珣咨稱業經檄行安南國王等語葢土司及軍務係督臣専職故臣衙門並無與安南文移往來舊案而督臣有行文安南之例今夷人既已解散督臣又已行文是臣前摺所奏事宜俱己完結恐煩聖慮理合奏明臣謹奏類斯舉動大約係彼邉方無知小人所為安南國王自必不知也檄行察詢甚是知道了同日又奏為恭謝聖訓􅅹情實奏事臣家人齎回臣前奏恭謝天恩賜臣御製詩扇一摺到粤奉有御批臣捧讀之下感激慚汗竟夕徬徨圖報無地伏惟皇上以天地生成之徳㧞臣於廢棄之中寄臣以封疆之任乃猶上煩聖慮諄諄訓誨惟恐臣不能自勉覆載之慈有加無已臣敢不益加勉勵始終一節以報聖恩以無負皇上知人之明但臣氣質粗疎不能和平雖䝉天恩訓誨再三至今未能全改嗣後臣之所行倘有錯誤跡渉於私或被他人指摘仰懇聖恩賜臣不懼如臣果有私心絲毫不謹即請皇上置臣重典以為負恩者戒除臣抄録御批供奉密室朝夕瞻仰力加勉勵外謹繕摺恭謝聖訓臣謹奏汝與田文鏡二人實難辜負朕恩也於此朕亦頗信得及但不可恃恩縱恣須愈加敬謹方為真不負耳果若一切行為秉公無私悠悠之口豈能惑朕聽耶同日又奏為欽奉上諭奏聞雨水事十一月二十七日臣家人恭齎臣前奏粤西年嵗豐稔附奏久晴風烈時有火災一摺回粤奉有皇上御批仰見我皇上訓誨臣下修徳弭災敬神愛民悉本至誠實與古聖帝王至諴感神之道先後同揆臣欽遵齋肅修省外即於本日行文九府六十州縣地方訪問火神之廟飭令各行設法修理䖍恭致祭至二十九日天忽隂雨一連三日並霈甘霖臣差馬兵四出查看百里之外俱同得雨普遍霑足不惟可免火災麥苖亦皆驟長欽惟皇上聖徳謙沖每遇天人感應讓而不居臣亦不敢貢諛然粤西數月不雨今欽奉上諭三日而雨一雨三日則聖徳動天實有非偶然者除火神之廟仍飭遵旨䖍修致祭外所有欽奉上諭及久晴得雨理合奏覆臣謹奏敬神弭災之道固當如是然火災有或由人為而致者亦不可不知而防之盜賊輩慮行竊無因則先以硝磺引火之物做成香式暗中然點置於人家屋簷草堆之上自却潛伏左近伺候火發乗機竊奪似此者往往有之當留心緝拏重懲此亦弭災之一道也諭廵撫李紱閲爾開銷監榖一疏於中大為瞻狥情面矣然在爾分中如是和平料理猶可原恕何也其事日久己歴數任而孔毓珣向為朕所信用之人現居今職執意推求未免亦有干於伊恐招刻薄之議多事之誚耳朕以此諒汝今既奉朕諭旨則不可絲毫仍存私見况陳元龍非無罪之人王沛憻又一無可惜之處自當秉公執法清楚地方公事若少瞻顧或受請託而貽累於已身不獨自取庸愚之辱且大負朕信任之恩矣為此特諭其勉為之雍正二年十二月十八日廣西廵撫臣李紱謹奏為欽奉上諭事十二月初六日臣齎摺家人回粤恭捧皇上為臣奏廣西監榖一本特頒硃筆諭旨一道到臣臣跪讀之下感懼交集伏念臣䝉天恩至深至重乃猶敢瞻顧情面借墾荒為前人開銷捐榖是臣之罪已不容逭乃䝉皇上原諒臣心曲賜矜全謂在臣分中如是和平料理猶可原恕聖恩高厚實與覆載同其廣大然臣子奉公守法之道斷斷不敢如是也查廣西捐榖當日管捐諸臣每石收銀一兩一錢以三錢發州縣而以八錢歸私槖各屬因不敷採買止以榖價轉相交盤十年以來經接任撫臣嚴勒買還本色雖州縣受累而捐榖已十買其九臣到任稽查實止少九萬餘石經臣嚴催至九月初旬已買補四萬六千餘石其未補者亦俱清出榖價經臣於九月二十八日恭摺奏明至十月内己全數買完其從前管捐諸臣侵欺榖價經臣於十一月二十六日恭摺奏明臣之所奏字字皆實倘臣言有一毫粉飾即懇奏請將捐榖分貯九府及將捐榖借給墾荒之人實為榖石偏積於桂梧南柳四府難於出陳易新將來必歸朽蠧故為多方籌畫並非敢縁虧欠借此開銷也今䝉皇上將陳元龍王沛憻發來廣西徹底清楚但臣愚昧不知皇上所謂徹底清楚者或止令清楚榖石數目抑併令清楚原收捐榖價銀如止清榖數則現在榖已買足原經手之人可以安然無事如欲將原收捐價各官侵欺百萬之銀徹底清楚則從前管捐之府廳除梧州知府李世孝外其餘現在各省原任南寧知府黃之孝現在直隸原任柳州知府趙世勲現在廣東原任桂林同知沈元佐現在雲南原任聖諭臣仍盡心料理其捐榖應否均貯九府可否借給墾荒俱聽該部議覆奉旨之後臣再欽遵施行其徹底清楚捐榖一案伏候皇上批示臣執法究查斷不敢絲毫瞻顧再查王沛憻在粤居官所行甚是平常但管捐布政司係現任福建撫臣黃國材理合聲明臣謹奏黃國材今現膺封疆之寄當行文宻詢姑存其體可也雍正三年二月十六日廣西廵撫臣李紱謹奏為徹底清查倉榖事廣西捐榖奉旨發陳元龍王沛憻二人來粤徹底清楚倘有不清著臣即據實叅奏欽此臣查廣西捐榖經臣補足保題之後又經臣繕摺奏明本無不清之項其不清者開捐之時所收榖價原管諸臣中間侵欺之銀幾及百萬而今日當欽遵聖諭徹底清楚者也此捐納底數臣到任即已查出俱一一節次具摺奏明特以無可發覺之端未便露章上聞今雖奉旨發陳元龍王沛憻二人來粤徹底清楚但二人俱係有職大臣難於窮究故臣於前覆奏欽奉上諭摺内懇乞皇上勅將管捐府㕔究問茲王沛憻到粤即將原管捐諸臣及收銀發銀實數移咨到臣是當日侵欺之實既已顯著臣即飛章題奏庶便清楚再查當日烹分捐銀之數臣近日再加訪實督撫毎石一錢所得各十一萬七千八百餘兩惟藩司毎石三錢五分所得不下四十萬兩此事雖在屢奏合併陳明臣謹奏已有旨諭部矣雍正三年二月十九日廣西廵撫臣李紱謹奏為推廣皇仁以𢎞文教事欽惟皇上以聰明睿知之資敷文武聖神之治崇儒重道臨雍講學所以加意右文者無所不用其極猶念及於直省應試童子有人文最盛之州縣特令増小學為中學中學為大學大學比照府學蓋從來未有之曠典也臣查粤西雖地處偏僻難比中土所稱人文最盛之州縣應試童生多者不過數百人然較之從前業已加倍亦仰體皇恩會同督臣學臣題請廣額在案抑臣更有請者皇上振興文教務使四海之内咸被天恩故人文之盛止各就本省較量在僻逺之方童生應試止數百人者亦得稱盛若通天下計之則盛之中有尤盛者以臣所聞若江南江西浙江湖廣福建此五省所屬一州縣中童生應試有多至四五千人者今北方五省及雲貴川廣等處應試童生毎州縣不能滿千亦得仰邀聖恩廣額五名三名而江南江西浙江湖廣福建等處大州縣應試童生多至四五千人亦止廣額三五名似屬推廣皇恩者尚有未盡臣敢仰懇聖恩勑下直省督撫學政諸臣查明所屬州縣應州縣試止及二千人以内者俱欽遵聖諭小學改中學中學改大學大學比照府學酌量加増其有多至三千四千五千人者自二千以上於一體廣額之外毎二百人加増一名庶人文尤盛之州縣童生上進之途益廣而我國家菁莪棫樸之盛直軼三代而上之矣事關皇上特恩臣不敢露章謹繕摺奏聞伏乞皇上睿鑒施行臣謹奏此事大用商量文風不盛之省分正宜加増額數以鼓舞其上進之心朕意係偏中之公爾所論乃公中之偏也且一時亦難酌定同日又奏為奏聞事本年二月二十四日據太平府知府詳報傳聞安南内亂有奸棍潘騰鳳詭稱係安南國從前莫王子孫私入内境僱募懶漢土民護送往安南等語二月初九日又據龍州吏目千總等聞有奸徒所招二百餘人在啌村地方隨往趕散拏獲莫廷等八人二十五日續據思恩府知府稟稱潘騰龍向潛住歸順土州頭目黃把勢家又有該土州衙役陳亂弹等先己招有口外土夷數百人在交趾高平府屯聚俟黃把勢人到同送莫夷歸國黃把勢於去嵗十二月十三日帶數百人由化峝前往安南為土目等發木刻傳齊土兵驅逐黃把勢逃至湖潤寨復被土民驅逐已經逃回歸順土州臣現在嚴飭各道府根究查拏提臣韓良輔亦差弁兵查逐其事已經解散查安南内亂雖無確信而奸徒召募土民情節頗有關係臣等先事防閑内釁己消不致上厪聖懐矣臣謹奏知道了全在爾等審度輕重相機料理其莫黎二姓原係世仇朕昨詢之安南使臣皆隠諱其情不以實對總之惟料理我内地為是同日又奏為奏明變色米價事臣於雍正元年奉旨在天津衛截留漕糧内有南昌幫變色米二十二船經臣奏明交倉場督臣估色變價另買好米入倉至雍正二年三月臣往天津督運所囤漕糧遵旨設法另買好米交倉俟變色米賣出價銀補項内有江西運丁解補雜費銀七千兩先係變色米價銀墊用後因時値青黃不接米價騰踊約計止須添銀二千兩足補墊項此外約可餘銀五千兩臣於覆奏運米事竣摺内聲明此項應存直隸道庫以充公用而守道桑成鼎力懇免奏謂截漕一事初擬賠銀數萬今多方區畫不動錢糧已出意外若再奏出贏餘銀兩將來辦差者難乎為繼況變色米尚未賣完銀數餘否未定等語臣觀其意似欲混行開銷堅執不允但銀存天津衛庫臣於銀錢不過稽其數目始終原不經手即聽直隸撫臣奏明以充公用可也比臣發完所囤米石而變色米尚未賣完即䝉天恩將臣補授廣西廵撫臣聞命進京陛辭馳驛往粤天津存銀不復與聞至九月十二日臣在京家口至粵云道過天津有截漕贏餘銀兩係守道令衛守備張傑轉交臣家口船帶至廣西令臣自行奏明作何公用臣不勝駭異即於九月二十八日差家人齎摺慶祝萬夀附摺奏明因事屬直隸公務銀由直隸發來將摺送直隸撫臣李維鈞會同奏明而李維鈞以事係守道經手俟查明再行將摺暫存彼署比臣家人由京回粤至保定詢問曾否奏明而撫臣以入京慶祝萬壽尚未回署臣於十一月内復差家人齎摺進京併令其至保詢問値撫臣又以慶祝元旦進京無由詢問至今年二月十八日臣家人回粤始知原摺尚未出何意見臣謹繕摺具奏併將臣去嵗摺子現存李維鈞處者抄録摺底恭呈御覽至贏餘銀五千兩現已至粤解回直隸則八千里解費甚多可否如臣原摺所奏即存粤西為開墾荒地修建水利之用抑或仍行解回直隸伏乞皇上批示施行臣謹奏此一事大竒乃伊等誣揑欲傾䧟汝也年羮堯來京陛見時奏汝巧取此項適李維鈞亦在都中朕因不信其言向李維鈞降旨云李紱斷不為此舉李維鈞解㑹朕意即回奏云李紱原未全吞論理此項伊可以入已伊因路逺止取數百兩以作盤費其餘未經交發仍為伊封好收貯在彼但伊應將此項奏聞纔是朕隨諭李維鈞既如此爾應寄字詢明看李紱作何回覆此彼時之言也殊不料伊等蓄意如此朕今始洞悉矣爾若根基不牢則已墮其術中大約皆係年羮堯之所指使但此等作為朕頗不解其意何居鄙哉小人實為可愧前項既經伊等送到粤西朕又已了然明白爾留於粤省以充公用可也斯事伊等可謂失䇿堪發一笑雍正三年六月初九日廣西廵撫臣李紱謹奏為欽奉上諭事二月二十二日臣齎摺家人回粤奉到上諭一道臣恭展捧讀上諭廣西廵撫李紱提督韓良輔近聞貴州諸苗之中狆苗之弩最毒藥有二種一種草藥一種蛇藥草藥雖毒熬出兩月之後即出氣不靈蛇藥熬成數年可用然單用蛇汁其毒止能潰爛仍有治蛇之藥可醫更有一種蠻藥其名曰撒以此配入蛇汁敷箭其毒遍處週流始不可治聞此撒藥係毒樹之汁滴在石上凝結而成其色微紅産於廣西泗城土府其樹頗少得之亦難彼處蠻人暗暗賣入苗地其價如金苗人以為至寳爾等可著人宻行訪問此樹必令認明形狀盡行砍挖無留遺跡既有此藥亦應有解治之方更加宻宻遍處訪詢如有解毒之方即便寫明乗驛奏聞欽此臣即於本日宻檄行令思恩府知府泗城同知及泗城土府三處嚴飭即刻查明毒樹速令砍挖仍飭速覔解毒之方又於次日差標員恭齎上諭送交提臣韓良輔恭閲以便協同料理訪問施行兹據泗城同知林兆惠禀稱訪聞狆苗弩箭用藥各別苖用百草尖所熬狆用藥毋配入蛇汁查藥母即係毒樹汁曬成凡樹之汁土人皆名撒撒為汁之土音故有汁之樹名撒在狆家名製弩之藥曰礦漢人名之為藥毋今此藥已得其色帶紫但此藥雖有泗屬土人販買賣入苗地其𣗳實出於左江地方業經差人徑往太平等處尋訪今於隆安地方覔得其皮葉枝幹矣至解藥之方遍處細訪已得有解治之方并敷治之法但其藥味尚未全得且係草藥其名皆土音其形狀不能辨識已覔能熬解藥之人往山中採取俟藥味齊備卑職即偕之赴省面禀一切所有訪得解救之方先行列單呈電等語臣伏思解毒之方雖已覔得而藥物非他處所有亦非他處人能識應俟該同知採齊藥物併帶製藥之人至省臣再加面試然後奏聞但臣欽奉將解方奏聞恭請皇上指示將人藥發往何處使用以便人藥到時遵照施行至毒藥撒樹己於左江所屬南寧府隆安縣橋建村覔得三株俱髙八丈圍一丈四五尺皆己另摺附陳臣謹奏覽同日又奏為欽奉上諭事雍正三年五月二十六日准户部咨欽奉上諭訓誨督撫諸臣天人相感之理皇上上承帝鑒有求輙應如山西河南地方三春少雨皇上齋心䖍禱甘雨應時霑足仍諭督撫等於地方纔覺有水旱之事即據實速奏庶朕可及時修省爾督撫等亦宜省咎思過勤求民隠勿徒為禱祝之虗文以飾愚氓之觀聽欽此欽惟我皇上敬天勤民同揆聖祖是以天心感格應焉如響為史册所希有茲恭讀聖諭敬仰聖徳格天實為至顯而臣下之遇事修省益當凛遵聖訓實心奉行矣至臣所屬廣西地方今嵗雨暘時若早稻已卜十分收成米榖價値較去冬不甚增長人民樂業合併陳明臣謹奏覽奏粤西豐熟情形深慰朕懷此皆爾清正自持撫廵有方上感天和之所致勉之既䝉上蒼賜兹嘉應當益加敬愼切毋高興自恣天人相感之理實分毫不爽惟頼一誠相通耳同日又奏為欽奉上諭事臣准吏部咨雍正二年十二月十八日舅舅公隆科多散秩大臣都統拉錫轉傳上諭外官家中有蓄養戲子者著督撫細心訪察宻奏等因到臣臣伏讀上諭按察使白洵終日以看戲為事諸務俱己廢弛欽此臣即行按察司查明該司署内現在有無戲子曾否驅逐據實具文詳奪仍照咨内欽奉上諭事理即便移行各道府一體欽遵查照通行嚴禁取具各印結另文彚報隨據按察使白洵詳稱本司署内原有雜唱家僮五六人今既䝉聖主洞察不即將洵嚴加處分乃特頒上諭通行申飭本司感激涕零惶悚無地所有戲子已於未奉部文之先盡行驅逐等語復據該司取到各道府不敢蓄養戲子印結彚繳到臣臣查向來外官蓄養戲子因而怠於職守者處處有之誠如聖明洞鑒自皇上御極以來勵精圖治中外臣工莫不震動恪恭聲樂宴遊積習漸己改變而廣西窮僻養戲之官尤少至於按察使白洵臣初聞其家有家僮數人教習歌唱然自臣到任後時加察訪並未聞其演唱今欽奉上諭遵即通行查禁茲按察使白洵詳稱未奉部文之前業經驅逐併繳道府印結前來雖恭奉皇上諭旨驅逐者免其奏知但查白洵係特旨指出之人所有驅逐戲子縁由理合恭摺奏明臣謹奏知道了白洵之居官為人究竟如何之處據實奏來聞伊總不勤於政務惟以㳺嬉為事此言確否同日又奏為奏聞事本年二月初旬太平思恩二府界連交趾之土司地方有奸徒潘騰龍冒認交趾莫王子孫流言交趾内亂因有奸徒黃把勢陳亂彈等招集土夷懶漢以護送莫夷歸國為名隨經各地方流土員弁趕散未及出境臣與提臣嚴飭文武查拏其太平地方聚集之人當即拏獲經臣於二月二十九日繕摺奏明其思恩府所屬奸徒亦經差委文武員弁將為首之黃把勢陳亂彈等先後拏獲其餘隨從之人俱係無知愚民臣俱檄令該管知府責逐惟潘騰龍一名未獲現在嚴拏其人亦係愚妄小民無足深究此事己經清結理合奏明至安南内亂之説臣細加採訪實係流言並無此事合併附奏臣與提臣現在嚴飭廣西文武先事防閑遇事即與消弭不致逺厪聖懷臣謹奏所奏己悉封疆之内極宜整理振作至於安邊柔逺最忌貪利圖功須當愼之又愼同日又奏為奏明擒捕獞蠻事臣查廣西猺獞從前素稱淳樸自甲寅乙卯後地方大吏専事姑息猺獞漸無忌憚肆行刦奪臣至粤時稽查舊案有刦擄大盜而十年五年不究者良善之民無所赴愬若平樂府屬修仁縣之十排跳梁尤甚攻刦鄰村聚衆拒捕民不得耕臣與提臣韓良輔商同發兵捕緝仍先各差千總一員持示再三開諭勒獻首犯而抗頑如故臣因發標兵協同提標及平樂協兵張威並進獞賊不敢拒敵始各逃竄隨據賊巢之木料村分路捕緝仍大張告示止拏賊首餘黨許令自新今渠魁盡獲十排民慶樂土盜賊屏息俟審擬後再行具題外縁係發兵捕賊理合奏明至兵丁糧餉賞犒所費無多俱臣等捐給辦理臣謹奏知道了料理允協甚屬可嘉同日又奏為恭讀御批感激聖明叩謝天恩事臣於截漕一事恐費帑金竭力籌畫止圖辦理公事不謂時値米價偶貴既無所費更有所餘乃守道桑成鼎始則阻臣奏聞繼欲混行開銷比臣不允又將銀逺寄粤西臣實茫然莫測其意惟據實奏明而已及恭讀皇上御批乃知係人揑成䧟局臣跪讀再四感激涕零不獨䧟臣之局情景如繪莫逃於聖明洞鑒之中而微臣迂拙之誠乃䝉皇上信其斷不為此臣不知何修而得遭逢聖主幸免讒謗之禍自今以後惟有加慎加勤始終一節以仰報天高地厚之恩於萬一而已至年羮堯所以惡臣實由雍正元年臣任吏部右侍郎議叙捐造營房一事彼時人情不無趨炎之意因首名即係年富意欲照軍前効力從優議叙臣實酌議内地捐銀不比進蔵人員之苦止應比照捐例議敘其事因吏部主稿而部中秉筆例屬右侍郎臣因秉筆定議而年羮堯痛詆九卿切責吏部欲令九卿改稿臣堅持不從因不果改是以年羮堯益切齒於臣矣若守道桑成鼎品本卑微臣曾面奏其人性貪不可重用昨嵗梧州副將張傑到粤日遲臣訪問其故實因過保為守道拘留云副將雖係特恩卓異係彼轉詳務須重謝宛轉十餘日勒立千金借劵然後放行由此觀之是無往而不用其貪矣臣受恩深重茍有所知不敢不言謹繕摺奏謝附陳受䧟之由無任感激悚惶之至臣謹奏此等懷私䧟人宵小之輩天理昭昭徒自害耳究竟何益愚昧之行殊屬可憐之極但坐觀其報可也同日又奏為清查捐榖分肥實數事臣欽奉上諭令臣將原管捐榖諸臣分肥實數徹底清查經臣摺奏請令直隸江南雲南督撫查取原管捐府㕔黃之孝吳元臣沈元佐等口供臣亦將現在廣西之原管捐府㕔趙世勲慕國琠查取口供己䝉俞旨飭行今在粤之趙世勲慕國琠業已取供在案訪聞在雲南之沈元佐已經病故而直隸江南二處尚未准咨到黃之孝吳元臣口供訪聞陳元龍扶同黃國材宻囑黃之孝令其冒認分肥銀數黃之孝因身家狼狽無所顧惜已經冒認又將黃之孝口供分送吳元臣慕國琠等令其扶同冒認臣訪聞確實即於五月二十六日於慕國琠處追出伊等私送黄之孝供底在案查各省分取口供原欲互相印證以清分肥實數今臣尚未准到直隸督臣咨文而黃之孝供底已私送至粤是明欲扶同朦混即使咨到黃之孝吳元臣等口供亦不足憑矣臣擬即據趙世勳慕國琠口供及先經臣取到原領榖價各州縣口供即行分析數目清楚一面移咨福建撫臣黃國材一面題覆謹先繕摺奏明再臣細訪捐榖一事黃國材所得為多今雖未便據為一定而衆口皆同合併奏聞臣謹奏於此一事料理甚屬公平此種情節不待爾奏早有憑據在朕處發來爾看即明若不秉公難免波累也審明之時朕自有處斷雍正三年七月十三日廣西廵撫臣李紱謹奏為首郡亟需表率仰懇特用賢員以資治理事竊照廣西桂林一府為省㑹要地宣上逹下實九郡之倡今知府章克讓丁憂員缺應歸部選但首郡繁劇非才守兼優之員未能勝任臣前於陛辭時將候補同知王沛聞奏請帶至廣西經臣題補栁州府同知又經臣委署太平知府俱極勤慎明敏允屬賢員倘䝉皇上將王沛聞特授桂林知府則要地得人而臣亦可收臂指之助矣伏乞睿鑒施行臣謹奏已有旨諭部矣前所進解毒藥方甚效摺留覽同日又奏為據實奏明賢員事竊臣於本年正月二十五日准吏部咨欽奉上諭按察使白洵終日以看戲為事諸務俱己廢弛直省府道以上至督撫提鎭若家中蓄養戲子者著該督撫奏聞欽此臣查按察使近在省城若果終日看戲廢弛政務臣豈至漫無覺察若有所覺察豈敢少為姑容除欽遵上諭即行查按察使白洵併通行廣西府道以上嚴加查禁併取具各府道欽遵不敢蓄養戲子印結到臣臣隨於六月初九日繕摺覆奏至十九日准吏部咨欽奉上諭聞廣西按察使白洵居官懈怠不能勝任著調回另用這員缺著甘汝來補授欽此臣查白洵看戲之説臣初到任時聞署撫臣韓良輔曾有此言細加訪問縁白洵足瘡告假十餘日署撫臣疑為簡慢故加責備其實自臣到任以來一年有餘並未聞其看戲諸務亦無廢弛今欽奉諭旨即飛檄左江道甘汝來速赴按察使任辦理但臣伏查白洵居官勤愼操守尤清直省司道中甚為難得雖欽奉諭旨調回另用但似此賢員若置之閒㪚實為可惜臣受恩深重不敢緘黙將屬員好處隠諱謹據實奏聞臣謹奏知道了白洵優劣總屬耳聞朕從未見其人到京一見諒不難鑒別也雍正三年九月初七日廣西廵撫臣李紱謹奏為奏明擒捕獞蠻事竊查廣西猺獞因向來姑容漸肆頑梗臣到任後細加察訪則修仁之十排天河之三疃為尤甚除修仁十排臣於五月間咨㑹提臣發兵擒捕渠魁盡獲已經恭摺奏明外今查天河獞蠻在福禄里上中下三疃周圍八十里萬山重阻窟穴為奸自康熈六十一年至雍正二年殺擄之案積至二十三件臣屢行該管文武勒拏而負恃險阻一犯莫獲臣經查確三疃獞蠻窟宅各在隘口之内依巖附峒深林宻箐難於搜捕但所種之田俱在各隘之外趁秋稼黃熟未收臣咨㑹督臣提臣調發漢土兵丁直至蠻峒斷其收穫若能自投到案許以免死從寛審結今各案為首獞蠻一十一人先經病故三人餘八人俱己自投到案現在振旅而歸至於兵丁所過地方鷄犬無驚所用糧餉俱臣等捐給縁係發兵捕蠻理合奏明臣謹奏閲奏深慰朕懷辨理得宜可嘉之至同日又奏為奏明雨水情形事臣查廣西今嵗雨暘時若年嵗十分豐收經臣繕摺奏明在案茲於八月十七十八兩日大雨如注山水驟漲至十九日連綿未己臣即日於城隍廟建壇䖍誠祈晴至次早復歩至城隍廟行香當即晴明開霽水亦漸落但桂林處廣西最高之地故水發驟退猶恐下流或有淹損臣即飛檄九府查明雨水情形陸續據各府州縣詳報到臣除桂林慶逺等府地勢既陡水漲即退民居田禾毫無損傷外惟平樂蒼梧桂平象州等數州縣沿河小民竹屋被水衝壞其近河水田亦有被淹減損收成者臣倡率各該府縣將民間被淹竹屋捐助修理漸已安定其沿河水田所淹無幾計算全省收成仍屬九分以上現在人民樂業不致上厪聖懷縁係雨水驟發理合奏明臣謹奏今嵗各省雖皆有一二處水患仰頼上蒼慈佑除直隸外各省收穫俱屬豐稔朕實感慶不盡同日又奏為欽奉上諭清查捐榖事竊查廣西捐榖侵肥數目臣遵旨將現在廣西原管捐府廳趙世勲慕國琠二員嚴取確供在案又分檄行查原領榖價州縣各供俱在案其侵蝕肥已各有著落而直隸江蘇等處所取黃之孝吳元臣等供遲延未到故先繕摺請旨擬即據現在所取各供分别侵肥數目一面覆奏一面移㑹黃國材庶奉旨事件不致遲延乃䝉天恩批示又將沈元佐底册併發到臣臣謹欽奉遵行外臣近准直隸督臣咨送黃之孝口供與臣所追出供底不同乃知黃之孝尚未盡依他人所囑但臣曾詰問慕國琠趙世勲二人所有供底何處得來一字不異據慕國琠稱係陳元龍所送據趙世勲稱係黃國材舊幕賔現在提臣衙門黃曰瑚者所送臣思天語煌煌寛諸人分肥之罪不許朦混欺隠而伊等所為如此即使衆證俱明不加面質恐黃國材所得爲數既多未必一一全認今准部文知照䝉皇上復將黃國材等發來粤西將來面質之下應無遁情矣此案先擬即行覆奏今既奉旨將黃國材等發來面質應俟諸人到齊訊實再行具題臣謹先行恭摺奏明臣謹奏所奏是將此事秉公審理明白俟接任撫臣到後再赴新任硃批諭旨巻二十二上欽定四庫全書硃批諭旨巻二十二下硃批李紱奏摺雍正四年正月初十日廣西廵撫臣李紱謹奏為修理省會城垣事臣䝉天恩簡任廣西廵撫初入粤境經由全州見城垣倒塌過半比抵任閱城則省城亦多坍頽亟宜修補隨經行查通省則各屬城垣皆有損壞復經提臣查明移咨到臣雖未詳盡大畧相同約估需銀四五萬兩費無所出臣因恭疏請將倉榖糶三出陳易新取其贏餘以供修城之用值清查捐案部議格而未行惟是省㑹城垣尤為𦂳要不容中止費用仍無所出臣衙門每嵗有橋税茶果銀八千兩向為撫臣公私之用臣到任未及二年盤費應酬共用過銀二千六百餘兩其餘俱充公用并賞兵課士置造本標軍器等項及捐造通省營協五子礮鑼鍋帳房又修建書院纂修省志留餘無幾惟雍正二年九月内直隸守道桑成鼎將天津截漕變色米價餘銀五千兩寄送到臣經臣奏明䝉皇上硃批留充粤西公用臣即將此銀陸續發交桂林府桂林縣將省㑹城垣公同料估修理於雍正三年十一月竣工又城内窩棚礮臺欄柵亦俱修理完固計共用銀五千四百六十兩零臣謹繕摺奏明再臣日内將次離粤所有茶果公用銀兩除公私費用外尚餘銀一千二百兩臣仍發存藩庫為廣西將來公用合併聲明臣謹奏城垣為地方保障亟宜修理動用前項可謂以公完公洵屬允協同日又奏為查明捐榖分肥實數事竊查廣西捐榖有名無實首尾不清奉旨令臣徹底清查臣當即遵旨行文查取管捐府廳及領價買榖州縣口供在案大概雖明尚有參差難定之處復䝉皇上將黃國材等俱發至廣西質問雖沈元佐之子與家人不知當日情事所供與雲南原咨相同又准署直隸督臣咨稱黄之孝行至滄州病故而吳元臣亦至今未到但黃國材實係總理捐務之人逐一咨詢與陳元龍互相質問於當日情節更爲眀白臣謹叙具全供分別加看恭疏奏覆計廣西原捐榖一百一十七萬八千二百五十石毎石收銀一兩一錢共收過銀一百二十九萬六千零七十五兩内除毎石榖價三錢五分建倉五分實無浮冒共用銀四十七萬一千三百兩外餘銀八十二萬四千七百七十五兩均屬分肥之數臣逐一分析以便著追亦更無疑義惟梧州府管捐知府李世孝己經病故無可稽查尚有同管捐納同知趙承燾一員係浙江人遺漏未開臣於原捐實收底冊查出隨咨詢陳元龍據覆稱止聞陞任知府在雲南地方已經罷官至今未見回籍猝難咨查臣謹將梧州府捐項比照南寧府沈元佐印冊分別追賠庶有著落詳具疏内又江南咨送桂林府管捐知府吳元臣一供與從前傳送黃之孝假供相同中多冒銷難以憑信又本人至今未到未便懸案不結只得據伊所供將冒銷之銀著落追賠查吳元臣年老昏瞶妄聽傳送假供浮冒開銷固無足惜但銀數多至六萬餘兩其浮冒之數臣細加訪查實非知府所得倘久廢之員不能賠補則此銀仍難清結應否再取確供乞皇上於臣覆疏批示飭部施行再臣細察陳元龍黃國材二人情辭尚知感恩畏法應賠之項俱各承認甘賠其原任府㕔趙世勲慕國琠二人經臣將傳送黃之孝假供追出亦知畏法不敢如吳元臣朦混冒銷合併奏明臣謹奏爾於此一事可謂秉公執正實屬可嘉至吳元臣之項爾既議定著落該員追賠該部若不議駁朕亦不便慮其不能賠補而復特為飭諭也此案可以將就完結同日又奏為請旨事竊臣於雍正三年九月二十日准吏部咨奉旨直隸總督員缺著廣西廵撫李紱補授李紱將廣西省陳元龍等捐納倉榖查明清結再起身赴任欽此又於十一月二十八日恭奉到臣奏摺内御批令臣俟接任撫臣到後再赴新任欽此查捐榖一案已經逐一查明分別著落現在繕疏題覆又聞接任撫臣汪漋將次抵粤臣欽遵諭旨俟接任撫臣入境之日交代事竣即赴新任但臣逺違天顔己經三年戀闕微誠廹切擬於至保定受印視事三日後即趨詣闕廷恭請聖安跪聆聖訓為此繕摺先行奏明臣謹奏到任料理十餘日諸務粗定之後來京見朕朕亦正欲見汝雍正四年五月初十日直隸總督臣李紱謹奏為恭報雨水併二麥情形事竊查今嵗春間雨水霑足自四月二十日以後至今兩句天氣晴明麥苖益盛漸次黃實據九府六州各屬申報到臣並奏報現在惟大名府屬之魏縣於四月初十等日漳有十二村被冰雹損壊麥苖臣俱委員查勘損傷奏臣謹奏几百但只據實入告絲毫毋隠候朕酌量批諭爾庶便遵奉而行此奏朕甚嘉之同日又奏為請旨事臣查丁銀一項即古時力役之征國家定例五年編審一次稽查户口仍造具滋生册籍進呈御覽所以重民生恤民力也第毎逢編審之嵗民間派費甚多有里書里長之費有州縣造册之費有院司道府吏書紙筆之費有部册之費有黃綾紙張解册諸費悉向里户公派廹索甚於丁糧各省皆然而直隸尤甚臣查直隸丁銀業已照糧均攤是編丁之増損與一定之丁銀全無闗渉而徒滋小民繁費似宜斟酌變通臣伏見皇上愛民深切安愈求安特諭直省臣工力行保甲現在九卿㑹議俟命下之日一體欽遵臣因思編審之法五年一舉雖意在清查户口尚未能稽察遊民不如保甲之法更為詳宻既可稽察遊民且不必另查户口自後請嚴飭奉行州縣於編排保甲時逐户清查實在人丁自十五嵗以上毋許一名遺漏嵗底造册申送布政司彚齊另造總册具題進呈御覽册内止開里户人丁實數免列花戸則簿籍不煩而丁數大備其向來編審之例在直隸永行停止則户口既清擾累亦省誠為兩便如果臣言可採伏乞皇上批示以便另疏題請勅部議覆施行臣謹奏詳覽所奏甚近情理但其中利弊尚不透悉爾即具疏題奏廷臣議覆時朕再酌定雍正四年六月初十日直隸總督臣李紱謹奏為請旨事臣准兵部咨為欽奉上諭事怡親王等咨稱雍正四年五月初三日將侍衛分別帶領引見奉旨賈國玉王忠劉應元郝文士周士逵孟尚志王朝聘張徳明李起龍此九人各發回原保之人欽此相應知㑹等因前來查王忠係原任廣西廵撫今陞直隸總督李紱所保之人相應遵旨發回該督可也等因到臣准此臣查王忠本籍陜西祖任㕘將從征雲南戰殁王忠㓜孤長隸廣西撫標食糧拔補把總四年人頗忠誠勤慎臣遵旨放以千總保送䝉恩給與藍翎行走年餘今奉旨發還交臣是否仍補千總令其効力抑或作何補用効力之處臣未敢擅便伏乞皇上批示施行臣謹奏朕此番察取者技勇弓馬出征効力之人並不計論其祖父功勞及為人之誠實也此九人皆不合式所以發回將王忠亦發回廣西撫標仍以千總補用同日又奏為恭報二麥收成分數事竊臣據各道府并直隸州將所屬二麥實收分數陸續呈報前來查霸昌通永二道所屬收成約有十分九分其低窪之地亦有七八分者永平府屬收成約有十分九分其薄地亦有收七八分者保定府屬收成約有十分九分安州一帶窪處或六七分不等河間府并直隸天津州所屬收成約有十分九分其窪處稍薄亦有八分正定府并直隸五州所屬收成約有十分九分近山一帶地薄亦有七八分順徳廣平大名三府屬收成約有十分惟沙壓之地止有六七分宣化一府所屬山地瘠薄高者止九分八分薄者七分臣查今嵗二麥處䖏豐登訪之老農並稱數十年來莫盛於此雖宛平涿州等數州縣俱有冰雹不過十數村莊惟五月二十八九兩日雨水過大近河之地被淹稍減豐收之數臣謹另摺奏明所有各屬報到二麥豐收分數理合繕摺奏聞臣謹奏今嵗麥收逈逾尋常總因雨澤霑足之故真可謂天恩優渥也同日又奏為報眀雨水情形事竊臣查今嵗二麥豐盛民人歡呼收穫實稱大有之年乃五月二十八日大雨貯之項飭令借給加意軫恤有不敷者併令將常平餘榖酌量添借務令補種秋禾不至失所至所酌借之榖今嵗大勢豐登秋熟自能全完且為數甚少似可無庸題請所有各州縣被水情形理合奏明臣謹奏常平餘榖通融酌借甚好但必令被淹之民得沾實惠毋為貪吏姦胥之所侵冒為要萬不可以君子之心度小人屬員亦何可盡信至囑至囑若不實遵朕訓加意訪察將來波連受累雖悔何益率真自信之人往往有此疎慢之失朕故諭及至於待人接物好惡不可偏狥是非切莫預定勉之誌之雍正四年六月十六日直隸總督臣李紱謹奏為據實奏明事雍正四年四月二十一日恭蒙皇上將大理寺右少卿臣吳隆元敬陳管見一摺交臣臣回署後即將摺内事理另行飛飭該府縣查勘明確妥議詳覆去後兹據大名府轉據魏縣知縣查稱漳水遷徙不常向從廣平府成安肥鄉等處分流嗣於康熙五十四年間流至魏縣護城堤北水發之時一望俱成巨浸年甚一年已成河身曾經具詳前院蒙批漳水無定望其他徙等語是以未經題豁今於雍正三年十月間又具詳懇請已蒙勘明河流地畝造册申送在案又堤南羅兒莊被淹地畝俱已造入請豁河流册内等因到臣正與吳隆元所奏相合但吳隆元未知該府縣已於去年詳請勘明現已造册申送也至別查涸出之地以抵豁免之糧臣細查漳水向由廣平府之成安廣平等縣東行其經由魏縣因康熙三十八年於魏縣北路開挑支河一道大勢日漸南徙遂至魏縣護城堤北是魏縣原無舊淹今涸淤出之地無可查抵容臣另行廣平府查勘確報以抵豁免之糧所有奉旨發交詢查事理理合據實奏明併將吳隆元原摺恭繳臣謹奏據奏已悉永定河明夀之奏己交怡親王令其教𨗳之矣滿員中如明夀者即為不可多得之人現今卿班内不及伊者頗多魯論云才難不其然乎密之雍正四年七月初一日直隸總督臣李紱謹奏為據實陳情仰祈睿鑒事竊臣與河南撫臣田文鏡素不相識但向䝉皇上批臣奏摺謂臣與田文鏡皆皇上特用之人臣私心感奮固不敢不自勉亦望田文鏡撫綏一方克有成績以無負九重知人之哲及臣今嵗赴任道過河南始聞其誤信上蔡令張球賢否倒置䝉皇上俯詢沿途官吏賢否不敢不據實陳奏然所㕘者張球而已至田文鏡止謂其性情僻闇國家而已今䝉聖恩委曲教誨將御批田文鏡諸摺賜交臣覽臣跪讀再三徬徨感激不惟仰見皇上訓誨臣下之苦心併得聞千古用人之要道返而自思豈惟田文鏡於賢否倒置即臣所舉錯豈敢亦係知縣迎合且其事經伊孫呈控按察司批查開封府親驗廵撫題㕘通國皆知何待過路之人代為宣播至於已丑同年共三百三名當時已不能盡識榜下一散至今十八年音問不通如黃振國邵言綸等臣至今不能識其顔面何似且田文鏡知臣所稱之汪諴為已丑進士不知臣在皇上前奏其虚浮鑽刺之張玢亦已丑進士也奏其阿附撫臣之陳世倕亦已丑進士也臣在廣西特㕘之孫來賀亦已丑進士也豈有科甲不敢再㕘之皇上訓誨諭旨謹繕摺叩臣謹奏汝宻奏張球之語朕至今未露之於田文鏡也雍正四年七月十一日直隸總督臣李紱謹奏為恭報雨澤事竊查直屬地方今嵗二三四月得雨州縣經臣節次奏報五月係收麥之期正需晴明畿南四府俱於五月二十前後二麥全收並未遭雨濕損惟畿北州縣麥收稍遲沿河十餘縣因五月二十八九等日雨水過大近河村莊稍有淹損俱經臣繕摺奏明目下麥已收完秋禾向茂正需甘雨據各府州縣呈報前來有於六月十五十六十七日得雨者有於六月十八十九日得雨者有於六月二十一及二十七日得雨者俱自二三寸至五六寸不等臣查此番所得雨澤正値青苖遍野之時西成可望大有農民無不歡悦實我皇上敬天勤民感召之所致也所有各屬得雨日期臣謹繕摺奏聞臣謹奏必政和始望年豐卿之力實居大半何得盡歸功於朕耶期共加勉毋怠雍正四年八月初一日直隸總督臣李紱謹奏為約報秋稼豐登情形事竊臣查今嵗直隸二麥十分收成先經臣具摺奏明今七月望後秋稼將收據直屬各府州縣約報莊積水不散者尚需補救雖為數不過百之一二無損於豐登之盛然不敢壅於上聞現在報勘成災者共七州縣毎州縣或數村或十數俱已撲滅尚有阜城河間景州獻縣等四州縣正在撲捕又山東地方界連清河之臨清州界連景州之徳州等處亦有蝗蝻臣已移㑹山東撫臣協力飭捕務絶其種今嵗蝻生甚遲秋禾將收白露將降自不致貽害禾稼無庸具題理合據實附奏臣謹奏去冬人言今春當防蝗蝻葢為水涸之後魚子化生而論朕彼時即預定蝗蝻之生斷不在今春何則去嵗水發於夏秋已過魚子之候也至今嵗水發太早朕深慮四五月間水退之田蝗蝻生在夏秋若七八月間再加以霖潦則水退之田蝗蝻生在明春今果然矣目今撲捕救濟自不待言而明春之虞尤當思患預防切記毋忘同日又奏為恭謝天恩事臣接准部咨奉旨將巧稱倉榖出借各官悉行解任將臣嚴飭等因到臣竊思臣於糶借倉榖一事既不能稽察屬員之巧飾虧空反為伊等欺朦具題代請又不候旨即令各屬擅自給發甚屬愚昧罪無可逭乃䝉皇上天恩不立將臣罷黜止著飭行聞命之下感愧無地聖恩寛大臣所䝉受獨逾等倫自今以往雖竭盡駑駘而實莫能仰報高厚於萬一理合繕摺恭謝天恩臣謹奏朕不憎人有過惟深惡不悛改者凡百處當領悉此意同日又奏為奏明事臣前欽奉皇上諭旨近日不知從何處發端有無頼光棍咒咀毁謗投帖倡惑汝當留心宻訪如拏獲其人追究根源宻摺奏聞欽此臣隨即宻加查訪經今數月除天津州民郭允進素有瘋疾刋貼妄語已經刑部拏究此外更無造言生事之人近日有鑲黃旗人王三格據稱係内務府倉官向年有祖遺圏地坐落滿城縣轉典與縣人孫含夫冉鐸等取租至雍正三年三格欲占回原地將孫含夫及佃户等毆辱占奪地租今嵗三月含夫赴保定府控告未及審理至六月間王三格懼罪因冉鐸吃齋鄉人稱為老道遂告冉鐸邪教聚黨自稱教主以含夫等為將軍總管等語臣即行按察使將所控數人立即拏到夾訊再三毫無影響冉鐸等吃齋奉道並無多事之處而三格借詞奪地誣䧟平人實有應坐之條但三格倚恃倉官雖一無指證而詞不輸服臣現在咨部轉咨内務府將三格是否倉官暫行革退以便審實酌量發落此事與造作妄言雖非一類然事闗首告理合嚴究確實咨部完結謹先繕摺請旨批示施行臣謹奏三格甚屬可惡宜加倍嚴懲以警刁誣倉官非官彼自名之為官也殊可發一大笑雍正四年八月初四日直隸總督臣李紱謹奏為請留應用之員以濟營工事雍正四年七月二十九日准工部咨開奉旨莽鵠立奏請將金世忠馬騤雲阮徳升等三員俱留營工辦事著照所請行天津葢造營房原係直隸地方官之事莽鵠立不過協同辦理乃李紱到任以後漫不經心從前派出料理之員到工未久旋即回任其在工辦理者不過經歴吏目微員二三人以致工程遲滯甚屬不合李紱近來固執已見自以為是著嚴飭行欽此等因到臣臣跪讀聖諭不勝悚惶愧懼臣受聖恩深重乃於𦂳要欽工料理遲滯雖䝉天恩寛宥止於飭行臣自顧溺職之罪實無地以自容伏查天津建造營房臣於商酌繪圖料估請動錢糧等事隨到隨辦未敢停擱一日其委辦人員亦羽檄交馳未敢少緩臣於四月二十六日回任即於五月初四日檄委通判董漢儒廵檢任予榮二員六月十七日復委訓𨗳蘇炳經歴劉衡珠典史郭恒趙枚潘伯盛等五員六月二十二日復委吏目徐汝懋一員六月二十九日復委同知楊在魁一員七月初六日復委因公罣誤情願自備盤費前往營工効力之原任知州李敏徳原任知縣傅樹崇朱亨衍管鳳苞候補知州馬遷等五員前後共委過辦事官十四員所委月日俱在莽鵠立具奏之前現有案巻可據内惟楊在魁候清交盤蘇炳候送科舉俱須事畢赴工又任予榮潘伯盛未報起程現在查㕘外其餘十員未聞有赴工而輙歸者若滄州知州李升徳獻縣知縣程材傳暫到復歸原止委令料估並未委令辦工以上各員除現任者臣例得徑委外其降調候補及有事故聽候開復者臣仍另疏題明伏乞皇上睿鑒施行臣謹奏觀汝惟一𣲖好勝爭辯朕甚輕汝乏大臣氣度況此係諭部飭行之事何乃具摺奏覆亟當加愼汝之出處與衆不同實難勝任四字未必能保優游於林下恐一敗塗地汝之身家性命且置勿論可惜朕一番破格簡用之恩也雍正四年八月十六日直隸總督臣李紱謹奏為據實奏明事竊臣欽奉諭旨令各省督撫布按二司各保居官好者一人欽此臣自到任後半載於兹深惟察吏所以安民於直屬各員細心察訪惟清苑縣知縣王游才守兼優實為直屬州縣中第一即擬將王游遵旨保舉因細查王游係奉特旨由阜城縣調補清苑之員今欽奉上諭除從前曾經密舉及特旨補授各員外始准保舉王游雖止對缺調用亦係特旨補授故臣未敢保舉至王游而外查有晉州知州閻堯熙才守亦優臣已繕疏將閻堯熙保舉但王游才守更為出衆不敢不據實上聞臣謹奏王游以縣調縣何云朕所特用如題本尚未交發仍將王游保題為是同日又奏為衿棍揑災科斂橫肆公庭事竊查直隸保河文霸一帶地居最窪今年夏秋之間大雨時行不無被淹之處當據各州縣申報俱經臣飭司委員㑹勘尚未到齊各屬人民安静無辭惟大城士民向來刁悍縁伊等子弟多充内監目無官長中有生員王存敬者尤為積棍乃敢科斂銀錢為赴保揑控水災之舉知縣李先枝因該縣地方係子牙河下流向來積水勘不成災將王存敬等斂錢揑控情由據實詳報而王存敬等不自愧悔輙敢率領鄉愚數十人喧閙縣堂毁壊門柵當有大城營守備前至縣衙查詢王存敬等仍橫肆不已該守備協同縣役將為首之王存敬等七人拏獲收監具文申報臣現飭布按二司將王存敬等提至保定嚴審俟審明律擬具題外所有衿棍揑災橫肆情由謹先繕摺奏明臣謹奏此事朕亦聞之當嚴審定擬以懲惡習切勿偏袒士子以沽虚名其應處分者當盡法處分雍正四年八月二十四日直隸總督臣李紱謹奏為請旨事竊臣查得直隸地方仰䝉皇上加意民生特命怡親王總理水利營田建萬世之鴻業垂無窮之令聞誠自古所未有也臣伏思水利營田事體重大而臣所任衙門為直隸地方總滙之區一切動用工費効用職名毫無案巻將來驟難遵守臣查護理水利營田印務一官隨同怡親王料理一切事務實為協辦大員伏懇皇上勅令侍講臣陳儀按察使臣張璨將所辦事體俱行移報臣衙門備巻或止令臣移行查取備巻庶功成之後地方官原委洞悉辦理之時易為遵守臣一得之愚是否有當謹繕摺恭請訓旨批示施行臣謹奏怡親王所辦理之事何用爾衙門備巻爾等大臣為朕任用雖百千聚集一處朕倚頼未必如王一人也勉之必效法王之屏盡私心純然忠愛以受朕如是見信庶不負為人臣一生之名節也同日又奏為實陳直屬盜案以紓聖懐事竊縁直屬盜案稍多皇上特頒諭旨恐有積盜未除嚴申盜案舊例誠制治保邦防微杜漸之聖謨也臣伏查地方失事定例四個月捕緝再加游限一個月共歴五個月始㕘疎防比至審題常在一年内外臣准到部文欽奉上諭即將所㕘疎防案件逐一清查計今嵗所㕘共一百案其失事月日實係去嵗八月以後至今嵗三月以前共八個月内之案現在未㕘疎防者共十六案内四月及五月十五日以前共十二案自五月十五日以後二麥既收之時至今八月實止四案再查二麥未收以前盜案雖多經臣逐一親審其為饑民攘奪者十有八九然皆以刦盜題㕘者蓋戢盜所以安民既不容稍有寛縱又文武必須畫一而該管鎮臣往往不俟文職審明即先糾叅此盜案所以過多也伏惟皇上聖徳動天直隸夏秋二稼十分豐稔將見民氣和樂盜風衰息乃皇上視民如傷憂盛危明至意有加無已臣不敢不備悉陳奏庶幾少紓聖懐臣謹奏似此等一篇謬詞何能紓朕之懐耶為饑民攘奪者十之八九屬員欺飾之語豈可槩信近聞山西有名數起夥盜潛入直隸界内今已訪有頭緒俟其就獲之後朕還爾百案悉與饑民搶奪無渉毎事被人所欺而不覺察如何其可同日又奏為欽奉上諭事雍正四年八月初六日准吏部咨前事八月初三日奉旨朕聞知縣牟慤居官聲名好故降旨調來引見今已在途病故甚屬可憫著直隸總督李紱料理令其旅櫬早歸並行文江南廵撫張楷將伊家口照看資送回籍該部知道欽此等因到臣臣當即欽遵飛飭涿州知州詢明已故知縣牟慤家人商酌料理仍將起程回籍日期併用過銀兩報臣隨據該州呈報牟慤於六月初一日病故當即面同伊子貢生牟曰堅料理妥當即於六月初三日護送回籍去訖除臣一面行文咨明山東撫臣陳世倌行知牟慤本籍外所有貢生牟曰堅已經護送伊父牟慤旅櫬回籍情節縁係欽奉皇上恩諭事理理合奏明臣謹奏雖已起程回籍仍當遵旨差人資送路費俾其旅櫬早歸故里此處殊失朕優恤之意況係由部敕行之事應具本題覆雍正四年九月二十二日直隸總督臣李紱謹奏為恭報秋禾收成分數事竊照直屬秋禾今已豐收經臣通行確查茲據各道府將收成分數陸續呈報前來查順天府屬收成實有九分至七分不等永平保定河間三府屬收成實有十分至七分不等宣化府屬先因各處問有雹災稍減分數正定府屬亦間有冰雹又秋雨稍遲亦微減分數實有九分至六分不等順徳府屬亦因秋雨稍遲收成分數與正定同廣平大名二府屬收成實有十分至七分不等其直隸冀州趙州晉州定州深州天津州併各所屬收成俱實有八九分至六七分不等以上所報分數俱照地畝計算若分別肥磽俱屬豐收惟宛平霸州大城良鄉武清安州高陽新安雄縣任邱津軍㕔晉州天津州静海等州縣㕔所有地勢低窪之處因去年積水未消又今嵗間有雨水驟發以致淹沒田禾俱經臣委員㑹勘一面加意撫恤在案臣覆查宛平等一十四州縣㕔各被水成災實共計村莊四百六十七處此等民人在初冬尚可傭工謀食惟十二月正月二月嚴寒沍凍工作難興資生無䇿必須就近煮賑方無失所之虞此煮賑之費查臣衙門毎年有鹽務飯銀八千兩又臣前於盤查司庫之時有布政使徳明節存平頭銀一萬兩在於庫内經臣查出詢問據稱已奏明作為存庫充公之項臣思公用莫急於恤民應將此銀動用同臣衙門鹽務飯銀共一萬八千兩充為煮賑之用倘有不敷容臣酌為奏明量行借糶則被水之民不致失所而此等被淹之地可以無庸題報矣伏乞皇上睿鑒批示施行臣謹奏料理甚屬允當徳明節存之項應於此處動用但不可因非正項而不嚴加察覈令貪汚官吏任意侵蝕以致窮黎不沾實惠則虛負此舉矣同日又奏為直屬衝繁請留賢員事竊臣遵旨保舉晉州知州閻堯熙荷䝉天恩即令陞補山東青州府知府臣伏念畿輔重地較之外省更為繁劇尤需能員辦理除閻堯熙已奉特旨不敢懇留外現有經臣摺奏之清苑縣知縣王游欽奉特旨與大名府知府曾逢聖一同引見現在給咨令其赴部外臣查王游固屬才守兼優而曾逢聖三任直隸亦屬才能素著之員今俱䝉調引見仰懇聖恩仍留直隸原任庶臣得收臂指之助再查直隸現有天津州知州陳雅琛己據告病經臣細查陳雅琛由卓異陞轉人甚耿直實無甚病特以年逾六十而天津州㝡為衝繁不勝劇任故以病力求解退倘䝉皇上將陳雅琛調補晉州將王游陞補天津州則人地相宜各盡其用臣謹仰體皇上用人圖治盛心冒昧陳奏伏乞睿鑒臣謹奏曾逢聖朕原欲用為河南管河道近因蔡珽奏伊貪黷朕從未一暏其面故調來引見諒難逃朕之鑒別也王游朕欲擢補大名府總俟引見後酌定雍正四年九月二十九日直隸總督臣李紱謹奏為歴年私借兵餉據實奏明酌除陋例事臣查倉庫錢糧俱應正收正支私借多闗即屬違例惟兵餉一件各省有嵗暮借支陋例雖多寡不同而不借之處甚少今查直隸官兵俸餉撫標三營併正定等營俱於冬季闗餉之時預借次年春季俸餉仍於次年四季扣還稽察歴年案巻除康熙四十二年以前難於稽查外四十三年以後毎年循例借支今嵗理應設法酌減以漸而止但今嵗因春夏米貴官兵稱貸度日負累更多難以酌減請自雍正五年為始毎嵗減借一月三年減完永停借支庶兵無驟行停借之苦官無私行借給之罪理合據實奏明伏乞皇上睿鑒施行臣謹奏此事當照舊例而行斯乃天下通行之弊是弊也而成例矣何以除為次第酌減之説亦可不必同日又奏為奏明事竊臣據東光縣知縣禀稱九月十八日有欽差刑部侍郎牌委江南淮安府知府劉之頊追趕淮闗任滿監督慶元船隻到縣卑職遵即㑹同劉知府將慶元家口所乗大小船六隻盡行截住併拏獲慶元之總管康二家人孫應仲等押同在船搜查得大包銀三十七包小包銀一包眼同康二孫應仲開包兌明共計銀五萬九千五百兩現在同委員看守在船其餘各項皮箱内貯貲財物件甚多尚未查清合先禀報定奪等情到臣當即於另詳批發布政司飛飭將銀兩貲財等物逐一查明封固造具清册并取收管送查仍將康二等交給來員押赴淮安收審一面將慶元家口人等查明造册詳請給咨解部去後復據東光縣詳稱九月二十一日淮安知府劉之頊業將慶元船隻貲財併家人康二等十三名帶回淮安審訊其慶元家人康二妻黃氏等共三十四名口擬合詳請給咨批示遵行等因到臣當批藩司立即查明造册呈請給咨解部外理合奏明再查前據河間府知府稟稱於任邱縣隨同欽差内大臣公馬爾賽等追獲慶元事理業經馬爾賽等具奏無庸瀆陳理合聲明臣謹奏所奏知道了如慶元之忘恩負徳豈有不遭天譴之理即慶元之敗露亦大竒事想爾等自有所聞也似此辜負朕恩之報可留心細看㨗如立竿見影又如蔡珽朕不料乃一粗率輕薄言過其實之人且局量褊淺舞巧弄智滿腔私欲被朕已看破八九爾當絶而逺之莫被連累雍正四年十月十二日直隸總督臣李紱謹奏為恭謝天恩事臣齎摺家人回保恭捧到皇上賜臣御書唐臣魏徵十思疏一幅臣即出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖欽惟我皇上建中立極主善為師盛徳日新迥超漢祖唐宗之治遠猷辰告愈切堯咨舜儆之心念三代以還治莫隆於貞觀惟十思一疏義無愧於典謨當已安已治之時厪其難其慎之戒雖九功七徳未足擬聖代之昇平而一日萬幾亦足備宸𠂻之採擇特書行楷勝飛白之專精載錫殊恩在汗青而罕覯臣才拙性迂自愧唐臣之獻納力小任重幸䝉聖主之優容仰瞻雲漢天章益凜風霆至教思曰睿而睿作聖惟帝心廣運以無窮事思敬而言思忠知臣職克艱之不易臣不勝欣悚之至恭摺叩謝天恩臣謹奏朕毎展巻實以此十思而日三省之也同日又奏為欽奉上諭事雍正四年十月初三日臣於奏明獲住慶元船隻摺内奉到皇上硃批諭旨臣跪讀之下仰見我皇上至聖至明臣下情偽洞鑒無遺而臣以孤寒下士叨被隆恩少不自愛以致上累皇上知人之明則臣罪更無可逭今䝉聖諭諄切俾臣知所警戒聖恩高厚豈可名言臣伏思慶元前任淮闗監督務為貪虐困累商民報應無差終於敗露臣雖不肖尚能自信有所不為至臣昔與蔡珽同為翰林非有政事職掌惟因性氣俱偏於戅拙遂相知識但臣所身受者聖訓益自勉勵以銘刻於終身而已臣謹奏雖云孤介自守不植黨援為人臣者是或一道然和氣一堂都俞吁咈之風又豈可少朕意莫若公正者親近之私邪者疎逺之好惡不渉偏狥是非不為預擬心虛認理自明氣平處事必當凡於待人接物之際概以虛平應之乃為第一要訣此外或更有良法朕則不知也同日又奏為請詣闕廷恭祝聖夀事竊臣幸䝉天恩委任畿輔長安日近得以時覲天顔今本月三十日恭逢皇上萬夀聖節臣謹擬於本月二十一日由保定起身進京追隨在廷諸臣之末叩祝聖夀又直隸事繁藉以躬聆聖訓有所遵守實臣深幸再直隸布政使臣徳明懇臣代為奏請隨臣進京恭祝聖夀理合一併奏明臣謹奏所奏請俱可朕亦料及爾與徳明同來但不必太早於萬夀節前一二日到都可也雍正四年十一月十五日直隸總督臣李紱謹奏為恭謝天恩事竊臣因恭請叩祝萬夀於十月二十七日趨赴闕廷即䝉聖恩召對嗣是毎日瞻仰天顔恭聆聖訓俾臣愚昧之衷漸覺開朗又䝉日賜天厨克食併頒哈密名瓜既承綸綍於王言又飫珍鮮之御饌將何報稱實切悚惶臣謹遵旨於本月初三日起身至初六日至保定理合欽遵諭旨於奏事之便恭摺叩謝天恩臣謹奏感謝果出於誠心則公忠必見於實事豈但朕畿内赤子受福無涯朕用人得當亦獲免上天之譴責矣同日又奏為請旨事竊臣恭照奉旨將漢軍旗員廻避直隸解任另補此誠我皇上澄勵官方之至意也臣查翰林院侍讀帶管天津同知事務臣陳儀現在護理水利營田印務任大責重同知事務難以兼管實止委令教官吏目等員代行而陳儀又係直隸文安縣人應否免其帶管天津同知事務亦照旗員一體廻避臣謹繕摺請旨伏乞睿鑒施行臣謹奏照此具題候朕發怡親王議覆同日又奏為欽奉上諭事竊臣先准部咨欽奉皇上諭旨令臣將直隸各府州縣衙門缺主嚴查盡革欽遵在案臣查直隸各府州縣衙門向無缺主之名惟廵撫及布按二司衙門封鎖該班書吏不許出入因有外班書吏料理各書吏飲食供應及伊等家口費用日久弊生串通各州縣坐省家人招揺撞騙遂與部科缺主相類臣到任後已出示嚴禁不許書吏招揺今於奉旨後即將臣衙門及二司衙門外班缺主盡行驅逐不惟保定不可容留凡在直隸地方俱不許潛住現在開列各外班缺主姓名通行全屬九府六直隸州轉飭各州縣挨户查逐出具並無容留缺主甘結庶幾根株盡而弊端可絶矣抑臣再有請者臣訪得向來部科缺主仍在直屬地方遥管部科事務通州涿州昌平州等處俱有其人今臣既令全屬出結則部科缺主正可趁此驅除但臣為外吏不便干預部科事務敢懇皇上勅令部科諸臣將從前查逐缺主姓名開明移咨到臣一併驅逐取結存案則徹底澄清矣所有查革缺主情節併請旨勅發部科缺主姓名縁由理合恭摺奏聞臣謹奏此奏甚屬可嘉該部科逐一確查開具姓名發交直督李紱雍正四年十一月二十一日直隸總督臣李紱謹奏為請免嵗貢驗看以恤貧生事臣查驗看敎職一事先經河南撫臣田文鏡具題以教職不可久懸衰老實難勝任請將候選訓𨗳恩實為無既矣臣謹繕摺奏請伏乞皇上睿鑒施行臣謹奏堯舜之仁為古今人君極則朕雖曰未能願學焉至於汝徒讀堯舜之書實不知堯舜用人行政之道所以章句腐儒於吏治民生竟為無用之物朕毎誦大雅思皇多士之什未嘗不撫編三嘆也此事爾幸以摺密奏因隨筆批諭以示朕意若係具疏題逹則妄言之罪不為爾寛矣雍正四年十一月二十五日直隸總督臣李紱謹奏為遲誤營工罪獨在臣仰懇聖恩敕部議處事竊臣於雍正四年四月初四日面奉聖諭天津州盧家嘴葢造滿洲官兵營房等事着兵部侍郎莾鵠立御史顧琮原任直隸按察使浦文焯三人公同監督辦理先將地基築平務於秋間完工欽此臣當即欽遵咨明侍郎臣莽鵠立等前赴盧家嘴地方一面籌畫一面委員至工所公同料估於雍正四年五月十九日具題請撥銀兩隨於五月二十九日准戸部咨覆准撥在案而營房工程浩大需員辦理經臣前後檄委各員赴工往往遲誤以致工程遲滯於本年七月二十三日奉旨諭部將臣嚴飭臣聞命之下不勝惶悚隨即將遲誤之員糾㕘併多委員弁帶領兵役上緊赴工協辦期於及時完報乃臣前已遲誤補過無及現在查得盧家嘴營房雖將全營地面俱已墊完至於磚瓦木石各工止可得半而時已寒凍工作難施只得暫停未能即行報竣此皆臣種種愚昧知識短淺所致誤工之罪實在於臣理合恭摺奏請伏乞皇上敕部將臣嚴加議處施行臣謹奏此應具題非密奏之事工程專責雖在督辦之員爾委員遲悞亦難辭咎同日又奏為欽奉上諭事臣齎摺家人回保欽奉到皇上發下條奏一摺奉硃批命臣密議奏聞欽此臣當即將肥鄊縣訓𨗳羅昱條奏肥邑舊治事理另檄行令廣平府詳查去後兹據該知府詳稱遵即逐一查勘據闔縣紳士等公呈又據肥鄉丁憂知縣王能任申詳各等情查得肥邑舊城道路維均四境輻輳一經修築地方民生均有裨益惟查舊城僅存遺址今欲修復原同創造目下小民雖樂於修復但歴年歉收民力維艱似應飭令該縣動用倉糧興工修築以復舊治所有造送估計工料銀二千四百九十六兩零實屬確估無浮業經轉送在案仰請批准俟將來拆收耗羡銀内照數買補則倉儲仍無缺額而成功之後倉庫錢糧得藉保守闔縣士民共獲安居擬合查明備具城圖詳送核奪等因到臣臣覆訪無異似應如該訓𨗳羅昱所奏將肥邑仍依舊址立縣俟城既修築之時將倉厫責令地方官漸次葢造以垂永久至於現在修復舊城之處可否如該知府所請准將倉糧動用俟拆收耗羨照數買補還倉查闗動用倉糧應行奏請皇上睿鑒批示再行具題縁係欽奉上諭事理理合遵旨密議奏聞臣謹奏覽奏事在當行但修建縣治動用倉糧例應由部議覆施行爾具疏題請候旨可也同日又奏為恭謝聖訓事雍正四年十一月二十三日臣齎摺家人回保捧到臣奏摺共三件欽奉皇上硃批誨示周詳訓諭深切臣跪讀之下惶恐無地感戢難名欽惟我皇上日月照臨之明天地生成之大而臣以葵藿微誠駑駘下質受恩至為深重圖報乃益迂疎既慚補過之思止據一偏之見冒昧陳請思慮不周自今日以後惟有凛遵聖訓痛懲艾於既往彌惕勵於將來而已所有欽奉御批理合恭繳外謹繕摺恭謝聖恩臣謹奏爾自被擢用以來識見實屬平常觀人目力亦甚不及朕但取爾秉彝之良直率之性而已凡聆朕一切訓諭如果傾心感服將來智慮自當増長擴充若硜硜固執鄙見妄自矜高不但終見棄於朕恐致貽笑千古爾誠不及朕逺甚何也朕經歴世故多年所以動心忍性處實不尋常若能精白自矢勉竭同心合徳之誠朕再無不隨事訓誨玉成汝之理倘自以為能記誦數篇陳文掇拾幾句史冊而懐輕朕之心恐將來噬臍莫及朕非大言不慚肆志傲物徒以威尊凌下之庸主也極當敬而慎之五内感激庶永逺獲益無窮爾其欽承此諭毋忽雍正四年十二月初三日直隸總督臣李紱謹奏為恭報得雪事竊照來春二麥全頼冬雪滋生今據各屬陸續呈報得雪到臣查宣化永平二府屬於十月十六七日及十一月十二三日得雪一二寸至三寸不等霸昌道及通永道所屬於十一月十二十三日得雪一二寸至三寸不等保定府屬於十一月十二日及二十九日得雪一二寸至三四寸不等廣平府屬於十一月十五日得雪一寸至寸餘不等再保定郡城於十一月二十九日子時起至十二月初二日辰時止共得雪一尺有餘欽惟我皇上敬天勤民躬行南郊大典至誠感召即於是日瑞雪應期霑足優渥膏澤廣被黎庶歡呼莫不感戴皇仁仰頌一人有慶者也所有各屬得雪俟續報到日容臣另行奏報外臣不勝踴躍懽忭之至理合繕摺陳明謹奏朕觀此番瑞雪所被甚廣眞堪慶幸我君臣當益加勉而敬之慎之可也同日又奏為恭謝聖訓事竊臣䝉皇上天恩訓誨諄切於十一月十五日恭摺叩謝聖恩乃復䝉天恩訓誨有加無已臣跪誦之下感悚交集無地自容伏念臣少習陳腐之文並無師資之教章句迂疎毫無可用幸逢皇上躬備道統之全學逹性天之奥今嵗三月入京恭請聖訓仰䝉皇上指示聖學在心不假於外因物付物以人治人朱子之於聖學猶佛教之律宗未足盡聖道之妙臣伏聞天語實聞所未聞不惟宋儒之書不能及此即五經四書未有超微詣極如聖訓之深切著明者也至十月恭祝萬夀又復祗聆聖訓論堯舜執中之學仁義同歸寛嚴一理闡發千古之心傳蓋作君作師自堯舜以來惟聖祖皇帝集其成惟皇上繼其道而臣等幸生聖世得聞天語亦惟有慶幸於遭逢之極盛而已至臣迂腐詞章尚愧學而未成即成亦無所用安敢稍有固執甘於自棄惟仰懇聖恩推曲成萬物之心始終訓誨俾臣得與聞聖道萬分之一不惟終身感激銘刻五中而臣愚昧之質稍得開朗亦庶幾可效驅䇿於一官一職之末矣謹繕摺叩謝天恩臣謹奏爾應當如是設爾之識見果能勝朕朕必敬之如師如友朕非自恃已能不肯虛中之主似爾等逺不及朕之人朕又豈肯違心以示謙光耶雍正四年十二月十七日直隸總督臣李紱謹奏為續報瑞雪普霑事欽惟皇上南郊禮成瑞雪應期而至除保定郡城於十一月二十九日至十二月初一二等日所得瑞雪經臣將各屬從前得雪一併具摺恭奏今又據各屬陸續呈報得雪到臣查直隸通省霸昌通永二道併各府及各直隸州等所屬之州縣衛所俱於十一月二十七八九日及十二月初一初二等日咸稱得雪自三四五六七八寸以至一尺一尺五寸不等已經普徧霑足來春二麥豐穰可期按其得雪日期俱在南郊禮成之際此皆我皇上至徳感召休嘉協應兆民衢歌巷舞咸戴聖恩所有現據各屬陸續報到得雪情形臣謹繕摺陳明謹奏山左山右河南地方皆奏報通省大雪霑足誠可謂天恩浩蕩也朕曷勝欣幸硃批諭旨巻二十二下
