body:
  text: 欽定四庫全書硃批諭旨巻一百七十三硃批于振奏摺提督湖北學政翰林院修撰臣于振謹奏恭請皇上聖安朕安條奏數事甚屬可嘉候發廷臣議奏提督湖北學政翰林院修撰臣于振謹奏為聖諭之化導最宏廣訓之牖民孔易請通行鄉㑹試以彰德教事欽惟我皇上至孝至誠善繼善述追念聖祖仁皇帝聖諭十六條直接十六字之心傳永為億萬年之寳鑑是以躬親紬繹闡導宣揚文至萬言訓垂六合又復加恩士子頒賜學宮俾成人小子皆得祗誦綸言淑身善行此誠牖世覺民之盛心也臣職司學政凡童生覆試之日遵例黙書廣訓一條臣間令詮釋皆能言其大義伏思萬言廣訓既巳用之於歳科即當行之於鄉㑹臣愚以為鄉㑹試第二場應照童生覆試之例於論表判之前敬謹黙寫萬言廣訓一篇有能敷陳大義者令其以意詮解敬謹書於廣訓之後用以觀其誦習之勤惰驗其詮釋之是非以為去取則人知自勵鼓舞向風聖祖之寳訓與日月共其昭回皇上之恩綸與天地同其悠乆其於世道人心大有裨益矣臣謬獻芻蕘伏乞睿鑒謹奏所為廣訓者即訓䝉之謂只可用之於歲科不當行之於鄉㑹此奏殊屬識見卑小提督湖北學政翰林院修撰臣于振謹奏為請定文武童生之增額以歸畫一事案查雍正二年内欽奉上諭令督撫學臣查明實在人文最盛州縣題請小學改為中學中學改為大學大學照府學之額取錄等因通行各省欽遵題改在案臣查湖北一省雖經前任督撫學臣查明各屬人文最盛之州縣㑹題増額在案但是時歲試巳訖所有武童増額之處竝未舉行至臣莅任以來始當遵例加額而部文内止有取進童生之語竝未註明文武字樣事關大典未敢輕率因檢查舊案查得湖廣學額於康熙四十四年經前學臣潘宗洛題請將人文最盛之黃梅縣由中學改為大學雲夢縣暨湖南之桂陽縣由小學改為中學嗣後文武童生皆一例加額迄今遵照無異則此番增額自應文武童生一例加增方與改學之恩例相符臣既按臨各府復恐各省取進童生或有參差互異之處隨移咨隣近之河南湖南江西安徽各學臣詢其作何加增之處隨據河南學臣于廣咨回内稱豫省奉有題准陞學之州縣業經前學臣王國棟照額取進文武童生一體加増造冊報部在案等語至江西安徽兩省回咨又稱未奉兵部明文止於文童照額加增武童仍照舊額等語而湖南回咨則稱業經咨部未有回覆歲試武童於原額之外另照應增名數牌示坐號以待部覆等語是一加額也而數省奉行互異若此似非所以仰體我皇上優崇學校之至意臣請敕下該部議定畫一之例永遠遵行則恩膏溥被士風益振矣為此繕摺具奏伏乞皇上睿鑒施行謹奏汝且照江西安徽兩省之例循行可也提督湖北學政翰林院修撰臣于振謹奏為請旨事竊臣前奏為請定文武童生之增額以歸畫一事一摺奉到硃批臣跪讀之下仰見我皇上尊崇學校愼重名器之盛心誠至周至當矣但臣有愚昧之衷不得不縷陳於皇上之前者臣去年到任之後即檢查一切舊案内有康熙四十四年前學臣潘宗洛題改黃梅雲夢桂陽等學一案自題改之後文武童生皆一例加額迄今遵照無異復咨照豫省亦與湖廣之舊例相同臣一時冒昧以為此番增額自應文武童生一例加増方與改學之恩例相符所以按臨各府業經遵照題准陞學之額文武童生一體加增造冊在案兹奉諭旨照安徽江西例行則各學增取之武童竝應裁汰以歸舊額臣業巳冒昧増取於前若又朦朧裁汰不據實奏明愈非敷廣皇恩之意為此再行陳奏可否格外邀恩免其裁汰仍俾文武童生一例增額抑以事關大典未便濫觴懇求聖恩容臣另行具疏請旨綂祈皇上睿鑒指示施行至臣身任學政不能詳愼於前輒增舊額冒昧之愆伏乞敕部察議臣不勝戰慄之至謹奏新進小臣無知孟浪未經奉示何得專擅已交該部察議矣硃批諭旨巻一百七十三
