body:
  text: 欽定四庫全書硃批諭旨卷一百十七殊批孫繼宗奏摺雍正二年十一月十六日加銜總兵官臣孫繼宗謹奏為恭請聖安以申犬馬戀主微忱事竊臣備兵軍前並無寸效上嵗逆賊跳梁臣仰仗聖主天威遵承大將軍指示率領官兵奮勇堵𠞰逆賊潰散此臣子常分乃荷皇上𢎞恩授臣總兵官職銜賜戴孔雀翎子頻頒優旨如此恩遇雖捐糜頂踵未能仰酬萬一今西海平定又蒙恩旨下頒聞命增慚感激思奮臣逺在邊外戀主之心實難自已為此繕摺恭請聖安謹奏西邊自前嵗有事以來爾之盡心效力處甚屬可嘉朕實奬悅之至將來更有大受朕恩之日也勉之雍正三年七月十一日陜西安西總兵官臣孫繼宗謹奏為欽奉聖旨恭謝天恩事竊臣標署前營守備任大漢齎捧欽賜金翎管孔雀翎子并銀蘂茶各色珍藥到臣臣郊迎至署恭設香案望闕叩頭謝恩祗受訖又任大漢口傳面奉聖諭臣一一跪聆仰見我聖主明同日月無微不照臣查蓋造兵房實屬窄小不堪屯田牛具騾馬實以疲瘦損壞者充數至臣口外行走之處竟遭年羮堯隱蔽犬馬微勞臣自分無由上達而仰蒙皇上垂鑒洞悉無遺似此主知之特達實千古希有之遭逢臣惟矢心刻骨圖報洪恩敬遵密旨將城工兵房屯田牛具騾馬等項逐一細查細估併將臣行走之處及揀選保奏官員繕具密摺四本恭呈睿覽謹奏朕雖未見爾面爾之居心為人朕已洞悉無遺勉力為之所奏保舉人員一摺效力行走一摺參奏王嵩一摺留覽潘之善居官優劣何如據爾所見所知密奏以聞同日又奏臣欽遵密旨揀選得現駐安西肅州鎮標右營逰擊周文正肅州鎮屬山丹營逰擊王廷瑞寧夏鎮標右營逰擊彭云隆肅州鎮標右營中軍守備鄒文麟現駐安西涼州鎮屬髙溝堡守備方玘英涼州鎮標前營千總任大漢肅州鎮標前營千總侯攀桂肅州鎮標右營把總張振此八員者前在布隆吉地方行走併進勦插漢烏素地方遇敵則身先士卒平時則訓練有方允屬實心辦事勤勞素著之員相應密摺據實保奏伏祈聖主睿鑒謹奏此數將辨朕曾問過嶽鍾琪據云皆不深知雍正三年八月初三日陜西安西總兵官臣孫繼宗謹奏為密摺奏聞仰祈聖主睿鑒事竊臣聞涼州鎮屬永昌營副將劉紹宗于逆賊羅卜藏丹津未叛之先即知逆賊叛逆之事不即調遣兵馬籌畫撲滅之策先與新城堡守備李國祥商議搬移家口躲避之計至逆賊侵陵新城堡與永昌咫尺劉紹宗又不前往救援以致新城堡失陷守備李國祥亦遭賊害逆賊見無官兵又將附近永昌莊村禾場放火攻燒四野百姓逃難蜂擁永昌城下劉紹宗閉門不納再查新城張義兩堡失陷亦係劉紹宗怯懦無能以致人民竟遭塗毒年羮堯聞知其事不即題參以正國法反行袒護徇庇檄令帶甘涼兵馬赴布隆吉駐劄雍正三年四月內奉文搬接衆兵家口劉紹宗帶領兵八百七十五名各回甘涼肅本處搬接因又奉文更番迭戍其原去之兵于七月內陸續仍抵安西劉紹宗借辦理更番及永駐兵丁之事夤緣擅住內地似此怯懦無能不諳軍務以致失陷城池之員臣本欲具疏指名題參但係涼州鎮統轄臣未便越俎理合繕摺密奏再甘肅提標馬匹在甘州大草灘地方牧放被賊趕去四十七匹提臣王嵩據報不即遣兵跟追乃竟聽從中軍參將馬紀師勒令逰守千把及放馬兵丁出銀賠補臣受恩深重知無不言言無不盡訪聞的確謹繕摺密奏伏乞皇上睿鑒施行謹奏如此據實直陳朕甚嘉之劉紹宗之事朕雖早已聞之尚恐不確覽爾此奏則誠然矣今命爾署理提督事務應參劾者竟行參奏應料理處即行料理非比日前有越俎之嫌也勉之勉之雍正三年十月初三日陜西安西總兵官臣孫繼宗謹奏為恭報微臣叩領硃批諭旨日期事竊臣前密奏副將劉紹宗提臣王嵩一摺于本年十月初一日蒙聖主硃批到臣臣恭設香案望闕叩頭祗領訖所有微臣密領硃批諭旨日期理合繕摺具奏伏乞睿鑒謹奏知道了王嵩才具庸常且係巧詐不堪之人也同日又奏為恭謝天恩事雍正三年九月二十七日吏部尚書公舅舅臣隆科多等到布隆吉爾口傳面奉諭旨臣跪聽欽承感激無地隨望闕九叩謝恩訖伏念前嵗青海逆賊蠢動布隆吉蒙古等亦因之作亂臣一軍孤懸卒能抵敵制勝保護地方者實仗皇上天威克奏蕩平之績仰荷天恩擢臣總兵且疊蒙奬賞有加無已臣即竭盡犬馬何能仰報髙深于萬一從前年羮堯到布隆吉時臣因賦性愚拙未嘗逢迎以致失其歡心從未將臣薦舉且將失傷守備作為臣罪啓奏若非聖明照鑒知臣無罪則臣遭年羮堯之陷害寃同覆盆何由得伸今臣得以全軀復蒙優擢實出皇上再造之恩臣惟有益加奮勵恪供職守嚴謹邊防以圖仰答聖主洪恩于萬一耳所有微臣感激愚忱理合繕摺奏謝謹奏覽爾奏謝真誠朕甚嘉悅爾將來乃受朕大恩之人其加勉勿懈雍正三年十一月十一日陜西安西總兵官臣孫繼宗謹奏為遵旨具奏事竊臣欽遵硃批諭旨查得副將潘之善曩在巴爾庫爾出征時歷練營伍熟諳屯田後于元年十一月內從巴爾庫爾赴布隆吉地方應援兼程前來允屬急公又在布隆吉駐劄兩月臣見其為人忠厚辦事實心臣欽遵聖諭謹繕摺具奏所有節次奉到硃批諭旨合併齎繳謹奏去嵗據年羮堯奏朕云爾極道潘之善之劣處朕因疑其言所以有前此之詢今覽所奏誠乃揑造之語也將年羮堯在西寧之奏發來爾看豈不可笑之極雍正四年三月初四日署理甘肅提督臣孫繼宗謹奏為密摺奏聞仰祈聖主睿鑒事竊臣前奏劉紹宗王嵩一摺欽奉硃批巳命臣署甘州提督應參奏者參奏應料理者料理欽此臣於到甘之日復加細訪甘標馬匹于雍正三年五月內被盜趕去原于失馬之後勒令官兵賠補失去馬匹已經補足繼聞奉旨嚴查之信參將馬紀師將銀給還兵丁今部議失去馬匹著落王嵩照數賠補守備王珽千總鄧洪印把總廖大成三貟係専管放馬之人並不小心看守以致馬匹被賊盜去俱照溺職例革職等因具題欽奉諭旨通行到臣臣查守備王珽千總鄧洪印並非放馬之貟但有疏防隘口之責而王嵩以疏防之王珽鄧洪印作為放馬之貟以官兵巳經賠出之銀兩報稱尚未捐收以已經補足之馬匹報稱于馬匹收厰起支草料之時買補種種揑詞巧飾已蒙聖主洞鑒革職效力贖罪邊塞官兵咸頌我聖主明同日月舉錯嚴明至甘屬標路官兵臣不時勸訓申飭如有陽奉隂違者臣當會同總督參奏今將節奉硃批五摺恭繳伏祈睿鑒謹奏王嵩不堪小人也朕因聞其虛名有儒將之稱所以前此閲爾參奏之摺尚懷疑惑及至面見始知真屬輕薄小人似此等類一經朕目何能逃其妍媸也同日又奏為遵旨具奏事竊臣前奏覆潘之善一摺欽奉硃批併發來年羮堯之奏著令臣看臣聽聞之下仰見我皇上聰明睿智事事精詳凡大小臣工之賢否無一不在聖明洞鑒之中臣思年羮堯身膺顯爵位極人臣不思進賢退不肖反行害正以引邪若非聖主燭其姦險察其隱微則潘之善必被陷害臣一介孤微蒙皇上推心置腹待以股肱耳目臣斷不敢一念徇私有負天恩所以前奉旨下詢臣見潘之善並無不好之處故據實陳奏良心難昧聖明難欺也所有原奉硃批諭旨併發來年羮堯之奏另摺齎繳外為此繕摺具奏伏乞睿鑒謹奏所奏知道了潘之善實係好貟朕近日聞爾竟不識字何乃一切摺奏如此通順妥當耶雍正四年九月初八日署理甘肅提督臣孫繼宗謹奏為叩祝萬夀事竊臣身際昌期恭逢萬夀聖節薄海臣民莫不歡呼頂祝臣受恩深重戀主情殷前經奏請陛見荷蒙俞允兹者正擬束裝赴京隨班抃舞緣新任提臣馬會伯尚無抵甘之信臣是以未敢即赴闕廷臣謹率臣屬將辨兵丁呼嵩遙祝聖主夀與天齊永綿億萬載無疆之福謹奏馬會伯抵任尚早一切事務不可因係署理稍致推諉因循勉力為之毋怠雍正五年二月初十日陜西延綏總兵官臣孫繼宗謹奏為奏聞事竊臣前由綏德南路赴京陛見回由宣大邊路抵任閲歷延屬塘鋪大墩多有破損煙墩低小不堪又未𥪡立旗杆陳列器械有名無實于地方殊無裨益臣到任之日即嚴飭各營汛整理器械每塘鋪派兵五名常川防範復令乘春暖天和將墩臺煙墩一切修整務令嚴防密緝月得雪二次有八九寸一尺一二寸者今嵗正月二月又得雪三寸四寸不等地氣潤濕易于布種奏條奏千把一摺甚屬可嘉朕近日正為此事特降諭旨爾所奏適與朕意相合已發部議矣雍正五年三月二十五日陜西延綏總兵官臣孫繼宗謹奏為奏聞事竊臣查延綏素稱三邊重地防衛控禦全恃城垣臣到任後閲視延綏城竊見北面黃沙自邊墻直擁至北城護城已被壓沒而大城東北角至西鋪樓竟成沙山擁壓城頭約髙一丈五六尺臣隨咨呈督撫二臣委貟會同踏勘設法刨運訖臣清查營伍有初安塘撥減餘守兵空糧一十七分隨飭各營路招募補額外復點驗營馬惟設立馱炮馬六十匹俱瘦小不堪臣在口外年久知馱馬不及馱載之用再查軍興以來各營軍器鑼鍋帳房等項殘缺甚多亦應亟為整理臣呈準督臣嶽鍾琪借給銀二千兩分發各營路製造其銀在公費項內按季扣還今先挑出不堪使用鎗二百一十四聞伏乞睿鑒謹奏旗幟鑼鍋帳房等項軍器固屬必需然營伍第一以訓練為主故云制梃可以撻堅甲利兵教導士卒使明曉大義操演技勇令勤習精熟尤為要務不可専留心于外飾勉之雍正五年七月十三日陜西延綏總兵官臣孫繼宗謹奏為奏聞事竊臣前奏舊設馱炮馬匹變易駱駝并改造鳥鎗一摺奉有硃批諭旨大哉王言誠萬古練兵不易之良法也臣隨將馱炮馬匹變易駝隻之處咨會提臣轉咨督臣商酌訖再臣改造鳥鎗二百一十四桿續又挑出不堪鎗三十桿俱已打造齊備給兵操演外其餘軍器現在次第修整臣仰遵諭旨教訓痛除營伍積習又每于三六九操演之餘必諄諄教誡朔望傳集公所講解聖諭廣訓使之咸知忠孝大義臣惟敬凛聖訓實在奉行萬不敢専務外飾沽名要譽自欺欺人有負我皇上委任隆恩也為此謹奏凡百只以務誠實為要况爾乃武臣目不識丁既無機巧詐偽之才何如率真而行之為善也老練姦猾皆取辱之道絲毫無益勉之勉之雍正六年三月初十日陜西延綏總兵官臣孫繼宗謹奏為奏聞事竊查臣屬各營呈報各該汛地方去冬得雪大小三次二三寸至五六寸不等入春至二月盡又連得雨雪四次入地五六寸七八寸不等地氣潮潤天氣融和現在布種至于各地方米糧價值甚平理合具摺奏聞謹奏深慰朕懷全賴爾等封疆大臣文武和協實心愛養兵民有以上感天和也同日又奏為奏聞事臣思軍中器械火器最為緊要每兵百名必得鳥鎗三四十桿方為足用查臣標四營除城守營置立鳥鎗一百桿止敷汛防墩鋪之用其中左右三營止有鳥鎗五百五十桿臣思延綏乃三邊重地倘有事調遣行走每千名兵止有鳥鎗一百八十桿近經派赴西藏兵丁攜帶三百七十桿僅存一百八十桿委屬不敷臣欲再添造鳥鎗三百五十桿合共九百桿每營三百桿始足備戰守之用再查四營步守兵盔甲尚缺少鐵碗盔二百四十九頂今臣一併補造足數總以公費辦公務俾營伍實有裨益伏祈皇上睿鑒批示遵行謹奏好武備火器為重應行添造者一面補造一面將奏準情節咨部存案或具本題明亦可硃批諭旨卷一百十七
