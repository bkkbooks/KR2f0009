body:
  text: 欽定四庫全書硃批諭旨卷五十二硃批張大有奏摺雍正元年三月二十八日漕運總督臣張大有謹奏為恭請聖安事欽惟我皇上大孝性成自聖祖仁皇帝賓天悲慟哀思靡釋於懷且山陵大事無一不由睿慮籌畫敬愼周詳從古莫及臣遠羈職守不能躬赴闕廷跪請聖安依戀之私夙夜靡寧為此恭繕奏摺叩請皇上萬安謹奏皇考梓宫大事仰賴上蒼默佑諸凡恭送山陵一切厝置悉皆安吉於月之六日旋京朕躬甚安汝無庸過慮同日又奏為恭報運河水長情形仰祈睿鑒事臣查江南地方自冬至春雨雪甚多故淮安上下運河數百餘里入春以來河水漸長二尺有餘題報外其頭幫大河等衛船隻行抵宿遷縣地方暫行停泊俟山東八閘等處挑河完日臣即飛催北上所有運河水長情形理合具摺奏聞謹奏知道了雍正元年四月初二日漕運總督臣張大有謹奏為糧道關係緊要仰懇事因其侵蝕錢糧據實題參請旨革職嚴究外伏念糧道一官最關緊要必得廉潔勤皇上或簡部院大臣往浙查審或江南督臣或浙閩督臣會同浙江撫臣審究務期漕弊永清積蠧盡除則浙省軍丁仰荷皇恩於無既矣為此謹奏所請知道了雍正元年四月二十七日漕運總督臣張大有謹奏為奉到聖諭恭陳謝悃事雍正元年四月十七日京口將軍署理江寧巡撫臣何天培到淮恭傳聖主恩旨臣跪聆之下感深欲泣竊念臣一介庸愚仰荷皇上天地父母之恩涓埃未報乃蒙寵錫屢頒溫綸疊降臣夙夜自問惶悚靡寧惟有凛遵聖諭竭盡駑駘殫心漕務以仰報皇恩於萬一耳為此繕摺恭謝天恩謹奏知道了爾所奏請補放武辨一事已降旨於該部矣雍正元年五月二十八日漕運總督臣張大有謹奏為恭報雨澤事臣於五月十六日到邳州黃林莊見天旱水淺臣甚為焦心一面虔誠祈雨一面率同印河各官親督人夫在八閘撈淺蓄水於二十七八兩日大雨滂沱兩岸秋禾即時勃發河水即時增長我皇上至德格天百靈效順正當需雨之時而甘霖大沛萬姓歡呼臣得藉此催趲糧船挨次前進深為慶幸為此繕摺奏聞仰慰聖懷謹奏覽爾所奏已悉朕懷甚慰雍正元年六月初九日漕運總督臣張大有謹奏為恭慰聖懷事六月初七日臣齎摺千總回至臺莊忽聞仁夀皇太后賓天之信臣北望涕零不勝驚悼伏思上年十一月內聖祖仁皇帝龍馭上升今又值皇太后賓天我皇上至孝性成思念罔極不知如何悲慟但聖躬為宗社所憑依臣民所仰賴宵旰勤勞日理萬幾當此盛暑之時伏懇皇上節哀上慰聖祖仁皇帝皇太后在天之靈下副四海臣民愛戴之念臣緣糧船進閘日事督催俟盡行催過八閘臣即星馳赴闕叩謁梓宫並得跪瞻天顔稍盡犬馬依戀之私為此繕摺齎奏臣不勝激切懇禱之至謹奏朕安無庸爾慮亦不必速來俟糧船過盡然後來京可也時當盛暑量力而行宜愛養精神為國家效力雍正元年七月初一日漕運總督臣張大有謹奏為恭報糧船過閘數目事今嵗江浙四省糧船共五千六百餘隻自五月二十七八兩日得雨以後六月內連雨不斷臣督率辨丁日夜催趕至六月三十日止共進臺莊閘船三千四百餘隻共過韓莊閘船二千六百餘隻其後糧船除奉旨截留江西尾幫於兖州府備賑外未進閘船一千九百餘隻所有糧船過閘數目恐厪聖懷繕摺恭奏再欽差吏部侍郎臣傅紳副都御史臣李紱於六月十九日到八閘內與臣協力催趲數日今往要緊各地方分催合併奏聞謹奏覽奏糧艘過閘數目大慰朕懷前據石文焯奏報沁水漫溢堤被衝決數十餘丈由去歲故道直㵼鹽河等情朕深為憂慮恐復如去歲或致有礙運道今閲所奏安瀾無事蓋沁水雖泛未奪黃水之溜此誠河靈顯佑之徴緣爾等實心任事之大員有以感召神明之垂佑也朕深為慶幸同日又奏為欽奉聖諭事六月十六日廣東瓊州總兵臣張耀祖到臺莊閘傳皇上密旨山東閘河水淺總漕張大有切不可過於焦心保愛身體為要伊為臣能盡臣職朕豈有不加體聆之下感激涕零臣何人斯受此隆恩然寬以恤下者高厚於萬一耳所有奉到聖諭理合具摺恭謝天恩謹奏爾所奏楊村一帶河道預行疏淺一摺所見甚是朕已嚴諭施行矣雍正元年八月初一日漕運總督臣張大有謹奏為請旨事六月二十一等日準户部咨文欽奉上諭截留江西尾幫漕糧於兖州府等處備賑欽此臣即派定糧數一面咨詢山東撫臣黃炳在於何處交卸去後兹據黃炳咨稱已經具奏無庸截留等語但臣奉有截留之旨未奉不截留之旨目今糧船將盡過濟寧伏祈皇上早頒諭旨臣即欽遵速催北上為此繕摺請旨謹奏已有旨停其截留矣想部文尚未遞到接文後爾其遵照可也雍正元年九月十五日漕運總督臣張大有謹奏臣於九月初八日到通州會同倉場督臣法敏陳守創傳集各幫旗丁將露囤漕糧事務公議妥確業經奏明在案臣一路查看糧船於十二日到天津查得已過天津北上糧船四千二百餘隻未過天津糧船一千三百餘隻已過楊村北上糧船三千四百餘隻未過楊村糧船三千一百餘隻其回空糧船已過天津南下者一千餘隻臣遍諭各幫辨丁速行起卸押空回南接濟新運臣於十五日自天津乘舟南行理合奏聞謹奏據李紱奏稱尾幫必至阻凍今正在此設法料理爾選委得力屬官一員令詣江西幫協同商辦此事特諭雍正元年九月二十日漕運總督臣張大有謹奏為欽奉上諭事九月十九日臣行至德州地方臣齎摺家人回接奉皇上硃批諭旨李紱奏稱尾幫必致阻凍今正在此設法料理爾可令一得力屬員詣江西幫協同商辦此事欽此仰見我皇上軫念漕務至周至切臣前已將奉旨特放宿遷遊擊馬空北留在通州辦理漕事今又選得臣標千總江豹熟練漕務臣謹遵諭旨即令其星馳往天津通州一帶同馬空北到江西尾幫協同商酌務使糧船不致阻凍仰慰聖心再臣沿途俱𣲖有千把總催趲回空糧船合併奏聞謹奏業經料理妥協必不使尾幫至於凍阻此事朕已釋懷矣同日又奏為奉到聖諭臣謹遵行事前八月二十九日臣行至三河縣地方臣齎摺家人回欽奉上諭各直省督撫務須嚴飭所屬凡經過州縣供應上司酒筵僕隸輿馬芻茭之費檄行裁減欽此臣自天津起身南行預先行文曉諭各州縣一概不許供應其府廳下縣盤查監兌供給費用容臣嚴行禁止仰副我皇上撙節浮費之聖心所有奉到聖諭臣謹遵行緣由理合奏聞謹奏知道了回空船隻朕現有旨從部頒發爾其加意催趲毋令稽遲雍正元年十月初一日漕運總督臣張大有謹奏為請廣皇仁加恩兵丁以完倉儲事臣於九月初八日到通州據上年凍阻北河挂欠辨兵具連名公呈內稱丁等自六十年在南冬兌冬開運糧北上六十一年值山東運河水淺張秋沙灣決口挽運艱難抵通遲滯又復凍阻北河至今嵗四五月間方始起卸是一運三年食用數倍且自冬至夏七八箇月船泊水中以致米色蒸變篩揚折耗此挂欠之由也今留通追比丁等無處買米挂欠何時能完伏乞具題將丁等發南追比分年搭運庶挂欠可完而窮丁可免飢寒之苦頂戴皇恩無既矣等因到臣臣查上年旗丁守凍實因天時所致與盜賣挂欠者不同雖留通追比而挂欠者多勢難追完仰懇聖慈敕下倉場總督查明挂欠分數概行發南勒限追比分年搭運既於倉儲有益而窮丁又免留通之苦感戴皇仁歡呼滿路矣至於通漕旗丁皇上加恩之處伏祈敕部查議再運官因挂欠留通者多南漕領運乏人仰懇聖慈將留通運糧千總亦皆發南使戴罪效力則其踴躍急公定倍尋常謹繕密摺具奏伏祈睿鑒施行謹奏總理事務王大臣會同倉場總督議奏同日又奏為遊擊缺員懇恩速賜補放事竊查臣標右營遊擊李三豹升任員缺今年三月內準兵部推調雲南永北鎮標遊擊杜明禮在案今臣於九月初九日準兵部咨開奉旨杜明禮著照該督所請以升銜留原任欽此行文到臣臣查右營遊擊有催趲漕船整理營務之責甚屬緊要今懸缺半載有餘尚未補人仰懇聖慈將宿遷營遊擊馬空北調補臣標右營遊擊以便就近指使辦理漕務其宿遷營遊擊臣看得德州營守備徐行催漕勤慎又臣標徐州營守備徐文芳弓馬嫺熟仰懇聖慈於此二員中欽點一員補授宿遷營遊擊即令赴任於漕務營伍均有裨益矣再查此二缺非題補之缺臣不敢具本為此繕摺請旨謹奏照張大有所請將馬空北調補右營遊擊徐文芳補授宿遷營遊擊雍正元年十月初二日漕運總督臣張大有謹奏為欽奉上諭事臣欽奉諭旨回至濟寧會同撫臣黃炳查看諸湖看得今秋河水大漲相機開放湖口引水入湖可為水匱者共四處內馬踏蜀山二湖俱各舊有湖堤因年久殘缺恐其收蓄不固現在委令印河各官加幫修理不日完工其獨山一湖原係湖河相連水無關攔恐致走泄應築堤之處現在酌撥錢糧𣲖員分段儹修務令剋期告竣再微山一湖由南陽昭陽等湖接連下注滙成巨浸以上四湖所蓄之水若今冬明春雨雪調勻綽堪資運臣等會看之時適值河臣齊蘇勒往豫路過微山踏看水勢臣等會於韓莊地方公同商議現將各湖截水土壩盡行加幫修築俾湖水涓滴不致走泄以為水匱緣係欽奉上諭事理相應合詞奏聞謹奏所議甚好飭諭屬員實力奉行毋致滋擾百姓雍正元年十二月初八日漕運總督臣張大有謹奏為恪遵聖諭整飭營務事竊臣標營兵向來惟以催漕為事並未操練欽奉諭旨著臣整飭營伍臣於回淮之日即嚴飭各營將備右二營臣每日辦事之後看兵射箭打鎗務期盡心整理仰副我皇上軫念兵備至意理合奏聞謹奏如此盡心整理甚好於他人朕尚聼其言而觀其行於爾朕覽此奏即信而不疑矣同日又奏為恭報回空糧船出閘事據臣標催趲漕船員辨報稱回空尾船於十二月初二日全過山東八閘南下等因到臣臣查今歲糧船荷蒙聖恩軫念特命侍郎臣李紱同倉場督臣法敏等在通州天津速為起卸將空船發回接濟新運欽惟我皇上仁恩普被太和之氣洋溢四海自入冬以來至今臘月天氣融和河冰未結糧艘通行旗丁免守凍之苦小民免打冰之纍運辨免遲延之罪新漕免雇募民船之難軍民無不歡呼感戴臣嚴飭標員晝夜催趲指日皆可過淮理合奏聞謹奏知道了此皆爾等諸臣實心贊助之所致也期共加勉勿怠雍正元年十二月十七日漕運總督臣張大有謹奏為恭報回空糧船全數過淮事竊查今歲糧船回空仰賴皇上福庇天氣融和運河不凍糧船晝夜遄行南下其軍民感悅情形臣已繕摺奏明今於十二月十六日江西等幫尾船全數過淮除恭疏題報外謹此繕摺奏聞謹奏尾船全數過淮無阻誠屬可喜之事雍正二年二月初二日漕運總督臣張大有謹奏恭請皇上萬安朕躬甚安仰賴皇考在天之靈默相佑助六省同日時雨大霈而西海虜氛蕩平淨盡朕心感慶筆不能宣惟以手加額自幸而益加敬謹耳同日又奏為奏明事臣查鎮江進口以南運河緣上年雨澤稀少河水淺澀自十二月以後全賴潮水灌注回空糧船方得遄行潮水一退遂多阻滯臣屢飭地方官多方設法疏浚挑撈空船俱已歸次今當重運北來之時臣現同督臣查弼納在揚會審遂嚴諭江鎮道王璣知府葉前等上緊設法挑撈築壩蓄水以濟重運督臣會審事畢又親往鎮江一帶查看料理臣回淮盤驗糧船理合奏明謹奏所奏知道了至江國英一案奏摺候另有諭由部轉發此事情弊顯然江國英罪不容逭爾等務宜研究實情申明國憲毋得絲毫瞻顧徇隱特諭雍正二年三月初四日漕運總督臣張大有謹奏二月二十四日臣齎摺家人回恭捧硃批諭旨併諭督臣查弼納聖旨一封臣即差家人齎往江寧交與督臣查弼納祗領訖江國英一案俟解任撫臣李馥等到齊之日臣等恪遵聖訓務必審明不敢絲毫瞻顧徇情為此謹奏知道了但當以虛公為主不可少存偏見纍及無辜惟江國英係罪之魁難容寬恕同日又奏三月初三日得有大雨河水增長一尺有餘軍民歡悅此皆我皇上至德格天百靈無不效順也理合奏聞謹奏如此普雨春令實為難得真可謂天恩浩蕩也雍正二年三月二十六日漕運總督臣張大有謹奏臣聞西師大捷普天歡忭除恭疏慶賀外謹先具摺恭叩皇上天喜臣不勝欣忭之至謹奏國威遠播邊塞肅清朕與天下臣民同喜同日又奏為欽奉上諭事臣接奉上諭糧船頭舵水手俱用本軍撑駕欽此欽遵臣隨咨會各省督撫諸臣並通飭各糧道都司衛所一體欽遵上緊力行去後兹於糧船過淮盤驗時臣逐船查點每船只換一二名或三四名不等據各糧道辨丁同稱糧船除正副旗丁之外其本軍內或貿易為生或務農為業撑駕之事多不諳練糧船關係重大非熟諳之人不能勝任不得不將老練水手留用數人撑駕俟本軍學習諳練然後盡得更換等語臣思糧船頭舵水手換用本軍係欽奉聖主特諭所有各糧道衛所咸稱一時不能盡換緣由不敢不據實奏明謹奏一時盡行更換固難從此學習逐漸抽換不過數年後本船皆本軍矣若因循不肯學習兩三年後仍然如故則責有攸歸也同日又奏為催趲糧船事竊今歲起運糧船頭次過淮者二月內臣已具疏題報在案今於三月二十五日以前又盤驗過淮船共一千八百餘隻復派臣標副將興王政在揚州三汊河催趲派副將閃文繡在山東八閘催趲又派臣標千總江豹率領頭幫大河等衛糧船催趲前進兹據副將閃文繡報稱自三月十五日起至二十一日止共催過臺莊閘船三百三十餘隻恐厪聖懷理合繕摺奏聞謹奏派委大員催趲甚好朕因今春水淺正在懸念同日又奏為仰懇聖恩事竊臣當盤糧催漕忙迫之時寫字手顫凡有緊要密摺臣仍親自恭寫其餘公事奏摺仰懇聖慈準令代寫則感戴皇恩於無既矣為此繕摺請旨謹奏忙時令人代書可也若遇密事仍須親寫即字畫稍大略帶行草亦屬無妨辭逹而已敬不在此雍正二年四月二十六日漕運總督臣張大有謹奏為恭謝天恩事四月十九二十等日接準吏部戶部咨開欽奉硃批諭旨到臣臣跪讀之下不勝惶悚恐懼之至伏念臣一介庸愚仰荷聖恩畀督漕務任大責重時切冰兢緣臣才識短淺雖盡心竭力辦理漕務而覺察不及以致辨丁玩法生事罪戾奚辭今蒙皇上天恩格外寬宥不加嚴譴特降溫綸訓誨諄切皇恩益厚戰悚益深除即恭録聖諭嚴飭文武官辨祗遵并出示遍行曉諭外自此以後臣惟有恪遵諭旨凡事不敢固執已見嚴督屬員約束辨丁務遵法紀稽察盜賣愛恤商民以仰副我皇上愛民如子一視同仁之至意為此繕摺恭謝天恩臣不勝悚惕之至謹奏覽奏已悉察吏以安民正爾大臣之責馭下寧過於嚴百姓方能蒙福若務寬厚和平之名而以袒護姑息為事徒邀目前小譽殊失封疆大體爾等若不仰體朕意違負諭旨望朕屈法袒護不能也向後一切處須要剛果嚴明屬員中遇有世家子弟權要親族絲毫不可瞻徇尤宜先加教誡如不知畏怙惡不悛者立即參處數人則官方嚴肅而藐法妄行之事自必潛消默化矣勉之雍正二年閏四月初一日漕運總督臣張大有謹奏四月二十九日據臣標副將閃文繡報稱四月二十三日催過臺莊閘糧船一千餘隻又據臣標千總江豹報稱四月十九日將大河衛頭幫糧船催抵東平州安山閘等因到臣理合繕摺奏聞謹奏知道了聞河工挑淺一事仍然草率塞責韓莊閘一帶淤淺難行果如此否爾其據實核奏雍正二年閏四月初六日漕運總督臣張大有江南江西總督臣查弼納謹奏為奏聞事臣等同至揚州會審浙江革職糧道江國英一案恪遵皇上諭旨秉公細加嚴審巡撫李馥原借江國英銀二萬兩國英參後即已全還後國英又挾持李馥代伊賠完虧空銀六萬六千餘兩此案前後各情節李馥與江國英及説合之鄭一楓等當面質對咸供是實所有李馥代江國英賠完虧空銀六萬六千餘兩照例入官其江國英侵扣打造船銀並虧空庫銀及指稱淮費科派旗丁銀俱著落江國英名下照數追完將江國英擬斬不準援赦巡撫李馥並説合之鄭一楓等交部議處除另疏具題外謹將審過緣由繕摺奏聞謹奏知道了朕料其定然如此此事情弊鑿鑿乃顯而易見者雍正二年閏四月二十五日漕運總督臣張大有謹奏為請旨事竊漕運關係緊要臣沿途催趲凡有奏摺難以遲緩沿河非城市大路騾馬無從雇覔仰懇聖恩俯準臣進摺家人暫行騎用驛馬庶漕務不致遲誤感荷天恩無既矣為此謹奏若有緊要奏摺乘驛齎進可也至於尋常事件某幫過某閘等奏豈但不當乘驛竟可不必頻奏將到天津通州光景朕約略可知何必徒勞驛站耶同日又奏為奏聞事竊臣於閏四月初十日自淮起程赴北催趲糧船於十七日到山東臺莊閘十八九等日親往各閘探視水勢河水微淺幸賴皇上指示上年所蓄微山湖水深有三四尺現在引以濟運甚為有益又十八二十二等日得雨運河添水四五寸糧船不致阻滯再查二十四日以前共進臺莊閘船一千七百三十餘隻共出韓莊閘船一千一百五十餘隻至通漕尾幫已於本月二十一日盡行渡黃北上再採買湖南米船現在陸續進臺莊閘合併奏聞謹奏知道了今得初一二兩日之雨想河水自必又長從此諒無阻滯之虞矣雍正二年五月初三日漕運總督臣張大有謹奏為恭報甘霖大沛運河水長事竊臣見運河水淺船行遲滯於五月初一日齋戒沐浴祈禱雨澤仰賴皇上至德感孚即於本日酉時起一夜大雨滂沱至初二日雨猶不止現在運河內水勢大長已溢兩岸從此晝夜飛催糧船魚貫北上可無遲滯之虞臣不勝欣忭之至理合繕摺奏聞謹奏應時之雨當欣忭者大慰朕懷同日又奏為遵旨核奏事竊河工挑淺一事奉到硃批諭旨令臣據實核奏欽此欽遵臣自到臺莊時乘小舟往來八閘查得韓莊以上至彭口有淤淺數處現築草壩三座下板蓄水韓莊以下各閘俱有淺處得勝閘以上雞心洲築草壩一座張莊閘以上六里石築草壩一座俱下板蓄水糧船始行緣三閘地勢最髙水難停蓄河底又係砂礓雖時加挑挖不能深通自萬年閘以至臺莊五閘地勢稍平雖有淺處而蓄水既足船行無阻再八閘內所挑工程臣細加察訪上年挑挖二次深有一尺至二尺不等亦有挑至三尺者臣謹遵諭旨據實核奏伏祈皇上睿鑒謹奏挑淺工程大有詭弊詳細察明到京面奏雍正二年五月二十五日漕運總督臣張大有謹奏為敬聆聖訓恭謝天恩事五月十六日臣到宿遷縣地方署理浙江布政使佟吉圗恭傳諭旨張大有人甚好惟是約束不嚴欽此臣跪聆之下不勝惶悚感激竊念臣本庸愚荷蒙皇上奬與過分臣敢不益加勉勵仰佐聖明惟是漕務紛繁地方遼濶臣才識短淺實有約束不嚴之處以致辨丁水手玩法生事上厪聖懷乃不加臣罪譴頻頒諭旨訓誨臣夙夜靡寧慚悚無地自今以後益當凛遵聖訓盡臣之心竭臣之力約束屬員整飭辨丁以仰副聖主諄諄訓誨之至意為此繕摺恭謝天恩謹奏約束屬員兵丁常過於嚴方好小人妄為爾儘力十分戒飭僅可禁止三分耳況一味姑息竟不約束乎屬員中勢要之親族一毫瞻顧不得所作者是而令若輩為害於爾所作者非反令若輩為福於爾朕豈如此人主耶爾視朕果係如此人主任爾為之切須看透畏人不如畏法求人不如求已信得及朕許爾因不失其可宗若能仿效諾岷行為即係永保無虞正路小仁小惠何所用之勉之勉之同日又奏為恭報糧船進閘出閘數目事竊查自五月初一日大雨之後至今雨澤不斷河水充滿糧艘通行計五月二十五日以前共進臺莊閘船三千四百餘隻共出韓莊閘船二千三百餘隻理合繕摺奏聞謹奏覽奏深為慰悅料今歲可無阻凍之虞矣雍正二年六月十二日漕運總督臣張大有謹奏為請旨事先經原任兵部侍郎臣李紱奉旨於天津囤貯漕糧以江西南昌前幫旗丁朱戈朋等二十二船所載永新峽江二縣漕米紅白參差米色黯淡據運官劉世琰詳稱糧道蔣曰廣將旗丁捆打勒令領收過淮又經稟明總漕等語應令倉場估定成色變價其不足之數令於原任糧道蔣曰廣永新峽江二縣知縣并監兑官名下查參分賠等因部覆奉旨依議欽遵移咨到臣臣即檄行遵照查參賠補去後今據新任糧道費金吾詳稱訊問旗丁朱戈朋等供稱並無捆打勒令情事又稱江西漕糧三紅七白原由各州縣地土所産若果米色不佳辨丁身命所關糧道豈能勒令受兑至漕糧全完例以通關實收為據米色乾潔以運辨印結為憑如果二縣米色不堪該辨豈肯出具乾圓潔淨並無攙雜印結若過淮之後辨丁攙雜盜換或看護不謹以致黴變又責之南漕各官查參分賠似屬寃抑併據原任糧道及永新峽江二縣監兑等官移覆具詳前來所當詳請具題免其查參賠補等情並繳通關實收到臣臣查南昌前幫運辨劉世琰等領運船糧過淮之時經臣盤驗其米原係紅白相兼米色並未黴變亦未據該辨丁具稟捆打勒令情由是以無憑查參及抵津起囤米色黴變乃以水次米色不佳係糧道勒令受兑等語具詳臣思漕糧關係重大豈容官辨互相推諉相應請旨敕下江西撫臣將原任糧道蔣曰廣并監兑通判知縣等官以及辨丁質審明確若有抑勒情弊責令糧道等官分賠仍嚴加議處若係運辨旗丁揑詳妄供著落辨丁賠補一併治罪緣係部覆奉旨事件臣未敢草率具題謹繕摺請旨伏祈聖主批示遵行謹奏此事理應具疏請旨另行質審前旨及部議皆緣未悉情實故也豈有事未明晰而濫加處分之理雍正二年九月二十四日漕運總督臣張大有等謹奏為遵旨覆奏事竊臣陛見時面奏山東運河八閘內之得勝閘至張莊閘係十二里直河水難停蓄易致淺阻似宜於兩閘適中之處六里石地方添建一閘蓄水濟運隨奉俞旨命臣與河臣齊蘇勒撫臣陳世倌商議具奏欽此欽遵該臣等會看得得勝閘至張莊閘計程十二里河勢甚直兩岸陡峻且地勢高亢每遇水微之時不能收存水勢該管印河各員年年於適中六里石地方修草壩一道以蓄水勢今若於此處再添一閘則三閘相離甚近恐山水暴漲勢如建瓴旁無宣泄之處閘座難以撑持臣等細度情形似應於此草壩處所建築石壩一座較比上下閘頂減矬六尺水小則收蓄濟運不致有淺澀之虞水大則漫壩順流可免漲裂之患似於運道有裨臣等未敢擅便謹會同具奏伏祈皇上批示遵行謹奏此議甚妥該部照所奏施行同日又奏為恭報回空糧船過淮數目事竊臣欽奉上諭將各省回空船隻著交與催船官員於十月十五日前催過臨清關方好欽此臣即檄行沿河文武各官欽遵催趲現在空船接續南下查九月二十四日以前共過淮安回空糧船一千三百餘隻為此謹奏知道了爾不能約束旗丁之譏頻至朕耳亟宜改勉雍正二年十月二十六日漕運總督臣張大有謹奏為恭報回空漕船過淮數目事竊今嵗運河深通無阻漕艘遄行查十月二十六日以前過淮回空漕船二千四百餘隻又據臣標守備王嚴龍報稱尾幫回空漕船於十月十三日悉行催過臨清晝夜催趲南下恐厪聖懷謹繕摺奏聞謹奏據奏回空漕船遄行無阻甚好爾惟宜剛方是務庶免柔懦之譏聞查弼納操守遠不及前果否據實奏聞同日又奏為欽奉上諭事本年九月初三日準吏部咨開欽奉上諭各省道府同知通判州縣等官內有才幹素著廉潔自持者著總督保奏三員巡撫保奏二員布政使按察使各保奏一員將軍提督亦屬本省大員將所知者亦令保奏一員俱各密封進呈不得會同商酌等因欽此移咨到臣仰見我皇上闢門籲俊堯舜之用心也臣受恩深重茍有所知敢不據實保舉臣前於七月內陛見時已將平日所知之人開具密摺面行陳奏此外所知之人甚少今僅得兩人謹開具密摺恭呈御覽謹奏此等處萬萬不可受人請託自干欺誑之咎昨董象台到來朕觀其人甚屬不端擢用之後不能無悔爾何所見而保薦耶同日又奏為仰懇聖恩特留副將事竊臣查閲本年九月二十五日兵部選單臣標中軍副將興王政調升江西袁州副將此係武選定例臣何敢置喙但目今正值漕船回空督趲需人而操練營伍刻不可懈仰懇皇上洪恩可否將興王政以升銜留原任庶於漕務營伍均有裨益矣為此繕摺請旨謹奏再如此等奏當極加詳審毋得孟浪從事前者已諭部通飭數次矣雍正二年十一月十七日漕運總督臣張大有謹奏為奉到聖諭恭謝天恩事竊臣報回空糧船過淮數目一摺奉有硃批諭旨仰見我皇上憐臣誡臣誠成全教誨之恩也伏念臣身膺督漕重任才識短淺不能約束旗丁以致上煩聖心屢頒諭旨臣心甚為感愧自今以後惟有益加勉勵振肅紀綱使辨丁守法輸挽以仰報天恩於萬一耳所有奉到聖訓理合繕摺恭謝謹奏若再不加勉難矣自爾督漕以來大臣之譽言日至而奉公盡職處或多不然大約全副精神附和勢要而於官守竟不專務也求人莫若求已媚竈媚奧均無濟於事若能將情面所託之屬員盡行參處俾其餘皆互相朂勵實力急公辦事則旗丁自必凛遵約束矣不然爾即身生羽翼亦不能周悉無遺也剛方孤介四字要緊莫負聖祖任用之恩勉之雍正二年十二月初一日漕運總督臣張大有謹奏竊臣遵旨保舉一摺奉到御批伏念臣一介寒微荷蒙皇上隆恩天髙地厚豈敢於薦舉大事受人請託上欺堯舜之主董象台臣本不認識上年蒙聖恩將董象台補授臣標參將在任四月辦事明白及升臨清營副將臣見其催漕勤謹又聞其聲名甚好臣所以薦舉至其不端之處臣實不知伏懇聖慈恕臣冒昧之罪臣惟有益加謹凛仰報天恩耳為此謹奏總之但有絲毫釁隙斷不能逃朕鑒照惟有孤介自持秉公除私乃雍正年保身全名之上䇿也别無他術同日又奏為遵旨奏聞事竊臣欽遵諭旨謹查督臣查弼納之操守各屬官規禮聞得俱不收受兩淮鹽規聞俱收受鹽規舊例每年二萬兩查弼納有無減少臣未知其詳又布政司衙門平頭銀查弼納曽否分用臣實不知謹遵旨奏聞謹奏爾等總皆靠人度日之人非能屹然獨立國家柱石之材也朋比二字須遠避方好愼之同日又奏為敬聆聖訓恭謝天恩事竊臣請留副將興王政一摺奉到御批臣跪讀之下不勝惶悚臣前因標下乏員一時冒昧具摺實未詳查部文甚是孟浪荷蒙聖主批示教臣詳審聖恩高厚感激難名自今以後臣凛遵聖訓凡事務加詳審再不敢冒昧具陳為此繕摺奏謝天恩謹奏知道了詳審二字何待朕教而後知耶雍正三年正月初八日漕運總督臣張大有謹奏為恭承聖訓謹陳微悃仰祈睿鑒事竊臣奉到聖訓恭謝天恩一摺蒙皇上賜有御批臣跪讀之下惶悚無地伏念臣西陲下士荷蒙聖祖天恩授臣督漕重任恭逢皇上御極寵眷彌隆遭逢之盛實為人臣所希有仰惟我皇上至聖至明無微不燭近臣奉到御製朋黨論朝夕諷誦惟期以公滅私一德一心仰答堯舜之主用繼喜起之風顧肯附和勢要媚奧媚竈而為朋比之行乎今承聖訓嚴切臣當益加警省反已自求再屬員內有誤漕溺職者臣即據實參處不敢徇情少為姑容至於約束旗丁臣嚴飭各糧道實心奉行以肅漕政臣惟時時以聖訓之剛方孤介四字服膺勿失總期勉盡職守斷不敢有負聖祖之委任皇上之信用也為此謹陳微悃仰祈睿鑒謹奏有則改之無則加勉返躬自省豈有不自覺察之理同日又奏為敬聆聖訓恭謝天恩事雍正二年十二月初二日臣標新任右營遊擊烏麗珠到淮恭傳諭旨到臣仰見我皇上不以臣為不才屢頒聖訓勉以成人臣敬聆之下感激涕零伏念臣受恩深重未報涓埃時切悚惶夙夜靡寧乃蒙皇上恩旨以臣為寬厚清廉臣何人斯安敢當此至於約束旗丁不嚴之處屢奉聖訓臣現在嚴飭辨丁奉公守法不令仍似從前怠玩生事務期嚴以濟寬仰副聖主曲成微臣之至意為此繕摺恭謝天恩謹奏徒言何益須要實行雍正三年二月十二日漕運總督臣張大有謹奏為恭聆聖訓事雍正三年正月十九日監督淮關御史臣慶元到淮恭傳聖訓臣跪聆之下不勝悚惶伏念臣以迂拙株守三十餘年從不敢奔走權貴之門自敗行檢方期始終一心益勵職守勉為朝廷之股肱恥作當路之羽翼何敢頓改素履上違嚴訓以致時厪宸衷臣雖愚昧斷不至此前奉御批孤介秉公臣謹銘心刻骨終身不忘所有恭聆聖訓緣由理合奏聞謹奏一切處將就順從較之顯然奔競權貴之門尤為巧妙也果肯遵承朕訓實力奉行又何在此言語章奏間耶雍正三年四月十九日漕運總督臣張大有謹奏為奏聞事竊本年三月二十七日至四月初五等日據江南安慶幫運辨孔繼恭江西安福幫運辨蔣學龍贛州幫運辨潘倬各報稱三月十二日糧船行至江寧江浦和州地方大江中忽遇暴風幫內糧船有被漂沒者安慶幫五隻安福幫六隻贛州幫一隻各等情詳報到臣臣即批行江安江西各糧道併各地方官確查去後至今尚未查覆除又檄催查明漂沒實情併被淹人口數目取結詳覆到日會同督撫臣另疏具題外謹將糧船漂沒緣由先行奏聞謹奏事有應行請旨之處則當預為摺奏以聞此等照例具題案件何必多此一番煩瀆殊覺無味之極同日又奏為催趲糧船事竊今嵗糧船仰賴皇上福庇自春至夏甘霖疊沛河水暢流江南湖北浙江各幫糧船俱已全數盤驗過淮北上其江西糧船三四日內俱可過完惟湖南糧船前因水次船米不齊據湖南撫臣王朝恩業經會稿題參在案臣屢差標員前往迎催至今未到江口臣思山東八閘關係緊要俟將江西尾幫糧船盤驗完日臣即起程前往八閘催趲其湖南糧船催趕到淮之日臣飭令淮揚道傅澤洪副將興王政盤驗過淮又臣𣲖副將閃文繡在八閘催趲據報稱四月初十日以前共催過韓莊閘船一千餘隻又據千總穆向榮報稱淮安衛頭幫糧船於四月初一日催過濟寧州北上理合一併奏聞謹奏知道了今歲糧船為何如此參差屢多事故雍正三年五月初一日漕運總督臣張大有謹奏為欽奉上諭事奉上諭糧船水手擇用什軍一事接準部咨欽奉恩旨寬限臣凛遵奉行於過淮時查點審音每船什軍有二名者有三四名者俱飭令押運官辨嚴行約束學習撑駕不許沿途逗遛生事今臣一路察訪頗覺安靜理合奏聞謹奏朕亦聞頗安靜但約束務嚴勿懈姑息小惠於事全無益也雍正三年十一月初八日漕運總督臣張大有謹奏為恭報回空糧船過淮數目事竊今歲北河雨水過多糧船抵通稍遲荷蒙皇恩在天津一帶截留漕米二十萬石備賑將回空船發回接濟新運臣派標員節節分催計十一月初七日以前共過淮安船三千八百餘隻又據報稱尾幫空船於十一月初三日全行催過濟寧南下理合一併奏聞謹奏知道了今歲催漕各員辨人等效力可嘉同日又奏為奏聞事竊睢寧縣朱家海黃河決口臣於回淮之時曽經親往看視至今堵築尚未竣工據兑運徐屬漕糧長淮衛三幫徐州幫兩幫回空丁船報稱行至駱馬湖口距朱家海沙淤六十里不能前進臣即移咨河臣查問另行河道據河臣齊蘇勒覆稱徐屬空船可由駱馬湖口逹黃出祥符閘入白洋河抵至漫口前往徐州受兑等因到臣臣隨差標員同河官由駱馬湖一路探水至祥符閘口門有淺阻處所現在挑挖糧船未可遽行又據河員稟稱朱家海決口之旁挑有引河十一月內開河放水幫船即可行走等語臣查徐屬糧船或由祥符閘行走或俟開放引河行走臣與齊蘇勒同心料理務期無誤新運總之朱家海決口仰賴皇上福庇今歲堵築完工則來歲糧船自無淺阻之虞矣所有徐屬幫船暫停駱馬湖口緣由謹繕摺奏聞謹奏覽奏已悉此等處全賴上蒼垂佑但當盡人事以聼之何敢逆料其必然耶雍正四年正月十九日漕運總督臣張大有謹奏為奏聞事竊查淮安一帶運河因朱家海決口堵築未竣宿遷桃源中河水勢間有淺澀其清江浦以上運河亦有淺處臣於正月十二日親往清口查看黃淮交滙之處既無黃水敵清湖水大溜奔注黃河以致入運之水微弱河臣齊蘇勒現飭河官挑濬料理又於本月十五日開放濟運閘引湖中支河濟運再大雪之後水勢增長淮安大河等幫重運糧船業經開行其揚州一帶運河亦有一二淺處因有高寶湖水接濟船可通行至於徐州幫船現在催令由朱家海引河開行赴次如有稽阻臣即飭糧道設法兑運不致有誤合併奏聞伏祈皇上睿鑒謹奏須殫心竭力辦理無誤所奏知道了雍正四年三月二十日漕運總督臣張大有謹奏竊查淮揚運道自二月十五日以後甘霖時沛入三月以來河水長發糧艘通行無阻計三月十九日以前共過淮安船三千餘隻其徐州重運糧船已由朱家海引河催至駱馬湖口北上矣為此繕摺謹奏雨多水長於糧船雖屬有益但朱家海決口恐因水大不能如期合龍朕深為憂慮雍正四年五月十九日漕運總督臣張大有謹奏為恭報糧船過閘日期仰祈睿鑒事竊臣於四月二十六日自清口往駱馬湖一帶逐節督催於五月初一日抵臺莊閘看得湖河之水俱皆充足自初五至十一等日連得大雨各省糧艘以次遄行無阻計五月十八日以前共出韓莊閘船四千九百餘隻其尾幫糧船俱已催進臺莊閘月內即可盡出韓莊閘除差標員前往東昌府一帶嚴行催趲及早抵通外臣即趲尾北上為此繕摺奏聞謹奏知道了近日直隸雨水過多朕甚憂念未知山左一帶光景若何同日又奏為奏聞事竊臣恭報淮揚運道一摺奉到皇上御批仰見我皇上軫念運道民生至意臣於五月初一日督運至皂齊蘇勒咨欽奉諭旨著齊蘇勒酌量俟夏秋二汛過後再行修築我皇上至聖至明洞鑒萬里目今惟有多積料物俟霜降後堵築合龍仰賴聖主至誠感格自可一舉成功矣謹奏總賴神靈佑助亦不敢預期其必也雍正四年六月初十日漕運總督臣張大有謹奏為恭報糧船全過臨清日期事竊臣於五月二十九日自濟寧督押糧船北上仰賴皇上洪福河水處處深通毫無阻滯今於六月初十日將尾幫船盡行催過臨清閘較之往年早有月餘臣隨𣲖標員押尾催抵天津臣即輕舟減從於初十日自臨清起身一路趲催先行赴京恭請聖安所有糧船全過臨清日期理合奏聞謹奏今歲因雨水過多糧艘雖無阻滯而堤岸時有衝決之虞朕為民生憂懷莫釋何反稱頌朕之洪福雍正四年九月初一日漕運總督臣張大有謹奏為恭報回空糧船數目事竊今嵗運河水勢深通所有回空幫船臣早已分派標員節節催趲兹於八月十六日起至三十日止淮安大河等幫回空船共五百餘隻已經陸續到淮又據遊擊烏麗珠報稱八月十四日共催過德州桑園回空船二千六百餘隻理合奏聞謹奏知道了今歲漕運之事有何可議論處同日又奏為奏聞事竊臣查淮安地方今歲秋禾十分茂盛其早禾正在收穫乃自八月初四五至十八等日時雨時晴十九至二十八等日晝夜大雨不止遂致低窪地方報有積水臣隨經飭令淮安知府劉之頊等親往查看秋禾有無被淹如果成災即令通報督撫臣會疏具題所有淮安多雨情形理合奏聞謹奏一省內有張楷慶元輩此等大員貽纍地方理應有此災異雍正四年十二月十一日漕運總督臣張大有謹奏為奏聞事竊臣據蘇松常鎮四府各州縣紛紛詳請咸稱入冬以來隂雨過多積水未消收割之稻既不能礱米在田之榖復有生芽欲買米完漕勢必耽延時日實難依限完納請寬兑開之限等因臣職司督催不敢輕言寬緩除批飭蘇松糧道上緊嚴催設法徴收兑運又經屢次差催續據糧道楊本植稟稱時已季冬各州縣尚無報完徴比情形實屬艱難等語臣念天庾關係重大現在竭力催徴但恐不能依限開兑謹據實奏聞仰懇皇上特降恩旨稍寬冬兑冬開之限俾州縣得以設法催辦小民得以採買完納億萬生靈感戴皇仁無既矣臣現在嚴催不敢具本是否可行恭請聖裁謹奏爾督催不力致誤漕兑乃云不敢具本是何言歟此豈摺奏可了之事耶雍正四年十二月二十七日漕運總督臣張大有謹奏為盛世河清事雍正四年十二月二十五日據淮徐道康𢎞勳詳稱自河南虞城縣至徐州淮北一帶黃河於十二月十六十七等日起河水澄清等因到臣此誠我皇上聖德感召亘古希有之祥瑞也臣除現在具疏題賀外謹繕摺奏聞臣不勝踴躍歡忭之至謹奏已降旨於諸王大臣矣頒發後爾自知悉雍正五年四月二十一日漕運總督臣張大有謹奏竊查今歲蘇松浙江漕糧內有米色黴變臣於過淮時逐幫查驗篩揚計算虧折米數著落賠補業經陸續題參在案但臣才識短淺雖在淮竭力辨理究恐未能妥協今幫船指日抵通伏祈皇上敕下倉場督臣查驗起交如有虧折勒令照數賠補庶辨丁知警而天庾常充矣為此謹奏倉場督臣不煩敕下自必查驗查出虧折自必照數追賠治罪不但兵辨知警總漕亦知警矣同日又奏為奉到諭旨日期事竊臣於雍正五年四月十四日接內閣行文為密行知會事內開奉旨桃源縣監犯張二金棍等劫獄一案著內閣密行寄信與張大有陳時夏務令設法擒獲等因到臣欽此欽遵臣查桃源縣監禁盜犯張二金棍等於上年十二月初二日夜劫獄脫逃據該縣查訊同案監禁之張黑丁等供出逃犯張二金棍等住居東明縣未獲盜犯耿大長住居曹縣等情詳報到臣臣隨移咨直隸山東督撫臣於各犯原籍地方逐一根究緝拏去後續於四月初八日準署直隸督臣宜兆熊等咨據東明縣詳稱張二金棍等逃往河南裕州吳六家其窩藏地方吳六知道等情臣正在飭緝間恭奉諭旨臣即飛移河南撫臣田文鏡轉飭裕州勒緝各犯毋使漏網又差役前往河南密行查訪協同該地方官設法擒緝務期拏獲以仰副我皇上弭盜安民之至意理合奏聞謹奏緝獲之後再云仰副朕不明諭者恐其聞風逺揚耳如此密交案件若不能應命爾等試看雍正五年八月初七日漕運總督臣張大有謹奏竊臣標兵丁於七月初五日散餉之時有鬨鬧交甲一事臣已將副興王政等題參在案目今各兵安伍地方寧靜但兵丁不守營規輒敢聚衆肆行若不將倡首之人嚴行正法不足以懲戒刁風除爭先鬨鬧兵丁業經河臣齊蘇勒查拏監禁外其餘臣現在密飭城守營參將烏麗珠逐一確查的實候旨嚴審其中軍副將印務臣已委烏麗珠暫行署理相應一併奏聞謹奏此皆汝平時寬恩厚德感化之所致也殊屬可愧可惡之極雍正六年二月初三日漕運總督臣張大有謹奏為恭報雨澤事竊淮揚一帶地方於正月十七十奏仰慰聖懷謹奏不啻諄諄訓諭而不聼從亦可謂下愚不移矣同日又奏為奏聞事雍正五年十二月二十七日準刑部咨奉旨凡有羅教庵院地方行文該督撫將當日建造之由並現今庵內或止做會或另有用處及庵內居住者係何等之人逐一查明報部爾等將審訊羅明忠口供行知漕運總督張大有令張大有行知浙江巡撫李衛其羅明忠等暫交提督衙門羈禁行文張大有若有應行質審之處再行發往欽此臣隨遵諭旨行知浙江撫臣李衛並飛飭司道嚴審在案今據司道等詳稱查訊杭州庵內居住之人與羅明忠俱不認識並無應行質審之處其趙玉割耳一案現在會審等情俟詳報到日如有應與羅明忠質審之處臣即請發來南理合先行奏聞謹奏焉有不相認識之理明係將其教首開脫耳此等事件非汝罷軟無能輩可以審理明白者交與李衛伊自能究明根底同日又奏竊桃源縣盜犯張二金棍等劫獄脫逃一案欽奉諭旨令臣設法擒獲臣聞各犯逃往河南裕州捕役吳六家隨即差人前往緝捕據差役回稟知裕州捕役吳六內鄉縣捕役王玉鄧州捕役張忠孝之弟張之茂將張二金棍等各犯輾轉指引窩縱潛逃隨又節次移咨河南督臣田文鏡轉飭查拏詎各州縣延挨半載竟無獲報直至十二月內止將吳六王玉張之茂三犯押解來淮臣隨發淮揚淮徐二道訊供俱自認知情縱盜不諱情願在伊等身上拏來結案等語臣現在將吳六等解回南陽府分檄州縣添差壯捕協同勒緝又選千總吳俊帶領捕役前往南陽府一帶密行搜捕務期必獲臣查吳六等俱係河南捕役稔知各犯潛窩處所若果實力擒拏斷無不獲之理乃各州縣視為隔省之事漫不上緊追拏以致日久無獲今臣又分差辨役各路追捕倘州縣仍前徇庇捕役玩不擒拏臣即以縱捕窩盜糾參仰懇聖慈密諭督臣田文鏡嚴飭州縣追比捕役勒限獲解庶要犯不致漏網重案得以早結矣為此謹奏懇朕密諭田文鏡此語甚屬差謬爾意田文鏡亦如張大有居心行事之人耶可謂以小人之心度君子矣伊何煩朕諭至云隔屬呼應不靈更為謬論爾之本屬尚視爾為木偶他省無怪其然也但當自恨自怨而已復將誰尤朕即允爾所求命他人代為辦理究非長䇿爾便糾參亦不過如參山東縣令之舉祇自取辱耳均不得當何也不及之人所行莫非不及之事朕可力保其必然雍正六年三月十五日漕運總督臣張大有謹奏為奏聞事竊桃源縣盜犯張二金棍等劫獄脫逃一案臣又於本年正月內差臣標千總吳俊帶領捕役前往裕州一帶緝拏今據吳俊稟稱三月初一日於博望驛地方遇見張大金棍張二金棍在路行走隨即拏獲張二金棍不意張大金棍凶惡手持繩鞭打傷捕役三名吳俊即跑到博望驛墩鋪傳馬步兵五名又到馬號備馬二匹飛趕至二十里外柳溝山下汛兵放箭張大金棍受傷始得拏住解交南陽縣收禁等情除一面差役迎提俟押解到淮臣轉飭地方官嚴審究擬外所有拏獲張大金棍張二金棍日期理合奏聞謹奏知道了不如是緝捕何能擒獲此兵役人等當格外賞賜以鼓舞將來雍正六年五月初四日漕運總督臣張大有謹奏竊桃源縣劫獄一案臣差千總吳俊將首犯張大金棍張二金棍在南陽縣地方拏獲業經奏聞續於四月初八日臣又差役在直隸長垣縣地方拏獲同來劫獄之李二石良璧二犯押解到淮臣已有續獲劫犯緣由理合再行奏聞謹奏到京之日將吳俊帶來引見雍正六年九月十三日漕運總督臣張大有謹奏為恭謝天恩事竊臣於本年七月內督運進京恭覲天顔仰蒙我皇上訓誨諄切開其愚蒙警其懈怠跪聆之下感悚交集臣雖至愚何敢自暴自棄上負聖主洪恩自今以後惟有恪遵聖訓實力奉行勉圖報效於萬一為此繕摺奏謝天恩謹奏下愚不移四字當書諸紳終身誦之以自省雍正七年二月初九日漕運總督臣張大有謹奏為仰懇聖恩援例保題衛備鼓勵人材事竊臣查守備一官雖有營衛之分其實皆係武職臣見各省衛守備中不乏人材壯偉弓馬嫺熟之員祇因衛守備有催收屯糧接徴舊欠修造漕船之責參罰案件較之營員獨多是以衛備一缺竟有數年不得升轉者使可用之材格於成例無由振拔似覺可惜仰懇聖恩可否將衛守備亦照營員之例如有才守兼優弓馬可觀者令各省督撫公同選擇與營守備一體保題送部引見其有降級罰俸等案於本內聲明恭候皇上欽定則隨材器使之中益廣干城之選矣是否有當伏祈皇上睿鑒施行謹奏似此但可以市恩沽譽處從無疏漏何勞心周到一至於此保養精神為要朕殊為賢大臣憂之同日又奏為欽奉上諭叩謝天恩事雍正七年正月十九日浙江按察使方覲到淮恭傳諭旨臣俯伏敬聆又於二月初七日準戶部暨都察院咨開欽奉上諭到臣欽此欽遵臣聞命之下不勝惶悚伏念臣賦質庸愚才識短淺又近年來心血虛耗精神有所不周耳目有所未及以致官役需索不能覺察臣罪實無可逭荷蒙聖恩高厚不即罷斥更復仰煩聖心著派御史二員專司稽察之任我皇上憫臣愚蒙曲賜矜全有加無已臣雖至愚敢不竭力振刷勉圖後效仰報洪恩於萬一除現在欽遵諭旨通行曉諭各幫并嚴飭胥役人等務期洗心滌慮糧船過淮毋許再索陋規使費臣仍細加察訪如有違犯立行參處所有奉到諭旨微臣感激愚忱理合繕摺奏謝天恩謹奏朕實為汝愧之代汝畏之竟不知汝具何等面皮何等心胸也亦可謂不世出之庸人矣雍正七年七月初一日工部右侍郎仍辦理催漕事務臣張大有謹奏為請旨事竊臣荷蒙聖恩調補工部右侍郎仍辦理今年催漕事務臣謹遵旨隨帶總漕關防沿途辦理漕務原俟糧船全過臨清漕臣性桂有赴任日期即將關防委員齎送淮安臣仍催漕北上兹於六月二十七日準漕臣性桂咨稱署理浙江總督印務未經交卸等因到臣臣查今年糧船指日即可抵通總漕關防自當交與漕臣性桂收受應否於途次委員齎送浙省抑臣進京之日恭候諭旨臣未敢擅便為此繕摺具奏伏祈皇上批示遵行謹奏有旨諭部矣爾不必進京仍回任料理漕務雍正七年八月十八日工部右侍郎仍管理總漕印務臣張大有謹奏為恭謝天恩事竊臣胞姪候選知縣張玠吏部帶領引見奉旨交與田文鏡於山東地方酌量委署試用欽此臣謹遵上諭不敢具本謝恩恭設香案望闕叩頭訖伏念臣以衰病微軀仰沐聖恩有加無已未報涓埃時切惶悚今臣姪玠草茅新進得覲天顔荷蒙皇上高厚之恩畀以牧民之任臣惟有誡臣姪玠勤慎奉公實心辦事少效犬馬之報於萬一耳所有臣感激微忱理合繕摺奏謝謹奏觀汝一𣲖私心器小之至朕掄才授職豈有因汝姪而分外加恩之理不過念係大臣子姪經朕揀選自必奮勉從事冀其將來急公效力耳汝若不能訓導做一好官試看朕徇汝情靣否也同日又奏為奏聞事竊臣查今歲入秋以來黃河水長洪澤湖水不能敵黃以致黃水侵入運河八月初三日至初七等日河口東西束水兩壩之間漸被泥沙淤墊糧船難行臣於初八日親往看視情形署河臣尹繼善聞謹奏覽雍正七年九月初一日工部右侍郎仍管理總漕印務臣張大有謹奏為奏聞事竊臣查河口地方於八月初旬沙淤旋即開通業經奏聞兹於八月二十三日起黃水漸落湖水暢流數日之間已將沙淤處所刷深清水直抵黃河黃水不得復入運河此皆我皇上至誠感召之所致也八月二十六日臣同署河臣尹繼善親往河口祀謝河神軍民人等無不歡欣稱慶恐厪聖懷合謹奏聞謹奏清水因何不能敵黃運道至於淤塞今又因何刷深運道仍復通暢全未聲明但以河神效靈糊塗具奏實不解汝具何心思意見也將先後緣由明白奏來雍正七年十月二十四日工部右侍郎仍管理總漕印務臣張大有謹奏為請旨事雍正七年九月初一日準戶部咨議覆江西巡撫張坦麟等奏請酌給南昌等衛所守備千總等員養贍轉運武辨十四員每員賞給銀二百四十兩停運武辨十四員每員賞給銀一百兩於藩庫存公銀內支給等因奉旨依議欽此移咨到臣又準倉場督臣嶽爾岱等咨據各省領運千總程澍等呈懇賞給養廉以廣皇仁等情應否題請給與養廉之處咨臣酌議準此臣查運辨領運漕糧長途跋涉額支俸工銀九十兩實屬不敷今江西省運辨荷蒙聖恩準給養贍復據各省運辨具情呈懇可否俯照江西之例一體賞給養贍銀兩出自皇上格外隆恩如蒙俞允仰懇皇上敕下各省督撫臣照抵通道里之逺近酌議養贍之多寡應於本省何項公用銀內動支題明給發則微末辨員咸沐皇仁於無既矣再各省隨幫武舉南北往返雖有廪工銀五十四兩亦不敷用可否亦分别程途遠近量給養贍理合一併請旨伏祈皇上睿鑒施行謹奏汝既自稱老病昏憒事體糊塗此等人之議論何所見而遽請施行耶雍正七年十二月初八日工部右侍郎仍管理總漕印務臣張大有謹奏竊臣子張鴻運荷蒙聖恩欽賜舉人明春一體會試即應進京叩謝天恩因臣目下患病服事湯藥俟臣病稍痊即令起程進京叩謝天恩理合奏聞謹奏性桂另有差委處已有旨仍命汝署理漕督事務矣鴻運且不必令其來京俟春闈將近方令北來可也雍正八年二月十七日刑部右侍郎暫署總漕印務臣張大有謹奏為恭報糧船過淮數目事竊臣查雍正八年起運七年分漕糧各省軍民仰荷我皇上隆恩疊沛共切感戴踴躍輸挽且自入春以來膏雨霑足河水暢流重運糧船遄行無阻自上年十二月二十一日起至今年二月十六日共過淮船一千六百餘隻較之上年更為迅速米色亦俱乾潔臣親身盤驗開行北上至臣病已全愈惟氣血稍弱現在加意調理恐厪聖懷合併奏聞謹奏據奏爾病已愈恐朕厪懷等語似朕與汝彼此泛泛痛癢不關之君臣朕亦無甚厪懷處若能自勉自進於股肱耳目之義能令朕關心不置固所願也朕旨一字一句從不為欺誑虛語一派天真可對皎日硃批諭旨卷五十二
