body:
  text: 欽定四庫全書硃批諭㫖卷一百六十七硃批劉章奏摺雍正六年十一月初六日江西南贛總兵官臣劉章謹奏為敬陳管見仰祈睿裁事竊臣一介庸陋荷䝉我皇上兩畀封疆重寄惟思殫心整飭仰報聖恩抵贛以來查詢各營軍器如鎗炮藤牌等項經前任鎮臣石雲倬王郡等以奏准公費陸續修整頗堪敷用惟弓箭一項行據各營將備呈覆查得各兵除撒袋所插之外别無存貯戰箭間有數營回報各兵存箭十數枝者未免舊敝參差難資實用設有不時調遣倉猝何能立辦查臣屬各營現䝉天恩准存公費正宜以公濟公陸續造補以臣愚見凡馬步弓箭兵丁除撒袋所插戰箭十枝之外馬兵應另存戰箭三十枝步兵應另存戰箭二十枝以備調遣之用一切物料工價皆出公費動支即令該管將備督工製造務期堅利俟造竣之後經臣驗明發回各營將備按馬步兵丁分給飭令加謹存貯毋使損壞庶調遣有資不至臨期貽誤或亦整頓營伍之一端也事關造備軍器臣不敢擅便是否可行伏候皇上睿鑒批示謹奏事關造備軍器報部存案可也雍正七年六月初二日江西南贛總兵官臣劉章謹奏為奏聞事竊臣所轄之南安府地方四面皆山兩城對峙僅有溪河一道通泄諸山之水凡遇山水驟發不能暢流易於為患兹於五月十二日據南安營參將呈稱南安府於五月初三日戌時起大雨如注至初四日黎明雨止山水陡發平地水深四五尺波濤奔湧逮至本日午時水勢方平以致大庾縣老城水城被水衝塌六處府學城垣亦被衝毁內外兵民房屋多被衝倒田禾亦有淹沒現在撈獲溺死民間男婦三十餘人沿河有六處水汛塘房墩臺俱遭水浸塘兵之什物家伙以及巡哨小船五隻亦有被水衝去者窩坑塘兵黃吉竝兵丁李順仁之母被水淹死等情到臣當經咨明署督臣范時繹署撫臣張坦麟臣隨一面專差千總前往南安確查被水情形一面捐發銀兩飭該參將許仕盛將淹死塘兵男婦二口親屬及被水衝房屋家伙什物各兵酌量分給實心撫恤去後今據臣差千總查明回稱南安府實因五月初四日山水驟發老城水城二處民人房屋被水衝毁一百餘家俱經有司酌量賑給錢米兵丁房屋被水衝倒一十九家經參將許仕盛遵將所發銀兩酌給撫恤現今兵民安堵撈獲男婦人口皆巳捐給棺木所傷田畝尚可補蒔晚禾等情前來但被水民人房屋田畝清數事屬有司應聽確細查勘詳明督撫奏報所有山水驟發情形臣理合據實奏聞伏乞皇上睿鑒施行謹奏南安山水陡發情形巳據張坦麟奏過被衝兵民亟當加意撫恤雍正七年閏七月二十六日江西南贛總兵官臣劉章謹奏為聖恩撫恤有加兵民感戴無己謹摺奏明恭繳硃批事竊臣前奏南安府地方山水陡發情形一摺奉到皇上硃批臣跪讀聖諭益仰見我皇上仁育為懷有加無已之聖心也伏念南安府屬之大庾南康二縣偶罹水患兵民房屋人口間被淹衝一經署撫臣張坦麟具奏即䝉我皇上大沛恩膏命布政使臣李蘭動支帑銀四千兩親往查勘逐户賞給兵民均沾實惠安居樂業感戴皇仁浩蕩遍地歡呼隨據懇謝天恩業經咨明署撫臣彚疏題報兹於臣奏摺內乃復上厪宸衷奉有硃批加意撫恤之㫖臣謹仰體天心廣宣聖德俾兵民益感皇恩併飭南安營參將許仕盛一體欽遵外謹將硃批奏摺理合恭繳謹奏覽奏知道了汝等地方文武大臣凡事皆當據實入告朕便酌量施行若隱而不奏朕何由而知從何辦理耶試思此四千金之經費與萬姓之身命孰輕孰重且汝等武臣尤以直率不欺為貴切勿崇尚巧僞虛浮之習而循瞻前顧後卜東度西之行為也志之同日又奏為奏聞事竊臣因南贛各營馬步弓箭兵丁除撒袋插箭之外竝無存貯戰箭隨以敬陳管見仰祈睿裁事繕摺具奏奉有硃批臣遵即造成戰箭式樣通飭所轄一十六營將備照各營馬步弓箭兵丁名數動用公費糧銀如式造齊送臣驗明分給各兵存貯去後兹據各營將備陸續造齊戰箭送臣驗看如式按數分發各營兵丁加謹收貯併將數目彚册咨呈署督臣范時繹轉咨內部存案暨咨明署撫臣張坦麟外所有造竣戰箭分發兵丁承領存貯彚冊報部各緣由理合具摺奏聞謹奏朕觀汝等武臣操守每多不潔而統馭所轄率皆優柔此優柔之故無他因持身不正被屬員士卒有所挾制而然也極當痛除陋習保守一生名節以成全朕用人顔面為大將者整頓營伍務使紀律嚴明訓練兵辨咸令精藝守法不亦美乎勉之勉之雍正八年二月十二日江西南贛總兵官臣劉章謹奏為奏聞事竊臣接南昌鎮臣陳王章密字內開奉署督臣范時繹密諭奉㫖密拏羅教一案其入教民人自有文員查拏第恐亦有營兵在內應於所轄細訪確查如有倡首生事者嚴拏移究若係無知誤入者責令改易前非倘無入教兵丁亦即密覆等語到臣臣隨密諭所屬將備確訪細查營兵內有無羅教倡首生事無知入教之人分别拏究飭改去後今據各營將備細查密覆竝無誤入羅教兵丁除密覆督臣范時繹鎮臣陳王章外伏查臣屬各營兵丁雖竝無誤入羅教之人而密訪得南贛吉三府各縣內實有民人習尚羅教每縣多者數十餘人少者十餘人有即在於住屋供經念誦稱為經堂亦有在於鄉僻小庵供經念誦者間有婦女亦從此教大率持齊念經羣相附和尚無聚衆生事倡首鼓惑情形今督撫臣等密諭各府縣現在查獲概行收其經卷責令改邪歸正取具本人暨鄰甲甘結嚴行禁止不許再習羅教愚民感悟俱各仰戴皇仁從此邪教永除人心咸正是皆我皇上化導愚頑崇正黜邪之至意也臣仰體聖心據實摺奏伏乞皇上睿鑒施行謹奏前諭甚明原可不必苛刻紛擾者同日又奏為欽承聖訓事雍正七年十月初九日欽奉皇上硃批臣報明製造各營備存戰箭工竣一摺臣跪讀聖訓感激涕零伏念身膺重任節制官兵當整肅官方首重操守共相砥礪潔已率屬若持身不正統下優柔被屬員士卒挾制實屬大負皇恩有玷官針莫此為甚臣一介庸愚䝉皇上簡畀封疆自分駑駘萬難報稱敢不潔已率屬加意整飭兹復凛承聖訓惟有益加警惕廉潔持身嚴肅官方整頓營伍訓練兵辨精藝守法以仰副聖主朂勵微臣之至意理合繕摺奏聞謹奏覽奏巳悉務期言行相符可也雍正十年五月十五日江西南贛總兵官臣劉章謹奏為奏明微臣查閲過營伍情形仰祈睿鑒事竊臣因所屬南贛吉三府地方廣濶各外營相隔殷遙必須親歷巡查方為有益前經恭疏具題荷䝉聖恩准臣前往部文到日臣於三月十一日起程先從南安府一帶次及贛州吉安兩府分防各營汛遍行查閲於四月二十九日事竣回署遵例題報在案臣於所到各營矢公矢慎詳加考驗兵丁技藝尚皆熟練不致生疏至於盔甲軍裝帳房鑼鍋等項均係整齊適用惟各營步兵披戴盔甲內盔有綿盔鐵盔二項甲有新舊式樣不齊上年六月內經督臣髙其倬驗准將未合式者畫一改造綿盔悉換鐵盔現在動支公糧銀兩陸續製換尚未竣工至各兵配執器械鋒刃犀利均堪適用弓箭兵丁除撒袋外各有備存戰箭鳥鎗兵丁除操演外各有備存火藥鉛彈其餘一應軍裝什物俱屬齊全各營馬匹臕肥竝無缺少間有臕分不足者將本丁責處勒限令其加料餧養沿途塘汛墩臺瞭樓亦屬整飭所有微臣查閲過各處營伍情形理合繕摺奏明伏乞皇上睿鑒謹奏覽奏所屬各營汛情形朕殊不能深信雍正十年九月初七日江西南贛總兵官臣劉章謹奏為奏聞事竊照臣屬南贛二府例食粵鹽埠商將引鹽運回聽各鄉村子店分析零賣間有食力之民亦多在埠承買肩挑至各鄉零賣者贛屬長寧會昌兩縣與潮州所屬平逺縣接壤平邑餉重引多現在發帑行銷而贛屬之寧都會昌亦行帑鹽竝無商埠向有潮州及附近汀贛各屬民人挑負米豆穀菽赴平逺易鹽過嶺在各鄉分賣平逺司帑鹽者給發小票以别於私鹽經分巡贛南道王世繩以小票難分正僞詳請江西巡撫臣謝旻咨明粵省請將此項小票之鹽改給印照以杜假冒粵省未經准行本年四月內署理江南江西總督尹繼善通行上下兩江實力緝私不許越境透漏贛屬有司遵照通飭之文將此等鹽斤俱行禁止粵省平逺縣以江省禁絶此鹽則平邑帑鹽無處銷售具詳署廣東總督臣鄂彌達批行鹽運使查議以贛屬原食粵引以帑鹽行銷額食粵引地方竝無衝賺淮鹽贛屬七縣埠止銷引一萬七千餘道而平邑獨派引二萬九千餘道歷來皆照融銷之例今應照例運銷額課方能無誤詳請咨明江南江西督臣又通飭南贛道及府縣各官迅將隘口巡鹽人役撤回無庸阻禁在案初因各縣禁絶零鹽之後南贛各埠商俱於離逺縣城鄉村各處添開子店疏銷官引又因平日在埠販鹽零賣者拖缺不清槩行停發隨有南安府南康縣潭口地方諸貴子店於本年閏五月十五日被多人打毁店面乘機搶劫銀錢衣物臣一聞報飛飭南安營參將許仕盛上緊嚴拏去後不意七月十五日又有大庾縣新城地方鍾文子店突有十數人搶劫鹽包衣物七月二十八八月初二兩日贛縣鄉村胡子綸錢仲賢店俱被打搶接連報案臣細行查訪俱係各處販賣粵鹽及平日在埠販鹽零賣之人贛縣之案臣嚴督營員會同縣捕拏獲數人有司現在審究臣俱飛報督撫二臣一面協同文員設立賞格分頭緝拏務期全獲移究外事關地方理合奏明為此具摺奏聞謹奏搶劫之風何可滋長督令嚴緝務獲毋得少涉寬縱同日又奏為恭繳硃批事竊臣於本年五月十五日拜進一摺為奏明微臣查閲過營伍情形仰祈睿鑒事同日又一摺為奏聞事又於閏五月二十六日拜進一摺為奏聞事俱䝉皇上硃批於本年六月二十三八月初二等日到臣臣恭設香案望闕叩頭密讀欽遵外伏念臣庸愚無識仰荷聖恩畀以封疆重任凡於營伍防汛留心整飭不敢一刻懈弛臣前親詣各營查閲事竣之日具摺奏明荷䝉皇上硃批訓示臣跪讀之下不勝感激奮勉竊臣屬大小一十六營技藝甲械數年以來日事訓練整頓及臣親往閲驗既於當場分别勸懲回署後又復諄諄嚴飭務期辨兵技藝熟嫺營伍愈加整飭其一􅋀應修應改甲械臣巳經咨呈署江南江西督臣尹繼善現在陸續興修勒限學習臣實不敢於君父之前有一字虛假自蹈不實之咎今凛遵聖訓仰體天心益殫精勤愈加奮勉以期無負我皇上天髙地厚之恩於萬一所有原奉硃批三摺理合一并恭繳為此具摺奏聞謹奏近觀武臣輩每多言行互異處所奏何能深信且汝居官聲名僅在中平之列其勉之毋怠雍正十一年八月十七日署太原總兵印務額外總兵官臣劉章謹奏為請㫖製易營鎗以壯軍容事竊臣䝉聖主天恩簡署晉鎮視事以來除嚴督操練兵馬之外凛遵訓㫖凡營伍一􅋀事宜莫不與署提臣覺羅石麟虛衷商酌而行仰叨皇上洪福兵民輯安地方寧謐員辨均稱供職營伍亦屬可觀惟查臣屬各營鳥鎗兵丁共三千三百八十九名執把之鎗向皆各兵自備相傳是以大小輕重不一經臣逐細挨查內鎗身重止五斤上下者一千五百餘桿甚覺輕薄短小納藥入子均不能多力量何能逺大且演放至一二十年之久膛口火門亦不無損缺之病臣由行伍出身歷今四十餘年凡在各營頭之鳥鎗率多八斤上下者方為合式是以臣製就樣鎗一桿身重八斤長三尺六寸納藥二錢四五分入子四錢可致逺一百五六十步之準頭甚覺有力臣意欲將各營之鳥鎗自六斤以上者且留演用其輕小之一千五百餘桿即行製易已與署提臣商酌明確并驗明樣鎗但事關製易軍械未敢擅便為此恭摺奏請訓㫖如䝉恩允其所費之項并請於臣到任後見存公費銀內動用倘有不敷即於朋馬餘銀添補製造應否可行伏乞聖主睿鑒訓示遵行臣謹具摺奏聞謹奏與石麟商酌行之雍正十一年十月二十二日署太原總兵印務額外總兵官臣劉章謹奏為欽奉上諭事雍正十一年十月十七日接准提臣准兵部咨內開雍正十一年八月十二日內閣奉上諭各省營伍必須武職大員平時親身查察庶可以除怠惰廢弛之弊提督一官節制全省統轄之地甚逺難以親身遍歷至於總兵分轄地方道里不甚遼濶巡察尚易周遍嗣後各鎮臣有應行巡察之處著先期具摺奏聞請㫖候朕批示遵行不必拘定期限免各營預備供應致滋擾纍儻有絲毫苛纍所屬辨兵者經朕察出定行從重議處欽此欽遵等因到臣臣查太原一鎮管轄六府七州六十八縣營汛較之他鎮地方實為遼逺又且迤南一帶盡屬崇山接太行而鄰豫省犬牙相錯尤為宵小易藏之地益宜臣等每年親身周遍巡察不惟各營員辨兵丁可除怠惰廢弛之弊亦且可以彈壓地方甚有裨益當兹農隙之時臣尤急宜前赴各營身親操閲彈壓以供職守今遵㫖繕摺奏請伏乞聖主天恩准臣於十一月內由西南兩路之平垣蒲州潞澤等營先行巡歷查操一次約得一月之期又於來年開印之後由東北兩路之盂壽太原汾州靖安等營巡歷查操一次亦得一月之期俟查操周遍之日容臣將各緣由另行具奏如䝉恩允凡臣出門一􅋀需用之費絲毫皆係自備萬不敢稍致擾纍以負聖主教養之深恩也為此繕摺具奏仰懇聖主批示遵行謹奏應於何時何地次第巡察之處與署提臣石麟酌商而行硃批諭㫖卷一百六十七
