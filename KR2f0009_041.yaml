body:
  text: 欽定四庫全書硃批諭㫖卷四十一硃批髙成齡奏摺雍正二年六月初八日山西布政使臣髙成齡謹奏為敬陳末議事臣近閲邸抄見內閣交出請禁提解火耗之條奏臣竊不能無議伏思直省錢糧正供之外向有耗羡雖多寡不同皆係州縣入巳但百姓既以奉公即屬朝廷之財賦䝉皇上體恤羣臣通院司道府而酌盈劑虛以補其常俸之不足俾大小臣工溥遍均沾其法至善今如條奏所云竟以耗羡為州縣應得之物上司不宜提解殊不知耗羡與節禮原屬相因上司不提解耗羡屬官必呈送節禮夫下屬既送節禮以取悅上司則有所恃而生其挾制必至肆行無忌上司即有所聞亦礙於情面狥隱不言損名節敗官常朘民膏虧國帑實由於此若禁止餽遺一概不許收受其不肖上司必將尋隙勒詐别生事端恣其無饜之求即有淡薄自甘者思欲屏絶餽遺而上司衙門别無飬廉枵腹辦事勢實難行故臣愚以為州縣耗羡銀兩自當提解司庫聼慿大吏酌量分給均得飬廉洵天理人情之至也況耗羡提解於上則通省遇有不得已之公費即可支應而不分派州縣上司既不分派則州縣無由借端科索里甲是提解耗羡亦可禁絶私派豈非因時制宜之要務乎再閲條議謂提解火耗定限每兩若干不得寓撫字於催科等語如山西一省現將州縣火耗逐一詳查酌減較之昔日已減大半若不限以一定之數不肖州縣反得任意多徴今既固封糧匱又較定分數州縣不能入已誰肯多徴是提解耗羡即禁止濫加亦撫字之一法也又謂公取分撥非大臣鼓勵屬員之道殊不知上司即清慎禔躬亦必有請幕賔飬家口之費與其暗收餽遺常懷貪黷之懼何如明分飬亷共拜聖主之賜且既不受餽遺則亦無所瞻狥亷者薦之貪者劾之未必非砥礪亷隅之道也至以羡餘賠補虧空如前任巡撫有彼此通融之處則無辜者為人賠墊虧空者事外優游實非情理之平今撫臣諾岷將每年存貯耗羡銀二十萬兩留補無著虧空之處先經奏明一遇虧空之員即照例參革離任先於任所原籍搜查衣物産業令其自行賠補如果家産盡絶逾限不完將本犯正法之後方以留貯耗銀補其虧項仍將補過某人虧空銀兩數目造册題報既無絲毫假借又無分釐染指何至有假揑虧空希圗幫銀如從前之弊竇乎惟是有治人無治法倘或上司不肖借名提解自便其私如條議所慮亦未可定臣請皇上敕下直省督撫俱如山西撫臣諾岷所奏將通省一年所得耗銀約計數目先行奏明歲底將給發飬廉支應公費留補虧空若干之處一一具摺陳奏則電照之下誰敢侵吞總之耗羡非州縣之巳資應聼分撥於大吏提解乃安全之善䇿實非為厲於屬員如果臣言可採伏乞皇上睿鑒施行謹奏總理事務王大臣㑹同九卿詹事科道平心靜氣虛公執正確議具奏若有懷挾私意以及任性尚氣淆亂是非者則於此一事必有一二獲罪之人也須各出已見明白指陳利弊毋稍游移倘不能畫一定議兩議三議皆可劉燦仍著入班與議雍正二年九月十四日山西布政使臣髙成齡謹奏恭請皇上萬安朕安閲爾條奏耗羡一事甚屬可嘉又條奏教官一事前此雖經有人言過不如爾奏之詳悉透徹俱經交發廷臣㑹議矣同日又奏為請將丁銀歸入地糧以便徴收以均苦樂事竊惟國家正供首重地丁錢糧地糧則計畝徴收丁銀則按户完納但地畝之生息有常而户口之貧富不有苦樂不均之歎在官則有徴收不力之參官民交纍法宜變通伏思我皇上留心民瘼每事咨詢臣職司錢糧既知丁徭苦纍敢不殫心籌畫查山西通省民屯田地共額徴銀二百三十二萬六千四百六十五兩零民屯丁徭共額徴銀六十五萬一千六百八十五兩零請照直𨽻新定之例通盤合算將通省地糧之內約計應納地糧一兩者隨辦丁銀二錢八分一毫零如此則有糧者始有丁有丁者即有糧一轉移之間民纍可以豁免國課不致逋缺矣至編審原為定例五年仍一舉行清造版籍推收錢糧以備稽查其舊存之丁與滋生之丁俱永不加賦如此則丁隨産辦苦樂既均徴輸亦易杜弊省煩實為妥便如果臣言可採伏乞敕部議覆施行謹奏此論甚好現今山東地方朕亦諭令踵行爾與撫臣啇妥具本奏來疏內將直隸行有成效之處引入可也雍正二年十二月初九日山西布政使臣髙成齡謹奏為恭謝天恩事臣於本年十二月初六日奉巡撫行准部咨內開山西巡撫諾岷奏為微臣患病叩乞恩賜協辦一疏奉㫖山西巡撫事務著髙成齡協辦該部知道等因行文到臣臣聞命自天感懼交集隨欽遵於初七日為始朝夕赴巡撫衙門協同辦理惟竭盡駑駘之力稍報聖主知遇之恩於萬一伏查巡撫諾岷係染痰火之證左手左足不能動履惟幸秉質健壯可望痊愈俟調飬何如臣再繕摺奏聞謹奏知道了晉省聞已得雪為何未經奏報雍正三年二月初八日山西布政使臣髙成齡謹奏為奏明雍正元年耗羡銀兩事伏查晉省州縣徴收錢糧火耗每正項一兩竟加耗三四錢雍正元年五月十二日撫臣諾岷到任後仰體皇上軫念民瘼至意酌議裁減止以加二為率通省耗銀約計五十萬兩經撫臣奏明除應給各官飬亷並通省公費等項需銀三十萬兩外扣存銀二十萬兩彌補無著虧空統俟收齊耗銀之日將收除實在數目造册奏聞等因遵照在案今查雍正元年分按各州縣收耗實數共銀四十九萬五千六十八兩零內除參革各官虧空未解耗銀五萬三千五百一十九兩零現在行追民缺未完耗銀一萬四百五十兩零外實收耗銀四十三萬一千九十八兩零內扣存司庫彌補虧空銀二十萬兩給發過各官飬廉共銀一十一萬五百一十三兩零給發各州縣雜項繁費并傾銷腳費以及御塘馬匹加增草料共銀二萬一千二百四十二兩零又通省公費共銀七萬一千一百兩零尚餘剩銀二萬七千五百四十一兩零臣謹造册進呈御覽至扣存銀二十萬兩應補何員何項虧空之處俟參革各官審明定案追變無著之後奏請抵補再各官飬廉因本年耗銀有參革各員虧空不敷經前署司田文鏡與撫臣議定俱以撫臣諾岷五月十二日到任清查之後算給合併聲明謹奏此事爾與新撫臣伊都立商酌行之同日又奏為奏明事竊照晉省火耗經撫臣諾岷奏請提解以為通省公費各官飬廉及彌補虧空之用實屬正大公平但恐日久弊生或不肖上司借以自便任意侵吞亦未可定是以臣請每於歲底將用過數目一一具摺報銷在案查雍正元年正項錢糧因各官虧空牽扯葛藤必須徹底清查先經撫臣奏明寬限今巳逐一查明於雍正三年二月初六日奏報訖其元年火耗銀兩臣亦查明另行造册摺奏外嗣後各年正項錢糧俱按例限奏銷其該年火耗亦即於奏銷正項之日將用過及存貯並未完數目一一具摺奏報無庸遲滯滋弊庶公務既完侵吞自無矣相應再為奏明謹奏覽奏已悉倘遇不肖上司豈此一摺奏報遂能止其侵吞耶凡事總在實行不在虛言勉之雍正三年四月二十八日山西布政使臣髙成齡謹奏為敬陳末議事竊臣一介庸愚䝉皇上知遇殊恩夙夜兢兢凡有關於錢糧一事靡不悉心籌畫臣見山東撫臣陳世倌條陳有州縣錢糧先解巡撫衙門抽鞘驗兑等語竊不能無議焉巡撫乃封疆大臣總理通省刑名錢榖事極繁重而州縣之起解錢糧者每日必有數起或多至數十起若逐處抽鞘驗兑恐亦不勝其煩且巡撫衙門乃關防重地啓閉各有其時州縣解到錢糧勢不能隨到隨即彈驗多一番守候即多一番盤費況巡撫衙門非若藩司有內庫外庫今將盈千纍萬之銀委置於封鎖衙門之外倘有疏虞誰任其咎種種大有未便在條奏之意原恐不肖州縣赴司兑銀有短少至數十兩數百兩者有止將空批掛發全無銀兩交兑者亦有布政司扣抵别項竟不將批繳院遞發者思欲預防其弊殊不知掛批繳批發批巡撫衙門自有號簿稽查設布政司與州縣各官上下扶同通融掩飾恐非一彈驗之法即可杜絶其弊也此巡撫驗鞘之說臣再四思維毫無裨益徒滋煩擾故不揣冒昧奏請聖裁如或臣言可採伏乞皇上特頒諭㫖免解巡撫衙門彈驗實於錢糧有益謹奏此事朕如何特頒諭㫖令其免解前於陳世倌條奏時朕亦未降特㫖命各省通行所以數省有言不便者並未強其遵奉也既云種種不便爾等於彼時為何不分析敷陳而含糊照行今欲復行改易亦須檢舉錯誤具疏題明方可議改朕豈可代爾等任屢屢更張之咎耶雍正三年十月初四日山西布政使臣髙成齡謹奏為奏明事竊臣備查晉省各官虧空尚有無著銀九十餘萬兩內除參革大同府知府欒廷芳贓私銀三十三萬兩零原非正項錢糧應嚴追賠還無庸代為彌補外實止無著虧空銀六十餘萬兩查通省耗羡自雍正元年至三年每年扣存銀二十萬兩三年內共應扣存耗銀六十萬兩足以抵補其作何彌補之法及遵奉上諭虧空清理火耗亦可漸減之處應聼撫臣酌議奏請聖裁緣臣兩年不獲瞻覲天顔依戀之私與日俱深為此繕摺恭請皇上萬安伏乞睿鑒謹奏無事往返徒然僕僕於道路耳況爾已於前歲見朕係朕所知之人何必又為入覲之請耶雍正四年四月十六日山西布政使臣髙成齡謹奏為奏聞事竊照山西督臣伊都立進京䝉皇上特恩令臣署理印務地方諸事理應據實奏聞今有大同鎮總兵官王以謙患病先經督臣伊都立風聞即諭令大同府知府許惟訥確訪今據該府禀報鎮臣王以謙係正月二十八日中風近覺少愈尚須兩人扶掖而行猶未能出堂視事等語臣思總兵官係地方大員關係緊要今經患病相應具摺奏聞謹奏奏聞甚是病後扶掖猶能步履何妨但不知心中明白神氣清椘否詢明再奏以聞雍正四年五月二十日山西布政使臣髙成齡謹奏為奏聞事竊照山西地方入夏以來屢獲甘霖到處普遍據各屬申報二麥秀發豐收可必因天氣較往歲稍涼收割略遲是以各屬尚未報有收成分數臣已分檄行查俟到日即當具失所臣查山西地方所患惟在旱荒今雨水充足通省成熟雖有幾處雹傷可以無煩聖慮但事關地方被災臣不敢壅於上聞為此繕摺謹奏地方上之成熟及災傷情形只管據實奏聞朕自能通盤折準知其分數之多寡雍正四年十一月十四日山西布政使臣髙成齡謹奏為請運制錢以便軍民事竊惟錢文原為民間日用必需我皇上軫念民依於制錢一事時頒上諭嚴查私燬禁止私錢復收買廢銅以資鼓鑄臣職司錢榖留心稽查晉省換錢一貫內雍正通寶錢僅二三十文查山西省距京師不過千有餘里而錢之行於山西者甚少總因腳價繁重啇賈難於販運此所以未能流通也制錢不流通則錢價必貴今山西嚴禁私錢之後每銀一兩僅易錢九百文上下不等錢價日昂則升米尺布其價暗增實不便於窮民臣不揣冒昧敬酌一流通制錢之法為我皇上陳之查山西每年約需兵餉銀八十萬兩有竒請自雍正五年為始將山西兵餉以銀八錢二搭放每年計需錢一十六萬貫於春秋二季撫臣給咨差員預先赴部請領到晉分寄布政司及散餉各道府庫內每錢一貫作銀一兩應領兵餉一兩者止給銀八錢搭錢二百文扣存錢價銀一十六萬兩歲底報明户部聼候撥用不數年間將見制錢充裕則錢價自平兵民均有利益再查搬運制錢係充兵餉應請照解送餉銀之例頒給勘合由驛遞陸續運發山西既不糜費腳價且免道路疏虞臣愚昧之見未知當否伏乞皇上睿鑒施行謹奏魯論云未見顔色而言誠乃此奏之謂歟閲爾前奏禁錢之議巳知伊都立暨汝二人之才識庸常並未籌及事之始終可行與否今據此觀之果不謬也若依爾等所論施行更不知作何光景爾等才具中平之人只宜安分自守勿為效顰之舉凡事小心不可妄動須知才之一字非比操守可以強而能之也同日又奏為恭謝天恩事竊臣一介庸愚䝉皇上不以臣為不才兩次恭膺特㫖令臣協辦巡撫事務繼又令臣署理總督仰賴皇上指示幸免隕越受恩愈重報稱愈難今又因山西督臣伊都立調補江西巡撫將巡撫關防等項齎送到臣臣隨遵例祗受訖臣惟有矢公矢慎益加勉勵以供臣職所有微臣感激之私理合繕摺恭謝天恩謹奏爾之才情識見雖屬平常安分守已慎重錢糧頗為稱職今署理巡撫印務不過暫時惟宜循規蹈矩毋逾繩墨不得妄恃己見有所損益恐致錯誤也慎之雍正四年十二月二十日山西布政使臣髙成齡謹奏為據實奏聞事竊查山西通省州縣所貯各案倉糧現今實貯在倉者業有八十五萬石零各屬社倉又勸捐一十四萬石零合計一百萬石有竒固已有備無患矣近又䝉皇上允前任學臣劉於義條陳每年動銀六萬兩買榖建倉分貯各屬前任督臣伊都立又摺奏在於蒲州添買榖二萬石平定州廣昌縣各添買榖一萬石臣隨將應買榖石俱經詳明督臣在於雍正四年公費銀內估照時價陸續分給各州縣俟秋成後買貯但今年入夏以來得雨甚遲秋成歉薄榖價略昂並鄰近北直之平定州蔚州廣昌縣一帶地方又因商民搬運榖價亦昻兹當歲暮天寒查據此數處所報榖價每倉斗一石價銀七八九錢不等業已騰貴若冉一時併糴則榖價日昻恐違皇上軫念民食之至意臣隨飭令將巳買榖石加謹收貯其未足之數停其採買統俟明秋再行買貯至太汾潞大四府澤遼沁欣代保六州均獲豐收榖價亦平自應照舊購買以廣蓄儲理合繕摺奏聞謹奏如此通融辦理是極甚屬可嘉雍正五年六月初六日山西布政使臣髙成齡謹奏為恭謝天恩事竊臣一介寒微至愚極陋䝉皇上知遇之恩補授山西布政使職司錢糧總滙夙夜兢兢嘗恐才不勝任乃皇上不以臣為不才屢次恭膺特㫖署理督撫事務受恩愈深報稱愈難兹緣撫臣德明入都臣復循例護理撫惟有益加勉勵以仰報天恩於萬一耳為此繕摺恭謝謹奏近日以來觀汝頗有昏憒光景亟當加慎雍正五年七月初六日山西布政使臣髙成齡謹奏為恭謝聖訓事竊臣於六月初六日繕摺恭謝天恩奉到硃批諭㫖臣跪讀之下不勝惶恐伏思臣䝉皇上殊恩俾司錢糧總滙復循例護理巡撫印務雖夙夜敬謹不辭殫竭心力奈才具平庸識見短淺以致一時疏忽事有錯誤乃䝉皇上覆幬洪恩不立加嚴譴仍恩諭諄諄豫以自新之路臣清夜捫心感激涕零惟仰遵聖訓振作精神以圖報髙厚之恩於萬一耳所有微臣惶恐感愧之忱理合恭摺奏謝伏乞皇上睿鑒謹奏不可以鄉原自居不可釣虛聲而賈實禍不可博衆譽而負君恩勉之慎之潔已奉公毋偏毋黨更將言行相符四字時刻警惕勿懈如裴􅏍度張楷楊名時鄭任鑰李紱等皆可為榜樣若癡迷不悟覆轍相尋噬臍何及朕知遇之恩當惜爾父母生育之身當惜千秋史册之名尤當惜能以大者逺者權量審度而行之則萬無一失矣雍正五年七月初十日山西布政使臣髙成齡謹奏為敬陳末議事竊臣䝉皇上知遇之恩俾司錢糧總滙凡有承追各案無不竭力督催悉心籌畫冀圗早清帑項歷今數年總計各案虧空除已完銀兩外尚有未完銀五十八萬一千兩有竒此未完內有無可著追者約計一十一萬六千餘兩已據承追各官出具任所並無隱匿印結存案臣又詳請撫臣移咨各旗省再為確查家産果否盡絶俟原籍本旗該管各官保結到日將實在無可著追之項同新撫臣另議請㫖外其有可著追者約計四十六萬四千七百餘兩內有題准徴補之民缺任所搜查之衣飾以及别州縣分賠墊解撥補銀兩凡在本省催追者臣已不遺餘力設法追變陸續完補惟是外省分賠借缺人員及原籍本旗家産等項俱經移咨各旗省追變而原籍外省因無承追定限又無不力處分任意遷延殊與國帑無補況此等借缺人員不及時催追保無逃亡事故田地房産不及時變賣必致傾圯荒蕪日久月長勢將有著之項亦歸於無著矣仰請皇上敕部將原籍外省承追各官與任所各官一例定限倘逾限不完即令本省督撫查參議處其本旗查追者亦照此勒限嚴追務將分賠借缺銀兩依限完解原估家産速行變賣如此則承追各官畏懼考成自必上緊追變而虧項得以速結矣如果臣言可採容臣另行恭疏具題并造細冊送部查核伏乞皇上睿鑒批示施行謹奏悉能似此以任勞任怨居心可免將來之禍始終受朕恩眷應具疏題奏但恐已遲未必有益耳雍正五年八月十六日監察御史臣性桂護理山西巡撫印務布政使臣髙成齡按察使臣蔣泂謹奏為奏明事竊臣性桂於本年七月十三日欽奉上諭命往山西看審澤州匪類妖言聚衆一案隨於七月二十一日馳抵太原謹將諭㫖傳知護理巡撫印務布政使臣髙成齡按察使臣蔣泂敬謹領受遵行查此案未奉上諭之先臣髙成齡臣蔣泂已將現獲之焦明山翟斌如張奎王正等屢經嚴行審訊據各犯供欲抄搶富户王家衛家陳家或供欲謀搶州縣或稱不知根由威脅裹去等情在案嗣臣性桂抵晉臣髙成齡臣蔣泂公同將先獲之焦明山翟斌如等及續獲之郭海龍張進斗等逐日隔别研訊又互相質對所有各犯口供謹先約略敬録奏聞又據翟斌如供稱張冉公教中有立天後㑹經一部係元亨利貞四本內俱是泄漏天機的話等語臣等隨嚴檄搜查據澤州知州劉育嵒在李自倉等家內起獲元亨利貞四字號經四本臣等閲經內語句皆狂謬不解謹將經文四本齎呈御覽仍請發回晉省以便追究經從何人置造根由審訊確情正在繕摺間又據澤州報稱頭目楊世龍及伊子楊鐡山田瓜即陳志榮及伊子陳雲周已經拏獲等情八月十三日又據澤州知州劉育嵒詳稱八月初十日續獲要犯陳桂并將訊問該犯口供呈報前來臣等據供隨飛咨河南督臣嚴飭查拏供內有名案犯俟解到一併細加嚴訊合併聲明謹合詞恭摺奏聞仰祈睿鑒指示施行謹奏覽所奏情由已悉人犯隨獲隨審閲此四本妖妄邪書有壬辰字樣的非目下所編輯者光景尚不止此務將此經作自誰手究出根由但亦不可濫加刑訊將要犯盡致斃命則案反難結矣其餘未獲人犯當速行密設賞格嚴督擒捕務獲萬不可株連良善拖纍無辜慎之密之雍正五年九月十六日山西布政使臣髙成齡謹奏為恭報盛世豐年十分收成事竊查山西地方連年時和歲稔今年雨水更屬調勻兹當百榖咸登之候行據各屬所報分數俱足十分而大同朔平二府在邉逺荒僻之區亦有十分收成臣出郭省視惟見含哺鼓腹歡頌堯天舜日詢之老農咸謂數十年來未有如今歲之夏秋皆熟髙下齊收者也所有豐收分數理合恭摺奏聞伏乞皇上睿鑒謹奏朕以手加額覽之仰賴上天賜此豐年亟當勸諭百姓積蓄為要至於倉儲尤當竭力及時補足務令充實勉為之同日又奏為敬陳末議仰祈睿鑒事竊查前任撫臣諾岷因太原平陽二府向以數十州縣統隸於一郡實有鞭長莫及之勢於雍正二年間題請以太原府屬之平欣代保四州平陽府屬之蒲解絳吉隰五州改為直隸州分其勢以專其責區畫未嘗不善臣歷晉五年於通省地方之險易繁簡留心訪察有尚須籌畫之處敬為皇上陳之查蒲州西通秦蜀南鄰豫省實為三晉咽喉之地且中條雷首等山層巒疊嶂姦宄易藏而本州賦稅及猗氏臨晉萬泉榮河四屬錢糧又倍於他郡至澤州界接中州路通南北且逼近太行山綿亘千有餘里深邃莫測民情狡悍尤稱難治之區而本州賦稅及髙平陽城沁水陵川四屬錢糧亦稱繁重僅設知州一員原不足以資彈壓且直隸知州職在親民既有刑名錢穀之任分司率屬又有督理盤查之責再加以稽查匪類巡察山鄉則該員即有兼人之才亦斷無分身之術豈能於地方必無貽誤以臣管見莫若升州為府另設知府一員同知一員經歷一員而改蒲澤為附郭之首邑以一郡統轄五屬則有知府以專其督察有同知以資其佐理有經歷以備其差遣使蒲澤二令專理一邑之事教化巡緝撫字催科悉心辦理似於國計民生大有裨益至城池學宫俱仍其舊惟衙署之作何添設俸工之作何支銷容俟請㫖准行之日再與新任撫臣石麟詳議具奏是否可行伏乞皇上睿鑒謹奏所奏與撫臣石麟商酌具題觀劉育嵒料理數事甚屬妥協頗為實心奉公若克勝府任於定議後即將伊題升知府可也硃批諭㫖卷四十一
