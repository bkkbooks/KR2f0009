body:
  text: 欽定四庫全書硃批諭旨卷七十六硃批石雲倬奏摺雍正三年七月二十九日江西南贛總兵官臣石雲倬謹奏為密陳天聽事竊臣蒙皇上隆恩忝任封疆重寄惟有矢忠矢愼剔弊釐姦以仰報髙厚於萬一臣受任之始細查營中積弊有前鎮臣黃起憲共食空糧二百三十五分空糧之外又勒索各營四節規禮每節或六十兩或四十兩不等以致營伍廢弛積成大弊更有甚者現任九江協副將王用身為大員婪贓無厭於六月二十四日署理贛鎮印務起至七月十二日止勒索上任規禮并侵蝕各營餉米銀四百六十五兩又拔補把總馬成功逼取部費銀二百兩又拔補把總謝晉因伊赤貧勒索紬縀等物種種貪汚有乖行止經臣訪查確實當即報明督臣查弼納合先將情由上陳天聽伏乞皇上睿鑒謹奏概能不徇情面如此直陳方為不負朕之任用黃起憲亦應參處無可顧惜也同日又奏為請旨更定辨丁年貌確册以杜姦弊事竊照兵丁編造名册原以稽查姦偽若年貌不符名姓互異雖有册籍將焉用之臣到贛之日細查營中千把兵丁並無一人真正年籍所由然者兵丁移張就李易於更替而軍官將錯就錯便於增減也臣係武人歷處營伍熟見偽册朦朧互相頂替前在鎮番慶陽二任時業已剔清此弊因所轄之兵寥寥無幾易於更正今贛鎮一十六營非鎮慶兩營之比若仍其舊册勢必姦弊叢生若必徹底清查則逐營更定誠恐有需時日理合先摺具奏倘蒙皇上採納即將臣摺發部妥議俟命下之日容臣次第查明逐營更定則歷年積弊永清於軍政不無裨益矣謹奏此事何須部議爾徐徐更定清理妥確具奏以聞可也雍正三年十月初四日江西南贛總兵官臣石雲倬謹奏為密陳營伍事竊惟糧餉不清實為營伍大弊臣於抵任之日反覆清查務使糧無隱食餉不虛懸以仰報皇上推誠置腹之恩所有親丁名糧臣照例止食六十分併飭各營將備千把遵照定例毋許浮冒一名亦不許家人長隨在營食糧致滋混擾今查出臣屬一十六營兵五千四百二十一名內存有公費糧五百零二分當即嚴飭將備責令盡行募補以實營伍嗣據各營將備向臣痛切直陳僉稱煌煌功令敢不凛遵奈營務費用浩繁如季報册籍有費提塘工食有費霜降祭祀有費甲幟軍裝製造有費且軍營炮位火藥鉛彈巡哨船隻種種無費不行懇於每兵一百名之內仍留守糧五分以充前項公用總計各營約存守糧二百七十分則辦公有資而兵丁月餉亦可足給等情據此臣再四思維若遽準於百名之內存留守糧五分以充營伍公用恐仍干虛冒之罪臣愚昧無知不敢擅便因其為營伍起見謹具密摺據實陳明伏祈皇上睿鑒指示遵行謹奏存留名糧以資費用在在皆然乃以公濟公衆目昭彰之舉非隱食空糧可比何妨乎所奏知道了雍正四年二月十二日江西南贛總兵官臣石雲倬謹奏為添設炮位以鎮地方事竊惟捍衛地方先資武備器械不可不齊而炮位尤為切要今查臣標四營子母炮位向僅二十二座大小參差不一俱年逺朽腐萬難演放詢知江寧子母炮打造如法臣因申明督臣查弼納領取式樣現募工匠按法打造三十位先發本城四營操練演放其物料價值皆於前摺奏明公費項內取給俟本城四營造就之日再查外十二營炮位如有朽舊令其依樣製造此外一切軍裝旗幟如遇缺少臣不時添補並不時查驗務使武備一新侵漁永杜以仰副皇上以公濟公之至訓所有新造炮位數目緣由俟鑄造齊集再為具題并造册呈報兵部核查存照理合預行陳奏伏乞皇上睿鑒謹奏軍裝等項隨時陸續製辦甚是不宜急驟若速欲整齊則攤派捐扣種種弊端皆起於此且為將之道首以操演兵丁整飭塘汛緝盜安民甄别屬辨為要至於外像觀瞻之美究屬末著何必諄諄留意頻陳奏牘也雍正四年六月二十二日江西南贛總兵官臣石雲倬謹奏為哀籲聖慈乞終喪制事竊臣蒙皇上簡任贛南重鎮一門榮幸均戴天恩誓願竭誠報效乃不意本年六月十九日接臣胞兄石雲慶胞弟石雲興訃報知臣父石琠於五月初六日在籍病故臣驚聞訃報五內崩裂時復昏迷因念贛南重地關係緊要斷非哀毁餘生所能辦理臣隨具文通報署督臣范時繹撫臣裴􅏍度懇其代題并委員署理外臣衙門王命旗牌一切暫委臣標管中營事左營遊擊林麒看守公文案件亦令代拆代行專俟署任官到日交代明白臣即匍匐還籍理合哀籲聖慈賜臣回籍守制得以料理喪葬則此後餘年誓效犬馬之報臣不勝哀鳴激切之至謹奏忠孝原屬一理所以經云資於事父以事君爾能竭力報國顯親揚名爾父自然含笑九原此亦凡為人子者分內必有之事不可過於哀毁爾今日之苦即朕六十一年十一月十三日之苦也然朕之苦更有甚於汝者其間難以言悉亦只得權其輕重勉強以理奪情耳可奈何朕未聞爾有大故已用爾為浙江提督矣本應曲從所請但克盡孝道不關去職在職浙江提督責任重大俟該督等題本到日朕賞爾假數月回籍送終禮畢即赴新任勉就職守可也雍正四年十一月十二日新授浙江提督臣石雲倬謹奏為恭請陛見仰承聖訓事竊臣以微末武員叨荷皇上特恩由副將升授南贛總兵到任一載惟奉訓旨遵行幸免隕越今又蒙恩命授臣浙江提督伏念浙省係海疆重地更宜奉明訓以遵從方克啓愚蒙而盡職臣現沐聖慈賞假在籍假滿之日擬合上覲天顔跪聆聖訓臣不勝望闕依戀之至為此具摺請旨伏候皇上批示遵行謹奏好德州距京為路甚近來京陛見聆朕訓旨然後往赴浙任諸凡有所遵循不無少益雍正五年三月初六日浙江提督臣石雲倬謹奏為密陳營伍情形事竊臣查浙省營伍當積廢之後軍裝甲械損壞不齊教場公署僅存白地揆其致此之由其端有二一則籍公費而潤私囊病在於侵蝕一則務虛名而忘實效病在於矯情臣歷查前任提臣如王世臣吳郡隱食空糧數百名一切營制置於度外此則侵蝕之尤者也及吳升接任糧餉稍清尚存公費糧一百五十名造有鳥鎗千桿營伍稍為整頓至鍾世臣任內營制毫無增補公費又為侵蝕後王安國署事時經督臣滿保檄令將公費名糧盡行裁革雖矯情於一時實貽誤於營伍及楊長春到任因公用毫無所出於五營內存糧五十分凡遇領餉季報稍資涓滴之助經張溥署事盡行裁去此又一矯情而貽誤於營伍者也臣抵任以來雖盡心整頓百計彌縫奈無米之炊萬難經理以臣愚見請將浙省各營無論大小按兵計算統於百名內存留公費三名以備營中公用伏候皇上明旨頒示額規俾營員永行遵守庶營務不至廢弛矣為此具摺奏聞伏乞皇上睿鑒施行謹奏所奏甚是營伍中不留幾分公費名糧如何行得去其間充公濟私要看所用何如耳至王安國張溥原皆係拘謹之人未免太過酌量為之同日又奏為再陳營伍條規事竊查公費名糧原無定例臣前摺奏請之項不過借營間之公餉濟營務之急需總期有益於兵丁無損於營伍但經費既定條例宜嚴臣不揣愚昧謹抒管見為我皇上陳之一册報之宜審也臣查百弊之根起於册籍之朦混不肖官吏往往揑飾增添用少報多串通侵蝕者有之臣請嗣後無論大小衙門令其造具簡明四柱清册開明某營額兵若干名分析馬步戰守項欵內該存留公費幾名某月領銀若干兩辦理某事用銀若干製造某器用銀若干有無存剩即注明册內下月照前開列該營員按季呈報將領轉報上司至年終查驗之後方準開銷其有揑飾增添等弊照例處分册籍既清庶朦混之弊可除矣一經費之宜節也臣思百名之額兵權通三名之公用稍不撙節立見空乏每見不肖屬員有將此項夤緣上司者亦有上司借此嚇詐屬員者臣請嚴定法程倘有前項情弊應照冒餉之例計贓定罪追銀入官至於修葺衙署及鋪墊供應名色止許量行添湊不準於公費項內任意開銷庶經費有程而冒濫之弊可除矣一製造之宜核也大凡軍裝旗幟等項務須揀選物料造作如法方為有用並堪經久但恐不肖員役希圖了事草率完工亦未可定臣請嗣後凡有製造軍器責令將備驗明物料方許興工成工之日果否合式亦令將備具結存案如有仍前草率致令所造之器不堪應用者應照造作軍器不如法之例處分仍令督工之員改造其物料工價著令將領分賠庶營員知警而草率之弊可除矣一收貯之宜謹也臣思一切軍器務須存貯有方乃能經久不壞每見營員漫不加察一任風雨飄零塵泥堆積旗幟鎗炮日就朽爛臣請嗣彼凡有一切軍器無論舊造新添須不時查點開列清單擇髙燥房屋藏貯如遇交代之時驗明收受倘有損壞缺失情由前官未經聲明者許後任官揭報責令前官賠補若後官徇情不報事後查出即責令後任賠償庶收貯以時而疏忽之弊可除矣以上四條就營伍之情事立整頓之條規謹獻芻蕘仰希採擇伏祈睿鑒施行臣不勝悚惶激切之至謹奏所論甚屬通暢朕欣悅覽之實力整頓務令弊絶風清同日又奏為奏聞事竊臣抵任後於三月初二日率同臣標將備勘閲城垣一切城墻垜口坍塌幾及三分之一城門六座并水門二座所有城樓片瓦無存臣驗閲之下不勝駭異伏思寧波一府係邊海重地較之他處尤為緊要若非及今修築則工程愈大糜費愈多當即開明坍塌處所丈尺數目飛咨督臣髙其倬撫臣李衛作何設法興修之處俟議定之日臣另行具奏外所有寧波府城垣坍塌情由理合繕摺奏聞謹奏所奏是朕常為此籌慮亦曾頻諭督撫輩但總計天下城垣坍塌者多修理需費浩繁只得且就緊要處先行耳今寧波城垣爾咨商督撫甚是應作何設法興修伊等酌議妥確自必另行請旨也同日又奏為請旨事竊臣前陛見時蒙皇上垂問有熟諳水師辦事勤謹及操守好者啓奏臣即奏南贛鎮標左營遊擊林麒中營守備孫希爵臣曾委監造炮位見此二人歷練老成辦事勤謹且林麒熟悉水師諳練營務年紀微老精神尚健等語當蒙皇上即調林麒引見所有林麒遊擊員缺將孫希爵補授林麒引見後賞發臣標遇有參將缺出題補今臣標中軍參將陳惠調任員缺現在需人可否即以林麒補授之處伏候聖裁批示遵行謹奏所奏知道了水師將官歷練壯勇者儘有其人但鄙而貪者十居八九習氣甚屬卑下爾宜留心雍正五年四月二十一日浙江提督臣石雲倬謹奏為先發隨糧以濟公務事竊臣前謹抒臆見於每兵百名內存留公費三名以充營中公用條列四欵具摺請旨蒙皇上允臣所請臣欽奉硃批後即將條規四則鈔示各營并咨同督撫會飭作速整理外但營內名糧凡係老病開汰者例選子姪餘丁頂補惟脫逃犯事革退者方可留充公用是公糧一項勢不能以急期而軍裝製造事又難於久待若俟取給公糧誠恐耽延時日難免觀望稽遲臣當即發出隨糧二十分交臣標五營購買物料製辦軍裝據五營將辨等亦情願公發隨糧六十分承辦公務又據各鎮協營員辨願照臣標之例一體酌發隨糧承辦公務臣思浙省營伍經積廢之後須此一番奮勵方可改觀今各營有志急公臣準其暫發隨糧以濟營務俟公費足數之日自下而上聽還各官養廉兹臣更有請者伏思百內抽三之議在各營分派不過數名而合通省計之遂至千名有零念此空糧之多實深悚懼雖經咨會督撫查核似應報部察銷但查公費一項聖裁批示遵行謹奏盡力急公固屬美舉然亦不可驟迫及過於從事朕不求速效但願卿等徐徐次第整理事漸就緒而衆不怨憾方為善於措置也勉之雍正五年五月初十日浙江提督臣石雲倬謹奏為奏聞事竊臣履任之始訪聞瑞安協副將柳進忠通同商販運米出洋一切違禁之物時常夾帶歷查舊案不啻再三臣因調取該將赴寧正待面行申飭詎該將怙過不悛剛傲無狀經臣特疏題參在案近聞柳進忠駕造寃抑之詞抵飾前非聲言要赴部科具揭以彼姦偽難逃聖明洞鑒但恐該員以捉風捕影之詞造為負屈含寃之狀倘部科據彼情由上瀆天聽亦未可定臣自問秉公持正法在必行既不肯無故糾參亦不敢知情徇庇即有嫌怨臣不顧也臣蒙皇上委任之隆理應清釐姦弊且屢奉明訓以水師官員習氣貪鄙命臣留心訪查今臣明知劣員之違禁營私若稍示姑容是貽海疆之隱患聽姦弊之叢生亦大負皇上訓誨之至意矣茲恐參員妄希僥幸干冒宸聰所有臣前題參柳進忠委無寃抑之處理合預行奏明伏乞皇上睿鑒謹奏此等之奏竟可不必朕但據事論理假若柳進忠果有寃抑之處豈此一奏遂能搖惑朕志乎柳進忠來京陛見朕觀其一無足取乃小聰明識見卑鄙材質甚屬平常之人因伊向日運餉到臺攻打浪橋頗有戰功所以姑容之耳試思若在賞鑒之列何不早加升擢且伊原係滿保所題補者自必惟利是圖之輩朕胸中另有確見類斯自信得及之事無庸多此一番贅詞總之秉公料理毫無私心竟放膽為之倘其中少有自信不及則當審愼而行一切焉能逃朕鑒察縱使目下暫為欺蔽日後一經覺照朕不吝改正也朕亟欲卿等破面糾察屬員柳進忠之題參正堪嘉奬之舉何須如是疑畏而預為防範耶雍正五年七月十一日浙江提督臣石雲倬謹奏為恭謝天恩事竊臣差員於雍正五年五月十四日齎摺進呈蒙皇上恩賜各種宫錠一匣又於六月初一日齎摺進呈蒙皇上恩賜奏事匣子四箇臣一一郊迎跪領訖臣仰體皇上濟人利物之𢎞慈明目達聰之至意惟有悉心營伍加意地方知無不言言無不盡以期仰報髙深於萬一為此具摺恭謝天恩臣不勝感激之至謹奏好勉之勉之爾自到任以來一切處破面整飭實心任事毫無瞻顧因循朕俱知悉而甚嘉悅焉同日又奏為遵旨覆奏事竊臣於到任後欽遵常看得溫州鎮臣邊士偉盡心辦理營務但不能彈壓屬員剔清姦弊調驗該營器械俱各鮮明齊實能稱職操守亦好至於承辦公事不無自守已諸事不能辦理臣因定鎮逼近海洋最關緊要連日遣人稽查并嚴飭該標將備加謹巡防仍令不時稟報倘該鎮有事臣便於就近策應不致上厪聖懷至於定鎮營伍自吳升整頓後將備俱守成格臣諳練且風聞其有來歷不明李戴張冠情弊以上四鎮經臣查明如此至於各鎮公事臣不時協力妥商務於水陸地方各有裨益但查四鎮環山抱海應須身歷其境方可因地制宜臣請於明春巡查各路親往四鎮妥議成規和衷協力務期封疆寧謐理合預行陳明伏祈皇上訓示遵行謹奏覽同日又奏為酌定戰船丈尺名號以昭畫一以垂永逺事竊查浙省額設戰船共一百二十六隻近見水師各鎮營咨報修造戰船文內有稱水艍犁􅙔趕􅙔雙篷䑩沙船哨船唬船各種名目又有中水艍中犁􅙔等各種名目又有小雙篷䑩小趕􅙔雙篷艍等各種名目至所開船身梁頭丈尺不惟彼此不同且與部定之丈尺互異臣細訪其故據水師將辨以及捕舵人等稟稱浙省船隻現比部式增長加濶者皆緣昔年海氛未靖戰船俱扼守海邊未嘗衝風破浪不妨短狹自開海禁以來凡係戰船俱涉歷大洋若船身短則創駛不靈梁頭狹則兵械難配設或遇有姦匪必以大制小方可以操必勝是以逐漸加長增濶但既有增加則不無互異臣思為今之計丈尺固須增加而名目亦須清理庶幾頭緒分明而規制從此永定臣隨傳集現在寧厰監督船工之遊擊施世澤守備胡御珂及捕舵船匠人等從長計議將一切戰船名目定為水艍趕􅙔雙篷䑩快哨四樣除原係水艍趕􅙔雙篷䑩三樣船隻仍用原名外其餘大小相同者歸併一項不必多立名目酌定各船梁頭船身長濶丈尺嗣後遇拆造年分即令各標營遵照請定丈尺一式成造凡浙屬之定海黃巖溫州瑞安鎮海盤石乍浦等七標營所有各船之名目一經歸併既不苦其繁多再各船之字號配搭分明尤易辨其營分今臣謹擬運際河清海晏時七字每標各認一字俱照號挨編如此則丈尺有準名目不繁營分有辨字號可憑斯頭緒清而稽察易規制定而檔案清矣此臣一己之管見除開明某鎮某營各項船隻字號并現在丈尺與部定丈尺長短寬狹不符緣由同臣酌定各船名目丈尺字號一併造册移咨督臣髙其倬撫臣李衛會同酌議外理合備敘情由繕摺奏明伏乞皇上睿鑒施行謹奏閲所論奏甚屬得理爾等會商妥議具題到日有旨雍正五年十月二十二日浙江提督臣石雲倬謹奏為酌調不諳水師之營將恭請特簡補放事竊照溫州一郡逼臨邊海為浙省水師重地查鎮標中左二營係專司哨巡之缺務得熟識海疆諳練船務者以之充補庶收人地相宜之效臣查溫州鎮標新任左營遊擊楊大凱本籍山東由侍衛補授今職經臣調驗該將人材弓馬俱屬優嫺以之料理陸營綽有才幹及詢其水師舟楫巡哨等事甚非所長今查有軍政案內以年老糾參之處州鎮標中軍遊擊袁瑜員缺係屬陸路例由部選臣為人地相宜起見不揣冒昧仰懇皇上將楊大凱調補處州鎮標中軍遊擊使之專管陸路必能施展其才以收實效其楊大凱所出溫州鎮標左營水師遊擊員缺仰請皇上於記名熟識水師之人簡發一員補授或令臣於通省屬員中會同督臣髙其倬揀選請旨補放務使水陸各得其人庶於營伍海疆兩有裨益理合具摺請旨伏候睿裁批示遵行謹奏已有旨矣此奏甚屬可嘉雍正六年正月初八日浙江提督臣石雲倬謹奏為恭謝天恩事竊臣齎摺差官回浙恭捧皇上硃批奏摺並賜臣風羊哈密瓜到臣臣即出郊跪迎望闕叩頭收受訖伏念臣本庸材屢叨異數祗領之下感愧交深既深飽德之思彌凛素餐之戒受恩愈重圖報愈難計惟念念不忘時時加勉而已為此繕摺恭謝天恩謹奏覽奏謝知道了今調爾閩省矣勉力為之莫移初志雍正六年正月二十二日浙江提督臣石雲倬謹奏為恭謝天恩事竊臣駑鈍庸材謬膺重寄任浙一載以來寸長未效日切悚惶茲於本年正月十二日跪讀上諭以福建陸路提督員缺緊要命臣調補著即赴新任臣奉命之後隨將任內事務交代明白擇於二十二日起程星馳赴任惟是閩中諸郡地處海疆營分陸路一切機宜仍望訓誨遵行方可幸全職守臣於新任事宜俟有次第另行逐事入告盡臣心而供臣職奉天命以答天恩勉期報效於涓埃仰酬髙厚於萬一為此繕摺恭謝天恩謹奏好黽勉心力以盡厥職毋負朕之倚任同日又奏為敬陳任內未完事件事竊臣仰荷天恩忝任浙江提督抵任之後正擬漸次整理今因起程赴閩所有任內未經奏覆事件逐條開列為我皇上陳之一件為奏聞事臣到寧後見寧郡城垣坍損具摺奏聞并會商督撫設法修築但工費浩繁一時無動支之項因此未及興修理合奏明一件為先發隨糧事臣因所請各營公糧勢難驟得率同將備以下先發隨糧以濟公用具摺奏聞蒙皇上諭示遵行今查各營現造就馬兵花甲一千四百五十九副步兵棉甲五千八百五十二副大纛三百五十面桿小旗一千七百五十面紅旗一百九十一面鳥鎗九百六十一桿藤牌三千二百九十八面片刀二千七百九十七把其餘未經造完者俱俟接造又新製各色號衣七千二百一十二件又蓋造教場演武廳一所凡前物料工價俱在隨睿慮再公糧一項接奉硃批武員隨糧與文員火耗相似只宜酌留公費密奏朕知非可援例題報之事欽此欽遵應於年終催取各營册報齊集按營確查繕具密摺奏聞今臣赴閩期迫各營册報未齊無憑查核除就近移一件為按兵設器等事臣前以各營器械參差隊伍雜湊因具題前事旋奉諭旨通行各省督撫提鎮畫一定議隨蒙部劄行臣另議具奏臣隨咨商督撫并移行各鎮協營確議去後續準據各鎮協營議覆前來與臣原議大略相同除經會商督撫外應聽督臣李衛定議具題理合奏明一件為查明四鎮等事臣於上年七月摺奏處州鎮王安國奏明四季遊巡一事因撫臣李衛商議此事恐纍鄉民臣隨轉致王安國務使輕裝減從杜絶繁文庶兵民兩便實受巡查之益但臣原擬今歲遊巡相度地勢情形面為商酌今因赴閩未一件前摺內有陳奏原任黃巖鎮臣董一隆頂冒情弊因事涉風聞未敢遽行覆奏今查得該員本姓吳實非福建人係假冒功加理一件前摺內為浙省各鎮營環山抱海應須親歷其境方可因地制宜本擬今春二月後巡視通省營分以便妥議成規共收實效兹因星馳赴閩未一件為酌定戰船丈尺名號等事臣伏查戰船案册頭緒繁多難以稽查具摺請將戰船之式欵相同長濶相等者歸併一名免致彼此互異一切船隻總歸四項名目其水師七路配以運際河清海晏時七字庶名目不繁而營分可辨現在會商督撫具以上各件皆臣任內之事或因咨商督撫往返稽時或須次第舉行勢難驟結但有一案未清臣雖身赴閩疆心懸浙省因不辭瑣屑謹將未完各件逐事臚陳總為一摺仰祈皇上睿鑒施行謹奏詳閲所奏逐條批諭矣雍正六年四月二十六日福建陸路提督臣石雲倬謹奏為詳籌地方營伍情形仰祈睿鑒事竊臣蒙皇上天恩調任福建陸路提督抵任以來熟審風土人情官員賢否歷任相沿之積習目前應定之規模逐細推詳務期允當今謹據實開列為我皇上陳之一臣謹查得福建地方山海交錯人稠地狹産米無多俗尚刁悍每聞大姓人户聚衆打降爭界奪址幸而年歲豐收地方稍得安靜設或米價騰貴凡窮民小户有私往海洋覓利者有偷度臺灣糊口者近有督臣髙其倬設法採買米石減價平糶兵民漸為安堵但須源源接濟則米無缺乏價不至於大昂庶兵民兩受其利至地方公事總須文武和衷不分彼此是則調劑兵民之一助也查目罣誤解任既有此才守兼優之員臣訪知確實何敢壅於上聞理合奏明一臣謹查得歷任相沿其大弊有二一則冒公費而潤私囊病在於侵蝕一則務虛名而忘實效病在於矯情此等提臣名雖有清濁之不同其實無題參矣但營伍自經積廢之餘必須大為振刷方得改觀臣現在嚴加整飭俟一年之後再觀成效理牢不可破臣思陸路人員所守不過汛防墩鋪所司不過兵馬錢糧所督察者不過操演技藝即他省人員俱能辦理非若水師將備必須本地人員方能熟悉水性周知洋面者可比誠不必槩用本地之人致滋弊竇今臣標各營現出數缺需員料理仰懇皇上於別省人員內簡發數名來閩遇有缺出臣會同奏明請旨一臣謹查得閩省陸營器械參差隊伍不整亟須遵照諭旨畫一營規臣前過福州時與督臣髙其倬面商應將軍械按照隊伍增添惟是各營公費無出難以辦理應須仍照浙江之例於每兵百名內存留公費三名以充營中置補軍械之用仰祈皇上恩允則各營辦公有資不至互相推諉營伍日有起色矣又恐公費名糧勢難驟得亦請如浙省所行先於各官隨糧項下五分抽一趕造緊要軍械旨抑臣更有所不敢隱者查臣標五營額設馬八百六十二匹每年例準報倒二百七十匹倘遇水草豐盛再能加謹餧養內少倒數十匹則此餘剩馬價銀兩留充一切公用案查逐年臣標五營册報俱旨以上所陳皆關閩省切要之事臣謹彚摺恭呈御覽伏候聖裁訓示遵行謹奏閩省山海交錯為緊要封疆宜極加勉勵為之毋忽同日又奏為皇上洞悉情形曾降諭旨令陜西督臣嶽鍾琪就陜省各標挑選弓馬嫻熟之兵一百名發至浙省俾臣分發各營教習自上年十月派往各營去後不數月間陸路兵丁人人學習馬步騎射漸次可觀是浙省陸路之兵已不患無起色矣但水師士卒仍舊生疏為今之計應請照上年派發西兵教習陸營之例就閩省揀選熟悉洋面之水兵五十名於浙江水師十二營內十人而善全通省之水務將見風潮礁石在在周知瞭碇斗柁人人熟諳未必非教習之一助也仰懇皇上特降明旨行令福建督臣髙其倬水師提臣藍廷珍於所屬各營內精選熟諳水務之兵五十名發往浙省果能教習有方拏賊有效應請記功擢用如此則閩人樂於教浙兵樂於習藉閩人之所長補浙人之所短數年之後浙省水路之兵亦不弱於閩省矣臣一得之愚是否可採伏乞皇上乾斷施行謹奏朕今命李衛總督浙江料伊整頓各營事務自必漸次念及於此也雍正六年六月初二日福建陸路提督臣石雲倬謹奏為恭請陛見仰懇聖訓以慰依戀以資遵守事竊臣蒙皇上天恩特調陸路提督自二月二十五日抵任之後祗緣營務廢弛急須整理不敢擅離職守延今數月間規模粗定積弊盡除戀主之忱無日不形諸寤寐伏念漳泉逼近大洋為全閩之屏障陸路各營依山沿海在在險要臣雖督查巡察未能洞中機宜懇祈皇上俯念閩省陸路營汛責成緊要準臣來京陛見跪聆方略俾臣遵奉施行既可幸全職守而臣子依戀君父之懷亦從茲稍慰矣為此繕摺請旨伏候御批至日另行拜疏起程臣不勝激切待命之至謹奏陛見之行今且不必如有應面諭處自然召爾來京大都居官之要天下不過一理立志向上者安往而不是自暴自棄者無往而不非朕凡所訓誨亦不過欲令諸臣知朕之心及封疆職守之大綱節目而已至於地方利弊不但閩省之遙即直隸近在咫尺間朕既未身經目睹焉能洞悉機宜尚賴卿等一一奏聞朕知更有何可訓誨耶長途往返不特無益兼恐貽誤職分中事俟過二三年後未為遲也同日又奏為立法以除積弊事竊查臣標員辨向有私賣隨糧每名三十兩五十兩不等遇有一名糧出則以養廉不足為詞懇求上司補足究其來歷皆起於前任提臣吳升專信家人親戚營中至今尚有四絶不以弓箭為事一時將備相習成風人人博寬厚之名不肯任勞任怨汰一老弱兵則以為刻薄得不效尤於後此營伍之所以日弛也臣抵任以來亟加整飭惟念隨丁一項常祿之外設此養廉豈容暗中頂賣若必徹底查究恐有前官頂賣後任缺額者似難一槩而論今欲永杜此弊似宜按照定例一體補足不令彼此參差藉名舞弊臣接養廉盡行補足臣現留三十五分臣隨帶家人無多足資日用內又發隨糧二十分先製號衣一時臣標將備俱各踴躍辦公願先發隨糧以辦緊要軍裝俟公項完日仍還各官養廉自今為始凡有前項情弊臣當不時查核糾參務洗向時之積習以期成效於將來為此繕摺奏聞恭請皇上訓示遵行謹奏所奏可嘉之至朕欣悅覽焉堅守此志莫稍遷移勉之勉之吳升朕既取其操守又恕伊年老所以姑寬其罪至於當日欺陷吳升之屬員家丁親戚子姪輩如得其顯著欵迹一一據實奏聞毋致踈縱若止係可恕之小過則亦不必苛求也雍正六年七月十六日福建陸路提督臣石雲倬謹奏為報明丁艱事竊臣繼母楊氏於雍正六年四月二十七日在籍病故臣於七月十三日接臣胞兄石雲慶胞弟石雲興訃報到泉例應回籍丁艱但念聖恩髙厚陸路各營責成重大未奉明旨不敢擅離職守現在一切公事仍照常辦理不致有誤地方恭候命下之日允臣回籍再行交代起程庶公義克全而私恩亦不廢矣除將聞訃緣由遵例咨明督臣髙其倬代題請旨外臣謹繕摺恭候皇上批示遵行謹奏如此方得大臣之體朕覽奏深為嘉許今已有旨命汝在任守制矣汝此任甚屬緊要若可以不必回籍令汝弟兄輩料理喪事足見忠誠奉公之心設有萬不得已情節欲乞假數月具摺奏聞候朕再為斟酌同日又奏為遵奉硃批通飭各營畫一遵守事竊臣於本年六月初三日具摺進呈御覽當蒙皇上批發所有奏請事宜悉遵批示舉行至於公糧一項仰蒙聖恩俞允必須妥立成規畫一遵守庶營伍日有整頓之效今臣繼母在籍身故現候命下之日離任丁艱但念海疆營務重大不敢遽行卸責臣一面咨明督臣髙其倬撫臣朱綱通飭各營務使實力奉行永除積弊謹將咨檄原稿並黏抄原奏條欵四則另摺恭呈睿覽但臣資識淺陋恐有未協之處伏冀皇上訓示遵行謹奏凡事悉與髙其倬朱綱商酌為之臣丁士傑謹奏為備陳微臣被參之始末瀝血哀鳴跪懇恩鑒事竊臣至微極陋荷蒙皇上隆恩畀以封疆重寄履任以來惟以氷霜自矢淡薄自甘誠恐稍有隕越致負皇上簡畀之至意不意督臣髙其倬誤聽他人之媒孽久已積怨於心將臣列欵參奏蒙皇上敇令督臣審擬臣自宜靜聽審理何敢上瀆宸聰但臣被參欵件全無影響若不據實奏明是自蹈負恩之罪矣臣隨於二月初八日於恭繳硃批匣內具摺備陳愚忱仰懇慈鑒復於二月十五日奉督臣令牌提審自泉赴省路遇提臣石雲倬面向臣説你我雖素不相識然而你居官之好否並此番事件我已備悉緣由你若到省之時必須俱認其過才是不但此五件事情全無影響即有其事亦不至此我在省城曾見過總督亦言不期至此皇上必别有深意若此時與總督硬辨即是與皇上辨别一樣未知是否你自斟酌等語臣聽聞之下以為提臣石雲倬係奉旨特調之員想伊必有灼見臣蒙皇上如此隆恩今既不合聖意罪已當萬死何敢復為陳奏隨著人將臣前摺趕至山東地方追回寧甘身受誣枉之罪斷不敢有犯天威今臣在省候審已越三月督臣委令福州府知府細加審問嚴訊對質人等盡屬子虛督臣因密著人向臣説督臣早已懊悔但事既至此猶須稍認微過方好結案臣思督臣原係承審之官彼雖明知其誣焉肯自行承認無奈就事稍認誠恐督臣之本意未遂再加揑詞具本而臣之寃抑愈深莫白臣之罪愆更屬難逭今當恭繳硃批及奏摺黃匣之際因思此次若不據實以奏嗣後再無陳奏之期言念及此皇恩愈覺深厚臣身萬難報酬臣不禁心痛欲絶泣啼欲死倘蒙皇恩垂鑒愚衷俾臣再得一覲天顔臣即身死九原亦得瞑目於地下為此瀝血陳情伏祈恩鑒全覽施行謹奏汝對丁士傑果有此言乎丁士傑之被參或有寃抑乎其據實奏聞若於其間少有隱飾則與天理人情皆有虧缺朕但欲得事之真情而已非為丁士傑起見丁士傑之狂妄負恩久已深知似此巧辨何能絲毫惑朕耳目也今發此摺詢問汝當極加謹密不可令一人知聞雍正六年八月二十四日福建陸路提督臣石雲倬謹奏為據實密奏事本年八月十八日原差齎摺回泉封內發有丁士傑辨奏一摺我皇上恐事有寃抑特降硃諭密詢臣隨將丁士傑所奏事由逐段審核殊為強辨被參五欵件件俱有證據委無寃抑之處臣前赴任時於二月十五日行至太平地方適值丁士傑往省在彼等候再三請求一見臣辭之不去因與彼一會斯時丁士傑即言被參之事滿口稱寃欲將隨從人役避過臣對他説有話但請講我從來不肯背人私語隨於稠人廣衆間向他説我與你素不相識但你向日做官好歹總在你自己得知若説總督屈參了你今皇上聖明從不屈抑人的倘若你的事體件件都有實據我亦不能代你隱諱你只想皇上放你提督以來做了那一件與地方兵民久逺有益的事果有實迹皇上豈不知道我亦不肯掩人的長處只恐你的事欵犯真要想硬辨不如據實承認的是總在你自己斟酌當日臣對他所言如此丁士傑緘口無言良久方嘆息説極是未幾即别去不料丁士傑忽然妝點情詞冒瀆天聽臣竊窺其本意先因供據確鑿只得逐一招承今見事案審明又欲多方狡辨此等設心巧詐不待辨而自明所可鄙者丁士傑始而以巧詐獲罪終欲以巧詐免罪不知巧詐愈深罪愆愈重何必多此一舉乎恭逢聖明在上鑒臣心迹特將原摺命臣觀覽煌煌密諭惟恐情狀未真事多寃抑臣仰體天心荷蒙清問及此敢有半字隱飾稍違天理人情亦難茍容於聖世矣今查丁士傑摺內敘臣之語皆係改換情節憑空駕造臣當日並無此言理合據實密奏所有奉到硃諭暨丁士傑原摺臣謹跪封恭繳伏乞皇上睿鑒謹奏朕料來亦係如此所奏知道了雍正六年十一月十九日福建陸路提督臣石雲倬謹奏為奏明事竊臣抵閩以來點驗各營庫局凡有原存甲械俱殘缺朽舊亟當按數修補業蒙皇上允臣請留公費陸續成造但公糧一時不能驟得是以臣標將備情願先發隨糧上緊趕造奈各營軍械需費甚多所有公糧隨糧二項按季支領置買物料終不一起齊全難以通體改觀臣將臣標五營并泉州城守營各項應辦軍械均照浙江提標五營盔甲分别五色製造通盤估算物料只須銀二千兩即已製辦齊集應手興工中間不至間斷今暫為通融設法先向藩庫中借支銀二千兩遣員採買物料興工製造所借司庫銀兩即於臣商定辦理務在半年之內整頓齊全在營伍既無掣肘之虞而借支確有抵補之項以此行之不獨臣標各營從此改觀即通省各標營皆可相繼整理不至因循觀望矣因事關預借錢糧理合具摺奏明謹奏誡飭辨員貪婪之習懲治兵丁刁悍之風斯為最要至於觀瞻之美乃係皮毛邊事當徐徐次第整理何須如此忙迫朕觀汝不免有輕重倒置務逺忽近之失敬愼為之不可改移初志同日又奏為敬陳管見仰祈聖明採擇事竊惟國朝定鼎以來既設督撫提鎮統率緑旗士卒又設將軍都統總領滿漢官兵分立八旗各歸佐領綱舉目張立法允為盡善矣乃臣竊有鰓鰓過計者滿兵八旗人等生齒日繁丁口增廣而甲額止有此數其間披甲者足資贍養家口其餘無甲之人難免仰屋之嗟臣查八旗滿兵間散人等在外省者不過百分之一其餘悉在京師間住有職役者甚少其中漢仗弓馬好者甚多人材淹沒實為可惜臣再四思維安頓之法惟有酌派各省除陜西湖廣浙江江南等處原設滿漢官兵省分無庸置議外今查有鎮江福州廣州三處均係漢軍將軍標下兼領緑旗兵丁以臣愚見緑旗兵丁自有督撫提鎮統轄不必更隸將軍標下應將軍標緑旗官兵一項錢糧核算若干照額改設滿兵充補查軍標緑旗兵丁原係各營抽撥仍可分派各營遇有糧缺按名補伍統計閩廣鎮江緑旗兵丁共有數千以之改補滿兵之尤貧而家口衆多者將見舉家有賴不啻數萬人矣其軍標將備盡可裁減應請另立旗分佐領分管各旗事務而將備衙署亦可令旗員駐劄不煩營造至緑旗兵丁所住官房滿兵儘堪居住即有不敷添造亦不甚難至將軍係滿漢八旗總帥非向日漢軍將軍之可比應請更換滿洲將軍統領滿漢官兵再設滿副都統一員專管滿洲旗分其舊有之漢軍副都統仍管漢軍旗分規制既定則滿洲官兵不至壅滯京師一時股肱心膂分布巖疆所謂衆志成城地方各收彈壓之效矣再查雲南逺居天末民夷雜處亦應照湖廣陜西江浙數省之例分派滿漢官兵以資鎮守合併陳明如果臣言可採伏候皇上乾斷施行謹奏殊屬多此一奏矣其中議論且有甚不通處當留心職任內事為要似此出位之思恐汝未具如許才力也雍正七年四月初六日福建陸路提督臣石雲倬謹奏為奏明地方情形事竊查福建地方前蒙皇上曠典頻施賞發江浙漕米十萬石米價平減闔省軍民莫不歡呼載道今又蒙恩命每年賞給臺兵贍養家口銀四萬兩調臺兵戍永無內顧之憂一時人心歡慶仰戴天庥今年春夏之交風雨均調寒暖應節自福興漳泉一帶大小二麥俱各豐收臣生逢盛世時時宣布分别懲治現在文武和衷兵民安輯地方亦為寧謐理合繕摺奏聞謹奏覽同日又奏為奏明泉郡城垣事竊查泉郡負山臨海所屬六邑皆據西北上流一遇山水暴漲往往奔注府治灌城而入城內原有八卦溝疏通水道近因年久淤塞兼有居民蓋屋其上是以溝道不通頻遭水患臣每遇大雨後勘閲聚水處所平地水髙數尺因查泉城歷年受水如水門新門塗門南門西門北門連遭淹灌侵損城基以故城墻垜口門樓馬路倒壞纍纍窩鋪傾圮殆盡往年屢據地方官勘估約費工料萬餘金造册通報在案緣費用浩繁無項可動以致連年傾圮愈甚伏思泉州一城關係閩南門户似應早為修葺庶工程易辦而費用無多溝渠一開則民患可除而城工亦固臣因此二事均關泉郡地方要務不得不及時籌慮除經咨商督撫查勘定議外理合據實奏聞伏乞皇上睿鑒施行謹奏與督撫二臣會商酌議直省城垣似此應修理處指不勝屈皆因向來地方官總不以地方之事為事故廢弛至於此極耳同日又奏為奏聞事竊臣於本年正月間聞有臺灣南路山豬毛野番肆橫殺害民番情由斯時未據的實不敢遽奏臣一面密諭標下戍臺辨目就彼細訪一面密書詢問臺地將備務將野番如何肆橫作何𠞰捕之處逐細覆知行查去後今於四月初三日據臺灣鎮標中軍遊擊靳光瀚稟稱臺灣南路山豬毛野番於上年十二月二十八日殺害邱仁山等十四命本年二月初二日復下山殺害熟番七名虜去番孩一口焚燒莊屋牛隻卑職奉本總鎮檄令帶領辨兵𠞰懲問罪於二月十六日自臺灣府治起行至三月初九日劄營山豬毛社前踞其厄要絶其糧食十一日率同備辨帶領兵丁鄉勇一百六十餘名會同運糧同知劉浴派撥民壯熟番一百名各處暗伏以舉炮為號下手圍擒至時號炮一響兵番鄉勇協力向前野番拚命突圍我軍奮勇追捉活擒野番二十名其被鎗傷滚下深坑者甚多欲再搜捕緣暮夜山深箐密未得地利形勢遂收兵回營又因山豬毛社橫溪無數湍急異常時值春深恐霖雨乍至實難飛渡且深山嵐瘴最易侵人軍士未便久住隨會同劉同知於十二日撤兵出口續奉本總鎮檄調班師卑職率兵於本月十四日回郡等情據此臣思𠞰捕事宜關係重大各安堵無煩聖明垂念臣謹將遊擊靳光瀚稟到緣由繕摺奏聞伏乞皇上睿鑒謹奏凡此皆由內地頑民越界生事之所致今如斯施逞兵威𠞰殺無知朕心實為憫惻但勢處不得不然亦付之無可奈何而已雍正七年六月十五日福建陸路提督臣石雲倬謹奏為恭謝天恩事竊臣齎摺家人抵泉捧到賜臣宫錠一匣臣隨恭設香案望闕叩頭謝恩祗領訖伏念臣以庸愚歷承恩貺欲圖報稱未效涓埃乃前領珍九出上方之異製今邀宫錠廣內府之𢎞仁計惟因事以利人乘時而濟物廣宣君惠俾有感而皆通仰答天庥務旋施而立效庶俯全臣職上報天恩於萬一耳所有接奉宫錠緣由理合繕具奏摺恭謝天恩謹奏朕誨汝許多格言何啻珍寶況悉係親筆所書未見汝感激奏謝一字似此隨衆賞賜些微物件乃長篇大論以相煩瀆殊屬不知輕重不識大體之至可惜朕一片苦心訓誨汝如此頑蠢之人自此亦不再訓亦不賞賜矣同日又奏為要缺需人懇請酌補賢員以收實效事竊查臣標中軍參將一缺甚屬緊要臣擬於通省陸路標營內揀選賢能素著之員遵例題補因本省合例人員內實無勝任之人隨與督臣髙其倬詳晰商定惟有浙閩楓嶺營遊擊江化龍才猷素著老成持重以之補授臣標中營參將實屬人缺相宜惟是楓嶺營汛雖兼兩省地方而該營遊擊乃係浙江專轄恐隔屬題補與例不符但念中營責成綦重必須才守兼優方堪統領五營臣為要缺需人起見不揣冒昧請將江化龍補授臣標中營參將倘蒙皇上恩準其於標營公務實有裨益臣亦得收臂指之效矣緣與例不符不敢擅行題請謹繕摺奏聞伏候聖裁批示遵行謹奏於此奏未到之先已有旨矣雍正七年十一月初一日福建陸路提督臣石雲倬謹奏為王師逺征不庭臣請軍前效力以盡微忱以報聖恩事竊臣一介庸材至愚極陋蒙皇上天恩擢用提督抵任以來仰荷聖慈教訓指示周詳臣得奉行不致隕越中夜撫膺無由報稱伏見西醜跳梁致煩天討正臣子枕戈待旦之秋臣從前由平涼遊擊升鎮番參將慶陽副將熟習陜西情形且在巴里坤當差十年之久塞外風土人情又經親歷臣原在邊庭效力之人當此軍興正宜戮力疆場為國家出力報效豈可在此承平地方坐享安間心實不安伏懇皇上天恩量臣之材授臣之職允臣前赴軍前戮力行間剪除小醜少盡臣犬馬之心仰報聖恩於萬一至於福建地方仰賴皇上洪福太平無事山海肅清兵民樂業臣毫無出力報效之處於心實切悚惶為此具摺奏聞伏乞皇上睿鑒批示遵行謹奏汝何好起分外之念耶汝自任閩提以來整飭營伍嚴察屬員頗能實心任事可嘉處朕一一悉知不思巖疆要地加勉治愈求治之心兵民愚悍必期有恥且格之效而乃謂坐享承平毫無報效處是何言歟洵可謂不審輕重不知本末朕不但不取汝奏請之誠且深以汝之輕視肆志為憂也接諭後其勉圖責任中事以盡乃職不必妄動分外無益之念雍正八年四月二十日福建陸路提督臣石雲倬謹奏為奏聞事竊臣前接廣東撫臣傅泰來札內云粵省肇慶府恩平縣匪類捏造偽劄福建亦有人散劄之語臣當即密飭各鎮協營嚴加緝訪面生可疑之人臣又差人各處密密訪緝並無前項姦徒散劄已於三月十六日奏明在案臣不敢以為必無稍有怠忽現在不時加謹差人巡緝前經密咨廣東撫臣若有福建人氏即開明姓名住址以便嚴拏究處斷不容其潛藏地方致生事端伏見福建地方入春以來雨水調奏覽雍正九年正月二十五日福建陸路提督臣石雲倬謹奏為恭謝天恩事雍正九年正月二十三日蒙兵部劄付內開雍正八年十二月二十四日內閣奉上諭福建陸路提督石雲倬廣東潮州總兵馬紀勳著前往陜西肅州到大將軍嶽鍾琪處有辦理之事等因行文到臣臣跪讀聖諭不勝踴躍歡忭伏念軍務重大恐臣力不能勝應先星馳進京跪請聖訓指授機宜然後前往又接到大學士公馬爾賽等寄字內開字寄福建提督石雲倬雍正八年十二月二十四日奉上諭現今西邊有事爾等寄信與福建陸路提督石雲倬令其馳赴肅州到大將軍嶽鍾琪處聽候委用辦理軍務信到即日起程毋得遲緩欽此遵旨寄信前來提督可即收拾起程前往肅州辦理軍務臣跪讀上諭軍務緊急不敢遲延即於二十五日自泉州府起程星馳赴肅聽候大將軍臣嶽鍾琪委用辦理軍務除恭疏題報外臣嗣後遙在西陲瞻望天顔為路甚逺所有軍前辦理一切事務仰懇皇上天恩俯賜教導俾臣得以遵循辦理則感戴隆恩於無既矣為此具摺恭請訓旨伏乞皇上睿鑒施行謹奏汝先奏請願赴軍前戮力朕經批諭責汝好為分外之念今因西陲事出意外不得其人所以特諭調往也勉為之但秉忠誠之心仰邀天地神明恩祐早建大功以慰朕懷至於軍機事宜汝到肅後自有指諭雍正九年四月初二日福建陸路提督臣石雲倬謹奏為恭謝天恩事竊臣前於正月二十五日自泉州府敬遣臣標把總齎摺進京於四月初一日行至臨潼縣地方齎到皇上硃批奏摺並恩賜克食四匣各色衣物等件到臣當即跪接望闕叩頭謝恩祗受訖臣恭誦硃諭感激難名蒙皇上天恩諄諄指訓又荷賞賚珍物多種不但臣所未見亦所未聞種種隆恩有加無已臣雖捐糜頂踵曷能報稱於萬一今西陲軍興之際正屬微臣報效之時臣前奉恩命調赴軍營喜出望外踴躍倍常惟有堅心進取誓滅逆賊上慰聖懷下抒臣願但軍務重大臣知識短淺仰懇皇上天恩時加訓誨得以遵守臣斷不敢有負聖恩委任為此繕摺恭謝天恩所有奉到硃批奏摺理合一併恭繳謹奏覽奏謝矣朕惟仰仗上蒼慈祐專候汝等建立不朽功勳捷書早至也雍正九年七月二十日副將軍臣石雲倬謹奏為奏明事竊臣惟慮軍務重大事關機密必需經練之人相助辦理方無貽誤有幕友吳章向在巴里坤軍前與臣相處為人老成練達謀事周詳而於軍需更為熟悉查吳章係江南武進縣人於康熙五十九年由監生遵九欵例捐職縣丞又捐改歸單月即用今吳章情願隨臣赴軍營效力具見其矢志公忠理合具摺奏明仰懇皇上天恩俯準效力軍營聽臣委用如果實心辦事著有勞績更求恩加敘用以示鼓勵則臣獲收臂指之助感沐鴻慈於無既矣伏祈皇上睿鑒敇部存案施行謹奏該部照所奏存案硃批諭旨卷七十六
