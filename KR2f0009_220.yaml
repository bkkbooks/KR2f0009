body:
  text: 欽定四庫全書硃批諭旨卷二百二十硃批蔣洽秀奏摺雍正六年八月十四日巡察山東等處監察御史臣蔣洽秀謹奏為奏聞事竊臣奉命巡察山東受事以來料理行文出示後於七月十一日由濟南府出巡至昌邑縣地方據青州府諸城縣申稱拏獲燒香惑衆之楊文供出牛三花拉邱志柱邱文信朱相卿孫龍杜禮當即拏獲朱相卿邱志柱并牛三花拉之妻女及行李銀錢到縣訊取各供具文通報等因又巡至萊州府髙密縣據該縣詳稱拏獲邪教髙擇善等五名又關獲張華商等四名各録供詳報又巡至安邱縣據該縣詳稱拏獲燒香之范存信研訊口供關解諸城縣收審各等情到臣臣查諸城縣訊取各供未獲之犯牛三花拉等十六名髙密縣訊取各供未獲之犯張坤石等六名安邱縣訊取各供未獲之犯徐和公等八名或係天主堂喫本命齋或係三元會空字教勸人燒香按四時磕頭求財求夀圖騙香錢等情臣因事關邪教惑衆難容任其逃匿隨批飭各該縣嚴拏夥黨確審究擬外理合奏聞臣謹奏類此邪教只宜嚴察為首數名按律懲處被惑愚民不可一例論也切毋波纍多人雍正六年十一月初九日巡察山東等處監察御史臣蔣洽秀謹奏為奏聞事雍正六年十一月初五日據兖寧道吕維炳呈稱本道因公赴省於十月二十六日自省起身二十九日行至耿村地方有城守營都司李懷義差人報稱十月二十九日五鼓各官正在拜牌行禮間突有凶盜持刀斧等械擁入公所將遊擊韓國枝都司李懷義左營守備李懷仁右營守備劉文燦泉河通判郎燦原任州同陳文燦天井閘官楊志逺等斫傷現俱帶有傷痕而行禮處所即在州署間壁凶盜即入州署該州妻女亦皆受傷劈開監門劫出囚犯現在領兵擒拏等語本道聞信飛騎入城見副將馮廷雄等率領四營官兵奮勇擒拏將越獄重犯俱巳全獲又拏獲凶盜馮候南等二十名又拏獲割辮跟隨盜黨行走之更夫楊二等八名交與吏目收監仍現在搜捕餘黨并嚴訊夥盜確數另報外再查該州銀庫並無疏虞隨一面多派兵役看守一面出示安民俱各安堵如常其知州髙令樹奉濟東道調赴曲阜廟工未回運河同知巴潮現在患病事關盜黨劫獄傷官重情理合飛報等情到臣同日又據總河督標中軍副將馮廷雄等報同前情據此臣除照會兖寧道并檄行濟寧州嚴查此案確情督令兵役搜拏餘黨究審詳報外合先繕摺奏聞臣謹奏業據齊蘇勒奏聞矣硃批諭旨卷二百二十
