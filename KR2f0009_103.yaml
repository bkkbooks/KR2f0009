body:
  text: 欽定四庫全書硃批諭㫖巻一百三硃批袁立相奏摺雍正元年六月二十五日山西太原總兵官臣袁立相謹奏為恭領聖訓叩謝天恩事雍正元年五月二十一日兵部筆帖式巴雅爾圗齎到聖訓十冊頒賜總兵㕘遊等官到臣臣即率同城各官郊迎至署恭設香案叩頭祗領捧讀之下仰見我皇上訓誨周詳使愚魯武臣咸知遵守曲全矜宥無所不至随將齎到聖訓分頒各營去後兹節據各營㕘遊等官具文囘報奉到聖訓日期并頂感遵守緣由前來理合繕摺叩謝天恩謹奏知道了爾請發遊擊一摺已交該部諭令揀選優者發往所請甚是雍正元年六月二十八日山西太原總兵官臣袁立相謹奏為叩請聖安事雍正元年六月二十五日頒大行仁夀皇太后遺誥到臣臣即率同城各官郊迎至署跪接之下俯伏涕零五内摧裂仰惟聖主前當聖祖仁皇帝升遐之時孝思純篤哀毁過情今又遇皇太后大故悲切逾常伏念聖躬為社稷蒼生所倚賴叩乞少節哀思勉加保護以慰天下臣民之心抑臣更有請者臣受恩深重逾於常格今皇太后龍馭上升分應趨謁梓宫泥首哭泣以盡私衷緣身膺軍旅重任不敢冒昧伏乞皇上准臣單騎入京庶臣殷殷依戀之私得以稍釋為此繕摺叩請聖安伏候敕㫖謹奏不必來京爾初到任正在整理地方諸務豈可擅離職守所奏知道了雍正元年七月十一日山西太原總兵官臣袁立相謹奏為奏聞事竊臣准撫臣諾岷移咨内開特奉恩綸以現在平陽等處米價尚貴恐兵丁錢糧不敷用度命撫臣同臣查明前項所借銀兩如係實欠在兵即暫停扣還俟秋成之後再行補扣臣随轉行各營欽遵去後各營兵丁一聞皇上恩㫖無不歡忻頂戴俱各望闕叩頭謝恩并懇轉詳代奏前來除將實欠在兵并衆兵懇請代謝天恩緣由咨移撫臣諾岷具疏外伏惟我皇上仁恩育物無所不至因山西米價昻貴時厪聖懐前者遣官賑濟俾黎民無致失所兹復將兵丁借欠銀兩寛期扣還聖恩優渥上感天和現今雨暘時若秋禾暢茂臣細查各郡田畝均勝往年豐收可望闔省兵民皆仰頌聖主厚澤深仁歡呼靡既為此繕摺謹奏知道了晉省數年以來兵民甚苦湏賴爾等文武大員曲加體恤必令各得其所方不負朕之委任也勉之雍正元年九月二十一日山西太原總兵官臣袁立相謹奏為奏聞事竊查晉省自六月初二日得雨之後甘霖屢沛禾黍盈疇今值秋成臣即各處查㸔其間地土雖分肥瘠而通省均屬豐收萬姓盈寜歡呼徧野兹據農民呈送雙岐穀穗到臣臣不勝歡忭踴躍見萬民康阜之休實我皇上聖徳昭格之所致也為此繕摺奏聞謹奏據奏秋成豐稔知道了全在爾等封疆文武大臣安輯兵民有以感召天和自必年年獲䝉上蒼之垂佑也雍正元年十一月初一日山西太原總兵官臣袁立相謹奏為遵㫖保舉能員以資臂指事竊臣䝉恩調補山西太原總兵官趨赴闕廷叩謝天恩跪請聖訓之時面奏皇上太原非題補地方若有才能官員容臣保舉䝉我皇上面諭如有好官具摺保奏并將合例與否之處摺内聲明欽此仰見我皇上立賢無方之至意今有臣屬蒲州營遊撃缺員例應聽候部推但查蒲州一營地接陜豫山多險峻抑且土俗人情頗稱狡悍非久任晉地熟習之員不克勝任今有臣標左營中軍守備張起雲平陽營中軍守備桂棲鳳蒲州營中軍守僃茅典此三員者俱各才技優長熟習風土均堪補授蒲州營遊擊查守僃張起雲桂棲鳳原籍山西均係由千把題補守備之員今臣保奏與例不符謹遵㫖聲明除給文各弁赴部聽候引見外理合繕摺請㫖謹奏蒲州營員缺朕已諭部停推爾與撫臣諾岷㑹同酌定一員援㫖具本題奏可也雍正二年正月初九日山西太原總兵官臣袁立相謹奏為恭繳上諭事竊臣前因蒲州營遊撃一缺地方緊要將守僃張起雲桂棲鳯茅典具摺保奏給咨赴部引見奉到硃批諭㫖臣隨咨明撫臣俟守僃張起雲等回平咨送揀選今於雍正二年正月初七日䝉兵部劄付内開奉㫖著茅典補放此三人俱去得著行文該處欽此欽遵劄付到臣所有硃批諭㫖理合恭繳謹奏所奏知道了自爾到任以來雖無甚大不好處總未聞有與地方營伍興利除弊之好聲名若只如此庸庸碌碌豈不大失朕用人之意耶勉之雍正二年三月十六日山西太原總兵官臣袁立相謹奏為據實奏聞事竊臣屬各營自康熙四十二年前鎮臣馬見伯任内存留公費糧三百零八分以為大小二十八營一切應辦公事及各項修補軍械旗幟之用該臣看得此項空糧雖向為各營公費但未經奏聞實屬虚冒臣随嚴飭各營即行招募今已募補過二百四十八分查各營一切軍器等物去年俱已修製齊僃至於鑼鍋帳房亦無庸每年修理惟火藥鉛彈二項乃各營春秋操演必需之物費無所出尚有未補名糧六十分應否留作火藥鉛彈之用臣未敢擅定伏乞皇上睿裁遵行謹奏爾等未嘗學問之人料理事務非過則不及此事與撫臣諾岷商定一同具奏諾岷非尋常庸碌之人爾宜事事虚心與伊斟酌而行可保不至錯謬若但勉順朕㫖貌恭而心不服仍屬無益爾等共事一方若辦理妥協彼此有益湏文武一體虚已服善方為同寅和衷之道古人尚有以能問於不能者何況才識逺過於已者乎爾若心悦誠服則遵㫖而行倘或不願朕亦不相強也特諭雍正二年四月二十二日山西太原總兵官臣袁立相謹奏為奏聞事竊臣於本年三月二十八日自平陽起程由潞澤沁州權店遼州和順盂夀樂平太原交城靖安汾州石樓靈石等營查點馬歩兵丁衣帽什物旗幟俱屬鮮明齊全操演鎗礮技藝可有五六分内雖有生疎者再有年餘俱可純熟查騐存營盔甲鍋帳鍬斧水袋風匣火藥鉛彈一切行營器具俱各齊僃再各營俱係防汛應差兵丁並無老弱充數至於各官隨丁臣前准撫臣移文俱照題定盛京烏喇等處之例定額餘俱挑選精壮補足臣點兵至太原撫臣留臣看撫標太原三營演陣先後進退有紀有律甚得訓練之法臣於四月十九日回署俟秋收之後臣再往西南各路查點今將查點過東北路兵馬緣由先行奏明謹奏如果言與行符有何可諭勉力為之朕自能照悉也雍正二年閏四月二十四日山西太原總兵官臣袁立相謹奏為叩謝天恩事竊臣前因清理營伍奏請留公費糧六十分一摺奉到皇上硃批臣捧讀之下感激彌深隨叩頭恭謝天恩遵即差員㑹商撫臣謹將㑹商酌定緣由公同具摺請㫖遵行外伏念臣生長邉方愚魯無似荷䝉聖主擢任封疆祗因才識短淺實非過則不及仰承聖訓指示令臣事事與撫臣商酌庶幾不致錯謬臣惟凛遵諭㫖虚已和衷悉心商酌以仰副聖主諄諄垂訓之至意也為此具摺奏謝謹奏知道了凡百處内外如一心口相應方驗自修之實同日又奏為請㫖事竊臣前摺奏請留公費糧六十分以為鎗礮火藥之用皇上硃批與廵撫諾岷商定具奏欽此臣即差官㑹商撫臣諾岷今臣等㑹同酌議得太原鎮屬衙署共八十處其旗幟盔甲鑼鍋帳房以及汛防窩鋪并每年春秋更換伏路黄旗現今雖已齊僃但年年不無修補且凡奏銷造冊等項均有費用若不稍留有餘以備用恐各營將弁又滋借端扣剋之弊反為不便臣等愚意除留僃鎗礮火藥六十分空糧之外再留六十分以為各營添修軍裝器具奏銷冊籍等項不時之需年終將動過銀兩欵項數目具摺奏聞庶將僃無端可借而扣剋之弊可杜矣如是試行一年應否損益再行據實奏請是否允協伏乞皇上批示遵行謹奏總在爾秉公酌理料理合宜耳所奏知道了雍正三年六月初一日山西太原總兵官臣袁立相謹奏為奏聞事竊臣與前撫臣諾岷公同㑹商除留演放鎗礮製僃火藥鉛彈空糧六十分外再留公費糧六十分以為添修軍裝器具奏銷造冊等費試行一年應否損益再行據實據此臣查各營共計餘剰火藥一千九十斤四兩鉛彈大小五百九十八箇臣俱飭令各營存貯如此每年積貯倘有應用之處於營伍大有裨益又據該署中軍報稱再留添修軍裝公費糧六十分自雍正二年六月起至今年五月止一年已滿陸續收補至五月方全只收過銀四百八十四兩三錢零并造過數目清冊造送到臣據此臣查冊内陸續收補每月有收二三分四五分不等只收過銀四百八十四兩三錢零查臣前奏請將此項銀兩打造子母礮二十位共使銀五百二十五兩三錢五分除將公費糧使用訖尚不敷銀四十一兩銀八百一十四兩二錢零臣按大小各營兵數酌定分給以備公用外臣留銀二百兩以備修理衙署一切公事之費似無不敷之虞其火藥鉛彈各營亦有餘剰飭令加謹收貯伏候命下之日以便備造清冊每年報部存案為此繕摺分析奏聞謹奏報部自應報部若以奉㫖用空糧製辦等語具文則成千古笑談矣雍正五年八月初七日山西太原總兵官臣袁立相謹奏為奏聞事竊臣前因澤州地方有匪人聚衆一案業於據報之初即行奏聞外臣隨飛檄潞澤營㕘將張茂帶兵一百名駐劄澤州協同地方印捕各官緝拏今已陸續獲解犯人焦明山等三十六名聽候欽差同布按二司嚴審外尚有在逃未獲犯人楊副將等一十二名現今澤州多添捕役同汛兵協同緝拏兹據潞澤營㕘將張茂呈報已逃之犯現在協力擒拏澤州地方委係安静查潞安存城兵丁無幾況今正在秋操之時請將撥澤駐防之兵四十名仍留駐澤州其餘帶回操練等因到臣該臣查得現今澤州地方雖係安静但遽將潞澤營叅將并所帶之兵令回本營則止留原駐之兵十名并臣於本年三月間㑹題撥澤之兵四十名共兵五十名把總一員當地方有事之餘恐尚不足以資彈壓臣為地方起見仍懇皇上洪恩或照臣原題案内將潞澤營中軍守備移駐澤州仍將東塢西塢嶺營各撥兵十名協濟澤州或另設守備一員量添馬歩守兵三四十名於地方更有裨益伏候皇上睿裁批示遵行謹奏自必因爾措置不協所以部議不准如果見得透信得真何妨據情再題但不必因此小事遂張大其詞耳至潞澤營原屬緊要守備即係中軍何又分作兩事若必應添設或移駐或添員均非摺奏可了之事朕未洞悉情形如何遽立主見耶雍正六年三月初十日山西太原總兵官臣袁立相謹奏為密奏事竊臣據蒲州協副將薛鳯翼呈為禀報事雍正六年三月初五日本職聞得蒲州崔知州絳州萬知州在臨晉縣緝拏脱逃監犯張臣等一案本職即差中軍守備帶兵赴縣暗中彈壓今據該備禀稱據駐防臨晉縣把總禀稱本月初五日有蒲州崔知州帶領衙役壮丁前赴張村查拏師刑絳州萬知州帶領衙役壮丁前赴角杯村查拏張臣署臨晉縣杜知縣帶領衙役壮丁前赴昝村查拏樊中花張村昝村聚集少壮數百餘人各執鳥鎗刀棍逞兇拒捕殺傷衙役壯丁其角杯村張臣雖未拏獲亦未拒捕等情到職擬合詳報據此臣即飛檄臣標左營遊撃胡海帶馬歩兵丁三百名前赴蒲州臨晉縣地方㑹同蒲協官兵相機嚴拏拒捕各犯外臣思地方一有事故武弁固有㑹緝之責但文員每以武弁粗率無知必須聽其指示即間有才畧出衆自立主見者又輒蹈文武不和之咎所以地方公務毎致躭延今臨晉姦民拒捕殺傷衙役壯丁臣以地方緊要雖經飛咨撫臣去後然不及接准撫臣回咨立即調遣官兵前往相機嚴拏倘官兵一至如再似前抗拒勢不得不為相機𠞰捕如果悔罪畏法即可嚴拏首犯諭解附和人等俟拏獲各犯之日另摺再奏外謹此繕摺奏聞謹奏據石麟已奏過所奏知道了詳慎為之萬不可濫及無辜尤不可姑息隠諱於二村之四達路口當嚴防其脱莫令一人逺颺雍正六年三月十六日山西太原總兵官臣袁立相謹奏為宻奏事雍正六年三月初十日接據蒲州協副將呈報臨晉縣張昝角杯三村拒捕殺傷衙役壯丁一案臣隨飛咨撫臣一面飛檄左營遊擊胡海即帶馬歩兵三百名前赴臨晉地方㑹同蒲州副將相機嚴拏拒捕各犯又遣標員單身齎示前往三村宣布皇恩安撫良衆令各村獻出為首師刑等犯其餘無辜臣當題請免罪等示於官兵未到之先星飛安撫查拏去後兹於本月十六日據臣所差標員回稟把總持示至三村地方民人見示隨將在村之首犯師刑投獻其張臣樊中花實係脱逃村中之人情願四路宻捕投首把總即將所獲師刑帶回蒲協副將交明臨晉縣訖地方已屬寧静并有張昝二村寃詞各一紙呈上等情面稟到臣臣謹將張昝二村原詞二紙錄呈御覽至三村既已遵循撫順將師刑投獻則前調之三百名馬歩兵丁應先撤回二百名仍留遊撃胡海帶兵一百名并蒲州協官兵一百名駐劄臨晉縣彈壓查拏俟陸續拏獲各犯之日聽撫臣審結另題外理合將拏獲首犯師刑并地方寜謐及先撤回兵丁二百名緣由繕摺奏聞謹奏知道了案内雖云姦良不一石麟自當詳細察審但不知二村百姓共有若干户若干名口其中必有向來強梁不法之匪類可細細體訪宻奏以聞雍正六年五月十四日山西太原總兵官臣袁立相謹奏為宻奏事竊查臨晉縣姦民鬧縣一案臣已將遵㫖宻訪户口姓名及地方印官託故他往置若罔聞情形奏聞臣先於四月十四日曽經將臨晉署縣託故他往並不追比亦不躧緝並無印官無慿協拏務嚴飭印捕各官上緊追比犯屬文武協力㑹拏等因飛咨撫臣石麟去後續准撫臣咨覆經行嚴飭在案續又經撫臣另委候補知縣閻鈵前赴臨晉署事聞署縣閻鈵於到任之後即㑹同遊守千把等員親向各村勸令投首并宻行偵緝頗稱盡心兹於五月十四日據遊擊胡海等飛報要犯樊中花已於本月十一日在朝邑縣果子村被縣役拏獲解到蒲州暫覊俟起解日再報等因到臣臣仍飭各員弁嚴行拏緝務期盡獲外理合將拏獲要犯樊中花緣由繕摺奏聞謹奏欣悦覽之爾於此一事料理周宻奏報詳悉甚屬可嘉能如此不欺不隠實心任事庶不負封疆之重寄也朕已擢用爾為提督節制全省矣莫改移今日此志勉為之雍正六年九月十四日山西提督臣袁立相謹奏為奏聞事竊臣據太原營㕘將周三竒呈報太原省城學院衙門内於九月初三日晚被盜有學院發下陽曲縣失單内開皮棉衣服及紬縀等物理合報明等因到臣據此隨經批緝賊贓并飛查被盜確情去後續據該㕘將報稱卑職將被竊之事親問學院據云是夜被竊家下並無一人知覺等情到臣臣可知臣等不能整飭罪無可逭除批令太原營㕘將即速㑹緝賊贓務獲外應俟撫臣查確盜情另疏題㕘疎防緣係學臣官衙被盜特先繕摺奏聞謹奏此事朕已早聞誠如汝奏省㑹之地尚如此他處不問可知矣豈非晉省文武朕擢用得人之明驗歟若又不能剋期緝獲汝等何顔自立朕則不知也雍正六年十二月十五日山西提督臣袁立相謹奏為敬陳查閲情形仰祈聖鑒事竊臣於十月二十六日自平陽起身前赴大同查閱邉兵内如東路營屬之忻州河保得勝并大同鎮標等營伍兵丁盡皆壮健旗械鮮明技藝嫺熟如寧武神池偏關華林水泉殺虎等協營兵馬次之如老營平魯助馬陽方口等營伍兵馬又在其次臣於點閲之際分别賢否一一勸勉訓誡尚有靈邱新平北樓山隂東路五營容臣逐營閲畢於回署之日另行奏聞臣又訪得大同鎮標右營遊撃孟三友於雍正三年間帶領兵丁一百二十名在阿爾泰地方種地於雍正五年將兵丁糧米勒扣四箇半月以補七分收成之數具呈妄報希圗議敘臣亷訪既確即應具疏題㕘但查該遊撃從前任内尚屬清潔此項扣剋係添入地租分數之内實與入已者有間揆情準理扣糧銀給還各兵予以自新以䇿後效或即應題㕘治罪之處伏候皇上批示遵行再臣䝉聖主教養深恩曽無犬馬之報日夜思維慚悚交并臣矢圗報效斷不敢一息稍弛兹當查閲邉兵適臣抱恙未愈臣即力疾起程叨䝉之精神心力實可竭蹷辦事斷不以偶抱微疴輒敢自求安佚但現在尚未全痊亦不敢不以實情聞謹奏覽雍正七年正月二十二日山西提督臣袁立相謹奏為恭謝天恩事雍正七年正月十三日䝉皇上恩賜太醫閻徳富到平并齎賜臣尋骨風珍藥臣叩謝天恩祗領之下隨交太醫遵製藥酒日服二次晚服太醫湯藥一劑雖服未旬日而氣暢筋舒語言歩履便覺大異從前日漸見效即據太醫亦謂收功可必除具本奏謝天恩外謹再繕摺恭謝以聞謹奏覽奏欣悦如獲寳物更當用心攝養一切處不得過用精神待痊愈如初料理亦不為遲何必於病中勉強支持耶必遵朕諭毋違雍正七年三月初三日山西提督臣袁立相謹奏為欽奉上諭事竊臣准兵部劄付内開雍正七年七月二十三日内閣奉上諭聞二月初五日夜山西蒲州府城内道府城守文武衙門三處同日被盜明火執仗刦去衣物等項此事朕巳聞知而廵撫提督兩司何以遲延尚未奏聞伊等所司何事而疎縱廢弛至於如此著廵撫提督等轉飭屬員將蒲州盜犯嚴行緝捕務令全獲儻少有隠飾逾限不獲定將廵撫提督等一併嚴加議處欽此欽遵劄行到臣臣查蒲州副將暨河東道衙門被盜俱係竊賊實未聞明火執仗且於初四日四更時失盜於初五日辰刻即據馬兵劉節同河東道家人在黄河渡口拏獲正賊藍樹竒一名又於本月十三日據霍州千總石鳯鳴協同霍州捕衙楊九經各帶兵壯於辛置鎮拏獲正賊李添才等七名贓賊俱經全獲似應聽文職審擬歸結臣愚昧無知以為事既有著恐煩聖主厪懐是以未經奏明今跪讀聖諭仰見聖明照察無所不周而臣等疎縱廢弛之罪實無可辭臣之惶恐悚慄無地自容伏望聖主鑒臣之愚昧無才所致實不敢有渉隠飾之心格外恩寛䇿臣後效臣惟凛奉天言竭力整飭務期宵小潛消地方安静以仰報聖主深恩於萬一而已臣可勝泥首悚惶敬懇之至為此繕摺謹奏朕所倚賴者惟爾等封疆大臣據實無欺似此隠飾猶言不敢有渉何也責問之下但以愚昧無才四字支吾敗露之後祗以泥首悚惶一句塞責可謂深負朕信任之恩矣案犯既經全獲審明自有發落此後若仍不知痛自改革而以恐煩聖主厪懐等語文飾則罪益不容貸朕所厪懐者内外文武諸臣之朦蔽欺隠耳除此朕有何厪懐之事職為大臣當權其輕重而以逺者大者為務若於些小處愉愉呴呴以為愛君敬主非愛之敬之也適所以悞之也況汝等武夫何必尚此虚套但當以誠實二字對君為正否則弄巧反成拙也誌之雍正七年四月二十四日山西提督臣袁立相謹奏為奏聞事竊照晉省去年所挑車兵二千名臣欽遵諭㫖與撫臣石麟和衷協辦敬謹奉行一年以來車兵俱覺純熟軍容亦覺整齊今臣標左右平陽吉州隰州平垣汾州各營車兵八百名分作二起已於本月二十二十一日起行又太原營車兵二百名與撫標車兵二百名合為一起於前二起過後尾接而行俱由固關大路其大同車兵八百名已定於五月初六等日分作三起就近從北路而行均聖主洪慈遣醫診視臣疾并䝉賜藥賜參恩施稠疊今臣自得參藥調治以來日漸就愈惟歩履言語尚未全痊兹據太醫所云止湏再加調養即恩凡臣有生之年永圗犬馬之報效而已合併奏聞謹奏知汝病愈朕懐深慰然必待全愈朕念方釋也亦莫急於求痊但平心静氣調理日乆自然復元矣同日又奏為要地需人懇留賢員以裨營伍事竊臣前因人才起見請將原任臣標中軍遊擊胡海留晉補用具題請㫖䝉皇上格外天恩准将遊擊胡海陞補臣標中軍㕘将現任中軍㕘将劉成調補廣西提標㕘将但臣㸔得㕘将劉成雖任臣標未乆而營伍之諳練辦事之明敏又屬百不得一之員且現今汾州營㕘将出缺五月而新補之㕘将張朝良已奉㫖留陕出兵尚未到任查汾州府地方營汛甚屬緊要臣不得不再懇聖恩可否将劉成調補汾州營㕘将其未到任之㕘将抑臣更有奏者臣標原任中軍遊撃李順自任臣標四載以來潔已奉公愛兵如子因於五年二月間以陕省兵馬奏銷案内有伊在守備任内領兵駐劄甘肅等處時錢糧未清議令賠補奉㫖解任又於六年九月間奉㫖寛免各在案但自該員解任之後未奉部文知照臣遊擊李順送部引見恭候聖㫖臣謹繕摺恭奏伏乞皇上批示遵行謹奏覽雍正七年十月二十一日山西提督臣袁立相謹奏為恭謝天恩事竊臣標齎摺千總捧到皇上賜臣各色錠子扇墜一匣臣郊迎至署恭設香案望闕叩頭謝恩祗領訖随跪讀硃諭䝉聖主以臣病尚未全好恩㫖諄切臣仰荷洪慈矜憫感激涕零捐糜難報臣服聖主恩賜參藥并賴太醫閻徳富盡心調理自十月以前未病之時每年春秋二季必東西兩路循環廵欽差太醫閻徳富臣應即送回京緣奉諭㫖臣無任感激依戀之至謹奏覽雍正七年十二月初二日山西提督臣袁立相謹奏為請補賢員以勵亷能以禆營伍事竊查大同鎮標右營遊擊孟三友告休員缺邉鎮佐員最為緊要臣看得大同鎮中營守備趙元龍老成歴練又澤州營守備舒連漢仗操守俱好均屬賢能亷幹之員堪以陞補大同鎮標遊撃之缺但查該鎮標右營遊擊非應題補之缺臣不敢冒昧具題為此繕摺恭懇天恩可否容臣將二員具本保送赴部引見恭候聖主欽點一員補授於地方營伍甚有裨益又此二守備員缺亦關緊要㸔得臣標右營千總白世鳯居心誠實弓馬嫺熟請將所遺之守備員缺即以千總白世鳯補授亦屬有益如䝉俞乆臣即另疏保題伏乞聖主批示遵行謹奏既非題補之缺不宜違例具題致啓他省效尤之心果係出格堪膺保薦之員令其來京引見候朕酌定命爾另缺題陞可也硃批諭㫖巻一百三
