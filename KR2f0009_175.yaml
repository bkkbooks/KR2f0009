body:
  text: 欽定四庫全書硃批諭旨卷一百七十五之一硃批嵇曾筠奏摺雍正元年七月初九日兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊臣欽承簡命堵築河南中牟縣決口於六月二十二日起程行至彰德府境聞北岸又復漫溢隨星馳前進於七月初四日至武陟縣木欒店地方初五日閲看銚期營至馬營漫口共十一處即於初六日由沁堤頭閲看秦家厰一帶堤掃工程渡河由滎澤至中牟十里店西臣查得西決口八丈現在鑲築壩臺漸次下掃東決口二十餘丈亦現在鑲築壩臺其勢湧急俟水溜稍減即便上緊催儹下掃堵塞派委隨帶官祝兆鵬朱藻李世傑在西口高文愷張近光馮敬玉朱于宣拖克拖海在東口併協同印河各官無分晝夜加謹防護相機堵塞不得再有沖坍其決口以下祥符尉氏扶溝通許等縣村莊田禾淹沒甚多又祥符之朱仙鎮人煙商賈素稱繁庶亦被水衝巳成一片汪洋臣現在咨明撫臣確查其近處即行酌賑遠處俟查明到日亦即公同委員賑濟以仰副我皇上軫恤災黎至意再河臣齊蘇勒尚未到豫臣現在會同撫臣石文焯並河臣委到人員商酌務期作速將決口修成上慰聖懷謹此先行奏聞伏祈睿鑒謹奏覽奏知道了帶往各員素不諳宣塞之務何能計日成功應仍令向時河官承修將隨帶新員分委協辦往來督催方是不可憑仗一已之見率意主持恐徒糜工料無益於事也用得其人一可當十茍以未經熟練之人期其速竣之效及所築不固又復拆改重修不幾用十而費百耶工程關係甚巨切勿自作聰明特諭雍正元年七月十八日兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊臣欽承諭旨堵築中牟縣漫決口岸其西口加謹進掃已於本月十四日卯時合龍現在鑲墊邊掃建築月堤以資保固東口亦現在相機進掃俟水勢稍減即便催儹堵築務期作速修成所有西口合龍日期臣謹會同總河臣齊蘇勒河南撫臣石文焯具摺奏聞伏祈睿鑒謹奏若不度量水勢而惟急於堵築恐徒多費終無裨益當與經歷既久熟悉工務者詳商妥酌行之同日又奏為欽奉上諭事竊臣欽承諭旨堵築中牟決口查中牟縣屬官堤危險之處尚多臣一面嚴飭印河各官加謹巡防凡有險要即便加幫修治以為未雨之防再訪查豫省河工廢弛巳久兩岸官堤約長八百餘里河水旁泄則河身漸高河灘淤澱則河堤卑薄一遇伏秋暴漲在在危險斷非簣土束薪略加補葺便可濟事但印河各官因向無額設歲修錢糧未免因陋就簡茍安目前及至衝決則募夫辦料費用浩繁而村莊田廬之淹沒又不可勝計臣愚以為與其補救於後費多而工難毋寧預防於先費省而工易伏乞我皇上敇下河撫兩臣確查豫省兩岸官堤估計夫料於秋汛後遴委幹員協同辦理普律加幫寬厚堅實其險要處所應如何分别修築工完之後應如何看守防護聽河撫兩臣詳加酌議務期周備完固縱使汛水漲發庶幾有備無患於河道民生均有裨益臣不揣冒昧謹具摺奏聞請旨伏祈睿鑒謹奏修防各事宜已有旨矣遣張鵬翮來豫正為此舉雍正元年八月二十四日兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事本月二十二日中書牟瀜交到吏部咨文內開雍正元年八月十四日怡親王傳旨聖祖指示釘船幫挑水壩既應保固即當從此壩尾接至遙堤若從秦家厰北壩尾接至遙堤恐其兜水秦家厰月堤與其在外幫築不如從中填實更覺堅固將幫築月堤與從中填實工價估計著舅舅隆科多大學士張鵬翮會同派一員前往並圖交與嵇曾筠齊蘇勒石文焯議奏欽此欽遵等因到臣跪讀之下仰見我皇上至聖至明洞悉河道情形千里之外如同燭照查釘船幫挑水壩應加保固但建築格堤若從秦家厰北壩尾起誠如聖諭必有兜水之虞應即從釘船幫壩尾接至遙堤庶河水有所捍禦銚期營一帶村莊可賴保全再查秦家厰月堤在外幫築工價似屬稍減但每年修理為費亦多況兩面皆水龍門口掃工幾及百丈沁黃交漲時不無意外之慮若從中填實堤工大有倚靠人力容易展施洵為一勞永逸之功我皇上睿謨周備盡美盡善非臣等愚昧所能見及除建築格堤並估計月堤從中填實之處容臣會同河撫兩臣詳加勘議再奏外所有臣接準部文欽奉上諭事理合先繕摺奏聞謹奏凡如此等建築之舉但應各出已見講求適當之方期收後效切勿涉於迎合阿順非朕所樂聞也知之志之雍正元年九月二十五日兵部左侍郎臣嵇曾筠河南巡撫臣石文焯謹奏為呈報事雍正元年九月二十二日據南河同知劉永錫呈稱本月二十日起北風大作水乘風勢漫溢鄭州來童寨民堤直射南岸中牟縣楊橋官堤搶護不及於二十二日子時漫開又據陽武縣丞謝球報稱鄭州知州張鋐誤聽來童寨居民於本月二十一日夜挖陽武民堤放水致漫溢楊橋官堤等因到臣等隨即親詣勘視見決口約寬十餘丈即委郎中祝兆鵬管河同知劉永錫等率領二俱注射楊橋官堤以致漫決楊橋在十里店上流其漫水俱從賈魯河南下現今秋禾已經收穫時候才開民堤放水不料夜半官堤漫開等語查鄭州來童寨地方逼近河濱因九月二十等日風雨馳驟河水湧決民堤致淹廬舍州民楊四等雖被淹情急不合擅挖陽武民堤放水該州不能嚴行禁止咎亦難辭除疏防各官俟查明題參外所有漫決情由臣等謹據實奏聞伏乞睿鑒謹奏有是理乎皆緣汝等大吏惟假仁假義是務素不申明法度故爾地方官民毫無忌憚致令無限金錢填於巨浪不知此等耗費當以何項抵補也雍正元年十二月十五日兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事雍正元年十二月十二日接準工部咨開為飛報漫口合龍緣由奉旨先聞中牟縣堤口漫決朕念切民生深為軫懷覽奏中牟縣十里店東口已經堵築合龍斷流知道了但係隆冬所築工程仍加意防守保固該部知道欽此欽遵臣現在率領隨帶各官住宿堤頭晝夜防護月堤已經告成並於十里店上下堤岸加幫高厚鑲墊風掃以資捍衛但臣來往河濱竊見黃河自中牟以下淤澱更甚有水處僅深三五尺不等間有河身竟成平陸惟兩旁支河通流環繞堤根多被沖刷十里店一帶地形低窪黃水滙聚楊橋指日合龍水勢必更加長誠如聖諭須加意防守保固臣會商河撫兩臣必得下流疏通方可遄行無阻隨委員於黃河正身淤塞處所挑挖水漕計長三里有餘引黃水正流自然衝刷成河既有去路可免逼注堤根之患為費無多似屬有益所有接準部咨奉旨保固十里店工程事理並挑挖河身淤淺情形理合具摺奏聞伏乞睿鑒謹奏身在河濱相度情形酌量料理何至有舛謬之失且爾等皆係朕所信用之人料必不誤國家事也勉之同日又奏為奏聞事竊查黃河兩岸加幫堤工需用浩繁不便多費庫銀當為設法興修臣訪聞得豫省捐納積穀事例內有羡餘約計三十餘萬兩可為幫築堤工之費因目下初捐尚未收足而兩岸須及早修理不能久待合無先將地丁錢糧動用給發俟捐款收足之時即將羡餘補項以河南之物力充河南之公用庶庫銀不致多費於河工亦大有裨益矣謹據臣訪查愚見所及繕摺奏聞伏乞睿鑒謹奏凡事但宜據理直行奚庸如是周折用所當用國帑亦何惜之有所奏知道了與撫臣詳籌妥計為之雍正二年四月初九日副總河兵部左侍郎臣嵇曾筠謹奏為恭謝天恩敬請聖訓事竊臣一介庸愚至微極陋蒙皇上天恩俞允廷議暫授以副總河之銜專管豫省河務聞命自天感懼交迫誠恐庸才不能勝任具摺陳情復蒙敕下王大臣議覆仍照前議奉旨依議著部行文將嵇曾筠奏摺一併發去欽此欽遵工部備咨到臣隨恭設香案望闕叩頭謝恩訖伏念臣智識淺短河務關係重大懇祈皇上訓示方略俾有遵循以圖黽勉趨事仰報高厚於萬一謹具摺恭謝天恩敬請聖訓伏乞睿鑒謹奏具本奏謝方始合體即明白回奏二摺亦當由部轉達今授爾副總河之職身膺地方責任遇應具疏題請之事照例具題不可專用密摺非同從前欽差之比矣雍正二年閏四月十三日副總河兵部左侍郎臣嵇曾筠謹奏為聖主恩施至渥微臣感激難名謹伸謝悃仰祈睿鑒事竊臣仰荷皇上天恩授以副總河之銜復蒙軫念若無標下官兵難供驅使特諭王大臣議撥河南撫標兵辨並分給河營兵目睿慮周詳隆恩稠疊聞命之下感激涕零犬馬有知捐糜莫報惟有夙夜祗愼督率修防以圖勉竭愚忱今武陟縣釘船幫御壩尾格堤巳經築成現在辦料加鑲護掃以資捍禦其餘兩岸工程要處先為加謹儹修所有微臣蒙恩賞給標兵除另疏恭謝外謹具摺奏謝天恩伏乞睿鑒謹奏知道了伏汛將屆其加意防禦毋忽同日又奏為奏聞事竊臣前以河工需費浩繁豫省捐納積穀事例內有羡餘銀兩可充加幫堤工之用具摺奏聞欽奉硃批臣跪讀之下當即遵照密商時因部文未到捐例初開一時不能定議至四月撫臣武闈事竣方得會商據云原擬每穀一石加費三錢五分撫藩二錢州縣一錢餘五分為倉厫苫蓋之費今恐官生觀望不前與藩司酌議將州縣一錢減去止有撫藩二錢約共計二十萬兩可充公用臣復細加察訪無異謹據實覆奏倘州縣將來另增使費臣一有聞見自應入奏謹具摺奏聞伏乞睿鑒謹奏此項羡餘前據石丈焯奏請以之填補地方虧空今若一旦歸公為河工之用恐任其事者於此外更為多索則必致苦纍官生胥觀望不前矣斷不可行仍應動用正項為是雍正二年五月二十一日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事雍正二年五月十七日撫臣石文焯差齎欽奉皇上硃批條議辦料募夫奏摺諭旨有人奏此一二事覽之不勝駭異朕如此推心置腹任用爾等凡有纍民之舉槩令據實入告而爾等竟若罔聞政令乖方一至於此朕惟仰天淚下亦無言可諭爾等也石文焯嵇曾筠田文鏡同看欽此臣跪讀之下惶悚汗流置身無地臣質本庸愚未能預先陳奏荷蒙聖諭嚴切臣罪尤深敢不據實奏聞伏查豫省河工料物向例每斤給價一釐大半車運交工不比江南有官造浚船河兵撑駕之便所給料價未免不敷祗緣奏銷漕規遵行已久臣初到河工不敢遽更成例每見各屬採運艱難是以上年於預備料物奏摺內請量給車價以資運送現今各州縣承辦歲搶修料物即於本境採買運送猶為省力惟武陟中牟二縣工程需料較多臣會同撫臣細加商酌若盡於附近鄰邑購辦恐滋擾纍故一面委員照時價非若從前辦料專責成於州縣也我皇上軫念民艱無微不照臣謹仰體聖懷悉心籌畫以紓民力嗣後辦料總在價賤時委員多購設厰堆貯況目下二麥豐登雨澤均調將來秋禾成熟沿河州縣料物自可早辦無庸取給他境而里民辦運之弊不禁自除矣再查上年漫口工程緊急用夫衆多不得不賴鄰邑協濟今加幫募夫役無多汛水將至必資里夫搶築有田之家雇覓充應除所挑之方價領去外仍要田戶按日幫貼查應募之夫自食其力不憚勤勞每日二名可挑土一方里下之夫強弱不齊希圖幫貼每日四名始挑土一方人數既多則方價自覺其少臣築亦易見功矣至土方因取土遠近分别估計有二錢四分一錢六分一錢二分之不等除司庫照例扣存加一節省外該州縣領帑築堤有照方全給者有因係水方并節省銀兩悉行借給而工猶未完者有原係旱方先發九分六釐餘一分二釐為行硪澆水做邊並雨淋塌缷修補殘缺之用者總緣千里長堤土性不同地形逈别自難一律伏念我皇上注念河防發帑數十萬金以圖萬世永賴民生關係錢糧重大臣惟有冰兢自矢務期上不糜帑下不纍民如有官役侵漁臣即具疏參核究治斷不聖主任使微臣之至意為此據實奏聞伏祈皇上訓示謹奏覽奏俱悉同日又奏為欽奉上諭事竊臣蒙皇上硃批臣奏摺欽奉諭旨知道了伏汛將屆其加意防禦毋忽欽此欽遵伏念臣庸鈍微才謬膺河工重任夙夜祗懼不敢一刻稍懈況今伏汛將至荷蒙睿慮周詳訓示諄切惟有益加惕勵恪勤仰慰聖懷目下沁黃水勢雖覺稍長尚未湧急臣上年奏請挑挖倉頭對岸引河已於本月十六日竣工候水長風便之時即將河口相機開放俾由西北順達東南以緩北岸頂衝之勢其釘船幫陟各工稍有就緒即星馳南北兩岸查催堤工加謹修防務期有備無患永慶安瀾所有欽奉諭旨緣由理合具摺奏聞謹奏凡事惟盡人事以聽天耳然非忠誠二字末由感格上蒼神明之賜佑況河流浩瀚遷變無常默默中實有主之者更當竭盡忠誠以仰邀佑助方克奏底定之功也勉之雍正二年六月十八日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事雍正二年六月十一日臣於武陟工所跪接皇上硃批臣奏摺欽奉諭旨凡事惟盡人事以聽天耳然非忠誠二字末由感格上蒼神明之賜佑況河流浩瀚遷變無常默默中實有主之者更當竭盡忠誠以仰邀佑助方克奏底定之功也勉之欽此臣凜遵訓示感激服膺惟有矢竭忠誠益加小心勤慎以仰副聖主朂勵微臣之至意竊查伏汛以來沁水於五月二十七八日長發幸賴皇上指示建築格堤加鑲護掃水勢漫至堤根得資堵禦仍由大河東注六月初二三日黃水甚長俱從南岸引河順下不致逼趨北岸釘船幫御壩秦家厰一帶工程安穩詹家店馬營等村從前被水之處今已遍種禾苗人民樂業兹六月十九日秋汛方屆武陟各工最關重大臣祗遵聖諭加謹修防不敢稍懈再查自滎澤以下水趨南岸鄭州中牟一帶俱屬緊要自中牟以下水又折趨北岸陽武地方尤屬要工俱經料理下掃搶築臣往來查視督率道廳印汛各官並多派效力人員住宿堤頭竭力儹修務期保固以盡職守所有伏汛水勢平穩情形除會疏題報外謹具摺奏聞伏祈睿鑒謹奏前已有旨諭石文焯矣其共相勉力以保固秋汛雍正二年六月二十五日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊查黃河伏秋兩汛寧夏例有水報每長一尺豫省約有三倍自伏汛以來據寧夏同知報稱五月二十三日水長一尺五寸又六月初七日水長一尺七寸臣於武陟工次約計黃水到時雖長四五尺不等幸隨長隨消且沁黃諸水次第而下不致並漲故兩岸堤工皆得修守平穩實由我皇上福庇所致今秋汛方來臣率同在工人員晝夜巡查加謹防護不敢稍懈所有近日河水安瀾情形理合具摺奏聞伏祈睿鑒謹奏今夏伏汛原不為大一切堤工幸俱平穩兹秋汛方來水勢諒非前比須當竭力保護已降有諭旨矣同日又奏為奏聞事竊臣查勘堤工於六月二十二日至祥符縣南岸時值學臣歲試開封府屬聞封邱縣生童不肯應考隨查詢緣由知因該縣唐綏祖以所屬堤長工險汛水正當長發亟需搶築一時募夫無多暫令各社添雇夫役不分儒宦戶一體均出徵收錢糧亦不分儒宦戶槩用滾單挨催以致生童嘖有煩言又細訪封邱東西兩社該縣以西社連歲歉收每田四頃雇夫一名東社上年有收每田二頃雇夫一名至催徵錢糧亦於東西分别緩急其形迹未免偏向生童等淺見較量懷怨益甚是以學臣歲試之時止有西社生員二十三人聽考東社並無一人應考甚至搶擡童生卷册欲借多人附和希圖仍分儒戶名色不與齊民一例納糧當差視其舉動殊屬要挾官長究其隱微實由性愚見小所致嗣經撫學兩臣出示曉諭文童已於本月二十五日考試訖生員亦陸續齊集遞呈求考但事因雇夫催糧起見以致罷考有干功令除撫臣會同合詞具題外臣謹將查訪緣由據實奏聞伏乞睿鑒謹奏朝廷設學士子讀書原期明理達義性愚見小者流何自而來耶是所謂五穀中之荑稗四民中之蟲蠧若於此稍涉袒庇不行執法究治則亦非孔氏之徒矣雍正二年七月二十二日副總河兵部左侍郎臣嵇曾筠謹奏恭請皇上聖安朕安所奏堤工一摺並安瀾圖一切規畫悉合機宜朕展閲之際憂懷業已釋半仍留中細覽卿其更加詳慎勤督修防以期克底一勞永逸之效同日又奏為欽奉上諭事雍正二年七月初四日臣於武陟工所跪接皇上諭旨欽奉硃批前已有旨諭石文焯矣其共相勉力以保固秋汛欽此欽遵又於本月初十日撫臣石文焯鈔録欽奉皇上硃批堤工平穩大慰朕懷六月初間京城四日夜大雨張家灣一帶水長數丈堤岸幾處潰決朕為豫省拳拳在念無日不神馳於黃河南北兩岸將半月餘矣仰託穹蒼垂憫河靈默庇伏汛竟保無虞朕心歡暢筆不能宣兹秋汛在即更宜預事綢繆竭力防禦再加以忠誠之心上格神明佑助今歲得保安全逮秋冬之際相度水勢之趨向培補堤岸之卑薄謹守三二載正流日漸通暢水由地中行將來永慶安瀾上可釋朕躬宵旰之憂下可免億兆昏墊之苦是全賴卿等實心任事服勞盡瘁之力耳克勤克慎毋怠毋忽將此諭亦令齊蘇勒嵇曾筠知之欽此臣伏讀之下仰見我皇上注念河工時勤睿慮本誠敬以格蒼穹是以伏汛安流工程平穩復諭勉臣等竭力保固秋汛臣惟有敬體皇上訓示忠誠二字竭盡愚忱修理防護誠如聖諭謹守三二載正流日漸通暢水由地中行將來永慶安瀾上以釋我皇上宵旰之憂下可免億兆昏墊之苦目下正當秋汛黃水時有長發釘船幫御壩秦家厰一帶工程臣督率在工員辨晝夜修守不敢稍懈其兩岸險要處所勢不容緩者巳經會同河撫兩臣估計題請一面飭令廳印各官多備料物召募人夫加謹辦理至秋汛後水勢既定凡應行培補事宜再為詳加相度以次條奏所有欽奉上諭緣由理合具摺奏聞伏乞睿鑒謹奏今歲豫省安瀾之慶實出望外可見誠之格天感神猶如立竿見影也不敬不慎得乎勉之雍正二年九月初一日副總河兵部左侍郎臣嵇曾筠謹奏為恭報秋汛情形工程平穩仰慰聖懷事竊照入秋以來黃水疊長臣夙夜氷兢凛遵皇上訓諭敬謹修防兩岸堤工往來巡視遇有危險處所即飭加謹保護查南岸鄭州之藍家屯薛家寨中牟縣之拉牌寨穆家樓司家口祥符縣之老君堂瓦子坡一覽臺北岸陽武縣之大賔鴈李祥符珠水牛趙封邱之小桃源蘭陽縣之四門堂耿家寨儀封縣之堌陽堤三家莊等處皆因民堤浸溢流至官堤水勢幾與堤頂相平當經飛飭印河各官竭力搶護得保無虞惟歸德府屬之虞城縣於八月初四日因黃家莊民堤漫溢將待賔寺迤西大堤漫決丈餘幸內有月堤為重門保障得以捍禦水勢並無泛溢該縣令錢啓心等捐辦料物率領人夫奮力搶築隨即於八月十五日堵閉完工臣復親馳查勘無異當此秋汛異常泛漲大堤以內毫無傷損南北兩岸胥慶安瀾皆賴我皇上福德盛隆至誠感召是以河伯著靈堤工保固除目今霜降屆期臣循例會同河撫兩臣另疏題報外所有臣查看秋汛情形工程平穩緣由理合繕摺具奏恭慰聖懷謹奏節令巳屆霜降堤工幸保平穩朕悅懌之懷筆不能悉此皆卿等勤慎率屬一誠感格神明之所致何乃歸功於朕耶同日又奏為欽奉上諭事雍正二年八月十二日臣於武陟工所跪接皇上硃批臣恭請聖安奏摺暨欽奉上諭奏摺奉有硃批諭旨竊照黃河兩岸一切修守事宜仰賴皇上指示周詳是以伏秋兩汛水勢雖長皆幸保固平穩欽承諭旨誠之格天實如立竿見影不敬不慎得乎勉之欽此臣跪讀之下倍增凛惕惟有益勵愚衷加謹修防殫補偏救弊之忱圖一勞永逸之效以仰副聖主訓勉之至意於萬一耳所有奉到硃批緣由謹具摺奏聞伏祈睿鑒謹奏朕與卿等交相警勉方期有濟耳雍正二年十月初二日副總河兵部左侍郎臣嵇曾筠謹奏為萬壽昌期日近微臣戀主情殷敬效嵩呼兼陳蟻悃事竊臣生逢聖世受恩最深奉差在外一年有餘身羈工所心戀闕廷雍正二年十月三十日恭遇皇上聖誕臣分宜趨侍鵷行隨班拜舞祗緣加幫兩岸工程堤長帑多實係國家萬年鞏固之基臣往來督催乘此天氣晴和上緊儹築未敢擅離職守惟有恭設香案遙望九重敬祝聖壽無疆伏念長至以後節氣沍寒難施畚鍤河務稍暇一切應行善後事宜必得面請聖訓方能恪守遵循仰祈天恩允臣所請於臘月初旬俾得單騎減從赴京陛見往返祗須一月工程原可無誤而犬馬戀主愚忱亦得藉以稍慰矣臣未敢擅便謹具摺奏聞恭候皇上敕旨遵行謹奏歲暮天寒何必徒勞往返據云長至以後畚鍤難施正當乘時督運料物不應遠離工所況各項事宜俱經諭明已可次第遵循亦無覿面請旨之處陛見之行今冬且止雍正二年十月十八日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊查豫省兩岸加幫堤工目今天氣晴明人夫輳集臣往來催儹并委廳汛各官及挑選效力人員協同州縣分投幫築現在報竣之處已多雍正三年所需歲搶修料物趁此年歲豐收民間秫草堆積之時及早購辦先事預防方無貽誤臣巳嚴催各廳縣據實估計造册會題一面先行管河道酌量給發銀兩乘時採辦以便於歲前挽運其倉頭口引河業經沖刷深通水勢順流自西東注而北岸釘船幫秦家厰一帶俱巳淤成灘地播種麥苗臣因查勘應行培補疏濬事宜乘船來往見兩岸居民咸歡呼踴躍歌咏光天化日頂祝萬壽無疆臣目覩民情安樂益賡聖澤高深不勝忭舞之至理合具摺奏聞伏祈睿鑒謹奏引河深通秦家厰一帶淤成灘地各情形誠堪欣幸此奏與在廷王大臣共閲亦莫不羣然稱慶一應善後之䇿勉為之雍正二年十一月初三日副總河兵部左侍郎臣嵇曾筠謹奏為謹陳管見仰祈睿鑒事一查豫省修築堤工之定例每土一方給銀一錢二分內除加一節省外實給銀一錢零八釐臣恪遵定例批令管河道照數給發在案但細加採訪平易工程每方九分六釐可以敷用似應於扣存加一節省之外再扣加一節省留存河庫作正項支銷倘有難做之工及取土甚遠并買土搶險者責令管河道親加察核酌量加增庶帑項不致虛糜而工程亦免誤纍矣一河工錢糧不比州縣黃流泛漲呼吸變遷有昔險今平今平忽險者有突遇危急所用銀兩浮於原估之數者亦有不及題估而急需儹做難緩時刻者事當倉猝勢若救焚不得不多用料物金錢移緩就急竭力搶護以保運道民生若執一而不變通則該管各官恐有賠纍或致臨事畏縮貽誤非小臣愚以為凡一切工程或有昔險今平者據實扣除或有今平忽險及水勢洶湧搶救銀兩浮於原估者據實題銷如有緊急險工難緩時刻者一面題估一面通融接應惟在臨時相機修防管河道嚴加察核毋許冒破庶緊急工程不致坐失機宜矣一柳枝荻葦為河工第一要料豫省堤園柳株歲久癭枯更兼連年險工取用採伐殆盡臣查黃河兩岸濵河處所多有新淤灘地儘可種植柳枝荻葦可否行令地方官逐一淸查其未經升科之灘地或有種荻一頃或有種柳千枝實能成活濟工者驗實詳報咨部官則給豫紀録民則給豫頂帶榮身則人皆踴躍二三年間荻柳蕃盛而歲修購料銀兩可以漸減矣至現今一切堤占地畝并取土挖廢坑塘合無仰請聖恩俯賜循照江南之例俟堤工告成之後行令地方官逐細查丈蠲除錢糧亦留以栽柳種荻則所産愈廣在朝廷普寬大之恩小民免虛糧之纍而物料所出當不減於正供所入矣一豫省原額堡夫因臣上年奉差到工往來堤上見其蹤迹寥寥有名無實且不諳簽樁下掃是以議請裁去循照江南之例添設河兵駐工防護庶為有濟荷蒙皇上聖明特諭調撥江南河兵來豫修守隨經河臣齊蘇勒抽調十河營兵一千名千把總六員赴豫當同臣等擇其險要之處分派安插訖但歸德府屬考城商邱虞城三縣不敷分撥原未安兵今值冬季裁去堡夫則兵夫俱缺乏人防守似應再於南工調兵二百名分令駐防庶工程大有裨益矣以上各條臣一得之愚不揣冒昧具摺奏聞是否可行伏祈皇上訓示謹奏九卿速議具奏其中堡夫一節前議原未周詳再加斟酌妥確奏聞雍正三年正月初四日副總河兵部左侍郎臣嵇曾筠謹奏為運河暢流漕艘遄進謹據實奏聞仰慰聖懷事竊照漕運上關天庾必須儹行無阻方獲依限抵通豫省漕糧連年遲滯致厪宸衷臣蒙皇上天恩任使駐劄河南逐細查勘知運河有淺澀之處亟須設法疏通隨以謹查丹衛之源流等事摺奏奉旨九卿詹事科道速議具奏當經九卿等議覆奉旨依議速行欽此欽遵於雍正二年十一月二十二日接準部文遵即移咨直督豫撫會同查議在案今仰賴聖主福庇百靈效順運河水勢經冬暢流所有一切泉源俱委官查察不敢阻遏而開歸道沈廷正亦率領辦漕各官踴躍趨事克副冬兌冬開之期各幫糧船於上年十二月二十七日盡數催出衛輝府境今巳從濬縣湯陰內黃一路銜尾前進較之往年甚早臣復飛飭沿途印汛各官因地制宜刨淺築壩竭力催儹務期通行無誤合先具摺奏聞恭慰聖懷謹奏覽奏運河暢流豫省漕艘巳於歲底盡數出境較之往年實屬遄速不但朕懷深為慰悅即在廷諸王大臣亦皆歡忭之至同日又奏為欽奉上諭事竊照河工動用錢糧工完之日例應逐細查核造册題銷以淸庫項臣蒙皇上天恩授以副總河之職自雍正二年閏四月接準部文受事以後一切工程現在綜理除御壩雁趐新建挑水壩及新開引河等工巳經題銷在案餘俟兩岸各工完日即當據實查察陸續會核題銷外又有雍正元年堵築十里店漫口工程荷蒙皇上差臣赴豫督修欽奉上諭動用正項錢糧事完之日查核銷算臣亦現在嚴催經手各官據實造册詳報以憑察核會題至於堵閉楊橋漫口奉旨交與河撫二臣修築之工所用銀兩俱由撫臣批給且係原任鄭州知州張鋐賠修將來追賠完項事屬撫臣衙門專管并雍正元年馬營等案已做未銷各工俱係臣未奉簡命以前之事既未經手錢糧又無詳報檔案似應仍聽撫臣查案協同臣等會核題銷庶工程錢糧俱得淸楚矣臣因事關銷算錢糧不敢不加意慎重理合據實奏明伏候皇上訓旨遵行謹奏河工錢糧巡撫固不可攙越然以為未曾經手遂乃槩行諉缷河臣亦屬不可爾等自應會商確當公同具奏為是咸似此各抒已見密摺陳奏朕不洞達情節殊難批諭雍正三年二月十六日副總河兵部左侍郎臣嵇曾筠謹奏為道員心驕性僻掣肘抗玩據實陳奏仰祈聖鑒事竊照河工關繫重大如有需用錢糧刻難容緩理應隨批隨發方無貽誤欽蒙我皇上軫念運道民生不惜百萬帑金大加修治又添設歲搶修銀兩預備料物臣蒙恩管理堤工欽奉敕諭開載先事豫圖通融計處率領河員相機度勢盡心料理不得推諉亦不得互相掣肘煌煌聖訓夙夜凛遵今管河道陳世倕心驕性僻見識糊塗且倚恃科員抗違掣肘官民交怨夫役離心恭蒙皇上明見萬里無微不照臣敢不據實陳奏上瀆天聽伏查河工物料緊要誠如聖諭必須年前預備方不誤緩急之用臣於雍正二年十月間節檄飭知給發購料世倕竟以庫內並無此項銀兩支給詳覆臣隨咨商撫臣田文鏡飭令暫於河庫項內通融給發俟會稿題請撥還去後世倕因循抗延歲內止發十分之一臣恐遲誤復經疊催始於今春陸續報給十分之三四各州縣因發銀遲滯至今尚未運足萬一水漲貽誤非小世倕之抗玩者一也再查武陟詹家店等處未完工程屢飭找發銀兩儹築報竣世倕到任以來並不發銀以致夫役星散停工待帑臣復屢檄嚴催置若罔聞即兩岸歲修工程亦因循觀望世倕之抗玩者二也再者黃流水勢呼吸變遷全在因時補救一有蟄陷即宜鑲墊一遇報險立刻搶護所有堆貯料物惟在收支有數做工有據查驗明白弗致糜費據實開銷今世倕不論工程緩急混行嚴飭各屬凡一草一木必須批準方許動用不然即著經手各員賠補以致屬員互相畏縮查黃河兩岸千有餘里若必俟河道批允後方敢搶築恐文書往返迢遞稽延猝遇危險屬員畏懼賠纍勢必遲回觀望坐失機宜倘有遲誤補苴何及世倕之不諳河務緩急俱如此類其抗玩者三也如此呼應不靈糊塗掣肘不肯通融預備若遇伏秋危險或致周章僨事臣受恩深重臣之一身一家有何足惜萬一貽害於運道民生則臣罪愈重是以不避嫌怨據實入告除將辦料遲延情由另行恭疏奏明外為此繕摺具奏伏祈皇上睿鑒謹奏該部嚴察議奏速行文與田文鏡撥河南司庫錢糧五萬兩交與嵇曾筠速速相機料理佟鎮調補管河道其陳世倕著問田文鏡如可用調補南汝道如無可取發回交部嚴加議處堤岸少有疏虞將嵇曾筠亦從重議處雍正三年三月初一日副總河兵部左侍郎臣嵇曾筠謹奏為恭報桃汛平穩仰慰聖懷事竊照豫省黃沁兩河今歲桃汛天氣晴和水勢微長所有南北兩岸一切險要工程俱各平穩至歲搶修料物欽蒙聖諭嚴切臣惶悚無地一面嚴飭管河道速發銀兩一面檄催承領各官將巳辦者及早運工未辦者立即購運務期克副修防之用不致有誤其一切歲修掃壩工程已飛飭各屬即日興工逐一相機修理臣往來督催弗敢稍懈謹將桃汛水勢工程平穩情形據實奏聞上慰聖懷伏祈睿鑒謹奏朕聞黃沁兩河桃汛水長時時繫念今覽此奏方釋然矣同日又奏為祥符河勢南趨亟請挑穵引河以順水性仰祈睿鑒事竊查祥符縣南岸回回寨對過北岸官路李家地方淤長大灘直出河心以致河勢盡趨南岸雍正二年伏秋水漲衝射回回寨老君堂等處沿河一帶皆成巨浸村莊茅屋多有被淹堤根拖溜甚屬危險且係單堤並無外護切近省城關係甚重臣乘船往來細看北岸形勢并訪之土著士民知北岸官路李家一帶原係舊日黃河故道厯年淤塞以致灘嘴日長河流南射臣詳加勘視應由北岸舊回回寨起至官路李家舊河身處挑穵引河一道引溜直走俾成東西之勢不特老君堂等處居民免遭水患耕鑿可安而堤工亦得保固於城社民生均有裨益隨經檄飭管河道廳印汛各官公同丈量計長三百四十丈估計土方工價共需實銀三千二百兩有零應請於司庫動用題銷臣一面會同河撫二臣恭疏具題請旨外謹繪圖貼説進呈御覽伏祈皇上睿鑒施行謹奏覽奏及所繪圖式挑穵引河之見似屬合宜但不知北岸官路李家一帶與老君堂等處地形高下何如耳俟齊蘇勒到豫與之商酌或應挑河抑或建築挑水壩詳籌妥計而行雍正三年三月二十六日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊臣於雍正三年二月二十九日跪接皇上硃批臣等為遵旨公奏事奏摺請將豫省河工錢糧由副總河查核會題緣由欽奉諭旨知道了欽此欽遵臣伏念錢糧關係重大款項必須淸楚查豫河工自武陟漫口之後水不歸槽河淤堤矮處處危險多有事在倉猝給過銀兩做過工程而未經歸款者亦有移緩就急將此工錢糧通融彼工搶護者今據布政司管河道查鈔檔案册報前來內中頭緒紛繁款項多有未淸皆在臣題請銷稍有朦混浮冒立即據實核減參追務使絲毫無浮以淸帑項除一面恭疏題明外合先繕摺奏聞伏祈皇上睿鑒謹奏此等具題事件總由該部察核亦可無庸摺奏同日又奏為欽奉上諭事竊臣欽遵諭旨於三月初八日自武陟起程前往兩岸各工相機料理已經奏明在案臣一路查勘現在堤工俱加幫高厚河底日漸刷深循流順軌非復從前景象伏查兩岸遙月格堤原於雍正二年題明俟過桃伏汛後再為確估興修內有首險處所上年秋汛異漲時水與堤平竭力搶護方保無虞今伏汛又將屆期自應乘時早為修築況入春以來雨澤鮮少風信頻發久晴恐有久雨或當伏秋之交大雨時行水勢陡長亦未可定臣謹率同道廳印汛各官逐細相度適值河臣齊蘇勒來豫面同商酌確估將應行修築之月堤等工除一面恭疏會題外一面發帑募夫儹工以保伏秋凡有補偏救弊之事臣俱細察機宜悉心料理務期堤工鞏固仰慰聖懷臣於本月二十六日已回武陟工次所有查勘工程相機料理緣由理合遵旨具摺奏聞伏乞睿鑒謹奏觀爾於一切諸務每多預為之地及至臨時或反失誤機宜從來切於私者則緩於公騖於遠者則忽於近斯亦必然之理未能國爾忘家大都不免此病雍正三年五月初九日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊臣為祥符挑挖引河摺奏欽奉硃批臣跪讀之下仰見我皇上睿慮周詳愼重河防之至意臣謹會同河臣齊蘇勒遵旨前往細看形勢其地身西高東下開穵引河頗屬順利據齊蘇勒詳加酌議應將河頭往西移上三十丈以迎水勢復於南岸建築挑水壩一座挑溜逼入引河俾無旁泄當即遴委諳練河員領帑募夫挑穵興修於四月內完工今乘水勢長發風色順利於五月初七日將引河相機開放仰賴聖主精誠感格河瀆效靈河頭一開大溜掣入奔騰東注勢若建瓴頃刻之間河頭至河尾沖刷寬深水勢直下暢流無阻現在民間重載大船俱由引河遄行説此水歸中泓祥符回回寨老君堂一帶堤工及居民房屋可免浸刷之虞安瀾有慶童叟歡呼莫不感頌皇恩臣不勝踴躍歡忭之至再查目今甘霖時沛黃水日漸長發幸皆隨長隨消兩岸工程平穩臣凛遵聖訓惟有痛加奮勉敬謹辦理竭力修防永保堤工鞏固謹繕摺奏聞仰慰聖懷伏祈睿鑒謹奏據奏引河開放大溜奔注知道了即今伏汛屆期一切工程其殫心竭力督率修防仰蒙上蒼垂庇能保無虞則一二年間河身逐漸刷深永無汛濫我君臣庶可以高枕無憂矣勉旃勉旃同日又奏為欽奉上諭事竊照豫省兩岸堤工荷蒙皇上發帑修築臣因慎重錢糧細加採訪知平易工程每土一方給銀九分六釐可以敷用前經奏明在案今於五月初二日接準部文欽奉俞旨嗣後豫省工程每土一方給銀九分六釐以為定例其難做險工取土甚遠者於估計之時責令管河道親加查核酌量加增不得浮冒外但臣查從前雍正二年加幫堤工雖據領帑陸續報完內有平易之工亦應追繳加二節省現在檄飭管河道逐細查勘分别難易凡有應扣加二節省之處嚴行扣追繳庫以淸帑項所有準到部文遵行緣由理合先行具摺奏聞伏祈皇上睿鑒謹奏此等接準部文照例具題事件又無繁難掣肘密請訓示處何必多此一奏耶雍正三年六月初十日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事竊臣恭接祥符引河告成奏摺奉有硃批臣跪讀之下不勝感激惕勵伏念豫省堤工荷蒙我皇上聖明獨斷發帑興修現在大堤報竣引河告成疏濬隄防相機並舉天人協應可望安瀾聖主憂勤猶煩宵旰兹以伏汛屆期命臣竭力督率修防臣受恩深重分應竭力保護身先督率以固河防查武陟黃水從廣武山新開引河暢流東注沁水從御壩北河循軌順行上遊既已淸楚下流自不致泛濫雖時當伏汛水長數尺仰賴皇上福庇工程俱各平穩再兩岸支河俱經堵閉水勢盡歸中泓併力刷深河底臣率領道廳汛辨巡察堤工嚴督晝夜修防一切掃壩工程親自督催勘驗惟有凛遵聖訓益加奮勉務保無虞永奠萬年鞏固之基耳所有奉到硃批欽遵緣由謹繕摺奏聞伏祈皇上睿鑒謹奏勉之慎之朕晨夕之間無時不縈念於黃河兩岸也雍正三年七月初八日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事雍正三年六月二十八日恭接皇上硃批臣奏摺欽奉諭旨勉之愼之朕晨夕之間無時不縈念於黃河兩岸也欽此竊照本年伏汛黃河水勢頗大沁河更甚託賴聖主福庇天神默佑豫省兩岸工程修防平穩業經恭疏題報在案近查儀封蘭陽祥符三縣所築堤工因大雨衝刷水溝殘缺之處甚多各員欽蒙聖恩俞允暫留本任三月俱為切已工程自當竭力補修不致推諉觀望臣現在委員嚴催勒限修理再查江南邳州所屬南岸朱家海於六月十五日漫溢聞大溜由宿遷虹縣泗州而達洪澤湖其缺口迤下正河淤淺而漫溢處所又未成河形水勢散漫下流未能暢泄誠恐上遊之水或有停蓄臣念伏汛雖過秋汛踵至急須先事預防現在武陟各處險工俱經竭力下掃加鑲次第催儹告竣臣即親查兩岸相機料理秋汛事宜凡堤上雨淋殘缺躬自督催填補應加築子堰之處即行搶築應加修壩工之處即行搶修務期一律完固以保安瀾理合恭摺奏聞上慰聖懷伏祈睿鑒謹奏近因畿輔一帶地方秋雨連綿朕甚為豫省堤工憂之切須加意防護毋致疏虞雍正三年九月十九日副總河兵部左侍郎臣嵇曾筠謹奏為秋汛巳過工程平穩據實陳奏上慰聖懷事竊照本年伏秋二汛大雨頻仍黃沁水漲較甚往年凡遇頂衝掃灣處所水與堤平致多危險幸蒙我皇上明燭機先預發帑金俾臣相機料理獲資捍禦仰見皇恩浩蕩睿鑒照臨靡不洞悉周詳矣今查風狂雨驟之際水勢洶湧工程之最險者南岸則鄭州之余家莊薛家寨林家莊祥符之程家寨薑家莊考城之縷水堤虞城之待賓寺劉家口潘家莊等處北岸則武陟沁河之西壇大虹橋陽武之大賓周家莊熊家莊鴈李等處其時在工大小各員并效力等官莫不感激聖恩竭力用命而其中冒雨衝風奔馳䇿應往來巡察晝夜靡寧者則管河道副使佟鎮禮部堂主事朱藻歸德府知府祝兆鵬也不避風雨駐宿堤頭奮勇爭先督率搶護者則上南河同知拖克拖海下南河同知劉永錫上北河同知潘尚仁沁河通判李世傑署歸河通判胡琰也各搶各工早夜修防雨淋日曬足不離堤者則鄭州知州高文愷考城縣知縣高鏜虞城縣知縣唐綏祖武陟縣知縣靳樹賢陽武縣知縣鮑學沛也以上各員所轄工程雖當極險俱保平穩其餘各屬亦俱修防罔懈惟蘭陽儀封兩縣因水湧浪急人力難施民堤漫溢致將大寨板厰後大堤各漫塌十餘丈仰賴聖主福庇水勢漸減官民鼓舞竭力爭先俱不旬日而合龍竣事但板厰大寨漫口俱用夾土壩堵築誠恐未能堅固當同河臣齊蘇勒面商加築創堤以為捍衛臣親身督儹一律高寬務保無虞除嚴飭道廳印官將凡有應行修補之工逐細勘估具詳臣覆加親勘明確會同河撫二臣題估外今因欽差學士臣何國宗等查看漳衛二河將次到豫臣於九月二十日迎至衛輝恭請聖安會議漕運事宜理合奏明仰慰聖懷為此謹奏所奏俱悉在工大小各員奮勇效力雖屬可嘉但今歲堤岸兩處漫塌不便加恩議敘仍命伊等勤慎供職能保明歲工程無虞自有優典下頒也雍正三年十月初二日副總河兵部左侍郎臣嵇曾筠謹奏為謹陳豫工情形仰祈睿鑒事竊照豫省堤工年久廢弛蒙我皇上軫念運道民生不惜帑金大加修治一切明險之工俱已加幫高寬足資捍禦惟外有民堤月堤之處當時原估之員從愼重錢糧起見既有重門可恃暫緩加幫俱未入估即間有估修者亦不過每丈加土兩三方略補殘缺但民堤築自民間卑矮虛鬆非若大堤之高寬堅實而月堤亦多年不修單薄頽圯均難足恃查豫省堤工每因民堤成患如本年儀封縣之大寨蘭陽縣之板厰皆民堤先潰致漫大堤即前年中牟縣之楊橋十里店亦俱因民堤漫開可見暗險之工因有恃而失所恃前車可鑒急應為綢繆未雨之計也又查加幫大堤原估之時工程綿遠俱未測量地勢之高下而槩行估計是以每有間段高低未能一律今秋水漲其地本高者堤亦高水不能漫至低處水平堤頂危險非常隨於堤上加築小堰暫為抵禦亦非長久之道此皆實在情形臣往來巡視目擊心警者也臣仰體皇上慎重河防至意不敢茍安目前草率從事謹委諳練河員逐細算估臣再行覆勘明確與河撫二臣會核題請興修以期永遠無虞上慰聖懷理合先行奏明伏祈皇上睿鑒謹奏此論似屬有理但當加詳加慎再四斟酌方不被人檢點也同日又奏為敬陳下悃仰祈睿鑒事竊臣猥以菲材荷蒙皇上天恩擢用管理豫省河務自雍正元年六月內到豫欽蒙皇上念臣貧乏恩賞銀兩臣舉家頂戴今在豫二年有餘惟存敬事後食之心早夜刻苦自勵以求上蒼鑒憐得保堤工永固上慰聖懷則臣願足矣何敢計及身家但副總河有巡查兩岸工程稽查錢糧之責出門車馬船隻幕賓書吏從役飯食及紙張等物俱不能無費臣謹守儉約勉力支持今則日給不敷拮據尤甚伏懇聖主洪慈賞給養亷俾薪水無缺則自今以後食德飮和皆出自皇上天恩之所賜也臣不勝感激惶悚之至為此恭摺瀝陳下悃伏祈皇上睿鑒謹奏據實陳情嘉悅覽之養亷之需安可一日缺乏但應取給何項朕未悉其宜密以奏聞候酌定有旨雍正三年十一月二十六日副總河兵部左侍郎臣嵇曾筠謹奏為奏聞事竊照豫省料物全藉秫秸而秫秸係八月內收穫不比江南蘆葦至霜降後開採購辦稍遲誠恐價漸昂貴臣隨一面飭行管河道通融河銀酌給各廳預備一面會同河撫二臣恭疏具題請撥銀五萬兩嗣準部覆奉旨依議速行欽此欽遵當於十一月初九日據布政司移解河庫銀五萬兩除撥還河庫歸款外餘俱陸續酌量找發現據各該廳分投採買運貯工所爭先恐後務期歲內辦全無誤下年之用理合奏明上慰聖懷謹奏據奏辦料各員爭先恐後甚善但須運貯在工者委無虛揑方收實效也雍正四年三月十三日副總河兵部左侍郎臣嵇曾筠謹奏為恭報桃汛平穩仰慰聖懷事竊照今歲立春以來天氣融和水勢微長至淸明以後發水二尺有餘因兩岸灘地俱高桃汛雖屆不致出槽一切堤工俱極平穩奉旨增卑培薄等工業經飛飭廳印各員擇險先修臣親自往來催儹所有歲修掃壩工程亦俱上緊修防臣凛遵聖訓惟有戰兢惕勵盡心竭力逐一相機辦理不敢稍誤今於三月初七日遵照部文自蘭陽起程前赴彰德府等處會同欽差內閣學士臣何國宗等並撫臣田文鏡勘議漕運河道泉源事宜俟會議事竣仍星馳蘭考一帶督工料理謹將桃汛水勢工程平穩情形據實奏聞上慰聖懷謹奏凡事每成於難而敗於易人情多慎於危而忽於安毋因桃汛平穩遂爾稍涉疏慢須保固數年河底日漸刷深永無出槽之虞方可釋懷也雍正四年四月十六日副總河兵部左侍郎臣嵇曾筠謹奏為報明立夏以後黃水長落情形仰祈睿鑒事竊照今歲自桃汛以來水勢平穩至四月初六七等日甘霖疊沛河水漸長一尺有餘業經奏明在案臣正在蘭陽儀封地界督工據汛辨報水自初十至十二日共長七尺祇緣連雨三日凡伊洛纒澗並丹沁諸水一時齊下是以黃流驟漲出槽漫灘直注堤根荷蒙皇上隆恩諭令增卑培薄現在擇險先修凡係緊要處所及時趕築官辨夫役雲集堤岸齊心搶護兩岸皆保無虞今幸天氣晴明水已消落堤工平穩臣惟有欽遵諭旨竭力殫心矢勤矢愼董率屬員兵夫加謹防護保守仰報皇上簡任之恩於萬一耳所有黃水長落情形理合據實奏聞伏乞睿鑒謹奏覽奏黃水長落情形知道了今歲入夏以來雨澤頗饒一切堤工倍加小心守禦毋忽雍正四年五月二十八日副總河兵部左侍郎臣嵇曾筠謹奏為恭報五月內工程水勢平穩情形仰祈睿鑒事雍正四年五月初四日臣接到皇上御批臣恭報水勢奏摺欽奉硃批諭旨跪讀之下仰見皇上軫念河防諄諄誥誡臣惟有凛遵聖諭倍加小心奔馳巡察以求保固無虞今查新估增卑培薄等工其至險至要之處如蘭陽縣之板厰儀封縣之大寨楊家橋堌陽堤祥符縣之靑谷堆瓦子坡程家寨商邱縣之蔚家窪楊家堂虞城縣之劉家口凡係臨河外越堤工臣俱往來親督晝夜催儹完固皆已有重門保障其餘亦不時查勘嚴飭上緊修築至考城縣支河六道臣親往外灘相度形勢率領通判葉光會知縣高鏜等駐工催儹盡行堵塞大堤又用掃鑲護足資保固所有歲搶工程業已分投儹修仍多積料物以備抵禦且臨河越堤搶築之後堤內灘地二麥全收百姓歡呼萬歲喜出望外其堤外被水窮民亦皆赴工覓食現在各處秋苗盛發水勢隨長隨消工程平穩此皆我皇上敬天勤民休徵協應之所致也所有五月內工程水勢情形理合奏聞恭慰聖懷伏祈睿鑒謹奏前月下旬霖雨疊沛直隸大小河道一時驟長勢甚洶湧朕顧念中州深為懸切覽奏曷勝慰悅敬之慎之雍正四年六月二十九日副總河兵部左侍郎臣嵇曾筠謹奏為恭報六月內工程水勢平穩情形仰祈睿鑒事雍正四年六月十五日臣從儀封縣北岸渡河查勘南岸一帶堤工行至滎澤縣地方接到皇上御批臣恭報五月內工程水勢奏摺欽奉硃批諭旨跪讀之下仰見我皇上宵旰精勤靡刻不以中州河道上厪宸衷臣菲材薄植欽承簡任惟有凛遵聖訓矢勤矢愼愈加奮勉以期保固平穩查自六月以來雨澤頻施河水屢長幸賴皇上福庇各處堤掃工程俱已有備所以六月內水勢雖長而循途順軌並未泛漲臣受恩深重值兹泛水屆臨心神悚懼尤宜竭誠辦理即溽暑烈日狂風驟雨中亦必每日巡查務期兩岸周遍並嚴飭廳泛員辨俱住宿堤頭督率兵夫晝夜防守儹工該員等亦皆踴躍感奮遵行弗懈至於各工明險之處臣已屢次經營相度修理完固即極不經意之地以及凡民堤之略有關於大堤者尤必細加踏勘防範周密弗使稍留罅隙致有疏虞今伏汛已經過半工程甚是平穩此皆我皇上念切民瘼勤求治理以致河神默佑兩岸安瀾所有六月內工程水勢平穩情形理合奏聞伏祈睿鑒謹奏今歲甫交夏令即覩淋潦景象朕深懷隱憂不料大雨時行之際乃更如是晴霽實甚為慶幸但近年來秋汛每盛於伏汛惟當慎之又慎方免意外之虞河身較前稍覺刷深否雍正四年八月初一日副總河兵部左侍郎臣嵇曾筠謹奏為恭報七月內工程水勢平穩情形仰祈睿鑒事雍正四年七月十七日臣查工至考城縣地方接到皇上御批臣恭報六月內工程水勢奏摺欽奉硃批諭旨跪讀之下仰見我皇上宵旰勤勞精誠感格遂致雨暘時若水土平寧凡屬臣民莫不額手稱慶查伏汛水勢平穩情形臣謹循例於七月十三日會疏題明在案嗣後秋汛漸盛至七月十九日共長五尺有餘臣往來兩岸目擊水勢雖長風浪甚平一切堤掃工程防衛周密且旋長旋消波恬工固臣惟恪遵聖訓更加勤愼督率廳汛等官多備料物上緊修守勿敢一刻稍懈今白露伊邇務期保固平穩上慰諭旨隨飭各廳汛員辨逐一探量具報前來謹將現在深淺丈尺分别廳縣另繕奏摺恭呈御覽但豫省地勢南岸高於北岸故同此一河而深淺各異且黃河水性變遷靡常大溜趨向無定溜走則水急沙行而河深溜移則水緩沙停而河淺似難畫一更間有支河分水以及曾經漫溢之處其河泓亦較他處稍淺然皆在一丈以外今兩岸堤工鞏固水由地中河身自當愈刷愈深也再查目下正值秋汛水長之際中泓拋錨探量大溜湍激不能直下恐間有未準之處應請於霜降後水勢平緩再行確探具奏合並聲明所有七月內工程水勢平穩情形並河身刷深緣由理合奏聞伏祈睿鑒謹奏朕所問者目前大槩情形耳據奏水性變遷靡常大溜趨向無定云云能保霜降後遂不復如是乎凡如此等顧慮巳身利害預為防譴避過之舉君臣間不宜有此隨事直陳身本無過舉實以對心亦無私無私無過何嫌何疑而用避為總之一涉不誠則非固私是亦私罪固私功亦私懈惰亦私勤勞亦私疏慢亦私謹慎亦私根本既差無往而非私矣自三代後漢唐以來臣道日趨於偽不特今日為然諸卿遭遇朕躬當共勉力改除以挽此頺風否則莫冀朕推心置腹也勉之雍正四年八月十六日副總河兵部左侍郎臣嵇曾筠謹奏為秋汛方中工程平穩據實上聞恭慰聖懷事雍正四年八月十二日臣接撫臣田文鏡自闈中所發書字內云七月二十二日將立秋以後汛水安瀾情節具摺奏聞至八月初九日跪接皇上硃批奏摺奉旨覽奏早晚禾稼豐茂工程平穩各情形深為慰悅但朕心意之間只覺今歲秋汛似有可虞目下正當水勢長落不定之際汝與嵇曾筠其協力同心謹防毋忽欽此欽遵擬即繕摺覆奏因在棘闈不敢用墨祈即代為入告恭慰聖懷等因臣跪讀諭旨不勝惶悚恐懼感激奮勉查七月內工程水勢平穩情形臣已於八月初一日繕摺恭奏自八月以來秋陽晴皎雖於初五六等日長水四尺有餘旋即消落不似上年壅滯即此可徵河底深通之驗今白露已過水勢日漸歸槽即至霜降可幸無虞臣細閲水勢查北岸武陟釘船幫一帶自蒙聖恩俞允發帑挑穵倉頭中灘引河吸引大溜自西而東今趙莊壩迤下悉淤成灘地釘船幫秦家厰等處工極平穩迤下原武陽武封邱支河堵塞非有大水不到堤根其祥符陳留蘭陽北岸水勢掃灣拖溜皆有重堤護掃惟儀封北岸之三家莊與東省芝麻莊接壤大溜瀠洄河形尚有南北頂衝之勢巳經多積料物調集兵夫晝夜修守現在增築越堤務期有備無患其南岸自滎澤鄭州中牟皆係從前險工連年修守土掃工程俱極堅固迤下祥符陳留蘭陽儀封考城商邱虞城等處內外大堤越堤業已增培高厚掃工時時鑲墊兼之今歲秋收豐熟料物雲集工程修整足資捍禦撫臣田文鏡坐鎮省城分遣官役查察臣曾筠奔馳兩岸晝夜催儹堤掃等工凡明險暗險之處俱相機盡力修防仰賴聖主福庇今歲工程定可保固平穩荷蒙聖諭詳切臣惟有愈加勉勵盡心協力加謹防護仰副睿慮憂勤不敢片時稍懈所有欽奉硃批諭旨事理謹將工程水勢平穩情形據實奏聞上慰聖懷謹奏朕懷今始釋然矣能似此保固數年河底漸深水由地中行永奠安瀾我君臣慶慰更當何如耶勉之雍正四年八月二十七日副總河兵部左侍郎臣嵇曾筠謹奏為欽奉上諭事雍正四年八月十九日臣查工至蘭陽縣南岸地方接到皇上御批臣恭報水勢平穩河身刷深奏摺欽奉硃批諭旨臣跪讀之下惶悚愧汗恐懼警醒感激涕零伏惟我皇上聖明天縱洞悉水勢河身刷深祇問大槩即至霜降後河性變遷亦不能料聖諭詳明透徹朗照高深而愚昧如臣因盼望河身刷深之念甚切既已分檄各屬淸查又親在蘭陽儀封渡口自行探量復廣為咨詢以期考究河身確實分數而仍未能畫一因於奏摺內聲明上瀆聖聰臣之下愚固塞一至於此咎實難逭理應即賜處分乃蒙聖主使過洪慈諄諄以誠之一字為端本之要剴切訓勉臣欽承提命感愧交併竊幸遭逢聖主受知最深蒙戰兢惕勵一心端本屏去百私實力遵行聖訓以盡犬馬之忱於萬一耳所有奉到訓旨事理謹將感激遵行緣由繕摺具奏恭謝天恩伏祈睿鑒謹奏接閲朕諭要當自省有則改之無則加勉已耳淸夜捫心四字外何庸多語雍正四年九月二十八日副總河兵部左侍郎臣嵇曾筠謹奏為河工關係緊要籲懇聖恩特簡熟諳道員以收實效事竊查管河道佟鎮欽奉上諭革職候審將來補放道員聖明自有定鑒臣何敢妄為奏請惟是豫省河道有估計工程收發錢糧之責況規模甫定善後需人必須熟諳河務之員方於工程平險估計無差錢糧緩急給發得宜若稍有未諳既不能綢繆於未雨又復固執於臨期恐黃流湍悍呼吸變遷未免於河工諸事坐失機宜難收實效伏念我皇上聖明天縱洞悉河防大小臣工均屬照臨之下仰乞聖裁特簡諳練河務人員俾其管理河南河道庶工程平險無倒置之虞而錢糧緩急亦無失機之患兩河萬姓均沐天恩於無既矣為此恭摺奏懇伏祈睿鑒謹奏覽奏知道了朕正為此缺詳審斟酌汝知有稱職之員否具奏以聞雍正四年十月十五日副總河兵部左侍郎臣嵇曾筠謹奏為堤工已經告竣微臣奉命日久恭請陛見跪聆聖訓事竊臣一介寒微至愚極陋荷蒙皇上洪恩拔臣卿二授臣重寄感激涕零莫能言喻自奉命河南堵築十里店漫口以至修防兩岸堤工經寒歷暑三載有餘瞻望天顔彌深依戀犬馬私衷刻不能釋兹當霜降過期水落工平之候臣一面移咨撫臣田文鏡會收堤工查核錢糧外現在繕本具題恭請陛見伏祈皇上洪慈俯賜俞允俾臣得瞻天仰聖跪聆訓旨則微臣三載孺慕之忱庶可少慰於萬一矣臣謹繕摺請旨伏乞睿鑒謹奏身在河南尚然應酬不暇若至都中更多親友及勢要之覿面纒繞耳毫無益處陛見之行不必雍正四年十一月十五日副總河兵部左侍郎臣嵇曾筠謹奏為遵旨查勘引河情形事雍正四年十月二十二日臣具摺恭進黃沁安瀾圖本月二十三日奏事張文彬傳臣齎摺家人展圖指示口宣皇上聖旨令於所指之處或應開挑引河一道若别處有形勢類此者俱應相機開河傳諭到臣欽此欽遵臣當即率領河員乘船相度伏查黃河形勢東西暢流則勢順而安恬南北斜衝則勢橫而激蕩今河身上自廣武山而下引河深通尚能束行於兩岸之中而祥符以下河勢多曲每遇掃灣轉溜即成南北斜衝兩岸險工均坐此病如南岸考城之司家道口等處北岸儀封之三家莊其最著者也細閲河身自儀封北岸之趙家寨迤西灣環起勢直走正南至考城之縷水堤迤北環向正東掃逼勾家寨淘作兜灣每至水長之時下行不暢則橫流旁注沖成支河分道南侵此考城司家道口一帶受病之源也又自勾家寨斜趨西北折行東北經豫省之三家莊東省之芝麻莊等處繞道而南至王家樓迤下方斜流東注此北岸兩省險工受病之源也今若將南北兩灣從中挑斷引水直流則改南北之形而成東西之勢兩岸工程誠有裨益但從來開挑引河必須河頭有吸川之形河尾有建瓴之勢方可期其必成至於上下接挑尤必上段之河尾與下段之河頭吐納相應呼吸相通方能一氣貫注今查儀考兩邑之河灘皆係平沙漫衍並無西高東下之勢而兩層首尾亦不能直接順通且河頭接溜之處去北岸較遠而離南堤較近恐北岸之險雖去而南岸之險復增似難必其萬全臣兩年以來因儀考堤工告險往來救護舟楫頻經再三相度緣未獲因勢利導之機宜未敢冒昧陳請今惟有督率各員加緊保守以防明歲汛水倘河形遷改機遇可乘即當隨時具奏開挑斷不敢因循貽誤也至於此外工程則有祥符縣南岸之程家寨蘭陽縣南岸之四水口險工似應疏濬而形勢亦未敢輕議伏念我皇上神功聖德宵旰河防費百萬之帑金垂兩河之永利而臣謬膺河務所晝夜縈心者惟期事出萬全功在必成固不敢因工大而畏難亦不敢因急功而輕舉是以逐細查勘再三斟酌兹河身甫漸刷深若改挑引河舊時深處變為淤淺新挖河槽未必驟深臣愚以為不如盡力保守兩岸堤工詳看全河形勢倘有動移即當因利乘便估計開挑以慰聖懷臣不揣愚昧敬陳管見所有查勘各工堤河情形謹繪圖貼説并前進黃沁安瀾圖恭呈御覽伏乞皇上聖裁指示遵行謹奏覽奏朕甚嘉悅如此方是若不論當否一味逢迎阿順我君臣將無貽天下後世笑柄乎百凡行為當以斯事之居心為準乃朕所朝夕期望於諸卿者勉之朕昨閲圖不過偶爾之見聊就紙上商較形勢耳果有深知確見處則何不明白批諭而猶為此泛泛一詢耶同日又奏為恭謝天恩仰祈睿鑒事雍正四年十一月初三日臣於蘭陽北岸工次接到皇上御批臣恭請陛見奏摺欽奉硃批諭旨跪讀之下感懼涕零悚惶無地竊臣一介庸愚荷蒙皇上軫念河防委以重寄任事之後戰戰兢兢覩此兩岸民生所係全河運道所關惟有殫盡血誠勉竭駑駘三載以來自朝至暮奔走不遑未敢應酬外務所以從前親友間有寄書通候臣總置之不答至於勢要之家臣孤蹤苦行素無交際恭逢我皇上乾剛整肅法紀嚴明舊時勢焰早已化為灰燼況臣蒙特簡以來知遇之榮逾於常格臣更有何希冀而周旋請託且於河工要務設有未協貽誤匪淺臣雖至愚不敢作靑年守節孤苦伶仃並無依倚今臣母年已七十有九衰殘多病風燭堪虞臣感荷賜罷斥嚴加處分乃蒙皇上天地為心父母為念格外姑容再三訓飭令臣捐軀難報夢寐懷慚惟有時深警惕不敢絲毫瞻顧專心致志竭力辦公念念求其補過事事求其有益庶幾仰報聖恩於萬一耳所有欽奉諭旨事理臣謹繕摺恭謝天恩伏祈睿鑒謹奏知過能改朕無不見諒若猶事彌縫則亦莫之恕矣雍正四年十二月十五日副總河兵部左侍郎臣嵇曾筠謹奏為瑞雪年豐凌泛平穩據實奏聞事竊照本年十二月初旬大河南北瑞雪豐盈自一尺至二尺不等兩岸黃河冰堅水凍臣以凌泛屆期有關堤掃一面檄委防護一面親詣查閲伏見凌從灣積溜激冰高本月初七日以後天氣漸融河水流澌循槽順軌各工堤掃並無剷刷而四野父老具言臘雪普霑土膏滋潤不特來歲二麥有收更且秋成可望靡不共相慶幸咸頌我皇上深仁厚澤是以預兆豐年臣身歷河濱目擊情形不勝忭舞謹據實奏聞伏祈睿鑒謹奏且慶目前流澌順軌莫言來歲禾麥豐登敬待天工主持之事何敢預為逆料也野老無知此等過頭語當切戒之同日又奏為泉源利濟漕艘通行據實奏聞恭慰聖懷事竊惟豫省糧船全資丹衛二河濟運而丹衛合流又需各處山泉滙集查衛輝府輝縣蘇門山有百泉水池臣於上年九月親履其地逐細審視見泉池西首伏有泉眼因為另鑿一池源源滾滾與百泉無異當經奏聞叩請天恩敕封衛河源神蒙我皇上親灑宸翰御書靈源昭瑞匾額懸挂廟庭聖藻輝煌日星炳耀山川生色父老歡呼臣於今年二三月內復行開鑿石竇砌築陡崖盡力疏濬泉源渙發更加滂沛其餘各道山泉當此隆冬枯涸之時俱皆暢達滙入丹衛交流兹據河南糧道楊夢琰具報於十二月初八日豫省糧船盡數開行無誤此皆我皇上至誠感格河嶽效靈之所致也理合據實奏聞恭慰聖懷伏祈睿鑒謹奏鬼神之為德體物不遺至於龍之靈感莫測尤為顯著既身司河務當克敬克信慎勿杳渺視之也硃批諭旨卷一百七十五之一欽定四庫全書硃批諭旨卷一百七十五之二硃批嵇曾筠奏摺雍正五年正月初四日兵部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報聖世河淸昌期嘉應事竊照豫省黃河自雍正四年十二月初七日以後天氣漸融流澌順軌凌汛平穩臣已恭摺具報嗣於十二月初九日起漸見澄淸至十六十七等日尤為淸徹隨委員各處查驗於十二月二十七二十九等日據管河道廳具報上自陜州下至虞城河淸嘉瑞前來臣現駐河濱臘底新年屢為查閲果見河水湛然並無沙滓而且二旬之久千里之遠澄明淸徹一氣綿長誠為千古竒逢史册罕載者也伏念我皇上誠格靈祗德懷河嶽源從天上竒徵孚洽穹蒼水由地中異瑞彌昭淸晏敷聲教於四海同風之盛奠淸寧於萬年有道之休臣不勝踴躍歡忭容於開印後繕本題報外理合恭摺奏聞伏乞睿鑒謹奏河淸雖屬可慶之瑞朕自顧德薄倍加凜畏我君臣當更相警勉以期仰答蒼穹之眷佑耳同日又奏為恭謝天恩仰祈睿鑒事雍正五年正月初三日臣於祥符縣北岸工所準工部咨內開奉旨近年豫省河務險工下移堤岸完固平穩山東河務甚屬緊要向係山東巡撫管理但巡撫有地方責任恐不能專理河務山東與河南接壤作何令副總河嵇曾筠兼管之處著九卿會議具奏欽此欽遵該臣等會議得山東與河南接壤皆黃河所經兩省堤工最稱險要查河工事宜本係總河專責今河南既設有副總河現駐武陟等處與山東接壤理應欽遵諭旨將山東與河南接壤之曹縣定陶曹州單縣城武等處附近黃河地方凡一切修築堤岸等工應交副總河嵇曾筠就近管轄等因奉旨依議欽此移咨到臣隨恭設香案望闕九叩祗承諭旨恭謝天恩訖竊臣一介菲材遭逢聖主幸蒙特達之知非常之遇及至謬膺河務皆賴聖謨指示睿慮周詳而臣報稱無能愆尤叢積方深惕勵悚惶乃蒙我皇上新恩特沛委任有加臣聞命之下感激難名惟有益加奮勉殫竭駑駘冀報涓埃伏念河防緊要東省曹單等縣黃河尤為逼近運河攸關匪細趁此桃汛以前亟宜加意修守一面將豫省南岸委管河道祝兆鵬北岸委主事朱藻令其分投逐工淸查掃料沿堤催督兵夫種柳積土臣即於正月初七日前往山東查勘黃河堤掃工程其修防措置事宜容臣另摺恭請訓示遵行所有微臣仰荷新綸蟻忱感激理合具摺恭謝天恩伏乞睿鑒謹奏竭力勉為之太上云忘其身而身存此語豈特長生久視之良方即係保祿全名之要道在善於推類而體會之耳試觀致身奉公者莫不為神明所佑巧詐趨避者率皆被造物所忌縱獲目前小利日後必罹大咎徵驗昭然歷歷可鑑朕之醒世格言內外諸臣當佩服以為終身誦果能躬行實踐至受益時方感朕一片苦衷也汝其勉諸條奏一摺交廷臣議覆有旨雍正五年正月十九日兵部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為敬陳東省黃河堤掃工程事宜仰請聖訓以固修防事竊臣奉命兼管山東黃河工程遵於雍正五年正月初七日自豫省之儀封交界起至江南之碭山交界止將東省曹單二縣堤掃工程細加踏勘查得北岸曹單二縣境內共計堤長四萬一千四百丈南岸曹縣境內共計堤長七百五十七丈而北岸之堤密邇運道所關尤重今內外俱有重堤復有越格等堤包護周密立法綦善但臨河縷堤歷年久遠每多殘缺卑薄應擇其險要審其緩急以次加幫修守不懈自足以資鞏固惟曹縣北岸之芝麻莊一工勢當黃河大溜每遇汛水長發全黃直射撞激堪虞查該工巳於雍正三年河臣齊蘇勒於詳請發帑等事案內捲下順掃一百七十二丈復於雍正四年請開引河等事案內加添魚鱗護掃一百八十五丈并於上流建築挑水壩一座又題明撥調江南河營汛辨帶領河兵二百名駐工防守其所以捍衛大堤敵黃保運者法亦盡矣但修工全資料物而辦料貴在先時今該工堆貯物料寥寥無幾時已交春豈容延緩臣查魚鱗護掃係曹縣知若不預行購辦貯工應用將來靑黃不接恐至貽誤工程運道民生關係匪小臣一面嚴飭該縣飛儹各料星夜運工加謹保固外仍一面移咨河臣齊蘇勒會稿題請歲修并飭令山東布政司速即酌發帑銀交給降後核實題估彚入該年歲修案內報銷此外倘有應行下掃并鑲下防風之處容臣臨時相度形勢斟酌機宜分别輕重按段增修庶捍禦有資而要工之修防無誤臣管窺淺見冒昧陳奏是否有當伏祈皇上俯賜訓飭指示以便敬謹遵循為此繕摺具奏伏祈睿鑒謹奏覽雍正五年二月十三日兵部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為欽奉上諭事竊臣奉命兼管山東黃河工程巳於正月初七日前赴東省查閲堤工至曹縣芝麻莊見掃壩工程正需修理而所存料物甚少惟恐遲延貽誤隨一面嚴飭曹縣知縣徐文燦星速趲辦以防桃汛一面會稿題請歲修并檄行布政司酌撥銀六千兩交給該地方官購備料物以防伏秋業經奏明在案蒙皇上訓諭嚴切隨即欽遵飛飭廳縣等官星夜上緊辦運倘稍有玩延即行嚴參今臣由南岸查工渡河而北於二月初九日復至芝麻莊查秫秸草束各料俱已運貯堤頂臣隨令江南河營千把總并該汛員開工整理舊掃按法加鑲簽樁壓土務須十分堅固以資抵禦是桃汛之修防定可無誤矣其伏秋兩汛應需料物亦必於此時及早辦貯免致靑黃不接臨時掣肘雖藩庫銀兩尚未移解前來臣巳檄飭廳印各官將大堤徭夫歲修銀兩先行通融購備俟布政司銀兩解到給還俱不得藉端延緩該員等現在竭力置辦但工程錢糧俱係河道專責今署兖寧道事登萊道徐德俶並不到工查察亦未見具文詳請預備料物玩延之咎已於請帑備料疏內附參其餘各員如有始勤終怠者亦即據實參奏不敢姑容貽誤臣惟有恪遵聖訓先事預圖務期工程鞏固有備無患以仰副聖主軫念河防至意所有該工現在趲備料物緣由理合據實奏明恭慰聖懷仰祈睿照謹奏如此方是凡封疆任事大臣咸肯毅然正色秉公執法朕復何憂何慮治平之道先在察吏用得其人事無不理天下乂安萬姓蒙福矣假若一味姑容以邀譽市德馴至諸務廢弛法紀蕩然上則貽誤國計下則流毒生民作孽日滋而不之覺方且自以為寬仁長厚寧不大謬歟無論天道報施即以人情揆之亦知其必不獲免大抵習染最易惑人流俗相沿視為長技忽被晨鐘警醒始信從前庸愚小見之可笑也雍正五年三月十三日兵部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為欽奉上諭恭謝天恩事雍正五年二月二十九日恭接皇上御批臣奏請東省芝麻莊辦料事宜一摺臣跪讀聖訓開示嚴明提撕諄切無任感悚竊臣樗櫟庸材荷蒙皇上天恩拔擢卿二委任河防涓埃未效報稱無能淸夜捫心每為感泣祗以河務重大關係匪輕臣夙夜兢兢盡心學習而諳練未深所以臨事徘徊愈增鈍拙蒙我皇上知炳幾先慮周事後屢頒訓諭誥誡詳明俾臣凛遵聖訓勉竭駑駘四載以來得有今日皆沐皇上之生成教育自愧下愚質魯警覺偏遲閲歷多年始知醒悔乃蒙聖恩高厚即為鼓舞作新諭臣如此方是則知微臣前此之愆尤叢積均荷天恩寬宥曲豫矜全昆蟲草木日遊光化而不知覆載之包容今跪讀恩綸感激無地惟有殫盡血誠執法察吏但求公事有益不敢絲毫瞻顧恪遵聖諭力去庸愚之小見勉效大臣之當務以仰報皇上洪慈於萬一耳臣謹繕摺恭謝天恩伏乞睿鑒謹奏朕並非崇尚苛刻但欲卿等秉公執中不欺不徇耳若毫釐錯會則謬以千里矣雍正五年四月十八日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報水勢長發工程平穩仰慰聖懷事竊豫省黃河南北兩岸堤工荷蒙皇上睿謨指示發帑興修俱各加幫高厚即險汛下移間有新生險工及零星殘缺之處亦俱鑲護防風掃壩幫築創堤月堤靡不先事預防金甌無缺今於四月初十日起至十五日止黃水漲發陡長五尺有餘各處堤工鞏固掃壩堅厚足資捍禦至東省曹單二縣濱河大堤臣已擇其至險之處嚴飭廳汛各官先行修理其餘未經修築之堤亦早安置人夫曉夜防守俱各保護平穩皆由我皇上訓諭周詳綢繆未雨所以安瀾永慶雖黃流陡漲漫溢出槽而濱河億萬蒼生咸各安居樂業老幼歡呼匝地今水勢已退漸次消落歸槽臣現在督率廳汛文武員辨加意巡查預防伏汛長發外所有黃水陡漲工程平穩情形謹繕摺奏聞仰慰聖懷伏乞睿鑒謹奏前聞水低於岸多者丈餘少亦七尺今僅長五尺何乃遂至出槽若水勢如此即不免漫出槽外則嗣後無時不可慮矣慎之慎之雍正五年五月十九日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭謝天恩事雍正五年四月十五日臣接準吏部咨為題參事考功淸吏司案呈查得通政使司咨稱接得副總河嵇曾筠題本一本為恭謝天恩事應具奏本而用題本與例不符除將原本封送內閣外理合題參等因雍正五年三月二十九日奉旨該部知道欽此移咨到臣隨恭設香案望闕叩頭謝恩訖伏念臣一介菲材仰荷聖恩深重生成教育高厚難酬自慚賦質愚蒙諸凡未諳以致恭謝天恩應具奏本而用題本有違定例理應立賜處分乃蒙我皇上特加寬宥免其察議洪恩浩蕩浹髓淪肌臣惟益加砥礪勉竭涓埃永矢犬馬之忱銜結於生生世世耳謹繕摺恭謝天恩伏祈皇上睿鑒謹奏凡實力佐朕之大臣小過議罰朕亦有所不忍也同日又奏為恭謝天恩事雍正五年五月初八日臣齎摺家人敬捧皇上恩賜各種法製錠藥一匣到臣隨恭設香案望闕叩頭謝恩祗領訖欽惟我皇上至治馨香太和保合普黃農之利濟協化育於兩間嫓堯舜之博施切痌瘝於億兆上方調劑萬彚皆春異數頻仍千秋榮遇臣蒲葵小草茝术微材芳餌膏酥早蒙殊錫蓮茶餳果疊拜隆施乃宸衷注念於河干致良藥再頒於霄漢霜飛玉杵融成紫磨之金月湧冰壺吸取銀蟾之液離乘火位祛陰翳以潛消鹽稟水精滌炎氛而默化香霏郁烈先蒲艾以迎祥光燦陸離勝瓊漿紫禁之大丹迄今河畔馳驅又捧洪鈞之法製敬藏工次通燥濕以咸宜分惠羣僚酌燠寒而溥濟仰皇仁之體恤鏤骨銘心感聖澤之宏深淪肌浹髓臣謹繕摺恭謝天恩伏祈睿鑒謹奏覽雍正五年六月十五日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為據實陳情仰祈睿鑒事竊臣於本年正月初三日接準部咨奉命兼管山東黃河堤工隨即趨赴曹單二縣地方一面查勘堤掃工程一面咨訪河工利弊見臨河大堤多有卑薄殘缺不能一律高寬堅厚臣仰體聖懷因比照豫省之例估計加幫增培高厚猶恐廳汛各官勘估不實遴委諳練河員逐段細加查丈又復待至三月內新任兗寧道傅澤洪到任檄飭親勘確估嚴加核減造册具題請旨興修欽遵在案至工程利弊據黃河同知陳世竒開報徭夫陋規一項臣當將此頂工食幫貼等銀從前俱屬有名無實半係印河各官之陋規半係胥役甲長之侵蝕請嗣後查明堤工應行加幫之處即將工食幫貼等銀先期題估修理等情恭疏具題現準部覆會同河撫二臣虛公畫一妥議在案但流弊已深相沿日久臣不少容隱絶無瞻顧而即為入告自難見諒於同官至陳世竒被參之故亦其自取查該員於上年冬季開明積弊備文詳報似屬為公因而求給養亷意圖肥巳顯係涉私且已經被劾自應靜候處分乃復徑行揭辨其狂縱躁妄已可槩見除該員另疏特參遵例摘印候旨外所有微臣題估加幫大堤並奏除徭夫積弊前後情節謹為據實奏明伏乞皇上察臣始末鑒臣衷曲恩賜主持俾臣不以無欺無隱致滋罪戾則從此捐糜頂踵任勞任怨犬馬有知勉竭血誠圖報鴻慈當銜結於生生世世矣臣謹繕摺奏聞伏乞皇上睿鑒謹奏陳世竒已降嚴旨革職矣參一屬員尋常事也胡庸如是張皇自問無私即誤參亦復何罪不然具此一奏豈遂能移朕之豫奪乎似此憂疑恐怖安能無欺無隱不涉瞻顧回護且主持二字斷在朕躬果是則如田文鏡不煩懇乞自有以主持之設非則必不因懇乞而輒偏於主持也所不解者諸大臣雖咸蒙委任率多不知朕衷大抵皆緣自信不及所以不敢信朕耳至於任怨二字無分上下不特不避屬員銜恨縱朕加譴責亦有所不顧惟據理秉公毅然行去方可謂為任怨況據理秉公之大臣朕焉有加以譴責之理總之識見囿於褊淺身為大臣百凡務大為要何得於目前區區小處耗費心神甘為是徒勞無益之舉耶同日又奏為伏汛將竣恭報水勢工程平穩仰慰聖懷事竊照今年入伏以來陰雨連旬沁黃屢漲水勢雖大所幸河底刷深實能容納旋長旋消並無留滯壅阻一切堤掃工程盡力修防俱極平穩皆仰賴我皇上勤求治理誠格蒼穹所以河伯效靈休徵畢集屆兹伏汛盛長仍復循槽順軌兩岸安寧臣往來豫東兩省踏勘巡查嚴督道廳印汛文武員辨率領兵夫住宿堤頭并多備料物晝夜防守以資保護今伏汛將竣所有水勢工程平穩情形理合繕摺奏聞仰慰聖懷伏祈睿鑒謹奏直待秋汛過後工程俱各平穩朕方敢釋懷也慎之毋忽雍正五年七月二十七日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為秋汛水勢已定豫兗工程平穩仰祈睿鑒事竊查伏秋交會之時伏汛未消秋汛踵至水勢易於增長又兼七月內陰雨連綿尤宜加意防範臣往來兩岸遍閲河勢見沁水從武陟釘船幫而下黃水自新開引河注廣武山根而下直至滎澤縣仁奠山二水合流是黃沁之上遊已循途順軌矣自此以下北岸經行滎澤原武陽武封邱祥符蘭陽儀封山東之曹縣單縣南岸經行滎澤鄭州中牟祥符陳留蘭陽儀封考城商邱虞城所有兩岸險要之處俱有掃壩抵護其從前陽武大堤一案加幫工程經歷三年草根蟠結可禦風雨即上年增卑培薄之工程嚴飭承修各員晝夜保固一有殘缺上緊修補并檄道廳汛員分投防守搶護俱保平穩其東省之曹單二縣工程查曹縣芝麻莊掃工已經鑲墊堅實即水勢長發料物雲集隨時加修掃壩晏然無慮其芝麻莊上下附近堤工俱已加幫將竣陳家樓黃家廟水勢雖往北趨現有新做防風護掃足資捍禦單縣之董家渡孟家樓朱黃壩孔家莊等處亦俱現在加幫即水繞堤根人夫官辨羅列堤上易於防守臣恪遵聖諭敬謹辦理每遇風雨長水之時奔馳兩岸督率屬員相機修守凡豫東兩省險要之處俱有準備千里堤工自當日臻鞏固臣因身親目擊敬歷數情形仰慰聖懷兹逢天氣漸見晴明秋汛水勢巳定各處工程平穩謹繕摺奏聞伏祈睿鑒謹奏覽奏深慰朕懷卿之勤劬朕所悉知以此赤衷對越天地神明自必獲蒙鑒佑也勉之雍正五年九月初九日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為秋汛已竣工程平穩仰祈睿鑒事竊查今歲秋汛雨水甚勤黃沁屢漲但水勢雖屬浩瀚而循途順軌不致為患每逢發水之時臣必親至堤掃險要工程遍加察勘見風色平靜水波不興我皇上至誠至敬感格神祗明效大驗捷於影響是以兩岸安寧萬民有慶現今大堤月堤重重保障凡從前水占拋荒地畝俱巳耕種成熟即近水灘地所有支河亦經築壩堵塞水不能進淤地更獲豐收其窪下之區間有上水者而黍穀業已長成水退仍復有秋總緣河身刷深可以容蓄不致異常瀰漫之故從兹遞年修守堤工固而禾稼登豫省元氣可復再查東省曹單二縣工程臣現在竭力嚴催其沿河一帶村莊地畝因雨水囤積難於播種臣隨飭廳印各官開放涵洞疏通水道引水歸湖現今積水已消民間可以種麥在大堤之旁水涸得土可以加幫公私俱便現今天氣晴明曉夜儹工承修各員陸續報竣總由皇上愛民如子發帑興修所以豫東兩省濱河一帶堤岸有金湯之固羣黎獲衽席之安所有秋汛水勢工程平穩情形除另行恭疏會題外謹繕摺奏聞仰慰聖懷伏祈睿鑒謹奏覽奏豫兗河道情形朕心曷勝慰悅頃秋汛雨澤既多水勢自猛朕日夜厪念淮黃不知作何光景今乃如是平穩可謂出於望外皆卿等忠誠勤慎所致兩省黎庶實攸賴焉已有旨從部頒發矣雍正五年十月二十九日吏部右侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為乘機因勢開挑引河以固大堤仰祈睿鑒事竊惟黃河之水湍悍變遷其性多曲每遇掃灣轉溜非斜趨而北即直注而南以致兩岸堤工或當大河之頂衝或被支河之汕刷簽樁下掃多方救護始獲保固平穩此南北兩岸各工致險之源也上年十月內臣恭進黃沁安瀾圖仰蒙聖慈就圖指示將灣處挑直堤工即可化險為平諭臣查勘具奏臣遵即來往河濱詳細審視因河頭俱無吸川之形河尾又無建瓴之勢是以不敢冒昧議開隨令廳汛各官勤加相度倘河流稍有動移或遇可乘之機即當隨時入告不致因循貽誤當經奏明在案今查得儀封縣北岸雷家寺一工向因大河自南岸靑龍岡迤下由西南掃灣起勢直注西北致將雷家寺上首之灘刷開支河一道沿堤走溜經宋家營徐家塘曲家樓等處直至三家莊出口五十餘里騰波湧浪勢同奔馬每遇汛水泛漲上下搶護救應不遑該廳等曾將支河堵築土壩攔截以保大堤而水力盛大殊難抵禦臣經營籌度乘舟親往查勘現今靑龍岡迤下水勢瀠洄紆折將上灣淘作深兜與下灣相對止隔四百一十丈臣率領道廳汛員細加看驗上水河頭已有吸川之形下水河尾亦有建瓴之勢亟宜乘機因勢開挖引河導水東行則河身順直水不紆回大河之流既暢支河之勢自緩隨築壩攔截可以經久扞禦矣引河既成支河壩既築俾黃流全歸正河自當愈刷愈深將來河灘漸次淤高不特北岸雷家寺迤東五十餘里之掃工可以漸次減省而涸出之灘地亦得廣為耕種實於運道民生大有裨益今據道廳詳估前來臣復細加踏勘核估該挑引河四百一十丈及堵築支河土掃等工共銀七千餘兩謹繕摺繪圖先行奏聞恭請皇上訓示以便會同河臣齊蘇勒督臣田文鏡恭疏題請伏祈睿鑒謹奏若知之真見之透復與齊蘇勒意見相同即一面具題一面興工可也雍正六年正月十九日吏部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報河工豫備事宜敬慰聖懷事竊查豫省河工歲修一項臣前條奏定於秋成後即發銀購料每秫秸一百斤定價七分較前節省二分務於八月內道庫發銀勒限十月內照額辦足奉旨俞允欽遵在案隨即飛行道廳遵照去後兹據管河道祝兆鵬河北道朱藻呈報南北兩岸各廳辦料銀兩俱經如期給發所買物料業已購足陸續運貯工所前來臣於臘底新年復親往查察目擊堤工所貯料物俱各鱗比櫛次堆積崇墉分編字號插立牌橛隨諭多撥兵夫看守儘可有備無患再查堤上搶險下掃鑲填全憑積土臣已嚴飭廳汛督率兵夫趁此間暇沿堤預備土牛料物既多土牛既積本年各汛修守有資自可無誤隄防矣至南北兩岸柳園因從前需用過多採伐殆盡早已通飭廳汛務於冬末春初津液含蓄之時廣為栽植俟春和澆灌成活臣復親加催督查驗兩岸柳椽俱已密排栽種成行河工要料漸見蕃衍所有預備事宜理合恭摺奏聞上慰聖懷伏祈皇上睿鑒謹奏防禦有備允愜朕懷人事盡而後天心之眷祐可期朕宵旰勤求孜孜不倦亦正此意耳勉之同日又奏為聖主天恩浩蕩微臣感激難名敬陳謝悃仰祈睿鑒事雍正六年正月十一日準河南督臣田文鏡字信內録正月初六日奉怡親王大學士等來字雍正五年十二月二十二日奉上諭副總河嵇曾筠衙門無養亷之項朕向來不知故未降旨今因齊蘇勒奏聞朕始知之爾等可寄信與河南總督山東巡撫令河南山東二省各於公用銀兩內以三千兩給與嵇曾筠為伊用度伊既辦理地方公事自應如此加恩倘不為籌畫養亷之項將來遇不肖之員為副總河必至苛索於地方也欽此遵旨寄信前來知會到臣臣隨虔設香案望闕叩頭恭謝天恩訖竊臣一介寒微備員詞館荷蒙我皇上洪恩賞拔洊列卿二特授以副總河之職管理豫東兩省堤工五載河干毫無報稱乃蒙睿照周詳曲為籌畫特命怡親王等寄信河南山東督撫二臣令於二省公用銀兩內各以三千兩給與臣曾筠用度洪慈體恤至優至渥聞命之下感激涕零伏念臣父以生員殉節臣母以靑年守志臣以四齡孤子伶仃飄泊幸際昌明之會疊邀知遇之隆今又蒙皇上如此加恩匪特微臣不敢稍萌不肖之私自今以後即有不肖之員亦莫不滌面洗心鼓舞奮勉於天高地厚之中矣所有微臣感激愚忱理合恭摺奏謝伏祈皇上睿鑒謹奏汝前為養亷一事具摺陳請曾經批諭酌查取給之項嗣後汝未再奏朕亦遂爾遺忘今齊蘇勒來京面陳一切方始憶及比年來汝二人難堪淸苦矣兩省督撫目擊拮據情狀不一過問何若是之恝然也雍正六年二月二十七日吏部左侍郎河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為欽奉上諭事雍正六年正月二十七日臣於山東曹縣工次時值河臣齊蘇勒陛見回南赴豫臣隨跪請皇上聖安據齊蘇勒傳奉聖諭河南雷家寺一帶堵截支河開穵引河一事爾於回南之時前往彼處再行詳看會同副總河嵇曾筠細加商酌欽此欽遵臣於正月三十日同至雷家寺工次細看河勢情形凛遵皇上按圖指示機宜詳加斟酌應於儀封縣三家莊添築迎水大壩一座以抵全黃頂衝之力又查曹縣芝麻莊掃工地居三家莊下遊正對黃流掃灣水勢悍激應於舊掃上首添築挑水大壩一座挑溜開行上下可保無虞俱經會摺恭奏齊蘇勒於二月初十日出河南境訖臣一面飛飭儹運料物將三家莊迎水壩及芝麻莊挑水壩晝夜興築下掃簽樁鑲墊穩固復親至雷家寺督催各員挑穵引河已經穵有八分指日可以告成臣因桃汛屆期由山東黃河北岸起一路沿堤查勘直至河南武陟嚴諭沿河廳汛員辨多撥兵夫擡土增培堤頂搜尋鼠穴獾洞修理歲搶工程以資捍禦臣自查勘北岸之後即渡河查勘南岸堤工往返巡厯目擊沿河灘岸竟有高出水面七八尺一丈不等可見河身漸次刷深此皆由皇上睿慮周詳聖謨指示所致臣惟有愈加謹慎先事圖維以仰副聖懷理合恭摺奏聞伏祈睿鑒謹奏據奏河漸刷深朕懷甚慰至於堵截開挑等務人事固所當盡仍宜以公誠敬謹感天格神冀邀佑助絲毫毋涉縱肆勉之同日又奏為請旨事雍正六年二月初二日河臣齊蘇勒傳奉上諭據奏河南蘭陽縣漫口處所有神像自上流漂來其漫口之水隨即自行沙淤甚屬竒事爾等當於此處另建寬大廟宇以答神庥欽此欽遵臣隨公同相度地基興建廟宇業經會摺恭奏欽惟我皇上愛民心切誠感河靈為民敬神建立廟宇此誠千載難逢殊祥巨典也伏念臣於雍正元年六月內欽承簡命來赴河南堵築中牟十里店漫口奉旨動用庫帑分發各州縣辦料至十月初間料物齊集堤頂堆積如山正在晝夜捲掃尅期搶堵不料十月十七日夜半更夫挂燈籠於棚簷失火燒棚斯時棚之西向逼近壩臺因趁月明鋪掃滿地秸草棚之東向有千百萬之積料堆貯崇墉若一延燒則壩臺既不可保物料盡成灰燼臣寢處草棚驚聞起視見西風猛烈火焰燭天風頭火勢俱自西料運送維艱民力何堪伏望風火尊神仰體上帝好生之心聖主焦勞至意止風熄火下救黎民困厄頃之忽見風頭陡轉火勢自南而北將堤北渡船一隻燒燬殆盡大桅南倒又將火頭壓滅東西壩臺物料俱獲保全斯時官民夫役莫不歡呼風色全無波恬浪靜似應起建風火二神祠宇以酬神貺今現奉間兩旁配殿各六間門樓各三間附於廟之左右敬安奏為此繕摺請旨伏祈皇上睿鑒施行謹奏覽雍正六年三月十三日兵部尚書河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報蘭陽新險工程搶護平穩仰慰聖懷事竊照蘭陽縣北岸耿家寨地方原係臨河險要臣前同河臣齊蘇勒相度形勢必得重門保障方資鞏固因議將大堤及臨河縷水堤並中間土堰一道亦幫作越堤共有三重均酌量估計於雍正二年三年陸續題請加幫在案近因河勢下移南岸長出淤灘黃流北注漸成頂衝本年二月間節據該廳汛具報掃工蟄陷厯經批飭動料鑲填搶護嗣於二月二十八日臣正在巡查南岸據下北河同知張近光報稱二十七日未時河勢陡湧大溜衝刷堤根走掃一箇連夜捲掃搶護至二十八日卯時塌缷堤頂一丈餘等情臣隨冒雨渡河赴工查勘見水勢巳緩即住宿工次相機修守如式下掃簽樁堅實買土鑲填業經搶築平穩訖伏念桃汛水勢易長易消尚然報險急應未雨綢繆以防伏秋二汛因查第三道大堤久已加幫高厚其第二道越堤雖經加幫頂寬二丈底寬八丈高一丈二尺尚嫌卑薄其臨河第一道縷水堤近因大溜直射堤根深至二丈有餘臣再四籌度現於堤南迎溜頂衝之處下摟崖掃一路沉水掃一路又預備料物相機下魚鱗掃一路再查縷堤北面有積水深潭因晝夜趕築裏創壩臺密釘攔土排樁一路又於險工左右堤頂盡行酌量加高則頭門巳屬穩固次將第二道越堤隨地勢加幫高至一丈五六七尺頂寬三丈底寬十二丈并估下等掃一路則二門亦有捍衛再於第三道大堤上添貯料物以備不時需用多撥員辨兵夫防守則三門亦有準備再估從縷水堤北直接大堤東西建築格堤二道預為收束水勢地步則四面層層有備雖至伏秋可保萬全矣臣一面會商督臣田文鏡暫動河庫存貯捐工銀兩委河北道朱藻督工儹築興修尅期告竣一面飭令據實確估造册會題請旨外所有現在搶護耿家寨堤工平穩情形合先奏聞恭慰聖懷伏祈皇上睿鑒謹奏從來有備則無患覽奏抵禦機宜朕懷似可不為伏秋慮矣雖然天下事往往功成於險變起於平智或有時不及施力亦有時不足恃心一放則必至懈弛故書垂無逸之訓而詩載戰兢之誡也要當敬慎日增斯須不可去念期共勉之雍正六年五月二十八日吏部尚書河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報五月水勢工程平穩情形上慰聖懷事竊照黃河堤岸全憑修守臣凜遵聖諭時刻嚴飭廳汛員辨竭力奉行即儀封北岸之三家莊山東曹縣之芝麻莊俱經下掃簽樁添築壩工鑲填穩固其蘭陽北岸新險之耿家寨工程緊要臣現在親行催督多備物料隨蟄隨鑲雖係頂衝壩工已經堅厚足資捍禦臣緣駐劄險工不能分身遍為查察屢檄兩河員辨加謹修防現有左僉都御史臣徐湛恩前往兩岸凡遇歲搶工程督令星夜儹做自五月初三日查勘起至二十四日始回耿家寨目見兩岸堤工俱各平穩五月內雖經兩次長水然皆旋消循軌東注臣乘舟細察河勢見中泓既深黃流已循故道凡係昔年舊有險工之處俱當加意防範臣已檄飭廳汛多積物料相機修守如遇新險要工即一面竭力搶護一面據實勘估會題務必恪遵聖訓時存敬慎早夜修防以保護安寧所有五月水勢工程平穩情形理合恭摺奏聞仰慰聖懷謹奏覽奏水勢情形朕懷深慰然必待伏秋二汛過後方可言平穩二字也慎之又慎毋或少怠同日又奏為恭報引河告成水勢暢流上慰聖懷事竊查儀封北岸河勢直注西北刷成支河沿堤走溜騰波湧浪勢同奔馬經宋家營徐家塘曲家樓直至三家莊綿長數十里每值汛水漲發搶護不遑臣經會疏題請於雷家寺地方開穵引河導水東行荷蒙恩允欽遵在案臣於正二月間即親督廳印汛各員挑穵如式嗣緣桃汛水小不敢輕於開放至五月十二日河水長有四尺五寸臣隨星夜前往督同承挑各員多雇人夫將河頭河尾一夜挑穵深通於十三日清晨開放時值西風忽起水激風順湧溜東注引河瞬息盈科暢流無阻臣又於二十三日乘舟察勘適當雷雨交作西北風猛住宿舟中是夜水長四尺四寸風順水湧大溜皆歸引河至次日查勘河身汕刷寬有百丈深有二丈四五尺不等新河愈刷愈深舊河水勢頓落雷家寺迤東一帶掃工將來可漸次減省而水占灘地亦可逐漸涸出廣為耕種實於運道民生均有補裨此皆仰賴我皇上敬天勤民至誠感召神力護佑所致也所有雷家寺引河告成情形理合據實奏聞恭慰聖懷伏祈睿鑒謹奏據奏開放引河時水激風順若有神助皆賴卿等實心任事正已率屬有以感召所致朕慶幸有加欣慰不已期共勉之雍正六年七月二十七日吏部尚書河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭報七月水勢工程平穩情形上慰聖懷事竊照伏秋交會之際水勢最為險要蓋因伏汛未消秋汛踵至未免汪涵渟蓄故歷年以來屆期防範搶護不遑至今年七月伏秋交會水勢雖見增長而風恬波靜前水已消後水方至兩岸廳汛兵夫小心修守雖至險如耿家寨三家莊芝麻莊掃工亦皆鑲填保護平穩臣又乘舟遣熟諳河兵探量中泓水勢武陟以下深至二三丈不等考城以下深至四五丈不等可見河底日漸刷深河槽實能容納自無漫灘異漲之患伏查本年七月初六日據報沁河長水四尺餘臣即飛檄廳汛晝夜修防去後嗣據各汛報到沁河之水流入黃河所長不過尺許此雖因河面寬濶實由河底淵深之明驗也再查黃河性不兩行各道支河堵塞既無旁流以泄其氣而紆曲太甚衝刷堤工之處又開穵引河以順其性如雷家寺新河既成不數日間靑龍岡迤下數十里舊河身旋即淤成平陸此皆由我皇上宵旰憂勤誠敬格天指示周詳所以黃流循軌日慶安瀾臣惟有凜遵聖訓益加敬慎勤事修防以永保堤工鞏固所有七月水勢工程平穩情形理合恭摺奏聞仰慰聖懷伏祈睿鑒謹奏覽奏深為慰悅一切工務朕不過指示大略至於臨時應變相度機宜若非卿等勤勞趨事忠誠感神曷克有此功效再能保固三二年後朕憂虞之念可全釋矣朂哉敬慎勿懈雍正六年十二月十一日吏部尚書河南副總河兼管黃河堤工臣嵇曾筠謹奏為運河水勢深通黃河料物齊備敬慰聖懷事竊照豫省漕糧全資丹衛二水濟運自蒙我皇上欽頒衛河源神靈源昭瑞匾額新泉渙發愈加滂沛現今時值隆冬各道泉源湧注與丹河合流濟運現今探量水勢深有五六七尺不等漕艘通行俱陸續催儹出境至黃河歲修料物早已撥帑採辦現皆運貯堤工堆積崇墉來歲修守可以有備無患臣因接準部文欽遵諭旨致祭嘉應觀河神即由蘭陽起程前往武陟於十二月初九日虔誠敬謹肅將祀典訖隨即一路查勘豫東黃河兩岸工程趁此水落歸槽凡應修應補之處預為相度以便明歲春和加工并督率兵夫住宿堡房積土種柳歲暮天寒守望相助千里長堤查察謹嚴附近居民寧謐安堵所有運河水勢深通黃河料物齊備情形謹繕摺奏聞伏祈睿鑒謹奏運河水勢深通黃河料物齊備欣悅覽之但聞汝於諸凡事務殊欠擔當往往推諉屬員此乃大不可者果若是止知有已而不知有人人心何由而服將見平時則各懷顧惜臨事胥觀望不前於汝甚屬無益當返躬內省極力改除為要雍正七年正月二十二日吏部尚書河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為恭謝天恩事雍正六年十二月初五日準工部咨開恭報搶築等事一案十一月十六日奉旨秦家厰漫口合龍之處原屬險急工程其用過土方價值又屢經部駁嵇曾筠為人謹慎小心若果浮冒伊必據實核減這次加恩準其開銷不必再行駁詰欽此咨行到臣隨恭設香案望闕叩頭謝恩伏念臣本愚陋備員河干冰兢自矢六載於兹凡有廳汛所做工程該道册報臣每嚴加核減親勘確實果無浮冒方敢報銷此臣慎重工帑之微忱時時凜矢旦明而不敢直陳於君父之前者乃早蒙皇上洪慈洞照特沛溫綸捧誦皇言銜感無地臣自揣知識愚鈍報稱無能惟有勤事修防痛加釐剔凡係工程錢糧不致纖毫浮冒事事謹慎刻刻小心以仰報皇上知遇隆恩於萬一耳為此繕摺恭謝天恩伏祈睿鑒謹奏揆情酌理四字朕實能之第恐聞見不確則或未必適得其當耳同日又奏為欽奉上諭事竊臣齎摺家人回豫敬捧皇上硃批臣運河水勢深通黃河料物齊備等事奏摺欽奉硃批諭旨臣跪讀之下惶悚無地伏念臣一介庸愚毫無知識六載河干愆尤叢積荷蒙皇上覆載洪慈包容教誨保全至今兹蒙聖訓誡飭以臣擔荷之力甚欠往往推諉屬員令臣返躬極力內省改除宥其既往勉其自新感戴生成涕零如雨第臣有下情不敢不敬陳於聖主之前者竊查河工私弊易生河工浮議易起臣受恩深重惟知矢慎矢公務期工收實在帑不虛糜是以工無論大小臣必親勘地無問逺近臣必親到河員以有事為榮以興工為利但云工程險要而不知內中有應做不應做之工若一槩擔承估計興修必致帑金糜費臣於此等工程必再四推敲駁飭詳加核實方敢具題此臣拘謹愚誠難逃聖明洞鑒之中者也再臣素未諳練河務自奉命到工兢兢學習刻刻提防凡遇迫不及待之險工即立時擔荷率先搶護外至若工程浩大需帑繁多尚可稍緩時日者臣必再三相度形勢一面調撥銀兩預備料物一面商定於河臣細訪於熟諳員辨兵夫詢謀僉同然後踴躍前進下一掃務必得一掃之力做一工務必收一工之效其難其慎以冀萬全是以數年來凜遵聖訓幸得黽勉供職伏念豫東二省河工最關緊要我皇上宵旰焦勞諄諄訓示微臣世受國恩才庸任重即捐糜頂踵尚難報稱寧敢稍萌推諉屬員之念上負聖主知遇之隆祗緣大工業已告竣長堤屹若金湯自應以撙節錢糧為重倘臣冒昧擔荷或致帑金糜費屬員虧空則臣罪難逭至於估計工程錢糧例由道廳册報臣等察核稍有浮冒臣等查參若不慎重詳查自用自專恐致草率易生朦蔽臣愚不得不兢兢過慮也欽奉皇上矜憐訓誡臣惟有感激猛省諸事留心凡有一毫推諉之念必痛加改除以仰副聖主教誨之仁恩於萬一耳臣謹繕摺恭謝天恩伏祈睿鑒謹奏謹慎固為處事要道但不可因小而失大過與不及等耳今齊蘇勒業經溘逝修防諳練乏人當倍加黽勉切勿過於拘執錢糧重輕較之河防又其次矣朕數日以來如失所倚念彼河干思吾賢佐不禁為之涕下奈何奈何向後能慰朕懷與否萬姓蒙福罹災與否全賴汝之忠勤誠敬矣灑泪批諭雍正七年二月二十五日吏部尚書河南副總河兼管山東黃河堤工臣嵇曾筠謹奏為欽奉上諭事雍正七年二月十八日臣於儀封北岸工次接到皇上發回臣欽奉上諭事奏摺奉有硃批諭旨臣跪讀之下悚懼恐惶置身無地竊念臣樗櫟庸材仰荷皇上天恩拔擢豢養生成特畀河工重任提撕警覺教育多方兹以河臣齊蘇勒已故特頒訓旨誥誡諄諄仰見我皇上慎重河防時深飢溺之思眷念勞臣彌切股肱之痛臣雖犬馬無知亦思感奮圖報自今以往惟有凜遵聖諭加倍小心無事則以查核錢糧為重有事則以搶護工程為要不敢因小而失大不敢矯枉而過正念念切於忠勤刻刻勉於誠敬所有豫東二省黃河工程臣總以身肩任務保長隄永固圖萬姓之久安頌皇仁之錫福以祈仰慰聖懷於萬一耳臣謹繕摺恭謝聖訓謹奏仰慰朕懷豈在紙上空丈須數年後金堤彌增鞏固黃流永慶安瀾方可謂言行相符是乃朕之大願也敬慎為之硃批諭旨卷一百七十五之二欽定四庫全書硃批諭旨卷一百七十五之三硃批嵇曾筠奏摺雍正七年三月初三日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭謝天恩事雍正七年三月初二日接準吏部咨文欽蒙皇上聖旨授臣總督河南山東河道提督軍務隨恭設香案望闕叩頭恭謝天恩訖竊臣一介庸愚至微極陋荷蒙皇上殊恩特授河南副總河之職又復仰承恩命兼管山東黃河堤工任事以來皆賴聖謨廣運睿慮精詳臣凛遵恪守夙夜冰兢而報稱無能時深惶悚乃蒙我皇上委任有加特頒諭旨令尹繼善與臣分任南北二河之事又以治河之道必合全河形勢通行籌畫方可疏導安瀾特允廷臣議奏所有南北修理工程令臣等公同商酌會稿具題期於兩處均有利益仰見我皇上聖明天縱洞悉河防指示機宜無微不照臣聞命自天措躬無地惟有益加謹慎詳求疏築之宜勤事奔馳勉竭駑駘之力和衷共濟倍凛小心務期河堤鞏固運道深通以仰報皇上洪恩於萬一耳除現在具本奏謝天恩并一切應行事宜恭候敕書印信頒發到日凛慎欽遵次第舉行外所有微臣仰荷新綸感激蟻忱先行繕摺奏謝伏祈睿鑒謹奏從前齊蘇勒肩任河防南北總局實皆倚賴仐伊物故不但北河疏築各務須倍加籌計全河形勢悉當再四講求慎勿泥於紙上陳文廢棄齊蘇勒現行規畫尤不宜好竒穿鑿立意更張如閘壩之啓閉應時最為切要少失機宜所關匪細敬之慎之與南河諸臣和衷勉力為之同日又奏為請旨事竊查山東運道北接神京南連吳楚漕艘往來咽喉要地天儲關係綦重是以從前總河衙門駐劄濟寧城內遙控上下設立標兵營辨一以催趲漕運一以彈壓地方原為有備嗣後河臣移駐清江不特豫東二省河防難於照應即地方重鎮防微杜漸之事亦少經理我皇上聖謨宏逺特命河東二省添設總河俾黃水上遊捍衛周密而催漕趲運亦有專司仰見睿慮周詳尤為超軼千古臣每念濟寧路當孔道為五方雜處之區沿河一帶人情刁悍必須兵制嚴明查輯姦宄方為有益但從前專管黃河不敢越爼今蒙聖恩命臣總督豫東河道提督軍務何敢因循推諉臣擬趁此黃水未經長發之時一靣嚴飭道廳汛辨督率兵夫在工早夜修守一靣馳赴濟寧凡一應疏泉濟運考驗辨兵稽察夫工利弊等事力為整飭即仍赴黃河工次督理修防庶黃運二河得以國恩疊膺異數勉圖犬馬之報而知識短淺才具駑鈍總求聖主訓示開𨗳以便敬謹遵循臣謹繕摺請旨伏祈皇上睿鑒謹奏此奏嘉悅覽焉內外大臣遇應辦理之事咸肯如是毅然擔任踴躍趨赴寧復有叢脞之虞更亦無庸丁寧誥誡矣至於南北分管各務如敕書內有開載未晰者會疏聲明題請雍正七年四月二十一日吏部尚書總督河南山東河道臣嵇曽筠謹奏為運道深通糧艘遄行仰慰聖懷伏祈睿鑒事竊臣一介菲材荷蒙皇上洪恩畀以總督河東河道兼管運河復欽奉諭旨命臣速往整理隨於四月初二日到濟寧任事所有運河廳汛工程錢糧一靣咨會江南河臣移取檔案一靣檄行兖寧道造具清册俟到日詳加查核并遴委河標左右二營遊擊暨河工效力人員星夜催趲重運再嚴飭河閘官員遵照漕規定例啓閉外臣即由濟寧州起程查勘運河并堤閘等工見一路河流通暢水深六七八九尺不等糧船銜尾北上現今過濟已有三千餘隻至查濟寧迤北馬場馬踏蜀山等湖水勢容蓄儘可濟運其安山一湖少遜至南旺地勢窪下僅能泄運河之有餘不能補運河之不足至濟寧迤南如南陽昭陽微山等湖水靣寬廣濟運尤為充裕但湖河間隔止此一線殘堤除滕嶧二縣工程未經估修外其餘堤岸歷經前任河臣撫臣題請興修有業已報竣者有現在興工者有因水占艱於取土屢請展限寬期者臣俱飛檄行催立限趲工飭其設法修整早為幫築以資衛蓄目今天氣晴明日久臣已分投委員查察泉源力為疏濬以冀源源接濟況馬場馬踏蜀山等湖尚有未經開放之斗門現在蓄水俟十分緊要方行宣泄濟運是濟寧以至臨清地勢雖髙可以無慮所有水勢通暢糧艘利涉情形理合繕摺奏聞仰慰聖懷伏乞皇上睿鑒謹奏適春夏之交稍覺缺雨正恐漕運或致淹遲覽奏甚為慰悅雍正七年五月二十四日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭報黃河水勢工程平穩情形仰祈睿鑒事竊惟時當夏令汛水將臨臣謹遵訓旨先事預防所有豫省黃河南北兩岸應行修守之處臣已嚴飭道廳文武汛官督率兵夫鑲墊堅整足資捍衛又移咨內閣學士協理河務臣徐湛恩勤加查察兹於五月初十日黃河長水三尺二寸旋即消落一切堤掃工程俱各平穩再運河糧艘遄行昨於五月十八日全數催過濟寧臣謹恭疏題報在案目下正屆東昌臨清一帶地勢髙阜之處臣來往稽查閘座督令啓閉依時相機蓄泄以資浮送俟料理運河事竣臣即於六月初旬伏汛未長之前星馳赴豫巡查兩岸工程務保無虞謹將現在黃河水勢工程平穩情形繕摺恭報伏祈皇上睿鑒謹奏今嵗春末夏初晴霽多時幸不至旱者賴去冬及二三月雨雪之膏澤耳目前數省缺雨堤工自應無恙但夏旱則秋潦乃理之常伏秋兩汛或不無淋潦之虞先事綢繆最為緊要也濟運事宜尚可委員料理防河籌策豈容時刻少疏亟宜旋豫督率巡察以盡力保固同日又奏為核定運河夫食銀兩去浮冒以收實效事竊臣欽奉皇上恩命管理東省運河查上自德州交界起下至江南邳州交界止計長一千一百四十三里為漕艘經由要地河則年年挑穵堤則嵗嵗增培所以運河捕河泇河東昌上下河五廳汛內共額設淺溜橋閘兵徭酌壩等夫三千三百三十三名嵗領工食銀三萬二千兩有零至冬春大挑不敷力作加募夫五千四百七十名幫貼銀六萬二千二百一十三兩有零小挑募夫一千四百二十一名幫貼銀四萬四千一十三兩有零俱係州縣經徵解交河官散給成例相沿已久其中加派多徵扣尅浮冒等弊種種不一臣現在嚴檄行查令各屬自行舉首革除外至幫貼一項前河臣齊蘇勒於雍正五年節省銀二萬三千一百七十二兩零雍正六年節省銀二萬二千七百二十六兩零但去弊莫如淨盡立法當垂永久若不確加查核定有成規恐將來諸弊又緣之而起且既經節省廳汛各官無所用其浮冒遂將各項夫役應領工食銀兩肆其扣尅浸漁窮民力作經年博取微利以為養家糊口之計今有名無實則褁足不前大挑小挑呼應不靈甚至掩飾耳目潦草塞責殊非經久之圖臣謬抒管見現在檄行東省司道費金吾等從長酌議將運河各廳所管汛內通盤核算每年額設夫役若干名應給工食若干兩逐一均勻派定飭令道廳各員點其數目察其工作不許有絲毫虛冒扣尅外其餘幫貼銀兩竟行藩司禁止多派祇照舊額徵收解貯河庫遇有挑淺築堤關係緊要工程再行詳請加募按工雇夫按夫給價則應徵之夫食悉歸實用多派之規費徹數革除所有幫貼羡餘銀兩全以歸公不特有禆國帑無纍民生而河道堤工嵗修月浚亦無單薄淺澀之虞矣緣臣才質駑鈍知識短淺一應條分縷悉之處尚在詳加妥議務期諸事允協方敢恭疏具題所有運河夫食等事臣將查核緣由先為繕摺奏聞伏祈皇上睿鑒謹奏朕御極之初即有人條陳此一節經發廷臣會議咸言不便更張朕意如果有利無弊諒齊蘇勒必早奏聞矣不可圖邀一時虛譽任意增減臨期束手無策那西補東翻致弄巧成拙田文鏡老成練達權量得宜不涉偏執朕所信任弗疑者當與之密相妥商會摺具奏凡類斯沽名之舉居功事後罪猶可恕倘於未行之前有意張揚以示德於無知小人及或議不果行終俾恩歸於已怨歸於上並缷過於同事乃取禍之道也萬勿循此軌轍戒之志之此諭亦密與田文鏡看同日又奏為恭謝天恩仰祈睿鑒事雍正七年五月十一日臣齎摺家人敬捧皇上御賜臣母香珠二串藥錠一匣又蒙恩賞臣香珠二串藥錠一匣臣隨跪迎道左恭設香案望闕叩頭謝恩祗領訖伏念臣父嵇永仁殉節閩疆臣母楊氏時年二十四歲苦歷冰霜經今五十七載上年仰邀曠典得蒙錦縀之頒屆今又荷皇恩復拜靈丹之錫榮施罔極浩蕩難名竊臣自受任副總河以來原於武陟地方賃居民舍後以河勢下移隨時搶護孑然一身日往來於豫東二省之交擇險奔馳寓居湫隘所以烏鳥私情不遑將母今蒙皇上天恩畀臣以總督河東河道兼管運河查總河舊湛恩遙賁崇朝適至臣母踴躍歡忭虔稱佛號恭祝深感勵惟有愈加黽勉竭力宣防永矢踵頂之捐糜冀報髙深於萬一耳臣謹繕摺恭謝天恩伏祈睿鑒謹奏覽奏謝矣以卿現居職任而論如欲為母延年兼貽福後裔惟在鞏固金堤登沿河萬姓於袵席之安而已除此别無良技設以全活無數姦匪姑息枉法貪官謂能積功纍行不但上無益於母下無益於子孫且恐冥默中更造孽靡涯也然乎否耶其審思之雍正七年六月十五日吏部尚書總督河南山東河道臣嵇曽筠內閣學士協理河工事務臣徐湛恩謹奏為欽奉上諭事雍正七年六月十三日接準河東督臣田文鏡咨開欽奉硃批諭旨今嵗直隸各省雖不為旱大都雨水欠足從來物極必反春末夏初既苦愆暘夏末秋初或恐霖潦不免也一切河工堤岸之防護俱當綢繆於早加倍慎重將朕此諭轉傳河臣嵇曽筠暨大小河員悉令知之欽此欽遵移咨到臣跪讀之下仰見皇上睿慮周詳先事綢繆慎重河防無微不照臣欽遵聖訓即傳知大小河員愈加敬慎防範於夏末秋初更當加倍小心各屬河員兵夫咸感激天恩踴躍奮勉務期防護嚴密時屆伏秋尤當加謹修守以圖鞏固竊照黃河自桃汛以後水勢逐漸消落嗣接寧夏府報稱五月十八日水長二尺有餘臣曽筠於六月初三日赴豫在三家莊芝麻莊查閲掃壩各工見河水長有三尺五寸隨即消落則知寧夏水頭已過嗣後隂雨連綿沁河發水至十一十二日臣到祥符見河水又長四尺七寸前後俱未出槽臣復巡查南北兩岸逐細確勘堤掃工程俱各堅實穩固物料堆積崇墉堤坡草根蟠結髙柳卧柳層層障蔽足資捍禦即雨淋水溝亦甚稀少業經嚴飭廳汛員辨隨時督率兵夫上緊填補並無絲毫罅隙至曹單二縣工程臣徐湛恩前往查勘嵗修堤工現在陸續趲築諸望壩新做掃工俱已鑲墊出水八九尺不等現今兩岸禾苗茁茂三時甘霖疊沛黃沁水勢隨長隨消今嵗伏秋安瀾有象此皆仰賴我皇上敬天勤民至誠感召雨㿩時若神明默佑之所致也臣等惟有凛遵諭旨於夏末秋初伏秋交際之時倍加小心住宿堤岸晝夜防範分投查察務使兩岸堤工有金湯之固黎民登袵席之安以仰副皇上宵旰憂勤諄諄告誡之至意所有欽遵緣由以及黃沁水勢工程平穩情形理合繕摺奏聞謹奏勉之慎之直待金行序轉水落歸槽方可暫息顧慮也雍正七年七月二十日吏部尚書總督河南山東河道臣嵇曽筠內閣學士協理河工事務臣徐湛恩謹奏為恭報伏秋交會水勢工程平穩情形仰慰聖懷事竊照今嵗伏汛隂雨連綿沁黃長發誠如聖諭夏末秋初雨水過多仰見我皇上睿謨深逺明燭機先臣等凛慎欽遵倍加寅畏以固河防查寧夏府報黃河水長三次各二尺有餘沁河報長水四次有二三四尺不等但黃沁單行則勢甚和緩並不出槽黃沁並漲則勢頗浩瀚卑窪之處間有出槽然皆順軌安行中泓容納深通不致衝激為患更兼長水之時風色寧靜波恬浪平所以河堤鞏固現今伏秋交際正工程喫緊之時查上年物料備辦原多又有汛船足資挽運現將兩岸掃工竭力加鑲髙厚堤工土牛豐積嚴飭兵夫就近取用填墊水溝堤頂亦皆平整臣等分投查勘督率道廳汛辨曉夜巡防俱可力保無虞恐厪聖懷謹將伏秋交會水勢工程平穩情形恭摺奏聞伏祈皇上睿鑒謹奏覽安瀾景象朕懷深慰然霜降未過何敢泰然釋念耶期共加勉敬慎以畢今嵗修防吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭謝天恩事雍正七年六月十六日臣齎摺家人敬捧皇上恩賜臣母御窰磁器四種錦香袋十枚又蒙賞臣花籠扇墜一提臣隨跪迎道左恭設香案望闕叩頭謝恩祗領訖竊臣樗櫟庸材至愚極陋供職河防毫無報稱蒙聖恩髙厚俾得迎飬臣母寸草春暉皆出皇仁之浩蕩是以恭摺奏聞乃荷聖心悅豫喜動天顔伏念臣母年屆八旬仰沐溫綸下問雲霄降福歡洽萱庭從兹臣母得以馴致耄期皆天語春溫之所賜也微臣母子不知何修而得此又蒙恩施稠疊賞賚頻加頒從內府捧至河干臣緘封什襲齎歸臣母逺勝斑衣起舞臣母恭領竒珍盈盤耀彩滿室飄香感深喜躍婆娑瞻拜焚香叩佛虔祝萬夀無疆臣感切蟻忱實難口達惟有凛遵天恩伏祈睿鑒謹奏覽雍正七年八月初三日吏部尚書總督河南山東河道臣嵇曽筠內閣學士協理河工事務臣徐湛恩謹奏為恭報秋汛水勢工程平穩情形仰慰聖懷事竊照豫省黃沁兩河自伏秋交會以來循軌安瀾工程平穩臣等已經奏明在案嗣於閏七月內據寧夏府報黃河長水二次計一尺有餘并二尺不等沁河報長水二次計二尺有餘并三尺不等當沁黃交漲之時臣等飛飭員辨兵夫防間愈加謹密所喜河泓深廣容納暢流不致泛溢兼之兩岸堤掃工程俱各加鑲髙厚填墊堅整雖水勢接連長發而足資捍禦極其平穩目今時屆秋分水勢已定臣等惟有凜遵聖諭敬謹督令修防直至霜降後方敢竣事所有秋汛水勢工程平穩情形臣等謹繕摺奏聞恭慰聖懷謹奏時屆秋分水勢如此堤工諒必無虞矣雖然屈指霜降尚有彌月之期何可坦然釋懷仍當加謹防護吏部尚書總督河南山東河道臣嵇曽筠兵部尚書總督河南山東等處地方兼理河道臣田文鏡謹奏為欽奉上諭事雍正七年六月十六日臣曽筠齎摺家人敬捧皇上御批臣為核定運河夫食銀兩等事奏摺欽奉硃批諭旨跪讀之下仰見睿慮周詳無微不照臣惟有凛遵訓旨加慎加密敬謹辦理緣查勘豫省堤工即馳至汴城與督臣田文鏡密為商議而督臣於此中利弊亦早已留心體察臣等遂細為商酌查東省運河額設淺溜橋閘等項長夫共計三千三百三十三名嵗支工食銀三萬二千餘兩在於各州縣地丁項下動用報銷冬春小挑不敷力作則於長夫之外添設酌補夫一千四百二十一名間年大挑則於酌補之外又加募夫五千四百七十名所需工食往例在於民間地土按畝輸錢名曰幫貼小挑之年共計幫貼銀四萬四千餘兩大挑之年共計幫貼銀六萬二千餘兩此酌補加募之由總因運河水勢靡定水小則流緩沙停水大則噴沙淤積是以大挑小挑乃係運河一定之工程長夫募夫均係河工必需之力作況力役乃小民分內之事而幫貼則免其逺涉之勞惟當察除額外之浮費不便議減一定之幫貼寧留有餘以備不虞無致臨期而或束手但從前毫無稽察經徵州縣有多派濫徵之弊廳汛員役有需索陋規扣短冒銷之弊邇年以來在工員役冒銷之弊漸次清除其他仍然如故所以臣等各自留心體察以期民免浮派帑歸實用惟是各夫工食舊額多寡不同有已支工食而重索幫貼者其應添跨夫應用器具又令長夫自行雇覓自行購辦不但影射侵漁冒銷分蝕難以究詰抑且有同一夫役而工食互異苦樂不均者臣等按其力作通盤核算酌定工食以為常則請將淺溜軍橋徭壩等夫每名每嵗給工食銀一十二兩量給器具銀八錢閘夫啓閉辛勤每名每嵗給工食銀一十四兩四錢量給器具銀八錢兵夫仍照兵餉之例每名每嵗給工食銀一十四兩六錢四分亦量給器具銀八錢以上各夫共需銀四萬六千五百六十餘兩除各州縣額編工食銀三萬二千二百四十餘兩外其不敷銀一萬四千三百二十餘兩在於幫貼項下照數找足至於酌募等夫自築壩戽水以至啓壩放水內有需工三十日以至六十日者每日量給工價銀六分每名量給器具銀二錢亦於幫貼項下照數支給仍令各該濱河州縣雇募交發河員將到工名數册報道廳轉報臣衙門即遴選幹員分投查點務使名名著實按工計夫按夫給價則因地制宜工程既有定限分查總核夫役亦難虛冒其節省銀兩俱令解交運河廳庫報明存貯以為河工緊要工程之用臨時仍奏明動用報部備案至於水勢有大小淤沙有厚薄酌補募夫多寡原難預定設有應添應減之處臨期責令道廳據實詳報以慿酌核務期無誤運行所有一應夫工確數盈餘銀兩統於冬春挑河竣事後臣等核實題明另造清册咨部備案如有扣短侵冒等弊立即據實糾參嚴加治罪庶帑不虛糜工收實效夫食無偏枯運道民生均有禆益矣為此遵旨恭摺會奏伏祈皇上訓示遵行謹奏所議甚屬妥協如應題達照此會疏具題不必贅敘前奏雍正七年八月二十四日吏部尚書總督河南山東河道臣嵇曽筠內閣學士協理河工事務臣徐湛恩謹奏為秋汛已竣恭報水勢工程平穩情形仰慰聖懷事竊查豫東二省黃河自入伏以來臣等凜遵諭旨倍切小心所有南北兩岸應行修守之處時時嚴飭道廳汛辨督率兵夫將土掃工程增加寬厚兹於八月初旬因大雨積水黃沁又復加長至初七初八等日接連異漲掃灣迎溜之處長至七尺八尺不等緣從前汛水尚未全消而天雨連日山陜兩省伊洛瀍澗丹沁諸水滙入黃河並漲遂致平漫出槽一𣲖汪洋直至堤根全賴兩岸堤工堅厚掃壩防風俱各鑲築髙寬足資捍禦所以此番水長雖消落稍遲連日浸泡而工程穩固不致疏虞間有臨河越堤逼近黃流水勢騰湧沿灘而上所恃料物廣多兵夫齊集曉夜搶護並無貽誤再查豫省之三家莊原為首險工程黃流自南而北久成頂衝之勢以致修守不遑上年曽蒙聖諭於對岸沙灘相機開穵引河導水東流臣等細加審視因係曠衍平灘河頭無吸川之形河尾無建瓴之勢所以未敢輕舉倘河勢稍有遷移即當乘時開穵乃此番長水之後南北兩岸沿堤掣溜之河身俱為淤斷而對岸大灘之內倐汕深渠中流直㵼成河竟至大溜離三家莊壩臺約有數百丈之逺伏思開穵引河非千萬人夫不能趨事亦非盈萬帑金不能興作今中間自汕河泓奔騰浩瀚百日之工成於一旦三家莊掃壩俱現淤灘化險為平藉非神力何能至此皆由我皇上愛育黎元奠安河嶽聖心誠敬上格於天所以水土治平下孚於地臣等往來河畔目擊情形驚喜之至愈生寅畏服膺聖訓更加敬慎謹據實奏聞仰慰聖懷伏祈皇上睿鑒謹奏所奏欣悅覽焉此乃卿等忠誠敬慎默有以感格神明之驗朕嘉與慶幸筆不能宣覽愈生寅畏一語來嵗安瀾又可預卜矣我君臣期共加勉以俟雍正七年十月二十八日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭報豫省運河通暢糧船全數出境日期仰慰聖懷事竊照豫省漕河惟資丹衛二水濟運自衛河源蘇門山新泉湧出經臣奏聞奉旨欽賜靈源昭瑞匾額嗣後每嵗泉湧暢流漕艘利涉然皆於十二月內方得開船北上今年當糧船回空之日即預為申飭疏濬務期一律深通以濟運行兹據糧道張建德河北道朱藻報稱庚戌年起運糧船已於十月二十六日全出豫境總由年登大有輸將既易而各道泉源濬發運河深暢是以糧艘遄行得如此之迅速我皇上親灑宸翰靈源昭瑞聖德感孚至誠丕應從此億萬斯年皆慶挽輸之利便矣再查豫東二省黃河水勢消落歸槽兩岸堤工金湯屹峙臣嚴飭道廳督催文武員辨兵夫堆積土牛修整殘缺并乘天氣晴明星速運料貯工以備來嵗修防之用臣即馳至濟寧辦理東省運河大挑諸務外所有豫省糧船出境日期理合恭摺奏聞伏祈睿鑒謹奏覽奏各道泉源濬發運河深暢糧艘於十月內已全出豫境皆由卿等忠勤任事昭格於上下神祗是用獲兹佑助切宜愈加誠敬不可絲毫肆念勉之雍正八年二月二十二日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭報運河大挑工竣兼陳水勢深通情形仰慰聖懷事竊臣前赴濟寧一帶督催大挑工程查勘各州縣水道業已敬謹奏聞在案伏查上冬今春例屆大挑之年臣以運道挽輸國儲關係綦重隨嚴飭道廳查估臣復親馳相度自臨清以至臺莊凡壅沙淤墊之處俱令徹水歸湖逐段築壩分投挑挖除額設淺溜軍徭等夫通數赴工力役外其需用酌補加募人夫應給工食銀兩悉照欽蒙皇上俞允酌定則例臣凛慎奉行檄飭濵河州縣每名日給銀六分實數實發並益以器具之資俾各夫俯仰有餘踴躍趨事是以欣欣子來歡呼恐後更幸冬末春初天氣晴和冰雪旋消胼胝之勞未形其瘁畚鍤之易殊見其速業於二月初旬陸續報竣以視上年較早完工一月臣又親往察勘見在在河身備極寬深普律如式淤沙挑淨足資容蓄臣因查工至泇河已有南來糧艘抵東省境於二月十五日入臺莊閘聞各幫亦俱陸續前進隨飛飭沿河廳汛將水匱各湖口門加謹堵閉以備將來之用但令啓壩開放汶水灌注接濟現在東省重運催趲遄行臣看來不特大挑工程早完一月即江南糧艘亦早到一月皆由我皇上宵旰勤求帝德廣昭天時水澤嘉祥輻輳所致也現今桃汛將屆臣前往豫工督率修守務保堤防於永固所有運河大挑工竣水勢深通情形理合恭摺奏聞伏祈睿鑒謹奏覽運河大挑工竣水勢深通情形甚為嘉悅非卿殫心籌畫實力經營何能奏此速效耶同日又奏為水利興舉需時道員查勘未竣冒昧瀆奏仰懇聖鑒事竊照東省水利荷蒙皇上睿慮周詳聖謨鴻逺俾沮洳化膏腴之地為生民規萬世之利甚要務也本年正月內臣在豫省即同督臣田文鏡會委兖寧道吕維炳前赴魚沛二縣一帶下遊水道循溯而南直抵海口令其遍加查勘專心經理現在沿途逐細勘查尚未竣事今於二月十七日準吏部咨開江南河臣孔育珣以吕維炳諳練河務於河庫河務均關重大等事案內題請調補淮徐道其兖寧道缺令臣與督臣田文鏡會同㨂選部覆奉旨康宏勳等依議補授餘依議欽此咨行到臣隨欽遵咨會去後伏思江南河務重大工多汛險仰厪宸懷自應就令該道星馳調任但兖寧一道管轄黃運兩河工程錢糧倉儲河務均為緊要非閲歷河工有年者不能勝任臣與督臣田文鏡詳加揀選一時難得其人且現在興舉水利驟更生手地形水道不克瞭如指掌尤難措置合宜仰懇皇上天恩俯允暫留吕維炳經理東省水利事竣俟揀選得人堪以委代之日方令其前赴調任庶臣等得以揀選好員而水利要務駕輕就熟尤易見功矣是否可行臣不揣冒昧謹繕摺瀆奏恭請敕旨伏祈皇上睿鑒謹奏所奏是田文鏡亦曽具摺陳請但淮徐道所管事務甚屬緊要缺難久懸候朕斟酌有旨雍正八年三月二十日吏部尚書總督河南山東河道臣嵇曽筠內閣學士協理河工事務臣徐湛恩謹奏為荆隆口河勢北趨急請開挖引河以順水性以保堤工仰祈睿鑒事竊查豫省黃河全勢既復故道則舊時險要之處必須先事提防兹有北岸封邱縣荆隆口者因南岸淤灘日漸增長全黃大溜逼注北岸該工坐當數十里之頂衝掃灣汕刷塌卸河崖去堤僅五六十丈雖現經多備料物加幫創堤嚴飭道廳汛辨相機上緊修防務保無虞但查該工乃舊時決口順治九年河決封邱大王廟口由直隸長垣越東省運河北注於海興工堵塞需用夫役錢糧纍嵗不下數十萬計方得成功今荆隆口與大王廟古黃池首尾交接咫尺相連內臨積水深潭形如釡底北面雖有汰黃舊堤卑矮殘缺難資捍禦外灘皆屬浮沙堤根之下又係舊時朽樁腐掃一遇黃水漫灘未免氣脈相通若至伏秋汛長水勢奔騰撞擊總有長樁大掃衛護周密難支經久且掃工必須嵗嵗加修需帑繁多而大溜緊逼上堤下坐呼吸變遷終非萬全之䇿臣再四思維必須於上遊對岸開挖引河分泄水勢則荆隆口一帶險工便可邀淤漸成平陸洵為一勞永逸之舉隨率同道廳等官乘舟由上而下細加審度現今上遊之黑堽口刷成兜灣天然自立河頭大有吸川之形至柳園口自髙而卑河尾噴㵼亦得建瓴之勢形勢既成急應迎溜開挑俾水由兩岸之中泓暢流東注南北堤工俱堪保護平穩從前武陟之倉頭口儀封之雷家寺等處引河至今通暢舊日河身業已化為沃壤桑田今若於荆隆口上遊開挑引河便得化險為平則億萬斯年運道民生皆沐我皇上胞與生全之德矣臣等查勘詳確隨會商督臣田文鏡亦云引河該挑須早興工當飭道廳確估工長三千三百五十丈需用土方銀二萬七千九百二十兩零因係緊要工程一靣先動河銀選委幹員劃地分工檄委河北道朱藻催趲乘時挑挖臣等復嚴加督催務期速竣俟汛水長發相機開放以保荆隆口古黃池一帶要工敬會疏具題照例請撥藩庫銀兩還項臣等謹繪圖繕摺恭呈睿鑒伏祈皇上訓示遵行謹奏所見甚是詳覽圖式審度地形允宜開穵引河以分泄水勢務於伏汛前竣工方為有益也雍正八年四月初八日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭報頭次糧船通數過濟黃運兩河水勢安流仰慰聖懷事竊臣接準部咨頭次過淮糧船三千七百九十四隻漕臣題報欽奉諭旨命沿河督撫鎮道等官撥兵防護速催抵通欽此欽遵臣隨飛檄沿河鎮將道廳等官上緊催趲撥兵防護復遴委效力員辨分投往來巡催去後今據報頭次糧船通行過濟較上年更加迅速總由皇上敬誠感召雨澤調勻所以運河水深俱有四五六七尺不等糧艘遄行民船接踵堪資浮送均無淺澀之虞至於黃河水勢陸續漸長漸消循流順軌在在安瀾惟恐廳汛各官習見工程平穩致滋懈怠復嚴申誡諭思患預防臣往來河濵見二麥秀實飽綻灘地潮潤倍加濃郁豐收在即黃童白叟歡戴皇仁仰見聖主德洋恩溥上應天和雨㿩時若指示工程周詳綿密以致民物盈寧平成有應也所有頭次糧船通數過濟並黃運兩河水勢安流情形謹繕摺奏聞仰慰聖懷伏祈睿鑒謹奏黃運兩河水勢安流深慰朕懷近日畿內地方頗覺乾旱朕甚以為憂覽奏內二麥長茂情形朕不為豫東二省雨㿩厪念矣雍正八年四月十五日吏部尚書總督河南山東河道臣嵇曽筠謹奏為道員貪婪不職有負聖恩謹循例會參恭摺奏明兼陳員缺緊要情由仰祈睿鑒事竊臣蒙皇上天恩畀以河防重任督理東豫二省工程凡關寸工寸料無不留心稽察一切屬員俱各勉其實心二十八日又聞該道發給下南河同知陳儀加幫月堤銀四千兩扣短輕平穢迹昭著因而察得該道詭詐行為暗侵硬扣無所不至贓私纍纍殊堪駭異正在咨會督臣而督臣與該道近在同城會稿旋來臣即會疏題參請旨嚴究在案惟是該道遺缺甚屬緊要管轄南岸開歸二府鄭滎二州縣工程數百餘里堤長汛逺又通省河工錢糧辨兵河餉收納支解皆總滙於此所關重大必須曉暢工程兼得亷幹而有才者方克勝任查現任如開封府上南河同知在任守制拖克拖海在工年久熟習河務其餘皆學習初成若夫才守兼優而又諳練河防善能整肅職業者則督臣現在酌量就近委員暫行署理外恭候擅便謹繕摺具奏仰懇訓示敕遵伏祈皇上睿鑒謹奏覽雍正八年五月初六日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭謝天恩事雍正八年五月初三日臣接準兵部咨文欽蒙皇上聖旨命臣署理南河總督印務隨虔設香案望闕叩頭恭謝天恩訖伏念臣樗櫟菲材至愚極陋仰蒙皇上天恩拔擢洊列卿班畀以河防重寄任事以來寸長未效乃荷髙厚隆恩有加無已兹以南河總督印務關係緊要著臣署理又以臣雖久任北河而於南河事宜尚未熟悉著撫臣尹繼善悉心協辦仰見我皇上睿慮周詳無微不照矜全怙冒體恤靡遺臣跪讀恩綸感激涕零倣惶莫措惟有愈加敬畏實心辦理永慶淮黃底定海甸安瀾工程鞏固閭井熙恬以冀仰報洪慈於萬一耳除現在具本恭謝天恩外所有微臣仰荷新綸感激蟻忱先行繕摺奏謝伏祈皇上睿鑒謹奏覽卿奏謝矣全河底定永慶安瀾惟卿是賴其悉力宣猷以克副朕望勉之同日又奏為欽奉上諭事竊臣猥以菲材感荷聖恩髙厚特命署理南河總督印務伏查南河地方工長汛險淮黃交滙實為緊要之區理應即日起程緣挑穵封邱荆隆口對岸引河已經告竣現在守候汛水長發開放當將一應機宜靣商督臣田文鏡并議交代前往詎督臣以封邱引河乃荆隆口古黃池一帶險工藉此預為補救關係甚巨今雖挑穵竣工而汛水未發恐開放之時機宜稍有未協便難奏績於臨期且以臣歷年辦理引河著有成效堅執固留臣竊思汛水長發順流東注此地引河固可成功而淮徐等處險工林立亦須及早督查何敢稽遲時日其如督臣十分慎重現在具摺請旨伏念我皇上道宏位育功茂平成南朔東西原無岐視可否容臣暫留旬日開放引河之後即從封邱工次馳赴淮徐一路查工到任但未經奏請聖示臣心惴惴實切悚惶之至除現在飛差書吏馳至濟寧衙署檢齊歷年卷案并同領到關防另容交代督臣兼管外臣謹繕摺請旨伏祈皇上敕諭遵行謹奏自應於開放引河之後赴淮到任所奏嘉是覽焉業命史貽直署理江督尹繼善此際可以分身料理矣將北河要務一一明白指示於范時繹然後趲程而南諒未為晚同日又奏為欽奉上諭事雍正八年四月初三日接準工部咨因山東兖寧道吕維炳經總河孔育珣題補淮徐道員缺臣等具摺奏請留其查勘山東江南水道工程欽奉聖諭著康宏勳照舊兼管將吕維炳暫留兖寧道之任俟新修工程勘估造册定議之後該督等奏聞令吕維炳前赴新任其兖寧道員缺仍照原議揀選題補欽此欽遵臣即催該道星速勘估今於四月二十一日回濟據該道會同淮揚淮徐二道逐加踏勘審視上下源流遍歷湖河探量地勢髙卑將應行疏築節宣之處因地制宜相機利導分勢開引以達於海估用土方夫工册詳到臣正在會商旋聞河臣孔育珣已故而臣等未及勘議其間應疏應浚機宜殊難遽定今臣欽承恩命署理南河總督印務俯容臣到任之後履工親勘詳加相度會同江蘇撫臣尹繼善等畫一定議敬謹奏前項工程已經勘畢應遵旨令其前赴新任至兖寧道缺臣與督臣田文鏡再四商酌惟有兖州府知府王鴻勳辦事勤慎熟諳河防吏治工程兼堪勝任臣謹繕摺恭請訓示伏祈睿鑒謹奏卿於前摺薦舉拖克拖海今何未見言及斯二員中與督臣田文鏡擇相宜者一人指名題請可也雍正八年五月十七日吏部尚書總督河南山東河道臣嵇曽筠謹奏為恭請聖訓事竊臣於本年五月初七日接到內閣知照雍正八年四月二十九日奉上諭前總河孔育珣未故之前凡所奏河工事宜摺子朕皆一一批發計此時有雖到而尚未施行者亦有未經接到者爾等可即行文與嵇曽筠及孔育珣之子凡有關係河工事件批示摺子著孔育珣之子悉交與嵇曽筠其有未經拆封者悉令嵇曽筠開看遵照辦理欽此臣即望闕叩頭凜慎欽遵訖竊思南河地方汛逺工多如清口之淮黃交滙髙堰之湖河屏障攸關運道民生而且淮徐一帶為上遊之門户安東各處係泄水之咽喉更為關係匪輕其間因地節宣相機疏築防河濟運均須斟酌萬全臣特邀曠典膺兹重寄即思瞻覲天顔叩請聖訓祗以封邱對岸挑穵引河守候汛水以致稍遲旬日今引河業經開放汛水亦巳盛長南工緊要未敢再延臣即從豫東一路循歷河濵查勘工程前往赴任所有欽奉皇上硃批孔育珣奏摺凡關河工事件自當敬謹開拆遵照辦理臣世受國恩疊膺異數勉圖竭盡犬馬之報而知識短淺才具駑鈍敬懇聖主多方訓示開導愚蒙庶臣得以凛遵恪守更感天高地厚之恩於生生世世矣除起程日期另疏題報外臣謹繕摺恭請訓旨伏祈皇上睿鑒謹奏遇應訓誨處自必隨時批諭無庸懇請切囑者或因慎重錢糧起見預疑屬員侵尅以致稽延緊要工程只此一節少為卿慮事事常存過猶不及之念其庶幾乎同日又奏為請旨事竊惟南河地方汛險工多臣以菲材奉命督理必得勤敏幹員隨臣調遣方為有益兹有現任河南衛輝府通判范昌治才猷敏練熟諳修防經臣保題引見奉旨補授今職查衛河原屬內汛本非要缺可否仰懇天恩容臣帶至南河查勘工程或遇有相當員缺另疏題補以收臂指之用再有河南虞城縣革職知縣李槃為人誠實曉暢河防前因諱盜參處經臣具題引見奉旨留工效力又有原任山東博平縣縣丞姚世理諳練河務勤慎穩當經東昌府上河通判白嶸保詳督撫出具考語送部引見奉旨命往河南酌量委署試用再有原任直隸吳橋縣縣丞劉永錡河務嫺熟辦事小心向年效力豫工取有本旗身家殷實印結在案嗣後效力水利營田題補今職因弓馬生疏解任學習查該員弓馬雖未熟練而河防尚能曉暢以上各員均屬有用之才可否仰懇天恩容臣一同調至南河酌量委用則調遣有人分查無誤庶於河防諸事得收實效矣為此繕摺請旨伏祈皇上訓示遵行謹奏準照所請帶往一面咨明該部但隨帶舊屬未必即收臂指之用而南河現在人員不無先存親疏之嫌反恐益少而損多朕屢諭各省督撫之旨甚屬明晰河工雖非他任可比亦當再四酌量或於其中減退一二人或竟全數帶去酌妥而行異時方知朕言之不謬也雍正八年六月初六日吏部尚書總督江南河道臣嵇曽筠謹奏為欽奉上諭事竊照兖寧道吕維炳查勘山東江南水道已經詳報竣事應赴淮徐道新任所遺之缺會商督臣田文鏡擬將兖州府知府王鴻勳補授特具摺請旨欽奉硃批卿於前摺薦舉拖克拖海今何未見言及斯二員中與督臣田文鏡擇相宜者一人指名題請可也欽此伏查拖克拖海在工年久熟悉河務原屬幹練之員前因管河道祝兆鵬會參遺缺緊要當經奏薦拖克拖海並河北道朱藻足膺調補嗣與督臣面為商酌河北一道分守彰衛懷三府兼管北岸黃河堤掃工程密邇運河尤為喫緊屈指屬員內堪以代朱藻辦事者一時難得其人未便遽為更調維時臣等即將拖克拖海委署管河道印務見其料理才情頗有可觀臣與督臣隨經會疏題補管河道缺現在祗候聖旨至兖寧道缺吏治河防均需練達臣查王鴻勳於雍正元年隨前河臣齊蘇勒堵築楊橋漫口河務熟􅈺即近年兖州府任內官聲甚優實與兖寧道相宜現在督臣與臣會題請旨其拖克拖海已經擬補管河道於前所以臣未敢奏及也兹蒙降旨垂詢臣謹繕摺奏明伏祈皇上睿鑒謹奏覽奏方始了然明晰前次奏摺中聲明一語則朕可省此問矣雍正八年六月二十五日吏部尚書總督江南河道臣嵇曽筠謹奏為清口暢流朝宗有慶恭慰聖懷事竊查江省清口為淮黃交滙南河第一要區必須勢均力敵二瀆合流方與運道民生大有禆益臣於六月初十日到任之始當詣清口看得東西束水二壩髙峙整齊中間水勢深通自洪澤湖滔滔暢出併力敵黃二水瀠洄交會東注於海詢據濵河父老咸稱數年來清口無此充暢臣因閲視髙堰工程復由清口迤上查勘引河七道俱已刷通逐一探量現在張福口水深七八九尺至一丈二三尺不等裴家場水深七八九尺至一丈三四尺不等張家莊水深六七八尺不等爛泥淺水深八九尺至一丈不等三岔河水深八九尺至一丈二三尺不等天然引河水深六七八尺不等天賜引河水深四五六七尺不等不須疏濬在在通利誠如聖諭如果淮強黃弱便不引亦必暢流況蒙恩指示發帑修築現今髙堰山盱一帶土創工程業已髙寬堅厚即緊閉各壩蓄清專力敵黃亦可萬全無慮皆荷我皇上睿慮精詳至誠感格乃克臻此嘉應也再查徐屬邳睢宿虹桃源外河山安等處俱係黃河要工目今伏秋交際修守機宜刻不容懈誠恐工長汛險廳佐營辨勤怠不齊臣已遴委效力人員在於緊要處所畫地分防協同廳汛相機保護臣隨前赴各工挨次勘視添發銀兩儹備料物嚴督辨兵遇有掃灣迎溜之處預為進掃加鑲不使險成費倍至於善後大工案內土掃工程雖經限滿尚未題銷臣當一併細加查閲容臣循厯遍日另行具奏外今將淮黃經過伏汛順軌安流清口通暢工程穩固情由臣謹繕摺奏聞恭慰聖懷伏祈皇上睿鑒謹奏屢戒卿等大言肆志不啻三令五申乃此慰朕之摺尚未齎至而馳驛報災之本巳先呈覽不但朕懷無由而慰卿顔能不赧然為因今歲北地雨澤歉少恐至夏秋霖潦頻諭慎防汛水泛漲言猶未已今果如是矣善後事宜若不能會商詳計區畫萬全則何靣目對靳輔齊蘇勒之祠堂乎悉心竭力勉為之同日又奏為請旨事雍正八年六月十二日臣齎摺家人恭捧皇上御批臣奏請隨帶人員奏摺到淮欽奉硃批諭旨臣跪讀之下不勝感激涕零伏念臣以菲材遭逢聖主異數殊恩有加靡已生成訓示在在周詳清夜捫心報稱無地前因南河工程臣未嘗熟悉受茲簡任莫知所措犬馬愚忱誠恐有負任使故將衛輝府通判范昌治等四員奏請隨帶以供臂指共期宣力保工永𢋫底定仰慰宸懷今蒙天語春溫洞鑒深逺聖諭詳明亟宜凛慎欽遵臣復逐一酌量僅將現任衛輝府通判范昌治原任吳橋縣縣丞劉永錡二員調至南工以資差遣其餘仍留豫省委用是否可行仰乞皇上洪恩批示以便遵奉咨部臣謹恭摺請旨伏祈睿鑒施行謹奏所欲帶往之員料不過拖克拖海一流人物尚恐莫及何足深信凡為大吏者設弗存無我之公忠而懷為人之私鄙則不免識近庸愚也要須看透此一著方是雍正八年十一月初八日吏部尚書總督江南河道臣嵇曽筠蘇州巡撫協理河工事務臣尹繼善謹奏為石工關係重大趲築酌分先後據實備陳仰祈睿鑒事竊照髙堰石工蒙我皇上軫念運道民生特恩頒發百萬帑金創築髙厚長堤以建萬年鞏固之基命前河臣孔育珣等相度機宜大加修治誠為握要提綱一勞永逸盡善盡美至計當經前河臣孔育珣會同臣尹繼善公同勘議繕摺奏陳並委員領帑各處辦料在案臣曽筠到任以後屢詣該工逐一查勘竭力督催以冀早為告竣上副宸衷殷注今幫築土創已經修整一律完竣其石工各料現在立限嚴催乘此水落星飛趲運以濟修築臣曽筠前往該工加謹先做樣工一段尤恐開挖甚深地泉滲灌乃開槽至一丈九尺底土乾燥人夫得以立足簽樁放心甃砌臨湖築工得此土頭誠為希有惟是承修各員內有現任廳營及向係在工效力者亦有奉命新發來工并前河臣孔育珣題留承修者領工遲早不同則辦料亦先後不一而各料之中惟石料最多或辦自江南或辦自山東今秋隂雨連綿在山之石既難開採湖河水大已採之石復難運送是以不能依限運足若不按工科料槩令一齊拆砌恐六千餘丈之長堤普律開挖成槽萬一砌未及半料不接濟轉瞬春汛全湖風浪關係匪輕臣等再四思維惟有令承修各員按其現到料物陸續開工倣照樣工程式未完之前仍留外面舊堤以為保障既築之後漸次拆砌舊石以作全堤一面兼工分築一靣嚴督趲運庶已砌者各料應手計日可完未砌者原堤其在風浪無虞興工雖有後先收效仍無二致臣等為慎重要工起見理合先行繕摺據實陳明伏祈皇上睿鑒謹奏此議甚善如是修砌庶免意外疏虞雍正九年四月十一日吏部尚書總督江南河道臣嵇曽筠謹奏為敬陳查勘各工修築事宜仰祈睿鑒事竊照黃運河堤增修善後伏荷聖恩發帑興修仰見我皇上宵旰勤求無時不以河定民安為念臣祗遵辦理竭蹶奔馳兢惕彌深矢圖報效謹遍歷查勘黃河上自徐州下至海口運河上自邳州下至江口兩岸堤工縱橫綿亙幾及二千餘里誠恐該道廳勘估未當臣親身履堤復加查核權其緩急先後審其髙矮分寸勘估一定趁此青黃不接之時即為發帑乘時修築并嚴飭承修印河各員令於附近地方招集貧民力作每日散給現錢以廣皇仁而收實效到處歡呼踴躍現在上緊趲修其山東禹王臺壩工實為江南下遊之保障緣上年咨商修築未免隔屬耽延仰賴聖明諭旨星馳臣即前詣該工看得沭水源長性猛今於現在竹絡石壩二十七丈之外依其頂衝形勢統建石工六百餘丈蓋以竹絡盛石厚重堅凝隨沙坐實且於上秋水力猛峻若此而石壩屹然不動已有明驗其餘接連岡阜仍築土堤沭河口門大為挑浚以順其入海之路所有應需料物臣已發帑購辧上緊疏築務期壩髙而堅堤實而厚河浚而深堵截沭水俾其循由故道直趨入海以除上秋浮溢致病之根以為運道民生永逺之計再江工引河業已挑竣夾江鐵心壩亦已築成從前夾江之水逼注瓜洲今創築壩工攔截俾夾江之水全歸南岸依山東下而瓜洲水勢頓減一丈有餘將來伏汛屆臨開放引河之後大溜自必更加分減瓜城可保無虞矣謹將微臣查勘各工辦理事宜恭摺奏聞伏祈皇上睿鑒謹奏嘉悅覽焉保障江河一切要務惟卿是賴勉為之聖人垂訓智仁勇三字並重缺一不可在卿分中勇字更當加勉凡應獨力承當之事槩弗推諉下吏自必咸皆感服奮興無論巨細工程須集衆心羣力方始成功非一二人所可能者運道民生關係綦重省帑乃屬末節萬勿狃於節慎之見以致因小而誤大也志之雍正九年四月二十一日吏部尚書總督江南河道臣嵇曾筠謹奏為請旨事竊臣準工部咨開準管理正紅旗漢軍都統和碩莊親王咨送本旗河工效力革職筆帖式毛浚首告河道康宏勳河工積弊應將毛浚并原呈發交河道總督會同江南總督將案內各欵有名人員秉公審明律擬等因摺奏奉旨依議欽此欽遵隨經移咨押發到臣遵即轉咨督臣會飭布按二司提齊犯證確審詳擬以慿會勘但查毛浚呈控康宏勳侵帑營私事關重大理應嚴究以肅河工今河庫道康宏勳係屬現任經管錢糧出入現在聽審未便仍行辦事相應奏請解任以便質審所遺河庫道一缺專司河帑攸關綦重必得謹飭亷隅出納明慎之員方克副錢糧重任并可表率通工查有新任揚州府知府張師載為人端方辦事謹飭係原任禮部尚書張伯行之子合無仰懇皇上天恩俯準該員就近補授河庫道自必益加勉勵報效至揚州府沿河要缺懇恩另簡賢員轉移補授俱可無誤所有請將康宏勳解任質審并懇請將張師載補授河庫道緣由臣因整飭河工起見冒昧繕摺奏陳伏祈皇上訓示遵行謹奏張師載人雖端方或恐新任不諳河務與尹繼善再加斟酌具題奏請雍正九年五月二十二日吏部尚書總督江南河道臣嵇曽筠謹奏為遵奉聖訓宏深并陳工程水勢仰祈睿鑒事竊臣於謹陳查勘各工修築事宜奏摺欽奉皇上硃批諭旨跪讀之下悚惶誠服恭荷指示智仁勇訓誨精微蓋以天德治道智仁勇原為並重而刻勵勇者正所以勉為智仁更闡千古不傳之奧義復荷訓旨詳明鼓舞羣策羣力而協同其心志恢宏經費利濟運道民生而不計及金錢大哉皇言聖德如天至誠動物典謨誓誥垂著萬年伏念微臣賦質庸愚叨蒙聖主裁成教育警惕其未逮䇿勵其將來凡有一得愚誠悉稟聖明睿訓乃蒙天語褒嘉頂踵倍難於報稱更凛宸章誥誡黽勉益勵於旦明伏查近日工程情形增修善後一案前經臣遍厯相度勘估既定之後印河各官既分段承修應募貧民復歡呼踴躍是以成功較速臣復親行查勘多遣幹員逐一住工監催潑水重硪攤坯密杵頗為堅實指日普律完竣以資捍禦山東禹王臺壩工計石絡六百餘丈工程業經報完現在加鑲邊絡一應土石疏濬各工伏汛前俱可全完再查四五月內水勢情形仰賴皇上精誠昭格懷柔傒應黃水旋長旋消現今堤工髙出水面一丈二三尺不等掃工髙出水面八九尺不等安流循軌益謹修防至南河各工惟宿虹廳屬黃河形勢自徐邳兩岸山形夾束而下一折於南岸蔡家樓再折於北岸葉家莊而北岸附近宿遷山麓餘氣土性堅實不得不又折於南岸之古城孟誠庵等處百餘里之掃灣旋折勢大力徑且北岸逼近運河亦屬清黃交會之處甚為險要是以臣愚惴惴亟請築石壩以遏沭水於上濬六塘河以導駱湖於下增其屏藩啓其槖籥以為保全之計業蒙俞旨興修自此不患其助黃添漲而惟在禦黃得法臣謹於六月移駐宿虹堤岸相機防護并可䇿應各廳至料物比照豫工立限辦完州縣盤查出結各工堆貯崇墉櫛比儘可應用臣惟有恪遵聖訓多方籌度竭盡犬馬董理身先率同僚屬協力齊心以仰副皇上軫念河防之至意不敢少有旁卸亦不敢狃於節慎致滋貽誤現今徐邳宿桃一帶雨水調勻刈麥晴霽收穫豐稔米價頓減皆由我皇上基宥密以格穹蒼備裁成而回造化喜氣雲蒸歡聲雷動天意人心太和翔洽自是安瀾有慶民悅無疆理合一併奏聞所有微臣遵奉訓諭并陳河工情形敬謹繕摺具奏伏祈睿鑒謹奏覽奏深慰朕懷安不忘危一語固為治平之要術亦乃修防之祕訣當拳拳服膺不可須臾輕意肆志也同日又奏為恭報江工開放引河日期仰祈睿鑒事竊照大江北岸瓜州花園港一帶緣江溜北趨城垣運道坍卸堪虞經臣奏請開挑正人洲引河分溜南行以保北岸仰荷聖明燭照俞旨星馳臣祗遵辦理其挑挖引河創建夾江壩工疏築情形俱經節次奏明今各工俱已完竣長江水勢正當盛長之時臣飭委淮揚道率同承挑各員乘勢開放并靣授機宜去後兹據報呈遵於本月十八日齊集兵夫畚鍤雲集開放之頃第見水若排山大溜直趨引河奔騰之勢直達河尾及開攔潮尾壩雖外靣水髙數尺而上源來水湍急抵禦出江衝刷更為有力兩岸民人聚觀洲上民船商舫順流揚帆俱由新闢引河南下一時衆口歡呼咸各頂戴皇仁又據廳營汛辨稟報僉同臣隨飛檄道廳江工引河初放嚴飭防範善後其夾江貼心大壩并兩頭接築土堰專為攔遏引河漫灘并潮汐湧掣不使斜注東北亟令儹築加髙鑲做防風以資捍禦收束其五公灘支河為引河下尾滙流之處再令熟諳辨兵多用鐵篦子混江龍器具往復乘船扒浚自此日引日深愈流愈順現今江勢南趨溜緩北注瓜洲花園港工程化險為平惟有相機防護加謹修守仰副我皇上精誠協應奠定濵江之至意所有江工開放引河日期理合據實奏聞伏祈睿鑒謹奏引河開放情形欣悅覽焉善後事宜更當詳籌熟計以收久安長治之效毋稍疏忽雍正九年八月十八日吏部尚書總督江南河道臣嵇曽筠謹奏為恭報八月水勢工程平穩情形仰慰聖懷事竊照秋汛正中乃諸水湍急湧行之候而江南黃運湖河尤為衆流會歸之區臣恪遵聖訓時切加謹修防因宿遷黃運兩河當駱馬湖之首衝所以臣親駐宿遷上下䇿應調度前於七月內湖水長發已經搶護平穩今八月初十以後湖水又長堤掃工程業已搶築加髙湖流循軌東注總因禹王臺竹絡壩工修築完固約攔湖之上源不使沭水合流又六塘河疏濬通暢宣泄湖之下遊俾得去路順利是以湖水雖大而無疏虞伏查沭水於七月初九等日長至七尺五寸至二十九日又陡長一丈而禹王臺千丈壩工扺住水勢即由沭河就近入海不得下趨所有邳宿黃運湖河一帶運道民生咸資利涉而登衽席再查黃河水勢自徐邳以至雲梯入海大溜順注水行沙刷毫無阻滯凡掃灣迎溜之所掃壩髙堅屹如磐石料物堆貯甚多雖秋汛綿長兩岸工程可力保平穩洪澤湖水勢加長舊例開放天然等壩宣泄臣念髙寶濵河沃壤粳稻倍加茂盛欣值時和歲稔築場納稼指顧秋成未便再行浸灌況敵黃濟運尤屬緊要是以臣將天然等壩堅守不放涓滴不泄俾清口益為順暢下河苗稼各得遂其長養秀實今入秋以來湖水長至六尺有餘風活浪靜湖工寧謐上秋被水之處如髙郵寶應江都鹽城興化等州縣今已數倍豐收農夫野老含哺鼓腹歡呼載道依然巷舞塗歌至於江工開挖引河堵築夾壩業已分其溜勢桃伏兩汛平穩之至至七月初旬疊遇風潮今秋川水又大瓜洲民居稠密市舍繁多臨江地土連年坍塌逼近城池殊為危險臣多方籌畫曉夜經營沉石船以護崖根築石絡以保崖岸用柳草捆扎龍尾掃以禦潮汐臣復思江靣寬廣水力峻猛因將各工購貯木植指授做法扎筏成簰作壩挑水安放移時當即挑開大溜數十丈水勢安瀾居民士庶咸為踴躍歡忭向非挑河築壩早分其勢遇此秋漲當必倍費周章總仰賴我皇上聖眀天縱重念江防緊要不減河防一聞陳奏即奉硃批速議俾臣得以早為修護用資防禦今秋汛己見平安而來年桃伏秋之水勢工程仍當於今冬預為辦理有備無患臣惟矢竭心力審度萬全務期黃淮底定永慶安瀾以仰酬髙厚隆恩於萬一恐厪聖懷敬將八月水勢各工平穩情形恭摺奏聞伏祈睿鑒謹奏以手加額覽焉有旨諭部矣雍正九年十二月十九日吏部尚書總督江南河道臣嵇曽筠謹奏為奏明儹辦修築情形并陳慎工節帑事宜仰祈睿鑒事竊照江南黃運湖河蒙我皇上睿謨宏逺訓示周詳現今各案工程俱得整理遞加修守運道民生均荷天恩萬年利濟伏查髙堰大工臣上緊催督勸懲互用嵗底已有七分工程且三冬天氣融和夫衆得以展力凡在工官民匠役莫不歡欣踴躍感頌皇仁自此大工漸次告成得以仰副聖懷至瓜洲濵江要工經臣奏明於對江挑穵引河攔築夾壩分溜南注而北岸花園港等處酌用樁掃相機建築挑水壩以禦外溜但城垣之下地脈虛鬆必得填實基址以為內固因倣照前人保守江海塘岸之法用髙大木匱裝載石塊深埋地底俾江溜不致搜刷以護崖岸其所需工料臣亦不敢叧請帑銀惟於來年嵗搶錢糧內通融計處再查本年新善後大工一案業經告竣現在逐細丈量以核土方而預備明年物料已經沿堤堆貯復委印官逐細盤查以杜浮冒又於擬定成規案內臣悉心詳議凡柴束樁木石料土方等項或照時查驗乾濕或按程途逺近或照取土乾濘逐一遞減相平比照舊例土方每用至十萬兩者可約省帑八千餘兩至一萬餘兩樁木每用至十萬兩者可約省帑四五千兩石料每用至十萬兩者可約省帑五六千兩俱係確核酌定使各廳無有偏枯而帑項亦可節省業經恭疏會題在案倘蒙覆準積年計算或於工帑不無小補所有趲辦要工情形節慎工帑事宜臣謹據實恭摺奏陳伏祈皇上睿鑒謹奏工程既能趲辦帑項又不虛糜可嘉之外更復何諭同日又奏為欽奉上諭事竊臣接準户部遞到大學士張廷玉等寄字內開雍正九年十一月十五日奉上諭爾等所奏登鎮河標漕標添兵之處行文各處時再寫信與總漕兩處總河登州總兵官文到日著即行召募挑選務擇技勇漢仗可觀之人充補毋得延玩怠忽虛應故事一應添設員辨營房事宜亦作速會同督撫定議具奏其兵丁召募完日先行知會爾等欽此欽遵又準户部咨內開遵旨酌議請將漕標及兩河標兵各添設一千名與添設登鎮陸路之兵共四千名精選技勇壯健之人一應馬匹盔甲軍器務製備齊全一有調撥即可起程其應加守千等員及應建營房會同該督撫詳酌妥議具題等因奉旨依議欽此移咨到臣當即欽遵飛檄司道標營星將添設事宜一靣籌議一靣召募務期挑選年力強壯熟嫺技勇之人方準入伍其營馬一項最關緊要理應星速購買若必俟議定始於司庫領價赴買誠恐往返稽延臣一靣遴員暫借河庫帑銀令其速往直隸等處採買但路途遙逺隆冬草枯即尅期辦到餧養尚需時日一靣諄諭通工文武官辨即在附近地方領價協辦一百餘匹事屬衆擎易舉一俟兵丁招齊即為分發如有調撥先有協辦之肥馬并添選兩營之舊馬儘可足用其一切軍裝甲械行營炮位在所必需臣逐細開單條分縷析飛檄司道標營隨議隨辧解送呈驗不致臨事周章至加添守千等員及營房糧餉事宜現在督撫各臣俱集清江會審臣靣為商酌妥協會題伏念微臣由詞臣通籍疊蒙皇上隆恩豫東江省畀以封圻重任際此修明武備寧輯地方之盛舉惟有殫心努力敬謹辦理尅期完備即行奏聞臣當親督辨員勤加操練以冀少助干城之用仰慰宸𠂻於萬一耳所有遵奉趲辦添兵事宜臣謹據實恭摺奏陳伏祈皇上睿鑒謹奏折衝於樽爼之間正謂詞臣能禦侮也但貴實心任事何有文武之分辦理得宜嘉是覽之雍正十年正月二十一日吏部尚書總督江南河道臣嵇曾筠謹奏為欽奉上諭事雍正十年正月十一日臣齎摺家人敬捧河標增添兵馬事宜奏摺欽奉硃批諭旨臣跪讀之下感激涕零伏念臣以庸愚仰沐聖恩髙厚既畀封疆重任即為軍旅攸司況蒙訓勉洪慈敬荷聖明指示自當益勵愚悃勉竭駑駘敢謂文武之分途猥以書生而謝責今新募兵丁已足一千名之數臣親加細驗俱稱勇壯內以六百名留駐清江以四百名分發徐宿兩營收伍即於兩營舊兵頭目內考拔技勇優長弓馬嫺熟者數人授以外委千把令其教習新兵勤加訓練又調委守備二員約束稽查并諭署徐州營副將葛世雄右營遊擊黃正元等凡入伍兵丁俱即開支糧餉分别馬步戰守考其勤惰優劣上緊操演不獨此新兵由此慣習且使舊兵益加精練臣仍不時親督校閲申嚴賞罰鼓勵振作務使技藝精熟行伍整齊冀成節制之師以備干城之用設有調遣即堪驅使庶幾上副聖謨下抒臣悃不敢草率因循稍為怠忽也所有召募兵丁足數現在勤加訓練緣由相應遵旨先行知會大學士等外臣謹繕摺奏眀伏祈皇上睿鑒謹奏不時校閲加意勤操弓馬固須熟嫺步伐尤宜精練令士卒演習趫捷若能日趨百里則涉險履平何往不利此雖難期驟效可以由漸而成雍正十年三月初八日吏部尚書總督江南河道臣嵇曾筠謹奏為甘雨麥苗霑足運河水勢深通據實奏聞恭慰聖懷事竊臣因桃汛將屆前往徐邳一帶查勘工程見兩岸麥苗青蔥茂盛自二月初二日得雨之後或三五日或七八日即得雨一次徐邳淮揚等處麥田俱各霑足父老歡呼踴躍祈望豐收其運河水勢上下皆各深通糧艘遄行無阻至上年所做新善後工程久經告竣臣俱委員逐段詳勘凡有虛鬆不足之工立即押令補修如式復又親自抽段丈量務令俱照原估一律堅厚現在料物櫛比盈堤盤查確實本年歲搶掃壩工程亦皆逐細指示各廳乘時加緊儹做以禦汛水所有兩岸堡房現俱建蓋堡夫亦即日召募齊全臣惟有恪遵聖訓殫心竭力不敢一刻稍有懈弛不敢一事稍有疏忽務期黃運湖河各處工程均如磐石之安永奏安瀾之慶上慰聖懷惟祈我皇上於日理萬幾之中節勞頥養保合太和此微臣拳拳孺慕之忱日望九重而翹祝者也謹將臣查勘工程目覩雨水霑足運道深通情形據實恭摺奏聞伏祈睿鑒謹奏覽雨水霑足運道深通情形曷勝額慶朕躬近已大愈較之未病之前更覺爽健絲毫無庸過慮也雍正十年六月初八日吏部尚書總督江南河道臣嵇曽筠謹奏為伏汛水勢工程平穩情形仰祈睿鑒事竊照伏汛以前臣恪遵訓諭查勘各工備料修防一應掃壩務令出水髙厚以資捍禦業經具摺奏明嗣於閏五月間淮徐淮揚地方甘霖疊沛又兼淮水長發上源豫省七十二道溪河之水俱滙注於洪澤湖陸續加長八尺有餘更比黃水少強幸賴皇上睿照幾先發帑修築髙堰石工一律加髙足以抵禦湖水由清口暢流入海臣見水勢盛長隨親赴下遊山安海防一帶督率加鑲掃壩工程飛飭廳汛員辨兵夫晝夜上緊修守況南岸徐家莊北岸四套皆係新築土工尤當竭力保護但見水勢滔滔東注兩岸俱各平寧伏查淮水積長二十餘日尚未消減而寧夏又兩次報黃水長發臣恐淮黃並漲工程民社攸關隨查照往例將山旴廳屬之天然南壩酌量開放宣泄洪湖之水親赴髙郵寶應一帶查勘運河先將芒稻閘開放宣泄入江次將髙郵減水壩酌開一二處俾其從容漸進由各港口串場河入海免致臨期湧激有宣泄不及之虞總之今年汛水雖大而料物豐盈又加謹搶護上下閘壩宣泄得宜自無意外之患現在各工鞏固伏汛平安臣思秋汛接踵繼至不敢稍懈一靣飭令淮徐道駐劄上遊淮揚道駐劄下遊臣上下往來策應查察務保兩汛平安以仰副聖心於萬一耳所有伏汛水勢長發各工平穩情形理合恭摺奏聞仰慰睿懷謹奏淮黃並漲亟應酌量宣泄但以理揆之伏汛既大秋汛水勢自將平減然亦何敢預必仍須加意慎防雍正十年八月二十一日吏部尚書總督江南河道臣嵇曽筠謹奏為恭報秋汛己竣水勢工程平穩情形敬慰聖懷事竊惟江南黃運湖河水勢前於伏秋汛內經臣節次奏明荷蒙皇上睿慮周詳訓諭小心防護臣凛慎欽遵加謹修守因七月望後天雨連綿水勢浸長隨復飛飭道廳汛辨用心防守臣往來查察相機搶護雖沿海風潮甚大抵住黃流而兩岸掃壩加鑲髙厚料物豐餘人力齊集足資捍禦目下秋汛已竣工程鞏固臣不敢因汛水過期稍為懈怠惟有凛遵聖訓倍加勤惕矢誠矢敬慮後思前務保河防永固運道深通以冀仰報皇上天恩於萬一耳除秋汛水勢另行會疏題報外臣謹將各工平穩情形先為繕摺具奏敬慰聖懷伏祈睿鑒謹奏覽奏秋汛安穩情形惟以手加額為沿海濵河億兆慶幸焉耳硃批諭旨卷一百七十五之三欽定四庫全書硃批諭旨卷一百七十五之四硃批嵇曽筠奏摺雍正十一年三月初七日吏部尚書總督江南河道臣嵇曽筠謹奏為欽奉上諭事雍正十一年二月二十一日接到大學士張廷玉寄字內開雍正十一年二月十二日奉上諭年來嵇曽筠辦理河工甚為妥協但黃河工程關係緊要除嵇曽筠外欲更覔一明曉河道情形者不得其人朕思髙斌現在江南管理鹽政若從此講論河工事務將來可望熟練著就近在嵇曽筠處學習並非以嵇曽筠不能専理更須人協助也爾可寄信與嵇曽筠令其留心教導並寄字與髙斌令其加意學習凡有題本奏摺之處髙斌俱不必列名欽此遵旨寄信前來臣跪讀聖諭感戴髙厚莫可名言竊臣樗櫟庸材仰荷知遇隆恩教養優渥自奉命宣防由北河復調南河叨膺重任凡關係運道民生修守工程皆蒙我皇上睿訓精詳披圖指示俾臣審度其形勢體認其性情一切疏築機宜隨時隨地凜遵指授方略敬謹奉行是以幸有就緒乃蒙天語褒嘉以臣年來辦理妥協欽承之下愧悚交切更蒙皇上軫念河工緊要著管理鹽政臣髙斌就近學習感忭尤深臣去冬查閲工次於揚州曽見髙斌已心識其為人謹慎明白今奉特旨學習臣惟有將數年以來欽承聖訓指示開導之處悉心與髙斌講究是臣一身殫竭駑駘未能仰報皇恩於萬一而更得人以圖維善後臣之幸也臣敢不與髙斌備細指陳明切講論以期熟練以副聖懷所有臣遵奉諭旨緣由理合繕摺恭謝天恩伏祈皇上睿鑒謹奏髙斌居心甚屬可取行止亦頗端正但嫌其器局褊狹耳其加意訓導以造就之以卿年齒學問而論儘堪為伊師長不必稍存物我之迹而猶有間隔也雍正十一年四月十五日吏部尚書總督江南河道臣嵇曽筠謹奏為恭報糧艘全數北上運河水勢深通仰祈睿鑒事竊臣於四月初旬親往邳宿一帶查閲工程兼催重運見漕船銜尾遄行俱已渡黃北上所有宿遷境內駱馬湖向來四五月間水皆乾涸艱於濟運臣於上年秋冬之際嚴飭廳汛多築草壩周圍收束水勢廣為瀦蓄昨桃汛過後正值糧艘盛行需水接濟隨將各草壩挑開湖水俱從十字河口暢注運河滔滔滚滚充滿漕渠既可免於盈溢而漕艘通行又得資其浮送再查桃源縣運河古城汛內舊有砂礓一道橫亙河身是以重運經臨每多淺澀臣於上年將砂礓開挖深通不用多人挽拽而舟行已自便捷又邳宿運河西岸舊有黃墩一湖上受徐邳睢三州縣唐宋山等處會歸之水因岸繞堤環水無出路遂致日積日盈漫延阡陌臣亦於上年題明動帑一千餘兩并撿取沿河舊石建造小閘一座開放積水不惟濟運有資而且涸出湖灘千有餘頃小民布種二麥今一望黃雲芃芃茂密白叟黃童共樂豐收至於黃運湖河嵗搶工程臣俱逐一詳加確勘指示機宜飭令該管各官上緊儹修下掃加鑲務使髙出水面八九尺至一丈餘不等足可抵禦汛水預為保護臣因時當四月重運漕船全數出境且伏汛將臨工程業已儹修齊集有備無患謹繕摺奏聞恭慰聖懷伏祈睿鑒謹奏覽奏運河水勢深通糧艘利涉無阻並工程齊備各情形朕心深慰卿宣防有術殊屬可嘉雍正十一年五月二十八日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為時雨霑足水勢工程平穩情形仰慰聖懷事竊照江南黃運湖河水勢今年桃汛以來俱各循軌安瀾臣已節次奏明在案屆兹五月淮揚一帶時雨連綿水勢頻加長發然皆隨時消落上下河湖咸資容納甚為寧謐臣以伏汛將臨恐上源水勢驟長一靣飛飭禹王臺廳汛查看沂沭諸水謹守竹絡壩工並將駱馬湖尾閭之六塘河暨運道內之鹽河各處入海要路預為疏濬深通以備水長分流宣泄入海不致有壅滯之患至黃運湖河掃壩工程俱已一律修築出水髙厚鑲墊堅整足資捍禦廳汛員辨分守各工加緊保護臣率同兩道不時來往輪流巡察長堤料物充盈各處工程穩固洵為有備無患最可慶者洪澤一湖為淮水總滙之區仰蒙皇上睿慮精詳預將髙堰石工發帑增修髙厚足資保障全淮所以清水暢出敵黃分流合注總無強弱之形實有交濟之美而淮揚諸郡下隰髙原永受平寧之福也臣來往河堤目擊二麥業已豐收時雨又加霑足秋禾蕃盛水勢工程平穩情形理合據實具奏仰慰聖懷伏祈皇上睿鑒謹奏淮黃一帶循軌安瀾俾朕無南顧之憂者洵皆卿之力也同日又奏為洪湖禹廟告成恭請宸翰頒賜匾額永光萬祀事竊照髙堰大堤有禹王廟一座前因幫築石工暫行拆卸荷蒙皇上奠安河嶽崇德報功特頒諭旨重新修葺臣凜慎欽遵業經擇吉興修於上年十二月初一日完工隨敬謹繕摺恭請皇上頒賜御書匾額以昭盛典奉旨俞允在案惟是祠宇落成之後濱湖萬姓皆以堤工鞏固保障淮揚從此田廬儲蓄永荷皇仁怙冒扶老㩦幼齊赴神前祝延萬夀無疆覩兹映碧流丹亟望龍文丕煥恭求聖天子之寶翰聿光億萬年之駿烈臣不揣冒昧再為奏請伏祈皇上頒賜宸章臣敬謹鉤摹肅誠懸挂則來往觀瞻仰聖藻之輝煌實增光於日月矣抑臣再有請者山東郯城縣馬陵山下竹絡石壩工程遏沭水之奔流作淮邳之保障最關緊要經臣具疏題請荷蒙皇上發帑興修久已完竣但雍正八年沭水泛漲之時將舊建禹王廟一座衝淌無存止有禹王神像隨水漂流仍至郯城縣北門外回向馬陵山口巍然獨坐從神二像亦相去不逺遙為侍立及後水落波恬雲開日霽金光照耀於淖泥淤土之中居民驚異迎至郊外朝陽寺內權且供奉於大門之下非所以妥侑神靈臣敬懇皇上天恩於河庫道存貯銀兩內動支銀一千兩飭發地方官擇於竹絡壩附近山坡髙阜之處建造廟宇一所迎回禹王神像供奉妥協并飭該地方官春秋致祭我皇上恩綸普被錫福無疆嫓清寧而合撰洽流峙以垂休矣臣未敢擅便為此一併繕摺請旨伏祈皇上批示遵行謹奏建祠奉祀此奏甚是但四載周巡平成水土為萬世生民永賴厥功厥德徛歟盛哉若廟宇湫隘殊近於褻千金之費恐不足以壯觀瞻其再四酌計式廓為佳雍正十一年七月十八日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為伏秋交會水勢工程平穩上慰聖懷事竊照今嵗伏汛平安業經臣恭摺奏明屆兹七月初旬淮揚一帶久晴之後連沛甘霖水勢陡長兼之六月初七日寧夏府又報黃河水長三尺一寸臣按日計程正當伏秋交會之時前水未消後水踵至又兼風雨甚大最係工程喫緊關頭亟須加謹保護臣督率道廳將辨往來巡查凡有險要處所星飭該管汛員兵目於挑壩添樁邁掃加鑲髙厚於堤灣摟崖衛岸竭力搶護幸物料豐盈兵夫齊集靡不立時應手而且派委多員策應隄防不敢稍懈仰賴皇上敬誠感格黃運兩河護保安瀾查外河廳屬老壩口洪福莊潰崖搶下大掃二路計長二百丈桃源廳屬李九莊頂衝搶下大掃計長七十二丈據該廳等詳請題估大工需帑三萬餘兩臣查嵗搶料物辦貯工所實在豐多葦蕩柴束今嵗羡餘更倍臣又飛飭兵夫在洪澤湖搶割蓑芬草六十餘萬束皆天地自然之利堪充公用所以前次大工俱可立辦無容再行題估臣仰蒙皇上天髙地厚格外洪恩惟有殫竭血誠力圖報稱於萬一所有伏秋交會黃運兩河水勢工程平穩情形謹繕摺奏聞上慰聖懷伏祈睿鑒謹奏今夏上流水勢過盛朕正為南河懸念覽奏慰不待言欣莫能已雍正十一年八月初十日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為恭報睢寧天賜引河各工安瀾普慶據實奏聞仰祈睿鑒事竊查邳睢廳屬黃河南岸王家堂向因北岸沙灘挺入河心頂衝直射異常危險厯嵗修防方能保固今年伏水異漲臣嚴飭廳營晝夜加鑲邁掃正在竭力搶護忽然大溜衝激將北岸挺入河心之沙灘刷成河形引水東注其南岸頂衝掃壩工程漸為平緩頃自入秋汛水漲發並將靠北大灘塌崖衝洗奔騰浩瀚大溜自西而東開闢正河一道王家堂掃外現長沙灘八九十丈不等新沙驟湧已將綿長三百餘丈之掃工全行淤閉竟可停止修防矣節據道廳詳報臣復勘驗無異竊思黃河老灘橫亙若無吸川建瓴之勢既難開穵引河即使得勢開挑工大費繁經時纍月未易成功今乃不費一夫之力而倐挽九曲之狂瀾頓成一旦之功而全消數年之積患天賜引河地呈上瑞不特本工化險為平抑且上遊既無屈曲下遊又得順流萬里歸宿之區全河暢達所關重大是以濵河父老在工兵夫莫不額手歡呼踴躍忭舞共慶南工從來未有之異瑞也臣往來河涘目擊身親忽覩庥祥之洊至倍切歡欣夙叨聖訓之諄詳愈加警惕所有睢寧自闢引河各工平穩情形除恭疏具題外謹繪圖貼説據實奏聞伏祈皇上睿鑒謹奏此實由於上天垂佑河靈默助所致真祥瑞也覽奏欣幸何似雍正十一年九月初六日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為奏聞事竊照沿海范堤工程侍讀學士臣西柱奏請大為修築蒙硃批諭旨南北各堤通盤修整之處言之嵇曽筠聽其酌度而行欽此欽遵臣於八月二十日自清江浦起程率領道廳并該地方州縣印汛等官沿堤確勘查宋臣范仲淹創築此堤原皆因地因時酌量建設嗣後瀕海竈户隨圮隨培自為修補經今六七百年時異勢殊海汊之遷徙不常居民之聚散不一地形之髙下不同往往有昔與海近而今相隔迂逺者亦有昔與海逺而今漸成逼近者則堤岸修舉自當因去海之逺近分别工程之緩急方能利商民而收實效今臣自淮安府阜寧縣之廟灣場起至通州之吕四場止共計二十五場延亙六百餘里除泰州屬之拼茶角斜二場范堤臣於去年冬月逐加踏勘相度情形議於舊堤內移進四五里建築越堤一道繕摺具奏旋經西柱遵奉諭旨動用運庫商捐銀二萬三千四百餘兩建新補舊一律完竣現今捍禦鹹潮毋庸再議興修外其次則有如臯縣屬之豐利掘港馬塘并通州屬之石港西亭金沙餘西餘中餘東吕四等十場亦經西柱擇其殘缺之處動支運庫捐銀量行修補其餘未經修及之工竈户鹽總亦自行率衆修葺幫補髙厚一律完整是可無庸修築者也再有泰州屬之富安安豐梁垜東臺何垜五場現在地勢髙阜人煙稠密廬舍市㕓回環聨接居住年深日久查勘舊堤有改作民房全無基址者有僅存堤形者訪之居民耆老僉云百餘年來海潮去逺久不聞有鹹水灌入村莊之事是此堤之不必重修明矣又興化鹽城阜寧各縣屬之白駒伍祐廟灣三場現存舊堤雖髙矮不等但細矚情形地勢俱屬髙阜去海亦逺訪之居民耆老僉云潮水甚大之時離堤尚有十餘里並未嘗漫及堤根是此地之范堤所係實非緊要均可緩為修築者也祗有地勢低窪如泰州屬之草堰場應修堤六百一十二丈小海場應修堤一百零三丈丁溪場應修堤四百三十二丈并興化縣屬之劉莊場應修堤二百四十五丈鹽城縣屬之新興場應修堤六十餘丈共計范堤通長一千四百五十餘丈相度地形卑下必宜再為增培應行間段加修自二三尺起至五六尺不等築成一律髙厚以上各工共估計動用運庫捐銀三千餘兩即足以捍禦潮汐可資屏障矣總之濵海堤工原藉以約攔水勢如潮水漸近即當作速興修急圖保護如潮水去逺即當緩其修築以節錢糧未便執前人之成迹而於逺近緩急之機宜槩置之不問也臣仰體皇上恤商愛民之至意詳勘情形再三斟酌請照黃運兩河堤岸之例召募附近居民充當堡夫每日挑積土牛修補殘缺卑薄并搜捕獾鼠填墊水溝每夫一名月給銀五錢每歲約計銀二千餘兩仍令各場大使就近募充每月動支運庫捐銀散給其修理堤工責成汛員查核催趲從此日增月纍范堤可無殘缺之虞庶幾帑不虛糜工收實效似於栽培商力保護民生兩有禆益臣愚昧之見是否有當謹將勘過情形據實繕摺奏聞伏祈皇上訓示遵行謹奏卿既再三斟酌自中肯綮朕焉有信不及處即照所議施行可也同日又奏為請旨事竊臣荷蒙皇上天恩特授大學士仍管理江南河道總督事務臣感激隆恩即擬趨赴闕廷恭覲天顔因於具疏奏謝時并陳下悃復蒙皇上鑒臣戀主心誠恩諭霜降後請旨再來臣聞命之下望闕叩頭歡忭難名今已九月初旬霜降伊邇臣業經繕疏奏請籲懇恭覲天顔現在祗候聖恩伏念河防諸事錢糧重大頭緒繁多専藉人工修守臣竊見管理兩淮鹽政臣髙斌奉旨學習河務虛衷聽受每多領會且人品端正從此忠勤率屬定當砥礪有成可否將總河印務即交署理容臣於霜降後星馳北闕俾得與在廷諸臣隨班拜舞嵩呼萬夀則臣十有餘年瞻天仰聖之忱得以稍抒於萬一感荷天恩髙厚實銜結於生生世世矣為此敬謹繕摺恭請訓示遵行伏祈皇上睿鑒謹奏髙斌學習未久尚未熟諳今嵗卿且不必來京於明年霜降後再行奏請候朕斟酌有旨雍正十一年十月二十二日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為請定兵夫積土成例以固堤防以收實效事竊照江南黃運兩河堤岸綿逺祗有河兵看守掃壩一遇汛水長發各處調撥分身乏術以至長堤之上防護無人臣於雍正九年八月內題請循照豫省之例每堤二里添設堡房一座召募堡夫二名每名按月給工食銀五錢即令堡夫常川防守挑積土牛以資修補堤工之用荷蒙皇上恩準照例添設欽遵在案今臣嚴加督率按堡稽查除寒暑兩月免其積土外其餘每月黃河一堡二夫責令積土十五方運河一堡二夫除糧船往返修補犁溝橛眼外責令積土十二方以一年合算可以積土十五萬餘方已收費少工多之效惟是堡夫有勤惰不齊該管汛官亦有賢否各别設不嚴立章程則日久法弛難於查察臣請核定成規以雍正甲寅年正月為始責令該管汛官將所屬汛內堡夫從前積過土牛逐堡挨查確實作為舊土報明備案即於正月起照依前定數目每名按月加數挑積仍將挑過之土每月造於新土册內彚報算入交代以專責成若不能如數挑積者將專汛文員罰俸一年該管廳員罰俸半年倘或挑積不及一半即將專汛文員降職一級暫留原任戴罪趲挑該管廳員罰俸一年如此則廳汛各員畏干處分之例自必上緊督率挑積矣再查河兵舊例每年桃伏秋三汛俱在掃壩力作惟於霜降後計算兩月日期照堡夫例每二名一月積土十五方堆積堤工備用今查黃運兩河除樁夫掃手撑駕浚船并各該將辨養亷之外實在力作河兵約計五千名共應積土七萬五千方亦應將所積土牛查明造册入於該備辨交代項下以專責成若該管備辨不勤加督率亦照前定之例分别查參議處似此章程一定則兵夫自無間曠錢糧不致虛糜既資防守之益復成積纍之功伏查雍正七年荷蒙皇上厪念河堤每年加修五寸沿河黎庶莫不頂頌聖恩安益求安之至意今復設有堡夫嚴其課程而於水勢緊要堤工單薄之處多積土牛霜降以後即將本汛兵夫所積之土增培本汛單薄之堤止須酌給潑水行硪之費在於每年嵗修加髙册內據實聲明以節錢糧務令該管員辨盡心董理修築堅固如此兩三年後并加髙五寸之工亦可逐漸減省而堤工得免殘缺卑薄之虞矣臣因國帑堤工攸關重大誠恐奉行日久或致玩誤廢弛合應仰懇睿裁著為定例則日久見效錢糧既可節省堤工又復鞏固實荷皇仁於億萬斯年矣謹繕摺恭奏伏祈皇上訓示遵行謹奏兵夫積土著為定例既可節帑又以護工足見奉公體國之誠斯議嘉是覽之如應題達具疏題奏以聞雍正十一年十二月初一日大學士仍管理江南河道總督事務臣嵇曽筠謹奏為聖恩亘古特隆微臣感激難名恭申謝悃并陳明臣母緣由仰祈睿鑒事竊臣接閲邸鈔奉上諭大學士嵇曽筠敬慎居心忠勤襄事自簡任河道總督以來整理有方調度合宜即如今年直隸豫省堤工潰決而江南地處下遊不但各工平穩且有自開引河之瑞此實嵇曽筠殫力宣勞之所感召且江南河務今年工程較多所用物料加倍而所費錢糧較從前減省兹又奏請將葦蕩營出産柴束立定章程趲運交工濟用具見實心實力巨細不遺深屬可嘉朕念伊父之忠義伊母之節操雖已贈恤旌褒尚未膺一品封典今特沛殊恩著給與大學士應得誥封以示優眷欽此臣跪聆之下當即恭設香案望闕九叩恭謝天恩訖伏念臣以庸愚生逢堯舜優頒懋賞疊賁溫綸浹髓淪肌備沐天家膏澤自頂及踵無非聖主生成乃更荷我皇上推恩之大典錫類之洪慈憫念臣父殉忠臣母守節特加一品封誥用昭三代榮施恭膺希世隆恩非常曠典捫心叩首嗚咽難言縱竭捐糜髙深莫報惟是臣福薄罪深臣母忽於前月之底陡患痰證臣正在邳宿一帶查料勘工飛騎奔回急為調治不料病勢沉重風燭難支惟有口誦佛號頂謝聖主洪恩勉臣盡忠竭力并勉臣子臣孫世世銜結以圖仰報臣自念一身微末報恩惟有君親今臣母奄奄一息臣已罔極難酬罪無可逭而猶幸今日之得奉湯藥慰藉於彌留之際皆荷皇上殊恩特沛優眷榮加臣即生生世世願為犬馬總難效涓埃於萬一也臣更有請者臣母旦晚難保臣遵照定例謹擇淮徐道吕維炳代為辦理一面移咨漕臣具疏題報候旨離任守制外伏查河工學習鹽臣髙斌居心行事久在聖明洞鑒之中本年十月復來清江臣將形勢機宜工程底細剖晰講究復派工員隨伊遍歷黃運河湖一應工程伊俱能虛心體認專心學習倘蒙皇上天恩畀以署理印務自必愈加勤慎出力報效則管理有人臣即可循例邀恩守制仰荷鴻慈髙厚結草銜環永永靡既矣臣不勝感激悚切之至謹繕摺恭謝天恩伏祈皇上慈鑒謹奏自開闢以來仙佛尚然解化人生豈無終極以卿母之年而論曰福曰夀可謂世所罕覯況兼懿範清操足堪不朽在卿更可謂克盡子職纎毫無憾萬勿深維罔極過於悲傷倘至毁瘠莫支則翻違忠孝大義矣其減損哀慟以釋朕之懸念雍正十二年四月十五日大學士仍管理江南總河事務在任守制臣嵇曽筠謹奏為奏聞事竊臣於正月間蒙聖恩給假回籍旋於三月內起程四月初二日已抵淮安伏見大江南北牟麥盈疇長養秀實現在次第收穫盈寧有慶遐邇騰歡此皆仰賴我皇上恩膏疊沛蠲賑頻施截漕折色事事周詳用是米價甚平閭閻喜悅雨㿩時若二麥豐收臣於一路查勘瓜洲江工穩固潮汐安瀾漕運糧船皆銜尾渡黃北上駱馬湖蓄水充盈濟運遄行無阻各廳桃汛工程經署河臣髙斌加謹催趲業巳奏報平安臣現在奔走河干親赴上下要工逐一查勘督率修防與髙斌同心協力寅恭辦理惟願黃淮永奠億兆咸寧以期仰副皇上慎重河防愛養元元之至意敬將江南地方二麥豐收並黃運湖河現在水勢工程平穩情由繕摺奏聞伏祈睿鑒謹奏深慰朕懷大學士仍管理江南總河事務在任守制臣嵇曽筠署理江南河道總督印務臣髙斌謹奏為請築月堤移建閘座以禦汛水以固河防事竊查海防廳屬黃河南岸辛家蕩縷堤坐當全黃尾閭年來北岸長有沙灘逼溜南趨掃灣沖刷河崖塌卸致成迎溜險工將來汛水長發衝射堤根危險堪虞臣等親往查勘相度情形縷堤南首版荒地內應圈築月堤一道避其激湍之勢順其就下之性庶幾未雨綢繆有備無患再辛家蕩縷堤舊有減水石壩一座係康熙四十年間經前河臣張鵬翮題建以備宣泄黃河異漲之水嗣因黃流順軌海口深通堤內村莊聨絡居民稠密自始迄今此壩從未開放蟄陷泥淤廢棄已久現今大溜南趨逼近壩臺將來勢必塌卸自應相機將舊石議拆移運别工應用今查揚河廳汛內寶應縣西堤向有竹絡壩一座原備宣泄運河之水前於雍正九年因壩底年久虛鬆經臣曽筠於亟請下掃等事案內題請另建新壩一座照舊蓄泄在案但水長即挑開掃壩放水以保堤工水落即下掃堵閉蓄水以資漕運既非一勞永逸之計且有遞年修築之煩臣等愚見不若將辛家蕩舊石拆於寶應西堤審擇堅實地基改建減水石閘因時啓閉蓄泄咸宜且建閘之後即可將舊時掃壩永逺堵閉一轉移間不特將無用舊石皆成有用可以節省錢糧而揚屬運河一帶堤工益資鞏固漕運民生均有禆益矣至辛家蕩月堤計長七百丈估費四千四百餘兩現在照例發帑飭令淮揚道監工上緊趲築堅固以禦汛水并將移建閘座工程悉心確估造册具題請旨外所有臣等公同勘估辛家蕩工程情形謹先繪圖貼説繕摺恭呈御覽伏祈皇上訓示遵行謹奏因地制宜移彼就此卿之措施諒應不謬也雍正十二年八月初一日大學士仍管理江南總河事務在任守制臣嵇曽筠署理江南河道總督印務臣髙斌謹奏為恭報水勢工程平穩仰慰聖懷事竊查秋汛屆臨正諸水長發盛行之候臣等凜遵聖訓加倍小心率領道廳員辨分駐工所曉夜防守目今徐邳淮揚雨暘時若黃水亦次第長落雖入秋以來風勢甚大而掃壩鑲墊加髙不致湧激為患黃運各工在在鞏固洪澤湖為刷黃濟運之要區蓄泄機宜最關緊要臣等悉心體察相度水勢將天然壩及早堵閉俾清口益為順暢敵黃東注兼之瀦蓄湖水以濟來年運行預備有益至江潮浩瀚瓜洲工程頗為喫緊臣等俱親經查勘督率修防加掃壩以禦潮頭下碎石以護崖根江干一帶工程俱獲安穩今七月已過八月正屆雖秋汛綿長而各廳料物充裕足資捍禦所有現在水勢工程平穩情形謹繕摺會奏仰慰聖懷伏祈睿鑒謹奏覽奏水勢工程平穩情形遙望江淮且欣且慰雍正十二年九月十五日大學士仍管理江南總河事務在任守制臣嵇曽筠南河副總河臣白鍾山謹奏為酌量調撥兵夫挑濬清江引河以利漕運以節錢糧仰祈睿鑒事竊照裏河廳屬之清江浦有龍汪石閘一座當南北通津運道民生攸關緊要因建造已久百餘年來未經修理水勢溜急根底虛鬆北岸迎水石墻蟄卸三丈餘尺其餘閘墻亦多脹裂亟須重加建築以濟漕運現在飭令淮揚道確估閘座工料另行造册具題請旨外臣等伏思拆閘重建築壩興工動經數月方能告竣轉瞬春融重運北上恐誤遄行今於龍汪閘迤上數里之外鳯陽厰地方自五孔橋至張雲壜口查有舊引河一道長一千五百餘丈年久淤墊形址猶存宜先將此河挑濬寬濶一律深通俾運河之水得以由此通流無誤明春運行方可築壩興修閘座隨檄行道廳等勘估挑濬引河需土二十七萬六千餘方計銀二萬二千一百餘兩又以挑河之土幫髙兩岸堤工應用潑水夯硪並創築新堤計銀一萬一千九百餘兩以上挑河築堤共銀三萬四千餘兩加以建閘工料未免需費繁多臣等再四籌畫節省辦理查江南河工額設河兵堡夫一萬餘名目今霜降已屆各廳營修防事竣正值兵夫間暇臣等酌量於通工內抽撥兵夫調赴清江浦勒限挑築每名每日給飯食銀二分業於九月初六日動土開工尅期完竣只需飯食夫工銀一萬二千餘兩較比漕規實計節省銀二萬二千餘兩不特來年重運漕船得以遄行無阻且閘工修竣後又可留此河身以為運河水長之時預備宣泄之用似於運道民生均有裨益所有調撥兵夫開挑引河節省錢糧以利漕運緣由理合恭摺奏明伏祈皇上睿鑒謹奏如此經營可謂辦國計如家務矣褒奬之外更有何諭雍正十二年十月二十八日大學士仍管理江南總河事務在任守制臣嵇曾筠南河副總河臣白鍾山謹奏為酌減漕規以節錢糧事竊照河防全在土掃工程既當修築堅固帑項又須因地制宜隨時酌減方為有益臣等上下巡查見所屬工料俱比從前豐足堅實詳悉籌維土掃二工尚有可以節省之處敬為我皇上陳之一土工方價宜分别酌減也查土方則例業經酌減分出水旱逺近乾濘擬定成規部覆準行在案但土頭有厚薄不同人夫有強弱各異向例各廳土工漕規例係畫一未曽因地分晰今臣等詳細分别各廳除髙堰山旴裏河揚河江防五廳或緊臨漕運或接比河湖大江而且居民稠密取土不易土方價值無庸再減外查徐屬邳睢宿虹三廳壤地寬廣取土便宜其於方價尚可再減十分之二至桃源外河海防山安運河桃清六廳貼臨河湖一面取土其於方價亦可再減十分之一如此則每年土工方價酌減報銷工程不致草率仍可照估儹修一防風掃工用料宜酌減也查黃運河湖水深之處所下沉水掃箇與加鑲掃料水勢湍激工多蟄陷料物自應照依向定漕規不能改減其水淺之處恐有風浪沖刷於堤根鑲做防風保護崖岸舊例每單長一丈用柴三十八束或用草一千一百四十斤但前項工程雖亦有蟄陷不比頂衝首險其料物尚可減省今酌定柴鑲防風每單長一丈減去柴八束用草加鑲者減去草二百四十斤以省工料再查前項防風工程從前因所用料物與鑲墊之工相同是以有開報防風者亦有開報鑲墊未經指出防風字樣者今既酌減工料則嗣後每年估銷册內應將水勢深淺並防風字樣逐一聲明以便查核報銷倘有不將水淺防風據實聲明者容臣等查出參處以上酌減土掃二工錢糧皆因比年以來仰賴皇上聖德感孚水勢工程平穩年豐人和民力寬舒因時因地斟酌損益請於雍正乙卯年為始照酌減之例核明造册估計銷算於帑項可以節省而工程仍復鞏固所有現今酌減土掃二工漕規謹據實會摺敬陳是否有當伏祈皇上訓示遵行謹奏因時因地酌減土掃漕規具見忠誠任事自屬節用良籌然朕以為不必定作成例奏銷時仍照舊造報惟於題本內聲明情由將所減銀兩存貯河庫以備别項工程之用殊覺妥協卿意何如雍正十二年十二月初四日大學士仍管理江南總河事務在任守制臣嵇曽筠謹奏為恭謝天恩事本年十二月初一日臣齎摺家人恭捧皇上恩賜鹿尾五箇鹿肉二盤野雞六隻臣隨跪迎道左恭設香案望闕叩頭謝恩祗領訖伏念臣自蒙豢養備沐鴻慈忝司河務以來十有餘載恩勤篤摯無一時不仰厪聖懷無一物不仰霑聖澤兹復榮邀眷注寵賚特頒彩煥黃封捧到尚方之仙脯親調丹液幸嘗內府之嘉珍截肪裁脂馨香逺布淪肌浹髓感激難名竊臣年六十有餘雖係餘生尚堪竭蹶馳驅力圖報效惟有事事稟承睿訓時時仰體聖心早夜圖維恪恭趨走俾百谷朝宗之境兩河血氣之倫咸飲和食德於天恩伏祈皇上睿鑒謹奏覽卿奏謝知道了雍正十三年二月初二日大學士仍管理江南總河事務在任守制臣嵇曽筠署理江南河道總督印務臣高斌謹奏為雨雪應時麥苗滋長運道深通仰慰聖懷事竊照徐邳淮揚一帶於除夕元旦等日俱降瑞雪盈尺普遍千有餘里立春前後又復甘雨綢繆臣等巡視堤工見兩岸麥苗滋潤長發運河春水充足清江浦鳯陽厰新開引河現今水勢深通糧艘遄行連檣北上其舊運河因修築龍汪閘座將河身兩頭築壩戽水乾涸頂底畢露臣等逐細查勘除兩邊雁翅石墻尚有堅整之處並月河閘座通體完備俱不必議修外惟將龍汪大閘金門兩墻蟄卸處所重新建築所需面裏等石業將諸家溝淤墊舊閘一座拆運該工濟用毋庸赴山開採以節帑項祗有樁木米汁石灰錠鋦夫工等項現在核實確估務期籌酌妥協方敢具題其上下各處運河因湖水瀦蓄充裕藉以接濟一律深通並無阻滯黃運兩岸掃土工程趁此春融之際業經詳悉指示廳營實力修做在在髙堅以禦桃汛所有雨雪應時運道深通緣由臣等謹繕摺奏聞伏祈皇上睿鑒謹奏據奏堤岸髙堅桃汛有備朕懷已慰及閲雨雪應時春水充足等語則帆檣上下浪靜波恬景象宛然在目也曷勝愈悅之至雍正十三年三月二十日大學士仍管理江南總河事務在任守制臣嵇曾筠署理江南河道總督印務臣高斌謹奏為據情代奏恭謝天恩事竊照淮徐道吕維炳為伊子取結致書囑託旗員一事荷蒙皇上天恩從寬革職留任免其解京質審臣等欽奉聖諭即傳吕維炳至署敬謹宣示吕維炳跪聆之下免冠叩首感激涕零隨據稟云仰沐皇上高厚鴻慈自今以往惟有洗心滌慮悔改前非勤慎辦工力圖報效所有頂感血誠懇請代為奏聞等語臣等敬體天心復再三訓飭勉其痛除習氣實心出力以仰副皇上軫念河防愛惜人材之至意查道員雖無代奏謝恩之例今臣等目覩吕維炳感激天恩情詞迫切出於至誠不敢壅於上聞謹會同繕摺恭奏伏祈皇上睿鑒謹奏朂其勉為良吏慎勿貌從心違如傳所云掩其不善而著其善見君子而後厭然也雍正十三年四月十五日大學士仍管理江南總河事務在任守制臣嵇曾筠署理江南河道總督印務臣高斌謹奏為酌添墩鋪巡船以資防守仰請聖訓事竊照陸路墩鋪與水路巡船均為防範汛地杜戢姦匪之要務必須布置周密聲勢聫絡方足以資捍衛而嚴汛守查江南河標所轄水陸營汛為南北通衢悉屬衝要差使殷繁撥護絡繹空重糧艘及一切民船客貨往來如織水陸汛防均宜慎重今查應添設墩鋪之處如南自王家營起北至山東交界紅花埠止計程二百六十餘里係進京大路其原設墩鋪逺近不一除相隔十里以內道路均停者不議外其相隔十二三里至十七八里者未免瞭望不及防禦難周又南自清江浦起北至山東交界臺兒莊止計程三百七十餘里係漕運要道其沿河原設墩鋪內有相距十七里至二十里及二十一里不等路途較逺䇿應維艱臣等詳加籌畫應將窵逺之墩鋪各於適中處酌添墩鋪一座共計添設墩鋪一十六座每座撥兵四名共需兵六十四名各於本營存汛兵丁內輪流抽撥令其住宿鋪房勤慎防守則兩路墩鋪均無鞭長不及之虞汛守益為謹嚴矣又應添設巡船之處如黃河自江南清口淮黃交滙處起至河南虞城縣交界止計程五百三十餘里沿河一帶地方遼曠姦匪易於出沒巡防尤宜嚴密但近岸難建墩鋪必得安設巡船撥兵常川查緝以杜匪類而保商旅至於運河雖經設有墩鋪但汛兵僅能防範於陸路其遊巡河面亦非船隻不可今運河內惟夏鎮汛舊有巡船一隻黃河內惟銅山睢寧蕭碭等縣舊有巡船八隻其下遊之桃源宿遷白洋隅頭泇口清河清江等汛均係緊要之處向未設立巡船臣等酌議應於桃宿等緊要河汛添設船隻以資巡緝計黃運兩河共添巡船一十一隻每船需兵五名共需兵五十五名亦在於本營存汛兵丁內抽撥查照所管河汛往來巡緝勤加稽察務使宵小屛絶河路肅清則兩河商船客貨均得防護安全矣緣有關酌添墩鋪巡船事宜臣等未敢擅便是否有當謹繕摺恭奏懇請聖訓如蒙皇上俞允臣等即與督撫臣會疏具題伏祈訓示遵行謹奏是誠禆益地方之舉會疏題請酌定有旨同日又奏為奏聞事竊照四月初五日夜江間風浪大作所有北岸瓜洲江工數年以來仰蒙皇上聖明指示堵築夾壩開穵引河以掃護崖以石護掃足資捍禦值此江潮湧激之時掃壩髙堅屹如磐石城池田舍保護安寧惟南岸鎮江京口迤下新河口臨江崖岸有坍塌之處臣等聞信即星飛差員馳往查看兹據委員並江防同知等各稟稱新河口江崖坍去橫長一里有餘進深八九十丈不等沿江民房塌缷三百餘間等情臣等查所坍之崖距鎮江府城尚逺無關運河要道惟河口內向建新閘一座蓄泄水勢以便民船今臣嵇曾筠親往勘明後移咨督撫臣轉飭地方印汛官相機料理並確查塌房居民分别撫恤外謹將鎮江偶遇風潮北岸瓜洲工程平穩情形先行繕摺奏聞伏祈皇上睿鑒謹奏覽奏知道了聞彼處土人咸云江中有豬婆龍能致風浪之患斯語確否雍正十三年六月初二日大學士仍管理江南總河事務在任守制臣嵇曾筠南河副總河都察院僉都御史臣劉永澄謹奏為恭報伏汛水勢工程平穩情形仰祈睿鑒事竊查本年夏至以後據寧夏府報稱上遊黃水泛漲三尺兼之徐邳一帶大雨時行黃河水勢長發至六尺四五寸不等賴上年霜降迄今底水消落甚多臣等於桃汛之前巡歷各工逐一查察修築鑲墊根底堅實是以黃水雖覺強盛而掃壩髙厚屹如磐石現在出水五六尺至八九尺不等足資捍禦至南岸清口黃淮交會之處必須清水抵敵黃流不致倒灌為患今洪澤湖淮水尚未盛長誠恐水勢淺弱臣等相度情形將山旴天然壩並裏河文華寺閘俱皆堅閉藴蓄湖水暢出清口敵黃東注又將北岸鹽河越壩相機開放分泄駱馬湖暨黃河水勢今自徐邳以至雲梯海口循軌順流水行沙刷毫無阻滯其各廳購備料物並葦蕩營額餘柴束俱經查催儹運酌量工程平險分别堆貯雖伏秋踵至汛險工長而料物充盈足以濟用通查伏汛內黃運湖河上下各工在在平穩此皆仰賴我皇上至德精誠濳孚默契河神鑒佑有如響應臣等奔馳防護踴躍歡欣額手感頌惟有倍加敬謹率領道廳員辨分駐各工小心修守以仰副皇上慎重河防之至意所有伏汛水勢工程平穩情形理合繕摺奏聞伏祈睿鑒謹奏伏汛安瀾朕懷深慰全河保障修守機宜惟卿是賴焉雍正十三年七月十一日大學士仍管理江南總河事務在任守制臣嵇曽筠南河副總河都察院僉都御史臣劉永澄謹奏為恭報伏秋交會水勢工程平穩情形仰慰聖懷事竊照江南黃運湖河各工伏汛修防穩固業經臣等奏報在案伏查夏末秋初正二汛交會之候又據寧夏府報稱上遊黃水泛漲一尺二寸有餘前汛未消後汛踵至黃河日見長發工程甚為喫緊臣等督率道廳將辨往來䇿應曉夜搶護物料豐盈兵夫齊集靡不立時應手復派委多員常川防守自徐邳以迄淮揚一切機宜呼吸可通現今上下湖河在在寧謐縱秋汛綿長而掃壩高厚足以捍禦無患臣等目擊情形惟有額手踴躍敬慎修防不敢因工程平穩少萌疏忽之心又查六月間淮揚地方天氣久晴民間望雨甚殷臣等仰遵聖諭虔誠祈禱屢次俱沛甘霖但未十分霑足復將運河內閘壩涵洞開放分泄灌溉民田又虞淮水勢弱隨於黃淮交會處所趲進掃箇收束口門俾清水刷黃有力合流東注循途順軌以達於海至時屆秋令沿海范堤工程保衛鹽場民舍攸關緊要臣等遴委幹員前往查勘督令堡夫挑積土方增卑培薄預為修理以備秋潮總之臣等受恩深重所以勵犬馬而伸報效者惟竭此一點血誠圖維籌畫上下巡察祝願江湖河海底績永安以祈仰報高厚鴻慈於萬一所有伏秋交會水勢工程平穩情形敬謹繕摺奏聞仰慰聖懷伏祈皇上睿鑒謹奏覽水勢工程平穩情形欣慶之懷筆莫能盡今嵗南北河工卿等勞績實屬昭著俟霜降後另有恩諭硃批諭旨卷一百七十五之四
