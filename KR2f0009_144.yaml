body:
  text: 欽定四庫全書硃批諭旨卷一百四十四硃批徐本奏摺貴州學政臣徐本謹奏為黔省慶雲七現聖世上瑞光昭事雍正七年閏七月二十日據思州府學教授張克惠訓導廖錦報稱本年七月初八初九初十十七十八二十二等日府城疉見五色慶雲散布天表光彩射日闔府士民男婦老幼無不額手稱慶理合申報等情到臣又臣面見督撫司道諸臣僉云黎平協副將趙文英因清理古州八萬苖疆在梅得寨後山單刀嶺上劄營據報稱於七月二十五日從未至酉忽見五色祥雲從西南起光映旌旗璀璨奪目凡在營官辨漢土兵民及歸順苖衆盡皆踴躍歡呼共稱竒瑞臣伏查慶雲紀瑞自古為昭歷稽史册所載暫者一朝久者復旦即屬嘉祥未有一月之中七日疉見如今日者也黔地素稱瘴雨蠻煙晴日常少數年以來風景和明雨暘時若與中土無異今值萬寶告成之候欣遇五雲呈瑞之竒九霄遞曜七日連輝仰瞻雲物之昭回羣慶天心之篤祐臣無任踴躍歡忭之至為此繕摺奏聞謹奏此係汝等滇黔大吏及官員等咸能秉公奉職有以感動上天方能致斯瑞應朕覽奏曷勝嘉恱貴州學政臣徐本謹奏為黔省嘉禾遍野年登大有事竊照黔省邇年以來日暄雨潤年歲順成今歲自春迄秋風雨更為調順臣巡歷所至凡山田水田高高下下盡皆稌黍敷華稻粱垂穎幪幪彧彧畛隰如雲今時值秋成豐收數倍高粱穗長一尺七八寸有一莖十五穗者其餘一莖八九穗六七穗四五穗者甚多禾穗長七八寸至一尺不等一莖數穗者亦甚多小米穗長至二尺及一尺七八寸不等且有一莖二十七穗者其餘一莖數穗者隨在皆是至於各種雜糧亦皆豐盛繁碩數倍常時即新附苖疆亦與內地收成無異現在米價日見平減萬民樂業比戶盈寧臣目覩大有之農祥喜共輿情之歡忭謹據實具摺奏聞謹奏從來天人交感之道實捷如影響也今用爾為按察使矣當屏盡科甲陋習一切居心行政竭力效法鄂爾泰勉之嗣後奏摺或呈交督撫臣附進或差人齎至京師交大學士張廷玊處轉奏可也貴州按察使臣徐本謹奏為恭謝天恩事竊臣一介微末叨䝉皇上特簡視學黔省兩載氷兢涓埃未報兹復荷殊恩補授貴州按察使伏念廉使為刑名總滙之官臣以菲材膺此重任深懼不克負荷聞命之下感悚交并跪讀硃批諭旨欽此欽遵惟有盡屏科甲陋習竭力黽勉效法督臣鄂爾泰之居心行事以仰副我皇上訓誨䇿勵之至意所有微臣感激愚忱謹具摺奏謝伏乞睿鑒謹奏覽奏謝知道了勉之毋怠江蘇按察使今升湖北布政使臣徐本謹奏為恭謝天恩事竊臣世受國恩毫無報稱䝉皇上屢加拔擢由貴州按察使調補江蘇按察使於到任視事後見江蘇案件繁多臣才識短淺深懼隕越兹復荷天恩升授湖北布政使聞命之下益深感激倍切悚惶伏念藩司為財賦出入之所關承宣乃吏治民生之攸繫臣以菲材膺兹重任惟有時時敬繹聖訓盡屏科甲陋習秉公任事實力黽勉以仰報高厚隆恩於萬一所有微臣感激愚忱理合繕摺奏謝伏乞皇上睿鑒謹奏覽能於公私真僞之際審辨明晰體認透徹更加以操存有定造次不移則何任不勝何事不辦也湖北布政使臣徐本謹奏為陳明交盤錢糧事竊臣荷䝉皇上天恩升授湖北布政使於到任後據原任藩司徐鼎及署司張廷樞各將任內交盤册籍移交到臣臣俱逐一查清收受明白造册具結詳送督臣邁柱撫臣魏廷珍查核盤庫具題所有存公耗羡銀兩臣亦查收明白現將歷年支用款項造册具詳督撫二臣送部查核又查湖北額徴錢糧共銀一百一十一萬九千五百三十六兩有零歷查檔案每年奏銷時各屬固多依限通完者惟武昌府屬之江夏縣漢陽府屬之孝感縣黃州府屬之黃岡縣安陸府屬之鍾祥縣及沔陽荆門二州荆州府屬之江陵縣每歲俱有拖缺於奏銷之時統計有未完十餘萬者有未完五六萬者雍正八年分錢糧臣於雍正八年十二月二十六日到任時查以上各州縣歲內僅完三四五分不等臣思錢糧輸將遲延不獨關乎國賦亦且係乎民風隨經嚴檄各州縣將一應未完錢糧開造花戶的名實缺清册躬親核明總撒相符照缺逐戶出示遍曉令民查對缺數清楚寫發滚單酌量分限行催完即分别奬賞其抗缺頑梗之士民侵收包攬之胥役盡法懲創并勒限完納今届奏銷之時沔陽州完至七分荆門州完至八分餘皆完至九分以上此時尚有陸續解司者較之往年漸次清理至於雍正九年錢糧現在照例按分徴輸以清國課所有藩庫交代清楚情由理合具摺奏聞伏乞皇上睿鑒謹奏覽奏知道了民風澆淳最關緊要國賦猶為次之不可徒恃催比當以曉諭無知化導頑梗為先湖北布政使臣徐本謹奏為仰承聖訓恭謝天恩事雍正九年正月初二日臣進摺家人回楚跪接硃批諭旨能於公私真僞之際審辨明晰體認透徹更加以操存有定造次不移則何任不勝何事不辦也欽此臣跪讀之下倍深感佩惟有密加省察謹凛操持隨時隨處體驗力行以仰副皇上朂勉之至意今年湖北二麥收成自六七分至八九十分不等入夏以後雨水更為調勻此時早稻登場最為豐稔晚禾滋茂足驗有秋臣謹據實附陳敬將奉到硃批原摺一併恭繳謹奏覽奏俱悉實力勉為之以期無忝厥職湖北布政使臣徐本謹奏為恭謝天恩并陳下悃事雍正十年三月二十一日䝉大學士鄂爾泰等字開雍正十年三月初六日奉上諭湖北從前巡撫多退縮因循不以實心任事今王士俊新到諒必振作整頓不肯因仍舊習徐本身為藩司當協助撫臣同心辦理方於公事有益若為習俗所染仍存觀望草率之念則伊自蹈過愆負朕之期望矣爾等可傳旨訓諭之欽此遵旨字寄到臣臣捧讀之下不勝惶悚隨望闕叩頭謝恩訖伏念臣世受國恩毫無報效䝉皇上教誨成全屢加擢用歷升湖北藩司臣感激天恩時時警惕奮勉到任一載有餘凡地方公事靡不實心向前辦理今撫臣王士俊蒞楚方新自應振作而亟於表見豈能事事合宜臣有通省地方之寄固不敢偏執巳見有意抗違亦不敢逢迎上司阿意曲從祗緣照糧均丁一案撫臣於摺奏後將摺稿示臣云此事我巳奏了奉旨與督臣商酌題請特與你看等語臣以事關通省章程行之巳久若欲更張必須細細籌畫現今奉旨與督臣商酌自應遵旨俟督臣於湖南看舵桿洲工程回署時公同商酌行旨訓諭臣自當益加奮勉協助撫臣同心辦理但地方庶務繁多惟辨理之是非不拘跡之同異要當公事公辦詳慎商酌方無貽誤若未公酌合宜因避不同心之嫌而曲從意指則涉於黨附之私臣罪滋大是以不敢不將實情縷陳於君父之前伏祈皇上聖明鑒察為此具摺恭謝天恩并陳下悃謹奏果肯公事公辦不阿不黨有何可諭朕之所望也設或巧詞飾過將來究為身纍奚庸於此時辨析耶安徽巡撫臣徐本謹奏恭請皇上萬安朕安切戒善柔沽譽為要巡撫居一省首任非兩司可比諸凡尤當竭誠力行庶免貽誤若涉因循瞻顧及止求自潔則虛負朕之倚任矣深慮汝不克勝任勉為之安徽巡撫臣徐本謹奏為奏明事竊照支放兵糧俱有定限預借預支實非常法今查安慶城守一營及臣標左右兩營兵餉向例春季餉銀於歲底營中赴江寧藩庫具領到皖貯於安慶府庫按月支領後乃於十二月內預給正月一箇月餉銀以為兵丁度歲之需行之既久遂至兵丁不知撙節竟將歲底領回之來春全季餉銀不貯府庫於十二月內全行借支任意花消未及次年二月囊橐空虛又思春借夏餉夏借秋糧日見拮据或借支不到則舉室嗷嗷馬匹疲瘦甚至將器械盔甲悉行質當以致營伍廢弛兹據各兵丁赴臣衙門具呈僉稱除支來年春季全餉外再懇於府庫明春預借一季餉銀分作十箇月扣還等情經臣嚴加申飭竝將應行撙節情由逐一開誠訓誡無如相沿日久逋缺巳積當此給一箇月下剩一箇月留為明春二月內支給接濟待至來年再為預飭辨兵早為撙節至歲底止准借支一月以此遞減兩年之後即可春放春餉永杜預借之端雖此時未副所求各兵度歲不能如從前之適意而將來按月獲支全餉則每年可免匱乏之虞實於營伍兵丁均有禆益所有三營借餉情由理合據實奏聞伏祈皇上睿鑒施行謹奏所見甚是整飭武僃訓練營伍尤為第一要務勉之安徽巡撫臣徐本謹奏為奏明事竊照鳯陽關稅務係臣衙門經理前撫臣程元章檄委鳯陽道何宗韓料理徴收今何宗韓奉旨以京員補用現在交代離任有新任鳯陽道李如蘭原係江寧府知府臣前於江蘇臬司任內知其為聞謹奏不時稽察四字不可作虛文泛奏言行少不相副則為辜負委任也一切敷陳總以躬行實踐為貴切勿徒託空言即一字一句朕必期其符合向後當加詳慎斟酌已力之所能否奏聞於朕此非吟咏風月游情翰墨堪比一字不實如何其可志之勉之安徽巡撫臣徐本謹奏為恭報上江得雪日期事竊照三冬瑞雪攸關來歲田功今於十一月二十八十二月初二等日安慶城內連得大雪臣即飛行各屬飭查去後續據申報前來安慶府屬之桐城潛山太湖宿松望江徽州府屬之休寧祁門續溪婺源歙縣寧國府屬之宣城寧國太平旌德南陵涇縣池州府屬之貴池青陽銅陵石埭建德東流太平府屬之蕪湖當塗繁昌廬州府屬之合肥廬江舒城巢縣無為州六安州及所屬之霍山英縣滁州及所屬之含山廣德州及所屬之建平等州縣俱於十一月十六二十八二十九十二月初一初二初三等日各得雪或一二寸或三四寸或五六寸不等惟鳯陽一府潁泗亳三州尚未報到臣細訪各屬土脈滋潤麥子俱經布種所有上江得雪日期理合恭摺奏聞伏祈皇上睿鑒謹奏覽上江各屬所得亦止微雪耳朕為北數省三冬無雪甚為憂念安徽巡撫臣徐本謹奏為詳陳安省盜案情由并酌添捕役以資巡緝事竊照安省濱河環山盜賊多有臣自抵任以來披一緝批任其所之毫無整頓以致竊劫頻聞逸盜未能即獲臣仰體皇上弭盜安民至意現在分定比緝之法飭令司府直隸州各立比簿凡係竊案提比責之府州大盜提比責之臬司其有巨盜及案多未獲之處臣則親自提比並照定例立限分别懲勸其沿江一帶臣復派委員辨分路駕舟巡哨冀戢盜風再請於省城另募幹練妥當捕役八名發與按察司衙門一聞慣盜行劫立即飛差前往協拏平日即令慎密查緝各處私磺私鑄等項捕役每名每月於兩關存公節省浮費項下動支銀三兩作為工食臣與臬司仍嚴加約束不時體察明示賞罰不許在外生事如有違犯盡法懲治雖省城設立捕役八名未必能查拏通省大盜然各屬恐為臬司捕役拏獲有干考成諒必各知奮勵似亦整飭地方之一端至宿州等處素稱盜藪其應行防範之處臣現在悉心訪察容俟酌議妥協另行請旨是否有當伏祈皇上訓示施行謹奏所奏比緝盜竊情形嘉悅覽之安徽巡撫臣徐本謹奏為恭報鳯陽等處雨雪霑足事竊照安慶等屬於上年十一二月內連次得雪竝鳯陽一府及潁泗亳三州未據申報各情由經臣恭摺奏聞今據鳯陽府屬之鳯陽臨淮懷遠靈璧定遠虹縣夀州宿州各申報正月初三日先得雨一寸初四日復得雪三寸至五寸八寸不等又據潁州申報正月初四日得雪六寸所屬之潁上霍邱二縣各申報十二月十二日得雪二寸正月初二日先得雨二寸初三日復得雪三寸又據泗州及所屬之盱眙天長五河三縣申報十二月初七日各得雪一寸又於正月初二初四等日得雪五六寸不等又據亳州及所屬之太和䝉城二縣各申報正月初二日先得雨二寸初三日復得雪三寸俱稱四野霑足其從前已得冬雪之安慶等各屬亦陸續申報同日得有雨雪通省農民甚是歡悅所有安省雨雪霑足緑由理合具摺奏聞謹奏覽奏安省各屬雨雪霑足殊為欣悅之至安徽巡撫臣徐本謹奏為奏聞事竊照安徽所屬舒城等八州縣內有秋禾被水處所經前撫臣程元章題報情形在案臣到任檄催據布政使馮景夏委員勘明詳報前來臣查八州縣內除夀州不致成災其宿州舒城等處被災之地雖有六七八九十分不等然每州縣不過數處餘者皆獲豐收當其初報被水之時業經前督臣尹繼善動支存公銀兩資助窮民今勘明成災之際臣現在又動存公銀兩委員前赴各該地方復加撫恤務不致有失所此時米價甚平略加安頓災民即可支持惟臘底及明嵗春耕以前正屬米價增長之候災民不無乏食之虞臣是以㑹同署督臣魏廷珍疏請照雍正三年之例自十二月初一日起動用存倉米穀散賑三箇月并將災田錢糧按照分數蠲免同夀州不成災之田地錢糧均請緩徴在案除安徽一省所屬秋成各分數另行開摺恭呈御覽所有微臣辦理此案情由理合奏聞伏乞睿鑒謹奏知道了散賑之舉其中弊竇不可勝言若但虛應故事不能令災黎獲沾實惠徒飽猾吏姦胥之貪腹其咎總歸於汝也慎為之安徽巡撫臣徐本謹奏為請旨事竊照官員委署安省舊例俱係布政司詳委嗣因布政司駐劄江寧與安慶巡撫衙門相距遙逺詳文往返動輒月餘州縣有刑名錢穀之責委員日久不到勢必貽誤隨經前任撫臣程元章摺奏奉部議准凡𠫭劾之員由督臣參劾者令江寧布政司就近詳委批署由臣衙門參劾者令安慶按察司就近詳委批署奉旨允准近來參劾官員出缺委署迅速地方無誤其法甚善但查應行委署之缺不止參劾一項其餘奉旨引見升遷降革丁憂改教告休病故等項遺缺甚多臣思參劾員缺既可令按察司分任辦理則其餘各項亦可循照而行然不分定地方又恐逺近遲速亦未合宜經臣令布按二司從長酌議去後續據該司等禀覆寧國鳯陽太平三府并滁和廣泗亳五州所屬地方離安慶八九百里不等俱附近督臣衙門應令布政司徑詳督臣就近批委安徽池廬四府并六潁二州所屬地方離江寧亦八九百里不等俱附近臣衙門應令按察司徑詳臣衙門就近批委仍彼此咨明以便查考等情與臣意見相符為此繕摺具奏至於司道大員責任綦重應循舊例督撫㑹商而行合併陳明是否有當伏祈皇上訓示施行謹奏該部議奏安徽巡撫臣徐本謹奏為知府才具不同謹請酌量調補以重職守事竊臣查得寧國府知府黃叔琪才具中平雖未著有劣蹟但辦事因循難勝府任伏查雍正六年八月內欽奉上諭知府管理通郡有察吏之責內有僅係循分供職不能察吏而又素無過犯不至參劾於吏治無益著督撫詳加甄别其有才具中平不能察吏以在京部屬改調欽此欽遵在案今黃叔琪與前奉諭旨相符臣不敢徇隱相應據實奏聞請以部屬改調又太平府一缺向係就近管理蕪湖關務甚屬緊要知府李暲經前撫臣魏廷珍委令管關嗣因廣東督臣鄂彌逹參奏失察關役需索一案奉旨查詢隨經前撫臣程元章改委池州府知府李士傑管理及臣到任細查李士傑謹飭辦公管關以來所收關稅頗有贏餘商民亦皆帖服第查蕪湖一關係太平府所轄池州距關二百餘里道路遙遠暫管則可日久恐難兼顧此外又無别員可委臣查太平池州二缺繁簡相等若將李士傑與李暲對缺調補實於地方關務兩有禆益但李暲現在遵旨令與廣東委員質審虛實未定臣未敢遽請調補可否容臣將太平池州二缺先行調署俾李士傑得以就近管關俟李暲失察一案審明之日再請補授仰祈皇上訓示遵行謹奏所奏是候另旨諭部安徽巡撫臣徐本謹奏為請旨事竊查雍正八年庚戌科進士姚日升奉旨命往安徽學習到省之後經前撫臣程元章派往江寧藩司衙門尚未限滿今安徽學政臣姚三辰係姚日升親父巳准移㑹到任考試臣查姚日升現在學習既有差遣限滿之日又應委署父子同省即彼善為防間刻自檢束恐有不肖之輩在外借名滋事仰懇皇上將進士姚日升調赴蘇州藩司衙門學習俟限滿之日同下江進士一體委用似屬妥便為此繕摺恭請皇上批示遵行謹奏照所請行該部知道安徽巡撫臣徐本謹奏為天恩有加無巳微臣感激難名恭摺奏謝以伸下悃事竊臣一介菲才仰䝉皇上不次超擢洊歷封疆夙夜黽勉方愧無以報稱接閲邸鈔知臣胞弟通政司右參議徐把又奉命赴甘肅料理軍需重務旋轉左參責任非輕恩施倍渥兹接臣子翰林院庶吉士徐以烜家信知臣子復䝉聖恩授職編修是臣兄弟父子皆荷睿鑒謹奏覽安徽巡撫臣徐本謹奏為奏明事竊照安省正項錢糧前經委員逐一清查巳有頭緒臣現在將未完銀兩嚴檄督催將來自可陸續清楚惟有馬田稻租一項因係雜項錢糧從前未經清查臣思此項稻租每年既應奏銷即同正項理宜一體查明逐年徴解庶無拖延朦混之弊隨細加確核自康熙五十八年起至雍正十年一十四載共積缺租稻一萬二千八百五十七石有竒其中非係胥役侵蝕即屬佃戶抗缺且查有私折價銀收存在庫者年久缺多此時不加釐剔勢必國帑虛懸歸於無著而官佃玩愒之風亦將漸長查此項稻租向係州縣竟申巡撫衙門考核布政司無督查之責易致拖缺臣隨將歷年完缺開册飭知責令布政司一體督催并飭於前在江南清查錢糧之試用人員內遴委數員同幹練佐雜等官前往催查以冀徹底清楚再從前查明之正項積缺內有貴池銅陵祁門三縣自康熙五十五年起除催徵起解外仍未完地丁雜課等銀三萬有竒未完米豆五千石有竒臣巳飭令委員一併查催總期一清逋缺將來得以年完年款倘有官役侵肥等弊臣另行參究仍飭委員妥協辦理不致滋擾閭閻所有委員清查馬田稻租及帶催正項積缺緣由相應奏聞伏祈皇上睿鑒施行謹奏據奏飭催馬田稻租併令委員帶催正項積缺均屬地方要務應行料理者安徽巡撫臣徐本謹奏為奏聞事竊照安省之池州一府民俗刁悍最難治理而附郡之貴池一邑為尤甚臣查貴池地勢參差塘田高岡不一該縣民人習慣抗糧雨水偶多則稱塘田被淹雨水偶缺則稱高岡失收即使雨澤調勻之歲亦稱年景平常或求蠲免或懇緩徵以致正雜錢糧拖缺頗多臣到任後訪知其弊因前任知縣陳瑺不能振刷當經題請改補簡缺遴選試用官張鳴鐸署理在案詎該縣刁徒張士如等生員吕垣等復萌故智乘府縣公出輒赴署同知周璠衙門投遞旱災呈詞周璠新任不諳混行接收經臣訪聞一面將周璠掣回一面飭府確查果否被旱而張士如等知事情敗露即於八月二十三日率領鄉民百餘人各挑稻禾將縣門堵住揑稱保留周璠并揚言要搶潑米鋪嚇令關門又值學政在彼歲試遍貼招帖欲於人衆之時聳動觀聼當據該府縣禀報實有六七分收成委係刁徒揑詞抗糧隨將為首之人密行拏獲等情臣恐府縣有匿災情弊飛委銅陵縣知縣冉瑾前往查勘續據勘明竝不成災出具印結由司詳報到臣其為刁徒希圖抗糧情事顯然亟抗糧及臣拏究情由謹繕摺奏聞伏祈皇上睿鑒施行謹奏此等刁風豈容寬縱宜飭有司嚴行審究將為首者以光棍例定擬示懲餘犯內擇其強橫者照抗糧例繩治始足蔽辜倘少涉姑息被朕訪聞必不輕恕汝等也毋貽後悔江南總督臣高其倬安徽巡撫臣徐本謹奏為請旨事竊照安省州縣以上各官俱䝉聖恩准給飬亷俾得安心辦公惟佐雜各官向因耗羡尚未充裕勢難遍及是以未給飬亷但此等佐雜日用不繼易致擅受民詞私取里下等弊臣等伏查現存江廣每年歸公鹽規匣費銀三萬兩當日俱係大小衙門規禮於雍正十年三月內經臣其倬暨前任浙江督臣李衛等議奏大學士等覆核逐年收存司庫以僃地方公用奉旨依議欽此欽遵在案似應推廣皇仁以公濟公查安省佐雜除藩司庫官倉大使并糧道衙門庫大使巳經議給飯食及各驛丞均有職掌毋庸置議外其藩臬兩司首領官三員各府首領官共一十一員州縣佐二吏目典史巡檢大使等官共一百五十員除出逺差照例酌給盤費外每員議給養亷銀五十兩通共需銀八千二百兩相應仰懇聖恩每年即於存司充公鹽規內按數撥給歲底彚册送部核銷再查下江各道每年養亷銀三千兩鳯陽一道原定養亷僅二千兩該道轄屬甚廣且有管理關務重任未免不敷請照下江道員之例并懇聖慈一體增給以示鼓勵又安省出差同知通判歷來有全支養亷者亦有與署官各半均分者未經畫一臣等伏思出差之員在署既有家口在外復需盤費未便因其出差而翻減其養亷嗣後出差之員應請准其全支其署員一半即於各屬缺官養亷內補給臣等謹繕摺具奏是否有當伏祈皇上訓示施行謹奏朕觀此奏大約出於高其倬之私心淺見欲試行小惠之意鹽規收存司庫原以僃充公用利濟地方諸務則可議給佐雜等官則不可何也佐雜等官各省皆有鹽規銀兩或有或無今安省以之撥給養廉倘他省援例請給將撥何項以應斯舉斷難狥汝等猥鄙之願鳯陽一道地偏事簡薪水焉至不敷且未有因管關稅反增養廉之理是何意見朕殊不解汝等創開謬論以示恩邀譽若令傳播逺聞俾闔屬暨各省微員咸歸怨於朕高其倬試思於心安乎身名猶望保全乎從前張楷楊名時輩率因此等作用而致禍汝等巳知之矣至於出差之同知通判等員自不應分減養亷酌量辦理以敷其用為是安徽巡撫臣徐本謹奏為奏聞事竊照蕪湖鳯陽關稅一年期滿例應考核查蕪湖關每年原額應徵正稅銅斤等項共銀二十二萬七千六十五兩零今一年共徵銀四十一萬八千三百五十一兩零實贏餘銀一十四萬六千五百七十五兩鳯陽關原額正稅銅斤等項共銀九萬一百五十九兩零今一年共徵銀二十萬八千五百五十一兩零實贏餘銀一十一萬八千三百九十二兩以上兩關共贏餘銀二十六萬四千九百六十七兩臣查閲檔案自關歸巡撫之後屢年多有贏餘從未收至二十六萬有餘之數及細加查察竝無纍商情弊除將銀兩委員解部外所有收過兩關稅銀及贏餘數目理合奏聞伏祈皇上睿鑒謹奏贏餘如此而客商無纍實屬可嘉安徽巡撫臣徐本謹奏為安省安插土司另請撥給地畝以廣皇仁事竊照雲貴廣西等處不法土司安插內地仰䝉皇上深恩允准每十名撥給官房五間官地五十畝俾得存養勿致失所此誠千古未有之曠典臣查安慶城內共計安插廣西土司鄧朝宸趙殿烘貴州土司蕭來鳯等共二十一名照例應撥給官房十一間官地一百五畝查鄧朝宸等於雍正七年五月內到皖至九年十二月內始經撥給房地而地又坐落來安縣地方距安慶甚逺各土司不能自行耕作惟賴該縣知縣代徵糧食賣銀移交每年非被佃戶侵收即被胥役中飽有名無實以致各土司無以存活有賣兒鬻女者有情極潛逃者殊非仰體皇上矜恤安全之至意臣請將原撥來安縣地畝責令地方官確估賣價先於皖庫存公項下暫動銀兩在安慶附城地方按數買地撥給各土司令其自耕自食俟來安地價賣出歸還原款設有不敷准於公項開鎖庶各土司不致失所而聖恩浩蕩益令感戴靡既矣再查土司趙殿烘係上年七月內脫逃臣於抵任後移咨原籍查拏今於本年四月內巳准原籍獲解到安臣當將各土司嚴加約束不致生事合併陳明伏祈皇上批示遵行謹奏此件辦理甚是既經安插自應令其寬裕以遂生理將在皖買地暫動公項之處咨明該部可也安徽巡撫臣徐本謹奏為恭謝天恩事雍正十一年七月初十日臣齎摺家人旋皖接准內閣大學士臣鄂爾泰張廷玊字開雍正十一年六月十四日奉上諭朕覽徐本奏報各屬麥收分數而注云幾分幾釐甚覺可笑不知所謂幾釐者如何見之大凡奏報收成分數但當於約計之中恪遵據實之旨不以巳意增減便是正理今徐本幾釐之奏看來似屬詳核而於理不合於事涉虛若據實陳奏忠誠之臣必不如是從前有一無知妄人亦如此陳奏朕批諭切加訓飭今徐本第二人矣可謂愚而詐者也爾等可傳旨嚴行申飭欽此等因寄字到臣跪誦之下不勝惶恐之至伏思開報收成祗應約計分數臣照依各屬提命如此諄切不獨臣銘心刻骨即臣父徐潮九泉有知亦當銜結天恩於無既臣惟有振刷精神竭效誠悃以冀少酬皇上期望䇿勵之至意所有微臣感激下情謹具摺奏謝伏祈皇上睿鑒謹奏幾釐之奏猶屬小過朕諄諄訓誨者無非欲汝務實而不務虛之意耳安徽巡撫臣徐本謹奏為欽奉上諭事竊臣接准部咨各省書院仰䝉聖恩賜帑金一千兩令督撫商酌舉行并念士子羣聚讀書膏火不繼敕令預為籌畫其不足者在於存公銀內支用等因此誠皇上振興文教廣勵人材之至意臣遵即於司庫內提取帑金一千兩現在飭發安慶府置買高腴之地以為書院永遠膏火之資并刋立石碑恭紀曠典以為千古不朽之舉查安慶書院地方寬敞凡墻垣傾圯之處臣親詣查勘俱重加修整并於隙地添蓋房屋數十間以為士子誦讀之所一切器皿巳飭有司置僃其不足銀兩查安省各州縣向有不入奏銷亦不報部之學田一項係順治年間前任撫按諸臣捐置以為賑恤貧生之用共計成熟地三十五頃六十畝零每年額租稻一千七百石有竒額租銀三百四十八兩有竒額租麥豆一十五石因被劣生霸占烹分貧士不沾實惠於前撫臣魏廷珍任內據闔屬生員告發隨經停止賑恤數年以來銀稻租息雖名為分貯各州縣學而實則為教官胥役人等中飽臣自上年到任後察知其弊嚴檄分查已經徹底澄清將租稻賣價提貯安慶府庫除修理安慶學宫動用外實存銀七百五十兩零其未完之數尚未提齊臣查學田原為學校而設擬將此項額租除查明實在貧生仍准賑給外下剩之數悉解省城歸於書院之用可以不必再動存公銀兩其現今修葺房宇并置僃器皿等項亦有現貯府庫之項儘足支銷更可不必再動别項所有微臣辦理緣由相應奏明至於此次培植書院乃我皇上格外洪慈必得整躬勵行足為師範之人朝夕訓迪使逺近知所觀感臣令各府州密行查察甚難其選今據懷寧等學各生赴臣衙門禀稱有桐城縣丁憂回籍國子監司業胡宗緒文行兼優堪為一省矜式議往聘請等情臣思胡宗緒既為闔省推服則其人品學問必有可觀可否此時暫作書院師長俟其服闋仍令入都赴補并請皇上訓示遵行謹奏書院一事辦理允屬是當安徽巡撫臣徐本謹奏為敬陳拏獲積盜緣由仰祈睿鑒事竊照安省夀州地方濱臨淮河為江南豫省水路孔道往來商賈停泊河干每遭劫剠歷年以來一歲之中申報大盜十餘起至數十起不等臣密加查察訪有一夥積盜俱係沿河聚族而居撑駕小舟假以捕魚為業散布河濵久慣為匪商賈不敢夜行臣密諭廬鳯道李如蘭到彼訪拏該道隨雇覓客舟減從前往臨晚行至該州地方即遇一夥慣盜視為客商拉船欲劫經該道差役擒獲孟二一犯究出同夥為匪者二十餘人供明每遇客船停泊即便尾隨行劫共計劫過棉花船米船瓶罐船一共十餘案其餘搶竊之案尚多陸續拏獲平文早等一十三名并跟獲孫馬綽號騮花馬孫黑綽號無天地平小報綽號虎坐等三名其餘各盜現在密檄嚴拏臣查此輩久匿河干積慣行劫且有如此綽號實為水路大害當將各盜飭令臬司嚴審劫過各案確情追緝餘盜定擬具題竝分委附近佐二人員令廬鳯道督率前往沿河一帶將大小漁船取具連環互保編列號數嚴密稽查其孫平焦鄧等姓聚族而居者設立族正不時查舉如有違犯一體坐罪再令文武員辨輪流巡哨務期寧謐外所有拏獲夀州積盜緣由相應奏聞伏祈睿鑒謹奏嘉恱覽焉地方事務能如此悉心整飭朕於該省復何憂何慮緝捕盜賊最為第一要務而察詰匪類尤宜留心勉之安徽巡撫臣徐本謹奏為請旨事竊照各省設立先農壇竝正房配房田畝農具等項於雍正四年間經九卿議定令動正項錢糧建造置僃所用銀兩造冊報銷等因遵照在案今查安徽所屬因奉行之時俱係地方官捐資辦理竝不動支正項是以前撫臣魏廷珍以無庸報銷咨部嗣准工部咨駁魏廷珍又因從前捐置各官升遷事故十有八九無憑飭領等情咨覆兹於本年八月二十九日又接准工部咨開建設先農壇宇大典攸關各省皆遵原議今安慶一省竟聽各屬捐建與原議不符應咨該撫將用過銀兩實在確數詳細查明逐一僃造細冊具題到日再議等因臣思建立先農壇宇置買藉田乃我皇上敬天勤民重農務本之至意自應照九卿之議動用正項以昭千古未有之盛典從前安慶各屬捐資置僃原屬錯誤但臣細查此案事隔七八年原捐各官大半去任經手人役亦多回籍身故雖有捐銀數目而竝無高濶丈尺圍圓徑寸工料細數可查若不行造報則與各省定例不符若混行開造細數則事涉欺誑且查各屬壇宇多未堅固尚需修整更何敢朦混具題臣再四思維捐置固不可行細數亦難確切可否仰邀聖恩允臣將舊建壇宇等項照依現存工料逐一委員估計如原捐之官仍在安省者如數給還其巳經離任尚有虧項未清者准其歸補别項若病故巳久或回籍無人具領者存貯司庫以為修葺之用此臣之管見未敢冒昧具題為此繕摺具奏伏祈皇上俯賜訓示施行謹奏此係部駁事件僃將情由具文咨覆該部可也安徽巡撫臣徐本謹奏為紳士急公修城據情奏聞事竊照安省環山帶江地方險要惟賴城垣鞏固以資捍衛若稍有殘缺隨時粘補猶易為力倘坍塌過多則工繁費重修葺維艱今據東流縣詳報貢生汪廷偉等定逺縣詳報紳士單延祺等石埭縣詳報紳士章志升等婺源縣詳報紳士汪作楫等恭誦皇上奬勵善良之諭旨共相鼓舞情願出資捐修本邑城垣現在各縣捐銀千有餘兩及五六百兩不等各存公所次第興工等情臣復加體察竝無科斂情弊隨批令均聽紳士自行辦料募工地方官董理其事毋許胥役經手致滋擾纍在案以上四縣各紳士踴躍修城實出樂善之誠除俟工峻之日分别捐數多寡竝首善之人給扁奬勵以及捐數多者另行奏請議叙外所有紳士好義修城緣由先行奏聞伏祈皇上睿鑒施行謹奏據奏該紳士等實出樂善之誠竝無科斂情弊果若此乃地方美舉也工完時具題請旨安徽巡撫臣徐本謹奏為奏明事竊照桐城縣原任大學士臣張英原任刑部尚書臣姚文然均䝉皇上准入賢良祠內又於本籍賜祭一壇頒賜祭文遣官諭祭此誠皇上眷念碩輔之至意伏查外省諭祭向係藩司大員恭齎祭文前往宣讀亦有巡撫親往者臣查安省藩司駐劄江寧與桐城相隔千有餘里若另委别員恐致䙝越未足仰副盛典臣駐劄安慶距桐城僅一百二十里計程一日可到臣已照㑹藩司俟本家擇定日期臣即就近前往諭祭督撫出境例應奏報臣謹具摺奏聞伏祈皇上睿鑒施行謹奏巳有旨矣此舉汝其仰體朕意隆重禮儀以榮之大學士張廷玊體國弼政非他人可比朕但慮汝不及不慮汝之過也特諭安徽巡撫臣徐本謹奏為恭報雨雪事竊照三冬雨雪攸關來歲收成例應奏報今查臣屬安徽寧池太廬鳯廣六泗潁等十一府州所屬申報於十一月初五初十十二十三十霑足與麥根大有滋益其滁和亳三州屬緣路逺尚未報到所有安省巳得雨雪緣由相應奏聞伏祈皇上睿鑒謹奏覽安徽巡撫臣徐本謹奏為請設塘船以資巡緝以救飄溺事竊照長江一帶江濶水溜兩岸俱屬蘆洲人烟稀少素為盜賊出沒之所是以昔年添設遊兵等營於夾口磯頭安定塘汛撥兵防守之外又置僃塘船一項以資巡緝蓋賊船往來皆於隔岸潛行逺避塘汛若無塘船則無從盤詰追拏且長江風浪不時客船每多遭風失水倘有塘船一聞沈溺即可赴援是塘船之設不特有關緝盜亦可撈救生命臣自江寧秋審旋皖一路留心查察非係破爛不堪即屬全無船隻臣又差員自安慶至江西接壤各汛確查均與臣所見無異及細詢營員僉稱此船向係地方官捐僃有名無實所以日久廢弛臣思塘船既關如此緊要亟應確估興修請於存司公用銀內動支銀兩按其汛地之衝僻分别應添應修即令地方官㑹同營員料理實於弭盜救生大有禆益再查塘船原定式樣約長一丈七八尺濶五六尺每隻新造約計二十兩修艌不過數金沿江共一百十七汛應添者十居其六七應修者十居其二三大汛應設二隻小汛應設一隻所用銀兩俟工竣之日照例彚冊年底咨部查核仍著落地方官不時修葺造冊交代以為永久之計是否有當伏祈皇上訓示施行謹奏塘船之設甚為有益應如是辦理安徽巡撫臣徐本謹奏為恭報冬雪事竊照今年十一月初五初十十二十三十四十七等日安徽寧池太廬鳯廣六泗潁等府州所屬連得雨雪經臣具摺奏聞至滁和亳三州先因路逺尚未報到嗣據滁州所屬申報十一月初十日得雪二三寸不等又據和州所屬申報十一月初十日得雪二寸十五日得雪五寸又據亳州所屬申報十一月初九日得雪四五寸不等所有滁和亳三州續報得雪緣由相應奏聞伏祈皇上睿鑒謹奏深慰朕念安徽巡撫臣徐本謹奏為恭謝天恩仰祈睿鑒事竊臣一介微末世受國恩荷䝉皇上不次拔擢由學政洊歷藩臬升任巡撫又䝉聖諭頻頒諄切教誨俾臣有所遵循以盡職守臣夙夜冰兢撫躬自勵未有涓埃之報惟深隕越之懼今於雍正十一年十二月三十日接到部文奉旨補授臣為都察院左都御史聞命之下感悚倍至伏念左都御史一官實風紀之攸司為科道之表率臣以菲材膺兹巨任惟有恪遵聖訓益自黽勉以仰報髙厚於萬一臣查安徽巡撫升任後向有將印信交總督帶理者亦有俟新任交代者第總督駐劄江寧相距安慶七百餘里送印前往每致公務稽延臣從地方起見仍暫行辦理一切公務計新撫臣王紘由浙至安諒不甚遲臣俟新撫臣到任交代即日就道除交印起程日期另疏題報外所有微臣感激愚誠合先具摺奏謝仰祈睿鑒謹奏俟新撫臣到任交代後起程就道甚是卿安徽一任毫無不及之處因在廷漢大臣乏人不得巳召卿內用知之安徽巡撫今升都察院左都御史臣徐本謹奏為恭報微臣欽奉諭旨竝交印赴浙緣由仰祈睿鑒事雍正十二年二月二十二日准大學士臣卾爾泰寄信內開雍正十二年二月初六日據浙江總督程元章摺奏江山縣匪類王益善等一案請欽簡大臣赴浙㑹審等因奉旨著左都御史徐本即由安慶前赴浙江㑹同程元章嚴審定擬具奏欽此相應遵旨寄信前來奉到諭旨可即密行前往不必聲揚恐致未獲之匪類聞風逺揚特字等因到臣臣查此等緊要事件必須密速辦理據布政使李蘭禀報新任撫臣王紘於二月初十日已抵江寧省城又據標下中軍王珽禀稱二十日巳至太平府所屬之蕪湖縣臣隨將任內經手事件查核清楚於二月二十五日將欽頒巡撫關防蕪鳯二關監督關防王命旗牌等項委中軍參將王珽安慶府知府范璨恭齎交送新撫臣王紘舟次臣即於是日由旱路星馳赴浙㑹審除交印日期遵例題報外所有微臣欽奉諭旨竝赴浙緣由相應具摺奏聞謹奏匪類之貽害生民最酷審理此等案件務宜盡力窮究不可先存將就速結之念若妄將化大為小以免株纍無辜之鄙論奉為指南則大誤矣克詳克慎勉為之工部尚書臣徐本謹奏為恭謝天恩仰祈睿鑒事竊臣樗散凡材仰䝉皇上深恩教誨成全由學政擢至巡撫夙夜兢兢愧無報稱雍正十一年十二月又䝉特旨授臣為左都御史嗣因奉差赴浙尚未入都兹於雍正十二年四月十八日准浙江督臣程元章鈔録部咨知㑹到臣復䝉聖恩升臣為工部尚書伏念冬官職司邦土忝列六卿責任愈重聖訓奉為章程竭臣葵赤之誠仰報至優至渥之洪慈於萬一而已所有微臣感激下悃謹具摺恭謝伏祈皇上睿鑒臣謹奏覽卿奏謝矣工部尚書臣徐本浙江總督臣程元章謹奏為奏聞事竊照江山縣匪類王益善等一案臣徐本奉旨赴浙審理於三月初九日抵杭其時因在江西拏獲之黃森官等未據解到隨一面差員前往咨提一面將在浙各犯先行提訊據詹子彬供稱劄付係向文陽王吳士榮領來是督兵大元帥徐敏也有劄付是提調天下兵馬大元帥原係希圖騙人財物揑稱天下將亂領此劄付便可保守身家兼得做官因照吳士榮所給劄式刋刻劄板與祝芳升合夥四處煽誘賣與王益善張齊雲周德黃雄黃邦竒周仕興王昌宇周燦周統錫管璉陳明章周廷鳯祝芳升及已故之吳元德鄢國嵋各劄付一張等語起出劄付劄板及提各犯質訊無異嗣於四月初六初七等日准江西撫臣由江南先解到首犯黃森官等一十五名臣等復加察審初猶狡供逮至嚴加夾訊竝將盟布令其自行閲看始供原因開店折本無可營生遂於雍正十年三月內與傅秀山商量在江西省城創造齊堂設立三皇聖祖教即圓敦大乘教又白陽㑹等名目煽惑愚民而森官之父黃廷臣則自稱為天老爺又稱黃太師森官則為彌勒佛紫薇星不但入教男婦皆奉為教主即伊胞叔亦甘心下拜其後附和者衆森官則居然以紫薇星自居遂與黃雨珍熊簪舉周簪鳯結為生死之交因而狂悖之語形於盟布之內不軌情形已屬顯然惟散給劄付之處堅供止有堂簿竝未造劄若果有僞造情弊盟布經書已經搜獲劄板安能隱藏再提吳士榮研審據稱係伊自造劄付誆騙詹子彬徐敏恐其不信故自稱為文陽王等語但黃森官父子設立齊堂創議起自傅秀山而各犯又曽供傅秀山為軍師是造劄實情必得傅秀山到案質訊始成信讞今於四月二十日准江西撫臣謝旻咨報傅秀山一犯分差查拏業在福建地方拏獲臣等現在咨提應俟提到傅秀山與各犯質對至封禁山聚有夥黨之處夾訊黃森官雖供竝無同夥復令前在衢州府供有千把人之祝升芳質對則稱得之詹子彬而詹子彬又稱吳士榮所說及提吳士榮究訊復稱庚子年間聞鉛山地方有強盜說過是封禁山所以借此哄人等語惟是封禁山地連江閩周圍遼濶封禁日久易致藏姦臣程元章巳經㑹同江閩督撫委官前往山內嚴密搜查尚未回報而四月十一日又據江山縣呈報准玉山縣關稱訊據獲犯曹小胡供稱封禁山內有箇齊陽王在裏頭姓齊等語更非無因臣等現在提訊尚未解浙總之臣等仰䝉聖恩諄切訓誨務期徹底究明絶其根株斷不敢少有草率以致貽害地方除現在行提江西應質要犯一十五名俟解到之日再加確審按律定擬另行奏報外所有微臣抵浙後初審供情及尚在提犯究擬情由理合先行奏聞伏祈皇上睿鑒臣等謹奏覽奏巳悉殫精研審絲毫母涉疏縱工部尚書臣徐本謹奏為恭報浙省春收情形仰祈睿鑒事竊照浙省菜麥今歲布種甚廣臣從江南赴杭一路查看郊野之間極其茂盛今抵杭月餘雨水亦復調勻訪之鄉人咸稱菜麥目下漸次登場俱有十分收成閭閻甚是欣慶至杭嘉湖等府因入夏以後天氣微寒蠶收未免少減相應一併奏聞伏祈皇上睿鑒臣謹奏覽浙省菜麥豐收情形深為可慶但目下都中缺雨殊甚朕是用晨夕憂懷莫置也硃批諭旨卷一百四十四
