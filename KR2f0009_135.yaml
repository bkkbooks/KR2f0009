body:
  text: 欽定四庫全書硃批諭旨卷一百三十五硃批孔育璞奏摺雍正五年九月十七日浙江布政使臣孔育璞謹奏為錢糧重任恭請聖訓指示仰祈恩賜摺奏事竊臣由揚州府知府荷蒙皇上洪恩特授蘇松太道在任未滿一年遵旨赴部引見雍正五年二月二十八日獲覲天顔三月初一日復聆聖訓欽承面諭近來藩臬兩司皆賜摺奏臣跪聽天語回任以來益思勉竭駑鈍仰報髙深兹荷聖主格外隆恩畀以浙藩重任聞命之下感切淪肌伏念布政司一官有旬宣責任凡地方行止事宜均須籌畫而錢糧出入尤當慎重臣於本年七月十九日抵任隨準升司臣許容將一切正雜錢糧支放起存數目移送前來現在逐一清查核算循例具詳聽候撫臣盤察具題外但臣稟質愚蒙見事遲鈍非仰藉聖明指示竊恐措置失宜況浙藩錢糧頭緒甚多政務紛繁責任綦重緣曾蒙聖諭藩臬皆賜摺奏用敢瀆請仰懇聖恩賜臣一例用摺則十一府屬中凡遇緩急重輕之事皆得預請聖訓仰體祗遵臣實叨荷生成於無既矣荷蒙俞允則臣摺從何上逹之處伏乞皇上批示遵行此摺未敢専人齎進敬謹封固附撫臣李衛代為轉奏臣不勝悚惕之至謹奏朕因甘肅撫臣莽鵠立軟懦不能綽然稱職而藩司又不得其人所以將汝調任汝到彼盡心協助竭力勉為之如有摺奏事件遣人齎至大學士張廷玉處交伊轉奏可也雍正五年十一月十九日調補陜西甘肅布政使臣孔育璞謹奏為叩謝天恩恭繳硃批諭旨事竊臣仰荷聖恩畀以浙藩重任因曾蒙皇上面諭近來藩臬兩司皆賜摺奏臣不揣冒昧瀆懇一體賜臣用摺於九月十七日封交撫臣李衛代為轉奏續奉特旨調臣甘肅布政使聞命之下隨將任內經手一切錢糧事務交清署布政司糧儲道蔡仕􅘎接收訖定於十一月初六日離浙赴任於十一月初二日接到撫臣李衛轉交原封前摺到臣欽奉硃批諭旨臣跪讀之下感懼交并伏念微臣毫無知識乃蒙聖主格外超用復量移巖疆勉以振刷並恩許摺奏指示交進之處臣敢不益矢冰兢竭盡駑駘履任之後如有地方緊要事宜自當遵旨具摺密奏第恩深任重圖報為難用敢再懇聖慈特賜訓示庶得勉力遵循不致隕越謹此繕摺奏謝所有奉到硃批諭旨理合恭繳謹奏覽目今西藏有師行之役一切備辦軍需糧餉各務協同督撫勉力經營毋怠雍正六年二月二十七日陜西甘肅布政使臣孔育璞謹奏為據實奏明事竊臣荷蒙聖恩調任甘肅布政使於雍正六年正月十六日到蘭抵任呈請撫臣莽鵠立代為恭謝天恩在案臣查司庫錢糧頭緒紛繁款項混淆歷任交代內有借支未清銀六百七十餘萬兩其中或因借支動用未奉部撥還欵者或因原係應給兵餉先行放給而鎮營各官未造正支册領送督撫挂發者或因承辦軍需浮冒開銷核減未定者或因墊放借支陸續扣還歸欵者臣現在按欵稽查實心辦理總期國帑有著絲毫不容隱漏倘有透冒虧空情弊臣當據實詳報督撫兩臣會疏題參究追完補臣查江浙兩省徴收錢糧耗羡一項有加一者亦有不及加一者臣尚以為重當量為規每兩二分五釐以為養亷亦經前撫臣石文焯奏明在案惟各省協餉原無平規而解到餉銀內間有多餘者臣思解來餘銀並無退還之例亦不便侵肥入已所以另設一匱於放餉之時照依部平彈兌將多餘之銀收貯匱內按數登入堂簿於每年年終將多餘之數據實奏報歸公其州縣額徴地丁起解司庫約計一十八萬餘兩若所屬徴解全完應有平規四千餘兩又支放驛站俸工銀兩每百兩歷任有扣平頭銀一兩至三兩不等又有西寧稅規一千一百兩又解司雜稅銀兩每兩亦有平規二分五釐臣查驛站俸工錢糧乃皇上額給之欵豈容絲毫扣剋而稅銀一項理應儘收儘解若有贏餘儘數歸公充餉矧此項稅銀屢蒙聖主諄諄告誡寬其已往之咎開豫自新之路令經手各官據實首報臣身任表率若復隱匿收受稅規以及解稅平規何以使屬吏仰遵據實首報且臣衙門既有州縣錢糧平規四千餘兩儘堪養亷如有多餘尚可充作地方公用豈可通同匿稅扣剋短給是以臣到任之後支放驛餉俸工俱照部平實發並無絲毫扣剋相沿稅規以及解稅平規立即屏絶臣不敢欺朦謹據實奏聞伏乞聖主睿鑒謹奏分內應得者亦無庸矯亷致令後人棘手殊非善舉於此等處必將所入所出周詳計算深知灼見後方立主見毋逞一時髙興鋭意裁革至將來展轉維艱復行收取及或巧設他法科斂則反成虎頭蛇尾矣凡事不可急驟速於求好惟宜徐徐勉力為之同日又奏為恭謝天恩事竊臣前在江南揚州府知府任內失察原任霸昌道卞之錀之子卞兆濤等家口在揚居住一案部議照例革職荷蒙諭旨孔育璞白鍾山吕大雲王嵩俱從寬降三級留任張有觀照議革職俟交代清楚後令該督撫出具考語送部引見餘依議欽此經甘肅撫臣莽鵠立準吏部咨知照到臣臣跪讀聖旨感激涕零伏念臣本庸愚身任地方因稽察不周致使旗人潛住臣咎奚辭乃荷天恩格外優容不加罷斥自此以往惟有益矢冰兢竭盡駑駘以圖仰報隆恩於萬一而巳為此恭摺奏謝謹奏經歷斯等事後誠能愧悔日前之非可保將來永不罹斯等參處矣過而不改乃為下愚不移切記切記似此吏議彰著案件固不待言舉凡從前所行所為但有不慊於心者俱能一一省察克責求合乎是則向後何至大違繩墨耶同日又奏為恭繳硃批諭旨事竊臣前奏叩謝天恩并繳硃批諭旨一摺荷蒙皇上硃批目今西藏有師行之役一切備辦軍需料理錢糧各務協同督撫勉力經營毋怠欽此臣初至甘肅未諳軍需事務然不敢不殫心料理以期無誤除事件有應聽督撫二臣調度者自聽督撫行檄調度有應斟酌詳請者悉皆詳請督撫二臣指示遵行至臣職司錢糧一出一入固不敢茍且因循而一舉一動亦不敢違越矩度惟有竭盡丹誠勉圖實效以仰報聖主天恩於永永無極耳所有奉到硃批諭旨理合恭繳謹奏果如所奏甚好殫心勉力以期無忝厥職可也雍正六年六月二十一日陜西甘肅布政使臣孔育璞謹奏為據實奏明事竊查甘肅撫臣衙門養亷有茶規一萬一千九百兩向係茶商於年終時繳臣衙門查收轉解撫臣收用按月分算每月約計幾及千金今年三月內撫臣莽鵠立以日用不給向臣借支銀兩即以此項為抵續因奉旨命撫臣前赴西寧料理軍需盤費無出又以為言臣思撫臣養亷在臣衙門支取者只有此項既以為抵自難執定不借隨量其每月應得之數預為通融前後共借過銀五千兩在於庫貯雜項銀內動給俟繳到茶規之日即行歸欵臣謹據實奏明謹奏不於斯等處迎合更將何事以取媚上司耶但所慮者其間或值莽鵠立升遷降革爾又離任卸事無項墊補致成虧空纍及身家性命之時非此奏明一摺可能幸免也同日又奏為請旨揀選廕胄以備邉省實用事竊聞致治之本在於親民親民之官首重牧令臣伏見我皇上宵旰憂勤勵精圖治慎選才良以備牧民之用命往各省試用補授亦已多員自科甲以致捐途教職生監三考佐雜卓異保薦以及多年廢員皆蒙特恩簡拔格外録用臣一介小臣何敢妄有陳奏但邉地情形久在聖主睿鑒之中撫循綏理不同腹裏臣不揣固陋妄謂大臣子弟由廕生候補者不乏其人或以京職候補不能得缺或止在籍安居不即謁選夫以單寒新進尚爾效力邉方矧屬大臣廕胄世受國恩更宜使之效力邉地以圖報稱查廕生一項有補員外郎及卿寺小京官并同知通判等職者在同知通判等官用者固宜外任而以員外郎卿寺小京官用者亦可改補外任令其習練民事若以原銜借補州縣試用限以三年之內循分稱職者實授州縣準其照銜食俸再任五年供職無過準其照所帶之銜升用內如催科得法撫字無慚有守有為治行卓越者試用三年滿日即為薦舉以本省緊要缺題請升用其有倚恃父兄情性乖張或辦事無能不勝州縣之任及貪酷敗檢科𣲖厲民者分别參劾如此則廕胄咸知自奮邊陲可收得人之效矣倘蒙俞允仰祈敕部確查八旗及各省未出仕廕生共計若干員行文旗籍調取引見分發甘省之外再撥雲貴川廣等省使之乘時出力效用以仰報皇上豢養深恩其於地方民生不無小補也臣謹繕摺陳奏伏乞睿鑒施行謹奏聾瞽之説朕實難批諭同日又奏為恭繳硃批諭旨事竊臣前奏恭繳硃批一摺奉聖主硃批果如所奏甚好殫心勉力以期無忝厥職可也欽此除軍需事件悉皆辦理竣事現在定限飛催分辦各員將用過錢糧造册聽候督撫二臣奏報外所有奉到硃批諭旨理合恭繳謹奏觀爾惟恃迎合取媚以圖容身保位大有辜負任用光景嗣後若稍涉舞智弄巧不肯致身效力無欺無隱將來身名俱敗何嗟及矣勉之慎之雍正六年九月十九日陜西甘肅布政使臣孔育璞謹奏為恭繳硃批諭旨事雍正六年八月十五日臣家人齎回臣奏明西藏用兵軍需事件悉皆辦理竣事并繳硃批一摺奉聖主硃批觀爾惟恃迎合取媚以圖容身保位大有辜負任用光景嗣後若稍涉舞智弄巧不肯致身效力無欺無隱將來身名俱敗何嗟及矣勉之慎之欽此臣跪讀之下感悚交集伏查臣辦理一切軍需皆在蘭州行檄調度至預備出口騾頭餧養諸事皆係西寧道府諸員在彼辦理三月內復奉上諭著撫臣莽鵠立就近赴西寧料理軍需撫臣臨行囑臣將沿途經由牽騾事務照料妥當其西寧之事我自料理無誤臣謂彼地已有撫臣料理又有督臣委官在彼可以無誤不謂乃有不給料草奔逸騾頭諸事逮撫臣回蘭臣曾面問撫臣云西寧諸事我已一一料理據實奏明你可放心臣愚以為西寧之事撫臣巳經奏明不便更有所議是以止將平番碾伯之玩誤揭報未將西寧道府並揭因致督臣嶽鍾琪有徇庇之參劾也猥蒙聖慈復從寬宥今責臣惟恃迎合取媚似有大負我聖主不次超擢之殊恩此則實非微臣之所敢出也臣思用巧者無不成拙施於家庭猶且不可矧於君父之前而敢肆其姦巧以自取身名之不保乎臣之功名為我聖主所授臣之身命猶望聖主矜全至於致身效力無欺無隱聖主之勉朂微臣者在斯微臣之圖報者亦在斯也犬馬尚知報主微臣寧獨無心鞠躬盡瘁臣之分也區區微誠伏祈睿鑒所有奉到硃批諭旨理合恭繳謹奏慎之又慎庶或保全超擢之恩不在此數句巧辭曲辨也雍正七年六月十六日陜西甘肅布政使臣孔育璞謹奏為恭謝天恩事竊查雍正六年甘省地丁正雜錢糧奉户部全數撥充本年營驛官兵餉需錢糧現在催徴嵗額難以全完不獨甘省為然而營驛餉需又係季前預發計口授食各省亦然此皆不得不為墊應之項非得已也彼時臣之不即請題撥補者蓋慮甘省百姓疲頑一聞改撥必不肯上緊完納則逋負愈多且嵗額完欠未定不敢冒昧遽請因思兵餉原為應給之項現欵不足遲早可以題撥歸補此臣愚昧之見也逮至嵗底清查截數不敢復踵三四五年前司鍾保等之不請撥補致使錢糧混淆又以撥補餉需係應督撫題請之事所以詳請撫臣許容督臣嶽鍾琪會核具題請撥在案六月內奉撫臣許容諭知藩庫那墊兵餉我已具摺請旨勒限催徴奉有硃批諭旨將所奉硃批傳示臣知臣即叩頭謝恩伏讀再三感激涕零伏思以本年必不能全完之錢糧撥充當年必不可緩之餉需在臣實有不得已之情但既不預期詳咨又不具摺奏聞臣之自誤一至於此臣何敢辨但邉民窮苦嵗額不能全完自是實情除撫臣許容奏後各屬又完解臣庫銀一萬七千餘兩并除已參各州縣虧空及蠲災銀一千四百餘兩尚未完銀四萬八千九百餘兩臣惟有仰遵聖旨速催徴補以清墊項外仰祈皇上矜臣之愚昧察事之不得已恩施格外臣之幸也所有臣奉到撫臣許容傳旨祗遵緣由理合繕摺恭謝天恩謹奏天下未有如此不得已欺隱之情國家亦未有格外施恩於巧詐官吏之理假使於初奉部文時當即奏聞朕不豫以矜察則誠為不體下情之主也若言因甘肅百姓疲頑一聞改撥必不肯上緊完納云云試思密詳密奏欠户何由而得知耶似此巧詐不實愈辨愈顯矣應作何催徴歸欵與撫臣許容酌商辦理此非密市私恩遂可完結之事同日又奏為恭繳硃批諭旨事竊臣家人齎回臣恭繳硃批一摺奉聖主硃批慎之又慎庶幾保全超擢之恩不在此數句巧辭曲辨也欽此臣跪讀之下惟有銘鏤肺腑感戴天恩無欺無隱以仰副我皇上諄諄朂勉之恩旨而已所有奉到硃批諭旨理合恭繳謹奏下愚不移與否在汝自為銘鏤肺腑與否亦在汝自省也雍正七年十月十五日陜西甘肅布政使臣孔育璞謹奏為敬陳下悃仰祈睿鑒事竊查凖噶爾之噶爾丹䇿零踵父逆惡悖法負心蒙我皇上俯允廷議命將出師以彰天討諒此小醜計日可平臣於雍正六年七月內即奉川陜總督今特授寧逺大將軍臣嶽鍾琪委同涼莊道今委户部噶蘭大殷邦翰四川遵義府知府今補陜西驛傳道趙挺元在蘭設立檔子房公同預辦軍需事宜臣等仰遵聖主不纍官民之諭旨已將一切應備物件俱殫心料理照依時估計算分發所屬辦理製備在案而大將軍臣嶽鍾琪已於雍正七年六月二十日至蘭駐劄考核辦過軍需事務并令將動用各項錢糧製備過料草什物等項分析條件先造簡明册入奏其時星夜辦理造送而大將軍以出口之期將屆甘涼肅三處尚須駐劄數日查考一切應用軍需遂於七月初十日自蘭起程前往面諭臣同趙挺元在蘭辦理催趲未竣軍需其前途解送軍裝及裝運米糧炒麵駝隻兵車俱令户部噶蘭大殷邦翰隨同料理逮至閏七月初二日臣奉大將軍臣嶽鍾琪以西安置辦裝運米麵之布口袋未到及甘省之毛麻口袋以及駝隻兵車應需駕鞲裝帶一切物件皆缺少未齊而趕駝夫役亦未雇備必致誤事遂行調臣前抵涼州辦理至在蘭恐有應發軍需銀兩等事並蒙檄令兌出軍需銀五萬兩委令甘肅按察使李世倬同驛傳道趙挺元辦理臣隨於閏七月初三日起程沿途即稽察趕送各項軍裝及兵車毛麻口袋等物件皆遄行無誤惟因驛站地方褊小之區雇車不出致多擁擠堆貯而駝夫一項原皆分行所屬雇備隨後發解銀兩本無稽誤祇緣軍需文卷紛繁俱貯檔子房在户部噶蘭大殷邦翰豈能攜帶前往是以每有查問之事殷邦翰不能隨事登答所以調臣在涼承辦臣於閏七月初七日到涼辦事於九月二十二日回署臣查今嵗軍需事已無誤惟明春尚有糧車裝運米麵及帶解農具什物并駝隻馬匹牽拉馱載暨押運文武員辨出口諸務在大將軍雖將明春正二月應辦之事俱交撫臣許容會同湖北撫臣馬會伯就近督催料理奏明在案但軍需一切事件皆臣經手辦理甘肅撫臣許容則以有湖北撫臣馬會伯為辦理西路軍需之員諸事未免推諉而馬會伯實則不諳軍需事多拘牽全無決斷臣恐二臣於一切軍需徒多批駁遲疑毫無裨益且自蘭至肅往返幾及三千里若遇事仍行微臣查覆方行則緊要事件必多貽誤臣蒙皇上特恩調補甘肅藩司料理軍需乃臣職分臣願往甘涼一帶地方就近與湖北撫臣馬會伯商酌辦理以期無誤伏祈聖鑒允臣所請前往辦理軍需但臣既辦軍需則藩司錢榖事務不能兼顧敢請我皇上敕於司道內㨂選代理準臣仍帶藩司印信於雍正八年正月內即往甘涼一帶辦理其各屬軍需奏銷册有同臣辦理軍需之驛傳道趙挺元人甚老成堪以查核俟臣事竣再為確核奏銷庶盡臣心而安臣分臣不敢不殫厥心思以圖報效也臣曷勝惶悚待命之至謹奏此奏甚屬可嘉有旨諭部矣軍需事重極當殫心竭力者倘稍有遲誤汝等身家性命關係勉為之慎為之同日又奏為恭繳硃批諭旨事雍正七年閏七月二十二日臣家人齎到臣回奏墊放雍正六年兵餉一摺欽奉硃批訓飭并命臣與撫臣許容酌商辦理欽此欽遵微臣咎戾巳在聖鑒之中臣固不敢巧辭曲辨但撫臣許容巳將此件具題奉部議覆查取擅行那移之各布政使題參則臣更不能與許容商酌辦理矣獨是臣下有不得巳之情原許陳奏於聖主之前臣不敢不奏非敢再為巧辨也臣查雍正六年甘省地丁正雜起運銀兩全撥本年兵餉臣不將民不能完情由奏明改撥臣咎奚辭然以那移而論咎不在臣臣於雍正六年正月十六日到任本年春季兵餉例於季首關支而户部奏準預撥銀三十萬兩未經撥到彼時署布政使事革職按察使李元英巳那庫貯銀兩發給兵餉訖臣任內所發乃夏秋冬三季兵餉皆外省協解及本省徴解起運銀內正收正支臣於改撥詳內只將三四五六等年兵餉借墊未清請題撥補以清年欵其六年墊放銀兩臣原不曾分析何季為墊項何季為正支今部查那移之員則臣之於雍正六年三季兵餉全係外解協餉於本省地丁皆有收放月報册造送督撫二臣衙門可稽而李元英之借放兵餉於清查司庫交代錢糧事案內經臣詳請前撫臣莽鵠立題報有案至於從前各布政使那墊三年餉銀則係布政使彭振翼署司陸賜書四年則係布政使鍾保五年則係鍾保及署司李元英六年墊放春餉亦係李元英但據鍾保移覆伊任內曽將雍正三四年地丁正雜全撥兵餉彭振翼陸賜書鍾保皆有墊項雍正五年復又全撥難免那墊詳請前撫臣石文焯以地丁嵗內難完題請改撥將雍正五年兵餉另行改撥六萬兩并請嗣後本省銀兩乞撥七留三經户部議覆以雍正五年正月內臣部摺奏甘肅係邉逺省分循照雲南貴州四川三省之例每年預撥銀三十萬兩以充下年兵餉摺奏奉旨準行欽遵知照在案應將改撥及撥七留三之處毋庸議則鍾保原請改撥有案而從前那墊民欠之彭振翼陸賜書鍾保均未加以處分前案足稽也臣之請撥實為清理錢糧起見但撫臣已經具題則應聽於題案內完結惟是臣遭逢聖主拔擢至此不得不將此下情瀝陳於皇上之前自認不預先奏明之罪實非敢巧為支飾也臣現將此案備悉敘明通詳請題伏祈聖慈垂鑒施行所有奉到硃批諭旨一并恭繳謹奏朕用人行政惟一主於大公果自問無疵斷無橫被寃抑之理若反身有愧縱極巧辭支飾亦不能幸免也試看自知雍正八年三月二十日署甘肅布政使協辦軍需臣孔育璞謹奏為敬陳辦過軍需事宜仰祈聖慈睿鑒事竊臣一介庸愚過愆頻仍荷蒙天恩格外矜全著臣來京另有用處又以葛森現辦噶斯軍需復令臣署理司既奉另用之聖旨復沛署事之殊恩小臣何幸恭逢異數嗣又接到户部照會欽奉上諭因臣願往甘涼一帶地方就近與湖北撫臣馬會伯等辦理軍需允臣所請帶布政使印信前往甘涼地方協同許容馬會伯悉心辦理務期和衷共濟裨益軍務其甘肅布政使事務著許容揀選賢員奏聞署理欽遵轉行到臣伏念臣自到任辦理軍需兩載以來見寧逺大將軍臣嶽鍾琪持躬敬慎待屬嚴明凡辦事件必條議欵項奏請聖主允準方始令臣辦理是以無事不有成規臣得有所遵循或間有未明者必具詳稟請示明白如有舛錯可以隨事更正無誤初非愚臣之自能熟諳也惟是大將軍臣嶽鍾琪慎重國帑諸凡惟恐糜費錢糧皆從省便處辦理我皇上軫恤官民不惜多費皆令從寬裕處辦理因大將軍領兵出口慮督撫諸臣彼此猜疑推卸是以特簡兵部尚書臣查弼納户部侍郎臣常德夀原任巡撫臣常賚前至甘肅稽察軍需又𣲖出户刑二部賢能司官滿漢各三員隨往任使諸臣仰體聖懷無事不從寬裕處辦理其所以裨益軍務者無窮今七千輛糧車已全數出口臣謹將辦過事宜另摺分析備陳於聖主之前為此繕摺奏聞伏乞睿鑒謹奏將所奏辦過事宜原摺發交該部録存俟查弼納等題奏到日查明有旨同日又奏為恭繳硃批諭旨事竊臣家人齎回臣請往甘涼一帶地方就近與湖北撫臣馬會伯商酌辦理軍需一摺欽奉硃批諭旨臣跪讀之下仰見我皇上俯鑒微忱奬勉兼施臣自顧何人遭逢異數臣雖愚昧敢不和衷共濟竭力報效以副聖懷今糧車七千輛已於三月二十日全數裝運出口照寧逺大將軍臣嶽鍾琪所定程途計四十日可抵軍營其駱駝約計六千隻亦照大將軍檄行分為三四兩月出口至甘涼寧西所辦羊隻俱於三月內各從該地方起程其甘涼寧三處羊隻由肅州出口西寧則從本處出口由赤金湖花海子直送軍營至口外郭壁應餧羊料豆已經部臣查弼納等行令趙挺元詳撥臣現在催令挽運至肅雇車轉運臣俟料理四月馱送糧麵之駝隻出口則軍需已竣臣於五月底六月初旬可回蘭州矣惟是臣有下情不得不預為奏明以求睿鑒者臣前奉上諭俟葛森到任之日孔育璞來京另有用處欽遵在案今噶斯軍需正當辦理葛森未能到任而臣先以請往甘涼等處辦理軍需奉聖恩允臣帶印前往辦理其甘肅布政使事務著撫臣許容揀選賢員奏聞署理經撫臣許容奏委陜西驛傳道趙挺元署理臣於起程之日即報離任因趙挺元未曽到蘭隨將臣任內經手錢糧先造簡明清册交與按察使李世倬轉交其細欵册籍亦已造齊現在核算交代已無不清臣回蘭之後自應専心料理進剿凖噶爾一案軍需銷算册籍恐撫臣令臣仍行接署與葛森交代而甘肅布政使事務殷繁臣自正月初四日起程至回蘭時計將半載以隔手日久之員重理繁劇之事勢必過愆頻仍竊恐有負我皇上特賜矜全之德意況此案軍需甘省用銀已至三百八十餘萬兩臣應悉心清算造册詳請奏銷以免浮冒舛謬之弊奈頭緒紛紜清釐非易以臣駑鈍只可料理銷算難以仍任藩司事務貽誤政事愈增愆尤也仰懇皇上隆恩俯允降旨將甘肅布政使印信諭交趙挺元俾與葛森交代免臣再為接署并令趙挺元督責經手經承與臣料理銷算軍需錢糧俟册籍造就仍交趙挺元用布政司印分呈核奏以全始終同辦軍需之誼庶軍需奏銷早竣而臣亦來京有日矣臣謹恭繳硃批諭旨理合一并奏請曷勝悚惶激切待命之至謹奏此奏業交廷臣議覆今將所議發來汝看司事不必接署已照請行印篆暫勿交出恐無印則呼應不靈也廷議是同日又奏為恭繳硃批諭旨事雍正七年十二月十三日臣家人齎回臣恭繳硃批諭旨回奏墊放雍正六年兵餉撫臣許容已經具題臣惟有自認不預先奏明一摺奉皇上硃批朕用人行政一主於大公果自問無疵斷無橫被寃抑之理若反身有愧縱極巧辭支飾亦不能硃批諭旨理合恭繳謹奏覽雍正九年四月初九日都察院左副都御史辦理軍需臣孔育璞謹奏為奏明照前辦理軍需以専職守事竊臣自蒙聖恩允臣辦理軍需以來惟有黽勉辦公並無寸長裨益感蒙聖慈將臣擢置卿班仍著在肅州辦理軍需業經另疏奏謝外伏念臣辦理軍需原為承上接下之總滙凡奉行事件有未明晰者則通詳請示而行有奉行查議者則量其事之輕重細加參酌如事理已經明晰無有疑議者則隨時即覆如事未允當須廣集衆思者即行道府確議俱令刻期詳覆務求允協而無遲滯固不敢因循怠玩也今臣叨荷特擢仍駐肅州辦理軍需舉凡應行應議及應請示商酌事件仍照從前辦理不敢以奉旨優升之故偷安諉缷貽誤公事至應行具奏請旨及應咨部備查事件仍聽督臣查郎阿撫臣許容酌定題咨臣未奉聖旨不敢越俎干預臣謹據實奏明庶事有専任而無岐誤矣伏祈睿鑒謹奏若感目今超擢之恩及思將來功名事業之不可量豈但仍照從前辦理而已當倍加黽勉不遺餘力方為善能循分盡職同日又奏為奏明運務事竊臣於雍正八年奉文承辦應運軍營駐歇一年口糧除口外屯田收穫糧內辦供麵四百萬斤口內應運粳粟米三萬二百餘石小麥青稞辦磨白麵炒麵五百一十三萬八千三百餘斤自雍正八年八月十六日運送起至雍正九年四月中旬俱可全運出口訖至今嵗督臣查郎阿奏準增辦粳米一千石粟米二萬石青稞一萬石小麥五千石料豆一萬石經撫臣許容具奏𣲖撥並將免撥西寧青稞七千石在於上年豐收之甘涼所屬採買抵補暨續又增撥料豆一萬石以上糧料據各屬俱於正二兩月前後運至涼州經寧逺大將軍臣嶽鍾琪督臣查郎阿議定由涼州之武威永昌甘州之山丹張掖肅州之髙臺等縣遞運至肅其沿途管押仍係各屬原委之員役料理押送赴肅交收除各府州縣原運車户內有情願長運至肅州者聽其長運其餘俱皆遞運蓋車户里民感戴我皇上愛養黎民歷次蠲免錢糧之殊恩而運腳較前增加寬裕無不踴躍爭先所以運務甚速即當農務正殷之時有原以趕車裝載營生之運户以及農民家有餘牛牲畜車輛情願領運者皆聽其自便自三月至今將米麵料豆已源源運到肅州現在即可料理轉運出口矣所有駐歇一年口糧全數起運並續撥糧麵現在起運及農工無誤緣由理合一併奏聞謹奏據奏起運情形欣悅覽焉同日又奏為欽奉上諭事竊臣接到甘肅撫臣許容鈔録大學士公馬爾賽等寄字內開雍正九年二月二十二日奉上諭陜甘二省年來辦理軍需雖皆動用正項錢糧民間無絲毫之費然輸挽糧運伺候差徭不無勞苦朕已另降諭旨加恩奬勉但必得地方大吏能仰體朕心凡一應料理軍務固不可任其遷延遲緩而過於迫急又未免擾民其查核錢糧固不可聽其浮冒開銷但過於苛刻則必致剝民督撫大員若嚴緊一分則州縣官必於百姓加緊一倍如能寬容一分則小民即得一分之惠許容孔育璞辦理西路軍需亦各盡心竭力但許容失之細刻州縣懼其核減恐不能照時價付給則百姓不無虧折孔育璞失之匆迫州縣懼其催促必不敢少緩須臾則閭閻未免驚擾此皆太過之弊也爾等可密寄信去凡承辦州縣或於原限之外遲緩無多而其人之才有可用者不妨略寬容之其開銷物料腳運之費亦必凖酌時價不可十分核減但朕此旨不可宣示於人恐有不肖之州縣借此推諉遷延虛開浮冒其漸不可長也許容孔育璞但時將朕旨密記於心辦理諸務自無太過之弊欽此遵旨寄信前來等因到臣微臣跪讀訓旨實切悚惶繼今而往惟有時遵聖諭密記於心惕厲黽勉不敢遂過飾非再有匆迫復蹈太過之弊以仰副聖主諄諄教誨之至意所有微臣凛遵聖訓緣由理合繕摺奏聞謹奏實力遵奉務合適中之道雍正十年二月二十日都察院左副都御史辦理軍需臣孔育璞謹奏為仰懇聖恩賜臣摺匣以期慎重事竊臣荷蒙天恩髙厚命臣辦理軍需從前一切應奏事宜俱用夾板包封専差家人恭進往回既需時日而夾板亦難嚴謹伏思臣身膺重任而才復庸下必得恭聆聖訓庶幾有所遵循若仍用夾板齎呈則途中既有耽延之慮又難保無泄漏之虞似非所以重軍需而慎機務也可否仰邀聖恩賜臣摺匣除與督臣查郎阿等會奏事件仍在督臣摺匣會奏外其或臣有應奏事件用臣摺匣照例由御塘恭進則密奏事宜恭請訓旨可以迅速而慎密矣臣不揣愚昧冒瀆聖聰伏祈皇上睿鑒謹奏摺匣賜來矣毋得輕易騷擾驛站如有應奏要事方由御塘齎呈仍隨同查郎阿等奏摺附進可也雍正十年七月二十三日總理屯田諸務都察院左副都御史臣孔育璞等謹奏為酌議口外屯種以省糧運事竊照口外靖逆赤金安西柳溝等處屯種地𤱔一案臣等於雍正十年正月二十一日復會同商酌繕摺奏請於二月十七日準户部咨大學士鄂爾泰等議奏應如所議將口外地𤱔通行清查除户民墾熟之地仍給户民管業照例升科外其客民私種者分别已未下過籽種給與籽種及價值銀兩仍令伊等承種并給工食口糧其牛犁器具等項亦即確查給價添補如客民內有不願傭工者亦量給以從前開墾之費使之别營生業客民如不敷用亦應如所議在於莊浪土司屬下雇募土民赴口外耕種按年給以口糧工價仍於農隙令其刈割草束備用至應墾地𤱔現在委員查勘應俟查明之後將應需籽種牛具並雇募客民土民所需口糧工價各數目逐加確核造報其開墾諸務令孔育璞總理查郎阿二格公同酌辦其分理墾種之員查郎阿等一面委用一面奏聞并量給盤費俟一年後將各員效力勤惰分别等次具奏等因奉旨依議欽此欽遵在案嗣據委員候選知州丁祐吉等分路清查安西衛屬之大灣小灣等處柳溝衛屬之踏實堡雙塔堡卜隆吉等處赤金所屬之惠回堡火燒溝上赤金等處靖逆衛屬之紅柳灣頭道溝等處將員辨客民私墾地𤱔逐一造册呈報前來臣等會商酌辦因時屆春耕亟需布種隨即委員分行監理并將所需牛犁農具夫役籽種口糧等項即行備辦其間曠之地酌量地土膏潤水漿足用無礙民田者即𣲖撥夫役及時開墾下種臣孔育璞亦即赴口外親詣各處查勘隨地開示委員務令詳慎辧理計員辨客民并新墾田地共下過籽種三千四百三十九石零約計人工牛犁各項所費合之臣等原奏每下籽種一千京石一年所需幾及二萬兩之數亦約略相同此係第一年試種若至第二年則牛犁器具止須添補又可減省至閏五月間臣孔育璞又往口外各屯種地方巡查一遍留心察訪凡分理屯種各員俱能竭蹶辦理至各種禾稼情形仰賴我皇上聖德格天風調雨順水澤充盈莫不發榮滋長秋成在望豐稔可期所有酌定事宜謹備細臚列另摺恭呈御覽伏祈睿鑒謹奏詳覽屯種各事宜朕深為嘉悅雍正十一年正月初六日總理屯田諸務吏部右侍郎臣孔育璞謹奏為恭報微臣出口日期事竊臣荷蒙聖恩専司屯務自應移駐口外方可就近經理已將駐劄靖逆緣由奏明在案今東作將興臣於雍正十一年正月初六日自肅起程出口前赴靖逆駐劄稽查瓜州屯墾疏濬事宜並經理各處屯種要務所有微臣出口日期理合恭摺奏聞謹奏親詣屯所督理稽查方與諸務有益也出口之行愈早愈好雍正十一年六月初二日總理屯田諸務吏部右侍郎臣孔育璞等謹奏為報明口外屯種數目并禾苗長發情形事竊查口外屯田先經臣等將今年應下籽種數目及安西衛屬之大小灣地𤱔停止下種使水全注瓜州緣由奏聞在案今臣孔育璞遍歷各衛所履𤱔查勘新舊墾種地畝下過籽種五千六百餘石及瓜州新墾處所下過籽種三千五百石二共下過京石籽種九千一百餘石俱巳長發茂盛吐穗秀實關外兵民交相稱慶是皆由我皇上敬天勤民精誠感格以致口外雨少之地本年亦時沛甘霖優渥霑足入夏以來水澤充裕如法灌溉將來豐稔可期臣恐上厪聖懷合將禾苗長發情形先行恭摺奏報再查前項下過籽種地內有靖逆衛屬之頭二三道溝王全臣新墾地一千石內間有潮鹻上升禾苗尚未生發者俟秋成之後另當設法開墾地𤱔更換理合一併奏聞謹奏覽屯田內下過籽種數目及長發茂盛情形朕懷深慰硃批諭旨卷一百三十五
