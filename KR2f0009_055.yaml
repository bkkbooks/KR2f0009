body:
  text: 欽定四庫全書硃批諭旨卷五十五硃批張保奏摺雍正三年十二月十五日山東布政使臣張保謹奏為奏聞事竊臣至愚極陋仰荷皇上天恩升授山東布政使受恩深重圖報愈難惟有潔巳愛民整躬率屬殫竭心力仰答髙厚於萬一而己臣抵任視事日恭設香案望闕九叩即遵例詳請巡撫臣代題叩謝天恩臣隨飛檄給示現在散賑各地方宣揚聖主德意務使災民均沾實惠兹接護司青州府知府李秉儉呈送交代文册臣隨逐項查對到庫盤驗除己經解交外現存庫銀一百八萬三千四百一十兩零盤明委無虧少惟是臣智識短淺初到東省一切地方事務未能深知容臣察實漸次密奏所有盤眀司庫緣由理合具摺奏聞謹奏知道了極宜加意自勉爾之一身大關朕用人顔面毋得少懈有負朕拔擢之意謹之慎之雍正四年二月初一日山東布政使臣張保謹奏為奏聞事竊查東省藩司陋規節禮前雖革除臣抵任復行示禁是以署中一切費用惟仰藉於聖主賞給之養廉臣于去年十一月到任之日起至十二月底止收過各屬正雜錢糧及耗羡銀共二十五萬四千一百二十兩支給過通省兵餉等項并解部京餉銀共五十一萬二百五十二兩零共贏餘銀八千三百一十兩零約計每年錢糧徵足解支後共有贏餘銀數萬兩臣隨查此銀係從前撫藩二臣因公捐費繁存此為均分湊用之項臣仍照舊例分送撫臣外至臣應分銀兩現存在庫臣仰見我皇上仁同覆載加惠黎元動用正項錢糧興修萬年水利正工費浩繁之時臣尚苦無力捐助何敢纎毫存私除養廉銀一萬兩以為食用外凡有應分贏餘銀兩按季扣存即具摺奏聞至別項或有陋規臣現在查察務得確實方敢具奏縱係細微臣斷不敢欺隱為此謹奏毋於朕前見好是務惟宜實力奉行以期無負朕恩所奏已悉勉為之亦不必過於清苦矯廉之人非朕所取能使地方百姓獲沾實惠即是報朕之處也雍正四年三月初十日山東布政使臣張保謹奏為奏聞事竊查藩司乃錢糧總滙剔弊去私更宜盡力兹東省各州縣每員俱蒙皇上天恩於耗羡內賞給養廉銀一千兩欽遵在案惟是州縣內有升遷事故離任者例委附近州縣署理凡此署事之員本任已經給過養廉無庸重給久經撫臣議飭扣解臣查自雍正二年七月內給養廉銀起至三年十二月止通計署事州縣應扣解銀共一萬二千六百兩零理合飭解存庫公用再查泰安州香稅每年布政司有分規銀一千五百兩濟寧州課程溢額稅每年有分規銀五百兩今據該州循例將雍正四年春季銀分送前來臣思此二項分規皆從前舊例若飭令收回徒使州牧中飽因收存庫以備公用又查膠州船稅從前亦有分規容俟該州送到方敢據實具奏至於東省去嵗雨水過多低田歉收仰蒙聖主廣沛仁恩蠲免額賦緩徵漕糧特準借給存倉米穀又命加意經理多方賑恤臣仰體聖心隨撫臣經理災黎務令均沾實惠兹開河寓賑窮民俱得傭工度日其老弱殘疾不能赴工者欽遵恩旨動用正項錢糧換錢查給資其口食兆民安全樂業咸祝聖主萬夀無疆理合一併奏聞謹奏但只勉力向前做去朕自能鑒照也雍正四年三月十八日山東布政使臣張保謹奏為欽奉上諭事雍正四年三月十三日欽差侍郎臣阿克敦員外郎臣富彌善抵山東省傳旨諭布政使張保此河應開不應開爾主見若何與巡撫所見同否若停其開濬與飢民有無妨礙欽此臣跪聆之下仰見我皇上聖慮周詳念切民生期于斟酌盡善之至意伏查去秋東省雨水過多低田歉收荷蒙聖恩浩蕩蠲賦緩徵又命加意經理多方賑恤復蒙天恩特準借給存倉米穀撫臣同臣俱一一欽遵賑借訖嗣因隆冬早春天氣沍寒仰體皇仁于被災各州縣在人煙聚集之處分設粥厰煮賑于本年二月初十日停止後仍查老幼殘疾之民量給錢米旋又奉特旨查不能赴工老弱殘疾之人每日給與升合之資撫臣同臣欽遵隨即飛檄各被災州縣詳查確實換錢散給宣揚聖德俾窮黎均沾實惠酌量于五月十五日方行停止是災民之疊沐聖主𢎞恩至深至渥已不啻淪肌浹髓矣兹開河處所俱係各州縣本境少壯窮民分界挑濬原非總聚一處且農事方興正資力作河工可以暫停如停工之後果有實難度日者撫臣同臣自當撫恤務期無致失所仰副皇上宵旰勤民至意至開濬河道其間因地制宜之處臣抵任未久實不能深悉情形未敢冒昧陳奏理合遵旨奏眀伏乞睿鑒謹奏此事陳世倌殊屬孟浪之極爾居兩司之職與撫臣事同一體類斯無憑妄舉爾竟置之不聞不行勸阻是何理也殊為負朕任用向後一切事宜俱當同心協力辦理設若爾言而不聽則又當一論巡撫者係代朕撫安地方之任布政使亦係代朕布政於民之職是則同是非則同非不比一身私事各分功過也志之雍正四年四月十五日山東布政使臣張保謹奏為恭謝天恩事竊今嵗三月內撫臣陳世倌輕率開河檄飭興工臣識短才庸不知勸阻如此愚昧咎實難逭荷蒙皇上洪恩格外優容硃批訓誨臣跪讀之下惶悚戰栗感激無地雖捐糜頂踵難以報稱惟有凛遵聖訓益加惕厲凡地方事務與撫臣同心斟酌謹慎辦理倘撫臣有偏執之處更宜力行勸阻即或不聽具摺密請聖裁以仰酬聖主教訓之𢎞慈於萬一耳理合恭摺叩謝天恩謹奏陳世倌有不到處爾當提撕爾有不是處亦當聽伊勸誡須要同休同戚平心靜氣彼此針規方合共事之理也勉之雍正四年七月十三日山東布政使臣張保謹奏為奏聞事竊查東省司庫贏餘分規舊例相沿係按通省州縣衛所起運解司分別州縣衛所繁簡每解司錢糧一千兩隨有解費銀一十一兩一十四兩不等俟解支後撫藩二臣均分湊用又有運費名色銀五六兩不等內除支給解官零星費用餘係撫藩分規又有餘銀七兩起解京餉時隨解交部以為部內飯銀若支發本省兵餉及河工等項錢糧不須飯銀所有贏餘亦留作分規臣于去年十一月到任起至十二月底止應分贏餘銀四千一百五十五兩零已經奏眀存公兹雍正四年正月起至六月底止共收過各屬解司地丁銀七十九萬二千兩支解過部餉五十二萬一千八百兩支發過兵餉等項銀四十一萬餘兩共贏餘分規銀二萬二百兩零臣應分銀一萬一百兩理合存庫公用又通省司道府廳所解雜項銀兩及各州縣衛所贓贖併當雜稅銀每兩有解費銀一二三分不等臣抵任至今共有銀一千二百三十六兩零從前俱係布政使所得分規臣蒙聖恩賞給養廉銀兩日用衣食全家飽暖此項何敢自私亦應存庫公用至錢糧頭緒紛繁倘續有查實臣即行具奏理合一併奏眀伏乞聖鑒謹奏諸凡總期爾合於公慎而巳朕未有令爾等地方大吏至於困苦之心若上不虧於國帑下無害於民生常規羡餘分內應得之項能省費節用積纍多年便至於巨富亦朕所樂聞而不禁飭者也此奏固屬可嘉倘將此等應得者奏聞以見清忠而分外設法巧取則其咎更加一倍矣勉之雍正四年八月初六日山東布政使臣張保謹奏為奏聞事竊查東省于康熙六十年修築太行堤併朱姬莊堤工動用司庫銀八萬二千四百一十五兩零經前撫臣李樹德題眀自康熙六十年起每年通省捐俸工銀一萬六千四百八十三兩零以五年捐補還項內除康熙六十年將俸工補還庫銀一萬六千四百八十三兩零又原效力河官劉永鉽于參案內補完庫銀二千四百四十二兩零尚未補庫項六萬三千四百九十兩因雍正元年奉旨停捐俸工升任布政使臣布蘭泰于雍正三年內詳眀撫臣陳世倌題請將未補之庫銀開銷正項錢糧在案雍正四年三月奉部文著將未奉停捐以前銀兩仍以俸工捐補還項既奉停捐以後銀兩開銷正項等語在部臣只知當日原題每年止捐俸工銀一萬六千四百八十三兩實不知從前藉補庫項名色每年已提捐俸工銀八萬餘兩故有此議也臣查自康熙六十年指太行堤工用過庫銀題捐俸工補項起至雍正元年九月奉旨停捐俸工止除扣留曾經另案題眀以俸工捐還賑榖銀併各州縣流抵及坐支役食等項外通省實共議提捐俸工銀二十一萬一千六百七十兩零各屬已完解過銀一十八萬六千六百七十兩零內除康熙六十年已補還庫銀一萬六千四百八十三兩併用剩僅存在庫銀一千六百兩其餘一十六萬八千五百八十七兩俱係前任布政使臣博爾多等動用無存此外止剩原議提捐數內各屬未完解司俸工銀二萬五千兩零臣思議捐俸工原為補還庫項乃各屬已完銀一十八萬六千六百七十兩而庫項尚虛懸六萬一千八百八十九兩零况博爾多等之動支現在有卷可查者固係因公需用其有七萬餘兩無案可稽者寧非假公濟私乎且所剩各屬未完俸工銀二萬五千兩現雖遵照部文飭催但其中因元年奉旨停捐無論官役一聞恩命當經領用今難盡吐併升遷參革病故丁憂離仕之員無憑催解即令現在各州縣如數墊完尚懸庫項三萬六千八百兩若照部文開銷正項恐蹈欺朦之愆臣不敢扶同徇隱理合據實奏眀謹奏如此據實直陳甚屬可嘉百凡處惟以秉公無隱為務朕所深褒亟豫者正斯等居心行事之人也今差王沛憻前來會同總兵柏之蕃清查此案雍正四年九月十四日山東布政使臣張保謹奏為奏聞事竊查康熙六十年修築太行堤併朱姬莊堤工動用庫銀提捐俸工補項各屬已完銀一十八萬六千六百七十兩零內有一十六萬八千五百餘兩俱係前任布政使臣博爾多等動用無存其有卷可查者固係因公需用約有七萬餘兩無案可稽者不無假公濟私臣備悉奏眀第官更吏易案籍紛繁臣現徹底查卷此七萬餘兩中檢出博爾多等動用支簿雖有數項曾詳過撫臣均屬浮冒妄費理合奏眀伏乞皇上睿鑒謹奏不可絲毫為留地步當盡情察出交與王沛憻查審朕巳有旨諭王沛憻凡爾所揭報博爾多事件俱令其接審矣博爾多甚屬負恩可惡爾毋代伊任過也至爾此任一切奏聞之事朕甚嘉之慎毋改移此志勉之同日又奏為奏聞事竊查東省海口船稅惟膠州為聚船之處萊陽縣次之從前膠州每年報解額稅銀四百七十餘兩萊陽縣每年報解額稅銀三十兩零其有贏餘俱為司道府廳知州等分規布政使每年分規銀八百兩臣抵任後移飭儘收儘解分規存公兹準登萊青道移解雍正三年十月起至四年三月止兩季膠州船稅正額銀二百九十六兩零贏餘銀三千七百兩零萊陽縣兩季船稅正額銀一十八兩四百兩又膠州雍正三年春夏秋三季報徴少解贏餘銀九百九十六兩零臣飭令補解二項現經解兊理合存庫公用再查京餉挂平銀兩撫臣陳世倌同臣酌議以帶徵康熙六十一年雍正元年地丁錢糧內耗羡每兩提解七分彌補如不足數于通省公費耗羡內添解臣業經奏明前奉部文嚴飭挂平現在秋撥京餉應將此項耗羡銀照從前每萬兩挂平數目加給解員添兊不得挂欠至于每年非遇災免通省實共有公費耗羡銀九萬五千餘兩臣蒙聖主髙厚𢎞恩無可報稱潔已秉公務期慎節但從前屬員動用有奉撫臣批允至今方詳請開銷者耗羡皆係國帑可否容臣將動用過公費項內耗羡按季分析繕摺恭呈聖覽仰祈皇上批示理合一併奏眀謹奏按季奏來朕看一二次亦可雍正四年十月初九日山東布政使臣張保謹奏為檢舉愚昧罪愆仰懇聖主敇部先加議處事竊病故參追運河同知董廷柱之兄董廷揆首出前淮徐道潘尚智扣剋公費銀兩一案蒙總督河道臣齊蘇勒案準刑部咨開再該督疏稱查董廷揆呈出伊弟董廷柱印册一本草册一本係董廷柱前任江南宿桃通判印信字俱以墨蓋硃開寫原任淮徐道潘尚智扣去公費銀五萬五千一百餘兩細看墨迹似屬現今填注事關錢糧不便輕結飭令司道確審實情另行題報等語奉旨令該督詳審眀確等因隨經督臣檄飭臣坰淮徐兖寧二道會審臣遵同會訊據董廷揆供稱伊弟董廷柱所開册子是無憑無據原是謊的等語臣前因見廷揆自認誣首一時愚昧據情詳覆督臣覆審亦被狡飾定擬具題兹潘尚智與慶元通同作弊從淮關署內夤夜擡出銀兩此等存心詭詐行事姦險之人必有吐還原贓囑改供情之事我皇上至聖至眀日理萬幾無微不照臣于邸抄中伏讀聖諭如夢方醒愚昧若此罪何可逭合即檢舉叩懇天恩敕部將臣先加議處以彰臣愚昧草率之咎將來益知兢惕仰戴聖主𢎞慈於生生世世矣謹奏若無情弊何用檢舉有私即檢舉亦不能免罪事定自眀所奏知道了雍正四年十一月初四日山東布政使臣張保謹奏為奏聞事竊查東省額載起運京餉折色腳價一項非遇災免每年隨正項解司銀九千三百九十二兩零內除起運京餉給解官盤費併解部節省銀兩以及置買鞘木等項外每年贏餘銀兩從前俱係存給本省間有運銀運穀腳價併撫臣衙門心紅紙張并書辦鹽菜銀兩以及撫司各役工食各項公用自臣抵任接收前存腳價銀四千餘兩起至雍正四年止除支給解官運餉盤費等項以及循照舊例臣加裁節支給各項公用共銀六千餘兩現有贏餘腳價銀五千六百兩零又有各年未完腳價併分年帶徵未完腳價銀共一萬兩零容俟陸續徵收一併存庫公用至雍正四年七月起臣于此腳價項內除正支解官盤費及木鞘等項併解部節省銀兩動用外其餘別項公用可裁減者業已裁減應支給者不動腳價統于通省公費耗羡項內動用按季開摺彚奏惟是前開濬河道撫臣陳世倌檄提司庫銀八萬餘兩散給各州縣為挑河工費當因河工暫停隨查各州縣有已經興工挑河一二日併置器具等項共動用過銀一萬二千四百餘兩臣屢經詳請作何補項嗣蒙撫臣牌開從前所挑之河即係目下應做之工用過銀兩可以抵算如或缺少將伊所收臨清倉折色項下餘耗銀補項等語飭臣知照臣現在密行查察外理合一併奏眀伏乞皇上聖鑒謹奏似此居心行事何煩朕更為訓諭勉之此心此行能恆守不移爾自有大饒益處同日又奏為奏聞事竊查從前提解耗羡時經撫臣陳世倌奏眀存為起解添平及通省公費耗羡一項內除起運解司錢糧每兩聽留各州縣四分為解費併公用外每年實有通省公費耗羡銀九萬五千餘兩因耗羡盡已提解凡州縣有因公動用及通省公事不得不取給于公費耗羡之中自臣抵任後不避嫌忌較前諸凡節省但有從前屬員動用奉撫臣批準至今陸續具詳開銷者亦有萬不得己循例動用者臣前奏懇天恩容臣將動用過公費耗羡逐一繕摺按季具奏荷蒙恩旨臣欽遵聖訓將雍正三年十一月內臣抵任之日起至四年九月底止所有各州縣開銷及詳眀撫臣批準動用過公費項內耗羡銀兩逐件據實另摺開眀恭呈聖覽謹奏閲所開摺單實屬清楚可謂無忝錢糧總滙之職但亦不可過刻恐致後人難乎為繼也朕甚嘉恱勉力為之雍正四年十一月二十日山東布政使臣張保謹奏為奏聞事竊查東省支發河工銀兩從前相沿俱有扣除部飯名色工竣各員領回繳送臣察知此弊隨嚴飭各員估計工料務宜確實盡去浮冒其扣存部飯陋例檄行停止各員遵行在案惟是從前已經扣除在庫部飯名色銀共有六千九百六十兩零現據各員請領臣思此銀若行發還不惟徒飽各員之腹且恐復開舞弊之端應存留司庫以備公用再刑部飯銀一項從前俱係各州縣于扣留一分公用耗羡銀內提解按察使彚解刑部臣蒙皇上𢎞恩署理臬篆準調任臬司徐湛恩移稱除動用解過雍正四年春夏二季刑部飯銀外實存銀一千三百兩移交臣收臣署臬篆半載又收過各屬捐解銀六百兩尚有各屬應捐未解銀兩可以備解刑部今嵗秋冬二季飯銀所有臣收過銀六百兩併徐湛恩移交銀一千三百兩俱係贏餘亦應存庫公用理合一併奏眀謹奏知道了然亦不可過於自苦以為極則朕所取者惟適中之道耳同日又奏為奏聞事竊去嵗東省雨水過多民房倒塌經撫臣陳世倌奏眀賑銀併動米穀煮粥賑濟各案撫臣同司道各員將常規羡餘公捐尚不敷用暫動司庫耗羡銀一萬七千餘兩現須補項臣念切急公捐補無力惟臣布政使任內每年有養廉銀一萬兩臣仰遵聖訓儉約持躬諸凡節省今嵗可節存銀一千兩再臣蒙皇恩署理按察使印務自雍正四年六月起扣至十一月底止應有養廉銀四千六百六十兩零臣受恩深重寸長未效何敢纎毫自私應一併存公湊補賑濟動用庫項除詳明署撫臣塞楞額查核補項外理合奏聞謹奏好汝之存心實為難得果能照此操持堅定不移可大受朕之恩榮也勉之雍正四年十二月十六日山東布政使臣張保謹奏為奏聞事竊查東省解司錢糧從前相沿舊例每銀一千兩有布政使書辦紙張飯食以及庫丁飯食併庫大使及經歷司養廉共陋規銀一兩五錢又看收錢糧家人亦有陋規銀一兩二錢臣察知此弊即欲革除但書辦庫丁等役恐難枵腹辦事是以著庫大使將此二項陋規彚收存庫每月酌給書辦飯食紙張庫丁工食以及庫大使經歷司養廉之費自雍正三年十一月臣抵任日起至四年十二月止共收過飯食陋規銀六千二百兩零除支給前項費用外現有贏餘銀三千六百兩零理合存庫以備公用至臣受皇上𢎞恩畀以錢穀重任雖事屬微細亦不敢欺隱上負皇恩下虧臣職但未免瑣瀆聖聰伏乞皇上鑒宥謹奏朕甚嘉爾之真實不隱何瑣瀆之有但將此一項存庫似覺清刻太過當給與員役輩作飯食之資如仍有餘亦可添助爾之用度何必歸公耶雍正五年正月十二日山東布政使臣張保謹奏為奏聞事竊查撫臣陳世倌提解耗羡時奏明存為解餉添平及通省公費耗羡一項臣抵任之後諸凡慎節自雍正三年十一月起至四年九月止各州縣因公動用及臣詳明撫臣批準動用公費耗羡各欵臣業經彚摺奏明兹自雍正四年十月起至十二月止所有各州縣公事開銷及臣因公詳明前撫臣陳世倌并署撫臣塞楞額批準動用過公費耗羡銀兩逐件據實另摺開明恭呈御覽再從前屬員動用耗羡奉前撫臣陳世倌批準至今陸續具詳開銷之項併前任布政司動用各項內或有濫支以及前撫臣李樹德黃炳陳世倌先後題明各虧空流抵己經動耗彌補併未經動耗彌補各案頭緒紛繁臣現俱徹底清查凡有查出臣即詳明署撫臣查核具奏至臣一生孤立矢竭愚誠荷蒙聖恩超拔逾格雖粉身碎骨不足以仰答髙深布政使為錢穀總滙臣祇知屏去私心慎重錢糧冒嫌直陳未免觸忌招尤惟祈聖主睿照理合一併奏眀謹奏若能秉公除私何憂何懼但勉為之凡人存心止知畏天而不畏人方合乎道然確見此理者殊不易得同日又奏為奏聞事竊查司庫解費運費部飯節省併餘平等項贏餘分規銀兩自雍正三年十一月起至四年九月止臣節經奏明兹雍正四年九月起至十二月止共有分規銀二萬二千八百餘兩應分臣銀一萬一千四百餘兩理合存貯司庫以備公用再東省署事各官因本任已經給過養廉銀兩署任內應扣除歸公臣業經奏明在案除臣署臬篆應扣之飬廉銀兩臣已奏明存為湊補賑濟各案動用庫項外查自雍正二年七月內議給養廉銀起至四年十二月底止通省署事各員共應扣解養廉銀三萬一千五百六十兩零據各屬解過銀一萬一千五百三十兩零尚有各屬應扣未完解銀二萬三十兩零現奉署撫臣粘抄摺稿檄臣將此項內動支銀一萬三千五百兩給各州縣領造營房合併聲眀又衛所事務簡省錢糧一例徵耗前臣與前撫臣酌議自雍正三年起量提解耗羡七八分不等臣己奏明在案查雍正三四兩年各衛所共應解該年耗羡併帶徵錢糧內耗羡約共七千八百兩零俟該衛所解齊存庫公用至萊陽縣海口船稅臣蒙皇恩暫署巡撫印務時業將雍正三年冬季四年春季所收額稅及贏餘併臣分規銀兩加倍扣算一年可共徵稅銀七百七十兩同膠州船稅臣恭疏具題請自雍正四年增額解徵在案今臣復加廉訪萊陽縣貨船較前增多所收稅銀定額之外仍有贏餘容俟該縣報解到日臣即據數具奏合併陳眀謹奏歸公雖屬可嘉若盡數歸公亦未有枵腹從事之理但不欺隱於分外貪取即為可嘉耳至若矯廉過於清苦亦非朕所樂聞雍正五年二月初七日山東布政使臣張保謹奏為奏聞事竊東省奏銷部科各飯銀一項從前未提耗羡彌補虧空之時俱係各州縣公捐解司繳送自雍正二年提解耗羡彌補虧項一切部科飯食銀方取給于司庫公費耗羡之中兹查升任布政使臣布蘭泰因康熙六十一年及雍正元年兩載奏銷部科各飯銀動用過庫項共銀一萬八百五十二兩伏查舊例相沿每年奏銷部科各飯銀連賞提塘齎解盤費只共須銀三千七十四兩臣現在奏銷俱照此數動用布蘭泰任內兩年奏銷各飯銀只應動銀六千一百四十八兩乃動用過庫項共銀一萬八百五十二兩實浮冒銀四千七百四兩庫項絲毫皆關國帑臣查眀委係浮支何敢避嫌徇隱理合據實密奏伏乞皇上聖鑒謹奏所奏甚屬可嘉但布蘭泰未必有浮冒至四千餘金之理必另有緣由爾其寄字詢眀同日又奏為奏聞事竊查前撫臣李樹德黃炳先後題明東省流抵虧空銀穀共銀三十四萬四千三百五十九兩零內除未題請以耗羡彌補之先各屬已補銀穀又除長題併重復及已參虧空銀穀外實剩應補銀穀共銀二十六萬五千三百四十一兩零又前撫臣陳世倌題眀虧空流抵銀穀共銀一十五萬四千八百七十兩零內除續參泰安州知州古今譽等虧空併章邱縣知縣張士相等自行完補及濰縣知縣陳緯虧空歸入民欠外實剩應補銀穀共銀一十二萬六千七百八十九兩零又升任布政使臣布蘭泰奏眀續查出無著虧空銀穀共銀四萬二百二十三兩零又因流抵參入虧空前撫臣陳世倌題眀仍扣歸應彌補銀七萬三千五百二十四兩零東省通共各項流抵虧空銀穀共銀五十萬五千八百七十七兩零臣查此流抵銀兩已經動耗彌補及未經動耗彌補各案內如捐升離任併卓異行取及現任丁憂等員從前徵收錢糧均有耗羡即或因公虧項亦應早自補清奚容流抵脫缷臣徹底清查案卷其各員任內各項虧空流抵銀穀約共銀二十萬兩零俱應著追至參革病故告休等員內亦有可追之員除臣分析造册詳眀署撫臣查核具奏請旨遵行外理合奏聞謹奏此奏甚公且當勉為之雍正五年三月二十七日山東布政使臣張保謹奏為奏聞事竊東省虧空流抵銀穀各案續經前撫臣陳世倌題請彌補之後該員有于升任內解東補項者又彌補案內有原虧空無著銀穀已將耗羡彌補因非正項無欵撥補扣出存庫者臣查有原任東平州知州王瀚原任金鄉縣知縣王之錡原任恩縣知縣曹維翰三員各于升任內解補流抵銀兩又原任夀張縣知縣陳從善措墊修築沙灣掃工併因刪賑虧項已將耗羡彌補扣出存庫銀兩又陳從善糶賣兖寧道分貯倉穀措墊無著流抵已將耗羡彌補撥還該道買穀贏餘銀兩又原任膠州知州馮景夏措墊無著流抵銀已將耗羡彌補扣出存庫銀兩以上六項共銀四千六百七十五兩零俱應存庫以備公用再查從前膠州等處承修戰船因各屬公幫不齊墊用流抵虧項巳入彌補數內而平度即墨等八州縣復陸續解補從前應幫修船銀八百三十九兩零理合存庫公用又靖海各屬陸續完解第查各年俸工當日係扣除流抵災免提解乃各屬見係私提之項未免將災免浮開臣清檢卷案查有各屬多開銷災免俸工銀九百二十兩零亦應催解以備公用以上各項雖事屬瑣細臣不敢隱瞞理合一併奏明伏乞皇上聖鑒謹奏據實不隱乃極好之事但不宜攙入此等無理之欵耳雍正五年四月十四日山東布政使臣張保謹奏為奏聞事竊查升任布政使臣布蘭泰因康熙六十一年及雍正元年兩載奏銷部科各飯銀多動用庫項銀四千七百四兩臣前備悉密奏奉到硃批臣隨將布蘭泰動用過庫項銀數分析開書稟帖差役齎往湖南巡撫布蘭泰任所備查補項兹布蘭泰答臣印信咨文內開為咨覆事準札開康熙六十一年及雍正元年兩載奏銷除給過部科各飯銀並賞提塘等項外應有餘剩無著銀四千七百四兩既係本院前藩司任內應行還補之項理宜隨即解送但目下一時無措仰祈寬限于一年內設措差役完項理合咨覆等語除俟催補以備公用外所有問明布蘭泰願補緣由理合密奏以聞謹奏此事據布蘭泰已經奏過既係伊應補之項容伊徐徐補還可也將此諭令塞楞額嶽濬知之雍正五年五月初三日山東布政使臣張保謹奏為奏聞事竊查東省司道府廳凡解雜項銀兩併各州縣衛所贓贖及當雜稅銀每兩有解費一二三分不等舊例係布政使收受自臣抵任起至雍正四年六月止收過銀兩經臣奏明存公兹自四年七月起至五年四月止共收過銀一千八百七十一兩零理合存庫公用又布政使每年有泰安州香稅濟寧州課程溢額稅膠州船稅各分規銀兩俱經臣奏明查自雍正三年十一月起至四年十二月泰安州解送過五季分規銀一千八百七十五兩濟寧州解過五季分規銀六百二十五兩膠州解過雍正三年冬季分規銀二百兩俱應存庫公用至雍正四年起膠州船稅分規臣于署巡撫印務時具題一併加入稅銀內增額徵解臣恐定額之後查察稍疏復有徵多報少之弊因而益加嚴飭兹查所收稅銀七千五百兩之外仍有贏餘除現在飭查確數增額外理合一併奏明謹奏據爾奏稱各欵分規俱歸公備用但不必矯廉於離任臨回時將分內應得項下可酌取一二萬金帶來亦不為多一者爾作回京之用度二者朕或另有用爾處更可作將來養廉將此諭與塞楞額看商同酌取嶽濬到任後亦令伊知之雍正五年五月二十九日山東布政使補授刑部右侍郎臣張保謹奏為聖主隆恩高厚微臣頂戴難勝敬陳蟻悃恭謝天恩事雍正五年五月十六日臣家人齎摺回東奉到硃批臣欽遵親齎與撫臣塞楞額併布政使臣嶽濬公同跪看訖竊臣至微至賤叨沐特恩擢升河南按察使時蒙聖主賞給養廉銀每年一萬兩臣除一切用度外共節存銀三千二百兩零又東省布政使任內蒙恩賞給養廉銀除各項支用外共節存銀四千兩零兹荷皇上殊恩臣凜遵聖諭於二項內酌留銀四千二百兩零以為抵京盤費併養廉之需儘足敷用尚餘銀三千兩理合存庫詳明撫臣備案俟秋成發買穀石添貯東省會城社倉以備民食伏念臣庸才陋識屢蒙皇上異數頻施體恤備至跪誦硃批感激難名惟有益矢公忠竭盡駑駘仰酬洪慈於萬一而巳理合恭摺敬陳蟻悃叩謝天恩謹奏此三千金亦不必歸公俱賞爾用度可也將此諭亦與伊等看雍正五年八月十六日陜西巡撫臣張保謹奏為奏聞事竊臣本年七月十九日抵陜西境內見各處秋禾暢茂吐穗甚盛將來收成可慶豐登查現在米麥豌豆價值據各屬報到粟米每京斗一石六錢五分七錢不等麥每石四錢一二分不等豌豆每石三錢八九分不等至西安府省會衝途户口繁盛粟米京斗每石八錢四分麥每石五錢豌豆四錢二分兆民樂業咸祝聖天子萬夀無疆理合恭摺奏聞謹奏覽奏深慰朕懷同日又奏為奏聞事竊臣微賤庸愚寸長未效屢沐皇上洪恩逾格超擢授以封疆重任陛見之日跪聆聖訓周詳復蒙賞賜稠疊臣受非常恩榮雖捐糜莫能報稱夙夜惕厲時切悚惶本年七月二十二日臣抵任後查陜西省撫臣有親丁名糧五十五分舊例相沿每年在于撫標兵糧內扣存餉乾米料草共折銀一千五百七十兩零為撫臣湊用之項臣查陜省撫臣已蒙恩賞養廉銀每年二萬兩又撫臣家口馬匹併親隨家口每年復荷聖恩賞給米豆草束折色銀共二百三十九兩零額載奏銷在案將來臣養廉銀兩每年慎節尚可贏餘所有親丁名糧五十五分扣折銀兩理合飭司存庫公用再查撫臣衙門心紅紙張等項向係潼關徵收商稅溢額贏餘銀內每年繳銀五百兩交西安府供應臣以稅羡不宜取用所有必需心紅紙張於臣養廉銀內捐備其潼關應解供應今嵗半年心紅等項稅羡銀兩臣檄令解貯司庫留備公用併嚴飭經收潼關商稅驛傳道金南瑛凡收稅銀務宜儘收儘解倘察有侵隱臣即奏參至臣抵任未久地方諸務尚未深悉現在逐一徹底清查秉公經理容臣漸次奏聞謹奏此等之奏朕不過間覽不以為是亦不以為非總在汝自酌量為之但汝膺封疆重任當以大者要者為務不必斤斤向些微銀錢上留心況汝等大吏所需用處亦甚多似此分內應得向日相沿無礙成規亦不必矯廉自異致令後任難於辦理殊非情理之當但不分外巧取貪婪犯科即可矣凡事過猶不及一切酌中而行之可也雍正五年九月二十五日刑部侍郎署理陜西巡撫臣張保謹奏為據實奏聞仰祈聖訓事竊臣蒙皇恩超擢畀署封疆重任抵任以來凡關民生吏治無不留心體訪以期仰副縣知縣黃鉽鄜州屬中部縣知縣因秉彝漢中府屬鳯縣知縣千兆此三員者年非壯盛才具平庸實不能勝縣令之任第俱係科甲出身其學皆堪課士可否改用教職理合一併仰請皇上聖訓以便欽遵會題為此恭摺奏聞謹奏如果真知灼見人地實不相宜即當具題何必又多此一番摺奏耽延時日以貽悮吏治耶殊屬庸不曉事同日又奏為恭報秋禾收成分數仰祈聖鑒事竊查陜省今嵗雨暘時若秋收大有臣檄飭布政使轉飭各屬將榖豆收成分數確實查報兹據布政使張廷棟呈報西安等四府屬之咸寧等三十九州縣粟穀收成九十分不等豌豆收成八九分興安等十州併所屬洵陽等三十一州縣粟穀收成八九分不等豌豆收成八分臣覆查無異此皆我皇上念切民生至誠感召之所致閭閻咸慶豐亨童叟歡騰樂業理合恭摺奏聞謹奏覽收穫情形曷勝欣慰雍正五年十月二十六日刑部侍郎署理陜西巡撫臣張保謹奏恭請皇上聖躬萬安朕安所奏張廷棟之事甚屬可嘉巳有旨矣同日又奏為奏聞事竊本年十月二十四日據臣標中軍遊擊孫王法詳據左右兩營守備千總等各帶領目兵赴布政司領到本年十一月分小建官兵俸餉銀領出彈兌左營銀一千兩內少銀四兩六錢右營銀一千二十兩零內少銀三兩四錢事關短少兵餉難以散給相應報眀等語臣隨將原銀驗兌果皆短少又據督標署中軍副將火器營參將王友詢呈據本標中軍守備李現瑞等各呈稱左右前後中五營併火器營俱赴布政司領出十一月分俸餉銀隨即較兌五營銀內共少銀十六兩九錢又火器營銀內少銀二兩一錢理合呈報又據城守營參將馬雲呈據守備張藴禧呈稱率領目兵赴布政司領出十一月分俸餉內短少銀一兩九錢理合報眀等語臣因時屆隆冬兵丁需餉飭令將兌驗之銀先行散給正在批飭按察使提庫書查究間又據布政使張廷棟呈稱本年十月二十三日支發督撫各標併火器營十一月分俸餉俱係當堂驗兌乃領銀出署之後有撫標千總到署口稱短少銀九兩督標亦稱短少銀二三四兩不等夫果有不足當時何不聲説請嗣後支放俸餉照數兌眀封送驗發等因俱到臣臣查張廷棟支放餉銀與他省全不相同既不包封用印發給又不關會各營大員面同驗平是先留推賴展辨之地自易滋短少給發之端臣前雖訪聞張廷棟給發兵餉每千兩有短少情弊因無確據未便冒昧具奏兹據各營等申報前情與臣訪聞無異理合據實奏請聖訓應否具本題參伏乞皇上聖鑒批示遵行謹奏總督嶽鍾琪巡撫西琳察議具奏硃批諭旨卷五十五
