body:
  text: 欽定四庫全書硃批諭㫖卷一上硃批范時繹奏摺雍正四年六月二十四日署理江南江西總督印務總兵官臣范時繹謹奏為恭謝天恩事伏念臣庸愚下質恭膺寵命署任封疆臣自入境抵任以來悉心體察竊念兩奉上諭欽遵勿替實力奉行以期全效至於各該地方官題次第請行仰副我皇上任用之至意但臣自顧識淺才疏荷兹重任夙夜悚惕唯有恪奉從前所天恩謹奏覽同日又奏為奏聞甘霖普遍栽蒔咸齊秋成預兆恭慰聖懷事竊臣於抵任之後仰體我皇上軫念民生之至意隨即飛飭各屬州縣詳查所屬地方之秧種曾否栽齊雨澤有無霑足據實開報種栽蒔青長茂盛又據江西所屬州縣陸續詳報俱稱雨澤應候秧苗皆已插齊各等情到臣內又據稱溢漫等處俟水勢漸平仍可望插秋苗等語稍有低昻然俱稱比之春季大覺平減臣自身抵江省以來目睹雨澤之調勻隂晴之順候乃知三奏報恭慰聖懷謹奏此等奏報務須據實無隱絲毫不可涉於粉飾雍正四年七月二十日署理江南江西總督印務總兵官臣范時繹謹奏為恭謝天恩事竊臣荷䝉皇上隆恩命臣署理兩江總督印務臣於請訓之日曽經奏聞宋參知政事范仲淹係臣二十一世祖祠墓俱在蘇州仰懇天恩乞於公事赴蘇之日身往展拜並得將所在族人嚴加教戒業經叨䝉恩允兹臣於在蘇公事之餘獲便道展拜至於在蘇臣族臣素無往還曽經識認者亦不過一二人除祭拜之次槩不接見更出示嚴加約束務期各安本分共樂升平伏念臣家自從龍以來世受國恩逮臣之身遭逢殊恩者更逾尋常今復以奉命之榮俾往代先臣得邀恩於千載之後即臣之沾被髙深於靡涯也臣無任感激歡忭之至為此繕摺恭謝天恩謹奏但宜務實以實心效實力一切據實無欺即為報朕勝如此奏多矣冉爾㑹商耗羡一摺留中前已有嚴㫖密諭張楷並經飭諭直省各督撫此事要須爾等細心商定者朕實代爾難立主見但爾乃蒞任之初且聼張楷作何辦理為是雍正四年八月十五日署理江南江西總督印務都統臣范時繹謹奏為具報禾苗長發情形恭慰聖懷事竊照兩江今歲禾苖緣當初夏之際獲雨各有先後因而插蒔之時間有遲早今查通省禾苗皆已及時插種種後又值雨水調勻現今官民交相慶祝其沿江濵湖州縣間有低窪之處不免水潦經臣一面委勘撫恤一面㑹同安徽江蘇撫臣等㑹疏題報外今臣查據兩江各屬詳報禾苗情形僉稱禾質青蔥長發茂盛並僉稱現今米價平減照常各等情形詳報前來臣復歷採輿論俱稱幸喜七月以來晴明較多雨水較少其低窪之田待其水消補種再臣查江西通省禾苗除宜春鉛山大庾三縣報稱早禾六七分收成外其通省州縣具報早禾收成俱各八九十分不等臣謹將兩江禾苗情形繕摺奏聞謹奏實慰朕懷但能竭誠秉公以為國為民之心對越天地神明斷無不昭示感應風雨以時之理爾等督撫職任關繫甚巨莫易視之此理須實心確信不疑方不有負朕之任用也時刻勉之敬之同日又奏為據實奏明仰祈聖鑒事竊臣於抵任之後深念錢糧事務上關國帑先將安徽布政司庫貯銀兩按冊盤查並無虧空照例移咨安徽撫臣魏廷珍候於奏銷㑹題外今臣前至蘇州又經㑹同撫臣張楷盤查江蘇布政司庫貯銀兩據布政使漆紹文冊報應存實在銀一百四十八萬八千二百七十兩零內有候欵歸補銀三萬五千二百三十四兩零現無存庫稱係前任布政使李世仁鄂爾泰並該司各任內因公動支尚在候欵歸補外查明實在貯庫銀一百四十五萬三千三十六兩零隨將盤查清冊候欵歸補緣由照例移咨江蘇撫臣張楷候於奏銷時清查㑹題外臣仍嚴飭布政使漆紹文限於本年奏銷之前亟將候欵歸補等項諸欵催歸貯庫倘歸補逾限即屬虧空臣即查明題參斷不敢因仍緘默私相容隱合謹繕摺據實奏聞並將該布政使漆紹文冊報候欵歸補各項銀兩附具清摺恭呈御覽謹奏知道了應如此者百凡悉照此據實無隱自然永久䝉朕之眷注也勉之檢舉一摺留中俟張楷來靣詢張楷甚不妥協朕欲黜其江蘇之任觀其一切奏對悉屬悖謬之極江蘇官民作何評議及伊居官實蹟如何之處爾其據實奏聞同日又奏為奏聞事竊臣於雍正四年八月十四日據淮安府山陽縣並淮安城守營參將等同日詳報僉稱本月初七日定更之後有遊巡兵丁報稱當夜忽有一人同更夫扭結一人來到營房值有千總吳俊在汛身往驗看同見被扭之人認係淮關監督慶元家人康二隨問扭結康二之人是何姓名因何事故據云我是淮徐道之子姓潘正在說話間突然闖進淮關內使數人强將康二搶去彼時衆人之中但認得二人一係康三一係姓沈大衆疾去如飛無從詢其原由後詢淮徐道潘尚智之子據稱今有慶監督還我的銀子一萬一千兩裝做十一包放在五乘轎內要擡往百子堂去今被他內使多人齊來上前搶轎內銀子我所以拉住這個內使到營房裏來的等語該千總隨趕至百子堂查看果有轎子五乘內尚存銀六包隨問轎夫你銀子是從何處擡來據稱此是潘公子的銀子自淮關署內後門擡出來原是十一包今只剩六包那五包是關上內使搶去了等語遂押交該縣去訖又據該縣詳稱當即訊問轎夫等口供大略相同各等情到臣臣按閲之下不勝駭異查慶元身係差員掌收國課豈宜别有贏餘夤夜給還潘姓更查潘尚智係經嚴參現在勒追虧空之人乃有銀兩藏託於慶元之家再查慶元身任淮關積年以來每每假借聲勢任意縱橫其間必有指稱詐賄於從前調停彌縫於事後種種情事在所不免况此案不過偶一敗露便有一萬餘金之數而潘尚智之與慶元或别有囑賄夤緣藏匿國課情節更未可定除移行淮關監督慶元勒解康二等并一干搶犯到日飭司嚴審確情外臣念慶元身係京員且恐將來差滿回京難慿質問合謹繕摺奏聞或仰候皇上諭交內部審訊或欽差京員到南審訊之處統祈睿鑒施行謹奏此事經河臣齊蘇勒奏聞已差京員前往察審矣雍正四年八月二十八日署理江南江西總督印務都統臣范時繹謹奏為奏報事竊臣看得江寧省城附近地方於本月初四日起隂晴不定連有小雨每日或一二次不止接連數日至十三日方始開霽後於十六日起又復隂雨十七日大雨一晝夜十九日晝夜大雨晴後於二十四日漸次晴朗業已雨止彼時經臣差員四外看問據稱山田均無妨礙窪田水聚難消晚禾花豆收成將來恐減分數倘後此隨即晴明尚亦不至成災等語除臣正在遵㫖入闈監臨科場事務業經另行飭勘隔逺地方雨水多寡曽否傷稼容臣於揭曉之後再將年成實在分數繕摺奏聞外謹將近日江省附近雨水情形先摺奏聞謹奏朕前諭秋成後方敢確信斯言果不誣耶朕誤用張楷地方上何望雨暘時若爾前稱朕之洪福今可推諉朕無福乎爾等封疆大吏比古諸侯實主生民社稷所關甚巨朕頒諭直省督撫曽褒奬田文鏡李衛楊文乾試看此三省今歲收成若何所以爾等督撫朕用得其人朕福斯大不可言倘誤用匪人朕即無福矣如此論福鑿鑿可據若專靠朕福任意營私舞詐而欲文武調協兵民舒暢地方安輯時和年豐無是理也欲求此效莫若以至誠格天覽爾前奏似覺有髙興光景洪範庶徵曰狂恆雨若若然則多雨咎徵或係爾所感召亦未可定戒慎恐懼時刻不可去諸懷抱勉之敬之同日又奏為遵㫖覆奏事竊臣於到任後細訪前任督臣查弼納居官操守尚無貪婪之蹟但有稱其於保題武職官員事後遇有餽謝尚敢收受之語再查查弼納在總督任內每歲有安徽江蘇江西藩規銀各四千兩江安糧道銀三千餘兩再鹽規銀二萬四千兩外又小禮銀一千二百兩照常收受為公用日用之費經臣察訪明確據實奏聞臣再看得江寧將軍臣伊立布自到任之後凡事頗知勉勵其約束官兵亦能嚴整但人多謂其較之前任甚屬刻薄者蓋緣向年以來駐防官兵日就縱弛至不堪言遇有事出而將軍與該管官百計袒護漸至怙過不改積習難除今伊立布嚴加約束不肯因循小人等不得遂其為非因而人言藉藉然而官兵習氣則由此可望振刷矣再臣察伊立布居心為人凡遇事務不免性情褊急聰明自用往往自滿之心自得之象見諸詞色所有將軍臣伊立布到任以來居官為人情形臣不敢飾諱合併上達皇上天鑒謹奏此奏甚屬公當評論伊立布絲毫不謬朕意伊立布一到江寧必招物議今果如此但要伊實心為國家效忠日久人自知也諒伊必不負朕知遇爾其和衷料理以移易旗兵之陋習雍正四年十月十九日署理江南江西總督印務都統臣范時繹謹奏為欣承聖訓仰荷恩頒微臣感激恭謝天恩事竊臣齎摺把總回南恭捧硃批諭㫖並欽賜哈密瓜到臣隨恭設香案望闕叩頭謝恩訖臣跪讀硃批欽承之下彌增感惕伏念臣以謭劣之材䝉皇上委用兩江重任於到任之初見雨水調勻禾苗秀發據臣迂淺之見遂以預擬有秋遽爾入奏實屬冒昧䝉皇上聖諭指示臣始頓悟前非正滋惶恐逮至八月間隂雨過多不敢壅於上聞繕摺奏報臣於彼時倍深刻責寢食難安今復凛奉硃批荷䝉皇上教訓詳明仰見皇上敬天勤民之至意推己及物之深仁今臣昏惰之極不自整飭有負委任仍䝉皇上施恩格外不加譴責訓誨包容引經教誡臣不勝感激戒懼從此益加檢束彌切寅畏斷不敢稍自疏縱以下誤地方而上厪聖懷也理合具摺恭謝天恩謹奏觀爾有張皇莫措光景勉之此任非比馬蘭關只辦一實字遂可稱職兩江事繁覺有不能景象惟以安靜詳審為務急切求好則大誤矣徐徐經理一切明白後方可見諸施為萬不可急遽愼之一字最要雍正四年十一月初二日署理江南江西總督印務都統臣范時繹謹奏為事關錢糧銷補據實奏聞事竊查修造天津戰船一案原准部咨為欽奉上諭事內開江南成造大號趕繒船六隻小號趕繒船六隻舢板船十二隻曽經遵將司庫正項錢糧動支修造已於本年六月二十二日具報完工嗣據江蘇布政使漆紹文詳稱上下兩江各委官等具領辦料銀兩共經發過四萬二千六百三十兩零臣念此項動用銀兩支領過多難憑銷補亦曽咨詢閩省開銷之例如江南所造船數約略估計僅值六千五百六十餘兩較之用過銀數大相懸殊臣隨屢飭查核再四駁詰據承委各員僉稱辦用物料俱係採覔樟木竝所需釘鐵油麻分外加料又稱在承辦之時督撫有但儘力修造不必計費之言所以支用過多等語臣念應需物料縱係逺出採買亦不至經費逾格至於若此況既稱不必計費儘力修造則彼時上司自應督催委官不時監察令其堅固方為合式今駕送船隻舵桅損壞明係經管之督撫上司罔知節慎不過故示急公之語而承委各官遂得任其浮泛之用究致貽誤欽工而虧缺國帑今雖上下兩江藩司籌畫彌補議及協貼議及公捐終屬以緩濟急帑項現在虛懸彼督修承修等官始而不妥議奉行繼而不查核節慎以致支用浮多不敢請銷貽纍通省公捐而從前之督撫承委等官轉得優游於事外豈為平允臣查修造戰船支領銀兩除可以請銷數目外所有浮用銀三萬六千餘兩請著落督修之督撫竝承修等官各名下照數分賠庶乎各屬無庸公捐而帑項不致懸虛矣為此謹奏所議殊屬未協浮冒銀兩自當責令分賠如不能賠補應作何處分從何著落如此議確方可允行也雍正四年十二月初六日署理江南江西總督印務都統臣范時繹謹奏為欽奉諭㫖察明奏覆事前臣接奉欽發原任江西安福縣知縣劉學愈奏請分縣一摺奉硃批諭㫖有人條奏此事爾可徐徐察明應行與否密議奏聞欽此臣隨悉心詳查得江西之安福永新兩縣地方皆傍大山綿亘通聯俱有上西鄉二處地名相同地方相連中有分水亭為兩縣分界之處因地方僻在山陬去城窵逺蠻野性成每當徵收之時差役不能制服是以歷來兩縣錢糧舊缺未清新徵不足揆厥所由皆緣去官既逺化導未周徵收不便之故也臣今查兩處上西鄉地方課賦合計約有一萬四千餘兩居民散處恃逺刁悍兼有流寓棚民雜處於荒山窮谷之間該縣令實有瞻顧不及之虞若將兩處歸併專設一縣自能就近治理查永新縣之連化地方舊有同知空署可以改設縣治但臣伏思改設縣治未免重費經營抑或仍遵舊制移令該同知駐劄連化親蒞教誡以資化導亦屬相宜臣謹將地勢民情備細查明密議奏聞仰候皇上睿鑒施行再臣於分設議內仍有請者若設縣治則有倉庫城垣俱需防護應請另添一營增設守備一員把總一員馬戰守兵照永新營制依例增設若止移駐同知亦應添設千總一員量添守兵五十名以資彈壓臣謹據臣愚昧之見一併具摺奏聞謹奏再加細訪確議具疏題奏將飭發條陳緣由疏內不必叙入同日又奏為欽奉硃批諭㫖微臣感激恭謝天恩事竊臣標齎摺把總回署臣謹接奉硃批跪讀聖訓臣當瞻奉之頃具知睿鑒之聖明如對天顔之和霽隨恭設香案望闕叩頭謝恩訖伏念臣自署任之後諸凡叢脞未效寸長蚤夜捫心實深愧懼幸得仰奉恩綸過䝉勉勵鑒知臣於此任實有張皇莫措光景俯加體恤教導周詳似此聖恩實有加厚於寵恤榮褒之外者臣非木石不禁稽首涕零五中激切又䝉諭以安靜詳審不可急切求好徐徐經理一切明白後方可見諸施為萬不可急遽慎之一字最要煌煌天語教誡明切惟有凛遵恪奉盡臣之心思竭臣之精力從此事事詳審刻刻敬慎勉期不負我皇上教誨之恩矜全之德於萬一所有微臣欣承聖訓感激愚誠合謹繕摺恭謝天恩謹奏好之一字欣羡不得不好二字畏避不得大學云心有所好樂恐懼皆不得其正百凡惟宜靜待事來順應任其紛雜目前所辦者不過一事耳一事畢然後又辦一事如理亂絲終有頭緒勤字最為要緊然欲勤若非以誠格神默助精力亦恐時有不逮爾其遵奉行持試看驗否更須慎防受人欺誑至要至要雍正五年正月初二日署理江南江西總督印務都統臣范時繹謹奏為聖世嘉徵協應黃河效順澄清恭賀上瑞敬抒歡誠事雍正四年十二月三十日據淮徐道詳報所屬上自虞城縣下至邳州交界一帶黃河於本年十二月十六日澄清又邳睢交界起至古城止並桃源縣所屬一帶黃河於本年十二月十七日澄清實屬千古竒逢相應飛報以紀嘉徵等情前來臣接閲之下不禁抃舞踴躍之至欽惟皇上德備中和功崇位育兹當歲序更新之候正值皇上大慶之年天錫純禧頌春臺者千八百國河流清湛綿寶厯於億萬斯年臣躬際昌期欣逢瑞應仰無疆之仁夀歡忭彌殷瞻有道之化成賡揚恐後祗緣時值遵例封印不及恭疏題報今謹繕摺先行奏賀為此謹奏此實天錫嘉徵然我君臣正當自兹倍加寅畏候另降㫖由部頒發同日又奏為欽奉諭㫖恭謝天恩事雍正四年十二月二十六日江寧將軍臣伊立布陛見回任臣謹率屬出郊跪請聖安伊立布密傳上諭臣俯伏跪聆仰䝉皇上天恩髙厚聖訓優容臣於欽奉之下感激惕勵交集於中隨望闕叩頭謝恩伏念臣以武職出身於吏治民情實未諳練自䝉皇上殊恩任用署事以來事事荷聖主之矜全時時䝉王言之指示恩出格外感溢五中今復䝉皇上念臣之庸劣鑒臣之愚誠訓諭逺頒洞燭肺腑臣何人斯叨䝉若此唯有凛遵聖訓實力奉行以期上報髙深於萬一所有微臣欽奉訓㫖感激愚情合謹繕摺奏謝謹奏應感謝者常能受寵若驚自必悠久䝉眷若稍肆志則境亦隨之天難諶三字時刻不可去諸懷也慎勉為之雍正五年正月十九日署理江南江西總督印務都統臣范時繹謹奏為奏聞冬雪均霑春耕裨益事竊臣查上江各州縣除寧國太平廬州三府並廣德六安二州所屬地方俱於去年十月二十三四等日先期得雪外又於十一月十四五六等日以及十二月初三四五等日通省州縣俱報得雪大槩霑足又查下江地方通省州縣俱於十一月十四五七等日連次得雪又於十二月初三四五等日各屬州縣盡報得雪通省霑足上下兩江二麥可卜豐收農民俱各歡忭冉查上下江入冬米價歷據報稱俱皆照常即當兹歲暮春初之時亦未稍有加增萬口歡呼人情安樂臣身任地方目矚輿情實深踴躍理合奏聞謹奏覽奏冬雪米價情形深慰朕懷大凡身任牧民之責者但能以誠敬二字對越神明則穹蒼之感應朕可保其必然至於後天作用任其聰明才智學問本領非徒無益而有害也此理信得及一分受一分福信不及一分增一分孽若肯於此加勉能事畢矣勉之慎之雍正五年二月十三日署理江南江西總督印務都統臣范時繹謹奏為奏聞事雍正五年正月初四日准户部咨開為欽奉上諭事荷䝉皇上仁恩浩蕩俯念江省去歲雨水稍多間有歉收既經䝉恩賑恤今復預籌積貯以濟民艱更諭以被災地方徵漕緩半又特遣京員確查存漕米石分别留運平糶臣除將欽奉事宜俱謹遵照奉行外今欽差左副都御史臣鄭任鑰户部員外郎臣保住等業於正月二十九日到省經將江安糧道存貯還漕之米二萬八千五百八石零一一盤兑皆係實貯清查已訖當於二月初二日江蘇撫臣陳時夏到省㑹商臣等謹念事關題臣謹先摺奏聞恭慰聖懷再臣復有奉到欽奉上諭事雍正四年五月初一日准工部咨開㑹議得條奏內稱疏濬淮揚運河行令總河㑹同總漕江南日期恭疏題報外今臣於本月十三日自省起行前赴淮揚一帶㑹勘河道合併奏聞謹奏覽雍正五年三月十二日署理江南江西總督印務都統臣范時繹謹奏為遵㫖覆奏事竊臣遵㫖查得江寧府知府郭如楩本非老練長才但辦理事務尚能供職未至貽誤操守亦祗中平再觀其存心雖屬謹飭然不免留心趨避於本管司道用意聯屬同官之中好事結納凡意見不合者即故為抗持以示孤介是皆久於外任積習漸染經臣屢加教導近雖知警戒但積習未除非老成可任之員臣䝉皇上諭㫖垂問合謹據實奏聞謹奏所奏郭如楩甚公如可以造就有成則應姑留以觀後效若竟不稱職省府要任豈可令其貽誤候朕調來審觀酌定雍正五年三月二十四日署理江南江西總督印務都統臣范時繹謹奏為奏聞請㫖事竊照表率屬員必需幹練之材而兼綜府務尤冀久成之效臣看得廬州府知府趙向奎到任方及三月兹據該員呈報請丁父憂前來臣查職官丁憂著有成例何敢冒昧陳請但念廬州一府民風吏習頑敝日深更兼合肥一縣附郭府城積年以來錢糧玩缺盜訟頻仍正需强幹勤敏之員整頓革除臣查趙向奎前任嘉定縣任內凡於除暴催科多能實力奉行歷有成效上年趙向奎升授知府臣方深幸皇上委用得人詎意該員今報丁艱臣緣地方事務起見既不敢因循成例貽誤地方又不敢逾格乞恩遽題留任今特繕摺奏聞仰乞皇上俯念地方關繫得人為要得䝉恩諭該員在任守制實於地方獲有裨益合謹奏聞伏祈皇上睿鑒施行謹奏趙向奎實心任事之員應留任者已有㫖諭部矣但恐其失之稍急而過莫慮不及整飭屬員當激勵此風如假借和平安靜之名而一味因循瞻狥此鄉願之習宜力為振刷屬員趨向全在爾等好惡去取間也至其氣質之偏無心之過要須寬恕而成全之爾等責任除察吏二字外無别事也勉之勉之同日又奏為請㫖事雍正五年二月初八日通州知州李世裔到省轉傳上諭為通州水口建閘一事臣謹於㑹勘淮揚一帶河道之便即㑹同撫臣陳時夏於二月二十九日抵通連日率同該知州等赴各水口查看查得通州水口雖多惟觀音壩鹽倉壩唐家壩三處水口最關緊要但觀音壩地係流沙難以建閘鹽倉則係廢壩建立閘座不若仍將舊壩修築旱則可蓄潦亦可開惟唐家壩離城不逺若修理閘座開濬淤塞以時啓閉則水旱皆可無虞矣適臣等有公同赴淮之便歸途順赴通州勘明建閘築壩情形繕摺奏聞請㫖批示倘䝉俞允准行則唐家壩原有閘座不過略加修整其開濬淤塞費亦無多統俟奉㫖准行之日飭令地方官逐一勘估工料造冊具報臣等另行題明酌動帑項修理謹此合詞具奏並繪圖恭呈御覽伏乞睿鑒批示遵行謹奏通州閘壩朕未身經目覩所以諭令爾等斟酌應行者具疏題奏不宜者於疏內聲明此亦爾等現行現議中事也雍正五年閏三月初八日署理江南江西總督印務都統臣范時繹謹奏為奉到密飭上諭事雍正五年三月十六日接奉內閣密封上諭一道臣謹祗受訖伏惟黜幽陟明實國家之大典而賞善罰惡乃王法所當行我皇上以善望天下以正導人心久矣化行教溥即頑梗之凶苗盡已革面革心輸誠向化乃猶有董起弼等類者奸惡性成潛行竄匿所犯情罪已屬難容漏網脫逃尤當不赦臣身任地方久奉諭㫖雖經節次嚴飭多方跴緝尚未弋獲自顧疏忽正兹惶懼今幸䝉皇上密降諭㫖更䝉指示周詳臣謹欽遵奉行於臣屬各員切實飭知備細指授務期設法派人重懸賞格嚴行稽查加意盤詰斷不使匪類得以漏網而臣等地方官辨自貽罪譴以上負天恩所有微臣奉到密諭欽遵緣由合行繕摺奏聞謹奏一切緝捕人役當開列一單置諸左右不時密飭屬員令其勤加察考如能緝獲者格外賞賜以示鼓舞如此方為勸懲之道若虛應故事致令姦匪漏網以為寬仁則大誤矣勉為之雍正五年四月二十六日署理江南江西總督印務都統臣范時繹謹奏為奉到硃批諭㫖臣謹欽遵事前臣覆奏江寧府知府郭如楩一摺奉到硃批臣已跪讀欽遵訖今更䝉特㫖調令來京引見業准部咨到臣現經給咨該員俟代署接任當即催令赴京再臣又奉到臣奏請廬州府知府趙向奎在任守制一摺跪讀硃批仰䝉皇上垂念地方恩諭趙向奎在任守制俾臣於地方事務獲資臂指趙向奎荷䝉任用自當益加奮勵更令通省臣庶皆知我皇上體察吏治之盛心委用臣下之至意自無不鼓舞奮興共相效法者乃臣更䝉訓諭令臣留心察吏勉力奉行臣唯有敬謹體認務期與闔屬官吏一體奉行仰圖報效斷不敢浮慕虛名因循廢事以上負皇上成全造就之深恩所有微臣奉到上諭感激欽遵下悃理合繕摺奏聞謹奏覽惟宜務一實字將爾漢軍虛僞習氣除盡方好少留纖毫貽纍不輕後悔莫及勉之勉之雍正五年五月十四日署理江南江西總督印務都統臣范時繹謹奏為奏報二麥收成分數恭慰聖懷事竊臣查上下兩江各府州縣二麥收成分數據報自六分以至七八九分不等惟上江之和州廣德二州以及所屬縣分有報稱隂雨過多氷雹偶傷之處然統計收成皆有六分以上其下江之江寧縣地方間有墟田報稱被淹者一二處又丹徒縣亦偶因雨雹間有損傷一二區者雖江省今歲麥熟未至十分然實溥遍均平頗覺豐足各處米價當青黃不接之時尚不甚昻現今二麥登場將來自可平減再查江省雨水在初夏之時甚屬霑足現在插種秧苗將及遍滿臣自江寧赴常秋審在途一路目矚歡情合謹繕摺奏聞謹奏深慰朕懷果如所奏統計大勢有秋其中不過一二村莊氷雹損傷無多爾等力量可以料理俾不致失所自不應具題致駭聼聞也但須一一據實絲毫不可隱飾雍正五年六月初五日署理江南江西總督印務都統臣范時繹謹奏為恭謝天恩事竊臣前往淮安㑹同欽差户部郎中臣額爾成格等暨上下兩江撫臣丈勘新淤地畝途次常州接到臣標齎摺把總齎回硃批奏摺並恩賜香定一匣到臣臣謹望闕謝恩祗承之下實深感激倍切悚惶惟有頂戴聖恩克勤臣職圖報髙厚於萬一合謹繕摺聞者今臣會同欽差官員查丈新淤地畝業經臣先委廬鳯淮徐各道及府縣各員飭將上江省屬之泗州虹縣下江省屬之桃源睢寧宿遷各州縣一帶新淤地土分别界址詳加察考已據查報桃源睢寧宿遷三縣約有一萬三千餘頃其泗州虹縣地方亦有新淤正在確查再臣於未事之前察知新淤一帶地方多不敢漫信屬員之隱瞞惟期妥協辦理經畫久長臣今身歷各屬得瞻大地之平衍仰識格事竣之日另疏會題外所有地方民情新淤大勢合先繕摺奏聞謹奏覽同日又奏為請添監督之員以專責成酌分承修之厰以重趲可無遲誤惟蘇松二厰共有應修船六十隻又舊案未完船二隻為數較多不能依限報完揆厥所由實緣從前改歸道員厰所岐分不能親身督率之故查原奉部議委道官一員領銀修造今以一道而司三厰之事不免有顧此失彼之虞雖曰每厰各派㕔官一員分司其事而官小責輕仍與舊例之州縣承修無異雖經臣嚴加申飭節次督催每每完竣愆期今臣備荷殊恩身膺重任於海防要務敢不詳悉籌畫據實陳戰船以鎮揚二厰仍照前委歸江鎮道管理其蘇厰並外有之松厰即可分委蘇松道就近管理庶幾官能兼顧事有專司監督之道員得以往來查看不致有失察之咎而承修之㕔員亦不以官小責輕相沿玩忽矣臣謹繕摺奏聞仰乞㫖再臣復有奏聞者查修造船隻除動帑之外舊有協貼之項經前議疏內聲明乃各州縣視為捐欵起解遲延監督承修等官往往不能應期凑手以致稽誤隨領隨給不致藉口擔延實於公事有濟合併附摺奏聞謹奏此事全在爾委任責成具題亦可咨部亦可即徑行委辦亦未為不可部議一道三㕔不過議其大槩耳或三道二道四㕔五㕔若有廉幹之員任爾添委承辦何須如此作難煩瑣請㫖遇事擔當不避嫌怨是乃大臣之責若止以潔已謹飭自便恐反致誤事切戒切戒雍正五年七月十五日署理江南江西總督印務都統臣范時繹謹奏為奏聞事竊臣據淮安府知府劉之頊詳稱本年七月初四日因奉調在清江浦同欽差丈量淤地適淮揚道亦奉調在浦於初五日申刻忽聞漕標左營兵丁在城嚷閙赴縣交甲等信該道府隨皆星飛回淮至朱家溝汛地見有船三四隻裝載多人問係左營兵丁口稱副將興王政待兵刻薄我等情願退兵為民併稱已交盔甲必欲告狀等語該道府隨即再三理諭衆兵俱皆入城僉稱只求轉報做主等語仍將盔甲八十三副堆放縣堂齊集廟內不散各等情詳報前來臣又續據淮徐道康宏勳禀稱事緣副將興王政辱罵兵丁責革太過因而聚譟騷擾又稱彼時衆兵沿街鳴鑼逼勒百姓罷市拆毁領旗房屋又亂搶淮城米鋪一家以致百姓罷市三日各等情禀報到臣臣念漕臣押運赴北現今彈壓無人不敢分别彼此輕視地方隨委鎮江營參將前往淮安會同知府曉諭各兵照常歸伍並嚴查該副將刻薄致釁緣由據實詳報又經批飭司道飛查起事情節備細通詳去訖現經臣查據府詳另疏題參外所有官兵多事臣業經委員曉諭兵丁嚴查營將緣由合先據實奏聞謹奏已有㫖矣可嚴行察審毋縱毋枉兵丁離伍聚譟千犯法紀此風不可長其情狀可惡者即一名亦不可寬免雍正五年八月二十三日署理江南江西總督印務都統臣范時繹謹奏為荷䝉聖訓恭謝天恩事竊臣前奏覆江寧府知府郭如楩廬州府知府趙向奎二摺叨奉恩㫖經臣奏謝原摺齎回內䝉硃批訓諭臣祗領開讀伏念臣才識短淺負疚良多䝉皇上諭訓頻施優容格外俾得遵循勉勵圖報髙深臣等漢軍習氣本多虛僞此臣子不可一刻存之於心一毫用之於事自取罪愆者也幸䝉皇上俯念臣愚特加訓誡欽承之下感愧滋深臣本微末旗員䝉皇上超拔擢用五載之內驟至今職寵出望外逈異尋常撫心自問受我皇上如此深恩正宜竭盡純誠上思報效之日何敢同流合汚自貽罪戾惟有將歷來奉到上諭存心體認實力奉行於漢軍虛僞習氣痛加改悔凛遵恩訓一念不忘終身勿替以期上報隆恩於萬一所有奉到諭㫖理合繕摺恭謝謹奏自朕即位以來非分被擢者不可枚舉內並無一藩邸私人而背恩負國之徒往往多有所以朕亦難以君子之心度小人矣爾果能存此心獲福不盡不能堅此志為害無窮但照所奏言行相符則是矣至爾所保薦之員甚合朕意操守可謂上好其餘雖無可褒嘉朕諒爾未諳能此二者根本已立諸務熟練後自必有為矣勉之勉之雍正五年十月十八日署理江南江西總督印務都統臣范時繹謹奏為恭謝天恩事竊臣標齎摺把總捧回硃批奏摺並恩賜哈密瓜到臣隨恭設香案望闕謝恩臣欽承聖訓仰荷恩頒驚寵錫之自天彌悚惶而無地問心滋愧頂戴難勝伏念臣庸愚下質自知謭劣䝉皇上天鑒因臣保薦人員恩賜指示勉勵後效又䝉皇上俯察臣操守不以臣為貪劣奉兹溫諭愧懼尤深唯有恪遵聖訓時加警惕不以嫌怨之端輒生畏避不以請託之故稍涉偏私堅持此志實力奉行以上報隆恩於萬一為此繕摺奏謝謹奏所奏好竭力勉為之知人則哲原係甚難之事但不可過信屬員當隨事隨時體察非疑也乃詳細鑒别之道也能不被人欺惑諸務何難就理同日又奏為奏報秋成分數恭祈睿鑒事臣謹看得江南地方素稱澤國地多窪下沿江傍湖之田於夏秋之次緣江潮湖溢不免水患業經撫臣等㑹同題報查勘在案然數處被災於秋成大勢不相妨礙經臣歷查江省地方夏秋以來晴雨適中禾苗茂盛目今早稻俱已登場晚禾亦皆次第收穫兹臣查上下兩江及江西省各屬地方秋成分數自六七分以及八九十分不等大槩皆屬豐收並查現在米價日就平減即有一二薄收之處移豐濟歉將來米穀諒亦不至缺乏騰貴合謹據實奏聞謹奏覽奏秋成分數深慰朕懷雍正五年十二月初十日署理江南江西總督印務都統臣范時繹謹奏為恭報瑞雪及時恩膏溥遍事竊臣前奉諭㫖會勘淮揚水利淤田在途之次據上江通屬州縣報稱於十月內得雪一二寸或三四寸不等下江州縣同時亦有報稱得雪之處又臣於十一月十八日回至揚州地方值本日天氣濃隂始則微雨繼而成雪接連入夜至二十日辰時方始開霽不分髙下田原悉皆霑足臣幸際時和欣逢上瑞並覩官民交慶咸稱帝澤彌綸嗣臣於抵署之後備據兩江地方州縣次第報稱十八九二十等日咸得瑞雪深者八九寸以至逾尺即最淺者亦皆六七寸不等僉稱今冬得雪十分霑足於來歲春田大有裨益並稱現今米價平減民食豐裕臣謹念今歲江省已獲有秋乃復瑞雪及時盈寧預兆彌仰我皇上仁慈育物誠敬格天俾臣民戴澤均無涯涘所有恭逢瑞雪日期合謹繕摺奏聞謹奏朕日理萬幾刻無寧晷毫不體朕且值歲底事繁那得工夫覽此幕客閒文况朕屢經訓諭只待秋成方可釋懷冬雪不過來年預兆耳何至如此誇張聲勢觀汝並無兢業之心若屢訓不悛則為下愚不移矣同日又奏為遵奉諭㫖事竊臣接到兵部遞至和碩怡親王大學士張廷玉寄字內開雍正五年十二月十二日奉上諭聞得江南徐州之南六十里地名呂梁呂梁之南二十里地名雙溝此一帶黃河水程時有賊船出沒行旅時受其害甚不安靜不知總督范時繹何以不能查拏禁止爾等可密寄信與伊知之欽此欽遵到臣臣於奉命之下自維踈失悚惕滋深伏念江南河路多係宛轉奏聞謹奏覽同日又奏為奏聞事竊臣接到內閣寄字內開怡親王大學士張廷玉轉傳上諭祖秉圭之母年逾七十因貴州路逺且盤費不敷未曽前往祖秉圭任所至今尚在安慶今祖秉衡補授大同總兵欲迎養伊母爾等可寄信與范時繹魏廷珍或酌量幫助盤費或給與驛遞夫馬並遣閒散微員送到大同任所欽此欽遵到臣仰見我皇上聖恩髙厚愷澤周詳俾祖秉圭之母得以遲暮有依祖秉圭之身得以殫心供職不獨祖秉圭母子兄弟身受隆恩者頂戴髙深即臣於恭奉上諭之下實不禁感激思奮踴躍奉行隨咨會撫臣魏廷珍並即遴委老成謹慎閒散微員令其星速賫資前赴安慶公同撫臣幫助銀八百兩以備長途之用業於十一月十九日自安慶起程由陸路赴大同總兵任所合謹奏聞謹奏不能緝盜以靖地方察吏以安百姓偶爾小事何須此一篇虛文於此等處以為遵㫖盡職可乎雍正六年正月二十二日署理江南江西總督印務都統臣范時繹謹奏為欽奉聖訓恭謝天恩事竊臣前覆奏嚴緝徐州之南呂梁雙溝一帶水程賊船原摺奉到硃批臣於跪讀之下不勝警惕愧懼痛自刻責豈惟臣迂疏浮泛痼疾難逃洞鑒即屬員玩誤積習臣未經竭力整飭之處亦在聖明照察之中臣當欽奉之際不禁浹背汗流惶悚無地所有該地方賊船奸匪臣謹加意設法又經密差精細幹員暗訪查拏更復酌設巡船以資捕緝務期地方寧靜商旅安行臣不敢泛泛從事仍蹈前轍上負皇上寬仁教導之至意再臣伏念江南地方河路甚多其間奸匪出沒害及行旅亦所不免臣更得凛遵聖訓推廣奉行一體實力稽查以早為弭止所有微臣欽遵感激下悃合謹繕摺恭謝天恩謹奏覽如此方是治天下急務首在用賢敷教次則緝盜安良二事耳餘皆末節勉之勉之雍正六年正月三十日署理江南江西總督印務都統臣范時繹謹奏為荷䝉御賜恭謝天恩事竊臣齎摺把總回署奉到硃批並恩賜荷包一個內金玉八吉祥十六件臣謹恭設香案望闕叩頭謝恩祗受訖伏念臣自歷任以來事無巨細皆仰賴皇上聖明指示有所遵循無如臣賦性昏庸每因冒昧自取罪愆仍屢䝉皇上格外矜全諄諄訓誡是臣身受我皇上優容教導之恩正臣感激悚惶鏤心刻骨之日也今叨䝉天眷優渥有加無已荷兹賞賜自顧難勝唯有恪遵歷奉恩諭黽勉奉行以期仰報深恩於萬一所有微臣奉到御賜感激下悃合謹繕摺恭謝天恩謹奏兩江重任事雖繁多竭力靖盜乃第一要務勉之當百計思維善䇿可也雍正六年三月十七日署理江南江西總督印務都統臣范時繹謹奏為謹報雨澤霑足麥苗長發情形恭慰聖懷事竊臣欽奉上諭前往松江㑹同欽差郎中臣鄂禮等查勘海塘工程現在㑹疏具青葱又喜二月之內晴雨得宜在在田疇滋生繁盛又看得到處水塘近因連次足雨皆得蓄注盈滿秧稻可資灌溉臣又檄查上江省屬及江北各府屬麥苗雨水情形歷皆報稱二麥長發茂盛雨水霑足入春米價不增民食豐豫萬姓安樂各等情形據報到臣並臣身過地方目矚麥苗長發情形合謹據實奏聞謹奏據奏麥苗雨水情形深慰朕懷直省今春膏澤霑渥誠可謂天恩浩蕩難名但切勿肆志當愈加敬畏黽勉吏治果能令兵民和暢則上天之感應朕可以操左劵也願與諸卿共勉之同日又奏為恭聞恩諭頂戴難勝臣謹瀝情陳奏仰祈睿鑒事竊臣恭讀恩諭命江蘇安徽江西三省撫臣計議臣總督衙門養亷臣一聞恩命百愧交生感激之情實難緘默伏念臣自歷任以來身受格外之恩微末愚誠唯矢不忍欺君不敢負恩之念凡遇屬員餽送以及私賄營求種種嚴加杜絶不敢一毫染指此亦臣分之當然臣職之當盡者乃致上䝉天鑒議給養廉臣不惟感恩無地彌覺負罪靡寧何敢竊操守浮名冒邀聖澤而不據情瀝陳於君父之前也伏念臣衙門舊任相沿原有江蘇安徽布政司每歲平規銀各四千兩江西平規銀四千四百兩江安糧道銀四千兩兩淮鹽規銀二萬四千兩小禮銀一千二百兩江西鹽道口岸引規銀二千兩臣於到任之後將兩淮鹽規一項交貯安徽藩庫歸為正項報部前經臣具摺奏聞其江西省解送口岸引規亦經臣仍發該省司庫存貯歸公今現有三省藩庫平規之項並江安糧道一項臣尚存為衙門支應邇年以來凡賫本犒兵以及奬賞員役貼補零星各項動用并臣衣食薪水之資悉皆取給於此是臣衙門每歲所存平規尚有一萬六千四百兩之數已有養亷儘可足用矣臣身受皇上髙厚之恩不能亷介自持一絲不茍仍復動用平規負罪實深今驚聞恩命感愧交集益慚冒昧於從前何敢復冀殊恩於望外凛栗愧懼莫知所云除將臣總督衙門舊有規項並臣任內己未用過各數目及現在已有養廉不敢冒邀聖恩之處分移三省撫臣懇為查照核議奏聞外仰懇皇上俯念愚誠允臣奏請敕下江南江西撫臣等停其計議具奏庶臣犬馬微忱得稍安於萬一為此瀝情陳奏伏乞皇上睿鑒施行謹奏所奏知道了覽所存之數較之他省督臣養廉仍覺不敷俟三撫議奏時朕再為斟酌雍正六年三月三十日署理江南江西總督印務尚書臣范時繹謹奏為奏聞事雍正六年三月十四日突有外來棍徒直至臣署據投手禀開稱范嵩係浙江定海衛籍身是廕生曽經具摺恭賀萬夀據伊家人自京賫回奉內務府抄發小封內係主子面諭並賜繡寶箭標著臣郊迎恭接開讀等語臣以事涉荒唐隨將所賫等物一一拆看見其旗箭樣式製造怪僻所繫密封外無印信內用黃紙書寫種種不倫且其間字句尤覺支離再令旗外封之硃筆標字全非清書文理事屬可疑隨將該棍犯拘交江寧府研訊今據訊供這是我家人錢忠自京裏拏出來的上年九月內與了他三十兩銀子呌他進萬夀摺子據他說是圓明園繳進的這東西是內務府發出來的又據供錢忠住在定海鄉間今在京裏崇文門頭條胡同開白酒店有家眷的二月二十四日交了這些東西二十八日就起身進京去了又據訊供那上諭並繡寶旗箭據錢忠說是同趙基大家料理弄出來的趙基是福建道御史係寧波府鄞縣人又據訊供身係康熙元年廕生到雍正二年伊父故後經浙江巡撫李衛於雍正四年五月內咨部頂補的等語除現在移咨步軍統領並順天府尹衙門就近在京查拏夥棍錢忠解發來南又經咨查浙江督臣李衛詢明該犯是否廕生曽否咨部頂補有無假冒情弊並移明浙省轉飭該地方官在錢忠本籍嚴密訪拏移解到日以便質審定擬外臣又查范嵩供詞內稱賫到等物係自內務府發出又稱是錢忠同御史趙基大家料理等語今內務府果否發出物件御史內有無趙基其人臣在外任未能確知合謹將所賫抄傳密封繡寶令箭附摺進呈御覽並懇於諭㫖指示之日仍將繡旗等物發回以便拘犯質審臣緣棍徒不法情罪重大不敢隱諱謹先繕摺奏聞謹奏於此奏未到之前阿齊圖據爾來咨已經奏知矣伊現今在京城嚴緝該犯繡旗等物發交來人帶回前郭琪來京引見時抱病甚劇語言昏憒爾宜酌量若不能料理職任內事即當諭伊告休或參奏令其解任如猶可勉强辦理不至貽誤則且不必雍正六年四月初八日署理江南江西總督印務尚書臣范時繹謹奏為微臣戀主情殷恭懇聖恩允賜入覲事竊臣叨荷皇上聖恩令臣署理兩江總督事務於陛辭之日䝉皇上念臣愚昧訓誨諄諄詳明周至更䝉特恩准臣於到任後一年之外奏請陛見欽遵恩㫖感勒難忘伏念臣自到任以來庸愚罔效昏惰貽咎皆歷䝉皇上矜恤包容事無巨細悉邀聖明之教導得以知所遵循是臣之一身與地方事務無不仰藉我皇上聖心之籌畫聖訓之指示者也向因欽奉上諭會勘水利並會查海塘工程等事未敢奏請陛見今臣於欽遵諭㫖等事悉已奉行完竣仰祈皇上鑒臣愚誠允賜入覲俾臣得瞻仰天顔跪聆聖訓不唯臣依戀愚忱得以稍展且於地方重務有所遵循益知勉勵矣合謹繕摺仰懇聖恩俯賜俞允恭候命下之日臣即減從起行星馳赴闕所有總督印務交代署理伏候皇上諭㫖遵行謹奏不必來京汝於陛辭時所領訓諭及於奏摺中隨事陸續所批諭㫖俱未能遵照奉行此外更有何面諭耶江南省第一緝捕盜賊訓練標兵為汝專責而嚴查窩家尤為靖盜要務至於各省因事批答之諭㫖甚明且切若肯抄録時時觀省較面諭更為詳悉何必多此無益之往返况亦耽誤政事似此無故煩瀆寧不念朕日理萬幾之勞乎在爾未必出於至誠在朕實費心目觀覽即此數行硃字殊乏幕賔門客代為書寫也噶爾泰何如其操守品行朕可力保但未知才克勝任否陳時夏魏廷珍何如巡撫斯二人之操守居心朕亦可保雍正六年五月初十日署理江南江西總督印務尚書臣范時繹謹奏為恭謝天恩事竊臣標齎摺把總齎捧御賜皇輿圖十幅並硃批訓㫖到臣隨恭設香案望闕叩頭謝恩祗領訖當即跪讀訓諭內䝉皇上鑒知營兵器械虧缺者多查驗之時率皆預為那借有此積習我皇上聖明察照洞悉營伍之隱弊臣於聞命之下益知警惕務必設法實力稽查以求整理地方緝拏盜賊斷不敢以申飭虛文徒形之於口舌復不敢以因循故套遂輕信於見聞容臣詳審剔除之法通行整理以收實效以除積弊另行奏聞外再臣前奏臣總督衙門養廉之項䝉諭於三省撫臣具奏時再加恩施臣何人斯荷兹天眷俾臣身受之下實不勝感激涕零頂戴難安唯有恪遵歷奉聖訓口誦心維勉力奉行期於地方事務加意籌畫練兵弭盜察吏安民仰報聖恩於萬一所有奉到訓㫖並恩賜皇輿圖感激下悃合謹繕摺恭謝天恩謹奏徒感何益惟勉盡責任中事為要古人云勤能補拙汝原非經濟長才若不借通省之才以為才集衆人之力以為力則不敷用不敷用則必至有所遺誤矣貴能勤察勤問不宜偏聼偏信自心公正何人不可為耳目何事不可增識見舍勤别無他術也於此要費一番苦心方有實效勉之同日又奏為酌歸帑項改定彚交經收之法以杜弊纍事臣查兩淮鹽商向有致送上下兩江巡撫司道以及府㕔州縣經管鹽務衙門規禮一項上江省每年引規銀二萬三千八百七十兩下江省每年鹽規銀九千九十兩前經鹽臣衙門奏明自雍正四年起抵補兩江無著虧空續因安徽所屬虧空銀兩奉㫖不准將鹽規抵補欽遵在案今兩江省分事同一例現將此項銀兩查催貯庫臣伏念鹽規一項既議歸公必期實在自難容其懸闕參差虛存名色經臣屢飭查催貯庫據前任鹽運使張璨報稱各官規項銀兩甲辰綱已經照數支送乙巳綱又經支送過半逮查各官之解交司庫者則尚寥寥無幾多皆諉缷遷延揆厥所由緣拘於分送之例商人致送各官各官自行解庫其間多一轉折遂致岐誤遲延臣愚以為此項銀兩固不可聽商分送亦不可徑交藩庫宜即以商項歸之運庫在交納之商既不致舍近趨逺而經收之官亦便於核實查收臣請嗣後自雍正六年現行之丙午綱起即將上下兩江鹽規引規諭令兩淮商人按時彚齊交納運庫不必仍前分送倘原收各官仍有勒取者許令商人呈明運司據實詳報臣即嚴查題參治罪總期責有專歸事無岐誤庶商省擾纍官易查核而弊端永杜帑項無虧矣臣緣錢糧關係謹據愚昧之見先摺奏聞恭候皇上睿鑒指示遵行再臣查總督衙門亦有鹽規銀二萬四千兩又隨禮銀一千二百兩亦應一並令其交入運庫以期畫一合併陳明謹奏所奏可行爾其斟酌妥確苐恐地方各官或明辭暗索商人有不得不應之情則重復病商仍所不免詳審為之雍正六年六月初七日署理江南江西總督印務尚書臣范時繹謹奏為恭謝天恩事竊臣標齎摺把總齎捧硃批訓㫖並御賜香定一匣到臣隨郊迎至署恭設香案望闕叩頭謝恩祗受並謹跪讀訓㫖䝉皇上天恩教導臣於欽承之下不禁感激涕零且愧且奮伏念臣昏庸下質重荷封疆虛糜廩祿報稱無能更緣受恩深重戀主情殷乃至不揣陳詞罔知冒昧今荷聖恩訓示諭知江南省第一緝捕盜賊訓練標兵係臣專責而嚴查窩家尤為靖盜要務又各省因事批答之上諭甚明且切諭臣時時觀省較面諭更為詳悉煌煌天語至聖至明臣唯凛遵恪守銘勒五中斷不敢面奉心違稍容忽略從此悉心體認實力奉行以期不負皇上勤求吏治訓誨臣子之仁恩於萬一所有微臣奉到恩賜聖訓感激下悃合謹繕摺奏謝謹奏勉之勉之亦不必逺法前人但近觀鄂爾泰田文鏡李衛等當知愧奮彼丈夫兮我丈夫無可遲疑觀望處朕君臨天下六載年逾五旬矣豈肯將國計民生為人狥情面乎是者福至否者禍隨斷然不爽若以因循塞責為平穩之路持祿保身為巧宦之術則大錯矣竭力勉為之同日又奏為謹報二麥收成分數恭慰聖懷事臣謹看得江省麥田今歲雨澤調勻隂晴應候不分髙下等田悉皆成熟俱已登場兹臣查據上下兩江各府州縣所報麥收分數俱有八九十分不等咸稱豐足更喜穫麥之後連得雨澤所在秧苗悉得插遍但自五月二十五日雨後天氣炎熱近日江鎮一帶山田雖未亢旱頗覺望雨臣到省之日隨敬謹齊戒祈禱於初六日雖得微雨未為溥濟臣仍現在䖍誠祈禱一獲霑足另謹奏聞外再前於五月初間連據宿州靈璧邳州各地方報有生出蝻子一二處俱經臣飛飭撲除今已覆稱悉皆淨盡禾苗無傷再臣又查江省各屬米價自麥熟之後日漸平減實屬四野豐寧萬民安樂所有麥熟分數以及秧苗米價情形合謹據實奏聞謹奏夏令但恐雨水過多耳旱之一字似不須愁至於祈禱一節必自問果誠方可舉行今日設壇求雨明日修醮祈晴視若游戲則屬妄舉對人尚且不可豈可對天地神明耶祈禱雖賴一時誠敬然平日若不能仰不愧俯不怍亦未必應也此理須見透始可祈禱自乏感格之誠反疑神明杳渺難明一涉於不信不敬則至不可問矣爾其敬慎為之所更當知者凡遇災患專事祈求尚不如省察過失痛自悔艾上天必賜憐佑蓋地方官民未有無過而降災眚之理也至若蝗蝻為災人力猶可驅除但於初發時即宜盡力督率撲滅若稍懈弛任愚民惰玩致令飛起則為害不淺據稱已皆撲盡之言未可深信若有欺蔽不實貽纍於汝領罪不起也查地方有司之陽奉隂違者嚴參重處一二人以為不實心任事者戒雍正六年六月二十日署理江南江西總督印務尚書臣范時繹謹奏為奏聞事竊臣據遊擊侯宗周禀稱六月初四日夜有千總李宣等在於蘇州之上新橋地方緝獲訪犯魯三並察知該犯即與浙江案內現在查拏之滋泥大王通氣知情隨經從容誘問滋泥大王是何名姓住何居址據供滋泥大王的名呌做希貴卿還有二大王夏士標三大王魯君選又希貴卿之子希元長希貴卿之孫希麻子共有鐵包船五隻帶有器械他的夥盜最多希貴卿是頭兒他們常在丹陽常州太倉崑山吳江及浙江之嘉湖楓涇烏鎮一帶地方往來行劫今希貴卿的本家住在江寧秣陵關又魯君選住在三里灣又夏士標住在太平府當塗縣李岡頭地方等語押犯前來臣即委令把總吳璉親押魯三作眼並委令城守營副將張玉金協緝去後即於當夜據把總吳璉現將滋泥大王希貴卿拏獲又副將張玉金亦於同日將希貴卿之夥盜徐盛先即號稱黃魚大王者一併拏獲解送到來臣隨飭交細加訊問據希貴卿供稱自知敗露將伊先後為匪情形並同夥衆犯以及伊子希元長伊孫希麻子與夥黨魯君選等十餘人現在俱往吳江地方行劫未回逐一供出續又據把總楊明自當塗縣地方將夏士標拏解前來俱各取供在案臣查盜犯內希貴卿徐盛先二名歷據訊質係於上年十二月內臣衙門曽准浙江督臣李衛咨㑹欽奉密㫖查拏在案除將兩犯録供存案先即移解赴浙收審至該犯在江南供出各等盜夥情事容臣逐一拏獲餘犯到日再行關移該犯來南質審定擬具題合謹繕摺奏聞謹奏此案盜犯緝獲甚屬可嘉汝等督撫果若實心盡力天下未有不能辦理之事其奈大家因循玩愒不肯竭盡乃職何謂如此方可保持祿位此風不知起自何時此語亦不知出自何典朕諄諄教誨多中試用始獲田文鏡鄂爾泰李衛等數人耳汝等抱慚與否朕則不知至若朕乏識人之明昧化人之德實自羞愧而日夜為之不寧今因李衛善於靖盜已有㫖令節制下江數府從兹愧奮愈加黽勉清理盜案亦由汝或因有人代勞將捕緝之事置之膜外而不一問亦任汝為之也同日又奏為謹報雨水情形恭慰聖懷事前臣因江鎮一帶地方山田望雨隨謹䖍誠祈禱曽於六月初六七日連得驟雨二次雖可接濟尚不透潤臣仍敬謹自責步行求禱續於初八日據查江北揚屬一帶地方及省城南一帶僉獲大雨又初九日鎮江太平一帶得雨最大初十日江寧地方亦得大雨新插秧苗漸皆滋長自十五日以後天氣又覺晴熱臣仍照常䖍誠祈禱今於十八日又得大雨民田咸稱霑足之至所有江省近日得雨情形合謹奏聞謹奏覽得雨情形深慰朕懷但歷觀江浙地方不過春間偶爾患旱一入夏令每至雨水過多潦之一字亦不可不預為慮及今有新補福泉縣楊興道看來似有才力行止未必端方此人若好則出格好員否則不可測也當留心訪察試用密之勿令人知朕經覿面再三訓諭未知伊能聼從否也同日又奏為奉㫖事雍正六年五月十九日接准提督九門步軍統領衙門咨稱江南頴州霍邱縣居民裴榮呈報為謀反叛逆事據經口奏奉㫖此事雖係荒唐亦不可不斟酌爾差官將原告帶往江南總督范時繹衙門著范時繹差人密訪不可聲張將為首幾人設法誘至案前細問實情再將夥犯嚴拏亦未為遲務要慎密不可造次生事若一聲張便成一番事矣欽此欽遵到臣臣隨委知府吕大雲守備姚士毅一同前去飭令慎密訪誘不得造次聲張去後兹於六月十五日先據禀報在於霍邱地方業將咨內有名首犯設法誘獲除查明已經身故竝老病取保及原告裴榮不能知其住址仍交地方官密查外現據獲有各犯計三十六名並稱多係農業生理窮民看其蹤跡亦無作匪情形先行報聞前來所有此案各犯業經誘獲緣由合謹先摺奏聞謹奏總有裴榮對質真僞可以立辨今既未露風聲有名人犯又已拏獲則事更易辦理矣或係挾讐或有别故秉公審究自無遁情毋因其向為農業現無作匪形迹遂爾草率忽略也立心為大匪之人小惡自必不為須要再四詳慎揆度情理切不可寃抑無辜尤不可因係奉㫖案件急迫從事也雍正六年七月二十六日署理江南江西總督印務尚書臣范時繹謹奏為恭謝天恩事雍正六年六月初十日臣標齎摺把總齎捧硃批諭㫖並恩賜御冠欽定駢字類編一部到臣隨郊迎回署恭設香案望闕叩頭謝恩祗受又於七月初五日復奉天恩賜臣內製乳酥果脯二匣並硃批諭㫖到臣隨謹跪迎恭謝天恩訖伏讀訓諭倍切悚惶臣即草木無知亦覺天良難昧唯有凛承我皇上寧民圖治之聖心勸善懲奸之隆恩於萬一再臣前拏獲滋泥大王希貴卿等緣此案供出夥盜頗多皆宜按名捕緝必須就此質認臣恐即行解浙或因往返耽延時日致羣盜知風是脫是以尚未解浙今業將同夥等犯火速跴拏次第弋獲其未獲者尚有七犯今䝉皇上諭令浙江督臣李衛節制下江數府俾臣得協力奏覽同日又奏為奉㫖事竊臣前准步軍統領衙門來咨將裴榮所告謀叛案內有名人犯誘獲三十六名口於禀到之日謹先具摺奏聞訖兹臣將被告之裴肖生張聖音等三十六人歷加盤詰並無妖法謀叛實據即質之原告之裴榮始則閃爍改移繼則私情敗露緣裴榮勒姦伊子裴肖生之婦起釁懷仇所以揑詞誣告今據裴榮供稱我告的話既無證據我也不辨了但狀詞主子已曽見過若認了誣告怎麼回奏主子只求將兒子媳婦斷給領回我的謊狀想個法兒圓成了罷等語似此語言狂悖竟屬誕妄誠如我皇上聖明照鑒事果荒唐者也除交按察司研審成案定擬具題外再臣前於遵㫖委員訪誘之時所到之處毫無聲張近又據霍邱縣禀稱所在地方照常安靜報明到臣合併據實奏聞謹奏如此則裴榮可惡極矣審明定擬具題候㫖可也雍正六年八月二十二日署理江南江西總督印務尚書臣范時繹謹奏為奏聞事雍正六年八月十七日據淮揚道報稱據海州詳准山東安東衛移據把總時永盛禀稱董家汛內亭子蘭地方有船二隻俱是白色船上旗子亦是白的守臺兵丁嚴禦打炮數次彼竟不理止鳴鑼響鼓及天明二十四日往水靈寺去了不一時又往龍灣口去了等情到道轉報到臣查此船雖未入江南汛界然既據詳報不敢稍分疆界隨即備據前情密封咨會京口將軍撫提鎮臣各皆嚴飭偵探協力稽察臣又密行移知鄰省河東山東浙江督撫臣等俾互相覺察一體查拏去訖又於十九日准浙江督臣李衛為密咨事內開風聞東洋日本不甚安靜頗有蹤跡不惜重資聘中國人教習弓箭藤牌偷買盔甲式樣打造戰船二百餘號操演水師聘一杭州武舉教射其與之偷帶轉聘岸如遇出入船隻嚴加盤詰不許一毫疏漏又臣細繹浙江督臣咨內稱有與之偷帶轉聘私運禁物者皆素日信託舊領倭照之洋商二三人所為等語今鄰省既有微覺則江省亦宜慎重臣查洋立即研究除此隱弊以期內外肅清合謹繕摺奏聞謹奏覽雍正六年九月二十一日署理江南江西總督印務尚書臣范時繹謹奏為奏聞事竊臣接准吏部咨繆沅呈送參革虧空新泰縣知縣朱成元任內送禮簿一案奉㫖博爾多現在江南質審别案著該部行文江南督撫將伊收受朱成元及通省屬官規禮訊取確供移送東省倘博爾多不吐實情即加刑訊欽此欽遵到臣隨經檄行布按二司公同嚴訊兹據各該司會詳稱據博爾多供稱我署山東布政司事到任之時各官照陋規送禮我一概不曽收受記得有三四處送些柴米代儀我收了些有二千來銀子又收了些器皿土儀食物但我到任未久各官尚未熟識如今再三思想這蒲臺縣自然是送的了還有一個霑化縣其餘實在想不起來嗣後交代清楚我已有了平規就沒收州縣的東西只有我母親夀日濟南官員備辦圍屏杯縀銀如意調羮送來上夀我也收了又供山東任上一年共有平規銀六萬六千餘兩除去巡撫三萬三千兩外自已實得銀三萬三千餘兩又供我䝉皇上天恩調任江寧於進京去後巡撫陳世倌因各官養廉已經奏准遂諭各官共補送銀九千七百餘兩亦不知是何官名下再陳世倌又自送銀一萬兩我到江寧才知道的我在山東任上所得銀兩俱一一供出就是夾死也再供不出來等語正在訊問間博爾多忽即痰壅昏迷不省人事現在發禁調治一俟痊可再加研訊各等情到臣臣除將訊過博爾多口供並驗明委係身病各緣由先行移明東省外合謹據實奏聞謹奏博爾多甚屬可惡絲毫不可寬假干係自己本身何苦為他人代受過愆當嚴訊重處以為負恩者戒同日又奏為恭謝天恩事竊臣標把總賫回硃批奏摺並奉到恩賜荔枝一瓶臣隨恭設香案望闕叩頭謝恩祗受訖拜領寵錫跪讀聖訓感激愧懼無地自容臣何人斯邀此隆恩至深至渥唯有實心實力不二不欺恪奉聖訓仰體天心刻刻凛遵事事奮勉期與共事文武諸臣協力同心以期地方寧謐仰報仁恩於萬一所有微臣奉到聖訓恩賜感激下悃合謹奏聞謹奏數次諭㫖不為不明要看汝祖父積德何如能從與否肯聼與否朕亦不敢預期也雍正六年十月十五日署理江南江西總督印務尚書臣范時繹謹奏為荷䝉聖訓恩賜微臣感激遵奉恭謝天恩事竊臣齎摺把總齎捧硃批諭㫖並恩賜哈密瓜花糕克食到臣隨恭設香案望闕叩頭謝恩祗受跪讀訓㫖荷蒙我皇上聖明指示無一不照鑒機宜愚昧如臣得以遵循報效黽勉慎重之思益切於懷惟念海疆機務必鄰境協力稽查以期寧謐查前據浙省督臣李衛咨內開有閩人王應如為日本排演陳法不久即故復薦廣東長鬚年滿千總又有蘇州宋獸醫等語臣曾密飭署蘇州府吳江縣知縣徐永祐察訪去後兹據覆稱銅商缺項案內查有王應如一名其案現在審追今有伊之同姓王君貽向與合夥生理目今代為分認銀兩察詢之下且知王應如之子與僕各等下落緣事關機密恐其驚覺尚未敢顯露窮究等語又據覆稱今於蘇州地方業將宋姓獸醫訪出察知其人名呌宋𫝊二現在出洋未歸又訪知宋傳二有母舅名呌陳端亦係善能識馬現在蘇城等語臣思既有其人自應誘問確實業經仍令將王君貽陳端二人設法羈縻從容詢問務得實情現又密交去訖尚未據覆所有訪得王應如之夥計王君貽又宋姓獸醫的名宋傳二並伊母舅陳端各緣由未敢遲滯先謹繕摺奏聞並將微臣奉到聖訓恩賜感激下悃一併繕摺恭謝天恩謹奏察訪此等事件何須如此急驟亦不必逼迫屬員若用得其人自能竭力推求若用非其人逼迫之下徒滋紛擾反致泄漏於事何益徐徐留心密為之雍正六年十一月十一日署理江南江西總督印務尚書臣范時繹謹奏為奏聞事竊臣據淮徐道康宏勳禀稱十一月初六日有山東濟寧州河標把總來報十月二十九日五鼓突有賊衆用刀斧砍傷文武官七員衆賊隨往知州衙門將知州家眷殺傷不知數目將監門劈開放出囚犯各犯俱不敢附從髙知州往省城未回有河標副將等帶領官兵連次擒剿後兗寧道亦於本日下午趕到又加擒剿殺賊不知數目傷官兵七八名業已拏獲數人審訊口供說約定陜西河南涿州徐州等處同日起手賊內有河南人刀鎗器械俱全等因到臣臣即飛飭徐州該城守文武官各皆嚴加防範並令毋得聲張煽惑聼聞惟以密加訪察如形跡不倫者立即捕拏嚴究以靖地方所有臣據聞濟寧信息現在辦理緣由合謹具摺奏聞謹奏汝等封疆大吏凡遇此等小事陡出意外宜鎮靜彈壓為要倘稍露驚惶失措之態不但惑動聽聞亦令屬員胥役人等哂鄙也汝前此洋船之嚴飭目今徐州之防範率皆臨渴掘井可見平時總未縈心幸原無事隨即消釋設遇大患寧有濟耶全在無事之時刻刻留神於所屬境內精擇捕役人等巡邏偵探令不法匪類無處潛踪則地方自然寧謐潔清矣似汝此等料理朕實不取觀汝一切作為總在事後張羅從未見於機先措置一籌未知才力限於此耶抑或不肯留心於無事之時耶殊難論定同日又奏為欽奉上諭事雍正六年十月二十二日接奉兵部馬上遞到黃袱摺匣一個臣謹跪接內係怡親王等遵㫖寄字到臣內開十月十九日奉上諭嶽鍾琪處有投書之奸民供出夥黨十餘人其在楚省者已差人前往查拏可將居住江南之人開出令范時繹密行緝捕明白究問勿使脫並將供出别省之人亦開寫單內令范時繹知之總之查拏匪類以速慎為要勿使漏網無辜不可拖纍若拏獲之後果係同夥便當究問其黨羽應行拘緝者著范時繹一面辦理一面奏聞欽此遵㫖寄信前來並嶽總督奏摺及名單抄録馳寄等因到臣臣即照單委按察司查拏去後於當夜即據該司禀稱獲到車鼎豐一犯臣即率同按察司密提該犯取供在案續又據將車鼎賁拏到亦經取供除將原供録呈御覽外臣查車鼎豐既經供認張熙於上年八月內到過伊家有留住贈衣贈銀各情節則該犯係屬夥黨已有明據今臣現在嚴加監禁恭候皇上諭㫖指示遵行所有獲犯訊供緣由合謹繕摺奏聞謹奏知道了正犯皆在湖南現命部臣前往審理凡干案內有名人犯咨文一到江省即迅速應付慎密料理毋令或致漏脫滋生事端也雍正六年十二月十六日署理江南江西總督印務尚書臣范時繹謹奏為請留人地相宜之員恭懇聖恩事臣看得常州府知府包括自到任以來辦事實心正已率屬洵屬才守俱優之員近查本年常鎮淮屬緩漕等事案內該府有督催武進無錫江隂宜興四縣康熙六十一年及雍正元年緩半漕米届限未完二案共應降六級現據蘇松糧道分案造冊詳請咨部核議在案臣念該守包括身任地方於錢糧盜梟案件悉能實心辦理今若咨部議處例應降調臣緣地方起見所有該員在任實屬人地相宜之處臣不敢因其例限届參匿不上聞合謹先摺具奏倘得邀䝉聖鑒恩賜該員於照例議處之後仍留原任實於地方大有裨益臣謹據實奏聞恭候睿鑒施行謹奏包括好員應留原任所請是雍正六年十二月二十二日署理江南江西總督印務尚書臣范時繹謹奏為奏報得雪日期恭慰聖懷事竊照江省地方今歲秋成豐稔自初冬以來又值雨水調勻秋種麥苗悉已長發臣查據上江之寧國池州等府屬各縣又下江之蘇州松江常州淮安揚州等府屬各縣俱報於十二月初二日得雪三四五分不等邳州海州所屬並宿遷各地方報於十一月十七八等日得雪一寸或八分不等今江寧地方於本月十五六日得雪積至四寸有餘臣復委員四郊查勘據稱溥遍霑足所在農民歡歌聖瑞臣又查得邇來江省各屬米價悉皆照常並無增長所有得雪日期合謹繕摺奏聞謹奏覽奏得雪深慰朕懷硃批諭㫖卷一上欽定四庫全書硃批諭㫖卷一下硃批范時繹奏摺雍正七年二月初二日署理江南江西總督印務尚書臣范時繹謹奏恭請皇上聖安朕躬甚安月之十五日謁陵禮畢旋京一路平安如意沿途見雨雪霑足土膏滋潤閭閻氣象似覺改觀朕深為慰幸特諭汝知同日又奏為荷䝉恩賜微臣感激恭謝天恩事雍正七年正月初三日臣標把總賫捧上賜御書福字一幅如意一枝荷包一對貂皮四十張湯羊一隻克食一匣又內製平安丸一千個到臣臣隨郊迎至署恭設香案望闕叩頭謝恩祗受臣於跪奉之下荷兹宵旰殷勤籌畫教養之餘尤復留心普濟選製丸方聖慈周遍無微不至誠天地父母之心也臣謹隨時散給務期廣布皇仁所有微臣奉到御賜感激下忱合謹繕摺恭謝天恩謹奏汝所進土儀逐年加增殊屬非理向後當從節減不過藉以達君臣之情斯可耳朕富有四海豈待汝等督撫進獻需用耶當仰體朕心免招物議同日又奏為據實陳明仰祈睿鑒事竊臣於正月二十八日接准河臣齊蘇勒揭稱身抱沉疴不能勉强支持一面飛咨署江蘇撫臣尹繼善星夜來工接印署理並可辦理巡撫事務等因臣查署撫臣尹繼善前經奉有仍辦河務諭㫖今若准咨自必前往但查蘇淮相距數百里若兩處事務往返移就勢難免於濡滯臣思河務地方均關緊要所有兩難兼顧之處仰維我皇上聖明照鑒無不洞悉情形知人善任今署撫臣尹繼善倘得邀恩俾令專任撫臣事務實於地方倍獲裨益臣緣地方起見謹據愚昧之識具摺奏聞伏候皇上睿鑒施行謹奏河務較之撫務孰輕孰重似此器量識見何以克稱國家大臣所謂大臣者以國家事為己任緩急先後當通盤籌計區區但以關涉責任中事為事他如河運要務皆泛然膜外視之是誠何心哉可謂淺狹之極所事早已有㫖矣謹奏為密陳江南地方大槩情形仰祈睿鑒事查江南自前任巡撫湯斌以後繼之者如宋犖之輩率皆尸位素餐其初猶受湯斌之餘䕃一二十年後則漸已廢弛加以吳存禮貪婪無厭惟利是圖何天培安享厚福一事不理地方遂致大壞而張楷陳時夏蒞任未久才不足以整頓因而日趨於下如各項錢糧則通省新舊缺數將及千萬嘉定等邑雖經分縣每處尚有數十萬兩其中舊缺不但難於催追且動輒罷市鬧堂州縣官多有不敢開徵者錢糧如此難徵而督撫大吏不聞有清釐調劑之方反將通省火耗不論往日多寡畫定加一盡行提解充公各屬豈肯墊賠司費只得額外再添將至加一五六七八不等獨崇明一邑向係加二以外民不為苦今有司焉肯減去分毫而下江各府科則本重正賦尚且艱難豈能當此多耗乎此特錢糧之一端耳若其通省吏治則大僚各行其意見下情隔絶而不通凡地方一切公務悉委之於州縣其費之從何出處事之能否不誤漠然無關巧者朘民膏以償拙者那庫帑以應功過不分勸懲無術所以人心渙散同城文武惟有各圖保全祿位茍且目前絶無一同心協力商及公事者情形如此地方安得而不壞哉又況武官之驕兵丁之橫尤為特甚如松江各標一人名掛營伍舉族錢糧可以不完本無産業者包攬親族挾官抗比州縣無從催徵兵之父兄子弟遇有司經過儼然髙坐絶不為禮衙役不知而呵斥之則挺身遮道大呼嫚罵傷及父母有司覿面隱忍使百姓見而效尤自然藐視官長文員有事欲訴其上司則一班武官頭目蔽護把持縱有清正廉潔之總督提督所言無由而入以故無惡不作有司莫敢過問至今督撫提鎮皆實不知緣張雲翼實始作俑積漸而使然耳總之數年以來如蠲減浮糧賑濟荒歉興復水利築建海塘以及種種特恩皇上之加厚於江南者至優且渥而事多奉行不善以致民情不知感戴反有怨咨且人情澆薄好造謡言性本輕浮喜於議論見諸大吏之無所短長竟以為不足責備而皆有歸怨於上之意此臣心之所以實有不忍而情之所以實有難安者也緣臣受恩深重因見緊要地方實有此等情形何敢瞻顧是以冒昧直陳不避愚戅之咎伏惟聖慈鑒宥暫賜留中再為採訪陸續施行為此謹奏被人如此論奏爾等身膺督撫之任者能不愧乎於心忍乎將此摺亦與陳時夏看朕惟自愧乏識人之明而已復有何詞以謝江南億兆耶宜將此摺録存案頭時加披玩以自警惕雍正七年二月十七日署理江南江西總督印務尚書臣范時繹謹奏為欽奉聖訓微臣感激愧懼敬陳愚悃仰祈恩鑒事雍正六年十二月十一日臣標賫摺把總捧到硃批奏摺並䝉聖恩諭示參奏一摺臣於跪讀訓㫖之下泣汗交流心膽俱碎悚惶感切無地自容除謹遵㫖齎交原任撫臣陳時夏接看外伏唯臣祖父世受國恩臣又䝉皇上逾格委用寄以地方重任乃不能倡率僚屬因循廢弛不知整頓致見聞之人指陳入告臣等身任督撫貽誤若此溺職之咎實屬萬死難寬但查江省地方幅􅊷廣逺兵民衆多如屬員之劣蹟兵民之習氣不敢云竟無其事苐一縣偶有一案未可謂閣省皆然一兵偶有一事難概謂通營皆爾今乃為之約略其事鋪張其詞欲托利弊之公言以市轉移之私譽且稱民心不知感戴皆歸怨於皇上等語以冀上動聖聼仰維聖明在上其人入奏之意與江省地方之情形悉不能逃皇上天鑒今兹一言入告實屬江南萬姓攸關臣是以不敢不攄陳於聖主之前也竊思江省吏治闒茸皆臣等罪愆之多而江省實在情形尚未至如斯之甚唯恨臣庸愚昏瞶受皇上任用教導之恩於地方吏治民情不能倡率整理種種貽誤罪不容誅臣即改悔之情殷何能贖從前之積咎伏乞皇上立賜嚴治臣罪以警昏庸庶臣戴罪之日皆沐恩之日矣所有微臣感激愧懼愚昧下悃合謹繕摺恭謝天恩謹奏朕巳件件代汝等料理矣此奏何為今姑以緝盜一事而論省城內於十日之間大盜行劫數處而竟若罔聞清夜自問於心安乎幸兩江地近朕之精神猶能照應設天下吏治皆如兩江悉待朕一一料理頒諭而後施行則朕實不能具此伎倆也汝不但為國便為爾家計亦當奮勉爾范家只剩汝一人寧不為汝祖宗顔面惜耶若仍不知痛自刻責砥礪朕亦無奈汝何矣同日又奏為奏聞歲修徒陽河道重運經臨無誤仰祈睿鑒事臣謹查京口運河乃蘇杭八府州漕艘經由要道自丹徒縣江口起至丹陽縣三板橋一帶河身歲有淤淺每年必需撈浚於雍正三年間欽奉上諭案內業經題明議令建閘挑濬續以胡璉冒帑誤工題參另行修估上年十一月內據鎮江道王之琦詳估到臣緣臣曽經親身審視備悉此河接近江口水之深淺唯視江潮之來去又兼岸髙土鬆隨潮沙墊縱加開濬仍需歲修是以臣不敢因循前議業經備陳情形請停動帑大修唯應照行歲修之法及時撈浚立見深通漕運即可無阻臣等㑹疏具題在案隨經臣飛飭測量撈浚去後業據該道縣等具報僉於十二月十九二十等日開工撈淺一時並作出入糧艘通行無阻現在仍復隨時量浚等情又據臣標差委催漕守備次第報稱自正月十二日起業經催過浙江江南二省各幫糧船共二千五十三隻平穩渡江訖各等情所有徒陽運河現在歲修撈淺重運經臨無誤緣由合謹繕摺奏聞謹奏欣悅覽之此一事爾所料理甚是所以上天即賜成全也未有實竭忠誠奉公辦事而不邀神明加護之理但試觀之雍正七年四月初四日署理江南江西總督印務尚書臣范時繹謹奏為欣聞諭㫖微臣感激恭謝天恩事雍正七年三月初四日臣標把總齎回臣請安奏摺跪奉硃批仰見我皇上民胞物與之懷時厪宸衷斯省耕省斂之仁頻煩睿慮唯臣以山陵舊守侍從依依聞天顔之有喜瞻仰彌殷識帝澤之無邊歡欣倍切今聖體安和如意畿東一帶雨雪霑足閭閻氣象改觀是皆我皇上聖德大化之彌綸敬天勤民之感召臣遙瞻北闕實慶洪庥曷勝抃舞欣幸之至又臣於三月十七日復奉到皇上硃批原摺荷䝉訓誨指示嚴明以江寧省城十日間連有盜竊又奉恩㫖著臣明白回奏除遵㫖將各案是盜是竊另行據實具奏外伏念臣以謭劣之材身荷朝廷重任䝉皇上錫以天地父母之恩諭以國法身家之重憐臣祖父澤及子孫臣捧讀至此不禁涕汗交流自恨自責草木愚情感刻倍至何敢仍前踈懈自蹈罪愆唯有一刻不忘恩訓痛自刻責努力奮勉以期上報天恩於萬一所有奉到訓諭感激下忱合謹繕摺恭謝天恩謹奏安民之道惟在察吏懲姦二事而已若盜賊不靖地方何以能安所當日夜思維籌畫者古人云思之思之鬼神通之心誠求之雖不中不逺矣諸凡若不探本尋源預期消患於未萌不過隨事依文按律以圖塞責斷不能令匪類斂跡也假若藉口地方衝繁人烟凑集盜風熾盛在所不免竟恬然不以為耻則天下事皆當聽其自然亦無可辦理之事矣封疆勝任之謂何斯民父母之謂何勉之勉之雍正七年四月十四日署理江南江西總督印務尚書臣范時繹謹奏為陳明贏餘銀兩仰體皇仁奏聞請㫖事竊照揚屬等處水利皇上指示興修甫聞恩命之日所在商民靡不歡欣踴躍樂事趨公經臣會同河撫諸臣勘估據情上聞復酌定委員派工擬將淮揚道白鍾山郎中程夢瑛監督其事又原修蘇松水利效力人員並河臣咨送河員臣復添委就近州縣及佐二雜職等員分任其事題請俞允遵行在案今臣於在工之日接見效力人員看其景狀似屬拮据蓋緣伊等多係寒素微員身在工所不無僕從盤費恭逄我皇上仁恩周至體恤臣工凡今大小官員無不酌給養廉臣仰體皇上奬廉恤下之天心所有實在情形何敢默不奏聞臣查得揚屬商人願捐銀兩從前交貯司庫原係照用部砝彈收今給發工料乃係照依市平約略估計動用銀二十七萬兩有竒內可得平餘銀八千餘兩合謹據實陳明可否於此項平餘銀兩邀䝉聖恩俯念在工之程夢瑛等二十三員酌照承辦之繁簡别以差等如程夢瑛係通工巡行稽察之員事務頗繁酌給養廉銀四百兩其餘二十二員均屬事務稍簡各酌給養廉銀二百兩以上計需銀四千八百兩仍有餘存銀三千餘兩足備將來造冊奏銷之費似屬公私兩濟臣緣錢糧關係重大可否出自聖恩謹奏請成勤慎不辭勞瘁所辦工程悉有條理核算錢糧更為明晰似此才具諳練將來用之河工洵有裨益臣緣人材為任事之本不敢掩其所長合併據實奏明謹奏程夢瑛籍隸江南似不便用於本省據汝所見應用於何處河工有益明白奏聞雍正七年四月三十日署理江南江西總督印務尚書臣范時繹謹奏為奏聞辦送米石抵閩日期仰祈睿鑒事前臣遵奉諭㫖江南辦送運閩截漕米五萬石已委營將協同閩員均為四起於正月二十二日起次第開行兹據前差營將覆稱運閩米石陸續於三月初十日止次刈穫民慶豐收更喜四月內連得大雨秧苗滋長米價平減即鄰省有來糴販者而本地米價總無增長近據臨淮縣報稱團山地方係鳯陽衛屯地見有生出蝗蝻數處現在撲打等情臣隨星委幹員飭令督同地方官多雇民夫上緊撲滅不致生翅蔓延所有該地方捕蝗情形不敢隱匿合謹附摺奏聞謹奏蝗蝻務令撲滅無遺前諭甚明萬不可怠忽盡力為之近日如何光景再奏以聞待全消後朕懷方釋也雍正七年六月十七日署理江南江西總督印務尚書臣范時繹謹奏為奏報江省麥熟分數仰祈睿鑒事竊照今歲江省雨水調勻二麥豐收臣謹查得上下兩江及江西省麥收分數據報自六七分以及八九十分不等現在米糧價值其賤者皆減至六錢二三分即貴者亦不過九錢有零民食豐盈歡歌大有合謹據實奏聞謹奏覽奏麥熟朕懷深慰益加誠敬以待秋成毋稍肆志同日又奏為欽奉訓㫖荷䝉恩賜微臣感激恭謝天恩事竊臣標賫摺把總賫回硃批諭㫖並奉到恩賜內製香定一匣窰器一匣臣隨恭設香案望闕叩頭謝恩祗受訖伏念臣庸材劣質受皇上格外隆恩訓誡頻加寵頒叠至欽承之下感奮交集報稱末由緣臣世受國恩非起家寒素者比又身在東南出産方物之地仰體聖心不敢多事購求進獻祗於令節敬以食用等物報地方之生息備聖主賞賚之常用亦微臣依慕之切於一事一物稍任經營以伸不忘君父之愚衷也今䝉聖訓指示臣謹遵㫖奉行外臣唯有刻刻凛遵訓諭自責自奮竭力黽勉尤於察吏懲姦二事悉心設法防範嚴明以期上報髙深於萬一所有微臣奉到訓㫖恩賜感激下悃合謹繕摺恭謝天恩謹奏朕之賞賚汝之進獻皆屬細事原不必諄諄在念至於君道臣節乃我二人上不負祖考下不愧子孫天下後世公論所關所當日夜思維竭力黽勉者期共勉之同日又奏為奏聞雨澤霑足插蒔普遍田苗長發情形仰祈睿鑒事前臣路經蘇常地方歷見二麥俱已收穫場事甫竣節次間有小雨僅資耕耨旋於五月二十四五等日大霈甘霖臣隨飛差探視據報蘇松東南一帶又常鎮各屬以及淮揚等處俱皆得雨九寸或六七八寸不等再江寧暨上江等屬距省路近者悉據報到得雨大槩相同至於鳯陽衛屬之團山蘿蔔灣等屯於四月內報有蝻子生發經臣一面具奏一面委員撲打去後兹已據報撲滅淨盡並據該司府查報結送在案近於六月初二日據潼安衛呈報楊家湖湖邊野地有蝻子萌動等語經臣委員速赴協撲旋已據報蝻生無幾文武等官集夫撲滅同時又據鳯陽府報稱虹縣地方石家集有宿遷縣屬之劉馬灘生有蝗蝻過界入境當即隨時撲淨未致生翅傷禾各等情臣查潼安衛虹縣二處蝗蝻申報之後旋據該衛縣結稱已經撲滅均未傷禾成災是以未經題報所有地方撲蝗淨盡緣由合謹奏聞再江省十餘日內未見大雨兹喜於六月初八九等日接連得雨又十二三等日連得大雨新插稻苗悉皆滋長四野青葱萬家歡慶臣謹據實奏聞謹奏可嘉之至一切處咸能如此督率屬員殫心盡力何事不辦朕復何庸顧慮耶但王璣趙向奎等諸事狥私玩忽負朕委任何故不行據實奏聞若逐件必待朕諭到而行詢及方奏朕耳目之所不及處貽悮良多矣倘朕一時煩怠或不肯加訓不暇諭問則汝恐不能當也雍正七年閏七月二十七日署理江南江西總督印務尚書臣范時繹謹奏為欽奉聖訓微臣感激凛栗據實奏聞事竊臣標把總賫回硃批奏摺欽奉聖恩訓飭諭問王璣趙向奎等諸事狥私玩忽深負皇上任用臣未即早於奏聞凛奉恩諭之下臣不禁愧懼交集倣徨無措不啻自貽負恩之咎查王璣前在江鎮道任內即非純正自守之員自署事之後臣復聽其議論察其神氣但見徒有矜張自得之色毫無敬慎圖報之心而且偏向私人以致鑽營妄誕之輩漸皆奔逐其門復濟以趙向奎之驕矜狂放遂爾事無可否任意縱橫前臣於在蘇之日歷將趙向奎之粗率孟浪藐抗不謹慎處切加勸導冀其改悔是以未經奏聞詎知王璣與趙向奎旦暮相接交好日深自謂得計䆒不能逃皇上聖明洞鑒之中此二人者不獨於辦理虧空清查民缺等事怠玩悠忽上負皇上任用之恩至於辦理地方事務尤覺不從公道頻用偏私如原任䕫州府知府喬鐸侵匿䕫關銀十萬餘兩查追原籍家産一案歷經府縣審詳內有程文蔚在縣首報收貯喬鐸寄頓箱物銀兩續又據喬鐸之母汪氏並伊子喬於宣控告程文蔚之子程汝趾隱匿行鹽本利銀八萬二千兩屢經質審緣喬鐸與程文蔚係兒女親家當據喬於宣程文蔚各供認其所缺銀兩除案內首出之銀並喬程兩姓家産估交外餘缺之銀兩造均認各半完帑具認詳報經臣與撫臣尹繼善嚴批著落究追在案乃王璣於署事之後緣程文蔚是伊嶽家思翻案開脫露意屬員欲將喬鐸在川開報程汝趾處收存本利銀十餘萬兩並金珠等物寄貯箱匣四十個與帶銀年月經付人等鑿鑿可據題明奉庫銀一千四百餘兩一事係前任知縣張文英查出銀色低潮通詳賠補有此一隙遂將松江府知府張文英百計搜求報復前怨於甄别知府疏內填入病廢並議以即將欽璉題補松江知府乘機於疏內聲說委令欽璉署理府印以冀僥幸萬一邀恩補授俟出疏之後方始移送會稿再如現在題請酌調繁簡一疏內王璣因丹徒縣知縣張廷煌係伊前任江鎮道任內相交舊好畏懼地方衝繁衙門清淡乃以委署試用未經實授鹽城縣知縣孫䕃孫調補欲為張廷煌轉移善地起見授意趙向奎而趙向奎不顧章程並不論鹽城一缺張廷煌之果能勝任與否狥情更換公然稱以已見開擬詳請具題經臣歷歷批駁間乃王璣即具司詳移稿㑹題前來臣又經叙明咨覆不便書題移回前去詎王璣直欲行已私意竟自出疏延至七日始寄札相懇仍送會稿挾臣以不得不從之勢臣唯始終不移復將不便會題緣由咨回撫臣衙門存案再如七月內有崇明縣城外兩處鄉間各有殘廢貧民數人向富户求索因被喝斥遂成嚷閙旋即星散一事乃鎮臣林秀小事大做傳檄恐嚇祭閒住十餘日伊之家人隨役逢人告語稱林秀此來係一面迎弔一靣避出一舉兩得之行遂致林秀同聲附和混稱崇明民變起於上諭勸導富户張皇其詞復檄委道員揚言前往查緝彈壓竟不慮海外蠻野之民激出事端直欲輕事重報以行其欺君冒功之念言及於此臣不禁心悸汗下似此狡詐行為其何能上欺君父耶以上等事俱係王璣趙向奎狥私玩劣實情兹睿鑒謹奏此奏可嘉但嫌已遲候另有諭㫖頒發朕諒汝等不睦不深怪汝然於此處可見非純臣之居心即朕向諭所謂公中之私也㫖到時可秉公據實為之不可稍涉苛刻遷就朕加罪王璣等江南轟傳緣汝密參所致汝曽聞否汝等身膺地方重任乃不肯廣布耳目如亳州之私鑄及現諭汝等密緝積盜等件汝於此能不汗顔乎總之不能端本存心立志處究未妥協以故諸凡不得其當非過則不及被屬員窺破非實心為國之忠誠大臣豈能與汝傾吐肝膈同休共戚此其所以耳目往往不及也試觀田文鏡鄂爾泰李衛若不能令屬員畏威懷德實力協助伊等一人之心力幾何能如此有條理耶爾與之祿位相等兩江之任尤為尊榮諸凡不逮乃恬不介意何面皮如是過厚朕實為汝愧之若不竭力奮勉將朕諭㫖視為鼓舞臣工具文仍前泛泛至噬臍不及時此手諭即為斷案莫怨朕也同日又奏為奏聞事雍正七年七月內據六合縣詳報該縣境內於本月十四日戌時陡起疾風雷雨自魏詹橋地方起葛塘集小山口梁塘鋪梅官營急水溝一帶村莊雨勢風勢甚急所過吹折樹木倒塌房屋約有三百餘家壓斃男婦十二名口又壓傷大小男女二十餘人等情臣於聞報之日立即捐資委員前往會同地方官加意賑恤並飭查勘田禾有無被損成災兹據查報是時適值暮夜風勢又急是以吹倒屋垣樹木致有人口被傷地方官現已賑恤次第料理勘明田禾並未有損無庸題報外所有六合縣地方賑恤緣由合謹據實奏聞謹奏今歲直省皆有類此一事大竒可加意撫恤毋得虛應故事致災黎有名無實不獲沾惠也今歲之災與去年時氣約略相同遭處雖多猶幸損傷不重同日又奏為欽奉上諭事竊臣准兵部咨開欽奉上諭恩念八旗兵丁特給內庫銀兩令王大臣等營運生息以備兵丁一時之用又諭外省駐防滿洲漢軍兵丁等亦當一體加恩又諭各省督撫提標兵丁等亦倣此例或給銀一二萬兩或給銀數千兩交與各該督撫提督委員料理以惠濟兵丁欽此開單咨行到臣仰見我皇上聖慈廣被睿慮無遺現據江省督撫提各標下兵丁萬口歡呼感頌皇恩各具呈請代題謝恩除臣謹另疏題報外伏查臣標兵丁共一千一百七十名內據粘單擬定賞給銀六千兩現在遵照請領第此項銀兩奉㫖交臣委員料理惠濟兵丁臣謹詳加斟酌委員料理恐有私侵虧缺藉官擾民等弊以臣愚昧之見查得江南省現有入官房産等項久經奉文變價以完國帑者經臣屢次督催而報售寥寥可否將臣標應領之銀酌於附近省城之入官房産不拘房地遵照原估之價買售數處其應繳價銀即仍交司庫以完國帑所買房地坐落何州縣境內者即交令地方官照依民市畫一招租造入交代冊籍著為公欵所入租銀房屋除修葺之費地畝除錢糧之外悉令解交臣衙門核發中軍以備惠濟雖覺出息稍微然所恃者本銀實有著落而利息又有成規似屬便於料理易於查核臣未敢徑行合先奏聞倘䝉聖鑒俯允可否恭請敕下江省將軍巡撫提督各標一體照行洵屬兩濟再臣又念此項房屋田地各省未經完帑者尚或有之似可一併議行庶幾一轉移間我皇上百餘萬之恩賞俱得均沾而數十年之虧帑漸次清理矣臣謹冒昧奏聞伏乞皇上睿鑒諭示遵行謹奏此舉甚屬妥協然祗可汝等據所見奏請辦理朕不便諭令通行入官房産他省有無各異何可勒令一體照行汝但各行其志聞之者欲相倣效則任之耳具題時疏內不必叙此奏摺雍正七年九月十七日署理江南江西總督印務尚書臣范時繹謹奏為欽奉訓㫖謹將獲解鹽梟中途拒捕續經拏究梟衆各情形據實奏聞仰祈睿鑒事竊臣標把總賫回硃批奏摺內謹奉到賜發奏摺一扣並䝉恩㫖訓飭臣於跪讀之下愧懼交集疏忽之罪撫𠂻難安伏查清河縣捉獲鹽梟王祿安等奪犯傷死兵丁一案於本年六月初十日據淮揚道具詳到臣內稱據清河縣詳稱張志麟首出梟棍王祿安為首夥同李桐等興販私鹽由縣境三可集謝家莊窩頓運賣出湖據即會同汛防把總前往拏獲私梟八人不意梟黨知風突於栁園地內擁出多梟持械奪犯將巳獲私梟八人搶去等情嗣據淮安營參將呈報據把總劉應鼎報稱兵丁姜必臣被梟傷重身死等情又據理事同知夏建德拏獲梟黨葛亮吳七孫三等訊究供出首梟王祿安等十六人又供各犯拒捕之後俱往盱眙縣滁州沭陽縣各地方藏匿等情據報到臣臣隨飛檄各地方官查拏去後兹據城守副將張玉金報稱首犯王祿安夥犯李桐俱已就獲經臣發司究訊又於上下江省各地方拏獲梟犯等七十五名歷加究審各據供出或係夥黨或係别案積梟各等情除尚有供出未獲之犯現在嚴檄緝拏外所有臣不能禁絶私梟及至就捕又復失於防範致有搶犯傷兵等事種種貽誤之咎百喙難辭伏祈聖恩將臣嚴加處分庶臣昏惰知警戴罪之日實皆沐恩之日矣合謹將地方私梟搶犯傷兵並隨後拏獲情形據實奏聞謹奏地方諸務如錢糧則命人來代汝查追水利命人來代汝疏濬屬官命人來代汝舉劾私鑄命人來代汝緝捕驛站命人來代汝稽察所交汝辦理者惟此弭盜懲姦二事而數起盜案尚賴朕訪確姓名交爾捕捉捫心自問誠不能評已為何等總督也其他逺省且置不論即就汝鄰近之李衛田文鏡互相比較寧不汗顔乎朕實無顔多諭汝也雍正七年十月初五日署理江南江西總督印務尚書臣范時繹謹奏為自陳愚昧據實奏聞事竊臣於本年九月十六日准署江蘇撫臣彭維新咨送特參江都縣知縣陸朝璣現住蘇州府長洲縣地方先曽充當布政司衙門書役後改名冒入浙江籍捐授縣令不自首明回避疏稿到臣臣緣撫臣疏稿內稱訪聞該員用刑任意又糧户守候給單民有怨言等語是以臣當即會題移去詎聞該員於被參之後地方紳士商民無不太息不平而鄉農鋪户相率擔柴送米愛戴依依僉稱衝繁大邑無故去此賢令閣郡倣徨等情臣查設官原以撫民今該令陸朝璣雖在蘇城居家作吏臣等未能早為覺察苐被參之後民情愛戴則與撫臣前疏民有怨言之語殊不相符臣思糾參屬員務以情罪得實為當何敢因仍撫臣之誤始終自飾所有參後察出地方情形不敢諱匿合謹據實奏聞伏祈皇上睿鑒施行謹奏察吏之道若止據紳士商民之愛戴與否而品定屬員之賢不肖則大誤矣何也夫一州一邑善惡不齊未有能令人人感戴之理縱使果能如是亦所謂鄉願德之賊也即以陸朝璣能致鄉農擔柴送米而論亦豈有闔郡紳士商民偕往之事大都詐僞之舉鼓惑汝無能之總督耳似此伎倆察吏無怪乎兩江吏治不堪問也陸朝璣之罪在冒籍不自檢舉並不為民有怨言設因怨言即列彈章則汝督撫更難姑容矣何識陋見小至於此極彭維新於疏內著此一語混淆其間即與汝同揆亦係無能不識大體之流耳何足深取雍正七年十一月初四日署理江南江西總督印務尚書臣范時繹謹奏為荷䝉聖訓恩賜微臣感激恭謝天恩事竊臣標把總賫回硃批奏摺並奉到賞賜內餅荔枝石榴鮮棗臣隨郊迎至署恭設香案望闕叩頭謝恩祗受跪讀訓㫖仰見我皇上至聖至明無微弗照伏查王璣趙向奎負恩狥私一案內有被劾松江府知府張文英一員䝉諭著范時繹等將張文英居官如何及運米辦銅之處秉公確查若王璣所參是虛著將張文英仍留松江府之任欽此欽遵確查去後續據布按二司會詳查得張文英於運閩米石並未貽誤即本年上運銅斤係委蘇松二知府協辦張文英領銀去徐永祐領銀之期不逺自不應將張文英一人以誤公特參等因通報隨又詳以松江府印務委令張文英暫署當經撫臣先行批允臣查張文英雖據司查然尚有續奉及未回任緣由合先奏聞又清河縣拏獲私梟王祿安搶犯傷兵一案䝉聖恩寬宥不即治臣之罪仍復賜以訓誨感激髙深彌增凛栗臣伏念江省鹽梟邇年以來實緣臣才識踈淺止知事後緝拏不能預為禁絶但治其流未窮其源之故也臣擬嗣後凡拏獲私鹽除梟犯仍豫以應得之罪外務必細加研究令其將買何場竈一一供出即將該場縱容私鹽之大使嚴定處分則經管者自知畏法就近者早為覺察庶幾矣臣愚昧之識伏乞諭㫖指示遵行再臣至愚至鈍受皇上委用悉心辦理不致悠忽貽誤以上報聖訓恩賜感激下悃合謹繕摺恭謝天恩謹奏覽同日又奏為欽奉上諭事雍正七年八月初三日接奉內閣遵㫖寄到上諭臣謹叩首祗受訖竊查大盜趙七積年潛跡江湖跟隨往來鹽船或行橫詐或行偷竊並復慣劫客商從前實有其人業經臣於上年六月內密訪知該犯係儀徵人常匿處於安慶八卦門外臣隨即密行沿江一帶水陸文武員辨設法嚴拏臣復訪知該犯尚有親母江氏現住儀徵縣地方當即行令地方官立將江氏拏解到省發江寧府細加研訊並將江氏之壻戴道弼及鄰佑人等逐一究問俱稱該犯出去一十二年音信不通不知去向等情臣緣該犯本身尚未就獲而江氏係大盜之母未便輕縱除飭交地方官嚴加看守正在屢檄嚴拏務獲間兹奉諭㫖查拏臣除密行知㑹鄰省並密飭各屬併力緝拏外臣於近日又訪得該犯多在湖廣地方出沒間亦來至江西湖口地方無非隨傍鹽船停泊之所潛蹤於流娼土棍之家現在差押素與該犯識面之人分往蹤跡跴拏俟一就弋獲謹另行奏聞所有遵㫖密相知會緝拏緣由合先繕摺奏聞謹奏似此不行慎密遍處聲張趙七必不獲矣至逺揚無踪時俟朕向汝等索取趙七也將此等相機密為之事委交汝等庸愚督撫即朕之誤夫復何辭雍正七年十一月十三日署理江南江西總督印務尚書臣范時繹謹奏為荷䝉聖訓恩賜微臣感激頂戴恭謝天恩事雍正七年十一月初五日臣標把總賫回硃批奏摺並奉到賞賜哈密瓜一個臣隨郊迎至署恭設香案望闕叩頭謝恩祗受訖又於本月十一日准吏部咨欽奉天恩於萬一所有微臣奉到聖訓恩賜感激下悃合謹繕摺恭謝天恩謹奏覽同日又奏為欽奉訓諭事欽惟聖祖仁皇帝深仁厚德凡巡省經臨地方無不沾恩戴澤是以兆民感誦歷久不忘建造御碑龍亭以昭不朽兹江南地方有建造聖祖仁皇帝御碑亭龍亭歷年久逺此誠地方官員所宜時加守護敬謹修整者也今䝉皇上恩㫖命內閣寄字恭録上諭到臣欽遵之下不勝感愧踴躍除即分檄各屬務令逐加親看作速詳估臣謹恭備銀一千兩先行交貯司庫以便隨估隨修敬慎料理並移明漕河撫鹽等臣仍誡飭地方官嗣後務須加謹守護永永昭垂所有微臣現在料理緣由合謹奏聞謹奏可笑之極可愧之極惟汝江南省如此疏慢他省皆不然也可謂良心不昧根本不忘敬慎從事之大臣歟同日又奏為奏聞事竊臣接准浙江督臣李衛咨為密拏謀為不軌奸徒事內稱沿海等處竟敢有不法之輩自稱俠士豪傑平日精通拳棒熬煉壯藥因而聚徒行教煽惑愚民凡無藉亡命聞風而至遂為夥黨並有假稱貿易借端出洋交通聲氣潛匿隱僻之所窺伺釁端隂謀不軌各郡俱有首惡數人暗中通線若不除此巨害則將來羽黨滋蔓無窮今差員給與牌檄分頭跟緝密拏除按照住址分行江蘇司道府營併咨鎮海將軍江南提督外相應列單咨會就近飭令密拏解審等因臣即將應緝人犯照單飭司並諭城守營協同慎密跴拏不使知風兔脫去後今據報稱單開之張雲如周崑來賀任宏甘鳯池俱經就獲此外應拏人犯現據浙省咨稱借端出洋謀為不軌則事關機密臣唯密行設法協力捕緝務獲照咨移解臣復一面另加訪察倘涉該犯等夥黨立即拏究再行奏聞外所有准到浙省咨拏人犯緣由合先奏聞謹奏凡李衛移咨緝捕之人若似辦理趙七之案茍且塞責踈漏一名則汝增一分罪咎當慎為之非實力擔任設法鼓舞屬員捕役不能奏效必貽後悔也雍正七年十二月初八日署理江南江西總督印務尚書臣范時繹謹奏為恭報萬民感戴瑞雪均霑仰祈睿鑒事竊照江省今歲秋成豐收普遍又䝉皇上大沛恩施蠲免安徽等屬庚戌年地丁銀至四十萬兩更於清查民缺事宜俯念承辦各員不知仰體肅清吏治之聖心奉行不善特頒諭㫖令將查出在民未完之積缺概行停徵及時通屬僉報節次得雪溥遍均霑米價亦俱照常並未加長逺近編氓靡不頌揚聖德呈請奏謝皇仁所有江省臣民感戴天恩以及雨雪霑足情形合謹繕摺奏聞謹奏自應如是皆緣汝等大臣承宣德化克盡厥職之所致殊可謂無耻之極矣同日又奏為調撥文武署汛以重職守以固疆圉仰祈睿鑒事竊臣查得巡道之設原因地方遼濶大員之耳目難周是以分駐一方資其坐鎮至如糧道衙門則有錢糧倉庫之責歷考各省多係附在省會取就近彚綜而承上接下出納查核均為便捷今則蘇松巡道衙署在於蘇城糧道衙署在於常熟均未妥協臣愚昧之見請將糧道移駐蘇城便於兑漕督運而巡道一官於地方殊關緊要既有分巡之職司即當責以坐鎮之實效查上海地方為江省通洋之口岸其中私梟聚集奸艘潛停即有州縣分任緝拏亦須大員之就近董率臣請將巡道衙署移駐上海裨益尤多再臣又查福山一營汛臨江口與北岸之任家港對峙所轄地方乃江流入海之咽㗋海潮入江之門户是為江防扼要處所豈宜巡駕無資臣請將蘇鎮四營之內每營各撥沙船一隻其所有配用兵丁舵水並令隨船歸於福山營不必另行召募以資熟手駕駛責令原海重防未敢冒昧具題合先繕摺奏聞伏祈皇上恩賜指示遵行謹奏朕實未達又信汝不及汝可請教李衛尹繼善後再行具奏以聞雍正八年正月十五日署理江南江西總督印務尚書臣范時繹謹奏為荷蒙聖訓微臣感激凛栗據實陳情恭謝天恩事竊臣賫摺人回署奉到訓諭愧悔無及伏查趙七一犯臣據從前之訪聞與近日之根究聞該犯被拏情急相約同夥鐵膀子李聞又臣前經具奏浙江督臣李衛查拏謀為不軌一案䝉辦理臣查此案匪犯歷准浙江督臣李衛在於江寧蘇州松江常州以及上江江西並江寧將軍衙門又鎮江將軍衙門各分行查拏者前後共一百在密飭屬員設法跴拏務期全獲再浙省差來江寧地方拏犯之員一係漕標革職遊擊馬空北一係千總韓景琦每自稱為浙督妾之義兄二人皆係回教彼此結好並帶來原首人即張雲如之舊識于璉詎於各處搜查人犯與前後禀報浙省之意周旋不將訊出供詞叙入報文唯一面寫禀通來告示安慰又差拏馬空北於常州地方管押去後兹臣又准督臣李衛咨會內據原出首之于璉等回杭禀供嚴責臬司馬世烆於搜張雲如之時未與來差千總陸彪同看其字跡多有抽換又稱各犯輾轉讐扳先後互異殊屬舛錯又馬空北通同狥隱將胡愷公不行拘拏又副將張玉金先令宋千總與寓所和尚說知以致伊子逃回散銀冊籍先為藏匿等語據其回供除飭行臬司副將並移會到臣臣隨嚴飭按察使馬世烆副將張玉金據實詳覆並咨覆浙江督臣衙門作速就犯研究三面質對如得該臬司及副將抽換通風確情立即題參以伸國法以嚴重案苐現今事屬兩持各存瞻顧必難平允可否仰懇皇上聖恩將江蘇按察使馬世烆江寧副將張玉金解任發浙與原任遊擊馬空北千總陸彪並原首人于璉等質審或我聖心也臣緣重案所關不敢諱匿所有先後獲犯並駁詰情形合謹繕摺奏聞謹奏覽硃批諭㫖卷一下
