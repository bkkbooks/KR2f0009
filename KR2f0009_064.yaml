body:
  text: 欽定四庫全書硃批諭㫖卷六十四硃批李蘭奏摺護理江西巡撫印務布政使臣李蘭謹奏為恭謝天恩事雍正六年九月初二日接到怡親王等字一封內開雍正六年八月初三日奉上諭各省藩臬有准其具摺奏事者亦有本人未曽奏請具摺朕遂未曽降㫖者今思藩臬乃地方大員應准其各就所聞見具摺陳奏且即此可以觀其居心辦事爾等可寄信與江西布政使李蘭伊若有陳奏事件初次具摺差人交門上奏事人轉奏嗣後從何處轉奏朕再降諭㫖可也欽此遵㫖寄信前來等因到臣隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚荷䝉聖恩擢任江西布政使才薄任重毫無報稱今䝉皇上天恩准臣摺奏臣之居心辦事皆得仰邀天鑒臣之所聞所見皆得上達聖聰臣何人斯膺此曠典惟有矢竭愚誠據實敷陳以圖仰報於萬一除將陳奏事件另摺具奏外理合恭摺叩謝天恩謹奏摺奏一事若能秉公慎密上下兩益之舉否則不但非汝之福亦大為朕之纍不必考之往古即就目前利害而論尤為顯然易見勉之密之嗣後奏摺交怡親王轉奏所奏交代限期一摺留中護理江西巡撫印務布政使臣李蘭謹奏為恭報各屬雨暘米價仰祈睿鑒事竊江西省今年早稻因梅雨稀少陂塘不敷灌溉幸賴皇上福庇六月中旬連得大雨通省早稻收成約計共有七八分之數所有髙安等七縣先經報旱者仍有六縣勘不成災俱經前撫臣布蘭泰題報在案七月十二十三十九等日各屬又得甘霖晚禾亦皆秀發但自七月下旬至今雨澤仍復稀少今查據南昌臨江撫州廣信饒州南康九江七府屬於八月二十五日始報得雨霑足瑞州袁州吉安建昌四府屬於八月十六十九二十等日始報得雨霑足贛州南安二府屬於八月十九二十兩日始報得有大雨二府氣候較暖得雨雖遲秋成尚屬可望其餘各府惟瀕江近湖之處收成可得七八分不等山田多有泉水灌溉亦可望有收其平原曠野之田陂塘無可蓄注今歲秋收未免歉薄如吉安之永豐縣饒州之安仁縣俱已報旱現在委員確勘一面據實具奏一面設法賑恤斷不敢怠忽隱匿有負皇上軫念民依之至意又查各屬米糧市價每石自九錢至一兩及一兩二三四錢不等較之往年未為昂貴緣江省農功全以早稻為重晚稻不過十之三四其餘多種雜糧雨澤雖遲約計通省收成尚稱中稔除各屬晚稻分數容俟報齊彚奏外合將江省雨暘情形米糧市價繕摺奏聞謹奏今歲江西收成為最下雖由布蘭泰不職之所致汝亦難辭其責當敬誠省過毋負朕恩莫移初志若將左袒科甲陋習滌除不淨於地方上之惡紳劣襟有所瞻顧以沽買虛譽則裴􅏍度張楷之前車可鑒噬臍無及也恐至臨期未必有能為汝排難解紛者凡事惟求諸已為上䇿勉為之護理江西巡撫印務布政使臣李蘭謹奏為奏明事竊江西民風向稱質朴恭逢聖澤涵濡羣黎遍德耕鑿俱恬惟山鄉之民性愚易惑遇有武斷鄉曲之徒良民輒被愚弄甚至鼓衆抗官目無法紀必須痛加懲治始能去稂莠以殖嘉禾如六月中萬安縣改建民舍一案事關棍徒聚衆目今正在審擬俟定招具題之日請將首犯封文達陳聖逹等即行正法其餘黨犯重加懲治庶刁風或可稍戢又據寧都縣詳稱該縣有武舉李紹廣生監李瀛洲李含英等抗糧毆差唆衆罷市均屬頑梗不法臣現在嚴查咨革從重究擬此等案件於吏治民風士習大有關繫臣才識短淺不能化導於事先斷不敢狥縱於事後合併據實奏明伏乞皇上睿鑒謹奏地方上此等刁風萬不可縱亟當盡法懲處江西布政使臣李蘭謹奏為恭謝聖訓事竊臣䝉皇上特恩准臣摺奏遵㫖於雍正六年九月內具奏恭謝天恩一摺同日又具奏江西省雨暘米價一摺俱奉到硃批臣跪讀訓㫖不勝感激悚惶伏念臣一介庸愚䝉皇上天髙地厚之恩勉臣以公忠誡臣以慎密天語諄諄明切指示臣惟有益加兢業以目前利害為炯戒斷不敢一念瞻狥一字疏漏稍負我皇上提撕警覺之深恩至江西省素為産米之鄉今嵗收成實係最下聖明洞鑒無逺不周臣忝荷地方重任不能承宣聖德感召天和臣罪實無可逭兹䝉皇上洪恩不加重譴諭以敬誠省過之道整飭地方之法臣惟洗心滌慮痛除積習凡事求諸一已絶去瞻顧沽譽之私以期上報國恩於萬一所有微臣欽奉訓㫖感激愧勵愚忱理合繕摺恭謝天恩謹奏據奏自欲痛改積習甚好當凜遵朕訓實心奉行江西布政使臣李蘭謹奏為奏明賑糶緣由仰祈聖鑒事竊江西省今歲收成分數臣於九月間業經彚詳署撫臣繕摺恭奏所有原報晚禾被旱饒州府屬之安仁縣已經確勘詳題籲請天恩臣仰體聖心先令該縣將社榖聼民出借仍一面詳明署撫臣動發節僃倉榖四千石委員協同散賑務令均沾實惠以廣皇仁再吉安府屬之永豐縣雖勘不成災未便題報但細查其中間有山鄉窮民引領待哺者臣亦經詳動節僃倉榖二千石散賑在案其餘各縣收成凡有歉薄之處臣現在設法撫恤但目今雖不至於乏食而米價總未能平減將來青黃不接之時恐致市價更昂臣隨詳請署撫臣借動庫銀三萬兩赴鄰省採買米石以僃平糶之需奉批將潯贛兩關平餘零稅銀九千九百餘兩先委幹員採買并令探明各處時價到日再酌量借動二萬兩陸續買僃臣於十月下旬已委員往安慶一路購買將來陸續採運庶可有僃無虞且令商販聞知不敢囤積市價自不致驟增矣為此繕摺奏明伏乞聖鑒謹奏盡力督率屬員為之務令小民得沾實惠不得茍且塞責已有㫖截留漕糧十萬石矣汝等酌量料理可也江西布政使臣李蘭謹日體漸羸弱十月中旬據稱痢瀉不痊詳請解任調治經署撫臣批飭加意調理一面照例委員驗看去後緣贛屬距省窵逺尚未據委員驗覆復聞該府病體增劇不能理事臣隨稟請署撫臣委令贛縣知縣劉鎬就近護理在案伏查定例官員告病必俟驗結題報之後方請委員署理今贛州一府界連閩粵地衝事繁實係要缺若必俟題報之後方行委員誠恐時日稽遲或致貽誤地方臣是以不揣冒昧先請委護理合繕摺奏明謹奏先請委員署理甚是但就近護理一語朕殊不取惟當審度人地相宜何論逺近劉鎬果能勝任否至施士岡病證若一時不能速愈此缺甚為緊要可與撫臣商酌於通省屬員內或行升補抑或調補詳細議定預為奏聞江西布政使臣李蘭謹奏為奏明各屬存庫軍器年久鏽爛仰祈聖鑒事竊江西各屬舊日存庫軍器自康熙十四年及二十二三等年陸續交下有裁兵餘剩者有投誠繳納者有臨陳收獲者當日各鎖協移交冊內已注明鏽爛字樣嗣後承平日久置之不用雍正三年奉部行查各屬軍器前撫臣裴􅏍度將合營現用者造冊咨覆而各屬存貯軍器未曽造報亦未據聲明臣查此項軍器冊貯存營者不過十分之三所有南昌等一十九處府州縣庫貯之鐵棉盔甲弓箭火炮鳥鎗腰刀以及各項刀鎗器械旗纛帳房鞍韉插袋等物所存之數約估工費需銀七八萬兩向來府縣不過於交代接受之際報明朽爛而上司亦不過批飭修整從未見有一處報修者迄今四五十年軍裝俱已朽蠧即鐵器亦鏽爛不堪若復因循是徒有存貯之名並無軍器之實矣臣思器物原有堅脆不等如旗纛帳房鞍韉弓弝箭桿以及盔甲中綿布原非經久不敝之物年深朽爛事有可原至於鐵器雖鏽而鐵質猶存如有缺少即係典守不慎自應責令歷任地方官及該管上司照數賠補今各屬槩稱朽爛且冊注無存其中恐有揑飾臣現在詳明署撫臣委員㑹同各府確估清查俟各屬覆到之日彚冊詳咨送部查核應作何立法賠補聽部奏請睿裁臣因軍器關繫重大理合據實奏明謹奏所奏甚是秉公僃細查明報部候㫖遵行江西布政使臣李蘭謹奏為恭報雨雪霑足仰祈睿鑒事竊江西省雍正六年夏秋雨澤稀少上厪聖懷臣負過省愆無日不深惶悚入冬以來晚稻雖已六七等日得雪三寸自此以後天氣晴暖萬象昭蘇農民踴躍歡呼共樂春澤優渥此皆我皇上仁心仁政至誠感格之所致也臣職任地方事切民依理合繕摺奏聞伏乞睿鑒謹奏地方上甫獲雨雪應時之慶切勿肆志惟當克誠克敬以靜俟天恩逮秋成後方可言其必也去年春初朕亦經覽汝等如此之奏何益之有江西布政使臣李蘭謹奏為恭報平糶緣由仰祈聖鑒事竊江西省去年收成偶歉米價未平荷䝉聖主軫念民依截留漕米十萬石又䝉恩准動帑買米三萬石以僃平糶聖謀逺慮無非欲江省百姓無艱食之虞臣等安敢不仰體聖心實力奉行致負我皇上愛養元元之至意伏查江省各屬米價目今未盡昂貴如南昌等府屬每米一石不過九錢四五分或一兩五六分至一兩一錢不等惟瑞州府屬之上髙縣撫州府屬之東鄉臨川金溪崇仁等縣每石一兩一二錢不等又南安贛州二府屬每石或一兩一二錢或一兩三四錢不等臣與署撫臣再三商酌凡米價止九錢四五分者原不為昂貴無庸減糶價止一兩五六分及一兩一錢者猶屬中價俟其青黃不接之時酌量發糶若上髙已撥發二千石東鄉已撥發三千石臨川金溪崇仁己各撥發一千石并飭令糶完之日請領至南安贛州去省窵逺領運需時南安已撥發一萬石贛州已撥發二萬石如有不敷仍令通融濟糶其平糶價值飭令各該府遵照部平每石八錢五分定價申報臣與署撫臣仍不時嚴查督率并委賢員監糶不使姦商衙蠧囤販侵漁務令小民均沾實惠以仰副我皇上軫念民依之至意理合繕摺奏明伏乞皇上睿鑒謹奏據奏不令劣員及姦商衙蠧舞弊侵漁言之殊易行之甚難須殫心竭力費一番精神料理庶幾有效非一二張空文告條即能令小民均沾實惠者汝等如何行事朕自能周悉不在此奏也勉力為之江西布政使臣李蘭謹奏為請定寄莊定糧之法以便催科事竊查江西省錢糧每年奏報未完項下核其缺戶固不乏夲籍民人而寄莊田糧積缺尤甚緣江省建昌廣信等府屬多有閩浙民人置買田地寄莊辦糧者每因逺在隔省輸納不前移提追比稽延時日州縣雖殫力催科究慮鞭長莫及臣伏思任土作貢原無此疆彼界之分里戶隔省辦糧亦不過取給於租息之內應請嗣後凡寄莊田地令開明頃畝額賦佃人姓名租榖數目造冊存案每年開徴之際仍先向本戶按限催徴俟將届秋成核其完缺分數將未完錢糧令該佃按數扣租代業戶輸足以清國課仍填給本戶納糧印票令佃人與業戶自行抵算額租庶寄莊錢糧皆得歲內清完而州縣催科亦無鞭長莫及之患矣臣職司錢榖督催責重現在議詳撫臣咨商鄰省理合奏聞謹奏汝與撫臣張坦麟詳細商酌而行可也江西布政使臣李蘭謹奏為遵㫖奏聞事竊臣前奏委署贛州府印務一摺欽奉硃批正與署撫臣商酌間正月二十日奉准部文內開奉㫖張景蒼著以江西贛州府知府試用贛州府員缺緊要令該撫酌量或即將張景蒼補授抑或於通省知府內揀選調補所遺員缺令張景蒼補授等因欽此查張景蒼向曽蒞任江西實係才具優長之員但其操守尚須就近不時體察臣與署撫臣商酌謹擬有臨江府知府髙遐齡人品端方才猷敏練瑞州府知府史隨老成勤慎才守兼優均堪調補贛郡俟張景蒼到江之日臣與署撫臣於臨江瑞州二守內酌定一員具聞再照贛縣知縣劉鎬原因辦事有才經臣稟請署撫臣就近委護府印惟是臣愚昧無知不將劉鎬勝任之處於摺內奏明僅以就近護理一語上瀆宸聰致煩聖懷厪念罪實難逭伏乞聖慈寬宥臣不勝惶恐戰栗之至合併陳明謹奏所奏知道了江西布政使臣李蘭謹奏為奏明酌提耗羡以均養亷以濟公用事竊查江西省公用養亷自雍正五年於通省錢糧加一耗羡之內分欵派提原議公用銀三萬餘兩實不敷用而道府同知通判各官養亷惟照所屬額賦提派未免豐嗇不均今臣與署撫臣僃細商酌將通省一應起存地丁本折漕屯兵折驛站蘆課茶果等欵正雜錢糧通盤酌算就各州縣耗羡之多寡定為五等提解除額徴一萬兩以下縣分所有耗羡留為養亷不提外其額徴二萬兩以下者每兩提耗羡銀五分留五分為養亷額徴三萬兩以下者每兩提耗羡銀六分留四分為養亷額徴四萬兩以下者每兩提耗羡銀六分五釐留三分五釐為養亷額徴五萬兩以下者每兩提耗羡銀七分留三分為養亷額徴五萬兩以上者每兩提耗羡銀七分五釐留二分五釐為養亷統計各欵共提解司庫耗羡銀十二萬八千六百五十餘兩又照舊提解漕米一分耗銀七千六百四十餘兩又京餉飯銀除支解外約餘銀五千兩又查出各衙門鹽規銀四千六百三十三兩以上共實提解司庫銀一十四萬五千九百二十餘兩內除督撫藩司書役工食紙張火藥表箋等項銀六千三十六兩又臬司糧驛二道奏銷解費押運赴淮公用等銀八千七百三十三兩督撫司道及知府同知通判勻給養亷銀共七萬二千九百七十六兩又首領佐雜等官除解餉額有水腳其餘一應差遣應留盤費銀二千兩又南新二縣附省事繁共存給公用銀八百兩實餘銀五萬五千三百八十餘兩以充通省公務及春秋二餉解費地丁奏銷并顔料銅斤木植水腳塘餉報資科場等項之用雖額提耗羡歲內不能全完而遞年通融新舊接濟一切公用養亷可無不敷不均之患矣臣識見淺陋未能合宜謹將均派養亷分繕酌提酌存二單恭呈御覽伏乞皇上指示遵行謹奏凡如此等奏摺朕不過一覽而已從不批是當與否總在汝等撫藩大吏秉公合宜不欺不隱為之須還朕一當字而已能令後來者遵循不易不留瑕隙致被指摘檢㸃則可保無貽害於身家也倘料理少不妥協或假公濟私有網利狥情等弊前車之戒不必逺稽往古目今六七載間之報應歷歷可鑒也秉公為之閲酌存單內州縣養亷多寡不均處朕頗不以為然若照所派至於兩相互調時恐難免有不平物議而汝等亦不免存髙下其手之嫌也酌提單內道員養亷似較他省太少或此外仍别有資益處亦當據實聲明即此所辦亦不甚妥協況酌派通省公用養亷乃應巡撫奏請之事汝不當越奏將此三摺批諭與張坦麟看江西布政使臣李蘭謹奏為恭謝聖訓事竊臣於雍正七年四月初六日奉到硃批奏報雨雪一摺及硃批酌定養亷三摺臣隨恭設香案叩頭祗領欽遵即將養亷三摺內所奉諭㫖恭交署撫臣張坦麟看明聽署撫臣回奏外伏念臣知識短淺見理未明承辦地方事務自知紕繆多端然不敢稍存私念欺罔聖明今奉諭㫖訓誡諄諄臣跪誦之下感激涕零惶恐無地寢食寤寐念兹在兹雖自分駑劣惟有殫心奮勉事事矢公矢慎不敢稍涉虛詐以仰副誥誡深仁於萬一耳所有微臣祗遵聖訓并感激愚忱理合恭摺奏謝謹奏當務實力奉行若少涉保身獨善瞻狥沽譽鑽營託庇之私不必逺尋鑒戒近觀諸本省之裴􅏍度張楷陳安䇿孫蘭苾等皆榜樣也惟有秉公持正竭力報國剛方孤介任勞任怨乃保身之良方餘無二䇿可仿效田文鏡鄂爾泰李衛毅然行去庶免遺憾勉之慎之江西布政使臣李蘭謹奏為請嚴餉鞘之防衛飭禁護兵之騷擾以重錢糧以安民生事竊查定例解官領解餉銀由官塘大路按站行走夜宿州縣交明地方官差委官辨兵役防護沿途營汛撥兵護送法已周密但各省至京站路有由州縣經過之處亦有與州縣間隔止由腰站經過之處其間由州縣之路固可夜宿城中交明地方官照例防護自無意外之虞其有不由州縣之腰站郵亭旅店既無堅壁深壘驛吏汛防亦復兵役寥寥以四通八達之孤村投寓巨萬餉鞘實為可慮臣愚以為宜請敕下各省督撫轉飭地方官查明凡係餉鞘經宿之腰站酌動公項銀兩於人居稠密處所建設庫房三間厚其牆垣堅其門戶前後左右緊列柵欄餉到則交貯庫中令解官解役護送兵丁坐守於內外則鎖閉柵欄汛兵更夫巡邏達旦庶防範周密餉鞘可保萬全至於護鞘官兵原由沿途營汛接遞撥送但文武衙門本無統轄解官微員更加藐視臣聞每有不肖官兵藉護送之名於經宿旅店任意騷擾似宜急請嚴禁懇敕直省督撫轉飭地方文武官辨嚴行禁約凡護餉兵役俱令解官稽察約束如有違犯許解官詳移該管衙門并申報督撫拘提究革倘解官通同狥隱一經發覺立即題參議處庶兵役知警小民免纍矣臣愚昧瀆陳是否有當伏乞皇上睿鑒施行謹奏此奏是候交部議覆有㫖江西布政使臣李蘭謹奏為奏聞事竊臣䝉署撫臣牌准户部咨開奉㫖著臣動公帑銀四千兩親往大庾南康二縣被水地恩㫖感愧交集遵於七月十二日前往二縣遍歷鄉村逐戶親查至閏七月初八日查畢欽遵諭㫖分别原被水之輕重科算帑金於十一十二十三等日均勻賞給被淤田地已多開復禾苗俱各茂盛水衝房屋亦多修整間有未復未修者皆感沐皇恩現在開復修整臣見窮簷蔀屋實被皇仁感激抒誠永戴生成之題報外理合將遵㫖查勘及散賑事宜恭摺奏聞謹奏覽江西布政使臣李蘭謹奏為聖恩之教育彌深微臣之負罪莫逭恭伸謝悃仰祈聖鑒事竊臣於雍正七年九月十五日奉到硃批恭謝聖訓并大庾等縣散賑二摺隨恭設香案望闕叩頭祗領訖臣跪誦恩綸不勝惶悚戰栗汗流浹背誠有無地自容者伏念臣以一介庸愚受我皇上天髙地厚之恩由小翰林而擢至藩司每逢奏摺俱䝉聖慈諄諄誥誡教育鴻仁有加無已臣非草木自應恪遵聖訓隨事體驗隨時省察上為朝廷宣德化下為百姓計安全方於臣職無虧奈臣知識謭劣雖日凜冰兢恆多隕越以致地方災祲上厪宸衷臣罪大孽深即萬死何足蔽辜乃皇上不加嚴譴復頒恩諭多方教誡命臣以潔巳之良方示臣以免過之法則此誠我皇上格外生成之至德臣惟加意奮勵一秉至公痛除沽譽瞻狥之習力求改過遷善之道凡存心行政宣力效忠欽遵皇上指示一以田文鏡鄂爾泰李衛諸公正大臣為效法必不敢以學識才力之不如甘自暴棄致負我皇上矜全玉成之大德也所有感激私忱理合恭摺奏謝伏乞聖鑒謹奏功名事已經結局今此代攝為期不過數月倘又致咎誤頻聞則關係身家性命矣慎為之硃批諭㫖卷六十四
