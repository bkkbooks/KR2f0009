body:
  text: 欽定四庫全書硃批諭旨卷一百八十七硃批李玉鋐奏摺雍正八年五月初二日福建按察使臣李玉鋐謹奏本年三月初四日福建將軍臣阿爾賽傳臣至署宣旨福建按察使李玉鋐進摺交大學士蔣廷錫轉奏欽此隨望闕叩頭謝恩訖伏思臣一介庸愚知識短淺荷蒙聖恩畀以閩省刑名重任日夕敬凛惟矢竭寸誠勤於職守以期仰報主恩於萬一兹就臣管見所及三條謹為我皇上陳之一閩省械鬭訟端大半起於阻葬占墳人即糧明契據買地葬親而地旁數里之頑民劣襟或指其一定例內凡侵盜那移等贓一年內全完將死罪人犯比免死減等例再減一等發落軍流徒罪等犯免罪等語查六贓內惟枉法贓最重若限內完贓即槩行減等寬免似覺情罪較有重輕邀恩無分彼此可否請嗣後於六贓內如有貪官汚吏土豪惡棍衙役人等犯枉法者將贓銀限內全完其罪應死者止免其死罪仍議擬充軍犯軍流徒罪者不準全免其罪止減一等發落俾前之貪吏皆不免於法則凡稍有貪念萌於肺腑者皆凛然知一查律載竊盜搶奪二項人犯除贓多及拒捕傷人從重議擬外其現行律例分别治罪之條允當明晰惟刺字少有互異搶奪不分初犯再犯俱刺臂竊盜不分初犯再犯俱刺面夫立法刺字原有深意初則望本犯尚能改革繼則使衆人知所防禦搶奪再犯刺臂罪由藏於衣內人不盡知似難防禦竊盜初犯刺面罪由彰於耳目人所共棄似再犯均刺於面庶法令畫一不失寬嚴相濟之道矣以上三條臣庸材謬議是否有當伏乞睿鑒施行謹奏覽雍正八年七月二十一日福建按察使臣李玉鋐謹奏竊查福建各府州縣積貯倉榖通計共一百三十餘萬石每年各縣倉榖知府直隸州盤查府州倉榖各該道盤查而總滙於藩司是藩司察核之責為尤重但藩司職掌全省賦役凡完欠考成度支銷算及一切經制典禮關係國計民生之大者悉專責該司在該司雖極知倉榖重大加意稽察而精力終難專一臣向任雲南楚雄府知府見雲南通省倉榖歸糧道管理稽查易得周詳今閩省各府州縣倉榖可否仰請聖裁照雲南之例改歸糧儲道管理凡一應盤查交代册報考成悉令糧儲道專司其事則該道可以不時親詣各屬抽盤必無疏忽似於通省倉榖有益至每年奏銷册籍仍照兵糧之例造送藩司彚轉再有請者糧道既兼管通省倉榖事務甚重凡有辦銅等差似應均免派遣以專責成臣因積貯要務不揣冒昧謹獻一得之愚是否可行伏乞皇上睿鑒施行謹奏此事應言之督撫會商酌定具題請旨將所奏并朕批諭與督撫二臣看同日又奏竊臺灣一郡逺隔重洋蒙皇上軫念該郡道府廳縣等官前此升期六年加以交盤渡海為時太久其父母妻子難免內顧之慮特加恩格外定期二年為滿調回內地補用仍分别加級以示鼓勵又先期半年令㨂選賢員前往協理俾海疆既得熟練之員而各官又免內顧之慮業經部議遵行在案臣何人斯復𠫭管見但臣愚以為凡賢員久任地方實為地方之益臺灣員缺就臺地之員拔其尤者升補臺缺似於臺地更覺有益查臺灣一道一府二同知一通判四知縣原屬選調才守兼優之員可否仰懇聖恩嗣後臺灣道府廳縣缺出先儘在臺賢員題升以收駕輕就熟之妙其各升員內如係越銜保題者照例送部引見恭候簡用若係應升員缺可否仰懇皇仁俯念重洋逺涉免其引見出自聖恩如此就臺擢補在該員蒙升用之榮倍加鼓舞感激皇恩惟恐報稱之不逮有何內顧之堪憂倘該員當升轉之期無升轉之缺而有矢心報效國爾忘家者許該員詳請督撫具題留任升用內有期滿之員無缺可升交盤巳清自揣精力願回內地者許其乘南風而回聽候內地補用是則皇上之恩及臺員淪肌浹髓而臺員應倍加感奮竭誠圗報矣再調臺之員有親老丁單者先行查明免其調補是否有當伏乞皇上睿鑒施行謹奏成例循行巳久人情趨舍不同何必限定以臺員升臺郡而復為是更張之議耶硃批諭旨卷一百八十七
