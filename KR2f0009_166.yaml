body:
  text: 欽定四庫全書硃批諭㫖巻一百六十六硃批陳王章奏摺雍正二年正月二十六日署理山西大同總兵官臣陳王章謹奏為奏聞事竊臣奉命署理山西大同總兵官印務欽遵諭㫖細詢原署鎮臣馬㑹伯地方情形軍伍機宜馬㑹伯一一説明所有應行未完事件惟清查各營路隱占空糧已據殺虎協新平路得勝路山隂路平魯路助馬路北樓營老營營偏關營九營路并各該所屬城堡清出馬歩戰守空糧共三百五十九分業經具摺奏聞所有靈邱路利民路東路營河保營水泉營五營路未據報到等語臣隨即行文各營路催令速為開報應俟詳報到日臣細加查核隱占數目招募充補另行摺奏至鎮臣馬㑹伯乆歴外鎮其於營伍事情俱甚諳練但臣初膺重寄營伍事宜未即周知惟倣效馬㑹伯作事矢竭駑駘以仰答聖主髙厚洪恩耳為此繕摺奏聞謹奏知道了查核空糧固係應為之事亦不可過刻雍正二年三月二十六日署理山西大同總兵官臣陳王章謹奏為據實奏明事竊照前署鎮臣馬㑹伯清查隱占空糧一事尚有靈邱等五營路未據報到經臣繕摺奏聞奉有硃批臣跪讀之下仰見聖明無微不燭臣雖至愚敢不上體睿懐使所屬將弁共沐皇仁竭忠報效今據靈邱等五營路將額設親丁之外清出空糧陸續具報到臣共計馬歩戰守空糧一百二十四分臣核查得實隨飭令各營路㧞募壯勇以實軍伍外所有清查隱占空糧數目理合具奏更有前署鎮臣馬㑹伯飭行各營路修造甲械旗幟鍋帳等項經臣續催去後隨據新平等十營路報稱一應軍中備用等物畧為修整尚堪應用無庸另造惟殺虎協營查有舊損盔甲一百八十副經前任鎮臣馬覿伯諭令該協副將丁士傑公同捐資赴京修造經臣呈明兵部出給路照裝䭾囘營至東路靈邱山隂三營路并各所屬城堡除甲械旗幟等項俱堪應用外東路營添造帳房六十四頂銅鍋六十四口督陣紅旗一十三面靈邱路添造銅鍋二十一口山隂路添造帳房二十五頂月二十四日有内閣學士衆佛保副都統渣什同喇嘛等䕶送策妄阿拉布坦来使跟頓抵大同府臣出郊跪迎聖㫖送至公館隨備飯款待来使即於二十五日赴西路去訖理合一併奏報伏祈聖主睿鑒謹奏覽奏俱悉爾諸凡行為悉宜與撫臣諾岷商計其斟酌事體處最屬妥當諮詢於伊諒無差謬雍正二年閏四月十六日署理山西大同總兵官臣陳王章謹奏爲恭謝聖諭併繳硃批事竊臣續查大同鎮屬靈邱等五營路空糧併各營路修造軍裝器械等項繕摺具奏奉有硃批臣跪讀之下感深五内伏念臣至微且賤仰荷聖主知遇隆恩畀署邊疆重任時􅋀悚惶復蒙皇仁俯憐魯鈍特命凡有行為與撫臣商計臣何人斯重叨覆育敢不恪遵聖訓諸凡行爲俱與撫臣諾岷商計以期仰副天心報答高厚於萬一所有原奉硃批理合恭繳為此繕摺奏謝謹奏覽奏知道了馬覿伯將次旋任俟其抵大同時將一􅋀營務交代明白回京候朕另於别鎮用爾雍正二年九月二十一日署理江西南昌總兵官臣陳王章謹奏為要缺需員遵㫖請補事雍正二年五月十七日臣自大同回京復命仰荷殊恩令臣署理南昌總兵官印務臣於五月二十一日恭請聖訓天顔温霽顧問有加疊蒙恩寵感激無地臣面奏大同鎮屬守備以下多有才技兼優之員江西地方𦂳要懇乞恩准題補仰䝉聖明俞允并令臣於兵丁中有好者亦准帶去臣跪聆天語感刻五中臣雖竭蹶駑駘難報髙厚鴻仁於萬一今有臣標後營中軍守備謝訓南昌城守營守僃王永祥衰病不堪經臣掲報督臣具疏題㕘外該臣看得臣標後營守備一缺統轄縣汛南昌城守營守備一缺職守專城俱需才技兼優之員方克勝任臣在大同署事時驗得大同鎮標中營千總劉功人材壯健弓馬優長左營千總王錫圭弓馬熟嫺辦事勤敏俱臣所深知者請以劉功補授臣標後營守備王錫圭補授南昌城守營守備實為人地相宜倘䝉俞允則臣既得收臂指之效而地方營伍亦均有裨益矣至大同馬兵梁得功范榮康成李時沛四名漢仗弓馬俱好故臣隨帶赴任遇有把總缺出臣遵㫖令其與臣標衆兵公同考驗秉公㧞補但臣雖䝉聖諭而兵部未奉明㫖恐干嚴議仰懇聖明敕部知照督撫可否出自天恩微臣未敢擅便伏乞睿鑒施行謹奏俱照所請行該部知道雍正二年九月二十五日署理江西南昌總兵官臣陳王章謹奏為遵㫖酌議棚民事宜據實囘奏事竊臣欽奉特㫖署理江西南昌總兵官印務陛辭之日跪聆聖訓因江西棚民一案上厪宸衷諄諭再三令臣與督撫商酌臣雖至愚極劣敢不仰體聖心與督撫同心籌畫力圗善後使地方寜謐以期仰報皇恩於萬一查得臣屬銅鼓一營僻處萬山之中界連楚屬之瀏陽縣管轄寜州一汛棚民最多洵為險要之區而兵力單薄不足以資防守瑞州府屬之新昌一縣亦屬負山環嶺匪類易於潛藏向係瑞州營撥兵廵防舊因寜州姦匪竊發經前鎮臣楊長春遣撥備弁帶兵二百名分防銅鼓新昌兩處繼因匪孽就擒地方安静俱行撤回臣思銅鼓新昌二汛均關𦂳要必宜增兵戍守隨調前營把總一員帶兵二十名添撥瑞州營兵丁二十名貼防新昌縣後營百隊一名帶兵四十名前赴銅鼓協防即檄令銅鼓守備管率操演俱經呈咨督撫在案至袁州府屬之萬載縣亦皆崇山峻嶺密箐深林查係袁州營汛地與銅鼓營不相聨屬亦應亟為措施者也但巡防責諸武職而撫綏又在文員臣仰遵聖諭與撫臣裴􅏍度相商已有酌調幹員編户挨查之議而督臣查弼納亦於九月初八日来至江西臣復與督臣再四確議其棚民户數自應編立保甲責令該州縣按冊稽查防範既密即有續到流移自不敢輕為容留以干罪戾至於銅鼓一營議將臣標後營遊撃移駐防守原設守備移駐萬載即以該遊擊所轄之千總一員帶兵防守新昌均屬駐防銅鼓遊擊管轄則聨絡聲援呼應自靈矣所有微臣遵㫖商酌情節理合另摺具奏更俟十月初旬民間收穫既畢臣即前往要𦂳營汛親行巡查審視形勢倘有應為措置者臣再具摺奏為此繕摺奏聞謹奏所奏知道了地方諸凡事務必湏徹底明晰之後方可建議施行􅋀勿速於求成反致造次失宜也勉之慎之雍正三年二月二十八日江西南昌總兵官臣陳王章謹奏為請㫖事竊臣一介寒微荷䝉聖主天恩畀以疆圉重任於去冬巡查營汛風聞廣信府屬之上饒縣治有封禁山本名銅塘山自唐末黄巢竊踞而後歴為盜藪有等異民潛居於内耕食鑿飲自治其生身𨽻版圖之中不聽地方有司約束甚為非宜今督臣查弼納奏請遣官入山撫諭如不就撫即行進𠞰掃除黨類設立關隘存駐重兵等因具奏欽奉聖㫖此事甚關𦂳要不可稍有疎忽與巡撫總兵等詳加酌議合同一心之時再行具奏欽此欽遵密發到臣該臣恭繹諭㫖仰見皇上慎重周詳之至意臣待罪總兵敢不仰遵明㫖悉心籌畫必圗計出萬全以副聖明任使之恩但禁山以内情形傳聞不一臣已經密遣親信改裝進山探聽虚實凡有路可通之處俱令其察探回報復因督臣隔逺臣就近與撫臣裴􅏍度商議即俟臣所遣之人出山回報亦難輕信必得臣親自入山察看的實方可定議第兹春深山水將發且林木叢雜遍山俱有蟒蛇毒螫毒氣上蒸水草不便或恐隨帶兵役中毒被傷似屬非計且未經奏請毒氣漸散臣於彼時輕騎入山察看風景再與督撫合同定議具奏事關重大謹將酌議情由具奏伏候聖主指示遵行謹奏凡為封疆大臣者舉動最宜持重國體攸闗何可輕躁據奏親往封禁山查看等語朕意不然此等事惟應緩圗尤貴慎密不密則滋害甚巨設欲興兵進𠞰先當洞徹地理情形知已知彼萬無一失若至此時此際豈宜稍緩兵貴神速湏出其不意攻其不備即可計日收功今虚實尚在未審倘懷激事邀功之念而為貪利傷生之舉乃大不可者也其中匪徒或竟侵虐平民騷擾地方留之必致蔓延除之方始寜謐則又豈可因循置之不問以養癰成患耶於交冬毒螫潛跡之後選差的當人役探訪確實酌定舉行此議甚善然雖係爾之專責毋因奉朕此諭遂踰越督撫而孟浪為之斯不過密摺陳奏非比具題奉㫖始可為準諸凡悉咨呈督臣并㑹商撫臣籌計妥協而行之可也雍正四年二月初六日江西南昌總兵官臣陳王章謹奏為恭請訓㫖事竊江西一省係五省通衢棚民雜處之地臣䝉皇上洪恩畀以總兵重任防守地方是臣專責不得不設法防範以圗永安長治是以臣於去年十月内輕騎減從往銅鼓新昌一路巡查營汛即於本月二十三日回省所過地方民皆樂業伏思安民莫先弭盜而弭盜惟在嚴防嚴防又在得人即如臣標下有南昌水師營守備曲晸者歷任十五年盜案絶少實係防守嚴密潔已奉公之貟今以年近七十精力衰邁且多疾病再三告退臣念其果係老邁難以供職業經臣咨呈督臣具題矣所遺貟缺甚屬𦂳要必得勤敏之人方克勝任臣看得奉發藍翎侍衞黄瑄者人材壯健弓馬嫺熟辦事勤謹堪當此任雖江西無題補之例臣為地方得人起見不得不冒昧繕摺具奏仰懇聖恩俯准臣之所請將黄瑄補授南昌水師營守備則臣實收臂指之效矣倘䝉俞允伏乞皇上敕部施行謹奏已照所請諭部矣但此分發侍衞率皆平常人材未必有如是好貟斯係爾身干係湏再三敎導朂伊勉勵上進可也雍正四年六月初十日江西南昌總兵官臣陳王章謹奏為奏明事竊照江西廣信府之封禁山先經督臣查弼納奏請開墾設駐官兵奉㫖著㑹同臣等酌議畫一具奏欽遵在案嗣經臣差探山内情形復具摺奏明至昨年冬間督撫二臣㑹同臣遣官入山覆勘回報據稱山多險峻平地甚少亦無匪類潛藏臣等以山不甚廣開亦無益且多荒巖峭壁開鑿非易更恐開山之後反易藏姦仍應封禁以杜後釁臣與撫臣裴􅏍度畫一㑹商督臣定議具奏督臣於本年四月内差送㑹稿仍議請開設立備弁抽撥兵丁駐防彈壓在督臣亦恐日後不無宵小潛匿過為或然之慮臣與撫臣熟商此山界連閩浙一經開闢則三省流亡或託言貿易或藉口探親外来日衆勢不能禁盤詰愈難莫若仍行封禁於山外添設汛防巡查嚴謹自無他患又經㑹商督臣在案今督臣查弼納已經離任㑹稿恐尚未繕奏撫臣裴􅏍度復與臣面商將督臣意見不畫一之處合詞具奏請㫖批示遵行所有㑹同具摺縁由理合奏明伏祈聖主睿鑒謹奏已據裴􅏍度奏聞矣爾等所議是雍正四年八月二十六日江西南昌總兵官臣陳王章謹奏為恭繳御批奏摺事竊照廣信府屬封禁山前撫臣裴􅏍度與臣面議仍請封禁合詞具奏在案臣復將㑹奏緣由另繕摺奏奉有硃批除欽遵諭㫖照舊封禁外臣仍不時飭令弁兵勤謹巡查惟期地方敉寧以仰副我皇上慎重疆圉之至意所有原奉御批奏摺理合恭繳謹奏竭力勉之一􅋀無隐據實入奏方為不負朕之任用也條陳一摺留中候朕酌定同日又奏為敬陳管見仰祈睿鑒事竊臣一介庸愚至㣲極賤荷䝉聖主知遇之隆簡畀總兵重任感激皇恩無可報效茍有一得之愚有裨於治理者安敢緘黙不言以負我皇上任使之恩今將臣管見二條謹為我皇上敬陳之一各省總兵官凡隸總督管轄者一切大小事情俱聽總督指揮故總兵所屬將弁或有過犯應行㕘處者該管總兵訪查確實掲報總督衙門俟總督核㕘之後行文知照到日始行摘取印信缷事離任此定例也但道里有遠近之不等事故有輕重之不同總督兼理兩省其駐劄同省之總兵相隔不遠者掲㕘屬貟尚湏十數日始行摘印委貟署理若隔省總兵相距總督衙門遠者二千餘里近者亦不下千有餘里文移往返動需月餘此際劣員覘知掲報計莫可施更無顧惜則賣糧鬻餉剋兵婪𣲖種種弊端從兹而出如過犯稍輕者或知自悔倘罪惡深重則情急變生均未可定似宜酌量道路之遠近事故之輕重稍為變通者也臣請凡各省總兵所屬將弁遇有過犯應㕘處之貟一面開具劣蹟掲報總督衙門一面查該貟事故輕重應缷事者即令缷事應看守者照例看守俟總督核㕘知照到日分别安置庶被掲之貟不得逞其狡獪伎倆而於營伍亦不無小補矣一州縣官專理民情武弁職膺戎務各有攸司不容紊越者但兵民實屬相關文武本同一體故諱盜之處分原屬無異因武弁惟有緝盜之責而無讞鞫之權凡遇明火執械盜刧案件俱係有司審訊事主地隣之供詞為憑其中不無規避處分移重作輕諱强為竊以及匿不報聞之弊至武弁雖不長於文墨而失事强劫情形易為查察若使武弁自行具報文武互異為上司官者勢必駁詰而有司或以事主地隣之供詞舞文弄法多端掩餙或反誣武弁為捏報而武弁並無供詞可據不敢固執故凡遇有盜案必俟有司審訊畫一具報其無知武弁惟圗苟安於目前因而扶同隐諱或為有司所挟制而遷就相從者至有漏網之大盜而無領贓之失主及致上司覺察或經别案敗露文武一體處分而武弁之為有司所朦蔽者似屬可憫至於姦徒匪類造給偽劄謀為不軌煽惑良民關係重大之事或經武弁覺察設法誘首自應移送有司根究而有司或以功非已出含糊完結或稱事有疑情難以懸擬因循茍且俱或有之臣請凡遇有匪逆重情以及明火執械盜劫案件令文武官弁公同研鞫合詞具報庶不致有諱匿之弊而實情可得或亦有裨於治理矣以上二條臣謬抒管見冒瀆聖聰倘臣言或有可採伏乞皇上鑒擇施行謹奏所奏二條發交在廷諸臣㑹議以不可行奏覆矣朕意亦以所覆為然議摺并發爾看雍正四年十二月初二日江西南昌總兵官臣陳王章謹奏為恭繳御批奏摺事竊臣於本年十月内奏繳封禁山事原奉御批奏摺并臣條奏一摺奉有硃批諭㫖臣跪讀綸音益深感激伏念臣一介庸愚知識短淺荷䝉聖主天高地厚之恩畀以封疆重任臣惟有仰遵聖訓黽勉供職幸藉天威地方寜謐臣駐劄南昌府省㑹之地統轄各營凡一􅋀戎行武事俱係臣之專責倘有應行陳奏者自當據實入告斷不敢稍有隱蔽以負我皇上委用之洪恩也臣圗報之心刻不敢懈今奉訓㫖諄詳益思奮勉恪盡臣職以答天恩於萬一耳所有原奉硃批奏摺理合恭繳謹奏只在能行與否耳章奏言論朕不以為憑同日又奏為恭謝天恩仰祈睿鑒事雍正四年十一月二十七日臣接得臣子陳善家信一封内云怡親王奉上諭將本屬下有可以做得州縣之人帶領引見今於十一月初五日怡親王將陳善等五人帶至乾清宫引見奉㫖交與吏部以州縣用欽此臣聞命自天感激無地伏念臣以愚鈍旗貟荷䝉我皇上畀以總兵重任無可報效惶恐實深今臣子陳善一介微賤特荷聖恩以州縣用臣父子叨䝉寵異有加無已沐恩愈重而報稱愈難臣惟有囑臣子陳善克勤克謹勉效駑駘以仰報皇上浩蕩之恩耳臣感激之忱刻不能安為此繕摺奏謝謹奏爾子陳善極宜嚴加敎訓令其做一好官少年人惟貴勤學􅋀戒自以為是雍正五年七月二十六日江西南昌總兵官臣陳王章謹奏為微臣戀主情殷仰懇聖慈恩准陛見以抒孺慕事竊臣於雍正二年五月内荷䝉聖恩命臣署理江西南昌總兵官印務隨於六月内到任嗣奉特㫖實授南昌總兵官臣任事迄今地方寜謐棚户乂安此皆仰賴聖天子至徳廣運之所致也竊思臣以樗櫟庸材叨畀封疆莅任以来涓埃未報坐糜廩禄悚歉殊深臣自雍正二年恭覲天顔經今三載雖夢寐之間未甞不戀戀闕廷思覩聖顔匪朝伊夕且以臣之知識有限而治道無窮惟冀跪聆聖訓牖臣之愚開臣之塞俾臣於治理有所遵循不獨臣一身之幸實地方之幸也為此繕摺奏請伏乞皇上睿鑒謹奏勉盡職守勝如年年来京陛見也不必雍正六年二月初三日江西南昌總兵官臣陳王章謹奏為奏聞事竊照臣標所屬六府地方統轄一十五營凡屬貟之賢否固所關心而兵餉之虚實尤當留意兹查所屬各貟皆恪遵功令除親隨而外不敢隱食空糧但各營向有公費名糧每營或二十三十四十分不等共糧四百六十五分亦屬空糧所謂公費者每年兵馬奏銷有戸兵二部飯食之費與夫營中備用火藥以及修理旗幟器械等用臣到任之始未敢輕率再四籌畫若盡行裁革則舉動維艱因細加斟酌減而又減以營分之大小定費用之多寡除臣標前後兩營額設兵丁一千四百五十名量存公糧六十二分外其各營每兵百名量留五分共留公糧一百八十八分以為營中需用其餘陸續召補名糧二百一十五分以實營伍以資防禦再臣標各營盔甲尚堪備用惟前後城守水師四營之盔甲稍覺色舊臣正在捐俸添造適撫臣布蘭泰到任言及營伍事宜隨幫銀五百兩與臣所捐一併添造共造盔甲一千頂身鳥鎗一百餘桿以添前後城守水師四營儘足備用矣理合據實奏聞謹奏覽奏知道了大抵營伍中幾分公糧係不可少者但以公濟公自不被人談論若稍存私則不免物矣同日又奏為恭懇聖恩事竊查臣標前後兩營遊擊守備以及城守營守備等官自設鎮以来俱無駐劄衙門歴皆自賃民房居住臣伏查雍正元年九月内欽奉上諭現在之生祠書院如果係名宦去任之後民間追思葢造者准其存留其餘俱著地方官查明一槩改為别用或為義學等因欽遵在案今南昌府城内有原任撫臣白潢郎廷極原任布政司石成峨等生祠各一所竝非伊等去任之後民間追思蓋造者以空閒之祠宇為駐劄之官舍似屬相宜再南昌向有都司一員已經裁缺其衙門現在空存查臣標除後營遊擊移駐銅鼓營外尚有前營遊擊一員前後兩營中軍守備二員城守營守備一貟俱無駐劄衙門臣請即以都司衙門駐劄前營遊撃以白潢等生祠三所駐劄三營守備現在與撫臣布蘭泰面商是否可行伏候聖裁倘䝉聖恩俯准則將備有駐劄之衙門每年可省房租銀兩當億萬斯年莫不仰頌帝徳於無疆矣為此具摺請㫖謹奏最善之舉應如是辦理者爾與布蘭泰相商諒必亦以為然也雍正六年六月二十一日江西南昌總兵官臣陳王章謹奏為奏聞地方得雨情形事竊臣荷沐天恩擢用總兵莅任以来仰賴聖天子至徳遠被年歲有秋萬民樂業惟上年低窪之田畝間有歉收之處不過十分之一二至於本年三四月内雨澤時降惟五月内雖得微雨九次未能霑足賴河池盈蓄車戽灌溉早禾已獲豐登其最髙之田稍稍欠收今六月初二初九十一二十等日得沛甘霖晚禾現在栽插秋成有望臣仰體皇上軫念民瘼無微不至所有地方得雨日期理合奏報仰慰聖懐謹奏江右地方遇布蘭泰此等廵撫昏庸愚昧一無善狀欲望雨暘時若如何可得同日又奏為恭繳御批奏摺仰祈睿鑒事竊臣於本年二月内將臣標各營量存公費名糧以備營中需用情節繕摺具奏奉有硃批臣跪讀之下仰見聖天子體恤營貟無微不燭臣䝉聖恩備職總兵涓埃未報揣分難安既感皇恩之優渥復思臣職之多慚惟一切營伍事宜竭盡駑駘悉心整理以期無負我皇上任使之恩至於各營所存公糧臣飭令年終造報查核臣更不時察訪務使以公濟公倘有不肖貟硃批理合恭繳謹奏覽同日又奏為叩謝天恩恭繳御批奏摺仰祈睿鑒事竊臣前因臣標遊守等官皆無駐劄衙門臣請以裁缺都司衙門並原任撫臣白潢等生祠為遊守等貟衙門具摺奏懇聖恩奉有硃批臣遵即具文移咨撫臣經撫臣布蘭泰檄司酌議俱於五月内撥給遊守等駐劄闔營將備莫不頂感聖恩之廣被仰戴帝德之無疆也再都司衙門以及各祠宇雖經改設將備衙門但未奉明㫖恐有更易伏乞皇上敕部施行以昭曠典以垂不朽所有原奉硃批理合恭繳仰祈聖鑒謹奏與布蘭泰商行則可此等小事朕豈宜特㫖敕部施行殊可謂不識大體粗鄙之至雍正七年五月二十二日江西南昌總兵官臣陳王章謹奏為奏聞事竊臣猥以庸劣待罪南昌仰藉鴻庥疆宇寜謐今歳入夏以来雨澤調勻各屬地方早禾暢茂可卜有秋而晚禾亦因雨水充足漸次播種即目前當青黄不接之時已䝉我皇上軫念民生特命截留漕米十萬石減價平糶現經署撫臣張坦麟分委文員在於各處監糶是以米價甚平民皆樂業莫不仰頌皇仁共戴天髙地厚於無既也所有地方雨水情形理合具奏伏祈睿鑒謹奏雨澤雖調必待收穫後方可言秋成也似汝如是預為大言朕則從無此㫖亦不敢存此非理過分之心同日又奏為據實陳奏事竊照江西廣信府屬鉛山縣係臣所轄地方臣於所屬營員固時為查察其優劣即文職之賢否臣亦未甞不留心詢訪也查該邑知縣張崇樸莅任四載勤慎練達才守兼優兹因承委勘查調補鄱陽令駱光榮於興安縣原任内承修祠宇卑薄民壯缺額器械不全城垣失修等事經新調興安令王珏詳掲委員張崇樸與䕶廣信府事上饒縣知縣王還樸抑勒交盤等情業經署撫臣張坦麟具疏題㕘在案其事情曲直臣不敢越俎過問無由深知但以張崇樸居官有聲乃為别案株連觧任人才難得殊為惋惜適本月十五日臣因公出有鉛山縣士民七十餘人攔輿哀籲呈懇題請將㕘令張崇樸復任情詞迫切涕泗交流伏查張崇樸原屬賢能之貟細訪輿論出自中誠臣雖職在詰戎文員事宜非臣所當干預但臣既有親知灼見敢不據實直陳為此具摺宻奏伏乞睿鑒謹奏此案巳特遣京官前往審理是非曲直自有明白雍正七年閏七月初十日江西南昌總兵官臣陳王章謹奏為回奏事竊臣繕奏請撥撫標官兵一摺荷䝉欽頒怡親王等議覆奏摺到臣臣讀怡親王等議稱督撫鎮協所撥之兵在司道府州縣之賞給看待既不可慢褻兵丁或有過犯亦難遽加責罰且恐文武致生不睦又稱既以壯丁為長隨斷無不另給與衣食之理所給工食即可為贍養家口之資等語伏查司道等官撥給壯丁一案臣愚以為既由各州縣額設民壯内挑選分撥則多有離鄉應役者月給工食祗足供一身之需似難顧及家口謬陳請撥各標兵防䕶之末議但臣識見淺陋竟未籌及文貟之看待兵丁不可慢褻或有過犯亦難責罰即壯丁既為長隨自應另給衣食工食即可為養家之資皆臣計慮之所未逮也謹將欽奉御批奏摺併怡親王議奏摺本原封恭繳伏祈聖鑒謹奏身膺地方重寄而以計慮所不逮之事混行凟奏未知汝之心思更專注於何處也朕殊代汝愧之同日又奏為恭繳硃批奏摺仰祈聖鑒事竊臣繕奏鉛山縣解任知縣張崇樸一摺並奏報雨水情形一摺俱奉有硃批臣跪讀綸音惶悚無地伏查早禾得雨頗為霑足且溪河有水可資灌溉故一時冒昧遂以可卜有秋具奏荷䝉御筆批抺恭讀諭㫖仰見宸衷敬慎聖徳謙沖敬天之心久而彌篤臣愚昧無知不能仰體睿懷措詞訛舛罪實難辭復䝉皇上恩宥訓誨諄諄臣感激既深愧悔愈􅋀惟有恪遵聖訓益矢兢惕圗效犬馬報主之誠於萬一耳至於各屬早禾久巳登場收成七八九分不等現在省城米價每石六錢三分惟是晚禾於七月十八十九兩日連得大雨之後歴今二十餘日雨澤稀少合併奏明所有原奉硃批理合恭繳仰祈睿鑒謹奏雨澤稀少乃係自然之理地方文武大貟不妥何能感召和氣而致豐亨也同日又奏為據實奏聞事竊本年閏七月初一日南昌府知府許鎮衙署夜間失竊臣聞報之下即飭城守營備弁勒限嚴緝贓賊務獲在案又於初四日准驛鹽道魏錫祚咨報該道衙署於初二日三更時分被盜當經據情分報督撫仍勒限城守營僃弁等嚴緝正盜獲究在案第臣待罪總兵職任綦重乃今省城之内府署既報失竊道署旋報盜劫疎忽之咎臣復何辭除遵照例限一并開列職名呈送署江南江西總督臣范時繹查核㕘處外再查盜竊案件雖祗應循例報㕘但事關衙署被盜不敢不先為據實奏明臣無任戰兢惶悚之至謹奏汝已盡言朕復何諭平日不能嚴謹稽巡克盡職守以致省㑹重地如此疎防其餘安可問耶嗣後仍不痛自刻責毫無愧懼但以偶爾疎忽認過則可謂無知無恥之小人也此數起盗賊情形朕早聞之汝幸實陳倘匿不奏聞其禍莫測總之敬慎二字時刻勿容去懷如謂身任總兵數年似此稍有怠忽亦屬常事試看類斯等案接踵而至矣其敬之慎之毋懈雍正七年九月初八日江西南昌總兵官臣陳王章謹奏為欽奉上諭密飭嚴拏大盜以靖江湖以安商民事雍正七年八月十三日准署江南江西總督臣范時繹差投密文内開雍正七年八月初一日接准内閣大學士字寄恭奉上諭查拏大盜趙七等因並鈔發原字一帙到臣臣當經遴差臣標後營千總朱衣前營外委把總髙爵選帶幹練兵丁改裝分路前徃湖口彭澤黄毛塘八里江小孤山一帶地方江岸湖濵無分界址密訪大盜趙七等濳頓出沒處所如有實在蹤跡即密商該地方文武官相機并力擒拏仍星飛報臣衙門添撥官兵堵禦協擒并嚴飭朱衣等務湏慎密從事毋令塘汛知風走漏消息致盜越境遠颺干咎業已分路訪緝在案仍俟署江西撫臣謝旻莅任後臣再面同商酌設法擒拏務獲外所有微臣奉文訪拏大盜縁由合先奏明伏乞聖鑒謹奏此案若不加詳加慎縝密從事似此混行差委又復虚張聲勢或致賊徒聞風遠颺及或激成事端恐貽汝身家性命之憂也實力慎為之毋忽同日又奏為恭繳硃批奏摺仰祈聖鑒事竊臣前具恭繳御批并奏報秋雨情形一摺奉有硃批臣跪讀諭㫖愧悚無地伏念臣待罪南昌歴今六載虚糜廪禄寸長未效復不能仰體皇上安愈求安之盛心調劑得宜措施咸當是以不能感召天和遂致雨澤愆期收成歉薄臣顧職增慚撫衷滋懼仰䝉聖諭教戒敢不深自刻責勉力思奮以上答髙深於萬一也謹將欽奉硃批奏摺另封恭繳再查臣屬地方秋禾情形髙田得雨稍遲收成僅有五分六分不等惟近湖低窪田畝因藉湖水灌溉俱有十分收成合併奏明伏乞睿鑒謹奏朕之前諭盖冀汝等文武大貟各盡公忠以感召天和之意非欲汝等諱災匿眚任意增減虚揑妄奏以寛慰朕懷也同日又奏為欽奉聖訓瀝誠奏謝仰祈睿鑒事竊照江西驛鹽道及南昌府知府被失兩案臣繕摺具奏奉有皇上髙厚隆恩特畀封疆重寄分應敬慎供職督飭巡防務俾盜賊屏跡地方敉寜斯無負聖主委任之至意乃臣平日不能董率屬員加意防範特訓臣以敬慎二字時刻勿容去懷如以似此怠忽為常事試看類斯等案接踵而至矣聖諭諄􅋀臣跪誦之下感激涕零敢不恪遵訓㫖痛自刻責時存敬慎之心綢繆未雨以靖疆圉斷不敢仍前疎忽毫無愧懼自甘為無知無恥之小人上辜我聖主教誨之深恩也為此具摺奏謝并繳硃批伏乞聖鑒謹奏何用多言實力行與朕看同日又奏為奏聞事竊照江西驛鹽道及南昌府知府衙署於閏七月初一初二等夜被失兩案經臣嚴飭營貟勒緝贓盜務獲去後隨於本月十二日據城守營守備王錫圭訪獲陕西人焦成吉送交新建縣訊據焦成吉供稱向在湖廣漢口認識匪類沈二係山西人併一姓陳的今年七月二十八日在江西省城復遇著沈二陳姓兩人及一姓劉的更有兩人不知姓名共五人係該犯引領住居城隍廟道府失事兩案俱係沈二等盜竊該犯未與同行沈二等因於閏七月初二日夜遇兵爭鬬即於初三日起身往湖廣蛇口去了該犯送至九江得受銀衣復囘省城等語臣據該守僃禀報情由當經飭令選差幹兵協同縣捕前往湖廣等處躧緝在案但查閏七月初二日夜城守營巡兵胡陞何朝棟遇賊格所有訪獲焦成吉訊供縁由理合據實具奏伏祈皇上睿鑒謹奏覽同日又奏為聖主訓廸諄詳微臣感激情􅋀恭申愚悃叩謝天恩事雍正七年八月初七日江西按察司臣胡瀛親齎上諭一道到臣臣叩頭跪接捧讀聖諭諄詳周至皆我皇上牖啓愚䝉儆飭臣等之盛心也竊惟臣子致身許國自應時凛公爾忘私之義勿存巧詐沽釣之心斯上不負主下不負身而於臣節為無忝若徒自顧身家肆為姦巧不以實心任事圗邀虛譽則臣節有虧既為國法所不宥亦覆載所不容也臣以庸愚仰䝉知遇簡畀封疆躬荷隆恩涓埃未報雖氷淵是凛矢竭公忠以期仰答聖恩下盡臣節但才識闇劣時􅋀悚惶今䝉我皇上垂慈教誨特訓臣以公字上求復勉臣以只在根本上研究不必逐末訓誡丁寜至明至􅋀臣敢不恪遵聖諭益礪初心矢公矢慎務本輕末以仰副我皇上諄諄訓迪之徳意於萬一耶所有微臣欽䝉聖訓縁由理合繕摺囘奏叩謝天恩伏祈睿鑒謹奏惟中材以上之人方能一撥即轉朕之訓諭不過盡人君之心汝之奏謝不過聊具人臣覆奏之虚文而已究無實際果能恪遵仰副與否則在汝等力行何如耳豈在此數句語言文字耶同日又奏為恭聞訓㫖愧懼彌深敬申誠悃仰祈聖鑒事竊臣前具敬陳管見等事一摺䝉皇上特頒怡親王等議覆奏摺到臣臣隨具摺囘奏奉有硃批臣跪讀綸音驚惶莫措伏查司道等官撥給壯丁一案臣不能深計熟籌妄以管窺蠡測之見冒昧瀆奏敷陳無當臣咎難辭恭讀御批不知爾之心思計慮專注於何處之聖諭臣實驚懼交廹無地自容總由臣闇劣麤疎致有舛錯仰䝉皇上垂慈寛宥訓諭嚴􅋀臣敢不益矢砥礪凡事細心體認以期無負我皇上生成敎誨之鴻仁於萬一為此具摺囘奏仰祈聖鑒臣無任戰慄惶悚之至謹奏既能靦顔有前一奏今之驚懼亦未必然也同日又奏為恭謝天恩事雍正七年九月初三日臣齎摺家人恭捧御賜平安丸五百丸到署臣隨恭設香案望闕叩頭謝恩祗受訖竊臣一介庸愚躬膺異數備位疆圉慚無報稱乃䝉我皇上眷顧優隆特賜平安丸臣祗承恩賞愈􅋀悚惶惟有仰體睿懷敬謹收貯按照方引隨時濟人俾官吏兵民均沾聖澤共戴皇仁於無既耳為此具摺叩謝天恩伏祈睿鑒謹奏此藥係隨衆頒賞非特賜也何必奏謝雍正七年十月初十日江西南昌總兵官臣陳王章謹奏為奏聞事竊照江西驛鹽道及南昌府被失兩案訪獲陕西人焦成吉并㑹差兵捕前往湖廣等處躧緝賊犯沈二等縁由臣已繕摺具奏兹於十月初三日據南昌城守營守備稟據差丁蒯逵等禀報於九月十四日在河南彰徳府安陽縣豐樂鎮地方拏獲沈二楊二并伊姊夫髙姓共三名巳經安陽縣訊供監禁候觧等情除俟觧回江省聽撫臣審題外理合將報獲賊犯沈二等日期繕摺具奏再查沈二同夥姚二巳經安慶府捕快於閏七月内在湖廣地方拏獲徑觧該省在案合併奏明伏乞聖鑒謹奏大盜不能緝獲此等穿窬便獲千百何足為奇觀汝毫不知愧似有居功之意殊屬無恥可笑之至同日又奏為奏聞事竊照欽奉上諭密拏大盜趙七一案臣差標下千總朱衣等訪緝情節業經具摺奏明隨於九月十五日據朱衣回省禀稱千總奉差一路訪緝至彭澤縣地方訪得大盗趙七本姓名陳三諢名陳三疤子因閏七月二十八日在湖廣地方行劫鹽船一隻回棹聞黄茅塘等處查拏嚴𦂳不敢停留即向儀徴而去伊同夥王登科現住江省等情臣聞報隨即面商署撫臣謝旻密飭南昌縣差捕協同營兵緝拏去後隨於十八日訪獲王登科到案據供陳三疤子係江寜府江寜縣人趙七是假名字現與同夥洪四在揚州闗上普濟庵對過同屋居住願隨官兵作眼密拏等供伏查陳三籍貫與原開籍貫不同是否即係趙七亦未敢遂置不問復經㑹商署撫臣宻差標員蔡成同臣標千總朱衣率領幹兵帶同王登科駕船沿江訪緝直抵揚州㑹同該地方文武官協力擒拏徑觧署督臣范時繹飭審外所有訪獲王登科緣由臣謹具摺奏聞仰祈皇上睿鑒謹奏辦理斯等事件當留心密訪的確設法巧為方能就獲若似此亂委標員帶領兵役虚聲四佈趙七聞風而遁必致逺颺無蹤矣俱係一般庸碌無能奈何奈何若田文鏡李衞斷不如此誤事也雍正八年二月初八日江西南昌總兵官臣陳王章謹奏為恭繳御批奏摺仰祈聖鑒事竊臣前具江西驛鹽道及南昌府被失兩案訪獲焦成吉縁由一摺並續奏拏獲此案盗犯沈二等一摺俱奉有硃批臣跪讀訓㫖惶悚無地伏念臣本庸愚毫無知識仰䝉皇上隆恩簡畀疆圉重任自愧不能先事預防以致禁城失事罪已難逭况巡兵遇賊不能擒拏致賊逃遁即臣不能訓飭之咎但查廵兵追至城隍廟前因街巷叢雜賊即閃避無蹤且有縣捕在廟外上宿實不知賊犯遁入廟中非臣敢諉過縣捕也至拏獲沈二楊金山即楊二兩犯臣以既獲正賊理應奏報是以繕摺具奏荷䝉聖主天恩諄諄訓飭臣雖至愚敢不仰體聖明垂訓徳意時懷兢惕刻責自新以上報鴻慈於萬一也再照沈二楊金山兩犯已據報在湖廣孝感縣楊店地方脱逃業經署撫臣謝旻奏聞在案所有微臣原奉硃批奏摺理合恭繳伏乞睿鑒謹奏汝奏對辦理事事不妥又聞崇尚奢侈毫無撙節聲名甚屬狼藉似此無能再加以操守不潔汝試自思恐難免身家性命之累也想係福淺命薄不能擔荷所致若仍不知改勉行將及矣同日又奏為恭繳硃批奏摺仰祈睿鑒事竊照奉㫖密拏大盗趙七一案臣將遴委員弁訪緝緣由繕摺具奏續將訪有趙七蹤跡與署撫臣謝旻面商密差撫鎮兩標千總訪拏又繕摺具奏俱奉有硃批臣跪讀諭㫖仰見聖主周詳慎重之至意臣查前准署督臣來檄有密委親信員弁訪拏之語因即遴選標弁訪緝續據臣標千總朱衣訪獲王登科供報趙七原名陳三寄居揚州臣隨面商署撫臣添委撫標千總蔡成協同密訪查拏臣與署撫臣謝旻亦經再三諄囑該千總等只宜密訪的實蹤跡再商行止勿得聲張洩漏致有知風兔脫干咎等因在案臣惟事關重大不敢擅專俱與署撫臣熟籌而行兹䝉聖訓諄􅋀臣敢不上體睿懷益加慎密以仰副我皇上訓誨之恩也再查蔡成朱衣二弁因在揚訪無趙七蹤跡隨奉署督臣范時繹署撫臣謝旻先後差委前往湖廣等處密行訪緝在案合并奏明謹將原奉御批奏摺恭繳為此謹奏既使其遠颺從何緝獲耶同日又奏為請㫖事竊照臣標前後兩營舊存馬蹄等礮衝擊不甚便利祇可供行營號礮之用惟子母礮十三位臣每年於農隙之時揀擇閒曠地方安把演放操練準頭至於省㑹城垣擺設紅衣法熕斑鳩等礮二百位未經演試詢之老成隊目據稱自康熙甲寅乙卯年間進𠞰逆賊之後歴今五十餘年從未演放伏思此項礮位原資守禦城垣之用若不時常操演似屬虚設臣隨率同將僃將法熕礮二位運至敎場試放甚為便利但紅衣礮每位重有一千二千斤不等礮身重大難於轉動容臣酌議另摺具奏外其法熕斑鳩等礮位臣請俟秋冬民間收穫既畢揀擇寛曠地方酌量盤運㡬位設把演放庶礮位不為虚設而得資實用矣至所需礮車鐵索火藥鐵弹等項即動存營公費添製應用但係擺列城垣礮位微臣未敢擅便仰懇天恩批示遵行謹奏此事當咨呈督提而行不應越分奏請雍正八年四月初八日江西南昌總兵官臣陳王章謹奏為欽奉聖訓感懼交并謹陳下悃仰祈睿鑒事竊臣奏繳奉到御批一摺奉有硃批訓㫖臣跪讀綸音感悚無地伏念臣一介庸愚荷䝉皇上天恩簡畀疆圉重寄感戴鴻仁勉圗報稱自恨識短才疎凡所陳奉辦理之事俱不能􅋀合機宜虚糜廩禄捫心滋懼且秉性闇劣即一􅋀用度亦多糜費不知惜福撙節臣實有之我皇上明同日月無微不照臣亦何敢稍有諱飾今䝉聖主憫念愚魯不即嚴加處分諄諄訓責勉臣改過微臣跪讀之下感激涕零臣非木石敢不仰遵聖訓悔過自新痛加改勉益勵操守斷不敢自暴自棄仍蹈故轍上負我皇上生成化誨之徳意也為此具摺回奏併繳硃批伏祈睿鑒謹奏汝心如木石與否朕亦不得而知但如此訓誨尚不能勉一是字則木石之不若也同日又奏為恭繳御批奏摺仰祈聖鑒事竊臣前具奏謝御賜平安丸一摺暨奏繳欽奉御批囘奏司道等官壯丁一摺俱奉有硃批臣跪讀之下慚悚無地伏惟臣䝉皇上賞賜藥丸以備濟人之用既沐天恩臣敢不具摺奏謝至司道等官壯丁一案臣以淺鄙之見冒昧陳奏仰䝉聖主批飭訓誨伏讀前奉硃批未知汝之心思更專注於何處之訓㫖臣實有愧懼交深無以自容者復奉嚴綸飭責臣更􅋀慚悚刻不能安惟有痛自刻責益矢兢惕以仰報我皇上優容之徳意於萬一耳所有欽奉硃批理合恭繳謹奏仰報與否保全始終與否總在汝自為也同日又奏為恭繳硃批奏摺仰祈聖鑒事竊臣奏繳硃批晚禾收成分數一摺奉有硃批臣跪讀聖訓愈􅋀悚惶伏惟我皇上勵精圗治念􅋀民依宵旰勤勞時殷懷保惟是臣等不能仰體宸衷敬慎供職以致有干天和年榖未能豐收臣實有愧懼修省之不遑者至上年晚禾收成分數臣原係詢之鄉民據實具奏仰䝉聖主訓諭諄諄丁寜告誡臣敢不以公忠自勵勉盡職守即年歳豐歉亦惟據實奏聞斷不敢諱災匿眚任意增減自蹈欺㒺以期仰副我皇上訓誡之深恩也所有原奉硃批奏摺合併恭繳謹奏果能行與言符耶朕試觀之雍正十年二月二十日署理江西南昌總兵官臣陳王章謹奏為聖主鴻慈逾格微臣感激難名敬陳下悃叩謝天恩事雍正十年二月十九日准江西巡撫臣謝旻咨㑹准刑部咨開該本部㑹同兵部㑹看得江西廣信營㕘將張福掲報南昌總兵陳王章勒扣公費一案於雍正九年十二月十七日題二十一日奉㫖陳王章著照部議革職伊在總兵任内尚無貪劣聲名於兵民亦屬和協其部議治罪之處著寛免南昌總兵官員缺朕一時未能得人仍著陳王章暫行署理俟有可以簡用之人再令陳王章来京餘依議欽此欽遵等因到臣臣聞命之下感激涕零隨恭設香案望闕叩頭謝恩并現在繕疏奏謝外竊臣一介旗員至微極陋荷䝉皇上知遇隆恩簡畀疆圉重任待罪南昌歴今九載廩禄虚糜毫無報稱復因賦性庸愚措施鮮當愆尤叢積表率無方以致廣信營㕘將張福掲報上厪宸衷特差大臣㑹審具奏臣返躬自問負罪實深部議革職治罪洵屬允冝乃䝉我皇上特賜矜全祇照部議革職寛免治罪仍著臣暫行署理總兵事務臣跪讀期殫報主之誠耳所有微臣感激下忱理合繕摺奏謝伏祈睿鑒謹奏再若不知慚愧失於自檢豈但功名難保恐身家性命併在其中矣敬慎為之雍正十一年六月十八日署理江西南昌總兵官臣陳王章謹奏為恭請聖裁事竊照江西南昌鎮屬廣昌一營原設專城守備一員即隸附近之建昌營遊擊統轄續經前署督臣尹繼善於請定武職陞選之法等事一案將廣昌營守備員缺改設都司僉書就近仍令建昌營統轄等因具題奉准部覆廣昌營守備既改為都司應聽南昌總兵統轄奉㫖依議欽遵在案第查建昌營距省祇三百六十里廣昌營則毗連閩省界在建昌之南山路崎嶇離郡城已二百四十里必越建昌而後達省㑹計程則六百里與總兵駐劄之處相隔懸逺不相聫屬所以從前令建昌營遊撃統轄廣昌營者以可就近指揮呼應易靈也今因改設都司與遊擊品級不甚相遠遂歸總兵統轄雖屬一定之規制然形勢遼隔設遇有𦂳急軍機倉猝之間調度未能即達不無貽誤是廣昌一營必宜就近仍聽建昌營統轄庶脉絡貫聫方為妥便而遊擊既不可以轄都司惟應將建昌遊擊一官酌為改設斯得其宜且建昌一營雖居腹裏而所屬各汛如新城南豐等縣俱與福建接壤重山險隘犬牙相錯亦屬緊要之處臣愚以為建昌營遊擊一員徑請改設叅將既可藉重名而資彈壓又可就近令其統轄廣昌營都司一轉移間而聲勢聫絡呼吸相通似於地方有益曾於去年秋間具稟督臣核示適前督臣尹繼善奉㫖陛見未經核覆臣復具文呈明接署督臣魏廷珍裁核去後隨准署督臣魏廷珍批開廣昌營改為都司已經部議應聽南昌總兵統轄奉有俞㫖欽遵在案仰即遵照毋庸改設可也等因檄行在案是署督臣以部覆奉㫖之案毋庸更張但臣再四籌維廣昌營與南昌總兵駐劄之處相隔委屬遥遠若徑照部議仍聴總兵統轄實􅋀道逺鞭長之慮臣身經目擊又何敢引避嫌疑不據實直陳於聖主之前是以不揣冒昧仰瀆宸聰請將建昌營遊擊一缺改設㕘將仍統轄廣昌營都司似於地方營伍不無小補臣庸愚管見是否可採伏乞皇上睿鑒施行為此繕摺謹奏改設將領營制攸闗是否可行仍應言之該督酌定同日又奏為奏聞事竊照江西地方自春入夏雨水調勻田禾頗屬豐茂惟聞贑州府屬信豐縣及南安府大庾縣於本年四月十八日溪水泛溢近水田禾被淹官署民居頗有衝塌損傷之處上游水勢既盛大河水亦漸漲然猶不甚為害詎意五月初八初九初十等日大雨連綿不息遂致吉安府屬之吉水永豐臨江府屬之新淦峡江撫州府屬之臨川崇仁宜黄樂安等縣均於初十日山水暴發多有衝飄廬舍淹斃人口之處大河水勢益復漲湧迅流急湍猝不及禦而南昌豐城等縣所屬地方臨河圩堤亦於十二日被水衝決數處近堤田禾稍被淹浸至撫州府乃臣所屬營汛臣初聞崇仁縣被水情形較他邑為更甚心􅋀憂惶即專差諭飭撫州營確查禀報去後節據署撫州營都司先後禀報各被水情形到臣復委標員前往查得撫州府屬金谿東鄉二縣沿河低田間被水淹人口並無損壞臨川縣沿河居民房屋間有被水衝塌數處淹斃男婦十餘名口樂安縣山坳田畝多被水湧沙淤傍山民居衝塌數處淹斃男婦十餘名口宜黄縣各鄉近河田畝多有淹没水衝廬舎合計二百餘户淹斃男婦老幼三十餘名口以上數縣被災尚輕惟崇仁一縣向有官民兩城因山水陡發衝決入城官署民房均被淹浸官署既多衝塌而兩城内外民居舖戸共計衝飄三百餘家淹斃十餘人官城東南一帶城垣亦被衝決數處所設常平倉亦淹浸三四尺不等各鄉村地方衝塌廬舍共計二千餘戸淹斃大小男婦共計四百餘名口且村鎮店肆榖麥等項已被水飄其逃避得免之災民更復無從告糴實為慘傷適有原任崇仁縣今調上饒縣知縣陶士僙尚在交代未赴新任目覩災民情形即將未經交盤之濕榖一面減價發糶一面禀明各上司新令茹芝亦將已盤積榖開倉發糶於是撫慰之餘災民幸獲安全又經撫臣謝旻藩司宋筠先後派委試用官髙尚禮等前往崇邑㑹同該府縣踏勘被水田畝廬舍分别查賑安插至於臨江吉安二郡雖非臣屬營汛地方但臣身居同省安敢異視亦經差役密查臨江府屬之新淦縣近山地方間有廬舍衝塌人口淹斃之處惟峽江縣被災頗重吉安府屬之吉水縣沿河地方因水勢迅急人口微有損傷廬舍偶有傾塌祗永豐一縣城鄉被水官署民房衝塌甚多淹斃人口頗衆似較之崇仁縣其災更重該縣知縣施陛錦隨將倉榖發糶接濟災黎亦經撫臣委官㑹同各該府縣分别查賑在案臣伏查被水各縣俱因風雨連綿山水驟發潰決横流趨避不及致罹災傷其中惟永豐崇仁峽江三縣為最甚民間水旱事宜應聽撫臣勘賑奏報臣分不敢越俎但身在地方目擊災傷又何敢稍有隱黙理合據實具奏仰祈皇上聖鑒臣謹繕摺奏聞崇仁等縣被水情形已悉朕自飭諭該撫分别撫恤俟伊等辦理之後災黎作何光景據實再奏以聞纖毫毋為隠飾硃批諭㫖巻一百六十六
