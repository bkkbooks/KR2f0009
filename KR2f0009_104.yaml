body:
  text: 欽定四庫全書硃批諭㫖巻一百四硃批尚瀠奏摺廣東潮州總兵官臣尚瀠謹奏為覆㫖事竊臣䝉皇上命臣口傳諭㫖與總督楊琳當即陛辭星夜南行於九月十五日抵潮屬程鄉縣界接印於二十一日抵省傳㫖督臣楊琳楊琳跪聆聖諭感激涕零除督臣另摺謝恩外臣謹將傳過情由恭摺上聞至左翼鎮總兵移駐順徳縣一事臣已傳㫖與督臣楊琳撫臣年希堯署提臣呉成龍俟公同妥議合疏另行具題外相應一併聲明再聖諭戰船一項臣至省時適值春江協平海營大鵬營駕大修已竣戰船八隻到省臣隨欽差兵部郎中圗理琛暨督撫司道諸臣一同登船閲看船身器具皆堅固完整為此繕摺上聞謹奏不可通同欺蔽即使爾闔省一氣共相隠瞞朕亦另有訪聞之道凡百處但知有君而不知有友始不愧為國家臣子爾其欽承朕諭毋違廣東潮州總兵官臣尚瀠謹奏為據實奏聞事竊臣查現行則例中總兵准食隨丁糧六十分臣從前因家口繁多於定例六十分外多收三十七分又潮屬九營向有四季節禮每節三百二十兩臣到任後只量收二節實為國法之所不容今皇上如天大徳推心置腹臣若不以實情上奏罪更難逭況䝉聖恩不加罪責而惟以有則改之無則加勉諄諄訓諭臣聞命之下感激涕零一經接印視事即將三十七分名糧盡行募補屬員節禮亦明張曉諭禁止惟有潔已奉公精勤率屬操練兵馬緝盜安民以仰報皇恩於萬一耳為此謹奏類此瑣屑之事朕無暇計較但欲爾等實心為國家出力做千年不朽之名臣良將是朕之所願也況潔已與否朕自有覺察亦不待爾陳奏頃於爾陛辭後聞人言爾素性少覺尚氣嗣後一切處當忍耐含容和平是務廣東潮州總兵官臣尚瀠謹奏為恭報年成事竊臣訪聞潮州夏禾今嵗十分豐收米價每石七錢八錢不等七月間雖有水患而秋禾初插未至淹沒水退即滋生茂盛秋成加倍至潮屬海陽縣水勢較大衝決隄防幸而潮州有南北兩隄南隄關係四縣皆得完固北隄少有衝決而出海甚近不至旁溢横流田禾民舎俱不被災惟近河數處之柴場草舎併傍岸之塘屋煙墩不無衝壞今已經修葺其自程鄉縣經惠州至廣州千有餘里秋禾皆十分繁碩合将臣所轄地方年成繕摺奏聞謹奏所奏知道了惟宜據實直陳不可絲毫粉飾廣東潮州總兵官臣尚瀠謹奏為敬陳管見事竊臣西秦下士奔走戎行有何知識可佐髙深但事有若類瑣屑而實足以鼓舞軍心整齊營伍者因不揣愚昧為我皇上陳之一兵丁内之鎗手礮手宜予以進身之階也查軍器中鎗礮之用可以致逺故軍營火器從來最重今行伍内拔補把總惟取弓箭而鎗礮手每不得與臣歴任浙閩見營兵因弓箭生疎改調鎗礮則人人共恥甚至甘棄其糧而不食粤省亦然總因無上進之階也若令得與弓箭手間補把總得官後亦令學習弓箭則自必朝夕操練施放有準而火器倍精熟矣一發回原任年滿千總之無湏補用也查千總有六年俸滿赴京考選之例其已經選取分發各省補用者皇上猶恐該弁廢弛弓馬技藝生疎仍令督撫諸臣再加試驗不必盡拘部發名次題補現在遵行在案臣竊思發回原任補用者其技藝已屬平常若再加守候日乆縱使補用不能保其不至廢弛頹惰在皇上念其效用有年不忍遽斥莫若加以守備職衘使之榮身歸里則彼既仰沐皇恩而營中得另拔技精年壮者以資操演庶軍旅倍加振作矣如果臣言可採伏惟睿鑒施行謹奏覽所條奏似乎得理總理事務王大臣㑹同兵部議奏朕意不但鎗礮手當議即水師營兵弁精熟長鎗挑刀而弓馬生疎者亦當入議但我朝開國以來以弓馬為制勝之具若将各種技藝並重或恐軍士分心弓馬之習不專耳可加意斟酌詳議具奏諭尚瀠知朕閲爾所奏二條甚屬有理已交發王大臣㑹議矣發議時将爾銜名裁取留中以免年滿千總軰日後致怨於爾也廣東潮州總兵官臣尚瀠謹奏為據實恭報年成以慰聖懷事竊臣供職粤東已經四載粤省每年沐皇上洪恩嵗登大有以故地方衣食有資農商樂業山無伏莽海不揚波近來潮州米價大斗每石不過八錢鄰郡州縣貴賤雖畧有不同其價值相去亦甚無多正二月間頗少雨澤吏民方事禱求乃甘霖立沛東作皆興刻下已四野青葱預卜豐年之兆矣為此恭摺奏聞謹奏覽奏深慰朕懐但必無絲毫粉飾方免虛偽之咎據云粵民衣食有資農商樂業若然因何盜案繁多耶戢盜安民為第一要著勉之廣東潮州總兵官臣尚瀠謹奏為恭繳硃批奏摺叩謝天恩事竊臣於本年四月間敬陳管見一摺恭報年成一摺荷䝉硃批臣跪讀再三不覺感激涕零夫為臣之道原係分毫不可粉飾聖訓煌煌臣敢不夙夜凜遵粤東盜賊向來較他省頗多近來督撫提諸臣仰遵上諭實力懲治稍知斂迹而臣所轄潮州一帶地方又較他府似覺安寜今䝉聖訓臣惟有益矢冰兢以緝盜安民為第一要事至於所奏二條皇上硃批閲爾所奏二條甚屬有理已交發王大臣㑹議矣發議時将爾銜名裁取留中以免年滿千總輩日後致怨於爾也欽此臣自問何人乃沐聖主體恤周詳一至於此雖捐糜頂踵不足報稱於萬一也謹将御批二摺恭繳伏惟睿鑒謹奏知道了凡爾所奏無論允行與否皆不必疑畏但有見聞即據實上陳可也廣東潮州總兵官臣尚瀠謹奏為恭繳硃批叩謝天恩事竊臣於雍正二年九月間恭繳御批奏摺䝉恩批發到潮臣叩頭跪讀感激難名伏念臣賦性愚䝉妄陳末議自愧毫無裨益聖主不加譴責已為萬幸乃轉恐微臣疑畏温㫖特頒併許但有見聞只管據實上陳格外天恩古所未有臣恪遵聖諭遇有見聞應奏事宜即行陳請以盡愚衷臣聞今嵗五月間廣州屬縣之増城龍門從化交界地方緣山深水汊頗有盜賊出沒督撫諸臣現在嚴飭文武㑹同擒緝今已次第就擒緣地方事宜既有聞見不敢不據實奏聞所有奉到硃批理合恭繳謹奏所奏知道了此事據孔毓珣亦經奏過且云兵弁不無帶傷云云廣東潮州總兵官臣尚瀠謹奏為恭請聖安以伸孺慕事竊臣自雍正元年七月入覲天顔經今三載眷戀殊深謹遣家人齎摺恭請聖安以伸孺慕之私伏惟睿鑒謹奏爾前於陛見時即䝉朕之嘉許且爾之年力正好為國家報效之時當勉之又勉慎之又慎不可絲毫放縱懈弛湏努力做一千百年不朽之人物方為不負朕之任用也摺用黄綾殊覺可惜改用黄紙尚可物力當惜何必作無益之費敬君全不在此也廣東潮州總兵官臣尚瀠謹奏為據實摺奏事竊查潮州地方因去年秋間田禾成熟之候雨多溪漲未免歉收今嵗入春以來隂雨連綿青黄不接以致米價日騰每米一斗價銀三錢二三分人心惶惑臣即㑹同在府有司将常平倉榖一萬餘石礱米平糶臣復捐資差家人並招商各處採買隨即降至二錢八九分一斗猶恐未足接濟因具咨㑹商督撫二臣現在那撥隣近惠州府長樂興寜二縣倉榖各五千石到潮平糶将來米價自然可平今三月望後天氣晴和四月初田苖全插又有番薯一種粤東以此作飯亦皆發生將來民食自可無虞臣又恐貧民無錢糴買終不免於懸釡之憂現在同有司捐俸煮粥賑饑以推廣皇上惓惓愛民之至意為此繕摺據實奏聞謹奏爾以管兵職任肯如此實心為地方措畫朕甚嘉之既為封疆大臣軍民原係一體何分文武一切事宜自應和衷商酌為之但湏據實無欺言行相符不可徒粉飾於章奏之間以邀取嘉奨也廣東潮州總兵官臣尚瀠謹奏為恭繳御批事竊臣於本年四月間恭請聖安一摺又報聞米價一摺荷䝉硃批臣跪讀再三不勝奮興鼓舞伏念臣賦性愚魯幸叨教育得任封疆雖年齒壯盛圗報心殷而千百年不朽之人物恐非駑駘下質所能企及然以聖主期望之殷臣惟有努力奉行勉圗上進若夫軍民一體文武和衷言行相符不可粉飾此尤官常之要道臣已勒諸心版凛遵恪守以冀仰報髙深於萬一耳所有奉到硃批理合恭繳謹奏不在空言只看力行何如耳廣東潮州總兵官臣尚瀠謹奏為敬陳末議事竊臣荷䝉聖恩優渥報稱末由但才雖短淺志切急公凡關於國計民生無不竭力圗維以期裨益故敢以芻蕘之見為我皇上陳之一有案盜匪武弁與文員宜一體稽查一有司朔望㸃查姦匪之法宜稍為變通一有司給發漁船牌照不必一年一换一漁船之作姦犯科宜嚴行申禁以上諸條係臣一得之愚統祈聖主睿鑒敕部施行謹奏此數條俱當與督撫詳為酌議内一二處朕意覺欠妥協廣東潮州總兵官臣尚瀠謹奏為恭逄聖夀懇恩陛見以遂㣲忱事欽惟皇上法天行健與日俱新兹逄聖夀無疆正値洪庥滋至普天忭慶率土歡呼念臣自雍正元年七月陛見後於今四載犬馬私情時深依戀謹具摺䖍懇天恩允臣所請趨赴闕廷則既伸慶祝之懐併得跪聆聖訓俾山海要地一切機宜更有所遵循以為鞏固巖疆之至計曷勝翹切之至謹奏爾不必赴京但勤慎職守綏靖地方勝於頻來陛見也廣東潮州總兵官臣尚瀠謹奏為據實恭報年成事竊查粤東去年雨水過多春苖有損秋收歉薄已經官倉平糶捐粟賑饑乃今春雨澤愆期米價又長斗米需銀三錢幸至閏三月二十六七等日大沛甘霖田禾未植者得以播種已植者倍加茂盛督撫諸臣現撥廣西稻榖萬石分給潮屬便民平糶米價稍減斗米二錢五六分不等臣復與同城文武各官捐俸賑粥民困漸舒兼撥髙廉二府倉榖五萬石從海起運四月終必然到郡當此青黄不接之時正資接濟而刻下稻花徧秀四野青葱五月終便可登場是偶歉之餘還成大有無煩聖主南顧之憂也為此據實奏聞伏惟睿鑒謹奏潮州情形早已知悉覽此奏朕懐稍慰廣東潮州總兵官臣尚瀠謹奏為恭繳御批奏摺事竊臣恭請聖安一摺又敬陳末議一摺俱荷硃批臣跪讀再三十分惶悚夫人臣盡職當務力行不在空言今聖諭諄切惟有欽遵祗凛潔已奉公至於清積匪一議緣彼時尚未聞奉上負國恩其摺中有一二欠妥協之處䝉聖徳如天恕臣愚昧不加罪譴臣雖捐糜頂踵難報硃批謹奏覽廣東潮州總兵官臣尚瀠謹奏為恭繳御批奏摺事竊臣前奏奉行保甲盜即潛蹤事䝉御批不過少減耳盡化恐未必然欽此愈見聖不自聖治益求治之至意又御批閩廣武弁之貪風未革朕常耿耿於懐亟當竭力剔除言之似易斯豈易事耶天語煌煌臣惟竭力奉行告戒屬員洗心滌慮屏絶苞苴以期仰遵聖教當此聖明在御若不思改心易慮以共勷至治亦何顔自立於人世乎所有奉到硃批理合恭繳謹奏勉之爾居官聲名甚好整理營伍訓練士卒諸凡實心任事處朕皆知之但聞爾與文員多不相睦地方上文武不和則於兵民無益大抵兵民官弁中善良之軰皆樂於文武和衷相安無事不肖之徒毎不喜安静從中播弄唆挑此一著湏要㸔破方好毋被小人所愚且天下事果能恪秉一公斷無不和之理不和之故率因私心勝耳當竭力加勉朕觀武人多以尚氣自相矜詡此戎行中一大病也更當盡除此種鄙習勉之勉之廣東潮州總兵官臣尚瀠謹奏為恭繳御批奏摺事竊臣謭劣庸材總戎東粤於今八載朝夕兢兢䝉皇上不加擯斥温㫖時頒曲示裁成如天覆育兹又䝉硃批勉力實心四字已統包前聖誥誡人臣之㫖臣雖識淺才疎敢不潔已奉公以仰承聖訓之煌煌乎至據實覆奏一摺欽奉硃批臣跪讀之下涕泗交零惟圗殫心竭力以上報皇恩於萬一耳為此恭繳硃批伏惟睿鑒謹奏凡所奏陳貴無欺隠少有増飾反失其真惟以據實為要勉之廣東潮州總兵官臣尚瀠謹奏為恭報年登大有羣沾聖澤事竊查潮州今嵗入春以來風雨調順二麥收成倍於往嵗兼之番薯菜蔬俱各茂盛米價每石值銀五錢兹届春杪夏初早秧徧插四野歡騰行旅無驚户不夜閉為此具摺據實上聞謹奏風雨調順秧苖遍插深慰朕懐然必俟秋稼登場後方可定一嵗之收成硃批諭㫖巻一百四
