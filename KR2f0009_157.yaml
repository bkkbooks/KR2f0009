body:
  text: 欽定四庫全書硃批諭旨卷一百五十七硃批何國宗奏摺雍正四年五月初一月內閣學士兼禮部侍郎臣何國宗等謹奏為奏聞事臣等於四月初一日至山東東昌府初四日撫臣陳世倌會同查勘臣等條奏泄水支河查得東昌府城南有七里河口下歸徒駭河城北有魏家灣河口下歸馬頰河德州南四女寺有減水閘下歸老黃河皆運河東岸泄水入海故道但年久淤塞不通又查撫臣陳世倌所奏疏濬河道總計四支內大鹽河原係通流小鹽河已準部覆現在疏濬其馬頰徒駭河二道即臣等所奏泄水之支河其餘細派各渠皆歸此四河以泄民田之水除逐一詳細妥議回京具奏外四月二十八日臣等看畢各州縣泉源至濟寧州以次查看濟寧以南河湖準河臣齊蘇勒咨會至臺莊定議所有臣等查看山東河道大概情形理合繕摺奏聞謹奏爾等特蒙朕之差委勤慎二字時刻不容少間雍正四年十二月二十日內閣學士兼禮部侍郎臣何國宗謹奏為奏聞事臣於十一月二十日自省起程前赴各工查看查得徒駭馬頰二河俱於十一月十九日開工御史尤清王之錡現在各工辦理趙牛等七道支河已飭各該州縣分定工段俟解凍之後逐漸挑挖可以不致誤工而青黃不接之時亦於濵河貧民有益明年春月諒可次第成功南旺等湖斗門閘座已經告竣現在查核會疏具題安山馬踏湖堤亦已完工俟司道轉詳到日另行查核奏報戴村壩已於十二月十一日興工明歲春盡夏初可以竣事至於芝麻莊黃河堤工素稱險要臣細加查勘原係順溜衝灣有行所必行之勢前撫臣陳世倌請開引河之處地勢較髙恐引河雖開而黃水仍復順勢北趨不由引河東注河臣齊蘇勒所議甚當早在皇上洞鑒之中臣查芝麻莊堤工原頂寬四丈底寬八防無容再議臣於十二月十五日回省與塞楞額商議現今泄水支河閘壩工程亟需查估挑河疏泉等事又待查勘擬合暫駐省城逐一辦理外所有微臣查看各工情形恭摺奏聞再臣一路經過泉河水勢甚旺安山湖積水周圍三十餘里中深三尺餘甚於漕運有濟明年糧艘諒皇上宵旰勤求至意合併奏聞謹奏覽雍正五年三月二十九日內閣學士兼禮部侍郎臣何國宗謹奏為奏聞事竊查鬲津等七道支河皆以宣泄坡窪積水沿河州縣即係上年被水地方先經署撫臣塞楞額與臣商議擬於春初開工使濵河貧民得以藉工糊口接至麥秋甚於地方有益業經具摺奏明今於本年正月二十五等日次第興工約計閏三月內外次第告竣戴村壩現已砌石樁底甚為堅固臣親加量算按尺計價按日督工的於閏三月內告成徒駭河工程共十一州縣內三州縣已經完工其餘約計閏三月半全完馬頰河工程共七州縣內二縣己經完工其餘因運河挑淺泄水舊河淤塞不能暢流戽水倒塘未免稍稽時日臣核實造册奏報至各處泉源道路紆回二千餘里臣一時不能察務使如式疏濬以禆漕運現今運河閘口水深六尺而湖水更盛重運可以遄行至上年被水地方秋冬之間多食草子今河工銀米並發民間甚有利益合并奏聞謹奏覽同日又奏為敬陳下悃恭謝天恩事雍正四年十二月十九日因山東州縣開銷供應欽奉上諭交部察議臣聞命之下慚悚交集無地自容兹蒙皇上天恩不即加罷斥著臣明白回奏仰見我皇上至仁如天至明如日跪聆諭旨感激涕零臣惟益凛氷淵勉圖後效除據實備陳具本送通政司進呈外謹此繕摺恭謝天恩伏祈聖慈垂鑒謹奏慚愧與否自在汝等胸臆但不知汝等具何膽敢為如是具何心忍為如是朕殊不解雍正五年閏三月初四日內閣學士兼禮部侍郎臣何國宗謹奏為恭報時雨霑足上慰聖懷事竊山東地方自上年十一月及今年正月俱得雨雪三月初九日微雨霡霂土膏潤澤麥苗肥盛閏三月初三日臣查看徒駭河至武定州工次是日酉時大雨竟夜不息至初四日辰時方止詢之地方官民僉稱十分霑足二麥定然大穫此皆我皇上敬天勤民至誠感格是以好雨應節共樂年豐臣不勝歡慶之至再河工挑濬將竣正在堆拍築堤得此雨澤尤易堅固謹此具摺奏聞上慰聖懷謹奏覽所奏雨雪堤工情形深慰朕懷雍正五年四月二十二日內閣學士兼禮部侍郎臣何國宗謹奏為奏聞事查得徒駭河工程於閏三月二十二日全完御史尤清逐工勘驗到省報稱如式告竣馬頰河及鬲津等支河七道亦陸續報完戴村壩由身已於閏三月二十九日完工即將月壩拆開以備宣泄其裹頭背後填砌修整之處總於四月內全完臣現將已完各工清册細加察核仍即前往各工逐一勘驗銀工數目果否相符另行核實會疏具題外先此恭摺奏聞再查汶河泗河正源大泉臣前往查看俱已如式疏濬各州縣小泉據署管泉通判郎燦查報亦俱一律疏通合并奏聞謹奏據奏工程完竣甚好爾所辦諸務業俱告成在東無事作速料理旋京候朕另有委用雍正五年五月二十一日內閣學士兼禮部侍郎臣何國宗謹奏為欽奉上諭事竊臣進摺家人齎回原摺一封奉硃批諭旨據奏工程完竣甚好爾所辦諸務業俱告成在東無事作速料理旋京候朕另有委用欽此查東省河道工程錢糧重大須逐一勘核果係銀工數目相符方敢具題報銷今已完各工除鬲津等支河撫臣另委員查看外臣於五月十八日勘完馬頰河及徒駭河下遊工程二十日轉至禹城縣徒駭河上遊逐工勘驗擬由東昌府赴戴村壩收工約計五月內查畢回濟南府與塞楞額查核明白臣星夜回京復命為此具摺奏聞謹奏朕因粵撫楊文乾為該省圍基奏請熟諳水利通曉測量之大臣前往董理其事故有前旨昨孔育珣到京面商此事可緩而不行矣爾今不必速來徐徐查核明白然後回京復命可也雍正八年二月十四日工部侍郎臣何國宗謹奏為奏聞事竊北運河青龍灣修建減水壩開挑引河工程錢糧關係重大蒙皇上特命大臣會同臣辦理稽察其工程作法又著牛鈕偕臣辦理臣仰邀髙厚殊恩惟有竭力盡心虛衷共濟以圖上報萬一兹壩工河道於二月十二日興工臣偕莽鵠立等即由引河向海口一路查勘其間有應舍灣取直無礙民居之處臣等悉心商酌辦理其餘各處工程應作何修濬之處經大學士公馬爾賽等議令臣同牛鈕再行查勘奏聞等因奉旨依議欽遵在案臣同牛鈕查勘得河西務城北老堐舊堤及耍兒渡舊河口魚鱗壩俱當大溜頂衝最為險要亟宜保護堅固方資捍禦據通永河道德希夀稱河西務等處工程將該廳估報之處現在駁查難據率轉等語臣查河西務耍兒渡二處工程極為緊要若俟該道廳往復駁核然後轉報請修恐致遲誤合無仰祈皇上俯念河工重大即於臣等所請引河壩工錢糧先撥銀二萬兩飭發通永河道令其一面辦料興工一面估報水利營田衙門請領還項庶無貽誤其有作法未合之處臣同牛鈕商酌改正至三里淺火燒屯等工程應如何修治之處臣從海口回日一併會同牛鈕查勘奏聞臣未敢擅便伏祈皇上批示遵行謹奏覽所議工程修理之處緩急先後俱屬合宜雍正八年三月二十四日工部侍郎臣何國宗謹奏為奏聞事竊臣同牛鈕於二月二十日抵海口復溯引河一路細看二十七日回青龍灣將草壩工程逐項安派并引河淺深堤身髙下逐假估算畢三月初五日沿運河兩岸踏勘除現在平穩及可緩工程飭令該道廳照常隨時料理外查東岸三里淺一處係歷來險工應建挑水壩一座並將舊雞嘴壩重加修整其堤灣洄溜處應修排樁一路又筐兒港壩門上首一處急溜汕刷應建挑水小板壩一座大板壩一座順水排樁一路又孤雲寺一處係大溜頂灣排樁損壞應行修補西岸華家口一處係舊河上口原有攔河壩一座連年頂衝汕刷僅存靠堤陡岸壁立舊河地勢尤窪誠恐萬一疏失水歸故道致阻糧艘應修葦工一段又張家莊一處係新生險工老堤已經刷去僅存月堤仍係掃溜應建挑水板壩一座後接排樁又火燒屯一處係厯來險工舊有排樁應行修補又上年水漫堤頂二十處曽經疊堰搶護應行加培以上各工據該道廳共約估銀一萬九千餘兩除飭確加核減外應請即令該河道一面動用道庫歲修錢糧給發修理一面估報水利營田衙門如有不敷照例請領臣未敢擅便伏乞皇上批示遵行謹奏準照所議速行同日又奏為奏聞事雍正八年三月初三日準都統莽鵠立等鈔移奏摺內開筐兒港滚水壩金門寬髙及引河堤工是否允協有無應行另加修理之處請交與臣會同牛鈕詳加查勘定議奏聞等因奉硃批諭旨是著落交給欽此欽遵移行到臣臣謹會同牛鈕查看得筐兒港減水壩引河工程除壩臺甚屬堅固海漫三合土微有衝刷數處深不過寸餘無庸修補金門內所衝素土即本來地身同知朱斐文己經築實填平俱無庸議外其減水引河一道臣同牛鈕察看情形細加酌議先經原任通永河道髙礦將壩門既加寬四十丈則其引河亦須通身加挑寬四十丈仍將舊引河南岸廢堤拆去方為暢順但工作浩繁曠日持久擬先於新引河中間沿舊廢堤開挖深漕一道直逹塌河淀寬十丈深三四尺至六七尺不等並將河口淤髙及舊河內淤淺之處俱為開挑自然水流較暢再查塌河淀下口有陳家溝舊河一道寬八九丈東隄頭舊河一道寬六七丈賈家沽新河一道寬八丈計河三道寬不及三十丈擬於賈家沽新河之旁再開泄水河一道寬三十丈方足暢流歸海今先儘力開挑或七八丈或十餘丈亦為有益均俟今秋來春再加開廣挑濬完工其引河兩堤北岸係舊工內有單薄二假應行加培南岸係新工所衝開之處俱經同知朱斐文賠修完固其圍淀堤工汕刷甚多俱在保固限內據同知朱斐文稱堤工內外皆係淀池上年諸淀盈滿風浪排擊實屬人力難施應請援例準六賠四等語擬請先動錢糧修理完固其應如何賠還之處統聽水利營田衙門核議勒限賠還以上工程約共需銀四萬餘兩臣擬即咨請水利營田衙門動撥錢糧飭發通永河道令其一面即日興工一面分晰造册申報查核至減水壩金門寬髙與全河相為消息原議水小則加疊土堰蓄水刷河水大則開放以俾暢泄上年伏汛後加築席土堰一道髙三尺餘秋汛長水未曽過堰今青龍灣又分減於上流臣與牛鈕細加計議應請俟伏秋時詳察水勢通盤合算再行條議奏聞臣未敢擅便伏乞睿鑒批示遵行謹奏依議作速料理少有遲誤疏虞惟何國宗是問凡一應動用錢糧亦與牛鈕無涉何國宗一人察核可也硃批諭旨卷一百五十七
