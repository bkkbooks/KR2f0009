body:
  text: 欽定四庫全書硃批諭旨卷一百七十四之一硃批李衛奏摺雍正元年六月十九日雲南驛鹽道臣李衛謹奏為奏聞事竊臣至愚極陋蒙聖祖仁皇帝拔擢深恩涓埃未報更蒙皇上召見特授今職於雍正元年正月十二日恭請聖訓跪聆之下溫綸藹切無微不燭凡臣所欲陳之事我皇上蚤已睿鑒詳加訓誨使天末微臣有所遵守且準臣越職恩加以副使職銜知遇之隆至矣盡矣臣惟有夙夜凜惕竭蹶駑駘矢志無欺以仰副聖主擢用之至意臣於正月十九日出京至五月十六十二日臣至雲南省城督撫設壇祈雨臣先到總督衙門密將面奉諭旨傳與督臣髙其倬跪聆欽遵感激涕零又到巡撫衙門亦遵將面奉諭旨傳與撫臣楊名時遂問皇上聖明所行之政臣一一説知二十四日臣到任視事即日大雨嗣後每日一二次不等至六月初八日稍晴田野霑足查看布種將次完畢惟省西一二處得雨稍遲現在趕種秋禾臣抵任即當具奏倘遇要緊應奏所有臣抵滇緣由理合奏聞謹奏覽同日又奏為據實陳明積弊事竊查雲南鹽政舊係商人行銷因墮誤課銀方歸府廳州縣及總兵借名販鬻並鹽道就省賣銷惟憑吏役家人經手多用大平短稱是以鹽價低昻不時致令民食艱難百弊叢生總屬先私後公有利則衆人瓜分虧缺反算作正項奏銷槩多捏造庫內實在虛懸種種積弊難以枚舉揆厥所由初被原任巡撫吳存禮加派餘銀將及十萬多煎私鹽墮誤正課復被原任總督蔣陳錫巡撫甘國璧相繼效尤雖不過甚然亦誤虧空銀十一萬九千餘兩已有著落此外尚有各官挂欠十萬餘兩臣思錢糧關係甚重不便虛懸從前侵蝕之人理應分賠但吳存禮已經革職回京蔣陳錫業已病故又有山東之案未結甘國璧現在軍前惟有署總督印務原任提臣張文煥在任將及年半得過鹽規約有三萬且收節禮必要雙分勒令屬員多拜門生贄禮動則盈千臨行載去十餘萬兩致損全省元氣實負國恩或可著張文煥吳存禮分賠數萬兩其餘再為設法追催完結臣不敢草率參奏合先預為請旨再甘國璧任內將黑鹽井地方挖出新井一處每年可煎鹽五六十萬斤不等儘可抵補黑井加增鹽課缺額不敷之數竟被從前各官通同瓜分反著白鹽雲龍二井帶煎黑井加增額鹽又將順寧一府及雲州一州買食苗鹽之土民每年二處共派銀二千兩幫補白井課銀府州私徵在外若得隱匿之新井作為官物自能足課何用彼此互幫相應據實處不同數里之內居民刨挖土坑皆能得水煎鹽名為沙滷所出甚多雖有巡查土兵五十名俱係彼此勾通任其盜賣前道沈元佐任內詳明督撫差家人收買沙滷所煎私鹽不下百萬每百斤止發價九錢州縣各官希圖比官鹽價賤每百斤願出現銀一兩六錢所得盈餘上下分肥因滷非官井所産萬難盡除其弊今欲不買勢必偷賣與小販定誤正課關係匪輕臣再四思維莫如據實奏明委官收買並令嚴行查禁盜賣之弊除還原本外將盈餘留充兵餉或修築城垣或買穀備賑於公事皆有裨益再黑井發鹽上省每百斤外加稱頭鹽五十斤總督髙其倬到任裁去十六斤尚存三十四斤舊例每百斤加小販稱頭十斤沿途擦損三斤零鹽二十斤內又該加稱頭二斤又應補從前減價缺額鹽十斤併總督食鹽三斤巡撫四斤鹽道二斤此三宗在督撫道盈餘之內前道沈銀一萬七千餘兩作賞兵等項雜費從前曾如屬員陽奉隂違流毒至今其督撫現在所得陋規已經説出此外無多況總督髙其倬居官清正實心政務愼重地方並不受賄恩深重何敢隱人之善惟見其任用屬員頗欠識人之明然不甚假權尚不能為害所有鹽規一萬七千餘兩應否準給養廉之處生之度心有餘而才稍平節禮不收為人古道亦無識人之明鹽規雖得四萬餘兩聞從前軍需銀厰果有賠墊不曾加派地方此外惟有藩庫平頭併銅務些須土稅等項然滇省百姓亦皆感激因向來折徵兵米等事俱有加派每石州縣多收銀七八錢一兩不等從前有督撫陋規數萬被巡撫每月一千兩為養亷之資或留與二萬兩之處伏恩深重俱各盡心供職邊省地方任用得人無煩三兩不等扣尅在外以致百姓畏懼馱運不前竈戶煎鹽柴薪缺少是以墮誤正課復加追呼徒害小民尤病竈戶此收發之中一進一出雖有盈餘一二萬兩臣何忍蹈其故轍已經將天平與藩庫較凖出進皆一使竈腳兩户無可藉詞或者從此正課不致墮誤亦未可定向來腳户運鹽到省每百斤連加稱頭腳價止給七錢除去扣平與分拆戥頭人畜往返十有餘日盤費多不足用所以非差拏不運因此與督撫商議每百斤添銀一錢每發腳價百兩外加分拆戥頭銀四兩再省城行銷之鹽每百斤三兩一錢且用髙平稱收及經鋪戶轉賣小販搬運到鄉按以逺近腳價每斤賣至四五六分不等民多淡食今酌量減去一釐照三分一斤發賣不加戥頭方行禁約數日內鹽價稍平分晰具奏所有鹽弊大槩情形先行奏聞伏乞皇上睿鑒施行謹奏爾為人剛直居心蒞事忠誠勤敏朕所深知但防太過莫患不及百凡處加詳加審方無鹵莽之失覽所奏數摺實具一片血誠毫無顧避且其中分析款項井井有條甚屬可嘉殊不負朕一番識拔所慮者爾以少年鋒鋭之氣而兼報效情殷於上司僚友中過於強毅自用致招恃恩狂縱之譏則又非朕期許之意也事事務宜周詳謹密即一切章奏所奉批諭不可令一人知聞愼勿藉此作威誇詡於衆惟秉公據理而處之以謙能如是則在上者自蒙見重在下者亦必傾服庶免以氣陵人之咎將來底於有成否則鮮有不蹈倚才傲物覆轍者勉之愼之切諭切諭同日又奏為遵旨敬陳地方情形事竊臣欽遵諭旨查得雲南一省地極西南疆圉遼濶土漢雜居山多田少陸皆上下坡嶺水則舟楫難通幸民淳俗凡防汛坐塘兵丁護送餉鞘差使煩多往來道路盤費艱難而在督撫提鎮本標及隨征等兵多係膏粱出身坐食官餉除跟班之外毫無所事且伊等援引有資衣馬鮮明較之當差窮兵拔補千把甚易臣請嗣後再有千把缺出作何分補之法洪恩出自聖裁庶幾窮苦兵丁亦有上進之期自當銜感報效而逸樂士卒亦知勤勞為功再雲省更有山僻府治設兵無幾竟或有千把防守不足彈壓請敕下督提二臣作何分別斟酌相地調防兵辨均設則府治有所倚賴矣再臣曾口奏魯魁山有賊民楊李二姓時常為害地方騷擾交趾恐啓邊釁等語今聞附近居民共出銀兩倩一土頭目把守隘口並帶領土兵保護鄉村此輩亦屬賊類然目下暫賴禦防俟設有善處之法再為具奏臣更有請者從前滿兵過滇頗纍地方亦有州縣藉端虧空者今聞不日凱旋恐仍照從前額外應付不惟邊省難支抑且勞苦百姓懇乞皇上敕下帶領滿兵大員嚴禁士卒不許騷擾則邊民安堵永頌洪恩於無疆矣再文武官賢否臣雖到任未久不能周知但有穢聲載道共聞共見者何敢隱諱如楚姚鎮總兵劉俊傑不肅官針營心壟斷擡髙價以賣鹽開錢鋪以扣餉兵民怨騰又聞將逃兵有孕之妻鎖拏進衙立刻賞人種種惡迹難以枚舉臣與劉俊傑素不謀面並無嫌隙然既有所聞敢不入奏文官內有大姚縣知縣吳繩武貪婪科斂聲名不好已被民人揭告多款督撫批司與臣會審在案更聞有趙州知州陳士昂賣鹽加倍取利居官聲名甚劣其餘府廳州縣亦有為害地方者俟查明再奏外現任學道張謙前為刑部郎中頗有聲名今在學政任內取士公明操守廉潔再提督張谷貞雖則年老聞其居官安靜尚未面晤其人已蒙皇上留任供職自必殫心報效其餘文武好官雖聞有人因無實績恐盜虛名不敢妄奏至於驛遞之設尤關緊要其夫馬工食豆草等項俱各無甚虛冒惟有進本齎摺差役常多索馬匹希圖夾帶私貨已曾奉有皇上諭旨洞悉隱微臣又查出一二次面稟督撫業經嚴禁但每年四季有驛鹽道扣存部費銀二千兩除造册與上京盤繳並提塘雜費止用四百兩外向存一千六百兩係臣衙門陋規臣若染指絲毫萬難剔除積弊查舊例每站額夫一百名遇有多用者俱派鄉民有誤農事臣將此項銀兩捐出存庫如遇大差用夫過百名之外即動此銀雇募以免地方派纍之苦伏念臣孤立滇南惟知潔已自持雖督撫相待甚優同官司道亦皆和衷但諸事不知避諱未免羣情忌嫉然聖明在上臣亦止知有君餘無所顧以上三摺實因路逺事繁非披瀝上陳難輸愚忱故不避瑣瀆之罪冒昧具摺不勝惶悚戰栗之至謹奏時時照此言行相符始不負聖祖拔擢之恩事事如斯不欺不隱乃可謂一無瞻顧也勉之雍正元年七月初六日雲南驛鹽道臣李衛謹奏為邊疆寄重據實奏聞事竊臣於本年五月二十二日至雲南省會六月十九日具摺將到任緣由並鹽務利弊及地方情形差家人馳驛齎奏但鹽弊日久剔除非易必使國課充實邊氓有益方可稍盡厥職幸督臣髙其倬居心寡欲同撫臣楊名時協恭黽勉使臣得以盡力興除仰副皇上勵精圖治之至意臣自抵貴州地界即聞傳頌總督賢名初尚以為未確及親見其行事果能正已率屬寬嚴並濟兵民咸相感服抵任雖近一載同撫臣楊名時革除科派使邊末黎庶稍獲安全今聞其緣事革職聖明在上自必念此遐荒要地特簡大員以作邊方保障臣何人斯焉敢妄瀆宸聰但兵民士庶愴惶依戀有不忍捨去之狀若非平素愛戴情深斷難及此臣目擊攀留情形並不同尋常故套自揣微末道員受恩深重惟知潔已自持既不敢避嫌逺怨寧復藉此趨迎實因地方緊要起見故不辭斧鉞之誅冒昧具奏倘蒙聖主格外天恩俯念凋弊軍民願望情殷將督臣髙其倬帶罪留任則一二年間邊氓元氣可以漸復而於巖疆更有裨益矣為此繕摺奏聞臣不勝悚懼待罪之至謹奏如是督臣豈待保奏始豫留任耶雍正元年十月初三日雲南驛鹽道臣李衛謹奏為恭謝天恩事竊臣微末外吏叨蒙聖主格外殊恩毫無報效謹於抵任後將鹽務利弊地方情形具摺冒陳嗣因督臣髙其倬離任復不自揣頻瀆聖聰實由臣愚昧無知罪何可逭乃蒙皇上不加譴責曲賜寬宥天髙地厚之恩已出分外復蒙欽賜御硯綸音溫煦於九月二十一日跪接到署恭設香案望闕叩頭祗領訖敬膽硃批訓諭諄詳字字皆令臣省身免過敢不兢惕凛遵即家人父子亦難望成全造就至於若此臣自顧何人得邀恩榮於非分荷天眷於靡涯雖欲殫竭心力勉效馳驅實難仰報髙深於萬一也所有微臣感激愚悃理合披誠奏謝並將奉到硃批奏摺一併恭繳謹奏爾之聲名甚優如此方為不負任用惟當始終如一毋怠毋縱勉之同日又奏為遵旨覆奏事竊臣前所奏摺內因雨澤愆期之處奉皇上硃批向後如何遇便據實再奏以聞欽此查滇省今歲較數載之中可謂豐年自臣五月二十四日到任得雨起未有十日之晴兼秋月和暖連晚種田苗亦得秀實通省收成並無荒歉之處及查其所奏鹽務摺內奉皇上硃批蔡起俊居官何如隨便奏聞欽此查蔡起俊臣素未與伊識面自到任後見其行事類多言過其實詢其居官才固有而用非以正性狡猾而操守不足然喜功好大勇於任事如連年西藏興師從前總理軍需者不堪上聞惟蔡起俊不避勞苦盡心行走毫無貽誤實滇省進藏文官內首推之員至其護理臣鹽道印務聲名平常在任八月連驛站捐納共收取盈餘銀三萬七千八百兩零及交盤之際查出內有接賣前劾道沈元佐雜款鹽價稱頭等項銀一萬四百八十餘兩亦作為盈餘收去外有因公那動課銀及預收不應得之項共欠一萬八千兩其交盤册開載代為煎鹽抵補但滇省厯來彌補虧空全賴黑井有原任巡撫甘國璧隱匿私井並白井沙滷兩處餘鹽作抵今俱經臣奏聞入官無可煎補理宜將蔡起俊所得盈餘追出抵課已取有自認押結約於到湖北臬司新任送還故不得不據實開載交代册內除此項有著並臣徵收雍正元年課銀不開外其各官挂欠皆係節年奏銷報存實欠之銀臣抵任以來業經追出舊欠七萬四千八百兩零其餘現在接徵內有五萬餘兩乃係各府州縣流交虧空官經數易事隔逺年且多有捏造民欠而實無可催追者若不嚴查從前勒索侵婪各官令其分賠此項終屬虛懸臣已經審出一二件有原任巡撫甘國璧得過已參原任鎮南州知州陸應幾及南安州知州王志正酬謝委署那動鹽課厯厯有據此二員因審追虧空供吐實情而甘國璧之子尚在滇省聞知願還原銀尚未交庫又前任藩司金世揚亦得過陸應幾酬謝委署那動鹽課更有升任貴州巡撫時所遺虧空庫帑二萬六千兩因係前道沈元佐護理藩印新官不接交盤曾將鹽課銀照數代墊後到貴撫任內止還沈元佐銅十五萬斤抵銀一半已經查出押令變賣還項尚欠一萬有竒又原任學道張學庠曾替蔣甘二臣過付得過陸應幾酬謝那動鹽課六百兩據此則各官虧空之由可知除張文煥貪吞之處密告督臣另行指參外聞從前凡遇大計委署題升以及調煙瘴免軍前拜門生等事屬員例有餽獻即係那動錢糧之關頭蔣甘張三任勒費過奢虧空愈大是以庫帑空虛地方凋敝臣目擊心傷不敢煩瀆多敬陳滇省鹽法銅斤等事案內分晰詳明督撫公同具奏合並聲明以上各屬虧空捏作全完厯年虛懸鹽課雖蔡起俊曾經接受交盤實非已身侵那未便令其全賠如此分别催追庶幾可望清楚以杜虧空之端並仰乞天恩格外施仁免究從前各官冒開不實之罪則均戴大造洪慈於無既矣為此謹奏從前冒開各官若不寬其罪譴衆論囂囂必加爾以刻薄之名使竭力效忠之吏為讒謗交集之人朕心何忍至如金世揚蔡起俊輩總不必絲毫瞻顧第須愼密為要雍正二年二月十五日雲南驛鹽道臣李衛謹奏為恭繳硃批奏摺敬陳雲省現今情形事竊臣於雍正二年正月初一日接到臣奏摺二扣跪讀皇上硃批凡臣所欲言而不敢盡者皆蒙睿鑒洞燭隱微伏思厯來臣子即有報效之心每慮難邀信任茍非納言之職輒至有懷莫白不知臣有務頗有就緒虧空陸續完補現在新開只舊草溪麗江等井已見成效止有按板抱母兩處鹽井正在委官前往煎辦惟銅厰事務紛繁非逐一稽查謹愼才堪任用彼此互相稽查庶無隱漏可增課餉臣前往迤西查看鹽井并地方形勢所有山川奏其屬員內貪汚廢弛者已公同兩司稟商督撫參惟邊省漢猓雜居山多路險易於藏姦前此各土司之克遵王化者皆受貪官詐騙不一而足強悍負固者任其殺害搶掠不敢過問淳無勸而頑無懲邊省之不能之見皆我皇上用人得宜指示明徹之所致也但通省文武兵民奏所奏俱詳細批示矣雍正二年四月十二日雲南布政使兼管驛鹽道事臣李衛謹奏為恭謝天恩疊沛並陳愚悃叩乞睿鑒事竊臣一介庸材未通經術叨蒙皇上隆恩由部曹越次升授副使臣自揣過分報稱已難正在夙夜兢惕之際復蒙特恩超升本省布政使仍辦理鹽務聞命之下實切悚惶敢不接印供職辦理錢糧清查庫帑以仰副聖主委任之殊恩又因臣母年近八旬是以冒請代題欲盡反哺之私復叨聖主格外優隆賞給布政使職銜封典榮施兩代澤及殁存使臣亦得全子職叨沐髙厚洪仁寧有涯際除遵例具詳督撫代題謝恩外又於三月二十五日永北鎮總兵臣馬會伯到滇頒來御書公勤廉幹匾額并摺匣人參貂皮等恩賜臣隨跪接到署恭設香案望闕叩頭祗領訖伏思臣本何知皆凜遵皇上訓誨俾得漸次成人乃蒙越銜升擢任以屏藩復御筆褒嘉光前耀後方寸靡寧況人參貂皮皆九重進御之物摺匣乃大臣題奏所需今與督撫提臣一體榮錫浩蕩聖主陳之伏思皇上因滇省鹽務廢弛不以臣為不肖著令清查又兼管通省各銅厰兹雖稍除陋弊而措置調理尚需一年半載方可著定成規已蒙皇上俞旨著臣仍辦理鹽務仰見聖明睿照無遺臣何敢以煩劇推卸祇恐兼顧拮據倘稍有見識不到之處即負聖主任用至意臣愚以為藩司事務雖重大繁多然較之鹽務銅厰猶有章程可守應否懇請皇恩別簡賢員辦理布政司事務俾臣得專理鹽銅庶一年之內略見成效并使屬員各盡厥職於地方課餉兩無貽誤臣心亦得稍安矣所有微臣感戴私忱及冒昧陳奏實情謹具摺奏謝伏乞睿鑒施行謹奏爾乃國家偉器豈止克勝藩司之任黽勉為之莫移初志覽不容不愼四字朕甚嘉悅果能受寵若驚自必獲福靡涯非但本省庶務舉凡天下有關吏治民生興除勸懲各事宜一切見聞罄言無隱密之雍正二年七月二十五日雲南布政使兼管驛鹽道事臣李衛謹奏為恭繳硃批奏摺叩謝天恩事竊臣不揣愚昧因蒙特恩越授藩司感激靡涯又恐報效難副故將迫切微忱並覆奏尚書盧詢條議冒瀆聖聰乃蒙不加譴責反叨溫諭褒嘉跪讀之下彌深愧悚又蒙特賞各種寶丹一盒令臣得以避瘴癘而驅時疫仰見我皇上俯憐小臣更甚於保赤子恩德至此感戴難名復蒙特命又寧敢不殫思竭慮敬抒一得之愚臣竊思黃河遷徙無定泛漲靡常歷代無永奠之法而惟籌堤防障塞之策是以設官遍乎河干發帑輒論萬億為蒼生免陷溺為漕運通挽輸國計民生兩關緊要幸蒙皇上神明睿鑒宵旰圖維無時不留心國計軫念民生凡分任河臣指示方略為安瀾成平計至深切也臣家居河濵頗知大概但自服官七載未曾目擊邇年河流遷徙情形未敢冒昧詳陳惟以積弊之原委言之蓋天地之有江河猶人身之血脈宜流通不宜壅阻而黃河西北之水由髙就下悍激湍流尤非人力所能奪者故以神禹治水止言疏引以入海無非順其性而利導之如尚書所載久在宸衷無庸臣之瑣贅然其洪流浩瀚洶湧奔溢急則衝刷無底漫則沙泥淤塞治河之法或導或防惟於流之處聽其散漫沙日益壅而水日益淺所以連年上流決口前次北岸之衝奪運道猶可急為補救惟去年決開南岸水無所容直趨洪澤湖仍由清口會合黃水方入東海但此洪澤一湖乃上自陜西商南以東等處山水並河南五府以及江北一帶諸流總滙即此一湖之水每年伏秋二汛髙堰已屬危險再加黃河歸併其中更當何如況黃皇上聖明久在洞鑒而未聞河臣言及於此深為惶惑遺愛未泯嗣後治河諸臣莫能改其成規不過託納廷臣年送規例故窮奢極欲毫無忌憚至所用之人大抵非門客幫間則光棍蠧吏以至微極賤寡廉鮮恥之徒而行夤緣鑽刺之路尚有何事不為甚至道廳與堂官崔三結為兄弟微員認為假子是以賣官惟論經管錢糧之多寡以定價值之高低且題補多係賖帳止須先取印領一紙補後方勾通開銷果能照領全楚則為廉幹之員再有美缺復又題升用人如此凡有才能而顧品行者不惟無人援引率皆懷抱羞惡奉身而退此所以數年之間將深悉河務之員蹤迹俱絶也當將靳輔所遺沿河兩岸出産柳草之官地盡令開成熟田納租分肥而險工之動用物料復派里民即其所做工程不過河員先為打算開銷而後借稱某處宜築壩某塞纍萬帑金化為烏有而別員旁觀者復援此為例聲言曾經出力孝敬挾制以求照顧遂成難閉之門矣又將運河八閘等處有各州縣地畝所出之募夫撈淺夫每年徵比銀錢上下瓜分以致閘衝決處分過重故見水勢既大則暗令河官黑夜掘開揀空處放水希圖借報漫溢絶不顧一方百姓之田墓廬舍盡付漂沒而有寃莫告也是以黃河上流及髙寶一帶鄉民知覺此弊但遇水長皆黑夜防間恐河兵扒口放水而私稱河官為河賊則民情之怨望可知至於每年開銷帑金數十萬多歸私囊為打點之資於工程毫無裨益此皆臣家居時每見效力各員以作弊為能事逢人誇張效力河員又多為功名借階求其確知水勢略有經濟之人百無一得即總理其事者亦難於甄別無遺況黃河之性與諸水迥別非永定北河可比似宜急為整頓但每見九列及內外臣工條陳大小諸務凡有一得無不仰荷伏乞大臣各舉所知河員調補辦理疏通海口濬利下流遍閲河工形勢考究水性因時調度預防衝決丈量運河寬深仍依舊制追出歷年夫食淘挖八閘淤淺速整蓄水湖壩以僃春月濟運務使黃淮諸水暢流庶可以免衝決且總河一官節制山東甚大我皇上拔擢出乎宸衷擯斥裁於乾斷寸長不遺匪材必黜臣何敢置喙然保舉一端似宜詳愼也凡大臣舉薦一官縱不敢欺皇上其如大臣之不能不受人欺何臣愚以為舉大吏不徒論其操守更當考其經猷不徒貴乎意見之不徇尤當求其執持之無偏且封疆重任有統兵守土之權若髙言淡漠必致武僃不修有察吏安民之責倘激揚失當必致人心不服即有好官用非其地不惟不見其長而適以形其短欲其勝任名用以為戶部侍郎兼管倉場錢法誰不曰至當不易但於持籌綜理之處尚未諳悉是以掌管出入總滙間有不應發之項或多至數萬者一味判行而可否曾不一問至若貢監報病故繳照之類則必窮究搜駁之不已密於小而疏於大是以多被羣姦朦蔽而不知原為其操守廉潔可以勝任間及重大有關係之處反多有出入未妥然其在部中之清廉正直盡心竭力實可以為人臣法則者撫臣以經文緯武為提衡而置軍旅於不講視武辨為異類凡遇刁民告官並不查實立即參拏搶據山動則扯旗習為故常臣赴任時由辰州府經過聞至今百姓有事不服拘拏雖有兵辨從不守一節實心為難然猶昭然於人耳目之事真偽可以立見止在保舉者之公私耳臣自履任以至於今每細心閲厯各屬員其庸碌無長貪劣廢弛者俱不足論就其頗有聲名素稱才能之員一一考其實迹有差委奔走之事則長於辦理而撫字催科無一可取者是其才止堪為人用而不能自為用者也有長於吏治而疏於出納以致錢糧虧空者是自恃其才而輕量天下事不謹之所以流弊也兼有利口捷給論事多中而於職守事務全無實濟者是又才之用於偏而失其正眩於外而歉於中者也又有一等巧於鑽營專工窺探上司之性情嗜好曲意迎合甚而言動氣象無不體貼效法以求酷肖遂致彼此投機一遇保舉捨此而誰豈知圖得保舉則從前之官小而不敢少露鋒芒者至此得志而本色盡現此又才之用於詐偽能二字塞責鮮有不貽害者臣請嗣後凡保舉各之至謹奏逐段批諭矣其細加檢閲類斯經濟謀猷有裨治道事宜無論朕之見是與否但據情直陳聽候採擇雍正二年九月初六日雲南布政使兼管驛鹽道事臣李衛謹奏為恭謝天恩事竊臣於本年閏四月十六日恭接督臣髙其倬進摺差役帶回臣前次奏摺到滇跪讀硃批諭旨誥誡諄詳無微不至又蒙欽賞黎洞丸藥以醫臣病自揣何人乃致時厪聖懷天地父母之德未有如是之浩蕩剴切者也感激微情纍詞難罄惟有凜遵聖諭調養微軀以圖報效而已臣吐血之後因先得青海蕩平之捷嗣後提臣郝玉麟於擦哇岡擒獲姦細以及外番歸順中甸投誠又幸魯魁山賊𠞰滅滇南之積患得除且全省雨澤普遍禾稼已兆豐登復蒙皇恩稠疊有加無已節次慶幸業將全愈又得皇上御賜良藥謹服二丸益加痊除可望復元嗣後當刻刻敬念訓旨從容辦職不敢復厪睿慮所有微臣感激愚悃恭摺奏謝為此謹奏朕前次批諭曾諄切戒汝褊躁尚氣近日有人奏汝恃寵放縱於督撫上司前粗率無禮而私地直呼為老高老楊操守亦不能純間有巧取處等語況抵補錢糧之奏即屬孟浪僭越若如此行為則大負朕之倚任汝不自保始終異日莫怨朕不始終保全之也嗣後極宜謙恭持已和平接物川馬古董之收受俱當檢點兩面欽用牌不可以已乎是皆小人逞志之態何須乃爾其克謹克愼毋忽同日又奏為奏明恭繳硃批奏摺遲緩緣由並陳司庫交盤事竊臣叨沐皇恩越升滇省藩司任巨責重敢不殫竭清理查升司毛文銓經手一應錢糧雖藩庫現在可以無虧但交盤成例止開動用庫銀數目其一切開除俱在奏銷錢糧并軍需案內分晰造報查今番滿兵撤回江浙提鎮出兵僃養馬匹及差遣文武官軍前辦事各種盤費幫貼兵丁安家等類尚未班師無憑造報將來奏銷案內除應開銷外尚有不準開銷者厯來此等無著軍需皆用俸工抵補查前番出兵虛懸庫帑經撫臣楊名時題明節次扣抵已預算至雍正十三年後方能全完但前項扣抵俸工數內除收過還庫外仍有原任巡撫甘國璧所欠四萬五千六百餘兩現在交臣接徵代為追補但今後奏銷軍需俸工業經停捐則毛文銓任內動用過軍需銀兩將來不準開銷之數無項可抵勢必變成虧空臣愚以為與其替甘國璧催追未完之俸工不若留為抵補去年滿兵過滇提鎮文武出口不在開銷例內之數免致年平頭火耗錫稅所餘雜項陋規聚零合總約有盈萬若概行革除恐後官無以養廉勢必需索屬員貽纍地方臣於鹽道任內已有聖恩另簡賢員則將此後所有留為養廉臣不敢絲毫隱蔽理合奏明更有瀆陳者臣接管藩庫交盤之後於六月初一日繕摺並恭繳從前接到硃批原奏同欽賜黎洞丸謝恩一摺俱交付督臣差役賴君佐王有功齎帶途間稽遲至七月中到京正值怡親王出口彼等不敢由宮門傳進又復帶回不意行至河南亢村驛黃水偶發過岔河連人馬衝倒將御賜黃匣漂流數步當雖撈獲已被濕透不敢拆晾及至八月二十一日始得到滇開匣跪讀黴粘一處惶懼無地臣罪奚辭是以遲滯今復恭繳合併聲明謹奏路途遙逺黴濕垢汚係常有之事小人輩無足責也雍正二年十一月十五日雲南布政使兼管驛鹽道事臣李衛謹奏為遵旨覆奏事竊臣伏讀雍正元年十一月二十一日上諭至有密奏密下諭旨者仍密行詳悉奏聞朕之所以寬其期限者俾欲各得悉心體究斟酌施行於吏治兵民實有所濟各宜砥礪以副朕懷特諭欽此臣自雍正元年五月到任後凡具奏一切地方利弊鹽井事宜及節次硃批覆奏之處所有已經遵行暨現在著有成效除將原摺恭繳外其中有應具題者俱詳請督撫公同題明應奏者臣節次盡行覆奏今屆年終理合遵旨奏明如白井沙滷減價撥銷故私鹽不待禁而漸除原奏每年可收買百萬斤今此外又有多收現在酌地行銷其黑井從前所隱之新井每年亦可煎出百萬斤查滇省舊有八處鹽井除現在正課無虧并加腳減價外尚有裁出督撫並鹽道衙門舊規共贏餘銀六萬五千七百餘兩俱經題奏留僃地方公事造册報部在案今復開只舊草溪井每年可得餘息銀四千餘兩暫抵從前虧墮額鹽已經題明三年完補後增入新課又開麗江府土井每年可得餘息銀二千二百餘兩可抵琅安二小井減平昂價又新開按板抱母等井除薪本各項外每年可出課銀二萬餘兩原奏將此抵補通省額鹽髙價今黑白景彌等井鹽價俱平毋庸抵減公議將此項餘息以作威逺茶山一帶新設官兵俸餉則滇南全省門戶嚴謹而兵勢連絡矣所有各銅厰日加調劑漸有起色比舊額有增俟核實數目另行奏報至於藩鹽二庫錢糧有著者設法陸續追取無著者漸少逐次清理諸弊俱除惟那新掩舊或恐進合併聲明臣不勝瞻仰敬凛之至謹奏部頒式樣限定字數係專為本章而言與密摺無關此請可謂笑談雍正三年正月二十六日雲南布政使兼管驛鹽道事臣李衛謹奏為恭繳硃批奏摺並謝天恩寬宥事雍正二年十二月十一日撫臣楊名時便差帶回臣藩庫交盤並謝恩覆奏三摺跪讀之下蒙皇上飭諭改過不即加以重罪策勵深切感悚無地伏念臣以部曹微員蒙皇上逾格擢用榮遇非常返躬自問實無寸長足録而僃位滇藩夙夜兢惕罪終莫逭尚復何求每思自古人臣雖刻意求全猶不能必其無過臣何人斯而敢謂其所行皆當也況兼愚昧粗疏鮮通經術加以一介小臣此心惟知有君罔所瞻徇孟浪愚戅臣實難以解免幸荷我皇上天地為心逐一開誠指示仍令臣自省自訟雖捐糜頂踵亦難仰答髙厚於萬一繼自今惟有痛自刻責有則改之無則加勉以仰副我聖主格外洪慈臣之心迹日久難逃睿鑒倘有背理存私剛欲並用之處雖百計掩飾終必敗露更何敢多置一喙於君父之前耶至臣奉到硃批別省事宜容臣次第核實另行繕摺具覆所有奉到硃批奏摺理合恭繳謹奏覽奏知道了摺內有則改之無則加勉日久難逃鑒察雖百計掩飾終必敗露之語盡之矣全朕用人顔面正在於汝前此戒汝狂縱尚氣乃朕由中之訓其餘風聞不過令汝知之之意原未深信勉為之無庸畏懼亦不宜放恣朕若不得真實憑據斷未有枉加譴責之理自信無他坦懷勿慮稍覺抱慊小心內疚二語當為終身誦和平度宇為朕生平之所羡慕驕傲形態乃朕生平之所檢戒以汝氣質而論亦宜時存此念方收涵養功效雍正三年二月十二日雲南布政使兼管驛鹽道事臣李衛謹奏恭請皇上聖安朕安條陳三款留中內海運一事屢有人言及朕經向廷臣再四籌酌率皆以為難行況現今載糧船隻又非航海之具此事所關甚大不便輕為定議清理各省邊界之奏甚為可嘉密摺防弊之奏亦屬有理候朕徐思妥確另行諭知同日又奏為恭謝天恩事竊臣微末庸愚毫無知識荷皇上拔擢任使賞賚數頒不加罪咎明埀聖訓雖肝腦塗地不足仰答天心乃復蒙欽賜御書不惟與督撫提臣同被洪施懷懼過分且得仰承恩錫天福永逺供奉足令邪魅退避瘴癘不侵傳之子孫光耀無極臣自揣何人邀榮至此敢不益矢犬馬之志竭致捐糜之身以圖報效萬一隨恭設香案望闕叩頭祗領訖所有臣感戴愚誠激切奏謝伏祈睿鑒謹奏覽奏謝知道了欲報恩榮惟戒驕縱雍正三年四月初一日雲南布政使兼管驛鹽道事臣李衛謹奏為恭繳硃批奏摺並謝聖恩訓諭事竊臣因彚奏雍正二年分以前所辦事宜蒙皇上硃批不避嫌怨與使氣凌人驕慢無禮判然兩途弗相交涉汝宜勤修者惟涵養二字最為切要務須勉為全人方不有負知遇殊恩竭力操持可也書云習與性成若不痛自刻責未易改除將來必以此受纍後悔何及欽此臣跪讀之下仰見我皇上神明睿鑒深悉臣愚昧招愆之由誡諭諄諄務使臣勉為全人屬望之優至此臣非木石寧不感痛流涕刻自濯磨以副聖主策勵殊恩但臣之職任皆通省財賦之區實嫌疑指摘之地且謬荷天恩於格外尤為羣情嫉忌之所歸是以臣抵任以來無時敢忘後來地步凡收發錢糧不拘多寡皆委官眼同存庫即聚零合總稍有羡溢不在常規之內者亦必彚報督撫俟奏銷時一並查造摺奏充公乃猶有言臣勉辭贏羡掩飾巧取者此係臣名節攸關伏祈皇上特差正直無私內員徹底清查臣於日用養廉之外再有欺瞞入己昧心營私之處不但難逃國法上蒼亦必不容再有請者臣一介愚魯原無才識學術錢穀亦非臣所長皆蒙皇上面為訓諭奉持而行故得勉為辦理未至隕越然自雍正元年正月叩辭天顔將及三載久未親承訓旨諸事無以遵循依戀微忱時厪寤寐兼有外省情形要務非面陳無由得悉懇乞皇恩準臣於奏銷後秋月進京面請聖訓並望回時便道一省臣母則殊恩異數逾於造化生成萬萬矣為此謹奏種種讒毁皆出年羮堯之口今其欺詐負恩情狀已盡敗露汝事不辨自明矣第傲慢凌人恐汝不無此病諄切訓誨實由朕衷有則改之無則加勉當時刻自檢毋忽雍正三年五月二十五日雲南布政使兼管驛鹽道事臣李衛謹奏為奏聞邊地情形事欽惟我皇上御極以來培元氣而重教養因時調劑俯順輿情務使政令不煩兵民信悅為臣子者遵循供職則道德一而風俗同可旋至立效者也惟是邊省之政治有難與內地同施者蓋漢土雜居接連外夷淳梗不一職司邊疆之臣若以有事為榮喜功好聖天子懷柔至意然而任其驕悖背負天恩因循畏縮槩置不問則不惟有傷國體且足以開外夷藐玩之端為誤尤甚即如雲南開化府與交趾地界不清一事除失之於明季者不論外我天朝前任開化之文武流官視此遐荒僻地輕於鴻毛是以將逢春一里又被交人蠶食多年然至今額糧秋米一十二石一斗零係開化府代為賠納志書輿圖記載分明因委查銅礦始知其故且據逢隨後即用驚嚇前官之故智令彼土官率領交兵數千來開化邊鄙揚威經督臣髙其倬飛飭新任總兵馮允中相機彈壓要隘勿令驚擾內地居民回至今尚留兵千餘在彼口內駐劄窺探內地消息今接督臣牌示云交王已經具奏奉有諭旨敕命遵行到臣自應聽督臣設處何敢瀆陳然臣有不得不奏者蓋因交王將失自我本朝之逢春里改揑土名竟欲一槩割去則開化府與彼交界僅存百二十里若照伊所奏名色盡行撥給此外無可再查矣臣於此事初以為天朝之地不應被伊占去故爾詳請會勘實為疆土有關體統起見即督撫二臣皆愼密有餘若非應清之界亦斷不準行文後因彼國有兵先來是以堵人則此刻薄之念欺世亦屬不可而並以朦蔽皇上罪戾匪輕況該鎮自抵任以來小心供職絶不敢效他人之倚恃權勢妄縱驕傲見於顔色臣實不心亦覺稍安不但此也臣自抵任之後因見各土司夷猓強橫殺掠深為民害曾於公所言明嗣後辦理地方除害之事有過當自認之有功槩不敢居幸逢督撫二臣同心協力痛加整頓仰託皇上洪福使頑梗革面仇殺風息若不據實直陳恐縱蠻人之志而且逢春一里之居民傾心向化望救聖明改正無不羣仰見矣臣寧甘妄聞伏乞睿鑒施行謹奏總之根本處業既乖離則枝葉柎蕚何有佳致此奏一無可取雍正三年六月二十七日雲南布政使兼管驛鹽道事臣李衛謹奏為奏聞事竊臣據曲靖府屬之霑益陸涼二州並南寧平彝兩縣報稱隂雨頗多忽遇霑益州所屬史家坡地方起蛟山水暴發淹沒田禾衝倒民房當即報明督撫二臣委員查勘並帶去僃公銀兩令其分別賑恤撫慰安頓未至流離失所查此被災之地雖連及數州縣但係一河泛漲順流而下凡接壤此河者兩岸即遭漂沒故惟近河併紅花海低窪處百姓獨受其害實非普遍被災至通省禾稼皆好䘵豐一縣雨澤愆期幸有臣等所開水利一道補救大半後亦得雨霑足恐厪聖懷理合據實奏聞再臣聞河南湖廣一帶道路不寧有奉發滇省委署州縣之舉人李應國曾在湖廣順林驛被竊又有臣衙門庫官陸正可由京攜眷來滇赴任行至河南裕州宿於南關客店夜被大盜十七八人明火執仗將庫官砍傷衣物盤費盡劫一空拋棄家眷隻身來滇迄今刀傷未愈該地方官見其囊空人傷不能行動恐干盜案願幫賠銀五十兩令其離境泯迹否則拖纍不許起身亦未報緝又臣於春月有僕人回家行至湖廣傅林驛地方夜宿客店亦被盜竊又前次滇省保送進京輪流引見之武官南天祥段宗嶽馮鸞等回任據稱途間河南湖廣多盜難行衆口無異臣思內省平原之地豈容盜賊肆劫行旅裹足有關吏治謹據實奏聞伏乞皇上睿鑒嚴飭施行謹奏凡百悉如此據事直陳一無顧避殊屬可嘉之至硃批諭旨卷一百七十四之一欽定四庫全書硃批諭旨卷一百七十四之二硃批李衛奏摺雍正四年三月初一日浙江巡撫臣李衛謹奏為奏明事竊臣奉命赴浙路過丹陽縣地方有江蘇撫臣張楷帶領江鎮道王璣恭請聖安畢臣隨將發下原摺交給并臣面奉諭旨傳知遂商議海塘事務伊自知不應擅動鈔關贏餘銀兩畏罪悔過感懼不已應聽該撫自行奏覆及抵杭州武林門有署將軍臣鄂密達帶領副都統并八旗各官同鹽臣謝賜履織造孫文成俱恭請聖安至臣在京前後面奉諭旨現在次第遵行容俟確有見聞查實看定挨次奏覆其奉發跟隨年羮堯來浙之滿漢文武各官共有二起己遵照諭旨發給咨文令其彼此互解勒限進京業經起程彼等到時投交吏兵二部據咨請旨再為分别作何著落為此先行奏聞謹奏覽奏俱悉張楷撫治江蘇光景如何同日又奏為覆奏事竊臣蒙皇上面諭令臣便道由清江浦與河臣齊蘇勒將河上情形議論大槩看伊如何回覆著臣到任後奏明欽此臣於本年正月初八日至淮安府屬之皂河適河臣齊蘇勒在朱家海堵塞決口因帶領淮徐道張其仁來請皇上聖安臣隨同至廟中問及河工近日情形據稱朱家海決口前己合龍雖復開少許不日可以告竣等語臣復問此番決口黃河全勢俱由朱家海歸洪澤湖當慮沙淤墊髙湖底以為後患據稱勤淤懶沙不能逺去都到不得那裏其洪澤湖上流仍有三處小湖相連沙淤俱就近處住下了將窪地墊髙竟可以添設州縣增益錢糧等語臣又問此三處小湖既與洪澤相連又在上流乃大湖支派受水分泄之淵藪也若己墊髙將來洪澤蓄水漸少且由近及遠再遇水發勢必盈科而進仍填洪澤湖髙堰更險為之奈何如果沙淤可以添設州縣廣益財賦恐前人久己放水墊平無俟於今也尚該留蓄水之處為是伊答云别無善法總之時加防範以期不至開決臣又問各處險工掃壩料物必須蘆葦今葦蕩營裁汰已三四年却被鹽商假借民墾名色暗中分肥蘆葦漸次缺少一遇險工難保無虞况目下各工俱用秫秸豆秧麥穰等類入水數月即朽爛不堅何以禦汛不惟虛費錢糧且搬運馱載勞民妨農苦不堪言將何以處之據稱此係前任趙世顯因葦蕩營有弊故爾裁去如今料物果難辦理如今要復葦蕩營雖是目下買用秫秸等物發價亦甚公道等語臣又問治河之法還是借河水急湍之勢以濬泄下流疏通海口為要抑或專顧衝決以堅牢工程為主據稱海口亦是要緊的我曽親看過從前甚淺我去年將清口打壩攔住留的口子甚窄令其敵住黃水並借清黃二水之勢將清江迤東河底衝深目今海口亦深無底因打此壩曽蒙皇上賞我翎子等語據此一假若果如所言實與治河之法相符臣又問每逢夏秋二汛防河如同迎敵不知各汛文武官中何員可以為將才善知水利者曽得幾人伊云實未多得難以指出等語臣又問先言朱家海決口不日合龍之説定於何日可以告成伊云十五前後臣説目下止宜保住兩邊壩頭為主立春後再過一九地凌方開其色青下面帶有黃泥較水面之凌更甚此凌一出隨帶有積凌水同下三五日後方得水平凌盡乃可以施人力早則河無故道水不東行陸地豈能走凌壩掃恐難支持必至正月二十間合龍未遲伊云甚是遂向淮徐道張其仁云我自到河工惟慿己見聞謹奏汝有所知可以裨益河工輔助齊蘇勒之人乎具奏以聞同日又奏為請旨事竊臣因修築海塘一事面奉諭旨祗領欽遵於正月十七日經過丹陽縣地方路遇江蘇撫臣張楷已將海塘緣由備悉商酌所需工料應令何順備出聽候該撫酌行臣抵任後即傳何順到案將所奉諭旨宣述欽遵兹據何順呈稱順蒙皇上天恩發交海塘效力矢竭涓埃贖罪萬一查浙省塘工原題需銀十一萬三千餘兩奉旨令何順與髙泓承認辦理嗣奉恩諭著巡撫遴委幹員動夫司庫錢糧立限堅築所動錢糧何順等各按所認工程照數補庫欽此前任撫院隨委員分修其應需銀兩髙泓因有虧空未完所認無幾何順感激聖恩不敢推諉隨即一併認捐已交過銀十萬一千三百有餘實未交銀一萬二千兩現在措交兹因江南塘工應新添釘樁另需銀七萬餘兩江浙海塘均關民生何順敢不仰體天心竭力措幫所有一切房産等項斷不敢絲毫欺隱自罹重譴但樁木需用孔亟而房産難於一時變售懇請照原奉恩諭先動司庫錢糧以濟工需容俟何順上緊變售隨得隨交等情呈請奏覆前來臣再三追究堅稱實無現銀恐誤工程請照浙省之例先動庫帑委官及時修砌伊情願儘其所有産業變還江蘇藩庫但臣未知何順家道果否實情不敢虛擬諒彼既認捐足江省海塘所需七萬餘兩之工料自不敢抗欠除移咨江蘇撫臣張楷乘時興工修築外謹將何順承認借帑補還緣由繕摺奏明可否恩準請旨遵行謹奏何順儻至不能賠還庫項自有應得之罪何論其家道果否殷實也未有因彼力之或能或不能而遲誤要工之理照所呈請發帑興修一面援旨咨部存案同日又奏為敬陳浙省吏治大概先為奏聞事竊臣自抵任以來看海塘查鹽務辦理欽部積案諸務紛集故於地方利弊應行分别酌量之處尚未盡得其詳不敢妄陳但有通省習沿成害之錮弊數端不得不急為奏明料理者如揑造奏銷勒令新任官接受虧空凡遇公事攤派各屬以及徴漕那補南米復那條丁買墊白糧互相牽扯頭緒不清其中亦有不得不行那墊之隱更因變改舊規致成弊竇又經前撫臣法海諸事不按繩墨任意紛更壓勒屬員代賠民欠以致府縣多有被苦纍者至於民刁健訟挾官抗糧強竊盜案既多而假命假盜又不一而足誠如皇上洞鑒果屬難治且吏治廢弛諸事掣肘現在各官雖未深悉其賢否然無甚長才特出之員其平庸不稱地方者頗多而敢於竒貪異酷者亦少此等闒茸更難即為改正容臣因時設法次第調劑不敢少懈亦不敢過急惟目下各府縣包容之虧空不可勝數其實在民欠已經奏銷報完者上司不便行催遂被姦民挾制不完自康熙五十七年積纍至今若非徹底查出據實題明分限追補則永無完結之日又有己經奏銷參出未完民欠除雍正三年分錢糧尚未奏銷外自康熙五十四年起至雍正二年約算各屬未完地丁銀共一百二十四萬三千五百餘兩現在十年並徴臣再四思維以上兩項錢糧己經釀成無底虧空清楚非易若不破格整頓細籌變通之法將來積欠愈深年復一年終無底止不但民力萬不能兼辦而各官考成益重恐致法令難行愈長違玩之風然臣以到任未久未敢冒昧入告為此先將大概情形繕摺奏聞可否允臣因時變通方敢分晰具題遵照辦理或可使數年積弊得以漸清庶吏治亦稍有裨益矣謹奏如何因時變通作何設法調劑須先摺奏以聞不可率然具題同日又奏為奏聞事竊臣未到浙任之前工部咨行令閩浙兩省各造大小趕繒船五隻舢板船十隻駕送天津隨有欽差監造侍衛蔡勇過浙曽與前署撫臣傅敏商議戰船需用木植物料俱産閩省採辦甚易浙省辦料艱難且兩省往返監造未便若并在閩省成造可早兩月完工未經定議蔡勇即往閩省臣到任後據布政使佟吉圖具詳前情又稱大小趕繒船式丈尺各省不同此項船隻駕送天津涉厯大洋若照浙省丈尺成造恐洋面有廣狹不同是否利便駕駛難以懸擬浙閩同一欽差監造必面請議定式樣丈尺成造方能畫一如式等語臣查浙省欽差現在閩省料理未能分身來浙自應委員齎銀赴閩就近商確製造既便於採辦物料而匠作式樣又可畫一早得完工且可同閩省船隻一起駕運出洋往津甚屬妥便但聞洋船所需大樟木作龍骨用者産於浙地近海之溫州府境內倘閩省修船少此一項亦令委去之員代為就近買運由海發閩較浙省更近臣現在己委杭捕同知黃金鍾溫州府同知楊吉祥等領銀往閩同欽差面商指示儹造外理合繕摺奏聞謹奏籌酌甚屬合宜似此始可謂盡心辦事也雍正四年三月十五日浙江巡撫臣李衛謹奏為欽奉上諭事竊查吏部議覆雍正元年三月初六日硃批上諭各省督撫衙門幕賔設立功過勸懲仰見聖明睿鑒洞悉隱微又查雍正二年十二月初二日禮部侍郎三泰條奏督撫以下幕佐不許延請本省之人經部議覆禁止奉旨依議各欽遵在案臣前任雲南藩司時原有幕賔曽智已於本年正月分選授嚴州府經歷今臣謬蒙皇恩授以浙江巡撫事繁民刁刑名錢榖積牘滿案實非一手一足所能辦者臣嵗內在京時曽倩有刑部辦稿貼寫魯錦雖原係浙江久經寄籍順天故鄉並無家業然止熟記律例不諳外省事宜僅足以備考究成案之用因無可如何將臣奏帶郎中朱倫瀚關防署中與臣查對新舊檔案指授外官政務相幫辦理雖晝夜無暇甚屬盡心但係現任職官終非幕賔不得不急為訪求因屢向江南鄰省延訪實難其人適據藩司佟吉圖便中言及有原任浙閩總督滿保任內所用舉人潘兆新幕才頗好臣因此查訪其行徑在滿保幕中數年浙江亦屬統轄無私迹物議但係浙江人若不據實奏明不敢擅用可否準臣留其查對辦理瑣屑案件總不過稍分簿書之勞臣始終不敢假手於人再將伊本府之事概不與聞仰候聖恩允準方敢遵行為此謹奏所請可行其人如果端方妥確何必拘定省分或慮物議援旨咨明該部同日又奏竊臣遵查原任直督李維鈞貪贓寄藏情弊已經漸有蹤迹其彰明較著者果然只有墳田老僕而遮飾掩蔽之物甚巨查維鈞長子李蔓先由伊父任所携資回籍因不幫其伯父李陳常之子李宗仁當差彼此參商李蔓移居桐鄉縣妻父汪森之家即巡視臺灣御史汪繼燝之嗣父也汪森無自出之子愛女甚切故李蔓之依託妻父最親代置産業多在嘉興府東門外市宅樓房數處李蔓現住大房一所在嘉興縣王店鎮往來嶽家忽隱忽現其大總資財寄頓之處大半在江南姑蘇伊姻親戶部侍郎吳士玉名下影射其餘盡在浙江嘉興府屬伊親家江南學院俞兆晟處以上三家皆維鈞平素相好深信故爾寄託此係李陳常之子差庶屬不枉倘再推諉隱匿即嚴究伊子李蔓未有不得實情者所有臣查訪大概情形先為繕摺奏聞伏乞皇上睿鑒施行謹奏論其寄頓之巧誠可謂狡三窟矣如此居心安能昌盛今伊應賠各項纍纍將來勢必歸至本省在爾處結案也雍正四年三月十七日浙江巡撫臣李衛謹奏為欽奉上諭事雍正四年三月十六日接準吏部咨雍正四年二月二十六日奏事雙全傳旨謝賜履奏稱患病乞休著伊來京陛見其兩浙鹽務交與巡撫李衛暫行辦理欽此到臣聞命之下仰見皇上聖恩不以臣為不肖故以財賦重任著令兼理敢不殫力竭愚以冀仰副聖明委任至意但思浙江一省事務繁多巡撫責任艱巨非别省可比久在皇上洞鑒之中且兩浙鹽法煩冗商人疲玩料理非易竊恐愚臣一人之耳目心力倘或絀於兼顧貽誤本任事宜負罪非輕謹遵旨暫行辦理外為此具摺懇請皇上蚤簡賢員專任其責庶幾兩無貽誤謹奏浙鹽一事前旨雖云暫辦朕意實欲爾久遠經理至不能兼顧時亦必爾舉保一人代替仍命總持其大綱也雍正四年五月初十日浙江巡撫臣李衛謹奏為奏聞春熟年景事竊查浙地本年正二月間雨澤甚多麥禾菜子蠶豆俱皆茂盛正在收割而杭嘉湖三府桑麻亦好雖春月天氣寒冷蠶事較每年稍遲然不但無損且收成分數甚髙正值採繭取絲之時仰託皇上福庇今嵗上季收成可稱大有百姓歡呼樂業稻苗亦旺浙東早禾業已種插暢茂而浙西一帶尅期栽秧各處米價亦平近福建有差官在溫州等處買米亦與浙地無礙自應聽其買運以濟鄰封所有春禾蠶事成熟情形理合繕摺奏聞謹奏覽雨澤麥禾繭絲各情形朕懷深慰况浙省米榖分濟鄰封更為向所罕聞之事近因畿輔一帶積雨連綿正爾焦思適閲此奏不覺憂喜各半同日又奏為遵旨覆奏事竊臣自抵任至今與藩司佟吉圖寧台道王一導等共事三月有餘欽遵臣在京面奉諭旨細加驗試頗得其狀臣看佟吉圖待臣光景比待舊任撫臣大有不同從前受其侮慢者不一而足惟不敢藐視署撫臣傅敏然傅敏書生氣度古道襟懷亦未免墮其術中餘如李馥黃叔琳凡事皆仰體佟吉圖而行至法海則兩不見面背後彼此各對屬員罵不絶口是以甘國奎之摺稿皆出於佟吉圖之手今待臣固屬有禮但其向來令上司仰體之性未除臣初以為其人必有操守才幹故爾驕人乃察其實皆假手吏役不但不留心辦事而吏治皆在浮面處掩飾實未練達案件錯誤者甚多操守亦平常雖未直開私門然收兌錢糧外去加平連吏役雜項合每千十二兩之費飯食又不在數內從未取出分文備公又有收捐一項除報明贏餘公用外仍令委官加費入己至兵米折價一宗亦有多收者而發給銅價各項錢糧除兵餉外俱有短平少給之處遇有公事不肯輕易到不過多費心力或者不致大誤地方若使自任封疆其縱情驕慢恐未相宜也再查寧台道王一導其人表裏異致辦事與聲名均屬平常從前管理查審之事則有錯誤至張冠李戴者曽經臣看出批明改正並未過為責備伊自覺無色屢次告病細探其故非專為辦事多誤實因今嵗秋冬例應分修本省戰船數十隻恐致賠補之纍臣因其近能知改屢次包容待之以禮未肯遽準告病以上二員臣驗試己確皆有實據尚無甚貪汚之處似應觀其後效何如臣謹據實覆奏謹奏知道了同日又奏為恭繳硃批覆奏事竊臣因會查湖口於本年四月二十二日在浙江交界接到臣初次所奏原摺蒙皇上逐件批回當於舟次跪領謹密開讀硃諭明切使臣遵循有據感激靡涯復於臣前代奏江蘇撫臣等恭請聖安一摺奉硃批張楷撫治江蘇光景如何欽此臣於正月間過江南初識撫臣張楷見其人居官平和人亦謹慎但優於政方能從容辦理若勉強支持難免手足拮據以張楷之才似可於江西安徽之任勉供厥職謹據實直陳聖明自有洞鑒再臣覆奏與齊蘇勒議論河工一摺奉硃批汝有所知可以裨益河工輔助齊蘇勒之人乎具奏以聞欽此臣平素所聞雖有稍知河務者但其操守居心皆不敢保若以駕馭驅使僅録其才而不取其人則容或有之如原任兵部堂主事齊甚有才幹係滿洲人先為南河筆帖式十有餘年素曽留心河工講究水性然性情執拗而操守不足其子清海係候補主事更屬招搖多事伊父之官聲家道盡喪彼手現今齊年約六十以外聞得曽蒙見看伊目下矢論如何再為試用但其子清海則求嚴禁不令隨往河工方免撓擾之虞嗣後臣當再加留心訪求凡有所知不敢隱蔽謹奏覽同日又奏為奏明縣署失盜事本年四月二十六日夜間富陽縣衙署被賊從後墻挖洞進至書房隨手偷去腰帶荷包全副餘物尚未及取有該署縣業師何姓父子知覺喊呌被賊打傷其子何錫光倒地當時驚起家人守役齊行救護賊即逃遁追趕未獲其何錫光醫治不痊越至三日後殞命適臣會查湖口回署聞知當即飛查續據原署縣務理事同知車柏詳報前來臣查外省錮弊凡有衙署失事畏懼處分多有隱匿不報以致盜賊行劫官署較之行劫民間者反多漏網臣則何敢隱諱不行根究到底以長盜風除現在飭司委官勘驗強竊情形並嚴飭文武各屬勒限協拏務獲究擬統俟照例取具踈防職名另行題參合先據實奏聞謹奏好盜竊之案無論官署民間俱應如是嚴飭拏究同日又奏為請旨事竊查原任河庫道潘尚智向因通同欺帑發覺經總河臣齊蘇勒題參復咨會浙江將原籍烏程縣一應家産人口等物逐一查明造册存案以憑著追當經原任撫臣黃叔琳檄行該地方官確查造册封貯迄今三載未準河臣咨催而浙省亦無著追今臣查閲舊案不勝駭異且臣深知潘尚智從前出身微賤居官卑汚以營謀得任淮徐道職司河庫貪婪不堪委管捐納科斂外費分肥甚多及後穢迹敗露復夤緣張鵬翮賄買崔三改供漏網隨將經商典當財物盡行寄頓於蘇州揚州清江等處盈千纍萬不可勝紀而原籍復經逐一查明房宅田産約價尚值十萬有竒似此貪汚劣員未便聽其狡脫彼雖年老尚有伊子候選知州潘世瓚現在獲押交該地方官看守可否將尚智貪贓置買産業著落伊子變價交貯司庫以備修築海塘不時之需非但於地方有益而浙省人民亦皆心服而感激皇恩於無涯矣為此具摺請旨遵行謹奏潘尚智穢迹昭彰當如是處置以懲貪黷例應具題則具疏題請若無庸再奏即行照案查追可也雍正四年六月初一日浙江巡撫臣李衛謹奏為請旨事竊惟浙江春收豐熟情形前經臣具摺奏聞今五月正當插秧之際又得黃梅時雨十餘日晚禾頗有被淹者臣隨委官勘驗撫恤令其補種禾苖之時人猶安靜若遇嵗歉米貴即有無賴之輩出海搶劫多事與浙省洋面聨界恐沿海地方不能販多向江西湖廣等處買米運浙湊食若遇此二省豐收米多儘可源源接濟倘或米少則浙省尚慮糧食不敷原無多餘可以協濟閩省不得不預為設備曽經屢荷皇上聖明逺照念切民依頒降諭旨令臣等就近商酌採買榖石以僃積儲此誠足食惠民之至計經臣題覆俟秋成再為酌量就近買僃部議準行在案臣查湖廣漢口地方向來聚米最多者皆由四川土饒人少産米有餘本地榖價甚賤故川民樂於出賣以助完糧用度之需而川江直抵湖廣水路盤運甚易臣思凡事預辦於前臨期方免掣肘若將浙省存庫鹽院筆帖式等歸公贏餘項內照兩淮買榖之例借動銀十萬兩遴委幹員於七八月內起程前赴四川地方買米令彼處地方官稽察價值沿途催運船隻則十月冬收之時即可買齊年內陸續運到彼時再為酌定如閩中米貴則可知會閩省委員領運赴彼平糶解價還項若閩米己足則就於浙省存貯俟春月青黃不接之時分發米少州縣量減糶賣接濟民食除將原本歸還司庫外所有贏餘據實奏明亦可為地方修理城垣等項緊要公事之助設或川省米價亦昻則將解去之項暫存彼庫賤時再買因時變通在川民既可得價以資用度而閩浙食米不致缺乏即湖廣江西兩處民人亦不能以江浙搬運致長彼處米價藉口稱説庶幾可以仰慰聖明指示欽遵為此謹奏覽同日又奏為覆奏海洋情形事竊臣因浙省濵海要區於抵任後即遣人密探沿海一帶及大嵐四明山等處地方近日頗屬安靜惟每年夏至後南風盛發更宜加意防範誠恐各口隘偷放米榖出洋關係甚巨自當不時稽查又因今年春月漁期天氣稍寒出魚頗少慮有採捕失利搶奪生事之輩亦未可定臣前己咨會提鎮并嚴飭各協營勤督兵船加八山羊衢等山接界從前因有匪船往來聚散彼而行又臣在京曽面奏聞得臺灣之外尚有一處地方為匪類聚集之所至浙洋有一玉環山係台州太平縣溫州樂清縣行遷遣自海界展復以後多有借開墾為名潛入此地者又有網船常在彼處搭藔打魚前督臣滿保以地隔海汊防範難周若聽開墾必須增營設兵利少害多屢經禁止時常驅逐然愚民於利之多姦良混雜即目前無事恐貽日後之患况人心貪利朝逐暮回即派撥逰巡辨兵不過一月半月到彼一次兵回則仍然如故且滋不肖辨兵私得同督提二臣委文武大員到彼細加查勘如果設實力嚴禁務期一勞永逸以杜後患方為妥便再臣前有差往福建押運樟木之委官錢塘縣典史閔漢英近日回浙稟稱所造天津戰船將已完工尅日駕送臣面詢該典史一路年景海道情形據稱在閩聞得彼地傳言浙江溫州洋面有賊船行劫白塘客人官兵救護被傷數名等語臣不勝駭密查如果確實立即嚴參外臣既有所聞雖無實據何敢隱諱合併附摺奏明謹奏濵海各情形覽奏俱悉王一導爾經面奏其行止朕亦曽降諭命爾試看觀其人猶在可用之列然既與爾氣味不投未免彼此稍有芥蒂今欲將伊調用特諭知之同日又奏為恭繳硃批原摺事竊臣於第二次覆奏摺內有查出李維鈞貪贓寄藏漸露緣由奉皇上硃批世間竟有此等如鬼如蜮之人殊屬可笑爾意須如何方不致令其漏網又奉硃批論其寄頓之巧誠可謂狡三窟矣如此居心安能昌盛今伊應賠各項纍纍將來勢必歸至本省在爾處結案也欽此仰見皇上睿鑒隱微量此等姦險惡人自為上天所不佑國法所難容將來發浙追補之日臣自當設法細查但恐日久漸次知覺又生狡計詭謀難以測度懇乞臣請揀補鹽院一摺奉硃批浙鹽一事前旨雖云暫辦朕意實欲爾久遠經理至不能兼顧時亦必爾舉保一人代替仍命總持其大綱也欽此臣受恩深重何敢辭勞憚瘁因巡撫事務過多較他處更難而鹽政雖則稍簡恐兼顧不遑有誤本任故於聞命之時即為懇奏乃蒙皇上信任若此又值現在掣鹽奏銷之時敢不竭盡心力暫為辦理第思鹽院一官非撫臣屬轄必得才守兼優方克稱職查張坦麟頗屬人地相宜將來硃批奏摺合并恭繳謹奏覽雍正四年八月初二日浙江巡撫臣李衛謹奏為亟請揀發人員以僃臨時需用事竊臣自到浙省以來恪遵聖訓夙夜凛惕惟以熟悉民情詳察官吏為要然不敢輕據傳聞遂執臆見致有所誤故抵任半年有餘疊出竊恐叢脞慌惚之餘而速求激濁揚清之譽未有不墮挾官誣詐之術而自蹈輕舉混施之咎者也是以臣曲為懲訓先禁刁風後繩官吏於各屬員中欲靜以察其才守設施之優劣並徐以俟其改過遷善之能否此臣之所以未敢妄行舉劾也今為時己踰半載彼才守之優劣與夫不肖者之果能改過與否已皆稍有見聞大扺才力出衆者少勉強供職者多而庸碌廢弛者亦不乏人臣目下監試秋闈出場之後即屆大計之期若仍不刪除貪汚以警不肖薦拔廉幹以鼓勵賢能何以勸懲僚屬整肅官方稍供封疆之職以仰副聖主之恩乎至今嵗計典應否舉行之處尚俟督臣髙其倬會核外但浙省即或暫停亦有去取將來必至乏員若非預為奏請恐臨期更替需人惟憑成例委署非地限於窵遠而顧此失彼即才絀於兼攝而繁劇兩誤除臣原有奏帶族兄李錫爵不便議補浙省員缺外止有刑部郎中朱倫瀚雲南教官尹魯並解任候補原任嘉興府知府江承玠與革職浙撫黃叔琳所帶候補知縣楊世照共四員未經題補實不敷用伏乞員知縣十員並懇敕部令其早至浙省使臣得以預試其才然後因地制宜臨時酌用庶政務人才兩得裨益矣謹奏浙省事務因爾力可維持原未曽賜與優等之員擇才具可觀者俱發往他省矣近日始聞王一導乃係不堪小人趨奉隆科多恃為城社前任部曹時聲名甚屬平常云云似此一無足惜任爾去取可也同日又奏為陳明省會情形事竊惟杭州一郡乃水陸通衢城郭寬廣居民稠密自北關至江頭聨絡三十餘里旗漢雜處匪類易於隱藏厯有放火乘機搶劫之輩延燒輒至千百家甚且一月數次乃省會第一大患也其次則竊盜逃犯之打詐扒兒手白日撞之鼠偷各分地方為害不一臣抵任之初即會同將軍鄂密逹熟商彼此嚴禁之法留心查拏安插幾盡邇來火災漸少頗得寧謐但在省各大員積習相沿於此等事厯來多不過問一切惟推兩縣即兩縣或有幹員而官卑權輕限於上司掣肘率歸廢弛惟前杭州府魏定國在任稍能留心地方臣尚倚為臂指自彼升轉去後李慎修接任則攤將妥乃有田多丁少之土棍蠱惑百餘人齊集巡撫衙門喊呌攔阻攤丁彼時法海驚慌失措即令官員勸散暫緩均攤之議及後又被有丁無田情願均攤者窺破伎倆復聚集鄉民圍轅炒閙更甚又有一班門面丁差亦為效尤從此開端聚衆更迭而起毫無忌憚仁錢二縣遂分為六起動則打街罷市後兩司護理撫印以及福敏在浙仍常聚閙不己及臣抵任未幾羣黨即以此事紛紛來控遂經批司查議杳無回覆只得出示開導招集城鄉老民面諭著令聽候編審務使均平不致偏纍遂欣然樂從無復纒擾忽於七月二十八九兩日乘鄉試人衆又出有劣惡金濟路暗中雇出土棍聞尚德等復挾故智聚衆進城閙至錢塘縣堂因知縣秦炌初任未諳不能開慰遂將沿街鋪面拋擲瓦泥勒令罷市及臣聞知即令杭府李慎修率領仁錢二縣密囑以辦理之法而該守與秦炌竟手足無措不能驅逐惟仁和百十人一見本官隨即散去而在省司道乃若不知者然臣只得令杭協副將李燦協同署仁和縣張坦熊諭以利害押令錢塘棍徒出城始得解散此事若不將首惡分别懲創則十一郡貢監劣襟俱在省下場從今愈長聚衆挾官之惡風為害非細且慎修之誤事尚不止此即臣遣役拏獲扒手竊賊業經録供起贓之犯發府究緝夥類乃遲至數日之後臣面見乃同李慎修一時揀選之人其賢否竟有天淵之别世臣雖亦履任無幾不但才守皆有可觀而臣所委辦之事無一不勝任愈快若浙地有此數人何患不治臣與該守素不相識無所容其偏私但不敢隱人之善欲請改調省會則嘉興一郡又係效臣亦得指示辦理或可稍分煩勞未敢擅專伏候皇上諭旨遵行再查台州府趙資雖因病告休業己具題但該員居官謹慎頗不避嫌止因伊兩子相繼而殞傷痛過甚以致精力衰弱恐誤地方是以請休委無大病或可以京員改用尚堪稱職合並聲明為此據實上聞所有臣從前因攤丁告示底稿并印刷勸息火災禁約共二紙本不敢瀆呈御覽查有原任晉撫諾岷曽將碑摹並辦過事宜底案進呈臣故敢冒昧援照附入摺匣伏乞聖主賜覽謹奏示約底稿朕俱經覽過殊屬通情順理凡所措施悉預為推誠誥誡乃極有益之事雍正四年十月初九日浙江巡撫臣李衛謹奏為恭謝天恩並繳硃批原摺事本年九月十五日臣齎摺千總回杭捧到皇上發回原摺一封逐事皆蒙硃批明訓至精至悉使臣得以欽遵奉行不致遲疑惶惑誠如光天化日之下加以湛露和風臣即草木亦知欣欣向榮敢不殫力竭愚以希仰答鴻恩又蒙賞頒荔枝自揣何人敢邀優渥至此臣郊迎至署恭設香案望闕叩頭祗領訖所有感激微忱理合繕摺奏謝並繳奉到硃批奏摺伏乞睿鑒謹奏覽奏謝知道了又摺奏帶徵折色二事甚屬允協己諭部照所請行矣同日又奏為奏明海洋近日情形事竊臣因本年福建廣東米貴時時以海洋宵小為慮嚴加防範五月間拏獲洋盜楊可英等洋面頗見安靜自臣入文闈後八月初八等日連有商船六七隻在於台州等處海洋被劫內有福建發浙效力之功加官張俊傑告假搭船回閩被賊虜去據放回船戶供稱賊係福建廣東聲音張俊傑是閩人恐其認識首告根拏故此留住不放等語臣在闈中即嚴行各地方官緝捕并咨行提鎮各協營嚴督官兵連䑸會合嚴行會哨擒拏續準督臣髙其倬咨會現有浙江參將陳勇押運榖石赴閩事竣已委令駕坐原船添派兵丁沿途搜捕追拏在案此項賊夥臣等自必嚴緝務獲不敢稍懈但水師員辨精熟洋面情形者各營不能多得其人臣甚為焦思除現在照例查參踈防外合先奏明至台溫聨界之玉環山可否開墾一事臣已委溫處道王斂福鎮海營參將吕瑞麟會同勘明其中現有舊址形迹可墾之田約五六萬畝將來漸次尚可墾闢成田者亦約三四萬畝事關海疆防目今分晰數條移商督臣髙其倬斟酌妥協再行覆奏請旨外有浙江正主考臣陳萬䇿奏摺一封交臣附入摺匣代奏合併聲明謹奏知道了陳萬䇿原摺仍交還與伊同日又奏竊臣前準內閣行文奉旨搜查李維鈞寄頓財産隨即欽遵密傳臣標守僃閔賢面授應行事宜著令隨同嘉興府知府喬世臣前往逐細搜查去後據喬世臣等回稱先自嘉興王店鎮地方李蔓住所查拏並無伊夫婦在內止有管事家人范元等搜追出器皿衣物田地房契及現銀三千八百餘兩隨細詢范元供出李蔓夫婦現在桐鄉縣嶽家濳藏其嶽父係已故部郎汪森乃過嗣臺灣御史汪繼燝為子者隨押同范元等至汪姓住宅之旁另房一處內有門戶通連先止搜獲金飾衣器並現銀三千餘兩仍不見李蔓之面及將幼婢逐一誘訊其妻汪氏始行説出房後有埋藏銀一萬七千兩并嘉府城內汪森賠奩房宅一所亦有埋藏銀三萬兩俱經掘出共有現銀五萬餘兩多係元寶且鑿有直隸縣名業經該府報明貯庫在案及後汪姓見事已敗露勢難隱匿方將李蔓放出路遇府差拏獲伊嶽母汪黃氏自揣寄頓之贓尚多恐被别人供出彼此商同設法掩飾隨借稱幫女名色又呈出銀二萬兩臣細思李蔓既久在伊嶽家謀為安宅且已起有埋藏多銀可知寄頓必不止此自應根查復訊據范元等供伊主尚有汪姓當鋪存貯本銀三萬兩又據李蔓供稱其父李維鈞於嶽家相好至親平素陸續寄頓約有二十萬兩等語臣若據此嚴追汪姓必以臣為有意刻入遂出示曉諭凡有寄頓之家令其自首如不肯説出再照李蔓等所供根究續據汪繼燝之子汪廷英赴臣衙門呈稟大概云伊父原受汪森絶産當鋪四座據帳內所開本銀共二十四萬兩內實有存李姓銀六萬兩緣其繼祖汪森止有此女故爾相依留住在家今若止將此六萬兩首出則李維鈞姦猾異常將來必多為報出以汪姓搪塞結案反將别處寄頓者留作後來餘步今情願將所受繼祖絶産連所寄銀共二十四萬兩一併報出陸續交庫僃公庶免受維鈞父子後纍其餘别宗之贓懇乞另為追究本身等語臣思汪姓雖係情虛借題然既首出如許似應免其深求如變價不及原數再於汪廷英名下補足此外尚有查出田地共二千餘畝住房三所租房皇恩也所有搜獲李維鈞贓産及現今所得首報各緣由謹先奏聞謹奏覽諭浙江將軍鄂密逹巡撫李衛知悉爾等接到諭旨鄂密逹立委副都統傅森李衛選差可信屬官一同星速馳至查嗣庭家將所有一應字迹并其鈔録書本盡行搜出封固送部搜查之時即墻壁窟穴中亦必詳檢無遺倘致透漏風聲伊家得以預行藏匿惟於爾等是問特諭雍正四年十月二十五日杭州將軍臣鄂密逹浙江巡撫臣李衛謹奏為欽奉上諭恭繳硃筆諭旨事雍正四年十月十三日臣李衛準到兵部火票內開內廷發浙江巡撫杭州將軍同開看黃匣一箇事關緊要相應馬上飛遞該衙門交投等因臣李衛隨即密行知會臣鄂密逹公同望闕叩頭啓封默讀皇上硃筆密旨臣鄂密逹即調副都統傅森臣李衛即令刑部額外郎中朱倫瀚杭協副將李燦會同一處密將旨意僃細傳令遵行去後隨於十六日據傅森等回稱當於十三日密帶兵役連夜前往海寧縣帶令知縣鍾維楷領路星速同往於十四日到海汾橋地方查嗣庭家所居周圍水蕩止有西鄰房舍數間其附近河下泊有尖頭船三隻即一面將船隻看守一面將嗣庭住宅前後左右分繞防範入其宅內隨將合家大小分别男女各令關閉空屋之內即於一切房屋逐間細加搜檢凡箱籠櫉匱以及抽桌木匣紙卷包裹瓶甕等類盡數開看牀櫉四圍悉行照遍遇有地板房屋磚板俱經揭起其墻壁地面凡有可疑之處俱行拆掘所有堆貯書屋并擱放櫉匱等處字迹書本俱搜集一處令親身所帶之人看守次日即將押住船內起出包箱公同一一開看其男女衣服行李等類逐件翻尋訖仍恐前次內外搜檢或有遺漏復又將從前所查之處再加細搜并將包裹什物及狼藉拋棄一切字紙盡行抖出收貯始將關閉人等放出除婦女不問外當即訊據查嗣庭之子查澐查克上及家人夏連等供嗣庭於九月十三日在江西省城起身進京即著查澐帶同夏連於本日一同分路令其回海寧接取家眷上京居住於二十九日到家十月十二日在嘉興雇船三隻擇於十五日起身開行等語已經搜出十二日雇船文契三紙又再三追問查澐查克上等有無寄頓别處字迹書本同供並無隱匿寄頓查出甘罪等語其查嗣庭現住房屋以及衣服器皿外又於各處所見零碎銀錢約共一百餘兩以上等項因未經奉行不便擅動止將搜出一切字迹書本盡數押送前來等情於十六日午後到省臣鄂密逹隨將解到書籍暫行加封看守俟臣李衛於十八日武闈報竣公同點驗並派令駐防章京二人及因公在省知府五人一同將所搜書籍册本逐張一一細加揭看除刻板舊本通行之書及八股文章京報契帳等類暫行開明封固交署杭州府徐有緯收貯外所有一切字迹鈔録書本以及往來書札筆迹不論片紙零星凡有可查者盡數密加封固遵旨解部再查奉到諭旨內令將一應字迹鈔録書本搜出封固送部所有衣服器皿等類臣等未敢擅便仍交令海寧縣封貯原屋謹將字迹書本開造細册會差千總張永勝領催厄楞太齎解進京送交兵部并咨明將應發何部查收之處具奏請旨欽遵外緣奉密旨事理合將搜查情由會同覆奏所有欽奉上諭一封恭同齎繳伏乞皇上睿鑒施行謹奏前諭甚明止令搜察字迹衣服器皿何必封貯耶浙江巡撫臣李衛謹奏為奏聞事竊臣前入文闈時因台州等處海洋連有商船數隻被劫內有告假回閩功加官張俊傑被賊虜去隨星飛咨行閩浙督撫提鎮及各營縣會同嚴拏務獲已經繕摺奏聞今接閩浙督臣髙其倬字信知會被虜之張俊傑已經放回厦門據稱盜夥俱散歸各處隨經提臣藍廷珍押令認緝獲有要緊盜犯黃尾陳盛老二名又接福建撫臣毛文銓字信知此案洋盜又經拏獲九名現在閩省嚴審追究夥盜窩家逐一搜拏等因臣查海洋若有成夥匪類則乘風往來飄忽洋面遇船肆劫失案即多至其飽贓之後即散夥濳歸內地隱藏此其故智然大抵廣東福建之人為多溫台次之惟有於初起時不可隱諱宜即咨會鄰省無分疆界一面於洋面派撥兵船上緊巡拏一面於內地實力訪緝如有出外初回蹤迹詭祕之人立拏根究則賊徒斷難逃遁今一夥匪類連劫多船因追拏甚緊散夥遁回已在閩地就獲十數賊人臣又於浙省各屬嚴行查拏訪緝據有覆到蹤迹可疑之人并有溫州營辨兵通同將船隻私送出口與賊者現在飭審確實另題外但恐內外洋面有山嶴深處濳藏聚集為患匪輕已令水師各營出汛分頭搜查務盡根株不使漏網方可無虞總之海疆緊要臣自當與閩浙督撫提鎮諸臣同心竭力時刻防範查拏以期宵小潛蹤商漁安業仰副皇上委任至意合將近日情形一并奏聞伏乞睿鑒謹奏覽奏知道了爾於地方各務精勤弗懈為朕所素信無可多諭者勉之雍正四年十一月二十日浙江巡撫臣李衛會同福浙總督臣髙其倬署理浙江提督印務定海鎮總兵官臣張溥謹奏為查覆浙洋玉環山情形敬陳末議恭請聖訓遵行事竊臣李衛前因台州府屬太平縣及溫州府屬樂清縣之間海濵不逺之處有一玉環山地方遼濶海外無藉遊民多濳其中私墾田畝刮土煎鹽及網船漁人搭藔住居漸次混雜久必不寧雖經禁逐仍恐朝驅暮回致釀後患即有撥兵逰巡亦恐通同容隱會委大員查勘如果設兵增戍可以防禦開墾地土足供經費另行奏聞否則公商派撥兵船常川巡查等情先經奏明在案兹據溫處道王斂福鎮海營參將吕瑞麟勘覆繪圖前來臣等細查玉環山雖孤懸海面然由彼而之內地各有港口西則由烏洋進蒲岐所可至樂清縣地方西南則亦由烏洋直過黃花關進盤石口可至溫州府郡城惟西北則由楚門橫渡水面僅里許即登岸踰嶺直至太平縣地方其東南有黃坎二門出此則為外洋矣蓋此山周圍約計七百餘里其中有楊嶴正嶴姚嶴三峽潭漁嶴塘洋墩等處皆寬平如砥約田三萬餘畝乃現在成田即可耕種者若聚族開墾尚可擴充五六萬畝總計墾田約可得十萬餘畝而土性肥饒又各嶴口有潮水浸灌成灘者尚可煎鹽且此地外臨大海內近溫台太平等處實為海疆諸郡之屏障洋面往來之要區况有山可以瞭逺海盜不能掩其形有口可以防查洋匪難以濳其迹查各處水師聞有洋盜而不能即至救護者多緣海潮退時船不能出待至潮漲賊已逺揚總由內地口岸遙逺賊艘風帆迅速追獲維艱職此故耳若設兵此山由其黃坎二門出哨追賊則無遠莫能及之慮矣此玉環山之外內情形也從前督撫諸臣非不見及於此而究未議作何保安者一則恐外來認墾之徒姦良莫辨一則恐墾熟之日私米下海一則恐添設官員所費不資故也今臣等愚見現在浙省生齒日繁有人多地少之勢莫若以本省近地之民或有家室而願往者或雖無家室而有親族的保者皆由該地方官召募取結給照方準往墾到彼仍嚴行保甲連環編牌稽查窩隱其他閩廣無藉之人概不收録則姦良不難分晰矣至其所收米榖若慮出洋私賣亦有變通之法賦稅不徵條銀止令輸納租米所餘除留為食用外俱令由口岸汛地稟明給照止許往溫郡樂清太平地方運賣並將黃坎二門隘口設汛嚴防顆粒不許入海則私賣之弊可除矣至於添設文武經費之處臣等亦為熟籌查玉環山實海口門戶此處一設官兵則內地亦可以資藩籬其不甚衝要處所原額官兵不妨通融稍減就近酌量抽撥即有不足添亦無須過多文職須撥同知一員管理詞訟徴比糧租給散兵米省出內地米價亦可添餉再設巡檢一員以聽巡查差遣武職則調遊擊一員守僃水陸各一員千總四員把總八員兵丁八百名內將一半分防玉環山陸路隘口其餘一半分汛水師巡哨洋面除出汛大船於溫黃二鎮量為移撥外其哨船惟擇靈便式樣毋徒濶大耗費所需俸餉無甚增設再於山口開濬船路便於出入至其官署營房查取臨近深山樹木可以僃用惟工匠人夫飯食哨船等項俟果㝎添設之議確估所需若干或於關稅贏餘銀兩內動支應用諒不致有糜費之處此雖設官添兵不過調遣料理稍費人力原非大為更張臣等誠為籌固地方起見未識有當與否如蒙俞允另當分晰確估具題請旨謹此會摺先行奏聞伏乞皇上睿鑒施行謹奏興自然之利美事也安無藉之民善政也能如是方不愧封疆之寄汝之秉心立行原屬不凡勉之第聞汝因過勞吐血此則大謬嗣後慎勿復爾諸凡量力而為不可勉強若不謹遵諭旨即為違負朕恩目今天下督撫諸臣中朕所最關切者鄂爾泰田文鏡李衛三人耳勉之密之浙江巡撫臣李衛會同福浙總督臣髙其倬謹奏為敬陳湖屬三邑條糧情由恭候睿鑒事竊查浙省湖州府屬之歸烏德三縣條糧內有從前加派浮糧一事於臣李衛初到任時即據士民具呈請豫題減臣見事關額賦豈可市惠沽名即經批飭已非一次逮六月間督臣髙其倬赴任經由浙省亦據士民環籲臣等隨經面商留心密查未敢率請詎今八月初旬開期放告疊據紛紛呈稟不一而足閲其情詞大略僉云湖州一郡共轄一州六縣如安吉孝豐武康長興四州縣止共完條截銀一十六萬六百一十二兩零漕白南米止八萬一千八百四石零惟歸安烏程德清三縣田地山蕩畝數較安吉等四州縣甚少而條截銀則共有三十二萬九千三十五兩零漕白南米亦共有三十一萬五百一十石零輕重懸殊皆始於元末時三邑同江南蘇松地方為張士誠所據與故明相拒十年始平以致照依蘇松將條糧一體加重每畝田糧較之蘇松尚多釐合豐年輸納之外已餘無幾一遇旱潦手足無措艱苦已非一日今幸聖天子撫恤窮黎於南昌蘇松皆破格施仁各豫減輕獨歸烏德三邑同困浮糧蓋因地居浙西僻壤下情末由上逹今呈懇代題請減內如條銀有關國帑白糧乃係上供南米又屬兵餉不敢遽為懇請若漕糧一項雖係解京僃儲而太倉陳積似未必藉此三邑浮糧以為盈絀止求援順治十一年減徴袁州浮額係照鄰邑新喻縣上則田徵收之例今歸烏德三邑漕糧亦懇照同府鄰邑長興縣上則田漕米輸納除白糧灰石孤貧等糧之外原共漕米二十三萬石零今儻得減去漕糧約八九萬石則三縣糧米不特民力咸舒正課易納且可修造糧艘百十餘隻之錢糧又可省每年百十餘船之負重行月等銀每船七十一兩零又行月等米每船六十三石暨蘆席楞木等項俱可節減充餉再其中漕截銀兩一項亦始於從前津帖里長解銀潤濕之需今每百石現徵銀三十四兩七錢原係給軍運米之項今正米若蒙恩減此宗給軍截銀並請隨漕減免則億兆蒼生咸沾雨露等情前來臣等以久定賦額不敢遽請雖屢經批飭緣輿情激切又不敢為之壅抑謹密以奏聞倘蒙俞允恩綸特沛庶一方黎赤均得仰戴堯天普被生成矣或另須具本題請伏候聖主批諭或以漕糧重務不應輕議統求聖恩訓示為此合詞具奏伏乞皇上睿鑒施行謹奏朕因一二惡逆之徒背負國家欲將浙人積習痛加懲戒前經頒降嚴諭目下豈便特沛殊恩此浮糧一事係朕所稔悉者浙江巡撫臣李衛謹奏為報明臣前任經手錫厰變價歸清事竊臣向在滇省接管箇舊厰收有原存課錫並追出虧欠及臣新收錫斤奏銷報部行令即著變價交庫因勒限嚴切邊省無富商大賈一時難以變完當經詳明雲南督撫題請委官發給鹽務贏餘銀兩作為水旱腳費運至杭州等處將新舊錫斤變價歸還原項如有多餘以充公用等因部覆奉旨準行在案於臣未離滇省之前俱已陸續發運在路今於本年六月間有原委押運之建水州吏目張元燦到杭帶錫九十七票零臣即面詢其雲南押運巡檢周國忠所領錫斤據稱因路過廣西南寧府等處見有微利隨時賣完將課項解回嗣又接到雲南署藩司江芑寄覆臣信彼處已經收明錫課銀一萬六千七百一十六兩零交貯藩庫訖而吏目張元燦所運者因見南寧不能多銷仍解來杭不意被桂林府知府王沛聞驗明牌文仍復掯勒月餘硬將官錫留下一萬二千五百七斤零抵作土稅銀七百三十五兩零方準放過故此稽遲今始到浙等語臣隨行司飭縣分發各行照時價變課至十月終俱已售完現在陸續收獲暫行寄庫不日起解除一應傾銷折色并回滇沿路腳費又淨獲紋銀一萬四千七百九十一兩零以上二項共變課銀三萬一千五百八兩零除歸還原領厰課額定錫價本銀并應補借動鹽務贏餘腳費等項銀兩外實淨獲利銀七千五十一兩零相應奏明交與雲南藩庫充公但查廣西土稅彼時未必愆此外尚有臣在雲南交盤錫務時因有厰戶缺本誤課曽陸續接濟工本候煎出照時還錫存貯乘貴變價不無餘利并臨行所收票稅及聚零合總除正項及加增銀兩俱經交明接辦之員仍有前項額外多出臣應得羡餘未帶銀三千一百六十兩零因正錫發運杭州是以將此宗銀兩當經用印文移交糧道厰庫存貯即於咨文內聲明俟錫課變完之日再為統算故未歸於臣司道兩任贏餘項下造報隨經稟明督撫諸臣訖今正課餘銀俱已全清臣當移行雲南將前項銀兩並存藩庫歸公此外仍有江芑接受厰務時將臣已收錫磈折銀二百一十一兩有竒錯算撥去雖屬無幾皆係錫厰所餘者以上四項共該多出銀一萬一千一百五十七兩零相應一併充餉除行文雲南聽候奏銷造册報部緣係臣經手未了之事故雖離滇省又在浙江辦完不得不分晰奏明更有異聞者臣向在滇省查出原任雲南永平縣卓異令馮慶長從前承辦軍需將所存草豆賣價瓜分一事當經詳明督撫咨行山東馮慶長本任追還於臣起身後該員己在東撫請咨差役如數解銀到滇不意督臣楊名時以慶長係伊薦舉門生遂改變前案不令交庫後知衆論未服方趕回解役止將一半收貯其餘之銀仍行給還置錢糧於不問又同臬司江芑各出現銀數千兩代己參順寧府范溥包賠本任內虧空倉榖等項共銀一萬有竒則錢局通同花用數萬之多必非無因撫専政而江芑稽查出入者獨可於參後置之不問乎似應亦照樣著落一併分賠以為朋比徇庇奏伏乞皇上睿鑒施行謹奏具此一派真誠洵可謂同心合德之封疆大臣也朕不勝嘉許而兼慶幸惟務慎密為要雍正四年十二月初二日浙江巡撫臣李衛謹奏為恭謝天恩呈繳御批事雍正四年十一月二十九日臣前差進摺把總齎捧皇上恩賞哈密瓜一圓并欽奉御批臣原奏摺匣到杭臣隨出郭跪迎至署恭設香案敬謹開讀望闕叩頭謝恩訖伏念臣荷蒙皇上洪恩頒賞稠疊感激難名兹當長至良辰普天忭舞適奉珍竒寵錫舉室歡騰聖主之宸眷愈隆微臣之惶愧愈甚報稱非易夙夜難安又浙省分年帶徵紅白折色二事臣仰體皇上恤民至意冒昧具摺奏請聖示荷蒙特旨俞允沛澤自天沾恩率土跪讀之下頂戴實深在臣原摺未回之先己於本月二十三日接準部文隨即飛行各屬作速欽遵料理一面出示遍行曉諭宣布皇上格外深仁萬民交感歡聲如雷已據近省郡縣士民赴臣衙門呈請代題謝悃其逺處亦皆紛紛具詳現俟彚齊具疏以伸億萬輿情抑臣更有懇者杭州將軍鄂密逹已經赴京陛見但省會緊要各旗官兵人等近遵約束頗守紀律仰祈皇上早令回浙俾得彈壓整頓則地方寧謐更沐天恩靡既矣所有奉到硃批奏摺理合恭繳謹奏盡心奉職之人同城共事焉有不彼此相惜之理鄂密逹於駐防武臣中論實一好將軍汝今奏伊約束旗兵之長伊在朕前極口讚服汝之勤敏亦出公誠朕覽之甚為欣悅如此方是同日又奏為奏聞事竊照浙江山海錯壤民俗刁薄久在聖主洞鑒之中臣到任將及一載留心察訪謹將所得大概奏陳聖覽臣於未到浙江之前初以為紹興府屬刁惡甲於天下次則杭嘉湖也今細加體察乃知竟有不盡然者如紹興一府所屬各縣人民凡有點才能事之輩多不肯安居本籍俱遠出在外其在本地土著大抵無他技能故紹屬刁風逺不及於嘉湖至於杭州府所屬惟省城海寧二處人情輕浮好事健訟不安本分懸虛掉謊刻薄妄誕而省會五方雜處姦良不一然俗稱杭城人名曰阿呆即欲為惡有始無終其性畏法而不懷德故雖屬澆漓尚易懲治此外屬縣竟有淳朴鄉愚怕事者乃杭紹二府屬之情形也其嘉湖所屬除安吉州孝豐武康二縣稍可其餘則皆習尚囂凌人心刁詐貪利忘義打降生事窩盜為匪更多刀筆自雄動輒駕虛誣告變幻百出不能枚舉實屬難治之區其次則金華府地方多係山蠻冥頑村野每有鳴鑼聚衆健訟好鬭之事亦屬難化再其次則寧波溫台三府地當濵海閩人雜居而處州在萬山之內此四處所屬刁風亦盛姦匪易藏然其中淳頑不等間有山僻之縣民情強悍健訟而村朴無能安分自守者居多若得好官仍可整頓惟嚴衢二府所使者斷不肯説出願甘受刑死而無悔即或發覺訪拏到官皆不敢告訐其惡恐過後復仇之故耳此輩非劣襟即革蠧或土棍稍能識字好事之人種種不一惟武舉武生更甚臣自抵任以來每於此處留心察查令各府州縣凡有審虛之事必按律反坐並訪其扛幫訟師不許漏網至鳴鑼傳單聚衆者斷不輕恕近來逢臣放告之期僅有詞狀數十紙較之今春動則數百已少幾倍矣其各衙門書辦舞弊作姦更甚於六部第一是藩司衙門南新關嘉湖二府屬及各衛所皆敢於有為睯不畏死之徒其次則臬司糧鹽二道北新關金華府屬弊竇亦甚至臣巡撫鹽政兩衙門並寧溫二道以下各府州縣書辦均能作弊尚畏重法最可恨者錢糧數目從不肯清楚有意致成牽混糢糊偷藏簿册以便就中侵蝕將多改少暗中朋分上下連結交相朦混但凡知縣才短智昏者罷官之日必至作成虧空甚則盈千纍萬不但上司不知其故即本人亦俯首認罪而莫能自解更可駭異者於佟吉圖將解任之前有一領憑吏目係紹興山隂人佘尚志被藩司書辦苛索不已致令自盡查根擒不日解浙歸案審題目下海面頗靜今近嵗暮臣等仍當同心協力彼此加意防範務期寧謐不敢上厪皇上發回浙省辦事使臣得收指臂之效感荷天恩無涯矣謹奏覽硃批諭旨卷一百七十四之二欽定四庫全書硃批諭旨卷一百七十四之三硃批李衛奏摺雍正五年正月十七日浙江巡撫臣李衛謹奏為奏聞冬月雨水情形事欽惟我皇上聖德感召至誠格天舉行耕藉嘉榖昭休禱雨祈晴捷如響應又欲天下督撫盡能仰體聖心子惠元元撫綏憫恤之至意故令禮部頒示上諭各省旱潦之事朕皆視同一體原無彼此之别惟是地方相隔路逺彼地偶有水旱有司未必即行具報及至奏達朕前而緊急之時已過是以朕無從盡其誠心為之祈禱此其責則全在本省督撫矣督撫受朕委任之重為朕養育萬民必視百姓之疾苦如痛癢之在己身一遇水旱飢饉必思所以致此之由或因本省之政事吏治有闕即思速為改易之或因本地之人心風俗不端即思速為化導之兢兢業業修省祈禱竭誠盡心一如朕之朝乾夕惕斷無不可以挽回天意者欽此臣自跪誦諭旨夙夜警惕思維雖自知愚蒙何敢妄希挽回天意然不敢不竭誠盡敬身體力行以期仰副宸衷乃邇來祈禱之事既竭其誠而感應之方尚未盡驗敢不早為奏明如杭州之錢塘江歷來潮信自夏而起九月漸平江岸向有沙洲一帶可以蔽急濤而護船艘逮後潮水十月不息波濤愈猛沙洲無存已十餘年矣每以江船傾覆為患臣知之不勝憂心乃於十月間虔誠設祭告祝江神潮浪隨息而許久不見之沙洲今己復長從此商渡各船可賴以無恙又如杭城民患莫過火災臣深為設防時加修省凡祈禳鬼神勸導澆俗以及風水形勢之相關廟宇天意除去秋雨多已經奏聞自入冬以來隂晦數倍於晴㿩臣仰體聖諭痛自切責極力體察惟恐刑獄有失竊為寧寬毋更為可慮現值漕糧開兊之期前蒙皇上洪恩允令紅白兼收尖團並納百姓羣皆感激踴躍輸將奈潮濕難免收兊維艱本年幸有閏月不致回空稽誤而過淮難副限期俟開印後臣再另為酌量具題外伏念地方雨水過多祈求不能盡驗此皆臣智短德薄無以感格或浙屬人心澆漓風俗刁頑所聞伏祈睿鑒臣不勝惶悚待罪之至謹奏覽同日又奏為恭謝天恩屢沛並繳硃批奏摺事竊臣於嵗前十二月初十日遵鹺務成例在嘉興府公所掣鹽接到杭州將軍鄂密達會同臣差千總張永勝等回浙齎有御賜臣風羊哈密瓜即於嘉興公所跪迎叩頭祇受訖又於本年正月初一日臣齎摺承差回浙恭捧皇恩頒賜御書福字並克食貂皮荷包風羊到臣臣隨郊迎至署恭設香案望闕叩頭領受似此千載難逢之殊恩臣乃於一月之內兩邀寵錫榮幸無加更跪讀硃批溫旨聞汝因過勞吐血此則大謬嗣後慎勿復爾諸凡量力而為不可勉強若不謹遵諭旨即為違負朕恩欽此伏念一介微臣上厪宸衷憐惜至此自問懷慚不覺感切淚流但臣前在文火盛别無他疾今聞命自天敢不遵旨自惜仰體聖懷以圖報稱萬一謹將感戀愚悃具摺奏謝所有奉到硃批奏摺理合一併恭繳謹奏覽同日又奏為請旨遵行事竊臣查得浙省上年奉文成造天津戰船一案原準工部咨文內止開行令各該督撫作速造完并將船上所用柁碇篷桅繩索以及一切器具等項製辦齊僃雇募熟悉頭柁水手駕送天津至於部內所有應僃物件該撫速行分晰報部以便預先按數製造等因臣遵照部文將洋面折創駕駛所用防護之鳥鎗火藥器械製齊造册送部其各船到天津後應用之炮位旗幟軍火器械開明數目另行造册咨部聽候置辦在案因前署督臣宜兆熊題報疏內不將已僃未僃之處聲名誤稱旗幟炮位俱已製辦齊全等語以致工部復錯認為己經製造者行令趕送天津旋又準工部咨文仍照原題停止製造是以浙省此項炮位未經開鑄今聞江南現在趲造炮位軍械等物仍欲送赴天津則浙省似應一例而行但浙江鐵匠鑄炮俱用木炭無石炭可購工費倍於他省今欲開爐鑄造趕送天津恐錢糧不無多費且必俟夏至後南風盛發時方可起運况海內運炮必派撥辨兵護送方免踈虞若由內河則沉重之物腳費更巨似不若仍於部內製僃則既有石炭可用工費較省而就近運送又可早得應用臣緣節省錢糧因時籌度起見非敢推諉是以僃情奏明應否停止鑄送之處伏候皇上聖鑒倘需各省鑄造仰懇指示臣即當欽遵趕辦為此謹奏大學士富寧安張廷玉議奏同日又奏為奏明乘時發運閩榖事竊臣前準部文著截留漕米十萬石以米易榖聽閩省取運以僃儲蓄臣因籌計時日若候徵足漕米再為易榖必致遲誤當經具奏請將浙省採買預僃榖二十萬石先為運閩俟徵收漕米十萬石存浙以僃青黃不接時平糶荷蒙特旨著照該撫所請行欽此到臣隨即遵旨辦理因運榖至二十萬石海船需用甚多非可一起齊發且此項買僃榖石內杭嘉湖三府去嵗雨多榖濕俱係别處購買陸續運杭應作第二起發閩先將寧台溫紹金衢嚴處八府所買新收好榖十萬石撥為第一起皆由小河運至海口等候閩省領運之員到浙雇僃大船由內洋裝運俱經星飛咨會福建督臣髙其倬去後又因屢接髙其倬來文手札皆云閩省除此項榖石外尚在需米甚殷并令溫處道王斂福另為多買一二萬石臣於嵗前已設法飭令王斂福辦妥今正月十三日督臣已差員解價到浙還項臣即令來員先領額外所買米榖星即押往並派撥員辨協同料理起運外其原額內第一起撥運之寧台等八府榖十萬石閩省領運人員因路遠尚未到浙但此十萬石之榖已先於嵗內運到海口小船不能久待且杭嘉湖三府之榖仍有十萬石新春亦將陸續運杭不但壅擠一時島嶼難以停泊仍恐立春以後漸有南風不無阻滯波濤之險臣再四思維不敢借等候閩員領運之名以卸干係先為雇僃民船裝載運閩復移咨沿海三鎮揀選功加千把分押船隻再各派守僃督運俱發給口糧令其送往福建并委杭協副將李燦將一應船隻轉運事宜總統料理遣發再查各汛戰船目今現在撤巡期內不出大哨臣咨商署提臣張溥亦暫為派撥分裝起運既可防護民船更可借此熟悉海道并得探認洋面情形似屬兩有裨益但臣理應候督臣咨會辦理今未等福建差官到浙即行發運者誠恐遲則有誤不得不任此責成除已經陸續發運外謹具摺奏明再洋內盜首陳尾已據督臣拏獲將賊衆分為三起俱解來杭發審另題合併聲明謹奏覽奏可謂敏於趨事且辦理亦屬妥協朕深為慰悅同日又奏為恭請睿鑒事竊有湖州府長興縣知縣白環前因獲賊周宗朝不行收禁一案照例附參已準部議革職行文到臣何敢再為瀆陳但該員居官謹飭辦事勤慎於長興一邑人地頗屬相宜且就其本案處分一事亦係拏獲竊賊因封印未及審明是以暫不收禁逮該犯殺傷看守之人濳逃仍係該令白環拏獲尚係因公罣誤情有可原除遵令離任其員缺已經另行委署外可否仍帶所革之職留任抑或僃用候補之處出自皇恩再有紹興府會稽縣知縣張我觀因誤為朦混過繼捐官之潘景儀出結理應革職又於雍正四年八月十三日該員因救火倉忙致令監犯林琛等七名越獄曽經臣題參勒緝在案但當經陸續拏獲盜犯林琛等六名止少李七一名未獲尚有八箇月限期現在勒緝本不敢再請姑留緣浙省熟練舊員甚少該縣張我觀雖年過六十精力尚健慎重錢糧而辦理海塘能任辛苦凡臣所交辦之事皆無遺誤除業經奉文離任員缺亦已另行委署訖因其人尚屬可惜故敢一并瀆請可否令其待罪僃用臣未敢擅便懇乞聖明睿鑒施行謹奏俱照所請諭部矣同日又奏為奏聞事竊臣於本年正月十六日據嘉興府平湖縣知縣城者隨即率領典史逐家曉諭安慰民心已定俱各安業等因到臣臣思此事皆由逆惡汪景祺向曽僑寓平湖城內該縣百姓見其肆行悖逆人人切齒痛恨深抱互鄉之耻遂有無賴刁民造作訛言煽惑愚人希圖乘其倉惶之時攫取財物等項所致一經該縣曉諭即已安堵如故臣聞稟隨星夜出示飛行宣布皇上蠲恤緩徴愛民保赤德意并指明汪景祺大逆不道尚蒙皇恩止於一身伏誅親子兄弟得免駢斬族黨親友不株一人豈有僑寓之鄉獨行加罪之事况於停止浙人鄉會試一案上諭內現奉恩旨百姓皆吾赤子地方如有水旱之事朕仍加恩賑恤欽此仰見皇上聖明於爾等百姓極其愛養爾民各當安心循理恐因二逆鄉里接壤愚民或有驚畏亦密飭各地方官留心預為防範察拏訛傳棍徒懲治各去後附摺奏聞再臣因浙江連有查嗣庭汪景祺悖逆凶頑為天地所不容古今所罕有誠恐浙民平素刁詐驚疑畏懼刻刻預為安頓并一面密訪輿論人情皆知二逆罪大惡極但有恐懼畏纍之心並無纎毫不服之意即現奉停止鄉會而人心惟皆痛恨二逆造孽深重别無怨言曽據紳襟士庶屢次向臣哀籲具呈其大槩僉云欲求皇上將查嗣庭發至浙江凌遲示衆以快人心而舒公憤恩赦浙江復準開科等語臣因已奉明旨無微不照何敢沽名市惠將其呈詞槩不接受仍以好言開導習俗之頽靡宣布聖恩之寬大伊等實有感泣出於誠心者可見查嗣庭罪惡已彰著於天下即浙人素為舊染所汚亦自天良不昧衆口同聲絶無異詞伏乞皇上速賜乾斷將逆惡查嗣庭早置重典明正國法完結此案不但浙省人心俱安普天咸為稱快奏覽雍正五年二月十七日浙江巡撫臣李衛謹奏為奏聞雨水情形事竊臣前因浙省自去冬以及本年正月上旬雨多晴少祈求不應日夕倣徨細思浙地二逆並生人心陷溺獲罪於天非泛常祈禱所能挽回是以洗心積誠於正月十五日虔具摺稿十六日繕寫十七日差員齎奏懇求聖鑒指示愚昧自十五日下午即有霽色及十七日拜發後雖又有隂雨今幸交驚蟄節氣十五日已見晴明從此春和日暖隂雨自稀蠶桑可期先此奏聞上慰聖懷再臣去年奏明動銀十萬兩外給腳費差員赴四川買米預僃浙閩米貴平糶之需今二月初旬接到委員來稟已於重慶府購買足數共有十萬餘石分為二幫開行頭幫已過漢口而來川江止損小船二隻失米僅數百石餘皆安穩次幫亦隨後接續前進此始得登場目今赴買猶可趕及但恐夏秋川河水發險汛難防統俟今嵗秋初再當酌量請旨多為預僃則浙閩二省民食均有藉賴矣合併奏聞謹奏覽同日又奏為奏謝天恩恭繳御批事雍正五年正月十八日臣所差進摺把總齎捧皇上恩賞克食風羊並欽奉御批臣原奏摺匣到杭隨即郊迎至署恭設香案望闕叩頭謝恩祗領伏思臣屢荷殊恩頻加頒賜寵榮逾分感戴難名及跪誦天語以臣愚昧魯直過蒙奬勵已屬愧悚難安又為臣身矜憐體恤無微不至即如臣上年偶爾失血旋即平復遂致上厪宸衷奉有溫旨臣已祗領欽遵今又復蒙恩諭告戒叮嚀疏賤微軀何足顧惜乃至上勞睿慮如此其極豈臣分誼所敢承當至臣報效心虔設施才短即奉公執法不辭勞怨亦職所當然皇上鑒臣愚忱憫臣孤立諭以不忍臣一人任勞任怨頒旨振刷又設觀風整俗使以省臣一半之力臣自問何人得邀隆恩優渥至此正在繕摺奏謝間適觀風整俗使臣王國棟於二月初一日到任杭州將軍臣鄂密逹於二月初三日回任臣兩次叩請聖安二臣先後宣示大事務無一商議就正之人且山海交錯公務繁多恐精力不能遍及今蒙聖訓虛公和衷凡事參酌共為襄理以期克副皇上矜惜微臣之至意又蒙復設杭嘉湖道為臣增臂指之用且睿鑒已悉該道徐鼎係臣姊夫仍令同事一方不為統恭謝天恩並將奉到御批奏摺一同呈繳謹奏覽同日又奏為奏明事竊照浙江錢糧南米總滙藩司從前牽混不清臣故於上年初到任時先將大概奏明次第料理今歷年舊欠已經查明數目具奏設法分年追徴奉旨恩允欽遵在案其各役侵蝕包納飛灑等弊現在嚴查實難一時盡除容臣協同司府漸加整頓而南米一項係各縣徵解省倉支給滿漢官兵俸米織造匠糧等用者其中浮收重耗侵蝕分肥百弊叢生與京八倉無異於康熙五十九年前升任撫臣朱軾查革陋規酌定官耗委令杭州府知府管理支放其弊稍清及朱軾升任之後仍有藩司吏役勾通旗下包攬折收需索陋例相沿不已臣到任後雖鋭意剔除但相隔藩司一層衙門事非親手而前司佟吉圖又諸凡聽從吏役主持不能著實釐剔今新藩司許容雖到任未久重大事務尚未見其措施先觀其於細微諸務稽察甚嚴較臣似整飭以除錮弊俟其作何料理果否妥協再為奏睿鑒精明特賜調補從此緊要員缺可以得人惟新任仁和縣知縣紀逯宜過於拘謹與仁和繁劇之地甚不相宜臣查命往浙江候補各官內奉旨朱永齡人去得著該撫試看欽此查朱永齡人果誠實勤慎可以辦理要務因仁和縣事務繁雜恐非北人所習此外如桐廬縣知縣張坦熊前臣保送引見奉旨著回原任交與巡撫李衛遇緊要州縣缺出題補欽此今玉環山開墾一事較之仁和地方現在又覺緊要臣已委令張坦熊前往清查各務所有仁和敢保送伊雖係張坦麟之弟然臣於皇上用人大事從不敢存一毫私心稍有所徇如雲南路南州知州張坦驄乃坦麟胞弟居官忠厚不能有為浙江金華府知府張坦讓亦坦麟堂兄辦事雖勤官聲操守皆屬稍平均係臣之屬員曽於計典據實填報從無絲毫假借此臣一點朴誠諒已俗惡習奉旨交臣與觀風整俗使王國棟會同查禁臣細觀沈近思所奏十款切要詳明且係夲地人深中浙江積弊臣遵將聖諭及條奏各款刋刻出示曉諭又恐大字告示紙幅甚長鄉村僻隘之處無地張貼小民不能遍悉復皇上化民成俗之至意現在俱與使臣王國棟會同商酌竭力遵行合併附摺奏聞謹奏覽同日又奏為奏聞出洋商船情由事竊查各省往外洋貿易商船自康熙五十六年聖祖仁皇帝因西南洋吕宋噶喇叭等處地方多聚漢人是以定例內地商船止許往東洋貿易將東洋來船禁止其西南洋各國聽其自來不許往販違者以透越治罪彼時各船俱止往東洋其海道不必經由閩廣洋面若有往南透越者止須於南澳海壇等處要口截住查拿甚易及五十七年前任兩廣督臣楊琳奏準商船許往安南貿易遂有以往販安南為名填照出口者經由南澳海壇亦不便阻留即回棹之後驗其所帶貨物有係西南洋所産者俱稱自安南轉買而來或有稱在洋被風飄至西南洋島嶴帶回者緣安南既非禁地而風飄亦海洋常有之事得以借此支飾但查安南小國用貨無多從前粵省來文亦稱彼國每年交易不過四五船而止豈能收買各省多船貨物且暹羅與安南連界即在禁例之內商船一出外洋茫茫大海任其所之既不能跟隨蹤迹焉保其不駛往别洋及至回棹收口之處又止能查其坐回是否原船人數是否符合并有無夾帶違禁軍火炮械而其船之實往何處買賣並無憑據可查此各省商船不能無透越禁洋之實情也臣早為留心因出洋之船未回不能深知今細查江浙福建之船大槩相同雖厯來亦自相安别無事端但臣既已本朝屬國彼處夷官亦有篆文印信若行文彼國凡內地商船果販貨到彼發賣完日取具安南國夷官印結填明到彼及回棹日期回繳查銷如無印結者即行究罪似亦可杜前弊但恐安南不曉禮法遵行不善致生事端抑或以原屬買賣貨物現無别項干係仍行照舊之處伏候皇上睿鑒批示遵行謹奏商船貿易非朝伊夕自應照舊為是目下髙其倬具有開洋之奏現交廷臣議覆同日又奏為奏明事竊臣荷蒙皇上殊恩升授浙江巡撫自到任以來聞從前原有各項養廉舊規後經節次盡行裁去其各省督撫現在皆有耗羡獨浙江實無此例即隨丁糧六十分為管軍務養壯丁操演賞兵之需者亦經前官久已全革臣到浙江除止留家人舊有些須門包外其吃食口糧俱係原籍裝運凡一切日用盤費及兩衙門幕賓修金皆臣自僃年共約費八千餘兩非敢刻意矯亷實巡撫衙門一無所有自接到部文復蒙聖恩著臣兼理鹽政查從前舊規甚巨自噶爾泰奏明歸公之後原留鹽臣衙門每年各項經費銀一萬三千一百二十兩又經前任謝賜履摺奏裁減止留首接承差銀四千八百兩為本身用度又存給衆家人飯食銀六百四十兩報部在案臣今有此項並無出處何敢以瑣事上瀆天聽緣臣前在司道任內俱經將陋規出息奏聞今到浙一載有無養廉辦公之處亦應據實直陳再查浙省各屬州縣厯來耗羡錢糧多者自四五六納不過九八九色斷不肯足紋其鹽課鈔稅成色更低若本地開銷則可一遇解京需用元寶各員必將耗羡代為包賠從前尚有所餘為地方官養廉辦公用度者自石文焯奏請提取各屬耗羡銀二分五釐為錢糧解部飯食短平之用外一切解新任藩司許容每向臣講説無項可辦公事將來有誤如何使得若不早為設法則臨時必致拮據聞容臣與該司從長計議將每年應辦公事賠貼若干將各項開出及作何設法預僃再同該司定議具摺請旨為此謹奏浙省之難以措置曽經朱軾僃悉奏陳朕所以知之最切日前佟吉圗竟有加耗之請朕痛加責飭以批諭之諒伊未敢舉發兹汝與許容將闔省出納之數通盤計算詳細斟酌作何設法方足僃用盡心商籌一番務得其宜具奏以聞但能與情理協順朕何靳而不允行耶燈下率筆書諭硃批諭旨卷一百七十四之三欽定四庫全書硃批諭旨卷一百七十四之四硃批李衛奏摺雍正五年三月二十四日浙江巡撫臣李衛謹奏為覆奏事竊臣欽奉恩旨先動帑銀四萬兩會同將軍臣鄂密達觀風整俗使臣王國棟查修杭嘉湖三府城垣河道堤岸使窮民得以傭工食力為糴米之資巳將臣等三路分查并臣往江蘇會商事畢回署各日期先後題明在案今臣等公同查議蒙皇上特沛洪恩原為杭嘉湖三府上年被水窮民艱食設法拯濟自應分别緩急就人民衆多工程緊要之處興修庶錢糧不致糜費災民實有裨益時屆三月下旬恐遲則蠶農兩忙現在飭行各處發米平糶先將杭嘉湖三府郡城及石門等縣城垣星飛辦料修葺令窮民赴工計日給價贍養家口此之處或城垣堅固者暫緩以俟後圖其各處河道堤岸臣勘得湖州之太湖乃三府諸水所滙歸從前修建堤閘今多圯廢有應行復修之處臣鄂密達勘得嘉興一帶官塘為衝衢要道今有石塘坍損土塘低陷之所俱應修整培高使外水不能灌入以保農田其石門縣上下地方約有四十里淺塞天旱即乾亦當挑挖臣王國棟勘得杭州之東有河一百二十里達於海寧名曰上河原引西湖之水入灌民田今亦淤淺湖水不能存蓄海寧而下至黃灣地方一帶支河亦有應行疏濬者以上各府河道支河港汊甚多臣等雖經查明緊要處所應加開濬但冬春雨雪連綿水勢未落淺處亦深若此時築壩開濬恐妨灌溉且必多費工資況沿河民田目前現有春花將來即須插種河底淤收穫方可興工今先將應濬處所確勘明白庶臨期不致周章至於修繕城垣料物浙江原無堅厚城磚若開窰成造又稽時日俱就各地方所産選事繁不能遍及且恐胥役侵漁而浙省府佐又俱派解餉解銅買米押運各差間員無幾臣等酌議杭州城委杭州府孫國璽寧紹運副徐有緯嘉興把各數員分段管理并委杭嘉湖道徐鼎將嘉湖二府城工統理稽查其嘉興城垣遼濶又有石門等縣之工知府耳目難周臣等查有衢州府降調題外謹先覆奏上慰聖懷至臣前往蘇州靣會江蘇撫臣陳時夏暨欽差副都統臣李淑德等據諸臣言論江南承浙江諸府之水會流入海原有黃浦吳淞江劉河三大口其餘支流尚多而吳淞又歸并黃浦合流出口水口疏通則水急力大足以敵住海水不使泥沙隨潮倒灌故無泛濫之虞而得灌溉之益今吳淞湮塞全仗黃浦一股之水力弱不能相敵是以泥沙漸淤鹹水浸漬江浙六府水道不能暢流均關利害目今開濬吳淞最為要務又吳江長橋為太湖欽差諸臣酌議請旨外臣查江南蘇松常等府俱係水鄉幹河支流不計其數工程一興斷不能如江蘇撫臣陳時夏所請十餘萬金可以濟事必須預為籌僃足用方可臨時無誤合併陳明謹奏朕意工程浩繁所費不止此數而陳時夏亦因有開捐協助之請也同日又奏為恭繳硃批原摺事竊臣前差把總於二月二十六日回杭齎到臣所奏摺匣敬開跪讀之下蒙皇上逐件批諭明切使臣得以遵奉至雨水過多摺內更蒙下浙省積案將完命盜頗少刁風大息繁難之事較前稍有頭緒惟無知愚氓每好妄聽訛傳本月初旬臣與將軍臣鄂密達觀風整俗使臣王國棟分查河道前後公出先已遍為曉諭宣布皇仁軫念民生發帑興工愛養黎庶之聖心凡有知識無不感激鼓舞省城之內甚屬安堵於三月初七日有錢塘縣之安吉定南定北等鄉居民忽傳訛言云因向年有一知縣董天眷者曾到此鄉查賑不公被民毆打其時上司隱匿不究今伊子不知何名聞為御史奏請將此三鄉之民盡行處死以警頑梗等語適值學臣考棚買僃點名火把而將軍又從嘉興回省遂錯認為欲帶兵前往彼處愚民一時驚慌竟有連夜過江棄業躲避者江東一帶即蕭山縣龕山地方見錢塘鄉民有搬至彼地惟恐連纍亦復搬移而龕山對靣即係海寧亦聞訛言間有挈家躲去者當經營縣等官輕騎下鄉攔阻指示隨皆醒悟安定而桐廬縣地方亦有乞食流丏聞知此事至彼傳説希圖愚民驚走可以乘間竊取米穀亦經地方官立時查禁寧靜如故臣勘河道回省途中接稟即星速簡明出示曉諭開導所有搬移之人悉巳各回生業其紹興府城據副將汪虎山稟稱三月十二日因巡役拏獲數名興販私鹽之徒解縣收審跟隨間看為猜疑一騙即信是以臣到任至今所行禁令俱從大處有礙者明白開導使之易於遵守不作苛細推求致民輕犯而鄉愚無知猶有此等驚怖者聞所有奉到硃批奏摺理合一併恭繳謹奏覽雍正五年閏三月初一日浙江巡撫臣李衛謹奏為奏明浙省保甲社倉情形仰祈聖鑒事竊查浙省保甲如杭嘉湖三府人煙稠密户口繁多除紳襟有業商民餘多五方雜處時復遷徙莫定寧台溫處四府則山海交錯居址零星不能集成村落且有閩省流寓之人往來不一此又編察之所難定者至於紹興一府雖原有保甲其中尚有未妥每牌必有一二狡黠好事之徒巧借保甲名色遇事科斂聫絡公呈即匪類犯出亦必代辨稱為良民甚有搬移入甲者無論姦良惟飽其欲便可安插此一府屬頗有受保甲中棍徒之纍者雖屢經查拏尚難盡除其弊惟金衢嚴三府較之他郡尚屬易行但知縣一官職司通邑錢穀刑名多不能親身分往村鎮稽查未免假手吏役不無滋擾而知府所轄地方寬廣恐虛名無實故各屬亦曾有申覆遵奉者但以奉旨力行之事臣何敢僅憑一紙空文遽為輕信再社倉一項現今各屬雖亦報有捐輸者然寥寥無幾緣浙屬人情狡嗇止圖利巳而未肯輕破慳囊之故也且社倉之法只宜勸輸奬勵聽民自便難以刻責州縣計期奏功此又臣所惴惴於中而不能釋念者以上二事必期果有實績方不虛應故事臣現在籌畫設法分别辦理外近今河南撫臣田文鏡以民壯保甲捕務相為表裏請歸巡察官順道就近查考今浙省十一府跨亙千有餘里其中山陬海澨綿延曲折正慮臣一身未能遍歷前接準觀風整俗使臣王國棟移送謄黃內原有敕內開載不盡者宜盡心訪察設法舉行欽此現在該使臣周巡各屬清正和平辦事勤敏可否將保甲社倉及民壯之事亦請聖主恩賜飭令使臣順道就近查考較之臣窵居省會僅以案牘為憑者自倍加切實臣謹繕摺瀆陳仰祈睿鑒如果可行伏乞皇上敕部議覆抑或容臣恭疏具題統候皇上聖明指示遵奉施行謹奏社倉非使臣可查考之事即爾撫治其地為一省綱領亦只宜勸勉鼓舞不便繩之以法此事奏效原屬不易當年聖祖曾屢諭社倉萬難舉行第未及詳諭所以然之故耳朕踐阼後多有建言社倉之益者因欲試行自初至今巳歷數載深知其難不過留此一法為地方上有益無損之美政則可若勒令施行反成有損無益之敝政矣緩為之毋急爾密囑王國棟於巡歷所至順道勸諭猶或庶幾朕飭令使臣就近查考儻奉行者不善其流弊可勝道哉保甲民壯二事即具疏題請同日又奏為再請命發人員以僃委用事竊臣於去年八月內因浙省計典在即不無去取曾具摺懇請揀發記名候補府廳縣官十餘員來浙僃用巳蒙皇上前後命發候補同知馬日炳成泰升二員通判管斾寶善二員知縣周嘉梓石祕彭開宗李𢎞汧羅緒羅昱閻紹祖朱永齡楊維清陳誠陶起潛徐羲麟等共一十二員又以知縣縣丞酌用田仲璞萬際清王維恭朱簠魏大德等共五員俱陸續到浙除朱簠一員先經署理景寧縣今巳病故外餘俱次第委用俟察看各員果能稱職人地相宜再為題補實授否則調換試用現止剩有候補同知成泰升暫委署理寧波府同知押運之缺及通判管斾寶善二員分頭差往送漕過淮買米等事又知縣徐羲麟一員委令監糶并前署鄞縣印務甫經缷事之周嘉梓俱現在候委將次用完近又接準部文申成章補授海寧知縣袁皥以仁和等緊要縣缺題補此二員尚未抵浙查通省官員之內仍有才短忠厚不能勝任又有錢糧不清被吏役朦混者諸如此類恐致貽誤地方除行令司道等官分别查實或應參革或請改教另為具題又新放紹興府知府魏觀及台州府知府楊滙至今日久亦皆未到臣巳行文飛催赴任理事外此後漸無間員可供差委似應再為預請命發僃用知府二員知縣十餘員懇祈敕部即令速行赴浙庶繁劇之省不致乏人於地方有益臣更有請者浙江廢弛日久多係難治之區每見初任官員常有不能辦理者仰祈皇恩將巳經做過一任現在候補者或京官部屬曽見辦事明敏者於中揀發浙省方能獲有實濟臣不揣冒昧僃悉瀆陳伏乞皇上睿鑒施行謹奏候飭部揀選發來其魏觀楊滙遲到原由併令查奏但人材難得即揀發之員亦安保其必優總在爾等封疆大吏秉公體驗據實舉劾耳果能實力振刷一番不數年間將見官方整肅人皆可用之才矣治平之術惟在察吏餘無二法勉為之同日又奏為奏明藩庫新舊正署交盤巳清事本年三月二十六日據藩司許容詳送册結到臣查據前任佟吉圖經管一切正項錢糧出入數目俱巳盤查清楚並無虧缺出結請題外其一應雜款悉皆盤清不少內中惟有佟吉圖從前接受傅澤淵解部京餉挂兑銀一萬三千四百四十二兩零向雖詳有未經奉行停止以前欠解俸工追出可抵但歷年徵收無多又據許容詳稱於雍正二年分因題明發價買僃添補夏秋二季兵米六萬石不曽議有分拆耗米以致虧少四千八百餘石雖係詳明俟徵完民欠南米耗羡抵補前項放拆之數然非現存有米可比又王朝恩任內代諸暨永康二縣未完米四百三石有零於奏銷時揑報全完雖現有欠款接徵亦非巳經存倉之項又稱從前浙省奉文截留起運康熙六十年漕米部限巳逾因嘉興等縣尚有未完漕米八千餘石經傅澤淵詳明取具暫貯縣倉實收一靣勒追完解一靣先將經管省中永濟倉之船政同知並嘉松分司倉收以全完報部後曾徵出九百餘石復被參革知縣卞咸和花費無存經王朝恩改作地丁虧空報參後僅陸續追完五百三十餘石又嘉善縣未完米二千五百餘石被參革知縣彭憲祖虧空傅澤淵因報過全完難以參處遂將民欠地丁抵數以虧空揭報巳經追完米二千二百餘石以上二共虛懸尚未完米七百餘石雖於董永芠署事任內又續徵完米一百一十餘石其餘民欠恐難全完又於發價買銅解京項下佟吉圖扣回短給銀一千六百兩零不合作為巳之贏餘存庫仍應令其賠出追還等語臣查前項各歷任未清那移尾欠雖均有從前議抵之款但許容既稱非實在存貯者自應徹底完結始無諉缷之處前佟吉圖離任時曾詳報到臣有伊任內節省得餘銀二萬三千兩留充地方公用當經臣批該司經管正雜錢糧繁多必俟交盤清楚一應補足之後方可算為僃公多餘之項此際未便作準隨委仁和縣等眼同兑明存寄外庫緣佟吉圖匆匆進京不及詳開於何項名目節省餘出者臣久知其係於捐監項下及收發扣平並奏銷所餘等類除巳身用去所剩之數今將其所留銀內照依許容開報各條盡行撥完補足則佟吉圖以前各任正雜之項俱巳全清矣尚有餘銀三百九十兩零仍留存寄外庫連以上舊欠陸續追出一並留為地方公事之需所有藩庫新舊交盤各緣由僃悉具摺陳明謹奏此佟吉圖大姦大詐之舉也其所留之銀既足抵補各項欠缺自無枉罪之理雍正五年四月十一日浙江觀風整俗使臣王國棟會同浙江巡撫臣李衛謹奏為遵旨覆奏事竊臣王國棟在京欽奉皇上交發浙江改補教諭顧夔朱禾條奏摺二件命臣到浙江時會同巡撫李衛將摺內所奏是否應行有無裨益之處詳查覆奏欽此臣李衛隨移行凡有棚民各屬并溫州府及沿海水師各鎮協營確查詳議準據各咨詳覆前來該臣等會查得顧夔所奏稽察常山縣種麻棚民一事查棚民多係福建江西之人在各處山鄉租地搭棚居住墾作者皆以種麻種菁栽煙燒炭造紙張作香菰等務為業江閩兩省及浙之寧台溫處金衢嚴所屬共二十七縣皆有之不獨常山一縣也因其籍非土著往來不常從前亦設有稽察防範之法雍正二年今升大學士張廷玉條奏奉旨行查經前福建督臣滿保等會議以棚民之姦良責成於租地之山主工伴之好歹責成於招佃之墾户取結造册照保甲之例編查願入籍者一體當差巳回籍者不許復至等因會題部覆奉旨依議欽遵在案今顧蘷所奏設立棚長保甲填給姓名簿籍等事俱係部文現行條款毋庸另議臣等漫不經心既恐姦宄混雜倘苛求驚擾亦足激成推誠相待勿令生疑畏之心馭役務嚴毋使受需索之纍若有作姦犯科必當小懲大戒責令知府稍有因循以貽地方之憂也至朱禾所奏二事內請分永嘉縣治一條臣等會查得州縣若地廣賦繁知縣一身不能兼顧則分治有不得不然之勢今永嘉地方所轄止五十二都額徵錢糧止四萬有竒不特與江南大縣糧額一二十萬者相遠即浙省各縣中錢糧倍於永嘉者甚多且自康熙五十八年以前永嘉錢糧俱經奏銷全完近因知縣不得其人遞年釀成刁健之風致有挂欠變為難治之區是以上年特請調用改補在案若得好官振刷即可更改舊習況係溫州府附郭之縣尚有知府同城可以稽督而南溪西溪地止有一十四都額糧八千餘兩將此分設一縣殊多冗費現在此二鄉錢糧每年夏冬麥禾收穫之後知縣俱親往彼地徵收仍可辦理縣務若縣丞一官有解餉出差之事反不能常久在家近又題請佐二分管巡查地方則縣丞移駐之説更可毋庸置議者也又戰船停泊內港無人管理扛具應飭千把總頭舵人等常川在船看守一條臣等會查得海洋戰船皆就船隻大小配定水兵三四十名至十餘名不等內有捕盜什長舵工繚手斗手碇手炮手等項名色皆係分管船內器械扛具之人各有專司至出洋時則又按船之大小配坐戰兵自八十名至二十餘名不等皆在水兵額數之外巡滿回營則戰兵歸伍差操水兵仍留在船即有私自回家者亦必留存一半更番替換蓋海港潮汐不常時有風浪掀簸船內炮火器械又皆緊多有燂洗不勤之弊又篷索日曬雨淋易於朽壞營員無力修整每不堪用經前督臣滿保題明於朋馬銀內按年支給修換而不肖營官於此船丈尺俱比部册加長加濶乃係歷屆修造時每次增寬數寸積漸使然在文員則以丈尺加增工料費倍每執部册為辭在武官則以船身狹小配兵不多必以現船為據兩説相衡自以照依現船為長然亦有雖大而不適於用者蓋緣初造戰船之時海道尚未習慣船式每多笨重自開洋以來人與海習熟極生巧現今商船內有名為爛鼻頭及快哨等船式樣輕靈駕駛利便往來海洋更為得用今各營戰船內如水艍犁繒雙篷䑩等號大船原以壯軍威而出大洋僃用毋庸議外其沙唬哨船等項率皆平底布帆內洋創駛遲鈍外洋難經風浪若稍為變通於屆當拆造之時酌量更改式樣亦屬因時制宜之法但改造船式所費工料較前不能減少更須加增故未敢輕舉緣戰船事宜定例係總督衙門專政先經會商行司查議統俟福建督臣高其倬會核如有可行另再請旨交臣王國棟之原摺二件理合恭繳伏祈睿鑒施行謹奏覽浙江巡撫臣李衛謹奏為恭繳御批事竊臣前差進摺千總於四月初六日自京齎回臣所奏摺匣到杭敬開跪讀於臣奏覆監修城垣摺內欽奉御批朕特旨揀發與汝此數員知府今果何如欽此臣勤幹巳經附摺奏事內多錯誤不甚妥協者臣指出其受人欺蔽之處教以防間懲治之方若能從此䇿勵尚是可用至寧波府知府孫詔台州府知府楊滙紹興府知能熟悉此三員皆到任不久再當試看以定等差因奉旨詢及先以大槩覆奏至浙江近日訛言俱巳全息各處百姓悉皆安堵如故其為首造言之人臣嚴加查訪聞平湖縣有一戲子在松江地方聽有訛言奔回搬起隨飭府縣拏訊供出此言得於伊之妻父及拘獲到官又實係隨衆搬移並非倡首之人桐廬縣則係乞丐數人從省城而去傳播訛聞希圖乘人匆忙竊取米穀又省城曾拏獲一城隍山道士審明亦是轉聽傳言非實在為首者臣見訪聞之言仍有未確仰副皇上息事寧人之至意再通省春熟浙東之寧紹金衢嚴溫台處八府於閏三月初旬得有時雨麥俱豐收其種早禾之處巳經插秧惟杭嘉湖三府春雨過多低田豆麥所種無幾高阜處所有六七八分不等今年蠶種比往年較少桑葉甚賤蠶繭有七八分收成上年被水各縣蒙皇恩賑濟臣前因冬月民食尚可支撑請於今春蠶事之前散給今於三月望後委杭嘉湖道徐鼎督率各官親往各縣鄉村查明實在窮民逐户散賑以助養蠶口食又將截留漕米并買回四川之米撥運各處設厰分頭平糶值此青黃不接之際小民既得官米接濟而嘉湖等處城工正在興修即無力窮人又可傭工得錢為糴米之資萬姓歡呼莫不感頌皇上天高地厚之恩理合附摺奏硃批奏摺一併恭繳謹奏聞浙省風氣近有丕變景象朕甚欣悅浙俗雖云刁詐而不涉於獷悍且讀書講理之人居多向因習染所汚遂致流蕩忘返一覺即悟仍可復初革舊維新之效朕有厚望焉其勉力化導無或稍懈同日又奏為奏明浙省現在營伍情形仰祈睿鑒事竊臣荷蒙聖恩簡畀重任圖報無由每深悚惕所有地方武職營伍事宜雖係督提二臣專責但臣職銜開有提督軍務之任固不敢逞能以邀功亦不敢置身於局外今一年之內凡臣所經歷及耳目訪聞之處隨事留心略得梗概竊見浙江兵丁漢仗平常弓馬軟弱遠不及陜西而肯學技藝紀律整齊警敏相尚若棄短取長緩急猶為可用從前營中雖有空糧而近年公費之外虛冒尚少甲械雖不能處處充足亦不至於空虛朽敝操練雖不能無勤惰之分然不敢竟為廢弛就臣所見而論如江南係臣皇上特諭挑選陜西營兵一百名發往浙江教習將來事勤敏其感激聖恩實心報答之意出於至誠如請以提標右營改用經久臣於營務之事必與提臣商議而行提臣亦常有字來令臣參酌但提督大員兵馬是其統轄臣係同僚於其巳行之事不便再言惟有懇乞皇上於伊奏摺中再加開導使之善用其長漸次料理膽量俱好而操守行事平常今甫經到任未見設施黃巖鎮自昏憒之馮廷輔去任將來新鎮到後自必鑒戒前車另有振作此二鎮俱俟共事數月處但總兵四季出巡隨從人多山僻營縣往還伺聖明自有洞鑒臣謹將見聞所及據實具奏至於各營將領循分供職者居多今年軍政屆期聞伏祈睿鑒謹奏新授黃巖鎮董一隆向未悉其優劣於引見時觀其人甚巧黠才具不過中平因係閩籍自云熟諳水務故爾擢用今職近日訪聞品行頗屬不端居心詐偽善於逢迎云云於伊蒞任後其細加察訪密奏以聞同日又奏為覆旨事竊臣前摺附奏寧波府城坍損應修緣由奉有御批臣遵即行令布政使許容另為酌議款項設法興修理合先行覆奏再查海寧縣城亦多坍損南門之外數武即係大海潮水衝激不常設有浸灌更難堵禦查原任翰林院編修查嗣瑮係逆惡查嗣庭之兄上年奉旨拏解於王以言揭帖案內審據供出前為北直學院考過正定順德廣平大名四府即託病回籍雖稱止有田六百畝房屋四十間當本四千餘兩等語諒亦不止所供之數今該犯巳經解京其罪應聽部臣核擬從重歸結所有家産前因原係奉旨提拏未曾行令搜追看其光景雖無厚蓄重資或有隱藏之處况伊弟既犯滔天大罪若將查嗣瑮家題或即於奏明後奉行伏乞皇上批示欽遵為此謹奏覽雍正五年五月十一日浙江巡撫臣李衛謹奏為恭繳御批事雍正五年四月十三日臣所差齎摺材官自京捧回臣前奏摺匣到杭臣敬啓跪讀欽奉御批奏摺四件內社倉察吏二事蒙皇上指示明切誠為千古卓識治道要言帝典王謨無以踰此臣當終身服膺實力遵循不敢頃刻暫忘其僃辦地方公務一條現在另摺覆奏保甲民壯一事巳經繕疏具題所有原奉御批相應恭繳外浙省今年蠶麥收成前巳將大概情形奏明自閏三月以來雨水調勻各屬禾苗俱得及時栽種五月初旬係黃黴時候雨覺過多若再連下不止於别府無礙惟湖州地勢低窪插種恐有愆期幸下流河港開濬今年水勢消泄較前頗速若此後即得晴霽則豐收可遍於全省矣合併奏聞謹奏朕希冀上天惠賜大有之念今嵗倍切何以言之兹命直隸以至各省督撫及守令通行耕藉典禮當此創始之年儻能幸遂所願既可大啓愚蒙敬信之誠益足昭示天人感應之理據各省奏報春收景象頗稱豐稔畿甸目下雨水亦屬均調卿等當各秉精虔以俟秋成不過轉瞬間事耳同日又奏為奏明買回川米平糶情形事竊照浙省杭嘉湖三府地方因去冬今春雨水過多米價較往年稍昂現在青黃不接之時幸蒙恩準以臣分發買貯之穀抵運閩省將截留漕米十萬石分於各縣平糶正恐不敷今於閏三月內據前委四川買米之同知谷確等陸續運到買回之米計川省市斗共四萬七千一百餘石每一石較浙省倉斛合二石三斗有零除川河過灘損失之外實有浙斛米十萬五千三百餘石統算買價運費及攤補損失之數千石外每石止約價銀九錢五分零較之客商販浙之米每石巳賤至四五錢不等正值需米之際隨差人沿途知會分運湖州府各屬三萬六千石嘉興府各屬一萬八千石其餘俱運至省城當即查驗米色因途中多雨不無潮氣恐難一概久存隨斟酌將最乾燥者收倉其餘令各州縣分别兩項將一項於城鄉市鎮多設厰所委員分頭監看零星糶賣以一斗為率照時價每石多減數錢使窮民沾惠又恐厰所不能周遍住遠者未得均沾將一項減價發與鋪户亦令照所減之價量加折耗餘利轉賣使之周遍僻壤其貧窘士子令各教官領米少許於學內分糶乏食兵丁令各營員分給於月餉繳還一時士庶兵民莫不感頌皇恩歡呼載道臣查小民現在得食平價之米不覺艱苦若無此米接濟則民力竟難支持至平糶之價雖比時價減少而較之買運原費仍有多餘此時雖未糶完銷算大約一萬數千兩之贏餘可以溢出是此番買回川米實於浙省大有裨益惟是臣前摺內曾奉御批過多亦恐於川民有損欽此仰見聖慮周詳普天均邀覆載至意但臣平日深知四川産米頗多價值甚賤故斗斛之大倍於他省今雖買回浙斛十萬餘石而在川省僅算賣出四萬七千餘石細詢買米官員川民因見好銀照時平買咸皆踴躍止在重慶府一處自十一月十五日起至十二月初五日止二十日間即巳買足其於川省出産之米不至虧損可知然臣前巳題咨明白倘彼處米貴即以銀兩留貯川省藩庫俟價平再買必不致令因此高昂以病川民况浙省向日多藉江楚之米彼地原有從川省販來者今收稅銀惟管九江關之饒南九江道劉均不以臣與該省巡撫移文轉飭知照為準雖未濫收米稅然借稱船隻報料名色留住船户不肯放行除收去正稅銀一千五百四十九兩之外又百般掯勒買得於歲前運回則冬月米色乾燥可以收貯僃夏秋米價貴時之用不但為浙省百姓省數萬買米之銀且四川得銀完納錢糧而所動庫帑仍然現在則緩急可有儲僃百萬愚氓感戴高厚隆恩於無涯矣可否準行另為補題抑或奏明奉旨到日臣即遵行於七月初旬委官起身方屬妥便伏祈皇上睿鑒臣未敢擅專為此謹奏據奏七月初旬委官起程等語何須如是匆匆既動帑金二十萬則非去年試行可比仍止差委一二員路途窵遠照顧難周若選擇多員不特堪信託者難得其人且恐浙省未必有如許間官此重務也極宜愼始愼終勿因前舉就緒遂爾高興輕視設慮違踰時日何不先發四五萬金遴員前往餘俟該部議準然後陸續遣差亦不為遲朕謂此事數萬金以內料必妥協至二十萬之多難保其全美也愼為之毋忽同日又奏為據實直陳以僃聖明採擇事竊臣荷蒙恩命兼理鹽務因前任鹽臣謝賜履移交敕諭內開載坐名不同浙省又無撫臣兼理鹽政舊規可遵是以仍照鹽政從前成例咨詢都察院請示今準咨覆巳經議奏令將前任謝賜履敕印繳回用巡撫印信辦理鹽務奉旨依議欽此等因到臣隨經欽遵差員齎繳進京題報在案但臣伏讀原奉諭旨督撫敕諭內有無兼理鹽務字樣爾等查明應否頒給之處議奏欽此是皇上查議者止於敕議應否頒給而都察院遂將印信一併議繳似於錢糧衙門關係防範之處猶未為盡善臣愚昧之見竊謂鹽課錢糧各有奏銷考成鹺規場政各有經管職掌事務雖在一人兼辦案卷仍宜兩處分清則錢糧無混淆之弊者一也從前鹽臣雖不受督撫節制然私鹽犯案督撫並詳商竈弊端督撫稽察錢糧之出入政令之得失督撫衙門皆有案卷可考實於平行之內微寓牽制之權立法原有深意臣自在雲南以藩司仍管鹽驛道并今於浙江兼理鹽務俱不敢以事皆一身所辦遂改舊章凡其中有關係者仍然彼此衙門行文立案以僃日後稽察庶可防吏蠧朦漏之弊者一也各省引鹽多有行銷於鄰近外省地方非盡係一處督撫所轄若槩以撫印行文發票遙制隔屬誠恐鄉僻愚民不能遍將改用印信之故家喻户曉未免滋生事端且各處鹽法辦理多有不同之處如浙江鹽政衙門雖案牘不繁然除引目之外又有水程憲單隨衆商完課多寡領程分發運銷者更有常山單票以及厰鹽牙稅各種號記等類俱用鹽政小印鈐蓋為憑以别官私俾沿途關隘渡口塘汛查驗放行習於故常耳目不擾此官守無侵越之弊者一也况督撫關防有封疆地方重務干係而商賈肩販貿易皆藉以為憑體統頗覺有關每年春冬凡遇四所八次掣鹽之期連前項各件日須用印纍萬盈千糢糊甚易而浙江巡撫衙門諸務繁劇終日鈐印亦復不少空時尚可兼顧一遇壅擠實有並用不遑之狀更屬難於兼施仰惟皇上推誠布公因人任使惟期合宜今日管鹽之督撫自無所容其稍存私心上負聖恩然防微杜漸不可不周似宜各用本管印信使合而為一者仍可分而為二庶目前之職掌不淆將來之掩飾可杜矣臣愚陋寡識偶有所見不敢以憲臣既定之議輒行緘默緣係巳經覆準之事故爾不便於前題疏內聲明為此繕摺密奏是否有當伏乞聖鑒施行謹奏此事前經與廷臣講論巡撫兼辦鹺務不過一時權宜非同久遠歸併伊等議繳鹽政印信朕意原不深以為然兹爾奏請仍分為二洵屬有理但朕不便特諭其將情由僃悉聲明具疏題奏候另旨準行同日又奏為請旨事竊查杭州西湖上向有聖祖南巡時駐蹕行宫內貯當日鋪設玩器椅桌等物設有兵役守護並委寧紹分司掌管雍正三年七月間被賊踰墻進內竊去爐盤等物彼時懈於追緝賊未獲報及雍正四年十二月初二日據報又被賊踰墻竊去玉器等物臣不勝駭忿立傳地方文武官靣加嚴諭行宫重地豈容屢次失竊皆從前怠忽以致宵小覬覦此案若三日不能獲賊一併嚴參重處伊等恐懼上緊訪緝果於初四日即據杭協副將暨該府縣等共報緝獲賊犯徐大方大來併起出先後二次所失原物二十餘件前來隨加嚴訊徐大係開濬西湖之夫頭方大來與閩人李天福在伊名下充應小夫常進行宫做工熟識路徑故爾徐大起意偷竊其第一次係方大來李天福二人同竊變賣價值則與徐大三人均分至第二次因李天福巳經回閩乃係徐大方大來同竊其物變價無多埋於其家臣即發按察司追起原物併根究賣與之家著落查追還價今據搜獲埋藏及追回巳賣者所有兩次失去原物悉巳起獲並無缺少現在飛移閩省務拏李天福解浙併案究擬間臣查徐大等雖係當夫窮人但敢於重地肆竊至再情罪難寬若依律擬斷則既在郊外又係鋪設玩器僅可照盜官物滿貫分别首從絞流實不足以蔽辜又難擅用不便照律擬罪之語以違定例事關聖祖行宫重器更不敢輕冒具題竊思類如此等之事外省常有立即處死者但若輩未見明正典刑不知懼怕猶為易犯懲治盜賊法宜從嚴可否毋庸題達照福建督臣高其倬前在雲南任內處置魯魁皇上睿鑒指示欽遵謹奏朕為皇考駐蹕行宫一事曾經再四籌度尚未及宣發諭旨雍正五年六月二十七日浙江巡撫臣李衛謹奏為恭繳御批奏覆下悃事竊臣前差齎摺千總回浙捧到御批奏摺臣隨敬謹啓匣跪讀摺內欽奉御批事理除黃巖總兵董一隆臣亦聞其從前係平常題請外伏承諭旨以浙省風氣近有丕變景象上慰聖心命臣勉力化導查浙省民風素稱刁詐而習俗柔靡不至獷悍誠如聖明洞照復荷原任太平縣知縣張士驤衰老昏庸巳經缷事之後新署縣閻紹祖接受交盤時將倉穀量出一升拋於水中如有飄於浮靣不沉者即以虧空補揭百姓見其過刻共為不平情願零星公捐三五日內將算少之一二千石盡數代為補足又如嘉善縣素稱難治之區因該縣李天桂黴瀾漕米被參解任後衆民以該員到任未久緣天雨所致為地方受纍别無他故隨公同樂輸捐出米價銀二千現今通省錢糧完納頗好雖杭嘉湖所屬去歲被水九屬停徵此外較上年所完總數亦能多出且邇來命盜稍減詞訟漸少火災頓息海不揚波此皆我皇上過化存神之妙臣敢不仰遵聖諭竭力化導但一身不能周遍惟在府縣得有好官則臂指之用可收實效其知府如孫國璽唐紹祖閻堯熙魏觀孫詔楊滙等居官才力巳蒙御批逐一指示無不確當即現在諸府之中漸覺勤愼者不乏其人惟年來新任各縣內止有鄞縣楊懿奉化縣魏大德才堪辦事錢塘縣秦炌初到生疏今巳熟練且立心學好竟能稱職其餘勉力支持者多臣督率各屬盡心整頓昔日刁疲之邑目前頗有改觀惟仙居天台武義永康等縣本屬小邑而為前任不肖數官接踵因循錢糧纍欠事務廢者現遇缺出委署任事至部內分派試用之六員似有不及誠恐到任後未能辦理又多更換之煩使之熟悉民情練習吏事再加酌量委署又處州鎮總兵王安國四季巡警一事臣已遵旨與提臣石雲倬商酌只作臣等之意將應否兩次巡聖慮周詳思深計逺非臣淺見所能窺及又蒙皇上憐臣一身擔荷非輕特加鄉常逢皎日各得其宜目前浙東早稻現獲豐收浙西晚禾亦皆暢茂以皇上敬天勤民重農務本自有天人相應之理今歲年景可卜大有米價定然平減據現在情形自應因時變通不必膠執前議當遵旨於七月初旬先動銀五萬兩遴委的當幹員前赴湖廣彝陵州一接著川省客販之米照依民價糴買運回以省川江逺涉之險仍僃帶川湖二省咨文令其隨時斟酌若客米不甚相宜或仍往川採買擇便而行至此外應否再買且俟各府晚禾定凖將次告登之前量出米之多寡價值之貴賤如仍需用酌定動撥數目再為題請一靣動銀或往四川或往江楚或就本地惟視米穀有餘之處隨便採辦臣當悉心愼籌斷不敢輕率貽誤也至臣所奏偷竊行宫物件一事諭旨開示甚明現在遵睿鑒施行謹奏覽同日又奏為奏請聖鑒事竊查太湖界連江浙數縣地方水靣遼濶港漊錯雜素為兩省盜賊鹽梟出沒之所臣曾兩次親至其地巡查察閲實屬緊要之區現經督提二臣會臣具題請於大錢要口添設守僃一員并調撥各營兵丁增汛設防在案但此添設之守僃必得熟習地方材具敏幹之員方於防緝有益今查該營大錢口千總張雲煥在汛有年諳曉太湖各處情形臣巡查時見其年富力強弓馬可觀辦事勤謹委令緝拏匪賊實心察探歷次捕獲數名因福建督臣高其倬題請添設守僃時尚未將該員調考不曾親見其人是以於添設之守僃議請歸部銓補臣接準會稿隨將張雲煥熟練此地情形堪以勝任之處會商今準督臣覆稱巳經拜疏難以再為續題若俟議覆又恐銓補之員人地未得相宜聽臣就近奏請聖鑒等因臣為緊要汛口起見何敢推缷除一靣知會提臣石雲倬外理合具摺奏請如太湖營守僃準其添設可否即以張雲煥升補俾得駕輕就熟有益地方伏祈睿鑒倘蒙俞允再為送部引見臣未敢擅便為此冒昧具摺請旨謹奏候另有諭旨雍正五年八月二十二日浙江巡撫臣李衛謹奏為敬陳鹽政錮弊酌量疏銷緣由仰祈睿鑒指示事竊惟裕課莫如銷引江浙各縣有於額引之外可以多銷者有僅能行銷足額并銷不及半者甚有片引不銷者在民間無食淡之理若能於少銷不銷之處設法疏通則多銷之縣錢糧豈不充盈而歷來鹽臣非不樂為無奈恐干例議不敢據實陳明懇請融銷故將不銷之引移於多銷之地仍照原額造報是以錢糧不能贏餘多出而私鹽亦由此得以充斥也臣去年雖亦循舊例而行然日夜籌思所以杜私銷引之計未嘗不以稽煎督煎之事責之場官而微員功名之念輕貪利之心重受賄縱私無人不然即盡加黜革而所換新官仍復如故此場官之不可恃也又未嘗不以巡私緝私之事責之廳縣汛辨而各官俱有地方公事豈能每日親查所差巡役兵丁又皆微末下人更無身家顧惜多將大夥賄放僅拏一二小販塞責此巡緝之不可恃也從前皆差有鹽政衙門承差督率商家雇募之巡丁各場查緝臣見其未能實心出力又不得巳而差本標辨目帶領兵丁沿河遊巡梟等久巳知風暫為回避亦難收有實效因思臣向日候選時往來京城曾有山東兖州府人韓景琦常為人保送錢糧上庫頗有膽力今雖捐監在籍其人勇於向前立心忠幹隨傳其來浙令伊帶兵巡緝遇有私鹽即行截拏現在擒獲大夥積梟數起究審發落因知官鹽之壅滯總由私販之衆多而竈户之賣私總在場官之賄縱惟有專設巡鹽員辨以緝私更換實心場官以稽竈庶可漸次杜絶查浙地私鹽出沒之所獨海寧海鹽平湖桐鄉為最且係嘉湖二府販私門户而海寧之長安鎮乃其往來適中孔道請專設巡鹽營把總一員兵一百名在此鎮分巡隘口歸臣標左營管轄於海寧等四員及嘉湖要汛接壤江南之處周圍巡查選募勇健兵丁充當以商人向日雇用巡役工食給為月餉不足者即以所獲私鹽變價添補請將監生韓景琦給與把總劄付俸薪帶領各兵巡緝三年果能有效授以千總職銜仍留營再緝三年如能始終不懈各處得以銷引保題到部以守僃升用俾將來巡緝員辨知所鼓勵但恐兵少地廣不能周巡請於撫標額兵八百名內抽派一百名酌委千把總一員幫同巡鹽把總協緝稽察俟一二月後酌量調換使不致久而熟識作弊此緝私之一法也至各場員官卑職小惟知利欲熏心萬萬不能改革應將現任場員分别優劣酌量咨部改補請以捐納候補候選録用之同知通判知縣等官如有家道殷實情願效力者發浙量才分往各場管事專司杜絶私煎私賣之責俟三年實有成效即豫保題請旨敕部準照原銜即用如有仍蹈故轍劣迹昭著者參革治罪伊等原有身家自能顧惜功名實心出力此稽竈之一法也至於所轄江南數部除徽州一屬每年實可多銷其餘鹽政情形更有與浙不同應為另行設法者蓋緣蘇松常鎮各州縣四靣水鄉港汊雜遝巨梟大百十為羣巡捕兵丁力難制伏即如一女梟沈氏久慣販私聫結黨羽徐二等大船裝載動輒統衆執械拒捕逞凶傷兵毆官橫行於兩省之間犯案纍纍皆莫能制臣訪聞檄拏巳久該犯聞風逃避難於弋獲近有松江府海防同知金文宗頗有幹才臣委以督緝之事甫及數月親往密探將沈氏設法擒獲并拏羽黨數人現在行提解浙審擬嚴處然此外餘梟私販尚多豈能淨盡雖松江鎮江俱有提督將軍駐劄未嘗不差委員辨帶兵巡緝奈旗營兵丁無不買食私鹽所以並無實效又江南止有松所四場民竈雜居向俱就團買食賤鹽孰肯捨近圖逺加以私鹽橫行商皆虧折消乏棄業逃亡上海南滙二縣數年片引不銷現據上南二令紛紛詳請欲以引課攤歸田畝因與鹺例不合尚在飭議未定以臣愚見非大為變通不能補救莫若將松所之浦東袁浦青村下沙四場場官於前項候補同知等官內再選最為殷實有身家者令其管理各竈所煎之鹽盡入官倉除商人收買外餘剩者請借動鹽臣筆帖式歸公成規項下銀兩交與管場各員照依場價盡數收買再擇商人內之殷實者將鹽發與領去如能照引數完課聽其歸完本銀自行配銷倘不能完課則於原本之外酌量增價些須令其領出於城鄉市鎮多設店鋪賣出價銀按季繳還場員即以此銀源源買發多出之價作為贏餘逐年將數目造册報部查核此四場事務更為緊要難辦管理之官三年內仍行考核保題果能錢糧清楚引鹽多銷上等出衆者以原銜應升之缺準其即升至急公稱職稍次者照其原銜即用倘照舊無益者分别參革在竈户鹽既得售必不賣與私販而梟徒無鹽可買亦可望其改業既免無知愚氓多罹法網且使平素不銷引之縣得以疏銷則歷來多銷之處皆可溢出課額即管理之各場員先使習學歷練亦於將來臨民有益臣因鹽法頽敝巳甚不敢緘默因循亦不敢草率題請合先具摺陳奏是否可行伏祈聖明睿鑒指示欽遵為此謹奏既欲大為變通以清錮弊自應具題交部議覆方可施行將摺內冗長之語酌量刪減具疏題請可也硃批諭旨卷一百七十四之四欽定四庫全書硃批諭旨卷一百七十四之五硃批李衛奏摺雍正五年九月十九日浙江巡撫臣李衛謹奏為奏聞瑞穀雙岐恭呈御覽事欽惟我皇上御極以來太和翔洽嘉禾瑞麥應候挺生不一而足兹於本年九月十七日據杭州府仁錢二縣帶領農民王天佑等獻到瑞穀一莖兩穗并有一莖三穗者數本又稱聞得各處甚多皆産自田間並非人力所致臣欣瞻之下歡忭非常隨親往郊外查看果又取到數十餘本伏思别省嘉禾屢見久著靈異而浙江特邀聖主景福幸覩竒祥萬户千家歡聲雷動且今歲雖有數縣偶被蛟水不過經由鄉村幾處而通省早晚二禾暢茂豐收各有十分九分次者亦足八分收成其穀皆比往年結實礱米更多目今正當刈穫之時天氣晴和米價頓減再得半月開霽晚稻盡皆登場人民樂業歌頌太平此皆我皇上仁風普被聖德光昭是以嘉兆頻年疊見臣幸遇昌期中心踴躍敬將近省瑞穀數十本專差馳進恭呈御覽臣不勝慶幸之至為此謹奏所呈瑞穀朕欣悅覽之另有諭旨頒發同日又奏為敬陳愚見以僃聖明採擇事竊臣查奉旨命往浙省候補知府秦休臣與之素無謀靣到浙時見其謹愼老成因委令署理紹興府印務所行雖無過人出衆之事而勤敏老幹民情帖服洵為稱職續又前後兩奉諭旨以顧濟美補授浙江紹興府知府員缺以秦休補授廣西潯州府知府員缺仰見皇上因兩缺緊要特賜選補以重地方臣隨另委候補知府江承玠暫行署理紹郡令秦休離任交代在案但臣竊思紹興一府雖非比杭嘉湖難治然亦屬繁劇之區今即刁風稍息而其民情大率粗知律例小有幹才非慤實老練之官不足以消其好事之習似於秦休人地相宜其顧濟美一員臣記其曾任雲南通海縣知縣為臣屬官時頗稱有志向上勤力學習在彼時雖尚屬初任未嫺吏治而臣離滇巳有兩年該員自必更加熟練然較之秦休識力似覺少嫩且其原籍蘇州離紹郡所轄亦在五百里相近若以補授浙江事簡别府員缺更覺得宜伏惟皇上簡用人才自有聖明採擇臣不勝惶悚之至謹奏顧濟美堪勝紹興一任朕可保之初意原今仍回滇省補授府缺因伊奏稱母老所以就近用之次日將其原籍與紹郡相近之處亦經具奏於應對之間觀其立志甚有足取朕謂浙省各郡守除孫國璽外餘人未必能出其右也同日又奏為奏明浙省歷來辦銅情由仰祈睿鑒事竊查鼓鑄一事上以裕國帑而下以通民用所關甚巨臣自抵浙任通查從前欠解户工二部銅斤一百三十餘萬其中弊竇多端臣因積欠纍纍方以清追為主未敢冒昧陳奏今起解已有一百六萬餘斤頭緒稍清謹將其中情弊原委及所有餘存銀兩數目僃悉奏明聖鑒伏查從前因各省辦銅艱難遲誤於康熙五十八年經九卿會議將從前節省二分免其添買增入銅價每斤定為一錢四分五釐如有贏餘題明歸公在承辦者必將銅斤買足此外多出之銀方可謂之餘剩若銅未購買先將銀兩扣存以為節省焉有不致貽誤正餉者乃前任浙撫臣李馥因其家係閩人原有洋船妄以贏餘具奏承認自為採辦究之為法自敝不但並無分釐多出且離任時欠解額銅一百六十六萬餘斤至於監追變産尚有未清又前署江蘇撫臣何天培亦以贏餘陳奏而江省額銅積欠至三四百萬餘斤是皆博節省之虛名置公事於不問而國家正帑之所以貽誤者也更有原任嘉興府知府吳永芳起而效尤乘機辦銅將銀預給各商於部定銅價中扣剋短少作為節省留存藩庫在商人明知銅價不敷或有貪其預先發銀可以别項營運取利亦有疲商光棍因其扣剋部價可以挾制圖賴竟將銅本吞蝕花銷者以致吳永芳所辦之銅欠至八十三萬餘斤臣比追至今始據陸續完解止有從前解官程雲逺挂欠之五萬餘斤未曽交局又有馬晃附解之銅亦有挂欠現在分别查追此誠歷來辦銅積弊臣敢不據實奏明所有吳永芳任內兩年辦銅扣存之四萬四百五十八兩零歷任各撫臣因其銅斤欠解尚多案未完結難以題報銷算今銅巳追解漸完此項銀兩彼既稱為節省所餘相應遵照九卿原議留存歸公至於部價雖有一定而商人帶銅回棹先後多寡不同價值不無低昂如遇缺銅之時每斤貴至一錢八九分承辦道府竭力添補一年派出兩員常賠至八九千兩不等若圖賤價將銀預先冒險給發則每斤一錢二三分無本商人亦肯領辦不但無庸賠補即正項尚得肥囊然商人身家有限外海大洋風波難測設有疏虞雖將道府參革治罪而數萬庫帑從何著落實為可慮臣請嗣後俱照部定之價按時給買俟銅斤購足之日核實數目有無贏餘虧賠萬耳萬目難於掩飾除不足或果有貼補者免其報解外如果有餘剩銀兩若干令撫臣藩司盡行查出核實題明照數歸公不得預先扣存致有貽誤正餉再銅斤水腳部定每斤給銀三分以為解京長運及在省短運二項之用係藩司發給解官領去歷年報銷無異其中若遇長運不必守凍或短運毋庸遠購之年則此中每斤尚可節省銀六釐六毫存貯藩庫倘或守凍多費則應找給不能如數從前原議俟本省别項緊要公事詳明動用此亦浙省歷來相沿如是臣到任以來行令徹底清釐今據新任藩司孔育璞查明詳報除康熙五十八年起至雍正元年上運止所有節省水腳銀兩皆於前藩司傅澤淵任內先後詳明撥補各年不敷兵米折價等用外其雍正元年下運起至五年上運止內因從前有代辦各省銅斤之年水腳數多是以共存節省銀二萬一千九百二十六兩零俱收存未動此項係於應給解官準銷之內加意節省者每年原無定數且現在止辦本省之銅以後更屬無多可否仰懇聖恩除前項銅價節省四萬餘兩并此後辦銅買完解足所餘多寡據實報部歸公外將此應發解官節省水腳銀每年約有三千餘兩連現存從前零積之項賞存藩庫為辦理浙江一切地方公事之用庶臣前奏每年不敷經費一萬八九千兩稍可藉此抵補不致誤公掣肘皆出皇上特恩非臣所敢擅請伏候聖鑒批示欽遵謹奏此奏經交該部密議今將部議一併發來汝看汝所奏誤矣同日又奏為據實奏聞事竊臣於本年六月十八日接準部咨皇上特遣御史常保住伴送西洋博爾都噶爾國來使麥德樂等由江南浙江江西至廣東澳門伊等船隻驛遞飯食加意支給等因臣隨欽遵移咨鄰省一靣差官沿途探迎僃辦去後今於八月間聞知各省督撫接待來使之禮逾於常格而江蘇撫臣陳時夏則出郭十里向御史同來使跪請聖安設正席外又看席二筵候至下晚必勒陳時夏親自往請方來赴席州縣傳來知會沿途預僃一切夫船供應糜費甚多聲勢異常臣竊謂天朝自有體統國威不可褻越皇上因嘉尚逺夷嚮風令沿途於夫船供給從厚支應以示優異又恐逺人不知禮體特命御史常保住伴送使之斟酌得中並未奉有諭旨改換儀注自古荒服諸侯等於王朝卿士督撫職任封疆加銜叨居卿二與外國諸王職分相均寧有伊之陪臣可加於天朝大臣以上之理况久奉諭旨頒發成例於出差官員之前跪請聖安者定有品級今御史未及三品來使更係外臣督撫向之屈膝伊等儼然敢當甚屬不敬臣因國體為重於其未到之先特遣千總往迎令向御史常保住稟云出郭請安有關天朝巨典此番有無旨意應否出迎使外國人知道天朝體統特差千總靣稟請示據常保住回云此番係皇上特恩原與各國貢臣不同我雖到不得請安品級但係內務府官員若要探聽皇上聖躬萬安令外國人知道天朝有禮貌亦使得等語臣因常保住此言甚為得體隨於八月十三伊船到日會同將軍都統織造等諸臣至郭外公所先請常保住下船令來使麥德樂等在彼船逺逺觀看臣等跪下恭請皇上聖安之後常保住即欲拉臣等先至來使船上往見臣等以為不可仍在官廳等候良久方將麥德樂等邀來相會待茶各散城內僃有公館不居必欲住於城外地方官日逐致送供給下程一切從豐初時定於十九日起程至期不行所索夫船雖多尚無十分費力惟起旱挑夫部文定有一百二十名常保住加至八百餘名俱係包攬客貨用地方官出價雇僃之夫挑送在杭逗遛經旬直至二十四日始行起身由錢塘江過常玉山而去每過一縣供給飲食前站門包雜費須用八九十兩不等地方官不得不為僃送此御史常保住伴送貢使過浙之實在情形也臣思逺夷初入中國何知如此驕橫常保住既奉特旨伴送自宜教以正理使其感皇上之恩畏天朝之威傾心嚮慕方為勝任乃不顧國體但借之以作威福諸事責僃吹毛求疵其意大有所欲深負皇上委任至意若彼時上聞恐蹈器量褊淺之失今巳經出境臣之一身屈抑何足輕重但有關國家體統之事在沿途諸臣待之本自失體且欲使其回京説好即加察訪孰肯再言實情臣受聖恩深重用敢不避嫌怨據實直陳伏祈睿鑒為此謹奏所奏殊屬可嘉之至各省封疆諸臣悉能如此居心顧惜國體天下何愁不治朕觀常保住係一老成人猶恐過於謹愼豈料行為乃爾前此接伴西洋使人來時諸凡舉動何竟寂然無聞其詳細密訪奏知陳時夏身為大吏不應卑躬失體至於若是由浙以及江西而抵粵東又復作何光景一併僃訪以聞將此摺務於常保住旋都之前繳進毋遲雍正五年十月十三日浙江巡撫臣李衛謹奏為敬陳隱藏銅器錮弊酌議收買分晰嚴禁之法仰祈睿鑒事竊臣於本年九月二十九日接準部文因禁用黃銅器皿各省尚有未能實力奉行欽奉諭旨嚴行通飭臣捧讀之下不勝惶悚伏思京錢行使自從前到今民間買賣除銀兩外俱係青銅老制錢文連當年大小黃錢亦未流通境內續復奉到諭旨各州縣一體禁飭則此兩府均在其內可以畫一辦理隨將通省黃銅器具遵照部文款項嚴行禁止現在不許新造止有巳成銅器未肯即為交官者緣係家家平素原有數件雖貧窮小民亦不無零星微物查追愈急藏匿愈深且奉準部議民間價仍行發賣留用者即當差拏究治倘敢現在打造新器者除原物入官將本人按律從重懲治兩鄰保長不報同罪文武地方分巡之官失察嚴行難行自干罪戾今奉諭旨通飭臣何敢稍有隱瞞而不據實陳明也但愚人所以不即繳出者遍訪其故民間所用器皿有打銅鑄銅之分打銅俱係煉熟必用六分紅銅四分鉛斤方能配成黃色若鉛多則色白而不黃每遇下火打過一次惟鉛有飛折而銅無減少其用生銅鑄造者則有六成以下對半之色更有渣滓不淨生熟二項銅價原有低昂而成色之高下自分一看即知若必欲傾鎔細加辨别則逐件銷化守候需時炭本人工更多浮費今部文未曾分别生熟二銅惟議稱如有不足六成銅色遞減其價解部不實令辦員賠補等語彼無知愚氓誠恐估折太少無有定慿是以各懷觀望可否將打造之熟銅悉照六成收買解部時亦照六成交納其鑄造皆可躲閃豈能遍及莫若令諸色人等一凡遇見有私用黃銅器具即許持送交官將銅價給與首露目留之終屬無益焉知不皆自行繳出或亦誘掖愚蒙之一道也再康熙十八年禁用銅器案內開明鈕子鎖鑰箱匱鞦轡事件刀束刀環刀篐等物不在禁內因其止禁新造而巳成者置之不論所議未為盡善今嚴禁新造并收巳成之器誠為杜絶根源但所開樂器軍器天平法馬等子及五斤以下之圓鏡不禁外其餘俱不許製造臣愚以為各項甚是獨圓鏡所用頗多雖有重者亦必借稱五斤以下抵飾孰能逐一稱較仍與不禁無異應止許用有柄把之手鏡則自然不能重至一二斤之外其餘圓鏡除大小青銅不禁若黃銅者槩止至於前開鈕子等項細小之物每件用銅不過在錢分之數即一家合併亦是不多民間仍不能以零星之物彚集繳官而人人佩帶亦復易於獲罪且窮民工匠藉此養活家口者天下何止數萬此種小物似可仰邀聖恩查照康熙十八年之例減定樣數指出不禁些須物件飭行遵照惟各處當鋪銅器甚多既經禁用在本主自不肯取贖而年限不滿當鋪又不能擅賣應令將銅器當票交官給銀取贖除合算本利與部定銅價相等毋庸議外不足者於當鋪所得愚昧所見如有可採或恩出聖慈通飭或交部議定行文遵照伏祈睿鑒施行謹奏覽同日又奏為奏明委署藩臬兩司印務事竊臣於十月初九日接準部咨浙江布政使孔育璞奉旨調補甘肅藩司又按察使董永芠於前安徽布政使任內部議降一級調用奉旨依議欽此臣隨轉行欽遵遴員委署去後竊見孔育璞年力強幹居心直爽但辦理浙地事務殊覺勉強而於西北省分甚為人地相宜新任藩司彭維新從前在浙雖不無偏執深刻之處然其明敏勤勞辦事認真正可懲察浙藩吏役各屬衙門之詐王鈞本任之外又管南北二關不能再兼别務其杭嘉湖道徐鼎現護觀風整俗使篆巳經出巡各府至寧台紹道王一導居心行事聖明久知其不可任用因伊專修戰船未曾完工恐新員接辦不及是以暫緩參劾而溫處道王斂福海疆遙逺應須彈壓難以調赴會城其在省者止有糧儲道蔡仕􅘎一員暫委令署理布政使印務緣該道即有親催水次督兑漕糧及開春押運過淮之責伏乞皇恩飭令彭維新迅速赴任庶無稽遲至臬司印務因實無其人是以著杭州府知府孫國璽暫行護理合將委署二缺緣由具摺奏明再查臬司大員皇上自必早巳揀用何庸置喙但浙省民風刁健獄訟永芠員缺未經皇上補授或於二員中有可選擇恭候聖明睿鑒臣因通省地方要缺需人起見冒昧附陳伏祈慈宥為此謹奏百凡事宜第據理直陳無庸避忌汝於朕前尚有信不及處耶同日又奏為瀝陳微臣下悃叩求聖主天恩事竊臣本以草野粗直之人仰荷皇上格外知遇由部郎特授雲南驛鹽道超升藩司報效未遑旋畀巡撫重寄既受天高地厚之深恩又當年力方壯之歲月及時黽勉尚恐不能報稱豈敢退縮偷安昧心妄瀆實有愚悃苦衷不得不冒死直陳伏念臣自到浙江日思勉盡職守稍圖寸效夙夜警惕若不將一切公務認真實心辦理勢必茍且塞責國家何貴有此竊位糜祿之臣子既欲儘力任事則非徒承辦目下各項案件遂為稱職當思培植地方元氣作何未雨綢繆整飭通省屬員作何寬嚴並濟務期上有益於國計下有利於民生凡用人理財經畫久逺化導積習懲創愚頑稍為皇上分勞宣力方不愧於此心且身為封疆大吏必有經文緯武之才博古通今之識庶能不動聲色措置咸宜而臣讀書日淺不學無術於此數者慚無一能豈敢儼然自居久膺重任再臣屢奉聖訓安民之道首在察吏浙江財賦重地山海要區人導望其自新不改即參臣常於劾官疏內分晰聲明從未有司道各府揭出劣員而護庇駁回者俱有案卷可稽實無所用其姑息之處至於人心愛在臣愚見竊以躬逢聖世重荷諭旨時頒是以深自警省方得勉強支撑將及二載但粗直之人嫉惡過嚴既不能改淺露為深藏而才情有所限量實無異䇿奇謀以此心日勞而政愈天恩何此微臣犬馬思效之心甚切而蚊負難安之懼彌深也至於臣八旬有餘之母幸荷聖主洪恩得以相依膝下但老病龍鍾僅存殘喘臣形雖外壯而中氣頗虛春秋兩犯失血每早脾瀉怔忡不時此等身家之計臣皆不敢瞻顧私情暫忘疆臣實局蹐不安進退維谷竊憶前歲仰覲萬壽之前冒昧懇求進京瑣瀆聖聰今感戀之忱逾切覆餗之恐益甚寤寐悚惕無地自容伏乞皇上恩鑒下悃準臣於新年春月將巡撫諸事竭蹶趕辦俟觀風整俗使臣許容回浙之日交與印務署理其鹽政之事可否暫交藩司彭維新或新任臬司到來兼辦再為起程赴京陛見並奏地方一切要務靣請訓旨欽遵倘蒙俞允則仰戴聖主覆載之恩非此身此世所能報答萬一也臣臨奏不勝感切惶悚待命之至謹奏明春不必來京俟巳酉年看同日又奏為彚覆條奏事宜仰祈睿鑒事本年九月二十八日臣接到奏摺黃匣內蒙皇上發交員外郎詹錫瓚等四員履歷各摺條奏浙省事宜俱經欽奉御批令臣分别詳悉議奏酌行臣欽遵隨將所奏事件逐一詳察分别四條彚摺覆奏一員外郎詹錫瓚履歷條奏摺一件欽奉硃批朕靣加詢問據云所見甚確可詳悉查議具奏欽此伏查棚民一項詹錫瓚所指其中弊竇情形臣細加詳看不但伊原係開化縣人本地現有棚民所言俱係確實即臣從前未經到浙及蒞任以後留心察訪棚民姦良不齊去來不定所墾麻山數年之後地力易盡又復翻墾新土損傷塜墓且性情粗頑倚衆爭鬭動輒逞凶若遇歉收之年竊盜為匪等弊臣知之巳熟與詹錫瓚所奏無異但其指稱防範之法在浙省不過查驗批照注册收墾不許業主租與新地尚屬易行若所稱令江西福建本處地方官取里鄰宗族保結給與印批方許出境之處則彼地實有勢不能行者夫棚民淳頑不等原非盡為匪而來也皆福建江西貧民因本地人多田少不能養活故相率就食於外方歷今三十餘年其中有先攜眷而來者有種地獲利搬取家眷同居者又有住居年久置買田地并與本地民間結聫婚姻者此等皆不回籍惟內有無室家之輩年終回去留下數人守棚次年復來其出門時或攜帶些須乾糧徒步跋涉而至未肯輕用盤費若責其俱赴本縣呈明取結領批則有守候之艱衙門紙筆之需伊等無知愚氓斷不能遵行當必私自出境而彼處地方官亦豈能於各境上盡為攔截執行路之人而問其所往則此法雖設性而迫於飢寒大則聚而搶奪小則羣行偷竊是又激而成之矣至於止給熟地不給新地皆係部議所定目今現在遵行者臣愚以為此等棚民其來巳久其聚巳多一旦更張必生事端况伊等之中尚知務實力作漸有溫飽非盡遊手姦徒率土王民何分疆界現今以棚民之姦良責成於招佃之墾户取結造册編查保甲嚴禁不許再租新地數年以來亦皆安靜無事似應將此一事上下留心飭令各知府營員督率各縣汛實力稽察撫輯得宜不使吏役借端科斂因時調度稍有犯法即聖鑒一改補訓導項景倩履歷條奏摺一件欽奉硃批此奏似屬不謬汝其查明如果可行具疏題覆欽此臣查項景倩所奏二條一稱瑞安縣錢糧歷年積欠册籍混淆若得通縣逐畝清丈則欺隱無逃而賠纍可免等語伏查浙江通省田地於康熙四年奉文清丈填造魚鱗圖册歸户辦糧直至康熙九年完竣自十三年耿逆煽亂土衆竊發浙東數郡多遭兵燹鱗册遂有燬失糧額因此混淆而數郡中又惟台溫處三府為尤甚其中移丘換段墾多報少飛灑詭寄以熟作荒等弊為條奏之所未及者尚多即杭嘉湖紹等屬縣內鱗册雖存而蠧吏里書瞞官作弊花户無的名實徵無底册朦混錯雜者亦復不少曽經臣通飭清查據天台仙居青田壽昌等縣俱以清丈具詳八月三十日瑞安縣知縣何詩亦曽具稟到臣緣丈量一事關於通縣民生休戚行之不得其法徒見滋擾是以臣巳於本年三月間先行設立順莊滚催之法令通省各縣照依保甲煙户册內人户查其所有田地糧額歸入本户的名造册於各里就近用滾單傳催限以年終完竣并著杭嘉湖道徐鼎遵照辦理此册一定則田地户名巳有根據因而查丈詭寄侵隱不難清釐現在巳有壽昌等縣剔除清楚歸正糧額民皆稱便其餘各縣若官有才幹行之頗好亦有才平事繁之處令知府不時稽察容臣催造完日查明糧額不清如瑞安等縣彚疏具題并遴委幹員分督查丈以副皇上軫恤民瘼之至意一稱沿海可施耕種之地不止玉環一隅今聞玉環山巳經具報此外請令據實開報等語查溫台海邊之玉環山經臣會同督提二臣奏明於今年春月委員清查召墾凡玉環地方并附近玉環之楚門老岸及磐石蒲岐大荆三盤黃大嶴等各處查出可墾田地共十萬餘畝現在詳議分設文武營制并經理地方事宜另疏會題至於孤懸海洋各島嶼俱經委員遍行查勘或地方窄小墾闢無多不足供設汛分兵之經費或相離遙逺防範難周恐徒起姦匪接濟之隱患如南田大佛頭等處不敢輕為議墾其但有可行者斷不肯因循遺漏總期斟酌妥便再加核實漸次興舉務使國課充裕海疆嚴毖庶於地方實有裨益理合據實奏覆伏祈聖鑒一改補訓導朱琪履歷條奏摺一件欽奉硃批審察所奏若有可取酌量施行欽此臣查浙西杭嘉湖三府俱係水鄉河道支流四通八達所謂港濱者有大小長短之别實則支河之分流而水道之小徑也其間有原來地勢如此者有從前鄉民將低處之泥逐漸刨挖堆於高處種植桑麻而窪地日久成河者數其土名一縣之中何止千百餘處內中尚有石壩土圍不等若欲官為開濬則竭一縣之錢糧不足供半縣之用然皆鄉民行舟之所必經灌溉之所必用若有淤淺則不待催督本村居民自能合力疏濬除官塘大河俱係查丈估計出給工資雇夫開濬外其鄉僻港濱於農隙時臣行令各州縣及分管巡查地方之佐二水利雜職等官著落墟長鄉保各村勸諭催督使之及時挑濬量力而行止將坐落處所及興工完竣日期報縣查考民亦稱便若如朱琪所奏傳集業户照田出工即有壓派之擾且所稱墟長造册報縣親詣勘驗申詳督撫委員覆勘彚册咨題等語查一境之內港濱盈千州縣事繁豈盡能親到胥役因緣為姦則造册供應小民之費不資而咨題之册汗牛充棟驛遞亦將不勝其擾矣至於海塘幫築修砌因近塘沙土浮鬆難禦潮汐方且出給夫價於近地挑取堅土應用若得各處港濱之泥築塘豈不更善然欲責其盡行載往海塘實屬難行無論各處港濱多與海塘隔逺數十里數百里不等且有不通水路者固難責其逺運即數里之近而一改補訓導趙景循履歷條奏摺一件欽奉硃批此事雖屬不甚緊要亦與地方有關一併酌議具奏欽此臣查孝豐一縣地屬山陬其西北與江南之寧國縣廣德州東南與本省之臨安於潛餘杭等縣聫界而天目山則東西南三靣山谷深邃居民畸零散處其間者十有餘圖向設巡檢一員弓兵十五名專司巡緝亦因山徑叢雜隘口險要所以防宵小而靖地方也目前太平無事巡檢一官似屬無足重輕此趙景循所以有請裁巡檢歸併縣丞之奏但浙江公事繁多解餉辦差絡繹不絶非但縣丞不能常在本任即巡檢亦時有差委似此界連兩省之山縣百餘里空虛無官於知縣典史外不可少佐雜之員以僃緩急况現經臣題明將各縣佐二雜職等官分派地方巡緝盜賊鹽徒各有責成則此巡檢一員亦非竟無職任虛糜廪祿可比似應毋庸裁併留以防範地方理合斟酌斟酌詳察據實敷陳所有欽奉頒發履歷摺四件一併恭繳謹奏覽雍正五年十一月初八日浙江巡撫臣李衛謹奏為恭謝聖訓并陳覆奉行事宜仰祈睿鑒事本年十月二十六日據提塘官遞到內閣交出怡親王大學士張廷玉宣示雍正五年九月二十三日靣奉上諭一道到臣跪讀之下隨即欽遵敬謹刋刻嚴飭各屬員務令遍行頒布家喻户曉外伏思督撫身荷封疆重任於地方民務皆當先事籌畫督率舉行若至上勞宸衷始見措施巳為不能盡職况又怠忽因循復煩天語重頒返之於心寧不愧恥今蒙我皇上可嚀誥誡反覆訓誨并教以緩急先後之序寬嚴得宜之方是皇上以九有之廣萬幾之勞而於偏隅督撫所應辦而不能辦者一一為之周詳指示覆載深恩至於此極具人心者有不感激涕零而黽勉思效者哉伏讀上諭內指出要務各條如禁造黃銅器皿臣近巳將先後奉行并內中情節原委奏明又保甲社倉二事巳經具題俱不敢再瀆若賭博惡習臣前歲在京陛見時曽經口奏自到浙後即與將軍臣鄂密達齊心協力申禁頗嚴巡拏亦緊杭城內外所犯旗漢影射窩賭等事即飲食輸贏無不經臣衙門親自批行發落近來犯者漸少其外府州縣雖皆派有佐雜辨員分巡固不能盡如省城之嚴密然凡有别事及巡鹽差往各處員辨臣即令其順帶牌票留心巡查曽有海寧北門外及蕭山龕山地方等處賭博數起皆出其不意經臣差查拏獲痛懲並嚴究官役奉行不實之咎復令各屬將拏獲起數於月終彚報司府每季轉詳到臣按其多寡分别勤惰奬罰是以各地方官亦知畏懼嚴巡將來或漸如省城得以稍有成效至臣自幼天戒不食牛羊於私宰圈户留心嚴禁緣地方間有回教之處鄰比皆有同夥隱匿不報并營伍盔甲亦有必需水牛皮用者又有倒斃之牛不能分别現在雖無敢於開宰圈户誠恐僻處暗地尚未淨絶為此設法於回教住居地方令總保稽查舉報并坐兩鄰隱匿之罪民間病死之牛必須公同鄉保甲鄰驗明方許開剝仍令投單報縣存案又咨會滿漢各營一體嚴禁凡軍裝必用牛皮等項俱開明數目知且恐為地方隱憂誠如聖諭指示若懲治不早則附和衆而株連多臣於到浙之後即經留心察訪浙幫水手皆多信奉羅祖邪教浙省北關一帶有零星庵堂住居僧道老民在內看守其所供佛神各像不一皆係平常廟宇先有七十二處今止三十餘所各水手每年攢出銀錢供給養贍冬月回空時即在此內安歇不算房錢飯食供給餘剩即留為沿途有事訟費之需而淮安天津通州京師俱有坐省之人為之料理各幫水手多係山東河南無業之輩數以萬計歇店飯鋪不敢容留若將此等庵堂盡行拆毁驅逐則冬月回空各水手無所依歸反生事端且細查其教亦止喫齋念經其可惡之處在於借此心齊欺人生事尚無别項不軌之處臣巳嚴令押運官辨逐船稽查禁止不許指稱伊教聚衆賭博打架并於回空之時派出千把帶兵巡查一有所犯即行嚴拏從重痛處仍不時防範設法杜絶又溫處等府愚民向為閩人引誘借祖師教為名黨類甚衆雍正三年經前督臣滿保拏獲具奏請旨將為首閩人陳立昭王文治浙人范子盛三犯於溫命恐棚民雜居之地漸至多事臣亦嚴令地方官查拏首從各犯分别懲創總在遵奉諭旨一有所聞即留心根究不致隱匿養癰則姦宄無所漏網而良善亦可保全矣以上各件皆臣分內之事何敢瑣陳因仰見聖主憂民念切惟恐一夫不獲其所浙江山海要區地方遼濶藏垢納汚之所倘或怠忽從事尤致上厪睿懷用將奉行事宜據實覆奏伏祈聖明鑒照為此謹奏覽同日又奏為再陳速銷鹽引以裕課餉事竊照杭嘉湖三府及江南蘇松常鎮四府向來私梟充熾官引積滯臣巳將派委巡緝設法防杜之處先經具題現在聽候部議遵行今販徒巳陸續拏獲數百餘名俱皆分别輕重擬徒懲創安插近來稍知斂迹官引日見疏銷漸有成效雖若輩未免怨望亦臣之所毋庸顧惜者也查兩浙引鹽例係一年兩掣所有春夏二季之鹽必至冬季方始掣運而秋冬二季直待次年夏月方得掣驗逾隔兩季遞相稽遲更有掣不足數停滯引目仍存商人賠課此係歷來相沿墮誤半年之舊額也今歲仰賴皇上福庇晴雨合時土滷旺起場鹽廣産加以緝私頗嚴竈販略知畏法不敢公然濟私是以將上屆引鹽業巳掣足銷完現在各商於場地所買鹽斤報臣衙門數目合算不但將本年春夏二季之額可以儘數全掣約略尚可現掣秋冬引目二十萬上下竟能比歷來掣規趲出一季官鹽若明歲再遇此等豐收設法調劑年年銷完不至壓下半載則歲額有增此以上各府現在辦理之情形也尚有諸暨上虞義烏浦江富陽德清六縣離場頗近亦有江船可通者若不急為整頓不特近場之地深受其害即稍逺縣分亦將漸被侵越矣且私販動則百十成羣與鄉民結為表裏甚屬潑橫商人顧惜身家退避不前以致將此等地方讓與梟徒現在遴差千把總帶兵遊巡拏獲者亦復不少悉行分别懲處設法整理漸見眉目但此輩梟徒因無鹽店相習巳久視為應得之事又非如向有官商行賣之處販徒尚自知理虧者可比若盡繩之以法則恐流入盜賊反致為害地方關係非輕必使之改過自新許其肩賣官鹽今巳漸次在地方官處具呈情願改業作為官販現在議令商人前往總隘處所發鹽減價住賣給票與彼領販以濟鄉村僻壤民食將來此等地方若能銷鹽疏引不準别家姦商爭奪俟有成效再為具題其餘寧台溫處四府所屬濵海之區間有數縣近場難於銷引梟徒頗橫今巳將渠魁楊道信等拏到省城嚴加審究盡法痛處以為榜樣并江南之崇明縣亦皆有私鹽擾害鄰近錮弊頗深容臣隨時調劑因地制宜另為次第舉行以上事宜非奬賞鼓勵懲治心服難收實效臣不敢茍圖無事亦不肯惜費畏縮照前儘力辦去則鹽政所屬無甚遺漏之處諒將來課餉必能多出矣為此先行奏聞謹奏浙省鹺政整頓合宜甚屬可嘉兩淮所議鹽務亦命卿畫一詳酌具奏矣其竭力籌維務令久逺循行永無窒礙方好同日又奏為恭繳御批事本年十一月初二日臣齎摺家人捧回原奏摺匣到杭隨跪領開讀內臣奏辦銅原委一件欽奉硃批訓諭并蒙頒發户部密查覆摺臣即敬啓詳視逐一遵照但既經議定則臣前奏情由尚屬大概恐户部將來難於稽查有不敢不於聖主之前據實分晰聲明者查吳永芳扣存節省銀兩臣原奏明充公惟因吳永芳當日雖曾有此項扣存銀兩名色原係前藩司傅澤淵留下入已伊病故後永芳心有未甘借名贏餘詳報在其家屬名下追出者有案可查所以當日額銅欠至八十三萬餘斤之多直待監比數年而後將完且又擅自提取海鹽等五縣庫銀共一萬八千兩湊買銅斤現於各縣虧空案內審出題明著落永芳追賠監比止交銀一千兩此外分釐無完同屬皇上錢糧被其將彼案之侵蝕報為此案之贏餘實為捏飾又見江南雖亦行預扣較之浙江每百斤多發銀五錢而欠銅至數百萬之多其别省不扣原價者俱無虧缺正項銅斤之處臣因此深為憂慮故請於正銅買足之日確查實有贏餘遵照原議即行之外巳銷發給解官之項遇有不必守凍或近處購買又有此額外節省歷年零積存庫除從前公事用去外其辦銅别省逺近不等亦無聞有此項臣因不敢擅動是以奏明請旨今當遵照部議將現存及所有多寡節省水腳俱盡數歸公嗣後並將銅價水腳一并先扣節省存庫但臣之所以不得不再為分晰奏明者恐從此部定為例則辦銅各員萬難禁其不私下先行放洋在殷商豈肯願領短價勢必如江南皆被乏商誆去花費直待下年領銀那新掩舊遞年既久化為烏有即置之重刑難免虧空動輒巨萬此臣愚昧所慮將來之弊皆難逃於聖明之洞鑒者也再前奏吳永芳扣存銀四萬四百五十八兩零緣係該員一人總辦從前原報文內未經分别銅價水腳何項所出扣存者止據統報數目交庫其中亦有水腳臣前摺因將此項四萬餘兩盡請歸公是以未曽分晰合并聲明又臣具奏御史常保住一件仰荷聖主鑒照令臣察訪奏聞查江蘇撫臣陳時夏接待太過之處有江撫知會印咨可據其用夫八百餘名之處有常保住著臣代為知會江西之文沿途各御覽至西洋人來時未曽經由浙省據副都統雅斯哈曾云伊前任在廣東總兵時見此西洋人俱摘帽曲身聞常保住亦不像此番行為則其從前尚未敢如回去一路狂妄可知今次從江西廣東而去其在外行走事情沿途難掩耳目而暗中餽送隱處恐亦無人肯言今臣現在遵旨密差各處訪查另行覆御批奏摺及奉頒户部覆摺一并恭繳伏祈睿鑒謹奏覽雍正五年十二月初三日浙江總督管巡撫事臣李衛謹奏恭請皇上聖安朕安陳時夏張坦麟皆係汝向所熟識伊等近日大相齟齬不啻鑿之與枘但二人頗著清操猶係實心任事之臣朕意以為果皆公正無私斷無不和之理今彼此參商其中必有一是一非朕一時淄澠莫辨爾等壤境連接孰是孰非諒必有所聞見何由致於如斯據實奏陳毋得絲毫涉於偏袒同日又奏為聖主加恩愈重微臣愧感難安謹具摺恭謝並繳御批事雍正五年十一月二十二日臣於紹所掣驗引鹽接準吏部咨文欽奉恩綸特授臣為浙江總督管巡撫事又於二十六日據齎摺千總恭捧皇上批回奏摺一匣并傳旨恩賞臣母人參四斤貂皮二十張又賞賜哈密瓜一圓到臣當經兩次虔設香案望闕叩頭恭謝天恩隨將恩賞珍品齎捧回署扶掖臣母汪氏匍匐跪迎叩頭謝恩祇領訖伏念臣自荷皇上聖恩拔擢以來數年之間洊膺封疆重寄感激夙夜圖報未遑今蒙更沛殊恩特授總督又蒙頒發珍物至優極渥俾臣老母得以沾被恩榮舉家欣慶無巳且臣伏讀皇上御批指導愚蒙詳細訓誨開誠布公無微不照生成厚恩至於斯極循環捧誦涕淚交零臣雖不能博通往事但常見古來人臣中有胸藏經濟而知遇無由欲邀一命而不可得者抑或稍秉孤介鯁直之性即為群疑衆謗所歸終身不能表白致罹罪戾者臣獨何人以淺陋粗率之資又復未嘗學問即竭盡駑鈍不過勉辦分內之事仍仰荷聖主信任五載之中超擢不次邀榮至此返心自問何以克安此臣之不勝感深滋懼而愈覺仰報無涯也惟是臣待罪海疆將及二載一切戎事有督提二臣專司臣即留心不過分其責任今蒙天恩授以總督則全省水陸軍機俱係統屬事務益增繁劇豈臣菲材所能肩荷况武職全才更是難得必深察各將辨之性情猷略與各地方之形勢機宜方能去短取長隨材器使愚陋如臣難以自信是以聞命以來恐懼倣徨較前尤切今既不敢上違恩旨勉為就職竊恐有負重任伏惟皇上如天覆地載臣之魯鈍久在包容之內仰懇聖慈時加訓飭庶幾事有遵循并望天恩預選賢臣早膺重寄以免兼顧不遑致有錯誤之處除另疏具題恭謝天恩外臣謹繕摺奏謝所有奉到御批奏摺理合一并恭繳伏乞皇上睿鑒謹奏覽卿奏謝知道了朕向在藩邸謹守節度實未留心吏治亦並未交接一人是以踐阼後三年內所用大小臣工皆從輿論中搜羅鑒拔者居多今御極五年矣無時不以得人為務況封疆巨任節鉞重權寧有不愼選精擇而輕相倚信之理卿偉器也洵堪為國家梁棟但堅守初心勿移勿二何任不克肩荷每見人情富易奢貴易驕祿位漸崇則利害榮辱之念愈深能不隨境而轉方為大丈夫即朕躬亦日加返省曷敢放逸我君臣果如是乾惕無間行之有恆雖不能嫓美古昔哲后名臣諒不至貽笑於後世詩不云乎靡不有初鮮克有終所慮者惟此耳期共勉之因卿奏內有恐懼倣徨之語援筆書此以諭時夜巳過半矣同日又奏為恭請欽定嘉名懇賜御書匾額昭垂萬古事竊臣前因杭州西湖北隄有聖祖仁皇帝南巡駐驆行宫不敢作為地方别項公所奏請皇上欽定嘉名御書匾額延訪高僧於中焚修頌祝永垂不朽等因仰荷臣隨批令孔育璞差人前往該僧所住江寧祖堂山內相延去後今巳至浙臣見其人頗有德行質紹所掣鹽先於初九日協同在城文武官員親往將原存物件逐一分晰查點所有寶座几案錫燈燭臺甚多除留存本處外雲林理安靜慈昭慶四大寺各分數件俱為供佛之用其玉玩銅磁等物精粗不等俟選定後擬繳送至京收貯今臣尚未回省據署藩司蔡仕􅘎杭協副將李燦稟稱巳擇於十一月十六日司道各官公同將僧人元度送入住持是日杭城內外紳士軍民商賈等以及諸山僧衆數千餘人沿途迎送不約而同各於殿前焚香羅拜歡呼祝頌等因前來可見民情愛戴之誠出於實心不能自巳理合恭摺奏聞伏候皇上欽定嘉名頒發御書匾額到浙臣當遵奉敬謹摹刻懸挂勒石將見萬代瞻仰埀之永久而無疆矣為此謹奏匾額候書就賜來同日又奏為遵旨覆奏事竊臣於十一月二十八日接準部咨議覆四川撫臣憲德所奏請停緩浙江赴川省買米一事奉旨依議浙江以銀八萬兩赴川買米為數太多準其在川買米二萬石其餘著李衛於江西等省採買欽此仰見皇上酌劑盈虛因時制宜無不盡善查此案臣前經題奏聲明若四川今歲米價昂貴即將原銀寄存蜀庫在案今蒙聖諭準買二萬石自應遵旨專差辨員馳赴川省行知委官遵照但諒到川程途為日巳久誠恐未經奉旨之前或於二萬石外有買就多餘之米或巳經買足者若押令在川復行轉賣必為商販掯勒出入折耗自多而盤費水腳無著於原領銀數缺少則錢糧即有虧短可否念巳經多買之米究與現買不同恩準運回抑或川省需米既殷即將二萬石以外者儘數留存分貯彼地官倉以僃積儲其浙江動用過買價腳費臣於本省開銷撥補則浙蜀二處蒼生均得沾皇上一視同仁之厚澤矣至奉諭旨令臣於江西等省採買臣查各省米穀惟四川所出最多湖廣江西次之今歲川省需米禁止多買而湖廣收成稍歉亦必取給於江西訪聞彼地米價不為大賤加以腳運之費恐買回較浙更貴臣愚以為今歲亦應暫停採買惟是前項銀兩運去之時川河雖險然上水多加牽挽尚可從容宛轉而行無甚踈虞今回棹江流迅激萬一遇險損失約所剩五六萬兩之多實屬可慮若由陸路棧道運回則腳費更為不資查川省每年原有撥解協餉仰請聖恩準將買米所餘銀兩留存四川藩庫僃用於浙省解部京餉內扣除歸款一轉移間似於兩省皆有裨益臣恐具題遲緩故差員星夜齎摺奏聞伏候皇上批示欽遵並懇就近飭知川撫臣憲德酌定兩便之法辦理庶無往返岐誤為此謹奏據奏巳有旨矣同日又奏為恩諭特頒官民頂戴無涯謹擬奉行辦理之處請旨欽遵事竊臣接準部咨恭奉恩旨特念浙江嘉湖二府舊時糧額稍重將正賦減免八萬七千餘兩永著為例又於杭處等九府正額銀內留存十萬兩賞給浙省各官養廉同通省舊有耗羡一十四萬兩令臣酌量官職大小地方繁簡秉公派定數目奏聞餘銀存為本省公事之用欽此臣跪讀之下隨虔設香案望闕叩頭恭謝天恩敬將恩旨刋刻遍行宣布凡屬臣民莫不歡欣鼓舞感戴聖主施恩格外埀惠無疆現據嘉湖二府地方官轉據紳襟士民呈詞紛紛具詳陳請代題叩謝聖恩并稱伊等感蒙皇上非常恩德願將每兩減免一錢正賦內扣出十分之三永減佃户租米俾億萬窮民均沾聖澤等情此皆皇上德盛化神至誠感格遂使浮薄之俗竟有忠厚之風臣不勝額手稱慶現在彚齊大小各官咨詳分疏另題外合先奏明至於各官養亷銀兩實蒙皇上體恤深恩留存賞給但臣愚見國家正賦歲有常用何敢因臣下身家之謀輕易擅動查浙屬州縣舊有耗羡十四萬兩有奇內經前署撫臣石文焯等議於通省額徵錢糧內每兩提取耗羡二分五釐解貯司道庫內抵為京餉添兑挂平飯食及彌補從前無著虧空解部之需此外俱未擅動臣前於酌議浙省公事經費案內奏明在案今既蒙聖主有賞給各官養廉之恩旨則耗羡一宗儘可足用惟有巳經提取之項係歸補庫帑者乃地方第一要務未便缺少可否即於恩賞十萬兩內僃用止將耗羡十四萬內通融分給則凡從前並無取給耗羡養廉之大員以及未有經手錢糧之同知通判等官皆得普遍均沾雨露而人人感戴無窮矣再臣前奏通省各項公務必不可巳之事除以馬械解户雜款九千餘兩及鹽商願復程費二萬六千兩抵用外每年尚缺津貼本省修造戰船工費銀一萬餘兩今蒙恩旨餘銀存為本省公事之用可否亦於賞給銀內暫行支動足數辦理俟兩三年中無著虧空解部完清之日即將前項銀兩抵用停止動支使目前緊要軍工得以完僃皆出皇上特沛之天恩也此外尚有餘銀少半皆係正額賞出公帑豈可任意輕用或地方偶遇偏災軫恤乏食窮民或緊要農田水利可以救濟蒼生又如天津旅順戰船凡遇成造拆修年分不敷工料運腳等類原不在每年常例津貼之內者又奉旨著令會同將軍臣鄂密達於浙省駐防各旗挑選壯丁習學水師將來需用添設戰船除部價外亦須另有津貼并從前題結各案買補還倉米穀價值多寡未敷之數有關倉儲必如此等實在緊要公事於國家民生有益方敢核實數目於此項支用不使稍有浮濫庶無負皇上蠲賦軫恤官民之盛心而地方亦得實在辦公之利益矣如蒙俞允容臣詳查各州縣實徵耗羡多寡細數除各官中有巳經議給養廉者無庸再賞外其餘酌量官職之大小地方之繁簡秉公派定數目請旨定奪抑或竟將皇上恩賞之十萬兩添入耗羡十四萬兩之內不必分晰統算議給各官養亷餘銀存庫以為本省一切公事之用臣未敢擅專亦不敢冒昧具題合先繕摺請旨伏乞睿鑒指示欽遵為此謹奏所奏朕命怡親王等詳悉密議今將議覆之摺一併發來爾其查照遵奉辦理同日又奏為奏聞事竊臣在紹所掣驗引鹽據石門縣稟稱有巡鹽船隻在於該縣地方黑夜之中與岸上多人鬨鬧致死郁彩章一名眉角帶有鎗子傷痕臣隨批令確審因何故聚有多人與巡船抵鬭起事根由各實情驗明通報并差役將在船兵丁查出押發該縣收審去後隨據外委千總韓子儀暨韓景琦稟稱十一月十六日在石門縣地方拏獲私鹽二起將人鹽親押交縣出城巳及二更忽聞有所帶守口兵船追趕鹽船到地被岸上多人幫助鹽徒攔路打傷巡船兵丁衆梟鎗石交加乘機逃去訪聞係毛七在內鼓衆拒捕等情臣未敢遽信即差委辨員替換巡緝將韓景琦一并飭發該縣質審虛實並令確查毛七是否梟徒在內拒捕拘訊間又據巡兵盤獲鎗手孫文信等四名持有鳥鎗四桿內逃走一人其鎗上雖皆鑄有獵户字樣而孫文信姓名不同且是夜即係輪班管守橋柵之人又在場幫助打鎗其中似有别情并續訪聞有嘉興批驗所書辦吕姓家人吳大通梟糾合等情臣查石門一帶為私梟出沒孔道向來官差緝私緊急即有地方棍徒幫助梟販明知巡鹽官船反稱匪人喊呌黨羽混行打奪放脫鹽徒之弊今此案是否地方助梟黑夜混雜放鎗所斃或係鹽徒拒捕致傷并果否辨兵因巡鹽誤傷傍人或無故生事致死平民現飭司府縣各官秉公確審務得實情不令梟徒結黨陷命致長刁風亦不因係臣差委巡緝稍有寬假致民命無伸統俟審出實情另行分晰定擬題結外合先繕摺奏明伏乞聖鑒謹奏此等案件稍不虛公必將增出無限波瀾探水須探其源務宜究明情故方可永杜惡風硃批諭旨卷一百七十四之五欽定四庫全書硃批諭旨卷一百七十四之六硃批李衛奏摺雍正六年正月十九日浙江總督管巡撫事臣李衛謹奏為據實覆奏事竊臣於上年十二月初四日準內閣包封發到欽奉上諭著今行查十月初九日烏鎮地方有鴨嘴船被盜劫奪打壞船隻傷斃多人并惡賊黃魚大王滋泥大王為害行旅何以不行查拏懲治等因臣不勝惶愧悚栗查烏鎮係浙江之歸安烏程秀水桐鄉江南之震澤吳江六縣接壤素係藏姦之處曾經臣題明將湖州府同知移駐此鎮専管捕盜事務遍查秋冬所報盜案並無此宗情形隨飛飭嘉湖道二府廳縣并各協營汛上緊密查嚴拏外又潛遣親屬改扮商賈分往各處緝探皆稱上年秋冬相近烏鎮一帶未有失事臣因地與江南交界恐犬牙相錯之區彼此推諉隱匿先經密咨江南督撫提臣會同查拏又照前差人密往蘇松各處及太湖泖湖地靣遍加訪查止有上年正月二十七日震澤縣之濫溪地方有鹽商汪姓者被劫曽經傷人一名並非十月內之事其黃魚滋泥二惡賊江浙兩省交界地方挨查無蹤臣思由烏鎮走濫溪一路乃蘇杭往來孔道若有大盜劫傷十餘人自必遠近傳聞地方文武即欲諱匿斷難盡掩道途之口但此事必非無因故先將素日巳獲積賊曹大曹二嚴加究訊是否另有混名歷審數次亦非其人止據供出伊乾娘巨窩雌老虎沈吳氏并其妹鈕吳氏所通盜賊甚衆又臣到任後曾會同江南巡察王肅章查拏烏鎮相近嚴墓地方庇賊巨棍金三積窩周永明因事在隔省王肅章又别巡上江鞭長不及該管之震吳二縣恐蹈失察之咎明知故縱聽金三倩人頂替審豁漏網臣今一靣咨會江南督撫並行蘇松太道魏觀密拏解浙其周永明沈吳氏窩盜情形俱有案卷證據無可抵賴惟金三本名士吉住居江南地界又改名金去疾冒籍湖州歸安中舉專為漁船盜賊坐主凡有事發投靠者不惜千金救援又與知縣往來甚密在嚴墓鎮邀結黨類借故竪碑禁止兩省捕役不許到彼地拏賊否則即行聚衆劫奪該犯乃係暗中觀稟稱巳奉有牌行到道令其留蘇審後再發因賊但嚴墓逼近烏鎮多係匪人結連為盜實屬兩省交界之巨害容臣另疏參革職銜分别審明再為歸案具題完結臣重蒙盜為害地方惡賊臣必不待四月害將臣與地方文武各官失察之咎一併交部嚴加議處則商民行旅仰戴皇恩於無既矣臣不勝惶悚之至為此具摺謹奏覽同日又奏為奏聞掣過引目事竊臣前將去冬衆商廣辦場鹽比舊約增有二十餘萬之處先經附摺奏明今歲內巳經掣畢四所兩季共有五十七萬七千九百餘引合之一年四季共掣過九十四萬一千六百餘道較之定額七十一萬三百二引之數實多二十三萬一千有竒若今歲再能如此則歷來壓下半年引目不但趲出足數且可透掣下年之鹽課餉雖不能明加贏餘而暗中巳可每年多得錢糧數萬矣至臣經過四掣將少銷不銷之處設法疏通移於多銷地方俱經銷完查引課有上中下三等又有票引科則更輕在從前不銷之地引課既巳攤完今緝私有效復得將剩引納課編配實銷則此項即屬溢出再上則地方引巳銷完不足民食將未銷下則及票引輕課添於多銷之處仍照重則完納又有多餘臣兩年以來積零合總共計一萬七千三百一十八兩零又清出前鹽臣噶爾泰等任內四千三百一十三兩零二共二萬一千六百二十一兩零俱陸續飭存鹽驛道庫一并充公應否以之修理寧波等府各處城垣無項可動之大工抑或將來有整頓鹽政各種公務題嗣後每年所得數目再當奏明充公如何項動支仍行請旨欽遵再欽奉諭旨兩淮條議鹽政事務交臣與范時繹噶爾泰會同確議具奏欽此臣何敢不詳愼籌畫諒兩淮鹺務與浙省大概規模相同但從前如何查收竈鹽分别肩票各引並緝私之法向係專委何項官辨兵役作何稽查及地方疏銷難易等處臣未得悉知當即將兩浙鹽政條議事宜飛移江南督鹽二臣查明彼地鹺規咨覆到日容臣悉心參酌另行會題請旨遵行又臣前奏石門縣巡鹽兵船致傷郁彩章人命一事欽奉硃批此等案件稍不虛公必將增出無限波瀾探水須探其源務宜究明情故方可永杜惡風欽此仰見皇上愼重民命懲創私販刁風至意臣查此事非比平常案件若民受誣枉則人命無伸衆心不服若兵受委曲則私梟長志鹽法廢弛誠恐知縣職卑權聖明揀選皆顧惜聲名自重品行者庶幾可免前弊俟該府等會訊明確定議具題合併附摺陳明謹奏覽雍正六年二月二十五日浙江總督管巡撫事臣李衛謹奏為奏聞全浙雨水年景情形上慰聖懷事竊臣仰見我皇上敬天勤民撫育萬邦惟恐一夫不獲其所兩年以來於浙省偶有纎芥偏災稠疊恩施有加無巳聖心上格穹蒼惠及黎庶去年夏秋以後雨水調勻三冬晴暖瑞雪應時五風十雨直是堯天舜日景象民心大為安樂雖間有曾被蛟水之零星數處稍覺偏枯而鄰境左右俱係豐熟柴米價值平減小民有可通融不致艱窘是以蒙恩折漕數內竟有不用追呼勉力支持仍完本色漕米趕副冬兑限期者更喜今歲二月十八日奉旨各省同日舉行耕藉之禮臣敬謹從事不敢稍怠乃地方上得卿如是體國愛民之督撫感召休徴雨暘時若朕可保其必然不爽向後倘偶有過愆當修省之際置身家利害於度外惟竭誠專為國計蒼生禱祝朕可保其響應更必不爽果能篤信此理而力行之乃兆庶之福朝廷之福亦卿等無窮之福也欽哉毋忽同日又奏為據實奏聞事竊照藩司一官不但為通省錢糧總滙凡一切理財用人地方大小事務無不經由該衙門核議轉詳此在各省皆然而浙江諸務殷繁又數倍於他處故其經承衙役衆多蓋由辦理繁劇使然而其作弊舞文又實以浙江吏役為最臣到任兩載藩嘉興府知府喬世臣經臣從前奏明調來署內協辦事務該司素知其人即具詳請委其赴倉監看十日之內將各縣南米收完而停滯巳久者篩揚折耗甚重則巳無可如何矣又如收買銅斤各局紳襟百姓紛紛呈繳該司發銀稽遲多致守候又近日搶修海寧塘工更屬緊急乃辦員屢詳領銀不給以上臣皆催之再三亦未能應且常有竟不回覆音信俱無者諸如此類不可枚舉然又非該司懶惰偷安有心遲延緣其文書收發必親手上號親身傳遞視一巳外别無可信之人吏書日行稿案每事必取具實係斟酌妥協不敢受賄作弊如虛甘罪之押結而後輾轉再三方始判行在事之小者既因此而枉費精神耽延仍然諸務叢積臣見其形容憔悴神情散漫竟為案牘所困深加憐惜極口苦勸據稱案件緩急實委定海遊擊黃有才兼為統巡春季洋靣近又奉不能克勝此大省繁劇之任臣先以為新到未能熟練今日久漸覺堆積壅滯若再避嫌疑而存徇國家公事綦重恐有貽誤伏祈聖鑒謹奏覽同日又奏為覆奏事竊臣欽奉諭旨令臣將陳時夏張坦麟二人孰是孰非何由致於如斯據實陳奏欽此臣奉命之下隨將伊等因何事參商緣由密差確訪去後探得本年正月初一日張坦麟起程前往江寧陳時遂互相猜疑傳説不一至兩人辦事不合之處大概皆因蘇州知府溫而遜楊州知府吕大雲二人在陳時夏以為雖有公錯其才尚可辦事如詳委銅斤解官與例不合及屬縣失察容留旗員干涉知府參罰等項數事陳時夏同督臣范時繹之意欲將二人寬容而張坦麟堅執不肯依從乃陳時益之道至聞得近日陳時夏於公所接見衆官之奏不敢稍有偏袒伏祈睿鑒又臣前奉諭旨著察訪常保住前途行為今差往廣東澳門之人巳回探得伊等去時於十月初四日過江廣交界之梅嶺有南安營備執事迎送用差馬四十匹人夫九百名初五日於廣東南雄府地方下船共坐驛站船二十六隻自初七到韶州起至十二日晚到廣東省城俱有兵馬穿盔甲站隊十三日常保住進城在貢院駐劄來使麥德樂在左翼鎮衙門作公館署撫阿克敦以戲酒款待二十二日起行委惠潮道護送二十六日抵澳門到時有澳門夷人各執紅毛鎗械穿藍色號衣迎接張燈演戲慶賀三日常保住留居澳門至十一月初一日始起程回京澳夷所送程儀西洋土産等物因鬼子語言不通無由知其確數常保住回來起旱時在香山縣用夫八十五名過梅嶺用夫一百三十四名水路坐船大小五六隻不等去時所過府縣各送雙下程酒席十桌八桌不等俱從豐厚常保住悉行領受回時比前減少亦有不收者沿途文武各大臣俱止向常保住恭請聖安其接待夷人稍覺太過然亦無甚失體之處來使麥得樂等住澳門良久於十一月二十四日始回西洋去訖緣係奉旨沿途察訪情由理合一併奏聞謹奏覽雍正六年三月初二日浙江總督管巡撫事臣李衛謹奏為奏明事竊臣叨荷重任夙夜黽勉不敢自寧所有營伍武職事宜現在逐一確查分别緩急次第料理惟是沿海地方洋靣其形勢險要汛守情形并營中甲械之虛實操練之勤惰非身經閲歷未敢盡信意欲剋期兩月親往巡查但臣以一身而兼理三衙門重務在督鹽兩處之事尚可隨路辦理而巡撫衙門所管錢糧刑名甚繁且水陸兼程逐日行走命盜各案難以沿途解審又目前正二去處搶築迎水壩數座先分順其勢并倣河工加親往勘議即順路查閲海寧仁和新開河道此數事完後巳值農務將興又兼各項奏銷并掣鹽期近難以逺出臣擬於八月中俟上遊數郡早稻收穫後輕裝由紹寧台溫及玉環山沿海岸而去從處衢金嚴內地自錢塘江而歸一路察勘地方山海形勢簡閲器械軍伍其巡撫印務查觀風整俗使臣許容巳經回浙本任無甚要事請暫交許容管理庶現審案件出入錢糧不致稽遲貽誤而臣得以放心前往將耳聞目擊之事盡心講求有應斟酌損益者再行請旨以稍盡感激圖報之微願此雖在本省行走不敢擅便理合奏明伏候皇上批示庶得預行料理為此謹奏所奏雖是然亦不可預定成見至八月間看地方事務忙間情景若必應巡視察勘臨期具疏題請候旨遵行同日又奏為恭繳御批事竊臣前差齎摺把總自京捧回御批奏摺一匣臣隨敬啓跪讀祗領聖訓欽奉遵行所有皇上恩賞浙江各官養廉銀兩一事現在照依王大臣等議奏奉旨事理查明各屬歷來所收耗羡多寡數目核實秉公派定另為分晰奏明存案至江浙交界地方積窩惡賊查拏甚多頗有屢經犯案漏網大盜緣地連兩省每至影射作弊如在浙供出夥賊前行江南震澤縣提拏內中竟有姚天生姚二兩犯以替身起解為浙省押往認識之張德隆指破而此案又經江南督臣范時繹批發江蘇臬司留審未得歸浙併究今庇賊首惡舉人金士吉等巳質明有據臣現在另疏參革職銜遵旨嚴訊務在提齊江南所留案犯窮究黨羽剪除巢穴鑽營之事參奏知州五綱昌荷蒙特頒訓諭行今各省督撫知之仰見我皇上整飭官方杜絶私弊提撕警覺至於再三夫地方廣濶情偽百端誠如聖諭豈無不肖之人招搖生事借名撞騙即臣初到浙江以後彼時所屬官民尚未知臣之心迹有紹興無知少年之徒馮如溥因其父係臣原籍徐州豐縣典史竟敢公然投稟鑽營輒以平湖縣縣丞張萬銓求署縣印當經立拏重處其張萬銓提到究出被哄情由正在敘文咨革適巳患病身故又臣從不識靣之遠族李謙突爾來浙臣恐其不肖拒絶未見發與盤纒銀二兩令其速歸安分乃伊輒往石門縣投帖招搖指冒生員名色稱係巡撫乃姪索借路費經石門縣密稟臣即嚴行該縣重責四十板鎖押遞解回籍各在案自此以後外人亦知臣不可嘗試俱巳畏懼斂迹以上事件因案內無應參之官是以重懲發落未曾具聖諭訓誨用敢附摺陳明謹將御批奏摺並賜發王大臣等議覆原摺一併恭繳伏祈睿鑒謹奏覽雍正六年四月初六日浙江總督管巡撫事臣李衛謹奏為恭謝天恩事雍正六年四月初三日臣前差家人自京捧回御批奏摺併領出欽蒙皇上賜臣皇輿圖十副到杭臣隨出郭跪迎回署虔設香案望闕叩頭恭謝天恩祗領訖欽惟我皇上德敷九有澤被八紘大一統之車書緯東西而經南北合萬方之玉帛和風雨而順陰陽固巳嶽峙川渟獻河清之嘉瑞從此山深江永慶海晏之綿長矣乃帝德淵涵俯察疆隅於八表聖心廣運爰圖區宇於四維自畿輔以及要荒川原比櫛溯侯甸而周藩衛繡壤交榮立分率以審逺近之差設凖望以正會歸之極又復詳道里而分高下覘度數而定方輿在裴秀之賦六體不能盡其精詳即倚相之讀九邱豈足方其奧衍臣猥以淺陋得被寵榮覩此皇輿之式廓即知聖衷之運量無處不周仰兹玉軸之精華愈思睿鑒之淵深無微不到藏諸什襲永為希世之珍埀於子孫奉作非常之寶理合具摺恭謝天恩臣不勝欣忭感戴之至謹奏此圖乃皇考於萬幾餘暇躬親考究經營數十年方始告成應加意珍重者同日又奏為恭繳御批遵旨覆奏事竊臣於本年四月初三日欽奉硃批發回奏摺三件跪讀訓旨感格之道惟在至誠公私之分此實上下孚應深賜佑今年通省春花俱十分豐熟及杭嘉湖紹等府蠶桑頗好在此一月之間均可收齊至臣所奏彭維新居官辦事一摺伏讀硃批諭旨聖主不得巳用人之苦衷與委曲造就人才之至意無不開誠布公逐一指示實有使臣下感激而涕零者况以皇上萬幾之勞尚為天下督撫區處政務如直隸全省事無巨細皆勞宸衷臣受恩最深仰體實切凡有微力所能兼辦設法可以成全之處自當竭盡心力以期恪遵諭旨稍慰聖懷至奉諭旨浙藩員缺若知有可以克勝之人即行薦奏勿以地方大吏而避嫌不舉欽此臣思浙省兩司事最繁雜勝任實難其人至彭維新苦心要好亦肯盡力任事惟其遊移多疑牢不可更是以諸務堆積未能擺脫若觀風整俗使一官於錢穀刑名固皆所管然不過總稽大綱旁察弊竇無須事由巳定且查錢糧回浙以後臣見其舉動行為似乎閲歷已深商量公務諸事平穩較向日之褊急居心惟求占人地步自見竒異不顧實在於吏治有益之處竟能改革臣愚以為與其使彭維新調回京中操也再如孫國璽之居心才幹實屬難得皇上已授以汀漳道要省之任臣何敢岐視彼此復有瑣瀆惟是臣訪問閩省舊員並現任福建糧驛道李玉鋐前來江浙辦銅臣又加詳問俱云汀漳道雖則職任全省海防但洋靣盜案諸務文則有臬司統轄及各知府專管武則有汀漳二鎮為主該道於專辦料理之事甚少其兩屬民俗蠻野獷悍罪非屬己身侵那且榖石已經衆民代完離任環繞呼號實有不捨情狀此人委屬可惜倘蒙皇上察訪其由尚為堪用可否特沛殊恩使之於汀漳道任內戴罪效力民心感悅天恩必致改惡遷善設以為未便復用閩省懇祈發浙作何酌量差遣之處候封疆之選庶以仰報我皇上造就人才之至意再臣所奏溫黃二鎮皆長於陸路未諳水師一節奉靣見才幹熟悉洋務但恐其居心頗深臣一時未能灼見不敢冒昧查巳升瓊州副將高升漢仗過人水師亦諳性情鯁直堪僃總兵之選再杭協城守水師副將李燦其辦事操練前摺僃晰陳明該員雖聖主推心置腹不以愚陋見斥不以嫌疑顧忌特將本省布政司總兵等官令臣酌舉所知臣感戴激切用敢以微末臆見密封直陳於君父之前是否可採一經聖明鑒照自有大中至正之乾斷非臣淺識所敢妄議也理合遵旨覆奏並將奉到御批奏摺一併恭繳伏乞睿照施行謹奏覽同日又奏為奏明事竊臣齎摺家人自京回杭聞臣前次所題僃陳鹽政條議部內議覆會題稍遲字句未合致蒙皇上查詢主事張復回奏含糊欽奉嚴旨革職通飭各司官員臣雖未見部行不知詳細原委但以微臣之故致於上費天心煩勞聖慮臣撫躬局蹐無地自容查張復係雲南人臣從前在滇遍歷鹽井查勘地方情形之際偶因天晚無處安歇於山僻中搭蓋松毛棚屋暫行住宿在張復門前伊來出迎彼時尚係拔貢生臣便中問知其家貧親老少年苦讀曾贈以膏火之資後伊中舉進京會試時缺乏盤費亦量為資助是張復於臣或非出於有心惟奉旨查詢時不據實奏明反多支飾其罪何辭但緣臣一身而使部員獲咎臣心何能自安是以將臣與張復平素認識緣由據實聲明於聖主之前自蒙洪慈鑒察非臣所敢妄邀天恩於格外也為此具摺密奏臣不勝凛惕惶悚之至謹奏汝被張復瞞矣此事確係伊有意而為若非怡親王精明不能察出實情日後汝自得知僃細處分毫無枉抑朕尚謂過於從輕也硃批諭旨卷一百七十四之六欽定四庫全書硃批諭旨卷一百七十四之七硃批李衛奏摺雍正六年四月二十一日浙江總督管巡撫事臣李衛謹奏為奏明事竊臣荷蒙聖恩特授浙江總督管巡撫事於上年十二月初三日接準吏部兼銜咨文因未奉有另給總督關防之議隨經咨部請示復荷皇上天恩今春頒發總督敕諭并另給浙江總督管巡撫事關防到浙臣隨題明謝恩祗領至本年三月二十日準到吏部回咨令臣將巡撫衙門敕諭關防繳部等因臣即應差員齎繳因三月初二日業經具摺陳奏擬於八月間請準查勘沿海洋面通省營伍及新開玉環山等處地方情形將巡撫印務暫交觀風整俗使臣許容辦理此摺未奉批回不敢據行呈繳今臣前摺巳蒙御批所奏雖是然亦不可預定成見至八月間須看地方事務忙間情景若必應巡視察勘臨期具疏題請候旨遵行欽此臣查浙江去京遙遠本章往返等候部覆最快亦須四五十日臣於七月初旬即當具題請旨瞬息即屆但浙江巡撫衙門事務甚繁臣出巡往返計將兩月若非有專員暫理則恐致有堆積遲誤而本章文移又必須印信為憑所有巡撫衙門致有岐誤但巳準部示臣不敢不行奏聞致滋遲延違部之愆除另行咨部展限外理合具摺陳明伏祈聖鑒謹奏朕兹欲命許容往福建審理范廷謀之案至時汝另行酌量一人奏請可也同日又奏為請旨事竊照杭城素多火災其中因民居稠密不自謹愼而起者固多然竟有凶惡棍徒暗中糾黨於市㕓熱鬧家多饒裕之處潛行放火沿燒乘伊倉惶搬移之際混入劫掠沿路打奪名為搶火此外如嘉湖紹三府桐鄉縣乍浦等處亦有此風先經臣飭行各地方文武派撥官辨兵役遍處巡查令其於月黑風大之夜更加嚴緊預為埋伏擒拏並分晰出示曉諭敢仍前放火人犯獲住即行處死斷不寬假近皆斂迹而失火之事亦為減少今據桐鄉縣汛把總報稱該縣東門地方上年三月二十二日火焚一百餘家今年三月二十日空屋失火沿燒二間把總遵照前行預在城頭窺探果然次夜又有無人住居草棚緊靠李維鈞家入官封閉房屋忽然火起飛往救滅隨即四處搜查於魚行店外空匱內拏獲朱二寶一名身邊搜出燈籠火煤紙等物交縣審訊據供同夥張永祥蔣二張永昌因無錢用度商量放火欲圖搶奪等情臣隨嚴飭該縣將供出三犯拏獲到官自認不諱惟前後所供放火情形稍有未符臣思立斬之罪莫嚴於強盜然盜劫止於一家尚不至禍延鄰户若放火凶徒所害人户不可限量而房屋家資頃刻化為灰題為時遲緩不足警戒凶頑今朱二寶等雖本日現獲放大之草棚即經救滅如從前兩次俱係該犯等所為實屬罪不容誅現行司府逐細確審若果題完結是否可行伏候聖明批示欽遵又松江府婁縣女梟沈氏膽力過人武藝高強歷來糾衆販賣大私鹽列械連檣羽黨數百各船排列於前沈氏押送於後如保標相似若遇巡船盤詰無不打敗受傷拒捕毆官通盜誣命之事不一而足巳於上年七月十五日據松江府同知金文宗百計偵探始得擒獲臣於條陳鹽務本內不便盡言止列大槩而其凶橫惡迹巳於摺內陳明幸蒙聖明於江蘇撫臣陳時夏奏中批示令將該犯解浙審理臣巳審訊明確事事皆真似此梟婦斷難容其漏網但本內若不盡陳其惡則罪不至死若將其毆官拒捕情狀臚列載入則從抑或仍行解回江南聽江蘇撫臣再為審結臣未敢擅便相應一併請旨欽遵以上二案臣非敢過刻以輕人命實因凶徒積惡為害甚巨冒昧瀆陳伏候睿鑒謹奏覽爾所辦命案尚恐涉於姑息何至有過刻之事同日又奏為恭繳御批事竊臣差進摺千總自京齎捧皇上發回奏摺一匣到杭臣隨叩頭啓匣伏讀御批因海寧縣老鹽倉草塘被潮衝損數處上厪睿懷欽蒙聖訓當敬盡人力精虔祈禱堅其工作合諸衆論詳慎斟酌可保無虞欽此臣自前次具摺奏聞之後隨即起程由嘉興乍浦而至海寧三月初九日在於海塘虔誠祭禱僃具祝文宣布皇上至仁厚澤視民如傷塘堤有關萬姓蒼生疾苦祈求江海潮神仰體聖心默垂庇佑臣披瀝丹忱再三叩禱巳畢親往各處詳細勘視見塘外護沙雖衝刷殆盡猶幸塘裏民田地土俱在高阜可免內灌之虞惟潮勢橫過洗嚙早晚兩次非如黃河水性徑直可以建壩分勢且下皆活土浮沙不能承載巨石隨一面嚴督承修工員上緊堅築草塘草壩以禦坍陷一面多僃料物預防梅雨伏秋二汛搶修工程之用即於回署後具疏睿懷者從前海寧之南門海鹽之東門出城即是大海恙止老鹽倉迤西離城二十餘里原係舊時漲出地方並非實土所以目前草塘仍有將坍未到之處不能必其從此竟無塌陷惟有刻刻隄防隨損隨修加鑲牢固緊防夏秋二汛以為捍護總之事關民生重務臣必不敢略有膜視致費來字內稱黃巖鎮董一隆頂冒功加人言鑿鑿將情由明白奏聞兹蒙皇上硃批此事既真當令李衛據情參奏將朕旨密諭知之欽此知會到臣伏思董一隆在任之時曽蒙諭旨下詢臣經查訪其本屬吳姓冒頂功加及居官不好各緣由上年八月二十二日具摺奏明巳蒙皇上留中提臣石雲倬此奏諒巳久奉批示因其調任赴閩至今始得知會但董一隆離任巳久應否仍行具本題參抑或據臣前摺降旨敕部議處臣未敢冒昧伏候睿鑒批示欽遵所有奉到御批奏摺理合恭繳謹奏將爾前摺所奏緣由暨石雲倬開列各款一併敘入具疏題參同日又奏為叩謝天恩瀝陳覆奏事竊臣於皇上批回原摺匣中奉有密封發來部臣黃炳等前後奏摺二件內奉硃諭此係朕批黃炳等之奏爾看其中或有他故否可密之若泄露一人則大不是矣欽此又奉硃批此事爾為何未加詳審即行具奏耶欽此臣跪讀天語並黃炳等摺內批諭惶悚感激痛心淚零伏思人臣之事君惟此一片血誠若如黃炳等所奏是臣之朋比欺隱罪無可逭乃蒙皇上不即遽以為實恩賜赦宥將臣與高其倬一並從寬又荷格外隆恩密賜示知問以有他故否夫大賢莫如曽參至親莫如母子而投杼之起不能不信於三告之後今以臣之庸愚疏賤竟得見原於聖明臣身非木石寧不刻骨銜結叩謝天恩惟是黃炳等所奏臣等收闔屬節禮代毛文銓彌補虧空二萬兩之處若不蒙皇上賜示受誣不得而知若不蒙皇上垂問終身無由伸訴今得披瀝肝膈僃陳實情於聖主之前此臣之大幸也查雲南非但督撫節禮交貯藩庫即藩司鹽道節禮亦皆歸併收存此事係雍正元年冬間臣尚為驛鹽道而毛文銓未升貴州巡撫之先彼時因值出兵通省有必不可巳之公用而未便開銷正項者其費無出兩院司道公同商議除臬司糧道節禮仍聽養廉外將督撫藩鹽四衙門陋規分别核減交存藩庫以僃公務臣亦在內同議是實並非因藩庫彌補虧空而設也然臣今日言之黃炳等既誣臣將案卷滅迹必以為信口抵飾不知臣與毛文銓交代時據伊任內除正項外尚有所餘節規銀一千二百二十二兩存下在庫并臣越升藩司後續收前項銀兩及一應支放出兵暨各宗公務動用細數俱有庫官經手造報印册轉申督撫即藩司鹽道衙門亦有存案庫册其中出入巨細無遺且多係陸續詳明兩院批準動給者各衙門皆有先後文稿册案確據臣雖離任巳久尚有臨行時庫官造送登記總數印册一本現在可憑夫以各屬節規為通省軍務並諸項公用雲南官吏萬耳萬目所難掩者豈巡撫藩司反有不知且各衙門皆存檔案而黃炳等敢於盡行抹煞誣臣將此銀代補虧空在黃炳蓄意陷臣固有根由此番赴滇竭力搜尋并欲嚴刑夾訊范溥使之扳扯波及臣若不肖從前稍有瑕隙不知作何下石今幸無間可乘只將此事妄奏宜其未及顧慮虛實而朱綱富貴不肯細查原委反稱並無卷宗臣實不能為兩人解也且謂毛文銓虧空二萬兩之多督撫欲為幫助而臣與之相好特出巳見將通省屬員節禮代為補還是三人之中臣罪更大又以楊名時江芑范溥情願自認之供為證以見其實使臣無可展辨但不知臣原未夢想即可超擢藩司彼之有無虧空與臣何涉而先期代為周旋愚不至此若云實係相好則毛文銓懦弱因循與臣性情行徑迥别焉能投合至於楊名時江芑范溥三人恨臣之故聖明久有洞鑒若非下水拖人則楊名時雖為昏瞶亦不至將通省大事竟爾遺忘甘心自認如此之甚也今臣所存印册潦草繁瑣不敢上瀆聖聰但係實在憑據冒昧附摺並將臣司道兩任交代案內除巳經題報公用存剩贏餘銀十二萬餘兩外又有臨行詳請轉奏之項底稿鈔録一併另匣封進懇求天恩發與黃炳朱綱等追出各衙門所存憑據逐一查對臣若有一毫虛捏願甘朋比欺隱賠補之罪庶臣一生血性朴誠報並非兩項又册內止有於茶果銀內僃抵原任知府張嘉穎虧空一百兩因係從前收稅缺額無著之故合併聲明則伊等結聨排陷題奏作何名目歸款而先行動用等處緊要情節全無絲毫查及顯有開脫情故巳於遵旨明白回奏事疏內略陳梗槩今見黃炳等所敘供看處處周到不遺餘力為馮慶長輾轉苦辨且於奏臣代毛文銓彌補虧空摺內又能將此案中之陳士昻粘卷呈詞俱行砌入以誣臣罪不知陳士昻於前任鹽道領鹽發賣久不繳價臣清查行追據伊循例將薪本課額全完臣因其居官不堪難容多沾餘利行令照所賣價值除腳費外盡行追出充公此亦嫉惡過嚴之事逮臣進京時士昻巳經衰頽病廢仍留在滇著追無可完解原非所虧帑銀不曽入於交代應追挂欠册內例所當然與草豆之案絶不相涉陳士昻老姦巨猾或見臣巳離雲南捏詞混入草豆案內以飾巳之並無不清而黃炳又巧借填入虧空摺內以證臣之實有其事可見黃炳凡關臣之事務搜剔無所不到而獨於馮慶長本案數端罅隙並無一字駁詰此中隱情巳是難逃聖鑒且既稱馮慶長詳明毛文銓令陳士昻就近變價有批準印卷可據則當雲南兩次行文咨追之時馮慶長何不於回文內將此情由敘明令家人陳實赴滇面質乃僅以係陳士昻應繳之項含糊回覆豈獨無案可指此蓋慶長因彼時士昻現在留滇不願對質故不將家人解發而亦未便全以虛詞抵卸情弊顯然黃炳何無察及也至稱山東之銀十月初八日解到初九日即行收庫常德壽給有印收豈肯代賠一半等語竊臣曽任司道凡解到銀兩必向巡撫投批後呈驗發司拆閲交房內外挂號書辦方得送稿懸牌俟示定收銀日期赴庫交兌院司衙門兩處輾轉最速亦得三四日往往有暫寄外庫者此各處解銀之通例别省皆然斷無初八解到初九即收之理據此可見若云常德壽不肯為馮慶長代賠則黃炳所審高其倬楊名時為范溥各代賠七千兩之事亦不應有矣況此銀解到時臣先聞有不收撥回之信及延挨日久止收一半之論近今始聞復又全收之事後經鄂爾泰欲撥貴州軍需楊名時又欲抵補别項正在議論未定因奉到查審旨意不知作何商量竟稱久巳收庫開入軍需撥用此案情由原在趙州採買草豆若知州陳士昻可託當日毛文銓何故不交地方官辦理反另行調委馮慶長領銀赴趙州承辦逮後庫帑無著陳士昻原非善類或與馮慶長先則分肥後相推諉情皆有之而臣職任清查理應向承辦經手領銀之馮慶長是問所以據呈詳請咨提對質原非偏刻今以黃炳事事袒護之處揆之若謂馮慶長解銀即收並未駁回巳經於軍需撥用等事非係滇省各官改造案卷附會斡旋則臣之此心終於不能允服者也在黃炳被臣前疏指破數端彼曽任過山東院司未必不將陳世倌原發咨文月日亦行改換但馮慶長於招遠縣任內請咨起解詳文經由各衙門批準恐一時未能盡行抽換倘得於此中密查或者月日正情難掩否則上下衙門共相彌縫欲求剖明其中實情終難得矣至臣在滇時因馮慶長家人屢提不到故未曽審逮抵浙以後雲南屬官因事故離任者或係浙籍人氏或由杭州告伏祈聖明睿照總之臣因公招尤巳久若非我皇上聖明保全不能至今惟有感激圖報亦無他辭可措謹將被誣情由瀝陳覆奏何敢稍有泄露以負厚恩仰求聖慈鑒察謹奏覽雍正六年五月初九日浙江總督管巡撫事臣李衛謹奏為奏聞事竊查浙江通省田地高窪不同歷來收成未能普遍豐稔獨今歲雨水十分調勻春花豆麥各處大熟此時盡巳收穫萬民歡呼現在插苗矣海寧老鹽倉塘工臣遵旨不時虔禱又於五月初一日親往致祭正值潮來之時隨宣布結到日另行題報所遺員缺皇上任使自必得人臣何敢妄參末議但查寧波知府孫韶素日聲名頗好臣初時惟慮其尚少風力今則大有振作辦事一切認真竭力訓誡屬員常至形於聲色是以官民警惕積習漸改臣看此人實為可用但年近六旬體不甚壯恐其過於勞瘁報效不久殊覺可惜寧紹台道雖管轄三府然止須任使其現護海關事部議準補知府江承玠操守聖鑒再大理寺卿性桂巳經到浙公同臣與觀風整俗使許容彼此商酌所有分頭清查各事務聽性桂主稿定議另行會題臣看其光景家計未必從容有餘現在所需本身用度及出門盤費等項自不能少若此時為之料理僃送不但臣有蹈私之咎即性桂亦必不敢收受若視其艱難置之不問亦非同在地方辦事之在省出外可以通融濟用庶使安心料理無缺乏之憂矣合併奏明候旨遵行又本年三四月間浙閩交界之平陽縣陸續來據地方文武具報到杭一靣飭令逐户安頓不時稽察一靣飛移福建督撫諸臣查覆緣由俟秋成之後再為設法使之回籍不致失所恐嗣後仍有續來者人衆食繁自當因時措置相應附摺陳明為此謹奏覽同日又奏為遵旨酌量分晰恩賞養廉數目仰祈睿鑒事竊照浙省恭荷聖主格外特恩動支正項錢糧十萬兩同通省耗羡十四萬兩令臣酌量分派賞給各官養廉餘存為地方公事之用臣欽承恩命將作何分别賞給留存之處先經具摺請旨遵行本年三月初二日欽奉皇上發到王大臣等定議覆奏之摺臣隨欽遵公同酌議除臣前奏巳有養廉之觀風整俗使學政織造布按兩司糧鹽杭嘉三道并新設玉環同知亦於題疏內聲明均毋庸再給外其將軍衙門雖巳有部準鹽規內存留養廉銀一千兩但較之觀風使等官定數太少應請再為量加銀六百兩尚有將軍隨印筆帖式四員甚屬清苦共給銀四百兩以作每年幫補之用至督撫衙門除養贍家口本身用度延幕辦事外尚有各項公務之需每處約得銀一萬兩內從前總督原係兼管福建今蒙天恩授臣浙江總督不為定例應仍照兩省各半之數止給銀五千兩緣臣一人兼理惟將此總督衙門之五千兩祗領皇上恩賞為一切本身應辦公事之用再將從前奏明鹽政衙門舊存養廉之四千八百兩添補從此可以不致缺乏其議給巡撫衙門之一萬兩臣任內仍留存司庫充公俟後來撫臣支給此宗為養廉再副都統四員從前有鹽規內留存固山大船政同知銀五百八十兩因為數無多四人難以分用向議遇有公務進京盤費及婚嫁搬家等事支給今除此項仍照舊存留陸續幫給外每員應各添與養廉銀五百兩倘蒙皇上於此四員內派往乍浦統轄水師滿兵者則該都統有出洋督率之責各項費用倍繁此一員應加給銀五百兩庶免艱難至寧台溫處二道各有承督造修戰船除應領部價津貼仍不無賠補之處每員應各給銀三千兩至於知府同知通判州縣等官其地方衝僻事務繁簡各有不同均宜分别酌給所派數目不敢於摺內繁冗瑣瀆另為統繕清單恭請聖鑒其司府首領教職州縣佐雜各員雖屬微末小臣當此皇恩普被之時似應使之均沾雨露但此等官內地方有苦樂之分辦事有勤惰之别若盡議賞給不勝其多逐一較量又覺瑣屑仰請皇上天恩於此十四萬兩內扣出銀三千兩存貯司庫俟各官之中有遠出苦差或委辦公事酌量賞與盤費薪水有功者按輕重撥給以示鼓勵使勞者藉以資養逸者不致濫叨皆出聖主一視同仁之厚澤矣再查此十四萬兩數內有前任撫臣議定提解歸補舊時無著虧空除巳完外雍正六七兩年每年尚應提銀一萬五千三百餘兩悉可補足此係庫帑要項不便缺少自今年起即將臣巡撫衙門養廉銀所議存庫充公之一萬兩撥補尚少五千有餘以十四萬兩之外徵出舊欠耗羡儘數撥足倘次年追有多餘者同皇上恩賞銀十萬兩俱存貯藩庫為臣前後所奏通省一切公事之用緣事屬初定分派之處或有多寡未均將來難行者統俟辦理一年後再為酌量將陸續徵出十四萬兩外餘剩大耗略為添補惟是臣見識短淺所派事宜未能妥協仰懇聖鑒指示遵行為此謹奏分派殊屬公當妥協之至隨交怡親王等又加較量斟酌亦俱云辦理甚是即照此施行可也同日又奏為謹瀝下情仰祈聖鑒事竊臣荷蒙皇上厚恩畀以海疆重任惟願文武和衷同心協力使兵民相安稍圗報效是以與將軍鄂密達諸事相商無分彼此因其為人爽利心直口快管兵嚴肅民亦感悅並非私交相好之故久在聖明洞照之中近者臣往來錢塘江等處親見南岸淤漲沙地甚廣坐落西興場內從前初設杭州駐防時無寬展之處可以牧馬即在此沿江一帶除竈户刮土煎鹽外將有草者即為牧馬之厰今日久江邊漸次沙漲其中多半成田皆竈户轉租與人臣兼理鹽政後陸續升課僅得一萬餘畝尚多欺隱未報者臣移咨鄂密達請其委出旗員同臣所派鹽運分司暨理事同知等前往清查鄂密達欣然委官前去並無異言及該同知等看明占地向臣面稟巳經自行首出萬畝有零其餘正屆插種之時請俟收成後履丈臣即許可并令其赴將軍衙門回明會查暫緩情由不意各員尚未開口鄂密達盛怒相加嫚罵不巳且將臣極口痛詆一云乍浦新設水師滿營臣不隨同彼之意見屢次改稿自屬欺他一云今春江之北岸馬厰相近地方刁民因馬匹踐壞田麥辱罵領催將糞桶潑汚衣帽臣並不處死并云蒙恩賞給各官養廉銀兩臣瞞過衆人久巳奏明分定不給伊等均沾令其告知討臣回信等語臣思皇上特設滿營學習水師務期實在有益鄂密達同臣先後親勘悉心酌議及定稿移臣會題見其所議尚有未盡妥協者臣曽數次移商面酌婉轉開導實係因公起見並非有心立異也至營馬踐食田麥刁民不向旗員有司陳告竟行聚衆肆辱臣素所深惡不待鄂密達咨文先行嚴拏交杭州府會同理事同知及旗員審明擬罪具詳臣將其所擬枷責之處俱為改重加等發落鄂密達彼時亦一同批準案卷可查後因許容曽云此等人狠該立時處死鄂密達遂以臣為袒護於民但犯法應死者自當明正典刑即罪大惡極不可姑容亦必請奏定不令伊等均沾此更毋庸詳辨者也伏思省會重地督撫將軍稍有參差滿漢屬員乘機各立門戶則兵民即不相安關係非輕臣雖粗直素日不肯多受委曲但伏念皇上付託地方重大豈可因此小事而與之較量致傷大體況屢蒙安又臣等前疏請於乍浦添設理事同知一員查鄂密達之子鄂善現為將軍隨帶筆帖式臣見其人尚明白稍覺有才鄂密達常言暮年止有此子出仕恐日後家口無倚不敢自行乞恩意欲託臣代奏下情或用為捕盜同知就近學習臣因有司民務非其所長未肯冒昧上聞今此乍浦理事同知之缺正係人地相宜且隨伊父奏覽雍正六年六月初八日浙江總督管巡撫事臣李衛謹奏為恭謝聖訓事本年五月十九日新任布政使高斌至臣署內口傳皇上密諭命臣體恤武職官員又傳知著臣於本章字句內須加檢點臣欽承之下仰見皇上天恩惟恐臣常蹈錯誤事事教導祗領悚惕感激彌深伏思文武職掌原有不同久在聖明洞照之中而武官才具性情求其鮮有偏倚更屬難得大抵勇往直前者多近粗魯水師閩廣人員操守間有未謹若不棄短取長無以收其實用然外貌待之不嚴則驕縱易生恐軍務號令致有難行之處關係匪細若內中不存寬恤則求全責僃大小過犯必多臣仰遵録有過先為教導不改始加懲究凡有一端可取臣斷不忍輕棄必令伊等心服皆知踴躍盡職以仰副我守僃李光彩瑞安守僃徐景達二員人雖粗戅漢仗俱好亦諳水師事務今李光彩因巡哨至盡山海嶴將違禁搭蓋之藔厰循例燒燬乃檢查不細致有藔户焚死於內固難辭冒昧之咎然盡山花鳥洋面逺僻波濤凶險厯來哨船所不肯實在巡到者該員奉公獲罪情殊可憫徐景達因失察私為提臣石雲倬參革乃離任之日仍用印文具詳捏辨妄求引見又經督臣髙其倬續參發審現在訊明另題論其狂妄之處參革原不為過但柳進忠漢仗雖屬平常而水師船務首推熟練且有膽多謀屢次在洋拏獲劇盜現今水師乏員此等無甚大罪之把於緊要水師補用栁進忠降為遊擊守僃於乍浦營補用教習新設滿營水兵使之戴罪圖功果手他人好竒逞異惟是愚昧之見竊謂臣子之職當為皇上任勞分憂故凡有一事必將其中前後曲折緣由形狀盡行據實聲説以冀御覽之下情節瞭然如見免致上勞睿慮又引見各官進退用舍皆由乾斷但既令臣等出具考語送部則人才各有短長務將閲厯過該員表裏行徑逐一寫出不敢止以浮泛誇奬套語塞責此實臣管窺之淺識也緣浙省事務過繁若每件另加一摺不勝瑣瀆今後惟有諭旨開示甚明臣因人才甚難於屬員中可以辦事而身遘疾病者非萬不得巳未嘗輕聽其去如嘉興最稱繁劇前縣劉德寰患毒既久難以卧理臣曽於疏內聲明請假調治桐鄉縣王輅生遍身浮腫不能步履臣亦題請解任調理今劉德寰終不能愈而王輅生醫治漸有起色若將來竟能痊愈臣當遵實屬不治之證疏內未經聲明此實臣疏忽之處今跪讀諭旨仰見我皇上覆載之仁天下臣工不以偶病見棄凡有人心者當無不感戴奮勵以圖仰報天恩更不獨臣之身受聖訓銘勒終身而巳也至高斌齎到皇上交發改補訓導程世楷王積簣條奏二摺命臣議覆查其所奏二事臣從前雖曽留心講求數次因未見實在有益故爾未行今不便以一己之見輕於定議現在與提鎮及地方官再為細察利弊另容奏覆合併聲明謹奏覽同日又奏為奏明現掣引目漸有起色懇恩早發場員事竊查兩浙鹽法厯來僅能掣銷本年春夏引目其秋冬二季必至次年方能補銷此成例也臣竭力設法整頓漸次提趲上前查年額應銷除票引外共正引七十一萬餘道以一年兩掣分半計之每次止該三十五萬五千餘引目今正際掣鹽之期土滷旺産商等捆配鹽斤出場者甚多雖現在尚未完竣而巳經報運並續即趕掣者約有四十六七萬上下連上年冬掣合算巳多至三十餘萬引其中溢出正課再加鹽院筆帖式陋規歸公等項約算巳經多銀幾及二十萬之數逐歲提趲半年不但可以現出本年之引毋容壓下兩季將來冬月再能多掣竟可透至雍正七年引目惟是上年十月內臣於謹陳鹽政錮弊等事疏內附有懇請天恩揀發候補同知等項人員管理場務一條因此疏係各部會議之事彼此會稿有需時日本年四月具呈者少以致部臣不能早辦抑或人數未足因此耽擱請乞陸續先發其所缺者可否照河工例題請調浙委用庶辦理不致乏人而引課可得充裕矣為此謹奏覽同日又奏為據實密陳仰祈聖鑒事竊臣接準部文奉旨李燦升補溫州鎮總兵官冉起鳯調補處州鎮總兵官仰見皇上擢用大員聖明自有衡鑒臣復何敢置詞惟是愚昧之見浙江溫州黃巖二鎮皆係兼轄水陸溫州雖自閩至浙第一重門户而瑞安玉環改設水師之後該鎮海汛止有中左二營其地方尚屬安間衙門不為清苦惟黃巖三營洋面均係咽喉扼要之地而盜賊出沒偷運米穀多在該鎮轄屬口岸之內且疲敝之區一無出息又值前鎮林達馮廷輔董一隆等厯任廢弛整頓甚艱較之溫州實有難易苦樂之别在人情自必喜就溫州臣竊以為李燦既蒙皇上特恩超拔自當令其於難處出力圖報國家此心方安況冉起鳯雖非閩廣出身而曽經任過江南崇明等處水師船工亦頗諳曉於溫州諒能勝任其方文登小心謹慎汛防勤密原係陸路好官今夏出洋哨巡在船頭暈終覺勉強可否以李燦調補黃巖冉起鳯調補溫州方文登調補處州一轉移間而三鎮水陸難易似為各得其宜於海疆營伍實有裨益此臣受恩深重稍有一得之見不敢不據實密陳可否皆出睿斷臣不勝悚惕之至謹奏此奏嘉悅覽之巳有旨矣同日又奏為彚奏沿海地方應行要務仰祈睿鑒事竊臣身任重寄凡有關於民生利害者理宜隨時察訪次第舉行查寧波府鄞縣之大嵩十一十二十三都圖民田數萬餘畝離海十里有零僅止嵩港一條日久淤淺內少支河以蓄淡水外無塘堤以禦鹹潮故雨少即憂旱乾潮大又防浸灌十載之中多半歉收上年偏災亦罹其患經臣飭委地方官查勘若於大嵩港口建築石壩使潮水不致內灌將嵩港淤河開濬深通自大碶頭至茶園止分浚支河於通海之橫山頭等處建石閘六座築土塘一條則蓄泄有資旱潦無患不但內地各都民田變荒瘠為膏腴而沿海十餘里塗田工竣之後初年皆可種植棉花二三年內盡可栽插禾稻一勞永逸實為萬世之利又鎮海縣之靈巖太邱二鄉俱係內地平坦之田方廣約數十餘里中間向有大閘為上半鄉救旱宣泄之計閘下有浦通流入海今亦圮廢以致兩岸荒蕩萬餘畝棄置不耕即內地各田亦有水旱之虞若於浦口築塘內河修閘再相地形分建碶壩則兩鄉田畝歲得豐收荒蕩萬餘俱可成熟此二處實皆大有益於地方緣工費各需巨萬無有出處是以逡巡難行臣思此等有利於國計民生之事自當設法興舉今查有上年四川買回米石平糶價銀除歸還原款外尚餘銀一萬七千餘兩經臣咨部存庫留充公用又臣前次奏明鹽務內折編溢出銀二萬一千餘兩原留以抵修寧波府城等項公事之用今城工估計不及萬金費尚有餘相應請旨於此二項內撥用一款成此美舉工完核實題銷實於海疆有裨再定海縣初名舟山遷棄開復其中曠土間田甚多與新開之玉環山相等從前報墾各户不無隱占今雖陸續首出尚恐未盡亦應於秋收後委員協同地方官查丈清理至於沿海偷運私米臣久巳嚴行禁飭今逐細訪察尚有應須變通防範者如台州之黃巖太平二縣素稱産米之鄉私運姦徒多於此地購買前朝因黃巖地方廣濶故割其鄉都分設臨海太平二縣彼時地界犬牙相錯遂將黃巖縣東門十里之外由蛟龍港至家子柵浦海門一帶地方皆歸臨海管轄而實則自海門離黃巖陸路止四十里海道止六十里其離臨海則有一百二三十里不等目前私運姦民多於此處出沒在黃巖雖近而非該管之地文武不無推諉即有拏獲亦必遠解臨海往返需時在臨海雖屬管轄而鞭長不及稽察難周臣現飭台州府協會同察勘確議擬將臨黃二縣所轄遠近不均之處酌量具題改定使界址聯絡責成得專不第偷運之弊可除而士民完糧聽訟亦無舍近就遠之艱再海門原係衛所從前駐劄總兵控扼海口後始移鎮黃巖此地與台協前所兩岸對峙中隔椒江寬廣十里自黃巖至台郡必由此江橫渡府城食米向仰給於黃太二縣若禁其載米渡江則郡民有艱食之苦然由江入海片帆如飛以十里江面之寬又係急流捷徑瞭望稍有不及即被逾越出口今雖兩岸設立照票兼用營汛戳記挨號稽查而小艇扁舟紛紜雜沓終覺難絶因皆係陸汛並無水師營船常川巡察是以錮弊難除臣擬於此處兩岸皆添設水師船隻令其往來巡拏庶為周密以上各條臣雖早為籌畫原欲俟八月間巡查海汛時親身再加查勘舉行今巡期未可預必不便因循稽誤為此一面附摺奏明請旨一面次第盡心辦理如有應行會同大理寺卿臣性桂酌議者自當彼此會商畫一以期仰副皇上慎重海疆之至意謹奏所奏各條均關地方要務籌畫甚善其再加確勘妥計具疏題請同日又奏為恭謝天恩呈繳御批事本年五月二十四日臣齎摺千總自京捧到皇上發回原奏摺匣并蒙御賜臣香袋一盒臣隨出郭跪迎至署虔設香案望闕叩頭謝恩祗領供奉訖臣前擬八月間巡勘沿海地方營汛因身受三處衙門重寄較别省督撫分辦責任實更繁巨故懇暫留巡撫敕印請旨交與許容署理今荷御批指示周詳臣隨遵例具題委官齎繳在案但今許容巳經奉旨差往福建審事臣復欽承特命查議江南海塘事宜現在另疏題明必親往勘視事竣方能回浙又須會同欽差大理寺卿臣性桂清查各屬虧空倉庫承追民欠諸件且藩臬兩司俱係新到委署乏員所有勘查海汛一事俯容臣至期再為酌量事勢如可前往旨遵行至海寧老鹽倉一帶塘腳俱起有新沙雖尚未堅實漸次濶厚目前黴汛巳經保過坍塌無多隨即加築現今伏秋緊要之時惟有仰遵聖訓竭誠敬以格天心勤修築以盡人事務期無厪睿懷再四川買米人員巳經運回到浙共買川斛米二萬石有零雖川江被岸上失火沿燒損失尚無大減餘銀帶回在江西順路買回六千餘石此番原有鹽商捐買積儲銀三萬兩附去今即將此米儘歸義倉收貯其三萬兩以外動支庫內公項價腳各商儘數撥還歸款目前浙屬米價頗平杭嘉湖三府禾苖遍插田水無缺惟寧台有數處微覺亢旱臣現在督率屬員虔誠祈禱倘得及時沛雨通司未完册籍堆積甚多高斌雖竭力趕辦豈能於御批奏摺理合恭繳謹奏覽雍正六年六月十三日浙江總督管巡撫事臣李衛謹奏為甘雨及時上慰聖懷事竊照浙省自五月以前雨水調勻麥豆菜子比歷年收穫每畝多加三分之一各處早禾又皆茂盛百姓歡呼異常五月中旬以來連晴二十餘日晚禾栽插之後雖河內有水可車微覺亢旱寧台高田較甚前經臣附摺奏聞一面飛行各府不時查報如有雨澤缺少地方即令會同文武虔誠祈禱一面在省迎請大士并於龍神廟等處設壇六月初六日起臣率同屬員竭忱叩禱初七日即得霖雨一陳尚未下透自初八至十一連日均有大雨杭嘉湖嚴紹五府俱報獲甘雨多已霑足惟寧台溫處金衢等府路遙尚未稟到但此數日濃雲密布看來雨勢甚覺廣遠自必仰邀皇上福庇一體普遍將來秋霖時沛則浙江通省早晚二禾可必又得豐收萬民更享盈寧之福矣仰惟聖主痌瘝念切知必上厪宸衷合將巳得時雨情形星馳奏聞謹奏覽奏杭嘉等府霑足情形朕懷深慰江浙地方四季惟慮雨水過多耳至於憂旱或於春月偶然一遇似此夏雨欠缺之年甚稀朕意究當為將來霖潦留心預防為是同日又奏為奏聞拏獲惡賊事本年五月間據杭捕同知帶理錢塘縣知縣秦炌會同升任杭協副將李燦差捕巡獲面生可疑之犯王惠卿楊茂蘭龔子瑞三名并小船一隻到官審訊初則信口支吾後則認為小竊該縣觀其形狀不似偷兒隔别窮詰始據供出尚有為首之張寶生并同夥蔣德彩曹老四鄧元等專在錢塘江至衢州一帶水面上下往來撑駕船隻各犯分扮船户客商隨身假帶被囊行李先坐在內沿路騙載孤身客人搭船於僻靜處止用一尺二寸長之繩索兩頭拴有小木檔子將人勒死尸首捆縛巨石沉於江內深處取其財物烹分自康熙四十年至今被害不計其數當據密稟隨即飛行各原籍拏獲首犯張寶生搜出帶血繩索一根又獲夥犯蔣德彩起出贓衣等物並解到案逐一細審各犯為惡既久謀命又多自亦不能記憶清楚所據參互供出者如雍正二年三月在富陽落山頭謀死徽州寄信客人得銀三百二十兩五年正月在富陽裏山謀死種棉花客人得銀二兩四錢四月內在西安樟樹潭謀死江西販麻客人得銀三十兩雨傘一柄上刻陳君彩姓名七月內在建德七里瀧謀死杭州客人得銀六十餘兩九月內在建德石壁潭謀死木匠一人得銀二兩三錢十月內在富陽裏山謀死蘭溪客人并小孩子一箇得衣服三十餘件同斃二命又於雍正元年三月因王惠卿船上水手汪公亮知風恐其泄漏將伊謀死以上供出各案隔别問其贓數情形彼此相同尚有遠年失記未能供出者不知凡幾似此極惡窮凶雖寸磔不足蔽辜今夥犯曹老四又巳拏到止有鄧元一名現在分路勒緝務獲并通查沿江各縣從前有無浮尸申報未結之處審明具題請行附摺奏聞一面嚴行究追務盡根株以除積害謹奏如斯遠年舊案悉能發摘殊屬可嘉之至詳覽各件率係孤身旅客中途被謀尸朽荒江含寃莫訴今凶徒就獲死者有知怨氣伸矣能辦集此等事件方為積隂功造福業可望慶遺子孫較之賣法徇情背公市德而自以為善政者豈堪同日而語各省封疆大吏咸肯若是實心任事一一整理何慮盜之不息而民有不安耶聞秦炌原係超卓之員巳降旨加恩矣向來下江地方盜風甚熾今命卿兼併節制其勉為之以副朕意硃批諭旨卷一百七十四之七欽定四庫全書硃批諭旨卷一百七十四之八硃批李衛奏摺雍正六年七月初六日浙江總督管巡撫事臣李衛謹奏為奏聞事竊照今歲年景自六月初旬以來連沛甘霖臣因查勘江南塘工經由浙省之杭嘉湖江南之蘇松等屬縣皆地勢窪下之區多種晚稻目擊田間溝澮充盈禾苖青蔥茂盛農夫無不欣欣得意嗣後若再獲時雨則數郡皆享大有之慶矣其金衢嚴紹四府山地少而水田多陸續皆報得雨秋季情形大槩高阜雖次低處甚好惟寧台溫處等屬地勢居高者多每年山地收成原與窪處不同今年得雨略遲山田分數不無稍減此時尚未能定然春收豐熟加倍於往年不致有艱難困苦之虞臣恐寧波兵民繁多米價或貴巳將鹽務買回川米雇募商艘并調定海鎮兵船押護由海道撥運一萬石前往接濟平糶此時諒巳可到容臣回署之後再加細查各處地方情形另行奏聞再臣訪聞得江南之句容縣秣陵關地方有積賊奚桂卿别號滋泥大王夥黨亦多雖未必即是去年九月間在烏鎮傷損十餘命之人然既有此説不可不信若行文江南恐有未確故臣將此所查情由帶字蘇州欲面交督撫適陳時夏巳聞改調之信范時繹不曽來蘇會商海塘事宜即付張坦麟託其再加核實就近查拏隨後聞得巳被兩江督臣獲住發營員密訊所供不知其詳止有浙屬嘉善縣住居水手二名從前曽經雇與伊等駕船據臬司董永芠來文巳經該縣拏解去訖聽候督臣審明奏聞外理合附摺奏明謹奏滋泥黃魚二盜犯頃據江督范時繹奏稱業經緝獲移交浙省矣朕諸凡所聞料不至有差謬同日又奏為遵旨議覆事竊臣前將奉命交發改補訓導王積簣程世楷履歷條奏摺二件臣雖素曽留心及此未敢冒昧遽覆現在咨訪各地方官及提鎮諸臣定議覆旨緣由附摺奏明今王積簣所陳請禁湖州典鋪當米一事據杭嘉湖道暨該府等覆稱嘉湖二府屬縣每年新穀登場凡有田之家以及佃户小民一時若有緩急皆將所收之米隨其多寡當銀用度次年蠶麥成熟新稻未收之前贖回以濟口食較之現買米價平賤人以為便即有經營之輩買米當銀復買亦皆於次年就地糶賣商獲微利民得資食並無害於地方若禁止不當勢必將現米賤糶次年一遇米貴並無積蓄可以救濟等語臣查米穀少則價貴多則自平故籌畫民食惟以積蓄為先無如小民需用急迫或房屋窄狹欲求盡存倉廪勢有不能惟當米一節勝似賤賣如現價一兩可當銀六七錢每兩取利不過一分以至一分五釐而止次年即遇價貴猶可取回賤米充食即有不能贖回者向例不論月日早晚皆以次年白露節後為滿仍在本地糶賣所以米石猶得存留在境若行禁止必然隨時糶散悉歸外販一遇米缺即時騰貴關係匪輕況當米非囤户貴賤皆由自主若米價稍昻原主即欲贖回者更多實屬利民而非病民王積簣所奏其言似是而非應毋庸置議以安人情者也至程世楷請照溫州玉環山之例將定標左營移駐大衢山招民開墾一事據該提鎮並寧波府等覆稱大衢山孤峙海面與玉環山逼近內岸者不同從來外國與各省洋船經過此山從不收泊至每年漁期雖有船隻聚集亦不專在此山且皆有關牌縣照為憑巡員實力稽察不難防杜漁信一畢各船盡回內地亦無藉官兵之彈壓若將定標分駐一營不但築土堡建營房經費不資且孤立大洋兩處單弱可慮虛設官兵有損無益昔年定海總兵藍理曽於此地開墾遂為海盜鄭盡心陳尚義等藏垢納汚之窟凡費幾許兵力而後驅逐淨盡似不宜再有此議等語臣細閲提鎮諸臣所論與臣意見相同程世楷此奏亦毋庸再議總之近地可以墾闢利民之所臣自當隨處留心察訪陸續舉行斷不敢因循忽略所有兩摺條奏事宜理合據實查明具覆並將奉發原摺二件恭繳伏祈聖鑒再臣接準吏部咨文奉旨王以曜亦命往浙試用伊條奏浙省事件原摺爾部封發總督李衛如有可行之處著李衛酌量採擇欽此并封發原摺到臣查該員所奏六條其中如歷年欠册必須順莊滾查舊欠新徵務令親納投匱與民間買賣産業過割宜清辦理滾催人員董勸宜力等四條臣上年巳曽在浙試行於十二月十二日以請行順莊等事具疏分晰題明又所奏州縣因漕米民欠那移墊補一條臣亦於本年四月初一日以遵旨請派人員等事疏內陳明荷蒙俞旨允準現在分派各官逐府清查各在案至於州縣交盤該管知府督催捏飾扶同定有分賠之例最為嚴密毋庸别行委員監催紛更成例也除王以曜部發原摺另行咨部呈繳外相應一并覆旨為此謹奏覽所敷陳甚屬明晰允當舉凡條奏有關直省利病者朕皆發與該督撫斟酌因念通省地方遼濶事務紛繁一時耳目難周於中倘有可取亦足補益不逮非竟以其言為是必令見諸施行也當領悉此意總之朕用人行政從不預橫成見惟求合乎是而巳雍正六年七月十八日浙江總督管巡撫事臣李衛謹奏為續陳辦理鹽法事竊查松江府城舊時附郭華婁二縣今又分出奉賢金山地方不為不大更有提督重兵駐劄宜乎私梟屏迹而從前片引不銷皆由向日提標及附近各營無不通同濟私大船裝載貯於兵丁屋內令其子弟家屬提攜籃筐滿街市賣地方官不敢過問以致商人無可如何將此數縣棄出不復行銷矣臣細看沿海形勢海塘之外不産鹽土其場皆在兩頭北則逼近川沙大營南有金山參將若加以提標汛兵肯與出力協同兩營實心巡緝鹽徒勢難透越而無如向多貪賄縱私習以為常止有分管上海之提標遊擊葛世雄守僃徐潛頗能督兵嚴巡是以上海從無官鹽住賣者本年竟能行銷五百餘引臣在松江掣驗三日不見有籃筐私鹽出售屢與提臣柏之蕃悉心計議預僃賞賚以圖大破積習提臣亦肯身任其事近日辨兵奉法努力連報拏獲大夥私鹽數起查松郡原係商人不敢開店之處而雲南福建皆有文武官辨督銷之例莫若將公項所收鹽斤量行發交提標五營挑選誠謹千把總在於松郡城之內外監賣除出完課將鹽本解還源源接續則既豫以責成又不無稍有餘利自必實力巡緝臣仍與提臣時常留心稽查庶錮弊可除但産鹽之四場臣既俟委官到日遵照辦理酌量收買發商完課儘力督銷自然有益惟所慮者崇明一邑向係海外包額之區煎出鹽斤止為本地民食例禁不許透越别縣後因産鹽日多梟徒勾通鎮兵縣役任意廣煎不但來往領餉運米船隻順便裝載亦且渡海各船夾帶進內殆無虛日文武各衙門向來皆有陋規屢次行文從不攔阻昨見臣在松江恐被差員內港截拏始據該署縣祖秉震報獲一起近日鎮標左竒兩營盤鹽甚屬上緊但恐不能久遠如是此地若不派官協巡稽查堵禦則蘇松常鎮等屬雖收餘鹽發商仍被崇明廣産私煎攘奪引目仍舊難銷臣愚昧之見將現在命發管場各員內挑選明白強健者一人再派千把總一員專在崇明要口駐劄並可往來稽查竈地其鹽應禁者嚴禁應收者酌收令其轉運發商辦課其私販小則移知營縣協緝大梟就近稟報總兵嚴拏解交蘇松道審究分别治罪剪除窩頓毋許流入內地實於江省鹽政大有裨益矣至浙之寧處二府尚有官鹽一半溫台壅引久不行銷此非專係私販衆多之故實緣梟棍強橫動成命案各商但有本錢者俱不肯往彼處貿易現在止有小販數人每家不過二三百金大處不能行運始向此等地方賖欠竈鹽拉扯零賣搜索微利臣前疏業將四府場員亦在更換準行之內但收買鹽斤彼時若一齊並舉誠恐遙遠難以照應未敢率請今民頗知法按時度量臣尚可承辦亦當一體動項廣收發給官商分頭運銷於産鹽多處添造厫座出入要路堵防隘口不過多費精神皆可設法料理一有成效增課何止加倍以上事宜臣恐具題遲緩等候部示往返需時有誤秋冬乘時辦理用敢瑣瀆天聽倘或可採伏乞聖鑒批示欽遵抑或原摺發議懇賜知照到日即當舉行為此謹奏該部議行同日又奏為奏明戰船中途遇風駕回修換桅木緣由事竊照浙省承造旅順營戰船五隻業巳督辦完竣委令將辨官兵押護於五月二十四日開駕起行經臣題報在案不意六月初三日駛至黃標汛地螭洋險處忽遇颶風波浪洶湧船隻顚簸將一號三號大桅損傷箏眼數處官兵竭力駕護幸得保全隨風飄泊初六日始得收入定海港內臣據押運參將顧元亮并定海總兵官林君升飛報前情隨差員星馳往彼督令該鎮將知府設法修換及早開駕毋誤風期去後又據顧元亮報稱前船在於定海將桅木損傷之處多加鐵箍修整完固於初九日自定海開行十一日在普陀開至鳥鴣山大洋又遭疾雷巨颶風狂浪大不但新箍之桅閃裂其四號五號兩船大桅亦被風損􅍆命收入寧波再為設法製換等因臣即分頭差人往督溫寧二厰各道府選購桅木換監并調林君升赴寧親加勘驗復與提臣酌議間今據陳天培林君升合詞覆稱本省各標戰船向來俱用幫桅以數木合成加用鐵箍是以其力堅徑可抵風浪今旅順船奉部定式俱用獨木為桅又兼長至八丈及七丈七八尺購買既極艱難大者削去外皮止剩中心小者一木之力未免稍軟今寧厰遍覓並無此等獨木大桅雖據溫處道王斂福於七月初一日趕運獨桅一根幫料七件細驗桅木堅實但係舊料且獨桅係奉部定未便違背擅用幫桅勢必飛往閩省再購獨桅換竪現在巳過立秋西風漸徑往北洋面難以行駛戰船關係重大自應題明駕回溫厰購換於來春南風期內開駕方屬萬全等語查此案戰船中途兩次遇颶幸託皇上福庇五船無恙官兵平安今遵照部式不敢擅用幫桅現巳委員星飛赴閩購覓獨木另行製換但今歲七月初二日立秋甚早目前西風盛發自浙往北必由江南五條沙險洋經過更難放心臣何敢不酌量天時妄行開送致有疏虞除飭參將顧元亮將船駕回溫州上緊購辦於來年四月順風駕送并現在另疏具題外合將緣由先行奏明謹奏知道了今歲不使開行極是戰船之設原僃抵敵風浪獨桅既難得堅徑如式何妨聲明緣由換用幫桅今乃以軟小之材應辦一時而令官兵乘危冒險大不是矣幸而無恙不然其害曷可勝言承辦各員當嚴參以為不敬事者戒同日又奏為請旨事竊查浙省有衛守僃八員專管徵解屯餉事務因向來衛田皆屬軍民雜佃每有爭訟界址糧務係守僃衙門清理名為武職而實有管辦錢糧詞訟之責其中台州一衛田畝分坐臨海黃巖太平天台四縣零星窵遠地僻人蠻近又裁去所千二員歸併該衛事務更繁存留項下厯年積逋八千餘兩册籍混淆完欠不清臣因此處第一難治非幹員不能清查特委溫州衛守僃饒建侯前往會同地方官分縣催追稍有頭緒尚未完結本年二月內新任台州衛守僃楊上衡到浙初見臣時即行面稟伊原是行伍出身得中進士但習騎射不諳簿書呈請具題改用臣以該員乃奉旨補授不便遽行請改仍令赴任試習今巳數月又據詳稱職任不勝實恐貽誤臣查楊上衡漢仗去得為人勇往向前宜於營伍堪僃差遣而料理錢糧非其所能可否俟有緊要營僃缺出容臣題明改補其所遺之缺查溫州衛守僃饒建侯辦事勤敏人稍有才上次軍政曽列附薦即以該員調補令其加意整頓更覺有益其餘浙省各衛所管屯糧不多再除湖州一所疲玩外他處舊欠俱少皆屬事簡易治者如杭州右衛守僃尹君慶漢仗亦好弓馬雖屬平常辦事出力臣委令巡查地方甚是勤謹又紹興衛新任守僃高志唐看其人材漢仗頗屬去得以上二員若不令其於營伍厯練恐久之漸至怠弛殊覺可惜應否一併於中等營缺酌量題補改用以加造就倘蒙俞允溫州杭州紹興三衛守僃員缺查有奉發效力新科武進士羅佳雄丁大業易焜俱係武生初進人皆文弱於營務全然不知一時難期練習若以衛僃近似文官之缺署理試用一年如果稱職再請實授否則咨部挨班候選則人地各得相宜矣是否可行伏祈聖明批示欽遵又此外尚有杭州前衛守僃趙廷文海寧衛守僃吳輝祖皆辦事克勤人亦明白因其人尚屬謹愼細心於衛務相當再看後效另為請旨謹奏調改甚屬合宜具疏題請同日又奏為僃陳實情懇祈聖鑒事竊有原任福建撫臣常賚審理千總劉任一案斷罪舛錯荷蒙聖明察出指示命將同知曹秉仁解任同劉任調京面加詢問仰見皇上睿照無遺務使文武均平事歸至當大小臣工莫不欽服此事原由浙江而起其中實情有不敢不僃陳於聖主之前者查雍正四年奉文撥運福建抵米之穀二十萬石因巳經借給閩省倉穀七萬又代為分頭購買先行轉送之故是以九卿原議令閩省差員來浙領運臣見為時巳屆誠恐遲誤風期是以無分彼此一面具奏一面飭委嘉興同知曹秉仁在於乍浦齎價雇船分為兩起代運赴閩除各海口外上年正月乍浦第一次開行巳用船四十八隻二月間第二次之穀業巳運到乍浦等候又須用船六十八隻一時不足正在雇覓甚艱之際忽有福建千總劉任到乍並無公文執照口稱奉旨押運江南米石特來乍浦封船亦無價銀挈帶交給又不赴臣衙門稟知以致船商驚慌有曽惠泉等在於護海關江承玠同知曹秉仁等衙門具呈各據轉報請示前來臣查劉任止係奉委押運其僃辦船隻乃該地方官事也江蘇撫臣陳時夏並未移咨到臣欲於乍浦雇船且未行文該同知令其代為預僃劉任來浙實為輕率緣事係因公不過武官粗魯冒戅之故臣隨於各詳內婉辭批云江浙運米同屬公事但浙省運穀二十萬石較江南數多三倍現在杭嘉湖續運之穀乍口尚是缺船不得不酌量緩急仰候移咨江省督撫二院在於上海覓船搬運仍諭知劉辨回江可也等語一面於二月十八日僃咨江南去後乃下江督撫並未回文有來浙要船之事而福建押運遊擊李燕在上海接到臣之批示亦無隻字回臣又未見石斗米穀來到反於二月二十六日移文同知曹秉仁令其查明乍浦共封若干船隻移覆以便乘風斛解且稱何物船户曽惠泉等具稟運閩穀石現在缺船上海何有餘船何獨異視江南米石等語臣因其文內明有封船字樣且將臣批詞指駁言語狂妄故於三月初二日移咨福建督臣高其倬煩請轉行申飭原無别意續經高其倬將千總劉任題參奉旨飭審上年十月內常賚據劉任呈詞移臣內稱浙撫有尺霧之遮移咨督院題參等語臣雖不才忝任封疆隔省員辨即非管轄的屬然敕內開載設遇有事尚將調遣䇿應今劉任以千總末辨竟將臣指斥無忌常賚亦即據以移查其如國家體統名分何乃常賚緣臣回咨有得罪於彼之處故意不將劉任止係奉差江南便道押運並無文照私赴乍浦索船及公然抗臣情節於看語內聲明反稱隔省同知為其上司任意混擬欲冀皇上歸咎於臣乃蒙聖明洞照係彼之大錯指責示罰今曹秉仁業巳解任進京將來廷訊之下皇上自有照鑒臣若不將此案實情陳明於臣素日未敢一事隱匿之心有所不安是以冒昧具奏前項根由至於苛索二字臣因劉任在乍浦苛求索船故於高其倬咨內説及並非曹秉仁等所詳原文具在臣不敢代為飾辨合併聲明伏乞睿鑒施行謹奏應具奏者朕僃悉原委自然處置得宜也同日又奏為奏聞事竊臣猥以庸才謬叨重寄惟思上有以仰報聖主下不至貽辱祖宗伏見我皇上矜全大臣曲加體恤直如家人父子格外優容為臣下者若不教誡子弟循謹守法以致有辜德意於心何安臣籍隸徐州族繁丁衆賢愚不等豐碭各鄉散處頗多今春因有堂弟李懷瑾李信枝皆少年喪父鮮有管束任意放縱不循理法臣訓之不改招之不來誠恐久益驕橫有害地方無可如何於四月間行文淮徐道煩其轉飭本縣將二人拏解赴浙以家法懲治圈禁在署俟其改悔始放並咨明江蘇巡撫衙門在案此臣借以警戒保全族人之苦情而衆皆不諒反生怨尤即臣親房尊輩亦復附和言臣為巳不復顧人交口騰謗甚有欲改姓氏以為加罪之地者不思臣本支相承原係大宗嫡長平素家居族內諸事例得主之況今身荷封疆執持綱紀雖仇怨滿前皆非臣所顧惜此後如有大干不法仍然怙惡不悛臣若得知即尊行尚當參聖明自有洞照非敢故為多事洗白自身也為此謹奏洗白自身即反巳之謂果肯洗白自身乃係省事之舉何云多事但審辨公私最為不易倘向日於鄰里鄉黨間先存曲嫌小憾則又當一論朕每言公中私私中公樞機正在於此其中原委既不確知難以批諭是非當否也雍正六年八月初八日浙江總督管巡撫事臣李衛謹奏為奏聞事竊查海外諸國與浙江最近者莫如日本臣每留心察訪初時風聞彼國有招致內地之人教習弓箭不甚守分因尚未得確實不敢冒昧瑣奏近於各處出洋商船時常設法密探信息有蘇州余姓洋客露出口聲言倭王原係中國人苗裔厯世相傳若土著為之則該王不能享祚倭民皆有天災其臣下雖極強盛猶奉以虛名故本處從無爭奪之事而號令征伐一秉於將軍不由國王主持反受節制由來巳久因此伊國將軍肯出重聘倩內地之人教演弓箭藤牌偷買盔甲式樣初時有福州民王應如於天文戰陳之事涉獵不精好為談論首受其萬金厚利排演陳法年餘即伏冥誅復薦引一廣東長鬚年滿千總不知姓名每年受伊數千金為之打造戰船二百餘號習學水師又有洋商鍾覲天沈順昌久領倭照貿易彼國信託鍾則為之帶去杭城武舉張燦若教習弓箭每年亦得受銀數千兩沈則為之帶去蘇州獸醫宋姓在彼療治馬匹又有商人費贊侯曽為薦一紹興人革退書辦往彼講解律例因其不能通曉隨即逐歸曽留該商銅船質當凡平常貿易之人到其所給回棹時逐一消算扣除交還所換銅斤貨物押住開行至於聘去之人則又另在别處隱密之地日久終未放回故實信無從探聽惟造船之聲則有人親耳聞之者臣恐傳説未確再加密訪别處所得情節亦復相似其鍾沈費姓三人現在行狡詐果出外年餘至今未歸其家有父張彬如曽充過衛百總原係弓箭教師臣遣人託言寄信往問蹤迹伊父答以其子由京前赴陜西撫標中軍孫王發署內再詰便有驚窘之狀即此一人形迹堪疑其餘不皆風影可知臣查日本雖係蕞爾島夷恃其銅鑄炮大攻擊甚遠倭刀器械犀利非常前明曽屢為海患於東洋稱一強寇本朝威靈懾伏屏迹多年從無干犯中華聖祖仁皇帝俞允會議於東洋貿易止許內商往販禁其自來原有深意今彼不惜重資招集無賴習學內地弓矢技藝無故打造戰船姦懷叵測不無窺伺乘有空隙欲為沿海搶掠之謀然前明水師未設戰船不修被其突犯登陸始與接戰使得展其跳躍之長故從前江浙地方多受荼毒今沿海水師星羅碁布戰船駕駛精熟官兵皆能奮勵用命倭夷平素未嘗諳於水戰設或有警臣等聨絡鄰省會同堵截邀於海中剿殺攻其所短自可必獲萬全不致上厪聖懷但彼狡謀惟在重利引誘凡屬愚人孰不貪婪往洋往來人多傳至彼地恐即致激而生事臣愚以其家蹤迹行徑以驗虛實一面密飭沿海文武營縣及各口稅關員役藉盤詰米穀軍器名色嚴行稽查凡出洋裝貨包箱等物悉令打開驗明一應水手舵工商人奴僕附搭小客俱著落牙行查明籍貫年貌出具保結限期回籍返棹進口點驗人數將缺少者即行拏究其水師兵船嚴督各鎮協營整頓炮械練習攻戰之具不時哨巡耀揚威武以為有僃無患之計一切廢辨驗其因公罣誤原無大過不在解發安置之列而人材尚可效用者分别收録令其食糧不使間居窮苦為人所誘姦商無賴通同勾引之人俟訪實後再為相機另行旨命臣節制即當知會督撫提臣調度嚴防但其乘風飄忽四路可通閩廣山東天津錦州等處仰祈另結合併附摺陳明謹奏當年聖祖曾因風聞動靜特遣織造烏林達麥爾森改扮商人往彼探視回日復命大抵假揑虛詞極言其懦弱恭順嗣後遂不以介意而開洋之舉繼此而起朕即位後亦經念及尚未暇諭卿所以此奏深合朕心又聞噶喇叭呂宋聚有漢姦不下數萬朕經屢次密諭閩廣督撫加意體訪具奏且復聞日本與朝鮮往來交好蹤迹甚密云云總之安內攘外要不出前諭固本防患盡人事以聽天命為第一良䇿也同日又奏為恭繳御批再陳微悃叩懇聖恩事竊臣於本年七月二十二日欽奉批回原摺一匣跪讀之下仰見皇上憂民念切深悉浙地不慮微旱但恐雨水過多令臣於將來霖潦留心預防至聖至明坐照萬里伏查浙省上遊各府地處高阜止畏久雨驟漲一時難消今入秋雨水調勻初次所種早禾多巳收穫間有高山海塗零星之田略減分數其餘平地得雨發秀甚旺而杭嘉湖三郡從前多處低窪蒙聖恩頒發帑金開濬河道現今閘壩修築將完河道疏浚流通宣泄之方較前巳有僃禦晚禾正在開花茂盛非常一至秋分皆可秀實目前米價平賤洵稱豐年又兼六七兩月海不揚波並無風暴損禾雖八月潮大高與塘平皆巳保固無恙此時業過大汛老鹽倉沙漲頗遠皆聖主福庇愛惜黎民之所致也臣欽遵諭旨自當隨時料理不敢有誤至臣蒙皇上洪恩令臣管理江蘇所屬七府五州各種盜案巳經具本恭謝並􅅹陳下悃何敢再有瑣瀆惟是浙江巡撫之任事務實為繁雜必須精神命脈時時周流貫注隨處覺察方於事有實濟稍或不到即被欺瞞臣兩年有餘此心未嘗一刻放間若再加以江蘇所屬七府六十六州縣則南連閩豫北接河東豈能處處周到顧此失彼必不能免況盜賊蹤迹詭祕姓名變幻必細行查探始得的確臣並無腹心可以寄託耳目之人實難兼理況臣曽聞古人有盈滿則覆之語今仰荷隆恩不次拔擢甫過四旬位叨卿二將浙省三院衙門一身兼總譬之小舟重載常恐傾側若復管理本得專心稽察所交諸事或得黽勉盡力不致彼此兩誤則又臣不得巳之苦衷而非敢自圖安逸之實情也伏祈聖恩鑒察所有奉到御批奏摺理合恭繳謹奏卿之實情朕巳鑒之朕之苦衷獨不思乎如得勝任浙撫與卿同心之人則可用之於兩江矣又何必命卿兼理下江七府五州耶不得其人徒費一番周折於事無濟姑且盡卿之力稽查料理前於謝本內諭旨甚明若果至精神不能周到時密奏以聞朕自另有裁處所奏江南地方情形一摺留中江南襲吳楚遺風崇尚虛浮人習巧詐歷任督撫大吏一味因循委靡不能清釐振刷以致頽敝益甚種種弊端朕所悉知然無可奈何如范時繹魏廷珍陳時夏張坦麟輩豈堪統率之任第取其操守謹飭而姑用之耳安望有治理之效不止此數人巳也再如布蘭泰石麟沈廷正莽鵠立馬會伯憲德等豈皆封疆材耶兩江之任惟鄂爾泰田文鏡克勝而又難以動移幸地在腹裏且暫將就即今邊海要區需人孔急尚費躊蹰何但兩江為然朕之求才若渴諒應天下共知非特於大僚中隨得即用簡拔無遺從州縣有司三二年內超擢至撫藩者不一其人欲覓局量稍濶之品尤屬罕覯為此時厪於懷汝知有綽然稱職者即行舉出勿涉隱諱至於兩江現任文武上自督撫提鎮下及守令將辨率取才具中平者而用之何也戶口雖多事務雖繁其患不過錢糧積欠風俗囂漓而巳猶可緩待以緊要論自當先雲貴川陜兩粵而次及於兩江以故直隸近地所用者大抵皆中材以下更屬無足論者矣朕勤求治理維日孜孜亟欲置斯民於袵席之安無如不得其人奈何奈何今於無法之中設法亦惟因病蓄艾且儘力作養加意栽培以冀菁莪棫朴之效於將來云爾雍正六年八月二十四日浙江總督管巡撫事臣李衛謹奏為呈繳硃筆諭旨并御批奏摺事本年八月十二日臣標千總自京齎捧發回原奏摺匣到杭臣即叩頭啓視所有臣前因江南地方緊要將所見聞大概情形冒昧陳瀆我皇上不以越俎見責於摺匣內頒發硃筆諭旨一道開示切摯仰見皇上因地方用人其難其愼而全才不可多得誠如聖諭雲貴川陜兩廣實為邊塞巖疆重地自然首先緊要而兩江次之但東南惟江浙等處戶口稠密幾抵寰宇人數之半其中賢良不一狡詐多端且財賦繁巨又為邊方協餉根源而沿海各省情形更與陸路迥别身其任者職掌匪易臣每自警懼時切杞憂何敢存有量度可用長才知而不舉以負地方拏獲仰見皇上睿照無遺今在江省究訊傳聞供出劫過江南者居多浙屬亦有數起至今尚無正實贓案亦未接有來文行查似應仍聽督臣范時繹照例審結惟臣前發回原摺細看始知疏忽之愆不敢隱匿相應附摺聲明所有奉頒諭旨一道同原批奏摺理合一併恭繳謹奏覽同日又奏為奏聞事竊臣於本年八月二十一日據江南淮揚道白鍾山稟稱山東安東營海面有船二隻白色白旗防丁放炮竟置不理出入無時往來莫定等語臣閲其所稟蹤迹詭祕不似小賊行徑其為匪船無疑雖在山東地方而海中乘風飄忽來去甚速不可不防查江浙交界洋面有陳錢壁下馬迹羊山等處島嶴皆為往來必由之路前明倭夷劫掠內地定在此處暫停收泊歇息樵汲臣即日密行浙之定海及江南崇明二鎮令派將僃借名遊巡帶領兵船於前項島嶴要隘分路埋伏倘果有匪船經過或登山取水即可出其不意掩拏一靣分行沿海水陸各營加謹防範並咨會江南督撫江浙二提臣去後二十三日又據白鍾山將山東營報文敘詳稱此二船於七月二十三日在亭子蘭洋面遊移二十四日往水靈山及古鎮龍灣各口忽往忽來行蹤無定守臺兵丁打炮數次彼船止鳴鑼響鼓置若不聞等語臣查古鎮龍灣皆係膠州地方而臺兵放炮後尚敢鳴鼓相應似非遊魂小醜或係東洋夷人知江浙沿海皆有水師而山東惟登膠等處故潛來偷看墩臺汛守之疏密及舟師哨捕地方之情形亦未可定臣雖於白鍾山前稟到日即經調度但七月末旬之事而稟報到時巳將一月誠恐嗣後呈報稽遲業又通飭江南沿海文武遇有洋面緊要事情務須飛速報聞庶聲息相通得以預辦事關海洋合將臣兩次聞報行過僃李光彩徐景達可否降為千總録用革職副將桞進忠可否降為遊擊於乍浦教習滿營水師之處具奏請旨感荷恩而又抑其矜驕之氣可使感激奮勉出力報效非臣愚昧所能見及伏思乍浦接聯江南兩省海口咽喉現設滿營水師最為緊要遊擊黃天寅人雖謹飭頗覺軟弱於水師不甚精熟亦曽於會題疏內聲明改調在案目今久瘧未愈哨巡勉強柳進忠人固中平於水師并東洋事情頗為熟悉若以千總職銜暫令護理乍浦遊擊事務責令親身督船東洋哨探試用其黃天寅於調理病痊之日給咨引見再為改補似覺相宜臣現在彚同李光彩等一併核疏遵旨具題相應附摺奏覆伏祈睿鑒謹奏覽同日又奏為奏明事竊臣前因奉旨查勘江南海塘經由蘇州目擊城垣多有塌陷缺口之處不但愚民貪走近路者常於此地出入亦恐夜間匪類竊盜得以乘隙潛遁且蘇郡係省會重地較他處更屬緊要臣既奉特旨兼管江蘇督捕事務則城垣防範最有關係何敢視為膜外但工程浩大時切留心緣前有住居蘇州之浙省鹽商汪敬恕為富不仁干犯鹺規經臣查出飭究今據蘇松太道魏觀審得實情問擬徒罪招詳批允發配間有伊子汪循讓因其父年老願納贖罪請免擺站屢次哀籲呈懇臣念其既知為父悔過情尚可原量伊身家十分之一罰銀萬兩為修城之需巳據自認八千臣隨飭令該道按數追銀解交江蘇藩庫並咨會署撫臣張坦麟就臣當再為設法陸續湊給毋庸撥動正項錢糧而疆圉可以完固矣再浙江提臣陳天培前曽差員於松江緝拏洋盜數名提解究審臣經附奏在案今陳天培所差陸路緝盜之效力武進士李澄等在浙獲有逃盜楊秀供出夥犯張來住居江南太倉州之鎮洋縣鄉間該員隨往緝拏彼地居民以非係本處地方官所差且稱張來素不為匪將李澄并所帶兵役聚衆毆傷據該縣將在場各犯拏獲詳報前來臣查緝盜無分疆界奉有諭旨通飭今李澄等不查實就近知會彼處地方官添差協捕固屬冒昧但明言緝盜又將提督印牌交與看驗則是否正賊即或不實自應到官質審何果否盜夥有無妄扳之處質訊虛實定案外相應附摺陳明謹奏覽雍正六年九月二十五日浙江總督管巡撫事臣李衛謹奏為覆奏事竊臣前將風聞東洋情形密摺奏聞伏承諭旨指示大小邪正之勢固本防外之機仰見睿謨深遠凡古今撫馭之道數言而包括無遺彼蕞爾小醜豈能出聖主之範圍耶臣因江南係緊接浙省洋面崇明與日本亦近隨將大槩情形密封知會江省督撫提鎮諸臣共相防範曽於前摺內聲明其細底姓名皆未宣露適有淮揚道白鍾山報稱山東洋面有白旗號船二隻往來遊移等情緣正在嚴查之際誠恐或係姦船窺探海洋風帆甚速鄰省未知消息一時防僃難及不得不過為小心是以一面奏聞一面即如江南之文將大略密字寄知閩廣督撫提臣一體加謹巡查海汛今於九月二十一日奉皇上通飭諭旨更見聖心周密無微不到諸臣自當敬謹奉行其山東白船巳據白鍾山覆稱查係福建商人鳥船收入膠州投牙貿易等語似非别項匪類至前摺所指洋商三人皆原籍湖州而久在蘇郡貿易者臣託言辦銅之事密令湖州知府唐紹祖根尋蹤迹送到臣處再為設法盤詰其所以傳聞之由即唐紹祖亦不使知也但臣訪聞得伊等皆貪夷人倭照爭相貿易惟恐失其歡心掯照不發故凡有指名求索之處無不依從若到彼國亦與别商同在土庫惟請去之教習人等則另居他處其設謀畫計皆知細底而商等不過得其大槩多不敢言也又聞寧波醫生朱來章向曽在彼醫痊倭王厚贈而歸現領倭照貿易臣今託病令人赴蘇密尋近復訪得倭夷著閩商魏德卿欲請福清縣黃柏寺方丈僧人前往約在九月終到普陀下船以為料無人知臣亦差員改裝預往普陀等候果否到來查實喚訊俟此數處之人到後如探得彼中底裏即當飛馳奏覆再臣伏讀御批從前聖祖仁皇帝即巳遣使訪察此誠睿慮周詳先幾遠照防微杜漸久有成竹以臣所聞倭夷於中國土産多所未有其仰藉於內地貨物者甚殷若驟加禁絶則用度不便恐致多事是以康熙五十四年夷人創立長﨑譯司倭照給與內地商人領運彼時督撫與海關意見不同聖祖天地度量特賜包容聽從其便今莫如仰遵皇上諭旨撫外之道固本防患二語仍循舊例照常貿易惟有嚴加稽察姦弊實力整飭海防水陸以僃不虞則天朝之威德自足震懾邪心而不敢肆其狡志矣至於噶喇叭呂宋等處皆西南洋貨物馬頭從前留住之漢人甚多許其自行回來康熙六十一年以前每歲閩浙廣東之人結伴而歸且有攜帶所取番婦子女同回者前後約數千人皆有各省題報之案可查近則漸少臣訪得在彼地之人不過以手藝覓食並無他患雖紅毛亦稱狡悍然與噶喇叭等處皆與中土尚遠非如東洋日本之近而宜防故從前聖祖定例西南洋許其內販而東洋禁其自來亦因形勢不同之故也若朝鮮久沐本朝天恩職貢惟謹然東洋獨日本為強鄰國無不懼之朝鮮因其相近自然與之往來交好親密不問可知幸日本與西洋天主教結為世仇雖東西遙隔海面俱通彼此不能相容凡商船往倭有奉此教者立即加害并用鐵鑄天主之形令下船諸人腳踹登岸方信無疑於此可見其不能别有聯絡之勢矣又奉恩諭以臣此心為上天聖祖所鑒雖伯什日本何慮之有此皇上垂念微臣初任海疆未嫺機務特賜溫綸以壯措施之膽氣究之粗魯如臣何堪倚畀惟藉上天聖祖之靈故使醜夷狡謀自行敗露耳臣今刻刻小心嚴行防僃於外洋回棹之船加意盤查雖不敢稍有疏懈而方略遠謀非臣識見所及仰求聖明不時指訓俾得遵循以免冒昧臣不勝懇禱之至為此謹奏覽奏內仍循舊例照常貿易惟嚴加稽察姦弊實力整飭海防以僃不虞之議甚是安內攘外要道正在於此也同日又奏為恭繳硃批奏覆諭旨事竊本年八月二十七日九月十六日兩次齎摺把總捧回御批原摺各一匣臣俱敬謹啓封跪讀所有前摺各事除調補衛守僃巳經遵旨具題并密陳東洋事宜現在另摺覆奏外至臣實因才力難勝籲懇聖恩準辭江南督捕重務或解浙江巡撫巨任荷蒙訓諭開誠指導臣自當時刻警惕勉圖報效惟知君上深恩不敢稍存自逸之心有負聖主提命之至意又奉硃批試將勝撫任者薦舉一人欽此伏思浙江巡撫不但刑名錢穀實為繁劇而民風士習之不齊經費公事之難理亦復倍於他省幸荷皇上多方化導移易習俗恩賞養廉得濟公務諸凡區畫無不盡善臣兩年以來不過謹奉訓旨因事調劑其於吏治民情恐尚有未周仍難自信為實是以仰請簡畀賢能今奉聖諭臣謹於所知之人逐一斟酌如王國棟者居心平和辦事公正雖在浙不久而民風土俗俱曽經歷湖南亦係緊要地方何敢固請但臣素知其稍欠風力或於苗疆強悍之區未能相稱若在目今之浙省似覺合宜至於許容才情亦屬可用惟專好自見其長每事必欲不同於人誠如風力皇上睿衷鑒察如許容或可用於湖南則王國棟調任非專任封疆之長才然留心案牘諸事謹細設或聖主教育成人伊等亦俱虛心要好若再加經歷習練他日皆可儲僃任用而目前尚未敢輕議也緣奉御批卿之實情朕巳鑒之朕之苦衷獨不思乎欽此臣捧讀之下不覺感極涕零勒諸肺腑伏承諭旨諄切用是妄陳臆見可否伏候乾斷所有原奉御批奏摺理合恭繳謹奏覽同日又奏為遵旨查覆事竊臣於六月初八日所奏恭繳御批摺內奉有諭旨指示藩司高斌臬司白清才具行為之處纖悉無遺臣敬謹欽遵密加廉察高斌目今器量雖未能濶大吏治稍生但虛衷要好肯盡心協力辦事認真再加習練年餘可以儲僃任用至白清初到任時正在抱病後稍痊愈人亦明白政事頗勤惟覺冒戅尚可勉為辦理近又患偏頭風證甚是虛弱狼狽書辦衙役乘機作弊不能覺察聲名漸覺不好臣雖現在為之釐剔但看其光景未必能有起色浙江刑名事務情偽變幻百出最是繁劇乃係緊要員缺委署兼攝實難其人恐致日久政務堆積不敢因循伏祈聖明預為留心簡選能員以僃任用地方幸甚謹奏人道敏政諸務待人而後舉直省地方但有大員缺出即為朕之苦纍用適其才功效譬之鴻毛遇順風巨魚縱大壑否則反是進退之際安得不低徊審度再四酌量而遂輕易出諸口乎今汝意欲求何人以資臂指其明白具奏候朕酌定降旨補授雍正六年十月十七日浙江總督管巡撫事臣李衛謹奏為聖恩廣被年歲豐登恭摺奏聞上慰睿懷事竊照浙省厯年仰荷皇恩優渥人心激勵而知丕變天意感孚而降嘉祥本年春熟通省豐收倍於往日夏月上遊各府先雖早稻微旱高阜稍減分數旋即得雨晚禾復茂仍獲有年今杭嘉湖紹各處收刈更足通省統計有八九十分不等現在米價平減薪蔬皆賤民食充裕五風十雨人人皆有堯天舜日景象金華府之蘭溪湯溪處州府之麗水景寧等縣俱産有瑞穀一莖數穗不一而足至省城仁錢二縣臣等所耕藉田內更有三四穗之嘉禾洵屬聖朝佳瑞緣曽欽奉諭旨不敢具疏恭進而臣民慶幸之心實切踴躍鼓舞又蒙皇上特沛隆恩將浙江士子仍準一體鄉會考試恩綸一到萬口歡騰實有家頌户禱衢歌巷舞之狀此皆聖主至誠教育所以化導之神豚魚咸格臣躬逢其盛不勝額慶除另疏據呈代題恭謝天恩外相應一併附摺陳明仰祈睿鑒謹奏豐熟情形欣悅覽之天道感應實如影響卿果能保守初志不移地方士庶保守趨向勿遷則自兹上蒼之惠賜休徵朕亦保其必然不爽第毋少涉縱肆愼之愈愼勉之更勉可也同日又奏為覆奏事竊臣前次曽將東洋情形現在察訪另覆等因具奏在案今將曽在彼地行醫之朱來章託言看病業經招致到署臣面諭以邪正大義國法利害反覆開導彼亦悚懼感激供吐實情云東洋惟日本為大與普陀洋面相對所轄六十六島不在一處其與江浙貿易馬頭名曰長﨑離國王將軍駐劄之山城自稱京師程途尚有二十餘日長﨑設頭目二員稱號皆有王家字樣非係國主一管貨物交易每年更換一管地方事務常川住守皆專生殺之權此處夷人築墻立柵名為土庫凡中國商人到彼俱住其中撥兵看守不許私自出入彼向日無聊因往東洋行醫曽治痊長﨑頭目王家得有厚贈故不與商人一同拘管庫內遂酬以倭照貿易數年家漸豐盈後因見夷人射箭不堪笑其無用并誇中國三尺童子俱善弓矢之語是年回棹時通事傳話囑其聘帶弓箭教師并要黃牡丹及二尺濶面之紫檀木三種來章復往時止帶牡丹一株前去到彼開花乃是紫色以此夷人怒之將伊倭照追繳船貨原物發回俱有海關及口岸出入案卷可憑所有萬餘資本因而折耗盡為烏有以後未曽復往現今止託别船順帶些須貨物貿易糊口又原任副將栁進忠因奉旨復賜録用臣行調到省面加細問該員未為把總之時常往東洋貿易皆住土庫之內於彼地情形甚悉其所言與朱來章大概相同并畫有長﨑島地方形勢一圖看其海道亦屬險峻之區又臣前奏洋商余姓即俞孝行亦於蘇州密喚來浙面訊合三人之言在俞孝行則云因夷人喚彼交易曽見過長﨑所住官署規模閎壯防守嚴密頗言夷人之雄猛利害而柳進忠朱來章皆稱倭夷不無窺伺妄念性惟好利貪嘴無有遠謀其弓箭俱屬本地之物盔甲亦與戲子所穿無異近日始偷出內地式樣製造雖有船隻而小止於本處近洋往來內地海道不熟駕駛亦未諳練炮火固狠亦不善用皆云彼地各島之人惟沙思馬一處非常勇健最為強悍其他俱不足慮等語臣查籌海圖編所載日本共轄八十一島內有薩摩州番言撒子馬諒即沙思馬之訛音地在日本西南為入冦閩廣之路其西境盡處邊海之地有五山相錯而生總名五島即今之長﨑設土庫之處順風五六日可抵江浙之陳錢壁下洋面明季倭冦猖獗皆由內地無賴勾引而來如宋素卿起釁於前王直徐海陳東等作孽於後皆以倭人為名實則真倭頗少也今彼貪中國貿易之利凡倭照一張值銀七八千每年更番出洋者數十餘照彼之為利甚大未必自絶於天朝而即有異圖所與往來帶物之商人在內地亦有身家不過貪其貿易懼如朱來章之追照留船而巳總之防範不可不嚴而機事不可即露臣今已請旨將柳進忠用於乍浦以僃東路一面之探緝又先發銀五百兩與朱來章又二百兩給俞孝行令伊等各自置買夷人所好食物等類先後附船再往假以行醫營謀倭照貿易為由前去細探消息看其為人尚肯盡力而朱來章較之别商止在土庫居住者其所得必更真切臣自當隨時相機僃禦不致上厪宸衷以圖稍報天高地厚之恩於萬一耳合將問過情由先行陳覆伏候聖明指示欽遵為此謹奏覽訪詢各情形俱悉命卿總督浙江朕為東南一隅早釋顧慮之念矣硃批諭旨卷一百七十四之八欽定四庫全書硃批諭旨卷一百七十四之九硃批李衛奏摺雍正六年十一月初三日浙江總督管巡撫事臣李衛謹奏為恭繳御批事本年十月二十三日臣前差把總齎捧御批原奏摺匣回杭隨恭設香案叩首啓視內有臣奏浙江按察使員缺欽奉御批汝意欲求何人以資臂指其明白具奏候朕酌定降旨補授欽此竊惟我皇上於內外各官睿照無遺臣聞見淺陋何敢妄參末議前次因見御史伊拉齊比福建去時更覺開濶人頗細心廉謹恐此缺尚未得有相宜之員故於十月十七日敘入奏摺之內附陳是否堪用恭候聖主鑒定又臣聞得向在部屬後為科員曽奉今在部辦事其才守優劣自難逃於但於浙省繁缺恐難優裕若用於小省尚可稱職又近準户部咨文奉旨飭發條陳湖協哨船一事令臣議覆伏查湖屬多係水鄉港汊紛雜非船不能哨捕現在額設營艘數似不敷而式樣亦未盡為合宜臣前兩至太湖由府經過即曽與文武再三議及緣事屬細微未便特疏題請欲俟屆期修造之時再為陳明更改適用今條奏所議均相吻合現在行司確加估計另行具覆合併聲明所有原奉御批奏摺理合恭繳謹奏覽同日又奏為遵旨奏覆事本年十月二十三日臣於發回黃匣內接到密封條陳一件欽奉御批有人條奏此種惡習卿其嚴行查禁欽此臣查內開湖州等處刁民將妻女假裝名色局騙嫁賣事誠有之臣到浙後據各屬詳報嚴加究處豈止於胡道生方美然二案此等刁民不但干犯法紀亦且喪盡廉恥實為人心風俗之害如閔道宏錢子發等案臣皆於賣休本律之外加等治罪比追財禮入官從未嘗使之得利惟律文婦女應斷歸宗今條奏誠恐姦民與婦人父母串通復行詐騙議將知情婦人審實當官嫁賣以絶後弊亦屬懲姦之道嗣後有犯前項案件應如所議並將婦人官賣仍向本犯名下追出財禮給還被騙之人以警惡習再臣查浙省沿海之溫台二府向緣染於福建惡俗沿及衢州金華府屬俱有將巳妻得價出典與人生子留養之後將其婦仍給夫領回始猶無力婚娶者之所為漸則人心日刁即有子者亦借此為漁色之計臣於上年閏三月內分晰飭行嚴禁遇有犯者盡法痛懲目前此風稍熄合并附摺陳明伏祈睿鑒謹奏懲姦貪以厲廉恥明倫理以厚風俗是乃善舉也同日又奏為奏明事竊臣前歲請派委文武分巡地方一事荷蒙俞允於浙省試行兩年以來臣不時加意稽核嚴飭各屬實力遵奉所獲盜賊賭博私宰耕牛及各項拐今臣奉命兼管江南七府五州督捕之任雖受事方始每見江省劫竊之事頻有報聞逐日不下數件且賭博私宰皆係盜源任意疏縱查禁未嚴臣雖密行訪察巳拏獲積窩匪類數起交發各該地方官就近審究歸案但須先事巡防方克有濟當經咨商江南督撫提臣會同酌議亦將文武各員派定地方委令巡緝專其責成仍著該管本轄上司嚴加稽查地方廣濶非此難得嚴密謹繕摺奏明伏祈睿鑒謹奏覽同日又奏為奏聞事竊臣前差辨員赴普陀等候福建姦商魏德卿所託夥計柯萬藏聘請僧人私往東洋一事今於十月十八日據臣撫標千總王國材把總李成基協同定海鎮標把總何有嬌果然全獲解到柯萬藏并僧人璧峰等九人稱伊等委係自閩省由內地行走於十月初九日來到寧波改換姓名假稱普陀進香初十日由鎮海關出口被李成基尾隨其後至普陀會合何有嬌拏解前來臣親加訊問柯萬藏乃魏德卿夥計璧峰係福清縣黃柏寺僧人日本向有福建寺一座聘請中原和尚居住稱為唐僧揆厥所由無非蠱惑伊國人民使其心服將軍恐嚇無知之故臣面見璧峰等亦非德行高僧現今飭發嚴加收管在省但思自拏柯萬藏後事巳顯露且前訪之偷出弓箭盔甲式樣招請教習等事件件俱實目前臣遣往東洋探信之朱來章俞孝行業巳由蘇置貨正在起身誠恐所訪之姦商鍾覲天等知風畏罪逃往東洋生事難以弋獲現於各處口岸密即差人盤詰堵截并行杭湖二府將鍾覲天同伊夥計沈順昌及在洋武舉之父張彬如同伊弟張琰設法拏獲解到臣即親加面訊伊等代為夾帶違禁之物件聘請教習等事俱經供認是實但求留其性命情願令伊父密寫家信鍾覲天代為託人寄與其子張恆晫探取夷人實在消耗以贖死罪等語其餘尚有姦商費贊侯魏德卿及獻地圖之李昌謀今現在蘇州恐其心虛遠揚隨差臣標守僃龔炳前往密拏到日審明作何分别處治另行請旨定奪至各洋商貿易之事既不便遽行禁絶但從前止領夷人倭照我天朝並未定有到彼作何管束稽查之法是以聽其爭先獻媚臣今擬於十一月初旬乘往江南面議海塘工程之事到時會同江南督撫諸臣設法於各商之中擇其身家最是殷實者數人立為商總凡內地往販之船責令伊等保結方許給以關牌縣照置貨驗放各船人貨即著落商總不時稽查如有夾帶違禁貨物及到彼通同作姦者令商總首報於出入口岸處所密拏倘商總徇隱一體連坐究罪庶幾事有責成可杜前弊容臣到蘇公同議定辦妥之時再為陳覆又前奉諭旨朝鮮與日本往來之處今臣密加訪聞查東洋長崎口岸之北有名對馬島者與朝鮮國相向地方邊界頗近順風一二晝夜可通朝鮮地方亦設有館舍聽從日本著倭人赴彼國交易不許朝鮮之人前來東洋而其暗中往還親密無非畏其勢大力勝之故但事在詭祕尚未確知合併附摺陳明伏祈聖鑒謹奏向傳日本敬佛皈釋常延內地僧人至彼崇奉朕所素知斯等處當察明既非匪類又無姦謀則姑寬一步勿使彼國妄生疑畏其餘所奏俱是事事應如此留心愼密為之諭浙江總督李衛發來逆書一册卿試觀之世間竟有如此怪人天下竟有如此竒事然朕胸中全無一毫忿怒也朕君臨寰宇六載於兹勤求治理宵旰不遑惟期仰答皇考付託之恩下慰蒼生父母之望凡戴髮含齒之儔將必念朕之勞諒朕之苦即夢寐中殊不料當代臣民有如是詆毁誣謗者總緣德薄化淺所致自愧自責而巳夫復何言逆書內惟阿其那塞思黑一條實為朕昆弟人倫之不幸但其事由罪狀皆曽告之祖宗示之舉國詢謀僉同而後定案實係內外共知共見者然朕不能化二人之愚頑即朕所不能辭其咎矣至其餘梟鳴犬吠之詞不特風影全無縱朕窮思極想亦所不到夫平人仇怨至深含沙相射尚不忍出之語一旦加諸君父之身噫嘻異哉幸爾天道昭彰令自投首靜言思之翻足感慶借此以表明於天下後世不使白璧蒙汚何莫非上蒼篤佑乎俟將逆類獲齊審明結案後自另有通頒諭旨曉告直省今因浙江有夥犯姓名欲卿僃悉原委庶便加意密緝爰命鈔發逆書先以示知看畢即行繳回不必録存謹防泄漏其書內所稱東海夫子即士子輩呼為呂晚村其人也如查嗣庭王曽期必係黨類固不待言此外根株蔓延實繁有徒湖南文到一一捕交大抵皆曩日一念和尚案內漏網餘孽即卿所奏勾通倭夷者非彼而誰是乃上蒼默示大靜之機暨皇考在天之靈默佑所致以故暗奪其魄驅使供招斯一事正卿竭忠報效之地盡力為之在他人或恐過濫波纍無辜在卿自必推情酌理斷不致有玉石不分蘭艾同焚之失也此番實朕不幸中之大幸也若朕稍歉於心有幾微不可以對幽獨便書此諭於卿亦何顔落筆至於夷狄之名本朝在所不諱孟子稱舜東夷人也文王西夷人也豈害其為聖人乎蓋本其所生之地而言猶夫後世籍貫之謂粵自發祥長白應運而興主宰華夏撫育黔黎為中國者今八十餘年實不愧漢唐宋明諸君也又逆書夷狄異類詈如禽獸云云設不論仁虐第以所生之地妄分中外輒比之為禽獸而輕賤之則華夏之人無父無君殆禽獸之不若矣侮人乎自侮乎且逆賊止知中國之賤夷狄而不知夷狄之賤中國也準噶爾呼滿洲為蠻子滿洲聞之無不髮指此非貴夷賤漢之明證耶朕返躬內省雖不敢嫓美三代以上聖君哲后若漢唐宋明之主實對之不慙御極六載夙夜兢兢乃今頑民中有如此怨恨毁謗者誠所不解噫嘻異哉雍正六年十一月二十二日浙江總督管巡撫事臣李衛謹奏為恭繳密諭并陳下悃仰祈睿鑒事竊臣欽遵諭旨巳將逆賊張熙在陜供出要犯嚴賡臣沈在寬及呂留良之子孫呂毅中呂黃中呂懿厯當即拏獲所查書籍亦皆逐一交出究訊各供其張熙到浙之處不待加刑直皆供吐惟堅稱不知謀逆之事臣因案關重大川陜督臣嶽鍾琪前摺有將張熙解京之語若不留活口對質無以窮究根源臣因此內雖憤激外作從容使其親族不至逃避隨將五犯及書籍等項委員嚴押於十一月初六日起程解部其餘大小家口查明分别監禁看守候旨提拏又見呂留良家藏舊書甚多雖皆即刻封貯誠恐一時檢點不及或有悖逆著述在內復委知縣白環等四員公同前往逐細查點將經史刻本各書盡行造册加封所有繳來鈔本臣因赴江南會議海塘㩦帶至蘇正在沿途細查封送間今於十一月十七日在吳縣地方接到密諭并鈔發逆賊偽書臣目不忍視口不敢念驚駭如癡莫知所措當即封固暫時密存初不意光天化日之下竟有如此惡逆悖亂之人雖闔門寸磔仍不足以蔽厥辜萬分之一無論臣受恩深重不勝切齒痛心憤恨入骨即愚夫愚婦稍有人心者亦斷無不欲食其肉而寢其皮況蒙皇上將如此悖逆之字發與臣看又開誠諭知臣子職分更當何如豈肯將其同謀逆犯稍有寬縱自蹈罪戾臣隨即燒羽密封飛咨湖廣督撫諸臣凡有供出浙江案犯飛行知會立即查拿斷不致有遲漏臣自接奉密諭後憤填胸臆晝夜不安伏思皇上御極以來凡大小政務以及一舉一動無不上合天地祖宗之心下愜臣民百姓之願而深仁厚澤之周浹於窮鄉僻壤者又極其普遍而廣博誰不深知無不感戴逆賊所造妖言無影無蹤天下臣民斷不為其欺騙即據逆書所稱天下茫茫無有知幾遍尋海內等語則其相與悖亂逆黨僅有數人如猘犬之狂吠而不足以淆惑天下之公論可知惟其惡極罪大為上天之所不容是以使之自行投首敗露逆謀此皆皇上精誠實心感動加細查內如流冦志三垣筆記雜志等有干冒我天朝之語皆明季末年謬妄之人所記及前明偽藩悖逆事迹非國家定鼎以後新作之書然至今存而未燬罪何可逭臣何敢一毫隱諱并同續檢出之隂陽占驗及呂留良嚴賡臣一班假道學相傳著述等書悉行即今雖暫在蘇松然相去甚近兩書夜即可往返浙江一切事宜臣自當加意料理以紓聖明南顧之憂斷不使一人得有漏網也再通洋姦商鍾覲天等皆巳全獲臣親加細訊俱自認不諱且稱各商無知日漸貪利效尤若不嚴行查禁將來必無底止倘能暫留性命無不盡心出力等語臣現將各犯帶赴蘇州會同江南督撫二臣詳加確議取具連環互結設總稽查再將伊等作何分别定擬另行奏覆請旨遵行相應附陳所有奉到密諭一道具摺恭繳其逆書一册遵旨不敢録存懇乞聖鑒察銷切毋留其逆迹今將續行查出呂留良家書籍開具清單另箱封固進呈睿覽謹奏覽同日又奏為遵旨覆奏事竊臣接準部咨欽奉上諭論語曰百姓足君孰與不足朕宵旰孜孜唯以足民益下為念是以各省逋賦則蠲至數百萬每年正額則免至數十萬凡興作工程俱支國帑偶逢旱潦蠲賑兼施此中外所共知共見者乃邇年以來各省督撫等有以地方舊有之項不敢入巳奏請歸公者比時陳奏之際似出急公奉法之心今細加體察此等款項多係地方相沿之積弊歷年未革之陋規不取之於民即取之於國者一種欺世盜名之督撫往往奏請歸公以博清廉之美譽更有本係一巳之贓私巳入囊橐又恐敗露不敢私吞不得巳而奏請歸公以蓋前愆又或回護前任之員而奏請歸公以掩其短則是諸臣欲沽一己之名欲逃一巳之罪而巧借奉公之説為此遮飾之計也著各省督撫等悉心確查若無礙於國無礙於民可以歸公之項則將緣由僃細聲明具摺陳奏候朕批示其有上竊之於國而下取之於民者則應永行裁革不許借歸公之名以遂其私心而掩其積弊如有仍蹈舊習者經朕察出定嚴加處分特諭欽此伏念臣自沐聖主格外洪恩不次超擢於雲南鹽驛道布政使任內曽有鹽課及銅錫厰各款內額外盈餘之銀前後約計陸續共有二三十萬兩在鹽課項下者係從前隱匿分肥之黑鹽井私開新井白鹽井私販沙滷等項查出并新增按板抱母各井及復開只舊草溪麗江府土井之餘息扣存冒銷之部費其藩司項下銅錫二厰出産數多則餘利自饒及兩衙門平頭給放所剩聚零合總之羡餘又運錫斤至浙發賣之利息皆非竊取國帑暗派商民所得其從前加稱壓斤苦纍腳户大平收入短扣兌出以為盈餘之弊悉皆裁革俱經臣先後奏明將應有之項留存以抵地方緊要各用後經雲貴督臣鄂爾泰作何奏明歸公則臣巳離任未及悉知也至於浙江地方原無别樣羡餘久在聖明洞鑒臣所管鹽務關稅數年以來竭力整頓鹽課項下雍正四五六年掣過引目較從前厯來之數共多銷四十萬引有竒約增課銀二十餘萬兩其關稅項下雍正四五六年題銷案內除南新關無多外北海二關共盈餘銀二十八萬五千餘兩以上各項俱係仰賴皇上福庇引鹽廣銷商賈流通所得之正項額課非係地方羡餘止有鹽驛道王鈞請裁之該道衙門厯來舊有鹽商程費二萬六千兩屢據各商呈懇情願仍請復額以充地方辦公之需臣因其有益於國無礙於民是以奏明請旨荷蒙飭部議覆俞允在案又以鹽課項下以不銷少銷之處移改别縣行銷除抵還原額課項外溢出折編銀連前任共二萬一千餘兩原係額外所餘經臣奏明請為修理寧波郡城大嵩塘工水利營房之用此外有各商感激皇恩捐銀十萬兩買米建倉積貯以僃緩急平糶接濟民食現蒙聖慈格外加恩將各商準豫議敘又臣奏明動支鹽課公費銀兩赴川買米運回平糶百姓既食賤米仍餘出銀一萬七千餘兩更得為地方辦理要需以上三款均非裁革歸公之項臣受恩深重圖報素心總期額課充裕而商民無虧以共樂於堯天舜日之下若夫竊帑以沽虛名朘民以掩巳過臣雖愚昧久巳深知恥而不為斷不敢於聖主之前稍有欺隱也緣係奉旨覆奏事理臣謹據實陳明伏祈皇上睿鑒施行謹奏覽奏巳悉卿自當在諭旨之外也同日又奏為奏明事竊臣重荷恩命委以督捕江南之任伏讀諭旨著臣節制文武調遣兵馬誠以盜賊事務關係軍機必呼吸相通而後緩急無誤乃江南各官奉公警惕者固不乏人然其中亦有無知之輩以臣非係本屬竟爾泄視往往地方要務遲久不報如淮安城守營參將烏麗珠將臣發塘飛遞拏賊公文輒令汛兵不行接收駁回揚州營著交鋪司投送致誤時日幾被要犯遠揚臣因尚屬初犯止加申飭使其改過豈意本月十五日臣起行赴蘇之際接有漕臣張大有密札內稱探聞十月二十九日濟寧州城內有匪類聚衆行凶傷害官辨之事臣隨即飛行淮徐邳州接壤一帶文武各官嚴加防守地方協拏流竄姦宄并確探起事根由實在情形具覆各去後乃到蘇之後止據狼山鎮臣王安國呈報前事其淮徐道山陽縣俱於十餘日後以風聞具稟而淮安參將烏麗珠並不相聞未知何心但念武職粗鹵傲慢不諳政體者居多臣若將該參將遽行題參治罪則或其人材尚有可取不忍以此棄置惟是伊等之樂於用命者一在畏軍政之參劾一在望升遷之提拔今臣於盜案疏防自應聽兩江督臣范時繹會銜列名如有匿盜縱賊查參之外其餘不敢越爼過問是以視同贅疣呼應不靈若任其廢弛又恐有負皇上委託之重臣亦何所辭咎謹按軍法於武職官員有過犯稍輕者督撫提鎮得以捆責警戒仍留戴罪贖愆臣惟有仰遵成例於軍機遲誤重情分别懲創一二人庶使略知法紀而臣於地方要務亦不致有覆餗之愆矣本不應瑣屑上瀆聖聰因江省原非專轄不敢不為附摺奏明伏祈睿鑒謹奏所奏是卿其酌量為之朕亦另旨申明同日又奏為恭繳御批事竊臣前差千總齎捧皇上批回原奏摺一匣於本年十一月二十一日到蘇臣叩首啓視逐一欽遵辦理外伏念臣以愚魯之才荷封疆兼攝之重方愧見識未周措施難於盡善夙夜警惕不敢矜肆乃屢蒙天語榮褒巳覺難安今復荷御批覽訪詢各情形俱悉命卿總督浙江朕為東南一隅早釋顧慮之念矣欽此又豈微臣分量之所敢當才力之所能及跪讀之下更深惶悚惟有恪遵聖訓愈加謹慎以期仰副皇上委託重任之至意再臣所奏將軍鄂密達一事荷蒙聖主如天之量曲賜赦宥臣於二十七日可以起身由松江嘉興掣鹽至乍浦將新設水師滿兵營房地基分清回杭即當密為宣示恩旨使之感激奮勵滌慮洗心上報格外天恩而臣又得與之協力同心共辦地方事務近省兵民皆沐洪慈於無既矣所有御批奏摺理合恭繳謹奏朕惟願卿等封疆大臣協力同心也以卿如是纖毫不隱據實僃陳而又於中諒情度理照顧周詳朕焉有不聽從之理雍正六年十二月十一日浙江總督管巡撫事臣李衛謹奏為請旨事竊臣接準吏部咨文欽奉諭旨衢州府知府朱倫瀚著補授浙江糧道衢州府員缺著總督李衛於通省屬員內不必拘例揀選題補欽此所遺衢州知府員缺臣現在遵旨選補但今有金華府知府吳炯巳報丁憂又處州府知府姚鈴其人惟有謹飭小心而剛斷不足無以生屬員嚴憚之意於察吏非其所長一俟該員盤查事竣即當遵旨具題請調回京為部屬之用是浙江現在巳共有知府三缺內惟處州尚屬山僻事簡應另選送部其衢州為閩浙江西交界多有棚民聚處而金華民俗蠻野命案滋繁二缺均為緊要查有原任嘉興府喬世臣前經臣於和之中饒有風力且向辦省倉南米熟悉妥協若以補授抗州一轉移間則首郡得人而倉米亦可兼辦兩有裨益其郭朝端倘蒙聖鑒可以用為知府則於衢州人地相宜再查前任嘉興府同知曹秉仁巳蒙特恩升授順德府知府臣何敢復為瀆奏惟是該員雖籍係西北但伊前任浙江知縣同知皆在海疆歷年既久凡塘工戰船洋務事情最為熟練而辦事聖明乾斷實為地方人才彼此斟酌謬陳末議緣封印在邇恐具題覆奏需時故敢冒昧具摺是否有當伏乞睿鑒施行謹奏覽同日又奏為謹陳輿論相同之臆見仰僃聖明採擇事竊臣前準部咨欽奉上諭各省子母炮位不便存留於外俱令解送赴京臣業經欽遵將浙江通省各營子母炮位催解齊全於九月十三日差員管押送京在案但臣訪之各省提鎮諸臣及水陸將領老於營伍等官俱稱本朝武僃超越前代而制勝禦敵火器更為擅長各種炮位雖有可以攻擊遠處者但入藥演放一二次之後即須將水洗淨方可裝藥再用惟子母炮以一母而容數子重疊攻打最為便捷其於海洋追拏賊艘之時決勝在乎頃刻實非陸路可比必有此炮方能呼吸成功又海水波浪顚簸船隻高下不齊大炮施放雖遠難有準頭且裝藥栽碾稽遲鳥鎗僅及數十步未能於遠處得力俱不及子母炮之追賊奏效等語衆口同聲如出一論臣從前亦曽將各項炮位試演其便捷得用亦惟子母炮為最較之川陜所造威遠炮不啻霄壤之分今在蘇州松江順便會閲官兵見其所用仍係子母炮位又聞福建亦尚未解送進京或亦諸臣因此而有遲疑觀望也伏思此炮雖飭解京然蒙皇上續準部議每營準留一位俾兵丁得以時常演放不致生疏是聖明洞鑒原未嘗盡禁外省之不用此炮而每營止存一位則操演之人不廣而配用之數難敷臣因聞之輿論俱各相符不敢緘默以負聖主好察邇言至意可否於沿海水師各營未送者免其起解巳送者仍準酌量製用之處恭候睿鑒定奪非臣所敢擅請也再臣見江南營伍操演較之别省未免不及而比從前巳稍有改觀合併聲明謹奏命汝等三省督提會議奏聞巳有旨矣同日又奏為覆奏會同辦理東洋商船事宜仰請睿鑒指示遵行事竊照綏來柔遠聖主廣運之鴻模杜漸防微人臣守土之專責日本海島小邦密邇江浙內洋向通市易數年以來設立倭照挾制客商始則要求禮物繼則勒帶人貨遂多干犯禁條不一而足臣每留心密訪僃知蹤迹巳將情事大概屢次奏聞誠恐徑竇不塞積久生端隨將前奏所開先後拏獲各商人等親帶赴蘇會同署江省督撫二臣范時繹尹繼善復加細訊內鍾覲天首先供吐曽為代帶武舉張恆晫現在東洋巳令伊父寫信前往設法喚歸又費贊侯供認曽帶崇明縣醫生周岐來往彼治病業經回籍經臣於途間喚到岐來面訊是實據稱夷人每事訪求天朝故實新聞諸樣書籍無所不有又李昌謀供認曽帶所畫慶祝萬壽圖西湖春夏秋冬四季及城隍山迎會景象現有底稿起出據稱非係中國輿圖又柯萬藏魏德卿二犯供認曽於閩省請僧璧峯等九人前往東洋在普陀洋面為臣訪知先差辨員等候盤獲又沈順昌供認曽允攜帶弓箭今年不該開船未曽製僃其私造迷針箭頭一萬箇欲趕李商之船帶去情由嚴訊堅未肯認又鄭大山供出伊堂弟鄭大威現在東洋未回曽往廣南代帶去家象野象各一隻并象奴二人尚存活象一隻現在長﨑今年又託吳瑞觀帶象配數緣去遲風信不順故未得來而倭照先巳到手并訊據各商鍾覲天等供出尚有楊淡齋帶去秀才孫太源沈登偉在彼講習大清會典中原律例未曽歸浙又朱來章之兄朱佩章先曽帶去閩人王應如教書巳經病殁在洋又閩商陳良選帶去廣東人稱係寧波住居之年滿千總沈大成實屬楊姓冒頂前往教習陳法其的名不知確切現在彼處又郭裕觀代帶僧人馬匹各等情今朱來章先經臣訪聞誘喚至署問知情由前巳奏明後又供出曽帶過各項書籍五百本當即取具的保同俞孝行給與銀兩各自置貨密往東洋探信去訖其陳良選因在日本船隻未回巳令海口文武等候緝拏郭裕觀係厦門人密咨福建尚未獲到以上各情俱據供明與臣前所訪聞不爽惟輿圖盔甲軍器式樣因未曽現獲雖在狡飾而臣揆其情節大象尚且由安南取來送去則此等事皆有之總緣夷人嗜利於商船回棹時各指名令其攜帶違禁人物不遂其請即有掯照退貨之舉而商人貪其倭照貿易惟命是從若不嚴加稽察將來無所底止伏思我皇上德威遠被六合之外皆同胞與況遠夷絲綿繒帛服食器用久仰給於天朝未便遽行槩加屏絶惟是各省商人多在江浙二處出口賢愚不等散漫無紀非設商總盤查無以專其責成臣與范時繹尹繼善公同酌議當面傳集洋商博訪利弊令其公舉殷實老練之人數名現在犯案各商按其情罪輕重監禁取保並將家口查明交鄰總看守俟所遣朱來章俞孝行回棹及招歸張恆晫等到日探明夷人實在行徑再為酌量定擬請旨分别發落合將臣等會核設立規條飭行曉諭示稿另行鈔繕進呈再查康熙五十六年定例除安南通商外其餘西南諸洋禁止往販今福建督臣高其倬題請西南等洋許往貿易巳荷聖恩允準臣愚以為浙江與閩省洋面相同自應循照福建近今題定部議準行則例一體嚴行查驗未便兩岐現在會同江省督撫各臣咨部畫一遵循外相應附摺陳明但臣等識見粗淺所有辦理事宜誠恐尚有未協伏乞聖訓指示庶免舛誤臣不勝惶悚懇禱之至謹奏所議甚屬妥協應達部者咨明該部存案可也雍正七年正月二十二日浙江總督管巡撫事臣李衛謹奏為恭繳御批事竊臣於本年正月內兩次接奉皇上發回原奏摺各一匣俱經叩領啓視欽遵伏讀臣恭繳前次密諭摺內所奉御批指示緣由仰見我皇上量涵天地心若太虛物來順應自無憧擾臣愧服之下實切欣慰且蒙宣示湖廣要犯悉巳拏獲知止有自作孽之數人亦無續摺奏覆王曽期一事僃蒙批示教誨愈仰聖慈廣被覆載同寬不使天下有一事外之人略受驚恐雖堯仁舜澤何以及此臣初時開讀亦竊疑是汪景祺因聞王曽期平日原係好名廣交之人事關重大不敢不詳慎訪察此實愚昧之見致有錯誤然臣自未仕居鄉時深知士庶之家一經奉旨提犯或督撫訪拏無不身家立破是以無論大小一切並不驚張即王曽期之子亦止密諭杭州府借故傳到問明伊父存沒消息從前交遊蹤迹有無著作遺書當即押回連親丁取具的保在家候示有王曽期一事者甚少難瞞聖明遠照今蒙恩批臣自當設法面為安頓使知出於臣意斷不致上厪睿懷也再臣前以江南武職玩忽掣肘附摺上瀆仰荷御批所奏是卿其酌量為之朕亦另旨申明欽此隨蒙特頒溫綸曲賜優奬令臣於下江軍政會同考核從此非皇上聖明焉能信任不疑至於如是此臣之所以夙夜警惕而不敢稍渝尺寸者也至臣自受督捕之任初時見江屬所報盜竊之案每日接續不巳心切傍徨自思道路遙濶非區區文告所能轉移隨密遣誠實謹愼之人四處設法察訪并於員役中遴餘人俱發各該地方官審明分别歸案究擬或帶同作眼以賊捕賊略有成效其黃河上下一帶素有積年巨盜聯絡聲氣散結黨羽肆行劫掠傷害客商拋入大溜鮮有報聞荼毒地方受纍巳久臣訪知其通線倚靠首犯海大如韓五二人直至河南山東境上拏到面加盤問海大如業巳成家雖淨根株其韓五殺人頗多現有犯出數案飭發究質定擬另結近雖竊賊未能盡絶而強劫之案已覺漸稀臣等自當留心竭力緝拏不肯纍及平民疏漏正盜也至定例盜案疏防四箇月限期題參臣與江南督撫諸臣公議凡臣未受事以前盜案仍照舊例各自具題惟上年七月二十六日奉文以來之事皆會列臣名其查拏盜賊則無分先後今臣兼管將有五月新案正在會參若一年之內與舊日較量多寡之數亦可確知其有無成效相應附摺陳明再馬世烆在浙辦事臣雖可省力今蒙旨與之協力辦事俾得練習刑名以副委任又臣請旨調補知府一摺仰荷御批僃晰指示除郭朝端喬世臣二員現在欽遵具題外若呂大雲原屬紈袴之子從前實未妥協但近日自蒙皇上調用之後彼亦深知警惕遇事留心臣又不時批旨欽遵至金華一缺奉批馬日華可以勝任臣竊自擬度或即係杭州海防同知馬日炳則誠如聖諭委堪任使臣現在將馬日炳遵旨請補金華府知府但海寧南面沙漲北岸危險今年石土各塘又有歲修大工巳經具題在案該員辦理熟練輕易不敢别用他人請將金華府暫委台州府同知胡文溥署理俟工程完竣秋汛安瀾之後令馬日炳到任受事尚有杭嘉湖欽差副都御史性桂密向臣口傳奉皇上批回摺內諭旨以浙江百姓既踴躍輸納則催科不可太急並令著臣知之此誠皇上軫恤民隱之至懷浙省歷年荷蒙聖主疊沛洪恩人心實在感戴臣隨時宣布德澤示以至誠三載以來民情亦肯相信近今非但淳朴之縣急公完糧即秀水永康天台仙居海寧德清最疲之邑亦皆不敢拖欠且宵小斂迹海洋內溫處四府地高雨遲分數略減者亦皆竭力完辦臣仰體皇仁現在動支公項贏餘銀兩於此等處所修築城垣開濬河道建立塘閘使小民得以傭工食力而徵比之中亦稍為寬恤其杭嘉湖金衢嚴紹七府去御批奏摺一併恭繳謹奏覽同日又奏為恭懇聖恩準賜陛見以紓微忱事竊臣荷蒙皇上隆恩身兼督撫鹽𣙜重任近又委以江蘇等七府五州督捕事務雖竭盡駑鈍悉心辦理盜案比舊漸覺減少而耳目難周措施未善感荷皇上格外包容得免隕越凡地方各項事宜有為題本摺奏之所難盡者必得面承聖明指示教導方不致有錯誤且自臣叩覲以來至今三載有餘瞻戀積誠倍深虔切查本年開印後各項欽部案件自應料理而夏月南風時候漁汛正盛海洋即需防範秋間又奉特恩復準文生鄉試臣有監臨之責并武闈主考分宜經理惟四五兩月杭嘉湖三府鄉民育蠶上遊各屬早禾農忙每年此時例皆停訟政務稍簡雖有各案題銷錢糧掣鹽之事均係一定章程人皆可以循照料理者臣現將逐件趲辦清楚於三月下旬兼程往返趁此兩月之期叩見天顔親承訓誨不但犬馬戀主之心可以稍慰而於地方民生得有裨益仰懇皇上俯賜恩準臣心不勝激切再定例總督印信有巡撫省分交與署事巡撫事務交與藩司今臣兼理督撫又有鹽政三關等項若不分晰承辦恐一人連本管衙門或難優裕臣愚以為總督職任稽核錢糧事務頗多而觀風整俗使蔡仕􅘎本任原無繁劇職掌可以交與暫署即用該衙門印信辦事其鹽政關務在乎不時調劑疏通稽察事甚瑣屑今臣現將南北二關另疏懇交杭州織造許夢就近兼管如蒙俞允則同孫詔所護之海關巳有專司止有鹽政一項布政使高斌猶係謹慎錢糧小心之人似可暫時帶理至於江蘇等府州督捕事務一則無可交委處二則臣進京往返下江皆係必由之路正可親身經歷營汛察訪積窩查拏巨盜剪除民害何敢推諉卸責但盜賊重情俱關機密臣請預用空白撫各臣應有會銜具題之事暫停列名俟臣回任照常辦理以上皆臣愚昧之見竊自擬議者其中未當之處仰懇睿鑒指示以便至期欽遵題明奉行臣正在繕摺間又奉有諭旨清查江南積欠錢糧令臣與聞事關重大更非面奏此中委曲不能詳盡伏乞皇上恩準施行臣不勝瞻天仰聖激切待命之至為此先行具摺請旨謹奏有旨諭部矣同日又奏為再行據實陳明事竊臣前欽奉諭旨隨於上年十一月二十二日將本身各任內所有贏餘據實覆奏荷蒙御批覽奏巳悉卿自當在諭旨之外也欽此臣跪讀之下不勝惶悚感激自顧何人得邀皇上天恩格外優容至於如是豈臣愚昧所可承受惟有矢竭寸忱仰報高厚但臣上年具摺時鹽課正當次掣之初各所俱未全竣報數故止將厯年趲出多銷引目四十萬餘道增出課費銀二十餘萬兩之處約略具奏今俱巳掣畢計三年之內較前額實多引目四十七萬九千餘道歲中將及趲至巳酉年秋冬數內現在請領新引透用矣又舊制商人住賣地方為私梟占去或片引不行或銷不及數如江南之松江上海南滙華婁奉賢金山浙江之富陽德清諸暨義烏浦江等縣及寧台溫近海府屬數處厯年鹽利皆歸販徒致商包課臣隨時逐加調劑近日各知守法俱陸續開有商店并官為彈壓監賣從前引張惟慮積滯攤賠今則頗覺不敷將來再連巳酉本年兩掣通計合算實可共增課費銀三十餘萬兩各商且得多銷獲利又不止於臣前摺所奏之數也更有茶商項下自交臣清查之後剔除舊日弊端酌定輸課規則每年銷引一十四萬道除正額外贏餘銀六千兩倘得多銷更有溢出若入又浙江海關一處稅銀自設立以來俱留充本地兵餉向無解部因有司書需索不遂混將海關稅銀造入撥册雍正三年春季正稅奉文解京是以僃存水腳解費每年多寡不齊難以定數雍正四五六等年正稅未奉部撥贏餘逐年解京故前護關寧台道王一導台州府江承玠任內於各項贏餘之外共陸續留存僃用銀九千兩有零至今在庫若遇稅餉仍然撥京此項內自應提充解費亦有寬餘倘照舊例留存本地則嗣後毋庸預扣而從前所存之銀更係額外多出儘可僃公浙省尚有各地方城垣營房臺寨及沿海塘堤河道堰壩應行修築疏濬并摘出田賦不清數縣丈量地畝工費等項實皆有關國課民生利益之大者或可以之添湊動用完竣時核實案卷隨帶未全以上二項致有遺漏謹再補行陳明伏祈聖慈埀鑒謹奏覽同日又奏為遵旨不敢具疏謹繕摺􅅹陳蟻悃奏謝天恩事竊臣躬受聖恩至深且重此生巳難報稱乃有臣族兄候選員外皇上允臣奏帶赴浙在署學習吏事後復而受禍是以冒昧瀆陳惟求解任别調或回籍侍養荷蒙皇上調京引見升授江西寧州知州不惟得以保全更且獲邀進步臣尚未與二人相見聞俱於引見之後重受賞賚之優獲嘗天厨之味且皆微末下臣得以恭請聖訓更出格外隆恩臣自顧何人而一門兄弟沾沐寵榮至於如此在二人自當矢竭駑鈍仰報君父下愧祖宗以為子孫族人之戒緣曽奉有諭旨凡兄弟族黨簡用升遷者俱停止奏謝臣不敢具疏而感激蟻忱實難自巳為此具摺恭謝天恩伏祈聖鑒謹奏覽硃批諭旨卷一百七十四之九欽定四庫全書硃批諭旨卷一百七十四之十硃批李衛奏摺雍正七年七月十五日浙江總督管巡撫事今丁憂給假臣李衛謹奏為聖澤垂及泉壤微臣銜結難酬恭謝天恩􅅹陳愚悃事竊臣於本年七月十三日準署浙江總督漕臣性桂移準吏部咨開奉旨總督李衛之母汪氏訓子成名夀逾大耋前巳降旨照伊子尚書品級給與封誥以昭特恩今伊子來京陛見未及回任而聞溘逝深為憫惻著賜祭一壇令署督性桂致祭李衛著在任守制給假兩月料理伊母喪事其各任印務暫著性桂蔡仕􅘎等照前署理該部知道欽此知會到臣伏念臣母汪氏出自蓬門躬逢盛世龍章三錫屢蒙光耀於生前天語頻頒又荷表揚於身後特恩豫祭叨格外之榮施専遣大臣沐逾涯之曠典不但臣之老母感戴九原即臣子子孫孫亦頂祝萬世除俟恩祭後循例咨請署督臣性桂等具疏代奏恭謝外臣感泣愚衷刻難自已謹先具摺叩謝天恩伏惟聖鑒抑臣更有衷曲下情不得不據實瀆陳於聖主之前者前此自京星馳回杭臣母去世七日遺言囑令早殯歸土為安臣銜哀痛心擇於九月十一日合葬父塋因不敢擅自回籍遵例在浙候旨今承恩命即當扶柩起程由水路回籍但葬期必俟九月十一日巳逾皇上欽限期外二十餘日而八月之內槩多刑尅未宜今以丁憂暫免隕越皆出皇上保全優容所致乃蒙聖恩不以臣為不肖仍令在任守制信託至深自返巳為過分尚復何言夫臣子一身服官之日惟君所使淺陋如臣上而祖宗父母下及本身一家皆受皇上深恩戴髙履厚豈不知雀尚銜環葵能向日急圖自效尺寸稍報涓埃又仰見皇上統理諸凡政務聖不自聖萬幾勤勞無非為國為民自強不息臣何人斯希冀偷安自便懇求終制以博虛名此臣之愚戅心迹不敢稍有文飾者也從前臣緣髙堂有母年邁衰頽不無縈念私情今既夀終牖下得與臣父共安窀穸事竣之日臣心别無挂慮惟有仰報廟算巳定制勝得人調臣回京不拘何項煩難差遣皆當竭蹶盡心總之受恩過重舉家俱當報效臣何敢晏然居於督撫之列以圖茍安也緣係瀝陳下悃若仍咨請代奏則必候硃批回杭開讀之後方能知會到臣原籍往返更遲為此冒昧繕摺専差家人齎進臣於途次匍伏待命臨奏不勝惶恐悚惕之至謹奏前許卿來京陛見以為卿必知母康健無虞方有此奏况兼情詞激切是以勉從所請豈料旬月間遽生變故昨在都中若不為大閲稽延數日即行旋浙猶或幾及今令卿抱憾終身甚屬無謂果係國家要務不容緩待為人臣者義不兼顧亦分所當然乃平居暇豫偶緣一時之見致誤卿大事朕心實為不忍但冥默中百凡皆有定數卿宜遵朕諭強飯抑哀以慰其靈可也雍正七年八月十一日浙江總督管巡撫事今丁憂給假臣李衛謹奏為恭謝天恩事竊臣前於七月十五日以愚昧寸衷冒瀆奏請方切悚惶今扶臣母之柩回籍至閏七月十七日舟抵宿遷縣遇臣家人齎捧原奏摺匣到船臣跪讀硃批諭旨感泣涕零失聲長慟從來實覺無地自容至臣此番雖由黃河溯流以上適當秋汛並未發水波浪安恬帆檣平穩甫於閏七月二十四日歸里正在具摺奏謝間又準署河臣尹繼善咨會復奉諭旨念臣扶櫬回籍即令河臣就於家中致祭以千古未有之特恩洊加無巳豈臣母子所敢祇受者更不覺感愧悚惕一時交集臣思尹繼善現在署理河務關係綦重今嵗仰邀皇上福庇黃河安瀾而此時尚在秋汛之末保護必須萬全且臣鄉居僻陋雨水未乾諸事尚難備辦不聖恩恭領諭祭俾河臣得乘霜降水落之後順路察勘各工而臣母得以沾被寵榮直與江海同其深逺矣至臣仰沐髙厚總非言語所能形容何敢瞻顧私情再有瑣瀆俯容上緊料理葬事完竣於九月內起程遵旨赴浙至期另行具題外所有感戴微忱合先陳奏恭謝天恩並奉硃批原摺照例呈繳臣不勝激切屏營之至謹奏覽奏知卿業經扶櫬回籍深慰繫念同日又奏為奏聞事竊臣前在京陛見起程時蒙皇上諭令傳旨與江蘇正署二巡撫將江南各官養廉之數早為核定給發又傳旨與署河道總督尹繼善諸事循照齊蘇勒成規不可另出意見并營伍公費名糧陸續整頓軍器等緣由臣悉遵諭旨宣示諸臣訖其清查錢糧一事亦將面奉聖訓向總理各官逐一細述作臣等之意出示曉諭在案至奉查福寧總兵顔光旿臣未見報不知巳故未除者稍多該鎮回教無子身後甚覺可憫又臣前奉諭旨有可任封疆之用者無論資格具奏以聞欽此臣初未得其人不敢輕率今回浙以來見按察使方謹慎克勤於漕務或可相當冒昧奏覆今見其料理地方之事居心雖好但識見卑瑣主意遊移毫無決斷於公務不敢擔當惟圖茍且挨過與前行徑頗不相同或者福氣限量所致猶户部忽受原任充發郎中席瑗銀四百兩願為代出會清河倉差因臣從傍勸阻業已中止次日添銀一百仍復願往及啓奏時聖祖以此處毋庸添差漢官事雖不行而銀巳中飽及半臣因此薄其為人後見伊在浙江糧道任內辦事尚屬明白臣仰遵皇上公正不偏造就人材至意不以前事掩其所長時加教導伊亦自知過愆更改前非故爾委署藩司印務亦為勉供厥職乃自升任以來及署理巡撫其欲勾通承差吳尚銓至縣聲稱差訪事件將欵單遍行示人招搖設騙經該縣拏解正足見奮勉風力乃仕􅘎不發司府公審避嫌自行提到密訊止將吳尚銓責革亦未枷示痛處而發單之周鼐置之不問反將知縣記大過二次縣書許肇琮更加重責幾斃屬官通為不服又如捕役豢盜作姦各處通弊惟當嚴行追究痛加懲處今仕􅘎將通省捕役盡行革退另募承充則伊等置身事外更可架賊害民而新募之人頭緒茫然豈能偵捕臣據各屬紛紛具稟以為遵照奉行實有不便因面詢仕􅘎答以並無其事臣駭而問之臬司方覲據稱現有署撫行令通飭各府縣并取革捕及募充千兩幾至貽誤乍浦滿洲水師營房從未過問至今不曽完工甲兵搬移家口居住作何料理墻垣門户以上諸事臣同衆面囑數次全不計及又浙省各縣倉穀有從前未曽買足者有新糶應行購還者并補漕案內題明貯銀待買之數甚多今年江浙兩省年景豐熟正須及時預備分頭採買臣雖在浙屢言又途中連次作字催促而看其遷延之狀恐致稽遲久之不惟價長且民間穀已碾米無處購求為國家實心出力者應如是乎因尚無貪婪惡迹彰著性狐疑遇事膠執謹於小而暗於大務所緩而忘所急即如目前清查錢糧頭緒紛繁惟簡要則人易從前經諸臣公議頒發易知單式查填厯年欠數逐户給與磨對虛實呈繳原屬清釐良法各處已經刋刷填給乃因其中字句欵式增添刪減朝為據實報出仍有一畨查追改換之事更多遲滯其他設施類皆如是承查各官所以掣肘而未能即行也况江蘇政務日不暇給而水陸城門舟輿往來時刻不絶今差人設簿出入盤問登填呈報若原不親閲則徒滋煩擾倘必須日逐看過則緊要之事何限而勞精敝神於此豈大臣之所宜汲面諭不拘他省有所見聞據實陳奏今浙江係臣所轄皇上分勞有負寄託至意用敢不避嫌怨冒昧直陳聖明自有鑒察非臣所敢妄瀆也為此謹奏皆所當奏者為奏聞事竊臣聞得本年六月初三日有鹽梟多人在於淮安府屬之清河縣離城二十四五里地名三顆樹地方運私經過有該縣分汛把總劉應科帶領兵目前赴擒捕被羣梟殺害城守營分防兵丁薑必成一名打傷兵丁許竒一名剝衣逃避兵丁董志祥一名該辨劉應科亦被梟徒將繩鞭鐵流星打落所戴涼帽負傷引退梟衆一人無獲此事有關地方臣既經聞知合行恭摺奏聞謹奏有人奏聞此一事情形甚屬凶惡昨據尹繼善奏稱現獲大夥鹽梟一起雖非此案正犯或可因以追究其蹤迹當悉心料理作何緝捕方不致令漏網同日又奏為覆奏事本年閏七月十七日臣於批回摺匣內欽奉發到奏摺一件係清河縣鹽梟拒捕傷兵緣由奉有硃批臣遵查清河縣鹺務雖係兩淮鹽臣所轄臣有督捕之責分當悉心料理緣此事起於六月初三在臣聞訃丁憂之後營員曽有報文俱轉交江寧按察使馬世烆查拏臣已差人各處訪緝近聞於沭陽虹縣等處拏獲數人解交清河縣審究在梟徒拒捕行徑彰著非同盜迹隱藏一時難得者可比况此案原有首人在縣報出梟犯姓名兵役往拏以致拒捕更可著落根究臣回任之時自當協同嚴緝正犯夥黨置之重典不使得有漏網合先覆奏并將奉到硃批鈔摺恭繳再有密陳一事臣於三月內進京之前曽因江寧省城屢見盜劫案件恐係回子及營兵作匪有臣標添設巡鹽千總韓景琦原係回教勇於出力拏賊密差帶同數人四散改裝緝探一時未得正線該辨先行旋浙留下巡兵在彼內有李竒向日略曉六壬借賣卜為名遇著一人名于璉者居住江寧本城亦知此技因起課熟識遂相往來其行蹤詭祕言語支離每露勾合之意而家道從容又非盜竊等輩李竒假與相好知其多在常州等處行教拳棒久而逗出情由始悉又以符咒黨羽甚多每月皆領偽餉二三四兩不等即浙閩亦有同類聲氣相通待有地方事端始敢乘機起釁凡邀至其家相見皆在四顧無人夾墻密室之中而為首之人尚不肯説出臣聞訃回浙到署數日後韓景琦將李竒密行帶來訴知臣憶從前未仕之時往來蘇揚亦曽於舟中遇一米姓之人行徑言語相同此係伊等巡辨兵役所不知者今所方法令其各自分路改換裝束更易姓名若遇蹤迹假意附入夥內知其底裏果有首惡確據即當會同江南督撫提臣設法密拏要犯解散餘黨曉諭愚蒙安服衆心以靖地方倘屬影響無據之事臣自應加意留心亦不致於張皇宣露也緣此時尚係密探虛實未便行文江省各衙門特先附摺密行奏聞謹奏所奏嘉是覽之卿之體國忠誠自蒙上天聖祖照鑒也勉之同日又奏為陳明寧邑海塘近日情形并動項備料搶護緣由仰祈睿鑒事竊照海寧一帶塘工關係江浙兩省六郡民生利害務須先事預籌備料積土以應不時搶修之需臣數年以來每嵗幾次親往查勘逐段修築防範預購料物準備不虞去春先將單薄低矮之處加幫高濶夏秋潮大幸保無恙續後又於上冬題明將各處一應修補改砌之工在今春及時興築専令道員監督分委多官協辦在案乃於六月內自京回任中途聞訃丁憂在浙候旨之時始知近日海之中流又增出新漲暗沙一股激起潮頭分為三路合流夾攻直潑塘身以致念里亭一帶最為危險所有巳題之工雖經陸續修築間有隨坍隨補尚未完竣此外一切料物器具毫無預備現在舊塘根腳刷深木樁無力石工多有歪斜又值七月二十六七等日霪雨連綿雖當小汛而坍卸矬裂接踵而見如遇大風暴雨潮勢洶湧人力難施必致衝決下河各縣建瓴直瀉關係匪輕維時署督撫二臣性桂蔡仕􅘎既不肯擔承早發帑銀備料保固屢向面催始去會勘一次亦無切實設施閏七月初旬臣將扶柩回籍正值大汛勢在危急不得巳飭行鹽驛道將庫貯每年酌定準存公費十二萬五千兩之內臣任節省項下之銀暫發一萬兩解於海寧縣庫交與杭嘉湖道王斂福收掌署藩司方覲稽查以現價星飛買土備料雇夫督率各工員晝夜防守隨時相視潮勢緩急分别搶護堵禦如有不敷再於原欵詳請續發保過八月大汛另為從長計議臣起程之後復留員辨在工令其不時將情形飛報今途中連次接稟自七月念六日起至閏七月初四日止東西二塘共坍矬三十三段計五百七十餘丈經該道督同委員等支動所發銀兩鑲砌填堵加高加濶搶修完工其望汛情形尚未據有報到臣現有疊次發諭令王斂福加謹防護無致貽誤但潮勢若何未可懸揣今嵗即能保全將來正費籌畫臣心實切憂慮因彼時起程匆迫急於保護未及將發銀備料搶修緣由奏明理合具摺附陳聖鑒俟臣回浙之日即當親行相度作何經久萬全之法另議請旨欽遵謹奏朕為海塘一事時刻厪念乃卿所悉知者亦惟有竭盡人工以仰籲神力保護耳兹欲飭發內庫帑金十萬修建海神祠廟一座以祈祐庇兆庶現命大學士議奏俟覆到之日即交卿辦理也雍正七年九月二十日浙江總督管巡撫事今丁憂給假臣李衛謹奏為奏聞事竊臣前因東洋倭夷勾商夾帶違禁人貨出口曽經先後奏明密遣商人俞孝行醫生朱來章前往探聽先據俞孝行在洋回稟當即咨會署督撫性桂蔡仕􅘎轉奏在案今朱來章回棹於本月初六日至臣家面覆伊到彼時夷人即遣通事邀於樓上僻處細加盤問內地拏究姦商及乍浦何故添設滿洲水師各口岸嚴密之事備知皇上聖德天威甚是恪恭震恐巳將從前招去之張恆晫等五人送出土庫交還中國商人此後不再勾引容留因今番往販之船臣俱飭給坐名執照伊等五人牌內所無商船未便擅自載回稟明請給憑據即可旋浙其打造船隻探得彼地國王住居京師將軍又在省城之東隔一海島名曰大板水勢急溜欲載象渡過此島曽倣中國式樣造船後聞內地查拏消息即行停止改用木簰扎筏而渡惟密探得倭夷久有欲令薩摩島頭目窺伺臺灣之意目下尚無形迹此係朱來章借稱建醮出庫往見在彼居住之福建僧人全巖所聞者但未知其確實今朱來章巳索其倭照一張帶回現巳繳出適因署河臣尹繼善續到隨面同詢問無異其俞孝行亦於八月十二日回浙據稱現在夷人買換之銅仍照前數交易從容不敢短少其餘所言大概相同但未知性桂蔡仕􅘎作何盤詰具奏俟臣回任日再當親加詢問酌量而行至江南查訪匪類之差員皆有稟到其所可蹤迹之于璉竟有候選縣丞職銜因知事巳泄露自覺悔罪欲來投首據稱有前明遺孽假以為名由竹山出洋在於海中山島潛聚內地黨羽頗衆但臣厯來細訪未聞影響恐屬張大其詞不足為據今臣現在赴浙途次自當查實辦理另行覆奏又臣初年撫浙時有富陽縣署被劫一案旋經盤住匪類數人供出盜首混名蠻王在逃未獲而夥盜形迹可疑未得真確咨部俟緝蠻王到案質究一面密差辨員捕役四處屣緝閏七月內於乍浦地方拏有積盜張興據供即係蠻王又號黃魚大王現在弔同夥盜質審虛實定擬具題今據中軍副將吳進義稟稱富陽縣署又於八月初一夜被賊挖洞入內竊去衣服銀兩等情查官署重地前案盜未全獲今又失竊殊屬疏忽容臣回任之日嚴加勒拏核實查𠫭合併附摺陳明謹奏據奏辦理各件俱有頭緒嘉恱覽焉雍正七年十一月十五日浙江總督管巡撫事在任守制臣李衛謹奏為祗承聖訓恭繳硃批事本年十月十九日臣於武闈出場適前差齎摺家人自京捧回批發原奏摺一匣到杭臣隨叩頭啓視跪誦諭旨敬謹祗承又蒙皇上密發署布政使程元章奏摺鈔稿下詢到臣仰見聖恩待臣格外深厚無事不推誠指示將摺奏隱情得令與聞臣感激無地何敢稍有宣露伏查程元章人品端方居官勤慎聖明簡任極為得當目今授事不久從前未曽做過地方官北人醇朴於南省吏治繁巨書役狡猾之處尚未熟練然每事虛衷立志要作好官臣自當同心協力商酌開導共期辦理公事以副睿懷所有欽奉硃批原摺并奉發鈔稿一件照例恭繳再臣給假往回時陸續奉有諭旨交發議覆各事件緣十月初二日回署受事即值武科考試外場入闈又兼離任七月有餘督撫鹽三衙門署任內剩下各種案件及江南捕務海塘清查等項皆須接手考核釐剔頭緒是以奏覆稍稽伏乞聖慈垂宥至江南匪類一事現在設法辦理稍有睂目俟核實確據再為奏聞謹奏江南匪類一事頃據該督范時繹奏稱業經捕獲正犯數名則拔樹尋根此案諒不難於清結隨又嚴旨飭令加意督緝矣同日又奏為遵旨議奏事竊臣奉旨給假在籍接準內閣來字雍正七年八月二十二日奉上諭科臣顧祖鎮條陳果否可行爾等可鈔録寄與總督李衛令其密議具摺回奏欽此遵旨寄信前來并鈔發原摺一件準此該臣看得科臣顧祖鎮所奏挂名書役窩盜一事蒙皇上特諭交臣密議或以臣於盜情案件略曽留意敢不悉心詳酌據實上陳伏查盜必有窩而窩盜之輩實繁有徒雖未必無挂名書役在其中但以此輩之應充皆為窩盜而設臣竊以為尚未盡然大抵盜賊巨窩莫如府州縣之刑書捕役伊等専管盜情熟知線索書仗捕為爪牙捕靠書為墻壁改串供詞移換情節買盜歸案如作生涯朦朧本官高下其手論大股以分贓得月規而豢賊行之既久視為固然更有犯事革退之捕既無拏盜之責又乏養家之資現捕皆通聲氣舊賊聽其指揮彼此聯結狼狽作姦為害尤甚再如不肖武舉武生自知弓馬文字之劣上進無心又恃有護符結交書捕盜賊因其稍有聲勢投拜門下倚為長城平時以贓物貢獻有事則共為庇匿更有破落鄉紳子弟無事可為日與下流往來呼兄喚弟情好益密每每窩盜在家分肥入已因其世家大族親戚故舊體面猶存地方官不免稍存姑息刑書捕役又利其所有任聼指使遂爾日漸鴟張肆無忌憚又屯衛雜於有司之間縣因隔屬稽查責任未免較輕窮丁欠糧無措常有窩頓通賊以冀糊口者頗多以上諸色人等雖未必人人皆是處處相同然約略而言窩盜之人已不外乎此輩若夫挂名書役各衙門不乏其人就中分别亦有幾等如北方身家殷實田地頗多惟恐受欺侮而託身在官每季出費納班以遮門户者此等人不惟不敢窩盜亦未嘗有所妄為若南方疲敝小邑及冷曹間署吏役無人肯當尚須著落鄉保舉報𣲖充百計求退而不能者此外下流或藉城社之名而包攬錢糧詞訟出入衙門料理公事以及把持渡口埠頭行市庇賭窩娼等事誠如科臣顧祖鎮所指臣自外任以來屢經飭查禁革尤須平時留心稽考有犯必懲但云挂名書役悉令歸農之後盜賊即無藏身之處則尚未為確論耳再科臣奏稱照額設之數每名止許添一人幫辦一正一副可不誤公等語臣查書役承管事務各有繁簡不同事少者不必添人即一名亦可無誤其事繁者即一房十餘人尚為不足若欲盡行裁去將徒有禁革之虛名而無實在奉行之成效况此輩傭書之人非比正身經承尚有輪班更換之期伊等終年在署繕寫辦事希圖工食養家而巳實亦無暇出外窩盜不法惟在該管官及上司嚴加稽查不使稍有作姦犯科則吏役自知守法而諸弊不至叢生矣臣淺陋之見未必有當謹據實具摺密行奏覆伏乞皇上睿鑒施行謹奏所議甚屬透徹條陳係不達時務之論洵不可行同日又奏為遵旨議覆事竊臣奉旨給假在籍之日準署浙江督臣性桂移送內閣行文雍正七年閏七月二十二日奉上諭御史龔健揚所奏著鈔寫分發與總督鄂爾泰田文鏡李衛巡撫尹繼善署巡撫費金吾謝旻令其各抒所見確議具奏朕又思邇來八旗於參領佐領外添設副參領副佐領辦理旗下事務甚有裨益至於各省州縣事務實為繁多或於知州知縣亦添設一官為副地方如有查勘工程檢驗命案等事州縣一人不能分身兼顧者添設一人協同辦理亦不至耽延遲悮而州縣官升遷離任之時有平日同事熟習之員接辦亦似有益但兩人同為一官或因事無専責互相推諉或因意見不合彼此爭執轉致事務稽遲即如從前宜兆熊劉師恕之在直𨽻於公事甚屬無益今添設州縣副員是否可行有無裨益之處亦著鄂爾泰田文鏡李衛尹繼善費金吾謝旻各抒所見一併議奏欽此遵旨寄信前來併鈔發原奏摺一件等因到臣準此該臣看得御史龔健揚指陳各條以州縣事繁欲倣漢制分設鄉官其論雖有援據但官制之設歷代異宜而民情誠偽亦閲世而屢變故有可行之於古而未便施之於今者臣請得而詳陳之如引論語先有司之説以為邑宰之下尚有協理之有司夫今之知州以下有州同州判吏目知縣以下有縣丞主簿典史又巡檢司緝捕驛丞主郵傳教諭訓導典文學何嘗非有司乎因其不能分任而但知營私故禁其受詞理事専令盡本分之職掌而巳今設本地之鄉官豈能盡保其賢於佐雜乎又如所引漢制其三老即今所設之鄉約耆民也嗇夫即今之保正里書也遊徼即今之民壯捕快也在昔為官在今為民定制既久不可強而更也再該御史奏內反覆申言差役之擾民故欲設鄉官以救其弊但將一切錢糧盜案賭博保甲詞訟等事盡責成於鄉官之贊理豈鄉官竟可不用一人不差一役以一手一足之力晝夜奔馳逐事料理而錢糧無不清之尾欠地方無漏網之穿窬訟源清而官無塵牘賭盜絶而比户可封乎臣愚以為龔健揚所奏僅拘泥於紙上之古制而不審察於時務之機宜應否無庸置議聖明自有鑒照至臣恭繹諭旨以八旗添設副參領佐領協辦旗務甚有裨益知州知縣亦循此例添設一官為副將是否可行有無裨益之處亦令臣等一併議奏仰見皇上因時制宜凡事欲求盡善無弊之至意夫繁劇之地州縣一身不能兼顧得人協理自必有益臣愚昧之見竊以旗下事務各有規矩凖繩又兼聖明在上不時就近教導自可遵循無誤而地方民情隨事變遷且離省逺近獨處一方難以槩論在兩官之材力意見恐未能相同而居心之公私險直亦不畫一求其以公事為重無分彼此同心協力者自然大有利於地方但恐不能多得倘稍有參差不相上下各懷忌刻或為衙役人民從中煽惑交搆則推諉爭執稽遲事務之弊即不能免聖明睿照洞徹無遺毋庸臣之再為縷陳目前簡發試用人員巳蒙皇上飭令分於司道等衙門學習政務實為造就人才之良法臣愚以為地僻事簡之小州縣缺原不須再為添員而一府之中繁劇大州縣以及衝衢中邑無過數處直省督撫先曽遵旨查明分晰報部有案仰請皇上於候補候選人員內每省除巳經揀選發給外再量加幾員到省之日酌分各知府平日令其教習吏治事務如遇某縣有錢糧徵比繁多修築重大工程以及疑難案件難結關訊鄰縣盜供出境會審等事本管州縣不能分身兼理者知府一面詳明上司一面専委該員𣲖定某事幾件前往辦理事竣仍回府城不必以何員拘定某縣則伊等於所委事件既有専責自不敢有所旁缷而又非𣲖定此縣之官則於正員可無嫌疑互搆之心於本邑人民亦可免趨承煽惑之弊俟其辦理事件果能盡心稱職一二年後遇有各縣缺出量才委署試用照例一載滿日題請實授倘學習仍然不能勝任咨部掣回原籍科目改作教官别途另用佐二其無才可取者原品休致若有營私乖張不時糾參此等人員仍照例按其職銜支領俸銀遇有差委之時量給養廉以資盤費則劇邑事務協理有人而各員亦能逐漸熟練矣再試用人員臣曽於雍正五年六月間附摺陳奏請倣古時幕僚之職效用俟到日未用之先𣲖發各衙門辦理幕務使之熟悉民情練習吏事再加酌量委署蒙皇上硃批分發之説甚善欽此今之不敢一並復申前議者誠恐此等候補之官既經揀發皆以身入仕途即與現任職官無異多不肯甘心代人辦事此後若有情願入幕協辦吏治者或可聽從其便亦行酌量分發於恩賞俸銀之外令州縣官再為些須幫給衣食彼此均屬有益是否得當合併聲明臣愚陋淺識無以仰贊高深緣皇上開誠布公下詢芻蕘用敢冒昧瀆奏伏乞聖恩鑒宥謹奏論奏處大率與田文鏡意見相同鄂爾泰等亦僉云毋庸置議至於試用人員前經有旨令分發司道處學習似甚協當入幕之説亦可不必矣同日又奏為請旨事竊照浙江海塘潮汐靡常屢費聖心籌畫每年動帑興修諄諄訓諭臣等以虔敬神祇竭誠感格之道本年九月間復奉特恩發帑十萬兩興建海神廟宇此誠皇上懷柔百神為民錫福萬古未有之盛典臣以廟工首重基址於赴浙未抵任時兼程先往乍浦沿塘看視至海寧縣親自各處相度查有海寧所舊日基地久巳空間居縣城內正東承生方之旺氣建立廟址實屬相宜但方圓不及十畝規制未能宏敞據所傍居住紳民僉同環籲咸稱聖天子為浙西億萬生民施恩祈福伊等感深刻骨各願將舊房基地零星屋宇領價别遷以擴廟址踴躍歡呼如出一口臣見其情詞懇切俯順輿情照時給價內有賃租之人搬移者另為賞賚幫助通共動銀三千七百九十餘兩連前選用之所基約將四十畝又緣海洋神祇之中天妃為最除各項門廡房廊屋舍外大殿自應列祀司海諸神又須後面寢宫并風伯雨師壇宇其天妃閣並當另為創建壯麗是以地基尚覺未敷續後再行設法充拓惟是工程甚巨動用錢糧較闕里文廟巳至過半其規模制度不比尋常料估經營必求美善雖將殿宇層次間架略為摹擬繪一草圖但平日營造無過小房窄室大工實未諳練不敢輕率進呈今訪有紹興人張爾昭曽充工部書辦閲歷年久現在曲阜估計已竣隨經差員齎文赴東調取到日再為悉心籌畫另繪正圖並將應列祀典諸神恭請欽定遵行至於鳩工庀材採辦監督必得幹員駐劄工所専司其事今浙省各道俱有本任重務難於逐日在工至臣特蒙聖恩専交辦理自應盡心竭力督催辦理然以一身兼管督撫鹽𣙜又有江南各務亦難於在工事事親歷倘耳目心思稍有未到即無以仰副皇上敬神恤民之至意故於九月初一日在原籍接奉硃批奏摺時知有興建大工之舉不待回任即預為留心籌畫因憶有原任萊州府王坦昔為工部郎中時凡任內一切經手銷算皆親身考求從不假手胥役頗有勤幹之名後聞其於萊州任內以庸懦參革臣不知其在萊居官如何而其平素諳練留心工程則所深悉遂於徐州就近遣人前去令其於挂纍案件完結交代明白後即行來浙有公事面諭今該員於本月初旬到杭據云府任各屬俱經出結清楚問以廟工事宜井井皆有條理今雖仍已回籍若調來委令在工監督必有裨益但恐止伊一人尚未必能周到查原任布政使張適屢蒙聖恩超擢重任而自以負性不職兩次獲罪皇上念其舊臣子孫尚加憐憫破格寬宥現今管束在籍彼巳出於望外臣又何敢瀆陳但其人聰明警策年力方壯此等繁巨之事正當使之出力以贖前愆臣仰懇皇上洪恩或可發此二人到浙俾令常川在工效用協同辦理監督營造臣與觀風使蔡仕􅘎仍當不時親身稽察如有推諉怠忽立即嚴參蓋欽工重大如山東巳蒙皇上特遣京員而浙江専委於臣則其信託責任更為綦重臣何敢避嫌而不舉所知以為幫助又安肯稍徇親友私情致誤國家公務自取罪戾也倘臣所請未協懇祈皇上於內府簡派一二員諳練巨工者來浙監督總理更為有益臣因工程浩大冒昧瀆陳恭請聖鑒指示遵照奉行為此謹奏籌畫斯事殊屬妥協之至思及王坦張適二人可謂善能搜羅所舉適當巳有旨諭部矣但只許伊等監督工程勿使干與地方諸務此諭更莫令其知聞雍正七年十二月初二日浙江總督管巡撫事在任守制臣李衛謹奏為奏明拏獲姦匪情形請旨差審結案事竊臣前因江寧省城正月間屢有盜劫之事曽差千總韓景琦前往訪緝有上元縣監生于璉與帶去留緝兵目李竒因起六壬數熟識逗露有謀為不軌之徒以符咒惑人各處煽誘江常鎮蘇松等屬以及浙閩皆有聲氣相通臣於陛見回時據該辨密稟此情隨差韓景琦及原任遊擊馬空北復往密訪確實逐漸開導于璉許其自首免罪止據繳出符籙一紙而首從姓名尚未吐實臣巳將復差往查各緣由於八月十一日先行奏明逮臣營葬完竣回任途中即與江蘇撫臣尹繼善按察使馬世烆密言其事隨又遵相命坐功文武筆籙邪術符法收授門徒甚多等語臣思此二人既有煉成工夫不畏刑法難得確供未可輕舉妄動隨一面訪尋甘鳯池託言臣子欲學弓力武藝將其父子再三設法羅致署中徐圖逐漸盤詰一面分行飭拏匪犯去後陸續據有各屬解到逐一確訊內如張以思等遊手好間曽經竊劫棍徒此案未有不軌情節者當即按以所犯輕重發落取保安插其餘或供出或首報有所干涉要犯收禁管押臣親加盤問甘鳯池先止據將少年無知曽於一念和尚事內有名夾訊兩次經馬逸姿開脫之處直認不諱此外槩不吐露臣因將其父子隔别分開以好言安慰套問伊子甘述使其高興誇耀不覺將伊父平日實情及同類贖悉將江寧之周崑來名璕自稱明朝周王之後張曉夫名天球與之同志兩人名字皆寓有尋王求王之意夏林生在河南固始縣賣花生理往來誘人曽言本城內有周姓富家門下結交推盤手車子人皆受其約束素有大志今年九月間遇見夏林生還是説這樣話欲邀前往共事到了鎮江因此間呼喚故爾回來又安慶有算命之浙江人大志結交往來過客平湖有陸同菴自言遍天下凡才能學問之人俱會過終日往來各處看形勢謀為不軌通州沙上當年聞得有一陳千嵗係海賊等語大槩供出在案隨即分行密提并差拏陸同菴陸劍門等到官與先後獲解各犯止令彼此隔别質供尚未動用大刑察據所言各有情節非係一起如在常州者則係陸劍門新於松江提臣求名不遂輒萌欎勃之志遍逰南北十省所交皆無賴匪人如濟寧溧陽二叛案內逆犯宋南朝馮衡南包六癡皆其相與康熙五十三年在京遇平史官銜書內偽號係東明龍飛六年乙未十一月而投書者則供為閩人高晴主僕其陸同菴經臣親訊細察狀貌語言并所訪平日作為竟是因思想異謀日久遂成顛魔一般終年辛苦寢食在船往蘇松各處看視河路地勢於崑山買有小友堂花園教習徒衆黨羽為事不甚歸家其奴僕并所畜貓犬就本人姓氏毛片黑白呼為老爺轉自稱為相公其他怪誕不經甚多况所指海上謾語偽言則其狂悖無忌同於曽靜張熙一流臣不勝髮陸劍門等一起之情節應俟提到王臣等質訊者也其在無錫者則生員范龍友素不守法教習拳棒結交匪類頗衆雍正五年間因其徒姦淫事發被縣查拏各處逃遁見醫人李九徵之女欲謀為妾哄以大事成時封為守備女更榮貴等語現在不曽嫁人而李九徵貧困無聊亦遂揑造海內四方山有朱姓聚集遣劉尚文聘人之詞互相誆賺龍友信以為實急圖就聘給與銀兩夥同舉人華介綏及金甸南華希渭等逼迫九徵同往乍浦尋訪劉尚文通海九徵無可奈何遂挽閩人劉天利先至乍浦碗店住下改姓名為張五觀九徵同龍友等到乍向其訪問告以劉尚文暴病身故龍友廢然而返近又改易姓名為張貞一與陸劍門甘范龍友等一起之情節經朱惠文首明三面質供相同者也其在蘇州者則布坊砑匠欒爾集為首於九月初七日糾合段秀卿等共二十二人拜把結盟祀神飲酒經蘇州營外委把總蕭成勳巡夜拏獲得銀賄放爾集等反至包頭錢裕逺家詐死打降裕逺首衙用銀一兩未報經臣訪拏提審蕭成勳等各認不諱追起盟單驗訊雖尚無歃血等情但欒爾集之叔欒晉公於雍正元年同徐樂也糾聚砑匠黨衆拜把約會欲於五月五日放火劫庫奪船下海有吳景凡知風出首該地方官止將現拏同謀之人處死數名其首犯二人在逃至今未獲今爾集又復為首邀衆結盟誠恐再蹈前轍難以輕縱其聼從之段秀卿等堅稱異鄉在外止圖疾病扶持别無為匪之情臣查蘇州以砑布為業者皆係外來單身遊民從前數有七八千餘其中劫竊賭博無所不為向因大盜奚貴卿暗中蠱惑欲乘機作孽今貴卿被拏夥黨散逸多於此中將首棍欒爾集監禁比追伊叔欒晉公到案擬罪另結其餘各犯交與包頭保家取結管束但閶關外一帶地方遼濶各匠數盈萬餘必須酌調設官彈壓專司統率立法稽查庶杜釀患此欒爾集一起之情節臣當與江蘇撫臣尹繼善酌量歸結另是行條議可也其在嘉定者則有王朝亦係砑匠供出南翔鎮監生姚秉忠招人散餉每季給銀七兩二錢指稱海上領來有事跟隨聼用等情經臣咨移蘇撫並差員拏獲訊係姚秉忠為富不仁專作包娼雞姦幼童等事因而豢養無賴重給資財以為打降濟惡之人雖每季發銀之數各供相同而通海為匪之事則無確據此姚秉忠一起之情節現在各自照律分别定擬可也以上諸起雖皆分頭做事而甘鳯池頗曉天文兵法因其自負本領人人欲得以為將帥無不與之邀結往來奈鳯池蒼猾異常止皆虛諾彼此通聲總未實在插入推其不肯出首之情則無論何人有事即將助惡為虐可知當此堯天舜日之下雖斷無小醜跳梁而一班魑魅公然揑如曽以坐功為督臣范時繹邀至署中相待頗優而臬司馬世烆之子亦曽向其學習筆籙稱之為師恐二臣因此小節回護隨作札馬世烆令其將張雲如借稱相面課命名目紿送來浙并曉以公事為重當據實辦理諒可相信於平素決不致有干礙又面曽密屬其家人稟伊主轉達范時繹開心見誠切勿稍分彼此後於十一月十九日據馬世烆稟覆張雲如聞其能於筆籙去年未署浙臬之先邀來寓中一會即總督衙門內亦曽喚至署中察看因未露犯法實據尚未究治今勸之不肯赴浙業巳拘獲并同副將張玉金差員馬空北親至伊寓搜查往來筆札內多大有關係現在檢查遣人伴送其周崑來賀任宏已經拏到𣲖員押解并據開有與張雲如帖子往來之人五十餘名又與雲如相交經臬司查出等語而馬世烆稟內未曽將此二人説及臣隨飛札該司詢其字迹是何大有關係并旗員實在根由將張雲如速行解浙質審其字帖有名之人若止係無知被誘非屬同謀未可槩拘株連復照此寫字飛知范時繹尹繼善去後正在日夕盼望江寧將巳獲各犯速行解浙早為質審定案乃據稱先巳伴送之張雲如并報解周崑來等久不見到候至十一月二十八日臣差官帶去作眼之李竒于璉二人回杭隨又面訊其從前出首情節據于璉供稱今春原係賀任𢎞指引雲如收為門生傳授煉鎗符咒因告以欲捐縣丞職銜勸我不必别尋功名當輔助海中真主為用且細講推背圖中悖謬之語令其誘人皈依又現給親筆手書一封薦與揚州鹽商程漢瞻當即在南京繳出復據李竒口稱奉差到寧同于璉領見張雲如亦肯收録門下傳符二道煉習天皇功法又薦與胡愷公許其後日大富貴同在于璉家吃飯尚有黨徒李尊彜圓實和尚跟隨比較武藝親口説出許多悖天逆理的話隨又詰問二人何故先回之處據稱張雲如邀在司署及搜查之時不容千總陸彪與小的們同差去之人在彼看見聞得內有犯法字迹一大箱今已抽換且副將張玉金未肯即拏胡愷公父子先著宋千總告知寓處寺僧四五天後方去搜獲以致伊子偷走其册簿放銀憑據自然銷燬更將有眼和尚換為瞽目僧人所拏聶文九二子其大兒現為驛鹽道書辦反將次子作抵并以年幼之三男換為次子遍拏無辜許多拖纍即二旗下人有無在內身等不知且馬逰擊每日至院司署內説至半夜方出故為揚言恐嚇于璉令其逃走久住無益等語臣聞之不勝驚愕以為必無之事遂將二人嚴押質審間忽於次早據馬世烆差家人趕到投稟內稱釋等語細查皆非臣指名行提之犯何得借以與雲如往來槩拘牽混以為掩飾又稟內將所解周崑來等並不開出移那幾名巳發存留何人使臣不知張雲如有無起解乘此空隙未識作何先行誑奏以占地步聖明在上必能洞察隱情更可駭者如揚州商人程漢瞻於此案干涉有據是以咨會尹繼善并差員往提及接到撫臣回札云總督處巳有行提於先二日前即赴南京等語臣所差去之員亦回至杭州抄有揚州奉到臬司牌開程漢瞻現在投到行知之稿稟同前情臣查督臣范時繹行府飭提之檄於十七日戌時到揚而臬司於十八日即行牌稱欽差處俱能聲氣相通洵不誣矣若云盡係出首之人粧點在他事或者有之而謀為不軌重情誰肯一札大有關係則又何人粧點豈非前後背謬乎是案臣尚未得親審各要犯何敢遽信以為切實而况督臣范時繹臬司馬世烆皆世受愆竟不顧匪類漏網為害之大端將稟內巳稱伴送之張雲如忽而擅自留下要犯遲疑不解是誠何心種種形迹大為可疑在臣居心粗戅頗知大義從不忌刻共事之人即今夏陛見計十有九日並未一言及於范時繹之短處聖心自所洞照今因公事掣肘至此不得不據實直陳况此等事行文所至省分多慮失察之咎易於招尤臣雖不敢顧避嫌怨但今後即自行審出實情在伊等必以為臣煆煉成招好事邀功委屬承當不起懇祈皇上將各匪類所犯本案簡派公正廉明大臣來南逐一審訊分别定議完結庶信讞可成涇渭立分矣為此具摺請旨謹奏此種匪類行藏詭祕習尚乖張暗懷幸災樂禍之心敢作逆理亂常之事關繫國家隱憂凡守封疆者咸肯除殘去穢杜漸防微則姦徒自各斂迹何致釀成大患其有功於社稷蒼生也多矣無如訓之諄諄聽之藐藐內外大臣如卿領會朕旨者無幾卿能矢志堅定勇於奉公朕深嘉而樂與有批示各省督撫之諭可證俟繳到時一一發卿觀看以表見朕意卿於此案勞績甚巨報國之誠天祖早鑒之矣勉力辦理勿緣無知妄論而稍為疑慮范時繹及馬世烆種種情形殊堪驚訝范時繹原係庸流以其才短或不敢肆欺膽小必怯於妄作家豐可以砥礪操守族大定應顧惜門第念及此而將就委任者今將其奏摺并朕批諭發卿密觀即知朕所以用伊伊所以被用之故也他且莫論現今督撫中除鄂爾泰田文鏡外試舉能勝兩江之任者為誰總不得人奈何奈何昨又據范時繹奏聞浙省咨捕匪犯摺內有拏無實據良善自危等語經朕逐段批飭嚴加呵責俟後一併發浙朕洞燭幾先之處卿自備悉諒案內拖纍各犯大抵皆係遊蕩頑民豈有安分良善無故株連之理原屬不足憫惜况非經質對涇渭曷由而分於此寧容瞻前顧後耶據卿奏請簡派大臣南來審訊此等重案發端自卿若竟一人始終其事不特棘手兼亦難服衆心但在廷諸臣中無可專委之人再四躊蹰酌派一本心純正者更命性桂同赴浙省會卿訊鞫密諭伊等第膺承審之名而巳卿萬勿推卸以了結此事至於馬世烆更堪駭愕伊乃誠親王門下所屬馬雲霄之姪也本身既犯過愆且係年羮堯犬馬二案俱豫赦宥復從而棄瑕擢用不能致身圖報巳屬無良設更回邪欺徇則辜恩背德莫此為甚冥默之誅何由獲免卿試觀之朕生平立心寧人負我誓不負人事事惟仗天而行凡負朕者未見漏脫一二報應毫髮不爽思之凜然可畏只知畏天而不畏人誠為處世良方卿當法之人何能為無庸介意對天不愧之事黽勉力行其效實有譬喻算數所不能悉者諭不盡意卿其領悉差來部臣命於新正初旬以內起程前往雍正七年十二月十一日浙江總督管巡撫事在任守制臣李衛謹奏為奏懇聖恩鑒察事竊臣於十一月二十四日接準部咨欽奉諭旨浙江按察使方覲升任西安布政使以安徽按察使劉柟調補浙江仰惟皇上因材器使簡用藩臬大員臣又何敢再有瀆陳惟是浙江錢穀刑名案件繁多倍於西北諸省久蒙聖明洞照全在藩臬得人駕輕就熟方資指臂之助今藩司程元章端方謹慎立志要作好官臣前經備悉奏明但生長中州南省吏治民風不能一時熟諳未免於難事費力目今臣現在幫其辦理而新調臬司劉柟又係北方直人將來到任之初亦須逐漸練習臣一身外實無相助為理之人固不敢自辭其勞而一日工夫精神則有分限在本省各衙門以及遙制江蘇捕務皆須逐一親身辦理何敢稍間如下江清查錢糧稽察塘工等項不能分頭照應聞其多有未甚妥協之處致厪聖懷臣心每抱不安未嘗暫釋且臣觀方覲為人明白細緻於南方案牘繁多吏書狡猾之處經理正屬相宜而體質頗弱時常多病西安邊方事巨似孫國璽強幹材具辦之更為直截了當臣愚昧之見可否仰懇聖恩以孫國璽調補西安程元章用於山東方覲留在浙江庶各員南北風土人情既各便習而臣亦得稍分心力省出工夫於下江錢糧松郡海塘等事悉心辦理共相整飭以仰報高厚於萬一矣緣臣受恩深重愚衷茍有所見不敢不冒昧直陳皇上睿鑒施行謹奏方覲孫國璽皆朕斟酌人地而用不得巳之舉也豈可復行更調劉柟則係慮其不及命卿試看者於伊到任後觀其居心辦事具摺陳明候再斟酌至於程元章朕可保心術端正大本不謬其餘吏治不難練習意欲命伊巡撫安徽所遺員缺卿妥擬一人奏聞同日又奏為再陳匪案近日情形仰祈睿鑒事竊臣於本月初二日巳將訪獲江南不軌姦徒大槩并有其中掣肘下情具摺奏明初三日據江寧按察使馬世烆將前次催提之周崑來等八名解浙其要犯張雲如程漢瞻胡愷公等仍然留下臣將各犯隔别質問據周崑來供原籍河南商邱人久住江寧本姓朱雖稱非係明代宗室巳將曽在一念和尚案內同巳正法之逆犯葉伯玉往蘇州見過偽朱三又名王士元即江湖老人白似雪暫認叔姪事後再敘支派並與另案充發呌化孟嘗君王子丕相好莫逆之處俱自認不諱其解到八犯中止令質證亦未動刑巳俱供出張雲如以邪術誘騙多人投拜門徒口出不軌之言明年可以出頭的話是實至雲如至今未到無從質訊差員飛催去後乃馬世烆接到臣前次駁問緣由於初九日又差家人投稟其有眼和尚換為瞽目僧人一條已據自認書田原非瞽目乃係錯填夫匪犯關係重大是否無目一望而知何至舛錯如此情弊自明其抽換張雲如字扎一條據將札帖雜字二封呈送臣檢查皆係平常字迹及門生名帖並將牆壁黏貼斗方等物亦算在內雖符咒一箱尚未並送巳與該司前稱往來筆札大有關係者逈然背謬至於不將張雲如等起解之故據該司歷次具稟皆稱因欲質審暫留自應將所訊各供通報今又云各犯因無質證恐係狡飾且內有供出仇扳牽連來差情節亦恐虛實未定是以各供槩未敢敘入詳內等語臣閲之更為駭異夫獄貴初情况涉重案更當以供詞為據既稱有仇扳牽連來差情節正須從此根究虛實何故反不敘詳即此全將口供刪抹之處其弊更是畢露矣總之本案情節尚未能得起事惡端屯聚定所不過一班匪人捕風捉影轉相煽誘以明歲是二八秋并甕生涯之妖言妄稱符讖搖惑人心有同在一處或分為各起者若將所提要犯即行解到究明實情分别首從除其巨憝懲其附和即可早為完結不致四處張揚况臣於初提各犯之時惟恐奉行不善密咨督臣范時繹請其就近指揮并飭差員訪有確據之後皆稟明督臣遵行豈意臣所提之有名要犯并另牌差拏之程漢瞻借稱投到臬司按住未報俱遷延不解反將未曽行提無關緊要之人各處羅織并拏其門人之子年未及嵗者以惶惑衆心內如唐建中一人係湖廣籍原任翰林臣移行並無其名亦未有案犯扳出止因張雲如家存伊年家眷弟名帖亦即拘拏監禁夫以一帖而指為同夥則不勝其株連若云因周崑來親戚波及而拏則崑來之壻係現任福建學臣戴瀚而建中所娶乃伊後妻帶來前夫之女並非嫡屬在建中罷官之後流蕩各省落拓不歸下材無用雖非有品之士然學問才名素為內外文臣推重今以之入於謀為不軌案內欲使京中人人為之稱屈則妄拏無辜邀功喜事之名悉歸於臣不知范時繹馬世烆辦理此事何故用心如斯也至臣前奏據回差稟稱所提聶文九之子亦有頂換之處今解到聶璿聶珵二名令首人于璉識認供從前在江寧時實見所拏係文九第三子聶璠彼時兵丁李竒識破曽與差員馬空北爭辨諒恐到浙指稟今所解俱係本人再查張雲如箱內符咒雖未解到而其門徒圓實和尚處搜出之傳授符印邪書內皆遁甲神箭壓魅生死煉習妖狐役使鬼神樟栁人耳報等術則左道惑衆隂謀叵測顯有實據非他人所能裝點者馬世烆業經目擊送到今確供巳得其槩而猶欲為之掩飾此更臣之所不解也為此合再陳明伏乞皇上睿鑒迅賜簡員察審結案臣不勝激切待命之至謹奏前諭甚明於欽差到浙之後查明馬世烆抽換字札刪抹口供各情弊果實絲毫不須瞻顧秉公執法參奏以為負恩者戒雍正八年正月初六日浙江總督管巡撫事在任守制臣李衛等謹奏為奏聞事竊查浙省地方亦照天津添設滿營水師其餉銀照緑旗之數給支臣伏思皇上豈為愛惜錢糧祗因旗人受國家多年養育不可使其習染慣常是以寧動巨萬帑金恩賞各省將軍督撫提標營運生息得沾逾格之惠睿慮精詳無以復加今浙省派出官兵巳經安頓駐劄於內港先行操演駕駛又乘戰船出洋一次漸可教習熟練惟聞各兵內不無有初到艱難差操過勤勉力支持之狀因此與副都統富參相商督率暫宜從寬逐漸嚴肅不可一時驟急並將生息銀兩必思得一經久寬裕之法俾各兵多沾餘利務善為題然其意則亦由糧餉而起且漢人孰不知臣李衛本名而寫作李惠則因清文字係同音似屬旗下中不材之人所為而口聲故作民語以為掩飾之計適該營護逰擊栁進忠奉提督調考自寧波回任同知張若震先經委往松江代為掣鹽隨行調回令伊等密加蹤迹至鄂善到任未久又派赴海寧查勘廟工地基在乍無幾果否有如帖內所言亦在嚴行察究并諭鄂善問明伊父子平日待下有無處治過甚嫌怨最深之人探實具覆係現在督令文武加謹巡防外理合會同將軍臣阿禮袞合詞據實奏聞並將所獲原帖附摺進呈伏候聖明睿鑒謹奏朕謂此事斷非滿兵所為必係張雲如案內匪類之所揑造暗施鬼蜮伎倆以嫁禍起釁將總督名字故意訛寫以疑人耳徐徐加意密訪諒不難拏獲也再者聞朱倫瀚承辦漕糧卿之主畫原屬妥協丁民兩便均稱感戴而朱倫瀚諸凡退縮臨事不肯勇往向前云云未知卿亦有聞否可傳朕諭嚴行飭詢浙江總督管巡撫事在任守制臣李衛謹奏為叩謝聖訓恭繳御批事雍正七年十二月二十四日臣接到皇上發回摺匣內有宣示河道督臣孔育珣覆奏一件賜看所繪進呈御壩圖隨叩首啓視跪讀硃批不勝惶悚伏念河工重大無日不上厪宸衷臣夏初進京時目見運河帶有黃色沙泥直至高郵州之清水潭迅溜甚急及渡王家營黃河轉覺水淺散漫諒因天然壩減低尺寸從前泄瀉太過一時未能積蓄清水敵黃下流漸高所致夫天然壩與聖祖仁皇帝御壩雖中隔洪澤大湖關係應援相為表裏有天然壩堵住南面去水而後御壩可以挑黃河大溜向北實足禆益清口若湖內平時宣瀉太多則黃水倒灌運河恐致將來為害是以臣前在京曽將天然壩情形面陳其御壩在清口之西臣彼時往返俱從清江北渡實不曽經由其地因從前聞得此壩向曽衝卸補修比舊稍為收進并知往來上河豆船進口必繞轉御壩而行問其由來據船户僉云相近之處下有壩根故爾回避臣前此愚昧之見以為根腳既出在水底自然壩頭漸有收進故因天然壩而奏及於此欲使河臣亦當於彼處留心之意逮閏七月內蒙皇恩給假回籍來往俱出入清口曽登岸細看適尹繼善正派官在此處一帶壩工加幫修築臣雖不便越爼丈量尺寸而看來大勢比舊更覺寬濶推求水底仍有壩根形迹之故因思各處栁草掃工每逢夏秋二汛之後土蟄草枯即有低矬不但逐年嵗修隔一二載必須加培高厚厯來壩之式樣俱係下出上收前面迎水愈逺則得力愈多逮後添築一次俱於掃面迎水加鑲層層收入而壩之後身則照原估丈尺亦層層收鋪堤上故裏面尺寸仍然不少今此壩自從前加幫之後嵗修巳十八載舊時壩根自然不能盡壓在內此一定之理緣臣彼時正值往返奔馳公私交集之際未將御壩現在培築完固并其中緣由奏明咎實難辭仰蒙聖主洪慈不即加罪譴復賜指示臣愧感交集適緣浙省海塘草壩搶修工程緊要援照成例調取南河諳練掃手辨兵尹士忠張明到浙教習夫役嵗暮停工來省因而借故問及據尹士忠回稱記得康熙五十二年間山東水發由駱馬湖歸入黃河驟長過大衝急御壩將上面揭去大半係總河趙世顯任內未敢具題著落廳官私下賠修彼時因正當中溜勢湧之際難於水底立腳曽將壩頭收進小尺二丈於後身照原定尺寸幫足其龍樁亦移在上面緣抽調五營河兵相幫在清口一帶撈淺伊亦在內做工是以知之其張明不曽經手亦聞其事相同等語此二人無意中回答之言諒河臣衙門未必留心此宗憑據今細閲孔育珣原摺圖説於康熙五十年幫築之後每年將壩頭仍用柴工修理自是據歷年報部案册查覆臣則無可稽考故有前奏但近見清口形勢巳與往日散濶諭旨下詢理合具摺奏謝所有硃批孔育珣原摺一件御壩圖一匣並齎回硃批臣摺四件相應一併恭繳伏乞聖鑒謹奏覽硃批諭旨卷一百七十四之十欽定四庫全書硃批諭旨卷一百七十四之十一硃批李衛奏摺雍正八年正月十七日浙江總督管巡撫事在任守制臣李衛謹奏為恭繳御批叩謝聖訓事竊臣於本年正月初八日接到奉批發回臣奏原摺併蒙恩賜臣密觀御批署兩江督臣范時繹繳回存摺十一件臣跪讀之下且驚且懼愈以欽服皇上之至聖至明而感戴天恩之極深極厚也伏念凡身任封疆則消弭姦匪原屬職分之常臣於此事方愧耳目未周發覺不速乃蒙聖慈寬宥尚以為功且奉將蘇松常鎮杭嘉湖等處城垣河道橋梁隘口逐處親身細看記載收藏且有擬改官名制度刑法禮文等項著作狂誕不一而足則其心懷叵測豈得避拖纍之名而不加根究今讀聖訓良善不致株連頑民不足憫惜使萋菲之語未能阻撓而臣得悉心辦理實皆睿照廣逺之所致也至於范時繹馬世烆本非知情故縱臣前奏巳經聲明惟伊二人在於本城失察姦宄未免顧忌顔面又因與張雲如程漢瞻誤曽往來遂爾護短欲為掩飾前愆臣不得不據實上陳而聖明洞燭幾先巳於其所奏摺內預為指訓且蒙將范時繹厯次批摺宣示仰見皇上為兩江地方民生休戚關係至重開心見誠隨事教導所以勉勵造就之者實深且切不但范時繹當思圖報即臣返身自思亦慚見識淺陋恐負封疆付託之任益加感愧奮發以期黽勉有為若夫兩江重地勝任匪易皇上於內外大小臣工無不洞照肺腑尚且其難其慎况臣粗疏之識安能斟酌得當實在並無可舉惟有御批所指除鄂爾泰田文鏡二人此外更難其人就中細思如鄂爾泰之識見聲望正與兩江相宜但雲貴吏治民情雖遜於鄂爾泰者皆可辦理無誤惟苗猓番夷魯魁中甸各種土人更兼逺轄廣西新收烏蒙丹江古州等處皆屬冥頑難治若遇總督地又費躊躇誠如聖諭鑒照無遺矣至河南山東接近畿輔要區從前兩省軍務統於河臣節制是以不專設總督自高堰工險移駐清江鞭長不及雖然遙嚴相濟為培養元氣之計祇祈日亦聞海中有姦徒潛聚山島挖土煎銀散餉久巳留心曽於初赴浙江撫任時面陳及此逮後四處察訪亦多有言其子虛者惟據栁進忠密稟臣云先年鄭成功占踞臺灣時麾下原有各鎮兵船及施烺平臺之後有馬五鎮一䑸不隨投誠前至廣南攻打東埔寨得其島嶴屯聚於內借前明苗裔名色號召其間後馬五鎮身故又為廣東人陳上川占踞上川歿後伊子勢弱被廣南王撤進羈留為官不使掌握兵權其地至今仍屬廣南兼轄此外不聞别有消息等語又據新設洋船總商李君澤稟稱廣南一國與交趾甥舅比鄰有仇勢力甚強最為紅毛所畏臣在雲南亦知其槩今據云廣南通事曽向伊等口稱國王有嚮化天朝欲求遣使來浙入貢請封之意臣因未知果否志堅且令去冬往販商人密探其誠偽底裏回覆是宋噶喇叭等處更必畏威懷德總當時為加意設法訪求也至布坊砑匠拜盟一起臣將附和棍徒摘出嚴行發落首犯欒爾集不便輕縱俟枷責後仍行監禁比追從前因犯重案在逃之伊叔欒晉公獲日審擬從重歸結所有稽查安頓之法自當與尹繼善悉心斟酌議定規條恭請聖訓遵行再案內旗員佛插赫者庫有無實在干涉并現巳獲到之假官王臣畢文襄等俟欽差大員到浙會同研訊確情分别定擬具題並將各犯揑造妖妄狂悖之言不便入疏者另行繕摺奏聞所有奉發御批臣奏摺二件并范時繹原摺十一件合先恭繳伏乞睿鑒謹奏覽同日又奏為遵旨覆奏事竊臣於本月十六日欽奉發回原奏摺三件跪讀之後隨即遵旨立催方覲刻期起程星馳前赴新任雖其舊恙尚未復原今㩦帶醫生途間調治諒可不致稽遲其臬司印務道員中實難分身委署暫令杭州府喬世臣護理一面飛催劉柟到後看其居心吏才何如再行覆奏伏讀諭旨因欲用程元章安徽巡撫命臣將其布政使員缺斟酌一人奏聞細觀程元章端方正直之中頗有擔當能知大體雖初親吏事稍覺生疏却肯虛心服善上江易治之區必能仰副外各官臣素日認識同事或聞見稍有名聲者非已擢用即多事故更換新任臣雖留心考求而理繁治劇才能出衆者實難其人似此旬宣重寄未敢冒昧輕舉皇上於大小臣工無不畢照道員詿誤降調聞係候補小京官尚在等候未用此人雖非可勝兩司職任大器亦未知伊近日年力若何但其辦事實屬厯練間曠可惜合併附摺陳明以備皇上再加博採因材器使之用臣謹據實覆奏并將奉到硃批原摺照例恭繳伏祈睿鑒謹奏浙省兩司均屬要缺卿於此外更為留心搜覔奏聞同日又奏為聖慈體恤至深臣心更有難安謹􅅹陳愚衷仰祈睿鑒事本年正月初二日接準部咨欽奉上諭凡內外大臣官員若有奉皇上純孝錫類之至德於臣下所不敢萌之心皆為委曲體恤亘古以來所未有也伏念臣自上年六月以來備蒙聖恩稠疊優加存歿口不勝述筆難悉書臣之一身總不足以仰報高厚何敢先私情而後公事是以於遵旨回任在途之日穿戴素服稍盡一點為子之心受事內接見僚屬仍遵在任守制之旨不敢全行釋服此因私不敵公親不踰尊天理人情各有攸重也何意又蒙恩命實在感極涕零但聞之古人心安則理得臣子既受皇上至深至重隆恩又當身在地方領袖通省文武職任而於萬夀聖節元旦朝會及大臣官員往來經由恭請聖安與拜表奏本等項大典竟不躬親叩頭而晏然使愚昧之見或可除别項聚會日期祭祀典禮欽遵恩旨外如前所指大典數事仍應隨班叩首行禮以盡犬馬之忱不敢恭疏題謝理合具摺奏明伏乞睿鑒謹奏原係朕體恤臣子之特恩內則為朱軾起見外則因卿在制而命著斯曠典也其遵奉毋違請安拜本之際常服仍帶素珠即同從吉不過未著綵色耳至若元旦朝會羣工齊集之期大典攸關非朝衣不可所以朱軾等數年來從未曽素服出入宫廷也仍遵前諭毋違同日又奏為奏明鹽額多銷正引不敷謹陳末議恭請訓旨事竊照兩浙鹽政蒙皇上天恩於雍正四年三月內命臣兼理彼時初經接手又有巡撫衙門清理從前事務於鹽法止循往日章程未得專為釐剔僅能照舊銷完逮至次年逐一稽查設法整頓杜私銷引日有起色將謝賜履接任內未完錢糧悉經清楚且又儹掣從前存引預銷後季官鹽節次題奏不敢再行贅瀆上年五月間臣在京面陳請頒額外引目十萬道以備餘鹽配掣巳蒙恩準回任以後正值菜鹽旺銷之際私梟聞風斂迹官引疏通雍正七年首次兩掣事竣合計共有一百二萬二千六百五十引所有年額七十一萬三百引內除六年冬掣預銷過十六萬六千四百五引外止存本年引目五十四萬三千八百九十五引因前請過餘引十萬道未能足用又於上年十二月內具疏題請餘引二十萬道尚共不敷引十七萬九千有竒臣現在又當具題續請誠恐內部以一年之中溢銷幾及五十萬引不信有如此之多必加詳慎斟酌駁查候覆抑或即令照數增加定額俱未可知但此溢銷之故臣厯年幾費籌畫設法疏通幸得稍見成效多一引則多一引之正課公費總期下便商民上益國帑雖不敢自謂得宜而實在並無他弊今將掣過餘鹽俱封貯倉厫急待引到配運完課發銷若一稽遲則民食即致缺乏而增加定額又恐將來設遇隂雨少煎後任緝私略懈調劑未宜壅滯難行致貽商竈人民之纍仰惟皇上大中至正之治無非加惠黎元合先奏明懇祈天恩於臣題到之日敕部早行商民均沾利澤無窮矣再查鹽法內尚有積弊二端臣初因措施未得大備不敢遽請釐革今略有效驗敢為皇上陳之一鹽課錢糧內有功績銀七千八百一十五兩係明季所定之額此項不出於竈不輸於商而派於各州縣解納原其立法命名之初意乃照縣分大小分别多寡限定一年獲變私鹽船物之價起解充餉少者罰令賠出似不為無著之欵及查各州縣所緝私販船鹽變價追贓及鹽徒收贖銀兩臣鹽政衙門每年另有一疏具題報解而前項功績名目不知何故仍存俱係脫離本欵虛懸無抵久皆責之鹽捕弓兵賠墊伊等窮役無措藉以賣放私鹽得銀抵解本官亦以其實有賠欵不行嚴究是因有限獲之名而反啓縱私之弊巳為不可况近今私販收斂無多鹽可拏遂致比解之時敲朴盈廷則各捕無辜受罪於理法未為平允且功績錢糧另欵按分數考成每有才能之員以百十餘兩未完即罹參革降調處分亦非所以仰體聖明矜惜人才至意臣不敢因循舊習應否念各屬實獲船鹽變價及贓罰等銀巳經解充餉項將本欵重復虛懸者竟行豁除抑或將報解銀兩抵算之外其不敷數目查各處商家本多引少者向係租賃本少商人之引目配掣每張五六七八分不等今額外所發餘引不須租價止有解部紙硃及往來領繳路費每引不過三四釐即巳足用若將不敷功績銀數於情願請領餘引配掣之商人名下按數均攤視銷引之多寡為盈縮約略每引三四分之間在商人較伊等向日租賃别商之價大為減少無不踴躍樂從而抵補功績原額仍然無缺此亦酌劑通變之一道也又厯任銷過殘引例應隨後追出繳部其中或有水火盜賊遺失及肩挑小販道路碎裂鹹漁户風濤漂沒不能完全誠恐部內駁查從前每將後任下年殘引抵數繳送又撥解定限止有八十日之期而行銷州縣共一百餘處不能如期解足故有後引先到者即行墊解而以續解之前引反抵後發之引其事不知起自何時至今數十餘年厯任皆照前例而行臣兼理以後嚴飭設法雖將本任內銷過之引隨時追繳封貯不許移抵牽混而巳往者莫可究詰以前所缺殘引各屬至今未能追清繳解臣查每年引目數十萬張分散各處行銷原不能一無缺少在當日初起時豈能保無重照之弊但係數十年相承之事其作弊者久已消亡物故且有鹺業停歇輾轉典賣更難追求為何人况重照飛渡等弊經臣查出拏究擬罪有案現在實巳革除連年舊引難於影射亦屬無用而衆商急公辦課元氣稍紓又屢將向來行追各官商懸宕銀兩踴躍認完前次曽叨荷皇恩賜以議敘欽遵在案此等相沿舊弊實與現商無涉臣不敢因本任舊引無甚大缺而置從前於不問可否準臣據實題明將厯任現存者儘數繳銷其已經抵還别任及實係遺失無著者免其輾轉追究此後逐年清出次歲遞繳果屬水火遺失肩販漁户損壞取具官商印甘各結聲明存案扶同揑飾加倍治罪則隱弊可以顯除引目經久清楚矣以上二條臣不敢冒昧具嘉所次之紹所則又較輕在當日因地方衝僻私鹽多寡行銷難易故爾分别等差今則各處私梟漸少官引疏通完課似應畫一現在飭行鹽道分司公同各所甲散衆商從長酌議照額均勻不致偏有輕重如羣情妥協亦當具題請旨欽遵庶鹽政肅清矣合併聲明謹奏另諭該部於題本到日一併議奏矣雍正八年二月初八日浙江總督管巡撫事在任守制臣李衛謹奏為遵旨奏覆事本年正月二十三日欽差刑部左侍郎杭奕祿到浙辦理公務傳奉上諭浙江建造海神廟宇應在工所今擬於縣城之內李衛必有意見但不曽將所以然緣由分晰奏明著伊便中覆來欽此伏惟皇上軫念民依至誠昭格特建巨工以崇祀典臣敢不敬凛慎重悉心籌畫查海寧縣城之東約六十里地有尖山峙立海面潮頭俱由此入口實屬扼要之區可以建立神廟巳於康熙五十九年經前任督撫諸臣題請創廟興造完工於六十一年十月內欽奉聖祖仁皇帝頒發御書協順靈川匾額現在虔祀此地山石嶔﨑别無宏敞之基再可恢拓至於塘工處所臣先巳疊次往來今又親加履勘南門之外東西一帶前臨大海後即備塘河道地勢淺促並無數十餘畝寬廣之所雖民地尚可購買擴充人情無不歡欣踴躍然必須填平池塘且遷移隴墓恐致褻瀆神祗更可慮者近海之地皆係浮土聚沙潮汐晝夜兩來俱從塘底汕刷儻將根腳搜空即有矬裂常須往內退進非如河工地面可以多加樁掃向外幫濶者是以再四籌畫擇於城內營造乘生氣而聖鑒再查東西兩塘臣回任虔祭之後冬月以來俱屬平穩前題修改各工正在上緊辦料趕築惟本年正月二十一日北風驟雨巨颶大作潮勢直擊塘身據報又有矬裂段落統算約共五百餘丈現將預備料物刻期搶修保固乘此春月再加幫厚臣等仍當敬謹防護諒可不致疏虞合併聲明為此謹奏防護有備深慰朕念同日又奏為欽奉上諭事本年正月二十三日欽差刑部左侍郎杭奕祿密帶曽靜并悖逆妄人圖像到杭向臣宣示密諭跪領欽遵伏查此輩棍徒造作訛言往來煽惑實可痛恨斷難容其漏網臣細思江浙好事悖謬之人莫過於現在拏獲之甘鳯池等各犯誠恐其中或有在內因將依稀倣佛年貌相近者密令認識逗問語音皆不相像據稱江南稍有影響杭奕祿回京之日會同江南督撫二臣再為推求臣仍當加意留心設法訪察不敢略有懈怠宣露至臣前見曽靜逆惡妄言實深忿激恨不能食肉寢皮以抒公義及觀其狀貌語言乃係鄙陋不堪蠻野無知之人乃知實屬天地祖宗之靈借此妄人以昭顯千古是非邪正之别而使天下咸知造言生事之徒共相警戒誠非偶然也今筆帖式杭嵩安巳密押該犯於正月二十九日起行前往湖南臣專派外委把總吳居功帶兵四名隨同護解至彼并沿途撥兵六名交替接送去訖至極惡呂留良家口子孫於臣旋浙之時即已密令府縣查點清楚分别大小監禁看守逮此番回任後又將其父子墳塜嚴飭文武派撥人役加謹巡查不敢疏忽理合一併奏明伏乞皇上睿鑒謹奏覽同日又奏為遵旨陳明事竊臣上年在京陛見時面奉諭旨令將州縣衙門積習銅弊應行飭禁革除各事宜於回任徐徐開明進呈緣出京之後即值給假回籍於十月初二日始得赴浙受事適當武闈入場又兼離任日久督撫鹽政事宜逐一俱須整頓竭蹶不遑未能即為陳奏臣心實切悚惕伏思聖明在上於吏治民情無微不照揚清激濁剔弊除姦悉巳巨細咸周逺近不遺臣見聞淺陋無以仰贊高深今遵奉諭旨謹就平日耳目所及並曽經於各屬禁飭教導之事約舉數條另册恭呈御覽伏乞皇上睿鑒再加採擇至稽遲之愆仰懇聖恩慈宥臣不勝惶悚之至謹奏册留中適據田文鏡亦經奏到正在較閲考定雍正八年二月二十五日浙江總督管巡撫事在任守制臣李衛謹奏為恭謝天恩事竊臣於本年正月二十四日欽差工部尚書李永升到浙時出郊跪請聖安回至公館相會臣向李永升敬詢聖躬近日精神自必倍增據云皇上下頦偶有些微疙􅜀於伊出京之日巳經全愈臣聞之不勝欣幸繫念因御體萬安既久是以初八日奏摺時未敢冒昧具陳今蒙聖主鑒臣犬馬依戀之心特傳諭旨宣示始備知皇上雖因此暫改祭期而國家機務照常辦理御膳起居仍然如舊旋蒙天佑平安稍慰蟻衷萬一復荷硃批垂問臣好聖明眷顧隆恩過於家人父子雖天地不足喻此高深豈語言所能形其感頌伏願萬幾之餘稍為靜養片刻睿鑒謹奏奏內靜養一語固出愛君之誠然朕謂養身之道不關動靜能養則動未有損不能養則靜亦無益故曰養身莫如養心而養心之要惟貴適理但勉邀上天許一是字則無往而非養也若內懷惜己之心外假他人之力以求事合乎理理恐未當以求理慊於心心更難安如是則反不得其養矣諸凡審巳量力而自強不息以仰籲上天神明之佑啓其或庶幾是以朕生平但知聽天順理以為安宅正路而遵之由之從未有所作為而助長也朕亦未嘗不養也卿其勿庸過慮同日又奏為遵旨覆奏事竊臣前奉明旨下詢兩江之任隨就愚昧淺見擬議奏覆蒙皇上不以臣言為謬將鄂爾泰等諸臣才具心迹與地方事勢機宜難於移調别省之處備悉指示臣得仰承睿訓增長見識不勝俯首欽服又奉諭旨為朕再加搜尋酌妥奏覆不然抑或所知內有堪代浙督之任者乎欽此伏思天下人材皆皇上長養教育因才器使各隨所宜督撫雖同寄封疆而總督之任又在擘畫大計調劑兵民先事圖維當機決斷皆須更進二籌以臣所見各撫臣中逺其辦事才情從前任兩江時雖未能有出衆功績人亦蒼猾性好躲閃不肯擔承而諸事辦理尚無之事臣矢志斷不忍負皇上或能諒此微衷未必甘蹈下愚無知之咎但兩江幅員較浙更為遼濶臣一往直前可以自信而周詳縝密實難預期現今浙江吏治諸務自臣回任以來較前多不相同尚在復為整頓且海洋情形兩省逈異江南崇明之外有五條沙以為遮護天生關攔惟夏至後及十月小陽春南風發時海舟往來方能任意剽疾餘月則多折創紆回大船出進稍艱故上海關各口稅銀亦以時候為贏縮此其可驗之處如浙省陸路不為險隘而洋面則普陀以外緊對日本乘風數日可到且乍浦海門等口四通外彝諸國為閩粵之門户處處俱關緊要臣雖籌海無才數年之中恭逢太平聖世微臣之心仍未敢一刻放下欲求替人此為最難何可脫卸輕身他往若夫鹽務之盈虧民情之向背尚在其次也仰蒙睿鑒者也至奉御批浙省兩司均屬要缺令臣更為留心搜覓奏聖明簡用臣於兩司得藉臂指之助可以省出心力辦理别項公事地方民生均沾裨益矣為此具摺奏覆伏乞聖鑒謹奏前摺所奏劉章昨命該旗查明引見殊覺老邁不堪用矣同日又奏為欽奉上諭事竊臣凛遵硃批諭旨傳到糧道朱倫瀚將聖訓宣諭其諸凡退縮臨事不肯勇往向前之處嚴飭詢問據朱倫瀚望闕叩頭痛哭流涕回稱倫瀚以微賤之人蒙皇上格外拔擢方有今日刻刻感戴天恩亟思圖報實因才識短淺諸事惟恐錯誤遲疑顧慮不能勇往向前日夜恐懼難安今蒙聖主天地洪恩不加罪責下旨訓諭賜問倫瀚雖至愚無知尚有人心安敢上負主恩自干罪戾嗣後惟有痛改前非盡心竭力奮往奉公不敢稍存顧惜以圖仰答皇上厚恩等語伏查朱倫瀚才力久在聖明洞照之中臣於奉旨分晰浙省各官賢否摺內亦經陳明看其舉動行為大槩因係臣奏帶之員從前誠恐僚屬猜疑諸凡膽小不肯出頭露面臣每遇事開導屢次當面同衆督責何敢以同城見聞之事稍有寬假今屆兌漕巳竣臣實未能如聖諭所指料理妥協惟幫船比往常早開一月丁民尚屬相安今蒙皇上嚴飭之後朱倫瀚若再不奮發振作臣亦斷不寬容故縱致幸免參究也合將遵旨嚴飭詢問情由據實覆奏伏乞睿鑒謹奏朱倫瀚臨事浮泛不切惜巳而不急公是其所短極宜加以訓飭向伊云嗣後若不致身奉職置利鈍榮辱於度外仍以躲閃趨避為保全良策則自誤不淺矣屬大員階級去總兵不逺孰不冀幸功名愛惜身命豈肯無故輕生况寧海一營前因將備懈弛經臣特疏參革自鄭友義到任後頗知留心操練亦勤不難逐漸整頓若非有必不得巳之隱情何致遽爾自戕其命其由寧海而至寧波由寧波而至省城道路遙逺臣衙門尚未據該營縣報到而四日之內提臣已星夜飛差前來又致手書稱題報人赴省面詢實情有無别故方敢具題合先奏明抑臣更有不得不為附摺瀆陳者查營伍原須留心整頓而諸事不宜故意苛求提臣萬際瑞新硎初試急欲自見一番設施凡前任石雲倬等所行多有意更改如每年題銷兵馬錢糧朋樁馬政以及護送汛防等項向有繳扺為前項之需夫免各營之舊費以博名仍虛本標之兵額以充用殊屬掩耳盜鈴甚非公正之道又蒙皇上天恩每兵百名各賞存公糧三分修製軍裝甲械向係提臣衙門核銷自應逐加確查侵冒者參追浮多者核減若實在製造用去者其中料物有好歹之分工作有粗細之别且地方逺近價值低昻各不能齊若不論工料美惡惟以賤價為率再三駁減則巳成者營辨既無已資捐賠未成者不得不茍且塞責臣親驗溫台二處呈到近造步甲式樣止有小釘數箇既無鐵葉又無棉絮長不過膝詰其何以至此據稱連盔每副止用銀八錢六七分不等其鳥鎗長僅二尺有餘腰刀事件止用錫蠟熯口尚未合楞旗幟囂薄亦稱不敢多費之故臣雖嚴加飭責但駁核過甚則物件自然不堪若聽造後再改營伍豈不大纍且兵丁製備號衣為天暑及下雨時替代穿甲站隊跳舞小操之用即各營領運火藥盤費亦係因公所需今以節省為巳功悉皆不準開銷營員從何追補又定海鎮林君升老於水師久慣出洋每船製造戰被數張所匡侯籍係紹興向為兵部將材科管福建書辦缺主萬際瑞從前為營將時曽因升轉銜小不合定例託其斡旋作弊遂為所持諸事由其掌握際瑞茫然不能自主竊思提督統轄全省調劑未為得宜恐致營伍周章臣不敢不據實奏明伏乞皇上賜以訓導使凡事歸於大中則海疆兵民受益非淺矣再訪聞得溫州鎮冉起鳯近日頗有縱子滋事賣糧小取等項現在密查虛實另行參奏外合先聲明謹奏覽同日又奏為虛情難逃睿照恭謝聖明照鑒事竊臣查拏江浙匪類一事因范時繹另有意見從中掣肘是以不得不備將情由陳奏荷蒙聖明洞察隱微欽差尚書李永升到浙會審已於二月初八日將公同訊出署臬司馬世烆副將張玉金通同徇庇各緣由具摺參奏今提到葛繼孔郭如楩各將張玉金託其轉央差員馬空北為伊親家程漢瞻求寬許以從重厚謝之處三面對質皆自認不諱惟馬空北贓銀若未入手何以甘心通同作弊而葛繼孔老姦巨猾豈肯以空言轉託因令二人對質繼孔逗出别處還有緣故馬空北被人愚弄我未曽經手眼見不敢説問伊自已便知之語因此向空北根究始據供出馬世烆先以此事若認真到底就有禍來之語恐嚇後復許以若多住幾天留下張雲如程漢瞻不解范制臺可以賞銀數千兩送往家內自有張鎮逺來會你難道不足憑信等語後有揚州香鋪張鎮逺者來到南京寓所先問馬臬司有無言語關會空北答以有説話至晚又與伊甥楊進寶偕來付以寫就五千兩八折銀欠票一紙鎮逺出名進寶作保借為合夥生息面訂只須辦事妥貼即向伊香鋪交兌伊甥舅二人從中餘剩一千分肥以此將票畫押留下任其所為等語臣等因其情詞閃爍復行嚴訊詰問據供初次程漢瞻央葛繼孔等許銀因事情彰著慮及到手之後被江南拏住又恐浙江訪知重究是以遊移未敢全允惟張鎮逺同係回教素日相好莫逆家資豐厚向為范總督收買古董出入信託之人其甥楊進寶現為督院衙門效用官二人既立票約不慮此銀落空而范制臺又難出之於口落得收用即不應允要犯巳經留下無可奈何是以順從他們等語詰其原票何在據供因臣知其作弊心懷畏懼於臘月十四日將票燒燬滅迹等語臣與李永升性桂聞之不勝詫異以為范時繹係封疆大臣何至作此伎倆殊不可信業於十五日差往揚州江寧分提張鎮逺楊進寶到來質對以見虛實去後今蒙皇上將范時繹奏摺恩賞與臣觀看始知其一片徇私故縱之情和盤托出敢於君父之前仍然肆其欺誑而更驚服皇上之聖明實如日月照臨物無遁情也夫范時繹請張雲如至署學其坐功初欲下拜以雲如固辭讓其上坐時繹在傍領其傳受送銀十兩米一石布二匹此雲如親筆供詞現據無人不知者時繹敢於隱匿實情揑稱恐其妄言惑衆著人紿至經臣一番盤詰嗣後旗人漸亦斂迹等語而又巧為形容將勇壯強健倨傲放肆之張雲如揑作衰老朴野涕泣求賞之狀以見雲如初非不軌之人而暗入臣以妄拏之罪孰知皇上神明早巳洞燭伏讀嚴諭疏漏一名則汝增一分罪咎是誠如見肺肝茍有人心者即當凛奉明旨痛自改革猶可自贖前愆乃竟仍舊抗違延挨不解將字帖有名無甚關係之五十餘人不察是非盡行就近提拏監禁內如原任翰林唐建中止有半幅殘柬名帖劉之泓等年僅十餘嵗者皆在其中臣自浙聞其辦理指揮有意不妥隨即移咨范時繹并飛檄馬世烆以所重止在正犯此等字帖有名者或係無知被誘未曽同謀為匪豈可槩行株連飭令查明立速取保放出此臣原行咨牌告示鑿鑿有據者今范時繹奏稱臣共拏有一百五十八人臬司訊明無干與殘老幼童分别保釋等語夫所謂殘老幼童者即時繹所拏之劉之泓等也經臣釋放案卷可憑而反誑為臣之所拏添入數內欺妄甚矣伏讀聖諭此皆汝等奉行不善有意將無辜之人牽入欽此臣跪聆之下益頌聖主之神明昭雪誠不覺其感戴而涕零矣更可異者差員馬空北韓景琦皆係回教且牌後雖有景琦之名因留在蘇州緝拏范龍友一夥匪類係千總陸彪代往並未到彼今稱二人為臣妾義兄均在江寧招搖未知出於何據聖明在上定能察情度理臣又不必與之置辨者矣至於臣之發示禁約乃因時繹所拏借端牽連之人多被兵役搜檢財物酷詐銀錢波及親友輾轉株連而江寧院司副將故為縱令置若罔聞是以一面飭司拏究一面出示曉諭指出受害姓名令其赴官陳告示檄現在今反以為地方良善自危臣聞知而出示安慰抑何顛倒是非之至於此極也馬空北專差守提要犯聽信張玉金串合行求代為具稟朦混又不押犯同行逗遛在後顯有受賄賣法情弊被臣知覺飭行臬司并交江寧差來解犯守備吳俊提拏今時繹亦以此為口實獨不知身係堂堂總督於一介廢辨先以威怵後以利誘假之以禮貌賞之以縀匹籠絡招引無所不至巳為大失體統若使張鎮逺寫票行賄之事將來如果審實范時繹又何言以粉飾也伏思人臣之對君父惟有一誠時繹既稱事關重大知不能逃於皇上神明洞察之下而敢於矯誣揑飾如臣前指各條件件有據無一不係欺誑并既聞巳有欽差而猶以特遣廷臣為請全無一點誠敬之心此又其罪之難逭者矣臣以孤根戅直為衆所忌獨於時繹素無猜嫌止因奉旨查勘松江海塘緣係緊要工程有關國帑民命不敢扶同附和又兼管理下江督捕等事以此怒臣至不可解邇年以來無處不暗為中傷幸荷皇上天恩前次賞發時繹奏摺觀看臣始得以曉然否則終身不能知悉矣臣本不敢煩瀆聖聰緣被誣情節何敢不逐條據實回覆詞意冗長伏乞皇上慈宥臣不勝頂戴惶悚之至謹奏詳覽所奏瞭如指掌矣從來小人伎倆旁觀猶同兒戲而自以為幾深莫測此亦無足怪者但不意庸愚如范時繹輩乃敢於朕前舞智弄巧想未具心思耳目耶殊為不解總緣福薄未能擔荷朕恩之故耳同日又奏為恭繳御批事雍正八年二月初十日臣前差把總齎回硃批奏摺四件併奉發廣東督臣郝玉麟奏摺一件臣叩頭跪領逐一敬謹欽遵正在愧感交集繕摺覆奏恭繳間今二十一日又據臣差千總捧到批回後次原摺六件又奉發署兩江督臣范時繹奏摺七件與臣觀看推心置腹感戴實深除兩次所奉諭旨內應行覆奏者另為分晰具摺備陳外伏蒙聖恩奬勵逾分無地自容又以臣賦性愚戅惟恐於緊要事件急於建白不加詳審於覆奏河工摺內溫綸訓誨臣益自慚粗疏向後更當諸事詳慎不敢稍有忽略以仰副聖主愛惜臣子之深意至粵閩宵小造劄煽惑為盜作皇上大沛洪恩加給餉銀此誠聖主恩同覆載明並日月料事於幾先優恤於格外睿謨深逺臣等萬不能及現在各兵歡聲載道合詞陳謝已經將軍阿禮袞同臣會題在案所有前次匿名謗帖誠如聖諭照悉無遺臣密加確訪向有光棍陳渭濵霸踞乍浦行埠積惡巳久經前任同知曹秉仁處過數次不悛臣又訪拏問罪脫枷在逃伊與腳行沈天佑等結仇最深又有李漢亭白日登樓調戲理事同知皂𨽻姚魏之妻稟控鄂善因未便批呈交與巡檢查實其黨金文端用強硬保懼其詳究遂與渭濱二人商謀造成先發制人併預將平日仇家姓名開寫匿名長單內稱某人綽號真命天子某人即係大千嵗軍師頭領等語封固倩航船帶信之人投入營辨署中以為與所黏謗帖內情節暗合即可中傷姦謀詭計弄巧成拙今巳設法訪拏就獲併於渭濱家內搜出貼原任知縣白環等匿名底稿二紙將前後筆迹與别項帳簿對驗相同據供渭濱創稿文端改定添入悖逆更甚之語倪漢高又代寫二三張李漢亭亦知其情皆厯厯不諱詰其帖內一糧兩餉抱怨之處則稱係鑲黃旗披甲人俗名王老四平日酒後於街上間談時説知現在會同將軍臣阿禮袞副都統臣富參查照年貌行調本人識認再加質對明白果無疑情則此等姦惡光棍自投法網斷難姑容臣等另當公議分晰首從請旨從重歸結合先附摺陳明所有前後奉到御批原摺又蒙發臣觀看郝玉麟范時繹奏摺理合一併恭繳伏乞睿鑒為此謹奏前諭非旗兵所為果不謬耶姦徒全獲覽奏曷勝愈快此種隂謀詭計顯露如是迅速豈人力能為可見冥默之中昭然如鑒但當敬戴天恩於無既耳雍正八年三月初十日浙江總督管巡撫事在任守制臣李衛謹奏恭請皇上聖安朕安近日都中風多覺旱望雨正殷適卿奏到甘霖大沛嘉治具之恢張期民生之有藉批答方停傾注未巳念彼田疇曷勝欣悅特俾卿知之續據山陜二省奏稱於月之初九十一等日連得透雨霑足麥秋有望是皆仰賴天祖垂慈默佑昭示景象一併諭知同日又奏為請旨事竊照東洋貿易各船自設立總商稽查之後出入均有責成盤驗極其嚴密從前隱弊稍為釐剔今據總商頭李君澤稟稱近有伊之行商鄭恆鳴船回於臨行之前有日本管長﨑島夷目彼處稱呼名為王家將該商喚去令通事傳話託其寄信與李君澤著伊稟臣彼國因從前欲求效法內地文武講究制度誤聽姦商夾帶違禁私貨人口僧衆被天朝預知拏獲止從寬發落不加夷國之咎感戴皇上恩德敬畏天威實在誠服除巳將陸續招去之人盡發商館專待原船附歸現有醫生趙淞陽及吳宿來等均已回籍經臣訊供押交原地方官取保安插不許再犯生事其餘此番回棹俱可旋浙目前銅斤照額發販非惟未敢短少比前寬餘商賈沾利更裕貨物之外一切别件禁物不復私帶俱已謹守法度惟夷島建有關帝天后兩處廟宇皆內地商人所造供奉中國正神思延僧人二名在內焚香祝誦又欲購太平聖惠方顧氏勾股全書黃明阿膠藤邊花籃等件不敢如前日私帶必令總商向臣稟明若無準行批示即有偷往斷不肯收又云彼地所産倭硫磺配合火藥攻擊甚逺向俱珍重不與商人私買攜回今情願準商向臣領照核定擔數減價買歸聽憑內地配用從此弛其禁遏仍不敢轉售鄰國以見傾心感戴無復疑二之意臣面加詢問據李君澤極口矢稱夷人近日畏懼待商有體比前大不相同實係心悅誠服願以身家親丁合門保其無虞等語伏思前因夷人勾通姦商招誘各種無賴出洋教習內地技藝私帶僧人書籍輿圖窺探情形是以設法禁防甫經一載雖近來頗知悔過守分而號令所在豈可朝改夕更但察其情形非屬必須僧人等物亦未嘗欲售硫磺圖利緣從前夜郎自大視商過卑每受逐漸刻薄掯勒之纍今因前事敗露巳覺警惕而商衆小人好利之心乘其膽怯未免誇張過甚徐徐加以恐嚇倭性多疑懼怕將來問罪絶販以此試內地有無屏棄之意耳查外夷負固跳梁理應加之以威若輸誠敬畏似當示之以信臣愚昧之見以為所求僧人等物或可酌量無礙者姑為準給以彰聖朝寬大之治其硫磺內地甚多無藉於彼雖係由外而入究屬軍火之需不便開端以貽將來後釁事關懾服外夷臣識見短淺未知是否有當機務伏乞聖明指示到日方可欽遵奉行為此謹奏此奏嘉悅覽焉皆緣一念忠誠感蒙上天錫佑所致卿功大矣硫磺無藉於彼所見甚是當以中國所恃在德而不在軍器之利鈍為詞覆明所以不行之故至於僧人當選擇老成行優者命往再者彼國既求勾股全書今有聖祖御製律厯淵源一部乃發從古未發之奧祕其中厯法不便給與其算法律吕二書發卿斟酌朕意或傳原去商人面告以卿將彼國敬畏情形業經奏聞於朕求得大內藏書寄贈等語并將二書交付該商齎去亦不言朕所賜如此施行得體與否其詳細酌量具奏以聞同日又奏為奏明事竊臣於上年嵗暮之時因聞浙屬平湖縣之乍浦鎮民間竟有私錢攙和行使慮及附近江浙交界地方必有私鑄之弊隨令乍浦同知等員就近密訪據覆江南吳江縣藜里鎮有汝堯年等浙江海寧縣袁花鎮亦有查經陶等皆係私鑄之人臣恐未得正確隨經開單專差標員前往密探有無實迹去後續據回稟探訪多時伊等向日俱曽私鑄是實目前因江浙欲開鼓鑄恐舊錢式樣不行俱欲謀充官局爐頭以為影射現在停止臣以事關大辟重罪若不獲現贓實據難以懸擬因令差役分布左近尾隨察其縱迹勿露風聲正在密緝間今於二月中準江蘇撫臣尹繼善咨會獲有吳江縣私鑄犯人周寧書供出浙江嘉興地方有張君佩等數名係伊同夥匠人移文查拏并另咨知會周寧書供於上年八月二十四日在袁花鎮查慶山家住過有同夥把作等犯姓名前來臣以江省既已動手拘拏恐其知風潛遁一面即將來文之外從前訪得吳江縣藜里地方私鑄各犯及同鎮窩賭之家姓名開出住址咨覆江省一面遣員分往浙屬之嘉興海寧等處密拏除將來咨有名匠人俱經捕獲併在蘇未經供出而浙省現獲者亦差員押解前赴江蘇收審尹繼善又將臣單內所訪之人江省案內供吐遺漏者拏獲數名彼此知會在案其海寧袁化鎮之查經陶查慶山等已經獲住七名並於伊等家內搜獲罐子爐磚銅渣鉛砂併銅水線二條審據供稱伊等父叔在日曽於康熙三十八年犯過私鑄問罪有案目今久已停止驗其爐磚罐子雖係破碎舊物但起有生熟砂子私藏在家似非久歇之象且與吳江藜里之私鑄各犯俱係通同熟識往來斷難任其狡口飾賴現在移咨尹繼善飭訊周寧書確供再加三面對質所有兩省夥黨各犯無分彼此會同嚴拏務淨根株不使稍有漏網但臣等雖皆有訪聞設法拏獲俱不能及早知覺深屬惶悚除審明實情定案另題外合將會拏獲犯情由先行奏明伏乞睿鑒謹奏私鑄各犯業俱拏獲不為遲誤非但不遲且察訪嚴密甚屬可嘉具題到日另有諭旨同日又奏為恭繳御批事本年三月初八日據臣標把總齎回硃批原奏摺一匣到杭叩頭跪誦欣知聖躬萬安曷勝歡忭踴躍之至本年二月初九日接準部咨閩浙兩省各造子船四隻駕送天津因浙省止有南繒船式向無子名目訪之老於水師之員云臺灣往來載貨多用此船吃水不深便於淺沙駕駛但係單桅平底規模低小不知逺送天津可能利涉在大部轉行未頒式樣文到已屆春深今嵗節氣又早若往返請示等候福建回音恐誤風期且長杉桅木工匠柁水皆須就閩購辦更為合宜而天津教習原奏又稱福建海壇金厦等處現請改造此船則閩省諒有定式臣等議委就近之溫州同知徐崑瑞安副將蔡添略帶領佐雜二員星速齎銀前往閩省會式成造以期畫一趕辦開駕合併附摺陳明所有奉到御批奏摺理合恭繳謹奏往閩成造甚是况此船非急需之物必候風勢順利方可令其北來便遲至明嵗亦屬無妨雍正八年三月二十九日浙江總督管巡撫事在任守制臣李衛等謹奏為請旨事竊查浙屬平湖縣乍浦地方於雍正七年十二月二十一日揭有匿名黏帖詞語狂悖先經臣等據實奏明一面密加緝訪設法拏獲審係在逃積惡光棍陳渭濱起稿同金文端改定倪漢高謄寫等情續經臣李衛將大概略節於二月二十五日附摺具奏緣事關重情復令杭寧衢三府暨中軍副將會同弔犯隔别密審將因何起意造帖之處訊問各犯據陳渭濱供從前犯罪脫枷逃走到京舊年回來躲在鄉間因恨沈天祐這班人前番告了狀原造有欵帖説沈天祐是真命天子郭啓成是軍師王建章是大千嵗楊茂昭是先鋒高大成等是頭目他們霸占腳班謀為不軌的話藏在家裏十二月內金文端因強保了姦情案犯李漢亭恐怕鄂同知詳他走來商量小的説先貼了他們沒頭榜就詳不得了將白紙做了一張五言的金文端説不好添改成六言恐認出字迹呌倪漢高寫了幾張二十日去貼小的因想榜上軍師先鋒等人原不便寫出名字恐沒處去拏他又將先前做就的欵帖封好了央航船上替人家帶信的與以錢文寄到長安鎮韓千總處投下思量他必定報了上司自然拏這班人不想敗露了現在的欵帖同家裏搜出白紙五言帖子是小的寫的紅紙帖子是金文端添改的他説我這是名公手段做的一貼就著等語問據金文端所供與陳渭濵供同又問帖上所寫都是悖逆叛亂的話你如何敢於下筆寫出你説名公做的必有主使且事由李漢亭而起必係同謀據回供實係不知法度自已寫出不過要先發制人並無主使李漢亭是寫了之後念與他聽才知道的先前不在跟前商量的又將因何寫及一糧兩餉有無旗人同謀之處問據回供上年十月有鑲黃旗王老四在李漢亭店內換錢問他一分糧有多少銀子他説如今苦得狠一分糧分做兩分吃了比杭州少一半故此小的也寫在上的那寫匿名帖的事王老四不知道問據倪漢高供原係陳渭濵金文端做成了沒頭榜稿子呌小的寫了三張去貼小的原拏一張貼在倉弄口是實問據李漢亭供前番金文端貼了沒頭榜之後念與小的聽有的寫時沒有看見他們做那王老四常在小的店內換錢與夥計們往來説話吃酒有的他告訴金文端糧餉的話小的未在跟前不知道餘處俱與金文端陳渭濵等供同續經乍浦副都統臣富參查解鑲黃旗滿洲署佐領常保下披甲兵丁薩哈圖即王老四到杭弔同金文端識認確係前供之人據薩哈圖供舊年冬天小的在店換錢時金文端問有多少錢糧吃小的説我們錢糧比杭州只得一半還少些那苦得狠的話沒有説問據金文端質證相符各供在案該臣等細查陳渭濵等供吐情節并對驗筆迹窮凶極惡膽玩殊甚自應具題按律正法但思乍浦為各洋要口往來商賈頗多若將悖逆之言明載供招恐傳聞外夷似覺未妥如不敘入則該犯罪狀不明難定爰書臣等愚昧之見如此惡亂習氣必須殺一警百庶可杜絶在陳渭濵金文端創稿改定俱屬首惡倪漢高雖受人使令止於謄寫黏貼但係悖逆怪誕之語非屬尋常謗帖可比應否將此三犯分於乍浦平湖杭州等處立即杖斃示衆其知情而不同謀之李漢亭杖一百流三千里以警惡風至甲兵薩哈圖即王老四蒙皇上天恩特設營制使之均得食糧成就有日各兵俱知感戴乃伊獨以錢糧數少在街市妄言又與棍徒往來飲酒甚屬不法乍浦新駐滿兵營制設防要隘此風斷不可長應否從重照近日傳播妄言之何立忠等例未便留於內地充發三姓地方抑或念其尚不知匿名寫帖同謀之事鞭一百於乍浦長久枷號墩門俟江寧搬移兵到駐劄妥協若能自知悔罪改惡再行酌量釋放至該管旗員約束不嚴亦應參處但移駐未久且係背後向人妄言難以預知併懇聖恩抑或從寬免究嗣後仍當改意嚴緊管束如再少有犯從重議處臣等未敢擅便相應具摺請旨欽遵臣謹會同杭州將軍臣阿禮袞乍浦副都統臣富參合詞具奏伏乞皇上睿鑒批示施行謹奏所議甚屬合宜應外結者照此施行可也浙江總督管巡撫事在任守制臣李衛謹奏為敬呈廟工圖式恭請聖鑒指示欽遵事竊照浙屬海寧縣地方蒙皇上特恩發帑建造海神廟宇祈福佑民臣欽遵籌畫先將應需專司監督及分派差委各員具摺奏請荷蒙俞允部文到日隨即分行江南直𨽻催令張適王坦赴工一面督同司道程元章朱倫瀚王斂福王鈞等先將一應工料事宜預行備辦間今春正二月內張適王坦俱已先後到杭隨令赴工上緊辦理先於三月初一日吉期祀土將廟基地面根腳清出丈量四址按照地方寬長之處宅中定位所有前後殿宇寢宫祠壇樓閣廊廡房屋等項就勢酌擬大槩規模繪就圖式誠恐款樣制度未合謹先進呈御覽作何改正恭請聖鑒欽定到日即當遵奉而行惟是工程宏巨一切應用木石磚瓦等料其圍圓徑寸長短大小自應悉照廟宇之高下深濶彼此配合必有一定成規方屬妥協但外省雖有起蓋寺廟其工程多係逐漸經營原非預有成竹止能約略計算不諳通盤預估定凖必得經厯大工熟悉往例之人料估始無舛錯前經咨明山東河南撥發料估人張爾昭王元清暫行來浙看估續準山東撫臣嶽濬回稱東省工程未竣張爾昭不能前來其王元清近準河東督臣田文鏡咨送到浙但伊出京日久此際未甚諳曉先又移咨工部請發料估之人帶同匠頭前來亦因有工程事忙未準撥給臣思一切物料雖不能目下即有確實數目而大槩必於需用者如等待料估方往採辦恐致稽遲查長杉巨木産在楚豫閩省併浙江之溫處等處若至夏月以後木植精液發露在外採辦未宜故於春間巳差員齎價分頭前往預為購求但其中巨木一項正殿梁柱所需大料因近年山東各處修建聖廟工程併沿海一帶成造戰船桅木厯年採買既多餘剩頂號者頗少已飭承辦各員加意採買現準江西咨覆覓無合式之木隨往湖廣購辦再俟楚閩覆到另商又御碑亭應用之黃琉璃瓦正殿大二門寢宫天妃閣需用之緑琉璃瓦以及各項配用物件臣差人於鄰省遍訪衆窰户俱不諳曉即偶有製造蓋廟者顔色不眀體質亦脆一經氷霜凍結外皮捲起難觀為此仰懇聖恩或可飭部於京厰製就交與浙省回空糧船運官裝帶來浙所需價值併運通腳費臣當照數備齊解交工部兌收還項再查江浙本色筒瓦其加料製造者頗稱堅固可否將御碑亭大殿二處用琉璃脊瓦其餘悉用本色筒瓦或照南方向來各廟俱多不用琉璃料物臣未敢擅專伏乞聖明指示遵行至於奉祀神祇最關巨典查海寧縣之尖山康熙五十九年建立海神廟宇至六十一年欽奉敇封運德海潮之神雍正三年又蒙皇上欽定江潮諸神加封吳伍員為英衛公唐錢鏐為誠應武肅王宋張夏為靜安公明湯紹恩為寧江伯地方官已設位奉祀廟中又向日有越之上大夫文種唐升平將軍胡暹宋護國𢎞佑公朱彝元護國佑民土地明王彭文冀烏守忠等神相傳皆有護佑之功厯來已久亦皆附祀於廟今蒙皇上敇建海神廟宇軫恤民生保護塘工似應於正殿專供運德海潮之神再懇恩綸加賜封號以展誠敬其英衛公等四神於正殿之左右列坐並祀其越之文種等五神仍於兩廡配享以昭妥侑再南省所稱海洋靈神惟天妃為最厯朝俱有褒崇康熙十九年曽加封號閩浙土人稱為媽祖在洋遇險祈求隨聲而應故海船出入之口岸莫不建廟奉祀而閩廣蘇州等處廟貌輝煌今奉特旨啓建大工自必更加壯麗以肅觀瞻擬於正殿之東另建天妃閣西築風雲雷雨壇之後再用水仙樓以配之是否有當恭候睿鑒欽定以昭祀典惟料估大工之人至今未得一切難於懸擬定凖懇求聖主暫將工部料估房經承張道宗賞發來浙不過三四月之期一俟估定尺寸式樣即送回部方敢放心辦理庶無舛錯以上各條原不敢瑣屑瀆陳因工程甚巨必須再三詳慎以貽萬年之利而臣等識見淺陋恐一有未當無以壯規模而稱完美是以冒昧具摺請旨伏乞皇上批示施行謹奏覽所繪圖式甚合制度但據廷臣奏稱外省祠廟用琉璃瓦者甚少應照議毋庸製造其料估工程之人該部已發往矣雍正八年四月十五日浙江總督管巡撫事在任守制臣李衛謹奏為恭謝天恩事雍正八年四月十三日據臣差進摺把總自京齎捧皇上恩賞臣克食一盒併喀爾沁熏豬到杭臣隨出郭跪迎回署虔設香案望闕叩頭謝恩祇受竊臣屢荷聖慈逺垂鑒照每次齎摺差員回浙常蒙頒賜恩賞接踵而至珍味不離於口感刻實切於心自維臣之一身頂戴服用無非君上所賜而才識踈淺報稱未效高厚難名疊承隆恩優渥正在愧悚不安又據臣差恭皇上純孝格天善繼善述至治翔洽人神協和是以瑞應屢彰見於宫闕臣職守封圻不獲躬親拜賀殿庭而寸心慶幸莫可言喻理合具摺恭謝天恩附陳微悃臣曷勝感激歡忭之至謹奏覽卿奏謝矣同日又奏為奏聞事本年春初有原任河工通判張鵬飛係前大學士張鵬翮之弟突然來杭稟謁臣素聞其於工程冒銷等事不惟熟曉且曽親身作弊詢之即答從不避人因傳伊面見詰以何為而來據稱因扳纍賠帑在蘇候追乘暇稟見並無他事續後漸露伊有四川鄉親御史嚴瑞龍奉安姓巳由江浙回去起旱前赴六安山矣仍託伊代為留心復議論浙江道員孫詔王斂福等之短長併痛言其兄姪種種欺飾營私利巳之非厯厯辦理江南之案是以未即具見蒙皇上念其祖係微辨捐軀盡節不泯其忠爰加特恩逾格優渥將廖坤升授襄陽府同知赴任過浙向臣稟稱伊奉皇上賞以摺匣許其密奏各省事務臣即面為嚴飭著令誠實謹慎奉行毋得妄言宣露乃廖坤仍舊不皇上提拔造就兼聽並觀之盛心合併據實附陳伏祈聖明鑒察謹奏覽卿所薦奏之劉章近據該旗保放參領於引見時睹其儀表精彩雖老尚健非復向日尩羸形狀詢其所以始知前次正在病中力不能支之故奏對詳明才調甚屬可用由此觀之人材被枉乃每有之事朕意暫於旗員試用數時以之補授浙省臬司將劉柟調內卿以為何如守備張文耀出格才具但不知於水師營務果否熟諳伊係聖祖時被擢之人若能馭下有方操守可取乃一提鎮才具朕十分賞鑒卿意更以為何如此人在浙尚恐不能展其所長意欲用於别省將領卿若愛惜不捨可於現任水師參副中察驗有無應調之員奏知以便裁酌同日又奏為請興修省志以光聖治事竊惟志乘一書凡郡邑之地宜物産風俗人才與國家之政事教化禮樂兵刑無不記述以廣見聞而傳後世所關甚巨浙江通志修於康熙二十四年迄今四十餘載未經搜輯臣伏思聖祖仁皇帝六十一年之盛治固巳美不勝稱皇上御極以來善繼善述宜民宜人典章制度超越乎千百世之上其於浙江則又蒙特沛鴻恩加意涵育蠲租減賦建塘濬河設專官以訓迪廣會額以興才凡所以祀神保民移風易俗者無不周詳明備楮筆莫能罄書自必垂之史册昭示來兹但恐金匱石室之藏未能家喻而戶曉惟載之志書則其事之嵗月原委既可備晰無遺而學士大夫以及編户小民咸得周知熟悉傳之千萬年而後足以昭聖治於無疆垂典型於不朽臣自任浙之初即有此志而事務紛紜頭緒未定且工費繁巨不敢輕舉今仰沐皇上教養兼施民風丕變正際鼓吹休明發揚美善之時現與布政使程元章等共相商酌延聘博學宿儒老成名士為之總理並選才華贍足之人分任纂輯開局設館鳩工庀材將浙江通志四十餘年未載政事重為編修刋刻約計二年中告成先後之費須得萬金於臣任內鹽務準留外邊應用公費項下將來每掣節省銀內逐漸動支俾得襄事完竣以廣聖朝治化之隆為此繕摺具奏可否準行伏乞皇恩鑒照施行謹奏志書乃大典攸關應舉行者同日又奏為覆奏事竊有浙江提臣萬際瑞於四月初六日因公到省臣遵旨將前奏內所奉批諭訓飭萬際瑞之處逐一口傳宣示據伊回稱我蒙皇上天恩拔擢重任向在山東請陛見摺內奉有硃批地方緊要不必懇請赴闕李衛秉公持正實心奉事與田文鏡同一軌轍為朕所倚信之督臣百凡領其教益而行更將從前在粵瞻顧徇隱舊習徹底洗除汝來京面聆訓旨亦不過此數語而已我奉了此旨後料想總督必是嚴刻一邉的人所以到任之初於營伍事件過於搜求駁減以為如此方得相合及見總督行事只要妥協不在於此始知大錯自悔誤聽第二箇兒子並一幕賓的話已經屏逐回去今又蒙皇上天恩如此訓誨惟有痛自改過等語臣隨答以文武大員務須法令必行紀律整肅賞罰嚴明勸懲公當方可懾服人心不在小節剝削蠅頭微利之為盡職况恭逢皇上睿謨宏逺一切政治期乎得中正當仰體遵行不可錯會意見大有關係伊雖應諾而去但臣看萬際瑞近日作為與初到逈然不同前巳附摺陳明大槩此番與之相聚數日察其為人毫無心胸見識即據所言數語在不知臣之居心行事尚屬小回籍今復拮據來浙具呈以年力正強願求出力報效臣查該員雖係軍政被參但在任時性情果屬倨傲躁妄此外無甚大罪今巳受過窮窘厯盡甘苦痛知悔過其年力尚在富強弓馬漢仗俱屬去得伊從前曽在侍衛班上行走數載雍正三年二月又於鎮江參將任內赴京引見奉旨補授前職其人材技藝難逃睿鑒臣仰體聖主不棄一材之盛心何敢私留冒昧附陳可否準其赴部具呈帶領引見倘蒙皇上面驗或有一長可取在於巡捕營內當差抑或發外效力出自特恩非臣所敢擅請也為此附摺具奏伏候聖鑒謹奏卿為陳文奏請嘉是覽焉內外大臣皆肯為國家如此愛惜人才朕復何憂何慮給咨令其赴部聽候引見審觀其才力器局酌量有旨同日又奏為恭繳御批事本年四月十三日臣跪讀硃批原奏諭旨聖懷喜雨之深正是憂民之切所以上天感應大霈甘霖不獨直𨽻山陜麥秋可慶豐登即浙省向逢春月時晴時雨率以為常今年四月初旬浙西三府適當豆麥結實之際連日隂雨微覺過多海邊出鹽頗少臣等竭誠虔禱尚在未得晴明完之日另行分晰奏覆至前陳日本近時情事仰荷聖明指示周詳深服聖祖御製律厯淵源闡發祕奧非尋常所得窺見臣再四思維即令總商李君澤傳喚原來之人面見遵照使夷人不敢輕忽也至於藥方等書令其覓送臣看過先為帶給其僧人彼國因從前有福建和尚允言曽為伊處國師於東京特建黃蘖寺住持圓奏覆至臣等會審江南一案現在遵硃批原摺理合恭繳伏乞睿鑒謹奏覽硃批諭旨卷一百七十四之十一欽定四庫全書硃批諭旨卷一百七十四之十二硃批李衛奏摺雍正八年五月二十二日浙江總督管巡撫事在任守制臣李衛謹奏為奏明事竊有西洋人德瑪諾從前因在浙染病具呈調治寬限回京咨部在案臣於上年十月內回任後遵旨行查催令起程據稱老病寒冬長途難行驗明咨報內閣今於本年五月初間委官設法伴送至廣東澳門安插去訖所有省城北門大街天主堂一座現已間空據地方官詳請撥役看守前來臣查西洋人原係異域外教無知愚民多有貪伊厚利暗地入其教中并及駐防旗下亦染此風甚有關係臣前設法嚴禁始知斂迹曾經附摺奏明此等深心結納意欲何為乘此未可再留根株以杜日久後釁查勘規模制度與佛宫梵宇不相符合伏思海洋之中惟天后最顯靈應即外夷西洋各種之人無不敬畏本朝屢奉敕封褒崇凡近海之處俱有大廟商民往來祈福獨杭州為省會重地控扼江海未有專祀現今寧邑巳奉欽建海神廟附祀天后臣愚以為似宜止作臣意將天主堂改為天后宫字樣諸凡合式不用更造只須裝塑神像擇德行羽流供奉香火則祀典既清而異端亦得靖硃批摘其大略另摺録奏欽此及審出揑造讖語妖言凡有關係者若摘出另奏則原疏情罪難以相符故不得不備載招內先經遵旨具題其餘俚鄙浮誕之言似毋庸又行瑣瀆相應附陳聲覆至臣今次摺內奉有硃批不料李永升亦是一負恩無恥之人奈何奈何欽此臣捧讀之下不勝駭異如李永升性桂史貽直三人在浙相見時備述感激皇上加恩深重之處每至墮淚涕零豈料李永升又有前情此用人之難以致聖主多費天心於此可見而臣下之待屬員更當時時奏覽同日又奏為恭繳御批遵旨覆奏事竊臣於本年五月初四二十一日兩次接到皇上批回原摺伏讀御批仰見聖心為萬民憂勞雨暘多少無不上厪宸衷浙江三四月間雨水稍過别屬春收略減無大妨礙現在上遊早稻甚好將屆告登惟湖府之安吉州長興縣二處為天目諸山溪水滙歸之所由高處衝入低窪田內一時難消斟岸間有坍缺臣先委標員分頭細勘情形誠恐有誤插種之期隨於五月初旬動支藩庫恩賞備公款項銀一千五百兩委員分往安吉長興二處督令車戽積水修築斟岸將實在無力買秧窮民酌量幫助購苗廣種設有不足再行給發去後隨據各員稟覆連日晴明今春太湖漊港開通山水易消高田悉已播種低處亦皆插蒔民力尚是紓徐齎去銀兩購苗動用無多田埂斟岸亦有本主自修者統俟各員回日定數另行核實報銷外相應奏明上慰聖懷至御批詢問劉章張文耀之處臣聞劉章年力既尚未衰自可驅策浙省臬司事務原屬繁劇近今民風漸覺丕變盜案頗少人命亦稀非比藩司若委用乏人劉章尚堪任使其劉柟誠如聖諭調於內用實為相宜至於鎮海營守備張文耀原係陸路湖協守備臣因其長於水師是以題請調補續於上年三月保舉一等今春送部引見該員人果明白勤於哨巡辦事急公操守尚可其水務亦在中等以上緣其本營參將蘇福漢仗雖優於水師不為高超故將張文耀暫留該營未即别用今因定標遊擊員缺緊要擬以張文耀請補在案兹蒙聖明録取仰見寸長不遺浙省水師人員好者甚少如蒙天恩準於浙屬參遊中試用實可資臣臂指之助看其再加歷練方可以膺大任倘閩廣現在緊要需人自應移緩就急以副皇上因地用才之至意再蒙諭旨指示提督萬際瑞之處聖訓周詳洞照朗徹萬際瑞亦將伊奏摺內所奉硃批宣示到臣備述追悔改過之情而臣仰誦天語更為惶悚愧感難安自當彼此勸勉俾之遵循訓旨雖不敢望其即能振刷得宜但求與地方營伍相安免致又費聖心顧慮也伏思皇上留意人才薄技微長搜羅不棄固無待於臣下之揄揚但竊見聖主批示為封疆用人其難其慎若不仰體天心將平昔所知之人指出短長據實陳明以備採擇而惟圖一已之便留為幫助殊非以人事君之義以臣所知如貴州地方雖屬緊要巖疆然督臣鄂爾泰頗能調度此際提督止須嚴明有威望者即足彈壓尚易得人今現任貴州提臣楊天縱臣巨亦可勝任黃巖鎮臣李燦不避嫌怨辦公過當臣於上年在京時猶未敢遽保其可以獨任一面今回任以來見其諸事實心整理調度有方比前更加歷練寬嚴得宜可備南方水陸兼攝之用據其呈詳欲於撤巡時懇請陛見如蒙俞允則其可否任使聖明自有洞鑒至杭協副將吳進義人稍粗戅而明白勤幹勇敢向前雖係北人略曉水務於南省地方事宜皆為熟悉嘉協副將王緒級初任時行為尚有偏執未近人情今逐事開導甚能力加改革束略覺粗率瑞安水師副將蔡添略提標右營遊擊魏國泰人材水務俱嫺而在任尚淺黃巖鎮標左營遊擊張兆龍漢仗技藝兼優護乍浦遊擊栁進忠熟悉各洋兩員哨巡水務俱好而操守尚須再試溫鎮中營水師遊擊李舉湖協左營陸路守備李夀演其人材均堪造就以上皆臣現在屬員中可取之人再加操練數年均堪以膺大缺漸次任用者也尚有升任浙江提標右營遊擊黃有才經臣附疏保舉旋蒙特旨補授臺灣南路營參將臣因海外要地是以不敢守難信而技藝頗精且熟於沿海陸路地方今任湖廣亦恐未能展其所長又臣有表姪邵銓現任湖北嶽州衛守備係由侍衛補放其弓馬臣久未看見而年力強壯膽勇非常人頗忠誠用之營伍亦足備勇將之材可否發與浙江俾得再加教導望其成人出自聖恩又臣兼轄江南武職中如提標駐劄上海遊擊葛世雄辦事盡力人材均優右營守備徐潛蕭營守備髙鈺平望營守備李紀皆漢仗弓馬可觀留心地方營伍俱屬可用之才以上各員臣非敢濫行保舉實因聖主加意作人臣既有所知不敢隱默用是附摺陳明伏惟睿鑒所有二次奉到硃批原摺理合一併恭繳謹奏覽各將備才力俱經洞悉已命照摺録存徐徐斟酌有旨雍正八年六月初六日浙江總督管巡撫事在任守制臣李衛謹奏恭請皇上聖安朕安醫者謝鵬到京大得其力朕甚嘉之同日又奏為遵旨議覆事竊據定海鎮總兵官林君升呈稱本職前差把總齎摺進京恭請聖安附有條奏一摺欽奉硃批言之督臣李衛令其酌定可否具奏欽此相應鈔録原摺呈請查照奉旨事理欽遵定議奏覆施行等因到臣據此該臣看得林君升奏稱凡屬兩省交界之處宜照浙閩楓嶺南澳之例統屬兩處地方聨絡管轄一條臣查兩省接壤之區宵小易於影射潛藏而間有不肖文武藉詞推諉誠不能免荷蒙皇上聖明逺照洞悉弊端先後奉頒諭旨將各省聯界不清者令地方官勘丈明白不得彼此推諉又凡交界處所失事探實贓盜無分此疆彼界即行密拏使從前關會稽遲隔屬掣肘之弊得以剔除睿鑒精詳無不仰頌至於各省地界犬牙相錯其邊疆聯接之處每不止於一省即一省中亦不止於一縣如浙屬杭嘉湖嚴衢溫處七府與福建江西江南安徽聯界者共有二十州縣內如太湖巨浸漊港錯雜最為藏姦之藪從前止設一營兩省共轄今則江南添設參將仍與浙省聯絡分防又烏鎮為嘉湖蘇州三府七邑交接之所湖府捕盜同知駐劄於此特設關防統屬江浙各縣督緝類皆因地制宜以為防範必如楓嶺之羣山雄踞有仙霞黎嶺之險南澳之大海汪洋扼詔安饒平之衝方議設營分防控制兩地其他接壤之處甚多若欲一例添設不勝其繁以臣愚見似應聽各督撫提鎮就兩省毗連要隘處所斟酌情形應否設立會商奏請定奪未可槩論者也又林君升奏稱沿邊陸汛有逼處海濵之臺寨要口添設槳船得以進淺搜緝一條臣查沿海汛防原有水陸之分但戰船止能哨捕大洋若邊岸泥塗潮退膠淺每有巡船所不能到者而扁舟小艇易於乘潮往來姦民駕駛便利不但乘機竊劫且有偷運米榖夾帶私鹽等弊雖墩臺營堡沿路皆有陸兵看守稽查因未設巡船常至追捕不及且水汛即非所管更得藉以推諉臣稔知其弊凡沿海陸路如台屬之海門前所家子三江口新亭章安道頭寺前橋溫屬之樂清虹橋江口汛諸處盡皆添設小巡船健跳昌國石浦又已改為水師俱經會同漕運督臣性桂觀風整俗使臣蔡仕􅘎先後具題已蒙諭旨準行近又於紹屬之周家路臺等處議行添船現委黃巖鎮李燦前往查勘又江南崇明縣各沙及福山營增置快哨沙船之處亦與江蘇撫臣尹繼善商定會題各在案此外應如該鎮所請令各省督撫提鎮凡陸路濵海之臺寨汛口淺塗及江河中流酌量緊要處所添造槳船防範哨巡遇有姦匪往來即可飛棹擒獲所需成造及修葺工料於各處備公銀內動用仍將船隻造入營員交代册內以垂經久其於地方實有禆益又林君升奏稱海汛暗礁外來商艘不能悉知宜汛口刋立木板曉諭礁上建竪石標俾免撞沉一條臣查海船觸礁多成韲粉若使預知趨避誠足保全商漁但暗礁深入水底海道茫無畔岸頭柁僅能略記山向大槩看視水面結花以為躲閃究難認定處所即刊立木板於岸而礁在水中相離遙逺安得望見清楚況潮汐起落蕩搖颶颱巨風震撼裝載石標之船亦恐到礁即破未易建竪言之似易而行之實難應先令該鎮暫動公糧所餘於伊汛地試行如能建竪有效則發給備公銀兩推而行之實足以廣皇仁而重民命矣以上各條臣知識粗淺未當機宜緣奉諭旨酌議謬抒所見陳覆伏乞聖明睿鑒指示施行謹奏發九卿會議具奏候旨遵行同日又奏為奏聞事本年五月三十日據臣差往江南巡緝私鹽盜匪辨員稟稱崇明縣花沙海梢等處民人忽率衆鳴鑼到新開河市鎮強勒各鋪户關閉店面喧閙地方等情隨據蘇松鎮總兵官施廷專呈同前由臣一面嚴批查拏首犯解散餘黨一面密加察訪因崇明佃民向例夏冬二季交納業主田租之外尚有轎錢折飯家人雜費等項經知縣祖秉震於上年具詳禁革立碑文內分晰未明刁民藉以為題欲將夏季麥租不還先寫匿名謗紙黏貼指稱取租富户施大受與新任鎮臣施廷專聯宗倚勢勒收等語聚衆多人逼迫店户罷市甚至毆辱巡檢雖經營縣拏有朱鎖等四五人到案尚有寫匿名帖之夏君欽等棍脫逃未獲該縣欲為掩飾詳文含糊未將實情敘明臣查崇明地居海外各沙孤懸錯雜民情向稱刁悍今欲借端圖賴額內一季正租輒敢黏貼匿名聚衆妄行惡風斷不可長現在批行江蘇按察司蘇松太道嚴查確情會同營員勒獲為首鼓衆要犯咨會江省督撫二臣聽其究審定擬分别嚴處示警外事關海疆要地棍徒聚衆理合繕摺奏聞伏乞聖鑒謹奏崇明邊海要地刁風尤當禁遏所見是朕命卿將施廷專調補浙省已有旨諭部矣黃巖總兵李燦於此缺宜否倘以浙省鎮臣不便輒調江省一面委員暫署崇明一面將情由聲明奏聞候朕裁酌浙江總督管巡撫事在任守制臣李衛等謹奏為請旨遵行事竊照浙江乍浦海口通達各省外洋設立滿營水師實於國家兵制完備盡善現在閩省咨送辨員并浙江水師各營挑選熟悉水務緑旗兵丁四百名充捕盜舵工阿班斗碇繚手俱能加意教習實力奉行滿兵操練甚屬盡心臣等親見巳有幾分諳曉前蒙皇恩賞給兵丁生息銀內乍浦水師共有一萬而聖主先事籌畫特頒恩諭乍浦水師新拔兵丁錢糧照天津例每月加出五錢各兵感戴歡呼益加踴躍緣前項緑旗兵丁四百名雖屬水師同營而滿漢攸分前次生息銀兩未敢冒昧𣲖入均沾隨將恩賞加給餉銀應否一體支領之處移查天津都統準有覆文彼處舵工水手等人皆係雇募在營支領工食非係食糧兵丁不曾加增等語是以浙省現在亦仍照舊額支餉未敢一體添給但查此項兵丁俱係各標營抽調能悉水務之人身既逺離鄉井或挈家而來或分住兩地皆有養贍家口之需且伊在本營尚有挑選拔補千把一途而乍浦滿營官員漢人不與挑選别無出身可圖惟恃錢糧過活其中如阿班等人善於大洋颶風猛浪之中扒上桅頂更非自幼練習不能精熟捕盜舵工亦非容易將來滿兵即於水務極嫺而若輩仍須留用駕駛是其勤勞艱難之情原有倍於别營水兵非可援以藉口者因此與將軍臣阿禮衮副都統臣富參密為商酌無異所有每月加給銀五錢之處似應仰邀皇上格外洪恩一體支領並各兵紅白事故可否亦於恩賞生息銀內量為分派臣等未敢擅專相應據實公同奏明懇請諭旨方敢遵行為此謹奏所請甚屬允協候另有諭旨從部頒發浙江總督管巡撫事在任守制臣李衛等謹奏為請旨調補事竊照杭州為省會重地旗民交處又有各府州縣緝獲逃人解省皆須理事同知承審必得明白勤幹之員方可辦理無誤今現任同知佟保初做外官未諳政務審斷旗民關涉事件非太過即有不及多未妥協止宜京員任用尚可供職查乍浦理事同知鄂善隨伊父鄂密逹在浙數年稍悉旗漢民情土俗肯於向前但覺少年好勝不甚老練且與副都統富參性情不合今鄂密達已蒙皇上調任江寧無須回避若以鄂善改補杭州理事同知俾臣等再加就近訓飭於事務可免舛錯之虞其乍浦理事同知雖所轄地方無多而營制初設海口通衢閩廣商民雜沓更須歷練明白之人方可勝任仰求皇上敕部揀選發補則一轉移間地方彼此有益矣緣係調用旗員未敢冒昧題奏合先會同將軍臣阿禮衮繕摺具奏請旨遵行伏候睿裁謹奏已有旨諭部矣諭浙江總督李衛知悉外邊傳有吕氏孤兒之説當密加訪察根究倘或吕留良子孫有隱匿以致漏網者在卿干係匪輕逆賊獲罪於天事出情理之外雖銼尸不足以蔽厥辜部文到日遵照施行勿留寸骨於人世毋得茍簡辦理特諭雍正八年七月二十五日浙江總督管巡撫事在任守制臣李衛謹奏為覆奏事竊臣欽奉硃諭密旨將逆惡吕留良子孫察訪根究勿使隱匿漏網並不令逆賊寸骨得留人世跪讀之下倍切警惕查逆賊吕留良罪大惡極於雍正六年冬間奉文查拏逆黨嚴賡臣等之時臣已將現在逆子吕黃中吕毅中並逆之長孫吕懿歷三犯解京其律應緣坐之逆孫吕懿本吕懿正等十七名並年未及歲之吕懿林吕懿兼俱行查明監禁其逆犯曾孫雖律不緣坐而罪惡滔天者之嫡屬未可以常律論並將其年在十六以上之吕為雯等四名及髫齔襁褓之吕服先吕誦先等十五名亦行查出分别監禁看守又有逆孫吕為景向隨父懿緒出繼與逆姪吕仙中者今懿緒已故將為景並其初生之子阿大查出入册不使得因過繼幸漏各在案逮臣上年進京陛見時面奉諭旨之後誠恐或有遺漏隨於京邸密封移咨署督撫臣性桂蔡仕􅘎再加確查據稱俱經復查無遺分别造册送部又在案臣於上年十月初二回任路過嘉興查知逆犯吕留良墳在石門縣識村地方即飭選撥兵役協同地保常川看守委官巡查又復嚴加密察巳故逆子吕葆中有一繼妻曹氏年六十八歲因從前剃髮為尼出家於南陽廟中未經入册續又查出同現存已故各犯之娶過妻妾勞氏嚴氏等二十四人及未曾許字之女四人一並聽候部示其現在監禁各犯內有吕懿剛於本年六月初一日病故當經委員驗明取具圖結報部今奉密諭臣再加意留心嚴督地方官務須詳查確訪稍有絲毫疑情即行根究到底總之此案臣斷不敢邀譽沽名稍存姑息自當選派文武慎重辦理不致略為踈忽得有漏網也理合先行奏覆伏祈聖鑒謹奏所奏是此案逆犯乃君父宗社之仇讐豈他悖惡之可比當更詳細搜察以淨根株同日又奏為奏明全省近日年景情形事竊查浙江田稻有早中晚之不同上遊金衢嚴等八府早者大槩居半杭嘉湖三屬則晚稻為多今歲四五月間浙西雖然雨多尚在未曾種植之先浙東地高不慮雨水惟恐天旱故寧紹金衢嚴處六府各縣早稻收成豐熟台溫二府所轄近海地方當六月初五日發有颶風維時早禾已經收刈十之五六晚禾尚未開花俱無妨礙惟台屬黃巖太平臨海寧海等縣傍岸近水塗田間被風潮損傷通縣不及十分之一二其中又復髙下不齊此等低處最甚者風止後雨洗鹹潮尚有三四分收成新米價值近海者每石僅七八錢不等杭嘉湖地方夏收豆麥略減分數而蠶絲既熟沾利自多晚禾雖未可期必然現在雨暘時若一路菁蔥遍野雨水盈疇車戽不勞民情安適臣所過之處目擊情景實有含哺鼓腹耕鑿自如之象而蘇松等屬秋苗亦盛將來發華結秀兩月之間如無大雨暴風收穫齊全豐登又已可望矣再查海寧海鹽兩縣雖因海中發颶潮水漫塘而石工幸皆保固惟土塘及舊時碎石老塘間有被水衝擊坍卸者現已搶修填築以禦秋汛安吉州長興二處五月間水退之後田禾悉已補種具結不致成災惟黃巖等數縣內有近海之民人房屋營汛墩臺等項間至被風刮倒不無傷損當經酌動鹽務贏餘銀兩分别賑恤幫助安頓俱不致有失所臣查浙省今歲仰邀皇上福庇尚不至有潦溢過甚之虞而此番颶風太大近海數邑民田廬舍間有損傷臣雖從不隱匿絲毫災傷稍自粉飾而返躬思咎實切悚惶近又恭承聖訓以恆雨之徴惟狂始見荷蒙恩諭浙江多士凜盛滿之戒深敬畏之心仰見聖主容保教思至意豈惟浙士感戴欽承臣亦倍加凜惕惟有痛自刻勵不敢略逾尺寸以期稍免隕越於萬一伏祈睿慈鑒宥謹奏今歲直隸以至各省皆有微災然此咎徵殊與卿等無涉俟秋成後奏報到齊朕自另有諭旨通頒同日又奏為奏聞事竊照浙江學政顧仔於本年二月到任後即赴處州台州補行科考二郡俱係山海僻壤生童數少雖有怨聲尚未聞其弊竇五月間至紹興府首行歲考臣留心稽察有學政書吏姚三聚皂頭周姓囑各學教官凡招覆新進童生每名索規禮七錢告假遊學生員每名索銀一錢二分各學投册索銀四兩山隂會稽因附郭倍之學書門斗偶因文册些須舛誤必加重責聲名已是平常及生童發案後外論更覺譁然街衢遍黏匿名揭帖開有舊時遊學勒銀一兩新告遊學勒銀一兩四等免責勒銀八兩生員保等勒銀二十四兩新進文童得銀二百四十兩武童得銀八十兩等項六條指新進文童鈕昊武童黃尚義為據該府顧濟美查拏黏貼之人已無蹤影學政顧仔聞知即發鈕昊原卷諭查有無撞騙鈕昊堅不承認第書吏皂頭出入傳話肆行無忌勒索遊學生員否則提比門斗等事與揭內相同又有門子李榮全面語各學將來考試教官另設下等恐嚇撞騙巳經革退而皂頭周姓前索繳招覆新生規禮已收者忽於六月初五日盡行發還并聞另有看文字徑竇串同伊子朦蔽作弊雖該府查拏無蹤匿名未足為據而關防不嚴已見確實今該學政將匿名自行鈔送移咨到臣自當再行廉訪並於臣回署之日弔取指名之文武二生細加考驗學問騎射果否有弊自必不能掩飾實則具疏參究外事關學政優劣臣既有所聞不敢隱匿理合先行據實附陳伏祈聖鑒謹奏察訪的確然後糾參此見是同日又奏為奏明請旨事竊臣前因奉旨特建海神廟工程繁巨請以原任直隸布政使張適原任萊州府知府王坦發浙監督效力具奏荷蒙俞允欽遵續據張適王坦先後到工承辦一切事宜俱各實心盡力略有頭緒詎意王坦於六月二十三日忽發失血之證至今大吐不止日覺沉重即使調理幸痊亦恐不能耐勞辦事據布政使張元懷委官驗明出結具詳請令該員回籍調治如能痊愈再行赴浙效力等情前來相應奏明一面給咨回籍至廟工事務殷繁張適一人之精神難以分身照顧兼理查有原任廣東廉州府知府蔣杲由户部山西司郎中本部保送引見奉旨記名選授府職到任二載因署别府任內失入命案部議革職永不敘用現在蘇州原籍查蔣杲前與臣同任司官時知其為人謹慎小心而且殷實饒裕經手錢糧工程諒必顧惜身家不敢茍且草率況其獲罪在於據縣審招轉詳非係有心故入情尚可原可否仰邀聖主格外天恩準令赴浙協同監督廟工效力贖罪臣未敢擅便理合繕摺請旨伏乞睿鑒指示欽遵謹奏照所請行該部知道同日又奏為恭繳硃批遵旨據實覆奏事竊臣接到前次具奏崇明縣海沙地棍聚衆打鬧摺內欽奉硃批崇明邊海要地刁風尤當禁遏所見是朕命卿將施廷專調補浙省已有旨諭部矣黃巖鎮總兵李燦於此缺宜否倘以浙省鎮臣不便輒調江省一面委員暫署崇明一面將情由聲明奏聞候朕裁酌欽此因部文未到正在祇候間於二十一日接準兵部咨文始知欽奉上諭業將嘉協副將王緒級升授太原總兵官其崇明為江南濵海重地著臣於浙江總兵內擇其才克勝任者調補將施廷專就近管束教導臣跪誦前後兩次旨意欽遵查得浙省四鎮定海黃巖溫州兼轄水陸洋面均為要區閩人雜沓非施廷專少年未諳所宜惟處州轄屬稍僻事務亦簡雖堪調補然離省甚逺既於就近管束教導之諭旨不能克副且處州鎮臣方文登勤苦小心於本任才具適為相稱實未足當崇明重寄若欲調補惟有李燦一人但黃巖洋面避風島嶴難得又當浙省之中衝為商漁之聚藪汛地四通八達素日盜案較定溫為多海門等口最關緊要歷任不得其人目前方見整頓且現在台屬鹽務皆委鎮府督同辦理茍非熟練未能相安施廷專初到生疏自難妥協但今崇明現在缺員要地難以久稽似應遵照摺內御批先行遴員委署候旨遵行查杭協副將吳進義由江南提標辨員出身歷任相近此地於蘇松營伍機宜頗為諳曉李燦雖才情歷練尚有急於見好勇往太過之處而該員又覺老辣若上司駕馭得法與海疆要地尚屬相宜且前曾署理黃巖鎮務亦非生手現在遵即暫令該員署理崇明俟李燦進京陛見皇上再加欽定抑或即將李燦調補崇明以吳進義仍署黃巖均可不至有誤其施廷專由浙赴任時臣曾見過人亦略有才情可否以總兵之銜管理嘉興副將事務亦係通衢繁地更兼去省咫尺臣可遵旨就近管束教導看其悛改奮勉再為奏請别用庶足仰體皇上造就勳裔之德意矣惟是總兵為封疆大僚奉旨命臣選調已覺難安若就臣下臆見遽行具題改調副將專擅之咎何以自逭用敢先將實情遵旨奏明俟施廷專到浙之日臣當遵照以李燦調補崇明並將施廷專原銜借管嘉興副將吳進義委署黃巖之處題請仰懇聖明鑒察摺內情由若有可採或令李燦進京陛見再定吳進義可否於崇明暫試如果堪以勝任再行酌用則於人材地方均獲得宜之益矣至杭協為省城極衝臣標中軍亦全省領袖兼有江南節制營務督捕等事委任實難如部內有人懇祈簡賞一員倘此際難得容臣再加慎選另行請旨合並聲明所有奉到硃批原摺理合一並恭繳伏祈睿鑒謹奏已另有諭旨矣浙江總督兼管江蘇督捕事務在任守制臣李衛吏部左侍郎署兩江總督臣史貽直謹奏為覆奏會勘松江海塘情形仰祈睿鑒事竊照松郡塘工荷蒙皇仁不惜數十萬帑金悉令易土為石億兆生民永得保護安全此誠聖澤汪洋亘古未有者也自上年開工已及一載臣李衛先因進京往返給假回籍復任以來刻無寧晷未得親往履勘今值秋汛之時與臣史貽直會訂日期俱至蘇州正欲公同江蘇撫臣尹繼善前往查勘適值黃運兩河水長各工緊要公議尹繼善應移緩就急赴淮料理臣等於七月十六日親至工所逐加履勘東灣起至花家角接續舊工先築塘一千八百七十五丈分為十五號內已築完十五層全成塘二百五十餘丈十四層以下至六層塘四百餘丈其餘鋪砌底腳築至五六層各不等勘其石料工程堅固結實如法砌築較從前迥不相同皆由總理通政司額外參議俞兆嶽身任勤勞竭心盡力先築樣塘六十丈以為程式是以在工各員俱不敢茍簡草率悉皆照式修築惟是臣等識見淺近所有勘過松郡塘工一切應行斟酌通融添築各事宜未必有當謹另繕清摺逐一分晰恭呈睿覽是否可行伏乞聖明指示庶便會同撫臣尹繼善核疏具題請旨欽遵為此謹奏詳覽會勘海塘情形及酌議添築石土工假各事宜俱屬協當朕深為嘉悅浙江總督兼管江蘇督捕事務在任守制臣李衛吏部左侍郎署兩江總督臣史貽直蘇州巡撫臣尹繼善謹奏為遵旨會議具奏恭請聖訓欽遵事竊臣李衛上年因蘇州踹布坊匠欒爾集等聚衆結盟為匪一案先經奏明請於擬罪發落後將其餘諸人作何設官彈壓立法稽查之處會同江蘇撫臣尹繼善酌量條議等因欽奉硃批所論雖當俟此案完結後徐徐設法安頓妥貼方是不可以其難處而因循置之至時應作何料理奏聞請旨然後措施欽此今臣李衛於本年七月初一日自浙起程至蘇與臣尹繼善正在會商適臣史貽直亦因查勘松江海塘到來臣等公同酌議蘇郡五方雜處百貨聚滙為商賈通販要津其中各省青藍布匹俱於此地兌買染色之後必用大石腳踹砑光即有一種之人名曰包頭置備菱角樣式巨石木滚家伙房屋招集踹匠居住墊發柴米銀錢向客店領布發碾每匹工價銀一分一釐三毫皆係各匠所得按名逐月給包頭銀三錢六分以償房租家伙之費習此匠業者非精壯而強有力不能皆江南江北各縣之人遞相傳授牽引而來率多單身烏合不守本分之輩因其聚衆勢合姦良不一雍正元年有踹匠欒晉公徐樂也糾集拜把商謀約會欲於五月五日放火劫庫如遇官出救護即乘便為害勢敗則奪船下海被包頭吳景範知風出首拏獲夥犯三十五人其為首之欒晉公徐樂也在逃至今未獲彼時地方官止將十三人處死給賞吳景範銀二十兩結案以此各匠中之狡猾者肆行無忌如上年欒爾集之踵而效尤幸即敗露早得芟除此外竊劫之案多有若輩在內從前各坊不過七八千人近因大盜奚貴卿被獲其夥黨小匪散逸多於此中藏身現在細查蘇州閶門外一帶充包頭者共有三百四十餘人設立踹坊四百五十餘處每坊容匠各數十人不等查其踹石已有一萬九百餘塊人數稱是實為藏姦納汚之藪雖其中亦有食力貧民而桀驁不馴者頗多從而煽誘保無一時搖惑附和生事之虞臣等悉心會議民業不可禁絶姦匪務宜稽察誠如聖訓當徐徐設法安頓妥貼方是不可以其難處而因循置之今不但踹匠一宗如蘇郡城外煙火百萬户除楓橋千總並無别員彈壓汛兵無多甚屬寥廓可慮謹就愚昧管見並蘇城營制事宜酌議規條以杜姦匪之橫肆一彈壓宜有專員也一營制稍當酌改也一關汛更宜嚴巡也一稽察宜立成規也一姦良宜先分别也一積弊宜行禁杜也一需索宜行革除也一包頭宜並清查也一松郡法宜畫一也此係臣等就事區畫因地設防末議第恐未合機宜謹另摺逐條分晰遵旨先行具奏是否有當伏乞皇上俯賜訓諭方敢欽遵具題辦理為此謹奏所議是照此具疏題奏可也雍正八年八月二十日浙江總督管巡撫事在任守制臣李衛謹奏為奏請聖鑒事竊照浙江布政使張元懷於八月十七日在任接聞原籍報到伊親母章氏訃音據詳丁憂經臣另疏題報在案查浙省藩司事務繁巨吏役巧詐最難得人荷蒙皇上慎重揀選簡用張元懷來浙任事甫及兩月看其才識明白居官勇往雖志大心髙尚欠老練穩妥然一切事務俱能立意要好若再加學習一二年間即南方大省巡撫之任亦堪寄託今綜核漸有頭緒遽爾離任實為可惜但藩司係旬宣大吏非臣所敢擅請可否仰邀皇上天恩特頒諭旨俯準張元懷給假三四月仍令回浙任事俾臣得以協力共襄公務不惟於地方有裨又可操練一理繁治劇之員以仰副聖主愛才若渴之盛心現在浙省署臬司劉章新到鹽道王鈞為人忠厚二員於本任之事巳多難以兼顧糧道朱倫瀚雖有徴收漕務之繁年內尚不押運過淮是以臣暫委代辦一面即令張元懷星速起程庶免來回遲誤合並聲明伏祈睿鑒施行謹奏所請是候另旨諭部給假雍正八年九月初六日浙江總督管巡撫事在任守制臣李衛謹奏恭請皇上聖安朕躬已全愈矣俾卿知而慶喜謝鵬醫學通達甚有可取其年力精神雖非御前供奉之才然醫治宫廷內外儘堪奏效於初到時備述卿遣伊來京之由朕聽聞之餘不禁為之動心斂容今暫命南旋令其了畢家務即詣浙將卿餘證調理痊可必俟平復如舊然後具摺請旨送伊北來特諭同日又奏為覆奏事竊照浙江學政顧仔到浙以來聲名不好歲考紹興府發案後街衢遍貼匿名揭單開指該學政新進文武童生得銀等款雖未可遽信因有關學校經臣具摺奏明弔取所指有名之人考驗學問騎射果有實弊再為具疏題參臣於江南回署之後密行紹興府將新進文童鈕昊武童黃尚義押送到省考試文章弓馬兩次覆試俱屬將就去得經臣細訪雖係年少僥幸入彀尚無受賄夤緣情事是以未行參劾但浙江大省士習初轉全賴學政維持風教整飭振興今顧仔雖無賄賣營私之處然關防不嚴縱子招搖且不能約束衙役致有索取進學生員小費如此舉動行事實為難膺斯任臣謹據實覆奏恭候聖明乾斷謹奏顧仔不宜斯任所奏是已有旨矣同日又奏為奏明養廉歸補逺年庫項巳清仰懇聖恩鑒照事竊查浙省恩賞各官養廉銀兩一案原議督撫兩衙門除養贍家口本身用度延幕辦事外尚有各項公務之需每處約得銀一萬兩內因總督向係兼管福建臣蒙天恩特授浙江不為定例是以議給一半臣祇領此五千兩以為用度將兼理鹽政衙門前任奏明舊存管引承差規例養廉銀四千八百兩添補湊用其議給巡撫衙門之一萬兩留存司庫因舊有無著虧空向係耗羡彌補今已提取故將前項抵完後任仍為養廉支用等因列單奏明荷蒙聖鑒恩準著令咨部在案今浙省從前題明未完無著虧空銀兩已將存留臣巡撫衙門養廉銀雍正六七兩年分共二萬兩八年分二千五百兩以之添補悉經全數清完咨報刑部外相應奏明至臣每年所領之數一切本身用度俱在於此從前將原籍所收租糧間或通融添補尚可不至匱乏自上年進京即將所有養廉分為署總督鹽撑奈上秋今歲臣鄉被水無收未能接濟此外辦理公事雖舊有奏報掣規一項原無定數約計二三千兩存貯於外僅供江浙差巡賞賚官辨盤費以及各項之需可以無誤而本身日用延幕等件實在更為艱難故敢冒昧於奏覽雍正八年十月二十日浙江總督管巡撫事在任守制臣李衛謹奏為恭報浙屬通省豐收歲登大有事竊照全浙今歲早禾收成頗好經臣歷次分晰奏報因天時未能預料不敢以十分期必遽為滿足之言兹當秋成既熟萬寶告登各屬晚稻於九月中秀實之際間日時雨滋潤長養榖粒飽綻續後連日晴明天氣和暖刈穫登場每穗所得米數多於往年即溫台海邊些須塗田收成轉移亦有七八分者計畝無多合之通省晚禾實為有十分豐稔此時陽春應候播種之豆麥生意萌動土膏滋培米薪蔬菜雜糧食物價值無不平減民間各有歡欣鼓舞氣象急公完糧爭先輸納通屬七十七州縣中地丁錢糧八九月內全數通完者已有平湖嘉善等一十六縣其餘尚有路逺未及報到者歲前通完必多更逢久晴鹽場土滷廣出前奏上掣産鹽略少除正額外約多引目八萬今巳共有十萬之數目前下掣更勝現在各項存貯並鹽義倉米榖連年節次積儲上屆歲底盤查共已存有一百四十餘萬雖每年出陳易新但為數既多南方潮濕恐難久貯臣更不敢以既有儲蓄歲復豐收遂忘預備為長逺之計業經遵照原案諭旨仍酌動本款補漕銀三十萬餘兩分派各縣過半就於本地乘價賤時買補收貯并委員前赴外省成熟之處分頭購買於省城永濟倉酌量存厫俟買回新到米榖於來春將相近水次地方之久頓在倉者推廣皇仁愛民盛心可否運往淮宿一帶分發今歲被水各州縣令差員押送到彼會同該處有司等官量減平糶接濟民食將原價帶回存庫來秋探實豐登之所買運還倉一轉移間不過略費人力兩省均屬大有裨益如果可行容臣將彼此價值逺近運腳逐一查明分晰定議出入相當不致多虧再為題報始敢辦理陸續撥發合先附陳請旨伏乞皇上睿鑒批示欽遵謹奏此舉有益允屬應行詳查妥議具疏題請同日又奏為恭繳御批事本年十月十五日臣前差把總齎捧皇上發回原奏摺匣到杭臣跪領敬啓伏讀硃批諭旨欽蒙天恩宣示聖躬萬安中心歡忭額手加慶又沐溫綸垂問臣身跪誦之下感深刻骨竊念微末之軀無關重輕先荷皇上以臣尚有餘恙將醫生謝鵬命回於十月初四日到杭當據傳示雍正八年八月十九日面奉聖諭臣望闕叩謝益深惶悚自顧何人上煩宸衷眷念至於如此雖竭蹶致身全家報效亦不足仰酬高厚於萬一謹遵旨令謝鵬診視調治現在浮遊之火漸得清理而本證一時尚未能盡除日逐照常辦事未敢怠忽更當仰體聖心加意節慎以報天恩所有奉到批回原摺理合恭繳又謝鵬遵旨回奏一件附摺進呈如或但有可供差遣之處諭旨一到即令赴京聽用為此謹奏謝鵬此際都中並無急用處務俾將卿調治霍然全愈具摺陳明得旨後方令起程至於辦理事務須量力而為不可強費精神事過勿留虛靜調適如案牘繁雜堪委屬員代勞者何必逐件躬親竭蹶耶若不欽遵朕旨節慎愛養則違忤莫甚於此必依訓諭一一循行方為仰體君心克報知遇也雍正八年十月二十八日浙江總督管巡撫事在任守制臣李衛謹奏為遵旨覆奏事雍正八年十月二十七日準兵部火票遞到大學士公馬爾賽等寄字內開雍正八年十月十二日奉上諭今因固原提督員缺一時不得勝任之人意欲令崇明總兵官李燦前往署理其崇明總兵印務著吳進義署理黃巖總兵印務著瑞安協副將黃有才署理爾等可作字詢問總督李衛若李燦能勝固原提督之任著李衛傳旨即令李燦來京陛見並令吳進義黃有才各赴委署之任其副將以下等缺即著李衛遞行委署若李燦不能勝固原提督之任著李衛速行回奏欽此遵旨寄信前來等因到臣臣欽遵查得新調崇明鎮臣李燦人頗明白遇事向前凡整頓營伍訓練兵丁俱能不辭勞怨惟該鎮自入仕途歷任皆在浙省沿海之缺升轉雖籍隸山東而陜甘省分聞其未曾到過若辦理彼處事務諒不致有貽誤誠恐於地利形勢營制兵情諸務難得一時熟悉固原邊疆重鎮員缺最關緊要非係平常可以試看地方臣不敢冒昧信其即能從容勝任查該鎮據報於十月十六日領到部劄十八日自黃巖起程順看西洞裏市沿海一帶地方不日來省赴崇任事之後即欲請旨陛見但現在崇明有吳進義署理尚屬相宜臣謹遵聖諭隨差人迎去飛催李燦到日即傳旨令其星馳兼程進京計期二十餘日可到恭候皇上任用大員其難其慎之盛心稍有所見何敢不並列附陳如福建陸路提督石雲倬人雖不無冒戅而果敢向前曾於西邊行走帶兵出口自必熟諳情形今在閩海蠻野之區未見其長泉州重地如能得人石雲倬與北方相宜又大同總兵馮允中生長西北在外多年為人謹細辦事勤慎臣不知聖明自必洞鑒臣復查得新調江南提督王紹緒於前任浙江太湖營遊擊湖協副將時俱曾為臣之屬改革而材具平庸僅能備員無他裨益可否將李燦暫老其才以備將來兩處設有缺出之用臣可保其於江海刁健地方尚能整頓有為不致措置失宜有負職守也至瑞安副將黃有才係從臺灣升補過海守風路程遙逺到任尚未有期黃巖要地該員驟膺大任雖一時未能放心但於浙省洋面營伍原係熟諳臣現在斟酌委員暫行護理鎮務一面飛催黃有才星速赴浙到後即令署理仍當加意稽察教導辦理不致有誤為此具摺奏覆伏乞皇上睿鑒謹奏覽雍正八年十一月十五日浙江總督管巡撫事在任守制臣李衛謹奏為遵旨奏聞事竊臣欽奉特旨命臣將福建福寧鎮總兵官員缺於江浙二省副將中揀選一員奏聞令往署理其副將等官亦令遞相委署奉命之下敢不盡心揀選以期仰副聖明委信之重緣浙屬副將除已蒙皇上擢用之數員而外現在杭州象山瑞安三協尚係缺官未到嘉興係總兵官施廷專管理湖協范宗堯為人狂妄恐其專恣無忌紹協宋愛初到辦事已見平常台協顧𢎞亮雖居官小心嫌於軟弱才具亦短金協烏麗珠人頗勇敢但覺仍帶粗率尚須大加歷練將來可以任用嚴協劉朝隆人甚老實而目不識字且不服南方水土時常多病僅堪北地將領之職樂清協王璉雖久於營伍頗覺老練而才具祇屬中等難膺重地大缺衢協周騰鳳人尚明白舉動謹細經臣題請調補杭協兼管督標中軍試用尚恐人過和平未能必其即可勝繁劇之任何敢遽以要鎮請試其下江各副將中除鎮江軍標之楊寅現在被參江寧協未報到任京口水師蔡勇又係閩籍長於水務非陸路此缺所宜兩江督標中軍王英辦事庸鈍甚屬糊塗漕標中軍馬義才具稍粗措施平常河標中軍許大學漢仗弓馬俱好而識見淺窄辦事疏略止可再加習練徐圖後用以上兩省各員臣逐一斟酌較量再三思維此中浙江平陽副將馮吉品人頗正氣雖略覺粗直久歷京營巡捕將備誠實小心比之諸員歷練稍深尚可放心已經另為具題請旨暫署試用並將副將以下遞相委署者一併附疏聲明但本內若將各副將逐名敘出指摘其短長則伊等俱係大員恐難彈壓地方且內中尚有堪用者自應留其餘地以䇿勵其黽勉之心伏思皇上慎重用人凡副參等第考語俱令各督提密咨兵部臣敢不仰體聖懷具摺奏明以備皇上鑒定酌取為此謹奏所奏是當之至馮吉品惟一俗字不除耳此外俱堪將就具題到日有旨雍正八年十二月初四日浙江總督管巡撫事在任守制臣李衛謹奏為恭陳勘過海塘近日沙漲穩固情形上慰聖懷事竊照浙省寧邑海塘潮汐靡常屢厪宸衷頻年修築時頒諭旨令臣民務竭誠敬以期感格特發內帑十萬兩創建海神廟宇祈福祐民萬姓歡呼無不感戴祇緣從前南岸日漲上年又有中流沙埂橫踞阻塞以致潮頭東進尖山直趨北岸晝夜兩次搜嚙塘根坍矬接踵臣回任以來因地制宜悉心籌畫加築盤頭以遏水勢搶修險工以固塘身添砌大石坦水增培後護幫堤設官安汛不留餘力更復博採輿論重修鎮海塔鑄造鐵犀牛以符五行生尅之理本年春夏雨水略多潮汛雖仍洶湧江流勢若建瓴臣親往致祭虔禱祈求嚴督工員竭力保固仰叨皇上福庇夏杪秋初鹹水上滾淡水東注已將蜀山南岸漲沙逐漸洗去入冬以來潮勢更覺變遷近則中流沙埂每聞坍缷聲若雷鳴潮從東南向西海面較寬不致直侵北岸工程俱得安穩據各工員紛紛具報臣於十一月二十七日又赴塘工答謝神貺并勘查廟工目擊縣東三里橋至念里亭止約程二十里中間漲有底沙其貼近塘腳潮退小汛竟能顯露縣西新倉起過東約程四十餘里新沙漲濶高阜之處潮退可見約濶四五里不等惟尚存貼塘水道自北至南寬有三四里潮退止深一二尺可於水中行至新沙之上逐漸見長目前已有一半貼護塘根若再漲阜過東則所築全塘百里堤岸直抵尖山更得永固矣其廟宇工程基址俱已築平圍墻門面樓房業皆建立止須湖廣之木并白石大柱一經運到則正殿新春即可上梁目下正值天氣晴和不但工程可以趲辦而民間礱米輸糧貿易趁食之輩俱得及時力作臣前摺所陳丁地錢糧全數通完十六縣之外今已報到共有三十一縣此誠皇上至治翔洽是以熙皥成風也理合附摺陳明仰慰聖懷謹奏海塘工程穩固情形以手加額覽焉同日又奏為恭繳御批叩謝聖諭事本年十一月二十五日臣跪領皇上批回原摺一匣於繳批摺內荷蒙恩諭命臣加意調理指導量力辦事過而勿留委曲周摰無微不到叩誦之下鏤心刻骨感戴難名自顧才力粗疏而所兼荷者皆係皇上封疆重寄倘有一事未經親歷誠恐錯誤難安是以晝夜竭蹶不遑乃蒙聖恩體恤訓誨至於如此今交冬至以後略覺漸好敢不遵旨節慎愛養一一循行以期稍報高厚於萬一也至倉榖轉運一事欽奉恩批此舉有益允屬應行詳查妥議具疏題請欽此近據領帑赴買各員已有報到購就運回請咨驗放過關者將來雖難必其儘數買足榖石而米稻兼收或可多得臣現在一面遵旨先行具題一面飭行司道將舊日各案存倉之項酌量附近水次之處分派數目預行備辦船隻選擇委員於來春陸續撥運視江北山東接界黃運兩岸可通舟楫食米地方押往會同有司轉輸平糶至於今歲偶被水災州縣衛所業蒙皇上大沛殊恩蠲免錢糧并及例不並蠲之漕米亦行分别豁免緩徵且又給發帑銀動支倉榖分差大臣蠲賑並施於兩月之外更加一月而大小口之米數多增至半聖澤皇仁周遍深厚至矣極矣惟是地方廣濶人户殷繁飢民入册難免無遺漏之虞現在鄉村僻野頗有乘機誘衆口稱借食扒搶雜糧者紛紛據報成案不一而足在首先起意棍徒實為可惡而無知被誘一時隨行實繁有徒且多係本地莊民槩置大辟不可勝誅若稍為從寬既恐惡風漸長聚衆為害又慮州縣借以諱盜縱惡養姦大有干係臣與江南漕河督撫提諸臣公同密咨商酌先派文武彈壓加意巡查嚴禁防範有犯即行勒拏確審除劫財傷人各照盜搶本律外其餘素不為匪偶創懲但淮北山東交界處所連歲微覺薄收夏秋被水今冬已賴皇恩賑給開春青黃未接之時不無乏食窮黎更覺艱難尚須設法安頓乃聞彼災臨近接壤地方有麥秋兩季合縣統算僅能三四分年景其中亦有高下苦樂之不同竟作七八分收成匿報者又兼各官迎合上司駁詰刪減飢民户口太甚間有密諭文武屬員凡遇外來就食之人槩行驅逐而被災本處誠恐敗露前情更將漏報飢民攔截不許他往雖據紛紛傳説未必盡實且救荒之道自古原無善䇿但立法未妥以致飢民無處投奔或至激生事端不可不為之慮緣關地方近日情形不敢畏嫌隱諱冒昧直陳伏候聖明鑒照再加訪查乾斷施行所有奉到批回原摺理合恭繳為此謹奏此奏朕深為嘉與但地方一遇荒歉散賑之際種種浮議在所不免而東省民情又復愚魯不尚廉恥未便明降諭旨滋長刁風致令州縣有司難以辦理亦惟有多運米榖遴選可信大臣命往監查協辦并密諭該督撫秉公詳審糶賑兼施以救濟之此外實别無善䇿敬候上天慈佑來年氣候潛轉歲事更新民生復業時則地方大吏以及牧令各員某優某劣孰貪孰良皂白自分妍媸亦難掩也硃批諭旨卷一百七十四之十二欽定四庫全書硃批諭旨卷一百七十四之十三硃批李衛奏摺雍正九年二月二十日浙江總督管巡撫事在任守制臣李衛謹奏為奏聞事竊臣因江寧移調乍浦水師滿營官兵於上年十月到浙雖經安頓駐劄而時屆歲暮諸務畢集未能親身查看今戰船俱已造竣駕乍候驗又嘉所冬季官引餘鹽不曾掣竣現在浙省撥運淮北山東交界平糶米石準兩江督臣高其倬咨商乘便抵賑恐往返行文稽遲情形難以盡悉而高其倬新到路逺故臣於二月初二日乘自杭起程赴嘉所驗掣之便先行知會江蘇撫臣尹繼善於初五日至兩省交界之平望地方面議派撥米石以及撫恤流民懲創扒搶并松江海塘各項事宜初六日回嘉掣鹽事畢就近前往乍浦會同副都統富參閲看滿兵水操若在岸上炮樓逺觀恐兵丁未能實見其技臣隨同坐戰船出洋面三十餘里外操演雖管駕折創尚係緑旗兵丁著力而滿兵在船施放火器舒展自如巨浪顛簸並無畏怯吐暈之狀於碇繚等項扛具學習亦皆諳曉其能扒桅升高者共有四十餘人即江寧新到之兵亦有十二人能習此技各兵無不踴躍爭先臣將所備銀牌錢幣各加犒賚勉其益當習練上報皇恩即從便道至平湖海鹽二縣交界沿塘勘視新開白洋河道酌議再加疏濬深通相其土塘低薄之所添築石工以障外潮此河開成後沿海曠土皆得資其灌溉可成稻田者約數萬畝於百姓有益隨旋至海寧布政使張元懷亦到協同查看廟工十五日早虔祭海神因春月雨水調勻南岸未得坍卸故北首漲沙暫停照舊而潮勢大溜歸中春汛塘工平穩將沿路稍有低薄者飭催在工各員加謹趲築預備料物以為夏秋防禦本日即抵省署隨準江南督撫二臣咨會淮北一帶地方荷蒙皇上格外洪仁特旨加賑撫臣議於前撥浙米內截留數起備賑臣思聖恩廣沛加惠災黎惟在米到迅速使之早霑皇仁方為有益況浙米原係在省永濟鹽義二倉儲蓄備賑者兩省均屬皇上赤子本無岐視前因聞得山東巳經撥運及截漕共五十五萬石之多接濟久不見有回信知會故於前請二十萬石內先運十六萬已經陸續趲行目前頭撥可以抵淮而江南揚州鹽義倉榖石因現在船少挽運稽遲恐誤急需一面飛移江省督撫差員沿途趕幫傳諭不拘何撥之米先將清江以上各州縣路逺難運者即截浙米留賑其與揚州相近諸處再用江省鹽義倉榖撥運庶可早到其緩運之四萬石內因續有船至故又裝米二萬餘石趕運前往除賑糶數目俟江南督撫二臣派撥事竣另題外合將臣因公赴所屬地方查勘辦理各情由先行奏聞至臣自杭嘉一帶經由處所目擊豆麥青蔥田疇墾闢雨水及時人民悉皆歡欣樂業共慶升平合並陳明上慰聖懷謹奏覽奏所辦各事宜並杭嘉一帶雨水田疇景況朕懷曷勝欣慰雍正九年三月初七日浙江總督管巡撫事在任守制臣李衛謹奏為遵旨具覆事竊臣查鄞縣知縣鄭大德在京掣籖時條奏前任浙江山隂縣徵糧造册及原籍江南如臯縣私派飛差二款奉旨鄭大德原摺交與李衛欽此臣隨將如臯縣私派飛差一節密行江蘇布政司確訪查究去後先據該司高斌覆稱臯邑從前原有雜派自康熙三十七年禁革復經現任知縣彭履仁於雍正七年到任時悉行詳禁現在實無派纍等因經臣分晰嚴駁並令鄭大德指明確實申覆續據鄭大德詳稱臯邑康熙三十七年以前有一差出俱係各里長先行應辦派之各户名曰硬擡是年禁革之後差歸官辦每年計田一頃捐銀一錢亦有派至二三錢或四五錢不等總歸經承催收名曰軟擡歷年不改雍正七年四月內卑職進京補選現年有無派纍在所不知其從前各年俱有經手書役姓名開報前來復又批司就近親提嚴審追弔底簿確核派銀應差用存侵蝕數目開册具報兹據該司高斌審詳取册呈送臣復加察核臯邑額田三萬八十三頃有奇除濵海竈田及紳襟優免不派外實田一萬八千頃零康熙三十七年以前地方公事按田派日充當竟有硬擡之名其逺年派數若干日久已不可考至三十七年禁革以後改為軟擡之法公事歸於官辦銀兩出自民捐每年視事務之多寡為重輕無有定數雖較前民纍稍蘇而每頃猶有五分以及七八九分一錢不等臣以所供仍未足憑信兩次駁追簿籍確據歷年雖不齊全而繳出者亦有八年此皆現在之員因非其任內所派不復代為前官隱諱故爾竭力追出其間派收數目似屬可憑但核其支銷款項如最少之八百九十餘兩至多之一千九百餘兩各止一年其餘每年皆係一千餘兩以至一千二三百兩不等據册開報悉皆支辦公務並無餘剩其中固有實用之項而浮多冒開者亦復有之但自康熙三十七年至雍正六年共計三十餘年官皆離任役多物故難以盡為追擬且係積年相沿陋弊可否仰邀皇上天恩免其究追已往嚴禁將來非臣所敢擅請至所稱雍正七年知縣彭履仁到任後即行詳明徹底革除之處雖查有原案可據但臣察其從前支用公務册內如每年修理城垣倉庫添補不敷囚糧等項皆係必不可少之公事若果盡行革除則目前兩年之中此等事務豈皆停止不辦若謂盡出官捐則州縣養廉本無餘剩家口何從贍給此臣揆情度理而不敢信以為盡實者也伏惟皇上聖明無微不照州縣地方原有應辦公事不出於官即出於民江省未有備公銀兩辦理若不酌量區處誠恐雖有禁革之名而公費無出不免陽奉隂違民間仍受輪充派擾之纍可否仰請聖主敕下江蘇撫臣尹繼善將册開費用款項逐一核實浮冒者永行禁革其有必不可已公務作何分别留存些須抑或設法於公項抵補使里民不受偏纍而要務亦不致廢弛庶於皇上大中至當之政治亦可以仰副而無悖矣至鄭大德所奏山隂縣錢糧從前並無實徵花名底册致有五年未完請飭編造花名確册等因臣查浙省地方從前以里書管册催糧弊端百出積欠纍纍臣因此竭力訪察設法清釐於雍正五年間題明飭造順莊一並交與清查官會同有司於保甲煙户的名住址册內將本人産業在各圖各甲瓜分辦糧詭名寄户者一並歸入本户挨順造册發單滾催使同里熟識之人彼此傳知依限完納則戶册瞭然完欠分明數年以來各屬亦有實力奉行者錢糧於奏銷前通完甚多山隂一邑近因花户細册編造清楚雍正五年以後錢糧俱已全數通完現任知縣沙漢鼇已於帶徵雍正三四等年舊欠錢糧通完案內部議優敘即升是鄭大德條奏山邑從前不造的名之弊先已改正革除但通省之大誠恐别縣尚有歷任才短辦理未協陽奉隂違者臣現在設法委查加意釐剔相應一並陳覆並將查到如臯縣歷年收支各册結全録敬呈仰請皇上睿鑒施行謹奏覽奏俱悉如臯縣各項公務支用作何設法抵補之處密與高其倬尹繼善商籌辦理以蘇民困雍正九年四月初二日浙江總督管巡撫事在任守制臣李衛謹奏為天恩高厚臣分難安懇辭議敘以盡職守事竊照淮北地方去年數郡被水荷蒙皇恩蠲免賑恤至深且渥偶因歲暮雨雪凍阻被災各屬常有借端扒搶米糧之事臣恐今春青黃不接時米價或有高昻是以仰體皇上如天之仁請將浙省應需出易倉米運往彼處減價平糶稍為接濟緣濟寧州以南黃運二河兩岸江南山東地方犬牙相錯不便岐視東民專糶江省且彼時尚未知皇仁已經連次廣沛又有截漕撥運動支倉榖多至百萬加賑山東之信故前於所運米內先後分撥七萬石於山東交界各縣一體平糶此皆職所當行稍盡寸心何敢以辦理為是乃蒙皇上特加殊恩天語褒奬謂視國事如家事臣心已極惶悚又復敕部議敘更加愧赧局蹐伏念臣身受高厚隆恩畢生難於報效偶辦一事不過遵循皇上德意若因此即荷優敘職守所在何敢承受伏祈聖主鑒臣愚戅之衷恩準辭免庶臣寸心略得自安而頂戴不朽矣再浙省春月豆麥發生甚是茂盛惟民間食米向來半藉上江運漕地方並豫楚客販接濟今歲鄰封之江北河南往彼搬運甚多價值漸長現在臣將本處各縣遵例撥動倉榖分厰平糶不致過昻其杭嘉湖三郡專賴育蠶獲利目前雨水略多仰邀聖主福庇神明慈佑從此晴暖二十日則蠶事春熟俱可望其全收本年更得豐裕矣合並陳明為此謹奏覽今歲以直隸膏澤霑足景象觀之南方多雨之地二旬晴暖恐未可必也同日又奏為再行陳明請旨事竊臣因浙省公務殷繁現任各員不敷差遣委署之用已於三月初二日以懇請揀發試用人員等事具疏題請在案但有不便冒昧遽入題本之處敢再瀆陳天聽伏查浙江原屬刁頑之區非同别省淳簡可比邇年以來臣於地方風俗設法勸懲宣布皇上教養兼施恩威並濟德意逐漸化導囂悍之習頗能改革知縣以新舊錢糧全完不論俸滿議敘即升者疲邑竟有數人是民情正在轉移之候必使之從此服習再得二三年方可立定根腳不為舊染變遷但除能員升任及現在稱職之外各屬知縣中求其辦事妥協者不可多得而初任試用之員常有於吏治民情全然未諳只得凡事同司府代為辦理並再四教導改補調用雖學習漸諳亦有其人而委任每不敷用若止照前疏統於部中請發人員則近年各省陳懇揀選甚多一時恐難有人上煩聖慮不得不於試驗熟悉堪用之中舉其所知請留委任如卓異案內常山縣知縣先升行人司行人王瑋實心辦事勇往向前嘉興縣知縣戈鳴岐雖非長才而勉勵勤謹蘭溪縣知縣胡啓敏歷練勤慎明白小心常山縣縣丞董懿辦差急公人頗有才又奉文升任各員內如嘉善縣知縣郜煜已升中書科舍人雖心地稍偏而辦事亦勤漸覺熟練金華府通判于文煃挨升平度州知州久任浙省人頗勤慎以上各官現今交代將完俱應給咨送部先後引見仰懇聖恩鑒其才具可以何官補用仍行發回浙省候補庶輕車熟路可收臂指之助臣再加思索記憶向在雲南任時有奉差頒詔之禮部漢軍筆帖式趙國政住滇半月看其人頗明白論事稍有才情今不知現任何官倘蒙一並發浙酌量差遣委用可望有濟又江南陽湖縣舉人黃雲於前任鹽臣謝賜履任內聘取修輯鹽法志書臣到浙後事竣即留在署教讀知其人品方正不茍才識尚屬明白近因揀選班次將屆部文截取候選知縣可否給咨於送部引見後準在浙省補用伏候聖鑒欽遵再臣仰見皇上矜惜人才每於詿誤廢員略有一節可取者恩賜甄録是以天下臣工咸知感格奮興各思勉勵查江蘇詿誤廢員中有能辦事者已蒙皇恩破格收録復用今浙省不敢即請酌補授職惟遣派令其出力如臣昔年奉差深知有原任山西平陽府同知議敘副使道職銜潘樾先因詿誤革職追賠錢糧近見邸鈔已蒙恩除完過外餘欠豁免其人明敏幹練雖非中正純品而才堪肆應駕馭用之可以有為又原任冀州革職知州林緒光係前任平湖縣內虧空調回擬罪又原任桐鄉縣知縣捐升主事同知革職金泰因前任署秀水縣內虧空擬罪兩員除巳完外俱在浙監追未清那移民欠銀兩今皆蒙恩旨豁免飭將林緒光寬釋金泰解部杖責發落但二員年力富強明白歷練林緒光前在任時頗有頌聲金泰雖心地難保而稍有敏才又原任雲南騰越州革職知州王林臣前任滇南時知其人亦勇敢因擅買民人參黜前年臣在宫門伺候常見其人似有痛悔改革之意問知現在拜唐阿差使處行走以上各員俱係獲罪之人幸蒙聖恩寬免臣不敢擅請甄録但其才尚堪用竟置廢棄亦覺可惜若於繁難艱苦之事止量給盤費差遣出力看其如果改革奮勵實心報效再為分晰請旨定奪則現在亦可收其奔走之勞於政務不無有益臣因地方公務過繁實在委用缺員每至辦理掣肘故此冒昧臚列具奏是否可行恭請聖訓指示欽遵謹奏所請各員候另旨諭部雍正九年五月初六日浙江總督管巡撫事在任守制臣李衛謹奏為奏聞事本年四月二十一日已時恭逢欽建海神大殿上梁吉期臣隨率同藩司糧鹽二道預期前赴海寧工所是日天色晴朗淑氣和煦正殿寢宫大門二門並天后宫五處正梁同時並上人力齊集應手安平闔縣紳襟耆老黎庶工匠人等無不額手慶幸商賈居民張燈結彩鼓吹三日僉云感謝高厚隆恩叩祝聖主萬夀無疆臣目擊民情切摯相應恭摺奏聞至臣於二十二日虔祭海潮昭宣皇上德意查閲塘工情形現在西塘南沙已徙潮歸中流各工鞏固其東塘因蜀山之外復有新漲南沙潮湧北岸勢頗迅急目前搶修堵禦正在上緊趕工臣逐條指示飭令在工各員將刷動坦水樁木速加修砌其頂衝工次勒限添築務於夏秋汛前趲工完固總在時時留心不敢懈怠再上遊山田種植早禾者十之三四俱自清明後至小滿前陸續插秧今歲早種者已先發生遲者亦逢和暖滋長惟中間有十餘日所種適值天氣微寒未能透達幸節氣尚早隨令另換中晚之禾補插此惟衢州寧波為然金華次之嚴州甚少别府稻苗俱好臣已星飛飭令地方官遍行查勘其實在無力趕辦新秧者量借倉榖幫其工本遍令插種不許缺少致有空隙秋成交還今據所報皆巳補種全竣而浙西三府晚禾現在前後插秧目今雨水甚是調和其春熟中菜子蠶豆俱有十分大麥九分小麥八分咸稱豐足而杭嘉湖各縣民多育蠶紹興亦有今歲桑葉價平小民頗省工本除過早者稍遇春寒所收七八分略遲者皆得九分十分晚者更盛現在繅絲變易完糧民力皆得充裕歡欣鼓舞至浙省運往江北之米共十八萬四千餘石仰叨皇上福庇涉歷黃運二河俱得平安直達正遇倉榖空乏未到雜糧長價小民艱難之際浙米至後頓得奏齎摺人來聞卿脾胃失調且舊疾業經醫治多時未知目下俱巳痊愈否可傳諭謝鵬將卿體近日情形詳細具奏以聞同日又奏為恭請聖鑒欽定事竊照浙江鹽驛道王鈞已蒙特恩超擢京職所有員缺奉旨著臣揀選具題伏查道員位居監司鹽驛職掌重任微臣愧無知人之明荷蒙聖恩如此信託曷勝感戴悚惕敢不詳慎選擇今浙省知府中才長而能辦事者雖有數員或本任原屬緊要或清操未可深信於鹺務不甚相宜惟溫州知府江承玠其人性執拘謹似在次等之列然小心誠實出納謹慎且世業行鹽曾委代掣並管理台場利弊頗稱熟悉家道素豐操守亦可放心除另行具本請旨外所有揀選該員情由疏內未便瑣陳相應恭摺奏明伏祈睿鑒欽遵為此謹奏揀選甚屬妥協江承玠洵與此任相宜具題到日有旨同日又奏為請定彰疸之巨典永垂萬世臣鑒事竊惟忠孝本自性生而善惡亦由觀感臣幼孤失學不習章句緣從母命訪擇孰師僅能講説通鑑粗知古人行事於公正光明者願為執鞭姦邪傾險者起而按劒自少至今此心不易逮入仕途出差往來各省經過之處見廟宇最多崇祀最廣深山窮谷所在有之者莫如關聖世人無賢無愚若老若幼畏敬遵奉津津在口他如張良馬援諸葛亮郭子儀張巡許逺韓愈嶽飛諸人其專祠不過數處然在人耳目之前故邊鄙庸夫俗子猶有傳述美名者此外如臣幼時所聞忠臣烈士不但祠宇寂然即問其鄉人非讀書者亦竟不知其姓名矣及後奉命蒞浙惟以賞善黜惡振作人心使之知所懲勸改移積習故於前賢芳躅姦慝遺迹常加採訪乃從前仕宦在浙如李泌韓世忠文天祥海瑞等舊有祠宇又生長在浙如褚遂良顔真卿陸贄方孝孺于謙王守仁等因其現有廟祀知者猶多若李德裕李綱張浚陸秀夫張詠等俱筮仕此邦許善心顔杲卿趙抃宗澤張九成趙鼎徐應鑣王褘卓敬章綸等皆長育兹土其忠節事業亦復表表而士子以外悉茫然不知為何許人又浙産中元姦巨憝如賈似道史彌逺湯思退趙文華輩以及仕宦於浙之韓托胄等類亦多不曉其鄉貫行徑即志書中向止有善無惡未嘗表暴其姦惟見杭州棲霞嶺下嶽飛祠墓之前舊有鐵鑄秦檜夫婦万俟卨張俊四跪像兒童婦女瞽目跛足之輩過者必以足蹴石擊至今頭面俱損而唾罵猶有餘恨臣因此竊歎千古忠臣烈士與嶽飛諸賢並生一時行事相類而泯沒無聞者指不勝屈千古姦臣邪佞與秦檜諸人同惡齊等衣鉢相傳而生逃斧鉞之誅殁無斫棺之及者亦指不勝屈則同為忠姦亦有遇與不遇幸與不幸之分又其甚者如王安石竊假道學之名結黨亂政青苗害及天下新説禍中人心遂致誤國亡宋乃因曾為鄞令築有坡陀一塘竟於寧波府城建祠享祀臣前以區區小惠不足抵其大惡力排浮論毅然折去似此欺世盜名之姦臣猶竊蒸嘗於身後恐天下之大如此者仍復不少邪正混淆臣竊憤之伏讀雍正元年諭旨直省分建忠孝節義祠宇春秋致祭聖主表揚媺善已無不至然臣竊見從前祠內止憑曾祀名宦鄉賢舊牘循良小節亦得並列其忠義彪炳而子孫式微未曾呈請者遺漏轉多且地居學宫門傍終年關閉鄉人足迹不到何由而知若姦回諸人更無遺迹可見似於皇上彰善疸惡之大典奉行猶未盡善臣愚以為古來小忠小姦一節見長一事作惡者無關重輕姑不具論而其中名臣大賢與夫元凶渠魁其行事邪正有關於國家禍福民生利害者不可不為分别表暴以為鑒戒仰請皇上敇下史館諸臣博稽載籍將漢唐以至明季所有忠臣良將擇其輔政治民立身盡節功德顯著者列為一編其姦讒邪佞結黨亂政傾陷忠良賣國求榮擾害蒼生之尤甚者列為一編閣臣詳慎再加考核進呈御覽欽定分為二等行令直省府州縣除偏僻小地原無大忠大姦者不設外其餘就各臣本鄉及建功殉難之處敕建公忠廟一所不拘世次設立木主牌位書爵書名壁上鐫石紀其功績將欽定一等者祀於堂上二等者配食兩傍春秋賜祭以示褒揚其極惡巨姦之家鄉及殘害本廟得祀忠臣者鐵鑄其形標名於背皆跪於廟前次等者刊刻石碑大書姓名罪迹立於廟側不拘城之內外務在人煙輻輳往來聚集之地建造俱於備公款內核實報銷凡官員到任以及新進生員入學之日必令至廟展謁平日聽憑本地士民焚香賽祭庶此邦之官吏軍民農工商賈與夫兒童婦女皆知千古以來有某某為忠良至今流芳百世有某某為姦佞難免遺臭萬年當無不共為欣羡轉相告戒生其好善惡惡之心堅其效法羞愧之志以此礪世磨鈍則百代之君極自皇上而建萬世之臣鑒亦由皇上而立傳之史册億萬斯年永逺無斁矣臣積懷巳久而文義未深辭不達意謹抒胸臆所見冒昧瀆陳未敢擅用題本伏乞聖明垂鑒俯賜採擇施行謹奏斯論懲姦勸忠彰善疸惡誠為培植世道人心之美舉但今邊𤇺未熄軍需浩繁直省督撫新任者多政務尚欠練習稍緩數年再議建置亦不為晚非目前急務也同日又奏為備陳蘇郡營制地方情形仰祈睿鑒事竊臣於上年九月間酌議蘇郡地方營制文武分防一疏係臣親往與前署總督史貽直巡撫尹繼善原任提督柏之蕃面同商酌畫一定議候其書題始行繕疏今蒙皇上天恩俯準所請將來巡防稽察俱有責成未必無所裨補但原題內因添設蘇州左營水陸防汛兵少未敷派撥撫標左右二營各連隨丁字識止兵二百九十名既有左營中軍遊擊即可管轄右營守備權得歸一免於敵體掣肘而右營遊擊似屬冗員故請裁去抵為新設蘇營守備千總俸薪其員下隨丁字識跟役三十名馬十三匹向時不入差操者今歸於蘇營俱可得收巡防實用又緣督提駐劄相逺並請將城守三營俱聽巡撫專管督率操練指揮緝捕使就近有所統屬並非裁歸外營致應援之師單弱可比其間再四斟酌實係因地制宜之愚見今部議以各省撫標經制皆然不便遽行議裁馬亦停撥但他省臣不及周知即浙江撫標左右二營兵額比蘇標較多二百餘名而原設之右營遊擊亦係奉準部文裁汰似於目前所議未盡畫一且蘇州城守既準新分中左二營馬止四十匹撫標兩營兵少一半又無泛地巡防有馬九十七匹多寡懸殊況考官亦由馬兵選拔所見未盡之處臣亦不敢不為陳明也至於蘇松常鎮太倉所屬人心浮動喜於訛傳滋事姦盜詐偽賭博聚衆接踵而見全賴府州縣官實心任事執法究治挽回頽風今江南大員意見不符而州縣徇私猶然未免非臣督捕應管不便越俎但其中有不便隱默者如蘇州府童華一味沽名釣譽帶兵馬司蔡益仁勾通出入附和作弊時夏大為所愚今則日夜出入府署童華任為耳目惟言是聽即如吳縣貢生王心眷謀娶族兄王興臣之女為妾被監生程鴻儒訛詐未遂告發在府審明得贓亂倫俱實兩造皆不請革究擬亦不依律斷離止詳藩司求其朦朧批結及被二次駁飭通詳仍然抗違不遵又常州府同知劉紹錡等以現任官員羣聚蘇城賭博酣飲舉國若狂童華身在地方置之不問理合據實奏明恭候聖明乾斷再查賭博最為民害而南方賭具多造自蘇杭屢奉諭旨申飭嚴禁實萬世不易之美政無如江蘇府州以及揚徐等處地方官惟以回護失察姑息為主不但巡拏懈弛轉恨首者多事每坐以别故打架挾仇妄誣加以反坐即現獲者亦稱偶賭飲食舊牌不全巧為開脫童華於此等事為尤甚遂有無恥紳襟熟識衙門照舊開場在深宅大院之中晝夜呼盧恬不知畏臣於兩省飭禁既嚴差巡頗緊近日吳縣略能查拏數起今街市公然聚賭者稍知斂迹而刁頑之人復又變出别樣賭法或以竹骨牙牌三十二張配合紙牌名目或用錢文跌博木刻押寶并有另製籌馬折算銀數借稱搖會賽點等項隱射問官輒以禁令不及竟自寬縱然既有銀錢輸贏即與賭博何異自當一例問擬庶無陽奉隂違之弊但臣未便擅專仰請皇上作何分晰再加嚴飭俾各省畫一遵照辦理則惡習得以永除從此天下民生受益不淺矣是否有當伏祈聖鑒施行謹奏所奏甚是奉行不力寬縱之弊朕自降旨嚴加申飭其别樣賭具名色不一逐項款列亦不能該括殊覺繁碎但先將牌骰二件通行禁絶其餘雜具可一紙告諭而止直省數年以來此二件尚未能除何顔更及於他諸凡惡習當嚴其尤者為要同日又奏為遵旨覆奏事本年五月初四日臣標把總自京捧回原奏摺匣隨叩領啓視內有奉發詞臣顧成天條陳鹽政奏摺荷蒙硃批料卿辦理鹺政自必妥協斷無因增引目而遏絶民生之理但既有此議論發卿一看洞悉立説之由庶便明白剖析以釋朕之疑懷耳欽此仰見聖明睿照已纎悉無遺既蒙下問敢不據實詳對臣與顧成天初不相識雍正七年九月間臣給假事竣回任二十五日於丹陽途遇成天以舉人奉召進京投刺接見之頃雖未向臣明言幫助而訴及長途盤費見不肯領略其意遂告稱入都即當條陳鹽政創所未行臣答以此法若然可為則古人如管仲之煮海劉晏之度支早巳行之何待今日況初抵雲南時盧詢亦曾條陳鹽井尚難看住無漏沿海數千里憑何關攔收稅之處伊初仍辨論後又理屈自愧所見未到隨贈以盤費四兩而别竊料其到京自必即有條陳不意遲至今日也但稱臣止答以引數所增已多稍寬則法又廢弛不便於公矣之語非但臣未向成天遁辭如是即臣愚魯之衷稍知大體平日每以增加賦額昻價取盈斂怨於上者為深恥當接管年餘之時知弊未深尚難釐剔逮後銷鹽日多勢無因正額已足不許商運百姓買鹽聽其食淡之理又何敢任其銷多報少瞞昧欺公故七八兩年雖曾請領餘引共六十八萬道而每次聲明懇作額外報銷者誠恐引目一增設遇未能多銷之時商民交受其困現在七年之四十八萬張除隨其儘數銷過外尚剩二百餘道咨部繳銷毫無壓派勉強可知且常時出示平減鹽價毋許高擡此即臣不肯增引數而遏民生之據仰荷聖明之鑒照者也至奏稱自臣更定鹽政而後竈不得私煎民不得私買網愈密而犯愈衆等語夫私煎私買之禁自古𣙜鹽以來即已有之不但臣謹守國家之成憲即本朝亦祇循歷代之常規初未嘗有所更定而謂為法網之密過矣如所稱大舟興販往來如常等語此在昔日弊誠有之若謂今尚如此則每年正額七十餘萬引外竟能多銷數十萬引目餘鹽從何而售蓋食私鹽者少則食官鹽者自多此明白易見之理難逃於皇上之洞鑒者也如所稱肩挑背負自三五十斤至數斤以內者老弱婦女悉罹於法問徒者不計其數等語查近場之縣貧難窮民許其挑鹽易米此皆聖朝軫恤深仁原未槩禁但其中豈無分别緣刁民有借以為名零星積聚合成總數囤積稱手窩家販與巨梟者故臣於沿海近場之縣將實在無力窮民每處查報數十名取結互保給與木籌許其赴場買鹽挑賣鄉村不得過額定之數雍正七年八月欽奉諭旨訓飭江南一例而行是所稱五十斤者原屬犯法三十斤者除內地例禁而外並未盡拘至於私鹽不論多少擬徒原屬自古定律臣常因愚民無知尚於其中擇係本身買用或止於初犯者分别枷責發落若囤積轉販及屢犯不悛者何敢曲法徇縱以沽寬厚之名不謂成天轉以此為臣咎也如所稱有司畏懼不敢取保文移往還纍月半即瘐斃等語查臣彼時已離任七月之久各官自有上司豈皆因臣批發之故況徒犯例應收禁杖犯悉皆取保臣向因江南隔屬恐至遲延是以題請將江屬鹽務分歸蘇松太江常鎮兩處巡道督緝就近審理大案免致逺解浙省往返拖纍荷蒙俞允現有原疏可稽臣於别省滿漢文武大吏因公結怨者頗多如果有其事早已指出迭為參奏何待成天今日之論及乎以上皆其原奏內摘臣過端仰蒙皇上開誠指示臣敢不將所行之有實據者備陳於聖主之前伏候鑒察至於顧成天所陳更定之政欲貽億萬年生民之樂業者臣請得而論之如懸場三十里聽民自為買賣不設巡邏此類於現行例內仁錢等十餘縣額銷肩引之意也然止係沿海縣分並不限定三十里而納課定期每日準挑百斤分境杜私冒支越界皆有一定明禁無所謂聽民買賣不設巡邏也此三十里外以至千百餘里江河山嶺水陸間隔之州縣數十百處若不令商人轉運則鹽既未能不脛而走人亦豈能越逺而來將聽其食淡而已乎如謂以應輸之額攤之各竈夫竈丁多係燒刮赤貧本身煎鹽之蕩地丁課徵比尚不能全納今責其代人完課而後賣鹽則力量既所不逮如任其賣鹽而後完課則通天下之竈户盈萬纍千晝夜所煎多寡數目孰為稽查且即省却官吏之費矣舟車捆運亦可減乎即不問所賣之地矣越海過江可不問乎臣見其説已窮又變而為商人抽稅於關之論夫𣙜貨之關直省不過數十處耳其不經由於關者無稅也今天下無不食鹽之家即無不為鹽所到之處若內地盡行添設數不可計即止就沿海建置則自奉天以迄粵省東南半壁水陸口岸處處可走防範何止盈千且臣親見山西安邑縣止有一處鹽池數十里四圍高墻悉由總門出入專設院司官役巡守尚不能免其偷漏作弊何況沿海遼濶遙逺毫無關攔堵截臣恐所省鹽院道員以下之官吏俸薪工食不足以抵勢將百倍而過之矣又伊既云利之所在刑不能止則濵海竈地山水沙泥交錯寂寞荒涼之區強梁夥衆孰非攘奪之場人人可煎竈户亦難自主無引之鹽既行即有商人亦便於營私誰肯又為納課其爭鬧鬭殺釀出大端害及生民實甚於私販拒捕之刑獄矣他如煢煢竈户有何甲資厚而乙資微歷代章程豈能有鹽利而無鹽害此皆紙召之前始行搜尋銷除改板亦非內外如一者聖明洞鑒無微不徹此等迂執不可以口舌爭而服其政之任再聽其改正廣而推之各省庶涇渭得分而成效是非立見矣緣係覆奏事理辭意冗沓伏乞睿鑒施行謹奏覽奏皆悉顧成天非妥協人也除筆墨之外一無可取於彼進呈條議時即經面諭其説之非伊亦俯首屈服自認書生迂淺之見因既有此奏何妨發卿觀之朕意非以其言為可行也前諭甚明雍正九年六月十九日浙江總督管巡撫事在任守制臣李衛謹奏為奏聞晴雨應時膏澤普遍現在情形事竊照浙省自五月初旬晴明半月有餘鄉民插秧之際望雨甚殷於二十二日下晚省城即已得雨自此以至六月初四五旬餘之內甘霖間日而沛禾苗早已盡插長養菁蔥近而嘉湖寧紹逺而溫處台衢金嚴等府先後陸續報到俱於五月二十二日起連得大小雨澤千有餘里悉皆普遍但新苗初栽若雨水過多又恐淹浸初六日臣潔誠齋戒禱於普門大士敕建龍神等廟本日漸獲晴霽飛查各屬情形下遊諸郡河水既多地勢復低將來即使再晴而車戽無慮不足惟上遊之溫台處衢等處高阜之鄉六月下旬再須時雨接濟則本年通省秋收或可又有豐登之望至於沿海一帶潮濕之區米榖難於久貯又山多田少民間鮮有蓋藏溫州則全賴平陽瑞安台州則惟恃黃巖太平等縣所産之米販運接濟處州更係山僻轉運艱難若晴霽數日米價即昻臣於未接該屬得雨信息之先誠恐價值漸長民食偶艱飭行道府酌量動支倉榖分頭平糶并照閩省昔年米貴來浙撥運採買之例移咨福建督撫二臣招商通糶暫由海道運送秋成即行停止逮行文之後即據報到均巳得有甘霖總之浙省仰邀皇上惠愛黎元之至意所有雨澤應時情形理合具摺恭奏伏祈聖鑒謹奏雨澤情形欣悅覽之同日又奏為奏聞事竊查從前聘往日本教習逗遛未歸之武舉張恆晫并隨同之劉經先又另船出洋之生員孫太源沈登偉臣勒令原商設法於東洋索取本人去後今該國將張恆晫等盡行交與原船商人帶回據乍浦遊擊栁進忠於本年五月初四日押解到臣親加究訊內孫太源原係行商多年因欲圖賺倭照代為續邀沈登偉出洋在彼講解大清會典各書與夷人做詩寫字每人各得倭照一張呈驗已據直吐並將彼處耳目所見情形逐一據實供明惟張恆晫一犯不但全無資財貿易其受聘私往東洋教習騎射之處始則狡口不承逮該犯帶往之劉經先面同質對猶敢支飾含糊不盡吐實臣思此等之人違禁應聘外洋教演技藝貪利忘本若不分别嚴懲一二無以警戒將來隨將張恆晫武舉咨部黜革發司嚴審從重定擬充發邊逺與窮披甲人為奴以作榜樣此外孫太源等三人確訊尚無勾通作姦别項不軌情弊惟圖利是實似應飭交地方官著落商總鄰族出具保結管束安插永不許再行出洋以杜其弊所有張恆晫等業從東洋要回分别究治情由理合具摺奏覆再臣奉命督捕下江邇年以來遣員分頭巡拏稽查督緝不遺餘力捕獲甚多地方劇盜所在漸稀偶因上年淮北被水附近窮民彼時多有扒搶糧食者槩難盡以盜論遂有鄰省巨賊乘機竄入江境肆劫而碭山縣知縣張楚材玩視盜案劫失頻聞從不比捕嚴拏經臣訪聞飭查揑以扒搶糧食已經發落混覆似此縱盜殃民現在取揭會參但張楚材非係才力不能緝賊實緣少年狂妄每自大言但憑那箇上司要參自必調京引見似我如此年富力強不至罷官轉可升遷别地強如在這小縣委曲等語查該令雖係河南署撫臣張元懷之姪臣豈敢稍因情面緘默姑容但其狂誕之辭疏內未便敘入有關體式相應附摺瀆陳伏祈聖鑒謹奏覽奏知道了所辦俱是雍正九年七月二十一日浙江總督管巡撫事在任守制臣李衛謹奏為奏覆事本年七月初六日準蘇州撫臣尹繼善密札內開前經奏請酌留兩淮鹽規引費銀兩修葺城垣等項一摺奉有硃批諭旨並命將其所奉之諭密令臣與高其倬知之欽此欽遵知會前來伏查城垣等項公務外省所在皆然自不能少原係臣等分內職掌理應隨時酌量設法辦理者但江南濵海之區次第修建鞏固金湯似亦未可太遲目前軍需浩繁歸公解部正項誠難請留惟兩淮鹽規前於部臣李周望查審時奏明裁革存留之外尚有湖廣上下兩江江西陋規數十餘萬係各官吏隱匿私收以及綱商冒銷款項不在前奏之內者現今署兩淮鹽臣伊拉齊查奏欲行裁革以臣愚見橫𣲖固須釐剔而經費亦須酌籌在大吏理應秉公奉法凜遵若微員末辨奔走下役水陸巡緝盤費飯食紙筆之需豈能盡捐己資代為盡心竭力即使全革亦於衆引攤減無多應否酌量裁去一半仍存其半除文武官役巡緝經費外即於此節省浮用之內每年聽留數萬或十萬兩存貯司庫凡有益地方民生如城垣水利等類緊要公事支給動用至於微員養廉通省人多難以遍及止可於此內每歲撥出銀四五千兩凡有派遣賠纍差使分别逺近給與貼補盤費之需如有所餘留為下年添用統於歲底造册報銷則商力既得比舊輕減蘇息而地方公務亦可有備漸次整頓矣臣以此意與高其倬面商所見相同不揣冒昧附陳天聽是否有當恭請聖訓欽遵謹奏原命卿等會商之事作何裁留支用應合詞具奏以聞雍正九年七月二十七日浙江總督管巡撫事在任守制臣李衛謹奏為疊奉溫綸垂慈優渥叩謝聖恩恭繳硃批事竊臣接到皇上發回恭請聖安摺內欽奉御批下問臣好天語垂詢感戴逾分又於謝鵬回奏醫臣舊疾摺內復蒙恩諭務令用心調治作速全愈更邀聖慈委曲訓飭無微不到非但謝鵬叩頭凜遵毋敢稍懈而於聖心籌畫重務之時因臣微軀顧慮撫惜至於如此臣不覺感泣失聲中心何以自安除謝鵬一介細民不敢再行煩瀆回奏外臣謹具摺恭謝天恩代繳諭旨查得江南提臣王紹緒雖到任未久而聲名甚屬平常今臣七月內在松郡掣鹽更聞其將從前革去陋規多有復取於正額隨丁外本標每營壓派家人名糧三四分按月解送其各官俸餉馬乾連巡鹽盤費勒令充公致多怨聲督臣高其倬亦有聞見相同臣因前摺係覆陳緊要事理未及並入今奉旨下詢謹據實具奏伏候聖明鑒察所有奉到御批臣原摺五件一并恭繳謹奏奏覆王紹緒劣迹殊屬不謬適有列款密參一摺已發卿訪察矣此缺原欲以李燦升補今又用伊署理督篆濵海要地不得稱職之人奈何硃批諭旨卷一百七十四之十三欽定四庫全書硃批諭旨卷一百七十四之十四硃批李衛奏摺雍正九年九月初一日浙江總督管巡撫事臣李衛謹奏為覆奏候旨事竊臣前差齎摺千總於八月二十四日回杭捧到硃批奏摺臣叩領跪讀荷蒙御批宣示聖躬康健萬安臣心踴躍欣慶更邀洪慈溫語下問感戴難名臣犬馬之疾入秋漸次已愈竊幸天恩高厚許臣與聞機密現在奮迅精神辦理地方事務候旨欽遵急圖稍效微忱略報涓埃至臣蒙皇上頒發參奏江南提督王紹緒款迹密令訪察又於臣另摺內宣示王紹緒員缺聖意欲以李燦代之因擬署督印此任尚未得人除王紹緒居官緣由另行覆奏外伏惟督資格體統不至大相懸逺更得兩省呼應靈便盡其報效之忱矣又臣前奏風聞南洋咬𠺕吧番夷被從前內地逗遛在彼姦徒爭占之事今八月間連有往販南洋船隻回棹細加探訪止有咬𠺕吧小港地方生番聚鬧為從前中原流寓之人拒住彼見勢重未敢攘奪後經紅毛發兵剿撫已平其中不無漢姦在內並非流棍占奪彼處地界始知前次傳聞未確相應附陳奏覆所有奉到批回原摺理合恭繳伏祈睿鑒謹奏外洋一切事機不過知之而已但務稽查內地匪徒勿使勾通生事靜以鎮之為要萬不可好大喜功越分苛求致令疑畏而啓釁端也志之同日又奏為遵旨查覆事本年八月二十二日臣於批回原摺匣內發有參奏江南提督王紹緒款迹一件欽奉硃諭若據此奏王紹緒負朕一至於是乎或內中有揑陷之情亦未可定卿其訪察奏聞密之欽此臣細看摺內所指皆係廣東之事雖未能懸揣而現載餽送各官姓名月日物件係提塘密稟既非傳聞或其中禮物開填舛錯或收少報多并親身攜帶致送外人不知遺漏者則誠有之未必竟敢揑陷盡屬子虛且王紹緒人品操守素聞不端在廣東任聲名不好亦有傳説是以臣前曾以器小恐難勝任之處奏明今紹緒於到任後復收陋規壓派隨糧近又聞其署內所興土木工程多有票拘工匠白役當官取用器皿折錢始免并營伍各項既多染指兵丁不服約束任令藐抗有司欺凌百姓窩賭庇匪民怨沸騰雖宦橐資囊有無珍奇貴重之物一時未得訪其確實而已經被焚自是天報但就其器小易盈驕奢放縱觀之則歷來居心貪黷近日更甚可知江南重任統轄上下兩省海江湖河似此要地斷難久容相應據實覆奏伏候頒發奏參王紹緒一件理合隨摺彚繳為此謹奏覽雍正九年九月十五日浙江總督管巡撫事臣李衛謹奏為奏明事竊臣接準部咨奉旨行令直省召募揀選壯健技勇之人送京以備干城之用浙省派定一百三十人仰見皇上加意武備廣收人材之盛意當即欽遵於浙屬各地方民人武生童及鄉勇民壯等項招募情願來者之內揀選又令各鎮協營在於餘丁中挑取旋據陸續到省四百一十餘人臣細加察看外貌雖覺可觀而技藝多未素練省城向設教習武舉兵丁公館四所今又暫添數處將送到勇壯給以口糧發館教習不時親加考驗分别奬賞設法鼓勵今於其中挑得各項民人餘丁鄉勇民壯內本籍者一百名外來寄居并原辨二十名武生童十名共一百三十名已符部額又恐長途水土未能即服或一時偶爾耽擱另有漢仗略次而技藝稍嫺者十名以備補數即或無缺亦可添入儲用通共一百四十名一并送京惟是人數既多護送之官若少恐此等鄉村鹵莽之性沿途生事難以管束而新習未久之技必至生踈是以派出備辨外委等六員帶同本標向日練技兵丁十名分為前後次序行走按隊管領隨路得便教習所有勇壯兵丁人等俱經動支盈餘公項給以安家銀兩製辦行李衣帽皮褂等物隨手器械并水陸盤費及初到京口糧俱各充足仍遵旨於每人本籍額外賞給守糧一分於起行日為始開支養其家口擇於九月初六日臣率同司道當堂復加點驗起送若途間風水無阻計至十月中旬可以到京已將各人年貌籍貫花名技藝開造清册咨送兵部并知會户部查核聽候轉奏請旨欽遵所有辦理已經起送緣由理合具摺奏聞伏祈聖鑒謹奏據奏所募勇壯人等業已起行不日到京嘉悅覽之雍正九年十月二十二日浙江總督管巡撫事臣李衛謹奏為據實奏聞請旨遵行事竊照浙省今歲早稻豐收晚禾暢茂前因上遊衢嚴金紹四屬十餘縣內有三分栽植晚稻之田夏月天涼入秋轉熱田中間雜生有小蟲是以收成分數稍減一二業經奏明在案其杭嘉湖三府多係晚稻每歲十月方屆收割乃於九月初旬以後沿海之內一帶地方如江南松江府屬之金山奉賢華亭婁縣以及浙省連界之嘉興府七縣并杭屬之海寧一處田間亦有蟲生細如蚊蚋外無蹤迹俱在苗腹暗吸精液直至一禾黃萎剝開稻心始見其形是以難以撲救臣據報即委員分頭會同地方印佐教雜履畝確勘惟海鹽一縣被災較重其餘尚輕然幸而一邑之中此有彼無一丘之內此多彼少且俱係肥田所生薄瘠者轉無此蟲通縣計之尚不至於成災查嘉屬七縣自雍正四年以來連歲俱獲豐登更蒙皇恩減除額賦之後民間感戴踴躍六七八三年錢糧每歲全完今年通府地丁於八九月內悉行完足豈期已將結實收穫之時忽有意外偏災減去分數在民力尚未至於大為艱難惟禾苖間雜被蟲即有收之處米皆攙雜青腰白臍其色不一且有半粒碎小者在內只可食用難以納漕臣前議截漕復運一案之時係在八月間尚未有此番情形原因所派船多難以辦理隨時酌量據實陳明仰蒙皇恩優奬交部議敘正在感愧不安惶悚無地今九月之內嘉府又有收穫不齊實為意計所未能料若不設法稍為變通加之撫恤無以仰體皇上愛育黎元有加無已之至意兹據委員勘明回省覆稱各縣有蟲田畝海鹽三分之一受傷頗重平湖嘉興二邑次之嘉善石門桐鄉秀水海寧尚少此攙雜被蟲之鄉應徵漕米通計四萬餘石為數亦無過多而此時米價尚不甚昻可否仰邀皇上天恩照雍正元年四年兩奉恩旨每石折銀一兩解部使民力得以舒徐或仍照雍正五年部改一兩二錢之價徵收非臣所敢擅專至目前察度民情猶可支持不至艱窘但現在隂雨若得晴霽半月則晚稻皆能刈穫惟恐此數縣之內細民小户來年三四月間青黃未接時稍有缺乏另為遵照偏災恩例酌動公頂量加分别資助若彼時春花茂盛即可轉變自謀無須費力幫給合并聲明緣現今開徵漕糧若待查造細册再題勢必往返稽遲且合邑統算既不成災又過九月具報之期況前行部文原有或折或存之議是以將被傷各縣折收米數分晰查明續行報部俟欽定命下之日方敢移咨倉場總漕諸臣衙門備案為此冒昧先行據實具奏仰懇皇上聖明睿照施行謹奏據奏海鹽等數縣禾苖被蟲候另有旨從部頒發同日又奏為覆奏事竊臣蒙恩召對遵旨將所管各任署理之人酌量擬奏恭請睿鑒荷蒙皇上不以為謬俯賜恩允特頒諭旨以王國棟李燦分署臣各任內事務其崇明總兵官等缺著令揀選奏聞遞行委署緣水陸兼知者少是以將衢州副將葉應龍暫護崇明鎮印務試看具題外其葉應龍員缺原奏擬以溫州遊擊白世璘暫署因續又奉旨紹協副將著臣揀選遞委臣查紹興亦係山海要區白世璘由紹協都司升用於地方營伍情形較之衢州尤覺熟悉故將該員題明請署紹協以不能辦理中軍通省事務之杭協副將周騰鳳仍回衢州本任所有改委緣由相應奏明至臣前奉諭旨於鄂爾泰到京前後來京今聞高其倬於九月初二日赴滇則鄂爾泰諒在十月底可以起程自滇至京將及百站即趲行亦約須五十日之間臣已飛調葉應龍至省令其前赴崇明與李燦交代明白來浙將一應事務遵聖訓以慰瞻戀之忱其浙省地方營伍事情現在俱分清頭緒飭行文武加謹辦理不得稍有怠弛江南情形隨路再看近訪得狼山鎮總兵官王安國原係浙江處州鎮調繁素尚老成謹守今因染風痰之疾雖已漸愈而精神減少諸事俱託其第三子料理凡有頂拔名糧非有錢者不能得缺查王安要地臣既有訪聞不敢徇隱理合附摺陳明伏候皇上睿斷謹奏覽雍正九年十一月初八日浙江總督管巡撫事臣李衛謹奏為據實奏明仰祈睿鑒事本年十一月初五日接準吏部咨文復蒙恩旨令臣酌量起程日期於十二月望前到京欽此竊臣初奉冬底到京上諭原欲十一月十九日起身正合月中進京之期因偶患瘡疾醫生限日平復是以前摺附陳擬於冬至邊趲行日來內垢漸去生肌大半適又感冒泄瀉稽誤數日瘡口復潰行動甚難今外證已除方將長起若不稍俟收口於清江起旱之際頗慮艱難或沿途轉致耽擱現在晝夜內外並治務於二十五日起程一路量力趕緊行走最遲亦於封印時必到恐於十二月望前之期略緩六七日臣心實切惶悚本不敢再為煩瀆天聽仰惟日起天氣大晴晚稻已收三分之二再得十日即可全登地方甚是安靜又臣聞得調京松江提督王紹緒臨行之前將米折銀虧空二千餘兩今以倉底氣頭陳米給兵衆人不要紛紛嚷閙並將恩賞生息銀兩以九五折扣發給各典鋪所餘入已以及從前取用民間家伙不還怨聲載道貼單約日索取等因臣即飛速密諭該標中軍參將黃欽查覆未到近聞新署提督馬世龍於初二日赴任諒必設法安頓合并附摺先為陳明仰祈睿鑒謹奏王紹緒誠為負恩之最者已有旨察審矣雍正十年八月初一日浙江總督署理直隸總督印務臣李衛謹奏為奏聞沿途禾稼收穫豐盈事竊臣遵旨於本年七月二十二日出京二十六日抵保定府上任經過地方目擊各項早田雜糧刈穫過半晚禾更盛蕎麥正在開花亦極暢茂詢之鄉村老幼咸稱今歲秋成大小米榖豆黍悉有十分惟高粱間有八九分者較之歷年實為豐稔民情歡呼載道及抵署後查近處各屬有已經報到者其情形與途間所見相同伏思臣自去臘至今日侍闕廷親覩皇上憂民念切時刻以旱潦關心誠敬虔祈溥施恩澤上格穹蒼特降豐穰萬民受福感應如響臣實切欣幸合將所見京外豐熟大概情形先行奏聞上慰聖懷為此謹奏畿內今歲雨澤雖屬優渥尚未期如此之豐盈也覽奏曷勝欣悅雍正十年八月二十七日浙江總督署理直隸總督印務臣李衛謹奏為奏聞事竊照直屬夏秋之間雨澤時行滹沱豬龍二河相近沿邊州縣間有堤岸漫溢田禾被淹之處當經前署督臣劉於義委員往查於七月二十日具摺奏聞臣接任後催令各地方官并委員分頭確勘先行酌量賑恤并將此外田畝有無被災飛速看明分别册報去後今據深晉霸安四州正定保定髙陽天津藁城雄縣等屬俱稱河水旋長隨退略減分數勘不成災大城束鹿平山文安蠡縣等處屢催尚未覆到惟冀州及衡水縣髙田無傷低窪村莊田禾果被淹損武強武邑二縣低處有秋髙阜有鹻之地得雨稍遲禾苗未能滋長各具成災分數册結詳送前來除仍飭大城等五縣速覆外臣查今歲直屬地方各項秋收咸稱大有惟此髙窪數處略遇偏災亦止村莊間雜非係通縣受傷若酌動存公銀兩於冬底來春青黃不接之時按户再加接濟賑恤即可安頓得所但歷蒙皇恩加意黎元凡有偏災無不蠲賑並行今成災頃畝雖屬無多而事關錢糧緩徵按分蠲免例應題報部臣方可據案定議未敢冒昧合先具摺奏聞恭候皇上訓示遵行謹奏成災頃畝雖屬無多而身當其害者飢寒迫體情殊可憫其詳加酌量應緩應蠲具疏題請同日又奏為請旨事竊查邊城積貯自宜豐盈而隨時變通亦當斟酌臣檢查緊要案卷前署督臣劉於義於本年五月間因宣化府屬及張家口存米數少用處繁多請於通倉撥運米四萬石分貯各倉預備支應又因自通轉運道路艱難每石百里給發價銀一錢六分并請於秋杪陸續運送等因先後具奏咨部俱經議覆奉旨允準遵行在案今臣飭催委員領價赴運據口北道王棠會同布政使王謨面稟宣屬今年秋禾豐稔目下米價頗平若仍於通倉領運則四萬之米按程計算共需腳價銀二萬八千四百九十六兩較之米石數目已及十分六七不若乘此豐年於宣屬就近採買為便臣詢其時值雖稱每石一兩一二錢不等但恐一時採買價必髙昻據該道等公議即或增長以一兩三錢可得一石請於糶存雍正九年截漕價銀之內照折中定價每石一兩動用之外於奏準腳價二萬八千餘兩內止須添撥銀一萬二千兩即可就近買出新米四萬石甚為兩便又據稟稱宣屬九十兩年應買不敷兵米向因市值髙昻定價未敷咨部借動各屬均貯榖米支給統於十年秋後買補還項現在倉厫虛懸今連癸丑年應需兵米計算又共應採買米三萬八千七百三十石零但所貯宣化府米價皆係每石止許一兩實有不敷今請每石約增銀三錢並於節省腳價內共撥銀一萬一千六百一十九兩零則倉儲均可買足等語臣查此項米榖借支已經三載邊城倉貯久懸頗有關係自應早為買補但恐一時採買不易隨著令該道速回宣化再看實在情形斟酌能否辦理無誤具覆去後今據王棠稟稱撥運通米原備緊要之用但恐逺路送到臨事周章再四思維自以就近採買為妥但近又接到部劄奉旨令於獨石口外動部發銀兩買米二萬石存貯備用惟慮米數既多或有未敷議令同知白石遣人赴山西交界鄰近地方並歸化城各處分收於商人等回空車輛隨便帶運統數合算毋庸另請腳價等因到臣除山西接壤米價如何約可收買若干及商人帶運不須腳價是否出於情願不致勉強有纍抑或即在價值之內未據該道分晰聲明現在羽檄飛飭速覆外臣查撥運通倉米石不惜逺路腳費原係一時權宜今既宣屬年豐米價平減似應隨時變通辦理至買補兵糧雖有一兩存價虛名而口外現辦軍需價值難平歷年延挨終不能補邊陲儲蓄所關甚重今約增銀三錢飭令據實購買若本地近屬可得即不須再往鄰封購求縱使數多今歲難於買足諒所剩無幾既有價存貯來秋亦易於採買目今正值收穫乘時採買未便再緩不得不冒昧陳奏伏乞皇上睿鑒敕議遵行謹奏邊城積貯最關緊要發交辦理軍需大臣議奏雍正十年九月初四日浙江總督署理直隸總督印務臣李衛謹奏為奏聞地方大概情形事竊臣荷蒙聖恩委署直督印務一月以來地方遼濶逺地利弊尚難周知就其近處略有見聞若每事具奏何敢煩瀆如仍因循遷延地方終無起色現在各屬久任熟練之員頗少刑名案牘不清錢糧多係那東補西掩飾墊用將來輾轉露出必有虧空且通省捐項甚多若歲修水師營戰船部價之外不無津貼各處運米盤量折耗派解囚糧等類不一而足衝路尅減更甚而錢糧牽混自康熙三十年後尚有駁案未結通省倉榖一時雖未能遍查而因價貴難銷至今不曾買補者七十餘萬石雍正元年俸工停捐之後桑成鼎仍將各屬所解地丁錢糧公然扣抵懸宕正項雍正三年動漕賑濟米石李維鈞既未題報又不彌補至今反作州縣虧空現在查出數件核清更正具題而宜兆熊劉師恕蔡珽等凡遇難完之案惟以參官了事者不可枚舉至於詞訟雖少不比南方刁詐但命案多係􅒬酒鬭狠動則輕生更兼糧船短縴無家無室河凍船回難於資生糾合為匪殆無虛日而泊頭鎮連兒窩等處衝繁雜還竟無就近專管之員地方焉能安靖似應籌及再臣檢查案卷近日官署失事者甚多皆以失竊詳報難以憑信臣現在嚴查強竊情形設法勒拏以警盜風此外諸事尚多凡臣職分心力所能辦理者自當竭蹶整頓其未敢擅專要務不得不上煩天聽訓飭遵行今因臣前次所奏買貯宣化張家口等聖鑒謹奏直隸吏治營伍歷任督撫未能辦理妥協前經再三諄諭矣卿其竭力整頓務令改觀以仰副朕意同日又奏為遵旨奏覆事竊臣在京面奉諭旨直隸營伍平常聞得督標與城守兵丁更為不堪必須加意整頓著臣到任後另募兵二千名訓練備用欽此臣於八月十二日簡閲督標及保定城守營官兵果見其馬步軟弱所開多係三四力之弓藤牌數十人現在新學此外刀鎗技藝俱未曾習過所恃者火器而鳥鎗長不滿三尺新舊大小攙雜不一焉能及逺雖係北省之兵漢仗出色者甚少誠如聖諭難稱徑旅但歷來相沿竟成風氣訪聞各處大略相同若不變其積習難收實效除現在設法操練外隨遵旨招募新兵只作臣之意見委婉出示今已就近驗取年力稍可者六十名飭發收伍分别教習技藝目下續到漸多自當加意挑選此等新兵既經在營練習似應於收伍之日撥與官房居住暫給守糧一分悉在保定合總會操臣可不時親察勤惰賞罰鼓舞將來募足練成之後更當請旨但目前兵數既有二千亦須專官管束似應每兵千名設守備一員千總二員把總四員外委千總三員外委把總五員使之分隊管領督率操演俟練熟酌定營制後再設將領分管但守備千把現在保定近營實難挑出多員且教練武藝亦必得素習之人臣在浙省時曾經練有熟諳辨目分發各營教習今巳漸熟堪用者多可否酌量挑選千把外委目兵數員名移咨署浙督臣程元章調取應用再查有浙江撫標千總李聘近經送部引見奉旨準補撫標右營守備該辨漢仗強壯頗諳技藝教兵著有成效仰懇聖恩改調直隸新營守備使之督率教習各兵其員缺查有奉旨交臣酌量補用之原任浙江撫標降調守備龔炳久任南省現已回浙候用倘以之署理駕輕就熟各無貽誤一轉移間似於營伍有裨以上各條是否有當臣未敢擅專相應具摺覆奏請旨欽遵更有懇者臣前在內廷侍直時曾見頒給河東督臣田文鏡鳥鎗式樣一桿製造堅好體輕而能發逺實為馬上利器仰祈皇上俯念直隸營伍綦重賞發一桿俾得依式製造更可以壯國威而資軍實矣謹奏辦理軍需大臣詳議具奏雍正十年十月初九日直隸總督臣李衛謹奏為懇請聖恩事雍正十年十月二十九日恭逢皇上萬夀聖節普天共慶十年肇始億萬綿長臣自雍正四年奉差外任以來未得與在廷諸臣躬親拜舞今幸得備員畿輔咫尺天顔華祝情殷嵩呼念切且郊圻重地整頓事宜臣於兩月內略有見聞者必得面領聖訓庶幾知所遵循并據布政使王謨按察使竇啓瑛恭請相隨為此虔誠具奏伏懇天恩俞允俾得隨班叩慶稍遂悃忱臣臨奏曷勝瞻依祈禱之至謹奏甫經到任為日無幾事務紛紜何可逺離況在京諸臣俱免行禮已有旨矣諭直隸總督李衛知悉聞天津一帶盜竊時發其風甚熾該地員辨緝捕殊屬疏懈當留心察訪嚴加申飭又天津縣典史名崔天機者聞訃之後竟不遵例丁憂仍然戀職向鹽行市肆各商借端科斂貪汚顯著云云不知此時曾否卸事朕意斯等劣員即或已經離任回籍亦不可令其漏網務須確訪款迹嚴行懲究以肅官針雍正十年十一月初四日直隸總督臣李衛謹奏為恭繳硃批諭旨先行覆奏事竊臣欽奉硃諭一道跪讀之下仰見皇上明目達聰睿照無遺曷勝愧悚伏查天津地方盜竊頗多誠如聖諭臣於本年九月初四日曾將天津沿河一帶泊頭鎮連兒窩等處衝繁雜遝府縣駐劄既逺就近竟無專管之員大槩情形及現在籌畫欲行辦理緣由附摺奏聞自到任至今三月之內留心訪查誠恐一人之言遽難憑信復經選差員辨於沿河一帶四次往來細加確訪正在酌議題請將各地方現在空間之驛丞稅課大使改兼巡檢等官分界管理專司巡緝令各就近之府佐稽查管束其怠玩員辨更當遵旨嚴飭分别懲創至天津典史崔天機於今年八月內聞訃丁憂先據天津縣徐而發詳請將該員給假治喪仍留辦事臣未即準行復據該縣面稟臣及兩司云天津係新改地方又有河鹽及鎮道各廳駐劄衙役聚集未免事多格礙無人相幫典史崔天機係供事出身料理旗民事務各項往來差遣熟練無誤必得留其幫助辦事方屬有益等語臣看徐而發雖未可深信而辦事頗有才情臣係初到又經府轉諒伊等不敢欺誑遂批司查議據覆新改地方難拘常例臣是以據詳咨請部示近準覆文應令回籍守制轉行在案今既有前項劣迹豈可姑容隨立行看守并密委學習進士丁廷植前往查其科索各姓名贓數外因鹽商俱是長蘆鹽法道專轄即當鋪亦多係商家所開復令該道彭家屏親傳商總面問自不敢隱諱至於别行鋪面及平日貪婪各情恐天津縣以曾經親為保留有所掩飾特飭天津府知府李梅賔就近嚴行詳查一面咨部斥革從重究擬斷不使其漏網理合先行據實覆奏所有奉到硃諭一併恭繳伏祈聖鑒謹奏覽奏知道了同日又奏為奏請睿鑒事竊臣屢承訓旨諭以人才難得先後歷任於文武大小屬員中從未肯輕忽遺棄更不敢濫舉市恩凡有保薦之員俱於原題奏內據實加填考語分晰聲明恭候聖鑒欽定又恐拘謹者流於廢弛有才者間至放縱時加察訪稍有前弊即行參劾斷不因已經保薦輒為庇護自蹈冒濫欺妄之咎今查平陽府知府李煚係原任廣東平和令後捐主事同知臣向在京時見其頗有才情及後久不往還雍正六年因浙省派官清查各府歷年舊欠錢糧缺員未敷憶及其人題請行調至浙分查台州府屬頗見勤勞事竣之後緣海寧塘工乏員題明留浙暫署杭州府通判分管海塘至八年秋汛後送部引見蒙皇上簡補平陽知府臣每於便中留心託人探其表率措施如何今風聞李煚近日性情尊大舉止乖張與同城總兵官必欲平行以致文武不和臣深為駭異及訪之過往山西人轉有讚詞詰以前故據稱因伊所屬洪洞縣係本省保留之員虧用追存楊尚書逺年家産銀兩欲攤丁內彌補李知府與之作對又待屬官過嚴多不喜他或者布散流言惟恃才任性則有之等語雖傳説不一難以憑信但恐該府器小易盈平陽係緊要大府臣曾經薦知府之列因其出納吝嗇家道素豐自必慎重錢糧管庫可以放心彼時鹽政諸務臣數年料理已有頭緒原不專藉該道整頓是以聲明請旨準用乃該道到任以後瑣屑卑鄙諸事遲鈍上年秋間將已完課之水程稽留不發屢催罔應商鹽無從開運以致蘇州缺鹽數日價值驟昻臣一面差員星夜儧運接濟平減彼時即欲參處因伊初到未久嚴加面飭記以大過望其悛改豈意該道漸次行為更甚於前如蘇松近海各場竈民秋月風潮被水乏食急待賑恤而商捐現成之米抗違留難日久不發已蒙聖明洞鑒嚴飭其他可知夫鹽政全在隨時調劑豐熟之歲緝私宜嚴遇歉即當變通今秋紹興已有聚衆拒捕毆官傷兵之事而松所已掣引鹽運店者漂沒頗多浙商資本原不及兩淮近又虧折艱於收買彼被水窮竈無處覓食專賴水退即可煎鹽度命非比久雨不産若有鹽難售豈肯束手忍餓自必偷賣濟私人衆情迫繩之過急即生事端惟有多發備存公費銀兩遍收竈鹽使之皆歸公倉則私販不禁自散既可冬季益掣又濟窮民口食免得海濵梟徒聚集為害地方消患未萌最關要務今十月終旬南來便人過往問及仍不肯發銀廣收現已掣期將屆鹽數尚少倘捱至過歲補掣遞壓惰誤國課生民兩有未便總之江承玠居心隂險總不肯以一身擔當重務明知誤公可以推諉年歲與己無涉臣雖已在直隸而該道係臣題補專管大員似此諸務有心怠玩不但臣數年整頓成規一旦隳壞而國家公事豈忍聽其貽誤合并據實陳明仰祈皇上俯察愚忱可否將浙江鹽驛道一缺另為揀選特放幹練才守之員速往辦理庶於鹽課錢糧有裨而臣誤用劣員之咎或可稍逭萬一矣為此謹奏江承玠係由户部司官升用外任朕所悉知之人前於題補道員時曾經有諭慮其不妥第遽加罷斥則始初薦舉不當難免物論朕意莫若卿照此奏竟行具疏題參名正言順殊屬允當至此缺甚要現在浙員中有可勝任者密摺奏聞以便臨時一併降旨施行雍正十年十一月初十日直隸總督臣李衛謹奏為遵旨覆奏恭繳御批事竊臣因聞李煚近日居官行為人言不一并江承玠有意怠玩恐致貽誤不敢隱諱據實陳奏荷蒙皇上天恩分晰指示令臣將江承玠竟行題參仰見皇上聖慮周詳體恤臣工至意謹已遵旨另疏題參但臣前次具摺原請皇上鑒察乾斷不敢擅定處分今既露章參奏似當明正其罪若不令其出資數萬於工程效力無以為有心自顧怠玩公事者戒目前浙省海塘罰贖銀兩所餘無多今秋風潮又有坍缷矬落需費正繁故於本後聲明請旨應否將江承玠革職發往工程處除百丈以上之工仍動公項外其餘零星修補之處使其出資辦理庶足稍抵徇私廢公之罪以警積習伏候睿鑒又蒙皇上宥臣從前誤舉之愆復諭此缺甚要現在浙員中有可勝任者密摺奏聞欽此臣承命之下惶恐感戴謹將浙省現任知府十一員才具操守居官行事據實分晰開單進呈御覽恭候聖鑒所有原奉硃批奏摺三件理合恭繳伏乞睿鑒施行謹奏江承玠事題本到日有旨所遺員缺朕意欲以張若震升補其台州府缺浙員中可得相宜之人否或州縣牧令有堪擢用之才即階級稍懸亦不妨密以奏聞候朕裁酌雍正十年十一月二十九日直隸總督臣李衛謹奏為奏聞事竊臣自到任後即將沿河一帶并各地方盜匪姦宄屢次留心密訪除現在已經分别懲創未敢逐件瑣屑瀆陳外查直屬有大成衣法等教名目愚民信從入夥者甚多臣訪知數處為首之人開名飭令地方官密訪確實并令選擇誠謹之人佯投入內探其作為今據深州知州徐綬等員回稟前來照依指示辦理之法查得大成教首係旗人王姓武舉果住灤州石佛口名下有次掌教二人一係周世榮住饒陽縣曲吕村今因癱瘓有伊弟廣東丁憂通判周世臣代主其事一係王瑛住深州貢家臺凡教內有能宣經講道者即為小教首分住各處招引衆人如深州之鄭自昌衡水縣之楊林全侯燕平河南地方之靳清宇皆其領頭門徒其衣法教之老教首乃已故旗人董一亮今有伊女代掌住居易州而饒陽縣武舉王作梅為之管事次教首則饒陽之孫連若等尚有數處相從之人亦衆以上二教始於順治年間大都以輪回生死誘人修來世善果為名喫齋念經男女混雜每月朔望各在本家獻茶上供出錢十文或數百文積至六月初六日俱至次教首家念佛設供名為晾經將所積之錢交割謂之上錢糧次教首轉送老教首處謂之解錢糧或一二年一次各有數百金不等其所誦之經有老九蓮續九蓮等名色與臣所聞大槩無異並鈔得經咒數册俱係鄙俚之詞此等雖屬哄誘愚民錢財尚無謀為不軌情狀但附和既多傳染日久終有後患臣愚昧之見若目前一時舉動即止於查拏首犯而入教人衆驚惶疑懼輕生逃竄事所必有現在將屆歲暮倘使無知愚民流離失業亦所不忍臣議酌定告示預先備就分晰曉諭凡有誤行入教者許其燒燬偽經改悔自新槩不株連於新正初間密行各處臨時一面張貼一面將前項著名教首數人逺近同日動手務獲酌量輕重處治庶愚民免於驚擾首犯不至脫但臣見識短淺應否如此辦理抑或由京差拏之處伏祈聖訓指示欽遵謹奏一面張示一面緝捕既可免驚擾又不虞逸脫辦理已屬合宜何庸由京差拏耶衣法教名目向日未聞大成邪教前經屢諭宜兆熊等訪察乃漫不經心未副朕意今如此措施甚為可嘉之至同日又奏為據實覆奏事竊查天津縣典史崔天機丁憂科索鹽商鋪面一事臣凛遵諭旨分飭嚴查密加確訪去後兹據長蘆鹽法道彭家屏於十一月二十五日覆稱蘆商共分六綱在津按月輪流辦事隨傳值月各商逐一細加面問并令據實親筆畫押因崔天機母故之後浙晉綱商十二家內惟凌元標等五家往弔所送奠儀五錢一兩不等晉升綱商十一家共送疏菜茶食十六色紙盤一副晉源綱商九家內有牛萬鍾等四家往弔各送奠儀五錢一兩不等其晉澤慶豐河東三綱未有一人弔送又開當商人王子德隨衆公出奠儀一錢七分俱係自身往弔並無總收科派并據該道稟稱崔天機素屬勤勉官既微小人復癡呆各商豈肯受其科斂等語又據天津府李梅賔覆稱查據當商賈培章等僉稱當鋪十八家共送崔天機奠儀四兩祭幛一軸水禮十六色又縀鋪户姚四朱鳳翔等各送奠儀五錢餘與彭家屏所覆相同此外因事貪婪受賄之處再四嚴查據司府等各覆實無贓證與臣前差之學習進士丁廷植密訪回稟大槩無異伏查雜職等官平日與地方鹽商當鋪往來生節收受陋規禮物視為交際之常此等積習相沿難逃聖明洞鑒今崔天機以母故收受弔奠禮儀約計共有二十餘兩雖係各人自行餽送而么麼小吏未能盡守廉隅既經染指罪有難辭合將查得各情由據實覆聖主之前者臣於十月二十九日始行接奉皇上聖諭隨即差員前往密查乃未到三四日前即傳聞有此一事臣不禁駭異急為根究係十月二十九日商人馮相臣對衆商所説隨查馮相臣籍本杭州在津行鹽本年九月內有原任總兵劉業浚因伊親京營遊擊萬吉士於天津鹽鋪放債商人李九如欠吉士銀五千兩吉士凂劉業浚來津取討住宿平素相交之馮相臣家九月二十四夜賔主飲至四更始散失其衣服二包銀四十兩次日報官知縣因公在保典史崔天機前往勘驗見馮相臣住房左右後面俱係商家前臨大街墻垣堅固無損所失之銀俱在劉業浚枕箱之內似非外人所能竊取遂帶相臣業浚之家人盤詰一番二人以不留臉面大加痛恨業浚隨即進京回告吉士臨行有必要報復之言而馮相臣復屢登守備李甲早之門咆哮呵斥勒要三日獲賊又聞相臣家尚養有葉姓之人道袍草履時常往來京師指稱能於王府行走看其蹤迹近似丹客坐功之流相臣借此二處相與甚不安分曾因比課太嚴罵過運同孟周衍衆商公求得免又往拜通判裘豳生嗔其不開中門於沈志三家痛加辱詈天津官民多稱為馮太爺此番之事無不聞而更懼臣思地方失竊自當嚴緝典史犯法亦應重處但棍徒借以賣弄威福煽惑愚人狂妄招搖頗有關係臣既有所聞不敢隱諱緘默相應一併附摺陳明伏候皇上睿鑒施行謹奏據奏則馮相臣乃大不安分之人也極應嚴行懲處其對衆聲言崔天機一節不必涉及至於葉姓道人行蹤詭異亦當究明來歷不宜疏忽此奏殊屬可嘉雍正十年十二月十三日直隸總督臣李衛謹奏為敬陳愚昧之見仰祈睿照事竊臣接閲邸鈔奉旨福建泉州府知府員缺著禮部員外郎鄂善補授欽此仰見皇上慎重方面為一郡之表率特於部院保舉人員內揀選酌用臣係外吏何敢妄參一言但泉州府係福建第一緊要之缺所屬山海交錯兵民雜處非老成幹練之人不足以副此任鄂善在浙臣因其人頗聰明彼時可以就近管束曾經聲明保奏請用為乍浦理事同知荷蒙聖恩俞允後經隨帶進京引見令臣教導成就又緣與乍浦副都統傅森言語不相和協并聞其酒後未能謹慎是以請調改用杭州今雖閲歷數年差改前習但得內地安靜府缺與上司相近地方尚可黽勉供職如於泉州緊要重地獨當一面恐少年髙興恃才任性人地似未相宜臣與伊父鄂密達共事數年從未敢隱蔽其長亦不肯諱言其短俱有先後原摺題本可據此件毫無所用愛惡之處實緣身受皇上厚恩偶遇稍有關係之事若不據實奏明於心何以自安伏乞睿鑒或於相稱别缺知府調補則該員既得成全以報殊恩而地方亦蒙得人之福矣謹奏所見是泉州府缺因鄂善係廷臣保薦之員一時未暇詳審人地遂降旨以之補授今覽奏方始憶及已另諭該督郝玉麟酌調矣硃批諭旨卷一百七十四之十四欽定四庫全書硃批諭旨卷一百七十四之十五硃批李衛奏摺雍正十一年正月十五日直隸總督臣李衛謹奏為恭繳御批附陳交代起程事竊臣自進京叩覲天顔十有餘日荷蒙皇恩得以親承聖訓跪聆至理開導愚蒙使茅塞心胸略有牖啓感戴欣忭莫可名言臣隨於十二日出京星馳回保十四日將緊要案件料理交代十五日送印後即起程赴浙所有上年冬月先後兩次奉到御批原奏摺七件理合恭繳其中直省應行查辦事件以及邪教為首之人均有就獲解到者俱面與署協二臣唐執玉顧琮言明原委斟酌料理容臣回任後逐一查明分晰覆旨至臣屬員各有官守不敢多帶查清河同知楊灝於工程熟練人亦明白有才此時本管河務無事暫行帶往於夏汛之前即可回任兩無岐誤並舊有直督衙門筆帖式二員內隨去玉麟一人稍供沿途差遣之用相應一並附摺陳明伏乞睿鑒為此謹奏浙省各員均係舊屬其才具諒所素悉可以任意指揮直隸屬員似不須帶往若既束裝在道則亦巳耳雍正十一年四月十七日直隸總督臣李衛謹奏為甘霖大沛四野霑足恭摺奏報上慰聖懷事竊照直隸西南各屬地方冬春雪雨略少皇上敬天勤民虔誠祈禱巳於三月二十六等日得有時雨而聖心惟恐未能普遍屢頒諭旨動支各縣存穀撥運北倉米石減價平糶將舊欠錢糧特命緩徵恤刑慎獄平允矜全浩蕩洪恩有加無巳今保定府一帶於本月十六日申時起濃雲密布雷電交作初猶隨下隨止是夜子時大沛滂沱纒綿稠密直至十七日已時漸住而彤雲深厚看來所及廣逺除別屬各縣現在飛查續報外臣差員四郊履勘髙下田畝俱各透足從此麥秋兩熟可望豐收農夫鼓腹稱慶歡聲載道此誠皇上實心實政徵應感孚呼吸可通捷於影響億萬蒼生皆蒙福佑臣等文武各官曷勝欣忭之至為此先行繕摺奏聞伏乞睿鑒謹奏保陽一帶得雨情形以手加額覽焉雍正十一年四月二十日直隸總督臣李衛謹奏為奏聞事竊臣於回京入境之初途間即聞有旗人白二邪術惑人在涿州發覺查拏逃遁未獲臣料其必於水路及屯莊口外潛蹤以避耳目凡遇文武屬員即密令彼此知會上緊設法務獲姦宄以除民害今據天津縣知縣徐而發稟稱本月十六日差役在該縣地方王家莊飯鋪內見有買酒之人形迹可疑隨同昌平州差役盤詰拏住訊據自認係白馬亮即趙鴻亮現巳撥兵護解來保等因臣隨靣諭竇啓瑛差員星飛迎去沿途小心看管押解到日究審外事關特旨嚴拏要犯理合先行奏報謹奏此犯就獲甚屬可嘉該縣令及捕役人等亟應從優奬賞以示鼓勵雍正十一年五月十五日直隸總督臣李衛謹奏為敬陳管見恭請睿裁事竊查直隸近年於提標宣化鎮張家口龍門獨石等營添兵五千四百名此誠國家慎重邊防儲僃徑旅深謀至計臣又何敢妄議惟是淺陋之識營伍重費餉糈多一兵必實在得一兵之用方為有益今聞從前因急於足數所收新兵其中雖有壯健勇幹之人亦有軟弱油滑懶學技藝者此等人在營亦算一兵若欲望其遇事調遣勇敢向前恐不易得而官兵俸餉米折馬乾以及買馬製械等項即雍正十年一歲而論巳在藩庫支給過銀二十二萬五千七百餘兩尚有建造營房共約需銀十萬兩嗣後有閏無閏計算餉米十七八萬餘兩歲歲皆有錢糧關係不可不為籌及况前項兵丁防守地方者少存營操練者多原僃調遣之用又臣標奉旨募兵二千名在保訓練現在詳慎選擇精壯者充伍若再於提標所添一千六百名內挑留一千名宣鎮所添一千五百七十名內挑留一千名將此四千人仍在三處各加訓練使成精鋭即有調遣亦可敷用應否趁此營房未經建造之時仰請特遣大臣前往會同該提鎮將所招新兵逐一詳加選擇其軟弱無用之人即行開糧歸農其精壯堪用者於沿邊各口路營堡原額兵少之處將巳添者酌留若干未添者撥增若干務使處處嚴密至於內地各營亦有兵額不敷防範難周之處俱應查明分別多寡量為增補其餘皆可裁汰一轉移間通省皆得整齊調遣仍無貽誤庶幾均收實用餉不虛糜仰惟皇上聖明自有髙逺卓識出於尋常萬萬者臣淺陋愚昧偶有所知據實陳明如或可行容臣會商提鎮諸臣撙節勻派妥協分晰具題伏候睿鑒訓示方敢欽遵辦理謹奏另有諭旨頒發候示到遵行雍正十一年六月初六日直隸總督臣李衛謹奏為遵旨覆奏事本月初四日戌刻接到大學士鄂爾泰張廷玉寄信蒙皇上以江南副將李漣是否克勝溫州總兵之任詢問及臣臣遵查得李漣老成勤謹歷練營務誠如聖諭尚堪擢用但係北方之人未嫺水師若在陸路簡地總兵似可勝任溫州閩浙接壤山海交錯一年兩次出洋督巡會哨若總兵官於海靣船務未諳則差遣兵辨未免陽奉隂違不能稽核雖現今洋道寧謐臣實未敢深信其人地相宜此溫州鎮員缺恐致猶煩聖心再四籌酌查有陳倫炯世習水師歷任有年前因臺灣要地不便移動今思水師總兵原難多得若閩省欲求一好副將轉移之間諒不至於乏人是否可用恭候睿鑒欽定謹奏臺灣要地陳倫炯何可移動卿意中既無勝任之人另旨命浙閩督撫選舉耳同日又奏為愚衷難遏冒昧瀆陳仰祈睿鑒事本月初三日接準部文廷議勇健營兵丁一事臣查此挑汰驕悍不法兵丁給與路費口糧止於遞回原籍不行治罪其支領過餉米恩賞銀兩等項槩不向本人名下是問此誠國家寬大洪恩伊等尚有何辭而不樂從惟是前項兵丁原係十八省督撫挑送今發回三百二十九名存留一千二百二十五名則此十八處之各府州縣皆有其人伊等回家之後彼存留兵丁之父兄妻子見伊等回來骨肉團聚又未追其領過銀兩而已之夫男兄弟身既逺離鄉井又因借支僃辦出口物件即奉有廷議部文將其養贍家口錢糧全行扣除將謂國家賞罰不公儻或十八省之人紛紛傳論有關聖主多年政治聲名且此猶就在內家屬而言至留調軍營之兵丁等聞知發回之人轉得受用而已身在外家口有此艱難情狀必將志氣隳頺減其勇往之心定議大臣豈不計及於此無非始終欲實前言之不謬臣不知其是誠何心又如各省督撫挑送不慎追賠領過錢糧等項咎實難辭臣於浙省發回共有五名應賠不過數百餘兩但各省尚有多者即如直隸一處而論汰回四十四名應追賠數千餘兩巳故署督唐執玉雖無功績足録今現纍及子孫固其自取但上年在京勇健到齊時交臣管理操演技藝曽靣奏內有軟弱不堪之人請遣大臣挑選去留當蒙皇上令臣與柏之蕃細加考驗臣等遵旨逐一考驗分别等第將軟弱老病者共挑出三百三十六名發回各本處內惟湖北湖南廣西三省多皆軟弱不堪毫不知技藝之人臣等以本案原奉有通行明旨倘以不應選送之人草率塞責將來考驗之日將該督撫從重議處欽此臣等不敢徇隱回奏時將此三省列為末等聲明指參經大臣廷議止於請旨飭行伏思除廣西邊省人材本質平常且離總督駐劄遙逺情尚可原若楚人素稱剽健湖北又係督撫同挑即湖南起送亦必經由武昌為大臣者豈不寓目而如此藐視玩忽且兩省二百二十人中竟有不堪至九十六名之多較之今番在陜挑回非因軟弱塞責而貽纍子孫者其過孰重孰輕乃置從重議處之明旨於不問而但以飭行二字了結又不將支過餉銀等項議令賠還恐將來封疆大吏遇事漸行躲閃推諉實有關乎風氣人心不淺也臣愚以為在陜汰回不法兵丁所得過皇賞各項銀兩於各督撫罰賠之外仍應於本犯名下照數勒追賞給本省軍前出兵勇健家口其湖北湖南督撫及廣西巡撫將軟弱無用之人濫送塞責虛糜公帑亦應一例追出還項庶持法公平政令畫一以昭聖朝蕩平正直之治人心更加悅服矣臣明知此奏結怨更深於己大有不便然身受皇上天髙地厚之恩至深極重用敢冒昧密陳伏祈聖明鑒察謹奏所論固是然其中亦有差謬之處覽奏知道了雍正十一年六月十五日直隸總督臣李衛謹奏為敬陳地方控制事宜恭請聖訓指示遵行事竊惟設官分職自應因地制宜更須隨時籌畫從前直隸地方水利不修民間田廬時多淹浸蒙皇上念切痌瘝特命賢王遍歷畿甸相度經營改設河道分為四局各任督理工程責成既專宣防得法八年以後河流安軌農工聿興淤墊漸巳疏通規畫臻於美善今又特設河臣二員總成於上印河各官趨事於下近日之各河道較前逐漸不同事務稍簡則地方控制事宜似又當因時斟酌而就近兼理者矣查直隸全省州縣一百四十餘處守巡止有霸昌口北二道霸昌自歸並通永所屬共轄二十六州縣雖刑名分於四路同知而督緝之責與夫一應錢糧出入銷算盤查俱由該道管理鞭長不及每致率漏而口北道又止督催宣化一府錢糧刑名緝捕等事除張家口同知承審之案其餘俱非經管他如天津河間南北要衝河海交滙官疲役玩盜熾民刁保定正定永平地廣人繁旗民雜處邊關隘口是處險要知府之上均無道員稽督而更有最切要者順廣大三府為畿南重鎮界連晉豫山左舊有之大名道業巳裁汰臣自抵任以來稔知三府廣袤窵逺無大員統轄久欲奏請復設專道彈壓其間近又準巡察科臣帥念祖咨札會商衆議僉同請將大名等三府復設一道駐劄原署照舊管理職掌事務此外自正定直至天津皆係各河道所轄水利地方巳有規模此時情形與初辦事務繁簡不同可否將巡道責成就近歸與各員兼管不須另設兩無岐誤一轉移間於賢王經畫章程毫無更改而通省地方俱得整頓且使各河道呼應更靈於工程大有裨益臣不敢冒昧具題是以先行密陳請旨如蒙俞允再將分𣲖各府州一切事宜另行詳細題明遵奉辦理再查直隸府州縣佐二雖多大半皆係河員不管地方之事即如在保定府駐劄者除理事廳外止有總捕同知一員終年出差在署日少事務繁劇惟餘知府一人實難分身兼辦查從前原有糧馬通判一員改設移駐通州不與郡務請於保定府復設糧捕通判一員分任督緝差查等事庶免周章又天津一府係新設地方沿海沿河疆域遼濶勢難周到原設之糧捕通判近又經鹽臣鄂禮題請改為專管鹽務移駐支場雖將捕務歸並海防河務同知兼理難以遙制應請復設糧捕通判一員分駐滄州督理迤南各州縣捕務方無叢脞其餘河間等屬運道一帶地方應酌量分𣲖沿河丞倅就近兼管稽察臣現於改設巡檢案內另行分别具題不敢繁冗瑣瀆以上事宜均關地方要務是否可行伏祈聖明訓示欽遵謹奏直隸地方實屬遼濶河道兼巡並添設道廳之議俱是具疏題請可也雍正十一年六月二十九日直隸總督臣李衛謹奏為奏明事竊臣於本月二十日接準兵部咨文內開命臣前往會同提督查閲沿邊新添兵丁分别裁存等因臣即於本日飛咨提臣路振揚並作札相訂各起程日期在張家口會齊挑選起由獨石龍門等處至古北口看竣定議回京具奏復命臣出紫荆關直赴張家口又可查看邊關一帶要隘形勢去後原擬二十七日即可動身臣一靣將地方要務並查審事件連日趲辦分别題咨完結乃於二十八日據提督會稿差辨到保問及伊於二十三日來時提督尚未接到臣咨則是為沿途雨水所阻竟致往回稽遲臣心不勝急躁除一靣差回飛催外不論何日覆到臣必定於初三日早行統俟辦理完日面請聖訓欽遵謹奏何須如此急促誠可謂躁矣雍正十一年八月十六日直隸總督臣李衛謹奏為奏聞地方實在情形事竊臣奉差事竣回京復命於本月初六初七二日靣承聖訓指示一切即令回任臣欽遵隨於初八日起程沿途目擊秋成俱好初十日巳抵保定接印受事檢查案卷據報被水偏災州縣雖共有六十餘處其中惟迤東之寶坻寧河通州玉田武清及附近運河之景州吳橋東光天津滄州南皮靜海鹽山慶雲並任縣南和寧津邯鄲魏縣等處較為稍重其餘間有被淹並低窪村莊處所無多以及水退尚輕之處雖均屬偏災而本户田禾傷損或房屋衝壞則窮民口食自屬艱難仰荷皇上如天之仁屢頒恩旨動支倉庫賑恤署督臣顧琮巳經奉行臣又欽遵奏準諭旨分咨營田觀察使臣顧琮陳儀巡農部臣舒喜派定迤東畿南沿河三路地方分頭前往開賑之處督率稽查務令小民均霑實惠毋遺毋濫一靣速催勘明分别情形另疏具題各去後所可慶者本年夏間甘雨及時直隸通省禾苗穀黍原皆倍常暢茂今未曽被水各州縣所報約略收成俱自十分九分最少亦有七八分不等而南府更勝即間被偏災各屬不但髙阜之處與低窪逈然不同凡平地水所不到者土經久晴晒透復得伏雨滋潤禾苗茂盛結穗豐實收成倍於往年是直隸雖有偏災動用倉儲不無繁費若以全省計之被水者不及十之二三髙阜之處收穫倍多是以米價甚平民情相安尚可毋厪睿懷臣仰體聖主愛民至意自當盡心竭力隨時調劑斷不敢稍有粉飾相應據實奏聞謹奏被災户口既不至於失所而通省秋成又復倍常欣慰之懷莫可言喻雍正十一年九月初三日直隸總督臣李衛謹奏為恭請聖鑒事竊惟吏治賢否有關民生臣欽遵諭訓刻思整頓先將所屬府州縣等官悉心甄别分晰參調其各道大員前經具題請兼巡道職掌更有關乎地方責成敢不逐一察得而家本素封性好安逸不肯實心勇往且才識粗疏案件每多率漏自臣到任以來惟詳過燒鍋數件塞責從未見有貪官汚吏棍匪等項由該道發覺一事何以表率屬吏整飭地方此二員者因現無營私骫法劣迹故未即列彈章然於繁劇監司均難稱職應否改調簡僻之任抑或因其謹守秋一遇山水驟發勢大而猛州縣各顧本處未能齊心保護雖有漳河同知一員常至顧此失彼而清河道相去遙逺鞭長莫及是以臣前請以順廣大三郡河工分歸於復設之大名道就近辦理但恐新任之員未即熟諳查現任清河道宋韋金雖非肆應長才然其人誠謹小心於漳河形勢已歷數年而大名等三府民情與伊原籍河南無異可否以之調補復設之大名道將全漳河務責成專為辦理於地方河工似覺相宜如蒙俞允其漳河分巡道一缺恭候簡補抑或在知府中選擇請旨欽定臣未敢擅便謹具摺陳明伏候聖鑒謹奏覽奏俱悉雍正十一年九月十三日直隸總督臣李衛謹奏為恭報秋禾實在收成分數事竊查直屬地方今年春雨略稀荷蒙皇上念切民依虔誠祈禱入夏以來甘霖疊沛逺近霑足秋禾暢茂兹據布政使王謨轉據各道府州將實在收成分數查明具報前來除近河州縣數處低窪村莊間有被水其餘髙阜平地處所全省早晚禾稼巳獲豐收俱自十分九分以及七八分不等臣謹另單分晰奏聞外再查近河州縣內凡水所不到之處其收成亦各有九分七八分至經水一過浸泡未久者尚有三四五六分不等所有現在被淹村莊經前署督臣顧琮及臣欽遵諭旨逐處委員核實賑恤務令窮黎得沾實惠並將被水地畝勘明具題合並聲明伏祈皇上睿鑒謹奏覽收成分數深為額慶其被水窮黎務令均沾實惠毋致失所雍正十一年九月二十日直隸總督臣李衛謹奏為奏聞拏獲飛賊事竊照畿南一帶素為巨窩積匪潛藏之藪臣留心巳久設法訪緝先於冀深二州束鹿衡水兩縣接壤處所拏獲窩家積賊首犯謝大歪等七名並餘黨多人現在分别治罪又臣於先後兩次回任時俱訪聞有山陜一班飛賊響盜潛入境內為害地方臣隨即密飭各屬令其預加防範查拏去後於本月十六日據獻縣知縣明晟稟稱遵即遍加屣緝近有從前充發大盜李自洪從陜西逃回帶有劇賊多人窩在饒陽縣大邵村武生牛四即牛雲叢家武藝髙強人不敢近外縣差役難以捕獲臣即密差新營署守僃千總韓景琦挑選技勇之千把外委傅魁李蒼明等共十人兩路帶領前去設法擒拏於十九日子時到彼訪知盜等正在窺伺欲劫貢生冉昌後家去辨當即掩捕盜等拒敵格鬬多時幸辨目竭力用命擊落賊械傅魁首先力擒巨盜李自洪即李三吳秃子二名其餘分手拏住未得走脫一人今據差員牛朝棟回報將各犯撥兵嚴押解省根究夥黨逐一密拏務淨根株以除民害相應附摺奏聞謹奏剗除積窩密拏劇賊以除地方之害朕實深為嘉與直隸盜風從此可望漸熄矣又密奏鄂爾奇一摺尤屬可嘉茍非深悉朕衷毫不瞻顧安肯毅然直陳但若從內發擲事屬無因殊與政體有關且衆口囂囂亦必猜度及卿反不如公然指參名正言順亦見當代有如是剛方大臣也原摺暫為留中俟卿彈章到日簡命果親王等公正王大臣數人察審真偽何能遁逃從前王士俊參其妄提人犯等事朕巳嚴加呵責大低伊秉性迂執而又悻愎自用較之乃兄鄂爾泰不啻霄壤之分向日屢曽戒飭甚至加以夏楚尚未料乖謬至於此極也覽奏奬許之懷筆莫能罄雍正十一年九月二十二日直隸總督臣李衛謹奏為遵旨覆奏事竊臣接準吏部咨文欽奉諭旨天津河道霸昌道清河道三缺著詢問李衛若屬員內有可以題補之人即行題補如不得人據實回奏欽此欽遵查直隸各道蒙恩俞允俱兼理巡道職掌望其整頓非比從前專司河務一事如清河道所轄保定正定二府五州道路遼濶責任綦重直屬知府中才具出衆者頗少查有保定府知府彭人瑛居官正氣持重老成在保定府屬歷任巳久民情風土頗為諳悉於清河一缺人地相宜似可勝任其霸昌道員缺所屬州縣皆係官民旗漢雜處非明敏風力不畏嫌怨之員難膺斯任現在直屬員中更少惟見永平府知府吳士端年富力強人尚明白稍有才情原係玉田縣知縣近京一帶民情熟諳於霸昌道亦可勉力供職但臣恐其人周旋世故若論強幹有為勇往直前則莫若浙江台州府知府張坦熊更為勝之至天津道員缺較清河霸昌所轄地方略少民情既更刁健河務紛繁必得諳曉水利之員方足兼任臣遍加思維一時實難其人不敢冒昧輕舉可否將彭人瑛吳士端二員送京引見恭候皇上察其人才髙下於張坦熊三人之內欽定酌用其天津河道或賜特簡或令南北河臣再舉所知以僃採用臣因先行請旨未敢具本伏候聖鑒欽遵為此謹奏天津道一缺朕謂張坦熊可以勝任即以之補授矣彭人瑛吳士端巳照所請諭部其所遺保定永平二缺命卿遞行題補亦俱有旨矣地方但以得人為要應升與否在所不拘部文到日斟酌妥確仍先摺奏以聞雍正十一年十月初七日直隸總督臣李衛謹奏為請旨事竊臣前遵旨覆奏揀選清河霸昌天津各道員缺一摺於本年九月二十五日奉有硃批今於九月二十九日又準到吏部咨文臣敢不悉心秉公詳慎揀選查有正定府同知宋壽圖人頗明白辦事向前易州知州呂守曽勤謹誠實勇於任事此二員者俱堪知府之選臣就其人地詳加斟酌宋壽圖才具巳經試驗若用於保定更可就近隨時教導使其歷練呂守曽年富力強正可於繁劇之地宣勞出力永平府雖係京東要區亦有軍需事務然較之宣化則永平事又略簡現在宣化知府馬益誠謹老練人略忠厚可以調補永平府將呂守曽請補宣化府使之經理軍需彼此人地更為相宜其易州員缺臣查有保定府清苑縣知縣徐德泰才具去得人亦勤敏堪以升補易州之任徐德泰所遺員缺頗難其人查有題署新城縣之試用官張德榮屢差辦公皆能盡心妥協人亦明白請以張德榮改署清苑縣試看如能稱職另請實授緣保永宣三府均係畿輔重地及料理軍需要缺臣不敢擅專為此遵旨先行繕摺具奏恭候御批到日方敢用本將各員送部引見欽定伏乞睿鑒訓示欽遵謹奏照此題請各員隨本送部引見路振揚何如人耶密奏以聞雍正十一年十一月初二日直隸總督臣李衛謹奏為恭報瑞雪普遍事竊照直隸各州縣本年秋末冬初凡髙阜之處以及次等窪地悉皆播種冬麥比舊甚廣滋長發生菁蔥遍野本月初一日據大興宛平等近京十餘州縣報到巳於二十七日皆得瑞雪今保定府一帶係二十九日自午時及夜以至次早瑞雪繽紛近省一二百里地方髙下各有四五六寸之深陸續呈報所及必廣現在天氣和靄麥苗得此瑞雪滋生之氣融結於根收斂充實精液飽足冬月凝凍土膏滋潤春來長養倍得發榮一切風雨遲早皆無足虞即最窪之地留種春麥者亦得沾濡普被實來歲豐登之兆可望大有此皆仰邀皇上福庇至德感孚是以恭逢萬壽之辰天降瑞雪之慶臣民共霑歡呼感戴為此繕摺奏聞伏祈睿鑒謹奏瑞雪固為可慶但何庸如此誇張雍正十一年十一月二十四日直隸總督臣李衛謹奏為續報各屬得雪普遍日期事竊照近省地方於十月二十九日降有瑞雪業經具摺奏聞今陸續據各州縣申報於十月二十七八九及十一月初一初二初七初八十五十六等日各得瑞雪四五六七寸不等而西山一帶往南之處雪深尺餘仲冬之半巳經數次降瑞各處均霑實為可慶理合繕摺續報上慰宸衷再據定州新樂縣知縣劉師健詳稱本年十一月十三日辰時仰見天朗氣清日抱雙珥左右環拱彩雲重護五色繽紛自辰至已經久光明闔城官吏士民衆目環視咸稱嘉應欽差侍郎陳樹萱經過所見相同等因到臣欽惟皇上德周天壤靈應畢呈兹當長至節前得覩日抱雙珥是誠盛德感召之嘉徵臣仰體聖意謙沖不言祥瑞未敢具疏慶賀而地方有此庥徵相應一並附摺奏聞謹奏日抱雙珥朕殊不以為庥徵天恩錫祐冬雪應時是乃真祥瑞也宜嵗宜民可慶可賀同日又奏為奏明河凍阻運設法辦理賑務事竊照直屬蒙恩賑濟偏災一案臣於九月十三日會同查賑部臣舒喜議將通倉七八成色陳米撥運發賑具摺奏請當經奉旨該部會同倉場議奏欽此續經户部定議題覆荷蒙聖恩俞允臣於十月二十一日接閲邸鈔先即飛行飭令各州縣預僃妥當船腳赴通等候部文一到即行開運及至二十七日接有知照部文復飛催星速趲運奈時巳仲冬米至十萬又非數日之間可以盤量裝載不意適遇連日嚴寒十一月初八九日北運河水淺易於冰凍有巳裝未開有巳開未到雖打冰前進旋即復合且更有未經領出者難以轉運查濵河應領通倉賑米者共十一州縣除離通水路逺而陸路較近之寶坻玉田薊州寧河香河等處水旱腳價不甚相懸尚可用車輛裝運河間東光二縣需米無多另撥就近倉米應賑外惟天津所屬之靜海滄州鹽山慶雲等處共應領米三萬四千餘石議由河路運回分别重輕於年前先給三箇月或兩月餘俟來年青黃不接再看情形請旨今因河凍難運若盡行起旱則陸路腳價所費不資且恐時日稽遲事關窮民待哺臣心不勝惶急隨與布政司商議巳委深州知州俞士恆星夜前往天津會同知府李梅賓將天津北倉零存陳米並預令津軍同知買僃米石查明盡數撥用不敷者在於天津沿河等處設法竭力分頭採買務足年前先賑兩月或一箇半月之數就近分發各處接濟續賑令其到南運河再看水深冰若不厚則𫾣凌水運或用托床拉送否則陸路較通倉頗近猶可節省腳費其買米之銀查有從前減糶截漕米價一萬餘兩原為買補僃賑之用以之撥動免於多費帑項其餘米石年前可以略緩者俟來春查明應領若干照數續行撥運今據差員回稟巳照依設法趕辦幸而天津等處商賈雲集米價不至過昂就近購買可得尚不至於貽誤賑務所有河冰凍阻不得不為變通辦理緣由據實奏明仰祈睿鑒謹奏權宜辦理是當之至待哺窮黎得以度此隆冬朕心深慰仍咨明户部倉場可也同日又奏為請旨遵行事竊照直隸大名知府章培基經臣題參勒令休致其員缺前蒙皇上俞準部議令臣於直屬現任同知內揀選正陪送部引見恭候欽定臣查直隸現任同知知州內原有正定府同知宋壽圖易州知州呂守曽等數員猶堪表率之任因有保定宣化等府緊要缺出經臣將宋壽圖等題送引見荷蒙聖恩俱準補用此外雖有保定府清河同知楊灝才具去得但於大名逺府人地尚未相當查河間府知府李琠前因原任失察屬員詿誤蒙恩帶所降之級從寬留任該員老成謹慎人亦朴實然理繁治劇仍少肆應之才河間為南北衝途所轄州縣多有衝繁疲難之缺兼係河工要地李琠竭蹶辦理終覺勉強大名府雖係畿南要區尚非刁員缺實係緊要清河同知楊灝頗有才情且駐劄旨可否將楊灝送部帶領引見恭候聖明察其人才如或去得暫令署理看其果能稱職再行旨令臣將伊居官如何之處出具考語送部引見奉有諭旨交臣以同知以下等官委署試用臣伏讀之下似向前再請實授之處臣未敢擅便相應附摺陳明請旨伏候訓示欽遵辦理謹奏覽雍正十一年十二月初四日直隸總督臣李衛謹奏為請旨事竊臣前因直屬地方遼濶事務殷繁佐雜差委之員又於敬籌衝要等事案內添改巡檢等官更需遴選委用業於本年十月十一日繕疏題請懇恩敇部將候選候補等官揀發佐二十員雜職二十員在案但思在部候選佐雜非由考職即屬捐納多係初任候補者少必俟到來分派地方始能漸次熟練臣查京師五城設立各鋪巡檢一項原經吏部都察院衙門挑選請旨補用者即蘆溝橋諸處亦有此等巡檢分管今巳三年任滿將舊官掣回現在吏部分别等第敘用候補其中俱係佐二微員厯練有年可否於此中擇其各城開列一二等者歸入臣所請人員數內並給其餘再於候補候選之中揀發則較之初任試用者實於地方事務更有裨益臣愚昧之見未知當否仰祈聖明睿鑒施行為此繕摺奏請謹奏俟該部揀選各員帶領引見時酌奪佐雜頗不乏人何必指定此一項耶硃批諭旨卷一百七十四之十五欽定四庫全書硃批諭旨卷一百七十四之十六硃批李衛奏摺雍正十二年正月初二日直隸總督臣李衛謹奏為奏報歲朝瑞雪事恭惟元旦佳辰乃萬彚之始而雪為五穀之精今保定地方於雍正十二年正月初一日丑刻起瑞雪繽紛至初二日子時晴霽約有五寸餘深天氣和暖浸地融化之外尚積三寸新年開泰之初得此瑞雪愈加滋潤士民歡慶倍常考之占候書云元日雪百穀豐誠為嘉兆今逢歲朝瑞雪普降大地均霑皆由聖德日新敬天勤民感格之所致也臣益當凛遵訓諭倍加寅惕以期仰答天庥上慰宸衷理合恭摺奏聞謹奏歲朝得雪且廣逺深透實屬稀逢畿輔郡縣之地皆卿所轄慶喜之懷諒必同然也雍正十二年正月二十六日直隸總督臣李衛謹奏為陳明運河應行事宜以便次第辦理事竊臣於封印期內前赴德州會勘河道事竣回署緣由業經具疏題報應俟山東撫臣嶽濬等主稿另行會奏請旨遵行外第查運河上遊直屬之故城等縣與東省之德州衛並武城縣地界毗聯係河流東注轉灣之處向未築有隄埝防禦惟憑崖岸髙深可以遮護內地設遇水發一時宣泄不及由灣底低薄之處出漕漫溢直趨景州吳橋縣等處此兩省運河交界各地方亦宜乘時一並料理整僃臣因會勘之便靣與河臣朱藻撫臣嶽濬等商酌彼此委員無分疆界通身會同查勘將崖岸低矮殘缺者培築髙厚如有一律單薄地方勸諭民間儹築土埝量給食米以工代賑頗屬一舉兩便至直隸山東運河交接各州縣甚多犬牙相錯或以河底轉灣斜角為界彼此錯綜混淆遇有命盜及沿河浮尸等案互相推諉經歲不結亦應乘便將從前經界參差之處勘定立牌並將零星交錯之所撥換劃清各專責成方無岐誤又直境運河地勢蜿蜒輾轉環曲原因當年漳河之水不藉運道出海以為停蓄濟運防其驟泄淺塞之故但自導引全漳之水歸運出海之後源頭勢猛多有漫溢之患一遇河身曲折東衝西蕩難免潰決民田似又當因時度勢擇河流激湍對頭大灣過甚難轉之處開通阻礙既與兩岸田廬險工有益而水行地中亦於漕運無誤矣以上三條均關運道民生臣雖與諸臣乘便議及但未經奏明不敢冒昧輕舉緣時屆春融又未便久遲貽誤東作伏汛為此繕摺請旨恭候聖訓遵行謹奏所陳三條內惟開通大灣一説似不合宜不但徒費工力無益且恐河身改直之後勢猛流急更易潰決也餘照議施行雍正十二年二月二十日直隸總督臣李衛謹奏為恭報春雨及時早霈事竊照歲內三冬令節俱得瑞雪普遍二麥均霑滋潤目下時屆春和土膏既動東作將興春霖殊不易得今本月望日以前巳經連獲微雨復於十九日自午至亥甘雨綿密髙下均霑所及必逺臣隨遣人四鄉查看田疇直透濕土麥苗菁蔥滋長正可播種秋禾農民鼓舞老幼歡呼無不感戴皇仁二十日早不風而晴日色和暖節氣調勻實為今歲嘉祥之兆誠所謂堯天舜日見於此時臣等躬逢盛世曷勝慶幸俟各屬報到得雨情形再為彚奏外所有現在沾足緣由理合具摺奏聞仰祈睿鑒謹奏雨澤接續而來春麥秋禾兼資長養畿輔農民有賴矣我君臣真堪共慶同日又奏為奏聞事竊照直屬畿輔重地山海交錯弭盜最為先務而賊蹤之出沒詭祕實非常法所能勾緝臣自上年八月間旋署選差辨兵捕役擒獲拒捕響盜李自洪等十數名具摺奏聞之後究出夥窩強竊盜賊各姓名住址外省本地百有餘人或聞風潛匿或遁回原籍或結夥遊走為匪隨陸續分頭設法屣緝並密咨鄰省協捕巳得十之六七其餘未獲者仍然分路差緝從此根究窮追地方盜風或可望其衰息惟京東一帶強竊盜窩賊匪數案訪察至今尚未得悉其頭緒蹤迹容臣漸次設法探實來歷加意查拏斷不肯聽若輩漏網肆害地方有負職守謹將現經獲盜辦理後虎豹出入傷害人畜而紫荆龍泉關等處更甚所在兵民莫敢攖鋒即偶有獵户亦不能深入搜捕臣上年巡歷邊境訪問百姓頗以為苦因思虎患有關民命當即揀選辨目鎗手前往山內巡捕既可稽查地方匪類亦得練習兵丁步力膽氣順便協同教授各營自冬及春辨兵均知勇往陸續共打獲猛虎十一隻金錢豹二隻分别奬賞人人此一並附摺奏聞謹奏捕虎之法莫善於犂刀藥弩等類舊有成式但須曉諭過往人民毋致誤陷機穽為要耳雍正十二年四月二十日直隸總督臣李衛謹奏為恭報二麥情形伏祈睿鑒事竊照直隸各屬地方仰賴聖主福庇於上年冬間今歲春月連得瑞雪時雨前後霑足現在二麥發秀暢茂秋禾播種生長惟是正定以北數日以來地方土性稍乾幸無甚風沙雖於收麥不礙然察訪農民秋苗望雨甚殷若在本月之內得霈甘霖則二麥更可結實現在擇吉設壇虔禱但臣從前在京曽經靣奉諭旨如遇地方雨㿩隂晴必該隨時上聞今覺微旱理合早為恭摺陳明伏祈聖明睿鑒謹奏為此正爾殷憂若以去冬今春雨雪調順之兆揆之似不應有目下景象或朕與卿其間有過舉歟何遽然示斯轉變也當各返躬竭誠痛加修省以待上天之鑒照耳同日又奏為遵旨查議事本年三月初一日準理藩院咨開據喀爾沁札薩克多羅杜楞郡王和碩額駙伊達木札布等呈稱準大部來文據直隸總督李衛咨稱八溝新放同知應於買賣街市之東北蓋造衙門由院行知本應遵行但濟伯格街西地方髙埠平坦街東窄狹又值山水下流總督李衛原巳悉知強勒我等蒙古欲占地方况西邊明有可以蓋造派官查看便知我等內地札薩克惟賴地畝養生如再於街東莊稼地方修蓋衙門度日必致艱難伏祈大部奏請停止等因摺奏奉旨王伊達木札布所奏是李衛欲占蒙古地方建立同知衙署不是了爾部咨查李衛再行議奏欽此欽遵臣跪讀諭旨不勝感激悚惶伏查八溝設立同知建造衙署一案先經都統拉錫以熱河八溝至喀爾竒河居住民五十餘萬耕種喀爾沁地畝之民亦有數萬聚集衆多雖有理藩院章京人員不能管轄奏請州縣分管緣由荷蒙特交議政王大臣會同喀爾沁王札薩克等詳議具奏隨議定八溝附近三處喀爾沁地方設立同知查管民人緝拏盜匪等事其衙署關係重大應派大臣前往查辦等因覆奏奉旨欽遵在案此八溝設立同知衙署原係喀爾沁王會同議定之案旋奉欽差內閣學士塞爾赫勘明八溝地方街西屬於通判街東屬於喀爾沁有犯法者越境即不能擒治同知原為管理蒙古地方民人應建衙署於街東以資彈壓因係喀爾沁王所屬之地應咨理藩院知照並移臣會核具題經部議覆準其建於街東之北應令理藩院行知喀爾沁王亦在案是八溝之新設同知衙署既經喀爾沁王會議於先後擇地建造復經內閣學士塞爾赫查勘明確工部議定知照歷歷檔案可據並非臣自立意見強勒蒙古况喀爾沁租種之地盈千纍萬衙署所需不過十數畝亦何致占其莊稼地方必至度日艱難細查其故緣街東原有買賣雜稅誠恐同知在彼駐劄之後將來設或爭管其稅因而聽信人言慫恿所致殊不思聖恩髙厚愛養蒙古既周且渥即承辦此事者自當仰體皇仁亦斷不屑奪取微利有失政體除八溝街西之稅仍照舊例令通判徵解外所有街東之稅應聽喀爾沁王自為派人抽收至同知衙署街西非無可以蓋造之地但巳有通判分駐管理旗下莊頭民人街東係蒙古地方所設同知原為佃種蒙古地畝民人衆多起見且聚集日漸繁衍皆係北五省不守本分之人流移在彼姦盜詐偽無所不至必得所設同知駐劄彈壓化導冀改積習若以管理街東蒙古地方之官改駐於街西旗下莊頭不轄之地間隔錯雜辦理未便將來諸事恐有掣肘難以管轄不得不據實陳明其同知衙署可否仍照內閣學士塞爾赫勘定街東之北建造抑或改於街西興造之處臣未敢擅專恭請聖訓指示欽遵除照依咨明理藩院聽候議覆外所有前後案據來厯辦理始末情由理合繕摺奏明伏乞皇上睿鑒謹奏所奏甚詳朕巳僃悉喀爾沁王伊達木查布現在病中未免念慮恍惚但憫伊久困牀蓐姑宜曲從所請以慰其心俟該院議覆時斟酌有旨同日又奏為據實奏聞事竊查直隸旗民雜處約束稽查有司難於周到荷蒙特設旗莊官分路辦理若能實心任事甚為有益定例任滿一年更換時分别保題參奏臣既有考核之責自應平時留心察訪而京南西路旗莊官清海係原任兵部堂主事齊之子伊父生前與臣同一衙門辦事久知清海少年放蕩招搖生事是以上年到任管理旗莊之初臣即靣加嚴切開導勉勵看其舉動尚似知悔前非光景漸則故智復萌恣意放縱聲名狼藉聞本年二月內清海屣知滿城縣留馬村旗人范允善掘穽私燒差役查拏起獲鍋甑范允善情極央懇差役回以非到黃村髙玉立家不能完結隨赴彼懇求許銀二百兩交收免究不報又民人張雲鳳因伊子二存兒過繼旗下髙升為嗣欲報入旗册具控前任旗莊官發縣審斷歸宗結案清海探知髙升家道殷實借端駁查嚇詐銀數百兩亦係髙玉立並劉九甫與撥什庫屈伸過付此件臣雖未見首出發覺聞巳約會赴京具控又清海與完縣居住旗宦原任副將趙士儀聯宗立票借銀一百兩不允遂給與執照勒充旗下鄉長士儀聲言赴省告發方將執照當靣扯碎遍處索詐毫無顧忌第思清海蒙恩擢用不知感激報效輒敢遇事婪贓實為下愚不移本應即為露章入告臣因事關受賄必得究明證見便其無可狡賴是以密令各地方官就近再加核實俟覆到彚疏一並參究再有京西路旗莊官飛揚古衙門書役張宏瑞等通同地棍包攬私燒索詐淶水縣民人楊七廣等四家共得銀三十二兩雖據飛揚古自知難掩人口具文首報而張宏瑞等堅供係飛揚古查追此銀必令交齊送署因彼處私燒尚多交銀無幾所以押發呈報其果否通同徇縱網利分肥之處巳據呈批發臬司審明再為酌定又聞得京北東路旗莊官拉漢泰聲名穢鄙亦屬不好但尚未得其的實容逐一細察分别參處外理合先行據實密奏再目下直屬奉有部行清查各項入官地畝其中多年錮弊頭緒紛繁實非旦夕可以徹底完結者現在酌議委員會同各路旗莊官秉公清釐必得賢員實心查辦方為有益而現在旗莊各官更為要緊此清海等三員即間有輕重之分亦均不能信托斯任以期辦理妥協者也合並附摺陳明伏候聖鑒謹奏此奏嘉是覽之查明實據嚴行究參以懲無恥玷職之輩巳有旨命該旗另揀賢員更替清海等三人矣雍正十二年四月二十八日直隸總督臣李衛謹奏為恭謝天恩事竊臣於四月二十二日齎摺辨員捧回皇上特賜到臣蘇合寶香一盒御園櫻桃一簍隨即出郊跪迎至署恭設香案望闕叩頭謝恩祇受伏睹竒香殊質巳叨溢格之榮而櫻桃鮮品賜食外臣更為難逢臣何人斯而獨膺此曠典且跪讀硃批開誠訓示感深肺腑不禁涕零臣撫心自問愚魯粗疏無一事不上邀睿照無一時不仰荷優容而一物之美一味之甘復蒙垂念下頒戴髙履厚之恩實有口莫能宣而言莫能罄者惟有永矢丹誠始終奮勉稍盡職分於萬一而巳理合恭摺奏謝伏乞聖鑒謹奏覽奏謝矣近日每有人在朕前進萋菲之言大抵皆謂卿任性使氣動輒矢口肆詈云云謹言之戒朕屢經諄訓不啻再三丈夫立身行己於此等小節不能操持尚何進德修業之可期向後當竭力悛改時自檢點勤加從容涵養之功漸融粗猛傲慢之習則謗毁不弭自消矣惟口出好興戎可不慎諸同日又奏為請酌定戰船更換篷索事竊查天津水師營船需用篷索從前議定一年一換原為北方風土髙燥易於損壞立法未嘗不善臣思直隸雖與東南地方不同繩索用過一年磨擦朽爛自不能免若風篷一項係竹篾編成尚屬堅緻綿密商民船上零星修補有用至三四年不弊者全在看守戰船之人加意愛惜照管苫蓋隨時曬晾即稍有破損均可修整應用况物料匠工産自南方每年差員逺涉購辦往返頻煩且通計風篷三十二副更換一次正價津貼連賠墊腳費盤攪等項約用銀二千餘兩今請嗣後天津戰船除繩索仍照舊例按年添換配用外所需風篷定為隔年一換其停換之歲應用小修物料即令隔年更換赴南採買風篷便員酌量帶回收存將用過銀兩統入次年更換工料內一併分晰造册報銷如此間年一換一修戰船之駕駛既得無誤而錢糧亦免致糜費是否可行伏乞聖明訓示以便具本題明為此繕摺請旨謹奏所請甚是具疏題來可謂無微不用心力朕實嘉卿之勤而憐卿之勞也聞保安衡莊頭霸占民地該州瞻徇情靣聽斷不公致令小民負屈等語留心嚴加察處且聞州牧居官亦甚屬平庸果若然當即行參劾以警不職雍正十二年五月初七日直隸總督臣李衛謹奏為聖澤至深極重微臣承荷難勝恭摺奏謝天恩事本年五月初二日臣標把總自京齎捧皇上批回原奏摺匣欽賜臣香囊寶丹到署隨恭設香案望闕叩頭祇領恩賞跪讀聖訓感激悚惶一時汗流浹背不知此身此世何以得蒙聖明鑒照矜全至於如此之周也伏念臣本質愚戅心直口快即屬官中從無一語輕於肆詈何况他人惟嫉惡過嚴凡遇公事即覿靣相對不肯依違曲從或遇有心鈎探藉以進身之人但能隱而勿答若問之不巳則於是非二字從未慣粉飾虛詞言不由中再加添出枝節駕辭聳動結恨益深此實臣一生招尤取禍之大病久蒙皇上洞鑒屢賜教誨臣朝夕服膺不敢暫忘今忌臣者同心附和即以此漸入其罪且彼此聲援多設巧法排擠冀以傾陷若非仰邀聖主日月照臨之明天地覆載之恩開誠指示諄切警戒臣被獲重愆而不知所由來惟有循誦御批一字一淚務期竭力改革以仰副聖訓於萬分之一耳再臣忝在地方戰船風篷分宜慎重復蒙天語矜憐臣心更切惶愧現在酌核另題所有微臣欽領恩賞多珍合家頂感並凛遵聖訓緣由理合恭摺奏謝伏祈慈鑒謹奏覽奏謝知道了前摺所諭卿矢口詈人之處據云從無其事或出於有心鈎探駕辭傳布若然第一須防鼓弄唇吻之輩譬如有人來告某某退有惡言於此即當逆察其情是來也果出於真誠耶抑或激我之怒竊記我語復以播揚於人耶審思而明辨之庶免墮其術中倘一被所愚窺伺者接踵而至朱紫混淆涇渭莫分矣古人有言止謗莫若自修必也毁譽不動於中喜怒不形於色能具此等襟懷方得受用否則滿腔冰炭苦曷可言哉同日又奏為覆奏事竊臣於五月初二日蒙皇上發回奏事摺內欽奉硃批諭旨聞保安衡莊頭霸占民地該州瞻徇情靣聽斷不公致令小民負屈等語留心嚴加察處且聞州牧居官亦甚屬平庸果若然當即行參劾以警不職欽此仰見聖明推誠委任敢不秉公詳察辦理隨檢查案卷有莊頭衡任與惠普爭控民地一案乃上年九月户部提去審供不一復發出行臣衙門轉查者但其事人地俱在西寧萬全非屬保安又係蔚州知州李培仁西寧知縣常三書會審近經臣批駁未曾結案現任保安州知州羅梓從未經承審似與此案無涉惟再查上年六月內又有户部準內務府莊頭金復憲控告民人徐惠等霸占官地移咨到臣轉行飭審一件則係保安州之事細查金復憲係巳正法莊頭金復暉之弟即衡有爵之孫故稱為衡莊頭雍正三年金復暉在日與徐惠等赴户部訐訟行提兩造進京訊審將淤地全行斷歸金復暉至雍正五年徐惠等復於巡察御史苗壽陶正中處控告批州提審而金復暉始稱所管淤灘內原有餘地情願退還具呈前任保安州趙荃詳覆巡察御史批準給還徐惠等管業今伊弟金復憲又不守本分赴户部復控行查現任知州羅梓於本年四月內前往查丈東西兩頭俱巳勘定無有爭執惟當日原退四至內稱南從清水渠向北八十步等語因此渠係弓背樣式在官則以靠河邊往北俱應丈還八十步在民欲東西居中取直再向北八十步則所剩月牙之地又可多得是以未肯出具遵依該州尚未具詳定界但臣查此案羅梓於本年三月間詳覆藩司文內即稱從前莊頭占有民地不問可知並非徐惠等霸占官地巳屬顯然等語則亦將此地斷歸民人其無瞻徇明矣至該州羅梓雖無長才聲名中等人尚老成操守謹飭近緣霸州員缺營田水利緊要一時不得相宜之人據布按二司保詳於四月二十二日將羅梓題請調補現在恭候欽定若經引見是否劣員聖明自必洞照無遺伏讀諭旨果若然即行參劾以警不職是聖明原令查實而行何敢因巳曾題調霸州稍有回護瞻徇合將其中情節據實先行覆奏伏祈睿鑒謹奏前摺批諭甚明此事原係偶爾風聞非有深知灼見也第秉公為之雍正十二年五月十五日直隸總督臣李衛謹奏為恭報得雨日期收麥情形事竊照直屬入夏以來自正定府之北稍覺亢旱民間望雨五月初旬各處雖報有得過一二寸者因未獲霑足不敢頻九分今春晚種者收成略次而正定以南厯來多係冬麥且曾偏得春雨所收更稔至於秋禾今尚未覺大旱然亦待雨正殷臣等遵旨竭誠修省屢次虔禱自五月十四日丑時聞有雷響漸霈甘雨臣隨起視時住時降共有十餘陳直至辰末方止踏勘郊外四野雖僅有三寸入土而禾苗蔬菜百物悉得滋潤起麥之後更可播種豆黍今經雷雨之後地氣巳舒風沙頓息現在濃雲復布看來尚有接續之象若得再霈甘霖更為有益其各屬路逺之處容俟報到再為彚奏外臣仰體天心念切民瘼時厪聖懷合先具摺恭報伏乞睿鑒謹奏目今雨暘情形覽奏巳悉賜來悅心集一部係向所選集近始刻成者公務餘暇時一展對頗可悅目清心朕及卿輩翻閲此書大似山僧野客觀覽朝報而談時政殊為越分妄想每一思之不禁失笑同日又奏為請旨事竊照宣化府東路同知谷確奉旨升授口北道所遺員缺著臣揀選題補遵與藩臬二司悉心詳慎選擇惟是宣化地處邊陲同知分駐新保安緝捕彈壓責任亦重且常有差委口外事件必得強幹有為善於乘騎之人方克勝任現在直隸補行大計案內雖有卓異知縣四員候旨欽遵但各官原籍俱係南方騎馬不甚便捷兹見各省卓異官內有仁和縣知縣董怡曾巳經引見奉旨允準回任候升本省既未指名請留僃用將來升轉别處總須離浙查該員係河南舉人性情直爽任事誠實且嫺於乘騎與宣化府東路同知之缺甚屬相宜可否賞補抑或準臣指名題請未敢擅專合先具摺請旨伏候訓示遵行謹奏覽奏巳悉候另旨諭部同日又奏為據實奏聞事竊查熱河等處地居口外疆界遼濶旗漢蒙古雜處添設知州等官正欲其稽查匪類安緝兵民始於地方有益乃新設承德州知州裘君􅌢自升補以來器小易盈諸事放縱初因其尚有微才屢加申飭冀得改悔不意日漸恣肆任意妄行倍勒火耗婪贓縱盜不一而足又與熱河總管巴什結聯甚密因巴什係熱河大員該州冀其隱蔽惡端并望可以徼幸保薦遂曲意逢迎諸事稟明方行卑汚屈節中途相遇竟在當街以一足屈膝請安全無五品民牧之體而巴什則以知州有管理地方權柄怒者可以囑其撲責泄忿喜者可以向其説情得錢擅作威福亦遂引為心腹至巴什雖與臣不相統攝但於便中訪其行為於上年八月內曾委千總陳宏亮等六員前往各莊查點户口凡舊莊頭七十七名每名勒費銀十二兩新莊頭五十三名每名勒費銀二十四兩共得銀二千餘兩聲名甚為狼藉除將知州裘君􅌢劣迹詳細列款具本題參外其與巴什結聯朋比情由未便入疏但既有所聞亦不敢避怨隱諱相應據實附摺奏聞伏祈聖明再加訪察乾斷施行謹奏裘君􅌢婪贓縱盜理應嚴行參黜至於巴什原係糊塗寡識之人與地方官聯結擅作威福容或有之若謂營私納賄尚恐未然或因其於熱河一切處過為嚴刻小人懷怨從而誣揑之辭亦未可定當再加詳細體訪具奏以聞雍正十二年五月二十四日直隸總督臣李衛謹奏為奏聞事竊照本月十四日得雨情形業經臣於十五日早具摺恭奏彼時即見濃雲四布本日以及十六復接連雷雨數次隨據順天保定河間天津及深定易等各府州所屬陸續報到於此三日之內得雨者巳有六十餘州縣查入地皆深三四五六寸不等看來各處髙下多有霑透濕土可以播種豆黍目今糧食價值俱減麵亦甚賤若於十數日內再得甘霖接濟則遍植晚禾更為有益惟順德府屬之平鄉任縣趙州屬之隆平縣冀州屬之衡水縣報有零星蝗蝻生發皆稱每處止有二三村莊撲滅將盡臣恐尚有不實不淨并鄰近曾否蔓延當即飛行各該文武嚴飭會同上緊撲捕委員督率查勘毋使稍留餘孽去後續據大名道府稟稱元城縣與山東冠縣館陶接界之處亦報有蝻子隨即委令通判等官星往會勘乃係草內所出土螞蠟尚非蝗蝻一種現在撲滅臣復令藩司委員分頭再加確勘倘各處稍有懈弛揑飾推諉等弊即當據實分别參究斷不敢代為隱諱貽誤地方也事關民瘼合先具摺奏聞謹奏續經得雨霑透糧價俱減深慰朕懷蝗蝻一事料卿自必督率屬員竭力撲滅不需朕之訓飭也同日又奏為恭謝天恩疊沛事本年五月十七日臣標把總自京齎捧硃批奏匣欽賜臣悅心集全部到保隨郊迎至署望闕叩頭謝恩祇領竊臣荷蒙殊恩特賜祕笈跪讀硃批敬繹聖序仰見皇上龍潛藩邸隨境而安淡泊寧靜久留睿思平時紀録猶勤御覽於邇言淺近之中闡逺大髙深之藴靜則本體虛靈含太和之元氣動而因物感應皆天理之流行不思而得無為而成聖學淵源包羅萬有伏讀集中如黃洽之矢不欺林逋之戒沽名邵雍之勉為善司馬光之勸知足皆古來名臣大儒以忠君愛國之心抒樂天知命之致其他單詞片語無非袪妄止貪不同晉人清談惟誇曠懷逸志實為覺世名言修身至寶皇上以之涵養聖心即以之教訓臣下使氣質化於和平性情歸於恬淡如臣粗浮更同釙砭豈惟悅目清心參詳醒悟實在鏤肝刻骨體驗祇循以期稍得萬分之一耳理合具摺恭謝天恩臣臨奏曷勝感戴瞻依之至謹奏覽奏謝之辭極有解悟若能如是領會將來與體究本分處甚屬捷近雍正十二年六月初三日直隸總督臣李衛謹奏為奏聞近日雨澤情形事竊臣於六月初二日據各屬俱將五月二十九日得雨情形接連具報內良鄉縣密邇都城巳報霑足則在京定得甘霖可知其附近保定各處大小不等如容城廣昌俱有五六寸易州新安則皆四五寸其涿州房山定興安肅衡水保定縣霸州雄縣亦各二三寸此外尚有未經報到者臣委員各處不時查看俟續有時雨普遍另報外至前奏平鄉等五州縣偶生蝻子臣委員星飭撲捕巳據平鄉任縣隆平冀州衡水俱報撲淨至衡水等縣交界之深州寧晉續報草地間生蝻種該處文武業經竭力會捕具有消除印結呈送聖懷謹奏覽同日又奏為恭報二麥實在收成分數事竊照直隸二麥收成分數經臣確查去後兹據各道府州陸續呈報前來臣查直屬地方凡去年早種之秋麥今歲收穫實有八九十分惟遲種之春麥分數略減但種麥盛於往年又皆秋麥為多故牽算分數比舊為豐順天府屬實有八分七分并京東五六分不等保定府屬實有十分九分并六七八分及五分不等永平府屬實有九分并七分不等河間府屬實有十分九分并六七八分不等正定府屬實有十分九分并六七八分及五分不等順德府屬實有九分八分并五六七分不等廣平府屬實有十分九分并六七八分及五分不等大名府屬實有十分九分及七八分不等天津府屬實有八分七分并六分不等冀趙深定四州屬實有十分九分并六七八分不等易州所屬實在收成均勻足有八分宣化府屬地氣稍寒收穫較遲至今尚未報到現在催取另行覆奏外所有巳據各屬申報二麥實在收成分數臣謹恭摺奏聞謹奏今歲麥收猶得如是分數朕心甚慰但目前雨水尚屬多寡不均為可慮耳雍正十二年六月初十日直隸總督臣李衛謹奏為瀝陳實情仰祈睿鑒事竊臣於本月初九日準户部咨初八日奏準提解鹽案內朱大雅等三名臣隨令臬司委官管押赴部投交外但此三人從前行提訊供緣由有不得不直陳於聖主之前者查朱大雅原係王惠民心腹密交而朱眷西黃快亭則係惠民承值衙門奔走夥計臣初因張愷唆聳梁樟挾制王惠民行私侵課之弊聚衆打架攘奪引地惠民見巳敗露遍處營求央人代奏借以資本交出官辦為名而將百十萬私鹽帑銀影射掩飾臣身在地方既有所聞恐被脫漏是以前次附摺陳及大槩彼時尚不知投定何處聲明再為詳細奏聞續於四月初二日據梁樟遣子抱呈在臣衙門具控內有王惠民二月內賄囑鹽政竟蒙摺奏豪商朱大雅可審等語詞內指辨之詞似乎見過底稿非係揣摩影響且公然開入告詞臣不勝駭愕伏思梁樟一介小人鹽政曾否代為摺奏伊何由而知若係霹空假揑其罪尚輕否則負販棍徒竟能探聽密摺消息所關匪細是以摘調朱大雅等三名靣訊其中緣由後準户部咨提人卷進京察審隨將梁樟原呈一并送部此內方有朱大雅之名並非原案正犯也朱大雅等於到保時臣止一人密問虛實並無衙役刑具在傍而伊老姦巨猾轉將上年春夏二次鹽院先後令向王惠民要去現銀五千兩係大雅傳諭朱眷西交送堂上周管家收進之處俱各隔别供認鑿鑿詰問其如何甘心冒險代為隱瞞百萬帑課轉奏之故則稱王惠民因張愷梁樟等爭奪氣惱成病著人呌他兒子王至德於正月十六日到天津父子商量要進地方是王至德自己進去求鹽院的如何靣説不曾知道等語臣以此案續蒙皇上交户部王大臣察審自能秉公是以止將朱大雅等三人暫留靜候部審如果課餉不至朦蔽再為奏明完結乃於五月二十九日忽接户部行提朱大雅等之文惟開案內有人供出並未指明提質某事此臣所以咨部請將何等情節應質之處開示即當訊取確供送部斷不遲誤正案去後今戶部止將送部原案內開有豪商朱大雅可審字樣具奏請提而原呈此句之上尚有賄囑鹽政竟蒙摺奏等語截去不入原案在部可據而梁彭年初則親身告狀開朱大雅為審證之人今則變為主使借名誆騙預埋送銀不足為憑出脫地步其意顯然可知聖明在上纖微必照將來朱大雅等到部訊斷公私自畢露於日月之照臨也臣撫躬自顧若非恭逢聖主則半年以來一身不知作何底止今明知又有此奏結怨更多但實不忍聽其朋比隱瞞恣行於光天化日之下謹將京東八處作弊營私緣由另繕清單進呈御覽仰懇聖主將此件密為留中俟定案時查對情節是否相符俯賜乾斷但期於國家公事有益臣之身家俱不敢計及也臨奏曷勝戰栗悚懼之至謹奏所奏朕殊不以為然因此案從前在保審理甚不妥確是以特旨交果親王提內訊鞫該王居心虛公非汝輩大臣所能企及審明自有定論朕於一切事務從不以先入之言為準若離是是非非之外别有是非天下無此情理豈汝輩凡夫俗子妄以人我心揣摩而可窺見者雍正十二年六月二十七日直隸總督臣李衛謹奏為奏聞甘雨及時復霈事竊臣於六月初十日將近京各屬所得透雨日期具奏并聲明畿南四府俟稟到另報續於十一十二等日連朝有雨數百里內髙下無不十分透足西北各府及京東等處所報雨澤日期亦各大槩相同即畿南正順廣大四府屬各稟稱六月初九初十之雨四處均霑十一十二十六十七等日亦續有時雨節次所降有至一尺及七八寸不等者均可播種惟正定屬之井陘獲鹿二縣雨未透足今保定省城於二十五日夜子時起靈雨繽紛至二十六日巳末暫住陰雲尚濃看其漸漬稠密之狀所及必逺臣親厯郊外目見大田早禾茂盛非常行將秀實晚禾嫩緑得此甘霖更覺潤澤勃然興發穎栗可期總緣皇上躬親祈禱誠敬格天是以先從京師次及保定由近而逺以至各府均得霑被此其明驗億兆蒼生皆仰邀聖主之福庇也為此謹奏宣郡一帶地方缺雨何未言及然此非彼處文武大員所奏乃出自過往行人傳説之口總之今歲雨澤不均即京城左近目下亦尚覺乾旱同日又奏為覆奏事竊臣前因平鄉等七州縣偶有蝻子生發附摺奏報荷蒙聖訓設法撲捕當即遴遣標員并同知通判等官分頭前往督同地方文武上緊掃撲旋據先後回覆皆巳淨盡出結申送惟山東交界之直隸清河縣地方并獻縣隆平三處尚有數村莊蝻種續生者緣係初長未成現在撲捕不日即可盡除至六月初四日宣化府屬之宣化縣保安州蔚州蔚縣懷安等五州縣於雨內帶有冰雹經過村莊間有十里數里之寬幸二麥巳收髙糧早穀根本堅固稍去其葉可以發生尚無甚損惟豆子略有打傷亦可補種晚禾又廣平府屬之永年縣於六月初六日陡起大風數刻吹坍府學之櫺星門及城垜數處民間草土舊房亦有倒塌者以上各處些須偏災雖然無多臣即委員飛馳前往勘查將被傷豆地借給籽種工本催令及時補植倒塌房屋之家分别輕重給銀撫恤并量動社倉穀石借給資助不令稍有耽誤時日外為此一并附摺奏聞伏祈聖鑒謹奏據奏永年縣大風乃俗所謂羊角風無足怪者但時值盛夏為不合耳雍正十二年七月初四日直隸總督臣李衛謹奏為覆奏雨澤情形事竊臣跪讀皇上發回前奏報雨摺內欽奉硃批宣郡一帶地方缺雨何未言及欽此仰見聖主時刻以天下民生農事上厪宸衷伏查宣化府屬各州縣據報內有五月中得雨六次六月內得雨七次者其間大小多寡不同尚未見缺少惟附府之宣化縣及張家口之萬全縣二處較别屬雨未透足續於六月二十三日得雨一陳而臣二十七日摺奏之時未據報到是以未曽聲説今二十五六七等三日之雨所及頗廣各處透足獨萬全入土五寸宣化縣僅有寸許幸先有二十三日之雨大田無礙晚禾亦可補種且彼地氣候較遲猶不為晚但盼望甚殷今現在各處紛紛報雨與此二處同府者巳到此際諒必均霑臣前奏少雨之獲鹿井陘二縣續巳報稱二十五六七等日獲鹿業經透足井陘於兩日內得有七寸趕種無誤惟平山係髙阜之地從前雖屢經報到尚在待雨亦同日得有五寸此外通省具報此三日內得雨者共又有七十七州縣今七月初一日午後微雨初二日亥時起密雨連綿至初三日戌均霑是以早田既盛晚禾復廣米糧甚平人心安樂黃童白叟無不歡欣鼓舞實有豐登之兆非臣所敢稍有粉飾也合將現在地方情形據實覆奏上慰聖懷謹奏覽目下情形朕懷稍慰雍正十二年七月二十日直隸總督臣李衛謹奏為奏聞近日地方雨澤年景情形事竊臣自七月初四日具摺奏報初二三等日得雨後隨據通省逺近各州縣報到此二日內又有雨者共六十三處續有保河津順廣大六府各屬七月初六七等日復有大雨即亦有六七分於向年尚未為減少若於數日之內得雨晚秋可望今於十八九日又得密雨各處透足若宣化等處此次亦有甘霖則收穫仍可無礙今歲營田州縣稻田禾苗極其茂盛木棉結秀異常較往年更好數倍各處窪地種植者亦從未有如今年之多而且盛四郊彌望滿目芃芃實為可慶至各屬有上年被水窪地草萌之中遺有魚子在內夏秋日曬氣蒸雖間有化為小蝻與向日土産之草螞蠟攙雜生出臣預飭留心撲捕分遣標員督催陸續俱即消滅除巳經具結報到外現在止有河間獻縣交河等處悉稱不日可淨近日順天府屬之香河大城永清武清以及大興宛平亦有數處村莊報有生發俱係零星參錯幸未成片巳報撲滅其餘諒不致上厪聖懷為此繕摺奏聞伏祈睿鑒謹奏覽同日又奏為奏聞事竊臣於七月十七日考官公出回署街傍突有一人跪稟口稱投到領罪觀其形似求乞告狀之人隨交中軍官帶回盤問覆稱聽其語言初似癡癲移時又有頭緒據供本名孟輔世係陜西漢中府南鄭縣民父故母存小本貿易上年八月二十日曾在蘭州監督廳上書失實隨即鎖拏呈請巡撫布按於二十四日發文解回原籍本處正法行至褒城縣地方將解役灌醉脫逃在外各處盤詰無可容身特來投到聽候解回治罪行文原籍知照等語并繳出在蘭州所上書稿及説單二紙臣看其單稿內有狂妄悖謬之語罪不容誅但正法必奉有諭旨據稱八月二十日投書二十四日即解回本處正法數日之內焉能即奉到明旨如是之速則所供顯有荒唐難信之處除飛羽密咨署陜西督臣劉於義甘肅撫臣許容查明所供虛實是否潛逃重囚外現將該犯密交按察司牢固監禁相應據實奏聞並將原繳單稿固封進呈伏候諭旨訓示庶便嚴究情由置之大法以為妄誕悖謬之戒謹奏將該犯投到自願領罪情節僃敘移文遴差管押解送陜省聽該督撫審結可也雍正十二年七月二十五日直隸總督臣李衛謹奏為奏報宣化近日得有透雨并覆現在預僃緣由事竊臣欽奉硃批諭旨近聞宣化一帶甚旱即早晚得雨補種巳屬無及留心確查先事綢繆可也欽此仰見聖心無微不周臣身在地方敢不凛遵料理查宣化十一州縣除别屬先俱陸續有雨外惟宣化萬全二縣七月內實為少雨懷來延慶州次之腹裏鄉村平坦田地從前得雨之時先經種植自張家口以至延慶一路多係山岡地土燥烈未得播種頗有亢旱情形今據報於本月十九二十兩日連得大雨巳種者雖減分數收成可期未種者節候巳遲誠如聖諭補種巳屬無及只可乘時急下秋麥為來歲夏初之計現在宣屬别處米價尚平惟宣化縣張家口米價少昂猶幸宣屬今歲穫麥比往年稍好且彼地又有一種夏收豌豆胡麻等項雜糧目前儘可支持惟慮冬春之間米價過長須得預籌接濟臣於六月底巳令宣化府將存倉屯米在於府城減價平糶兵民頗屬相安其張家口先據該同知以存貯日久請將倉米糶價臣因彼時米價尚平飭令暫存今正可酌量接濟查宣屬地處邊陲山髙路峻别屬米穀難於逺運惟本處所貯米石猶可酌量轉移今查宣化縣存倉各項共合米三萬一千餘石除現在應需兵米等項約一萬一千四百餘石再留來春僃用米數千石外實存米一萬數千石在於本地平糶可以敷用其萬全縣雖有存米合算三萬二千餘石而彼地所需兵米行糧數約二萬之外尚有别項需用民食實有未足但張家口同知所存雍正六七年採買之米以及所存通倉運去陳米等項之內若移緩就急尚可通融不足者暫於附近處所再為設法撥運目今保定一帶自二十日奏報以後連日密雨時作時止直至二十五日始見晴意所及必逺諒宣屬於此數日內仍有雨澤普霑足以仰副聖主痌瘝一體之睿懷也為此謹奏宣府連得透雨巳據補熙奏聞矣硃批諭旨卷一百七十四之十六欽定四庫全書硃批諭旨卷一百七十四之十七硃批李衛奏摺雍正十二年八月初四日直隸總督臣李衛謹奏為奏聞事竊照直屬地方自七月十八九起連有雨澤俱係間日時作時停二十五日臣具摺奏報之後次日夜間雨雖不驟而稠密連綿達旦始住臣因地巳透足恐積水停潦委員各處查看早禾巳成晚禾俱巳茁長枝幹堅實無甚損傷即最窪之地向年原止種麥今歲偶有廣植晚稻者初時水稍停積旋即消退其餘髙阜村莊禾苗甚為茂盛目前即可收穫惟各處年久土房被雨浸透終夜淋漓間有倒塌保定府城內外臣巳將養亷節省銀兩給領安頓别屬俱飭地方官逐一查明酌動恩賞該處僃公之銀分别撫恤沿河隄工據各道廳覆稱秋汛水勢長落不定現在保護無虞惟涿州固安土隄因永定河水陡漲各有衝開小口其他良鄉雄縣髙陽新城束鹿安州吳橋魏縣等屬亦有臨河漫溢之處俱即疏濬堵築並無大礙止有永清縣係固安之下流河水驟漲縣城西南角坍損一處水漫入城官署民房多有倒塌臣據報即飛委員辨齎司庫存公銀五百兩前往確查實在分别賑給會同地方官設法疏泄應否再動倉穀酌量接濟不許稽誤又宣化各屬方幸俱得透雨秋穫可期乃於初三日據該府報到七月二十九日申刻雨內有雹將及一時小如雞子大者若拳宣化附城四隅周圍東西五十餘里南北三十餘里髙糧穀黍悉被打傷等語臣亦飛委通判守僃齎銀五百兩前往會同地方官查勘賑恤將預僃冬春接濟民食事宜令該道府星速料理并通查宣屬别縣有無被傷之處馳報一例酌辦外合行具摺奏聞至今歲直屬年景米價大槩俱好臣身在地方凡遇低窪積水偶有一二村莊零星被潦者自當隨時設法竭力辦理不敢少懈致厪宸衷也為此謹奏畿輔小民瞻依最近一切撫恤事宜得卿辦理足慰朕懷雍正十二年八月二十日直隸總督臣李衛謹奏為奏明事竊照直省營伍盔甲器械經雲南提臣蔡成貴等條奏各案俱準部議行查臣現在將直隸各營甲械徹底清查計算製僃統俟酌議妥確另行分晰具題外惟是旌旗衣甲之顔色所以一耳目而示號令本朝八旗制度合天地而符五行按方位而成四序生尅制化精微神妙盡善盡美今直隸甲械不一非旦夕可以齊僃者而南府各營號衣顔色多係青藍紅鑲猶為合宜惟沿邊各營臣於上年挑兵時查閲衣甲多有白色臣思白為西方之色於五行屬金除别枝兵丁猶可無須即為改正外如鳥鎗炮手所持火器為我朝用武之先資火既尅金而金又生水以尅火均於白色未宜臣愚以為鳥鎗炮手號衣應否俱照南府用石青布紅鑲邊按東方甲乙木之色以生火而尅西方之金更為有益其舊時白者可以染用無須大費再查湖廣鎮筸總兵楊凱條奏改造腰刀一案直隸通省估計一萬餘兩臣現在將各營舊存腰刀內之短小窄薄以及白鐵無鋼者飭令逐一驗定式樣陸續修造惟鳥鎗手係操練排鎗連環進步各兵執鎗施放手帶火繩腰繫藥袋若復懸帶腰刀則進退轉身急走時皆有格礙是以悉將腰刀斜縳於背非他人代拔代裝不能出入刀鞘若遇短兵相接前有鎗靶後有鐵桶刀法難施是本身既無用刀之時而徒於打鎗有礙故臣前在京操演勇健兵丁時除馬步各項炮手配刀外鳥鎗手俱製給鉞斧用皮套插於腰間既於施展利便且出外行走一切砍伐開路無往不利所以久慣出師滿漢馬兵各皆隨帶小斧濟用且製斧之費較之於刀大可節省臣愚以為直隸各營除馬蘭鎮泰寧營等所轄兵丁有把牆護衛之任連鳥鎗手一項仍照舊佩刀外其餘各處鳥鎗兵丁俱應製造鉞斧插帶將舊有腰刀分别堪用者移給弓箭等項兵丁懸帶不堪者加鋼另製以上二事臣本欲彚入敬獻芻蕘等事條奏案內題覆因目前奉旨挑選精鋭兵丁一千名更換北路一應軍裝現在準僃若不陳明即行改換恐蹈擅更舊制之愆理合繕摺具奏是否可行伏祈聖明訓示欽遵為此謹奏所奏二事舉屬可行候於題覆時再加詳酌有旨雍正十二年九月初一日直隸總督臣李衛謹奏為奏明驛遞實在情形酌議調劑整頓事宜恭請訓示事竊照驛站額設馬匹餧養供差久有成例遵行而現今在站應差者每馬十匹之內皆有騾二三頭不等抵數歷久相沿未知起於何時不特直屬通省各驛皆然即臣從前厯次奉差常有馳驛往來凡經過北五省各驛亦無不如此細察其故蓋因馬力善於馳驟若緊要軍務河工差使晝夜飛馳五六百里者非馬不可若背包負重喫苦力長則馬匹不能如騾而近站往來晝夜不過三百餘里者以騾應差與馬無異所以每站皆有騾頭以供背包及近地差使搭配之用各驛此項騾頭若遇上司點驗或借别馬影射或以出差支飾凡所稱自僃餘騾之説皆非實情惟至交代之際水落石出後官以騾非額設必令換馬前官則因口外購買官馬既多價值倍昂雖竭蹶賠銀無馬可買只得於近地搜尋伏地駒子等項難以得力耐久者尚不能足數每至紛紛互詳若按照定例則相沿錮弊逐站皆然非但不勝其參而各站既不敢以騾抵數又不能盡將勞斃者買補勢必因循掩飾轉致馬數缺少有誤驛務關係匪輕臣既察知確情若不據實陳明籌畫調劑近日買馬愈艱驛站漸覺疲敝難於整頓查通省各驛舊額及新續增共馬五千二十八匹若按三成之數以騾抵馬內用騾一千五百零八匹莫若明準此數令其留存在站凡有背包負重及近地往來之差按其緩急搭配以代馬力此外七成馬三千五百二十匹務令選骨格髙大臕好者在站餧養以應差使有能於七成數外多養馬匹者聽其自便若於三成數外再多騾頭者照缺馬之例嚴加參處庶驛馬免於疲勞站務實在有益但驛站額設止有馬匹厯來定例巳久臣未敢擅專更易是否可行伏乞聖訓指示欽遵謹奏驛遞之設原為致逺達速以騾易馬萬不可行雍正十二年九月二十八日直隸總督臣李衛謹奏為奏明事竊臣欽奉諭旨直隸挑選精鋭兵丁一千名前往北路更換原派出征之兵隨即欽遵移行署提臣路振揚等按照挑選邊兵案內附奏嗣後調遣先儘向食大糧之兵於中揀選極其精鋭之人前往不敷者方於守糧內選用續經兵部咨覆令馬步各半揀派并將領兵各官應派副將或參將一員遊擊或都司一員守僃二員千總四員把總八員令各該督撫在現任署任各員內揀選派出具奏臣隨與提鎮諸臣咨商今巳派定提標各屬協營路挑選兵三百五十名宣化鎮標各屬協營路挑選兵二百五十名以上二標馬步各半步兵俱係大糧戰餉天津鎮標各屬協營路挑選兵二百名正定鎮標各屬協營路挑選兵一百七十五名保定紫荆馬水口三屬挑選兵二十五名以上馬步各半步兵原係守糧合共俱巳挑足精鋭兵一千名至領兵將辨先令各鎮自舉所知臣與提臣再行秉公詳慎會核內參將一員欽遵諭旨巳將湖廣襄陽鎮標中軍遊擊王士宏題請委署蔚州路參將員缺恭候命下令其帶領官兵前往外又選得文安營遊擊楊永和新河口堡守僃白成事􅗔溝營守僃張國泰暨各標協營汛千總馬蘭曾受爵王壽金王如綸把總冀正翟又新郭進忠劉繼道武其祥林喬張永泰傅名顯以上共派署參將一員遊擊一員守僃二員千總四員把總八員俱係弓馬熟悉操防勤幹之員堪以領兵前往現在預僃恭候諭旨到日起程理合繕摺奏聞伏乞皇上訓示遵行為此謹奏卿所挑選諒必允當臨事精詳朕信之有素也雍正十二年十月十五日直隸總督臣李衛謹奏為欣逢聖瑞歡切臣衷事雍正十二年十月初十日據馬蘭鎮中軍遊擊閻英稟稱景陵後昌瑞山産有靈芝九本寶光燦爛彩色繽紛經署鎮臣石文焯會同總理諸臣敬謹請起於初四日遣官進呈御覽臣聞報之下五內歡忭因思雍正十年靈芝生於景陵寶城山上而北路即有大捷今甫見邸鈔西路軍營於九月初四日又獲全勝而昌瑞山後復産靈芝此皆聖祖仁皇帝厚澤深仁涵濡無外神功聖德式憑在兹我皇上大孝格天至仁浹地是以希世之祥相因疊獻行見露布之捷接踵報聞天人感應不爽錙銖臣方敬俟綸音宣示中外以便具表恭皇上德威昭宣用召靈芽之特出而普天大有佳兆即隨上瑞以俱呈理合恭摺繕具清單先行奏聞伏祈睿鑒臣曷勝歡忭之至謹奏覽卿歡忭之奏朕亦欣幸無既雍正十三年正月十五日直隸總督臣李衛謹奏為恭謝天恩并陳地方近日情形事竊臣接到都察院咨開雍正十二年十二月十九日請派巡察順天等七府帶領科道引見奉旨李衛為直隸總督不必派巡察官員欽此移咨到臣聞命之下感戴既深悚惶交集伏思直隸為畿輔要區幅員廣逺總督責任兼辦巡撫事務未免竭蹶從前特命科道分府巡察任重才疏尚祈天恩伏惟睿鑒再附陳者直屬從前巨盜飛賊雖經屢次設法捕獲多名略巳斂迹而每當歲暮之時常有乘懈肆劫之事臣預飭各屬文武留心體察加謹防範復委標員分頭巡緝匪類俱歸各本案完結不敢冗敘目前歲底新正幸無劫案呈報地方寧謐各屬米價惟宣化府稍昂巳於封印前題明減價平糶而臘月二十三日龍門赤城等縣得有冬雪五寸及三二寸不等此外十月內得過大雪者百餘州縣而永平所屬亦有透雨米價俱平歲收可期惟山西相近地方及口外搬運頗多緣鄰封民食均係朝廷赤子而軍需轉運亦關緊要直隸上年豐稔米麥尚多未便悉為禁遏現在酌量本地口食所需曉諭民間各為撙節不許囤户髙擡價值庶期兩全又燒鍋除宣化府屬準開外其餘例奉禁止但京東一帶州縣地方內有窪地土性惟與黑髙粱相宜味苦而澀與米髙粱不同民間種植者多薄收之年即以充為口食如遇豐歲將此燒酒以資完糧用度若米穀賤時禁止過嚴則此種髙粱無可米髙粱仍行嚴禁外此項暫為從寬稍便民用至於黃銅器皿臣在浙任屢經設法查禁節次查拏其造賣賭具向日直隸此風頗盛冬春之間而足俱照例定案完結今亦知畏法歲內所犯頓少稍見成效再臘月間正定府屬之行唐靈壽等縣山內出有虎患傷人隨遣臣子李星垣同差委辨兵三十名前往搜尋巢穴打獲大虎五隻並飭宜一并附摺陳明謹奏覽雍正十三年正月二十日直隸總督臣李衛謹奏為恭報瑞雪均霑事竊照本年正月十七日保定府城得雪四寸近處州縣之安肅定興涿州蠡縣滿城易州淶水慶都新安容城髙陽祈州安州完縣雄縣博野新城唐縣河間交河獲鹿新樂定州報到者各有四五寸三二寸不等復據臣齎摺差員回稟京師以及良鄉瑞雪普遍均在同時其别屬先於初六十一等日得雪者又有順天府屬之遵化寶坻寧河昌平順義懷柔密雲大城香河永平府屬之昌黎豐潤玉田樂亭遷安撫寧山海衛宣化府屬之昌來延慶蔚州蔚縣及熱河之承德州等各處接連具報查去冬早巳普得透足雪雨土膏原皆潤澤而宣化永平二屬節氣稍遲向種春麥此時正為相宜即京南各處麥根興旺方在長養又遇瑞雪滋培自必深厚堅實更加茂盛萬民欣慶歡呼載道實有豐年景象理合恭摺奏報上慰睿懷謹奏微雪沾濡而巳尚未可云透足城守尉楊代何如可勝副都統任否雍正十三年正月二十四日直隸總督臣李衛謹奏為奏聞事竊臣於正月二十日早拜進奏摺後卯刻出堂望闕叩頭行開印禮維時旭日初升天氣清朗司道各官一同在署仰見日上戴冠形如寶蓋雲成五色光徹九霄左右抱珥明若雙鏡瑞靄重重繽紛擁護自卯至辰一時之久闔城文武以及吏役兵民萬目共覩考之於古日冠雙珥實為嘉祥徵兆我皇上敦本重農是日親行祈穀大禮瑞雪先期而降日華應時而呈雖帝念常謙屢却賀章而弗受惟天心攸眷頻昭景福於無疆官吏忭舞衢市歡呼理合恭摺奏聞伏祈睿鑒謹奏保郡相離不過三百餘里何都中竟未之見耶雍正十三年二月初二日直隸總督臣李衛謹奏為恭請恩準隨駕以展微忱事恭聞皇上於二月十二日親詣謁陵臣身在地方分應道左前驅清塵扈蹕且自雍正三年冬蒙恩準臣隨從叩陵之後將近十載瞻戀微忱無由自遂為此恭摺具奏仰懇聖主俞允臣即帶同按察使多綸起程其布政使王謨留於保定府料理地方事宜合并陳明臣臨奏曷勝懇禱瞻望之至謹奏允卿所請不必來京先詣通州左近預候可也雍正十三年二月二十四日直隸總督臣李衛謹奏為聖孝格天甘霖協應億兆歡呼臣民共慶事欽惟皇上舉行詣陵大典臣幸得隨侍扈蹕仰見聖容齋莊儼肅誠敬恪恭行禮之日望山陵而雪涕薦籩實以興哀實有懓見愾聞終身孺慕之心十三年來如同一日百辟羣僚油然觀感孝思不匱上格穹蒼是以玉輅在塗和風協應鑾輿回輦甘雨隨來本月十八日辰刻臣自長營叩送聖駕行三十餘里遇雨即住宿馬駒橋次早前行見道路泥濘頗深問之土民回云此處昨早即降雨起可見翠蓋經臨之地天心默應晴雨得宜誠非偶然所能遇也且春將及半地氣正當上升有此時雨滋潤土膏透達一夕之間勾萌畢出麥隴皆青臣沿途目睹村農野老莫不感激欣忭歡呼載道近處具報同於十八日辰巳午間得雨至戌亥時未止者共八十五州縣衛髙下多巳霑足逺者尚未接到此番所被廣濶米價更減聖世雨露之恩周遍而神速未有過於此者考之於傳曰惟聖人為能饗帝惟孝子為能饗親又曰饗帝於郊而風雨節寒暑時夫惟皇上以純孝格天而億兆臣民羣受其福將來二麥豐登百穀順成大有之象巳兆於斯臣曷勝慶幸忭舞之至謹將直屬巳報各處得雨緣由另繕清單恭摺奏聞伏祈聖鑒謹奏朕回至京城詣壽皇殿拈香方入門旋即落雨土膏滋潤氣候調和朕實欣悅之至雍正十三年三月初十日直隸總督臣李衛謹奏為恭報春雨及時再沛事竊照直屬地方同於二月十八日巳得有甘霖者共八十五州縣衛經臣具摺奏聞之後續據報到又有順天府屬之寧河永平府屬之豐潤玉田撫寧樂亭昌黎灤州盧龍遷安山海衛天津府屬之慶雲大名府屬之元城南樂開州清豐長垣大名等一十七州縣衛連前共百餘處其宣化一屬春初有雪地氣亦潮是通省逺近均霑冬麥春苗悉皆發榮滋茂矣今於三月初十日又降時雨入土巳有三寸濃雲四布所及必逺春雨機處寄字到來欽奉密旨宣示噶爾丹策凌巳遣人隨侍郎傅鼐等而來與臣前靣奉諭旨三四月內可以得信情由相符仰見天威逺震聖仁廣被使小醜畏懼悚惶感戴懾服冀逃命於釡魚自乞哀而伏罪既慰臣盼望之衷復遂臣欣幸之願隨將奉到密旨汛地堆撥事宜立即敬謹欽遵奉行辦理外所有又得時雨日期理合具報為此謹奏覽雍正十三年三月二十一日直隸總督臣李衛謹奏為請旨事竊照直隸所屬陸續出有衝繁疲難內三項相兼應行題補各缺臣因一時現任內揀選未得人地相宜之員但暫行委署試看一靣詳慎揀擇因要缺不便久懸除將西路同知并繁難州縣數員題請補授於疏內聲明保定府通判員缺乏人選擇另奏在案查此一通判係復設之缺督緝差查就近發審案件事務頗繁必得練達之員方能稱職現在州縣中才具可用者俱巳揀補要地此外多係初任試用實難其選查有刑部學習之薑泰嗣臣前署理刑部時見其辦事諳練頗有才情逮臣調任直隸後雍正十一年臘月內經刑部揀選列為一等帶領引見奉旨以薑泰嗣看來果係明練之員交與吏部議給七品小京官職銜食俸辦事屢經部臣任蘭枝等將該員奏請帶往淮安鎮江山東各處查辦審理欽案事件現在參革永定河同知黃瑛等侵扣一案亦係該員隨同任蘭枝來保辦理臣屢加試看誠如聖諭果係明練之人但係在部食俸辦事人員臣不敢遽行具題請留酌用今巳回京仰懇皇上天恩俯念內外同為國家公事可否敕下吏部將薑泰嗣帶領引見恭候欽定如或才果可用以之借補保定府通判員缺俟試用一年後倘能稱職再行題請實授似於地方有益而臣亦資臂指之用矣臣為要缺需人起見不揣冒昧具奏伏乞聖鑒訓示遵行謹奏照所請諭部矣同日又奏為甘霖疊沛再行奏聞事竊照直屬地方今歲春月屢得時雨三月初十日復降甘霖於臣前次具奏之後各屬報到者共巳七十一州縣衛內宣化府通郡所轄全得霑足更為邊境春間罕有之事今省城又於二十日未時起初則霏霏微雨繼而漸次綿密二十一日早猶然未霽均巳深透農歌於途婦慶於室仰見天心仁愛實聖德感孚臣於額慶欣幸之際益加凛惕之虔所有甘霖疊沛情形并前次報到得雨清單合再奏聞上慰宸衷臣臨奏曷勝歡忭屏營之至謹奏際斯春夏之交潤麥滋禾洵可謂及時膏雨也欣覽而巳有何可諭雍正十三年四月初六日直隸總督臣李衛謹奏為奏聞地方情形事竊惟遺金不昧在鄉曲小民不過一節之善而人心風俗之轉移於此可以見端直隸為首善之地仰蒙聖恩教養多年民間常有慕義嚮風者如冀州西北鄉數十村莊因從前被水借領倉穀厯年除完外尚存舊欠二千五百餘石艱於完納上年該州東南鄉村莊俱獲豐收遂代西北鄉鹻地各欠户悉行捐還州倉又淶水縣入官旗地租糧窮民積久難完有正白旗告老頂帶莊頭方國璽將本身自收租穀碾米六百石運縣糶賣代為完納此二事亦見風俗漸厚臣現在確查另行具題外近則又有查實之萬全縣軍站馬夫劉金貴於歲前十一月二十七日晚在南街拾有布包一箇計銀三十三兩報縣張示召認係山西臨縣民髙威金之銀中途遺失驗明取領給還又有天津城守營兵丁蕭國泰於本年正月二十六日獨自在曠野地方見行人墮驢中風不語隨身有行李銀兩不生覬覦即至營房喚同汛兵擡至廟中醫治招到病人之父史陛公認明將銀二百五十兩并鋪蓋衣服給還又有雞澤縣民王繼聖之妻髙氏於本年二月十二日出門汲水在街拾有路遺包袱內裝銀錢被褥同夫告知鄉地招人赴認係冀州監生牛琪所失先將包內有銀三十二兩四錢夫兵丁鄉村婦女既不知義利之辨亦未悉有他處不拾遺金得蒙奬賞之事而自發良知合乎道義皆由我皇上聖德涵濡是以羣黎嚮化臣深為人心風俗慶幸不敢因其細行壅於上聞除飭行各加分别優賞鼓勵外相應附摺具奏伏祈睿鑒謹奏以匹夫匹婦之愚而能輕財尚義慕善樂施允屬難得於斯足徵風俗向淳之漸覽奏朕懷曷勝愈悅雍正十三年四月二十九日直隸總督臣李衛謹奏為彚報雨澤頻降溥利農功事竊臣於四月初六日奏報通屬時雨周遍迄今甫及二旬而順天府屬之大興宛平良鄉房山通州三河薊州順義香河寶坻永平府屬之撫寧昌黎遷安豐潤山海關內外保定府屬之定興廣平府屬之邯鄲大名府屬之魏縣易州屬之廣昌等各州縣衛又於十六日得雨河間府屬之故城東光吳橋阜城寧津景州正定府屬之元氏順德府屬之邢臺平鄉南和唐山廣宗沙河廣平府屬之雞澤曲周威縣冀州并所屬之衡水棗強新河趙州屬之柏鄉髙邑隆平寧晉以及直隸深州俱於二十三日得雨今二十七八兩日復有時雨近處如保屬之清苑容城定興雄縣新城髙陽滿城安肅祁州蠡縣河屬之河間肅寧又易州并所屬之淶水俱巳報到其餘逺處方將接續具報在從前連沛雨澤二麥極其茂盛漸次秀穗秋苖俱巳長發今隔數日各處又有一二三寸細雨沾濡得此培養滋潤力愈足而根愈實其於二麥大秋利益無窮北地春雨不嫌其多此後再降更好臣未敢繁瑣臚列所有近日接續雨澤情形理合具摺恭報上慰聖懷為此謹奏春膏既渥夏澤復優仰感天慈曷其有極同日又奏為恭懇聖鑒事竊臣接準吏部咨文因山西署虞鄉縣試用知縣李景芬以勒收捐監出結陋規不遂揑詳被參照例將原保舉之直隸署天津府同知楊灝降二級調用奉旨依議欽遵在案此誠皇上激揚大政臣何敢妄有陳瀆惟是天津五方雜處盜匪繁滋最稱難治又係衆水滙歸入海之區南運河一帶工程最關緊要歷來同知不得其人前任總河顧琮與臣會商再四將楊灝由保定府清河同知題請調補該員久在河工熟悉諸務時常差遣明白勤練頗有才情目前正當夏汛於現任及效力各員中求其能勝此任者實鮮其人在該員冒昧濫舉咎無可辭但河務重大舍熟諳之員而求生手又費周章臣為人才難得起見用敢據實陳情仰祈聖鑒可否將楊灝帶所降之級暫留原任效力贖罪則該員感戴逾格天恩自必益加奮勉於河務地方似有裨益矣為此謹奏有旨諭部矣雍正十三年閏四月二十七日直隸總督臣李衛謹奏為恭請聖鑒事竊照正定鎮總兵蔡永文奉旨署理大同鎮務所遺員缺荷蒙聖恩命臣於屬員中揀選奏聞委署臣欽遵查得直隸副將連河標共有十員半皆新任更兼遞署銜缺多不相當如俸深之三屯營副將髙文涵才具辦事雖可去得而操守居心臣尚未敢深信無疑且現在暫署馬蘭鎮未便又行移動臣再四思維僅有調管臣標中軍副將宋愛辦事細心人尚明白或可暫行署理俟聖明特簡得人補授則地方可收實效矣是否有當恭候訓示未敢冒昧具題抑臣更有愚陋鄙見不揣瀆陳者西北重鎮莫如大同為最所轄皆係關隘要口管兵獨多必歷練老成嫺於武僃者方克勝任蔡永文聰明有才操守亦謹立志向前誠可為調繁之用惟係宦門子弟出身於武僃尚未透徹根底南天祥自幼食糧行伍漸次拔擢閲厯巳多於一切營伍事宜較為諳悉訓練技藝亦能周知前蒙聖恩念其在松江提督任內獲咎尚無重情仍畀宣化邊疆之任天祥愧悔無地頗覺黽勉思奮可否以蔡永文調補宣化南天祥調署大同鎮同屬總兵一轉移間使之各盡所長似於人地更為相宜臣知識短淺萬不能窺睿照之髙逺而直隸山西總屬聖朝疆域臣不敢以外省地方稍有岐視鄙見偶及相應附摺陳明伏祈睿鑒謹奏所奏深愜朕意可謂允協之至另有諭旨從部頒發同日又奏為聖主施恩逾格微臣悚惕難安恭摺奏謝事竊臣恭逢聖祖仁皇帝御製文集刋刻告成億萬千年奉為金鑑荷蒙皇上恩賞及臣應行陳謝因查通政司原文條款凡係公事如頒發書籍等項用題本特蒙賞賚及代人謝恩者用奏本臣前曾代原任大學士魏裔介原任尚書魏象樞後裔恭謝欽賜入祀賢良祠愚昧之見以為有關聖主褒奬忠良大典乃係公事兩次俱用題本通政司於第二次本到時連前半年巳收進呈之本一并以應用奏本指參荷蒙皇恩格外寬宥今次特邀賞賚係開列王大臣官員名單欽定原未普例槩頒且是臣一人謝恩有鑒於前不敢再用題本又經通政司以誤用奏本題參自應聽候處分復蒙恩旨該部知道欽此是因臣粗疏錯誤每致上煩天心曲賜優容撫躬自問局蹐難安雖捐糜頂踵無以仰酬髙厚於萬一為此具摺恭謝天恩謹奏奏本題本條款雖分為二原非大相懸殊不過俾汝等封疆諸臣慎重檢點之意以汝資厯之深尚不能諳悉程式其他服官未久宜乎不免錯誤者多矣然朕因此亦每不令依例處分也雍正十三年五月初四日直隸總督臣李衛謹奏為恭報二麥豐收實在分數事竊照直隸全屬仰叨聖德感孚上蒼垂佑瑞雪早凝於冬月膏雨頻降於春時逺近髙下均得普遍二麥巳登民氣和樂兹據布政使張鳴鈞轉據各道府州將所屬實在收成分數呈報前來臣查通省二麥收成俱有十分九分以及六七八分不等惟宣化府屬地氣稍寒節候較遲俟報到再行具奏外謹將各屬報到二麥收成細數另繕清單恭呈御覽總之北地種麥每年多寡不同少種之年即十分收成究竟所穫有數緣上年冬月直隸通省普得瑞雪春雨及時各處早晚種麥甚廣今歲冬麥大熟更與往年不同目前雖有靜海縣等十餘處水草叢生之所間有土螞蠟零星形迹臣巳飛飭各文武境內如有窪地蝻子萌動預為防範一見即行撲滅盡淨仍委員時往巡查諒不至有厪聖懷合并附摺陳明伏祈睿鑒謹奏今歲荷蒙天恩垂佑雨暘應序均調麥秋之豐不待奏報早巳預知其然矣雍正十三年五月二十二日直隸總督臣李衛謹奏為聖恩髙厚恭摺叩謝事本年五月初八日臣齎摺把總自京捧回欽賞臣牙鑲洋漆冠架一座到保隨郊迎至署恭設香案望闕叩頭謝恩祇領訖竊臣仰荷天恩從前屢曽欽賜朝冠頂戴難名今又蒙頒賞寶架朴素渾堅精工大雅瞻內府之寶器日麗星輝感帝澤之宏深天髙地厚臣撫躬自問初無寸長乃邀恩於聖主者推心置腹頻叨格外之隆施獲佑於上蒼者時和年豐共慶升平於樂歲承天恩伏祈睿鑒謹奏覽奏謝矣同日又奏為奏聞請旨遵行事竊臣準吏部咨為欽奉上諭事本年閏四月三十日內閣抄出奉上諭總督李衛奏稱正定府知府鄭為龍昨奉旨補授通永河道查鄭為龍謹飭有餘而風力不足恐於河工緊要之缺未能辦理裕如可否給咨送部引見或以京員或以事簡道員調補至通永道員缺如蒙迅簡幹員更為有益倘一時不得相當之人則伏汛在邇或委令清河道宋壽圖前往署理其清河道員缺近在同城亦有不時交辦公事可否於知府內遴員遞署庶於河巡均無貽誤等語著照李衛所請將鄭為龍送京引見其通永河道印務著清河道宋壽圖署理清河道印務著李衛於知府內揀選奏聞遞行委署欽此欽遵移咨到臣隨轉行布按二司移調鄭為龍領咨赴部一面即飭宋壽圖前往通州署任料理河防並令兩司於知府中揀選遞署之員會詳酌議去後今據該司等會同詳稱查有署保定府知府彭家屏才具優長辦事明敏堪以遞署清河道印務所遺保定府印務查有奉旨命往直隸以知府缺酌量試用題補之原任福建詿誤臺灣道倪象愷堪以遞署等因詳請具題前來臣查彭家屏於前任天津鹽法道任內辦事謹細尚屬急公之員仰蒙聖明鑒照於廢置之中授以保定郡守倪象愷以詿誤道員荷蒙恩旨命臣以知府酌量試用題補此兩員者感戴天恩均皆淪肌浹髓其奮勵圖報之心極為切實就其才具而論各於所擬委署道府之任均可稱職雖係遞行委署非實授可比臣不敢冒昧具題理合先行繕摺請旨可否將二員給咨赴部帶領引見恭候欽定伏乞皇上訓示方敢欽遵辦理為此謹奏酌擬甚屬妥協其才具均為可惜倪象愷之不稱臺灣道任尚非朕所料及彭家屏似稍欠誠實或恐內外不一勤加訓誡令其悛改此二員乃向所稔知之人即行援旨題署不必送部引見雍正十三年六月初四日直隸總督臣李衛謹奏為覆奏交辦額外銅斤完半緣由并陳銅務錮弊事宜仰祈睿鑒事竊臣於雍正九年十一月初八日在浙江任內承準大學士張廷玉等字寄雍正九年十月二十日奉上諭聞今年洋船來者甚多爾等可寄信與李衛於額辦銅斤之外另動庫銀採買紅銅一百萬斤解送來京爾等另行奏聞欽此寄信到臣隨經遴選殷商在於臣追出及本任所發辦銅節省價銀十二萬一千三百餘兩內給領承辦未動正項據商總等覆稱每年現銅不足各省之數並無贏餘若額外採辦一百萬斤必得設法購買分作兩年各預發五十萬斤之價至癸丑甲寅年陸續繳解彼時正值臣奉旨赴京陛見定議後即行起程於雍正十年正月內曾經靣奏奉旨俞允當即欽遵移咨前署督臣李燦給發并委交杭州寧波二府秦炌等承管先行辦理五十萬斤赴洋採買船未回棹臣巳調任直隸因係奉旨交辦之事不敢以既經離浙置身事外屢次移行浙省撫藩催解今於五月二十三日準到浙撫程元章咨稱此案額外銅斤內先辦之五十萬斤巳委員管解一半於閏四月二十日起程前赴內務府交投又二十五萬斤原商業經買足收回乍浦現在委員起解等因所有奉奏至於制錢為國家流通利民至寶銅斤實鼓鑄要需乃銅政日漸頽敝每至上厪宸衷內外諸臣條奏者不一而足似猶未得要領臣前任户部廣西司郎中專管銅鉛諸務雲南驛鹽道任內辦理各項礦厰其在浙數年更於東洋銅船事宜悉心釐剔其中原委大槩留意日久敢密為皇上陳之查從前紅銅倭鉛皆買賣人王綱明承辦自户部臣趙申喬將王綱明以遲延虧空參奏綱明遂將紅銅推出八省採買從此分更不一始而分辦繼而合辦後又改分廣東湖南湖北則買解滇銅江蘇安徽江西福建浙江則在於江浙海舶採辦夫地方皆國家之封疆督撫均朝廷之臣子同為公事何分彼此滇銅既是有餘則雲歷有案卷可查是銅斤不致竟無設處可辦也明矣然其中錮弊實有他人所不能盡知者因東洋等六人經管貨物自浙江放洋離長﨑順風止有五六日之程即遇風阻不出一月自康熙五十四年以前商船去來自由最遲往返不至一年後有浙江姦商胡雲客欲圖壟斷勾通夷目設立倭照江浙各二十一張分年輪番無照不許貿易商人惟恐不得倭照每次必重賂譯司歷年積有厚資彼處將軍因而大肆需索自康熙六十年為始不論船之多寡勒令譯司繳納金片二萬片每年逐漸加多至雍正五六年譯司即有虧空將商船留難遲發并於額定每船貨本一萬兩給銅四百箱之內扣起一百五十箱止發二百五十箱各商帶回之銅愈少以致虧本欠銅臣彼時訪知有姦商私帶違禁貨物潛往夤緣倭照者漸至夷人不守本分隨行設法拏究曾經歷次奏聞荷蒙貿易之意遍行傳露彼處不但資藉中土貨物藥材以為需用買銅銀兩以為轉運且自伊之東京至長﨑一帶水旱山徑地方專靠搬運貨物銅斤往來交易以資口食者豈止十餘萬人商販一絶無以為活舉國恐懼情願照舊每船按數給銅七百六十箱又於數外許多帶貨銀一萬二千兩加給珠銅一百二十箱彼時各省辦銅得以無誤者實由於此近聞每年金片巳漸加至五萬之多夷目虧空愈甚先去之船無銅可發必待後到之船貨物那新掩舊是以近來東洋羈滯之船多至四十餘隻惟十一年春間臣奉命赴浙查勘海塘時陸續放歸一十三船完銅比舊稍可今則回棹之船愈遲各省辦員無不違限致罹參罰道府數年奔馳仍至革職離任嗣後更甚廢弛公務皆有關於地方且虧空積而愈多將來不能那掩必致水落石出合各省辦銅之帑項計之其所關者甚巨即嚴治道府商人重罪究於錢糧無益臣愚昧之見以為在今日欲拔根本之患則奉行一有未善適足起釁滋事海疆關係斷乎難行再四籌躇惟有急則治標之法從前額銅亦曾交與各處鈔關辦過緣關差每年一換承辦未完勢必留住因而即有力能辦完者亦故意稽遲希冀復留借以拖延有此弊端始改交督撫委辦近番次領帑之日期後先以及貨物銅斤之盈絀客關統辦江蘇安徽江西三省浙海關統辦福建浙江二省再令江浙各督撫協同料理一轉移間則返客為主事權歸一與舊時辦法自有不同其雲南之銅直行解京毋庸輾轉滋纍廣銅儘其所出辦送庶可免各省承辦之遲誤賠纍之艱難如此暫為補救俟行之數年不再虧缺略有成效即依此為例否則另為徐圖拔本塞源之道似於錢糧鼓鑄要務不致築舍無成矣臣愚陋淺見是否有奏覽同日又奏為請旨事竊臣有表姪邵銓係武進士出身先由侍衛補授湖廣嶽陽衛守僃年力強壯膽勇過人實為武僃堪用之才置之衛所間曠可惜臣曾於雍正八年五月內附摺據實陳明懇請發於浙江臣標以營僃改補教導出力荷蒙聖恩調京引見逾格擢為京營額外遊擊旋蒙特授參將職銜賜戴花翎令其帶領湖廣官兵出師西路後於軍營題補山西新平路參將員缺今歲正月內準有署寧逺大將軍查郎阿咨文知湖廣官兵巳撤則邵銓自必領帶而歸臣查邵銓勇敢忠誠材料頗好雖在行間數年行走而實在營伍調度緊要關鍵恐尚未歷練其奧若再加教導造就可以成有用之人現在臣標中軍副將宋愛巳奉旨署理正定鎮總兵所遺員缺係保定營參將王之琳暫為帶管又加新營兵多事繁難以久為兼辦而直屬副參將中選調亦乏相當幹員再三籌躇不揣冒昧仰懇皇上天恩俯念新平路在山僻似非甚要之缺可否將邵銓避嫌疑據實具奏伏候訓示遵行再聞貴州苖蠻滋事未免稍厪聖懷各督撫提臣作何奏報內裏情節臣無由而知即據該處文武各官所遣進京之人一路經過説出之語似乎與所報不能盡實黔省接壤楚蜀滇粵況湖南苗民二種均屬性野俗悍地方最有關係此時告捷解散之言仰祈聖明轉加留心細察或密遣可信之人飛馳前往沅州一帶探實的信星即具報則睿照如神易於辦理小醜自必蕩平矣謹奏此番逆苗蠢動原非細事正在傳集辦理軍務之王大臣詳籌綏靖之宜覽奏足見體國忠誠朕甚嘉之同日又奏為奏聞事竊臣因今春頻得時雨南北河道防範宜周於麥汛之前通飭所屬預將各處工程堤岸逐一查勘有低薄者加髙培厚在案兹查南北運河於五月望前水勢雖長旋即消落各處工程俱報平穩惟大名府屬之長垣縣因豫省封邱縣滚水壩決口低窪村莊數處并魏縣之杜疃村亦有漫流積水幸下流無阻尚屬平常水勢業經分别堵築疏濬直隸境內均不致有妨礙各屬自五月二十日外雖每間二三日有雷雨一陳田水並無停積現在天氣晴朗其零星蝻孽據報雨後多巳消除近日惟有河間府知府陳起唐報稱獻縣見有飛過蝗確查怠玩揑飾各官分别參處仍令去員協同該地方文武上緊芟除務盡根株外又據寶坻縣詳稱該屬工部莊後身五月十八日萌生蝻子各有數塊該縣會同營汛飛往撲捕其中將有長成者罄盡復集於沿村樹上約有一時飛翔四散官吏兵民男婦老幼萬目共睹無不歡呼稱為靈異等因臣密差查訪是實此誠聖德感孚所致臣曷勝欣慶理合奏陳睿鑒再西寧縣越獄響盜馬四木頭馬二瞎子馬登泉三犯經臣飛咨原籍陜甘山西等鄰境根拏聲明持刀拒捕兵役鄉民圍困抹􅳲就縛馬二瞎子傷重身故又據固原州將馬登泉亦行拏獲咨臣應否留甘關供就近審題正法現在照議咨覆并臣等捐賞兵捕所有甘省此案協力同辦劇盜幸不漏網緣由合并附摺陳明謹奏覽雍正十三年八月初三日直隸總督臣李衛謹奏為覆奏事竊臣於七月十九日早自圓明園起程二十一日抵保遵照廷議奉旨事理將標營教練兵丁逐一親加挑選精鋭足額二千名各兵感戴聖主豢養教育洪恩無不鼓舞踴躍即偶因患恙略覺理一切事宜分頭辦理具奏間八月初一日接準部文奉旨停其調遣惟恐臣在外不知底裏復蒙聖諭命內閣鈔録雲貴督臣尹繼善奏摺宣示知悉臣隨欽遵行文飛咨各衙門知會訖伏查尹繼善所報大捷雖內中多係五月間事但據稱各處俱巳平定大路開通惟鎮逺尚有數處逸賊出沒正在搜𠞰上遊俱各處處安靜奉調兩粵官兵巳屬多緩急無誤其邵銓尚在保定應否即令前赴湖廣聽候有調遣尚屬順便相應請旨欽遵至於臣子李星垣蒙皇上逾格天恩授為三等侍衛仍準會試因其隨同管領兵丁前往行間效力是以勉承恩命今官兵巳停調遣則微末武舉何敢躐等踰階濫旨儻得稍有成就則犬馬之報效有日而臣心之惶悚稍安所有實在蟻忱繕摺陳奏伏祈聖明鑒察謹奏覽同日又奏為奏明事竊臣前在京時曾口奏至果親王府請安隨蒙傳見優待又賞臣子李星垣劍一口副將邵銓洋鎗一桿令其帶往出師又於臣臨行之前賞臣親筆字畫三副時表一件李星垣鎖子甲一身同邵銓每人皆賞衣服荷包等物此因有奉旨領兵赴楚之事親王仰體聖心優加賞犒皆出皇恩浩蕩所及理合附摺奏聞謹奏王之優待斷非出於籠絡之術卿之晉謁亦非懷有趨奉之心朕皆深信而無疑者人臣於義固無私交若同心體國互相愛敬則又惟恐其不然也覽奏朕實欣悅之至雍正十三年八月初十日直隸總督臣李衛謹奏為奏聞事竊照直隸今歲年景仰邀聖主福庇雨暘時若髙下全獲豐收億兆黎民咸慶堯天舜日臣前奉命進京自出清苑縣郊外所經安肅定興涿州良鄉宛平六州縣境內親見田間各種秋禾茂盛倍常其穀黍髙粱糜稷之中一莖雙穗三穗以上者隨處皆有因沿路採取各數本同任邱縣先次送到之瑞穀進呈御覽又續據通州三河固安等處詳送到京復經靣為奏明及臣回任旬日之間又據薊州霸州香河文安武清大城遷安永清等州縣各産有雙穗並三四穗嘉禾呈送前來臣未敢頻為瀆奏俱經敬謹供奉今又據遵化州詳送皇陵垣外地中所産瑞穀並內有一本三枝九穗者及保定縣呈送藉田內所産瑞穀各到臣伏思遵化為陵寢鍾靈重區藉田為聖主特行大典欽惟皇上敬天勤民昭格蒼穹感孚列祖是以嘉禾駢穗良稼雙岐既廣育以呈祥羣應時而獻瑞臣身在地方目擊實有嘉徵何敢隱而不宣謹據實奏聞並將遵化州保定縣所産瑞穀隨摺恭進伏祈睿鑒謹奏直屬今秋收穫實為罕遇豐年朕惟額手稱慶而巳夫復何諭戴上帝巳往之恩每撫躬而滋懼籲彼蒼將來之佑亟修德以欽承我君臣期共勉之硃批諭旨卷一百七十四之十七
