body:
  text: 欽定四庫全書硃批諭旨巻八十硃批趙𢎞本奏摺雍正六年二月二十六日雲南按察使臣趙𢎞本謹奏為恭謝天恩叩請聖訓事臣於雍正六年二月初八日接奉部文知照奉旨雲南按察使員缺著貴東道趙𢎞本補授欽此臣聞命之下隨恭設香案望闕叩謝天恩卽具詳署貴州巡撫祖秉圭特疏代題訖伏思臣一介菲材至愚極陋由江寧府同知歷陞至雲南按察使聖恩浩蕩感激難名卽捐糜頂踵不足以仰報殊恩但滇南為邊疆要地臬司為刑名總滙職任綦重臣才庸識淺惴惴難安叩請聖訓指示官方俾臣得以遵守竭盡駑駘矢公矢愼庶無負皇上簡畀洪恩於萬一耳謹奏但能矢公矢愼朕更有何訓示耶勉之勉之鄂爾泰可為封疆大臣之標準爾為屬員若能法其居心之半則一生用之不盡矣雍正七年六月十九日貴州按察使臣趙𢎞本謹奏為請禁書吏抽改案件之弊以清吏治事竊臣前歴任各省多有蠧書姦吏抽改案件之弊為害匪輕臣叨䝉聖恩陞授雲南按察使每遇接見屬員之際莫不諄諄以此告誡今更䝉恩將臣調補貴州按察使伏思臬司一官為刑名總滙其中有釐姦剔弊之處須殫心籌畫方為有益查民間詞訟控告到官一經批斷則事經立案官僃稽查原以昭功令而清案牘乃有一種蠧書姦吏往往與訟棍刁民串通作弊或乘官更吏代之際將已未審結案巻内有要緊批詞詳文看語任意抽換刪改甚至並將全案藏匿使接任官無巻可稽以便棍徒翻控輾轉拖累臣請嗣後令直𨽻各省有司於每房書吏各給印簿二本分註已未完結將一應欽部案件以及批發自理各項巻宗註明某年月日奉批某件准理某件逐細登明已結者將案内要緊批飭看斷摘錄某事之下毋許洗補潦草以杜改換增減之弊其未結之案另行分析註明不時禀閱以便按期審結每於新舊交代之時卽將此號簿案件並入交代冊内加結轉詳該上司以便日後稽查抑臣更有請者姦胥多於正署交代之際凡遇前官任内有限期將届案件勢必詳㕘遲延彼因受賄囑則朦隱延擱及限期巳逾惟官罹㕘處而彼則優游事外臣請嗣後凡有逾限案件除該管官照例㕘處外其經承書吏如有朦擱以及受賄抽匿改換等弊照例加等治罪如此不惟書吏知儆而吏治益清矣謹奏該部議奏同日又奏竊臣䝉皇上隆恩司臬滇黔清查各案見兩省事件仇殺刦擄命盜等案多由外結至督臣鄂爾泰莅任以來區畫周詳凡有大案始行詳報無如各州縣故習因循未能盡行振肅提查原案往往不全甚有并原案俱無者總由舞文之吏暗通訟棍抽換文書久成積習若此弊得除不但各衙門案巻易於清理而盤踞之積蠧其伎倆自無所施矣又臣歴任各省恭遇萬壽聖節元旦冬至等日行禮坐班所見儀注不一往往僣越不倫卽上司屬員於公處接見亦無一定之規以致體統全無凡此相沿之陋習皆當仰邀乾斷勅部嚴定處分者也以上二事各具摺奏聞外鹽政諸務亦經繕摺條奏但摺内只言其官買餘鹽以杜販私之弊而其中尚有相因可行之事如海邊范堤外之地與高寶興泰之湖田皆可徐議開墾者也范堤向時近海目今自堤至海有遠至數十里及一二百里者其南至江口北至黄河中間延袤千里之遠棄為斥鹵者久矣竈戸從前俱在范堤以内近日遷移近海其舊時場竈之地並為人所侵占而堤外沙地更無人墾種總因販私之利過於力作而外地棍徒勾引為匪以致農民不務本業相習成風其高寶興泰一帶地處卑下湖水漲發便有淹沒之患卽雨水稍多往往浸漫為憂有妨耕作其間居民借水患為名公然以私販為業皆由於近海之射利旣多而民頑所以土曠也臣近因在滇署理驛鹽道印務親見督臣鄂爾泰就各井竈定買餘鹽之法裕課杜私行之有效因思兩淮場竈若照滇井所行經營課帑可十倍於滇省況餘鹽旣歸官買則販私之弊自然永絶頑梗之民無所爭利而董勸可施勢必盡歸於力農勤作則久荒之地土無不開墾矣至於官收官賣之鹽觔自場竈運至州縣必須舟楫細查河身故道疏通開濬以利搬運而高寶興泰之水藉此相度以洩其勢凡水之就下者莫不直達於海則久淤之湖田不但免常澇之患竟成膏腴之産卽涸出之地畝又可開墾以成田矣但事關重大其中原委尚須面行陳奏如以臣言可採求命臣引見其中先後緩急理財用人凡一切事宜皆得以盡其所欲陳尚有歴任數省所見利弊俱可竭臣愚衷以敬陳始末為此繕摺謹奏亟當努力效法鄂爾泰之居心本領才情原不可勉強此衷則何難效法之耶凡人莫不各具識見率因根本處立心差謬故一切智力皆汨沒不能發露偶遇一二事機理稍契又非過則不及所以諸凡作用祇覺智力不逮殊不知於根本工夫未到也但得本何愁末勉之條奏三摺留中内如鹽務一款江省之利弊豈止於此不得其人饒多良法美政何由施設若得實心任事明體達用之臣地方上類斯諸務自應思及其謀猷方畧未必不勝汝之所奏也直省一切吏治大抵皆然引見面奏徒付空言亦復何益除非命汝親往經理試行所言但朕於汝之立身行已尚信不及命汝司臬滇黔原欲令汝親近鄂爾泰熟悉其居心行事庶幾觀感奮勉國家將來得一可用之人今江蘇正在清查新舊錢糧案件大吏亦何暇兼顧此舉姑將汝所奏與該督撫商酌看再抽改案巻一摺朕覽之頗覺有理祇恐繁碎難行現發廷議又嚴肅儀注一奏甚是但若遇謹飭守禮上司不待朕諭自能整肅若遇放蕩不檢之輩卽逐細注定典則亦不過視為片紙虚文耳朝廷殿陛之間設立御史正色糾察尚有失儀者何况頒行一篇儀注而欲其必不陽奉陰違得乎且此非吏治民生之要務國家體統尊嚴不專在此果能大法小廉紀綱井井内外臣工皆實心奉公絕欺蔽恥容黙法令必行恩膏下逮四海黎庶無不心悅誠服如此殊勝徒然外貌恭敬也然亦不可置之不講此奏朕酌量有諭但不以為要務耳嗣後汝再有奏摺交大學士張廷玉處為汝轉奏特諭同日又奏為報明事竊查貴州地方今春雨暘時若春花大熟所有大麥小麥蕎麥燕麥菜子蠶豆豌豆等項現據各府州縣報稱春收九分十分不等目下稻田又已盡行栽插秋禾俱各秀發豐年有兆民情欣悅又臣曾任滇省往來之人不時詢問俱云雲南春收頗好雷鳴田徧行栽插秧苖秀發亦有豐年之慶再臣上年恭遇萬壽聖節親見慶雲昭回旣知廣南府三環映日之祥近聞雲南府五雲捧日之瑞此皆由我皇上勤民至意感召天和庥徵屢見是以頑梗之苖疆旣撫則師徒無事雷行未疏之水道將通則商賈自然雲集滇黔兩省愈見物阜民安時和歲稔誠永永無疆矣臣親見嘉祥不勝懽忭合據實奏聞謹奏閱奏深慰朕懷滇黔地方得鄂爾泰如此公正廉明之臣忠誠任事實力宣猷自然感召天和斯乃一定之理也硃批諭旨巻八十
