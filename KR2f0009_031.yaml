body:
  text: 欽定四庫全書硃批諭旨卷三十一上硃批馬會伯奏摺雍正元年十一月十二日雲南永北鎮總兵官臣馬會伯謹奏為恭謝天恩事竊臣邊鄙庸愚仰荷皇恩不次拔擢歷任今職涓埃莫報正切悚惶兹者得覲天顔蒙恩賜貂帽翎子巳邀格外之榮又奉諭旨因大同地方緊要令臣前往大同署理總兵事務於初二日跪領聖訓賜臣暨臣弟馬覿伯各銀五百兩復命臣差人馳驛回滇皇恩優渥感戴難名惟有實心任事竭盡駑鈍仰報高深於萬一耳臣於初十日巳抵大同俟臣弟馬覿伯帶領官兵起程之日另行具題外謹將微臣謝悃具摺奏聞謹奏大同營伍數年來廢弛巳極爾其竭力整頓務令改觀以副朕望雍正元年十二月十三日署理山西大同鎮總兵官臣馬會伯謹奏為欽奉上諭事竊臣前到大同隨具恭謝天恩一摺荷蒙皇上硃批臣跪誦天語訓誡煌煌仰見我皇上明同日月洞鑒無遺臣惟有益凛冰兢冀酬高厚於萬一臣於十一月二十六日接印署事即行文所轄標協營路嚴查虛冒扣剋等弊汰除老弱整理軍裝約束兵丁嚴謹汛防復將各路將備調赴大同面加誡飭令其痛改前非勤慎供職倘有不肖之員貪利營私因循怠玩臣立即指名題參以為廢弛不法者戒但各屬營務廢弛巳久非旦夕可以改觀除空糧嚴飭即速招補以實營伍至於操練兵馬修整軍裝器械等項伏乞皇上寬臣月日約計半載之內竭盡駑鈍務必整理完備以仰副皇上慎重封疆至意所有硃批奏摺理合恭繳為此繕摺奏聞謹奏爾且盡心料理諸務以俟後命永北一任亦甚緊要尚未得人代爾署理此任或暫或久朕意猶在未定然無論何任莫非國事爾能隨處為朕出力報效朕自然洞悉也雍正二年正月十七日署理山西大同鎮總兵官臣馬會伯謹奏為奏聞事竊臣於雍正元年十一月二十六日接印任事後飭行標協營路確查空糧招補足額除鎮標三營並無空糧外今清出殺虎得勝等各協路空糧三百五十九分俱經各官詳報招補差操臣查訪無異其靈邱利民東路河保水泉五營路尚未報到至甲械旗幟軍裝等項現今上緊整理兵馬嚴飭操演但臣奉旨馳驛赴京恭請訓旨回滇俟參領臣陳王章到日即便交印起程其五營路未經報到空糧并一切營務移明署鎮臣陳王章料理外所有微臣清出空糧數目及招補緣由理合繕摺奏聞謹奏爾有思慮所到未及舉行之事交與陳王章接辦若因與巳無涉諸凡裁減過刻令馬覿伯回任後至於棘手亦屬不可陳王章臨行時朕降諭甚悉爾備細詢明應交與者交伊辦理可也雍正二年六月二十日雲南永北鎮總兵官臣馬會伯謹奏為奏聞事竊臣一介庸愚才識淺陋蒙我皇上殊恩不以臣為謭劣命臣條奏凡有見聞敢不直陳睿鑒臣查永昌順寧二府地處極邊崇山峻嶺四面環夷為滇省之藩籬最關緊要向來設立總兵鎮守控制土司十餘處所屬蠻人種類甚多必得精明強幹之員方可表率彈壓保固疆圉今永順鎮臣李根潤荷蒙皇上擢用理應竭盡心力圖報高厚其如性貪飲酒日在醉鄉且年力衰邁昏憒健忘一切營伍地方事務不能整頓料理似此曠厥職守恐致貽誤封疆臣受恩深厚不避嫌怨密以奏聞伏祈睿鑒謹奏李根潤貽誤職守巳有旨矣同日又奏為遵旨條奏仰祈睿鑒事臣思國家開設武科考較弓馬驗技勇試策論掄拔英俊原僃干城之選查武舉一途向有會試不中具呈告降本省隨標效力遇有千把缺出與營辨輪流間補之例於康熙五十一年十一月內因原任登州總兵官李雄以告降武舉多不歸標操演有請嚴分别武舉告降之例一疏經九卿議覆嗣後武舉告降之處永行停止奉旨依議遵行在案歷今十有餘年武舉壅滯日多其中不無人材壯健技藝嫺熟之人不得及時補用殊為可惜臣仰懇聖恩請照文舉人揀選之例會試三科不中者準其赴部告降請敕兵部會同內大臣公同考驗必須人材壯健弓馬嫺熟者方準告降平常者不準告降揀選引見之後分發各省標鎮協營效力與營辨間補千把如歸標之後不勤加學習偷安怠惰者報部注册如此嚴行分别則人材不致壅滯於營伍亦有裨益至武進士每科挑選侍衛外俱以營衛守備注册挨科分缺銓用但今營守備缺多係揀發年滿千總題補衛守備缺亦有捐納之人分掣則武進士掣缺甚少亦屬壅滯並懇聖恩亦準其赴部具呈照武舉告降之例考其弓馬漢仗出色者遴選引見分發各省效力與年滿千總間補守備倘不勤加學習仍行咨部注册則武進士武舉均得邀皇上如天之仁可收得人之效矣是否允協伏祈聖裁謹奏此事屢經有人條奏不啻數十次矣爾等提鎮職守封疆惟整飭營伍愛恤士卒是乃專責類斯等事當無暇念及若欲於不第武舉中選擇可用漢仗技藝恐百中未必有一二也大抵伊等功名從賄賂請託而來者十居五六令此輩人占奪行間兵丁進身之路非朕所忍為之事也朕此諭便中遇督提鎮諸臣皆令知之同日又奏為請復陜省武闈解額以光聖治事竊臣查陜省武舉係分闈取中原額西延鳳漢四府取中武舉四十名平慶臨鞏四府取中武舉四十名後於康熙二十六年十二月內部覆原任左都御史徐乾學武闈試卷停其解部案內議將各省武舉額數取中裁去四十名陜省兩闈共中四十名嗣經甘肅提臣路振聲題請於康熙五十二年萬壽恩科增中二十名兩闈共中六十名臣思考取武舉以弓馬技勇為重而文藝次之陜省武生弓馬技勇與别省不同且沿邊一帶習武者甚多今聖明在上咸思鼓舞上進陜省武科仰懇聖恩仍復舊額取中不但陜省武生得沐殊榮而宇內英俊咸慶彚征則聖朝作人雅化又逺邁棫朴薪槱之澤矣臣芻蕘之見緣遵旨條陳冒昧瀆奏伏祈皇上睿鑒謹奏此係前巳有旨之事爾所奏三事內兩件皆巳奉諭者且又非緊要應奏急務勞擾驛遞殊為不合再如此等無關緊要之摺或隨本附進或差人緩緩齎來不可擅動驛馬特諭雍正二年七月十一日雲南永北鎮總兵官臣馬會伯謹奏為恭謝天恩事雍正二年六月二十三日雲南撫臣差官齎捧硃批奏摺並御賜臣五色扇墜各種錠藥一匣到永臣率所屬漢土官辨出郊跪迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣質同樗櫟忝任封疆才不逮人徒有素餐之愧功無足録空懷報效之誠昔覲天顔疊沐非常寵渥今違鳳闕又蒙逾格恩施頂戴難名頌揚莫罄惟有冰兢益矢竭犬馬以抒忱公愼永持捐頂踵而不惜仰答高深於萬一耳理合繕摺奏謝伏祈睿鑒謹奏覽近聞李衛行事狂縱操守亦不如前果然否一毫不可瞻顧情面及存酬恩報怨之心據實奏聞隨便附奏不必特差人來雍正三年八月二十五日貴州提督臣馬會伯謹奏為遵旨回奏事雍正二年六月荷蒙皇上賞賜尚方藥品隨具摺奏謝奉有硃批諭旨臣於本年三月內蒙皇上簡用貴州提督七月交代起程道經省城一路細心訪問李衛賦性急躁心中有所欲言口中即便説出迹類狂縱易於招尤却非乖張悖謬者至於操守密加察訪亦未曾改臣過雲南知藩庫原交代時存銀二十餘萬兩昨李衛交代巳至九十餘萬兩尚有羡餘在外其實心辦事於斯可見矣若能再加涵養行事和平其才猷練逹辦事勤敏實屬賢員我皇上無微不照自難逃睿鑒也臣受恩深重不敢一毫瞻顧倘以有用之人而萌報怨之心即受蔽賢之戮以無用之人而存酬恩之念必罹欺罔之誅臣斷不敢負恩徇私自干國法况上關聖主任人圖治之重國計民生之大臣惟有據實回奏伏乞皇上睿鑒謹奏此奏朕甚嘉之凡百悉照此秉公奏聞方為不負朕之信任也雍正三年八月二十八日貴州提督臣馬會伯謹奏為恭請聖訓事竊臣查黔中夷多漢少界連川滇楚粵狆苗環居性最凶頑不時燒殺劫虜全賴兵威彈壓各府州縣額設營制雖星羅碁布但副參遊守中有宜於僻壤而不宜於衝要宜於衝要而不宜於苖地者有弓馬平常辦事足録應節取以觀後效者至臣提標有應援全省之責更關緊要必得才猷練逹強幹勤敏之員以資臂指容臣將衝要僻壤苗地逐一細心籌度相其才具果宜調補之處據實籲請調補則邊疆得人經理可以永保無虞至於將備中弓馬不堪人材庸懦年老不能供職原係廢弛無能之員激濁揚清國憲昭然臣不敢瞻徇姑容有負聖主委任之至意也再查盔甲器械等項俱巳年久不堪亟宜整頓修製以資實用又臣親丁糧八十分遵照舊額不敢多占本標原有公費糧九十分交四營將備經管為每年册費表箋京報修理塘卡衙署等費不許借名多留一分臣受恩深重敢獻末議稍申犬馬微忱伏乞皇上恩賞批示遵循於巖疆營伍大有裨益矣謹奏大凡督撫提鎮接印受事後率皆有此一奏全在實力奉行果若行符所言朕自能鑒悉勉為之公私二字辨别清楚何往而不得其宜當效法趙坤之安靜而戒如趙坤之因循懈弛也控馭苗夷要須恩威並濟稍有所偏過猶不及一切處詳愼斟酌為之同日又奏為仰籲天恩準帶人員以資委用事竊臣於永北總兵官任內常行差遣齎摺之把總沈玉秀劉文竒二員數年長途往來頗堪信任伏乞聖恩俯準帶入黔省仍補把總以供驅策庶緊要事件不致有誤再雲南省將備之中有才技優長諳練營伍聲名好者或可容臣將真知灼見之員咨會督臣商酌題請於臣標補用臣因地方營伍起見遴才隔省理合恭請聖裁批示倘蒙恩允則臣獲收臂指之效矣為此繕摺謹奏地方營伍均關緊要何省不需好員隔省題官不便允行此二把總念係微員姑準所請援旨具文咨部可也同日又奏為恭謝天恩事竊臣父子兄弟世受高厚之恩莫能仰報萬一臣堂弟大同鎮總兵馬覿伯行止不端在軍前時因瑣細事情與將軍等爭競甚屬無恥臣弟不能仰報我皇上豢養隆恩自干罪戾荷蒙聖恩不即加重譴猶格外矜全發往軍前管轄緑旗種地官兵效力行走臣接閲邸抄惶恐悚惕不能自安所有感激微忱理合繕摺奏謝伏乞皇上睿鑒謹奏據奏爾悚惕不安等語此事不但爾等身為臣下且係堂弟無法以處之即朕親弟如廉親王允祀等雖百計千方教訓不能化其不臣之心也但只照管巳身無過足矣兄弟之賢不肖功罪各不相及若馬覿伯洵屬下流不堪不顧行止人也雍正三年十月二十八日貴州提督臣馬會伯謹奏恭請皇上聖安朕安黔屬狆苖之凶悍及從前地方官之姑息因循皆朕所悉知覽所奏數條雖屬有理然萬不可輕舉妄動鄂爾泰慎重明敏實心為國人也諸凡與之詳細商酌而行爾忠誠報效之心朕甚嘉之但地方情形朕既未身經目覩爾亦係初到未能洞悉無遺此時不便批示進止將摺留中俟高其倬到京朕面加詢問與之熟籌得有主見時再行批發與爾也同日又奏為修製甲械以壯軍威以資實用事竊臣提標有應援全省之責必甲械實堪披執軍器壯麗鮮明方可為各營表率今細查馬兵盔甲共六百副步兵盔甲共二千四百副鳥鎗共一千四百桿俱應從新修製大旗六十桿小旗三百桿紅旗六十桿帳房一百六十頂係前任提臣趙坤同各官捐製今應補造帳房二百四十頂新製鑼鍋四百口片刀藤牌長鎗鍬鋤之類亦應分别添補逐件細籌所費不資臣早夜思維此項軍器當亟為整頓相之處另行具奏再照黔地土瘠民貧兵丁家口衆多稍遇歲歉不免飢寒臣再四籌畫仿照社倉之例願捐榖一千石四營將備亦願捐榖一千石存貯公所於青黃不接之際借給兵丁以資食用照原價陸續還補馬臣惟有不時親行指訓務期技藝精熟各有實效仰報天恩於萬一理合繕摺備悉奏聞伏祈睿鑒謹奏訓練營伍惟以時勤操習嚴明賞罰為要勉之同日又奏為詳懇轉呈訓旨事雍正三年十月十六日據鎮逺協左營遊擊韓勳詳稱卑職恭讀上諭凡文武官員曾經面奉諭旨者俱將訓旨一一詳細繕寫進呈御覽內外文武大吏著自行封進其不應奏摺之員著封固交與該上司轉奏欽此欽遵查卑職叨蒙皇恩補授貴州威寧鎮標中軍遊擊曾面奉訓旨今遵將訓旨繕摺封固詳請俯賜轉呈等情到臣相應將遊擊韓勳繕寫訓旨奏摺一封轉奏伏祈睿鑒謹奏此等轉呈事件應彚齊乘便附奏為是非急務也同日又奏為恭請陛見以抒誠悃事竊臣自上年奉命回滇未瞻天顔將及兩載犬馬戀主時切愚衷況黔地漢苗雜處最關緊要一切事宜非面請聖訓開示愚蒙無所遵守伏乞皇上允臣來京跪聆聖主提命指授使微臣得以遵循恪供厥職於地方兵民實有裨益矣臣謹繕摺奏聞伏乞皇上睿鑒謹奏路途遙逺不必來京近日有人論爾前在大同署任時性急過刻等語當深以為戒朕觀爾亦似偏於急快今職非一鎮可比統轄全省戎政任大責重愼之勉之雍正四年四月十六日貴州提督臣馬會伯謹奏為奏聞事竊查前任雲貴督臣高其倬於謹陳調劑黔省事宜等事案內會同題請貴陽府廣順州所屬之長寨同筍焦山羊城􅋭一帶狆苖頑梗移撥大定鎮辨兵分防長寨羊城􅋭等處定番州所屬青藤斷杉樹兩處設立塘汛遵奉俞旨允行隨經勘明厄要地方蓋造營房據廣順州知州報稱宗角沙子關等處營房俱次第蓋造完僃惟長寨狆苗抗違不法用石堵塞路口不容進內蓋造臣隨會商署撫臣石禮哈差撫標遊擊趙文英等同廣順州知州齎帶告示張挂並量帶官兵巡查村寨喚集土人諭其凜遵王法如仍阻撓即商酌用兵等由於三月二十日會同署撫臣石禮哈合摺奏聞今屢接趙文英等稟稱職等委曲開導而該寨苖人負固不服等語臣即與督臣鄂爾泰署撫臣石禮哈酌遣臣標兵丁一千名撫標兵丁二百名各協營兵丁一千五百名檄委定廣協副將劉浚業統領於四月初八日會集廣順州所屬宗角地方分布駐劄臣又會同新撫臣何世璂差員再持告示前往化誨倘執迷梗化非先威後恩萬難馴伏臣即會商督撫臣細加籌畫相機撫𠞰懾服梗頑蓋造營房安兵駐劄以彈壓要隘頑苖自此斂迹邊徼可冀敉寧矣所有遣發官兵事理謹據實具摺奏聞伏乞皇上睿鑒謹奏恩威二字不可偏用惟貴適中得當所奏知道了一切機宜籌畫萬全而後舉動慎勿失於輕忽事畢應具題處具疏題奏雍正四年七月十五日貴州提督臣馬會伯謹奏為奏聞事雍正三年十二月二十五日原任雲貴督臣高其倬過安順府交到御賜解撒毒草藥一匣藥方一紙又本年二月二十七日雲貴督臣鄂爾泰差員齎到御賜解毒末藥一瓶藥方一紙臣俱轉頒所屬各鎮協營官兵並調往長寨等處官兵去後兹據各官兵稟稱苗人弩箭藥毒從來無方藥解治荷蒙皇上好生大德將神藥藥方均賜蟻等擕帶行間有恃無恐益奮勇鼓勵滅此頑梗少報聖主深恩蟻等謹望闕叩頭恭謝天恩等因到臣據此合將各官兵感戴私忱并臣領到御賜方藥轉頒各官兵日期繕摺奏聞臣復差人赴粵到提臣韓良輔處問明購得各種藥料遵依賜方製成末藥分給貴州各鎮協營僃用以廣皇仁合併奏明伏乞睿鑒謹奏知道了藥既有效多製備用甚好同日又奏為狆苖抗阻不法遣兵𠞰撫仰祈睿鑒事竊照廣順州所屬長寨等處狆苖頑梗無忌阻修營房臣於四月十六日將遣發官兵懾服頑苖緣由奏聞在案臣隨會同新任撫臣何世璂威寧鎮臣石禮哈各出告示差員協同苖人頭目持往長寨等處再三化誨間有投順者即賞以花紅銀牌等物豈知領去之後旋即退還告示亦不收接甚屬抗違臣即會商督臣鄂爾泰撫臣何世璂鎮臣石禮哈飭發官兵於五月初九日攻打長寨谷隆等處乃頑苖膽敢伏草打弩斷路劫糧紏集羽黨潛偷營寨種種不法凶頑巳極緣隂雨連綿至十三日發兵進𠞰者貢擒獲川販王有餘於者貢後箐搜得川販李嵩山楊世臣并李竒之妻妾及川販陳應甲除長寨者貢首惡阿革阿紀及脅從苖人赴營乞命外并擒獲凶苖季寅阿乃神保等又獲狆苖大小男婦及刀弩箭筒並盔甲馬棉標桿等物適威寧鎮臣石禮哈奉督臣照委於六月初十日抵營即將凶苖阿革等川販李嵩山等以及刀弩等物移解撫臣審擬收貯臣以頑苖既知畏懼自應繼之以恩隨與鎮臣商酌安撫以示聖朝寬大之仁傳集鄰寨頭人給示分頭前往曉諭令四散夷衆歸寨安業查川販李竒潛匿長寨十有二年罪大惡極斷難輕縱據伊妻妾僉供業巳回川臣即飛咨川省撫提二臣轉飭地方各官上緊擒拏務獲解黔定擬以彰國法再有者貢頭人阿搗阿撈糾衆阻修營房為諸寨首惡亦不可輕縱臣屢飭軍前各官密訪擒拿於六月二十八日據參將劉朝貴知府張廣泗稟稱有冗磉寨頭人將阿搗化誨來歸又於七月十一日據該參將知府稟稱有頭人阿種等用計將阿撈勒逼獻出前來等語隨經該參將俱解交鎮臣石禮哈訖查陸續遣發官兵共四千名土兵一千零五十一名今進𠞰事竣將各營先到兵丁撤回二千四百名暫留一千六百名令遊擊卜萬年等分領駐劄長寨谷隆宗角等處督修各處營房俟蓋造完備駐防兵丁安設停妥然後撤歸各汛其各處土兵時當栽插亦俱撤去令其歸農所有臣等𠞰撫狆苖緣由理合繕摺奏聞仰慰聖懷查攻打長寨等處箭傷貴陽營把總王起貴一員箭石等傷兵丁四十七名土兵二名除傷重兵丁黃元正等九名陸續身故外其餘帶傷官兵俱用御賜解毒末藥草藥依方服洗調治巳經全愈身受者既感聖主再造之洪恩而全省官兵亦莫不仰戴皇上如天之大德合併聲明伏祈睿鑒謹奏朕始初尚慮爾等稍涉孟浪續據鄂爾泰石禮哈所奏僉同朕方確信不疑今頑苖經此懲創驚竄畏服足見卿等實心任事籌畫精詳一舉而剪除數十年之積患朕深為嘉悅功巳成事巳竣矣惟靜候朕加恩錫耳洵屬可喜可嘉之至雍正四年八月十九日貴州提督臣馬會伯謹奏為奏聞事竊查狆苖阿搗阿撈等賦性獷悍兼有李竒等為之主謀教唆販賣人口故阿搗等燒殺無忌搶劫不休則李竒實為此案罪魁萬不可輕縱臣於未獲阿搗阿撈之先即懸賞格分差設法密拿今於八月初七日據臣標兵丁王起元等協同民人於黔屬怯里地方拿獲李竒到案臣即委員解赴撫臣衙門收審定擬治罪以彰國法蠢爾苖夷從此安分伏處不敢為非邊圉羣黎長享敉寧之福矣再查長寨宗角羊城􅋭羊角􅋭谷隆關口以及各汛官署營房臣現在嚴催承修督修文武各員上緊修蓋並勿得草率塞責十月中旬可以完竣除設官安兵事宜臣會同督撫鎮臣合疏具題外所有拿獲川販李竒緣由理合繕摺奏聞謹奏此一事自始至終爾等料理合宜甚屬可嘉朕自另有恩旨同日又奏為恭繳硃批奏摺事竊臣一介庸愚荷蒙皇上覆載隆恩簡任貴州提督抵任以來愆尤日積方且惴惴難安忽被黔任內辦理一切事件欽奉硃批理合回奏恭繳一件為遵旨回奏事奉皇上硃批下詢李衛操守性情臣欽遵於雍正三年八月內回奏蒙皇上硃批此奏朕甚嘉之百凡悉照此秉公奏聞方為不負朕之信任也欽此臣受恩深重不敢纖毫徇私雖據實奏聞猶恐未當乃荷一件為仰懇天恩準題帶人員以資委用事臣因請帶雲南永北鎮把總沈玉秀劉文竒二員入黔補用又請將雲南省將僃中才技優長者於臣標補用奉硃批地方營伍均關緊要何省不需好員隔省題官不便允行此二把總念係微員姑準所請援旨具文咨部可也欽此除把總沈玉秀因病辭職外所有劉文一件為恭謝天恩事臣因堂弟大同總兵馬覿伯行止不端感戴聖主法外施仁繕摺奏謝奉硃批據奏爾悚惕不安等語此事不但爾等身為臣下且係堂弟無法以處之即朕親弟如廉親王允祀等雖百計千方教訓不能化其不臣之心也但只照管巳身無過足矣兄弟之賢不肖功罪各不相及若馬覿伯洵屬下流不堪不顧行止人也欽此竊臣堂弟陛見事臣以黔域漢夷雜處一切事宜應面請聖訓庶幾有所遵循奉硃批路途遙逺不必來京近日有人論爾前在大同署任時性急過刻當深以為戒朕觀爾似亦偏於急快今職非一鎮可比統轄全省戎政任大責重愼之勉之欽此臣質本愚直性復急快蒙一件為修製甲械以壯軍威事臣因甲械舊敝宜亟整頓又以黔地山多田少兵丁家口稍遇歉歲不免飢寒臣願捐榖一千石四營將備亦願捐榖一千石借給兵丁至來歲秋收再共捐榖二千石永逺接濟兵丁等因具奏奉硃批積榖濟兵洵屬最善之舉但不可強纍將辨欽此竊臣與四營將僃所捐榖石原為接濟兵丁不敢絲毫有纍將辨俱係各自量力捐貯荷蒙聖訓益當凜遵臣雖離黔在即再捐榖一千石將榖石價銀交中軍參將收存至秋收後買貯尚有一千石或新任提臣楊天縱獨捐或四營將備官員捐貯以足四千石之數是在新任提臣籌畫料理無庸臣置喙但恐日久不無侵那等弊俟楊天縱到任後臣即咨交清楚令其查明收受作正項交代一件為狆苗劫搶流毒懲捕宜嚴事臣以狆苖劫搶燒殺種種不法謹將經理事宜備陳五欵又具摺恭請聖安奉硃批朕安狆苖之凶悍及從前地方官之姑息因循朕所悉知覽所奏數條雖屬有理然萬不可輕舉妄動鄂爾泰慎重明敏實心為國人也諸凡與之詳細商酌而行爾忠誠報效之心朕甚嘉之但地方情形朕既未身經目覩爾亦係初到未能洞悉無遺此時未便批示進止將摺留中俟高其倬到京朕面加詢問與之熟籌得有主見時再行批發與爾欽此伏念督臣鄂爾泰實心為泰參酌辦理斷不敢專擅輕舉今仰仗天威逺播頑梗向化輸誠經臣三次摺奏兹不敢再為煩瀆天聽也以上恭繳硃批奏摺悉係臣貴州提督任內所辦事務理合彚齊奏覆伏祈睿鑒謹奏逐條批諭矣雍正五年正月二十一日四川巡撫臣馬會伯謹奏為奏明事竊臣荷聖恩畀以四川巡撫重任惟有潔己率屬察吏除弊少報涓埃然必大法而後可責小廉臣是以先留意於司道次及府廳州縣如有貪贓敗檢者立即參究以仰副我皇上委任之至意今查四川按察使程如絲不感皇上擢用隆恩潔己奉公力圖報效乃敢一味營私網利凡所管鹽茶驛站事務多有侵欺短扣之弊而於刑名案件任意懈弛不能依限完結非推諉於巡撫即歸咎於屬員居心隂險諸事欺飾上負國恩莫此為甚臣現將欺罔欵項逐件密加查訪合先繕摺奏聞伏乞皇上睿鑒批示謹奏密訪明白據實奏聞程如絲若負朕恩洵為天地所不容矣有是理乎殊屬可惡之極同日又奏為恭請陛見跪聆聖訓事竊臣邊鄙武人材庸質陋荷蒙皇上委任隆恩至深極重於安順始得經年即有調任甘肅之命又奉署理川提之旨甫抵成都復荷綸音授以四川巡撫又蒙異數加銜當經具疏恭謝天恩在案臣今到省月餘目擊吏治闒茸民俗疲頑積習既久不得不亟為振刷但臣以武途驟膺文職刑名錢榖素所未諳實恐才力不逮致有隕越上負委用至意是以臣之瞻戀聖顔思聆聖訓實較之恆情倍切也伏乞恩允容臣輕騎減從兼程赴闕敬將地方事宜跪請訓旨俾臣知所遵循庶得悉心經理實力奉行上答聖明之知遇下免愚昧之愆尤感戴皇上生成大德永矢無斁矣為此繕摺奏懇伏乞睿鑒批示謹奏不必來京爾巳見朕數次矣到任伊始正資料理况兼署理川提印務地方緊要豈可逺離職守僕僕為無益之往來耶凡事秉公無隱不可瞻顧回護安民必先察吏察吏務在秉公進賢退不肖乃爾之專責也一應文武官員即如嶽鍾琪為朕如此信任現係本省總督若其子姪親友門生故吏有違犯功令者亦當破面執法不少假借何况其他能如此忠介方不負朕畀以封疆重寄也平治天下之道惟在得人如能得人何事不理若稍涉私比舉劾賞罰一不公則諸務不可問矣請朕訓諭所訓諭者即此公之一字暨用人一節其餘刑名賦稅頭緒紛紜朕實不逹無可訓諭也同日又奏為據實奏聞事竊臣荷蒙恩命署理四川提督印務於雍正四年十一月二十六日抵任業經題報在案查川省營伍大概未整而提標五營及成都城守一營旗幟盔甲尚屬可用鑼鍋帳房等項十無二三臣思軍裝器械不可一日不備況冕山烏蒙等處現在用兵武備尤當整飭臣巳飭令六營將備即將鑼鍋帳房等項逐一製造備用其各鎮協營軍裝器械等項有無缺少之處巳檄行鎮將備辨確查逐營整頓外所有川屬營伍臣現在整頓飭查緣由理合繕摺據實奏聞伏祈皇上睿鑒謹奏甚好亟應竭力料理黃廷桂抵任後備悉説與伊知黃廷桂雖屬旗員尚在中年然顧惜顔面似明曉大義實心為國家效力之人爾等協力和𠂻辦理一切事務以綏靖地方可也雍正五年四月十八日四川巡撫臣馬會伯謹奏為恭繳硃批諭旨並謝天恩事竊臣於本年正月內敬具奏摺俱蒙硃批並荷寵錫謹繕摺恭繳祗謝天恩一件為恭請陛見跪聆聖訓事臣以川撫任重一切措施多有未當是以請覲天顔跪領聖訓未蒙俞允不敢再瀆惟有祗遵訓諭公忠自矢不敢少存偏私執法破面不敢瞻顧回護賞罰一秉至公黜陟確核賢否以仰副我皇上委任之至意又荷御書福字寵錫微臣臣拜瞻宸翰感激高深益難圖報理合恭謝天恩一件為據實奏聞事臣前蒙恩命署理提督印務將四川營伍大概據實奏聞荷蒙指示今提臣黃廷桂巳經抵任臣即遵旨將蜀中事務僃悉與黃廷桂説知臣與共處一城地方事宜自當協力辦理上慰宸衷臣敬遵聖訓不敢須臾或忘也一件為奏明事臣因臬司程如絲營私欺飾不敢徇隱據實奏聞臣查程如絲係革職負罪之員蒙皇上逾格施恩宥罪擢用乃不思圖報益肆貪婪洵神人之所同嫉天地之所不容臣謹遵諭旨將該員劣迹察訪明確具疏題參巳邀聖鑒不敢復瀆宸聰以上硃批奏摺理合彚摺奏覆伏祈睿鑒謹奏朕今調汝為湖北巡撫楚省民風吏治甚欠整理因總督亦係滿洲人故將憲德與汝互調憲德到川時將汝任內事一一明白説知將伊任內之事汝亦詳悉問明記取到任後酌量料理汝為朕所信任之人不必奏請陛見但須較在川省更費一番心力方可奏效也勉為之同日又奏為欽奉聖諭事雍正五年閏三月二十一日新任四川提臣黃廷桂到省面宣皇上諭旨梁山冕山普雄烏蒙等處賊首業經擒獲地方亦巳安靜其餘黨現在安插撫綏善後之策最關緊要務宜詳細料理况目今兵威巳振尤當濟之以恩至於改土設流原因土司暴虐奪人子女掠人錢財以致失衆苖之心如今處置大有關係尤須加意籌畫措置得宜俾地方寧謐居民安堵以為久安長治之計方好爾等勉為之欽此臣思梁山冕山普雄等處皆仰仗皇上天威巳將賊首金格等擒獲其餘生熟番黨種類繁多現在勒兵𠞰撫加意化導以為一勞永逸之計至於烏蒙土府祿萬鍾獻印歸誠其所管部落夷民現經委員清查户口宣布皇恩漸次招回復業但烏蒙界連滇黔其分畫疆界改土設流請增文武員辨以資撫綏彈壓及一切善後事宜臣與督臣嶽鍾琪提臣黃廷桂仰遵諭旨悉心籌畫會同雲南督臣鄂爾泰委員相度近黔歸黔近滇歸滇近蜀歸蜀懇請聖謨指示臣等公同料理務使地方寧謐以仰副我皇上愛養夷民永靖邊疆之至意臣欽遵諭旨緣由謹繕摺覆奏以聞謹奏烏蒙鎮雄歸滇管理巳有旨矣若分隸兩省殊覺有彼此不便處知之同日又奏為敬陳蜀地民情設立清查隱糧之法仰祈睿鑒事竊臣荷蒙聖恩擢授四川巡撫於上年十一月二十七日抵任前撫臣法敏隨交臣條奏一封摺奏二件臣跪讀硃批仰見我皇上宵衣旰食無刻不以民依為念臣敢不益竭駑駘留心體察惟是地方情形一時未能周知何敢冒昧瀆陳因博加採訪近始略有見聞謹抒管見臚列八條為我皇上陳之一朋名納糧之田宜分界立户也一紳襟大户宜令倡先首增也一糧户宜令認懇荒田也一爭告田地宜按名丈量也一地棍脅衆阻撓宜從重治罪也一道府不善董率宜嚴加處分也一現任州縣衛所之優劣宜加勸懲也一委員協理以期成效也以上八條惟就蜀地民情清理蜀田欺隱思效芻蕘一得之愚冒昧陳奏是否允協伏祈皇上睿鑒批示欽遵奉行所有原摺三扣一併恭繳臣不勝惶悚待命之至謹奏將此條奏發交憲德令其詳議題請該部知道同日又奏為奏聞蘷關收過稅銀數目事竊臣於抵任後卷查前任撫臣法敏題覆蘷州府關稅疏稿內稱每年實止收銀二萬二百九十七兩零請為定額等語臣細加訪察僉云不止此數若仍交該府喬鐸收報其實在贏餘數目斷不能盡行報出臣即與督臣嶽鍾琪會委原任東川府知府周彬協同臣親信之人哈大任前往止於蘷關一處徵收並未另設稅口自本年正月十九日接收起至閏三月初九日止計八十日巳據周彬等陸續報收稅銀二萬兩有零雖聞每年六七八三個月江水泛漲上下客船稀少貨稅不及春冬二季然臣以現報之數計算則每年贏餘不但大浮於喬鐸所報之數亦浮於劉天觀所報之數矣所有喬鐸欺隱稅銀巳水落石出業經督臣會同臣題參在案今將周彬收過八十日稅銀數目繕摺奏聞至於成都廣元閬中雅州敘永監理蒲江遵義等處稅口臣逐一訪察俱有欺隱現在徹底清查毋許絲毫隱匿俟查明各關徵收實數具疏題報理合一併奏明謹奏蘷關欺隱之弊汝二人稽查精細辦理妥協巳有旨矣同日又奏為據實奏明事竊臣抵任後查得巡撫衙門每年向有各稅規條糧耗規鹽茶耗規共銀三萬九千五百六十兩零以為養廉但臣受恩深重何敢多取餘資以肥囊槖今除成都遵義雅州廣元蒲江五處稅口臣現在嚴飭清查儘收儘解毋許再有欺隱所有各處稅規銀共九千五百九十二兩零又布政司繳續補各稅規七百一十兩俱經臣革除併入正項再富順縣歷來多發墨票販賣私鹽是以巡撫衙門每年有規銀一萬四百兩之多今該縣朱緇衣經臣糾參現在候旨審擬臣復嚴飭署員逐一清查請引增課所有規銀亦經臣革除外尚餘布政司繳條糧耗規銀六千六百六十兩按察司繳鹽茶耗規銀六千五百六十四兩又榮經縣茶規射洪遂寧蓬溪南部雲陽五縣鹽規共銀五千六百四十兩以上通共存銀一萬八千八百六十四兩零仰籲皇恩留為微臣養廉以及賞犒之用此外一切陋規悉行革除並無絲毫隱匿自干罪譴臣謹繕摺奏明伏祈皇上睿鑒謹奏知道了將此奏與憲德看令伊知之伊任內所奏養廉之數亦令其明白説與汝知同日又奏為覆奏事雍正五年閏三月二十一日新任提臣黃廷桂面交皇上所發程如絲奏請成都府分設直隸州一摺到臣臣查程如絲所奏改茂州為直隸似屬妥協但灌縣逺去茂州三百里離成都府僅一百二十里且該縣有江都一堰為成都新繁新都金堂溫江灌縣郫縣等邑取水之源灌溉田畝每歲必藉各縣協力修築而以灌縣董其事若將灌縣分隸茂州則事多隔越堰務掣肘以臣愚見似應照舊歸成都府管轄為便其餘可否改設之處臣巳檄行兩司查議俟覆到之日即會同督臣嶽鍾琪悉心確議恭疏題請伏候睿裁所有奉到原摺理合恭繳謹奏灌縣仍隸成都之議是所奏知道了同日又奏為奏明事竊臣查定例楚民入川落業者令地方官俱給印照驗放近有自福建江西廣東來者既無執照可憑而從湖廣入蜀者亦並無照據臣思窮民挈眷遷移若因其無印照即勒令回籍必至流離失所然任其接踵而來又恐姦良混雜致滋事端臣是以一面飛飭各屬令其查明丁口編入保甲安插地方一面移咨各省撫臣嗣後來川之民均照定例令地方官給與印照以便稽察等因在案但今據蘷州府屬縣報稱湖廣福建江西廣東民人來川者較前更多且有遊手好間不安本分之人甚難稽察等語伏乞皇上敕下湖廣福建等省撫臣凡入川落業窮民令各該地方官給以印照到日即繳四川地方官衙門安插入甲庶姦良可以稽察而地方得以寧輯矣為此具摺奏聞伏祈聖鑒謹奏九卿速議具奏雍正五年六月二十四日湖北巡撫臣馬會伯謹奏為奏明事竊臣荷蒙聖恩調補湖北巡撫聞命之次具疏恭謝天恩並將印信送交新任撫臣憲德收受視事業經臣題報在案所有未完欽部各案件以及地方一切事宜臣俱遵旨交代清楚而湖北事務憲德亦一一説明且奉旨會審程如絲販鹽殺人一案欽差刑部侍郎臣黃炳巳於六月二十一日會同臣等具題則公同審理之事巳完臣應遵交代清楚再赴湖北新任之聖旨現在束裝除起程日期另疏題報外理合繕摺奏明伏祈皇上睿鑒謹奏前覽奏謝疏內因未見爾有擬赴新任之語以為正在等候指示所以又有交代清楚再赴湖北之諭旨也今覽此奏知道了同日又奏為敬繳硃批奏摺恭謝天恩事竊臣前奏繳硃批諭旨一摺荷蒙皇上訓誨詳明又蒙聖恩賞賜各種珍藥一匣臣隨恭設香案望闕叩頭謝白説與憲德并造册移送矣為此繕摺恭謝天恩并繳硃批伏祈皇上睿鑒謹奏覽雍正五年九月二十三日湖北巡撫臣馬會伯謹奏為奏明事竊臣荷蒙聖恩調補湖北巡撫於本年八月二十二日抵任知湖北咸寧等縣衛地方夏間稍被水災我皇上念切民瘼特頒諭旨將本年錢糧全行蠲免萬民戴德四野歡呼其沿江各地方目今氷勢漸次消退自八月二十九日至今天氣晴明省城新米時價每石題報務使均沾聖澤再查各省稅課銀兩蒙我皇上特沛寬大之恩準令各處將實在數目自行出首其從前多收之處免其究問欽遵在案臣到任後即案查署撫臣福敏題報荆關稅銀疏稱行令接管荆關稅務之驛鹽道柳國勳查明一年羡餘銀兩數至一萬兩有零等語今柳國勳巳升任江西按察使需員接管臣查有襄陽道趙之均為人廉謹辦事尚屬實心臣巳委該員赴關經收如果潔己奉公絲毫不茍除福敏題明每年羡餘之外再有贏餘臣即據實另行奏聞昨臣從四川水路赴楚安陸漢陽沔陽沿江各州縣地方水勢瀰漫侵淹田畝皆緣兩岸堤塍築土不甚髙厚是以易致坍塌案準部咨奉旨湖南湖北或有堤岸未修或有疏濬不力務須設法經理俟邁柱到任後會同湖北湖南巡撫悉心商酌將如何興修防護之處速議具奏欽此署督臣福敏現在會同微臣分委道府各員將應修工程周歷勘明逐一確估公同繕摺睿裁遵行合併聲明謹奏所奏俱悉雍正五年十一月二十一日湖北巡撫臣馬會伯謹奏為奏聞事竊查湖北水郵額設有紅座船沙唬船宣樓船共九十隻以應往來勘合差使又各船定例三年小修五年大修十年拆造其一切工費並各船水手一千一百二十二名每歲共支工費銀九千一百二十兩俱於驛站庫項內支銷臣抵任後細查歷年撥給船隻卷案自雍正元年至四年以來一切差使通共止撥用過船一百隻緣往來雖有勘合差使大抵由陸路者多由水程者少是以每歲撥用甚屬寥寥經年灣泊河干日暴雨侵朽壞尤速況修艌拆造水手工食按例支銷為費甚巨以有用之金錢徒虛糜於無用之地殊為可惜臣以額船九十隻似可裁去四十隻存留五十隻巳足供應差使再查本年有拆造屆期之船三十二隻應停其拆造歸入應裁數內尚有應裁船八隻臣一面檄行驛鹽道髙淳查明具報總以不糜題請裁減以省糜費理合先具摺奏是否可行伏祈皇上聖鑒批示謹奏覽同日又奏為奏請聖諭事竊臣查湖北所屬武昌漢陽荆州黃州等府沔陽江夏漢陽嘉魚江陵黃岡等州縣地廣民頑最稱難治今現任府州縣以及命往湖北試用人員內其才能辦事者固不乏人而庸懦無才不能理繁治劇者亦復不少且今歲咸寧等處略被水災荷蒙皇上特恩將錢糧全行蠲免尤在良有司仰體聖心加意撫恤又自十一月起至明春三月十五日止遵旨散賑全賴賢能各員實心料理再沿江堤塍奉旨興修臣現在飭委道府勘估轉瞬興工更須州縣承修辦理以圖久安之計則是在在需員而現任以及試用人員實不敷用伏祈皇上於候補候選同知通判州縣人員內敕發年力精壯才具優長者十員來楚同現在命往人員一例試用效力其現任各府州縣內臣察其才具之短長酌量地方之繁簡彼此調用以觀後效至科目出身之員有不勝州縣之任而年力尚未衰邁學問不致荒疏者臣遵例題請改教使之各效其能各竭其力於吏治民生均有裨益為此繕摺恭請睿裁批示遵行謹奏知道了但人材甚難得現今為川省丈量地畝揀選尚在乏員若將平常庸碌之輩命往充數反致誤事候得人時發來以敷爾用可也硃批諭旨卷三十一上欽定四庫全書硃批諭旨卷三十一下硃批馬會伯奏摺雍正六年二月十七日湖北巡撫臣馬會伯謹奏為奏請睿裁事竊據容美土司田旻如申稱桑植協副將暨桑植軍民府檄開桑植人民從前為容美司虜掠飭照單內所開户口委舍把護送各歸故土樂業緣由到職查職司與桑植地接鄰境從前纍有雀角彼此邊民逃竄遷移者有之逮後俱經排解審明退歸今桑植協來文粘單姓名職司俱無可考又不知某人係何年虜去從何稽查即現有人在職司亦俱納糧安業等情又抄册內開桑植民人二百六十六户共計男婦一千三百五十六名口等情到臣又準湖南撫臣王國棟咨開桑植土司殘虐其民蒙皇上改土為流欲使出水火而登衽席今副將楊凱嶽州額外同知鐵顯祖既經查明容美土司昔年虜去桑植人民千有餘口該土司自應遵照護送回籍未便任其飾掯應請嚴檄飭查等因到臣臣理應嚴飭該土司即查明人口送歸桑植以安戢邊氓但臣查永順桑植等土司俱沐聖朝德化先後歸誠蒙我皇上再造洪恩準其改土歸流斯民悉登衽席官兵初集其營房一切事務現在料理尚未完備而土民新附正須撫恤寧謐之時此項人口臣愚以為或俟營制安定人民綏輯諸事妥帖之後臣先申以功令諭以大義勒令送歸桑植以仰副我皇上愛惠邊民之至意倘田旻如仍怙終不悛猶復支吾延緩臣即據實奏聞請旨辦理是否可行仰祈聖鑒批示謹奏從容辦理之見甚是此事應當徐徐詳審而為之者田旻如受朕恩深厚料必知改悔從前之過斷不敢支吾延緩也同日又奏為奏聞事竊查湖北地方仰邀皇上福庇臘雪連降足徵瑞應入春以來風雨甚屬調勻是以二麥豆菜等苗俱皆暢茂條逹春花可卜豐收目今米價上米每石一兩一錢五分一兩二錢不等中米一兩五分一兩一錢不等下米九錢五分及一兩不等再查去夏被水就食湖南及四川等省窮民臣先嚴飭各州縣加意招徠并會同督臣邁柱委員齎銀分往湖南四川等省招還復業近據興國大冶蒲圻江夏咸寧沔陽潛江等州縣呈報陸續招回户口清册到臣臣思窮民既經回籍尤當盡心安集毋令失所臣復嚴飭各州縣加意撫恤以仰副我皇上愛育元元之至意理合一併奏逹上慰聖懷謹奏覽奏雨雪情形及招回窮民復業之處深慰朕懷雍正六年三月初七日湖北巡撫臣馬會伯謹奏為奏聞事竊查前任湖北驛鹽道今升江西按察使柳國勳於驛鹽道任內兼收荆關稅銀指稱差人巡察各稅口名色每月添設使費銀二百兩管理七月有餘共計開銷銀一千四百兩零盡入私槖現據臣委收荆關稅務襄陽道趙之均口稟巳將此項名色革除其銀併入正項解庫又柳國勳於應得養廉之外每年復受鹽商船禮引禮樣鹽禮以及批查等項陋規銀約八千餘兩在任三年零七個月共計受銀二萬八千餘兩且聞柳國勳於支放水陸驛站工料銀兩俱有剋扣事事存私利己毫無公忠為國之心再現任驛鹽道高淳職司鹽驛事務其柳國勳所受鹽商陋規銀兩該道知之甚悉既不秉公揭報又不詳明歸公遊移觀望志在踵行至柳國勳剋扣工料銀兩亦不查明詳揭更不知其何心且年少性躁舉止輕佻政務多有未諳辦理甚屬懈弛實難勝此巨任理合一併據實奏聞伏祈皇上睿鑒謹奏如此毫不瞻顧據實直陳甚屬可嘉巳有旨矣但屬官中遇有新進初仕之員事務雖未諳練其居心才幹尚可取者當加教導容其改悔毋因小疵微瑕遽令廢棄如柳國勳者一無可取之處便係大員豈容姑息理應如是參奏况密摺具奏非疏參可比朕裁酌之後應施行者即可批發應諭汝姑寬者亦自當訓示也領悉朕意勉為之同日又奏為仰籲聖恩敕發賢員以肅吏治事竊臣以湖北修築堤塍需員料理奏請人員荷蒙皇上俞允整飭臣於抵任後凡屬員接見靡不諄諄訓誨冀其各自勉勵無如積習既深兼之賢員實少一時難以振作臣夙夜憂心悚惶無極伏思有治人無皇上睿鑒批示欽遵謹奏候州縣缺者現得三人似堪造就驅策有旨諭部發來試用看至於候府缺者實難得人目下陜省請發同知三員尚未得有一人亦於微員中揀選發往矣覽汝此奏殊不諒朕用人之苦衷盈篇議論悉屬畫餅充飢之謂也雍正六年四月二十二日湖北巡撫臣馬會伯謹奏為恭繳硃批奏摺事竊臣前兩次繕摺祗奉硃批謹將原摺恭繳伏祈皇上睿鑒一件為奏請睿裁事臣以容美土司昔年虜去桑植人民請俟永順桑植等處營制安定之後勒令追出等因具奏奉有硃批臣仰遵諭旨徐徐而行更當詳審不敢冒昧從事以仰副我皇上綏輯邊氓之至意一件為奏聞事臣以前任湖北驛鹽道柳國勳貪婪等事具奏奉有硃批臣嗣後當仰體聖心愛惜人才凡新進屬員內有才幹可取者務必委曲教導俟其改悔不敢即令廢棄倘有如柳國勳者臣具摺奏聞斷不敢姑息以負我皇上委任之至意一件為仰籲聖恩敕發賢員等事奉有硃批臣跪讀之下悚惶無極伏思臣以邊鄙武人荷蒙皇上天恩擢用巡撫理應仰體聖心事事期於允當而吏治尤為急務今所屬各府州縣中雖少賢員亦應念人才難得汰除庸劣鼓舞中材造就成全以收實效乃好員如蔣景濂高淳者臣竟以微瑕劾奏不加愛惜輒復摺請人員上瀆帝聰冒昧之罪實所難逭我皇上不即加譴責格外優容訓誨周詳委曲教導臣感激隆恩不禁泣下自今以後惟有凛遵聖訓於本省屬員中多方訓誨策勵中材保全幹員為國家作養人才以仰答皇上諄諄訓諭之恩於萬一耳所有奉到硃批奏摺合併恭繳伏祈睿鑒謹奏治天下之道惟在用人一事若不能表率屬員甄别優劣又無術以鼓勵造就之則非封疆才也今直省督撫中亦止田文鏡鄂爾泰李衛朱綱數人能之耳其餘皆屬不及至汝不過自了而巳率屬之道殊未克盡於此當竭力勉之田文鏡參官最多鄂爾泰從不輕劾然二人皆各有道非若汝等不思秉公察吏但欲迎合朕之意向朕之意向無他總期爾等激揚允協察吏有方耳不審輕重概從嚴刻朕與下吏有何嫌恨不論巨細概為姑息朕與微員有何私昵總之立心根本處不清遇事非過則不及傳云心有所好樂則不得其正何况利害榮辱趨避迎合雜念紛紜填塞於胸中而欲用得其正必無是理用既不正而欲動作云為是當妥協更無是事也所以云但當棄末而返本不可隨朕一時命他人之訓諭惑自巳之主見朕所降諭旨率皆因人因事權宜而發或合於彼而違於此抑或行於此而泥於彼要須圓融體會豈宜膠柱鼓瑟設或自信不及亦安能信朕君臣之間尚未能相信將何道以平治天下耶言及此而不於根本處推求可乎所謂根本者亦祗此秉公二字然非致身與國不少為利害榮辱動搖者必不能督撫之責非侍衛總兵之可比若無大臣休休氣度潔己自了輩曷克勝任汝試自省根本立心處果毫無差謬實因才力所限而然則宜勤以補拙博採廣求借衆力以為力資羣才以為才焉有不敷所用之理況督撫統馭羣僚又非資借無人採訪無地也雖然一私能蔽百明假使不公不誠豈但不能見諸施行即朕此篇訓諭當亦不解是何謂也汝其勉之將此諭併前諭俱與總督邁柱看兩司亦密與觀之同日又奏為奏聞事竊臣查得武昌漢陽二府屬二麥收成八九十分不等米價每石一兩及一兩一錢不等黃州府屬二麥收成八分九分不等米價每石自八錢五分起至一兩一錢不等安陸府屬二麥收成八分九分不等米價每石一兩一錢德安府屬二麥收成約有八分米價每石自九錢起至一兩一錢不等荆州府屬二麥收成約有八分米價每石一兩及一兩一錢不等襄陽府屬二麥收成八分九分不等米價每石一兩及一兩五分不等鄖陽府屬二麥收成約有八分米價每石自八錢起至一兩一錢不等再目今雨水各屬盡皆霑足禾苗巳經栽插一半理合一併奏聞仰慰聖懷謹奏覽爾等督撫但能勤勉吏治實心任事以綏輯兵民則上天必錫瑞應乃自然之理分毫不爽者也田文鏡蒞豫以來三載大有非明驗歟勉之勉之刑名平允尤為切要毋忽雍正六年六月二十八日湖北巡撫臣馬會伯謹奏為奏聞事臣查湖北所屬自入夏以來雨暘時若四野霑足是以早禾收成有八九分不等至於晚禾現今暢茂雨水甚屬調勻大有可以預卜再武昌漢陽二府米糧時價上米每石八錢中米七錢下米六錢及五錢四五分不等且目今米石充溢市㕓小民日食自可無虞矣為此具摺奏聞仰慰睿慮謹奏覽奏深慰朕懷果勤勉吏治秉公考績以安黎庶上天之昭錫嘉徵朕可力保也勉之雍正六年九月初四日湖北巡撫臣馬會伯謹奏為欽奉上諭事竊臣於雍正五年八月內準禮部咨開浙江撫臣李衛奏請西湖行宫改建廟宇延僧焚修上用物件解送內庫等因奉旨李衛所奏甚是其餘地方有行宫之處如何辦理方為妥協著該督撫會同該管官悉心商酌具奏請旨該部知道欽此移咨到臣隨行布政司欽遵悉心酌議去後嗣據該司詳稱武昌省城行宫向因恭聞聖祖仁皇帝幸楚預行建立嗣緣未蒙臨幸並未建造完備亦無貯物在內然宫殿宛然現在敬謹看守凡遇萬壽聖誕以及長至元旦令節各官於此朝賀并稱現今修飾整齊將來縱有補葺需費無幾請照舊撥在官人役看守凡遇聖誕令節仍於此內朝賀等情經臣會同督臣邁柱咨部在案兹於雍正六年八月十七日準部咨覆湖北省城行宫該撫未經具奏不便遽議行令具奏請旨并將行宫內果否無存貯物件詳查報部等因到臣隨轉行布政司遵照詳查去後今據該司詳據武昌府轉據江夏縣詳稱省城行宫係康熙四十五年建設嗣因未蒙聖祖臨幸並未建造完備當日原無存貯物件請照舊看守以為朝賀公所等情到臣臣查武昌省城行宫歷係撥人看守並無存貯物件既據查明酌議請照舊撥在官人役看守凡遇聖誕令節仍俱於此朝賀實屬妥協除將並無存貯物件緣由咨明禮部外相應據詳具奏請旨伏乞皇上睿鑒批示欽遵施行謹奏既係聖祖未經臨幸之地遵旨改為廟宇延僧居住可也同日又奏為奏聞事竊查湖北八府所屬入夏以來雨水調勻中晚二稻通計約有七八九分收成不等米價每石七八九錢不等黃豆每石七錢至八錢四五分不等大麥每石二錢至三錢五分不等小麥每石六錢至七錢四五分不等理合據實奏聞仰慰聖懷謹奏覽晚稻收成及米價情形曷勝欣慰前邁柱自江西赴楚督任朕曾諭伊汝到湖廣果能抱此赤衷不移上天明年若不賜以嘉應想無是理今果符朕言爾面詢之當共相警惕勉之又勉愼之又愼可也雍正六年十一月二十六日湖北巡撫臣馬會伯謹奏為奏聞事竊臣賦質庸陋歷任武途錢榖刑名素所未悉仰荷聖恩命撫四川旋調湖北任事以來伏讀欽頒定例酌乎天理愜乎人情盡善盡美無以復加如臣愚昧安能復參末議仰贊高深然竭慮殫思愚見所及未敢隱默所有刑名數條謹繕摺敬呈御覽一盜贓宜勒限追賠以償失主一捕役帶盜投首不準寬減以杜欺飾一存留養親之案應各解審以防揑飾一誣告人命不得輕準攔息以警刁風一洗寃録宜重加核閲以期畫一以上五條是否可行伏乞皇上睿鑒施行謹奏九卿詳議具奏雍正七年正月二十六日湖北巡撫臣馬會伯謹奏為奏聞事竊照湖北各屬去歲豐收人民熙皥兼之十二月十五十六兩日及今年正月十六至十八日省城瑞雪連降積有尺餘兹據各屬稟報同日亦皆得雪不但春熟可望且可預卜有秋此皆我皇上精誠昭格致此休徵是以鑿井耕田之儔盡戴堯天飲和食德之倫欣依舜日理合具奏仰慰聖懷謹奏慎毋縱恣爾志今農事伊始惟宜敬以待之至秋成後方可言豐登也似此矜肆之言朕不但不敢出之於口實不敢默存諸心也同日又奏為奏覆事竊臣於雍正五年九月內曾繕摺奏明荆關稅務委令襄陽道趙之均經理徵收如該道一年所收羡餘銀兩溢於柳國勳所報一萬二百兩有零之外即據實另奏等因今查趙之均接徵關稅巳滿一年除收過正稅外其羡餘銀兩較之柳國勳所首巳多收銀三千二百兩有零俱經臣按季兌明發貯藩庫訖臣復飭委該道管理並諭益加勤愼殫力辦公仍行儘收儘解以仰報皇恩於萬一其柳國勳所首未實之數統於欽奉恩旨再限一年首報案內查核具題伏祈皇上睿鑒謹奏覽念柳國勳乃忠臣後裔毋得過於苛刻搜求雍正七年三月二十日湖北巡撫臣馬會伯謹奏為恭繳硃批奏摺事竊臣前以省城瑞雪連降預卜有秋等因具奏奉有硃批臣不禁悚惶無地我皇上敬天勤民精誠之念昭格天庥之至耳又臣前以荆關一年所收羡餘數目具奏奉有硃批查荆關稅務臣委襄陽道趙之均管理徴收因所收羡餘銀數浮於柳國勳所徵臣是以據實奏聞今蒙硃批奏摺合併恭繳謹奏覽同日又奏為奏明事竊查楚屬之棗陽縣與豫省之唐縣地方毗連今於本年二月內據襄陽城守營遊擊陳明道及襄陽府知府尹會一稟據防守棗陽縣把總稟稱正月初十日見寺莊店廟牆上有帖一紙上云飢民借糧等情續於十二日有唐縣民人王世功與棗陽縣民人遊明逺素有嫌隙率衆強借糧食經棗陽縣知縣邱彥升關移唐縣現在查拏而揭帖內臚列曹傑刁瑛等姓名據唐縣關覆並無其人等情各稟報前來又經遊擊陳明道親往查明棗邑地方現今相安無事除再星飭該地方文武嚴加防範綏輯民人外臣恐流傳致厪睿慮理合將據報唐邑民人強借棗邑民人糧食并地方業巳安靜緣由具摺奏明伏祈聖鑒謹奏越境強借糧食甚屬不法亟應懲治以警刁頑巳另旨飭諭督臣邁柱移咨豫省嚴察矣雍正七年四月二十九日湖北巡撫臣馬會伯謹奏為奏聞事竊查武昌府屬大小二麥俱約有九分十分收成秧苖俱巳滋長有水之處現在栽插無水之處於本月初八二十二等日得雨亦可插蒔上米每石九錢七分中米九錢三分下米八錢八分至漢陽黃州安陸德安荆州襄陽鄖陽歸州各屬二麥收成約自六分起至十分不等雨水調勻秧苖現在栽插其上米每石九錢六分至一兩零五分不等中米八錢五六分至九錢一二三分不等下米七錢六七分至八錢七八分不等理合據實奏聞仰慰聖懷謹奏深慰朕懷同日又防範務期盜戢民安仰副我皇上惠愛元元之至意詎意黃州府屬之州縣盜案頻頻而黃岡一邑自雍正五年二月至今先後通報未結之案七十餘件尚有自雍正二年五月至六年六月未經通詳積案八十餘起其中有強有竊皆由前任參革知縣張光裕樊大元玩愒所致兹據署任知縣賈多男册報前來臣與督臣邁柱現在嚴行按察司逐一確查其未經通詳案件分别竊劫緝追題參至巳經通報未結強竊案件內有查係劫案業經臣同督臣先後照案會參文武疏防并嚴飭緝究外理合將會飭勒緝緣由繕摺奏聞再查黃岡一邑盜案獨多者雖由該令之罷玩無能亦因無大員駐劄彈壓以致該令無所顧忌任意懈弛隱諱且該邑附黃州府郭為上江豫省接壤之區五方雜處最易藏姦查黃州一郡係武昌道兼轄而該道駐劄省城省會既有督撫藩臬糧鹽二道以及武昌江夏守令同駐一城則武昌一道似可移駐臣與邁柱酌議請將該道駐劄黃州府城稽察該邑並所屬各州縣盜案如有諱盜等弊立即揭報請參庶稽察既嚴州縣各官自必上緊緝捕盜風可以漸息矣臣愚昧之見是否可行伏祈皇上睿鑒批示欽遵謹奏該道移駐黃州之處與邁柱酌議若意見相同令邁柱具疏題請同日又奏為請旨事竊臣前以湖北堤工需員協理具摺奏請隨準吏部咨開奉旨傅百揆楊高士劉應褒王純如張其維湯應求趙楠徐成信于執中馮凌霄等十員命往湖廣辦理水利事務伊等俱係中材行文馬會伯試看如何酌量題補如不實心效力著出具考語送部請旨欽此等因到臣臣即欽遵將傅百揆等分派各屬堤工令其效力今堤工告竣查傅百揆等在工俱能上緊搶修完固不辭勞苦實心效力自應遵旨題補但堤工事務該員等雖能辦理而錢榖刑名恐有未諳必須委署試用始克知其勝任因未奉委署試用之明旨臣不敢冒昧今除王純如丁憂劉應褒報故外仰祈皇上將傅百揆等八員俟有知縣及知縣以下缺出容臣委署試用如該員等果能於錢榖刑名實心辦理允稱職守臣即會同督臣邁柱酌量題請補授庶於地方民生均有裨益伏乞皇上睿鑒批示施行謹奏應將傳百揆等先行委署試用至補缺時著邁柱題請可也雍正七年五月十一日湖北巡撫臣馬會伯謹奏為奏聞事本年五月初一日據黃州協稟報黃岡縣羅湖洲地方忽生蝗蝻隨即多帶目兵親赴該洲設法撲滅等情并據黃州府黃岡縣稟報會同營將齊往彼地捕捉等情臣等即飛飭文武各官多帶兵役民夫火速撲滅務期淨盡又委武昌守道徐聚倫齎帶銀兩星往多雇人夫督率撲捕毋致蔓延各去後臣等細查羅湖洲四面皆係大江且洲地蘆葦居多即有種麥之處於蝗蝻未出之先大麥巳盡登場小麥亦多收穫未收之麥為數無幾洲民一見生蝻隨即盡行搶割尚屬無害今數日內節據各官報稱多方撲滅袋裝坑埋火焚者合計巳滅大半併有停抱蘆枝自斃者甚多臣等復飭該道將府縣作速盡行撲滅并行查此外地方有無生發另行奏報外謹將現在情形會同督臣邁柱合摺奏聞伏祈皇上睿鑒謹奏據奏黃岡忽生蝗蝻當飭令該地文武極力撲滅毋因二麥巳經刈穫少涉疏慢致令生翅飛騰則為害甚大汝等亦獲罪不淺也其嚴加督率務令淨盡毋遺餘孽勉力為之雍正七年五月二十日湖北巡撫臣馬會伯謹奏為恭請聖訓事竊臣準吏部咨奉旨馬會伯著前往肅州辦理軍需一切與督撫等公同計議而行即帶管肅州總兵印務欽此臣即將巡撫關防等項咨送督臣邁柱署理并起程日期恭疏題報在案伏思軍需事務關係甚巨臣才識短淺誠恐辦理未能周詳實深悚惕理應馳赴闕廷恭請摺陳請伏祈皇上恩賜訓示俾臣有所遵循得以竭盡駑駘圗報聖主隆恩於萬一為此謹奏此番軍需皆大將軍嶽鍾琪所辦理逐件俱巳妥協汝至肅州一一詳細詢明遵循指授實力行之若請朕之訓示除此數句批諭之外無可訓示也勉為之雍正七年閏七月十八日協理西路軍需湖北巡撫臣馬會伯謹奏為奏聞事臣奉命赴肅辦理軍需即帶管肅州總兵印務前在湖北具摺恭請聖訓今於陜西途次接到臣家人齎回奏摺奉有硃批臣跪讀之下不勝感激臣於本年閏七月初十日到肅隨即料理應辦事件俟大將軍臣嶽鍾琪到肅將所辦軍需事件交送到臣臣恪遵訓旨一一詳細詢明聽其逐件指授臣自當實力奉行凡遇軍需重務與督撫等公同計議悉心辦理惟期竭盡駑鈍敬謹黽勉以仰報我皇上委任之天恩於萬一耳其一應軍需事件俟大將軍嶽鍾琪交到之日臣應另具摺奏所有臣到肅日期合先奏聞謹奏一切悉照大將軍嶽鍾琪指授殫心竭力辦理不可自用聰明如有所見不同處將兩意備悉陳明請旨而行則可倘所辦理與大將軍原議竟至互相齟齬日後查出則為有心之過朕不輕貸也勉為之此任朕屢經斟酌委用滿員恐與嶽鍾琪掣肘若委文吏則能諳軍機實心任事者甚少再四躊躇然後委託於汝慎勿有辜任用况事關重大稍為身家利害計存瞻顧推卸之心必不能件件妥協要須徹底看透立定堅忍不拔之志而周詳措置庶幾有濟於事也雍正七年八月二十五日辦理西路軍需湖北巡撫臣馬會伯謹奏為奏聞事竊臣赴肅辦理軍需業將到肅日期具摺奏聞兹於閏七月二十日大將軍臣嶽鍾琪到肅二十一日臣仰遵訓諭逐一詢問大將軍臣嶽鍾琪令臣催督現在出口官兵以及糧運兵車等項其一應軍需案件尚未交送俟交到之日臣另具摺奏查十二起出口官兵業經大將軍臣嶽鍾琪派定先後奏聞在案臣惟照派定起數催令出口今於八月二十四日固原提督臣紀成斌帶領十二起官兵巳全數出口矣所有官兵出口日期理合繕摺奏聞謹奏出口官兵皆係派定先後陸續按日起程者今下催令二字不知汝具何意見殊屬可笑之至似此矢口亂道心昏神昧或冥默中有獲罪鬼神處俱未可定當返身思過痛自悔艾朕見類此者頗多心一惶惑中無主宰過謬錯誤遂相繼而至不可不知也若不警惕內省亟圖遷改將來無所底止矣雍正七年十二月初十日辦理西路軍需湖北巡撫臣馬會伯謹奏為恭繳硃批奏摺事竊臣前將到肅之日隨即料理應辦事件一一敬聽大將軍臣嶽鍾琪指授並與督撫臣計議悉心辦理等因具摺奏聞奉有硃批臣跪讀之下不勝感激敬遵諭旨一一照大將軍臣嶽鍾琪指授實心辦理並無意見不合之處倘事件稍有可否臣即咨呈大將軍先為酌奪復與督撫公同計議協和辦理務期於軍需有濟但臣智識短淺辦理未周實不能免若自用聰明為身家計利害存瞻顧推卸之心作不勉奮勵以仰報我皇上委任之天恩於萬一耳所有奉到硃批理合恭繳謹奏覽同日又奏為奏聞事竊查西路軍需業經大將軍臣嶽鍾琪逐欵斟酌條奏明晰於雍正七年九月初三日移送條欵册到臣當即會同督撫並檄行司道各官遵照辦理除將臣自閏七月初十日到肅以來所有辦理過各事宜另摺分析奏聞外伏查各項事件大將軍臣嶽鍾琪總理大綱籌畫周詳而承辦各官率多奉行不力致有遲誤之虞敬為我皇上陳之如駝隻一項國帑攸關且係軍糧要務管押官辨理宜徐徐解送早至甘涼歇息調養量駝隻之大小試鞍屉之寬窄從容整備俟大兵起身隨起馱運庶與軍需有濟乃承辦各官不知預為籌謀自寧夏解赴甘涼晝夜奔馳趕走太急且鞍屉造不如法大小厚薄不一以致壓傷疲斃擦掌寄留者纍纍查有肅州鎮標左營守備張文琚者偏執冒昧在廣武營遊擊王翰京挑剩駝內情願牽領六百隻挽運糧石沿途疲乏寄留以及倒斃通計所領之駝到營者不過三分之一再查甘州城守營參將查爾扈領運三起出口駝一千二百九十隻除沿途疲乏寄留倒斃外到營者尚不及半再查定邊協副將趙顯忠統領八起出口駝一千四百七十一隻除沿途疲乏寄留倒斃外到營者僅有一半似此怠忽從事不慎重軍需莫此三員為甚應俟凱旋之日查明分别追賠以為誤公者戒至於各處寄留牧放駝隻臨冬收槽餧養查肅州地處極邊料豆出産無幾在臣愚見肅州駝隻趕解甘州餧養甘州駝隻趕解涼州餧養涼州駝隻趕解寧屬之附近中衛縣餧養一轉移間既可就餧料草又可不致逺涉明春就便馱載亦無奔馳之患隨即飭行鞏昌布政使轉飭涼甘府縣採辦料豆俟駝隻到日以便飼餧乃甘撫臣許容自肅回蘭路經涼州與藩司孔育璞酌議俱以寧西地方存有舊日軍需案內餘剩料草可以飼餧將留牧暫息之駝復趕解於一千數百里之外疲乏者更復不少明春馱運又從寧西趕解甘涼裝載馱運長途往返難免疲斃况今甘涼肅現有留餧駝隻料豆亦非外處挽運當日若在甘涼肅餧養無往返奔馳之勞則蓄力長驅可免疲斃甘撫臣許容藩司孔育璞不依臣言祗圖就養餘剩之草料而不惜帑金採買之駝隻今在寧西雖巳加料餧養而猶時報倒斃臣恐經理之員不善調養復派熟識駝性辨員前赴飼餧在案再查豫晉採買騾七千頭陜甘採買騾六千頭據鞏昌布政使孔育璞詳據鞏昌府知府高夢龍詳稱西安解到騾頭內多有疲瘦病廢緣由到臣臣隨即嚴飭西安原辦官另買健騾照數補換去後又據西安布政使張廷棟詳稱所解騾頭豐裕料草加意餧養俱屬臕肥好騾該府朦混妄報等語互相詳辨明係辦理各官不慎重軍需加意飼餧有司不知細心料理經管大員不肯勤加稽察以致騾頭疲瘦病廢如許之多及至交收彼此卸責理宜查訊明確即行參究勒令賠償但念明春挽運之期轉瞬即至訊供須遲時日買補動經月餘必致有誤軍需臣一面咨明署督臣查郎阿陜撫臣武格甘撫臣許容並飭令西安司道等先動公用銀兩採買健騾補換一面差官秉公確查訊賠還項以為怠忽者戒再查筆帖式竒書採買抵羊牛七千九十餘隻每牛一隻抵羊五六隻不等一牛到營可抵數羊之用兼可帶運糧石其意非不甚善但不思牛隻行走終難比於馬騾長途趕解未至甘涼疲乏巳極至今一牛不能到營可見買牛抵羊實屬錯誤再查署正阿納漢筆帖式竒書在鄂爾多斯採買抵羊菜馬二千四百餘匹自應挑揀有臕力馬匹庶可趕解到營以補羊項乃所買之馬多係老弱瘦小不耐冬寒雖有抵羊之名而實無一馬到營巳報倒斃者七百餘匹而報猶未巳是菜馬之誤實與菜牛相等也再查解到侍郎臣顧魯在歸化城採買馬四千一百餘匹並延屬採買馬六百餘匹道路遙逺及至趕解甘州疲瘦甚多臣咨移甘提派撥辨兵在甘屬之大草灘黑城有好水草處加意牧放漸至寒冬水凍草枯除挑剩拴養各項馬匹外陸續倒斃者二千七百九十餘匹至於隨軍戰車三千輛道路遙逺輪輞輻軸非選擇木料至堅至剛者必不可用乃辦理各官並不揀擇多用楊柳其性柔脆一經磕硼即至損裂押解各官紛紛呈詳到臣臣一面咨呈大將軍臣嶽鍾琪一面飭令涼甘肅地方官輪加鐵瓦軸換榆木外僃車串餘軸等項催令晝夜趕造隨後解赴軍營以上數項動關錢糧而倒斃遲誤之數多實在堪用之數少皆由各官漫視軍需遲延所致若不追賠有虧國帑臣有辦理之責何敢逺怨避嫌絲毫瞻徇有負我皇上委任之至意理合據實備陳伏祈皇上睿鑒謹奏如此呶呶滿紙遂堪卸辦理之責乎殊屬可笑朕尚有何批諭嗣後若不努力向前殫心報效功名成敗猶為小事保全性命要緊愼之同日又奏為奏聞事竊臣奉命赴肅辦理西路軍需業將大將軍臣嶽鍾琪並官兵出口日期繕摺奏聞所有臣在肅已經辦理及現在催辦各事宜逐項臚列為我皇上敬陳之一戰車三千輛前經大將軍臣嶽鍾琪奏明在陜甘兩省分辦嶽鍾琪過肅與臣面商議加鐵瓦臣即檄行鞏昌布政司並飭甘涼肅等處將未經加釘鐵瓦之戰車俱加鐵瓦其已經出口未釘之戰車照式製造趕釘並外備餘串輻軸鐵丁各物以備應用隨後解赴軍營一糧車七千輛內經大將軍臣嶽鍾琪奏明將三千輛加釘鐵瓦以備進𠞰逺行更非多備餘料不可等因移咨到臣當即備行鞏昌布政司並各道等轉飭各遵照辦理在案一糧車七千輛以一車二騾計算共需騾一萬四千頭前準大將軍臣嶽鍾琪移送條奏册開豫晉二省採買騾七千頭陜甘採買騾六千頭共一萬三千頭尚不敷騾一千頭據鞏昌布政司詳議照大將軍檄飭搭配馬一千匹以足一車二騾之數至陜西解交騾頭節據鞏昌布政司詳稱每起之內不無瘸跛等病臣查此項騾頭關係明春駕車之用務須更換好騾庶與糧運有濟是以臣節經批行鞏昌布政司並咨呈大將軍及移陜甘督撫將騾頭瘸跛生病之處應於餧養原解驗收各官是問一面行令先動公用銀兩另買健騾補交在案兹準署督臣查郎阿陜撫臣武格咨並西安布政使張廷棟等詳稱此項病瘸騾頭或係鞏昌妄報或係陜屬餧養失宜及解官漫不經心之處統俟委員查驗明確分别追賠但來春挽運屆期今酌議先動撥公用銀兩買健騾一千頭委員趕解補換其用過價銀草料等項俟查明在各該員名下分析追賠等語臣查此項錢糧關係重大州縣勤惰攸分俟查訊明確容臣繕摺另奏合併聲明一西路大兵住歇巴里坤應需九箇月口糧除羊價外其粳米粟米炒麵等項俱已照數陸續催運全完並無遲誤一進𠞰十八箇月口糧前準大將軍臣嶽鍾琪條奏册開官兵跟役餘丁人等所需粳米粟米炒麵等項除車駝估運之外餘剩米九千餘石炒麵二十五萬餘斤俱應雇車運送等因臣隨行據甘涼道府將餘剩米麵俱巳全運到肅又據肅州道呈報已挽運橋灣米九千餘石炒麵現在雇車接運復準大將軍咨在於巴里坤選派餘丁三千餘名令回布隆吉住歇過冬以備明春協幫糧運車駝其餘丁並管領之千把外委等應需口糧即以運到橋灣米麵就近支食統在應運巴里坤口糧內扣除是此項餘丁官役應需十一月至三月以及接運車駝所需四月起程裹帶口糧止解布隆吉支給無庸逺運巴里坤既可節省腳價且與糧車駝隻有益等因臣隨行令肅州道遵照辦理扣運清楚以省逺運之費一甘涼西肅各鎮原餧拴養馬四千匹除摘撥今歲出口官兵馬二千一百九十七匹準大將軍臣嶽鍾琪移送條奏册內開移咨署督臣查郎阿將西安留餧晉豫二省欠臕馬一千四百餘匹趕解甘涼以補摘缺原額其不敷馬七百九十七匹交臣於口外買到各馬內挑選補足臣即移咨署督臣查郎阿提臣宋可進照議辦理在案嗣準宋可進咨已於口外買到各馬內挑選將甘涼西肅各鎮營摘缺拴養馬匹俱經補足其西安解送甘涼晉豫馬匹當據鞏昌布政司詳挑留一千匹飭發臨洮府屬州縣餧養以備明春補騾駕車之用其餘剩馬匹解送甘州交提臣宋可進酌撥等語臣查糧車馬匹亦關緊要隨批令該司加意餧養並移咨提臣宋可進如拴養馬匹撥補足數即移行鞏昌布政司將餘剩晉豫馬匹一併在於臨洮餧養務期臕壯以備應用一運糧駝隻準大將軍臣嶽鍾琪移送條奏册開原買續買駝除倒斃外共約存駝三萬四千隻臣查得巳隨大兵並陸續經臣挑選已運糧出口駝共二萬三千七百餘隻尚約存駝一萬餘隻內陸續各處倒斃駝約有千隻其疲乏病瘦擦掌破瘠中途留養現今應行估變者為數頗多正在核查約估明春可以運糧出口駝不過五千餘隻據鞏昌布政司詳稱寧西兩府屬州縣俱有存剩舊日軍需案內料草可以飼餧等情臣隨咨呈大將軍並咨商陜甘督撫照該司詳議除疲乏巳甚不能趕赴寧西餧養者即留甘涼肅三處交地方官公同營員細加挑驗將可用駝隻餧養備用若果疲傷餧養無益即為據實估變毋得糜費草料餘俱分發寧西餧養訖一筆帖式竒書在於寧夏口外採買抵羊牛七千九十餘隻據報趕解甘涼道路遙逺是以疲乏病瘦以致倒斃頗多等情又準大將軍咨令臣將甘涼等處凡有寄留牛隻悉行各地方官據實確估變價到肅之牛趕送赤金湖牧放等因臣查抵羊牛七千九十餘隻除報倒斃牛九百餘隻外寄留寧夏境內牛五千八十餘隻解到肅州牛一千三十餘隻臣親加挑選共挑出牛七百一十五隻派撥辨目解送出口交赤金營守備轉交夷人牧放備用訖餘牛俱飭變價以補庫項一趕解口外軍需羊共一十六萬九千六百餘隻內據領解羊隻遊擊守備等官紛紛報稱口外雪大天寒水凍草枯羊難行走所解羊隻沿途病瘦寄留及疲乏變價各等情並具有倒斃數目到臣臣查羊隻情形將來到營不過十之二三雖係口外雪大草枯而羊隻倒斃何至有如許之多固皆解官輕忽所致亦由採辦各員漫視軍需遲延之故若羊隻於六七月間早趕至肅出口則天氣和暖定不至倒斃如此應俟凱旋之日分别追賠以為玩誤者戒今大將軍又令在於涼寧西三處採買羊一十二萬隻於年內解至赤金湖牧放俟明春清明前後趕送大營臣查口外二三月間天氣尚寒草始萌芽羊隻仍難牧養長途趕解恐亦不免倒斃但此項羊隻係原議每月抵作兵丁十日口糧之需羊隻疲斃有誤兵食所關匪細臣巳咨商大將軍暨陜甘督撫並檄行鞏昌布政司現在商酌急速辦理容臣另摺具奏所有前項各事件恐厪聖慮理合奏聞伏乞皇上睿鑒謹奏有是理乎此等軍需要務豈可令齎摺之人在途耽延四十五日凡事弄巧必定成拙畏難必致僨事其如愚人誨化不醒何據此奏便將汝等置之典刑以償其罪於事亦復何益早覺汝等必辱朕命巳另遣多員前來辦理矣雍正八年三月二十九日辦理西路軍需兵部尚書臣馬會伯謹奏為恭繳硃批奏摺事竊臣前奏大兵出口一摺並奏聞事一摺俱欽奉硃批臣因屢沐若自用聰明為身家計利害存瞻顧推卸之心作不忠不孝之人不惟難逃硃批矢口違心指天自誓毫無忌憚臣工中往往有之此種陋習朕殊不解將無視聖並以欺皇上高厚之恩於萬一耳所有奉到硃批奏摺合併恭繳伏祈睿鑒謹奏觀汝乃良心全無廉恥利害毫不知解之人將汝此等人委辦如此事朕大誤矣非汝過也硃批諭旨卷三十一下
