body:
  text: 欽定四庫全書硃批諭㫖卷五十九硃批積善奏摺雍正四年四月二十四日江西按察使臣積善謹奏為據實密奏事竊臣一介庸愚荷䝉皇上特恩超擢江西按察使於雍正三年十一月初十日抵任惟有凛遵聖訓潔己奉公實心辦事以圗仰報皇恩於萬一臣任事數月以來因江右地方仰荷為之事不敢妄瀆天聽兹於本年四月二十二日據九江府知府李敬熙詳報府屬德安縣知縣蕭彬虧空雍正二年丁地屯銀共四千三百九十餘兩是日又據蕭彬揭報驛鹽道孫蘭苾貪婪殘刻每年受鹽規三萬餘兩又侵欺水驛船料數千兩康熙六十一年七月初一日孫蘭苾代蕭彬挽回被揭虧空得彬銀一千五百兩雍正元年九月間孫蘭苾赴驛驗馬又借廢弛驛遞名色詐銀八百兩節禮在外蕭彬又揭知府李敬熙共得過伊賀禮並借貸嚇詐銀五百兩臣隨即轉詳督撫臣聽候查參矣李敬熙到任甫兩月其賢否未能深知孫蘭苾到任六載平日使酒任性操守原屬平常理合恭繕密摺據實奏聞謹奏孫蘭苾之褒貶紛紛不一有人奏伊居官甚優即裴􅏍度亦曽保舉過又有人奏伊前於開封任內貪叨更有奏伊辦事才調好性情急躁者凡事日久論定真僞自辨目前朕亦難定其是非也朕觀爾為人頗屬聰明自用朕前巳面諭過凡人除秉彞之良天道誠心可倚可信外其餘但有所恃未有不喫虧者倘信不及朕諭試行看至得便宜及喫虧時方識斯言之不誣也朕每觀內外大小臣工於朕之訓諭信得及一分者即有一分福信不及一分者即造一分孽歷歷不爽留心驗之可也惟宜操存誠實二字要緊能與不能關汝一生福孽可不勉乎雍正四年十二月初七日江西按察使臣積善謹奏為據實奏聞事竊本年十二月初五日據贛州府知府孔傳熹禀據長寧縣知縣蔡賓興禀稱十月十三日有縣民鍾巨承首告武生陳上任於十月初九日給僞劄一紙與看被獲來首知縣即拏陳上任審訊堅供鍾巨承挾仇揑陷覆訊巨承先後口供總屬矛盾及加夾訊供稱因上任屢次辱罵挾仇用錢三百文託不識姓名人做就此劄經投地鄰詐害不遂故來出首知縣因其供吐閃爍究訊做劄之人的確姓名巨承又供鍾柱所寫正在提訊間鍾巨承於十一月初三日自用縳腰錢串縊死監內知縣驗係自縊隨令尸弟鍾有承領埋逮提到鍾柱研訊供屬妄扳等情禀府轉禀并接贛南道臣王世繩札同前由臣查知府知縣雖俱稱鍾巨承之出首似屬荒唐正犯畏罪自盡無從再究將陳上任等保釋僞劄銷燬以省拖纍但此案發覺總未據將前事通詳解審僞劄亦未呈驗遽禀銷燬要犯巨承又即監斃有無根株未淨冀圗率結滅口致死别情均未可定臣除現在轉報督撫臣并摘提應質人犯及禁卒尸親人等解省審明確情另詳督撫臣具題外事關地方出首僞劄臣不敢扶隱率結相應據實奏聞謹奏據奏誣首僞劄挾仇揑陷此等事須審觀其情形及出首者之來歷更加細心訪查庶或不致寃抑若因些須口角細故形涉疑似遂嚴行根究未免拖纍株連反令姦惡之徒得以逞志則地方不勝其煩擾矣凡百以得中合理為妥一不明非過則不及也於斷獄尤難雍正五年四月十一日江西按察使臣積善謹奏為據實密奏事竊南昌縣知縣陸綱於雍正五年二月二十四日拏獲廣裕當鋪內許四屏許以宗等賭博六犯研訊供認乃知縣陸綱議罰該犯等名下共米一千二百石詳報署巡撫及臣衙門臣以賭博定例當遵何得曲法縱姦隨批令南昌府提審招解去後因知府懸缺未據審詳傳聞此事署撫臣邁柱巳經批結共罰米一百二十石徑行該縣將人犯釋放又聞案犯係開當富家費去夤緣銀兩甚多紛紛傳說臣正在確切訪查間閏三月二十七日奉署撫臣邁柱面諭賭博一事聞有棍徒撞騙該司審明速覆臣當即傳同署府訊據賭犯許以宗過付羅秉瀛僉供經原任清江縣汪梴說合付與知縣陸綱銀五百兩等情當將陸綱汪梴職名通揭經署撫臣邁柱題參後將臣原詳發還令照疏稿換詳單催迫切臣照稿繕送在案四月初四日提到汪梴臣又嚴加細鞫據羅秉瀛供我因當裏犯事央汪梴去向陸綱求情汪梴說要銀六千兩方可無事我們付銀五千七百兩金二錠人參一斤汪梴說上下衙門一總包管無事等語訊據陸綱供汪梴來求我將賭博一事免詳從寬發落我因定例森嚴不敢允他汪梴說我不求你另尋門路後來邁大人批詳下縣我告知汪梴時他說我巳先曉得了他如何撞騙之處只求嚴審汪梴等語訊據汪梴供廣裕當犯了賭博羅秉瀛願出重費求我向陸綱說情我不合向伊求寬代謀我得銀一千六百兩餘銀現存省城同姓墨店內等語臣隨委新建縣前往墨店內起出原封贓銀一千二百五十兩并於汪梴寓內起獲金二錠驗明貯庫訖至究其是何門路如何營幹餘銀作何朋分全贓現存何處再四窮詰因汪梴陸綱自恃尚未奉㫖革職難以刑訊不肯罄吐實情除現在分提案犯執法窮究務得實情另容密奏外所有起獲原贓并臣續審出情節合即先行奏聞其知縣初詳署撫臣邁柱批語及兩次催换來單合併繕摺恭呈御覽謹奏邁柱現在江西此等事爾即少有不公朕信邁柱亦斷不至瞻狥若伊赴楚後伊都立接任朕則不敢言信矣聽訟之道果得實據即當從嚴毋令疏縱稍有不真即當從寬毋使拖纍如此聽斷何有枉濫邁柱之心與朕意同但固執己見粉飾前非皆懷私自便以私滅公之人也同日又奏為據實回奏事竊臣前因贛州府長寧縣民鍾巨承首告武生陳上任僞劄一事繕摺奏聞奉到硃批諭㫖臣跪讀之下仰見皇上至聖至明無事不協於大中至正臣仰荷聖訓周詳敢不欽承罔斁臣先經檄府提犯解省訊據陳上任供鍾巨承為伊弟陳熙賓雇工素行不端上任屢加責罵巨承懷恨揑劄陷害等語密訊餘犯僉供上任忠厚守法巨承素行匪僻巨承懼誣自縊禁卒審無凌虐滅口别情臣當將無干之人即行省釋惟查巨承活口供出代寫之鍾柱比對筆跡不符是必另有造寫僞札之要犯難容漏網密令該縣多方屣緝催據長寧縣報稱查有鐘柱之子弟屢往鍾年也家打閙口稱年也與巨承做事寃害我家等語隨弋獲年也詳解前來臣訊據鍾年也供我堂兄鍾巨承上年九月初二日向我說與陳上任有仇要陷害報復買白紬一塊寫一張假劄去訛詐他詐得銀來分給我就照他口裏念的寫了敕賜大將軍陳上任松一品等字巨承拏去嚇詐上任是實等語臣令當堂書寫與原起僞劄筆跡吻合此案實情巳得餘犯亦俱質訊明餘犯依律擬杖現在招解署撫臣審定照例結案理合據實回奏再查江省自二月以來時雨霑足早禾遍蒔米價因鄰省搬運甚多不能平減每石一兩以及一兩一二錢不等幸今菜麥登場民間得此接濟無虞乏食合併奏聞謹奏覽同日又奏為據實密奏事竊臣欽䝉聖諭隨同吏部右侍郎臣邁柱察審原任德安縣知縣蕭彬互揭驛鹽道孫蘭苾等詐贓一事巳同邁柱具題在案因內有扣剋紅號船工食一欵臣復加細查驛鹽道檔案江西額設紅號船共三百三十八隻每年支給水手工食修船工料約共銀一萬六七千兩以供往來差使之用但查歷年奏銷册其額設之船應付勘合火牌者每年不過二三十隻餘船皆為督撫司道往來撥用非正差可比伏思國家設如許官船三年小修五年大修十年拆造歲費帑金一萬六七千兩僅止用船數十隻其餘或充官員私用或經年纍月灣泊河干徒供風雨摧殘似屬虛糜國帑以臣愚見似應奏請聖裁飭令督撫確議應酌留若干船以應正差嗣後如無勘合火牌者即照擅騎驛馬例治罪應裁汰若干船或撥充他省作何使用或照原價之多寡船身之新舊確估變價解部則官船不致濫設錢糧不致虛糜矣為此繕摺奏聞謹奏爾既謂宜裁汰此項船隻即應呈詳該撫邁柱伊都立酌定何用奏朕爾意惟恐行此好事不為朕所知耶或恐督撫占奪爾之功績耶似此但圗益己而為公之心不純何能造就冀成大器試看邁柱只知有國而不知有家有身上天曽虧負之耶抑朕不嘉賞其勞績耶器量如斯小哉硃批諭㫖卷五十九
