body:
  text: 欽定四庫全書硃批諭旨卷一百九十六硃批阿克敦奏摺雍正四年七月初十日署廣州將軍臣阿克敦謹奏為奏聞事臣於本年六月二十九日到廣東省城即準將軍臣李杕差員齎送敕印臣隨於七月初一日署理任事李杕亦於初一日起身回京臣先於途間聞得有人欲俟臣到時呈保李杕在街市上貼傳單約人及臣到任之日兵民俱感服皇上威德遠近寂然從前雖有傳單之舉究無一人具呈攀留臣到任之初即向旗員營辨宣布聖主飬育之恩朝廷法紀之重嚴行訓誡莫不俯首感悟共凛國典其附省百姓業巳帖然安靜且年豐米賤人人樂業可以無煩聖慮至生事棍徒借端喧閙惡習斷不可滋長欽差臣塞楞額巳於七月初四日到省臣與楊文乾即遵旨會審俟審得確供定擬另奏外謹此奏聞貼傳單約人之舉或係陷害李杕之作用亦未可知為何不將此等棍徒訪拏追究耶諭署理兩廣總督阿克敦前交爾帶往粵中以緊要水師營遊擊缺補用之三等侍衛胡廣伊因患病未隨爾同去後於六月十二日奏明起身於引見時朕看其形狀不似有病之人據伊奏稱廣東水師地方不諳惟於福建水師熟悉情願在福建閩安營效力即求補用彼處等語朕觀其漢仗雖好聽其奏詞一無知識粗蠢糊塗甚屬平常况求本省做官有是理乎看來前日之不隨爾起身明係推病懶去爾於彼時曾否查詢伊是何病證今伊到粵止可暫令署理營缺留心試用如不過人糊塗猶能管兵拏賊操守不濫還可姑留倘若又不安分如何用得可即行參奏特諭雍正四年十月二十二日署廣州將軍臣阿克敦謹奏為欽奉上諭事雍正四年九月二十三日臣接奉硃筆上諭遵查三等侍衛胡廣髙華松係本年五月初三日奉旨交臣帶往廣東以緊要水師營遊擊缺補用之員臣於五月初六日請訓時據髙華松稱胡廣於途中墜馬傷足不能前來俟愈後再請訓起程令華松代稟轉奏等語臣即奏明隨於初八日起程赴廣其墜馬之處臣實未會親見嗣胡廣於八月十五日到廣臣署將軍印務隨咨送督臣孔育珣經孔育珣會題請補左翼鎮標左營遊擊現在委署任事臣當欽遵諭旨留心試用不時察訪如有不安分之處即行參奏斷不敢稍為姑容謹將硃諭恭封呈繳謹奏朕看此人甚屬不妥留心試用雍正四年十二月初九日署兩廣總督臣阿克敦謹奏為奏聞事竊廣州將軍臣石禮哈於十一月初八日到廣臣即遵旨將印信交送十二日由省起程十五日抵肇十六日準督臣孔育珣將印信交送到臣臣隨於十七日開印署事業經具本題明在案本年五月初六日臣恭請聖訓時蒙皇上天恩念臣未經外吏令臣將一應事宜細問孔育珣及孔育珣與臣如何交代之處奏聞欽此欽遵謹將孔育珣與臣交代並臣問孔育珣之處備細繕摺恭呈聖鑒一孔育珣將會議海洋統巡奉到上諭一道并硃批孔育珣覆奏金鐸條奏巡海一摺面交與臣據稱因撫提二臣未經畫一議覆不能會奏俟覆到之日令臣即行奏繳臣敬謹收貯俟楊文乾萬際瑞等覆到之日奏繳一據孔育珣稱兩廣鹽課每年四十五萬餘兩羡餘銀五萬餘兩外又雍正三年分子鹽價銀并西省盈餘銀及前督臣楊琳任內發出鹽包銀零星湊足銀共四萬兩業經奏明在案今四年分有子鹽餘耗等項銀共二萬七千餘兩又收起前督臣楊琳發存廣西鹽包銀四千一百餘兩現交鹽庫自十一月以後至嵗底如有積湊可於明年三四月間一併彚解奏聞等語臣現行鹽運司逐一查明貯庫外俟年前截算統於明年據實語臣現在留心查訪有應議行者另摺請旨一臣問孔育珣向來公用賞兵等項從何支取據稱總督衙門舊有兩省稅規俱巳裁革公用賞兵等項惟有廣東藩庫平銀八千餘兩可以支用一臣向孔育珣説今奉旨署理印務凡接任後辦理之事俱屬一體一切應行事宜及巳行未完之件須一一交明庶不致錯誤據稱一切事宜總在臨時斟酌亦無巳行未完之件實無可交代之處以上臣問孔育珣及孔育珣與臣交代等件謹此奏聞覽同日又奏為恭謝天恩事竊臣進摺家人齎捧欽賜御書墨刻一卷上用克食一匣到肇臣隨出郭跪迎至署恭設香案望闕叩頭謝恩祇領訖伏念臣猥以庸材疊膺簡任未能報稱方切悚惶荷蒙宸翰遙頒上珍遠被飽沐恩膏益凛冰兢於夙夜時虔瞻拜用嚴咫尺於帝天臣無任感激歡忭之至謹具摺恭謝天恩伏乞睿鑒謹奏覽奏謝知道了但一切莫沽虛譽俱當實力行之封疆之任除察吏緝盜之外别無安民良策也同日又奏為奏聞事竊查粵省各場産鹽必須天氣久晴方能煎曬故引鹽全賴九月以後正月以前雨少之時收足至春夏雨多不過零星添補去歲因秋雨連綿産鹽稀少今年配引不敷鹽價昻貴及七八月間又復多雨以致各處鹽價長至四五分不等自九月以來天氣晴明各場産鹽甚多鹽價減至一分有零將來各場漸次運出不但鹽價可減而額餉亦得充裕矣謹此奏聞凡百總賴天地神明俯垂庇祐耳但以公忠二字默契於上蒼自然一切無不順敘也敬誠之念刻不可忽慎之同日又奏為請旨事竊查粵省山海交錯所在險要而瀕海一帶自廣海寨而東歷香山虎門以至平海碣石惠來等處外海內河盜賊出沒不時全賴左翼碣石二鎮總兵官正巳率下訓練巡防方能緝盜安民臣自到廣以來聞得碣石總兵官陳良弼秉心貪黷凡有漁船出口俱勒陋規撥換巡防拔補辨目亦多索取惡迹彰著左翼總兵官藍鳯年逾七十昏憒廢弛伊一子頂鄭紹祖兵名拔補把總一頂林荗兵名拔補把總俱倚勢驕縱苦纍兵丁似此劣員實不宜於重鎮臣即當題參但二鎮均係要地定例題參總兵即應摘印誠恐皇上簡用人員一時不能到廣有誤操防為此繕摺奏聞伏乞皇上指示臣再具本題參庶要缺得人而海疆永靜矣謹奏此二人之劣處朕早巳聞得尚未知如斯之甚因念其皆係久於營伍頗稱老練曾經數次嚴訓望其遷改孰料其昏迷至此蓋自以為年巳衰老日暮途窮乘時亟取以作退休之計耳甚屬可惡爾如此據實上奏殊為可嘉朕甚奬悅二缺現揀擇勝任之人爾即具本題參可也但水師之員頗不易得凡諳練水師有膽氣者大都貪悍之夫奈何奈何爾於粵省副參中查訪如有出色人材可一面題明署理二鎮一面題請補放俟朕與在內揀擇之人一同再為酌定同日又奏為請旨遵行事竊臣查兩廣鹽政惟福建汀州府八屬向銷廣東潮州廣濟橋鹽斤每年額徵餉銀三萬九千九百三十七兩零額銷引六萬六千七百八十四道零內僅有長汀一縣額引之外可以多銷其餘七縣不能照額銷售歷年課餉艱於辦納嗣於雍正二年五月內經督臣孔育珣將汀州一郡引課著八縣協辦知府總彚其成每年知府出具印領自備鹽價水腳赴潮領運分發八縣通融銷售如有不完將知縣知府一併列參等因具題部覆奉旨依議欽遵在案兹臣到任檢查奏册內開汀州八屬雍正元年分未完課餉七百九兩二年分未完課餉二萬八百九十餘兩三年分未完課餉三萬二百餘兩臣細查其故一由各縣升遷事故正署各官不一其人每多觀望一由各縣無力措辦鹽價水腳以致挽運不前貽誤課餉若不設法變通不但舊欠無補抑且本年新餉難完關係匪輕臣請仍照孔育珣題定之案專責知府分撥各縣融銷外另委幹員押送帑鹽督同售銷將賣出價銀扣除鹽價水腳盡數解庫務足本年額餉如有盈餘酌量分抵舊欠庶運鹽速而撥銷易國家之正課官吏之考成均有賴矣是否可行伏乞皇上批示遵行謹奏此等事全在爾因地相機權宜料理朕未洞徹事之原委及地方情形難諭是與否也應行者行應具題者具題措置得當朕自能照悉其秉公勉力為之雍正五年正月初三日署兩廣總督臣阿克敦謹奏竊署廣東按察使參政道殷邦翰係撫臣楊文乾題請留粵補用之員臣細察其人有辦事之才而不務翻駁而不實心上緊以清案牘現據署臬司肇皇上睿鑒自必洞悉其微但臣既有所知不敢不據實陳奏謹此奏聞殷邦翰之原委甚長不便全諭言伊不妥者巳盈朕耳但楊文乾力言其實心任事因不瞻顧而招衆怨此人朕從未覿面今準著伊引見到京之日朕留心一看斷不能掩其真偽也不知爾此論係得之人言抑或係親驗確察洞悉其立心行事耶若出自屬員之口當再加詳審朕即位於今四年輿論二字不但不足為慿竟全然不可聼信大約衆所喜者率皆潔巳而不奉公上欺朝廷下徇屬吏假和平恬靜之名而廢弛因循置諸務於不理之人此乃吏治民生之大患朕所以竭力挽回諄諄訓誡者也爾等亦當痛改此習凡遇屬員中有立意沽長厚之名而不肯破顔整理地方事務者宜嚴懲以警衆若實係居心深刻兵民交怨性急過剛但知有巳而不知有人傲上陵下與衆不合翻駁前案此等形迹鑿鑿可據者自當詳察糾劾不然則何能察吏也察吏之道少不聰明被人欺瞞則安民乏術矣爾將此諭當銘刻五內信受遵奉時時警惕庶幾不受人愚不忝厥職否則難望地方獲治安之效也勉之勉之同日又奏竊臣標五營及肇慶水師城守二營兵丁臣到任之後即按日操閲查各兵內鳥鎗手頗皆嫺熟惟弓箭平常今一月以來弓力漸長有能用四箇力以上至五六箇力不等者再廣省山海交錯藤牌挑刀最為利器各營雖有藤牌挑刀因不演習俱屬生疏臣亦現令各營演習至兩省營伍除接見過將備各官嚴加訓飭外餘俱行令不時操練以期有濟於緝盜安民之實用謹此奏聞好朕甚嘉之爾自到廣東署理兩任一切奏章料理各事件甚屬妥協如果言行相符何煩朕訓諭勉力為之都中內外安平新春以來頗覺順遂如意特諭爾知為朕歡慶同日又奏為奏聞事竊臣據廣州城守副將賀捷報稱十二月初九日午時內城城門忽然鎖閉未時仍開現在查探未得實據臣隨各處密訪聞係兩三日前有謠言初九日越獄之語至是日傍午街上人忽然驚駭奔告店鋪俱關城門鎖閉至未時城門復開內外如舊當經將軍臣石禮哈拏獲二人手執軍器問係移送撫臣楊文乾審訊責釋臣隨嚴飭城守官不時稽查防範去後兹於二十九日據廣州水師遊擊黃錫申報二十六日酉時有番禺縣監犯三十上聽謹此奏聞理當如是凡關國家之事何有巨細之分也同日又奏竊臣準撫臣楊文乾移送會稿二件一為廣貯倉榖等事臣接閲邸鈔現據九卿議覆無庸臣等另為置議一為水利綦重等事內開請將髙要等五縣圍基頂衝改築石工次衝改用樁掃約計數十萬金暫借庫銀修築作何補項另疏具題等因緣臣所見不同是以未經畫題即將原稿移回所有臣不會題緣由敬為我皇上陳之臣查廣東之西江自廣西梧州府滙左右兩江之水流入肇慶府界至廣州府三水縣北合南雄韶州連山諸水一由崖門入海一由虎門入海其沿江之髙要髙明四會三水南海五縣向有圍基俱係土工開竇建閘以時蓄泄每年於十一月後地方官督率鄉民按畝分工加卑培薄民不為苦官無所費相安巳久至田畝間被淹浸圍基衝決多因江水湧漲圍基以內水難外泄所致去歲秋雨連綿水勢甚大惟三水一邑略有被淹之處三水以上肇慶府屬圍基並無衝決蓋江水雖急而性不剛猛非必石工樁掃方能抵禦今若改築則費國帑不止數十萬且從來工程斷無一勞永逸之理工完之後勢必逐年修補耗費無窮以臣愚見不如仍循舊法著令地方官每嵗於農隙之時督率鄉民分工修補倘遇江水驟漲不時遣員巡查以防衝決如果實心任事圍基即能保固無虞似可無庸更議是否有當伏乞皇上睿鑒謹奏覽爾所奏甚是楊文乾雖經摺奏本尚未到朕意欲差廷臣中通逹河務精於測量之人前往會同爾等地方督撫詳察再為酌定爾今既有此奏差員到時其秉公悉心斟酌必如此行方與民生有益不可因費國帑而忽民生若宜仍舊則又何必多此一番楊文乾奏摺中有開捐之議朕不但不取且少疑焉總之天下事惟以適中得當為是耳雍正五年二月十七日署兩廣總督臣阿克敦謹奏為恭繳上諭事竊雍正五年二月十一日臣奉到硃批諭旨跪讀之下聖諭諄切無微不至伏念臣一介微末荷蒙生成教育之恩有加無巳兹承天語煌煌感悚之忱敢不益勤砥礪以察吏緝盜為先遇事詳悉斟酌籌畫萬全以冀稍免愆過再臣伏讀上諭孔育珣只此察吏一著甚屬不及總之柔軟將就之風其來巳久設不如此內外不容原難處也所以朕今力剔此弊以挽頽風爾當領悉朕意欽此仰見皇上洞察流弊體恤臣下之聖心臣讀之不勝感切我皇上用舍舉錯悉出大公至正孤介者俱蒙恩擢黨援者莫不斥除此臣之所目睹深信而不疑者也况臣子之道只知有君利害得失所不當計即如臣參劾廣東縣令四員聞撫臣等嘖有煩言臣總置之不問惟知以此心表白於我皇上之前顧忌之私又何必存於中也奉到聖訓臣俱敬謹遵奉務期朝夕黽勉以副聖意謹將硃批原摺恭封呈繳謹奏身膺封疆重任但不涉於柔懦偏執懷私沽譽何事不就理也勉之同日又奏為奏聞事竊臣查發帑收鹽每年除正課銀四十五萬五千九百八十餘兩并應題報額羡銀五萬一千餘百兩外雍正四年四月內督臣孔育珣將耗鹽價銀一萬三千六百餘兩廣西省官運官銷餘銀一萬兩前督臣楊琳發存廣西鹽包收完零尾銀五千五百餘兩又零星湊起銀一萬餘百兩共成四萬兩奏為直隸開濬河道之用嗣準部咨行令接任總督將子鹽照舊存留每年據實題報等因在案兹臣統算共收過子溢鹽價銀又前督臣楊琳發存廣西鹽包陸續收起銀連督臣孔育珣移交子溢鹽價併廣西省餘銀共積湊銀五萬兩現貯鹽運司庫此並不纍民亦不纍商又不纍官俱係公項臣謹繕摺奏進再查現今奉旨撥廣西倉榖三十萬石運赴廣東夫船腳價俱於兩省藩庫動支請將臣所奏之五萬兩抵補庫項除另摺請旨外謹奏此項當時孔育珣料理甚屬可嘉不宜更張同日又奏為請旨事竊廣東去歲秋雨稍多晚收微歉荷蒙皇上軫念民依特撥廣西存倉榖三十萬石運赴廣東存貯臣遵即飛飭廣西省委員起解并令廣東省委員接運務於青黃不接之時運至廣東至所需夫船腳價銀兩部議令於兩省藩庫內動支照時價分給造册題銷臣思此項榖石自廣西桂林等四府二州運至廣東肇慶廣州等處遠近不一費用殷繁查兩省藩庫除奉撥兵餉之外存銀無多動支之後庫項不可虛懸臣管理鹽務計算雍正四年所收銀兩除正課及額報羡餘之外尚有子鹽餘耗等項共積湊銀五萬兩臣請於運榖事竣之日即按題銷數目將此五萬兩抵補兩省庫項如有餘剩就近移存藩庫候撥倘或不敷再於雍正五年子鹽餘羡等項內補足庶兩省之庫貯無虧矣伏乞皇上睿鑒批示遵行謹奏此項銀兩照孔育珣料理雍正五年三月二十二日署兩廣總督臣阿克敦謹奏竊廣東因去歲被水歉收米價略昻荷蒙皇上天恩撥廣西倉榖三十萬石存貯東省臣於正月內接準部文即飛催兩省布政司委員起運接運去後兹於二月二十三日起自梧州府運至廣州者四次共八萬二千餘石約計閏三月內外可以運完百姓見倉榖源源而至有榖者俱行出糶米價頓減肇城每石一兩二錢有零再惠潮一帶春麥倍收廣肇等府麥收俱好儘可資助民食現今晴雨以時稻秧豐荗民情帖安謹此奏聞覽奏米價頓減春麥倍收大慰朕懷此皆卿等能仰體朕意實力奉行俾兵民心志舒暢感召和氣之所致也勉之勉之但不可稍有自滿天道虧盈而益謙禍福互相倚伏將此二語不令一時去懷自然永永蒙庥也同日又奏為奏聞事竊廣西梧州府蒼梧縣之芋莢山界連懷集賀二縣并廣東肇慶府之開建封川等處山路險峻出次驅逐而礦徒出沒無常經督臣孔育珣將都司嶽咨題參革職并檄行兩省通緝在案臣到任後即嚴飭文武率兵搜捕隨據肇慶協副將李斯援差委辨司收審其為首之李亞展脫逃未獲臣復懸賞購渠魁今兩犯先後就擒餘黨聞風遠遁現今芋莢山場俱巳肅清再廣省盜賊皆由積年盜首蠱惑窮民每至聚黨劫掠若能獲其為首者餘夥不難以弭盜安民為首務經臣訪實之積盜十有餘人聞知道了同日又奏為欽奉上諭事雍正四年十一月十五日準督臣孔育珣面交臣硃筆上諭一道硃批奏摺一件併鈔録奏稿一摺內開奉到海洋硃諭一道與硃批臣議覆金鐸條奏摺一道因撫提二臣尚未畫一議覆不能會奏今交署督臣阿克敦俟撫提二臣覆到會奏等因臣隨敬謹收貯併咨移撫提二臣去後兹準撫臣楊文乾咨開查海洋弭盜之法一曰分巡一曰會哨兩者實相表裏不宜偏廢且提督奏內雖專主本汛遊巡之議亦巳慮及遊巡或有懈怠更請按季輪委總兵副將巡查若輪委鎮協即係現在統巡之官而按季巡查又與定例輪班統巡無異似不若悉遵舊例無庸更改又準調任提臣萬際瑞咨稱遊巡會哨一案如撫院所議遵照舊例實為至當相應仍舊等因各到臣查與督臣孔育珣原議俱皆畫一臣復細加訪察粵省分巡會哨之法自康熙五十六年前督臣楊琳題準自南澳而西龍門協而東分為三路輪派統巡分巡每路洋靣不過千里內外兵丁勤惰易於稽查匪類竊發易於會捕遵循巳久甚為有益惟當嚴飭各官實力奉行一遇有盜合力𠞰捕仍令將下班官兵分布要汛巡防彈壓則自無前去後空之患而海洋永保寧謐矣謹將原奉硃諭及硃批奏摺恭封奏繳伏乞皇上睿鑒謹奏據奏所見甚是朕亦知舊例最善但萬際瑞前奏許多不宜處朕不得不加詳察後巳知其所論不確今諸臣之議既皆畫一仍照舊例而行可也同日又奏竊臣奉到臣奏聞殷邦翰一摺硃批諭旨臣在廣州署將軍任內見過殷邦翰即領咨進京臣見其有辦事之才而人不純正衆亦怨其殘刻因據所知摺奏懇求皇上於引見時洞察其為人及跪讀諭旨凡屬員中有立意沽長厚之名而不肯破顔整理劾欽此仰見皇上衆惡必察衆好必察之之愚以無忝厥職則自此以往何莫非我皇上訓誨之洪恩所有奉到原摺硃諭恭封呈繳謹奏覽雍正五年閏三月二十五日署兩廣總督臣阿克敦謹奏竊臣準廣西撫臣韓良輔鈔送奏明廣西天河縣監犯莫東旺越獄緣由請撥兵圍堵擒捕一摺奉硃批諭旨知道了應如何料理可與督臣詳悉商酌行之欽此欽遵臣查監犯越獄法難寬貸况莫東旺係蠻賊抗拘經兵威脅服投首之犯更與尋常越獄者不同斷不可任其縱逸今撫臣議撥漢土官兵分路深入繪圖列册到臣臣復酌議數條咨覆俟議定作何擒捕務獲另行奏聞外所有臣咨覆略節恭呈御覽謹奏詳悉籌畫為之毋稍忽略雍正五年四月二十一日署兩廣總督臣阿克敦謹奏為欽奉上諭事竊臣接準吏部咨奉上諭到臣臣遵即飛檄該管文武立將羅文剛密拏務獲不得疏脫去後兹據署提臣張傑咨據思恩協副將梁名望稟稱遵即行委土田州知州岑應祺奉議土州州判邵銓及防田千總邱培秀選差目兵相機擒拏就據土田州稟報卑土州借查隘為名於閏三月二十七日抵坡洪村差目往諭羅文剛曉以利害令其出投文剛即於是日同伊叔文觀出投將文剛先行起解文觀暫留押令喚齊弟男子姪另文申詳文剛所管衆村民業巳陸續出投邵州判現在查點安插等語除將羅文剛押解思恩府外合行呈報轉咨到臣隨檄行廣西按察司嚴審招報在案所有擒獲羅文剛日期理合奏聞再兩廣交界芋莢山之礦賊臣到任後將為首之李亞展潘十八等先後擒獲歸案審究現今山場寧靜業經具摺奏明至清查疆界分别防範管理定為規制之處俟李紱甘汝來到日臣謹遵旨會核具題謹奏據李紱甘汝來業巳奏聞俟汝具題到日有旨雍正五年五月二十九日署兩廣總督臣阿克敦謹奏為恭謝天恩事竊臣接準部咨奉旨阿克敦調補吏部左侍郎其吏部侍郎事務仍著查郎阿署理欽此欽遵伏念臣一介庸愚荷蒙皇上不次之恩擢領翰苑清班歷試禮兵部務復膺簡命委署封疆雖夙夜冰兢勉效涓埃以自勵而聖恩稠疊多慚報稱之未能何意寵命遙頒特調銓衡重任榮逾非分感悚彌深惟有盡臣之心竭臣之力以期仰副我皇上教育之隆恩於萬一除另疏具奏外謹繕摺恭謝天恩謹奏覽勉之楊文乾尚需數月方能旋任不可因署理而因循懈怠亦不可將未審事情急遽更張竭力酌中料理以期合於至當同日又奏竊廣西永順長官司鄧朝宸因伊父鄧啓明控告該土司慘殺親叔鄧啓慧等七命批提質審抗不遵奉經撫臣韓良輔會臣題參革職差員前往摘印詎該土司畏罪潛逃臣聞報飛移署提臣張傑檄調附近漢土官兵圍捕去後兹據桞慶協副將潘紹周慶遠府知府徐嘉賓詳稱巳於本年四月二十四日據永定長官司韋廷璧等獲解鄧朝宸到府當堂繳出印信押交羈候等因到臣除批回嚴飭監禁候旨審擬外事關參革土司懷印脫逃旋被擒獲臣不敢隱匿謹具奏聞封疆大吏若肯事事如此實力奉行何慮天下不大治也同日又奏竊臣於雍正四年九月二十三日接奉硃筆上諭侍衛胡廣於上年八月十五日到廣臣署將軍印務經督臣孔育珣會題請補左翼鎮標左營遊擊臣隨恭繳奉到硃筆上諭并將欽遵試用之處具摺回奏復蒙硃批朕看此人甚屬不妥當留心試用欽此欽遵臣於署總督印後細察胡廣為人實屬糊塗粗率但頗諳水性補授遊擊以來巡查各汛兵丁間有怨言訪其致怨之由祇因巡查太緊待兵過嚴並無尅扣虛冒情弊臣留心試看目下尚屬守法可否仰懇奏所奏朕甚嘉悅如此方是朕總就事論事就人言人從不預立成見才不及者若肯奮勉自勵改過遷善即是矣才優者若放縱自滿則非矣全賴爾等大吏秉公據實甄别激揚以副朕用人之心如朕先有定見何必又發往令爾等試用耶看胡廣雖似糊塗光景是一粗直出力報效之人於孔育珣陛見時朕亦言及此事可將爾所奏并朕此諭令孔育珣知之毋致寃抑於彼也雍正五年七月初一日署兩廣總督臣阿克敦謹奏為奏聞事竊廣東海疆遼濶姦匪出沒不常定例每年自南澳以西龍門協以東派委統巡分巡各官輪班查緝盜賊兹雍正五年上班官兵經臣派委於二月初一日出洋起六月初一日撤師止各路洋靣俱極安靜除另派委下班官兵已於六月初一日接班出洋巡查外所有上班海疆寧謐情形臣謹奏聞卿等督撫若能秉公持正實心任事則其效不虛地方自然寧謐無事也同日又奏為敬陳開墾事宜事伏念盛世戶口滋蕃惟墾荒可以足食欽奉上諭令督撫悉心勸導實力遵行但粵東勸墾之條屢頒報墾之數無幾民多觀望不前者其故有四一由豪強之占奪一由胥吏之需索一由資本之不敷一由土瘠而畏日後之升科以上四條百姓之觀望不前者在此而所以勸導之方亦在此勸導之方有五一定疆界以絶爭端一禁需索以寬民力一借籽種以助農工一輕升科以示優恤一廣招徠以盡地利如此則民無觀望不前之心而報墾者自必接踵而至抑臣更有請者勸懲之法不可不講也其要有二一荒田既墾其利在民升科録一次多者計算加級倘勸墾不力廢厥職守即據實參處則官知勸懲矣一凡富厚有力之家率先遵奉以開墾之多寡分别奬勵如墾至一頃以上該地方官給賞花紅二頃以上給賞匾額五頃以上照終身力田老農例題請給與八九品頂帶榮身則民知自奮矣臣查粵省在在俱有可耕之土而惟惠髙雷亷四府荒地更多復靣令各知府詳議隨據議覆前來與臣所見無異臣與署撫臣常賚面商亦謂於地方有益謹繕摺具奏伏乞敕下議覆施行謹奏楊文乾前在京時朕曾以墾荒一事備悉問伊所奏約略相同未如爾此奏周詳爾俟楊文乾回粵後並同孔育珣三人詳議具奏雍正五年七月十一日署兩廣總督臣阿克敦謹奏為恭謝天恩事竊督臣孔育珣奉旨回任將次臨境臣正在料理交印事務於七月初八日接準部咨奉旨孔育珣回任後阿克敦著署理廣東巡撫印務常賚著即赴福建新任欽此欽遵除俟孔育珣回任交印後即遵旨赴省署理巡撫印務另疏恭謝天恩所有應行事宜奏請聖訓次第辦理外伏念臣猥以菲材毫無報稱疊膺封疆重寄惟有感戴洪恩勉竭心力以仰答髙厚於萬一耳臣謹具摺恭謝天恩謹奏但將柔善之病除盡科甲二字忘却諸凡料理庶幾是矣同日又奏為奏聞事竊廣西天河縣獞賊莫東旺越獄一案臣已將檄行該管文武官辨嚴緝務獲併將議覆擒捕事宜摺奏奉硃批詳細籌畫為之毋稍忽略欽此欽遵臣密飭文武官辨多方屣緝懸賞購獲去後兹於七月初十日據慶遠府知府徐嘉賓稟稱卑府與副將潘紹周懸示重賞飭令署天河縣陳舜明帶領土兵鄉勇親至賊巢駐劄搜捕隨於初五日據該署縣稟稱莫東旺巳被土人拏獲到案除另文申報外所有獲到莫東旺緣由合先飛報等情到臣理合據報奏聞伏乞皇上睿鑒謹奏如此方是殊屬可嘉雍正五年八月十二日署廣東巡撫臣阿克敦謹奏竊臣於七月十三日將總督印信交送督臣孔育珣收受隨起身赴省於十九日準署撫臣常賚交送巡撫印信到臣當即開印署理業經題明在案臣檢查卷册見廣州等八處稅羡銀兩向俱解繳臣衙門彚發布政司存貯但其中有難於查核者管稅各員將收過銀數暗用摺報明用批解批解之數留為案據原報之摺掣銷無迹此則欺隱分肥之巧術也如肇髙亷羅道王士俊管理黃江厰原任髙州府知府趙庚管理梅塘稅務俱各隱匿銀一千餘百兩經署撫臣常賚查出牌行有案實屬侵欺以此類推則批解之數未可盡信臣思稅羡題報事屬初行如不及此徹底清查將來遂成錮弊除具本題參外現今通飭各屬將所收羡餘銀兩俱令盡數批解當堂驗兑即日發交藩司貯庫倘仍敢揑飾查出題參治以重罪庶課餉有可稽察而官方愈加警惕矣伏乞皇上睿鑒謹奏徹底清查固屬當然但王士俊趙庚尚為有用之員此等小過猶在可諒當嚴加訓飭令其遷改耳即便題參似覺少刻知道了題到另有旨雍正五年九月十三日署廣東巡撫臣阿克敦謹奏竊臣奉旨升補吏部左侍郎具摺恭謝天恩接奉硃批諭旨臣跪讀之下感悚交深惟有謹凛遵奉不敢懈弛不敢急遽殫心竭力次第辦理所有臣目下辦理情形敬為我皇上陳之一廣東錢糧藩庫款項俱屬清楚其各州縣現飭司道府等官不時稽查臣亦留心體訪一廣東平糶倉榖共有四十餘萬石存價未買巳勒限冬月補完仍令分往産榖地方酌量採買不使榖價騰貴一粵省審理案件新舊連接總不下數百起臣欽遵酌中料理之聖訓不遺餘力應題逹者照例題逹應外結者照例外結一太平粵海兩關稅務臣接任後嚴飭書役人等不許侵蝕作弊商賈行戶不許巧避走漏將來一年期滿正稅盈餘務期一一補足一廣東太平粵海稅務歷年題報俱有成規惟落地稅一項歸公事屬𥘉行共計八處其中弊竇甚多臣現在清查除隱匿稅銀之王士俊趙庚業題參請旨究追外其各屬稅羡統俟清查到日一併核明彚奏此外凡有關吏治民生之事容臣悉心辦理隨時陳請恭候睿裁指示遵行謹奏即此條奏數款亦非爾能辨之事今命爾往撫粵西若仍然罷軟而務欺隱欲望善全旋都不可得也同日又奏竊臣遵旨將試看遊擊胡廣緣由具摺奏聞接奉硃批諭旨適督臣孔育珣在省會同臣驗封藩庫存貯銀兩遵將諭旨及臣所奏與孔育珣看孔育珣捧讀之下欽服皇上用人悉本大公至正與臣共相勸勉務期仰副聖懷所有奉到硃批奏摺恭封呈繳謹奏朕竭力主持大公至正之道其奈諸臣懷私不公何亦惟有嘆息而已雍正五年十月二十八日署廣東巡撫臣阿克敦謹奏為恭謝天恩事竊臣接準吏部咨文奉旨韓良輔因軍需案內解任廣西巡撫印務著阿克敦前往署理楊文乾未回廣東之先廣東巡撫印務著石禮哈署理欽此欽遵臣於接準部文之日即料理交代案件於十一月𥘉一日交印𥘉四日起程前赴西省謹此叩謝天恩謹奏汝於廣東任內有數事欺隱朕深為寒心同日又奏竊臣於本年七月內奏謝署理巡撫印務一摺接奉硃批諭旨臣敬啓跪讀惶悚彌深伏思柔善之病乃臣氣質之偏仰荷聖慈屢加訓誨無時不痛自震惕兹復蒙天語遙頒惟期力除務盡再臣昔年隨侍聖祖仁皇帝時每諭及漢人師生同年每有門戶惡習滿洲淳朴之風甚善斷不可改移臣於親聆之餘服膺永矢十餘年來兢兢自守近閲邸鈔敬讀皇上諭旨切中科甲之弊大有益於吏治民生凡係科甲出身者俱當悔悟况臣身受隆恩豈甘自暴自棄惟有凛遵明訓不復稍存科甲之見謹此覆奏伏乞皇上睿鑒謹奏若言當日服膺聖祖之訓則是欺天之語也朕復何諭同日又奏竊臣將隱匿稅銀之肇髙亷羅道王士俊原任髙州府知府趙庚題參緣由具摺奏聞接奉硃批諭旨到臣臣思錢糧絲毫為重不肖官員侵隱之弊發覺者十無一二既有稽察之責不敢因循寬縱故據實題參兹恭繹諭旨仰見皇上赦過用人之聖心直與覆載同其髙厚臣不勝惶悚乃蒙恩宥多方訓誨臣雖愚鈍當知勉勵所有奉到硃批奏摺恭封呈繳伏乞睿鑒謹奏據汝此奏則是粵省貪官止此一二人一二事更無貪劣之員矣良心喪盡之言更有何諭汝也雍正五年十二月初九日署廣西巡撫臣阿克敦謹奏竊臣前署廣東巡撫任內兼管兩關稅務自臣署事起至離署止所有太平關正羡水腳銀兩俱一一交明署撫臣石禮哈並無虧空粵海關稅臣就近料理儘數收解除正羡水腳等項一一交明外又盈餘銀八千餘百兩尚有遠口未到稅銀約有一二千兩共計可至萬金俱與署撫臣當面交代清楚再臣經管稅務俱係循照舊規向來徴收稅鈔之外有分頭擔頭一項作關務衙門及各口書役人等養贍之費臣俱照舊支給至臣署任三月餘共收布政司衙門養亷銀一千七百兩零皆荷皇上恩賜臣謹奏聞慎重錢糧亷潔自守係爾所能何庸置議但柔懦瞻徇之病究不能除奈何不遵朕諭粵東署事甫經半載致令通省呼為阿婆朕實代汝恥之雍正六年正月二十九日署廣西巡撫臣阿克敦謹奏竊查廣西上年通省收成約有七八分不等兹立春之日天氣晴明農家相傳以為大豐之兆歷驗不爽正月初七八等日時雨霑遍麥菜雜植俱各暢茂目下米價每倉石一兩一錢有零地方甚屬寧靜謹此奏聞覽雨暘情形深慰朕懷然此不過預為之兆耳倘地方頑民因此遂放縱不法守土官吏肆志貪暴朕則不敢期其必驗也即此可見汝不識本末之理隨俗附和何足與言天道既不知天道亦不足與言人事矣凡庸見解大率同然亦無怪乎汝一人也同日又奏為恭繳硃批奏摺事竊臣至愚極陋仰承我皇上不次之鴻恩屢加簡用臣自到廣以來初蒞外任諸務未諳錯誤多端署廣東巡撫任內辦理事件甚屬不合復妄行陳奏荷蒙嚴諭訓誨臣跪讀之下無地自容慚悔與惶恐交集於中惟期痛改以贖前愆伏乞皇上寬臣巳往勵臣將來則有生之日皆報主之年也所有奉到硃批奏摺恭封呈繳謹奏惶恐則誠有之慚悔或未必然也雍正六年三月二十五日署廣西巡撫臣阿克敦謹奏竊原任廣西撫臣韓良輔摺奏左右兩江土司事宜五條奉硃批諭旨命將此摺亦密與臣看欽此欽遵臣將看過緣由奏明在案臣自署任以來細加訪察如奏摺內稱土龍州改設之二土巡檢趙墉趙陛不能撫綏土民或另擇賢能或竟改土為流等語查二巡檢係新經改設人雖庸懦無甚劣迹其另擇賢能或竟改流之處似屬可緩又奏摺內稱改流之思明土州措置未當應盡革陋規清出地畝歸崇善縣管轄等語查思明土州業經前署撫臣甘汝來題明歸併思明同知專管未革陋規於被劾之太平府知府王夢堯與吏目馬宗李互揭案內逐一清覽查審結無庸置議又奏摺內稱歸順土知州岑佐祚不能鈐束其下亦應改土為流等語查土州先因幼弱為頭目所制今已長成業將土屬公田報官完餉經督臣孔育珣是題準部覆現委員前往查勘歸入賦額亦可無庸置議又奏摺內稱思明土府屬之鄧橫等四寨環水植竹恃險拒捕等語查鄧橫等四寨臣於新調太平府知府王國坦赴任時靣飭親往查勘兹據該府報稱奏摺內稱西隆州惡目顔光色西林縣惡目潘兌等屢屢仇殺抗不服拘等語查潘兌已經自行投首會商到臣巳酌撥兵役飭令文武相機擒捕矣謹此奏聞將此摺俟接任到日交與諭令看過另行呈繳同日又奏竊廣西司庫正項錢糧現據布政司郭鉷與原任藩司黃叔琬交代盤查並無虧空其公費雜項亦遵例逐一清查另行報部至通省倉榖除先參續參虧空黴爛各案外應存倉榖共一百二十餘萬石此內部行勻貯及四五兩年平糶應買補倉榖共三十九萬餘石臣署任後即嚴飭催買陸續據各屬報買者將及三十萬石尚有巳買未曾報到者俱經委官分往盤查約計未買之榖不過六七萬石目下東作方興買榖有妨民食暫令停止仍飭布政使俟秋成購買甚屬易易布政使郭鉷一力承認臣謹繕摺奏聞謹奏郭鉷若不一力承認汝又將如何料理身為封疆大吏似此遊移推卸無恥之言何顔形之筆墨以奏朕耶硃批諭旨卷一百九十六
