body:
  text: 欽定四庫全書硃批諭旨卷二十五硃批福敏奏摺雍正三年八月二十九日署理浙江巡撫印務吏部侍郎臣福敏謹奏為恭報微臣入境事竊臣蒙皇上洪恩署理浙江巡撫印務臣於八月初七日自京起程於本月二十八日至浙江境內石門縣地方有護理印務按察使甘國奎差官齎印併王命旗牌交送前來臣當即望闕叩頭謝恩祗受訖臣才劣任重不勝惶悚伏乞聖主特恩御批教訓再臣臨行欽奉上諭各條除另摺具奏外其餘文武官吏之賢否錢糧虧空之有無容臣體訪的確陸續繕摺奏聞臣謹奏籌國計豈得不清理錢糧問民生莫先於糾察吏治徐徐次第舉行一一陸續奏聞同日又奏為奏聞事臣自出京至浙江地界路經直隸山東江南各州縣細加體訪竊見地方有司皆能仰遵聖訓清愼自矢小民亦皆感被聖德安分守法熙皥自如惟直隸涿州以南被水衝淹秋禾小米每斗小錢四百二三十至七八十文不等山東德州以南至泰安州等處每斗小錢一百六七十文江南淮安府亦有被水淹浸之處其餘地方秋禾甚茂可望十分豐收鎮江常州蘇州米價每石一兩三四錢不等至浙江秋收俱有八九分亦有十分者杭嘉湖三府目下米價一兩二三錢將來晚稻登場價值必更平減理合據實奏聞臣謹奏覽奏浙省秋收情形深慰朕懷直隸今歲被水實甚現在諭令多方設法賑恤矣同日又奏為奏聞事竊臣道經江南地方一路密訪年羮堯行止皆云到浙之日隨從尚有千餘人馬匹亦多將軍署中人衆難容另造房屋百餘間居住所有誘引兵丁之言如云爾輩聽我說話不憂窮苦併令杭州知府隨時給發兵餉不許遲誤且代為籌畫馬價銀兩百計市恩是實及將軍鄂彌逹到日令處閒散章京之列始覺惶悚向鄂彌逹云皇上要殺我麼鄂彌逹云爾敗壞至此皆爾自取且參爾者即爾平日信用之人更有何說年羮堯云彼參我亦是無可奈何等語據年羮堯所言如此則李維鈞等結黨不散明參暗合顯然有據年羮堯罪不容誅實難姑恕臣始入境所聞已如此其餘欵蹟再當細訪確查一一陳奏臣謹奏年羮堯惡貫滿盈巳降旨差拏矣雍正三年九月二十日署理浙江巡撫印務吏部侍郎臣福敏謹奏為遵旨訪問事竊臣備細訪問前任巡撫法海布政使佟吉圗按察使甘國奎三人彼此乖違不相輯睦之處據杭州各官民所言三人皆以意氣用事法海操守頗好而性情偏執不時辱罵屬員佟吉圖聲名亦好而傲慢不恭全不循屬員之禮甘國奎操守才情初時尚好無如居心不甚光明亦且辦事草率以致互相猜嫌不肯和衷協理此三人性情心術久在聖主照臨之下臣體訪浙人公論一如睿鑒為此據實陳奏臣謹奏所論甚公且當實皆係中人以下之流品也同日又奏為遵旨問明回奏事雍正三年九月初一日浙江鹽政臣謝賜履至臣署中跪請聖安臣即傳宣上諭問謝賜履爾奏沿海各縣因海潮衝淹場竈請免場課自應查勘明白一齊具奏如何先奏幾縣試探然後再奏幾縣此是何故純臣之心豈宜如此爾有何說可明白回奏當據謝賜履回奏臣因華亭等七縣官民聞知兩淮場課以海潮蠲免紛紛詳求具題豁免故先摺奏請皇上指示應否具題後奉皇仁蠲免於是仁和等七縣亦援例請免是以再行續奏等語回奏畢臣與叙話間因問彼年羮堯到浙之日爾是文官如何出城逺迎謝賜履答云是日巡撫法海進京我循舊例到武林門地方跪請聖安適值年羮堯亦於是時到杭雖同在公所並不是接他臣因稱奉旨問你這話你須將此段情節據實回奏謝賜履又即跪奏前語且云即今年羮堯在杭兩月臣不曾與彼往來一次各官民所共知等語臣未敢深信其言連日細訪杭城官民皆云是日法海去而年羮堯來是實在杭州未見有往來之跡為此具摺奏覆臣謹奏觀謝賜履是一庸懦貿貿無知之人但猶屬謹愼操守或有可取耳同日又奏為遵旨回奏事竊查護理湖州府知府印務錢塘縣知縣楊夢琰臣到任後即細加訪問皆云操守好辦事去得惟性情有偏執之處及見其人明白亦肯任事但以知縣驟升知府係格外殊擢所以風勵合省屬員關係非小臣初到浙江惟恐知之未深俟臣再加試看一兩月果係實心任事不致改操之人方敢據實保奏臣謹奏此人聲名既優居官必有可取汝當留心斟酌如堪保薦即具本題奏同日又奏為遵旨訪問事竊臣到浙後訪問杭州各官民將軍鄂彌逹織造孫文成等在杭行事若何據云俱無放縱擾害之處至寧波提督楊長春杭州官民皆云待兵雖寬而兵丁亦不敢縱肆九月十二日楊長春到杭州恭請聖安臣因恭傳聖諭教訓楊長春敬謹領旨自必倍加小心整飭營伍再溫州總兵邊士偉據衆論云素性不好但居官亦無劣跡湖州副將穆廷弼臣亦未見其人訪得漢仗弓馬好居官平常理合據實回奏臣謹奏知道了所奏皆公聞得穆廷弼人甚平常再加訪察的確更奏以聞同日又奏為清查浮派等事竊臣於九月初八日遵例放告有鹽商汪與韓等呈前事內稱甲商浮派鹽規銀三十餘萬兩等語臣未即究理先傳杭州府縣官問明緣由據錢塘縣知縣楊夢琰禀稱本年六月間巳有商人方東升等告發此事經前撫院法海批發布政司轉發仁和錢塘兩縣問供據原告方東升堅稱甲商吳文啓等强派鹽規銀三十萬兩據吳文啓供認只派銀二十七萬兩零是實其二十萬兩零係鹽政衙門使費等供在卷時值法撫院奉旨進京後聞鹽院謝賜履與各商人講明又聞人言謝鹽院巳具摺奏明是以此案未結等語今又據呈告前來未知從前鹽臣曾否奏明臣無從查照理合奏聞伏乞皇上睿鑒臣謹奏此事謝賜履並未奏朕所告浮派鹽規三十萬兩係何年分某鹽臣任內之事詳查奏聞同日又奏為遵旨回奏事竊臣蒙皇上面諭聞浙江火耗加重須查明是何緣由或有司自行加增或奉上司之命可明白奏聞欽此仰見我皇上念切民依無逺弗照臣到任後即欽遵查訪皆云浙省火耗向與各省不同各省有至加一加二者惟浙江向例大縣每兩六分小縣八分前署撫臣石文焯提解火耗銀二分有司各官遂有借名增加者今細訪各州縣雖名為八分一錢實則巳在一錢之外甚至有一錢三四分不等臣現在嚴行查禁外理合據實回奏臣謹奏不可存代庖之念推諉泛視亦不可過為裁减無餘致令後之實授其任者諸事難辦酌中合宜而為之雍正三年十月十七日署理浙江巡撫印務吏部侍郎臣福敏署理杭州將軍印務長史臣鄂彌逹謹奏為請嚴拿逆黨以彰國法事九月二十八日申刻欽差閒散內大臣都統拉錫到杭州齎捧上諭鎖拿年羮堯欽此欽遵臣等即於是夜同都統拉錫傳喚年羮堯到臣彌逹衙門臣敏宣讀上諭即時鎖拿看守臣敏恐伊家財産有藏匿遺漏之處立即親自同內監二人赴年羮堯家內查點將內外各房門一一封閉守至天明與拉錫等面同逐件查點攢造總冊會疏具題外又臣等公同搜查年羮堯內室併書房橱匱內書信並無一紙隨將伊家人夾訊據供年羮堯於九月十二日將一應書札盡行燒燬等語及問年羮堯供詞無異至拉錫起身之後臣等再加細搜粗重家伙於亂紙中得抄寫書二本書面標題讀書堂西征隨筆內有自序係汪景祺姓名臣等細觀其中所言甚屬悖逆不勝驚駭連日密訪其人至十月十六日始知汪景祺即錢塘縣舉人汪日祺臣等一面飭令地方官將伊家屬封鎖看守一面喚伊近房族弟翰林院編修汪受祺問其去向據稱汪日祺現在京師罐兒胡同居住我若欺妄不行實說甘與日祺同罪等語取具親筆供單存案臣謹將逆犯汪日祺所撰書二本封固恭呈御覽伏祈皇上立賜嚴拿正法以快天下臣民之心以褫將來惡逆之膽臣等受恩深重義不與逆賊共戴天日為此繕摺密奏伏乞皇上睿鑒施行臣等合詞謹奏若非爾等細心搜檢幾致逆犯漏網其妄撰妖辭二本暫留中摘欵發審爾等凡經目睹之人當密之勿得泄露雍正三年十月二十四日署理浙江巡撫印務吏部侍郎臣福敏謹奏為恭報通省年成米價事竊臣查浙江通省年成米價其杭嘉湖三府早稻豐收前經繕摺奏聞外至九十兩月天氣晴明晚稻收成更好目下米價每石一兩內外又寧紹金台衢等府收成俱好米價亦只一兩至一兩一錢不等溫處等府收成尤好米價只八九錢現今百姓安和地方寧謐理合據實具奏臣謹奏闔省豐穰時和民安朕懷曷勝欣慰同日又奏為遵旨回奏事竊臣面奉上諭命臣試看護理湖州府印務之錢塘縣知縣楊夢琰居官如何之處據實回奏欽此臣前以初到浙省惟恐知之未深不敢冒昧保薦巳經摺奏容臣再加試看今臣細看該令實係操守廉潔實心辦事之員臣到浙兩月以來凡有差委事件皆能料理清結均無錯誤人實可用不敢有負聖恩再此外各官或有才無守或有守無才惟杭州府知府魏定國操守好辦事勤敏詢之合屬官民皆無異論此二員者臣所深信不敢隱蔽理合據實具奏伏乞睿鑒臣謹奏楊夢琰朕原有旨命爾保題實授今其時矣其錢塘縣缺若有人地相宜之員亦一併題奏雍正三年十一月二十七日署理浙江巡撫印務吏部侍郎臣福敏謹奏為奏聞事竊查藩庫錢糧例應親身盤查臣於十月中飭取欵冊查核據布政使佟吉圖冊開地丁關稅等欵正項錢糧舊管銀六十九萬四千二百二十五兩新收銀四百二十一萬二千八百六十六兩開除銀二百七十六萬四千一百三十一兩實在存庫銀二百一十四萬二千九百六十兩又冊開雜項錢糧共存銀六十五萬三千四百一十六兩以上正雜錢糧通共存銀二百七十九萬六千三百七十六兩臣隨於十月二十日親到司庫按欵抽兌俱係照數實貯並無缺少所有盤過藩庫實在錢糧理合奏聞再前撫臣法海奏明抵充公用之鹽規馬械等銀據藩司呈報本年鹽規銀七萬八千九十兩巳經鹽道收過銀一萬八千三百兩現在催解司庫又本年馬械銀七千一百九十八兩內據完解銀二千八百七十兩零除動用外實存庫銀一千四百五十兩零又雍正二年提解二分耗羡銀六萬一千四百四十八兩零內巳完銀四萬一千五百四十一兩零除動用外實存庫銀一萬八千七百九十五兩零又雍正三年二分耗羡銀六萬一百六十三兩原請為積儲僃賑之需今據報僅收存庫銀六千八百八兩餘俱現在嚴催未據完解以上各欵亦經驗兌無虧合併陳明伏乞皇上睿鑒臣謹奏爾自抵浙以來所奏數事暨料理一切案件俱中肯綮朕甚嘉悅特晉德一事應如是奏因朕另有所見故降嚴旨實無責爾之意接到部文不必疑懼也齎奏數摺除發部議外餘留中矣行將召爾回京相見匪遙知之雍正三年十二月二十二日署理浙江巡撫印務吏部侍郎臣福敏謹奏為奏聞事雍正三年十二月十八日欽差奏事員外郎覺羅石麟到浙江拘拿曹濤安當即并伊胞弟曹人表一併拿獲隨差委千總王瑄把總高升押解赴京交部外所有房産人口什物當經查明造具清冊此外有無寄頓年羮堯財物飭令地方官嚴加搜查另行奏聞臣謹奏此一要犯恐其知風逺揚故遣石麟前往密拏今巳就獲深愜朕懷雍正四年十月初十日署理湖廣總督印務都察院左都御史臣福敏謹奏為恭謝天恩事竊臣至愚極陋蒙皇上格外洪恩不次任用今復蒙天恩命臣馳驛到楚署理總督印務臣於九月十九日自京起程十月初八日至漢口地方接印所有入境接印日期恭疏題報外伏念臣才劣任重不勝悚懼惟凛承聖訓欽奉遵行所有奏摺更乞皇慈垂憫愚昧御批指示俾得知所遵循以圗仰報天高地厚之恩於萬一臣不勝感激之至臣謹奏應如是奮勉力圖報稱若因暫行攝署以五日京兆自居而諸事諉卸則負朕之信任矣勉之同日又奏為欽奉上諭事臣於九月二十八日到河南省城巡撫田文鏡出城恭請聖安臣即恭傳上諭汝所辦理之事皆是所以纍次加恩若一有偏執便不能皆是朝廷雖欲加恩亦不可得乃知臣道之克盡君恩之常保皆由於凡事之合宜而不執也汝宜深體此意當據田文鏡回奏臣蒙皇上洪恩委以重任復蒙聖諭諄諄教訓臣雖愚昧亦知感激不敢稍執偏見凡事務求合宜庶幾仰報皇恩等語臣復欽遵諭旨向按察使魏定國開歸道楊夢琰云直隸總督李紱來京面奏魏定國楊夢琰係誠實之人恐與田文鏡不能相合皇上聞奏甚是不喜蓋凡為臣子之道務須絶去偏黨和衷共事不可誤信人言致與上司參商即或意見稍有不同亦須委曲周旋誠心商酌方能有濟何得以此齟齬不合致妨公務皇上命我切囑汝二人自後有則改之無則加勉當據二人回稱我等本係微員蒙皇上殊恩超擢顯任何敢妄信人言致與上司參差今後益當勉力絶去偏私凡事皆與巡撫商量務求至當以圖報天恩等語為此具摺奏聞臣謹奏田文鏡懋勉公忠克盡厥職朕命爾傳旨褒奬以揄揚其美爾何得將朕諭顚倒錯亂向伊宣此一篇訓飭之旨大非朕意殊屬謬甚莫非忘記耶同日又奏為欽奉上諭事臣於十月初八日至湖廣省城撫臣鄭任鑰恭請聖安臣隨敬傳上諭鄭任鑰陛見時陳奏議論俱有可觀到任以來所辦之事甚是平常須竭力自勉不可安於因循有負委任至意當據鄭任鑰回奏臣蒙皇上天高地厚之恩雖捐糜頂踵難以報稱奈才識短淺力不從心又蒙聖主不即罷斥賜之教訓臣非木石豈不感激自今以後惟有恪遵聖訓竭盡駑駘稍報涓埃等語臣伏覩鄭任鑰為人雖少覺遲緩然其居心行已尚知自愛一聞聖諭愧悔無極我皇上時加鼓勵尚可膺一方之任也理合據實奏聞臣謹奏鄭任鑰經朕面加訓誨尚不能遵奉率多言與行違况爾轉傳諭旨如水沃石耳亦何益之有觀爾評論鄭任鑰之言頗染漢人陋習於此處看不透不過步徐元夢之後塵而已往往虛名能賈實禍不可不知也迂腐識見斷然宜去淳朴古風謹守弗失戒之愼之同日又奏為奏聞事竊臣入湖廣境即知姦民謝録正等巳獲此皆我皇上天威神算無逺不周所以頑梗姦民立即就擒但聞辰沅地方界連溪峝苖夷錯處最易煽動今謝訓旨再楚省軍政頗多懈弛臣入境所見已覺不堪除一面通行嚴飭外理合奏聞臣謹奏聞魏經國清正和平持已則有餘至於訓練營伍甚屬廢弛經楊宗仁整理一番之後較前稍覺改觀汝亟當加意嚴飭竭力整頓毋懈同日又奏為奏聞事臣自京赴楚路過直隸河南各府細詢秋收豐歉畿南地方收成七八分不等二麥已種大半入河南境年成更好開封以南秋成十分豐收刈穫堆積如坻如京二麥巳種十之七八目下雨水霑足春間可望豐收及至湖廣自德安逹武昌一路稍遜河南亦有七八分收成至米價直隸小米每斗二百四五十文至三百二三十文不等河南開封等府以及湖廣德安等府每斗二百二三十文或一百一二十文不等然沿途小民所言皆係地方行斗大小極其不齊約略較量其價皆不甚昂而河南尤賤惟湖廣有被水州縣另摺具奏外至臣所歷郡縣訪其長吏俱各兢兢守法此皆我皇上宵旰勵精察吏安民所以大法小廉皆知警惕內有直隸順德府知府范𢎞偲者廉幹執法聲名尤好合併奏聞臣謹奏閲所奏深慰朕懷范𢎞偲人好操守更優朕知之甚悉但少過於柔軟好行小惠以邀譽是其微疵耳今巳另用矣同日又奏為奏聞事臣由河南至楚路遇老幼男婦扶㩦道路詢其所自係湖廣被水之沔陽潛江等十州縣饑民逃荒入豫臣到湖廣省城即問撫臣鄭任鑰知巳先經題報並請動常平倉榖賑濟未奉部行臣思常平倉榖雖以備不時之需然非萬不得巳豈可輕動今此十州縣皆係水鄉舟楫利涉米商易通目下但須榖六萬石散賑即可無憂瑣尾臣與撫臣及司道官公同商酌查有各衙門贏餘銀兩原充公用即動銀二萬四千兩買榖六萬石但一時採買不便且恐榖價反致騰貴議將常平倉榖借支六萬石發賑即將此項銀兩陸續買補庶於積儲無損而民生有益理合奏聞臣謹奏買榖散賑籌畫甚為允當實屬可嘉朕救荒心切豈惜倉榖但如此一轉移間賑務既濟積儲仍不虧缺可謂一舉而兩得也雍正四年十一月初八日署理湖廣總督印務都察院左都御史臣福敏謹奏為請旨事竊查湖南綏寧縣苖猺屢肆劫掠本縣士民公呈請於黃桑坪地方立營彈壓情願公捐建造營房等語經湖南布按二司㑹詳議以銅鼓五開清浪平溪四衛巳奉旨撥歸黔省其備辨及四衛所轄兵丁二百八十三名可以撤回防守綏寧合之綏寧本汛兵二十一名再令宜都營遊擊帶宜都兵五十六名移駐綏寧共將辨五員兵丁三百六十名分作三路駐防庶可彈壓等因到臣臣思綏寧舊汛只二十一名今驟增四衛兵丁二百八十三名似不為少况宜都係楚蜀咽喉從前設兵防禦自有深意恐未便抽兵他駐再令詳議去後又查湖廣天柱縣奉旨歸黔部議天柱營將辨兵丁亦即歸黔獨此四衛地去兵回似未畫一臣思黔楚均關緊要今遽議撤兵恐未妥協另以手書馳問撫提二臣據撫臣布蘭泰云天柱營係本縣額設之兵自應隨地歸黔此四衛係靖沅二協內撥往汛防之辨兵原與天柱額設之兵不同以楚兵防楚地似為妥協等語臣伏查綏寧地方凶苖劫掠之案不一而足士民再三呼籲則移兵駐防誠不可緩臣意但撤銅柱等四衛辨兵令宜都營遊擊改為綏寧營遊擊移駐黃桑坪巳足彈壓其帶宜都兵五十六名之處似無庸議但銅柱等四衛業巳歸黔俱係苖夷錯雜之區亦關緊要仰祈皇上睿鑒批示施行臣謹奏此一事之機宜朕未經透徹何可遽行敕諭酌撥守禦爾當備叙情形咨商鄂爾泰詳議妥確會題到日朕再行裁奪可耳同日又奏為恭請聖訓事竊臣署理湖廣總督印務才識短淺恐措置不能合宜惟敬將所辦之事恭請皇上訓諭謹逐條開列於後一楚省吏治怠玩皆由於狥庇請託而湖南尤甚下屬公然以禀摺求請上司亦多以手札密諭因而久懸之帑項未清外結聞種種諱匿皆如此類即如臣以憲臣出使尚有湖南楚省界連黔蜀控制苖夷武備尤為緊要自督臣沔陽潛江等州縣衛被水歉收經臣至湖南巴陵等九州縣衛被水經撫臣布蘭泰具録正等一案首犯雖已就擒餘黨尚有數十餘人聞外其餘現在確訪妥商俟有定議再行請旨一苖猺雖風俗懸殊性情不一然亦知懷德畏威亦示鼓勵仍通飭衆土司各安職守有能協力緝姦者照茅岡司例奬賞如敢藏匿者同罪以上六條係臣愚見計慮多有未周均懇聖恩指示臣謹奏通盤逐欵俱有條理皆合機宜但當勉力躬行實踐耳何煩朕再為指示訓諭耶雍正四年十二月初四日署理湖廣總督印務都察院左都御史臣福敏謹奏為請旨事竊查湖廣為天下第一出米之區乃民間於豐收之歲不思積貯備荒深為可惜前督臣楊宗仁遵旨舉行社倉最為地方經久之計當據湖北湖南各州縣通共報稱貯榖八十萬石在案自楊宗仁故後督撫既不留心有司遂致怠玩今僅報實貯榖一十七萬六千石零現在被水乏食各州縣社倉俱無存貯內惟黃州府屬之黃梅縣實在存榖一萬奏宜兆熊赴楚尚需時日爾於諸務殫心料理毋稍存觀望之念也同日又奏為恭謝天恩事竊臣齎摺家人回楚奉到硃批諭旨跪讀之下不勝悚懼臣昏憒顚倒傳旨與河南撫臣田文鏡誤以褒奬為訓飭罪無可逭又因初到楚中偶見前撫臣鄭任鑰回奏恭順為其所惑尤屬錯謬乃蒙皇上格外洪慈不即加罪仍以溫綸教訓臣惶悚羞愧無地自容伏念臣以廢員蒙我皇上恩養教誨培植成人委以重任君父師恩三者兼備此外未嘗受人一毫之恩所以絶無交情不避嫌怨豈敢尚有瞻狥之念自今以後惟有恪守聖訓痛自刻勵益加勉力伏乞天恩憫臣昏愚錯謬曲賜教誨俾得知所遵循臣不勝感激惶悚之至臣謹奏汝胸中除却科甲二字則心無適莫而於事亦可無過不及之差矣署理湖廣總督印務都察院左都御史臣福敏湖北巡撫臣憲德謹奏為奏聞事竊湖北江夏沔陽等各州縣被水歉收臣等遵旨煮賑於十一月初旬次第賑起仍不時查察地方甚是安靜米價亦巳漸減惟是湖廣雨雪連綿老幼頗難赴厰食粥即丁壯逺來就食有十里至二三十里不等南方地暖臘月尚在種麥可以傭工恐每日往返有妨生業臣等公同酌議即遵煮賑之法少為變通以煮粥米數合算大口每日給米三合小口一合五勺行令各州縣確查人口數目老弱丁壯一體給米務令災民赴厰親領以杜包領侵蝕之弊統俟來春賑畢造冊報部理合陳明謹奏當如是變通救濟總期災黎得均沾實惠以慰朕饑溺之懷雍正四年十二月初十日署理湖廣總督印務都察院左都御史臣福敏湖北巡撫臣憲德謹奏為請旨事竊臣等蒞任以來細察地方情形衡量屬員賢否每見地處衝繁之府州縣各官辦事雖稱勤慎操守亦屬廉潔然才非肆應弗克勝任其地處偏僻之府州縣內亦不乏才具優長精勤能幹之員若得量為酌調一轉移間則人地相宜於吏治民生似均有裨益且次第調換倉庫錢糧亦可清查但湖北向無調繁調簡之例臣等未敢冒昧會題倘蒙皇上俯允所請臣等即就現在所知之員具疏題請為此繕摺㑹奏請旨伏乞睿鑒施行臣等合詞謹奏不但湖廣一省無調繁調簡之例即他省亦未經通行朕踐阼以來督撫諸臣往往密為奏請此舉若出於至公原屬美政倘涉於私比則其弊不可勝言矣所以朕不輕開此例然亦有一時權宜行之者惟視督撫之公私何如而斟酌於其間耳朕意調繁自必皆勤幹之員至於調簡或亦偶有抱屈者然大都姑容狥庇之舉居多地方繁簡固有不同即就極簡州縣而論莫不皆有刑名錢榖之責其闒茸劣員安可任曠厥官以貽誤一邑之事乎若不過僅短於才而無蕩檢踰間之處宜勒令退休係科甲出身者或題請改教國家頗不乏才徒使此輩壅塞仕途反致真才不獲見用於時殊難免魚目混珠之誚即如月選各官於引見時朕觀其人雖似不及但豈得以語言相貌一見而定其優劣遂將無過之人即行斥革是以姑且補授令其蒞任全賴爾等督撫大吏秉公衡鑑明試以功也朕反覆思維吏治須嚴為甄别若係庸材斷宜沙汰試思一人之榮辱得失較之國計民生輕重何啻倍蓰向來姑容陋習近於婦人之仁欲以此沽寬厚之虛名實不知乖激揚之大典也地方惟良吏難得果實係有為有守之員遇因公罣誤參劾仍不妨另為題留設遇丁艱事故揆其情理如非孤子可以在任守制亦當破格保留給假數月俾得盡其子道然後赴任倘該員報本念切堅欲奔赴則不必强或具本題請於服滿之日仍補本省遇缺即用如此方為鼓勵人材之道雖然總期出於至公無私方受薦賢之賞朕必親驗其人以别真僞也今爾楚省牧令中察有精勤能幹之員而在僻地者用違其才誠為可惜爾等題請調繁可也至於才短而任衝繁之地欲為調簡者當仰遵朕諭加意斟酌而行均將與例不符情節備細聲明題奏又所奏次第調換盤查倉庫之說似可不必何也倘或不肖有司彼此互相容隱反致爾等難於稽察矣亦何益之有諭福敏朕原命爾暫署督篆俟宜兆熊一到交代即還昨宜兆熊來京陛見看伊精神力量甚覺勉强楚督節制兩省文武任巨事繁統轄匪易且又不識一字但其操守尚優而心術亦正藹然有忠君愛國之誠為可取耳朕兹令伊督理直隸事務以試觀可否兩湖重寄一時不得其人故欲將爾多留一兩年以經畫之爾其從容次第料理可也一兩年之語係朕約略言之若一得人即命往替令爾旋都不必亟思赴闕致亂心曲近日廊廟中頗乏卿二滿臣皇子左右亦需爾來輔翊留爾在楚乃出於不得已也宜仰體朕意勉力為之特諭雍正四年十二月二十五日署理湖廣總督印務都察院左都御史臣福敏湖北巡撫臣憲德謹奏為奏聞事竊查湖廣苖猺地方不産硝磺而各案每以鎗炮傷人明係姦民販賣轉入峝寨臣等正在嚴禁細查舊案有參革藩司張聖弼任內濫給硝磺牌照尚有六十九張屢催未繳因提布政司經承訊究據供有漢口鎮私行經紀竇廷英鄭虎山等家現在貯有硝磺併供出私販犯人林西周馮三解大成等隨將各犯發署司趙之均審問據該司詳稱據林西周供所賣硝磺係伊戚前撫臣鄭任鑰在藩司任內詳明督撫買的硝八百包磺八十包其硝託竇廷英等煎提除提净硝二十盆貯局外其餘賣了一千多兩銀子交與鄭任鑰去訖餘俱現存等語又據馮三供所有硝一百五十包是伊主參革都司李愈隆的又據解大成供張聖弼任內給的牌照甚多共填過一萬六千包每包交票銀四錢共銀五千兩是前署總督滿丕得的各等因到臣等臣等伏查封疆大吏豈容官買私賣違禁射利殊玷官針除將所獲硝磺飭令藩司收貯外臣等受恩深重不敢狥隱為此合詞具奏伏乞皇上睿鑒施行謹奏凡事自應如是據實入告方可以振刷積弊頽風設以此謂過於嚴刻係發人隂私之行而不為惟互相朦隱是務則積弊何由革除頽風安能丕變若云因受恩深重方如是糾舉所見殊為小哉蓋凡屬臣工既食君祿皆當秉公忠之心行利國之事始稱克盡乃職此奏甚屬可嘉爾等督撫會同嚴查議奏同日又奏為陳明事竊臣愚蒙草率未深悉前撫臣鄭任鑰之為人為其所欺具摺覆奏甚屬錯謬伏蒙聖恩教訓臣感愧無極今果有該撫在任私賣硝磺一案發覺大玷官針臣不敢不據實具奏除㑹同撫臣憲德另摺恭奏外臣前此愚昧無知為彼陳奏之處理合一併處分倘蒙皇上天恩曲宥俾臣得改過自新臣當益加勉勵矢公矢愼庶幾虛能生明不致如前昏謬有負聖恩臣不勝惶恐之至臣謹奏君子尚可欺以其方孰能不為人所愚惑掩其不善而著其善當下燭照最難但於覺後不自文飾以遂其非則轉非為是矣何過之有勉之同日又奏為飛檄嚴查等事竊臣准湖南撫臣布蘭泰咨前事內開據臨藍營參將馬守忠禀稱據本營干總呈稱十月三十日准宜郴營移准前途各省營汛移內開蒙本都堂蔡諭開怡親王大學士等奉旨查勘河道水利凡經由之地俱著令派撥該汛兵丁二十名跟隨引導等語又據郴州吳干總禀報探得怡親王差王大人查勘河道帶騾二十一匹由旱路巳到衡山縣今衡協現在迎接撥兵二十名護送等語但未奉部咨似難確信等由到院據此查大人查勘河道並無部文知會亦無鄰省咨移且既查河道斷無由陸路行走之理明係光棍假冒合亟飛檄查拏解究以憑奏報除行文武官辨查拏外相應咨會煩查照會飭等因到臣臣一面據咨行文本省官屬兼移咨鄰省一面嚴飭各營汛辨如有其人務須查明去向一路追尋緝拏務獲如係訛傳亦必一路追溯根源嚴參重處統俟查明再行具奏外但地方有此一事理合先行奏聞臣謹奏殊堪詫異誠為大笑談也不料孟光祖之行踪復見於今日亟當嚴飭查拏務獲其人究明來歷奏聞雍正五年正月二十五日署理湖廣總督印務都察院左都御史臣福敏謹奏為請旨事竊查湖北湖南社倉貯榖據各州縣雖稱自原任總督楊宗仁故後諸事寬縱社倉原係不入交盤之項故因循遲緩不曾收足以致原榖久虧然貪墨之吏將國家倉庫正項尚敢公行乾沒民間積榖何難恣其侵漁我皇上至聖至明無不洞照臣竊以此等虧空之員不惟侵蝕者應參即怠緩久不收足者亦所當劾應如去年直隸私糶倉米之例將該州縣題參解任如審係實缺在民不曾收倉應令原報捐之官紳士庶陸續交納俟原數補足之日照例開復如審係侵欺即請革職究擬嚴限一年追完果能限內全完准其減等請旨發落臣愚以為如此則貪員知畏而社榖可以補足但全楚州縣社倉虧缺者幾至四分之一若不預備接任之員一時遽行參出恐署事無人有曠職守仰請皇上揀選候補候選州縣人員湖北湖南各敕發二十五員臣將虧空各員一一指名題參庶接署有人不致懸缺久待臣愚昧未敢擅便伏乞皇上睿鑒施行臣謹奏所奏甚是俟揀選得人陸續發往同日又奏為奏明事竊臣於上年十二月內准湖南撫臣布蘭泰咨據臨藍營參將馬守忠禀據前途報有王大人巡查河道并稱巳至衡山縣撥兵護送等語查大人查勘河道並無部文知會明係光棍假冒現在檄飭查拿咨會到臣臣即具摺奏明並咨鄰省嚴查去後續據衡陽協副將周一德覆稱並無前項假冒大人經過亦無撥兵護送等情臣現在行湖南布按二司併咨湖南撫臣就近調集衡陽將辨及原報之千總吳傑質訊是否訛傳誤報詳到之日即行參究至查原報抄單係自河南接據前途營汛之文遞傳由陜西四川雲南廣西等省而至湖南臣仍咨廣西河南撫臣挨查訛報起自何省何營聽彼省嚴究以警將來臣謹將現在查究情由具摺陳明伏乞睿鑒臣謹奏江西亦經奏到巳諭令嚴查矣此事不容少懈務須究出根由以釋疑懷同日又奏為恭謝天恩事臣齎摺家人回楚荷蒙皇上賜臣御書福字一幅風羊一隻臣即出郊跪迎至署望闕叩頭祗受訖竊臣蒙皇上擢用不次加恩兹復仰覩宸章飫沾珍味恩施稠疊臣即捐糜頂踵不足報髙厚於萬一也再臣同撫臣憲德會陳酌調繁簡互盤倉庫一摺欽奉皇上硃批臣跪讀之下仰見聖明睿照指示周詳實非臣等愚昧所能籌及又蒙諭臣巳令宜兆熊署理直督事務兩湖重寄一時不得其人命臣從容次第料理一二年聖恩有加無已仍復恤臣犬馬依戀之心溫綸寬慰若一得人即命來替令臣旋都誠荷皇上天地生成之恩即父母之於子未有周詳於此者臣跪讀捧繹感鏤心腑涕泪交并自念受恩深重異於尋常敢不竭盡忠誠剋去偏黨將地方事務遵旨次第料理以少竭區區報效之忱謹繕摺恭謝天恩并陳下悃再臣奉到御批奏摺應即恭繳因臣戀主心切請暫存臣署俾得時時跪誦如覲天顔容臣回京之日親繳合併陳明伏乞睿鑒臣謹奏朕所批諭之摺爾檢閲應留者留存回京日面繳其餘辦理事件等摺仍即繳回以備偶有察考也雍正五年二月二十日署理湖廣總督印務都察院左都御史臣福敏湖北巡撫臣憲德謹奏為請旨事竊查州縣倉庫錢糧責在知府盤查定有獨賠分賠之例而州縣虧空發覺於平時者無幾往往揭報於事故離任之日則是知府素日狥隱之弊似不能保其必無也今查督撫新任於三箇月內查明具奏臣等業經嚴檄布政司實力盤查然止據各府結報無虧終不敢盡信為實倘其中或有一二欺朦者而遽為轉奏則臣等重負我皇上慎重倉庫之至意咎戾滋深兹會同酌議乘此督撫新任盤查之際分委兩司糧驛守巡各道親往各州縣徹底清查俟司道盤明之後臣等仍親自抽盤數處則州縣之果否虧空知府之有無狥隱皆不能掩飾然後據實奏聞庶幾積弊可清但臣等愚昧未知當否伏請皇上訓示如蒙俞允并乞聖慈敕部寬限四箇月容臣等細查具奏伏祈睿鑒施行臣等合詞謹奏目今米價少昂正值青黃不接之候不宜紛擾朕意姑且委員盤查聲言秋收後親往抽盤亦足以警飭地方有司爾等若慮結報難憑不妨即將委員盤過雖報並無虧缺不敢盡信等語叙入本內具題將來或有不符處爾等亦可告無過矣至於倉糧每經一番盤查必有一番折耗勤盤亦非善舉且恐通省急於買補米價或致驟長有礙民食不若於秋收價平之時從容暇豫加意確核方有益而無害也總期爾等實心料理即少緩數月何妨如此據實直陳朕甚嘉之同日乂奏為恭奏楚省雨雪情形米糧價值事竊臣據湖北布政使王克莊報稱自雍正四年十月起至五年正月止武漢黃安荆德等六府雨雪稍多鄖襄二府雨雪調勻現在米價每石八九錢至一兩一錢不等小麥五六錢至八九錢不等大麥三錢至四錢不等又據湖南布政使朱綱報稱自去年十月至今年正月各屬有得雪者有未得雪者大抵雨水稍多現在米價中米每石九錢五分至一兩四五分不等上米一兩一錢至一兩三錢不等與臣訪查無異再湖北自冬至春因雨雪稍多種麥僅有十之五六將來天氣晴和可望收成俟二麥登場臣查明收穫分數再行奏聞臣謹奏湖南雨水稍多朕亦聞之至所奏米價在爾楚省似覺過昂矣或亦因買補倉榖之所致耳去歲直省不為歉收而各處米價皆至稍貴者諒必因此之故暫時雖覺可憂而儲備豐盈緩急有濟則又為可喜之事也朕所見如是爾等頗以為然否雍正五年三月十六日署理湖廣總督印務都察院左都御史臣福敏湖北巡撫臣憲德謹奏竊臣憲德齎摺家人回楚蒙皇上發下候選知縣周㑹賢訓導改補主簿劉方夏各條奏原摺到臣臣等欽遵硃批諭旨公同逐一詳看其周㑹賢所奏襄陽府屬有往來居民稠雜臣等正在酌議欲請添設巡檢一員以資巡緝謹閲劉方夏條奏原摺欲照黃州府屬之岐亭安陸府屬之新堤以同知通判駐防之例請將漢陽府通判移駐漢口但查漢陽府同城聖裁謹將臣等愚見恭摺陳奏伏乞皇上睿鑒謹奏覽署理湖廣總督印務都察院左都御史臣福敏謹奏為奏明事竊臣署理湖廣總督印務自任事之後即查衙門一切陋規盡巳革除惟有武昌厰稅一項每年除解正額之外約計贏餘或六七千或七八千兩不等又有鹽商未裁小禮銀四千兩前任督臣楊宗仁留此為總督衙門養廉之用今臣奉命至楚自去年十月至今計有贏餘銀四千兩商人小禮銀二千兩除上年買米賑濟用去二千兩外尚存銀四千兩今因饑民停賑臣恐青黃不接男婦尚有乏食者即以存銀買米散賑以廣皇仁緣臣身受皇上隆恩至深至渥若以此項自奉過厚更加踧踖難安此臣出自至情非敢矯廉干譽惟臣先因暫署月日不久故不延一幕客今見兩省刑名錢榖事務殷繁必須幕賔相助辦理所需修金等項并將來日用薪水之資俱不免以此項銀兩支用統俟歲底臣將收過若干支用存貯各細數另摺奏報謹繕摺奏明恭請皇上聖訓以便遵奉施行臣謹奏不但汝不必矯廉且汝係暫時署理若令後任難乎為繼亦非情理之平督撫衙門養廉自當酌定數目朕豈有令汝等枵腹從事之理况一切賞犒兵辨延納幕賔之需有斷不可省者今將憲德奏摺發汝酌定其山西陜西河南督撫朕皆許以一二萬金養廉因楚省各項何者可作督撫養廉朕未周知難以批諭耳汝膺署理之任正可一秉公恕斟酌允當之數隨便附奏以聞似此瑣屑之事朕本不欲聞緣汝等皆以為必令朕知心始得安朕亦不過聊為知之而已至汝等品行之清濁全不在此也同日又奏為奏明地方情形事竊查楚省民風素稱獷悍而標營兵丁亦復驕縱比年以來官斯土者惟以姑息為事以致兵民益無忌憚去年偶被水災便至興造訛言强借稻榖臣仰遵聖訓竭力整飭犯法之人必無寬縱并飭各辨嚴為約束俾營伍之中各遵紀律至州縣內有無賴棍徒勾結夥黨冒稱饑民擅至民家強借榖石者臣即行地方文武各官查拿懲處斷不容其擾害善良此係臣職所當行之事不應瑣陳以煩聖聽但臣於地方事宜無論巨細不敢一毫蔽隱理合繕摺奏明伏乞皇上睿鑒臣謹奏朕亦素聞湖廣人情刁頑比有奏朕當照依浙省整飭者汝為全楚綱領陋習若此自應竭力懲治以振其頽風但不可過為急迫令闔省無所措手惟相機隨宜而推移之方收善俗新民之效汝自署篆以來聲名頗優摺奏甚合朕意大凡以誠事君實心任事未有不表見者人孰無良久之臧否自辨即或人不見知上蒼寧不鑒察耶勉為之同日又奏為恭陳土司情形應請歸流仰祈聖訓事竊臣於本年正月據九溪協副將包進忠呈報有桑植土民男婦千餘人逃至邊境據稱巳革土司向國棟仍舊掌印威逼凌虐是以奔逃伸寃情願改土歸流等語併將土舍向朝先等五名解報到臣現發湖南兩司審究臣查奔逃土衆至千有餘人則該土司之恣為凌虐不善撫馭可知所有印務若令其妻護理必至妻報夫仇若令伊子承襲亦不能子幹父蠱勢必戕害無巳臣愚俟兩司審明之日應如土民所請改土歸流再鎮筸紅苖原有十里其下四里久巳歸化而上六里之苖貼近保靖向為保靖土官所管今該土司彭御彬與其弟彭澤蛟等同室操戈連年抄殺經撫臣布蘭泰題參革職現在究擬臣愚以為宜乘此時議改歸流實為久安長治之策臣細考地圖形勢其下四里地方設有鎮筸鎮重兵彈壓下四里之西北即為上六里其地與保靖接壤保靖之外為永順為桑植為湖北之容美各土司地界若將保靖改土歸流則鎮筸一鎮已貫紅苖之腹心再於鎮標選撥遊擊一員帶兵駐劄六里界內之崇山衛城以扼其腰背又以遊擊一員帶兵與同知一員駐劄保靖司城與鎮筸乾州互成掎角之勢如此則鎮營各官兵星羅棊布措置周密不特六里之苖不能與土司相通不敢仍前肆縱即未附之紅苖亦日漸月摩數年間可以悉遵聖朝德化也臣今因姦民謝録正一案將赴長沙會審奏覽雍正五年四月二十一日吏部尚書署理湖廣總督印務臣福敏謹奏為奏懇天恩事竊臣前奏請帶明史館纂修舉人葉滋前往湖廣雍正五年葉滋回京會試荷蒙聖恩特賜召見賞賚有加諭令即回湖廣不必候榜若得中式即以此番召見准作殿試今葉滋已得會試中式蒙特賜第二甲第十名進士出身此從來未有之曠典也臣伏查葉滋為人學問優長存心端慤可否仰邀皇上格外洪恩授以文學侍從之任俾得親承聖訓以成其材必能益自奮勵無負天恩臣謹奏此人朕量其材質可用為郡守尚在斟酌未定也同日又奏為遵旨酌議奏聞并謝天恩事竊臣因總督衙門有厰稅羡餘及鹽商小禮二項向為養廉之用是以據實奏聞而撫臣憲德亦以巡撫衙門荆關稅羡并鹽商小禮具奏俱蒙御批著臣酌定隨便奏聞欽此仰見我皇上體恤臣工無微不至臣伏查湖廣總督衙門厰稅羡餘鹽商小禮每年約共銀一萬二千兩巡撫衙門荆關稅羡及鹽商小禮每年約共銀一萬四千兩原係前督臣楊宗仁酌留之數似足一年之用今臣細加酌量應仍以此一萬二千兩留為總督養廉其賞兵奏摺等公用仍支動三分耗羡則後任諸臣飲食日用悉出皇上之恩賜矣至撫臣憲德請將稅羡小禮充餉另於三分耗羡內賞給養廉之處查解司耗羡原備闔省公事之費若於此內動給恐公用不敷不若仍以荆關稅羡并鹽商小禮銀一萬四千兩聽為巡撫養廉不煩更易而儘可敷用臣謹酌定具摺奏聞再臣署任內所有前項銀兩悉貯藩庫除賑濟過銀六千兩外如有必不可省之需遵旨動用仍行僃案存查俟督臣邁柱到任交代臣謹望闕叩頭恭謝天恩臣謹奏此所議是但朕欲將憲德與馬會伯互相調用俟邁柱到楚爾與之交代時總將前後情節併朕之諭旨備悉說明令其知之可也同日又奏為恭報夏收分數米糧價值事竊據湖南布政使朱綱開報通屬二麥收成約有七八九十分不等米價中米每石九錢八九分至一兩二錢不等上米一兩二錢三四分至一兩四錢不等雨水霑足至一兩一二錢不等上米一兩三四五錢不等秧苖栽插雨水霑足等語臣訪查無異而市賣米價因江西廣西江南等省採買販運者多故價尚未减臣仰體皇上一視同仁未便阻遏聽其流通現今地方寧靜相應繕摺一并奏聞臣謹奏趙殿最前因奉差船厰無忝厥職甚屬可嘉回京復命奏對亦甚明白似為實心任事之員故於伊告假在籍之日擢用為湖南臬司及伊來京陛辭時神氣恍惚舉動浮躁總不是前番光景朕當即諭問據伊奏云途中患病方愈但恐其人非提刑之才通省讞獄關係緊要汝其細加訪察奏聞同日又奏竊臣查前撫臣鄭任鑰私賣硝磺一案經臣審明請旨革職治罪於閏三月二十一日具題隨於二十六日接到內閣來文蒙皇上御批撫臣憲德奏報鄭任鑰將銀二千兩令伊家人交庫緣由命臣一併察明奏聞臣正在察奏間又奉諭旨將鄭任鑰發至楚省欽此臣思事係一案應俟任鑰到日一併察明具奏合先陳明再謬沖花苖一事經臣會商黔省協力擒捕業已具摺奏明今黔省委撥遊守二員帶兵三百五十名粵西委撥千總一員帶兵一百名臣委遊擊吳文都司劉策名帶兵三百名會合訂期齊進今據報於閏三月二十四日黔省官兵堵截後路楚省官兵從前路直抵賊寨凶苖四散竄入深箐官兵搜捕先後拏獲花苖二十餘名口并器械等件現在遍行窮搜等情臣又飛檄新任副將黃賢率同吳文等細加搜捕務盡根株俟事竣之日查明疆界作何安設塘汛為巡防善後之䇿臣與黔省督撫提臣會同酌議務使地方寧謐外所有官兵已破凶苖巢寨擒獲苖口及現在搜捕情形合併奏聞伏乞皇上睿鑒臣謹奏閲所奏捕苖情形深愜朕懷此番籌畫甚合機宜雍正五年七月初九日吏部尚書署理湖廣總督印務臣福敏謹奏為恭謝天恩事臣齎摺家人回楚捧到欽賜金扇香藥各等件到臣臣出郊跪接望闕叩頭謝恩祗領訖竊臣才劣任重毫無報效屢蒙聖主賞賚稠疊臣何人斯常膺異數惟有竭盡愚誠仰承聖訓以圖少效涓埃之報於萬一不勝感激之至臣謹奏覽奏謝知道了爾所奏土司二摺因朱綱現在京中令其會同廷臣詳議俟奏覆時有旨同日又奏為奏聞事竊今年五六月間因雨水過多米價未平當有湖南之安鄉龍陽等處姦徒乘機搶劫行舟臣即會同撫提拏獲姦匪撫綏良民皆已寧帖至湖北之武昌漢陽等處被災甚於湖南以致米價騰貴臣多方措處捐資買米平糶接濟民食俱各安靜乃有游手無藉之棍徒散布謡言勒衆罷市冀有不順從者即行搶奪臣確訪密拏當獲為首之監生石光才甲長陳由先等取供收禁百姓無不稱快各安生業似此刁惡棍徒若不盡法重處無以懲後理合奏聞請旨遵行臣謹奏此風斷不可長當嚴加懲創以警將來類斯等事何必具題徒滋案牘審明確情立斃之杖下可也同日又奏為恭報被水情形事竊楚省於六月初旬大雨連綿湖湘江漢各處水長一時奔滙大江以致江水泛漲較之去年更高二尺其高原之地水淹不到者早晚二稻皆無傷損至窪處湖田悉已淹沒所有被災州縣經臣榖各州縣照常散借外其餘江夏沔陽等州縣查有鹽商公捐積儲銀兩臣請動支委員赴附近豐熟處所買米平糶則米價不致高昂於民生實有裨益再臣現往荆州一帶查看堤工刻下已經江水漫潰諸口堤內堤外水俱平滿堤外之水正在消退則堤內之水相應導之使出不便遽行堵築俟水勢全退臣即督率地方官竭力修補理合陳明伏乞皇上批示施行臣謹奏已有旨矣當遵旨悉心措畫督率辦理務使災民得均沾實惠以副朕念同日又奏為密陳事竊查噶禮幕賓歐曲寄頓噶禮財物一案有歐曲之姪歐履原等在楚省漢口鎮置房開典前經委員歷審俱稱係履原自巳資本營生經臣另委研審供稱原未分家則其為歐曲資本無疑所有未經審出各員理合參處臣一面具題附參在案但內有安陸府知府周夢錦係調鄰府會審之員該府屬沔陽等州縣上年被水歉收該守撫恤災黎甚著勤勞又漢陽府解任知府郭朝祚現在奉文引奏覽雍正五年七月二十六日吏部尚書署理湖廣總督印務臣福敏謹奏為奏聞事竊查湖北未經被水地方據布政使黃焜彚報早稻收成七八分不等入秋以來雨水調勻將來晚稻可望豐收等語湖南除被水州縣外據署布政使趙殿最彚報早稻收成八九分不等目下雨水亦無缺乏晚稻可望十分收成等語臣親訪無異至江水泛漲幸叨聖主福庇水勢旋即消落荆州驟退一丈五六尺武昌驟退五六尺沿江低田盡露尚可播種雜糧再各府米價俱在一兩內外惟武昌漢陽荆州等府地當孔道驟貴驟賤目下米價每石九錢至一兩二三錢不等但連歲歉收民無蓋藏現在被水處所出米甚少今各省採買之員雲集楚省恐即日又有驟貴之患臣仰體皇上一視同仁之意不敢遏糴惟是被水饑民急資救濟别省積儲之項可否緩至深秋或酌量稍减其數以留有餘庶不致一時騰貴使他省徒捐重價而本地災黎乏食理合密奏請旨訓示施行臣謹奏此在爾隨宜酌量而行之朕意米價果昂不禁其糴而他省自不往糴矣况懋遷有無係百姓營生之道非可强之也朕不便諭止同日又奏為請旨事竊臣自武昌起程查看安陸荆州各府民間被水各衛其田為日巳久今若官為堵築則長江兩岸聖恩賑濟自十一月初一日始至今年二月底止臣意冬初水退尚未嚴寒正可興工可否仰懇皇恩今年早賑一箇月自十月初一日起除老幼婦女照常計口給食外其餘丁壯皆令修築堤塍優給民堤照常每年民修民築如此則饑民不至乏食而堤工可以完固矣是否可行伏乞皇上批示施行臣謹奏覽雍正五年九月二十二日吏部尚書署理湖廣總督印務臣福敏謹奏為彚報楚省收成分數仰祈睿鑒事竊楚省本年中晚二禾收成分數經臣檄行確查去後據湖南布政使趙城開報中晚二禾總計七八九十分不等米價每石八錢四五分以至一兩四五分不等又據湖北布政使黃焜報稱湖北被水州縣二禾收成約計四五分其餘俱七八九十分不等米價每石七錢八分以至一兩一二錢不等臣復查無異併查被水窮民有前往鄰省附近豐熟地方傭工趁食者今水退之後米價日減巳陸續回鄉復業理合奏聞伏乞皇上睿鑒臣謹奏前聞楚民離鄉就食者甚多亟當設法招徠務令各旋故土得以復業方為撫恤之道觀汝節次所奏與朕所聞互異切勿稍涉欺隱負朕深恩特諭同日又奏為恭報調遣官兵撫輯事宜仰祈睿鑒事竊查桑植保靖土司改土歸流一案經臣會同前撫臣布蘭泰滇撫臣朱綱摺奏荷蒙皇上憫念邊氓俯准改流臣於九月初五日准吏部密咨適值副將楊凱正在武昌并有鎮筸遊擊王進昌亦以調考在省臣隨密撥辰州九溪二協兵各二百五十名令楊凱統領帶同僃辨以及新設同知鐵顯祖前往桑植又密撥鎮筸鎮兵三百名令王進昌統領同保靖同知劉自唐赴保靖并照會夷陵鎮筸兩鎮各於邊界密加防範臣因辨兵以糧餉為先已令預給兩月兵米又慮各兵出行需費臣將皇上恩賞養廉銀內以一千兩分給楊凱王進昌帶往犒賞去訖再查彭御彬向國棟先已羈候省城而其妻子仍留原地臣今令該將等護送至長沙收管俟事結之日聽候給還安插所有微臣現在布置辦理事宜合先具摺奏聞伏乞睿鑒臣謹奏此等事宜正須加意鼓舞豈可吝惜犒賞如許兵辨千金何能濟事觀汝料理殊不妥協雍正五年九月二十五日署理湖廣總督印務臣福敏湖北巡撫臣馬㑹伯謹奏為請留賢員事竊查武昌道趙𢎞本年壯才優辦事勤練兹奉旨調補貴州貴東道但武漢黃三府本年偶有被水之處開賑在邇正需道員督查又兼有江堤更藉能員專理仰懇聖恩可否將趙𢎞本以升銜留任抑或俟堤工事竣令該員再赴黔任統出聖慈伏乞皇上睿鑒施行臣等謹奏趙𢎞本原係能員因貴東缺甚緊要朕有意調用令其速赴新任趙𢎞恩居官亦優係汝等所知者何必多此一奏朕殊不以為然也雍正五年十一月初十日吏部尚書署理湖廣總督印務臣福敏謹奏為土苖感恩向化亟請設縣立營以定久安長治之䇿事竊臣接准部咨隨即密委副將楊凱遊擊王進昌等領兵前往桑植保靖續據禀報各官兵於十月十二日巳抵桑保二司地方土苖男婦載道歡迎并據向氏繳印歸誠緣由經臣具疏題報在案臣查桑保二司今改土歸流若分屬州縣管轄皆相距窵逺難以控制請改為二縣各設知縣一員典史一員桑植隸於嶽州府以現設之嶽州府額外同知分防管轄保靖隸於辰州府以原設之保靖同知分防管轄所設二縣恭候皇上欽定縣名敕部鑄給同知知縣關防印信以昭職守再查副將楊凱現已奉旨授為桑植副將應為一協設中軍守備一員千總二員把總四員共兵五百名保靖應立一營設遊擊一員中軍守僃一員千總一員把總二員共兵三百名該營聽桑植副將管轄其新設副將遊擊關防并請敕部鑄給至前撥九辰二協兵各二百五十名鎮筸鎮兵三百名皆係緊要重地不便久懸臣現咨提臣題再現值寒冬雨雪之候桑保議建營房尚需時日臣現捐銀蓋草房四百間令兵棲止再查永順土司彭肇槐素常恭順臣令撥領土兵二百名同進又官兵米糧該土司用夫運送尅期無誤應否議皇上睿鑒施行臣謹奏覽同日又奏為恭謝天恩並陳犬馬愚誠仰祈睿鑒事竊臣自去年十月奉命署理督篆正當楚省被水饑民待哺之時緣總督衙門向有武昌厰稅贏餘及鹽商小禮臣是以於稅羡內動銀二千兩倡捐給賑業經題明在案是時養廉一項尚未奉旨公費無可支用因查督臣楊宗仁任內凡督臣新任閲兵犒賞及齎摺路費等項俱於耗羡公項內動用臣愚昧之見以為有楊宗仁之成例而未細思耗羡之不可輕用此臣智識短淺相沿舛謬罪實難辭及後荷蒙皇上批摺准給養廉適在青黃不接之際米貴民饑臣因思皇上准給養廉銀現有六千兩貯於司庫故仰體皇仁支散窮民乃臣不敢自私之實情若敢一念稍萌巧詐一事敢為欺隱安能逃聖明之洞鑒乎臣總制全楚識淺才微辦理多有未周有負皇上任使之恩今蒙寬仁不即譴斥臣跪讀諭旨不勝惶悚汗流感激淚下惟有省愆悔過矢報將來伏乞聖慈俯垂鑒察至臣用過耗羡銀兩謹遵部議補還司庫合併陳明臣謹奏大凡天下事但涉於巧僞未有久而不露之理也汝其知之雍正六年二月十三日吏部尚書臣福敏户部左侍郎臣史貽直謹奏臣等於雍正六年正月十三日欽奉諭旨命臣等至保定府審理曾逢聖各案及解任布政使張適按察使魏定國夾斃吳橋縣生員竇相可情由臣等於二十一日抵保定府即檄提曾逢聖各案文卷及案內應審人犯一面多寫告示遍發曾逢聖歷任正署地方張掛招告去後臣等隨提張適魏定國到案秉公嚴審據張適將夾斃竇相可又謊稱病故之處供認不諱而魏定國職任刑名知情狥隱之處亦俯首無辭臣等遵旨即將張適魏定國鎖拏監禁現在按律定擬其竇相可告曾逢聖私派各欵一案共計入已贓銀一萬三千六百兩衆證確鑿曾逢聖亦已供認其張子醇龎五雲所告私派二案與李應聘控告收受監生王棫銀兩認拜門生一案曾逢聖俱承認不諱其原任薊州知州李英控告曾逢聖勒索屬員各欵一案亦據供認是實其桑成鼎家人王玉控告曾逢聖過付李紱銀兩一案緣李紱在天津截漕時李維鈞將銀一千二百兩令曾逢聖前往餽送過付是實欵內又開有旗丁運腳銀七千八百兩一項據供並未經手查係桑成鼎將此項銀兩令守備張傑送至李紱家眷船上並非曾逢聖過付今李維鈞等俱在刑部監禁李紱亦現在京應俟臣等具題到日請敕部就近提審查張子醇等控告曾逢聖四案張適魏定國未經會審其竇相可李應聘控告曾逢聖二案據張適魏定國會審轉詳竟將曾逢聖入巳贓銀審作因公科斂故出其罪又不追贓枉法袒護情弊顯然除各案問供並各犯罪名容臣等於題本內詳細叙明定擬外合將審過情節先行繕摺奏聞再查本年二月初九日據順德府任縣報稱有褫革生員梁標遵旨首告又據大名府報稱有户房書辦王大用遵旨首告但案內應審人犯及應查卷宗俱未解到臣等現在飛提俟案犯卷宗到齊之日即行審訊其餘各府州縣再有遵旨首告者臣等一併審明具題為此謹奏特命爾等前往審理者原為張適夾斃竇相可之事此案既明其餘首告曾逢聖之案現巳審明者具本題奏其續告之王大用等呈詞若俟提齊各犯尚需時日爾等不必守候俱交與該督等徐徐審明具奏可也硃批諭旨卷二十五
