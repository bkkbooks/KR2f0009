body:
  text: 欽定四庫全書硃批諭㫖巻六十三硃批劉柟奏摺江南安慶按察使臣劉柟謹奏為敬陳芻蕘之言仰祈睿鑒事臣扵雍正六年九月二十四日到按察使任伏念聖恩髙厚委臣刑名重任時刻冰兢惟期律例詳明刑法平允以仰副我皇上慎重民命之至意就臣所辦刑名案件扵律例内偶有所見以及地方有應調劑者不揣愚昧敬為我皇上陳之一律例未明條欵宜請分析也查律載强盜傷人未得財比照搶奪傷人律科斷在搶奪本條内開傷人者首斬監候為從各減一等従來讞獄俱以造意者為首但造意止在搶奪而傷人則在臨時或一人起意搶奪為従者俱動手傷人則為首擬斬而傷人之犯反得減流似未平允況强盜傷人法所難宥若照搶奪以起意為首則傷人為従者皆得末減亦屬寛縦雍正六年十一月内部議竊盜拒捕殺人者將臨時拒捕為首殺人之犯照例擬斬立決其拒捕為從者照免死減等强盜例刺字分𤼵吉林烏喇等處給披甲之人為奴再竊盜臨時拒捕傷人不死者將為首傷人之犯擬斬監候其為從者刺字𤼵邊衛充軍奉旨依議欽遵在案臣請嗣後搶奪者除殺人之犯照雍正五年二月初二日奉旨照竊盜殺人斬決外其有數人同殺一人併殺而未遵守即强盜比照搶奪傷人之律亦可援照無誤矣又查雍正五年十月内奉刑部議分廵杭嘉湖道徐鼎條奏内開强竊盜犯如事主浮開贓物審出照不應重律治罪等語扵以杜浮開而免延案法至善也第在强盜原非計贓定罪之案但一得財即應斬決事主尚忍多開贓物以圖詐冒予以重杖夫復何辭至扵竊盜則必計贓定罪往徃有贓止十兩上下竊罪不過杖六十杖七十而事主開之數分別多寡以定其罪除冒開贓物數至滿貫者應照强盜事主冒開贓物例杖八十其餘未至滿貫應照不應輕律笞四十至扵冒開數少仍開應従寛免其治罪又查鬭毆律内條例開載凡審共毆下手擬絞人犯果扵未結之前遇有原謀助毆重傷之人監斃在獄與解審中途因而病故百夫以擬抵之人而竟減為滿杖似屬輕縦但律未開明恐引律者或有意為輕重出入之處伏乞皇上敕部將擬絞之人作何問罪之處開載通行則法既畫一有所遵守不致有妄為出入者矣一上江署事官員宜請速委也臣思上江所轄七府七州止為江南半省宜若事簡易治而詎知委及千里府州縣官或奉題㕘革職或因事故降調舊官離任必由布政使詳請委署布政使駐劄隔省及至行文知照遴員詳請詳准之後又復行文布政使轉行委署之員毎至曠官二三月署員始得到任查欽部命盜案件各有限期雖新舊交代定例各得展限一月但或至二三月無官其中虚日無從扣算毎至枉受㕘罰且徵收錢糧亦必按期完納數月無官誰為催比積至數月之糧欲其一旦併完必至聖眀鑒察上江地方形勢俯准格外變通敕諭速委則員缺不致久懸而刑名錢糧俱得無誤矣一徽寜年逺世僕宜請開豁也安慶撫臣魏廷珍欽遵上諭飭查徽州府伴儅寜國府世僕開豁為良議覆一疏扵雍正六年二月内經部議覆奉㫖依議欽遵在案自奉文以來凡及身現有文契之為僕與附居佃田之非僕俱各遵行無違惟有年代久逺文契失落分别豢養與不豢養一條争端不已紛紛訐訟臣查告争世僕之案多有自故明以來歴年一二百載歴人一二十世其丁口每至盈十累百祇因一二人受主豢養或執年逺無印舊契遂致合族子子孫孫不能出頭此等之人實屬可憫又查雍正三年二月内户部議覆查思哈條奏内開旗下奴僕若果係數輩出力之人伊主念其勤勞聽其贖身為民等語則是服役已厯數世亦當念其勤勞放出為良臣愚以為皇上特施寛大之典拔人汚賤之中應請餘無契者固不得久占為僕即有契者亦俱聽贖為良毋許仍以世僕告争則世僕相沿之惡習可以革除矣至扵配人婢女之為奴僕一條撫臣議覆因貧幫工配人婢女與部議投靠招配婢女之奴僕似屬有間夫因貧幫工者貧不能出聘銀而以幫工議價作聘工價滿日擕婦而歸非投靠者萬一伏乞皇上睿鑒施行謹奏通篇悉屬乖謬之詞浙江按察使臣劉柟謹奏為敬攄愚鄙微忱仰祈睿鑒事竊臣扵安慶按察使任内恭奏敬陳芻蕘一摺欽奉硃批臣跪讀之下仰䝉皇上指出種種悖謬之處臣始知昏昧妄凟俯伏汗流惟日夕惶恐待罪乃荷聖主𢎞慈不加重譴旋調補浙江按察使聞命自天感激涕零臣向聞浙江難治恭請叩覲天顔跪聆聖訓未䝉俞允心切靡寧及抵任以來見士民守法闔省命案亦不甚多聚衆生事惡風頗息地方安静與臣向日所聞各異臣謭劣庸才惟有益加奮勉勤慎辦事竭盡犬馬之微忱少圖報效扵萬一耳所有前奉硃批奏摺理合恭繳謹奏今汝在浙得知李衛之居心行事當勉力效法之署理江南江寧布政司印務按察使臣劉柟謹奏為奏明事臣以庸愚荷䝉天恩由候補之員授以知府洊陞按察使歴任以來才力不逮乃䝉皇上不加擯斥畀署安徽布政使事聞命之下益深儆惕竊念藩司為錢糧總滙非臣衰憊之人所能辦理而署司噶爾泰陞任三庫侍郎責任重大臣又不敢稽延時日遵即星馳就道扵七月初三日到任面同噶爾泰將庫貯正雜錢糧逐一彈兊先出收明印結交噶爾泰赴任復将存倉米石照數盤量查核明白扵交代限内将各項銀米備造册結申送督撫二臣公同㑹盤保題外查雜項錢糧内有應解部并給領給還之項亦有交存日久無項可歸應充公用之欵厯任布政使遇有地方公事俱扵此内查欵動用其耗米随正交收為存倉預備折耗之用前後交代歴未達部臣巳經逐欵查清不敢絲毫隱漏嗣後凡有給領支放及辦理地方公事詳請督撫方行動用所有銀米細欵逐一另開清摺恭呈御覽謹奏覽此係例應具題事件何必多一番煩瀆署理江南江寧布政司印務按察使臣劉柟謹奏為瀝陳下情仰祈睿鑒事竊臣扵浙江按察使任内奉到署理布政司之恩旨聞命之下感激難名益深祗懼誠以藩司為錢糧總滙事繁責重臣智識短淺難肩鉅任即欲懇辭因念三庫事務皇上特命前署司臣噶爾泰專管更屬𦂳要應令速行赴任臣是以星赴江寧接明交代以便噶爾泰起程赴京兹臣實有下情不敢不奏更不得不奏者臣今年六十二嵗雖年非遲暮但臣生質本弱未老先衰年来上齒脫落飯食頓減舊有足疾向年不過一二次舉𤼵藥餌調劑尚易痊可今嵗自四月至今足疾糾纒歩履不便此江浙兩省官民所共見共知者且藩司衙門財賦出入闗係非輕承流宣化責任綦重以臣老病昏愚倘智力不周稍有錯誤在臣自有應得之罪獨是上負朝廷如天之大徳下墜祖父累世之家聲罹兹咎戾追悔已遲此臣之下情不敢不奏不得不奏者也臣謹披瀝愚忱上瀆天聽叩祈皇上念臣衰老将安藩要缺另簡賢能更替並請或内或外調臣一缺俾臣力量可以辦理者臣得勉竭駑駘斷不敢自求退閒辜天恩而負聖徳也臣曷勝恐懼待命之至謹奏覽奏巳悉且勉力供職静候諭旨署理江南江寧布政司印務臣劉柟謹奏為奏請睿鑒事竊臣䝉皇上天恩調署安藩綆短汲長日夜兢兢扵交代清查事畢乃得周察地方訪聞所屬城垣坍塌甚多随經行查現據各屬紛紛回報其巳經估計工料者有二十四處内臨淮縣偪近淮水修城兼須修壩甚為𦂳要統計各屬已估有二十八萬餘兩之多其餘或詳稱工程浩大現在估詳或尚未經覆到工繁用鉅祈費不貲宜從前之不能修葺也除現在飛催俟各屬覆齊再委賢員確勘確估外惟是責之有司捐修則各屬養廉之銀僅足以敷幕友薪水之用勢難責其成功如動藩庫公項則江寜藩庫所存公項無多如用正項錢糧關係軍國正供未敢擅動臣朝夕思維計無所出巳陸續據文詳報督撫二臣批司委議在無米之炊固乏良謀而城衛重務又難緩置竊查南省存貯李玉堂入官銀兩已奉提解四川為修城之用今江寜臬司現有寄存江寜藩庫崔二李煦二案正贓并傾銷折耗水脚各等費通共雜色銀一十萬九千四百六十九兩零與李玉堂入官之銀相同可否先将此項查眀極衝之地𤼵為修城之用其餘不足者請敕督撫查議或酌量扵江南省常平倉彚報各屬等事例捐納穀石之外有情願捐銀者准其在修城地方折交銀兩以濟工用如此則錢糧不致虧耗城工不難報成固金湯而垂永久扵國扵民均有禆益矣為此具摺謹奏此奏識見迂謬議論不通處不可枚舉難以逐行批駁也太常寺卿署理江南江寜布政司印務臣劉柟謹奏為奏請截留漕米改徵穀石紓民力以裕倉儲事竊查江南地方上年偶被水災荷䝉皇上天恩發帑發粟疊沛恩施又敕動常平倉穀概行賑濟其轉徙就食之民仍動支存公銀兩資送回籍被賑窮黎固已歡聲雷動普天臣庶無不感激涕零但臣查安徽各屬積貯本屬無多被災最甚之州縣一經動用即至顆粒無存現在與督撫二臣斟酌買穀以收儲備之效恭讀前奉上諭以京通各倉積粟充盈足支五年之用宻令各省督撫将漕糧徵收本折情形變通酌議仰見睿慮周詳督撫二臣轉行宻議臣業将漕米折徵時價給丁銀米逐一定議請自雍正九年為始以六分起運四分改折壬子癸丑二年以七分起運三分改折停運三年以後仍請照常輪運宻詳督撫二臣聽候核奏在案臣今再四思維前項採買穀石莫若變通酌濟将雍正九年額辦漕糧照依改折之議一米二穀扵江蘓各屬截留漕米三十萬石改徵穀六十萬石安徽各屬截留漕米二十萬石改徵穀四十萬石量地制宜斟酌存撥如該州縣原貯無多及動用已完之處則將所徵穀石分別添貯如原係徵收折色地方則将鄰縣留漕穀石就近撥貯其壬子癸丑二年仍照前議改折庶百姓省礱工折耗之費有司免採買輓運之煩各屬收儲備充盈之益似與國計民生稍有裨益是否有當統候皇上睿鑒施行謹奏停漕一事尚未定議候旨遵行太常寺卿署理江南江寜布政司印務臣劉柟謹奏為奏明事竊臣扵雍正八年七月初三日抵江寜布政使任自到任至今計催完康熙五十七年至雍正八年地丁米豆屯衛折蘆課錢糧六十二萬六千四百三十八兩零又催完雍正九年丁地等欵錢糧二十七萬九千一百三十八兩零俱經按月册報督撫查核又臣經手動放採買餘剰節省共銀七千二百一十三兩零相應循例奏眀解部充公抑臣竊有請者安徽各屬向来倉穀無多而上年被災州縣疊奉恩旨賑恤倉穀動用所存無幾臣現在另摺奏請留漕易穀如䝉聖慈俯允則扵各屬原存倉穀之外酌量加貯其中厫座缺少者自應估計添建以收廣貯之益查各屬建倉案内原經議動歴年提觧節禮銀兩但恐各屬一時並建費有不敷敢請皇上天恩准将此項節省贏餘銀兩准留司庫通融動放如節禮一欵足敷建倉之費則將此銀留充本省公用統扵耗羡冊内另欵達部報銷伏乞皇上睿鑒施行謹奏所請留漕易穀之處行否尚在未定何乃遽及建倉耶前項銀兩仍循舊例解部為是硃批諭㫖巻六十三
