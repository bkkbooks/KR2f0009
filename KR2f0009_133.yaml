body:
  text: 欽定四庫全書硃批諭旨巻一百三十三硃批喬世臣奏摺雍正九年十一月初二日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲微臣重任難勝仰懇聖訓遵循暫行辦理事竊臣備員下吏毫無寸長荷䝉皇上洪恩一載之内由知府疊次超擢晉秩京卿特敇署理江蘇廵撫印務聞命之下感激涕零雖捐糜頂踵不足圖報於萬一惟有倍增悚惕竭蹷奮勵以勉效犬馬微忱但江蘇地方為東南水陸通衢江海環繞内外户口殷繁商賈叢集一切事務倍於他省兼以州縣各官因循茍且疲玩成風吏胥差役舞弊作姦巧偽百出以致刑政糾紛課賦逋積素稱難治臣才識短淺膺此鉅任受事以来日夜惴惴深以不能勝任為懼仰祈皇上俯賜聖訓指示開導俾臣得欽遵恪守庶免貽誤至江省吏治廢弛積習相沿臣辦理臬司事務先後正署一載有餘雖曾於刑名案件嚴行督飭各屬優劣得悉其概未敢自信聞見即為確當無遺容臣再加細心亷訪隨事試看除蕩檢踰閑曠官誤公者自當立為題㕘外其中或有尚知改過及到任未乆者教誡數月策勵自新以觀後效倘終不能悛并人地未宜亦即具奏請旨分别處分酌調不敢稍有因循又臣自雍正四年補授知府以後六載在外未覲天顔瞻戀微忱無刻自釋今遵旨暫行辦理仰懇皇上天恩早簡賢能畀理重務臣得入京奉職瞻就雲日恭承睿訓造就成人以抒犬馬依戀之私曷勝翹首仰望之至伏乞聖明睿鑒謹奏覽奏知道了竭力黽勉以盡乃職同日又奏爲陳明地方年歳情形事竊照江蘇所屬十二府州今嵗二麥俱係豐收夏秋之間雨暘時若田禾暢茂查江寧蘇州常州鎮江等府收成均在九分及八分以上揚州府通州竝在八分以上淮安府太倉州海州邳州俱在七分以上惟徐州并所屬四縣於七月初旬因雨水稍多低窪田地被淹經前署撫臣王國棟㑹同署督臣尹繼善據詳題報并委員確勘果否成災去後茲據陸續覆稱該州縣低窪處所收成雖畧歉薄已徧下麥種此外髙地尚無損傷俱未成災現飭取結另詳核題至淮安府屬之山陽縣前據報於六月末旬連日大雨低窪之處被浸隨又據覆稱即經涸出田禾無礙又江寧府屬之江浦縣於七月初旬因黄山滁州水發衝溢田圩太倉州屬之崇明縣於六月内潮信後適遇大雨淹及窪下沙地二縣水勢俱旋即退消勘未成災嗣於九月中旬有松江府屬之華亭婁縣奉賢青浦金山五縣田間忽生細蟲暗伏莖中潜食苖心無從撲救将實之糓轉成空粒隨據各地方官履畝確勘所幸一縣之内如有百餘圖者僅十數圖間生此蟲多寡不齊有無錯雜雖收成稍减統算不過十分中之一二迨至雨後蟲類俱巳消除至蘇松太諸府州與浙江之嘉湖等府向来收割獨遲今年十月内又連值隂雨目下尚在刈穫米價亦因近日多雨新糓未盡登場是以較前頗昻自一兩一錢四五分至一兩二錢以上不等理合據實奏聞臣查今嵗江南偶爾被水諸處雖經勘未成災現在民情安堵耑望来嵗春收成熟即可接濟否則臨理倘甘汝来此際即能至蘇亦慮新舊接替吏蠧乗機作弊似應仍用熟手協幫兌完起程庶免貽誤合併陳明伏乞皇上睿鑒謹奏覽奏俱悉雍正九年十二月初七日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲請廣積貯以裕民食事竊照積貯為地方本計民食緩急攸資臣自署理江蘇廵撫事務隨查各州縣存倉糧石雖因賑濟一案藩司尚未造冊報銷難以確定細數而約畧核算除由商人經管之鹽義倉竈倉外統計各州縣現在存倉之米僅二十餘萬石糓麥等項亦僅二十餘萬石再本年平糶價值於歸還運庫及浙省外餘銀仍飭買糓存貯并催還借出籽粒亦止可得糓十餘萬石又查有雍正四五兩年欽奉諭旨採買米糓案内尚應買補米一萬餘石糓一十萬石而合算江蘇通省備儲倉糧總視浙江河東等省獨少殊覺緩急未敷濟用臣愚以為地方積貯充裕方能有備無患今江省各州縣内多者計米不及萬石少者纔數千石自應照雍正五年所定數目大縣存米一萬五千石中縣一萬石小縣八千石糓則倍之務期存貯足數凡遇青黄不接之際令各府州縣預期報明出陳易新按照年景隨時酌量糶賣亦不必拘定存七糶三其價即解存府庫秋成一面報明一面領價買補還倉計有餘價陸續多購則民食既得接濟倉庾日益充盈或遇緩急攸需就近可以分撥應用其於地方不無裨補惟是今冬因十月内多雨米價稍昻又有平糶及雍正四五兩年應行買補米糓現在嚴飭該州縣各按時值上𦂳採備足數其各州縣應行増添備貯米糓一時難以竝買請俟来嵗秋成後再為酌量款項動支銀兩委員赴産米地方分頭陸續採買派貯至江寧蘇州常州鎮江四府户口尤多設有用米之時附郭縣倉尚恐不繼可否俟各州縣購足之後再於此四府水路衝要可以四逹之地另建府倉或貯米四五萬石或糓十萬石以備年嵗不齊轉運撥濟之需其各處倉厫如有入官房屋相宜者即行改用無則漸次増添擇地建造臨時酌量調度臣因江省積貯未敷謬陳管見未敢冒昧具題是否可行仰請聖明訓示欽遵謹奏該部查議具奏同日又奏爲奏明事竊查江省各屬陋規歴經前任撫臣檄飭嚴查據實開報以憑分别酌定裁革充公而各屬率以竝未收受具覆及本年八月内前署撫臣王國棟訪有儀徴令夏慶譽私立引費名色婪侵入巳具疏題㕘在案隨據現任泰州知州江日容調任知州石杰各首報該州亦有引費一項自雍正六年五月内起前任被㕘知州褚世暄每引收費一釐共收過銀一千四百六十餘兩石杰任内共收過銀二千五十餘兩江日容於本年六月到任後亦收過銀一百八十餘兩臣思泰州從前原有鹽規一項既經奏歸充餉何得復創引費名色接踵私收均難免婪受之咎但查此項原始自褚世暄今該革牧前因被㕘現在督臣衙門究審定擬其調任徐州知州石杰前在泰州尚能奮勉辦事江日容於無錫縣任内亦屬勤敏盡職均係才堪驅䇿之員可否念其巳經自首仰邀皇上格外宥過寛仁暫免紏㕘以責後效所收銀兩同褚世暄一并勒追充公此後仍永行禁革臣未敢衙門存有鹽規陋規等項造冊詳請分别禁革充公前来臣查冊開兩淮鹽規除先經題明充餉外尚有原載奏存冊内銀一萬四百餘兩除河務各員名下一千九百餘兩向係商人津貼修理閘壩等費應聴河臣酌量留用其餘各員名下竝應提貯司庫以為地方緊要有益民生之事備充公用每年彚冊報銷又雍正六年議給養亷後查據各屬開報有引費一萬九百餘兩俱係出自行銷之商人竝非取諸民間原無干礙但各員既給有養亷不當復取亦應竝解司庫存備緊要公務之用惟是裕課全在緝私可否於此内酌留一半為地方犒賞廵緝諸費以示分别勸懲似於鹽務疏銷亦得實效至此外查有當規共一千四百餘兩船規等銀九百餘兩雖係相沿陋例未免藉端轉滋剥削自當飭令一體嚴加禁革其鹽規等項似應分析查明以雍正六年議給養亷後為始如有欺瞞私收入巳者俱照數勒追充公從前各員念係因仍積弊事逺官更難以推求請予寛免嗣後或有仍敢借名私收及舊存各規不行據實首報者容臣不時訪查察出即行㕘究應否如斯合併奏明伏乞皇上睿鑒施行謹奏照請辦理應逹部者咨明該部同日又奏爲奏聞事竊查知府一官為州縣表率最關緊要今常州府衙署被竊其於剔弊懲姦亦力有不及若以處簡僻府分自能黽勉盡職臣思知府係外省大員二守尚非貪劣應紏者可比但因人地均未相宜理合據實陳明恭請睿裁至各州縣内如常州府屬之武進縣知縣任夀雖由繁昌縣調補今職然審斷不能明晰遇事每致周章實不勝衝繁要地止可仍留江省以簡缺酌量補用又江寧府屬之溧水縣知縣吳廷賢凡遇民間争訟不能剖决吏治全屬未諳查係舉人出身應令改􅈬教職訓廸自效惟是二縣目下正值徴漕之際若一經題請改補誠恐積蠧姦民乗機滋弊觀望延誤似應暫緩至兌漕事竣容臣㑹同署督臣繕疏具題合先一併奏明再吳縣知縣吳棟自去嵗留任以来頓改前操婪贓縱役民怨沸騰臣因銀匠陳徳昇一案巳經發審得實具疏紏㕘尚有另案婪索之款現在查究其所遺員缺於例不應題補但地處緊要仰懇皇上於記名人員内特賜簡授在地方必有裨益即臣亦得􅈬近收臂指之效矣伏乞睿鑒施行謹奏覽雍正十年正月二十八日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲奏聞事竊臣自清江浦㑹審事竣回蘇途次接閱武進陽湖兩縣詳文内稱雍正九年十二月二十一日晚隨總捕通判陳必選廵查本府監獄據快頭蘇茂等禀稱未起更時府堂上忽有皮箱一隻不知何自而来隨與總捕通判陳必選遊撃白琦守備蔡永銘開鎖看視内貯花紋圓木戳六箇方木戳五箇均無字跡大方木板一塊上刻人首龍身樹葉紋中刻一辛字另有木板一塊銀錠様四角刻十兩銀子四字中刻一亥字又紅手本一箇上書中天淨梵王頒行鈔格鑿定辛亥十兩銀子以今宣降則先以飛龍刷金次加鈔錠刷銀辛字用孤御璽以金印印拾字特賜華青侯以洋青印印兩字特賜華赤侯以硃砂印印銀字特賜華黄侯以雌黄印印子字特賜華白侯以鉛粉印印亥字特賜華黑侯以油煙印印敇命御弟同受掛印兼領鑲旗排日輪管印鈔令御弟十五同伴看印半月接駕以刻壬子此敇龍飛辛亥十二月十五日頒等語臣細繹手本内所書不軌之詞甚屬怪誕乗夜暗置府堂必有附近姦人通同隂謀且語氣又類道家亦屬易於根究時臣舟過常郡知府魏化麟尚在蘇州領價辦銅未回當即靣諭武陽兩縣限十日内嚴緝姦人務獲查究嗣據常州府報稱正月初五日在東嶽廟拏獲道士趙秉中并在伊家搜出紅掲等物比對字跡無異巳據該犯供認不諱等情具詳到臣因該府文内竝未訊供叙入隨即據詳駁飭一面差役耑檄武陽兩縣㑹審切供去後直至二十一日始據錄供叙詳前来内開該府縣歴經嚴訊據趙秉中供稱向好煉丹緣雍正六年被管同受出首做銅銀子經前任陽湖縣枷責懐恨計圖報復因於手本上寫御弟同受四字下寫排日輪管的管字自然要向管同受追問可消積恨不料㺯巧成拙那中天淨梵王是先前乩裏批出来華青侯等俱是心上造出来寫的此外竝無别情亦無同謀夥黨等語又訊據管同受供稱從前因趙秉中煉丹㺯成假銀騙人公同送縣枷責是實據代趙秉中挑送皮箱之王二供稱係途遇秉中得錢八文代為挑箱至府儀門内據雕刻印板之匠人何志逺供稱止信為道家齋醮所用得銀一兩六錢刻成花板木戳伊等均不知别項情由等語臣查趙秉中将怪誕不軌之語寫藏箱内私放府堂或有䧟害情事亦未可知但該犯素學煉丹邪術煽惑誆騙已非一日或見事敗藉此支吾均未可定其有無姦謀别圖尚當嚴究且前據該府禀稱搜有許多不軌掲帖今查詳文内竝不明白叙入亦不錄單密禀甚屬含混隨即批行按察司提犯至蘇親訊確供去後旋據該府禀報案内各犯巳於二十四日經署督臣尹繼善提解江寧省城除咨會督臣俟訊明確情另奏外理合先行奏聞再常州府知府魏化麟臣前因其才不勝任奏䝉硃批與督臣酌商題請正在備文移商間今觀其辦理此案不特才具短拙且覺舉動憒憒難以委任但曾否将先後搜獲字跡呈送署督臣查閱見在咨詢合并奏明伏乞皇上睿鑒謹奏巳降諭督臣尹繼善矣寄字詢問自明雍正十年三月二十四日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲奏明事竊照制錢爲民間日用必需比因錢價昻貴仰䝉皇上念切民隠經畫周詳特敇各省督撫諸臣収買黄銅器皿設局鼓鑄錢文搭放兵餉以資利用今臣備查江蘇等屬自雍正五年奉文收買黄銅器皿起據布政司詳報見今共收生銅五十五萬九千四百斤零熟銅八十七萬一百斤零又因三十三卯起銅器熟多生少不敷配搭咨明户部購買倭鉛白鉛共三萬餘斤配鑄接濟合算前後所收銅斤僅可供四十二卯之用自雍正八年七月二十五日開鑄起配至本年四月二十五日銅斤巳完計共鑄出制錢一十五萬一千九百餘串除發給工料錢外實應放餉錢一十二萬八千三百餘串但近日各屬報收銅器漸少蘇城雖有洋銅到岸止堪供各省採辦運觧寳泉寳源二局之用不便購添而局内工匠不下五百餘人将来乏銅湊鑄即工食無出似應暫行停爐現在仍飭各州縣多方曉諭民間設法收買俟報有成數再請開鑄或隨同所辦條銅解部除候鑄竣另疏具題外謹先奏請訓示遵行再查淮揚徐邳一帯民間日用俱尚在兼使舊小制錢而隣近如江西等省亦仍有一概行用者近據淮安府禀獲江西人權起祥收買頂重小見飭嚴審確究移查并通行各屬申禁稽察合併奏明伏乞皇上睿鑒謹奏是雍正十年閏五月初一日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲恭報二麥收成分數事竊照二麥有關民食江蘇所屬各府州佈種素廣閭閻竝賴接濟臣於入夏以来即檄飭確查收成分數去後兹據十二府州陸續具報前来臣逐一查核如江寧蘇州松江常州鎮江揚州等府太倉通州等州去冬今春雨雪均屬及時收穫多者竟至十分少者亦在六分以上以一府州計之江寧蘇州揚州通州俱在八分以上松江常州鎮江太倉各有八分惟淮安一府及海州邳州徐州雨雪差少迨至四月末旬連得大雨二麥旋經暢茂充實淮安海州亦在七分以上邳州徐州在六分以上俱已刈穫登場至糧食價值自平糶後業已漸減小民莫不歡欣樂業感沐皇仁見今又各乗時耕耨栽插肆力南畝再查淮安府之山陽清河揚州府之寳應等處前聞偶有蝻子生發臣當即委員督同地方官弁竭力上緊搜捕據報旋經撲滅竝未飛騰蔓延為害除飭令各屬加意查看防範外理合一併奏明仰祈皇上睿鑒謹奏二麥有收蝗不爲災以手加額覽焉同日又奏爲謹陳南糧有關兵食特請另定催徴處分以免遲誤事竊照江蘇各屬地丁項下編徴本色米豆共三十二萬五千三百餘石内除起運白糧及應解江寧省倉并支給局匠恤孤口糧外實該撥充下江兵糧米一十萬二千二百餘石查江省田地編徴本色米石雖有漕白兵行局恤之分而民間原係一條鞭輸納各州縣均屬統徴分解每於本年開徴之後先将漕白二糧按數兊運不敢稍有掛欠而其餘未完米石總歸入兵局等項下遂視為解南之款可以從緩即不上緊催徴糧户亦因而拖欠胥役復乗機包侵以致完解愆期臨時屢請改撥常虞不敷臣思各營兵米與夫局匠恤孤口糧等項均係計日授食勢在必需所以預年徴輸撥派豈容令其枵腹以待設有缺誤所關匪細伏查雍正五年浙省因南秋等米徴解不前題准将未完各官改照漕白之例議處年来俱克依限完解接濟此臣任杭州府時職司收放省倉兵米目覩行有成效今江省事同一轍似亦應将地丁項下編徴之解南白糙二粳鳳場局恤以及各項裁充陞増并衛屯米豆等款俱請以雍正十年為始於該年地丁奏銷時另造本色餉款一冊開列經接催徴各官職名完欠分數另請照依漕白糧議處其雍正十年以前舊欠亦照浙省遵行之例分别勸懲庶軍需不致遲誤而催徴各官知所儆惕是否可行仰祈聖鑒抑臣更有請者查下江原編南米當日派徴之際酌籌經費自必寛裕惟因邇年如亰口隨旗水師二營向食鎮屬之截留漕糧今留漕仍歸起運以及各標營俱有新添兵丁其糧米悉取給於此内如遇閏之年計共需兵米一十一萬二千八十石零茲編徴兵米原額僅一十萬二千餘石已不敷經制估計之數雖尚有建曠應扣并将減存揚倉以及虧欠追完之米可湊撥充放然究屬零星無多且催徴年額勢難全數通完是兵米一項務湏預備有餘方為萬全可否於雍正十年徴收漕米時内酌留五萬石以資遞年添補支放如有多餘即存為備儲似於兵食有濟臣因江省撥解兵米每致周章用是謬陳管見未敢冒昧具題如䝉天恩俞允容臣檄行布政司備細分析查詳會疏題請伏乞皇上訓示遵行謹奏會同督臣尹繼善具疏題請同日又奏爲奏明事竊臣於本年正月内訪聞常郡陽湖縣地方有周天祚倡為大成敎名色騙惑鄉民從者頗衆因即密諭常州府知府魏化麟細加查察旋據該府禀稱親至周天祚家搜出圖像經懺等物訊據該犯供稱前因伊子周文惠在糧船上做裁縫路過天津遇有大成教頭周士成授以此教每逄上元中元下元等日衆人各出分金做會茹素誦經除出會費之外湊銀十兩或五兩寄送天津去與周士成拜懺竝無造作妖言等語臣隨檄行按察司嚴究有無惑衆不法各實情一面移咨直隷督臣提拏周士成赴蘇質訊嗣准直隷督臣咨據天津縣拏獲周士成并搜出摺二扣經七部書札稿一本一同移解到蘇當發常州府嚴訊確供去後茲據該府詳報研審周士成供稱這大成教小的聴得從前師父周尚禮說是一个名呌石伸起的遞相傳流下来看的是羅門經喫長齋勸人為善每年各處的人来做會拜懺原要費㡬十兩銀子餘剰的積貯在那裏做些好事等語并據該府禀稱摺内所開有陽湖江隂宜興無錫四縣以及蘇州鎮江揚州淮安徐州各屬竝上江之鳳陽泗州天長浙江之山隂等處俱有教内頭領姓名等因前来臣查羅教名色久奉嚴禁今周士成等仍然倡為大成教頭做會拜懺因襲邪說煽惑愚民附和景從者聲氣蔓延數省若不亟為究除恐日後漸生事端第摺内所開姓名人數頗多其中或係無知被惑且散居各省若盡行提拏到蘇質審又未免株累驚擾除飭按察司将見在拘獲之周士成周天祚等訊明定擬外其餘摺内有名人等似應按籍分咨檄行各該地方官就近分别查究禁除庶邪教永可杜絶愚民不致驚擾應否如斯伏候聖訓欽遵謹奏據奏附和人等蔓延數省自應按籍分咨俾各就近查究庶不致驚擾地方所見是照議施行可也雍正十年七月十三日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲奏明事竊照江南文武鄉試例係上下兩江輪值其監臨提調監試亦俱屬按科分任今嵗壬子科文闈應由下江料理臣查江寧省城止江安糧道驛鹽道二員而糧道王恕於春間即押漕船前徃濟寧一帯夏仲始得回南場前數月提調大員有應預行查辦事件是以先經遴委驛鹽道陳宏謀為提調常鎮道王之琦為監試咨明禮部在案今准部咨議覆江西署布政使李蘭條奏各省鄉試仍令藩臬兩司協同點名等因臣思各省藩臬兩司竝居同城是以部議稱鄉試點名通計三場為期不過三日事畢即可回署此原指在省之藩臬而言今江省棘闈建設江寧其駐劄本城者惟上江藩司他如上江臬司則在安慶下江藩臬兩司又均在蘇州相距俱逺伏念提調監試欽奉諭旨以藩臬為闔省錢糓刑名總滙在場一月有餘恐致公事遲誤是以祇用道員今若因點名一節令不同城之藩臬亦行分任雖點名止需三日而徃返千有餘里統計回署之期已及兼旬似屬未便且臣赴省監臨蘇郡地方緊要亦必得藩臬大員彈壓督察在江寧藩司駐劄本城應無分上下輪值科分俱可令􅈬近協同點名此外尚湏再委一員查現今江安糧道王恕已報回署自可共任其事至嗣後江省凡遇鄉試似亦止湏届期酌委􅈬近大員一人與在江寧藩司協同提調監試點名其安慶之上江臬司蘇州之下江藩臬兩司均免其赴省分任庶不致因徃返遲誤公務緣闈期已廹除咨禮部外理合繕摺奏明伏乞皇上睿鑒謹奏覽奏知道了備将情由咨明該部同日又奏爲縷陳下情仰籲天恩事竊臣以至微極賤荷䝉皇上洪恩署理蘇州廵撫印務復邀賞給養㢘銀兩舉家老幼無不沾被天澤感激靡涯祇緣江蘇地處衝繁所需一切日用支應等項比他省較多每月額入養亷間或有時不敷伏思聖恩髙厚周知下隐體恤備至前任撫臣尹繼善因所收揚關正稅外向存有平耗例規一項獲䝉皇上於此内嵗賞銀三四千兩以補養亷所不足今臣不揣冒昧仰懇天恩可否於此内亦格外量行賞給嗣後如遇日用可以從减養亷巳敷支應其例規一項仍當全數留辦公務倘䝉聖恩俞允容臣隨時奏明此犬馬私情自念素沐聖主豢飬生成故敢上凟宸聰垂鑒臣不勝慚悚恐惶之至謹奏所請可行酌量敷用爲之雍正十年七月二十一日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲奏明事竊江蘇沿海一帯地方於本年七月十六日颶風忽作驟雨如注至十七日晚始息臣恐潮隨風湧有傷田禾廬舍隨差文武官弁分頭星徃查勘旋據各委員竝該道府州縣禀報到臣據稱南滙之濵海鄉村與昭文之徐六涇白茅塘常熟之福山繆橋鹿苑江隂之黄田港及靖江之沿江一帯太倉之七了海口鎮洋之劉河天妃閘上海之沿江沿浦十六等保各近海地方水勢陡長丈餘或七八尺四五尺不等墩臺房屋田禾以及停泊口岸船隻多被衝壊人畜亦有傷損崇明縣城内水深五尺人畜房屋亦多損傷其餘沿海數州縣被災尚輕惟鹽安海贑四處距蘇路逺尚未報到臣除於十九日酌動存公銀兩星委府㕔及候補試用各官分頭齎赴被災等縣會同地方官查勘将正實被災之户先行賑恤毋致失所一面檄委蘇松道王澄慧太通道包括蘇糧道劉栢将被災各州縣確查輕重區别分數竝将来應賑户口造具清冊會同督臣另行請旨遵行外緣今嵗鄉試届期臣輪值監臨遵例於本月二十六日赴省所有一切查勘賑濟事宜臣巳備細與藩司白鍾山商定令其先行悉心督辦俟闈事一竣臣即星飛回蘇料理合先奏明再江省稻禾除沿海被水數州外其内地各府縣雖亦被風揺蕩中稻畧減分數而江省土俗以中稻米難耐乆種植者十無一二總以晚稻為主此時尚未吐秀開花現在俱無傷礙且旋於十八日晴霽将来收成仍屬可望其邳徐淮海一帯蝗蝻今年生發處頗多然文武官弁俱上心捕捉竝未害及苖稼近日邳徐兩州巳據結報捕滅無遺合并奏明至臣奉職無状地方有此潮患自審罪無可逭查明被淹各地方嚴飭屬員竭力奉行加意撫恤務令災黎得沾實恵毋得虚應故事徒博賑濟之名雍正十年七月二十九日通政司右通政署理蘇州廵撫臣喬世臣謹奏爲奏明被災情形安輯災黎事宜事竊江蘇本年七月十六日夜風潮湧溢附近邊海地方被災經臣業将大槩情形繕摺奏聞今據各道府帯員分頭踏勘查得常熟江隂靖江嘉定通州奉賢各州縣被災田畝分數通邑合算有及十分之一并有不及十分之一者其近江之丹徒江都丹陽僅沙洲與沿邊之最窪處所間被災傷較靖江等縣受患尤輕惟崇明孤懸海外太倉鎮洋寳山逼近七了劉河等海口昭文上海南滙均在海邊且多無塘岸捍衛是以被災較重其新舊各沙原係漲自海中非等髙阜之地是夜風潮驟至不及防備故人畜不免傷損至於内地州縣田苖俱各茂盛即被災各州縣除沙洲及近海口各處外其餘花稻亦無傷損以通省計之将来年嵗猶在八分以上惟是現在災黎情状甚為可憫臣待罪悚惶仰體聖懐業将撫恤事宜先行料理仍恐前給委員銀兩不敷且風潮之後民間縱有盖蔵難免衝沒止給銀兩亦難保其萬全遂又飛飭各州縣将貯倉米糓分别被災輕重糶賑兼行至於崇明四面臨海民食尤艱臣查該縣倉糓不敷又令長吳元三縣将所貯倉糓各撥三千石運往接濟寳山積貯亦少臣亦将長吳元三縣倉糓各撥二千石運往應用目下已俱安頓妥帖可以延至九月無憂恐厪宸衷合先奏明其鹽安海贑四處雖未據該州縣覆到適臣舟抵常州訪聞各處均未受災至臣監臨科塲於七月二十六日赴省一俟撤闈後即可星夜回蘇料理但時已八月田地雖俱涸出止可補種菜麥收成湏俟来春冬間乏食窮民全賴聖恩養育生全我皇上洪仁浩蕩如天好生其善後事宜聖心自有睿裁除飭藩司核詳到日會同督臣另行具題外理合繕摺奏聞謹奏巳有旨諭部矣雍正十年十二月十一日江蘇廵撫臣喬世臣謹奏爲仰荷浩蕩天恩謹陳瞻戀下悃伏祈睿鑒事竊臣一介庸愚備員外吏荷䝉皇上洪恩疊次超擢署理江蘇廵撫印務受事以来夙夜惕厲一載有餘雖勉竭駑駘而才識短淺時以不克勝任為懼兹復欽奉恩旨實授江蘇廵撫聞命之下感激涕零即捐糜頂踵不足仰報萬一惟有倍切冰兢益加奮勉以期無負聖明委任驅䇿至意但臣自雍正四年由吏部郎中補授知府以後七載在外未覲天顔依戀之私無刻自釋且江省地方緊要事務紛繁臣以菲材膺此鉅任惟冀面承睿訓指示開導諸凡庶獲欽遵恪守用敢仰懇天恩俯允敕定日期令臣将地方事宜料理􅈬緒即行趨叩丹陛恭聆訓誨以稍伸犬馬瞻戀積悃臣曷勝翹首仰望之至伏乞皇上睿鑒謹奏自冬徂春正值辦理散賑事宜豈可逺離地方陛見之期候旨遵行雍正十一年二月十三日江蘇廵撫臣喬世臣謹奏爲奏明事竊照江省地方上年偶被水淹蟲傷仰荷皇仁浩蕩先後竝經分别賑恤乏食窮黎寒冬初春固巳存養有資兹復奉恩旨軫念青黄不接之時尚湏籌畫接濟再加賑四十日并查有從前遺漏貧民及先可餬口而目下力不能支者亦令添入補賑睿慮周詳安養生全莫不備至萬姓歡呼咸慶得所臣等欽承聖訓敢不悉心實力辦理遵即委員協同印官再行逐加確查其有果係貧民而從前遺漏并先可餬口而目下力不能支者俱另造清冊一體給票普賑務使均沾愷澤如或里保地棍藉端侵蝕冒濫仍飭嚴行察究所賑口糧原經奏請銀米兼施前賑三月俱係給發米糓目下現在截漕減糶米價業将漸平而東作方興按日計口給銀窮民正可藉資耕種以及别為經營統定於三月内散賑已咸得接濟至麥熟矣再前奉俞旨恩允署漕臣性桂所請截留漕米四十萬石在江平糶解價交部遵經飛飭江安蘇松兩糧道查明各州縣内有前報米色不純者派留四十萬石悉視被災之重輕并户口之衆寡酌定數目分發各州縣平糶惟蘇城雖未受災因屬省會通衢亦留四萬餘石以備相時平價或再别撥濟糶至江省均貯項下先據各屬陸續赴江廣採購有巳經運回者有尚未買足者本年二月初旬准湖廣督臣邁柱来咨以楚省運米赴陕川省又值禁販價值漸昻令江省在楚採買之州縣停俟今秋收成再往臣思川省禁糴業䝉皇上諭飭弛禁近日商船自必乗江水平時銜尾順流而下是以仍催各屬作速赴楚相機採買運回以備不時接濟諒無再為阻止至江省上年被災貧民仰荷皇上洪恩多方籌畫既邀疊次賑恤又䝉截漕平糶且松太則有海塘工程揚通復有范堤工程均令其得以謀食資生莫不歡欣安業入春雨暘時若二麥俱極茂發合并奏明伏乞皇上睿鑒謹奏汝辦理賑務甚不妥協業經降諭嚴飭今覽所奏虚偽不實觀汝大有辜負任用光景慎之同日又奏爲請旨事竊照太通道包括奉旨調補江南驛鹽道張鳴鈞補授太通道業准部咨欽遵兹臣查通州崇明昭文三州縣俱係濵江沿海新漲沙洲各有接壤毗連豪棍因而把持互爭動輙搶奪鬪毆歴委丈勘之員每被阻撓挟制積數十年案懸未結是以前撫臣尹繼善議請設立道員專司清釐仰䝉俞旨敇令包括補授太通道該道於上年内親歴三州縣逐一履畝查丈挨編魚鱗字號核對題報原案糧冊分析議詳甚屬精細明當現發布政司覆核會詳具題并另繪總圖恭呈御覽其攢造各冊尚湏該道原經手之員督察庶免地棍串通姦胥朦混滋弊且查各沙洲甫經該道勘明通詳輙有通州民江依中於上年八月以所争地畝斷歸先報陞科之崇民赴部藉詞呈控咨行到臣隨經飭令蘇松道王澄慧㑹同該道查審是以必躬履頃畝熟悉原委者方能剖决折服若易以生手别員誠恐姦棍又得揺惑更張逞其懸宕故智此案似應仍令包括速為辦結以永杜争端再該道與蘇松道王澄慧臣又現委督理興築沿海土塘目下正在衆工齊舉之際亦湏原同丈估之各該道親行調度董率俾工員咸知上緊趨事且太屬賑務去嵗原委該道督查今䝉皇恩再加賑四十日仍需該道一手辦完更免貽誤可否仰懇聖恩将包括令在太通道任再為料理數月俟通崇争洲案竣塘工漸􅈬成局趨赴新任其張鳴鈞俟到江日即以暫署驛鹽道事務一轉移間覺於地方有益為此繕摺具奏伏候皇上訓示欽遵謹奏覽奏巳悉候另有諭旨同日又奏爲據情代奏事竊臣據江南蘇松常鎮太督糧道副使劉栢呈稱為遵旨恭請代奏仰懇天恩事竊劉栢至愚至陋荷䝉皇上天恩豢養教誨曲賜成全由知州歴陞府道聖恩髙厚有加無巳緣劉栢有胞弟劉桐係雍正十年壬子科順天鄉試中式副榜現隨劉栢任所今欽奉上諭旗員子弟中有可以助其父兄辦理事務或另有情節不能相離者朕原准其奏聞請旨而道府等官不能自逹於朕者亦有督撫代奏之例劉栢跪讀之下不勝感激惶悚應即遣劉桐進亰但劉栢母親戴氏年老血虚時需醫藥劉栢辦理漕務来徃奔馳署中實乏親丁照料惟藉劉桐朝夕侍奉兼代劉栢鈔冩緊要文巻為此不揣冒昧仰懇皇上格外天恩俯念蟻悃可否准将劉桐賞留劉栢署中之處理合據實呈懇代奏恭請諭旨欽遵等因到臣臣謹據情代奏伏乞皇上睿鑒施行謹奏劉桐准留伊兄劉栢任所咨明該旗可也雍正十一年三月初六日江蘇廵撫臣喬世臣謹奏爲遵旨奏聞事雍正十一年三月初一日接大學士臣張廷玉寄字内開雍正十一年二月十七日奉上諭江南蘇松常太等屬沿江濵海之地方上秋遭值風潮貧民乏食朕心軫念諭令該督撫等加意撫綏已於冬春之間賑濟三月竝截留漕米以供平糶今春又降特旨於青黄不接之時加賑四十日務使小民得以餬口不致失所近聞有司奉行不善胥吏因而作姦視賑濟為具文而恩澤不能普及如有屋宇一二間有器具一二件者即不入於查賑之内以致貧窶之民嗷嗷待哺又如逺鄉受賑之民不給米糧祗給米價而又復短少其數不敷買米之用種種弊端各處同然而松江太倉所屬為尤甚有司之罪固無可逃而督撫身在地方受朕倚任漫無覺察咎實難辭朕前據風聞已頒諭旨今訪聞甚確再行嚴飭著魏廷珍喬世臣白鍾山等悉心籌畫即速定議料理或多發倉糧出糶以平糓價其無錢糴米之人確行查明添入賑濟之内不得聴其流移再或興修本地工程俾小民得以傭工度日務期經理妥協以贖前愆至本年錢糧有應行緩徴之處著該督撫飭令有司緩徴據實奏聞請旨欽此遵旨寄信到臣臣不勝悚惶無地自念身荷天恩倚任乃以地方災黎未能經理得所致懸睿慮前奉訓誡諄切巳覺罪無可逭茲復䝉以期仰副我皇上拯災䘏患至意查上秋被潮各屬事出倉猝臣與署督臣尹繼善一面具奏一面飛委多員確勘查其露處乏食刻難緩待者每大口給銀一錢小口五分缺米之處即給以米糓暫資接濟此則上年七八月間初時撫綏之五十餘萬口原係銀米竝發者也嗣奉恩旨於冬春之間普賑三月原經前署督臣尹繼善會議每月大口給米一斗或銀一錢小口半之奏䝉俞允時臣以寒冬米價日昻銀不如米隨即分檄二十二州縣止給米糓不得折銀内惟丹徒縣於第一次賑期曾将離城最逺沙洲散銀數百兩臣聞報飛飭停止其餘並無折銀州縣此冬春普賑三次之八十餘萬口實俱給米糓而不折銀者也至松屬之華亭婁縣青浦福泉金山與淮屬之安東六縣原係風雨蟲傷較潮災為輕臣於臘底奏明照初次撫恤之例大口一錢小口五分量賑銀兩二次此續賑之五六萬口固原請給銀而不給米糓者也今奉恩旨加賑四十日凡從前遺漏及先可餬口而目下力不能支者俱令查確一體補賑臣思前三次賑濟已經全給米糓當此東作方興之際民間正需各項資用見今又有留漕平糶米價漸减是以先經議請給銀兹䝉諭旨以貧民嗷嗷待哺恐有短少不敷買價情事隨復公同酌議将此先後報災二十八州縣饑口仍俱動米糓於三月内散給復嚴飭印委各官務必親身遍歴區圖逐户再加挨查確實登冊給票示期按口親散俾窮黎普沾恩澤至截漕米石約計凑賑所需無多平糶無虞缺乏且未被災州縣舊存常平及新買回均貯米糓陸續仍可撥赴接糶見今米價已較正月每石减下一錢七八分不等再上南奉寳一帯土塘共二百五十餘里臣於正月望前即節次派委多員分段承築工程近約有三四分松太二屬貧民每日赴工者不下數萬人不但本人可以度活并得養贍妻子此外如鎮江之支河城河無錫之城河及沿海各屬之墩臺馬路營房等工亦見在及時舉行以資傭趁至常熟等二十六州縣衛上年新舊錢糧已經題准緩徴華婁等縣漕糧亦荷停運在案臣前又據布政司詳請援雍正八年淮北水災之例将各該州縣衛田畝新舊各項錢糧被災者統俟麥熟後開徴未成災者設櫃聼民自納且緩催比等因已會同署督臣咨明户部并一面飭令各該有司遵照緩徴仰祈天恩鑒允除将定議料理緣由㑹同署督臣魏廷珍奏聞外誠恐被災地方時厪宸衷合先縷悉馳奏伏乞皇上睿鑒訓示施行臣無任戰慄悚惕之至謹奏朕實代汝愧之雍正十一年四月十五日江蘇廵撫臣喬世臣謹奏爲恭報二麥收成情形事竊照二麥民食攸關江蘇農佃之家尤賴春熟接濟查今春雨暘時若各屬麥豆等項一律普種長發臣於入夏以後隨通飭各該府州查明收成分數情形馳報兹據江寧蘇州松江常州鎮江淮安揚州太倉通州各屬陸續具報前来臣逐一查核上等者可至十分最少者亦及七分合一府州内統計約俱有八九分之數比於徃年較勝目下大麥并豆菜見巳刈穫登場小麥於五月之初亦可收竣惟徐邳海三州收成略遲尚未報到分數然據各該州縣從前所禀大槩均屬茂盛縁江省去秋收成歉薄民食常厪宸衷是以将巳經報到九府州之分數情形謹先繕摺具奏餘俟續報到日再行備悉奏聞伏乞皇上睿鑒爲此謹奏覽奏九府州麥熟情形朕懐深慰同日又奏爲遵旨奏聞事雍正十一年四月初五日接大學士臣張廷玉字寄到臣欽奉上諭以江浙之蘇松常杭嘉湖等府米價貴至一兩七八錢民食維艱敇令酌量多减價值仿彿常年之價平糶仰見聖恩軫念民依有加靡已臣等遵即悉心籌畫查蘇松等府米價原有貴賤不一即米色亦有髙下不齊其從前糶至一兩六七錢者係冬春四糙上米若民間所買常餐則俱屬糙稉楚秈等類春間價值每石一兩四五錢不等見今則不過一兩三四錢前奉恩旨截漕平糶臣隨即核定條規頒發各州縣飭将倉斛與市斗較凖大小查明見在市價隨時遞减加一糶價米數五日一報見今蘇松兩府屬據報每倉升制錢十一文計算市平市色每石一兩二錢零常州府屬初報每倉斗制錢一百五文近已减至每升十文是每石止合一兩一錢零至淮安府屬初報每升亰錢十七文嗣又减為十六文則每石得市平市色銀計僅一兩其他各府州糶價總無有逾每倉升十一文之外者歴查江省從前豐稔之嵗春夏米價亦與見在平糶所减價值相仿是以從開厰後小民踴躍趨赴莫不感頌皇仁臣思多减價值在貧民誠得益沾厚澤但平糶見價既與常年不甚相逺若再行多减官米與市價太懸則商販咸畏虧本停阻而居民全藉買食官米倉貯不能接濟此後市價恐轉昻貴又有不容不顧慮者臣隨以此宻商署督臣魏廷珍酌定并宻詢浙督臣程元章亦據扎覆杭嘉湖三府每倉升止糶錢十一文較之常年價值相去不逺應仍舊辦理無容再减等因查蘇松與嘉湖接壤平糶價值較常年不甚逺且目下客米每日過滸關者甚多隨時遞减将来市價漸得􅈬平似可不必一時多减臣仰䝉聖訓周詳并以可否多减價值數錢令臣等􅈬近酌量合将見在平糶價值及辦理緣由據實奏聞伏乞皇上睿鑒至被災州縣臣俱檄令於鄉村大鎮同城中一并分設多厰派委各員監督開糶其有姦商行店串販者查出即行責儆所買米數總不得過二斗凡常平均貯米糓竝令源源續糶以資接濟統俟今年秋收酌量買補還倉再加賑已經報竣被災貧民從前間有向鄰近成熟州縣覓食者臣竝令各該地方官資送本邑受賑安業其浙省嘉湖等府災民前来江境者亦俱飭所屬資送回籍竝准浙督臣咨覆安插在案合并陳明謹奏所奏是原令汝等酌量爲之者雍正十一年五月二十八日江蘇廵撫臣喬世臣謹奏爲奏聞事竊照江蘇所屬各府州本年麥豆等項俱獲豐收農民莫不歡悦端陽以後連得甘霖四野霑足髙下田畝盡栽插完畢早禾現在長發其徐州所屬之沛縣三月三十日曽降有冰雹一陣淮安之山陽安東四月十九日亦下雹片刻臣俱飭細加查勘所及之處甚少竝未成災即偶有田畝被傷者令該地方官借給籽粒播種已各安業無異至淮徐海邳等屬地窪水涸處所間報蝻子生發雖地不致為􅊣田禾再湖北撫臣德齡仰遵恩旨委員運米五萬石赴江蘇平糶巳經署督臣魏廷珍在於江寕留糶一萬二千石其餘三萬八千石臣現在分發蘇常松太等處減糶以期均沾厚澤統俟糶竣歸價還楚至本省倉貯米石亦尚在酌量接糶理合一并陳明伏乞皇上睿鑒謹奏覽同日又奏爲謹陳採買匠硝舖磺之弊以杜把持以嚴夾帯事竊照硝磺軍需攸關原係應禁之物但民間傾鎔銀兩必藉熖硝燒鍊銀硃及藥料等項必用硫磺未便槩行禁止全在採買之法慎重得宜庶免滋弊前署督臣史貽直議将營伍硝磺委員採買而各府州所需匠硝舖磺亦核定每年應用數目歸令文職承辦經部議覆在案今查各營硝磺現係委員分路購買其匠硝舖磺據從前藩司議詳令銀匠舖户查照應買數目備齊資本由司各自具批送掛隨同委員徃購緣一切詳報匠舖姓名掛批迴銷等事俱係督臣管理臣衙門無從察核及臣昨審虧空顔料解員邱秉衡等一案内有包攬侵蝕之牙户裴元英究其財産行業據供有承辦舖户磺批可以獲利歸補隨查該犯起批姓名係舖户王元興實即裴元英更名承充批内報買雍正九年硫磺三百擔當經檄行吳縣将硫磺封貯變價并嚴追已賣價銀抵還侵蝕帑項臣思匠硝舖磺從前因係無職役之人自行採買未免滋弊議令委員承辦令各匠舖仍係另自起批請咨則程期勢必先後不齊委員從何逐一稽察雖有隨同徃購之名終無一體承辦之實各匠舖紛紛持批在途固難保其不夹帯營私也至裴元英現以侵蝕顔料銀兩監追尚爾更名承辦舖磺查各營買磺定價每百斤連水脚通計不過五兩上下歴查裴元英發給衆舖每百斤俱至二三十兩不等是採買匠硝舖磺二項顯係地方積棍串通胥役借批頭名色占踞壟斷因得髙價網利即裴元英已屬把持之明徴矣且硝磺不便於民間囤留若批頭運回仍然整數堆貯家中聴其隨時自發揆之理法均未合宜臣愚以為匠硝舖磺既令照每嵗應買數目備齊資本隨同委員徃購不如竟飭各匠舖呈明該地方官核定嵗需之數悉照現買營硝營磺價值先期彚凑銀兩具報造冊解貯司庫俟詳委辦員之日同營伍所需硝磺一并派交採購運回将實用數目報明藩司查核飭知轉發各該府州酌量陸續給與原報買之匠舖分領濟用其匠舖另自請批隨買之處永行革除則責成專一而把持夹帯之弊可杜矣再臣查浙省各府匠硝經督臣衙門核定嵗需數目向係統委杭協副将管理先動公銀同營硝一并遴員採購運回行令各府銀匠照繳原價分給領用稽察既專價無髙昻民亦稱便兹江省採辦匠硝舖磺可否亦仿浙省核定應用數目先動公銀委員購回各匠舖照價繳銀分領其設局收發之處令藩司專委妥員管理合并陳明統祈睿鑒訓示遵行謹奏採買硝磺一事候發兵部議覆有旨雍正十一年七月十七日江蘇廵撫臣喬世臣謹奏爲陳明現辦營房墩臺事宜仰祈睿鑒事竊查江蘇所屬州縣凡有營房墩臺向係里民各按圖甲輪年承修俱不動支公項前撫臣尹繼善任内間因𦂳要處所有應行添建改造者特撥公項辦理原以工由新創故為酌量措置也上年秋被風潮各處營房墩臺坍塌甚多前署督臣尹繼善魏廷珍暨臣先後檄行布政司查議念係災祲之後工費既鉅民力復艱隨将沿海濵江一帯凡關𦂳要地方營汛俱委員勘估動撥存公銀兩發該州縣修造給兵棲止廵防其在内地非被潮災而殘坍未甚者仍令地方官循照舊例辦理當經分别飭遵并據陸續具報興工在案兹准部咨議覆安徽按察使孫詔所奏各屬營房墩臺責令該管地方文武員弁協辦修造出結保固六年其見今稍有坍損之處速即會同估計興修工竣出結保固督撫提鎮委員查驗倘修理不堅或限内坍塌一并㕘賠等因臣遵将現在動項修建者即飭該州縣移㑹營員再行公同勘估辦料鳩工俟竣日取結保固委驗在案惟是江省各州縣内地營汛更多向由里民輪值分任尚易若統藉公項經始則計費殊繁且閭閻守望捍衛所資居民咸樂於趨功故歴係地方相沿承辦目下自應仍歸各圖甲循照舊例修整但今一旦槩令出結保固則文武員弁勢必苛責之里地從新更易以期一時改觀未免轉致掯勒擾累臣愚以為除動支公項修建之營房墩臺俱令出結保固外其餘向有里地承修者似應令該地方文武員弁公同勘明如有殘缺坍損即著落照依舊制葺理完固給兵居住取具該汛弁兵甘結存案俟調防時交割明白倘有故意作踐損壊将該兵責革賠修汛弁狥庇不舉一并查究其輪修之里地草率塞責亦即懲處押令重修該州縣玩忽從事察實紏㕘如此隨時修整覺於責成原無推委而工程可以永保里民可免掯累再查崇明靖江等縣營房墩臺現俱動項修造但該地孤懸海隅髙寛瓦屋易致招風故歴係盖造草房即民居類然今亦仍應循其舊制則草房保固究與瓦房有間似止可限以三年臣思江省公務浩繁因地制宜庶各屬奉行不致周章岐誤為此據實陳明仰祈皇上訓示遵行謹奏該部議奏硃批諭旨巻一百三十三
