body:
  text: 欽定四庫全書硃批諭旨卷一百五十九硃批萬際瑞奏摺雍正三年九月十八日廣東提督臣萬際瑞謹奏恭請皇上聖安朕安昨董象緯來京陛見其人甚不足取爾其勉力盡職為一良帥與朕顔面增光毋致被其嗤笑同日又奏為欽奉上諭事雍正三年九月十二日接兵部劄付內開七月二十一日奉上諭萬際瑞來京時曽經面奏海防會汛一事殊屬不便朕諭同總督孔育珣詳議具奏近朕訪問熟悉海洋情形之人多稱水師會哨於弭盜之法實為有益據其所奏俱各甚有條理爾部可行文與萬際瑞且不必會同總督令伊先與熟悉水師之人如瓊州總兵黃助等將會哨實在有益之處會同詳加酌議此外有諳練海洋情形者亦廣加採訪將情由先行具摺奏聞再與總督會同議奏欽此為此合劄該提督欽遵施行等因到臣竊查海防會哨由來已久雖亦有益但洋汛遼濶一望無涯定例二月六月出巡配撥兵船揚帆逺去本汛前後未免空虛逮至回汛經時久逺恐有姦船乘機竊發或致疏虞此臣所以鰓鰓過慮也兹奉諭旨會同新授瓊州總兵臣黃助詳加酌議粵省洋面東西袤延約數千里微臣歷任雷瓊東洋雖未深知西汛一帶皆所熟悉自龍門協而東海安營􅚑州營吳川營電白營春江協廣海寨香山協沿海水師聯絡布置分據險要臣等愚見各營分遣遊守等官龍門協巡至海安海安營巡至􅚑州􅚑州營巡至吳川吳川營巡至電白電白營巡至春江春江協巡至廣海廣海寨巡至香山自香山東至南澳亦一體交環無事則來往遊巡保固汛防有警則奮力追擒無分疆界上下各汛聨絡循環交相巡哨則姦船自無可乘之隙矣且所巡洋面易於遍歷務限一月之內往復一周始則自東而西繼則自西而東各取地方官印結查驗以杜中途停泊之弊再或按季輪委總兵副將一貟親歷巡查以稽察各汛之勤惰如有巡哨不力者立即揭參徇情容隱一併嚴加議處庶交相警勵不敢怠玩偷安羣力畢宣汛防各密海疆永獲寧謐之休矣此臣等管蠡之見以為各汛聨絡時巡較之會哨更為周密也再自香山東至南澳水師各營尚未深悉容臣到任後逐一詳查如外有諳練海洋情形者亦廣加採訪另具摺奏謹將水師會哨一事遵旨先行繕摺差瓊州鎮標把總齎捧奏聞謹奏此係極有關係之事不宜固執己見當與督撫孔育珣楊文乾等悉心熟議籌畫萬全而行既非目前急務何必忙迫詳加斟酌可也同日又奏竊臣質本庸愚謬膺重寄夙夜惴惴恐致隕越凡有可以寧謐海疆之計莫不深思熟慮以期仰報聖恩於萬一伏查瓊州一郡孤懸海外夙稱險要郡北十里則有白沙海口諸港商船輳集洵為瓊治之咽喉巳設水師副將一貟兼轄瓊山文昌會同澄邁臨髙五縣港汛哨船一十四隻分巡守隘布置得宜誠無可慮惟崖州一營離郡千里逼近安南實為全瓊之後戶所轄汛地橫亙海面四百餘里除小港不計外內有大蛋保平三亞榆林赤嶺望樓大港六道各設炮臺防守港外悉連大洋其衝要處所較之各州邑為多在在可以泊船巡防更宜加密雖有遊擊一貟駐劄州城職非水師兼無船隻設有警息未免束手無策臣身任封疆不得不思及未雨綢繆之計請於崖營遊擊一缺改設水師設立哨船分防要汛東至萬營之桐棲港西至儋營之英潮港洋面毗連俱屬險要輪撥汛辨不時遊巡與海口之水師協上下會哨則南北交嚴東西兼顧全瓊處處皆成苞桑之固矣微臣深知崖營甚屬緊要敬陳一得之愚至於設立哨船作何設法應請皇上敕下督撫二臣逐加詳議非臣愚昧所能擅及也為此具摺奏請伏祈睿裁謹奏崖營改設水師是否合宜會同督撫臣酌商具奏雍正四年四月初八日廣東提督臣萬際瑞謹奏為恭報地方米價雨水情形事竊粵東自入春以來雨水不一除髙雷廉三府雨水調勻米價每石七八錢不等南韶瓊三府雨水未多米價每石一兩一二錢不等外其惠潮廣肇四府去嵗歉收今春復隂雨連綿米價近日漸至二兩一石至潮州各屬先於二月內每石即長至二兩四五錢再碣石南澳二鎮緣地處海隅商販不前升斗難求臣目擊維艱咨商督撫二臣隨將潮府各邑倉穀酌量動支分發平糶陸續接濟民食并撥鄰近州縣倉穀分運碣石南澳二鎮平糶招徠商販米價稍平兹三月二十外天氣方晴積水漸退禾秧現在及時種插或豐或歉俟收割之後容臣另摺奏報至廣州府城亦因米價騰貴設立官厰平糶米穀四月初六日據廣州城守副將賀捷稟稱三月三十日省城附近男婦多人因赴各厰買米喧嚷爭閙遂擁至撫臣衙門將頭門打開擁入大堂毁爛堂上什物經撫標官兵驅逐趕散拿獲數人尚未發落等因到臣臣身任封疆不敢壅於上聞理合將地方情形雨水米價一併繕摺奏聞謹奏此事已據楊文乾僃悉上聞矣所奏知道了前董象緯到京奏稱若論戎行效力究竟旗員勝似漢人且更有卑鄙狹小之語朕因曉諭云我朝自世祖定鼎聖祖相繼撫御寰區以來八十餘年深仁厚澤淪肌浹髓凡有血氣者莫不尊親無論旗漢誰非臣子悉皆一體輸忠爭相報效寧有彼此之分況當日三逆之變漢臣中多有盡節者旗人內亦有從叛者安見漢不如旗即以目前比較楊琳孔育珣某臧某否董象緯萬際瑞孰優孰劣爾試思之當據董象緯覆奏孔育珣原強似楊琳萬際瑞則逺不如臣隨歷數汝之不及伊處朕向伊云俟萬際瑞到任受事後果不及爾朕則閉口無言矣曽經降有如斯諭旨汝若不加勉自勵被董象緯之竊笑當為何如耶不但不及董象緯倘所行之事被人指摘談論仰面對天於心安乎將此諭時時捧誦黽勉奉行毋少怠忽庶副朕望雍正四年七月二十四日廣東提督臣萬際瑞謹奏為恭謝天恩事雍正四年七月十二日臣齎摺家人回粵恭捧皇上欽賜各種藥錠到臣臣即望闕叩頭謝恩祗領訖所有臣奏地方米價雨水情形摺內欽奉硃批諭旨臣跪誦之下惶悚靡已竊念臣邊海庸愚才疏識淺蒙皇上隆恩畀以廣東提督重任汲深綆短殊多隕越但臣心有餘惟恐才力不逮非敢自棄於君父之前今蒙皇上推心置腹令臣時時黽勉奉行更念粵東地處炎方特頒仙錠以備時用臣之遭逢實千古所希有惟有殫心竭力益加砥礪以仰報髙深於萬一耳所有欽奉硃批諭旨并微臣感激蟻悃理合繕摺奏謝謹奏覽奏知道了大凡居官第一操守為要至辦理諸事切戒自是當集思廣益取衆善以為己用乃封疆大臣最所當務者也勉之同日又奏為恭報粵東夏禾收成惠府秋水泛濫事竊照粵東自四月以後雨水調均早禾秀實收成俱有八分惟潮府沿海一帶地土瘠薄止有七分今通省米價一兩內外不等潮屬稍貴但二季晚禾又經及時種插可慶大有詎意七月十六日颶風暴雨陡發異常兵民房屋多被吹倒兼霪雨連綿至二十一日始晴而洪水泛漲惠府與歸善縣皆成澤國四面汪洋城內街巷兵民出入俱乘小艇各處房屋多被水淹倒塌二十二日水勢愈長博羅縣亦被水淹至惠協及臣標中左右前四營遊擊衙署盡被水淹城廂兵民俱奔髙處城上棲身臣與地方官多雇船隻在城廂內外巡視救護被水難民加意防範多方撫恤不至失所外至於城垣房屋倒塌丈尺間數與人民有無淹斃以及惠屬之各州縣曽否被災俟水退之日僃細查明另行摺奏所有惠府被水情形理合繕摺奏聞謹奏惠州等處被水據楊文乾業已奏聞宜教導兵民人等消弭災眚之道常存善心毋造惡業力行好事敬信神明則地方上自無此等事矣今當被災之際彈壓匪類不致乘機生事極為要務慎之雍正四年九月二十日廣東提督臣萬際瑞謹奏為鎮臣貪鄙徇私事竊照總兵一官為封疆大臣務宜亷潔持躬端方矢志方可表率將僃整飭營伍今查得碣石鎮總兵官陳良弼處已不端穢行昭著任用字識孔超家人王祖苛索漁船規例每漁船一對索銀八兩汕尾港內共收銀六百六十兩右營把總張隆經收交駐碣提塘康照帶繳鮜門港共收銀三百三十兩係右營千總楊忠收繳以致右營守僃廖勇每對漁船亦索取規例銀三兩六錢毫無顧忌右營港內如此中左二營可知臣訪聞既確何敢徇隱理合據實密奏伏乞皇上睿鑒施行謹奏陳良弼係一老將且又熟諳水師似此歷練之貟殊屬難得若猶不至曠廢營務虧缺職守當彼此和衷朂勉遷改爾等提鎮不能一德同心與地方無益所奏朕頗不以為然觀此爾甚乏調停作用也同日又奏為報明田禾城舍被水衝塌事竊照粵東惠郡於雍正四年七月十七至二十等日颶風大雨洪水泛濫先經臣將被水情形繕摺具奏續據惠協副將稟報七月二十四日水勢方定計髙二丈有餘於次日漸退府城四門被水淹浸共倒卸城垣二十餘丈歸善縣城垣共倒卸十餘丈田禾俱被水淹府縣城廂內外以及鄉莊共倒房屋數千餘間又據臣標右營遊擊稟報河源縣因七月十七至二十等日風雨交作河水漲發老城倒壞八缺新城倒壞四缺民房漂流無數等情又據惠協左營都司稟報博羅縣七月十八九等日連朝風雨洪水泛濫沿江十五圖田地低窪者盡被水淹城鄉房屋共倒塌千有餘間等情又據東莞營守僃稟報廣州府屬之東莞縣七月二十外水勢泛漲兵民房舍倒塌無數等情又據增城營遊擊稟報增城縣七月二十等日潦水湧漲田禾被水淹浸民房倒塌無數等情又準潮州總兵咨報程鄉縣七月十七八等日颶風大雨洪水暴漲城內水滿二尺城垣倒缷九丈城鄉內外兵民房屋倒塌甚多等因又據惠來營遊擊稟報惠來縣七月十六日起風雨七晝夜兵民房屋多有倒壞所種晚禾二三分俱被水淹低田衝決等情又準髙州總兵咨報亷州府七月初八日起至十二日止狂風大雨倒缷城垣二十餘丈等因又據羅定協副將稟報羅定州七月十九日至二十五日霪雨淋漓溪河湧漲州城近河城垣倒缷十有餘丈田禾房舍幸無大損等情各到臣臣查以上被水州縣惟程鄉縣淹斃男婦四口其餘並無傷損至於各屬營汛塘房墩樓排柵倒爛甚多除咨會督撫二臣檄飭文員將城垣塘汛速行修葺以固地方外詎惠府於八月十六七八等日大雨滂沱連綿不息洪水復漲較前雖小二尺而歸善博羅東莞三縣沿江一帶以及廣州府屬之增城縣山水滙發兵民房舍復有傾頽晚禾補插者悉行淹壞秋成恐致歉收臣身任封疆理合繕摺奏聞謹奏地方上一切災祥自應絲毫無隱據實奏聞爾等職任封疆遇斯等事全賴從容調度撫恤彈壓若聼信小人妄言驚惶失措以致搖惑衆心則汝難辭其罪也同日又奏為報明馬價羡餘急公修造兵房事竊惠郡連遭洪水業將民舍城垣倒缷情形另摺奏明兹有臣標五營內共倒兵房二百五十五間每間估計銀四兩需用修造銀一千零二十兩此項銀兩即於五營馬價內之羡餘動用查東省馬價每匹額定銀二十一兩九錢臣委員廣西購買或十二三兩或十五六兩不等每年總計羡餘有千金以外臣先因五營盔甲新舊不一無以壯營伍而收實用原擬奏明捐造盔甲今兵丁棲止無所現存有餘銀八百兩不得不先行修造俟再有盈餘另為製造盔甲等項至於五營中之器械惟鳥鎗略為短小本年五月內督臣孔育珣捐銀五百兩臣即興工打造鳥鎗六百桿已經工竣除給發各兵操演外理合繕摺一併奏聞伏乞皇上睿鑒施行謹奏此舉甚是凡事有緩急先後之宜須權其輕重為之豈可固執而不通融耶雍正五年八月初十日山東登州總兵官臣萬際瑞謹奏為奏聞事竊照東省登萊青諸郡沿海一帶應行修築炮臺十九座經前任撫臣陳世倌與前任鎮臣黃元驤會同委員先築八角口炮臺一座以為成式續將文登營轄汛成山衛之龍口東崖文登縣之馬頭嘴北岸寧福營轄汛萊陽縣之丁字嘴即墨營轄汛即墨縣之巉山膠州營轄汛膠州之唐島口安東營轄汛諸城縣之亭子蘭六處炮臺興工修築又經前任鎮臣黃元驤具疏題報在案嗣據各該營陸續呈報亭子蘭馬頭嘴丁字嘴龍口東崖唐島口巉山等六處俱已修築完工經臣逐加親驗六處所修炮臺工程俱各堅固一如八角口炮臺之式又查有萊州營轄汛掖縣之三山口炮臺現在興工修築尚未告竣其餘未曽興工修築炮臺十一座內有文登營轄汛成山衛之養魚池膠州營轄汛膠州之古鎮口即墨營轄汛即墨縣之黃龍莊安東營轄汛日照縣之龍汪口四處亦屬緊要趁此天長日暖秋收之後正可修築臣現在咨明撫臣塞楞額檄飭該地方官照式繪圗估計興工在案其餘七座內有臣標右營轄汛黃縣之砪磯島乃一條沙線生出海面十數餘里離村頗逺並無船隻灣泊經臣查驗實係僻處應移築於膠州營轄汛浮山所之青島口此島為膠州門戶乃船隻灣泊之所實係衝處又有文登營轄汛寧海州之南橫海面雖無沙石但口門太厰船隻難泊亦非緊要之地應移築於文登營轄汛寧海州之黃島此島與南橫相去十里可以灣泊船隻實係衝處一轉移間二處所築炮臺俱收實濟而錢糧亦不至虛費矣理合繕摺奏請可否容臣咨商撫臣塞楞額將砪磯南橫二處炮臺移改伏乞皇上睿鑒施行謹奏移僻就衝甚善與塞楞額商酌行之雍正六年二月初十日山東登州總兵官革職留任臣萬際瑞謹奏為請旨事竊查臣屬武定營轄汛佘家港地方係鹽徒出沒要口經前任撫臣陳世倌於雍正二年十二月內題明將本營守僃帶領馬步兵丁八十名移駐專司巡緝於雍正三年四月內該處闔商公呈長蘆鹽臣莽鵠立議以完課銀兩內每銀一百兩外加銀一兩以助移駐官兵薪水之資經莽鵠立批準每年該汛守僃差目兵赴鹽政衙門領回散給查守僃一年得助銀二百四十兩馬兵二十名得助銀四百八十兩步兵六十名得助銀七百二十兩一年共計銀一千四百四十兩但臣思守僃自有俸薪養糧兵丁各有月餉養贍其移駐汛防捍衛地方巡緝私販分所當然何必有資助之私臣受恩深重不敢徇情欺隱理合據實奏明請旨將此項銀兩可否歸於正項鹽斤之內伏乞聖裁遵行謹奏此項銀兩不關國計民生出於衆商樂從何必裁革過為苛刻但毋因此一奏奉有朕諭遂乃自以為利則更不可也雍正六年四月二十一日山東登州總兵官革職留任臣萬際瑞謹奏為敬抒管見仰祈睿鑒以僃採擇事竊臣謭劣庸才屢多罪愆荷蒙髙厚之恩優容格外夙夜思維無可報稱茍有一得之愚曷敢緘默不言請為我皇上敬陳之一武科鄉試録宜分别進呈也查文科賓興之期欽命廷臣典試撫臣為之監臨中式之後將試卷送部磨勘國家造就人才之至意巳詳且盡矣惟武科一途外場弓馬技勇以及內場文字俱屬撫臣之專任其中才技各有短長未免公私莫辨臣愚請嗣後於鄉試録上令撫臣注明弓馬技勇文字三項進呈或內外場俱優或外場好而內場平常或內場好而外場稍次者俱分析注明進呈并行咨部查核俟會試之年將內場優而外場稍次者另編衛字號先期奏聞名數欽定中式若干名以僃衛所之用其武進士前一半選授營缺後一半選授衛缺之例似可變通停止倘新科武舉內有文字荒謬弓馬技勇不堪者或被主考糾參或被部臣彈劾將撫臣議處至歷科武新科一體編入號內會試如此則名器慎重而實收得人之效矣一盜首住址州縣宜分别議處也查雍正四年七月內九卿會議欽奉上諭一案嗣後編排保甲地方官有不實力奉行不能稽查盜賊或别經發覺或經科道糾參將專管州縣官照不能察緝姦民例降二級調用兼轄統轄各官照例議處等因奉旨著以一年為限欽遵在案又定例承緝各官務期必獲盜首如不獲盜首雖獲賊過半於免罪之外仍罰俸一年限一年緝拿限滿不獲罰俸二年再限一年緝拏再不獲降一級留任等語是盜首之重於夥盜也明矣但並未嚴定有盜首住址州縣分别議處之例則承審各官止以已經拏獲一語結而本州縣自行拏獲者或係别州縣人而為該管地方官自行察出拏獲到案者俱從寬免其處分如本案所獲盜首非係本州縣人將供出住址州縣之專兼各官職名照不能察緝姦民例參處保甲排頭一體治罪倘鄰近地方官拏獲盜首係伊住址本州縣案內之犯除拏獲鄰近之地方官仍照例議敘外應將本案之州縣官亦從寬免議以便互相協力緝拏如鄰近地方官拏獲盜首非伊住址本州縣案內之犯别入鄰境為盜首者仍將該管地方專兼等職名照例參處至本案盜首自行首出并夥盜內首出盜首者係伊住址本州縣案內之犯將專管州縣各官均應從寬定議以杜諱縱審係别州縣住址者仍將專管各官照例議處其有揑稱盜首病故并將夥盜嚇認盜首嫁禍於别地方者經該管上司審出指名題參從重議處倘該管上司不行詳審朦混結案經别案發覺將該管上司一并嚴加議處如此則保甲嚴而盜風息矣以上二條臣不揣愚陋謬陳管見是否可採伏祈皇上睿鑒施行謹奏捕盜處分不妥協處非止一端實因出於無可如何之故處分輕則愈肆懈弛處分重又難免諱匿蓋疏密皆非寬嚴兩礙適中之法奚從而得盜風之息要在文武大吏公正嚴明實心任事方為拔本塞源之道若只於例限處分內講究是所謂緣木而求魚也庸有益乎同日又奏為請嚴積引之弊以裕國課事竊臣一介武夫識見淺陋於鹽政事宜尤多未諳緣蒞任東省一載有餘凡遇營汛拏獲私鹽一經交縣便稱有引開釋臣實未解其故隨細心訪察始知東省每年有積引二十六萬餘道俱係截角殘引以資其營私之弊一遇拏獲到官將殘引重復影射姦商侵蝕牢不可破今雖查出而每年可增數萬兩之引課已暗耗於積引之中臣身任封疆杜絶私販係臣之責是以據實入告伏乞皇上委員徹底清查庶姦商知所畏懼而可增之引課不至飽若輩之私橐矣理合繕摺具奏伏祈皇上睿鑒施行謹奏所奏可嘉另有諭旨雍正六年五月十九日山東登州總兵官革職留任臣萬際瑞謹奏為恭謝天恩事雍正六年五月十二日臣齎摺家人回登恭捧御賜各種藥錠到臣臣跪迎至署望闕叩頭謝恩祗領訖當將奏摺啓視欽奉硃批盜風之息要在文武大吏公正嚴明實心任事方為拔本塞源之道若只於例限處分內講究是所謂緣木而求魚也庸有益乎欽此臣跪讀之下仰見我皇上睿謨廣逺弭盜務在清源臣謹遵旨檄飭將辨訓練巡防實心任事公正嚴明毋負職守以期仰報髙厚於萬一為此繕摺奏謝所有奉到硃批奏摺一併恭繳伏乞皇上睿鑒謹奏覽所奏知縣關拮一摺留中候另有諭旨內外大臣悉皆如是秉公無隱事事據實入告毫弗瞻顧何慮天下不大治耶勉之勉之更莫改移此志雍正六年六月二十一日山東登州總兵官臣萬際瑞謹奏為恭謝天恩事雍正六年六月初四日臣齎摺家人回登恭捧皇上御賜新花樣紗二聨到臣臣隨恭設香案望闕叩頭謝恩祗領訖伏念臣邉海庸愚愆尤屢積荷蒙皇上宥過之仁不加擯棄已屬過分何當溫旨嘉勉復叨寵賚覩雲霞之璀璨捧出鳯城瞻綺繡之輝煌頒來天府芬芳四季豈惟開放千紅飛舞盈圖寧止疊臻百福臣何人斯遭此曠典聖恩愈厚報稱愈難惟有竭盡駑駘益矢冰兢仰酬髙厚於萬一耳所有微臣感激之私理合繕摺奏謝并將奉到硃批奏摺一併恭繳伏乞皇上睿鑒謹奏覽奏謝知道了凡事秉公據實一無隱諱是乃人臣輸忠之極則勉之同日又奏為歷陳引票積弊以肅鹽政事竊照山東六府行鹽有引票之不同多寡之不一臣細加察核查登萊青三府全食票鹽東昌府全食引鹽濟南府屬之章邱鄒平淄川長山新城齊東濟陽青城新泰萊蕪武定陽信海豐樂陵濱州利津霑化蒲臺等十八州縣并兗州府屬之沂州費縣俱食票鹽又濟屬之臨邑陵縣德平及兗屬之郯城則引鹽票鹽俱食至二郡所屬之别州縣則皆食引鹽雖引鹽票鹽均辦國課但查順治十七年長蘆鹽臣馮班條議東省票引一疏內開查濟南府屬章邱等二十二州縣俱行票鹽其與兗東兩郡食引鹽之州縣址壤錯接票鹽過季方謂私鹽姦商一票到手騾馱馬載旦暮公行一季九十日之中勤者八九次少者五六次票鹽流弊蠧國病商乞敕部確議悉令改引歸商等因經部議不準行今且並不按例退銷過季之票公然運行查雍正五年七月內據護理武定營遊擊李景泰詳稱原任遊擊徐英任內拏獲鹽車五輛並無票引經陽信縣審據商人吳裕德供稱委係夏季引鹽因持票之張全之帶病先行等情開釋銷案又雍正五年九月內濟南城守營把總曲成貴拏獲無票私鹽五車先經按運二司所取商人王永升初供據稱所運之鹽部票是春夏二季的夫春夏之票何以行銷秋冬二季之鹽影射之明驗已彰彰畢露矣尚有雍正四年七月內武定州拏獲無票散鹽八車行非運鹽大路經武定州審稱押車之于現龍短少食費赴集借錢及後到莊原帶部票不便於泥水拏出又因雨大繩席黴爛將鹽砍包散裝大路泥濘車由小路繞行等情僅以責懲銷案夫繞道即係販私砍包又屬違例至狡辨借錢方回又不將部票拏出驗看明係臨時影射又雍正五年五月內武定營盤獲越境無票私鹽五車經長山縣審稱押車之董永剛暮夜錯行道路因昏黑不將部票給看今交撥商張奎光帶來呈驗亦不杖責銷案均不照定例內鹽引相離同私鹽法追斷再查東省額引四十五萬五百四十八道內除河南江南所屬十五州縣共銷引十四萬三千四百一十道此係隔省未便與東省徹底核算外其濟兗東三府食引鹽者共五十一州縣核算地丁額銀一百五十餘萬兩共銷引三十萬一千五百七十六道登萊青及濟兗二府所屬有食票鹽并引票兼食者共五十三州縣核算地丁銀一百八十餘萬兩共銷票十萬三千四百五十二道兼銷引五千五百六十二道夫州縣之數不相上下核算地丁數又差多而銷鹽之引與票何至多寡相去數倍則影射侵蝕之弊不又曉然共見者耶且歷城章邱俱屬濟南之大邑歷城編戶九十八里額徵地丁銀六萬有餘銷引九千八百三十八道章邱編戶一百零三里額徵地丁銀七萬有餘所銷票引則四千一百二十八道齊河為下中之邑編戶二十七里額徵地丁銀二萬有餘銷引四千零七道鄒平為上中之邑編戶五十七里額徵地丁銀三萬有餘所銷票引則一千四百九十三道即此數縣而論懸殊若斯是引鹽尚藉積引以營私而票鹽更不須積引以侵蝕也蓋因商領引至場舂築包鹽永阜場截一角舂至蒲關稱掣截一角至濼關稱掣截一角運至州縣賣銷截一角掣鹽每季一次退引按季繳銷一季之內似難重復影射自有積引一項而重復影射之弊生若行紅扒票之章邱鄒平濟東濟陽臨邑青城陵縣新泰德平武定濱州蒲臺萊蕪等十三州縣稍近鹽河亦赴永阜場舂鹽將票引截一角過蒲關稱掣截一角至州縣截一角而濼關非所經之地故不與焉較之引鹽巳少一關稱掣盤驗矣惟新泰一縣又過濼關掣驗截一角其行黑扒票之四十州縣不近鹽河赴各場舂鹽截一角至州縣截一角姦商一票到手一季之內時日既寬重復影射越行鄰境殆無虛日且紅扒黑扒之票俱不按季繳銷其弊尚可問歟臣謹據實奏聞仰祈皇上聖鑒徹底查究酌丁增額其紅黑票引立法稽察繳銷庶積弊除而鹽政肅矣為此謹奏此奏可嘉之至內外文武大臣留心地方事宜凡遇一切利病咸肯如此詳悉奏聞則胡弊不除曷令不行也已有旨徹底查究矣同日又奏為奏聞事竊臣查得雍正四年八月內原任鎮臣黃元驤任內據武定營遊擊徐英詳稱巡兵張璉等於雍正四年七月二十五日協同州役至濱州城南開河地方拏獲私鹽九百餘包並無引票又無人看守隨行汛辨移州查明等情續據濱州審稱據商人韓恆升夥計趙允琦供稱所堆包鹽並非私鹽緣商人去年積滯部票一千道無本舂運延至今年三五月內始舂完過關已經銷賣二十二包存鹽九百七十八包籲請道憲通融代銷章邱未蒙批允始著船戶運貯開河店旁等情審釋銷案查定例內引票按季繳銷過季即屬違例今雍正三年票引何以積至四年三五月始過蒲關稱掣截角如何造册奏銷查濱州每年額票二千七百一十三張每季不敷七百張今狡辨無本舂運以至積滯票引一千張是雍正三年秋季之內該州即無官鹽食矣且遲至四年七月方銷二十二包則十月之久該州豈盡食淡者乎隔年票引違例影射實由積引一項得以藉口朦混行私臣下質庸愚前奏未能盡悉但臣之微忱自難逃聖明洞鑒再有雍正五年五月內武定營拏獲無票散鹽三車經霑化縣於七月內訊據押車之生員王于升供稱因受暑帶票先行等因審釋詳報近於雍正六年六月十六日始據武定營詳稱此案業蒙院憲批示將生員王于升革頂鹽斤變價入官準有霑化縣移覆等情即此一批與别案逈異從前通同侵蝕之弊已可知矣臣謹據實一并奏聞伏乞皇上睿鑒施行謹奏亦有旨飭查矣雍正六年七月二十二日山東登州總兵官臣萬際瑞謹奏為奏聞事竊臣於雍正六年五月初一日抵省會審把總曲成貴一案業於本年六月初三日將會審情由繕疏具題請旨在案嗣後接閲邸報已於六月十八日奉旨這事情著總督田文鏡秉公嚴審定議具奏該部知道欽此但未奉到部文不敢擅行回登兹於七月二十日據即墨營參將稟稱訪得萊州府屬髙密縣地方一名弔莊有徐秀家一起來歷不明之人往來不定朝散夜聚正在會商縣令設法察拏隨有比鄰徐萬欽赴縣首告該汛把總隨即會同縣令帶兵前往弔莊密行查拏巳獲得徐秀徐明髙哲善楊濟張興徐廷徐可得王福臣吳應元小忙等十名經縣審訊俱皆供係邪教又供出夥黨牛三宜回本任何必等候部文雍正六年十月初五日山東登州總兵官臣萬際瑞謹奏為奏聞事竊臣邊海庸愚謬膺封疆重寄無能報效時懷覆餗兹蒙兵部劄開奉旨田文鏡著授為河東總督管理山東河南二省事務欽此臣捧閲之下不勝欣幸獨是遙隔兩省未得親覩儀型兹督臣田文鏡於本年九月二十三日以公事親赴東省濟南府臣分宜往謁躬聆教言藉以整飭營伍寧謐海疆且督臣田文鏡之居心行事悉本我皇上之所指示洵足為法是以臣輕騎減從於十月初六日起程赴省所有微臣起程日期理合恭摺奏聞伏乞皇上睿鑒謹奏此行極是應往一見者雍正七年九月初三日浙江提督臣萬際瑞謹奏為恭請陛見跪聆聖訓事竊臣閩海陋質謭劣庸材蒙聖祖仁皇帝豢養深恩涓埃未效愆過頻仍復荷我皇上如天之仁逾格優容歷畀封疆重任犬馬圖報毫無寸績捫心自愧夙夜靡寧今又叨蒙殊恩補授浙江提督承聖恩之浩蕩感激難名而下臣勉欲竭盡駑駘無如才非經濟知乏權衡膺此海疆重寄實慮不能勝任若非欽承聖訓指示機宜則控馭海防茫無措施且臣自雍正三年陛見後迄今五載未獲趨覲天顔犬馬依戀時切夢寐仰懇聖慈恩準容臣輕騎馳赴闕廷叩請聖安跪聆訓旨俾臣知所遵循不致隕越以曠職守誠聖主造就之隆恩而犬馬積年戀主之私亦得以稍展矣為此繕摺奏請伏乞皇上睿鑒施行謹奏地方緊要不必懇請赴闕李衛秉公持正實心奉職與田文鏡同一軌轍為朕所倚信之督臣百凡領其教益而行更將從前在粵瞻顧徇隱舊習徹底洗除汝來京面聆訓旨亦不過此數語而已登鎮一任實屬無忝如能遵循弗失再加勤慎亦可以告無過矣況目今浙省一切整理無甚大費更張為難處也所奏炮臺式樣一摺留中雍正七年十一月二十四日浙江提督臣萬際瑞謹奏為請更辨兵實在食糧年月以杜頂冒事竊臣案查雍正四年升任江西南贛鎮臣石雲倬奏請將各營兵丁更正實在姓名年貌奉有俞旨欽遵在案但兵丁姓名年貌既經更正而食糧年分仍造舊兵年月未免弊竇叢生臣蒙皇上隆恩畀以提督重寄抵浙任事考查兵丁册籍有三五嵗食糧者亦有未生而先食糧者種種舛謬不止一兵一辨詰其所以僉云積習相沿失於改正臣思名糧之確實稽察以年貌為慿歷伍之淺深考核以册籍為據若頂接名糧仍造舊兵入伍年月則朦混頂冒之弊難以查考除現在飭令各營逐一更正外但恐與從前所送部册不符理合據實奏聞伏乞皇上睿鑒施行謹奏凡事但當據實辦理若慮前册不符該部駁查何難僃將情由聲明也奚庸此番瀆奏同日又奏竊照臣標五營兵丁荷蒙皇恩賞給銀一萬八十兩營運生息以僃一時之用經原任提臣陳天培按數借給五營兵丁奉有諭旨著陳天培一一歸還交與接任提督另行料理倘借給銀兩內兵丁有不能清還者著陳天培照數賠補欽此欽遵經署提臣冉起鳯接蒙兵部劄付隨移咨陳天培行催五營繳還本銀四千九百兩有零兹臣於雍正七年十月抵寧任事復移咨行催續據五營將僃詳稱兵丁一時實難全措今又繳還銀二千三百餘兩前後共歸還本銀七千二百餘兩尚缺少一萬零七百餘兩伏懇來年作三季繳還等情據此臣查原任提臣陳天培現羈江省候質而兵丁銀兩到手俱已用去一時實難全歸可否俟來年作三季歸還以清公項至兵丁內倘有逃亡事故實不能清償者應於原任提臣名下照數賠補其已歸銀兩候湊足八千之數擬交鹽道衙門轉發殷商連環具結領運按月一分起息俱經札商督臣李衛接準回札在案再此項本銀俟來秋方可全完則經年利息即按陸續歸本而算缺少實多相應一併奏請皇上睿鑒批示以便遵行謹奏銀一到手自必花費無存今莫可如何只得聽其歸還耳雍正八年三月二十五日浙江提督臣萬際瑞謹奏為奏報雍正六年分收過公糧餉米製造軍裝甲械數目仰祈睿鑒事竊照浙省各標協營嵗需製造修整軍裝甲械等費自雍正五年四月內經前任提臣石雲倬奏定每兵一百名準留公糧守餉三分按年製造修整軍械業經接任提臣陳天培將雍正五年四月起至雍正六年二月止通省各標營收過公糧製造軍械總數具摺奏報在案今臣於雍正七年十月內到任檢查雍正六年分公糧開銷數目未經奏報當將各標協營送到雍正六年三月起至歲底止公糧製造各項軍裝所開工料價值逐細查核多寡不同恐有浮冒濫銷情弊隨經一一親行弔驗內惟紹協製造藤牌片刀牌刀三項造不合式現在飭令重造賠補外今臣查得浙江通省各標協營馬步水戰守兵共四萬九百零五名除各官隨丁外應存公糧守餉一千一百一十八名自雍正六年三月起至十二月止共餉米銀一萬三千四百七十四兩零又撫標營自雍正五年六月起至雍正六年十二月止共計收過餉米銀二百七十二兩零通省合共收過公糧餉米銀一萬三千七百四十六兩零謹將雍正六年分製造過軍裝甲械數目另單臚列恭呈御覽共計用過銀九千八百二十七兩零又加雍正五年分透用銀二千五百九十六兩零二共用銀一萬二千四百二十三兩零內撫標前因公糧不敷經督臣李衛給發鹽庫公項銀七百四十兩零添用外通省標營共於收存公糧餉米銀內動用過銀一萬一千六百八十二兩零實淨存銀二千六十四兩零留為次年應用為此繕摺奏報伏乞皇上睿鑒施行謹奏此不過一筆花帳朕奚暇觀覽既未委員查核亦何足為慿且未有如此瑣屑煩瀆之理據奏陳天培將雍正五年分總數奏報在案等語汝今踵陳天培之故步無非欲令將來代替之人效法汝所為耳倘遇有識見者斷不蹈襲斯等庸愚轍迹依樣葫蘆汝意或以曽奏過三字作為張本冀免日後敗露之虞乎汝自抵浙以來兵民交怨聲名甚劣里巷之間有李太保督浙萬民安業萬提督到任闔省胥讒之謡未知得聞否也汝前在粵諸事瞻徇朕訓汝振作者整理戎政操練營伍之謂豈令不論是非曲直一味苛刻耶從來下愚伎倆非過則不及奈何奈何試觀李衛並非優柔沽譽之人輿情之不怨而感者以其善善惡惡咸出於公也今汝偏於搜求刻厲欲以仰合朕意專事嚴峻操切以防督臣參論滿懷皆係假公濟私之心寧有不招衆怨沸騰者乎朕意無他惟喜適中合理而已假若憾朕以為寬嚴均屬不可殊難為官乃汝過當不能折中之故於朕何尤似此不知自反庸愚鄙見朕俱洞鑒無遺且朕諄諄命汝凡事呈請督臣指示而行係極易為之舉汝必不肯一一就近領教是誠何心朕實不解將此諭亦令督臣李衛知之雍正八年六月十一日浙江提督臣萬際瑞謹奏為聖恩髙厚難名微臣罪愆莫逭謹恪遵聖訓以圗報效事雍正八年五月初八日臣標千總齎捧臣奏報雍正六年分收過公糧餉米製造軍裝甲械數目一摺到臣奉有硃批諭旨臣跪讀之下驚惶恐懼手足無措伏念臣邉海庸愚毫無知識蒙皇上天恩屢膺封疆重寄愆過頻仍無能報稱感荷帝德如天逾格生成復畀浙江提督巨任臣自當竭盡駑駘整飭營伍凡事求於適中合理而行乃臣暗劣不明識量𥚹急心惟欲速以至嚴刻誠如聖明訓飭非過則不及也但臣於本年正月二十五日接準督臣李衛來札後深自改悔今蒙聖恩不即加以重譴訓誡諄諄撫膺自問感泣欲絶惟有痛加砥礪勉力自新圖報髙厚於萬一耳至公糧製造軍械嗣後當遵旨委員察核取結奏報仰祈天恩恕臣已往容臣諸事會商督臣李衛圖報將來臣不勝惶悚戰栗負罪陳奏所有奉到硃批諭旨臣欽遵敬録寄知督臣李衛外謹此繕摺叩謝天恩伏乞皇上睿鑒謹奏必待朕之訓誡督臣札致然後改悔如是左提右攜前挾後扶何有休歇究須克勉中道方能自立也雍正八年十二月初五日浙江提督臣萬際瑞謹奏為奏報雍正七年分收過公糧製造軍械數目仰祈睿鑒事竊照調任提臣石雲倬奏請將浙省各標協等營存留公糧修製軍裝甲械一案自雍正七年正月至十二月又屆報銷之期據各標協營送到製造各項軍裝工料價值細册前來臣隨委將僃等官一十二員分路逐一點驗並無茍簡浮冒取有核實册結在案今臣查得浙江通省各標協營並撫標營雍正七年分共收過公糧餉米銀一萬七千六百二兩零除將造過軍裝甲械數目另單臚列恭呈御覽外共計雍正七年分用過銀一萬三千二百六兩零餘剩銀四千三百九十六兩零并雍正六年分舊存銀二千六十四兩零二共存銀六千四百六十兩零留為次年應用至所造軍裝甲械等物俱經臣逐項弔驗之後即令送赴督臣李衛會驗悉屬堅利鮮明堪以禦用理合繕摺奏報伏乞皇上睿鑒施行謹奏所奏朕不過一覽而已諸凡總聼督臣李衛訓誨指示為之雍正九年十一月二十六日浙江提督臣萬際瑞謹奏為奏報雍正八年分收過公糧製造軍械數目仰祈睿鑒事竊照浙省各標協等營存留公糧修製軍裝一案自雍正八年正月至十二月又屆報銷之期據各標協營送到造製軍裝工料價值細册前來臣隨委將僃分路逐一點驗悉屬鮮明堅利並無茍簡浮冒取有核實册結在案今臣查得浙省各標協營並撫標營雍正八年分共收過公糧餉米銀一萬五千七百九十一兩零除將造過軍械數目另單開呈御覽外共計雍正八年分用過銀一萬一千九十四兩零餘剩銀四千三百九十六兩零并雍正七年分舊存銀六千四百六十四兩零二共存銀一萬八百五十七兩零留為次年應用謹此繕摺奏報伏乞皇上睿鑒謹奏全不仰體朕躬日理萬幾何暇觀汝帳目雍正十年三月初八日浙江提督臣萬際瑞謹奏為恭報微臣查閲營汛回署日期事竊臣因浙省幅員廣濶營汛兵馬並沿海一帶必須親歷巡查考察以為勸懲業於上年十一月二十六日自省會起行奏報在案隨即於嚴協起巡至處屬次歷溫黃及定標沿海一帶由鎮海回營周遍查察較閲兵馬技藝俱各竭力整頓營伍可觀兵民和輯其內優者則黃巖鎮標暨玉環大荆瑞安樂清平陽等營間有優劣不等者則鎮海寧海象山太平等營經臣訓飭各將僃辨員勤加督率操演務令俱臻純熟以仰報國恩止有楓嶺磐石二營技藝生疏訓練乏術除嚴飭勒限學習另行委員點驗外倘再怠忽不改即當咨明督臣李衛會疏題參庶躁妄疲懦者知所警戒矣兹臣於本年三月初四日已抵寧波駐箚衙門所有回署日期理合繕摺奏聞伏乞皇上睿鑒謹奏似此訓練乏術溺職將辨不以彈劾示懲必容至怠忽不改方始咨會題參因曽效力行間耶抑或其人另具超卓之才耶殊為朕所不解此下復云庶使躁妄者知戒等語更屬不可解矣雍正十一年七月二十四日浙江提督臣萬際瑞謹奏為奏聞事雍正十年六月二十八日寧郡風勢稍異平時經臣委員查勘船隻田禾俱無傷損定黃二鎮洋汛亦均獲安寧惟溫屬之玉環瑞安二營出哨船隻準據署溫州鎮臣黃有才并玉環營參將顧元亮稟報稱守僃邱宗義管坐晏字八號戰船齎令出洋於六月二十八日遇颶至二更時分風勢愈猛將船打至官山洋面擊碎淹斃兵丁一十九名守僃邱宗義抱板得生腿腳受傷又據署瑞安營副將魏國泰詳報千總楊元管坐清字五號戰船是日遇颶至夜將船打至黃家山下擊碎千總楊元抱槳得生腰足被傷淹斃兵丁三名又功加林逢春管坐清字九號戰船內兵三十名餘丁二名同時遇颶飄失無蹤沿邉水陸探訪尋至虎石坑見有本船字號推窗板并棊盤蓋後等物又本船兵丁姓名年籍腰牌以及鎗殼火箭桿各項形迹是該船實係沉失等情到臣除一面確查九號船隻兵丁有無飄存島嶴或全被淹溺再行咨明督臣程元章查核會題并將淹斃功加及各兵眷口量加撫恤外事關海洋颶風損壞兵船合先具摺奏報伏乞皇上睿鑒謹奏汝之統屬內有此災異亟當懴過省愆必汝居心行事不公不誠所以招致咎徵也慎之毋忽雍正十一年十二月初一日浙江提督臣萬際瑞謹奏為欽遵聖訓恭繳硃批事雍正十一年九月初八日臣標千總齎回臣奏報洋汛兵船遇颶一摺欽奉照臣屬瑞安玉環二營戰船官兵今夏遇颶雖云事出天災實由臣職未盡荷蒙天后宮禮懺三日并於寧郡城齋僧五百衆祈求風災永息外伏念臣閩海庸愚智識短淺才乏強毅今荷聖恩諄切訓諭敢不矢公矢誠以竭盡犬馬餘年力圖報效所有微臣感激蟻悃理合繕摺奏謝并將奉到硃批一併恭繳伏乞皇上睿鑒謹奏朕命汝懴過省愆者專指居心行事不公不誠如不肯訓愛兵辨偏於好惡但知獨善已身而不竭力奉公而言也將此等過愆洗滌淨盡改行易慮庶幾減贖前罪若徒恃天后宮禮懴齋僧以為能遵訓諭不特錯會朕意亦屬庸愚無識可笑之極矣似此懵懂昏昧宜乎頻招上天譴責也慎之戒之硃批諭旨卷一百五十九
