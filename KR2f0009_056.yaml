body:
  text: 欽定四庫全書硃批諭㫖卷五十六硃批伊拉齊奏摺雍正六年八月十七日福建鹽驛道臣伊拉齊謹奏竊臣一介庸愚包衣微末奉命差往閩省盤查倉庫隨復留閩辦理鹽務履任數月毫無報效本年三月內又荷聖恩特授監察御史稽察江南虧空今准福建督臣髙其倬撫臣朱綱知照令臣赴江南任事謹此繕摺恭謝天恩臣現在查造經手鹽驛道錢糧俟署道李治國到省交代清楚即日束裝前往江南任事但江南通省地方遼濶錢糧重大不比他省即蘇松等府不減福建全省至歷年倉庫錢糧虧空甚多實關緊要而臣才具庸劣智識淺薄非䝉皇上面諭教導指示方略誠恐稽察不到有負皇恩謹擬到江南之日就近星馳赴闕恭請聖訓臣未敢擅便理合奏聞謹奏不必來京仍遵循赴閩時所奉訓㫖勉竭公誠諸凡一無欺隱瞻顧勿過於苛刻何任不勝何事不可辦理勉力為之將包衣無恥賤習須洗滌淨盡將來可望成人也雍正六年十二月十二日監察御史臣伊拉齊謹奏為恭繳硃批事雍正六年十月十八日臣家人自京齎到御批奏摺一件臣跪捧開讀伏見煌煌宸翰訓飭周詳竊念臣庸謭下材濫叨重任惟有祗遵聖訓勉竭公誠凡欺隱瞻顧之私暨下賤無恥之習自當盡情洗滌至於稽查事件除應行事宜之外不敢苛刻務期仰體皇仁以圗少報天恩之髙厚於萬一耳所有奉到硃批奏摺理合恭繳謹奏朕觀爾立心甚好材質亦佳努力加勉勿移初志日後可成大器舉凡地方民情吏治隨處留心學習以備將來之用可也同日又奏為請給印信事竊臣奉㫖稽察江南錢糧事務雖㑹同督撫巡察辦理但所到各府州縣地方日行一切文移批詳告示等項事件頗多若無印信以白文往來勢必呼應不靈且恐姦胥舞弊抽换干係匪輕臣查浙江清查官性桂給有部頒印信事同一例仰懇皇上恩准敕部照例頒給庶弊端可杜而辦理公事亦不致遲誤矣為此繕摺請㫖伏乞皇上睿鑒施行謹奏該部照所請頒給印信同日又奏為奏聞事竊臣荷䝉皇上天恩授以監察御史稽查江南虧空事務臣於閩省聞命之下恭設香案望闕叩頭謝恩兹於十一月十三日抵江南蘇州府隨與署督臣范時繹署撫臣尹繼善御史臣戴音保原任撫臣陳時夏公同㑹議查江蘇本省虧空共銀二百六十餘萬兩贓罰銀共二十五萬餘兩米穀等項共三十餘萬石更有外省咨追二百餘案臣等一面行查原籍一面搜查本省虧空之任所外省咨追之本籍有無寄頓隱匿但歷年久逺參員或將資産寄頓他處若不向本人嚴審究追終於虧空無補又恐承追各官既經狥隱失察於先勢必回護掩飾於後應派委幹員公同州縣嚴審務將隱匿寄頓資財産業及上司勒索等項盡行審出按數追補仍通行各州縣出示曉諭凡有寄頓虧空人員之財産及虧空人員之子孫家人㩦資潛匿在境者俱令據實首報免罪如不行首報者續經發覺嚴加治罪容留失察之地方官一併參處或從前有將虧空人員縱放回籍者一面查明縱放之州縣題參一面嚴提本人究審如現在雖有可審之犯其原籍尚有應行質審之的屬亦一併嚴提審追或原係本官虧空從前買囑吏役代為擔承者一面將吏役之家産查追其不敷之數仍提本人追補或原非本任虧空當時被上司抑勒接受交代查明果有確據行提原虧空之員及抑勒之上司來蘇質審其各案內有原招審報民缺抵補一項應令委員㑹同州縣確查如係實缺在民者照數徵補其有揑稱民缺者仍著落本人賠補再查各案虧空官役從前有開報人亡産絶者應令一體確查嚴究如有假捏情弊據實揭報嚴追完補如實在無可著追必取具原籍任所印甘各結兩省督撫核實保題方准另議至於江省民缺自康熙五十一年至雍正元年巳題明分年帶徵外其自雍正二年至六年封印止未完銀兩是否實缺在民并倉庫錢糧有無虧空其在任日久者自應調查其到任未久巳經出結者委員盤查其新任尚未出結者委員協查有侵欺者即時嚴參追究因公那移者即時追抵倘有遷延題參追補倉穀黴爛者即行題參買補捏稱民缺者亦即時嚴參追究但審理虧空清查倉庫必需多員伏乞皇上於候補之府㕔州縣內揀選二三十員命其來蘇以便分委再督撫臣以本省因公罣誤各員內有幹練之員仰懇皇恩准暫留江省委查於事有益再本省之佐雜教職內亦有明敏之員挑選數十人跟隨委用仍責該管府州監理稽察并恐府州或護庇屬員應派委奉命來蘇之知府同知等官協同該府辦理將已參之虧空逐一行提覆審現在行查之倉庫不時親往查察但地方遼濶案件繁多臣等今擬分頭督催辦理仍公同酌議舉行再本省移咨外省行查一切虧空案件往往經年不覆并請敕部議定限期咨覆庶不致懸案不結再現任之各州縣此番如能將虧空人等一切隱匿財産全數查出免其從前失察之咎倘仍瞻狥怠惰不能秉公審查及委員并佐雜教職等官舞弊玩法一併題參分别議處如有通同隱匿後經查出者豫以議處仍令分賠所有臣等㑹議事宜除合詞具題外先行繕摺奏聞謹奏江蘇積缺有㫖另頒汝協同諸臣竭力辦理務令徹底清晰以仰副委任至於各官虧項尤當秉公破面逐案嚴查絲毫毋得瞻顧勉之勉之雍正七年二月十一日監察御史臣伊拉齊謹奏為奏聞事竊臣奉㫖命往江南㑹同督撫稽察虧空事務臣於上年十二月內與督撫諸臣正在㑹議下江事宜間准安徽撫臣魏廷珍咨文訂期於新正後齊集江寧府㑹議上江事務臣即於本年正月十四日抵江寧府與署督臣范時繹撫臣魏廷珍御史臣戴音保公同㑹議查得安徽各屬虧空案內除無著之勞心吾等各案經撫臣魏廷珍題明在於歷任承追督催狥隱失察各官名下追賠外其餘各案共銀二十餘萬兩米穀等項共七萬餘石又贓罰銀共二萬六千餘兩并外省咨追等項共四十餘案查此虧空未完各案其中或因原籍尚有隱匿的屬産業或由任所預將資財寄頓他處是以虧項終懸無補請再咨行原籍地方官將該犯隱匿財産的屬嚴查追變果係無屬無産出具印甘各結存查如係揑結一經發覺即將原籍揑結之官㑹疏題參其應追之本犯及的屬人等應再委員公同查審務將藏匿資産以及上司勒索等項悉行究出如有上司抑勒交代即提原虧之員并抑勒之上司質審如係假揑加倍治罪其各案內有民缺抵補一項均應確查如係實缺在民未經蠲免者取結徵補如係侵那揑作民缺即將本犯監追完補如力不能完即著落承審出結之官并該上司賠補仍通行本省併咨行外省各原籍以及咨追之任所凡有寄頓虧空人員財産及虧空人員之子孫家人㩦資潛匿在境者准其自首免罪如仍隱匿一經查實嚴加治罪該地方官一并參處其現在州縣倉庫即著派委審追虧空之員盤查如有虧空分别侵那報參再安徽舊缺錢糧自康熙五十五年至雍正三年巳經安慶撫臣魏廷珍題明定限清查現在未完丁地銀一十四萬七千六百餘兩米豆折色等項并米豆計銀二萬九千一百餘兩其已查清者又經將州縣各員題調錯綜清查尚未清查者俟查清再請錯綜調查外惟雍正四五六年錢糧又有民缺未經清查應請行令委員督同州縣清查如有官役虧蝕揑作民缺者即便詳報題參究追但事務紛繁必須多員分任伏乞皇上敕部於候補同知通判州縣等官內揀選十員命其來南以便派委辦理仍選擇本省之佐雜教職派委跟隨清查臣等亦各分地方辦理其一切事件仍公同會議舉行除㑹疏具題外臣謹將㑹議緣由繕摺奏聞謹奏覽奏巳悉㑹題到日有㫖雍正七年六月十一日監察御史臣伊拉齊謹奏為恭繳硃批事竊臣家人於本年四月初二日齎回硃批奏摺到臣當即恭設香案跪捧開讀畢隨即敬謹收貯今將臣在蘇所聞所見地方各官積習並民缺官虧情弊以及臣之下情分析繕摺奏聞外所有奉到硃批奏摺理合一併恭繳伏乞皇上睿鑒謹奏汝所奏數摺朕悉嘉悅覽之如此居心任事殊為不負朕恩將來可以光耀汝之祖考勉之清查一事朕於他處亦有所聞未得如此詳細因思既有種種情弊餘人且置不論尹繼善伊拉齊豈有不行奏聞之理正爾疑慮此奏至矣朕自有㫖另行頒發但汝當極加謹密勿令人知係汝所奏方為善於韜藏至於外省風習非輦轂之下可比諸凡慎重相機酌宜而行備將情形密奏以聞可耳朕意原不專為錢糧起見切勿汲汲以徵收為務將一切積弊徹底清釐水落石出令貪官姦吏不致漏網以戒將來斯為最要不可錯㑹朕意竭力勉為之雍正七年閏七月初四日監察御史臣伊拉齊謹奏為恭繳硃批事雍正七年七月二十一日臣家人自京齎到硃批奏摺一件臣跪接捧讀仰見皇上至聖至明察吏安民之至意臣自當著實謹密不敢使有一人知覺凡事務必據實陳奏荷䝉皇上教誨諄諄臣銘心刻骨不敢少忽諸務自必相機酌宜慎重而行以期稍報髙厚於萬一臣伏見皇上勵精圗治整飭官方何等諄切而官員內尚有狥私朦混者臣前次是以不敢不據實陳奏但外省官吏以認真辦事據實說話者為刻薄以含混容隱聽信情面者為寬厚此實容姦長惡之陋習總緣漢人非親即友或係同年門生世交等類不免有瞻顧狥情狼狽相依之私即如部文係七月十八日到蘇而趙向奎於七月初十日差人往吳江縣將徐永祐飛調回蘇在布政司衙門內密相計議次日即有人傳說布政使被總督參了之語可知伊等頗有手眼早得信息此二人居官實非正道再外省習氣臣得見天顔自當而奏謹將奉到硃批奏摺一件恭繳謹奏外省習氣與地方各種情形皆朕素所悉知何待汝之面奏即都中以及大內不如是乎且恐更有甚焉者此朕所以朝乾夕惕孜孜不巳而極力整飭也不然朕豈肯自苦乃爾朕奉天承運臨御萬方既知之真不得不行之力但移風易俗非剋期望效之事只可竭盡心思耳目以次第治理之耳若浙江河南雲南三省此等情形朕可保漸臻恥格督撫不得其人如命拙匠運斤寧成巧物餘省大抵皆然朕亦無如之何豈能時時訓飭事事繩正耶實有鞭長莫及之虞總仰祈上天多錫公忠誠恪臣宰布列直省承宣德意彰善疸惡庶幾可望化行俗美人情丕變也不得其人奈何奈何同日又奏為奏聞事竊臣伏見沿海居民性多愚悍雖州縣官不時勸勉嚴加禁飭猶有忿爭之事若地方官遇有公出則此輩鬬毆生事益無忌憚臣聞得崇明縣知縣祖秉震奉上司牌調前赴江寧審理案件經有兩三月告假回縣適奉通行勸導富户當存濟人利物之心行救困扶危之事上諭一道該縣遵奉曉諭後復往江寧辦理未完案件又崇明縣縣丞典史俱被參離任並無文官在縣管事時值七月間遂有刁民棍徒一二十人或二三十人成羣者數起乘隙索借富户銀米而富户內有給銀數兩或給米數斗而散去者亦有未給銀米好言勸慰而散去者總兵官林秀差辨目諭令解散而蘇松巡道王澄慧亦前往查禁將生事數人責處示警地方已經安靜崇明縣知縣祖秉震於七月二十六日過蘇回本縣去訖臣前在福建聞得雍正三年厦門水師提督並標營俱進京陛見海防同知亦因公上省遂有郭興等乘隙生事一案可見邊海之地最為緊要不可無官彈壓理合奏聞謹奏此事朕已聞之但似此不法生事棍徒地方官如是薄懲外結必另有意見留心密行體訪奏知同日又奏為奏聞事竊蘇州府為鼓鑄錢文將閶門內舊火藥局改為錢局因將蘇州府城內之長洲縣地方結草菴設為新火藥局今新局內於閏七月初四日申時有工人十六名在內用鐵杵石臼舂合火藥激出火星將藥烘著灹毁合對火藥房三間其十六人俱被烘傷內已斃二人至四面居民房屋及長洲縣設立攢造民缺冊之處俱未傷損再臣在福建時聞得三十年前火藥局內有前朝地下埋藏火藥人俱不知忽然灹開傷損多人今蘇州之舊火藥局內有無火藥埋藏在地均不可知改設錢局似覺未便理合奏聞謹奏此事言之於該撫藩尹繼善髙斌令伊等詳細斟酌可也同日又奏為奏聞事竊臣已經㑹同題准分查徽寧廣三府州又准督臣范時繹分委開復原任鳳陽道李天祥一員並協查之陳齊東張鳴鐸髙代等三員分查兩府一州十三縣臣查上江一省虧缺錢糧案件不及下江十分之一至徽寧二府虧缺錢糧案件則倍於上江之他府自蘇至徽相隔千里鋪遞文移往來動經四十餘日務要親身坐守督催稽查始能不被欺朦但下江清查民缺實關緊要屢䝉皇上諭㫖命臣協同辦理今臣往徽寧廣三處稽查勢必耽延時日恐下江事體不即得知亦猶臣在下江不能知上江之事也況此清查民缺查追虧空不此他事今臣兼顧不過憑文書移知恐有顧此失彼之虞現今下江命有諸臣料理俟工部侍郎臣馬爾泰等到蘇之日㑹議事畢臣即往徽寧等處督催辦理得專責成至查清之後復往下江協同辦理理合奏聞謹奏下江事乃固屬緊要然辦理者尚有其人上江雖云事簡魏廷珍甚不足恃恐難就緒且下江繁劇非數月間即可清結莫若先將上江各件催趲完畢然後回蘇接辦亦不為遲但目今馬爾泰初到諸凡未諳可將地方一切情形詳細說明再赴徽寧等處稽查可也同日又奏為禁米出洋事竊臣伏讀諭㫖聞得近海地方偷運米石出海之弊尚未盡除亦交與清查之員一并嚴查毋得踈漏欽此臣巳經與督撫臣㑹銜行文嚴飭沿海文武各員嚴禁稽查在案今經半載只據文武官辨按月出具並無偷運米石出洋之印結報查竟無一處盤獲臣不時體訪聞得向年原有無賴小民將內地米石私載小船偷渡出界發賣希圗重價因有沿海地方居住之西洋人收買載入大船出洋蓋小民偷運人數無多夜行晝伏辨兵不及覺察此往日所有之弊近日查禁甚嚴姦民不敢整船裝米偷渡惟有窮苦漁户以船為家或指稱食米多買些須零星賣與洋船之人則亦難保必無聞得松江府城天主堂內有西洋人名畢登榮莫滿二人居住託言養病時或出門拜客地方士民多有歸其教者揆此西洋人常有貿易船隻往返走洋恐有偷賣米石之弊又聞得各省尚有潛藏居住之西洋人不獨煽惑地方愚民且有讀書生監而入西洋教者實無益於中國而有損於政教仰懇皇上再飭行江南督撫令各府州縣細查如有潛住之西洋人盡行報出作何遞送回澳之處一面料理一面奏明如無亦令各府州縣出具印結報部存案倘日後發覺或被查首按例治罪仍通行各省督撫一體遵查不惟黜異端以崇正學亦可杜偷運米石出海之弊也伏祈睿鑒施行謹奏地方上如有西洋人潛藏居住自應遵查巳命大學士等傳諭各督撫矣雍正七年九月十五日監察御史臣伊拉齊謹奏為貪官難容漏網事竊臣查革職知府徐永祐倚勢狥私朋比為姦且其為人姦貪巧詐善於鑽營伊在吳江縣任內貪婪無厭聲名不堪縱容家人陸康侯在外招搖攬事多方取利地方商人百姓往往受害聞伊主僕頗有積蓄資財買賣營運悉係吳江一任婪取致富至所虧米石併那移銀兩費用無多容易完項此等貪官若使漏網誠恐他官效尤今查吳淞江等處估計修建閘工江南沿路塘汛兵房亟宜修整併震澤吳江兩岸塘路坍塌皆應修葺無論何處工程莫不動用國帑現今有此貪墨之員除應行治罪外仍令幫修以為狥私不法叨餮者戒庶使有司咸知警惕矣是否有當伏祈皇上聖鑒謹奏懲貪示警實屬應當與尹繼善酌商㑹奏可也同日又奏為奏聞事竊臣奉命清查江南民缺訪知弊竇多端奈官侵吏蝕並無自首而紳襟完糧亦寥寥無幾明係官吏互相遮飾朦混荷䝉皇上特頒諭㫖差馬爾泰等來蘇料理巳於閏七月初五日抵蘇馬爾泰彭維新安修德同臣先各將上諭遍示通省鄉城宣布皇仁為民清纍至意使家喻户曉每有應行諸事臣等必公同商酌辦理臣每見各官惟勉其實心辦事不可欺朦當面誡飭不留情面江南官吏雖因循延挨而蘇松常太四府州漸知警懼種種弊端次第顯露巳經首出及查出者甚多其分查常州府之糧道馮景夏辦事細心因無錫縣區書李銘儒侵蝕銀兩甚多責令呈出私收底簿時有李銘儒雇倩書算之民人楊士玉者將李銘儒經管之天上一區私收十五年底簿二百餘本盡行首出馮景夏將私簿連人一併差送到蘇臣親與楊士玉查對兩日始知此種簿內所開花户姓名田地額糧及每年完缺數目俱皆詳悉其所侵蝕以完作缺飛灑花分詭户詭名各有私記暗號只須一指則種種弊竇無不顯露臣隨問楊士玉别區有無此簿伊稱不惟無錫一縣十五區俱有即各府州縣無不有此底簿但名色各别記號亦不一若無此底簿難以作弊等語臣隨同馬爾泰等嚴行通飭各府州縣務將此種底簿搜查詳報去後今蘇松常三府屬各種底簿業巳搜查到案其别府漸次可得但須印協各官盡心盡力逐名磨對細查則侵蝕諸弊俱不能隱蔽矣再各府州縣截至八月有情願完納舊缺錢糧共收銀一十萬九千八百餘兩各解司庫有紳襟大户自認開出舊缺錢糧共銀四十萬五千一百餘兩此項多係有力之家陸續可以清還又有官役人等自首侵蝕之錢糧共銀一百八十九萬一千八百餘兩另須確核臣謹將各府屬所首侵蝕併巳完銀兩另繕一摺恭呈皇上睿鑒至查審一案將完俟另行㑹疏具題外臣再將下江諸事同馬爾泰細商妥協擬於十月初旬即起身前往上江徽寧等處清查辦理為此奏聞謹奏汝等此畨清查積缺但當以剔除錮弊為要不可專以徵收錢糧為務倘或錯㑹朕意立心卑鄙朕一畨善政翻成笑具殊為可惜一切稽查雖不得不嚴然須容其改悔自新巳往者概從寬宥為是若一味苛刻從事則勢必難行抑且案牘不勝其繁矣凡百過猶不及古人云小飯防噎跬行虞跌慎毋任意吹求也將此諭亦密令馬爾泰知之雍正七年十二月初二日監察御史臣伊拉齊謹奏為恭繳硃批事本年十一月初二日臣在上江寧國府有家人自京齎到硃批奏摺臣跪捧開讀伏見聖諭嚴切訓飭周詳又䝉諭㫖著將此諭亦密令馬爾泰知之欽此臣隨即恭録敬謹封固差人齎送馬爾泰密令得知矣竊照下江清查一案臣自知徵糧有誤清查政事此實立志卑鄙不能仰體皇上清除積弊惠飬元元至意再凡百稽查不應過於苛刻當仰副聖心澄清吏治容其改過自新臣愚蠢無知聞命之下曷勝愧悔感激之至此番清查臣等實屬過嚴今奉恩㫖江蘇紳襟士庶無不歡騰益加頂戴皇仁至於令官户富户分派攤賠又將帶徵錢糧加增火耗實無其事難逃聖明鑒察臣嗣後惟有欽遵皇上教導斷不敢過於刻核有誤政治謹將奉到硃批奏摺恭繳謹奏所以云小人可小知而不可大受大抵小人之情態凡所見所行惟一小字而巳不然何以稱之為小人耶向後亟當務一大字謹志勿忘同日又奏為請復設道員以重地方事竊照上江所屬之徽寧二府廣德一州地方遼濶僻處深山所屬官吏之賢否民情之良頑督撫相隔窵逺耳目難周是以歷年逋缺錢糧積至數十萬兩兼之虧空案件較他郡倍多兹臣恭承欽命清查自當秉公辦理不敢瞻顧因循第恐清查之後若無大員就近督飭時加稽查保無不肖有司復蹈故轍之虞查徽寧等府從前設有巡道一員於康熙二十一年裁缺今應復行設立俾駐劄寧國府城管轄二府一州以稽察屬員彈壓地方仍令於歲底盤查倉庫錢糧具結報部存查庶所屬官吏知警而於民情風化亦大有所裨益矣是否應行伏乞皇上睿鑒謹奏地方添設道員此事當與督撫言之同日又奏為奏聞事竊臣於十月初八日自蘇州府起身先到上江廣德次至寧國以及徽州府凡經過府州縣地方臣必親往州縣倉庫驗明徵存銀兩隨飭起解司庫不許存留滋弊貯倉米榖逐厫開看成色飭令加謹收貯以免黴爛之虞查徽寧廣兩府一州十三縣准上江藩司造送雍正四五六年分未完民缺錢糧冊內共開有一十六萬八千餘兩查此錢糧原非停徵帶徵可比若不徵收必成積缺且今歲巳獲豐收紳襟士庶咸知踴躍急公完納並查出衙役經催侵蝕銀兩隨即勒令照數全完至十一月初十日巳完銀一十六萬有零再查徽寧廣三府州虧空案件有將資財藏匿别處田房詭寄他所前巳出示開導曉諭令其自首免罪在案臣到境之日又復出示諄切曉諭並嚴督分查開復原任鳳陽道李天祥帶同協查官逐縣實力查追上江外省咨追本省虧空共有一百餘案臣分府辦理亦有四十餘案據李天祥並協查之陳齊東等巳經查明追完帑項者十有五案其餘案件有外省咨追雖年深月久可以著追完項者居多現今督催嚴追陸續完解至於本省之案實因歷年各官不上緊查追從前虧員原有産業至今花費巳盡並的屬無存內中或有一二的屬者皆係貧窮分釐不能完補不過監禁而巳今臣細查各年案卷其中如有瞻狥賄縱情弊自應著落分賠若本省實在無著又無情弊自應咨行原籍查追完項如果兩省皆係人亡産絶無可著追方敢取結據實㑹核請㫖其現在徽寧廣所屬各州縣倉庫錢糧俟民缺巳清虧案就緒再行盤查自難掩飾至於上江别府州縣錢糧事務俯容臣查有頭緒自當次第具奏合將現今清查徽寧緣由繕摺奏聞謹奏遇有應行具題案件照例㑹疏題奏雍正八年三月二十六日監察御史臣伊拉齊謹奏為請均積貯以廣皇仁事竊查地方積穀原分州縣之大小以定存貯之多寡誠屬均平但各州縣産米多寡舟運難易各有不同則積貯所關似亦不無輕重之别如廣産米穀舟運易達之鄉固應積貯其産米甚少舟運難通之處更宜多貯查上江通省存貯各案穀石並米易穀約共三十萬石業經分貯各府州縣惟徽州一府除婺源縣有榖一千一百餘石外其餘五縣皆無積貯且境內山多田少户口蕃庶一年收穫不敷半載之食惟仰給浙江江西等處商販之米兼之溪河狹淺舟運艱難倘遇公禁私遏旬日米船不至則貧民枵腹以待即今正值豐收之年别府米價每石不過六七錢或八九錢不等而徽屬米價仍是一兩四錢一石如遇青黃不接之時米價更屬昂貴似此産米甚少舟運難通宜於多貯之處竟無積貯似屬偏枯查徽郡需米萬石始敷積貯但本地無處採買仰請皇上敕下督撫酌量可以少貯之處將易穀之米價銀兩照一萬石之數撥出遴員承領於秋成之後米賤之處儘數採買新米運徽積貯其建倉運費等銀請著督撫動用公項辦理至於新收米石照例於青黃不接之時糶賣三分秋收買補如此則積貯均平而徽民於青黃不接之時無米貴之苦或遇歉收之年亦有賑救之資均沐皇恩於靡涯矣是否可行伏乞皇上睿鑒施行謹奏與撫臣尹繼善言之令伊酌量而行雍正八年五月十一日稽察江南虧空兼理清查事務新授江西布政使臣伊拉齊謹奏為恭謝天恩事本年五月初五日接准江蘇撫臣咨稱准吏部咨開雍正八年三月二十六日奉㫖江西布政使員缺著伊拉齊補授伊拉齊現有辦理清查事務俟事竣再赴新任等因欽此轉行到臣隨恭設香案九叩謝恩伏念臣本駑鈍之材又未練達吏治一旦膺斯重寄自知不能勝任貽誤地方實非細事且臣出京巳歷數載犬馬戀主之心日積日切仰懇聖明垂念地方為重矜全愚昧將江西布政使員缺另簡能員補授容臣公同諸臣協辦清查事竣赴京得以瞻仰天顔跪聆聖訓并懇皇恩令臣以旗員行走或賞臣軍前一差以盡臣報效愚誠實臣之至願也為此繕摺恭謝天恩并陳下悃伏祈聖鑒謹奏清查事畢來京聆朕訓㫖然後往赴江西新任雍正八年十一月二十七日署理兩淮鹽政印務江西布政使臣伊拉齊謹奏為奏報已酉一綱經解腳費節省銀兩事竊臣奉㫖署理兩淮鹽課事務今己酉一綱并帶行戊申一分引鹽所有經解腳費銀兩據運使范廷謀册報共收銀九萬六千一兩零又起解丁未等綱課銀餘存水腳及解官繳回餘平共銀四千九百三十六兩零二共銀十萬九百三十七兩零內除公事支用解餉水腳飯食騾腳揚城土稅塘兵工食幫貼庶吉士賑濟被水竈户等項共銀四萬四千三百二十一兩零及運使應分銀二萬六千五百六十一兩零外應餘銀三萬五十三兩零內前鹽臣噶爾泰支用盤費銀一萬二千兩奏報節省銀一萬六百七兩零臣支用盤費銀四千兩餘存節省銀三千四百四十五兩零臣又查得淮南匣費內有應用平紋亦有應用折色及淮北挑河築壩項下仍有餘存查此挑河築壩餘剩銀兩應作節省其餘平餘色項下除應支用外所剩銀兩亦應節省此二項共節省銀一萬兩連前項共節省銀一萬三千四百四十五兩零再查巡鹽御史衙門書工承差各役等費一年例有節省銀二萬三千三百二十一兩零再奉部文減去東司銀九千二十兩今己酉綱此二項銀兩巳經前鹽臣噶爾泰奏報在案以上己酉一綱通共節省銀五萬六千三百九十五兩零除飭令運使收貯在庫聽候撥解并報明户部查核外理合奏明伏乞皇上睿鑒施行謹奏覽奏知道了萬不可較量錙銖以苛刻為能若不擺脫包衣下賤習氣終不免器小之疵雍正九年八月十九日署理兩淮鹽政印務江西布政使臣伊拉齊謹奏為除引封之纍以便商運事竊臣荷䝉皇恩署理兩淮鹽務惟以恤商裕課力除陋弊為念今查得揚州府屬之儀徵縣因淮南商人行鹽引目用該縣印信釘封各商每引舊例繳送引費銀三釐此項銀兩巳在前督臣范時繹奏報歸公之內臣聞得該縣於商人歸公三釐引費之外又每引收銀二釐名為飯食之需臣隨傳商人面詢據淮商黃光德等稟稱辦運引鹽抵所掣摯捆運江廣例將引目照報册若干填注數目加以釘封投儀徵縣鈐印放行因引鹽入船全在早赴口岸以便轉運行銷誠恐封引稽遲船不能開是以於印封時每引給費三釐以免稽延逮三釐之費業巳歸公而封引仍由該縣又恐仍至稽遲故於歸公之外另給二釐等語臣查儀徵縣封引起於明初向因揚商辦課運鹽至儀徵掣摯後各有江廣水客來儀撥去轉售故捆鹽過船之時水客復將引目填數投縣查驗鈐印放行蓋當日因鹽政衙門駐劄揚州例委鹽運司掣摯亦未定有鹽政衙門印給桅封稽運之法故由儀徵縣封印以備沿途查察遂致商人有不得不與之勢今久無水商買運揚商各自雇船運赴江廣等處銷售運使久奉裁汰俱係鹽臣在於儀徵縣掣鹽衙門親掣驗發桅封用印鈐蓋是儀徵縣之封引實為無益之具文嗣後若免其赴縣請印則此項陋規不禁自止商運可免阻滯課餉亦無遲誤矣是否有當出自聖恩臣未敢擅便伏乞皇上睿鑒施行謹奏此奏是交該部議覆有㫖雍正九年十月初十日署理兩淮鹽政印務江西布政使臣伊拉齊謹奏為恭繳硃批仰懇恩准赴京敬聆聖訓事竊臣於上年五月十一日恭謝天恩摺內奉皇上硃批清查事畢來京聆朕訓㫖然後往赴江西新任欽此欽遵巳逾一載今上下兩江清查各案俱巳查完現今核造清册少需時日約於十月內均可具題報竣但清查諸臣回京之日臣即當一同進京叩瞻天顔因臣又奉恩命署理兩淮鹽政印務查鹽政例有奏銷考核二限容臣於十一月內具題後即便星馳赴闕跪覲天顔恭聆聖訓伏懇皇上俞允則臣在外五載依戀愚誠得以稍伸臣無任瞻天仰聖待命之至所有原奉硃批一併恭繳謹奏似汝忘本負恩剛愎自用之輩即來見朕亦有何可訓誨汝處不必來京候另有㫖硃批諭㫖卷五十六
