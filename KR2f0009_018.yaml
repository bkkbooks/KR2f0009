body:
  text: 欽定四庫全書硃批諭旨卷十八硃批王璣奏摺江南江常鎮道臣王璣謹奏為請免河工舊缺以清塵案以廣皇仁事伏查康熙四十年河臣張鵬翮所題各員缺帑共九十餘萬兩內有未領帑銀而開入者有巳做工程而不算者有奉文發帑印據煌煌領去而不准開銷者有已辦料物不收以致朽爛而指為缺帑者天高莫訴飲泣含寃此臣於本年四月間赴淮揚查勘淮安山陽宿桃等處水淹荒地詢訪河工利弊得悉其詳蓋自河臣參奏迄今二十三年追呼𫾣撲瘐死囹圄逃亡過半纍及子孫難以枚舉稽之冊檔完納寥寥雖其中亦有未做工程未辦料物者乃其自作之孽夫復何辭然不過十之二三耳其他做過工程日久塌卸或辦過料物年逺朽爛槩令追賠情實堪憫自有追賠之案其間借帑扳害殃及無辜又不知凡幾雖有追比之名終無完補之實故河臣趙世顯有開例補還缺額之請業奉聖祖仁皇帝俞旨允行在案今河工捐例巳溢缺數可否特恩敕令河臣確查分别豁免俾困纍人員得有更生之日不致沉淪瘐斃以彰聖朝寬大洪仁永歌萬壽無疆矣謹奏朕巳洞悉此事不待爾奏亦非爾小臣所當冒昧陳奏者其中情理朕無暇瑣瑣僃諭爾知江南江常鎮道臣王璣謹奏為清查僧寺以靖姦盜事竊臣伏查會典僧尼必以度牒為照今無藝游食之徒每借出家為名擅自投師披剃其師又罔究來歷不查素行一入菴寺坐食逍遙其中戒律精嚴勤心經典者不過十中一二至如無藉匪類借此潛蹤或因犯事懼法逃身託跡藏垢納汚莫可考詰者所在皆有臣於八月間署理臬篆審訊姦盜等案往往强人聚集多在寺院間有僧人同夥行劫他如因姦致命流毒地方尤難枚舉近閲邸抄撫逺大將軍所題天威逺振西海蕩平善後十三條口外喇嘛尚請給以度牒以查姦宄則內地僧人豈容私自披剃似應仍敕禮部頒發度牒於直省藩司通行府州縣查明各寺菴觀僧尼概令輸請度牒如無度牒者即令還俗嗣後凡情願出家之人查明合例許其披剃即令赴司請領度牒填明年貌籍貫并取識認保結每給度牒一張有力者輸銀十兩無力者輸銀五兩總歸藩庫年底彚解充餉其尼僧年過三十者方許照僧人一例查明請給度牒准豫削髮焚修其府州縣鄉鎮一切寺廟菴觀但准修理不許蓋造恐勞民力復損民財也如有違犯照律治罪倘蒙俞允敕部通行直省實力遵行一年之內上可為國家增數百萬之餉下可清釐姦盜之源矣謹奏所奏斷不可行殊屬書生習氣釋教相沿已久止可將其中犯法為非者隨事處分而已若竟欲排斥無遺以沽道學之名則禍不旋踵矣此等分外多事之想皆可不必反誤爾本任內之責况從古亂臣賊子中未嘗無讀書人豈可因此而遂憾及孔孟乎爾謬矣户部左侍郎臣王璣謹奏為奏聞事臣蒙聖恩豫假歸里巳於八月十八日出京南下閲歷州縣知各處雨暘時若咸慶有秋第有一二處所稍受水患如山東之德州禹城江南之宿桃清河等縣所屬低窪之地被水少减分數即南北大路亦恆多水浸每須繞道而行揆厥所由大道兩傍溝洫不通以致雨水無歸間有溝渠在傍者又皆葑泥壅塞倘得開濬深廣水由地行即以所起之土填高中道不特田疇永保收穫即行旅往來皆得經由坦道不揣冒昧具摺瀆陳伏祈睿鑒至臣雖奉旨歸里而依戀日深今巳於九月十五日舟抵嘉禾惟候特賜臣母封典到日即當迅速將臣母身後沾榮諸事辦完銷假赴闕謝恩合將臣歸里日期先行繕摺陳明謹奏覽東省通京大路朕向欲修理候另降諭旨施行總理清查江蘇各屬錢糧户部左侍郎署理蘇州巡撫印務臣王璣吏部右侍郎臣彭維新謹奏為奏明請旨以便清查事竊臣璣接印受事日期已經循例題報今臣維新於三月十六日到蘇其分查大員尚未到齊臣等會同酌計派查地方約需六十餘員方足分任俟分查大員續到公議各舉所知并於雜職人員內遴委派用再行奏聞但清查全憑欵冊臣等現在飭催各屬攢造清冊會核隨據司道會議詳稱奉旨以康熙五十一年起至雍正四年未完地丁錢糧八百一十三萬八千餘兩一槩暫停徵比以待清查惟是江蘇各屬地丁漕項等銀向例一條編徵輸民間不分欵項完納今停徵符額之外尚有蘇松江安二糧道冊報未完節年均徵之漕項屯折錢糧及雍正二三四年未完存留俸工扛腳漕項雜辦歲夫等銀共二百八十一萬七千五百三十兩零不在奉旨停徵額數之內其中各年有無徵存續解現在清釐等語查此漕項等銀在官原係分欵起解在民實係一總輸納若不據實奏明請旨一併停徵則漕項等銀仍在催科之列清查之際小民恐難周知而胥吏亦易滋弊臣等未敢擅便謹會同合詞請旨可否將此漕項等銀並敕暫行停徵俾得畫一清查統俟清查告竣容臣等仍將先後停徵二項分析繕冊進呈睿覽謹奏所奏甚是此乃前諭之疏略處隨另有旨諭部行知户部左侍郎署理蘇州巡撫印務臣王璣謹奏為密奏事竊臣據蘇州營遊擊賀喜臣標中軍遊擊武進升密禀三月二十四日據兵丁顧鶴首稱管隊孫起龍告知有顧忠思糾伊入夥為匪等情臣隨密諭蘇州知府會同獲犯查訊據孫起龍供於上年十二月間因兵丁雷彩文即張寶併開茶館之崇明王四及忠思之姨甥王連王二在顧忠思家喫飯忠思囑尋好漢一二十人要在蘇州將來圖大事小的見其狀似癡顛置之不理今年二月遇見又說此話故此害怕出首及訊顧忠思供因妻病愈酬神有姨甥王連王二來望隨留散福適王四張寶孫起龍相繼而至亦留酒飯原說結拜兄弟有事可以共相保護等語取供禀覆到臣臣復親提密鞫忠思狀貌愚蠢不堪王連王二又皆年幼細加窮詰并在其所居室內遍搜毫無為匪形跡可據除現在再加究審務得確情另奏外理合先具密摺奏聞謹奏雖無為匪形跡其為匪人也必矣以愚蠢年幼二語開脫之可乎當嚴加究處不可仍留本土其賀喜武進升等若不加以奬借而露不豫之色或以多事責之則非以寧謐封疆居心者也地方上偶有此等舉動即時發覺乃極好之事愼毋因其小而忽略之户部左侍郎署理蘇州巡撫印務臣王璣謹奏為恭報二麥茂盛情形仰慰聖懷事竊臣自出都以來經過直隸山東一路二麥方始出土及入江南之境即見麥苖盛發業巳青葱遍野抵任之後詢知江南地方今年正月屢降瑞雪繼以晴明土膏滋潤是以麥苖之盛勝於往年通查各屬大抵皆然將來自必豐收除查明收成分數另行具奏外所有二麥茂盛情形合先具摺恭慰聖懷謹奏覽奏麥苖情形實慰朕懷但當刻刻以誠敬自持必待秋成後方可釋慮愼毋預期妄擬謂將來自必豐收遂輕出諸口而肆其志惟務感召天和力行不怠庶望上蒼之垂恩佑庇也勉之總理清查江蘇各屬錢糧户部左侍郎署理蘇州巡撫印務臣王璣吏部右侍郎臣彭維新謹奏為欽奉上諭事竊照江蘇等府屬積缺錢糧特奉諭旨停徵清查復蒙天恩准包攬侵蝕之人自首免罪仍分年交納臣等仰遵訓旨刋布上諭遍貼城鄉各處所良民固知感頌聖德即從前侵漁舞弊之人亦漸生悔悟除一切清查事宜先經布政使臣趙向奎擬有規則臣等公同酌定業經通行各屬繕造確冊以僃清查外所有欽定分查大員九人俱陸續齊集蘇州祗受印信前往辦事其協查各官在部揀發者則有魏化麟楊濰祖等二十三員又李庚星徐日炯二員撫臣尹繼善保題者則有羅繼洪江之煒陳陛諴嚴接等四員臣等保出者則有孫琰王不黨二員俱准有部文知照以上共三十一員內魏化麟嚴接已經題補江隂金壇二縣江之煒已經委署嘉定縣印外實存二十八員其餘不敷之數臣等總理及分查大員并奉旨與聞之浙江督臣李衛各舉所知者復有鄭金等二十二員以上合計共有五十員內中尚有數員未到容俟到齊之日一并開列職名分析某人所舉再行繕摺恭呈御覽現在先到各員臣等即酌量派往再四嚴飭務期錢糧徹底澄清地方絲毫無擾以仰副聖主軫恤民瘼釐清積弊之至意臣等謹㑹同合詞具摺奏聞謹奏總以秉公飭委實力察核為要汝等此番事之成敗利鈍全在彼數十人委用之當與否也若少涉私狥則萬不能妥協為害於汝等者實非淺鮮於此要見透方好户部左侍郎署理蘇州巡撫印務臣王璣謹奏為戰船宜歸營修據實直陳仰祈聖主採擇事竊臣查修理戰船一事前督臣查弼納任內遵旨確議定為蘇鎮揚三總厰委令道將總理仍各遴委㕔僃分司其事而竟不歸營修者營員多以鳩工辦料呼應不靈且地處濵海物料皆非土産逺道購求盤運多費辨員亦不敷用恐誤汛守為辭臣查修船匠料原俱平價雇買小民之手藝營生與商賈之挾資貿易均之求利而已初不因文官而樂趨亦不因武職而畏阻也况油鐵各項出自江楚既不盡産蘇揚而樟杉巨材出自閩浙更以沿海運送為便惟是官辨委用必須熟籌汛守所關不容不慮因查本營之船隻即令本營之官承修則人船原未相離初無礙於汛守且專任管工自有本船捕舵其於平時操練更屬兩不相妨而採辦物料止用一員或遊或守均可經理其事今總厰之設本營將僃若令其在厰則不但飲食服用勢所必需而巡防操練實多廢缺若不令在厰則交船之際又往往嘖有煩言兼之在厰捕舵斷不能裹糧從事所以禁例雖嚴未得風清弊絶此臣蒞任江常鎮道之日總理三厰奔馳二年每以歸營之說陳於督撫而不得上請睿鑒者也再查上年九月內因東省船工貽誤奉有諭旨議定修理不堅承修督修各官處分在案第查戰船一項修理不堅自屬承修之責若管駕不愼燂洗不勤亦足以致損壞乃定例止議承修督修之文職而管駕燂洗之營員未經議及倘營員漠不關心將來遇有損壞文武互爭在所不免臣愚以為承修責之文職則營員痛癢無關承修責在營員庶船隻方知愛惜且改歸營修其便有三營辨捕舵與船相習則購買物料自必件件適用一也戰船為水師託命之所文官修理雖堅營員未能深信今歲修既身親其事若大修拆造一并責成自必倍加堅固二也文官支領錢糧承胥或有索扣今既歸營領即與兵餉一例錢糧盡歸實用三也而其間尚有至便者修船雖用工匠然在船兵目亦當素為諳曉從前因文官承修伊等多不留心今既已歸營則兵與匠習斧鑿刀鋸之事日相親近久而兵可為匠於船工更為有益是否可行仰祈聖主睿鑒指示謹奏此事汝所見甚屬淺狹前委汝一人總理三厰原屬不合今已更定矣復有何不可行處仍令文武員辨兼管為是何必又事更張如委得其人無論文員武辨皆可奏效若不得其人皆有不妥協處全在汝等選擇賢員而委用之未有互相推諉而能令公事辦集者也户部左侍郎署理蘇州巡撫印務臣王璣謹奏為恭懇聖恩事竊臣本庸材荷蒙聖主委任清查江蘇積缺錢糧旋又特奉諭旨署理巡撫印務力微任重實切悚惶查江蘇地方素稱繁劇錢糧則弊竇孔多命盜則倍於他省加以民情好訟俗尚澆漓官吏之積玩難除案牘之稽延實甚臣自維才分有限雖竭盡駑駘究竟力與心違恐於地方無補是以陛辭之日即經僃瀝下情現在遵例另疏自陳實非畏難欺飾仰懇天恩時加訓誨仍俾早卸撫篆得以專務清查瞻仰闕廷不勝犬馬依戀之至謹奏如得人豈命汝兼理撫務汝自謂不勝此任朕亦以為然但不過為期數月果盡力黽勉而竟曰不能不特虛負朕之知遇且為無用之棄材矣勉為之天下未有秉公竭誠而不能辦理之事也户部左侍郎署理蘇州巡撫印務臣王璣謹奏為密奏事竊查潼安衛地畝原係雍正五年間於桃源宿遷睢寧泗州虹縣等五州縣濵河地方新經淤出前任河臣齊蘇勒會疏題明丈報升科在案臣道經桃宿聞民間議論以前項新淤多有完糧老地在內從前未經分析不無重納之纍又聞前項地畝近水易淹今悉照成熟之地升科將來難於求豁此等浮言臣不敢信第查淮泗一帶地方原多瘠土今新淤一項實屬聖德感孚天心協應嘉惠萬民所有徵糧科則似與别項升科不同因查山陽鹽城二縣射陽湖淤地係照河租徵收每頃輸銀五錢今此項新淤每頃多至二兩有竒恐領種小民輸納不無難易之别伏惟皇上明見萬里懇將臣此摺准賜留中如荷察實加恩稍為酌减俾五州縣濵河蒼赤永慶盈寧是出聖主之𢎞慈非臣下所敢妄請者也為此謹奏此事朕正在訪察的確之際且奏者不一其人李衛亦曾面陳凡如斯等奏請民情感怨胥由於此甚有關係少不密禍即隨之矣密之愼之户部左侍郎署理蘇州巡撫印務臣王璣謹奏竊照江蘇所屬每年正雜錢糧共三百七十一萬九千餘兩共該解司耗羡三十四萬一千九百餘兩內各官養廉需銀一十八萬四千三百兩通省僃辦公事需銀一十二萬一千三百餘兩共養廉公事二項計需銀三十萬五千六百餘兩如正項錢糧全數通完約餘耗羡銀三萬六千餘兩臣等查此外尚有科場貼費閲操犒賞等類應辦公事未有一定之數者俱應隨時核實動用造報謹將提解耗羡并養廉公事需用各數逐欵開具清摺恭呈御覽伏乞聖主睿鑒謹奏覽汝所開養廉公事需費各欵內據稱學政及清查御史水利郎中等三員原冊遺漏今議增添養廉等語朕謂此乃汝等謬誤非遺漏也江南學政何須議給養廉此外二員俱係奉差暫行辦理非比守土之官豈可與地方各員一例開列即欲議給亦當在於不定公用內開銷為是至如辦解顔料貼費銀一萬一千餘兩此項朕殊不解額定官價自應綽然有餘寧須如許幫貼耶將所以然之故據實開明奏聞又如歲修江南省城銀五百兩此項尤屬不通工程不知係何員管理大修之年勢必不敷不修之年徒被乾沒焉有每年恰用五百兩之理即此數欵觀之可知汝等並未實心籌計料理也朕如何批諭當否况歷來此等奏摺朕從不代定準繩不過將不愜意處聊舉一二端示知總憑汝等斟酌妥協而行耳此時稍涉忽略或乘一時之興草率從事被後來人指摘汝等身家榮辱繫焉孰輕孰重審思熟慮秉公為之莫將公物歸於私用則輿情自平他日亦可以免遺憾矣李衛陛辭時有面諭之旨令其過蘇傳諭汝其領悉遵奉毋誤硃批諭旨卷十八
