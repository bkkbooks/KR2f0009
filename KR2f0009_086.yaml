body:
  text: 欽定四庫全書硃批諭㫖卷八十六硃批齊元輔奏摺雍正四年七月初二日廣西左江總兵官臣齊元輔謹奏為恭報微臣欽遵聖訓料理營伍以收實效事竊臣䝉皇上隆恩升授左江總兵自雍正四年四月初二日到南寧府任事以後即將臣標所屬四營馬步戰守兵丁逐一備細考驗見技勇嫺熟者固不乏人而武藝生疏者亦復不少臣即打造銀牌每逢考驗之期分别奬賞以示鼓勵仍飭行各營將辨每營弓箭藤牌單刀鳥鎗各項器械之內每項挑選教習二名朝夕教演務期一體純熟再查營中盔甲旗幟器械火炮各項頗皆鮮明而前鎮臣邊士偉製造紅船八隻分發水汛巡防臣到任之日見有損壞者俱逐一修整完固臣又現造哨船二隻派撥官兵上下游巡周而復始以固地方以衛商旅其所屬陸路汛地如有附近交夷猺獞之區臣每月輪撥千把總一員各至交界處所交旗會哨俾水陸地方靜益求靜安益求安以仰副我皇上慎重邊疆之至意再臣隨丁名糧並標營將辨隨糧以及公費糧數俱照定例并無多占總之臣身受國恩深重前於副將任內入京陛見跪聆聖訓周詳雖肝腦塗地不能仰報高深於萬一惟有以實心行實政庶幾衾影無慚可以對諸天日者即可以入告於我皇上之前也但臣所屬左江地方水陸遼濶夷土雜處凡有因革損益之處容臣陸續清查隨時會同提臣韓良輔酌量舉行應奏報者會商奏聞謹奏類斯等奏莫不皆然而行能符言者甚少如李維鈞佟世鏻許國桂馬覿伯其餘尚指不勝屈始初之奏較此更切及後敗露豈但言行不符竟至大相徑庭不知其先具何膽量敢為是荒唐之語殊屬不解朕所以深為寒心於一切人不敢聽其言而遽信其行也但能勉力實行朕自有覺察何須此奏如果實實感激惟當屏盡私腸致身於國以一片赤衷對越天地神明縱朕不知上蒼斷無不鑒佑之理倘一味邀譽徇私專務粉飾欺隱縱能瞞朕亦豈有永遠昌盛之理乎據汝現今而論聲名頗好加勉自勵可也同日又奏為恭報米榖價值上慰聖懷事竊查臣屬南太潯梧四府米價雍正四年六月分南寧府每倉石一兩一錢太平府八錢潯州府一兩三錢五分梧州府一兩五錢今嵗春夏雨水調勻早禾豐收兵民安堵共享太平理合奏報上慰聖懷謹奏據奏雨水調勻早禾豐收朕懷深慰雍正五年八月初三日廣西左江總兵官臣齊元輔謹奏為恭報米價雨水情形上慰聖懷事竊臣屬廣西左江地方仰賴聖主福庇今嵗雨水調勻處處霑足水陸安靜百姓樂業兹查南太潯梧四府及鬱林州本年七月分米價南寧府每倉石一兩二錢太平府一兩四錢潯州府一兩零五分梧州府一兩零三五分不等鬱林州一兩早稻巳經豐收晚禾又甚茂盛將來收穫之後各處米價自必更加平減所有臣屬各府州現在米價理合奏報上慰聖懷謹奏覽雨水米價情形朕心深慰各省收穫頗好而米價近俱少昂細推其故緣處處買補倉榖之所致一兩年內恐未能頓減民間目前雖覺少難然倉廩充實有備無患最為要政況暫時稍昂究非年荒米貴之比朕所喜者於此可徴地方有司皆實力彌補虧缺也同日又奏為敬陳一得之愚仰冀聖明垂鑒事欽惟我皇上御極以來旰食宵衣勵精圖治廣開言路不棄芻蕘臣雖一介武夫才庸識淺不揣愚昧謬擬弭盜六欵為我皇上陳之轉飭該管州縣務將前項興行保甲之文凡於所轄境內邊僻莊村處所一鄉之中令甲長每逢朔望將賞罰之處沿鄉曉諭俾目不識丁之輩亦知舉首者如何有利隱匿者如何有害觸目警心自必互相查察不特本地姦匪無處托足而他方逃盜更難容隱矣兄之教不嚴以致子弟不士不農不工不賈遊手好閒勢必漸流為匪及至為盜又溺於情愛曲為隱匿掩飾今若嚴定以連坐之罪則凡為父兄者日凜法令森嚴惟恐波及其身自不敢縱容子弟為盜即有未經發覺亦必據實首報矣用酒食邀結以為日後挾制之端遂致鄰佑知而不言畏而不言者往往而然今盜犯之鄉鄰如係强盜知情不首應作何加倍處分如係竊盜容隱不報應作何嚴行懲究庶盜犯之鄉鄰知所畏懼及至庭讞之下悉皆海市蜃樓揆厥初心意以被竊之案地方官毫無關係獲盜追贓勢難迅速惟揑竊為强文武均有責成自然勒限窮追嗣後如有以竊為强假揑呈報者按其所揑之輕重大小如何分别治罪則刁頑無所用其伎倆矣名住址鑿鑿不爽雖經審明摘釋而拘係拖纍巳不勝其荼毒臣請嗣後如有以盜陷仇者按照誣告之律嚴行招擬母得少貸庶姦徒知警刁風可除矣一猺獞土司地方甚是遼濶深林密箐漢土叢雜中捕役難以弋獲案件末由審結甚至流寓年久熟悉蠻情喜災樂禍挑唆愚獞生事以為利藪臣請通行督撫轉飭猺獞各土司凡有漢人入境除貿易者聽其往來經商外如有境內白手閒遊指使土民作惡貽害地方以及踪跡可疑之人即行查明解交鄰近有司訊明治罪仍查明原籍住址移解安插如係姦徒逃犯自必水落石出矣以上六欵乃臣為地方弭盜安民起見謬抒己意敬陳一得之愚是否可行伏乞聖明睿鑒謹奏覽所奏數條雖識見每有不及處然立意甚屬可嘉身膺封疆重任百凡事務當如是留心計慮一有所得隨即奏聞候朕裁奪如所言是而見諸施行固於吏治民生大有裨益即所言非其不可行之故領朕訓示亦堪增長汝之識見也雍正六年八月二十四日廣西左江總兵官臣齊元輔謹奏為恭報粵西出師情形事竊照西隆州屬之八達寨目顏光色等肆行不法為害地方其巢穴處萬山之中與貴州之安籠雲南之廣南接壤層巒疊嶂最為險峻當西隆知州劉德健具詳請兵之初原不過欲借兵威以為脅服之計逮提臣田畯委令遊擊常顯虎等統領官兵駐劄其地撫既不聽𠞰亦難施遂致遷延兩月有餘及右江鎮臣段宗嶽於六月十二日帶兵身到行間詳行調度又移調臣標官兵三百名亦於六月十六日齊到行營據臣標領兵遊擊塢元度節次稟報六月二十日官兵九路進擊被傷右江鎮標千總羅文虎逮安籠鎮標兵到又於七月二十一日分路進攻被傷安籠鎮標守備李文仲把總王承文官兵與賊兵互有損傷而賊巢終不得破臣相距遙逺雖未備悉行間情形但鎮臣段宗嶽親至行營之時目擊賊巢險固粵西先後調到官兵一千餘名炎天瘴癘病者居多不足以資分布業經就近移請安籠廣南之兵繼又移請廣西提臣添撥官兵祗因賊徒猖獗難於久待初次進攻止粵兵數百及與安籠官兵協攻合計亦止一千有奇且分為數路攻擊其力實單以致我兵失利今提標撥去官兵八百名臣標續調去官兵三百名滇黔兩省俱各添撥官兵將次雲集提臣田畯與安籠鎮臣蔡成貴又俱親赴行間會勘諒此小醜蕩除在即臣謹將現在情形繕摺奏聞伏乞聖鑒謹奏汝等粵西督撫提鎮罪何可辭向聞粵西營伍廢弛兵丁技藝生疏未料至於如此之甚八達進師壞盡國家顏面若非滇黔兵至協𠞰奏捷事當作何收束汝尚靦然面目為此粉飾之詞耶況汝受朕拔擢之恩更與他人不同倘不悛改自新竭力振刷仍復因循委靡竊祿尸位將來必有身家性命之憂也竭力勉為之同日又奏為恭報臣屬雨水情形及米糧價值事竊照臣屬廣西左江地方今嵗春間少雨入夏以後雨水幸獲調勻早稻收成約有八分至於晚稻惟太平府屬據報現有缺雨之處其餘各府屬晚稻俱皆茂盛豐收可冀目前米價南寧府屬每石九錢一兩不等太平府屬一兩至一兩一錢潯州府屬九錢至九錢五六分梧州府屬八錢五分至九錢五分鬱林州屬八錢至八錢五分其價較之冬春俱為少減祗今嵗夏間炎熱太甚民間多染患時疾逮入秋以後業巳漸次寧息現在地方寧謐百姓樂業懷集金山與蒼梧之芋莢山等處礦徒斂跡理合繕摺奏聞伏乞皇上睿鑒謹奏覽雨水米價情形朕懷深慰然凡奏務須據實若稍涉粉飾欺隱即屬不忠朕亦何用閲此無稽之言耶誠之一字為最要勉之雍正七年九月十一日廣西左江總兵官臣齊元輔謹奏為叩謝天恩恭繳微臣原奉硃批奏摺事竊臣一介武夫才庸識陋任粵四載過愆日積去嵗進𠞰八達粵兵怯懦臣職司軍旅既巳罪無可逭又止據領兵將辨行間稟詞冒昧具奏雖置臣於重典未足蔽辜乃䝉皇上格外寬宥仍諭臣竭力振刷改過自新及督臣孔育珣以臣平日訓練無方列疏糾參部議革職又奉恩㫖交與督臣鄂爾泰查明具奏俟奏覆到日再定臣荷覆載洪仁有加無巳雖捐糜頂踵不足以仰報萬一若稍有懈弛不復竭力振刷不但國法難容即天地鬼神亦必誅殛但臣知識疏淺幸䝉我皇上將廣西事務悉交督臣鄂爾泰總制本年二月內提臣張溥奉命由滇入粵赴任面述督臣之言云左江總兵尚未一見其人令臣前赴雲南臣隨於二月二十六日起程赴滇嗣聞督臣巳赴貴州臣即至貴州省城謁見至四月初六日自貴州起程回署計在黔省駐劄一十一日一切戎政事宜俱經督臣鄂爾泰面加指示臣惟有竭力振刷斷不敢稍有粉飾自取罪戾臣謹具摺叩謝天恩併恭繳硃批奏摺伏乞睿鑒謹奏果能事事遵照鄂爾泰指授實力行之一切營伍軍容自可望改觀也同日又奏為恭請陛見事竊臣䝉皇上隆恩補授廣西左江總兵官於雍正四年四月內到任邊疆要地任重才疏受事以來寸長未效過鄙陋若非聖明指示雖竭盡駑力於事無補伏查粵西現今時和年豐地方寧靜臣懇天恩鑒臣愚衷主之忱亦得稍遂矣臣不勝感激待命之至謹奏覽硃批諭㫖卷八十六
