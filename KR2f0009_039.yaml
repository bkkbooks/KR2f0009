body:
  text: 欽定四庫全書硃批諭旨卷三十九硃批官達奏摺雍正五年四月十二日廣東布政使臣官達謹奏為奏聞事竊臣至愚極陋疊荷皇恩由包衣大拔置卿班復授粵東布政使恭承聖訓諄諄又恩賜摺奏準臣隨事奏聞自顧何修仰邀皇上隆恩有加無已敢不夙夜匪懈勵己率屬恪盡職守仰報萬一臣於三月二十二日抵廣東省隨將面奉諭旨下與巡撫臣楊文乾跪聽即日起程回京臣又將諭旨下與原任布政使今升巡撫臣常賚跪聽訖臣即於是日恭設香案望闕叩頭謝恩開印視事首以藩庫錢糧為重當即下庫盤查據升任布政使臣常賚册開舊管新收項下銀兩除支發將軍八旗督撫提鎮協標營官兵馬匹俸餉草督臣阿克敦盤查覽題報其四柱內有未經報部欵目俟於奏銷案內開報合併聲眀次以倉榖為要查粵東通省共額貯榖一百六十二萬四千六百三十七石零內除雍正四年分平糶存價未買碾支兵米未補并參追各案虧空榖石外尚實存倉榖一百一十萬七千九百六十六石零欽蒙我皇上軫念粵東去年八月水災將被水之東莞等十一縣災民特諭賑給其餘未報災之州縣亦因去年水大收成歉薄今春米榖騰貴各屬詳請平糶悉於應糶三榖內撥支散賑減糶除撥支過榖石不能預定俟賑糶畢日各府州縣册報確數核明報銷外其平糶榖價俱令解貯府庫秋成領買還倉查雍正四年平糶未買碾支未補榖石係前撫臣楊文乾任內經手之事理應去年秋收買補因收成稍歉若井買恐致米價愈昂是以皆尚存價據臣管見統俟皇上洪仁撥運粵西倉榖三十萬石分貯粵東以備賑恤之用遵經委員前往領運除未運到榖六萬一千八百石零委員現在粵西領運其已運到之榖經督撫臣會同分撥貯倉動支平糶統俟運足平糶畢日另詳於粵西榖內暫撥應用將所捐銀兩收存藩庫秋成買榖還倉等因目今榖尚未用銀亦未繳合併奏明又欽奉上諭閩粵小民只知種植果木圗取末利不思稼穡為本種稻以蓄米糧著地方大員留心勸導欽此臣隨遵奉刋示遍發曉諭務令遵行至於地方之利弊民風之淳漓與屬員之賢否容臣次第採訪得實雨二十三日又雨二十六七日又得微雨閏三月二十六日以後時沛甘霖雨水調勻粵東州縣可奏所奏俱悉同日又奏為奏聞事竊查粵東南海番禺二縣係省會之地五方雜處當青黃不接之時不無乏食貧民經署撫臣常賚會同將軍臣石禮哈等倡捐賑粥擇於東門外教場之旁寬濶地靣搭蓋棚厰自四月初一日為始文武官員日到厰所監督初四日忽遇颶風大雨將箭亭吹倒有正黃旗協領申文貴正白旗協領董安國鑲藍旗協領柳滋洪署廣州府知府胡恂理事同知王士銓番禺縣知縣唐祖武俱被壓傷當有瓊州府同知來銑因公到省亦在厰所被壓受傷獨重越時氣盡并有在厰執事人役五名被傷身亡除收到同知關防詳委瓊州府知府宗思聖帶理聼撫臣題報外所有颶風吹倒箭亭壓傷員役情由臣不敢隱諱理合據實奏聞謹奏此係亭柱久被蟲蛀朽爛之所致耳類斯業經具題之事何必爾重復摺奏耶雍正五年五月二十日廣東布政使臣官達謹奏為敬陳管見仰祈睿鑒事竊照粵東地方自去年八月大水收成稍薄荷蒙我皇上保惠元元撥粵西榖三十萬石運赴粵東分貯賑濟并動本省糶三榖石減價平糶民賴全活目今四五兩月雨水調和豐收可望時下米價每石賣銀一兩二三錢不等百粵億萬編民咸頌皇上至誠格天俾海疆得荷盈寧之慶也臣伏思廣東額貯倉榖并廣西運到之榖共計一百九十餘萬石內有雍正四年各州縣平糶存價未買及本年賑給平糶并參追各案虧空榖石約計共五十餘萬石約存價銀二十餘萬兩貯在府庫自應責令照數買榖還倉第本地産米有限目下尚未全收若令州縣領價旨允照常平倉折半之例開捐監生一條令湖廣廣西江西各省生俊購買彼省榖石運赴粵東捐納不許持銀攙買粵東本地之米捐足賑數即行停止此誠至善之策但今尚未據有報捐署撫臣常賚現在咨部請示以臣管見可否請照常平倉捐貢加級封典贖罪之例聽各處及本地生俊官民咸赴江西湖廣粵西三省買榖運赴廣東捐納令粵東各府州縣按照平糶未買榖數收捐并原存榖共足二百萬石之數為期此例一開生俊踴躍報捐者衆本地米榖無官民并買之擾米價一賤民覽同日又奏為奏聞事竊臣叨荷皇恩不次簡用犬馬愚衷時切報稱凡有關於國計民生無不細心採訪冀得確實見諸措施庶不國體之事不得不為我皇上密陳者緣巡撫臣楊文乾自雍正三年欽奉行名曰十三行其實有四五十家楊文乾到任創立行頭名色僉用六行六行之中又專用兩行為來番人到廣聽其自投行主養活數百餘家商民稱便自立六行之後凡番人交易非六行不能交貨以致各行貨積如山總無番人敢買延至冬末不能銷售不得不減折價直賣與六行轉售各商奏伏乞皇上睿覽施行謹奏爾此奏非出於有意陷害故無大過但爾被人欺誑矣向爾造言之人不過欲借爾之詞以搖惑朕耳目之意楊文乾撫臣中之好者斷不負朕洋行之事早有人奏聞已靣問過楊文乾其中原委朕巳詳悉即樓儼亦係一好員楊文乾實心任事招人怨望則有之其於待人接物之間欠謙和未免意氣髙傲所以同事者每多與之不協耳巡撫乃爾之上司當極加小心盡禮與之同心協力俟伊旋任共事一番爾自當知悉也慎毋聽信離間之言與巡撫不和恐爾反自貽伊戚於伊抵任後如爾親見有不妥處須以誠心竭力勸阻不可以巳往之流言存於胸中而生芥蒂致自誤已身之事也慎之硃批諭旨卷三十九
