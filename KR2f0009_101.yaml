body:
  text: 欽定四庫全書硃批諭旨卷一百一硃批周瑛奏摺雍正元年六月初四日四川松潘總兵官臣周瑛謹奏為恭謝天恩事竊臣一介武夫至愚至賤由千把歷升化林副將兹蒙聖恩簡授松潘總兵官令帶兵駐防義木多聞命自天感激無地隨恭設香案望闕叩頭謝恩臣因未及前往松潘赴任即由化林領兵出口是以未敢用本奏謝隨咨明提臣嶽鍾琪代謝天恩今行次中渡準提臣咨覆雖未到任亦可繕摺謝恩等因並咨送臣松潘總兵官劄付前來隨於行營祗領任事伏念臣本庸材過蒙聖恩超擢駐防邊外臣惟激勵將士嚴加約束宣布皇上德威務使殊方相率效順仰報髙深於萬一為此繕摺恭謝天恩伏祈聖主睿鑒謹奏覽奏知道了今賜爾戴孔雀翎以壯觀瞻聞爾為將中俊傑其勉力自愛駐防邊外乃心力俱勞之任朕深體恤斷不令爾等空受辛勤也凡百處以安靜統綏周密防禦為貴不可報效心切輕逞兵威而生事圖功勉之愼之雍正元年十一月初三日四川松潘總兵官臣周瑛謹奏為恭報微臣領兵進藏日期事雍正元年十月二十三日準四川提臣嶽鍾琪咨為奏明撥兵守藏事準川陜總督密劄內開羅卜藏丹津橫行西海或趁此前往西藏擾亂占踞皆未可定訂本提督移文該鎮帶兵前往守藏以安人心等因理合僃咨煩為查照即將所帶兵丁一千名自義木多起程裹帶兩月行糧兼程前往直抵西藏固守地方安定人心所有移咨該鎮帶兵進藏緣由本提督巳具密摺奏明等因到臣準此臣查義木多地方係通西藏大路周環皆有羅卜藏丹津屬番誠為爐藏要衝今準提臣移咨令臣帶兵進藏則義木多地方亦不可不嚴加防禦臣再四思維酌留遊擊一員髙麟端暨守僃二員把總二員馬步兵丁四百名協同原駐之遊擊侯裔兵丁二百名於義木多防護軍糧遙為掎角之勢臣謹帶領遊擊郭壽域及千把效力人員馬步兵丁六百名大炮六位裹帶行糧折色於十一月初三日自義木多起程直抵西藏相機防守倘羅卜藏丹津果來侵犯臣仰仗聖主天威調集藏地土兵協力堵禦似可無虞但從前大兵駐藏沿途設有臺站馳遞軍機公文近巳撤回今臣領兵進藏應否添設臺站已咨商撫臣蔡珽酌奪外先以臣所領之兵沿途酌留數站以速軍機所有微臣領兵進藏起程日期理合繕摺由驛傳齎送伏乞皇上睿鑒施行謹奏據奏接準提督密咨即行領兵進藏且料理亦合機宜殊為可嘉到藏之後爾須宣布國恩鎮撫番部慰安人心一切事務與學士鄂賴會商而行仍當激勵康濟鼐隆布奈阿爾布巴等令各預僃唐古忒兵馬倘羅卜藏丹津逃竄至藏併力擒𠞰不可使致脫也雍正元年十二月十九日四川松潘總兵官臣周瑛謹奏為恭報微臣領兵抵藏日期事竊臣於雍正元年十月二十三日接準提臣嶽鍾琪咨文令臣帶領官兵進藏即於十一月初三日拜發奏摺起行前進其各兵除裹帶兩月行糧外每名仍照副將李現光駐藏之例支領五箇月折色銀自行買僃臣思西藏自大兵撤回之後並無管理糧務之員是以於義木多糧務處借支軍需銀八千兩交遊擊郭壽域隨營經理設有需用之處就便嘛差貝子噶隆等迎接據稱貝子康濟鼐尚在阿里地方我等聞得西海羅卜藏丹津擅動兵馬占踞察漢丹津地方就是他悖了聖主隆恩只怕天也不容我等與達賴喇嘛公同差人去講説去了尚未曾回來前蒙欽差各位大人傳諭預僃兵馬我等商議著公隆布奈帶領土兵八百名往哈喇烏蘇防守要緊口子又𣲖下唐古忒兵馬一萬聽候調遣今又蒙發大兵到來防守招地我等大小喇嘛百姓人等都是歡喜感念聖主隆恩始終為我黃教等情臣始抵西藏其一切防禦機宜容臣偵探如有確實聲息即會同駐藏官員及貝子噶隆等鼓勵兵番合力堵禦外所有微臣領兵抵藏日期及安定人心緣由理合繕摺奏聞謹奏覽奏朕深為嘉悅爾於嚴冬草枯之際帶領官兵遠赴西藏勞瘁實甚朕殊憫恤之至且料理一應機宜亦皆得當事平之後朕自越格酬答爾之優等勤績兹因路逺不便頒賞多物特賜內製琺琅管翎子暨平安丸一匣此藥和平效驗兵辨內或偶遇寒暑侵犯按照方引服用無不愈也特諭雍正二年六月二十九日四川松潘總兵官臣周瑛謹奏為恭謝天恩事雍正二年六月二十日臣於西藏接閲邸抄仰蒙聖主洪恩賞臣一拜他拉布勒哈番又平定西藏及蕩平郭羅克案內議敘授臣左都督職銜臣聞命自天感激無地又於臣奏摺內荷蒙皇上硃批嘉奬賜臣翎子并平安丸藥臣俱恭設香案望闕叩頭謝恩訖伏念臣何人斯疊沐聖主殊恩有加無巳惟有殫竭駑駘力圖報效臣謹遵聖訓與學士臣鄂賴會商得哈喇烏蘇乃西海要隘不可不慎加防範雖𣲖唐古忒兵八百名令隆布奈帶領在彼防守恐不足倚重又派參將郭壽域等帶臣所領之兵一百名偕往協同防禦又派貝子康濟鼐宰桑阿旺云登帶伊部屬二百名遠行偵探又因哈喇烏蘇起至木魯烏蘇止內有納克樹餘樹等一帶住牧番夷多有羅卜藏丹津部屬設被大兵殺敗逃匿前來在此嘯聚亦大有關係隨派委參將趙儒帶領辨兵同噶隆頗羅奈等帶領唐古忒兵丁前往相機𠞰撫並確查羅卜藏丹津蹤迹臣等一面遣發一面報明撫遠大將軍公臣年羮堯在案今仰仗聖主恩威遠播納克樹餘樹等處土目圖爾古特台吉額爾得尼吉隆丹仲等咸皆傾心投誠共計一萬三千六百餘戶臣等俱造册呈送撫遠大將軍定奪彚奏其參將郭壽域等於哈喇烏蘇亦招撫部番四百餘戶並盤獲西海潛逃來藏之逆黨阿類正沙不隆等二十餘名及羅卜藏丹津於去年差來西藏之宰桑蝦諄他喇等九名又吹拉克諾木齊差來之委正台等四名均遵大將軍令諭臣等會同悉行正法示衆其中有牽連之唐古忒蠻人更敦爾吉等數名亦分别輕重懲處尚有在西寧投誠之貝勒彭蘇克王渣爾等差來之徹愼朗章巴等九名俱係貝子康濟鼐等具保安插訖所得牛羊馬匹軍器等物臣等仰體皇仁均賞給唐古忒出力之人於是西藏人民咸皆感頌聖主天恩保護黃教撫善殲惡無不合掌稱慶從此普天之下永享升平悉荷皇恩之賜臣復飭令郭壽域同隆布奈等謹防隘口嚴加盤查遠行確探外所有臣同鄂賴在藏會商防範及撫綏事宜理合奏聞伏乞皇上睿鑒謹奏覽奏朕甚嘉悅此番西海之事實出望外皆仰賴聖祖在天之靈垂護默祐暨爾等封疆諸臣忠勤任事之所致也每一念及爾等勞績不知如何加恩方於朕心始慊耳雍正三年七月二十六日四川松潘總兵官臣周瑛謹奏為恭報微臣奉文自藏撤兵起程日期事雍正三年五月十四日奉前督臣年羮堯令內開照得䇿妄既經歸順西海亦已蕩平則西藏路遠未便久駐大兵應將松潘鎮帶領駐藏之兵盡行撤回但料理西藏事宜現在酌議請旨俟後檄一到即分頭料理明白將西藏之兵撤至義木多該鎮帶兵五百名會同雲南提督沿途查勘地界乍了巴塘應各留兵三百名委遊擊各一員管領駐劄直至裏塘其地界之歸川歸滇各從其相近者以為準事畢之日該鎮即帶此五百兵馬暫駐裏塘彈壓其餘兵丁不在派留之數者先行撤回並移知駐藏員外郎常保一同撤回等因到臣遵奉在案今於雍正三年六月十九日承準署督臣嶽鍾琪照會令臣會集貝勒康金鼐貝子阿爾布巴公布隆奈噶隆頗羅奈索諾木達爾扎等宣布皇仁明白開説令伊等務須和衷辦事於阿里克及噶爾藏胡秦木魯烏蘇康巴一帶隘口派撥土兵遠行哨探加謹防守仍令貝勒康金鼐與喇答格杆時通信息和好如前各守封疆該鎮即班師回川並將各遵行緣由具文報查等因到臣臣同駐藏員外郎臣常保會集貝勒康金鼐等同至達賴喇嘛處宣布聖主浩蕩仁恩將奉行事宜逐一明白開誠曉諭當據康金鼐等俱各感戴遵奉臣隨取具伊等同心辦事不致有誤地方夷字甘結咨呈署督臣嶽鍾琪僃查外臣隨即行調駐防裏塘遊擊鄧國棟迅赴乍了接管留原駐之兵三百名併行原防巴塘遊擊徐天鳳亦於巴塘原駐兵內留兵三百名仍駐巴塘其餘兵丁不在派留之數者令副將郭壽域等帶領回川交代各營操防臣將駐藏官兵帶領於雍正三年七月二十九日同常保自西藏起程俟抵義木多時臣即會同雲南提臣郝玉麟將新舊投誠部番地界歸川歸滇之處公勘明白另具奏聞臣即帶兵五百名暫駐裏塘地方所有臣奉文撤兵自西藏起程日期理合繕摺奏聞伏乞皇上睿鑒謹奏覽所奏各項機宜俱經僃悉領兵塞外兩易星霜卿過勞矣朕實嘉之恤之莫能去懷同日又奏為微臣戀主心切恭請陛見事竊臣荷蒙聖主隆恩補授松潘總兵官帶兵駐劄義木多續又領兵進藏迄今二載有餘仰仗聖主天威遠播唐古忒一帶地方安靜兹奉文撤兵則臣瞻天有日但犬馬依戀之忱積中已久臣思臣到義木多時會同雲南提督郝玉麟查勘地界分隸新舊投誠部番歸川歸滇均係國家版圖臣等面加確議可以旬日而定即至裏塘一帶番部又均係久經向化者臣到彼調集各處番目宣布聖主浩蕩仁恩奬賞撫綏令其安靜住牧臣在彼暫駐則事無不就緒者惟查義木多乍了巴塘均駐有官兵而裏塘與打箭爐相隔不逺即係化林協汛地若蒙聖恩準臣赴京陛見臣即就近將化林中軍守僃調赴裏塘將臣所領之兵令其暫行管領則聲氣相通足資防範臣減從輕騎自打箭爐進口馳赴闕庭仰覲天顔跪請聖訓庶臣犬馬戀主之心得以稍慰矣為此繕摺奏請伏乞皇上睿鑒施行謹奏巳用爾為提督矣到任料理年餘候旨召見可也朕亟欲與爾相見但爾鞍馬過勞宜暫歇息何必匆遽其遵旨毋違雍正三年十二月初二日四川提督臣周瑛謹奏為借支軍需銀兩事竊臣於雍正元年十一月內自義木多移駐西藏曾那借軍需銀八千兩帶往以僃緩急動用於臣恭報抵藏摺內聲明嗣於雍正二年閏四月內遊擊高麟端等自義木多奉調帶兵進藏又借解來藏軍需銀五千二百兩前後共銀一萬三千二百兩因在藏日久各辨兵遇有缺乏之時臣不得不量為接濟各辨兵共借過銀六千四百四十五兩臣於雍正二年八月內奉文同貝子康濟鼐率領漢番兵馬前赴克里野沙拉達魯地方會𠞰逆夷臣於異域興師又不得不以闊大示之凡一切漢番辨兵之賞犒及給康濟鼐噶隆等之銀縀鞍馬並高麟端等領兵回義木多與各兵雇烏拉馱載之腳價以致將此項銀兩用無存剩今臣巳回兵抵省則前項銀兩應行清楚還庫但各辨兵駐防異域方回仰懇聖恩準於雍正四年各辨兵應得俸餉內分四季除還如此則國帑不致虛懸而各辨兵亦感沐皇仁於靡既矣至臣動用之項伏懇聖恩準將臣提督任內之俸薪親丁銀兩酌留養贍之外陸續填補還項為此繕摺奏聞伏乞皇上睿鑒施行謹奏將周瑛所奏支用過銀兩免其賠補該部知道同日又奏為奏明事竊臣在藏撤兵因各兵馱載馬匹俱巳倒斃軍裝行李力難負運值達賴喇嘛感荷聖主隆恩令貝子噶隆等給臣所領駐藏及沿途安站之兵六百名每名給銀二兩共銀一千二百兩又差喋吧一名七登及中科二名於沿途催調烏拉給兵馱載並僃辦口糧各處番人歡欣樂助直至義木多實皆仰荷我皇上恩德覃敷無遠不屆之所致也又臣於西藏起程時撫臣王景灝捐銀五百兩僃臣回兵沿途賞番之用及臣至義木多會同郝玉麟查勘地界凡新舊投誠番目俱皆調集亦必須奬賞撫馭撫臣王景灝又囑令管糧知州李喬林預僃縀綾布匹茶葉銀牌等項計銀一千兩之數交臣應用臣沿途宣布聖朝德威加賞撫馭而各番目均皆踴躍頂感皇仁臣逐一撫綏悉令其回巢安靜住牧外所有達賴喇嘛給兵銀兩馱載並撫臣捐僃賞需情由臣謹具摺奏聞謹奏此所奏知道了進藏借支過軍需銀兩概免扣除還項另旨從部頒發雍正三年十二月二十一日四川提督臣周瑛謹奏為恭謝天恩事雍正三年十二月十九日臣家人齎捧聖主硃批奏摺併蒙恩賜元狐暖帽法琅管孔雀翎子到川臣隨郊迎至署恭設香案望闕九叩跪領訖伏念臣邊末武夫至愚極陋荷溫旨之頻頒蒙珍物之疊賜臣何人斯仰邀聖恩榮寵至於此極惟有竭盡駑駘黽勉愚忱以期上報皇恩於萬一耳為此繕摺恭謝天恩伏乞皇上睿鑒謹奏覽奏謝知道了條奏藏中事宜識見甚屬錯謬另有旨矣爾第遵旨而行作速回任今調路振揚來京陛見署理印務之人爾同嶽鍾琪一面會商委攝一面奏聞雍正四年三月十六日四川提督臣周瑛謹奏為奏明酌減公費名糧事竊臣查川省各營向來存有公費名糧以充製造旗幟鑼鍋帳房並春秋二操火藥鉛彈及各鎮協營領餉腳價暨遣差出口盤費奬賞番目花紅等項之需舊留馬步糧一千零一十分緣連年出師不時製造軍裝解運前往費用浩繁以致不足充用經川陜督臣嶽鍾琪於前任川提時代為借墊尚未清結督臣現在行提該管經識查核清理但川省各處兵馬漸次撤回軍務將巳告竣公費名糧亟宜核減臣隨將所存馬糧盡行挑選步兵頂補至於戰糧亦量為酌減計全川營伍馬步兵糧三萬六百有零每糧百分內酌留三分二分不等戰守各半實存戰糧四百二十八分守糧四百四十分共存戰守名糧八百六十八分較前所存之數核減一百四十二分行令各營作速募補以實操防而所留之戰守糧八百六十八分約算每年應有餉米銀一萬五千一百有零以為各鎮協營一切公務之需但川省幅員遼濶近邊營汛甚多尚需犒賞番目不時遣差出口及領餉腳價等費亦必於此項公費內動用未免有有餘不足之處臣仰懇聖恩準臣移豐補歉以公濟公俟後若漸有贏餘臣再行核減募補倘有不肖員辨假公濟私濫行侵用者臣即據實糾參斷不敢私徇以負我皇上特簡之至意也所有微臣核減存留公費名糧數目理合繕摺奏聞謹奏所奏雖屬極是極好但歷觀提鎮到任率皆具此一奏固有如言實行者而言行不符者甚多所以朕披覽之下頗覺煩厭只在行不在言爾果潔巳奉公正身率屬朕自有見聞無須此摺也勉力為之名糧一事天下皆然係萬不可少者如實能以公濟公無絲毫假借兵辨焉有不服朝廷自然體諒酌量存留以充公務之用何妨乎所奏知道了雍正四年七月十九日四川提督臣周瑛謹奏為微臣查邊事竣戀主情殷恭請陛見事竊臣奉旨會同副都統臣鄂齊等前往義木多一帶指授賞給達賴喇嘛地方疆界臣等欽遵同往由打箭爐裏塘巴塘等處確查交錯情形畫清內外疆界至巴塘連界之邦木地方因邦木係巴塘往宗俄一帶必由之道在奉旨賞賜達賴喇嘛地方數內臣等確商再四應將邦木收入巴塘所屬界內隨公同勘定邦木與南登兩界之中有山名寧靜山擬以山頂立定界石情由臣等於義木多聯銜奏聞在案今查賞給達賴喇嘛地方自南登起至碩般多止共計大小地方二十三處營官喋吧頭人共三十名總計管下番衆一萬一千八百零二名達賴喇嘛深感皇恩特遣貝子阿爾布巴遠迎至義木多臣等將賞賜地方開具夷檔付貝子阿爾布巴帶回同欽差臣鄂齊等赴藏降旨臣即由疊爾革霍耳一帶宣布皇仁曉諭各番逐一奬賞清查户口回署所有收入內地地方自裏塘巴塘起至疊爾革上納奪林蔥霍耳束署止總計大小地方三十八處土官三十名土目十八名户口三萬三千二百六十七户皆係接壤相連應收入內地管轄臣除現在分析彚册咨送督臣查核具題請授大小土司職銜頒給印信號紙鈐束部番外一切事宜均應俟鄂齊等回川之日公同繪圖繕册恭呈御覽但臣等巳經出口數月恐厪宸衷今臣先巳回署謹將勘定內外户口數目情由略陳具奏竊臣更有請者臣以邊鄙庸愚屢荷天恩超擢授以提督重任時抱蚊負之懼日深戀主之忱伏乞聖恩準臣懇請俟鄂齊等回川之日臣隨一同赴闕跪聆聖訓俾地方營務有所遵循而臣之犬馬微忱亦得少遂矣為此繕摺奏聞伏乞皇上睿鑒施行謹奏所奏知道了據爾屢請陛見俟鄂齊等自西藏回來將邊外一切事宜措置妥帖後有旨命爾來京見朕也硃批諭旨卷一百一
