body:
  text: 欽定四庫全書硃批諭㫖巻二百十九硃批衛昌績奏摺雍正六年七月十六日提督廣西學政臣衛昌績謹奏為恭解原書事雍正六年七月初四日准廣西撫臣郭鉷咨稱准吏部咨查得廣西學政衛昌績疏㕘藤縣休致教諭譚玉琪將欽頒貯學之書任意借人監生胡祚悠霍廷把肆加圏點等因奉㫖衛昌績此奏甚屬可嘉著將原書解部看其圏點之處再將譚玉琪胡祚悠霍廷把定擬具奏該部知道等因到院相應咨㑹欽遵諭㫖將貯學原書速即徑行解部等因到臣臣随行文藤縣教諭吕德懋將名教罪人錢名世刊刻原詩二本親齎到省臣遵即專差解部外謹將解過緣由繕摺奏聞謹奏知道了地方上所聞所見何不乗便奏聞耶雍正六年十一月二十九日提督廣西學政臣衛昌績謹奏為敬陳管見事竊臣䝉皇上天恩簡任以来勉竭愚駑毫無報稱捫心揣分恐懼悚惶謹輸犬馬微誠敬獻芻蕘末議為我皇上陳之一士子錢糧宜詳分限催徴之法一士子錢糧宜嚴催徴不力之罰一老農之選舉宜慎一劣生之舉報宜嚴以上四條謹據臣愚管見敷陳如有可採伏乞皇上聖鑒施行謹奏此奏甚屬可嘉候另降諭㫖降㫖時不將汝名随條奏發出者盖不令汝招尤結怨也知之同日又奏為恭謝天恩事竊臣准吏部劄為欽奉上諭事雍正六年九月初四日内閣吏部奉上諭前據廣西學政衛昌績疏稱梧州府藤縣所有部頒在京官員刺錢名世之詩二册經教諭譚玉琪借與監生胡祚悠霍廷把閲看私加圏點甚屬狂肆等語今朕將原書調来親覽見書中詩句數處伊以巳意加圏於旁竝無狂妄指摘之處此乃逺方之人迂濶庸愚一時錯誤不必深究著將私借官書之教官譚玉琪罰俸一年衛昌績於此等事不肯隠匿據實奏聞其小心謹慎可知著給與紀錄一次欽此劄行到臣臣随恭設香案望闕叩頭謝恩訖所有臣犬馬感戀之忱理合具摺奏聞謹奏覽奏謝知道了勉之雍正七年四月二十九日提督廣西學政臣衛昌績謹奏本年四月十九日臣家人恭捧硃批奏摺至桂林府臣随叩頭跪開密閲訖臣前摺奏粤西風俗之惡薄有宜整齊者紳士之强横有宜約束者兵丁之怯弱有宜振作者州縣之闒茸有宜驅除者兹臣旋省試竣理合繕摺具奏一粤西民情大率嗜利而無恥尋仇而輕生健訟而喜妄作一切姦淫偷盗忿争刦殺干名犯分之事皆悍然行之而不顧而倡之者實自强横之紳士始臣愚竊謂宜照浙省例仰請皇上欽命觀風整俗使一員以整齊而約束之似於地方大有裨益一粤西營伍廢弛實由於訓練之不力亦有由於兵額之不敷者即如桂林一營額兵盈千今僅裁留四百八十九名除分防汛兵及將弁親丁外實在存城纔一百四十二名再除將弁書役及分守十城門庫獄藥局外復有護送錢糧押解盜犯等差則士不暇操弓而擐甲矣雖向来提鎮兩標撥千總二員兵三百名駐省貼防然標協既分客主情異從前將弁一切周章觀望貌合中疎非所以保衛地方也粤西幅員遼濶兵單汛廣通省皆然臣愚以為宜請皇上敕下督撫確查營伍中兵額不敷者酌議増添概停貼防使標兵歸標協兵歸協庶㡬責成専而汛守實約束勤而訓練精於營伍似有裨益一闒茸之員莫如鬱林州知州佟世俊者邀仁厚之譽無聴斷之才詞訟則勸之使和盜賊則縱而弗緝衙役梁玉與羣盜交通而不覺次子佟鐸與劣紳賭飲而不知私派科斂曠官病民殊玷職守以上三條臣謹據地方所聞所見恭繕密摺奏聞伏乞皇上聖鑒謹奏所奏均關地方切要甚屬可嘉候另有諭㫖硃批諭㫖巻二百十九
