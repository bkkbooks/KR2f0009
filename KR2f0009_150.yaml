body:
  text: 欽定四庫全書硃批諭旨卷一百五十硃批鄂禮奏摺雍正六年八月初二日郎中臣鄂禮謹奏為請旨事竊臣一介庸愚荷蒙聖恩命往江南協理水利事務自抵蘇以來日夜冰兢前吳淞江陳家渡堵築決壩之時臣因在七浦徐六涇福山塘等工監催督浚未在彼處但奉殊遇從此若不更加奮勉竭盡駑駘以圗仰報髙深於萬一即叨蒙聖恩寬宥不加譴責亦必默受冥誅實狗彘不食其餘有何面目見臣父於地下也所有吳淞江東假未完工程前經河臣齊蘇勒前往相度機宜用混江龍拖刷河底業巳深通又令臣等率領效力人員清理兩岸今皆如式告竣是從前題報應修各河皆巳完工惟有吳淞閘劉河之天妃閘并徐六涇閘此三處閘座尚未興修現今會同河臣齊蘇勒署撫臣張坦麟等料估造册具題但修建閘座必俟農隙水涸之時方可施工臣今在此並無辦理之事且陛辭出京一年有餘犬馬戀天顔恭請聖訓再回蘇監修閘工庶小臣之微悃得伸而於閘工亦不至遲誤為此具摺請旨謹奏覽雍正七年閏七月二十六日郎中臣鄂禮謹奏為恭謝天恩事雍正七年七月二十九日接準蘇州布政司咨稱貴部郎養廉一項巳經奏明奉旨俞允今將雍正七年春夏二季養廉銀五百兩差官移送等因到臣隨望闕叩頭謝恩照數領受訖竊念臣一介庸愚荷蒙聖主隆恩命理江南水利二年以來涓埃未效前蒙聖慈憫臣未育子嗣恩準接取家眷今又念臣艱於資斧賞給養廉曠典疊頒體恤周到實非微臣一身所能上報倘得延有嗣息子子孫孫所當永效馳驅以答髙厚者也至臣督浚淮揚二府河道先浚江儀二邑槐子烏塔二河及泰如二處運河并泰州興化界內丁溪小海青龍海河三道皆巳如式挑竣驗明收工其續浚諸河總俟農隙興工完竣一併會疏題報外但臣在工既久周歷各河有一二處尚須斟酌者請為我皇上敬陳之如泰州新城鎮至東臺一百二十里原估北岸築堤以為鹽艘挽運縴路臣於正月履勘水尚瀰漫東西大泊一半不露岸腳似應築堤分別湖河以資挽運今自海河開通河水東泄之後積水盡消支河港汊畢露周察情形計通河自臨潼至東臺六十里兩岸頗高無容築堤自新城至臨潼六十里河濶泥淤無從取土東西皆係大泊即使堤成風水衝擊工難堅久且支港凡六十條悉資灌溉遇西水大至之年藉以宣泄如橫亘一堤流泄不暢泰興諸處必受其害且從來鹽艘經由並無傾覆過壩應掣並無遲誤詢之居民咸云此堤不築為便原估銀六萬餘兩即可移浚别處要工又泰州境內自富安場至海安鎮徐家壩三十里為各場通津今河道淤淺鹽艘不行民田乾涸應增估挑浚寬深則興泰各場鹽運即可竟至徐家壩盤壩入如臯運河於風水盛大之時可以不走新城臨潼諸大泊至為妥便而三十餘里兩岸民田得資灌溉誠商民交利之工也又如臯丁堰鎮至白蒲三十里為通如運道從前上遊河道未開尚不覺其淤淺今自泰州之髙橋起至丁堰止一律開浚深通則白蒲三十里比上下河道地勢稍髙舟船往來每至阻滯亦應一律開深五尺庶民船運艘均獲利便又如臯丁堰至岔河由岔河北至壩鎮再東北至豐利場又由岔河而東經馬塘場至掘港場共計程一百二十里為上十場鹽艘必由之道現在淤淺間露河底合行開浚又鹽城縣所屬之串場河七十里前以産鹽無多未議開浚細加訪察鹽城各竈産鹽固多因河道淤淺搬運維艱是以官商買出者少而鹽梟私販者多今查勘河水深不過二三尺亦應一律開通以濟鹽艘行運又江都縣所屬徐家涵一口北接邵伯金灣各壩之水南承灣頭閘人字河諸水自西而東之咽喉向防貨船私過修建木涵洞隔斷故農商來往至此必須盤剝過船甚為不便且西水大至木涵亦阻木勢臣細加相度宜建單金門石閘一座閘上𣲖員看守按時啓閉既可盤察私販又可便利行舟且水勢無阻與上下河道均有禆益抑臣更有請者揚州水利五塘為要五塘之復建閘為先今雖開浚槐子河烏塔溝引水入塘不過塘內田地得資灌溉與塘上髙田終無裨益且揚州榖産專賴西北二鄉諺云西山熟揚州足而西北地勢高昂専藉五塘之水以資灌溉是五塘一復則西北兩鄉數十萬畝之民田得以均沾樂利夫復五塘則建閘築堤設夫三事闕一不可蓋閘不建則塘不能復堤不築則閘亦虛存夫不設則姦宄私行挖決堤不終保通計三事需費不須萬金便可寬然有餘而西北民田獲益無窮以上數則仰祈聖鑒敕下督撫河道諸臣詳勘妥議題覆實力奉行庶於商民均有裨益矣謹奏所奏開浚建閘數則朕命該督撫與爾會同查議具奏亦無拘泥巳見涉於膠固但就理之長處秉公確計辦理可也雍正七年十一月十六日郎中臣鄂禮謹奏為據實奏聞事雍正七年十一月初十日接準江南河道總督孔育珣移會工部咨文內開原任山東巡撫陳世倌參奏江南水利效力候選知縣文鐸褚菊書原委監修閘座全不上緊料理一味奔競鑽營署事請將文鐸禇菊書革去職銜停其委署等因具奏奉旨著照陳世倌所請將文鐸褚菊書革去職銜停其委署專令督催閘工俟工完之日總河具題請旨若仍復怠玩貽誤即行題參從重治罪欽此轉行知照前來伏查修建吳淞劉河等閘經工部議覆令該撫估册具題去嵗十一月內挑選督修海塘人員時臣等以吳淞等閘將來修建之時不可無諳練之員監督修理故與陳世倌同撫臣尹繼善選留候補知府徐成棟候選知縣文鐸褚菊書以備監修閘工撫臣尹繼善又以江南地方官員多於閘工不諳隨同委徐成棟會同該地方官料估造册移送前河臣齊蘇勒將應用木石等物核定其物料價值以江南江北不同發回該撫衙門轉交該地方官按依時價確核而地方官所定價值多有不符經尹繼善屢駁核減後因署撫屢更往返商酌多需時日尚未估計具題是閘工需用錢糧尚未題定承修官尚未領帑辦料監工之員從何料理陳世倌奏稱文鐸褚菊書全不上緊料理一味奔競甚為屈抑且文鐸褚菊書在水利效力二年有餘凡有差委無不竭盡心力勤慎辦理平昔安靜守分不敢妄為實效力人員中之最優者即督撫臣范時繹尹繼善彭維新等亦素所悉知仰懇聖恩敕下督撫諸臣將文鐸褚菊書二員有無不實心不安分奔競鑽營之處據實詳查則臣言之謬與不謬陳世倌參奏之實與不實自可昭然灼見矣臣因身在工次深知二員情事屈抑冒昧陳奏伏乞皇上睿鑒施行謹奏所奏甚屬可嘉候朕另降諭旨雍正七年十二月二十七日郎中臣鄂禮謹奏為恭謝天恩事雍正七年十二月十九日臣齎摺家人敬捧御賜哈密瓜抵工臣隨恭設香案望闕叩頭謝恩訖跪啓摺封荷蒙硃批嘉奬臣伏讀之下感激惶悚莫可名言前者臣胞兄鄂爾泰少效微勞叨蒙聖主格外隆恩特加少保復恩及先世將臣曾祖祖父俱照總督加內大臣兵部尚書職銜給與一品封誥并將臣曾祖圖捫與祀昭忠寺牌位改書新贈之銜入於大臣之列捧讀聖諭不勝感激涕零伏念臣曾祖效忠於百餘年之前今蒙我皇上追贈於百餘年之後三代加封一門增慶榮在祖父光及子孫不獨爾泰一身感戴靡涯凡為後者稍有人心若不夙夜惕厲各竭精誠或少有一毫瞻顧一毫退縮不可以對君父即不可以對祖宗不可以對兄長即不可以對天下萬世臣在諸兄弟中雖至庸懦亦頗具心肝從此願益加䇿勵同心效法仰體我皇上大公至正之心以矢微臣竭忠盡誠之志不致貽玷先人正所以仰酬聖主為此繕摺恭謝天恩曷勝歡忭頂感之至謹奏勉之但能聽受汝兄鄂爾泰之教訓則為人之道為臣之道皆有所矜式也然為善最難思齊匪易其本體猶堪勉效若其用處乃關天資學問非朝夕可強能者能於本體處竭力不巳庶幾其用漸臻從外逐事倣學則誤矣同日又奏為奏聞事竊照先經署督臣范時繹等原題估淮揚所屬應浚河道共十一處內江都縣所屬之槐子河儀徴縣所屬之烏塔溝泰州運河如臯縣運河又海河三道此七處河道於今年春間開浚告竣已經奏報完工其餘四處串場河車路河海溝河界河於九月十一日起築壩戽水俟壩工築完河水戽乾於十月二十等日開工挑土臣等住宿河干往返督催今各工於十二月二十日以內次第報完臣隨偕同淮揚道白鍾山監督水利郎中程夢瑛逐一丈驗所開各河皆寬深如式河底一律坦平挑舞感頌皇仁又丁溪海河今春勘估之時見上段河水深於下段且以下段開浚深通當西水大發之時上段可以借水勢衝刷故止將下段估計開浚而上段五千九百餘丈未入估計之內今下遊開通河水東注上段畢露河底臣等細加勘驗比閘口猶髙二尺有餘縱遇西水大發亦不能衝刷開通直達下遊若不一律加挑閘口不能暢流終有阻於宣泄計開挑此河需費三千餘金查今嵗開濬各河共節省壩工子堰銀五千餘兩即於此節省銀內動支以為開河之費不須另請錢糧理合奏明再原估應修閘座共六處內除草堰口閘廖家港閘俱已修建完竣其小海場閘草堰場閘青龍閘石䃮口閘亦皆釘樁鋪底而小海草堰二閘已砌閘墻三層因時值隆冬恐砌灰灌漿結凍不乾將來難保永逺堅固暫且停工俟春氣融和再行儧修告竣另摺奏報原任巡撫陳時夏聞得伊母患病於十一月十二日前往蘇州省視尚未回來因不在工次未與會銜合併聲明謹奏陳時夏不過備數而已其在工與否何足言及雍正十年二月十一日管理長蘆鹽政臣鄂禮謹奏為恭報久晴得雪仰慰聖懷事竊以時值春耕四郊皆資雨雪跪讀上諭實切悚惶正在諄諭屬員各宜仰體聖心共加警惕乃於二月十一日子時驟雪至天明四野堆積除融化外猶盈二寸有餘至巳時雪尚未止久乾之土現已沾潤仰見聖主精誠感格上蒼不勝歡慶理合繕摺奏聞謹奏此時雪雨正為應期膏澤朕不覺以手加額欣慶之至雍正十年五月二十日管理長蘆鹽政臣鄂禮謹奏為奏聞事竊臣奉户部劄付到臣據王慎德呈稱慎德父王惠民懇將薊州遵化等十一州縣加引三萬道每年納課銀一萬四千兩等因臣查王惠民原同梁樟承辦張霖名下薊遵等八州縣引二萬一千一百八十道又王惠民自認灤州遷安樂亭三州縣引七千一百四十一道二共引二萬八千三百二十一道原屬地廣引少私鹽得以乘機混入今王惠民既請加引三萬道殊為益課利民應就原認行銷地方酌量分派至其餘各地方奉户部劄付內開或有殷實商人可以照例增加引目之處令臣作速定議具奏臣通查長蘆殷實大商原不甚多其行銷地方有引少而不敷行銷者有引多而不免壅滯者經前鹽臣莾鵠立題明準令通融代銷將不能銷之積引通融於能銷地方截長補短踵行至今商民均便若必按地加引轉恐拘滯難行今據衆商情願請發餘引五萬道存貯司庫先將地方額引領辦將銷不及額地方之引通融代銷如額引全數通完復給發餘引行銷照數納課統於奏銷時彚册報部若餘引一併領完再請頒給倘有存剩亦儘數繳部如此則不拘以地方而易於通變不限以額數而樂於行銷矣謹先具摺奏聞伏乞聖裁指示倘荷俞允即將遵薊等州縣分派加引數目及再請餘引五萬道之處具疏題覆謹奏此等奉部飭議之件徑行據情題覆可也何必又多一番煩瀆諭鄂禮知悉近聞天津竊盜甚多武辨禁捕不力今汝署理鎮篆當嚴加訓飭以靖此風亦併諭直督李衛矣務須竭力整理毋使滋蔓以仰副朕旨雍正十年十一月初七日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為欽奉上諭敬繳硃批事雍正十年十月二十八日臣家人恭捧硃批諭旨一道到臣伏查天津地方每有報竊之家而緝捕拏獲者甚少誠如聖諭天津盜竊甚多武辨禁捕不力今臣凛遵訓旨隨嚴飭將辨加意巡察併另選辨兵二十名在於城內城外輪班查訪遇有形迹可疑之人即便根究確實拏送有司研訊處治務期竊盜屏絶以仰副聖主除姦安良之至意為此繕摺奏聞敬繳硃批謹奏好力行毋怠方期有效同日又奏為蘆商感戴皇恩情願量力急公事竊臣據長蘆運司彭家屏呈據闔綱商人王惠民金義查日昌和興范宗文等二百三十二商公同呈稱商等疊蒙皇上髙厚隆恩撫恤僃至歷年以來商困日蘇積欠漸補歡呼感激莫可名言惟有踴躍輸將早完課項以圖仰報然商等雖效犬馬之力未伸螻蟻之忱額徴引課原屬本分應完而帶徵緩徴更蒙恩施格外現今西陲兵餉需用繁多我皇上俯念商艱不忍稍加課額俾得寬容優裕樂業辦公兹商等情願各量已力公捐銀十萬兩於雍正癸丑年隨同正課交納聽候部撥以充軍需等情轉詳到臣臣查長蘆衆商感戴聖恩公籲捐銀十萬兩僃充軍需情詞懇切臣仰體皇上恤商之意復加奬諭察詢實皆出於至誠用敢據情繕摺具奏如蒙聖鑒俯允所請臣即檄行運司將前項願捐銀兩隨同癸丑年引課一併收貯道庫報明户部聽候撥解為此謹奏該商等願捐情由應行具疏題請候朕斟酌有旨雍正十一年二月初二日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為敬陳管見仰祈聖鑒事竊查天津城守一營額設守兵四百四十六名並無馬糧臣揆設立之初意蓋謂城守營所屬祇有城池倉庫之責毋須另為設馬但天津與他處城守不同該營所轄尚有楊栁青北斜二汛俱係城外汛防距津城數十餘里一切催漕護送防範遊巡必資馬匹庶無貽誤况整飭營伍宜有勸懲之道俾士卒各知鼓勵踴躍奮興今該營俱係守兵即有人材壯健弓箭可觀者亦格於成例並無上進之階似不得不斟酌變通查天津鎮標左右二營額設馬兵共有二百五十一名請於每營抽馬十匹共馬二十匹歸於城守營差操拔補如此少為轉移則汛守巡防無誤士卒上進有階矣事關更易舊章臣謹冒昧陳奏伏祈聖主睿鑒敕部議覆施行再照鎮標抽出馬兵即以該營步卒抵數祇須撥正糧餉不致貽誤操防合併陳明謹奏該部議奏雍正十一年三月初六日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為恭報時雨大沛仰慰聖懷事竊照天津地方自二月初二日降雪後一月以來未得雨澤亦覺稍旱農民望雨正殷臣前伏讀上諭仰見聖主宵旰憂勤無刻不以民事為念益深戒懼共切省循今於本月初五日午未申三時先有微雨連綿巳能潤物至夜三更以後乃得大雨自子時起達旦方霽差勘郊外入地三四寸不等乾燥之土莫不均霑溝渠之中猶多積水四野歡呼萬姓感慶且適當耕藉之日尤可卜豐稔之徴臣出郊行禮親勘之下實深欣忭此皆我皇上敬天勤民至誠感孚之明驗也理合繕摺奏聞謹奏春雨潤土如膏最為難得覽奏曷勝慰悅雍正十一年四月初七日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為奏明接交鎮篆事竊臣荷蒙聖恩暫署天津總兵印務前因鹽政衙門例往山東稱掣引鹽業經奏請將鎮篆暫委鎮標中軍遊擊孫志雄護理隨於三月十二日起程今臣東巡事竣於四月初六日回署據該中軍繳送印務前來適新署鎮臣宋愛於初七日抵津臣即將印務委員齎送接受另疏題報外所有接交鎮篆緣由理合繕摺奏明伏祈睿鑒謹奏覽奏知道了留心察訪宋愛之居心為人具奏以聞因念伊父宋可進日前勞效所以用伊今宋可進深負朕恩宋愛一介少年並無報效之處若非出格忠勤殫竭奉公豈便姑留要任雍正十一年十月十一日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為遵旨巡察營伍事雍正十一年八月十二日奉上諭各省營伍必須武職大員平時親身查察庶可以除怠惰廢弛之弊提督一官節制全省統轄之地甚逺難以親身遍歷至於總兵分轄地方道里不甚遼濶巡察尚易周遍嗣後各鎮臣有應行巡察之處著先期具摺奏聞請旨候朕批示遵行不必拘定期限免各營預備供應致滋擾纍倘有絲毫苛纍所屬辨兵者經朕察出定行從重議處欽此今臣荷蒙聖恩署理天津總兵印務所有鎮屬將辨之賢否兵丁之勤惰以及汛防疏密軍裝全缺尚未周知若不逐一清查辦理恐有未協臣擬即日自備盤費減從輕裝并嚴飭各營不許絲毫預備致滋擾纍從天津起程由武清舊州采育至通州即進京仰覲天顔敬聆聖訓再由拱極營涿州河間一帶巡察回署其東路各營汛俟明春再往巡察至鹽政總兵衙門事件除緊要者臣沿途辦理外其常行文移照例暫委運司暨中軍代拆代行關務委分司代理均無貽誤臣謹繕摺具奏伏祈聖鑒批示遵行謹奏巡察乃職分內事所轄地方理應前往不必來京雍正十一年十一月十七日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為奏明巡察營伍情形仰祈睿鑒事竊臣於本年十月十九日自天津起程由武清舊州采育通州拱極涿州河間并臣標右營所屬之滄州青縣靜海一帶巡察於本月初十日回署看得各協營汛兵丁技藝步箭鳥鎗藤牌陳勢咸皆熟習惟馬箭半屬生疏當即嚴加告誡將優者犒賞劣者責革以示勸懲至將辨中如通州協副將蕭良金人材幹練營伍整齊署河間協副將宋愛黽勉謹飭勤於訓練其餘遊擊都司守備千把皆循分稱職惟采育營都司李現祥漢仗雖好技藝甚庸念該營辨兵尚屬習練從寬勒限一月令其學習再為調考如仍無進益即行揭參又河間協右營守備師隆吉人甚庸懦不諳營務弓馬亦復生疏未便姑容致曠職守巳揭報督提二臣核參理合一併繕摺奏明伏祈聖鑒謹奏兵劣者革將庸者參庶幾稍示勸懲所奏是直𨽻營伍廢弛巳極總未經整理竭力勉為務令改觀同日又奏為奏明餘平飯食銀兩解部歸公事竊查鹽課奉撥部餉例有餘平飯食二項隨同搭解若係撥解外餉及本地支給則平飯銀兩自必存剩臣到任以來見山東運司屢次將餘銀報解而長蘆並無報聞隨面詢運司彭家屏據稱長蘆法馬向來較輕凡解餉之部費平飯係各商自往兌交每致不敷復行攤補是以歷欠各批短平至一萬九千餘兩之多挂批未掣遇撥外餉則將餘銀抵補部餉之不足等語夫錢糧出納乃運司責任解部平飯原係核定奏明豈可諉諸商人致有虧短挂欠況今已奉部頒法馬內外畫一嗣後自無輕平抵補之事若將餘剩銀兩仍留備用恐開將來冒銷侵蝕之端當即諭令該司逐一清查去後兹據詳報前來臣查雍正十年並從前撥解外餉餘存平飯銀兩除抵補歷年挂批短平現在解部以清積項外尚餘銀九千一百五十二兩零今十一年分奉撥甘肅軍需及天津水師營兵餉共計八十萬兩每萬兩除添平補色解官盤費等項支用外尚餘銀二百五十兩及二百九十兩不等共應餘銀二萬七百五十兩連抵補短平餘剩通共實餘銀二萬九千九百二兩理合奏明解部歸公此後遇撥外餉即將所存平飯據實報解庶庫項清晰而侵隱冒銷之弊可除矣臣謹繕摺具奏伏祈聖鑒謹奏此議嘉是覽之但百凡處亦不可過於苛細搜求雍正十二年正月初二日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為恭報瑞雪事雍正十二年正月初一日恭逢元旦令節天津地方自本日未時起至初二日丑時天降大雪入地三寸被潤澤而大豐美昭瑞采而煥陽春洵屬農祥實符聖德臣不勝歡忭為此繕摺奏聞伏祈皇上睿鑒謹奏觀汝此奏天津得雪分數比都城較少雍正十二年正月二十四日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為請免道廳挂號之繁以便鹽運仍留應得養亷之項以資辦公事竊查津鹽過關例應報明挂號盤查驗放以杜夾帶行私此定制也向緣鹽臣駐劄在京運司運同又復分駐滄青二處天津地方竟無管鹽之大員是以將過關驗放之責委令天津道及津軍同知分別挂號本屬權宜之計後鹽臣與運司運同俱移駐天津凡有鹽船過關一一盤查驗放稽察巳屬周密而天津道與津軍同知挂號之例仍相沿未改故鹽船抵關必須呈報各衙門挂號停泊守候速則三五日開行遲則十數日留頓不過按引收其公費並無稽察實事殊於鹽政無補臣請自本年為始商船過關經鹽政衙門盤查驗放之後免其再赴道廳挂號至向納天津道公費二千兩津軍同知公費二千兩原係抵作養亷應仍留給以資辦公之用統歸運司一併徵收貯庫按季支給庶商人可免守候之纍而道廳仍得養亷之資矣再查同知養亷數目與道員一例似無等次且覺過多而天津縣政務殷繁凡緝私審理皆其責任原定養廉殊覺不敷請於同知養廉內撥出四百兩給與知縣以别等次用昭公溥臣為調劑鹽務起見冒昧陳奏伏祈睿鑒訓示遵行謹奏所奏是應移知該督并呈明該部可也雍正十二年二月十七日長蘆巡鹽御史暫署天津總兵官印務臣鄂禮謹奏為奏聞事竊臣於上年三月前赴山東稱掣引鹽時因暫署津鎮印務起程之前曽具摺奏明將鎮篆委令中軍暫行護理荷蒙俞允欽遵在案今時當春季例應赴東稱掣俾各商得以及時行鹽辦課所有天津總兵印務仍暫委中軍遊擊孫志雄護理關務委青州分司孟周衍代行臣即於月內起程往回不過一月政務俱可無誤除照例呈報户兵二部外為此繕摺具奏伏祈聖鑒謹奏覽奏知道了仍咨呈該督提存察硃批諭旨卷一百五十
