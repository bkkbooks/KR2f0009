body:
  text: 欽定四庫全書硃批諭旨卷一百二硃批施廷專奏摺雍正六年八月二十八日廣東瓊州總兵官臣施廷專謹奏為僃陳地方情形敬抒管見事竊照瓊州一府遠在天末外環滄海中處黎岐實為廣東要緊之區臣去年十一月間於瓊州副將任內護理鎮務聞有棍徒王君亮帶夥伴數人皆係外籍潛藏黎內登即嚴飭各營勒限查拏送交撫黎同知審明因其未經為非首犯王君亮已在監病故將餘犯分别枷責押解原籍安插又如營兵吳成因查拏王方撫綏黎岐起見至於整飭營伍添造甲械修理墩臺操練兵丁皆係臣職分所當為或呈咨督撫陋管見應請旨敕議者敬臚列奏聞一瓊屬黎汛宜移駐捕巡以專責成也查先年黎岐縱肆前鎮臣吳啓爵於𠞰撫之後開通十字路穿跨黎境設立營汛扼其要口但汛辨只應責以巡防稽查不宜干預外事乃歷年客商入黎貿易例由文員給照汛辨驗放而此內黎人原非州縣管轄每因田畜同類相爭時向汛辨投告為之分剖彼即聽服否則或相讎殺以臣愚見應將該汛係何州縣地方即於該州縣之捕巡移駐一員與該汛千把協同稽查出入姦棍有黎人投告情事公同為之理斷分解如果黎岐悅服地方安堵或參革治罪則責成專而稽察密矣一戰船修造宜酌定屆期以僃巡哨也竊照水師戰船凡遇大小修拆造原有一定年限月日難以贏縮但一營額設之船若皆同時屆修屆拆將何船隻配駕出洋巡哨如瓊州戰船八隻俱於雍正七年五月屆期大修倘一時赴厰興工則六月初一日即值下班巡哨無船可以駕配以臣愚見當於此八船內挑出尚堪駕駛四船暫時配兵出哨將四船照期興修此挑出之四船寬至雍正八年一瓊府同知不宜署事他郡以重職守也竊該府同知有海防撫黎之責非如他郡丞可比臣自任令遠署他郡只於瓊郡之州縣間遇員缺或委署攝庶不致遠離職任而海黎事務得以就近兼理矣一拔補把總宜分别水陸以收實用也竊騎射為武辨所首重而水師營辨尤以諳練水性船務為要臣於瓊州水師副將任內每遇把總員缺挑選送補多有實在諳練水務之人格於不能騎射難以送考未免屈抑遺棄臣請水師兵丁拔補把總只考驗熟練水務步箭合式人材壯健或於藤牌拔補千總則水師辨員得收實用而騎射亦不致偏廢矣以上四條皆膚淺鄙見倘䝉俯賜採擇伏乞皇上睿鑒敇議施行謹奏覽同日又奏為恭懇聖恩事竊查康熙六十年福建克復臺灣案內效力人員䝉皇上加恩議敘復經部行閩省考定等次定議分别録用臣謹據實陳明冒昧奏懇者此案議叙功加署都司僉書內有吳祐李雄張邦佐林山周鴻圖等五名係臣父原任福建水師提督臣施世驃歷任長隨因其諳曉水務才堪驅使帶往軍前隨師進𠞰甚為效力逮臣父克復全臺在軍中病故之後伊等隨衆得邀議敘兹福建督臣高其倬巳將此案功加人員定議分别等次題請分發江浙閩廣四省以千把總補用查廣東係題請分發省分臣叩乞聖主天恩准將吳祐等五員發在臣鎮標效力得以隨時差遣俟遇伊等應得之缺聽督提二臣於通省水師千把總員缺考驗補用可否仰邀聖恩臣謹據實陳明伏乞皇上睿鑒施行謹奏日前朕所降諭旨甚明類斯題帶人員於汝等有損無益試思得五人之力失闔標之心孰多孰少既留標下而不信任奏請何為若信任之通屬辨兵必致私生擬議乃一定之理如云才堪驅使則何省不用好員何營不可效力耶需員差遣只就本標本營訓導鼓舞作養人材而選用之為上䇿斯係朕數年來留心體驗所得之情形汝熟籌審計自知況此五人汝止知其漢仗膽量而已至於品行操守焉能保其兼優倘發至汝標有欺隱朦混暗為不肖處豈不貽纍汝之聲名乎朕意此舉無益抑且不宜即為此五人計亦不如發交别省督提令其隨地效力更為妥協也雍正六年九月二十二日廣東瓊州總兵官臣施廷專謹奏為奏聞事雍正六年九月初五日臣據崖州營遊擊范緯呈報八月十三日有暹羅國洋船收到該營榆林港查據該船夷商具單報稱暹羅國船主陳宇財副柯晃即癸卯年押紅船往廣東查探貢探二船不回暹羅情由者宇等奉國王令著押紅船運米到厦門發賣帶有壓船蘇木鉛錫海參烏木等貨通船舵水七十九名番厮八名防船銅銃三門鐵銃二門火藥二十斤腰刀三把因七月二十七日在洋犯風發漏收到榆林港所報是實并據該夷商禀稱船隻風帆破爛求住榆林港修整完好俟明年三月間南風盛發復往厦門通船舵水每人各帶有米數石丢水者無算現今近岸俱無衣食欲將各名下米石變賣為伙食之用等情臣因念時巳秋深該船斷難駕駛赴閩且洋舶重大非明年夏至南風成信難以開行人口衆多時日遲久既據稱各無衣食欲就地變賣米石當即照會瓊州府酌量許其變賣些少以資伙食并行該營外控大洋現在建設哨船三隻以佐炮臺聲援務令常川駕出附近海面哨探巡查該營遊擊有調遣督率之責必得諳曉之人方克有濟查新任遊擊范緯辦事甚屬平常至於水師事務更一毫不諳臣仰懇聖恩請將廣東諳曉水師之陸路遊擊對調一員庶要地收得人之效矣合併具摺請旨伏乞皇上睿鑒施行謹奏此奏甚屬可嘉候另有諭旨同日又奏為抒誠密奏仰祈睿鑒事竊查瓊屬黎岐附山者原非州縣所管是謂生黎其與土民接壤而居者則一體納糧是謂熟黎此等黎糧雖有定額而此輩愚黎䝉昧無知每受包攬多徵之弊甚非我皇上一視同仁之至意兹本年九月初三日有定安縣黎人王那小等七名先係海南衛所隸糧黎後因裁衛歸併瓊山縣者入城赴縣遞告數日未為審問臣緣係黎人進城著令諳曉黎語之人向問詳悉知為控告糧頭王鄧昌將伊等額糧二十餘栳加收至一百一十餘栳伊等難堪等語臣慮該令楊仙椿初膺民社未悉黎情傳請至署面為開陳必當秉公立行剖斷俾悅服速回安業以廣化導乃該令回縣並不嚴究王鄧昌加收情由越數日只將黎人逐回徒以隨後示禁託之空言如此施為則該令之政績亦槩可見矣臣專司武職於黎糧一項雖難詳其曲折但包攬多徵之弊實可瞭然所當直抒其愚奏懇皇上敇下督撫二臣立法清查務使愚黎得照數輸納吏胥只按額徵收除包攬之積習絶多徵之陋弊庶蠢爾窮黎咸沐皇仁於無既矣為此謹奏此奏情節有旨命傅泰嚴察矣雍正七年三月初三日廣東瓊州總兵官臣施廷專謹奏為恭謝天恩據實陳奏仰祈聖鑒事雍正七年正月二十五日臣齎摺家人回瓊捧到皇上硃批奏摺兼䝉御賜哈密瓜一圓臣郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣智識短淺謬以閩省克復臺灣案內功加吳祐等五員係臣父舊用之人冒昧奏請隨標效力荷䝉皇上不加譴責訓誨周詳臣不勝銘肝鏤膈感激涕零自念恭承聖訓即使從兹微開智慮竭蹶駑駘深恐難酬高厚於萬一合將臣感激愚誠繕奏明者瓊州水師協營為臣所轄屬而該協副將李振麟係先年跟隨臣祖施琅克復澎臺功加為臣父施世驃長隨多年後因議叙功績補用廣東大鵬營參將於預行保舉案內兵部題補今職又該協左營守僃翁繼勳係臣妻舅右營守僃王喜係臣表兄俱以千總預行保舉先後引見注册兵部掣籤具題補授計該協之副將一員守僃二員皆臣親舊臣固倍加訓飭共圖報效不敢絲毫徇情私庇致負皇恩惟是屬在統轄顧念引嫌臣心甚所不安理當據實奏明伏乞皇上睿鑒施行謹奏果能秉公持正不被人所談論彼此同心協力互相朂勉豈特親舊無妨便父子同官乃極好之事今汝如欲避嫌原可言之督臣將伊等就近調用别營但汝祖父以來三為水師統帥必求總非親舊無涉之人方為屬員亦恐難得朕從前有公中私私中公之諭最為詳切遵奉朕訓而行有何不安之處惟是汝等水師閩籍將辨操守二字俱不堪問汝當奮發猛烈心志以廉隅自勵不可蹈此卑汚之習也同日又奏為奏聞事竊照暹羅夷船在洋被風飄泊崖州榆林港緣由經臣繕摺奏聞荷䝉皇上睿鑒批示奉到欽遵訖伏查臣當日據崖州營呈報隨即行回查明船主財副暨通船舵水人等是否俱係彼國夷人其中有無中國人氏飭查去後未據報覆因恐稽延日久敬即繕奏續據遊擊范緯覆稱詢據船主陳宇等單開船水七十九名俱係中國人惟小厮八名係是夷人并呈據陳宇等單報九月二十五日颶風大作碇索三門俱斷將船打上淺水觸破艙漏水滿米石貨物俱皆壞爛鉛錫烏木壓在艙底難起等情臣當即飭行該遊擊會同文員加意撫恤安頓在案詎意該船自飄泊至擱破之後通船舵水人等沾染瘴氣不服水土陸續病故十名其餘各懷疑懼四散而去臣適接閲邸抄內兵部為欽奉上諭事九月初一日奉旨查康熙五十六年禁止南洋貿易案內經九卿議定嗣後如有出洋之人留在外國者該督撫行文外國將留下之人令其解回即行正法後經施世驃題請䝉聖祖仁皇帝特恩令康熙五十六年以前出洋之人俱載回原籍隨於五十九年內福建浙江等省奏報出洋回籍之人將及二千名嗣後則再無奏報回籍之事是五十六年以前出洋之人其願回籍者皆已陸續返棹而彼地存留不歸者皆甘心異域及五十六年以後偷往之人矣目今洋禁新開禁約不可不嚴以免內地民人飄流之漸其從前逗留外洋及違禁偷往之人不准回籍餘依議欽此恭繹諭旨嚴切明晰伏思該船舵水既係中國民人則其中或從前逗留彼地及近年方往其國俱難懸定雖伊等自洋開行在未奉旨之先似可仰邀免究但事關洋禁應仍咨督撫二臣聽其裁奪乃該地文武因未奉通行一任散去臣於接報之頃即飛飭沿海協營嚴行盤阻并加意撫恤聽候督撫裁奪外至陳宇押來船隻米石臣傳喚陳宇面詢據稱所押係該國王船隻米石俱巳壞爛現存些少并撈起貨物變價無多不足修船之用擬令財副柯晃赴省城向貢使取銀修船駕駛回國臣隨面商瓊州府給照差役伴送柯晃前去矣除俟該船修整完固駕駛開行回國日另摺具奏外緣係夷船飄泊到境擱破舵水人等散去情由合先繕摺奏聞伏乞皇上睿鑒施行謹奏此必係撫恤不周以致散去外國遠夷聞之成何體統應令將散去情由一一據實詳明該督撫著嚴行參奏似此違旨奉行不力之事萬不可揑飾疏縱以圖茍且完結特諭瓊州鎮總兵施廷專年少輕浮舉動乖張如縱容百總文秀搶奪番商月旺等船貨銀物毫無約束又縱容崖州把總陳竒才在瓊州城內姦淫民婦東排娘舊州娘又縱容鎮標兵丁洪吉王隆等乘䝉有章合婚之夕將有章夫婦捆縛搶奪槩不斤革查究各有詳案可據伏思瓊郡孤懸海外歷來民弱兵強全賴鎮臣加意防範不偏不黨庶使兵知法律民樂升平今施廷專不能撫恤窮黎一味養驕悍卒在地方絶無裨益在營伍日長澆凌今有人如是參奏汝之欵跡且不特此也更於他處訪聞汝囿於紈褲之習一味任性使氣袒護不法兵辨逞凶犯科將吏治民生竟視為膜外毫無顧惜似此負恩溺職曾未捫心一自問乎汝年甫離童稚䝉朕不次超擢委任封疆置於大臣之列者蓋念汝世受國恩必能繼汝先人之志斷不辜負主恩之故也豈料忍心害理至於斯極在他人不過止於不忠汝則更加一不孝之罪矣朕因汝年幼無知此次姑豫寬恕向後若不痛自改悔黽勉䇿勵仍然自以為是飾非怙惡則汝非施琅之後裔也揆之天理人情便加以重譴朕心亦無歉處愼之愼之大凡不可以告天之事莫為不可以對朕之念莫存公私須要辨明是非尤當認確能如此庶幾不失居官為人之根本否則朕一番望汝之心深屬可惜汝其謹志毋忽雍正七年八月十二日廣東瓊州總兵官臣施廷專謹奏為恭謝天恩事雍正七年七月十六日臣家人自京齎捧御賜平安丸五百丸到瓊臣即望闕叩頭謝恩祗受訖竊臣待罪海疆寸長未效䝉皇慈優渥賞賚頻加瓊州處在極南風土迥異內地我皇上賜以上方良藥臣推廣隆恩分給所屬水陸將士袪病回春取效如神海外兵民共邀平安之福皆皇仁所被也臣受此異數當益凜冰兢竭忠盡力并勵所屬將領恪供職守以冀仰酬高厚於萬一而巳為此具摺奏謝天恩伏乞睿鑒謹奏總兵誤用匪人貽害非淺豈此數丸藥力遂能令兵民共邀平安之福耶同日又奏為欽遵聖訓并繳硃批事竊臣前奏暹羅夷船擱破水手散去一摺䝉皇上硃批嚴諭查參仰見皇上軫念遠人之至意臣即嚴檄崖州營遊擊將不能撫恤致令散去情由從實揭報現據該營詳覆前來臣經呈咨督撫二臣聽候核參外至於文職應聽督撫嚴察題參其該夷船據報巳經修整完好雇添水手於此七月十六日開往廣省欲俟伊國貢使一同回暹合將遵奉諭旨緣由具摺奏覆併繳硃批謹奏不妥協處豈止此一事而巳也同日又奏為奏聞事雍正七年正月初七日據瓊州水師協副將呈報香山澳夷船戶月旺等駕船一隻欲往安南貿易於雍正六年十二月二十九日遭風飄至會同縣潭門港打破臣經通報督撫提臣并行該副將作速安頓撫恤去後嗣於二月十一日據該副將呈報兵丁吳超凡民人楊鍾秀等各赴營縣控訴搶奪番貨巳將該汛百總兵丁送縣審訊臣正俟該縣如何審覆間隨於十五日據夷人月旺赴臣具呈伊船撞損時衆人上岸搭伴何庇官自巳到百總處講話旺在海邊見有四隻小船從大船邊撑出內三隻往百總那邊去還有一隻有戴紅纓帽的人同何庇官在上旺船有縀八十匹銀器五百兩庇官只交縀八匹銀器五件餘都不見今懇乞究追小船搬去之貨等因臣查夷人詞內雖未指出營兵而按其情節何庇官明有串通百總情弊即移會道府行究去後而該副將亦先遣人往百總文秀家中查看有無寄匿番貨經遍搜無有文秀因抱憤抹頸賴在旁兵丁救起臣隨行令醫痊將該百總及吳超凡等十一人革除名糧解交有司嚴行研訊緣此案當時虛實未定是以臣前次摺內未敢冒昧具奏近接府覆巳經訊明追贓定擬通詳合將情節奏聞又本年八月初三日據水師協副將報有暹羅船主李萬受等奉伊國王命駕船載米三千石并壓艙蘇木等貨前往廣省貿易因南風之信巳過難以駕駛到省於閏七月三十日就文昌縣七里洋面灣泊現撥辨兵前往防護臣思該洋面非泊船之所即與道府面商如夷人欲開行往省則聽其便如願就瓊地貿易則須移泊內港以免風濤衝擊之患兹夷人現在雇倩小船剝起貨物俟船載稍輕方得駕入港內臣諭令營辨小心照看毋許姦棍誆騙騷擾以仰體我皇上柔遠至意再者瓊地各州縣風雨調順惟瓊山縣近城地方七月間雨水稍遲閏七月初甘霖即沛臣遣家人各處查勘田禾問之農民俱云無害今晚稻將巳成熟米價甚平黎岐安堵海疆寧謐合將情形具摺奏聞謹奏今巳調爾離瓊該鎮地方一切總與爾無涉矣硃批諭㫖卷一百二
