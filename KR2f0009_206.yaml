body:
  text: 欽定四庫全書硃批諭旨卷二百六硃批趙國麟奏摺雍正六年十二月十八日福建布政使臣趙國麟謹奏恭請皇上聖安朕安數千里外遣人齎奏身膺承宣之責地方上豈無應行奏聞事件而但呈進保薦人員一摺是何意見殊有大負任用光景諒將乾清宮面諭之旨盡遺忘矣否則彼時祗承遵奉之語皆係勉強偽從至今不能掩藏而真態畢露也似此初志不堅隨境改移豈朕期望於汝之意思之慎之雍正七年四月初二日福建布政使臣趙國麟謹奏為奏聞事竊臣一介寒微蒙皇上不次超擢畀以閩藩重任雖竭盡駑駘無能仰報隆恩於萬一臣自上年正月內跪聆聖訓後即束裝就道於五月十六日抵閩任事敬將乾清宮面承諭旨僃細傳與督臣髙其倬訖臣到任十日前撫臣朱綱隨亦來閩臣智短才疏初肩藩任惟懼隕越凡事與督撫二臣悉心商酌方敢舉行數月之後於地方事務始略知條理藩庫錢糧原無虧空所有雍正四年春秋二撥存剩銀內除準銷外尚有三十七萬餘兩先因兵餉那用不能年歸年款臣到任後節次歸補一十六萬三千七百兩有竒兹蒙欽差部堂臣史貽直盤查已將歸補現在之銀於本年三月初三日委員解部其未補者容續補完日另行報解各屬倉穀仰蒙皇上差前廣撫臣楊文乾等盤查清楚其未買補者業經委員分頭採買巳據報買八九分即可補足臣當不時稽查務使實貯在倉不令虛懸顆粒查州縣錢糧加耗從前輕重不等有加一至加一六七者臣稟請撫臣嚴行禁革概以加一徵收不許仍前重耗以舒民力上年仰蒙皇上截發江浙漕米共十萬石運閩接濟民食目下已經運到現在分發各屬平糶米價漸平民無艱食之虞戶有鼓腹之慶實由聖恩優渥之所致也臣賦性愚昧才力短淺惟有竭盡愚誠實心供職不敢怠惰偷安茍且塞責辜負皇恩自取罪戾伏望聖慈俯鑒臣愚教誨指示俾臣得有遵循免致隕越頂戴皇上生成大德於無既矣為此具摺奏聞伏祈睿鑒謹奏盡力屏除科甲朋比因循委靡袒護沽譽諸陋習朕所教誨指示者只此一語而已實能遵循免致隕越與否在汝自為之也同日又奏為敬陳一得之愚宣德化以整民俗事竊查閩省民風土俗喬野強悍不安本分不明倫理稍有拂意不顧尊卑長幼至親骨月即搆怨興訟捏小為大翻舊為新經年纍月不肯休息生監好為包訟婦女亦能寫呈且有以家無官司為懦弱可耻者好訟之風一至於此臣每弔查各案文卷從前地方官審理之事多有不清其根茍且完結又或一時視為小事後遂釀成大案民俗健訟而又加以聽訟者之怠惰草率此訟風之所以愈熾也臣蒞任數月後審知閩省積弊如此不自量其才德欲變易此惡俗督率屬下廣布聖諭實心教化先動其禮義廉耻之心冀其息事寧家至於來告者事無大小無不收閲隨準隨理勸諭開導除凶暴抑豪強懲刁誣歷年不結之案清其梁以及先賢祠宇雖未能盡息訟端而刁詐之風近來亦覺少減而下屬之勤惰才具之短長聽訟之公私因此亦得其槩如上杭縣知縣趙孔超之貪婪德化縣知縣繆燦之縱役皆審出實情即行聞謹奏姑試行看朕自有見聞同日又奏為端風俗以廣皇仁事竊查雍正六年三月初三日羅源縣孝子李盛山割肝救母一案欽奉上諭講明節孝常經覺牖庸愚至詳至切乃閩俗輕生之習猶未盡除婦人多以節烈相尚往往搭臺示衆慷慨投繯沽一時之名背中庸之理刲股行孝尚為聖世所不許况捐軀邀譽者乎臣到閩後訪知此風甚盛亟欲禁革適有民婦楊氏殉節一事控告到臣查楊氏係閩縣方廷蔭之妻甫婚兩日其夫廷蔭因不得於繼母盧氏赴水而死盧氏有將楊氏改配親子方廷賡之意伊弟盧得運將贊成之楊氏堅執不從又不能挽回姑意兩次赴水被救得蘇遂葬其前姑之柩搭臺自縊以殉焉其志實屬可嘉其迹猶循舊習臣訊得實情祭其墓以表揚節孝盧氏分尊姑免究問其子方廷賡暨弟盧得運皆分别枷責以為傷風敗俗者之戒因通飭各屬嚴行示禁如有搭臺殉節者責成鄉地查報究懲復廣宣諭旨務使僻壤荒村家喻戶曉俾愚民咸知孝子節婦之自有常道可行而保全生命之為正理以仰副我皇上矜全黎庶之至意理合繕摺奏聞謹奏循理遏情固係正道順情違理自屬反經要在汝等揆酌適中而行之朕不便輕發一偏之諭同日又奏為欽遵聖訓恭謝天恩事雍正七年三月十五日臣齎摺家人捧回臣恭請聖安奏摺奉有皇上硃批諭旨臣跪讀之下惶悚戰栗悔罪無地竊臣質本庸愚荷蒙聖恩擢至藩司於地方事務不知陳奏溺職負恩莫此為大今蒙皇上不即罷斥復誨諭諄諄宥臣既往之罪開臣自新之路雖天地生成大德父母撫育至情無以逾此臣惟有感激涕零痛改前愆勉圖後效以仰報皇上天髙地厚之恩於萬一耳臣不勝惶悚戰栗之至謹繕摺奏謝伏乞睿鑒謹奏若非真知改悔實力遵行但以數句空言奏覆不能挽回朕意遂釋前疑而信後效也勉之雍正八年九月初六日福建巡撫臣趙國麟謹奏為默誦聖訓感激難名自陳愚衷恭謝天恩事竊臣一介庸愚荷蒙皇上天恩畀以封疆重任昨恭請聖安跪聆聖訓反覆開導廣大精微剴切詳明巳無餘藴更蒙頒賜硃諭令臣默識臣恭閲默記銘心刻骨寤寐思服臣以至愚極陋之質蒙皇上望臣如此之大勉臣如此之切臣雖木石亦當感發奮興自勉自勵敢不以難昧之本心自反之愚衷敬陳於我皇上之前乎夫天下萬事皆以一心為本而人臣一心又以無欺為要然往往有自以為無欺而不知巳墮於欺者有時時事事求其不欺而猶難自信為無欺者此不可不辨也蓋人臣之欺不欺不徒問諸事而當問諸心且不徒問諸巳之心而當先明皇上之心何者皇上之心我心之矩則也皇上之心我心之主宰也不能以皇上之心為心則心無矩則而為私心不能以皇上之心為心則心無主宰而為放心私心放心皆欺心也何謂皇上之心臣竊以為我皇上以天地之心為心以列祖列聖之心為心故能無一時一事不以社稷蒼生為心且時時事事恐有一夫不獲其所為心此我皇上之心也人臣一時一事不以社稷蒼生為心不以恐有一夫不獲為心即非我皇上之心非我皇上之心非私心即放心矣天下斷無有以私心放心處事而猶得云無欺者臣所以謂往往有自以為無欺而不知巳墮於欺者此也然臣謂人臣即能時時事事以社稷蒼生為心無一夫不獲為心而猶未得即云無欺也何者我皇上社稷蒼生之心無一夫不獲之心大中至正如鑑空如衡平泛應曲當無意必無固我物來順應而且溥博淵泉時出不窮此又我皇上時時事事以社稷蒼生為心恐有一夫不獲為心之大本大源也人臣察理有一毫之未精則大本未窺猶屬私心去私有一毫之未盡則大源未得猶屬放心雖事或偶中可告無罪而求諸寤寐衾影之間欲其時時事事不踰乎距則主宰之中能自信為無欺而無愧者蓋亦難矣所謂有間之心不足以合天心也此臣於雍正四年初見聖時即以求不欺三字進對而至今幽獨自考實有難以快然自信者臣何敢自昧也夫上有堯舜之聖君以臯蘷望其臣為臣者何其幸然上有堯舜之聖君以臯蘷勉其臣為臣者又豈其易臣何人斯何敢自謂能勉也然臣不敢不勉也臣惟有主敬以持此心存誠以養此心窮理以明此心克巳以治此心操存於不睹不聞之先省察於臨事接物之際以仰副我皇上勉臣之至意耳所有感激微忱自反愚衷謹繕摺奏聞伏祈睿鑒謹奏果能言行相符不務虛名但求實際則於夲源庶幾不謬矣朕復為汝何慮同日又奏為奏聞事竊臣蒙皇上天恩賜臣摺匣四箇凡地方機宜事務臣自當詳悉密奏恭請聖訓指示遵行其摺稿皆臣親撰不敢假手旁人惟繕寫奏摺臣因素不工小楷又年近六旬眼花手拙字迹潦草疏縱恐涉不敬臣有幕友劉光煜係浙江山隂縣生員隨臣十年為人誠實謹愼臣處以密室凡有奏摺令其代臣敬謹繕寫可無疏漏之虞謹具摺奏聞伏祈睿鑒施行謹奏有無疏漏之虞干係在汝何必奏聞於朕耶雍正八年十一月十八日福建巡撫臣趙國麟謹奏竊惟屬員賢否關係政治民生亟宜時加區别臣蒙皇上天恩畀以封疆重寄自履任以來明察暗訪聽言觀行如各屬內有敗檢踰間者臣當據實糾參斷不敢少存瞻顧倘才足辦事而偶有過誤須開導教訓使其悛改教而不改然後去之庶無負皇上愛惜人才之至意今閩省廳縣各官臣尚未周知確切而司道府州已各得其大槩查布政使潘體豐辦事精勤才具亦長但心地不敢保其純淨恐內外不能如一操守未必能久而不變按察便李玉鋐精力尚健竭力留心案件以圖報效時有拘執處然尚可以開導轉移糧儲道張廷枚前任興泉道時人頗明白但欠老練今已出差辦銅俟其回任再留心試看興泉道朱叔權急於見才非海疆重地所宜巳勤加訓飭俟觀後效汀漳道章廷瑎年力正強有志向上而才情操守亦好可以造就延建邵道莊令翼辦事盡心立身不茍其才具平穩人地猶屬相宜臺灣道劉藩長才長守定能勝海疆之任鹽驛道楊𢎞緒才情頗好辦理鹽驛事務亦能盡心可以策勵之員福州府知府蘇本潔省會劇郡才能勝任惜病尚未全愈興化府知府張嗣昌謹飭有餘能約束屬員泉州府知府郭朝鼎才具老練實勝繁劇之任漳州府知府楊一正從前作縣才力頗能幹辦升府後志意稍縱辦事不及從前臺灣府知府倪象愷才力有餘操守亦好閲其詳稟甚能留心地方事務稽察屬員建寧府知府薑朝俊謹飭誠實之員建郡尚稱易治可以稱職邵武府知府任煥前委辦鹽務甚好今已出差辦銅其辦理知府事務尚未見其所長汀州府知府王士任老成歷練竭力辦事福寧州知州張秉綸人甚明白能辦理地方事務以上各員理合據實奏聞伏乞睿鑒謹奏覽奏俱悉仍當不時訪察加意體驗雍正九年三月十九日福建巡撫臣趙國麟謹奏竊照閩省田畝在山岡髙阜者多全賴雨水霑足今細查各屬所報雨水正月內或得六七次或得八九次不等二月內或得八九次至十二三次不等三月內亦得過五六次俱非連朝狂雨亦並無不得雨之州縣甚覺調勻大麥漸次登場小麥俱已秀實可必豐收民情喜悅早稻現在布種通省米價亦甚平賤上遊延建等府每石八錢以外下遊漳泉等府每石九錢以外省城每石自九錢四分至一兩以外不等其臺灣府自上年九月至冬底雨澤稀少至正月初三日已得時雨霑足米價每石八錢五六分惟糖價甚平白糖每百斤一兩六錢較上年減去一兩有餘烏糖每百斤五錢較上年減去七錢有餘臺地業糖者衆價值太低未免病民因去歲運蘇之糖堆積未消惟俟三四月間北船回臺可以起價謹將雨水米價情形僃細繕摺奏聞伏乞皇上睿鑒謹奏覽雨水米價情形知道了至云價低病民等語朕謂不足為病也惟願物物如是何也末也其害微也同日又奏竊照福建通省九府人情習俗惟漳泉二府地居邊海人多囂悍俗尚鬬爭而臺灣逺隔重洋民番雜處尤多頑劣易起謡言臣自到任後即發示勸民勉力遷善并嚴飭地方官加意稽查但人心風俗習染已深一時難以猝變如水師提標兵丁李才與顔漢因爭戲童角口遂成不解之仇上年三月間李才與龜嚴等三十餘人每人出銀一錢結媽姐會經泉同知訪拏枷責遞回原籍安插逮九月間又傳有李才等欲打造軍器搶掠出洋之語復經興泉道拏究審係李才前次被訪歸怨於顔漢所害欲糾衆謀殺顔漢以圖泄忿謀搶無據報仇是實已照律擬罪完結訖又上年十月二十三日夜臺灣兵丁於城內巡獲一人名周蘭清赤腳蒙被語言顚倒袴帶繫有帳簿紙單門牌等物腿上有布包內硃砂紙一條上書欽差對天新到六字紙背書欽定二字種種怪異及至究訊乃係癡癲之人並無别故隨經遞回原籍江西會昌縣安插收管在案又上年十二月十八日鳯山縣港東里地方有鋸匠陳勳入山尋看木料被生番殺死查係擅入番境以致被殺應俟拏獲凶犯究審定擬并查取失察職名歸於命案完結又今年正月間鳯山縣三叉河地方謡傳有鬍九倡言要搶新園街市等語經臺灣南路營獲交鳯山縣究訊鬍九因新造房屋宰豬請客並無為匪形迹節據該地方文武稟報細經查察係因今年糖賤無人貨買做糖工人口有怨言遂一時傳為抄搶之謡全無抄搶實據但鬍九夲非善類留臺恐致搖惑人心應驅逐解交原籍安插已經臣批行發落結案以上四事多因頑劣之民不忍小忿又或因形迹可疑一時好事者造為訛言乍聞殊覺駭聽詳察却無實據臣與督臣劉世明嚴飭該有司細心查究已各得其本情次第完結理合具摺奏聞伏乞皇上睿鑒謹奏但不遺漏細微逐見隨聞悉與處斷姦匪之徒具有耳目知汝等大吏如此留心稽查地方自當改行斂迹化有事為無事矣何至釀成大案慎勿因其小而忽之同日又奏竊查臺灣文武官員向無攜眷過臺之例汀州府知府王士任調往臺灣府伊隨任止有一妾正在新産之後內地無可寄頓將隱情面稟懇準攜帶臣以事屬違例未便許允去後嗣據管厦門汛口泉防同知報稱查驗過臺船內王士任帶有家眷臣即就商督臣劉世明回稱此係臣子私情當為奏明今問督臣劉世明云已經具摺奏聞伏候聖裁為此謹奏曾經有旨批諭督臣劉世明矣同日又奏為議奏事竊照福建按察使李玉鋐條奏閩省倉榖應改歸糧儲道管理一摺奉硃批此事應言之督撫會商酌定具題請旨將所奏并朕批諭與督撫二臣看欽此隨據該司鈔録奏摺批諭與臣等觀看據李玉鋐奏稱閩省捐積常平等倉各榖通計共一百三十餘萬石總滙於藩司藩司職掌全省賦役精力終難專一查閩省糧儲道管理通省兵糧十二萬八千一百餘石事務甚簡可否仰請聖裁將閩省各府州縣捐積常平等倉所貯榖石照雲南之例著糧儲道管理凡一應盤查交代册報考成悉令糧儲道專司其事該道猶可不時親詣各府縣抽盤查核每年奏銷册籍仍照兵糧之例造送藩司彚轉等語臣查閩省監積等榖自雍正五年間欽差盤查以後徹底澄清現今廳縣倉穀責成府州察盤府州倉穀責成本管道員察盤每年各親往所屬盤查一次如有虧缺黴變立即揭報如實貯好穀出結申送藩司核轉是藩司職掌雖煩而倉穀頭緒既清又各有責成專管藩司攬總稽核尚屬易事可以一併兼理至糧儲道只管通省兵糧事務雖簡但地方遼濶各府州倉穀必不能遍歷盤查勢必仍委本管道員而糧儲道不能統轄各道恐多呼應不靈若事事詳請督撫轉飭又未免遲緩况每年察盤奏銷册籍仍須照兵糧之例送藩司彚轉與各道府徑送藩司核轉無異臣與督臣劉世明細加商酌與其紛更而無益於倉儲不如照舊歸藩司統攝為便臣仍不時稽察如有扶同徇隱之弊據實糾參是否有當謹繕摺具奏伏乞聖主睿裁謹奏所議是照舊仍歸藩司統攝可也雍正九年四月二十九日福建巡撫臣趙國麟謹奏為敬陳管見仰祈睿鑒事竊臣查各省兵餉其離省窵逺之營汛俱有就近州縣撥給之例如臣前任直隸河南皆是如此今閩省各提鎮標協兵餉無論逺近俱赴藩庫支領就中惟汀州一府所當獨為變通查汀郡距省一千一百餘里山髙道逺腳費煩重解餉領餉多由水路其所經清流縣之九灘髙低數丈水勢懸奔又轉折於峭石之間為閩中第一險灘凡餉銀在船銀鞘之上必用長繩繫板僃作浮標以防不虞兵役起遵山徑過此登舟一解一領殊覺萬難臣查汀州八縣歲解司庫地丁正雜銀十二萬三千有竒汀州鎮三營歲需餉乾銀五萬五千有竒若扣存本府之歲供以給夲鎮之兵餉事屬兩便每年由藩司查明該鎮應領餉數勻派各縣徑解汀府貯庫聽三營赴府支領同知監放其三營餉領與各縣解府銀批預期申送院司衙門查核挂發仍將該年各縣派解府庫數目咨部存案至撥過餘剩地丁仍解司庫每年奏銷藩司仍照舊例造報一轉移間既省各縣數次解餉之煩而汀鎮領餉事宜亦覺便易臣愚昧所見是否可行理合繕摺具奏伏乞皇上批示遵行謹奏據奏各省兵餉離省逺者有於就近州縣撥給之例等語錢糧不由藩庫給發該營汛徑從地方官支領殊為朕所罕聞此事大有關係當與督臣劉世明詳加斟酌非可一時示德沽譽草率舉行之務也雍正九年八月二十二日福建巡撫臣趙國麟謹奏雍正九年七月初九日臣齎摺家人回閩恭捧臣奏請汀州鎮兵餉改就汀郡地丁支放一摺至署奉有硃批諭旨臣跪讀之下仰見睿慮周詳聖謨宏逺海疆重鎮餉權歸下關係誠為甚大蒙皇上一言指示臣恍然自悟覺所見之小止計一時之便而非永久無弊之規誠有不可行者前奏甚屬草率謹遵旨與督臣劉世明詳加斟酌劉世明云汀州在閩肘外恐一時錢糧徵輸不及再為請領支撥往返需時未免生出事端等語是汀餉仍應照舊赴藩庫支領成規久定兵習吏安無事更張但當嚴飭小心管解毋致疏虞無庸改為就近撥給理合繕摺覆奏伏乞皇上睿鑒謹奏封疆大臣一舉一動當詳愼是務據云被朕指示方恍然自悟設或朕亦草率允行則將如之何諸事咸似此任意更張其不至朕前案件錯謬者不知凡幾矣實代汝慮之當自知才具不及虛心訪問廣咨博採猶可勤以補拙倘稍恃已見恐同寅及屬員中未必有夲諸天良提撕警覺令汝恍然自悟之人也一切處小心謹愼為之將此諭轉傳督臣兩司暨阿爾賽皆令知悉雍正九年十一月初四日福建巡撫臣趙國麟謹奏竊臣蒙聖心時賜訓謨俾有遵循臣之萬幸矣謹將奉到訓旨緣由繕摺奏謝伏乞皇上睿鑒謹奏覽雍正十年正月二十六日福建巡撫臣趙國麟謹奏雍正九年十二月十六日準廣東撫臣鄂彌達咨稱海陽縣訪獲陳阿幼等結黨歃血拜盟一案審訊余道老供出同黨黃五舍江歆黃烏皮三人係福建詔安縣人均屬要犯嚴拏移解過粵究審等因到臣臣查黃五舍即黃必顯係從前奉旨發出廣東觀風使臣焦祈年摺奏內查拏之犯現禁福建省城臣即差辨員押解廣東督撫衙門收審外仍飛檄漳州府併詔安縣文武官辨會同密拏江歆黃烏皮二犯就近解粵續據詔安縣詳稱黃烏皮即黃純夫已病故四五年今止有黃加皮耕田度活江歆又無其人查止有江蔭江興字音不同而江蔭又久成癱瘓之疾等語除將黃加皮江興飭司看守一面咨覆粵省訊取余道老等確供是否即此二人應否解質俟覆到定奪外理合奏聞伏乞皇上睿鑒謹奏凡遇此等案件絲毫毋得疏忽只圖易結草率辦理萬萬不可務須竭心盡力徹底窮究方不致有疏漏志之雍正十年三月十七日福建巡撫臣趙國麟謹奏竊查臣屬司道府各官賢否除前巳奏明不復重敘外所有出差回任及新到受事又加察看得實者理合具摺奏聞查按察使劉藩長操守清廉爽直不欺辦理案件亦勤但刑名尚未熟諳多有過寬處臣現在與之講究自能臻於中正糧儲道張廷枚自辦銅回任以來察其辦事勤慎才有可觀而操守亦正興泉道朱叔權近來服官漸已老成辦事亦能詳慎現在辦銅俟回任再加試看福州府知府高元崑辦事練達克副首郡之任興化府知府蘇本潔原係才能之員因其有病調任簡缺今已痊愈現在差委辦銅泉州府知府孫魯老成練逹但於泉郡最要之缺稍有不勝今荷皇上聖明仍調為汀州原任業已人地相宜延平府知府王輅到任未久居官頗好現在辦銅俟回任再觀後效邵武府知府任煥辦銅甫經回任觀其辦事誠實克稱厥職為此謹奏知人則哲非易事也豈可自信所見言其必然須當隨時隨事訪察方不被屬員欺誑同日又奏為奏聞事雍正九年十二月二十四日臺灣北路營地方大甲西社番突集番衆殺傷兵役已將事發奔逃之淡防同知張𢎞章會疏題參在案適鎮臣呂瑞麟遊巡至彼聞變即駐兵半線地方調度擒拏臣隨與督臣劉世明熟商飛檄臺灣文武各員相機勦撫兹據陸續報稱正月十七日率兵擒拏逆勢不支遁入大山恃險抗拒二月初二日進山𠞰捕焚其寮穴積貯二月二十日鎮臣呂瑞麟親自率兵巡哨凶番仍潛伏肆拒又逼勒大甲東等社助伊為逆等因如此小醜為日已久未得𠞰除盡淨者乃緣山勢險阻深林密箐我師不能深入久留之故今呂瑞麟現集兵辨約有四千分道圍困用計進取兼欲調用水沙連社番為內應此雖以番攻番之計但番心叵測稍不得心應手恐反無益有損所以臣與督臣劉世明商同檄止之矣臣因逺隔重洋聞信每在兼旬之後行軍機宜隨時不同未便遙制掣肘巳諄囑巡臺二御史臣相機熟籌而行臣與督臣仍一面飛探確音會同參酌務出萬全所有現在情形合先具摺奏聞謹奏將此摺附於請安函內而函面標題奏摺二件亦可謂不達禮體不敬之至矣同日又奏竊查福州府倉有前任革職知府胡承謀黴變攙雜穀十二萬七千餘石經從前欽差廣東撫臣楊文乾查參著落胡承謀名下易換好穀還倉逮後數年未據領換黴爛日甚若再不及早料理倉儲終無彌補之日臣到任後即將設法變糶等因具摺奏聞奉有硃批諭旨臣隨咨商同城文武各官并傳同胡承謀之子胡先揚公同試驗因此穀黴變已久碾米不足成數核算得黴米一石三斗方抵好米一石議定照此數折算發糶今已陸續糶賣並搭放兵米完訖其價銀現在貯庫俟今歲早晚二禾登場之候委員領銀押同胡先揚到鄰近豐收地方採買好穀還倉如買補不敷原黴穀石著落胡先揚并毛文銓各名下照數追賠除銀穀細數另咨戶部查核外理合先將變糶完竣緣由具摺奏聞謹奏此事當速行料理者乃遲延至今料胡承謀父子業將所有宦資隱匿無蹤矣而毛文銓又應賠之項甚多坐落於伊名下有何裨益耶雍正十年四月十九日福建巡撫臣趙國麟謹奏竊查閩省春間雨水調勻業經臣具摺奏聞目下正值布種稻秧之時又連得透雨田水霑足可以及時布種民情甚為歡悅通省二麥現在豐熟漸次登場近據漳泉二府屬縣報稱二麥俱有十分收成民食大有接濟是以通省米價不致騰踴其收成分數容報齊另摺彚奏至臣前豫籌青黃不接之計因通飭勸諭有餘穀之家暫為積貯留至夏間發糶今據各府陸續報到通共勸貯穀四十餘萬石將來隨時通融平糶可無欠缺之虞再四月初五日省城內外十餘里之地雷雨之中帶有冰雹外郡龍溪福安二縣據報亦微有冰雹俱於田苖農事全無妨礙所有三月以來雨水麥收米價情形理合具摺奏聞上慰聖懷謹奏據奏閩省雨水霑足二麥豐熟米價甚平朕心深為慰悅雍正十年五月初二日福建巡撫臣趙國麟謹奏竊查閩省採辦銅斤向買洋商現銅部價之外尚須幫貼銀三千餘兩雍正八年上運銅斤委糧儲道張廷枚承辦當發部價四萬一百九十三兩零又給公費項下幫貼銀三千五百兩因是年蘇州無現銅可買該道募商出洋採辦以致有誤起解例限奉文議處旋即辦齊解部交完掣批在案今據張廷枚詳稱承辦八年上運銅斤共領價貼銀四萬三千六百九十三兩零因銅斤不能按期交納價值可以節省現在餘剩銀四千六百六十七兩零據實詳報到臣臣查泉州府治城垣雍正七年五月內蒙皇上俞旨將董永芠婪贓家資解往修理欽遵在案迄今止準部咨坐扣銀三百六十八兩零不敷費用再漳州府城垣該府張嗣昌現在竭力設法興修但工程重大力量不繼又福清閩清二縣城垣亦有殘缺之處經藩司確估詳請尚在無項可動仰懇皇上天恩將此節省四千六百六十七兩零又張廷枚九年米折盈餘一千三百十九兩零並李玉鋐八年米折盈餘一千六百二兩零共七千五百八十八兩零俯準動支修理數處城垣之費容臣漸次料理報竣臣因城垣為濱海地方緊要公事現有節省銀兩若不及早修理日久更覺費力是以冒昧奏請伏乞皇上睿鑒謹奏所奏是應動支修理者雍正十年五月二十五日福建巡撫臣趙國麟謹奏為恭報臺灣南北二路安定情形事竊照大甲西番作歹經臺灣鎮臣呂瑞麟同臺灣道倪象愷帶領兵壯𠞰撫兼行已將脅從之朴仔籬等社先後就撫續有鳯山縣南路姦民乘機聚衆殺傷官兵經升任陸路提臣王郡親率辨兵𠞰逐解散經臣具奏在案今南路姦匪陸續拏獲究審現在嚴緝首犯吳福生等到日即可定案所被焚搶之居民亦現在行查撫恤不致失所其大甲西番亦向鎮道具呈投訴起釁之因乞憐全命向後不敢作歹願為聖世良番等語當有土官率領全社男婦老幼四百十九名造册就撫現在一面安頓一面查訊實情究出首凶定擬仍於各莊緊要之處安兵防護俟耕種收成之後掣回外所有南北兩路安定情形相應具奏以慰聖懷謹奏覽奏臺郡南北二路安定情形朕顧慮之念釋矣同日又奏竊照閩省仰沭皇上福庇二麥豐收據各屬陸續報到收成分數泉漳二府十分者居八八九分者居二福興二府福寧一州十分者居六八九分者居四延建邵汀四府廣種稻穀二麥稀少亦皆有七八分收成值此青黃不接之時民食大有接濟上遊春間雨水稍多無礙自四月至今通省雨暘時若早禾茂盛可期大有臺灣向不種麥四月間亦連得透雨禾苗俱已布種各府米價照常理合繕摺奏聞上慰聖懷伏祈睿鑒謹奏覽麥收分數并早禾雨水情形不禁額手為閩民稱慶也雍正十年閏五月二十四日福建巡撫臣趙國麟謹奏本年五月十二日臣準禮部咨議覆湖北撫臣王士俊條奏各省鄉試外簾五所停委夲省佐二等官即將掣得內簾所餘之進士舉人留用并將各省學習進士與調取鄰省之進士舉人一體分掣內外簾官等因臣查鄉試內簾考官關係綦重向於聞調之日即應回避不見親友沿途遣官押送以防弊竇今學習進士究與現任官不同焉保其平日無與本省士子認識往來之事臣準咨之日即將在臣衙門學習進士五名加謹關防並飭行布按二司一體收入內署愼密居住外但嗣後若永以為例恐日久弊生在學習進士等自以為將來必作考官而不肖士子亦知此輩為必操衡文之柄豫先夤緣亦未可定科場為取士大典杜弊之法不可不嚴請皇上特降諭旨嗣後各省學習進士止令其作外簾五所之用不必與外省調來之進士舉人同掣內外簾官其外省應調之進士舉人仍照雍正五年奉上諭議定之數調取一轉移間於科場不無少補理合具摺奏請伏乞皇上睿鑒施行謹奏防間學習進士所論固屬有理然今歲係創行之初何暇夤緣自各奉法惟謹況掣簽後始分內外似難預作弊竇場期在邇不便更張俟鄉試之後或於今冬明春具疏題請發該部確議再定雍正十年七月二十九日福建巡撫臣趙國麟謹奏竊閩省自春夏以來雨暘時若二麥之後早稻又得豐收此皆仰荷我皇上敬天勤民精誠感格所致兹於六月間福寧州地方及福州府屬之連江羅源二縣沿海田畝因濕熱薰蒸有數處忽生小蟲細如蟣虱或白或緑或在苗葉或生根內早稻成熟無礙晚禾恐有損傷臣聞報飛即差員協同地方官竭力設法捕除一面虔誠建醮祈禱幸賴聖主福庇未幾即得連朝風雨蟲自消滅並為雨水蕩滌罄盡禾苖黃者復青萎者尚可補種且一邑之中不過數處一處之內不過數丘並無妨害上遊雨水頗多溪流亦大但隨長隨消地方安堵米價平減理合一並奏明上慰聖懷謹奏蟲不為災雨不致潦乃轉歉為豐之徵也朕懷曷勝欣慰雍正十年九月十三日福建巡撫臣趙國麟謹奏竊臣於八月初六日入闈監臨凡場中一應事宜敬謹辦理其提調監試暨供事文武員辨皆實心勤愼稽察謹嚴三場肅靜毫無弊端二十二日接到禮部咨奉旨曉諭考官所拔之文務令雅正清真理法兼僃雖尺幅不拘一律而支蔓浮夸之言所當屛去特諭欽此臣即轉行內簾主考同考各官遵照俱各歡欣踴躍愈加敬愼較閲精細選拔至九月初十日始克竣事揭曉榜發之後多積學單寒之士衆論咸孚此皆我皇上道隆德盛人文化成實學昌明故士子皆能和其聲以鳴國家之盛閩省如此天下可知臣不勝踴躍歡忭之至謹奏覽奏知道了大凡務虛文者動輒落於浮夸不實之咎豈可以一省而概論天下耶汝言過矣夫誠乃文章之本吏治即文章之體未有離本捨體而更有文章也此等虛偽習氣皆緣薰陶漸染久不自覺又未經人勘破書生輩惟知尋章摘句而已本體何由而悟無怪乎天下真儒寥寥竟將文章一道幾類二氏之教像語言若似乎與誠相背與吏治為無涉之物矣豈先聖往哲立言垂教之意哉非朕於一言數字之間過於苛細搜求蓋防微杜漸恐汝循此溪徑酬應事務流而不返終無實際故從而提撕警覺俾一歸於誠而不涉於虛加勉吏治而不崇尚浮夸之意耳毋得錯會雍正十一年六月初四日福建總督臣郝玉麟福建巡撫臣趙國麟謹奏竊照閩省二麥豐收雨水霑足臣等已經奏聞在案自四月迄今通省雨暘時若早稻暢茂目下現在成熟較往年更覺豐稔據近省各屬報到有十分之數仰蒙皇上福庇俾海疆屢慶豐年民情不勝歡欣感激其收成細數容俟全屬報齊另奏外謹將早稻豐收大槩情形先繕摺奏聞伏乞皇上睿鑒謹奏覽奏早稻成熟海疆黎庶深有賴矣不禁以手加額望閩欣慶雍正十二年三月初一日福建總督臣郝玉麟巡撫臣趙國麟謹奏為請旨事泉州府海防同知胡宗文自雍正九年六月到任以來辦事勤敏稽查海洋出入船隻實屬盡心又能與提標五營將辨和衷共事因伊母年餘九旬老病龍鍾不能迎養該同知思母情切上年秋間具詳請休臣等以厦門海口要缺不易得此熟悉事宜之幹員是以不允其請今接署提督將軍臣阿爾賽札知該同知思念伊母情甚迫切若能到家一看心可稍慰等語是該同知思母至情未嘗少釋欲使專心辦事難以遏抑其情臣等查胡宗文係江西金溪縣人距閩不逺若給假三箇月到籍省視即便回任其泉州同知印務暫行委員代理不用交盤於公事不至貽誤而該同知母子至情得以稍慰感激天恩愈圖黽勉供職矣但外官無告假省親之例理合具摺奏聞洪恩出自皇上非臣等所敢擅請伏乞睿鑒批示遵行謹奏覽奏巳悉候另有諭旨同日又奏為實陳冒荒積弊恭請聖訓事竊照勸諭墾荒一案仰蒙皇上天恩新墾者分别水旱寬其升科之限隱匿者準令自首立有免罪之條浩蕩恩綸百姓感戴踴躍首報臣到閩後辦理過自首並勸墾田地六百一十頃零又臺灣田園一百七十五甲零俱經題報在案今查有建寧府屬之建陽一縣其錢糧缺額緣由獨與各屬之欺隱在民者不同查該縣於康熙元年十七年兩次報荒共免銀一萬一千六百餘兩米一千三百七十餘石除實在荒田應免外內有乘機揑報荒田冒免銀五千八十餘兩米六百二十餘石乃當時官吏作弊多開冒免欺隱全不在民至康熙二十五年知縣李六成恐致敗露始將此冒免銀米二項勻入有田之戶每田二十畝勻減銀二錢三分二釐米一升五合名曰勻荒在當時以為官吏脫侵帑之罪百姓沐減賦之恩而不知正供有虧百姓實負冒免之愆迄今垂五十年田更數主愚民罔識從前流弊竟視現今減少之數為向來一定之額矣今臣既經查出欲照現今自首之例令民首報實無原荒可首之田惟有速令將現在田畝照從前勻減之數每畝加增使復原額庶國課無虧科則不紊民亦何辭但通縣糧户久輸私減輕糧一旦驟復原額力有不支咸具呈籲請寬限臣查該縣歲徵額銀止三萬五千餘兩若將此勻荒銀五千八十餘兩一年全復細察民隱艱難似屬實情可否仰邀皇上天恩準令該縣糧民將冒免銀米自雍正十二年為始在於限年墾復案內分作三年報升照數復還全額臣大書告示宣播皇恩數十載冒免負罪之民盡沭皇上如天之德矣至從前冒免之官民歷年久逺物換人非查其卷案盡皆散失可否無容追究抑或容臣具夲題參求皇上特旨從寬洪恩出自皇上臣謹會同總督臣郝玉麟據實奏請伏乞皇上恩賜批示遵行謹奏冒荒隱賦至如許之多誠為積弊雖云年久物換人非既經查出豈可糢糊了結自應具疏題請照增復額將始而捏報繼而勻減及歷任失察各員一併詳參候朕另降諭旨寬免處分方屬合宜但此意不可預為宣露也雍正十二年四月初八日福建巡撫臣趙國麟謹奏竊惟臣之事君凡家務瑣屑本不當輕瀆聖聰但以現任官而與屬員聯姻又不敢不為據實奏明臣大小親屬十餘口俱在閩署兒女長成婚姻之事在籍無人料理布政使劉藩長雖籍係山西現今家在山東濟南府洛口居住與臣家相去一百餘里今春因將臣女許與劉藩長之子為室至一切公事臣仍秉公辦理留心考核稽察以盡職守斷不敢因聯姻婭徇私廢公稍存瞻顧黨比之心有負皇上委任之隆恩也為此恭摺奏聞謹奏聯姻何妨但須防嫌别微纖毫不被人檢點方為善處親戚之間也雍正十二年九月二十五日福建巡撫臣趙國麟謹奏閩省百姓仰賴皇上洪庥連歲雨暘時若今年早稻豐收分數巳會同督臣郝玉麟繕摺奏聞兹八九月內連得時雨臣因公出郊隨便查看晚禾靑蔥遍野暢茂可觀疉據各縣稟報雨水亦極霑足禾苗俱各秀發民情歡慶米價照前每石九錢至一兩零數分不等並不髙昻臺灣地方亦據報稱七八月內得過透雨數次田禾雜糧均屬有濟理合將近日雨水晚禾情形奏聞以慰聖懷伏祈皇上睿鑒謹奏覽全閩雨暘調順晚禾暢茂情形遙顧海疆曷勝慰悅雍正十三年五月十五日安慶巡撫臣趙國麟謹奏竊臣到任兩月細查通省吏治經督臣趙𢎞恩整頓年餘各有條理臣當依其綱領節目相助有成至有應行損益事宜臣詳細斟酌隨時具奏查臣衙門設有各項效用人役共八十餘名內有馬兵撥充者三十七名步戰兵撥充者十七名守兵撥充者十一名俱係兩營將官選送在轅伺候差遣遂不隸營管轄亦不隨營操演歷任相沿已久但臣標兩營額設馬步守兵七百七十四名除營員親丁公糧一百二十四名外只實存營六百五十名若再撥充轅役六十五名未免營伍單薄且不隨營操演技藝亦多生疏今臣逐一考驗悉令歸營以實軍伍內有老弱及技藝不堪者革退另補而效用人役另行召募以僃差遣庶營無曠伍之兵轅無冒餉之役與營伍實有裨益再司庫錢糧並歷年積欠現在逐一稽察理合一並具摺奏聞伏祈皇上睿鑒謹奏覽奏知道了巡撫身膺封疆重寄武僃為第一要政若漫不經心訓練無術及或自諉於不諳即屬有忝厥職至於錢穀刑名案件尤當精勤察核期於弊絶風清勉之同日又奏竊照蝗蝻生發民瘼攸關臣四月到任之初即嚴飭各地方官於草澤低窪之處預先留心防範嗣據霍邱縣報稱該縣姚家草場併八里塘兩處有蝗蝻生發泗州報稱該州重岡山併臨淮集生蝻如席及桌大小不等旴𣅿縣報稱該縣磚壩地方生蝻如席大三五處靈璧縣報稱該縣閻家橋胡家莊雅廟臺青莊湖等處各生蝻零星不成片段臣即飛飭各文武員辨作速撲捕去後今據霍邱等四州縣俱結報立即撲捕淨盡無遺並無傷損禾稼恐厪聖懷理合具摺奏聞謹奏僃禦蝗災惟有盡力撲捕使之消滅而已别無良法朕歷諭甚晰諒汝自必稔聞也倘若稍涉懈慢致令生翅飛騰則貽患不淺愼之毋忽雍正十三年六月十九日安慶巡撫臣趙國麟謹奏為奏聞雨澤事竊照安慶地方自五月十三日以後一月無雨臣於六月初九日虔誠步禱祈求曾經奏明在案自六月初十以來日有雨澤皆逺在四郊之外至十七日午時起雷雨大作歷未申酉三時查四郊得雨三四寸不等皆已霑足再查通省得雨各州縣據報自六月初二三四及初十等日亦有得雨霑足亦有得雨一二寸及三四五寸不等其中尚有未將得雨時日報到之處臣查上江早稻已將收完其有陂塘潮潤之處全無損傷惟山田缺雨之處收成稍減至中晚二稻中稻種植甚少適當少雨之時不無減損晚稻正在秀茂得雨滋潤甚屬有益目下天氣氤氳尚有雨澤之象除現在飛查外理合先將近日得雨情形具摺奏聞伏祈皇上睿鑒謹奏覽奏得雨地方尚屬多寡不齊夫應天以實不以文修省宜誠不宜偽察士庶之豪強害民者抑而懲之摘牧令之闒茸玷職者斥而去之檢政刑之寬嚴失當者舉而更張之能使輿情順於下自必天和感於上不此之務而惟祈禱是恃無怪乎杳然弗驗也同日又奏為奏聞事夲年五月二十七日據桐城縣舉人方道章等告錢洛訪陳覲文等冒塜盜葬藐法抗斷等情具呈到臣臣行縣弔閲原卷查係雍正三年間方姓有道官山三百餘年之祖墳被錢洛訪冒任已祖竪立新碑陳子竒亦認己祖盜葬兩塜而錢陳兩姓又稱實係伊等祖墓彼此訐告不休至雍正八年始經知縣倪大成察訪勘審閲方姓宗譜印契有憑錢陳兩家毫無確據隨斷錢去碑斷陳遷塜在案臣思案經十年斷而不遵今又具控到臣非係該縣從前審勘不公必係山界有相錯不清之處隨委桐城令汪振甲同試用官王朴前去查勘繪圖送閲忽錢陳兩族及事外之吳大桂王天次等率衆攔阻不許該縣勘繪拋擲石塊擒毆方姓之人復擲毁該縣汪振甲之帽不法已極正在飭府拏究又據報六月十六日棍徒粘帖罷市凡近陳子竒住居街道鋪面皆驚恐關閉查上江風習動輒聚衆行凶粘帖罷市目無法紀實為地方風俗人心之害非嚴加懲治不足以消頑悍之習臣現在檄飭按察使劉柏嚴拏為首之人究審按擬另題外理合先具摺奏聞伏祈皇上睿鑒謹奏抗官藐法之習自應徹底窮究盡法懲治豈可一日姑容但須虛公訊鞫務得其情倘該令徇私納賄有以激成亦當嚴參示懲勿因恐長刁風一語遂置貪官汚吏於不問而使百姓含寃莫雪也此諭亦令趙𢎞恩知之雍正十三年七月初三日安慶巡撫臣趙國麟謹奏為恭報雨澤事竊照安屬已未得雨情形臣於六月十九日奏聞在案今安慶府城六月十七日得雨以後今二十九日又得甘霖大沛歷巳午二時四郊霑足再查通省州縣自六月十一十七八二十三四二十七二十九等日有得雨一次二次三次者共五十三處其六月初十以前已經得雨之各州縣今又據報有得雨霑足亦有報得雨一二寸及三四五六寸不等又前奏未報得雨州縣今據陸續報到有連得大雨霑足者有得雨一二次及一二寸至五六寸不等者惟來安一縣曾否得雨尚未報到現在飭查其得雨稍遲及未甚透足之處中稻未免枯稿臣已行布政司飭縣勸民改種蕎麥雜糧其牛力籽粒不足者動公項助給今七月初三日又得隂雲密布細雨霑濡將來雨澤似尚可望通省米價照前平減不昻相應一併具摺奏聞伏祈皇上睿鑒謹奏前摺所批省身心察吏治明刑愼罰除暴安良等諭最為切要汝曾身體力行否耶抑或視為具文虛應故事耶不然何以雨暘至今尚未時若也敬之勉之同日又奏為奏聞事竊照上江地方山深谷邃多有藏匿私鑄錢文之處臣到任嚴行通飭查拏在案今訪有池州府屬銅陵縣之大通鎮等處竟有棍徒私鑄小錢販往湖廣江西發賣又據按察使劉柏密稟前來臣現在密行該地方文武官辨前往嚴拏務獲究出同夥窩販從重究擬併密咨湖廣江西二省一體查拏外理合先具摺奏聞伏祈皇上睿鑒謹奏嚴拏究懲纎毫毋涉疏縱硃批諭旨卷二百六
