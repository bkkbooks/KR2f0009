body:
  text: 欽定四庫全書硃批諭旨卷二百五上硃批髙斌奏摺雍正四年二月二十一日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事臣於本年二月十二日同巡撫臣張楷到滸墅關衙門遵將皇上嚴旨傳與胡鳳翬胡鳳翬免冠伏地叩首臣到任數日看胡鳳翬織造稅關所辦之事寬緊失宜商民匠役頗有怨聲而辦理稅關事務尚襲漏弊鳳翬向臣言蒙皇土洪恩自已費用不敢奢侈折福亦不敢矯情自苦一年差滿除正額錢糧外并給發稅關人役工食起解加平飯錢等項及臣所辦差使自用盤費將恩宥臣不勝恐懼之至謹奏若果實力報效毫無隱飾朕自有鑒照勉之雍正四年四月初八日蘇州織造兼滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查得江蘇地方三月內雨暘時若在田早麥秀實轉瞬豐收小麥蠶豆滋長發榮指日成熟兆民均戴皇上仁育萬物嵗稔時和市上米價白米每石一兩一錢次白米每石九錢六分麥價每石七錢五分所有雨水米價及民間安阜情形理合繕摺奏開謹奏覽奏雨暘時若米價平減朕惟以手加額耳但一切奏聞之事總須據實萬不可絲毫涉於粉飾欺蔽雍正四年六月初十日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查得江蘇地方五月內在田小麥收穫俱完農家正望雨澤插蒔禾苖於初十至二十八等日連得大雨髙下田疇及時播種四野歡呼市上米價平減白米每石一兩零五分次白米每石九錢二分麥價每石七錢六月初一日起黴雨仍連綿不止至初四日大雨河流平岸低田新苖水淹撫臣張楷同臣及蘇城文武各員齋戒祈晴初九日午刻始行晴霽水漸平退農事無妨秋成可望理合繕摺奏聞謹奏知道了直隸地方亦於四月盡間霖雨不止二麥幾至被潦幸即晴霽所以無妨河南山東山西并直隸四省春麥俱獲豐收實屬上天之洪慈廣覆也雍正四年九月初二日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查得江蘇地方今嵗髙下田疇滿擬十分收穫因八月內隂雨連綿河水漸長平岸低窪墟田淹浸將來收成分數減少其髙阜田畝亦緣隂雨過多將來收成略減一二分幸於二十九日已慶開霽今年節氣尚早目下才過秋分仰賴皇上洪福從此晴霽仍可期望豐登市上白米每石價銀九錢八分次白米八錢八分麥價每石七錢所有八月晴雨日期米麥價值謹據實繕摺奏聞謹奏朕正為江蘇雨水憂慮今覽爾此奏稍寬慰矣雍正四年十月初九日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為據實奏聞仰祈睿鑒事竊臣一介庸愚辦事生疏蒙皇上特恩超擢兼理滸墅關稅務到任以來唯圖上報天恩凡於國課商民兩有禆益之事儘力次苐舉行數月以來商衆頗稱便利今有梁頭船户貼匿名詞帖詆毁臣者臣不敢欺隱謹據實陳奏查滸墅關有邵伯鎮江二處梁頭大船撑梁頭者本是船户並非客商專裝豆貨名為加補料部定則例一丈八尺梁頭納料六十七兩三錢裝豆二千九百八十二石計算每石徵銀二分六釐如所裝有逾此數按石另補鈔銀名為外加船户日久弊生將船隻改造長大竟可裝三千五六百石至四千石不等者臣於到任之後察知其弊逐船簽量有比所報多豆三五百石不等者臣將量出豆貨遵照部定則例丈八梁頭納料六十七兩三錢除去應裝豆石外其多餘之豆照例每石二分六釐按數加補俱彚入庫內是既與部定則例相符而此項船隻仍準其通行無阻乃梁頭船户不得遂其所欲竟刋貼匿名詞帖詆毁以泄私忿臣職分當為之事茍有益於國課商民自甘任怨不辭但有此一事是臣不能善於料理致生毁謗若不奏明有干欺隱之罪為此瀝情冒瀆聖聰併將帖內事由另摺僃述與所貼匿名原帖一併密呈聖覽伏乞皇上恩賜矜全憫臣愚昧聖訓批示使臣知所遵守臣不勝恐懼懇恩之至謹奏大凡於心無愧之事不必恐懼匿名揭帖類斯刁風何足為憑若返躬自問有歉則不可固執亟應改革果如所奏秉公執正而行刁頑之輩自不能遂其所欲然必須商民實能受益方好同日又奏為奏聞事臣因江寧織造曹俯解運進京臣理合恭請聖安於九月初三日自滸墅關起身來揚州於初七日接到部文內開刑部侍郎黃炳奉旨會同總河齊蘇勒蘇州織造髙斌在淮安府審理潘尚智慶元一案等因臣當即起身於十一日到淮見欽差臣黃炳跪請聖安隨會同審事伏思臣愚昧無知蒙皇上天恩格外委用惟期悉心勉力秉公持平協同欽差詳細嚴察以竭駑鈍耳為此謹奏知道了舉凡一切差遣正爾報效之時其秉公竭力為之雍正四年十二月初九日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏恭進各色宫燈十六對所進過多矣以後製燈只須秀雅不必刻意精巧兼費雕繡之工物力殊為可惜朕觀近來綵繡每多用於不當用之處爾等職司織造類此奢靡之習極當加意禁遏毋令過盛斯於風俗甚有關繫實力行之雍正四年十二月十三日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查得江蘇地方十一月內尚有隂雨撫臣陳時夏齋戒祈晴於中旬內已慶晴明市上白米每石價銀一兩三錢次白米一兩二錢麥價每石八錢所有十一月晴雨日期米麥時價謹繕摺具奏再臣於十二月十二日自宿遷回至滸墅關署合併奏聞謹奏朕觀陳時夏是一實心任事之好巡撫爾近在同城可留心體訪秉公據實奏聞至其操守更無可擬議但恐有矯情沽譽之疵耳雍正五年二月初一日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為遵旨覆奏事正月二十日臣家人齎摺回蘇臣開讀皇上硃批諭旨跪繹冉四仰見我皇上聖明洞鑒陳時夏果是一實心任事之好撫臣臣看陳時夏到任以來虔誠齋戒祈晴嚴查倉庫虧足禁止販米出洋力行保甲留心吏治每行私訪辦事勤勞並不見有沽取虛名之處到任未久聲名甚好民間皆説是清廉好撫院但臣愚昧識見淺陋謹遵諭旨留心體訪一有見聞即秉公據實密奏斷不敢欺隱斷不敢泄露謹此覆奏所有奉到硃批奏摺一并恭繳謹奏陳時夏甚為朕所賞識之人若肯不務虗名則可謂全才矣同日又奏為奏聞事竊臣查得蘇州地方正月內雨順風調時和物阜兆民歡樂共祝皇上一人有慶萬壽無疆市上白米每石價銀一兩三錢五分次白米每石一兩二錢六分麥價每石一兩五分所有正月晴雨情形米麥時價謹繕摺奏聞謹奏初春農事方始何敢遂言物阜二字耶雍正五年二月十五日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣蒙皇上天恩兼理滸墅關稅務自雍正四年二月十三日收稅起至本年二月十二日巳滿一年共收稅銀三十一萬一千三百四十兩零內該額稅銀一十九萬一千一百五十一兩零除第一第二第三三季額稅銀一十四萬三千三百六十三兩零已經按季解交户部訖現在第四季額稅銀四萬七千七百八十七兩零併盈餘銀一十二萬一百八十八兩零即日填批起程解送户部交納外理合繕摺具奏伏乞皇上睿鑒施行謹奏辦理甚屬可嘉條奏一摺交發部議矣同日又奏為遵旨覆奏事二月初二日臣家人齎回臣恭進宫燈一摺奉到硃批仰見我皇上至聖至明躬行節儉臣愚昧無知製辦不諳費用雕繡之工於不當用之處蒙天恩誡勉聖訓周詳臣跪讀之下始恍然自失感愧交并唯有凛遵諭旨類此奢靡之習加意禁遏不敢過盛益加謹身節用實力奉行以仰副我皇上愛惜物力防遏奢靡之至意所有感激愚忱謹此覆奏并繳硃批謹奏朕凡所批諭皆出於誠非徒於語言之間求美聽聞也向來以崇尚虛名為戒恥而不為爾奉此等諭旨當深信實行以仰副朕意不得少存卜度臆見設或妄擬如何若何則失之毫釐謬以千里朕之素性遇當用處從不吝惜如不當費而費即深惡之一切賞賜亦然朕意爾其知之雍正五年三月初四日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查蘇州地方二月內雨暘時若二麥春花滋長茂盛皇上特命大臣到蘇興修水利萬姓均戴皇上仁同覆育念切民依厚澤洪恩疊加屢沛黃童白叟鼓舞歡欣市上白米每石價銀一兩三錢次白米每石一兩二錢麥價每石一兩所有二月內晴雨情形米麥時價謹繕摺奏聞謹奏朕因去嵗秋冬以來至今嵗正月雨雪過多恐於民間播種有妨甚厪憂念覽爾此奏深為慰悅但一切奏聞總須據實不可少涉粉飾在爾膺欺誑之咎朕即無所為憑矣朕豈幸災祲而不樂聞豐稔不過欲得真實情形耳雍正五年四月初一日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為恭繳硃批事竊臣奉到硃批諭旨跪讀之下隨叩首恭謝慈訓伏思臣質本駑鈍受恩深重自知毫不能報只有良心不昧惟此不敢欺隱之愚誠不肯自造罪孽上負天恩凛遵聖訓臣益加勉力深信篤行以圖仰副我皇上再三諄切誨諭之至意臣不勝依戀之至謹奏覽奏備悉爾之誠悃惟以堅守初志不隨境而遷為是雍正五年五月初四日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為叩懇天恩仰祈睿鑒事竊臣籍隸內府生長京師從未逺離帝闕今來蘇州一年有餘犬馬依戀之愚誠不能自已今年八月輪當臣解運進京臣現在兼理滸墅關稅務相應照年希堯往江西之例暫委就近地方佐二官一員代行文移臣未敢擅便理合奏明以便行文蘇州撫臣派委俾臣得稍申瞻天仰聖之誠心天恩出自聖慈臣不勝瞻望叩懇之至謹奏爾不必來京已另有旨矣雍正五年九月初二日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為奏聞事竊臣查得蘇州地方八月內早稻已經刈穫晚稻遍野鋪黃髙下田禾一樣豐登市上米價平減白米每石一兩一錢次白米每石一兩麥價每石九錢八分所有田禾情形米麥時價理合據實奏聞謹奏江蘇所屬州縣內報災者數處何云髙下田禾一樣豐登朕屢諭一切據實陳奏不宜仍蹈隱諱故轍嗣後不可雍正五年十一月初七日蘇州織造兼理滸墅關稅務郎中臣髙斌謹奏為請旨事竊臣準蘇州撫臣陳時夏咨為欽奉上諭事雍正五年八月二十五日準禮部咨開浙江巡撫李衛奏稱西湖行宫曾經聖祖臨幸今則間設湖濱懇請欽定嘉名御書匾額延訪髙僧於中焚修頌祝等因奉旨聖祖仁皇帝念切民生省方問俗不費地方一絲一粟每次頒發諭旨甚明此天下臣民所共知者至於駐蹕之所地方豫僃行宫乃出於臣民愛戴之心不能禁止亦天下臣工所共知者今行宫既屬間設每年修葺需費防護需人在本地有司未免又多一番經理非所以體聖心而惜物力也李衛所奏甚是即照所請行其餘地方有行宫之處如何辦理方為妥協著該督撫會同該管官悉心商酌具奏請旨該部知道欽此欽遵鈔出到部為此合咨前去欽遵查照施行等因到院準此除行蘇州布政司遵照外相應咨會等因準此臣謹遵查得蘇州織造衙門西邊行宫在於織造衙門之內不比西湖河濱之地若延僧居住另開寺門則間雜人等得以出入往來與衙門逼近殊覺未便以臣愚見不必另開廟門於行宫正殿供佛一尊即派撥織造衙門內老成人一名朔望虔奉香火餘日敬謹封閉既不另設看守人役而每年修補滲漏所費無多固不需本地有司經理也是否妥協伏乞皇上訓示以便會同陳時夏定議具奏為此繕摺請旨謹奏此議妥協應如是雍正六年六月初二日浙江布政使臣髙斌謹奏為奏聞事竊臣查得浙省布政司衙門收兌錢糧每百兩有餘平二錢餉費二錢每年約收錢糧二百餘萬兩計應收餘平餉費銀共八千兩零內除抵補放給駐防滿洲兵餉稱封拆折銀一千餘兩實剩銀七千兩有竒經督臣李衛奏明即將此項銀兩留為布政司養廉等因遵行在案第歷來餉費銀兩係指明另收而餘平一項則於兌銀時豫將天平針鋒敲斜偏重暗為加收名曰每百兩二錢實不無浮溢之處臣思既蒙皇恩賞給養廉又何敢額外多收况坐平暗收迹涉曖昧擬將應收數目明示各屬收兌之時明加法馬二錢將天平較凖左右彈兌不使書役舞弊髙下其手臣將此情由業已稟明督臣并行牌通飭各屬知照在案臣辦事駑鈍初到任所一應事件本不敢輕易更張惟是養廉一項係臣自已所得若於到任之初不速出明示而暗昧多取何以潔已率屬此臣之所斷斷不敢者也但臣識見淺陋未知當否為此繕摺奏聞伏乞皇上恩加訓誨使臣知所遵守臣不勝瞻依之至謹奏好勉之無緊要事奏摺不必頻仍此任非比前任織造原無可奏案件不過採聽風聞入告今藩司事繁任重擇緊要應奏聞者摺奏以聞可也雍正七年二月初一日浙江布政使臣髙斌謹奏為奏聞事竊臣查得雍正六年分浙省額徵地丁司餉銀共二百一十七萬餘兩司庫所收錢糧嵗內截數六年地丁共收一百五十四萬餘兩已完有七分以上趕至奏銷之期尚有五箇月蠶市麥熟正民間爭先完課之時六年分奏銷通省錢糧可完至九分以上此皆我皇上深仁厚澤減賦復科屢沛恩膏有加無已是以民心感戴士習還醇人慶豐年爭先完課聖教覃敷此明效也臣查通省七十七州縣錢糧嵗內所完分數各有不同或應嚴行飭催或應詳請奬分數惟嘉興府屬為最七縣中嘉興秀水海鹽三敏長才殊屬實心辦事之人署嘉興縣戈鳴岐督臣已題請實授知縣秀水知縣魏大德已將題升溫州知府之杭捕同知秦炌員缺題請升補仍令署錢塘縣事海鹽知縣王仕正督臣亦批行奬勸臣謹將雍正六年分嵗內完解司庫錢糧分數據實繕摺奏聞謹奏朕欣悅覽焉雍正七年七月二十五日調補蘇州布政使臣髙斌謹奏為恭謝天恩事竊臣於七月二十一日接到署督臣性桂牌行準吏部咨文奉旨蘇州布政使員缺著浙江布政使髙斌調補兼理清查之事即令赴蘇其任內交代事宜著方覲暫接兼理浙江布政司印務著少詹提督福建學政程元章署理等因欽此欽遵臣隨恭設香案望闕叩頭恭謝天恩即於七月二十四日將浙江布政司印并交代册籍移交按察司方覲暫接兼理應謹遵諭旨即速赴蘇但現在貯庫新舊正雜各款錢糧共計三百六十萬兩有零必須親身交兌明白不過旬日之內可完臣擇於閏七月十二日到蘇州布政司衙門上任謹此奏聞再臣現在護理兩浙鹽政印務相應移交何衙門之處督臣李衛因等候諭祭文未到未得起身回籍臣請示於督臣據李衛云方覲辦事明敏且諳悉鹽政若移交方覲護理猶可無誤一面將情由奏明請旨遵行等語臣隨將鹽政印信一并移交方覲接授護理伏思臣蒙皇上天恩調補江蘇繁劇重地其吏治不比浙江且清查事務更關緊要臣聞命之下感激奮勉敢不竭盡心力以圖仰報皇上委任洪恩但臣自知才識淺陋恐難勝任叩乞聖慈恩加指示訓誨使臣知所遵守庶免隕越之虞謹此繕摺恭謝天恩謹奏此任原係繁劇之地朕非用汝之才用汝之不忍欺飾耳百凡無隱秉公竭力更不瞻徇避忌克勤克愼偶有無心過咎智力所不到處朕自原諒於汝設或稍涉欺隱因私廢公則不汝輕恕也勉力為之同日又奏為奏聞事竊照浙省地方荷蒙皇上教養洪恩民心感戴士習還醇百姓鼓舞完糧地方官易於催科六年地丁奏銷完至九分半以上本年錢糧復蒙特恩蠲免六十萬兩十分減二百姓尤易上納現在已收有七十萬餘兩聖德覃敷已有成效入夏以來通省雨水調勻各處田禾茂盛惟嚴州府屬之分水桐廬縣稍覺缺雨接連杭州之富陽近日已得透雨將來不過略減分數又衢州府江山縣因大雨起蛟山水陡發傷人十餘口隨即公議動支司庫備公銀四百兩交知府郭朝端親身查勘撫恤其餘各地方早禾現在豐收晚稻可望大熟臣謹據實具望汛七月初汛塘工各員接連稟報海中漸長暗沙一股阻抑水勢以致南北兩岸潮頭分作三路合并一處激起浪頭數丈直逼東塘塘腳護沙洗去潮勢衝刷坦水灘缷塘根坍裂等語適因管理海塘之杭嘉湖道王斂福自溫州來上新任臣即面囑其速往看視一面詳明署督撫另發銀四千兩為豫辦料物之費王斂福亦甚知塘工緊要即去赴工署督撫性桂蔡仕從前未經辦理過塘工督臣李衛歷年經手深悉海潮利害面囑署督撫將工程扼要之處再三言之二人於七月十四日同往查看回來之後性桂目擊情形方知果險蔡仕止云坦水不甚得力塘身無妨意中不關緊要被督臣李衛著實痛説署督撫現今才商議奏明并繕本具題臣愚昧之見今年潮勢不比往年且閏月在秋秋汛日多若遇大風暴雨潮頭衝擊實難保其萬全臣意須多備料物分貯頭險次險各塘除現有管工官員之外再將試用人員或佐雜等官內多揀幾員令赴要工處所分地防範於閏七八月大汛之期務必晝夜坐守如有緊急衆人一齊協力幫助隨坍隨補搶護保固庶可無虞臣不敢以身已離任將地方要務視同漠外已再三靣囑方覲與臣所見相同俟接受交兊錢糧完日伊即親往塘工查勘酌量辦理謹據實奏聞謹奏爾今雖已離浙當再寄字與蔡仕方覲等令其竭力敬愼預為防備復誠禱海神以期感佑庶冀可保無虞也雍正七年閏七月二十七日蘇州布政使臣髙斌謹奏竊臣包衣微末蒙皇上天恩格外超擢養育教誨恩澤洪深難以僃述臣感戴之誠莫能於奏摺內以數語形容髙厚惟有潔已奉公實心效力不敢稍有欺隱不敢略存瞻顧勉竭駑鈍力勤職守但自知才識短淺實難勝任然不敢不勉強奮發學習辦理今有奏明事摺一件謹呈聖覽謹奏覽奏朕甚嘉之果能公勤自矢何事不克辦理勉為之同日又奏為奏明事竊臣欽奉恩旨調補江蘇布政使於閏七月十二日到任後隨將趙向奎任內存庫印簿併所存庫房底簿查出逐一核對內有止記底簿而不入印簿者并有底簿亦不明填而止記暗號者多記有家人王姓崔姓取進字樣逐細核算究問庫書查出趙向奎侵欺錢糧數目如起解京餉則扣尅解官水腳銀兩解部元寶則抽出添兌碎銀收放錢糧出入則有短平餘銀又收火工侵沒缺站扣頭等項此確有實數可計者共侵欺銀七千八百六十餘兩再所收小錠及雜款錢糧每千兩又額外索取小包銀五六兩不等又每月取進併存餘銀約四五十兩至七八十兩不等通共侵欺銀一萬餘兩再查雍正七年應辦上下二運銅斤派委蘇松常揚四府知府承辦洋銅每百斤部定價銀一十四兩五錢江蘇近年每百斤扣節省銀一兩五錢存貯司庫乃趙向奎於松常揚三府節省銀兩照例扣存惟給領蘇州府徐永祐應扣節省銀六千二百三十六兩零明係與徐永祐夥同串通作弊又各屬報到節婦孝子二十六件例應核實轉詳業經繕文用印因家人需索陋規掯留不發至摘印之後始行發房又有服滿役滿到任繳照等項印文二十五件亦係家人因勒索陋規不遂掯留在署俱於摘印後發房以上各款臣既經查出隨將趙向奎侵欺銀兩開具細册并各款俱經詳報欽差并督撫在案其庫貯錢糧有無虧那情弊統於交盤案內詳細查明另行詳報謹先繕摺奏明謹奏逐一嚴行察出毋使絲毫疏漏以為負恩貪黷者戒雍正七年九月十一日蘇州布政使臣髙斌謹奏為密奏事竊臣查得江蘇地方清查積欠錢糧一事蒙特恩欽差大臣等總理又派委分查大員及協查人員屢頒皆聖明簡用得人清查要務深喜得有頭緒惟分查鎮江府屬之汀漳道朱鴻緒辦事乖張不循規矩任意妄行在丹徒縣清查硃筆書寫急公全完錢糧即全忠孝子孫興盛天必錫福滿門告示遍貼城鄉以致有朱化緣之號又金山寺僧欠糧差拏至府學明倫堂用磚塊磨頂處治又拏欠户以銀硃染鬚貼欠單於頭上押令遊街又因欠户懇求寬限罰以舌頭餂地泥土又在明倫堂拏欠糧生員令其朗誦聖諭廣訓半箇月始放又於明倫堂做竹籠一箇內用竹尖四條將欠户鎖於籠內不使展動其所行不堪細數大約皆如此類以致民怨沸騰臣訪聞的諱過往查但臣細思朱鴻緒性情異樣終恐不能盡為妥協臣謹據實密以奏聞謹奏覽雍正七年十一月初四日蘇州布政使臣髙斌謹奏為遵旨密保仰祈聖鑒事恭照本年四月十八日欽奉上諭京官自學士侍郎以上外官自藩臬以上著各人密保一人將其人可勝督撫之任或可勝藩臬之任據實奏明不必拘定滿漢亦不必限定資格若一時無深知可舉之人容其從容採訪不得草率塞責有負咨詢等因欽此欽遵在案臣留心採訪一時未得其人兹於九月二十日福建糧道張廷枚辧銅到蘇今已月餘彼此往還時常見面張廷枚在內務府行走時臣素所熟知未甚歷練今出外任經歷二年臣看其居心行事與衆不同辦事細心其情性亦較從前平和實屬才守兼優可以辦理通省錢穀刑名之事堪勝藩臬之任理合遵旨密保據實秉公奏薦謹奏張廷枚中材也何至如此保薦同日又奏為密奏事竊臣前奏清查江蘇地方積欠錢糧一摺奉到硃批仰見聖明逺照洞燭幾微始知從前設法催徵未能盡善兹臣欽遵聖訓詳愼籌畫其官役地棍之侵蝕包攬自是法所難寬而紳襟大户之積欠纍纍原非田地磽瘠無力完辦之貧窶小民可比若不乘此清查印協各官齊力奮勉之時一併帶查帶催則一千餘萬之積欠幾時方能清楚完項臣細看通省地方情形今正當豐稔之年易於輸將錢糧係應完之項原不該拖欠拖欠即屬頑民且惟勸諭開導並不事徵比縱有姦刁之民亦無從藉口但應仰體聖心一面專以確實清查積弊力圖將來清楚為本一面令印協各官乘便查紳襟大户及有力之家仍照常勸諭聽其完納其本係大户而故意花分小户者即零星尾欠亦必查出令其速完至其餘鄉僻小民實在低窪山河薄田所欠不過一兩以下及數分者統計雖有成千纍萬之多但此等小户必係貧窶之民似應暫緩催追以紓民力如此分别清楚通諭印協各官實力奉行於國計民生兩有禆益萬民自然共信共見咸仰皇上為民除纍之聖心臣將此意已面稟欽差臣馬爾泰商酌俟撫臣尹繼善回蘇臣再面稟從長妥議臣之管見如此是否有當伏乞皇上恩加訓示謹奏因見汝等辦理不甚妥協錯會朕意已特降諭旨由內閣頒行矣同日又奏為奏明事竊照條奏內稱藩司衙門一體封鎖關防一案奉旨此奏甚屬可嘉著通行直𨽻各省實力奉行欽此欽遵臣查得藩司衙門為錢糧總滙之地因向不封鎖出入自由是以弊端最多今奉旨一體關防封鎖誠為肅清吏治力除積弊之要務臣欽遵奉行因衙門原係民房改設房地狹窄辦事需用多人今應添設房鋪厨竈屋間實屬不敷臣詳明督撫於存公餘平銀內動支七百餘兩買鄰居民房三十餘間髙築牆垣圈進署內分住各房書辦已於九月十一日封鎖關防其所需薪水之費於恩賞臣養廉一萬兩內一年賞給衆書辦銀一千兩按月散給至於各房書辦人等養贍家口勢必俱倚藉衙門為活查伊等舊日一切事件俱有陋規若察有犯必懲再條奏內原令一年更換但臣衙門關防之人為數太多不比别衙門人少且上班者關防一年為期似覺太久下班者在家一年所辦案件均未經手難免生疏錯誤恐有未便容臣奉奏明伏乞皇上天恩訓示謹奏覽雍正八年三月初一日蘇州布政使臣髙斌謹奏為奏聞縣令循良堪膺擢用仰祈睿鑒事竊臣查得金匱縣知縣王喬林年力精壯才守俱優又能實心辦事不務沽名洵屬循良之吏所當仰請聖恩升擢以示鼓勵伏查有太倉州一缺係直隸州統轄四縣糧重事繁現在乏員臣稟商督撫請將王喬林題補太倉州以收得人之效現在會疏具題請旨外所有該員堪膺擢用緣由謹具摺奏聞伏祈聖鑒謹奏似此業經具題事件何又多此一番瀆奏耶同日又奏為密陳通崇等處沙地劃分管理之案仰請睿鑒事竊臣查得江南地方沿江濱海各州縣界內均有沙地其名不一執業之民其初原係望水報升開墾成熟既非若腹內田地價買世傳而又地寬土沃利重賦輕所以爭端易起如崇明縣漲地與通州接近之扁擔沙從前兩邊民竈互爭直至雍正元年勘分題結至今猶有逞強修怨鬬爭之事餘如通州與昭文縣民人互爭之薛家沙亦久搆訟不休雍正六年間何天培條奏請將通崇等處沙地另分一縣以資彈壓户部議覆令於州縣佐二官內遴員管理將應駐何地之處妥議具題奉旨行文查議經督撫行委蘇松淮揚二道會同查勘因淮揚道河工緊要至今尚未即往臣愚昧之見竊謂此等定界劃隸設官管理期於一勞永逸務在恩威並濟處置得宜使刁頑剛悍之積習知所改移而覬覦侵奪之惡風莫敢再逞斯為盡善必得仰藉皇上天威特頒諭旨專遣大臣勘議料理方足懾服安帖現今欽差馬爾泰在蘇清查民欠虧空事務如蒙諭旨著令侍郎馬爾泰就近前往逐一查勘定界立碑建署設汛劃分管理永禁越占則愚民耳目震耀從此釁隙俱消約計往來竣事不過兩月於辦理民欠虧空原無遲誤而沿海沙民永逺息爭安業共沐皇恩於生生世世矣再查此等沙地若通行查丈必有盈餘如蒙皇上天恩免治從前隱匿之罪著令馬爾泰於定界之後委員清丈將丈出餘地許令增正辦糧以昭聖主寬大之典則沙民感激益深而國課亦無隱漏臣冒昧密陳是否可行伏祈聖鑒謹奏此事應言之撫臣具疏題請者何得越分具奏同日又奏為奏明酌行存七糶三之法遞年易穀還倉以收積儲實效事竊臣查得常平倉積貯米穀關係地方儲備要務是以屢厪宸衷頻頒諭旨并令將州縣一切例積米石全數易穀以為經久之計睿慮至周而立法至備惟是江南地氣卑濕不惟米難久貯即稻穀多經嵗月亦有黴蒸蟲蛀不無虧折况奉文以來易穀已歷三載而州縣未經易換者尚多臣於到任後即照案嚴催易換現今通共已報易存稻穀一十九萬餘石尚存未易米糧一十九萬餘石揆厥所由蓋因新穀既登則民間不樂買此陳米求糶甚難若出賣於春夏需米之時貯價以待秋成買補該管府州慮恐印官虛報揑飾或那移虧空往往牽制掣肘即州縣之因循畏縮者亦恐經糶數多至秋一時買補不足或致賠纍坐是遷延嵗月莫肯勇往從事臣查存七糶三本屬定例最為良法近經稟商撫臣統計州縣現存米穀以十分之三照依時價令於今嵗青黃不接之時零星糶賣先儘糶米次及陳穀糶竣之日將銀解貯府州收庫一俟秋成即催具領買穀還倉嗣後永照此例挨年次第出易總期三年之內全厫一換周而復始不但米無浥變之虞即穀亦可免陳因之患矣臣業經詳奉督撫批準現飭各屬一體實力遵行但查部文行令米俱易穀已歷三載乃今猶請均年糶易似屬輾轉遲延然實由前此因循貽誤今須斟酌變通至存七糶三雖係定例向來實未奉行緣係倉儲重務屢厪宸衷籌劃臣謹將辦理緣由具摺奏明伏祈聖鑒謹奏凡地方一切事件原當權宜補救斟酌辦理果係公當得理之舉即應呈請督撫咨明該部或竟具題奏聞何煩汝以密摺具奏朕觀此事並無可密之處所奏殊屬不協似有無可敷陳勉強支吾光景在汝支吾不過聊以塞責獨不念朕一日萬幾之繁乎雍正八年十一月二十八日蘇州布政使臣髙斌謹奏為密奏事竊臣訪得江南河庫道康宏勳於所屬徐州蕭縣地方置有莊房地土令伊妻及長子康玉居住時常在道署往來伏思任所置買田宅已干功令而又令妻子居住往來尤足以啓河員奔競鑽營之弊實於官方有礙又訪得伊子康玉與做工裁縫田四爭姦將田四登時毆斃康玉凂人説合行賄免驗該道康宏勳又差役勢勒銷案此係雍正四年十月間之事迄今四載國法未伸臣訪聞既確事關道員違例置産縱子毆斃人命不敢因係臣到任以前之事為可以諉卸自蹈欺隱之咎謹將事迹備細開列奏聞伏乞聖鑒謹奏密告之於撫臣尹繼善河臣嵇曾筠俟伊等查實參處硃批諭旨卷二百五上欽定四庫全書硃批諭旨卷二百五下硃批髙斌奏摺雍正九年三月初一日蘇州布政使臣髙斌謹奏為密奏事竊臣因督臣髙其倬已到新任臣衙門現辦一切案件及目前賑濟一應要務應面稟督臣請示之處甚多臣向撫臣稟假於二月初九日起身赴江寧省城謁見督臣於臣辭行回署時督臣向臣言爾回去為我多多致意尹大人我兩人身授封疆重任必須同寅協恭和衷共濟方能有成即如兩人同肩一擔若一欲向東一欲向西勢必一步不可行現在下江地方吏治比從前大不相同年來得尹大人盡心竭力辦理已有八分成效我再竭我駑鈍殫心勷助一二庶幾報效皇恩髙厚萬一但我兩人不能時常到一處會面辦理一切案件不經面商批行勢必不能畫一總在至誠為公絲毫不存形迹為要若稍有形迹屬官甚多奉行便有難處其中不肖之員便乘機搆釁其弊不可勝言我們所當深戒更可笑者兩家幕賓見主人有意見不合之處便於往來文移中各自爭強取勝嫌隙由此而成漸致不可解釋我兩人幸得同擔一處重任萬一漸致此等模樣何以上對君父我今日所言若有一字言不由中非係出於至誠將來所行若稍有與今日之言不相符處何以見爾爾務必將我再三懇切之誠心轉致尹大人就如我面語一樣等語臣回蘇即將督臣之言竭誠轉述與撫臣撫臣言制臺我平日極佩服的不必如此留心我自寫字回覆制臺就是了等語臣在蘇州同撫臣尹繼善辧事年餘尹繼善才識明白辦事果斷與署督臣史貽直意見參差致成嫌隙督臣髙其倬有鑑於此是以豫先再四懇切囑臣致意所有臣近日往江寧回來傳話緣由謹密奏聞謹奏督撫同守封疆宜和衷共濟若意見稍有參差最易致成嫌隙此乃情理之必然者今髙其倬尹繼善二人朕可保其同心一德定不至有所乖異也雍正九年三月十八日調補河南布政使臣髙斌謹奏為恭謝天恩事竊臣欽奉上諭髙斌為人謹愼操守亦好但非肆應之才不宜江蘇繁劇之任著調補河南布政使欽此臣聞命之下隨虔設香案望闕九叩恭謝天恩伏思臣屢受皇上殊恩委用江蘇藩司重任自知才力不勝雖竭盡駑駘勉強圖報而惟恐曠職之念時刻實未敢忘今蒙天恩調補河南布政使臣跪讀恩旨感動五中涕淚交流不能自禁惟有竭臣駑鈍殫心盡力矢圖報效萬一再臣更有叩懇天恩者臣生長內府身受皇恩至深至重自雍正六年四月出京赴浙迄今已踰三載因羈於職守不敢妄求而依戀愚誠積久愈切茲於赴任北上之便懇求聖慈準臣進京瞻仰天顔面請聖安敬聆聖訓前赴新任往返程途不過一月實屬順便臣不勝懇恩待命之至謹奏且不必入覲河南離京甚近候旨召見可也雍正九年八月二十八日河南布政使臣髙斌謹奏為奏聞事本年八月二十七日據汝寧府知府費謙流稟稱奉委查驗南陽府屬驛馬經過南陽縣所轄之林水驛地方適遇湖北官兵經過本月二十日應駐林水驛而離驛八里駐宿二十一日應駐南陽縣而離縣十八里駐宿不用地方官所屣空間之地另於有秋禾地畝安置營盤謙流身親觀看二十日官兵駐宿處所地內所種豆子蕎麥踐踏無存南北約三四里東西約一二里而附近地畝尚有踐食并鐮割之處等語據此隨又接奉撫臣牌開準荆州領兵副都統咨開本副都統帶領滿兵一千名自荆州起程到吕偃驛遇貴部院差遣同知等官稟稱吕偃驛至新野縣一宿七十里新野至林水驛一宿七十里從此宿處逺近不等等語查大兵每宿若俱行七十餘里則馬匹疲困本副都統詳核道里逺近一日量走五六十里在林水驛迤南八里就近河水處所安營第二宿仍復七十里不能照地方官所備草束住宿請速飭知差遣同知通判及地方官員每日酌定於五十餘里六十里之間住宿行走則馬匹不至疲困等因咨院行司奉此臣隨即飛檄沿途地方官并先經差委接兵各員遵照副都統觀音保來咨辦理外臣伏思兵馬駐宿處所委員不能豫請領兵都統指示妥協辦理委員實難辭咎而兵馬經過地方偶爾踐踏秋禾其事尚小領兵之都統約束兵丁紀律未甚嚴明臣理合具摺奏聞謹奏辧理軍需大臣速行察議一面奏聞即一面申飭該副都統并管兵各員可也雍正九年十一月初一日河南布政使臣髙斌謹奏為恭謝天恩敬懇聖慈事竊臣身受皇上洪恩至深至重涓埃未效時切悚惶茲於數月之內疊奉恩綸甫調河南布政使旋補北河副總河今復命往署理四川布政使臣隨虔設香案望闕九叩恭謝天恩伏念臣半載以來蒙皇上恩賜保全復加委任一而再再而三以至於此總由臣才質庸愚之故即此屢厪天心實覺負疚無地不禁感奮至極而魂夢難安涕淚交溢也縱具百身頂踵亦難圖報涓埃只此一點愚誠何以報主恩之髙厚惟有時時殫捐糜難報之心事事竭駑鈍無能之力奉揚聖化奮不顧身以仰副皇上生成造就之隆恩於萬一抑臣更有叩懇天恩者四川至京五千餘里臣到任之後惟盡心竭力在任辦事何敢再以引見奏請輾轉思維戀主之誠愈覺刻難緩待督臣現今裁酌奉到部文即將河南布政使事務委員暫署不必等候徐聚倫到任臣只將經手錢糧交代清楚於十二月初間即可起程計進京赴川較之自豫赴川僅多程途二十餘日伏乞皇上俯憫臣外任已久逺任在即更沛天地父母之恩準臣進京引見再赴新任俾臣叩覲天顔以伸犬馬之忱跪奉訓旨以為服官之法臣曷勝懇恩待命之至謹奏另有旨命大學士轉傳雍正十年三月十六日管理兩淮鹽政布政使臣髙斌謹奏為密陳鹽政情形事竊臣才識庸愚至駑至鈍蒙皇上天恩委以兩淮鹽政責任重大深懼蚊負已於二月初六日到任受事一月以來細查案卷詳核引課確訪場竈口岸之弊體察總商散商之情雖未能條分縷晰提領挈綱而憤悱苦思亦自微窺其大槩伏查現今兩淮鹽政之弊最關緊要者在展限壓綱而捐項虛懸積欠纍纍必當急圖清完積欠以便提起壓綱漸復原限考成為第一要義而總在商情實能踴躍急公則趕復原限庶不致曠日遲久查兩淮商人行銷引鹽嵗辦二百五十餘萬兩之正雜課餉錢糧而此外之各口岸匣費等項并商人家中用度虛糜奢侈所費不資而一年行鹽所獲之利息儘足供其妄用即此可見實係商習仍前不能謹身節儉該管鹽政並未能為之調度之所致更可見實非商力有所絀乏而辦課維艱也如果誠心踴躍急公兩淮商力每年令其多帶完十餘萬兩錢糧隨引上納補其欠項固非勉強難行之事臣愚昧之見現今欠捐之鹽規引費公務薪水等項積久至數十餘萬之多自應分年帶完以紓商力其帶完戊申一綱已定寬限十年之久似可以不必再議更為寬限也惟是商情之踴躍急公務在催徵之得法當有以鼓舞而勸導之所謂寓撫恤於催科者也司其事者果能公忠清白身體力行通商裕課事有實效其一應鹽政內之撫恤場竈禁弊緝私疏銷利運清釐口岸力挽奢靡俱可以因時隨事相因辦理矣然臣萬不敢沽名避怨但淮揚風俗腥膻人言嘖嘖無端之誹謗譏談每生意外臣必不敢矯枉過正辦理孟浪更不敢有瞻顧而畏縮不前也況蒙特頒諭旨令署督臣尹繼善與臣和衷共濟較前此地方大吏俱漠不關心者又有不同天恩體恤感激難名臣不揣愚昧謹將商力實在不至困敝情形據實陳奏統乞皇上天恩訓示謹奏如此立志有何可諭但言之易行之難公私義利之間非大丈夫具大聰明識見人未能卓然不撓章奏虛詞朕殊不以為信須行與朕看雍正十年十二月二十六日管理兩淮鹽政布政使臣髙斌謹奏為密奏事竊照江蘇沿江沿海地方七月間偶被風潮荷蒙皇上天恩即降諭旨被水小民著誠心撫恤毋使流離失所至於今冬冰雪嚴寒之際明春青黃不接之時尤當預為籌畫資其生計著詳悉妥議奏聞辦理欽此欽遵臣於十月十九日回任隨接得蘇州撫臣喬世臣移會內開被災各屬輕重不等總以潮水淹及之地為準核實被災户口實係赤窮不能度活之户於年前賑以兩月口糧十月內開賑一次至十一月底再賑一次來春正二月間再賑一月每月大口給米一斗小口五升若便於折銀之處以銀一錢抵米一斗被水竈户即動鹽義倉糧散給已經督撫會同具奏奉硃批俞允等因臣隨即欽遵飛檄辦理將通泰淮三分司所屬豐利等被水二十五場一應查賑散賑事宜明白通行曉諭並於分司場員接見之時再三詳細指示面囑務期實力奉行無濫無遺妥協辦理以仰副皇上愛養黎元至意惟思新春正二月間三次賑畢之後直至四月青黃不接為日正長必得加沛皇恩再賑一月口糧窮竈庶能度活又思民竈一體竈户若行加賑不特江北通泰等處之民户必得一體加賑而江南蘇松等處沿江濱海較此被災稍重之處更須一體籌及臣仰體皇上念切民依至意既有深知灼見理合據實密奏如蒙皇上天恩特頒諭旨大沛恩膏敕下江南督撫酌量各屬被災重輕户口多寡於正二月間三次賑後再於三月初間恩賞加賑一月口糧如有本處倉貯米穀不敷賑給之州縣不必令往逺處盤運多費水腳即令折銀賑給其豐利等場之竈户即動鹽義倉糧一體加賑則海隅億萬蒼生含餔鼓腹共沐聖主格外洪恩矣為此謹奏已另有諭旨矣雍正十一年三月初一日管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為恭謝天恩事竊臣接到大學士張廷玉寄字雍正十一年二月十二日奉上諭年來嵇曾筠辦理河工甚為妥協但黃河工程關係緊要除嵇曾筠外欲更覓一明曉河道情形者不得其人朕思髙斌現在江南管理鹽政若從此講論河工事務將來可望熟練著就近在嵇曾筠處學習並非以嵇曾筠不能專理更須人協助也爾可寄信與嵇曾筠令其留心教導並寄信與髙斌令其加意學習凡有題本奏摺之處髙斌俱不必列名欽此遵旨寄信前來臣隨虔設香案望闕叩首恭謝天恩伏思臣才識庸愚毫無寸長而受恩深重奮勉圖報之悃誠積久彌篤早夜自思如得奔走效力之地殫竭微勞庶幾稍報萬一今奉恩旨格外造就期望成人臣感激涕零將來得漸曉河務機宜以備驅䇿正遂臣之素願不勝歡忭踴躍欽遵聖諭就近在嵇曾筠處加意學習專心致力討論講求以仰副我皇上恩勤教育之聖心所有臣感激微忱理合繕摺奏謝伏乞睿鑒謹奏覽奏知道了悉心盡力學習不但河工事務即嵇曾筠之居心為人亦當勉力效法嵇曾筠忠正人也雍正十一年四月初四日管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏竊臣上年面奉諭旨著臣留心察看魏廷珍臣數月以來時刻留心察看其人操守清廉事情明白於兩江總督事務儘能辦理不致貽誤但臣再四細加體察其人雖外面無可指摘而臣中心實不能甚深敬慕今蒙皇上訓示嵇曾筠居心為人俱屬忠正臣看魏廷珍之居心為人其於忠正二字較之嵇曾筠實是不及大概伊平時辦理事件常言只要有根據方立得穩等語即此細察若講究吏治則可謂老吏議論若究其心術於大臣之忠正為國如嵇曾筠為人自覺相去甚逺臣識見淺陋謹將所見密以奏聞謹奏若非實具公心不能有此目力深合朕之所見嘉是覽之同日又奏為密陳運司不能稱職仰請聖鑒事竊照兩淮運使范廷謀原係姦猾老吏年已七十五嵗居心一味巧詐臣管理鹽政以來諄切勸導冀其遷改乃日久牢不可破每事徇情沽名只圖商人稱譽不顧鹽政緊要因臣將伊舛錯之處屢加駁飭時常當面規誡伊近日辦事更多遲慢推聾粧病顯然有心掣肘臣實不能收臂指之效且恐將來貽誤公事理合據實密奏伏乞皇上特頒諭旨將范廷謀撤回進京引見應作何處置恭候欽定所遺運使要缺臣知有新調江南驛鹽道包括現任揚州府知府尹會一均屬操守清廉辦事秉公之員仰懇聖恩於此二員中特用一員補授令速就近接任則督催轉運諸事不致遲滯實於鹽政有益統祈皇上睿鑒施行謹奏此奏是候另降諭旨雍正十一年九月初八日管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為恭懇聖恩簡發人員以資委用事竊照兩淮鹽場大使共二十八員所有該場經徵折價催運緝私諸務甚屬緊要該員各有專責而部撥京協各餉例差現任場員押解每年約需十餘員二十員不等其出差所遺之缺并此外事故出缺及差委巡緝各務均需人員委署辦理雍正九年四月內蒙聖恩簡發鮑斌等十員命以鹽場大使委署試用內除丁憂事故三員所餘七員已經陸續題補并現在場員缺出委署試用此外所出之缺委用乏員多係兼署初試微員恐有不能兼顧之虞再一應差委諸務乏人辦理頗費周章兹據運使尹會一詳請奏懇簡發人員以資委用前來仰祈皇上天恩敕部揀選十員或十五員命交微臣酌量以鹽場大使委署試用如能稱職照例扣滿年限題請實授俾場務得員專理差委亦不致乏人於鹽政實有禆益臣謹繕摺奏請伏乞皇上睿鑒施行謹奏有旨諭部矣雍正十一年十一月初六日管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為密奏事竊臣於本年十月初三日前赴清江學習河務於十一月初四日回江寧織造衙門臣到清江前往髙堰徐邳一帶閲看黃運全河形勢各處掃工閘壩機宜仰見皇上聖謨廣運任用得人嵇曾筠辦理周密老成妥當臣欽遵聖訓向嵇曾筠專心致志竭力學習外兹有密奏者臣聽嵇曾筠之言論屢次提及西柱性情辦事不妥協之處臣看西柱在清江覺有抑鬱不舒之意性情褊急協辦一應河務俱不能與嵇曾筠和衷且住工日久未免希冀升遷其為人操守尚好但既不能禆益河工可否録其寸長調回另用如西柱另用伊現有命交訓練河標兵丁一事求皇上天恩交臣就近照管臣數月內往清江一次向嵇曾筠學習河務就便即可指令將辨督率操練二年之內可期精鋭抑臣更有請者伏思河防重任攸關奠定鴻功實非尋常凡有才具之員槩可辦理必得通曉河務而虛中無我方能敬領聖謨指訓而不誤機宜必得公忠體國而操守潔清方可嵗銷數十萬金錢而無虞糜費向因南河風俗久習澆漓效力人員雖衆其中欲求有志上進者甚少臣為儲才備用起見冒昧奏請聖訓可否特旨敕部揀選各部院賢能勤愼司官酌派數員命交嵇曾筠學習河務二年一回另派更換其學習之員在工酌量委辦估工查料等事講求河道形勢看築掃壩機宜期滿咨回本任出具切實考語記名內有才器堪大用者另奏保舉其不堪學習者不必久留在工於試用半年之後即可咨回如此十數年奉命學習之員既多則揀選通曉河務之人材自有不可勝用者矣是否可行伏乞聖明裁奪謹奏所奏俱屬合宜候另旨飭部施行雍正十二年正月十七日署理江南河道總督印務管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為恭謝天恩仰祈睿鑒事竊臣接奉吏部劄欽奉諭旨命臣暫行署理江南河道總督印務當即虔設香案望闕九叩恭謝天恩伏惟江南河工關係重大仰賴睿謨宏逺疊慶安瀾實荷聖主天功奠定今河臣嵇曾筠給假三月已將工程事宜縷晰條分面為指授但臣未能歷練身司典守蚊負堪虞惟有奔走河堤竭蹶儹辦修防加謹循已定之章程工料殷繁勤隨時之查察奮勉駑鈍以期仰副我皇上格外委任之至意臣於正月初二日自江寧起身初九日在清江接印任事除恭疏具題外謹繕摺奏謝伏乞皇上睿鑒謹奏河務重大竭力勉為之雍正十二年二月二十日署理江南河道總督印務管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為恭謝天恩仰祈睿鑒事竊臣於本年二月十五日接準吏部咨開欽奉上諭朕因河防關係緊要特命大學士嵇曾筠在任守制管理總河事務今據嵇曾筠奏稱現將本年各項物料工程如何查核催儹條晰指明交髙斌辦理臣於三月內料理喪事畢即趨赴河工凡一應修守搶護機宜臣務必悉心籌畫查察各工儹辧妥協所有總河印務伏祈仍著髙斌管理臣協同保固伏秋兩汛平安霜降之後籲懇俯準回籍終制等語河工事務嵇曾筠已經辦理妥協今於料理伊母喪事之後即赴河工指示機宜則一應工程自可保固平穩伊請將總河印務仍令髙斌署理於霜降後回籍終制情詞懇切具見悃忱著照所請總河印務著髙斌署理嵇曾筠於霜降後準其回籍終制再嵇曾筠本籍常州距淮安不逺明嵗工程亦可就近往來協同經理在伊終制之心既已得遂而河防事務亦大有禆益欽此欽遵移咨到臣當即虔設香案望闕九叩恭謝天恩臣菲材陋質荷蒙諭旨暫署河務今以大學士臣嵇曾筠恩準終制臣復承恩命署理總河跪聆之下無任悚惶伏思河防緊要雖有大學士嵇曾筠於三月內即來河工指示機宜協同保固但臣身膺重任何敢稍存瞻顧藉以自寬更須奔走河堤竭蹶辦理矢殫愚誠不留餘力皇上聖慈俯念臣辦事不敢欺隱或命臣協同照料臣愚陋知見所及必當竭誠協助萬不敢膜視旁觀則鹽關織造俱有專管之人臣專心致力於河工俾得勉竭駑駘出自皇上天恩臣不勝叩懇之至除具本奏謝外謹繕摺具奏伏乞聖鑒謹奏覽雍正十二年三月初六日署理江南河道總督印務管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為奏請聖訓事竊臣蒙皇上天恩署理總河任大責重竭蹶辦理事無巨細不敢絲毫懈忽亦不敢稍有更張今已及兩月所辦事件不敢煩悉瀆陳謹將河務實在情形開具節略敬謹奏請聖訓一正月內正值修理惠濟閘即天妃閘及修築上流鉗口壩此閘係清口入運關鍵甚為緊要而重運糧船經由出口迎溜挽拽越河閘分流並濟又須水勢平緩臣親往察看與道廳營汛各員商酌添釘排樁以資鞏固再加挑閘上河底開寬閘下兜灣以紓緊溜於二月初一日開放今兩閘溜水平緩日過重運糧船百餘隻挽拽快便一駱馬湖蓄水濟運關係甚大臣於二月十三日前往察看斟酌蓄泄機宜即便由清河桃源至宿遷一路查看黃河北岸工程內與運河最近之九里岡七里溝陳家樓皂河之夏家馬路等處最險工所臣逐細詳加相度愼重修防一駱馬湖口十字河之竹絡壩係宿遷黃運交滙之處今壩外支河淤淺黃溜南移臣相度形勢將支河加挑挖深二尺開挑河口引導黃流以便徐州糧船由此入運一駱馬湖蓄水應俟江廣重船入中河運口之日開放濟運臣與道廳營汛各員細加商確愼審開放王家溝口門丈尺濟運機宜一今春運河水深足用惟宿遷之車路口桃源之砂礓溜磯心灘二處河底俱係硬砂歷來春月水淺漕臣魏廷珍向臣面言必得四尺五寸深水重船方不致起駁等語臣親至二處探量水底相度形勢加築束水草壩又以參將朱永凡之言於河中接築順水草壩水勢添長糧船遄行無阻一儀徵清江閘口至揚州三汊河攸關江廣漕運江潮淤淺每年例係地方官用商三民七之力於臘正月間挑濬有名無實臣因係運鹽河道於上年九月內即嚴檄專委妥員豫先辦理臨期實力奉行又在江寧曾將緣由情弊面言之於督臣趙𢎞恩嚴加會飭臣到清江後又節次差河員前往查催今年漕船進口銜尾通行一上年河南陳留大堤漫口之後黃河沙墊底髙江南徐屬黃河緊接河東之虞城單縣下遊甚有關係臣於三月初六日自清江起身前往徐州細看情形詳加籌畫一路即便察看黃河南北兩岸險要工程查盤料物務使伏秋有備并閲看徐州宿遷左右兩營兵丁往還約得半月有餘俟大學士臣嵇曾筠於三月內到工臣協衷妥商敬謹辦理以上七條臣近日所辦河務情形節略據實敬陳睿鑒叩懇聖訓指示謹奏覽奏所辦河務大概情形知道了勉之毋怠雍正十二年三月十八日署理江南河道總督印務管理兩淮鹽政兼署江寧織造龍江關稅務布政使臣髙斌謹奏為恭報桃汛平穩情形事竊照今春桃汛水勢情形臣查黃河自徐州以至海口陸續共長水三尺八寸至五尺三寸不等比上年桃汛水勢尺寸稍為加長大溜循軌順流東注海口深通兩岸堤掃工程俱各修防平穩運河一切閘壩涵洞啓閉蓄泄悉協機宜中河水勢裕如糧船遄行無阻臣多派員辨挨幫照料催儹挽出清口將次過完洪澤湖水充裕由清口暢流敵黃髙堰等處工程寧謐所有今春黃運河湖桃汛水勢各工平穩情形理合繕摺奏聞再臣於本月十七日由徐州碭山勘工回至宿遷縣皂河現在與運河相近之黃河夏家馬路親看進掃簽樁以固險工併開放駱馬湖王家溝口門以便江廣之最重糧船濟運有餘至臣自徐州所看黃河南北兩岸險要工程一應修守機宜不敢瀆陳統俟大學士臣嵇曾筠即次到工臣虛衷妥商敬謹辦理合併奏明伏祈皇上睿鑒謹奏黃運湖河水勢平穩情形以手加額覽之雍正十二年六月二十八日總理鹽政兩江總督臣趙𢎞恩管理兩淮鹽政布政使臣髙斌謹奏為清查規費酌給養廉以清吏治以除積弊事竊照兩淮鹽政所屬各員向因未定養廉分司以下費用資之商竈難免瞻顧因循不能整頓臣髙斌於請簡幹員等事案內會題請徹底清查規費斟酌應存應革賞給養廉奉準部覆行令臣等將場商規禮徹底清查細加斟酌應存者按季提解運庫酌定每年養廉數目請旨賞給其不應存者出示曉諭嚴行禁革等因行文欽遵在案臣等公同運使尹會一悉心詳議逐款徹底清釐將兩淮三分司屬各場所有規費等項全數清出每年共銀五萬二千六百一十餘兩內不應存之各項規費共銀一萬八百餘兩經臣等即行出示曉諭嚴行禁革外所有應存之折價耗羡商規引費等項通共銀四萬一千八百一十餘兩應請自癸丑綱起俱按季提解運庫酌量分司以下各員所辦事務之繁簡分給養廉共計三十九員每年養廉并公費及書役飯食紙張等項共銀三萬一千七百三十餘兩恭懇聖恩賞給各員以為養廉辦事之需仍餘銀一萬八十餘兩并請留貯運庫除酌給試用人員薪水之外其餘統作每年陸續添買鹽義倉積貯穀石之用從此章程既定則場竈之積弊可除而官員得有遵守自不敢仍前瞻顧因循吏治肅清於鹽政實有禆益臣等謹將請給各員養廉數目另開清摺一併恭呈聖覽伏乞皇上訓示遵行謹奏覽所開各官養廉數目皆係應給之項但其中未免有浮多者尚須酌量裁減署理江南河道總督印務管理兩淮鹽政布政使臣髙斌謹奏為請旨事竊照大學士嵇曾筠荷蒙聖恩俞允終制仍在河工經理指示機宜其往來各處勘工以及日用薪水等費臣已經面交河庫道張師載於平餘項下每月支送濟用臣伏查河臣養廉每年例收鹽規銀二千兩支用河庫平餘銀六千兩共養廉銀八千兩今大學士嵇曾筠仍在工辦事所需養廉應否於鹽規河庫平餘項下量給銀五千兩理合恭請皇上特頒恩旨賞給餘銀仍應存貯河庫統於嵗底奏明歸公臣已有鹽政衙門養廉毋庸動支河庫銀兩合併奏明為此繕摺請旨伏乞睿鑒謹奏大學士嵇曾筠既在工所經理一切其日用薪水之費仍照數全給新授副河臣白鍾山每年養廉若干亦應酌妥具奏雍正十二年八月初二日管理兩淮鹽政臣髙斌謹奏為欽奉上諭事竊臣奉到諭旨著將江蘇布政使白鍾山授為南河副總河專司河務此時正屆伏汛秋汛之間著髙斌與白鍾山敬謹交代清楚毋得疏忽欽此欽遵臣伏查今年秋汛各工俱甚平穩臣現在往來各工察看加謹保護凛遵聖訓萬不敢因交代在即稍有絲毫疏忽自當倍加敬謹仰副我皇上格外委任殊恩副總河白鍾山大約在中秋前即可到淮臣將一應事宜遵旨敬謹交代清楚後臣隨即前往儀徵欽遵聖訓加緊悉心催辦鹽務恭候聖主指示臣當即奔走趨赴奮效駑駘所有臣感恩奮勉下情理合具摺奏聞伏乞皇上睿鑒謹奏覽奏已悉近聞江南鹽政甚不妥協汝與督臣趙𢎞恩悉心竭力整理就緒可也雍正十二年九月十五日管理兩淮鹽政布政使臣髙斌謹奏為欽奉上諭據實陳明事七月十一日內閣欽奉上諭一道遵旨轉寄到臣臣虔謹跪讀敬繹聖訓仰見我皇上厪念兩淮鹽政之至意臣伏查兩淮鹽商深沐皇上加意培養天恩辦納錢糧急公踴躍嵗上正雜課銀二百八十餘萬兩之多數年以來俱照限清完並無尾欠亦並不須多方催比此皆我皇上愛育淮商沛恩深厚之所致但商人雖易於納課而實艱於運鹽臣細查商情其中雖有姦良貧富之不齊大概貪圖緩運則口岸鹽少而價昂銷售獲利若趕運急迫則口岸鹽壅時價跌落未免成本有虧轉輸不繼此商人利在遲緩之實情即歷年鹽政壓綱之病原也臣到任後察知積弊根由竭力整理首先以趕鹽為務凡所以加緊催趕之術實未嘗私毫假借協同運使大破積習實力奉行誠心開導衆商分别勸懲以期力挽壓綱之積弊上年臘月督臣趙𢎞恩到任臣正在江寧遂以此意當面告知期於同心協力共收實效今年夏間督臣檄行運司先將庚辛壬三綱尾欠掃數全完以清積壓現據各商自限九月內即可清完查三綱尾欠易完之故實因臣任內趕運淮南綱鹽原無遲誤積壓較前漸少尾欠無多至淮北綱鹽則自上年九月壬子綱已經年額年清為數十年未有之成效而本年淮北應運癸丑綱鹽現又據淮揚道夏建德稟報九月內仍可全數運完矣至溯查奏銷之限向例題定原在六月自康熙四十九年鹽臣李煦題請改至十月已遲誤四箇月至康熙六十一年鹽臣魏廷珍因二月到任將六十年辛丑綱之鹽應於六十一年十月奏銷者至雍正元年正月始行奏銷遂至遲壓七箇月嗣後輾轉愈遲至戊申一綱遂至全壓遲誤之由實始於此雍正七年鹽臣噶爾泰奏請提出戊申一綱分作十年帶完將已酉綱提上其應納錢糧即於本年十月開徵遂於次年九月奏銷今於雍正十年户部議覆奉旨準行內開暫以九月奏銷將來各項已清之後每綱提上一月歸於六月奏銷等因行文欽遵在案今奏銷之期雖尚壓三月而從前積引現在已經次苐清完俟帶行戊申一綱清楚即可遵照部行奉旨事理每綱提上一月三綱之內即可仍復六月奏銷之原限是奉行已有章程而從前之壓綱積弊可清不致再有貽誤之慮矣緣奉聖諭諄詳臣謹將先今實在情由并現今辦理之處據實陳奏伏祈皇上睿鑒謹奏壓綱之弊務須剗除淨盡毋少留根荄致滋蔓延同日又奏為密陳鹽政之要務恭懇聖恩事竊查鹽法之行總以緝私為首務私靖則官引自銷轉輸便利裕課恤商皆本於此淮南江廣口岸寬廣如果私鹽杜絶何慮積引難銷臣看地方督撫大吏非不遵奉辦理但以不關切已之務大槩有名無實是以今年江廣口岸鹽壅價減急難銷售皆由鄰私充斥實鹽法受病之根源也臣查兩淮行鹽地方江西河南有浙私蘆私之侵越而湖廣之川私粵私為害更甚現今雖於各處私鹽隘口設立巡官巡役頗為周密但地方文武官辨不肯實力奉行一任兵役人等避難趨易罔利營私以致立法雖嚴而鄰私充斥滋甚臣再四思維在督臣亦不過責成自已所屬地方至咨會鄰省即未必有呼輒應臣不揣冒昧仰懇皇上天恩申諭湖廣等省督撫俱以緝私為耍務俾文武官辨同心協力逺近愚民家諭户曉使川粵浙蘆之私鹽各畫疆界不致侵越則積壓之引自得易運易銷口岸無壅滯之虞於鹽法大有禆益兩淮商人感戴歡欣與加斤活價之天恩同沐髙厚於生生世世矣臣謹具密奏伏祈皇上聖鑒謹奏所奏是候另旨諭部然亦不可專諉之於此也同日又奏為密奏事竊臣伏讀上諭鹽政一官職司催鹽運使一官職司催課又諭旨朕之所聞如此欽此臣敬繹聖諭知係臣下入告者查考未確之言伏查鹽政運使之體制有似巡撫布政凡催鹽催課以及辦理一應事務有協恭之職任而無分理之責成今兩淮鹽務歷年課銀俱係年額年清惟運鹽則商人希圖長價故意延挨必須鹽政運使秉公實力設法催儹始克有濟若運使視催鹽一事非其責任勢必將運鹽之難獨諉之鹽政不特無臂指之益轉多掣肘之虞此正向來之積弊相沿日久遂至有鹽政催鹽運使催課之議論實係起於姦商惑聽之浮言並非設官定制之本意也臣因運使范廷謀徇情遲誤隨據實參奏蒙皇上天恩賞給尹會一為運使今臣現在責成尹會一應知都轉運使之官不可不顧名思義加緊協力催鹽不容其稍有諉卸今欽奉上諭雖尹會一萬不敢因此有所推諉但臣現與尹會一互相砥礪協力催鹽並未分任辦理之處不敢不據實密奏伏祈聖鑒謹奏理宜協恭豈容岐視覽奏知道了雍正十三年二月初二日署理江南河道總督印務管理兩淮鹽政布政使臣髙斌謹奏為據實查參恭請簡發人員以資委署事竊查兩淮鹽課每年起解京餉例帶補平銀兩以備添補餘剩原銀繳還運庫此歷來舊例也臣惟恐解員或有侵尅情弊每於起解之時諄諄面諭囑其潔已奉公據實呈繳不得絲毫欺隱至為嚴切乃有東臺場大使劉帝舉等十員於上年七月內領解餉銀一百十六萬七千餘兩當給補平銀一萬五千餘兩赴部交兑去後臣隨密加查訪詎該員等在部止添過補平銀九千餘兩尚餘剩銀六千餘兩膽敢欺公不法朋比侵分臣密飭運使尹會一嚴加查究該員等始吐實情僉供朋尅侵用不諱當即飛飭搜追現據吐出銀四千六百餘兩仍有未吐銀一千四百餘兩現在勒追繳庫似此等私欲薰心膽玩不法之劣員斷難姑容自應一例嚴參究處以為解員侵欺旨革職嚴審究擬外查各場鹽缺緊要需人現在所有試用人員不敷委署仰懇聖恩敕部撿發候選人員十五員交臣委署試用理合繕摺奏請伏祈睿鑒施行謹奏所請人員候諭部揀選發往雍正十三年四月十八日署理江南河道總督印務管理兩淮鹽政布政使臣髙斌謹奏為奏明口岸疏通場鹽豐裕仰慰聖懷事竊查江廣口岸前因鄰私侵越淮引壅滯荷蒙皇上天恩特諭各該督撫實力緝私以疏官引今據淮南商人稟稱口岸疏通積引行銷引窩價長大有起色目今趲運甲綱等情臣查口岸既經疏通引鹽自易銷售實賴天語之特頒致兹緝私之成效今癸丑綱掣運將完甲寅綱現在源源捆運從此隨運隨銷使課源充裕商力舒徐悉出聖主之恩賜臣當斟酌於遲速緩急之機宜隨時調劑悉心辦理再自春月以來天時和暢場竈廣産鹽斤價亦較前平減商人俱上緊收買濟運所有江廣口岸疏通及場竈産鹽豐裕緣由謹繕摺奏聞仰慰聖懷謹奏黽勉勿怠自有成效雍正十三年五月初十日管理兩淮鹽政布政使臣髙斌謹奏為酌議移駐道員以禆鹽務海疆仰請聖訓遵行事竊照三江營分巡鹽務道一缺其初原因三江口為私鹽經由要路將江寧府同知移駐彈壓繼因該同知有地方公事往來省城不能專司緝務隨添設三江同知一員前督臣髙其倬又以揚州淮安通州泰州一帶沿海及內河外江均有私鹽要隘必得統歸一員督緝而同知又難統馭府州因而請將三江同知曾𢎞緒加分巡道銜兼管督緝揚州府屬之江儀髙寶興泰淮安府屬之鹽城及通州如臯泰興等州縣私鹽案件并通泰淮三分司所屬各場伙仗事宜亦令該道巡查又山陽縣新分之阜寧縣緝私事務續經前署督臣尹繼善奏請併歸該道管理俱奉部覆準奉旨依議欽遵在案伏查三江口雖係私鹽要隘只須設一專員嚴督兵役查緝原可不必監司大員駐劄前此所以議改道員者專為查督淮揚通泰等府州所屬緝私及各場伙仗起見今三江營在大江之濱偏處一隅地非扼要又淮江引鹽經由之場關大伊關永豐壩烏沙河南河口泗州天長關淮所悉屬要隘雖經委員管理但係淮揚道督率查淮揚道係專司河務之員斷難分身親往稽查徒存虛名鮮有實濟亦須改歸鹽務道往來查察方為有益臣細查形勢泰州北門外之泰壩地方為淮南百萬引鹽彚集之所必由之路即淮南各場夾帶私鹽亦必由此透漏稽查抽稱悉關緊要實係咽喉重地應請將三江營鹽務道移駐泰州洵稱扼要至三江營應照青山頭之例添設守備一員增兵八十名足資巡緝該守備應歸揚州營遊擊就近管轄其三江營原設緝私巡役仍令該道稽查催督如此一為轉移所裨實多其設立衙署並俸餉養廉等項均於清出各項巡費裁存陋規內支用毋庸請動别款臣與督臣趙𢎞恩細加面商意見相同應否會疏具題移駐謹先繕摺奏請伏祈皇上睿鑒謹奏題請到日酌定有旨雍正十三年六月二十四日管理兩淮鹽政布政使臣髙斌謹奏為請旨事竊查兩淮各場竈户欽荷皇仁雍正五年特奉恩旨於近竈之地建設鹽義倉積貯米穀以備貧竈緩急之需經前鹽臣噶爾泰於泰州通州如臯海州鹽城板浦等處建倉六座交商採買米穀貯備在案伏查此項儲蓄重在惠濟竈丁必須酌量各場道里逺近建倉分貯使緩急易於接濟不致有跋涉往返之勞庶貧竈咸得就近買食常沾惠澤今查泰分司所轄十場止有泰州倉厫一座通分司所轄十場止有通州如臯倉厫兩座各場地方遼濶其間有去倉窵逺非數日不能往返者所以青黃不接之時竈丁未能沾平糶之惠一遇緩急動用則必酌撥運送既費腳價更需時日至淮分司所轄八場雖有海州板浦鹽城三倉但海州板浦俱在淮北隔越黃河而淮南之廟灣新興伍祐劉莊白駒等五場止有鹽城一倉距廟灣劉莊亦屬路逺往返維艱似宜仰體聖心再為斟酌分貯臣細加體查有泰分司駐劄之東臺場係泰屬十場適中之地又通分司駐劄之石港場係通屬十場適中之地地方髙燥人煙稠密均可建倉分貯其廟灣場即在新分之阜寧縣城外查城內亦可建倉分貯臣愚見請於東臺石港兩處各建倉一座每座分貯穀一萬石阜寧縣城內建倉一座分貯穀五千石如此則濱海各倉在在可以就近接濟緩急有資而無逺運跋涉之虞矣其分貯穀石查有通泰等倉從前賑糶案內動用米穀現在陸續買補即於此內酌撥分貯統俟撥定之日造册報部所需建倉工料銀兩請於裁存巡費陋規項下動支應用至各倉米穀向令商人管理但商人住居揚州離倉遙逺未免鞭長莫及所有新分三倉每年青黃不接之時應令各該分司就近督率場員監糶其餘各倉臨時委員稽查將糶價解貯運庫俟秋成詳報鹽臣遴委妥確之員協同商人買補還倉倘春月米價不貴毋庸平糶再倉貯攸關綦重查通泰等倉及揚州鹽義倉俱交商人管理令鹽臣稽查凡鹽臣離任之際似應照常平等倉督撫交代之例將册移交新任鹽臣接管查核具奏仍於每年嵗底開造四柱清册送部所有揚州四倉運使近在同城應令運使查明造册其通泰等倉查鹽務道現請移駐泰州應令鹽務道查察造册俱由鹽臣核明送部查核此臣愚昧之見是否有當伏祈皇上睿鑒訓示遵行謹奏建倉分貯乃極善之舉但錢糧倉庫必賴官兵守護方免疏虞况儲穀萬石為數不少若止因免竈丁跋涉起見雖便於一時恐不宜於久逺然朕未親履其地不悉情形不過據奏批諭耳當與督撫臣詳加計議斟酌辦理可也硃批諭旨卷二百五下
