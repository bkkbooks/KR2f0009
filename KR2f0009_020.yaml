絶不得虚應故事今據各屬出具蝗蝻盡絶印結其徐州如臯江都睢寧等處六月内間有飛蝗經過遇雨即滅蝻子生發一二處俱於未生翅時掘坑埋燒所以隨生隨絶俱未傷損禾苗理合奏明謹奏聞揚徐等處蝗蝻頗多禾苗或不無傷損其據實奏聞凡事不可絲毫粉飾以自蹈欺隱之過同日又奏為凛遵聖訓恭謝天恩事竊臣恭讀皇上批臣五月十九日據實奏聞一摺示臣以用人之道訓臣以防範之方諄切詳明開臣愚昩聖恩之高厚至矣極矣臣本才疎兼之性直幸得皇上如此之敎訓敢不字字凛遵時時謹守留心防範不敢偏任輕信有負皇上成全涵覆之德臣感激涕零具摺叩謝謹奏言之易行之難若非時刻留心精神周到少有疎懈則小人乘隙而入矣慎之勉之雍正二年七月十七日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為恭謝天恩事竊七月十四日臣齎摺標貟回蘇䝉皇上賜臣詩扇一柄臣恭設香案望闕叩頭祗領訖仰瞻宸翰之輝煌龍飛鳳舞跪讀天章之宏麗玉振金聲臣惟有凛遵天語朂精白以永貞仰體宸衷勉慎勤於匪懈生生世世常銜高厚之恩子子孫孫永寳圗球之賜而已臣遵㫖不敢具疏為此繕摺謝恩謹奏覽奏謝知道了振起精神殫心竭力整理地方既以報朕且可無忝厥職也雍正二年七月二十八日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊照蘇松地方夏秋以來雨暘時若可望豐收不意七月十八十九日正值海潮大汛忽起颶風猛雨海水驟漲溢入内地查有蘇屬太倉之劉河嘉定之吳淞常熟之福山等處松屬華婁之金山柘林上海之川沙等處一應沿海地方海潮衝入七八里十數里不等海塘坍缺數處兵民房屋倒毁并有淹溺男婦損傷田苗其蘇屬之崇明縣四面皆海潮水衝入城内約三四尺再常屬之靖江縣孤處江濵亦有潮水泛溢臣現在委員確細查勘飛飭堵築外一面加意撫慰以冀安全視被災之淺深酌賑恤之輕重輕者不致上厪聖懐重者再行㑹商題請臣又查得田禾被風之後棉花缺收早稻已秀者受傷幸而晚稻尚可無害合先繕摺奏聞謹奏海潮泛溢據查弼納陳天培黄叔琳俱經奏聞矣爾所奏因何稽遲若是被淹百姓加意撫恤務令得沾實惠不致失所雍正二年九月初九日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊江蘇等處因七月十八九日風潮陡作近海近江州縣不無田禾被損除經一面撫恤一面㑹題外應俟勘確之日另疏題覆至於未被風潮州縣尚多并報災之地亦有成熟不等合將收成分數分别具奏臣查江寧松江揚州徐州四府州屬收成有七八分蘇州常州鎮江淮安四府屬收成有六七分再者目下湖廣客米未到吳下晚稻方收是以米價未平約計上米毎石一兩三錢一二分次米每石一兩二錢四五分合行一併奏明謹奏已有㫖矣其遵㫖悉心料理務令災黎得均受實惠不可將賑恤之項徒為不肖官吏所侵蝕也同日又奏為奏明事竊臣所屬被有風潮州縣應於勘明題覆之日請㫖動撥銀米賑恤但恐災民一時急不及待臣查蘇屬崇明一縣被災更甚巳經撥銀買米二千石發徃平糶又經督臣截留漕米一萬石委員散賑其餘各屬臣率同布政使鄂爾泰先捐銀發賑於風潮州縣量加撫恤外臣又另發銀二千兩分賑淮揚二府屬至於揚州場竈備移鹽臣另行賑恤其松屬海塘衝塌之處甚多急宜搶修難以刻緩據該司詳明先撥庫項興築另行核明實數㑹疏具題合併奏明伏乞皇上睿鑒謹奏知道了但如此些微不啻杯水輿薪恐於事未必有濟也雍正二年十月二十八日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為請㫖事竊臣於十月初七日至江寧地方據通州知州白映棠解到遊僧一名明本該州稟稱九月十三日有遊僧投一字帖稱奉㫖查看沿海馬路墩臺由福建到江南即便到京復命等語臣見其蹤跡可疑隨即親訊據遊僧供稱在京法海寺居住舊年九月裏出京朝山是往九華普陀進香奉㫖你去進香須在沿海看看馬路墩臺貧僧進過香轉到福建又到浙江總是一肩行李獨自走的到了通州見有颶風水災淹人甚多貧僧掩埋過幾個去見白知州就差人解貧僧到這裏來的等語臣又帶至廵撫衙門再行詰訊遊僧堅執前供但前次云舊年九月出京第二次又云舊年五月出京口稱奉㫖未便即行發落臣伏思聖明在上天語煌煌豈容遊僧在外詐傳詔㫖妄肆招揺現在飭吳縣將遊僧明本看守或應解京或就近發落為此繕摺請㫖定奪謹奏何物遊僧輙敢妄稱奉㫖殊屬可惡膽玩之甚嚴加審究具題爾此奏摺并朕之批諭俱不必叙入疏中庶使天下人知爾秉公燭姦之果也雍正二年十一月二十五日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊江蘇地方安静冬季雨水甚稀十一月十八夜得雪五分回空漕船尚無阻礙現在陸續到次受兑矣上米每石一兩三錢一二分次米每石一兩二錢四五分新糙米每石一兩一錢二三分麥子每石八錢其山東河南運來平糶米麥現在委員接運分給平價發糶俟糶畢另行奏報為此繕摺謹奏知道了惟務恪秉一誠以冀感召天和尤宜精勤庶事莫惜心力同日又奏為再懇聖恩緩發銅價以清積欠以慎庫帑事竊江省辦銅價銀向例預年給發今雍正三年銅價臣因革職同知趙光謨承辦節年銅觔未清者甚多商人完舊不能辦新辦新不能完舊是以臣於七月間題請暫緩給發以便專催舊欠今接准部咨仍令給辦敢不祗遵但臣再四思維國帑分釐為重有經放之責者斷不宜循例濫給也查江省採辦銅觔必須有倭照商船方可往買總計每年進口洋船止可得銅一百三四十萬觔則一年之銅止有此數在商人樂於支領可以移新掩舊而朝廷二十四五萬之帑金何苦預入商手能保其絶無花費乎今雍正二年現追繳趙光謨舊欠銅九十九萬餘觔又知府蔡永清應交雍正二年下運銅四十四萬觔其餘現在陸續報解若此時又行給價則新銅既難副限而舊銅反得藉詞延緩矣若云一年之銅不敷鼓鑄則必舊欠全完新銅又依限交納誠為全美竊恐商船止此數目洋商止此㡬人雖有嚴例處分承辦之員而銅從何來勢不能一時併足也以臣愚見莫若仍懇皇上洪恩緩給新價專追舊欠則積欠可以清理新價不致懸宕矣除一靣繕疏具題外理合繕摺叩懇聖恩俞允謹奏具題到日廷臣議覆後朕再加斟酌同日又奏為奏明事竊臣於十一月初一日率同糧道楊本植前往松江沿海處所親歴塘工查勘凡應修築之處共估計四千五百十七丈該動支正項錢糧二萬八千一百三十九兩除華亭上海兩縣已將衝坍處所搶修其現在𦂳要工次飭令同知俞兆岳監督興工另調都司經歴陸廷樞到工協理濵食莫不感激聖恩歡呼載道臣於初八日回署訖理合繕摺奏明謹奏覽雍正二年十二月二十一日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為遵㫖奏明贏餘節省銀兩總數事竊臣於雍正元年九月間因奏交海闗羨餘及銅價節省銀兩奉有皇上硃批臣伏思各闗税銀雖有常額而商民過往原無一定數目至於銅觔節省出自正項錢糧所有贏餘分釐皆屬國課在臣總非應得何敢隱瞞入已䝉皇上優奬微臣諭令總題一本但臣不過據實啓奏何敢以此自居其名其應否具本之處伏乞皇上睿裁施行謹將解交内庫并封貯藩庫各項銀兩數目另繕清摺恭呈御覽謹奏凡此皆額外羨餘爾分中所應得者應如何料理任爾斟酌爾之實心效力處朕自鑒照雍正三年正月二十八日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊照江蘇各屬新年以來地方安静晴雨適宜河水比上年寛通重運漕船陸續開行不致淺阻麥子生長漸盛米價亦與臘月相同皆由我皇上愛養黎元多方培植當履端伊始得此豐登氣象也理合繕摺謹奏覽奏深為慰悦但宜據實切勿稍渉於粉飾雍正三年三月十六日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊江蘇地方雨水調勻三月初六初七日得雨二可接麥熟又䝉皇上特恩運米平糶民情踴躍歡呼臣伏覩我皇上至性純孝亘古未有即釋服即吉而孺慕之誠無時或已至於體恤臣工愛養黎庶悉本聖祖之立心行政顯揚光大宵旰不遑因此上召天庥七曜呈祥嘉徵協應太和氣象洋溢寰區臣不勝欣慶歡忭除具疏恭賀外理合繕摺謹奏覽奏巳悉爾今復回原任諸凡不可弛縱一切俱宜嚴加整飭署理地方責任綦重既能保前無憾於舊任内尤當加倍自愛庶無舛謬否則全功盡棄寧不可惜同日又奏為奏聞事竊臣於三月十三日訪得常州府靖江縣忽有棍徒假冒府差於本月初七日持假票一紙委靖江縣縣丞劉鑑摘取該縣知縣丁應蕙印信封閉宅門倉庫殊可詫異臣隨差署中軍官前往查察并令該知府葉前立拏假票棍徒究處去後又據縣丞劉鑑禀報前情容臣查明到日即行嚴審具題事闗地方惡棍假票摘印理合繕摺先行奏聞謹奏據奏殊可詫異此等閔不畏死之徒嚴拏究擬具奏雍正三年三月二十九日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊江南蘇松地方雨水調勻惟江寧之句容縣報稱稍有蝻子發動臣隨飛飭上𦂳撲滅務絶種類今幸三月二十日得雨二十一二三日接連大雨共計六七寸不等二麥甚是茂盛豐收在望俟收穫畢謹將各屬收成分數奏報現在米價上白米每石一兩二錢七八分次白米每石一兩二錢一二分糙米每石一兩一錢麥子每石八錢查江蘇雖係歉歳之後䝉皇上愛養黎元賑饑平糶接續麥秋並無私梟肆行無忌地方亦甚安静為此繕摺謹奏閲奏實慰朕懐年羮堯作威作福深負朕恩爾當絶跡逺之否則不特無益而反受其累也密之雍正三年四月初三日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為敬繳銅觔節省銀兩事竊江蘇廵撫每年應辦五省銅觔巳䝉皇上天㤙准臣條議改辦三省在案今雍正三年分應辦上下兩運銅共一百六十六萬三千一百九十八觔零共該發部價銀二十四萬一千一百六十三兩八錢零查蘇州知府蔡永清臣前原委其承辦雍正二年下運銅觔今巳齊全陸續起觧交部並無拖欠未完臣看得該知府為人謹慎辦事勤敏堪以再委辦理隨將雍正三年分辦銅事務飭委領辦據該府禀稱本年銅價上運擔石節省銀一兩一錢下運每擔節省銀一兩九錢共節省銀二萬四千九百四十七兩八錢零臣查銅觔發價已有商人情愿領辦具結在案則此項實屬節省何敢隐匿一面將銀封貯司庫將來如有動用之處悉候皇上睿裁理合據實奏明謹奏辦理允妥甚屬可嘉知道了雍正三年四月初六日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為恭謝天㤙事雍正三年四月初三日准吏部咨文為欽奉上諭事雍正三年三月十八日内閣交出奉㫖署江蘇廵撫印務京口將軍何天培人甚謹慎因在將軍任上聲名甚好朕著伊署理江蘇廵撫事務伊屢次奏稱江蘇地方事務甚是繁劇自幼從未身任文職地方事務不能確知難以辦理朕因伊缺未得勝任之人所以稍待布政使張楷歴任聲名好今調來引見人去得甚是平易謹慎著補授江蘇廵撫何天培仍在將軍任上行走何天培奏摺一併發出該部知道等因到臣欽此欽遵臣聞命之下隨設香案望闕叩頭恭謝訖伏念臣一介武夫至愚極拙䝉皇上特恩畀以江蘇廵撫重任署事兩年有餘一無報効臣夙夜惶愧恐懼不寧是以上年十一月間具摺奏辭廵撫印務䝉皇上鑒察微臣畏懼之心恩許另降諭㫖今於四月初三日伏讀上諭優奬逾分准臣摺奏不即罷退命臣仍在將軍任上行走隆施異數有加無已臣非木石能不感切肺腑儘此餘年竭力圖報且京口要地駐防亦屬重任斷不敢以身居武職遂可偷安自逸虚糜廩祿惟喜駕輕就熟尚可勉䇿駑駘務期整頓營伍訓練士卒綏靖地方少報皇上洪㤙於萬一耳為此繕摺恭謝謹奏天之生物因其材而篤焉故栽者培之凡此皆卿自有以成全之非朕强能成全之也同日又奏為減糧特沛天㤙萬姓歡呼感頌合先據情奏聞事臣於四月初四日接准部文一件皇仁已遍寰區等事奉㫖將蘇州府額徵銀蠲免三十萬兩松江府額徵銀蠲免十五萬兩等因欽此欽遵隨經恭錄出示宣布皇恩并飛飭布政司轉行在案㐲念聖朝深仁厚澤屢行蠲赦四海沾恩但因蘇松二府錢糧額重相沿日久又䝉皇上特沛如天之德將蘇屬浮糧減去額徵三十萬兩松屬浮糧減去額徵十五萬兩聞命之下兩郡人民俱謂從此億萬斯年子子孫孫永沐浩蕩之天㤙共頌無疆之帝德而文武臣僚亦莫不欣傳曠典感激洪慈誠為亘古所難逢普天所未有也除士民具呈謝㤙情由應俟新任撫臣到日具題臣尚未離任合將萬民聞命歡呼感頌情形繕摺謹奏此番蠲免之恩亦不過施所當施而已雍正三年五月初三日鎮海將軍臣何天培謹奏為微臣戀主情殷叩請陛見以慰葵衷事竊臣本愚鈍武夫䝉皇上特㤙署理江蘇廵撫印務二年有餘毫無報効又䝉諭㫖仍回京口將軍任上行走伏念臣受皇上之知遇最深感皇上之㤙施獨重今繁劇之任少得息肩而戀主之誠彌殷寤寐回任以來凛遵聖訓惟有整頓營伍勤扵操演不敢稍有懈忽以期仰報皇上成全之大恩兹者封疆寧謐兵民安輯思得瞻仰天顔微忱廹切不啻孺慕為此繕摺叩懇伏乞皇上允臣赴京陛見恭聆聖訓則犬馬依戀之心庶幾稍慰臣叨沐㤙榮於無既矣恭候皇上睿鑒施行謹奏爾係朕所深知之人何必又多此一番往返況各省將軍督撫提鎮内尚有許多朕未識面者俟徐徐輪流見畢然後命爾來京也同日又奏為奏聞事竊臣於四月十二日自蘇州起程行至京口一路親自察看二麥情形竟有十分收成次者亦有八九分不等現在收割矣回任以來連得時雨秧苗長齊民間漸次栽種米價上白米每石一兩二錢七八分次白米每石一兩二錢一二分麥子每石八錢二麥豐登農勤力作地方寧謐皆我皇上盛德感召所致俾臣民皆遊熙皥之世臣不勝欣幸為此繕摺奏聞謹奏覽奏地方時雨麥秋情形深為欣悦同日又奏為敬遵聖訓事竊臣齎摺人回署臣跪閲皇上硃批年羮堯作威作福深負朕恩爾當絶跡逺之否則不特無益而反受其累也密之欽此伏念皇上之待臣子皆出一片至誠推心置腹悉從寛厚為臣子者即小心敬謹尚不能報効於萬一若擅作威福此皆䘮心病狂在天理亦不相容臣與年羮堯實係平素相識曾經徃還今年羮堯上負皇上天恩此等之人臣實在願與永逺絶跡恭繹御批全是愛惜微臣訓誡微臣之處臣不勝感激惟有凜遵諭㫖絶勿與通仍不敢稍有洩露臣并警惕自勉以仰副我皇上諄切誨諭之至意為此謹奏朕待人以誠不以偽即當日在藩邸時亦從不肯匿怨蓄疑何況今日君臨天下乎朕總就現在所見而行不存一切必固之念所奏知道了當如是雍正三年七月初七日鎮海將軍臣何天培謹奏為奏聞事竊臣䝉皇上洪恩回任京口又經三月喜得地方安静兵民和輯禾苗茂盛自六月十一日得大雨一日以後尚無雨澤現在建壇祈禱如得好雨及時田禾可無傷損米價上白米每石一兩二錢七八分次白米每石一兩二錢一二分麥子每石八錢理合奏聞謹奏京都祈晴尚不可得由此觀之即上天雨露之恩亦難盡使無憾也同日又奏為據實奏聞事竊京口地方係南北要衝往來絡繹臣再三嚴飭旗營不許容留過往官員家口并親戚家人等停頓多事乃有鑲白旗防禦年文煜本係年羮堯族兄臣於六月中旬訪聞得年文煜與伊家人往還暗暗在鎮江覔買房屋似欲寄頓人口臣隨即𫝊該旗協領叅領等嚴行查緝房屋之事並未成交但年文煜身為職官輙敢招揺多事臣已於六月二十七日以不職旗員等事題叅在案一面查年文煜家曾否寄放財物著協㕘領嚴究確情據年文煜堅稱並無容隐寄放并取協㕘領不致扶同隐諱各甘結存據今查得年羮堯於六月二十日渡江過京口前往丹陽先後船隻甚多隨從陸續而行不知其數船忩闗閉船中人等故為藏匿並無一人出面此等蹤跡甚屬詭祕臣伏思年羮堯乃上負皇上重恩之人理法之所必誅親故之所應絶豈容族人在外往來勾引以干法紀年文煜一門斷不可姑留在汛現今年文煜候㫖革職合將伊子撥什庫年先達革去並伊家口照例盡令進京歸旗以杜絶姦謀為此謹奏所奏甚是不可為伊存㽞一毫地步千百年品行名節所闗豈容瞻顧此等姦險負恩小人當共相盡情處治以為天下後世戒亦暢快人心事也同日又奏為叩請恩綸事竊京口八旗步兵一千名每名月支餉銀一兩糧米三斗歴受朝廷豢養又䝉我皇上常加格外之恩至深極厚但此等兵丁駐防年久生齒漸繁食口日衆臣查得杭州福建旗下步兵皆每月支糧米五斗惟京口向例只有三斗或至不敷養贍臣冒昩叩懇皇上特恩下沛將京口歩兵一千名每月按名加米二斗俾得均沾實恵既饒食用之需益深報効之念臣斷不敢沽名市恩使若軰預生希冀可否出自聖裁為此繕摺謹奏國賦兵餉經制久定朕亦不便輕為增損現今京師八旗尚未籌畫得宜何暇逺及外省況駐防之兵較京兵稍覺活動所奏加米之處且緩同日又奏為旗丁添設操演事臣查得八旗官兵内有步兵一千名俱係弓箭手除當差外操演之事惟有弓箭臣䝉聖恩回任分應加意整理今將旗下步兵一千名設立鳥鎗四百桿長鎗二百桿籐牌二百面弓箭二百副分給各兵臣親自揀選分别隨材習練務令􅈺熟以備㧞補馬甲其鳥鎗長鎗籐牌弓箭并火藥鉛彈等項兵丁無力製造臣願一槩捐備應用事闗添設軍務理合繕摺奏明謹奏好極如此實心整理營務何煩朕再加訓諭耶雍正三年七月十九日鎮海將軍臣何天培謹奏為據實檢舉事竊臣䝉皇上洪恩回任京口今七月初六日准到部文恭繹上諭凡有寄放年羮堯財物者俱令自行出首免罪等因隨嚴飭旗營凜遵去訖伏思臣與年羮堯雖平素相識其銀錢之事従未分釐往來再四思維惟有去年署廵撫任内有龍江闗年羮堯木料漏税一事臣實有疎忽瞻狥之罪不敢不據實檢舉為皇上陳之查雍正二年十月間臣奉㫖㑹勘李玉堂案件赴省在公館内有委管龍江闗之驛𫝊道徐克祺進見據稱川陜年總督採買造船軍需木料一萬餘根差莊浪縣朱典史現押到關應否免其輸税放令過闗來請示下臣一時愚昩竟令任其過關並未收税約漏税銀一千三百餘兩今年羮堯種種罪惡敗露則知此等木料乃其營私射利之事必非造船軍工所需臣此時既無年羮堯片札又不見伊家人一面遽慿道臣之言不念朝廷税課為重縱放過闗不惟失於覺察而疎忽瞻狥之咎實所難辭至今思之悔恨無地寢食不寜若再隱忍不言臣罪滋大為此繕摺檢舉惟有叩懇皇上敕部嚴加議處臣不勝惶悚待罪之至謹奏知道了爾係小心敬謹之人非比鑽營附黨之輩朕自諒爾實並無一毫嗔責之意爾但坦懐整理營伍為朕效力可也雍正三年八月二十四日鎮海將軍臣何天培謹奏為聖躬即吉請紓餘慕事臣觀自古以來以天子而恪遵古典守制終喪未有如我皇上之至性純篤者也伏思雍正三年二月十三日恭遇聖祖仁皇帝服闋之日即應釋哀即吉而皇上感傷猶切以孝恭仁皇后服制在身齋居素服黙懐罔極盡禮盡情獨隆千古兹當八月二十三日又值孝恭仁皇后服闋之期照例祫祭廷臣奏請曉諭中外乃我皇上聖德謙沖不欲使孝名宣播於衆自行家禮曉諭之處不允舉行則是皇上巳經即吉而大孝終身之慕洵無窮期也臣仰體聖衷不敢循俗稱賀但伏念皇上勵精圗治日親萬幾允宜勉寛聖懐以紓無窮之慕庶天下臣民悉遂歡忻瞻戀之私矣為此繕摺謹奏覽奏已悉此實無可奈何之事但無窮之慕如何得紓雍正三年十二月十六日鎮海將軍臣何天培謹奏為奏聞事竊臣查京口地方因今歳豐熟米價並不騰貴回空漕船俱已陸續南下現在從丹陽至京口一帶築􅄵挑河上𦂳儹工臘月十四日得瑞雪三寸麥子亦巳栽種米價上白米每石一兩一錢七八分次白米每石一兩六七分糙米每石九錢三分麥子每石七錢當此歳暮隆冬四境安静兵民輯和臣駐防重地惟有勉供職守共祝聖天子萬福攸同而巳為此繕摺謹奏閱奏朕懐深慰諸凡全賴爾等内外諸卿之輔弼贊勷也雍正四年五月初四日鎮海將軍臣何天培謹奏為奏聞事竊查京口地方春夏以來安静無事兵民輯和雖雨澤畧少而時有微雨二麥漸次收割有七八分收成江浙漕船於四月十四日以前俱已渡江米價並不騰貴今時值農忙秧針茂密皆我皇上愛養黎元之所致也為此繕摺謹奏知道了今歳直𨽻麥秋收穫為數十年來所罕見者實為上天之優渥宏慈去年水災原非尋常可比若無今此二麥接濟則畿内黎元何可當也雍正四年七月二十日鎮海將軍臣何天培謹奏為請嚴遏糴之禁以裕民食事竊查天下米糧出産於東南各省居多平日藉客商販易流通偶有荒歉之歳所資藉於隣省倍為𦂳要即如福建之米取給於臺灣浙江廣東之米取給於廣西江西湖廣而江浙之米皆取給於江西湖廣此數省之米茍無阻滯歳歳流通源源不絶小民雖遇歉收尚不至扵乏食乃有地方豪棍私自倡衆遏糴横行攔阻客商買米視同私販不許出境亦有囤户壅積希圗厚利甚或江廣之米幾月不下遂至米價騰貴其間不肖有司聽人聳囑公然示禁是聖天子德意周流每格於居竒遏糴之徒而艱食或不免也以臣愚見伏乞皇上勅部詳議除販米出洋永不開禁外其内地産米之省行文地方官務使通商便民嚴查民間私自結黨倡衆遏糴立以創懲之法永為定例庶幾年榖豐登徧地皆盈玉粒即偶遭荒歉小民得繼饔飱矣為此繕摺謹奏朕最惡遏糴前歳直隸井陘今歳江西均有此舉又前此楊宗仁之禁米出境朕俱經嚴諭戒飭但不必預為約法此乃朕所深知之事雍正五年三月十六日兵部尚書署理鎮海將軍印務臣何天培謹奏為恭繹聖訓叩謝天恩事竊臣於雍正四年十二月十四日輪班陛見䝉皇上天恩擢授兵部尚書屢同九卿召入養心殿得覲天顔親聆聖訓朕自御極以來一切用人行政悉遵皇考之舊章兢兢業業因時制宜猶且憂勤惕厲宵旰不遑總期君臣一體無黨無偏以承皇考付託之重爾等為臣子者存不得一點私心務要絶去黨援忠誠為國和衷協力全是一團和氣輔佐朕躬以成一道同風之治方不負朕諄諄教導之至意臣敬聽之下感激惶悚不勝慙愧臣年衰質鈍雖不能報稱於萬一然人非草木感極思奮敢不竭盡駑駘勉自策勵兹扵二月初六日復䝉特㫖命臣署理鎮海將軍印務臣於三月初六日到任署事雖離京二千餘里心神夢寐猶如在皇上之御前依戀不舍口誦心維無非聖訓不敢因署事而稍有疎懈之心不敢以暫理而不竭犬馬之力勉効涓埃以供職守除到任日期另具本題達外為此繕摺叩謝天恩謹奏知道了朕推誠訓諭爾等諸臣無論在内在外自應實力遵行方不負朕諄切之意同日又奏為奏聞事臣查得京口地方因入春以來雨水過多自二月底至三月中天氣晴暖巳經半月有餘除圩田水淹之處未及種麥外其髙阜之區原有十分之七麥子盡皆長發目今上米每石一兩二錢一二分奏覽雍正五年閏三月二十七日兵部尚書署理鎮海將軍印務臣何天培謹奏為欽奉上諭整武備以肅軍威事臣於二月初六日面奉皇上諭㫖江寧滿洲兵丁著學習水師爾部㑹同議奏欽此臣等議得撥沙船二十隻營員千把四員交與江寧將軍伊里布著八旗學習奉㫖依議行文在案臣於三月初六日接署印務閏三月初十日挑選新舊船二十隻所屬千把四員送江寧將軍伊里布查收操演竊謂操演船隻必看水勢風信方可駕船江中操演伊里布未諳水師只以操演為急不論是何風信俱要操演千把不肯即行辱罵定要赴操臣思兵馬船隻倘冒不測所關非小臣若以書信知㑹伊里布未必信從伏乞皇上飭諭伊里布當看風信操演不獨此時新操理當慎重即往後熟練亦必須謹慎方保無失為此繕摺奏聞伏乞睿覽施行謹奏伊里布秉性向來偏於固執今命爾前往署理不可因滿洲兵而瞻前顧後亦不可因暫署而因循推諉有一日責任即應了一日職守方是新任長夀人明白甚為稱職可將水師操演之法詳細説明與伊令其勿求速效徐徐課督八旗學習此並非急務何必於初演時即如此廹切也伊里布於此處任事太過矣雍正五年五月初三日兵部尚書署理鎮海將軍印務臣何天培謹奏為遵㫖奏聞事臣於二月初八日陛辭出京䝉皇上面諭江南督撫居官如何之處可細細查訪臣凜遵在念迄今三月密行察訪務得確實方敢奏奏覽雍正五年八月十三日兵部尚書署理鎮海將軍印務臣何天培謹奏為請㫖事竊江寧駐防滿兵新設水師照例於八月中旬開操臣親往閲視以風勢水性順逆往來指示教導但京口所撥戰船二十隻隨船捕盜舵工水手人等共三百二十名其家向在鎮江之高資汛居住離江寜一百六七十里伊等身家不能兩顧似宜於江寧灣泊船隻地方相度無礙民田處所照人數酌量葢造房屋令其安頓居住庶可安心操演於水師有益臣不敢擅自咨商督臣添設理合恭請皇上訓示如果可行臣即㑹同地方官具本題逹伏乞睿鑒謹奏此非署印者所當料理之事殊為多事矣雍正五年十一月十七日兵部尚書臣何天培謹奏為奏聞事竊照原任江南廵察博濟營私敗檢辜負聖恩致被署督臣范時繹摺奏奉㫖革職交與臣等嚴審定擬具奏臣准部文之日即經移明蘇州撫臣陳時夏提齊犯證訂期㑹審併通行各屬將被博濟勒索之處徹底清查首報去後先因撫臣㑹勘蘇屬河道未有定期兹臣署理江寧將軍印務所有鎮海將軍印務已於十一月初四日移交新署臣拉錫視理臣即於初六日前赴常州府適中之地聽候撫臣至日㑹審明確定擬題報外所有微臣駐常現候撫臣㑹審緣由繕摺謹奏覽其秉公審理具奏母得絲毫依違瞻狥同日又奏為奏聞事竊照今歳江南地方䝉皇上福庇處處豐收臣所歴江寧京口暨現駐之常州府俱稻榖豐登米價平減上米每石一兩中米每石八錢四五分至九錢不等入冬以來天氣晴和户慶盈寧共樂昇平之福臣不勝歡忭之至理合奏聞謹奏據奏江蘇地方穀登米賤深慰朕懷再所奏二摺甚屬可嘉巳發部議矣硃批諭㫖巻二十
