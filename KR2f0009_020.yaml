body:
  text: 欽定四庫全書硃批諭旨巻二十硃批何天培奏摺雍正元年三月二十四日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為淮關勢難兼管懇恩酌改事竊照江南各闗奉㫖俱交地方官兼理惟查淮安板閘一闗距蘇七百餘里雖委員督理難於稽查仰懇聖恩酌令就近大臣管理庶國帑不致有誤一切闗務亦易稽查伏候批示遵行謹奏所奏是淮安關著總漕張大有委員管理稽查雍正元年五月初四日鎮海將軍署理江蘇廵撫印務臣何天培謹奏竊臣於四月十九日抵寳應縣地方適遇原任撫臣吳存禮即傳㫖諭吳存禮爾若將所虧錢糧能作速清楚尚可存爾之顏面如不行清楚斷不寛假吳存禮免冠叩首感激流涕跪奏云臣䝉皇上天㤙不即治罪令清還虧空銀兩臣敢不上𦂳料理竭力清楚當即謝㤙回蘇去訖為此繕摺覆㫖謹奏知道了當以國家錢糧為重不可一毫瞻狥情面同日又奏竊臣於二月二十四日抵蘇州射瀆地方有織造臣胡鳳翬前來跪請再若在地方多事爾便具摺奏聞撤伊回京將此㫖亦下與查弼納胡鳳翬叩頭祗領訖為此繕摺覆㫖謹奏朕原㫖謂胡鳳翬向來稍覺多事並非謂伊現今多事也昨伊大生恐懼具請罪之奏朕因為之發笑汝今向伊宣明前㫖係令爾悛改向日瑕疵如不能改或有多事處著我具摺叅奏並未曾責爾此任多事前所傳㫖差悞云云戒伊惟宜小心敬畏毋得越分妄為若能不放縱多事何必過為憂懼但只勉力做好官稍涉一毫放縦則不可也遇便將此㫖亦傳與查弼納知道同日又奏為奏報二麥收成米糧價值恭慰聖懐事竊臣於本年四月二十八日到江蘇廵撫任業經題報在案臣沿途查㸔二麥俱各茂盛兹據各屬册報前來江蘇松常鎮淮揚七府屬二麥有十分收成徐州所屬收成八九分不等目今米價白米每石一兩零五分次白米每石一兩為此繕摺謹奏朕躬甚安覽奏收穫情形深為慰悦雍正元年五月二十四日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為密請特簡賢能郡守事竊查蘇州一府最為繁劇知府高浚題㕘員缺必須才守兼優者方能勝任臣看得吳縣知縣蔡永清辦事勤敏民情悦服再接邸抄敬閲上諭祖秉圭人甚明白著以吏户二部員外郎缺即用查祖秉圭曾為江南桐城縣令百姓感激後在四川做官聲名亦好懇請皇上於此二員之内特賞一員為蘇州知府則扵江南要郡大有禆益矣謹奏祖秉圭朕巳另用於河工矣原係才幹之員所㕘高浚甚屬允當本到之日發㫖用蔡永清即令伊署理府事可也同日又奏為遵㫖奏明事本年五月二十日蘇州織造臣胡鳳翬到臣衙門抄奉皇上硃批將爾之所見所聞俱告知何天培伊自有主意當知㑹髙其位者亦著何天培密行知㑹欽此臣叩頭祗領訖伏思普天率土皆聖朝之赤子福建客商出疆貿易者各省馬頭皆有而蘇州南濠一帶客商聚集尤多歴來如是查係俱有行業之商於國課闗税及肩挑負販之小民皆有禆益與福建越獄臺灣匪類迥不相同在蘇交易之客商仍聽其照常生理臣令人不時暗察至於染躧二匠俱係店家僱用之人各有收管其中固有安分良民亦有酗酒不法之輩查去年五月間曾有躧匠謀盜富户其事未成已經地方官將為首之人盡法究處結案再查蘇州發賣各省經商布疋必須工匠躧染臣愚見飭令僱用之家各取保結更令地方官嚴加稽察則生事之徒店家不敢容留而彼亦畏法知警矣理合奏明至海口墩臺等處臣欽遵諭㫖密行知㑹提臣高其位加意稽察仰副皇上委任封疆之至意伏乞睿鑒謹奏身任封疆事無鉅細皆爾之責朕原命當行則行當止則止如是料理甚好雍正元年七月初七日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事臣前因江寧府屬各縣六月内缺少雨澤建壇䖍禱經臣繕摺奏聞嗣於六月二十四日甘霖大霈蘇松地方俱得霑足自後於二十八日及七月初二初四五等日又復連得澍雨田禾長發較之去年實勝其餘稍逺州縣所報雨澤大小不等大概高阜之處望雨甚殷惟淮揚徐所屬間有州縣報稱飛蝗經過並不傷禾害苗當即嚴飭該地方印官親往撲捕此後但得雨澤調勻普遍年景自可豐收現今米價上白米每石一兩一錢四分次白米每石一兩零四五分麥子每石七錢為此繕摺謹奏覽奏巳悉如此據實不隱纔是雍正元年七月二十六日鎮海將軍署理江蘇廵撫印務臣何天培謹奏竊今時届秋令雨澤頻施田禾茂盛較之六月間祈雨情形迥不相同年景豐收可望至民間米價比前稍減臣自到任以來首嚴販米出洋之禁著落地方佐貳官親歴各海口稽查每月結報仍咨㑹提督另飭營弁輪廵臣猶恐伊等通同作弊仍令標員密訪嚴拏姦徒畏法内地糧食不致騰貴矣為此謹奏内米出洋冝加嚴禁前巳降諭㫖深為留心可也同日又奏為據實陳奏事竊今七月二十三日有京口鑲白旗協領張倫自京引見回任到臣蘇州撫署據恭傳諭㫖張倫行走如何之處著將軍何天培奏聞臣祗領訖看得協領張倫行走勤謹辦事中平䝉皇上下詢理合據實奏明臣更有奏者臣荷䝉皇上隆恩以鎮海將軍銜署理江蘇廵撫事務所有駐不為我皇上陳之查右翼副都統張天植臣於三月間在京陛見因其在廣東做協領時為人老實曾經保奏䝉皇上准其署理將軍印務但張天植人雖忠厚才具平自謹飭自臣離任以來聞其攙越多事官員兵民實陳眀為此繕摺謹奏知道了同日又奏為奏聞事竊臣自愧庸愚毫無報効仰遵聖訓亟以緝盗安民為務臣檢查文卷内盗案事件甚多而蘇松二屬為最因該地方附近太湖泖湖澱湖等處且係浙省連界賊盗易扵藏匿是以竊刦頻聞臣屢經嚴飭地方官上𦂳比捕查拏邇來兩三月間盗案畧少但盗賊出没每在深秋冬令為甚臣細為籌畫除明拏之外設有密緝之法現在捐造快船二十隻并捐給船上水手口糧挑選壯健兵丁扵蘇松常鎮一帶地方分頭密訪凡盜賊出没之所並盗線盗窩務必備細確查實力躧緝臣分别懸賞仍暗行知㑹提臣高其位倣照此法互相稽察如有誣良䧟窩藉廵擾民諸弊立即軍法重處臣伏覩聖主軫念民瘼常以綏輯封疆之事上厪睿懐為此繕摺謹奏為緝盗一事已曾特頒諭㫖與爾等亟當同心協力互相稽察以綏輯地方雍正元年八月二十日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊江南地方全賴雨水調勻秋成有望臣自莅任以來見五月間時雨霑足深為慶幸不意自處暑以來秋禾正欲漸次吐秀而亢暘一月點滴未沾沿河近水者儘力戽救田禾稍有可觀其支河小港皆成乾涸山田業已枯槁各屬紛紛告災現在委員察看有可戽救之處飭令晝夜戽救數日之内倘得大雨連降其未槁之禾原有五六分收穫如依舊亢旱禾苗不免黄萎臣目擊情形不敢緩於入告俟各屬報齊即便分别成災不成災州縣另行題達合先將秋旱大概情形繕摺謹奏江屬缺雨情形奏聞殊覺太遲其所以致此之由亟當返躬修省以期來歲之收穫同日又奏為預籌積貯事竊臣查下江倉榖自上年上元等十六州縣被災前撫臣吳存禮題請賑饑因捐例積貯米榖動用不敷復將康熙五十八年截留江廣漕米湊賑現催造册報銷所餘截留漕米除銷耗及虧空外止存七萬餘石又續收捐例積榖約共一萬餘石現今江南秋旱設有動用之處一時實難應濟臣查本省現行常平倉事例數目稍重報捐寥寥徒有開捐之名究無積貯之實臣請倣照河南廵撫石文焯題准開捐事例九欵於江蘇等七府一州一體准行捐貯榖四十萬石足數停止其各欵榖數各照本省酌定但須稍為平減使有力之家踴躍於功名待澤小民不致於懸望則扵地方可有備無患矣再查儲備倉庾惟現年漕糧截留最為便易或得特降恩綸仍截留二十萬石分别存留各府加謹收貯俟應用時臣等酌議題請動支則就近轉移不必有需時日扵倉儲民生更有禆益臣為地方起見敬陳末議叩乞皇上俯賜採擇於二者之中允行其一庶億兆均沾渥恩地方厚幸矣恭候御批以便核查項欵細數及收貯處所繕疏㑹題為此謹奏總理事務王大臣㑹同户部速議具奏雍正元年九月初九日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為接管海關敬繳贏餘銀兩事竊查海闗每年額徵錢糧二萬三千一十六兩零應解交司庫又正額外增贏餘銀一萬五千兩應解交户部又每年應貼銅觔脚費銀二千五百兩幫翰林院庶吉士銀三十兩應扵歳底報銷前任撫臣吳存禮委蘇州府同知趙光謨代理自康熙六十一年七月起至雍正元年四月卸事止及臣署印應自四月起至六月止計一年屆滿共徵收鈔銀二萬三千二十餘兩業扵前月二十九日具疏奏銷其額增贏餘銀一萬五千兩例應解部轉交内庫已於九月初八日起解在案臣接管以來錢糧既已經手自應儘徵儘解因查額增之外當必更有羡餘今據趙光謨另開出銀五千七百三十二兩零呈送前來臣思此項既係羡餘豈容隱匿入已謹將銀兩驗眀封貯恭請皇上批示著落以便解繳嗣後每年屆滿如有此等羡餘遵照呈繳庶錢糧不致欺隱矣為此謹奏此等羨餘銀兩難定確數爾雖據實奏聞朕不便批示解繳凡類斯等項爾只可一面奏聞一面暫存司庫遇地方有公用之處或爾有賞犒之需原係爾當得之物奏請動用假若地方上無可動用之處積至二三年後為數已多總具一疏題明亦可令他省督撫知愧似此零星結算爾之㢘潔殊不明顯且恐以此數著為成例在事人員又扵額外增取貽累商民再者嗣後倘值年嵗不佳不及此數反令人生疑竇何不將現年之羨餘留備他年之缺額以有餘補不足耶若慮屬員或不見信即將此意宣明於衆公同封貯庫内料該屬自必悦服也特諭同日又奏為接辦銅觔敬繳贏餘銀兩事竊江蘇廵撫每年應辦五省銅觔二百七十萬一千九十八觔零折算二萬七千七百餘擔每擔部價銀十四兩五錢共應發司庫銀四十萬一千九百三十九兩零前任撫臣吳存禮委蘇州府同知趙光謨辦理康熙六十一年銅觔已陸續解完在案其雍正元年上運銅觔現在嚴催起解下運銅價俱已照例預發雍正二年上運銅觔亦於吳存禮任内預發司庫銀二十四萬七千九百兩零給趙光謨領出採辦去訖臣思辦銅責任綦重原須遴委大員辦理今同知趙光謨已扵本年上運銅觔運解遲延案内題㕘革職臣接管任内應在今秋發雍正二年下運銅價銀一十五萬四千二十六兩零臣業已委江蘇按察使葛繼孔蘇州知府蔡永清協同承辦矣臣查向例每年上運銅價每擔商人領銀十三兩二錢下運銅價每擔商人領銀十二兩四錢今據各商領價時僉云洋内産銅漸少銅價漸昂倭照有限採辦維艱不能遵照往例務求增益價値方肯具領該承辦官再四酌議每擔量加銀二錢計現在應辦下運銅觔一萬六百二十餘擔商人實領去銀十三萬三千八百四十兩零合之部價目下已節省銀二萬一百八十二兩七錢若通算兩運銅價上運每擔實餘銀一兩一錢下運每擔實餘銀一兩九錢共計原可節省四萬餘兩矣臣查江浙兩省辦銅事理並未有繳過節省銀若干成例臣思既有商人情愿包辦包交領狀在案則此項節省銀兩何敢收藏入槖若必俟上下兩運解完掣批核算則自司庫發銀以後直遲至兩載有餘尚不能完結臣謹將現餘銀二萬一百八十餘兩封貯叩請皇上恩示著落或存留充餉或搭解内庫嗣後每運給發銅價即行扣算節省銀兩清繳庶錢糧不致互相隱漏矣恭候批示容臣扵報銷時另造細冊具題伏乞睿鑒謹奏此事於委辦之初不知曾有節省之議否如有根據宜援引題奏若無節省前例即係陋規則照依海闗奏摺所批諭㫖一體遵行可也諭何天培朕聞揚州府寳應縣丁憂知縣吳之珽居官有㢘慎之稱未知確否爾其查明若實係出格賢員即於爾江蘇所屬𦂳要州縣暨同知等缺指名題補一面密摺先行奏聞或名不副實不過平常好官則可不必並諭查弼納遵照雍正元年九月三十日鎮海將軍署理江蘇廵撫印務臣何天培謹奏竊臣於八月間將江蘇所屬秋旱情形摺奏於九月二十二日齎回臣跪閱御批感激惶悚無地自容伏思皇上念切民依時勤宵旰似此秋旱成災自應早為陳奏乃臣心愚昧遷延時日臣咎奚辭䝉皇上不加譴責訓㫖諄諄令臣返躬修省以期來歳之收穫此實聖主格外垂慈警醒愚䝉之厚㤙也臣從此益加勉勵竭盡駑駘惟冀大江南北時和年豐三農稱慶庶不負我皇上戒勉微臣軫念兆民之至意再查寳應縣知縣吳之珽臣到任一月有餘該員即已丁憂聞其居官好人去得現在交盤容臣細訪如有可以保題之處㑹同督臣具疏為此繕摺敬繳御批二摺諭㫖一道謹奏所奏俱悉爾等封疆大吏扵地方之豐歉實有感召之理若不能進賢退不肖使民情抑鬱不舒而望風雨調順時和歳稔豈可得乎上司將所屬劣員姑容一日則百姓一日在湯火之中以此等為慈善朕所不解要當以公正自矢或遇有為難掣肘處勉力操持更與查弼納和衷商酌而行雍正元年十月十九日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為凛遵聖訓據實陳明事臣伏讀皇上諭㫖洞鑒督撫供應陋規府㕔查盤積弊出差官員餽送煩擾悉䝉皇上睿慮周詳諄諄誡諭凡屬臣工靡不滌慮洗心凛遵聖諭況臣世受國恩毫無報稱兹以武職忝任封疆聖恩高厚無以復加敢不日夜冰兢硜硜自矢聞向日餽送廵撫節禮諸項正數之外又有堂禮隨禮紬縀禮喫食禮其他鑽營署印請託題調扣尅規例濫准詞訟盈千累萬操劵立致臣到任以來一概禁絶惟布政司衙門尚有臣規例銀四千兩此外亦不無些小陋規陸續取應日用臣實不敢隱瞞蓋臣全家二百餘人衣食藉以無缺皆叨沐聖主豢養之恩也臣立身孤介内外絶無黨援耿耿一心仰祈皇上洪慈曲垂鑒察即如近者奏請開捐放賑實因目擊地方情形萬不得已倘此中稍萌一毫不肖之心不獨皇上洞照無遺即天地神明定不容其安享也惟臣所深幸者布政使鄂爾㤗潔已自好肯為朝廷出力臣諸事得藉其佽助從此益加自勉表率屬員仰遵聖訓務以節儉絶虧空之源以忠勤盡報稱之實并訓臣子暨家人共安樸素竭力奉公以盡臣愚誠而已謹奏朕一切訓諭專望爾等實心奉行果能遵守弗失朕自能照鑒同日又奏為敬籌徵漕賑濟事宜仰祈睿鑒事竊查江蘇地方今年秋旱被災二十四州縣徵漕屆期各屬紛紛具詳欲照上年武進等九州縣漕糧緩徵一半之例申請前來臣思漕糧闗係重大一經緩徵必至因循墮誤日久終歸積欠況今年被災州縣大半在蘇常財賦重地漕糧額數獨多天庾需用殷繁豈能懸待臣槩不淮其所請勸諭竭力輸將在案矣但臣尚有下情冒昩陳請一則上年之帶徵漕糧難辦也上年武進等九州縣旱災既經前撫臣吳存禮題准緩徵一半應於今冬帶徵乃今年除丹徒沭陽兩邑不被災外其七州縣又復被災必須完至十五分明年帶徵五分新舊合算原有十分之數而新漕之五分暫緩災民之力得以稍舒矣一則今年之米色購買未純也查今年被災州縣田既被災所産米色豈能純潔抑或購買完糧更難一律叩懇皇上准被災田畝漕糧許其紅白兼收庶幾徵者不至遲誤納者亦易於輸將矣一則目下之放賑孔亟也臣查江蘇積貯鮮少只有五十八年截漕米并歴年捐例榖米共存八萬餘石所以請照河南九欵事例開捐䝉皇上隆恩依議准行誠備災恤民之至意也但行文各屬捐納榖石一時不能濟賑叩懇皇上准借蘇松糧道庫銀十萬兩并動舊存截漕米捐例榖米八萬餘石容臣飭查饑民實數委員以銀轉移間饑民得以全活庫帑不致有虧於國計民生均有禆益矣以上三欵現在㑹疏分别具題伏乞皇上批示施行謹奏知道了同日又奏為遵㫖奏覆事查得原任寳應縣知縣吳之珽臣到任未幾該員即已丁憂但聞居官好人去得容臣細查業經繕摺奏聞臣隨即㑹同督臣查弼納密訪寳應縣隣屬一面飛調該員到臣署親自驗看人亦伶俐但察其語言舉動不免輕率雖在寳應做官稍有聲名尚非出色人物與臣訪聞無異理合據實覆㫖謹奏覽奏巳悉如此據實直覆甚是雍正二年正月初四日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊蘇州自雍正元年十二月十三十四日得雨至十五日得雪二寸十六日得雪三寸十七日又得雪二寸於二麥大有禆益三農歡慶米價亦少平減皆由聖主愛飬黎元洪恩浩蕩上格天心有此瑞雪為今歳豐年發兆臣不勝踴躍歡忭為此繕摺謹奏但能黽勉吏治自䝉上蒼垂慈黙祐也雍正二年正月二十七日鎮海將軍署理江蘇廵撫印務臣何天培謹奏為奏聞事竊臣於正月初三日前往常鎮一帶察看河道親飭該管地方挑濬即於十二日回署回空漕艘盡已趕到受兑漸次開行矣今月二十四日一晝夜雨雪連下約有三四寸既於二麥有益而河水深通重運亦無阻滯再查米價上白米每石一兩二錢一二分次白米每石一兩一錢二三分麥子每石八錢四五分為此繕摺謹奏據奏雨雪米價情形已悉北方近日缺雨朕心甚憂同日又奏為奏聞事竊江南地方惟淮揚沿江一帶私鹽充斥屢經督臣查拏鹽梟遁跡至蘇松私鹽原非江北山東可比只因地方與浙江連界上年浙省歉收饑民乏食藉荒販私流入江南境内臣屢咨㑹浙江撫臣鹽臣彼此協同禁止乃自去歳臘月以