body:
  text: 欽定四庫全書硃批諭旨卷八十一硃批嶽超龍奏摺雍正六年四月十五日直隸天津總兵官臣嶽超龍謹奏為奏聞事竊臣自抵任天津惟有恪遵聖訓釐剔弊端以仰報高厚於萬一今查明天津總兵衙門向有陋弊臣不敢欺隱敬為我皇上陳之一各營公費糧有六七八分不等原為添製旗械火藥等項公用今查各營在公項動用者無幾大半皆係供應總兵衙門之用臣通飭各協營嗣後糾參一各協營路每年與臣衙門書辦規禮銀二百餘兩又拔補千把總每一員與臣衙門書辦及各項一總兵衙門書辦及標下各協營書辦旗隊等除本身糧一分之外俱有多食貼糧一分二分不等臣查伊等有催漕出差遊巡往返盤費現在咨商一鹽商每年與臣衙門書辦飯銀二百八十八兩思維將此項飯銀或仍留分賞各書辦作養育家口之需可否賞給出自聖恩一總兵衙門除鹽規之外尚有鹽商每年餽送節禮銀二百兩臣荷蒙皇上隆恩將鹽規銀二千六百兩賞臣養亷何敢又受節禮因思臣標兩營鎗手兵丁仰沐聖恩在公費內製造火藥賞給操演惟弓箭兵丁二百名自行購僃每箭五枝價銀四五錢不等亦屬艱勤加習射庶與鎗手兵丁一視同仁均沐浩蕩洪恩於無既矣臣芻蕘之見是否有當伏乞皇上批示遵行謹奏初到任之奏即能如此明白妥協者少朕實嘉悅覽焉勉之勉之同日又奏為恭報雨澤事竊查天津地方入春以來雨水稀少臣於四月初六日前往大沽查閲海口一路見麥苖亢旱臣回署即會同鹽臣鄭禪寶及闔城文武於初九日設壇步行祈禱仰賴皇上洪福於十二日亥時起至十三日丑時止下雨五指所有得雨日時理合具摺奏聞謹奏今歲春雨各處俱報霑足京中亦稱雨暘時若不料天津相隔咫尺乃竟亢旱覽奏得雨日期甚慰朕懷但託朕洪福一語殊不以為然倘爾等文武大員不能令兵民輯睦刑賞允當恪秉公誠以迓天庥而徒仰仗朕之洪福雖步行祈禱亦恐未必即有感應也惟捨末務本則其應如響蓋上天神明所喜者只一是字天人不過一理而巳知此更當加勉自勵雍正六年十月十三日署理湖廣提督臣嶽超龍謹奏為奏聞事竊臣陛辭就道於十月初十日巳抵常德府擬於十一日任事先於初九日途次接準署提臣劉世明揭帖內開現在奉旨辦理派撥遣往貴州兵馬若即交印誠恐難於調遣巳旨湖南所派官辨兵丁俱著揀選賢能精壯者命往并多給口糧令其速行起身嶽超龍甫到新任於人材尚未深悉其選派辨兵之處著劉世明辦理俟官兵起身之後再赴甘肅巡撫之任再著該提督巡撫預派兵丁一千名聽候調遣欽此又部文內開奉旨此事著劉世明辦理俟嶽超龍到時如有未完事件嶽超龍即行承辦斷不可遲誤欽此仰見我皇上睿慮周詳聖謨廣運臣祗領欽遵查派撥赴黔官兵業經劉世明揀選派定外其預派聽候調遣之兵丁亦當早為選派庶免臨期遲誤臣雖未接印理難坐視凡有關軍務自應與劉世明協同辦理臣隨面加商酌將此預派兵丁一千名會同派定先期行文各營預僃聽候調遣俟赴黔官兵起身臣接印後所有應行事宜次第舉行合將微臣到常日期並協辦軍務情由繕摺奏聞謹奏覽奏知道了雍正六年十一月二十四日署理湖廣提督臣嶽超龍謹奏為奏聞事雍正六年十一月二十三日準雲貴督臣鄂爾泰咨開準兵部咨奉上諭著將湖南附近貴州之營兵派撥一千名前往貴州聽候調遣荆州駐防兵預撥一千名前往常德府駐劄再預撥兵一千名聽候調遣此實聖謨𢎞遠動出萬全為粵西凶㺜正在會剿故也今廣西八達事竣早巳回師古州八萬地方雖附近黎平界連楚省而彼處生苖業經歸附寧帖並無違抗今現在敢拒官兵者惟凱里屬之丹江一路計黔省調往丹江軍前兵巳滿六千餘衆留防進取皆巳敷用湖南巳發之官兵一千名諒必附近撥來自應暫駐黔界遙為聲勢用則速調不用即當遣回至所預僃之駐防兵與緑旗兵各一千名似可無庸續發致煩遠涉相應移知等因到臣臣查前派官兵一千名於十一月初三日起程赴黔業經題報在案至於預派兵丁一千名前奉諭旨會同選派預僃聽候調遣今督臣鄂爾泰咨內雖稱無庸續發但係奉旨選派之兵臣仍照舊預僃不敢稍懈恭候諭旨遵行為此繕摺奏聞伏乞皇上睿鑒施行謹奏朕原有旨此番軍務悉聽鄂爾泰調遣當一一照依該督所咨而行一面將前項情由具題并咨明該部可也雍正七年正月二十六日署理湖廣提督臣嶽超龍謹奏為請旨預簡人員以僃委署以免懸曠事竊臣查楚省各營副參遊都守僃等官一遇升遷事故開缺其新任之員必經數月之久始得抵楚雖委員署理未免顧此失彼且查永順保靖桑植新經改土歸流貼防巡哨在在需員料理臣不揣冒昧懇請皇上於侍衛及留京年滿千總內各揀選數員發交督臣邁柱如遇副參缺出則於現任遊擊都司內選擇署理其遊都本任即將奉命來楚之員委署如遇遊都守僃缺出則將侍衛及年滿千總令督臣以相當之缺酌量具題請旨補授庶要地不致懸缺待人而任事者亦無鞭長莫及之慮矣再查湖北湖南督撫兩標原有分發武進士五名內除李庚臨委署均州營守僃外尚有四名未經委用但恐新進之員於營伍未必即能熟諳臣請嗣後如遇緊要守僃員缺將年滿千總委署題補其平易之缺將武進士內效力勤謹者委署試用如果諳練稱職再行題請補授臣因營伍地方起見可否俞允出自聖恩為此謹奏怡親王會同兵部確議具奏同日又奏為再懇天恩續發教習以益水汛事竊照湖廣水師巡查長江洞庭各路最為緊要臣自到任以來稽查水師各營詢其往來進退之法以及行使撑駕之方實未能熟練前蒙聖恩敕令揀選福建水師兵丁五十名到楚補伍教習仰見我皇上睿慮精詳無微不照無遠不周但查水師七營共兵三千餘名以臣愚見若得教習百名分撥各營於訓練倍加有益合無仰懇聖恩敕下福建水師提臣再為揀選五十名連前共一百名分撥七營則傳授不難於周遍而學習者自易於見功從此舟師精練水汛肅清部伍商民均沾聖澤於萬年矣臣謹繕摺具奏伏乞皇上睿鑒施行謹奏此所奏是該部議行同日又奏為奏聞事竊臣查常德地方上年自十月以後天氣晴和麥豆雜糧栽種遍滿至十二月內連得大雪交春以來雨澤霑足臣遣人四鄉查看麥豆雜糧等項俱各十分生發極其豐茂現在米糧價值亦平兵民安和地方寧謐臣謹據實奏聞謹奏據奏麥豆俱各豐茂朕懷深慰然必待收成後方敢以為信然也雍正七年四月二十六日署理湖廣提督臣嶽超龍謹奏為檢舉事竊臣前於直隸張家口副將任內保舉浙江金華副將羅俊辦事勤敏操守亷潔正直剛方堪僃任用繕具密摺奏聞今臣接閲邸抄奉旨聞得浙江金華副將羅俊為人輕浮料理營務亦屬平常著來京爾部請旨欽此臣聞命自天愧悚無地伏念臣質本庸愚知識淺陋因羅俊前任張家口參將與臣同城一載臣見其亷潔剛方遂即具摺保舉今不意羅俊在浙為人輕浮而又疏懈營務則從前臣之失於詳愼冒昧之罪實所難辭理合據實檢舉伏乞皇上敕部將臣嚴加議處以為薦舉不得其人之戒為此具摺奏聞臣不勝慚愧悚栗之至謹奏羅俊人原平常而且孟浪非至浙江方始輕躁疏懈也前因林祖成破格舉薦所以不次擢用朕目中實未見其有可取處汝之保舉大誤矣但初非因汝所保而用今何可議處汝耶同日又奏為奏聞事竊查常德地方本年二三月間時有微雨但未得十分霑足正在望雨之際於四月初七八并十六七等日連降時雨低田得水停蓄禾稻俱巳栽完及交小滿節氣大沛甘霖目今髙田亦俱布種再查二麥均巳登場收成約有九分至於米穀價值亦屬中平不致昻貴臣謹據實奏聞謹奏覽奏知道了所奏新經改流頑苖辱官一摺留中另有諭旨雍正七年五月初四日署理湖廣提督臣嶽超龍謹奏為奏聞事竊查永順土民聚衆一案實因土人賦性蠢頑同知潘果撫綏無術以致譟聚妄行經臣差委中軍參將趙秉鐸前往宣布皇仁曉以國法該土衆聽聞之頃莫不幡然悔悟感化輸誠俱巳陸續解散安業訖但永順既經改流該同知潘果如有縱蠧殃民實迹受害土民應赴該管辰沅靖道衙門控訴何得擅聚多人圍署捉役此中必有二三姦惡為首之人煽惑鼓釁雖目前業巳解散但不查拏按律究擬誠恐刁風漸長日後土苖獲解究擬以伸國法以警刁頑外所有永順土衆解散寧帖情由理合繕摺奏聞伏乞皇上睿鑒施行謹奏此案確係潘果庸劣之所致朕已有旨差大臣前往審理蠢頑土人刁風固不可長地方劣員敗檢溺職之風又可長乎審明後朕自有懲處之道雍正七年七月初八日署理湖廣提督臣嶽超龍謹奏為奏聞事竊查永順土民聚衆一案經臣具摺奏明蒙我皇上欽差署理湖北撫臣趙𢎞恩等會同審理其土民控告欵迹應聽欽差提訊但土人聚衆妄行所有鼓釁首惡自應查出治罪臣當咨移鎮筸鎮臣周一德就近調度設法密拏誠恐查拏之日首惡不無驚竄隨又差臣標遊擊星馳前往與永順副將協同料理去後兹據該副將等呈報本年七月初四日卑職等會同署永順同知白豐將土民哨聚案內殺牛吃血為首起釁之人彭𢎞耀田爾根等二十三名巳經擒獲當押赴辰州府交收理合呈報等情前來臣查此案為首起釁之人據報雖巳擒拏押解但未經訊供尚難懸定應俟欽差到日審明定擬臣猶恐實在倡首姦徒或有聞風潛匿之處亦未可定除檄行該將等再加密查確實毋致漏網亦不得株連無辜外所有拏獲永順土民聚衆各犯緣由理合繕摺具奏伏乞皇上睿鑒施行謹奏此事一切料理處皆屬孟浪不妥俟欽差審明之日自有分曉同日又奏為恭謝天恩事雍正七年六月初十日臣標把總齎捧皇上硃批奏摺併御賜紫金錠一匣到臣當即恭設香案望闕叩首祗領伏念臣一介庸愚謬膺封疆重任寸長未效慚悚方深今復蒙聖恩賜臣以內府祕製之佳品臣惟有益思正巳率屬砥礪官方以仰報高厚之恩於萬一耳理合恭摺奏謝伏祈皇上睿鑒謹奏據奏正已率屬等語言之易行之難朕不輕許汝也即使竟能盡此四字若不知訓練兵丁滌除陋習不過自了一身而巳與木偶何異曠職之愆仍不能免向來湖廣標卒驕悍不法巳久加之魏經國一味姑息以市恩邀譽廢壞至不堪問矣即馮允中亦只因循將就並未著力整頓後經劉世明蒞任數月甚為改觀因閩撫要缺不得其人隨又將伊調補朕於此任深望汝竭力革除舊弊今觀於一切辦理併採訪奏報等處甚不及劉世明似此虛負倚任不肯實力整飭營伍教誡兵丁滌除陋習恐非自全之術報恩之道也當深思之同日又奏為奏聞事竊查常德地方四五月間正在望雨之際得沛甘霖禾苖均巳布種惟自六月初旬天氣亢暘頗艱雨澤臣率同地方文武員辨虔誠祈禱無如一月以來甘霖未降其有塘堰之田尚堪戽灌者收穫可望六七分至傍山高田以及平田無水可戽之處稻禾就稿將來僅可補種蕎粟至現在米價每倉石八錢五分以至九錢不等因夏麥豐收是以不致昂貴臣謹據實奏聞謹奏楚省兵民刁悍成風文武大吏皆不肯實心任事馴至有司畏民將辨畏兵吏治營務之不妥協處莫可枚舉似此冠履錯謬是非顚倒以至水旱頻仍乃自然之理守封疆者咸係此等居心率同一類文武員辨偽事祈禱豈但彌月不能上格即其間幸蒙天恩大沛甘澤朕謂斷非汝輩忠誠感召之所致也假若讀朕訓諭凛惕自反省過悔愆洗盡私腸實心實力整理地方能令兵民改易舊習獲免上天之所譴罰則從兹五風十雨歲歲豐登朕可保其定然不爽不此之務而徒以外像儀文設壇建醮祈禱為事恐天地神明未肯被汝輩不忠不誠凡夫俗子之所欺誑也當與同事諸臣共相奮勉益加敬愼以講求探本尋源之道為要雍正七年八月十二日署理湖廣提督臣嶽超龍謹奏為聖恩高厚訓諭殷諄微臣感激難名愧悔無地敬抒奮勵悛改之下忱仰祈睿鑒事雍正七年閏七月二十六日臣標把總齎捧硃批奏摺到常臣跪讀訓旨開導臣愚悚栗慚懼莫知所措回環尋繹口誦心維仰見我皇上至仁如天所以矜憐而訓誨臣者無一不切中臣之隱微無一不深入臣之肺腑臣雖頂踵捐糜實莫能仰酬於萬一也臣一介庸陋荷蒙皇上天恩擢居總兵之職復奉命署理提篆適當魏經國馮允中因循廢弛之後經劉無可逭兹蒙皇上格外矜全不即擯斥賜以訓誨臣伏讀之下汗流浹背感激涕零竊念臣舉家受恩至深至重仰承訓示至切至明自今以後惟有洗心滌慮探本尋源恪遵聖訓實力整飭以贖前愆臣若再不猛省深思痛改則是下愚不移負恩莫大不但國法有加倍治罪之條即神明亦難宥臣之冥頑怙過也所有微臣感激愧悔緣由理合繕摺恭謝天恩伏祈睿鑒謹奏若不痛加䇿勵不但非人亦何顔見汝姪嶽鍾琪也勉之同日又奏為奏聞事竊查常德地方本年六月內雨澤稀少經臣具摺奏明今自七月以後雨水調勻霑足所種雜糧蕎粟等項甚是茂盛九月初間皆可全收現在米價平減上米每石八錢五六分中米七錢六七分不等兵民樂業地方寧謐理合據實奏聞謹奏今歲統計直省而論惟湖南報旱尚何顔具奏兵民樂業之語耶雍正七年九月初七日署理湖廣提督臣嶽超龍謹奏為奏聞事竊查常德地方入秋以來雨水霑足雜糧甚是豐收經臣繕摺具奏當此秋成之際臣差查通省各州縣收成約有八九十分不等惟湖南之澧州臨湘華容安鄉石門等近山少水之田禾稻收成歉薄其有水車戽之田俱有六七分至湖北之荆門州孝感雲夢崇陽通城大冶等縣雨澤稍覺愆期稻禾收成五六分不等臣思湖北湖南兩省地方俱皆豐稔而有此數州縣未登大有實由臣等奉職多愆不能感召天和之所致惟有實心修省敬謹奮勉以冀上天埀佑至於通省入秋雨澤甚調雜糧豐熟各處米價俱平地方安靜兵民樂業臣謹據實奏聞謹奏朕為年歲雨水屢有嚴諭蓋欲汝等文武大員秉公持正整理地方化導兵民返朴還醇感蒙上天許一是字召和氣以致佳祥之意非欲汝等匿災諱眚增減捏飾以寬慰朕懷也倘或錯會朕意誤事更為不輕戒之愼之誠之一字事事時時不可暫離此為最要同日又奏為敬陳苖疆要鎮之情形請改隸兼轄營分以資調遣以壯聲援事竊查湖南永州一鎮界連兩粵深林密箐最易藏姦更兼逼近苖􅍹防範尤須嚴密該鎮只有本標三營額兵一千五百餘名分布水陸塘汛二百餘處存城兵丁無幾設遇緊急並無兼轄外營可資調遣形勢殊為單弱臣查臨藍宜郴兩桂三營環列永州東南境壤相接但此三營俱屬臣衙門管轄與永鎮不相統攝雖鄰境有事無分此疆彼界然既係隔屬難免呼應不靈且此三營距常德皆千有餘里而與永州相去甚近臣愚請將臨藍宜郴兩桂三營將辨並額兵一千八百餘名俱令就近附永州總兵官兼轄不但該鎮有此三營得以資其調遣而臨藍等營與鎮標一氣聨絡更可互為聲援其於巖疆營制汛防均有裨益矣臣言是否可採伏乞皇上睿鑒批示遵行謹奏所奏候發廷臣議覆凡如此等地方營制事宜俱當會商督臣奏請為是今汝據一已之見而言諒廷臣亦未必遽定可否仍議詢問該督徒勞往返耽延時日殊屬不達事機同日又奏為請旨再申黃銅之禁以裕泉源以杜流弊事竊查民間擅用黃銅器皿有妨鼓鑄甚且姦徒銷錢作器以致錢價多昻上厪宸衷籌慮特頒諭旨惟一品官員之家器皿許用黃銅餘著遍行禁止此實我皇上優異大臣之聖心凡屬臣工莫不共知感激但查器皿之中凡紅白青銅以及鐵錫窰器木器皆可供用即一品官員而生臣不揣愚昧懇請敇部通行嚴禁凡一品官員之家所有黃銅器皿悉令源日裕流弊不杜而自除矣臣因裨益鼓鑄有關國計民生敬獻芻蕘是否有當伏乞皇上睿鑒施行謹奏即一品之家槩令繳官一體嚴禁亦未嘗不可但為期尚早俟收買數目奏齊之日朕再酌定雍正七年十一月十六日署理湖廣提督臣嶽超龍謹奏為欽奉上諭事竊查臣標兵丁蒙我皇上賞給帑銀一萬二千兩永遠存公營運生息以資惠濟隆恩曠典亘古未有闔標兵丁感激下情經臣繕疏代題在案續據湖南布政司委員解送銀兩到常臣與臣標將僃公同詳議據臣標中軍參將趙秉鐸等呈稱查常郡人煙輻輳惟有開設典當營運生息堪埀永久隨招募商人二名徐旭豫吳榮宗承領營運開張當鋪併取有該商承認結狀前來臣思開設典當通融周急不但無占奪百姓行業之處且以紓民間之偶乏洵屬可行隨即批飭取具該商的實保結存案併飭令各將僃輪流稽查出入確數前後接替交代臣仍不時詳加查核以杜侵那等弊其生息銀兩俟豐裕之日再為酌定惠濟之數另行具奏所有微臣遵奉辦理緣由除呈報戶部兵部外臣謹具摺奏聞謹奏此事料理甚屬妥協同日又奏為奏聞事竊臣查湖南地方風俗最為愚悍蒙我皇上仁育義正聲教誕敷屢頒諭旨諄切訓誡莫不感動天良同心向善即如臣駐劄常德府城有該學武生尹大卜於雍正四年間有江南揚州客民朱武臣借大卜房屋寄貯白蠟三千斤約值價銀六百兩未經取去至雍正七年間尹大卜聞朱武臣物故因訪問江楚兩地俱無武臣的屬大卜即具呈請將白蠟歸官變價修葺學宮以永埀朱武臣之名等情經該地方官查明通報在案又常德府河街地方商人汪詩桂於雍正七年八月間將銀五百兩託交船戶王起貴帶至漢口於九月過洞庭湖將近君山地方遭風覆舟一切行李盡被沉失起貴飄流登岸隨將沉失託寄銀兩緣由告知山僧一如及其徒朴園代為打撈至九月二十九日撈獲原銀僧一如即遣徒朴園遠涉大湖到常送還汪詩桂隨酬銀五十兩朴園堅辭不受而去當有嶽州士民及常德商人各自具呈該地方官通報在案又常德府屬之桃源縣給頂武生張應登於雍正七年十月十五日路拾遺銀二封共九兩四錢四顧無人只得㩦歸次日遍貼招字招主認還隨有潯洋坪民人郭玉培遺失銀兩赴應登之家細説錠件相符立即付還郭玉培堅請平分張應登固辭不受玉培感泣赴官稟明亦經地方官查實通報在案此皆我皇上至誠感孚風移俗易凡有澆漓之習皆成道義之鄉其應否請旌之處統聽撫臣核明具題臣現住常德目擊親聞不勝欣幸之至理合據實奏聞謹奏此非湖南風移俗易之效湖南官辨兵民之惡習不在於此也汝為楚省總帥能將已之一身勉力移易則營伍兵丁自然傾心率服即如督撫大吏若不能自勉遷改焉望屬員之景從百姓之於變耶此奏所謂不揣其本而齊其末方寸之木可使高於岑樓一二人之賢何能掩千百人之不肖爾意朕殊不取同日又奏為奏聞事竊臣於上年冬間接彞陵鎮臣杜森密字據該標守僃喻天柱密稟有探聞容美土司田旻如刑法嚴刻及派徴硝斤霜降合操衝打過隊且於五峯司地方宰殺牛馬呌衆人對神盟誓都要同心扶助等語字寄到臣臣隨密札鎮臣惟宜整頓操防切勿張皇漏泄以致激生事端去後續接鎮臣來字內云據差探兵丁回彞僃稱容美土司畏懼功令不敢恣意殘刻至於合操設誓徵徭等事原係該土司舊例並無别故等語是以臣未敢瀆奏天聽今於本年閏七月內準鎮臣杜森咨報容美土司於七月間有遣差強逼四川建始縣民人進司居住之事臣當即咨移該鎮確查并咨移督臣邁柱會飭去後續準該鎮覆稱行據該標後營遊擊準四川蘷州府移開該土司驅入建始縣屬地名革潭壩居民四戶李家壩居民一戶又下白沙粟穀壩金麗堂等處居民五十三户亦被驚散現在招集安插等情又據容美司申稱本司於六月內奉督部院委荆州道轉傳諭旨詳悉曉諭勿得私授川民劄付徵收春花二絲本司感戴皇上原情𢎞貸之恩凡有非禮越分之事巳悉改除謹守法度將土衆撤回其所有置買田産聽院區畫並出示不復收納絲花等件至所撤粟穀壩革潭壩等戶係本司佃戶世籍土軍土民實非川省及本省漢民其下白沙之民並未遣令移進土司境內等情一併咨覆到臣臣查蘷州府所報與該土司所稱彼此不符現在督臣邁柱會同臣咨移川省撫提各委員會勘查審統俟查明詳覆到日該土司果有恣縱不法情事臣當與邁柱會同詳酌另繕密摺具奏外為此繕摺奏聞謹奏田旻如之心迹朕所悉知方將感恩戴德不暇豈尚有不法之行為此皆不知大體武臣起好大喜功之念復貪羡容美富庶而懷圖利之心所以議論紛紛何得輕信妄生事端耶朕諭總督邁柱之旨甚悉汝但一聽邁柱指揮而行不必稍動多事之想雍正七年十二月十五日署理湖廣提督臣嶽超龍謹奏為奏聞事竊臣於雍正七年八月內據湖南衡州副將崔起潛報稱查得雍正五年間發遣廣西犯人達色馬守柱蔡登科耿桑格六格太監吳守義霍成各案之押解辨兵張文禮陳愼等奉巡撫并準臬司密行檄調於本年閏七月二十二日起程前赴臬司查訊轉送撫院覆訊等情到臣臣查發遣廣西人犯達色等心懷怨望在外捏造悖逆之言沿途布散所有押解辨兵人等諒撫臣王國棟自能開導根究得其實情逮至十一月內臣恭讀諭旨始知王國棟並未查出一人一語臣隨密調辨兵張文禮等至常逐名親加訊問反覆開導巳據將犯人達色等捏造誣謗之言歷歷供吐至訊其當日撫臬衙門訊問之時何以不即供出據稱按察司傳訊之時原未曽細問千總等一時記憶不清是以含糊答應及至撫院覆訊亦即照前回答今蒙細訊緩緩默想方才記起等語據此除將辨兵等所供另摺鈔録恭呈御覽外理合繕摺奏聞伏乞皇上睿鑒施行謹奏愈見不堪四字外無可批諭總之湖廣之吏治戎政文武大臣無一可取者再若不知愧勉仍復悠忽從事茍且塞責以尸位竊祿恐非長久之計也雍正八年三月初一日署理湖廣提督臣嶽超龍謹奏為凜遵聖訓敬愼奮勉披瀝悃忱仰祈睿鑒事竊臣一介庸愚荷蒙皇上天恩擢授總兵復命署理提篆力微任重時切蚊負之虞臣自任事以來體察楚省營伍原屬寬縱廢弛及經劉世明力加整頓漸覺改觀惟因廢弛巳久尚未能遽有成效是以臣節次檄飭各屬整肅營務勤加訓練務令技藝優嫺軍裝整僃併嚴緊汛防革除陋弊凡調驗將僃辨員無不諄切告誡期於共矢精白以報我皇上天高地厚之恩但臣材質駑鈍知識短淺惟有凜遵聖主明訓努力奮勉敬愼奉行斷不敢因循茍且悠忽聖慈俯垂矜宥時賜訓旨開導臣愚俾得稍免隕越臣有生之年皆戴恩之日矣臣曷勝感激愧赧之至謹披瀝下忱仰祈皇上睿鑒所有奉到硃批奏摺合併恭繳謹奏誠於中必形於外莫務空言但勉實行果有實行朕自得知勉之雍正八年十月初三日湖廣提督臣嶽超龍謹奏為奏聞事竊臣於雍正八年九月二十九日接準貴州提臣楊天縱咨開照得烏蒙逆夷悖叛業經遣發滇黔大兵分路撲𠞰並咨川省發兵會合𠞰除務盡根株以申國法查貴州威寧大定畢赤黔西四協營地方接近烏蒙鎮雄最關緊要該協營出師古州等處官兵亟宜調回防範至於苖疆尚有未帖服之處亦須多兵彈壓今雖現有粵兵貼防但地方遼濶猶需鄰兵協守合亟專差馳請希於附近黔省營路迅發官兵一千五百名前赴鎮遠聽候古州鎮分布彈壓等因到臣臣查古州等處係新撫苖疆密邇黎平鎮遠與湖南之靖州沅州接壤甚關緊要隨即派撥臣標并湖南撫標及各協營兵丁共一千五百名令副將何勉參將張寉帶領僃辨兵丁一千名由辰沅一路前至鎮遠駐劄又飭參將母椿齡帶領僃辨兵丁五百名由靖州黎平直抵古州均聽鎮臣蘇大有調度一面飛咨湖南撫臣趙𢎞恩檄飭沿途有司料理口糧草豆以及運送軍裝炮位人夫一俟料理齊僃即便起程前往臣再另疏密題外所有派撥官兵前赴黔省鎮遠古州緣由理合先為奏聞至楚屬接連黔省苖疆臣已密飭各營將辨嚴加防範合併陳明謹奏料理甚屬可嘉所奏知道了雍正八年十二月二十七日湖廣提督臣嶽超龍謹奏為奏聞事雍正八年十二月十八日接辰永靖道王柔密札內稱本月十二日據米呐千總趙國棟稟稱探得貴州坡西卡羅地方所設汛兵三十名被該地苖人聚集千餘人將兵丁盡行拏去分散等語再該地苖人甚是猖獗又聞要來木樹拏兵查該地去五里米呐地方五十餘里本道隨將吉多新營兵丁派撥五十名令赴米呐駐劄協幫彈壓併不時探聽黔苖聲息再為具報隨飛調乾鳳兩廳各撥兵五十名前來吉多新營添補調用祈於貴標及辰協就近之處再撥四百名協幫新營以僃調撥等因到臣臣隨派撥兵丁四百名飭令僃辨帶領貼防去後又於二十一日準鎮筸鎮臣周一德密咨據貴州銅仁副將張禹謨知府姚謙聨銜咨呈內稱有撫苖官平頭司吏目張公佐太平營把總張文炳於本月初八日到稿坪清編煙户跟要案犯石老明次早被凶苖糾合各執棍棒將二官登時打傷捉住隨去兵役除飛調各汛兵丁星夜進𠞰并飛稟各憲外查黔省新撫苖疆界連楚省祇有酌留彈壓官兵尚未添設相應咨呈貴鎮臺迅賜調遣重兵由木樹一路直趨稿坪聲援協𠞰等情到本鎮據此除檄飭左營遊擊孫載帶兵五百名前赴黔省由木樹一路聲援協𠞰并具疏題報外理合咨明又接辰永靖道王柔札同前由各等因到臣臣恐六里紅苖新附版圖性猶未定易滋煽惑所有派撥貼防兵丁四百名僅資彈壓至黔省請兵協𠞰雖經鎮臣發兵五百名前往應援尚覺兵單必再得官兵隨後接應庶保無虞臣隨又遣發兵丁五百名飭令臣標後營遊擊劉景榮帶赴黔界聲援協𠞰臣又思鎮筸地方新經招撫紅苖添設四路營汛今又抽兵五百名前往黔省城汛未免虛懸新闢苖疆甚關緊要隨又派撥兵丁三百名飭令臣標前營遊擊董朝輔帶領赴筸協幫彈壓仍探聽黔省苖寨情形相機䇿應以上除鎮臣周一德發兵五百名該鎮自行題報外臣前後撥派貼防六里并聲援黔省兵丁共一千二百名於十二月二十二二十四等日節次起程所有遣發官兵緣由俟開印後繕疏密題外合先具摺奏聞伏乞皇上睿鑒施行謹奏覽奏俱悉愼重為之不可稍忽所派遣兵數似猶屬單薄毋因愛惜小費將就草率致誤事機也雍正九年三月二十一日湖廣提督臣嶽超龍謹奏為奏聞事竊臣準鎮筸鎮臣周一德咨稱據貴州銅仁府知府姚謙副將張禹謨咨稱內開據遊擊白人仙稟報巳於本年三月初六日擒獲正凶石老明等十二名所有搜捕餘黨現在黔省漢土官兵儘足遣用可以無煩楚兵至楚省應否撤兵俟具詳請示到日咨呈等因到鎮是正凶巳經擒獲所有前準貴提督前後調撥赴黔協𠞰官兵俱有汛防之責難以久羈隨檄令領兵員辨各帶所部官兵共計一千五百名撤回原汛再黔省搜捕誠恐餘凶外竄本鎮仍駐池河分遣標員帶領鎮標兵丁六百名分駐米呐葫蘆寨防守堵禦等因到臣臣查頑苖恣肆正凶雖巳擒獲餘黨尚未盡除當此搜捕之際益需兵威彈壓自應倍加詳愼今鎮臣止留兵六百名分駐米呐葫蘆寨二處兵勢似覺單薄況苖性反覆不常若見楚兵所撤過多或又四出竄匿萬一需兵堵截猶恐緩不及調臣再四思維不敢因鎮臣具題巳撤之兵稍為瞻顧隨於所撤兵丁一千五百名內將臣標五百名暫停撤回飛飭遊擊劉景榮等帶回原駐地方以資防範其原撥貼防六里兵丁四百名亦令仍駐彈壓統俟黔省搜捕事竣再為一併撤回所餘標協各營兵丁一千名即令各歸原汛容臣另疏題報外為此繕摺奏聞伏乞皇上睿鑒謹奏所見甚是辦理深合機宜雍正九年四月初九日湖廣提督臣嶽超龍謹奏為敬陳末議仰祈睿鑒事竊查各省副將參將於雍正五年內欽奉上諭著各該省督撫提督會同分别列為一等二等三等出具考語密咨兵部填寫履歷繕摺進呈欽此又雍正六年內欽奉上諭行文督撫提鎮從前開列等次咨部之副將參將近或怠惰前修或悛改舊習雖無功績劣迹不致於保薦參處亦當優等降為劣等劣等升為優等據實移咨兵部不必作難回護欽此欽遵俱在案仰見我皇上隨時甄别人材激勸兼施之至意惟是副參列等欽奉上諭以來舉行一次現今各省副參升遷事故屢易其人多有未經列等之員而遊擊都守等官則又不得與於列等之數臣思此奬懲鼓勵之良法自應推廣行之以垂久遠伏查武職五年一次考選軍政關係激揚大典其賢能卓異八法不職者照例舉薦糾參固足昭示勸懲至不入舉劾之員其中優劣亦異若不稍為甄别無以策其共奮臣請嗣後舉行軍政各省督撫提鎮册送應留之副參遊都守僃等官請照文職大計之例部臣查據送到清册將所開各員操守才具年力技藝功績及填注考語事實逐細稽核分别優劣定為一二三等彚册進呈御覽仍將所定等次照貴州撫臣張廣泗奏請文職等次之例敕部開列行知該督撫提鎮即將原注各該員事實考語一并印刷粘單通行所屬俾其優劣相形易為觀感興起至此屆所定等次俟下屆考選之期除應行舉薦糾參者該督撫提鎮照例舉行外其仍行不入舉劾應留供職各員須詳愼稽核如有自恃優等怠惰前修及能悛改舊習奮勵上進者或應降優為劣或應升劣為優逐一據實填明出具考語送部以聽考察如此則軍政舉劾既昭官方澄敘之嚴而列等降升更寓隨時勸懲之意將見大法小亷莫不鼓舞惕厲共相奮勉矣是否可行伏乞聖鑒謹奏所議殊無意味勸懲何在於此設或升劣為優復行改操降優為劣竟能悛改則前所填考語又不足為憑矣且亦不勝紛煩徒開臨時鑽營之端耳雍正九年五月十五日湖廣提督臣嶽超龍謹奏為仰懇聖恩事竊查湖北湖南界連數省幅員最為遼濶而深山大澤尤易潛藏姦宄臣自抵任以來嚴飭各屬將領督率辨目在於水陸塘汛晝夜巡查復選差千把密往各處察緝匪窩盜線期盡根株惟是賊蹤詭祕臣每留心遣試各辨求其眼力識賊能設法屣捕者實難其人臣前在天津任內查有天津城守營千總任福鳳人材精悍饒有膽氣頗能諳悉賊蹤屢次差拏積賊俱能實力捕獲從無貽誤臣思天津地方密邇畿輔非若楚省江湖藪澤姦匪最易潛蹤者可比且任福鳳在津在楚均為國家效用合無仰懇天恩請將該辨賞發臣標補用凡有查緝事件可藉指使足收得人之效如蒙俞允當俟該辨到楚遇有相宜守僃缺出容臣酌量題請以示策勵臣因地方起見不揣冒昧繕摺恭奏伏乞睿鑒施行謹奏隔省題官不便準行朕屢有明諭汝獨未之聞乎在楚數年統轄全省將辨而不能訓導識拔數人以供驅策乃欲遠調天津辨員朕實代汝愧之何顔具此一奏耶同日又奏為遵旨商酌事本年四月初五日臣準湖南撫臣趙𢎞恩抄摺內開湖南一省幅員遼濶江湖寬廣長沙乃省會重地居兩粵之下遊為洞庭之鎖鑰嶽州常德各有水師一在湖之北一在湖之西相距甚遠似應於長沙添設水師營既可扼守兩粵更可聨絡嶽常水師於地方有益其兵丁船隻倣照嶽常之例設僃等因具奏蒙皇上命與督臣邁柱及臣嶽超龍商酌會題欽遵知會到臣查長沙一郡控粵濱湖原為形勢之區撫臣趙𢎞恩奏請添設水師亦為裨益地方起見惟是嶽常水師兩營一在湖西一在湖東雖距長稍遠而洞庭一協駐劄龍陽實與毗連密邇該協額設副將一員守僃一員千把共六員水兵七百零七名戰船五十隻專轄湖汛外則扼要長衡內則接聨常嶽湖南一面巳足恃為關鍵似不必於長沙另設水師方資鎖鑰也況雍正七年於楚省水汛最廣等事案內督臣邁柱會同臣等題準將沅州協戰船撥給長沙協八隻衡州協六隻又令沅州協頭舵水手將長衡二協配船兵丁教習駕駛以為遊巡之用是現今長沙上下江面均巳設有戰船堪以稽察防範若再添增水師未免冗置然事關安立營制未敢驟自定議臣遂密致督臣詢其裁酌主見隨準函復無庸增設前來與臣所見相同除密復撫臣趙𢎞恩外查係奉旨商酌事理所有長沙無庸增設水師緣由臣謹繕摺奏聞伏乞睿鑒謹奏何如朕命與爾等商酌正為此也據趙𢎞恩所言觀之似是行之徒滋紛擾耳雍正九年七月二十一日湖廣提督臣嶽超龍謹奏為恭報早稻收成豐稔仰慰聖懷事竊查湖廣地方民間種藝早晚兩稻今年雨澤調暢四處豐熟所有旱稻巳刈穫登場收成俱足十分九分倉箱共慶新米盈街兵民安享樂業至於各處晚稻均皆秀穗結實田水霑足八月內悉可收割大有在望其雜糧棉花等項亦各茂盛理合繕摺奏聞仰慰聖懷謹奏早稻巳登晚稻秀實朕以手加額覽之同日又奏為鎮臣辦事乖張據實奏明仰祈睿鑒事竊人臣經國務矢公忠而職任封疆尤先謀略況事在鄰省義無岐視所當推誠置腹協力和衷庶幾兩有裨益乃鎮筸鎮臣周一德懷私挾詐喜事為榮查稿坪凶苖不法傷害職官黔楚會兵協𠞰罪無可貸該鎮駐劄池河堵禦聲援是其專責臣初聞其犒賞苖人附近各寨花紅酒食意為安撫良苖勿令隨為黨羽計亦誠是及至安籠鎮臣韓勳統兵進𠞰於稿坪凶寨岩洞中搜出周一德發給稿坪苖人龍老肉委牌一張又搜獲布靴一雙銅號一對皆係原被打死把總張文炳之物臣聞之殊深駭異夫龍老肉者乃稿坪殺官之凶苖而該鎮於統兵會師之際暗與委牌首先奬賜賞其功乎抑賞其罪乎臣不知其何意雖據該鎮咨辨龍老肉是否凶首隔省無由而知但下稿坪之苖悖逆顯著何一非凶龍老肉為該寨苖目尤屬罪魁豈該鎮獨無聞見乎總之該鎮心意偏私罔知大體鄰封有事幸藉為功以致逆苖凶寨亦復濫行委賞雖經臣公移私牘時時勉其協衷共濟該鎮究不能化其彼此之見殊失公忠體國之誠因前次黔員有無煩楚兵一語該鎮遂心忿其言不俟黔省搜捕竟撤楚兵孤其聲援並不籌計意外尤非大臣持重審度利害者之所宜出也臣以受恩深重旦明自矢不敢絲毫欺飾所有鎮臣周一德乖張之處有忝封疆臣謹據實奏聞伏乞皇上睿鑒謹奏所奏是候另旨諭部雍正九年九月十五日湖廣提督臣嶽超龍謹奏為恭報中晚兩稻收成豐稔仰慰聖懷事竊查湖廣早稻收成豐稔經臣恭摺奏聞兹查民間中稻巳於八月登場晚稻現在刈穫收成各有十分九分八分不等其棉花芝麻雜豆等項亦俱豐收遍野今歲農功巳畢大有咸書婦子熙恬倉箱共慶所有中晚兩稻收成豐稔情形理合恭摺奏聞伏乞皇上睿鑒謹奏據奏中晚兩稻俱慶豐收朕懷曷勝欣慰同日又奏為奏明事竊苖邊汛隘關係緊要臣經奏明擬往永順鎮筸一帶地方簡閲各營兵馬勘驗新設營制嗣因六里新闢布置未定臣當於去年八月內具摺奏請俟苖疆事竣再往巡歷奉旨嶽超龍所奏甚是俟趙𢎞恩王柔清理苖疆事竣再行前往欽此欽遵在案今查六里事宜俱已就緒稿坪苖寨亦皆凜懼是現今清理巳竣臣並宜前往賞慰堅其向化之心且目下收穫巳畢四野豐登而湖北赴陜兵丁俱經督臣邁柱會同登州鎮臣嶽含竒挑選預僃現在祗候諭旨臣俟料理兵丁起身後即擬輕騎減從前往永順鎮筸一帶查勘新設營制並簡閲兵馬賞慰各處苖寨宣布聖恩以期寧謐久遠至臣衙門應辦事件臣沿途俱可辦理不致遲誤所有巡歷各處情形臣於旋署日自當據實奏聞緣係奏請查邊臣謹另疏具題請旨外理合繕摺奏明伏乞皇上睿鑒謹奏所請巡歷邊隘之處與督臣邁柱商酌行之雍正十年正月二十八日湖廣提督臣嶽超龍謹奏為新疆之兵食維艱六里之荒田可墾請準招種以裕久遠事竊惟六里地方苖民性情蠢惰每年計口種食其山地所穫雜糧僅足自給從無顆粒之餘兼以新闢極邊亦無商賈運販可資糴買現今永綏一協兵丁所支米石悉由辰州府轉運接濟蓋以兵食難緩暫為運辦巳非久計況該協額兵一千六百名皆從各營派撥其眷口尚未搬移雖經督撫兩臣每兵給與搬家銀三兩今領銀搬家者僅有二百餘人總因該地無糧可買其眷口移至實有枵腹之虞然察其孤身在營心憂內顧拮據之狀情更可憫臣為再四思維足食之計洵宜預籌兹於六里各處留心踏勘其六七八三里地方氣候融和五九十三里地方氣候稍寒俱各田高水活可以開墾成熟者甚多而山地較廣苖人無力遍種盡為拋荒深屬可惜臣於苖人接見時遂問各寨荒地是否情願售賣據稱苖等不善治田出産稀薄若有漢人開種苖等得以效法情願各寨出結相保售賣不敢多事等語臣查苖民荒田價亦甚亷其情願售賣之言亦非虛捏若準招買耕種三年以內可得成熟其稻穀雜糧隨處皆産而永綏兵丁得以就近買食俾其家室相聚庶可安心汛防將來出産盛多兵米可支折色又省接濟轉運之煩更與國計有益為此繕摺奏請伏乞聖明裁鑒施行謹奏所論雖是然苖漢雜處開墾耕作所關甚巨當與督撫臣詳細斟酌若意見相同會疏具題可也同日又奏為入春雨雪均沾據實恭報仰慰聖懷事竊查湖廣地方去冬雨雪調勻兹於本年正月初二初三等日兩湖南北均降瑞雪四野同沾至十八十九等日又復連滋春雨土膏暢潤當此陽氣方舒之候而五風十雨應節徵和是天心早協於宸衷豐歲預占於蔀屋矣現今二麥長發欣欣向榮臣沿途目擊情形並據各屬稟報臣謹奏明仰慰聖懷伏乞皇上睿鑒謹奏全楚雪雨情形以手加額覽焉同日又奏為奏明苖寨情形事竊臣查勘沿邊要隘所過苖寨無不留心察視見其零星散處有十數家為一寨者亦有二三十家為一寨者其百十成聚之村落竟不多覯且一寨之中東西各為向背茅屋竹籬並無結寨連城之險度其所恃不過以竄匿溪箐為長技耳今吉多設立永綏一協則紅苖與六里從中間斷聲勢兩孤況南有鎮筸北有保靖各寨如在掌握少敢動搖不難扼其吭而制其命也是以臣巡歷所至苖民仰戴天恩環跪馬首咸頌我皇上綏懷遠服準與招撫化誨沾蒙聖澤得為良民等語臣遂宣布皇仁面為奬勵賞以銀牌花紅又復嚴切勸導諭以利害使其凜知國法震懾天威而衆苗叩首敬諾同願洗心至於永順保靖一帶土苖最為淳謹改流之後得安袵席聞臣臨蒞亦各持香道左籲謝聖恩感激倍切至地方景象蒸蒸更復日有起色此皆聖德如天俾遐邇編氓共享寧謐之福也所有苖寨情形臣宣布賞慰緣由理合一併奏明伏乞皇上睿鑒謹奏苖性愚頑歸化日淺全在文武官辨撫恤得宜馴至數十年後相安無事方可驗其成效目前景象奚足為憑耶同日又奏為苖疆極邊仰請逾額增設鳥鎗以資實用事竊查鎮筸額設鳥鎗一項於雍正六年遵旨議奏事案內議以該鎮標地處苖邊請照沿邊沿海之例每兵一千名設立鳥鎗四百桿該鎮標額兵三千名應設鳥鎗一千二百桿業經彚題奉旨允行欽遵在案惟是鎮筸一鎮四面環苖高處則懸岩峭壁鳥道羊腸深處則曲折盤旋茂林荒箐一切弓箭藤牌等項無所施其長技惟有鳥鎗衝堅及遠無往不利況永綏新闢該鎮標四營添設汛防穿出紅苖官兵防禦要隘遊巡捕伏悉在荒山窮谷之中既藉鳥鎗之聲息以為響應又憑鳥鎗之迅速以資搜取所有每兵一千名設立鳥鎗四百桿實屬不敷分布現據鎮筸鎮臣楊凱呈懇題請每兵一千名於設立鳥鎗四百桿之外添設二百桿共六百桿得藉巡防以資實用等因到臣除移咨督臣邁柱會疏題請外事關逾額增設鳥鎗合先具摺奏明伏乞皇上睿鑒謹奏具題到日有旨雍正十年四月二十八日湖廣提督臣嶽超龍謹奏為覆奏事竊臣以六里新闢兵食維艱應請招種荒地以裕久遠謹將情形繕摺恭奏奉有硃批臣遵即致商督撫兩臣詳細斟酌去後當準督臣邁柱湖南撫臣趙𢎞恩先後函復謂六里苖地情願售賣事屬可行惟言者以竄入漢姦恐滋侵占爭搆為慮近據臬司條議以公項買僃牛種勸苖開墾清查荒地造報課耕似亦得䇿等語臣思苗性庸惰每年計口種食不肯廣為耕藝刀鋤火種是以出産稀薄今查荒課耕勸其自墾若知踴躍從事則蕪萊漸開不須更事招種惟在實力經理可期成效以裨新疆但動項查荒等事應聽督撫兩臣奏報舉行所有臣等遵旨詳細斟酌及現在飭議勸墾緣由理合恭摺覆奏伏乞皇上睿鑒謹奏似此未經深知灼見之事何得率意具奏大不是矣同日又奏為奏明事竊查湖南靖州一協原額制兵七百九十名分防靖州綏寧會同通道四州縣地方於雍正五年為苗猺肆虐等事案內經前湖廣督臣福敏等以綏寧一縣屢受苖害請於綏寧專設一營將該協額兵裁撥三百零五名添入新營是該協汛地尚有一州兩縣而額兵僅存四百八十五名近據該協以汛廣兵單詳請添增臣細察情形實屬汛守單弱兹查欽奉上諭鎮筸新添兵丁四百名甚屬無益酌量派撥要緊營汛以資防衛欽此欽遵在案臣為酌量靖州協要緊各汛尚需兵丁二百七十名方敷分布臣即擬於此四百名內酌撥添給洵與邊營有益除現在咨商督撫兩臣飭議撥給外至所餘兵丁一百三十名亦在酌量分撥務期增置妥協確核會題所有靖州協應請撥給兵丁緣由理合恭摺奏明伏乞皇上睿鑒謹奏具題到日候朕酌定同日又奏為要地需員懇恩遞補事竊臣接到部文欽奉上諭湖廣寶慶協副將周起鳳著補授陜西西寧總兵官即赴四川成都於駐藏兵丁換班之時統領前往駐劄等因欽遵行文到臣臣隨飛檄周起鳳令其作速束裝起身赴川外伏思寶慶一協地連衡永民雜苖猺副將大員整飭彈壓控制一面必得練達熟習之人方克勝任臣查有荆州營參將董朝輔歷任湖南守僃遊擊風土情形諳悉最久而在營辦事敏練精幹馭兵有方其於寶慶副將一缺人地極為相宜臣因地方緊要用敢據實奏請倘蒙天恩俞允其所遺荆州營參將一缺亦屬緊要查有臣標後營遊擊劉景榮才幹練達辦事勤敏堪以補授至所遺遊擊員缺查有命往楚省候補遊擊之徐有文謹飭小心即請以之補授不但各於地方有裨而臣亦得收臂指之效矣可否俯準所請出自聖恩伏乞皇上睿鑒謹奏言之督臣邁柱可也硃批諭旨卷八十一
