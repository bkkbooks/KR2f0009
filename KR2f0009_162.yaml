body:
  text: 欽定四庫全書硃批諭㫖卷一百六十二硃批安修德奏摺雍正七年十一月二十四日協理清查江蘇錢糧事務監察御史臣安修德謹奏為奏聞事竊臣黔末庸愚荷䝉聖恩不次拔擢逾格栽培復命協同辦理清查江蘇錢糧受恩至深刻圗報稱本月初六日接到部頒上諭指示周詳臣捧讀再四通行曉諭欽遵訖查官侵吏蝕之弊俱於册內將所侵户名刪除揑分詭名零星飛灑以致混作民缺莫可分辨雖據自首仍有不實不盡近今究出各吏胥私記厯年侵數竝揑造花名各種底簿據以清查官侵吏蝕漸有頭緒再查花分詭寄不獨侵蝕官吏為之紳襟富户內亦有藉此弊混積年抗缺者現有查出一戶揑分數十百户詭名積缺至千百兩者此等積習若不剔除有關吏治民風且此等花分詭名不為查實則官吏侵蝕之花分詭名不得清楚民缺亦不的實是以設立併尸單俾各據實歸併改注本名以免弊混竝非以官戶富戶派攤分賠官役侵蝕之錢糧皇上洞鑒甚眀為此繕摺奏聞謹奏覽汝稱頌眀鑒等語歸美於朕此等虛文竟可不必汝等果能恪秉公忠將諸弊釐剔一清使官民從此䝉福朕之令譽自在其中假若奉行不善剔除不力縱朕能洞鑒於事亦何益之有此一差關係汝等一生人品心術可否信任毋稍漫忽一切處加慎加勉為之同日又奏為請除侵缺錢糧之源以清積弊事竊惟錢糧關係國帑絲毫不容侵隱凡有弊源宜請杜絶臣不揣冒昧謹就見聞所及為我皇上陳之一實徵額册宜造的名也一僉點糧總漕總之陋規宜禁革也一私借錢糧之弊宜禁革也一比較冊籍不宜假手書辦以滋舞弊也以上四條皆侵缺錢糧弊端是否可採伏乞皇上睿鑒施行謹奏斯皆汝等㑹同商酌辦理之事何乃彼此不相通知各出己見耶若人人但欲炫露一己之能希朕見賞據臆瀆奏參差互異朕未親厯其地未覩情形何所憑而批定是非乎觀汝條奏殊非忠良居心眀曉協恭和衷之理者似此朕不免有誤用人之咎矣奈何雍正八年二月初四日協理清查江蘇錢糧事務監察御史臣安修德謹奏為恭繳硃批事雍正七年十二月二十八日臣家人齎捧硃批奏摺二件到臣隨恭設香案望闕九叩跪讀諭㫖感愧交深竊臣荷䝉聖恩委用協同辦理清查江蘇錢糧自知才庸任重凡一應清查事宜俱與總理臣等公同酌議辦理臣初學辦事未諳陳奏之體緣現在查出弊端臣愚以為得請立法可杜將來弊混乃識見淺陋不知籌計係公同應辦之事遽自條陳實屬冒昧仰䝉聖恩訓臣以公忠和𠂻之大義臣深自愧感惟有恪遵聖訓益加慎勉協同總理臣等秉公詳慎斟酌辦理以仰副皇上為民除纍之至意謹將欽奉硃批奏摺二件恭繳謹奏所言和衷者不與同事之人爭能逞才之謂若不辨是非公私一味隨聲附和知和而和不以禮節之則又不可行矣總之為己心勝皆屬私欲從未有懷私而能效忠之理返身自省勉之硃批諭㫖卷一百六十二
