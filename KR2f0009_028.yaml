body:
  text: 欽定四庫全書硃批諭旨卷二十八硃批王景灝奏摺雍正二年八月二十日四川巡撫臣王景灝謹奏為恭謝天恩事竊臣一介愚陋世受國恩當聖主紀元伊始由郡守遽獲超遷自謂浩蕩𢎞仁無由仰報身為外吏未得瞻仰天顏殊深孺慕於五月內奉旨令臣馳驛進京陛見方幸瞻天仰聖之私情得以稍慰復蒙訓誨諄諄倍加激勵又超擢四川巡撫賞帶孔雀翎子復賜袍帽素珠並內府珍奇之物隆恩異數實同天高地厚臣亦何修遭逢至此惟是臣之才識有限聖主之德澤無窮臣既身膺格外之恩竊懼難報萬分之一雖經具疏奏謝而感激天恩此衷仍難自已謹再繕摺奏謝謹奏覽奏謝知道了朕看爾是一大器將來可成國家之棟梁勉之同日又奏為恭報秋成事竊臣奉命馳驛赴任經過四川保寧成都兩府所屬地方見稻穀雜糧結穗飽滿及扺臣署檢查各屬陸續報到之文成都重慶兩府所屬州縣收成俱有十分順慶夔州敘州馬湖保寧龍安東川等府收成俱有九分直隸眉州嘉定州收成亦有十分其卭州雅州瀘州潼川州等處收成亦有九分建昌所屬各衛收成有八九分不等全川地方今歲可稱豐熟足以上慰聖懷臣謹繕摺奏聞謹奏覽奏曷勝欣悅朕另有諭旨一道可酌量遵奉施行諭四川巡撫王景灝據奏四川各府豐收小民含哺鼓腹殊為可喜惟是江南浙江沿海州縣七月內海潮泛溢田禾不無損壞雖經嚴飭各督撫加意賑恤猶恐將來米價漸昂小民艱於粒食朕知江浙糧米歷來仰給於湖廣湖廣又仰給於四川從前因商販太多地方有司輒行阻遏今四川秋成豐稔以羡補不足洵屬兩便爾當嚴諭沿途文武官辨遇有江楚商人赴川販米或四川商人往江楚賣米者立即放行不得留難阻遏聞年羮堯當日每曾舉行此善政爾其實力勉為之特諭雍正二年九月十六日四川巡撫臣王景灝謹奏為遵旨覆奏事竊臣於陛辭之日荷蒙皇上念及松潘總兵官周瑛帶領官兵駐劄西藏恐口糧不能接濟命臣到任即為料理欽此臣扺成都查明從前運藏兵餉尚可支給兩月又於八月內經承辦軍需之建昌道安定昌委員將義木多所貯之銀撥運五箇月米價鹽菜銀兩就近解送西藏合前已足支七箇月口糧然臣猶慮自省至藏程途遙遠惟先期解送方免遲誤臣是以復飭建昌道嗣後按月扣算以彼處約餘三箇月餉銀之時即預解銀兩接濟如此則源源相繼而兵食可無不足之慮矣為此繕摺奏聞謹奏預籌接濟甚好周瑛之為人效力朕所悉知帶領官兵遠在塞外口糧等項斷不可使至缺乏些須錢糧何足介意用心料理可也雍正二年十一月初二日四川巡撫臣王景灝謹奏為遵旨覆奏事竊臣伏讀上諭以江南浙江田禾被海潮泛溢不無損壞恐將來米價漸昻命臣禁止川省遏糴欽此臣奉到諭旨隨即檄行沿江之府州縣遇有外省商販到川買米及本地民人有販米赴楚者均令公平糴糶任其運載出境由四川可至湖廣由湖廣可至江浙在鄰封之米價自不至於涌貴而本省之農民又得資其財用商民均沾樂利無不頂頌皇仁適夔州府知府喬鐸因公到省臣靣加詢問據稱自秋收之後每日過夔關大小米船或十餘隻至二十隻不等源源下楚等語此後遠近商民聞信輳集絡繹販運諒必更多於前則江浙民人可無艱食之虞矣臣恐聖懷時加厪念謹將流通米石緣由具摺奏聞謹奏覽奏米糧流通大慰朕懷同日又奏為奏聞事臣於陛辭之日欽奉諭旨以蔡珽在川修城效力係離任巡撫恐呼應不靈工程有誤命臣委員代為料理欽此臣於到任後即籌畫辦理查蔡珽應修南坪隆康兩河口會龍保縣并中渡河越嶲等處工程己委建昌通判崔鴻圖茂州知州邊鴻烈等分路前往備辦物料以便來春一齊興工至夏秋間俱可告竣臣仍不時嚴查務令各委員將工程修築堅固錢糧雖係捐項亦不致糜費俟工完之日將用過銀兩再具摺奏聞至蔡珽認捐銀五萬兩陸續交庫於十月二十七日全完臣巳給咨令其回旗於十一月初四日起程赴京理合一併繕摺具奏以聞謹奏知道了凡爾川省屬員須爾自出藻鑑甄别優劣不可全聽年羮堯之指揮以定去留也同日又奏為請旨事臣查大將軍年羮堯備陳口外善後諸條俱蒙皇上俞允在案臣思建築城堡蓋造官兵營房在在皆關緊要臣隨將革達巴塘裡塘等處城垣房屋委建昌道安定昌總理潘州合壩黃河渡口等處城垣房屋委松茂道孟以恂總理又遣龍安府知府王璣成都府同知王詢董率夫匠乘此三冬間暇之時砍伐木植燒造磚瓦併備辦應用物料俟明春一齊興工並於各工所專派幹員分頭管理務期工程堅固錢糧節省在明歲秋冬之間各工告竣但革達地方為新設重鎮事屬創舉臣必親至其地悉心相度務得形勝之區以為建城之所凡屯牧水草亦必期於便利以仰副皇上籌邊經久之𢎞圖臣擬輕騎前往經理其事始得放心至彼處規模立定臣星即回省緣係出口事理臣未敢擅便謹先具奏請旨伏乞睿鑒指示遵行為此繕摺奏聞謹奏所奏俱可臨時酌量審擇輕重而行知道了同日又奏為敬領溫綸恭謝天恩事臣齎摺家人回川捧到御批摺子四件上諭一道黃匣四個到臣隨恭設香案望闕叩頭祗領訖跪讀之下不禁感愧涕零伏念臣才本庸愚寸長未效乃荷天語褒嘉益令悚惶無地惟有竭盡駑駘力圖報稱以仰答高厚於萬一所有感激微忱不能自已為此繕摺奏謝謹奏知道了朕看爾頗重勉為之年羮堯今來陛見甚覺乖張朕有許多不取處不知其精神頽敗所致抑或功高志滿而然爾雖由伊薦舉升擢亦爾能自勉朕故加恩擢用今既職任與之相等均為封疆大臣不可一味低頭下氣也有理處應同者同之徇私害公無理處應異者異之年羮堯未必即能致爾於禍朕非年羮堯能如何若何之主也且朕從不心口相異前於爾陛見時朕意若彼即以彼時之意見諭爾今胸臆如此亦即以此時之意見明白諭爾生平無所隱諱特諭爾領悉朕意以便立定主意而行不然恐爾誤蹈覆轍也此諭能密密之不能亦可雍正二年十二月二十一日四川巡撫臣王景灝謹奏為奏聞事臣於陛辭之日恭聆聖訓時深兢惕到任後謹將所奉上諭及條奏之事逐案飭查嗣於屬員來見者再三告誡未見者再三申飭今臣訪得各屬俱實力奉行其有成效者亦多除恭繕御覽黃册另疏題報外臣必不敢於既經題奏之後稍有懈弛惟當永遵諭旨益加勉勵以仰副聖懷於萬一耳再原奉上諭內有密降諭旨應密行詳悉奏聞臣到任未久止有奉到諭旨一道係米船下楚不許禁遏事先經具摺回奏合併聲明為此繕摺具奏謹奏覽奏知道了百凡惟務無欺無隱為要爾乃朕十分賞鑒之人許爾將來可成大器必勉勵以符朕旨再者多有人言爾為年羮堯之鷹犬朕思爾斷不肯為此等無恥之行而年羮堯亦不應居此等無理之心至隆科多年羮堯二人朕初看伊等具有聰明見解能知大體受恩深重自循謙退豈肯趨蹈危險以玷朕名而招天下後世之議論朕原作如此想所以邇年來言聽計從任用之而不疑也不料今歲年羮堯來京陛見二人皆被朕看破均非無瑕之器於奏對之間錯亂悖謬舉止乖張大露擅作威福市恩攬權情狀朕隨深加訓誨曲示保全之道大凡從古功臣第一須君上愛護次須自能保守其三更賴大小臣工不相趨附愚弄送入危地三者缺一不可而其要尤在衆臣工之居心正也不然功臣鮮有能全者致令人君蒙寡恩之名而若輩方且旁觀笑之此等居心之人難逃天地誅滅者也今即爾身而言若竟將年羮堯知巳之情薦舉之德一旦盡付之流水人非木石必無此理感激思報分所當然但宜思所以報之之道耳朕意惟有赤忠為國勉力作一不朽人物勿使人主疑賤勿令天下後世鄙薄不與施恩人助虐致禍斯乃深所以報之也假若賄賂酬奉徇私廢公惟以阿諛順從言報則天下後世以爾為何如人以年羮堯為何如人謂朕為何如主耶所關甚大反覆之間三利三害繫焉爾其詳思慎勉且督與撫係比肩大臣一省政治所關非細宜自出已見各立功名何可一味依違將就以軟局陷害朕之功臣爾等嗣後若不仰體朕心改絃易轍實力遵諭而行朕即先將爾等誤朕功臣之人戒懲豈肯遽向朕之功臣加罪乎苟能幡然醒悟秉公不阿或慮大將軍年羮堯責爾辜恩負義朕可力保其無妨也能如是報德之大無以過此切莫虛負朕愛惜之意朋比之習向為朕所深惡勉之戒之更須內外如一奉行方好倘務巧密以首鼠兩端為妙策則大負朕此一番苦心可惜此數行諭旨也細加玩味必豁然領會始能身受實益勉之又勉諭巡撫王景灝昨年羮堯奏南坪壩番子一事朕詢據蔡珽云南坪等處雖新附未久然曾遣劉應鼎前往踏勘建城地方諸番悉皆恭順並未見有阻抗情形今云為建城謀逆何大相徑庭如此又據年羮堯奏稱目下雜谷大金川小金川等處土司漸有多事之狀依此看來必因爾措置不妥所致況犬羊無知蠢動亦係夷猓之常惟在地方官制御撫綏得法自然寧帖土司原非內地之民可比爾為封疆總領諸凡須平和寬大慎勿見小尚氣任性作威致生變故責有攸歸斷不爾宥也其遣往南坪等處建堡造房之員若不能體朕愛恤遠人之意肆行無忌激出事端朕必正以國法而用人不當之咎爾亦何辭以免諭到爾其盡力調劑設法駕馭並嚴行飭察所遣官辨務令安靜寧妥爾果忠誠任事無二無疑此等事務再無不辦之理勿得他諉特諭雍正三年二月二十七日四川巡撫臣王景灝謹奏為覆奏事臣於二月二十五日準兵部咨文由驛遞送內廷捧出黃匣一個到臣隨即跪接開匣伏讀諭旨仰見皇上訓誡嚴明天恩浩蕩臣自知無調馭之才實切悚惶之懼前者臣聞南坪番子蠢動一事恐差委建城人員或有擾纍番寨之處臣即遣松茂道孟以恂往松潘料理并密加訪察如有委員生事臣即據實題參斷不敢少有徇隱自罹咎戾近聞各番已經平定不日即可興築城工再查年羮堯原題給與大金川號紙以分小金川之勢今差人往取宗圖必由小金川經過因而攔阻不令前往今年羮堯巳令奮威將軍嶽鍾琪差人由打箭爐僻路直達大金川後山往取宗圖册結矣至雜谷土司所轄之囊索沙加布意欲爭管新經招撫之赤進赤物等寨署松潘鎮副將張瑛一靣申飭隨將情由通報嶽鍾琪差員持文曉諭臣與署提督納欽亦行文開導今據張瑛報稱已經遵依回巢此不過土俗常情易於完結之事今奉諭旨嚴切臣自覺惶恐無地惟有恪遵聖訓實心盡力奉行仰答高厚隆恩又何敢見小尚氣致生事端上干國典也前者臣以革達地方建城設鎮曾經具摺請往彼處相度形勢蒙皇上御批臨時酌量審擇輕重而行臣因南坪之事所以未曾出口謹繕摺一併奏聞謹奏封疆大吏將公清勤慎四字常置於靣前何愁諸務不理耶所奏知道了同日又奏為恭領聖訓敬陳愚悃事臣於二月二十日捧接硃批諭旨再四跪讀仰見皇上保全功臣至意誠千古未有之殊恩凡屬臣工有不感激奮勵者斷難逃於國法也至臣不肯為人之鷹犬已在聖鑒之中臣又何敢置辨復荷天語以三利三害諄諄開導伏讀至此不禁感懼涕零況臣世受國恩倘不以大義報君而以阿附順從報薦舉之私恩不但於年羮堯無益抑且於臣有損徒招物議上負皇上愛惜之恩下有玷於祖父臣具有人心斷斷不敢出此惟有恪遵諭旨務期內外如一實力奉行做好官好人以仰報皇仁於萬一而已為此繕摺具奏謹奏覽此奏朕甚嘉之爾巳明白朕旨領會朕意矣朕頗能覺照人情爾果能不聽年羮堯指使不為其所牽制各出巳見辦理一切朕保爾是一上等封疆之臣也爾若逐件請命於年羮堯不特諸務遲誤機宜而年羮堯之責報無窮爾之金帛古董有限少不遂其意塞爾圖蔡珽寧非一彰明較著之榜樣耶年羮堯與爾向日之交情有推重爾處或未必能及此二人爾今亦效法塞爾圖蔡珽之為人可矣且何等體靣何等平安令朕何等信重以爾之材質當自加愛惜也勉力為之雍正三年五月十九日四川巡撫臣王景灝謹奏為奏聞事蜀省自入春以來仰賴皇上福庇晴雨及時收成倍好茲據成都重慶等十府嘉定眉卭等六州並各衛所地方陸續報稱夏季一切麥豆雜糧等項收成俱有九分十分不等秋禾亦皆栽種等情臣復查得目下因夏收甚好所以米價甚平至於秋禾俱各栽種平田既有堰水灌溉山田亦雨水霑足甚是茂盛誠恐上厪聖懷謹將夏季收成分數及秋田播種情形繕摺奏聞謹奏覽收穫情形實慰朕懷蒙上天賜茲豐年當及時督率屬員勸導百姓勿致粒米狼戾加意蓋藏必耕三餘一耕九餘三方合治民之要道也勉之毋忽同日又奏為恭謝溫綸事雍正三年四月二十四日臣齎摺家人回川奉到硃批奏摺臣跪讀之下深蒙聖主埀諒愚臣下悃兼荷天語褒嘉感激無地愈切悚惶臣惟欽遵諭旨而行夙夜益加兢惕以盡微臣職分四川提督印務復蒙皇上格外𢎞恩命臣暫行署理臣於軍旅事務素未諳練惟有竭力學習盡心料理以圖仰報皇仁於萬一而已為此繕摺奏謝以聞謹奏爾之才朕所稔悉至於守之一字朕未確知大抵居官守較才為要譬如年羮堯魑魅魍魎之才適足為害亦奚足取朕再不料伊竟為此等狗彘一類之人也以朕之精明尚被伊如此欺隱蒙蔽若遇少不更事之君將何所底止今敗露一至於此朕惟自愧乏識人之明耳夫復何尤凡爾等向來被其愚惑之人若不奮然為國家為天下臣工作將來一大榜樣深惡而痛絶之切齒而憤恨之不但罪無所逃是亦無父無君之人也已矣其已發覺之種種姦欺事迹於中或少有寃誣處不妨為之辨白陳奏既可全昔日友誼兼可全朕用人顏靣亦朕所樂聞者苟核其行為書罪無窮考其心志包藏莫測審為姦險無疑則惟有悔艾從前誤交匪類亟圖改易砥礪名節以自全耳今命各省搜查年羮堯隱匿贓物此正爾等贖愆於朕表暴心迹於天下後世之機會極當留意勿失至如人言藉藉僉云王景灝乃年羮堯之假子似此向朕前奏者豈止數十人朕殊代爾恥之兹所交事件若少瞻徇為留一毫地步猶顧戀向日之私恩小惠而不力行發擲恐朕亦難以庇宥於爾全在爾自立主見而已朕歷觀史册所載姦臣負君亦所時有若以逆情悖理辜恩負義而論則年羮堯為第一即至今日並未見伊有一毫知過慚悔之念真大奇事苟非喪心病狂則係天奪其魄不然世間寧有如是情理耶諭巡撫王景灝川省自兵興以來一切軍需奏銷甚屬浮冒朕所悉知特以軍務方殷督撫捐項頗多朕是以姑聽之而不深問今西藏已安西海已定打箭爐外諸處防守官兵從此皆久遠駐劄矣軍需之項曷可不清楚明白爾於一切奏銷宜悉照實數不可仍蹈浮冒故轍其給過部費等項從前舊事朕槩不追究至於口外辦事官役及一切雜費如果有應用不可省者當題明賞給因爾摺內有秉正不敢存私之奏是以朕降此旨與爾爾將以前并現在各項俱一一據實奏聞毋少為年羮堯隱諱掩飾代受過咎也特諭雍正三年七月初二日四川巡撫臣王景灝謹奏為奏聞事雍正三年七月初一日準管理打箭爐稅課事務扎薩克喇嘛楚爾齊木藏布拉木展巴員外郎伊特格爾咨稱六月二十三日申時打箭爐地動將稅務衙門及買賣人蠻人住居碉樓房屋俱行搖塌壓死宣慰司土司桑結驛丞俞殿宣糧務辦事之南部縣典史徐翀霄並壓死買賣人蠻人等甚多等因到臣查打箭爐駐劄稅差且漢蠻交易地方關係緊要隨委化林協副將張成隆成都府知府李𢎞澤兼程前往加意賑恤務使安頓得所俟料理完日另行摺奏外為此繕摺奏聞謹奏巳有旨矣可照依蔡珽六十一年料理之法盡心措置毋得少忽雍正三年八月初八日四川巡撫臣王景灝謹奏為奏聞事雍正三年八月初五日臣齎摺家人回川奉到諭旨臣跪讀之下仰見聖明無微不燭因軍需原有浮冒令臣查明具奏臣敢不徹底清查仰副聖懷查年羮堯自康熙五十六年至六十年所辦軍需雖已奏銷其中不無浮冒自應徹底清查但經手各官多有升遷離任若俟各處行查翻致耽延歲月以臣愚見祇應立法稽查臣思軍需一項除官兵俸餉及鹽菜銀兩俱為實在之數似無浮冒之處所有虛浮皆在採買米豆草束等項及雇運腳價內藏掩然而皆有底案可稽臣惟將底案逐年清查發價若干實用若干報銷若干則浮冒之數必能得其確實無復有所遁藏在年羮堯亦當無辭再為巧飾矣至年羮堯離任以後駐藏官兵漸次撤回採買挽運亦屬有限各項軍需更為容易查核俟臣詳查明白即據實奏聞至臣於去歲八月到任後糧米己經運貯口外足以供支並未採買米石其現駐官兵臣不過月給口糧鹽菜所用無多此後軍需俱照實數奏銷不敢浮冒如有應用之項自當題請賞給以杜濫用弊端緣係密奉諭旨事理容臣將浮冒銀數查明或應摺奏或應具題理合一併請旨伏候睿裁批示遵行為此繕摺奏聞謹奏自應具本題奏川陜兩省其中或有干連爾處一毫不必巧飾爾為年羮堯之屬員焉敢與之抗拒不但爾難免隨順之罪即朕誤用匪人之咎亦無所辭若能事事據實朕皆件件寬爾設或半吞半吐則反不如強忍以待處分也阮揚璟如此一天下共知之人何不早行查出參究耶今既奉旨推訊如再不徹底研窮仍欲模稜致令有所隱匿則莫怨朕恩之有始無終也此事與爾大有干係慎為之同日又奏為奏明事竊臣曾在西寧軍前管理户部噶喇大事務凡屬軍需皆臣督催料理但一切收發錢糧則係年羮堯分委各員承辦採買年羮堯嘗言用兵之際不能入正項開銷者約有三十餘萬只可以公完公等語且年羮堯身膺大將軍重任錢糧係伊撥發報銷任其主持臣未得參末議去年五月內臣接部文奉旨令臣陛見遵即馳驛赴京荷蒙天恩授臣巡撫又令馳驛速往四川所以用過銀兩其中浮冒若干臣實不能知其細數雖年羮堯在西寧有散給兵丁皮襖捐備火繩鉛彈以及各項賞費然而浮冒亦復不少今臣既蒙訓旨凡軍需等項不可為年羮堯隱諱臣於此時若不奏明則又罹徇隱之譴臣約計西寧軍需除不入正項開銷用去銀兩外其浮冒仍有二十餘萬伏乞皇上飭令年羮堯據實回奏自行認賠或將西寧報銷原册發臣查對臣當調取西寧雜項軍需底册逐一秉公查算查出冒銷之項即應於年羮堯名下追還庶微臣遵奉諭旨不敢瞻顧之心得以少白於聖主之前矣為此繕摺奏聞謹奏將王景灝此奏發與嶽鍾琪圖理琛石文焯嚴察議奏該部知道同日又奏為奏明事臣看得年羮堯背負天恩欺公網利種種惡迹一朝敗露實國家之罪人為臣民所痛恨成都府北門外所有祠宇其碑額牌位不便存留應行毁棄以為臣子貪汚欺罔之戒即將其祠屋改為義學之用理合奏明伏祈皇上睿鑒為此繕摺奏聞謹奏應毁則毁之已耳何以改為今俱可不必已遲矣同日又奏為欽承訓旨瀝陳悃誠仰祈睿鑒事竊臣前任臨洮府知府時在軍前辦事數載逮至康熙六十年值年羮堯升任川陜總督飛檄調臣驗看臣不得不赴西安及見靣時猶以威嚴之狀懾臣而臣亦止聽命未嘗為之少屈徐乃詢及西邊事務臣以所知者一一對答年羮堯云兹值軍興之際看爾年力精壯正該出力報效朝廷等語臣以其出言公忠遂信以為實所以年羮堯委臣在肅州督運軍糧又委西寧料理軍務臣皆竭力奉公不敢絲毫苟且均幸無誤此臣謬被年羮堯薦引之所由來也臣家世受國恩豈肯卑賤其身為人指摘且臣一任臨洮知府一任西安按察使皆係年羮堯屬員以國事責臣承辦臣又何敢推諉原非有干求薦引之心此中情節諒難逃於聖明之洞鑒也詎意年羮堯口是心非言與行違今幸蒙聖聰照察其姦貪之狀俱巳敗露且從西安赴浙之時又將資財隨處寄放臣實不料年羮堯之居心為人竟至如此種種背負君恩為天下所唾罵臣工所切齒臣已深惡痛絶又何能復出一辭以為年羮堯辨白今蒙天語誥誡臣惟有仰遵聖訓痛自刻責深悔從前誤交匪類力圖改悔自全而已臣於奉到諭旨之先巳將年羮堯寄放之金子砍運江南之木植及魏之耀當本等項具疏題報臣今仍於各處盡心搜查務使毫無滲漏以明臣不敢徇隱之心贖臣不能早鑒之咎臣謹披瀝愚忱伏祈睿慈鑒察為此繕摺奏聞謹奏因知爾向日來厯又靣見爾日前奏對朕所以力拒衆論而寬恕爾罪也參奏之摺現在朕處盈案俟事定後發來爾看方悉朕越格之恩但今日爾能全朕用人之顏靣能杜絶衆人之口與否尚未可定少有一毫虛假以遊移搪塞為巧務恐未足抵敵羣譏也惟勉力篤實真誠庶可望轉禍為福若信不及此諭殊虛負朕一片惜汝之心朕生平不為權譎虛誑之語爾其知之雍正三年九月初六日四川巡撫臣王景灝謹奏為恭報秋成事竊查四川省自入秋以來晴雨得宜秋田收穫較之往年倍好茲據成都重慶等十府嘉定眉卭等六州併各衛所陸續具報秋成俱有十分等因到臣臣欽遵聖諭乘此豐稔之時勸民蓋藏使閭里各有蓄積以為永享盈寧之計小民莫不歡欣鼓舞頂戴皇仁合將豐熟緣由繕摺奏聞謹奏覽奏實慰朕懷同日又奏為覆奏事臣齎摺人回川捧到臣前奏打箭爐地動一摺奉有硃批諭旨臣跪讀嚴綸益深悚惕緣先準川陜督臣嶽鍾琪咨移奉旨事理臣隨即查照前撫臣蔡珽於康熙六十一年捐賞巴塘等處被災人等銀兩緞綾布匹煙茶每人所給之數逐一捐備檄令副將張成隆知府李𢎞澤宣揚皇上恩德查明被災民蠻各加賞賚毋致遺漏務使均沾實惠俱照依蔡珽所行料理至稅務衙署倒塌臣已委員捐蓋又示令茶商速屣茶包運爐發賣勿致缺乏現今商客流通民蠻安帖臣皆欽遵諭旨實心辦理斷不敢稍有疏略自干罪戾恐厪聖懷謹將現在賑恤安撫緣由繕摺覆奏以聞謹奏果能實力奉行朕再無不知之理若祗暫時搪塞以欺蔽為務諒爾等未必及年羮堯姦巧之才彼尚不免敗露則亦何益之有百凡惟務真實乃第一善䇿一分真一分福能勉此字庶幾是矣切記毋忘雍正三年十一月初八日四川巡撫臣王景灝謹奏為覆奏事竊年羮堯將子過繼與阮揚璟一案臣從前未及查察未經題參昏昧之處罪無可逭荷蒙皇上寬恩不即加以嚴譴令臣與按察使程如絲嚴審追究臣實不勝惶悚又奉皇上批到奏摺以此事在臣大有干係令臣徹底窮究臣跪讀之下益深兢惕現在與按察使程如絲公同將阮揚璟並伊妻妾家屬男婦人等逐一嚴訊務得實情斷不敢少有隱匿自干重罪容俟審明另疏具題合先繕摺奏聞謹奏爾自惜與否朕則不知朕實惜爾之至今朕亦無法矣殊不料爾等如此行事也到陜將諸事一一據實承認竭盡資力補完不清之項異日另邀朕恩亦未可定倘或以詭避為良謀以隱匿為妙計則弄巧成拙國法無私噬臍莫及矣朕降真誠不虛之旨不啻至再至三能聽信與否惟在爾自為也可惜可惜同日又奏為凛遵聖諭恭謝天恩事雍正三年十一月初三日臣齎摺家人回川捧到硃批奏摺臣跪讀之下知皇上力拒衆論寬恕臣罪諭以勉力真誠轉禍為福臣感激深切不覺伏地嗚咽涕泗交頤不能自止竊念臣在陜西時正值年羮堯威勢恣縱為其屬員實不敢抗拒雖見有營私網利之處而畏勢順從亦所恆有今自知罪戾難免衆論之參奏自難逃皇上之嚴譴故數月以來戰栗憂懼魂夢靡寧兹讀諭旨以臣為年羮堯之屬員何敢與之抗拒此實皇上至聖至明如日月之無微不照遂力拒衆議曲賜保全不知臣何修而得邀天恩如此之寬大也臣惟凛遵訓旨以誠實二字刻刻在心凡有應行陳奏之事必毫無欺偽以贖臣罪於追悔之後即有干連自巳之處亦斷不敢隱匿於君父之前如稍有支飾是皇上有保全微臣之心而臣轉無自為保全之計非惟聖明所不宥實亦覆載所不容為此披瀝下悃繕摺奏謝以聞謹奏若止前數件仍可以令爾在川完結今據石文焯圖理琛所參二欵爾不得不離任赴審矣可到陜照前批諭竭力為之雍正三年十二月十五日四川巡撫臣王景灝謹奏為恭謝天恩事臣以庸愚謬膺任用才識短淺錯誤實多前因南坪番夷一案部議降級調用奉旨從寬留任嗣因督臣嶽鍾琪題參年羮堯冒銷運價一案部議將臣革職拏問又蒙皇上特恩寬免嗣又因署督臣圖理琛題參請將臣解任發往西寧造册又蒙皇上恩免解任令臣造册移送屢接部咨皆出望外臣俱恭疏奏謝天恩而感激私衷實有未得盡陳者痛念臣前在陜西兩任皆係年羮堯屬員不無畏勢順從遂致牽連參奏臣不勝憂懼乃荷皇上聖明俯鑒臣之不敢與年羮堯抗拒蒙恩寬恕至再至三不但保臣一家之身命實且全臣一生之名節聖主曲體下情如此之至雖生生世世效犬馬以難酬即子子孫孫竭涓埃而罔報惟有矢誠實以對君殫心力以辦事並率領妻孥朝夕焚香叩首頂祝聖壽於無疆耳謹繕摺奏謝以聞謹奏朕實惜爾其奈爾自暴自棄朕亦無可如何也如阮揚璟一案年羮堯生祠及堡夫等事既不早行糾舉臨時仍存瞻顧並無幡然改悔之誠自貽伊戚夫復誰尤今惟有竭力完項以圖保全身命而已朕無可多諭國法三尺朕亦安得而私諸硃批諭旨卷二十八
