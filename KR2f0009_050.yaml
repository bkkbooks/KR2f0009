body:
  text: 欽定四庫全書硃批諭㫖卷五十硃批西琳奏摺雍正五年十二月十八日西安巡撫臣西琳謹奏為奏聞事竊臣於十一月十五日跪請聖訓荷䝉教誨周詳恩逾顧復感激時深遵㫖即於十六日起身是夜宿長新店戌時降雪起至次日申時稍止從此由山西直至西安於十六七八等日處處俱降大雪自一尺餘至二尺餘不等來年二麥豐收可必至沿途米價小米每斗價銀自一錢至一錢二三分不等豆子自六分至八分不等麥子自八九分至一錢一二分不等其錢價每銀一兩換大錢九百八九十文至一千一二十文不等理合繕摺奏聞謹奏深慰朕懷陜省尚未奏報得雪正在憂念之際覽此奏如獲珍寶朕懷釋然矣雍正六年二月初九日陜西總督臣嶽鍾琪西安巡撫臣西琳謹奏為請㫖事竊照署撫臣張保以撫標遊擊孫王法等詳稱西安布政使張廷棟支放官兵俸餉短平緣由具摺奏請一案臣西琳面奉諭㫖令臣等確查具奏欽此臣等遵即親審據張廷棟供稱向例支放俸餉係面同領餉之員驗過部頒法馬逐平彈兌如有平針不對雖分數之間亦必補足兌凖今雍正五年十月二十三日據各標營守備千總黃都等支領十一月俸餉銀兩彈兌之時面詢該員等有無不足據該員等各云數足遂交明領去今以領去之後復言短少委係過手難憑等語詢之各營備辨又堅供實係短少臣等隨將司庫法馬併各營包分散餉戥子當堂較對查十一月係小建每兵一名該餉銀二兩七錢即取部頒法馬兌明入戥稱較計重二兩七錢五分是每兩該多銀一分八釐有零確係平重戥輕則該司之支放並無短少而各該備等之用輕戥分給顯有剋扣情弊乃前任署撫臣張保不行查明草率具奏甚屬不合查散給俸餉俱係守備經管既有剋扣自應題參至於各該營副參遊擊等員失察之咎亦應參處但臣等查西安督撫兩標以及火器城守等營之副參遊擊等官若盡行題參革職律擬則九營皆虛一時題補不得其人仰懇皇上天恩或將各營失察之副參遊擊併歷任未久以及署事之守備等員暫寬參處止將久歷營務明知平重戥輕之將備據實題參以肅法紀臣等未敢擅便伏乞皇上訓示遵行所有奉㫖交臣等確查緣由理合繕摺奏聞仰祈睿鑒謹奏既係歷來相沿陋弊猶屬可恕小過姑寬參處惟當嚴加申飭以戒將來至張廷棟曽經飭諭其諸凡謹慎今於此事雖云無涉其辦理支放時必有不協處以致有此一畨嗣後朕或再有所聞斷不輕貸也嚴諭伊知之西安巡撫臣西琳謹奏為奏請聖裁事臣自到任以來細檢案件見竊盜諸案州縣報到批令緝賊之後在上司竟無片紙行催而州縣亦竟無隻字申覆臣查舊案內有失物甚多者有搶奪傷人者有夥賊衆多者有强竊情形迹涉疑似者乃槩置沉擱揆厥所由或因竊賊照案緝拏例無定限所以彼此漫不經心殊不知安民莫先於弭盜而弭盜最切於清源欲清其源則竊賊烏可不嚴夫竊賊者即大盜之漸其掏摸剪綹鼠竊狗偷之事州縣即行發落必不通報督撫若至通報必係事不容已勢難隱諱之案則是竊賊一項原有輕重大小之不同若不另定處分槩以竊賊定案則盜風何能止息以臣愚昧之見請嗣後凡有報到盜案查明果係是竊非强照例免參踈防然竊賊亦不可不定限緝獲未便容其遲緩可否報部立案初限六個月不獲賊者作何定議處分二限四個月不獲賊者又作何定議處分并州縣有前項竊賊不通報上司上司不報部立案者又如何處分俾各官俱有警惕知竊賊即須緝獲案件不容沉擱似於弭盜安民不無禆益是否可行仰祈睿鑒施行謹奏覽奏可見實心任事處諸務咸能似此精勤何有廢弛朕甚嘉悅勉之但此事全在爾等督撫隨宜嚴為勸懲若奉㫖議定條例則案件不勝其繁矣且據汝奏中亦言竊盜原有輕重之不同即此分别輕重其間又滋無限弊端也州縣有司各員之勤敏闒茸爾等茍一留心訪察諒不難辨别倘有遇盜竊等案漫不經心怠惰不理者何事何時不可以指參耶議定處分之說似可不必然竊盜一事最為民害理當嚴緝亟須申飭屬員勿使稍有怠忽雍正六年三月二十六日西安巡撫臣西琳謹奏為奏聞事竊臣查驛站關係緊要屢檄嚴飭驛傳道金南瑛令其各處查點又一面密委筆帖式千把等四路分查前據驛傳道金南瑛以渭南縣驛馬缺少疲瘦詳揭正思根究確實旋據委查東路之筆帖式佟愛把總李國蘭回稱渭南縣驛馬並未缺額而疲瘦者止有六匹與驛傳道所報迥不相同隨又密遣試用縣丞王名標至渭南縣查點與驛傳道所報符合隨將渭南縣改教知縣尹仕任題請革職究追將該筆帖式把總等發按察司嚴審有無狥情受賄等弊前經題明在案今據按察司詳稱渭南縣驛馬原係缺少疲瘦因佟愛等到驛時兵房馬夫謊稱出差未歸及其復回查時乃借民馬影射抵充又將勞傷不堪之馬亦不細查填注雖無狥情受賄然難辭疏忽之咎詳覆前來臣伏思佟愛李國蘭奉委稽查並不實心慎密明係疏縱玩忽不能供職之員已咨吏兵二部斥革外查臣標額外把總二缺係康熙四十二年恭逢聖祖仁皇帝西巡將臣標左營領旗金養德張立特恩用為把總並非為臣標經制而設也理應裁汰今斥革李國蘭之缺應以額外把總徐子茂調補其額外把總之缺不必另補再左營額外把總張其藴之缺俟該辨缺出并行扣除則冗員省而符經制矣理合繕摺奏聞謹奏可嘉之至事無巨細咸肯如此執法毫不假借方為不負朕之知遇也勉之同日又奏為奏聞事雍正六年正月十四日准宗人府清字來文內開署西安將軍富寧安在延信署內書房見有民人二名道士一名搜有道士牌單修養圖書五星通鑑性理等書其民人一名馮玉供係貢生在延信處教書牌單書修養圖是向東關道清觀金道士處借來看的一名孫永成供係醫生因看馮玉眼疾進署其道士周乙正供向在甘州東山寺出家雲遊至田家灣住因尋貝勒來此等因具奏奉㫖著將馮玉等留在家中情由交與派出審問延信大臣一并嚴審具奏行文該撫將有無别情之處嚴審具奏該衙門知道欽遵移咨到臣隨傳同按察使碩色拘提馮玉孫永成嚴訊所供俱與宗人府來文無異詢據周乙正供小的是甘州人在東山寺出家因延將軍當日常到寺裏來與我師傅講道所以認得後來師傅死了我朝武當山回來七月裏路過到這裏街上撞著延將軍家人鎖住兒帶進見延將軍與了小的些米就在田家灣八仙庵住下上年十一月初十日又想去化緣進署就被拏了復夾問周乙正延信常與你師傅講的是什麼道你當日說來尋貝勒你尋他做什麼你既認得鎖住兒延信家的事你必定知道據供當日師傅也沒對小的說講的是什麼道但聽得說是修養工夫來尋貝勒實是為化緣的那鎖住兒當日也到寺裏來過認得的還認得一個保祿兒他也說㑹講道如今他兩個都到京裏去了别的事實不知道等語臣再四嚴審馮玉孫永成周乙正僉供並無别情而周乙正所供延信家人鎖住兒保祿兒俱已回京無憑質訊除將馮玉等仍行監禁外伏查此案理應具題但審無别情合將供情繕摺奏聞伏候皇上諭㫖遵行謹奏覽奏知道了已交承審此事之王大臣存案矣雍正六年七月二十五日暫署西安將軍印務巡撫臣西琳謹奏為恭謝天恩事臣於本年七月初七日接准兵部咨文荷䝉皇上特恩命臣暫署西安將軍印務聞命之下惶悚無地即於本日任事已經遵例題報外臣自當矢公矢慎刻加勉勵以圖仰報萬一謹繕摺恭謝天恩再臣查西安駐防八旗滿洲䝉古漢軍內積有協領參領佐領防禦驍騎校等共四十一缺自雍正四年延信任內至今未經題請補放竊思設官分職各有專司員缺何可久懸今臣將協領參領佐領等缺見在會同副都統臣尼瑪善等於應行補放人員內細加考驗給咨赴部引見恭候欽定其防禦驍騎校等缺臣查雍正五年十月內有㨂選八旗滿洲䝉古漢軍驍騎校領催送部引見䝉皇上特放五員外其餘記名應補防禦四十三員應補驍騎校一百五十名臣當欽遵諭㫖內名次先後挨次題補不敢再致因循使員缺久懸也伏乞皇上睿鑒謹奏所奏是補放各員應陸續題奏至一切振作整飭之舉俱可不必爾不過暫行署理遇有令官兵感激之事為之可也朕尚欲命傅爾丹詣陜有與嶽鍾琪密商之事且常色禮亦將次到來矣同日又奏為奏聞事臣自到任以來陜省各屬倉庫錢糧徹底清查內有節年民缺自雍正元年至二三四五等年共未完地丁銀四萬二千九百二十兩零未完本色糧三十六萬二千五百一十四石零臣正在清釐間仰䝉我皇上特頒諭㫖令各省督撫布政司等因地制宜臣恭繹聖諭已無微不照隨即斟酌立法遍行各屬令其按里按甲逐名確查造冊呈報另委幹員協比如有包攬抗缺者即令監禁追比至於實在民缺者令其勸導輸將迄今數月以來據各屬報到共完銀三萬三千五百餘兩共完糧三十三萬九千餘石其餘未完銀九千三百餘兩未完糧二萬三千四百餘石皆係實缺在民不過零星尾數耳今秋收在邇大有可必俟秋成之後則尾缺自可全完矣為此謹奏覽所奏情形陜省錢糧似易於清楚也朕深為慰悅諸凡與嶽鍾琪商酌而為之一查得陜西錢糧無大虧空而倉儲之弊在所不免或借存七糶三之說或借以米易榖之故那前掩後不無支飾今嵗秋收豐稔榖價甚賤惟在盤查之官不少假借便可買補足額至於甘屬頗聞虧空又寧夏地方有因派軍需而村民逃避者逺路傳聞尚未得其確實也一陜省賊盜甚多在民間者姑無論但就官署而言除本年正月內岐山縣署中失盜已經參出外四月初八日涇陽縣被盜署知縣胡蛟齡帶傷逃脫五月初二日漢中府署被盜又聞先於去年冬曽被偷竊六月內鳳翔府守備署中被盜沔縣知縣署中被盜七月二十八日潼關撫民㕔署中被盜八月初七日朝邑縣知縣署中被盜九月內新任西安府知府王紹文赴任於途中被盜其餘臣未聞知者想亦不少數月之內疊聞盜竊竟視為常事上下隱諱希圖免過乃不知盜風從此而長矣一陜省官員强半委署朝更暮改重復移調官員皆視為旅次惟交盤之不遑何暇理及民事夫親民之官使之席不暇暖則風俗何由而知政務何從而理臣雖不得與聞實未解其何故也一巡撫西琳器局褊淺動作乖張不達政務而專好小利每接見屬員有二裁縫旁坐縫衣不起凡地方緊要事務一一聽聞大小官員莫不駭異又前藩司馬喀變價官物凡金珠貴重之件巡撫勒令咸長兩縣交送撫署以至新署咸寧縣知縣張典以馬喀官物不清既無原物又無變價之銀不接前任交代又巡撫有不用之二幕客一姓王薦於臬司碩色一姓鄧薦於糧鹽道杜濱闔城官員無不嗤其鄙陋一原任咸寧縣知縣胡增瑛去冬領張晟虧空案內銀兩買米侵冒銀約四千兩與原任知府蔡璉進一美妾互相欺混藩司張廷棟為其所愚轉詳巡撫照數准銷今春總督訪知要參巡撫竭力庇護蔡璉是以總督止將騾行一事參審至今口聲沸騰一原任潼關撫民同知今升涼州知府菩薩保徵收稅銀不照則例額外加倍勒收本年六月間潼商道張正瑗提驗底簿該同知以假簿送閲張正瑗持簿至省面禀督撫㑹同藩臬訊明不照則例加倍徵收是實額外勒索飯銀是實侵匿稅銀四五千兩是實乃遷延日久令該同知倒填年月自首銀二千兩上下彌縫和同完結臣䝉皇上面諭各省庇護屬員之習牢不可破觀此乃知聖明在上無逺不照且由此推之各處侵蝕稅課上司不能查察即查出而有心狥庇者當不止潼關一處為然也一本年九月二十六日總督自外回署時有一男子持書一封向總督言我師傅教我下山來與公爺投書隨帶進密詢次日又聞㑹同巡撫臬司密詢其書中情由及如何查詰臣無從知只聞係湖廣人亦未悉其姓名言語可疑情形怪異不知曽入告否臣至微極賤荷䝉皇上特達之知凡事不敢瞻顧謹就所知據實奏聞西琳被人如此參奏返躬自思何顔立於天地之間耶朕所用滿洲外省大臣中多無恥不廉器局狹小其所以然之故朕實不解朕閲此奏之後隨於各處訪詢爾雖無大貪之處類斯營求小利等事不可枚舉總因汝出身微賤福量淺薄不克負荷耳滿臣之顔面被爾輩一二喪失天良之人壞盡矣朕除愧恨之外復有何諭嗣後若不洗滌肺腸痛加悛改身家性命即在眼前非但辜負朕一番擢用之恩而已也雍正六年十一月初九日陜西巡撫臣西琳謹奏為恭謝天恩事竊臣齎摺家人回陜荷䝉恩賜月餅奶酥餅蜜餞荔枝果品各件臣跪迎進署恭設香案望闕叩頭謝恩祗領訖臣自愧庸愚報稱未能日深惶悚荷䝉聖主垂念微末隨時賞賚觸目警心感愧無已惟有凛遵聖訓勉圖仰報萬一為此繕摺恭謝天恩謹奏可惜朕恩誤施於汝輩無恥負恩之徒耳硃批諭㫖卷五十
