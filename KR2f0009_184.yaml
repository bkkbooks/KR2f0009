body:
  text: 欽定四庫全書硃批諭㫖巻一百八十四硃批王溯維奏摺雍正七年閏七月初十日分查松江府錢糧臣王溯維謹奏為謹遵聖諭奏謝天恩事竊臣至愚極陋歷任州縣罪過多端䝉皇上格外施恩不加黜革屢奉温㫖寛宥數年間擢至監司大員受恩深重無以復加今春䝉皇上畀以分查江南松江府錢糧重任聞命之下不勝惶悚伏查松江一府舊欠至二百三十一萬餘兩三倍於兩浙且積弊相沿巧詐百出臣日夜籌畫謹擬彚欠順莊之法釐剔松江花分詭寄之弊與設櫃聽完之條列為六欵於三月二十七日到蘇州時即分呈總理諸大臣在案臣於四月初一日受印即赴松江府視事敬宣皇恩浩蕩於吏役人等飭令自首一月之後書役出首八萬有餘郷紳出首一萬有餘曽具文報明總理各大臣在案臣昨年任浙江巡道時曽將孫女與趙向奎之孫新聯姻親今年五月間聞藩司幕客杜姓招揺風聲遂直言相告無如趙向奎粗疏任性以彼前任嘉定時曽管錢糧有效遂爾深信不疑此實臣匡救不力奉職無狀幸䝉皇上天恩不即治罪復賜諭㫖於七月二十日吏部侍郎臣彭維新傳臣密付跪讀因循茍且以期無負皇上加恩擢用之至意也緣奉諭㫖事理謹繕摺回奏叩謝天恩謹奏汝等於此一舉實力勉行與否斷不能逃朕耳目一生功名身家所繫勉之愼之魯論云擇善而從何不努力效法李衛鄂爾泰田文鏡三人耶内外臣工不肯似其居心行事之故朕殊不解若不能如三人之行為而冀朕如三人之信任不可得也亟宜殫心竭力黽勉盡職此後奏摺到京交大學士張廷玉轉逹雍正七年九月初三日分查松江府錢糧臣王溯維謹奏為欽遵聖訓叩謝天恩事竊照清查一案臣具摺自陳匡救不力之罪荷䝉皇上格外洪恩不加罷斥欽賜硃批訓勉臣跪讀之下不勝感激涕零伏思李衛鄂爾泰田文鏡三人居心忠正辦事精詳臣何能仰冀其萬一兹䝉聖訓諄切敢不勉力效法但臣之才不能及此三人者實天資庸劣之所致而臣之心竊欲效此三人者乃區區效力之微忱也緣奉到聖訓理合叩謝天恩並繳御批原摺謹奏據奏心欲倣效李衛鄂爾泰田文鏡等三人而慮才或不及朕謂其才或可勉强企及其心未必能效法也不但小臣之中即内外大臣經朕諄諄訓諭能仿彿者尚未見有幾人何况於汝夫心者本也才者末也本既差謬末亦自必不及縱有些少作用亦不過從歷練中得來之小有才耳所以云但當務本不必逐末若祇以才目三臣不止心無所知亦且目無所見汝言誤矣今且無庸逺效彼三臣姑取則馮景夏温而遜胡増耀三人亦可矣同日又奏為兼理海關詳辭未准陳請聖鑒事竊照江南分查一案浙江督臣李衛准戸部咨轉檄到臣内開奉㫖松江府著𣲖出浙江杭嘉湖道王溯維其杭嘉湖道印務著李衛委員署理等因欽此欽遵臣捧讀感泣我皇上深知松江府屬積欠繁多分查重大臣力量不能兼顧是以著令另委員署理道務俾臣得專心清查此誠皇上明並日月恩同覆載者也臣於四月初一日領印即赴松視事敬宣皇恩浩蕩開導紳士書役自首數目已經奏明在案六月初一日接前署撫臣王璣檄委海關税務臣原擬具詳請辭因檄開現經題明等語是以静侯部覆兹於閏七月二十六日署撫臣彭維新接准部咨奉㫖依議欽遵飭臣兼理海關臣即將不能兩顧緣由於八月初二日詳請署撫另委員管理至月底未經批示臣再四躊躇分查重任與海關税務均屬錢糧干係實有萬萬不能兼顧之勢效力有心分身無術倘不揣力量冐昧從事勢必顧此失彼臣罪不足惜深恐有負皇上格外擢用之恩則臣罪滋大為此具摺陳情伏祈皇上睿鑒施行謹奏既有今日之推卸即不當有始初之營求也源不清而巧飾以潔其流豈可得耶雍正八年四月十二日分查松江府錢糧臣王溯維謹奏為敬陳造冊之法以除積弊仰祈睿鑒事臣以庸劣無似謬任分查重責一載以來夙夜惶悚周行八邑詳加訪察乃知巧詐百出種種不一究其作弊之由皆因州縣造冊漫無章程是以姦胥猾吏得以任意増減肆志侵蝕其害誠有不可勝言者按今時之積弊倣古人之成法惟有立一定不易之制度使州縣遵守奉行則積弊可除民生以安國計自裕矣一造冊宜照管收除在一易知單宜散給花戸一宕票宜隨時改正一縣令宜久任責效以上四欵臣謹按松江積弊酌量補救是否有當伏乞皇上睿鑒施行謹奏前二條應與總理清查大臣言者何必奏朕其餘似此奏陳者甚多不止汝一人巳也同日又奏為欽遵聖諭叩謝天恩事竊臣前奏叩謝聖諭一摺奉到硃批臣跪讀之下愧汗交流臣原不當以才目李衛鄂爾泰田文鏡三大臣卑鄙小見誠如聖訓所云臣今惟勉力效法馮景夏温而遜胡増耀三人猶恐秉質愚昧不能企及至清查一案臣前巳將官侵役蝕首數奏報在案續又搜獲各承私簿查出弊侵清書數書區差里保里耆甲首歇家遞冊錢莊銀匠以及生監并各衙門書役人等屢出示曉諭諄諄開導兹又首侵銀三十萬兩雖水落石出必俟協查官逐戸挨查方有著落而役蝕之數現在陸續出首諒必加多合先具報謹奏覽同日又奏為欽遵聖訓恭謝天恩事竊臣奏為兼理海關詳辭未准陳請聖鑒一摺荷䝉硃批既有今日之推卸即不當有始初之營求也源不清而巧飾以潔其流豈可得邪欽此臣跪讀之下心切氷兢果否營求自然難逃聖鑒無任惶悚謹奏朕鑒猶屬末節唯能勉對天鑒無慚則是矣雍正九年三月十八日分查松江府錢糧臣王溯維謹奏為奏明事竊臣奉命分查松屬錢糧受事以來夙夜兢惕詳加籌畫先照總理衙門所定彚查彚欠冊式督飭印協官詳查糧戸各年應完糧額分晰完欠將花分子戸俱歸的姓實名冊竣之日即令協員輕舸減從按冊逐戸挨查核其戸名住址之實在察其是侵是欠之切㨿臣一面周行八縣一衛敬宣皇上為民除害至意咸使周知其從前舞弊侵蝕錢糧之經承櫃書以及甲首歇家與各衙門書役衿監土棍人等勤為開導以安其心詳為搜查以破其弊擇其尤黠者嚴加懲創以儆其餘百姓胥吏皆深感皇恩髙厚凜知國法森嚴㨿吏役人等將侵蝕諸弊先後陸續出首計松屬應查積欠銀二百二十四萬餘兩自雍正七年四月至本年二月遞㨿各屬報明挨查巳竣并報到自首及查出官侵銀二萬八千九百餘兩吏蝕銀一百二十萬五千二百餘兩又敬籌查追案内奉文將雍正五六兩年錢糧一體清查並㨿各屬報自首吏蝕銀一萬二千七百餘兩俱經分晰報明總理大臣在案至於其中間有年逺人湮冊籍殘缺印串遺失又恐書役等將小民欠少開多各役蝕多首少臣又飭令協員乗此造冊結數之時再加詳細核察一面將糧戸被侵實欠各年數目詳註執照逐戸發給以杜姦胥欺朦之弊此臣兢兢辦理之愚誠也臣深愧智識短淺未敢自信為徹底釐剔恐不足以仰報皇上天恩於萬一兹届限滿理合先將各屬查竣情由及侵蝕數目具摺奏明伏祈皇上聖鑒謹奏自信不及之事奏朕何益似此預留地步希免日後譴責實難信汝兢兢辦理之愚誠也硃批諭㫖巻一百八十四
