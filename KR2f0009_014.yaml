body:
  text: 欽定四庫全書硃批諭㫖卷十四硃批楊琳奏摺雍正元年正月十八日兩廣總督臣楊琳謹奏為叩謝天恩事臣差齎鹽政摺子并奏銷本章差官回粵知奉㫖傳問正紅旗佐領吳成龍著將臣弟男子姪及佐領所管下人俱撥入正黃旗都統下行走欽此臣隨率領闔家男婦大小望闕叩頭謝恩訖伏念臣本無寸長䝉聖祖仁皇帝殊恩擢授總督圗報不盡惟臣有委曲下情未敢徑行陳奏今䝉皇上聖鑒拔置上三旗是臣素日所不敢言者皇上深知之臣夢寐所不敢望者皇上特全之不特臣從此得以保全即子子孫孫亦可無庸顧慮而闔佐領之官兵壯丁皆受無疆之福矣臣惟益勉做好官以報隆恩於萬一為此具摺叩謝謹奏覽爾奏謝知道了凡此皆朕夙昔所洞鑒之情何待奏陳爾但做好官以報朕可也雍正元年三月初二日兩廣總督臣楊琳謹奏為恭繳硃批事臣前差家人齎摺請安奉到硃批臣敬謹凛遵更加勉力以圗報稱又奉硃筆諭㫖官員內有太監子弟親屬捐納成名兼無賴之徒投入諸王阿哥家中情面囑託濫膺官爵者密訪參奏欽此臣查廣東廣西內從前未聞有此等官員惟近據廣西左江鎮總兵馬振圗禀稱二十阿哥差人持諭賞物并執有合同缺約臣現另摺奏聞一面將人犯解部質審事之虛實雖在未定看來未必無因而至該總兵業已自行舉報未便即行題參但左江地方關係緊要馬振圗雖到任未久其居官甚屬平常不堪勝任即此事到部亦須馬振圗對質應請皇上另簡賢能補放臣再細加察訪如有前項人員當即密奏參革所有硃批諭㫖二件理合恭繳謹奏向後遇此等應黜之員即將本省屬員中才守兼優者密行保薦候朕酌量降旨補用若待朕問爾然後奏覆往返稽遲時日必至要缺久懸無論文武皆當照此而行諒爾斷不負朕信用而濫舉匪人也文而兩司武而總兵副將俱不妨據爾所知密摺奏來倘不得其人亦將不得人之實情奏聞特諭雍正元年三月初三日兩廣總督臣楊琳謹奏為備陳鹽務始末情由事兩廣鹽課原額止十九萬餘兩自康熙三十一年設立專差歷年加增至二十九萬餘兩四十六年將御史運司等官陋規銀十六萬兩歸入正項共額課四十五萬五千餘兩然每年所完不過七八分從無十分全完之歲自四十一年起至五十五年共積缺九十一萬餘兩臣於五十七年五月間接管細查歷年缺課俱係不能銷鹽之地商人事故更換不一因照衆商公議於鹽價內攤徴每鹽一包帶完舊缺內一錢三分按包帶徴每年約計止徴十二萬餘兩必須七八年方得完九十一萬餘兩之積缺臣酌議分以五年自五十八年起至六十二年止每年帶完十八萬二千餘兩除鹽包內帶徴十二萬兩之外尚不敷銀六萬兩則以難銷之埠融賣於易銷之埠所得餘利盡抵舊缺具題奉俞㫖准行在案五十八年差常保管理在差一年又缺新舊課餉十一萬餘兩自請撤回五十九年三月臣復奉恩㫖接理斟酌立法勸諭各商果有力不能完餉者發鹽銷抵計接徴五十六七兩年及督徴五十八九六十年額課歷年全完其舊缺銀兩已共完過七十五萬餘兩止未完十七萬餘兩現在催徴再發帑收鹽臣原題動支庫銀六萬兩每年除給發竈丁及水陸運腳倉厫栅厫巡丁工食并抵補遭風失水之外尚有羡餘自五十七年起至六十年止每年羡餘銀四五萬餘兩不等此原非正項臣俱歷年湊解陜西軍需今六十一年分羡餘約計亦有五萬餘兩俟彚册齊日按定確數題報或仍解軍需或留充兵餉請㫖遵行再鹽差衙門向因陋規歸入正項每年准於正項內動支二萬兩以作一切養廉等項之用臣經管以來並未動支俱歸充餉再鹽差衙門從前陋規雖革不無更名復立臣於初次接管時即痛行革除惟飭運使照舊例收課每百兩留平頭銀三兩三錢每年共一萬四千餘兩又收鹽價每百兩平頭八錢計銀二千兩除充銅斤水腳衙役工食紙張及起解河工銀兩盤費之外餘給運使養贍又鹽差衙門有鐵稅陋規銀二千兩臣歷年解赴內務府作包衣大當差之用此外絲毫不留俱係節次奏眀但兩廣鹽課每年不過完至三十餘萬兩今不特每年四十五萬餘兩之額必設法全完又帶完舊缺十八萬餘兩較之鹽差每年所徴幾多一倍商力實有不支臣既不敢纍商又不敢纍民惟有經營設法俾舊缺全完新課不誤以仰副皇上委託深恩耳因係臣經管之事合將始末情由備叙奏聞謹奏此事乃朕向日之所悉知仍行照舊辦理毋誤同日又奏為據實奏眀叩懇聖恩原宥事臣本以微賤䝉聖祖仁皇帝擢至總兵副都統提督又畀以巡撫總督重任臣非木石敢不竭盡心力潔已奉公以圗報效惟臣從前一種下情業䝉皇上洞鑒又不敢不備陳天聼臣係在十阿哥屬下自五十四年擢授廣東巡撫任內即應酬不暇臣門下犬馬敢不承受除抑勒屬官顛倒是非之錢斷不敢取武官並無交接外楊宴於五十八年除授兵部郎中即拘留差使催交銀兩派辦草料蓋造花園等差除臣任內每年所有之外并將京中素有之家産盡行折變抑且負債纍纍此難逃皇上睿鑒者也今於本年正月奉聖恩拔入正黃旗從此一家大小得以安舒度日更逢皇上格外恩施各免派巴顔遂立志澄清勉做好官查兩廣總督衙門向有廣東布政司平頭銀八千兩廣潮肇髙四大府共幫費七千餘兩糧道鹽道各幫費一千兩廣西布政司幫費銀一千六百兩桂梧潯平四大府共幫費銀六千餘兩驛鹽道幫費銀一千兩以上兩省共銀二萬六千餘兩臣官居總督一切犒賞養贍勢所必需留此二萬六千兩之項方足一年支應此外節禮一概禁絶臣因先巳具疏請謁聖祖仁皇帝梓宮欲到京靣奏今署撫臣年希堯到任傳奉聖諭臣跪聆之下感激涕零謹將臣從前不得巳之苦情據實奏明伏乞皇上宥臣已往策臣將來則感戴髙厚益無極矣謹奏類此等事朕不欲聞任爾等如何作為朕只責成一好字而巳不纍屬官不擾百姓分內應得之項取以備犒賞等費之用何妨乎且督撫操一省之權其一切用度非科可限而法可繩也如廣收節禮藉事濫派甚至預定價值而保題劣員納鄉紳土豪之賄而縱其凌虐小民類斯惡跡屏除淨盡其他則朕可不問也最要者惟當甄别屬員之賢否將貪庸不肖衆惡民怨之守令嚴行參處數員真實清勤有為有守之良吏越格保題數員即民心恱而天和應矣設不此之務而斤斤以小廉自矜以為披露誠懇毫無隱諱試思當今皇帝即昔日之雍親王也豈能逃其洞鑒乎今日總須共勉一真字一好字則君臣彼此受福不可量矣勉之雍正元年四月初二日兩廣總督臣楊琳廣州將軍臣管源忠署廣東巡撫臣年希堯廣東提督臣馮毅謹奏為奏聞事竊查廣東山海交錯民慣為盜上年臘月因奉部文雲南四川等省新開鼓鑄民間忽造訛言稱康熙制錢不用臣等即發示遍行曉諭詎肇慶府屬之開平恩平髙明廣州府屬之新㑹山僻地方訛以傳訛買賣不收康熙字錢窮民持錢不能買米捕賊徒雖有殺傷未能全獲臣等一靣發示曉諭愚民毋聽奸民哄誘一靣公同遣兵擒拏其脅從者悉解散歸農已獲盜首張祖珠許三捷李亞同撫具題或經部駁覆審每至二三年不結奸民得王命斬首示衆其次隨從者各割斷兩隻懶筋使成殘疾不能為非再將發落過緣由具摺䝉宜不得不如此懾服為此公同具摺敬請聖主指示遵行謹奏所奏甚是似此當行者一靣奏聞一靣即可舉行向來朕知粵東兵馬懦弱不堪大盜竟敢與地方官公然抗衡武備不强賊何能靖如欲𠞰盡山賊必以操練兵馬為先粵省此一事最為緊要爾等共膺封疆重寄不可偷安亟宜加意鼓舞振作一番方能改革舊習庶不負朕信用爾等之意亦可自免將來之處分也且朕觀天下督標撫標之兵尤其不堪率皆不以為事彼此怠弛不肯同心合力整頓料理而往往以避嫌藉為口實茍以標下軍卒視為督撫之私兵則與其避嫌何如盡行撤去以省錢糧之為愈也天下有是理乎各省督撫中用心操練標兵者不過數人而巳餘皆相類自兹各當奮勉惕勵操習以勤賞罰以公何慮營伍之不整肅耶同日又奏為奏聞事竊查廣東歷年審題盜犯䝉聖祖仁皇帝好生之德每案止將為首及下手殺人者一二人正法餘俱減等發往和朴多烏蘭古木地方安插嗣准部文俟修站完日發遣現在候遣之林㑹邦等計共一百二十九名今奉恩詔普頒應行赦免業經彚叙各案應免人犯姓名㑹疏具題惟是此輩俱係劫財殺人凶惡之徒而廣東邉海將現在盜犯一百二十九名各割斷懶筋一隻使其不能跑走即終身不能為盜既全其生命復制其凶性覺恩法兩盡臣等為弭盜安民起見不得不因地制宜斟酌其問然與赦欵不符理合奏明伏乞聖恩寬宥謹奏覽爾等此奏朕深嘉之果與民生有益因地制宜於例欵之中斟酌損益只管請㫖施行但須一切無隱披露肝膈上下同心合德內外何施不當不特此也即一切水旱豐歉之奏總以據實不欺為期凡係為兆民興利除弊之事爾等其共勉之雍正元年五月十三日兩廣總督臣楊琳謹奏為奏報早禾收成米糧價值事竊廣東地方春夏雨水霑足早禾較往年茂盛現在將次收割高低田地俱有十分收成米價廣潮惠三府粗細二種每石九錢八錢不等肇南韶三府每石八錢七錢不等髙廉雷瓊四府每石七錢六錢五分不等廣西早禾亦屬茂盛節氣稍遲尚未收割恭逢皇上御極之初禾榖豐登自屬萬年太平之兆臣曷勝慶幸為此具摺奏聞謹奏覽收穫米價情形甚慰朕懷但毋仍前粉飾以慰恱朕念至爾所奏兩摺俱甚公當咸與輿論相符朕深為嘉恱年希堯馮毅二人何如爾其據實直陳若少存一毫私意年則堯豈非一榜樣耶同日又奏為奏報盜首全獲事竊廣東開平新㑹兩縣接壤山僻地方有盜首張祖珠等糾夥搶掠村莊臣等公同遣兵擒拏先獲盜首張祖珠許三捷李亞同三名盜夥三十餘名未獲盜首張亞長等五名俟全獲日㑹審明白擬將為首及動手傷人者請出王命斬首示衆其次隨從者割斷兩隻懶筋使成殘疾業經具摺請㫖今盜首張亞長等五名俱已全獲又獲夥盜七十三名拒捕殺傷一十五名連前共獲盜首八名盜夥一百零四名殺傷一十五名奸民震懾地方寧靜臣等現在公同審理分别等次恭候前摺御批回日遵行所有盜首全獲緣由謹具摺奏聞謹奏賊盜迅速就擒地方人心為之一暢甚好朕訪詢他處類此等者咸巳淨盡矣勉之爾察兵辨中如有格外出色用力者或犒賞勉勵或越銜題補抑或奏請議叙以示鼓舞庶將來遇事人更踴躍樂從其平常盡職者可以不必倘若借此少冇假公濟私之處則反為不美矣特諭雍正元年六月十二日兩廣總督臣楊琳署廣東巡撫臣年希堯謹奏為奏請補授都司逰擊事竊照廣東掌印都司管理通省屯衛甚屬緊要都司李馪以病乞休業經具題查有撫標中軍逰擊陳君榮年力强壯辦事明白堪以補授其中軍逰擊為撫標兩營領袖查有廣州左衛守備范宗堯辦事明敏拏賊緝私甚屬勤勞堪以補授理合㑹摺奏請可否出自聖裁謹奏照依楊琳年希堯所請補授該部知道雍正元年七月初九日兩廣總督臣楊琳署廣東巡撫臣年希堯廣東提督臣馮毅謹奏為奏報發落盜犯事臣等拏獲盜首張祖珠等八名盜夥一百零四名臣等復經奏聞于本年六月初八日奉到御批值六月停刑例應七月初八日立秋後處决內除盜首許三捷梁三公二名盜夥陳阿寶等十一名陸續病故外其餘現犯臣等㑹審眀白將盜首張祖珠等六名并下手傷人之潘阿帶黃阿三二名積盜吳隆盛梁阿四梁文彩張長腰袁文瑞李左吾張得勝馮王榮等八名於七月初九日請出王命押赴市曹正法盜夥文阿盛等八十三名各割斷懶筋兩隻押回追贓給主將正法割筋等犯現在刋刻告示遍行曉諭使奸民知有畏懼所有發落過盜犯名數日期理合奏報謹奏知道了爾等遵㫖回奏一摺留覽爾等粵省兵不訓練營伍廢弛巳極接諭惟以皇上明照萬里臣等不勝感懼二語覆奏於事亦復何益况汝三人非他人可比從此若不改革舊習朕必將汝三人先置于法然後方及他省廢弛武備之罪較之貪婪之罪更重也廣東之兵縱十分用心訓練恐未必及他省三分功效何况彼此貪圗安逸漫不經心耶豈有將封疆重任寄託爾等一任爾等歌兒舞女賦詩飲酒以快樂之理即爾等於心忍乎既身膺重任勤勞二字斯須不可少離貪圗一刻安逸即荒廢一刻事務公而勤乃居官之根本若不耐勞瘁至於曠官廢職反不如辭職閒散以圗受用矣極當加勉加慎毋辜負朕恩李英貴佟吉圖皆係榜樣王法無親朕今日此身非當日雍親王可比爾等其互相勸戒勉勵成全朕之顔靣如或不遵訓諭致朕一愧一恨則爾等恐領罪不起勉之兩廣總督臣楊琳謹奏為奏請因才補用事竊照臣標前營參將趙武患病乞休經臣具疏題報員缺應聽部推補但臣標有應援兩省之責必得歷練勤慎之員方克勝任况廣東匪類素多稽查督緝實需能員今查有原任廣東開平縣知縣陳還原係福建臺灣投誠撥入正白旗中文進士除授開平縣知縣歷俸十四年因丁母憂離任於風土民情最所熟悉臣素知其曉暢營務兼識海洋水性若以陳還補授督標前營參將遇有水陸盜賊竊發委令帶兵擒捕必能奏功臣亦可收臂指之效臣仰體皇上立賢無方因才器使至意用敢冒昧奏請可否出自皇上特恩謹奏陳還著照楊琳所請補授其王聨候廣西參將缺出另行補用該部知道雍正元年七月二十六日兩廣總督臣楊琳謹奏為奏聞事竊廣西提標營伍廢弛臣逺駐東省未能親往簡閲值奉㫖令簡賢能人員署理提督印務臣素知巡撫孔育珣留心公務隨移咨署理一靣具疏題明在案撫臣親詣栁州查點兵馬盡汰老弱募補精壯修理盔甲軍器肅然一新今䝉皇上特簡提督臣韓良輔左江鎮臣邉士偉俱將次到任二臣平日皆係留心營伍之員臣當戮力同心以仰副皇上慎重武備至意謹奏未奉朕㫖之前寧不當慮及耶然粵西遼逺未免鞭長莫及猶可原恕今止粵東一省之事爾其殫心料理毋懈郝玉麟係提臣中之優者候伊抵任共將通省兵馬加意訓練一切器械甲胄整頓齊備緝捕盜賊等務嚴行申飭爾等務須同心戮力以盡乃職若仍前怠忽莫謂朕之不爾寬容也非極加鼓舞振作一畨安望革除舊習慎勿藉諉年齒衰暮精力不足優游頥養自適而廢弛封疆之重務也勉之謹奏為敬陳籌海事宜事一察奸之宜加嚴密也從來外洋之匪類即內地之奸徒其始則潛通暗引逮其後遂鴟張而豕突矣臣于數日前接到家信知本年三月浙江平湖縣之泖湖地方聚有匪類𥪡旗狂橫地方官調嘉屬各邑汛兵助𠞰遂杳然無踪等語臣思泖湖逼近大海此輩非直歸於外洋即散伏於腹地日後內外鈎連伺便竊發深為可慮浙江如此閩粵可知臣愚仰請皇上敕下沿海各省督撫凡近海郡邑皆力行保甲十家牌之法如有靣生可疑踪跡叵測之人皆責成總甲里長不時查報地方官不時訪查究問以絶其源至附近島嶼及內地大山大川之險僻處所皆令添撥汛兵加意巡緝以防其相聚為匪凡出海船隻除商人水手仍令遵照定例開具姓名年貌連環保結赴地方官掛號驗放進口時查對相符者方准停泊此外不許夾帶一人違者從重治罪如有查無保結未經掛號者各海口一概嚴禁不許放行地方官失於覺察者事發與本人一體從重治罪如此則彼此之勾引可絶而內外之盜源可清矣一海米臣請皇上敕下沿海督撫凡各海口皆令地方官嚴行查緝除實係商船具結掛號者酌給口糧此外粒米不許下海地方官查緝不嚴事發將販運者從重治罪地方官嚴加議處則盜糧絶而嘯聚難似亦籌海之一要策也一城垣之宜完葺也凡沿海各郡邑城池堡寨因本朝升平日久武備少弛無論堡寨蕩然即城垣亦多坍塌即以浙西而言海寧海鹽為濱海要地其城競可跨越則其餘可知矣萬一有事捍衛無憑為慮不小伏乞皇上敕下沿海督撫凡近海州邑城垣坍塌者皆令有人條奏此數事滿保處亦經分發一張爾與滿保密字酌議可否施行密摺奏聞如應具題即作爾二人意見具疏題奏若無益於地方可不必行亦密奏以聞無庸勉强隨順也特諭同日又奏為回奏事本年六月初八日奉到御批籌海事宜條陳一摺著臣與滿保密字商酌而行欽此遵即密字與閩浙督臣商酌去後臣謹就摺內三條逐一陳對一察奸之宜嚴密一條查從前原任福建督臣梁鼐條奏商漁船隻如出洋者十船編為一甲取具連環保結一船為匪餘船並坐等因又原任福建督臣范時崇條奏欲清盜源無過嚴查保甲嗣後將失察出口為盜沿海州縣等官俱挨次處分等因又原任鎮海將軍馬三竒題令各省督撫提鎮嚴飭地方文武官辨於沿海口岸及內地所屬地方遍行查緝按季出結送部等因奉㫖各通行在案查洋盜向惟廣東福建為多廣東洋盜又多在潮州惠州二府臣自任巡撫總督于潮惠二府口岸盤察尤嚴各澳大小船隻俱行編甲五十六年臣復題准每年派出總兵副將帶領將辨分路統巡兩班輪流更替又將商船設立聨䑸護送之法奸民知貨船難劫無所覬覦福建亦查察甚嚴近來閩粵兩省洋靣失事較從前已少至於無海關稅單貨物者不許出入其附近島嶼險僻處所不時遣撥官兵遊巡今惟有嚴飭沿海文武遵照成例實力奉行一海米之宜嚴禁一條奉有御批竊查康熙五十六年臣在京陛見時會同九卿於禁止南洋案內定議一切出洋船隻按其海道逺近船內人數停泊發貨日期每人每日准帶食米一升餘米一升以防風信阻滯出口時文武官逐一驗明放行如有多帶米糧貨賣者查出將米入官賣米之人處絞文武官隱匿不報事發從重治罪等因立法巳為嚴密臣於回任後復行令沿海州縣將商船所帶口糧設立用印米票船戶赴守口營汛驗對符合始許出口其漁船則朝出暮歸每人止許帶米一升半又於潮州緊要海口委員專司查米按季更換今奉諭㫖臣惟有再加申飭實力稽查一城郭之宜完葺一條奉有御批竊查近海城垣臣素所留心五十六年臣奉㫖查勘添設沿海炮臺將向設營制未建城垣之前山寨虎門寨逹濠營三處各新築城垣一座於修造炮臺案內彚疏題報其餘舊有殘缺者倡率陛續修葺不敢動用正項亦不敢派纍百姓力之所能即因時制宜倘果有工程浩大力所不能者臨時㑹同撫臣斟酌請㫖遵行以上三條臣接准滿保密字與臣意見相同其原有定例者實力整頓不致法久廢弛或有因地因時應行更易者一靣酌行一靣請㫖總期弭盜安民仰副皇上綏靖海疆至意是否有當伏乞聖主指示施行謹奏聖祖數十年來所立一切法度紀綱何一事不盡善盡美皆緣爾等大吏負恩虛誑怠忽從事日甚一日武備吏治馴至不可問矣朕之諄諄朂勉爾等者正為此日久廢弛之故耳若欲於皇考六十年德政之外另有施設不但朕躬不能即求之往古來今恐亦未必更有竒謀異策也在皇考當日以為爾等封疆大吏自皆人心人靣何忍孤恩而不拳拳遵奉豈知爾等暫時唯諾行一文檄出一告示即謂已盡奉行之職不但日久廢弛即起初亦何曾實力遵奉今朕不過將皇考所行之政所立之法再宣諭爾等一次爾等若仍似康熙年問之奉行恐朕未必能如皇考之寬仁容恕也身家性命當再三留心保全要緊朕在此自晨至暮刻無寧晷辦理萬幾爾等亦何忍優游逸豫徜徉於衙署耶君臣彼此當不惜氣力振作惕勵一番必行之三五年之久方可挽回頽俗否則不能望有功效朕自即位以來殊不見爾有興利除弊之舉自茲以往若仍然以因循為安靜以隱飾為愛君以納賄為要務以賣法為巧宦則既負皇考之恩於前又負朕恩於後一負而再負二罪俱罰恐爾等噬臍莫及也勉之慎之雍正元年八月初五日兩廣總督臣楊琳廣東巡撫臣年希堯謹左翼三鎮總兵俱未到任右翼潮州高州三鎮總兵俱奉㫖赴京其副都統蔡瑜現署將軍印務惟副都統吳成龍職任清閒當將提督印務咨委暫行署理伏乞皇上速簡賢能補授則海疆實有裨益為此具摺奏聞謹奏知道了已將郝玉麟補授矣洵可謂提臣中之出色者爾等當和衷辦理一切慎毋似日前因循從事也雍正元年八月二十三日兩廣總督臣楊琳謹奏為奏請更替管理鹽務事竊兩廣鹽課積缺九十一萬餘兩經臣定議分限五年帶完已經完過銀七十四萬二千餘百兩尚有雍正元年應帶完舊缺銀一十六萬八千兩亦將次徴收及半務在依期報竣外查自康熙五十八年起至雍正元年十二月原題五年帶徴之限巳滿現在預行題眀請㫖更替但兩廣向無大本商人引繁課重若更易鹽差一年一換恐舊缺雖完不數年間積缺如故臣駐劄之肇慶為兩省適中之地所以設立總督衙門彈壓節制臣因管理鹽務住省時多未免難於兼顧惟巡撫衙門原駐省城盤鹽收餉可以就近料理應請自雍正二年起將鹽務交與巡撫年希堯經管俟章程久定請㫖另設專差庶不致如從前之積纍拖缺矣再今年陸續發出鹽包恐嵗內收價不能齊全且未經限滿之前仍須發帑給養竈丁曬煎鹽包來嵗方能陸續運完歸還帑夲而各場羡餘亦須運鹽完畢方能徹底清出容臣協同巡撫管理半年撫臣專管新課臣清理帑項舊缺則半年內盡皆清楚矣臣受恩深重急欲趨覲天顔叩謝髙厚因經手鹽務未清不敢擅請俟來嵗清理半年即疏請奏請謹奏朕於管源忠赴粵時曾有諭爾之㫖當作何料理方於事有濟只管議奏粵省鹽務不宜專差御史現將閩省之鹽俱交與地方官矣爾等但將與國課商民均有益處商酌妥確奏請施行可也特諭同日又奏為回奏事臣齎摺人回奉到效不負委任至於操守現在謹飭廉靜後來或能出之員臣何敢匿不上聞合併奏明謹奏據奏惠士竒操守廉潔知道了才情可宜於吏治否爾其審視更奏以聞兩廣總督臣楊琳廣東巡撫臣年希堯謹奏為奏聞事竊本年廣東雨水充足早禾收成十分晚禾茂盛米糧平賤臣等各經奏報在案茲於七月十七八九等日潮州地方大雨數日兼江西福建諸山之水驟湧而至堤岸橋梁及沿河之房屋多有衝壞幸隨即消退又七月二十七日午刻起颶風大雨一晝夜沿海炮臺內營房百姓房屋多有吹壞戰船鹽船商漁船隻亦有被風浪擊損虎門副將劉沛等在洋巡哨幾致危險幸該副將等熟識水性砍去大桅方得駛入內澳保全惟大鵬營船船一隻從新安縣領載兵丁月米三百餘石回營在佛堂門遭風飄出外洋尚無下落現在行文沿海訪查至早禾先已收割晚禾亦俱無損間或有傷損者亦即補行栽插臣等現將堤岸橋梁營房戰船協力催修不日可以完固再沿海鹽場七月內兩次颶風潮湧存場之鹽多有衝沒亦有運載鹽船於中途被風浪沉失者現在盡力催收秋冬天色晴明自可補足此皆沿海地方年年常冇之事原非災異䝉皇上念切民瘼事無巨細不敢不以實奏為此具摺奏聞謹奏知道了凡事如此據實不隱方是爾等向日安逸已久今難辭煩勞矣靜極而動乃理之常不得不勉力者也同日又奏為欽奉上諭事雍正元年八月十六日兵部郎中圗理琛齎捧上諭到廣臣等恭迎至署叩首密拆恭讀即於本日同圗理琛并傳集在省司道齊赴布政司衙門公同開庫將銀箱點明計七百五十箱逐箱先開驗看隨即公同彈兊自十六日起至十九日四日之內兊完每日兊完之銀另貯一庫圗理琛標封封鎖共兊貯庫銀二百二十四萬九千零三十六兩六錢六分與册籍查核相符並無缺少內有關稅鹽餉銀兩比地丁成色微差詢之布政使王朝恩據稱向來俱係如此俱經圗理琛標封條封貯鎖鑰交與圗理琛暫收至日逐支放八旗緑旗兵馬糧餉臣等現催解鹽課關稅及各州縣地丁錢糧委糧驛道廖長齡㑹同布政使王朝恩查收支放其原盤過庫銀封貯不動恭候諭㫖批回方敢開支兵餉所有公同盤過藩庫錢糧情由理合具摺回奏伏乞聖裁謹奏今巳奏眀仍如常料理可也不必封貯雍正元年九月十五日兩廣總督臣楊琳謹奏為凛遵聖訓勉圗報效事夲年九月十四日奉到臣前同撫提二臣奏報發落盜犯一摺臣恭讀御批不禁汗流浹背伏念臣䝉皇上委以封疆重任破格保全若敢偷安圗樂不盡心公務不但國法難逃即天理亦所不容惟廣東風土柔軟人材單弱誠如聖諭廣東兵丁加十分訓練未必及他省三分功效臣於所屬將辨時時告誡操練兵馬整頓武備不敢憚勞而智識短淺心力不逮之處臣罪何辭今奉聖訓臣甚愧甚懼現在勤加操練不時考驗如有廢弛將備立即參處千把即行咨革務使兵丁練習營伍整肅仰副皇上誡勉至意所有感懼私𠂻凛遵奉行緣由理合回奏謹奏朕今諄切訓諭不啻至再至三倘仍循故轍陽奉隂違止草草出幾張告條塞責於事毫無益也誠能將地方事務如營謀家計一般時刻孜孜不倦辦去焉冇不奏功效之理限爾等三年後須還朕妥協二字爾目下所奏何足憑信朕亦難以考較總之務期實心實力奉行慎勿稍涉浮泛若不過似前所奏康熙某年曾經行過某年諭過又於某年復經察過日久不無奉行怠忽容臣等再加嚴飭云云因遂指天劃地發誓自明類此等支吾故套朕覽之熟矣竟可不必試思昔日雍親王即當今皇帝不以真心實行而接對之可乎三年限屆言行不符恐追悔莫及也勉之慎之同日又奏為恭繳上諭事本年九月十四日奉㫖為保甲社倉二事除保甲向巳舉行現遵㫖分别奬勵教誨嚴拏光棍刁民串通兵役貽害平民務收實效社倉一事現與撫臣商酌勸諭各府州縣徐徐行之務在不令生事擾民俟有成效另摺奏聞又奉㫖為安民之要首在戢盜雖各省皆然而廣東尤為第一要事務在報盜即行查拏隱諱嚴參治罪禁止捕役窩縱囑扳良民又奉㫖為操練兵馬謹嚴武備公拔把總尤臣總督職分所宜遵將皇上所訓臣者轉飭鎮協營將大小武辨交相勉勵整頓不負朝廷豢養𢎞恩所有奉到硃筆諭㫖三道敬録省惕一一遵奉理合具摺恭繳謹奏類斯利濟民生之事率皆皇考臨御六十年以來久已諭行之政其奈爾等大吏總皆視為泛常虛負聖恩可惜皇考諄諄誥誡一片苦心此朕數十年之所目擊情形深惡而痛恨者也今爾等設仍蹈前轍以欺隱為務恐未必能掩蔽朕之耳目也三尺臨身噬臍晚矣思之雍正元年九月二十四日兩廣總督臣楊琳謹奏為恭奉聖訓事夲年九月十八日將軍臣管源忠回任傳奉聖諭練兵緝盜謹嚴汛防諸事臣一一凛遵九月二十一日潮州鎮臣侯濚到粵又傳聖諭臣恭聽之下不勝悚惶之至伏念臣夲無一長荷䝉皇上姑容優待訓誨奬勵又慮及臣之子孫拔置上三旗破格保全天地父母之恩無以復加若不留心地方為朝廷出力即天理所不容廣東盜賊雖不能保其必無然舉發即拏輕則責令本處文武緝捕重則添撥鄰兵協擒且懸以重賞無有不就獲者近年原未盡題報在臣愚見謂與其題報審理曠日長久使得幸生不如審明情實罪當除其首惡治其黨羽立時完結使為匪者畏懼今惟有仰遵聖訓應參處者參處應發落者發落逐一奏聞又粵省武備現在竭力整理將皇上所以訓臣者抄發各鎮將共相戒勉如有廢弛虛冒即行題參至於廣東額設戰船俱係足數尚有額外捐設巡防者有溢無缺但定例戰船有小修大修拆造之年限係動正項錢糧此外每年遇有損壞者臣俱不敢動正項錢糧即為捐修補額至於題留年則堯就近補用此臣一時愚昧無知之處臣之所仰賴者惟在皇上矜憐曲宥曷敢稍萌鑽營之念自取罪戾今䝉聖訓益加凛遵省惕惟有鞠躬盡瘁以圗報答仰賴皇上開導指示得無貽誤臣之幸也所有奉到訓㫖緣由理合具摺陳明謹奏知道了凡百總須實心實行不在口中言語紙上文字如果實能改弦易轍公正清明勤慎奮勉朕之耳目自能鑒照勿謂粵東相隔遼逺爾等語默作息朕悉知之若望朕如聖祖皇帝從未一日居臣職純然煦育之寬仁斯大謬矣勉之慎之至爾歷任督撫政聲欲朕通盤概論許一好字不但不能恐反誤爾自新之路且辜朕容改之恩也顏子亞聖祗以不二過見稱可見亦不能無過惟以能改為貴耳爾等中材質地但能免下愚不移即為可取之人矣爾其勉之雍正元年十一月十六日廣東總督臣楊琳謹奏為回奏事夲年十月二十九日奉到臣奏學臣惠士竒清操摺內硃批遵查惠士竒校士公明臣深知灼見是以敢為奏聞臣與之共事三年觀其作用惟冇衡文乃其所長恐非吏治之長才也理合陳明謹奏如此據實直陳方是知道了同日又奏為奏報秋收分數米糧價值事廣東秋禾除雷州府屬之海康遂溪二縣因八月二十三日颶風大作海潮湧漲丈餘東洋塘一帶堤岸衝决田禾淹浸廬舍倒塌臣同撫臣一靣題報一靣委員查勘撫恤捐賑計鹹潮傷壞被災十分田地共八百四十五頃零當即捐建茅屋給與榖石使小民各得安生其蠲賦賑恤之處現經撫臣㑹疏題報再韶州府屬九十月間略覺乾旱髙田收成止有七分其餘各府州縣地方秋禾俱屬十分豐收米價每石粗米七錢細米八錢髙州與雷州相連未遭潮患收成更豐米價五六錢不等理合奏聞謹奏覽奏巳悉但不可稍存絲毫隱飾廣東總督臣楊琳廣東巡撫臣年希堯謹奏為遵㫖回奏事竊夲年九月十八日將軍臣管源忠回粵傳奉上諭鹽務歸地方官辦理不用商人銷運可行與否著該督撫商酌具奏欽此臣楊琳先因更替鹽政具摺請㫖遵候批示間於十月二十九日奉到硃批前管源忠赴粵時曾有諭爾之㫖當作何料理方於事有濟只管議奏粵省鹽務不宜專差御史現將閩省之鹽俱交與地方官矣爾等但將與國課商民均有益處商酌妥確奏請施行可也特諭欽此臣等公同細加商議查廣東鹽法除瓊州一府遍地産鹽向係就竈丁徴課不設引目外其餘各府産鹽地方所産之鹽則係於廣東廣西二省江西之南贑二府福建之汀州一府湖南之嘉桂八州縣共計一百六十餘處行銷每年課餉通共徴銀五十萬兩零向來設商行鹽有場商埠商之分場商養竈收鹽賣於埠商埠商納課買鹽行銷各地前因場商無力養竈不能收鹽埠商無鹽可運不能完餉以致積缺九十一萬餘兩自五十六年御史常保題請發帑收鹽臣楊琳議請捆徴舊缺近年課餉未缺舊缺亦漸次帶完矣再查福建新定鹽法將鹽院衙門各官及商人盡行裁革鹽課均攤各場交與州縣官照數收納平買平賣殊覺簡捷但廣東與福建相較地方逺近課餉多寡大相懸殊福建除臺灣一府外其行鹽止七府一州地方原屬無幾且於鹽場相隔不逺課餉僅止九萬餘兩就場攤徴委員平賣尚屬可行若廣東行鹽一百六十餘州縣場鹽必由海船運至內河再從水陸分運其間州縣離場地逺者二三千里不等盤費腳價多於正課若著各地方官赴場納課運鹽州縣官不諳鹽務者必委之家人衙役將鹽運至地頭非一任家人衙役設鋪分賣中飽花費即分發里地按戶勒派且州縣官納課運鹽不能自備資本勢必那動地丁錢糧鹽斤之銷售難定州縣官之事故交代不一恐鹽課未必能完而地丁之虧空日多似未便交與地方官行運如聽一應貿易人等赴場上納課餉任其擇地運銷則易銷之地人爭趨之難銷之地粒鹽不至民食大缺課餉無出而私販任意透越竟難稽查似又未便聽一應貿易人等自行銷賣再兩廣額定引目六十萬餘道內查廣東有二十餘州縣斷難完銷福建汀州八縣止長汀一縣可以兼銷其餘七縣或銷至六七分四五分而止約計每年必有十餘萬道引目不能銷完即空懸課餉四五萬兩除舊缺九十一萬餘兩巳歸捆徴引未行銷送部截毁外尚有商人歷年巳經完餉而鹽未運銷者共引目八十餘萬道計墊完課銀六十餘萬兩在商人顧其埠業年壓一年尚圗運銷歸本墊完課餉若地方官去留不定貿易人行止自由勢難作通融久長之計查課餉每年五十餘萬所關匪細商人近年課餉全完舊缺賠足尚屬急公今於舊缺將完之際盡行裁革似覺可憫䝉上諭將國課商民均有益處商酌妥當奏請施行仰見皇上天地為心萬物一體至意臣等細加商酌廣東鹽務課餉不缺全在收鹽充足若聽場商收鹽資本不繼必難多收應將場商停設仍發帑委官監收埠商仍留聼其完課運鹽內有課餉難完無人充商之地則著落地方官領鹽運銷解價完課更有引多壅積地方有可以代銷者聽其呈明代銷則國課不缺商民咸獲便利矣再發帑收鹽臣於康熙五十七年原題動支帑銀六萬兩每嵗除支發竈户巡丁工食船車水腳房厰器具代完場課賠補遭風失水之外計有羡餘五萬餘兩歷年充解軍需撥餉在案今臣等逐欵再加斟酌內將給發竈丁船户車運水腳等項按定輕重每包酌量加增自數毫數釐至一分不等以恤窮民其賣與埠商每包亦按原定價值輕重每包量加一二三分不等此所加銀兩除加給竈丁船户之外較從前可多得羡餘二萬兩每年總可得羡餘七萬餘兩不入正項之內或解京或就地撥餉臨時請㫖在竈丁船户等窮民每包多得數釐無不踴躍在商人有鹽配運即每包加增二三分亦所樂從此臣等就廣東地勢情形而言各省鹽法不得而知除將發帑收鹽商民有益之處㑹疏具題外巡鹽御史既奉㫖不設自應歸督撫管理臣等公同酌議臣年希堯有刑名錢榖事務並管粵海太平兩關恐難以兼理鹽務臣楊琳有地方兵馬責任今廣西既巳分轄鹽政上關國課暫當勉力并辦聽候聖裁臣等愚昧無知是否有當惟候聖主指示遵行謹奏此奏甚屬妥協巳發部議矣雍正元年十二月初六日廣東總督臣楊琳謹奏為奏報解部銀兩日期事竊廣東鹽課前奉部撥福建廣東雍正元年兵餉銀九十二萬兩巳經解足於本年十一月二十三日又准戶部咨將康熙六十年奏銷實存鹽課銀三十二萬二千九百兩解部等因臣隨委員於封印前領解起程再廣東鹽課銀兩向來不能足色兼係零星小錠臣飭運使悉傾化足色元寶再解京錢糧例得支銷水腳銀兩臣亦不敢動用合併奏明謹奏知道了今日之戶部風清弊絶設猶不信姑營謀作用一試之同日又奏為恭繳硃批奏摺事本年十一月二十四日奉到硃批臣奏摺二件臣跪讀之下不禁感懼交集竊念外省大吏從前奉行事件原多草率塞責臣復何敢隱飾自皇上御極以來聖明逺照萬里嚴訓時頒臣戰兢惕勵刻刻在心力之所能整頓者無不勉力整頓實不敢仍蹈前轍今奉訓㫖惟有益加勤慎以期報答聖恩耳所有原奉硃批理合恭繳謹奏既自知當日奉行不力之愆何得前摺又有牽先扯後之奏身家性命四字保全破敗皆在爾等自為之也朕於其中並無成見廣撫之任甚屬緊要朕看年希堯童心猶未退一切事糊塗而又尚氣任性爾其據實奏聞毋存一毫情靣代伊受過如於地方無所濟益朕另有賢員更換似此孤恩無用之物何可姑容之耶硃批諭㫖卷十四
