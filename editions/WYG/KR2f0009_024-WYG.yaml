body:
  text: 欽定四庫全書硃批諭旨巻二十四上硃批陳世倌奏摺雍正二年閏四月二十七日山東廵撫臣陳世倌謹奏為據實報明事竊臣以一介菲材膺封疆重任皇上之隆恩有加無已而臣心之悚惕日夕靡寧臣凛遵皆過完於二十三日至鄭家口遇淮揚大米糧船陸續相銜而至二十五日臣至清河縣之油坊聞許停泊至泰安州一帶地方蝗蝻臣聞陵縣知縣聞上慰懼之至臣謹奏覽雍正二年五月初六日山東廵撫臣陳世倌謹奏為遵旨具奏事臣於前月二十八日自臨清起行催趲糧艘本月初一日至東平州地方有江南鎮江寧國等幫船隻已過東昌府閘臣於次早聞署浙江布政使佟吉圖齎奉聖諭來省臣隨星馳回至濟南所奉挑濬運河諭旨一道東省漕米積弊一摺前任撫臣黃炳奏摺一封臣一一跪領訖臣看得山東運河在臨清以北者則資衛河之水接濟雖有淺處隨時撈挖昨漳河水發已可通行至閘河之内全資汶水接濟閘内河身毎年一小挑間年一大挑現在已不至淤以東八閘全恃微山湖水接濟聞年來湖水甚細臣於河務未諳容臣親詢河湖御史須洲再為奏聞至黃炳所發錢糧作何開銷及奏摺内事件容臣一一詳查據實覆奏臣前過徳州時訪問糧道賀有章居官之處據民聞其滋陽令劉國英貪婪不法誠如奏至東昌府一帶蝗蝻臣遣官查勘據稱清平博平即馳赴濟寧一帶督催漕運合併奏明臣謹奏今漕運現無阻滯爾不必親往督催矣捕蝗緊要亟宜嚴督所屬毋遺餘孽為期雍正二年五月二十六日山東廵撫臣陳世倌謹奏為恭報領奉御書扁額事本年五月十七日臣在濟寧州地方家人齎捧御書泰山廟碧霞元君扁額二幅到臣隨恭設香案叩頭祇領即送至濟南精選良工敬謹鐫製俟鐫製工竣臣親詣泰山齋沐恭懸另行繕本奏報合先具摺奏聞臣謹奏山川明神為天地正氣之所藴結必當恭承恪奉絲毫不可慢忽然徒於在外之威儀上立脚以希求庇佑神不私也全頼一誠字為主爾既為封疆大吏闔省生民所繫試遵朕諭而體驗之始知此理不誣但愚俗之非禮敬信違道瀆媚其風又不可使之滋長此唯在爾黙㑹而已百凡過猶不及均屬未當也密之同日又奏為遵旨具奏事竊臣䝉皇上發下條奏東省漕弊一摺臣沿路詢問知漕項陋規各州縣多寡不一運丁需索亦各州縣不同州縣徵收斛面自加三四以至二斗五升不等又條奏内有旗丁漕米毎一千石止收五六百石餘皆折色一條臣詢州縣據云從前間有一千石内折米一百石者近年多不敢折惟潤耗米全折毎石折銀一兩五六錢席片一項毎船五十領毎領額徵銀一分後旗丁代買毎船給銀五兩漸加增至一百五六十兩不等至幫規名色運官書儀旗丁戲酌誠如條奏所云無州縣不有其糧道漕規前任佟世禄毎石加至六分賀有章到任革去止照舊規收受各州縣自四十兩起至五六百兩止數不畫一約計通省共銀一萬五千餘兩其餘雜費自印烙斛手以至承差皂役不下三十餘項欵項繁雜不可縷指總之有一衙門即有一衙門之規禮有一規禮即有一規禮之雜費積習相沿多歴年所臣沿途訪問得其大概先行覆奏臣請抵任後再加詳細查明請旨裁革至糧道賀有章聞其為人才具庸常亦曾裁禁陋規而不能嚴飭胥役約束旗丁其所收受止伊衙門漕規一項因裁去各州縣浮費一百五十餘兩故無甚狼藉聲名臣謹據實奏聞臣謹奏所奏詳悉亦且公當賀有章聲名既不至甚狼藉宜訓𨗳之令其改勉以觀後效同日又奏為恭謝天恩遵諭覆奏事竊臣叨沐殊恩至隆極厚未有涓埃報效兹復䝉特賜臣辟暑香串丹丸一篋齎捧到臣隨恭設香案望聖諭臣時已到濟寧見河水正長誠恐堤岸衝決隨一路查勘直至臺莊畧得大概另摺奏聞至各屬凡有蝗蝻之處臣遵奉聖諭即檄各府知府親往督捕務令盡絶餘孽毋損田禾茲據各州縣報有稱撲滅盡絶者有稱飛蝗往來不定現在撲打不致成災者臣未敢憑信即從㑹同河臣題報臣一面委魚臺縣知縣劉元勳星赴濟寧拏其皇上任用至意臣謹奏所奏俱悉同日又奏為查閲河工冒昧陳奏事臣於濟南府接奉聖諭隨起身前往催趲糧艘於茌平縣阻雨一日見河已發水未知沙灣堤岸若何隨於十二日繞至沙灣河水長七尺餘堤岸亦有衝刷之處隨飛檄夀張縣知縣親齎銀兩星夜赴工又檄布政使兖寧道迅速發銀給付河官許豐多備樁料以防不虞現在平穏可以上慰聖懷唯沙灣對岸一為沙河一為趙王河自開州曹州而來其上源甚逺至此㑹聚一處衝入運河而運五空橋一座原洩運河之漲入於鹽河若將沙河皇上睿慮周詳先事預防築堤蓄水諸法一一舉行更無可措一議唯彭口地方上㑹玉花泉諸水出以濟運挾沙而来兩岸壅積如山對岸設有三空橋使沙隨水流衝出橋外年來亦壅積甚高糧艘至此毎苦阻滯上年撫臣河臣㑹商移此口於北二百四十餘丈上築大壩攔塞舊河另開支河一道以避淤沙用意良善但上源流沙勢不能免而支河入運之處又折迤北七十餘丈方始入運臣愚以為水折則行緩而沙停且對岸無出沙之處恐停積運河之内若將支河口直出運河勢更湍急沙可隨行於支河對岸倣前人遺制築三空橋一座使沙衝入對岸湖内則運河無沙墊之虞再韓目未親睹冒昧陳奏伏候皇上聖裁再前任撫臣黃炳估修閘座二十五處橋心中垜一處添建閘一座臣沿河閲看有應急修者有應緩修者俱未領帑興工至幫築堤岸止東昌府屬之聊城博平堂邑三縣共領過銀九千九百九十八兩零現在修築其餘亦未領帑興工臣將此時河内水滿無從核估所修閘座丈尺物料工程亦須逐層核算而閘内裏石一層更須乘修築之際不時往來查閲方能責其實在若待工完後查勘則已修築完備難再拆驗估算不能確實臣意上年奉旨設立河湖御史衙門稽核工程是其專責可否交與親履河干不時稽核庶可兼顧無誤伏候皇上聖裁臣謹奏知道了雍正二年六月十六日山東廵撫臣陳世倌謹奏為報明事竊惟東省六郡仰頼我皇上誠敬格損田禾臣於五月二十七日閲河事竣即從臺莊起身往各屬親查督捕除泰安州知州古今譽膜之滋陽汶上濟寧州青州府屬之䝉隂沂水等各州縣飛蝗已盡但一經落下即生遺種一縣有二三處四五處蝻子生發不等現在竭力設法撲捕登萊青三府兼檄道員徐徳俶督察臣於本月十三日親查至紅花埠江南界上數十里方回目擊知該縣今日臣由李家莊至青州府一路查勘督捕即從青州府暫回臣署料理秋審事件至運河同知董廷柱臣訪知該員一切事務皆係伊兄董廷揆及用事家人劉進孝主持臣一面委員飛往濟寧搜查該員宦囊嚴挐伊兄董廷揆一面宻遣承差至清江浦嚴挐伊家人劉進孝今伊兄於濟寧即時挐住現在嚴禁查該員虧空河帑一萬八千餘兩兹搜察署内並無存下金銀器飾顯係伊兄預為運出所當奏聞請聞臣於十四日據兖州府知府詳報曲阜縣至聖廟於初九日被火焚燬臣另疏題報合併奏明臣謹奏猶幸五聖祠未燬已據孔傳鐸奏聞矣朕自另有諭旨雍正二年六月二十五日山東廵撫臣陳世倌謹奏為報明事竊查濟兖東青四府蝗蝻實已十去七八各州縣現貯所捕之蝗自數十石至數百餘石不等其未盡遺種現檄各府親督地方官弁盡力撲捕務使盡絶不致蔓延現今處處田禾十分茂盛濟兖東三府大米毎倉斗九分五釐至八分不等麥子毎倉斗一錢零五釐至一錢不等青州府小米毎倉斗七分五釐麥子毎倉斗亦七分五釐價值日平民皆樂業此皆我皇上敬天勤民億萬黎庶並䝉時和年豐之福臣以目擊者據實奏聞上慰聖懐臣謹奏覽奏深慰朕念頃聞四府蝗蝻於五月間忽有無數山雀飛來啄食殆盡等語果有此事乎今日髙其位奏稱松江地方忽見大陣蝗蟲飛集隨被烏鴉千萬成羣一時食盡無遺云云眞屬竒事據伊此奏比𩔖而觀則爾東省山雀啄蝗之説容或有之爾其確詢據實奏聞不可傅㑹賜爾御書扇一柄只須摺奏不必具本謝恩邇來因諸臣之摺奏繁多手不停批字畫較前潦草殊不如法雍正二年七月十一日山東廵撫臣陳世倌謹奏為據實陳明事竊臣於本月初八日至曲阜見聖廟之大成殿廡門樓寢殿及啓聖殿金絲堂盡燬惟崇聖祠僅隔一垣巍然獨存當此風雨震電烈熖焚熾之頃得以保全無恙實我皇上道法兼隆心源契合特舉自古以來未有之曠典天心黙佑特昭顯應臣仰瞻之下不勝神異部臣王景曾於初九日到縣擇於十二日恭行祭告逺近臣民無不感頌分收成臣督各屬撲捕蝗蝻不遺餘力但經過地方猶間有飛蝗乍起乍集未能全絶鄉民環繞臣題㕘臣謹奏凡地方上頑劣紳衿貢監之流宜嚴加約束毋邀虚譽而事姑息以滋長刁風亦將此旨傳諭呂文櫻令其甄別粃莠倘或遇有𩔖豫省之事朕不輕恕爾等也雍正二年七月二十三日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣接准部咨命臣查詢李樹徳借賑冒銷及流抵銀榖一案臣即檄調各員查詢據各州縣僉供康熈六十年奉文散賑六十一年陞院黃炳署布政司事於二月内行令各州縣備空印册二十本送司攢造賑册報部於各屬實賑外加開榖三四千及八九千石不等毎石折價銀三錢著令解司共計加榖四十一萬有零折價銀一十二萬三千餘兩俱各解訖是州縣已經解銀交司今又責令分賠極口稱寃臣隨傳李樹徳面質據稱當時因有一十三萬虧空未經題明署司回我趁此番賑濟令各州縣多開榖四十萬石便可完項我一時昬昧允了後來此十二萬多銀子是黃炳收的其實各州縣原不應賠等語臣質訊之下仰見我皇上至聖至明無微不照再詢李樹徳親戚八十餘人情愿正法等語臣不揣愚昧請將雍正元年散賑銀二十萬七千三百三十餘兩仍照部議著落李樹徳李元龍陶錦名下三分均賠其康熙六十年賑榖折銀二十四萬五千一百七十五兩零據各州縣及李樹徳俱稱前撫臣黃炳實收受浮開銀榖價銀二千五百六十九兩零部議令臣㑹同布部議著落李樹徳等賠補查各員現有未清之項自顧不遑請將已題未題無著流抵銀三十萬六及居官不好之張振偉滕永祥請俟審定確數追補李樹徳河工無著之項再已叅州縣中有將前至從前州縣中有現任他省將虧空留於後任者奏覽雍正二年八月初七日山東廵撫臣陳世倌謹奏為直陳徵漕積弊仰祈聖鑒事竊查各州縣徵收漕糧從前多有額外横徵淋尖踢斛及斛外餘米盡數收入又於席上先舖米一二斗然後用斛量收甚有不動斗斛論堆約估作米若干謂之估堆徵收既多起運弁丁亦因以挾制州縣多借名色肆行勒索即各衙門官役胥吏亦多索使費苛求無厭總皆出自民間種種弊端難以枚舉臣今傳糧道賀有章面議毎石額徵正耗米外加耗羨二斗俱依部頒斛斗平斛響盪斛外席上之米仍歸納户顆粒不許多收嗣後米若更賤則為量加米若價貴則為逓減如此則䂓條畫一弁丁官民俱各有所遵守但一百十九州縣衛所臣不能一一面諭惟明示曉諭俾遠近通知則姦胥不得舞弊而小民不致受困矣臣冒昧直陳伏乞皇上批示遵行再臣衙門舊有漕䂓節䂓三千二百兩臣已諭糧道革除合併聲明臣謹奏此等剔除舊弊之舉固屬善政但旗丁亦必令其足用方為兩全之道凡事不可過亦不可不及惟貴適中至一應陋䂓不合理者自當裁革其向來相沿日久而無大害者亦不得沽一時之名譽盡行除去致令地方上一切公用犒賞之需竟皆不能辦理殊非全美之䇿也賀有章才具庸常不宜於外任已有旨矣可與湯豫誠再加斟酌務使久逺可以遵循至百年而不易者䂓畫而措施之雍正二年八月二十四日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣奉命查詢李樹徳借賑冒銷及流抵銀榖一案繕摺恭請聖裁欽奉硃批到臣臣遵查康熙六十年賑榖折銀二十四萬五千一百七十五兩零除黃炳應還銀兩外尚有一十二萬二千一百七十五兩零自應於李樹徳名下追賠但李樹徳現有分賠雍正元年散賑銀兩又據供有應賠修閘及鹽案内銀兩再將此項著令賠補恐一時不能清完錢糧或致無著請照李樹徳所開居官不好之張振偉滕永祥及伊親戚名下共應追賠十一萬有零尚缺銀一萬二千餘兩應仍於李樹徳名下追賠仰祈臣查此二項俱係從前各州縣或因軍需運米賠駝等項幫貼或稱修理城垣戰船倉厫等項賠墊當時議將俸工捐補流抵交下今俸工奉旨停捐遂歸無著臣現在飭查容照案造册進呈御覽再臣摺奏請將兩項流抵無著銀兩於通省耗羨内彌補奉硃批如此彌補似覺過寛當再為斟酌即耗羨亦係百姓脂膏為現任各員之養亷則可豈可填補從前貪吏之虧缺欽此仰見我皇上愛養黎庶惠恤臣工勸亷懲貪大公至正臣祗遵聖諭輾轉思維如居官貪婪之李元龍等原著追賠即居官不好之張振偉等亦著追賠其餘同時散賑不致無著是否可行伏乞皇上批示再李樹徳幫捐親戚四十一人名單謹遵奉硃批恭呈李樹徳開出其餘尚有多員容臣查明繕摺宻奏諸旨定奪合併聲明臣謹奏覽雍正二年九月初四日山東廵撫臣陳世倌謹奏為直陳虧空實數懇恩展限奏銷事竊臣於陛辭日面奉聖諭山東虧空准臣到任為始三年補完欽此臣於六月二十一日到任即將厯年錢糧逐一清查通計該補銀五十七萬二千七百五十四兩零除陸續補完過流抵銀六萬七千六百六十五兩零實在虧空流抵共銀五十萬五千八十九兩零臣與布政使博爾多及各府知府㑹議以通省耗羨彌補統於三年内可以全完但自雍正元年并康熙六十年六十一年共三年錢糧經前任撫臣黃炳題請於今年一齊奏銷目下限期甚廹若據實糾㕘則一百四州縣中所存無幾若循照往例或揑報己完或開入民欠臣實不敢扶同欺㒺惟有仰籲皇上洪恩准臣展限一年先將未題之項補完於明年十月雍正元年二年康熙六十年六十一年錢糧一齊奏銷其已題流抵等項分別完欠注明册内統於雍正四年嵗底全完至耗羨一項毎年錢糧以三百萬兩為率耗羨向來各屬㕘差不齊今以加一八通算約可得銀五十四萬兩臣等㑹議以二十萬兩彌補虧空以二十萬兩為各官養㢘臣仰沐隆恩何敢復言及此但公捐犒賞等費事不容已臣請於此内約存銀二萬兩以􅍯支給藩臬兩司各一萬兩道府州縣官或六千四千至一千兩通計共二十萬兩餘一十四萬兩為起解添補及通省公費自此錢糧庶得盡行清楚而大小諸臣感被聖恩自無不竭誠効力以仰報高厚矣伏乞聖慈埀鑒臣謹奏分劃明晰俱屬妥協即照所議具本題奏雍正二年九月十二日山東廵撫臣陳世倌謹奏為遵旨奏明事竊臣前奉聖諭命臣宻訪邪教首惡一事臣查東省邪教有大成無為羅祖空子等名臣遣人輾轉相託餽以財物假意投教然後得其住址姓名隨即選差宻拏於魚臺縣拏得李萬禄於金鄉縣拏得張煥於單縣拏得王天保三人又滋陽縣監生鄭琮瑞單縣劉維翰曾任山西知縣俱因康熙四十四年告發邪教經前撫臣趙世顯審題結案維翰之父混名劉二逹確係邪教頭目今已物故維翰因以邪教牽連革職據供並不行教而踪跡尚未盡絶容臣確審再行奏聞總之此輩雖非大奸巨惡别有陰謀而左道惑民罪不得辭臣又訪得江南邳州五聖堂地方迤西半里有吳滔天者係羅祖教其人物故已五十餘年其妻亦故十有餘年而至今不塟逺近傳言金剛不壊伊夫婦忌日四方男婦多至其前焚香羅拜皇上宻諭江蘇撫臣嚴飭地方官查究至奉教男婦各皇上浩蕩之恩於無既矣臣謹奏覽同日又奏為敬陳末議仰祈聖鑒事竊惟左道惑民律有嚴禁但倡為邪教聚衆燒香引誘鄉愚律例既有明文地方自可查緝未有身為紳士實遵異端聲援固結濟惡害民如回教之甚者也查回教不敬天地不祀神祇不奉正朔不依節序另立宗主自為嵗年各府中多有崇祠廣宇名禮拜寺俗稱回回堂由來已久莫能禁絶所可惡者黨羽衆盛到處横行打降逞兇包娼窩盜屠牛剥羊無所不為一旦事發則合黨羣起不呼而集縁若輩教中既多同心協力而文武臣僚及衿監書役行舖中莫不皆有其人鄉民側目莫敢誰何臣愚以為仕宦各官旣受朝廷之禄即不宜狥邪黨之情衿監諸人己讀孔孟之書即不宜遵異端之教他若身充胥役承值公門飯舖歇店招接往來亦不得紏黨聚匪致生事端請嗣後出仕紳衿以及諸色人等槩令出教其甘心從教者不許混入仕籍應考充役開張店舖則不必驅逐而黨孤勢散庶不致固結難解其各處禮拜寺回回堂或悉令拆毁或改立書院或另祀明神似於地方實有禆益如果臣言可採伏乞皇上特頒奏此種回教之理原一無可取但其來已久且彼教亦不為華夏之所崇尚率皆鄙薄之即彼教中之稍有知識者十居六七若似有出於不得已之情從無平人入其教門之理由此觀之則彼之所謂教者亦不過止於此數非蔓延難量之事至彼之禮拜寺回回堂亦惟彼𩔖中敬奉而已何能惑衆所以自前代至今數百年以來未聞有所作為甚至跳梁不逞也奏中之論皆太過矣朕令汝等嚴禁新竒眩幻駭人動衆之事如僧道回回喇嘛等教其來已久有何害乎今無故欲一時改革禁除不但不能徒滋紛擾有是治理乎未知汝具何意見也同日又奏為欽奉上諭事竊臣准部咨奉諭旨將河南山東回空糧艘著交與催船官員於十月十五日前催過臨清闗方好欽此臣即檄各該道營衛都司備弁等員接遞嚴催并查明過闗船數去後兹據臨清闗報稱九月初三日以前回空漕船山東已過二百三十七隻河南及各省已過一千聞至漕船舵工水手奉旨清查什軍更換一事臣行令糧道等轉飭各衛所開具各屯軍姓名年貌籍貫具結報臣責令挑選分班輪流更換并令親交領運官驗明查收若有途中更換及脱逃等弊即令領運官申報以憑嚴提究處若衛所領運各官扶同揑報察出據實題叅交部議處其作何安插毋致失所之處容臣㑹聞臣謹奏知道了雍正二年九月十七日山東廵撫臣陳世倌謹奏為據實陳情懇賜解任赴審事竊臣接閲邸抄見摺奏黃叔琳案内有海寧陳氏之僕賖欠肉店價銀與店家爭毆黃叔琳不究陳僕之罪反責店家斃於杖下奉旨著將軍安泰佟吉圖從公嚴察審明具奏臣遠離家鄉耳目不及檢察深恐家人在外生事心竊疑慮近接家信始知黃叔琳杖斃之賀茂芳臣家人福夀從前曽與買酒角口係雍正元年四月内事時臣與臣弟世侃同扶父䘮正在臨清守閘至七月到家後查舊事始知始末臣兄弟輩以事雖己往家僕生釁不敢任縱稟奉母命將福夀等責逐至七十九嵗一生小心謹慎惟恐家人稍渉外事有干保臣自接信後魂夢飛越即勉力辦事而精神恍惚恐誤職守臣䝉皇上殊恩㧞擢自應竭蹷奉公何敢復及家門私事祇縁母子情殷兼以家人滋事不勝慚惶伏乞論既彰私情亦慰臣惟有奉母朝夕頂祝銜結隆恩於無盡而已臣謹奏覽奏爾大謬矣此事現在鞫訊是何原委尚未眀晰假若即係前案角口起釁審結自有定例不但家下僕人即親生之子亦難保其必遵約束竟不滋事也爾身任封疆若為此等事遂至精神恍惚因私而廢公噐量何其褊小黃叔琳自任浙撫以來大負朕恩種種不可枚舉朕經嚴諭數次竟無一字奏覆封還朕諭可惡之極今非專為此一事而發也雍正二年九月二十三日山東廵撫臣陳世倌謹奏為恭謝天恩事竊臣家人齎摺回曲阜䝉皇上賜臣哈密𤓰一圓臣恭設香案叩頭謝恩祗受訖臣因估計工程將竣於本月十三日自曲阜前赴南陽查勘湖堤又直抵臺莊兼勘閘座臣見河工各員實皆盡力誠如聖鑒查獨山湖堤臣同須洲逐節親閲簽驗因於運河西岸取土值糧艘回空南下一日之中掣拽浮橋題今再加查勘現在拆修加幫容臣另疏題覆其運河之水五尺有餘回空糧艘可以遄行惟彭口支河一處畧淺未免稍滯而現在並無停阻至前撫臣黃炳㑹同河臣所估應修閘􅚋堤岸共需銀二十七萬兩有零臣以為宜酌其緩急陸續興修今先將最坍陷者二閘今兖寧道一面備料一面核議令臣㑹商臣愚以為兵可百年不用不可一日無備今海晏河清礮臺誠為虛設而沿海防衞總宜嚴密議於緊要十九處所添兵廵哨以資保障其餘量減數名撥防緊要礮臺仍不必撤已將議稿咨覆鎮臣合並奏明臣謹奏沿海防衛所見甚是全在爾等文武大吏斟酌合宜籌畫盡善具題到日朕再為裁定耳吳襄所題部覆一摺留中矣雍正二年十月初一日山東廵撫臣陳世倌謹奏為報明事竊臣凜遵聖諭催趲回空糧艘務於十月十五日以前全數催過臨清臣分委各員逐節嚴催查自九月二十七日以前漕白兩船已過徳州者共四千三百三十一隻尚有未入東省船一千一百餘隻現在直隸靜海縣一帶地方臣謹據實奏明又九月二十九三十日俱皆得雨據兖州府附近州縣報有二三寸四五寸不等現在天氣連陰重雲四布諒各處俱得沾被合并奏聞臣謹奏據奏漕船已過十之七八當兹秋耕之後得值時雨沾潤土膏於來年麥禾均為有益朕心深慰同日又奏為敬效愚誠仰祈聖鑒事竊本年七月中海潮偶溢江浙沿海地方田禾不無稍損致厪宸衷即飭督撫諸臣發倉賑濟復特宣聖諭於河南山東二省各買米六萬石運交江蘇撫臣平糶仰見我皇上如天之仁已饑已溺之思時切次逺者轉運維艱若於一處採買恐價値一時昻貴臣分飭東兖二府所屬沿河一帶州縣酌量多寡分買復遴委府佐隨買隨收陸續運交俟各員買運報到臣不時奏皇上賑濟萬姓歡呼臣桑梓闗情接有臣母查氏家信念臣闔家感沐聖恩至隆極厚即捐糜頂踵無由仰報涓埃愿捐銀四萬兩以備賑濟現在家中措辦令臣弟世侃具呈交送藩庫令臣代奏臣不揣冒昧謹繕摺奏聞伏祈聖慈恩准施行臣謹奏此事俟浙撫具題到日再定爾等為地方紳宦遇此等事量力捐助公私兼濟亦屬通情順理之舉候朕另為斟酌雍正二年十月初四日山東廵撫臣陳世倌謹奏為恭承聖訓叩謝天恩事竊臣因家僕沽酒起釁一事仰籲聖慈容臣解任赴質䝉皇上聖諭指示臣跪讀之下且感且愧惶汗無地臣本不敢以家門私事妄干天聽祗縁臣母查氏年屆八旬一生小心畏愼今因家人角口渉入欽案年老膽怯驚憂無措臣聞信惶惑不覺一時恍惚器量褊小實如聖諭至臣職分所在一切應行事宜照常料理不敢以私廢公茲奉恩諭感極涕零臣惟有竭蹷供職勉矢公爾忘私之義而已臣謹望闕叩謝天恩臣謹奏此一案已據審明竟係爾家人之事黃叔琳如此負朕誠非人𩔖鹽案一事更屬可笑黃叔琳自貽伊戚固無足惜朕初登大寳斷不能為伊屈法寛宥誤用之咎朕實抱愧耳同日又奏為遵旨回奏事竊臣因戴思訥殉父一事㒺知大義冒昧請旌干瀆宸聽罪不容逭䝉皇上髙天厚地之恩不加嚴譴命臣明白回奏跪讀之下彌切悚惶謹將前後實情伏地奏聞縁思訥自㓜失母隨父在京未嘗一日暫離少年幸得科第舉動不免矜傲其學問文章原無表表出衆誠如聖諭一無可取但伊聞訃後一切身家貨利棄之度外伊父所有餘貲盡寄伊兄分撥妻子在旁漠不一顧惟決意欲隨父於地下自奉天回京即至呂祖祠籲禱期於夢中一見音容在寓或解佩刀或取腰繫屢欲自裁時學臣吳襄方舘其家委曲開𨗳不止一次是其愚性不解聞訃便決並非於舟中欲姦僕婦與臣妹角口始有此舉抵家兩月防之甚宻絶不復言迨扁舟謝唁僅隨三兩小童乘其不備自經舟次臣以揆之於禮雖未合宜而一片苦情實為可慘伏思聖朝加意節孝即不合例者亦得立祠因不揣愚昧妄為陳情若果有姦汙不孝之事不獨大失檢點且罪在欺㒺更無可逭臣雖至愚亦斷不敢出此祗因思訥身後家庭分産不均頻年搆怨臣妹與甥臣父現留養在蘇讒口騰謗情或有之但臣冒昧瀆奏罪實難辭伏乞皇上敕部議處臣不勝惶恐待罪之至臣謹奏此舉爾大誤矣向後凡𩔖斯等事其以此常加警惕更勿蹈輕率冒昧之咎他人何可倚恃惟當勉勵自修耳朕念爾祖父根基惜爾之才情故簡㧞而委任之然施恩雖在於朕而能承受與否則在爾自為之天難諶命靡常獲罪於天無所禱也慎之一字宜終身誦之毋間特諭雍正二年十月十五日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣凜遵聖諭將河南山東回空糧船於十月十五日前催過臨清闗臣隨嚴飭各員分路逐節挨催從前所過船隻已經具摺奏明今據臨清闗委員報稱各省回空尾幫船已於本月十三日全數過臨清訖通計過船五千零九隻臣仍委遊擊傅為斗等星夜催出東境趕赴新運所有尾幫全數過闗日期理合奏聞臣謹奏覽奏朕甚嘉悦此番催趲糧艘之兵弁察其最服勞奉公者當量加奬賞以鼓勵將來雍正二年十二月初一日山東廵撫臣陳世倌謹奏為恭報得雪日期事竊東省䝉皇上敬勤昭格雨𤾉時若十一月十七日省城得雪寸餘其濟南東昌兖州各府屬州縣俱報得雪相同又二十七日晚至二十八日同雲宻布灑雪繽紛臣委員四鄉查看各得雪三四寸又登州府所屬各州縣十一月初六初七及十一十二等日各報得雪四五寸不等而寧海州文登縣得雪至一二尺此誠來嵗豐稔之兆理合恭報上慰皇上宵旰勤民至意臣謹奏冬雪如此可謂應時之瑞但百凡只宜據實無隠若稍渉粉飾以圖迎合不特於國家治理毫無益處且令天下後世竊笑我君臣為何如耶勉之慎之雍正二年十二月初八日山東廵撫臣陳世倌謹奏為聖徳優容如天臣心慚感無地謹具摺奏謝天恩事竊臣家人生事一案因奉聖諭嚴切臣恐懼憂惕適調任布政使博爾多入京引見臣以同年舊好乞其代臣奏明惶恐負罪下情本屬愚昧私見兹博爾多傳諭䝉皇上聖慈曲賜保全令臣嗣後小心謹慎毋得妄行臣本一介昬愚毫無知識䝉皇上天恩數月之内自詞臣擢任封疆似此隆遇實出聖明特逹之知臣外任未諳屢蹈愆尤又䝉皇上時加訓諭格外矜全是臣之身命始終曲成皆頼聖主恩施臣萬不敢妄行自干嚴譴臣唯有勉竭駑駘捐糜頂踵以冀仰報髙厚之恩於萬一而已臣謹望闕叩謝天恩臣謹奏知道了實心敬信朕之訓誨而改過自新或冀善全始終若疑信兼半志慮不純恐將來噬臍莫及也今在禍福岐路之間在爾審擇而行之硃批諭旨巻二十四上欽定四庫全書硃批諭旨巻二十四中硃批陳世倌奏摺雍正三年正月二十一日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣接准部咨奉旨道府同知通判州縣等官有才幹素著亷潔自持者密封保奏二員仰見我皇上鑒別人材鼔勵官方之至意今查有招逺縣以知州管知縣事馮慶長原任雲南永平縣知縣以卓異薦舉臣觀其操守亷潔辧事勤敏魚臺縣知縣劉元勲遇事勇為不避勞苦操守俱好委係賢員謹據實保奏再查臣屬新分直隸知州各缺有人缺未宜者現在遵例遴員調補此二員係奉旨宻封保奏未敢遽題可否一併題補引見伏候皇上批示遵行臣謹奏應保奏者遵旨宻奏應題補者仍行題補兩不相妨也此奏是何意見殊不明晰雍正三年二月十五日山東廵撫臣陳世倌謹奏為恭報東省雨澤事竊山左各屬仰頼皇上福庇正月以來雖雨之大小不同通省俱已溥徧而二十三四兩日雨尤霑渥青萊登三府報得雨八寸有餘濟兖東三府報得雨四五寸不等現今小米毎倉石七錢及七錢五六分麥子毎倉石一兩零五六分不等所有雨澤均調民間樂業情形理合恭報上慰聖懐臣前奉諭旨催漕兵弁最服勞奉公者令臣量加奬賞臣隨查明催漕勤勞馬歩各兵俱照伊一月錢糧賞給深為鼓舞合并奏明臣謹奏據奏雨澤情形實慰朕懐更當懋勉吏治以敬迓天庥雍正三年三月二十八日山東廵撫臣陳世倌謹奏為遵旨議奏事竊臣䝉皇上發下條奏一摺為從前被災時百姓輕價所賣田土許其一年内回贖縁由奉旨令臣詳細籌畫與兩司秉公宻議具奏欽此臣去年到任時見有具呈請將被災時賣出之田准聽回贖臣恐復業窮民無田可耕俯仰何頼因查如有逃荒時賤賣田土除已造房屋墳墓者不許取贖外其餘准聽回贖臣通行未久即有賣田之人逃出未歸而他人冒贖者有數十年舊賣之産並非荒年所賣亦借端爭贖者且有田經轉賣輾轉回贖者姦徒唆訟因而訐告紛紛臣復經飭禁在案兹奉諭旨臣隨與兩司秉公宻議得山左田土典者可以回贖賣者向無回贖之事其被災時所賣之田現在定期聽其回贖至冬月即行停止似可無庸更定回贖之令復啓姦民爭訟之端臣等謹據實回奏伏乞聖鑒臣謹奏田土特令回贖殊啓争端條奏原不妥協爾等所議甚是當順民俗不可強更之也同日又奏竊查現任兖運同知楊三炯係浙江紹興府人乙酉科舉人熟諳河務才守俱優署嶧陽縣縣丞黃士瑞係江南淮安府人實心辦事甚屬勤勞查魚臺縣知縣劉元勲臣現題補濵州知州員缺候旨引見如䝉皇上簡用伏乞聖恩准以黃士瑞補授魚臺縣知縣員缺實於河漕有益再泇河通判胡琮聲名狼藉怨聲載道臣謹據實奏聞臣謹奏照該撫所請如楊三炯推陞他省員缺時著留山東對品補用黃士瑞補授魚臺縣知縣胡琮著革職該部知道同日又奏為奏聞事竊山左交春雨澤均調麥苖滋長經臣具摺奏報迨至二月中旬以後濟兖東三府屬雨澤稍缺同撲捕務盡其餘並未報有生蝻之處再沂水縣盜犯孔林等越獄一案除當時拏𫉬王四禿子一名外未𫉬者八名臣隨遴選幹捕給以重賞責令宻拏茲獲張四回子一名又獲盜首孔林一名其餘現在分差宻拏又孔林原案内有未獲逸盜三名今并拏獲王二保馬思全二名及别案有名大盜馬三一名俱發按察司研審具題外合并奏聞臣謹奏此數名大盜内查其情罪尤可惡者當指名另題立置重典雍正三年四月十五日山東廵撫臣陳世倌謹奏為聖敬感孚甘霖連沛事竊山左濟兖東三郡入夏以來雨澤愆期上煩聖心軫念竭誠祈禱天心昭格隨據報到兖州府屬之鄒縣陽榖東昌府屬之莘縣朝城觀城范縣萊州府屬之掖縣平度州登州府屬之黃縣俱於初三初四日各得雨二三寸不等膠州濮州日照福山各得雨四寸蓬萊得雨五寸十一日徳州臨清各報得雨三寸其濟南府省城一帶於十三日夜間自亥逹旦大雨透地四野霑足十四日復得大雨據近省之長清禹城齊河濟陽各報得雨五六寸不等此皆實由皇上誠敬感格天心黙佑俾耕作有資農民安業臣不勝慶幸俟各屬報到得雨分寸另行恭奏外所有省城一帶十三十四連得大雨縁由謹先奏聞上慰聖心臣謹奏知道了一切奏報祇宜據實若有纎芥隐諱即屬欺蔽也戒之雍正三年四月二十三日山東廵撫臣陳世倌謹奏為甘霖疊沛遵旨奏聞事竊山左各屬報得雨日期分寸經臣具摺恭報今又據濟南府屬之厯城平原鄒平青城臨邑徳平陵縣商河章邱齊東肥城長山淄川等十三縣各於四月十四五等日得雨三四五寸不等兖州府屬之滋陽曲阜陽榖東平汶上東阿平隂夀張寧陽魚臺金鄉等十一州縣各於四月十三四及十七等日得雨四五六寸不等東昌府屬之聊城冠縣莘縣邱縣舘陶茌平堂邑博平清平臨清高唐等十一州縣各於四月十三十七等日得雨三四六寸不等青州府屬之益都髙苑博興諸城䝉隂沂水臨淄等七縣各於四月十四五十八等日得雨二三五寸不等泰安州及所屬之萊蕪新泰長清等縣各於四月十四及十七八等日得雨二三五寸不等濵州及蒲臺陽信等縣各於四月十三日得雨二寸曹州濟寧州鉅野縣各於四月十七日得雨五寸以上報到得雨分寸雖多寡不同而甘霖連沛麥穗得以堅實秋禾皆可播種民情歡悦此皆皇上誠敬感孚所致再臣接准戶部咨文欽奉聖諭因山東三月内雨澤稍缺恐糧船淺阻臣即遵旨嚴飭文武官弁往來河干竭力催趲查今嵗重運漕船前據兖寧道報稱運河淺處已督令印河各官添築草壩設立挨排蓄水啓閉不致阻滯嗣得雨之後水勢添長浮送有餘共計南漕船隻過臺莊閘者至四月十六日己有二千三百一十七隻其餘銜尾遄行合并奏聞臣謹奏閲此奏大似粉飾之詞朕屢屢切諭諸凡惟宜據實直陳今仍如此是何意耶登萊道徐徳俶在爾屬員中其官聲究係何等也聞伊於封祭海神時恐龍神來朝隨有氷雹傷損禾稼因書龍王免朝四字以示之人言如此迂呆云云觀其舉止乖張莅任臨民必不妥協宻行確訪奏聞雍正三年四月二十九日山東廵撫臣陳世倌謹奏為遵旨奏明事竊臣據提塘康永泰禀稱奏事大人䨇全張文彬石麟傳旨著山東提塘寫字與廵撫問四月十七十八日有無得雨情形并蝗蝻如何之處具奏欽此仰見皇上宵旰焦勞無時不以民依為念臣查四月十七十八日各屬報到得雨者已於二十三日繕摺奏聞今又據兖州府屬之鄒縣等縣東昌府屬之濮州等州縣青州府屬之日照等縣萊州府屬之膠州等州縣濟寧州屬之鄆城沂州屬之郯城曹州屬之定陶等各縣俱報於十七十八等日得雨三四寸至五六寸不等其未經報到者俟到日另行奏聞再蝻子生發之處除莒州沂州郯城費縣滕縣陽信海豐七州縣臣已奏聞外又據東平汶上髙苑博興樂安夀光霑化蒲臺等八州縣報有蝻子生發一邑之中或有三四村莊或有零星畝段臣接報即委文武官弁馳往協同該地方官盡力撲捕現據報有已捕盡者有己捕至八九分六七分者大槩通省報有蝻子生發者十之一二臣嚴飭地方官親身督捕自不至蔓延為害謹據實奏聞臣謹奏知道了蝗蝻之害非旱澇可比確然可以人力勝之惟看捕之勤與惰耳加意嚴飭撲滅為期雍正三年五月十一日山東廵撫臣陳世倌謹奏為奏聞事竊山左雨水情形經臣節次具摺奏明今於五月初五日省城得雨二寸據濟南府屬之厯城徳州新城長山肥城禹城兖州府屬之東阿陽榖東昌府屬之聊城堂邑臨清茌平清平武城博平泰安州及所屬之長清各報得雨二三寸舘陶得雨四寸恩縣髙唐夏津得雨一寸濟寧州及青州府屬之益都各得雨五寸秋禾已種者皆滋潤透長未種者皆及時補種至二麥收成據各屬報到者濟南府屬新城臨邑長山各有六分青城七分青州府屬臨胊夀光各六分益都臨淄昌樂各七分髙苑博興䝉隂諸城樂安各八分莒州沂水日照各九分安邱十分泰安州所屬長清萊蕪各六分新泰七分武定州及所屬海豐陽信各七分濵州樂陵各六分其先報旱兖州府屬之平隂東昌府屬之范縣堂邑各有五六分俱勘不成災惟武城舘陶髙唐夏津邱縣并續報旱之徳州平原臨清冠縣各報二三分不等現在委員查勘其餘俟報到另行具奏再運河水勢各閘以内足資浮送惟武城舘陶臨清因衛水微弱各有淺阻臣隨委濟東道呉興業等嚴督該地方官并沿河文武各官立限挑浚深通務俾糧艘遄行再各屬原報蝻子生發之處據莒州郯城汶上各報撲捕已盡而登州府屬之萊陽萊州府屬之平度昌邑亦報有蝻子生發臣隨委員竭力撲捕倘有怠緩臣即指名題㕘此現在情形也伏念山左泰安州以北從前雨澤愆期上厪宸衷竭誠䖍禱嗣於四月十三至十八等日各屬申報此數日内得雨此實由我皇上誠敬感孚所致臣據各屬印文及委員禀報繕摺恭奏䝉硃批覽奏大似粉飾之詞朕屢屢切諭諸凡惟宜據實直陳今仍如此是何意耶欽此臣跪讀之下不勝感懼臣蒙皇上洪恩畀以封疆重任未能仰體聖心上感天和通省普慶豐稔臣罪已實難逭倘於君父之前少有粉飾臣罪且為天理所不容臣斷不敢出此臣惟有益加黽勉諸凡篤實以期仰報皇上任使洪恩合并奏明臣謹奏所奏俱悉凡封疆事宜一切雨𤾉情形全憑摺奏無隐朕一覽得以了然明白若務巧詐以朦混一時究其實終不能揜飾既為朕所深惡亦自蹈欺蔽之愆兩無益也同日又奏為遵旨具奏事竊沂水縣越獄盜犯孔林等一案臣將拏獲孔林張四回子並同案之逸盜王二保馬思全及本案無名之馬三等縁由具奏奉硃批諭旨此數名大盜内查其情罪尤可惡者當指名另題立置重典欽此今嚴訊各盜馬三在直𨽻屢次行刦又於寳坻越獄情由可惡己解往直𨽻督臣收審歸結孔林又於越嶽後屢次糾夥行刦與張四回子皆係有名積盜法應嚴處臣俱擬以立決梟示其越獄時先獲之王四秃子及續獲之逸盜王二保馬思全行刦亦不止一案應俱即正法以靖地方除繕疏具題并嚴緝逸盜外臣謹具摺奏明伏祈聖鑒臣謹奏知道了其未獲盜犯務令竭力捕緝毋致漏脱雍正三年五月二十日山東廵撫臣陳世倌謹奏為遵旨具奏事竊臣奉皇上硃批諭旨登萊道徐徳俶舉止乖張莅任臨民必不妥協宻行確訪奏聞欽此臣查徐徳俶係廪貢出身原任刑部尚書徐乾學之孫由雲南武定府知府經撫臣楊名時以卓異薦舉陞授今職雍正元年正月内到任其為人無甚學問而平日辦事尚屬勤慎臣遵旨宻加察訪四月初三日中書臣傅凱恭齎欽頒祝文香帛至萊州府適連日大風徐徳俶恐風不息不知何據云聞得凡使臣渡海齎奉御物在舟掛龍王免朝牌便風恬浪静遂與鎮臣黃元驤及中書臣傅凱説知書龍王免朝四字掛於供奉香帛公所確有其事臣謹據實奏聞伏祈聖鑒臣謹奏知道了俟秋冬暇時著徐徳俶來京引見朕自有鑒别也同日又奏為恪遵聖諭酌議具奏事竊臣蒙皇上發下條奏一摺為司府首領等員各給養亷銀兩縁由奉硃批此係田文鏡之奏朕之批諭發來爾與布蘭泰同看爾等前奏亦當斟酌田文鏡言朕論得理今不行矣宻之欽此臣謹奉聖諭宻同布蘭泰跪繹仰見我皇上至聖至明無事不籌其久逺臣等恪遵訓旨期於經費不致虛糜屬員各知感奮伏查臣等前奏司府首領及州縣佐貳雜職教官因各有俸理應奔走原未議給養亷今臣與布蘭泰酌議凡同知通判等員遇有差遣量事之輕重計程之逺近臨時給以盤費俾免周章其直𨽻州州同四員州判二員均有督緝之責毎員毎年各給銀二百兩資其費用再濟南府知府厯城縣知縣地當省㑹公務殷繁非外郡邑可比今酌加濟南府銀一千兩厯城縣銀五百兩庶繁簡有别至耗羨一項一切公務取給其中自宜慎節臣與布蘭泰身受皇上洪恩涓埃未効前奏臣與布政司衙門所存養亷銀兩非公捐犒賞萬不得已之事不敢擅動臣到任一年陸續支過銀一萬二千八百五十兩為運米往淮脚費并犒賞官兵吏役等項之用又臣衙門糧道䂓禮銀三千二百兩驛道䂓禮銀三千兩鹽道䂓禮銀三千兩臣令停送並未收用合并奏聞臣謹奏操守二字原信得及爾尚恐過於矯亷自矜耳同日又奏為奏聞事竊山左入夏以來雨水情形麥收分數據各屬報到者臣俱繕摺恭奏今又據濟兖東三府屬各州縣報於五月初五初九十四等日得雨二三寸及五六寸不等青萊登三府屬各州縣報於五月初五初六及初九初十等日連得雨四五寸及六七寸不等東三郡及泰安濟寧以南秋禾全種雨後暢茂豐稔可期西三郡内東昌及泰安以北秋禾未種植者亦現在補種至麥收分數濟南府屬俱有六七分惟徳州平原禹城止有三四分兖州府屬俱有六七分嶧縣八分東昌府屬之濮州六分聊城五分清平博平臨清等各州縣止二三分登州府屬有八九分福山縣十分萊州府屬有八九分即墨縣十分濟寧州屬之鄆城及曹州濱州俱各有六分沂州費縣各九分郯城縣十分武定州屬各七分通省麥收分數臣三次己全報矣再運河水勢各閘内足資浮送南漕船據報已過臺莊閘者四千六百餘隻過濟寧州者二千一百餘隻臣分委文武各員往來催趲俱可通行無阻惟臨清以北專藉衛河之水濟運今河南上游因水淺築壩蓄船下流更覺微弱漕船出閘以後未免遲滯臣現據兖寧道徐湛恩詳報移咨河南撫臣田文鏡副總河臣嵇曾筠開放輝縣五閘之水以濟漕運合并奏聞臣謹奏臨清以北漕艘稍覺遲滯朕已悉其情但河南亦出於不得已也此後諒可遄行無阻矣聞得齊河縣知縣王采兩耳重聽不能應對夫察吏安民乃爾督撫專責似此昏庸老邁之員置若罔聞貽誤地方是何意也明白回奏特諭雍正三年五月二十五日山東廵撫臣陳世倌謹奏為遵旨明白回奏事竊齊河縣知縣王采年老重聽蒙皇上硃批諭旨命臣明白回奏欽此伏念臣以謭劣菲材蒙皇上𢎞恩畀以封疆重任屬員賢否不能早為激揚以致上煩聖心臣跪繹之下惶悚無地查東省貪劣之員臣抵任後已陸續叅劾其年老衰邁如蓬萊髙苑等令臣現皆先後令其告休在案至齊河縣知縣王采係山西舉人年近七旬為人樸遫無文臣到任時王采即願告休臣因清查各州縣錢糧見王采年紀雖老而無虧空近因該縣有袁存子被人謀害一案王采審擬苖三為兇手濟南府知府覆訊苖三非係正兇臣現委員另審如果錯斷即行糾叅若非錯擬准其休致是以未經㕘奏今先以老邁題㕘但臣愚昧姑容咎實難逭謹據實回奏伏祈聖鑒再此外尚有數縣地處衝繁而該員才力不及者亦現在具題請旨降調合并聲明臣謹奏朕非欲爾等封疆大吏過於嚴刻也蓋恐漫無覺察致有疎忽耳毋得錯㑹朕意此奏又與魏廷珍相似也同日又奏為遵旨實陳事竊臣據布政使布蘭泰面稱伊條奏海疆營制口岸查船收税四事奉旨著與陳世倌黃元驤詳議宻奏再定欽此臣查登萊青三府僻處海隅距省較遠其設立水師戰船分防口岸臣見各屬員之際亦時加體訪但非目擊情形未敢輕奏近臺臣錢廷獻條奏海疆事宜奉上諭頒發海圖圖説臣准部咨即擬前往確勘定議題覆但地方遼廓往返約需兩月目下造報雍正二年并康熙六十六十一雍正元年錢糧奏銷冊籍及秋審各案件俱奉文於六月内具題期限甚廹暫在署料理核造事竣之日容臣馳往逐細勘明將布蘭泰條奏縁由面與鎮臣黃元驤詳議請旨定奪合先奏明再沿海各衛所奉部議覆應俱裁併現據各士民呈稱海濱要地歸併不便仍請留設又沿海扼要處所奉查應否添設礮位事闗重大俱須親勘方得確實合并奏明臣謹奏此等事件自應熟籌深計斟酌盡善然後見之施行何庸急遽為耶雍正三年六月初三日山東廵撫臣陳世倌謹奏為奏明事竊臣遵旨宻保招逺縣知縣馮慶長魚臺縣知縣劉元勲二員因現有應調直隸州缺此二員係宻封保奏未敢遽題隨將可否一并題補縁由具奏奉旨應保奏者遵旨宻奏應題補者仍行題補兩不相妨也此奏是何意見殊不明晰欽此查新分直隸各州缺有人未相宜者例應遴員調補臣愚以為馮慶長劉元勲二員洵稱勤敏應在遴選之内但既經宻保不敢復於調補州缺疏内遽列其名是以將可否一并題補之處聲明請旨今欽遵聖諭其應調直隸各州缺臣另選有堂邑縣知縣何多學陵縣知縣趙霖樂安縣知縣何天衢泗水縣知縣馬兆英四員現在具題乘此農忙停訟之時一面給咨令其赴部引見可否補授伏候皇上聖明鑒定臣謹奏既經宻保自當題補何云因經宻保不敢復調州缺此語朕實不解觀汝諸事昏憒錯亂竟無一毫主見東隨西就惟揣度朕諭輾轉迎合悉如此朕不敢復批示汝矣汝為闔省綱領諸務任汝提挈朕不過將意見指授於汝是則遵行設有不合處分剖奏覆原係君臣互相商酌求合乎至當而己若一惟仰頼於朕朕既未臨齊幸魯何由而洞徹汝山左情形纎悉無遺耶前者羅瞎子之事真成大笑話矣將無天奪汝魄乎同日又奏為請旨事竊查貴州按察使申大成借欠李樹徳銀一萬八千兩前准貴州撫臣毛文銓咨稱申大成請限五年自雍正三年起毎年完銀三千六百兩等情臣已具摺請旨今又准撫臣毛文銓咨稱申大成黔省無可措變將舊日親友借貸之項開單移臣分咨順天山西江南等處照數追解申大成仍一面遣人回籍變産陸續凑解等因移咨到臣伏查申大成請分作五年完解之處現在候旨今所開欠其中有無著落臣不能懸揣況分咨各省追抵臣亦未敢擅便合將原開印單一并奏聞恭請皇上批示遵行臣謹奏准其五年陸續湊解至於分咨各省追抵及移咨伊本省催解之處爾其審度而行總令無致逾限可也雍正三年六月十八日山東廵撫臣陳世倌謹奏為奏聞事竊臣奉皇上諭旨垂詢蝗蝻曽否捕絶欽此查今嵗山左各屬據報蝻子生發者僅十數州縣臣俱委員協力撲捕嗣據委員及該州縣陸續禀報並己捕盡惟五月間聞江南海州之駝峯防山沭陽縣一帶湖地皇上敬天勤民保赤誠求所致謹據實恭奏上慰後天氣晴霽水漸消涸田禾不致損壊再運河水𫝑汶衛並長漕艘遄行已過東昌者共四千二百餘隻過臨清閘者二千九百八十餘隻盡皆銜尾前進合并奏聞臣謹奏現今抵通船隻為雨所阻漕糧尚未入倉也雍正三年六月二十四日山東廵撫臣陳世倌謹奏為奏聞事竊臣已將秋禾雨水情形具摺奏聞今於六月二十一二等日據東平州報稱汶水陡𤼵由戴村壩分流直注鹽河宣􅂥不及以致村舍田禾被淹人民並無傷損臣隨委員星馳查勘并協同該州将被災貧民酌給銀榖資其僦居餬口毋致失所又據濟寕州報稱泗水洸河並漲漫溢民田又厯城齊河禹城茌平汶上髙唐等州縣各稱境内窪處被淹臣並委員查勘堵禦俟勘明果否成災另疏題報再本月初旬隂雨連綿十二三雖開霽數日而十八九日以來仍時降大雨各處山谿水漲沿途聞臣謹奏成災與否但祇據實上逹毋得絲毫欺隠同日又奏為仰體皇仁敬陳管見事欽惟我皇上如天好生惟恐愚民誤罹法網特命將鬭毆各條註明刋布曉諭外省秋審情實各犯又命垣臣三覆屢奉恩綸停决大哉皇仁同符覆載臣查東省今嵗秋審案件新舊共一百二起内擬緩決者共五十四名口臣按原招有自康熙五十一二年監候至今已厯十餘載雖情罪允當未敢盡行末減但既蒙寛貰而長繫圜扉將來秋審案件積久愈多伏查康熙四十五年十月内奉聖祖仁皇帝諭旨緩決人犯至三年者總屬不決何必只管監禁嗣後減等發落欽此經部議覆奉旨允行乃厯年朝審未經聲明題請我皇上慎重民命普天率土莫不共仰皇仁臣愚以為凡秋審案内擬緩決已過三年各犯請特頒聖諭敕令廷臣於㑹勘時酌其情罪輕重或別其年分久近有可寛減者請旨予以減等發落則囹圄空虛而祥刑有頌益戴皇上法外之仁於無盡矣臣冒昧妄陳是否可行伏祈聖鑒臣謹奏此等刑讞大典豈朕智慮所不到之事乎爾意不過欲摺奏後列之文集中以便沽名耳法外施仁似非爾等平常供職之廵撫所奏之事若果欲紀載將朕硃筆諭旨一併録入方可雍正三年七月十一日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣准部咨據溫文桂條奏疏濬平度州境内膠河縁由奉旨著臣查明具奏欽此臣因東三郡河道多淤委原任膠州知州馮景夏逐處查勘因并委馮景夏㑹同該地方官將此膠河詳細確勘今據稱平度州南鄉並非膠河温文桂所奏乃膠萊之運河也此河自膠州海口之麻灣入口經由平度髙宻昌邑三州縣地方至掖縣海倉口入海現丈得一百九十九里零係元時運糧之河中間有分水嶺形如龜背水至此東西分流不能合而為一今就地勢作兩截疏濬東半截計一十六處西半截六十五處河身窄淺止須増挑寛深惟掖縣海倉口乃全河洩水入海之處現今流沙壅積計長五里以致河水散漫無歸淹及地畝此處應加開掘俾河水暢流入海不致泛溢則村莊地畝均有裨益但須於三四月間無大北風捲潮入口之時施工為便此溫文桂條奏之河應行疏濬者也至膠河發源於膠州之鐵橛山外長城嶺南經由膠州境計五十七里有竒經髙宻縣境計九十六里有竒入於平度州南之膠萊運河此河患在上流寛濶下流窄狹而歸入膠萊運河之處淤淺不成河者四里有竒淤塞如平陸者一十五里有竒水無歸宿勢必散漫兼有百脈湖五龍河張魯河㑹流泛溢各州縣雖築堤堵塞而水之去路不通難免潰決今應將淺窄淤塞處所挑挖寛深引水歸河自無淹没之慮此温文桂條奏之所未及應并行疏濬者也通計兩河共估挑土一十四萬九千二百七十方臣擬於農隙舉行官備器具用民之力毎人日給食米一升先将兩河淤塞淺窄處所一律開通所有膠河疏濬有益縁由謹具摺請旨是否允當伏祈皇上批示遵行臣謹奏凡一切條奏地方事宜朕槩發與爾等督撫斟酌可否非朕所真知灼見必欲舉行之事也此所奏膠河如確乎有益則亟宜興工疏濬無益則止總在爾審定之耳同日又奏為恭請敕選興工吉期以光盛典事竊曲阜縣聖廟工程所需木植顔料等物非山左出産者臣接准部咨與兩司㑹商委都司鈕國璽等齎銀前徃江西湖廣江南採辦木植顔料桐油又委濟南府經厯夏禮賢前往江南購買架木並咨明工部在案其琉璃瓦石柱甎灰等項委泗水縣知縣馬兆英等相度地勢就曲阜近處建窑燒造開採委登萊青道徐徳俶兖州府知府吳闗杰監理今先據夏禮賢買到架木一萬二千餘根己抵宿遷地方月杪可逹濟寧便可搭架興工理合奏聞伏祈皇上敕下欽天監選擇啓土興工吉期以仰副聖主崇儒重道至意臣謹奏據該監選定八月十二日已時興工乃上吉之期爾其朂勉在事各員竭力趨赴以共襄盛典速竣厥工雍正三年八月初五日山東廵撫臣陳世倌謹奏為奏聞事竊臣因曹縣太行堤被黃水衝決親往查勘自曹縣四十里至太行堤衝斷三十餘丈地名魏家灣水由西南東明而來勢猶滔滔不止即擬堵築因上流蘭陽未經斷塞下流單縣地勢髙阜若此口堵築則夾堤之内上承黃流下無宣洩仍必潰堤而出堤之内外村莊勢必盡淹因暫緩興工俾潰堤之水入於舊黃河下歸南陽昭陽諸湖雖年久河身淤塞不能容受因而漫溢村莊然猶有河道可循得所歸宿現在己將衝斷處所先行裹鑲備齊椿料俟蘭陽斷流即便堵築河臣齊蘇勒己至蘭陽親督修築月堤臣勘至河南交界委標員前赴蘭陽據稱決口漸淤月堤四五日内完工等語臣發銀一千兩委守備許必榮協同黃河同知牟錝元等覘視蘭陽決口一閉積水消落即使興修臣部署己定因聖廟興工奉旨選定八月十二日吉期臣擬於初七日暫往曲阜料理至今嵗雨水過多各州縣衞所報水災者計五十餘處其間輕重不等率皆窪處被淹髙阜之區仍有收穫理合奏聞恭慰皇上軫念民依至意臣謹奏所奏情形俱悉蘭陽決口已據報合龍矣雍正三年九月十三日山東廵撫臣陳世倌謹奏為欽奉上諭事登州鎮臣黃元驤兖州鎮臣趙國瑛抵省傳旨令臣務將倉糧實在充足欽此臣跪聆之下仰見皇上時時以國計民生為念臣謹查東省銀榖厯年虧空纍纍流抵各項因循不結臣到任後逐一清查共虧空倉榖三十餘萬石若槩行劾叅通省幾無可留之員恐不能照數追完反於倉儲無益是以具奏請將通省耗羨彌補荷蒙聖慈俞允臣隨嚴催各屬另具單批同正項起解至八月内己補過京餉掛平銀二萬六千三百餘兩又現存司庫耗羨銀一十二萬八千三百餘兩今嵗登萊青三府仰頼皇上福庇秋成豐稔所有續查出虧空倉榖現催耗羨買補民借榖石勒追照數還倉但為數頗多恐一時不能全完請統於明年二三月内補足至濟兖東三府屬今嵗偶遭水澇其髙阜之區雖獲秋收然通邑合計未免歉薄現今被水處所一切新舊錢糧漕米漕項臣等悉心商議現在具疏仰籲聖慈分别緩徵其從前虧空倉榖暫緩採買免致市價増貴民欠榖石亦暫緩追以舒民力統容寛至來嵗秋成後照數補足如仍不完補立即㕘處究追則通省官民咸沐皇上天髙地厚之恩自必共相勉勵竭力還補務期倉儲充足以仰副皇上訓誡至意伏祈聖鑒臣謹奏何妨寛期完補但倉糧闗係重大究須如數存貯倉庾方不有名無實同日又奏為欽奉上諭事登州鎮臣黃元驤兖州鎮臣趙國瑛抵省欽傳聖諭臣等一一跪聆仰見皇上綏靖海疆保衞民生至意臣等因再四㑹商敬抒芻蕘管見數條伏祈聖鑒一沿海礮臺僻處虛設誠屬無益衝處礮臺須堅固寛敞方有實濟聖諭詳明無微不燭所有某係僻處應將礮位掣回某係衝處應將礮臺另造容臣黃元驤查明移㑹臣陳世倌飭地方官㑹同營員確估繪圖查核臣陳世倌臣布蘭泰臣董永芠將存餘銀兩陸續建造務期堅實其應造礮臺幾座毎年造過若干座之處據實奏聞一弭盜莫如嚴查保甲大族責成甲長嚴飭各屬照式編造文武各官協力嚴查不時廵閲倘有疎懈照闒茸例題叅議處一窩家照例定擬治罪外應先搜變家産賠贓并著落地保兩隣人等查察倘有窩盜之家舉首得實量予奬賞若狥隠不報事發之日隣保各枷號重責庶盜賊無從託足一地方官弁皆有戢盜安民責任何分彼疆此界嗣後文武官弁遇有兵役追趕盜賊至汛不即時協拏致有踈脱應按盜賊名數分别議處如兵役謊報希圖卸咎仍革責枷號嚴處庶到䖏皆有聲援盜賊不能遁逸一分遣標員彼此遊廵不得稍有懈怠臣等標下設有弁兵應各𣲖千把二員分路遊廵接應交替此往彼來彼出此入有能查獲響賊首盜者照例議叙若怠玩疎縱即行叅處至專汛各弁亦令彼此聨絡廵查其捕盜同知以下及典史等亦帶民壯㑹廵仍並委道員叅遊等督察其不竭力追拏盜賊者即分別題叅交部議處一行客在店失事宜著落店主賠償客商至晚投宿人力困乏全頼店家隄防乃漠不闗心或竟有通同引線者行客受害實甚嗣後遇有在店被盜責令店主先為賠償俟獲賊追贓補給其無力之家不能賠償者著協同兵役捕獲正賊之日始行釋放則店家自必加謹廵防盜風亦可少息以上數條臣等㑹同布政使布蘭泰按察使董永芠仰遵聖訓敬陳管見是否允當伏祈皇上批示遵行臣等謹奏所議前數欵皆無瑕疵可以見之施行惟店家賠償一欵若遇地方良吏公平處斷猶可不然恐爾青齊道上將無旅店矣雍正三年十一月十一日山東廵撫臣陳世倌謹奏為報明司庫錢糧併賑濟情由事竊據陞任布政使臣布蘭泰造送文冊印信到臣臣因布政司日有收發錢糧之事青州府知府李秉儉居官勤慎老成臣令其代管篆務稽查收放臣赴庫盤查據冊開應存銀一百四十八萬五千九十二兩零内有各營預支俸餉銀四萬五千六百六十兩零又發修河堤工料銀二萬一千二百四十兩零以上二項共除銀六萬六千九百三兩零其餘銀一百四十一萬八千一百八十九兩零俱實存在庫臣據李秉儉出具印結交送布蘭泰隨於三十日赴京陛見至被水五十一州縣蒙皇上軫念民依令臣等加意經理臣仰體皇仁酌量被災輕重次第發賑前己批委各道府大員監散今據布蘭泰册開共需銀四萬七千三百餘兩臣同各司道府共捐銀三萬八千四百九十二兩不敷銀八千八百二兩己動耗羨給發俟收餘耗補還但時己仲冬天氣沍寒及來春青黃不接之時窮民未免乏食臣已題請借領存倉米榖現在檄行各屬分别極貧次貧查造確册大口毎日借榖三合小口毎日借榖二合共計四個月極貧者先賑銀再借榖次貧者止借榖於十一月中旬及正月中旬分作兩次借領如有混冒侵扣將監賑官一并題㕘又濟南東昌二府被水較重恐存倉米榖不敷借領臣撥借兖寧道所存捐納監榖四萬石預備接濟仍動耗羨銀一萬兩發兖運同知楊三炯在滕嶧一帶豐收之處陸續買補還倉臣謹奏務使被水窮黎人人得沾實惠以仰副朕軫恤之念雍正三年十一月二十三日山東廵撫臣陳世倌謹奏為奏明事竊兖寧道徐湛恩奉旨陞授山東按察使仍管兖寧道事臣准部咨隨轉行欽遵在案但按察使管理通省刑名毎日各屬觧審人犯須隨時審理方免拖累而兖寧道管理通省河務凡有工程並須親厯估驗又有黃河在西南邉界一遇水發各工險要必須往來廵防少有漫溢坍損更須親駐河干相機堵築或東或西日無定處各屬觧審人犯若跟隨候審則不免拖累若在署守候則覊留日久勢難兼顧理合據實奏明伏祈皇上俯鑒著徐湛恩專司按察使之事其兖寧道務請旨另簡賢員分理方不致岐誤抑臣更有請者兖運同知楊三炯久在南工熟諳河務前任髙堰通判勤慎辦理經河臣齊蘇勒題補蒙皇上俯允補授今缺任事以來稽核工程整理堤岸才守俱優昨臣陛見曽經摺奏奉旨楊三炯遇有陞轉准於山東省對品補用今若以之補授兖寕道亦與河員題陞之例相符臣因河務需人冒昧陳奏可否補授出自聖恩臣謹奏此奏甚是布蘭泰亦經奏過按察使不便兼管河道事務朕另有旨雍正三年十二月十六日山東廵撫臣陳世倌謹奏為奏聞事竊臣於陛見時奏請修復安山南旺兩湖蒙皇上諭臣安山湖挑濬約需費若干南旺湖能否出水須相度再定兹臣㑹同學士臣何國宗等沿途測量安山湖現有積水止須修築圏堤不必更事挑濬南旺湖亦尚有出水之處可以逹運又戴村壩壩底樁木年久朽損壩石亦有坍卸應行修整經學士臣何國宗等㑹同河臣齊蘇勒及臣詳議現在㑹題此皆蒙皇上軫念漕運民生特命諸臣齎帶儀噐逐細測量始得確知水勢髙下酌定修築從此漕艘通行誠億萬載無疆之福今何國宗等將已勘之處先行繪圖定稿於十二日起聞再臨清闗税務厯來缺額唯藉臨倉耗羨彌補臣今嵗收過倉項正額七萬五千餘兩共收過耗銀一萬三千五百餘兩除補闗税七千餘兩又觧部添武珍等前往江南製造籐牌挑刀三百副分給臣標一百副登兖二標各一百副俾其演習純熟以壯軍威餘銀一千三百兩現在省城及徳州禹城林張四回子王四秃子臣己具題正法訖今又拏獲王六一名王化豹一名俱係有名積盜現在關再十一月十五日得有瑞雪已經奏聞今十二月十三四連日復得雪四寸麥根益覺滋潤明嵗豐稔可以預卜此皆我皇上敬勤昭格之所致也臣謹奏臘雪消蝗潤麥最為有益大慰朕懷硃批諭旨巻二十四中欽定四庫全書硃批諭旨巻二十四下硃批陳世倌奏摺雍正四年正月初六日山東廵撫臣陳世倌謹奏為欽奉上諭事竊臣准部咨欽奉聖諭著臣悉心詳查厯城等四十三州縣五衛所被水輕處其應徵漕糧仍照部議緩徵一半被水重者准其全緩欽此仰見聖恩浩蕩有加無已臣隨嚴飭布政司糧道一體欽遵并分委各道府星往確查臣查去秋被水各屬濟南東昌二府及武定州濱州所屬之海豐霑化二縣兖州府屬之東平州較重臣奉旨加意經理又蒙皇恩准借存倉米榖凡屬窮簷蔀屋莫不仰沐𢎞恩臣又恐隆冬窮民口食不周先於省城及徳州一帶設立粥厰煮賑已經奏聞在案續於聊城茌平髙唐恩縣臨清武城堂邑博平東平齊河等處一體煮賑并通飭豐收各屬如有被水貧民到境無論本省外省亦設粥厰賑濟俟春和分遣回籍務期仰體皇仁均沾實惠將來遵旨疏濬河道各得傭工贍養共慶安全數十州縣衞所億萬蒼黎感被皇上𢎞恩誠與天地同其廣大矣臣謹奏務令窮黎溥皆得所無一人向隅方愜朕懐舉凡可以安全保綏之術汝力所不逮第據實宻奏以聞去嵗各省俱慶豐稔惟直隸與山東歉收直隸料理甚妥諒未必有流亡至東省之民汝但能撫恤本省百姓不致流離失業則亦可以告無愧矣實力勉為之同日又奏為錫福自天感恩無地敬伸下悃叩謝天恩事竊臣蒙皇上髙天厚地之恩畀任封疆識見闇劣罪愆多端前因調補州缺及河夫幫貼二事臣不能仰承聖訓冒昧陳奏蒙皇上𢎞慈矜宥各降一級從寛留任正擬開印之時繕疏奏謝兹臣家人齎摺回署蒙天恩賜臣御書福字臣隨出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖臣何人斯膺兹異數傳為世寳敬選良工鈎摹製扁恭懸臣署福自天來恩同春至通省軍民均蒙皇上洪福五風十雨耕九餘三山陬海澨之間共慶昇平之福於無旣臣感激下悃理合繕摺叩謝天恩臣謹奏五風十雨之休徵全在爾等恪勤奉公調輯兵民撫綏地方有以感召之也雍正四年三月十六日山東廵撫臣陳世倌謹奏為奏聞事竊臣查得東省各屬舊河如馬頰徒駭鬲津諸河皆係九河故道年久淤塞水無歸宿輙致淹浸民田若疏濬流通則民田可以保衛且可洩運河之泛漲而去秋被淹貧民傭工得以度日是以上年十一月間具疏題明隨委員確估三月初一日繕摺奏聞一面通飭各屬於三月初四日興工十二日接到九卿公字以時屆三月農務正殷應停止此工俟學士何國宗等㑹勘再定今又蒙皇上特遣侍郎臣阿克敦員外郎臣富彌善來東再加商酌定議仰見我皇上聖慮周詳愛民如子惟恐停止工役貧民或致失所帝心廣運同於覆載臣於三月初一日具摺之後隨於初四日准學士臣何國宗等知㑹是月望間來東查勘等語待其到來會勘定議更屬周詳允協至各屬饑民疊荷皇恩賑恤至深極渥復蒙恩諭將老弱之民日給升合之資至麥熟停止民情感戴歡呼動地現在分别大小口逐日給錢其挑河夫役皆係各州縣本地人民易於散遣況借領米榖原至三月中旬目下所領工價更可餬口惟四月後距麥秋尚有月餘或實有貧民無計謀生者臣等自當加意經理酌賑銀米必不使至失所有負皇上愛養元元至意除侍郎臣阿克敦等定議回京復命外理合恭奏以慰聖懐臣謹奏再不料爾如此孟浪行事朕初猶未觧今阿克敦旋都奏朕始明爾此舉非顛狂而何似爾居心不誠之人遇事自必非過則不及也殊為可笑之極同日又奏為恭謝天恩事竊臣接家信知臣弟世侃姪源生若嵎均蒙皇上聖慈俯准部議納贖免罪臣捧閲之下不禁感激涕零隨恭設香案望闕叩頭謝恩訖伏念臣父子兄弟世受殊恩涓埃莫報臣罪愆多端疊蒙恩宥臣弟世侃身蹈重辟復蒙皇上曲賜矜全再造𢎞恩雖天覆地載無以逾聖澤之髙深臣刻骨銘肌莫罄微忱之感激合家長㓜子孫男婦惟有頂戴皇仁力圖報効於生生世世而已謹繕摺叩謝天恩伏祈聖鑒臣謹奏爾弟兄輩𩔖斯妄行不法干犯刑辟爾復如農忙開河之事舉行數件則可謂闔家長㓜刻骨銘肌報效於國家矣雍正四年四月初六日山東廵撫臣陳世倌謹奏為恭報甘霖普被仰慰聖懐事竊東省於三月十五日得雨二三寸而東兖一帶尚未溥遍臣於初二日自省起程㑹勘河道初四日抵東昌府沿途麥苖青葱繁茂正在望雨之時初四日甘雨宻降至初六日方止計得雨六寸有餘徧處霑足二麥豐收轉瞬可期且雲氣甚廣逺近人民羣頌我皇上仁愛萬民上孚蒼昊沛兹甘霖以惠農畝謹繕摺恭奏仰慰皇上勤民至意至各處老弱貧民復蒙皇恩賑濟臣與布政使張保酌議大口毎日給大制錢十文小口五文自三月十五日起至五月十五日止口食有資並皆得所臣所過村莊莫不歡呼環聚感頌天恩合并奏聞臣謹奏朕正在懸望東省雨信今覽此奏殊大慰朕懐也雍正四年四月二十日山東廵撫臣陳世倌謹奏為奏聞事竊東省於四月初四日得雨至初六日普徧霑足經臣繕摺奏聞初七日以後連日得雨二麥之繁茂者今已秀穗秋禾之已種者今已長發未種者皆已佈種齊全衛河於十四五等日長水一丈二尺至十六日即退二尺水勢漸平汶水向深四五尺不等今雨後約深一丈三四尺漕運通逹無阻至芝麻莊工程最為險要一有衝決匪止黃河一帶民田廬舍所闗兼有礙於漕運臣去嵗曽經面奏蒙皇上諭河臣齊蘇勒估計工料共銀一萬二千餘兩但估計在冬季水落之時今興工已屆春汛水勢漸長與所估埽面相平不得不加髙增寛以資堵禦且需柳十萬束而官園之柳不滿一萬東若責之奏知道了雍正四年五月初一日山東廵撫臣陳世倌謹奏為二麥指日登塲請及時購買以實積貯事竊東省各屬麥穗異常茂盛目下將屆收穫之期豐稔可必但民間毎不知撙節易於耗費兹秋禾雖皆滋茂而收成尚遠際此麥熟之時急宜購買以仰副我皇上慎重倉儲至意臣查各屬存倉米榖厯來虧空流抵未經補足亦有實借在民遇歉未經繳還今司庫收過從前出糶監榖銀及耗羨内已補榖價有發給州縣尚未報買還倉者有去年被淹難買存司未發者若必俟秋收買榖尚需數月莫若趁此二麥豐熟畧為變通檄飭各州縣將榖價先糴麥石貯倉其民欠米榖並准交麥抵算俟秋收後仍以麥易榖以為經久之計一轉移間倉儲得以預備而民欠亦得通融完納似於國計民生均有裨益至去秋被淹貧民蒙皇上天恩借給存倉米榖今亦聽其先將麥石繳還免致耗費此糴買麥石悉照民間市價斗斛公平交易不許短價强勒如有借端𣲖擾臣不時嚴㕘則弊端杜而輸將更易矣事闗積貯謹具摺奏聞伏祈皇上批示遵行臣謹奏覽奏朕甚嘉悦此事當題奏經部議覆令各省督撫悉知將來亦可法汝此舉通融辦理也具本時不必引旨今一面即行購買具題到日朕自照汝所請准行雍正四年六月十五日山東廵撫臣陳世倌謹奏為奏聞事竊東省各屬蒙皇上敬全過臨清北上臣查較上年又早一月此皆我皇上睿照周詳整飭漕運故兩年以來益加迅速臣現在聞臣謹奏知道了同日又奏為遵旨具奏事竊臣准吏部咨開奉旨掣得垣曲縣缺楊自欽係進士出身看來人去得著補授曹州知州行文與陳世倌試看若做官好令其摺奏欽此嗣據楊自欽申報於上年八月二十五日到任臣細加體察楊自欽為人雖稍拘執而操守廉潔凡遇差委不避勞苦往來屬邑芝麻莊催工儹料辦事頗勤謹遵旨據實奏覆伏祈聖鑒臣謹奏國家用人治理攸闗切毋專務迎合朕果有深知處豈復需爾等試看率皆向來一面不識之人於引見時觀其應對舉止及所奏之履厯畧具才情者朕偶或奬勵數語亦不過示鼓舞之一端耳即其人為朕所素知亦不能保其始終不渝全頼爾等秉公甄别據實奏聞也當領悉朕意雍正四年六月二十五日山東廵撫臣陳世倌謹奏為奏聞事竊東省二麥豐收臣業經題報在案至各屬秋禾遍處茂盛異常將來大有可期惟六月十二至十八連日隂雨時止時降十九水者仍無妨礙止有平原禹城一帶乃極窪聚水之區青州府屬山巒環繞水易停瀦民房田禾間有坍損幸此際方屆大暑節候正可補種臣已嚴飭地方官確查并勸農民及時補種晚榖雜糧以冀秋成現在天氣晴明水漸消涸人民樂業地方絶芝麻莊工程現今平穏理合奏聞仰慰皇上宵旰勤求至意臣謹奏斷不可髙興自得尤不可稍渉疎懈但盡我君臣一念誠敬靜聽上蒼之垂佑可也雍正四年七月初三日山東廵撫臣陳世倌謹奏為奏聞事竊臣因往沿海一帶查看衛所及税口情形於六月二十六日自省起程己厯濟南青州萊州三府地方目擊各種秋禾現俱秀穗茂盛異常惟鄒平長山縣境内前因隂雨連綿微被淹浸然通縣合計不過十之一二而時未立秋尚可補種蕎豆雜糧臣己嚴飭該縣履畝勸諭及時補種以冀秋成其餘各地方人民樂業共慶豐年謹將目擊情形據實奏聞仰慰皇上宵旰勤民至意臣謹奏據奏實慰朕懐但宜糾察庸劣朂勉循良尤宜於靖盜安民時時加意俾村氓得優游南畝婦子恬熙則自能上感天和也勉之同日又奏為奏明闗税贏餘銀兩事竊臨清鈔闗因當閘河之北口冬春二季凍河挑淺並無船隻往來而漕艘盛行之際沿途閘座啟閉稽阻以此商人經由者少税額厯來不足俱將臨倉米折耗羨補足起觧去秋及今夏河水充足商船湊泊據委員王協燦報稱自上年六月十六日起至今年六月十五日止一年期滿收得正税及分規耗羨飯錢共銀五萬九千一百九十四兩零内除觧部額税并銅觔水脚及各項雜費外共贏餘銀一萬二千三百七十五兩零現在備具文批同正額一併觧部理合據實奏聞至臨倉耗羨今嵗闗税有餘無庸撥補目下正在徵催俟奏銷時另行具奏合併聲明臣謹奏此為向來罕有之事朕自嘉汝之據實上逹不以今嵗為例也雍正四年七月二十日山東廵撫臣陳世倌謹奏為奏聞事竊臣接到部咨内開浙閩總督臣髙其倬奏請委員赴山東及江南之淮安所屬濵海州縣買麥運閩接濟縁由奉旨行文山東江南二省即遣能員協同辦理如髙其倬差員未到著該撫借支錢糧預為買備務令速發以濟閩省之用欽此仰見我皇上軫念民隠宵旰勤求酌盈劑虗之至意臣查東三郡重山複嶺運赴水次較難且本地商船寥寥無幾誠恐躭誤若於西三郡沿河一帶麥多之處上緊購買預先運至淮安俟閩省差員抵淮即并交付接收運回既免閩員逺渉往返而隨到隨運更覺迅速臣仰體聖心飛飭兖寧道督率沿河州縣星速買麥五萬石遴委同知通判等官僱船運送赴淮并咨㑹督臣髙其倬查照外理合奏聞臣謹奏辦事原貴通變庶無膠固之失此番料理殊屬可嘉知道了雍正四年八月初四日山東廵撫臣陳世倌登州總兵官臣黃元驤謹奏為敬陳採訪事宜仰祈睿鑒事竊前任布政使布蘭泰摺奏海疆四條欽奉硃批命臣與鎮臣黃元驤詳議宻奏欽此臣隨同黃元驤細加商確敬為我皇上陳之一奏稱兵船宜扼要廵防等語臣等㑹看得東省海洋北逹天津南通江浙對渡係盛京地方綿長二千餘里膠州向為南汛登州向為北汛康熙四十三年間始倣浙省船式打造趕繒船十隻現今逰擊守備各帶船五隻兵二百五十名分駐登膠二處毎年屆期出哨遊廵凡南來海船欲往膠州必先由靈山衛經過膠州近在内地設遇有警一時不能䇿應應如所奏將膠州水師船兵移駐靈山衞往來廵哨庻呼應更為迅㨗至北來海船未到成山衞先可直逹登州不可無水師䇿應且成山島洋面最險實難泊舟應將所奏登州水師移駐成山衛之處無庸議一奏稱海口宜分别堵決等語臣等㑹查得海口泊船地方俱在海水通流不致淺擱之處共海口七十四處内有商船停泊及魚筏出入現在抽税者計二十六處其餘各口大率潮至則水湧潮退即成平陸且有沿邉灣曲之處亦名海口而並無船筏出入若盡用樁橛堵塞近山則石脚嶙峋難以施工近水則浮沙虛鬆無從著力應將所奏樁橛堵塞之處無庸議一奏稱海舟宜給單查驗並照㑹彼處口岸查驗等語臣等㑹查得東省造船者甚少其採捕魚蝦俱紥木為筏並無篷桅不能遠渉外洋但出入之際稽察不可不嚴本地之裝載貨船臣世倌已經通飭各州縣給以印單務將客商並附載之人姓名及貨物名件賣貨地方同船户水手姓名一一開載聽各汛掛號查驗其魚筏編號向無人數及水手姓名年貌今應如所奏無論商船魚筏俱一一開載單上給領備驗再海舟行駛全憑風信所到口岸既有印單查驗無可朦混若必預先照㑹恐風潮岐誤應將所奏照㑹彼處口岸驗單之處無庸議一奏稱海口宜撥員抽税毎年約畧可増税銀一萬餘兩等語臣等㑹查得東省進口貨物原止有紙張磁器布疋棉花出口貨物亦止豆棗醃猪魚鮝居多並無大商洋貨今臣等酌議膠州萊陽二處向為商船起卸之所膠州海口應委萊州府監收萊陽海口應委登州府監收其餘各海口船筏無多抽税有限仍著地方官徵收各知府稽查總歸布政司查核造報向有文武各衙門分規應盡歸出以充公用但税䂓兩項出於船筏而船筏之多寡又視年嵗之豐歉其間盈絀實無一定之數臣等再三籌畫毎年抽税額數應照雍正四年二月户部議覆條奏各省地方官抽税之處除收過正額外將贏餘銀兩據實奏聞之例於毎年嵗底查明正額贏餘各數分析奏報如有欺隠立即題㕘則税課不致私肥矣以上四條臣等謹按陞任布政使布蘭泰原奏遵旨詳議謬叅管見是否允當伏乞聖明裁定批示另行具題臣等謹奏所奏甚屬妥協應題者具本題奏應報部者咨部存案雍正四年九月十八日山東廵撫臣陳世倌謹奏為恭謝天恩事竊臣家人齎摺回東䝉皇上天恩賜臣哈密𤓰一枚臣隨恭設香案望闕叩頭謝恩祗領訖伏念臣蒙皇上髙厚之恩畀任封疆毫無寸效愆尤日積屢沐聖慈矜宥兹復䝉皇恩優渥頒賜逺方異品臣跪受之下既感格外之殊榮益慚報稱之無地臣謹具摺叩謝天恩伏祈聖鑒臣謹奏覽爾奏謝知道了李樹徳借欠認賠一摺已發部議再者王之錡尤清二人雖其才可用然審觀其為人似非誠實可信者汝當留心察訪試驗而委用之毋因係朕特遣之人遂爾傾信恐將來或累及於汝況己有旨備汝屬員之用並非欽差也如稍露不妥當情形即便奏聞若令其鋪張日久則難以收束矣特諭雍正四年十月初六日山東廵撫臣陳世倌謹奏為聖主之施恩逾厚微臣之感激難名叩謝天恩敬伸下悃事竊臣母在籍病故遵例呈報丁憂奉重辟今䝉特恩將臣弟世侃釋放回家未完銀兩准其陸續交完仰沐皇仁矜恤周摯臣之不敢泣籲而仰冀者聖心己無不垂憐曲體聞命之下闔家男婦老㓜感戴天恩莫可名狀謹望闕叩頭謝恩臣於十月初四日接准部咨隨於是日將印信交布政使張保暫行署理初五日又准部咨奉旨命臣俟署撫臣塞楞額到任之後再起身回籍臣在省候塞楞額到日將東省事宜詳細面述臣即行起程臣回籍後何敢以私廢公遷延時日所有假題外特此恭摺叩謝天恩臣謹奏覽同日又奏為據實奏明事竊司庫錢糧凡屬正項俱由廵撫衙門掛號布政司兑收其捐解銀兩從前竟赴該司投收廵撫並不掛號無案可查是以司庫交代惟以新司冊結為憑上年十一月内張保到任後臣即飭其徹底清查今年二月内據張保詳送冊結内稱司庫錢糧俱已清楚並無混淆虧缺臣赴庫按册盤查果皆實貯遂據結具題在案迨六月内臣起身查勘海疆時據張保面禀從前各司收過厯年俸工銀兩其間支銷欵項多有無批案可據者臣聞之不勝疑駭該司先曽出結今豈容有絲毫不清遂面飭其即速查明確數以便聨銜㑹奏去後臣從海疆回署復經面催票催據稱欵項繁雜尚未查清直至九月十九日始據張保送冊三本并據詳稱業已繕摺奏明等語臣於二十日黎明即聞臣母之信現在候旨是以未便遽奏今䝉恩准臣回籍合將張保並不造報同奏情由據實奏聞至細查張保册内不獨博爾多任内支銷俸工有未詳明批案者從前程光珠任内支銷更多除將張保詳送原文原冊移送侍郎臣王沛憻㑹審外理合奏聞臣謹奏知道了此事與爾無渉便有批詳存案亦係被伊等朦混冒支究非爾自行支銷也但爾之待博爾多因係潛邸舊人於此等處一味曲狥俯就則誠有之天下人率苦不能喻朕之存心耳徐徐自當洞悉若以光天化日視朕則庶幾不謬外此頭頭是錯歩歩皆踐荆棘矣眼前分眀平易坦途多不肯行奈何同日又奏為奏聞事竊春間挑濬河道據布政使張保詳報發過銀八萬餘兩停工後各屬共解還銀六萬八千七百餘兩實用過銀一萬一千三百餘兩此疏濬河道臣原請於耗羨内補還工費今先將臨清倉九月十五日以前收過耗銀八千一百九十八兩零補還司庫其餘俟續收耗銀再補此項工程臣實冒昧舉行目今所挑河道即係春間所挑之河做過工程可以相抵臣不敢不據實奏聞伏祈聖恩准賜抵補則臣頂沐洪慈於無盡矣臣謹奏果係做過工程理應抵銷汝回任時將抵補情由具題可也此旨無庸引入雍正四年十一月十六日山東廵撫臣陳世倌謹奏為恭謝天恩事竊臣䝉皇上錫𩔖𢎞仁賜臣回籍以盡人子私情臣弟世侃又䝉特恩釋放回家髙厚𢎞施逾於覆載臣業經恭摺叩謝天恩兹臣姪源生若嵎復蒙洪恩一并釋放皇仁浩蕩有加無己雖天地之雨露父毋之愛育亦不能如聖恩之周摯淪浹也臣惟有竭盡心力共圖報稱於萬一謹繕摺叩謝天恩臣前恪遵諭旨候署撫臣塞楞額於十月十二日到任臣將東省事宜交明於十三日起身途次蘇州跪接硃批奏摺蒙聖諭仍令臣自行斟酌假限臣何人斯蒙皇上委曲矜恤至於此極臣不勝感激涕零臣於十一月初六日抵家現在竭蹷料理臣受此殊恩何敢遷延時日臣過百日後即遵旨星馳就道勉效犬馬微忱合并奏明臣謹奏不料爾等浙江人乃恩徳所不能感化者狼子野心聚於一方大竒更不料陳世倌如此負朕似此竭盡心力之報稱朕實不敢希望亦不敢復用爾輩此等忠良人物也殊為可愧雍正五年六月二十八日原任山東廵撫臣陳世倌謹奏為恭謝天恩事竊臣一介庸愚荷蒙皇上簡畀封疆兩年有餘罪愆叢積重負聖明委任殊恩惶懼愧悔日夕靡寕復承恩旨命臣管理江南水利事務凛奉聖諭勉臣以潔已朂臣以奉公訓示諄切感愧無地所有濫支供應一案革職允宜乃䝉皇上格外垂慈僅予降調聞命感激無能報效萬一惟有盡心竭力黽勉奉公以期仰副皇上訓誨至意縁在河工未敢詣天恩伏祈聖鑒至江南河工事宜劉河已經開竣逺近士民無不踴躍歡呼歌頌工郎中臣鄂禮已於六月十四日到蘇公同撫臣陳時夏悉心商確另行㑹奏請旨次第興修合并奏聞臣謹奏條陳一摺留中候發廷議雍正六年正月二十九日原任山東廵撫今革職臣陳世倌謹奏為恭謝天恩事雍正六年正月二十一日准署督臣范時繹咨准刑部咨奉旨陳世倌著革職從寛免其治罪仍在江南水利工程效力行走餘依議欽此相應移咨欽遵查照等因移咨到臣臣隨於舟次敬設香案望圖報效以期仰副皇上格外矜憐至意臣不勝感激悚慄之至謹具摺恭謝天恩伏祈聖鑒臣謹奏覽此奏若果出於至誠將來必有善應但恐亦屬紙上虛文耳同日又奏為據實奏聞事竊惟三吳水利闗係民依我皇上加惠元元特發帑金浚河建閘絲毫不費民財殊恩曠典千載一時所浚白茆孟瀆徳勝九曲各河及吳淞江西段四十餘里俱已次第完工其東叚一十八里現在續浚俟告竣之日臣等㑹疏題報七浦徐六涇福山塘長橋北河萬頃港互流港等處俱於本月十六日啟土興工但江南募夫情形與北方不同因江南農務少閒應役者寡不能不經里甲僱募而吳淞白茆兩河工程尤鉅毎日各須夫三萬人一縣不足供役歴來舊例浚吳淞則崑山嘉定青浦諸縣協幫浚白茆則太倉長洲崑山無錫江隂諸州縣協幫均屬水利霑溉之地刋載府縣志書今仍照例分募夫役既多毎夫十名須一夫頭總領往來照管炊爨飯食既不復任挑土之事而畚箕繩索草屨諸項勢須置買更易以及他縣應募之夫又有往來費用衆業户仰體皇仁量為幫貼以助窮民雜用使九錢一方之官價窮民得沾實惠此出衆業户自願並非勒派乃奸民蠧役乘機作弊亦間有之臣等於上年自蘇起程前赴江寕淮揚等處㑹勘河道回至鎮江即遍厯各河工所細加密訪出示遍諭嗣訪有青浦縣奸民陸子英等借端詐派隨發松江府審究昭文縣武生周祖望等索詐多金隨發蘇松太道審究又訪得武進縣工房書吏派夫包攬江隂縣蠧役勒索里長銀兩乃該縣知縣等毫無覺察臣等已咨明撫臣陳時夏聽候嚴提分别㕘究今恪奉聖諭仰見我皇上至聖至明無微不燭除刋示通行曉諭外所有訪查聞見縁由不敢不據實奏聞伏祈聖鑒臣等謹奏覽此奏己洞悉彼處一切情形諒爾等豈為無理之舉然究須洽衆論順民情詳慎力行百凡直逹無隠勉之雍正六年三月十三日原任山東廵撫今革職臣陳世倌謹奏為恭奉聖訓敬申謝悃事竊蒙皇上如天之仁法外寛宥謹具摺恭謝天恩復蒙諭旨諄諄訓誨仰見我皇上以至公至明之心闡示大聖大賢之理以至正至確之論開𨗳極昏極憒之人如日月之光昭有目共見如雷霆之鼓動觸物皆通臣跪讀敬繹汗流浹背若醉忽醒若夢初覺祗縁向來未經外任少所閲厯一旦驟膺封疆重寄日夜惴惴惟恐有負職守戰懼之念過深瞻顧之私滋起遂至畏首畏尾日蔽日昏清夜捫心漸覺從前所為百無一是兹奉天語提撕至訓警悟不禁慚悔無地乃知堯舜治道洙泗心傳總不外一誠字背此而行不惟無以對聖明亦且難以立人世惟有早作夜思洗心滌慮痛自改悔敬奉終身感戴聖慈永永無極謹繕摺恭謝伏祈聖鑒臣謹奏改過二字係至難之事非大丈夫大聰明人不能也覽汝所奏二摺據稱清口淤阻鹽引遲壓等語現今淮水暢流淮商願請分年帶銷汝均未之聞乎至於聖祖治河方畧天下人孰不知何待汝之稱頌耶承辦之事不能盡心竭力告竣而妄生越爼之思莫非又為文集起見耶凡此宻奏事件若少存邀名之念於中恐貽害身家不淺慎之慎之硃批諭旨卷二十四下
