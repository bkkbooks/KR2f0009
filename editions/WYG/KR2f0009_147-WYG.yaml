body:
  text: 欽定四庫全書硃批諭㫖巻一百四十七硃批蔡嵩奏摺提督雲南學政臣蔡嵩謹奏竊臣愚鈍庸才荷蒙皇上天恩拔置内廷擢授今職恩榮稠疊感激涕零跪辭之日親承皇上訓諭諄諄臣敬聆之下銘心鏤骨必期殫竭犬馬以仰荅聖謨之萬一莅任以来目擊滇中之風俗醇美民物恬熙而省㑹諸臣工皆和衷體國實心辦事仰見我皇上盛徳明威無逺弗届而知人善任能使羣工咸感動奮興各思宣力效能以展布尺寸於閲試巻觧題動多舛錯文字類皆淺率詢之敎官及守令俱云邊方未有師傳士子一入學便巳滿臣記幼年服習舉業看四書則以大全語類語録為宗看時文則以前軰歸有光黄洪憲黄淳耀等為宗每日挨次看四書一二節即看此一二節書中文字以印證書義如是兩年覺四書中凡一句一字皆有着落行文亦自有意理今即以此刋一以驗其所報之虗實又滇俗生計艱難士子念切身家未免不顧名行臣於條約中已極言義利之防復令各教官確訪諸生中有務夲砥行者即親造其廬奉宣皇上敦崇實行諭旨更加勉誨俟有實蹟著聞另行題請臣於考校時亦就文另提一等以示崇奨其誤訓旨特重人心風俗復於十二月三十日敬接龍顔又不能特遣家人恭請聖安敬用繕摺附督臣上陳仰希睿鑒謹奏所奏知道了如此方不忝督學之職也提督雲南學政臣蔡嵩謹奏臣於夲年閏四月二十六日在曲靖考棚捧接皇上硃批奏摺即設香案叩頭恭啓伏見我皇上御筆輝煌凡闗係緊要處俱分别批示萬里之外洞悉情形臣一一謹誌伏讀聖諭有云賞罰勸懲不可偏用眞古帝王致治經邦之大法臣仰體諭旨凡有舉動必敬念遵依因思文章之事已經嚴限課程逐時記報而士行尤宜慎重日夜躊蹰特設紀行循環簿發各府州縣官及各學敎官公同稽察諸生中有讀書自好及廢學騖外者逐一據實塡報臣乃得盡知諸生之行事隨其事之大小分别勸懲臣自省至臨安至澂江至曲靖沿途控告秀才者紛紛自此簿行後至今三月有餘往来考校處所呈詞漸巳稀少臣以為事屬偶然未敢遽信目下方往西路考校再看沿途光景體訪情實容臣據實詳奏兹附督臣處恭繳批摺并陳明近蹟仰懇皇上睿裁訓示俾臣敬奉遵行謹奏好此敎誡士子之良法也但須將敎官選擇而用方有實濟否則百弊隨生仍屬無益再汝前奏以黄淳耀為時文之宗朕一時忽略看過此論當更加斟酌朕意殊以為不然提督雲南學政臣蔡嵩謹奏臣於雍正二年十二月十八日在永昌府考棚捧接皇上硃批奏摺跪讀聖諭仰見我皇上聖慮周詳洞見始末臣敢不倍加警惕凡各學敎官之曠職不謹者已於計典中塡報其現在供職者臣更加申飭敎誡倘於諸生之優劣紀報不實甚至賄囑徇情臣即另疏叅劾不敢容隱又臣前摺中陳明敎士子看文之法有黄淳耀在内臣學識短淺昧於簡擇䝉皇上睿裁示戒仰見聖學髙深眞無一不兼總條貫臣思前輩時文向稱王迤西考校至今三月初六日考畢回省見迤西士風頗覺樸實第義利之辨未明則人心風俗之夲皇上憂勤致治之意所有奉到御批理合恭繳謹奏覽硃批諭㫖巻一百四十七
