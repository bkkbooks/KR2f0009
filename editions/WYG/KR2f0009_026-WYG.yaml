body:
  text: 欽定四庫全書硃批諭㫖巻二十六硃批塞楞額奏摺雍正四年十一月初十日署理山東廵撫印務侍郎臣塞楞額謹奏為欽奉上諭事雍正四年十月十三日臣到任後接准登州總兵官黄元驤為膠州停泊戰船一案恭録硃批諭㫖到臣臣欽遵一面委員前徃膠州㑹同營員親至停泊處所宣揚恩㫖並查明在膠船數在船人數令該州動支正項錢糧接濟一面檄行布政司查議應給口糧數目去後續據布政使張保議稱停泊船内人役應照江南原給工食口糧數目支給前來又檄行該州令其按月照數支給在船人役無不歡呼感激叩謝皇恩臣恐上厪宸衷謹將料理情由繕摺奏聞謹奏料理殊屬合宜朕又有㫖諭黄元驤著賞犒伊等咨到汝遵照奉行同日又奏為恭謝天恩事臣於十月二十八日親詣岱頂恭祝聖夀至十一月初二日回署接准吏部咨文奉㫖調補臣戸部侍郎伏思臣於兵部任内兩經部議革職俱䝉聖恩寛宥兹復特膺寵命調佐司農臣何人斯邀此隆遇感激之私莫可言盡唯有銘心刻骨銜結於生生世世而巳謹繕摺叩謝天恩為此謹奏滿洲之中人材甚少如爾等可以栽培者朕無不造就成全若因此遂恃恩自恣漫不檢束惟希冀姑容則又大誤矣當祗遵朕訓懋勉厥職以圗報稱可也同日又奏為請㫖事臣查東省各官養亷從前俱議定數目批行布政司遵照在案至學差一缺原未議給養亷之項學臣王世琛到任後前撫臣陳世倌曽先支給耗羡銀二千兩云照道員之例毎年給養亷六千兩但曽否奏明無案可稽事闗動用錢糧臣實不敢冒昧遽行支給為此繕摺請㫖伏候皇上批示遵行謹奏此事當看學臣之操行何如不可竟為定例若實一塵不染地方大吏自應量為資助倘名不副實則無庸支給也總宜合於公當而已雍正四年十二月初五日署理山東廵撫印務侍郎臣塞楞額謹奏為恭報得雪情形事竊東省自十月以來各屬多報得雪一二寸三四寸不等兹復於長至日普降瑞雪四野繽紛積雪至五六寸七八寸不等農夫野老咸稱來歳麥秋定卜豐收謹此奏聞以慰聖懐謹奏瑞雪應時實慰朕懐殊為可喜可慶雍正四年十二月十九日署理山東廵撫印務侍郎臣塞楞額謹奏為遵㫖議奏事前䝉皇上發下沂州副將楊鵬條奏大路墩臺應添造營房令兵丁挈眷居住一摺奉硃批諭㫖此事可與鎮臣詳悉籌畫具奏欽此即移咨登兖鎮臣確議去後嗣准各咨覆前來查守墩兵丁馬二歩三晝則瞭望夜司廵查不可一時擅離汛地若令挈眷居住實於公私均有裨益應如楊鵬所奏中東兩大路共計墩臺一百三十五座每墩添造營房十間共計應造營房一千三百五十間毎間約需銀十兩共計銀一萬三千五百兩造完之日即令各兵丁挈眷永逺居住如至年乆應修令兵丁苫補毋致坍塌可也臣㑹同鎮臣合詞具奏是否有當伏祈皇上批示遵行謹奏所議甚為妥協防守嚴密自可盜息民安也同日又奏為請㫖事據廵察山東等處給事中奚徳慎移稱本科遍歴東省沿河一帶漕艘客船徃來絡繹不絶闗係最為緊要如照河標漕標添設煙墩營房令兵丁住守催重趲空廵查瞭望於弭盜安民似有裨益等因移商到臣臣查同一河道在河標漕標則有煙墩營房在兖州鎮標則無煙墩營房以致防守兵丁尋覔民房居住殊為未便自應一例添設以資防守但查自桑園起至張秋止共計河道六百四十五里又自劉昌莊起至黄林莊止計河道一百六十里其間應造煙墩營房共有五十餘座費用浩繁一時難於辦集請於兩年内酌動餘耗銀兩交與沿河州縣各官陸續添造俟造完之日另行奏聞臣㑹同廵察科臣奚徳慎合詞具奏是否有當伏祈皇上批示遵行謹奏沿河營房煙墩接聮不斷既可催漕船又以衛行旅實為兩便應行添造但當嚴飭州縣官務湏葢造堅固方可悠乆不然如直隸等處未及一年盡皆傾圯徒費金錢究無益也善為之雍正五年正月初三日署理山東廵撫印務侍郎臣塞楞額謹奏為恭謝天恩事去歳臘月十九日臣齎摺家人奉到欽賜御書福字及風羊哈密𤓰兹於元旦又接到特賜風羊臣俱望闕叩頭謝恩祗受訖伏思臣何人斯膺此隆遇非獨臣之一身仰承福䕃於靡涯即臣之舉家亦共戴福徳於無盡矣臣惟有凛遵聖訓勉力奉行以圗報稱於萬一為此謹奏極宜加勉以副朕望朕初意不過令汝暫時署理仍著陳世倌復任近亷知陳世倌祇能潔已自守不肯實心任事汝須多為料理幾時朕若選擇不獲勝任之人則不可以年月限也汝當事事竭力經畫毋少存瞻顧之心勉之所奏臨清之摺交部查議矣同日又奏為奏聞事竊查臨倉徵收米折銀兩每年應得羨餘銀一萬五千一百二十三兩内除奏銷考核随鞘飯銀添平銀及紙張飯食犒賞書役銀外實剰羨餘銀一萬三百餘兩歴年以來臨闗税銀多有缺額即以臨倉之羨餘補臨闗之不足雍正四年臨闗税銀並無缺額是以臨倉羨餘亦無抵用之處前撫臣陳世倌於伊離任之時將三季收過羨餘銀八千一百九十八兩除留充各費外伊俱解交藩庫補還伊借動之庫項臣自冬季管理起至徵完止應收羨餘銀四千四百五十五兩又帶徵三年分未完錢糧内應收羨餘銀一千四百八十五兩臣任内共收臨倉應得羨餘銀五千九百四十餘兩臣将九百餘兩作為嵗底犒賞臣標三營官兵及衙門各役之用將五千兩解交藩庫留充公用所有臣收過臨倉羨餘銀兩數目謹據實繕摺奏聞謹奏陳世倌於錢糧羨餘原無染指朕所稔悉何也伊惟恐累及身家祇務全身保禄不肯傾心為國是其所短耳雍正五年正月二十四日署理山東廵撫印務侍郎臣塞楞額謹奏為請㫖事去歳十二月間布政使張保呈送冬季分規銀到臣臣即面詢此銀出自何項據稱係各州縣解費及餘平銀内存為分規毎年約有五萬餘兩向係院司均分等語臣查東省各屬徵收耗羨每兩以三分作為解費原為解餉添平而設若存為分規恐不足以服州縣之心且布政使張保呈請動支正耗銀兩為解餉添平之用據稱從前原以歴年民欠七分耗羨解餉添平因民欠緩至八年帶徵萬二千兩為添平之用等語臣思三分解費原應作解餉添平之用今存為分規所以添平又不得九萬七千餘兩至今無項可補臣請自雍正五年為始將此分規銀兩即作解餉添平之用如有餘剰併所收七分耗羨搭解戸部以補從前掛欠銀萬一千四百二十三兩相應交與藩庫留充公用為此謹奏除此之外更有何項養亷此項分規前撫陳世倌曽否支用作何處置之處一併查奏雍正五年二月初十日署理山東廵撫印務侍郎臣塞楞額謹奏為請㫖事臣自抵任以來查訪六府知府直隸知州俱能循分供職惟各州縣内有難以姑容之員如原任内有虧空未完者應解任勒追有年老無能並才力不及者雖任内尚無劣蹟若聽其因循怠惰恐致貽誤地方應分别令其改就教職或勒令休致又臣一面查明題㕘一面挨次題補更有請者原任膠州知州馮景夏前任内分賠銀兩已完如䝉皇上准其開復祈仍發至東省候補為此請㫖謹奏安民之道惟在察吏諸卿誠能秉公毫無瞻狥更不存沽譽之心將見俊傑在位庶績咸熙社稷蒼生裨益不淺矣勉之現任各官與朕何嫌出其缺朕豈另有欲用之人乎矧經歴既乆之員較新進未諳練之輩相去霄壤汝於此處務求公當少不允協人材可惜總之為大吏者非清慎而兼明察不能得鑑衡之當至所奏年老不及各員若果衰邁不堪即教職亦屬誤事伊等已任縣令亦可謂不負其讀書一番不如竟令休致善藏其拙正所以保全之也同日又奏為恭報雨雪情形事竊查東省正月二十六日天降時兩三十日又降大雪至二月初一初二兩日連得㣲雨六府六州俱報均沾實於春農秋麥大有裨益臣謹将雨雪情形奏聞謹奏深慰朕懐惟宜恪秉一誠仰冀上蒼之垂佑慎毋預料秋成侈然自逸也切諭雍正五年二月二十二日署理山東廵撫印務侍郎臣塞楞額謹奏為遵㫖查奏事臣前將冬季分規銀兩交庫留充公用等情具奏奉硃批諭㫖除此之外更有何項養亷此項分規陳世倌曽否支用作何處置之處一併查奏欽此臣查自雍正二年七月提解耗羨之後議定廵撫養亷銀毎年二萬兩藩臬養亷銀毎年各一萬兩俱自耗羨内支銷至分規銀兩仍由藩司於解費内扣留院司均分是養亷之外又有此分規也再查陳世倌自雍正二年四月到任起至四年九月離任止共收過分規銀七萬五千七百九十兩共支過養亷銀四萬五千兩内奏明現存司庫留充公用銀四萬七千三百八兩又捐賑用過銀一萬七千九百九兩又因博爾多陞任進京陳世倌将伊應得之分規銀一萬一千兩不曽收受歸併博爾多其餘銀四萬四千五百七十餘兩陳世倌為盤費之用此分規養亷之實數也至臣到任後一切用度俱於養亷内支用上年冬季分規銀兩已奏明留充公用理合一併奏聞謹奏據奏耗羨銀兩既可以養亷分規一項即依爾所請行朕惟恐爾等大吏需費殷繁或致用度不敷耳同日又奏為奏聞事竊前撫臣陳世倌於臣到任時將硃批條奏東阿縣大河口建築石橋一摺併伊奏明彼處地有浮沙難建石橋請造船十隻搭作浮橋以濟行旅緣由移交到臣臣随轉飭該縣作速成造去後今據東阿縣詳稱遵造橋船於正月十二日完工復將河口兩岸下樁築土鑲成馬頭安設船隻搭作浮橋現在車輛人騎通行無礙等情前來除将造船工料用過銀一千二百二十九兩行令布政司查核外謹将浮橋報完日期奏聞謹奏張楷亦好為此等私恩小恵之事前者奏請於安徽所屬地方開支河一道可令商民避長江之險等語朕意其必有真知灼見處故諭接任者奉行孰料竟屬紕繆不可見之施行今不識此橋果係應行有益之舉抑或陳世倌出於一時迎合徒為無益之費耶爾其據實奏聞雍正五年三月十九日署理山東廵撫印務侍郎臣塞楞額謹奏為代進奏摺事據陞任兖州府知府吴闗杰禀稱前奉聖諭如有奏摺交與廵撫轉奏今闗杰荷䝉天恩陞授湖廣辰沅靖道現在束裝赴任具有謝恩奏摺一封懇祈轉奏等情到臣臣謹代為恭進謹奏吴闗杰中材耳其莅任兖州以來雖未聞其劣蹟亦未聞有羙政甚屬平常朕将伊調用湖南非嘉奨而陞擢之也其賢否究竟如何之處爾據實覆奏同日又奏為奏聞事臣思聖廟工程事闗重大因嚴飭管工各官上緊備辦兹據登萊青道徐徳俶詳稱磚瓦灰石已備辦十之七八原擬木料一到即可興工今都司鈕國璽買到之木多不如式等情臣查鈕國璽所買木料既不如式而任内錢糧又有虧空似此不職有誤欽工之員斷難姑容現在題㕘請㫖革職嚴提審擬著落該貟將家産賠補仍轉飭管工各官將運到之木料内擇其合式者收工應用合将料理情由繕摺恭奏以聞謹奏鈕國璽藐法誤工甚屬可惡亟當嚴㕘示懲事闗尊崇先聖乃千萬世不朽之典務須極力詳慎遴委幹貟料理妥協方是况汝係科甲出身便作私事論亦宜殫心籌畫以盡報本之誠方不有愧儒教其徐徳俶亦屬推諉具疏時不可從寛雍正五年閏三月十六日署理山東廵撫印務侍郎臣塞楞額謹奏為奏聞事本月初四日接准内閣封發山西廵撫徳明所奏吴竒明掲帖一事奉㫖山西廵撫徳明所奏吴竒明揭帖一紙可抄録發與山東廵撫將揭帖内有名之該省人犯應行質問者即速宻拏解徃山西交與徳明究審不得疎縱亦不得拖累欽此欽遵等因到臣随宻差遊撃白良璧前徃查拏於初七日將東阿縣民董大成拏解前來察其情詞觀其形狀乃一年老無知鄉農似非謀為不軌者查原揭内董大成並非在家居住之人臣恐拖累無辜除將現獲之董大成拘禁省中一面備敘情由専差星赴山西咨詢或彼處另有董大成其人或將現獲之董大成發徃質審之處另行斟酌料理外合將咨詢緣由先行奏聞謹奏非此董大成自不可令其枉屈此事且勿顯露狀中有鹽徒八百人馬上朋友五六百之語又有寄頓年羮堯贓物等情諸犯雖獲朕疑其事荒唐但既舉首鑿鑿不得不究耳此案山西現在審理俟徳明處文到汝迅速應付無誤目下以宻為要湏選差精細捕役潛詣州縣伺察踪跡倘事果實免致臨期失措雍正五年四月初五日署理山東廵撫印務侍郎臣塞楞額謹奏為報明二麥情形事竊查東省濟屬於閏三月初三日大沛甘霖四野霑足嗣據各府州縣報稱䦌三月初三初四等日以及二十二二十六等日均得大雨細訪通省二麥現在俱甚茂盛目下米穀市價較之未雨之前已每石減銀一錢四五分不等臣恐上厪宸衷將二麥茂盛糧價漸減情由繕摺奏聞為此謹奏覽奏朕懐深慰政平人和則雨𤾉時若此皆汝誠敬居心勤敏奉職之所致天道最近切不可視為杳𣺌無憑也勉之慎之同日又奏為奏覆事竊臣准内閣知㑹内開三月十六日奉上諭前布蘭泰摺奏海疆事宜塞楞額當擇其應行事件作自巳之意具題今將朕硃批俱寫入本中是伊錯認朕意恐將來督撫倣效而行實有未便故將原本批令發還爾等可寄字與塞楞額事若應行自當作伊自巳奏陳另行具本若不當行之事亦不宜宣露推卸欽此合行寄字知㑹等因到臣臣捧讀之下不勝惶恐戰慄竊查海疆事宜均闗地方公務理宜擇其應行事件作自巳條陳具本題請乃臣知識愚昧不能體㑹聖意疎忽之罪臣實難辭惟有益加黽勉以仰副我皇上教育生成之深恩而已除將原奏内擇其應行事宜另疏具題外為此恭謝天恩謹奏此等小過出於無心朕不汝責也原本發還所以明示朕意使天下督撫知之嗣後有所遵循耳雍正五年四月初九日署理山東廵撫印務侍郎臣塞楞額謹奏恭請皇上聖躬萬安朕安今巳實授汝為山東廵撫矣勉盡厥職以副朕意汝父年艾如欲接至任所以仲孝養亦可在汝父子之間酌量而行耳偶爾念及故諭同日又奏為奏聞事本月初四日准副總河嵇曽筠移送㑹題疏稿一件係為曹單二縣臨河大堤題請加幫鑲埽於藩庫内動帑興修將額設徭夫工食併幫貼等銀抵項外其餘在於徐徳俶名下勒追還項緣由又咨文一角内稱現在具題檄令藩司先動撥庫銀二萬五千兩以便備料興工縁由一併到臣臣查徐徳俶係奉㫖發與嵇曽筠令其出貲財數萬金効力以示懲戒之員自應將此項堤工即責令徐徳俶効力興修或至實難接續之時再為題請借動庫銀今徐徳俶尚未到工即先動庫銀然後於伊名下勒追恐將來賠補無期而庫帑反致虚懸况曹單二縣河堤並非險工尤不便於未經奉㫖允准之先擅動庫帑是以㑹稿内臣未經畫題其檄令藩司所撥銀兩臣亦未經准其給發除將前情咨覆嵇曽筠外謹具摺奏聞為此謹奏朕若據奏即飭諭嵇曽筠相形之下恐失爾等同官雅誼爾但堅持不便給發情理明白辭覆令伊自行改正為是倘伊固執已見或具題或摺奏到時朕降㫖諭問於爾然後將此情由聲明回奏則爾亦可告無過也諸凡似此據實無隠毫不瞻顧可謂明體達用福至心靈矣朕實褒奨之至勉之同日又奏為請㫖事竊惟知府一官有刑名錢榖之司表率拊循之任必得精明强幹之貟方克辦理無誤臣查青州府知府俞兆岳年力老邁精神衰憊胥役窺其柔懦漸至玩忽從事前於三月間青州府城内兩次被盜至今月餘未獲一賊雖疎忽之咎不専在郡守而委靡之愆已可槩見矣臣恐姑容日久以致貽誤地方可否令俞兆岳自行引退員缺另請皇上揀選補授之處伏候聖鑒批示遵行謹奏俞兆岳原非朕所鑒賞之人因見其氣度舒徐意必老成歴練所以擢用之耳果如爾言則棄物也亟應令伊告退此員缺通省州牧府佐内有勝任之人否查明奏聞雍正五年四月二十四日山東廵撫臣塞楞額謹奏為恭謝天恩事本月十九日接奉硃批諭㫖今巳實授汝為山東廵撫矣勉盡厥職以副朕意汝父年艾若欲接至任所以伸孝養亦可在汝父子之間酌量而行耳偶爾念及故諭欽此臣跪讀之下不禁涕零伏念臣以庸愚之質荷䝉皇上逾格擢用由中書歴任侍郎髙厚之恩直同覆載今復特授山東廵撫更䝉念及臣父俾臣得展烏烏私情臣何人斯邀此異數撫衷自問愧感交集自兹以徃惟有益加黽勉務竭犬馬微忱仰報𢎞慈於萬一而已謹先繕摺恭謝天恩謹奏終身不改此志則一生受福無窮大率始終如一不随境而遷者少玩愒歳月昧其初心者多夙興夜寐時加省察如人飲水冷暖自知古人云明道易守道難非扶天理遏人欲克勤於涵養工夫不能也即如勉之一字須從慎之一字著力操存之功豈容少間汝其謹誌弗失同日又奏為恭謝天恩事本月十五日臣齎摺家人捧到欽賜人參笋一匣芽茶二瓶臣随恭設香案望闕叩頭祗領訖為此繕摺恭謝天恩謹奏覽卿奏謝知道了曹單二縣河堤兹據嵇曽筠懇請工程緊要恐致遲誤等語其檄撥錢糧爾即照咨付與將來如徐徳俶不能足數賠補則惟嵇曽筠是問耳爾無庸㑹題令其自行具奏可也雍正五年四月二十八日山東廵撫臣塞楞額謹奏為奏聞事四月十七日晚天降時雨各屬均沾二麥俱得堅實禾苖亦漸長發據各屬報到内四五十州縣麥收分數俱在七分以上至十分不等惟是上年被水州縣内水淹窪下之處多有魚子今春涸出間有蝻子生發巳嚴飭地方文武官弁竭力搜捕併委大貟親歴廵查並未傷損田苖合行奏聞謹奏蝗蝻一事人力竟可以勝之確然無疑者捕不盡力一令飛起為害不小地方官百姓多有憚於撲捕倖免督責徃徃隠而不報爾當時加訪察嚴行飭諭方收實效在爾東省此事尤為緊要年年春夏秋務宜留心毋得少忽慎之慎之雍正五年五月二十二日山東廵撫臣塞楞額謹奏為查明倉榖據實奏聞事臣自到任後即檄行布政司確查積貯實數續又奉㫖將陸埰條奏一摺交臣議奏查陸埰奏請存價銀兩分發各州縣採買之説在應買之道㕔得脱然事外而分買之州縣愈為滋累臣故不敢議令分發以開推卸之端仍照各案原存價銀勒限本年秋收買補貯倉惟是三錢一石之價在豐年尚能採買若遇歉收實有不敷臣請於秋成後查訪確實若有萬難採買之處或另行分别題請展限或於餘耗内酌量每石加添三五分俾得作速買補以副我皇上軫念民生慎重倉儲之聖心伏候皇上批示遵行謹奏分發各州縣固不可行若必待三錢之價天時難定尤為非理但此事必有原委何故折價存貯其中豈無情弊朕經通諭州縣各倉凡有折色貯庫儘其存銀按時價購買補倉其不足之數責令原任事者賠補此事亦當如是辦理設若不能察其原由不得其人恐倉儲終屬虚懸至爾所奏酌量於耗羨内幫貼亦必俟秋成後買補為是總在爾詳情度理秉公而為之耳同日又奏為奏聞事竊查東省於五月初一初二十三十四等日俱有㣲雨又於二十日得雨入土四五寸不等秋苖茂盛各屬亦均沾雨澤至從前所報蝻子發生之處共有二十餘州縣臣即迅飭文武官弁竭力撲捕一面用錢收買今報到撲滅者已有十之八九其飛蝗去來無定現在随有随撲人夫之蹂躪蝻蟲聞謹奏蝗一飛起則大有可慮此皆初生時撲捕不力之所致也宜嚴督所屬務令撲滅續生蝻子要緊大凡捕蝗附近田苖不無蹂踐之害所以小民不願而監捕親臨地方未免有迎送之勞所以牧令亦不願是捕蝗之事全在該撫勸懲得法也試思蹂踐之為害幾何飛騰則為害甚溥愚民只顧一身一家之計豈堪與論利害輕重此事若見不透一時被屬貟愚惑過後追悔無及元年二年間四省皆生此物朕諭該撫等竭力撲滅竟未至成災汝今當察地方官之不盡力者必素係不能盡職之員照規避懶惰之例嚴行㕘奏懲一以警百捕蝗各貟寧猶不知戒懼耶雍正五年六月二十九日山東廵撫臣塞楞額謹奏為奏聞事前因東省州縣内有蝗蝻生發荷䝉皇上指示周詳臣恐屬員撲捕不力以致蔓延為害因於㸔河之便親詣生發處所嚴行督催復派委多員分頭查催半月以來俱已陸續報到撲打淨盡並未傷損田禾臣猶恐有餘種未盡陸續生發之處現在仍不時查訪嚴飭随生随撲誠如聖諭人力可以勝之者也臣恐上厪宸衷謹將撲滅緣由先行奏聞至臣所歴二十餘州縣處處田禾茂盛即訪之通省州縣亦俱稱雨暘時若可望豐收合併奏聞謹奏東省陋習朕所稔悉前於爾奏摺内故諄諄批諭也年年當留心體訪一有所聞督率撲捕不遺餘力倘有隠匿者嚴加㕘劾如此則蝗蝻何至蔓延為害其新任有司於平時即嚴切誥誡使預知處分之重自不樂仍踵舊習矣同日又奏為奏聞事竊臣據東昌府聊城縣申稱本月十七日晝夜大雨河水陡長十八日卯刻龍灣舖地方運河西岸漫開水口七丈有餘連夜搶修業巳堵築至二十一日復遇大雨河水頓長復將堤頭䕶埽汕去又衝開水口一丈寛深現在加緊搶修等情到臣臣随檄飭東昌府知府金啓洛督率印河各官星夜堵築併委貟前徃查明衝決堤岸曽否堵築完固民田廬舍有無淹沒各情形另行具奏外合先奏聞謹奏地方上凡此等小事槩不隠諱一一奏聞朕甚嘉之殊不厭其煩碎爾審度情形如不難於措畫酌動耗羨之項随宜料理速竣毋致因循滋患也同日又奏為查勘河道工程事竊徒駭馬頰二河工程告竣臣於六月初六日自省起程遍歴有河州縣挨次查勘二河工程深寛丈尺俱各如式一律深通毫舊有橋梁俱係淤後所築今河已挑挖深通橋梁根基多有浮露衝刷日乆必至坍塌其所有橋座臣酌動公費耗羨轉飭修築堅固以為經乆之計今查勘已畢於二十六日回署合將查過河工情形具摺陳明謹奏為政以大徳不以小恵修築橋梁務宜永逺堅固使民實享其利若茍且塞責以圗一時美觀則猶夫以乗輿濟人於溱洧也雍正五年七月初九日山東廵撫臣塞楞額謹奏為奏聞事竊聊城縣龍灣舖地方河堤漫決情形臣經奏明在案今於本月初九日據東昌府印河各官報稱自初三日以後連朝晴霽河水漸消所有衝決堤口於初七日堵築完固民間廬舍並無被淹即低窪處所田禾稍被水浸幸際成熟之時不致為害等情前來除仍轉飭地方官加意察訪毋使貧民失所外合將決口堵築工完民田廬舍並無傷損緣由繕摺陳明謹奏近日畿甸以内秋雨連綿朕甚憂慮爾宜飭諭各屬於一切堤工小心防䕶毋致疎虞慎之慎之雍正五年八月初六日山東廵撫臣塞楞額謹奏為奏聞事據東昌府知府金啓洛報稱七月二十六日大風驟雨將城北䕶城大堤衝開二十餘丈幸於二十七日晴霽之後水勢漸消城郭可保無虞其堤内居民三千餘口俱用小船載入城内安置房屋雖被淹沒人口並無傷損等情到臣臣即委濟南府知府張體仁前徃㑹同金啓洛酌動銀米將被水窮民加意撫恤併將䕶城大堤作速搶修除俟料理妥協之後另行具奏外謹將衝決被水情形先行陳明謹奏觀汝實授以後頗不及署理之時天道随人亦自然更易此一定之理也同日又奏為奏聞事據東昌府屬兖州府屬濟寧州屬之各州縣衛所俱以秋雨過多窪地被淹等情詳報前来現在轉飭布政使委員分頭查勘外臣查登萊青三府山地居多雖有雨水無傷田苖俱報到秋收各有八九分不等至濟兖東三府除被水村莊外其餘亦俱報到秋收六七八分不等統計收成分數即被水州縣將來亦不至米價騰貴臣恐上厪宸衷理合繕摺奏聞謹奏便厪朕衷亦無可如何之事豈此片紙數字所能慰解耶雍正五年八月十六日山東廵撫臣塞楞額謹奏為奏聞事竊臣前以東昌城北䕶堤被水衝決委令知府張體仁前徃協同料理緣由業經摺奏今已晝夜搶築如式完固其被水人民各有生理者已各歸本業外尚有無依貧民男婦大小共一千四百餘口内大口每名給銀五錢小口每名給銀二錢以為經營餬口之資俟堤内積水涸盡再行酌量按户散給撘蓋房屋之費斷不使流離失所以致有負我皇上子恵元元之至意所有給過銀錢以及築堤所費不及二千金臣與司道大貟公同捐備無庸請銷庫項再查運河堤岸漫溢之處本應即行鑲墊但目下水勢尚未消落堤内堤外水面相等取土維艱人力難施臣現在檄飭印河各官相度機宜俟河水稍退即便次第興修至於沿河縴路遇有殘缺水口即暫撘浮橋以濟回空以通商旅更查東昌府城雖經水患各項糧米並不昂貴居民亦皆安堵如故臣謹據實奏聞上慰聖懐謹奏觀爾前後摺奏光景衝決勢大淹沒或不止於此凡地方水澇之患亦所時有但宜講求撫恤之方斷不可絲毫隠諱也雍正五年八月二十六日山東廵撫臣塞楞額謹奏為請㫖事竊臣業將已報到被水之州縣陳奏在案今委官查驗多不至成災惟東昌府屬之沿河州縣地處窪下以致被淹較重查定例如地方有被災之處先將情形題報續將分數查明復行具題蠲免但東省今歳二麥已慶豐登通省秋收亦多成熟雖有數處被水不致民食維艱今若據州縣之申詳遽將被水情形通行具題不惟成災之州縣多所希冀即不成災之州縣亦皆觀望無論無力貧民不行完納即有力大戸亦不肯輸將此等情弊臣所甚悉是以未敢造次具題現在已委員分路查勘如有實在成災地方容臣據實開明分數繕摺奏請其有應蠲應免之處仰候皇上特降恩綸目前之先報情形免臣具題則将來成災貧民仍得沾沐皇恩而不成災之處所亦不至觀望希冀矣臣查訪既確用敢具摺奏請伏候聖鑒批示遵行謹奏果不成災自不在蠲免之例何慮其觀望但查勘務宜公確汝既不先報情形於具題時須聲明縁由方可免違例之咎也同日又奏為請㫖事竊查耗羨彌補流抵一案經臣題請展限統於雍正五年嵗内全完奉㫖允准在案今查司庫續收耗羨約至九月初間流抵挑濬鬲津等支河共用米一萬七千二百餘石現在具題請銷但徒駭馬頬河道實為宣洩民田陂水而鬲津等支河更同民間溝洫雖䝉聖恩准動庫帑實係地方公事臣請俟彌補流抵全完之日即接續彌補挑河所用銀米庶以公完公不惟正項錢糧不至多費而提解耗羨亦無事紛更矣為此謹奏以公完公非此之謂也各項虧空補足時暫留贏餘將來若有無著之項正宜以此補苴至如地方上修理道路橋梁或添助州縣買補存倉榖石疏通溝洫等事亦宜以此支用斯謂以公完公但總不可令不肖官吏借名開銷假公以濟其私耗羨一項原為地方官所得之物蓋以之養其亷操方可杜絶巧取之私使不為吾民累迨完公有餘酌量均増於州縣各官令其從容不窘則自然不貪實為善舉且此耗羨乃民膏民脂於正賦外不得已而取之者也如果此等之需又盡充足則當減耗以裕民方為萬分全美之政所奏耗羨作為挑河公用之説謬矣何也此項止可為地方中之公用非可為國家之公用也國家理財自有大體假令各省於正供外又増此名色餘出耗羨數百萬充為庫帑成何國體耶若然則提耗羨一極美之事翻成大笑談矣爾領悉朕意一切皆本此辦理方不愧臨民之任雍正五年十月初四日山東廵撫臣塞楞額謹奏為奏聞事前准内閣來書欽奉上諭著各省督撫迎請龍神像位建祠供奉臣即一面委貟赴京迎請一面敬擇潔淨屋宇一所重加修整建設神龕今於九月二十四日據委貟迎請山東福齊恵應龍神二尊到省臣即率同各官出郊迎接進祠敬謹供奉訖所有迎請龍神像位供奉縁由合行奏聞謹奏覽爾奏中敬謹二字時刻不可去懐葢神明感應之理惟以徳馨不僅在享祀豐潔也禮月令仲夏大雩雨暘禱祀由来尚矣然居心行政若不出於仁民愛物之誠徒懐僥倖希冀妄邀福庇何異縁木求魚此理朕見之甚明且確爾一身繫闔省烝黎之休戚當思所以致感之實兢業自持勤慎不怠庶幾徵應如立竿見影也雍正五年十一月初七日山東廵撫臣塞楞額謹奏為恭報瑞雪事查東省於十月初三初四十九二十以及二十七等日六府六州陸續申報得雪自三四寸以至八九寸一尺不等四野均沾訪之農圃老民僉云小春節氣得瑞雪霑足誠来年豐稔之嘉兆也合將瑞雪情形繕摺恭報謹奏直隸山西河南皆已得雪朕正為山左繫念覽爾此奏深為快暢然更須春雨應時綿綿接續為佳耳雍正五年十一月二十四日山東廵撫臣塞楞額謹奏為請調回塘撥之兵以専責成以實營伍事伏查各省設立塘撥遞送部文京報俱係提塘召募土著令其沿途遞送其工食銀兩出自通省各衙門㸔報各官按季解貯藩庫提塘赴司請領惟東省則不然自省至京設立塘撥悉用撫標兩營歩兵遞送由來巳乆不知始自何年但營兵自應随營操練不便擅為塘撥之用况東省各州縣原有閲報銀三千餘兩儘可僱募以供遞送臣請将原撥塘兵盡行撤回以實營伍其遞送公文之人即令提塘召募沿途土著良民承充其通省閲報銀兩亦令解貯藩庫按季支給提塘為募夫工食之費如此則營伍塘撥均有裨益再查當日派撥之時原無報部文案今撤兵歸營似可無庸具題臣謹繕摺奏聞伏候聖鑒批示遵行謹奏此奏甚屬可嘉應如是料理近日古北提臣楊鯤亦經摺奏此事當日派撥雖云未曽報部今若不具題存案恐將來仍蹈故轍况他省塘撥不無𩔖此者見朕允爾題請則亦不得不倣效而行矣同日又奏為叩懇聖恩俯允陛見事竊思臣自叩辭天顔以來業逾一載犬馬戀主㣲忱固已時深夙夜而地方應行政務尤當敬領睿謨臣心繫闕廷因恐曠誤職業未敢冒昧瀆請茲封印在即事務少閒且東省宻邇神京徃返不須一月敢懇聖恩容臣於封印後輕騎減從兼程赴都叩請聖安面聆聖訓不惟瞻天仰聖之誠得以稍展而吏治民生之事亦得有所遵循矣臣不勝激切待命之至謹奏今嵗不必來京幫助陜西騾頭一事切須悉心料理勤加訪察嚴飭屬貟禁止胥吏毋致滋弊使不至踵前陋習擾累地方始不負朕委任之意至於採買騾頭必肥壯者方可入選一路解送官吏尤宜審擇勤幹之員諸凡豐裕從事毋令其艱窘倘或至於賠累則誤事矣勉之更有備用二千兵丁一事候朕諭到盡心辦理同日又奏為恭報瑞雪事前十月内得過雨雪情形臣已陳奏在案今於十一月十七十八等日又復連朝大雪四野均沾各州縣俱報稱積雪至七八寸一尺不等當此一陽来復之候得此大雪繽紛實為豐年之兆理合恭報為此謹奏冬雪頻仍朕懐深慰果能恪秉公忠之念以上報朝廷下安黎庶穹蒼之錫嘏朕可為汝操左劵也勉之敬之雍正五年十二月十八日山東廵撫臣塞楞額謹奏為恭謝天恩事前臣兩次齎摺家人回東俱䝉皇上欽賜湯羊臣恭設香案望闕叩頭謝恩祗領訖為此繕摺恭謝天恩謹奏王師將有西藏之役由此而遂向準噶爾布昭天討亦未可定軍需重任部臣内一時不得其人欲調爾來經畫故及早諭知以便徐為預備此事即在廷議政大臣朕尚未露其端調爾大約在明嵗夏秋之間此數月内可將地方政務加意整飭宻之又密毋得洩露特諭雍正六年正月十一日山東廵撫臣塞楞額謹奏為恭報瑞雪事上年十二月二十九日濟南得雪三寸四野均沾嗣據各屬陸續申報俱於是日得雪二三四寸不等不惟二麥自茲暢茂將見禾苖亦可乗時布種矣合將瑞雪情形繕摺恭報謹奏今嵗雨雪可謂天恩浩蕩率土均沾滇省從來雪少去冬竟深至二尺人所罕聞見者朕實感戴慶幸而倍生惕厲之心願與諸卿共相懋勉其靖共爾位毋或荒寧慎之慎之雍正六年正月二十八日山東廵撫臣塞楞額謹奏為請㫖事竊准吏部咨欽奉上諭著各省督撫於所屬知縣内揀選一人作速咨送閩省交與髙其倬常賚酌量於緊要縣缺補用欽此欽遵臣揀選得蓬萊縣知縣楊一正在任年乆歴練老成可以咨送抑臣更有請者原任金鄉縣知縣郭允彝丁艱離任現在候咨歸旗歴任六載有餘辦事明敏才具練達若咨送閩省堪勝緊要縣缺臣因人材起見越例具奏或將現任知縣楊一正咨送或將丁憂知縣郭允彝聲明緣由咨送閩省之處伏候聖鑒批示遵行謹奏令楊一正徃閩是郭允彜若居官果優具本題留送部引見可也同日又奏為請㫖事正月二十六日接准部咨奉㫖山東按察使楊紹補授直隸布政使山東布政使岳濬調補山西布政使張坦麟調補山東布政使欽此臣查東省現在存庫之正雜錢糧共有三百四十餘萬兩闗係重大現在道府内無堪署藩篆之員仰懇皇上天恩將岳濬暫留東省俟張坦麟到任交代明白之後再令赴山西新任為此謹奏所請是足見慎重錢糧之意已有㫖命張坦麟速来交代矣雍正六年二月十二日山東廵撫臣塞楞額謹奏為恭報雨雪事二月初四日省城大雪復據各府州縣陸續報稱是日有得雨入土四五寸不等之處有得雪三四寸不等之處合將得過雨雪情形恭摺奏聞謹奏深慰朕懐實代汝不勝慶幸也但不可遂爾放逸惟心存敬畏拳拳弗失勤吏治暢民情上蒼之響應朕可力保也慎之又慎期共勉之同日又奏為遵㫖宻議據實覆奏事竊臣接准和碩怡親王戸部尚書蔣廷錫奉上諭宻寄信與河南山西山東督撫每省於歩兵内挑選二千人等因寄字到臣臣遵即酌定議稿先後宻寄與河南督臣山西撫臣㑹商在案查河南督臣山西撫臣㑹稿内以所挑之兵俱屬歩兵無庸給與騎坐馬匹等語臣思各兵長途䟦渉恐難歩行謹議各給騎馬一匹又㑹稿内止云酌量􅉽委管轄各官帶徃等語其應派官貟數目騎坐馬匹製備行裝銀兩未經分析置議臣之所議㣲有參差理合聲明統祈皇上訓示遵行謹奏此事田文鏡石麟俱經奏過作何辦理之處朕已酌定準則諭明田文鏡矣爾等總在田文鏡處畫一而行雍正六年二月二十六日山東廵撫臣塞楞額謹奏為恭報得雨日期事竊二月二十二日濟南省城自寅時下雨起至戌時止舒徐綿宻田土透足近省州縣俱報均沾其去省逺者尚未報到謹將得雨情形繕摺謹奏直隸亦然天恩溥博欣幸之懐筆不能喻此喜與爾同之但須加勉加慎方克承上蒼之眷顧也勖哉同日又奏為據實奏聞事竊臣於放告日有青州府臨胊縣民孫有明狀稱同縣民姚瀛盗伐伊樹又佔伊地畝在按察司衙門控告行府審為誣告批令枷責哀鳴親審等語臣閲其詞内為争地爭樹細事歴經審理結案未准逐出詎孫有明走出門外随拏小刀刺傷肚腹至晚殞命其中有無寃抑是否畏罪脱逃控告不准以致自盡之處除批令按察司嚴查詳報外合將孫有明因告不准自刺縁由據實奏聞謹奏爾身任封疆當知大體似此𤨏屑不應奏之事瀆奏必有應奏之事隠匿而不奏聞者在朕甚疑之同日又奏為請㫖事竊查藩庫内有扣存支發河工銀六千九百六十七兩係歴年陸續扣存部費之項據布政使岳濬詳稱部費名色巳經革除此銀請存為地方公用等情前來合行奏明撥充公用再查濟南省城墻垣坍塌之處甚多臣於去歳已委員確估共需工料銀四千七十餘兩又查東昌府屬之聊城等縣運河堤岸多有單薄毎遇河水長發之時易於衝決以致河水灌入民田臣現在將作何修築堅固之處委貟查估臣請將此項扣留部費銀兩即作此城工河工之用理合奏聞謹奏城垣堤岸均宜修葺但不可令浮冒以填不肖官吏之貪壑同日又奏為欽奉上諭事本年二月十一日准内閣寄字内開雍正六年二月初六日大學士馬齊朱軾張廷玉孫柱等奉上諭闕里興修工程已經三年何以至今尚未告竣爾等可寄信與廵撫塞楞額令董事諸臣實心料理務使堅固昭垂永乆毋得惜費省工擔延時日報竣之後朕或親詣展禮或遣親王大臣前徃俟再降諭㫖欽此臣到任後即擬刻日興修催儹告竣以期仰副我皇上尊師重道之至意無如都司鈕國璽所買之木多不如式經臣題叅革職審擬随委濟東道牟錝元等協同承修各官將木植逐一丈量確估其缺少之梁柱枋桁等大木以及漏估未買各料已動支庫銀先後委員星夜赴江廣購買應用到工之日方可定限完工今奉内閣寄到上諭詢問除另文咨呈内閣外合將聖廟工程至今尚未告竣緣由據實陳明謹奏内閣轉奏時另有諭㫖似此既經咨呈必到朕覽之事又無不便聲明應行密奏之隠情何必多此一番煩瀆亦可謂不體朕之至矣雍正六年三月二十七日山東廵撫臣塞楞額謹奏為恭謝天恩事臣齎摺家人回東捧到欽賜皇輿全圗臣跪迎進署恭設香案望闕叩頭謝恩祗領訖臣敬捧跪閲山川疆理細宻周詳惟有慎重祕藏於公餘細心體察以期仰副我皇上誘掖指示之聖心為此繕摺恭謝天恩謹奏此圗實難得之寳物也尺幅萬里普天一覽乃前代之所無費聖祖數十年苦心積慮所成當珍重之同日又奏為恭報雨澤事竊查東省前於二月二十二日得過大雨又於三月初四五等日各屬報到得雨大小不等今於十四日又得大雨四野霑足又於二十一日自申時起至次日天明止細雨綿宻各屬亦報均沾仰賴皇上𢎞福雨𤾉時若田禾茂盛各屬糧價亦因之日漸平減合行恭報上慰聖懐謹奏春雨優渥朕心深慰但章奏中動稱仰頼𢎞福此等語朕實厭聞爾等若不秉公察吏顛倒刑政縱容衿棍肆行無忌以至百姓銜怨含寃則乖氣致異惟仰頼朕一人之𢎞福以感召天和可乎似此不經虚文諛奏有何益處觀所言之不實即卜中情之偽矣果能竭力効忠殫心奉職上天之眷祐朕可信其必也將爾科甲虚套習氣務湏盡情洗滌若少留一分必受一分之累戒之同日又奏為奏明事竊查院司分規經臣奏明以充解餉添平之費如有餘剰聽作彌補從前掛批之用巳奉㫖准行在案今雍正六年春季部撥西餉一百三十六萬兩查運解西餉並無添平飯銀之費臣因通查此番省用之分規以及庫存餘平併七分耗羨共銀四萬六千七百三十八兩零查前撫臣陳世倌於雍正三年賑濟被水貧民曽動用濟南東昌臨清博平等府州縣倉榖原議院司道府公捐還項統計應捐共銀七千三十四兩迄今事隔三載官多更易既不便責令後官代捐又不便著落前官賠補臣請將此番節省之分規等項銀兩内撥出七千三十四兩以補當日未捐之項庶以公完公而倉項不至虚懸矣為此謹奏此事宜確察的實朕意其未必然也不過借此巧為開銷虧空耳若前項倉榖果因濟貧動用今為之買補還項正所謂以公完公當然之舉也雍正六年四月二十六日山東廵撫臣塞楞額謹奏為遵㫖查明覆奏事竊查河工効力人員等支給養贍銀兩一案經布政使岳濬具摺奏稱河工効力仇廷樞等十四員經前任廵撫陳世倌批准毎月毎貟給薪水銀四兩此項應否停止欽奉硃批與廵撫酌量如果實心効力又當一論如陳世倌狥情給發不但應行停止從前給過之項還當著落陳世倌賠補又奏稱侍衛張炳等四貟先准兵部咨開此等人員應否給與俸禄酌量辦理随經布政使張保議給養贍銀四兩武進士范學海等亦經張保詳明一體支給此項或應停止或應酌減伏候聖裁批示等因奉硃批亦如前諭欽此臣㑹同商酌細查原巻仇廷樞等俱稱身家􅇻實在部具呈情願効力之員若又給與薪水是與情願効力之意不符陳世倌批令給領甚屬不合臣任内仍聽照前支領疎忽之咎亦實難辭相應将仇廷樞等在陳世倌任内支領過銀兩著落陳世倌賠補在臣任内支領過銀兩臣應照數賠還查侍衛張炳武進士范學海等與情願効力人貟有間其支過銀兩可否准銷出自聖恩至効力各貟不應支給臣失於詳查不勝惶悚待罪之至叩懇皇上天恩恕臣愚昧免臣檢舉實臣之厚幸也為此謹奏如果實心效力著有勞績則不必追賠若並無效力之處虚糜月費則應著落本人賠補係陳世倌狥情批給則當著落代賠朕原㫖甚明今此等處俱未聲明遽議令陳世倌賠補朕殊不解一切辦理不求允協總為一已地歩起見陋矣硃批諭㫖巻二十六
