body:
  text: 欽定四庫全書硃批諭㫖巻二百十四之一硃批郝玉麟奏摺雍正二年正月二十一日雲南提督臣郝玉麟謹奏為奏聞事雍正元年十二月二十一日臣遵奉諭㫖酌帯官兵前赴中甸駐劄揚威塞外所有起程日期先經題報在案今於雍正二年正月初六日到中甸喇嘛夷民數百餘人赴營叩見臣示以皇上恩威命臣帯兵到此保固伊等地方至意觀衆百姓感激情形出於誠實而恐懼之狀亦甚其喇嘛頭人臣各重賞紬縀煙茶等物俱歡欣領受散去至初八日千有餘人復来行營呈遞投狀情願歸順天朝隸入版圖呈開戶口名數竝將羅卜藏丹津先年給與各頭目之劄付八張投繳行營臣一面令其將地方四至并戶口清册速行查報一面將中甸營官八柱金圭七里等給以外委守僃劄付頭目等給以外委千把總劄付喇嘛給以僧綱司職銜其所繳羅卜藏丹津之偽劄臣當即差送督臣訖查中甸地方前雖招撫因用兵西藏軍務紛繁原未議及歸併今復呈投戶口繳送偽劄則夷民益深向化將来作何安頓俟撤師之後另請睿裁本年正月十七日又准雲貴督臣髙其倬咨稱准兵部咨開總理事務王大臣等㑹議令提督郝玉麟帯兵二千名前往察木多揚威駐劄其中甸地方亦屬緊要著總督髙其倬於總兵官内選擇一員帯兵五百名替郝玉麟在中甸駐劄等因轉奏奉硃批依議著速行欽此移咨到臣臣查中甸甚屬緊要總兵一員足資彈壓兵丁五百名稍覺單弱臣愚以為中甸須安兵一千名始足以壯軍聲臣觀地理情形由中甸前進六七日至阿墩子地方乃係各處咽喉扼要據險此處須安遊擊一員帯兵五百名駐劄過阿墩子至察木多程途尚逺險要處所頗多必須預僃兵丁五百名臣躧㸔形勢隨處安設又調麗江土兵二百名通事十名隨營遣用前後照應聲息相通臣即應援西藏而貼近雲南之地方可保無虞再自阿喜至瓦河原有䑓站去嵗藏兵撤回已經檄調回營今臣既在察木多駐劄一切軍機皆闗緊要必須照舊安設䑓站除咨明督撫二臣外竝飛催駐劄之總兵速赴中甸臣謹遵部議即日起程前往察木多臣䝉皇上深恩畀以封疆重任今復奉命提兵出塞凡有見聞微臣力所能為惟有竭盡血誠少報主恩於萬一所有臣到中甸情形竝奉㫖前進調遣官兵緣由合先繕摺奏聞伏乞皇上睿鑒施行謹奏覽所奏一切機宜料理周詳甚屬可嘉朕心深為慰悅爾此番頗著勞績已諭明該部事平之後加恩議敘至西海目今情形大局既定諒從此未必有大費心力之處矣雖然仍須加勉加慎毋忽雍正二年三月二十六日雲南提督臣郝玉麟謹奏為奏聞事雍正二年二月初二日臣遵奉諭㫖帯領官兵自中甸起程前赴察木多駐劄揚威先經題報在案臣出口之後即遣人於各處密探賊人信息兹據各處差人陸續回抵軍營禀稱裏塘巴塘喳呀天柱寨察木多等處四川現有官兵駐防地方安靜惟差往擦哇崗之人抵營宻探得擦哇崗一帯有西海之人在奔打常川等處要馬匹硝磺鉛子等物并據達賴喇嘛差至擦哇崗辦事頭人哈浪巴暨營官順巴等專差投到番禀臣譯出内稱正月二十五日有西海差人一名札石到奔打要奪奔打地方大話恐嚇百姓說青草出時西海有兵前来番民甚是恐懼望大兵速進等語臣因擦哇崗係進藏要路此處原無官兵駐劄與西海相通羅卜藏丹津遣人由此路出来探聼軍情此必有之事臣隨即派撥漢土官兵先命遊擊李君賢等宻示以擒拿賊人之法飭令兼程前往臣帯領大兵尾隨䟎程而行及抵阿墩子地方接奉大將軍年羮堯令諭西寧大兵三次殺敗賊衆今探聞羅卜藏丹津遁藏敖拉木葫蘆若大兵進𠞰便欲逃入西藏命臣四處探訪如遇西海諸賊欲逃入西藏者即當截𠞰等因奉此臣已知擦哇崗奔打一帯現有賊人是以兼程而進賊人不虞大兵驟至逃遁不及於三月初七初九等日在擦哇崗拏獲姦細賊人結松翁布等四名於巴樹地方拏獲賊人扎石等三名於處扎地方拏獲賊人托各司哈等六名以上共拏獲十三名臣逐一嚴訊詰松翁布扎石布㡬托各司哈托賴波羅阿麻秃敦魯汪琱等九名俱係西海遣来探聼軍情煽惑番夷之人臣詢明之日即將該犯等於擦哇崗正法示衆至披得阿㡬阿前楚兇等四名臣逐一嚴查細詢實係本處之人因扎石等到此地方跟隨伺候原非同謀准其保釋再臣統領大兵一路揚威逺近聞風畏懼奔打至薄湏常川一帯地方有四百餘里其間黑帳房之人向服西海管轄今聞臣到擦哇崗甚是恐懼疑惑臣乗機先遣人前往宣揚我皇上聖徳神功中外一體之至意該夷民等喜懼交集有木魯巴墩地方頭人素囊工波常川中地方頭人奔特之倉竹墨巴工卡地方頭人彌納等赴營叩見咸稱情願投順天朝臣隨命開造戶口數目據開四至人數共五百五十三戶又據巴樹地方喇嘛處丕松并火頭札機等投狀内稱我們原是達賴喇嘛的百姓被西海的人時常出来騷擾正無處告訴苦情今幸大兵到此我們願百年做萬嵗爺的子民等語據開戶口四至喇嘛一百八十名戶口二百一十戶具有投誠番信共四張理合恭呈御覽查現在投誠之各地方向係擦哇崗洛龍宗營官等所管臣仍令其照􅃇管轄并命守僃李進帯領官兵二百名暫行駐劄彈壓再營官順巴亢者泥實屬盡心出力拏賊深為可嘉臣各加重賞併給牌奬勵外合併奏明所有臣抵擦哇崗拏獲姦細安撫夷民情由謹繕摺專差千總捧齎馳奏伏乞皇上睿鑒施行謹奏覽奏一切料理安撫妥協之至朕深為嘉悅今西海大局已定此後可免枕戈負盾之勞矣去冬值冰凍草枯嚴寒之際諭調出口日期促廹汝及將弁兵丁不知如何辛苦朕每一回思輒軫念不置幸䝉上蒼䕶祐大功告成不日事竣旋軍永享安閒正有日也雍正二年閏四月十三日雲南提督臣郝玉麟謹奏為恭謝天恩事竊臣遵奉諭㫖帯領官兵駐劄察木多於四月初三日到汛閏四月初八日據臣齎摺千總回營捧齎到聖主硃批奏摺併欽賜臣孔雀翎子暖帽一頂貂皮二十張克食一匣丸藥一匣御書福字一張又齎到永北鎮總兵官馬㑹伯回滇時皇上御筆特賜臣糾桓偉畧綾匾一幅貂皮八張寧紬三疋又領到恩詔賞賜大縀四聫臣隨率領軍營將僃弁員逺迎跪接捧至駐劄處所恭設香案望闕九叩謝恩訖臣跪讀硃批欽奉温綸奬勵實切赧惶復䝉賞賜尚方諸物夷漢稱榮旌旗生色臣自問何人膺兹異數感激下忱實難言罄惟有竭盡犬馬血誠以圖仰報髙深於萬一耳為此繕摺奏謝并繳硃批謹奏覽卿奏謝知道了路途窵逺此等奏謝之摺不必特遣人来或乗奏事之便或附題本齎進為是即朕硃批俟積至數件彚繳亦不為遲至若緊要機宜及特㫖詢問之事則又當一論也雍正三年四月初三日雲南提督臣郝玉麟謹奏為奏聞駐劄官兵情形上慰聖懐事竊臣仰䝉聖恩帯領官兵二千名駐劄察木多迄今一載屢䝉皇上垂念將弁兵丁頻加恩賞官兵莫不感激思奮臣思駐劄官兵月有口糧鹽菜察木多食物價值雖貴兵丁闗支折給鹽菜亦足日用惟餧飬馬匹草料出産無多未免價昻臣與督撫二臣商酌接濟上年十二月督臣髙其倬撫臣楊名時布政使臣李衞仰體皇上愛恤官兵之至意自臣以下或製送皮衣或捐給銀兩每兵各賞皮衣一件差員押解軍營散給今年三月又解幫臣盤費銀一千兩叅將遊守千把各幫銀六十四十二十十餘兩不等漢土兵丁毎名又賞銀二兩官兵飽食煖衣人人自勵踴躍歡欣臣恐上厪聖懐理合繕摺奏聞謹奏所奏知道了朕仍另有殊恩髙其倬等原係實心任事之臣皆朕素所洞悉者奉㫖薦舉一摺留中同日又奏為營伍務在得人人材宜加鼓勵妄陳末議仰請睿裁事竊查雲南地界極邊民夷雜處武職雖無刑名錢榖之責然必須熟悉地理情形諳練營務之員方能和輯兵民整肅營伍我皇上眀竝日月滇省副叅遊擊員缺特允原任提臣張國樑越銜題補之請邉徼武臣人思奮勵惟是守僃一缺荷䝉聖恩揀選年滿千總分發補用末職微弁仰煩聖慮自必矢竭犬馬以圖報効但滇省自用兵以来現任營千把總人人用命有駐藏經年出口數次各處邉情知之􅇰悉者倘及時收用則人地相宜即表率之官亦得收臂指之效臣愚以為揀選之千總固所當用而營中之千總亦須間補請嗣後滇省有守僃缺出先補揀選千總一員後補營千總一員臣與督撫二臣㑹疏保題令該弁隨本引見倘邀俞允則邉地得人而士卒弁目人人感激思奮矣是否有當伏乞皇上批示遵行謹奏此奏甚屬可嘉已有㫖諭部矣雍正三年八月二十二日雲南提督臣郝玉麟謹奏為奏聞事竊臣帯領漢土官兵二千餘員名駐劄察木多揚威策應隨遣將僃弁兵於各地方不時遊廵查訪於雍正三年正月初九日據臣遣永北鎮千總張文逺遊廵䝉古揭雜處卡地方回營禀稱一路畨民各皆安靜有西海所屬覓食䝉古男婦七八十人住在䝉古揭雜處卡彼地頭人正欲帯領前赴察木多投順天朝適遇千總遊廵一同帯領頭目二人来營臣隨詢問何人部落二人名字據禀是丹仲部落因屬年八月内羅卜藏丹津與竹囊打仗差兩箇官帯兵把我們一千家百姓裹来粟魯木地方住著被裹百姓俱各四散我們二十多家百姓因沒騎䭾的牲口就在粟魯木地方住下屬龍年十二月有雜處卡的人㸔見我們說如今察木多到了一箇大官呌作提督在那裏安撫地方你們為甚麽不去投我們聼見隨跟著他到雜處卡男人四十名女人四十一口我們是窮百姓只求做主永逺做萬嵗爺的百姓名字一箇呌卡特之一箇呌敦住等語臣詢問確實隨重加犒賞命䝉古掲雜處卡頭人將卡特之等男婦暫行㸔管一面報明大將軍年羮堯作何安插去後四月二十七日准年羮堯咨覆内開丹仲所遺部落現有在松潘口外住牧者應令同歸一處已咨四川撫院酌捐盤費銀兩將卡特之敦住男婦俟青草茂盛之時令其速回松潘口外與丹仲所遺部落一同住牧移覆到臣臣於五月二十二日派委營弁多給銀兩帯兵三十名將卡特之等男婦趁青草茂盛之時押送起程往松潘口外與丹仲所遺部落一同住牧訖續於八月初四日據差弁帯兵回抵軍營稟稱已將卡特之等送到彼處取有地方頭人宻崗處之收明信子等語今八月初六日准駐藏松潘鎮總兵官周瑛移咨於七月二十九日自藏起程赴察木多臣俟周瑛一到即帯兵由乍丫巴塘一帯地方㑹勘地界所有臣在察木多料理遣回卡特之等并地方寧靜縁由謹繕摺奏明伏乞皇上睿鑒施行謹奏覽所奏料理甚屬得當知道了至查勘地界一事須悉心籌畫務期行之久逺萬全無礙方好周瑛到時與之和衷盡力辦理可也雍正三年十二月初二日雲南提督臣郝玉麟謹奏為奏眀事竊臣遵奉諭㫖㑹同周瑛􅂿勘地界臣與四川提臣周瑛㑹勘得察木多乆歸四川自康熈五十九年用兵西藏以来川省駐防官兵一切輓運夫馬畨民甚是馴熟且程途離雲南六十餘站離四川五十餘站而附近察木多如擦哇崗洛龍宗類五齊碩般多等處地方亦久屬四川徵收錢糧雲南勢難越界遥為控制即畨民亦復呼應不靈臣與周瑛㑹議察木多自應仍歸四川方為妥便至臣於雍正二年春奉㫖帯兵駐劄察木多揚威協剿西海所屬南稱巴卡索媽䝉古掲畢利并附近小地土畨赴臣營盤投誠計二十七處臣節次造册報眀年羮堯并彚疏題眀在案後奉年羮堯令著臣就近委川滇兩省文武查勘量其逺近秉以至公應歸何省管轄臣隨檄行察木多兩省文武㑹勘確實去後隨又奉年羮堯令行令奮威將軍岳鍾琪查眀投誠各地方應歸何省管轄據奮威將軍覆稱南稱巴卡索媽䝉古揭畢利四處俱與四川相近應歸四川至於小地土畨皆係僻壤未經親歴應俟雲貴提督呈覆至日仰請衡奪等因前来臣又據川滇兩省文武㑹詳内稱㑹查雜處卡各地方皆與擦哇崗察木多二處相近離雲南之中甸甚逺南稱巴卡四處奮威將軍現議歸川而雜處卡各處與南稱巴卡四處均屬相通卑職等㑹查各地方俱在察木多之東北西北與察木多相通似應併歸四川庶為畫一等情詳覆到臣臣據情呈報年羮堯在案今臣與周瑛又復㑹查察木多既歸四川則南稱巴卡并各處小地土畨俱應歸四川便於管轄再乍丫離察木多七站為巴塘裏塘之要路而巴塘裏塘係打箭爐之門戶久入四川版圖今應仍歸川省臣與周瑛親至各地方㑹勘確實並無異議抑臣與周瑛再查中甸貼近雲南而阿墩子為中甸之門戶其宗喇普為西奔子欄等處又皆與中甸相通應俱歸雲南實為近便易於管轄臣與提臣周瑛㑹查眀白隨連銜具文移咨川陕督臣岳鍾琪雲貴督臣髙其倬應聼兩督臣詳加確商㑹疏具題今臣已撤兵回署所有奉㫖㑹勘地界理合繕摺繪圖恭呈御覽伏乞睿鑒謹奏朕已降㫖於岳鍾琪命爾等兩省文武㑹議具奏矣覽爾此奏甚屬妥協大約與岳鍾琪意見相同同日又奏為微臣戀主情殷恭請陛見仰乞俞允用伸積悃事竊臣一介庸愚荷䝉我皇上特達之知由副將拔至總兵未及一載畀以雲南提督任大責重蚊負堪虞到任後曾經疏請陛見未䝉恩准今臣已由察木多帯兵回署犬馬戀主之心愈深且篤伏乞皇上允臣赴京陛見叩請聖安俾微臣積悃獲伸邉地情形得以面奏臣之踴躍歡忭逈出尋常萬萬也臣無任懇切待命之至為此繕摺奏聞謹奏爾兩年以来勞於國事今暫回滇可且休息數時聼候朕㫖況總督莅任方新地方闗係緊要豈宜逺離雍正四年七月十三日雲南提督臣郝玉麟謹奏為恭謝天恩事竊雍正三年十二月十八日臣齎摺千總回署捧到恩賞臣貂皮八張雍正四年三月二十四日臣家人捧到臣恭請陛見一摺回署䝉賜大福字一張臣俱出郊跪迎至署恭設香案望闕九叩謝恩祗領訖伏念臣知識短淺謬荷聖恩畀以重任所辦之事皆闗軍務是以繕摺奏聞廼䝉皇上睿照仰邀恩奬復賜珍竒榮寵愈深悚惶倍切惟有竭盡犬馬血誠以報主恩於萬一而已理合繕摺奏謝伏乞睿鑒謹奏覽奏謝知道了觀爾全無漢軍頑劣習氣朕甚嘉之何有多諭但當加勉毋怠雍正五年正月二十四日雲南提督臣郝玉麟謹奏為微臣積悃未伸犬馬戀主益切叩乞聖慈恩淮陛見事竊臣於雍正三年十一月撤兵回任隨具摺叩請陛見荷䝉硃批臣欽遵祗候但臣仰望闕廷又經一載日盼恩綸未䝉下沛我皇上御極已經五載天下文武大小臣工咸得瞻天仰聖而况駑鈍如臣受恩深重如臣且荷萬里巖疆而猶未聆聖訓未請聖安犬馬之私何能自慰今察木多官兵已奉㫖回汛滇省時和年豐地方人民樂業督臣鄂爾泰到任已經一載事事仰遵聖訓調劑得宜兵輯民安而臣之積悃未伸即飲食寤寐無時少息伏求我皇上念萬里微臣戀主之心益深且切允臣所請俾臣得恭覲龍顔面聆聖訓臣之踴躍歡忭更出尋常萬萬也臣無任激切待命之至謹奏烏䝉狆苖地方新定兼有安南立界之舉俱係創始之事全賴爾等彈壓綏輯豈可逺離職守且爾之来為欲聆朕訓誨耳督臣鄂爾泰乃朕之股肱心膂深知朕意之人汝但一一聼其指示相與和𠂻共事雖不来京即如聆朕面諭一般内外滿漢文武大臣中鄂爾泰實為目今第一良臣人各具有良心就爾意見以為何如寧不當視為模範而效法之耶汝若能如鄂爾泰之居心以事朕則朕待汝亦必一如待鄂爾泰也設不如是則汝亦不能邀朕如是信任如是恩寵也諸凡務勉一誠字勉之勉之雍正五年三月二十四日雲南提督臣郝玉麟謹奏為鎮沅地方平定首惡俱已就擒夷民漸次復業事竊照鎮沅夷賊勾通威逺猓黑放火焚燒府署殺害印官臣聞報之次即㑹商雲貴督臣鄂爾泰管廵撫事臣楊名時一面遣發官兵前往擒𠞰先經奏聞在案續據臨沅鎮協等咨報鎮沅惡夷縱火燒官盗放監犯不法已極亟宜四路合兵速行撲滅隨經各路分兵進𠞰先後拏𫉬賊人七名等因又准臨十四日會合直抵鎮沅賊衆各皆逃散惟革職土府刀瀚之子刀輔宸𢃄領夷目刀沛等十數人迎接查勘城内僅存刀瀚之母數人百姓兩家并兵丁家口八十二名口現兵十四名隨𤼵告示安撫兵官孫𢎞本亦隨抵鎮沅府􅃀查為首逆賊將已經拏𫉬之刀西眀陶奔歸等嚴加扭鎖禁守行營其未𫉬之刀如珍等分遣官兵嚴加搜緝業已陸續拏𫉬移報到臣臣查現在拏𫉬之要犯已五十餘人脅從餘犯一百餘人其未𫉬之犯現飭擒拏至刧去之鹽課已追出􅌳官夷民逃避者漸次復業但查元江普洱新平威逺一𢃄地方均係魯魁哀牢山箐向住各種猓賊雖設有土官土目然而撫禦失宜往往焚燒刦掠是以前督臣髙其倬叅革威逺土知州刀光煥改土歸流安設文武督臣鄂爾泰到任後亦將鎮逺土府刀瀚等特疏糾叅改土設流查威逺鎮沅係新經改土地方猓賊惟以刦殺為生若不趁此擒𠞰地方終難寕靜臣現赴省城與督撫二臣面商凡不法夷猓務盡根株使之懾服斷不肯姑息以貽後患至鎮沅地方題請改土歸流尚未及安營雖撥有汛防兵丁力單不能堵禦是以逆賊敢於狂逞臣與督撫二臣面商善後之計俟酌議安設官兵妥後會疏具題所有地方已經平定賊首悉已就擒緣由理合繕摺奏聞謹奏此事據鄂爾泰亦經奏聞皆因卿等公忠為國有以鼓勵兵弁俾各奮勇報効之所致朕甚嘉悅至一切善後事宜更與督臣悉心籌畫務講求一勞永逸之策而為之可也雍正五年五月二十六日雲南提督臣郝玉麟謹奏為奏明事竊照奔子欄劃分地界喇嘛東珠札什頑梗煽惑情形經臣於雍正四年十一月繕摺奏聞仰䝉皇上至聖至明無微不照雍正五年三月初十日臣䝉兵部劄付内開議政大臣㑹議得喇嘛東珠扎什甚屬姦詭生事不可留在奔子欄地方應行文管理奔子欄地方官員將東珠扎什拏送四川其郝玉麟料理歸入中甸管轄者甚是作速行文總督岳鍾琪照依郝玉麟辦理可也等因轉奏奉㫖依議欽此欽遵劄行到臣查東珠扎什臣未奉部文之先據雲南駐防阿墩子遊擊報稱奔子欄喇嘛東珠扎什於正月二十二日帯家人已往四川所屬之巴塘去訖臣一面飛咨四川督撫提臣就近查拏并請撥巴塘營官一人来滇管理割歸地方等因移咨去後一面行知駐防奔子欄地方文武并出示曉諭番民四月十四日據雲南委官管理中甸原任劍川州知州楊正輔遊擊顧純祖詳報内稱川省委知州張植守僃張聖學將東珠扎什帯至奔子欄㑹同𫝊集奔子欄其宗喇普等處頭人喇嘛番民宣播皇仁眀白開諭化誨頭人喇嘛番民俱各悅服歸滇出具永不滋事甘結并將改歸滇省等處地方勒石定界訖其東珠扎什川省委員接奉川省督撫擒拏赴省之文已將東珠扎什押解成都并撥巴塘營官喇嘛羅藏洛竹移交滇省委員暫行管理割歸滇省之奔子欄等處一帯地方各等情詳報前来臣查東珠扎什已去奔子欄番民又目睹聖諭俱各歡欣鼓舞心悅誠服願歸滇省而兩省委員㑹勘勒石立界之處亦明晰妥當今巴塘已撥有營官羅藏洛竹来滇仍􅃇管轄各地方則邊地自可永逺乂安矣所有疆界分定夷民悅服情形理合繕摺奏聞伏乞皇上睿鑒施行謹奏據奏川滇兩省立界明晰欣悅覽之善後事宜全賴用得其人慎之毋忽雍正五年八月初十日雲南提督臣郝玉麟謹奏為宻陳安南情形仰祈睿鑒事竊惟安南一國自本朝定鼎以後首先歸順臣服近因立界鉛厰河該國王心懐怨望檢查誌典開化府之馬鞍山賭咒河一帯離府治二百四十餘里原係天朝疆土今安南私侵一百二十里我皇上厚徳深仁念彼國王恭順有年止立界於四十里之鉛厰河實懐逺綏柔至意該國王理應感戴聖恩益加敬謹不謂執迷不悟督臣鄂爾泰反覆開導猶未猛省昨頒發諭㫖督臣差員送至開化府總兵臣南天祥差員齎赴鉛厰闗前往都龍令守闗土目迎接該土目黄文綏不即恭迎據稱馳報國王修寛大路然後迎接等語臣思安南偏僻一區何敢慢違或係土目不明大義彼國王竟未及知亦未可定果如土目所言兩月為期敬謹来迎聖㫖臣又何言設延捱日久總不接㫖國體攸闗臣等身任封疆實難隱忍擬即請㫖興師問罪今臣赴省㑹審與督臣鄂爾泰反覆詳細籌畫興師動衆事闗重大莫若再行曉諭開其自新不動兵戈此為上策倘彼終始執迷則必須覆其巢穴以為不臣者戒查進兵大路一由廣東一由廣西一由雲南蒙自開化等處如果動兵必合三省之師㑹𠞰彼國分兵牽制勢必瓦解臣與督臣宻籌飭令開化鎮臣南天祥整僃兵馬不時探聼動静察其虛實議督標提標各僃兵一千名於各鎮協營挑備兵馬共成一萬再僃土練三千派臨元鎮臣孫𢎞本鶴慶鎮臣張耀祖分兵管領議臣督率統領由開化一路進兵貴州議僃兵五千派安籠鎮臣蔡成貴管領督臣鄂爾泰駐劄適中地方節制調度合數省之兵威而滅此小醜實有不難也臣查鉛厰河立界之處離都龍闗不逺各處隘口甚多臣與督臣商酌必湏親往查勘險易情形臣現在輕騎減從潜赴蒙自開化邊界審視閱㸔設或用兵則凡相通隘口皆當堵塞防僃未雨綢繆臣等身荷重寄敢不謹慎或探有情形另行奏聞外謹繕摺專差標員捧齎馳奏伏乞睿鑒裁示遵行謹奏未雨綢繆僃而不用則可興師問罪之舉朕意不然另有㫖諭鄂爾泰矣雍正五年九月十六日雲南提督臣郝玉麟謹奏為勘明邉界情形仰祈睿鑒事竊惟安南不即恭迎諭㫖臣於雍正五年八月初十日宻陳彼國情形并預僃兵馬聲眀前往開化䝉自邉界審視閱㸔緣由繕摺奏聞臣即於是日起程於十六日到鉛厰闗查得沿邉一帯闗隘塘汛俱極嚴宻民人安堵禾稻豐茂無比臣嚴諭守汛弁兵廵查毋懈又至臨安府所屬蒙自縣地方察㸔明晰於本月二十六日兼程回至雲南省城見督臣鄂爾泰僃述一帯情形隨據宻探人役禀報彼國竝無多兵聞天朝有僃兵之說甚是惶懼臣與鄂爾泰復加斟酌又經推誠曉諭宣布皇上聖徳神威飛行開化鎮守闗守僃楊顯珍𫝊諭去訖今於九月初八日據守僃楊顯珍禀報據安南宣光鎮土目黄文綏禀稱本月初一日夜奉本國王回音内云天朝覆載為心海涵其量本國王一心恭順始終不渝今聞天㫖當委副都指揮使陳徳厚就交界處齊整跪接迎領等語轉禀到臣等督臣鄂爾泰隨飛諭開化鎮臣南天祥守僃楊顯珍𫝊諭土目陳徳厚等務湏恭設儀仗敬謹祗迎臣細閱該國王回音詞語懇切上凛天威仰懐聖徳實有悔艾輸誠之意所有臣勘眀邉界情形并據報該國王迎領諭㫖回音恐厪聖懐謹先繕摺奏聞謹奏朕惟恐因此啓釁致生事端則國家有欲罷不能之勢今覽所奏朕懐深為慰悅矣雍正五年九月十七日雲南提督臣郝玉麟謹奏為奏聞事竊臣於本年六月奉㫖㑹審鎮沅逆犯一案自大理府起程歴趙州雲南縣并楚雄廣通等處至雲南省城雨水調勻禾苖豐盛固已心慶有秋及至雲省躧勘開化之鉛厰闗所至宜良路南彌勒阿彌臨安䝉自建水江川通海晉寧呈貢各府州縣正在收穫之際親見禾稻茂盛無比及自開化回省據臣標中軍叅將禀稱大理府先農壇所植稻榖并民田禾苖有二穂三穂之異旋據大理府知府陳克復將二穂三穂禾稻呈送督撫二臣臣共相觀㸔慶喜非常并據鄂爾泰云今年通省田稻二穂三穂不止大理一處臣恭遇昌時欣逢嘉異不勝踴躍歡忭之至事闗地方嘉禾呈瑞情形臣謹繕摺奏聞伏乞皇上睿鑒謹奏覽收穫情形洵可為滇民稱慶也雍正五年十一月二十一日雲南提督臣郝玉麟謹奏為飛報安南國迎請敇書事雍正五年十一月十九日據開化鎮臣南天祥咨稱雍正五年十一月初七日據本標署理中軍遊擊王無黨右營守備楊顯珍等禀報本月初六日午時安南國王差工部右侍郎阮仲義翰林院待制阮逢時前来迎請敇㫖口稱本國備員外藩世沐天朝太平洪福身受聖主懐柔重恩鄂部堂控馭嚴仁撫提大人輯睦周摰鎮帥整綏兼施以故中外肅清邊隅寧謐今䝉皇上特賜敇書仰見聖主大造為心萬物一體本國君臣黎庶何幸邀此遴遣陪臣小吏敬備龍亭儀仗結隊出闗恭迎聖㫖是日午刻安南國工部右侍郎阮仲義翰林院待制阮逢時率領外郎土目六十餘人交兵三百餘名俯伏闗前三跪九叩山呼萬嵗鼓樂彩旌迎進都龍闗齎赴宜京等因除具文呈報督部院外相應咨報同日又准督臣鄂爾泰咨同前事竝停止備兵縁由各等因移咨到臣竊照安南立界一事我皇上懐柔逺人特賜敇諭彼國即應敬謹迎領廼敢遲延時日國體攸闗是以督臣商酌備兵臣復潜往各處要隘細察情形彼國土目人等覘知備兵之舉恐懼疑惑隨據守闗守備楊顯珍禀報該國土目黄文綏奉國王回音差委都指揮陳徳厚就交界處齊整迎領竝呈送差員接㫖印文情由經臣於九月十六日繕摺奏聞嗣於十一月二十二日接督臣鄂爾泰錄示皇上宻㫖又奉硃批臣摺未雨綢繆備而不用則可興師問罪之舉朕意不然另有㫖諭鄂爾泰矣欽此欽遵臣跪讀之下益見我皇上聖明逺照寛大之恩天地同量臣逐一誦記於心不敢稍有孟浪今據開化鎮臣南天祥咨報安南國另差工部侍郎阮仲義翰林院待制阮逢時等於十一月初六日迎領敇㫖該國君臣感激聖主天恩詞語甚是懇切總皆我皇上徳威普被海隅日出之鄉無不沐浴聖化仰戴生成臣䝉聖恩膺兹重寄惟有事事小心以盡職守仰報聖主於萬一耳所有安南國差員接㫖日期理合繕摺奏聞伏乞皇上睿鑒施行謹奏綏服外夷逺藩理應如是但此事該國王遵奉領㫖後朕尚另有諭㫖雍正六年二月二十二日雲南提督臣郝玉麟謹奏為奏聞事竊照茶山所屬地方袤延千有餘里一帯夷民名曰窩泥性極兇悍且與􅟱阯莽子老撾等國地界相連聲息可通倚為援護㒺知法紀截刼客商以及拒捕傷害官兵等事毫無顧忌上年九月十八日把總王朝選帯兵捕拏惡夷麻布朋等竟被傷害督臣鄂爾泰就近調遣漢土官兵奮勇進𠞰臣一面移行飛速前進一面選差解送籐牌火器等項星赴軍前調景䝉營千總李萬春趕赴臨元鎮總兵孫𢎞本營盤聽候調遣復差幹弁目兵接踵偵探陸續據報此番進𠞰之官弁兵丁人人奮勇爭先殺賊衆夷見官兵勢大俱各哀懇投誠首賊麻布朋并伊妻子媳三名口業經拏獲其逸賊克者老二及逆黨等獲日再報各等情通報前来臣復密移總兵孫𢎞本并行副將張應宗叅將邱名揚務將逸賊克者老二拏獲其餘安分守法夷民悉加安撫令其各安生業外臣思茶山界連外國逆夷肆行不法仰仗皇上天威督臣鄂爾泰調度咸宜目今大局已定然必圖善後之策邉境始得永逺寧謐臣因接奉部文奉㫖雲南派兵三千進藏隨於本年正月初一日到省與督撫二人㑹議即與鄂爾泰面商茶山事宜細加斟酌彼地疆界形勢以及險要隘口分布汛防應否改設郡縣必使頑梗夷民得沐聖朝治化湔改􅃇習始為久安長治之計督臣語臣擬親自前往因西藏軍務囑臣親行查勘督臣一面奏土司頭人以及夷民百姓宣布皇仁并分别賞犒伊等俱各俯首歡呼臣細察夷情甚屬淳樸一路田地亦多膏腴即順便訪問茶山大局據稱茶山地方甚屬遼濶每年所産普茶不下百萬餘斤鹽米牲畜俱係本地出産價值頗賤民人食用俱足等語臣今於二十一日已抵普洱距茶山地方六站俟到彼查明週圍險要各處地方確實情形作何分布營汛并應否設立郡縣之處容臣㑹同督臣鄂爾泰定議具奏所有官兵擒𠞰窩泥情形及臣起程日期并一路新設府縣地方夷情理合一併繕摺奏聞伏乞皇上睿鑒施行謹奏覽奏知道了此畨在事官兵赤心報効奮勇爭先甚屬可嘉但善後之策尤為緊要務湏綏輯得法方收一勞永逸之效全賴卿等慎重詳悉籌畫而為之如鎮雄烏䝉皆縁措置失宜委用不當所以致生事端當為前車之戒慎之毋忽雍正六年四月二十日雲南提督臣郝玉麟謹奏為勘明茶山情形竝獲要犯緣由仰祈睿鑒事竊照茶山窩泥不法一事臣於本年二月二十二日業將官兵擒𠞰窩泥情形及臣親往其地查勘要隘起程日期一併繕摺具奏臣自省起程曾經督臣鄂爾泰宻囑車里土舍刀正彦姦險狡詐煽惑窩泥務湏設法擒拏以安百姓以靖地方臣隨兼程到倚邦行營詢之總兵孫𢎞本云刀正彦狡詐百端屢調不出昨已遣發官兵指稱搜拏賊黨稽查地方以便相機擒拏該犯心虛膽怯聞官兵有渡江之信即行潜逃臣查車里緊接莽子等國逃竄至彼將為後患隨一面冩譯緬字鈐葢印信行文莽子老撾等國不許容留務湏協力擒拏并嚴飭軍前將弁務將該犯擒解又一面調集宣慰司刀金寳并土目夷民人等齊赴軍營陳設兵威宣揚聖主恩徳莫不感畏踴躍俯首嚮化其在事兵丁俱屬出力臣亦逐加犒勞即直進九龍江宣慰司地方自思茅茶山至此夷民所往皆係竹樓名曰掌子江形亦不甚寛然内外界限劃然攸分也臣到江上時訪聞莽撾等外國其一種恭順畏懼之狀不能言喻此皆我皇上徳威逺被是以邉徼夷民莫不咸遵法紀也臣因刀正彦尚未擒獲隨又至橄欖壩該犯所居之地察訪蹤跡實因外國不敢容留奔逃無路廼於三月初八日據副將張應宗等報稱千總陳安邦等於三月初四日在孟腊地方已生擒刀正彦并伊子二名義子一名隨從五名將次解到臣恐途中或有疎虞隨諭遊撃祝希堯督兵護解行營嚴令官兵加謹押解赴省訖臣另由猛崙慢林蠻磚等處復至倚邦普逺猛旺他箐思茅普洱元江一帯細勘回省臣查車里茶山地方普洱思茅是其咽喉九龍江橄欖壩廼係邉界藩籬緊接莽子界址更有慢達等處五渡口在在闗係緊要且一帯夷民依附心切幅員甚屬遼濶宣慰司刀金寳實實不能兼顧管理况地方所産普茶之外并有鹽井厰務必湏劃明界址布置全局安設文武彈壓治理則頑蠢可化淳良邉疆永獲寧謐矣至於一切應行事宜督臣與臣復委大理府同知佟世廕等前往悉心查明俟回覆到日臣等從長再加商酌妥協另疏㑹題外所有臣勘明要隘形勢以及生擒刀正彦縁由謹繕摺奏聞伏乞皇上睿鑒施行謹奏此一事實縁爾佈置有方所以兇苗不致漏網甚屬可嘉前於鄂爾泰奏到時朕已有㫖諭部矣同日又奏為據實陳明事雍正六年二月初六日臣接督臣鄂爾泰咨為前任鎮臣等事雍正六年正月十七日准兵部咨雲南鶴麗總兵官張耀祖奏稱原任鶴麗總兵官趙坤帯兵進藏曾代兵借過軍需銀一萬一千九百三十三兩五錢恭遇恩詔豁免此内趙坤侵蝕銀四千三百二十兩再查得回師兵丁找攴司庫錢糧内趙坤又用銀四千五百兩又跟役長支折給口糧銀六百二十六兩零今既查實理合奏明將趙坤侵蝕過銀兩仰請敇諭追還滇庫等因咨㑹到臣臣細檢前案逐一察訪查得此内情節原任鶴麗鎮臣趙坤代兵借過銀一萬一千九百三十三兩五錢内趙坤用銀二千兩遊撃李君賢用銀八百兩守備張有義用銀五百兩千總施善元何元李遇春李成林陳尚義楊從林孫成宗七員每員用銀二百五十兩共一千七百五十兩通共用銀五千五十兩查此項銀兩實係官借原與兵丁無渉不在豁免之内自應追出還庫不應給發兵丁至張耀祖奏稱回師兵丁找支司庫錢糧内趙坤又用銀四千五百兩一項臣訪此項銀兩為造報進藏功加部費之用前任永北鎮標遊擊南天祥鶴麗鎮標遊撃王之臣原議鶴麗鎮出銀四千兩永北鎮出銀二千兩麗江土府出銀一千兩共銀七千兩除在省備禮使用及鶴永二鎮差員人役盤費等項共去銀二千兩其餘五千兩係原任永北鎮千總楊洪緒帯往四川陕西同鶴麗鎮差役用銀五百兩交提督岳鍾琪銀四千五百兩作部費使用臣訪查前後情節如此除咨覆督臣鄂爾泰聼候查追定議具題外謹將查明情由據實奏聞伏乞皇上睿鑒施行謹奏此事據鄂爾泰備悉奏聞朕經有㫖明白指示令其料理完結矣雍正六年五月十九日雲南提督臣郝玉麟謹奏為奏聞事竊照烏䝉所屬大闗米貼等處界連四川巴布凉山所闗緊要先經督臣鄂爾泰確訪險隘情形㑹同臣等悉心酌議建設文武各官調撥兵丁分布駐防合詞具題在案詎有祿永孝之妻陸氏干犯憲典抗不服拘因委副將郭夀域帯兵捕拏該將輕忽大意致被勾通夷賊傷害官兵臣聞報之際不勝憤恨因茶山公事未竣不得分身赴省嗣准督臣咨開飛遣滇黔兩省漢土官兵竝照㑹四川建昌鎮星馳㑹𠞰合疏題明臣茶山事竣回省密差目兵分頭前至軍前探聼確情飛報隨據鶴麗鎮臣張耀祖咨稱統兵由左路前進先奪其險要於四月初一日大兵至米貼劄營賊已逃去初二日擒獲土人一名訊問陸氏下落據稱陸氏同賊首立之戶吞逃往井底欲奔􅋭上而􅋭上猓賊堅拒不容上􅋭遂踞住擂石䑓該鎮遣兵從後山而上鎗礮齊施殺傷夷賊六十二名餘賊棄闗而逃即於初三日遣遊擊等官分路飛攻井底於四月初七日同右路叅將哈元生㑹合一日連破三􅋭直搗門坎􅋭賊巢圍困攻打陸氏堅守闗隘不期哈叅將率領官兵從後路潜上猓賊驚竄陸氏同衆滚箐而逃哈叅將已派撥官兵極力搜𠞰本鎮又加飭催毋使脫但查黔省地界止至米貼而井底吞都門坎山廼四川地界呈請咨行四川嚴飭轉行堵禦等因又據哈元生擒獲川省徳昌土司主文梁嘉楷即羅美山訊供徳昌千戶幫陸氏夷兵二百名明係黨惡呈請移咨川省嚴拏究治等語當經督臣鄂爾泰一併飛咨川省去訖臣於本月十八日准督臣鄂爾泰咨據貴州威寧鎮呈報准鶴麗鎮咨開本年五月初一日有夷人阿母及到營禀稱五月初一日五更時分賊首水牛母機到夷人攴歪那租家要糧食被小的將伊綑拏追問陸氏下落說在硐裡藏著小的隨帯家人十名跟著水牛母機去拏陸氏果然在石硐跟隨賊人四五名被小的拏獲二名滚箐三名小的上前將陸氏拏獲交給官兵解赴行營拘禁本職隨賞給阿母及銀五十兩跟隨協拏陸氏夷人銀十二兩以示鼓勵等緣由具報又經督臣飛行在事鎮將等官竭力搜捕務將徳昌立之戶吞等一干賊黨即行𠞰擒以盡根株等因移咨到臣竝據臣所差目兵星夜赴榆面禀前情據此臣查陸氏女流何敢頑梗至此皆藉四川土司徳昌黨護并通凉山巴布夷賊干犯法紀今陸氏已經拏獲賊黨不日成擒目前事局漸次底定善後之圖必湏籌畫臣在省㑹同督臣細加商酌黔省米貼已議安設官兵或再量行添設自可無虞由江外直達建昌一路川省竝無營汛聲勢隔絶恐此猓賊終屬頑梗必湏將川省接壤黔省米貼等處安設塘汛官兵使内外聲勢聨絡則川黔地方俱獲寧謐已經督臣劄商建昌鎮臣趙孺俟其回覆到日咨商川省督撫提諸臣臣等當再加酌議請㫖定奪所有官兵進𠞰米貼及拏獲陸氏緣由謹繕摺奏聞伏乞睿鑒謹奏所奏以上事情朕業已早聞川省亦據奏稱米貼接壤之不法兇苖如雷波徳昌等土司當及時𠞰撫以圖善後朕經有㫖命川提黄廷桂親往調遣料理矣雍正六年九月初四日雲南提督臣郝玉麟謹奏為禀報事雍正六年八月初八日據駐防攸樂茶山普威營叅將邱名揚禀稱本年七月二十二日據駐防橄欖壩百總差兵楊顯明同客民劉之芳等赴卑職營盤禀報有刀正彦向日管轄之擺夷暨緬寺和尚於二十一日夜裏放火將客民草房燒著風急火猛沿燒刀正彦原住大樓致傷看守兵丁擺夷聚集多人特来禀報等情卑職竊思橄欖壩乃緊要之地逆夷如此不法應湏預備隨整頓本營兵馬竝分調各茶山火頭堵禦防範去訖陸茶山地方俱各安帖寧靜據此先於本月初一日據駐劄思茅臨元鎮總兵孫𢎞本咨報赴省㑹商安設營汛等事已經起程恐刀金寳年㓜不能約束不可不遣大員帯兵前往相機𠞰撫隨經督臣鄂爾泰飛檄孫𢎞本速回茶山臣即行調臣標兵五百名令守備施善元管領前至軍前聼孫𢎞本調遣督臣又檄行永順鎮撥兵五百名由景東一路前赴普洱㑹合竝行順雲營派兵前往江底地方遥為聲勢并示各鎮將方畧機宜於八月初十日據叅將邱名揚禀為飛報擊敗逆賊事七月二十四日有擺夷數百人各執鎗械等項聲言要替刀正彦報讎卑職即督率弁兵迎敵鎗礮齊施打死夷賊數十人餘盡敗竄又據千總燕鳴春到營禀稱奉令差查刀金寳親向千總泣訴云橄欖壩擺夷被緬和尚及刀正彦心腹叭護叭瞻等煽惑逼脅要我同反我斷不敢聼從惟有一心報效等語八月十一日逆夷聚集二三百到猛飬又被燕鳴春打敗帯傷逃去九月初一日又據邱名揚禀稱八月十八日據千總燕鳴春探差回報夷賊叭瞻等又煽惑附近橄欖壩之猛遮猛籠等處擺夷同叛口稱要分路前来等語卑職於各要隘處安設伏兵嚴整備弁待敵各等情據此臣查逆夷小醜本無能為一時被人煽惑原可不湏多兵臣與督臣再四熟籌因邉疆甫經歸附且夷性反復不可不大張軍威以禠逆夷之魄更使逺近夷民畏威懐徳是以遣撥各路官兵往查確情相機行事今漢土大兵雲集逆夷不日就縳俟具報到日臣當另行奏聞至一切安設事宜事定請㫖遵行所有據報逆夷黨惡不法臣等調遣官兵縁由理合繕摺奏聞伏乞睿鑒施行謹奏鄂爾泰俱備悉奏聞矣善後事宜當詳審為之雍正六年十月二十日雲南提督臣郝玉麟謹奏為奏聞事竊照橄欖壩逆夷刀正彦違悖功令拒捕不法前經督臣鄂爾泰遣撥官兵業已擒獲其黨羽緬和尚暨叭護叭瞻等煽惑附近橄欖壩之猛龍等處擺夷不法又經督臣㑹臣分遣各路官兵進剿以靖地方并屢檄臨元鎮臣孫𢎞本統領相機調度經臣繕摺奏聞今於十月初四日准鎮臣孫𢎞本及元江府知府遲維璽等咨稟稱逆夷於九月初九初十等日聚集千餘人突至叭泥欲来攻擊在營備弁等隨令衆兵奮勇殺出賊人退散仍屯聚江上必俟大兵齊集進𠞰殱厥渠魁淨盡根株以安地方等語據此查逆夷煽惑夷民督臣先已計及業經㑹臣派撥漢土官兵不下四千餘員名又經發給火礮器械解送軍前接應自可尅期底定但鎮臣孫𢎞本才具遲鈍不能應機𠞰撫臣再四熟籌與督臣細加商酌縁茶山橄欖壩各處經臣於本年春間遍歴要隘形勢稍為熟悉今議微臣帯領官兵二千員名於十月二十日起程前往適中之地駐劄調遣若逆夷已定臣即㑹同在事鎮將等官作何善後事宜細加籌畫移商督臣裁定庶邉疆永獲寧謐矣所有橄欖壩逆夷情形及臣帯兵前進縁由理合繕摺奏聞伏乞皇上睿鑒謹奏爾親往彼處相機調遣甚好已據鄂爾泰奏聞矣詳慎為之専待㨗音雍正六年十二月初四日雲南提督臣郝玉麟謹奏為𠞰平逆夷情形仰祈睿鑒事竊照橄欖壩逆賊刀正彦叭護叭瞻等煽惑夷衆燒燬民房恣肆不法督臣鄂爾泰授臣方畧囑臣親往調度臣統領官兵二千餘員名於十月二十日自大理府起程經臣奏明在案臣晝夜兼行於十一月初十日抵思茅准駐劄猛養總兵孫𢎞本咨稱承准督部院照㑹并准臣咨即撥官兵約於十三日攻取慢顙整板小猛崙橄欖壩九龍江等處臣隨於十一日自思茅即遣遊擊徐成貞帯領官兵六百餘員名指示路徑由慢薩等處過整空拉卡江務必奪取渡口去後續於十三十五十九等日據遣發攻取慢顙等處各路將備禀報官兵奮勇分路進攻賊徒俱各大敗逃歸橄欖壩衆兵乗勢追殺於十八日直抵賊巢賊見官兵勢大不敢拒敵盡皆逃竄各等情到臣臣即於十九日帯領官兵二十日抵橄欖壩查逆夷已渡整哈江藏匿臣即於二十一日親督官兵渡江奪取渡口賊人望風而逃渡口已得臣即在整哈扎營正擬策應九龍江官兵渡江進𠞰適准鎮臣孫𢎞本報㨗咨稱二十一日據遊擊郭佑民差人禀報遊擊徐成貞領兵自猛遮後路響礮從九江大渡口對岸抄出卑職佑民即應礮自大渡口督兵過江夹攻賊人大敗逃散已經官兵駐劄地方悉平等語臣查江壩等處逆賊煽惑夷衆拒敵官兵大干法紀今大兵到處膽䘮魂消不旬日間仰仗皇上天威尅期底定現在嚴拏逆黨造意首惡斷難漏網獲日解赴督臣察審定擬前因賊衆廹脅宣慰司刀金寳同反金寳不從被賊衆擁挾前往猛混臣即差彼親信夷目等再四開誠曉諭給賞招徕今於十一月三十日刀金寳已回江上原處住所至被脅夷民已諭軍前各官相機善為招撫去訖臣抵壩之後陸續招出夷民五百餘戶節經咨報督臣在案其招徕各寨頭目臣宣布皇上寛大之恩𫝊諭人民各安生業并飭該目等管束化導隨酌加賞賚俱各歡欣踴躍未歸夷民現在源源而至所有地方一切善後事宜最闗緊要鎮臣孫𢎞本病瘧痰湧已於十一月二十六日身故容臣㑹同在事軍前文武各官悉心籌畫咨商督臣另疏奏請睿裁所有𠞰平逆夷情形安戢一帯地方暨撫慰夷民縁由理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏深為慰悅在事將領兵弁俱屬可嘉之至具題到日另有恩㫖諭部施行其一切善後事宜爾與鄂爾泰殫心籌計辦理務令妥協可也硃批諭㫖巻二百十四之一欽定四庫全書硃批諭㫖巻二百十四之二硃批郝玉麟奏摺雍正七年二月初四日雲南提督臣郝玉麟謹奏為微臣瞻天念切恭請陛見以伸孺慕事竊臣碌碌庸材毫無知識䝉皇上畀以提督重任屢沐殊恩涓埃未報屢請陛見未䝉俞允臣又何敢再凟惟是臣受恩獨深與衆不同天下大小臣工無不得覲龍光臣從未泥首闕廷瞻天仰聖且臣更有面奏之事午夜思維寸心如結今口外地方安靜無事滇黔軍務俱已告竣橄欖壩逆夷督臣鄂爾泰指授方畧臣統師親往𠞰撫已經底定督臣欽遵聖㫖現今赴黔與廣西撫臣金鉷㑹商地方事宜四月間可以還滇即將来或有公務他出亦在冬季時候臣籲聖慈俯鑒愚忱准臣候督臣自黔回滇之日臣即輕騎赴京恭聆訓示俾臣孺慕之私得以稍慰而封疆職守更得有所遵循矣臣不勝激切屏營之至伏乞睿鑒謹奏朕從未見汝面數年来披覽所奏章疏及所辦事件即可知悉汝之居心為人汝縱逺在滇南一切處觀朕用人行政亦可領㑹朕訓誨臣工之意我君臣雖未㑹晤如見面然也今用卿為廣東總督可速束裝赴任到粤料理一二年周悉地方情形之後再来面朕亦不為遲㫖已宣降卿其遵奉母違朕現今訓卿之㫖惟務不欺不隱秉公執正旗人習氣操守一節切湏砥礪察吏貴於嚴明不懈臨民須宜寛猛兼施而粤省要務弭盜之方更宜急為講求汝即来京聆朕面諭亦不出此數語其竭力加勉一一遵循至於地方上應興應革事宜朕實不敢強為知解葢自朕御極後所用粤省督撫率皆平常供職之輩縱有道聽途說衆論朕尚未之見信何以諭汝大抵各省風氣雖有不同撫治異宜然究其要領總在察吏安民凡事順情得理而已如鄂爾泰者可以之為師範既與同事數年自必洞悉其心行朕所喜者此等大臣若能效法一分即為能遵朕訓一分也汝當量已才力倘不能效法鄂爾泰其次寧可倣李衞之實心任勞任怨慎母蹈潔已沽名欺詐不實之陋習今將朕之意指明白宣示以便汝詳擇審處而為之若慮封疆職分中事或有未諳仍當虛衷領教鄂爾泰保伊必推誠告汝果肯聽其所言奮勉思齊殊勝来京往返萬里聆朕訓諭也勉之勉之不盡之諭俟汝到任後隨事隨便再為批示以增益汝之不逮特諭雍正七年六月十二日廣東總督臣郝玉麟謹奏為欽奉聖訓事竊臣仰荷天恩畀以廣東總督重任雍正七年四月二十四日准雲貴廣西督臣鄂爾泰咨移部文到臣臣隨交代眀白即於五月初二日自大理府起程已經恭疏題報在案初九日行至廣通縣地方據臣齎摺把總捧到硃批諭㫖臣恭迎至寓跪讀聖訓勉以東省政務之要指示居官取法之資天語周詳至眀至切感􅈭殊恩不禁淚下伏念臣一介武夫仰蒙天恩授以總督重任自念知識短淺不知作何辦理旋即欽奉訓㫖頓啓愚蒙不惟知所遵循且覺心膽亦壯所有地聖恩督臣鄂爾泰公忠體國精勤任事臣與同事數年知之最切其居心制行實可以為師範臣雖自量才力萬不能及然務當勞任怨幸逢聖主明竝日月洞鑒其誠諸務得以就理實臣下分所當為臣願竭力效法以盡臣職斷不敢效潔已沽譽存私欺詐之軰自取罪譴也所有奉到聖訓臣欽遵縁由理合繕摺回奏伏乞皇上睿鑒謹奏從来閩地最稱難治而浙省較為􅀹難此乃人所共知者幸得一李衞實心任事之督臣未及二年氣象遂覺翕然丕變汝等督撫之有闗於地方利害也如是不敬不畏可乎切勿以封疆任重為榮惟實知盡職之難統屬之苦方能上邀神明助祐若朕則實知為君之難居上之苦孜孜矻矻自勉力行者至於貴為天子富有四海朕實不覺尊髙可喜而有暢心適志之樂也朕向在藩邸數十年仰賴皇考福䕃富貴榮耀不減今日而安享逸豫不及當時百千萬倍言及此不禁涕泗交垂慟憶我皇考昊天罔極之深恩云爾偶因一時感觸書諭我君臣期共勉之同日又奏為恭懇聖恩事竊照廣東地方山海交錯弭盜一事最為緊要臣跪讀硃批訓㫖仰見皇上明同日月無逺勿照臣思弭盗安民首在地方文官稽查化誨清其源流更湏武弁整飭營務嚴謹汛防實心拏賊使盜賊知所儆懼地方始得寧謐百姓始得安枕是文武各員全在得人臣猥以庸愚荷蒙皇恩畀以總督重寄查廣東地方遼濶臣一人耳目難周湏得素所深知諳練才幹文武能員以備委用庶可漸次整頓臣欽遵聖㫖兼程於六月初五日到黔省貴陽府將廣東地方應行整理諸務備細與督臣鄂爾泰相商督臣推誠講論悉心指示莫不深切體要又云聞東省諸事廢弛盗案􅀹多須揀擇幹練文武數員散布分理始有裨益等語臣聞督臣所論即與商酌擬將臣平日所知如貴州威寧府知府吳士鯤雲南開化府同知楊正輔劍川州知州李毓元石屏州已告終飬知州龍為霖皆才守兼優勇於有為懇祈聖恩特降諭㫖調用粤東俾臣得收指臂之效鄂爾泰知臣新任未諳亦竝無難詞臣為此籲求聖恩特降諭㫖賞將以上文員調赴廣東令臣遇缺具題請㫖補用於地方政事大有禆益至營伍諸務在在俱屬緊要臣擬將雲南維西營㕘將李君賢楚姚鎮遊擊朱永振順雲營守備題補臨元鎮遊擊魏傑武定營守備王廷標永北鎮千總邱尚忠張朝翰楚姚鎮千總陳𢎞舉馮希聖提標把總梁汝楫俱久厯行間出師西藏并米貼茶山著有勞績且皆係實心任事之員堪任驅策并求聖恩調赴廣東遇缺題補則臣得收指臂之效海疆營伍漸次整頓矣臣為新任地方起見謹繕摺請㫖伏乞皇上睿鑒施行謹奏照爾所請已有㫖諭部矣朕勉從所請一者因汝初理地方事務二者念雲貴各員曾經鄂爾泰鼓舞訓飭必已知為人居官之道所以姑准施行雖然題帯􅃇屬往赴新任究非善舉定於汝無益將来或至掣肘時方悟朕言之不謬也自古知人為難人心難測事事時時留心體察方不被其愚惑萬不可過信亦不可不信人皆可信何必止信數人耶信任者多得力處廣信任者少得力亦微美惡不可預期是非不可逆料秉公據理平心㸔去有何可信何不可信耶凡人且用去㸔其所行是矣從而加意察訪其志堅定否他事亦然否事事皆是矣更觀其有無矯情能長久如是否終始不渝否如此觀人則優者愈見其是而劣者愈見其非假若預横成見於胸中則是者不出此一是而非者定於此一非矣倘是者或有巧詐之情而不加察則誤已不淺非者或有遷改之實而不更審則寃人殊甚總之知人不易用人􅀹難若不費一番苦心公取捨勤訪察耳目不廣精神不到莫言知人用人之道也勉之治平之術除用人一節餘無二事如得其人斯諸務就理不得其人堯舜之政自在簡策於吏治民生何濟汝其欽承朕訓盡屏私腸於信人用人之際母任一已之喜怒好惡惟恪秉公勤誠敬而為之可也雍正七年八月十一日廣東總督臣郝玉麟謹奏恭請皇上聖安朕安覽卿到任後一切奏請及所辦理甚為嘉悅卿之立志是矣根本既端枝葉夫何足慮朕深慶粤督得人勉之勉之堅守此志母稍遷移時時記憶鄂爾㤗之居心行事常存彼丈夫兮我丈夫之念則為粤省官民之福亦朕之厚幸也同日又奏為奏聞事竊臣查粤東各府州屬本年閏七月内雨水均屬調勻晚禾蒔插已遍現在發秀各屬米價上米每等再閏七月初九日風雨晝夜被風地方民間屋瓦吹飄路旁營房望樓亦多倒塌其人口田禾各無損傷訪諸土人僉稱廣省地臨濱海每年當夏秋之間海風不時舉發等語除檄行該管地方文武查修完固外理合一竝具摺奏聞謹奏粤省濱海居民每有吹飄之患但㸔海風舉發之大小不同耳查明被災輕重加意撫恤之同日又奏為奏聞事竊臣欽奉諭㫖郝玉麟到廣東新任後著孔毓珣將地方事宜及鹽務等項明白交代與郝玉麟協同辦理半月来京陛見欽此臣於到任後凡地方事宜俱與前督臣孔毓珣商酌協同辦理所有鹽務一事隨即咨詢將任内督辦過數目以及正羡課稅支解完欠造册移交以便查明接管去後當准孔毓珣移送運司造報册結前来臣細加查核兩廣鹽務因發帑收鹽銷辦是以有羡餘一項今將孔毓珣任内各年收過鹽斤彚總合算自孔毓珣到任起扣至本年六月計其辦出之鹽應賣之價扣除帑本運脚支銷之外其餘止足六年以前報出之羡餘其自本年正月至六月應辦羡餘二萬有竒竟無著落隨咨孔毓珣詢其原委去後續准覆稱羡餘一項雖係按年奏報原係截長補短不能扣截而計隨將各官商竈戶未完自康熙六十年起至本年六月止一切積欠以及現在各場埠已運未運鹽包造册交臣抵作未完五六兩年以及七年分上半年羡餘之項臣即將所交之册通盤合計除抵已報未完五六兩年羡餘外餘欠雖足抵七年分上半年應辦羡餘但錢糧自應各歸各款似此前後那抵且又多係逺年積欠將来不知能清完否臣奉諭㫖明白交代何敢瞻顧草率遽云明白今據移送抵款之册尚湏逐一清查而督臣衙門鹽政巻册零星又多舛互孔毓珣奉有欽限不便久稽已於本年閏七月二十五日起程赴京陛見臣將伊所辦鹽務復加查考總縁羡餘一項自報充公以来雖每年奏報五萬餘金實非每年㑹計實數孔毓珣自到任至今總謂可以截長補短實未計及此年之足與不足徑行奏報是以積欠未得清完臣現在細加查核合先據實奏聞仰祈睿鑒謹奏查眀之後惟以按年辦理據實奏報為是似此那新抵􅃇究屬欺瞞之舉切不可踵而行之百凡總以鄂爾泰之居心行事為模範而倣效之萬無一失也謹誌毋忽同日又奏為敬陳兩廣鹽政之流弊仰祈睿鑒事竊臣仰蒙皇上殊恩特授廣東總督任大責重夙夜惶懼除地方事宜以及鹽政交代已另摺奏聞外臣查兩廣鹽務悉屬臣衙門管理是以前於途次一入廣西境即留心訪察一切鹽政情形到任後復細心體察迄今已及一月雖未能週知而其中之因循流弊但有所知敢不一一奏聞一逺年之積引與新引竝行以致誤課難徵也一商人之掛欠鹽價以致帑本久懸不清也一廣西省辦商之糜費火足宜節省也一鹽務人役之冗濫糜費帑本也一東省官運官銷之埠羡餘未清也一場羡不據實奏報逐年牽互不清也一竈戶晒丁之走私宜設法也一地方官宜督責鼔勵也以上八條實兩廣鹽政因循之流弊臣現在清理斟酌調劑其餘未盡事宜以及臣尚未週知之利弊亦在悉心體察次第陳奏斷不敢避怨依違臣見雲南鹽政自督臣鄂爾泰李衞前後一畨清理調劑至今官民商竈無不稱便臣敢不虛心取法以冀仰報皇上殊恩於萬一謹此繕摺奏聞仰祈睿鑒謹奏閱所陳八條内有應行者亦有暫時似乎有益日久難行者即如節省辦商糜費一款宜加斟酌勿因一時除弊之見或致將来不能承辦復費經營朕意汝到任未久且守成規辦理不可造次更張俟將鹽務一切利弊洞曉無疑之後再為詳商妥議奏聞候朕批示遵行凡事不宜欲速次第整理自能就緒至若鄂爾泰李衞之調劑得宜皆因胸中先有徹始徹終之定見然後措施所以能收成效非僥倖試行而然也倘於其中利弊少有未透不可聽信一二無稽之論遂爾輕議更改恐有急遽之失特諭廣東總督臣郝玉麟署廵撫臣傅泰謹奏為請㫖事案據廣東碣石鎮呈據中營守備林駿詳稱雍正七年七月十九日夜四更時候恵州府海豐縣梅隴墟舖民徐秉閑等家被盗百餘人眀火持械搶劫各舖布疋銀錢等物鄉民潘朝柱救護被賊傷死等情又據署海豐縣㑹同汛弁驗報前来經前督臣孔毓珣及臣等俱各星即照行碣石鎮按察司飛檄該地方文武多撥弁兵練捕速往躧緝務必全獲去後隨據提標右營守備哈雲棟報稱查得打劫梅隴墟舖民徐秉閑等各家賊犯兵弁練捕追至長樂縣山羊寨地方於閏七月十五日據賊犯謝恩榮等開報同夥姓名共一百二十三人各繳器械一同投首前来隨㑹同歸善縣縣丞謝進分起押解賊犯謝恩榮等到肇内除夥犯一名鍾恩趙據報病故外臣郝玉麟當即飛調恵州府㑹同肇慶府審取確供去後隨據該府等㑹訊錄供詳報前来臣等將供情細加檢閱㑹㸔得海豐縣梅隴墟舖民徐秉閑等家被劫一案縁廣西賀縣人謝恩榮先與長樂縣居住之張永良余大榮等希圖在山穵礦淘沙度日從前竝無劫掠搶奪等事後謝恩榮等到山不久即被驅逐各人先後下山無處覓食於七月十七日謝恩榮在煙墩墟撞遇張永良余大榮等各道貧苦當有黄天明說打聽梅隴墟舖家有銀錢布疋好去搶劫張永良即與余大榮等商定向謝恩榮說知脅從衆人即於七月十九日夜三更時候到梅隴墟搶劫徐秉閑等家布舖劫得銀錢布疋等物謝恩榮張永良余大榮黄天明陳友華徐世英曾文張文興石漢臣鍾文材黄雲黄興繆標文等俱各加倍分贓袁文等十一人各分一分各犯劫後遂即逺逸而墟中居民救護窮追盗犯王亞貴張亞石江松林彩等在後拒捕傷死救護鄉民潘朝柱而王亞貴張亞石當被鄉民殺死此案為首穵礦係謝恩榮起意嚮導係黄天眀先行商酌係張永良同商行刦係余大榮陳友華徐世英曾文張文興石漢臣鍾文材黄雲黄興繆標文等與拒捕傷人之江松林彩共一十五名此皆法無可貸不准自首相應仰請皇上敇下即將盗犯謝恩榮等一十五名發往被刦地方當衆正法以警姦頑再謝恩榮一犯勸衆投首應否網開一線量予末减出自聖恩至袁文等各犯共七十一人因驅逐散後又被脅從入夥竝非積盗既據投首情有可原可否准予自新照例分發當差効力統俟睿裁再李才等三十六人原未入夥為盗又未分受贓物俱係平民臣等先即檄行摘釋刦去贓物應於各盗名下追賠除將謝恩榮等􅊾行按察司嚴行收禁外臣等未敢擅便理應㑹摺請㫖伏乞皇上睿鑒批示遵行謹奏已發三法司核擬具奏矣此案聞兵弁於追捕時甚為怯懦當嚴行飭誡雍正七年九月十一日廣東總督臣郝玉麟謹奏為粤省買補營馬領銀浮多宜定成規以杜冐銷事竊臣查得營制定例副將以下把總以上以及馬戰守兵均有朋扣銀兩收貯司庫以備操馬倒缺請領買補不致偏累馬兵法至善也然營有大小兵有多寡及所設營馬亦多寡不一報倒請朋原係照所朋扣量入為出總不浮出朋銀之外操馬已過三年者始准報倒未滿三年者扣除賠樁葢杜揑報冒銷此天下通例也臣查奏銷册開雍正六年分通省水陸各營共計朋扣銀兩三萬七千八百二十兩零查水師雖無操馬亦係一例朋扣至通共計經制營馬六千二百四十八匹自應按年報倒照扣領朋始與定例相符查六年分報過倒馬竟至一千五百一十一匹之多動支朋銀三萬三千九十兩零下剰溢朋僅存四千七百三十兩零各營支領朋銀不但透支陸路朋扣暨水師朋銀又已動支且通省報倒馬匹竝不畫一又不計算每年各營共有朋扣若干應報倒馬若干以符朋扣之數毎年通省標營共計多領朋銀六千七百七十三兩實屬冒濫所有七年分倒馬未便聽其浮報臣今酌减每年通省額定報倒營馬一千九十四匹實動支朋扣銀二萬三千九百五十八兩將来盈縮總不得浮出本營朋扣銀兩之外查水師各營原扣朋銀六千七百四十一兩零臣思水師朋銀雖無買馬之用而行駛船隻每年大修小修概係動用帑金自應將此銀兩歸公不便聽其冒領再查從前浮開冒領匪朝伊夕其来已久應否概從寛典出自聖恩其水師朋銀暨今核減除樁銀不算外計七年分約溢剰朋銀一萬四千七百餘兩零均應留充兵餉庶各營冒銷之弊可以永杜矣所有粤省浮開倒馬流弊應行酌減之處臣謹據實奏聞伏乞皇上睿鑒批示遵行謹奏卿秉公持正毫無瞻顧甚屬可嘉但甫經到任諸事湏務詳慎令闔省兵弁心悅誠服後為之未為晚也同日又奏為拏獲海洋巨盗事竊查粤東廣州府屬之香山廣海新㑹聫界地方傍海依山最易藏姦臣於到任後即嚴檄該管水陸營汛無分疆界上緊查拏去後本年八月十二日據新㑹營遊擊周廣詳稱查有賊夥在廣海石橋北坑地方㑹集􅆆旗勒取繒􅅈船隻花紅銀兩隨差督標俸滿千總楊志望外委千總譚仲賞外委把總薛英各帯管隊兵丁鄭兆勝等配駕哨船於八月初六日廵至香山三虎海面見有賊船七隻約共賊徒六十餘人在海游移一見官兵追到賊即拒捕千總等督兵奮勇向前擒拏追至廣海獨涯清水灣海面拏獲賊首李奕揚夥賊楊亞干等共二十六名其餘賊犯當被官兵殺死二名打傷落水身死二十餘名赴水脫逃一十餘名打壞賊船一隻沉海漂流一隻竝獲賊船五隻追出器械竝贓銀賬簿書劄標帖等項委令守備凃元漢等押解賊犯李奕揚等到肇臣即親加審訊取供在案一面將賊犯李奕揚等并贓械賬簿書劄標帖等項發交按察司嚴行究審竝一面飛檄該管地方文武選撥弁兵員役㑹同水師速將李奕揚餘黨暨脫逃之首盗王亞七等竝供出之陳大樂等一夥賊犯分往確探逃匿蹤跡潜泊處所立即搜捕務獲解究去後又據遊撃周廣報稱續經拏獲與賊往来之東山寺僧茨亭一名賊黨鄧亨齊等四名又報拏獲賊黨劉自雄等三名俱行詳解前来臣俱檄司一并究審除俟夥賊全獲審擬招報到日另行㑹核將賊犯李奕揚等題請正法外其臣標千總楊志望等并管隊兵丁鄭兆勝等俱奮不顧身勇敢拏賊實心效力殊屬可嘉臣即按名賞給彩紬銀牌并紀勞績以示鼓勵事闗海洋近日情形合將現在拏獲洋盗縁由先行繕摺奏聞謹奏此案非尋常獲盗可比該督具題到日將兵弁人等該部照軍功例議敘具奏粤省惟弭盜一事最為要務此奏朕嘉悅覽之已諭部矣但賊夥㑹集㡬多時日未經聲明可詳悉審訊具奏以聞同日又奏為聖主之徳澤日深商等之沾恩已厚請增餉課以效涓埃事竊臣於到任後即清理鹽政議增引目以資民食隨據各商等呈稱實縁雍正三四兩年雨水過多場鹽少産以致元二三四等年引目壅積未銷且廣東埠地在在難銷唯藉連樂等數埠稍易銷售通融撥抵以資課餉今若再增引目不獨舊引終成壅積即新引亦必更多延誤該商等䝉皇上發帑飬竈久沐恩膏情願按引增課每年加增六萬兩并請照􅃇融銷分年帯拆􅃇引前来臣即批仰運司確查妥議詳報去後續據議詳到臣臣復細加查核該商等未拆元二三四各年􅃇引實俱完過課餉因三四兩年雨水過多場鹽少産壅積未拆有案可查竝非他省已拆已銷之未繳殘引可比但其中亦有完課􅃇商已退新商實非當日完課之人不便准其再拆臣查元二三四等年共未拆引三十七萬六千五百道内完課􅃇商久已告退之引六萬四千八百六十九道不准頂充新商拆銷外尚有完課未拆引三十一萬一千六百三十一道應請毎年帯銷十萬三千八百七十七道定限三年為滿仍懇皇上俯准難易埠地一例融銷其該商等所請先增餉課六萬兩并懇皇仁准於本年十月行銷七年新引為始每年隨課上納報部充餉俟三年帯銷限滿無論􅃇引完與不完一概停止専行新引再將此所增六萬兩課銀同以後或再有應增之項一併請增引目永為嵗額則國計商民均沾裨益矣為此繕摺請㫖伏乞皇上睿鑒批示施行謹奏所奏據怡親王議覆朕深以為然今將議覆之摺發来爾㸔可即照行將来至增繳新􅃇引目之時具疏題請可也同日又奏為查出東省官運官銷之埠羡以裕課餉事竊臣查得粤東各埠雖皆商辦内有廣州府屬之順徳等埠因商力不繼久經改歸官運官銷則應有埠羡歸公臣隨飭現任順徳縣知縣柴瑋據實開報去後續據造具印册前来臣復逐一核查每年實該羡餘銀二千二百二十七兩該縣俱未報解查該縣承辦五六兩年共該羡餘銀四千四百五十四兩竝不報解本應叅究但實係厯来因循流弊而該縣一經查詰即行開出自認補解且其人年力精強正堪效力臣仰體皇上愛惜人材至意細加戒飭立限半年令其照數補解嗣後每年埠羡銀二千二百二十七兩飭同正課起解歸入埠羡項下充公在案可否寛其已往冀其後效出自聖恩再查該埠自雍正二年即改歸官辦係前任知縣今陞韶州府現在丁憂知府陳鴻熙承辦每年亦實該羡餘銀二千二百二十七兩該府自二年三月到任至五年八月離任四年共得羡餘銀八千九百八兩查該府曾於陞任後透完過二三四年課餉之未拆引二千六百餘道共計銀一千九百六十六兩外尚有羡銀六千九百四十二兩未報未解相應勒限一年令其補解如逾限不完即具題叅革究追再饒平一埠係五年分改歸官銷每年應有羡銀五百九十九兩該縣知縣董鍾晉承辦五六兩年引課共該羡餘銀一千一百九十八兩不報不解本應叅追總緣流弊相仍可否仰邀寛典出自皇仁其應追羡銀臣已勒限半年令其補解清完嗣後每年應辦羡銀飭同正課起解歸入埠羡項下充公再查平逺長樂恩平三埠亦自五年分經前督臣孔毓珣因商力不繼飭令官運官銷以来緣平逺一埠引多課重而長樂恩平二埠逼近場地俱不能照額行銷是以將已銷之引所有羡餘即抵補應完之課而羡出之引不能於該埠再銷只可陸續酌撥於易銷之埠逐漸融銷查三埠餘引共二萬四千八百三十七道若融銷完日則此項引課即係平逺等三埠羡餘容臣設法銷完歸入埠羡項下一併奏報充公可也所有臣查出東省埠羡緣由合即據實奏聞仰祈睿鑒批示遵行謹奏此奏交怡親王等㑹議今將所議發来汝其遵照奉行埠鹽官運官銷之事曾經備詢孔毓珣據伊奏稱因係難銷地方無人充商承辦不得巳改歸官運等語朕意果如其言縱有些少羡餘亦不當過於苛求何則若地方可保必有羡餘則不難招商承辦何必改令官運官銷耶諸凡須詳情度理然後於事有濟稍渉偏執目下便勉強將就恐不能行之久逺一切處類推為之方無過不及之失不貽日後之悔也雍正七年十一月十八日廣東總督臣郝玉麟謹奏為恭謝天恩事本年十一月初十日據臣標把總齎捧皇上硃批并御賜貂帽哈宻𤓰克食到肇臣敬迎至署恭設香案望闕叩頭祇受訖所有臣具奏事件跪讀諭㫖指示精詳容臣悉心辦理次第請㫖遵行外又臣請安摺内荷䝉天語垂訓勉勵備至臣自顧何人膺茲異數感激涕零不能自已惟有凛遵聖訓堅持此志不敢改移殫竭心力勉效督臣鄂爾泰之居心行事以仰副我皇上教誨㣲臣之至意耳謹具摺恭謝天恩伏乞睿鑒謹奏覽奏謝知道了觀汝自莅任以来一切摺奏無非以清楚錢糧為要務似此不特輕重本末失宜粤省民情惟利是趨亦與地方輿情甚不相協也果能令吏治潔清民情淳樸徐徐自有弊絶風清之效若不於根本處著力而逐末辦理豈但不勝其繁亦何有吏畏民懐之期地方官民之心既失徒恃國家法度欲令百物順軌乃斷不能之事如是以為不事瞻顧秉公無私則大誤矣再者粤東各官分為兩黨恐汝不覺兹特宻諭知之兩邊各分門立戶黨首一為王士俊一即方願瑛方願瑛實屬元惡將来朕必置之重典伊不過一臬司耳能令通省之人無一不附合者因被楊文乾叅奏伊嗾使上下各員羣起而攻之此等刁風萬不可長王士俊乃實心任事明體達用之員因被楊文乾委用遂為通省之所忌嫉切勿聽信屬員譛愬誤生疑惑倘錯用耳目則通盤不是矣汝第倣照楊文乾措施辦理自可望有成效楊文乾之志趣惟王士俊深悉事事與伊商酌斷不至於大差誌之宻之將粤省分為兩黨之由向汝自滇題帯人員宻為示知莫被誘入黨中凡遇有代方願瑛訴屈者率係粤東蠱蠧即宜留心相待慎勿謬忽此種情形朕經採聽數年深悉隠微設將諭㫖視為疑信之間則自誤不淺開復新用副將繆𢎞其人若好則為將来武臣中難得之員否則乃一不安分大膽狂妄人也朕未能㸔透汝其留心試用俟有真知灼見時具奏以聞雷瓊道王璠前於知府任内来京引見朕觀其人頗近庸劣外貎雖似誠實心術尚恐未純因孔毓珣楊文乾皆力言其優所以擢用此任近聞不稱海疆廵道之職當留心察訪至陶正中傅泰盛言其好朕謂不過聰眀自了之流未必肯實心為國致身效力也汝其加意試㸔更將傅泰保奏并朕數次批論陶正中于其珣如何之處宻向傅泰傳㫖令其告汝知之同日又奏為敬陳粤東外海内河戰船情形分别小修嵗修以收實效事竊查粤東通省設有水師外海繒艍拖風等船一百六十二隻内河櫓槳急跳等船二百三十四隻配兵遊廵分班出海一切船隻限年修理船身堅固駕駛無虞本年四月二十三日准到部咨奉㫖祖秉衡所奏小修改為嵗修甚屬得理著通行有戰船之地方一體遵行欽此前督臣孔毓珣接准部咨當經轉行欽遵在案兹據布政使王士俊詳准水師各鎮協營均請仍照􅃇例小修等由到臣該臣查得粤省戰艦等船有外海内河之分查内河船隻亦有可以出海者除現檄行布政司分别查明議詳外其不能出海内河船隻遵照嵗修之例修理實屬妥便惟出海戰船勢難畫一臣查粤東外海與京口内河水性鹹淡不同且外海風巨浪猛洪濤衝擊而出洋戰艦易於朽壊是以定例海洋戰船自新造之年為始厯三年准其小修再厯三年准其大修再厯三年如船隻尚堪修理仍准其大修如果朽爛不堪修理保題拆造與京口沙船厯九年而始大修十六年而後拆造者又自不同今若照京口沙船之例將小修改為嵗修勻給工料有限嵗嵗粘補無多新造之一二年船身堅固工程簡畧尚可足用若至數年之後屢經鹹水浸灌蠔虫蛀蝕雖勤加燂洗而船身不堅釘銹木腐更換新料則工價不敷照依嵗修則粘補無益竊恐未屆大修拆造之期而船已朽壊不堪闗係甚鉅仰懇聖恩俯念粤海不同京口除内河槳哨等船内有不能出海者俟查明若干遵照嵗修外所有外海戰船請停嵗修准照􅃇例限年分别小修大修拆造則船隻得以堅固海疆實有裨益為此據實陳奏伏祈睿鑒批示遵行謹奏閩廣二省戰船仍照􅃇例修理已有㫖矣同日又奏為欽奉上諭宻行辦理事本年九月十五日接到大學士公馬爾賽等字寄内開雍正七年八月十二日奉上諭聞得江南福建廣東及浙江之杭嘉湖三府有匪類結黨潜謀為匪其為首者係江寧人各處用銀結納等語外間既有此言不得不為留意爾等可宻寄信與郝玉麟令其宻宻留心整飭營伍預為防範但不可驚惶聲張使屬員弁兵知覺縁由倘致洩漏於事無益徒滋驚擾若江浙有文知㑹時或有查拏同黨之人即便作速緝拏務使嚴宻勿令一人兔脫欽此遵㫖寄信到臣臣跪讀聖諭當即欽遵宻為留意不敢驚惶聲張致有一毫洩漏外布應行之政事内寓防範之機宜整飭營伍勤加操練又與署撫臣傅泰宻商於江西福建接壤粤省交界地方遴委親信妥當人員一面借公事名色并往浙省一并宻行訪採倘有信息易於辦理若江浙有文知㑹時或有查拏同黨之人即行緝拏不致兔脫務期姦匪絶迹邊疆寧謐以仰體皇上治益求治安益求安之至意所有宻行辦理緣由謹具摺奏聞伏乞皇上睿鑒謹奏覽奏知道了稽察匪類較之緝盗􅀹為緊要湏不時留心多方宻探方能得其蹤跡非比命盗案件有失主苦主之證據易於追究庸碌督撫往往畧而不察偶遇一二敗露者輒諉之曰瘋狂率皆置之不聞不問以為何必滋事拖累無辜惟隠飾是務所以致令吕留良輩得以數十年肆行無忌於光天化日之下也切母蹈此無知陋習以飬癰遺患此等處惟李衞深識輕重他人莫及而玷職無能之輩反目為多事豈不深可痛恨也乎粤東地處邉陲風俗欠淳且兼通海洋更易藏姦亟當再四加意時刻察訪毋忽同日又奏為敬覆諭㫖仰祈睿鑒事竊臣為東省改歸官運官銷順徳等埠鹽課羡餘一項繕摺奏請聖裁奉到硃批仰見我皇上聖諭周詳無微不燭臣敢不欽遵悉心籌畫伏查難銷之埠若官運官銷實有羡餘而又不能招商辦運者其中實有原委今細為我皇上陳之查行鹽埠地雖有難易之分而所獲羡餘每封實約有四五六百金不等埠埠皆然但難銷之埠或引繁課重或私鹽充斥以致額引不能全銷而商人頂充必湏全納額餉所有已銷過引之羡餘僅足墊納未銷之引課商人無利可圖是以無人承充若能設法行銷緝私嚴宻銷完額引何嘗無羡至若官運官銷則不湏墊課銷得引一封即有一封之羡餘且將不能銷之引撥於别埠融消完課只就本埠實銷之引完納引課是以實有羡餘因官運官銷與商人行銷事有不同所以難銷之埠無商充當也理合據實覆奏伏乞睿鑒謹奏覽奏已悉請裁辦商一摺内有交部查議之處留中候㫖雍正七年十二月二十七日廣東總督臣郝玉麟署廵撫臣傅泰謹奏為遵㫖查奏事竊臣等䝉皇上發交條奏一摺奉㫖諭總督郝玉麟廵撫傅泰有人條奏此一摺汝等可詳查議奏欽此臣等一面欽遵詳加訪察一面諭令布政司㑹同糧驛道確查去後兹據該司道呈稱粤省民田科則原有差等如南海縣每田額銀三分三釐額米一升三合五勺零計田三十一畝一分五釐零名為一石糧應共徵銀一兩二分零本色米四斗二升三合番禺縣每田一畝額銀二分四釐額米八合三勺九抄計田四十六畝七分二釐零名為一石糧應共徵銀一兩一錢四分本色米三斗九升二合其餘州縣徵收額數大概相同從前州縣徵收錢糧名為加耗一錢四五分實有一錢七八分不等雍正六年十一月内公同司道議定每兩加耗一錢六分核實奏銷刑名飯費另加耗九釐每兩共加耗一錢六分九釐以為通省公事及各官飬亷之用除此之外州縣竝不敢有打號單銀平頭等費如條奏摺稱毎兩竟要加耗三錢一二分方能完納等語實無確據且粤東貿易行使雖有銀錢竝用但花戶從無以錢赴櫃納糧者州縣亦未聞有收錢發給串票者又安有納銀一兩至用錢一千五百文之事即本司提取火耗每兩止提七分以為院司飬亷并通省公用又除九釐為奏銷刑名飯費其餘尚存耗銀九分即扣留該州縣應得飬亷之數多寡勻給竝無有如條奏所稱提解一錢七分之處又摺稱官米三斗零三合四勺要納銀四錢四分二共需銀一兩七錢六七分是通指銀米而言但糧道衙門每年現收米二十四萬七千三百三十三石零如摺内云共需銀一兩七錢六七分是藩司衙門既經收銀又復折米銀米俱歸藩庫矣從来竝無其事再摺稱徵收本色米每石有徵榖二石七八斗者有徵榖三百餘觔者每斛足一升計三石有餘亦有使用等費合而計之每石湏銀一兩九錢等語查每年秋冬時將春夏碾支兵米徵收還倉例應一米二榖州縣現今照例徵收未有收米一石折榖三石之理目下米價五六七錢不等如折榖三石合米一石五斗計銀不過一兩又何用銀一兩九錢之多但糧道衙門已經收米則摺内所云納官米三斗零三合四勺納銀四錢四分益屬無據况徵收本色米原屬支放兵糧查通省各旗標鎮協營寨官兵馬匹共嵗需糧料米五十一萬一千九百八十六石除不敷糧料米石仍照部定價值折給外其額徵民屯米石現今州縣收支悉皆本色如云折給兵米只給銀七錢是亦竝無其事也理合據實查覆等立即叅究務期積弊盡除以仰副皇上子恵元元之至意再照摺稱本年五月内蘆包汛槳船被盗搶去并刦棉花客船一隻將鎗礮俱行帯去等因查此案耑管把總邱勝宗經前督臣孔毓珣咨部斥革其船内礮械俱經追回無失至疎防職名前經㑹疏題㕘又不行接續協追職名臣等復行㑹核咨㕘在案合并陳明伏乞睿鑒謹奏知道了條奏各款朕原未盡信必以為然但粤省吏治民風未為帖然就緒汝等極當協𠂻整理以期後效勉為之奏為宻陳痼弊仰祈睿鑒以破貪壑以除民害以靖疆圉事竊查廣東各鹽埠勒收乾標縱私􅅰害一項臣巳瀆陳天聽矣又何庸再為瑣奏獨是此中之痼弊最深黨固最宻非經睿慮斷不能盡絶其根株永使民生樂業濱海肅清此臣之所以既言於前不忍不再窮底裏於今日也何則葢弊之興也易剪弊之積也難除弊生於民也易治弊成於官也難清始於官流於官前後相因上下相應是以牢不可破愈久愈深致有商人辦課當道行鹽之物議伏思煮海為鹽乃天地自然益國益民之利緣産之者不盡其地而需之者不遺一家故召商以運之立埠以聚之又恐徵收無度設引以額之立法亦盡善矣在承商者循分安業在守土者持法嚴私何害之有無如利之所在人競趨焉不但市井之小人先自封疆之大吏倚勢奪埠借帑行鹽或委之子弟家人或委之親戚朋友而若輩有恃不恐靡所不為乾標之所由以作而姦宄之所自以生也一人倡始羣焉效􅀹迄於今更有甚焉者矣不惟官可以佔埠即官之幕友親朋弟男子侄俱可霸埠不惟現任之官有埠即已經去任之官尚有埠不惟有沿海之標抑且有過山之票在董理埠務之州縣乾標外又派丁鹽在不理埠務之州縣規禮外時為苛索遂其所欲任商打標拂其所好任私四出商人辦課備價不能拆引當道欠價掛餉可以行鹽再加以從前張天爵陸曾李續祖等三案之增銷遂致積引甚多承本年之商辦来年之課拆先年之引近年雖餉課無虧商民之凋憊已極視封疆為利藪以敷衍為盡職䘮盡天良羣為不覺誠可悲而可恨也固結如此民何以安臣今日不言無人肯為我皇上言矣然此猶就臣所聞見者而言其大畧也尚祈聖慈垂照謹繕摺宻奏伏祈皇上睿鑒施行頃有人宻奏此一摺大抵浮詞無稽持論太過似非公確之奏但既經朕之耳目豈可置之不問因遇便發来爾㸔可將鹽務一切情形了然熟悉後再加確訪據實奏覆廣東總督臣郝玉麟謹奏為遵㫖覆奏事雍正七年閏七月二十七日䝉皇上頒發宻摺一扣為宻陳痼弊等事奉有硃批臣敬謹遵奉殫心確訪迄今鹽務情形稍知梗概敢一一為我皇上陳之如宻摺内稱商人辦課當道行鹽之物議等語臣查商人揭本辦課必拆引行鹽始能歸本獲利是以間有引多課重難於行銷無利可獲之埠即無商肯充不得已而歸官銷辦實竝非課係商辦鹽屬官行之事也又大吏倚勢奪埠借帑行鹽等語臣查督撫藩臬皆為大吏臣到任後即留心宻察不獨竝無奪埠行鹽即家人吏役亦無倚勢行鹽之事又發乾標等語臣查沿海各埠逼近場地私鹽充斥不能禁遏如新㑹海豐歸善恵来等處遂有私鹽經過每擔抽錢名為幫餉給發乾標執照以致私販執標横行影射散賣賺誤引餉臣到任後已嚴行禁飭今復確訪各商凛遵法紀不敢復蹈前轍矣又幕友親朋霸埠等語臣查幕友現在各衙門幕中辦事俱有闗防豈敢出入料理埠務而其親朋或有借名霸佔亦未可定臣再四宻訪現在實無其事又州縣苛索陋規等語臣查康熙四十六年以前鹽政衙門固有陋規凡屬行鹽之地道府州縣亦有規例業經前撫臣范時崇兼理鹽政時題眀禁革在案臣到任後恐日乆法弛又經通行禁飭惟清逺一縣係盤查要口凡鹽船經過每引一封尚有規禮三兩家人書辦亦有九錢八錢不等經臣飭查已據現任知縣陳本自認情愿將伊任内所收之銀立限解繳充公臣因實係從前未盡之流弊已經飭禁容臣另摺奏聞請㫖此外似屬兢兢守法又商人辦課備價不能拆引等語臣到任後查各埠商人竟有完課六七年之久尚未拆引運鹽者臣不解其故當即咨商前督臣孔毓珣據云四年以前􅃇引俱係商人完課之後或因場鹽不敷或因該商無力措辦鹽價以致積而不銷等語此即臣前奏鹽政流弊之第一條也經臣具摺奏眀業䝉皇上軫恤商艱准其三年帯拆矣又當道掛欠鹽價可以行鹽等語臣查完課繳價而後運鹽此拆引之􅃇例也今各商中竟有雖完引課不繳鹽價即領鹽銷賣賣出之銀又復那完引課或稍完鹽價復領新鹽以致輾轉掛欠年復一年遂成積欠此即臣前奏鹽政流弊之第二條也實係商欠竝非當道掛欠臣已確查欠數於查明鹽務帑羡不清等事奏明勒限一年清楚如限滿不完另議題請分賠矣又張天爵陸曾李續祖積引等語臣查三案積引賣抵帑項完結已久實非近年之事臣細查宻摺内有全無影響者有久已禁革者有因小及大者有年逺事湮者誠如皇上聖鑒大抵浮詞無稽持論太過似非公確之奏耳兹臣畧悉鹽務情形復加確訪謹據實回奏所有硃批原發宻摺一併恭繳謹奏前經批諭原非公確之論今覽所奏甚眀朕洞悉無疑矣至鈔闗稅務全賴地方大吏秉公協助方無掣肘之虞向日監督每被督撫刁難勒索此種陋習朕所悉知近聞傅泰與祖秉圭不睦天下未有公而不和之理二人必有一非汝宜從中調處湏令不致牴牾方於國事有益慎勿岐視宻之硃批諭㫖巻二百十四之二欽定四庫全書硃批諭㫖巻二百十四之三硃批郝玉麟奏摺雍正八年正月二十四日廣東總督臣郝玉麟謹奏為鹽政流弊仰祈睿鑒事竊臣前奏謹陳兩廣鹽政事摺内荷䝉硃批諭㫖且守成規辦理不必造次更張臣跪讀之下仰見我聖主天地為心愛民恤商之至意臣今莅任半載悉心訪查鹽政流弊極多實不能一時剔除臣謹遵聖諭緩緩次第整理而其間相沿流弊既有礙於鹽政又復累及商民徒為官吏中飽者臣不敢因循瞻顧有負殊恩自取罪戾如鹽商行鹽地方在官不得多方掣肘勒索商人在商亦不得假引行私髙價病民經臣嚴行飭禁已據各府州縣申報遵依禁革在案詎有廣州府屬之清逺縣係鹽艘必由之要口該縣藉盤詰私鹽驗㸔程引名色凡鹽船經過每引一封知縣得規禮銀三兩家人九錢書辦八錢此等陋弊本應露章㕘揭臣仰體聖主寛大洪慈姑念流弊已久除一面示禁外隨行運司確查去後據該司詳據清逺縣知縣陳本覆稱此項陋規實係相沿日久竝非抑勒今奉飭查遵即禁革情願將任内收過各商引規銀一千三百三十五兩五錢出具認限解繳道庫不敢絲毫隠聖恩又查得潮州府屬大埔縣有魚滷稅銀一項竝非額設亦無解報經臣飭行運司查據該縣知縣吳車泰覆稱埔民喜食魚滷亦緣價賤但因有礙引鹽魚客情愿納稅幫貼引課每年多寡實無定數自雍正五年十一月到任起至七年七月奉查止共收過魚稅錢一千八百二十餘千計值銀一千九百餘兩實係厯来相沿流弊今情願立限解繳道庫等語臣已飭該縣每年儘收儘解幫貼引課餘者歸入東省埠羡項下埔滷稅魚客情願又便於民應聽照行所有兩縣認繳銀共三千三百餘兩容臣照催完日題報歸入餉課項下再從前收取各官本應查究俯念事既久逺人已去任可否恩准寛免并應存應革之處臣冒昩奏請統祈皇上批示遵行謹奏治粤之本不在區區增益課羡為務除弊猶可切勿與民爭利能令吏畏民懐之後類此等事片紙申飭無不聽從也今於地方徳意未孚官民尚未悉汝心行遽然計較瑣細安望其畏與懐耶誌之汝等封疆大吏於斯曷可不慎至若他省則又當一論所以云因地制宜因人設教屬員中過者裁之不及者進之先之以訓誡繼之以激揚無心之誤恕之以寛既往有意之愆懲之以戒將来誠能如此未有不感服而畏懼者果皆感且畏矣則優者加勉劣者思奮何廢不興何政不舉若徒於案件上逐條逐款一一清釐殊失提綱挈領之道亦恐未必有如許精神力量將見此事方結彼案又起不勝其煩必至厭倦而後已究竟於吏治民生毫無裨益也從来有治人無治法地方得人始能就理汝於用人一節其勉之哉同日又奏為奏聞恭辦楠木黎民急公情形仰祈睿鑒事竊照粤省奉行採辦楠木一千一百根塊臣於到任後即備查巻案親加挑選將合式楠木敬謹收貯俟餘木辦全之日一併解送外至於未經採辦之楠木臣即檄行各地方官上𦂳採辦續據西寧新興陽江髙要等縣具報尋覓楠木株數候行查勘等語臣隨飛飭採辦楠木之廣南韶道李可淳星往確勘務湏合式欽遵諭㫖明白曉諭各該地方俱照時價公平購買運送赴厰以慿親驗又據布政司王士俊詳據瓊州府知府宗思聖報稱查得儋州黎岐地方産有油楠其質堅而滋潤經久不裂當即遵㫖曉諭化誨照依時價公平購買黎人聽聞之下歡忻鼓舞踴躍急公各峝長黎人等公同開山採備其已修整成料并尚未修整者通共五百餘根塊臣思黎人逺居海外一聞採辦歡悅争先仰見聖徳廣被海隅黎夷咸知尊君親上之大義臣隨行該府作何奨賞以示鼓勵速覆去後續據宗思聖報稱所有採伐在山楠木正虞運送費重於九月初九初十兩日大雨得有大水楠木悉已出山生黎人等咸驚竒異口稱萬嵗洪福大雨隨時而沛合掌對天叩首歡忻鼔舞有生黎數十村寨情願歸入版圖同沾聖化卑府目擊輿情不敢阻抑統俟查明另行詳報等語本年正月初七日宗思聖来肇臣當即囑令該府務必加意撫綏并㑹同撫臣傅泰備給銀兩布疋等物即著宗思聖分賞黎夷宣揚帝徳懐柔之至意并撥發船隻將瓊州府已辦楠木裝運到厰催令李可淳速將西寧等縣所報尋覓楠木確加查勘果否合式可用解送選騐仍行多方覓購務期足數外所有臣恭辦楠木緣由以及黎民急公情形理合具摺奏聞謹奏黎民急公情形欣悅覽之所以百凡宜先本而後末試觀滇黔諸務之能就緒者葢緣本立之所致也假若風習未端營伍未整吏不畏民不懐將不思報國兵不肯用命而欲期事之集效之臻曷可得哉一切措施寧緩毋急諺云急行無好歩緩事待人不遺後悔不得其人好事翻成誤舉大率如此可以類推第一要著務令文武屬員心悅誠服然此非機謀權術之所能得惟率以公忠孚以誠信而後方能感動其心也勉之同日又奏為聖徳光昭卿雲逺見謹據輿情禀請題達事雍正八年正月初七日據潮州府揭陽縣禀稱雍正七年十二月二十二日辰時卑職見東方曉日初昇有彩雲數十層近日青紅黄紫無不具備非霧非烟如錦如繡晶光四射輝映經時其時署外里民舖戶踴躍歡呼共祝聖天子萬夀無疆隨據闔邑紳士商民人等具呈到縣理合繪圖具禀轉請具題以光聖治以慰輿情等因到臣臣思粤東濱海之區荷䝉我皇上大化宏敷厚生正徳比年豐稔時和民安物阜月令正值嘉平慶雲現於掲邑是皆聖主孝治光昭之所致臣工黎庶無不仰戴天庥歡呼踴躍今據該縣具詳人民目睹歡頌情形呈請題達又據分防掲陽縣遊擊呈報前来臣不敢壅於上聞除行司查覆㑹疏具題外謹此繕摺奏聞伏乞睿鑒謹奏比年以来各省屢有卿雲現瑞之奏朕深疑之同日又奏為據實奏明事竊臣案查雍正七年十一月十七日准提臣王紹緒咨稱十一月初八日據恵州協副將鄂鼐呈稱卑職近因冒沾潮濕染成痪證恵州乃屬要地非病員所能料理相應呈請察核轉咨准題休致當經委員驗㸔取具親供印甘各結移咨前来臣復委員驗㸔正在備叙疏稿移㑹提臣接准部咨奉㫖福州副都統員缺著鄂鼐補授臣欽遵即行知照并調赴肇慶親騐去後續據鄂鼐呈報卑職因病呈請休致後延醫調治重復藥劑日漸輕減今幸全愈理合遵檄赴驗隨於本年正月初二日到肇臣㸔鄂鼐行走如舊惟臉面瘦减委係初愈形狀伏讀雍正五年上諭外官告病督撫查明確實具題令其回籍調治痊可有情願起用者於本籍起文赴部引見仍以原缺補用欽遵在案今鄂鼐始因患病請休今病既痊可自應遵㫖令其前赴新任除現在催令交代起程外臣查鄂鼐履厯内開年六十嵗雍正三年二月輪班引見今已過三年應否令其進京引見伏候聖㫖敇遵臣謹據實奏明伏乞睿鑒謹奏鄂鼐已經陞授為副都統乃代為奏請引見大錯矣況既令其交代赴任又欲令其進京何顛倒至於此耶同日又奏為遵㫖奏聞事竊臣於上年六月初五日抵貴州督臣鄂爾泰為訪問廣東提臣王紹緒果否勝任之處宻傳諭㫖令臣到粤留心訪問試㸔如有不勝任處著臣奏聞欽此欽遵臣到任半載以来留心宻訪提臣王紹緒馭兵嚴明軍伍整肅其辦理通省營伍事件亦無遺誤至題補水陸員弁無不慎重選擇奉職洵屬勤謹臣又訪聞該提臣自䝉皇上訓誡之後感激聖恩益加奮勵臣再當不時勸勉務期共竭公忠以報聖主知遇隆恩倘或改絃易轍臣訪聞的確即當奏聞斷斷不敢徇隠為此據實回奏伏乞睿鑒謹奏據奏如此朕省却㡬許籌度矣仍竭力勸勉之同日又奏為欽奉上諭事本年正月初八日有奉㫖補授恵州協副將繆𢎞抵肇隨到臣署云有聖㫖臣即跪聽宣𫝊據稱雍正七年十一月二十六日繆𢎞䝉皇上召見飬心殿面奉安分之人恐到廣東布散流言愚民無知被其鼓惑大為風俗人心之害爾傳㫖與督撫著用心宻訪此項人或尚在廣東若有踪跡根究務必訪獲其人如曾靜張熈之流言乃出於發遣廣西人犯之口幸而發覺早所以不難追問造言之人但亦不必招揺只留心暗訪若得其一二人亦好又聞廣東火耗米折俱重誠恐不便於民朕御極以来宵旰憂勤無刻不以民生為念即用人行政亦惟期有益於民生至維正之供不得不取之於民其火耗一切亦當定為畫一之制庶無累於民間若一任有司輕重必有重耗殃民者甚非朕愛養元元至意又聞沿海窮民以漁爲生毎出海捕魚俱於鹽埠領票名曰乾標回水納銀名曰幫餉相習巳久皆出情願今聞鹽埠欲避乾標之名令漁船實在領鹽出口按船計數希圖多銷恐不便於窮民爲督撫者此等處當細心體查務得其平使民生樂業庶不辜朕之任用一省事務全頼督撫公忠體國同心共濟方於地方有益且一省事歸一轍朕亦好辦理若各存意見將一省事分爲兩途朕從何辦理如孔毓珣楊文乾當時兩人雖無㕘奏形跡各人意見不同朕所以一同調來引見當引見時朕曉以大義反覆開導彼二人皆感激流涕誓願同心報國即回任後聞得伊等果然交往似乎相和邊海重地督撫相和是以朕心稍安不意楊文乾纔故孔毓珣盡變其所爲當時楊文乾所行若非伊身爲總督豈不能救正於生前楊文乾所行若是又豈可更變於死後人在即順之是以國事作人情可乎朕因此鄙薄其為人前日孔毓珣引見時朕面斥其非伊惟有叩首認罪而已是伊之一生名節俱敗於此爾傳㫖與督撫各存公忠為國之心公則無有不和即意見或稍有不同必不致大相逈別要知所辦者國事當以國事為重自然合而為一國以民為本凡有便於民生者商酌奏請施行伊等身為大吏當仰體朕心宣揚徳意使邊海小民盡知尊君親上之義人心淳厚風俗丕變方不愧封疆之重寄若悠忽從事必致廢弛豈不辜負朕之任用爾將朕㫖傳諭總督廵撫知之欽此欽遵臣恭聆聖訓益凛咫尺天威所有應查應禁事件臣現在悉心逐一辦理統容次第具奏外臣惟有與署撫臣傅泰矢公矢慎和衷相濟殫竭忠忱仰報高厚於萬一耳所有欽奉上諭緣由合先繕摺奏覆伏乞睿鑒謹奏覽繆𢎞所述之㫖有是者有謬誤者此亦無大闗繫處朕因伊赴粤之便偶然面諭令其告汝若係緊要諭㫖自當特頒豈有命汝屬員口傳之理所奏知道了雍正八年三月十一日廣東總督臣郝玉麟謹奏為欽遵諭㫖事本年正月十三日臣標把總齎捧硃批奏摺回肇臣跪讀諭㫖荷䝉我皇上指示為治端本之要廣東人員偏黨之習但照楊文乾辦理事事與布政使王士俊商酌欽此伏查東省人員結黨一事臣到任後果聞人言臣因駐劄肇慶司道各員駐劄省城以及各府地方并有奉差未竣者㑹靣日少不曾深切談論其居心行事一時未能僃悉是以未敢遽行入告毎於辦理之事留心查勘如王士俊才具練達辦事精明屬員之中俱不能及惟心術屬於隱微臣實不能看透未免疑似之間兹於二月初三日查勘圍基到省㑹商一切公事王士俊不時前來事事相商臣察其言論推其居心委屬明達有本之人誠如聖主明鑒秋毫不爽所論諸事與臣意見多相符合且深知楊文乾之立志存心臣恪遵聖諭事事與之相商辦理期其始終勿渝共圖報效仰副主知其題帶人員到粤之日臣當宻行誡諭必不致被人詐誘入黨再臣宻訪方願瑛實係反覆小人其狡詐情形近日粤省臣民已頗知覺竝無代為稱寃者若有其人臣查明必據實奏聞決不敢容隱再奉硃批令臣試看開復新任副將繆𢎞容臣詳加試看另行奏聞又䝉敕臣留心訪察道員王璠并諭臣宻問傅泰皇上硃批數次之諭㫖與傅泰之奏陶正中于其珣如何之處傅泰俱一一向臣説知敬聽之下仰見我皇上察吏安民之至意臣仰沐天恩敢不悉心訪察諄切訓勉務期各員盡除積習以圖報效容臣一一訪實另行奏聞外所有欽遵諭㫖緣由理合恭摺具奏伏乞睿鑒謹奏覽奏俱悉勉力效法鄂爾泰更務言行相符可也同日又奏為恭報續獲海洋盗首事竊臣前奏拏獲巨盗李奕揚等并供出積盗陳大樂王亞七梁國柱等各緣由一摺奉有硃批臣跪讀之下荷䝉我皇上訓勉周詳彌深兢惕不敢稍懈遵即飭行按察司研訊各犯嘯聚年月嚴緝逸盗取具確供詳報臣宻訪得陳大樂等俱係積年劇盗潛聚於北峯黄陽各山抽剝搶刦為害地方隨飭委廣海寨守僃馮元宻行緝拏去後於上年十一月内據恩平縣知縣姚孔鋅已將盗首王亞七拏獲兹於本年三月初五日據廣海寨遊擊報稱據守僃馮元呈報二月二十四日據線人陳已生探聽陳大樂同夥四人駕船一隻潛匿漕冲深灣隨帶兵前往擒拏一人跳水逃竄三人上岸奔逃守僃督兵追殺當獲盗夥三人一名陳大樂一名余文禮一名李蘭罩搜奪各器械并賊照帖一紙圖書等件外獲賊船一隻又據陳大樂供出夥黨大旗張亞八并跳水逃走賊黨混名陽江猪即遣撥目兵分頭追擒又據線人李雄等宻禀案内賊首梁國柱潛匿新㑹古兜山隨撥外委千把胡廷佐等前去緝拏於本月二十五日拏獲梁國柱竝據各兵在腰古山口卡及龜石地方拏獲陽江猪本名李亞三大旗張亞八該僃親自押解前來臣即當堂研審據陳大樂等供認先前在北峯山黄梁都古兜山地方同夥伴做歹事有十來年了抽剝船隻銀錢行刼商人貨物原有多遭事主姓名實不記得等語除押交按察司吊併先獲各犯細加確審究明在山嘯聚幾年行劫次數另行具奏查此案守僃馮元實心緝盗殊屬可嘉弁兵奮勇效力臣即分别當堂奬賞以示鼓勵一靣勒緝餘黨務獲并究外所有續獲劇盗緣由合先奏聞再照新㑹縣屬之北峯南峯二山界連新寧恩平開平各縣地方緊連外海山場極大樹木最多自來無業窮民就山砍伐樹木開厰燒炭以為生活因有炭厰以致匪類自霸為保厰嘯聚多人恣肆不法今欲盡行驅逐實於營業小民未便臣細加酌議查該山向有柴場一汛從前於香山新㑹廣海三營毎年輪撥千把一員帶兵一百名前往駐防繼因營房倒塌廢弛已久實無汛兵防守以致姦匪得以托足肆無忌憚今臣現飭文武各官親行查勘該汛營房需用工料實數即為發價修整照依向例輪撥官兵駐防彈壓庶姦匪不得潛藏商民俱各寧謐矣事闗地方情形一併陳奏伏乞皇上睿鑒謹奏既獲劇盗復撥汛防地方自可無虞朕嘉是覽之效力員弁仍當破格奬賞以示鼓勵同日又奏為恭請聖裁事竊廣東按察使樓儼信用革役蕭鳴一案經臣奏明奉㫖樓儼必有失於覺察之處著解任來京其按察使員缺著廣東鹽運使黄文煒署理如能勝任著督撫具題請㫖廣東鹽運使員缺郝玉麟等於道府内揀選具題蠧役蕭鳴强横肆行目無法紀甚屬可惡著該撫嚴審定擬具奏該部知道欽此仰見我皇上於按察使鹽運使二缺慎重周詳務使人地相宜之至意查黄文煒䝉聖恩署理按察使事務聽斷詳明辦事努力惟是署篆無幾未敢草率入告容臣等再加詳察明白果否勝任另行具題請㫖其廣東鹽運使一缺辦理五省鹽政所闗最重䝉皇上命臣等於道府内揀選敢不矢公矢慎仰副聖懐臣等僃查道員或分廵海疆董修戰艦或督徵税糧稽查驛站或現任要缺或人地不甚相宜均未便調補謹於知府内選有惠州府知府馮元方瓊州府知府宗思聖才具俱屬練達辦事亦各勤慎均堪膺監司之任此二員布政使王士俊亦力言其可臣郝玉麟㑹同署撫臣傅泰已另疏恭請皇上欽定一員則要缺得人鹽政實有裨益矣倘䝉聖恩俞允所遺員缺均屬緊要容臣等或於奉㫖發往候補人員或於人地相宜員内揀選另行具題請㫖遵行伏乞皇上睿鑒施行謹奏具題到日有㫖廣東總督臣郝玉麟署廵撫臣傅泰謹奏為瀝陳辦銅下情懇祈亟賜籌畫事雍正八年二月十八日據廣州府知府吳騫等㑹詳稱竊查廣東上下兩運銅斤毎年額辦五十五萬四千三百九十九斤本省竝無開採近省又不産銅向來東洋銅斤來粤發賣近來東洋洋船俱進江浙海闗竝無片銅至粤是以康熙六十年准部文行令江浙二省分辦而江南承認獨辦五省之銅迨署江蘇撫院何天培以洋銅出産不敷奏請認辦三省而福建廣東於雍正三年仍舊採辦是時廣東舖家尚有存貯銅斤可買繼後厯年承辦之員毎罹㕘罰俱赴雲南買運萬里程途往回躭擱必經七八月始到廣東若從廣西以至滇粤接壤之百色春夏多瘴人不能行必俟霜降後方可往來江河險阻夫馬舟船之費不可勝計買回毛銅又須鎔化成條工匠炭火兼之折耗在在皆須賠墊部價銅斤毎擔一十四兩五錢加入一切雜費儘力節省毎擔必需十八九兩至二十兩不等毎運賠墊之數不下一萬餘兩且自萬里買回勢不能依限解赴處分即至報效心殷補救無術種種下情伏望詳察亟賜裁畫庶下吏得以竭蹶辦理等情臣等當即批行布政司妥議去後隨據該司詳議前來臣等覆查銅斤闗係鼓鑄承辦之員自當竭力赶辦以濟公務但採辦有難易之分購買有逺近之别現在目擊情形誠恐誤公臣等同布政司王士俊詳細斟酌查部定銅價毎斤一錢四分五釐止可就近採買今逺赴買運實屬不敷可否仰懇皇上毎年於部價之外恩賞協貼銀一萬兩以為上下兩運採買不敷之用此銀或於闗羡鹽羡税羡内支用臣等未敢擅便理合恭請聖裁至粤東距滇隔越三省買運銅斤往返動經半年有餘勢不能依限起運仰籲聖恩俯念粤東去滇遥逺與江浙等省就近採買者有間敕命部臣定議將粤東辦銅各員初㕘准其展限倘展限既滿之後起運遲延即照初㕘例議處稍寛數月之期俾得竭力報效感戴皇仁於億萬斯年矣又臣等據各府禀稱銅斤自滇採買轉復運至粤省始行鎔化十足銅條又自粤省起運進京往往姦匠於鎔銷之時暗中攙假銅色不足部驗仍有折耗轉輾周折更稽時日又多賠補若竟從滇起運進京設有銅色不足照例賠補可免重複虧折等語臣等細思此言似亦近理懇祈皇上併敕部臣議覆為此合詞繕摺具奏伏乞皇上睿鑒施行謹奏所奏已交該部詳議矣據此情形辦銅一事於粤東殊不相宜候部議覆到日有㫖雍正八年三月二十六日廣東總督臣郝玉麟署廵撫臣傅泰謹奏為謹遵諭㫖㑹議營制事宜仰祈睿鑒事雍正八年正月二十一日接到大學士公馬爾賽等寄字内開欽奉上諭著將王紹緒所奏四摺及怡親王等原議孔毓珣後議爾等鈔錄寄信交與廣東總督郝玉麟署廵撫傅泰秉公悉心詳議具奏欽此遵㫖寄信前來等因欽此臣郝玉麟隨即赴省㑹同傅泰細閲各摺内事由看得粤省營制扼險據要聲勢聨絡相沿己久原未便輕議紛更是以怡親王等議將提臣王紹緒原奏更改營制事宜令臣等再行詳確定議臣等謹按地方形勢審度時宜詳加諮詢悉心籌畫固不敢急遽紛更以滋事亦不敢因循茍且以塞責伏查粤東僻處海隅荷䝉聖朝休養生息近來生聚日繁商賈輻輳倍於往昔其間營制似宜隨時酌改量為裒益庶緩急得宜輕重合度邊疆鞏固永享敉寧謹將提臣王紹緒原奏怡親王等前議及河道總督臣孔毓珣後議秉公斟酌分别應行應止併臣等因地相度芻蕘管見另繕清摺覆奏恭候皇上採擇謹奏汝等此次所議甚屬詳悉妥協殊非草率塞責之論朕披閱之下深為嘉悅但事闗更改營制重務候命廷臣再加確議奏覆有㫖雍正八年五月十一日廣東總督臣郝玉麟謹奏為奏聞事本年四月初十日據瓊州鎮臣李順呈稱雍正八年三月十八日恭遇聖祖仁皇帝萬壽聖節文武各官共向龍亭公所恭申釐祝時當寅末卯初見東方祥雲朗現瑞氣高騰五彩繽紛一天金碧紅輪璀燦光華逈異是日正值操期官弁目兵齊集由卯厯辰共瞻良久士民人等環睹如林踴躍歡呼萬聲齊慶欽惟我皇上敬天法祖九州永享昇平旰食宵衣萬邦咸臻郅治而且蠲租免賦閭閻浹髓淪肌是以川嶽星辰宇宙遍彰祥瑞顧兹瓊島天末孤懸内而黎岐蠻獞近多向化歸誠外而海口港門更復波恬浪息是皆聖祖在天之神靈昭鑒皇上孝思之無斁故爾感應海濵垂示靈異理合呈請題達等情到臣又據雷瓊道王璠瓊州府知府宗思聖瓊山縣知縣楊先椿各具詳報并轉據紳士耆老里民等呈禀前來臣不敢壅於上聞除行司查詳㑹疏另題外謹先繕摺奏聞伏乞皇上睿鑒謹奏慶雲適現於此日非尋常可比應具疏題奏同日又奏為宻行奏聞事竊照廣東左翼鎮總兵官員缺荷䝉皇上將福建延平協副將李維揚補授該鎮於本年三月二十四日到任後隨至廣州省城見臣臣看李維揚年止四十五六聽其言語雖還明白觀其舉動不甚强健據稱足有風疾有時舉發歩履微蹇等語臣查左翼一鎮兼轄副將四員大小十六營所轄地方有虎門澳門各險要洋靣為省城之屏藩山海之重鎮最闗緊要必須精明强幹才略兼優始能勝任但該鎮甫經任事其辦事之處臣尚未確知不能懸定第察其舉動神情未免遲鈍應再試看能否勝任另行具奏今據臣所見情形理合據實奏聞伏乞睿鑒謹奏若確知有不勝任處即當一面委署一面奏聞何乃游移其詞往返摺奏不顧貽誤重鎮耶同日又奏為據詳奏聞事本年五月初五日據陽春縣詳報四月二十九日嵗考童生有現任左翼鎮姪孫李國璧與該縣禮房買巻換錢爭論將盛水盅拍碎手有微傷誣指該房口咬率領李國璉等多人蜂擁縣堂毆打書辦該縣隨將禮房重責滿堂生童聽其指揮目無縣令竟欲自已行杖儒學廵檢屢勸不從將及二更衆方鬨然而出至次日清晨點名入場有童生汪武緯為攻冒籍將歐光啓打傷縣門槩行打碎復行罷考該縣宣示朝廷大典律例明條各童生始行赴考訖臣據詳當即批飭布按二司嚴提確審啓釁毁門及罷考各實情嚴行究擬去後又於本月初十日據封川縣詳稱奉行嵗試文武童生需用巻結卑職令紙戶照舊備刷成本令各童買交禮房彌封送印各童自買制刷者四百本有零其餘任造不堪爛紙卑職恐將来奉吊原巻致干駁結因將不堪之巻退出乃有藐法惡徒歐朝日梁性安等見其不用已巻於四月二十八日下晚公然進縣擒毆禮房書辦鬧至宅門拍案譁噪卑職隨即出堂將禮書鎖責再三慰諭勉強散出似此逞兇惡棍相應詳請嚴究等情據此臣亦批飭該司等秉公察審毋枉毋縱分別議詳㑹核外理合據實奏聞伏乞皇上睿鑒謹奏此事湏援引豫省之例將尤甚者一二人置之重典庶㡬革除陋習若照常法薄懲恐更滋長刁風但生殺大事所闗甚重亦不可因奉朕一時之諭草率隨順而行也同日又奏為恭謝天恩事本年四月初八日臣標千總齎捧硃批奏摺到粤䝉皇上賜臣克食二匣臣跪迎至署恭設香案望闕叩頭祇受訖伏念臣知識短淺報效心􅇻措施愚拙仰荷聖主誨勉諄諄一應政事無不指示詳明恩予造就臣惟朝夕佩誦聖訓欽遵辦理務期悉心盡力仰報主恩於萬一耳臣謹具摺奏謝伏乞睿鑒謹奏覽奏已悉但時刻母忘鄂爾泰之居官為人并伊所勸勉之言保汝一生用之不盡斷不至於大錯若遺㤀一分即有一分之損縱目下不覺其損將来必為大害汝勉為之同日又奏為欽奉諭㫖事竊臣前覆奏宻陳痼弊一摺奉到硃批臣跪讀聖諭伏念人臣事君如子之事父凡屬同官即如昆季理當同心戮力始無厪君父之懐臣本年因㑹商公務在省兩月有餘見傅泰與祖秉圭雖無參商形迹而言語似各有芥蔕之處臣欽遵宻㫖不敢宣傳聖諭以臣已意互相規勸傅泰祖秉圭聞臣之言各有慚愧悔過之心至稅務係朝廷公事臣前經面諭各闗口地方文武官弁協同廵查慎勿岐視并復檄行遵照在案臣斷不敢存彼此之見今後更當秉公照㸔仰副皇上誨勉之至意理合回奏伏乞睿鑒謹奏傅泰中平才具非宜粤撫之人已降㫖調伊回京矣同日又奏為奏聞事竊粤東各屬銀銅錫厰奉文封禁臣到任後復檄飭地方文武嚴加防範上年冬間厯據肇慶府屬開建縣文武員弁禀稱該縣所屬之芋荚山在東西兩粤交界之處兩省共此一山俱産有金砂粤西現在委官開採有等游手無藉之徒遂覬覦粤東界内礦砂每每暗行偷竊卑職等雖不時各差兵役廵查究恐不能禁絶相應禀報各等情臣隨酌撥弁兵協同分路廵查去後本年二月内臣赴省㑹商公事隨與撫臣傅泰布政使王士俊言及此事共相商酌委員前往確勘情形竝驗礦砂虛實續據該委員禀稱於四月初二日到開建芋荚山細加查㸔果有礦砂隨雇覓本地村民開一壠口自初三日起至本月二十七日止將採出礦砂舂得淨金一百餘兩所費工銀二百餘兩該地方因有官兵廵查匪徒不敢竊取等語據此是所驗礦砂委有成效非他厰可比致匪類有偷竊之念廵防益湏嚴宻臣即飭將開試之隴口封閉所有舂驗礦金解交藩庫并差弁兵㸔守去訖至芋莢山金砂礦厰應否開採容臣遵㫖㑹同鄂爾㤗將封川開建二縣應𨽻東西二省何處管理之處悉心定議具題外另行奏請候㫖遵行謹將查驗礦砂情形據實奏聞謹奏總之粤東開採一事萬不可行惟宜嚴禁稍若奉行不力即為溺職也朕頗風聞文官每欲借此圖利武員因不便破面查拏此語未審確否朕尚另有諭㫖頒發且粤省文武不和實為第一惡習汝膺兼轄之責如不秉公罰懲此弊何由革除統率闔省者惟汝一人咎將誰䣃耶留心誡飭務令調協勉之雍正八年八月二十六日廣東總督臣郝玉麟謹奏為遵㫖覆奏事竊照廣東恵州協副將繆𢎞臣前奉硃批諭㫖令臣留心試用俟有真知灼見時具奏以聞欽此欽遵臣㸔繆𢎞辦事好才具頗優營伍事務委能留心整飭實武臣中難得之員惟是為人稍覺偏執凡接待文僚先存彼此兩途之見其未經履任之先已見於言表迨到任後曾来兩次見臣臣已面為訓誡但察其才能厯練實屬去得近䝉天恩調補江寧城守副將仰見皇上明竝日月無微不燭臣謹遵㫖據實覆奏伏乞睿鑒謹奏朕灼見此人在粤無益所以調補别省試㸔同日又奏為奏聞事竊查觀風整俗使臣焦祈年廵察各屬地方於本年七月二十一日登舟渡海前赴瓊州寄橈海口候潮開行適於是夜二更陡起狂風波濤洶湧延至次日黎明所坐之船被風推至博漲礮䑓邉擱於石上不能傍岸浪掀石撞船已破碎時經海安營遊擊錢志漢督令弁目周天方華等浮水力救隨即請起敇印并將使臣甫經扶掖離船而船已擊爛仰賴皇上洪福得於險廹之中尚獲保全所有隨從人等亦俱無恙臣據協營具報星即遣人前往使臣處問慰并行查奮勇拯救使臣之目兵到日以便奬賞以示鼓勵除擊碎船隻并淹沒兵丁顔顯郭必進曹興等三名容臣確查另疏題報外所有使臣渡海被水縁由理合奏聞謹奏覽奏知道了查明奮力拯救兵丁破格厚加賞賚可也同日又奏為奏明事竊臣前奏查驗礦砂情形一摺奉有硃批臣跪讀之下惶􅋺無地伏念臣以庸愚仰荷聖主洪恩由提督擢授總督任大責重圖報為難幸䝉皇上指示殷殷俾得有所遵循且屢䝉訓㫖令臣以雲貴廣西督臣鄂爾泰為法夫以臣之才識固不敢望鄂爾泰之居心行事臣在滇日久實知之最詳服之最深如用人則隨才器使遇事則集思廣益大公為懐文武不分彼此至誠相感上下聮為一心不避嫌怨無隱無欺凡有膏澤下逮之處務必宣布天恩遇其栽培薦拔之人從不矜伐已徳此皆鄂爾泰屢飭查禁前因開建縣之芋荚山為東西兩粤交界既經查試有驗不敢不為奏聞然亦未敢遽議開採至廣東文武聞從前原有不和之惡習自臣到任以来時加勸誡現今撫臣提臣以及司道各鎮之間亦仰遵聖訓㒺敢挾私廢公兹奉硃批朂勉臣惟有欽遵諭㫖將一切礦峝不時嚴行查禁并通􅊾文武各官和衷辦事如有挾私不和臣即據實嚴叅請㫖所有遵奉硃批縁由理合恭摺奏明伏乞皇上睿鑒謹奏此奏朕嘉悅覽之硃批諭㫖巻二百十四之三欽定四庫全書硃批諭㫖巻二百十四之四硃批郝玉麟奏摺雍正八年十一月初二日廣東緫督臣郝玉麟謹奏為㣲臣戀主情􅇻恭請陛見用伸積悃事竊臣樗櫟庸材至愚極陋重沭殊恩􅍢刻難報上年臣於提督任内具摺奏請陛見欽奉硃批命臣速赴廣東緫督新任到任料理一二年周悉地方情形之後再来面朕亦不為遲欽此欽遵今計臣到任以来巳經一載有餘仰賴皇上洪福比年收成豐稔現今米糧價值甚平凡海洋大盗山林匪類頗知斂跡惟是廣東地方山海交錯習氣相沿臣職任重大知識淺短必得跪聆聖訓俾臣有所遵循况臣受恩深重未獲一覲天顔臣犬馬之私何能自巳伏乞皇上鑒臣愚忱允臣所請准予陛見臣即欽遵輕騎赴京叩仰天顔跪聆聖訓俾㣲臣依戀之誠得以稍慰而一切吏治民生之事亦得面請訓㫖遵奉措施臣無任懇切待命之至伏乞睿鑒批示遵行謹奏粤東諸務尚多未經就理路途遥逺且不必来京但能效法鄂爾泰之居心行事勝如来京見朕也同日又奏為奏明事竊照前者逆賊曽静狂悖無知仰蒙皇上如天之仁格外寛宥欽頒諭㫖昭示中外俾令愚蒙之輩共曉然扵大義臣欽遵聖㫖通行刋刻頒發在案兹廣東修輯通志經布政使王士俊聘請浙江告養庶吉士魯曽煜董理其事據魯曽煜以所定志書稿就正扵臣并向臣云諭㫖内張熙口供有屈温山集議論無不與逆書相合之語現修廣東志書纂輯從前文集有屈翁山其人恐即屈温山等語臣正在宻加察究間據逆賊屈翁山之子屈明洪現任恵来縣教諭赴廣州潮州二府出首伊故父翁山文外詩外等書語多悖逆投監認罪等情由布政使王士俊等詳報前来除㑹䟽題㕘外事關逆賊私著逆書理合恭摺具奏伏乞睿鑒謹奏知道了曽静既寛此亦當寛宥者雍正八年十二月初二日廣東緫督臣郝玉麟謹奏為敬陳愚悃仰祈睿鑒事竊臣扵本年十一月二十日接讀邸鈔知有滇省烏夷叛逆一事變起倉卒以致傷殘文武兵民臣實痛心切齒憤恨無極今督臣鄂爾泰既調三省官兵進𠞰諒兹釡㡳遊魂自當尅期而定臣愚陋淺識何敢越職妄瀆但臣在滇年乆夷猓之情狀頗為熟悉凡有所知敢不冒陳愚悃伏查烏逆所恃惟在凉山大兵到日烏逆一經破敗必以凉山為竄匿之所倘凉賊拒而不納或擒而出獻事属易結否則進𠞰機宜尤湏斟酌查川省之兵與雲貴官兵相距尚逺逆賊既守各隘㑹兵非易則川貴官兵重在分勢夾攻而進𠞰全力惟藉滇兵督臣鄂爾泰節制三省勢難親厯行間臣自顧才雖謭劣而深受國恩涓埃莫報犬馬之私實難自巳况臣任雲南二十餘載熟悉夷情若得身厯行間加以鄂爾泰之指示臣仰仗天威必能𠞰平逆猓以報主知且夷性反覆不常善後尤關𦂳要臣亦可親厯其地相度情形與督撫諸臣商酌布置務期一勞永逸俾臣藉以仰報殊恩扵萬一倘蒙俞允查臣巳具摺恭請陛見在先伏祈聖恩准臣赴京跪請聖訓面聆方略再徃雲南料理軍務則臣所有面陳之事得以上達并臣依戀之私亦得以稍伸矣臣無任惶悚待命之至謹奏烏蒙事仰賴上天黙佑業巳平復諸務俱經就緒爾殊屬多此一奏且識見亦甚卑鄙同日又奏為遊棍招揺據實奏聞仰乞聖鑒事竊查粤東鹽政流弊甚多商疲竈困臣是以事事奏請聖裁逐漸清釐整頓近亦稍有就緒商竈人等無不感戴皇仁急公承辦今年鹽足餉完毫無異議乃有江西遊棍皮應瑞者臣前聞其向曽作幕扵本年正月内請其到署相幫及接見之下見其言論舉止膚浮輕躁聞其家眷現在廣城又現同刑部侍郎王朝恩之家人在連州行鹽恐其出入關防不便隨即婉辭伊即悻然别去九月間鹽道馮元方因公来肇禀云有江西人皮應瑞近日在省甚属招揺宣言伊作一摺稿寄與舊東侍郎王朝恩代奏請借庫銀三十萬與商人今王侍郎寄信来説巳經具奏又聞伊向衆商云巳蒙皇上俞允以致各商聽信事事觀望等語臣一聞此言不勝駭異即諭鹽道嚴飭各商上緊轉輸毋得聽其狂言愚騙去後忽於十月内該棍復又到肇拜臣云有説話臣因其現在招揺不便相㑹託言辭去繼因臬司黄文煒公事来肇臣面問其事據云寄摺代奏之事果聞其説臣因巳經覆奏王朝恩條議鹽政一摺未奉聖諭不敢聲言豈意該棍以臣不令相㑹到處毁臣又見臣知而不問愈肆招揺且又揚言必再上摺等語并将摺稿鈔錄令該棍商夥許紹祖交鹽道轉送臣看臣思此等膽玩棍徒若不早為懲儆将来必致有壊鹽政除将皮應瑞飭行地方官暫行嚴加守候外事關宣露宻摺臣不敢不據實奏聞伏乞皇上睿鑒施行謹奏此係棍徒中之尤者情状甚屬可惡嚴拏審擬具奏以聞雍正九年二月二十一日廣東緫督臣郝玉麟謹奏為奏請聖裁事竊查粤東地方山海交錯匪類最易出沒所在村荘以及緊要之處無不設立墩䑓撥兵戍守但查向来修理營房墩䑓等項責令附近居民料理並不動用公項雖設兵原以衛民在百姓修整營房墩䑓以為兵丁守望之所亦属分所宜然但百姓未免視為兵舍率多潦草塞責而兵丁又視為地方修整漫不經心粘補以致修整無休經時累月兵民每起争端不能依限完竣况營房為兵丁棲止之地若不即時修整則有露處之虞而工料出自里民若地方官稍不留心胥役人等又有侵漁之弊是營房等項令民人修理實有未便臣伏覩我皇上愛養兵民至周至渥且查山東等省修理墩䑓等項俱扵存公銀兩動支辦理所有粤省營房等項可否仰邀聖恩准扵公用項下或雜款餘銀内動支分别衝僻盖造瓦屋草房定以修葺年限則百姓無絲毫擾累兵丁咸得及時棲宿地方獲藉廵防之實效兵民永戴浩蕩之皇恩矣臣因地方起見理合恭摺具奏伏乞皇上聖鑒施行謹奏公用銀兩原為地方公務而設據奏如是兩益兵民何靳而不為耶汝等計議妥協酌量行之雍正九年三月初九日廣東緫督臣郝玉麟謹奏為海洋積盗悔罪投首奏明安插事竊照廣州府属香山新㑹地方有百􅄘山及黄陽石橋等山袤延深宻逼近海洋從前原有匪類聚匿時出洋面擾害商民臣到任後業巳委弁将盗首李奕揚及陳大樂等先後擒獲俱經奏明在案續又訪得尚有混名查面五即林兆榮者原係李奕揚舊夥盤踞百峰山為匪黨渠魁臣即諭令守僃馮元設法搜捕務盡剪除今據馮元禀稱奉諭帯領弁兵等入山搜探扵本年正月二十日據效力李徳賀功加張武等帯領林兆榮暨夥黨李亞壬葉永快李亞長林亞四黄亞二周成球等七人前来禀稱情願投首效力贖罪等語隨據該僃即押觧到臣臣即親加研訊俱巳取有確供縁林兆榮等係大盗李奕揚夥黨是以從前多方緝捕今既經投首似應照例免罪安插妥協查向来所有撫丁或一二百名或􅂾十名曽經奉㫖分發直𨽻等省食糧入伍兹林兆榮等乆匿山中路徑熟悉蹤跡稔知倘遇匪徒潜匿可用為嚮𨗳以資緝捕且人数無多分撥約束亦不至有彼此勾引之弊此臣愚昧之見可否留於本省派撥營伍令其效力之處理合具摺奏請睿裁伏乞聖鑒謹奏既據奏稱可資緝捕林兆榮等准留督標效力行走雍正九年八月初八日廣東緫督革職留任臣郝玉麟謹奏為奏明酌設緝私廵丁以専責成以裕課稅事竊照廣西一省鹽務雖額輕引少官運官銷易於辦理然亦湏私鹽斂跡充斥無虞始於課稅有禆臣查西省引鹽一由廣東省河轉運至梧州府上倉一由廣東㢘州府轉運至廣西江口中屯地方上倉兩䖏水路臣巳屡飭各該地方守口盤查人員實力稽察近日一應運鹽船户以及徃来各項船隻俱不敢夾帯影射惟廣東之髙㢘二府場地零星綿延􅄆漫竈曬走漏極多最難稽查又因界連廣西私販悉由陸路挑載一路衝入廣西南寧一帶蔓延思恩太平及賔州各属一路衝入廣西􅊊林等州縣蔓延梧潯兩府各属地方動輙百十成羣逾山越嶺各州縣捕廵人役無㡬莫敢堵擒臣查此等私梟原属烏合不難堵截緫緣事無専責以致横行無忌臣現在飭行西省鹽道另募壮健廵丁一百名擬於臣標専派外委千把二員前徃率領分為二路各於私鹽衝入去處駐劄晝夜廵查堵禦聽西省鹽道約束調遣并咨移西省轉飭各地方文武嚴飭汛守弁兵地方鄉練㑹同稽查倘遇私梟充斥協同廵鹽弁丁奮勇擒拏接應将所獲私鹽一半給賞一半充餉則私梟自可斂跡不獨官引易銷地方亦可藉以寧謐至於所募廵丁工食并千把盤費毎年緫於西省鹽餘内支用開銷無容動支正項臣因調劑鹽務地方起見事關動支鹽餘差委標弁赴西省廵查理合具摺奏聞伏乞皇上睿鑒施行謹奏此乃因地制宜通融辦理事務在汝斟酌為之如應達部咨部存案同日又奏為酌劑廣西鹽務裕課便民仰乞聖裁事竊查廣西引鹽經臣奏請革去辦商名色専責各地方官辦理一應鹽斤俱係該鹽道差委員役由廣東省河運至西省梧州府以及㢘州各場運至廣西江口上倉存貯聽各地方官陸續領運行銷必得梧州江口倉鹽豐足無缺方可源源配兊及時運銷則民食無誤課亦易辦若遇雨水偶多場鹽少産或海運風信不常廣東省河鹽少則梧州倉鹽不繼各地方官不能及時領運不獨有誤民食因而課稅亦遲臣查廣西向有秤頭餘鹽一項若行銷迅速毎年可獲餘羡銀一萬三四千兩不等名為鹽餘除毎年提觧一萬兩歸入廣東京羡項下報觧歸公外尚可餘銀三四千兩以僃鹽船􅇜風失水賠補之需經臣於廣西撫臣金鉷請動鹽餘銀兩幫貼塘站工食案内奏明在案今查数年以来至雍正八年嵗㡳止除一切支用之外巳積有一萬六百餘兩現在道庫實屬羡餘無事支用又係厯年湊積之項乆乆不無牽混臣請将此項銀兩飭行廣西鹽道在廣東省河以及㢘州府於西省額引之外另買鹽二萬四千包運至梧州府并江口兩䖏上倉存貯凡遇西省引鹽遲缺之時即将此項存鹽及時配發行銷俟引鹽運到即扺還存貯永為西省預僃鹽斤附入奏銷即遇鹽道陞遷事故一體交代則西省無缺配之虞居民無淡食之慮稅課易辦官無重累國計民生甚有禆益其一應鹽價運脚以及添盖倉厫等費即於前項現存銀内支用經臣檄行廣西鹽道查議去後旋據覆稱實属妥便可行但買鹽二萬四千包為数甚多挽運不易而現存之銀尚不敷用請毎年買運八千包分作三年買足其不敷之銀緫於雍正八年後鹽餘内添用等由到臣事關預僃鹽斤臣未敢擅便理合奏請聖裁批示倘蒙俞允臣當恭疏具題為此謹奏似此裕課便民應行事宜何故不允具疏題請可也雍正九年九月二十八日廣東緫督革職留任臣郝玉麟謹奏為宻拏逃盗事雍正九年九月二十六日臣因公在省據廣州城守副将毛克明赴臣行署宻禀本日午刻有湖廣差官毛峻徳到職衙門說稱奉湖廣緫督差拏行刦江西官署盗犯沈二前觧至湖廣孝感縣楊店地方脫逃奉㫖嚴拏今追緝来廣查有蹤跡懇請撥差官兵協拏執有湖廣邁緫督委令宻拏印信牌文經職驗明合行宻禀等因臣隨諭該副将帶領弁兵親徃協拏務期弋獲嗣據毛克明禀稱逸盗沈二經地方文武官弁兵役同楚省差員人等追緝至桑園地面協力擒拏該犯竟敢持械拒捕衆人奮勇圍擒始得就縳并拏獲隨行王姓一犯又跟隨沈二之小子二鎖兒一名并行李衣服物件一併押交番禺縣收禁等語隨據該縣訊取各供詳報前来臣即批按察司再行確審供情嚴加肘鎖差委弁員多撥兵役協同楚省員役咨觧湖廣督臣邁柱外理合恭摺奏聞謹奏緝獲要犯可嘉嚴行押觧方不致有再逸之虞雍正九年十月二十二日廣東緫督革職留任臣郝玉麟廵撫臣鄂彌達謹奏為奏聞事竊照粤東風俗輕悍民多愚頑臣等毎於属員因公謁見諭令不時察訪毋使姦匪潜為不法詎有饒平縣巳革武舉余㹸先因窩賊犯案經潮州府通詳革究余㹸仍於本年九月初二日夥同陳阿幼等在海陽縣属之歸仁都横溪鄉託稱拜父母㑹歃血結盟煽惑愚民以致聨界之揭陽縣河婆地方居民驚恐逃避當經地方官曉諭各巳安業隨據海陽縣知縣張士璉訪聞經文武官弁陸續拏獲余㹸等一十三人訊據供認糾黨欲圖刦害官衙以洩私忿等因禀報前来臣等恐有别情適潮州府知府胡恂因公在省即令其星馳囬郡料理出示安慰一面行司轉飭究訊去後兹據該縣禀報隔别研訊始據各犯供係余㹸為首令陳阿幼等糾合㑹盟方行招致即為發覺等語臣等查此等匪類􅄆布流言煽惑愚民雖不足深信但事關歃血結盟此外有無通同匪類亦未可定若不親加嚴訊恐無辜者或有株累而姦徒或致漏網隨㑹差官弁遍示軍民人等如有首犯余㹸挟讎妄扳者槩行不究加意安撫以慰人心一面多撥兵役将余㹸等提至省城㑹同觀風整俗使暨布按二司研審實情究明黨數另行請㫖外現今地方寧謐人民安堵理合據實先為奏聞伏乞皇上睿鑒謹奏凡遇此等事件萬不可疎懈馴至養姦遺患假若稍存姑息之念希圖茍且結案以為能化大事作小事則誤矣但毋波累無辜為要雍正十年二月十二日廣東緫督革職留任臣郝玉麟謹奏為通核息銀數目酌議分給協營恭請聖裁指示欽遵事竊照廣東兵丁仰沭聖朝豢養洪恩足糧足餉咸登袵席乃復蒙我皇上垂念各兵吉凶之事不無所需敕發帑銀賞給營運生息以濟其用除駐防八旗甲兵外督撫提鎮各標又蒙恩賞帑本銀一十萬兩實亘古未有之曠典臣身膺全省之任自當悉行籌畫務祈均沾天澤以垂永乆查廣東通省綠旗額兵共七萬二千六百零四名内督撫提鎮兵二萬五千八百零二名又将軍標暨十四協三十五營寨共兵四萬六千八百零二名臣標原領帑本一萬八千兩借給鹽商毎月毎两二分起息先自雍正七年十一月起至九年十二月㡳臣標共獲息銀并原存平餘共一萬三百四十餘兩前計息銀巳經豐裕經臣具摺奏明於雍正九年正月起開賞至本年十二月底共賞過各兵吉㐫事銀一千六百一十四兩外存帑本并餘剰息銀共二萬六千七百三十兩零撫標原領帑本六千兩據該中軍册報自雍正七年十一月起借給鹽商至九年十二月底共獲息銀并原存平餘共三千四百九十兩自雍正九年正月起至年底共賞過各兵吉㐫事銀五百兩外存帑本并餘剰息銀共八千九百九十兩零提標原領帑本一萬八千兩據該中軍册報自雍正七年九月起借給鹽商至九年七月得獲息銀共一萬一千一百九十七兩自雍正七年十月開賞起至九年十二月底賞過各兵吉㐫事銀七百三十八兩零又動支開張當舖錢店銀八千五百二十餘兩現存貯帑本并餘剰息銀共一萬九千九百三十兩零左翼右翼碣石潮州髙州瓊州南澳七鎮原共領過帑本五萬八千兩案據各鎮報稱或借給鹽商或開張當舖或置買田産營運生息之處或毎兩二分或二分有零不等經臣據議題報在案現今行查息銀實数統於造報到日彚核外伏查臣標額兵四千五百零三名一年賞銀止一千六百一十四兩撫標額兵一千四百三十名一年賞銀止五百兩提標額兵四千三百九十七名一年有餘賞銀止七百三十八兩據此臣通盤核算即以臣標為之凖則各協營俱照此一例核算毎年通省兵丁只共約需賞銀二萬五千七百餘兩今督撫提鎮各標巳現有帑本并餘剰息銀共一十二萬二千一百七十兩零通以二分生息計算毎年已約可獲息銀二萬九千三百餘兩儘将所獲息銀均勻􅄆給則各兵巳得均沐恩賞不湏再給帑本致年乆或有侵那之弊臣愚見本年各鎮所獲息銀除行令仿照臣等標兵賞數酌量存畱該鎮給賞之外悉扵年底造具清册定限次年正月内同餘剰息銀觧赴藩司衙門臣亦将本標并撫提二標餘剰息銀一併凑入按照各協營寨兵數之多寡均勻分給令該營将領收貯即於雍正癸丑年開賞以濟各兵吉㓙之用年底造報臣衙門查考彚册報部如此則事得畫一皇上恩澤普垂乆逺矣臣與撫臣鄂彌達再四籌畫意見相同謹合詞繕摺奏請聖裁如蒙俞允容臣另疏具題為此謹奏料理甚屬妥協候另有諭㫖頒發雍正十年二月十九日廣東緫督革職留任臣郝玉麟謹奏為海􅆠關係緊要酌擬陞調之員恭懇聖恩以禆地方營伍事竊照粤東濵臨大海水師員弁較陸路尤為緊要兹有春江協副将陳顯患病不能辦理營務經臣委員驗實現在題報所有該協員缺係属水陸専營副将必得熟識水性辦事勇敢之員始克勝任查有南澳鎮属澄海協副将許大猷練水性船務辦事實心堪以調補春江協副将其澄海協副将員缺查有大鵬營恭将許國騰練習舟師馭兵有方堪以陞補澄海協副将其大鵬營恭将員缺查有海安營逰擊錢志漢吳川營逰擊蔡文昇俱係諳練水師勤幹之員經前任督臣孔毓珣保送業蒙恩准在案仰懇皇上於此二員内簡放一員陞補大鵬營㕘将則各協營均收得人之效矣臣因海􅆠地方關係緊要不揣冒昧據實奏請可否陞調洪恩出自聖裁謹奏覧奏俱悉内惟錢志漢不似有膽量之人蔡文昇雖心胸明白才具好頗欠誠實皆非朕所深取者今命爾赴閩署理緫督印務可傳㫖與鄂彌達令伊於此二員中檢選一員題補大鵬營㕘将可也雍正十年四月初六日廣東緫督革職留任臣郝玉麟謹奏為聖恩愈厚感激愈深恭摺奏謝仰請訓諭事竊臣一介庸愚荷蒙皇上洪恩畀以廣東緫督重任三載於兹涓埃莫報悚惕之懐時深朝夕兹奉恩綸命臣署理福建緫督印務聞命自天感激無地伏念閩省前距澎䑓諸島後係三吳門户實為邉海要區臣以庸材恭膺簡命惟有實心實力無欺無隐凡属地方事務細加詳察敬謹辦理但臣知識淺陋福建地方緊要仰求皇上天恩俯賜訓示俾臣少抒犬馬之誠仰報髙深於萬一耳臣即於本月初六日起程赴閩外所有臣感激下悃理合恭摺奏謝伏乞睿鑒謹奏但能勉法鄂爾泰之居心更有何可訓諭竭力為之莫負朕之倚任同日又奏為奏聞事竊臣庸陋下材膺受封􅆠重任今又荷蒙聖恩著臣署理福建緫督印務臣益兢兢􅅥勵敢不竭盡駑駘力圖仰報前因䑓灣土番不靖拒敵官兵臣以閩省接壤緩急宜防檄令近界員弁留心探訪併檄飭沿海鎮協各營多撥遊廵宻加防範嗣陸續據報兇番猖獗官兵屡被殺傷䑓鎮緫兵官吕瑞麟於二月初六日遣岸裡後壠二社土官齎帶元寳瑪瑙珠眉額綾襖等物前徃招撫初七日阿里史牛罵土番在犁頭荘截途殺死挑販数人淡水路不通等由到臣臣探得兇番實無多人原不足慮但聞䑓地客民雜處毎多作姦煽惑自應懾以軍威速為殄滅安撫善良俾兇番咸知凛遵國法若未經大振軍威使其畏威懐徳遽行招撫茍且完事似非奠安海􅆠之策臣查厦門距䑓甚近一切軍機事務便可料理臣今由漳州一路先到厦門面詢提臣許良彬細訪一切情形事宜如兇番巳就擒縳臣即赴福州駐劄衙門辦事若兇番尚在未靖臣即一面相機斟酌料理務期仰體聖心悉心籌畫寧謐地方稍圖報效於萬一耳為此恭摺奏明伏乞皇上睿鑒謹奏汝其酌量行之雍正十年五月初七日署福建緫督臣郝玉麟謹奏為䑓􅆠安帖情形仰祈睿鍳事竊臣荷蒙皇上命署福建緫督印務於四月初六日自粤起程因屡聞䑓灣土番不法戕害官兵當經恭摺奏明先赴厦門就近相機料理隨抵漳州府地方詢問文武各員僉稱䑓地尚在未靖臣即於四月二十八日渡海到厦據提臣許良彬僃言䑓匪情事竝云准陞任鎮臣王郡移請撥兵隨經檄調弁兵赴䑓䇿應署督臣阿爾賽亦檄撥兵二百名赴䑓應用又見厦門商民亦多驚惶并經酌撥兵丁分行防範等語臣查土番原無足慮竊恐姦民乘間煽惑致使地方不安必湏嚴加防禦隨與提臣細加籌畫酌撥陸路弁兵赴䑓候調竝嚴飭水陸汎防加意廵緝兹於五月初四日接到提臣王郡致署督臣阿爾賽雙羽公文一角臣拆閱内開南路姦民一事起於鳳山縣濁水溪阿猴林等處三月二十九日賊到岡山汛與兵大殺三十日賊焚舊社四月初一日焚石井猴洞䜿旗招匪旗寫大明等字様初二初三攻打埤頭營盤燒燬萬丹廵檢衙署本職隨親帶弁兵赴舊社岡山等處率同弁兵殺賊大敗守僃張玊外委千緫陳學聖外委把緫鄭光𢎞兵丁陳得添等八名奮勇陣亡本職於初六日囬府現在賊散民安擒獲首賊蕭田等便宜正法餘孽正在搜捕惟吳福生一犯尚在懸賞購緝土番各社俱巳就撫止有大甲西首犯罪在不宥分别辦理是北路勦撫頗有就緒南路小醜撲滅巳經蕩平并止署督臣阿爾賽所撥兵丁不必過䑓等語此皆皇上恩威逺播姦匪就擒地方巳獲寧謐臣隨致劄提臣王郡務將未獲兇番姦匪料理妥協使海􅆠得以永靖至王郡既止署督臣阿爾賽所撥兵丁不必過䑓臣與提臣所撥兵丁隨檄行緩發去訖臣又接䑓灣府報文本年自春以来少有霖雨今四月初七八九等日府屬䑓灣諸羅鳳山三縣時雨霑足早禾雜糧芒蔗咸皆茂盛民心歡恱彰化得雨情形現在飭查等語臣閱報文不勝為䑓海兵民欣幸仰沭皇上洪福於無􅆠矣除南北兩路啟釁縁由容臣細查諸案分别具題外切念䑓地被難民番亟宜撫綏安輯出征弁兵亟宜犒勞陣亡帶傷弁兵尢宜優恤義民亦當奨勵臣謹宣揚聖恩現在逐一料理以示勸勉并行令䑓灣府酌動庫項一千兩分交提臣王郡鎮臣吕瑞麟以為行間賞恤之用事竣開報㑹奪現在沿海一帶民人聞知䑓地巳經寧謐之信兼有多船装載米糧赴内地糶賣厦門地方米價甚平人民安堵臣謹将准到提臣王郡知㑹䑓灣安帖情形㑹同水師提臣許良彬恭摺合詞奏聞伏乞皇上睿鑒謹奏覽臺郡安帖情形朕懐深慰雍正十年五月二十九日署福建緫督臣郝玉麟謹奏為欽奉上諭事本年四月十二日署督臣将軍阿爾賽任内准兵部咨開雍正十年三月初十日内閣奉上諭前降㫖令将福建兵丁内籐牌手挑選五百名分送京師及北直陕西山西三省以僃教習之用昨據緫督劉世明奏報所挑牌手巳於二月内令其起程等語朕思此挑選兵丁所遺額缺理應召募技勇精熟之人即行充補以實營伍著𫝊諭署緫督郝玉麟等遵照辦理欽此臣扵本年五月二十四日到臣福州駐劄衙門隨查此項挑選籐牌兵丁五百名所遺額缺前署督臣業經欽遵上諭檄行各標鎮協營召募技勇精熟之人充補在案臣思此項挑選兵丁分送京師及北直陕西山西三省乃係勤勞王事逺出教習之人原籍各有家口未免内顧分心臣仰體皇上天恩現在熟籌安頓其家口俾逺出兵丁可以無慮謹具摺奏聞伏乞睿鑒謹奏安頓籐牌兵丁家口之處前經阿爾賽議奏甚屬妥協巳有㫖矣可照行之雍正十年閏五月二十四日署福建緫督臣郝玉麟謹奏為彚報二麥巳獲豐收早稻旋登大有據實奏聞事竊臣奉命到閩之日適值二麥收成之後巳據各屬報稱十分九分八分不等兹據布政司劉藩長彚報通省二麥收成分数臣查今年泉漳二府種麥最廣其收成十分者居多而八九分者間有一二處福興二府福寧一州種麥亦多其收成十分九分八分者各居其半若延建邵汀四府上遊之地宜於禾稻種麥者少收成七八分不等䑓灣海外不種二麥然通省雨暘時若是以青黄不接之時米榖價平民食充裕至現在之早稻秀實可觀臣到省連日郊外勸農即據農人僉稱今年早稻茂盛倍於徃時今巳将次收穫可望豐登臣隨查通省早稻情形據各屬所報亦與省城彷彿無異理合恭摺奏聞伏乞皇上睿鑒謹奏覽二麥豐收竝早稻茂盛情形不禁以手加額為閩民稱慶也同日又奏為海􅆠教化宜先頑民管轄宜近謹陳漳南地界情形酌議分駐改轄事竊臣粤東受命署理福建緫督印務訪聞福建漳泉地方多有巨姓自恃族大丁繁徃徃以强欺弱抗糧毆差械鬭匿犯種種不法官吏坐受處分鞭長莫及迨臣由粤入閩即從詔安平和等縣直至漳州府一路細加查問文武屬員僉稱惡習仍然未除復據漳州府禀稱平和縣南勝五寨坂仔洋頭等處大姓聚族環居列處每因小事動輙黨衆列械互鬭殺人竟同兒戲至南靖縣車田地方離縣甚逺俗悍民刁遇事緝犯亦俱抗匿不出前經卑府審度風土情形議將本府同知移駐南勝彈壓其南靖之車田割歸漳浦縣管轄通詳在案等因到臣臣隨查漳州府通詳原案内稱平和縣南勝地方離縣一百五十里附近五寨洋頭坂仔琯溪山隔黄井翠㣲三坪透龍等處民居稠宻楊林胡賴葉陳張李蔡黄諸姓環列聚居且墟場雜㳫厯来逋糧械鬭毆差匿犯事案叠積議撥漳州府同知分駐彈壓其地又稱南靖縣車田地方共一十五保離縣一百五十里東至漳浦縣城止一十五里其兇惡刁悍無異平和南勝等鄊議将車田十五保之田園丁口錢糧等項割歸漳浦縣就近管轄由司道㑹核轉詳在案臣思欲整刁悍宜先化𨗳查漳州府同知無錢糧刑名之任惟有海防之責今分駐南勝實居浦靖和詔四邑之中就近化𨗳弹壓并理海防事務毎於朔望宣講上諭督率各耆民并家族房長朝夕訓誡涵濡嵗月乆乆自能移易甚為妥便至扵車田地方丁糧田土割歸漳浦縣就近管理尤為便利詢及司道咸稱亟湏變通除㑹同撫臣趙國麟恭疏具題外所有酌議分駐改轄縁由理合具摺奏聞伏乞睿鑒謹奏覽奏将南靖所屬車田地方割歸漳浦并将同知移駐南勝彈壓等議俱屬合宜具題到日有㫖但此同知務湏得人方始有益當慎加選用為要同日又奏為恭懇聖恩事雍正十年四月二十九日署督臣阿爾賽准兵部咨開本年三月二十一日欽奉通飭營伍革除空糧陋規諸弊上諭一道當即欽遵移行各標鎮協營去後兹臣准水師提臣許良彬咨開各標鎮協營毎兵百名前經㑹奏存留守糧三名以為修理軍械及營中公事之用今伏讀上諭有營伍公用無資定有額兵百名准抽二名之諭㫖今應否改為二名抑或仍照原奏存留三名咨請示覆等因到臣臣查閩省邉海重地各營公務繁多水師又有燂洗戰船等費前經提臣石雲倬督臣髙其倬提臣藍廷珍先後奏請水陸各標鎮協營毎兵百名存留守糧三名以為整頓軍装之用仰蒙聖恩俞允欽遵在案臣自粤入閩一路觀看營伍盔甲旗械名雖齊僃但内中多有舊敝鎗械亦覺參差不一亟宜修整以壮邉海軍容且年年操演鎗礮製僃火藥暨營伍一切公事所需均係公糧三名内支用所有閩省現今存留公糧仰懇皇上天恩應否賞照原存三名之􅁆以濟修理軍装等用洪恩出自聖裁如蒙俞允臣仍不時嚴行稽察務使核實辦理不得少有虛冒俟軍装鎗械整齊完日臣核定公糧名􅁆另摺請㫖遵行為此恭摺具奏伏乞皇上睿鑒施行謹奏此事與阿爾賽商酌定議行之雍正十年六月二十日署福建緫督臣郝玉麟謹奏為奏明事竊臣抵福建署任後據臣標中軍副将王振禀繳閏五月分馬兵六十分餉銀到臣據稱此係緫督衙門隨糧即在督標三營額兵名数之内厯来按月呈繳以聽隨丁補入臣復詢問既係馬糧馬匹現在何處據稱相沿止繳餉銀實無流交馬匹細查竝無案巻不知起於何年等語臣當将所交銀兩仍發王振收貯留為公用外伏查馬糧六十分一年約有銀二千餘兩雖係向来督臣衙門相傳舊例臣思從前未定養㢘或留充為養贍家口之用今巳蒙聖恩賞給養㢘銀一萬六千两之多一切用費實屬充裕此項馬糧即應隨時招補惟是招補必湏連馬併發今既無馬又無馬價計此六十匹營馬需銀一千三百有零實無項可動既不便令官賠補更不便令兵自僃臣再四思維查閩省邉海重地兵額不便虚曠雍正八年内經前任督臣劉世明題准臣標添設水師一營即於本標撥出陸兵七百五十名外於水師提標并閩安協調出趕繒船四隻将原配兵丁共一百五十名即為新設水師教習仍支各原處糧餉原議臣標兵丁内如有缺出即令教習兵丁照依原糧頂補自設立迄今兩載以来十分之中頂補未滿一分以致提標閩安二處額兵懸曠日乆至今尚有未補戰守兵糧一百三十七名臣愚昧之見将此六十分馬糧裁改戰守兵糧補足添設原額統歸水師營管轄則兵缺不致虛曠哨廵亦免貽誤矣事關馬糧改歩倘蒙俞允臣照例具題請㫖遵行但臣愚昧淺見是否可行恭候聖主批示伏乞睿鑒謹奏所奏嘉是覽之前劉世明到京朕觀其人甚不妥協尚未料如此負心伊任内一切不及之䖏毋得代為隐諱悉行據實奏聞同日又奏為奏聞事竊照䑓灣北路兇番糾衆復行猖獗據緫兵吕瑞麟請迅發内地水陸兵三千名前赴聽調經臣與提臣許良彬署提臣阿爾賽檄調齊僃并將番匪情形及臣移咨提臣王郡親赴軍前調回緫兵吕瑞麟禦防府治各緣由逐一具奏在案隨據軍前禀報拏獲逆番元兇大武釐姦匪温賜等犯又據䑓灣道倪象愷禀稱番逆漢姦乘前撤兵之際復起邪謀欲稱番王煽惑各社觀望效尤附近居民不獲安業兵民被害者甚多經訪拏謡言惑衆假番放火殺人之林毓黄龍等杖斃漸見寧貼有近山百姓田禾布野懼番擾害不敢歸荘守僃林元禀報沙轆等社兇番聚黨数百前徃中港地方擁搶港中生理船二隻殺死船上人六七名燒燬南日營盤官兵放鎗打死兇番四名餘番始􅄆又准提臣許良彬咨開准䑓灣道咨呈諸羅縣荘民傅玉琳等禀縣水沙連社番酗酒意要作歹請預為防範隨咨王提督撥兵馳防又據臣差探禀報兇番聽得内地大兵将到踞沙轆地方海防㕔舊署為穴砍竹圍栅中起望樓不時執旗逰廵等語臣查土番本無能為緫因漢姦煽惑指使效尤不法荼毒地方擾害良民罪大惡極今據報官兵船隻即時各得順風開駕安渡重洋俱巳陸續到䑓仰仗皇上天威百姓得以安堵接提臣王郡来字云䑓地夏秋多有雨水九十月間進𠞰一鼓可得俟到行營相機變通不敢拘滯現在先委恭将李䕃樾統領大兵馳赴北路等語臣查䑓地南北二路遼濶各要隘處務期宻行佈防使番逆無可逃竄隨劄嘱王郡并嚴飭䑓灣道府遣撥兵壮衛護民人令各歸荘收穫去訖再查䑓灣道倪象愷人雖稍有才具而性情偏執與衆不睦不便留於軍前臣一面檄調該道即囬府治料理地方事務一面㑹商撫臣趙國麟暨布按二司詳加選委署淡水同知尹士俍前赴北路軍營接辦一切事務著聽王郡指示所有土番近日情形臣謹繕摺奏聞伏乞皇上睿鑒謹奏覽奏逆番情形知道了詳慎辦理毋忽同日又奏為奏請添設鳥鎗額􅁆以資捍衛事竊查雍正六年六月内經兵部㑹議沿海省分毎兵一千名設立鳥鎗四百桿續經前督臣髙其倬於恭懇聖恩等事案内酌議陸路各營兵丁器械毎兵一千名設立鳥鎗五百桿水師大小趕繒艍船按照配兵名􅁆酌添排鎗􅁆目具疏題請部議陸路毎兵一千名設立鳥鎗五百桿與定例􅁆目不符水師船隻兵􅁆器械視船之大小酌量配撥應如所請設立應用等因在案臣查閩省地方山海交錯水路則海面遼濶廵緝姦艘應湏嚴謹陸路則山深林宻人民獷悍尤資捍禦鳥鎗一項水陸均属利用臣前在廣東緫督任内曽經㑹疏題請陸營毎兵一千名應添鳥鎗一百桿共為五百桿巳蒙俞允部覆准行所有閩省陸路各標鎮協營需用鳥鎗相應仰懇皇上天恩俯照粤省之例毎兵一千名於定例鳥鎗四百桿之外請添設鳥鎗一百桿共為五百桿於營伍地方實有禆益臣案查前督臣髙其倬两次題請陸路添設鳥鎗之處部覆未允臣是以未敢冒昧㑹題謹據實具奏叩懇聖恩批示遵行謹奏照此具疏題来朕降㫖准行先即一面預為製造候部文到日遵奉按營添設可也雍正十年七月二十六日署福建緫督臣郝玉麟謹奏為調補䑓澎之武職仰懇聖恩准照舊例附支俸薪以資日用事竊照閩省䑓灣澎湖二䖏路隔重洋逺在海外從前凡由内地調補䑓澎武職雖未經接授新劄仍在原營附支俸薪以資日用毎年彚册奏報在案兹據福州城守副将馬召南禀稱有右軍守僃彭㨗於雍正九年四月調補䑓灣鎮右營守僃本年八月始行領劄在舊任附支過俸乾銀三十八兩有竒右軍千緫黄起龍於雍正九年正月調補䑓灣北路營千緫本年八月始行領劄在舊任附支過俸乾銀四十一兩有竒該僃弁俱現在䑓地藩司因近今不准附支無可著追就近在卑職營内七月分兵餉一併扣去還項現在措處􅄆給懇祈追還等語臣查閩省調補䑓澎員弁因其人材可用方行揀選任以海外要地若俟接授新劄始支俸薪則周年半載之中該員所遺内地家口養贍以及辦公日用均無所資未免有艱窘之虞臣愚見除調補内地之武職仍照定例遵行外其調補䑓澎員弁可否仰懇皇仁賞照舊例附支俸薪以濟日用俟接授新劄即於新任起支其從前巳經附支者免其追繳洪恩出自聖裁各員弁感激天恩自當倍加奮勵益圖報效矣為此謹奏此奏甚是候另㫖諭部同日又奏為遵㫖覆奏事本年七月二十三日准兵部寄到内閣大學士臣鄂爾泰等欽奉上諭據福州将軍阿爾賽奏稱䑓灣地方甚属緊要鎮臣吕瑞麟熟諳水務置之内地固為勤慎之員而於䑓鎮殊覺未便今可否将吕瑞麟調補金門鎮令李之棟仍囬原任其䑓灣緫兵一缺臣查澎湖副将章隆持重幹練才堪肆應似可委署䑓鎮印務再查福寧鎮臣馮吉品才具練達留心地方或以馮吉品調署䑓鎮而以章隆署理福寧鎮務倘蒙俞允其章隆所遺澎湖副将員缺仍遵前㫖令陳倫烱署理其興化恊副将員缺請敕令督臣遴選補授似於海􅆠有益等語爾等可将阿爾賽所奏宻寄信與郝玉麟令其悉心斟酌若各員果能勝任著郝玉麟就近酌量於䑓灣軍務就緒吕瑞麟可以更換之時宣朕諭㫖應署理者署理應補授者補授令各員前赴新任一面奏聞倘郝玉麟另有所見或更有可用之人著速行奏聞請㫖欽此欽遵臣查䑓灣鎮吕瑞麟領兵進𠞰土番一案馭兵無術毫無籌度以致土番滋擾地方百姓受害是以調囬府治彈壓該鎮既巳遺誤軍務應治以不職之罪但其尚諳水務可否革職留任調補金門鎮戴罪圖功洪恩出自聖裁至䑓灣為􅁆省籓籬所關最為緊要查署福寧鎮副将馮吉品雖辦理營務甚屬明白但於䑓灣風土民情未經熟悉其餘各鎮亦俱不相宜至於章隆原係興化協調任澎湖副将巳准部咨飭令赴任乃延挨不徃反行遶道来省明知軍務孔亟忽云請假修墳如此居心行事之員似不便委署䑓鎮臣查有廣東碣石鎮緫兵蘇明良廵察地方事務最為勤謹更能安輯兵民協和文武且才品兼優曾任閩省漳浦營守僃康熈六十年隨師進𠞰䑓匪著有勞績風土民情素所熟悉若以蘇明良調補䑓灣鎮緫兵洵属人地相宜臣謹遵㫖敬抒愚昧之見據實奏聞再陳倫烱經臣奏請委署䑓協副将奉有俞㫖其興化協副将員缺巳經委員署理俟軍務事竣容臣確核軍前實力辦事之員另行具題請㫖以示鼓勵合并聲明統祈皇上睿鑒施行謹奏覽奏知道了另有諭㫖硃批諭㫖巻二百十四之四欽定四庫全書硃批諭㫖巻二百十四之五硃批郝玉麟奏摺雍正十年八月二十八日署福建緫督臣郝玉麟謹奏為據報進勦番社情形恭摺奏聞事竊照䑓灣北路土番自作歹以来原未懾以軍威經加懲創是以狡詐反覆焚掠村荘肆無忌憚自提臣王郡同廵䑓御史臣柏修率領官兵於七月初六日到彰化縣之鹿仔港因值雨水之候道路泥濘暫住鹿仔港地方十六日天色開霽提臣即宻遣官兵分作四路親身於十七日辰刻合攻附近縣治梗阻道路素稱強梁之阿束社歹番我軍鎗礮齊發社番逃遁入山官兵奮勇追趕擒殺番賊三名其被鎗礮打死者甚衆焚其草藔積聚燬其望䑓瞭樓各鄉百姓奪其前被搶擄之牛羊農具不計其􅁆提臣即由阿束社到彰化御史臣柏修亦於是日由鹿仔港到縣二十二日提臣踏勘大肚各社歹番窺伺出入要口扼守把截隨據各營報稱歹番聞知各皆畏懼不敢復出又據禀報二十三日有南投北投猫羅三社土官通事帶同番仔駕駛牛車前赴軍前禀稱情願出力報效續准提臣王郡咨稱軍前官兵現在分為五協擇地安營拒其險要堵其㨗徑俟内地官兵到齊道路乾爽即便定期進勦等語臣查前撥官兵三千早經到齊欽奉諭㫖指示機宜續撥之兵三千名俱巳分路近發歹番見我官兵勢衆又見提臣統兵進勦軍威震赫逃匿山林茍延喘息目今秋潦巳退溪水漸乾草木枯凋四面夾攻自能尅期撲滅臣思此種土番實與禽獸無異使經大創之後知國法凛然不可再犯當縳其渠魁宥其脅從仰體皇上好生之仁斟酌機宜行之臣巳宻劄提臣去訖至於經營善後事宜俟勦撫安輯之後容臣悉心詳籌奏請睿裁為此謹奏既興此番大舉務令兇頑咸知凛畏不敢再蹈故轍庶㡬一勞永逸慎勿少存姑息復遺患於将来也諸凡善後事宜合於情理酌中為之同日又奏為恭請聖裁事竊查䑓灣道倪象愷情性偏執與人不睦是以由軍前檄調囬府先經奏明近又因該道給民壮礮位器械等物伏路即有地方百姓喧譁謂民壮通番鬨鬧道署該道亦詳稱製給小礮箭鏃等項分遣民壮伏路乃有姦民前至本道公館砍傷壮役等語據軍前署金門鎮李之棟亦具禀到臣臣節經批司将一切報案逐一提究通詳雖虚實遽難懸定但倪象愷既不睦於同官更不得兵民之心即囬府治恐亦未恊且報案纍纍均非面訊不可臣與撫臣趙國麟詳加商酌㑹檄調囬省城恭請皇上敕㫖将倪象愷觧任候審查䑓灣道為全䑓之首領統率府縣兼轄民番必湏和平持正撫綏得法之員方克勝任查閩省各道員或現任要地或出差辦銅又或才情辦事好者固有而扵䑓地之任不相宜者亦不便輕調臣再三斟酌查有漳州府知府張嗣昌為人謹慎和平才具練達且漳州宻邇䑓郡彼處風土民情該府素所知悉臣㑹同撫臣檄委張嗣昌前往護理䑓灣道印務仰懇皇上天恩俯念海外要地可否准其實授以示鼓勵洪恩出自聖裁倘蒙俞允漳郡亦属緊要臣查有以同知銜管理晋江縣事王之琦莅任巳将三載於一應地方實心整頓辦理妥協上年計典曾經薦舉若以該員陞補漳州府知府亦属人地相宜臣謹繕具宻摺恭請聖裁伏乞睿鑒謹奏照所請行該部知道雍正十年九月十八日署福建緫督臣郝玉麟謹奏為酌議䑓地文員之年限以示鼓勵以昭畫一事竊查䑓灣一府孤懸海外舊例文武各官三年俸滿即陞嗣經前督臣滿保條奏以熟諳之員難得請将道府㕔縣巳經任滿者再行加銜留任三年續又經前督臣髙其倬奏請更定四年荷蒙皇上洪恩俯念䑓灣道府㕔縣等官至期六年為滿又加以候缺交盤渡海之期實属太乆著令自到任之日為始将滿一年之期令督撫於閩省内地官員内揀選賢能之員到䑓協辦半年之後令舊員囬至内地補用并經部議期滿分别議叙加級原以調䑓各員前後在䑓為期不逺所以酌予加級實為允當迨至雍正八年復經前署督臣阿爾賽以調䑓各員統計前後協辦之期不過年半而獨當其任者不過半年恐庸員草率塞責請将調䑓各員到任二年督撫另選賢員赴䑓協辦等由奏准現在遵行臣查䑓員定以二年之限又加協辦半年統計巳二年半矣再加交代渡海為期不下三年而回至内地止子加級似非仰體我皇上鼓勵海外臣工之意况查今陞陸路提臣王郡前在䑓灣緫兵任内於雍正八年奏稱䑓澎鎮協各員蒙皇上特用受恩深重應遵照舊例三年報滿候用所有㕘将遊擊守僃等職請以二年俸滿及交代渡海實合三年之􅁆等由經部議覆准令候缺陞用在案是同一在䑓人員武職歴俸二年得邀陞用文員歴俸二年半僅議加級其例似未畫一臣愚以為䑓灣道員職任監司身沐皇上隆恩應照䑓灣鎮協三年報滿恭候聖明酌用至知府同知通判知縣各員似應照武職􅄁将遊撃守僃等官之例俸滿陞用庶文武陞遷年限畫一而䑓地文員自必益加鼓勵出力報效於海􅆠似有禆益是否可行伏乞聖主睿鑒謹奏此奏是該部議覆施行同日又奏為恭奏進勦逆番情形事竊查䑓灣各番社復肆焚掠經提臣王郡同廵䑓御史臣覺羅柏修率領官兵於七月十七日攻破阿束社及分協扼要定期進勦各情形臣巳恭摺奏聞今查提臣王郡於八月二十一日同御史臣覺羅柏修率領官兵三千餘名并義勇親丁人等分兵三路進𠞰倡首作歹之南大肚社先於二十日分兩路由水深流緩之處過溪設伏預防逆番来伏至二十一日丑時大軍黒夜渡溪逆番見官兵勢衆其平時埋伏暗鎗冷箭俱無所施我軍鼓勇如入無人之境直逼逆社用大礮打開連斃六七番乘勢分左右前後環攻逆社圍栅土墩䑓寨周圍十餘里移時𠞰洗逆番奔竄死於鎗礮者甚多牛羊器具俱為被害百姓搶囬社厝糧食焚燬浄盡中北大肚二社全社泥首膝地乞降求生又有猫羅大武南北投沙轆等社前赴軍營叩首乞命酌量安頓又岸裏朴仔阿里史三社土官通事率領男婦共二千一百餘名又大甲東南日南北等社土官通事率領男婦共六百餘名執旗掛彩跪投軍前情願出力堵截兇番嗣官兵又搜至各兇番積藏糧食之所兇番皆穿林而逃所積糧食盡行焚燬用礮火擊死衆多復又扎營猫霧捒絶其水道并安頓阿里史朴仔籬等處斷其後路南大肚社兇番懼怕畏服該社土官加九眉閣等亦各前赴軍營伏地求生提臣王郡飭令舉出兇番方准免死現在北路一帶方圎八百里地方俱巳安寧人民歸荘官兵義勇嚮𨗳全軍無一損失現今只有枋山雙藔等社亦在過溪搜勦兹准廵䑓御史臣覺羅柏修等咨㑹併據軍前各官飛報前来臣查逆番作歹南大肚係属强梁倡首之社仰頼皇上天威逺震将士争先奮勇兇番一鼓成擒各社多巳来歸未靖餘孽絶其糧米斷其食鹽勢窮力廹自可尅期搜捕殲除臣現在復劄提臣王郡確查悉心籌畫再行奏請聖裁為此謹奏覽𠞰捕逆番情形深慰朕念同日又奏為遵㫖奏覆事雍正十年八月二十五日據臣標外委千緫朱光正齎捧臣前奏請隨糧馬兵改歸歩糧一摺欽奉硃批所奏嘉是覽之前劉世明到京朕觀其人甚不妥協尚未料如此負心伊任内一切不及之處毋得代為隠諱悉行據實奏聞欽此臣查前督臣劉世明任内雖無踰閑蕩檢然其不及之處仰蒙皇上下詢臣又何敢代為隐諱臣案查前督臣劉世明上年九月十七日題報恩賞兵丁生息銀两䟽内稱巳於八月内開賞臣計其月日是必開賞在先題報在後也詎今不但不曽開賞且尚有本銀八千餘两未發臣奉諭㫖詳細斟酌照依滇粤之例勻給協營通盤打算儘有寛裕現在㑹同撫臣趙國麟署陸路提臣阿爾賽水師提臣許良彬題覆請㫖是前督臣劉世明先不能上緊料理後復􅅤糊具題難逃聖鑒者也再查從前欽奉諭㫖發徃閩省試用人員委署試用之後察其人果可用自應酌量才具之長短分别地方之繁簡照例扣限題請實授如有實在不堪委用者亦應即為題㕘或咨囬吏部使人知所勸懲實心出力報效庶於地方有益乃前督臣劉世明信用之人不得其當而又偏執巳見多不察實分别題請如候補通判王朝棟係雍正五年間奉㫖交廣東撫臣楊文乾帶徃福建試用若能盡力即行題補若不盡心辦事即給文咨囬吏部之員歴經委署漳州府同知興化府通判仙遊縣泉州府通判延平府通判沙縣各印務是􅔜員到閩巳經六載署篆巳經六任查其到處尚能勤慎辦公至今未得一缺其餘到閩候缺候補有曽再試三試歴今三四年不等者尚有二十餘員臣除将王朝棟現在題請補用外餘亦逐一細察如從前歴試才可勝任者次第請㫖遵行固不敢使才具平庸不能料理地方之員濫膺民社亦不敢使諳於吏治有志上進者一槩淹滯而不為鼓勵也又查前水師提標後營遊擊胡貴八年二月内在守僃任内經署㕘将鄭良逹詳委看修各營戰船嗣因胡貴護理後營遊擊不能到厰經㕘将張天駿另委千緫許順看修後許順被提臣許良彬㕘革又改委千緫黄良看修内有萬字二號一船係八年九月内據黄良具報興工其竣工日期亦係黄良具報竝無胡貴協看字様後􅔜船造不合式前督臣劉世明竟将胡貴題㕘荷蒙聖明著令引見胡貴經将修船縁由奏明蒙皇上因以胡貴監修船隻題㕘殊屬屈抑敕令臣等查㕘通省員弁聞聼之下莫不感頌聖明洞鑒隠㣲踴躍思報臣現在查案㑹同提臣許良彬題覆是胡貴之被㕘亦前督臣劉世明不細心查明致屬員有屈抑也以上事件皆臣查確理合據實奏覆至此外督臣劉世明有無不及之處容再另訪恭奏再查閩省風氣較之粤東大相懸殊粤省陋習仰蒙聖恩屡頒訓諭人人知改文武各員莫不歡忻鼓舞努力自效閩省文武兩途既少浹洽之心又乏踴躍之氣遡其所自緫緣上下之情未孚事事交相推諉以致地方公務多有廢弛臣受聖主再造洪恩敢不盡心整頓惟是知識短淺力恐不逮叩懇聖恩指示教誨俾臣有所遵循則感戴生成之徳永無紀極矣臣謹繕摺覆奏伏乞皇上睿鑒謹奏劉世明前此一切謬誤卿竭力整頓務俾各得其宜雍正十年十月二十一日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為買銅之洋船囬棹有期委員之在蘇守候無益謹為酌量變通恭請睿鑒事􅀼查閩省承辦銅觔每年上下兩運共該銅五十五萬四千三百九十九觔例應先期輪委道府前徃蘇州採辦洋銅交觧第辦洋銅必湏先購倭照選商給價置貨出口而倭照每年有自一番起至三十七八番不等必挨順輪番給買不能越次先得且本年倭照務至本年正月初一日方許船進東洋交界更因近年彼國産銅不敷多有上年倭照銅船在彼守候必待其依次買足方許本年倭照之船採買惟是本年倭照毎為江浙等本省買去閩省辦員無可如何只得覓買下年之照按其年分番數再候上年倭照銅船買足纔得銅觔計其出洋囬棹之期約湏二十餘月若該委員照巳買就商巳招成将價給領之後即在蘇守候亦屬無益自應囬任料理地方事務乃查閩省向例委辦銅員印務即另委員署理必将銅觔交運起觧清楚方許囬任故該員等徃徃藉此逗留雖有時囬閩因銅未起觧亦不得接印視事臣等查道府俱蒙皇上酌量才可勝任方行補授之員今辦銅各員因守候洋船在蘇閒坐不特有曠職守亦且貽誤地方即遴選委署亦難得人地相宜之人臣等悉心思維若委員承辦止遴員代理印務俟該委員到蘇買就倭照招商給價之後即令囬任其在蘇設有未完首尾即一面報明在蘇辦理若無可辦之事不得藉端逗遛囬任之後或探聼囬棹信息止著親信家屬并妥當家人在彼守候俟洋船回棹或仍令再徃收銅交押運官起觧前後徃返每次屈指不過數月銅觔既得照例辦觧地方亦得正員料理似為兩有禆益况查江蘇承辦人員原在本省固無庸離任委署浙江委員採辦亦止委佐貳暫行協理辦員到蘇招商發價後即囬本任從無委署之例福建與浙省接壤所争不過旬日路程自可仿照而行除飭查明買照招商給價出口在蘇無事之員著令囬任外臣等為地方現乏道府大員辦事辦銅人員在蘇閒住所有酌量變通令其囬閩任事縁由理合具摺奏聞伏乞睿鑒謹奏所奏是如此庶免曠官廢職之失也福建緫督臣郝玉麟謹奏為海疆要鎮重在得人據實恭懇聖恩事􅀼查漳州鎮緫兵初有徳先因生患鬢疽病勢沉重臣恐有誤地方營務經委福州協副将馬召南前徃協辦具摺奏聞今􅔜鎮初有徳所患之疽醫治不痊於本年九月二十六日身故臣准署陸路提臣阿爾賽咨并據漳州鎮中軍遊擊文際髙呈報除恭䟽題報外伏念漳州地處濱海界連粤省接壤澎䑓最為緊要􅔜鎮事務非老成持重才能練達者勿克勝任查福協副将馬召南歴練老成熟諳營伍整頓有方委係才具出衆之員臣現在委令署理􅔜鎮印務但緫兵職任封疆臣何敢冒昧陳奏惟是漳州地方緊要實非他鎮可比臣既知馬召南才堪勝任何敢緘黙可否将馬召南補授漳州鎮緫兵洪恩出自聖裁臣因地方起見不揣冒昧恭摺具奏伏乞皇上睿鑒施行謹奏漳州緫兵一缺巳有㫖下部命卿㑹同阿爾賽酌選将領遞行題補矣同日又奏為恭報蕩平䑓番大㨗事􅀼查䑓灣北路土番逞兇不法殘害百姓擄掠村荘阻梗道路勢甚猖獗據䑓灣緫兵吕瑞麟請兵三千飛赴援𠞰臣隨即調撥官兵遴選幹練将弁李䕃樾等統領飛渡進勦一面奏明令提臣王郡親徃督征一面另行撥兵預僃欽蒙皇上睿慮深逺以撥徃之兵務湏多僃復經臣撥兵三千名赴䑓協同𠞰捕經提臣王郡先将附近彰化縣治梗阻道路素稱强梁之阿束社一鼓𠞰除即有南投北投猫羅三社土官通事帶同番仔駕駛牛車前赴軍前情願出力報效續經提臣王郡勦滅強梁倡首之南大肚社隨有中北大肚二社及猫羅大武南北投沙轆等社乞降求生又據岸裏樸仔籬阿里史大甲東南日南北等社情願出力堵截兇番經臣節次具摺奏聞兹提臣王郡於八月二十五日分兵七路圍勦水裏逆社立時攻破遍行勦洗九月初三日有牛罵社并沙轆餘孽令加巳烏臘二名詐降狡延隨經查出立時擒獲一面分兵圍勦又據水裏社降番獻出首兇睂箸等三名又擒獲阿朥萬等四名南大肚降番獻出首兇烏臘睂仲等五名俱即於軍前正法示衆初九等日搜勦牛罵沙轆餘孽打死兇番衆多十六日勦雙藔猫盂等社用礮打死十四番中傷者甚多餘即逃入菀裏社後山十七日勦捕大甲西巢穴焚燒積糧十九日有吞霄莞東等社土官率領男婦三百餘名赴軍營乞降二十日恭将李䕃樾探聞各社逆番俱逃入小坪山禀報提臣王郡分兵三路於五鼓時直搗小坪山逆番巢穴逆番正在装車别徙出其不意我軍掩至鎗礮齊發打死多番窮追至大坪山深林脚下逆番盡棄車輛馬匹等項惟有赤身逃入内山獲牛千餘隻馬八匹車數百輛焚燬糧食四百餘堆二十一日乗勢搜捕追至内山悠吾乃地方打死兇番甚多斬獲番首二十二日有吞霄大甲西土官率領男婦四百餘名泥首乞生二十六日有猫盂雙藔菀裏等社土官率領男婦老㓜一千餘名口前赴軍前叩首乞命二十九日又據吞霄猫盂雙藔菀裏房理五社土官阿帶等帶同番衆自行綑綁匐赴軍營跪請受死經提臣王郡令其獻出首兇隨據雙藔等社獻出首番媽媽等四十二名押觧彰化縣收審又擒出漢姦胡清父子並戴偉坤黄寛蔡妹等五名聼候審究又擒出乆慣作歹為首兇番大匏藥瓦里二名即行處死又擒獲大甲西首兇加臘猫倫等二十一名正法另獲壮番并番婦番仔等四十二名口發縣收審又據押出牛罵社番一百九十二名沙轆社番男婦老㓜二百九十餘名口交營看守䆒出首兇分别審擬安揷其吞霄等社莭次乞生各番逐一安頓訖現今北路方圎一帶地方道路悉皆寧静百姓安居樂業商賈照常徃来無不感激皇恩歡呼載道據臣差探并軍前各官同提臣王郡等星夜飛報前来除将現獲兇番飭令從重䆒擬以彰國法以安地方外所有蕩平䑓番大㨗縁由理合具摺恭奏再查此次征勦䑓番歴准提臣王郡同廵䑓御史臣覺羅柏修咨報長福營㕘将李䕃樾事事争先智勇出衆官兵義民人等亦莫不奮勇報效其出力用命之處容臣查明等次分晰造册題報合并聲明臣謹㑹同福建廵撫臣趙國麟合詞奏聞伏乞皇上睿鑒謹奏據奏兇番蕩平餘社傾心向化以手加額覽焉此次征勦官兵人等具題到日另有恩賚更有諭問之㫖命大學士轉傳同日又奏為請㫖事􅀼查署南澳鎮康陵原係金門鎮緫兵於雍正九年正月内奉㫖著南澳鎮緫兵張起雲署理福建陸路提督印務南澳鎮緫兵印務著康陵署理欽此今查署陸路提臣張起雲於上年十一月内巳經病故南澳係海疆重地臣查康陵老成練達熟於水師一切營務俱能整頓與南澳甚属相宜可否将康陵實授南澳鎮緫兵伏候聖裁再查金門鎮緫兵印務經前督臣劉世明等遵㫖遴選延協副将李之棟署理其延協副将等印務并經遞行委署在案除延協副将李之棟巳於署鎮任内為捏報廵洋焚燬戰船一案奉㫖革職其金門一鎮亦經奉㫖将䑓灣鎮緫兵吕瑞麟革職著在金門鎮效力贖罪外所有延協副将遞署等缺可否容臣悉心細察於現署人員内有才具果與銜缺相稱者題請補授抑或仍行署理之䖏合併陳明統候睿裁批示祗遵臣因海疆營務緊要起見不揣冒昧恭摺具奏伏乞睿鑒謹奏延協副将以馬驥補授巳有㫖矣其馬驥所遺原缺卿遞行題補可也雍正十年十二月二十日福建緫督臣郝玉麟謹奏為遵㫖覆奏事􅀼臣恭摺奏報蕩平䑓番欽奉皇上硃批據奏兇番蕩平餘社傾心向化以手加額覽焉此次征勦官兵人等具題到日另有恩賚更有諭問之㫖命大學士轉𫝊欽此又接大學士鄂爾泰張廷玉来字内開雍正十年十一月十七日奉上諭據郝玊麟奏稱此番征勦䑓番㕘将李䕃樾智勇出衆事事争先等語朕查李䕃樾從前来京引見朕看伊人材精壮似有膽量原是記名上等之人今思䑓灣地方緊要副将陳倫烱未知勝任與否李䕃樾既著有勞績或将伊補授䑓灣副将陳倫烱調用内地是否人地相宜爾等可寄信宻問郝玊麟令其據實囬奏欽此遵㫖寄信前来臣捧讀之下仰見聖主慎重海疆酌用人材之至意臣細察㕘将李䕃樾才力兼優於副将緫兵均能黽勉辦理惟查䑓灣副将係水師員缺駐劄安平額設戰船五十六隻有督率兵船出洋廵哨之責李䕃樾從前歴任俱在陸路而水師似未諳練臣於未奉諭㫖之先巳經奏請将該員補授興化協副将現在候㫖至陳倫烱先任䑓灣副将陞補䑓灣緫兵該地風土向所熟悉水師船務亦稱諳練更兼撫馭有方番民至今感頌􅔜員自本年任事以来辦理尚属妥協臣現在委令協同䑓灣道張嗣昌前徃大肚溪一帶安插歸順土番務使得所而一時亦難得人地相宜之員堪以調補但䑓灣地方緊要臣仍不時細察如有不甚相宜之處自當酌選妥員請㫖調用斷不敢稍有草率致滋貽誤也縁蒙諭㫖事理謹繕摺覆奏伏乞睿鑒謹奏所奏是候另有諭㫖由内閣頒發雍正十一年二月二十日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為奏聞事􅀼查陳秦使違禁販鐡出洋案内無照客民方成等貨物經臣等審明題請照例入官應俟部覆到日估變但查各貨物堆貯厦門近海潮濕之地巳經三載俱有霉爛若再遲乆必致漸成廢物且查方成等所帶之貨絲邉番襪等物原係販賣吕宋非内地適用之物雖有縀紬綾機槩係粉漿必仍賣給出洋商人方可得價而出洋商人向例在正月内開洋七月内囬棹若過正月則各商貨物置就又不能另尋售主必湏又擱一年臣等是以先行估變據牙行人等約估止報稱值銀數千两臣等查一船貨物雖除正經大商有照各貨先經給還外現在之貨豈僅值銀數千兩查副将張天駿為人誠實併遊擊胡貴熟諳貨物行情檄令㑹同厦門同知胡宗文帶同牙行逐一確估除去霉爛蟲蛀物件外實值厦鋾番銀三萬二百二十三兩零較前約估相去懸殊臣等隨飭趁此商人置貨出洋之候及時變賣巳據各商照依行例先繳一半銀一萬五千一百一十一兩零其餘一半俟七月内囬棹照數交繳取有殷實行商連環結保先繳之銀現飭觧貯藩庫另行咨部查核外但此等𤨏事原不應上瀆宸聰臣等因違禁事案理應完結謹此繕摺陳奏伏乞睿鑒謹奏如此實心任事何患諸弊不除吏治民風之不就理也殊屬可嘉朕之奨許非為區區二三萬金估變之項而發盖取卿等之存心耳毋得錯㑹福建總督臣郝玉麟謹奏爲遵㫖覆奏事雍正十一年二月十六日接到大學士鄂爾泰張廷玉來字内開雍正十一年正月十九日奉上諭福建水師提督員缺甚属緊要著郝玉麟於閩廣兩省水師緫兵内有伊深悉可勝此任者揀選一二員宻行奏聞候朕簡用爾等可寄信前去欽此臣跪讀之下仰見我皇上慎重邉海封疆至意臣查福建水師提督駐劄厦門為全閩各海口鎖鑰控制澎䑓海外最關緊要必諳練水師營務熟悉邉海情形者方克勝任臣於閩廣兩省水師緫兵内再四斟酌悉心揀選如粤省碣石鎮緫兵蔡添略熟諳水務實心任事雖才情稍覺拘謹而人甚老成堪任提督不致貽誤閩省緫兵内惟新調䑓灣鎮蘇明良才品兼優水務素諳亦可勝提督之任但蘇明良甫經調䑓任事方新如蒙聖恩将蔡添略補授提督臣無庸瀆請外倘蒙将蘇明良補授提督䑓灣尤關緊要必得人地相宜有才有守者始克勝任查福協副将馬召南歴練老成人甚妥當以之補授䑓灣鎮緫兵實能勝任臣愚昧無知荷蒙皇上下詢敢不悉心揀選慎重籌思但識見短淺是否有當統祈聖鑒謹奏蔡添略既属新進資格未深兼之粤省熟諳水務者少正亦需員彈壓蘇明良固勝提督之職但䑓灣甫經底定綏輯事宜更為緊要豈可輕移至若馬召南材甚庸平向乃朕所稔悉近雖歴練何遽能改心易行耶試於此外另舉一員候朕酌奪如或不然王郡猶堪水師提督之任否總俟卿再加審度覆到之日有㫖雍正十一年三月初二日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為撥運倉榖接濟隣省事􅀼照閩浙兩省壤地相連年嵗米價時有傳聞上年閩省收成仰荷聖主洪福各属咸慶有秋惟接壤浙省之福寧州地方稍有蟲傷縁通省豐收米榖源源接濟至今米價不致騰貴浙省上年偶有數處收成稍歉米價漸至髙昂臣等留心訪問今春愈為騰貴屬在隣封理應緩急相資今准浙江督臣程元章咨開據台州府詳稱去嵗田禾間被蟲傷以致西成稍薄米價愈騰查閩省去嵗年成甚豐現今米價平減詳請招商赴閩買運榖石赴台糶賣行司議詳批令暫准海運通糶源源接濟移咨閩省出示招商并許浙商採買等語備文前来臣等𫝊同司道悉心酌議閩省雖連年豐稔縁山多田少産米無多兵民食指浩繁從前屡荷皇恩截運江浙米榖及江西採買米石積貯以至今日得獲充裕是本地之米原無盈餘也臣等仰體皇上厪念民生至意輾轉籌維查有䑓灣府属鳯山縣積貯各案内除本縣現存榖五萬四千餘石外另有節年收貯八社地方倉榖二十四萬四千餘石今酌撥榖十萬石一面檄飭䑓灣道府迅即遴委妥員照數運至厦門以備浙商採買運赴台屬糶賣接濟民食一面知㑹浙省督臣僉商来厦照依時價買運臣等竝檄閩省地方官出示招商買運赴台公平糶賣仍給以路照載明榖石數目到彼呈請所在有司驗明填照囬銷庶姦商不致影射外運所有榖價俟秋收即行陸續買補還項在􅃫邑倉儲仍多貯蓄不致缺乏而浙省台屬人民得資接濟矣事關動撥倉榖理合繕摺奏聞伏乞睿鑒謹奏籌議甚好嘉是覽之雍正十一年四月初五日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為二麥豐茂逾常早禾亦多暢茂謹據實奏聞仰祈睿鍳事臣等查閩省山海交錯人稠地狭比年以来仰荷皇上福庇屡慶有秋上年收成亦為豐稔惟冬季雨水較少今春米價稍増臣等即將存貯江浙之米行令出糶米價隨平迨至正二月間雨水雖有尚未霑足幸得三月初十日起至十五六連日大雨查據各屬報稱本年二麥結實甚屬豐茂現在收穫其早稻連得大雨及時栽插青葱盈野倍覺茂盛米每石自一兩起至一兩一錢不等價值甚平地方寧謐又據䑓灣府暨所屬各縣禀稱䑓地俱係稻田種麥者少現今早禾蕃盛倍常米榖價平民番樂業等語臣等查閱禀報不勝歡忭是皆我皇上敬天勤民太和翔洽之所致也所有二麥巳經成熟現在收穫以及早禾暢發情形理合據實奏聞伏乞睿鑒謹奏覽二麥早禾併米價情形朕為閩省黎庶曷勝額慶當愈勉誠敬以仰邀天恩祐庇同日又奏為奏聞事􅀼准浙江督臣程元章咨開據台州府詳請招商赴閩買運榖石赴台糶賣并咨閩省出示招商買運等由當經臣等查有䑓灣府􅃫山縣收貯八社地方倉榖二十萬四千餘石酌撥十萬石迅速運至厦門以備浙閩商人買運以資接濟情由先經具摺奏明嗣經半月尚未有商赴買而臣等訪問台屬米價甚昻若俟浙商来買運徃誠恐緩不及濟擬就厦門存倉䑓榖趁此南風便利委員先行運送二萬石赴台糶賣以濟民食但查浙省原咨止有招商買運之說所有閩榖運台照依䑓價并一切運費與􅔜處市價有無平減禆益於民之處難以懸定隨即差弁星夜咨商浙江督臣去後一面選委文武員弁行知厦門同知将收貯雍正九年䑓榖内暫撥二萬石配定船隻等候俟􅃫山縣運到倉榖補款兹准程元章覆稱台屬需米甚切若得此二萬石榖接濟實屬有禆如湏再撥容當酌量另行移咨僃覆到臣等臣等即令預經委定員弁酌帶水脚銀兩於四月初三日兼程赴厦領運竝咨覆浙江督臣外所有運榖接濟鄰省縁由理合恭摺奏聞伏乞皇上睿鑒謹奏覽奏運榖赴浙情節知道了凡事咸應酌其緩急權其損益而為之豈可拘執一定耶同日又奏為據情遵例代奏仰祈聖鑒事據福建廵海汀漳道郭朝鼎禀稱􅀼查隨任旗員子弟荷蒙皇上天恩著令歸旗學習實聖主造就人材之至意朝鼎在泉州府任内欽奉諭㫖緣長子候選州同郭治向因抱病延醫調理具結報明咨部在案嗣因朝鼎仰蒙皇上洪恩授今海疆要缺職司廵海兼轄汀漳二府竝有承辦修造戰船之任均關重務往来廵察督催修造不敢少懈一切稽查案巻察􅜊戰船工程俱係長子郭治在署協幫辦理今病雖痊愈現在辦事稍知頭緒奉憲嚴催起程朝鼎下情未敢上達兹奉恩㫖凡子弟中有可以助其父兄辦理事務者道府等官有督撫代奏之例朝鼎跪讀之下不勝感激涕零伏念朝鼎雖生四子次子郭河年止七嵗三子寧武年止六嵗四子春泉年止五嵗俱属幼稚惟有長子郭治年三十二嵗賦性固属庸愚尚知謹慎小心可以稍助朝鼎辦理公事理合瀝陳實情懇請代達天聼倘蒙聖恩俞允准将郭治留隨任所不惟朝鼎得資臂指而郭治得以漸習吏治亦當同效犬馬上報君恩等情具禀前来據此臣等查汀漳道員職任廵防兼有修造戰船等事現今􅔜道名下承辦修造戰船一百餘隻責任繁重􅔜道郭朝鼎居官勤慎辦事實心今據稟稱伊子郭治向經在署幫理請留隨任學習等情臣等不敢壅於上聞謹具摺代奏可否准其隨任學習以助其父辦理事務洪恩出自聖裁伏乞睿鑒為此謹奏郭治准留隨任學習移咨􅔜旗知之雍正十一年五月初一日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為奏聞事臣等撥運厦門䑓榖二萬石前赴浙江台州接濟巳於四月十三十六二十二等日陸續運送去訖正值風信順利約計五六日可到又聞浙省杭州府一帶民間食米每石價銀一兩七八錢不等被災窮民赴省城覓食者甚多惟目下正值青黄不接米價日漸増昂臣等查現今運徃䑓榖價值連脚費等項運至乍浦每石不過一兩二錢上下較浙省米價似覺稍賤伏覩我皇上厪念民生軫恤僃至事關民食臣等自應悉心辦理查原議撥運䑓榖十萬石除巳運赴台府二萬石外現今再撥二萬石委員照前由海運至浙江乍浦地方咨交浙省督臣即照原價糶賣以濟民食其餘六萬石現在預􅇱停妥臣等再加細查彼省米價情形酌量辦理所有續運榖石前赴浙省緣由理合具摺奏聞伏祈睿鑒謹奏浙閩連界文移甚便與􅔜督商酌辦理可也雍正十一年六月二十七日福建緫督臣郝玉麟福建廵撫臣趙國麟謹奏為敬陳地方情形増改府州縣治以専職守事􅀼惟閩省山海交錯幅員遼濶内為各省屏藩外控海洋諸島建置尤當得宜臣等荷蒙皇上天恩畀以海疆重任凡属地方事務共期悉心辦理不敢苟且因循致滋玩誤查福建福寧直𨽻一州東臨大海南接省㑹北連浙省温處等郡西界建寧府属悉係崇山峻􅊐地方最關緊要知州本任有讞獄催徴各項公務而所轄福安寧徳二縣刑名錢榖又均由其􅜊轉事務繁冗兼顧實覺勉強又福州府属古田一縣地處萬山之中延袤九百餘里共編都保五十餘處每年額徴錢糧二萬七千三百有竒習俗獷悍犯案纍纍應納錢糧歴年抗欠縣令親徃徴比或審驗案件即相率逃避深山莫可踪跡惡習相沿竟為得計若不亟為整頓致使積惡日深罪不能逭法不可貸甚非仰體皇上如天之仁至其餘各縣以及村鎮緊要之處歴舉地方文武備載情形詳請改設移駐緣由臣等一併行令布按二司暨各道轉飭確勘妥議去後兹據司道行據各府勘議㑹詳前来内稱福寧一州向轄福安寧徳二縣兼與福寧鎮同城一切地方事務甚属繁雜又係自浙入閩水陸通衢咽㗋之地知州一員顧此失彼照料難周實覺勉強且與緫兵體制未稱應請将􅔜州改設為府除原轄福寧二邑外另設附郭一縣即以州牧原管之錢糧户口専任辦理再建寧府之夀寧一縣離建寧水陸共六百里路徑﨑嶇離福寧止二百七十里平坦易行以之改隸新設之知府管轄甚屬近便則一府四縣體制以隆而督率分理之任亦各有責成矣又古田縣地方甚属遼濶姦匪易於潜踪内地名雙溪一處離縣二百餘里山深路險民情尤為頑梗明季原設捕盗通判駐劄其地舊址猶存應於雙溪増設一縣即以古邑之二十至三十四都錢糧八千六百餘兩户口萬餘分撥經管就近化𨗳毎遇朔望宣講上諭督率各鄊耆民朝夕訓誡涵濡嵗月乆乆風俗自能移易頑梗可除錢糧亦得清完其新設之縣亦隸福州府管轄又閩省下㳺泉漳二府俗悍民刁健訟好鬬所轄地方太廣實有鞭長不及之處應各設直隸州互相分理内有泉属之永春縣接連興延漳三郡姦宄易於透越重岡複􅊐離府甚逺西北至徳化僅三十里西南至大田一百一十里應以永春縣改為直隸州以徳化大田二縣歸其管轄再漳州府所轄龍巖縣上接汀州下通延建距漳州府竟有三百餘里一切公事呼應維艱查龍巖東至漳平西至寧洋各七十里應以龍巖縣改為直隸州以漳平寧洋二縣就近歸其管轄均於地方實有禆益等語臣等查福寧州實属邉海要區為全閩屏障應請改設知府添設附郭一縣以隆體制以専職守至雙溪地方係古田縣要隘之區四面環山毎致蔵姦聚匪應設縣治以彈壓化誨至永春龍巖二邑議改為州均係因地制宜臣等非敢草率更張因再四斟酌實於地方有禆其添改府州縣應需佐雜等官及各緊要村鎮移駐改設之處容臣等斟酌附䟽題請惟是臣等知識淺短是否可行不敢冒昧具題合先具摺奏聞伏乞皇上睿鑒批示遵行謹奏事關増改府州縣治具䟽題請候朕裁酌同日又奏為奏聞事􅀼臣等案准浙江督臣程元章咨撥運䑓榖赴台州府接濟民食一案續據各委員毛永清等禀稱押運榖船於四月二十五并五月初七八等日陸續抵台查得􅔜處米價毎石賣銀一兩三錢有零自榖船到後毎石止賣銀一兩二錢米價漸平民情歡恱所有運到榖石現在地方官盤交等語又臣等前因浙省杭州府米價賣銀一兩七八錢時值青黄不接倘日漸騰貴民食維艱酌議再撥二萬石運至浙省乍浦地方咨交督臣平糶於五月初一日恭摺奏聞當即先令候補知府張良弼星馳赴浙確查米價情形迅速囬報正在一面料理輓運間即准程元章咨稱閩省運到台州榖石巳行布政使派撥在案浙屬現在二麥蠶絲俱幸豐收似可無庸糶濟如有未經起運之榖槩為停止等語臣等伏思浙省春間米價増昻今二麥蠶絲旋獲豐收米價漸減此皆仰賴我皇上福庇羣黎萬民共慶臣等不勝欣慰除前經運徃台州榖二萬石外其尚未起運榖石即行停其輓運矣理合奏聞伏乞睿鑒為此謹奏緫惟仰賴上蒼恩慈耳覽奏曷勝欣慶或因卿等大公無我之誠念所感亦未可知封疆諸臣果能将國家政務不分彼此視為一體竭力維持自蒙天池神明垂察賜祐也同日又奏為恭懇聖恩以愜輿情事􅀼惟天妃明神功昭清晏徳庇商民聲靈夙著於寰區顯應尤𫝊於閩海康熈十九年提督萬正色克復厦門神靈協助欽奉聖祖仁皇帝敕封護國庇民妙靈昭應𢎞仁普濟天妃又靖海将軍施烺進征䑓灣師次平海澳時方憂旱井澤為枯因禱於神泉源驟湧官兵咸被其澤嗣後默相王師功成㡳定敕建神祠於原籍莆田縣湄州地方并頒敕文以紀功徳又加封天后竝允册封琉球國使臣海寳之請令􅔜地方官春秋祭祀在案康熈六十年䑓匪􅀼發鹿耳門海水驟長數尺舟師揚㠶直進七日之内克復全䑓嗣經廵䑓御史臣禪濟布等奏請荷蒙皇上特頒御書神昭海表匾額敬懸湄州暨厦門䑓灣三處宸翰輝煌照臨海澨上年土番不法臣欽遵諭㫖徴調官兵六千餘員名并一切錢糧軍火器械載船一百數十隻經歴重洋風恬浪静安抵䑓灣剋期奏㨗是皆聖主敬禮神明得邀天后宏施庇護感應之理昭然不爽至於出哨官兵商艘賈舶往来海面洪濤怒浪神為顯佑之處不可勝紀所在沿海商賈兵民奉祀最極誠敬而於省㑹尤盛查福建省城南䑓地方舊有神祠為萬民瞻禮之所臣等不揣冒昧懇求聖恩俯照湄州等處竝頒御書匾額敕令春秋祭祀照依龍神之例督撫依期主祭臣等更有請者伏惟天后凡在江海處所靈應如響其各省㑹地方如曽建有祠宇而未經設立祀典之處并請降㫖一例舉行則崇徳酬功之令典昭垂萬禩矣為此謹奏􅔜部議奏福建緫督臣郝玉麟謹奏為請㫖事􅀼查貯庫軍器關係綦重聼其朽敝甚非所宜臣於上年赴任路過泉州府面訊􅔜府庫貯軍器據禀現存戰箭二萬枝臣調取驗看略加修整尚堪應用及臣扺任後查得省庫所貯盔甲甚多行令布政司造册具報㑹同撫臣趙國麟赴庫查驗除廢礮八十餘門位難以修整又甲械内實属朽爛無用者鐵綿甲九千三百餘身鐵盔九千七百餘頂排線交鎗等一萬六百餘桿只堪鎔鐵其餘不計外查尚堪修整可􅇱營伍之需者有鐵盔九千九百餘頂鐵甲綿甲竝甲頁共一萬三百身有零鳥鎗交鎗線鎗等項除從前撥給鎮標各營竝失風戰船以及征䑓應用尚有堪修整者一千四百餘桿又福州府海防同知庫内大小鐵子鉛子共七萬三千六十餘斤閩縣庫内大小鐵子四十八萬六千餘斤又窩􅉕子四千六百一十餘斤尚有黒鉛鐵斤并雜項鐵器甚多俱無斤兩容臣查明咨部外臣再查庫貯軍装器械係我朝平定耿逆及鄭克塽等案收貯各庫報部在案歴来各員多不經心曬晾並不造册具報上司查驗臣因到任訪問始知而朽爛無存者巳難數計若行追賠則事經數十年官非一任難以指實著追如再因循閩省地方潮濕年復一年必致朽爛更多實屬可惜今䑓地現議添兵如蒙皇上俞允軍装器械在所必需其有堪修整者可否容臣酌量修整收拾務期堅銳利用修整完竣分别加謹收貯取具收管備案如有應配用之處造册報部至外府各縣所貯軍器現在檄查當一併酌量辦理是否可行臣未敢擅便謹具摺恭請聖㫖遵行伏乞睿鑒謹奏足見留心地方庶務嘉是覽之但不可務小而忽大湏将此等事件作為行有餘力則以學文之舉方始克稱鉅細不遺也同日又奏為奏聞事􅀼照䑓灣北路土番恣肆不法仰蒙皇上指示機宜官兵剋期蕩定而逃竄餘孽務湏盡其根株免致滋事經臣奏明酌留官兵駐防搜捕續據各􅔜文武呈報官兵奉行搜捕以来斬獲有名兇番一十九名生擒一名又據内山生番殺獻番首十顆番耳九隻前来軍營請賞餘番懾威膽落逃匿深山莫可踪迹臣思搜察愈急潜匿愈深若聼民番斬馘請賞恐致冒濫妄殺之弊非所以安良番而靖地方也臣即一面出示令其自行投出聼候審訊一面著令土官通事入山曉諭嗣據報稱有大甲西等社逃番男婦一百零二名口盡行投出竝無一名漏網隨准廵䑓御史暨提臣王郡各咨同前由到臣所有搜捕䑓番餘孽巳浄緣由理合恭摺奏聞再據緫兵蘇明良竝䑓灣道府禀稱五月十九日夜水仙宫前舖民陳寳蠟燭店内失火文武各員齊往協力撲救緣東南風盛人稠地狭風急火猛人力難施延燒三百餘間除被火民人行司量加賑恤竝飭􅔜地方文武不時誡諭居民加謹小心防範外合併奏聞伏乞皇上睿鑒為此謹奏前經有㫖防火之具不但䑓灣一府凡所屬地方皆應飭令預備實力行之毋忽雍正十一年八月初四日福建緫督臣郝玉麟謹奏為海嶼鎮協各營兵食最關緊要酌議分貯榖石以􅇱接濟事􅀼照閩省濵海鎮協各營向係分防島嶼者本地産米稀少全資内地接濟毎遇青黄不接米價増昻更或風信遲阻商販不前民有官榖平糶之資營兵未免艱於粒食即如海壇一鎮孤懸海島外附三十六嶼地不産米今年六月内因風信不順􅔜鎮緫兵官陳勇以營兵乏食客販不至詳請借給倉榖二千石經臣飛飭福州府照數運借去訖臣思邉海協營如海壇之僻居島嶼者不止一處似應通盤籌畫以備接濟庶不致兵食有缺乏之虞除汀州漳泉以及延建邵武等處地方或係産米之處或商販不虞缺乏無庸置議外其福寧一鎮界連浙省前任鎮臣顔光旿奏請設立倉儲今現貯榖六千五百餘石又南澳一鎮地居海澳原任鎮臣許良彬奏請捐貯倉榖經前督臣髙其倬撥貯榖五千八百五十七石此二處倉儲巳足亦無庸置議外若金門鎮額兵二千三百餘名地在孤島之中係屬海外要區澎湖協額兵二千名􅔜協控制重洋為全䑓門户閩安協額兵一千六百三十餘名地方濵臨大海産米甚少􅇏火營額兵九百名􅔜營屼立海中係與浙江洋面聨界要汛銅山營額兵一千二百名四面環海本地甚少田耕日食全賴商販凡此鎮協各營亟應按其兵額綢繆未雨庶㡬有備無患臣擬於海壇鎮酌貯榖四千三百石金門鎮亦酌貯榖四千三百石澎湖協酌貯榖四千石閩安協酌貯榖三千二百石􅇏火營酌貯榖一千八百石銅山營酌貯榖二千四百石以上共貯榖二萬石於毎年青黄不接之時借給兵丁免其加息秋收􅄆餉扣除買補完倉責令􅔜管鎮将盤查出結陞遷離任列入交代則海疆守汛兵丁永沭皇仁於無既矣此項榖價臣案查雍正五年有浙省運閩截漕榖二十萬石現在榖價銀五萬三千八百餘兩原係題奉俞允買米存貯之項閩省本年早稻豐登現在收穫晚禾亦極茂盛應請動支前項榖價乘時採買建倉收貯以􅇱沿海鎮營接濟兵食是否可行仰懇皇上指示倘蒙俞允另行恭䟽具題臣謹繕摺具奏伏乞皇上睿鑒施行謹奏兵食最關緊要應如是辦理者照所議具疏題請硃批諭㫖巻二百十四之五欽定四庫全書硃批諭㫖巻二百十四之六硃批郝玊麟奏摺雍正十一年九月初二日福建總督臣郝玉麟署福建陸路提督臣阿爾賽謹奏為請㫖事竊照閩省福興泉漳四府并福寧一州屏藩邊海控禦島夷設有水陸二提督以及福寕漳州金門海壇南澳五鎮互為犄角濵海營制巳極嚴密其延建邵汀四府界連廣東江西浙江三省水陸衝衢惟汀州設總兵一員其餘皆係恊營控制管轄尚未得宜查汀鎮所轄邵武延平二恊内延平距汀州七百五十里甚屬遼逺更有建寕一協竝浙閩兼轄之楓嶺一營逺隸福寕鎮管轄相隔千餘里之外考驗弁兵徃返艱苦一切徃來文禀動經四五十日始得遞到倘遇𦂳急公事難保必無遲誤是汀鎮之於延平恊福寕鎮之於建寕楓嶺等協營不獨鞭長莫及亦且耳目難周似應因地制宜未便因循悠忽臣等查建寕所屬浦城松溪等縣與浙江龍泉慶元等處山川相錯又該協駐劄府城濵臨建河實為水陸要區延平近在肘腋楓嶺即其門户應請将建寕協副将改設總兵以延平一協楓嶺一營歸其管轄控制浦城等處并扼仙霞嶺要隘與汀州福寕二鎮亦互為犄角更得聲勢聨絡矣其水路要隘之處應添防汛兵丁臣等斟酌撥補以嚴汛守至汀州鎮仍轄邵武一協暨本標三營福寕鎮仍轄連江羅源桐山暨本標共六營汛營制俱屬適均而各鎮稽查易周一切公務不致遲誤似於地方有裨縁係改協為鎮臣等未敢遽行具題理合㳟請聖主指示謹繕摺具奏伏乞皇上批示遵行謹奏㑹疏題請聼候裁奪福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為據情轉奏事本年八月十七日據候補知府張良弼禀稱良弼家本寒㣲世受國恩親父傑由天靖衞守備荷䝉皇上天恩特擢廣西梧州協副将又奉命護理廣西提督印務調任廣東福建等省今現任雲南騰越協副将良弼一介庸愚毫無知識由福建福寕州知州補授本省理事同知陞授知府聖主洪恩天髙地厚良弼父子即捐糜頂踵未足仰報萬一感激之忱倍深踴躍伏念良弼賦性愚拙歴任以來一切政務雖竭蹶辦理惟恐或有遺誤時懼不能勝任而於弓馬營伍事務自幼跟随父任曾經留心學習伏覩我皇上至聖至明凡於用人之道悉皆量才任使查前任福建水師提督許良彬現任江南徽州營㕘将楊文成均係候補知州改補武職良弼自揣文武雖係兩途均為朝廷出力懇祈援例仰請皇上恩准良弼以武職改補則犬馬愚誠矢圗報於生生世世矣為此據實具禀等語臣等查候補知府張良弼自服官閩省以來辦事勇徃直前頗為努力今據禀請援例改補武職情詞甚屬誠懇該員年力富強人材壮健驗其弓馬亦屬可觀應否准其改補洪恩出自聖裁倘䝉俞允另行給咨送部引見臣等不敢沮抑下情謹據實㳟摺具奏伏乞皇上睿鑒謹奏有㫖諭部同日又奏為㳟報閩省早稲收成分數仰祈睿鑒事欽惟我皇上念切民依重農貴粟各省收成分數無時不在宵旰疇咨之内兹據布政使劉藩長彚報福州府屬閩縣古田永福三縣收成均有十分候官長樂二縣收成均有九分福清連江閩清三縣收成均有八分羅源縣收成七分興化府屬莆田縣收成九分仙逰縣收成十分泉州府屬晉江永春徳化三縣收成均有十分南安惠安二縣收成均有九分同安安溪二縣收成均有八分漳州府屬平和詔安二縣收成均有十分漳浦南靖長㤗三縣收成均有九分龍溪海澄龍巖漳平寕洋五縣收成均有八分延平府屬順昌将樂大田永安四縣收成均有九分沙縣尤溪南平三縣收成均有八分建寧府屬政和甌寕崇安浦城壽寧五縣收成均有九分建安建陽松溪三縣收成均有八分福寧州收成七分所屬寕徳縣收成八分福安縣收成六分邵武府屬邵武縣收成十分建寧光澤二縣收成均有九分㤗寕縣收成七分汀州府屬長汀寧化上杭連城四縣收成均有十分清流武平歸化永定四縣收成均有九分理合分晰彚報其臺灣府屬每年收穫較内地稍遲容俟報齊之日另文具報合併聲明等語臣等伏查閩省仰䝉聖主福庇連年俱慶有秋今歳收成更比徃年豊稔現在米價每石自八錢起至一両不等民食充足荷䝉皇上教養深仁風俗漸臻淳厚械鬭盗刦等案較前頗少海洋陸路地方俱各寧謐晚禾亦極蕃盛臺灣府屬早稻收成分數容俟彚報到日具奏外所有内地福州等八府及福寕一州各縣早稻收成分數理合據實奏聞伏乞皇上睿鑒為此謹奏閩省早稲收成分數以手加額欣悦覽之雍正十一年九月二十六日福建總督臣郝玉麟謹奏為姦民私載番人潛入内地事竊照閩省人民貿易外國吕宋地方及偷渡在彼乆住者甚多該地番夷資財豊裕徃來熟識難免引誘之弊亟當防微杜漸經臣於洋船酌添水手嚴禁偷渡案内僃将情形奏聞欽奉皇上硃批諭㫖臣仰遵聖訓時時儆惕刻刻留心每見文武屬員嚴令加謹稽察毋得稍懈因閩安協副将張天駿素常辦事幹練精細才具明敏特令其密加留心察訪據實速禀去後嗣據張天駿禀稱有乆住吕宋福寕州民帶有吕宋夷人二名出租船番錢一百五十圎船主出有保状與彼處夷主其番人帯有四甲箱番錢約計五千金在大擔門外雇小船乗夜到漳州福河厰蔡家村内投住欲在漳泉招人歸伊天主教等語臣聞聼之下不勝駭異適汀漳道郭朝鼎因公在省該員精明強幹才猷兼僃臣與撫臣趙國麟當即密諭令其星徃確查慎勿漏洩兹據郭朝鼎禀稱訪得番人擕銀前來内地果有其事遵即密同漳州府知府王之琦選差妥役拏獲船户劉前郎水手黄祿訊據供稱有乆住番邦的福寕州一人名呌蔡祖帶有番人名呌聖哥蔡祖送到後坂社嚴秀才小名登官家裹随諭署龍溪縣知縣孫國柱帶役拏獲嚴登并搜出天主教圗像等書續於嚴登家内搜出番人一名又於嚴登家草堆内搜出番人聖哥一名現押嚴登䆒出蔡祖務獲嚴審引誘番人潛至内地確情清查番人帯來銀両有無煽惑良民訊明詳報所有番人二名巳将善言撫慰安頓妥協處所等語除檄飭究審外臣與撫臣查番人住居外國若非蔡祖勾引何敢帶銀潛入内地其勾引之蔡祖私載之船户劉前郎水手黄祿窩留番人在家并搜出天主教圗像之武生嚴登等均應按法從重治罪以儆愚民至番人聖哥等不應聼從引誘帶銀潛至内地誘人入教煽惑愚民惟是夷人不知天朝法紀即按律治罪彼亦何辭但臣等伏覩我皇上天地為心包涵萬國凡於外域遠人靡不恩予矜憫應俟此番審明番人果有擕帶銀両逐一查出即覓吕宋便船将該番竝銀両一併送至吕宋交明彼地番夷頭目收管使外夷咸知聖朝稽察周密法度森􅃊不敢有犯更昭聖主寛大洪恩畏威懐徳海島逺夷同聲感激矣所有臣等辦理此案愚見復經密商觀風整俗使臣劉師恕署陸路提臣阿爾賽水師提臣王郡俱各意見相符但臣等愚昧淺見是否有當伏乞皇上睿鑒訓示遵行為此謹奏嚴懲内地勾引之人從寛釋放逺夷辦理甚屬妥協雍正十一年十一月初一日福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為欽奉上諭事雍正十年十二月二十日奉皇上硃批布政使劉藩長奏請賞撥海關税餘銀两留充公用一案并接大學士張廷玉寄字内開欽奉上諭命臣等将養亷公用各項妥帖計議辦理至於錢糧闗係緊要劉藩長任内那墊之數著将劉藩長名下應得養㢘全扣補完其從前潘體豐那墊未清之項著落潘體豐賠補如力不能完亦将劉藩長養㢘逐年扣補欽此臣等欽遵諭㫖悉心計議随經詳細㳟摺奏覆所有劉藩長任内那墊之數飭将應得養亷速即補完具報其潘體豐那墊未清之項嚴令劉藩長逐一追補去後兹據劉藩長禀稱藩長一介庸愚茫無知識仰䝉皇上畀以閩藩重任職司錢糧出入殊恩異數毫無仰報通省各員養亷巳䝉聖主賞給至於辦理公務更有耗羡抵用理應通盤籌畫權衡緩急斟酌辦理乃藩長賦性愚拙遽以耗銀徴解不齊奏請撥給海關盈餘銀两以充公用實屬冒昧之至荷䝉我皇上洪慈不加罪斥敕将藩長那墊之數於名下養亷補完潘體豐從前未清之項如力不能完亦将藩長養㢘逐年扣補欽此欽遵藩長自䝉聖訓無時不深悚惕感激愚忱即世效犬馬亦難報君恩於萬一伏查藩長原奏潘體豐任内那墊銀七萬五千六百餘両今已據各屬完解耗羡官荘并吕大雲完解支領修城銀両以及歸補等項共收過銀六萬三千五百四十餘両未完銀一萬二千六十餘両内吕大雲未補銀四千三百一十四両現在行催完補外據潘體豐之子潘應召稟稱伊父任内前署總督史貽直長支養亷二千五百九十八両零前總督劉世眀長支養亷五千一百五十六両零禀請催補等語業經轉詳咨催在案至藩長任内那墊銀一萬六千餘両凜遵聖諭巳将本任并前任内養亷凑足全數補完今據各屬将前項民欠耗羡銀一萬六千餘両陸續完解清楚現同藩長補完之數一併存貯在庫理合分晰造册送核稟請奏逹聖鑒藩長不勝惶悚之至等語臣等查劉藩長自䝉聖訓以来感激天恩力圗報効其愧悔悚惕之心時形於色兹據禀伊任内那墊銀一萬六千餘両已将養亷凑齊補足其各屬未完前項耗羡銀一萬六千餘両巳據陸續完解清楚一併存貯在庫造具清册前來臣等公同查核無異除史貽直劉世眀長支養亷吕大雲未完修城各銀両現在移行嚴催完補外所有劉藩長感激聖恩遵􅈲完補并據各屬解完耗羨縁由理合據實奏聞伏乞睿鑒謹奏史貽直長支銀両著於潘體豐劉藩長名下追補還項餘俱覽悉同日又奏為欽奉上諭事本年八月二十七日接内閣字奉上諭朕聞福建古田縣知縣趙琳居官聲名甚好著詢問郝玉麟趙國麟若趙琳居官果優著伊等酌量或知州或同知知府以人地相宜之缺題補欽此臣等伏讀諭㫖仰見我皇上鑒拔人材之至意查古田縣地方最屬遼濶縣治多係大山民俗獷悍趙琳化導有方寛嚴並用聲名頗好臣等正擬有相當缺出請㫖陞補因古田最關𦂳要一時未得其人地相宜之員尚未題請兹欽奉上諭聖眀無逺弗照查該員現丁母憂除㑹疏題請給假治䘮囬閩之日俟有人地相宜缺出臣等酌量請㫖陞補以示鼓勵合先據實恭摺奏覆伏乞皇上睿鑒謹奏給假治䘮俾得公私両全甚善似此出色之員當破格題請優擢以為親民者勸雍正十一年十一月十八日福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為恭報閩省晚稻收成分數仰祈睿鑒事竊查閩省比年以來時和歳稔本年早稻收成更為豐裕業經臣等據實奏聞在案今當晚稻登場之候行據布政使劉藩長彚報福州府屬長樂永福古田三縣收成均有十分閩縣連江二縣收成各有九分侯官福清閩清三縣收成均有八分羅源縣收成七分興化府屬莆田縣收成九分仙遊縣收成八分泉州府屬徳化縣收成十分安溪縣收成九分晉江惠安同安三縣收成均有八分南安永春二縣收成各有七分漳州府屬漳浦漳平平和三縣收成均有九分龍溪海澄南靖長泰龍巖寕洋六縣收成均有八分詔安縣收成七分延平府屬大田縣收成十分南平順昌将樂沙縣尤溪永安六縣收成均有九分建寕府屬甌寕建陽政和浦城四縣收成均有十分建安崇安松溪三縣收成均有九分壽寕縣收成八分邵武府屬邵武光澤二縣收成各有十分㤗寕縣收成九分建寕縣收成八分汀州府屬長汀清流上杭永定連城五縣收成均有九分寕化歸化武平三縣收成均有八分福寕州收成八分所屬之福安寕徳二縣收成均有九分臺灣府屬毎年早稻收穫較内地稍遲前經臣等奏明兹據彚報臺灣鳯山二縣早稻收成各有七分晚稻收成各有八分諸羅彰化二縣早稻收成各有八分晚稻收成各有七分并稱臺灣地方本年秋間偶被風雨並無有礙禾稼等語具報前來臣等謹據實分晰陳奏再閩省多産番薯本年尤為豐收更資民食通省米價毎石自七錢六七分至一両零不等民人樂業海洋陸路地方俱各寧謐合并奏聞伏乞皇上睿鑒謹奏覽奏閩省晚稲收成分數及米糧價值情形朕實額手欣慶此皆卿等忠勤任事感荷上天慈佑之所致但當益加寅畏毋起絲毫滿肆之念勉之更勉可也雍正十一年十二月二十六日福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為據實奏聞仰祈睿鑒事竊照臬司一官為通省刑名總滙必須事事詳慎一秉至公始為允協兹按察使李玉鋐自上年到任以来臣見其年齒雖老然於刑名案件精力尚能辦理雖遇事毎多偏執臣屢次推誠誨勉該司當下亦常知省悟詎意近來情性甚覺放縱好惡偏私多以剛愎自用種種悖謬難以悉舉而且任意瞻徇姻戚毫無忌憚牢不可破臣國麟荷䝉皇上畀以廵撫重任視事之後於所屬各員賢否詳慎訪察經将按察使李玉鋐居官時有拘執之處於雍正八年十一月間具摺奏聞欽奉硃批覽奏俱悉仍當不時訪察加意體騐可也欽此維時李玉鋐旋因患病囬籍上年奉㫖復任臣欽遵前奉諭㫖不時加意訪察婉切開導該司初時尚知檢點近來拘執之性又復如故難以冀其轉移臣等竊思辦理朝廷公事總在殫竭公忠無纖毫人我之見始能歸於至當若偏執巳性任情好惡必至悖謬所關甚鉅今李玉鋐年巳七十三嵗看其辦事雖能支持然偏執悖謬之處較前尤甚動輒以年老辭官為語言詞舉動顛倒反覆恬不知怪臣等因其素常操守尚好辦事亦勤是以未即指叅但臬司係風憲大員為通省百職之表率士民之瞻仰職任綦重臣等不敢瞻徇隱諱謹據實密摺奏聞伏乞皇上睿鑒謹奏李玉鋐原係庸材所奏知道了同日又奏為姦民私載番人潛入内地謹将審擬罪名㳟陳聖鑒事竊查福安縣姦民蔡祖本名蔡祝勾引吕宋番人携帶銀两潛至内地欲在漳泉招人歸伊天主教一案情由先經臣等恭摺奏聞彼時因為首勾引之姦民蔡祝潛逃臣等一面懸賞緝拏並專差星赴福安縣密諭知縣王玲務期弋獲如稍踈縱嚴行㕘處該令當即分差幹捕四路緝拏随於西演地方深山之内拏解前来當即押發按察司㑹同布政司嚴訊去後兹據該司等行據縣府将各犯審明錄供解司復訊議擬㑹詳前来臣等核審無異查天主一教本属妄誕最易煽惑愚氓臣等屢行查禁蔡祝膽敢在外域吕宋地方向番人説及行教情事於雍正十一年六月内勾引番人聖哥携帶銀两番經木箱行李等物給船户劉前郎番錢五十圎搭船於七月十九日至大擔門外前郎慮恐塘汛盤詰復向聖哥取番錢三圎僱不識姓名小漁船一隻潛入内港於二十日早蔡祝前郎同引聖哥至嚴登家住下前郎即囬厦門嗣蔡祝復得聖哥番錢十五圎亦囬福安縣原籍先有番人萬濟公於雍正十年間自吕宋至廣東香山澳因聞嚴登原係奉過天主教之人来訪嚴登欲行伊教遂與聖哥一同藏匿嚴登家内禮教誦經旋被訪聞拏獲尚無歸教人民再四詰訊各犯矢口如一水手邱招行保鄭瑞於事發擬合依左道惑人律絞監候嚴登合依為從屬有司者僉妻發邉外為民船户劉前郎水手黄禄合照偷渡船隻水手杖一百徒三年例各杖一百徒三年又水手邱招合依知人欲告自首者减二等杖八十徒二年行保鄭瑞合依不将偷渡情由首明例責四十板徒三年今事後出首應照知人欲告自首者減二等律杖八十徒二年均無枉縱嚴登家中搜出天主教圗像等書飭行銷毁番人聖哥萬濟公臣等宣佈皇上寛大洪慈並天朝法紀該番等始則戰兢恐懼後則踴躍歡呼望闕叩頭謝恩訖随将蔡祝劉前郎所得聖哥銀両照數飭追以及該番帶来木箱行李番錢等物逐一交給收領差員押徃厦門諭令厦門同知即覓吕宋便船令船户照看載囬彼國又番人萬濟公一面差押至廣東咨眀該省督臣發交香山澳番目收管以昭聖主天恩所有審擬蔡祝等各犯罪名以及遣囬番人縁由理合繕摺恭奏伏乞皇上睿鑒謹奏覽奏知道了摺尾並無另疏題請字様何耶同日又奏為請㫖事竊照閩省沿海居民多有販洋為業徃来外域經物於大擔門外暗雇小船装載囬家經漳州府訊據陳魏供稱犯生向在廣東貿易於康熈五十三年買有茶葉貨物在廣搭船徃噶喇吧五十五年娶了妻室楊氏原是福建人本年犯生囬至廣東買了磁器等貨復徃吧國賣完了貨又賣布疋稍有利息原去的船巳囬棹了随於五十六年奉禁了洋船隻稀少囬来不得並不是甘心乆住番邦自䝉萬嵗爺天恩開了洋禁雍正七年纔得囬到家裏住了三年十年上在蘇州捐了監生又買茶葉等貨仍在廣東搭船到噶喇吧原是做生意的人不能歇業歴次徃来上税照票俱托船户料理的家中尚有老母兄弟常寄銀信囬家養贍今年春間妻室不在了留下三箇女兒因無子買了两箇番妾两箇小番使女四箇番僕都是當著荷蘭番官明白買的帶了些番米行李同家眷囬歸故土侍奉老母永為盛世良民並無違禁貨物起身的時節夷目呷嗶丹配了郭佩的船本年五月裏到大擔門外犯生因今次未曾請得牌照汛口盤詰嚴謹為此雇了小船由大擔外洋囬家犯生從前羈留外邦實非得已並不是甘心住在番邦的若忘了故土的人於今就不挈眷囬鄉了只求詳察訊據楊營供稱小的原在同安縣做生意雍正六年正月在廣東将本銀三百两買了些茶葉磁器搭船到噶喇吧娶了妻室郭氏是中國人原要随船囬來的小的因染了病至八年五月裏仍囬廣東買了貨於九年正月又徃吧國這幾次出洋納税照票都是船主代為料理的小的有箇哥子楊課原在吧國娶有嫂子生下两箇姪兒上年哥子不在了小的娶的妻室生了両箇兒子一箇女兒年紀尚小又買了一箇乳媽三箇番僕俱係番官説定身價買的連嫂子姪兒共十一口向番目呷嗶丹説明搬眷情由他配給了髙鳯的船於今年六月裏到了大擔門外因沒有照怕塘汛查騐雇了一隻小漁船由大擔外洋到家就被本縣拏了小的原是守分良民自雍正五年奉恩㫖開了洋禁漳泉的百姓得到番地做生意如今家給人足無不感戴國恩不但小的不敢忘本即現在外邦的俱有思歸之念小的因愚蠢無知這次誤犯私渡禁令只求超釋等情供吐在案正在叙詳間復據陳魏楊營為叩求轉逹下情事呈稱魏等邊海愚民向在吧番貿易魏因生意牽纒又因禁洋以致淹留番地營自開禁後出洋不合無照私渡囬家甘罪何辭但切思漳南一帶人稠地瘠向苦食用不敷深幸比年以来聖化覃敷海洋寕謐魏等徃来生理獲利豐家實皆皇恩帝澤沾被無窮今魏等情願将所獲餘資仿照社倉之例魏捐榖八千石營捐榖五千石并各造倉厫僃賑鄉黨稍伸報效以贖罪愆乞憐魏等愚蠢無知宏施祝網加惠閭閻仁澤永垂萬年等語将陳魏等分别議擬由司㑹詳前来臣等伏查雍正六年間前督臣髙其倬疏稱留住噶喇吧吕宋之人係康熈五十六年定例以前者定限三年之内准其囬籍如康熈五十六年定例後私去者自不應准其囬籍等因㑹題欽奉諭㫖洋禁初開禁約不可不嚴以免内地人民貪利飄流之漸其從前逗留外洋及違禁偷徃之人不准囬籍欽此臣等伏讀聖諭我皇上訓誡愚民不思故土逗遛外地並禁其貪利飄流之漸者實属天心慈愛之深誠亘古以来所未有也今查陳魏於康熈五十五年自廣東徃噶喇吧經營生理至雍正七年始行囬家係在雍正六年欽奉諭㫖不准囬籍之後雖據供從前因生業牽纒又緣禁洋船隻稀少欲歸不能並非甘心異地質訊鄰佑僉稱陳魏實係良民但該犯今於本年七月間未有牌照挈眷偷渡囬籍實屬不合楊營雖係雍正六年奉開洋禁之後徃番貿易但亦無照攜帶眷口偷渡潛囬查陳魏違禁囬籍之處律無正條應與楊營均照偷渡緣邊關塞者杖一百徒三年律應各杖一百徒三年船户郭佩髙鳯應照偷渡臺灣人等知而不舉例各杖一百徒三年均屬不枉今據陳魏楊營呈稱情願共捐穀一萬三千石建造倉厫僃賑里黨以贖罪愆臣等僃查各該犯攜眷囬籍情形依戀故土與甘心異域者有間可否仰籲聖慈准其捐贖予以自新船户郭佩等照依干連人犯例酌量完結洪恩出自聖裁臣等未敢擅便謹據情恭摺具奏伏祈睿鑒謹奏念若等依依故土之情應准其捐贖但飭行地方有司時加約束毋使任意他徃福建總督臣郝玉麟謹奏為欽奉上諭事本年十二月初九日接到大學士伯鄂爾泰字一封内開雍正十一年十一月十一日奉上諭馬召南本係庸常之人朕知之甚悉從前在廣西時諸凡懈弛不能勝任是以調用福州城守副将髙其倬曾奏伊到閩省後辦理營務井井有條署督標中軍一切俱能切實料理管束弁兵甚是嚴明寔係賢能之員可用之才等語當經朕批飭馬召南豈能如此竒特髙其倬不過見其相貎故生賞鑒諭令留心詳察又劉世眀因提督張起雲之患病保奏馬召南歴練老成可以委令前徃恊理等語馬召南豈恊理提篆之才劉世眀所奏大誤亦當即批飭又郝玉麟因漳州總兵員缺保奏馬召南歴練老成熟諳營務整頓有方委係才具出衆之員等語又阿爾賽保奏馬召南勤敏練逹請以署福寕總兵印務朕俱未允行又因馬召南年来辦事未知何如或能革除舊習奮勉上進亦未可定復降㫖詢問郝玉麟郝玉麟又極力保薦並稱到任以来實心實力辦理營務其平日居官阿爾賽稱其才具可用等語朕因郝玉麟身在地方自必知之甚確是以降㫖令馬召南署理福寕鎮總兵印務近聞馬召南居心貪鄙舉止輕浮前署漳州總兵印務時因僃辦執事等物竝供給宴㑹一切使用毎營各費銀三四十両不等又收取甕城租錢藉賞兵名色入巳又收受土儀禮物甚多歴歴有據且於一切營務毫無料理惟知宴㑹演戲日以繼夜起更定礮不限更次且有叅革守僃張定國與戲旦當場扮演而馬召南附和取樂兵民人等俱知似此貪劣無恥行止不堪之員郝玉麟阿爾賽豈無見聞乃竟毫無覺察且謬為保薦是何意見著􅃊行申飭馬召南劣蹟果實著郝玉麟一一查明具本㕘奏絲毫不得囬護前奏瞻徇隱匿欽此遵㫖寄字到臣臣跪讀諭㫖不勝戰兢恐懼惶悚無地馬召南本係庸常之人乆在皇上洞鑒乃臣愚昧淺識祗就其平日辦理營務之處具摺保奏不意該副将於署漳州總兵任内有如此劣蹟誠屬下愚不移仰見聖主知人之眀鑒察無逺弗至臣身在地方不能覺察謬為保薦咎無可逭荷䝉我皇上格外洪恩詳切訓誨敕令查明題㕘臣即捐糜頂踵亦難仰報君恩於萬一查福寕乃沿海重鎮馬召南似此貪劣無恥不便仍令署理臣現在酌量委員前徃福寕暫行署理該鎮印務馬召南劣蹟容臣逐一查眀據實題㕘請㫖定奪臣誤保於前悔恨無及斷不敢絲毫瞻徇隱匿自罹愆咎也臣謹恭摺具奏伏乞睿鑒謹奏觀汝存心似有博取仁慈寛厚虚名景象稍若踵襲故歩非徒無益於國且恐有害於已一渉善柔則與邊海巖疆之任大不相宜矣總惟效法鄂爾泰斯為盡善不可遺忘前訓誤走邪途慎之毋忽雍正十二年三月十二日福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為欽奉上諭事竊臣等於上年十一月初一日㑹奏布政使劉藩長那墊銀両巳據照數補還貯庫一案欽奉皇上硃批史貽直長支銀両著於潘體豐劉藩長各名下追補還項餘俱覽悉欽此當即飭行該司速即分補完報先於上年十一月十五日尚未奉㫖之前即據史貽直解補前任閩督時預支養亷銀二千五百九十八两有零移咨臣等飭司收存兹奉諭􅈲據劉藩長禀稱伊名下遵㫖應分補銀一千二百九十九两有零巳經如數補完潘體豐名下應分補銀一千二百九十九両據伊子潘應召自限六箇月囬籍山東解補等語其史貽直先前還補之項應否發還臣等未敢擅便相應請㫖遵行至此案補還銀两細數統容分晰咨部查核合併陳眀伏乞皇上睿鑒謹奏既據解送到閩又何必發還史貽直巳曾奏聞矣雍正十二年五月二十二日福建總督臣郝玉麟謹奏為微弁著有勞績伏懇皇上格外施恩以示鼓勵事竊照臺灣府治全藉鳯山縣為之屏藩鳯山一邑又頼鳯彈汛為之保障是鳯弹一汛所關甚重查雍正十年四月初二日匪犯吴福生等聚衆合攻鳯弹汛營盤該汛係茨竹為城所存汛兵不滿二百汛弁係把總黄陞當呉福生率賊千有餘人自四更時合圍攻擊黄陞率衆奮勇拒守直至次日辰時将賊殺死五人撃傷十餘人賊随解散至初四日賊復㑹聚聲勢愈重值提臣王郡督兵馳至賊乃大敗逃散鳯邑臺府均得保固實皆黄陞奮勇拒守鳯弹之功臣初聞猶恐未確後提臣王郡御史柏修暨軍前大小将弁僃述始末衆口如一查黄陞係臺地把總定例二年俸滿即歸内地以千總補用黄陞今巳俸滿因呉福生一案准有部咨查取文武踈防各職名黄陞亦在其内因格於成例未便㧞補經臣調到驗看人材弓馬均在可觀甚屬可惜寔係膽勇出衆功績昭著之弁臣雖在奨賞未足以酬其功可否仰邀聖恩准帶議處踈防之案補授千總或從優以守僃擢用洪恩出自聖裁倘䝉聖恩破格超用從此海外大小員弁益加感激奮勉力圗報效矣應否送部引見之處伏候批示以便遵行臣因鼓勵弁員起見不揣冒昧恭摺具奏伏乞皇上睿鑒謹奏将其拒守却賊功績僃悉聲眀送部引見題到之日有㫖福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為恭報閩省二麥收成分數事竊惟省耕教稼愛養厪於宸衷問嵗祈年收穫關乎民食閩省地方仰荷聖主福庇屢慶有秋兹届二麥登場之後據布政使劉藩長彚報福州府屬九縣内永福縣收成十分其餘九分八分不等興化府屬二縣各收成十分泉州府屬七縣内永春徳化二縣收成十分餘自九分起以至八分漳州府屬十縣内除龍巖平和二邑地不種麥其餘收成有九分八分臺灣府屬四縣收成各有八分延平府屬七縣九分收成者四縣八分收成者三縣建寧府屬八縣除壽寕一邑地不種麥其餘收成有九分八分以至七分不等邵武府屬四縣内光澤縣收成十分其餘均有九分汀州府屬八縣内歸化縣收成十分其餘有九分八分福寧州暨所屬二縣内寧徳縣收成九分餘各有八分又按據各屬陸續具報前来臣等詳加察核無異並據各禀稱本年自春至夏雨水調勻米穀價平臣等僃查各属現今米毎石自九錢起至一両零數分價甚平减民食充裕通省雨水霑足禾苗滋長臣等於勸農之時通行查勘甚属暢茂是皆我皇上精誠感格上迓天庥如響之應臣等不勝歡忭之至惟有倍加敬畏正已率屬仰副聖主垂訓之洪慈耳所有各屬二麥收成分數理合恭摺奏聞伏乞睿鑒謹奏覽二麥收成分數雨水米價情形遥頋海疆曷勝額慶雍正十二年六月十二日福建總督臣郝玉麟謹奏為奏聞事竊照臺灣番民性本愚䝉行頗恭順前因一二不法匪類滋擾地方仰䝉皇上天威逺震除惡安良各社番民得以咸安耕種軍興之際寔心效力迨荷天恩添設官兵捍衛感激歡呼凡遇用夫車輛公務土官通事無不踴躍向前甚属可嘉兹據臺灣府知府尹士俍詳據鳯山縣知縣陳同善詳稱據岸裏社通事張逹京土官敦仔阿打歪加巳眉加由蔴仕菜等呈為化及不毛㝠頑風動願歸版圗事詞稱竊惟内山等處生番穴居野處不隸籍中當今聖天子仁風逺播徳澤宏深凡在昆蟲草木尚知鳴樂向榮生番雖居界外猶具人形能無感激之念兹沙裏社生番席由敏等願歸版圗納餉供役等情造具歸化生番户口册一本到縣随喚通事張逹京生番席由敏瓦陳由敏等當堂驗訊據稱沙裏社界在獅頭獅尾南𫝑在巴荖逺東勢離岸裏社三百里因阿打歪敦子同沙裏社原是番親因此出来歸化願作好人大小男婦共一百九十九名口等供當經各給賞勞諭令歸社并取該通事土官約束甘結在案事關生番歸化不敢壅於上聞合就詳請題逹准予歸化載入版圗以廣招徠等情據此又據臺灣鎮道詳報前来臣即批行布按二司確查酌議通行在案伏惟聖朝徳化宏敷海嶠番黎欣欣向化兹沙裏社户口錢糧雖屬無多察其情詞甚屬誠懇似應俯順輿情遂其依歸之念除俟該司等酌核詳覆到日臣與撫臣詳晰㑹題外理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏巳悉㑹題到日有㫖福建總督臣郝玉麟福建廵撫臣趙國麟謹奏為恭報閩省早稲成熟情形仰祈睿鑒事竊照本年自春徂夏雨水調勻土膏滋潤栽插之際又得大雨疊沛禾苖日漸長茂吐華結實穀穗纍纍形若貫珠臣等因公事出郊目覩嘉穀盈疇之盛随順便勸勞農民莫不歡欣踴躍咸稱今年榖穗比徃年尤為豐滿将来收成自好等語又據各屬具禀情形相同查栽插在前者現在漸次收穫其栽插稍後之處亦巳成熟市米每石自八錢起至一两有零不等價值平减人民樂業臺灣一府據各地方官禀報雨水霑足禾苖亦極暢發臣等感戴天庥恪遵皇上敬天勤民之至意耳除收成分數容俟彚報到日具奏外所有早稻成熟情形合先恭摺奏聞伏乞睿鑒謹奏早稻成熟米價平减情形以手加額覽焉實縁卿等文武大臣能同心協力忠誠任事有以感召天和始著斯徴驗也嘉悦之懐筆難悉諭勉之雍正十三年六月初二日浙閩總督臣郝玉麟謹奏為海疆重鎮務在得人仰懇聖主簡補賢能以收實效事竊照金門鎮總兵許國騰病故經臣題報在案其所遺印務令安平副将髙得志署理臣查金門一鎮孤懸海島與厦門對峙控制外洋寔為臺澎之屏障最關𦂳要必得幹練之員方克勝任理合恭請就熟可否補放洪恩出自聖裁倘䝉俞允其髙得志所遺員缺亦屬𦂳要容臣另選人地相宜之員㑹疏題補請㫖合併陳眀伏乞皇上睿鑒謹奏髙得志原籍江南非生長閩粤者可比水務何能遂臻精熟朕知其漢仗雖好胸襟甚欠明白况既無出衆之藝又無出格之功一旦超擢鎮任殊覺太驟如不得人暫令署理以觀後效尚可雍正十三年七月初一日浙閩總督臣郝玉麟謹奏為據實密奏仰祈睿鑒事竊臣荷䝉聖恩擢用總督兼制两省於今年四月抵浙之次即前徃海寧等縣遍歴東西海塘竝至尖山細加查勘建築石壩工程巳有十分之六從前深有十餘丈者今海底積有漲沙現在最深處不過二丈有餘至小塔山則止有一丈五六尺不等看來似易成功惟一路塘堤内條石塘身者堅固屹立其向用塊石砌築各塘均不若條石之堅整再原係石塘後因坍卸暫将柴薪搶修者甚不堅固此外更有草塘數千丈原因沙土浮鬆不能建築石塘止用柴土堆砌抵禦潮汐更當加謹修整至以上各塘臣訪問十一十二两年雖經随時搶修冬底竝未加修随於彼時同将軍臣𫝊森撫臣程元章副都統臣隆昇欽差大理寺卿臣汪漋内閣學士臣張坦麟等面言如此險要工程搶修不過權便一時現在塊石各塘極宜補築柴草各塘均應修整以防風潮不測斷不可因十一十二两年並未加修倖免踈虞恃以為常况前嵗䝉皇上差内大臣等來浙估築石塘共一萬丈四尺估計工料銀一百七十餘萬两并荷睿算指示尖山石壩建後即有漲沙亦可漸次改建石塘之㫖今應於𦂳要之處亟宜修築仰慰聖懐為是諸臣俱以臣言為然臣随面諭布政使張若震給發銀两採辦物料一面行令海防同知丈量𦂳要處所勘估册報正在恭摺請㫖遵行間不期六月初二日夜風潮猛烈一切塘堤坍塌十之八九甚屬危險臣細訪從前不行加修之故實縁諸臣意見不侔十一十二両年以来錢糧雖有節省今一旦坍卸如許之多所費加倍若非仰頼聖主福庇倘潮水灌注塘内民間田園廬舍能保無虞時届伏秋大汛勢難刻緩而石料又一時不能猝辦只得照舊暫用塊石柴草分别搶修今工程雖将告竣仍應籌畫經乆之計查搶修嵗修各塘自康熈五十四年起至雍正十三年六月歴年所用錢糧數至一百六十餘萬而塘工一遇風潮仍多坍卸不能保固是係人力未盡不可悉諉天災惟有石塘可垂乆逺皇上早巳籌及指示甚明即如原任浙江廵撫今大學士臣朱軾任内所築石塘五百丈至今十有餘年毫無撼動其餘凡係條石塘身亦皆完固計有三千數百餘丈今亟應遵照内大臣海望等所估改建石塘次第興築始為萬全惟是條石一時不能猝辦臣與撫臣巳飭令多員預行分路採備届期酌派工員各分段落趕辦趕築若地方大吏以及總理大臣秉公無私和𠂻辦理未有成功不速者無如諸臣意見不合毎事齟齬将來興舉大工自必更致參差臣受恩深重何敢顧避嫌怨知而不言竊見海塘所關甚鉅總理大臣未能安詳辦理除堵築尖山石壩工程巳有三分之二乃係隆昇一手辦理之事其現議海塘工程可否另委賢能大員總理之處伏乞皇上聖裁再應建石塘計一萬丈餘尺若非亟亟辦理必致稽延嵗月務得多員分叚趕築庻可計日成功查府㕔州縣各官俱有地方刑名錢穀之責不能分身監督并祈皇上敕部揀選家道殷實候補候選人員二十員来浙照河工之例分段派委監督工程所需條石除本省採辦之外江南地方亦有石宕可採即各塘舊石亦多有堪用者一併酌量濟用大工告竣不難沿海地方民人仰戴皇恩於億萬斯年矣臣不揣冒昧謹陳愚見恭摺具奏伏祈皇上睿鑒謹奏此奏之可嘉處筆難盡宣奏内各種情形亦朕所備悉但他人不肯如是爽直耳現與廷臣周詳籌計辦理方略議定後另有諭㫖硃批諭㫖巻二百十四之六
