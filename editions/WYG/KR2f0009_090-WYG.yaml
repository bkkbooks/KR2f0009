body:
  text: 欽定四庫全書硃批諭㫖巻九十硃批管承澤奏摺雍正五年九月初九日四川布政使臣管承澤謹奏為奏聞事竊臣世受國恩涓埃未報荷䝉皇上格外超擢授以四川布政使隨於本年四月二十八日跪聆聖訓遵㫖於五月初四日與欽差醫官劉裕鐸一同起程六月二十七日到四川省城同劉裕鐸向督臣岳鍾琪宣傳恩㫖即於是日到任受事所有臣恭謝下悃謹循例懇請撫臣憲德代為題達兹受事兩月查四川通省錢糧雍正四年奏報共額徵丁條糧銀三十三萬四千八百四十八兩零各屬州縣俱能依期完納毫無拖欠其通省倉糓除東川府議令改歸雲南外川省實應存貯米糓青稞等共四十一萬三千九百四十石零臣到任後即嚴行各屬州縣加謹收貯不許存銀抵補借端掩飾俟九月收成後臣即詳明撫臣專委能員細加盤核如有虧缺霉爛存銀抵補等弊即行詳揭不敢瞻徇再查川省税務成都夔州等八處舊額止解銀八千七百八十一兩零所有從前隠匿之處與分送督撫司道府各衙門税規陋習今幸逢聖恩寛宥許令自首免其究問雖各據照數首出綂歸正項共約計銀九萬三千九百四十一兩但恐止首分送陋規欵項其自行徴收者猶多隠匿未可信為實在數目臣現在嚴飭經理税務各官儘收儘解俟收足一年彚總計算方可酌為定額再臣據護布政司成都府知府王凝移送交代各册臣隨逐項清查計該存貯銀六十萬七千二百五十一兩零内有前司羅殷泰於擅動庫銀案内未補還銀二萬四千二百三十二兩零又江寧協餉於羅殷泰任内未補解短少銀八百四十二兩零臣已報明撫臣移咨催補實存在庫銀五十八萬二千一百七十七兩零於八月初十日經督撫二臣盤查無缺現在㑹題再川省今嵗年成各屬俱有七八九十分不等米價較五六月間漸平民情安帖再通省州縣各官離省窵逺一時賢否優劣未能盡悉撫臣憲德現在更番調騐臣隨當面考核並察其平時居官實蹟倘有才守汚庸年力衰邁不能稱職者即當據實詳揭不敢姑容至各處地方事宜以及民情土俗有應當舉行者臣甫經到任未及周知容細心查察陸續奏聞為此謹奏勉之勉之莫徒於章奏之間用意而不以實行為務果能行與言符朕自有照鑒同日又奏為奏聞事竊臣接受護布政司成都府知府王凝交代各册查有前布政使佛喜存貯在庫未經詳請咨部各項銀兩不無隠匿情弊當據護司王凝詳揭逐細開列轉請具題此外復查得布政司衙門舊例各屬州縣每年共解條糧耗羡銀二萬一十四兩零内督臣糧規銀三千三百三十兩撫臣糧規銀六千六百六十兩布政司糧規銀一萬二十四兩零乃前司佛喜在任一年零三個月收過銀二萬八千五百五十八兩有零臣隨逐項清查佛喜收雍正四五兩年分糧規銀一萬二千六百七十二兩零收雍正四五兩年分學租田房等耗羡銀二百七十五兩零二項共一萬二千九百四十七兩佛喜收作任内養亷之數又查得佛喜一收雍正四年條糧協餉等項於未更換平盤之先收平頭餘剰銀二百一兩零嗣經奏稱打燬平盤其兌收時每一百兩尚有多四五錢以至一兩不等收過平頭多餘銀六千九百六十五兩一找發各府州縣雍正四年俸工銀佛喜每百兩暗扣二十兩共扣銀三千三百一十九兩零一給發各府州縣雍正五年春夏俸工銀佛喜毎百兩扣一兩共扣銀一百四十四兩零一於雍正四年科考賞賚花紅銀佛喜止扣半給發扣收銀三百四十一兩零又找發雍正二年嵗考花紅銀佛喜亦扣半給發收銀六十六兩零一彚收雍正四年各屬看報銀三千三百七十四兩五錢内除支給提塘三千八十兩外各州縣尚未解銀一百七十四兩零佛喜收已解餘剩銀一百一十九兩零一佛喜收成都等處税規隨堂銀共二千九百七十一兩零又收雍正四年各處税耗銀一千一百八十七兩零又於續補税銀内收耗羡銀二百四十六兩零以上六項共銀一萬五千六百六十餘兩皆係布政使佛喜越例侵收臣不敢不據實奏聞伏乞皇上睿鑒施行謹奏知道了將其越例侵收各項詳明督臣岳鍾琪撫臣憲德可也同日又奏為勸首田地嚴飭開墾事竊查川省田地界在山僻處所民間欺隠者多從前歴任各官雖經陸續勸民自首然觀望不前所報無幾本年七月初五日接准部咨奉到皇上恩㫖寛限一年准各省官民自行出首將從前侵隠之罪悉從寛免其未納之錢糧亦不復追問欽此欽遵在案兹據本年分各府州縣已首出上中下田地共三千三百九十一頃零該徵丁條糧銀四千三百五十五兩零徵米五十石五斗零臣已造冊送部查核訖今又據各州縣首出田地一千八百七十四頃零該徵丁條糧銀三千一百六十四兩現在催造清冊由撫臣題報外臣仍嚴飭各州縣勸導鄉愚務於一年之内陸續盡行首出毋致絲毫欺隠復干罪戾再查川省田地有包荒霸荒二種積弊臣到任後初悉情形已嚴飭各州縣細加查察倘棍徒衙蠧及紳衿人等有此包荒霸荒情節包荒則量為酌處姑從末減霸荒即嚴為究處按律詳揭該州縣隨親往踏勘履畝細丈一有閒曠即撥付安挿新民開墾立業庶地皆成熟而勸首之下可使民無隠糧野無曠土而國賦日増矣為此繕摺奏聞謹奏據奏查究包荒覇荒等弊言之易行之難若州縣不得其人徒滋紛擾而亦斷不能清釐也欲為此舉必先秉公察吏得人而後行之方是竭力次第措施不可急廹冀收速效雍正六年二月初六日四川布政使臣管承澤謹奏為奏明米價暫緩商販事竊川省素稱産米之鄉秋成之時米價甚賤於雍正五年十二月内疊據遵義重慶夔州保寧等府詳報米價騰貴每石一兩七八錢至二兩以外等因又於今年正月内據夔屬之梁山縣具報米價髙昻兵民糴食維艱詳照存七糶三之例借支倉榖便民臣隨轉詳撫臣已經照詳准行臣復各處察訪知米價騰貴縁由在遵義以福建廣東湖廣貴州四省来川人民經過買食遂致米價頓長重慶因係川省總滙各處商販雲集米價亦一時頓長夔州保寧二府以及其餘府屬有産米地方俱已聞風趨利裝至重慶就賣有素不産米地方無從得米所以米價髙昻如浙省委員遵㫖買米二萬石楚省委員儘銀三萬兩糴買俱因市價騰貴至今未曽報完且軍需米石正在預備之際據總辦軍務建南道劉應鼎移稱現應備米一萬一千石誠恐一時採買價愈髙昻臣再四思維軍需米石已詳明撫臣行文臨河各州縣暫行動支倉榖按州縣存貯之多寡酌撥碾足一萬一千石由水路運至雅州由雅州陸路運至打箭爐備用俟秋成時照數買補還倉至目今米價髙昻臣現在詳請撫臣暫行出示停止商販俟於軍務畢日並湖廣等省来川人民安插開墾之後産米饒裕再行聼其販運如此則既可流通於將来而又可平價於目前矣臣為地方起見暫行禁止商販理合繕摺奏聞謹奏此舉是憲德亦經奏過矣同日又奏為奏聞事竊照川省田地往往因界址不清彼此爭訟臣到任後毎逢放告之期見告訐田土者十有八九臣俱批行各屬州縣務往兩造田畝親身勘丈其丈出餘田即令按畝納糧綂入自首冊内查報既息訟端亦可以漸次清出欺隠計去年自首出田共一萬五千九百四十二頃零應徵銀二萬三千四十兩七錢在案再查一川省錢糧科則不一一府有一府之科則即一府中各縣又有各縣之科則輕重懸殊臣曽面陳撫臣細為籌畫因相沿已久一時未能輕議更正今幸逢皇上覆載洪恩發帑銀十萬兩為安插入川人民牛具籽種口糧之用又欽差科道等臣到川清查田地撥荒安插此誠千載一時臣思欲乘此一清從前之積習謹於去年十二月内設立自供單一紙分發各府州縣令於有田之家挨門逐户各給一張著令本民自填田畝坵形段塊錢糧若干荒地若干分析四至註明已納糧未納糧鄰佑鄉約連環互保彚送各該州縣存為自供清案嗣後倘再敢有隠糧包荒霸荒等弊一經查出本人暨鄰佑鄉保一體嚴行究治今已遍行各屬先為查察暫立規模惟俟欽差各臣到日㑹同松茂永寧建昌川東四道齊集省城臣等公同合議綂俟議定分路查勘之後再具摺奏聞為此謹奏因時制宜辦理甚好勉為之雍正七年六月十五日署理直𨽻天津總兵官臣管承澤謹奏為奏聞事竊臣遵奉諭㫖前赴天津總兵任所一路查看塘汛查得通州各塘每塘設兵五名張家灣起毎塘止兵三名四名不等當此漕船鱗集之際往来催趲在在需人即汛兵五名只可敷用若缺少一二名前後不能相顧臣隨嚴飭將弁諭令照例添足五名以資廵查趲運臣又訪聞各汛尚有不肖弁員需索漕船方物陋規臣隨嚴加申飭令其盡改前非毋干罪譴嗣據務闗營叅將張茂揭報安平汛把總竇成業需索漕船銀錢土儀酒食等項與臣經過訪聞適相符合隨據揭咨㑹提臣咨革究審并行文經管漕運協營出示嚴行禁革務去苞苴以清積弊至於地方情形營伍事務臣莅任伊始尚未周知容隨後確查次第舉行另摺具奏所有查過塘汛弁兵情節合并奏聞謹奏覽奏俱悉勉之雍正七年六月二十五日署理直𨽻天津總兵官臣管承澤謹奏為奏明伏汛驟發事竊查天津地方六月十八日夜風雨驟發以致河水頓長臣正在差員赴南北兩河分路查看間隨據務闗營叅将報稱十九日午後長水一丈有餘衝開沙河堤岸是夜復将沙河月堤衝開河西務月堤亦衝開二處水勢正在漲發等因禀報前来臣即差守備劉福德星夜前往查看一面仍咨呈直𨽻督臣訖至二十四日據該備查看回稱河西務觀音堂月堤漫決四十餘丈十百户月堤漫決五十餘丈附近民房衝壊約有二百間民人俱無損傷惟沙河與河西務之水合流直趨武清縣地方在髙阜之地可保無虞而低窪之處不無淹沒又據稱自天津闗至河西務北運河一帶漕船有被風損壊沉溺及衝出口岸因水落擱淺等情臣隨飛飭沿河汛弁協同起剝并設法撈救米石外再臣查得已過天津闗各幫漕船因重載頂溜難以開行沿途皆有停泊誠恐各船乘此借端逗留以及船丁水手相聚生事臣已差委標員并飭汛弁来往廵查以資彈壓俟水勢稍平催趲前進所有北河水發情形理合繕摺奏聞謹奏覽奏河水驟發情形知道了至署印缺員請發將備一摺乃係數省相同之事候朕詳細斟酌另降諭㫖但一時焉得有如許閒員發往耶雍正七年九月初六日署理直𨽻天津總兵官臣管承澤謹奏為請㫖廵查所屬協營以收營伍實效事竊查天津鎮屬所轄十六協營止標下左營右營與城守營俱係臣同城現在不時簡閲其餘各協營離津二三百里至六七百里不等雖莅任後已經屢次檄行令其勤加操練復於將備因公進見時面為丁寧告誡勉以仰體聖心無負厥職但恐未經身歴廵查一切難以周知况沿海地方尤闗𦂳要必須親加查看始能備悉情形臣先因漕務未敢具奏今尾幫漕船俱已催出北直境界臣趁此趲運餘閒之際輕騎減從周歴協營逐加查核果其兵精技熟者即加奬賞以示鼓勵倘有廢弛營伍之將備指實糾㕘騎射不堪之兵丁斥革另補以及應行事宜俟確勘後逐一另奏則營伍可收實效於軍政似有裨益臣因廵查綂轄地方非出境可比不敢具本謹繕摺奏聞伏乞皇上睿鑒批示遵行謹奏好廵察所轄協營係分内應行之舉也同日又奏為奏聞事竊臣據文安營遊撃周涵禀稱文安縣居民盧尚義妻梁氏在本村路傍拾銀六兩五錢交與姑張氏收存以備人找尋後因西栁河村王姓尋覓張氏梁氏同衆人將銀付還王姓感情買白布二疋相謝姑媳俱不肯受已經文安縣查確詳報等情具禀前来臣查閨門婦女生長鄉村目不覩詩書之説耳不習禮教之言今能見利不取守義自安實為僅見之事皆由我皇上盛德感人至誠動物之所致兹據該遊撃具禀前情臣不敢壅於上聞為此謹奏文安縣民婦拾金不昧已有㫖矣雍正七年十月十一日署理直𨽻天津總兵官臣管承澤謹奏為奏明查過營汛情形事竊臣摺奏查看所屬營汛恭奉諭㫖准行遵即前往天津東北一路查看得武清霸州務闗文安崔黄大城等營兵丁技藝雖未純熟猶有規模再加操練自漸可整齊舊州寳坻兩營兵丁技藝較之各營不及臣已面加嚴飭教以操練法則令其盡心訓習勒限三月再候考驗如仍平常即以溺職㕘處又東安汛千總馬雲性耽麯糵怠於操防已照例咨部斥革再各營兵丁如鎗箭不堪及年力老弱者即行革除另補其兵丁内有鳥鎗精熟騎射可觀者俱仰體皇恩量加奬賞以示鼓勵臣䝉皇上天恩委署總兵印務惟有竭盡心力勸懲兼施務期營伍整飭少盡職守斷不敢稍有因循上負簡用至意但臣識見短淺恐辦理未協求聖主指示除現赴河間涿州一路查看外所有看過營汛情形理合據實奏聞謹奏勸懲兼施斯為整飭要道可嘉之至勉之同日又奏為奏明暫停城工事竊臣准長蘆廵鹽御史鄭禪寳咨稱九月十一日前往山東驗放鹽引所有天津城工奏明暫交臣督令商人安岐及時修築等情遵即前赴城工處所逐加查勘并飭管工員弁加緊趲修務期堅固今臣於查看營汛便道回津赴工查閲自十一日後做過工程西南二面門樓甕城及西南角樓南門以東城垣垜墻海墁礮臺馬道礓礤等項俱於九月二十七日完竣南門以西城垣二百四十四丈已築有五六分工程復據管工驍騎校雙珥呈稱本月初二日夜下雪二寸初三日風寒冰凍若興工作恐不堅固請照往年停工俟春和再為修築等情臣查城垣闗繫緊要往年遇氷凍時俱係停工今已下雪結凍是以照例令其停止所有停工縁由理合繕摺奏聞謹奏所奏是自應照例准其停止雍正七年十二月十六日署理直𨽻天津總兵官臣管承澤謹奏為奏明查看營汛已畢事竊臣廵查所屬營汛業將看過務闗武清等營繕摺奏聞仰邀睿鑒今又看過各營如河間副將所管左右城操三營及大沽營蒲河營通州副將兼轄之三河玉田營兵丁騎射俱屬可觀其分防磚河標右營及涿州拱極樂亭王慶陀營通州副將所管存城兩營并所轄采育豐潤張灣等營次之臣將各營之訓練可觀者令其益加鼓勵更進純熟各營之訓練不及者嚴飭上緊演習聼候覆看至各營鳥鎗今已欽遵諭㫖加入鉛子令打準頭惟合隊進歩連環多間斷不齊未盡合式臣將進退歩法詳加教導并令將備將弓箭鳥鎗分日演習務期熟練各營畫一以收實用至所屬副㕘遊守等員臣經歴各營敬將我皇上慎重營伍惠恤官兵至意逐一宣布令其黽勉盡職無負聖恩現在所屬如張灣營守備鄔琪庸懦不及崔黄營守備韓緒文貪婪不職俱已另疏題㕘再各營千把總内有懈怠廢弛如阜城汛千總張有信髙川汛把總劉允恭安陵汛把總髙進安閆家村汛把總蕭漢俱照例申部斥革另行選補務使大小得人庶於營伍有益臣以庸陋下材䝉皇上天恩委署總兵印務毫無報效惟有恪遵聖訓敬謹小心整飭將弁操練兵馬斷不敢少有因循上負髙厚之恩也臣今查看巳畢所有看過各營官兵情形理合具摺奏聞謹奏直𨽻營伍廢弛已極須竭力整頓方能改觀此奏朕不深信以為然也雍正八年正月二十二日署理直𨽻天津總兵官臣管承澤謹奏為恭謝天恩事雍正七年十二月二十一日臣齎摺家人恭捧欽賜福字一幅湯羊一隻到津臣隨郊迎至署恭設香案望闕叩頭祗領訖伏念臣以庸陋下材署理天津總兵印務一無報稱兹復䝉皇上隆恩頒賜下逮微末恩榮逾分感激難言惟有凛遵聖訓竭力整理營伍勉盡職守以冀仰報髙厚於萬一耳理合繕摺恭謝天恩謹奏覽奏謝知道了奏報鳯鳥来儀之摺留中雍正八年二月二十二日署理直𨽻天津總兵官臣管承澤謹奏為保舉能員仰祈睿鑒事竊查臣屬王慶陀一營地處淀河運河之間不特操練兵丁兼有催重趲空盤查稽察之責地方緊要今該營都司周科已經休致所遺員缺必得諳練之員方可勝任查有臣屬之務闗營守備張應甲莅任三載辦事勤敏諳練營伍熟悉催漕事務洵屬能員若以陞授王慶陀營都司可收駕輕就熟之效如䝉皇上天恩允准其務闗營守備亦屬沿河要汛查有藍翎張大烈係雍正四年前任督臣李紱具題奉㫖分標試用之員在津日久前任鎮臣委其監修城工辦理無誤臣署任後復令趲運廵查俱能盡心竭力若以該員補授務闗營守備委屬人地相宜此二員者實皆可用之才因非題補之缺臣不敢冒昧具題但為營伍地方起見謹繕摺奏聞伏乞皇上睿鑒施行謹奏覽奏巳悉候另有諭㫖雍正八年四月初九日署理直𨽻天津總兵官臣管承澤謹奏為恭報得雨日期事竊查津鎮所屬地方自二三月来雨澤稀少至三月二十五日津城得有微雨嗣據通州涿州務闗蒲河樂亭武清大沽拱極舊州等各協營報稱得雨相同俱未霑足未敢奏聞兹於四月初八日子時細雨至辰時止又於未時大雨至申時止津城細雨兩次臣當即專差四路查看據覆稱入土有四五寸不等雨澤普徧土膏滋潤上年所種秋麥長有一尺有餘秋榖雖未種齊已種者發有二三寸此番得雨之後秋榖皆可補種二麥可望收成等語隨於初九日據磚河武清王慶陀等營並報得雨前来仰惟聖主念切民依時以稼穡雨暘為念所有地方得雨霑足情形理合繕摺奏聞謹奏得雨情形知道了但此等處如或少有粉飾即千欺隠之咎當戒之慎之雍正八年四月二十二日署理直𨽻天津總兵官臣管承澤謹奏為恭報南糧頭幫過闗日期事竊有江南淮安衛二幫重運糧船四十九隻於雍正八年四月二十日抵天津臣立即督催過津闗北上訖仍嚴飭沿河弁員催趲跟幫船隻前進外所有南糧頭幫過闗日期理合繕摺奏聞謹奏現今河水淺乾重運行遲亦係無法可施之事沿河催趲員弁諭令酌量為之同日又奏為凛遵聖訓事竊臣於本月初九日恭報津城得雨一摺奉有硃批臣跪讀之下不勝恐懼戰慄伏念臣以庸駑下材屢荷格外天恩一無報稱兹復䝉聖誨提撕惟有勉竭愚誠恪遵皇上無欺之訓以圖仰答洪恩於萬一耳所有凛遵下忱理合奏覆謹奏但勉心行與言三者如一何往而不利貞也假若捨本而惟末是務縱暫獲一時小利後未有不至敗露而罹咎殃者常人毎多見不及此汝其勉之雍正八年五月初二日署理直𨽻天津總兵官臣管承澤謹奏為奏聞事竊臣於四月二十二日據大沽營遊撃李椅禀據外委把總闗世繩禀稱二十一日帯兵查看蝗蝻至静海縣屬興國場竈地卑濕處所俱有蝗蝻生發現移場司并撥兵撲捕等情前来臣隨飭該營守備帯領目兵前往協助今於五月初一日據遊撃李椅報稱該備㑹同静海縣典史場官督率兵丁民竈夫役於四月二十九日將蝗蝻俱已撲滅等情臣伏思蝗蝻為患屢厪宸衷兹於邸報内恭讀諭㫖仰見我皇上軫恤民瘼至意查天津逼近海濱地多窪下蝗蝻易於發生臣謹凛遵聖諭嚴飭所屬將備委員不時廵查務於萌動之初即行剪除消滅所有蝗蝻生發現已撲滅縁由理合奏聞謹奏蝗蝻為災與否猶屬人力所能轉移之事其加意訪查一有生發即督飭將備等員盡力撲捕務俾消滅倘稍延緩致令飛起則其害不可勝言矣勤慎為之雍正八年十二月二十日署理直𨽻天津總兵官臣管承澤謹奏為敬陳末議仰祈睿鑒事竊臣䝉戸部劄開大學士公馬爾賽等㑹議得奉天錦縣寧逺米十萬石由海運至天津大沽入口令天津總兵官鹽法道監收交北直地方官雇船運至德州交與山東地方官運至東兖濟南三府平糶等因奏㫖依議劄行欽遵在案除將應雇船隻𣲖委運員一切事宜㑹同鹽法道移商布政司辦理外查此項米石接濟東兖濟三府民食甚闗緊要而海運米船全憑風信抵津遲速難以預定再自津盤量雇船裝載運至德州皆屬上水船行遲緩且到德之後北直與東省押運各員又須盤量交割輾轉濡滯恐不能及時分發平糶今查豫省漕糧據各營汛探報有德州臨清任城東昌長淮徐州前後九幫船隻約米十六萬石自德州以南臨清上下陸續相接現在守凍以臣愚見莫若將此項糧米内仰懇皇上天恩敕令倉場督臣截留正兌平米十萬石交與山東地方官俟河冰一泮即將原船押運東兖濟三府分發各州縣平糶速濟民食至海運十萬石俟到津之日臣㑹同鹽法道監收交與地方官運至通倉抵還豫省應觧平米十萬石之數一轉移間不獨輓運省便而平糶亦有裨益矣是否有當伏乞皇上睿鑒施行謹奏已有㫖矣雍正九年三月二十五日署理陜西西大通總兵官臣管承澤謹奏為奏明地方情形事竊臣甫抵大通鎮屬一路即有䝉古台吉及喇嘛頭人等差人迎接臣敬揚皇上德威令彼等咸知感畏查大通離西寧相距二百餘里將到大通有迭爾吉打板山臣經過此山雪深盈尺據土人云盛夏始消冰凍又離城五六里隔一大河山水漲發之時水勢汹湧即有船筏亦難撑駕現今造成大橋二座人馬往来俱各便益至大通新築土城髙二丈四尺周圍約四里有餘城内葢造東西營房四千間有兵丁搬移家口住居者亦有未經搬到者現在飭營造冊清查其各處卡路塘房除安兵戍守外尚有未修者屢經移催文員速為葢造臣到任後即先查看本營左右兩營存城兵丁鳥鎗弓箭殊屬生疎惟旗幟號令俱係新製而鳥鎗長短參差半不堪用亟宜如式製造現在上緊辦理臣䝉皇上隆恩特調邊疆重任惟竭力盡心整􅉐料理斷不敢瞻徇容隠貽誤邊庭有負聖主委任至意臣伏查天津鎮屬尚有才識操守堪為邊疆任使之員容另行開列奏請仰懇天恩敕發西寧大通補用俾臣得收臂指之效至所屬白塔永安二營兵馬地方未曽查看俟將左右二營一切兵馬錢糧事宜逐一清查料理立有規模再行前往閲看謹將大通大槩情形先為奏聞謹奏朕觀陜省武職人材毎駕出於直省之上若留心選拔儘堪驅使奚必舊任津屬人員始克收效况封疆大員題官帯赴新任之不宜處曽屢有諭㫖何乃復為此請耶雍正九年六月初九日署理陜西西大通總兵官臣管承澤謹奏為奏聞事雍正九年六月初三日接准都綂臣德成咨為知㑹事雍正九年五月二十九日接到大學士公馬爾賽等寄字雍正九年五月十三日欽奉上諭一道等因移㑹到臣臣正在准備應調間隨於初五日復准都綂臣德成提臣馮允中清文内開雍正九年六月初四日接得柴達木領兵都綂格梅爾咨稱於六月初一日接得騰格里領兵噶蘭大䇿凌報稱於五月二十八日下晚時吾們地方札薩那爾布領伊部落將馬匹搶去等語新奉諭㫖如有用兵之處即令署西大通總兵管承澤領兵前往貴署鎮即領兵丁八百名急速接應前往為此知㑹等因到臣臣縁未知西寧鎮官兵曽否𣲖調一同帯往之處即於初六日一面星飛咨詢一面飛調永安白塔并鎮標二營除前次撤回之官兵五百名外又分派挑選三百名共八百名摘調䭾載請支口糧剋期前往應援續於初八日接准都綂臣德成等咨覆西寧鎮派調官兵一千名初九日起身出口前赴柴達木聼候部郎鼐滿岱管領遣發等因又於初九日准都綂臣德成提臣馮允中同日兩咨内開據派赴柴達木領兵遊撃李崨呈報卑職奉派管領柴達木駐防兵馬於初六日亥時到二臺駐歇初七日寅時忽據觧官程鵬逺報稱五臺馬匹鍋帳俱被賊夷搶去功加蘇天友帯傷臺上兵丁俱各帯傷不知去向今五臺已無馬匹三臺四臺現在緊急等因據此查逆夷既經在臺上搶馬傷兵而青海一帯恐俱蠢動現在飭令官兵相機堵禦但夷性叵測誠恐聚衆侵犯内地不可不預為防範等情又咨開本都綂等派撥西寧官兵於本月初八日遣發起程出口應援并飭白塔營㕘將帯原派就之回兵五百名由黒林口一帯前往口外應援截殺所有部郎鼐滿岱已馳赴柴達木矣相應飛咨希檄飭各營將嚴加防範城守外貴署鎮星速束裝帯領官兵前往應援相機堵截等情臣伏念大通一鎮番夷環處城池所闗甚重而准咨應援事宜又難刻緩除飭令永安營遊撃孫道林保守城池防範各處隘口探聼堵禦與大通相為掎角外復嚴飭中軍遊撃王復加謹保固城池并將大通總兵官印信旗牌准照都綂臣德成提臣馮允中奏明交中軍王復轉齎臣現今帯領遊撃韓光愈守備馬元勲并千把等官共八員馬歩兵丁八百名於初九日由黒林口前往探聼相機堵截縁事闗軍機差人齎摺恐有遲誤臣不揣冒昧由驛拜進合併聲明謹奏奉調之際何得延捱遲滯今幸事巳平定倘致有誤軍機汝能保全首領乎似此畏縮不前殊屬大負朕之委任向後若復如是斷不姑恕戎行之事惟以敢勇當先為貴戒之戒之同日又奏為奏聞事竊查大通一鎮孤懸塞外新建城垣週圍四里有餘修造營房嚴兵駐守彈壓番夷創設甚善但城上四面並未設有堆房今臣於四門城上每門建造堆房二座通計八座將次告竣欽遵諭㫖出征所有未完之處著遊撃王復督造完固仍令毎座設兵五名日則瞭逺夜則廵查務使地方寧謐又所築城墻俱係土壘邊外雨雪過多於今三年不無冰凍坍塌者備細查閲應修葺者即行修葺應培補者已經培補又四門並無闗廂惟南門外有商民葢造房屋四五十間住居貿易前臨大通一河左右悉皆曠地臣亦造堆房數間設兵四十名晝夜廵緝俾商民安堵又城内向有井六眼因開鑿未深泥淤沙積凡屬兵民皆往城外河邊取水往返五六里深為不便今臣將原井六眼悉淘穵至六七八丈不等已皆得水三四尺有餘此外又新添二眼尚在開鑿以資兵丁日給又查兵丁駐防之所糧草為第一緊要然糧須建倉厫收貯草須設厰所堆積查大通城内雖建有倉厫二十座並未造完今俱朽壊已咨撫臣速飭文員修葺酌議堆積在案惟柴草厰所並未設立今臣於城内西南空地四圍築以墻垣設立一厰俟秋收時堆積馬草柴薪以防不時之需至邊庭火噐最闗緊要務宜預備臣於抵任後具摺奏明今臣已如式製造鳥鎗二百桿分發各營兵丁日為操演又城内營房四千間除兵丁搬移家口住居外所餘房屋墻垣倒塌門牕遺失臣特令將弁盡行添修預候新兵居住以上各項俱闗城垣兵民要務臣因應援緊急不敢遲緩所有未完等項俱委遊撃王復督造告竣謹備悉具奏又欽奉恩㫖召募馬六歩四兵丁一千名以補前撥巴爾庫爾之數兹已將及足額所有花名年貌等冊現在攅造送部理合奏聞又臣昨於五月二十六日由永安營汛哆囉打板起查閲各隘口其間有洒金城景陽嶺野馬川等處俱屬險道咽喉之所又自東北一百二十里係仙密寺一帯樹木叢雜番回錯處實棋桌二山緊要隘口俱應設立營汛加以重兵防範臣令遊擊韓光愈正在繪圖呈覽間欽遵出師未及奏達伏乞皇上敕令德成馮允中查議安設則邊疆大有裨益矣謹奏大通事務與汝無渉矣雍正九年七月十七日署理陜西西大通總兵官臣管承澤謹奏為恭謝天恩併伸愚悃事竊臣於六月初九日恭報領兵起程一摺奉到硃批臣跪讀之下恐懼戰慄伏思臣仰邀皇上髙厚之恩不即加罪譴復䝉聖誨提撕䇿勵將来臣惟有望闕叩首感激涕零何敢復措一詞但查本年六月初五日准都綂臣德成提臣馮允中咨調應援騰格里嗣又准咨據稱逆夷在臺站搶馬傷兵而青海一帯恐俱蠢動又稱夷性叵測誠恐聚衆侵犯内地不可不預為防範等語臣接准来咨隨於地方城守安頓布置嚴加防範因移商寧鎮冀彼此協謀共濟惟是臣所領八百官兵除前撤回之兵丁五百名半在永安白塔二營調取其新派三百名之兵丁一切口糧軍裝等項又悉取辦於寧城臣加緊料理是以西寧官兵於初八日起程臣即於初九日領兵起程伏念臣世受國恩何敢延捱遲滯有負聖主委任之至意以自取罪戾今叨䝉皇恩格外寛宥臣惟有凛遵諭㫖時時警惕竭犬馬之微誠以仰答髙厚於萬一所有臣感激微忱理合繕摺奏謝謹奏可謂良心喪盡無恥之小人也硃批諭㫖巻九十
