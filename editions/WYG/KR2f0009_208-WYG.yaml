body:
  text: 欽定四庫全書硃批諭㫖巻二百八硃批吳應棻奏摺提督順天等處學政臣吳應棻謹奏爲奏聞事竊臣䝉皇上天恩簡畀順天學政本月初八日署直隸總督臣劉於義委員齎送學政關防到臣隨恭設香案望闕叩頭謝恩祗受訖伏念臣才識庸闇仰荷聖恩至深至重今任事方新力圖報稱惟有一字不欺一塵不染不徇一毫情面不留一隙弊端而稽察師儒宏宣教化尤屬專責臣於十五日恭謁文廟八旗生員約有數百人排列宮牆整齊嚴肅臣令其敷講經書恭宣上諭莫不拱立敬聽臣即分别奨賞面加鼓勵至大宛兩縣生員到者不及其半聞歴來歲考到者亦止有一半不到者竝不申眀縁由殊屬藐法臣即面加申飭責令教官嚴立課程不時查核以懲怠惰之習臣在河南時每府試事告竣傳集諸生恭宣上諭每縣新進儒童及優等生員各授一本令其轉相傳誦約而易眀臣聞各省學政宣講之法俱未畫一如臣所行可否一例通飭伏祈皇上睿鑒施行謹奏汝所行果善直省自必聞風仿傚何須通飭耶提督順天等處學政臣吳應棻謹奏爲八旗歲考不到生員宜核實清查以振積習事竊查雍正二年前任學臣吳襄疏請敕諭八旗都統凡遇歲考務傳催八旗生員赴考果有事故預先呈眀教官申報若無故不到照例除名業經奉㫖欽遵在案復查雍正五年八年兩次歳考八旗生員與考者仍不及其半不到者亦竝不申眀縁由學臣無從稽察積習相沿因循如故今又屆歳試之期如槪行執法除名則學校将去其大半若任其規避則學政㡬等爲具文伏思三年歳考次其等第分别奨戒核士習而考學業定例綦嚴若可聽其不到則無志諸生徼倖一衿終身恃爲䕶符不當差不赴役不讀書不作文有名無實竟成遊惰矣且漢學生員有欠考不到者可以隨棚補考滿學生員不便於他處補試若不到生員竝不申眀緣由在學臣既無從查核而在該生或藉口於赴考擅離本旗兩無覺察所關非小臣前年科試時見八旗人才秉資英敏多有可觀果能奮發砥礪自可超羣出衆若自量文理平常不能上進卽當勤習弓馬他途自效上備王國干城之選豈容厠名膠庠優游無事任其自便耶但學臣歲試行文取齊不過兩月之前爲時無㡬而滿學生員除現在京師外或駐防或隨任逺隔他省文移往來勢有不及所當格外體恤不能與在京一例似應令各本旗查眀行文知照學臣抑或該旗飭發教官令其造具清册某生駐防某省某生隨任某處申眀學臣則在京者不得藉端規避在外者亦可按册稽查倘仍有臨考不到而本旗既無知照教官又無文詳報縁由者顯係規避即照例将該生除名移令本旗當差庶八旗士子咸知警勉而學臣與該管旗分俱可互相覺察錮弊可除臣職司學政不敢因仍舊習顧忌嫌怨沽寛大之名負董率之職總期實心整飭以仰副聖天子興賢育才之至意爲此繕摺具奏如或臣言可採伏祈睿鑒勅部定議施行謹奏此奏甚屬可嘉該部詳議具奏提督順天等處學政臣吳應棻謹奏爲感激天恩恭抒謝悃事竊臣樗櫟庸材遭逢聖世菲葑陋質忝列清班由編修而晉擢宮僚司文柄而重膺首善皇上之栽培教育必欲使之成材微臣之誓臆盟心能不愈加奮勉謹遵聖誨彌矢清操祗期無曠厥官曷敢稍留餘力乃䝉皇上策其駑駘加之奨勵雍正十二年三月間恭覲天顔屢承聖訓朂以學政吏治毋分兩途經濟文章不容岐視周詳諄至委曲成全皇上之期臣者愈逺愈大臣之仰副聖懷者彌切彌難今於六月二十二日接閲邸鈔䝉恩調補通政使司右通政臣方感惶無地兢􅅥靡寧乃於七月初三日再接邸鈔又䝉特㫖補授都察院僉都御史旬日之間兩邀寵命淺薄之器洊歴崇班榮以清要之司仍領鑑衡之職天高地厚感君恩之疊賁負荷難兼綆短汲深愧臣分之逾涯報稱奚自惟有始終無間奉一職必盡一職之藎誠内外無殊任一事必周一事之體要總期無負簡畀之洪慈庶以仰答高深於萬一耳至臣兩次䝉恩遷擢部文例由督臣李衞轉咨俱未接到容臣照例具本奏謝但連閲邸鈔微臣感激之忱中夜難安不能自已謹先繕摺恭謝天恩伏祈皇上睿鑒謹奏覽奏謝知道了若不奮勵造詣爲一傑出之名臣則是甘以庸愚下流自居矣勉之提督順天等處學政臣吳應棻謹奏爲恭繳硃批奏摺叩謝天恩事竊臣於本年六月内䝉皇上洪恩兩次遷擢具摺奏謝欽奉皇上硃批朂以名臣之重惕以下流之危臣敬謹跪讀感懼交幷伏思作聖作狂所判惟由一念上達下達所分只在㡬微人禽之界禍福之機全在自已皇上諄諄指示不啻發䝉震瞶臣雖識見寡陋才力未充仰荷臣於萬一而志期奮發決不肯淪庸下以終身惟刻刻凛遵聖訓時時警覺臣心冀不負皇上䇿勵之洪慈成全之至意耳臣欽奉硃批感奮無似理合繕摺奏謝幷将奉到硃批奏摺一倂恭繳謹奏覽署理湖北巡撫印務兵部右侍郎臣吳應棻謹奏爲聖主隆恩疉沛微臣感激難名歴叙寵榮恭抒謝悃事臣於雍正十三年四月初二日到湖北巡撫任所有感激微忱幷到任日期除遵例恭疏題報外伏念臣一介寒微疊膺文柄幸䝉聖眀教誨得免隕越臣自問實無寸長上年六月間䝉恩兩次擢遷至左僉都御史以文學之臣兼司風紀已屬殊榮至十月進京恭祝萬夀獲隨諸大臣後日覲天顔跪聆聖訓主恩優渥錫予便蕃微臣寵遇於斯爲極本年正月二十二日欽奉恩㫖命臣署理湖北印務非特才力難勝即臣夢想亦所不及寸心凛凛感惕交集正徬徨而莫措乃寵命之疊加二月二十二日又䝉特恩授臣兵部右侍郎兩月之間再遷顯秩臣自顧何人膺斯寵渥縱使捐縻頂踵何由上答生成惟有矢竭公忠庶㡬仰酬高厚秉血誠以報效君父殫心力以辦理地方此臣所夙夜兢惕而不敢一刻稍弛者也所有歴年疊荷洪恩微臣感激下悃章疏所不能縷述者理合繕摺奏謝伏祈聖鑒謹奏勉盡厥職以副朕之委任署理湖北巡撫印務兵部右侍郎臣吳應棻謹奏爲恭報二麥收穫米價平減事竊臣抵任以來細詢湖北今年春候雨水甚屬調匀一路見麥穗秀實徧野芃芃今據各屬禀報二麥現在陸續登場約有十分收成最次者亦有九分禾苗俱已蒔插武漢等九府州米榖價値甚平上米每倉石九錢三四分中米每石八錢五分次米每石八錢榖每倉石四錢二三分麥每倉石九錢四五分各府大約相同臣現今督率屬員實心勸課俾小民殫力南畝安享樂利以仰副皇上貴榖重農至意所有二麥收穫及米榖價値理合恭摺奏聞伏祈睿鑒謹奏據奏二麥業已陸續登場禾苖遍插米價甚平楚民樂業情形以手加額覽焉署理湖北巡撫印務兵部右侍郎臣吳應棻謹奏爲敬陳湖北吏治仰邀睿鑒事竊臣䝉皇上隆恩畀以封疆重任恭承聖諭諄諄以秉公察吏爲首務臣抵任一月以來悉心體察湖北吏治廢弛已極無論欽部大小案件俱經年累月拖延不結臣伏思欲稽察守令必先責成藩臬以通省錢榖刑名之總滙果能時加振作自不慮屬員之怠廢按察使胡瀛到任未及兩月從前積案繁多正在竭蹶辦理布政使李世倬在任年餘支銷欵項多不清楚現今奏銷在即一應文册嚴催不應至州縣沉擱之案件更不可勝計臣現在按限查催清剔夙弊聞屬員中已有怨臣過急者臣䝉皇上提命再三諸事當從容辦理何敢過於苛急但吏治如此廢弛而仍爲茍且因循之計以博寛厚之名重負皇上委任之意臣不惟不敢實不忍也臣惟有開誠布公共相勉勵期於吏治肅清庶務就理仰報聖恩於萬一倘數月之後仍不能振作臣原無嫌怨之可避另當據實陳奏請㫖定奪謹将湖北吏治廢弛之處先行奏聞謹奏所奏嘉是覽之能如此居心矢志方爲不負擢用李世倬胡瀛二人俱係中材不相上下汝其審察孰可孰否當去當留直據所見宻奏以聞候朕酌奪署理湖北巡撫印務兵部右侍郎臣吳應棻謹奏爲奏聞事竊查楚省入春以來雨水調勻二麥豐收稻苖俱蒔插長茂前經恭摺奏聞自五月初三日通省得雨之後迄今二十餘日武漢兩府屬竟無雨澤所幸湖北地方水田多而旱田少尚可挽水灌溉臣率同屬員䖍恭修省歩行祈禱以冀感召天和俟獲有甘霖即當馳奏上慰聖懷所有現在禾苖望雨情形合先奏聞伏祈睿鑒謹奏據汝現在忠誠之心揆之上蒼感應之理果若䖍恭祈禱不出旬日必䝉甘澤之施也署理湖北巡撫印務兵部右侍郎臣吳應棻謹奏爲奏聞地方情形事竊查武漢兩府屬自五月以來雨澤愆期臣於五月二十七日恭摺奏聞續查黄安徳荆襄鄖六府及歸州等處雨澤俱屬稀少自六月十四五等日各屬陸續呈報得雨至二十二三等日甘霖大沛四野沾足早稻於五月内俱已收穫各府五六分七八分不等晚稻湖田甚好其山田被旱之處恐收成不無歉薄武漢兩府米價現今尚平但聞湖南貴州及湖北連界地方雨水亦未及時當玆黔省用兵之㑹正軍糈挽運之時倘四川等省米石一時不能販賣來楚以資接濟恐将來湖北米價難免昻貴臣身任地方自當預爲籌畫務期料理妥協斷不敢少有欺諱粉飾負聖主委任之洪恩也謹先将得雨日期地方現在情形恭摺具奏上慰聖懷伏祈睿鑒謹奏近聞湖北一帶地方甚旱此奏似不無隠飾硃批諭㫖巻二百八
