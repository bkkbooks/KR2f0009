body:
  text: 欽定四庫全書硃批諭㫖巻一百十六硃批祖秉衛奏摺雍正五年閏三月初七日署理山永副将事務正白旗漢軍副都統臣祖秉衡謹奏為奏聞事本年三月二十一日蔡珽到永二十五日開工修築堤岸忽扵本月初三日蔡珽向臣云我遣兒子蔡永禧齎摺進京於三月二十七日奉㫖一切事俱交與祖秉衡轉奏今如何不由伊䖏竟自越奏欽此蔡珽隨将奏摺交臣轉奏臣看其摺内情節據云伊之家産約畧十萬兩上下情願交官一應工程交地方官修理等語伏思蔡珽受恩深重自應殫心竭力以圖報效乃工作方始如何萌此推諉之心是以臣當即向伊云此等語我不便轉奏臣除現在仍嚴催蔡珽父子上𦂳修築務使堤工於河水未𤼵之前完竣並将城工作速料理興修外合将蔡珽到永情由繕摺奏聞謹奏是所奏知道了蔡珽近日行事似涉瘋狂雍正五年七月二十七日正白旗漢軍副都統臣祖秉衡謹奏為請㫖事雍正五年二月十九日奉㫖山永副将事務著副都統祖秉衡署理俟岳含竒到任後祖秉衡請㫖現今派蔡珽修理永平府城垣其應如何修理之䖏著祖秉衡稽查管理欽此今岳含竒已扵本月二十六日到任臣隨将副将事務交代明白理合奏聞請㫖其城垣修築之䖏自六月初二日堤工完竣後即飭令蔡永禧先将城垣南面修築已經築砌完竣者二十丈現在修砌者五十丈合并奏聞謹奏工程若即可吿竣爾料理完畢後再赴京都為是如尚需時日交與知府副将管理爾來往照㸔亦可其酌量行之雍正五年十月十九日山西大同總兵官臣祖秉衡謹奏為恭謝天恩事竊臣接閱邸抄知臣胞弟祖秉圭奉㫖署理貴州巡撫印務伏念臣母子兄弟疊荷聖恩寵榮已極惶􅋺實深今臣弟祖秉圭更蒙天恩署理巡撫印務臣聞命之下感激之情不能自巳為此繕摺叩謝謹奏受恩易不負恩難勉之雍正五年十一月十一日山西大同總兵官臣祖秉衡謹奏為預籌積貯以濟兵食事竊查臣大同標下三營兵丁毎名每月應關米三斗折給銀一錢三分五釐令其自買糧食臣思每年當青黄不接之際加以二千有餘兵丁入市糴米勢難免騰貴之虞是積貯一事不可不預為籌畫今查得鎮屬教場内舊有地畝二十八頃每年收租榖五百六十石得勝助馬兩路每年交餧馬榖麥一千六百四十四石臣受恩深重何敢私入己槖請即以此二項充備積貯之用每遇青黄不接之時減價平糶以濟兵食俟秋收後買補還倉數年之間便可積榖數千石扵兵丁洵有裨益惟是本年教場地畝租榖前任總兵官王以謙已經收去無従備辦臣先将得勝助馬兩路所交馬料除将攤累兵民者悉行禁革外其租榖可收者共計八百二十四石内每百石将十二石作運脚墊倉等費實在七百二十六石即従今冬收貯嗣後與教場地畝所收租榖一併積貯永為成例事關預籌兵食臣未敢擅便伏候皇上批示遵行謹奏祖秉衡将任内應得之租榖捐充營伍積貯利濟兵丁甚屬可嘉著該部議叙具奏将此摺𤼵與王以謙㸔料伊亦未必知愧也雍正六年正月十一日山西大同總兵官臣祖秉衡謹奏為叩謝天恩事臣兄弟二人均叨沐聖主殊恩不次超擢自揣逾分恐懼日深更蒙皇上垂憫烏鳥至情俾臣母邀榮格外洵為千古異數今江南督臣范時繹撫臣魏廷珍各助銀四百兩差貟護送臣母扵本月初八日至臣任所臣母惟有朝夕焚頂祝頌萬夀無疆臣兄弟二人亦惟有益遵母訓各竭犬馬心力冀仰答髙厚於萬一耳理合繕摺叩謝天恩謹奏為母之感已悉副母所望當思勉之勉之但務一誠字人臣之能事畢矣同日又奏為恭謝天恩事雍正五年十二月二十三日蒙皇上恩賜御書福字到臣隨恭設香案望闕叩頭謝恩又臣子祖魯扵雍正五年十二月十三日奉㫖補授佐領伏念臣屢邀殊恩毫無寸效夙夜難安今臣子復荷天恩補授佐領益為感激無地臣惟有恪遵聖訓盡心盡職并飭臣子勤慎行走小心辦事以仰報洪恩扵萬一耳為此具摺叩謝天恩謹奏覽自能勉盡一是字方可期子孫之效法設在己有欠缺䖏雖教何益子孫未必肯聴従也雍正六年正月二十八日山西大同總兵官臣祖秉衡謹奏為請調管理軍站營貟以慎站務事竊念軍站一事最關緊要查臣鎮屬如天城陽和聚樂大同髙山左衛右衛等䖏俱係極衝大路各有軍站馬匹供應来往差使但舊制天城陽和大同髙山右衛五䖏其軍站馬匹均係守備管理惟聚樂左衛二處僅以千總管理站馬恐千總微貟難免誤公臣愚見聚樂係得勝所轄左衛係助馬所轄請以聚樂左衛二䖏軍站亦悉照天城等五䖏令得勝助馬守備移駐管理其聚樂左衛千總令其移駐得勝助馬兩城隨叅将操防巡查一轉移間地方軍站兩有裨益臣冒昧瀆陳伏乞皇上批示施行謹奏驛馬事輕地方事重非可草率更改者轉移之間果與地方防守毫無干礙與撫臣商酌具題聴候部議朕意只在得人豈在官之大小也千總守備總不過前日之把總耳此奏朕殊不以為然爾其再為詳慎斟酌而行朕遥揣之論亦不可即以為是雍正六年九月二十一日鎮海将軍臣祖秉衡謹奏為敬陳管見以收營伍實效事竊照守備一官既有巡查訓練之任又有支領錢糧之責甚為𦂳要其以侍衛補用以及千總題補之人無庸置議惟是由武進士初任之貟人材弓馬或有可觀而扵營伍事宜率多不諳臣愚以為嗣後凡武進士應推守備之人伏乞皇上敕部查核帶領引見預行揀選照文職州縣例就近分發各省督撫提鎮標下試用知果營伍諳練堪勝守備之任者分别題請實授庶營伍地方均有裨益抑臣更有請者凡各營路叅逰駐劄之所并極衝大路城堡止設有守備一官並無千把者甚多雖提鎮向有外委把總之例不過給以委牌従未達部兵丁亦未必聴其約束徒有虚名仍無實濟臣愚以為嗣後凡極衝大路止設守備千把一官并叅逰駐劄之所並無千把者請敕下各省督撫提鎮無分營路請照拔補把總之例揀選人材壮健弓馬純熟者給以外委把總委牌悉行報部賞以頂帶令其差操效力遇有把總缺出秉公拔補庶兵丁皆踴躍奉公而營伍亦得收臂指之效矣以上二條是否允協伏乞皇上睿鑒施行謹奏該部議奏其外委把總應行報部並照在京副驍騎校之例賞給八品頂帶以示鼓勵遇有缺出該上司秉公拔補不稱職者革退雍正六年十一月二十八日鎮海将軍臣祖秉衡謹奏為懇請整理江汛以専防守責成事竊臣屬沿江兩岸墩汛共有一百八十四䖏計長四百餘里臣到任以来専差逐汛查驗除将怠玩尤甚之汛弁即行斥革并嚴諭水師兩營逰擊遍行確查凡煙墩坍塌之䖏速移地方官修整其器械不全技藝生疎以及偷安離汛者分别懲儆加意整理外惟念沿江墩汛必得添葢營房照依山陜汛地分派兵丁應守何汛者悉令挈眷居住則責任既専咸知儆惕自不敢仍前疎懈伏查每汛兵丁向係三五名不等每名應給營房二間通計汛兵六百八十一名共需營房一千三百六十二間現有營房四百六十六間應添八百九十六間每間需銀三兩二錢通共計費二千八百六十七兩二錢臣到任後即查出標下兩營水師兩路從前各項虚冒空糧共有七十五分現在添葢營房無項可辦莫若将此項清出空糧暫停募補再臣衙門向有儀従工食一項每年又有三百餘兩亦現在請裁倘蒙俞允即以此二項支給陸續添盖約計兩年之後便可完竣其清出空糧依舊募補儀從工食仍可裁革而扵沿江墩汛肅然改觀矣芻蕘之見冒昧陳請是否允協伏候皇上批示施行謹奏料理甚屬可嘉但汛地營房添設之後尤須不時稽查如直𨽻山西悉經葢造派令兵丁挈眷居住率皆睡至日出行路之人叩門取火尚不之覺似此不過徒為嬾惰兵丁之安樂窩耳亦復何益總之有治人無治法果肯竭力殫心整頓自必改觀也勉之同日又奏為據實奏聞仰祈睿鑒事臣扵十月十八日到任見右翼副都統臣張天植精神衰邁凡辦公事䖏不能行走詢其縁由據云患痢未痊近以例應輪班陛見擇扵十一月二十五日起身欲臣先行咨部臣以其年老久痢勸其暫養另為代題今副都統臣張天植扵十一月二十日上公衙門自云痊好必欲循例進京臣未敢再阻除張天植起程日期咨明兵部外理合據實奏聞謹奏所奏是另有㫖諭伊回任爾看如果年老不能供職令其告休一面奏聞其向日聲名及為人何如之處一併奏知同日又奏為奏聞事臣䝉天恩補授鎮海将軍到任後隨将衙門向来出息逐一稽查因知每年俸銀米折馬乾心紅儀従工食以及兩淮題定鹽規並巡緝夀禮等項銀通共五千七百二十五兩伏念俸銀等項皆係養㢘之資惟是儀従工食銀三百三十六兩今執事人役悉屬兵丁應役並無雇覓之費實為虚冒應行裁革其鹽規巡緝銀一千兩従前悉皆肥巳尤屬不合臣查每年修理巡鹽哨船十二隻需銀二百兩巡鹽官兵盤費需銀六百兩請将每年鹽規巡緝銀兩按巡鹽官兵數目逐名實在給散以専責成除此之外每年尚有四千五百八十九兩儘可養贍謹分析詳細奏聞伏乞批示施行謹奏在汝酌量為之不分外貪求足矣無庸矯㢘應取者取之何妨耶雍正七年二月初八日鎮海将軍臣祖秉衡謹奏為遵㫖奏聞事臣自到任以来訪察得江蘇撫臣尹繼善居官安静聲名亦好又聞得不時在外潛行私訪凡地方光棍以及窩娼窩賭匪類俱将其姓名開列一單實貼巡撫衙門前以示欲其悛改歛跡之意理合據實奏聞謹奏尹繼善實好國家又得一人才矣爾條奏戰船一摺留中朕細閲數條甚屬妥協可嘉但内中有復更馬三竒改造之䖏朕不以為然候叧斟酌有㫖同日又奏為恭謝天恩事本年正月初九日接家信知臣弟祖秉圭蒙恩補授御史又著管理廣東海關稅務隨恭設香案望闕叩頭謝恩伏念臣弟祖秉圭蒙皇恩寛宥不加罪譴更荷殊恩復加委任天髙地厚感激難名臣惟有勉其勤慎奉公竭盡犬馬微忱以仰報皇上洪恩於萬一耳為此恭謝天恩謹奏爾弟祖秉圭從前未為朕所熟識今用伊此任面見數次甚屬平常人也汝當加意朂勉之雍正七年五月二十二日鎮海将軍臣祖秉衡謹奏為請除陋習以肅功令事竊臣查従前京口八旗另户壮丁不時逃走迨自回銷檔之時亦不過數十日根詢縁由據稱壮丁原無告假之例即遇有父母大事以及婚娶等務該管官亦不准給假必逓逃牌甚有明知其去䖏彼此說明但報逃塞責者在本人亦明知該管官必逓逃牌全無顧忌而去至自回之後設遇挑甲之時又仍照常挑補視功令為具文大非立法本意臣請嗣後另户壮丁果有正務許呈明該管官准其給假不得混逓逃牌其非係正務不應給假而私去者方始報逃縱係自回亦不准挑甲則咸知儆惕而犯逃者自少矣惟念從前報逃舊習既大半虚應故事恐其中人材弓馬不無可用之人若竟因此廢棄未免屈抑臣請細加查核如果従前因正事而去情有可原者再扵挑甲之時量其材技挑補庶人材不致廢棄扵寛嚴互用之道或稍有當也是否允協伏候皇上批示施行謹奏奏内不通之論不一而足另有諭㫖令怡親王大學士等轉𤼵雍正七年七月十九日鎮海将軍臣祖秉衡謹奏為恭承聖訓感激難名叩謝天恩事竊臣齎摺家人囘署捧到硃批諭㫖并怡親王大學士等轉𫝊上諭跪讀之下惶悚無地伏念逃過另户壮丁挑甲一事臣才識短淺實屬錯謬蒙皇上指示周詳臣始洞然開悟愧悔莫及嗣後惟有益加奮勉每事細心辦理以仰答髙厚扵萬一耳為此謹奏勉之慎之爾此任甚不及爾做總兵時總未見奏聞地方上一件事想因官爵已登極品無可上進䖏惟思持禄保位耳但此隠嘿自便之術未為保全之善策更當為已籌畫一妥協地步方可硃批諭㫖巻一百十六
