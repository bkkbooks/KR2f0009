body:
  text: 欽定四庫全書硃批諭㫖巻八十九硃批黄焜奏摺雍正五年閏三月二十日湖北布政使臣黄焜謹奏爲奏聞事竊臣䝉皇上天恩特授湖北布政使已經到任其通省官員之賢否倉庫之盈虛及凡有關於國計民生者臣自當欽遵聖訓實心料理另行奏聞謹將每年正雜錢糧耗羡銀両與夫支銷及存庫數目并通省各官暨臣養廉等項開具清單恭呈御覽理合繕摺奏聞謹奏不在言只在行朕無暇覽此即覽之亦難確信必無虛僞但宜勉力實行爲要同日又奏爲聖恩髙厚難名臣職涓埃未報敬陳管見少盡愚忱事臣本庸愚䝉皇上格外𢎞恩以有罪之人特授副都統旋用爲布政使到任以来毫無報稱寤寐思維實難自安雖偶有管窺蠡測何足仰裨一阿爾泰臺站宜安兵也查張家口西北至阿爾泰皆係四十八家及喀爾喀夷人住牧南則河套北皆外夷東抵奉天西達巴爾坤一路數千里並無山川險阻今插漢叟兒查克拜達里兩處雖有大兵居住然指日凱旋終屬塞外不可無備今張家口外自四臺至三十臺俱係喀爾沁䝉古分發各臺住牧已乆服習風土安居樂業再伊等乆隸版圖並無王子管轄而關東地方又俱有親屬更可互相牽制將来生齒益繁實與甘涼肅等處無異臣愚以爲自頭臺至三臺附近内地可以不必紛更其查克拜達里現有發遣種地人犯已可作一大鎮而孤立少援敬請自三十一臺至三十五臺俱一例更換喀爾沁住牧再於四臺至三十五臺每臺六十戸内挑選兵丁量給月餉雖不能聲援接應以爲掎角之勢然綿亘數千里皆有恃以爲固矣一臺灣兵民宜立法經理也查臺灣孤懸海外實閩省之門屏而福建漳泉粤東惠潮一帶居民領照往臺耕種獲利之後即回故土頂替往来視同傳舎此皆緣臺灣舊例兵民不許㩦帶家口但兵時常更換應遵舊例民欲其乆居如不帶家眷則毫無顧戀易於犯法臣請嗣後凡有願往臺灣種地者俱令㩦帶家口前往自然可以安分樂業再查臺澎二處額兵一萬舊例三年之内於通省營伍内撥兵調換誠良法也奈原去之兵到臺之後或私取眷口或自置産業不願換回而新去之兵内地有父母妻子之繫念不願赴臺兵丁彼此不願一時更換數千人營弁惟恐激變俱虛應故事歷年止有換班之名而無換班之實況内地發往換班之兵如建寧邵武汀州等處往返甚至累月經年不獨兵丁䟦涉維艱且營伍空虛深爲未便臣愚以爲嗣後換班兵丁俱在沿海附近營内輪流撥換更須逐月陸續發往更替務於限内照數換完如此則臺灣換班之兵該管營弁易於清查更替而内地各營亦可免營伍虛懸之慮矣一寧夏至榆林可通舟楫運糧也夫榆林安邊定邊連接花馬池築牆設險皆爲衝要但四望黄沙糧道險逺自古議榆林者俱以芻糧爲急查寧夏實産米之區榖多價賤每有熟荒之慮臣前任洮岷道時辦差寧夏見商民自中衛乗舟由黄河以至寧夏順流而下水勢平坦以此推之則寧夏順流繞河套以至榆林近境諒必可通臣愚以爲寧夏地方應設立官船百隻將每年贏餘之米陸續運至榆林附近地方積貯備用似與軍糈不無裨益但此處河道臣並未經歷恐聞見不周伏祈皇上教訓一土司宜立法防範也夫今之土司無異古之封建但古制公侯不過百里今土司之大者延袤數百里部落數萬餘搶刦村寨欺壓平民地方官莫之敢指如遇投誠歸化之生番輒議令其管轄一則曰以土治土再則曰素所畏服不知日積月累漸成尾大不掉之勢今請自後土司有犯俱改土歸流凡有投誠歸化之生番或歸流官或另設頭目管轄則土司之勢不至日熾易於鈐束矣更有邊地之民在土司名下中馬或在土司地内耕種者又各處土司皆因歸化日乆地方官俱漫無覺察聽其往来自便甚有在城市之内置買房屋及經營生理者亦有延請内地幕賔代筆主文者如不行查禁恐不法之徒妄生事端亦未可定臣請自後邊地之民有在土司名下中馬種地者俱令地方官三年一次稽查造冊存案無致民番混淆凡各處土司不得置買内地産業及延請内地之人如此則土司無内外鈎串之人必守法安分於邊疆大有裨益矣以上數條俱邊疆大事臣何人斯敢越職妄言但臣受恩深重實不敢以循分供職遂爾塞責有負皇上格外之生成是以不揣冐昧上瀆聖聰伏乞皇上教訓謹奏所奏數條内甚有不通處亦有現在欲行之事朕若一一批示既無閒暇且非爾現任内切要之務似可不必然觀爾居心甚屬可嘉惟不脱迂淺二字耳當擴充學問必令胸襟開濶識見精明方可計議大事也勉之雍正五年六月初六日湖北布政使臣黄焜謹奏爲奏明交代事臣到任後於閏三月十九日准前任布政使臣王克莊移送交代冊籍到臣因欵項不清移回另造遲至五月初四日方准更造移送前来查王克莊移交正額銀三千五百四十八両零又不入交代雜項銀一萬四千餘両逐一查核雖無虧空但應支雍正五年三月閏三月荆州駐防官兵俸餉因本年錢糧徴觧不前王克莊遂將雍正四年地丁屯餉及各案銀両共那用銀四萬五百七十三両零臣已造冊詳明督撫二臣再王克莊任内共動用過三分歸公耗羡銀五萬五千六百四十六両零臣查其動支欵項漫無頭緒已將不便准銷銀一千二百四両零又鄭任鑰墊支無可著追銀五百三十七両零王克莊墊支無可著追銀二百三十七両零詳請督撫二臣令彼自行議補再布政使兼理都司事務省局庫内除被㕘前任都司李愈隆賠補軍器之外尚有應貯盔甲並鉸鎗㓲刀腰刀礮位鳥鎗過山鳥大小鐵子礮子長鎗等項因歷年乆逺俱已朽爛不堪應用從前各官每逢交代時惟於冊内註明銹壊字様因循接受臣不敢再爲因循已將朽爛緣由詳明督撫二臣現在查議再前任撫臣鄭任鑰布政使王克莊任内有部餉添平銀一千六百五十七両零應伊等自行捐補之項乃鄭任鑰等槩於耗羡項下動支臣已查明追出現在貯庫又湖北荆州府同知翁年倫名下無著關税銀一萬八千三百八十餘両原議督撫司道分作四限公捐完補已經具題在案不意名雖公捐毎年仍於耗羡内動支臣查翁年倫之案係題明公捐不便動支耗羡今嵗九月又届四限全完之期臣不敢因循動支已將臣應得存留坐平銀一千二百両捐出凑補外其餘仍照原議公捐補項已詳明督撫二臣訖臣受恩深重職司庫藏惟有秉公查核不敢稍爲徇隱所有臣接受交代事宜理合據實奏聞伏祈睿鑒謹奏不事徇隱可嘉之至既肯因公破面即當徹底爲之不可中道而止設或將一半取信於朕又留一半暗做人情且聲言出於不得已而歸怨於朕以圖兩益於巳此等巧術斷乎不可且亦必不能逃朕之鑒照也試思朕成全汝父子之恩若不致身報效揆之天理人情均所不容况汝後半世功名不可限量亟當加勉作一人物其間所全者甚多亦何憚而不爲之耶於朕前除秉公竭誠實力奉行之外餘無二策勉之勉之同日又奏爲奏明交代事竊臣已將前任布政使臣王克莊移送交代冊籍並臣逐一查核情由另摺奏明所有王克莊任内收支耗羡銀両欵項數目謹另繕清單恭呈御覽謹奏閲所開摺内督撫支用甚多督撫豈自無養廉之項乎向来李成龍鄭任鑰應得養廉共計若干查其當於公項取用則已若係濫支公項即當令其賠補至如正副考官程儀等項亦皆屬爾等私用類斯數欵何得竟謂必應動用公項耶爾當斟酌同日又奏爲恭繳硃批聖訓事臣於本年五月初二日奉到硃批臣摺隨恭設香案叩頭開讀䝉皇上諄切教誨跪誦之下感激涕零臣何人斯生逢聖世得邀此千古未有之異數也自後惟有勉力學問竭盡駑駘以圖仰報天恩於萬一耳所有奉到硃批奏摺理合恭繳謹奏極當勉力自愛多有人奏汝云黄焜除操守二字之外何事不能辦理朕詢之爾父據爾父力保爾有守爾倘於清之一字不能黽勉豈惟不忠且兼不孝矣可不勉乎雍正五年七月二十九日湖北布政使臣黄焜謹奏爲恭謝天恩事臣於雍正五年七月十九日奉到硃批奏摺三件奏匣四箇隨恭設香案叩頭開讀祗領訖竊臣一介庸愚䝉皇上擢用湖北布政使到任以来時以曠職爲懼䝉聖恩屢加教誨今復頒賜奏匣聆如綸之天語恍同提命之親承沐格外之殊榮愈切捐糜之難報惟有益勵清操黽勉供職冀圖仰報天恩於萬一謹奏奏匣原爲國家政事有益而頒密之一字最要非爲汝等誇張聲勢以作威福之具也湏慎之又慎少不密禍不旋踵前車覆轍甚多當深以爲戒也雍正五年八月十九日湖北布政使臣黄焜謹奏爲敬請睿裁事雍正五年八月初四日奉總督臣福敏牌行七月初一日欽奉上諭湖北地方咸寧等八縣三衛被水朕深爲軫念若仍令輸納錢糧民間未免拮据著將本年錢糧全行蠲免倘有已經完納者准作雍正六年應完之項等因欽此隨抄寫告示遍貼曉諭欽遵外恩綸到楚軍民老㓜歡聲震地感激莫可名言臣伏思湖北沿江窪地雖稍覺被水其餘府縣收成實有九分十分不等即被水縣衛之中髙阜之地仍屬豐收其低田被水亦漸次涸出將来可以播種二麥現今米價平減地方寧謐督臣又推廣皇仁凡被水州縣俱各多方撫恤今復䝉皇上全免錢糧恩出格外但查蠲免往例俱按被水分數之輕重照例分别蠲免從無全免之事今皇上沛浩蕩洪恩全行蠲免臣何敢再爲瀆請但查未被水之村莊現獲全收倘槩不令其輸納恐非小民貢賦之意臣職司出納不得不深思熟計以臣愚見似應止將各州縣衛被水里區圖甲全行蠲免其未被水髙阜田地仍照舊徴收則國計民生均有裨益緣此番上諭係從来未有之曠典無例可援臣布政司衙門有造冊之責是以未敢緘黙理合繕摺上瀆聖裁伏祈聖恩教訓遵行謹奏朕此番施恩格外因憫念濵江數州縣毎被水災之故耳况諭㫖既降何可更易所奏知道了似此等有意作用嗣後不必切記同日又奏爲敬瀝下情仰祈睿鑒事竊臣庸碌無能䝉皇上逾格簡用授兹重任惟矢竭愚誠冀圖仰報萬一凡遇地方應行事件及庫帑耗羡銀両矢公矢慎不敢少有徇情瞻顧上負皇恩遂覺諸事未恊督臣福敏之意因而毎遇公事或臨限苛駁或有意躭延欲加之罪俾無觧免如督臣署廵撫事務飭取盤查各屬貯庫印結臣已於限内查送督臣一面批駁一面㕘報遲延又臣因前布政使動支耗羡欵項不清詳請還項督臣苛駁數次嗣於六月初六日復備細具詳至今両月有餘竟置髙閣使臣無所適從臣受恩深重寢食夢寐惟思圖報國恩豈肯以上司威懾委曲將順亦不敢有意違拗致乖職守惟是督臣係封疆大吏凡遇事件詳慎駁查理所宜然但一味懐私不應駁而駁臣之㕘處固不敢辭恐地方公務反致遲延咎更難諉用是惴惴靡寧上瀆天聽實非敢誣謗大臣自干重譴也臣焜戰慄恐懼冒死陳奏伏祈聖恩鑒宥謹奏福敏爲朕所深知之人斷無搜求苛刻於爾之理其或有不應駁而駁者葢緣不諳外任過於慎重之故爾遽於此懐疑誤矣朕觀爾此奏亦不過因福敏即日回京恐其言爾之短預防之意耳朕謂可以不必如自信得及縱令福敏回京㕘奏不妨二字可保倘自信不及即使福敏回京舉薦將来必敗四字亦可預定爾其坦然勿慮但當以秉公潔已自勵在爾分中第一操守爲要果能無愧此二字可許爾平穩上進也勉之勉之雍正五年十月初三日湖北布政使臣黄焜謹奏爲薦舉屬員事竊臣䝉皇恩特授湖北布政使前於跪聆聖訓時䝉皇上不鄙愚陋諭臣留心屬員之賢否分别舉劾臣到任以来凡有不職之員已經督撫二臣陸續㕘奏今查得襄陽府知府尹㑹一雖到任未乆見其居官勤慎品行端方又荆州府屬之興山縣知縣王琪辦事勤敏才堪任使臣欽遵諭㫖據實奏聞以備皇上採擇臣受恩深重無可圖報今以薦舉屬員上瀆聖聰並不敢少有私心自蹈欺妄亦不敢稍爲洩漏借此市恩伏乞皇上睿鑒謹奏詢之邁柱斯二人未見有長處此奏殊爲可疑硃批諭㫖巻八十九
