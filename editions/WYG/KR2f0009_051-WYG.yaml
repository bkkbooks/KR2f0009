body:
  text: 欽定四庫全書硃批諭㫖巻五十一硃批法敏奏摺雍正元年五月十二日直隷廵道臣法敏謹奏為奏聞事竊臣至愚極陋才識短淺荷䝉皇上特恩由内閣侍讀補授禮科掌印給事中毫無寸效旋授直隷廵道屢次召見荷䝉天語褒嘉臣何人而遭逢知遇如此其隆也伏思畿輔要區幅􅊷遼濶刑名驛傳闗係匪輕臣膺兹重任益切悚惶惟有勉竭駑駘潔已率屬以仰答我皇上宵旰靡寧勵精圗治之至意謹将臣到任後以及辦送梓宫差竣囬署後行過事宜敬為我皇上陳之一各屬解審案件去嵗因聖祖仁皇帝升遐停止辦事隨接封印前任廵道宋師曽俱未審理以致案犯堆積臣甫經到任恭遇辦送回保候并屍親有情願免解者聽其自便今臣差竣回署後晝夜辦理積案已稍得清楚矣一直屬自軍興以來驛站馬匹率多勞疲臣通飭加謹餵養臕壮供應差使今已将廢弛驛務之定興縣知縣程揆揭報在案一訪聞直屬地方每有不法姦民在於村荘立壇設教聚衆斂錢煽惑愚民現在嚴禁查拏一直省風俗設有廟㑹商賈集場往來雜遝因而一驛站俱設有車輛聞各驛每遇供應差使不敷輙拏民車應用姦胥蠧役即借端漁利額外多拏任意勒索無論行客鄉民覊絆中途甚屬苦累今以上數條皆係臣到任後辦理之事謹繕摺備悉奏聞伏乞皇上睿鑒謹奏覽所奏朕甚嘉悦若更能加勉爾將來可大受朕委任之恩極宜自惜雍正元年八月初一日直𨽻廵道臣法敏謹奏為奏聞事臣訪有寳坻縣荘頭焦國璧弟兄六人恃富兇横殘忍不法除同廵撫李維鈞另摺㕘奏并現在密訪不法棍徒一有兇横害民􅃀據即同廵撫密㕘陸續拏問外查旗人命案向係報部部咨一到即飭地方官帶犯赴保㑹同理事㕔審轉葢因州縣官無刑訊旗人之例是以檄令㑹審原其初意乃專指謀故鬭毆殺等重案例應刑訊者而言至於自盡命案死係自取既無抵償之條又無應加刑訊之人若不分别輕重一例㑹審非特地方官往返需時貽誤公務抑且干連人犯長途解審拖累堪憐臣愚以為除謀故鬭毆殺等案仍照舊例令其㑹審外其一切自盡報部命案應令地方官取具􅃀供如情罪供證已明者免其解質止具詳由理事㕔核轉其有恃旗狡展者令摘緊要犯證解赴理事㕔自行審轉庶案犯得免覊候拖累之苦而地方官亦無往返誤公之虞矣臣曽經申詳廵撫轉請題達在案合先奏明伏乞皇上睿鑒俯允施行謹奏此奏甚是傳諭廵撫令其照此具本聲明爾轉詳縁由題奏雍正元年八月二十八日總督倉場戸部右侍郎臣法敏謹奏為奏明事竊臣等自通州起身沿河查催糧船於本月二十七日在馬房地方接讀科臣崔致逺等條奏内硃批諭㫖欽此欽遵臣前䝉皇上面諭漕運緊要并詢及今年可否不致凍阻又於本月二十日遣侍衛馳問雨澤水勢情形仰見我皇上睿慮周詳無時不以漕務為念該臣查得今嵗漕船因河水淺涸不能依限抵通較之往年已經遲滯兩月有餘又因節省脚價一案糧米三日未經進倉是以倉橋口袋堆至十萬有竒臣惟恐漕船凍阻有誤回空於諭㫖未到以前已令坐糧㕔将通州民剥船隻星飛押發楊村一帶地方起剥重載米石又移咨直隷撫臣令其速檄天津通永二道将天津迤南剥船速放過闗又嚴飭大通橋監督将堆貯米石勒限盡數入倉即發回口袋又親詣石土兩壩督令坐糧㕔嚴飭運役每日儘力起運今口袋巳經陸續發回又公同由水路查催糧船沿途遇有淺阻之處即令坐糧㕔人役多雇人夫挑挖深通使糧艘遄行又檄委東路捕盗同知自通州至河西務一帶地方通州右營守備自河西務至天津一帶地方專督挖淺庶運務不致遲緩又因今嵗糧船到遲若不多備口袋則時日有限恐装載不敷轉運遲悞查坐糧㕔向有臣等茶果銀兩并該㕔應得茶果銀兩内動用共置備口袋五萬條以供起卸以仰副我皇上慎重漕運恤軍愛民至意再硃批科臣崔致逺等條奏原摺合併奏繳謹奏覽奏深可嘉奨如此方為實心任事今嵗漕艘爾等若能加意料理俾不至阻凍朕自另有恩賚雍正二年七月十六日總督倉場戸部右侍郎臣法敏謹奏為仰體聖恩一例起剥以便軍民以速漕務事准查倉御史張坦麟移稱查漕船遇淺必須起剥向係旗丁雇覔而民船因此射利不無刁掯是以舊例坐糧㕔按道里逺近酌量定價截留一應民船令該丁照數給銀彼此不得爭執昨至三里屯地方見漕船起剥照數給銀而剥米船隻尚無樂從之意訪聞河西務地方剥米二百石之船徵税銀一兩二錢又有燒酒巷馬頭兩處飯錢加以抵通食用獲利無幾故民船常視剥米為畏途也查漕船運載漕糧一路闗津從無納税之例即向來衛河以内遇淺起剝原係額設之紅剥船至河西務亦無納税之事夫起剥原以速漕今以民剥而令納税中間自多濡滯是欲速漕而反致稽緩矣況各省漕米事屬一體今山東粟米起剥現在不納税銀而南省粳米梭米起剥獨令納税不無異同之處相應請㫖敕下直撫速行該管官嗣後漕白剥船隨到隨過一例放行不得收納税銀飯錢庶民船得邀微利而漕運亦得迅速矣等因前來臣伏思漕糧闗係天庾税務亦闗國課仰懇皇上敕下直隷撫臣詳加酌議或竟行免其納税或交於通永道在通收納庶無損於國課而糧運亦無覊遲之弊矣為此繕摺請㫖謹奏此一事爾等移咨直隷撫臣㑹同商酌妥議具奏雍正二年八月初八日總督倉場戸部右侍郎臣法敏謹奏為奏聞事本年八月初八日有僧人正修自稱王府替僧求見臣即令筆帖式問伊住址及來此何事據云僧名四和尚在百齡寺住持係阿哥替僧從五臺歸來有通州經紀張崑山素係相識特來求見請将張崑山放天字號經紀等語查天字號經紀係總理一年運務之役臣等以運務所闗不容狥私受賄於去年點放之時令滿漢坐糧㕔公擇經紀内身家殷實十餘人臣等當堂􅍐定以杜夤縁今僧人正修輙敢指名囑託殊駭聽聞理合密奏請㫖批示遵行謹奏王府豈有此等替僧一毫影響全無之事也殊屬大膽可惡之極即嚴拏夾訊審明定擬具奏此奏并朕此諭皆不必敘入本内雍正三年七月二十七日湖北廵撫臣法敏謹奏為奏聞事竊臣才庸智短荷皇上厚恩屢賜拔擢兢兢祗懼惟恐隕越有負職守今復䝉恩命廵撫湖北臣自到任以來彌切敬畏夙夜不敢自寧期有以仰副我皇上牖民成俗治益求治之至意每接見屬員敬将皇上諄諄訓飭期望内外臣工共相奮勉以襄至治之聖心反覆開諭凡在屬員咸感激鼓舞但其果能稱職與否臣到任未久未能周知尚容訪察奏聞至於各處隄工因去年修築髙厚今年江漢水勢雖大並無衝决再所屬城垣現在行查其餘一切利弊俱俟細訪確實陸續舉行所有臣到任後已行事宜謹臚列為我皇上陳之一楚省百姓向稱剽悍健訟者多每為極小事俱至督撫衙門越告臣出示嚴禁如果有寃枉及告貪官汚吏有贓證者方准呈訴一查徵收漕糧錮弊多端州縣家人串通蠧役勒索陋規百般刁難臣出示将諸弊條列通行嚴禁以甦民困一查湖北地方遼濶耳目難周恐州縣有那新掩舊以致虧空者臣嚴飭司道各府逐一盤查出具印結送臣查考仍細加察訪如有扶同狥隠者一併題㕘一查各屬所報自盡命案甚多皆因小忿細故輕生有司騐報批審經年累月不能完結拖累實甚臣飭各州縣於檢騐時當場備録口供如騐無别傷及訊無威逼因姦等情者律得免罪即行省釋報明在案倘有諱命揑飾查出究㕘一各屬俱差家人等在省探聽各上司舉動以圗打點彌縫名曰坐省最為可惡臣已出示嚴行驅逐矣一驛站夫馬臣自入境以來見沿途馬匹疲瘦已行驛道通飭嚴查各令餵養臕壯加意整飭矣一湖北各屬地丁錢糧火耗每兩加一皆民間自封投櫃臣恐有暗加多徵之弊即出示通行曉諭民間並嚴飭各屬無許陽奉隂違一湖北地方七月内正濕熱交蒸臣到任後監犯報病者不一而足因即轉飭各屬将輕罪人犯查明保候重罪人犯嚴禁獄卒等凌虐以廣皇仁一楚省各衙門鹽規已經革除廵撫向有荆闗羡餘以作養㢘經督臣楊宗仁署時将舊日添設税口行查裁革臣到任後除報部税口外将未經裁革之馬家嘴等二十九口亦俱裁革勒石永禁矣以上事宜皆臣到任後所已行者是否允協謹據實陳奏伏祈睿鑒謹奏知道了果能照此實力奉行何煩朕多為訓諭耶湖北盜案當嚴加察訪聞多有改强為竊及諱匿不報者亟宜留心毋忽雍正三年九月初六日湖北廵撫臣法敏謹奏為恭報秋成事竊照湖北地方目下晚禾收穫已遍今據布政使鄭任鑰彚報各屬收成俱有九分十分惟沔陽州及南漳縣係濵江之地因江漢水漲雖隨即消退其低窪之處收成止有六七分米價上米九錢中米八錢下米七錢編氓樂業地方寧謐湖南各屬因臣署理督據布政使朱綱彚報秋成亦俱有八分九分不等茅簷蔀屋之下無不歡欣鼓舞感頌聖恩共樂豐年臣身任地方犬馬私衷倍深歡忭謹具摺奏聞仰慰聖懐謹奏閲奏深慰朕懐但類此等奏務須據實直陳毋得絲毫粉飾切諭者遇斯上蒼垂佑豐收之年勸導百姓積蓄乃為第一要政當飭諭屬員勉力行之不可徒為具文耕三餘一耕九餘三慎莫視為迂濶之談也同日又奏為奏聞事竊臣曽将所請事宜具摺奏聞兹有臣近日續行事件謹臚列為我皇上陳之一湖北人文向來稱盛近沐皇上教養之恩士子益知奮勵誦習頗勤而或苦無指授未得師傳臣查武昌省城舊有江漢書院一所今擬延請品行學問堪為人師者俾之教授使各一普濟堂之設使老疾無依之人得有棲息最為善舉查雍正二年欽奉上諭令督撫轉飭有司勸募舉行臣檢閲部文即商之聞一湖北係通商之地各省商販貨物一到漢口等處必落牙行有等姦牙串通光棍誘騙商人貨物逺商一所在弁兵各有汛防之責約束宜嚴廵緝宜謹一武昌漢陽等處有慣作私媒哄賣民間子女者行各屬密訪查拏矣一湖北社倉一事曽經前任督撫通行各屬在案臣恐有司奉行不善或致擾民因轉行布政司通以上諸條係臣近日所行事宜謹據實奏聞伏乞睿鑒謹奏所奏俱悉同日又奏為奏聞事竊照新任督臣李成龍奉㫖著令速行赴任臣於九月初二日准到部文因念安徽入湖北境甚近遂於初三日委員送印巳經具擬於二十内扶櫬由水路起程臣謹奏聞謹奏朕已有旨著楊文乾在任守制矣但伊何到武昌如此迅速耶雍正三年九月二十一日湖北廵撫臣法敏謹奏為欽奉上諭事臣於本年九月初八日接到硃批奏摺臣跪讀之下仰見我皇上軫念地方弭盗安民之至意竊查湖北界連河南陜西四川江南江西湖南各省多係濵江負山之處匪類易於潛藏如八吉堡簰洲東江腦池野湖樊城等處皆向稱盗賊出没之所經臣訪知即通飭各屬實心廵察防禦在案今欽奉聖諭臣凜遵再行嚴飭水陸各處文武力行保甲上緊廵查遇有盗案即據實通報嚴緝務獲不得仍前瞻顧疎縱任意改諱臣仍留心查察一有改諱情弊即指名題㕘以懲不職以戢盗風謹奏爾等若不懲戒不職屬員朕自必懲戒不職督撫提鎮也地方文武大臣當和衷竭力勉為之慎毋藉諉隣省虚應故事保甲之法最善各省奉行率皆有名無實此一法若能實力行之即可以弭盗也嚴捕緝以靖盗賊尤宜嚴查窩家更為清盗源之良䇿也勉為之雍正三年十月十五日湖北廵撫臣法敏謹奏為恭謝天恩事臣齎摺家人恭捧皇上賞臣哈密瓜到楚臣隨恭迎至署望闕叩頭祗領訖伏念臣受恩至重屢䝉異數今復叨天恩賜以上方珍味臣不勝感激謹具摺奏謝為此謹奏覽爾奏謝知道了遇朕施恩切毋因此髙興放恣或遇朕訓責亦不必驚惶失措信朕之賞與罰總不如信已之是與非也凡百爾果克盡臣節朕自能全君道如此自省自求則君臣交孚倚信之情在其中矣内外諸臣咸能孤介自持秉公除私惟求合於天下後世公論行去何慮庶務不理耶勉之勉之将此諭亦與李成龍看雍正三年十月二十七日湖北廵撫臣法敏謹奏為恭謝天恩事竊臣至愚極陋荷䝉皇上厚恩畀以封疆重任毎次奏摺仰䝉皇上詳加批示臣跪讀之下如對天顔親聆訓誨知所遵循不勝感激近督臣李成龍奏摺欽奉硃批復令諭臣知悉臣叩頭捧讀仰見聖心諄切期望臣等勉勵向上之意至深且厚臣雖愚昧敢不銘諸肺腑竭盡微忱惟有敬奉訓㫖時刻提撕警覺以圖上報皇上訓勉盛心耳臣感戴天恩繕摺奏謝謹奏頃命布蘭泰廵撫湖南矣爾等三人可同心協力整理地方安輯兵民黽勉毋懈同日又奏為奏聞事竊照湖北地方今嵗收成俱極豐足惟沔陽一州向稱窪下本年九月内因江水陡發晚禾被淹經臣委員勘明成災分數具題在案所有災黎宜加賑䘏臣暨督臣與司道等官酌議現在公同辦買米石發往該州於四鄉適中之地分設棚厰煮粥施賑至明年正月底止務使窮簷老㓜皆得就近赴食不致流離失所以仰慰我皇上軫念民生惟恐一夫不獲之至意為此具摺奏聞謹奏此等事須當實力辦理勤為訪察萬不可被屬員下役之所欺蔽勉之雍正三年十二月二十八日湖北廵撫臣法敏謹奏為恭謝天恩事竊臣疊受聖恩毫無報稱方切感愧今又䝉天恩調補四川廵撫巖疆要地關係尤重臣材質愚鈍惟恐不能勝任有負聖恩不勝惶悚惟有誓竭駑駘勉圗報效以期仰答髙厚於萬一耳除恭疏具題外謹具摺奏謝再湖北地方本月十三日得雪尺許二十四五等日又得雪七八寸不等明年二麥豐收可必萬姓稱慶感頌皇恩合併奏聞謹奏湖北如此大雪實不易得朕懐深慰雍正四年三月十七日四川廵撫臣法敏謹奏竊臣於本年正月初四日自武昌府起程赴川到任沿途所過湖北荆州彞陵等處因去年臘月連得大雪二麥發生甚茂至川屬䕫州重慶成都等處因冬春雨雪及時麥甚暢茂凡臣所至之處見軍民人等俱各歡欣樂業葢從前川省每多加徵私派苦累民間我皇上軫念閭閻澄清吏治嚴行革除故軍民咸得受福無不感頌天恩再查川省米價鹽價俱賤居民易於度日土著之人大率淳良風俗儉樸但本省人甚少而外省附籍者居多未免多事健訟然亦不過田土戸婚偷竊等事至於命盜案件向來稀少也臣道途所見以及訪聞情形謹具摺奏聞謹奏知道了惟以無欺隠為務切記實力奉行為至要之言同日又奏為奏明事臣查川省地廣事繁土苖雜處臣性質愚鈍時恐隕越不勝凛懼惟有竭盡心力逐件詳加核實有應題者具題應奏者摺奏仰懇奏臣謹一併奏聞謹奏爾此任實所繫匪輕於内外無事時已屬緊要倘遇有事責任更重當日夜兢兢預為籌畫以防備意外方不負朕倚任之重也勉之勉之同日又奏為奏明事臣查川省土司番蠻苖夷非比内地人民馴良畏法兼且有漢姦播弄生事亦有沿邊弁員需索擾累致生事端者又有仇殺搶擄世相報復者若該管文武果能共矢清正無一毫茍得之念彼必心服知所畏懼臣現今通行嚴飭務期痛改積習以安邊境嗣後遇有伊等互為報復自相擄刦等事令各營衛為之宣諭排解若竊掠内地人畜等項檄令該頭目獻出犯人以憑審明照苖民例處斷如有侵犯内地干法犯紀等事臣一面㑹同提臣計議擒捕一面奏聞總期邊境安戢不致滋事以仰副我皇上綏靖苖疆之至意謹奏凡闗苖夷之事岳鍾琪深為練達必推誠㑹商共相斟酌而行若事在緊急又當一論觀程如絲於此等處似不甚洞徹周瑛頗覺熟諳然識見平常惟岳鍾琪穏當而得大體朕意凡屬番夷苖猓雜處省分若能使文武弁員清正自持絲毫不取小利於彼可保無一事也是乃探本尋源上䇿當竭力勉此雍正四年四月二十六日四川廵撫臣法敏謹奏臣查川省邊界番蠻土夷種𩔖不一其性皆非馴供應恣意需索以致夷民難堪往往因此滋事我皇上徳洋恩溥一視同仁所在員弁宜皆欽承實為邊方隠憂臣雖經移咨提鎮并嚴飭近邊管土各官務以安戢邊境為主不得一毫茍且以致皇上睿鑒施行謹奏治内地當先寛而劑之以嚴治邊夷宜先威而繼之以恩方克有濟朕非好大喜功偏於殘忍之主此數處番夷咸沐聖祖數十年寛仁厚徳自應傾心向化總縁地方官不實心任事苛求見小激出事端復隠匿養姦致令伊等恩不知感威不知畏所以大不法之案重見疊出今若照爾迂見而行爾能令所屬各員盡皆一塵不染乎倘再有不法事出将不肖員弁正法以謝罪於番夷乎抑别有料理之法乎爾試言之若漫然不料事之始終亦並無深謀逺慮止據目下一二人無稽之迂談奉為指歸信而不疑是豈封疆大臣之識見也今爾所見亦不可謂全無用處但尚非其時俟将此歴來不法之積習極力振作整頓一番使伊等凛然知法當遵知威可畏然後再行爾此奏嚴飭将弁屬員遵守弗違彼時可保地方百姓永逺享昇平之福也此固一勞永逸之䇿當另為熟籌目下似此姑容将就支吾搪塞之居心行事朕甚不取當悉聽岳鍾琪潘之善等主見而行爾既不達向來情形不得一毫固執已見朕閲爾此摺甚為心煩而増憂慮何也通盤主意全然不合機宜倘至臨期掣肘悞事朕命爾撫川朕之過亦難以解免矣為此特諭将此諭密與佛喜程如絲三人同看不可再令一人知之同日又奏臣查川省地方仰賴皇上福庇雨暘時若今當二麥漸次收割之時各屬約計俱有八九分收成所種菜花十分豐盛至於蠶桑處所因晴暖及時皆倍獲其利人民樂業俱各歡忭共慶昇平臣謹據實奏聞仰慰聖懐謹奏爾到任未幾若妄意以為自所感召而致者則謬矣同日又奏臣查四川學院向例新進各生每人呈送學臣贄見儀十兩十二兩不等約計通省學臣一任有三萬餘金相沿已久士子皆所樂從則學臣除養廉之外儘有贏餘而各州縣又每於學臣按臨考試之時派取民間供應責之里下胥役人等不免從中需索侵蝕輾轉滋弊甚屬累民臣不避嫌怨通飭各屬嚴行永禁至學臣任蘭枝校士公明聲名好各屬士民以為從前歴任所不及理合一併奏聞謹奏似此小事輙為不避嫌怨之語足見怯懦無能奈何奈何殊屬可笑之至若如此逢人逢事縮手縮脚畏首畏尾地方上一事豈能辦理耶同日又奏為查明覆奏仰祈睿鑒事竊照前撫臣王景灝覆奏川省坵形號數人丁戸口一摺欽奉硃批此内有條奏者朕發與王景灝議奏之事不知妥否爾再斟酌具奏欽此欽遵臣查川省自遭獻賊兵燹之後土曠人稀地方各官惟患民寡遂有報糧升合而占地數畝者界限遼濶田多荒蕪是以前後屢奉㫖招徠民人填實地方川省遂大半皆秦楚之民雜處因而欺隠侵奪爭告無已今若設立坵形號單給與執照誠可永杜爭端但全川田地惟近省數州縣為平疇沃壤其餘皆屬髙山峻嶺密箐深溝犬牙相錯荒熟相間今欲倣照江浙魚鱗册法分别本名田地繪圗造册編號非逐一履畝清丈不可而道路險仄一州縣之地非經年累月不得清晰是以前撫臣王景灝摺奏有非日月可計容臣折衷至當徐徐奏聞之語也臣荷䝉聖明垂詢敢不悉心籌畫惟是川省幅􅊷遼濶接近番蠻按形編號言之甚易而行之甚難查川省開墾之田從前部議准令百姓自行首報増糧如有不肖官員藉此擾累督撫即行題叅奉㫖依議欽遵在案近年以來據各州縣陸續首報賦税正在漸増之時臣現在嚴飭各屬諭令紳衿兵民將已墾熟田據實首報毋得隠漏其荒蕪之地務必實力勸民開墾毋使閒廢再川省控告呈詞為侵占田土者居多嗣後莫若因其控告即行查明有指證者令各州縣務必親行勘明清丈有隠匿之熟田仍押令遵示首明其霸占之荒田俱令退出另招開墾照例起科按畝承糧因遂給發清單開明坵形編定號數各付執照庶欺隠霸占之田漸清而國賦日増訟端自息民不驚擾矣至條奏内欲另行清查編定戸口人丁可以徵繁庶且易於行保甲其説甚善但臣入境以來沿途留心查看川民多散處於山陬江汜其流寓無業之民行踪不定故保甲之法向亦止存奉行之名臣今現在嚴飭各府州縣衛所於城市闗廂人煙湊集之處以及可以聯絡之村莊鄉鎮俱編設十家牌實力奉行保甲之法至於孤僻四散之處檄令所在弁兵勤加游廵不時稽查以期弭盜安民若照編定丁册以行保甲則人民散處勢難聯絡必仍有名無實徒成紙上空言伏惟者不敢不一一據實皇上洪恩專務休養生息寛民之力使其安居樂業共享太平之福庶不負皇上宵旰勤求治理之聖心也臣謹據實奏明是否允協伏祈睿鑒指示欽遵謹奏覽此奏與所條奏之處了不相渉朕原令爾徐徐斟酌妥當然後奏聞並未催廹爾如暫時未得確當主見即稍遲時日何妨今為此一派支吾搪塞之語含糊亂書一篇終歸之於頌聖革除派累而乃落是否允協四字祈朕指示殊屬可笑之極與佛喜程如絲再加詳議具奏雍正四年六月初四日四川廵撫臣法敏謹奏為奏聞事竊臣奉命移撫四川巖疆重任實切凛懼惟有仰體皇上察吏安民之至意正已率屬一念不敢自懈每接見屬員諄切誡勉諭以實心任事愛養百姓以仰遣等項向里下需索私派者定即究㕘一佐貳官定例不許擅受民詞而川省雜職微員每有違例受詞者甚或教官亦干預民事以至任一川屬地接各省並連土司有等網利姦徒糾合風可息矣也查拏務使刁風永絶一差役辦公原不可少乃有姦惡之徒一奉官票皇上睿鑒謹奏以上數條可謂是當之至但言之最可聽行之最為難頒約易禁止難道府州縣諸如此類詳覆爾之文書萬不可信其必能行所言也此七條内若能實力舉行一事爾之造福於川省無量矣地方遼濶焉得處處期其奉行必力自古有治人無治法爾等封疆大吏但以秉公察吏為主如爾今舉行此數事緩則弊在因循日久漸至懈弛急則患在騷擾茍免一時譴責能不受屬員之種種欺隠䝉蔽莫作容易看惟宜勉之慎之盡爾一已力量殫心竭慮督察訪詢或有益於萬一不然徒費唇舌虚張告示於地方何實濟之有須實力勉行徐徐權宜為之毋忽同日又奏竊查川省係極邊巖疆各處城垣闗係最為緊要臣到任後即通行各屬據實繪圗造報雖尚未據查覆而臣細加訪問完固之處十無一二沿邊各屬不但無以資捍禦且亦無以昭制度若欲槩行興築工費浩繁事非易舉而聽其因循殊非保衛邊方之計查各屬鹽茶税課銀兩除正額及繳送各衙門規禮外其中尚有羡餘近准部文各闗俱令儘收儘報但若全數報出作為定額恐鹽茶或因天時水旱出産難定一時接濟不及将來勢必貽害商民若不報出則又徒為官吏分肥莫若令兩司查明酌存各官養廉将所餘銀兩儘其多寡亦令解交藩庫俟蓄積一二年查川省城垣内擇其最緊要之處委令大員確估具摺奏明修築次第整理似亦鞏固邊圉之一䇿也是否可行伏祈皇上睿鑒指示欽遵謹奏此非應摺奏之事儘收儘報權在爾等督撫但有干係耳若如此密奏了結無憑察核則無干係矣烏乎可同日又奏為奏聞事竊臣於五月二十五日准到督臣岳鍾琪咨稱冕山營所屬賊蠻金格等狂悖因從前各案並未殱其兇首致無忌憚今乗其秋糧将熟宜行𠞰撫已行調土兵漢兵各一千五百名務在六月内齊赴冕山駐劄令該鎮趙儒統領并調化林副将張成隆協同料理脅以兵威再行化誨如仍抗違不遵聽該鎮㑹同臣一面奏聞一面進𠞰等因并咨臣将應需口糧照例備辦支給臣隨飛檄布政司㑹同建昌道星夜備辦輓運支給又准署提臣潘之善咨官兵預支俸餉以資出師前進臣行司查議官兵内地行走定例不支口糧若不稍為通融借支兵餉官兵勢必拮据應酌量預支接濟俟秋冬二季領餉時照數扣還再查土兵在口内行走一切口糧及犒賞之需從前俱於軍需羡餘銀内動支今次土兵調赴冕山計程甚逺伊等自備口糧裹帶有限自應支給口糧接濟其輓運支給之處容俟另疏奏明外至犒賞一項勢不可少臣於應得銀兩内動支備辦銀牌牛酒等項隨時犒賞并檄委建昌道率領各州縣分頭管理諸事皆已就緒俟官兵齊集後臨時相度機宜應𠞰應撫臣就近同提鎮二臣㑹商妥協再行奏聞務期邊方寧謐以仰慰聖懐所有臣現在辦理縁由合行陳明謹奏極宜加意鼓勵兵弁督率屬員竭力料理若少掣肘貽悞機宜罪歸於汝也同日又奏臣查川省從前辦理軍務及一切公事凡有費用難入正項銷算者俱在浮冒軍需及私派銀兩内動用於中扣尅中飽者居多今各項私派盡行禁革一應軍需俱從實開銷此外若有公務費用實無可動之項但川省崇山密箐番夷環繞出没不常其一切防禦事宜有不可不預為籌畫者若不稍為變通萬一事出意外必至掣肘貽悞非輕臣查川省收税各員及布按兩司俱有繳送廵撫衙門規禮共計五萬一千餘兩内除䕫闗銀兩題充正項并松茂道糧規題請折改歸併藩司該道無從交送外每年共計存銀三萬六千餘兩廵撫衙門控制全川一切差遣賞需等項原有不可已者非别省廵撫可比臣請賞留一萬二千兩以充一切費用餘銀二萬四千兩交與藩庫收貯留充本省公用仍令該司登簿季報以憑查考如此則地方公事不致有悞廵撫衙門一切事件皆仰叨聖恩易於辦理矣謹奏爾等督撫之貪廉不在於此惟務實行朕自能周知全不在章奏語言間也雍正四年六月二十日四川廵撫臣法敏謹奏竊臣於六月十八日接到欽奉硃批各奏摺臣跪讀之下如夢初覺自知謬誤不勝戰慄恐懼無地自容叨䝉天恩不即嚴加重罪猶賜訓誡臣不覺感激涕零惟有敬奉聖訓痛自刻責諸凡虚心商酌力求自新以期稍蓋前愆至冕山用兵事宜臣一准督臣岳鍾琪咨立即㑹同署提臣潘之善及布按二司等商酌辦理今漢土各兵皆已起程赴冕矣臣跪讀聖訓憂懼惶悚寢食俱廢謹繕摺具奏倘得聖心稍為寛慰則臣犬馬私情實為萬幸臣不勝感悔激切之至謹奏觀爾於一切奉㫖賞幫兵弁之處甚屬不及若於此等處施小作用冀朕信汝清廉則大悞矣此番軍需賞勞倘少渉慳吝不能鼓勵将士不能得土兵感悦之心朕不汝輕貸也雍正四年九月十七日四川廵撫臣法敏謹奏為㳟繳硃批奏摺事竊臣奉到硃批各奏摺荷䝉聖恩詳加指摘委曲開導訓誨諄諄臣跪讀之下儆惕感激惟有時刻勉勵竭盡心力以圗仰報髙深於萬一所有臣奏摺十一件皆欽奉硃批理合恭繳為此謹奏知道了已調爾廵撫陜西矣勉為之雍正四年十一月初二日四川廵撫臣法敏謹奏竊照浙江撫臣李衛奏明動銀十萬兩委員赴川買米臣准部咨隨即檄行布政司詳委能員於重慶䕫州二府候浙省委員一到協同辦理採買并出示嚴禁不許姦牙囤積髙擡價值令地方官互相稽查務使米價平允易於購買催令速運不致阻滯斷不敢以隔省岐視今浙省委員尚未據報到川俟購買完足之日再行奏聞為此謹奏甚好爾等同受倚任皆係為朕守封疆之臣須一例看視不分彼此方是同日又奏為奏明事竊查督臣岳鍾琪摺奏𠞰撫賊蠻金格等一案臣准咨之日即傳司道等㑹同面議所調漢土官兵師行糧從務期士馬飽騰國帑不致糜費必從長籌畫方克有濟隨據建昌道劉應鼎禀稱查打箭爐口外至拉里原設塘站捐駝馬匹自用兵以來歴年陸續倒斃各塘站不即買補所領草乾銀兩除餧養現存馬匹雇夫工價外每年俱有支剩銀兩從前俱入在餘銀内雜費惟有雍正二三兩年額領銀兩實支夫馬工料外支剩銀一萬七千二十五兩零此項銀兩前道未入餘銀之内今用兵之際莫若将此項銀兩為各官兵口糧軍需之費似屬以公濟公俟事竣題明等語復據按察使程如絲稟覆相同據此臣隨即分委各官備辦公支在案但今准提臣周瑛准建昌鎮臣趙儒咨稱賊蠻等逃入深箐號召黨羽猖獗益甚因復調漢土官兵二千二百名連前共官兵五千有餘臣思兵益加増糧亦加多自六月至今為日已久前項銀兩必不敷用且冕地山深箐密風寒水冷原與口外無異是以據司道詳請題明請㫖将前次給過口糧及今調官兵銀糧一併開銷正項其兩年塘站支剩銀兩請作軍前一切不便開銷之雜項使用俟擒獲賊蠻撤兵之日核實具奏如有剩銀仍存道庫除将口糧等項另疏題明外所有雍正二三兩年口外塘站支剩草乾銀兩作為軍前雜用是否允協伏候睿裁謹奏好知道了官兵口糧照出口例免其扣除已有㫖矣雍正四年十二月二十七日陜西廵撫臣法敏謹奏為奏明事竊臣自十二月初三日自成都起程初九日至昭化縣途遇督臣云今冬雨雪霑足可卜來年豐稔十六日行至漢中府鳳縣時值大雪積深六七寸隨於經過之鳳翔西安各州縣地方詳加訪問俱稱自十一月至十二月屢降大雪有積至尺餘者及臣到署又查延安府屬州縣報文亦於十一月内各得雪至八九寸是西安所屬四府得雪普遍四野霑足此皆我皇上宵旰勤勞實心愛民感召天和之所致也為此謹奏覽奏深慰朕懐雍正五年三月十二日陜西廵撫臣法敏謹奏為仰承聖訓恭謝天恩事雍正五年正月十二日接到雲貴督臣鄂爾泰來書内録皇上硃批臣跪讀之下不勝惶悚涕零竊臣至愚極陋䝉皇上天恩擢任封疆時虞蚊負幸荷聖明備加訓誨俾有遵循得免隕越今於督臣鄂爾泰奏摺内特降諭㫖曲賜開導勉勵造就不啻家人父子臣何人斯疊受聖主天髙地厚有加無已之洪恩如此至優極渥也惟有仰遵聖訓時時奮勵刻刻警惕一切闗係吏治民生之事務期殫心竭力克盡愚誠以圗仰報皇上生成教誨之隆恩於萬一耳謹将督臣鄂爾泰原書一併恭呈御覽謹奏朕向日從不留心人情世務今即位四五年以來頗閲歴人情見知過改悔者甚少誠所謂秉性難移下愚之流雖聖人亦末如之何也聖門最重改過不吝覺悟自非捨已從人為天下極難之事莫看作容易朕勸導内外臣工同心合徳君臣共相懋勉以仰答聖祖數十年教育深恩亦可謂竭盡心力矣能仰體朕心者自然悠久䝉福如必不聽從則必至於擯棄臨期噬臍何及若能慎守所長勤修所短琢磨成一全材報效國家利益生民豈不美歟倘甘心庸碌自居尸位素餐孜孜焉止為一已計恐今日之大臣中上蒼未必容此等居心人也勉之勉之同日又奏為奏聞事查得西安八旗滿兵及督撫兩標城守營緑旗兵丁本年連閏應支粟米共一十七萬一千五百五十七石零除将現在米石儘數支放外尚不敷米六萬九千六百五十八石零曽經題明照部定折價支給在案查現存之米止可支放至九月自十月至十二月俱支折價臣訪聞得往年兵丁支米之月将食用所餘之米即行糶賣無存遇折價之月齊赴糴買以致市價髙昂兵民皆有米貴之虞臣是以飭令署糧道詳加確議並商之将軍臣延信等自三月起至嵗底止将各兵應支銀米通融均搭每月銀米兼放則兵丁食米既無缺乏而市價亦得均平實與兵民大有裨益臣已檄行該署道查明分搭支放矣理合奏聞謹奏即實係如此情形亦當奏明再行不應一面分搭支放假若因本色不足巧為騰那則爾将來領罪不起此事曽與岳鍾琪商酌過否雍正五年閏三月初九日陜西廵撫臣法敏謹奏為甘霖普徧仰慰聖懐事竊照西安自去冬以及正二月雨雪霑足麥苖茂盛倍常惟三月間雨澤稀少輿情仰望甚殷今於閏三月初三四五等日甘霖疊沛據西安鳯翔二府屬及直隷同州華州并所屬各報得雨相同除延安漢中二府離省稍逺尚未報到初七日復降時雨今西安附近各州縣俱已十分霑足二麥豐收可必臣喜聞萬姓歡呼實為地方慶幸謹将得雨霑足情形繕摺奏聞恭慰聖懐謹奏覽雨澤情形深慰朕懐雍正五年閏三月二十一日陜西廵撫臣法敏謹奏為恭繳硃批奏摺事竊臣奉到硃批各奏摺内恭請聖安摺臣敬謹收藏至復荷聖慈諄諄教誨臣惟有銘心刻骨凛惕祗遵外其餘奏摺四件皆欽奉硃批理合恭繳為此謹奏將向來得力之舊習一切障礙業識豁然醒悟洗滌改革非易事也勉之同日又奏為首郡要缺仰懇聖恩速賜揀補事竊查西安一府地居省㑹旗民雜處所轄屬縣錢糧繁重且承審承查案件較之他郡倍多必得操守廉潔精明强幹之員方克勝任前任西安府知府潘宷鼎病故經臣題報在案現今乏員伏乞皇上於記名人員内㨂選一人速令赴任庶地方一切刑名錢榖咸資料理臣得收臂指之效矣為此謹奏新守勝任與否試騐後具摺奏聞雍正五年五月十一日陜西廵撫臣法敏謹奏為恭報二麥收成事竊照陜西目下二麥豌豆菜子俱已刈穫惟延安一府及直隷鄜州葭州綏徳州地氣寒冷收成稍遲尚未報到俟到日另行具奏外今據布政司彚報西安鳳翔二府收成俱有十分九分漢中府收成共八分九分直隷興安州商州同州華州乾州邠州耀州收成俱六分至十分不等地方豐稔民生樂業再二麥收穫已畢正在播種秋榖急需雨澤之時兹於四月二十七八九及五月初四五等日連降時雨四境普徧均各霑足合併奏聞謹奏朕以手加額欣慶覽之同日又奏為請㫖事竊查積貯實國家之大計民命之攸闗西安省屬現貯倉糧共計有七十二萬九千餘石可謂有備無患矣但虞其間或有州縣造報不實掩飾一時者除現在檄委道員等親赴各州縣徹底盤查據實出結詳報外惟是各屬所貯糧石有米麥豆榖色様不一究其所由或因年成歉薄聽從民便照現在成熟之糧色徵收者或因賠補虧空視地方出産之多暫時通變者亦有出借於民急欲完補不拘色様任民米麥豆通省合計約有十之六七倘一時糶賣糴榖必至榖價騰貴於民又有不便請於每年二三月間於存七糶三之時将米麥豆均勻搭糶至秋成後每米麥豆一石易榖二石貯倉則三年之内盡易為新榖庶緩急有備浥爛無虞矣是否可行伏乞皇上睿鑒批示以便繕本具題為此謹奏據奏稱米麥豆通省約有十之六七須詳查其數某州若干某縣若干初年清理幾何次年易補多少亦須登記若似此含糊具奏大有因循嵗月藉端諉延之意不過畏朕耳目照察預防差人盤查之巧計耳倉榖之清理與否目今直隷江西皆榜様也力行與不力行在爾等自為之總之直省槩須清理一遍但得人朕即差往若似法敏一類之人朕豈肯令膺此等任怨之差遣耶勉為之慎思之同日又奏為恭繳硃批奏摺事竊臣奉到硃批各奏摺内恭請硃批理合恭繳謹奏覽硃批諭㫖巻五十一
