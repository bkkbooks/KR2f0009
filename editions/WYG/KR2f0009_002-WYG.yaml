body:
  text: 欽定四庫全書硃批諭㫖卷二上硃批齊蘇勒奏摺雍正元年二月初六日署理河道總督山東按察使臣齊蘇勒謹奏為欽奉上諭事雍正元年二月初二日署山東按察使監察御史佟吉圖𫝊上諭秦家厰馬營口左近看一高阜之處建造淮黄龍王廟宇動用銀兩准在三萬上下此廟内凡有㑹入黄河河道之龍神俱安奉配享欽此欽遵臣㑹同䕶撫臣牟欽元詳加踏看於秦家厰之東馬營口之西得地一區高阜平敞堪以建廟現在遴委印河官員料估工料價值造冊到日臣等核實奏明擇吉興工外所有遵㫖相度地址情由合先具摺奏明謹奏照依所奏修建此工不必動用正項錢糧候朕頒發内帑前來雍正元年四月二十二日總督河道臣齊蘇勒謹奏為陳明微悃仰祈睿鑒事竊臣至愚極陋䝉皇上高厚之恩兩月之間超拔總河重任知遇之隆世所罕覯臣自揣愚拙深慮隕越惟有竭盡駑駘夙夜兢兢以圖報聖恩於萬一耳臣前於河南武陟起程查看黄運兩河工程甚屬殘廢更有應行預防之要地而河員置若罔聞必至十分危廹方行搶救其於防微杜漸之道全然不講殊不思少失機宜則一丈之險頓成百丈千金之費糜至萬金臣見此情形深恐貽誤隨即嚴加面飭一面飛發道庫錢糧及時搶修以防大汛一面確估核減陸續題報外再查兩岸年久舊工較之二十年前大相懸殊臣於康熙三十八年及四十二年跟隨聖祖仁皇帝閱視之際如清口御製大壩為全河咽喉并下中河一帶乃數百萬天儲經行要地當年長堤大壩何等堅固今則堤殘埽腐僅存舊蹟其餘各工殘缺斷落之處難以悉楚而各員所領銀兩核對所做工程每不抵半臣沿工逐一丈量指示虚冒情弊各員無詞掩飾惟哀懇情愿補足賠修臣再四思維河工廢弛己久若即執法深究則㕘不勝㕘不惟株連者衆而於錢糧工程兩皆無益謹仰體皇仁暫為勒限一月令其照數暗補賠修今一月之限一日姑容除另疏嚴㕘以儆不職外其餘各員現在彌補趕修臣不時廵察如有工程不實賠補不送帑項既多冐銷工程必致虧缺臣業經嚴行禁革至臣所轄河員多屬縉紳紈袴事冗人雜臣正在杜絶情面盤查釐剔之時不無取怨招尤唯賴皇上無微不照保恵矜全則有生効力之年皆洪恩再造之日矣謹奏知道了爾但秉公除私做去朕保爾安然無事若因倚信之後遂爾放膽負朕自有天鑒諒爾亦有所不忍也尤宜䖍誠感格神明為要特諭雍正元年六月初五日總督河道臣齊蘇勒謹奏為飛報時雨大霈河水充盈重艘得以遄行事竊照山東亢旱泉乾湖涸以致頻年漕運梗阻濟兖一帶民間乏食仰䝉我皇上大沛恩綸發粟賑濟又念運道淤淺恐饑民不堪重役特發帑金大興挑濬寓賑濟於興役之中臣等㑹同山東撫臣黄炳仰體皇仁多僱乏食貧民現給工價將運河一帶俱經挑挖深通又復疏濬泉湖開渠導引奈天旱已久上流泰山神祇䖍誠祈禱於本月初三日大雨如注連降二日河水漲滿濟寧糧艘向之淺滯河底者盡皆浮起遄行聞漕臣張大有已將江南重艘躬督入泇從此各幫穰穰而來銜尾北渡臣復檄沿河各官分布催趲無間晝夜務期兼程前進俟過濟之後順流而下更易為力計日可達天庾臣謹率山東布政使佟吉圖繕摺飛報上慰聖懐謹奏覽奏大慰朕懐大約漕運之事從此可望治矣今正當伏汛之候爾可急往料理南北二河要緊爾雖報効心切亦當照顧自已精力況爾年非少壯加意愛養身體庶可為朕多効數年之力天氣盛暑不必勉强過勞也賜爾香念珠紫金錠其所降諭㫖即令來人口傳朕躬大安爾不必為朕過慮但專心料理河務重任可也特諭雍正元年六月二十二日總督河道臣齊蘇勒謹奏為恭請聖安仰慰睿懐事臣於雍正元年六月十五日接到大行仁壽皇太后遺誥五内驚摧北望擗踊隨遵制供奉舉哀服孝將奉到日期另疏題報外欽惟我皇上性成純孝孺慕彌殷上年聖祖皇帝升遐臣親見皇上朝夕哭臨悲慟之情罔極雖釋服聽政每於先帝舊臣奏對所及即哀從衷來澘然淚下聖體不自知其過勞而天顔已日為之減悴兹復遇皇太后鸞馭上昇中懐又必慘切我皇上孝思不匱僾見愾聞原無有盡之時微臣何敢瀆請抑情但聖躬係天下萬國之主四海臣民所依賴伏願念丕承之重少節哀思以慰羣望天下幸甚臣民幸甚為此繕摺恭請聖安謹奏知道了朕實無可如何亦惟有勉强自節時以皇考付託之重為念耳同日又奏為恭謝天恩事竊臣齎摺家人回南捧到皇上批回摺子暨賞賜香念珠紫金錠臣於南旺舟次跪接叩頭謝恩祗領訖伏思臣以草芥微軀過䝉聖眷垂憐乃以加意愛養身體不必勉强過勞為諭臣何人斯膺兹天語捧讀之下不禁感激涕零但臣受恩深重雖肝腦塗地尚不能圖報於萬一何敢以身任河防茍為自安也惟遥祝我皇上聖體安和於億萬斯年下慰天下臣民之望以稍盡犬馬之忱耳為此繕摺恭謝天恩謹奏覽爾奏謝知道了爾所㕘佟吉圖余甸等四人朕已有㫖俱著革職拏問令爾同嵇曾筠察審定擬具奏矣雍正元年九月初二日總督河道臣齊蘇勒謹奏為欽奉上諭事竊臣前遵諭㫖將㑹看建造淮黄龍王廟地基並委員確估工料造册到日奏明擇吉興工縁由具摺奏聞奉有硃批諭㫖臣隨一面遴委賢員估計去後嗣據册估前來内開裝塑神像以及建造廟宇木植土石磚瓦石灰釘鐵顔料等項併匠工銀通共估用銀二萬聖心擇吉興工攸關盛典俟㫖為此謹奏所動用司庫錢糧於工程完畢後核實確數著該撫報明戸部以便朕將内庫錢糧照數發出交與户部令其將豫省應解部餉抵兌也特諭雍正二年三月初七日總督河道臣齊蘇勒謹奏為恭謝天恩事竊臣齎摺家人回南恭捧皇上恩賞御書福字一幅全羊一隻到臣臣隨即恭設香案望闕叩頭謝恩祗受訖欽惟我皇上宸翰輝煌敷布九天雨露御書璀璨昭回萬國文明臣何人斯恭逢曠典兼䝉恩錫上方異味跪接之下感激無地惟有益加儆惕竭盡駑駘務期一切河道寧謐遥祝我皇上萬年景福於無疆耳理合繕摺恭謝天恩謹奏知道了爾之聲名朕耳中頗有不足之言因念爾有㕘佟吉圖余甸之事此二人皆大有手眼結交最廣所以一切評論朕俱置之不聞不問但爾當自省有則改之無則加勉爾受朕如此信任若更負朕則天下人皆不可用矣朕不即加之罪上天亦必不爾容也倘係他人將無干渉之事誣爾斷不能揺惑朕之耳目假若實有慿據朕亦不為爾姑寛也至爾屬員借端生事爾或察訪不到或知而不舉又從而䕶庇之一如爾自為無異亟當甄别賢否嚴飭屬員為第一要著慎毋徒代他人受過將公清二字時刻置於懐抱間自必感召上蒼之佑庇河道平成之功朕可為爾力保也從來一切事功之成全頼天地神明黙相佑助此理昭然可信豈可徒恃一人之才力而望成效耶特諭同日又奏為恭報江口運河得水糧艘遄行無阻事竊照大江以南丹徒丹陽一帶運河前因江水未發潮汐不湧以致河流微細臣以運道關係緊要先差淮揚道等星飛前往㑹同該地方官築壩收束潮水去後臣續題明自清江浦起程親赴督催在案今勘得運河淺澁之處自三月初一日時雨大霈江潮湧漲之後江水自行灌入運河現在各幫重運遄行無阻陸續過江北上所有江口一帶運河得水漕艘遄行情形理合繕摺奏聞仰慰聖懐謹奏覽所奏大慰朕懐但爾任内之事惟河南一帶河身淤髙連年衝決乃朕所日夜憂心者其餘猶為次之爾若竭力能保豫省一兩年無事其功不小他處任爾如何効力究不過尋常事耳雍正二年閏四月十五日總督河道臣齊蘇勒謹奏為欽奉上諭事竊臣與副總河臣嵇曾筠㑹議預防伏汛事竣自碭山縣起程前赴東省適值新任廣西撫臣李紱由徐州赴任與臣接見傳述恭請聖訓之時䝉天語詢及淮揚運河淤墊年久水髙於城甚屬危險情形李紱奏稱若於運河之西另挑新河一道將挑河之土另築西堤而以舊河之身作為東堤則東面有兩道堤工庶幾永無潰決之患等語奉上諭所言似甚屬有理此去所經之地有與齊蘇勒相近之處務必親往與之面相商酌如果有益運道民生朕不惜費欽此欽遵轉傳到臣臣跪聆之下仰見我皇上宵旰憂勤無刻不以運道民生為念永期底定之至意伏查淮揚一帶運河綿長三百餘里由黄淮交㑹之區分流入運直達於江向因淮不敵黄濁流倒灌以致運河年久淤墊水髙於城而沿堤城社勢若居於釡底甚屬危險今議於運河之西改挑新河另築堤岸誠屬易危為安之見但運河西岸堤傍或有城郭民社碍隔挑河之處或有湖水相連難以築堤之所其間必須酌量躱避方為至妥再舊河之涵洞石堤可否改移新河之宣節關鍵應否添設事關重大未敢輕率定議容臣於秋穫之後遍歴詳勘細度地勢情形斟酌萬全再行陳奏恭候聖裁理合繕摺先行奏聞伏乞皇上睿鑒施行謹奏朕命李紱來傳諭㫖不過令爾得知有此一論細細再為斟酌並不謂其所奏必可行也大率河官惟希望興舉工程爾屬員多不可信況此事關係甚大豈可孟浪若徒勞無益而反有害不但虚耗錢糧抑且為千古笑柄倘果於國計民生有益亦不可畏難而中止總在爾詳悉籌畫妥確將始終利害通盤打算定時備細一一奏聞並非目下急務尤非輕舉妄動之事也雍正二年閏四月二十二日總督河道臣齊蘇勒謹奏為聖主恩逾再造微臣圖報靡涯瀝忱恭謝事竊臣一介微陋秉性愚昧荷䝉皇上天髙地厚之恩覆庇包容加以天語訓誨諄諄勉戒雖慈父之教子未及若是之周詳臣何人斯獲邀恩眷以至於此跪讀之下且感且泣自當鏤骨銘心刻刻敬凛字字遵守惟是臣冒昧無知干蹈罪戾實切悚惶兹接准部文荷䝉皇上寛恕不加重罪是臣一生愚拙全賴聖主矜憐惟有恪遵聖訓矢慎矢勤潔己率屬不辭勞瘁竭此犬馬餘年仰報皇恩於萬一耳理合繕摺恭謝天恩伏乞睿鑒謹奏所奏已悉人非聖賢孰能無過過而能改則無過矣爾等外任大臣但以不袒䕶屬員秉公甄别賢不肖懲惡奬善為第一要務大都偏於優柔不斷者往往皆受此累山東河工同知董廷柱者向乃趙世顯之用人家私巨富將河工錢糧冒銷至數十萬之多若止予以㕘革猶不足以蔽其辜可一面糾㕘一面搜察其宦資必使其囊橐一空庶幾警戒不法爾倘狥一毫情面或留地步或令其預聞防備日後被朕訪聞則明知故犯之咎難辭也爾差的當人或行文與陳世倌傳㫖查拏總在爾斟酌而行但須嚴密耳拏後即將其貪冒欵項一一審明具奏特諭同日又奏為奏聞事竊臣准吏部咨開吏户兵三部㑹議覆奏侍郎臣嵇曾筠前請增河員汛弁改設河兵一疏奉上諭嵇曾筠己授副總河職銜伊奏請添設河兵一事爾等所議毋庸添設但總河駐劄南河兼管運河與河南黄河相去甚逺猝有緊要工程實難兼顧或將河南黄河另著副總河管理若無標下官兵難供驅使總河標下河兵十營為數甚多或令齊蘇勒酌撥分給務期永逺可行爾等詳議具奏欽此部議令河臣相度宜安處所數目酌撥分給等因覆奏奉㫖依議欽此欽遵咨行到臣臣遵即飛檄江南各營酌撥河兵八百四十名連去嵗今春經臣撥留豫省協濟之兵一百六十名共足一千名并選撥千總把總各三員令其管轄尅期帶領前往聽候副總河隨工調用以防大汛其官兵俸餉即行開除應於就近河南藩庫内支給外至於撥去官兵作何安挿居址宜安處所數目等項臣遵即隨後前往㑹同副總河臣嵇曾筠河南撫臣石文焯細加勘議相度工程之險易酌派河兵之多寡量工安置斟酌妥確㑹疏具題理合繕摺覆奏伏乞皇上睿鑒施行謹奏知道了料理甚好但北河事務爾仍不得缷責朕原命嵇曾筠前來助爾若伊在工有益則己倘有掣肘不便或徒多事實無益處爾其奏聞即可撤回雍正二年七月二十九日總督河道臣齊蘇勒謹奏為飛報事竊臣據外河同知吕維炳報稱七月十九日卯時海風大作海潮泛漲陡髙一丈有餘黄河入海之口二水相激近海堤岸工程甚是危險卑職協同在工員弁嚴督兵目人夫上緊保䕶連夜修防至二十日已時水勢漸次消落堤埽未動等情呈報前來臣念近海工程所關甚鉅隨即星夜親往踏看幸海潮退速黄水遄行安東以下近海工程俱各平穩海口並無沙淤臣在工次又據鹽城縣報稱七月十九日卯刻海中颶風陡作鹹潮驟漲及二十日辰刻潮頭洶湧直撼城脚已時以後水勢始覺稍平除一面行查各里各場責令城内城外地保人等各擇寺廟安插被淹人民并親赴新興場等處一體安輯撈救俟各里各場報加意撫綏務令得所其鹽城一帶人民廬舍漂没之數現據該地方官查明申報應聽督臣撫臣具題外所有海水泛漲海口工程平穩情形合先具摺奏聞伏乞皇上睿鑒謹奏此番工程得保無虞皆卿勤勞忠誠有以感格上天神明䕶佑之所致據查弼納黄叔琳等奏報此次海嘯光景甚覺洶湧朕為沿海一帶工程正在懸念覽奏深慰亦代爾不勝慶幸也同日又奏為奏聞事竊臣於今夏前赴豫省安插河兵候過伏汛由徐州一帶查看江南黄河兩岸堤埽工程於本月初十日回署當經題明在案自臣回署之後料理江南黄運湖河修防秋汛事宜俱各完畢伏念豫省黄河連年俱有泛溢之處屢䝉上諭諄切備極周詳今嵗伏汛平穩河流己有循軌之勢但入秋以來隂雨連綿正當秋汛喫緊之候而河南加幫要工至今尚未報竣臣心時切惴惴今臣仍由邳徐一帶前赴河南交界地方以便居中策應上下兼顧就近催儹加幫堤工以防秋汛所有臣仍赴河南交界縁由理合具摺奏聞謹奏河南加幫要工至今尚未報竣是何情由著石文焯嵇曾筠明白回奏該部知道雍正二年九月初二日總督河道臣齊蘇勒謹奏為恭報秋汛工程平穩情形仰慰聖懐事竊臣由邳徐一帶前至河南交界看得黄河秋汛水勢雖大而大溜順暢多就中泓據河南管河道㕔呈報武陟以下勢皆平穩惟虞城南岸待賔寺之縷堤地處窪下於水漲之時漫坍堤頂幸賴背後舊有月堤一道圏住漫水未至成流當經該管印河各官隨即搶禦無虞臣親至其地􅂿看形勢又令於新壩之外幫築戧堤一層以保永固伏查江南今嵗秋汛清黄並漲臣前在清口目擊情形預行指示該管各官倘黄水再加異漲即將徐州之王家山毛城舖等處閘壩相機開放以洩其勢以保堤工各官遵照行之今據報各工埽壩竟得平穩再洪澤湖水勢亦甚浩瀚各工紛紛報險屢請照例開壩宣洩臣念湖水乃敵黄濟運之根本若因工程危險止救目前輕率開洩倘失敵黄濟運之資所關甚鉅於是決意不准開洩一面嚴飭加謹保守險工一面將蔣家閘天然等壩堅固堵閉不許涓滴外洩幸湖水雖大風浪不作堤壩寧謐兹據各工以工程平穩湖水存蓄情形陸續呈報前來除俟過霜降後照例繕疏題報外所有江南豫省秋汛平穩情形合先具摺奏聞以慰聖懐謹奏閱奏大慰朕懐爾此番甚屬可嘉題本到時朕另有恩㫖以奬爾之忠勤也雍正二年十月二十一日總督河道臣齊蘇勒謹奏為恭謝天恩事竊臣接准吏部咨開奉㫖齊蘇勒著給與世襲拜他喇布勒哈番仍行令齊蘇勒將河工實在効力行走勤勞顯著之員察明送部議叙該部知道欽此欽遵移咨到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣叨荷聖主隆恩不次超擢畀以全河重寄自惟謭劣懼難勝任恭惟我皇上宵衣旰食念切運道民生疊頒訓㫖俾臣有所遵循幸免隕越今嵗秋水雖大而黄淮順軌實皆我皇上愛民誠切感格天和之所致也至於河工修防上賴國帑下藉羣力臣不過往來督率分所當然並未著有異勞乃䝉聖主賞給世襲拜他喇布勒哈番恩及臣之子孫臣雖捐軀圖効何能報稱惟有盡此餘年勉竭駑駘并囑臣子臣孫世世効犬馬之力仰報皇恩於萬一耳除另疏奏謝并將實在勤勞顯著之員遵㫖察明送部議叙外理合繕摺恭謝天恩謹奏卿之勤勞固不待言而一塵不染獨立不倚從未聞在京夤縁結交以求輔助更屬可嘉勉為之慎毋少移此志倘有為難掣肘之處竟行密奏朕自秉公主持或有瑣屑不能奏聞隠情怡親王公忠為國人也可親近之朕保爾因不失其親也其他則徒有累而無益密之密之同日又奏為欽奉上諭事竊臣前因廣西廵撫臣李紱奏陳淮揚運河之西另挑新河一事欽奉諭㫖令李紱與臣商酌臣以事關重大未敢輕率定議容於秋穫之後詳勘再奏等因具摺奏聞奉到皇上硃批仰見我皇上洞悉河防慎重周詳之至意今臣因赴京口之便往來淮揚一帶細度河勢情形查看得自淮至揚運河綿長三百餘里上接洪澤下通江口由漢唐迄今歴年修防底定己久一切喫𦂳之處多屬石堤而閘壩涵洞共有七十餘座一則因時啓閉以濟漕運一則蓄洩得宜以灌民田此千百年來相仍而不易者也其河之西岸逼臨白馬寶應界首髙郵邵伯等湖上下相連水勢汪洋一望無際今若於河西另挑新河一道勢必改築西堤於湖水之中不但無處取土畚鍤難施而堤工亦無站立之基且揚州府城正臨西岸上下一帶百有餘里其間村莊稠密市鎮相望無可躱避更兼運河東岸之外髙寶興泰等十州縣之民田咸資灌溉倘河身一改則東岸之閘壩涵洞必皆廢棄而溝洫乾涸大妨民業其一應閘壩涵洞若再另行創建不惟糜費千百萬帑金而且大工終難告就於漕運民田均無裨益是李紱另挑新河之奏似可毋庸置議也所有勘過淮揚運河情形理合繕摺覆奏伏乞皇上睿鑒施行謹奏知道了凡百處但只據實直陳為是彼所論原不甚妥雍正二年十二月十三日總督河道臣齊蘇勒謹奏為恭謝天恩事雍正二年十一月二十三日臣齎摺家人回南恭捧到皇上恩賞奶餅果乾一匣臣於清口工次望闕叩頭謝恩祗領訖今又捧到皇上硃批密摺天語垂憐乃以臣一塵不染獨立不倚上邀聖慈令臣有為難掣肘之處竟行密奏臣跪讀之下不禁感激涕零竊思臣生逢聖世上有明主臣雖獨立亦復何憂惟有恪遵聖訓愈加操持一心出力仰報皇上天髙地厚之恩於萬一耳為此繕摺恭謝天恩伏乞睿鑒謹奏近日隆科多年羮堯大露作威福攬權勢光景朕若不防微杜漸此二臣將來必至不能保全爾等皆當踈逺之隆科多止論爾操守平常而年羮堯前嵗數奏爾不學無術必不能料理河務今嵗來京於陛見時言及黄河安瀾工己告成乃云大竒此皆皇上洪福云云朕以此知卿之獨立也惟有怡親王盛言爾之好處爾與王無交接朕知之最悉今既奉朕諭㫖不必疑慮可於奏摺之便時通音問親近之保於爾有益無損也況王公㢘忠誠為當代諸王大臣中第一人爾其知之救生臺筏之奏甚好摺留覽雍正三年正月二十四日總督河道臣齊蘇勒謹奏為恭請擇吉懸扁開光以昭永久事欽惟我皇上為民敬神特命於河南武陟地方建造龍王廟臣遵奉諭㫖庀材鳩工遴員儹造今工程俱己告成現在彩畫於三月初旬即可全完所有神像開光御書扁額懸掛日期事關鉅典仰祈皇上勅下欽天監選擇吉期頒行到臣容臣等敬謹遵行理合繕摺請㫖伏乞皇上睿鑒施行謹奏照欽天監看定日期舉行可也再者武陟一帶工程聞去冬備辦各料物俱已遲悞果然否此工關係非細爾等何忽畧如此耶雍正三年二月二十七日總督河道臣齊蘇勒謹奏為奏聞事臣前奏恭請擇吉懸扁一摺奉到皇上硃批臣跪讀之下不勝惶悚竊臣職司河防不能預為綢繆上厪聖懐疎忽之罪實所難逭隨即飛飭豫省各官上𦂳辦料加謹修防以禦桃汛去後續接副總河臣嵇曾筠來書云管河道不諳河務諸事掣肘如欽奉上諭事案内加幫詹家店堤工屢飭給發銀兩堅以無項可支頂詳現今停工再預備本年嵗修料物曾筠於上年十月即飭借動河銀照上年所估之數先發十之五六詎亦藐不遵依如此執拗將來三汛水發何恃以無恐運道民生所關甚大祈速為裁奪等因前來伏思保守河防必須上下和衷協力共濟方克有益今副總河臣嵇曾筠與管河道陳世倕甚不相睦一應河防事宜每多各執己見奏外現今所辦料物可足桃汛應用不致貽誤合先具摺奏聞以慰聖懐謹奏朕因此事大為憂心昨見嵇曾筠奏報桃汛已過河工平穩朕始放懐類斯等事當據實預奏不可容忍優柔前此何竟無一言因朕諭問始紛紛具奏甚負朕任用殊屬不及河之一事雖云在天然人事不盡於心何安要當盡人事以聽天可耳若少慢忽致有不虞朕為何等之君爾等為何等之臣耶朕實為爾等愧之再有如此等遲悞脫至僨事朕斷不輕貸也雍正三年四月初十日總督河道臣齊蘇勒謹奏為請㫖事雍正三年三月二十六日河南撫臣田文鏡傳奉諭㫖河神廟擬用銅碑此舉微有不當銅碑恐不能歴年久逺候齊蘇勒到豫爾等見面再為商量斟酌若可改石更好碑文朕尚未書欽此臣聞命之下仰見我皇上為民敬神無事不圖久逺之至意臣前因豫省諸山所産之石質既粗黑兼多白瑕難作碑料是以照依石碑式様鑄成銅碑一座今欽奉諭㫖令臣等再加商量或可改石當即遵㫖委員於隣省地方購覔青白碑料但臣等每見古刹銅鐘器皿等物雖歴年久逺而所刻隂陽字畫宛然不朽今此銅碑通身磨洗光明巍立皇亭之中頗壯觀瞻似無上銹朽減之虞謹將銅碑小様進呈御覽應否用石用銅之處臣等未敢擅便謹㑹同具摺懇請聖明指示遵行謹奏據奏業經造成何必又費一番更改銅質自堅於石料但恐爾過於珍重御書而為無益多費之意耳朕因無暇碑文尚未書就候稍閒寫成即頒發來豫也同日又奏為奏聞事竊臣先經奏明赴豫由徐州沿河一帶前至武陟廟工於三月二十七日敬為神像開光恭懸御書扁額併豫省士民感頌皇恩懽呼頂戴情形已經㑹疏恭謝外臣隨由武陟沿河查看秦家厰馬營等處堵過決口工程現在俱各淤成平陸甚屬平穩細看目今河勢較比往年日漸刷深兩岸河崖露出水面河神黙佑之所致也再兩岸各工應備物料臣恐發銀遲滯或至貽誤當經嚴催承辦各官令其上𦂳分頭採買拉運今查運到工所者巳有十分之七綽足伏汛之用其餘現在儹運不日即可全完其兩岸預防伏秋汛水事宜臣㑹同嵇曾筠沿工商酌備將捍禦做法面示印河各官逐一指交完畢臣今於四月初十日回赴江南料理黄運湖河一帶工程所有微臣回南日期理合一併奏聞謹奏覽奏深慰朕懐爾之殫心竭力處實非尋常可比朕心眷念於爾筆莫能喻當愛惜無益之力保養精神庶可為朕長逺効忠也同日又奏為奏明事竊照豫省祥符縣舊回回寨挑挖引河經副總河臣嵇曾筠摺奏奉硃批諭㫖令與臣商酌或應用挑水壩或應挑引河之處詳定而行欽此又准河南撫臣田文鏡咨稱准工部咨奉㫖嵇曾筠奏稱汛水長發以前及時挑挖引河方為有濟等語但此引河曾經挑挖完否並有無裨益之處現今齊蘇勒奏聞前往豫省著行文問齊蘇勒令其看明具奏若齊蘇勒事竣回任即著田文鏡看明具奏欽此欽遵轉咨到臣臣等看得挑挖引河必須上口正對頂衝而下口有建瓴之勢方可吸引大溜歸入新河借其水力滌刷寛深以成河道今查回回寨引河嵇曾筠已經興工挑挖將完但上口之地勢與現在之水向不甚相對臣等因往上首改挖三十餘丈以對頂衝以迎大溜然引河雖挖非挑水壩不能挑開大溜以入引河臣等欽遵諭㫖於對岸指示建築挑水壩一座挑溜順行以對引河之口俟水長之時相機開放俾大溜全歸新河庶河勢得以直暢東注而南岸老君堂等處之堤根可保無虞矣所有看明縁由理合具摺奏聞伏乞皇上睿鑒施行謹奏朕因慮嵇曾筠或料理不妥所以有前諭今覽此奏方是可謂得法矣雍正三年九月初十日總督河道臣齊蘇勒謹奏為奏聞事竊臣堵築豫省漫口事畢隨即回南查催黄運湖河工程由徐邳順流東下經駱馬湖出中河運口直抵安東海門􅂿勘各處埽壩工程自入秋以來經過大水汕刷蟄陷之處今已搶䕶修整俱皆完竣其洪澤湖水勢今嵗甚屬浩瀚七月間周橋一帶石工止出水面三尺臣將天然等壩盡行開放以洩其盈當時水已消減經臣題報在案續於八月中旬湖水又復加長止剰石岸一層臣因勢在緊急飛飭道㕔等各官將天然壩開寛一百六十餘丈冀其暢􅂥仰賴皇上洪福經月之久西風竟未一作浪靜波平自九月初一日水勢日漸消落工程幸獲平穩至睢寧縣漫口現在次第進埽所有對岸引河己經挑竣容臣相度機宜開放引河於漫口合龍之日另疏題報外恐厪宸衷合將現今水勢消落工程平穩情形具摺先行奏聞以慰聖懐謹奏工程平穩大慰朕懐漫口至今何尚未合龍耶所奏栽柳一摺現發九卿㑹議同日又奏為請立勸懲之法以節國帑以裕工料事竊惟國家需用錢糧多在兵河二項而治河物料全慿葦栁為先查歴年捲埽之葦俱係動帑購買每年所費不啻千百萬束至於柳枝一項産自官園伐以濟用例不動正項錢糧葢埽以柳為骨柳多則工堅而帑省若柳不敷用勢必以葦代之不惟工不堅固而且多費帑金是柳株之廣為栽種誠不容緩也伏查康熙十五年間曾經題明立有勸栽議敘之法然舉行不過三五年而止臣到任以來親見沿河兩岸柳株寥寥歴年雖有栽補之名每多春報栽植而秋報枯損終未見有成效雖近有條陳捐栽議敘之例至今未見有具呈捐栽之人臣再四思維若不亟為整理將來不惟工料大虧而糜費錢糧恐無底止臣於去嵗冬末傳集道㕔各官細加籌畫一面勒令各營弁兵於空間之地額定補栽柳秧一百萬株又勸㕔營大小文武官員自通判守備以上各出已資栽種柳秧五千株州同千總以下各出已資栽種柳秧一千株方為稱職如果於此額外有能廣行栽種為數甚多者自當照例題請議敘去後今據各官共報捐栽過柳秧三十萬一千餘株各營弁兵共報補栽過柳秧九十三萬二千餘株臣經委員查看並親歴閱視除枯損之外現在己經成活者共有八十九萬二千餘株再臣往來看工見山東江南蓄水沮洳之地甚多似可佈種蘆葦臣於今春諭令㕔員尋買葦根先種一二處試其物性土脈果否相宜現據徐屬同知等報稱微山湖邊淺水有泥之處佈種葦墩共計八頃七畝零現今蔓延長發青葱等語今栽柳種葦既已試有成效是勸懲之法不得不急為之計除今次道㕔等官捐栽之柳葦係各盡職分毋容置議外臣請於前後所定捐栽柳秧議敘之例多寡之中量為增減嗣後附近印河文武員弁於山東河南沿河空閒官地内果有各出已資捐栽柳秧成活八千株者紀録一次一萬六千株者紀録二次二萬四千株者紀録三次三萬二千株者加一級有能於各湖内種葦二頃者紀録一次四頃者紀録二次六頃者紀録三次八頃者加一級至効力各官有情願捐栽葦柳者亦照此例議敘再民人如有栽柳二萬株種葦四頃者仍照原定議敘之例給以頂帶榮身但目前正在工料匱乏亟宜整理之時若俟三年後酌量議敘恐人心退縮不前仰請仍照舊例於冬末春初令其廣為栽種於次年春末夏初查驗成活數目相符者造冊送部題明議敘以示鼓勵至於各處河營目兵補栽額柳向無議處之條今請每兵一名每年栽柳一百株務期培養成活若不能如數栽植者將專汛之千把總罰俸一年守備罰俸半年倘或栽補柳秧成活不及一半者專汛之千把總降職一級暫留原任戴罪栽補守備罰俸一年以彰懲戒如此三五年間處處柳株成林遍湖蘆葦叢生不惟工料充裕而且節省錢糧不啻倍蓰矣臣區區管見不知有當與否為此具摺奏請聖明指示伏乞皇上睿鑒施行謹奏九卿速議具奏同日又奏為恭謝天恩事竊臣進摺家人回南恭捧皇上恩賜凉帽一頂紫金錠一包平安丸一包臣即郊迎至署恭設香案望闕叩頭祗領又接閱臣弟三等侍衛邊塔哈家信知䝉聖恩陞授二等侍衛臣復望闕叩頭謝恩訖伏念臣猥以菲材謬膺重任時深隕越之懼頻叨賞賚之榮臣弟寸長未効又邀格外殊恩頂戴仁慈實難報稱惟有益矢冰蘗共竭駑駘以圖仰答髙深於萬一耳謹具摺恭謝天恩伏乞睿鑒謹奏知道了爾弟邊塔哈人材平常誠實而己較爾相去逺矣雍正三年十二月十五日總督河道臣齊蘇勒謹奏為微臣據實陳情仰祈聖明垂鑒事竊臣查總河衙門一切薪水之需向年俱係各㕔供應每年約有一萬三千餘兩臣經奏明禁止併將四季節禮槩行裁革在案再總河衙門原有號船七隻往來裝載每年可得水脚銀二千餘金今已朽爛多年無項修理至臣標四營舊有坐糧四十分每年共得銀一千一百餘兩臣到任將此項銀兩交與臣標中軍以為修造墩臺製換盔甲器械之用又歴年鹽商陋規銀二千兩臣莅任之初查臣標所轄官兵共四十營即將此銀為每年出操驗兵賞功犒勞等項之費惟是總河一官每年有查勘估計調度修防之責若不往來親歴難以懸定而伏秋兩汛又須駐劄三省適中之地方可上下䇿應凡隨廵員役以及書吏卷案例不可少而車馬舟楫日用米蔬之需逺行多至數百金近者亦非一二百金不能辦集此項公費從前竭力設措尚可勉强支持今春由徐赴豫實有拮据萬難之勢查河庫道衙門每年經收各省額解錢糧向有隨平餘銀四千兩從前俱係院道兩衙門公用今據兼管河庫道張其仁見臣往來盤費無出禀稱職道自雍正二年經收起除職道衙門日用以及各項工食雜費一年不過千金即可足用每年尚餘銀三千餘兩請將此項餘銀為看工僱覔船隻車輛等項之需等語但臣受恩深重平時絲毫不敢茍且今此項銀兩若不奏明何敢擅用倘䝉皇上天恩將前項隨平銀兩賞給微臣俾臣看工之盤費無缺隨廵之食用有資益得殫竭心力辦理河務獲申圖報愚誠皆出我皇上髙厚之賜也謹此冒昧瀆陳伏乞皇上睿鑒施行謹奏此項通融甚好應取用者知道了卿之清勤朕所深悉勉為之同日又奏為請㫖事竊照洪澤一湖乃全淮之水櫃藉以濟運敵黄為河防第一要區查攔湖石岸土堤綿長一百餘里昔年因恐湖水泛漲堤工不能容納與淮揚以下運道民生大有關係是以設有滚水石壩三座口門各寛五六十丈不等以備宣洩暴漲之水又查此滚水石壩以南舊有天然土壩二道各寛六十餘丈亦係洩水之口原因此地土脈甚堅雖遇大溜奔騰不能衝其硬底傷其土岸故以天然得名此係全湖關鍵必俟異漲之水石壩宣洩不及之時不得已而始行開放者也乃今嵗夏秋之間黄淮大漲周橋一帶攔湖石堤出水止剰一層工程甚是危險無如石壩之門檻太髙不能過水及至周橋一帶水勢幾與堤頂相平而石壩滚出之水不過五寸各工紛紛告急臣念勢廹事緊隨飭道㕔各官將天然土壩二道盡行挖開以資分洩詎意此壩雖開而異漲之水仍未甚減不得已又將天然二壩兩邊土岸挖寛一百六十餘丈以洩其盈當此之時湖水平岸倘或稍有風浪則全湖幾至不保幸賴皇上洪福經月之久西風從未一作湖水漸次消減工程得以平穩伏查滚水石壩三座乃宣洩之要工當此湖水大漲之年不能分洩尺許幾至誤事者皆因創建之時未審地勢之情形水面之髙下安砌門檻太髙之故也臣近見皇上頒發儀器測度地勢於河工髙下之宜甚有準則臣曾將此滚水石壩原立門檻太髙不能隨勢洩水縁由在欽差諸臣面前望闕跪請代奏仰懇聖主勅令諸臣於明春查閱海口膠河之便就近遶至湖堤將此石壩口門動用儀器測度地勢俾臣得以合其髙下之宜改落石壩門檻庶全湖之宣防有準水大聽其自洩水小聽其自蓄運道民生萬年永賴矣縁係防湖要務臣未敢擅便為此具摺請㫖伏乞皇上睿鑒施行謹奏所奏動用儀器測度地勢之說已諭何國宗等矣據靳治豫甚言滚水壩之無益盛稱減水壩之有功但朕實未洞徹河務關係甚大不便自立主意全賴爾悉心通盤打算酌量為之差靳治豫來非因其才具優長也不過因伊係靳輔之子或其議論可採少有幫助爾處亦未可定故遣伊前往較爾之屬員輩自必少好朕觀其人亦屬中材所論亦不過據其父當日而言未見有出竒識見也伊到時果與爾有益則留用倘多事掣肘密奏以聞至爾奏内既名為天然壩拆毁恐非所宜雖云出於不得已但恐暫獲目前之利而遺後日之害耳亟當為預防之計一河工險要之處宜先期備料以濟急時之用也凡河務同知通判承辦料物歴年於秋汛後在道庫領銀採辦轉瞬寒冬勢難搬運俱俟來年正二月間始往各處採買但物料産非一處蘆葦出在海套􅐨蔴出在河南樁木又在江寧其間搬運維艱一時難以畢集以臣愚見應於先一年開印後承領次年辦料銀兩令其分頭採買陸續運工仍着河營守備將到工料物一月一報定限霜降後運齊工所總河遴委賢員協同地方印官查核出結呈報倘察出狥隠均治以罪則料物緩急足恃而冒銷虧空之弊亦可除矣有人條奏此一事或與河務有益否觀其所論亦屬有理但恐不得其人錢糧似覺可虞爾其盡心籌畫酌妥具奏硃批諭㫖卷二上欽定四庫全書硃批諭㫖卷二下硃批齊蘇勒奏摺雍正四年二月初九日總督河道臣齊蘇勒謹奏為遵㫖詳議覆奏事雍正四年正月十一日恭接皇上發下條奏一摺奉有硃批諭㫖到臣該臣看得河工備料每年於霜降後按其工程之險易量其丈尺之多寡陸續酌發銀兩分頭採辦於來春二月中旬各料辦齊或總河親歴驗看或委員盤查必令足數堆貯工所以備修防之用若遇新報險工再行量給添買此成例也案查先年原任庫道馮佑等虧帑各案河員有領去帑銀而物料工程並無實據者甚多及至㕘出所虧已至數十萬兩歴經前任各河臣催追二十餘年多屬人亡産盡至今毫無完解臣細察其由無非指稱辦料名色將領去帑銀營私肥已兼以請銀之時轉詳之道員批發之總河各扣十分之一二以致領銀入手已耗十分之五六欲其辦料足數修工有據不可得矣及其事已敗露上司礙難㕘追不得不任其開銷互相掩飾遂使正項錢糧咸飽無饜貪壑臣到任之初目擊河政廢弛當即奏明將屬員内有辦料無實做工無據者屢經嚴㕘治罪勒限追賠近覺領帑之員稍知儆戒然臣每遇㕔官領銀辦料之時不敢放心或另差妥役押催採辦或另委别員眼同購買三年以來始覺前弊漸除畧有頭緒夫以㕔官領銀數月之間臣尚恐其花費不能防範今欲於前一年開印後給發錢糧令承辦次年之料則時日太寛難於稽察必才守兼優之員方可委任誠如聖明所照臣實難得其人若照條奏所云是非所以杜虧空之弊適足以開虧空之端斷然不可行也况邳州以上攙用秫稭宿遷以下採買海葦瓜洲一帶純用蘆柴上下相去俱各不過三百餘里與夫樁蔴等項多係水運自霜降以至清明五月之限綽可辦齊亦不至遲延干咎也所有不便隔年發帑辦料縁由臣謹遵㫖詳議覆奏伏乞皇上睿鑒謹奏所奏是當之至朕原甚不然其說但既有此論其中或不無些少禆益所以詢汝者此意耳今覽爾奏朕洞徹矣雍正四年五月二十四日總督河道臣齊蘇勒謹奏為恭謝天恩事臣於工次准工部咨開為黄水陡長致東岸壩臺大埽蟄䧟欽奉恩諭令臣酌量情形倘一時難以施工俟夏秋二汛過後再行修築等因轉咨到臣臣跪讀之下感淪肌髓不禁涕零伏查朱家口漫口於去冬合龍之後忽被冰凌剷擊以致復潰自今春以來臣念桃汛將臨勢難延緩晝夜修築幸過桃汛正在預備合龍物料之際不意水復大漲頓將壩臺埽個倐然䧟入水底絶無影響臣身任河防見此情形心神憂悒寢食靡寧再四躊躇思欲停工以待水消恐致蹉跎月日亟欲勉强進埽又慮徒費錢糧雖壩頭已經修起終非堵塞之時正在憂心如焚遲疑莫決間乃䝉聖主洞悉河防之緩急令臣酌量情形倘一時難以施工俟夏秋二汛過後再行修築仰見我皇上睿慮周詳無微不照使臣愚昧之衷豁然省悟臣凛遵聖諭細度情形此時惟加謹保固壩臺俟過伏秋二汛臣上緊督率併力儹修務使大工速竣仰慰聖懐至於河工通盤修理事宜俟兩廣督臣孔毓珣到工時㑹同細商妥議另疏具題外所有微臣感激頂戴之忱謹繕摺恭謝天恩謹奏知道了凡百惟只自盡其心敬慎為之以聽天亦不必憂悒焦思若致神志昏亂反與事無益也雍正四年十二月十七日總督河道臣齊蘇勒謹奏為微臣戀主情殷恭請陛見敬聆聖訓以慰下悃事竊臣䝉皇上隆恩畀以全河重任四年以來一應修防事宜仰䝉聖主多方訓示俾臣得有遵循俱已次第修築今朱家口堵閉合龍則黄河自豫省以至海口兩岸埽壩鞏立全河堤防俱己完整而洪澤一湖年來蓄水充盈藉以敵黄濟運刷深海口現在欽遵諭㫖又復加幫大堰益可以保永久此皆我皇上宵旰勤求無刻不以生民為念故於四載之間創成萬世利賴之功也伏思有預備料物早己發帑購辦值此閒隙正可趨赴京師懇乞皇上俯賜准臣陛見俾臣得以瞻覲天顔敬聆聖訓庶河防善後保守事宜臣更識所遵循而犬馬戀主之忱亦可藉以稍慰矣為此繕摺請㫖伏乞皇上睿鑒施行謹奏朕覽奏知卿抱病深為懸念皆卿不惜心力過勞之所致雖有善後保守事宜須應面奏但天氣寒冷以老病之軀往返奔馳朕心實為不忍可於孔毓珣過淮時向伊備悉述明來京奏朕伊回任時將朕諭㫖口傳與卿即係一般今己差醫院第一良醫前來調理卿疾料卿托上蒼垂佑必獲痊愈至河工事宜孔毓珣傳㫖或仍有不妥協處俟明嵗卿體全愈至冬間再行奏請陛見面為酌定可也特諭雍正五年正月二十八日總督河道臣齊蘇勒謹奏為遵㫖奏明事臣弟邊塔哈密傳上諭令臣酌估修建金龍四大王廟宇一事臣謹查江南黄河一帶所建龍王廟宇甚多或地處沮洳或廟貌狹小均不足以壯觀瞻惟宿遷縣西皂河之廟地勢髙阜四面寛敞廟貌軒昂且介於黄運兩河之間與朱家口相及建立牌坊葢造東西道院油飾彩畫裝修等項共約需銀九千餘兩庶幾廟貌輝煌堪垂永久再查金龍四大王姓謝名緒係浙江錢塘縣下墟里人為宋室戚畹盡節成神因其靈顯歴加封號其墓即在下墟之金龍山内子孫聚族其下世守勿替前有裔孫生員謝胡端以先神祠墓僻處山鄉歴年久逺在在傾頽呈請捐修前來當令估計共應需銀三千九百餘兩可以煥然完固向因衆力不齊費無所出是以尚未興舉臣思本籍祠墓乃靈爽之所憑依况河神翊戴聖朝屢多顯應似當將其本籍祠墓亦行修整以彰盛典臣未敢擅便理合一併查明密奏恭請皇上聖裁謹奏祠墓亦係應修者此二處工程仍照豫省新建廟例動用内帑修理不拘何項錢糧暫時那用後咨明户部在京抵銷可也同日又奏為恭謝天恩事臣接准部咨䝉皇上特賜臣以太子太傅崇銜臣聞命之下感愧交集伏思朱家口前因漫工水險堵塞甚難荷䝉皇上洞悉河防之緩急特㫖訓示令臣酌量情形俟過夏秋汛水相機進埽因而始得合龍况於隆冬之候天氣尚自和暖兵夫揮汗趨前大工易於告竣者皆由我皇上至誠愛民上感天心百靈効順之所致今以皇上之天功加臣以非分之榮臣實惶悚無地圖報彌難除另具疏叩頭奏謝外合再繕摺恭謝天恩謹奏朕為河清之瑞加恩卿等諸臣之諭已頒行矣若以感應之理而論卿尤為切近此乃上蒼神明之所賜何惶悚之有耶同日又奏為恭謝天恩事雍正五年正月初七日臣齎摺家人回南恭捧皇上硃批奏摺御賜福字暨荷包貂皮磁器哈密瓜氷魚鹿尾湯羊奶餅等件到工臣隨恭設香案望闕叩頭謝恩祗受訖伏讀臣前恭請陛見摺内欽奉硃批䝉皇上憐臣草芥病軀倍加軫恤温語諄諄不啻家人父子兼以錫賚多珍殊恩優渥臣跪讀拜受之下不禁感激涕零自念臣何人斯受恩若此雖粉身碎骨曷能報稱兹復䝉皇上特遣臣弟邊塔哈隨同醫官劉裕鐸齎帶恩賞人參等物於正月十七日來至清江臣弟口傳上諭矜恤備至臣謹叩頭謝恩敬延醫官開方調治自服藥之後稍覺心神漸定脾疾漸瘳欽揀良醫洵非凡手從此犬馬餘年皆出天恩再造臣感淪肌髓難措奏謝之詞惟有率臣家屬闔門頂頌敬祝聖主萬壽無疆皇圖永固而己為此具摺恭謝天恩謹奏覽卿奏摺聽邊塔哈口奏卿體光景并閱劉裕鐸奏帖深慰朕懐當加意自愛調攝飲食起居慎毋辜負朕意也雍正五年二月初九日總督河道臣齊蘇勒謹奏為欽奉上諭事竊臣接准部咨䝉皇上以江南水利事關重大特命臣等㑹同悉心􅂿勘詳加酌議倘齊蘇勒河工緊要不能親身前往即行文知㑹商酌定議具奏欽此仰見我皇上無刻不以河防為重之至意嗣副都統李淑徳來至清江口傳上諭念臣微軀有病命勿勉强前往臣跪聆之下感淪肌髓臣何人斯仰邀聖主垂憐一至於此伏查江浙地方素稱澤國萬姓粒食全賴水利我皇上念切東南赤子宏開經久之圖備旱防潦洵屬養民首務但其地勢之髙下水源之逺近臣非親歴其境目擊其形則一切蓄洩之宜消長之勢不敢懸定今江南預防桃汛事宜已完山東小挑工程已竣河南修防做法亦皆分行檄飭臣於此時正可放心前往的於三月十二日起程赴蘇㑹勘以跳之病己痊惟脾氣尚未全瘳復荷聖慈差醫官胡麟徴前來商酌調劑實屬恩同覆載臣雖粉身碎骨曷能報稱今臣與醫官劉裕行送劉裕鐸等回京則臣犬馬餘生皆出天恩再造也為此具摺恭謝天恩謹奏覽所奏并醫官奏帖朕深為慰悅當慎加節養以副朕意諸凡可以令人代勞之小事不必一一親歴必遵朕諭而行毋稍勉强雍正五年閏三月二十四日總督河道臣齊蘇勒謹奏為恭謝天恩事竊臣去年患心跳脾瀉之症日見精力衰憊自揣難望痊可乃䝉聖主惻然憐憫破格施仁特命醫官劉裕鐸齎帶恩賞人參等物南來診視俾臣心跳之症得以痊愈更䝉聖恩命醫官胡麟徴前來商酌調劑仰賴聖恩優渥更兼劉裕鐸胡麟徴和衷商酌細心調治臣之脾氣未瘳者今則霍然全愈精力日覺健旺是臣犬馬餘生皆出天恩之再造矣臣惟有率領闔家大小望闕叩頭朝夕焚香頂祝聖壽無疆而己今於本月二十四日臣謹差員恭送劉裕鐸先行進京以慰我皇上軫念微臣至意再醫官胡麟徴臣等公同商量暫留數日俟臣所服丸藥愈加見效即當另行恭送回京則草芥微軀更沐皇恩於無既矣為此具摺恭謝天恩謹奏覽卿奏謝暨劉裕鐸到京靣奏之言知卿已全愈朕如獲珍寶欣慰之心筆莫能喻病愈之後尤宜更加節養以仰承朕念胡麟徴令其在彼多留幾時候㫖再來可也雍正五年七月二十七日總督河道臣齊蘇勒謹奏為恭謝天恩事臣齎摺家人回南恭捧皇上硃批奏摺并恩賞凉㡌一頂到臣臣隨恭設香案望闕叩頭謝恩祗領訖竊臣久抱沉疴自揣難痊仰䝉聖主格外施仁特命醫官來南診視俾臣痼疾得以全瘳似此再造之洪恩臣實感淪肌髓粉身難報當送醫官劉裕鐸回京時臣曾具摺奏謝天恩復䝉聖主垂憐諄諄誡訓天語慈祥恩逾罔極跪讀之下不禁感激涕零又䝉賞臣凉㡌一頂炎暑之際仰荷如雲之庇臣何人斯受恩若此惟有盡此犬馬之餘年矢勤矢慎以圖報髙厚之恩於萬一耳臣再有請者前奉諭㫖胡麟徴令其在彼多留幾時候㫖再來欽此竊臣自服丸藥之後脾疾即已全愈入伏以來胡麟徴又復加意調劑臣之精力益覺健旺嗣後即可照方常服無煩時加診視所有醫官胡麟徴相應請㫖以便恭送回京伏乞皇上睿鑒施行謹奏覽卿奏謝知道了聞卿體全愈朕心之喜雖獲珍寶不足喻也另有㫖諭胡麟徴卿等酌量再定行止雍正五年九月初九日總督河道臣齊蘇勒謹奏為請㫖事竊查黄河入海之口向年設有葦蕩一營専管採割葦柴以佐工用嗣經裁革之後以致河工所需葦束盡皆費帑購買商販居竒料價騰貴臣於雍正四年二月内奏聞請復設採葦戰守目兵一千二百三十名採割葦柴以濟工用其舊制遊擊一員恐不足以資彈壓請改設㕘將以重其任等因具奏仰䝉皇上恩准欽點遵化城守營遊擊馬義補放葦蕩營㕘將於四年六月内到營任事該㕘將自到任以來小心趨事調度有方將雍正四年分所産葦柴盡數搜採除題定額交葦柴一百五十萬束之外又復多採中柴三十六萬餘束以交工用至海口通洋要地乃魚鹽出入之區更為緊要該㕘將於阨要處所往來查察邇來海口一帶匪類潛消地方無事是皆我皇上知人善任之所致也今馬義已經陞補浙江嚴州營副將臣理應靜候補放之員交代任事何敢瀆陳但葦營新設未久一應採割廵防事宜始有頭緒倘新舊一換未免事經生手另費一番措置仰懇皇上准將馬義以副將暫管葦蕩營㕘將事務再留一二年俟葦營諸務妥定之後再行調補庶新立營務得以整頓全妥而於海防河務兩有禆益矣謹先行具摺奏請聖訓以便繕疏具題伏乞睿鑒謹奏此奏甚是馬義原係上好之員尚未料其能如此實心効力已有㫖諭部著以陞銜留任矣令其在葦營料理數年朕將另用伊為總兵再者爾之操守及辦事勤慎練達俱無可議惟於糾察屬員頗為不及多有人論爾此一節如効力人員内有不妥者斷不可姑容久後必致被其連累當思小人輩之感恩誦徳不抵己身受害之重也如胡璉等其父聲名人所共知即胡璉亦屬姦邪小人此輩留之無益可惜清白一身何故甘為屬員牽連向後當猛醒改革慎之又慎務須將河工諸弊剔除淨盡方是勉之同日又奏為恭謝天恩事臣齎摺家人回南恭捧皇上硃批奏摺恩賞人參荔枝到臣臣隨恭設香案望闕叩頭謝恩祗領訖竊臣一介微軀寸長莫効前抱沉疴仰承聖主垂憐兩遣醫官再頒參餌俾痼疾得痊更生有慶又䝉温諭諄摯周詳臣跪讀之下不勝感激涕零即天地之生成父母之鞠育寧有過此臣雖捐糜頂踵實難圖報臣自夏秋以來幸賴胡麟徴加意藥餌調治有方臣之精神益覺健旺飲食亦復加增臣等商酌以後只須照方常服丸藥似可無煩再加診視惟當仰遵聖諭加謹節養保此犬馬餘生以圖上報髙厚所有醫官胡麟徴臣謹差員恭送回京以慰我皇上俯念微臣之至意臣率臣家屬焚頂望闕叩頭恭謝天恩謹奏胡麟徴回京奏卿全愈朕心喜慰實如獲珍寶覽卿奏謝知道了惟當慎重保養量力而動毋令過於辛勞敬之慎之雍正六年二月初八日總督河道臣齊蘇勒謹奏為恭謝天恩事竊臣猥以菲材叨膺重任仰賴聖明多方訓誨俾臣遇事知所遵循數年以來得免隕越犬馬戀主之情無時不縈寤寐幸䝉特沛恩綸允臣陛見伏覩聖情恱豫合六宇以同春面聆天語周詳統八荒於在宥乾綱獨運一本大公之心庶政咸宜悉協時中之道宵衣旰食刻不遑寧純孝至誠久而彌篤固宜上天眷佑景福駢臻萬國畏懐四方寧謐者也臣以草芥微軀仰荷生成大徳涓埃未効夙夜滋慙乃䝉俯鑒愚誠恩施格外顧問則榮逾三接賞賚則數及萬金寵錫便蕃慰勉交至此誠一時罕覯之殊恩亦屬千載難逢之曠典也不惟臣一身䝉被實感戴於無涯即至臣奕世子孫皆頂祝於靡既名言莫罄類髙厚之難酬銘刻不忘誓捐糜以圖報謹此繕摺恭謝天恩伏乞睿鑒謹奏覽卿奏謝知道了數年以來念卿年近遲暮又勤於國事不惜精力前嵗大病雖聞全愈朕心未免懸懸此番來京見卿精神色力實喜出望外朕懐深慰凡百不必過於任勞仍遵朕面諭之㫖節慎起居量力為之特諭同日又奏為欽奉上諭事竊河南雷家寺一帶堵截支河開挖引河一事臣欽遵聖諭於正月三十日前至河南雷家寺工次㑹同副總河臣嵇曾筠沿堤逐加詳勘看得黄河大溜於北岸雷家寺上首刷成支河三道沿堤走溜直至三家莊埽壩頂衝之處抵其大溜始歸正河我皇上明燭萬里於河圖之上硃批諭㫖此支河雖在在險工尚有敵三家莊頂衝之力此支河斷流則此三家莊埽工當著實留心欽此仰見我皇上洞悉河防恐致顧此失彼之虞深合以水敵水之道凡屬在工官弁敬聆訓諭莫不極口稱頌中心恱服臣等細加相度河勢情形今此引河一開支河一堵則三家莊頂衝之勢自必增重必須先於三家莊埽壩受衝之處添築迎水大壩一座以抵全黄直衝之力方為至當再查山東曹縣所屬芝蔴莊埽工地居三家莊之下游正對黄流之埽灣水勢甚屬猛悍應於舊埽上題動帑興工外其添築之迎水壩臣等現在指明壩基令各該員動銀備料尅期儹竣以資鞏固所有臣等公同細加詳勘情形擬合繕摺奏聞伏乞皇上睿鑒施行謹奏此叚河工朕未獲親履其地今向卿等論方畧可謂班門弄斧也覽奏朕實抱慚同日又奏為奏聞事伏查山東運河仰䝉皇上念切運道民生於雍正元年特頒諭㫖大興挑浚又令臣等疏浚泉源收蓄湖水作為水櫃以資接濟是以歴年糧艘遄行無阻此皆我皇上首以漕運為重預為籌畫之成效也今臣自京起程由山東運河一路踏勘各汛大挑工程内除臨清南旺濟寧彭口一帶泥沙易積之處現在挑浚即可清理外其餘河道因去嵗水勢充盈俱各深通如故臣沿河逐加探量計其水深無容挑挖之處約可節省幫貼夫食銀二萬餘兩當經插標立記以杜河員指深作淺冒銷之弊再查運河一帶昔年挑挖之泥沙不行逺送就近堆積於兩岸之上多有壁立如山者每遇雨水淋漓即便坍入河内以致河底仍復淤淺其南旺彭口噴沙之所雖以免坍缷入河之患方為萬全臣今細加相度將此沙堆壁立處所於臨河一面挨釘排樁鑲以板片中間填以實土作為縴道庶河崖不致坍缷積大有裨益又查運河兩岸堤工歴年久逺風雨剥蝕卑矮殘缺之處甚多從無修補之項臣前於陛見時己將此堤情形奏明但其中有逼近城社關繫水櫃要地者亟宜擇叚增修預為圖計案查定例山東運河每當大挑之年共幫貼夫食銀六萬餘兩經臣題明於嵗底查核倘有贏餘即存為下年之用在案除雍正三年分節省過幫貼銀兩已經題明動用修理禹王臺工程外所有前項應修排樁庶錢糧盡歸實用將見河深堤固一舉兩得於漕運大有裨益矣除飭兖寧道將應設排樁板工并應行修補堤岸之處據實確估工程細數另疏具題外所有臣􅂿勘過運河情形擬合先行具摺奏聞謹奏具題到日有㫖雍正六年四月初十日總督河道臣齊蘇勒謹奏為奏明事恭照浙江錢塘縣地方奉㫖修理金龍四大王祠墓前經臣奏明共估銀三千九百餘兩當即委員前往㑹同錢塘縣知縣購料興工在案今據報稱於上年十一月二十六日完工共用過工價料物銀三千九百九十九兩零等因造册呈送前來除將用過銀兩現在查核另行咨部抵銷外兹據淮徐道康宏勲詳稱職道前在睢寧工次於堵築漫口之際屢見神明顯佑若式若慿陡遇工險隨禱輙應彼時立願酬神無由圖報今江南浙江兩處俱荷皇恩勅建祠宇氣象輝煌永昭祀典職道情願自捐家資三千兩以一千五百兩交付江南宿遷縣以一千五百兩解交浙江錢塘縣各於廟工附近處所慿公置買田疇以備朝夕香火不時修葺之用庶草芥微忱可以稍盡等情到臣臣見該道酬神願切事屬可行己批飭該道將所捐銀兩分交江浙兩處令各該地方官收存置備所有錢塘縣地方廟工完竣日期理合繕摺奏聞伏乞皇上睿鑒施行謹奏廟宇工程出於朕之誠意毋容捐助置買田地以為香火之資康宏勲既有此願自屬可行雍正六年七月二十八日總督河道臣齊蘇勒謹奏為黄運兩河大工告成仰祈睿鑒事恭惟我皇上念切運道民生特命臣等遍將各工通盤修理臣欽遵諭㫖㑹同廣東督臣孔毓珣將兩河之古堤舊岸卑薄殘廢之處并昔人做法錯謬徒費無益之工勘明具題復荷聖恩以此項工程浩大恐臣難以親歴周到欽命工部侍郎臣靳治豫奉天府府丞臣黎致逺専司稽察之責俾臣得以併力廵視不致周章所有應行修理石土閘壩等工當即挽其錯謬救其頽廢截長補短次第修舉今於本年七月二十七日通行修理完竣計幫修過土堤共長十一萬七千餘丈修砌過磚石等堤共長一千三百餘丈修築過埽壩防風排樁等工共長一萬四千一百餘丈創築過月格等堤共長二萬八百餘丈疏濬過河道共長五千四百餘丈修砌過石閘六座石磡一座查黄河自碭山縣以下至海口運河自邳州以下至江口縱横綿亘三千餘里兩岸隄防增新補舊一例髙寛平整全河永慶安瀾矣臣等現在勘驗各處做過工程統俟勘明收工之日另行恭疏具題外謹將遵㫖通盤修理大工全竣日期先行繕摺奏聞伏乞皇上睿鑒謹奏欣慰慶幸覽之此皆卿忠誠任事䝉上天鑒佑所以毫無阻滯得成就此舉嘉恱之懐不可筆喻題到時另有㫖雍正六年九月初七日總督河道臣齊蘇勒謹奏為請㫖事雍正四年正月十一日臣奏請測量洪澤湖滚水壩門檻一摺奉有硃批諭㫖臣敬銘在心伏查工部侍郎靳治豫伊父莅任總河時原未隨帶來工所有河防事宜從未習諳今己年逾七旬耳聾眼昏往往言語顛倒屬員難以適從因伊前有條奏事件臣等未及㑹勘議覆是以未便遽行奏聞前臣於陛見時仰䝉天語下詢臣謹將靳治豫年邁及不諳河務緣由口奏當奉諭㫖俟靳治豫條奏之事㑹勘完畢之日爾即密摺奏聞再行調回欽此今查靳治豫條奏黄河添設減水壩及堤坡栽種茭草等欵經臣等同伊㑹勘不惟於河防毫無禆益且於堤工民社大有妨礙業已㑹疏題覆在案再照靳治豫家口甚衆専事奢侈恩賞養廉銀二千兩未及三月業巳全行支用誠恐所轄屬員甚多掩臣耳目漸有需索應付等弊大有未便錢糧重地似不宜於久駐者也謹遵㫖密摺奏聞仰懇皇上俯念河工重大地方濶逺另簡賢臣來工協理俾臣得贊勷有人不致鞭長莫及感戴聖恩於無既矣伏乞睿鑒謹奏覽奏朕自另有諭㫖至於工所現有二人令其隨卿學習何必又簡賢員前來協理耶同日又奏為大工告成期保永固事竊照黄運兩河年久殘廢之工仰䝉皇上不惜數十萬帑金特命通盤修理遍將兩岸隄防一舉全成但此項大工縱横綿亘數千餘里其保守之道尤不可不預為籌畫者也查從前堤頂之上愚民私葢房屋櫛比而居竟有民舍坐臨險工之上者不惟搶䕶之候有礙捲埽之地一時不能拆毁每至周章而且久住房内或鼠穴叢生或人畜踐踏其中不無孔隙穿漏之虞更為可慮臣於上年遵㫖通盤修理卑矮各工俱以增髙一丈為度而淮安府寶應縣之城門外其居民佔住之堤頂更屬卑窪若不急令拆房讓地取平加髙是因堤上之草房數楹而故留一大缺口矣彼時臣按照房數給以重價令其星速拆讓隨即書夜買土儹築一律加髙詎意工甫就而大水至所長之水較比舊日堤頂髙出四尺有餘此時遷移之衆方知從前居堤上者必無生理而臨湖居民見此利害漸有自行避險遷移者今沿河堤工凡係險要處所己經拆讓加幫惟是遥月等堤與運河縴道道里綿長鄉民佔住日久一旦盡令逺遷恐致失所臣之愚見嗣後堤頂民房如有遇傾圯之時一槩禁止重修令其移葢於堤傍髙隙之處逐漸遷移數年之内即可以除傷堤之患而河工搶䕶亦不致於礙手民社河防兩皆有禆矣再查佔住堤上房屋内有輸納房租者自徐邳以至江口每嵗徴銀不過百有餘兩其有益於國課者甚少而為害於河防者甚大此項錢糧應請聖恩豁免庶可以杜私佔之由而緊要官堤均得以永保鞏固矣為此具摺恭請聖訓伏乞睿鑒施行謹奏此事卿於去嵗已面奏過此奏朕忻恱覽之酌量有應具題處具本題來朕以便降㫖飭行同日又奏為覆奏事竊臣恭接到硃批諭㫖邳州一帶聞有蝗蝻生發地方官撲捕甚不下力今如何光景訪問確實奏聞欽此臣細訪得江南之邳州與山東之沂州兩境交界處所於本年六月内偶有蝻子生發兩州之民彼此各保其界不肯相助為力幸而蝻子初發易於撲滅不致有救之狀撲蝻一事亦皆如此當蝻子初發之際即時就地撲滅何至蔓延成災皆由地方官素不訓治不堪已極奈不得人而用亦無可如何之事請聖㫖勅部嚴定處分以戒地方官員之玩忽并懲小民風氣之澆薄庶防患於未然而官民咸知儆惕矣又訪宿遷睢寧二縣於六月二十前後亦間有蝻子生發之處當即撲滅亦未有傷田禾理合據實密摺覆奏伏乞睿鑒謹奏覽一運河挑淺舊係河官之事沿河州縣供億夫役而己今皆責之州縣官領帑挑濬夫河官原係家道殷實之人効力河工故另設大計以年嵗之久近職業之修廢定其黜陟以其各有攸司也今既責之州縣則河官將何所事乎且不特此也廵撫總河勘河查河又多帶河官以察州縣之能否所至地方奔走供億其費不貲一不當意則從而持其短長是前此河官之黜陟操之總河而今此州縣官之進退操之河官前此勘河查河之供億止一廵撫一總河而今此勘河查河之供億且數十廵撫總河矣又豈非山東州縣官虧空之一端乎伏懇皇上勅諭總河凡一切河工仍宜責之河官不得他諉則州縣官得以専其職守或親臨查勘或委官查勘勿得多帶官吏借端需索則供億不繁而州縣之虧空可杜一端矣有人條奏此一事爾宜大為留心若不令州縣官協力相助又恐河官呼應不靈有掣肘之虞今若據此奏而論在地方官實為難堪爾其再四嚴飭屬員慎毋仍前擾害地方倘被朕訪出連爾等上司必一併治罪亟當嚴加誡飭不可稍有踈懈雍正六年十二月初十日總督河道臣齊蘇勒謹奏為請除河工積弊以固運道事竊照東省河道定例一年一小挑間年一大挑所有額設淺溜泉壩等夫不敷應用遂派民夫協濟續經山東撫臣佛倫題明酌令民間按畝出錢幫貼僱夫以均徭役既不妨農業又不誤工程歴來稱為甚便無如奉行不善法久弊生地方官以少派多就中漁利管河官揑淺作深希圖分肥臣查大挑之年各州縣幫貼之銀約計六萬餘兩小挑約計四萬餘兩俱係地方官徴收僱夫給發工價案查此項幫貼銀錢年年均屬全收全用從無餘剰亦無不足夫歴年水勢豈無大小之分河底泥沙豈無多寡之異而皆處處一樣挑浚年年一樣銷算毫無分别明係地方官與管河官通同冒銷彼此分肥無惑乎向年運道淺阻以致如是也自雍正元年荷䝉皇上特頒諭㫖寓賑濟於興役之中大加挑浚之後河道賴以深通糧艘遄行無阻但東省河道噴沙無定易致淤淺其每年挑浚之工必不可少此項幫貼銀兩自雍正三年奉㫖令臣稽查之後臣於每年挑浚之時仍恐河官作弊俱令探量河底之深淺所積泥沙之多寡插標立記擇叚興修淺者務要深通深者無庸挑浚至雍正五年共節省過幫貼銀二萬七千二百餘兩今雍正六年小挑按工估算又節省銀二萬二千七百餘兩又有存剰黄河㕔屬雍正五六年分徭夫幫貼銀一萬一千四百餘兩以上通共節省過銀六萬一千三百餘兩現令貯庫以充正項錢糧之用臣恐此外又有别項瞞隱情弊復行一面密訪一面敬宣上諭令其自行出首去後今據運河同知及東昌上河下河張秋泇河各通判等首出每逢大挑小挑之年各州縣俱有餽送陋規銀兩又有每年餽送漕糧規儀河銀隨平等銀兩伊等有己經收過者亦有自行裁革者又有新任未經收過者查此各河員所受之陋規俱係出於地方官之餽遺而地方官斷非出自已囊自必藉公費之名加派民間理宜速行禁革臣又訪得臨清州知州除正項淺夫銀兩外每於大挑之年派徴銀三千六百餘兩小挑之年派徴銀二千四百餘兩及查該州歴年造報册内大挑止額收銀一千九百餘兩小挑止額收銀一千三百餘兩計算所剰之銀為數甚多明係該州多徴私用以此一州計之其餘額有幫貼之四十州縣其多派銀兩更不知又有凡幾也似此指工漁利魚肉鄉民更當嚴行禁革總之嗣後保守修防之道要在實力奉行方可以持永久一切事宜難容絲毫弊竇容臣查明之日一併具題請㫖永行禁革外所有管河官首出陋規地方官多派積弊縁由理合先行奏聞伏乞皇上睿鑒施行謹奏朕嘉悅覽之向來河官之積弊不止此一端其餘未協處總賴卿一一次第釐剔之耳同日又奏為請㫖事竊照山東單縣所屬諸望大堤乃係昔年決口之所其地當黄河北岸距運河不逺關係最為𦂳要本年十一月内河流驟然北移此堤正受頂衝數日之間嚙崖摧岸塌至堤根副河臣嵇曾筠移送繪圖商築挑水壩一座藉以挑溜開行餘俟來春修築等因并致書前來臣念此地素稱險要現在危如纍卵急宜搶救若僅建築挑水壩工餘俟來春修築誠恐河溜猛悍倘致潰崖所關甚鉅揆其措注殊失緩急之宜臣當將來圖逐一詳加註明一面差員備細面陳一面選派効力多員帶領熟諳樁埽目兵星飛前往搶下摟崖大埽以䕶其崖以抵其衝未幾嵇曾筠又囑僉都御史臣徐湛恩前來面商臣備將䕶堤摟崖做法一一指示星夜搶䕶今己抵住大溜堤工獲保平稳理合繕摺奏聞再查東豫兩省黄河一切險要工程年來俱保安瀾成功匪易保守之道尤不可不加謹籌畫以圖永固但臣看嵇曾筠雖勤慎有志而於修防事宜未甚敏練凡值工程危險之時往往推缷屬員且於估計錢糧每為河官朦蔽伏思河防關係重大要在協力共勷前䝉皇上睿謨深逺勅令僉都御史徐湛恩赴豫協理查徐湛恩在工年久熟悉修防臣之愚見凡屬東豫兩省黄河估修事宜以及一切工程錢糧大有禆益矣是否可行恭請聖裁謹奏覽雍正七年正月十七日總督河道臣齊蘇勒謹奏為奏聞事竊臣前嵗身患心跳脾瀉之症自揣難保乃䝉聖主再造之恩特命醫生來南診視又復屢賞參餌俾得更生以至今日似此隆恩優渥臣即舉家粉身碎骨曷能報稱不意上年九月内臣身偶患瘧疾氣脈日覺衰憊迨至十二月下旬病勢益復加增左肋作痛夜不能眠不數日間骨瘦如柴心神恍惚偃卧牀褥巳經二旬但臣之病軀尚屬細事而念及河防重務實難放心況一切修守機宜勢若風火必須隨時調度方免貽誤且目下重運經臨一應催趲事務更為𦂳要今臣身抱沉疴不能勉强支持再四躊蹰日夜難安欽惟我皇上恩待臣下矜恤備至特諭督撫等倘有一時患病難以辦事者不可勉强支持即著一面奏聞一面將印務酌量委人署理俾得安靜調攝則所患自然易於痊可欽此仰見聖主如天好生之深仁體恤臣工之至意臣謹遵奉諭㫖一面將印務飭委淮徐道康宏勲暫行䕶理一面飛咨署蘇州撫臣尹繼善星夜來工就近接印署理并可辦理廵撫事務容臣暫時調理倘於兩三月間病軀幸得稍愈則此後之餘生皆天恩之所賜也除另疏具奏外謹先繕摺奏聞伏乞皇上睿鑒謹奏覽奏知卿抱病亟宜加意調攝朕仍遣向日之醫官前來診視印務既有人署理靜養數時自必痊愈也硃批諭㫖巻二下
