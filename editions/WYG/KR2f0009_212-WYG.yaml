body:
  text: 欽定四庫全書硃批諭旨卷二百十二上硃批許容奏摺雍正三年五月初六日陜西糧鹽道仍帶監察御史臣許容謹奏為奏聞事竊臣一介庸材叨荷殊恩畀以糧鹽重任臣於本年四月二十七日抵任受事訖查臣衙門向例每年徵收屯糧米麥豌豆十萬餘石外官兵不敷糧料十三萬餘石草五百餘萬束例係西鳯兩府民賦内辦運省城交納道倉以供支放前任徵收糧石約計每石加耗一斗五升草每百束加耗二十束頭緒繁多弊端百出幸賴我皇上洞悉民艱將官兵不敷糧草照例在布政司衙門折銀給散不但百姓省辦運之苦即臣亦易於料理皇仁浩蕩官民均沾臣查現在徵收屯糧較往年民屯竝徵減去十分之七當此吏治澄清之時一切餽儀應行停止第倉内辦事書辦悉係用價僱覓管倉快役幷斗級人夫每日給發口糧一切心紅紙張筆墨幷家伙鋪墊等項俱用現價公買再八旗都統噶蘭大及章京等官每月到倉闗支糧草僃辦酒席各送食物以上共約需銀二千兩再臣署内幕賓親友束修家人夫役工食竝大小家口衣食薪水約需銀三千兩臣於現在徵收屯糧内每石酌留加耗七升五合每年約得餘糧七千五百餘石約值銀五千餘兩可足前項之需照前官每石減耗七升五合下舒民力上報君恩臣非矯廉邀譽有負體恤深仁為此據實直陳是否允協伏惟聖裁謹奏好勉為之朕原許爾可成一人物惟勿馳騖虛名懋勉實行方不有負期望廉隅固為官箴所首重然不可過於矯激即一切出納之際要須周詳酌計若槩行裁減至臨時束手無䇿則公務難以辦集矣雍正三年六月十五日署陜西按察司事糧鹽道仍帶監察御史臣許容謹奏為敬陳愚忱仰祈睿鑒事竊查川陜為西南要地且當數年軍興之後守土各官必得才守兼長實心辦理方能仰副宸衷查現在文官司道以下州縣以上武官副將以下遊守以上多係前督臣年羮堯就近題補未經引見臣仰荷知遇留心察訪其中不愧職守者絶少而品行不堪阿諛逢迎者實多如甘肅巡撫胡期恒已經奉旨革職發往河工河東運司金啓勲又奉特旨革職拏問富平縣知縣董霑渭南縣知縣朱嘉耀又經督臣特疏糾㕘痛快人心闔省感激他如蘭州布政司彭振翼四川川東道金徳蔚陜西延安府知府李繼泰河州知州許啓盛咸寧縣知縣朱烱三原縣知縣劉子正南鄭縣知縣嚴世傑均屬年羮堯心腹奉意承顔殘害官民再如陞任糧道張适始而違衆獨立繼而揮金迎合串通州縣勾合鋪戸將民屯糧草重價折收三年於兹獲利三四十萬金通國皆知難逃聖鑒仰祈皇上敕下督撫將未經引見文官㕔員以上武官㕘遊以上分班給咨赴部引見其州縣守僃以下就近嚴加考核奏請聖裁再查年羮堯㕘劾各官或情罪允當或事有可原或任意喜怒聽信讒言多非本於至公幷請敕部清查原案調赴引見則睿照之下自無遁情普天率土更頌皇仁於無疆矣縁係一得愚忱未便商之督撫不揣冒昧繕摺密奏伏惟聖鑒謹奏如是毫無瞻顧秉公據實入告深為可嘉凡此皆朕意正欲施行之事即日有旨頒降汝自得知也同日又奏為恭繳硃批諭旨事臣蒙皇上天恩調補陜省到任後因糧道一缺為積弊淵藪随時酌辦繕摺奏聞蒙恩批發温語勸勉跪誦之餘實切惶悚惟有益勵冰兢加意剔除少盡臣職於萬一耳所有原奉硃批諭旨理合繕摺恭繳伏惟睿鑒謹奏汝但勉盡厥職朕自有鑒照雍正四年正月十一日陜西西安按察司仍兼管督糧道事臣許容謹奏為恭謝天恩事竊臣於雍正四年正月初六日接到部文奉旨西安按察司員缺著督糧道許容補授仍兼管督糧道事欽此臣隨恭設香案望闕叩頭并將感謝下忱具詳督撫繕疏代題外伏念臣才既疎庸性復愚拙仰邀皇上特逹之知兩任監司復署臬篆今又奉特旨實授西安按察司兼管糧道君恩髙厚屢蒙不次優遷臣職靖共竊愧寸長未效惟有益勵冰兢勉圖報稱斷不敢一念涉私致干欺罔重譴至臣既蒙聖恩補授臬司臣署日用薪水應取給於臬司養㢘其糧道并現在暫署都司徴糧耗羨臣已詳明督撫酌留兩倉費用外餘俱存貯以充公項為此繕摺恭謝伏惟睿鑒謹奏覽奏知道了堅守初志毋少改移雍正四年四月十二日陜西西安按察司仍兼管督糧道事臣許容謹奏為恭繳硃批叩謝天恩事竊臣一介小臣荷蒙皇上恩賜摺奏自應小心敬謹庶幾仰答萬一今二月十五日齎摺家人自京回署捧到硃批諭旨跪誦之下知有影格一紙誤存摺内草率疎忽罪莫可逭蒙我皇上施恩格外批飭敎訓惶悚靡寧感激無地惟有時深愧悔刻自警惕圖報高厚殊恩耳所有硃批理合恭繳并陳下悃伏望聖鑒臣不勝戰兢惕勵之至謹奏語云事君盡禮孟子云欲為臣盡臣道聖賢立敎之意嚴矣近觀汝等漢人習氣於尊君親上之義甚屬藐忽優者僅知潔己而已劣者則更不堪過問汝初進後生切勿蹈襲此轍朱子為有宋大儒其學以主敬為進修之本一切不離乎敬況於君父之前乎汝設時存敬字於中安得有此一誤不能端本而惟末是務遇事戰兢亦復何益思之戒之同日又奏為請復倉舖以廣皇仁事竊臣接閲邸鈔見刑部尚書勵廷儀疏請刑部監内照直省州縣監倉之例將獄神堂東西分别内外以禁輕重人犯奉旨飭部議行仰見我皇上仁徳育物慈祥愛民不忍輕罪之人與重囚一例監禁天地父母之心誠為亘古所未有也臣查直省州縣向時原分設監舖自康熙四十五年副都御史周清原條奏將倉舖拆毁於是州縣止有監獄而無倉舖矣在周清原拆毁之請原令干連輕罪人犯取保候審第州縣官毎因闗係大案質訊之人取保在外恐有疎失致案情難定遂一并收禁獄中是本應散覊之人以無倉之故俱受縲絏之苦殊非仰體聖天子愛養元元至意臣請直省州縣仍復舊規將監内空閒房屋另行隔斷分作倉舖如監内無空房即於舊時倉舖基地量為修蓋將干連待質輕犯散覊在内俟案定之日即行釋放其案已審明笞杖人犯俱即取保不得濫行覊候庶監倉各别囹圄自漸空虛輕重有分干連不致濫禁於我皇上惠鮮之仁不無小補也臣職司刑名用敢謬陳管見推廣皇仁可否採擇伏候聖裁謹奏爾職司提刑此事正乃專責當與督撫臣商行何必奏請於朕又追變鹽銀一奏殊堪嘉與之至其事甚屬可訝亦復可笑馬喀忍如此負朕乎揆之於情於理竟不敢以爾奏為信然也摺留中俟馬樸到部時詳問端的再加訪查然後有旨雍正四年七月十六日陜西西安按察司兼管河東巡鹽御史臣許容謹奏為恭謝天恩竝陳下悃事竊臣一介下愚䝉我皇上不次擢用陞授陜西按察司今又欽奉寵命兼管河東巡鹽御史聖恩髙厚圖報愈難感激微忱於受事之始當即具疏奏謝外伏思河東鹽法當年羮堯更張之後一切事務未必合宜臣自當盡心辦理少報知遇隆恩容臣查明之後再為次第具奏至臣日用薪水臬司任内有養㢘銀五千兩可以敷用所有鹽臣養㢘銀兩當存運庫以充公項理合先為奏明伏惟睿鑒謹奏勉為之馬喀當日亦曾有此一奏若將應取者具奏充公以示㢘潔而復效馬喀分外設法巧取則不如公然留用之為愈也前車之轍可為後鑑莫負朕恩加勉誠慎為要同日又奏為恭繳硃批諭旨事竊臣於雍正四年四月十二日繕奏恭繳硃批諭旨一摺恭繳硃批叩謝天恩一摺請復倉舖一摺臣家人於五月二十三日捧齎回署俱䝉皇上硃批敎訓臣跪讀之下實深惶恐伏念臣中州下士毫無知識屢邀不次之寵榮皆賴聖明之特擢今復荷天語諄切朂以主敬誨以端本臣何人斯遭逢聖主得受殊恩惟有仰遵訓旨益勵忠誠凛天威於咫尺矢勿欺於始終以期仰報髙深於萬一耳所有原奉硃批諭旨理合繕摺恭繳伏惟聖鑒謹奏覽奏已悉百凡處切戒恃已凌人聖人云和而不流强哉矯北方之强君子不居大抵天下事過與不及其失等耳近日馬喀之奏朕深嘉汝公直范毓馪之舉朕殊怪汝苛刻何則葢馬喀溺職吏治攸闗范毓馪一介商賈何足重輕況伊乃奉旨委用者竝非馬喀私人汝大誤矣疎忽不審莫此為甚倘更執迷一誤再誤則朕不汝恕也雍正五年三月十三日浙江布政使臣許容謹奏為據實陳明仰祈睿鑒事竊臣至愚極拙毫無寸長仰䝉皇上天髙地厚之恩授以浙江布政使遵旨詣闕恭聆聖訓周詳鏤骨銘心矢竭駑駘之力以圖報稱於本年正月十九日到任受事兢兢奉職不敢少有懈怠臣查前任布政使佟吉圖在任兩年經手正項錢糧頭緒繁多現在逐一清理其已經報銷與現在庫貯數目大槩無甚差謬查有成造天津戰船建葢忠孝節義祠宇二項銀兩尚未銷算臣察訪各屬不無冒領分肥情弊另行繕摺僃細奏聞至公用項下查自雍正二年起至雍正四年止共收鹽規捐納外輸馬械耗羨銀二十五萬七千五百八十餘兩前任布政使傅澤淵任内動用過銀一千四百三十餘兩王朝恩任内動用過銀二千六百兩佟吉圖任内動用過銀一十八萬七千六百三十餘兩署司事董永芠任内動用過銀一萬一百七十餘兩俱係詳明督撫准銷有案其餘存庫銀五萬五千七百四十餘兩查無虧缺再佟吉圖離任時將伊任内盈餘銀二萬三千兩留庫詳明預僃交盤案内或有應補之處俟出結清楚將此項留充地方公用經署司董永芠因佟吉圖接授傅澤淵未完掛兌京餉銀一萬三千四百四十餘兩部文催解詳奉撫臣批示即於二萬三千兩内動補餘存銀九千五百五十餘兩造冊移交到臣俟查清交代有無歸補再行充公此司庫正雜錢糧交代之大畧也查鹽務陋規業奉裁革司庫捐納已經報滿餘存耗羨馬械二項為地方一切公事之用臣照舊收支不敢意為裁減又州縣解司錢糧每千随解餉費銀二兩為添補每月給散八旗餉銀折耗之需又兌收各屬錢糧每千約有平餘銀二兩三四錢各屬解司地丁若收至二百萬兩可收餉費銀四千兩平餘銀五千兩二共約銀九千兩計一年添補旗餉折耗銀不過一千一二百兩所有餉費餘剰并平餘銀將及八千兩儘足供臣衙門一切薪水各項之用再向日陋規凡支放水脚工程等項銀兩俱每千扣平三四兩不等臣一槩俱係庫平足發不敢扣剋分釐此外再無别項陋規臣受恩深重不敢自欺欺天伏惟聖明垂鑒謹奏浙江撫司俱屬清苦朕向所稔悉為此前經批諭撫臣李衞汝等其共相籌計務得酌中敷用之道切勿矯㢘立異違負朕意未有令汝等枵腹從事之理也同日又奏為奏聞南米事宜仰祈聖鑒事竊照浙省各屬徵收南米解省支放滿漢旗營及織造匠糧本色米一十三萬五千餘石州縣徵收在倉書役口食有費運交省倉沿途盤壩雇船有費及收貯省倉書役口食霉黴折耗旗員陋規種種皆出於耗米前撫臣朱軾核定每石止許收耗米九升以一升八合為自縣運省水脚以三升二合為省倉書役口食其餘四升為省倉折耗及旗員月規之費各縣因一升八合不敷運脚每多陽奉陰違而省倉層層需索亦復如故是以年來各屬耗米收至加三加四不等臣到任後訪查既確飭委杭州府知府孫國璽會同湖州府知府唐紹祖從長妥議前定每石九升委不敷用今議九升之外量加二升以六升為縣倉夫役口食及運省水脚以五升為省倉夫役口食及霉黴折耗將各衙門一切陋規盡行革除又解省南米均需本色惟台金二府及紹屬之諸暨縣路逺難以運解向係折收銀兩赴省買米交倉因時價低昻不一官役從中舞弊有折至一兩八九錢二兩一二錢甚至二兩四五錢不等買米之外所有羨餘上下烹分臣以本色既難運解與其暗折侵肥不如折中定議臣現商撫臣酌定價值立為成規令各州縣在省買米交倉如年豐米賤盈餘銀兩悉令解貯府庫留補米貴時買價之不足官民兩便庶可遵行再南米一項係本年徵收即供本年支放且各營本月之米悉係前月預支兼因夏秋停徵借動存漕供放冬徵南米還漕各屬徵還不足借支幾無定數總由州縣處分太輕且瞷有米借支任棼如亂絲臣現在逐一窮源溯流徹底清理而目前現支兵糧因今春雨水過多又兼積玩之後一時徵比勢難接濟臣不得已商同撫臣將現買補漕之米請撥四萬石以僃供支第查州縣經徵南米向係彚入地丁内奏報一例處分以米一石算銀一兩銀米合算分數竝非另行議處以致徵南還項之米自康熙五十七年起至雍正四年止共欠十萬餘石若不嚴定處分雖添撥僃放何益之有臣議嗣後經徵現年南米之官應照漕白糧例議處以前各年未完另定處分按完欠之多寡分别勸懲庶積欠可望全完而現年之米不致仍前拖欠矣以上事宜臣正在查議間又奉撫臣特飭清釐臣已逐款確議具奏覽同日又奏為奏聞事竊查浙省七十七州縣建造忠孝節義祠宇布政使佟吉圖任内發過四十一縣銀一萬一千九百三十五兩零署司事按察使董永芠任内發過十四縣銀三千八百八十三兩零此外尚有二十二州縣已經料估未曾給發臣到任時因各屬開銷太多留心察訪知此項工料上下胥吏串通浮冒扣分十之二三當即禀明撫臣并密諭各府確查查出嘉興海寧海鹽三縣俱有侵扣行臣一併究追臣俱發該府嚴查究審其餘領銀各縣竝行府確查凡有侵扣統行追出歸款印官如有染指即詳報撫臣好題㕘至未領銀二十二州縣復行令確估必須核實無浮方准給發報銷再成造天津大號趕􅙔船五隻小號趕􅙔船五隻随船舢板船十隻佟吉圖任内合算共用銀二萬四千九百七十九兩零於上年六月内完工送往天津用過工料銀兩至今尚未報銷臣查此項船隻赴閩成造逺送天津一切物料人工往返盤費自與本省拆造戰船不同但核算各費浮加幾至兩倍其中不無侵冒臣亦禀姦也再浙省七十七州縣地方遼濶事務殷繁耳目豈能周到臣現在具詳督撫嗣後州縣承辦工奏伏惟聖明睿鑒謹奏覽雍正五年六月十五日浙江觀風整俗使臣許容謹奏為恭謝天恩仰請聖訓事竊臣庸材鈍質毫無寸長仰䝉皇上天髙地厚之恩有加無已自任布政使以來涓埃未報寢食難安復荷聖恩授為觀風整俗使責任愈重報稱愈難臣驚聞新命感戴與悚惕交深伏念浙省風俗澆漓上厪宸衷特設耑員用資彈壓我皇上知人善任命王國棟巡視廉訪宣布聖主加惠兩浙之徳意遂使習染日見湔除浮囂漸歸醇厚然猶上煩睿慮恐革面未能革心特命微臣相繼為理臣自知才識短淺措施未能允當惟有仰懇聖恩鑒臣愚拙頒示訓旨俾臣凛遵奉行獲免隕越於以上副皇上委任之隆恩斯得少安於寤寐耳所有應行事宜容臣悉心體訪另行奏聞除接印任事日期照例恭疏題報外為此繕摺具奏伏祈睿鑒謹奏王國棟觀風兩浙可謂盡善汝宜事事循倣而行不貪不徇諒能企及虛已和衷恐有未逮假如膺此任者或與督撫掣肘或與提鎮不協則非特無益兵民翻嫌地方上多設一官矣凡通省文武諸臣倘遇有行止乖違意見參差祇可據實上奏毋得私地使氣立異作威汝暨王國棟竝經屢承訓誨極當勉力遵奉至若袒䕶科目聽受請託稍有干涉脱至敗露朕不以尋常事例處分也到閩尤須秉公為之特諭同日又奏為僃陳浙省民欠流抵之積弊以重錢糧以清交代事竊照倉庫錢糧各有款項那移墊應即干處分我皇上御極以來各省倉庫俱漸清理獨浙省尚有那墊流抵有名無實之懸項遞相授受輾轉接徵或經數任不能完結遡厥由來皆縁蠧胥猾吏朋比作姦吞糧侵賦始則廹官那移暫副經徵之考成迨經離任交盤遂有民欠之流抵而冊交欠户盡屬零星按之紙上則累百盈千追之民間則强半無著徒存流抵之名究無徵補之實不但姦胥猾吏愈得施其伎倆而不肖州縣於離任交代時雖本無那虧以有此陋弊可援必搜羅積年各項尾欠彚冊流交甚至花户之短封衙役之借支一併開入竟將徵存在庫錢糧侵扣入槖作為某項墊用造入交盤積習相沿何所底止臣查浙省從前有已經奏銷報完各屬那銀墊漕井未完舊欠虛懸有抵銀七萬兩臣布政司任内已詳明督撫通飭各屬現在確查除已完歸款外尚有未完某某項若干作何定議勒追以清懸項併請嗣後交代錢糧遵照定例凡有不係正解正支那移墊應之項悉以虧空報參即實有民欠可抵亦應於虧空案内審明著追倘該管知府逼勒交盤許接任官據實揭報參處庶陋弊可以永除懸項得以漸清於倉庫錢糧不無禆益業經撫臣批飭通行遵照在案事闗清理錢糧理合繕摺奏聞伏祈聖明睿鑒謹奏汝浙藩一任洵屬無忝今觀整通省凡以前經手事務接任者料理妥協與否皆所應知無謂不在其位而遂膜外視之一切俱當與撫臣時加稽考而糾正之也同日又奏為奏請聖裁事竊照雍正元年二年恩詔内給賞老人老婦布絹米石其中多有浮冒開銷仰䝉皇上聖明洞鑒於臣前任布政使奏摺内硃批令臣究查臣遵即細加察訪縁給散日久一時未得其底裏商之撫臣李衞正在通行飭查間接准部咨奉旨著各省督撫確查又經通行竝明白開𨗳速令自首在案應俟撫臣查明核題外臣查各省孤貧口糧一項原為矜恤鰥寡孤獨廢疾者而設是必實在無告窮民照額收養每月口糧印官躬親按名給散不容混冒庶足以敷布皇恩乃浙省各州縣竝不實力奉行所有額設錢糧孤貧不能全沾實惠其中詭弊多端莫可究詰如嘉興府屬之嘉秀二縣臣聞每季俱有尅扣府縣均分密諭新任知府閻堯熙確查據禀原係歴來舊弊不知始自何年近海防同知曹秉仁於去年十月署府事至今年正月離任止得過銀一百五十兩嘉興縣知縣劉徳寰於去年四月到任後得過銀一百五十兩秀水縣知縣呉之珽於去年九月到任後得過銀二十五兩俱現存在庫僃充公用未敢入已等語又處州府縉雲縣因有無徵荒糧即以拖欠荒糧之人頂充孤貧將孤貧口糧扣抵作收現任知縣戴世禄進京引見署官不肯接收交代現行該府確查追補尚未覆到臣思此等官員均應㕘處但查同知曹秉仁在浙多年居心雖不可問辦事頗有才情知縣戴世禄歴俸最深事亦練逹已經撫臣保舉海疆人才實不易得且均係從前陋弊銀既存庫充公未曾入已是以未經揭㕘第念發政施仁必先無告臣仰體皇上軫念窮民之至意已通飭各屬嚴查清釐務期照額收養實在無告窮民毋許缺額按月實給口糧毋許尅扣在案臣聞隣近之江省亦有此弊以𩔖而推大抵皆然臣請敕下直省督撫通行嚴查如有不肖州縣仍循舊轍漫不實力奉行即從重究叅以儆庸劣則天下之窮民而無告者咸得實被皇仁嬉遊化日矣是否有當伏惟睿鑒謹奏所奏孤貧一項不但外省為然即京師五城久有此弊朕於元年已曾降旨嚴飭次第經理自當漸及恐瑣屑弊端尚不止斯已耳雍正六年正月二十六日浙江觀風整俗使臣許容謹奏為恭繳御批事竊臣仰荷聖主殊恩畀以浙江觀風整俗重任自知才識短淺不克負荷聞命之下即具摺恭請訓旨嗣於閩省公寓接奉皇上批回奏摺臣望闕叩頭開讀敬領聖訓仰惟皇上知臣最深遇臣最厚反覆訓誨加意裁成臣敢不竭盡愚誠以圖報效凡地方事硃批奏摺固封呈繳伏祈睿鑒再臣自閩回浙路經所屬地方年嵗豐登百姓樂業人心咸知遷善風俗日漸還淳臣一路接見屬員及紳衿耆庶宣布皇恩復加丁寧誡勉無不踴躍歡呼感激惕厲理合一併奏聞上慰聖懷為此謹奏欣悦覽之雍正六年三月初二日浙江觀風整俗使臣許容謹奏為奏聞巡歴嘉湖情形事竊臣自閩回浙道經金衢嚴三府地方見年嵗豐登百姓樂業臣一路接見官紳士庶宣布聖恩復加誡勉莫不踴躍歡呼感激惕厲業經奏逹聖聰臣開印視事後復將我皇上加惠兩浙恩膏疊沛徧示通省竝飭各屬敬謹刋聖澤各安本業豪强多事之風蒸然丕變地方頗覺寧謐營伍亦漸整肅惟解省南糧積弊之後甫經釐剔各縣徵收猶未能遵照上年酌定每平米一石實完九斗之議實力奉行督臣屢經禁飭臣復留心察訪知嘉屬石門縣知縣呂廷鑄桐鄉縣知縣王輅生湖屬武康縣知縣彭開宗耗米收至加三以外嘉屬平湖縣知縣楊克慧嘉善縣知縣郜煜湖屬徳清縣知縣朱永齡耗米收至加二以外此等官員均應㕘處第念省倉收放向委杭府去年新奉部文改歸藩司半年之内正署三易又兼新司彭維新過於拘謹辦事遲滯解省之米有守候兩月不能交倉者米船停泊河干水氣潮潤不無將省倉收放委令候補知府喬世臣代辦以清弊端臣已於二月二十日回署正在束裝出巡杭府聞伏惟聖明睿鑒謹奏覽同日又奏為遵旨保舉事竊臣接到部文欽奉上諭令内外諸臣各舉所知一人以僃國家之用臣在應舉之列謹就所知以對查原任福建泉州府知府張無咎向為刑部司官臣在御史任於三法司會審事件屢經共事知其為人爽直辦事明白臣上年䝉皇上命往福建清查倉庫住閩省四月有餘該員於捏結倉穀案内已㕘離任而泉屬百姓愛戴情切訪之閩省官員僉云實有幹理之才臣不敢因其已經縁事瞻顧不舉理合繕摺保奏伏惟睿鑒謹奏張無咎朕深知其人頗為地方民人愛戴且楊文乾亦一力保薦但據汝等所審情罪而論實屬有干國憲再四思維無可恕之道所奏知道了雍正六年四月二十八日浙江觀風整俗使臣許容謹奏為奏聞事竊臣於督臣李衞查驗工程回省後即束裝巡視杭屬之餘杭臨安於潛昌化新城富陽等縣地俱山僻民風淳朴春花茂盛蠶桑亦好黃童白叟莫不感沐聖恩歡呼載道臣恭詣各學率領紳衿耆庶望闕叩頭行禮講讀聖諭廣訓復宣布皇仁提撕勸勉務期日新又新以臻一道同風之盛其或猶安舊習未肯悛改者當即懲治如餘杭縣文生夏樑盤踞倉厫慣寫詞狀臨安縣武生高鳴璁盛持責懲枷號間有一二不法吏胥亦即拏處至各縣印官如署餘杭令馬允尚原係調簡之員才力終覺不及其餘五縣尚未見有人地不相宜之處臣由昌化赴新城經過嚴州府屬之分水桐廬兩縣見分水令潘士錦由舉人部選到任未及一月察其言論舉動似覺不能勝任署桐廬令李𢎞汧由餘杭改調久病不愈難以臨民告知督臣聞風寒遂於三月二十八日回署服藥調理半月之姓樂業無異浙西三府紹興地方水土清秀人頗聰明㴠濡聖澤亦皆烝烝向化間有不守本分革面未能革心者臣訪察之下山陰縣則有革生王書倉會稽縣則有捐貢袁光坤監生范又新吏員單文鼎地棍賞日貴賞十四雖非巨惡大憝或出入衙門或包攬詞訟或武斷鄉曲或窩藏賭博臣俱查拏交知府顧濟美核其情事輕重再行分别懲創再各屬保甲臣仰遵嘉興府知府閻堯熙禀帖内稱臣三月十七日發行該府公文内另有訪單一紙因無印信硃標一面查拏一面將原單禀繳察核臣飛飭該府停止拏人即將原禀發錢塘縣嚴行根究查係織造府舊役龎桂芳包攬僧人勝峯詞訟同民人李仁甫黃爾惟李殿臣湯瑞卿僧人超凡講定銀二百四十兩勾通臣衙門皂隸鄔隆假冩訪拏梟僧壽先見薇及訟師金聚臣等訪單許給送文舖兵李斌銀十兩將臣發行釘封文書從下頭挑開裝入供吐鑿鑿臣思蠧棍害民法難輕縱況臣衙門職司糾查而鄔隆龎桂芳敢於假借作姦情更可惡臣商之督臣親提將鄔隆重責四十板枷號三箇月龎桂芳李斌各責三十五板枷號兩箇月餘犯分别枷責贓銀照追入官目今時值熱審枷犯例應暫釋第此案事雖未成姑從外結而原情擬罪實難寬宥龎桂芳於四月二十三日據錢塘縣報明病故鄔隆應仍枷示李斌亦未便即釋其餘各犯聞臣受恩深重圖報維艱惟有恪遵皇上諄諄教誨至意為此繕摺謹奏所奏嘉悦覽之但能一無欺隠保爾諸凡處自皆順吉也今命爾往閩察審禪濟布之案其中甚有曲折若非確秉至公而兼濟以精明無由得其實情到彼與朱綱悉心訊鞫不可稍涉瞻顧以及揣度迎合朕第欲得事之真耳别無他意將此諭亦令朱綱知之雍正七年三月十二日蘭州巡撫臣許容謹奏為奏聞事臣仰䝉皇上天恩補授甘肅巡撫遵旨進京恭請聖訓荷䝉皇上鑒臣迂拙命臣到西安將甘肅一切事宜向督臣岳鍾琪諮詢明白再行赴任臣遵旨於正月二十九日到西安詢據督臣岳鍾琪云目前事務首重軍需所有採買糧草馬驘等項係委布政司孔毓璞凉莊道殷邦翰驛傳道趙挺元公同料理官員有剋扣侵冒者已經糾㕘嚴處現在各聖懷督臣岳鍾琪又云寧夏新渠地方奉旨招民二萬户係交陜甘兩撫分辦到時即當料理臣抵蘭之日查問情形知附近寧夏人民仰䝉聖恩頒給籽種牛具蓋房銀兩俱各踴躍争先現據部臣佟智等咨稱正月以來報墾者已有六千户其餘接踵而至等語臣以時屆春耕新集之民亟須安插飭令布政司孔毓璞將撥解到山西銀七萬五千兩内委官押解七萬兩交寧夏道府及時料理俾得早沾實惠無悞耕作其餘應招之户陜甘兩省作何分辦現在酌議舉行督臣岳鍾琪又云河西各官辦差勞苦䝉皇上軫念令照陜省之例增給養㢘奉旨已經四月孔毓璞尚未議妥等語臣到蘭查詢總由耗羨不足之故查河西道府同知通判州縣衞所共三十九員照陜省應給養㢘銀四萬四千餘兩今照河西額徵銀糧耗羨除扣存社倉外其餘全數估算計銀一千餘兩糧四萬餘石再加每年税羨銀二萬餘兩約計可以敷用但查通省尚有萬不可少之公費每年需銀二萬餘兩向於通省耗羨内支給今河西耗羨儘給各官勢不得不取給於河東臣又查河東各官經前撫臣石文焯酌派養㢘原係因陋就簡多寡不均有千餘兩者亦有僅存二三百兩者現今河東各官仰見天恩浩蕩不無均沾之想臣就河東計算官員多於河西共需養㢘銀五萬二千餘兩照河東額徵銀糧耗羨除扣存社倉外其餘全數估算止有銀二萬九千餘兩糧二萬餘石再加河東税羨每年止有一千餘兩約計尚不敷銀一萬一二千兩而通省必不可少之公費更無出處臣令孔毓璞逐加細查收茶各官每年向有規禮銀五千餘兩管鹽通判每年向有規禮銀一千兩既議養㢘俱應歸公再各屬當商亦有地方官規禮均應查明確數統歸公用此外不敷容臣咨商督臣或者仰邀理等語臣入境後沿途接見各官并留心體訪道府以下才堪辦事者不過數員其餘或初任書生不諳吏治或才具平庸難稱厥職兼之疲玩怠惰相習成風誠如督臣所云臣仰遵聖訓自當反覆開導加意裁成茍有一節之長必不負皇上作養人才之意倘或教無可施斷難姑容亦不敢茍且因循致令貽誤地方惟是分到試用人員俱已委署不但缺出無可遴選即現在各屬軍需委查協辦亦無員差遣合無仰籲到者十一員出缺未選者八員當此辦差之際微員亦屬緊要竝祈皇上敕部查照施行所有臣路過西安與督臣岳鍾琪商辦事件理合一併奏聞伏惟睿鑒謹奏覽同日又奏為奏聞事臣查甘省年嵗豐收人民樂業久在聖鑒臣到蘭後查問地方情形雖正在預僃軍需無不踴躍趨事目今正當種麥之時各屬得過雪雨分寸深淺不一現在俱各播種三月内再得時雨即可預期豐稔臣恐上厪聖懷理合奏聞謹奏覽奏甘省農民現在播種情形知道了但能懋修職業有以感召天和自䝉休徵下應誠敬為之此心絲毫不可少肆同日又奏為甘省奏銷久違定限亟宜清查以杜弊端事臣查定例每年錢糧至次年五月奏銷直省遵行已久惟甘省自雍正三年至雍正六年均未奏銷在經徵督徵各官歴年總無處分自必催科日怠其中更有捏完為欠那新掩舊種種情弊皆由此起查從前奏銷歴任巡撫布政司俱以軍需為辭延渉何敢因循舊習漫無稽查一面嚴飭布政司孔毓璞將作何次第奏銷之處詳覆到日另疏題明勒限嚴催完結臣謹先行奏聞伏惟睿鑒謹奏錢糧實乃專責必奏銷改歸定限方得杜弊要領此奏甚屬可嘉同日又奏為奏明事臣查定例凡屬官被上司非理凌虐許其訐告原以通下情而存公道立法至當但必有凌虐實跡竝事有相闗勢有難已然後可以顯行詳揭今臣查甘省自上年六月至今屬官揭上司者四案其所揭事款雖未必盡屬虛誣亦有懐挾嫌怨摭拾風聞肆行訐告者臣思此等事件督撫不據揭題㕘即係朦蔽且於定例有違若遽行㕘奏一併解任則懐私挾詐之風從此漸長恐至挾制上官莫敢如何殊非我皇上蕩平正直整飭官方之意臣請嗣後凡有屬員詳揭上司者臣即繕摺先行奏聞一面遴委賢員秉公確查俟查審得實再行題㕘倘臣敢袒䕶上官以致微員寃抑不能上逹皇上明見萬里一有訪查臣甘加倍治罪理合預為奏明伏惟聖鑒謹奏屬官詳揭上司例應題㕘不應摺奏違例之舉未免滋生物議仍照舊為是倘至審虛時嚴加反坐則可或賢員偶被庸劣屬官詳揭一面題㕘一面具摺聲明亦可大抵用人一節要在秉心公正随事随人逐一留意甄别剖斷是非耳若云先定不偏不倚之成憲創設有利無弊之科條無是理也至化道於未事之前防禁於將然之際又在汝等膺統率之任者預有以随時調劑也蓋國家用人激濁揚清進賢退不肖此為最難御下苦衷朕惟自知仰荷上蒼照徹耳庸碌之流烏足以知之同日又奏為奏明事臣仰邀内分給臣衙門筆帖式十五分尚有糧三十分嵗支銀七百五十兩糧料四百五石臣初到蘭署一切用度未能知其詳細今約略計算每年齎摺進京往返路費竝臣衙門心紅紙張本摺箱匣及本標城守三營考驗犒賞幕賓束脩家人工食約需銀七千三四百兩尚餘銀五千餘兩并所有糧料為一切薪水日用之費臣遵循舊規辦理不敢妄議裁減理合奏明伏惟聖鑒謹奏覽奏知道了雍正七年四月十五日蘭州巡撫臣許容謹奏為奏聞事竊臣職任封疆首先察吏到任後因見甘省官員疲玩成習即經摺奏并請揀選人員命往以僃委用其有敗檢不法如隆徳縣知縣劉光碧玩愒不堪如安化縣知縣張克寬當即繕疏題㕘外其餘同知通判州縣等官尚未能周知賢否容臣細加訪查再當據實陳奏至司道府等官原屬地方大員責任更重謹就臣一時見聞所及另摺開列恭呈皇上睿鑒謹奏汝到任未久如許屬員何乃評品若是之速觀汝資質未具有知人卓識不可以所開列遂為準則其再加詳審據事考覈然後奏聞前於陛辭時保奏何廷圭王全臣帶往甘肅諒係相識有素然未免推許太過二人中如何廷圭者更為國法之所難容况伊等在甘年久恩怨滿懷若聽其蠱惑之言以為棄取徇其一偏之見以為興革恐將來貽害於汝之身家性命不淺也慎之同日又奏為請旨事竊查藩庫錢糧係臣專責臣到任後查甘省自雍正三年至雍正六年俱未奏銷地方官竝無考成催徵日怠其中或有侵那捏飾情弊一時亦難查核是以繕摺奏明一面嚴飭布政司勒限銷算今據布政使孔毓璞詳稱甘省每年額徵銀二十一萬二千餘兩向來估撥兵餉止在本省酌撥數萬兩其餘俱在外省協解自雍正三年至雍正六年奉部將本省額徵銀兩照數全充兵餉因民間輸納不能嵗内全完前司及本司俱有墊支之項除各年未完銀兩漸次報完外其雍正六年額徵銀二十一萬二千餘兩止徵完銀一十四萬四千餘兩尚有未完銀六萬八千餘兩民力實有不齊萬難追比全完已將朋合小建銀兩照數墊支呈請具題在於外省撥解補項以便造冊報銷并稱雍正七年兵餉竝未撥有本省額徵將來可免借墊等情前來臣查雍正六年額徵銀兩既經奉部撥充本年兵餉自應竭力催徵以副供支即或民力不齊嵗内不能全完亦當預將不敷之數約估詳請題逹仰籲聖恩今孔毓璞既不催徵於前復不詳明於後擅將存庫朋合等項銀六萬八千餘兩那墊供支已經半載及臣嚴催奏銷始為詳報則那移之咎自應照例題㕘但甘省地當邊塞每年額徵錢糧遲至嵗外尚未全完而兵餉例係按季闗支不得不為墊放孔毓璞那移情由原非虚飾理合據實奏明可否仰邀皇上天恩將孔毓璞那移銀兩勒限一年催徵補項倘逾限不完再行嚴㕘著追事闗通省大員臣未敢擅便謹先繕摺請旨伏祈睿鑒批示臣欽遵具題為此謹奏似此移東掩西非弊而何孔毓璞受朕格外恩擢豈可踵行陋習速令催徵補項倘至逾限不完嚴㕘重處將朕此諭亦令伊知之地方上果有不得已情故何妨據實摺奏及或咨部請示而乃擅自那墊供支以啓作弊之端嗣後切須永戒同日又奏為奏請睿裁事竊查民壯一役原為防䕶地方而設州縣各官自宜實力奉行不但工食不容侵冒操練亦須純熟方收實用臣到任後據署鞏昌府事候補知府徐洹瀛查出所屬十七州縣民壯處處缺額自雍正二年起至今止州縣各官共計侵冒工食銀三千九百餘兩詳揭到臣臣思一府如此通省可知現在行令布按兩司一併清查揭報第就鞏昌一府而論已有州縣官十餘員若再於别府查出則㕘劾必多甘省正在需員之際既不敢姑息容姦又未便槩行㕘奏臣再四躊躇可否仰邀聖恩准照侵扣老婦銀兩之例許其自首則事皆核實而自新有路均沐天恩於格外矣謹繕摺請旨伏祈皇上批示遵行謹奏此事既經奏聞汝不難措置矣將自首充補者免其㕘處仍然侵冒者糾劾示懲但須確查而已何庸再四躊躇耶同日又奏為奏聞事臣查固原地方拏獲妖言匪棍馬忠一案臣到蘭時已經督臣岳鍾琪提赴西安質審前經奏明嗣於秦州地方拏獲馬忠妻女經平凉府知府李桐訊供其所供各情由俱與馬忠前供互異其中虚實應聽岳鍾琪審明具奏又據寧夏鎮臣郭成功咨報於寧城清凉寺内拏獲匪𩔖馬三陳大哥赫大哥三名在行李内搜出紅紙硃筆標判寧夏都統封條二十張硃筆路票一張又續獲馬國昌一名臣閲其來文竟似馬忠案内匪黨嗣經寧朔縣知縣李鋐詳報所審各情節又竝未供有馬忠之事臣令按察使李世倬嚴審如有與馬忠一案干涉之處一併解交西安質審理合奏明伏祈皇上睿鑒謹奏所轄境内凡遇𩔖斯事件切勿涉於疎慢平時尤當留心訪察一有發覺即行推勘務究根株封疆大吏若能如是精明搜剔則匪𩔖無由施其伎倆地方上何至釀成患害耶惟此一節最為緊要勉力為之同日又奏為恭奏甘省雨水情形事竊查甘省雖風髙土厚半屬水田多資河渠其餘旱田得雨早者先為種麥得雨遲者即種秋禾縁夏秋不能兼種是以嵗僅一收臣飭令各屬將雨水情形不時具報今據陸續報到查凉州甘州西寧寧夏四府并肅州一㕔今春瑞雪均沾土膏滋潤且現在河水流通足資灌溉所種豆麥俱已滋長秋田在五月半前始為種完再得時雨即屬豐年又臨洮鞏昌平凉慶陽四府并直隸秦階二州内有所屬㕔州縣衞三十六處今春得過雪雨三四次至七八次不等豆麥現在發長惟蘭州金縣安定會寧四處雨澤缺少靖逺一處至今尚未得雨若四月内得雨則已種之麥可以發長并於秋禾無誤謹將各情形再為奏明伏祈皇上睿鑒謹奏汝等大吏涖政臨民有以感召天和方可冀雨暘時若禾麥豐登之慶也勉之雍正七年五月初六日蘭州巡撫臣許容謹奏為恭報時雨仰慰聖懐事竊查甘省風髙土厚向來雨澤艱難四月半後望雨更慇臣恭率在城文武紳衿耆庶幷通飭各屬齋戒沐浴䖍誠步禱先據西寧府并臨洮府屬之狄道等縣鞏昌府屬之隴西等縣直隸階秦等州先後報到除從前陸續得過雨澤外四月二十七八兩日又得時雨二三四寸不等今於五月初三日丑時起甘霖大沛直至初四日子時止臣遣騎四處查看所有望雨最急之蘭州金縣安定會寧靖逺等處各得雨三四寸五六寸至八九寸不等夏田立見茂盛秋禾俱可布種豐收有望四野歡呼其餘各屬去蘭較逺行查未到理合繕摺具奏伏祈皇上睿鑒謹奏此番雨澤未必止係步禱之力乃忠誠所感耳但能勉竭忠誠即勿事儀文亦必䝉昭格之應也同日又奏為奏請聖裁事竊查各省命往人員俱係一面委署一面具題試用一年限滿果能稱職再請實授惟甘省委署俱未題報且係随到随委不暇選擇以致人地多不相宜收得人實效臣才識魯鈍人員接見之始自難遽定賢否然察其言論觀其舉止亦可略得大槩欲將現在委署未經題報各員商同督臣暨司道等因才改委但一經更張必有去取現今甘省乏員且各有承辦軍需不得不暫緩時日應俟軍需稍定人員分到再行逐一甄别量才授缺併照各省之例統為題明嗣後試用人員仍請酌量人缺具題委署在臣等鄭重其事自當加意衡才而各員名登御覽亦必共相鼓勵矣是否有當伏候聖裁為此謹奏果能公勤察吏題報與否皆可假若少涉於私即題明委署豈遂免冒濫之弊乎以此為鄭重其事可謂舍本而逐末以此期共相鼓勵徒見有名而無實且此乃循例之舉無闗衡才藻鑑何必如是鋪張其詞耶朕非言不應題委也又莫錯會同日又奏為地方整理需人冒昧陳奏仰祈聖鑒事竊有崇信縣知縣王庭蘭庇盜庇窩貽害地方流毒鄰省臣查察得實當經特疏題㕘外伏查崇信一縣地處山僻所屬村堡姦􅉰聚居為盜為窩勾通該縣吏役固結隐庇牢不可破竟成盜賊淵藪必得强幹之員加意整刷方可杜絶根株安輯良善但現今委署乏人即將來新到之員尚須試看人缺果否相宜一時亦難遽信查有原任鎮番縣知縣杜振宜因與甘山道岳禮互訐經前撫臣莽鵠立題㕘革職臣奉命至陜即聞杜振宜為河西能員抵蘭之後細加訪察伊在鎮番并歴署武威張掖等縣俱有聲名頗見風力復查與岳禮互訐原係同日詳到前撫臣莽鵠立將杜振宜㕘革提審將岳禮留任質問其偏私之處久在皇上明鑒之中嗣經布政使孔毓璞承審此案所有岳禮原揭杜振宜荒蕪耤田不但竝未荒蕪且收穫糧石多於往年其短發馬夫工價查有空缺銀三十兩糧四十餘石係貼補西寧安塘馬夫事屬因公亦未侵蝕入已而岳禮短發豆價等項確有證據岳禮自知不能倖免乃以孔毓璞偏袒詳揭經署撫臣張廷棟改委按察使李世倬承審以致此案尚未題結又莽鵠立續㕘杜振宜虧空草十餘萬束銀二百餘兩當經凉州府查明原係實貯竝無虧空是杜振宜於此二案均無大過雖該員居心操守未能確有所見而才堪辦事實係衆口同聲若令整頓地方必有一番振作但係革職之員縁事未結不敢越例保題可否仰邀皇上特恩將杜振宜署理崇信縣知縣効力贖罪如果稽查得法盜息民安再行題請實授倘有敗檢越閑并致貽誤地方仍當據實嚴㕘加倍治罪臣為地方需人起見不揣冒昧繕摺陳奏伏祈皇上睿鑒施行謹奏用人一節朕實信汝不及秉公察訪尚恐識見有時不明況一味偏私任情愛憎舉錯安足為準以薦何廷圭㕘殷邦翰二事揆之其餘不問可知即如杜振宜此奏汝既未能深知灼見其居心操守則於伊根本處毫無確據胡為如是破格薦揚朕殊不解若第以衆口同聲一語遂爾決定不疑將許容之目置於何地持此以往則是大開屬員奔競之門寧有底止耶且衆口同聲俱未曾保其居心操守縱才堪辦事亦屬才勝徳之小人明矣乃不待案件完結而汲汲保奏之必待其敗檢踰閑貽誤地方又從而㕘處之何孟浪輕率至於此極為地方需人之道殆不若是也杜振宜前案倘審理少有不公朕必另簡大員覆加訊鞫將此諭與孔毓璞李世倬承審各員併觀之同日又奏為奏聞事竊查軍需闗繫重大臣駐劄蘭州與督臣岳鍾琪相距甚逺諸事不獲面商倘意見稍不畫一承辦官即無所適從是以一切事宜總聽督臣主持斷不肯略有掣肘致煩聖懐惟有竭力催趲盡心查察以期事無稽遲民沾實惠再臣接准部文奉旨駐凉滿兵一千名令臣將凉州向有營房修理應用當據凉莊道殷邦翰禀稱出口大兵在凉養馬已將營房修理完僃俟大兵起身後或有應行粘補之處現今無庸修整等語臣查殷邦翰已經督臣派委督運出口即飭令現赴甘凉督辦軍需之平慶道趙泉楠就近料理自必無誤理合一併奏聞伏惟睿鑒謹奏辦理軍需之責朕原專畀岳鍾琪一人汝等職司應付胡可掣肘倘致稽遲自罹㕘處耳於人何與此奏殊屬謬誤大兵出口後則干係全在汝矣身家性命所闗敬慎為之稍有不協莫冀如綽竒哲爾金何廷圭尚獲茍延嵗月也同日又奏為奏明事竊臣衙門有幕友沈見山係浙江杭州府人在陜有年從前曾在原任按察使李元英處作幕本年三月内奉旨查審李元英款蹟據布政使孔毓璞詳報李元英於雍正五年署藩司時有書辦趙益正漏造册籍已經回明李元英准其改正伊内幕魯薦梅掯留不發趙益正送銀一百兩始行發出等語當飭按察使李世倬嚴拏審擬嗣據李世倬禀稱據魯薦梅供伊止得銀四十兩其餘六十兩轉送與沈見山等語臣當將沈見山飭發嚴審後據李世倬禀稱已經當堂質訊沈見山原管臬司衙門事件竝未經理錢糧册籍實無得銀情事對簿之下魯薦梅已將獨得銀兩原圖贓少罪輕混供推卸各實情直吐不諱質訊書辦趙益正等僉稱前項銀兩係親交魯薦梅現有劉鼎見證其册籍原係魯薦梅經管等語臣恐李世倬或因沈見山在臣衙門不無瞻顧復委凉莊道殷邦翰會審并提李元英到案三面對質各犯堅供如前與沈見山實無干涉但現係臣衙門辦事幕友事涉嫌疑相應據實奏明伏祈皇上睿鑒謹奏朕觀此事兩司大有瞻徇景况亟當推究實情以申功令何故因一細人玷汝官箴莫謂曾奏過三字即能免人議論也將此諭亦與兩司看雍正七年五月十八日蘭州巡撫臣許容謹奏為請旨事雍正七年五月十七日臣准部文奉上諭肅州辦理軍需更闗緊要署督查郎阿相隔路逺巡撫許容又屬新任著湖北巡撫馬會伯前往肅州辦理軍需一切與督撫等公同計議而行即帶管肅州總兵印務甚為妥便欽此仰見我皇上睿慮周詳無微不到但念臣荷䝉聖主知遇現在身任地方所有軍需事務督臣岳鍾琪早為經理臣不能少分微勞將來大兵由肅出口事務殷繁岳鍾琪既有領兵專責馬會伯亦屬新來臣若仍坐蘭州不往相幫料理實覺寤寐難安理合繕摺請旨伏乞天恩垂鑒准臣前赴肅州協力供辦俟大兵起程後再行回蘭料理地方事務臣謹候旨遵行為此謹奏此奏是殊屬可嘉一面起程赴肅共相商辦一面照例題明可也雍正七年六月初六日蘭州巡撫臣許容謹奏為請旨事竊查甘省雍正三年奏銷内有存庫銀三百六萬餘兩據布政使孔毓璞詳稱俱經歴任藩司墊用現無存貯毋容盤查保題等語臣查此等墊項俱係十數年遷延未清之款若再不徹底清查將來愈難歸著臣前已題明請限一年令布政使造册銷算聽候部議今於五月二十七日接准部文西寧一路軍需用過錢糧䝉皇上特遣侍郎劉於義按察使葛森前來清查銷算等因欽遵在案合無仰懇天恩俯念藩庫墊項繁多敕諭劉於義等同臣逐一核算應開銷者開銷應查追者查追庶積年懸項各得歸結藩庫錢糧從此清楚實有裨益謹繕摺請旨伏祈睿鑒施行謹奏此項庫帑係汝撫任專責業經題請展限有旨允准何可推諉欽差以圖自便也同日又奏為恭繳硃批奏摺事竊臣於本年六月初三日恭接皇上硃批臣奏司道各官賢否一摺仰䝉聖恩訓誨周詳臣跪讀之下惶悚無地伏念臣才庸識淺遇事粗率䝉我皇上天地洪恩裁成矜全洊歴封疆重任受恩愈深圖報日切自到甘肅以來急欲體察吏治而狃於淺見遂以一時之評品冒凟聖聰臣繕摺拜發後接到臣前次奏摺内欽奉皇上硃批御下苦衷朕惟自知仰荷上蒼照徹耳仰見聖明天縱尚且其難其慎臣何人斯遽敢以兩月之内定人賢否今荷皇上明白開示益覺爽然若失至何廷圭王全臣二人臣前任府谷縣知縣調赴軍前辦差口外原曾認識見其頗能料理軍需一時愚昧妄為奏請當䝉聖訓凛凛於中若再受其蠱惑愚弄不但自貽身家性命之累且負我皇上生成教育之恩臣斷不敢出此惟有恪遵訓旨愈加儆惕無欺無隐以圖報稱其布政使孔毓璞那移庫項一摺所奉硃批併欽遵傳知勒限催補外所有臣奉到硃批奏摺理合恭繳伏惟聖鑒謹奏平治天下祇斯用人一事凡為督撫者能秉公察吏甄别賢不肖俾屬員既畏且感始可謂無忝封疆之任不此是務而欲以一已之才智駕馭羣僚萬不可得也勉之悦服之道無他惟正已率人屏除恩怨久之未有不傾心歸嚮者雍正七年七月初四日蘭州巡撫臣許容謹奏為恭繳硃批奏摺事竊臣家人捧齎臣先後奏摺回署俱荷皇上批飭教訓詳加開導跪讀之下惶愧無地伏念臣仰邀聖主知遇畀以封疆重任識見既已淺陋遇事又多粗疎錯謬多端隕越是懼蒙我皇上不即擯斥多方裁成即使竭盡駑駘亦難仰答高厚惟有恪遵訓旨時時儆惕少贖前愆於萬一耳所有保舉杜振宜一摺奏明臣幕友沈見山一摺俱已遵旨令布政使孔毓璞按察使李世倬觀看并令秉公察審外謹將臣奉到硃批奏摺繕摺恭繳伏祈皇上睿鑒謹奏覽奏俱悉知非改過非大聰明具超卓識見者不能必將訓誡之辭反覆思維心悦誠服翻然愧悔實力悛除而後自新之路日闢知遇之恩克全矣若泛泛以稍贖前愆之萬一等數語謂已恪遵殊與朕諄諄玉成之意相左也雍正七年閏七月初九日蘭州巡撫臣許容謹奏為奏聞事竊臣於七月十五日自蘭州起程挨站查催軍需於二十一日到凉州府城大將軍岳鍾琪先到一日湖北撫臣馬會伯亦於二十二日到凉所有凉州府承辦之驢騾車輛口糧米麵駝屉苫氊繩索等項俱已完僃公同商議岳鍾琪暫駐凉州分派兵馬臣先赴甘州查催軍需馬會伯前往肅州駐劄料理統於閏七月十五日前後到肅臣隨由凉屬之武威永昌甘屬之山丹逐縣清查催辦二十八日到甘州所有甘州府置僃各項軍需亦俱齊全於閏七月初七日由甘屬之張掖查催前往不日即可到肅臣查凉甘肅一路軍需大將軍臣岳鍾琪仰遵皇上訓旨料理得宜官吏不敢侵扣兵民俱沾實惠人等凉屬之永昌鎮番甘屬之山丹收成俱有六七分凉屬之武威收成八分九分不等甘屬之張掖近城周圍約二十里名為下六渠地土瘠薄今年山水到渠稍遲下雨亦晚收成三四分五分不等俱極茂盛米糧價平民情安帖臣查張掖每年額徵糧七萬餘石近城各渠應納糧一萬餘石正在採辦軍需即值開倉徵收臣仰體皇上愛養邊氓至意飭令該縣按下六渠收穫之厚薄分别暫為寬緩俟秋禾登場後再行上緊催徵再查肅州前於七月初十日臨城河北黃草等壩落齊式查勘料理臣到肅時即當親驗確實加意撫恤酌量給賞仰慰聖懐至於沿途塘汛地當極邊大兵出口之後防範更宜嚴密將僃各官半係新委署理守汛兵丁多不能照派定之數朝夕在塘臣仰遵訓旨和衷辦理已將臣所見聞面商提鎮囑其訓練稽聖恩申諭自必益加儆惕於地方實有裨益矣所有臣沿途親歴情形理合繕摺奏聞伏惟聖鑒謹奏覽雍正七年九月十五日蘭州巡撫臣許容謹奏為奏明事竊查西路軍需經寧逺大將軍臣岳鍾琪辦理妥協俱已齊僃陸續出口再督臣衙門筆帖式竒書等在寧夏口外牧放駝隻解送甘凉内有挑存疲瘦不能䭾載者八千餘隻又原任布政使諾穆渾等在西寧口外牧放駝隻内挑存疲瘦駝三百餘隻俱經大將軍臣岳鍾琪檄令留厰牧放俟收槽時動用軍需銀兩採買草料飼餧臕壯明春馱糧出口現在酌議分發餧養臣於九月初八日行至莊浪迎見將軍臣常色禮領兵前來紀律嚴明按站下營竝不住宿民房臣將應支糧料草束與常色禮逐一面議照依西安寧夏之例半給本色其餘一半遵照部價折給和衷商辦意見相符惟常色禮云甘凉地方採辦各項軍需誠恐出産無多如將來價值昻貴另行妥議旨所有甘凉一路軍需情形理合奏聞再查肅州於七月間落有冰雹經臣奏明在案後臣抵肅查看所打田禾甚屬有限今嵗夏秋成熟百姓十分安堵至衝塌房屋查係肅州道衙門左近多年土房因驟雨泡塌已經肅州道齊式安頓撫恤修理整固再甘屬秋禾收成現在其臨洮所屬之蘭州鞏昌所屬之靖逺歴來雨水稀少今嵗仰賴皇上聖徳格天收穫豐稔難計分數為一二十年來所未有合先奏明仰慰聖懐為此謹奏覽甘屬秋禾收穫情形朕懷深慰將來雨暘豐歉全賴汝有以仰邀天恩之錫祐耳竭力勉之然必敷政臨民無慚衾影休徵之應乃可預期非徒恃設壇建醮籲禱虚儀遂謂能盡祈求之道也感應之理慎勿謬解同日又奏為恭繳硃批事竊臣家人及臣標員弁捧齎臣先後奏摺回至甘省俱荷硃批臣謹叩接跪讀訖伏念臣至微至賤仰邀皇上天恩不次擢用洊任封疆自恨識見淺陋才具庸下歴任之内過愆多端荷䝉聖恩鑒臣愚拙格外矜全且每遇一事訓導詳明一已之偏見罔顧事理之攸宜則上負君恩為不忠下貽親憂為不孝臣質雖下愚寧甘暴棄若此自今以後惟有凛遵聖訓以實力實行四字銘刻於中以期無負皇上諄諄玉成之意耳所有先後奉到硃批奏摺理合恭繳謹奏奮勉自勵為一當代人物名標青史寧不美歟不望汝企及上古名臣但能效法鄂爾泰田文鏡之居心行事斯亦可矣雍正七年十一月二十日蘭州巡撫臣許容謹奏為恭謝天恩事本年十一月十一日齎摺家人回蘭捧到御賜臣父臣許士正人參二斤貂皮二十張寧紬二疋臣父臣士正率臣容跪迎進署恭設香案望闕叩頭祗領訖臣容以愚陋庸材仰荷聖恩從縣令微員不數年而拔至巡撫恩遇不次臣身受賞賚已越尋常前於雍正三年三月内由口北道調任陜西糧道進京請訓蒙恩賞給臣祖母暨臣父母衣素縀四聨又於雍正五年十一月内由陜西解任按察司陞授浙江布政司進京請訓蒙恩賜臣祖母二品封典今又蒙聖恩賞給臣父人參貂皮寧紬各種三世躬膺曠典舉家咸沐恩榮自顧何人恭逢異數天髙地厚感戴靡涯臣謹隨臣父叩謝天恩臣父不敢繕摺令臣代奏伏念臣士正一介寒微向蒙聖祖仁皇帝敎育深恩幸列科名三任知縣寸長未效圖報心殷第以才具庸下未能上答涓埃惟諄諄訓飭臣之諸子全忠即以全孝報君即以報親今臣子容仰荷殊恩簡任封疆更蒙推恩錫𩔖榮及三代恩遇之隆無以復加惟是甘肅巖疆正值軍需臣子容膺兹鉅任誠恐才識未逮疎忽多愆是以匍匐逺來朝夕誡勉務俾殫竭愚誠以勤以慎盡除一已之偏見凛遵聖訓之精詳上以答聖主知遇之隆恩下以完小臣未畢之志願迺復蒙天恩優渥頒賜竒珍更命臣子容留養署中公私兩盡跪讀恩諭感激涕零惟率領闔家老幼恭祝萬年天子所有感激微忱謹令臣子容敬謹繕摺代為奏謝天恩為此臣容謹奏覽奏謝知道了父母愛子之心無所不至但恐過愛則溺倘汝父偶有公中私之論又在汝自能揆本末度輕重也非朕愛汝之心不及汝父之切所慮者或汝父識見涉於淺近不知真愛之道耳此雖未必然之事朕既思及安得不為警覺提撕汝其審諸同日又奏為奏明事竊照甘州凉州平凉三府打造糧車七千輛應裝糧石經大將軍臣岳鍾琪奏明照内地運糧之例預先雇運肅州俟明春糧車到肅裝運出口現在陸續運送所有拉車牲口亦經大將軍派定用騾一萬三千頭馬一千匹其馬匹已於西安解到馬内照數挑留分發臨洮府屬餧養其騾頭除甘省採買竝西藏官兵帶回原在甘屬分餧各騾外西安解到騾一萬一千四百餘頭據平慶臨鞏四府接收各官報有病瘸殘傷者經大將軍批令西安原餧官賠補嗣據西安司道詳稱起解之時俱係慎重挑選分起管押且程途不逺何至有如許病傷或係收餧各官希圖缷過䑃混捏報而鞏昌布政使孔毓璞又以解到時派委知府等官眼同解官驗明分發各屬餧養其病傷之騾隨收隨報自應照大將軍批示著落賠補彼此不無袒䕶臣查此項騾頭俱係拴養日久若原餧官各差的當家人小心同押自不至於傷損今西安另派官員督令營兵撁送沿途經理未周傷瘸固所不免至甘屬收餧各官惟恐賠累是以於接收時凡有微瘸微病者悉行報出亦不無過於苛求情弊臣隨分委西安驛傳道趙挺元平慶道趙泉楠分路確查實在不堪者令西安原餧官更換補解其原有微傷微病調治已愈者著接收官加意餧養總期持平辦理務使彼此帖服不致誤公至於明嵗糧車赴肅最闗緊要必須多員管押議派平慶道趙泉楠暨平凉府并帶州縣官二員親押平凉所造之糧車并騾頭前往肅州又派臨洮府鞏昌府各帶州縣官二員各將所屬餧養騾頭管押甘凉即將甘凉所造之糧車管押肅州又派寧朔中衞二縣押解寧夏府屬所餧駝隻赴凉將應馱米麵會同凉州府并武威縣料理妥當交䕶凉莊道寧夏府知府紐廷彩催押赴肅又派西寧府暨碾伯縣押解西寧府屬所餧駝隻赴甘將應馱米麵會同甘州府并張掖縣料理妥當交甘山道岳禮催運赴肅仍令各道府官員各帶餘騾八頭州縣官員各帶餘騾四頭再令餧養騾頭州縣各遣親信能事家人一同管解亦各帶餘騾璞意欲親詣甘凉肅料理糧運出口但布政司係錢糧總滙應辦事件甚多且正在銷算軍需不便躭延臣請於明嵗二月間俟平凉府屬糧車過蘭時臣帶同派委之道府各員督押前往并甘凉寧西各府糧車駝隻一同催儹赴肅會同湖北撫臣馬會伯起發出口再回蘭州臣衙門日行事件可以沿途辦理所有欽部案件暫時停止庶臣職稍盡臣心稍安伏祈皇上睿鑒俯允施行謹奏糧運出口事宜朕已專委孔毓璞赴肅料理地方緊要若無大員坐鎮如何其可汝但居中調度不必更為甘肅之行也同日又奏為恭繳硃批事本年十一月十一日臣家人回蘭齎到硃批奏摺臣叩接跪讀訖伏讀硃批但慮科甲瞻顧之習不除友朋恩怨之情不脱耳臣敬誦之下不勝惶悚伏念臣出身寒微禀性迂拙蒙我皇上特逹之知不數年而拔至巡撫更且推恩臣之祖母父母恩徳之隆非天不足以比髙非地不足以喻厚身受如此隆恩而猶不殫心竭力剖肝瀝膽以圖報稱豈惟國法難逃即天地鬼神亦斷不容其靦顔人世以汚辱清寧也臣孤介性成久邀聖鑒無論異姓朋友同年故舊不敢稍分恩怨即臣之伯叔兄弟亦不敢假公濟私惟其硜硜自守以致落落寡合仰賴皇上聖明鑒臣一點愚誠是以優容格外又慮臣之任性多偏復時加化導望臣為不朽人物標名青史臣何人斯顧䝉我皇上諄諄期望成全造就廼如此之至優至渥也臣之志願非不欲法鄂爾泰田文鏡之居心行事公忠硃批奏摺理合恭繳為此謹奏果能言行相符朕復何慮硃批諭旨卷二百十二上欽定四庫全書硃批諭旨巻二百十二下硃批許容奏摺雍正八年正月二十六日蘭州巡撫臣許容謹奏為恭繳硃批事竊臣家人捧齎臣先後奏摺回蘭臣謹跪迎進署伏讀硃批諭旨訓誨精詳開導明切臣惟有恪遵聖訓以忠誠為根本以言行相符為箴砭總期無負我皇上愛臣望臣至大至切之深恩耳謹將奉到硃批奏摺竝硃批大學士等原議一摺一併繕摺恭繳伏惟聖鑒謹奏朕雖愛汝望汝汝若不自策勵不自顧惜朕亦無可如何確遵訓諭與否亦在汝自省自驗而已他人莫能為之力也同日又奏為奏明軍需事竊查西路軍需節經臣繕摺奏聞今目下一切事宜俱已辦理將次齊全無誤其平凉糧車原議正月二十三日頭起起程嗣經欽差大臣查弼納等以寧先勿後改於正月十三日頭起起程分為五起間日一發甘凉糧車大將軍臣岳鍾琪惟恐中途擁擠俱改於二月初六日頭起起程統在三月内齊全出口再寧夏西寧凉州三府前經大將軍行令每府各採買羊四萬隻派撥營員解送赤金湖因水凍草枯羊隻未能十分臕壯内有寧夏鎮營員惟恐倒斃賠累不敢接收臣於大將軍原議之外各府另派文職一員帶領雜職一員協同營員解送并令採買加一餘羊以僃抵補一面知會大將軍一面咨商欽差嗣准欽差咨覆准行復令經過内地州縣支給料草飼餧保其臕力俱經飭令遵照在案復准辦理軍需尚書臣馬會伯咨令停買羊隻照數估撥糧石臣接准來咨隨與查弼納等公同斟酌此項羊隻係大將軍估定進𠞰官兵口糧若改運糧石自内地運送大營尚易辦理但進𠞰之時大營有無此項富餘牲口可以馱載前往馬會伯曾否咨商大將軍咨内竝未聲明恐有岐誤所闗匪細一面仍飛令各該道府將前項羊隻仍照前檄辦理解送一面行令孔毓璞預僃糧石轉運肅州寧使有餘毋令不足總期無誤軍需不致上厪聖懐理合奏聞謹奏殊不解汝具何面皮而為此奏也若非特差部臣前往督理獨倚恃汝等陜甘大員辦集其事不知遲誤至如何光景而汝等之身家性命亦不知作何結局矣事事縈朕心曲廼云不致上厪聖懷亦可謂無恥之甚者也雍正八年三月二十六日蘭州巡撫臣許容謹奏為恭繳硃批事竊臣家人捧齎臣先後奏摺回署奉有硃批臣敬謹跪讀訖臣庸碌無能辦理軍需未能妥協致厪聖懷欽差大臣督率料理臣慚愧無地悚懼靡寧今幸尚書臣查弼納等仰承訓旨調度得宜所有糧車七千輛據布政使孔毓璞禀稱三月十九日已齊全起運出口其甘凉寧西肅等處餧養駝隻經提鎮道府公同挑選堪以馱運駝六千四百餘隻内三月出口駝三千九百七十隻俱已解齊甘凉馱運赴肅四月出口駝二千四百餘隻亦現在起發前赴甘凉裝運至採買羊一十二萬隻於加一餘羊之外又經查弼納等飭令甘凉西三府寬僃餘羊以供挑選亦俱現在分起陸續解送再噶斯軍需應僃馬匹張廷棟等已報採買齊全現在加意餧養至寧夏西寧應僃噶斯官兵裹帶口糧以及沿途供支草束俱經飭令地方官僃辦齊全所有現在軍需將次全竣縁由理合奏聞謹將奉到硃批奏摺繕摺恭繳謹奏庸碌無能且置勿言但愚昧寡識全不計利害輕重朕殊為汝憂之此番軍需朕代為挽將覆之轍回已頹之波救汝身家性命較自御史五年内擢至撫任之恩大矣亟當知之封疆大吏平時不能開誠布公令屬員咸皆感畏一遇地方有事斷不免叢脞之虞岐誤之失於臨機應變之際又復畏難而不體國懷私而不奉公未有不累及身家性命者此理顯而易見無如庸碌愚昧之流懵焉莫覺目前雖幸免大譴捫心自問能無愧乎朕於檢選人員有犯尚必倍加懲處況如許容輩過䝉格外知遇之恩者耶嗣後當詳悉審度凡趨利逺害之私衷避重就輕之巧念切勿更萌惟須確秉公誠向對天無慚處踐履方可保終身安適也朕此諭乃汝畢生之斷案試行看同日又奏為奏明事竊查雍正七年正月内固原地方拏獲妖言匪棍馬忠一案經大將軍岳鍾琪在總督任内提赴西安質審後拏獲馬忠妻女亦提往西安俱經臣奏明在案嗣經岳鍾琪飭發西安藩臬兩司審明馬忠即馬建原在秦州錐鞋生理因家貧無計有秦州畵匠張拱辰敎以造作紅旗一面上寫番字復令秦州民人何居廣開寫所往地名向伊回教騙取盤纒馬忠遂執旗沿途假稱官差稽查愚哄回民無如回敎人等毫無所贈遂至原任提督馬煥家内捏造狂言希圖賺騙歴訊所供之劉文秉馬六馬倉等均屬無辜扳害且伊妻女供伊出門月日情事歴歴有據畵匠張拱辰亦供無異詞督臣岳鍾琪因開單之何居廣逺在秦州未曾到案誠恐拖累無辜將一干人犯發令甘肅按察使李世倬就近拘提何居廣質訊定擬經李世倬訊明與西安所審相符而馬忠旋即病故將畵旗之張拱辰擬徒開單之何居廣擬杖具文詳報經署督臣查郎阿查係岳鍾琪奏明交臣就近審擬之案批令呈解臣衙門核擬臣随提訊各犯再三研鞫供吐確鑿毫無疑竇臣查馬忠貧而無賴詐稱官司差遣圖騙錢財情甚可惡今已伏㝠誅亦其扳累多人之孽報不爽至張拱辰何居廣應如司擬分别杖徒照例外結縁係從前奏聞之案理合將審明完結縁由繕摺奏明謹奏此等要犯漫不經心至於瘐斃毫無引咎自責之辭而混以伏㝠誅三字率意奏聞若似乎以草草結案為幸者𩔖斯識見甚屬庸鄙何以克稱封疆之職耶雍正八年四月初八日蘭州巡撫臣許容謹奏為奏聞事竊查甘屬之階州成縣西河一帶僻處深山地連巴蜀刁民抗欠錢糧歴年累積且有姦頑里甲頭人包攬侵蝕習為故常一經州縣催徵即布散謡言煽惑愚民廹令躱避一則挾官長以不得不緩其追比再則使百姓逺去便於捏開民欠無可對質更有劣衿從中把持此風相沿已久近來臣聞西和成縣所管屯民内有遷往四川者有遷赴漢中者臣因未得實情随密檄秦州知州魯璵前往兩縣密行查訪兹據魯璵禀稱到西和地方因自康熙六十一年以來積欠甚多今該縣王宇樂意在清釐振頓積習而包攬之頭人難以掩其侵蝕題㕘現在審擬此種刁風漸不可長復飛諭魯璵密令該縣先行出示將六十一年至雍正四年舊欠暫行緩徵其五六七等年舊欠分限完納曉諭居民令其安業并將已去之民勸諭招復一面密行查拏倡造謡言之頭人嚴加究治以儆刁風復令魯璵將成縣逃民確情逐一訪查俟料理停妥再行具奏為此合先奏聞謹奏查郎阿亦經摺奏矣其嚴查確情以聞凡此皆由汝等歴來精明强幹督撫能消患於未萌擿姦於未發之所致顔面䘮盡朕實代汝等不勝慙恧將此諭亦令查郎阿知之雍正八年五月二十一日蘭州巡撫臣許容謹奏為請旨事竊惟寧夏富饒甲於甘省誠以渠流暢逹尺土皆屬膏腴近者荷蒙聖恩開濬惠農昌潤二渠添設新渠寳豐二縣金城沃野利用益充兹又奉上諭命侍郎臣通智等估修大清漢唐三渠仰見睿照咸周聖恩普被第臣未得身至其地不敢懸定章程正擬繕摺奏請訓旨於七八月間赴寧閲看今通智史在甲等札商到臣以估修三渠必得地方各官公同辦理清釐積弊禁遏刁頑然後大工可以次第舉行臣思三渠為寧民衣食之源今奉恩旨動工修補俾邊郡黎元永享盈寧之慶臣理應與通智等協同料理以仰副聖恩且七八月間軍需之銷算可竣秋禾之灌溉甫畢正可乗時勘估伏祈皇上允臣所請親至寧城一則與通智等公同查勘舊渠斟酌分派地方各官使無推諉一則得以躬瞻新渠之制度招徠户口均霑浩蕩天恩大約往返一月有竒所有應辦事件仍可随在料理不敢貽誤為此謹奏渠工現有通智等董率其事但嚴飭屬員與之同心協力毋致掣肘推諉則已七八月間正值辦理軍需之際寧可舍此而就彼耶不知審度輕重徒以奔走為效力何其愚淺無識至於此極雍正八年十月初十日蘭州巡撫臣許容謹奏為恭報甘屬收成分數仰慰聖懷事竊查甘屬地方比年以來荷蒙聖恩優渥黎庶富饒今嵗更沐恩膏疊沛蠲賑頻加是以民情之感戴歡欣雖僻壌鄉隅莫不謳歌而頌禱而天心協應翊贊皇猷甘雨應期惠風遐暢前據寧夏府之新渠縣詳報雙岐瑞麥臣業經繕摺奏聞兹據各屬具報收成分數前來統計八府三州及安靖二㕔各所屬收成十分者居十之四九分者居十之五八分者居十之一夏秋兩禾咸登大有嗣又據寧夏寳豐二縣呈齎瑞穀雙穗以至九穗者各數十本到臣臣敬謹捧閲見夫金莖秀發莖莖萃地利之豐腴玉粒堅圓粒粒受天和之保合祇縁從前欽奉諭旨是以未敢進獻惟是新渠寳豐荷䝉聖恩闢田濬渠授㕓給種數百年紅柳黃沙今頓成花村麥隴至於寧夏三渠又奉恩綸不惜帑金大興修葺務使寧民獲享萬年美利是以上孚天意丕著竒祥瑞麥嘉禾疊呈竝見從此豫大豐亨之象已兆於經營創始之時萬姓歡呼歌聲四徹臣欣際昌期覩兹上瑞惟有益加警勵敬迓天庥以仰副聖諭之諄諄耳所有甘省收成大稔縁由理合奏聞為此謹奏甘屬收成分數覽奏已悉能翻然醒悟知愛身為害身之道屏除利已私衷自䝉上天鑒佑也雍正八年十二月初二日蘭州巡撫臣許容謹奏為奏聞事竊查辦運駐歇一年官兵口糧十一月十六日以前共報運出口騾車五千六百三十五輛駝三千二百八隻共運送出口粟米二萬二千五百七十四石麵七十二萬六千五十觔業經繕摺奏聞今據肅州道齊式又續報十一月十九二十一等日共起發出口車一千一百二十六輛共裝粟米四千四百七十六石炒麵三千六百四十觔運送塔爾納沁訖連前運送米麵合算共運送出口糧三萬二千六百六十三石零據孔毓璞禀稱嵗内可運糧五萬石等語則所餘剰二萬石有零明春正二月間自可運送全竣再甘省雇覓駝騾除前奏挑選騾一千七百七十五頭駝四百五十六隻外今又挑選八十一頭現在起運出口陜省雇覓之騾除前奏十一月十六日止挑選六百五十九頭外今又據報挑選騾一千二百三十九頭亦現在起運出口又據孔毓璞禀稱欽差内閣學士班第於十一月二十日到肅一應需用馬駝等物俱已辦齊於二十四日可以出口理合一幷奏聞伏祈皇上睿鑒謹奏覽奏知道了漢儒有言正其誼不謀其利明其道不計其功然果能殫精悉力竭蹷奉公不存一已利害私心未有不䝉上天神明之庇佑成全者也雍正九年二月初二日蘭州巡撫臣許容謹奏為恭繳硃批奏摺事竊臣家人齎臣先後奏摺回蘭臣跪迎進署敬謹開讀俱欽遵硃批辦理外伏念臣本庸陋叨荷殊恩值此軍需孔亟之時正臣子竭力圖報之日一切應行事宜敢不黽勉自朂以希寸效若稍存計較利害之私心以至瞻顧遲疑貽誤公事則獲罪於君父即獲罪於上天國法㝠誅均難逃避臣雖下愚屢䝉天恩多方開導當益悚然覺悟夙夜靡寧以不負我皇上始終成全之徳意所有奉到硃批奏摺理合恭繳伏惟睿鑒謹奏深刻褊淺之疵所當切戒不得屬員感服之心將何所憑藉以辦集繁劇事務耶謹誌勿忘莫負朕之倚任雍正九年三月初六日蘭州巡撫臣許容謹奏為聖訓指示恩深微臣感戴情切密摺恭謝事雍正九年三月初二日接到大學士公馬爾賽等字寄雍正九年二月二十二日奉上諭陜甘二省年來辦理軍需雖皆動用正項錢糧民間無絲毫之費然輸輓糧運伺候差徭不無勞苦已另降諭旨加恩奬勉但必得地方大吏能仰體朕心凡一應料理軍務固不可任其遷延遲緩而過於廹急未免擾民其查核錢糧固不可聽其浮冒開銷但過於苛刻則必致剝民督撫大員若嚴緊一分則州縣官必於百姓加緊一倍如能寬客一分則小民即得一分之惠許容孔毓璞辦理西路軍需亦各盡心竭力但許容失之細刻州縣懼其核減恐不能照價付給則百姓不無虧折孔毓璞失之匆廹州縣懼其催促必不敢少緩須臾則閭閻未免驚擾此皆太過之弊也爾等可密寄信去凡承辦州縣或於原限之外遲緩無多而其人之才有可用者不妨畧寬容之其開銷物料脚運之費亦必準酌時價不可十分核減但朕之此旨不可宣示於人恐有不肖之州縣借此推諉遷延虚開浮冒其漸不可長也許容孔毓璞但時將朕旨密記於心辦理諸務自無太過之弊欽此遵旨寄信前來臣跪讀之下仰見我皇上厪懷民隐體恤官員仁慈愷惻怙冒西土臣自䝉􅂤任巡撫恒恐措置乖方辜負聖恩敬繹諭旨我皇上之知臣實深於臣之自知而臣之得沐造就者較之他臣為獨多臣鄙陋之質過於拘謹細刻之失臣實有之而曾不自覺今䝉皇上明白指示恍若夢醒自今以後當痛加改省總期下無病於官民上有裨於軍國以勉副我皇上諄諄敎訓之至意除奉到之日即刻鈔録密寄孔毓璞欽遵外理合繕摺恭謝天恩為此謹奏務須勉力符合所奏而行諸凡當相機度勢因時制宜地方有事與無事日不同胡可膠柱鼓瑟耶大都庸常見識安閒則易於懈弛倥偬則過於嚴急竟成通病豈不謬哉戒之雍正九年六月十四日蘭州巡撫臣許容謹奏為奏聞事本年六月初五日臣聞副都統殷查納徵調青海兵丁有到營無幾日即行逃去者因採買馬駝不善辦理又因賞銀不肯随時給發必俟兵馬調齊然後支散伊等心懷怨望是以不得安帖初六日聞柴逹木沿臺一路賊夷頗有試用汪菼自營回寧於三四臺中間被竊去銀一百八十兩經歴司徐錫亦於三臺失去馬二疋又聞滕各里安設卡倫之噶蘭大查陵領兵五百名内有扎薩克諾爾布率領所屬三百餘人於五月二十八日晚搶奪馬匹敢行稱亂又侍衞席第等帶領額魯忒兵一百名亦於是夜作變等因臣以事出非常恐有未的正擬再行密差探聽初七日酉時接准都統徳成提督馮允中將發兵縁由知會到臣臣查西寧發兵糧餉是急現在存寧米麵銀兩儘敷支用隨即時飛飭布政使諾穆圖西寧道楊滙作速照例供應竝飭署布政司事趙挺元再於軍需銀内動撥五萬兩解交西寧僃用初九日戌時聞五臺功加蘇天友被賊夷砍傷又砍傷兵丁二名拏去兵丁三名馬匹盡被搶去搶過五臺之後隨向六臺適有都統格梅兒摺匣竝公文一角由六臺經過押匣功加一名兵丁二名亦被裹去又聞二臺亦有賊人數十名將客人所馱物件竝土司運送土夫口糧俱被搶去等語又據諾穆圖楊滙禀報五臺馬匹被搶四臺三臺皆在緊急新派前往柴逹木援𠞰之兵原議行糧裹帶一月兹因軍行急廹復改裹帶十日其餘糧餉隨後雇脚趕運等情臣復飛飭辦理撥兵䕶送俾無遲誤初十日復准徳成馮允中等以臺站搶殺夷性叵測恐聚衆侵犯内地不可不預為防範令各提鎮將兵馬預僃停妥等因知會到臣臣復飛咨陜甘二提凉肅寧安四鎮務期無誤外竊查河州逼處河曲直通西海與外夷曾無藩籬之隔僅有一協額設兵丁除從前調遣竝各官親丁外現存不過六百餘名即新設循化營額兵亦僅八百名地廣兵單誠為可慮臣於初七日戌時即插羽飛飭河州知州顧爾昌會同署河州協張興小心在意前於冬春之交屢據顧爾昌禀稱河民甚有懼心人人願自為守而闗堡之間舊有馬户箭手易於團練臣爾時以西海釁端未兆毋庸紛擾抑不使行今因其勢而利導之大可為用已將臣標舊有富餘鳥鎗飭發二百桿竝令該州勿罪民間所藏悉令輸官烙記及一切器械隨其所便但為之董率練習扼險固圉不拂民情不費國帑於邊防甚有裨益再徳成馮允中調遣蘭臨鞏秦河州各營之兵接應西寧臣以河協未便抽減其餘各營地不臨邊自宜調用亦飛咨徳成馮允中等斟酌行事現在蘭營存城之兵不滿二百又調赴西寧一百名城池倉庫不敷照管臣已嚴督本標弁兵分頭管攝并飛飭各屬凡防範地方務須同心協力勿但委之武職伏念臣至愚極陋實不知兵幸䝉皇上敎誨多方稍開闇昧竊以有事於外宜先固其内必内無可乗之隙而後外有可建之功當此之時臣惟有勤宣徳意和輯民人陰為防維陽示安静固封守足軍儲統率屬員同力共濟仰賴皇上福庇俾小醜指顧就俘即大憝亦無難殄滅耳又本月十一日聞柴逹木大營蒙古兵丁亦有變動所有現在情形竝防範事宜合即密摺奏聞伏惟睿鑒再臣從前奏摺皆差標員及家人恭齎到京騎騾延緩往回須得五十餘日今事係緊要冒昧遣發傳牌由驛齎送兵部轉呈御覽嗣後除尋常奏摺外如有緊要事件可否由驛之處并祈指示欽遵為此謹奏所奏係朕早知已辦之事汝不過得之傳聞尚未詳悉若將此為緊要欲請由驛馳奏朕如何批諭且理應上聞急務竝未曾降旨不令由驛齎呈也汝等大吏於一切防禦之䇿但當儘力綢繆不宜動容失色搖惑衆心惟以安静彈壓為貴識之勉之雍正九年十一月十六日蘭州巡撫臣許容謹奏為感激天恩瀝誠奏覆事竊臣接到大學士張廷玉蔣廷錫字寄雍正九年十月十五日奉上諭朕覽許容摺奏運送米豆一事與查郎阿意見不合許容之意竟似查郎阿有意與伊矛盾者朕令廷臣詳查知查郎阿奏請冬天口外停運而以空閒之驘安臺接運米豆此事尚未奉旨是以未曾知會許容以致彼此辦理互異竝非有意與許容矛盾也朕將許容奏摺刪截另寫發交廷議今廷議以已運過凉之米仍照許容所奏聽州縣直運肅州其未過凉州糧石已發脚價者暫停扣追俟將來運糧扣抵等語朕已允行但思查郎阿居心忠厚志在急公必無與同事之人有意矛盾之理皆許容疑心太重致生此等猜嫌有失和衷之道不思軍需闗係緊要必須合志同心方於公務有益不負朕之委任爾等可密傳諭與許容知之至於許容所奏查郎阿信用匪人之處朕亦密諭查郎阿令其留心不言許容所陳也欽此臣跪讀之下仰荷我皇上矜全敎誨感切肺腑不覺涕零伏念當此軍興之際宵旰何等焦勞而為臣子者茍不能合志同心分憂宣力豈但獲罪於聖主抑且獲罪於負我皇上委任之至意理合瀝誠奏覆伏惟睿鑒謹奏公不勝私安能和衷共濟人我之見未融胸懷小哉雍正十年三月初九日蘭州巡撫臣許容謹奏為奏聞甘省現在情形仰慰聖懷事竊臣接奉本年正月二十日内閣鈔出上諭一道因京師未得雨雪畿輔及近京各省得雪亦未普遍聖心憂懼䖍誠修省昭格天心儆戒廷臣訓飭督撫命内外大臣等實心奉行不必空言覆奏臣跪讀之下仰見皇上敬天勤民兢兢業業之至意為臣工者猶不惶悚省愆殫心籌畫殆非人𩔖臣浹月以來彌益悚惕恐有違聖訓於是復加訪察務為預防業經遵照部文就地籌畫僃細咨覆户部誠恐廷臣彚奏未能詳載情形合再據實奏聞查甘省八府三直隸州其河東四府二州慶陽階州等處竝無河渠平凉臨洮鞏昌秦州雖山多川少而經渭洮河之旁間有水田民擅其利其河西四府一州不特寧夏河渠之利甲於天下無虞荒歉即甘州凉州西寧肅州各有山水渠流足資灌溉不患全荒河東地方稍暖現俱播種河西地土較寒二三月間冰融之處俱各廣種其他積雪未消者遲至四五月播種始畢冬春各處雨雪多寡不等而地土皆不患乾燥即今甘凉西肅一帶日漸陽和土潤犂鍤展施其餘各處秋麥皆已吐青春麥皆已種植四月得雨河東之豐收可必五月得雨河西之全收可必目前尚不望雨甘省現在地土之情形如此再查甘省地方山坡草峪所在多有民便牧放而沿邊一帶恒産而外尤以牧養牲畜為事販賣烹割皆堪度日兼之軍需之際屢䝉皇上天恩脚價草價俱已加增雖有貧窮之民或輓運軍需或析薪刈草咸得自食其力以資朝夕是以人人踴躍公私交濟甘省現在百姓之情形如此再查甘省積貯常平倉米穀麥豆等糧共存有三萬五千餘石社倉米穀麥豆等糧共存有一十六萬七千餘石為數無多但查八府三州現貯歴年徵存及各案採買米穀麥豆青稞等糧共存有七十一萬五千餘石雖係軍國之所需亦可以濟閭閻之緩急方今播種之際民間偶有缺乏籽種工本者臣或批令於社倉借給或社倉有限即批令於各項糧内借給統俟秋成照數還納於倉儲無虧於民生有濟伏惟皇上怙冒西土至誠感召必慶豐盈萬一二麥稍歉臣自當仰體聖主懷保小民之心不拘何項倉糧均可因時隨地或減價平糶或按户酌借必不致黎民乏食甘省現在倉貯之情形如此臣欽遵聖諭時刻修省務必實心奉行以副我皇上諄諄訓誨之至意所有現在情形合再繕摺具奏少舒聖慮伏惟睿鑒謹奏甘省現在各情形嘉悦覽焉果能有僃無患朕顧慮邊氓之念少釋矣雍正十年八月十六日蘭州巡撫臣許容謹奏為再奏地方情形仰慰聖懷事竊照甘省今嵗四五月間雨水偶缺屢煩聖心後因閏五月内所屬州縣間有冰雹傷禾及麥豆生蟲之處復降諭旨令大學士寄信臣等多方撫恤悉心籌畫我皇上軫念邊氓固已無微不至近更特沛恩綸將民屯番族本年應納銀糧草束槩行蠲免恩命自天歡聲匝地臣查甘省連嵗收穫俱好今年分數亦無大減目下麥豆已經登場􅐘穀正在收割通計兩河收成雖蘭靖平三州縣稍覺歉薄而寧夏可得八九十分其餘亦均有五六七分不等新賦蠲除舊欠停比民力寬紓軍需爭辦臣自蘭赴肅所過之處無論大小村莊不分男婦老幼莫不焚香嵩呼共祝萬年天子臣目擊感戴情切實為邊省慶幸合將地方現在情形具摺奏聞仰慰聖懷謹奏覽奏甘屬收穫尚無大減民力亦不至拮据朕懷深為欣慰雍正十年十月十五日蘭州巡撫臣許容謹奏為奏聞事竊惟西陲有事深繫宸衷特命大學士臣鄂爾泰來肅與署大將軍臣查郎阿計議軍務臣等遵旨齊集肅州不時相見大學士臣鄂爾泰敬體聖心宣示聖諭語語肫誠字字愷切臣等恭聆之下莫不心動神悚其講論軍務以為賊甚横肆必先嚴勦而後可以論撫僃極周詳切中機要即下吏末弁聞之無不踴躍鼓舞儼有立可滅賊之勢至大學士臣鄂爾泰經濟學問逺過常人而自視時若不及望人一切軍需地方事務無不開誠指示臣自分愚魯聖恩於萬一耳為此繕摺謹奏鄂爾泰若不如是朕豈如是信任乎洵當則而傚之者汝能實具服善之誠朕亦甚為嘉悦雍正十一年正月初九日蘭州巡撫臣許容謹奏為密奏事竊照副都御史暫署甘州提督印務二格具奏請撥西鳯米麥倉斗三萬二千石運供本年甘標兵丁口糧竝肅鎮應需粟米一例酌撥一條廷議交署督臣劉於義署撫臣史貽直及臣會議辦以民力維艱改議運送涇州則此三萬二千倉石自不能逺渉二千四五百里直運甘州若再議接運而甘省百姓現辦軍糧為數繁多亦實無暇兼顧且止就甘標而論核算脚價已需銀二十萬兩當此重兵在外糧餉煩重之時又不得不權量緩急況甘省提鎮羅列兵馬衆多凡屬折價俱有不敷已經加增者再為急急籌算未經加增者豈能免於希冀若總為核算又不知需費若何矣查春餉業已闗領各營猶可支撐似應暫且照舊看夏收如何再為因時斟酌然當此用兵之際亦不可不加意體恤或請敕下該管各提鎮將大小營伍悉心料理凡營中所有留有餘以補不足亦未始非接濟營伍之一端臣身當重任非不知仰體聖心愛惜兵丁但慮事宜加詳慎又不得不據實密陳為此繕摺奏聞伏惟睿鑒謹奏覽雍正十一年七月十一日蘭州巡撫臣許容謹奏為河神致祭已畢邊民受福無疆到處歡騰恭摺具奏事雍正十一年四月十七日内閣奉上諭年來陜甘二省地方仰賴河源之神黙垂䕶佑暘雨應時民人樂業朕心實深感激理宜䖍誠致祭以答神貺所有應行祭祀之禮著該部速行查議具奏欽此經禮部遵奉諭旨查照典禮議覆欽點内閣學士臣徳新前往臣先後接准部咨所有應僃祭品専委臨洮道呉廷偉率同臨洮府知府李綺河州知州汪元祐先期敬謹置僃至六月三十日欽差到蘭臣以事務殷繁未敢偕往即著該道府跟隨於七月初二日到河州至初五日抵循化營建廟處所遵照擇定初六吉日黎明致祭訖隨據該道府州暨河州協副將禀稱欽差大人由蘭起程沿途百姓以及鄉勇番回人等感激聖恩執香跪迎先後接踵絡繹不斷彼時循化營一帶地方半月未雨屬望正殷初五日欽差大人甫入公館即陰雲四起甘霖普降歴未申酉三時入土五寸羣歌霑足至夜半交次日初六子時天氣晴朗欽差大人必誠必敬黎明致祭等語臣迴環披閲仰見我皇上至誠感格㨗於影響從此五風十雨嵗嵗豐登非特民慶充盈抑且軍需有賴臣身當重任慶幸實深感激彌切理合繕摺具奏伏祈睿鑒謹奏河源之神靈感昭著莫能思議當竭誠致敬可也雍正十一年十一月十八日蘭州巡撫臣許容謹奏為瑞雪盈疇恭摺奏聞事竊照甘省地方仰賴聖主福祐連年有收今年收成更稔公私兼濟官民胥悦更喜入冬以來瑞雪頻降所屬八府三州先後禀報自二三四五寸至七八寸尺餘不等處處皆有大槩充足其多種冬麥之平慶鞏秦等府尤為得力雖食指浩繁糧價貴賤不等而來嵗又有豐稔之象民情甚覺熨帖目擊現在情形實足仰慰聖懷理合繕摺奏聞謹奏所奏情形以手加額覽之西陲雨雪較之他省闗係尤為緊要朕不勝代卿喜慶焉雍正十二年三月初一日蘭州巡撫臣許容謹奏為聖恩逾分臣父感悚恭摺具奏事竊臣年前十一月十六日接到河東督臣王士俊來札敬録皇上硃諭臣父自臣任所回家令督臣不時存問府縣留心優待臣跪讀之下感激涕零當即繕摺奏謝今於本年二月十九日接臣父手字内云自奉恩旨之後督院存問頻至兼有餽遺司道府縣亦各送喫食等物先後接踵公祖父母之優禮悉出聖主之恩施宗族鄉黨争為傳頌惟是推恩錫𩔖有加無已賜封賜福兼賜各種服食已極人世之顯榮復命本省大僚存問優待更屬千古之曠典八十二嵗老朽無能仰報寢食靡寧夢寐不忘家中僅有二三蠢僕各衙門遣使到日疎畧不周亦滋惶愧前已具呈督院代奏謝恩乃䝉恩賞之外更有溫綸不但感激情切抑且承受不起務將微誠代為陳奏竝懇聖恩敕停各衙門餽送稍安臣心等語臣迴環展視跼蹐難安伏念我皇上禮遇微臣至優至渥加恩臣父愈高愈厚臣只此赤誠仰邀聖鑒即捐糜頂踵亦何能酬惟有事無鉅細殫竭心力少盡職守於萬一耳所有臣父囑臣代奏縁由不敢壅於上聞理合繕摺具奏伏惟睿鑒謹奏據所奏光景觀之奉行者似覺太過高年之人未免喜静厭煩候另旨轉飭俾獲便安雍正十二年九月十一日蘭州巡撫臣許容謹奏為奏聞事據肅州道黃文煒詳據甘州府知府馮祖悦禀稱雍正十二年七月二十八日學院按考甘州二十九日聞高臺縣諸生具呈學院口稱高臺縣凌辱斯文不願赴考等語卑府同張掖縣再三勸諭伊等始進院考試等情查高臺縣地處邊末生監等多有充當渠甲承領採買軍需糧草等項或該縣急於催追以致諸生具控亦未可定理合詳請俟該生考試完畢將原告生員摘提數名飭發職道親訊確情如該縣果有苛虐情弊即行詳揭題㕘倘係刁玩劣生因押追軍需採買等項妄行具控亦請懲治以儆刁風等情呈詳到臣臣查高臺一邑民少差繁生監與齊民一體輪流充應里甲凡交納錢糧承辦軍需不得不向伊等催督該縣程元度不能設法催科以致若軰嘵嘵原難辭咎然事屬因公且平日居官尚無劣蹟於一切軍需地方頗知黽勉若因此㕘處恐長刁風至該生等即使果被凌辱亦應據實呈禀何得倚恃人衆藉考挾持但始雖有不願考試之言旋即遵諭入場首犯固難竟寬脅從不便概及業經批令該道根查倡率起釁之人確訊究擬并准學臣王蘭生移咨已將文生李鴻石中玉武生秦琮李亨泰行學褫革發審在案除俟肅州道審明詳報至日酌量完結外理合繕摺奏聞伏惟聖鑒謹奏前已有旨諭部此等刁風何可令其滋長自當確訊起釁之由從重戒飭以為懲一儆百之道雍正十三年正月二十九日蘭州巡撫臣許容謹奏為請旨事竊照署理甘肅提督劉世明縱兵為盜負恩溺職欽奉上諭交署督臣劉於義會臣審擬臣等接准部文俱即欽遵知會在案近經劉於義以應在何處會審商詢到臣臣思劉於義駐劄肅州料理出口軍需未便他離臣雖亦有現辦軍需及地方案件尚可酌量緩急稍為權宜且甘涼肅一帶地方臣又可借此查看亦屬有益自應臣赴肅會同審擬具題為此繕摺奏請伏候皇上訓示謹奏所請是劉世明辜恩背徳情最可惡殊為國法之所難容會審之際其秉公嚴鞫絲毫毋得疎漏雍正十三年三月二十六日蘭州巡撫臣許容謹奏為奏聞近日雨水情形事竊照今嵗遇閏節氣稍遲春種麥豆俱在清明前後查河東四府兩州自二月二十以後至今一月有餘陰雲時布膏澤頻施各屬報得雨雪有三四五六七八寸不等冬麥發長春種將畢惟平屬之固原㕔州慶屬之環縣直隸秦州階州及秦屬之秦安得雨止一二寸而固原環縣北鄉一帶地土髙阜望澤較急再河西各府州雨雪不及河東而水田居多藉資渠流其傍山髙崖之旱地因缺雨雪播種維艱惟望旬日之内普降甘霖未種者尚可及時趕種至現辦軍需河東即日可竣河西正在停忙百姓盡力南畝糧價日就減落理合繕摺奏聞謹奏汝誠念切民依則自䝉上天感應可望如期得雨也雍正十三年閏四月初七日蘭州巡撫臣許容謹奏為奏聞事竊臣自蘭赴肅歴河西涼甘肅各屬留心察看一切糧價錢價以及各項物價日就平減兵民安堵縁雨少風多山坡旱地望澤頗殷而平番縣城以南及與平番接壌之碾伯西寧近日禀報尤為亢旱再河東各府州内前奏缺雨之平屬固原㕔州慶屬環縣直隸秦階二州及秦屬之秦安縣三月二十二三及二十五等日已報各得透雨至交四月以後北路平屬隆徳以東至慶陽府屬南路鞏昌以及秦階各府州大槩雨水不缺田禾滋長茂盛惟北路平屬静寧以西及鞏屬會寧安定臨屬狄道河州蘭州金縣一帶據署布政司楊應琚禀稱將近一月未雨土脈乾燥禾苖發長維艱現在虔誠祈禱等語伏思時當夏令正在喫緊幸今年遇閏節氣稍遲旬日之内普降甘霖尚無妨礙所有現在情形理合奏聞謹奏雨澤愆期葢必有由省心體察刑政方可冀天心轉移之效雍正十三年五月初九日蘭州巡撫臣許容謹奏為甘雨連降恭摺奏聞事竊照蘭州附近州縣得雨情形臣於前月業經奏報在案其前奏未據報到河東河西各屬水旱田地俱已得雨霑足再三十日戌時起至初一日酉時止蘭州又得大雨一晝夜淋漓透徹初二三四五等日亦復雷雨時作處處霑濡在地禾苗勃然長發未種晚田皆已趕種雖夏收不能全豐而秋成俱有可望至會寧固原環縣百姓正在陸續回籍民氣舒暢地方寧帖理合繕摺具奏伏惟聖鑒謹奏覽奏河東河西所屬地方甘雨連降情形朕懷曷勝欣慰雍正十三年六月二十六日蘭州巡撫臣許容謹奏為據詳請旨事竊照臨洮府丁憂知府李綺虧空軍需銀七千三百餘兩一案奉諭旨確查情由據實陳奏臣隨即行令司道會同查訊嗣因李綺以抱病不能來蘭回覆迨臣因公赴肅事竣回蘭據李綺之子李承震呈稱已在原籍湊到銀三千兩并開出借幫各員具呈到臣臣又批令作速檄調李綺詢明呈報去後今據署布政司楊應琚按察司齊式臨洮道呉廷偉詳稱遵即會調李綺到蘭訊據禀開綺於雍正八年在河西大軍需案内製辦鞍屉修補糧車以及買換挑退騾頭雇募夫役共賠墊銀三千七百餘兩又與原任臨洮道李元分辦皮手套解送大營綺獨自賠墊銀一千一百五十兩又雍正十年春間賑濟狄道縣無業窮民捐銀四百五十餘兩又因洮河水發衝壊河橋賠墊修補船隻銀八十餘兩又雍正十二年春月因西安長運糧車多走僻路修理車道用過銀一百八十兩以上共賠銀五千五百六十兩至於幫借之説如原署金縣楊駉劉元藻汪菼王者弼以及原任蘭州㕔梁徳隆俱屬辦理軍需之際因公那借旋即離任又如署岷州丁祐吉從前在蘭押運軍糧盤費短少亦有借項再原任四川巡撫王景灝係綺舊日上司目擊其在蘭窮苦亦有零星幫借再如湖北藩司李世倬雖有傳言實無借項惟去年李世倬赴楚之後家眷起身力量不及綺適在省著家人代雇騾數頭約用銀一百兩李世倬竝不知道今屢䝉駁詰如果實有其事伊係現任藩司著追甚易綺豈肯不行開出以抵那項反代李世倬捏飾之理以上除綺辦公賠墊銀五千五百餘兩其借墊各項除去已還尚有一千八百餘兩此綺虧空七千三百餘兩之原由也查前各借項内如汪菼借用之三百兩王者弼未還之二百七十兩丁祐吉未還之一百兩尚係赴部另補及現任之員應請著追至代雇騾頭一項李世倬實在不知無憑著追其餘如原任臨洮道李元等俱係革職窮員猝難追還綺情願代賠不敢久懸帑項除今現交銀三千兩并應追銀六百七十兩外尚不敷銀三千六百餘兩綺自計原籍田房數處若准開抵儘足完補但綺覊身邊地呼應不靈仰懇據情轉請勒限半年暫令綺回籍覓售一得賣價仍親身解甘以清各款庶微末小臣不致曠稽皇恩等情據詳到臣臣查李綺所開軍需賠墊及各員借幫與臣訪查數目雖其中亦有不同之處而多寡究不甚相逺惟李世倬一千六百兩止稱代為雇覓騾頭用銀一百兩大相懸殊難以憑信復令司道多方開導再四駁詰又經傳至臣署當面詢問堅稱人言雖有實無其事惟求速為奏請以便及時料理完補情詞甚是廹切難以再為推求除將湊到銀三千兩飭司查收并將汪菼王者弼丁祐吉各名下應追銀六百七十兩作速照追外其餘未完銀三千六百餘兩應否如其所請勒限半年准令回籍變補之處臣未敢冒昧具題為此繕摺奏請伏惟皇上訓示謹奏李綺一事前旨甚明乃必令赴蘭到案殊屬膠執其所虧銀兩既有田房堪抵但當速遣回籍折變完補亦何須勒限逼促且汝於不闗軍需庶務由塘報中附奏者頗多獨將此奏差人齎呈以致躭延時日是何意見似此襟懷狹隘豈具有包括封疆之量耶朕實代汝恥之硃批諭旨卷二百十二下
