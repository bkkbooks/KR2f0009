body:
  text: 欽定四庫全書硃批諭旨卷五十七硃批戴音保奏摺雍正六年五月初三日巡察江南監察御史臣戴音保謹奏為奏聞請旨事竊臣奉命巡察江南自上年十一月十二日接受印信後即從上江一帶稽查驛遞察視墩臺并密訪盜窩諭令地方文武協緝務期盜息民安本年挨次查閲下江各府州縣巡歴數月夙夜兢兢惟恐有負聖主簡任之至意惟是巡察一官徃來全省向於所到處所一應日用薪蔬地方官皆照勘合供應近來州縣耗羨悉巳提解歸公今撫臣陳時夏與督臣范時繹㑹商引各衙門養亷之例於一年中動用公項銀二千四百兩按季給臣俾自行備辦其沿途需用夫船馬匹仍令州縣照常應付臣愚昧未經奏聞不敢擅便理合具摺請旨伏乞聖主指示遵行謹奏知道了應留為飬亷之資雍正六年七月十二日巡察江南監察御史臣戴音保謹奏為恭謝天恩事雍正六年六月十二日於如臯縣地方臣家人齎回奏聞請旨事一摺奉皇上硃批知道了應留為養亷之資欽此臣隨於舟次恭設香案望闕叩頭謝恩伏念臣一介庸愚虛糜廩禄毫無報稱今奉命巡察益慮不克勝任致貽素餐之誚乃䝉聖恩錫以養亷路途既有餘資家門亦獲贍養惟是受恩愈重仰報益艱常深每懐靡及之心永誌一飯不忘之戴臣不勝感奮激切之至謹繕摺恭謝天恩謹奏勉之秉公巡察遇事據實奏聞不與地方官通同狥隠沽名釣譽如是可矣諸凡不必過於深刻切戒同日又奏為遵旨訪察販私現獲人鹽船隻事竊臣承准户部題覆為請專道員盤緝帶私之責以杜透越錮弊事奉旨依議盤查私鹽著該管官員實力奉行毋得虛應故事並令江南巡察御史不時訪察欽此欽遵劄付到臣臣隨於本月初十日查至泰州地方見有板船出沒港汊甚多詢之土人云此等港汊皆通場竈因諭該州知州凡港汊中徃來板船須嚴飭快捕搜查如獲私鹽必究其買自何場何竈臣即前徃泰興如臯等縣直抵通州於途中據該州詳報十三日在安豐場之龍王廟捉獲板船四隻私鹽四十七包鹽犯一名徐大餘犯赴水逃脱等因臣批令該州訊其從何場何竈買出據徐大供有囤户王鳴玉丁復章等又據供出逃犯李徳良張四等臣復飭令該州務獲囤户逃犯到案訊確販賣情由究擬通報竊思一隅如此則三十場竈可知其弊皆起於囤户窩頓而地方文武不能實力查拏所致今現獲徐大等船鹽雖非大夥而販私律例甚嚴臣飭州務究根由以期戒一警百其餘州縣臣身到之處當在在留心遇有大夥大窩立檄營縣協拏再行據實奏聞為此具摺謹奏察緝窩頓實為清源之舉此奏甚屬可嘉雍正七年九月初十日巡察江南監察御史臣戴音保謹奏為敬陳管見仰祈睿鑒事竊臣荷䝉聖恩授以巡察重任於經過地方留心採訪今將一得之愚敬為我皇上陳之一移駐道員以重疆圉也查崇明一縣孤懸江海之中延袤數百餘里人民繁聚私鹽匪類易於出沒武職設有總兵遊守等員足資防範惟文職正印止設知縣一員佐雜設縣丞典史巡檢各一員康熙五十六年以江常鎮道駐劄崇明雍正二年改歸蘇松巡道管轄而該道現駐蘇州城内自蘇至崇約二百五十餘里雖有管轄之虛名並無彈壓之實效且崇明縣與淮揚道所屬之通州水面接界遇有漲沙通崇之民互相控争徃徃經年纍月延案莫結以臣愚見莫若將蘇松巡道駐劄崇明使其兼轄通州不但稽察私鹽匪類耳目易周一有小民争沙事發便可就近秉公清理矣一酌移閒員以收實效也查太倉州屬之寳山縣八都地方有名髙橋鎮與縣城隔一吳淞江人煙湊集姦良叢聚周圍五十餘里三面環江且密邇崇明興販私鹽者多係該地居民雖縣城設有巡捕員役鞭長莫及稽察難周臣查有顧逕司巡檢一員向駐寳山縣城内今縣城既有知縣主簿典史與武弁同城足資彈壓則此巡檢實屬閒冗應請嗣後移駐髙橋鎮地方一切匪類私鹽俾伊就近稽察以專責成於地方大有裨益矣以上二條臣管見所及是否可採伏乞皇上敕部議覆施行謹奏將所奏交與撫臣尹繼善再加斟酌奏聞如應具題具疏題請可也雍正八年五月二十八日巡察江南監察御史臣戴音保謹奏為敬陳管見仰祈睿鑒事竊臣奉命巡察江南遍歴上下兩江地方謹據見聞所及敬為我皇上陳之一專選驛道以肅郵政也竊照驛道一缺專理驛站馬匹雍正七年奉文毎年親自逐驛查閲一次但查驗馬匹必須熟習鞍馬之人親臨點視諭令如法餧飬方為有益臣見漢人行動必藉舟輿多於鞍馬未諳不若旗員自幼嫺習乗騎必能熟悉檢閲臣請嗣後驛道一缺亦照理事同知必用滿洲之例專選旗員補授俾令輕騎遍視分别去取諭以如法餧養庶毎年查驗方有實效而於郵政益加整頓矣一沿江之開窰採取土石宜禁也竊照江寜府句容縣所屬之龍潭地方至鎮江府丹徒縣所屬之銀山沿江南岸一帶俱係石山土岡屏障江邊綿亘九十餘里内包兩邑田畝外截長江潮汐設遇江水驟漲藉有山岡為之捍禦臣巡察沿江經行其地查九十里中開燒磚灰窰户共有三十四處石則開鑿燒灰土則刨燒磚瓦現在山石多有缺損土岡多有斷續將來積漸日久民田必受衝激以臣愚見仰請勅下督撫嗣後沿江一帶開鑿土石之處永行嚴禁其窰户人等令於内地無礙處所開燒庶田畝得資防捍而江岸永逺鞏固矣以上二條臣愚昧管見是否有當伏乞皇上睿鑒施行謹奏將廷議發來汝看明知愚昧管見故為瀆奏是何胸臆在汝不過閒中偶爾游戲之想獨不念朕萬㡬之勞乎觀此則汝毫無愛君之誠可謂人面而獸心矣同日又奏為請㫖事竊臣欽奉恩命簡任巡察自雍正五年十一月到任以來一切案件雖片紙隻字無不親自斟酌並無親信可託之人深恐精力未周致乖職守臣止有一子名戴福係監生年巳二十五歳在顯親王門下充當親軍校伏乞聖主洪恩准賞随任雖年幼未諳吏治尚屬小心謹慎或可稍佐臣才之不逮且臣得以不時教誨猶得勉期報效於將來也為此繕摺請㫖臣不勝悚惶之至伏乞聖主睿鑒施行謹奏既據奏請自然准將爾子賞發南來但恐未必佐汝不逮反至作禍耳慎加防範管教毋忽硃批諭㫖卷五十七
