body:
  text: 欽定四庫全書硃批諭㫖巻一百七十硃批噶爾泰奏摺雍正元年七月十一日廵視兩浙鹽課臣噶爾泰謹奏為請除墮民丐籍以廣皇仁以端風化事臣於雍正元年三月内見御史年熙以山陜樂籍沉淪日乆題請削除以正風俗當䝉聖恩憫惻敕部遵行中外臣民聞風懽舞臣今奉特㫖廵視兩浙訪聞紹興府屬之八邑有所謂墮民者細問土人并查紹興志書相傳為宋罪俘之遺故擯之而名以墮民其内外率習汚賤無頼四民中居業不得占四民中所籍不得籍即四民中所常服彼亦不得服特别以辱之者也又籍曰丐户自言宋將焦光瓚部落以叛宋故被斥曰墮民男子只許捕蛙賣餳逐鬼為業婦則習媒或伴良家新娶嫁為人髻冠梳髪或穿珠花羣走市巷兼就所私醜穢不堪辱賤已極實與樂籍無二間有流入他方者人皆賤之臣細思此輩在宋有應得之罪處之固宜今已墮落數百年生息蕃衍豈皆盡無廉恥實因無路自新是以終沉孽海伏乞皇上特沛恩綸請照山陜樂籍一併削除使堯天舜日之中無一物不被其澤豈獨浙省墮民生者銜環死者結草即萬世之後共戴皇恩於無既矣為此專摺跪奏伏乞皇上敕部議奏施行謹奏該部議奏雍正三年九月十一日廵視兩淮鹽課臣噶爾泰謹奏為報明癸卯綱經解等費用存銀兩事前經欽差部堂㑹同題定毎年額徴經費解費脚價等銀共七萬七千五百九十三兩零除扣存俸工代解土稅官役俸工紙張水手塘兵工食解餉齎奏領引等項一年約用銀三萬八千餘兩外餘剩銀三萬八千餘兩向係院道各半分為日用之需相應照舊應用等因併行運司遵照在案今據運司何世璂詳報前來查癸卯一綱經費解費脚價等項共該銀七萬七千七百八十一兩零内除一切公私項下開銷外臣存餘銀二千六百九十五兩零又庫内存有辛壬等綱未撥錢糧即有存庫水脚今辛壬等綱錢糧奉部撥解除支給解脚各費外仍有餘銀九千三百八十七兩零除運司應得一半外臣又有餘銀四千六百九十三兩零二共餘銀七千三百八十九兩零臣䝉皇恩調任兩淮清査浮費其存剩銀兩不敢絲毫隱瞞業經盡數節省存庫再查得欽差部堂㑹同題定存册内鹽院衙門書工承差各役等費又各商毎年自付使費銀共三萬九千五百九十八兩應存以聼該御史自行酌量節省應用等因在案今癸卯綱臣除應給書吏承差各役書工紙張飯食等項之外加意節省銀一萬五千七兩零合共節省銀二萬二千三百九十六兩零現貯運庫聼候撥解理合奏明伏乞皇上睿鑒施行謹奏爾之可嘉處朕筆諭不盡勉之勉之雍正三年十一月初八日廵視兩淮鹽課臣噶爾泰謹奏為敬承諭旨恭謝天恩事竊臣前奏為報明癸卯綱經解等費用存銀兩事一摺欽奉硃批臣跪讀之際感深泣下伏思臣何人斯受皇上天高地厚之恩御筆嘉予温綸勉勵臣肝腦塗地實難報稱惟有謹遵聖訓仰體聖心益自奮勉供職以盡犬馬報主之心於生生世世耳謹此具摺叩謝天恩伏乞皇上睿鑒謹奏凡人靡不有初鮮克有終須堅守此志勿使遷移勉之雍正四年七月二十八日廵視兩淮鹽課臣噶爾泰謹奏為㳟請陛見以申犬馬微忱事竊臣自䝉皇恩廵視兩浙繼又調任兩淮識淺才疎寸長未效迄今三載有餘未得一覲天顏時深孺慕兹又奉恩旨再留一年聖諭嘉奬温綸寵錫臣雖粉骨碎身不能圖報除另疏叩謝天恩外思欲趨赴闕廷叩請聖安跪聆聖訓但未經奏請不敢擅離職守為此跪懇皇上天恩准臣入京陛見以申犬馬微忱伏乞睿鑒施行謹奏朕從不無故施恩願受恩者朕即施之從不無故示罰甘領罰者朕即示之皆在爾等自取朕不預定成見也知此當勉所以永乆受恩之道此心此行切勿改移更不可稍有放縱爾請陛見甚好於九月下旬到京可也雍正五年正月十八日廵視兩淮鹽課臣噶爾泰謹奏為據實奏聞事竊臣䝉皇上天高地厚之恩於臣任内應行事宜固當勤愼黽勉即地方之事有所見聞亦不敢不據實陳察今將所聞據實奏聞謹奏覽雍正五年三月初十日廵視兩淮鹽課臣噶爾泰謹奏為恭謝天恩事雍正五年二月二十七日江寧織造曹頫自京回南至儀徴鹽所臣衙門臣跪請聖安曹頫口傳聖諭以臣等呈進龍袍及豐燈香袋等物皆用繡地靡費無益且恐引誘小民不務生產有關風俗特命傳諭微臣欽遵隨叩頭謝恩訖臣上年䝉皇上召進陛見三聆聖訓臣仰體皇上諄誡淮商崇尚節儉無事奢侈今復䝉恩諭勸勉敎誨益見我皇上惠愛元元保育羣生之至意臣惟加意恪遵仰體聖心凡兩淮衆商時時勸勉務使敦本崇儉醇朴成風耳為此謹奏向來奢侈風俗皆從織造衙門及鹽商富户興起天津此等陋習今被莽鵠立整飭四年以來較前已改革八九兩淮地方爾其竭力勸導之可也雍正五年三月十五日廵視兩淮鹽課臣噶爾泰謹奏為皇恩浩蕩難名犬馬私情未展叩詳題逹少報涓埃事據兩淮運使張坦麟詳稱據商人黃光德汪勤裕馬裕汪晉德公呈前事呈稱竊念商等辦運淮南荷䝉皇上洪恩疊沛深仁厚澤浹髓淪肌去歲商等公同捐輸原不過少效微忱實未足以仰酬高厚又奉恩旨即在揚州府起建義倉積貯米榖聖天子推恩薄海惠遍蒼生商等即欲將倉厫工程自行捐造因係營建之初不敢冐昧紊凟今義倉已經告成所有建倉銀兩商等情願一總公捐不敢動支庫項庶螻蟻微忱借以少申萬一伏叩轉詳據情題逹等情到司據此該本司查得商人黃光德等願捐建倉銀兩實係歡忭從事情切急公已於雍正四年六月開工雍正五年二月告成照原估極力節省銀一千三百九十五兩零實共用銀五萬一千三百一兩零已經造册送部查核在案今現奉俞旨於近竈之地建倉積貯米榖以僃賑恤似應詳請將四商願捐銀兩統於近場地方建倉積榖添用等情并據商人黃光德等呈同前由各等情前來據此臣目擊商人等願捐之心出於至誠不敢壅於上聞為此據實具奏伏乞皇上睿鑒施行謹奏覽淮商急公情詞似屬出於本心所奏知道了雍正五年七月十一日廵視兩淮鹽課臣噶爾泰謹奏為叩乞皇恩事伏䝉皇上特恩令於場竈就近地方著將商人乙已公捐銀二十四萬兩酌量建倉積貯現已進呈建倉圖式并開工日期另行具本題報外今臣衙門有商人公捐乙已公務銀八萬兩現存道庫叩乞皇恩賞准臣添作場竈建倉積貯之用臣受恩深重感戴難名犬馬之心萬難圖報惟有益加勤愼保商恤竈以仰副浩蕩洪慈養育羣生之至意於萬一耳為此繕摺具奏伏乞皇上睿鑒施行謹奏覽今命爾兼署布政司事須倣傚石麟為之萬不可渉於小見柔善沽譽希邀屬員感悅爾之操守朕可保不易但恐徇私情市小惠流為鄉原習氣耳勉之雍正五年七月二十四日廵視兩淮鹽課臣噶爾泰謹奏為聖主洪恩疊沛草茅報效無由叩鑒蟻忱據情題逹事據商人黃光德呈前事呈稱切商辦運兩淮至微極賤屢沐皇恩生全保育雖極頂踵捐糜不足仰報皇仁於萬一甲辰一綱公捐餉銀䝉皇上即於揚州起建義倉以儲積貯乙已一綱公捐餉銀復䝉皇上又於各場起建義倉以恤窮竈聖天子德竝生成仁育萬物必使普天率土無一夫不獲其所誠自古迄今聖帝哲王之所未有也但商以辦運微商屢邀異數而犬馬私情毫末未能報效近伏讀上諭念江浙户口蕃庶特命督撫諸大臣興修水利以重農工商不揣冒昧敢效微忱情願捐銀八萬兩上佐水利之需少報涓埃為此伏叩俯鑒愚誠據情題逹等情前來據此臣見商人黃光德情詞懇切願捐踴躍不敢壅於上聞謹據呈奏聞伏乞皇上睿鑒施行謹奏黃光德願捐情詞巳悉其所捐銀兩不必收受喻止之可也雍正六年五月初十日署理江南安徽布政使臣噶爾泰謹奏為奏明安徽布政司衙門一應事宜仰祈睿鑒事竊臣䝉特旨令署理安徽布政司印篆受事以來凛遵聖訓照前司石麟辦理兢兢業業勉力實心不敢茍安臣賦性愚蠢兼之布政司衙門事務頭緒紛繁一時難以周知不敢冒昧遽行具奏今辦理九月有餘諸事俱已查清所收錢糧亦有成數謹另單臚列進呈御覽伏乞皇上睿鑒謹奏此任非廵鹽可比廵鹽但能清楚錢糧即為稱職至藩司乃守土之官有率屬察吏之責兼且該督撫皆中常才具而魏廷珍尤屬巧宦惟知保身固位而已所以云爾此任實係繁難須勉之又勉公以服衆勤以補拙庶幾獲免玷缺少若愛惜精力瞻顧情靣因循姑息豈止有忝厥職更恐將來不勝其累也勉之毋忽雍正六年七月初六日署理江南安徽布政使臣噶爾泰謹奏為恭謝聖訓竝繳御批仰祈睿鑒事竊照臣署理安徽布政司印篆謹將署任事宜具摺奏聞䝉皇上批諭敎誡諄切勉勵維殷臣跪讀之下不勝感激惶恐伏思臣庸愚下質仰荷皇上屢賜敎訓有加無巳安敢愛惜精力瞻徇情靣姑息徇隱下玷職守上負聖恩惟有愈加黽勉欽遵聖訓勤以補拙公以服衆率屬察吏不敢稍懈仰答高厚於萬一耳所有奉到御批奏摺理合恭繳伏乞皇上睿鑒謹奏覽實力加勉以仰副朕望可也雍正七年正月二十五日署理江南安徽布政使臣噶爾泰謹奏為奏報安徽布政司衙門續收錢糧仰祈睿鑒事竊臣䝉聖恩命署安徽布政司印篆凛遵聖訓勤以補拙不敢偷安公以服衆不敢存私盤查所屬錢糧不敢稍有懈怠稽查屬員賢否不敢一毫瞻徇州縣火耗止於加一往年雜派禁革無遺總期潔已率屬察吏安民仰副我皇上澄清吏治愛養元元至意今將雍正六年五月起至十二月止一應錢糧數目另摺臚列具奏伏乞皇上睿鑒謹奏覽奏俱悉爾其竭力秉公為之料理錢糧固屬職分内事究以糾察屬吏甄别賢否為要務所謂勤之一字當身體力行勿致稍懈雍正七年二月初四日署理江南安徽布政使臣噶爾泰謹奏為恭謝天恩事竊臣家人於二月初二日回南捧到皇上恩賜福字臣隨即跪迎恭設香案望闕叩頭謝恩訖伏念臣至微至賤䝉皇上天高地厚之恩歴任鹽差委署布政數載以來諸事仰遵聖訓謹愼奮勉惟以始終不改時刻自警才識淺薄毫無報稱又䝉恩賜福字臣晨夕供奉如覲天顏一飲一啄更當知福不特臣一身即臣子子孫孫得以仰承天錫綿綿之福耳為此繕摺㳟謝天恩謹奏覽江寧城内正月以來連次被盗兼有旗兵種種不法舉動朕悉於他處聞之汝今何顏對朕若云不聞不見是乃無耳無目木偶人也如知之而隱匿不奏辜負朕恩有過汝者乎似此光景豈特不知福且恐福将盡矣思之甚為寒心向後倘仍然一味欺隱徇情沽譽朕焉用是好好先生為耶愼之戒之雍正七年三月二十日署理江南安徽布政使臣噶爾泰謹奏本年三月十五日臣家人回南捧到臣䝉皇上恩賜福字恭謝天恩一摺欽奉硃批臣跪讀之下戰慄恐懼無地自容本城内屢次被盜兼旗兵種種不法此等緊要之事臣實在如同木偶竝不留心疎忽聾聵之罪死有餘辜臣受皇上天高地厚之恩不特今生難報來生來世亦萬難圖報若臣知而匿不奏聞更應萬死臣實是尸位木偶竟未留心今䝉皇上格外施恩不即嚴加懲責猶賜硃批敎訓臣感泣羞愧如死方甦惟有仰體聖心戒愼自勉處處留意事事小心凡有見聞即據實具奏萬不敢辜負皇上天恩敎訓之洪慈也臣感激難名望闕泥首百叩請罪謹将臣訪確被盜案件竝應行嚴謹緣由另摺奏聞謹奏似此圖報甚為可嘉未留心三字豈可於朕前支吾明屬欺妄之言同日又奏今將江寧城内被盜應行嚴禁緣由逐一開陳伏乞皇上睿鑒一省城五方雜處街市寛濶巷道四通八逹盜賊便於行走其無柵欄之處甚多俱應添設柵欄責成居民輪流看守一城北地方空曠如紅土山等處聞得盜賊多在其間出入雖有派防兵丁不過虛應故事似宜派撥弁兵相地添設堆子更番實力廵查定以考核之法一城内鷹揚營地方寛濶營兵住居甚多其親戚子弟多遊手好閒之人交接匪類而匪類多藏匿其中旁人不敢過問應責令城守營嚴行稽查一江寧省城風氣一更二更街市燈火不斷正買賣喫食之時廵夜者坐轎騎馬燈籠火把僕役跟隨盜賊窺見先已迴避自三更以至五更廵夜者俱巳回家人盡睡熟盜賊便於行事且廵夜者多在熱鬧街道而深巷及城北空曠之處杳不一廵此廵夜虛應故事也一秦淮河在江寧城内有東西水關直通城外五月以後水漲客船遊船往來不斷盜船亦扮作遊船雜入九月以後水退又有小船停泊於夜靜捕魚名雖捕魚其間竟爲盜賊隱身寄食之地似應責成水城門嚴加稽查出入一乞丐之中有姦匪混跡為盜賊引線皆由丐頭容留丐頭之容留皆由地方官之不稽查如年壮無殘疾之人乞食者不許容留以上數端乃江寧城内多盜之由要皆地方文武玩弛如果實力嚴禁捕緝則盜賊自然歛跡矣又訪得各門上需索錢物不特旗兵亦有不肖旗員在内合併奏聞謹奏不但爾為木偶行尸闔城總督以下皆係無耳無目人也将此等瑣屑之務混行瀆奏觀爾誠然福盡矣直待奉旨後始行查訪以前所作何事既知地方上種種不應之處何以不言之總督將軍至今方奏聞耶雍正七年四月初二日署理江南安徽布政使臣噶爾泰謹奏竊臣前奏滿洲城内拏獲賊犯周二供報夥犯夥盜數處今上元江寧二縣俱已審明周二又在江寧縣供出積賊許二係副都統立柱衙役該縣業稟副都統將許二發理事同知衙門查審又訪察城内江寧上元二縣地方正二三月之内被盜之家共七處巳報官者三處未報官者四處又訪得城内三月二十七日十廟地方井内撈起爛屍一人遍身皆有傷痕城内非道路村荘可比有此等事皆地方官不嚴加廵查所致又訪得城内小倉地方營兵開場鬬雞輸贏俱至數十兩營兵係喫糧防守地方之人乃開場鬬雞賭博匪類因而聚集此皆由營將平日竝不稽查約束所致謹據實一併奏聞謹奏將此等事當一面申飭地方有司一面言之總督將軍及營將等共相約束稽查既在同城事關一體曷可膜外視之硃批諭旨巻一百七十
