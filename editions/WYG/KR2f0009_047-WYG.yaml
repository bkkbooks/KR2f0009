body:
  text: 欽定四庫全書硃批諭㫖巻四十七硃批呂耀曾奏摺雍正六年三月初一日四川按察使臣呂耀曾謹奏為恭謝天㤙事竊臣猥以菲材荷䝉皇上洪㤙格外擢用由道府歴陞今職於雍正六年二月十八日到四川按察使任所有微臣謝悃已詳請撫臣憲徳代題本日署按察司建昌道臣劉應鼎交下御製九日宴賞柏梁古體墨刻到臣隨恭設香案望闕叩頭祗領跪捧展讀仰見皇上龍章炳煥聖藻輝煌喜起同風賡歌應律洵屬太平盛事臣幸際昌期得邀寵錫惟恭敬珍藏奉為至寳理合具摺叩謝天㤙謹奏覽爾之老成謹慎朕所稔悉但恐蹈柔善依違黨援狥庇之習須事事秉公直循天理而無絲毫瞻顧囘䕶之心方為不負朕之任用也勉之雍正七年二月十六日四川按察使臣呂耀曾謹奏爲遵㫖摺奏事臣䝉皇上洪恩給假回籍雍正六年九月二十五日在西安府接京報一封内開怡親王大學士張廷玉奉上諭各省藩臬有准其具摺奏事者亦有本人未曾奏請具摺朕遂未曾降㫖者今思藩臬乃地方大員應准其各就所聞所見具摺陳奏且即此可以觀其人之居心辦事爾等可即寄信與四川按察使呂耀曾伊若有陳奏事件初次具摺差人交門上奏事人轉奏嗣後從何處轉奏朕再降諭㫖可也欽此遵㫖寄信前來臣叩頭謝聖澤兼訪問各官奉行之善否二十七日至綿州聞御史呉鳴虞朝令夕更語多游移縱容家人生事招欺隱理合具摺宻奏至四川通省仰賴刁誣察吏安民以報我皇上髙厚之恩於萬一至嗣後奏摺應交何處轉奏伏候皇上諭㫖欽遵奉行謹奏嗣後奏摺交大學士蔣廷錫轉奏同日又奏為遵㫖條陳事竊思東南為財賦之地而江浙兩省積欠或至數十萬負逋或至二十年豈盡經徴各官惰廢之故盖繁劇之區庶務雜遝而縣令不能兼顧也欽惟我皇上睿慮周詳於蘇松等郡分縣治理誠已區畫盡善縣丞印果三年内全完者即陞正印如徴不及數正印官罰俸一年者縣丞則降一級欠至三分者革職如此則進身有階既生其鼓舞向上之心而處分綦嚴自不肯以經徴之分數供正印之侵那矣再查直省地方有要缺中缺簡缺我敕各省督撫將該管地方分作要中簡三等預為奏明如遇要缺則於中簡之中擇才守兼優者一面人員補用一轉移間可為地方收得人之效臣䝉銜陞轉於地方實有裨益臣冒昧條陳不勝戰慄惶悚之至謹奏至如陞銜留任之説更屬迂謬久任之益雖三尺之童亦皆知之若不因懸缺待人奚必止限三年須知一切陞調皆出於不得巳而然汝可謂不諒朝廷用人之苦即􅈬汝一人而論若川臬得人又豈忍奪情特命爾在任守制耶大員缺出不得不挨次陞補設將保薦之員俱以陞銜留任三年則此間大貟要缺更將何人陞授所以云此論乃不通可笑之見也此諭非因嗔責而發不必驚懼朕不辭勞煩諄諄訓諭之意不過欲開拓汝之心胸兼亦令汝知朕用心之苦也向後如有陳奏不必過慮忌諱所奏是自當見之施行所奏非接朕訓諭亦可増長識見有益無損也將此批諭與憲徳趙𢎞恩看雍正七年六月二十二日署理四川布政使印務按察使臣呂耀曽謹奏為恭謝天㤙事雍正七年五月十九日奉㫖湖北廵撫印務著四川布政司趙𢎞恩前往署理四川布政司印務著按察司呂耀曽署理欽此隨恭設香案九叩謝㤙伏思臣一介庸愚荷蒙我皇上隆恩不次擢用歷陞四川按察使又奉㫖在任守制今復䝉聖㤙著臣署理藩篆聞命自天益深感戴於雍正七年五月二十二日接准前司臣趙𢎞㤙移交印信祗受視事一切應行事宜臣現在徹底清查次第舉行惟有益加勉勵恪供職守以仰報我皇上髙厚隆恩於萬一除詳請撫臣代題恭謝天㤙外理合繕摺奏謝謹奏矢志誠懇甚好勉之又勉可也同日又奏為敬陳管見事竊查直隸各州其地方較之各縣諒必稍繁現在本管錢榖刑名賴其徴比審理而又責之以董率所屬各縣綜理其刑名錢榖考課其賢否勤惰即才䏻諳練之貟亦恐有不能兼顧之處況府屬州縣多者不過十餘處少者或僅五六處或僅三四處今直隸一州其所轄之縣竟有多至五六處者他省臣不敢知川省潼川州所屬有射洪鹽亭中江蓬溪遂寧而又加以歸併安岳之樂至並本管潼川州一切事件較之中等之府尤屬繁冗州牧一身勢未能彼此兼顧以臣愚見似應仰請聖㤙勅下督撫將潼川州改設知府一貟統轄所屬七處潼川即改作附郭之縣再設經歴一貟如此則地方似有裨益矣是否可行伏祈睿鑒謹奏總在得人何必易州為府耶殊非急務所奏江西苧布一摺交部察奏硃批諭㫖巻四十七
