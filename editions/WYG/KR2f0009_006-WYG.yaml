body:
  text: 欽定四庫全書硃批諭㫖巻六硃批黄叔琬奏摺雍正元年八月初五日福建布政使臣黄叔琬謹奏為恭謝天恩事竊臣一介庸愚至㣲極陋荷䝉皇上逾格擢用陛辭之日跪聆聖訓指示周詳又䝉恩許具摺奏復荷欽賜聖祖仁皇帝御用物件異數殊恩逾分已極小臣感愧情深惟有益勵清操盡心職守以仰答皇上天恩即以上報聖祖天恩於萬一耳臣於六月二十二日到任隨望闕叩首謝恩訖理合繕摺奏聞謹奏汝等兩司之職例不徑奏今許汝宻摺奏達切毋藉此挾制上司而失屬官之體若遇督撫有不合宜處只可宻行奏聞不可向一人聲揚一省之中豈有兩撫臣之理履雖鮮不加於枕權不畫一上輕下重則章程紊矣汝凡事當與督撫開心見誠據汝所見一一告知以憑處斷倘上司有欺隱以及狥私不法之弊必實有􅃀據方是汝應行奏達之事其尋常地方諸務與督撫共見同行之舉陳奏之任在督撫而不在汝也即宻奏亦不宜頻數恐上司生疑忌之心於汝反為無益汝但勉力秉公實心効力朕自能洞照也特諭同日又奏為報明庫項銀兩事竊臣䝉皇上天恩補授福建布政使所有一切存庫錢糧前因盤查未清不敢草率具奏今徹底清查共應存銀七十九萬七千餘兩實在存庫銀只有四十餘萬兩其三十九萬六千餘兩一係從前各標營借支俸餉及預支船工等銀二十五萬九千餘兩臣現於按月領餉時扣除今已㫖著落伊子石泰賠補除陸續追繳外尚未完銀九千六百餘兩現在嚴追俟完日另摺奏聞總之福建藩庫向來借支動用相沿巳乆今自臣抵錢糧以期無負聖主委任至意至各州縣虧空現在督撫與臣酌議封櫃補苴以清帑項如有私派重耗苦累小民者臣仍不時查訪據實掲㕘再閩省地方事宜或有應奏者容臣次第訪􅃀始敢奏聞合併聲明臣謹奏次第訪奏可也但須慎宻倘不宻致令督撫處有一毫風聲逹於朕耳則係爾自干罪譴毋怪朕之不爾寛恕也雍正元年八月二十一日福建布政使臣黄叔琬謹奏竊閩省司庫錢糧數目臣業經繕摺恭呈御覽自臣摺奏之後續據各營将建曠銀兩解送司庫前後合算共應存庫銀八十萬九千餘兩至沙木哈虧空一項已於八月二十日盡行完補訖兵餉船工一項除陸續扣回外尚欠銀二萬餘兩因公挪用一項除催解完補外尚欠銀七萬餘兩臣仍按月将應扣回者扣回應催補者催補俟有成數另行奏聞臣因交盤限迫各項尚未完結隨詳明督撫䝉批此係繕摺奏明奉有上緊料理之諭㫖似未便於送部結内再行聲明致干指駁仰即照例速具册結詳送立等核題等語臣再四思維督撫既稱係奏明奉㫖之事未便復行掲出惟在督撫與臣謹遵聖訓實心料理則錢糧自可完結是以照例出具册結至按月扣餉不至苦兵催解俸工不至累民之處臣自當仰體皇上恤兵愛民至意時刻在心不至上煩聖慮合併聲明謹奏此事該督撫業經奏明懇恩從緩完結今爾據實宻奏更屬可嘉凡事惟以無欺無隱為務勉之但於上司處切勿稍失體統事無兩大朕未有於一省之中用兩三督撫之理也特諭雍正元年十二月二十六日福建布政使臣黄叔琬謹奏為遵㫖再行奏聞事臣前摺奏因公挪用銀十萬九千兩經督撫二臣奏明以俸工賠補一項奉有御批遵即檢查原案復加宻訪實係修理戰船津貼運費添補不敷銅價整備水師軍器火藥供應杭兵來徃夫船修理各處河灘資助㣲員回籍及歴年賞給廵緝山賊官兵飯食併省中應辦各項公事夫船脚價等項總之閩省公用皆取給於俸工彼時因俸工尚未解到遂将正項挪用以致有十萬九千之數自臣到任以訖封印已經歸補五萬餘兩未歸補者尚有五萬餘兩現在陸續扣補至沙木哈自已虧空銀兩誠如聖諭所料不止於此但臣未到任以前聞撫臣已嚴催其彌補臣到任後逐一清查止虧空二萬四千餘兩理合具摺陳明謹奏所奏知道了百凡切勿徒為他人任過總以無欺無蔽為勉雍正二年九月十二日福建布政使臣黄叔琬謹奏為恭繳御批事臣齎摺家人回閩所有臣於雍正元年十二月二十六日具奏遵㫖再行奏聞事一摺復䝉皇上批示臣恭設香案跪捧展誦仰見天語諄切訓誨備至體恤小臣有加無已臣自顧庸才邀此皇恩感激􅋺􅅥惟有恪遵聖訓實心勉力安分盡職不敢少有欺飾以期無負聖主委曲成全至意敬将硃批一件恭繳謹奏慎莫效法乃兄之為人保全首領要𦂳同日又奏為報明庫項銀兩事臣䝉皇上天恩授以閩藩重寄自雍正元年六月到任清查司庫挪用銀十萬九千餘兩督撫二臣奏明以歴年俸工抵補奉㫖允行在案今臣於雍正二年八月将前項歸補已完實貯在庫並不敢稍有揑飾理合奏明再司庫正項錢糧合地丁鹽課并雜項共實存在庫一百七萬餘兩除應行支放者照例支放外其餘凡有借支臣不敢絲毫擅動以致虧缺臣䝉皇上特恩超用無可仰報天恩惟有慎重司庫錢糧以期無負聖主委任至意謹奏知道了觀汝之二兄如此居心行事即汝此奏朕亦難信矣雍正三年三月初四日調補廣西布政使臣黄叔琬謹奏為恭請聖訓事竊臣一介庸材備員閩省屢䝉皇上天恩訓誨周詳勉勵備至臣日夕凜遵猶恐不逮今復䝉聖恩調補廣西布政使臣於三月初八日起程前赴新任伏念粤西諸事皆所未諳我皇上明睿所照無逺不届仰懇天恩俯鑒臣愚詳加教誨指示俾臣知所遵循庶幾勉竭駑駘以仰報聖恩於萬一耳謹奏爾誠能秉公除私矢志効忠焉徃而不可否則爾之二兄便是前車覆轍朕從來用法不事株連即父子亦各論其是非爾若以手足之誼為重君臣大義為輕斯又在爾自為之也至於爾之見用於朕原因從闗外差峻回京朕特加賞鍳而㧞擢之實無一人薦舉或於其間有将朕之特恩設詞誑爾以為係彼力量吹嘘所致世間此等無恥負國之人容或有之朕則不得而知爾其自勉朕不蓄成見於中也同日又奏為恭繳御批事臣齎摺家人回閩所有雍正二年九月十三日具奏恭繳御批一摺報明庫項銀兩一摺並䝉皇上批示臣恭設香案跪捧展讀天語煌煌訓勉備至聖恩髙厚曲賜矜全臣兢惕􅋺惶感激無地惟有恪遵聖訓竭力供職循分守法居心行事不敢稍有瞻狥以期無負聖主格外優容至意敬将御批二件恭繳謹奏但務實行總不在言語之間也雍正三年八月十三日廣西布政使臣黄叔琬謹奏為報明庫項銀兩事竊臣䝉皇上天恩調補廣西布政使臣於雍正三年五月二十七日到任所有司庫銀兩臣按册細加查核除已經支放外應存司庫銀共一百二十七萬餘兩内督臣孔毓珣先經題明借𤼵鹽價銀六萬兩尚未補還外實應存司庫銀一百二十一萬餘兩臣即逐一驗兑俱係實貯在庫理合具摺奏明伏乞皇上睿鑒為此謹奏所奏已悉又奏折色之事一摺候朕面諭新撫鄂爾泰酌定施行同日又奏為恭繳御批事臣進摺家人回粤所有臣本年三月初四日具奏恭請聖訓一摺恭繳御批一摺均䝉皇上批示臣恭設香案望闕叩首敬謹捧讀仰見我皇上大公至正無㣲不照訓誨勉勵諄切周詳臣􅋺惶兢􅅥感激涕零惟凛遵聖諭秉公除私矢志效忠以仰報髙厚於萬一斷不敢重手足之私情違事君之大義以自取罪戾至臣以一介庸才恭逢皇上御極之初奉差復命䝉皇上召對逾格擢用主知特達臣夙夜銘心刻圖報稱如有無恥負國之人設詞誑臣若為其所愚是臣同其不肖矣臣即當宻行奏明斷不敢為之隱諱臣愚賤下情本不敢上瀆天聽䝉皇上開天地父母之心曲賜矜全諄諄指示臣不揣冒昧謹此奏聞敬将御批二摺恭繳為此謹奏天下臣民咸在朕胞與之中無一人朕不欲矜全之然肯保全與否又在汝等自為之如汝之二兄朕何法以矜全之耶於凡百處勉之慎之朕之涇渭斷不致混淆也硃批諭㫖巻六
