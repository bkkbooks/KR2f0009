body:
  text: 欽定四庫全書硃批諭㫖巻一百十五硃批田畯奏摺陜西涼州總兵官臣田畯謹奏為奏聞事竊臣叨沐皇恩畀以封疆重任自今嵗奉㫖撤兵於八月初九日抵涼州任所隨即清查標屬各營兵馬錢糧盔甲器械一切營汛事宜縁軍興以來節次征防以致營伍凋敝甲胄破損及不足者十有四五查涼州鎮標設公費步糧一百二十五分涼屬永昌營設公費步糧二十四分莊浪營設步糧一十六分其餘大小營分或設步糧十二三分以至守糧二三分不等臣准督臣岳鍾琪来文涼州應製辦帳房六百頂鑼鍋六百口令在藩庫先借銀兩作速製造其借過庫銀即将公費扣還臣即遵照領銀製造至營中盔甲破損及不足數者臣將製造鑼鍋帳房餘剰銀兩飭令五營作速補造至永莊二屬各營盔甲臣俱嚴飭該營官弁将各營公費糧餉作速料理製造再臣承准督臣岳鍾琪遵㫖委署甘提印務於十一月十五日抵甘署理隨查提標五營額設盔甲帳房火藥器械等項亦皆大半損壊不全臣查提標設有公費步糧一百五十分即嚴飭五營将公費糧餉製辦修補齊全以濟實用所有查過臣標屬併甘提標破損及不足盔甲鍋帳另具一摺恭進御覽謹奏盔甲器械通融公費修補整齊以壯軍容甚屬可嘉但須實力奉行勉之陜西涼州總兵官臣田畯謹奏為恭繳硃批諭㫖仰祈睿鑒事竊臣扵雍正五年二月二十四日自涼州起程赴京陛見行至臣屬土門堡地方有臣齎摺千總捧到皇上硃批諭㫖臣即望闕叩頭謝恩訖伏思整飭營伍乃臣職分當然荷蒙天語褒嘉臣跪讀之頃惶悚靡寜惟期勉竭駑駘實力奉行稍盡犬馬之職於萬一臣謹将硃批原摺恭繳伏乞皇上睿鑒謹奏覽如果言行相符有何惶悚靡寜䖏廣西提督臣田畯謹奏恭請皇上聖安朕安軍需案内爾與韓良輔李佛保皆係一例處分朕因爾應賠之數尚不甚多粤西又未得勝任之人従寛留爾在任賠補但既有此一事更當扵操守勉力一生功名人品豈只值數千金耶凡關利之一字當避如蠆毒方能保全功名始為不負任用扵此一字少見不透則将朕知遇之恩付之流水矣勉之慎之同日又奏為奏聞事竊臣蒙皇上隆恩簡用提督到任之後查粤西舊案苗獞相殘俱以逺年仇隙起釁二三年來仰賴我皇上徳威夷民漸知禮法土司不敢玩縱惟離城窵逺之苗獞間有捉人羇禁索銀勒贖搶掠耕牛霸占田産之事雖該管文武極力拏究而此風尚未盡息臣細加訪查夷性頑悍輕生法非所畏惟遷徙地方則既不能占踞産業又不能固結惡黨且地利不熟獨力難支是以夷情所畏惟在扵此臣愚意欲因其所畏者以治之則可移風易俗嗣後流土地方之苗獞如有不遵化導仍聚衆仇殺者除正犯治罪外其餘家口令該管文武清查造冊詳報督撫核明遷徙鄰省地方安插於禁止仇殺似有裨益是否可行伏乞聖裁謹奏此法甚妙可與督臣詳細商酌如應題奏㑹疏具題可也廣西提督臣田畯謹奏為備陳粤西情形仰祈睿鑒事竊臣查南丹土州地方舊有錫礦間出銀砂自界油米等物俱在獨山州搬運由黄坭哨蠻尾塘入厰日用終未缺乏礦徒仍未驅盡臣細訪礦厰之弊富者出資本以圖利貧者賴傭工以度日惟聖明乾斷臣再查廣西苗猺㺜獞内從前肆惡者惟思明土府之鄧横為最近年以來漸次歛跡臣查其可以化導者諭其遷善如怙惡不悛臣即設法擒治本年七月十六日據署上林營守備周得勝禀報有富川縣民蒋友榴居西林縣巖康地方租土惡潘定逺之山地栽種粟米今嵗大熟定逺主使抱甘等恃强割去繼而友榴及妻俱被殺害伊弟友鏡控於西林縣将抱甘等拘拏審訊途間被潘定逺父子叔姪率領多兇搶犯而去臣即檄行泗城副将就近協拏又於八月十六日據西林令申稱潘定逺等窮兇極惡案積如山請𤼵大兵擒𠞰等情臣又檄令思恩副将委備弁各一員帶鎗手兵二百名併行撥土田州土兵二百名㑹同泗城安隆上林三營官兵與該縣前去擒捕務獲潘定逺等以正其聚衆搶犯之罪理合繕摺具奏伏乞皇上睿鑒施行謹奏類此等事務須籌畫萬全而行方無後悔切毋多事致損國威朕扵數千里外難諭是與非也此事自當與督臣詳酌為何摺中並未提起廣西提督臣田畯謹奏為奏聞事竊臣於八月内據西林縣申報土惡潘定逺等當官搶犯請兵擒𠞰一案臣業經具奏即於九月内官兵齊集路程地方潘定逺等咸知畏懼即與潘兊抱甘等自赴行營投到十月十五日據泗城副将撥差弁兵押解到省臣即移交撫臣韓良輔轉𤼵收審外至思明之鄧横寨臣行文勒令砍竹毁垣繳械去後隨據思明同知把總等回稱前至該寨諭以禍福現在自行砍毁併繳出鳥鎗十數桿其寨内人口俱經該同知查點訖臣又咨㑹左江鎮臣齊元輔嚴查該寨但有器械令其盡繳将竹圍伐盡根株以免日後復恃為非其餘各寨亦次序料理臣惟仰體皇上好生之徳凡遷善者即予以自新仍怙惡者必須擒治縁係地方事宜理合據實奏明謹奏所奏知道了但爾等封疆大臣切記不可偏於柔善姑息以養姦成患好生固屬美徳又須揆酌情理假如縦豺狼以傷物命亦可謂之好生乎若無害扵地方民生原非豺狼可比好生二字更不必言矣凡涉於沽名干譽之事皆不可為勉之慎之廣西提督臣田畯謹奏為叩謝聖訓事竊臣伏讀御批荷蒙主恩諄諄指示臣下愚陋質不勝感激惶悚所有禁止仇殺一事臣遵㫖與督臣孔毓珣商酌外查南丹土州礦厰督臣同臣俱差将備㑹同地方官至厰宣布皇上徳威示諭礦徒人等作速散歸不許逗留礦徒及買賣人併婦女約有二萬咸遵法紀於九月内盡行散去其井口房屋自行燒燬臣思此厰僻在土司之中必須添設一汛以専責成現在咨商督臣俟酌定妥議後另摺具奏至臣請令開採之奏惟見目前相安未慮後日滋事及跪閲硃批諭㫖睿慮周詳無微不燭始知臣之粗疎愚昧如夢方覺也荷沐聖慈寛宥理合繕摺奏謝謹奏朕所倚賴者爾等封疆大臣将地方事宜籌畫妥確奏聞扵朕酌量施行方得治理之要若皆似爾将地方此等大事一味草率孟浪全不向人商酌任情瀆奏令朕遥定於數千里之外及自知不是又毫無愧怍但以如夢方醒數句頌聖空言結局則大負朕之倚賴矣况朕簡用作夢之人寄以封疆重任則朕亦何有無微不燭之明耶爾愧與否朕則不知朕實深愧乏知人之明奈何奈何廣西提督臣田畯謹奏為叩謝天恩從寛賠補軍需事竊臣一介武夫虚糜厚禄屢沐洪恩極人生未有之榮遇即捐糜頂踵難報萬一兹因軍需案内有臣應賠之項更沐聖慈寛宥許臣在任賠補且荷天語誡諭不啻家人父子臣跪閱之下感激涕零惟有誓竭犬馬之力不敢稍負初心以仰報髙厚之恩耳理合繕摺奏謝伏乞皇上睿鑒謹奏朕今日之恩為爾暫時之榮他日之辱又在爾自取與否也勉力全在去詐偽而已欽哉毋忽莫少差爾念廣西提督臣田畯謹奏為恭繳御批事雍正五年十二月臣標把總齎回奏摺二件又六年正月十一日齎回奏摺三件二月二十七日齎回奏摺三件俱蒙皇上硃批臣跪接至署叩頭開函敬閱臣蒙主恩委以邊方重任才庸識短思慮不周屢沐𢎞慈訓諭臣慚懼彌深敬謹匪懈諸事務求切實以期仰報髙厚之恩於萬一耳所有節次奉到硃批理合恭繳謹奏諸凡實力為之但能勉行朕自有鑒照不在言語章奏間也廣西提督臣田畯謹奏為奏明地方情形事竊西隆州八達寨土惡顔光色顔光東等同惡相濟不服有司拘喚本年二月内據西隆州知州詳請官兵先将首惡顔光色擒𠞰懲一警百臣宻咨督撫商酌捕治隨准督撫二臣咨覆臣即飛檄署泗城副将速飭上林安隆二營守備遣撥弁兵前往㑹捕續據署上林營守備呈稱顔光色等糾合西林縣屬之弄芒寨目岑顛等刦殺焚擄惡燄愈熾臣據報飛咨督撫商酌已定於三月十一日行撥泗城思恩二協上林安隆二營精兵七百名又撥土田州土兵三百名俱令署泗城協副将常顯虎統領調度又差臣標中軍守備熊文舉兼同辦理軍事擒捕首惡解散餘黨其八達寨與滇黔接壤臣宻咨貴州安籠鎮臣併檄行雲南廣南營叅將互相堵禦訖俟事竣之日業已㑹疏具題本年二月内弁兵到厰駐防凡外来礦徒永無潛聚之患矣惟南丹土知州莫我謙世守其土向來私收厰稅臣屢飭莫我謙親往厰地督率土目将各處礦口填塞堅固乃敢怠緩推病且不嚴束土目毫無公忠為國之心臣已屢咨督撫嚴飭矣理合繕摺奏聞伏乞睿鑒謹奏是礦厰一事既欲清釐必須徹底料理不可少有疎忽仍令如故也廣西提督臣田畯謹奏為調𤼵官兵擒治土惡以除民害事竊照西隆州八達寨土惡顔光色等肆惡殺擄一案經臣咨㑹督撫酌撥漢土官兵一千名委令逰擊常顯虎等前往擒捕先行化誨續據該逰擊等禀報有顔光色之子到營投見懇請寛限勸伊父出投該逰擊縦之還寨冀其悔罪投首後據報稱顔光色等多備鎗礮率衆拒敵請再撥田州土兵四百名及大礮三位經右江鎮臣段宗岳𤼵給礮位添撥土兵去後臣又咨右江鎮預備官兵五百名聴候右江鎮就近移調併咨明督撫在案隨准督臣孔毓珣咨覆巳照㑹右江鎮酌量移調官兵親行統領調度就經鎮臣段宗岳行調思恩協千總一員兵一百名移調左江鎮標逰擊一員千把二員兵三百名又帶領該鎮標千把三貟兵一百八十名扵六月十二日已抵附近八達寨之八陽駐劄臣又據逰擊常顯虎等禀稱五月十四十八兩日進兵鎗死惡黨二十餘人而助惡岑扭巳經誘獲六月初四日思恩協把總李光玉帶兵護糧遇賊截搶被傷身故後官兵齊至打傷十數賊人軍糈並未失去其惡黨岑顛聞右江鎮親統官兵進勦即潜遯廣南地方臣巳咨明雲南督撫提臣檄行堵禦協拏矣而顔光色仍據險不服七月初三日准鎮臣段宗岳移知蠻惡寨後逼近雲南猓猓地方惟貴州安籠鎮雲南廣南營與八達寨甚近可以聲援業巳移調安龍鎮標官兵四百名廣南營官兵二百名俟㑹齊合勦等語又據逰擊烏元度禀報六月二十日攻取賊人礮臺羅千總被傷身故損兵二十二名查賊勢如此猖獗臣與撫臣郭鉷商酌再撥臣標逰撃一員千把四員精兵四百名馳赴八達策應務擒兇惡以靖地方至逰擊常顯虎按兵待賊投首坐失機宜實屬庸愚臣巳嚴加申飭令其立功贖罪事關撥發官兵及鎮臣移調鄰省官兵理合具奏伏乞皇上睿鑒謹奏爾之調遣委撥均屬不堪之極此等大事豈可不扵深知灼見之弁貟中量才器使以收其臂指之效而乃如此輕忽從事耶廣西提督臣田畯謹奏為奏聞事竊照西隆州八達寨土惡顔光色等負固不法先委逰擊常顯虎帶兵前往擒捕因與西隆州知州劉徳健聴信就撫遂致賊黨修險抗敵及鎮臣段宗岳親赴八達調遣即與西隆州知州劉徳健議論矛盾彼此争論以致糜餉日久坐老其師後扵進兵之日屢次傷損備弁兵丁是以臣統率官兵馳赴督勦業将起程日期具疏題報兹臣於八月二十八九等日行至西林縣地方據安籠右江二鎮臣咨文内稱顔光色顔光東業已被殺八達土人将賊首獻出等因到臣但思首惡雖誅尚有賊子光應光賛併賊家屬黨羽未獲恐貽後患臣即率騎兵前進約計四日可抵八達俟到日酌行撫勦以靖巢穴併善後事宜另為㑹商具題所有微臣據報情由理合具奏伏乞睿鑒謹奏無恥已極除静聴䖏分之外尚何顔具此一奏也廣西提督臣田畯謹奏為叩懇天恩俯允陛見事竊照八達兇逆已滅巢穴已焚兹臣班師回栁凡經過地方俱皆寜静懇祈聖恩俯允微臣赴京陛見恭請天語訓誨庶嚴疆事宜有所遵循而犬馬戀主之心亦獲稍慰矣理合奏請伏乞皇上睿鑒謹奏已有㫖命鄂爾泰總督廣西矣爾尚靦顔具此一奏能無愧乎硃批諭㫖巻一百十五
