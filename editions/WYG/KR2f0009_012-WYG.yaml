body:
  text: 欽定四庫全書硃批諭㫖巻十二上硃批布蘭泰奏摺雍正三年正月初八日山東布政使臣布蘭泰謹奏為再叩天恩事竊臣於雍正二年十一月二十四日奉旨特授山東布政使於十二月十五日到任即詳請巡撫代題恭謝天恩今臣到任之時正值東省祈雪仰賴皇上福庇濟南府屬於十二月十五日雨雪自午時起至亥時止隨據各州縣陸續報到俱於臘月得雪普遍霑足皆我皇上聖徳感通故有此豐年之兆臣不勝欣忭之至謹奏知道了京中雨雪亦得霑足誠可喜也雍正三年四月初七日山東布政使臣布蘭泰謹奏為敬陳採訪事宜仰祈睿鑒事臣䝉皇上簡拔之恩力圖報効凡地方利弊務期悉心採訪據實奏聞查東省六郡其濟兖東三府地當孔道耳目易及至登萊青三府所屬多在海濵漁舟商艘徃来出入保無逃盜姦宄及販賣硝磺米穀一切應禁之物所當酌量布置以期永乆無弊者臣細加察訪㕘以臆見謹條列上奏一則兵船宜扼要巡防也一則海口宜分别堵決也一則海舟宜給單查騐也一則海口宜撥員抽税也以上數條係臣細訪熟籌不揣愚昧敬陳末議伏乞皇上俯賜採擇諭令撫臣陳世倌與登州鎮臣黄元驤㑹同查議具覆如有可行於封疆事宜國家經費不無小補謹奏此事海陸攸關可説與陳世倌黄元驤着伊等詳查妥議宻奏到日再定雍正三年七月二十六日山東布政使臣布蘭泰謹奏為仰體聖衷事竊查東省六月内陰雨連旬據各州縣申報水災共四十餘處濟南府屬之禹城平原一帶地勢平坦積水更多已經撫臣陳世倌檄濟南府知府飛行查勘設法宣洩此二處房屋倒塌較他處為甚恐窮民無依漸至逃散臣仰體皇上視民如傷之念捐銀一千五百兩遣經歴司前往速行散給貧民俾能葺茅自蔽毋致流離以仰副我皇上痌瘝小民之至意又據報間有數州縣綿蟲生𤼵但此時序届仲秋禾皆堅實有蟲亦不能傷其未報災地方可望廣收且幸米價亦不昂貴無煩聖慮謹奏已有旨賜賑矣汝等當必勤必慎籌畫周詳更嚴督所屬官吏實心奉行務令小民均沾實惠以仰副朕己飢己溺之懐同日又奏為敬陳管見以資弭盜事竊臣䝉皇上格外隆恩捐糜難報目擊東省盜案繁多所有防盜末議敬為我皇上陳之竊惟地方失盜定例文武並有處分但州縣官有刑名錢穀之繁勢不能專緝盜賊則凡盜案之先事巡防事後追拏自宜營弁專司其責臣竊見東省汛兵𩔖皆怠惰成習其墩臺之在大路者有兵一二名虚應故事在僻路者並無人守望至於沿海礟臺向日並無兵丁其營房竟為虚設近日風聞皇上有差官巡查之信營弁始撥兵丁一二名看守是以盜賊縱横毫無忌憚臣請定盜案處分之例凡遇地方失事該汛守禦之員較文職加一等治罪其統轄将弁較文職上司亦加一等治罪則立法既嚴兵弁知所畏懼更請将守汛兵丁竟令移家就汛在臺畔居住俾得晝夜巡邏該汛千把即於汛地要害處駐劄不時查察仍乞皇上嚴飭督撫提鎮諸臣轉飭所屬之副㕘遊守各巡其所轄之汛地與千把㑹合仿照水師會哨之法按汛稽查周而復始名曰會巡至於州縣官亦宜練習民壯督查捕役令其於寺廟歇店之處時加跴探踪跡一有可疑即刻報知臺汛兵弁協力擒拏更有請者山東之盜莫強於響馬而行刧多在道路一貴於臺汛之瞭望一貴於飛騎之追趕應於各墩臺之上懸鐘一口各墩臺之下繫馬二匹以便不時探追飛傳各墩併力協拏似此豫備防緝則盜皆歛跡響馬不敢横行矣為此謹奏所奏緝捕盜賊頗合機宜然文員守土亦有干係當嚴保甲實力奉行可也大槩天下文員皆以捕賊推卸武弁而武弁又皆以緝捕兵丁拚命擒獲交與有司有司各畏㕘罰率将大盜問成竊賊而盜賊之多俱由平日縱容匪𩔖漫不稽查之所致此等文武互相推諉之處朕所悉知故於即位後諄諄飭諭督撫提鎮捕緝盜賊亦可謂嚴切之極矣無如盜案並不見少而轉較多所以近日命九卿詳議欲差專官往各省監察捕盜正在此議尚未定也此奏甚合朕意摺留中同日又奏為遵旨再奏事前以上干天聽事具摺欽奉硃批著陳世倌據實㕘奏若有不便之處爾再行據實具奏候朕特㫖頒𤼵仰見我皇上至聖至明曲體臣下之意臣敢将不便之故敬凟宸聽臣以受恩深厚凡有見聞不敢欺隱而於撫臣之前恪守屬員之禮從未嘗以恩准摺奏宣露矜張今若以奉有硃批相告恐其不信又不敢以皇上硃批傳示此不便者一也撫臣與李樹徳前後同任以其族大人衆恐招怨尤此不便者二也至於李元偉之貪劣惡蹟撫臣非不深知特恐據實題㕘則有礙以前之該管上司未免多所顧慮此不便者三也臣與李元偉非有私嫌宿怨特以其素行貪汙雖經陞任粤中而虧空之案抗延不結似此劣員豈容漏網伏祈皇上俯賜察訪如臣言不妄乞特發明旨以儆貪邪抑臣更有冒凟聖聰者撫臣陳世倌清亷率屬勤勞辦事但未免優柔不决臣受恩深重遂不避嫌怨力為贊勷如原任布政使侯居廣家屬躭延十年不肯歸旗臣立督起程如原任濟南府知府張振偉逗留東省乆不解部臣已立押起觧又如新被􅄁革之濟南府同知朱紹開􅀝恃親黨傲慢狂妄於委署長山縣任内虧空正雜錢糧一千七百餘兩又將長山縣先被叅革沈令入官衣飾等項輙私自抵換種種不法臣已檄行濟南府􅃀審俟審明之日揭請續叅總之臣蒙皇上天地隆恩故不畏權勢不狥情面寜受衆人之怨不敢負皇上之恩所有原奉硃批敬謹呈繳并敢披瀝蟻忱仰祈聖明鑒察謹奏勉力為之秉公持正招羣小之怨尤叨一人之眷顧孰輕孰重孰是孰非况昭昭在上斷不負忠誠人也不必瞻前顧後自然有益無害雍正三年十月初九日署理山東巡撫印務布政使臣布蘭泰謹奏竊臣䝉皇上於議叙銀庫諸臣恩加二級復䝉天語褒嘉臣撫心自愧銀庫利弊俱係聖明洞悉臣不過遵奉訓誨獲免罪戾䝉皇上恩施格外業經詳請撫臣代題恭謝繼以撫臣陳世倌奉旨進京又䝉特恩令臣署理廵撫印務伏念臣待罪藩司已懼隕越加以署撫重任益深悚惕惟有勉䇿駑駘以仰報皇上知遇之恩又於九月内家人賫回奏摺欽奉硃批跪讀之下仰承聖訓啓廸當益加䇿勵所有硃批奏摺二扣謹奏繳不勝感激依戀之至謹奏所奏已悉總要堅守初志慎莫隨境而遷爾之受福不可量也同日又奏為仰體皇仁賑恤災黎事竊查東省被災州縣已節次題報在案叠奉諭旨飭令地方官加意經理勿致一夫失所綸音宣布萬姓歡騰經撫臣陳世倌委員領賑臣於署事之後𤼵銀散給己於彚報秋禾被水案内具題請旨但動用銀兩之處䟽内未獲聲明謹據實摺奏計今次被災共五十一州縣濟南府屬領銀九千兩兖州府屬領銀五千二百兩摭留饑民銀七百兩東昌府屬領銀一萬四千一百兩摭留饑民銀八百兩武定州濱州屬領銀三千五百兩濟寜州屬領銀二千三百兩泰安州屬長清一縣領銀五百兩又續報之夀張曹縣領銀一千五百兩摭留饑民銀一百兩并八月内賑恤倒塌房屋之齊河等五州縣先散給過銀七千四百九十二兩共賑銀四萬五千一百九十二兩已經散給在案内係撫臣陳世倌捐銀一萬二千四百九十二兩臣捐銀七千六百兩按察司董永芠捐銀三千兩運使今陞江蘇布政司漆紹文捐銀一千五百兩又奏明存留餘銀移觧藩庫捐賑銀四千一百兩濟東道吴興業捐銀一千兩兖寜道徐湛恩捐銀一千兩濟南府知府姚譲捐銀五百兩鹽運分司宋懐金捐銀一千兩兖州府知府吴關杰捐銀五百兩東昌府知府金啓洛捐銀五百兩登州府知府蔡日逢捐銀一千兩以上共捐銀三萬四千一百九十二兩尚不敷銀一萬一千餘兩暫動存庫耗羡支給仍容臣等俟餘耗捐補還項臣仰體皇上已饑己溺之聖心竭力辦理務期災民得所間有一二流移亦俱摭留囬籍其餘未被水之州縣各有收成可無煩宵旰之慮也謹奏爾等體朕痌瘝之念如此實心經理朕覽之不勝欣慰書曰安民則惠可嘉二字尚不足以奨爾等之効力處也雍正四年二月初一日湖南巡撫臣布蘭泰謹奏竊臣庸愚陋質荷䝉皇上㧞擢廵撫湖南已将到任日期恭䟽題報叩謝天恩訖臣前於赴任之時由武昌過江一路巡查自岳州至長沙沿江一帯塘汛俱各嚴宻獨長沙府屬之湘陰縣南接湘江北枕洞庭最為扼要止有千總一員守兵十數名未足以資城守容臣細籌将皇上面諭湖南墾荒錢糧不均命臣㑹同督臣湖北撫臣確議臣於路過武昌之日已向二臣面宣旨其設局鼓鑄一節固屬流通泉源裕國便民之要務但恐多一事即多一弊臣入境以来即廣詢錢價并取市錢騐㸔長沙岳州一路每淨似無庸另議鼓鑄也至於地方大小官員留心察肖之員自當據實題㕘所可慮者苗猺雖乆已向化而桀驁之性到底聖裁謹奏所奏俱悉雍正四年三月初二日湖南巡撫臣布蘭泰謹奏欽惟我皇上勤恤民隠凡有關閭閻生計者無不時厪聖懐臣於正月初五日到任後即飭查所屬地方雨雪情形米糧價值今據布政司彚報湖南所屬於雍正三年十月内均得雨澤十一月内得雪大小不等十二月内雨雪霑足正月二月雨水調勻現在米價倉斗每石中米八錢六分上米一兩五分不等目今農務正興栽種遍野禾苗𤼵旺佇慶豐登皆由我皇上敬天勤民㤙膏普被之所致也理合具摺奏聞謹奏果能澄清吏治令兵民歡悦何愁不感召天和乎至於刑名案件惟貴速結不拖累無辜為第一好事若有意寛縱廢格王章而自以為積陰功則無是理也同日又奏臣䝉皇上面諭湖南墾荒田糧苦樂不均急宜清釐臣凛遵聖諭於到任後即遍加察訪知窮民以攤荒受累者固多而劣衿蠧胥欺隱者亦復不少本年正月内據布政司将安仁縣地畆詳請减則臣不敢草率具題已另檄衡州府知府茶陵州知州會同確勘矣竊思墾荒一案歷年既乆屢經委丈調丈徒累窮民終無實效臣謹遵聖諭令據實自首免罪將從前所收籽粒一槩免追并許代為題請准照例寛限三年後陞科已經出示在案猶恐此輩欺隱既乆堅不自首反使無賴小民借名紛紛告訐有負皇上息事寜民至意輾轉躊躇終無良䇿因思各州縣經管田畆造冊科糧者俱係里書以一里之人稽一里之地有無欺隐自可一詢而知已宻飭各州縣嚴訊里書令其據實開報亦通行在案俟欺隐之弊一清而攤荒受累者自當仰籲聖恩豁免以甦民困所有清查欺隱縁由合先具摺奏聞併臣所行自首告示暨宻飭牌稿另摺敬呈御覽謹奏朕經屢諭此事非得實心任事有才有守之州縣雖出示千張何能清欺隐之弊此處不容性急惟次第緩緩料理方能中其肯綮萬不可輕忽更當細心籌算應如何行方為允妥主見定時必先奏朕請旨再行朕再閲爾牌稿示稿總失之於鹵莽矣爾既欲如此作為何不少待通省官民知爾心跡爾亦周知屬員之賢否或應去應留斟酌妥當時然後舉行易於成功也今遽爾行之里書不肖輩保無借此而生詐騙之事乎州縣各官必能照爾所宻飭秉公而為之乎欲速不達殊為可惜看爾報効心切自恃公清凡事過於太急身膺封疆重任無一不宜徹始徹終即一小事亦不可率爾而為之也諸凡慎重詳悉為要官民尚未知爾爾尚未知屬員此等事如何一面奏聞一面即行耶将此論亦與朱綱看雍正四年三月十九日湖南巡撫臣布蘭泰謹奏為奸民不法檄兵會捕事臣到任以来欲一清積惡以安良善訪有辰州府屬之沅州已革副榜余景福係打死州民周君仁之媳成氏兇犯奉旨嚴拏在案乃該犯負嵎倔強抗不到官懸案四年未結臣於本年二月内差役二人帯同州役四名前往捉拏己伺其不備将該犯拏獲行至一里之地竟被黨族多人打奪而去旋據該州移營撥役并民壮數十人復行捉捕詎該犯兇横更甚執持鎗仗打傷州役現在刧去三人今據該州具詳以該犯所住地名後山層岩叠嶂且藏有兵器負固猖獗非撥兵擒拏難以弋獲叠報前来臣伏思皇上恩威逺播即殊方異域莫不効順兹余景福以犯法奸民跳梁無状竟敢抗官拒捕目無王法若不痛加懲創将來刁民效尤何所底止謹一面奏聞一面咨明總督提鎮會飭營弁撥兵協拏務在必得罪人以昭國法但恐遽行題報有駭聽聞故宻摺具奏伏乞皇上睿鑒又沅陵縣惡棍顔正溆浦縣惡棍黄鰲辰溪縣惡棍謝録正俱係恃強不法現在緝拏除黄鰲一名已經投到檄臬司審理其顔正謝録正俟拏獲䆒擬一併具題合先陳明謹奏此事應如是料理但凡遇此等事件極當慎重萬全而行不可孟浪輕舉看此一事光景可行措置清楚後應具題處即行具題雍正四年四月二十六日湖南巡撫臣布蘭泰謹奏欽惟我皇上勤恤民隱凡有關小民生計者無不時厪聖懐兹據布政司詳稱湖南所屬栽種禾稻者多播種二麥者少統計七府二州麥秋收成有七分八分九分不等自正月至四月雨水霑足米價亦平現今米價倉斗每石上米一兩次米九錢再次米七錢五分不等黄豆價每石五錢一分六錢五分至一兩不等大麥價每石六七八錢不等小麥價每石六錢五分七錢二分至八九錢不等又臣於本月十六日至鄉村勸農見秋禾俱已長茂仰賴皇上福庇年歲自必豐登謹奏深慰朕懐然必待收割後方講得豐登二字也同日又奏竊臣於三月内将奸民不法事上凟天聽以奸民余景福等素行不法俱曽聚衆拒捕圍城辱官乃漏網遊魂擅敢出入乗轎跟隨數十人各帯刀棍防護形同草寇臣訪聞既確倘仍前容隱不急剪除萬一此輩肆無忌憚謀渉不軌為患滋大臣即去任之後以曽經巡撫此地亦難辭失察之咎故不揣冒昧一面奏聞一面移咨督提諸臣檄兵會捕今於四月十七日據沅州協副将牛玉呈報差千總曹上迎帶兵五十五名并沅州吏目帯領民壮同赴余景福所住之處見聚衆二百餘人放礮呐喊千總等竟束手而歸又據沅陵縣知縣吴底柱禀稱遣典史帯役持臣檄前往顔正所住之處諭散惡黨詎顔正竟将縣役綁縳而去如此狂悖王法何在但營員亦有地方之責豈容膜視或以未經奉旨不妨䄂手旁觀若非仰仗天威恐此軰終難緝獲伏乞皇上将余景福等姓名宻諭督臣提臣鎮筸鎮臣協力擒拏務期必得庶國法昭而地方藉以寜謐矣臣不勝悚慄待罪之至謹奏朕已諭督提二臣矣但爾初到地方上一切事宜尚未詳悉此等舊事何必如此急躁未免涉於孟浪爾未周知地方情形地方上屬員百姓亦未信服爾之居心行事如此輕躁必有錯失慎之一字在爾分中較清勤二字當更加勉凡事當與朱綱商酌朕曽諭爾此人練達爾若恃才輕人必喫大虧且屬員風聞無稽之談如何可為慿據爾試思實心為上司者能有幾人遇事未免張大其詞豈可輕易聽信爾等比不得朕倘有進欺誑之言於朕者一經覺察即治以罔上之罪爾等若被人所愚惑難以聲言只好吞聲忍氣而巳老成持重爾之所短也同日又奏臣查湖南所屬虧空數百兩之州縣十居六七若欲一概㕘處恐不勝其㕘况州縣官一經㕘革之後便借無可借幫無可幫雖追比經年終難完補頻㕘虧空於錢糧䆒竟無益臣惟嚴飭道府不時盤查許其設法彌補倘仍不足數便從重題㕘至於命盜案件查湖南舊習外結者多有司習罔之罪又臣標兩營有鳥鎗手四百餘名每隔數日即令其操演但買備火藥窮兵未免嗟怨臣例有坐糧二十分除已将十分分給宣講聖諭生員并臣衙門巡捕買辦員役外今将所存十分年之子来省進見臣因伊父係有名之臣與他一會數言而别臣以人臣義無私交且恐其有所關睿鑒謹奏如果平等待人心無偏倚人亦不怨也但雖不見面必接之以禮以謙和好言遣退方為情理兼盡同日又奏竊臣於正月内備陳辦銅一本實因湖南素不産銅漢口一鎮所集之銅僅足供湖北一省採辦赴滇購買而滇省又現在開罏鼓鑄亦屬購買維艱前據布政司具詳前来臣故據詳具題復於三月内准部咨令浙江湖北湖南三省撫臣作速會題嗣准浙撫臣李衞移會前来臣以銅觔關係兩局鼔鑄刻不容緩其獨辦於浙與分辦於楚均屬朝廷公事難容互諉況近奉部議有舊銅亦許觧交之例較為易辦臣故於浙撫臣會稿註題在案所有前經臣題請歸併浙省採辦近又與浙撫臣會題仍歸各省分辦縁由伏乞皇上睿鑒謹奏百僚師師庶績其凝辦事原要隨時變通不固執已見方是前後互異何妨同日又奏臣查塘汛兵丁舊例俱係按月更換其坐塘之兵有離家數里或數十里者眷戀室家不無往返探視曠役離汛之弊且所居塘房此去彼来有如傳舍不特任其傾頽兼有拆木毁薪之事故塘房歲需修葺營員責成於有司而有司又以經費無出互相推諉臣稔知此弊飭知營弁令塘兵㩦家赴汛以省往返兵丁頗以為便但塘兵原屬提鎮統領號令不齊難以畫一臣愚以為塘兵挈家其便有五敢為皇上陳之一則塘兵無内顧之憂也一則塘兵無分㸑之艱也一則塘兵有協助之美也一則塘兵有聫絡之勢也一則塘房可免歲修之累也其塘兵中或有抜補病故等事即将塘兵之弟兄子姪頂補便可永逺在塘無遷徙之患更為利便至於塘兵既不換班難以隨操恐致技藝生踈臣請飭營員限五日一至塘汛巡查即於巡查所到之塘考驗塘兵鎗箭又令㕘遊等官按月各巡其所轄之汛隨塘考驗如此則塘兵雖不赴操演而技藝亦不致生踈矣如果臣言可採祈勅督提諸臣遵旨奉行於地方不無禆益謹奏此事爾等同省文武諸臣共相籌度審擇利便而行庶幾可耳朕不便頒諭前晉撫諾岷亦曽條奏如此舉行頗費經營盖造塘房給與搬移之資彼時似乎有益至今又有言此事甚不恰當者復在此作更易之想凡地方興改一事必詳悉周到慮及永逺無礙方可措施少有見不到處莫如仍循舊例不可因一時之見遂輕率而為之也雍正四年六月二十二日湖南廵撫臣布蘭泰謹奏臣查寶慶府屬之城步縣靖州屬之綏寜縣兩相接壌逼近苗猺所報命盜案件多係苗猺抄殺又據兩邑士民以苗猺肆害呼籲前来計惟有添設重兵防禦庶幾苗猺知所畏懼不敢横行隨檄兩司詳議并移咨督提二臣會商今於綏城二邑適中之黄桑坪地方欲設營添兵以分防筸子隘清水隘鎮夷哨地林哨新寨等處苗猺出没之所再查湖南屬之銅鼔五開平溪清浪四衛俱已奉文歸併黔省應撤回守備一員千把四員共應撤兵丁二百八十餘名即以此撤回兵弁移駐黄桑坪尚不足應用應另行抽撥但守備微員難於統轄須設一㕘遊大員以資彈壓其官兵衙署營房等項在於本省設法公捐修造正在咨商確議俟妥協之後會同督提二臣具題請旨再臣前所奏湘陰縣兵丁今已准督提商酌於長沙協抽撥兵十三名合之原在城兵十七名共三十名足資湘陰城守矣合并奏聞謹奏與督提商酌妥協行同日又奏竊臣愚昧無知前因自首欺隱一摺䝉皇上訓誨周詳無微不到臣跪讀再四感激涕零已凛遵聖諭令各州縣寛期查報矣又遵旨将硃批諭旨與朱綱看該司跪讀之下不勝感激力圖報効以仰副皇上均勻苦樂之盛心再照此案已據武岡州靖州武陵縣等處各詳報自首頃畆到臣亦並無因清查欺隱致相告訐者臣仰體皇上訓誨之聖心俱飭州縣於秋收後緩緩查核所有欽奉訓諭理合奏謝謹奏虚心與朱綱商酌為是看爾心有餘而力不足諸事毫無主宰惟隨朕所諭而轉移朕深居九重從未一至湖南若事事待朕教導則大悮矣遇事虚懐咨訪件件詳審庶不致大差謬爾一日外任未曽經歴若不敬慎而自恃已見則覆餗是虞苐可惜爾一片忠愛之心也勉力學問同日又奏臣前以奸民不法事上凟天聽内有溆浦縣惡棍黄鰲自行投到該犯雖素行不打死郭應鳳兇犯抗官拒捕不法已極前於四月二十九日據辰州協中軍都司李汝良拏獲到案臣現檄按察司審擬業将獲犯日期題報在案其余景福謝録正二犯雖屢經官弁緝拏飭地方官設法擒拏毋任脱為此謹奏前據爾所奏已飭諭督提矣今復如此具奏何其矛盾之至是何心也殊屬不觧同日又奏臣查湖南地方入夏以来早稻漸次成熟不意五月以後雨水過多廣東廣西之水由永河而至衡河至長沙又雲貴之水由辰河而至常徳至岳州以致永州府屬之祁陽常徳府屬之龍陽武陵沅江長沙府屬之善化益陽岳州府屬之巴陵澧州等州縣有被水淹没之處具報前来臣已飛檄委員查勘并加意撫恤毋致小民失所其餘各州縣衞早稻俱已成熟據布政司彚報總計收成有七分至十分不等各屬米糧價值亦平現在米價倉斗每石六錢五分至九錢五六分不等黄豆每石五錢至六錢四五分不等大麥每石三錢四五分至五錢不等小麥每石五錢七八分至六錢二三分不等其餘中晚二稻應俟秋成後另行奏報謹奏天人交感其應如響封疆大吏其或經理紕繆則此等事至矣汝其慎之雍正四年九月十二日湖南巡撫臣布蘭泰謹奏臣查湖南地方早稻收成已於前次具摺奏聞兹據布政司朱綱彚報長靖等七府二州内除岳州府屬之澧州巴陵臨湘華容安鄉岳州六州縣衞常徳府屬之武陵龍陽沅江三縣各具報田禾被水已經委員踏勘成災具題在案至長沙府屬之善化湘隂益陽三縣永州府屬之祁陽一縣俱經勘不成災其餘所屬各州縣衞之中晚二稻俱已收割約有七八九分收成不等米價亦平現在上米每石八錢五六分至九錢不等中米每石六錢四五分至八錢不等黄豆每石六錢三四分至八錢五六分不等大麥每石三錢一二分至五錢七八分不等小麥每石五錢二三分至七錢一二分不等自入秋至今雨水調勻理合奏聞謹奏知道了務湏據實具奏毋得絲毫遮掩以自蹈粉飾之咎同日又奏竊查湖南武陵巴陵等十三州縣夏被水災於六月内先後報到臣一面委員踏勘一面請旨賑恤臣與布政司朱綱公同設法將被水漂没房室之貧民先行撫恤俾免流離於七月初六七等日𤼵武陵縣銀二百兩𤼵巴陵縣銀二百兩𤼵華容縣銀二百兩𤼵安鄉縣銀二百兩𤼵益陽縣銀一百五十両𤼵沅江縣銀一百五十兩𤼵龍陽縣銀一百五十兩𤼵臨湘縣銀一百五十兩𤼵澧州銀一百兩𤼵岳州衞銀一百兩賫交各該州縣衞會同委勘官散給其善化湘陰祁陽等處被災原輕毋庸散給臣所設法散給之項原屬無多未敢上凟聖聽今善化等四縣勘不成災經臣具題在案而成災之武陵巴陵等九州縣已於八月二十四日接准部咨欽奉恩㫖賑濟現飭該地方將常平倉穀按戸散賑俟賑畢之日另疏題報目今水勢已退窮黎叨沐皇恩咸慶更生理合具奏恭慰聖懐謹奏凡此等事必當嚴飭屬員竭力奉行務令小民得沾實惠方不負為民父母之任若人稠惠寡再加以剋扣侵蝕茍且塞責虚應故事何異杯水輿薪也廣耳目勤訪察方克有濟同日又奏竊查奸民余景福謝録正顔正等藐法横行為害已非一日臣於六月二十二日具摺奏聞之後於七月初二日准督臣咨欽奉上諭交與督提二臣将奸民余景福等嚴拏務獲移咨到臣欽遵在案隨於七月初三日䝉皇上批𤼵臣二次奏摺到臣奉硃批朕已諭督提二臣矣仰見我皇上厪念邉方翦惡安良至意除余景福顔正二犯已先後就獲惟謝録正一犯猖獗異常臣數次檄拏抗不服拘督臣李成龍即委辰沅靖道張廷樞提臣趙坤即委都司李汝良領兵前往擒捕去後據報該犯於所住之青山宰牛放礟聚衆拒兵又統衆出掠沿家歛米種種肆横提臣趙坤隨檄護鎮筸鎮印副將魯璵調撥沅標都司桂棲鳳鎮筸標守備劉瀛洲各帯兵星往隘口堵截會擒該犯於七月十六等日屡次抗拒官兵詎該都司李汝良違慢軍令遷延不進以致鎮沅之兵亦不敢擅入直至二十四日進兵賊已逺遁無跡前後止擒到謝賊之母易氏賊弟謝列侯謝勝瑞并賊軍師李英士等但謝賊雖經兎脱而法在必誅不容任其竄逸臣於聞報之日即星移署督臣鄭任鑰提臣國法謹将前後捕賊情形恭摺奏聞謹奏此擒獲首惡之人甚屬可嘉朕自另有恩旨爾等亦當重加奨賞以示鼓勵之意雍正四年九月十七日湖南巡撫臣布蘭泰謹奏竊臣於九月初九日出闈之後即將奸民謝録正逃遁情形繕摺具奏嗣於九月十五日據辰沅靖道張廷樞辰州府知府汪立名鳯凰營通判白豐瀘溪縣知縣陳煥辰谿縣知縣劉必逺各報稱自謝賊逃竄後即多差兵役分途搜捕於本月初五日探知謝賊在黔陽辰谿溆浦三縣交界之賴子崖深箐藏匿於初八日戍刻各役衝鋒深入拏獲賊人謝録正謝義正謝爵吾并家屬男婦十二名口等情前来臣現在會同督提二臣具疏題報外兹恐上厪聖懐合先具摺星馳奏聞再照賊人所住之青山等處前因拒敵官兵鎗火延燒居民房屋臣已檄辰沅靖道張廷樞查騐俱係草房目今賊已就擒居民各歸安業而延燬房屋之居民露處堪憐臣飭該道將臣前所檄𤼵賞兵銀内酌給貧民以資修葺并檄該縣將逃避謝賊之民廣為撫輯俾各安居以仰副皇上綏靖邉方至意理合奏聞謹奏所奏已悉料理俱為合宜此事起初朕惟恐爾渉於孟浪故為多事之舉今揆厥始末實有不得不然之勢爾能如此實心安輯地方朕甚嘉奨之另有恩綸下頒也勉之勉之雍正四年十一月二十二日湖南廵撫臣布蘭泰謹奏竊臣於本年二月三月兩次奏摺内奉有硃批諭旨令臣試看布政司朱綱按察司何錫禄何如據實奏聞臣前以莅任伊始與両司共事未乆不敢冒昧具奏今臣與朱綱共事十個月與何錫禄已共事半年看得朱綱為人練達辦事實心何錫禄存心寛厚辦事勤謹臣試看既確不敢不據實奏聞伏候皇上聖鑒謹奏所論此二人甚公且當何錫禄恐過於柔年亦老矣朱綱朕雖未見其人觀其辦事才調可謂一能員同日又奏竊臣叨沐聖恩於山東布政司任内公私費用之外實存銀七千五百餘兩臣於雍正三年十一月陛見時奏明䝉皇上賞臣作新任盤費臣隨㩦帯以作長途食用并到任後公私日費至六月内已經用完只得向藩庫借公項銀二千兩應用係牌行藩司非敢私自支取但所借雖係耗羡究莫非公項錢糧急宜還補臣京城内有住房一所價銀三千三百兩有地一處價銀五百五十兩臣已令姪孫善住作速轉售將所借銀二千兩交還藩庫以清前項理合奏聞謹奏覽汝所奏殊為可笑我朝清亷督撫頗不乏人未聞皆典賣田宅以供任所薪水之資也必若此而後可則無田無宅之人雖賢如龔黄亦不得為督撫矣魯論云雖小道必有可觀者焉致逺恐泥正為此等處言之且汝將田宅所售用完時又當如何措置耶直省督撫奏朕各有萬餘金公費可作養亷兼作犒賞之需今覽此奏朕實無褒奬之語以加汝也幸汝平昔操守心術為朕所知猶信汝不是挾詐但未免哂汝局量褊淺狹陋不識大體耳同日又奏竊臣於本年正月到任後仰體皇上整飭官方至意恐各衙門有相沿陋規不無𣲖累理宜清查於前任驛糧道劉業長進見時隨諭令將該道衙門弊竇據實查報後據該道具詳將一切陋規開列請盡行裁革又據兼攝驛糧道事按察使何錫禄查得該衙門鹽規向係每年一萬八千兩經前督臣楊宗仁禁革又驛站錢糧亦經前督臣楊宗仁禁革陋規議定每正項一兩觧坐平銀一分五釐以作道員飬廉等因禀覆到臣復經臣将該道衙門一切陋規再行嚴飭刋榜永禁外只有漕糧舊規每正米一石收銀二分共該收銀三千兩零作為糧道押運抵淮官役盤纒并總漕衙門雜費勢不可無若抵淮迅速尚可餘銀三四百兩又有馬價一項每馬一匹扣銀一兩留作兵部兵科奏銷飯食使費難以再革約計驛站奏銷各費共用銀一千八百餘兩臣查戸部刑部俱有飯食銀兩則兵部兵科飯食事同一例但係未經奏明之項臣不敢隱匿理合據實奏聞伏乞睿鑒謹奏觀爾如此作為又大不合矣據奏一切陋規盡行裁革朕實難批不可行三字以為訓爾為一省綱領但當正已化屬使不至侵盜帑項剝削民脂斯可矣焉能禁屬員不飲食耶爾以儉約自許尚有朕賞賜銀七千兩又有房可售有地可質猶堪支持歳月若遇清苦守令等官出身寒素者爾意竟欲令其枵腹從事乎如此是令天下人視宦塲為畏途成何規模爾器量狹小殊不諳封疆體統居督撫之任豈可效曩日守藏吏之所為朕連閲二摺甚憂爾一切料理俱不能合適中之道如何如何雍正五年正月二十五日湖南巡撫臣布蘭泰謹奏臣查湖南所屬各州縣自上年十月至今年正月有得雪者有得雨者大抵雨水稍多再查闔屬米價於上年冬每石八九錢不等近因各處買運者多以致米價騰貴現在中米每石九錢至一兩四五分不等上米每石一兩一錢至一兩三錢不等較之上年米價已為昂貴所有雨雪情形米糧價值理合奏聞謹奏初春觧凍雨雪微多何害惟看繼此之調順與否耳同日又奏竊查湖南屬之武陵龍陽澧州等九州縣衞於雍正四年夏被水災奉旨賑濟災民沾沐皇恩得以更生但其中有貧苦尤甚之民所領賑穀雖可暫延冬月而今年春二月間農工未動無䇿資生臣與署督臣傅敏籌畫接濟春熟之法隨飭九州縣衞於已賑災民中確查貧苦尤甚之戸再賑兩月按戸每月給穀六斗照穀價折銀據布政司册報武陵縣需穀一千九十石八斗龍陽縣需穀六百二十五石二斗沅江縣需穀三百八十八石二斗巴陵縣需穀一千八百三十石華容縣需穀一千八十石安鄉縣需穀六百三十石臨湘縣需穀九十石澧州需穀三百一十五石岳州衞需穀二百六十三石四斗以上九州縣衞接濟春熟共穀六千三百一十二石六斗按每石三錢五分之數共計折銀二千二百九兩四錢一分不動正項於雍正四年三分耗羡内支給臣已飭各該州縣衞照數領銀趁封印無事之時親歴鄉村按戸散給以濟青黄不接延至東作俱興貧民傭工度日便可不至流移矣為此謹奏嗟此窮黎實厪朕懐况春省耕而補不足古之道也覽奏曷勝忻賞雍正五年閏三月初二日湖南巡撫臣布蘭泰謹奏竊查社倉一項原係前督臣楊宗仁檄行司道府州縣等官倡捐穀本與士民樂輸之穀石臣徧飭州縣查報并面詢各員僉稱此項穀石係當日各官虚報捐數取悦上司原未能實貯在倉至士民樂捐之穀係聼從民便難於抑勒大抵存倉者不過十之二三竟有顆粒未交者向日各官以此項無關考成因循玩視上下相䝉不可䆒詰伏查此案奉上諭社倉之設宜緩不宜急宜勸諭百姓聼民便自為之而不當以官法䋲之又奉上諭社倉之法亦宜趁此豐年努力為之勿但視為虚文故事各欽遵在案臣請先将當日之司道府州縣等官倡捐穀本未交貯倉者仍於各員名下按數追還除病故産絶之員無從着追者量與豁免外其餘陞遷他省或已經歸籍歸旗者亦分别着追其次紳衿貢監按照當日樂捐數目押交上倉至於小民樂捐之穀未經交出者令地方官照册報姓名數目勸諭入倉間有當日勸諭之時原屬勉強今更窮苦無力者即将原册姓名豁除另於有力之家勸輸務期實貯在倉庶幾社倉一項不致有名無實而小民緩急有賴矣是否可行伏乞聖明指示謹奏社倉最為備荒良法豈可有名無實查其中有被官吏侵蝕者自應催追至百姓以及紳士有願捐而未交者斷不可催逼只宜鼓舞勸諭令其樂從方為善舉爾之識見庸淺諸事當咨詢傅敏照伊所區畫㕘酌而行可也同日又奏雍正五年三月十五日鎮筸總兵李佛保赴任路經長沙臣出郊恭請聖安鎮臣李佛保宻傳上諭巡撫布蘭泰前奏稱借用藩庫公項銀二千兩伊欲賣房地抵還爾傳諭布蘭泰凡作督撫者當從大處起見不可見小若是他人具此等摺奏便屬欺詐布蘭泰為人原是如此這所奏是他本心朕不惱他欽此臣跪聆之下惟有惶悚感愧叩頭謝恩伏念臣以菲材荷䝉皇上任使愧無報効之處又蠢愚至極獲咎實多聖恩寛厚不加罪斥前奉硃批訓誨周詳臣既感且愧今鎮臣李佛保轉傳上諭臣不禁感激涕零惟自矢殫心竭力冀圖報効於萬一理合奏謝謹奏爾總是志量卑鄙惟在不相干小事上著意非封疆才也此時當青黄不接之際朕待報湖南雨水情形既特使人來摺奏何雨水糧價竟無一語及之汝任地方之責試思寕有大於此事者乎惟硜硜自信一點操守斤斤為這幾兩錢糧至於事之緩急輕重則惛然無知閲此數摺皆不過為銀米而奏似此胷中看銀錢如許重大何操守之足貴耶同日又奏竊臣屬之九架夾鉛壠前經撫臣潘宗洛題准有商人王綱明開採後因壠深砂盡於康熙五十三年停止嗣於雍正三年三月准部文商人邱道正等復採九架夾白鉛後據郴州知州佟國元詳稱九架夾白鉛礦内雜産黒砂請黒白兼採等情臣咨請部示於雍正四年十月十九日准到部文令黒白兼採在案臣查黒鉛即是銀母除鉛觔照例二八抽分外煎出白銀除去商人工本之外例與商人均分一半以充國課今據郴州賫送雍正五年二月分所抽黒鉛税銀冊臣細加查核總計一月内所獲黑鉛一萬一千九百餘觔煎出白銀一千九百一十九兩零臣恐其有煎多報少與官役侵分之弊現在駁查臣駐劄長沙離郴州千有餘里耳目難周湏委一道員專司其事監視商人開採煎煉據實抽税以杜煎多報少與地棍官役𤓰分之弊臣更訪聞靖州屬之會同縣産有金砂係土人偷採因面諭兩桂營㕘將范毓䭲宻行訪查兹據禀稱會同縣花窑寨山内砂石淘出金子土人楊莫章等偷挖等語臣復令查勘確實并另行宻訪有無可以開採之處另摺奏聞謹奏此事亦與傅敏詳悉商酌開採一事目前不無小利人聚衆多為害甚巨從來礦徒率皆五方匪𩔖烏合於深山窮谷之中逐此末利今聚之甚易将來散之甚難也至於利之在公在私尚屬細事百姓足君孰與不足爾果欲効忠藎何必諄諄以利為言豈不聞有一利必有一害要當權其利與害之輕重大小而行之耳雍正五年閏三月十二日湖南巡撫臣布蘭泰謹奏竊湖南界連黔粤苗民雜處前因綏城二縣為苗猺出没之地請於二邑適中之黄桑坪設營添兵以資防禦臣謹遵諭旨與督提并貴州督撫咨商妥協業經會疏具題在案此外尚有謬冲花苗恣行刧擄擾害生民臣已屢檄地方文武嚴督兵役協力擒拏縁苗峝險阻鎗火銛利人不能入臣准巡察臣黎致逺以民害未除等事咨移到臣内開謬冲花衣苗殺擄搶奪日益猖狂應行殲殪以示懲創等因臣隨飛咨督提并咨商黔粵督撫去後臣查花苗出入要路一名地角隘一名里林隘在湖南屬之靖州一名木洞屯在黔屬之五開衞非兩省㑹擒則入此出彼終難弋獲於本年二月三月疊准貴州督撫提督各将撥兵堵禦擒拏縁由咨覆到臣又准督臣傅敏咨稱已檄靖五協副将吴文帯千總一員兵一百五十名前赴地角隘口都司劉䇿名帯千總一員兵一百五十名前赴里林隘口其木洞屯一處巳咨移貴州撫提飭黎平副將帯領弁兵前来會合於閏三月内訂定日期三路齊進協力擒拏等因又督臣書函内開相距窵逺鞭長不及囑就近料理臣受恩深重現與督臣悉心籌畫務在剪除兇孽令民得安枕以仰副皇上綏靖邉疆至意為此謹奏螳臂當車猶作搏輪之勢兵力不稍單弱否攘外安内必期一勞而永逸克詳克慎籌畫萬全為之同日又奏竊臣查保靖土司較諸司頗為強大其土官彭御彬年少縱恣衆心不服前於請斥婪監等事案内經臣題㕘奉旨将彭御彬革職提審在案臣查該土司中漢土交搆上下猜疑屢相刧殺目今官叅印摘衆情渙散據禀報桑植土司原革職土官向國棟操權殘虐土人男婦逃竄邊境等因臣恐土人流入内地飛檄岳常道楊晏星馳前徃已將逃避土人諭歸本土并飭護印向氏好為安撫土衆毋得殘虐業已邉境安堵其土官向國棟土目向朝先等現發臬司審訊臣以土司擾害不特有干國典且恐流毒邊疆而改流之舉又事關重大容俟兩案審結之日會同督臣具題臣合先將兩土司情形奏聞謹奏爾之識見平常此等大事獨持管鑰朕心有未愜當與督提熟籌可否不可見隣省有改流之事遂一時髙興亦欲效倣百凡只宜揆情度理實與地方百姓有益者為之毋得無故生事硃批諭㫖巻十二上欽定四庫全書硃批諭旨巻十二下硃批布蘭泰奏摺雍正五年四月二十四日湖南巡撫臣布蘭泰謹奏為分别催科以清積欠事臣前䝉聖恩簡任山東布政檢查錢糧舊欠有積八九年未清者今任湖南巡撫通查所屬錢糧其按年全完者固有而積欠未清者亦復不少䆒其拖欠之故不在小民而在紳衿貢監盖小民之家田既無多糧亦有限惟紳衿貢監田廣糧多又縁護符在身敢於抗欠地方有司竭力催追礙難責比以致拖欠累累毎届奏銷將未完之數總歸民欠其實欠在紳衿貢監者十之六七或奉皇恩蠲免則此輩獨䝉其利以故視拖欠為得計甚有詭寄他人之田包攬别戸之糧積弊牢不可破臣請飭各州縣按照圖甲將紳衿貢監錢糧另立一單催比毎歲開徵之期先比紳衿後比民戸如民戸應四月完半紳衿貢監則定限三月内完半民戸應九月全完紳衿貢監則定限八月内全完倘有拖欠按分數治罪庶使惡紳劣衿不敢倚恃護符而州縣官亦無瞻狥情面之累一切詭寄包攬諸弊不嚴而自絶於國課實有裨益矣是否可採伏祈皇上睿鑒謹奏所奏剗除積弊甚是朕已調爾巡撫江西矣通省錢糧邁柱毫不瞻顧已全料理清楚而怨者甚衆今爾至江右如乗輕車馳廣陌可以徜徉無礙湖南此一招怨之事汝當為王國棟措置井井使其接任從容敷施毫無掣肘方見忠愛之誠汝等受朕㧞擢之恩臨事當任勞任怨但求利國無分彼此不可以身調他省曲貽去後之思認恩推過沽買虚譽不少留地步於後人如伊都立觧任時急急裁汰火耗作為卑鄙奸詐畢露臣道友誼均失之矣况忠正邪佞終亦難逃朕之耳目王國棟到來時將爾奏摺并朕此諭俱與伊看雍正五年五月十六日戸部侍郎仍署理湖南巡撫印務臣布蘭泰謹奏為恭謝天恩事竊臣質陋才庸䝉皇上簡畀封疆任大責重兼之楚南地介江湖苗猺雜處經理更難妥協到任一年有餘愆尤日積䝉皇上訓誨頻加臣敬謹遵奉時恐隕越上負聖明兹復奉特恩授臣戸部侍郎仍署理湖南巡撫印務沐恩髙厚惟有益竭駑鈍以圖報効於萬一為此恭摺奏謝謹奏一者司農管籥怡親王獨持相佐無人二者湖南事繁爾亦大費周章所以用爾為侍郎近因江西巡撫不得其人故又將爾調補朕看江西甚與爾相宜况經邁柱一番料理徹底澄清甚易經理汝與王國棟交代後再赴新任地方情形備悉問明邁柱竭力秉公治理同日又奏臣查湖南各州縣自四月以來雨水霑足秧苗遍挿今於五月初六七等日時雨大霈田禾暢茂臣委員分途查看早禾俱已吐穗中禾亦髙尺許晚禾湏待五月盡方可分挿現在米價山僻州縣不家令其出糶目今米價漸平且喜早禾有望民情安堵為此謹奏據奏雨水霑足深慰朕心雍正五年六月十八日戸部侍郎仍署理湖南巡撫印務臣布蘭泰謹奏竊查湖南通屬春夏以來雨澤霑足田禾茂盛惟濵湖數州縣地處低窪五月以後因雨水過多以致湖水泛漲今據湘陰等十一州縣衞先後申報被水情形到臣臣飛檄委員分途查勘又念被災之民需賑甚急臣仰體聖心於臣等上年捐項并藩庫耗羡銀内給湘陰縣銀三百五十兩給益陽縣銀一百兩給巴陵縣銀二百兩給臨湘縣銀二百兩給華容縣并岳州衞銀三百兩給澧州銀二百兩給安鄉縣銀二百兩給武陵縣銀二百兩給龍陽縣銀二百兩給沅江縣銀二百兩各行賑恤除被水情形另疏題報外合将𤼵銀賑恤縁由據實奏聞再查湖南髙田十居七八故低處被水正髙處豐收之年現在髙田禾稻秀𤼵倍於往歳合併陳明謹奏賑恤之舉徃徃緩不濟事如是料理深惬朕懐殊不愧封疆之任同日又奏臣查湖南所種早稻應於六月收穫兹據署布政司趙殿最彚報前来除湘陰等縣低鄉被水之處難計收成長靖等九府州屬早稻於六月初薦新月底可盡登場約計收成有八分至十分不等通屬米價在山僻州縣不通販運者毎石七八錢至一兩不等惟長沙常徳二府販運者多五月以後米價驟昂每石一兩七八錢至二兩經臣題請將常平倉穀并漕米易穀撥運减糶米價漸平現在上米每石一兩三錢至一兩六錢五分不等中米每石一兩至一兩二錢不等黄豆每石九錢至一兩不等大麥每石六錢四五分至八錢不等小麥每石一兩至一兩三錢不等只待六月盡早稻齊收米糧俱可减價矣謹奏朕聞湖廣米價大昂甚為憂念今覽此奏朕懐稍慰被水州縣已另有㫖諭部矣同日又奏竊查湖南省之武陵等縣今夏被水淹没經臣具疏題報今查武陵縣屬之茄子窖安鄉縣屬之白馬舖華容縣屬之茶港溪等處竟有被水災民撑駕小舟數十隻為羣徃來水面遇客舟過徃先則求乞米糧後并抄刧衣物銀貨臣據報即飛檄岳常道楊晏星徃彈壓督率地方官加意巡查并曉諭災民安分待賑隨准提臣馮允中移稱已拏獲為首之黄得勝康如山等現在訊䆒其餘黨從俱各觧散等語至於被災各州縣經臣給銀二三百兩不等委員撫恤終難徧濟雖勘成災後自有皇恩賑恤而災民廹不及待恐致流離聚為盜賊臣現在竭力設法務令災民各保室家寜戢地方以圖仰報髙深於萬一容臣料理就緒另摺具奏可無厪聖慮也謹奏此事朕聞之矣已有㫖諭部文到之日實力奉行同日又奏為恭謝天恩事竊臣叨沐聖恩簡任湖南巡撫志圖報効奈心長力短毫無寸補前䝉皇上授臣戸部侍郎仍署理湖南巡撫印務隆恩異數實為逾分今復奉特恩調補江西巡撫臣聞命之下感激悚惶涕泗交集容俟新任撫臣王國棟到楚之日將地方情形利弊并臣任内辦理一切未完事件詳悉交代不敢稍有遺漏欺飾其現在應行事宜臣竭力上𦂳料理不敢以臣調任在即苟且塞責上負我皇上諄諄敎誡之至意為此繕摺恭謝聖恩仰祈睿鑒謹奏覽奏巳悉汝行當赴新任矣風土各異治理不同因地制宜方不至於舛錯汝之學術才情雖屬平常但不自恃已見凡事勤問多學則日有増進勉之勉之雍正五年七月初二日戸部侍郎仍署理湖南巡撫印務臣布蘭泰謹奏竊查湘陰等十一州縣并續報之長沙一縣與永定九谿二衞上年既被水災今夏復受水患災民無以餬口恐致流離或為盜賊臣身任封疆敢不悉心料理查湖南上年奉㫖採買之穀現貯十一萬餘石原為預備荒歉今臣仰體皇上視民如傷至意於此項穀石内借動穀三千石賑濟湘陰二千石賑濟益陽二千石賑濟巴陵一千五百石賑濟臨湘四千石賑濟華容二千石賑濟澧州四千石賑濟安鄉一千五百石賑濟岳州衛三千石賑濟武陵二千石賑濟龍陽二千石賑濟沅江一千石賑濟長沙六百石賑濟永定衞六百石賑濟九谿衞以上共借動貯穀二萬九千二百石𣲖委在省候補人員共十一名前徃被災州縣衞會同地方官宣布皇上徳意散給災民再此項穀石借動之後急宜買補按每穀一石價銀三錢五分共需穀價銀一萬零二百二十兩臣捐銀一千二百兩陞任布政司朱綱捐銀一千兩署布政司趙殿最捐銀一千兩糧驛道楊馝捐銀一千兩署長沙府事衡州府知府孫元捐銀五百兩商人邱道正捐銀五百兩又原任按察司何錫禄署鹽道任内未收規例銀四千二百兩又驛道庫存留豫塘等項銀五百零七兩又郴州鉛價贏餘銀四百四十九兩以上共銀一萬零三百五十六兩俱交藩庫俟八月以後穀價正平之時照數買補貯倉目今被災州縣民情安堵地方寜謐可無厪聖懐理合據實陳明謹奏諺云積穀防饑朕平日諄諄諭爾等留心積貯者正為此等處也覽奏開倉散穀災黎得沾實惠料理殊屬可嘉朕心欣慰雍正五年七月十四日戸部侍郎仍署理湖南巡撫印務臣布蘭泰謹奏為遵㫖察明事竊臣於本年五月十六日繕摺將湖南米糧時價奏聞欽奉硃批湖廣米價從来有昂貴至此之年否察明奏聞欽此欽遵臣伏查湖南素稱産米之鄉米價賤於他省從前每石不過六七錢貴至八九錢而止康熈四十二年巡撫趙申喬任内始賣至一兩有零又康熈四十六年每石一兩三四錢奉聖祖仁皇帝以湖廣米少價值騰貴勅部行文查奏在案經前撫臣趙申喬題請借給之外盡行减糶米價遂平又康熈五十二年每石一兩三四錢經前撫臣潘宗洛題請將倉穀盡行减糶米價遂平此從前米價昂貴之案也總之湖廣數十年以來䝉聖祖仁皇帝暨我皇上綏養生息戸口日繁食米者衆又因上年巴陵等八州縣被水收成稍歉今春廣西江南諸省俱委員來楚買米兼之商販絡繹難以禁遏以致米價驟昂每石一兩六七錢不等䝉皇上軫念民瘼准将常平倉穀與漕米易穀撥運減糶米價漸平今早稻畢登每石一兩一錢與一兩不等小民已含哺鼓腹共樂堯天矣為此謹奏覽奏低昂情節甚悉米價既平朕懐深慰雍正五年九月二十九日江西巡撫臣布蘭泰謹奏為恭謝天恩事竊查八月初十日湖南新任撫臣王國棟到任臣謹遵諭㫖将任内事務一一交代清楚隨於八月十五日自長沙起程赴江西新任准署撫臣邁柱將任内事務交代清楚訖伏念臣庸材陋質荷䝉皇恩調撫江西財賦重地恐不能稱職夙夜滋懼臣查江省錢糧倉穀等項經署撫臣邁柱設法清理各有頭緒臣惟有上𦂳催補俾無虧缺隨時稽查不致再滋弊竇其餘地方利弊官員賢否容臣細心察訪據實具奏所有微臣感激下忱仰祈皇上聖鑒謹奏江右既經邁柱一番振刷凡事只宜寛緩為主不可急廹更張若矜能取勝則大悮矣雍正五年十一月十八日江西巡撫臣布蘭泰謹奏為奏聞事竊臣於到任後即通查各屬錢糧倉穀除從前各官虧空經署撫臣邁柱任内題叅於各員名下䆒追之項臣現在督催勒限追補不敢稍有怠玩其餘各州縣新舊民欠盈千累萬臣細加查察多係紳衿吏員抗欠臣前在湖南任内有分别催科一摺荷䝉聖鑒允行今臣已將此例通檄各州縣分别造冊另單催比將紳衿吏員等名下錢糧漕米俱要先期報完其現據詳報之貢監生員等已經嚴行咨革追比務期積弊一清國課無悮再查社穀一項江省原報捐穀一十二萬七千八百餘石經前署撫臣邁柱任内委官盤查結報共實貯穀八萬四百三十五石零其餘未報實貯穀四萬七千餘石内查有叅劾知縣汪雲鵬等虧侵穀一萬一百四十三石零現在追賠其餘係詳明借放在民之穀共二萬四千餘石又士民認捐未交穀一萬餘石臣已勒限於十月内催完上倉委員盤查如届限尚虧者即題叅䆒追各在案理合奏明伏乞聖鑒謹奏追比欠糧先紳衿而後小民即寓撫字於催科之内矣何至於士民認捐社穀勒限催廹是以利民者而反病民矣斷乎不可社倉一事惟應勸導鼓舞聼民自輸斷不宜繩之以法更不宜經有司吏胥之手以滋弊竇寜緩毋急同日又奏為敬籌江省錢法仰請睿裁事竊臣受任江西見民間所用錢文俱輕薄低小每市錢一千值銀五錢二三分至七八分不等而每千中糢糊破損不堪上串者十居其四不知始於何年來於何處遂至公然攙雜非所以便民生而尊國體也臣欲出示禁止既恐低錢不用則淨錢無多勢必錢價驟貴民用不敷且此種低錢銅質既輕獲價復厚雖奉官禁難保不攙欲盡行收買又半係鉛渣銅脚價值無幾若槩置而不問聼其貿易則長偽藏奸錢法之壞莫知底止查臣在湖南任内有詳籌錢法一案准将雲南鑄錢發運江南湖廣等處賣銀歸還銅價毎錢一千易銀一兩臣思滇錢與京錢無異江省接壌吴楚可否照江南湖廣之例每歲撥滇錢一萬貫運至漢口江西動庫銀一萬兩委員前徃漢口交易道路無多水脚有限運回之日照京中制錢撘放兵餉之例每滇錢一千作銀一兩均勻搭放俾其流通如此三年則大錢日多低錢可以禁止而民間交易不慮乏錢庶幾江省無濫惡不堪之錢於國體民生兩得矣謹奏此論頗為合宜已有㫖諭部矣同日又奏為奏聞事竊臣檢查司庫錢糧有預借各營兵餉按十個月月支放不得狥情預借以滋那移之弊且預借兵餉實於兵丁無益臣合據實奏聞再查江省每年採辦桅杉木植動正項錢糧四千五百八十四兩據布政司王承烈詳稱可節省銀二千兩經前署撫臣邁柱撥入公用項内查此項銀兩即係陋規臣於湖南任内每年辦觧桅杉木植動銀四千九百五十二兩内節省銀一千兩經臣具題歸入正項永為定例今江省辦木節省銀兩亦應歸還正項不得留充公用但尚有辦觧猫竹一項水脚之費亦在此項贏餘銀内支用臣現在行司題明謹奏覽同日又奏為欽奉上諭事竊臣前於湖南任内准部咨奉㫖禁鑄黄銅器皿臣彼時先為倡導將臣署中黄銅器皿四十八斤𤼵交藩庫嗣據文武各員交出銅器約計三千八百斤俱貯湖南司庫候觧今臣到江西任查詢黄銅器皿一案並無交貯於十月初二日接准部咨欽奉上諭嗣後惟一品官員之家許用黄銅餘著遍行禁止欽此欽遵臣即将署中黄銅器皿盡行搜刮共一百八十斤𤼵交司庫隨據各員將銅器陸續交出臣諭南昌府知府許鎮親查市肆已據各舖戸出具不敢打造甘結并将已成器皿之黄銅情愿交官領價約三千斤臣飭藩司照部定價值估銅給價將所收之銅器貯庫容俟各屬彚齊之日一併觧部為此謹奏黄銅器皿朕並未有觧部之諭原飭各省收買銅斤酌其多寡若足供鼔鑄即就本省開罏鑄錢以作便民之舉何得貿貿言及彚齊觧部耶同日又奏為君恩愈厚臣罪實深事竊臣以菲材䝉皇上拔擢數年以來自檢罪状山積敢據實直陳仰祈聖慈鑒察臣前在山東布政司任内有賞老婦一案動支部費銀六千五百五十二兩零彼時臣係初膺外任諸事未諳詢據書吏僉稱舊例臣遂動支差家人進京分給部科官書飯銀并徃返盤費其餘剰銀兩臣於湖南任内一年零九個月毫無飬亷遂将此項用去未獲觧還東庫前於九月二十日准山東撫臣塞楞額移書查詢臣不勝愧赧隨作札移覆照數認還又有忠孝祠宇一案亦經臣任内動支部費銀一千一百三十三兩零縁此案尚未准銷故部費銀亦未用去應一併觧還東庫查江西廵撫衙門有皇上恩賞養亷銀八千八百兩又有鹽規銀三千兩向係撫臣收用今東省庫項不可乆懸已向藩庫支取冬季養亷銀二千二百兩又向鹽道借支鹽規銀二千兩觧還忠孝祠宇案内部費銀一千一百三十三兩又先觧還老婦案内部費銀三千兩其未完銀三千五百五十二兩零容臣於雍正六年春季觧還清項伏念臣以蠢愚於布政司任内冒昧動支之處罪實難逭惟有直陳仰冀聖恩寛宥臣無任惶悚待罪之至謹奏孟子曰恥之於人大矣若知愧恧深自追悔為終身戒則可謂改過不吝若靦然人面自以為得計則汝之功名品行恐鮮克有終也雍正五年十二月初一日江西巡撫臣布蘭泰謹奏為請禁隨丁私占馬糧以實營伍事竊查隨丁名糧一項自督撫提鎮以至副叅遊守下逮千把微員各有隨糧或數十分與數分不等俱係内丁列名營冊按月支餉並不隨操相沿舊例固難盡革但其中不無多占馬糧之處即以臣所知而論除臣標左右兩營遊守等官隨丁所占馬糧已飭查退出於歩守二兵内頂補毋庸置議外其臣標所轄袁州九江二協查袁州營額兵六百七十七名内馬兵七十名該副將至千把等合計占馬糧二十分九江營額兵七百七十三名該副将至千把皇上勅部通查直省督撫提鎮各標各營所有隨丁馬糧盡行退出將伍丁内弓馬嫻熟者選拔補足嗣後隨丁名糧止許按應食名數於步守二項内分占不得私占馬糧著為定例倘有仍前冒占者許兵丁告發治以冒餉之罪按名數加倍庶幾國家重餉不飽貪官溪壑矣再查各營内向有公費糧一項除撫標兩營公費糧十二分已於前撫臣奏看爾惟在零星瑣屑錢糧上用心不識大體處甚多封疆重任也財利細事也汝當於大者逺者加意籌畫夫人之精神有限務於小者必忽大察於近者必遺逺況爾更非大小兼括之才惟小是務朕甚憂之凡待屬員當留有餘地步小過尤不可苛刻至於武途䆒竟以弓馬漢仗膽量智勇為主難比有司規規以繩墨約束之也近見爾辦理武官之事甚不合宜戒之勉之雍正五年十二月二十六日江西巡撫臣布蘭泰謹奏為仰體聖衷事欽惟我皇上敬天勤民凡四方之雨暘寒燠無不上厪聖心臣查江省南昌袁州臨江等府屬各州縣於十一月二十等日得雪五六寸與三四寸不等民間所種秋麥優渥霑足其未種秋麥之處土脉滋潤俱可墾轉以便來歳春耕臣不勝欣忭理合據實具奏仰慰聖懐謹奏直𨽻河南山東山西江南普䝉天恩皆通省賜盈尺之雪惟甘陜兩省尚未得雪甘陜之雪較之他處尤為𦂳要朕甚憂之雍正六年正月二十六日江西巡撫臣布蘭泰謹奏為欽奉上諭事雍正五年十月二十九日承准怡親王同大學士張廷玉公字一函内開面奉上諭向来諭㫖頒至各省不過省會之地一出告示而已而州縣各處並未遍傳至於鄉村荘堡偏僻之處更無從知等因札寄到臣仰見我皇上宵旰勤民諄諄諭誡欲使四海之廣僻壌遐陬之衆皆家喻戸曉聖衷如此殷切臣敢不敬謹奉行隨將歴年所奉上諭内凡有關民生吏治者彚刻成册分發各府州縣每於朔望宣講聖諭廣訓之日敬將上諭逐一宣示在省會係臣率同司道等官詣萬夀官彛倫堂等處宣讀聖訓明白曉諭在外府州縣係地方印官并教職雜佐等員按朔望宣講聖諭廣訓之後敬將上諭各條分晰宣播一時軍民人等皆聳然動聽仰頌聖天子明照四方無微不燭為百姓籌畫又無處不周誠從古未有之聖主臣又飭各府州縣照式刋布按各學廪生各鄉甲長人給一本廣令傳抄宣講俾人人敬奉恪遵為此謹奏朕統御萬方身膺教飬之責所以夙夜孜孜無時少懈書曰正徳利用厚生惟和爾等若能仰體朕心於勸耕課織之餘又從而提撕警覺以加惠焉則遂生復性其效不難否則徒為虚文故事耳亦何益哉同日又奏為恭謝天恩事雍正五年十二月十九日臣標千總齎捧奏摺回省内有臣恭請聖安一摺奉硃批恩㫖爾在湖南甚不相宜今到江西如何臣跪讀温綸感激涕泗望闕叩頭謝恩訖伏念臣質本孱弱前於康熈五十九年管理口外臺站觸冐風寒因有筋骨疼痛之疾前在湖南地氣卑濕舊疾間𤼵今奉聖恩髙厚力微任巨時虞隕越自維負疚寢食難安所幸皇仁遍覆地方無事民生樂業臣得優㳺奉職皆我皇上生成之大惠也今䝉恩㫖垂問天語春温臣何人斯叨承異數一至於此雖捐糜頂踵難報萬一謹具摺奏謝天恩伏乞皇上聖鑒謹奏念念在國計民生可無不勝任之慮若念念在身家利害則心不專誠精神散亂自然不能勝任矣飬生却病之道亦只此專誠為第一要訣盖天下事雖繁雜要皆一以貫之據理而應千事萬事不過一事千理萬理不過一理事至則應事過則休雖提百萬軍猶可處之泰然有何虧損精神處若心無主宰逐件向外馳求不特不勝其煩臨事不忘即錯而精神亦隨之疲敝矣日間我不欲辦事時一事也不到胷中来及事到面前心目瞭然辦理精詳譬如明鏡止水物莫逃形若於不辦事時此一事去彼一事來紛紛擾亂於方寸中及事到面前心目惛然反被事理所縳如鏡之垢如水之濁已自失其虚明瑩徹之體凡此皆無本之所致耳今汝試遵朕諭力行不間看猶至悮事否同日又奏為藩司責任匪輕拘儒恐難稱職仰請聖鑒事竊查江西布政司王承烈係拘謹書生誠樸有餘才幹不足臣盤查司庫見其錢糧無缺欵項俱清信為有守之員但賦性遲鈍大小案件經旬累日催督不前至於委署印篆領觧糧餉採辦物料一切地方公事俱由該司遴員詳委未免苦樂不均以故屬員多有怨言又中無定見吏胥得窺伺意指舞弊作奸該司漫無覺察於藩司職守殊不相稱臣屢加勸導兾其勉力自奮無奈該司積習難改罷軟如故臣既才識短淺全賴司道大員協力佐理今該司雖操守足取然非歷練之才恐貽悮地方謹據實奏聞伏候聖明睿鑒謹奏朕思此人過於忠厚自必不能勝任而又有人言其有才可以辦理者邁柱亦言其勝任但奏伊涕泣不願外任只求内轉今覽汝此奏與朕所料無二人品猶屬端方朕自另有諭㫖雍正六年三月初六日江西巡撫臣布蘭泰謹奏為請㫖事竊查江西省有九江贑州兩關平餘銀一項係每月拆櫃併封所得約計九江正關與姑塘分司兩處每年可得銀三千餘兩若關税充足之年可至四千餘兩贑關一處每年約有平餘銀四五百兩不等再贑關有臨關零税一項又有單銀一項俱係按月支給該關官吏一切雜費等項除支給之外將餘剰銀兩呈繳巡撫其兩關平餘銀亦係呈繳巡撫衙門充公支用向例如此臣於上年九月到任後據贑南道王世䋲監收贑關報滿將零税餘銀二千五百三兩零循例繳送臣當飭移交布政司貯庫又上年贑關尾季平餘單銀二百一十兩零臣已𤼵修老岸堤賑給大庾縣水衝房屋之民俱經臣具摺奏聞今臣又據監收九江關税劉均將上年尾季所得平餘銀八百四十三兩循例繳送到臣已飭布政司收明貯庫理合奏聞抑臣竊有請者九江為數省徃來孔道上年楚省饑民就食九江以致米價每石貴至一兩五六錢又贑州商賈雲集之區現今米價日昂每石一兩四五錢此兩處實為江省要衝積貯之䇿不可不預為籌畫臣請於九江贑關兩處各設一常平倉自雍正六年為始將兩關所得平餘銀并贑關零税餘銀合計每年約有銀六七千兩又兩關所裁冗役工食并公私雜項所减銀兩每年可得二千金將以上之銀盡行買穀可得二萬餘石分貯兩關官倉毎年悉令平糶於秋收之日買穀増貯積至十年則兩關之穀可至二十餘萬石至需用倉厫查九江有守道舊衙門基址可以建倉贑州亦有公所閒房堪以改造此添盖倉厫之費即於兩關節省工食銀内動給倘䝉聖恩俞允即將此項倉穀交與兩關監收之員經管出納交代盤查申報巡撫咨部查核是否可行恭請睿裁為此謹奏與地方有益之舉也照所請行雍正六年四月初三日江西巡撫臣布蘭泰謹奏為仰體聖衷事竊臣查江西省自春月以来雨水調勻麥苗滋長現在秀實將次收穫其未種麥之田畆俱已播種稻穀目今甘雨及時農務正殷通屬米價除贑州一府屬每石自一兩二三錢至一兩四五錢不等較他處為貴其餘南昌等十二府屬米價毎石自一兩至一兩二三錢不等臣又徧詢吏民咸稱江省徃年於漕船開兑之後米石逐漸長價今歳米價較平等語此皆仰賴皇上聖徳感孚年歳豐收故米糧不致昂貴也謹奏覽奏深慰朕懐爾督撫等果能秉公持正實心教飬兵民上天之垂佑朕可保其必不爽也聞得江西自去冬傳染時氣數月以來為何不奏聞同日又奏為請㫖事竊查雍正五年十一月内皇上批𤼵署撫臣邁柱摺奏一件到臣内有贑州府統轄十二縣地方遼濶知府一官鞭長不及耳目難周請改設直𨽻州分管或以贑州府屬之贑縣信豐二縣并吉安府屬之龍泉縣分撥南安府管轄而以贑守移駐安逺縣等因臣欽奉硃批此事爾詳細斟酌具奏如應題具本來欽此欽遵覆奏復欽奉硃批詳慎為之欽此臣隨檄司道確查妥議嗣據司道等會詳請將贑屬之定南縣改設直𨽻州而以龍南安逺長寜三邑分與管轄等情臣看得贑屬之定南縣除正南一面接壌廣東外其東西北三面為龍南安逺長寕三邑會歸之境相距道路逺或二百餘里近則百餘里以定南改設州治分龍安長三邑就近管轄實屬可行且查定南之地在贑郡極南實為江省屏障嶺廣咽喉地處要衝縣令未足彈壓若改設直𨽻州而以三邑供其指使則聲勢相倚疆宇為之倍固若以贑州府屬之贑縣信豐二縣吉安府屬之龍泉縣撥𨽻南安則三郡之版章户口俱要紛更又以知府移駐安逺則衙署等項亦湏改設府佐等員亦湏遷徙殊費更張又查得南昌府屬之寜州逺處偏僻離府陸路三百八十餘里水路六百餘里皆峻嶺險灘凡盤查倉庫催提事件經旬累日多所未便查該州離瑞寕州撥入瑞州府管轄不特繁簡得宜而就近控便臣謹將查議情形并愚昧之見是否有當恭請皇上睿裁為此謹奏奏詞譊譊自尚未能清晰其是否之處朕何以批示耶雍正六年四月十八日江西巡撫臣布蘭泰謹奏為恭報二麥收成分數仰祈聖鑒事竊查江西省除南昌等八府所屬素不産麥之州縣外其餘各州縣據報大麥俱已登場小麥現在收穫約計收成自七分至九分不等市價大麥每石自三錢五分至五錢不等小麥每石自七錢至八錢四五分不等再查通屬米價除贑州一府野霑足豐年預兆理合據實奏聞謹奏甘雨霑足朕心欣慰但能懋勉吏治令諸務平和民情歡洽則上天之休徵瑞應不期而至此自然之理田文鏡督撫豫省三載大有是其驗也勉之勉之吏治以刑名為第一要務刑名獨河南為第一平允汝等非過則不及不逮逺矣慎之慎之雍正六年六月十一日江西巡撫臣布蘭泰謹奏為欽奉上諭事雍正六年五月二十六日准兵部咨奉㫖署南贑總兵張溥奏稱准巡撫布蘭泰咨文内開本標隨丁名糧俱行招募補足隨將隨丁名糧六十分考補五十四分暫留六分再行考補等語從来文武原屬兩途其飬亷用度亦各不侔督撫為封疆大吏全在察吏安民撫輯地方一應衙門用度耗羡等項足資為用隨丁名糧固可革除提鎮專任戎行責在整頓營伍訓練士卒一應衙門用度舍隨丁名糧之外别無所出武臣由將備陞至總兵階級既峻其用度自應寛裕倘將此項裁革俾至無以飬亷勢必諸事掣肘是為總兵不如其為將備也且衙門用度不敷即有廉潔之員亦易更改操守此揆情度理有不當革除者今布蘭泰將伊隨丁名糧裁補併鎮臣之隨丁名糧亦勒令革除殊非中道布蘭泰辦理武職衙門之事過於刻薄甚不得體爾部將此行知布蘭泰欽此臣跪讀諭㫖惶悚愧赧敬謹遵奉伏念臣本庸愚材尤謭劣辦理一切事務多有未當䝉皇上憐臣愚昧不加罪斥訓誨裁成無所不至臣惟有凛遵聖訓省愆改過期於中道以冀仰副皇恩於萬一臣不勝惶悚瞻依之至謹奏諸事不循繩墨妄恃已見而又器量褊淺不達大體其奈汝何焉得事事待朕訓誨而後始知惶悚耶其未經奏聞之事尚不知如何顛倒錯亂朕實為江右百姓憂之同日又奏為奏聞事竊查本年五月初八日據袁州府宜春縣申報該河田禾房屋漂没人口等情前来經臣飛檄布政司委員確勘是否成災分别造冊詳報并委臣標把總王百詳星馳查勘去後臣又思若俟造冊到資本補種晚禾現俱得所並無流離等情臣謹將該縣被水情形并賑恤縁由奏聞伏乞皇上睿鑒謹奏人口既經漂没猶奏稱現俱得所尚以愛民能吏自居何無恥之甚也同日又奏為仰體聖𠂻事臣查江西省自春月以來雨水霑足禾苗茂盛至五月初十以後天氣亢旱雨澤稀少經臣飛檄通屬查報情形據南安廣信吉安袁州贑州等五府俱報雨水霑足西成可望其南昌瑞州南康饒州九江撫州建昌臨江等八府屬州縣内雨澤霑足者十之三四其餘自五月初十以後雨水未能霑足臣於省城設壇祈禱大約近江濵湖之田可以無虞而山田髙阜業已受旱再查江省今年春雨甚早所種早禾已收穫十之三四所有收成分數俟各屬報齊彚摺另奏伏乞皇上聖鑒謹奏乖氣致沴自然之理以爾之昏憒懵懂身居表率之任欲望地方雨𤾉時若豈可得乎朕近日通諭甚明凡為督撫者若不能察吏治以安民生平允政刑動輙設壇祈禱以冀妄邀天貺必無效也惟内省過疚外慎行為遵聖人自新之道用釋氏懴悔之理庶幾為轉移禍福之階梯耳然所謂察吏者非不審優劣任情叅劾之謂大僚若不能以明濟公甄别賢否地方上去一良吏與留一庸員其失相等盖不明則是非失宜舉錯不當雖有遼東獻豕之誠徒貽魚目混珠之誚汝以庸常資品只可勤以補拙謙以受益痛自刻責改過遷善或可補救於將来否則受害不淺也慎之慎之同日又奏為欽奉諭㫖事竊臣恭閲御批奏摺内一件奉硃批聞得江西自去年冬傳染時氣數月為何不奏聞臣跪讀聖諭仰見我皇上慮周民瘼懐保無疆至意伏查江省上年冬令多暖少寒陽氣未歛以致冬春之交民間疾病時作迨二月内農作既興病遂减少即如臣標兩營兵丁於上年十二月至今年正月報病者衆臣飭該管將弁每日操演使不得貪閒以後報病者遂少可見民間多病實因農隙之後飽食貪眠之所致並非疫氣流行至於城市之中又因溝泥未濬春氣所𤼵穢惡上蒸觸而生病臣前巳飭南新二縣督率各保長將一切水溝盡行疏濬穢積既除民病旋愈此係偶爾之疾非關災𤯝故未敢上凟聖聰致煩宸慮今奉諭㫖下詢謹據實奏聞臣不勝悚慄待罪之至謹奏所奏可𤼵一笑已有㫖命怡親王等傳諭看爾近来昏憒一切摺奏言語支離精神恍惚甚不似從前諺云福至心靈禍來神昧雖係俗談實為切當汝受朕任用之恩諸事當據實敷陳絲毫不隠纔是今通省時氣流行係隂陽愆和所致所關匪細據奏農民飽食貪眠云云有似小兒囈語可見汝於民間疾苦漠不關心寕不有負朕一番信任之意耶雍正六年六月二十日江西巡撫臣布蘭泰謹奏為仰體聖𠂻事臣於六月十一日具摺將通屬雨𤾉情形奏報臣於是日拜摺之後即赴龍神廟雨壇祈禱隨奉到硃批奏摺臣恭設香案叩頭開閲有恭報二麥收成一摺奉硃批甘雨霑足朕心欣慰但能懋勉吏治令諸務平和民情懽洽則上天之休徵瑞應不期而至此自然之理田文鏡督撫豫省三載大有是其驗也勉之勉之吏治以刑名為第一要務刑名獨河南為第一平允汝等非過則不及不逮逺矣慎之慎之臣跪奉訓㫖仰見我皇上敬天勤民無時稍暇訓誡臣下無事不周正在感愧凛惕間遂見濃雲宻布甘雨隨至自未時至酉時止十二日未時復得大雨四野霑濡萬民懽忭嗣據南昌九江等府俱報於十一十二日得雨大小不等惟瑞州府屬之上髙縣臨江府屬之清江縣據報被旱臣現在委員查勘再查各屬米價俱平並無昂貴之處合併陳奏仰慰聖懐謹奏時屆夏末雨澤業已愆期禾苗被旱十至二三而令朕懐寛慰何布蘭泰昏迷直至於如此雍正六年七月初三日江西巡撫臣布蘭泰謹奏為恭報早稻收成分數仰祈聖鑒事竊查江省稻田有早晚二種其早稻應於六月内登場據布政司李蘭彚報除瑞州府屬之上高高安二縣臨江府屬之清江新喻新淦峽江等四縣南康府屬之建昌一縣俱稱被旱現在詳請題報外其餘各州縣早稻收成五六分至八九分不等各等情到臣謹據實奏報仰慰聖懐謹奏似江西如此歉收而欲仰慰朕懐如他省之豐收朕又當如何慰悦耶同日又奏為仰體聖衷事竊查江省於五月初旬天氣亢暘上高等七縣被旱臣一面委員確勘一面彚疏題報在案誠恐被災貧民或致流離難容緩視臣已將節備倉内所貯鹽規積穀動撥一萬石運赴被災各縣賑給災民作補種資本酌量被災輕重令委勘之員會同各該地方官查實下戸貧民無力補種者宣布皇恩按戸給發諭令得雨之後即速補種除被災七縣外其餘十三府屬晚禾正在望雨雖於六月二十二十一等日連得微雨總未通暢兼之酷暑烈日茂西成可望豐收萬姓歡呼咸歌帝徳其各屬前此未霑足之處亦陸續據報於六月二十七八等日俱得大雨合星馳奏報仰慰聖懐再查江屬地方今年春月民間多病後已逐漸平皇上聖徳感孚甘霖大沛旱氣全消民間諸疾已不藥自愈矣謹奏何等督撫即有何等年歳天道隨人㨗如影響實令人可畏之至直省督撫中器度􅄶狹昏憒懵懂未有如莾鵠立布蘭泰者甫任湖南而水患至調撫江西而旱災臨氷雹屢報於甘肅如此響應竒哉竒哉當之者猶恬然不知愧懼將來作何景況竟難以逆料也朕實憂之自古有治人無治法分猷宣化總不得人奈何奈何朕悮用汝此等匪人貽悮封疆朕之罪對天對祖實難辭謝矣更復奈何奈何硃批諭㫖巻十二下
