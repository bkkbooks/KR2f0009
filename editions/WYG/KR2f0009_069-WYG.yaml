body:
  text: 欽定四庫全書硃批諭㫖巻六十九硃批楊爾徳奏摺雍正五年正月二十五日提督廣東學政臣楊爾徳謹奏恭請皇上聖躬萬安臣仰荷天恩屢蒙㧞擢兹復恭膺簡命視學廣東夙夜冰兢自顧何人得邀此寵渥惟有矢心公慎時刻凜遵聖訓實心辦事圖報高深於萬一臣自去年十月十八日自京起程於今歳正月初三日抵任随恭設香案望闕叩頭謝恩開印後謹奉前後所頒聖訓諭㫖行文各屬敎官宣揚聖徳諄詳訓飭廣東士子沐浴聖敎務使士習漸淳士風漸厚間有一二不率者臣恪遵功令輕則戒飭重即褫革不敢絲毫假借其餘學政應行事宜現在次第舉行臣於到任後親至撫臣楊文乾署中遵㫖謹傳聖諭外理合繕摺附撫臣奏摺中轉達天聽謹奏恵士奇前在粤東聲稱藉甚及見其人庸平之至想係隨波逐流與時俯仰到處逢迎竊名邀譽之所致耳此等欺世盜名之行為斷不可效法況爾乃朕特用之人非恵士奇可比尤當於真實處著力以期無負知遇夫士為四民之首學臣為董士之官整飭風俗正爾専責若不加意懲奨力行化導一味模棱因循唯唯否否甚或袒護頑衿劣紳其干求則惟言是聽阿奉權要廷臣於請託則惟命是從諂媚督撫瞻顧提鎮以為和協安静文武相安則大悞矣如此巧佞黨比自必譽言四布但恐朕别有鑒察不能掩蔽豈特負恩之罪難逭抑且身為名敎中敗類亦甚屬可恥惟宜一秉公正謝絶同年故舊門生老師之私誼斬斷一切葛藤纒繞而後能為所欲為也士習官常自宋元以來其流弊不可問矣朕欲竭力挽此千百年之頽風爾等若不竭力匡勷贊助以仰副朕心可乎勉之特諭雍正五年六月十七日提督廣東學政臣楊爾徳謹奏為恭謝天恩事臣於四月初二日在肇慶考場接到撫臣楊文乾遣人齎送皇上硃批臣奏摺一件臣跪捧伏讀仰見我皇上天心仁愛提誨諄詳字字本於至誠言言切於謨訓雖父母之愛子何以加兹即木石之無知亦當感動况臣仰荷聖恩特用什百等倫既栽培拔擢於平時復訓誡叮嚀於臨事昭其鑒戒朂以公忠千古遭逄豈易得此臣自顧何人叨恩若是感深以泣喜懼交縈當即望闕九叩謝恩惟有凜遵皇上髙厚生成之至徳耳為此繕摺恭謝不勝激切感悚之至謹奏觀汝奏詞意甚誠切朕甚嘉之同日又奏為據實條陳事臣䝉之處商賈之多甲天下所産之米有限不敷所食所以米價不時昂貴民間常有乏食之虞也伏念我皇上軫念民依深思逺慮廣東既有積榖一百六十餘萬石尚恐不足又命廣西運榖三十萬石以僃用又有運榖捐監之例所以捍患僃災者已極周詳矣若使此各項積榖實貯在倉而所在官司因時糶賑何憂米缺價貴竊揣其中必有倉榖虧空之弊不然則有司奉行未善以致上無以仰答天心下無以急拯民困臣愚以為當及時一面嚴查倉儲一面酌定永逺無弊之法以收實效管窺所及約有四條敬為我皇上陳之一宜徹底盤查以清積弊也州縣有司賢愚不等一宜審其地方以均積貯也廣東疆域遼濶有一府所屬之州縣而相距數百里或千里者又各州一宜核其損耗以杜妄報也東南之地不比西北以司其事勤加省視或搧或曬又宜量其損耗准與銷􅈫則司其事者既無推諉之處亦不得以霉爛妄報矣臣本迂愚又非其職而感荷天恩末由報效見聞所及不敢不直陳聖聴如果臣言可採伏乞皇上勅部議覆施行謹奏見聞所及只管敷陳倘於事體有不協處聽朕訓示亦可增長識見開拓胸襟若於獻替之中稍有補益於朕則厥功大矣毋因朕之採納與否而或言或不言也同日又奏為仰懇皇仁事臣查廣東通省與考生童地方有南澳鎮者孤懸海中界於廣福二省之間中分隆深雲青四澳田畝錢糧雲青二澳屬福建漳州輸課隆深二澳屬廣東潮州輸課地雖濱海其民風頗好讀書故明時漳潮二府各有取進澳生名例本朝未經復設歴來考試俱於漳潮二府額内取進澳童文武各一名撥入府學並非成例且澳童多進一名則本地少進一名以此人情亦未允協恭遇聖敎覃敷人文日盛而澳童投閩考試則閩以粤人拒之投粤考試則粤以閩人拒之往往有數十百人航海至府不得一入考場含淚而歸者臣思際此皇仁廣被光天化日之下絶域異鄉物皆得所而此澳中人民頗知讀書向上似宜開以上進之路請於漳潮二府進額之外四澳之中每澳進文武生各一名撥入府學如衞所商籍等例應否繕疏具題伏乞聖恩垂訓為此謹奏所請雖屬有理但南澳非内地可比其中有無利害闗繫朕不深悉未便批諭可否候楊文乾回任後爾㑹同孔毓珣楊文乾詳議具奏毋得偏執已見硃批諭㫖巻六十九
