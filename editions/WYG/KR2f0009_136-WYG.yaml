body:
  text: 欽定四庫全書硃批諭㫖巻一百三十六硃批鍾保奏摺雍正三年十二月二十一日甘肅布政使臣鍾保謹奏為敬陳末議伏候聖裁事竊臣荷䝉皇上溫綸屢降特授甘肅布政使自奉命入境見山地多未開墾及問百姓俱云明末兵荒之後人民逃散於順治七八年間經督撫具題奉旨免賦之山地也自經蠲免之後悉為豪强霸占無人開墾則任其荒蕪一有人耕則蜂起控爭經年不結所以小民深畏拖累之苦任其荒廢據臣愚見伏乞皇上敕下督撫轉行州縣查明各屬荒山數目有無管業如果有人管業之産請以文到日為始予以一年之限即著本人照數開墾如係無人管業之産聼候地方官召募開墾如有人管業而無力開墾者亦聼候地方官召募開墾若有前項霸占情弊許地方官從重治罪其各州縣每年開墾若干數目嵗終造冊報明督撫轉行達部具題若地方官有開墾最多者照例議敘以示奬勸至於開墾之地亦照例陞科納賦如此則無業小民亦有恒産雖逢歉嵗亦必依戀其産而不致逃散四方矣應否舉行伏乞皇上睿鑒謹奏此奏似屬有理然不可輕率舉行甚有干係况爾甫經涖任一切利弊或未必周悉可再詳細察詢的確與撫臣石文焯及李元英斟酌妥議緩緩奏聞候朕裁定雍正四年二月十六日甘肅布政使臣鍾保謹奏為奏聞事竊臣抵任後即將司庫錢糧細加核查自前司折爾金任内起至署司陸賜書任内止應實在銀五百二十九萬二千七百一十二兩零錢五十三千九百二十七文内除實存庫銀二十五萬五千九百六十九兩零並折爾金任内已經審明未完虧空銀二十萬七千七百六十九兩零又題明各隨本案歸結勒追賠補銀二十七萬四千二百八兩零又各官捐俸未還銀五萬八十九兩零其從前正署各官借支過各鎮協營俸餉州縣衞所官役俸工并各驛夫馬工料等項銀共二百九十六萬八千五百五十九兩零原係估撥額設應給之項但定例季首掛領滿支季終扣除缺曠作正查自雍正二年至三年各官任内均未扣清缺曠作正至今錢糧不清又各案因公動用未撥還項銀一百五十二萬七千二百二十六兩零查因公動用即應請撥還項乃從前各官俱置之不問至今庫項虚懸又折爾金傅徳彭振翼等任内共借出銀八千八百八十九兩零查此項銀兩俱係任情私借並非應給之項臣以庫帑關係重大業經逐欵核查除將各項分析造冊詳報督撫題㕘外臣不敢絲毫隐諱合先據實奏聞謹奏凡百俱當據實無隐為是可與石文焯同心合力察覈清理但能恪秉一公天下無不可為之事也雍正四年二月二十六日甘肅布政使臣鍾保謹奏為恭謝天恩事竊臣葑菲庸材㣲末下吏荷蒙皇上不次超遷實為逾分今又䝉恩命臣暫往西寧倘有青海事務會同總兵官黄喜林公同商議料理臣於二月十四日接奉部文即於十六日起程二十日到西寧恭設香案望闕叩頭謝恩任事訖再臣自蘭州至西寧一路經過地方細問百姓俱云雨雪應時土膏滋潤正好及時耕作此皆聖天子軫念蒼生至誠感召之所致也所有榖麥豆子現在播種將來秋收必獲大有臣不勝額手稱慶合并奏聞謹奏覽奏深慰朕懐每敬睹上蒼示感地方之雨𤾉無不立應實覺呼吸可通固繫朕之竭誠修省亦賴爾等撫藩大吏實力仰體能暢遂兵民之心以敬迓休徵也萬不可髙興縱恣雍正四年十一月初七日甘肅布政使臣鍾保謹奏為遵旨覆奏事竊臣為敬陳末議一摺䝉皇上硃批臣跪誦之下感悚交集伏念臣甫經受事利弊尚未周知冒昧陳奏輕率之咎實所難辭荷䝉聖徳優容命臣與石文焯等商酌緩奏臣遵即與撫臣石文焯按察使臣李元英細細商酌查得雍正元年四月二十六日奉上諭國家承平日久生齒殷繁開墾一事於百姓最有裨益凡有可墾之處聼民自墾自報地方官吏人等不得勒索阻撓欽此此誠皇上重農務本為億兆謀衣食之源而普天蒼赤之衆亦應各自為謀前撫臣奉到諭旨遵即通行各屬實力勸諭現據臨鞏平慶甘涼等六府申報共開墾過荒地一百七十三頃零其寧夏西寧二府現在節次曉諭開墾但甘屬逺處邊陲山多地少田土半在山腰且經明季兵燹之後民逃地荒管業無人亦無版籍可稽其現有業主者因山地磽瘠有間年播種者又有陡坡沙确難於樹藝者又秦俗皆以畜牧為生多有留為畜牧之場者此外凡有可墾之地業經催令地方官欽遵諭旨勸民開墾不許勒索阻撓如有豪强捏劵冒認覇占爭訐者照例從重治罪其陞科議敘悉遵照雍正元年四月内原奉諭旨遵行將見未闢之蒿萊漸成沃壤而無業之窮黎咸沾樂利矣相應遵旨覆奏伏乞皇上睿鑒施行謹奏此事言之似易行之實難必得賢能有司設法勸導逐漸開墾庶幾有效全在爾等地方大吏選擇屬員勤加督課徐徐次第而為之也勉之同日又奏為奏聞事竊臣前詳估駐寧滿兵糧草一事理應仰體皇上一視同仁之意將寧夏每嵗額徵本色糧草分給滿漢兵丁其不敷之處亦應均勻折價採買使滿漢兵丁同沾聖澤乃臣一時識見短淺辦理未當咎實難辭荷䝉我皇上逾格隆恩宥臣愚昧令臣將滿兵糧草管理採買臣恭奉聖諭仰見天恩浩蕩沛澤無私臣接奉部文之後隨於八月二十二日赴寧督同地方官採買各官無不踴躍輸誠願為分辦陸續採買供支俾駐寧滿漢兵丁普沾我皇上如天之仁嗣因時屆支放營驛冬季俸餉在即不便久羈寧郡於九月十一日囘蘭支放旬日臣復兼程至寧查得前項糧草其九月以前俱經放訖其十月糧草俱已買齊現在支放其以後糧草陸續採買供支不致貽誤臣復因武闈大典理應入場提調除採買事宜交地方各官辦理外臣復於十月十二日囘蘭至於甘肅通省收成據各屬呈報俱有九分十分人民樂業共慶盈寧合并繕摺奏聞謹奏聞秋季糧草支放之期已覺稍遲爾前到寧夏即能備辦無誤耶據實奏明寧夏知府能勝其任否雍正五年正月十二日甘肅布政使臣鍾保謹奏為遵旨據實奏聞事雍正五年正月初六日臣家人齎捧臣前奏採買寧夏滿兵糧草一摺至署奉有皇上硃批諭㫖臣跪讀之下惶悚無地䝉我皇上天髙地厚之恩不加譴責令臣據實具奏臣不勝感激涕零謹將採買支放過縁由據實陳奏竊臣於雍正四年七月初二日接督臣岳鍾琪奉到管理採買部文隨即飛檄寧夏知府卜瑗水利同知王佩􅋛㑹同採辦外臣思奉到部文已届七月轉行寧夏地方官採辦又需時日至八月支放之期為日無幾恐有遲誤之虞請將八月分糧草暫支折色等情咨呈將軍臣席伯等去後續准將軍等照㑹内稱七月分糧草已照舊支領折色訖其八月分糧草關領之期已届不便支領折色等因前來臣恐有誤於八月二十二日起程至二十九日到寧夏於臣未到之先八月分糧石已經放完其草束因陳草缺少新草未收地方各官現在各處採買至九月初旬方得支放臣一面嚴催採買一面將此情由回明將軍據席伯等面云此時新陳不接原難採買若於九月初旬得草亦不遲誤如此説明臣於九月初四日起程回蘭至十八日復准將軍等十三日發行來文内稱八月分草束至今尚未支放行催前來臣甚是驚惶隨又於二十日星速赴寧其八月分草束業於九月十六日放起至二十日放完其九月分糧草於二十五日放起至十月初三日放完臣即起程回蘭其十月十一月十二月糧草已經按月供支訖所有秋季少遲縁由謹據實奏聞再寜夏知府卜瑗老成謹慎勉力辦事但寧夏係邊陲要地兼西寧肅州往來衝途又有駐防官兵卜瑗才非肆應恐不能勝任理合遵㫖奏覆謹奏所奏知道了嗣後類斯些小掩飾俱屬不可一渉欺隐即開巧偽之端何弊不因此而漸滋耶内外臣工咸能據實無欺吏治何有不清天下從此大治矣爾等撫藩大吏表率一方惟以正已察吏為第一要務若以柔懦詭隨為和平安静借此以取容沽譽於當時則流為國家之大蠧妨政敗俗莫此為甚是乃姦猾小人之行徑夫豈忠良大器之存心切記切記朕今竭力整剔者此等陋習也勉為之爾試思茍且依違博作姦犯科小人之稱頌與剛方正直得勵精圖治人主之歡心其間孰輕孰重孰得孰失耶從来邪正是非積福作孽只争此公私一念可不凛惕而慎勉乎特諭雍正五年閏三月初十日甘肅布政使臣鍾保謹奏為奏明護理巡撫印信日期事雍正五年閏三月初六日巡撫臣石文焯因奉㫖前往四川觀看㑹審程如絲一案所有巡撫闗防并王命旗牌委員齎送交臣護理臣隨恭設香案望闕叩頭暫行護理另疏具題外竊臣一介庸愚茫無知識當此重任更深悚惕惟有竭盡駑駘益加勉力以圖仰報我皇上天髙地厚之恩於萬一耳謹將護理撫篆日期繕摺奏聞謹奏勉之慎之觀爾頗有瞻前顧後沽名博譽行徑果如此不但深負朕恩抑且自棄此等心行虚偽淺鄙何能造就成大器也有人言爾向來秉性即係如此豈其然乎亟當警省悛改同日又奏為祗遵聖訓恭謝天恩事竊臣家人回署齎捧臣據實覆奏採買寧夏滿兵糧草一摺奉到皇上硃批臣跪讀之下感激涕零惶悚無地伏思臣何人斯䝉我皇上格外優容溫綸訓誨臣敢不洗心滌慮以竭犬馬之誠嗣後惟有欽遵聖訓以圖仰報聖恩於萬一耳為此繕摺奏謝天恩謹奏但恐言之諄諄聽之藐藐訓誨雖在朕能行與否則在爾之勉與不勉也雍正五年五月二十九日護理蘭州巡撫印務布政使臣鍾保謹奏為恭報雨水田禾情形仰慰聖懐事竊查甘屬地方今嵗正二兩月雨雪調勻至三月及閏三月八府屬報稱得雨多寡不等亦竟有未得雨者臣隨䖍誠祈禱嗣據平涼慶陽鞏昌寧夏四府各報稱四月内得大雨二次即三月内未得雨之州縣亦俱四野霑足又據甘州涼州西寧三府報稱雨澤雖未充足俱有渠水通行可資灌溉惟臨洮一府四月内缺雨今於五月十六日得雨一晝夜十八日又得雨一夜四野霑足又據西寧涼州兩府俱報十六等日得雨霑足併據甘州府屬亦各報到五月初三四等日得雨約計八府屬雨水俱各有七八九分不等其從前缺雨之處夏麥雖間有㣲傷一二處其餘俱可望收成秋禾已種者發生滋茂未種者得雨之後播種發生至肅州以及赤金靖逆等處春間雨雪雖少入夏渠水頗足夏麥亦屬無恙所有甘屬地方五月以前雨水田禾情形理合繕摺奏聞謹奏爾類庸常之流職守地方收成自應中平若鄂爾㤗田文鏡優等督撫所治地方則䝉上蒼嘉賜十分年嵗此亦自然之理同日又奏為恭繳硃批奏摺事竊臣家人於本年五月初七日捧到臣前奏明護理巡撫印務日期事一摺又祗遵聖訓等事一摺奉有硃批臣跪讀之下悚惶無地感激涕零伏念臣何人斯䝉我皇上歴賜恩綸訓誨俯望成人臣雖愚昧無知何敢茍安自棄惟有恪遵聖訓朝夕警省痛改前非以圖仰報我皇上天恩於萬一耳所有原奉硃批奏摺理合恭繳謹奏凡事言之易行之難而改過為尤難總在汝肯奮勉與否耳便能沽名釣譽令内外一口讚揚争奈朕不喜巧詐何衆人造福尚在未然朕之加禍已先及矣如法敏楊名時鄭任鑰裴􅏍度張楷伊都立皆是榜様也勉之慎之硃批諭㫖巻一百三十六
