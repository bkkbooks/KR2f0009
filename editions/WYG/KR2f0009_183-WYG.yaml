body:
  text: 欽定四庫全書硃批諭㫖卷一百八十三硃批劉於義奏摺雍正二年五月初九日山西學政臣劉於義謹奏竊臣自本年正月考取遺才二月送文生入場三月初一日即往考代州一棚抵代之日接閱邸鈔欣聞㨗音臣以小臣不敢繕疏恭賀大㨗在臣受恩尤厚踴躍倍深親見我功從此威加絶域永靖邊陲慶及普天利垂萬世矣臣考畢代州四月初二日復回至省錄送武生入場四月十六日即考試太原一棚於五月初一日事竣臣所歴之處密加採訪如代州知州髙遐年才守頗優忻州知州劉毓嵒老實謹慎其餘亦無實跡可指者葢山右自大吏以至州縣人人意中以歴試以來仰遵得雨四月初二日又得雨初九日又得雨二十三二十六及閏四月十八二十二二十八等日俱有微雨今五月初六日晚得雨三寸許已霑足矣惟平陽大同兩府雨澤尚少聞五月初一日平陽亦已得雨秋成可望豐收嗣後容臣考試各郡漸次密訪奏聞謹奏前聞晉省數郡缺雨正在憂念今覽所奏朕懷深慰雍正二年九月十七日山西學政臣劉於義謹奏為恭謝天恩事本年九月十五日接到山西撫臣諾岷移知皇上賞臣養㢘又傳示音出清書聖諭臣跪讀之下感極涕零伏念臣本樗材䝉皇上内廷恩遇至優至渥今簡授學政又䝉皇上體恤周至訓誡詳明自古及今無此知遇伏查山右不比他省歴來絶無學租一切費用實難支持正思入告而皇上不待臣請未識何以仰答髙厚臣到任之初因山右向事姑息士風委靡凡遇士杜絶苞苴勿顧情面臣係君恩皇上耳目最近決不敢以虛詞支飾獨念臣何人斯䝉聖恩眷注至此惟有益竭愚誠祈報君父於萬一耳為此恭謝天恩謹奏朕從來待人毋必即張廷璐可為明騐也進退榮辱總在爾内外臣工有以自取勉為之燈下率筆書諭同日又奏為恭謝天恩事竊臣接閱㑹試全錄見臣子劉復得中第四十二名進士臣受恩深重涓埃未報今臣子又䝉皇上補行㑹試盛典得中進士是臣父子世受國恩疊邀榮遇除臣勉竭駑駘外惟有誡諭臣子劉復力圖報稱以仰答聖主鴻恩於萬一耳謹此繕摺叩謝天恩謹奏㑹榜雖發尚未殿試不知劉復即係爾子覽奏朕亦甚喜所奏地方事宜一摺甚好留中細覽雍正三年五月初九日山西學政臣劉於義謹奏竊臣自開印後考試遼州歴試沁州澤州潞安至四月十八日竣事嵗考已經一週所歴之府州縣澤州最為殷庶其遼州沁州潞安雖多山僻之地百姓無不安堵惟潞安府屬之黎城縣地瘠民貧較他處多荒兩年百姓甚苦其所過之府州縣官沁州知州沈一葵頗得民心聲名甚好澤州知州劉毓嵒為人老實操守㢘潔其餘亦無劣跡昭著月二十三四連日得雨五月初四日又得雨聞大同平汾等府蒲解忻代等州雨俱霑足惟平陽得雨稍遲二麥減收耳米價大米每倉石一兩九錢小米八錢麥每倉石一兩二錢六分黑豆每倉石五錢五分臣現在太原造嵗考報部册俟造完後即行科考各郡謹奏雨水米價情形知道了雍正三年十二月十三日山西學政臣劉於義謹奏竊臣自十一月十二日考完平陽即科考蒲州蒲州向無考棚因新改直隸州䝉皇上加恩廣額生童踴躍建立考棚臣循例赴蒲考試蒲治與陜西接壤一路所過州縣俱年歲豐稔百姓安樂惟蒲州屬之南鄉臨晉縣之北坡民風向覺稍悍耳臣目今考完蒲州即回太原矣平陽米價小米每倉石銀一兩蒲州米價小米每倉石銀六錢謹奏覽爾條奏建倉積貯一摺留中候另有諭旨能將地方情形如此據實直陳朕深為嘉悦雍正四年五月初九日山西學政臣劉於義謹奏竊臣自開印後即往平定州科考平定州亦向無考棚䝉皇上恩詔廣額生童鼓勵建立考棚臣循例往考訖隨考沁州澤州潞安今巳回省定於本月十一日科考太原府一棚約一月内可以考完臣科試之事即畢至所到之處雨水霑足聞平汾大同等郡亦俱有雨二麥既可全收秋田亦巳布種山右今嵗又可望豐年矣太原府小米毎倉石價銀一兩零一分小麥每倉石價銀一兩三錢二分黑豆每倉石價銀八錢謹奏據奏晋省二麥全收固屬可慶而直隸今嵗麥秋復遇罕覯之豐稔朕懷欣慰何似雍正七年閏七月二十六日總督倉場户部右侍郎臣劉於義山西按察使臣葛森謹奏為奏聞事竊臣等䝉皇上差至陜西清查西寧軍需臣等至蘭州後細查西寧所屬承辦康熙五十五等年軍需官員竝無現任者一切西寧軍需案巻冊籍多在蘭州布政司衙門必就近始可清查又原任廵撫噶世圖原任布政使折爾金等俱監禁在蘭即現提各旗各省承辦軍需質訊人員亦令俱至蘭州若令再往西寧亦似䟦涉因再四酌量已定於蘭州清查臣等提閲布政司康熙五十五等年承辦軍需各官造送冊籍頭緒繁多賬目含混伏思歴年以來因何項請撥動用銀兩必有題奏案卷給發各員承辦事件必有原行稿片撥運採買米豆草束以及口袋鞍屉等項每次官兵若干馬匹若干應備糧草若干必有兵部原行部文其運送米豆草束曽否收受必有各該處倉收照票務須一一理清頭緒然後核其有無浮冒或別有情弊之處始可徹底清楚臣等現在咨提各衙門文巻細查其各旗各省提訊人員俱尚未到蘭應俟到日查訊後再行奏聞目下甘肅撫臣許容以協辦軍需尚在肅州布政使孔毓璞亦以軍需調赴涼州俱未回蘭合并奏聞謹奏所見是應徐徐次第料理但務款項清楚不必以遲延為慮且現任各員目今俱承辦軍需毋因稽查前案致令貽誤當下事機也雍正七年十月初一日總督倉場戸部右侍郎臣劉於義山西按察使臣葛森謹奏竊臣等家人恭齎奏摺回蘭跪讀硃批仰見皇上體恤臣工訓誨周摯權衡緩急時措咸宜臣等到蘭之日正值撫臣許容在肅布政使孔毓璞在涼料理軍需臣等惟恐其分心舊案顧此遺彼止令布政司留蘭經手書辦提取檔案理清頭緒其有應行移查事件直待撫臣等料理大兵出口回蘭之後方始行文移查至西寧軍需臣等䝉皇上命至陜西清查務必據實秉公徹底清楚今數月以來凡出入收放錢糧運送採買米麥豆草各官承辦事件以及浮開捏飾情弊俱已逐一查清在陜調到人員亦陸續查訊造冊但署甘肅撫臣張廷棟題請檄調各旗各省併原在陜省人員張廷棟止據布政司開報不知歴年承辦各官原有本人調赴軍前署事官代辦之處臣等行查各承辦官原任地方令各府州縣詳查造冊今據申送前來臣等細加查核有誤行檄調者亦有遺漏未調者其誤調之人臣等巳行文各該處令其不必赴蘭外至已經檄調及遺漏未調之内細查檔案其應追應減之項實有巻冊炳據經承供吐確鑿可以不用行提查訊之人甚多臣等將必須親信子弟或經手家人到蘭質訊如原任蘭州同知雲南撫臣沈廷正等巳經咨明戸部外其餘現在清查如有應行提訊人員再咨戸部檄調仰懇皇上敕部行文將沈廷正等子弟或家人速催赴蘭查訊造冊則案件得以完結而錢糧可徹底清楚矣為此謹奏類斯咨提瑣屑之務係汝等職分内事朕不便敕部行文此奏請可謂妄瀆失體之至雍正八年四月初八日總督倉場户部右侍郎臣劉於義謹奏竊臣䝉皇上命同葛森清查西寧一路軍需到蘭州後即提布政司歴年檔案查明收支總數又行文各地方官逐案查清承辦人員凡收支運送採買承辦等項得以清楚至折收米麥豆草情弊凡西寧涼州莊浪等處無不一一呈露承辦官亦自認不諱原任蘭州㕔今陞雲南撫臣沈廷正之子沈謨亦於本年二月到蘭其折收之處亦盡行首出又各承辦官應追下剰銀兩每託言別案報銷臣等行查布政司將別案應銷與否據實申覆此内查出虛捏銀兩甚多又下剩米麥豆石布政司以軍需尚未歸結既皆不入年終奏銷軍需案内又止以存貯在倉或尚係民欠希圗掩飾臣等每審一案即將下剩米麥豆石令布政司清查果否在倉或係民欠或係官虧俱令逐案申覆務得實情今各案俱已審結又西鳳運送米豆折給情弊亦已審明現在繕造清冊彚總核銷五月中可以完結臣俟逐案題結後即起程回京至蘭州甘雨應期肅州糧草俱已出口葛森現在西寧辦理噶斯軍需謹奏覽奏已悉所辦理處公當與否明晰妥協與否必俟題結後方顯然可見也雍正八年十一月十八日吏部左侍郎協辦山東巡撫印務臣劉於義刑部左侍郎臣牧可登謹奏為奏聞事竊臣等奉命差往山東查賑前已將撫臣岳濬給散過各屬修理房屋銀兩并臣等查核過濟南一府及武定濵州髙唐三州散賑事宜奏明在案臣等初到東省念賑務重大即咨商河東督臣田文鏡據田文鏡覆札東省民刁俗悍頑紳劣衿生事不法之輩不以求賑為恥而以與賑為榮往往暗藏糧食分寄戚里以應賑為名聳動愚民挾制官長希冀妄賑稍不如意即羣起鬨鬧地方官柔懦無能者一任鄉地胥役串通捏造舞弊分肥甚有姦貪不肖之員乘機侵蝕捏賑冒銷等語臣等己嚴飭五路監賑司道確實清釐務期不濫不遺以仰副皇上欲使貧民均霑實惠之至意臣等巡歴濟青東兖四府屬各州縣内有已經賑完者有散結過半者總飭於十一月賑濟通完以免寒天守候至臣等所過地方亦有求賑百姓紛紛具呈隨即委員察查多係原可自給希圖邀賑誠有如督臣所云以與賑為榮者臣等概不凖給其中有稱先經外出聞賑復歸之貧民現飭各司道查實補給庶妄希邀賑者不致冒濫而回籍貧民亦不致遺漏矣所有臣等賑過各地方皆霑皇上浩蕩鴻恩粒食安居竝無饑寒凍餒之色除賑過戸口穀石實數俟查賑完日另具奏聞外先將臣等親歴目擊情形繕摺具奏伏祈睿鑒謹奏據云督臣田文鏡謂東省民俗不以求賑為恥而以與賑為榮此等議論但當體察虚實秉公持中辦理為是若聲言於衆使怨歸田文鏡則屬小人之用心也斷斷不可雍正八年十二月二十一日吏部左侍郎協辦山東巡撫印務臣劉於義刑部左侍郎臣王國棟謹奏為奏請聖鑒事竊查東省今嵗荷䝉聖恩軫念乏食窮民准給三箇月口糧動穀賑濟州縣倉穀向當收貯之時每慮有折耗竝鼠食等項往往稍有盈餘今除散賑外其盈餘剩穀雖多寡不齊難以預定亦未便任聽州縣隠匿致有侵蝕入己之弊伏思我皇上愛養民生每年冬春之際敕令五城設立粥厰煮粥賑濟京城乏食貧民均霑實惠今東省被水州縣各鄉村實在生計蕭條無業貧民業經造册散賑儘堪度嵗但尚有城市貧民原非被水不在應賑之内及聞賑外歸者除已飭補給外目今尚有陸續歸里之户均屬可憫臣等竊擬通飭各州縣如有散賑盈餘剩穀令其據實詳報倣照五城之例盡數多寡即於本處酌量設立粥厰煮粥以濟貧民似益足以推廣皇仁而亦可杜州縣隠匿之弊緣事關地方賑務臣等未敢擅便理合恭摺奏請是否可行伏候聖訓批示謹奏此亦助賑之一道與岳濬妥議施行同日又奏為請設利津海口墩臺以重海疆以衞鹽灘事竊照濱州屬之利津一邑係海疆重地為山左產鹽之所邑之東北為清河河之西為豐國鎮至牡犡口與霑化縣接壤河之東為永阜塲至絲網口與樂安博興兩縣接壤自海口至利津縣城一百一二十里不等海口之上均屬鹽灘人以曬鹽為業因灘地逺在海濵四五十里絶無人煙每有不法之徒於交界地方成羣竊販毫無忌憚雖豐國鎮設有巡檢一員永阜塲設有大使一員專司查察而相隔鹽灘俱有三四五十里之遥未免鞭長莫及且今䝉皇上天恩軫念東民乏食特允撫臣岳濬及臣等摺奏將奉天撥運米石由利津之牡犡口進大清河分撥平糶將來防䕶尤冝嚴密先經光祿寺卿王􅕵奏准奉天糧食准令商人由海販運至東亦必從此口進舟又為商販之要道臣等不揣愚昧似應添設墩臺撥兵防守方為有益請於離口二十里之臺子關總要地方修建墩臺一座營房十間撥兵十名令其擕眷防守瞭望海船之出入稽查私販之往來又於西接濱州霑化之雙井地方添設墩臺一座營房六間撥兵六名亦令其㩦眷住宿以衞鹽灘以杜姦販所需修建之費即於司庫公費銀内照河標例動支再查利津止設把總一員馬兵十名步兵三十名不便抽撥應令鎮臣於簡僻州縣酌量改調即令利津把總管束以專責成臣等因海疆重地起見故敢謬陳一得是否有當懇乞皇上訓示施行謹奏利津海口設臺撥兵之處與田文鏡岳濬再行商酌若意見僉同具題請旨雍正九年正月初六日直隸河道水利總督臣劉於義謹奏為請㫖事竊臣䝉皇上天恩補授河道水利總督除繕摺謝恩外查河道水利關係重大須乘春初水涸之時遍行巡查遇有堤岸坍缺卑薄之處早行修築防䕶水發時方可無虞但臣奉㫖同牧可登會同撫臣岳濬審理金允彝一案因賑務告竣即值封印尚未會審須俟開印後審結臣應否星速回京恭請聖訓前往河工料理或仍同牧可登俟審結金允彝案後回京之處相應請㫖謹奏不但㑹審之案將所交東省一應事件俱辦理完畢然後再赴新任淮北山東交界處所連嵗微覺薄收夏秋被水今冬已頼皇恩賑給度活開春青黄未接之時不無乏食窮黎更覺艱難尚須設法安頓乃聞被災隣近接壤地方有麥秋兩季合縣統算僅能三四分年景其中亦有高下苦樂之不同竟作七八分收成匿報者又兼各官迎合上司駁詰刪減饑民户口太甚間有密諭文武屬員凡遇外來就食之人槩行驅逐而被災本處誠恐敗露前情更將漏報饑民攔截不許他往雖據紛紛傳説未必盡實且救荒之道自古原無善策但立法未妥以致無處投奔或至激生事端不可不為之慮緣關地方近日情形臣不敢畏嫌隠諱冒昧直陳伏候聖明鑒照汝等奉朕委任何縁有如是浮議其據實覆奏以聞雍正九年正月二十一日直隸河道水利總督臣劉於義刑部左侍郎臣牧可登謹奏為據實覆奏事竊臣等奉到皇上發下鈔摺一扣硃批汝等奉朕委任何緣有如是浮議其據實覆奏以聞欽此查摺開淮北山東鄰近接壤地方有麥秋兩季合縣統算僅能三四分竟作七八分收成匿報等語臣等奉命到東麥秋兩季俱已收穫未及目擊情形訪得山東上年二麥實係豐收其秋成被水各州縣分數督臣撫臣詳細分別踏勘現在具題外又摺開各官迎合上司駁詰刪減饑民户口太甚間有密諭文武屬員凡遇外來就食之人概行驅逐被災本處誠恐敗露前情更將漏報饑民攔截不許他往等語臣等分委司道官五路監賑原飭令將各州縣所造應賑户口清冊詳加核實如有冒濫即行刪去如有遺漏即行補給後各州縣散賑之冊實有比原冊刪減之處葢緣被水之初所報貧民户口止憑鄉保造送多有不實今各州縣挨户核實内有本係衙役佃户而冒開者有經營生理可以度日者有報名後他出以小口混作大口者如此等弊俱確核釐清另造實在應賑户口冊籍給散此係刪除冒濫竝非核減貧民亦係各州縣自行剔除竝非奉上司駁詰至查造報冊内有將貧民遺漏如沂水泗水等縣臣等令各司道俱查明補給此又於原冊造報之外増添竝非概行刪減也至於驅逐攔截饑民之説臣等周歴各屬到處體訪民情竝無攔截饑民不許出外之事謹遵諭㫖據實覆奏伏祈皇上聖鑒謹奏果係浮論不確乃朕所願豈樂聞無稽之言耶諭劉於義牧可登知悉臬司唐綏祖乃係不避嫌怨實心任事之賢員金允彝挾恨布散流言誣其開款捏陷妄希明已之冤因此不便仍令本省審鞫特命汝等查究以杜小人悠悠之口切不可誤被浮詞所惑而心有適莫倘推訊少不妥確勢必仍交田文鏡復加詳審也秉公慎為之毋得疎忽從事自貽將來之悔密之雍正九年三月十六日直隸河道水利總督臣劉於義刑部左侍郎臣牧可登謹奏為敬陳審案供情仰祈聖訓事竊臣等欽奉諭㫖㑹審濟南府㕘革知府金允彝貪劣一案臣等提巻確查此案自雍正七年十一月内督臣田文鏡題㕘發審經歴城縣知縣郭芝㑹同長山縣知縣陸費熙濟南府知府楊在魁㑹同青州府知府廣壽屢次研訊内有婪贓等款供證未確金允彝嚴夾不承以致拖延一年有餘款證馬三王公明周之瀚三命相繼累斃而不能成信讞臣等奉旨秉公逐一㑹訊將案内犯證俱各問取確供查督臣原㕘八款已經審實六款其婪贓二款審無確據難以符合原㕘但金允彝以一丁憂知縣䝉皇上特恩超擢知府不思公正自持力圖報效而乃抑勒交代科派屬員妄斷案件濫差胥役以及失察官役家人犯贓種種劣蹟罪無可逭容臣等另疏備録各供按律定擬具題外至於傳聞按察使唐綏祖挾嫌開款情由先據唐綏祖詳稱竝無其事復准督臣田文鏡咨開各款俱係訪審題㕘竝非由唐綏祖開送等語似可無庸置議合併陳明伏祈皇上睿鑒謹奏覽奏知道了具題到日有旨雍正九年八月十六日直隸河道水利總督臣劉於義謹奏為壩工幸未告成懇恩再行酌議以慎大工事竊臣䝉皇上命看各河水發情形臣截留直隸漕糧即從通州由水路前往天津時新雨之後北運河已不患淺澁臣至青龍灣細加閱視壩面比水面尚髙八尺詢通永道徳希壽回稱革職侍郎何國宗原料估壩面止寛二十丈䝉諭㫖命壩面展寛四十丈嗣何國宗又奏准壩面内建雞心十四座空十五金門下板啟閉現在遵行建造在案臣又行至筐兒港減水壩地方細加測量壩面比水面止髙四尺五寸檢閲原巻壩身原髙一丈三尺壩面原寛二十丈因不能洩水雍正六年怡賢親王奏准壩身落低五尺止髙八尺壩面又展寛四十丈共成六十丈北運河之水宣洩始暢所以雍正七年之水甚大筐兒港以下之堤岸俱得保全此筐兒港壩面寛濶之明驗也今何國宗等將筐兒港壩面上加灰埝三尺五寸臣嫌其太髙但灰埝易於改造應俟臣到任後再加相度具奏至青龍灣壩工皇上不惜帑金五十餘萬兩親授方畧建減水壩以洩全河之水使河西務險工可保平穩為運道民生千萬年永逺奠安之計查筐兒港舊壩寛二十丈不能洩水直至展寛六十丈洩水始暢青龍灣二十丈壩面不能洩水明矣皇上斟酌盡善較筐兒港則少減較原估則展寛故有壩面寛四十丈之諭㫖自宜敬謹遵行今又議壩面内建雞心一十四座每座面寛七尺共寛九丈八尺則壩面名為四十丈内為雞心占去九丈八尺實止存三十丈二尺即使洩水不能宣暢夫費皇上五十餘萬兩之帑金而必多建雞心阻抑水勢使不能暢洩以保險工實為臣所不解幸今壩面海漫石未鋪雞心未建乘此中止恪遵皇上諭㫖壩面寛四十丈使洩水宣暢費省功倍河西務等工程可望平穩於運道民生實有裨益矣徐湛恩由京赴津亦於青龍灣細心相度與臣意見相同臣等目擊情形恐將來再煩改造不揣冒昧瀆奏伏祈皇上睿鑒敕部議覆施行謹奏工部議奏雍正九年十月二十二日刑部尚書署理直隸總督事務臣劉於義謹奏為恭請聖訓事竊臣蒙皇上天恩命署理直隸總督事務本應進京恭請聖訓緣本年九月十七日奏請每年萬壽元旦容臣進京瞻仰天顔時聆訓㫖䝉皇上面諭爾今嵗萬壽元旦不必来京嗣後每年許爾進京欽此臣謹遵諭㫖不敢進京但臣才具疎庸直隸地方事務殷繁旗民雜處深恐不克勝任仰懇皇上硃批訓示俾臣知所遵循以便敬謹辦理則感荷皇上生成之徳於無暨矣謹奏爾非新進外吏可比朕之意向諒應知之有素豈待臨時請訓而始有所遵循耶雍正九年十二月十五日刑部尚書署理直隸總督事務臣劉於義謹奏為奏聞事本月十二日據宣化府宣化縣申稱雍正九年十二月初六日從巴爾庫爾軍營回京差使有兵部勘合一道填給内大臣兼步軍統領阿親丁跟役馬包馬引馬共計一十八匹又兵部勘合一道填給侍讀學士查跟役馬包馬引馬共計十匹又兵部勘合一道填給筆帖式凖跟役馬包馬引馬共計五匹又兵部勘合一道填給領催班濟跟役馬包馬共計三匹以上共該應付馬三十六匹俱巳照數應付詎料跟役於勘合之外硬向驛夫多索馬一十六匹正擬詳報間本月初七日又據馬夫張玘等報稱前項馬匹行至七里臺壓壊黑騸馬一匹行至泥河十三里又因包重壓死騮騸馬一匹等語據此合將前項跟隨人役騷擾驛遞情由據實申報等情申詳到臣除現飭按察使口北道查明果否勒索及有無濫應情弊俟查明到日題㕘外理合先行奏聞謹奏此奏可嘉之至肯如是居心毫無顧避何任不克勝何事不能辦也勉之但不可偶爾舉斯一二事以取信於朕而於他處仍復瞻徇隠蔽則更為巧偽之行矣雍正十年三月初六日刑部尚書署理直隸總督事務臣劉於義謹奏為恭報雨雪事據順天府屬之良鄉涿州霸州固安東安懐柔密雲通州順義昌平延慶等州縣衛報稱雍正十年二月十一日得雪一寸至五寸不等保定府屬之定興淶水易州等州縣報稱雍正十年二月十一日得雪一寸至三寸不等河間府屬之景州阜城東光吳橋寧晉等州縣報稱雍正十年二月初五初六等日得雪二寸至八寸不等冀州及所屬之武邑南宮棗强衡水新河等縣報稱雍正十年二月初五初六等日得雪二寸至五寸不等趙州及所屬之寧津隆平等縣報稱雍正十年二月初五初六等日得雪一寸至二寸不等深州報稱雍正十年二月初五日至初六日得雪三寸廣平府屬之清河縣報稱雍正十年二月初六日得雪一寸又據順徳府屬之唐山縣報稱雍正十年二月初五日得雨一寸大名府屬之開州南樂等州縣報稱雍正十年二月初二初三等日各得雨一寸理合奏聞謹奏覽奏畿内雨雪殊欠霑足亟當竭誠修省䖍恭祈禱可也刑部尚書署理直隸總督事務臣劉於義謹奏為懇恩分年帶徵以清積欠事竊臣自到任以來詳查直隸各州縣舊欠錢糧自康熙六十年至雍正八年内有歴年清完竝無掛欠者共七十九州縣有掛欠數十兩以上至三千兩以内者共二十八州縣有掛欠三千兩以上至一萬兩以内者共二十一州縣有掛欠一萬兩以上至四萬兩以外者共一十三州縣臣伏思皇上深仁厚澤於直隸百姓蠲免錢糧賑濟倉穀緩徵平糶較之他省尤為優渥夫有加無巳者聖主撫恤之恩而踴躍完糧者百姓急公之義乃有愚頑之民拖欠舊糧不即完納以臣愚見除舊欠三千兩以内之州縣應令地方官設法催徵務於一年以内完納外其舊欠三千兩以上至一萬兩以下之南皮天津等二十一州縣仰懇皇上可否分作三年帶徵其舊欠一萬兩以上至四萬餘兩之寳坻武清等一十三州縣仰懇皇上可否分作五年帶徵務令地方官遵照年分催追完結倘分年之後地方官尚不實力催徵仍聽百姓拖欠者請照惰徵例嚴㕘議處如此則各州縣易於催追而歴年舊欠錢糧亦可徹厎清楚矣臣管窺之見未敢具本伏乞皇上睿鑒訓示施行謹奏該部議奏同日又奏為請㫖事竊照直屬正雜大小官員皆䝉皇上天恩賞給養㢘在案今接准直隸新設河臣移咨酌議又新設營田觀察使二員經臣奏明議給養㢘俱經檄行查議去後今據布政司議詳直隸新設河臣應援照河南總河養㢘之例正總河請給銀六千兩副總河請給銀三千兩又據議稱直隸新設營田觀察使二員巡歴各屬督率營田往來奔馳不無車馬飯食等項之需每嵗請酌給養㢘銀二千兩等因各議詳到臣伏查河道總督并營田觀察使有巡歴河工查勘營田之