在有收成可望六七分者有收成止可得二三分者目今各府州縣正在平糶民心甚安臣細查各府州屬現在存貯之倉穀數目萬一荒歉儘足敷用惟順天一府除宛平大興通州䝉皇上恩將粳粟米一百萬石平價糶賣可以不用籌畫外其餘二十三州縣衞止存貯穀七萬四千六百餘石為數甚少恐不敷用幸有上年截留北倉米四十萬石除目今撥給各州縣平糶米二十萬石外其存剩之二十萬石順天府屬近水州縣甚多即離水次稍逺者亦俱在一二百里之内若有需用計日即可運到則此項截留存剩之米存貯北倉以備順天一府二十三州縣衛之用儘足支應再查宣化府屬存米八千二百餘石穀九萬二千六百餘石近以不敷兵米等項借支及現在平糶動用米及穀折米共三萬七千四百餘石所存米穀為數甚少又係軍需往來之地應請撥運今臣另摺奏聞至於目今各屬百姓竝無嗷嗷待哺之狀接濟撫恤尚屬可緩臣現在委試用官十二員分查各府州縣平糶即宻飭其體察百姓光景倘將來雨澤不繼二麥歉收果有乏食之虞或散米或賑粥或借給倉穀臣一面奏聞一面辦理決不敢膜視百姓自蹈欺隠之罪以上負聖恩謹奏覽此奏朕念方為少慰同日又奏為懇請撥運米石以儲支應事竊宣化一府地處邊陲目今又係軍站往來孔道所有積貯自宜充裕至古北口及密雲順義等倉支放兵米近又添設兵丁需米較多亦應儲備臣查宣化府屬十一州縣原貯米八千二百餘石穀九萬二千六百餘石近因萬全等縣不敷兵米及過往員役口糧借用又現在赤城宣化萬全懐來懐安龍門六縣平糶共動用米及穀折米三萬七千四百餘石所存米穀為數甚少就近既無可以撥運之州縣而宣化一屬米價又俱不能平賤可以收買惟有運米一䇿可濟急需今擬張家口應撥運米二萬石宣化縣撥運米一萬石獨石口撥運米三千石懐來懐安二縣各撥運米一千五百石萬全縣撥運米三千石赤城縣撥運米一千石以上宣化府共該撥運米四萬石至古北口倉雖尚存米七千五百餘石穀三千四百餘石但現在支放兵米近又添設兵丁應撥運米一萬石密雲縣雖現貯穀二千八百餘石積貯甚少應撥運米五千石順義縣雖尚貯穀八千二百餘石積貯亦少應再撥運米三千石以上古北密雲順義三處共該撥運米一萬八千石連宣化府共應撥運米五萬八千石查此項米石若能仰邀天恩於清河及京通各倉撥給近年鮮好粟米容臣遴選能員攜帯脚價就近運送固為至便若於直隸存貯米石内撥運惟有北倉存剩雍正三年海運粟米從津至通水路便易亦可撥運如䝉俞允臣即可委員備辦脚價分頭運送庶宣府古北等處預備有資於軍需亦有禆益矣伏乞皇上敕部議覆施行謹奏該部議奏雍正十年五月二十日刑部尚書署理直隸總督事務臣劉於義謹奏為奏聞事竊查直隸去冬少雪今嵗雖時有雨澤均未霑足目今二麥不能豐收皇上焦心勞思日不甘味夜不安寢臣即時刻稽查體訪深愧不能仰承聖心萬一豈敢稍有欺隠疎忽然臣終懇皇上暫行緩賑者皇上愛惜百姓時時已溺已饑在臣身任地方不得不躊躇緩急直隸䝉皇上恩准平糶各州縣米麥價值與春天大約相等竝未昻貴民心頗安又二麥雖歉收其六七分者固可支持數月即二三分者亦尙可支持月餘再百姓因歴年以來稍有水旱之災皇上即多方賑恤原有希冀恩澤之想目今若即散賑百姓豈不歡然但有雨無雨將來尚未可定萬一秋收再一歉薄需用正多又二麥歉收之處一兩月後必難自給彼時正須接濟若目下先已散賑將來急需之時反至不足敷用葢百姓果有流離困苦之狀不可刻遲若百姓不至無可奈何之時亦不得不緩臣仰見皇上如此焦勞誠恐果有乏食窮民地方官隠飾不報臣於前月中即遣試用官十二員分查各府州縣每日俱有報單到臣所報之中止有河間一路數日内有窮民六七起係武邑獻縣阜城交河等處人民攜挈妻子自南而北據云前赴任邱雄縣等處拾麥葢緣任邱雄縣環繞淀池之處今嵗二麥豐收田有遺穗可以採拾北方風氣如此臣已密諭該二縣留心撫恤矣又大名府屬之長垣縣五月初六初七兩日村莊有被冰雹者臣已飛飭該府親詣查勘一面賑恤俟查明之後再行奏聞又直隸今嵗上半年錢糧百姓踴躍急公已完有四五分之數臣密飭各州縣且暫行緩徵但查直隸本年兵餉及協濟西餉并古宣二提鎮新添兵餉起運銀兩所餘無幾若一得雨仍欲開徵總之臣體訪民情果有嗷嗷乏食之虞即當一面奏聞一面辦理決不敢膠執巳見自蹈膜視百姓之罪至北倉截留之米已平糶過二十萬石其存剩之二十萬石臣欲留備順天一府穀少州縣之用今查順天府屬之大城文安霸州新安等州縣俱係窪下之地二麥豐收而其餘各府州屬之缺雨州縣尚須平糶仰懇皇上容臣於北倉存剩二十萬石米内再糶數萬石以濟民食則萬姓更沐皇恩矣謹奏覽奏已悉有旨諭大學士矣雍正十年閏五月初六日刑部尚書署理直隸總督事務臣劉於義謹奏為報明事雍正十年五月初九日據趙州隆平縣申稱卑職赴鄉稽查保甲訪有民人李思義以治病為由傳授張茂林姜成宗等跪拜太陽禳災避難騙惑愚民已將為首之李思義竝為從之張茂林姜成宗拏獲現在審訊又據民人殷兆祥孫成名張重義田亮孫成義李建各自首到縣據供李思義説今年世人多災歸他道中可免災難呌我們每日三次朝着太陽叩頭供三代宗親牌位每月給李思義幾箇錢他替上供保平安我們愚昧被惑如今䝉把李思義拏了恐被連累具呈出首等情申報到臣臣恐邪教惑衆或黨羽衆多隨檄布按兩司速飭查明餘黨限十日内審擬詳解去後今據兩司招解前來臣覆加親訊李思義本因窮苦不過想誆騙錢財竝非實在邪教其張茂林姜成宗亦因被李思義所惑轉向伊等認識之殷兆祥田亮等令其相隨跪拜太陽禳災避難此外竝無黨羽所供與司詳無異據該州縣比照私家告天拜斗䙝瀆神明杖八十律詳請完結臣傳同布政使王謩按察使竇啓瑛面商李思義窮極無頼借拜太陽為名誘騙錢財入已雖無他意但此等風氣斷不可長為首之李思義應援照稱為善友求討布施發邊外為民例發邊外為民為從之張茂林姜成宗及聞拏自首之殷兆祥等分別枷責發落是否允協仰懇皇上睿鑒訓示施行謹奏據奏議將李思義發遣邊外為民而竝未言及該地方官作何拘管恐到彼又生事端煽惑愚民行文時當添入為是雍正十年閏五月十四日刑部尚書署理直隸總督事務臣劉於義謹奏為續報雨澤事雍正十年閏五月初六日以前各屬報到得雨日期臣巳繕摺奏聞外兹於初六日以後續據順天保定永平河間正定廣平大名宣化天津等府冀深晉定直隸等州報稱所屬於閏五月初一初二初三初四初七等日得雨一二三寸以及四五六寸不等臣謹將各府州屬之得雨縣衞并該地方得雨分數另繕清摺恭呈御覽伏乞皇上睿鑒謹奏覽爾所開清摺得雨分數未盡確實同日又奏為奏聞事竊臣據布政司准口北道移據張家口理事同知白石詳稱口外先農壇廟夫武政稟稱政於五月十六日耕種先農壇地畝地内刨得古錢一堆不敢隠瞞入已理合報明等情該同知隨親詣查騐共得古錢九十九掛每掛足錢五百文係五銖開元天聖景徳政和熙寧元祐元豐祥符等年號堆存土内無物盛貯亦無隠匿他物由同知白石詳報到道轉移到司等情申詳到臣臣查古錢九十九掛俱係漢唐宋錢文得於口外先農壇内適符陽九之數皆由我皇上敬天勤民重農貴穀惠懷之徳遍於遐陬有此地不愛寳之應廟夫武政以邊鄙愚民不自隠匿抒誠稟報亦屬可嘉除將古錢檄令宣化府貯庫及武政另行給賞奬勵外理合奏聞謹奏此地方偶然事耳何須如是浮夸將錢文貯庫終成廢物亦復何用殊屬小見之至給與本人領回可也毋使吏胥從中沾潤同日又奏為請修衝郡城垣事竊臣據直隸布政使王謩准口北道王棠移稱宣化郡城東接神京西連秦晉路通張家殺虎諸口夷民往來軍需絡繹實屬畿輔重地自雍正元年發員修葺以來歴有年所其間多有殘缺坍塌今據該府縣㑹同武職逐一查勘將應修應建之處備細確估造册申送前來據册開宣化郡城週圍二十餘里東西北三面城墻垜口并四面城樓以及馬道等處估計工料銀一萬三千四百四十餘兩又郡城週圍向無敵樓策應瞭逺請添建敵樓四座估計工料銀四千七十餘兩城上向有礮臺六十三處礮皆露處請添建礮房六十三間估計工料銀三千二十餘兩又週圍有土臺九十一座請建窩舖九十一間為巡兵往來遊息之所估計工料銀二千九百八十餘兩又宣城内外向無柵欄請設立柵欄一百二十九處嚴禁夜行盤詰姦宄估計工料銀一千五十餘兩又城關内外向有分撥汛兵稽查匪類俱無房屋請建堆子窩舖四十間估計工料銀三百二十兩又城内有鐘鼓樓二座日久倒壞應行修整估計工料銀四千七百三十餘兩以上共料估銀二萬九千六百三十餘兩請於司庫存公耗羨銀内動用興修等情申詳到臣臣查宣化地當衝要城垣非比別郡理應修整但據估計册内并欲修葺鐘鼓二樓似非急務至直隸各州縣柵欄俱係地方官督率里民建立亦無請動公項之例除飭布政司遴委能員赴宣閱視酌量核實料估外所有宣化府城應否即行興修之處仰懇皇上睿鑒訓示施行謹奏宣化府城垣應修之處命該道王棠等確查酌估定議具奏雍正十年六月二十四日刑部尚書署理直隸總督事務臣劉於義謹奏為請修橋梁以便行旅事竊臣據布政使王謩申據霸州知州陳起唐呈稱卑州苑家口地方有永濟橋一座係南北往來通衢橋長三十丈寛三丈五尺因歴年久逺全橋傾圯木料俱皆腐爛若不急為修葺則行旅往來輪蹄絡繹深有未便伏乞委員勘估興修等情本司隨委大城縣㑹同該州逐一確估共需工料銀二千二百五十兩零造冊詳報前來應請奏明於司庫小飯銀内給發修理完工造册報銷如有餘剩飭令解還歸款等情申詳到臣臣查霸州苑家口之永濟橋係山東登萊青三府進京大路今既全橋傾圮木料腐爛似應急行興修據布政司請動司庫存公小飯銀二千二百五十兩零給發修葺如有餘剩飭令解還歸款等語似屬允協理合奏聞其應否即行給發修理之處仰懇皇上睿鑒批示施行謹奏橋梁乃濟渡攸關况係通衢亟應修理者照所請行雍正十年七月初四日刑部尚書署理直隸總督事務臣劉於義謹奏為據實奏聞事竊查雍正八年直隸河間順徳廣平大名四府俱被水災而大名尤甚䝉皇上百計拯恤而於大名一府又續加賑濟萬姓得以安全查大名屬之長垣東明開州自雍正八年十一月起至雍正九年四月有扈三等行刦袁廷美等家盜案一十六起内除有兩案尚未緝獲外其一十四起共盜一百六十名巳獲八十三名内病斃五十五名現存二十八名彼時各州縣以各犯或執有柳棍或綑縛事主形跡似盜故俱以盜案申報前署督臣唐執玉據文俱㕘疎防在案今臣逐一親審所得贓物或糧數斗或小錢數百文俱係近村窮民一時為饑餓所廹見有饒裕之家起而竊奪竝非積匪慣盜情尚可憫查定例直隸盜案自雍正八年以後不分首從俱應斬決在臣止應執法豈敢原情但恭遇皇上如此如天好生臣若不將各案實在情形奏聞仍復照常擬斷在聖主無由而知臣清夜捫心實不自安謹據實陳奏可否仰邀皇上格外天恩容臣將此十六案現獲人犯并將續獲人犯其盜首及綑縛事主之犯照減等例以流罪發遣其無知為從之犯枷責發落飭令地方官嚴行管束不許出外為匪如有再犯仍照原案治罪應否如此完結或應照定例問擬完結之處伏懇皇上睿鑒批示施行謹奏仍應照例問擬但將情由於疏内聲明為是豈有率意改擬摺奏完結之理雍正十年七月二十日刑部尚書署理直隸總督事務臣劉於義謹奏為叩懇天恩事竊臣䝉皇上命署陜西總督印務并辦理軍需事件又復恩賞路費銀五千兩髙厚鴻慈至優至渥今巳於本月二十日馳驛星速前赴肅州矣臣更有請者臣子劉復係雍正五年進士翰林院編修雍正八年七月䝉皇上命往直隸廣平府賑濟恩賜紀錄二次十月内丁憂回籍本年四月省臣到保臣因其將次服闋若回至江南又隨欲北上仰懇皇上天恩可否命入南書房學習行走恭聆皇上訓誨俾得至於成人則臣尤沐皇上深恩於無既矣為此繕摺請旨謹奏已有旨命汝子劉復入南書房行走矣硃批諭旨卷一百八十三
