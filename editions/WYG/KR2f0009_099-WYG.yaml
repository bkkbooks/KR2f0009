body:
  text: 欽定四庫全書硃批諭旨巻九十九硃批張璨奏摺雍正七年七月初四日直隸按察使臣張璨謹奏為請嚴跌錢之禁以重國寳以清賭具事竊臣以一介庸愚荷䝉皇上不次擢用畀以直隸刑名重任洪恩異數欲報無能凡欽奉諭旨嚴禁事理惟有實力奉行留心稽查以冀仰副聖天子移風易俗之至意伏查賭博一事定例甚嚴其牌骰等件固已久經嚴禁而跌錢一項其風日熾将錢擲地以决勝負所賭輸贏盈千累百竟不減於牌骰是跌錢之禁不嚴則賭具終不能清而賭風亦終不能息況跌錢一項且足為影射牌骰之具葢有本係鬬牌擲骰一經發覺惟恐追究賭具而詐稱跌錢者亦有地方官畏失察賭具處分并借跌錢之名巧為開脫者種種流弊不可勝言矧錢文乃係國寳而輒敢用為賭具以相嬉戲其為不敬罪莫大焉臣愚以為欲除其弊必嚴其罪請嗣後如有跌錢賭博者將出錢之人與開場放頭併同賭者照牌骰之例加等治罪其地方官不力行查拏漫無覺察者亦照失察牌骰賭博之例加倍議處地方牌甲人等一體嚴加治罪如此則愚民咸知國寳為重不敢輕䙝而賭具之流弊亦可遏絶矣是否有當伏乞皇上敕部議覆施行謹奏舉凡賭博等事既角勝負即有輸贏無不為利起見然牌骰等具製造精良原可藉以遣興消閒不特市井販豎為之士大夫亦往往樂此不為疲所以其風易熾至於擲錢之戲不過博徒不能頓改舊習暫為之技耳久之自當止息況賭法豈僅此擲錢一項倘禁此而愚不肖軰復創設他法以相娱嬉勢又不得不禁則是禁欵愈多而賭具無窮究竟何所底止耶汝等地方大員但當禁絶牌骰足矣何必又及其餘此皆輕本重末之舉朕甚不取果能實力奉行牌骰二事令行禁止勸導愚頑革心向善則此一二擲錢棍徒只用數張告條保其當下停止設地方平時禁不止令不行縱由部頒條約千百言仍屬有名無實徒滋紛擾於事亦復何濟若謂擲錢為輕褻國寳更屬鄙論朕惟以賢臣為寳餘無可寳者錢文雖係國寳乃民間日用之物居常繫之腰膝之間藏之席褥之下皆莫得而禁焉又安可以不敬之罪罪之乎據汝又云地方有司因畏失察賭具處分借跌錢之名巧為開脫等語尤為可笑若然則汝之不能察吏顯然自首矣識見甚屬平庸亟當奮勉學習以期無玷官箴況擲錢之戲雖未奉旨眀飭一切賭具未嘗不容汝等禁遏也當禁者汝等自可申飭屬員奉行何庸具奏煩瀆雍正八年三月二十三日湖南按察使臣張璨謹奏為據實回奏事竊臣荷䝉皇恩調任湖南按察使欽奉皇上面諭令臣將許英賢一案秉公研究臣於到任後查人犯已經移解江西檢閲巻宗因許英賢等在永順散毛茅岡等司地方假張天師名色賣藥行醫蹤跡可疑辰沅靖道王柔恐係匪類拏獲嚴究供出張易珍等為匪令伊等在外施藥并夥黨姓名請咨各省緝拏續又拘獲許世基等到案并咨查江西覆無張易珍名目經前任按察使郭朝祚研訊許英賢等堅供從前實係畏刑妄供並無為匪情事隨經詳請前撫臣王國棟将該犯等咨解江西原籍收管去後嗣經雲南獲解江自得即江子德等四川獲解江子文等及雲南續解江東景等福建獲解王霖等并據郴州拏解朱金有等隨經撫臣趙𢎞恩咨提江西許英賢等到案發審總計三十一名隨即㑹同布政司逐一隔别細加研訊據許英賢等堅供實係在外行醫恐無人見信遂假天師名色賣藥冀圖獲利並無為匪情事再三研鞫堅不招承迨嚴加刑訊又極口稱寃及提許英賢所供之江自得質訊亦供實係行醫賣藥為生詰其供吐因何彼此脗合據供雲南係執湖南來咨推究故爾照伊混供並非實情再四究詰矢口不移臣思大案全憑證據今審該犯等謀為不軌之處毫無確實搜檢行李又無别物似難懸擬以大逆之罪可否将許英賢等遞回原籍著落該犯户族嚴加收管不許出外滋事臣知識淺陋未敢擅便業經將該犯等所供與各省咨覆情由備叙轉解撫臣覆審外理合將臣等審過縁由先行具摺奏聞謹奏閱爾審訊情節與朕原諭相符滇省所取之供脗合若此安得不行根究既無確據照所奏發落可也然不可因此案子虛遂爾於究察匪類等處懈忽從事勉為之硃批諭㫖巻九十九
