臣等聞報當卽飛飭沿途官員一體勸阻併委試用同知張炳綸等攜帶公項銀兩星往招徠去後復據長樂縣知縣江日暄禀稱往川人民止招回十一名其餘俱堅稱親屬在川前往完聚不遵勸諭等語又經飛檄張炳綸等星往前途眀白曉諭有願回者給貲安插其實有親屬在川者委員䕶送往川臣等已於九月内奏聞在案隨據粤省沿途營縣陸續勸回一百五十八名口俱已給貲安插又據張炳綸等禀稱趕至前途諄切勸諭在江西地方招回二十六名口湖南地方招回七十名口其實有親屬產業在川前往完聚者共三十八名口又江西安遠長寧二縣人民七十五名口福建永定縣人民六十六名口經該員等㑹同湖南衡陽縣知縣楊純詢問眀確俱經聽令前往查從前該民等經過龍川長樂地方縁係入川總路一時湊値原非盡屬粤民因該民等堅諱住址姓名故該縣等未能分晰具報至招回之九十六名口并先經沿途營縣招回之一百五十八名口臣等巳委員安插其願赴鶴山墾荒者給貲起送其仍願居本籍者查眀變賣房產給貲贖回安業俱各得所再惠州府屬長樂等縣因向來往川人民甚多臣等委糧驛道陶正中等徹底清查其實有親屬產業在川欲往完聚者尚有六十三户共一百四十一名口現在咨查眀確照例給照前往以杜隨從潛行之弊其查出貧民願赴鶴山開平等縣墾荒者俱給貲起送墾耕安插務期民無失業以仰副聖主懷保之至意所有先後招回人民及分别聽往完聚縁由理合㑹同繕摺奏聞伏乞皇上睿鑒謹奏覽奏入川人民各縁由已悉但身膺岳牧之寄不能令本省黔黎安土樂業攜眷奔馳他省一任粉飾分疏朕實代汝等愧之硃批諭㫖巻二百九上欽定四庫全書硃批諭㫖巻二百九下硃批楊永斌奏摺廣東巡撫臣楊永斌謹奏爲奏眀籌畫積貯事宜斟酌捐例事竊粤東雍正四年東莞等十一縣田禾被淹賑給過災民穀五萬八千三百六十石零又雍正五年五月九卿㑹議海陽等六縣應增貯穀三十四萬石行令照各省常平倉生俊捐監事例令隣省江西湖廣廣西生俊在本省採買穀石運送廣東捐納計各縣發賑及增貯共穀三十九萬八千三百六十石零捐足應貯之數卽行停止遵行在案迄今開捐七載以來止捐過榖二萬七千四百石尚未捐補穀三十七萬九百六十一石雍正十年十一月經臣以增城縣賑穀尚未捐足該縣糶三穀數不敷碾支春夏二季兵食請在廣州府倉内酌撥穀七千一百九石零移貯増城縣倉等因具題奉准部覆允行併令臣将前項應貯穀石作何捐足之處斟酌妥議具題等因臣查九卿原議止令江西湖廣廣西生俊買穀赴納本省不准收捐但查江西至粤必由梅嶺湖南至粤半由郴州俱係旱路阻隔生俊買穀赴納俱有踰嶺溯灘之險盤運維艱若湖北湖南遶粤西而抵粤東須由洞庭湘江水路迂折三千餘里運穀來粤渉歴長途脚費甚爲繁多況今粤西現有墾荒折銀之例粤西生俊自不肯舍近求遠運穀來東而湖北常平捐穀又經減照河工事例本省隣省一體准捐又江南河工與營田水利俱准折銀江楚生俊亦自不肯舍易就難運穀來粤是以開例之初尚有捐穀二萬七千餘石近今竟無一人赴納而粤東生俊往就營田水利及粤西墾荒兩處捐納咨回者每年數百人應請稍爲變通本省生俊一體收捐庶倉穀得期實貯惟是粤東產穀稀少恐生俊競買或致價昂病民臣等再四斟酌常平倉穀原爲積貯起見定例不准折銀但粤東情形與他省不同專收穀石轉有未便應請因地權宜定以價值銀穀竝收穀則交於應貯州縣銀則令赴藩庫交兑委員前往粤西採買分撥收貯每穀一石定價五錢五分遇穀價稍昻咸令照價交銀民食自無妨礙捐足應貯之數卽行停止不過兩年後卽可告竣事屬妥協兹據司道具詳前來臣與督臣鄂彌達確酌意見相同除現在繕疏具題請㫖外縁事關籌畫倉儲斟酌事例所有縁由臣謹㑹同督臣鄂彌達繕摺奏眀仰祈皇上睿鑒謹奏具題到日有㫖同日又奏爲恭報晚禾收成分數仰祈聖鑒事竊查粤東地方仰頼皇上福庇今嵗早禾豐收經臣具奏在案自七月以來雨水調勻晚禾茂盛兹據布政使甘汝來将各屬晚禾收成分數彚報前來查廣州府屬南海番禺東莞順徳新㑹香山清遠花縣八縣收成十分者十居四八分者十居六增城新安新寧三水五縣收成十分者十居四八分者十居二六分者十居四從化一縣十分收成南雄府屬保昌始興二縣收成十分者十居八九分者十居二韶州府屬曲江仁化二縣收成八分者十居五六分者十居五樂昌乳源英徳翁源四縣收成十分者十居三九分者十居三八分者十居四惠州府屬連平歸善河源龍川和平興寧長樂永安博羅海豐陸豐長寧十二州縣收成九分者十居六八分者十居三七分者十居一潮州府屬海陽揭陽饒平程鄉鎮平普寧澄海平遠大埔惠來潮陽十一州縣收成十分者十居六八分者十居四肇慶府屬徳慶州高要開平恩平廣寧四㑹鶴山七州縣收成十分者十居三九分者十居四八分者十居三新興陽春陽江封川開建五縣收成九分者十居四八分者十居二七分者十居四高眀縣收成八分者十居六七分者十居四高州府屬茂名信宜化州石城四州縣收成十分者十居三九分者十居四八分者十居二七分者十居一電白縣收成九分者十居一十分者十居九吳川縣收成九分者十居二八分者十居四七分者十居四雷州府屬海康遂溪徐聞三縣收成十分者十居四九分者十居二八分者十居四廉州府屬合浦欽州靈山三州縣收成十分者十居五九分者十居三八分者十居二瓊州府屬瓊山澄邁儋州臨高㑹同樂㑹崖州陵水萬州定安文昌感恩昌化十三州縣收成九分者十居七八分者十居三羅定州收成十分者十居三九分者十居四八分者十居三東安西寧二縣收成十分者十居四九分者十居三八分者十居二七分者十居一連州收成九分者十居六八分者十居四陽山縣收成十分者十居二九分者十居五八分者十居三連山縣收成九分者十居九八分者十居一以上各州縣米價自六七錢起至一兩零不等地方寧謐民樂豐登所有晚禾收成分數謹據實繕摺奏聞伏乞皇上睿鑒謹奏覽晚禾收成分數曷勝欣慰頃有諭鄂彌達之㫖可取觀之雍正十二年三月初六日廣東總督臣鄂彌達巡撫臣楊永斌謹奏爲廢員才能可用報效有心據情陳奏仰祈睿鑒事竊照廣東羅定州直隸知州王植係直隸保定府深澤縣人由進士於雍正四年除授惠州府和平縣知縣嗣調肇慶府陽江縣知縣雍正七年題補羅定州知州緣雍正六年署理海豐縣任内有縣民宋文貴與曾氏因姦謀死親夫羅世球一案諱命不報雍正九年十一月題㕘審擬革職又雍正十二年正月特委密拏事案内准部咨王植失察姦民陳漢招人入教應降二級已經革職仍行註册在案例應給咨回籍但查該員年力壮盛才具眀白在粤數載政事練達其署海豐任内諱命一案彼時尚屬初仕至今深自痛悔以爲圖報無由有負國恩臣等見其報效心切又復諳練因鶴山縣建築城垣安插開墾貧民及新寧縣查出荒地招民墾種需員料理委令效力又去年九月委往楚省招回往川人民該員不辭勞瘁奮力辦理俱各妥協伏思皇上愛惜人才每於㕘革人員憫其寸長格外録用雍正十年七月内又奉㫖嗣後特㕘文武官員比照大計之例亦著送部引見欽遵在案該員係在例前題㕘諱命革職雖非浮躁不及暨因公罣誤可比但其才能可用能知自悔圖報甚殷若給咨回籍令其終身廢棄似屬可惜臣等見知旣確謹合詞陳奏可否送部引見恭懇聖恩發粤委用效力三年無過另疏題請開復伏候皇上睿裁批示遵行謹奏准照所請送部引見同日又奏爲廢員廉能素著據實奏陳恭請睿鑒事竊照原任南海縣知縣凃基由江西舉人兩任教諭大計卓異陞授南海縣於雍正三年九月到任雍正五年九月丁憂離任縁雍正四年内有失察旗人打鬧米厰一案部議革職奉㫖南海縣知縣凃基居官如何之處著詢問孔毓珣楊文乾若居官尚好著革職留任倘居官平常卽著革職欽此嗣經前督臣孔毓珣以該員任内有黎顯斯等被刦十三案賊犯尚未緝獲卽屬平常之員㑹疏題覆奉㫖凃基著革職該部知道欽此又雍正七年六月准部咨失察大鵬營革職千總班士錦家口八名口潛住省城一案凃基照例革職仍行註册各在案上年八月凃基以年力方强尚堪勉圖報效赴臣等具呈墾請援例具題引見仰報皇恩臣等因訪聞凃基在任居官尚優經批司查議去後兹據布按二司㑹詳轉據府縣等確查案巻訪察輿論凃基在任兩年實屬廉潔勤慎縁南海附省劇邑素多盜案該員在任所有强竊各犯一一購緝就獲審擬完結其罪重具題者則有羅榮五等被刦十二案又雍正五年南海上冲堡壕殻埠圍基單薄勢将坍決凃基日夜經畫督率捐料修固百姓遂改名爲凃公堤至今猶繫民思其催徵錢糧不事敲朴民皆先期完納至於黎顯斯等被刦十三案係陸續發覺俱未滿一年緝賊之限或在疎防限内該員即經離任非積久盜案怠緝無獲者比從前奉㫖詢問縁前督臣孔毓珣未經分晰聲眀遽以緝盜無術即屬平常之員覆奏致未邀恩録用今察訪確實詳請援例具題保送引見前來臣等查凃基離任已經六載而訪察民間猶羣稱其廉能其緝獲積盜修理圍基至今猶繫民思查其在任完結羅榮五等被刦各案巻洵非庸懦無能之員伏查雍正二年六月定例廢員准赴原任地方具呈該督撫擇其因公罣誤廉静愛民聲名素著者秉公保題赴部引見今查凃基經䝉諭㫖詢問革職與尋常革職之員不同但其在任亷能臣等訪知旣確理合據實陳奏可否具題送部引見恭候皇上選用伏祈睿鑒訓示施行謹奏亦送部引見不必具題廣東巡撫臣楊永斌謹奏爲奏聞事竊粤東自冬底入春以來天氣晴和二月内晴雨應時目下秧苗茂盛臣等出郊看視栽插方興民情踴躍各屬米價自五六錢起至一兩零不等竝無昻貴将來四五月間又有糶三米穀接濟更可無慮缺乏粤民每歲春間多有挈伴入川臣凛遵聖訓竭力料理查眀有的屬在川者委員䕶往其餘無業者送至恩開等縣給以口糧牛種房舍安插墾耕貧民得以樂業就耕者日衆所有陸續安插過各縣人民承墾過各縣地畝臣現在飭屬造備清册彚疏題報又潮州府海陽縣姦民王阿童等上年歲底散符惑衆即時發覺各犯全獲現今提解來省嚴究業經臣㑹同督臣鄂彌達奏聞在案各屬俱寧謐無事圍基亦俱穏固臣嚴飭水利各員多備土方木植以防西潦臣恐有厪聖懷謹據實繕摺奏聞伏乞皇上睿鑒謹奏覽奏粤東晴雨應時秧苗茂盛及地方寧謐各情形朕懷深慰同日又奏爲奏眀穵獲礮位事竊粤東邊海重地逼近外洋因本地出產鐡斤一切軍器製造便易稽查自宜嚴密而礮位一項尤爲緊要軍器臣留心體察從前民間每有私藏礮位歴年久遠埋於墻壁房室之中恐干罪譴未敢首報者亦有從前遺失之礮經人民穵獲惟恐查詰干累隠匿不報者經臣出示遍加曉諭許本人據實報出一槩免其跟究竝責成兩鄰稽查如經兩鄰首報本人從重治罪若兩鄰眀知不首扶同隠匿察出併究又嚴飭各屬一體曉諭查察去後兹查自去年三月至今通計一年之内陸續據各屬兵民具報掘獲大小礮共四十三位臣行令地方官確加驗看其堪以適用應留營操防者遵照雍正十一年九月定例咨部留用如銹爛不堪用者亦照例飭行收貯以備改鑄兵器之用其具報兵民查非有心故匿槪免深究臣仍不時稽查務令兵民不致私行藏匿所有首報礮位數目縁由謹繕摺奏聞伏乞皇上睿鑒謹奏此舉是亦係息事消患之一端雍正十二年五月二十六日廣東巡撫臣楊永斌謹奏爲請嚴爭奪新田之禁以收墾荒實效事竊查粤東民人生齒殷繁野有曠土民鮮恒業臣時加嚴飭各道府州縣令其徧勘可墾之地勸諭開闢廣興地利以仰副皇上重農富民之至意據糧驛道陶正中親赴鶴山恩平開平新寧等縣勸墾二十七萬三千餘畝其餘各屬勸墾亦不為不力而報墾之數不能如鶴山等縣之多臣訪察其故皆因粤東向有惡習或豪强之户或附近人衆之家見有承墾者力耕播種以後即串挽地鄰捏稱世傳祖業起而爭訟及見稻禾成熟率領搶割雖經縣官判斷誣稱受屈疊控上司俟前官去任又向接任具控不奪其地不止是承墾之民未享其利先受其害孰肯徒費工本自取貽累理合酌擬爭奪新墾之例奏請聖裁頒示臣民使羣黎知大小臣工永遠不致游移臆斷始奮發其務本之心伏查雍正元年户部議例稱起科之後官給執照永爲世業是承墾初年以及未至起科以前在墾户已經費去工本尚無執照為憑即有姦民乗機圖占又未議有定例是以易起爭端臣請嗣後凡現在久荒之地除有古塜周圍留地四丈不得開墾外其餘俱聽民間願墾者開眀界址土名呈報地方官親赴勘查如其地原有業户即著墾熟起科免究其從前荒蕪田地之罪如竝無原業者先給執照准其管業照例起科自從承墾之後他人始終不得告爭如有墾後捏稱祖業爭訟者照侵占他人田地律每田一畝笞五十每五畝加一等罪止杖八十徒二年若因墾地附近豪門冒認祖業統率多人搶割稻穀者照强占官民山場律不論畝數将為首者杖一百流三千里為從者分别情罪重輕治罪如此著為定例通行曉諭旣可使强詐姦民咸畏犯法冺其覬覦之心復使淳樸農人安心耕鑿不數年間粤地除沙鹻外盡闢爲樹藝之阡陌矣臣爲勸墾起見謹繕摺奏請是否有當伏祈皇上睿鑒批示遵行謹奏該部詳議具奏同日又奏爲請嚴教職之考覈以肅士習以勵民風事竊照粤東地方倚山濵海民俗異於他省欣逢聖世教育宏敷咸知感化歸醇而民俗狡黠之風究未盡除即衿監中亦有窩匪賭博抗糧霸占健訟之案實有關於風俗人心不淺合請立法昭示勸懲臣思士為四民之表鄉俗之所觀瞻士習不端則民皆率效欲勵民俗之醇必端士習為首查教職一官為士師長與諸生最為密邇如果正已無私訓迪嚴謹則所屬之生監誰不聽其約束革面洗心今查教官年年册報生員多以無優無劣具結塞責而生監之犯案又復纍纍是該教官全不以教誨生監為職守平日之徇縱可知遇有違犯事發經府州縣審出則又巧為補開劣行一詳掩飾自全不獨有忝厥職且於學校毫無裨益臣請嗣後凡貢監文武生員有窩匪抗糧蔑理悖倫事發教官平日不為詳報被府州縣查出或被旁人首告審實者不准補開詳揭将該正副教官一併以溺職紏㕘其有受賄徇隠竝借端勒索得財等弊與不力行課試者飭令各府州縣不時訪查分别揭報咨㕘照例治罪其貢監生員有學問優著孝友可風該教官竝不覺察或故為掯勒不行舉報經府州縣舉報或經上司訪聞得實将該教官亦即揭㕘如該教官於三年内查伊所屬貢監文武生員盡皆守法毫無過犯即稍有所犯該員隨行據實詳報又能訓迪勸勉使士子改過自新者令該府州縣查眀出具保結通詳督撫學臣查核無異即與保題格外優陞以示鼓勵如此則教職之黜陟嚴眀士子咸知儆畏民人亦無不觀感歸厚矣是否有當臣謹繕摺奏聞伏祈皇上睿鑒批示遵行謹奏此奏殊屬是當之至該部詳議條例通頒直省一體遵行雍正十二年六月二十五日廣東巡撫臣楊永斌謹奏爲恭報早稻收成米糧價値事竊查粤東今歲自春入夏以來雨澤霑足下隰高原俱得及時栽植早禾吐穗穎實臣經具摺奏聞今自六月初旬以後各屬早稻俱已刈穫臣曾先行通飭確查實在收成分數嗣據各屬陸續申報前來臣查廣南韶惠潮肇高雷廉瓊等十府竝羅嘉連等三州各所屬收成俱有八九十分不等與臣訪聞無異現今米價廣州南雄韶州肇慶四府羅定嘉應二州每石俱自九錢以至一兩有零不等惠州潮州雷州瓊州四府連州一州每石俱七八錢有零不等高州廉州二府每石俱五六錢不等今查各屬晚禾俱秀發茂盛雨水調勻俟晚禾登場米價尚可平減仰頼皇上聖徳廣被收穫豐稔民情歡悦地方寧謐臣謹據實繕摺奏聞伏祈睿鑒謹奏近年以來粤東雨暘頗稱調順覽早稻收成分數曁米糧價値海疆黎庶諒無艱食之虞矣朕懐曷勝欣慰同日又奏爲遵㫖奏覆事雍正十二年五月二十八日接大學士臣鄂爾泰張廷玉寄信到臣内開本年四月二十五日奉上諭朕於一切器具但取樸素適用不尚華麗工巧屢降諭㫖甚眀從前廣東曾進象牙蓆朕甚不取以爲不過偶然之進獻未降諭㫖教導今則獻者日多大非朕意夫以象牙編織為器或如團扇之類其體尚小若製為座蓆則取材甚多而人工大費開奢靡之端矣此等物件既已進獻不便發還而留在宮中又實無可鋪設之處爾等可傳諭廣東督撫若廣東工匠為此則禁其毋得再製若從海洋而來則從此屏棄勿買製造之風自然止息欽此臣敬謹跪讀仰見皇上崇儉尚質不用華麗之器禁開奢靡之端臣從前愚昧以象牙蓆原係粤東工匠製造土產見不及此今䝉聖訓實深悚􅅥謹遵諭㫖㑹同督臣鄂彌達出示嚴禁嗣後工匠毋許再造牙蓆以及外洋帶來屏棄勿買外理合繕摺奏眀伏祈皇上睿鑒謹奏覽凡類此華麗工巧之物俱當留意禁止以杜奢靡之漸雍正十二年九月初二日廣東巡撫臣楊永斌謹奏爲海疆地多磽瘠懇照輕則起科以廣開墾以溥皇仁事竊照粤東生齒日繁工賈漁鹽樵採之民多於力田之民所以地有荒蕪民有艱食荷䝉聖恩廣大疊頒諭㫖令臣等勸民開墾務使野無曠土家給人足仰見我皇上睿慮周詳誠富民阜物之聖謨也臣今查得原報可墾六千八百五十頃外各屬尚有荒地但或係山深箐密或係夾砂帶鹵開闢實屬艱難體察民情固畏倍費工本更恐磽地薄每畝徵銀四釐六毫四絲米四合二勺六杪此通省田賦則例之至輕者若令各州縣除原報可墾地畝外凡有磽瘠難墾之地俱准照斥鹵輕則起科則民心鼓舞地利可以廣收惟是各州縣原編皇上聖鑒如䝉帶鹵山深箐密難墾曠土凡有民人承墾槪准以斥鹵輕則輸糧即給執照為業照例十年起科如其地本係沃土該地方官不行勘眀混准民間冒以輕則起科者即照官吏踏勘田糧不行親詣田所及不從實檢踏止憑里甲朦朧供報律㕘處其混冒承墾之民照那移起科等則律按畝數多寡分别治罪如此則肥沃之壤不致冒承輕則而磽瘠之地民知田糧易輸廣開阡陌家室盈寧邊地蒼生含哺鼓腹共樂昇平盛世矣臣因粤東人稠田少敬抒所見繕摺奏請伏祈皇上諭㫖批示遵行謹奏覽雍正十二年十一月初八日廣東總督臣鄂彌達廣東巡撫臣楊永斌謹奏爲奏聞事本年十月初旬據潮州府屬之潮陽普寧二縣報稱九月十七日起至二十一日止連日􅄓風暴雨溪流漲發為海潮湧阻一時不能宣洩以致民間土房間有浸倒田禾亦被淹浸又據潮屬之惠來縣并惠州府屬之歸善海豐陸豐等縣各報九月十七八九等日風雨甚大又據嘉應州亦報九月二十四日雷雨大作各等情到臣臣等隨即委員齎帶公用銀兩星赴各州縣㑹同各該地方官確查被水情形田禾廬舍人口有無傷損是否成災據實飛報并将帶去銀兩酌量賑恤務期得所以仰副我皇上子惠元元之至意隨據各委員覆稱歸善海豐陸豐各縣河道廣濶港汊亦多水退甚速房屋人口田禾俱無傷損惠來一縣雖被風雨幸離海不遠隨漲隨消但溪口河邊田地勢當急流衝刷砂淤者百十餘畝土房亦有衝倒至於田禾雖被風偃撲幸巳結實不能傷損竝不成災該縣知縣裘曰菊業經備查捐恤又嘉應州所屬之車約等處因山溪窄小水流急驟近溪土房亦多浸倒并壓死男婦一十餘名口該州知州李匡然當即捐給銀兩賑恤得所田禾亦無損壞惟潮陽普寧交界之貴山􅚉水洋烏三都為衆溪滙集之處止有潮陽和平橋一處通洩又因海潮湧阻宣洩不及致被淹浸查潮陽自范厝寨起沿海計長十四五里濶二三里不等普寧自米場山起沿河計長十五六里濶一二里不等其中田之高者水深二尺餘禾穗透出水面尚無傷損低窪者水深四尺許田禾淹沒如巳結實者亦屬無礙惟未結實者經水之後不能滋長飽滿查被水處高田有七八分低田有二三分通融計算尚有五六分收成其餘各都均未被水合計通縣尚有八分收成竝不成災再查被水之處土墻茅舍多有倒塌現經該二縣按照酌恤等情臣等又飛飭各委員将前帶去銀兩再行加意查賑其房屋倒壞三間者再給銀二兩一二間者再給銀一兩壓斃人口每名再給銀二兩務使窮民不致失所現今民情安帖米價照常其餘各府州屬俱未被風雨除通省收成分數另摺奏報外誠恐上厪聖懷合将潮普各屬偶被風雨情形并臣等委員查恤過縁由據實奏聞伏祈皇上睿鑒謹奏據奏潮普二邑被水淹浸其加意查勘撫恤務令災黎得沾實惠以釋飢溺之懷廣東巡撫臣楊永斌謹奏爲恭報晚稻收成分數并米糧價値事竊查粤東本年自夏入秋以來雨澤應時晚禾秀發臣經具摺奏聞并先通飭各屬俟收穫時将實在收成分數據實查報在案今自十月初旬以後晚禾俱已刈穫據各屬陸續申報前來臣查廣州南雄韶州惠州潮州肇慶高州雷州廉州瓊州等十府羅定連州嘉應等三州各屬收成俱有十分九分八分不等與臣訪聞無異現今米價廣州韶州肇慶三府嘉應州一州每石自八錢至一兩不等南雄惠州二府羅定一州每石俱八九錢不等潮州雷州瓊州三府連州一州每石俱七八錢不等高州廉州二府每石俱六七錢不等此皆我皇上聖徳廣被是以太和協應年登大有米糧平賤通省民情歡悦地方寧静臣謹繕摺奏報伏祈皇上睿鑒謹奏晚稻收成分數米價平減情形以手加額覽焉同日又奏爲欽承聖訓恭摺奏謝事本年十月初七日督臣鄂彌達奉到硃批奏摺内奉上諭身膺封疆要任當遠大是務不宜見識淺狹公私界限祇在幾微念慮之間一渉瞻徇即為負國溺職重則貽累功名事業輕亦難免物議於已毫無裨益無如燭理不眀者比比皆然每爭趨些少光榮以圖目前快志遂置日後無限悔吝於不計也此諭亦使撫臣兩司觀之欽此欽遵傳示到臣臣跪讀之下仰見我皇上睿訓精微周詳備至勉勵臣工恩同覆載伏念督撫為封疆大臣凡事一秉至公始爲無忝職守若稍渉私為人只圖目前快志不惟小則為上下之所輕賤大則無益於功名事業而負國溺職之罪其何以無慚衾影而自容於天地臣實才識短淺未能一一看透今䝉以仰報皇上教導之仁慈於萬一耳所有微臣奉到聖諭祗遵感激縁由謹繕摺奏聞伏乞皇上睿鑒謹奏勉勵遵行自有無窮效驗何靳而不爲之耶雍正十三年二月十二日廣東巡撫臣楊永斌謹奏爲恭繳硃批奏摺叩謝天恩事竊臣齎摺家人回粤捧到臣前奏海疆地多磽瘠懇照輕則起科一摺欽奉硃批臣跪讀之下仰見我皇上睿慮周詳訓誨諄切鑒臣才識淺庸恐致日後受累此誠天地父母之恩臣何人斯得䝉聖主之眷顧如此肫摯優渥臣不勝感激之至嗣後一切地方事務惟有凛遵聖訓悉心籌畫務求妥協以仰副我皇上教訓之洪恩於萬一至粤東現今所餘荒地臣凛遵聖諭現在通飭確查如果係夾砂帶鹵山深箐密磽瘠難墾之地容俟查覆到日斟酌妥協具題請㫖外所有微臣感激愚忱理合恭摺叩謝天恩伏祈皇上睿鑒謹奏覽奏知道了墾荒事宜詳審辦理惟當加意察訪屬員捏報磽瘠朦混等弊同日又奏爲請廣皇仁以勵風化事竊查雍正元年欽奉恩詔著於地方公所設立祠宇将前後忠孝節義之人俱標姓氏於其中已故者設牌位於祠中致祭欽此粤省業已欽遵奉行各府州縣俱動支正項錢糧建造設立并徧加採訪凡有孝子順孫義夫節婦確查具結遞年於歲底彚題請旌各在案兹據布政使詳據各府州縣詳稱各處名宦鄉賢自古以至眀季之人已經入祠者仰沐聖恩准其照舊留祀即古昔名賢祠墓俱䝉特恩令各省督撫飭令地方官修葺保固而忠孝節義爲風化所關其前代已經旌表志傳内確有事蹟可據者應否照前代名宦鄉賢例准其一體入祠奉祀以廣皇仁等情到臣臣查設祠建坊表揚忠孝節義實我國家彰善鉅典似無分於今昔可否俯如該司府等所請将遠年忠孝節義之人前代已經旌表載入志傳事蹟確有可據者飭令各府州縣悉行查出詳報督撫核實准照前代名宦鄉賢之例一體附入祠宇以仰副我皇上維持風教闡揚幽隠之至意但事關崇祀大典臣不敢冒昧具題理合恭摺奏請伏祈皇上訓示施行謹奏所奏殊不可行自元年降詔以來當代人物尚不能據實採訪秉公闡揚以厭服衆志今乃欲評先賢之優絀啟已往之爭端多見其不知量也似此慕虚名而招實咎之念切勿復萌雍正十三年三月二十九日廣東巡撫臣楊永斌謹奏爲奏報雨水情形竝米糧價値事竊照粤東本年正月内雨澤普徧米價平和經臣奏聞在案自二月以來每隔三四日必有雨澤并據各道府州縣申報各屬内雨水調匀臣於三月十七日出郊耕耤目覩高下田地普徧霑足早稻秧苗十分茂盛民人正在蒔插二麥将次刈穫豐收可必現在米價廣南韶肇惠潮各府嘉應一州上米每石價銀自八九錢至一兩零四五分不等中米每石不及九錢次米每石不及八錢至高雷廉瓊四府羅連二州即上米每石不過自七錢七八分至八錢五六分而止臣查粤東省當此農事正殷青黃不接之時米價如此平減實屬從前罕有之事此皆由我摺奏聞以慰聖懷伏祈皇上睿鑒謹奏且莫肆志自詡如宋銓輩更多徇庇數人自當感召天和矣将此諭令鄂彌達亦知之雍正十三年六月十五日兩廣總督臣鄂彌達廣東巡撫臣楊永斌謹奏爲奏眀事竊查韶州府屬曲江縣之東西二水山場出產煤斤向聽商人在縣認納虚糧開採售賣嗣因虚糧漸次墾補雍正八年經陞任布政司王士俊詳眀前任督撫二臣凡承採之商酌照四座鐵爐之税每年令繳銀二百餘兩以作韶郡修理城垣衙署等項一切公務之費其支用銀兩歴年俱由司詳報核銷在案縁韶郡城脚石隄三面臨江近年以來每遇春水漲發多有衝塌修葺之費不敷而煤斤所出日廣商人獲利日多紛紛告爭自願增税承採經臣等飭行府縣確查兩處山場每年約出煤斤若干酌定抽收數目期於公務有濟亦不致病商去後兹據查報自上年冬季至本年春季每月出煤約五千餘筐不等每筐重四百斤今酌定以每筐收税五分計算每年可收税銀三千兩商人尚有餘利不致虧折併據報稱現有江南徽州府商人查復興情願每年認納税銀三千兩不敷濟用徒令商人獨專其利也兹該商旣自願年共得銀六千兩以為修理城脚石隄衙署之用俟工竣核實報銷丁巳年以後續收銀兩報部撥充兵餉至煤厰工丁歴來竝無滋事臣等仍飭地方文武員弁時加稽查併令商人嚴加約束如将來開採日久煤斤虚竭即行停止仍将停採日期取結報部其煤斤飭令該商俱照時價平賣臣等不時查察如有昻價病民即将該商究革另募承採所有臣等酌定抽收煤税及暫留辦公縁由理合恭摺奏眀伏祈皇上睿鑒謹奏但能利民即屬善舉廣東巡撫臣楊永斌謹奏爲叩謝聖訓事本年五月十八日臣齎摺家人回粤捧到臣前奏報雨水米價一摺欽奉硃批臣跪讀之下惶懼無地伏念臣一介庸愚至微極陋叨沐皇上天恩不次超擢由罣誤知縣拔至巡撫重任才識短淺愆尤日積荷䝉聖主曲賜矜全得至今日即粤東數載以來年穀順成皆頼我皇上憂勤惕勵之感格臣何敢遽生滿足自矜之念至宋銓一案荷䝉聖慈不加顯斥復賜訓誨冀臣務秉至公之心屏絶徇庇之私君父隆恩至深至厚臣惟益切悚惶感激涕零竊查臣衙門舍班人役向有招揺不法之輩臣抵任後俱先後查拏究處務欲使地方擾民之輩悉皆斂迹以副聖主除蠧安良至意臣實未敢稍有徇庇也至宋銓向來充當舍班雍正七年間在前署撫臣傅泰任内辭退捐監復於雍正八年加捐州同臣於雍正十年到任後因從前撫臣採買物件係其辦理且臣衙門係封鎖衙門家人不敢外出是以凡花棃物件及波羅葛等項臣愚昧仍在伊舖定製承造至雍正十二年宋銓加捐知州由地方官起具文結經布政司張渠轉送到臣臣因其從前原經捐監復捐州同職銜是以據詳咨部未細察其昔年曾經頂名陳俊充役情事實屬罪無可逭迄今痛悔無地仰䝉聖主委曲訓誨五衷滋愧寢食難安嗣後惟有一切改悔慎重防檢凛遵聖訓不敢少萌矜滿之念并不敢少存徇庇之私益加兢惕勉圖寸效以仰報皇上高厚洪恩於萬一耳所有微臣凛遵訓示及感激愚衷理合恭摺奏謝天恩伏祈聖慈垂鑒謹奏一任巧舌如簧亦何能辯脫也旣往不咎改悔将來可耳硃批諭㫖巻二百九下
