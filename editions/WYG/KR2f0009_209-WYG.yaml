body:
  text: 欽定四庫全書硃批諭㫖巻二百九上硃批楊永斌奏摺雍正八年二月二十四日湖南布政使臣楊永斌謹奏爲恭謝天恩敬請聖訓事竊臣天末庸才至微極陋由順天府大城縣罣誤知縣欽奉皇上特恩賞給官職効力行走數年之間洊加㧞擢至膺郡符旋陞貴東道兹復荷逾格天恩授以湖南藩司重任自顧何人膺斯異數惟有勉奮駑駘以仰答聖主高厚於萬一伏查湖南民欠厰礦苗疆三事皆爲應辦緊要之件臣到任後訪聞民欠項内多有侵蝕包攬諸弊現在詳明督撫将積欠最多者委員清查其餘交於地方官清查倣照督臣邁柱清查沔陽州之法分别官吏侵蝕紳衿包攬與實欠在民三項減其火耗立限催輸幷出示曉諭如有自首侵蝕者酌量從寬責令分限通完臣不時稽察委員毋令紛擾地方至厰礦苗疆二事臣在貴州跟隨雲貴廣西督臣鄂爾泰辦理稍知規模昨督臣鄂爾泰由廣西回黔道經長沙臣将厰務苗疆事宜備細禀商復䝉指示臣已将應行辦理之法禀請督撫轉爲奏主恩下供職守臣更有請者臣自雍正三年補授貴州威寧府知府五載以來未獲一覲天顔犬馬依戀之忱時切於中今臣查受藩庫交代事畢可否容臣輕騎赴京瞻仰聖顔跪請訓㫖伏候聖裁俞允施行謹奏爾甫經接任受事正在整理之際何必徒爲無益之往來卽使來京見朕面加訓誨者亦不過殫心實力循分盡職黽勉效法鄂爾泰事事不欺不隠此數語而已遵㫖勉力爲之可也雍正九年五月十二日調補廣東布政使臣楊永斌謹奏爲恭謝天恩敬請聖訓事雍正九年四月二十三日䝉湖廣督臣邁柱湖南撫臣趙𢎞恩牌開准部咨雍正九年四月初一日内閣奉上諭湖北巡撫員缺著廣東布政使王士俊補授廣東布政使員缺著湖南布政使楊永斌調補王士俊久任粤東於地方事務甚爲熟練楊永斌到粤王士俊一一交代講論眀白再赴湖北之任等因欽此欽遵轉行到臣隨恭設香案望闕叩首謝恩外伏念臣一介微陋䝉皇上特恩拔擢授以楚藩重任雖捐糜頂踵未足仰報高深正在隨同撫臣趙𢎞恩於地方一切事務勉力整理今復荷隆恩調任粤東聞命自天感激無地現在一面将湖南藩庫錢糧事宜逐一清交新任藩司張璨接受聽候撫臣盤查題報臣卽起程星赴粤東新任但海疆重地一切治理較之湖南更爲繁要藩司一官任大責重臣材質疎庸克副實難伏懇皇上恩賜訓誨庶臣知所遵循得以上報主恩下供職守免致隕越爲此繕摺恭謝天恩敬請聖訓謹奏王士俊久任廣東於吏治民情甚爲熟練卽命伊巡撫粤省豈不駕輕就熟但粤省向來各立門户文武不和而文武之中又各互相黨庇此風因楊文乾方願瑛二人而起方願瑛實罪不容誅其黨甚固如觸其藩籬必百計報復而後已斯乃汝所當知而加愼者王士俊亦被習氣所染不能超然出𩔖若命撫粤豈特無益在伊自多牽制掣肘朕所以用爲湖北巡撫也汝今往莅粤藩當思革化頹俗時自檢察愼勿被所誘惑至於民情較之湖南尚易爲治然邊海巖疆盜風甚熾率多嗜利輕生必須大費一番心神方収成效能事事效法鄂爾泰之居心精勤不懈何務不克整理勉之莫負朕委任之恩若開礦一事粤東斷不可行惟以嚴禁爲是非可将順民情者王士俊日前奏請開採經朕再四諭止未知曾向汝道及否此數節係粤省緊要大端皆朕素所洞悉先以諭汝其餘地方機宜遇汝摺奏之便隨時逐事自當一一指示也方願瑛大姦大詐沽取虚名阻撓實政至今仍有爲其稱寃之人汝當知之凡爲稱寃者卽係黨友須加體察朕豈枉誅方願瑛之主耶朕於方願瑛從未識面何嫌何怨之有此種情形朕御極已歴九載其中隠微實能了悉無疑汝将此諭密之親友間槪不宜言惟令巡撫鄂彌達知之汝二人同心協力整理可也亦轉囑鄂彌達加愼加密毋致洩露一人爲此再諭雍正九年十月二十五日廣東布政使臣楊永斌謹奏爲恭繳硃批奏摺事竊臣以庸陋凡材荷䝉聖恩調補粤東藩司海疆要地罔識遵循隨卽具摺恭請聖訓於七月二十七日家人齎囬臣望闕叩首跪讀硃諭天語煌煌訓勉諄至感激蟻忱中心震悚欽遵諭㫖密與撫臣鄂彌達看訖臣查粤東地方向因楊文乾方願瑛牴牾以致各立黨援文武不和而文武中又相互異方願瑛實罪不容誅幸䝉皇上睿照如神将方願瑛下獄究治今臣到任後時時省察竝未有爲方願瑛言寃之人又再四密訪方願瑛之黨實已渙散至於通省文武臣悉本至誠相待宣布皇上和衷聖諭共相勉勵各員見臣開誠體公亦各傾心現在情形較之從前實覺改觀若再加調劑自可革化頹俗也再查粤東瀕海之區向來劫竊頻聞近日較前稍息惟韶州府屬乳源曲江等縣之栁坑猺人素爲盜藪現今議於栁坑山埸設汛彈壓俾防守整嚴盜蹤自杜也又開採一事臣向在湖南時卽聞粤東厰礦甚多而難於開採昨至粤東曾向王士俊問及據云經伊具奏䝉挖私煎以靖地方謹此奏覆并繳原奉硃批一摺再粤東地方遼濶臣到任甫經兩月餘全省利弊尚未周知另容悉心查確次第陳奏合并聲眀伏祈皇上睿鑒謹奏嗣後再具奏摺差人齎至大學士張廷玉處轉奏同日又奏爲請定鐡鍋出洋之禁以杜姦弊事竊照鐡器一項所關綦重不許出境貨賣律有眀禁况近有廢鐡亦可鎔製兵械本年奉有定例止許内地變賣若捆載潛出邊境及海洋者照越販硝磺之律分别治罪立法已屬周詳但臣查粤東地方因向來出産鐡鍋凡洋船貨買歴未禁止臣到任後檢查案册見雍正七八九年造報夷船出口册内每船所買鐡鍋少者自一百連至二三百連不等多者買至五百連幷有至一千連者其不買鐡鍋之船十不過一二查鐡鍋一連大者二箇小者四五六箇不等每連約重二十觔若帶至千連則重二萬觔臣思此項鐡鍋名雖煮食之器其實一經鎔煉各項器械無不可爲每年販出外國誠有關係以臣管見嗣後此項鐡鍋應照廢鐡之例一體嚴禁毋論漢夷船隻概不許貨賣出洋違者卽照捆載廢鐡出洋之例治罪如此則外洋之鐡不致日積日多於防姦杜弊之道似有裨益是否有當伏乞皇上睿鑒謹奏此奏甚是足見留心地方庶務雍正九年十一月二十三日廣東布政使臣楊永斌謹奏爲奏聞事竊臣到任後知有姦匪李梅結黨散劄事發在逃一事隨卽嚴飭地方官員留心密查本年九月間經督撫二臣委令理猺同知龎嶼前往羅定一帶密同地方文武訪拏得楊士元及夥黨盤陳養陸運眀温良賔等供出本年三月内有陳漢同吳世友廖洪受從廣西藤縣五屯所白石寨陳美倫家領有唐太祖的劄付來散給上有羅平聖號字樣及仙掌八卦圖樣每張要銀三兩六錢等語禀報到臣隨㑹同臬司禀商督撫密飭龎嶼選差設計相機誘拏去後復經撫臣鄂彌達添差弁兵前往白石寨等處協同密拏兹於本月十二日拏獲陳美倫等一千人犯押解幷起有木印挖銀符書單札前來臣等隨在撫臣内署公同究訊俱各取供在案查各犯雖藉道教名色鼓惑愚民但旣稱有年號又立有公田名色符劄私自封官單據結連聚黨潛謀爲匪大屬不法今首犯陳美倫雖已就獲而餘黨陳漢等尚未弋獲幷供出之玉龍太子以及林茂清錢珍均難寬宥業經督撫二臣密札廣西撫臣嚴行查拏勿令漏網其陳漢等亦現嚴行拏究外總俟獲到各要犯之日臣等再行公同確審聽候督撫核奪另行請㫖縁事關姦匪重情理合繕摺密封奏聞伏乞皇上睿鑒謹奏察獲姦匪甚屬可嘉員弁兵役俱當格外奨賞雍正十年四月初一日署理廣東巡撫臣楊永斌謹奏爲恭謝天恩事雍正十年三月二十七日䝉廣東督臣郝玉麟撫臣鄂彌達牌開准部咨雍正十年二月十五日内閣奉上諭廣東巡撫印務著廣東布政使楊永斌署理欽此欽遵轉行到臣隨恭設香案望闕叩首謝恩外竊臣天末庸才至微極陋由罣誤知縣叨沐殊恩賞給官職數年之間洊加拔擢由湖南藩司調補粤藩重任雖捐糜頂踵未足仰報高深今復荷聖恩命臣署理廣東巡撫印務自顧何人膺此異數聞命自天感激無地伏念巡撫表率全省封疆任大責重臣受恩愈深圖報愈難惟有刻自兢惕誓矢公忠實心任事以答主知以報高厚於萬一耳臣再有請者臣自雍正三年補授威寧府知府引見以後歴今八載犬馬依戀之忱時切於中今又䝉主恩畀以重任自維才質疎庸恐難克副惟恭請聖訓指示庶得知所遵循伏乞皇上容臣輕騎赴闕瞻仰聖顔跪聆訓㫖所有微臣感激蟻悃除俟接印後恭疏具題外謹先繕摺專差家人恭齎赴京交大學士張廷玉轉奏恭謝天恩敬請陛見伏乞睿鑒俞允施行謹奏覽奏謝知道了勉之莫負朕知遇之恩地方緊要豈可遠離陛見之行兹且不必汝旣署理撫任此後奏摺徑自齎進毋庸交大學士轉呈矣同日又奏爲奏聞事竊粤東正二三月晴少雨多臣恐有礙東作不時留心體察據各屬回報竝訪諸近城農民僉謂粤東山海之區每遇春來雖多雨水然易於消退非西潦泛漲可比各屬圍基安穏間有高處所種之麥亦已收割目下春夏之交天氣晴眀正在栽插不足爲慮等語臣卽飭經管水利各員多備樁木土方督率圩長業户預防西潦外查現今米價較之上冬畧爲增長每石六七錢至一兩零不等臣以省㑹人煙稠密需食甚繁隨諭南番兩縣各将糶三倉穀減價發賣以平市價臣又慮四五月内正値青黄不接之時兼因奉准福建督臣及南澳鎭臣咨移各差員弁商販赴粤採買必致價益騰貴臣卽商之撫臣動支關稅羨銀一萬兩委員赴粤西採買米穀旋據委員報稱粤西米穀價値亦與粤東相等臣又再四體訪聞本省茂名電白陽江各縣出產米穀縁地方偏僻少有客商搬運以故價値頗賤於前項關稅羨内動支五千兩分發各地方官據報已照時價買全但係經由海運必須風信順便四月中旬可以運到臣思有此米穀旣可以聽閩澳之採買亦可以平本省之市價不虞民食維艱也本年二月内欽奉諭㫖因京師自上冬以及今春未得雨雪令大學士九卿等恪愼齋戒至誠祈禱殫職奉公至於該省督撫等各自敬謹修省先事圖維倘二麥歉收必有思患預防之䇿不使黎民有乏食之虞等因欽此臣查粤東地勢低窪種麥無幾已經收竣其早晚二稻依時蒔插目前雨暘時若将來定獲豐登兼粤東通省常平倉貯一百九十二萬石之多社倉穀一十五萬石有零臣自當先事預防殫力䇿畫上副聖心下利民生也誠恐有厪聖懷理合恭摺奏聞謹奏據奏業已採買米穀可以預防不虞朕懷深慰雍正十年五月二十七日署理廣東巡撫臣楊永斌謹奏爲恭請聖裁事竊照粤東一省在在海洋水師官兵巡哨全憑戰船堅固而戰船又頼椗纜維繫是椗纜實爲一船根本所關綦重聞浙省戰船每隻設椗三門一遇洋中風浪驟發三門竝抛船藉安穏至於纜索籐纜易於脆裂不若㯶纜之綿固可經牽扯粤省外海繒艍拖風各船有設椗三門者亦有止設兩門者其纜索有用㯶者亦有用籐者臣於布政司任内䝉督臣郝玉麟飭令查議各船應否添椗一門及改換㯶纜有無利益船隻經臣移詢各鎭協營去後嗣俱准覆稱添椗一門倂改換㯶纜則官兵船隻藉保安穏裨益實非淺鮮等語異口同聲移覆前來臣隨核算通省約共需工料銀六千兩有零正在議詳間而督臣郝玉麟奉㫖調任閩省未及議請題奏臣思椗纜爲戰船安危所繫官兵身命所關旣有見知何敢壅於上聞可否准於各船修造之年将向來設椗二門者再添設一門及将籐纜改換㯶纜以利舟師仍歸案估報題銷伏乞皇上睿裁施行謹奏所奏甚是已交該部議行矣同日又奏爲奏聞事竊查粤東今歲春夏之交天氣晴眀民間依時栽插圍基穏固經臣奏聞在案自四月以來晴多雨少五月初五日後晴雨相半各屬圍基安穏無事目下禾苗茂秀将來定獲豐收惟因青黄不接之際米價比前畧增自七八錢至一兩零不等省㑹人煙稠密日食頗繁幸前日所動關稅羨銀五千兩於電白茂名陽江各縣採買穀石已運到省現在陸續平糶價銀隨即歸項又有南番二縣平糶倉穀及西省穀船接濟民食無缺再閩省臺灣土番滋事聞已就縳恐有餘孽逃竄查南臺地方與潮州府之澄海等處頗爲切近臣已密囑文武各員加意密防稽察毋得滋擾居民地方相安無事臣恐有厪聖懷理合一倂奏聞謹奏覽奏禾苗茂秀民食無缺朕顧念粤東之懷釋矣同日又奏爲恭繳硃批敬請聖鑒事竊臣前於藩司任内恭繳硃批倂奏粤東礦厰宜嚴加封禁一摺欽奉硃批總之爲粤東地方多盜且米穀又非雲貴粤西價平省分可比所以不得不嚴禁開採當以此意曉喻之假若粤東民風丕變人人皆知力田務本米穀充裕價値亦如數省平減時聽其開採何須禁止也欽此臣查粤東不乏可墾之土因民間不勤稼穡以致米穀不能如雲貴粤西等數省之平易臣仰體皇上重農至意督飭屬員勸導粤民務勤耕作盡力開墾其高亢之區不宜禾稻者則令樹藝豆麥亦可以資食用至附城陸地及山麓偏坡雖不能播種糧食尚可栽植樹木今俱閒棄實爲可惜臣令番禺縣買桐樹試種於土性頗爲相宜已經成活臣現在購買桐子令地方官倡率指畫勸民栽種可以獲利别項木植隨地土之宜聽民酌種禁飭兵民踐伐其可種糧食之地仍飭不得棄本逐末倂将從前欽奉皇上勸民務本力農及栽種木植歴次諭㫖敬謹刋刻分發州縣散給里民務令家喻户曉力勤耕植以收地利以謀衣食不得坐待饑寒廹身流入匪類再查惠潮兩府户口較繁他郡人民不務本業爲尤甚從前趨利之徒多於各處礦山私挖甚至叢聚爲匪近因稽查嚴密雖已渙散但必俾有恒業庶得永無滋事兹因大官田新設縣治委員丈荒給墾惠潮無業之民紛紛投至臣會商署督臣鄂彌達悉令墾户招爲佃民又墾户分墾之外餘剰二十頃臣首先倡率同司道公捐資本分給前項無業之民墾種諭令各安耕作毋再甘蹈法網将來似可不致竊挖滋事此外各屬俱現無礦徒臣仍加意稽察不敢少懈其前項田畝将來成熟每歲可收官租千餘石查省城向有粤秀書院現爲義學教習生童請歸入作爲膏火之資事屬兩益至粤東士子文藝庸陋品行卑汚且不諳官音雖前經欽奉諭㫖著地方官訓導又雍正六年定例諭令有力之家先於鄰省延請官音讀書之師教其子弟轉相授受以八年爲限如不能官話者生童舉監暫停送試俟官話習㑹之時再各准其應試奉㫖依議欽遵在案但粤人皆狃於積習歴今四年仍未能漸移臣擬将粤秀書院捐資修葺倣照大學士鄂爾泰前任雲貴總督時在昆眀書院教士之法将學臣歲科兩試所取優等生員品行端方者每學撥二三名赴書院肄業在於鄰省延請老成篤行之士爲之教習砥行課文每月臣與督臣各課試一次加以訓勉俾知立身行己尊君親上之義每人月給膏火之資於前項官租内取給科舉之後散歸本籍另将新學臣歲科所取者照前撥入肄業如此合一省之優生訓誨造就三年之間文行旣得以交修官音亦易於學習及至散歸本籍復可轉相授受陋劣者亦可知所勸勉矣但臣庸淺之見所辦各務未知是否有當伏乞皇上俯賜訓誨所有原奉硃批理合恭繳謹奏所辦各務皆屬是當嘉悅覽焉勉之雍正十年七月初十日署理廣東巡撫臣楊永斌謹奏爲恭報早禾收成分數仰祈聖鑒事竊查粤東早禾閏五月内正當結實之時雨水勻足穀粒飽滿有至五六穗七八穗不等者迨六月初旬刈穫已遍民情歡悅咸慶盈寧據署布政司黄文煒将各屬收成分數彚報前來查各府州屬早禾分數自十分九分以及七八分不等現在米價每倉石自五錢四五分起至八錢一二分不等六月十五日以後雨水調勻晚禾栽插已遍俱皆茂盛地方寧謐民樂豐登所有各屬早禾收成細數臣謹另摺分晰恭呈睿鑒爲此謹奏覽粤東早禾收成分數曷勝欣慰之至同日又奏爲奏眀遵㫖驗看量材題補官員事竊臣荷䝉聖恩簡署撫篆准署督臣鄂彌達密交鈔録大學士張廷玉蒋廷錫寄信一摺内開字寄廣東督撫雍正九年十二月初一日奉㫖據焦祈年奏稱番禺縣茭塘司巡檢李藻才力强幹查緝姦匪不遺餘力經督臣題陞縣丞因格於部議仍留該司供職又惠來縣葵潭司巡檢黄繩中才具敏練殫力查緝此二人實係才識兼優實心效力之能員等語爾等可寄信於廣東督撫将李藻黄繩中確加驗看如果可用著該督撫量材題補欽此遵㫖寄信前來等因鈔録轉交到臣臣隨㑹同署督臣将李藻黄繩中確加驗看查黄繩中才具敏練緝捕勤謹實係雜職中卓越之員能勝縣任今揭陽縣現在出缺恭懇聖恩卽以黄繩中陞授實爲人地相宜又查李藻才力强幹捕盜有方前經調任督臣郝玉麟題補番禺縣丞格於部議隨另選東莞縣縣丞王守創調補在案但查番禺縣縣丞駐劄南村地方爲沙灣茭塘兩司交界適中要地實係濵海盜藪必得强幹之員方克勝任王守創雖辦事維勤而隨機緝捕非其所長李藻前署番禺縣丞盡心查緝地方寧謐頗爲有效如䝉聖恩仍准以李藻補授番禺縣丞以王守創補授現出之歸善縣縣丞缺實爲人地相宜於緝捕盜賊甚有裨益臣與署督臣意見相合除将黄繩中李藻另疏㑹題外所有臣等遵㫖驗看量材題補縁由相應㑹同署督臣鄂彌達恭摺奏眀伏乞皇上睿鑒謹奏覽奏知道了具題到日有㫖同日又奏爲奏請聖裁事竊查粤東一省徵收民屯糧米支應本省兵食内有解省解營水陸程途俱需脚費又交倉盤運不無折耗因從前未經議定耗米數目各屬濫行加徵多寡不一其地處衝繁之州縣多浮徵耗米以凑應地方公務之費而里户輸納亦有產同賦異之懸殊經前署撫臣傅泰檄飭司道㑹議畫一飭遵去後嗣據前藩司王士俊糧驛道陶正中詳稱約計通省支解米糧需費數目均勻畫一加耗議以每額米一石准加收耗米一斗六升内除䑕耗三升倂遞年修補厫座墊笪等項需費米三升外尚餘耗米一斗作爲運脚之費足敷通省辦解公用計粤東通省除番禺東莞等三十四州縣衞所額徵屯糧皆有屯耗報出已於遵㫖議奏事案内報部不加耗米外尚有通省民屯本色米二十五萬三千一百七十八石零共應徵收加一脚費米二萬五千三百一十七石八斗零又徵民屯折價米二萬八百九石零共應徵收折價耗銀一千八百八十三兩零内除通省各屬共應支脚費米一萬二千九百五十六石脚費銀一百五十四兩零又扣解通省各屯應徵演礮火藥銀二百兩外尚剰餘米一萬二千三百六十一石零餘銀一千五百二十八兩零再從前衝繁州縣多浮收耗米以凑應地方公務今旣畫一加徵此外顆粒不許浮收未免較前拮据若将此存剰之米准其量留數百石以公濟公似亦妥便所有衝繁之南海番禺三水高要四縣應請量留米六百石其次衝繁之曲江保昌英德清遠四縣應請量留米五百石其餘銀米悉令起解司庫以充通省公用等因經前撫臣鄂彌達批允飭遵在案嗣因惠州府屬之歸善縣地方衝要差使繁多請援照保昌等縣之例酌留耗米五百石以應公務又通省各縣驛流徒人犯因日食不給往往沿鄉乞食乗間脫逃經司道議詳於前項餘剰耗米内每名日給口糧七合約計每歲需米千石有零亦俱經前撫臣鄂彌達批准在案兹復據署布政司黄文煒糧驛道陶正中據廣南等各府詳據所屬各州縣詳稱或道府同城公務殷繁或地當孔道差犯絡繹一切夫役口糧舟車扛轎等項向無額設經費從前州縣往往派之里户供應今私派禁革懇請倣照南番等縣之例分别酌留耗米以供支應等情據該司道覆核分别地方衝繁稍簡議詳前來查據開各州縣衞應留米石連前詳准南畨等九縣酌留之米及分給流徒口糧通省實需耗米一萬二千三百二十九石九斗尚剰耗米三十二石零又興寧縣請添支前議不敷運費銀八十三兩零尚餘耗銀一千四百四十四兩零俱請遞年照解司庫以充公用等因具詳到臣等臣等伏思此項米石原係脚費餘剰今照該司道議詳量給各屬以應公務則官無墊應之艱民無派累之苦官民咸沐皇仁浩蕩於靡旣矣但洪恩出自聖主非臣等所敢擅便臣謹㑹同署督臣鄂彌達恭摺具奏伏乞聖裁謹奏耗米一項乃汝等督撫酌量辦理之事如應咨眀該部咨部存案可也雍正十年九月初十日署理廣東巡撫臣楊永斌謹奏爲奏聞事竊粤東自入夏以來晴雨調勻早禾豐收業經臣具奏在案自七月後至八月底雨暘愈加順時晚禾更爲茂盛兹據各屬将穀穗送驗前來穎實堅好飽滿光潔間有一莖至二十餘穗不等者此皆由我皇上敬天勤民重農務本故能致此休徵臣等覽閲之下不勝歡忭除通省收成分數現在另行查眀彚摺奏報外所有晚禾茂實及雨暘情形合先繕摺奏聞伏乞皇上睿鑒謹奏此皆卿等忠誠任事有以上感天和之所致於朕無渉地方督撫之賢不肖實招上天災祥之應其速如響然􅀸等之臧否卽朕之臧否也豈可分析爲二際斯休徵歡忭且置要當倍加寅畏期共勉之雍正十年十一月初四日廣東巡撫臣楊永斌謹奏爲恭報晚禾收成分數仰祈聖鑒事竊粤東自七月以後雨暘愈加順時晚禾尤爲茂盛嘉穀蕃昌萬民歡悅兹據廣東布政使甘汝來将各屬晚禾收成分數彚報前來查廣州南雄韶州惠州潮州肇慶高州雷州廉州瓊州等府羅連等州各屬晚禾收成分數自十分九分以及七八分不等各屬米價自五錢起至八錢零不等又據各屬送到瑞穀自一莖雙穗以至七穗一本自二穗以至一百二十九穗自四五尺以及長至一丈一尺不等歲登大有民慶盈寧臣謹将各屬所報晚禾收成細數另摺分晰恭呈睿鑒爲此謹奏覽奏晚禾收成分數不禁以手加額也雍正十一年三月初四日廣東巡撫臣楊永斌謹奏爲奏眀動項安插貧民仰祈睿鑒事竊照粤東惠潮等處生齒日繁無業貧民資生無策每偷挖礦山輕蹈法網荷䝉皇仁厪念命臣等悉心辦理安插之法業經臣等查眀鶴山新縣及近省各縣荒地諭招有力商民承墾将無業貧民招爲佃户給以廬舍口糧俾令耕種樂業巳經安插者計有三千餘户復經臣等奏定本省因公罣誤人員招佃報墾開復之例現在遵行縁惠潮貧民續來就業者絡繹不絶目下鶴山境内及各興墾處所尚有未經安插無業之民應卽爲安頓俾無失所而有力商民與罣誤人員止可聽令隨時報墾前項貧民未能久待臣等查肇慶府屬恩平開平二縣交界地方有土名九崗坪一帶荒地約二萬五千餘畝平坦可耕以之安插貧民每一户丈給荒地二十畝令其耕種可以安插一千二百餘户縁該處水源稍遠臣等委員查估引水開塘築室授食并牛隻秄種各費分别水旱每畝約需銀七八錢不等共約需銀二萬兩查藩庫内有前署撫臣傅泰題眀於關稅羨餘銀内酌存墾耕工本銀四萬兩原係户部咨覆給借無力墾户按年扣還之項可以動支給借前項貧民俾作耕本俟墾耕成熟之日遵照部文分限三年扣還解部仍分别水旱照例起科如此則現在貧民得速就安插而荒地獲成膏腴於地利民生大有裨益矣除将動支工本銀兩各縁由咨眀户部外所有動項安插貧民情形相應㑹同督臣鄂彌達繕摺奏眀伏祈皇上睿鑒謹奏覽日前朕有所聞業經降諭矣於此奏内仍将窮民覓食他省情形隠而不露甚屬不合同日又奏爲要地需員彈壓請添設同知以便吏治民生事竊照廣東省城洋商賈舶雲集而一應貨物俱在南海縣屬之佛山鎭貿易該鎭綿延十餘里煙户十餘萬五方雜處易於藏姦縁距縣治五十餘里南海省㑹附郭治理繁劇一應稽查鞭長莫及向設有五斗口司巡檢一員職分輕微不足以資彈壓臣察情形必得一大員駐劄稽查庶爲嚴密應請設立同知一員駐劄佛山鎭鑄給關防專司督捕稽察一切姦匪及賭博私宰私煽鐡爐等項仍隸廣州府統轄如此則彈壓得宜稽查嚴密於地方大有禆益至該鎭旣設同知無庸復需巡檢查平洲一堡煙户千餘人丁繁庶港汊多岐路通林岳石各村荘與順徳縣地方接鄰爲匪類出没之所應請将佛山巡檢移駐平洲以資巡緝洵屬得宜臣爲地方緊要起見與督臣會商意見相同合先具摺請示倘䝉皇上俞允卽繕疏具題臣謹㑹同督臣鄂彌達具奏伏乞皇上睿鑒謹奏照所議具疏題請同日又奏爲籌畫海疆積貯仰祈睿鑒事竊照南澳地方爲粤閩鎖鑰孤懸海島地隘人稠向來仰食於粤省之潮州府揭陽等縣及閩省詔安等縣但渉歴海岸風汛靡定一遇商運愆期米穀陡長兵民口食維艱縁向未設有地方官竝無倉貯米穀緩急可恃雖南澳鎭標設有營倉存貯倉穀二千石僅可接濟兵食勢難兼及商民今䝉皇上俯念海疆重鎭俞允設立粤閩海防同知彼地旣有文員駐劄誠宜籌畫積貯以期裨益兵民查潮州府存倉穀五萬石有零揭陽縣存倉穀四萬二千石有零均可酌撥勻貯若於粤閩同知衙署鄰近空隙地面建造倉厫二十間卽於潮州府并揭陽縣等倉各撥穀五千石運往存貯倉内該同知專司料理一遇商運愆期米價昻長一面詳報一面開倉量減市價平糶俟有米穀運到卽行停止所糶價銀令該同知遣親信家人赴潮郡附近價平州縣買穀運回還倉不必拘定秋收買補所需運費於贏餘價値内銷算仍責成惠潮道盤察實於海疆地方大有裨益臣行據布政司議覆相同現在飭令估計建倉工料俟估册到日於建造粤閩同知衙署案内附疏㑹題請㫖所有臣籌畫積貯事宜謹先繕摺陳奏伏祈皇上睿鑒謹奏具題到日有㫖雍正十一年五月初八日廣東總督臣鄂彌達巡撫臣楊永斌謹奏爲奏聞事竊查粤東地方本年自春徂夏仰頼皇上福庇雨暘時若高下田畝早禾十分暢茂惟南雄府城逼近大庾嶺下本年四月十八日庾嶺内蛟水陡發溪河迂折疏洩不及水勢驟湧丈餘漫及府城之南該府率同在城文武分頭救護城外近山之民悉令移就高處将低窪無山之處及水城内居民皆渡載入城安頓臣等聞報卽飛委廣南韶連道馮元方等星往㑹同府縣查眀被水各户確數立卽動支府庫急需銀兩厚加賑䘏務令窮民得沾實惠去後兹據該道等具報十九日水勢卽退歸河二十日消退如舊分頭查勘水城内外及沿河村荘保昌縣坍塌房屋一千八百一十八家傷人口七名水城城垣坍塌數處共百餘丈始興縣屬亦坍塌房屋七十七家人口無傷幸水勢驟長驟消田禾俱巳退出如舊無礙收成已将被水最甚房屋全塌之五百餘家各賑銀四兩其坍塌一半者七百餘家各賑銀三兩其不及一半者五百餘家亦各賑銀二兩俱係挨户確查宣布皇仁督同實給被水之民均沾實惠現在修葢房屋照舊安業竝無失所等語前來除飭令将城垣估計修理幷将所動銀兩俟册到核眀於藩庫公項内撥給補貯外所有該府被水情形臣等已詳慎料理可無上厪聖懷謹将縁由繕摺奏聞伏乞皇上睿鑒謹奏被水户口實力撫恤務令各得其所勿俾一人致有向隅之泣廣東巡撫臣楊永斌謹奏爲奏聞事竊照潮州府饒平縣已革武舉余猊因窩賊不法斥革枷責該犯挾恨冀圖報復囑黨陳阿蘭紏合黨羽陳阿幼等㰱血結盟欲打鬧府署搶刦潮州府城東門行舖事發被拏余猊復令陳阿蘭紏合夥犯羅謂玉陳竒和等囑其刦獄相救羅謂玉等復紏人拜把欲候余猊等審眀發回之日中途搶刦下海逃避亦被訪查拏獲經臣等先後奏聞倂将一干人犯審擬具題在案惟陳阿蘭一名係兩次代紏夥黨之要犯脫逃未獲經臣等嚴飭府縣設法密拏勒限務獲去後兹據潮州府轉據海陽縣禀報於本年四月初三日據差役獲到陳阿蘭前來除飭令㑹差兵役押解來省究審具題外所有拏獲要犯縁由臣謹㑹同督臣鄂彌達繕摺奏聞伏祈皇上睿鑒謹奏要犯就獲可嘉之至官役俱當亟加奨賞示勸同日又奏爲敬陳修整軍器仰祈睿鑒事竊臣自到任以來於臣標兩營兵丁每逢三八日期親督将弁勤加操練竭力整頓勸懲互用如馬兵内有弓馬生疎者降爲歩糧卽於歩兵内有漢仗技藝好者拔補馬糧其弓馬技勇精熟差委效力多次者賞給銀牌絹疋以示鼓勵遇有頭目把總缺出卽行拔補以期人人奮勉現今軍容技勇較前可觀惟是軍装器械有向來缺額未備及執用年久宜加整理者如兩營帳房共止有四十頂且巳舊爛其鑼鍋歴來未置又盔甲旗幟鳥鎗牌刀等械均需添造修理伏讀本年二月上諭内開古云兵可百年不用不可一日不備如馬匹軍装礮火器械軍營必需之物一一皆預備於平時及有事調撥便可刻期起行不致拮据延緩令該管大臣加意整理欽此仰見我皇上慎重軍旅整飭武備之至意臣欽遵諭㫖傳同将備将臣標兩營軍装器械確加估計核實整辦齊全需銀一千五百兩查臣標前䝉皇上恩賞生息銀六千兩自雍正七年起至雍正十年七月底所得利息除每月賞兵之外尚剰銀三千七百三十九兩除巳於敬籌各標生息銀兩案内将本銀六千兩倂所剰利銀三千兩歸入一十三萬兩數内借給鹽商生息外尚存剰銀七百三十九兩又雍正十年八九兩月分鹽道衙門尚有未解利銀三百六十兩二共