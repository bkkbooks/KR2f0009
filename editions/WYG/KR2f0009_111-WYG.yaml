body:
  text: 欽定四庫全書硃批諭㫖巻一百十一硃批魏經國奏摺雍正元年三月二十日湖廣提督臣魏經國謹奏恭請皇上聖安朕安聞爾居官聲名甚好向為人所共知惟訓爾莫移初志加勉加慎而巳此外無可多諭同日又奏為欽奉上諭事竊臣一介戎行仰荷聖祖仁皇帝不次拔擢於康熙六十年簡授楚提自到任至今時切惴惴夙夜黽勉惟恐有負重寄更蒙我皇上逾格優容詳悉開示敬捧温綸彌深惶悚臣惟有愈加惕厲始終勤慎以報聖主知遇之隆決不敢少移初志上違聖訓之諄諄也至於兩湖地方咸蒙福庇甚為安靜日来農事方興而雨暘時若豫占大有之象可以無厪聖懐所有欽奉硃批諭㫖理合一并進呈謹奏覽奏朕甚慰悦但似此地方情形之奏惟以據實為是切毋以慰安朕念為詞而稍有粉飾也雍正元年六月初三日湖廣提督臣魏經國謹奏為恭謝天恩事本年五月二十七日臣齎摺標弁家人恭捧皇上恩賜貂皮二張紅玻璃盒一個到常臣跪接至署恭設香案望闕叩頭謝恩訖伏念臣蒙聖朝豢養𢎞恩迥逾尋常而涓埃未報時切悚惶兹叨恩賚寵榮無極臣捧對之下歡忭靡涯惟有益竭駑鈍彌増兢惕勉期無忝職任以仰答隆恩於萬一耳理合具摺奏謝伏乞皇上睿鑒謹奏爾既不負皇考知遇今日豈肯負朕天下之大臣庶之衆受恩者多似爾如此知恩者頗少極宜勉力堅守初心期為千古不朽之人同日又奏為欽奉上諭事竊臣卑鄙無識仰䝉武不敢少有瞻徇亦不敢掠人之美市已之能以蹈欺妄之咎兹捧讀硃批仰䝉天語褒嘉綸音指示臣益當凛遵仰副聖主殷殷求治之至意所有奉到諭㫖理合恭繳伏查楚省夏秋二季雨𤾉時若田禾茂盛倍於徃年巳兆豐登之慶軍民安堵共樂昇平合併奏聞謹奏覽雨水禾苗情形大慰朕懐但一切總要據實直陳不可増添絲毫雍正元年八月二十七日湖廣提督臣魏經國謹奏為欽奉上諭事竊臣於六月内具奏恭謝恩賜貂皮紅玻璃盒一摺并奏欽奉上諭呈繳御批一摺重荷御筆硃批逾格寵褒敬繹温綸彌加惶悚惟有凜遵聖諭益矢兢惕不移初志據實無欺以冀無負聖主期望微臣之至意耳所有奉到硃批諭旨理合一併呈繳謹奏知道了督臣楊宗仁及二撫臣優劣何如爾其據實直陳不可少存意見雍正元年十一月初九日湖廣提督臣魏經國謹奏為欽奉諭旨據實直陳事竊臣欽遵硃批諭旨查得督臣楊宗仁到楚以来力圖興利除弊整飭地方以答皇恩但其為人性躁欲速即如鹽價一事若緩為斟酌或可以減乃不先查其弊而遽欲減其價是以商人不從淮鹽不至價值騰貴半載以来民皆淡食漸致隣省私鹽公販不能禁止目下鹽價方得稍平在督臣之心本欲為民而民情似不甚感激然其清以持巳嚴以率屬勤謹辦事正直居心俱在聖明洞照之中其餘一應所行事宜尚在未定俟有成效臣當另摺奏聞至於兩湖撫臣俱各清正和平無可指議再查楚省營伍惟督撫三標向欠操演其餘各標協營亦頗有可觀近聞督臣并兩撫臣亦皆勤為訓練合併聲明所有奉到硃批諭旨理合呈繳伏乞聖鑒謹奏所奏甚屬公直與輿論相符地方治否全在督撫大吏所關甚鉅目下情形雖云如是此後再行審視具奏以聞爾不比他人寜忍欺朕如覺少不妥協與地方百姓有損無益毋存絲毫因循瞻顧之心一切即據實直陳朕自有一番斟酌大槩兩湖吏治較前優劣如何街談巷議人心向背如何果否少有可觀抑或仍然如舊不可稍渉粉飾之詞直據所見所聞隨便具摺密以奏聞雍正元年十一月十六日湖廣提督臣魏經國謹奏為請㫖事竊臣長子魏瓆荷䝉聖㤙特補臣標中軍守備臣感激難名業經另摺奏謝但臣子魏瓆所補員缺原係守備滕延錫之缺今臣子既巳補授該備自應令其赴部改推臣查該備出身難廕年力精壮弓馬􅈺熟臣莅任二載有餘見其辦事勤慎諳練營務伏乞聖主敕部查有湖廣省内守僃員缺㤙賜補授非特該備駕輕馭熟即臣亦收指臂之效矣為此繕摺請㫖伏乞皇上睿鑒謹奏照依魏經國所請将滕延錫留於湖廣遇缺補用該部知道同日又奏為㨿實陳明仰祈聖鑒事竊查湖廣提督衙門例有親丁步糧八十名縁臣素甘澹泊眷口不過二十人家人長隨不過三十人於到任之後除現在家人長隨頂食親丁名糧外其餘因見本標各營盔甲旗械礮位等項多有破損銹壊臣即將此項銀兩重復補製而考較兵丁内有技藝純熟者加以奬賞亦係此項銀兩不過以公濟公聊副聖主安愈求安之至意今盔甲旗械礮位等項俱各整齊可觀自後並無他費謹将所餘親丁名糧照數挑選精壯餘丁頂食補足臣不敢少入私嚢以蹈虛冐之咎以負聖主髙厚之宏恩也理合據實奏明伏乞睿鑒謹奏爾之奉公盡職處何湏於朕前陳奏類此等事酌量當如何行即便舉行諒爾必不肯負朕知遇也雍正二年正月十九日湖廣提督臣魏經國謹奏為欽奉諭㫖㨿實直陳仰祈睿鑒事竊臣於去年十一月内遵㫖回奏楊宗仁等一摺奉到硃批臣遵查楚省大吏皆仰體皇上勵精圖治愛民如子之至意飭輕火耗嚴禁餽送皆清正自矢至於人情盡皆向化兩省吏治亦較實心任事竭力整理之大臣諒久在聖鑒之中臣受恩最重非尋常可比决不敢絲毫粉飾以蹈欺罔之咎謹遵㫖㨿實密為奏聞伏祈睿鑒謹奏目下雖云如此自兹以往日新不已而止於至善方好或恐暫因一時鼓舞勉强從事又復因循漸流於下朕所慮者此也不時留心體訪若有一毫舊習不除望朕亦如聖祖之寛容朕實不能少有不法者必即奏聞於朕方見實心效力忠君愛國之誠也㩀實二字勉為之雍正二年九月初二日湖廣提督臣魏經國謹奏為欽奉諭㫖㨿實直陳仰祈睿鑒事竊臣於本年正月十九日覆奏督臣楊宗仁一摺奉到硃批臣理應即時具摺奏聞惟恐冐昩凟陳有負樂業地方日有起色屬員並無怠玩縱忽不法者倘有此等人員臣自必凛遵以期仰報聖主髙厚之隆恩於萬一合併陳明統祈睿鑒謹奏所奏俱悉同日又奏為保舉能員以收實效伏祈恩允事竊查臣標後營遊擊楊應舉患病乞休員缺臣驗得常徳水師營守備沈天爵人材壮健弓馬嫺熟實係幹練能員伏懇天恩以守備沈天爵補授臣標後營遊擊其守備沈天爵員缺查臣標左營千總石文彪諳練營伍人材弓馬俱有可觀仰懇天恩以千總石文彪補授常徳水師營守備是二員者洵屬人地相宜倘䝉俞允該将備等自必愈加奮勵而臣亦得收臂指之效矣但臣標後營遊擊并常徳水師營守備並非題補之缺臣為營伍得人起見故敢冐昧奏請可否恩允伏候聖裁謹奏照依所請沈天爵補授提標後營遊擊石文彪補授常徳水師營守僃該部知道雍正三年正月十九日湖廣提督臣魏經國謹奏為欽奉上諭事雍正二年九月二十六日接到兵部劄付内開准吏部咨稱雍正二年八月十九日欽奉上諭各省道府同知通判州縣等官内有才幹素著㢘潔自持者著總督保奏三員廵撫保奏二員布政使按察使各保奏一員将軍提督亦屬本省大員将所知者各令保奏一員俱密封進呈等因欽此劄行到臣仰見我皇上遴㧞賢才之至意臣敢不悉心採訪上應聖主求賢之盛典臣伏查楚省道府同知通判州縣等官仰體皇上勵精圖治振作維新三年之内其循謹供職者固不乏人惟是文武殊途臣但見其貎難察其心僅聞其大槩於目前難定其持躬於日後况知人則哲自古為難臣猥以庸愚不敢冐昩保奏有違聖主埀詢殷殷之至意伏乞皇上原宥於格外則臣感戴天恩益當竭盡駑駘於末路矣為此密摺奏覆統祈皇上睿鑒謹奏爾在楚多年耳目所及豈有一二人不知之理操守一節或不能保其終始弗改止就民情愛戴辦事明敏一邊取擇具摺密奏以聞雍正三年七月初二日湖廣提督臣魏經國謹奏為年歳豐登人民樂業㨿實陳奏仰慰聖懐事竊查楚省二麥業經豐收而所種田禾早稻居多六月内即可收穫今已登場約有八九分收成間有栽插中晚二禾現在雨水霑足茂盛秀發倍於往年是以米價甚平兵民樂業而吏治肅清武僃整飭第見熙熙皥皥仰頌堯天舜日於億萬斯年也為此據實奏聞伏乞睿鑒謹奏覽奏實慰朕懐此皆爾等文武大臣能安輯兵民感召天和之所致勉力為之同日又奏為恭謝天恩兼請陛見敬聆聖訓事竊臣齎摺家人回常捧到臣恭請聖安一摺欽奉硃批朕躬甚安你好麽欽此伏稔聖躬乾健誠係四海臣民之福臣心實深懽忭獨是臣何人斯仰蒙聖主埀詢格外寵榮感激無地理合具摺奏謝抑臣更有請者伏念臣受恩深厚時切冰兢惟恐少有隕越上負隆恩但臣今年六十六歳精力漸衰知識漸疎肩兹重任彌深尸素之懼伏乞聖主准臣陛見恩賜教訓俾微臣有所遵守得以黽勉末路仰報聖恩於萬一為此繕摺請㫖謹奏聖祖陵寢爾尚未經叩謁朕亦欲識爾面今巳調爾松江提督矣候趙坤到楚交代明白来京陛見後再赴新任雍正四年五月初六日江南提督臣魏經國謹奏為敬陳地方營汛情形仰祈睿鑒事竊臣今年正月二十八日仰覲天顔即荷温綸兼承恩賜祗受之下感激難勝隨欽奉諭㫖於二月初九日自京起程至三月初十日到松受事業經具疏恭謝天恩在案今臣任事一月有餘竊查上下兩江二麥秀實米價每石九錢至一兩二錢不等雨水調勻兵民樂業但䑕竊狗偷之案較於他省為獨多祇緣財賦之區商旅輻輳加以支河小港易於藏姦晝潜夜出並無居址難以稽查今臣設有廵船二隻至於臣標各營各有汛防之責查現在之盔甲旗幟器械俱皆齊備鮮明與臣前任湖廣提標不相聞伏祈睿鑒謹奏知道了雍正四年七月二十八日江南提督臣魏經國謹奏為奏懇天恩事竊臣於今年正月内欽奉諭㫖入京陛見二月初八日陛辭仰䝉聖訓庶犬馬依戀之心得以稍慰而地方營伍諸事有所遵循伏查上下兩江地方寜謐自夏秋以来雨𤾉時若田禾秀發豐收有望伏乞聖主恩允来京臣即輕騎就道與在廷臣工隨班拜舞共祝聖夀無疆臣不勝踴躍歡忭之至抑臣更有請者臣於聖主於萬㡬之暇揮灑宸翰賜進摺弁員齎回俾臣懸掛中堂觸目警心不啻時領聖訓則仰沐聖主寵榮永永無既矣統乞聖恩俞允為此繕摺請㫖謹奏覽同日又奏為再陳營汛地方事宜仰祈睿鑒事竊臣於本年三月初十日到任之後凡一應餽送以及鹽規陋弊等項盡皆嚴行禁革所有臣之廪禄并親丁名糧除捐給太湖營守糧十分之外尚存親丁守糧七十名以為養㢘之資伏查前任舊有公費糧二百四十分臣巳募補九十名現存盛雨水霑足現在米價每石九錢至一兩一二錢不等至於盜賊鹽梟嚴飭各營防範緝拏稍巳斂有成效惟是地方遼濶一年之内廵視難周可否仰懇察将来自必盜息民安於地方大有禆益臣冒昧奏陳伏乞聖裁謹奏覽雍正四年九月十三日江南提督臣魏經國謹奏為恭報秋成分數仰祈睿鑒事竊臣查上下兩江自春夏以來雨水霑足田禾暢茂秀發前經具摺奏明今於八月中旬至九月初五日隂雨連綿江潮泛漲地勢低窪者不無被淹之處附近則青浦福泉為甚兹幸於九月初七日至今天氣晴霽水勢漸消不致成災大約於十分豐收之中畧減二三聖主宵旰之殷懐為此據實奏聞伏祈睿鑒謹奏爾此任非尋常可比髙其位近歳以来未免年齒稍邁精神不到諸凡不妥協處頗多爾當極力整飭方不負朕之委任也雍正五年正月二十五日江南提督臣魏經國謹奏為遵奉諭㫖實力奉行恭繳硃批統祈睿鑒事竊臣前奏秋成分數一摺奉到硃批仰䝉天語煌煌諄切訓勉益感聖主寵任之至意臣因江南隂雨之日多飭令各營操練兵目不必限定日期一遇晴霽即将弓馬鎗牌等項各演技藝其優者以守㧞戰以戰㧞馬其更優者即㧞補把總員缺以奨勵之其劣者量與懲革以振作之伏查江南水汛居多臣標捐造廵船二十隻令弁目等輪班廵查時加緝訪其蘇松常鎮各營共設有廵船二百五十隻亦皆檄飭修整令将僃弁兵輪流一體遊廵宵小盜竊雖不能盡絶較於上年所報案件似覺減少臣決不敢徒託空言以上負聖主委任之至意所有奉到硃批理合恭繳謹奏據奏操練兵目劣者量與懲革等語既係劣者嚴加懲革猶嫌巳遲何云量與似此仍循湖廣善柔邀譽故智恐爾老顏面難保全矣朕因爾與吳陞操守頗好不過借汝二人以激勵廉隅而巳湖廣福建兩省戎政被汝二人自做好人竟廢弛至不可問今若仍以前任為得計復踵而行之則罪殊難逭在爾惟知因循自便以博紳衿地棍之稱頌縱容兵弁以邀寛厚盛徳之虛名殊不思一獲罪於朕無人能解救汝也况汝原隸藩下出身卑賤既沐聖祖屢次拔擢復蒙朕之委任極宜致身盡命以圖報兩朝知遇之恩若仍移公忠為國之心而徇一巳瞻顧之私恐昭昭在上未必能容如此巧猾存心之人令其全始全終於斯世也當清夜警省盡改從前柔善悞事愆尤秉公破面整飭一番庶㡬收之桑榆猶未為晚如云劣者方量加懲處是何言歟在朕前所奏尚如此朕不見不聞之地又不知作何行為也此後若不痛自悔艾奮勉自新則禍不旋踵噬臍莫及矣雍正五年三月十五日江南提督臣魏經國謹奏為欽奉上諭恭謝天恩事竊臣前奏遵奉諭㫖實力奉行恭繳硃批一摺奉到硃批臣跪讀聖訓汗流浹背惶懼無地伏思臣至微至賤仰荷聖祖仁皇帝格外隆恩棄瑕擢用又䝉聖主疊沛從古未有之殊恩臣撫心自問毫無報稱夙夜慚悚祇緣臣秉性愚昩不能仰體宸衷著實破面整理有曠戎政惟以邀名悞事柔善取恱於人獲罪巳深乃䝉聖主不即加譴斥諭㫖諄諄臣不勝感懼交并自今以後惟有凛遵聖諭猛加警省痛改前非勉竭犬馬血誠以期仰報聖恩於萬一決不敢仍存從前湖廣任内善柔沽譽之習致負聖朝知遇之隆恩伏乞聖主寛宥前愆俾臣力圖後效恩全始終則臣之世世子孫均沐皇仁於無既矣為此繕摺恭謝天恩所有奉到硃批合并呈繳謹奏能改乃爾之福不改乃爾之禍於人何渉試清夜捫心内省則是非了然明白矣榮辱由爾自取朕不横成見於胷中也然所謂遷改者在身體力行非言語章奏及請託吹嘘入朕之耳即可以彌縫掩飾也勉之慎之雍正五年四月十五日江南提督臣魏經國謹奏為敬陳地方事宜營伍要務仰祈睿鑒事竊臣查江南蘇松常三府係江海交滙之區沙劉河一帶業經興工每夫給銀五分數萬窮民皆得養贍之資而浙省杭嘉湖三府之水亦得以暢流而無虞矣再本年三月以来晴霽之日多閏三月以来雨𤾉時若二麥現在登場約有七八分收名留為營中製辦一切應用之物臣於上年到任後即具摺奏明今查臣標陸營内歩兵盔甲有銹爛不堪披戴奏覽矣雍正五年六月二十七日江南提督臣魏經國謹奏為欽奉上諭恭繳硃批伏祈睿鑒事竊臣前奏地方事宜營伍要務一摺奉到硃批臣敬謹跪讀伏思至微至賤莫有過於臣者而仰邀聖朝逾格之隆恩亦莫有過於臣者祇縁質秉庸愚雖圖報有心而涓埃未效今疊䝉聖諭彌覺惶懼無地愧悔何及臣惟有凛遵諭㫖殫竭駑駘實心任事操練兵丁約束将弁凡有闗於地方事務者自當預為奏聞以仰副聖主諄諄訓誡之至意所有奉到硃批理合呈繳伏乞睿鑒謹奏不教而加之罪朕所不忍能改與否禍福攸關在汝自為朕亦難强之使然今既奏稱愧悔希朕見信若不實實改過遷善徒然捨本逐末欲望有以惑朕耳目不特魏經國無此伎倆恐天下臣工皆未必能也條奏一摺留中廷臣議覆後酌定雍正五年九月十三日江南提督臣魏經國謹奏為恭繳硃批敬陳愚悃伏祈恩鑒事竊臣前奏欽奉上諭恭繳硃批一摺奉到硃批諭㫖伏念聖主御極以来宵旰憂勤綸音渙發四海臣民莫不爭自濯磨仰邀福澤即衰庸如臣猶屢䝉聖主格外加恩諄切訓誨臣敢不夙夜兢惕改過自新實力遵行以仰副聖主成全始終之至意臣惟有益竭愚誠約束将弁操練兵丁整飭營伍不敢稍有瞻徇不敢稍存私臆以仰副聖主隆恩於萬一耳所有奉到硃批理合恭繳謹奏朕經各處訪詢有奏汝較前稍改亦知說屬員不是矣又有奏汝習慣成性錮疾難除何能改易云云等語果若此是乃下愚不移之流朕豈肯成全如此負恩悖理老姦巨猾敗壊國家法紀之人乎若仍然自以為是怙終不悛禍不旋踵矣朕一番髙厚之恩付之流水殊屬可惜同日又奏為敬陳一得之愚仰祈睿鑒裁奪事竊惟國家武僃與文事並重設専閫而統率将士嵗行春秋二操原以申明歩伐止齊之法簡軍實而揚武畧毋容怠忽廢弛者也查江南營路繁多水陸交錯将弁賢不肖不等其於春秋操期保無玩視功令者即上司事後查㕘而營伍巳經頽敝臣愚謂與其察㕘於事後不如督飭於事前臣欽奉敇書内開㑹同總督廵撫選擇武官内能幹者查點兵馬等語臣謹擬設委員循環察勘之法每嵗春操屆期令左邊鄰營挨次按勘右邊鄰營至秋操屆期令右邊鄰營挨次按勘左邊鄰營察其額兵虚實馬匹肥瘦技藝生熟陣勢如法與否軍需完整殘缺與否并察水師兵船水務練達駕駛熟便與否事畢據實詳報上司如有廢弛營分聽候題㕘議處再於兩操事竣秋末冬初時㑹同督臣公選能幹将領數員分定㡬營令其前徃覆勘如有廢弛營分係按勘之員匿報在先者即将按勘之員同本營之員一并題㕘倘覆勘之員或扶同隠庇經督提親勘察出訪聞有據亦一例題㕘如此按嵗舉行循環督飭於前處分嚴懲於後将見操練不期勤而自勤軍容不期整而自整矣臣不揣衰愚謬陳芻蕘可否採擇伏乞皇上睿鑒裁奪施行謹奏此議仍屬虚文毫無益於實際從来有治人無治法任爾将左右鄰營調察即使闔營互換人人咸知提督係邀名沽譽徇情罔上樂為鄉愿之人縱千方百計擬議孰肯出頭代爾任怨耶自為大帥尚不恤欺君悞職而望屬員至誠待已無是情理身為大臣受封疆重寄尚不肯為國家任怨而望偏裨末弁秉公持正更無是情理但能令屬員兵丁僉謂爾是一鐵面無私忠正執法之提督只知有國而不知有家有罪必罰有犯必懲今秉閫外之節鉞将来朝廷之柱石人人皆如此深信不疑不俟春秋操練保爾各營整齊嚴肅也凡事當務拔本塞源似此逐末之論何濟於事而況徒託空言未必實行此等妄奏安能聳朕觀聽前數次諭㫖甚明在爾審擇而自處耳同日又奏為時屆秋成據實陳明伏乞睿鑒事竊臣查蘇松常鎮淮揚各府所屬州縣田禾秀實現在漸次登場約有八九分收成米價每石一兩一二錢自江寜以上各地方收穫約有七八分不等人民俱皆樂業惟六安無為夀州舒城霍山宿松桐城霍邱潁上沛縣等州縣七月内有因風雨連綿有因蛟水陡發低窪之處俱被淹澇臣據各營呈報前来星即咨㑹督撫諸臣速為拯恤不致失所外臣復檄飭各協營嚴加防禦俾城池倉庫等項勿致疎虞在案至於沿邊海洋臣飭各營将弁按季輪廵甚為寜謐所有地方情形理合據實奏聞謹奏一身責任尚不能抒忠盡職斯乃督撫及地方有司之事何必多此一番越俎耶加意拯恤之咨㑹仍不過沽譽之為假使劣紳惡衿干犯法紀寜肯代督撫懲治乎觀此二諭而不驚愧悔艾似非人類也雍正七年七月初十日署理直隸古北口提督印務都統降二級調用臣魏經國謹奏為奏聞事雍正七年七月初九日據河屯營守偹王璸呈據虎什哈把總于彦報稱本年六月十七日巳時大雨至十八日未時止虎什哈西白旗地方山水陡發衝去房屋三十六間小廟三座人民男婦十三名口旗人一名又廟子溝衝去房屋十間淹沒本處旗人一名拏聶溝衝去房屋二十一間等情又據三旗砍楊木板千總朱熺并壮丁等呈稱六月十七八等日大雨水發共衝去苗地三十二頃八十畝又據拏聶溝法爾馬公莊頭戴瑞呈稱衝去本莊苗地十七頃八十畝又據莊頭李天培呈稱衝去潮河川三道河官苗地一頃各等情由該僃呈報前来所有口外被水情形理合具摺奏聞伏乞皇上睿鑒謹奏知道了衝去人口房地或止於此數抑或猶有遺漏當確查詳報不可絲毫隠飾雍正七年七月二十一日署理直隸古北口提督印務都統降二級調用臣魏經國謹奏為恭繳硃批奏摺事雍正七年七月十四日據臣標齎摺把總恭捧硃批奏摺回口臣跪迎至署望闕叩頭祗領開閱遵查口外地方前因連隂積雨山水驟發以致虎什哈等處有淹沒人口田舎之事其餘地方雖經驟雨並無水患田禾俱皆暢茂臣受恩深重事無鉅細惟有謹遵聖諭不敢絲毫隠飾用以少酬髙厚於萬一耳所有奉到硃批奏摺理合恭繳謹奏知道了所奏調撥營弁一摺交部議矣雍正七年閏七月二十六日署理直隸古北口提督印務都統降二級調用臣魏經國謹奏為剔除營債盤利之弊以廣皇仁以紓兵累事竊查營兵食用除支領餉銀之外别無生計遇有窮乏難免借貸向有射利之舗戸豪民結交隊目廣放營債每兩利銀五分以至加一或折扣不等兵丁廹於燃眉甘受其毒及至關餉之日本利盤筭扣還無餘只得又向隊目轉懇再三仍行折借照前起利如此經年累季債主獲利數倍而兵丁實貽累無窮若不設法剔除營伍終無起色臣愚以為廣放營債之徒從前久獲重利俱屬違禁所取但念舊習相沿不便概行追究似應通飭嚴禁令其停止利銀止許陸續歸本定於三年内清還姑免其違禁取利之罪如此明白禁約庶民無虧本兵有餘貲均頌皇仁於億萬斯年矣是否可行伏乞皇上睿鑒施行謹奏所奏甚是朕早有此意未經降㫖候㫖遵行可也凡如此等之奏不加慎密擅自宣露於外仍蹈沽名故轍則汝身命恐難保也雍正七年八月初四日署理直隸古北口提督印務都統降二級調用臣魏經國謹奏為奏聞事竊照古北提標兵丁荷䝉皇上天恩賞庫銀六千兩令臣委員經理營運生息以濟各兵喜喪等事酌量賞給之用業将領到庫銀并各兵感激緣由據情題謝在案查古北地處邊隘非比衝衢繁庶之區廣有營運之法臣悉心籌畫惟有開設典當可以永久生息今擇於古北城外河西開設當舗一處招殷實舗民二人經管猶恐六千兩一時不能運出以致閒放無益止領去銀四千兩於八月初三日開張照例以三分行息其餘銀二千兩暫存中軍署内擬於秋收後糧食輻輳之時先儘兵民糴用然後陸續零收囤積於来嵗青黄不接之時即按市價量為減糶以便兵民以資生息俟典當通行之日仍将此二千兩併入舗内營運飭令該中軍每月親身盤查臣亦不時稽察務使均沾實惠本利無虧民不擾而兵有益以仰副我皇上推恩博濟之至意為此繕摺奏聞謹奏如此營運可以永久濟兵料理甚好雍正八年四月十四日署理直隸古北口提督印務都統降二級調用臣魏經國謹奏為恭報雨澤事竊查古北口及石匣地方於四月十三日天降霖雨入地三寸隨差查口外熱河一帶地方亦同日得雨入地三寸其曹家路虎什哈二處同日大雨田疇霑足理合繕摺恭奏以慰聖懐俟各處得雨霑足再當奏聞謹奏覽得雨情形深慰朕懐但不可絲毫增加涉於粉飾一一據實奏報方足取信硃批諭㫖巻一百十一
