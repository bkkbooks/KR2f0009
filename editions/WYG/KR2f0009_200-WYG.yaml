body:
  text: 欽定四庫全書硃批諭㫖巻二百硃批胡鳯翬奏摺雍正元年三月二十二日蘇州織造臣胡鳳翬謹奏為奏聞虧空事臣蒙特恩簡用感激惶悚惟有盡心報效一切關係國帑務期徹底清查以仰副皇上委任至意今查得李煦任内虧空各年餘剰銀兩現奉㫖交督臣查弼納查追外尚有六十一年辦六十年分應存剩銀六萬三百五十五兩零竝無存庫亦係李煦虧空臣據實奏聞所有歴年動用銀兩數目另開細摺并呈御覽再查李煦於康熙三十二年奉内務府行文著動備用銀二千兩買米四千一百餘石此項動用銀兩巳經報銷訖所買米石竝無存貯明係虧空合幷奏聞但李煦歴任年久動用錢糧甚多此外有無虧空容臣查明續奏斷不敢絲毫徇隱上負皇上天恩為此謹奏逐細清察毋遺移交查弼納可也又歴年銀兩細數一摺亦交與查弼納雍正元年四月初五日蘇州織造臣胡鳯翬謹奏為奏聞地方情形事竊臣蒙皇上天髙地厚之恩雖捐糜頂踵不能仰報萬一所有地方情形敢不據實直奏查蘇州係五方雜處之地閶門南濠一帶客商輻輳大半福建人民幾及萬有餘人其間遊手好閒之徒未能安分最易作姦又有染坊踹布工匠俱係江寧太平寧國人民在蘇俱無家室總計約有二萬餘人凡遇盜案發覺常有踹匠在内臣下愚鄙見以為俱當稽察防範分别澄汰消弭於未萌前聞二月二十五日福建省城越獄致傷官兵悉係臺灣海冦餘孽此輩一經拘拏自必四散逃匿臣細查出洋海口如太倉之劉河七丫上海之黃浦吳淞俱去蘇不逺全仗巡查嚴密方免疎虞而鄰近之松江提督係署事之員海口防守汎兵因循懈怠有名無實謹據實奏聞臣密探安徽巡撫臣李成龍年紀雖老精神強健所屬節禮及陋規等項亦俱收受幷此奏聞謹奏將爾之所見所聞俱告知何天培伊自當料理應知㑹髙其位者亦令何天培密行知㑹雍正二年十二月十八日蘇州織造臣胡鳳翬謹奏為遵然到任未久操守辦事尚在未定其布政司博爾多尚未到任又臣於初八日過揚州謹將奏毋謂朕將爾交與怡親王為已得泰山之靠遂放膽肆志任意招搖也倘少有辜負朕恩處第一㕘劾爾者即係怡親王切莫錯㑹若希冀王施袒護私恩於爾則自誤爾之身家體面矣小心慎之雍正三年七月二十六日蘇州織造臣胡鳳翬謹奏為欽遵舉首據實奏聞事竊臣於七月二十四日接閱邸報捧讀上諭年羮堯從前題奏西藏青海等處軍功議敘文武官員俱多有冒濫不實特賜寛大之恩凡係年羮堯任内冒濫題奏者無論巳授未授巳陞未陞俱准速行據實自首皆從寛釋宥欽此仰見聖徳如天仁恩廣被何敢稍有隱匿自取罪愆臣子式瑗現任廣西桂林府同知先由監生自捐縣丞後因年羮堯為四川巡撫時羮堯係式瑗母舅遂代為運米議敘縣職於康熙六十年八月内部選掣得廣西陽朔縣知縣續經督撫保薦於雍正元年蒙恩准授桂林府同知前之縣丞係自行捐納後之同知係天恩賞授而縣丞議敘知縣臣子竝未親身運米進藏雖非年羮堯題奏之員實由甥舅私情所致其為冒濫入册不問可知臣受恩深重若敢欺隱掩飾罪不容誅相應據實首明伏懇皇上天恩將臣子式瑗敕部革職以證年羮堯冒濫之罪為此謹奏此應報部之事何得混行摺奏雍正三年八月十七日蘇州織造臣胡鳳翬謹奏為叩謝天恩事竊臣家人到蘇奉怡親王傳宣皇上恩㫖將織辦縀疋節省銀兩賞給臣跪聆之下感悚難安伏思臣微末庸愚蒙皇上洪恩賞授織造體面非常又兼關務力圖報效前項節省之銀係錢糧公帑臣自揣福薄何當重賞而恩加曠典又不敢辭謹望闕叩首謝恩其銀不敢私動留為辦差之用為此繕摺恭謝天恩謹奏多賞與爾以便為夤緣鑽刺之用耳雍正三年九月二十六日蘇州織造臣胡鳯翬謹奏為叩謝天恩事竊臣因臣子式瑗一事不敢欺隱具摺首明今臣家人回蘇跪接硃批諭㫖捧繹之下方知臣具摺之愚蒙重荷聖慈矜全臣感激涕零謹率合家老幼望闕叩首謝恩惟有鏤骨銘心與臣子式瑗共秉忠誠盡心效力圖報皇上髙厚之恩於萬一耳并將硃批原摺恭繳謹奏當極加小心謹飭聞爾頗不安靜慎之慎之雍正三年十月初三日蘇州織造臣胡鳳翬謹奏為據實陳情恭繳硃批事臣家人回蘇跪接皇上硃批訓㫖捧繹之下惶悚恐懼無地自容竊臣微末庸愚荷蒙天恩簡任織造兩載之中寸長未效又蒙特恩賞兼滸關税務隆恩異數實出非常雖竭力致身難報萬一何敢再生妄念有所營求況聖明在上洞徹隱微臣無知犬馬豈不自顧身家舉朝共凜冰淵焉肯擅容請託臣再四思維其間有形迹可疑不敢不據實直奏臣與本門上之人非親即友相好在前當日困苦之時毎承周濟臣今沐殊恩豢養厚禄偶遇親友婚嫁喜事亦量為幫助以報前情竝無渉私干譽而親友亦見諒不収此臣不知分量不自謹飭之所為罪何可逭自今以後惟有凜遵聖訓公爾忘私一應交際往來槩行永杜改過自新伏懇皇上開天地格外之恩原情矜宥臣生生世世銜戴洪恩於無既矣所有奉到硃批原摺恭繳謹奏朕原有㫖除怡親王之外不許結交一人孰意爾尚恐怡親王照顧不周又復各處鑽營却以本門上幫助親友之事回奏巧詞搪塞轉見狡飾朕豈令爾一槩謝絶親戚往來耶可謂胡說之至硃批諭㫖巻二百
