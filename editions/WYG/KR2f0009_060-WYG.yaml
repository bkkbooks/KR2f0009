body:
  text: 欽定四庫全書硃批諭旨巻六十上硃批王國棟奏摺提督河南學政臣王國棟謹奏為欽奉上諭事臣才劣識庸荷䝉聖恩簡用視學河南陛辭之日兩聆聖訓指示詳切仰見我皇上天地為懷日月並照無微弗燭無逺弗周所有學政事宜臣矢公矢慎勉竭駑駘不敢絲毫茍且玩忽有負皇上隆恩至撫臣田文鏡居官之處奉旨令臣細加體訪於兩三月後摺奏臣於雍正二年十一月到任路經彰徳衛輝開封三府又於十二月内考試懷慶一府所見文武各官及士民人等留心詢問其説不一大約感頌田文鏡者皆言其亷幹明敏怨望田文鏡者或言其催科太廹或言其御下太嚴不留餘地至於操守可疑竟未有人議及者臣於封印後回省目擊其辦事甚勤大小屬員一到即見家人吏役約束頗嚴門包小費一槩謝絶居官如此可謂難得而聲名不甚純粹者實緣田文鏡莅任以後諸事認真稽察過嚴一無容隱所致此外實别無所聞為此繕摺陳奏伏乞睿鑒謹奏所奏田文鏡居官之處甚屬公當知道了提督河南學政臣王國棟謹奏臣督學河南歴試數郡所經州縣聞去冬俱得雨雪但多寡大小或有不齊入春以來河北三府及開封所屬雨澤稀少二麥歉收臣於三月初旬按試河南府四月初四日事竣起身初三日五鼓河南府得雨數寸初五日臣按試汝州地方本日汝州雨頗霑足二麥收成尚有五分四分不等迤西所屬伊陽等處尤佳棉花髙粱等項業經得雨布種可冀秋成米麥豆價值二三月間稍長得雨後價又漸平為此繕摺據實奏聞謹奏所奏雨水米價已悉百凡但須據實直陳若稍涉虛飾反悞聽聞未若不奏之為愈也提督河南學政臣王國棟謹奏五月十九日臣家人齎摺回豫領到硃批百凡但須據實陳奏欽此仰見皇上軫恤民瘼勤求吏治凡四海九州之大無微不察有感即通稍有人心敢不仰體臣於六月内歲試事竣起身回省路經上蔡西平許州等處一路髙下平原禾麻菽黍一望如繡惟六月中旬以後雨澤過多低窪之地積水苦澇至七月十三日開封府屬之大寨蘭陽縣之坂厰河堤一時潰決田苗廬舍漂沒頗多祥符縣相近地方亦有被其患者惟幸居民遷避未曽傷損河臣嵇曽筠撫臣田文鏡赴工查勘并委地方官料理賑恤堵築事宜十八九日天氣晴明聞決口現在興工堵塞可無他患其餘州縣低下處所田苗分數少減平原髙阜皆有十分成熟已經漸次收穫臣謹據實奏聞謹奏知道了絲毫毋得粉飾提督河南學政臣王國棟謹奏為遵旨密陳事竊臣訪聞河南府屬盧氏一縣地處萬山之中向年亢挺一案盧氏縣學生員亦多竄入其中彼時地方官見亢挺事巳題達未肯又多一事設法和解並未懲創一人現今盧氏一縣俗尚澆凌皆緣前此妄為未經處分效尤成習臣荷聖明委任不敢以事屬前任置若罔聞亦未便以既結之案聲張滋擾密行亷訪將向日附和多事生員摘其微過漸次革除以清學校臣愚以為國家事無大小與其懲創於既事之後無寧防杜於未事之先士子者百姓所觀瞻教官者士子之表率臣見現在盧氏縣學教諭劉晉辦事勤敏心胸明白頗能彈壓多士且歴任數載亦悉地方情形縁係生員捐職例應離任赴部改選臣思教官雖微關係學政誠恐部選之人不識地方情事抑或羸老軟弱不得其人盧氏士習便難整飭合無仰請聖恩准將劉晉留任辦事俾其分别優劣明示勸懲庶盧氏一學不至無知犯法則學校澄清地方寧謐矣查劉晉巳捐陞知縣儘可赴部投供臣為學校得人起見未敢具本陳請不揣冐昧繕摺奏聞是否可行伏候聖明裁示謹奏劉晉若願留任則題留以知縣銜管教諭事可也如不願留任因其勤敏明白而反阻其上進之階殊非鼓勵人才之道浙江觀風整俗使臣王國棟謹奏為覆旨事竊臣一介庸愚荷䝉皇上天恩畀以觀風整俗重任於雍正四年十一月二十二日赴湯山行宫恭請聖安併䝉聖訓剴摯詳明大中至正聖經賢傳之奥一經聖明闡發内聖外王之道一以貫之臣粗習章句學識竭力倘可稍圖報稱皆我皇上天地造就之𢎞仁也臣於十二月初二日自京起程遵旨從河南省奉臣母赴浙江任河南撫臣田文鏡恭請衛率同司道諸臣恭請聖安臣隨將所奉諭旨宣示撫臣李衛及按察司臣董永芠皆感激天恩望闕叩謝除臣到任日期巳經具疏題報外所有宣示諭旨縁由理合具摺覆奏再䝉皇上面交與臣二摺臣與撫臣李衞同閲内開稽察棚民一事先經遵照部行大學士張廷玉條奏奉奏所交二摺再行繕寫呈繳臣又特奉上諭命臣清查浙江頑抗錢糧一項舊例包攬抗欠紳衿州縣詳請革懲督撫院司始行查究臣思浙江風俗澆漓不同他省必待有司詳請恐州縣未必盡能執法臣已行文各府州縣依限催徴仍令按季將完欠分數據實冊報臣於完半全完之期按懲者革懲庶通省之人咸知奉法而頑欠可清矣又臣到浙江時訪聞民間有胥役市販合湊幾家買閲邸抄者臣思小民無知不宜與聞國事雖皇上所行率皆化民成俗仁育義正之事無不可使人立拏重懲乂臣在湯山時面領上諭撫臣李衞奏帶額外郎中朱倫瀚令臣稽察賢否臣到浙後於朱倫瀚進見之時即將皇上戒董策勵之意詳悉宣示朱倫瀚悚慄恐懼感激涕零據云聖祖拔擢之恩委署寧波府任事未久俟臣巡歴時細加查察據實具奏又仁和縣知縣紀逯宜書生初任臣見其謹飭有具奏又臣自河南至浙江見浙江隂雨與江南無異自上年入冬以後雨雪連綿直至今春晴日頗少臣到任後尚多隂雨初六日撫臣奉旨行耤田禮是日天氣晴明農民歡忭以為豐年有兆嗣後仍時晴時雨十五日臣與撫臣宣講巡查竭力辦理理合奏聞伏惟聖鑒謹奏覽浙江觀風整俗使臣王國棟謹奏為敬陳浙西風俗事竊查浙江風俗澆漓惟杭嘉湖三府為甚杭州人狂放湖州人刁健嘉興人浮薄臣每至一州縣即傳集紳衿人等至明倫堂宣布皇上天地覆載之仁御極以來敬天法祖勤政愛民四海之内一夫不獲即厪宸衷湛恩溥被不可枚舉數計又因浙省風俗澆薄屢頒聖訓深切著明復設專官整齊化導無非欲爾神衿士民明天地之經識尊親之義安上下之分重亷恥之防爾等遭逢聖世仰沐皇仁應各念父母之邦為子孫之計一切浮狂詐偽抗糧健訟種種惡習務期洗心滌慮痛自革除庶幾化行俗美共樂昇平一時紳衿人等聽聞之下無不感激愧悔衆口一辭似出中誠非由强飾臣到海寧地方紳士向多澆薄而民亦刁頑臣如前宣揚聖教之後更嚴加戒飭雖俱戰戰慄慄叩頭謝恩切齒查賊然或一時面從未必中心改革尚當不時巡察倘有怙終不悛者應即分别重輕㕘革懲治臣於杭嘉湖三府凡所巡歴之地無不加意察訪從前肆惡之徒實皆畏懼歛跡除生事劣紳等臣俱繕疏糾㕘外凡抗糧包訟生監及姦胥里棍俱拏交各該地方官審究各州縣有力學敦行之士臣訪知的實或給扁示旌或面加奬勸以示鼓勵再浙民向來健訟每逢地方上下衙門放告動輒一二百紙近日詢之各屬有司俱云詞訟比往時減半皆仰賴皇上存神過化之用民知安分稍返醇良此亦小小一轉關也又浙民雖多詐偽而性終柔弱如杭州海寧紹興數處前者偶惑訛言闔邑震恐臣與撫臣李衞隨經出示曉諭安輯大抵愚柔之人皆知畏罪臣恪遵聖諭分别淑慝而勸懲之或可以漸轉移仰副我皇上牖民成俗之至意臣謹繕摺奏聞伏乞睿鑒謹奏爾到浙與李衛協衷任事能推誠布公宣明朕旨風俗人心頓覺轉移朕聞知嘉悦之至勉之二字外無可多諭也浙江觀風整俗使臣王國棟謹奏為敬陳浙西州縣事宜仰祈睿鑒事竊臣巡歴浙西留心查訪司道各官俱䝉皇上特簡優劣賢否久在聖明洞鑒之中且臣共事未久不敢冐昧陳奏惟驛鹽道王鈞人頗謹厚辦理鹽務亦屬相宜但才具平庸未能肆應至府縣各官恭遇皇上至聖至明振綱飭紀撫臣李衞督率亦嚴循分供職者居多其中地有繁簡才有短長謹就臣一時聞見繕單先呈御覽其杭州府昌化縣知縣趙莘臣巡查至縣訪知該令諸務縱弛曠廢職守已經特疏奏明䝉皇上硃批實力為之臣跪誦之下益加凛切俟完半及全完之期當細心稽查力懲頑抗以除積弊其各府州縣命盜訟獄案件臣先令按察司開報查核仍於巡歴所至逐一稽查清理至保甲一法弭盜毋得借端苛派毋得粉飾具文如有仍前玩悞及奉行不善反致擾民者立即題㕘治罪再查杭嘉湖三府地方户口殷繁而倉榖積貯無多偶有雨暘愆期米價騰貴每致上煩艱難議令各州縣先於鄉紳大户内勸輸捐積其里民積粟俟秋榖登場後再為勸捐併禁抑勒指派務使舉行無弊目下麥巳成實將來可收五六七分不等亦足稍濟民食現在各州縣平糶賑濟無負皇上懷保深仁理合一併奏聞伏乞睿鑒謹奏覽浙江觀風整俗使臣王國棟謹奏為敬陳浙西營伍情形仰祈睿鑒事竊臣仰荷恩命簡閲營伍欽遵祇惕今歴巡浙西地方先行簡閲查杭州副將李燦臣閲該協兵丁時尚署理黄巖鎮印務湖州副將蘇明良巳奉旨陞授廣東碣石總兵嘉興副將顧𢎞亮臣視其人不過中材而辦事猶屬小心就三協營兵而論杭協差勝嘉協次之湖協乂次之其將備各官雖無出衆之材尚可供職各營弁目有材技平常不能稱職者移咨提督斥革除僻逺營汛因地方緊要未便調齊考驗外其存城之兵及經歴處所逐一簡閲凡老弱者飭令更替生疎者飭令訓習衣甲器械有未鮮明堅利者嚴飭整理至營伍大弊尤在虛兵冒餉臣簡閲時查副將以下千把以上俱有隨丁一項冊内止開花名無人㸃驗詢其情由據丁之外並無别情一切軍裝甲仗俱係捐備料理等語臣伏念我皇上愛養羣臣體恤備至文員俱有養亷之費武職贍養家口自䝉一體加恩未便冒昧㕘奏至所稱公費無出一切軍裝俱係捐備料理情由事關通省營伍俟臣巡查浙東各營汛再行確查作何仰籲聖恩之處據實奏請定奪又浙西之民辦賦資生首賴蠶絲春夏之交正在育蠶時候俗忌不宜演放火器臣仰體皇上軫念民生至意是以鎗礮等項未經驗試杭嘉湖地方緊要臣當不時巡查校閲如有怠玩縱弛及虛冒短剋等情將該營弁員一併題㕘究處抑臣更有請者浙江素稱澤國以舟為便汛防以資捍禦是否可行臣與提臣石雲倬妥議後㑹疏具題臣至愚極陋每見文武大臣於莅任之始事無大恩深重莫報涓埃惟有一事不敢茍一字不敢欺皇上日月之明自能洞照謹將閲過浙西營伍情形據實奏聞謹奏但莫忘今日此奏能不心隨境移何難企及千古名臣勉之浙江觀風整俗使臣王國棟謹奏為覆旨事竊臣於二月二十六日欽奉皇上恩旨以浙省上年被水米價騰貴窮民艱食特命撫臣李衛㑹同將軍臣鄂彌達臣王國棟先動帑銀四萬兩在杭嘉湖三府修城濬河築堤使窮民傭工食力此誠皇上如天愛民之心也臣分勘得杭州至海寧一帶河道水多淤泥應當開濬以便蓄水灌田海寧以下至黄灣地方一帶支河亦有應行開濬之處撫臣李衛分勘得湖州地界太湖堤閘日久傾圮應行修築將軍臣鄂彌達分勘得嘉興一帶石塘日久坍䧟應行整理臣等公同酌議各府河道疏濬之事因冬春雨雪太多水勢未退此時築壩開濬必致多費工力當俟九十月水落農畢之後再議疏濬目下採買物料先葺城垣杭州湖州嘉興府城以及石門德清長興安吉州嘉善平湖桐鄉等州縣城俱於三月内興工合計現在各處城工四萬金約可足用容臣等核實㑹萬年利益費帑利民在聖心固所不惜然臣謂天下之正供有數而國家之經費多端今以浙省三府而耗費多金國計所關理宜籌畫臣出巡到德清地方訪有捐納候選通判蔡應龍者係已故禮部尚書蔡升元之子也蔡升元生前居官貪鄙從未為國家出力告假回籍竟以壽終遺貲產於伊子蔡應龍等坐享富厚盤利剥民昨蔡應龍為葬伊父倚勢强買楊有祥等民房基地改造墳塋致楊有祥等憤怨控告撫臣李衛斷罰蔡應龍出銀五百兩修湖州府城至今並不遵斷交出雖伊父久任京官家貲不為巨富而彼所得者原係不義之物應儘其所有急公利衆以為身為大臣而不公忠者戒臣至愚極昧欲於撙節國用之中即寓維持風化之意伏祈皇上俯鑒若臣言可行當即繕疏皇上矜全歸里今現居海寧本地河道城垣或修或濬邦彦出貲効力亦屬分所宜然俟檄行該縣確估工費臣與撫臣李衛商酌料理一併附摺具奏伏乞聖鑒謹奏覽浙江觀風整俗使臣王國楝謹奏為敬陳浙東紹寧台三府情形仰祈睿鑒事竊臣於四月十五日由杭渡江巡查紹寧台一路地方紹興府屬㑹稽山隂蕭山上虞等縣風俗户所屬鄞縣慈谿奉化鎮海象山定海六縣形勢均關緊要民風士習雖稍樸實而山野之性恃强任性者頗多台州雖為樸陋屬縣亦多濵海惟太平一縣風俗稍醇其臨海寧海黄巖等縣士民舊多包糧健訟近亦畏法收歛獨有天台仙居二縣廢弛巳久錢糧詞訟事事急需整理臣謹另摺詳析奏聞紹興知府魏觀寧波知府孫詔台州知府楊滙俱到行伍料理營務亦屬諳練至於台協臣到浙時即相承其中老弱及技勇生疎者頗多及臣到台查閲器械衣甲巳經料理即各汛煙墩木柵亦復煥然可觀惟弓馬較他營尚未純熟查係副將吳進義到任後捐貲製備甲械革除老弱稍異從前近將備弁兵無不竦聽凜畏其黄巖象山等處因現值漁汛之期官兵出洋巡查臣與提臣㑹商海洋緊要若調集簡閲恐貽誤地方又值農務正忙士要緊地方兼閲修濬各工及各屬平糶之處再浙東地方紹興山㑹等處水可蓄洩旱澇不至大傷至寧台二府山田居多四月中旬巳經苦旱正在望雨臣巡查至郡時適大雨連朝山溪漲溢田疇太多撫臣李衛又率屬求晴適五月二十日後天氣朗霽連晴至今據目前情形浙東早稻成熟已七八分浙西數郡稻秧如雲兩浙東西仰賴皇上軫恤之仁豐年可卜并附摺奏聞謹奏據奏豐熟可卜朕懷亦未必即能慰悦待秋成後方可定耳浙江觀風整俗使臣王國棟謹奏為據實陳明仰祈睿鑒事竊臣抵浙半載周巡六郡在杭之日無幾今由台郡暫回省城因見巡撫臣李衛與藩司臣許容之中辦理諸務已竭心力藩司新任舉動稍輕似有露丰采持短長更張事務之意此所以漸至牴聖訓漸就和平臣恪遵聖慈巳俱洞悉再京省各衙門胥吏作姦屢奉價騰貴委官赴川買米到浙藩司書辦向買米各員需索使費及將此米平糶委經歴驛丞等賣銀役犯贓非同入已現在嚴行示禁並巡歴所至檄飭大小衙門幫役白役盡行裁汰且親提夘簿查核去留務遵經制毋許陽奉隂違明知若輩姦狡恩深重仰賴奏伏祈睿鑒謹奏覽浙江觀風整俗使臣王國棟謹奏為敬陳縣務需才事宜仰祈睿鑒事竊臣巡歴紹寧台所屬各縣查有台屬之天台縣地處山僻民多樸野歴任縣令不能整理前令梁懋敇尤事事廢弛經撫臣李衞與臣㑹疏糾㕘在案現在署縣之萬際清辦事平常天台諸務廢弛之後急需能員料理查該員原奉旨以知縣縣丞等官題用應遵旨另行酌補又仙居縣田地山蕩魚鱗號冊久廢無存是以包攬抗欠歴年錢糧清查不易自非將該縣田地履畝清丈則地方積弊必不能清而現署縣事之陶起潛託病乞休亦非清釐積弊之才通省調任又難其人或另委專員查丈庶幾其弊可除又紹屬之嵊縣與新昌接壤似非難治縣令張泌履任未久其操守頗潔但性情躁暴甚不協於民情臣查詰該縣錢糧完欠據生員周頤等公稟嵊縣户書毎錢糧一兩勒要私費三分張泌並無覺察臣現發該府查審以上各員臣與撫臣面商料理再查署仁和令袁皥臣昔見其為人誠謹據實舉奏䝉皇上恩旨補用仁和雖現在黽勉供職但省㑹甚屬繁劇仍宜量能調補使人地相宜庶得盡力報效又海寧令申程章臣在河南時因見其人頗有才識且約束生員不避嫌怨據實具奏䝉皇上飭令引見授以知州銜料理海寧縣事今聞該令莅任伊始上下未孚求治過急或該令辦事舛悞或地方姦徒有挾私造謗等情臣查確時再行具奏伏惟聖鑒謹奏覽所奏辦理數事均屬公當明白交付李衞可也浙江觀風整俗使臣王國棟謹奏為恭繳硃批叩謝天恩事五月二十五日臣家人恭捧皇上批回奏摺及聖恩賞賜午節各種錠藥到浙臣出郊跪迎望闕叩謝天恩開讀皇上硃批跪繹之下仰見我皇上至聖至明經緯萬端仁智運於一心緩急周於庶務深居九重而知臨四海史冊所紀實未嘗有是以帝德光昭存神過化浙省風俗人心如何丕變之處臣何敢言總仰頼皇上德化委曲開導詳晰明諭近日浙省人民稍知辦賦急公息爭減訟姦宄之徒潜踪斂跡此為尊親向化之一驗也臣一介庸愚學識淺薄䝉皇上不次擢用洊歴今職日夕兢兢常恐隕越惟有敬承天語一一欽遵奉行并手録聖諭供諸座右出入瞻仰朝夕服膺以為持循之要力雖不逮而心實有餘謹凛諸寤寐矢之終身而巳所有奉到硃批奏摺封繳並謝天恩謹奏覽奏謝已悉此任本欲令爾整飭數年以期成效但湖南地方緊要廢弛日久急需治理布蘭泰操守心術俱好但器量褊淺不能化導該省總不得人今不得已命爾廵撫其地其勉為之直省督撫中為朕所深信可託而不勞神照顧者惟鄂爾泰田文鏡二人而已近日觀爾之居心行事朕又慶得一好撫臣矣此志絲毫莫移勉之浙江觀風整俗使臣王國棟謹奏為恭謝天恩仰祈聖訓事竊臣一介庸才疊荷聖恩不次擢用抵浙以來雖恪遵諭㫖多方誥誡次第勸懲以期革􅆕洗心仰副天心仁愛而才識短淺日懼隕越有負任使乃䝉皇上簡授湖南廵撫臣驚聞行宫面領聖諭視爾才器儘可大用此畨諭㫖無論陞用何職任使何處俱已訓誨爾宜恪守欽遵臣聞命之下汗流浹背即跪奏臣材質凡下現今浙江任内深恐有辱君命此外重任臣才實不勝區區下情巳叨聖鑒今者過䝉恩命夙夜恐惶既不敢冒昧赴闕又不敢逗遛浙省謹遵㫖即赴湖南俟臣到任後查閲地方事務情形另䟽具聖訓庶微臣犬馬戀主私忱得以少慰楚南地方事務有所遵循再臣家本寒素並無親信家人臣胞弟王國安係候推守備因騎射尚欠嫺熟未經到部投供為人醇謹小心素知自愛且事務亦頗明白仰懇皇上聖恩准臣携帶湖南佐臣料理庶務約束家人俾臣得專力辦事或可稍免貽悞合併附摺奏明謹奏爾弟王國安准爾帶赴湖南相助料理家務但須嚴加約束毋令招揺生事如現在浙省一面帶往一面將奏請奉㫖情由咨明該部并本旗可也浙江觀風整俗使臣王國棟謹奏為奏明事臣奉命廵方抵任半載浙江十一府已歴杭嘉湖紹寧台六郡計四十餘縣業將地方情形先後條析奏聞其金衢嚴温處五郡所屬臣雖未身歴所有風俗吏治營伍一切事宜久經遍行檄飭兼隨處查訪聞民俗金華刁悍温州浮囂衢州稍覺質實但棚民頗多處州儉陋嚴州醇樸此五府風俗大槩然較之杭嘉湖等處厚薄相去甚逺現在錢糧詞訟俱稍異從前再臣周廵所至凡有已經提拏各案地方官尚未審結者舊例一經陞任槩行註銷今臣湖等處向有劣名今無過欵者就臣見聞開單交與許容再行訪核料理其金衢嚴溫處五府吏治因未經廵歴賢否尚難確知今臣赴任湖南道經其人稍有年紀然約束亦頗謹嚴金協現在缺員嚴衢兩協俟臣經過時查驗并奏臣才質凡庸莅任以來雖竭蹶趨事未有涓埃之補受恩深重慙汗悚惶謹將聞見情形據實奏明謹奏文武兩途在在需才總難得人今權事之輕重而命汝往撫湖南也勉之勉之浙江觀風整俗使臣王國棟謹奏為敬陳浙省財賦情形仰祈睿鑒事臣叨䝉聖恩在浙數月凡有聞見闗吏治民生者留心稽察浙省為財賦重地撫臣李衛極力飭查料理而在州縣則有捐墊流交之項在里户則有田糧不清之弊查一切正雜錢糧俱闗國帑豈容那移墊補然浙省州縣則實有萬不得已之情如兵米計口授食刻不可緩青黄不接之時民間無米可徵滿漢官兵嗷嗷待哺不得不為墊給又漕糧兌限孔廹民間尾欠催徵不齊勢需那墊以濟兌運其他應捐各項頭緒甚多承辦之員不得不動那墊用既經那墊未及補數遇有陞遷補復有交代亦即流交後任其提火耗一項亦有将民欠作抵者輾轉相沿無所底止至民間錢糧按畝起科全在地畝清晰逐戸照則徵收自無詭寄飛灑之弊如台州之仙居天台等縣舊有魚鱗號冊散失混淆民田難以稽核遂致强者有田無的名以致零星分戸不便催徵詭寄田畝無從䆒詰衿監胥役從而包攬侵欠為此撫臣李衛飭行順荘催糧之法臣亦通飭十一府查造花户的名冊籍如果行有成效則詭户之弊或可稍除而田在官錢糧久欲清釐因兵米漕糧各項事闗緊要聞又臣奉命之日適李衛往嘉所掣鹽於旬日内囘省臣與􅆕商料理未竟事件即行起程赴楚合併具奏伏惟聖鑒謹奏覽湖南廵撫臣王國棟謹奏為奏聞事竊臣蒙皇上天恩超擢湖南廵撫浙江任内之事業經屢摺陳奏所奉諭㫖事件逐一俱與撫臣李衛會商臣於七月初四日由杭起身路經嚴金衢三府凡各屬員接見之時皆一一宣布聖德闡發聖諭勸誡各該員仰體皇上愛民育物之心嚴飭紳衿士庶務期痛改積習急公輸税減訟息爭漸登返樸還醇之治看得嚴州府知府張方居官聲名頗好但其人稍有年紀署金華府知府杭州理事同知車栢前已單列奏明衢州府知府朱倫瀚臣前奉聖訓命臣察核賢否到浙時業將宣諭聖㫖之處附摺陳奏查朱倫瀚先經撫臣李衛委署寧波繼奉㫖補授衢州知府臣廵查寧波聞其署任時頗有官聲兹蒙成亦好及至南昌見督臣邁柱所言通省收成雖有不齊較上年大概俱好合併附摺奏聞謹奏覽湖南廵撫臣王國棟謹奏為奏明事竊臣於八月初十日到湖南任署撫臣布蘭泰即將錢糧倉榖欽部案件造冊交代并將硃批分别催科以清積欠一摺遵㫖示臣跪讀之下仰見睿慮周詳無微不燭欲使去任者任怨任勞新任者便無難處之事皇上整飭綱紀之意既重以周而體恤下情之􅄌又詳以摯臣等具有肝膈敢不黽勉辦公以求報稱臣愚又以為督撫大吏在去任者固不可沽譽市恩在新莅者身任封疆之重為通省吏治民生所賴俱嚴加誨諭因初莅任一時屬吏賢否未能周知容訪聞確實再行奏聞其藩庫錢糧臣照例盤查具奏至各屬常平倉穀據布蘭泰與各司道俱云並無虧空臣亦不敢盡信現在各州縣官吏見題湖南向有攤荒之弊與復則減則各案亦闗緊要署撫臣布蘭泰交代各案其中有數處頗難清楚者臣細閲案卷已面諭各該縣設法經理一一清額外分别抵補陞科又苗疆一事臣到任後即查閲案卷其保靖永順二司俱已新設同知管轄地方諒必寧輯近據乾州同知王柔詳稱鎮溪所十里版圖前朝原有崇山衛城設立總兵今六里為土苗所占歴年已久當此國威逺布之時不難仍歸版籍然臣新到湖南兼之事闗重大固不敢因循茍且以失事機亦不敢冒昧張皇以滋紛擾當與督臣褔敏熟商審處再行具奏臣謹繕摺奏聞謹奏鎭溪所之事愼重為之尺寸之地在内在外有何闗係但務民苗相安為上倘因六里地方滋生事端一切反難措置矣殊非急務聞王柔居官頗好確否已有㫖調伊來京引見湖南廵撫臣王國棟謹奏為欽奉上諭事湖南湘隂等十一州縣雍正五年夏被水災蒙皇上命署督臣福敏署撫臣布蘭泰查明賑恤已共沐浩蕩皇恩猶恐所發之銀或未敷用復命發帑金二萬兩交臣確查散給又恐地勢低窪堤岸未修易至泛溢設法興修防䕶奠安居民又恐一時米價稍貴姦民或有借端搶刦者即嚴拏審訊分别首從治罪此誠我皇上以愛民如子之實心行愛民如子之實政臣受事之後查前署督臣福敏署撫臣布蘭泰巳於司庫公項内動銀散給又復借用採買穀石委員賑濟臣仰體皇上軫恤民瘼之心與司道等公同詳酌若將奉發之銀儘數一時散給恐將來青黄不接之時難以接濟現在檄飭各該屬確查户口先將一萬兩即時給發將一萬兩亦即發交被水之州縣衛領囘趁此秋成於隣近豐收之處照依時價預行採買米湖南被水之處除湘隂等十一州縣衛外尚有長沙永定二縣衛係續報水災造冊詳請亦經布蘭泰核題在案雖未准到部覆似應一視同仁均匀分給以廣後會同料理再行奏聞又今嵗收成分數查湖南所屬地方除被災州縣衛外其餘九府州所屬據報中稻晚稻收成俱有七八九分不等米糧價値不過九錢一兩不等合併奏聞謹奏忻悦覽之湖南廵撫臣王國棟謹奏為奏明事竊臣蒙皇上擢用隆恩有逾常格臣初至湖南夙夜小心辦理庶務深恐才質庸下稍或隕越乃莅任二十餘日後忽寒熱交作時發時止至九月二十日稍覺痊可臣即附摺奏明又復半月寒熱始不復發目下調理已愈伏念皇上宵旰勤政訓廸百官雖一命下吏無不爭自濯磨羣䇿羣力臣具有肝膈安敢惜身圖安故雖在病中地方諸務仍勉力辦理但恐一時精力照管不到或有踈漏今幸託皇上福庇調養已愈謹繕摺奏明臣無任仰瞻悚恐之至謹奏如此公忠為國精勤為民古人云為善日强何病不痊耶前聞爾染疾朕未免繋念今覽奏大愈深為慰悦雖然凡百量力為之不可過用精神一切處但返之於心無愧斯已耳何必勉强從事爾其遵諭毋違浙江廵撫臣王國棟謹奏為奏明事臣前將至湖南時奏紹寧台三府官吏賢否蒙皇上硃批浙江一省朕每揀選上等人材發往湖南屬員未必能及浙省爾到任後加意敎導試用臣謹遵諭㫖每於屬員進見之時宣示皇上造就人材之至意諄切敎導近亦咸知勸勉然州縣屬員尚多優劣不等臣自不時察核查有玷官箴者先後糾㕘才識平庸者題改敎職至知府各員尚堪供職如原任長沙知府孫元原任衡州知府汪榯為承審長沙協副將李登雲串通斥革把總余成龍派索一案經前署督臣福敏題㕘降級調用照例摘印委署臣查此案前署司長沙府知府孫元先任衡州府知府歴練已久地方諸務熟悉原任衡州府知府汪榯先蒙皇上特簡長沙府知府辦事勤慎前署撫臣布蘭泰將兩人題請調用蒙皇上俞允俱在聖明洞鑒之中臣莅任後見孫元汪榯亦俱實心任事頗能稱職猶屬可用之員今以承審遲延詿誤殊皇上天恩臣謹繕摺具奏再湖南省米價近日每石一兩一錢上下不等長沙府城十一月十九日得雪積五六寸二十日復大雪又積七八寸嗣後瑞雪連朝皆由皇上愛民心切感召天和亦來嵗豐稔之兆也合併奏聞謹奏去冬之雪直省普遍霑足誠可謂天恩浩蕩也湖南廵撫臣王國棟謹奏為奏明事雍正五年七月十三日奉上諭興修堤岸一事臣謹按湖南長沙岳州常德三郡逼近湖庭湖邊計有堤之處如湘隂巴陵華容安鄉澧州武陵龍陽沅江益陽九州縣環繞大湖堤塍甚多縁洞庭一湖春夏水發則洪波無際秋冬水涸則萬頃平原濱湖居民遂築堤堵水而耕之但地勢卑下水患時有惟恃堤垸以為固葢同一堤塍而形勢與湖北逈異者湖北之堤禦江救田湖南之堤阻水為田湖北之隄或東西長數百里南北長數百里湖南之堤大者周圍百餘里小者二三里方圓不一星羅棋布名雖為堤其實皆垸而湖庭一湖三􅆕受水凡沅湘滇黔川粤之水千皇上念切民生知濱湖之處地勢低窪堤防不固設法興修務圖一勞永逸為小民謀其萬全浩蕩皇恩實亘古以來所未有也上年冬臣檄司轉飭長岳常三府將所屬州縣堤堘親查確估議詳并委岳常道督同確勘去後今據司道府詳各州縣囘稱去年稍被水災䝉皇恩動帑賑恤又免地丁錢糧各堤居民感戴皇仁一切堤塍俱各踴躍爭先願自出力加髙培厚等語詳覆但臣查各屬估勘冊内現有潰口四百三十餘處估計工銀七千四百九十餘兩工程緊要費用頗多若不急為籌算深恐民力不齊春水一實工務期增加髙厚工程堅固以副皇上視民如傷已饑已溺之至意所動工費銀兩現在會同督臣邁柱具題臣謹繪湖南長岳常三府屬堤塍圖并撮其大意為堤塍圖説裝成一冊恭呈御覽至湖南藩庫存貯耗羡銀兩於雍正五年十一月接准部咨凡非闗地方公務擅自動支者該司即據實報部題㕘臣即檄飭署藩臣李蘭遵㫖逐一查核從前各院司凡係應酬交情及已身用度者共計支過耗羡銀一萬一千一百一十二兩九奏再湖南地方一冬多雪入春以來雨水又復調匀聖德感孚休徵協應豐稔有兆目下米價照舊每石一兩一錢上下不等臣謹繕摺奏聞謹奏雨雪調匀深慰朕懐但能以公誠之心對越天地神明雨晹時若朕可力保爾等督撫節制封疆闗係實非淺鮮欽哉愼之湖南廵撫臣王國棟謹奏為恭謝天恩敬覆諭㫖事雍正六年正月初二日臣家人恭捧硃批奏摺及賞臣御書福字貂皮寧紬荷包風羊囘至長沙臣出郊跪迎至署望闕九叩祗受訖嗣於雍正六年二月初十日臣家人復恭捧遲延糾㕘摘印臣以遲延有因且見二員猶屬可用為國家愛惜人才起見奏請可否留任後經部議以逾限不過三日例止罰俸准到部咨已令其復任謹繕摺恭謝天恩敬覆諭㫖臣不勝感激屏營之至謹奏覽湖南廵撫臣王國棟謹奏為奏明堤工情形事竊湖南長沙岳州常德三府屬有堤之湘隂益陽巴陵華容澧州安鄉武陵龍陽沅江九州縣上年八月初十臣到任之日接准部咨内開欽奉上諭湖北湖南近江濱湖之地居民常被水患朕心甚為憫惻或有堤岸未修或有疏濬不力務須設法經理以安民居邁柱到任後會同湖北湖南廵撫悉心商酌將如何興修防䕶之處詳悉速議具奏欽此臣遵照委員逐堤查勘估計於十二月督臣邁柱到任後即移咨商妥於今年開印後興工𣲖員監督臣等各捐穀石幫給百姓已皆踴躍赴工願自出力加髙培厚復於雍正六年四月初九日接准督臣邁柱移咨三月初三日欽奉上諭朕念修築江堤䟽濬河道該地方既有嵗修之定例今百姓踴躍從事加髙修濬甚屬可嘉用沛特恩助其力作將帑銀賞賜六萬兩令邁柱於湖北湖南二省酌量工程多寡分派散給并飭地方有司實心料理使小民均沾實惠工程永遠堅固以副朕愛養楚民之至意欽此臣隨出示諭知堤工百姓感戴皇恩喜出望外益加奮力堅築歡呼萬嵗今據九州縣陸續詳報潰口俱已告竣其首次險工有告竣者有報八九分與六七分者其平易工功尤為緊要俟栽揷事畢便可齊力搶築竣工臣謹據實陳奏再查湖南通省近日米價上米每石一兩起至一兩一二錢不等中米九錢起至一兩一錢不等二麥收成有八九十分不等其有蠶豆菜子之處亦俱有十分收成自正月至四月雨水調勻秧苖遍插皆我奏明謹奏覽硃批諭㫖卷六十上欽定四庫全書硃批諭㫖卷六十中硃批王國棟奏摺湖南廵撫臣王國棟謹奏為州縣人才難得仰懇聖恩准予開復事竊湖南前撫臣王之樞派徵長沙等縣減則銀兩案内解任之龍陽知縣劉鐸安鄉知縣趙琳澧州知州黄炎又來楚質審之醴陵縣丁憂知縣袁振緒經前撫臣布蘭泰審明並非私自勒派題請開復部覆以各員所解徵收銀兩現在著落王之樞等名下嚴催完補况同案之張琳現於王之樞本案互揭革職質審均難遽准開復應俟王之樞等銀有無完報並互揭之案審結具題到日再議臣思州縣減則之案業已審結所解減則銀兩又已奉㫖著落王之樞等追補似與伊等無干至張楙互揭之案更與减則無渉臣見劉鐸趙琳黄炎袁振緒等俱諳練民事熟悉湖南風土經臣委勘茶陵攸縣􅌕縣安仁等處未經復則田畝頗能小心承辦清釐有法復委協辦湘隂華容安鄉堤工亦俱實心料理臣思州縣人才難得伊等尚屬可用可否准其開復留楚效用俟有緊要州縣缺出容臣各照原銜酌量題補給咨赴部引見此皆出自皇上天恩倘䝉俞允當即會同督臣邁柱具題謹奏如此方是賢員理應愛惜具疏題請開復可也湖南廵撫臣王國棟謹奏為請㫖事湖南復則田地一案臣查得辰州府屬沅陵辰谿黔陽三縣界接苗猺在萬山之中土壤磽瘠與别府州縣之平疇沃野迥異而沅陵一縣田畝六升三合起科地畝三升四合起科較之各州縣田地塘糧每畝不過一二三四升起科者實又偏重今據司詳辰州知府汪立名遍加履勘曉以皇上愛民之仁三縣民屯士庶踴躍趨赴自願陞科認復原則紛紛求請於雍正六年起徵輸納臣查各該縣復則田地例應於雍正三年復則起徵計應補三年陞科糧共銀一萬四千八十餘兩但三縣俱係瘠薄之區收穫無幾欲將三年陞科糧與當年之原額及新陞錢糧一併催徵恐敲朴徒加民力終難輸納查雍正五年五月十五日欽奉上諭各省向來之地畆隱匿未報者准官民自行出首將從前侵隠之罪悉從寛免其未納之錢糧亦不復追問定限一年令其首報統於雍正七年入額解徵等因欽遵在案今三縣既認復則所有雍正三四五等年陞科糧可否概行寛免准其雍正六年起徵出自皇上天恩為此繕摺請㫖批示以便繕疏具題謹奏自然應從雍正六年起徵即照此具疏題奏可也又所奏嚴定處分一摺現發部議候㫖遵行湖南廵撫臣王國棟謹奏為敬覆諭㫖事竊桑植保靖二司土衆感悦歸誠土司遵法繳印臣業經會同署督臣福敏題報在案其遵㫖調度事宜相應奏聞臣先檄飭新授副將楊凱會同同知鐵顯祖領兵進桑植駐防復酌用鎭筸鎮遊擊王進昌會同同知劉自唐領兵進保靖駐防臣隨出示宣揚聖德委曲曉諭去後土民叩頭感泣土司繳印并有喇布神旗各土人隨印出來叩頭投誠目下正商建置營署兵房添設弁員抽調卒伍一應善後之䇿并商安揷土司之處會同酌妥再行題奏又乾州同知王柔詳稱鎭溪所十里版圖六里為土苗所占一事臣欽奉皇上硃批跪讀之下仰見我皇上睿慮精詳包容廣大視四海猶一家地何分於内外臣謹遵聖訓撫綏苗民輯寧邊徼總在使之相安諸凡不敢冒昧但六里土苗及紅苗之事王柔言之鑿鑿渠為人雖覺粗率然熟諳苗疆辦事勤敏今因遵㫖迎請龍神已委王柔來京䖍請於王柔引見時皇上詢其情形悉知原委合併奏明謹奏欣悦覽之應須料理一勞永逸之事斷然不宜畏難但不可好大喜功濫及無辜湖廣廵撫臣王國棟謹奏為奏明事竊湖南永州府寧遠縣生員荆之寶家於雍正六年二月初一日夜被刦一案經臣嚴飭各汛弁兵協力會擒獲得賊黨年亞孫一名嚴訊供稱賊首廖老四等係廣東連州人闗文密拏前已奏明在案臣又訪知二月十八日永州鎮標左營遊擊楊京瑛同把總王俊侯進山追擒不識路徑反被賊捉放囘猖獗已極臣又陸續嚴飭文武官弁設法擒拏務期全獲兹於四月二十二日准永州等處總兵官楊國相移咨四月十六日據遊擊楊京瑛呈稱行刦荆家賊夥當即四路懸立賞格訪查嚴緝據江華縣民鳳成偉等禀稱深知此案賊犯來歴住居廣西賀縣等處地方情願報效前往緝拏等情隨挑選健兵十名令把總周永安帶領兼同鳳成偉等前赴賀縣密緝於四月初九日拏獲賊犯潘文德方應隆二名解送寧遠縣署縣蔣德重嚴訊二犯供出夥盗黎青竒等八人俱係賀縣人今仍委把總周永安帶兵與鳳成偉等協同縣差到廣西賀縣一帶地方照依縣審姓名年貌住址闗文廣西賀縣文武嚴拏各犯等情前來據此所有本標遊擊楊京瑛所拏賊犯姓名并闗拏各犯原由理合呈報等因到臣臣已飛飭署寧遠縣蔣德重俟夥賊緝獲到日審明速報外謹先繕摺奏明謹奏覽據孔毓珣奏聞於廣東地方亦擒獲數名矣此等匪類不法已極當盡法究處不可稍涉姑息湖南廵撫臣王國棟謹奏為覆㫖事竊四月二十一日臣標把總恭捧皇上硃批奏摺到長沙臣伏讀硃批謹遵諭㫖凡嚴查屬員懲治民俗之處當益加留心實力整飭仰副聖懐再辰沅靖道王柔迎請龍神於五月初二日到長沙臣已建設祠宇誠敬供奉皇上愛民重農建立先農壇行耕藉禮今復䖍造各省龍神像位為民祈福一誠所感通於神明目下湖南雨晹時若插蒔已畢四望田禾芃芃遍野從此國家嵗逢大有農民屢慶豐年龍神之福國佑民皆皇上之格天感召也近日湖南各府米價比去冬每石减去一錢上下不等合併奏聞謹奏禾稼秀而未實年嵗尚未可定何遽云從此嵗逢大有等語朕􅆟不喜此等虚誕無益之言豈我君臣以一誠對越神明祈天垂佑之心乎况朕屢降諭㫖甚明雨晹之應實闗汝等督撫之公私誠偽用得其人即朕之所以體天宣化若用非其人朕有何術以感召之耶湖廣米價從未聞如此之昂今不過稍為平減正我君臣夙夜修省憂勞思過之際乃出斯大言毫無敬慎之誠似此漫忽居心朕實不取汝等身任封疆一不存為臣不易之心必至於喪失身家而後已也看此光景初志已移大非田文鏡李衛之居心行事矣敬之慎之湖南廵撫臣王國棟謹奏為奏聞事竊查湖南廵撫標下左右兩營兵丁内向有空糧四十名係撫臣家丁充當前撫臣趙申喬止留二十名以二十名歸營募補歴任相沿至臣莅任後雖照舊開支其應領銀米仍貯該營以充火藥等公項之用但臣撫標兵丁均闗營制所有家丁名糧二十名未知前任撫臣曾經奏明與否兹准署提臣劉世明咨商永順保靖桑植三處地方需兵彈壓添設營制不敷兵丁議於通省各營抽調併臣標抽撥二十名臣現檄飭中軍遊擊等將家丁糧二十名内募補十名以足抽調之數其餘十名糧餉於左右兩營内各存五分以備火藥軍器等項之費理合據實奏聞謹奏此事布蘭泰亦經奏過汝酌量行之湖南廵撫臣王國棟謹奏為恭報湖南雨水情形及早稻收成分數仰祈睿鑒事竊惟楚南地方自本年春夏以來雨晹時若二麥豐收惟五月十八日以後至六月初旬據辰永等屬陸續具報得雨而長沙府城雨澤稍有愆期臣即於六月初六日率同合屬文武各官於敕建龍神廟䖍誠祈禱臣因查勘堤工於初九日自長沙起程初十日行至湘隂縣本日暨十一日連得甘雨續據布政司趙城飛報長沙府城同日得雨并據岳常等府呈報亦皆陸續得雨十八日臣查堤至常德府龍陽縣地方又得甘雨二十二日至除各屬得雨有無霑足之處容臣查確另報外謹先將六月分雨水情形及早稻收成分數據實奏聞謹奏覽湖南廵撫臣王國棟謹奏為奏聞事雍正六年二月十三日湖廣鎮筸總兵署九谿協副將印務周一德具詳二月十三日據下筒長官司向鼎晟呈稱竊照卑職下峝長官司創設始於唐宋相傳千有餘年屬九谿衛管轄輸納錢糧世受國恩謹守忠順今逢我皇上恩及苗疆澤流邊遠桑植保靖俱准改土歸流土衆得以安居樂業共享昇平隣近土司莫不欣欣向化是以永順亦請改流竊思桑植保靖原因獲罪改流至於永順土司實心向化之處所當效法今卑職擇善而從自願改流永為聖朝赤子以盡効順之誠但念卑職祖居邊徼世為土人實無原籍可歸伏懇轉詳題達改流并求憫念窮員向化之志仍守祖宗廬墓不令遷徙異土再查卑職彈丸邊鄙幅􅊷甚小烟户無多向因隣司兵擾逃亡殆盡現僅存一百一十一户仍請屬九谿衛就近管轄輸納錢糧等語又據副將楊凱同知鐵顯祖報同前由臣思下峝長官司向鼎晟世襲土職謹守忠順今自願效法永順改土歸流將所轄四至地界户口冊造齎前來願入九谿衛管轄輸納錢糧求勿遷徙臣見情詞懇摰出於至誠現在批行藩臬兩司妥議具詳會同督臣邁柱另䟽具題外謹先繕摺奏聞謹奏覽奏已悉但土官若盡令改流殊不勝其繁已命怡親王轉傳密諭令汝等詳細斟酌㫖到時爾與邁柱悉心籌畫奏聞朕閲䟽後再行批諭湖南廵撫臣王國棟謹奏為奏明倉穀事湖南各府屬常平倉積貯穀石臣於上年各屬减糶之後即飭買補并委員遞盤如果存糶穀石顆粒無虧即出具實貯印結詳報一或缺少該員隨盤隨揭臣即指名題㕘前已奏明但臣查長沙巴陵武陵等十三州縣衛於雍正五年夏被水災經前署撫臣布蘭泰先於司庫公項内動用散給又復借用各被水州縣衛存貯倉穀共二萬八千六百石委員賑濟此項榖石係布蘭泰仰體皇仁一時從權動用未經題明旋率司道府各捐銀買補還項每石議價三錢五分飭發買補上年湖南被水穀價騰貴不敢採買除益陽巴陵武陵沅江九谿永定具報買完外尚有長沙湘隂澧州安鄉龍陽華容岳州衛等州縣衛無力賠墊一時不能買足臣思此項係借用穀石非同别府州縣春夏减糶秋冬買補一有違限當即是題㕘之比今將各州縣衛未買穀石現檄飭作速購買如數貯倉毋許遲延致干㕘處但臣念前署撫臣布蘭泰發價之後正署迭更又遇嵗歉穀貴三錢五分原不敷買臣查有實係無力不能賠補者可否於司庫三分耗羡内酌給添補速買貯倉或寛期至秋成穀賤之時令其補足再有違誤立即題㕘此出自皇上天恩伏乞睿鑑批示施行謹奏寛至秋成買補為是湖廣穀石較之他省猶易於措置惟當以懲治刁悍習俗振刷屬員因循為要務也湖南廵撫臣王國棟謹奏為奏明事竊湖南桑植地方甫經改流皇上憐憫苗民向受土司殘害設立文武各官撫綏彈壓副將楊凱先由遊擊超擢辰州副將以其熟諳苖務特恩調補桑植岳州府額外同知鐵顯祖係减則案内罣誤知縣亦為其熟悉苖情破格擢用此二員者自當文武和衷恩撫土民輯寧苖地方不負皇上任使隆恩乃文武不睦動輙齟齬同知鐵顯祖科派擾民先據楊凱將伊劣蹟禀報臣亦宻訪得實隨會同督臣邁柱凱居官之處自必查核確實具奏再湖南軍政冊開造標下左右兩營遊撃等官履歴内有右營遊擊郭永祚年七十四嵗例應填註年老之員臣查郭永祚履歴於雍正二年引見時年已七十䝉皇上天恩念伊係曾效力之人由千總掣廣西守備特放湖南遊擊早在奏覽湖南廵撫臣王國棟謹奏為奏明事竊雍正六年七月初二日據永州永明縣署縣呉璠詳稱永明縣扶靈猺素産杉枋猺人逐年斫伐堆積山谿兩岸本年四月内溪水暴漲漂流而下有附近猺地之梘頭村居民以為無主之物任意撈取孰意猺人跟蹤尋至村民不還當即捉人復於五月内統衆肆横到村搶去耕牛大小二百餘􅃗隨經追出人口給還杉枋先委桃川市廵檢入猺追取牛􅃗猺人抗不服追卑職又親詣扶靈猺地方委曲勸諭令其出質猺人竟堅不退牛抗不赴質伏乞嚴批䆒治等語臣屢經飭行該府縣開誠曉示猺人秉公推鞫䆒擬招解去後續於八月二十七日復據永州府轉據新任永明縣知縣何鉝詳稱七月二十四日扶靈猺人復統衆捉去村民周正翟許仔搶去牛一隻割去禾豆等物八月初九日又統衆潛伏傷死在地摘棉花之毛端若在田割禾之毛舉仔等情永州鎮臣邊士偉亦同日咨同前由臣思此案猺人雖因撈木起釁但已經給還杉木縣令又復親詣面諭乃其兇惡至此或者其中别有隠情亦未可定臣現檄委永州知府親詣該地會同鎮臣先出示明白曉諭宣布皇上德威民猺均係朝廷赤子並無岐視化導民猺兩造出質以息爭端䆒擬傷人猺頭以為猺人肆横之戒倘仍負固不服自應臨以兵威臣與督提二臣另行商酌請㫖遵行謹將扶靈猺情形據實奏明伏乞睿鑒謹奏此等苗猺與禽獸何殊必至萬不可恕時相機舉行猶當愼重近日以來各省整理番苖㺜猺之事稍覺過多可緩者應徐徐圖之如王柔急公效力之心雖切恐或涉於孟浪諸凡必詳加審度可保萬全者一舉而加諸彼方克奏效若大費經營未能徹始徹終洞悉之事且靜以待之為是慎之毋忽湖南廵撫臣王國棟謹奏為奏明事竊惟保靖桑植永順三土司奉㫖先後改流其作何分建州縣一切善後事宜現在會同督臣熟商經理惟三土司地土頗廣輸納無多自宜通行查丈以清國課第從前田地類多土民瓜分耕種甘受土司苛派並不按􅅕陞科相沿已久安之若素化導改革似當以漸始為安妥前據原任桑植同知鐵顯祖現任辰沅靖道王柔先後詳請清丈經臣會商督臣及密詢該管文武皆以寛期為便除經密飭王聞再桑植永順地方前偶有時疫自交八月以後疫氣漸消人民現已平復又湖南各府早稻收成前已奏明兹查中晚二稻收成計六七八九分不等現在米價每石七八九錢不等合併奏聞謹奏知道了湖南廵撫臣王國棟謹奏為請㫖事竊查湖南各屬依山傍湖田地欺隠較之他省更難查察現在屬員中之實力開導者固有而愚民貪利始終欺隠者難保其必無若通行清丈茍不得其人不得其法反致滋擾臣身任封疆又不能親歴查察必得熟悉風土才具優長之員委令抽命廵撫湖南適該員告假囘籍暫令隨至楚中再往豫省數月以來該員諸事歴練勤慎無悞但係河工效力人員近奉皇上批示欽遵謹奏但將現在屬員鼓舞勸懲使人人皆知奮勉循分盡職此為根本良䇿若欲於他處旁求俊彦恐未必得遇出衆之才而徒寒闔省屬員之心羣指所用之人為私人所得不償所失矣湖南廵撫臣王國棟謹奏為覆㫖事雍正六年四月初三日接辰沅靖道王柔武昌封發密禀内云職道於二月十三日面奉上諭原任湖南辰州府知府遲煓貪贓不法歴辰州二十餘年欺隱闗税贏餘銀十萬餘兩罰伊修城效力伊乃不知愧悔感恩並不實心效力近訪此項欺隱税課銀兩係伊管事家人杜大杜二李大李二并管闗書辦張壽元張國寶等俱從中侵蝕其張壽元張國寶現在居住辰州著廵撫王國棟查追欽此臣立行按察使并飭辰州府知府密拏嚴訊去後兹據辰州府詳稱已將張壽元張國寶密拏到案一面將伊住宅家資點明封固交貯沅陵縣庫外卑府隨嚴加究訊張壽元張國寶堅供壽元國寶雖係遲煓點管木税不過算數掛號塡票其税銀有遲三公子同内史李大查收壽元國寶等在闗每木一排止得銀五分為衆人飯食紙筆之費此外毫無侵肥亦並無窩隱遲煓財産之處嚴詰不移除現封房産資物此外無有財産再飭沅陵縣詳查另報等語臣以張壽元張國寶既於遲煓任内經管闗税現在搜查家産無幾必有侵匿窩隠之處未便任其狡賴復專委辰沅靖道王柔提犯審追并密飭辰州常德二府遍加訪查毋致纎毫隠匿俟王柔審明覆到另疏具題為此繕摺謹奏此事爾不親行審究而欲推諉於王柔希朕信而不疑大謬矣朕不能信王柔如汝信張元懐之眞切也湖南廵撫臣王國棟謹奏為奏明驛站夫役事竊臣據驛鹽糧儲道楊馝詳稱湖南各州縣驛額設夫役二千八百名奉部行令裁減二百名又平清二衛共夫一百五十名歸併黔省管理通省共存額夫二千四百四十五名現今長養在站聽差但定例雖令長養查各州縣驛實係臨時雇覔葢差使之來原無一定一遇餉鞘等項大差來到需用夫役動輒二三百名額夫既不敷用差使又難遲悞若非平時酌省無項應付所以湖南各州縣驛之有夫役者按夫之多寡俱設立夫頭三四五名不等長養在站遇有差使用夫若干名夫頭即往四鄉臨時雇覔將平日不長養之夫價以補大差之不足但既不長養則應付日少空曠日多額領銀兩不無贏餘侵蝕若徑行請裁恐額夫過少未免貽悮本道職司郵務若隱而不言難免欺誑之罪今謬加酌議凡各州縣驛按季發給本道印冊一本凡有勘合火牌及定例當應付者將逐日應付過某項差使夫役若干給價若干一一填註冊内不使少有浮冒每季終合州縣齎送核查俟一年期滿通計應付夫役工食若干節省銀兩若干詳請題達庶錢糧可免侵蝕而驛務亦無廢弛等語到臣臣查驛站夫役屢經九卿會議差使紛紜之處聽其照舊設立其偏僻驛遞酌量議减然均難裁汰奉㫖依議欽遵在案今據楊馝詳稱驛站夫役俱係臨期雇募乃湖廣實在情形為節省經費起見臣思額設夫役既屬虚名而夫役工食國家錢糧所闗豈容虚冒臣謹據實奏明或照舊遵行或飭令該道試行一年看每年節省若干并有無誤公累民之處臣再行詳議具題伏祈睿鑒批示謹奏爾不能定之事請朕批示朕在數千里外從未身經目睹何以遽定其是否耶百凡總須秉公除私竭力辦理期當於理而已似此事事猶豫動輙請㫖將來脱有貽悞至不妥協時豈欲以曾經請㫖四字卸已之過乎於此觀之為一身利害之念重為國家效忠之志輕矣亟當改心易慮效法李衛田文鏡為要失之毫釐則差之千里審之戒之湖南廵撫臣王國棟謹奏為奏聞事湖南辰州府黔陽縣㕘革知縣武𢎞登揑報老婦絹綿米肉折價銀兩俱無領状一案有署黔陽縣事溆浦縣知縣呉大煒因不先行首出經臣附㕘接准部咨革職但呉大煒居官聲名頗好據司道府俱稱該員才守兼優實為辰屬苐一好官臣查溆浦係苖疆要缺呉大煒莅任四載並無重大案件則該員猶堪任使今以一𤯝革職殊屬可惜臣仰體皇上聖心為人才難得起見伏懇皇上將原任溆浦縣知縣吴大煒勅部行文令臣給咨赴部引見棄瑕録用自必感戴聖恩勤慎供職或可收一得之效皆出自皇上天恩又寶慶府新寧縣知縣張人崧為人誠實謹慎雖初任未經諳練而操守頗好甚得民心前因盗案革職離任之日百姓奔走號呼如失父母今䝉皇上天恩令臣出具考語送部引見倘䝉聖鑒如其人尚可録用請仍復補新寧則官民相安苖疆要地甚有裨益矣理合一併奏明伏惟聖鑒謹奏照所奏已諭部矣保留人員若出於秉公為國惜才誠屬美舉乃朕之所望於卿等者若涉於私交市恩不但於義不合且恐為異日之累似此薦舉之員必須更加一畨訪察少覺有不妥處切勿掩飾袒護如田文鏡李衛將所薦之人復行㕘核者不一而足汝當法之葢人原難保其始終不移也斷不可過於信人以自貽後悔須愼為之果能將好員一一奬勸保全其劣員不特貪婪不法之輩即庸平不及者亦皆一一㕘黜則郡縣俱慶得人矣郡縣得人汝等豈不稍省心力乎能若此天下何患不治兆民何患不安此一著認得真看得透必秉公持正毫不為一身是非毁譽計毅然而行之大臣方能之朕於是乎倚賴焉勉之湖南廵撫臣王國棟謹奏為請㫖事竊臣上年奉命自浙赴湖南任道經長沙所屬之湘潭縣見千艘雲集四方商賈輻輳數里市鎭堆積貨物􅅷遷有無居民櫛比而長沙係省會之區府城又逼臨湘江乃環顧江干無船停泊者葢因湘潭江形稍曲北風勢緩而長沙江面既寛北風勢緊又無小港可以灣入猝然風起濤湧一時難禦沉溺漂没者往往而有此官民船隻不能停泊而商船亦多往湘潭以舍湘潭無可棲泊處也即如江西之湖口闗先設湖口縣江水浩瀚商人上税停舟常遭風濤之險荷䝉願以雍正五年現存銀八千兩並雍正六年所餘銀八千兩歲底彚齊共一萬六千兩作為修築堤工之用再查長沙為省會之地長江浩瀚竟無灣泊舟楫之所北門外有舊河一道俟雍正七年分所餘八千兩解到之日可以開濬此河停泊船隻庶於地方民生不無小補其嗣後每年所餘八千兩俱存貯道庫以充公用擬合詳請俯賜核奪奏明臣見楊馝情詞懇摯以雍正五年分規為修堤之用而以雍正七年分規開濬河道與臣見適合今估計工銀約費一萬四千有奇但事闗為民興抵補伏乞皇上睿鑒批示施行謹奏覽湖南廵撫臣王國棟謹奏為恭謝天恩敬覆諭㫖事本年十月十九日臣家人齎囘硃批奏摺并䝉恩賜哈宻瓜一簍臣謹望闕叩頭謝恩祗領恭奉皇上批發各摺臣當逐一欽遵次第辦理伏讀原奏扶靈猺摺御批仰見我皇上天地之大無所不容日月之明無所不照臣敢不益加敬慎熟籌萬妥查扶靈猺捉人潛匿一案今據永州鎮臣邊士偉咨及知府姜邵湘文報已於九月二十日誘出兇猺蒋滔仔等十三人被捉之周正翟許仔二人久經放囘各猺既悔罪出審似當懲治兇首寛其餘黨以廣皇仁至開闢六里一事辰沅靖道王柔於五月間恭捧硃批奏摺令該督撫詳悉商酌而行臣業經􅆕商督臣邁柱現委鎭筸鎭臣周一德確勘如果開墾之後可以裨益國課綏靖苖疆萬全無患自當與督臣計議妥當奏請聖裁倘功效難必利害相半即當與督臣商酌停止另行會奏又臣所奏開挖引河一事擬動司庫公項今奉㫖辦理軍務需用甚多自當分别緩急次第辦理請於明嵗秋冬舉行合併奏明謹奏應辦理者亦不可畏難因循貽害養姦若好大喜功滋生事端又非所取也湖南廵撫臣王國棟謹奏為敬覆硃批諭㫖事臣於九月二十六日同督臣邁柱提臣劉世明會審永州鎮臣楊國相在岳州舟次臣家人恭捧奏摺到岳臣跪接開讀内臣奏驛站一摺奉有皇上硃批遵查此事經驛糧道楊馝通詳臣查閱前後情節似屬可行但雍正三年内奉九卿㑹議有盡將人夫裁去現行雇募恐有累民悮差之事等語臣未敢冒昧具題致干部駁是以摺奏今䝉皇上訓誨周詳且近准部咨又令各省督撫將現在驛站情形詳議臣已檄飭司道公同酌妥即行具題又䝉聖訓令臣效法田文鏡李衛二人欽此臣與田文鏡同事二載李衛同事亦將一年其居心行事臣所深悉又仰見皇上加恩二臣至優極渥臣䝉皇上髙厚委任之恩雖至愚極昧斷未有舍榮而就辱者但恐臣才庸識闇或有智力不及之處伏懇聖恩時加訓誨臣力雖不足而心實有餘惟有一刻不敢閒一事不敢懈一人不敢縱一字不敢欺殫竭血誠以供職守而已臣臨奏不勝悚息戰慄之至謹奏汝此任甚不及前二任或為智力所限或係改移心行抑或被屬員之所愚而然均不可知要當竭力加勉不欺不隱四字奉為指南湖南廵撫臣王國棟謹奏為敬覆硃批諭㫖事十一月二十四日臣標千總恭捧批囘奏摺至長沙臣隨跪接開讀臣所奏覆㫖一摺奉到皇上硃批臣䝉聖恩擢用莅任一載有餘縁封疆任重夙夜兢兢惟以仰體聖心察吏安民為務方且謹之又謹曷敢有改移心行之處但臣才識庸愚力量淺薄誠如聖明睿照至聖諭所云當竭力加勉不欺不隠四字奉為指南伏惟皇上聰明睿哲天縱如神無隠不周無微不燭固非臣下所得而欺而臣質本凡陋􅇜際聖明亦惟以拳拳之念區區之誠上事君父實無一事敢蹈欺隠者今䝉聖慈訓諭臣惟有益加謹凛敬録聖訓銘諸座右朝夕瞻仰如對天顔咫尺而已臣不勝戰慄恐懼之至謹奏廵撫一官原極繁難非勉能清慎勤三字便可謂勝任也用人雖不求備惟至督撫必須全才方不有所貽悞若無包羅通省之襟懐統馭羣僚之器量即為不稱厥職凡事當務大者遠者若只思就區區目前支吾以盡職任而已未有不顧此失彼跋前躓後者當努力勉一大字湖南廵撫臣王國棟謹奏為奏聞事竊照永州府寧逺縣失主荆之寶案内盗首七十七糾率匪類為害地方斷難輕縱臣欽遵諭㫖歴次移行嚴緝復大張曉諭凡能緝獲本犯者除已經懸賞外臣又另懸重賞分委幹員往粤協緝去後兹於十一月二十二日據永州府寧逺縣報稱本月十五日接江華縣錦田司廵檢毛峻德自廣東廣州府禀稱盗首七十七已於十月二十六日會同四會縣把總典史在廣寧地方拿獲令帶去識認之莫祥九認明的係七十七已解赴廣東督臣衙門查訊等因轉報到臣除經飛咨廣東督臣孔毓珣速將該犯嚴押來楚質訊是否確係盗首另行請㫖正法外所有據報已獲盗首緣由理合具摺奏聞謹奏聞各案業經捕獲之盗多致逃脱且有越獄而逸者是何理耶獲而復脱何如不捕似此徒貽笑於隣省耳湖南廵撫臣王國棟謹奏為敬覆訓㫖事本年十一月二十六日刑部左侍郎署吏部尚書事臣杭奕禄奉命至長沙臣謹跪請聖安杭奕禄隨口宣皇上訓㫖爾至湖南問王國棟伊在湖南一兩年如果時常宣揚德化曉諭愚民如何有此等百姓想河南必無此事令伊從此以後勉力改過自新留心地方事務不時曉諭愚䝉稽查匪類等因欽此臣跪聆之下悚慚無地伏念臣本愚賤謬任封疆楚南刁悍習俗久荷聖明洞鑒今乃有大逆不道之曾靜張熙出臣屬下臣莅任一載有餘既不能化導於先又不能覺察於後負職之罪百喙難辭乃䝉我皇上不加譴責格外優容復諭㫖部臣勉臣改過天恩如此之髙厚訓誨如此其諄切臣惟有時刻凛遵天語一念不敢懈弛一事不敢姑息殫心竭力化導整頓以期仰報殊恩於萬一耳除會訊逆賊供情及分咨各省提犯緣由另行公同陳奏外所有微臣恭領訓㫖私心感激下情理合具摺謹奏身為大吏凡事當務遠大二字若不急所當務往往捨大圖細而不知所貽悞者廣矣勉為之刑部左侍郎臣杭奕禄副都統臣海蘭湖南廵撫臣王國棟謹奏為恭報會訊逆賊供情并呈逆書底稿仰祈睿鑒事竊臣杭奕禄於十一月初三日奉命出京至二十六日抵長沙府城恭述我皇上天地之量堯舜之仁不以逆賊狂言少介聖意并命臣等平心靜氣窮究邪説所由來開導癡愚所未諭務使折服認罪臣海蘭臣王國棟恭聆之下仰頌聖德之淵涵益憤逆徒之妄誕臣等於長沙撫臣内署提出曾靜將聖天子孝敬慈惠恭儉文明與夫勵精圖治之實心愛養斯民之實政逐一開示宣揚該犯諦聽良久乃俯首認罪據云靜生居天末日坐井中造言誹謗罪大惡極痛哭流涕叩頭不已臣等見其醉醒夢覺然後將逆書所載逐條追究該犯茫無所指非云齊東之語即云臆度之私詰問再四毫無風影當給紙筆令該犯寫供謹將親筆供單進呈御覽臣杭奕禄又會同追究其同謀黨羽據該犯堅供當日遣張熙前去實係獨得之秘毅然而行既非他人所能參贊亦不屑與聞於人且自以為成固有利止亦無害故知幾録内諄囑張熙一路訪問如所聞與在家所傳不合即便囘來另作主意不可輕舉原非預有邀約謀定後行實無同黨有書可證等語臣等會訊續獲之寧遠縣敎諭劉之珩陳立安併書内查出之曹玨廖易即景叔等皆供不知投書情事即質之曾靜亦云伊等實不知情伏查逆賊曾靜即夏靚生於山野不明大義因考試五等遂喪心病狂借前人道學之皮毛以行其無父無君之邪説復敢誣謗聖主揑造逆書遣徒張熈即張倬又字敬卿帶同張勘即實安齎往陜西希圖誘惑大臣濟其大逆誠為罪惡滔天神人共憤臣等恪遵訓㫖平心細詢該犯自知誣妄不待刑加叩頭伏辜雖悔罪出於天良似類有苗之格而下民敢於罔上難逃大逆之誅宜置極刑以彰國法同謀之張熙知情之張勘張新華以及縁坐人等律有明條均難輕縱至於曾靜行止乖張久為鄉黨所不齒被其蠱惑信從者止有張熙等一二門人臣等細行查訪此外實無同夥黨羽其逆書所載譙中翼嚴􅆳臣沈在寛車鼎豐車鼎賁孫克用并書内查出毛儀施虹玉等據該犯堅稱皆係背地推崇並未謀面之人等語臣等查閲知新録知幾録内所載各條原無與衆人商謀字様似非全出狡飾再從前曾靜遣張熙往浙江訪求吕晚村書時曾見吕晚村第九子吕無盡得伊綱目凡例未發之藴或彼此有所商謀亦未可定臣等現在行提併要備忘録吕子文集及綱目凡例未發之藴以便查閲所有曾靜逆書底稿及祭祖文稿臣等謹公同封進仍望皇上即賜發囘容臣等細按追問以免遺漏除現在㑹咨陜西江南浙江三省督臣提拏逆賊張熙并逆書内一應有名人等到案質明另行分别律擬奏請外所有臣杭奕禄到長沙會訊緣由及逆賊曾靜供單并搜出曾靜大逆書三冊又所著小學開䝉一冊扇一柄對聯一紙劉之珩書二冊譙中翼詩稿一紙理合另匣一併奏呈伏祈睿鑒謹奏覽逆犯之供單更屬可笑人也另有諭㫖從部頒發遵諭將一起逆黨押解來京可也一路寛其束縛毋使驚懼江浙逆犯已解到部俟其到齊一同對質湖南廵撫臣王國棟謹奏為奏明事竊查湖南辰州府鹽木二項落地税銀向係知府監收每年額徵銀二千四百餘兩經前撫臣布蘭泰訪知所收加倍復據該府通判蔣燾禀稱約有羡銀六千餘兩行據該府知府汪立名詳稱止收過贏餘銀三千五百餘兩隨題請暫委蔣燾監收後因蔣燾不將伊署府任内收過贏餘銀一千二百兩據實報出復題請改委陞任乾州同知王柔監收以定税額臣查辰州府徵收鹽木二税向無部頒定則如鹽税一項每包徵銀一釐六毫而木税一項則計價輸納查汪立名詳稱伊任内悉照院司詳批定案如杉木圍圓六尺者作價銀四兩五錢每銀一兩收税三分其松木槩不收税而王柔當日題請改委監收之後另定科則將杉木圍圓六尺者作價銀五十八兩每兩收税三分松木又一例徵收據稱照現在採買解部木植定價徵收有減無增而較之從前已多數倍又値雍正五年夏秋水發木簰絡驛而下所以一年之内收過正額贏餘共銀九千三百餘兩然王柔亦不敢即以此為定額仍請再收一二年照河水大小以定該年税銀之多寡經臣題明准有部覆在案惟是該府木税祗因向無部頒定則是以各任徵收例不畫一税則懸殊難以遵守前布政司朱綱任内曾經具詳前撫臣布蘭泰咨請工部頒發則例續准部覆以辰州府鹽木税銀作何徵收該撫從前並未報明本部其應照何例徵收之處無憑定議等因咨覆在案臣思同一六尺圍圓木植而汪立名照從前詳案作價銀四兩五錢每兩收税三分王柔作價銀五十八兩亦每兩收税三分未知各省木税作何徵收自應酌定税則頒發徵收庶商民不致偏累而可永遠遵循除現將汪立名王柔各任内徵收木税欵項造冊咨部酌定則例頒發徵收外相應奏明伏祈皇上睿鑒謹奏據奏則汪立名之欺隱王柔之實心任事已歴歴可見矣今不待王柔徵收一二年後試準確數而遽請定則例該部自必仍以無憑定議為辭似此空文往來咨行朕實不解且若部中竟議定汝等必不能足之數頒行到彼則又當作何徵收耶殊屬昏謬之至湖南廵撫臣王國棟謹奏為奏明事竊查茶陵州知州王克修年力强幹辦事有才因賦性褊急用刑過嚴地方甚有怨聲但伊自雍正四年十月任事能將接徵康熙五十九年起以及雍正元二三四等年積欠錢糧全數催完本任經徵雍正五六兩年錢糧亦俱通完無欠實有可取使能悛改性情即為循吏臣查岳州府慈利縣知縣陳采先經臣奏請調補城步縣要缺已䝉俞允在案所遺員缺雖稍簡於城步亦屬苗疆例應揀補且該縣尚有歴年積欠錢糧正須清理今王克修催徵積欠已有成效請即以王克修調補慈利以知州管知縣事仍照原銜陞轉臣嚴加敎導使之恪慎供職倘該員調任後仍前任性重刑一有劣蹟臣即據實糾㕘除㑹同督臣邁柱另疏具題調補外合先奏明伏乞睿鑒謹奏王克修既如此催科有術因公任怨則嚴刑之論更當詳察今若調任慈利經徵積欠又不容其嚴厲則是縶其足而使之趨也如此刻待屬吏恐將來湖南無一實心任事之員矣此人不可仍留汝屬下候朕調來另用刑部左侍郎臣杭奕禄副都統臣海蘭湖南廵撫臣王國棟謹奏為請㫖事雍正六年十二月初八日臣等將會審逆賊曾靜親筆供單及逆書稿本業經會摺進呈御覽其逆賊張熙并供犯嚴􅆳臣車鼎豐等亦經飛咨陜西江南浙江督臣分提去後雍正六年十二月二十八日准陜西督臣岳鍾琪咨稱訊據張熙供毛儀係寶雞縣貢生前曾路過他家他巳故五六年了等語現在差查如毛儀果故即當移解張熙聽審合先咨覆等因本年正月初七日准浙江督臣李衛咨稱此案先奉密㫖隨將嚴􅆳臣沈在寛已故吕晚村之第九子吕毅中第四子吕黄中長孫吕懿厯密提到案嚴訊確供委官李國正等於十一月初六日管押起程解赴刑部投收訖其備忘録吕子文集并别項書籍俱經兩次固封具摺進呈并將吕留良家現存書目抄冊同送在案相應粘抄供單咨覆等因該臣等查核單内嚴􅆳臣等各供與前審曾靜口供相同其張熙赴陜上書之處雖據曾靜堅稱嚴􅆳臣等並不知情但必得對質嚴訊始可完結相應會摺奏請伏乞皇上敕部將嚴􅆳臣等押發來楚與曾靜張熙等三面質明另容臣等按供律擬請㫖定奪至供犯車鼎豐等據差役囘稱江南督臣范時繹已經遣員解來於正月二十外可到合併奏聞謹奏已有㫖令汝等押帶各犯來京矣湖廣總督臣邁柱湖南廵撫臣王國棟謹奏為欽奉上諭事竊臣等奉上諭各省官員養亷著各省督撫悉心商酌司道等官既有養亷何得仍收屬員陋規令督撫一一嚴查據實陳奏等因欽此隨檄布按兩司移行道府州縣一體欽遵如有私收餽送規禮據實詳報尚有未分給養亷之員一并議詳去後兹據布按二司詳稱准驛糧衡永岳常辰沅各道囘移并長靖等九府詳稱湖南司道府州縣各官自雍正元年將額徵錢糧耗羡分給養亷之後一切陋規革除殆盡實無餽送私收情弊今又䝉皇上令將通省耗羡計算均分又將雜税贏餘添入給與敢不凛遵功令益勵清操惟司道府首領及州縣佐雜等官尚未給有養亷等情前來臣等又細加體訪邇來司道府並不敢違例受賄而州縣亦不敢私行餽送實無陽奉隂違之事倘有營私壊法不肖之員臣等一經察實立即㕘劾至湖南雜職各官向無養亷但此等微員專供差遣俸薪無幾實不敷用臣等推廣皇仁行據布政司趙城將糧道楊馝報出每年充公鹽規銀八千兩除各府州縣敎職并驛丞等官從無差遣自有額俸用度無庸酌給外其餘司道府之首領各官及州縣佐貳吏目典史巡檢等官似應按照品級酌給養亷今議得分給雜職各官共銀四千九百兩尚餘銀三千一百兩查永保桑三司改土為流現已詳請具題設立州縣佐雜等官將來亦需養亷應預為酌派今議得新設各員共分給銀三千五百八十兩不敷銀四百八十兩應於另摺均派司道府州縣等官養亷餘銀内動支凑給除飭布政司自本年為始遵㫖一面辦理外相應會摺奏聞伏乞皇上睿鑒謹奏似此之奏朕不過一覽而已從不批諭是非當否也直省皆然總在爾等督撫自為酌行湖廣總督臣邁柱湖南廵撫臣王國棟謹奏為欽奉上諭事雍正六年十二月准户部咨開上諭又准兵部遞到和碩怡親王等字内開上諭為湖廣官員養亷等因各到臣欽此臣隨即轉行布政司欽遵並通飭查報曉諭去後該臣等查得湖南各官養亷經前督臣楊宗仁將通省地丁錢糧每兩收耗一錢内以三分解司公用七分給司道府養亷在案但額徵多寡懸殊其中不無偏枯兹荷聖明洞鑒令將通省耗羡計算均匀分給又將各府雜税項下報出贏餘銀兩添入給與聖恩優渥亘古未有今臣等查湖南通省額徵地丁錢糧加一耗羡共銀一十一萬七千九百五十二兩零内除三分公用銀三萬五千三百八十五兩仍應留貯司庫外實耗羡銀八萬二千五百六十六兩零又常辰二府報出帶徵商税贏餘銀七千五百兩又常寧武岡等十一州縣徵收雜税項下欽遵諭㫖報出贏餘并鹽規銀二千四十七兩零又巴陵等五縣實徵蘆課耗羡銀一百五兩零以上通共耗羡贏餘銀九萬二千二百二十三兩零應按照職官大小事務繁簡均給養亷酌派布政司銀九千兩按察司銀七千兩驛糧道銀四千兩衡永岳常辰沅三道各銀一千七百兩長沙府銀二千五百兩衡岳二府各銀一千九百兩永寶常辰四府各銀一千七百兩郴靖二州各銀一千三百兩長沙等八州縣事繁地衝各銀一千二百兩湘隂等十州縣係屬次繁各銀一千兩醴陵等十五州縣係少簡之缺各銀九百兩安化等二十九州縣係最簡之缺各銀六百兩以上司道府州縣共分給養亷銀九萬一千三百兩尚餘銀九百二十三兩零查湖廣廵察往來湖北湖南地方遼濶費用繁多除湖北另行議給養亷外兹湖南議給養亷銀四百兩即從前項餘銀内動支尚餘銀五百二十三兩零查永保桑三司業巳改土為流現今議設府縣雜職等官將來亦需養亷及司道府首領併州縣佐雜等官一并酌派另摺奏聞再湖南同知通判養亷臣等先經奏請在於鹽規銀内支給合併陳明伏乞睿鑒謹奏朕意仍同前諭汝等料理此事不可言已奏過三字亦不可言奉㫖二字但令通省屬員心服首肯將來不令接任者檢點則是矣若徒取快一時任意草率分泒目今聲名日後身家係焉公慎為之至於地方事務雖有繁簡之分而薪水之資未必有多寡之異似此大相懸殊或留為調繁調簡地步以便髙下其手之意朕因未悉地方情形不能無此一疑耳湖南總督臣邁柱湖南廵撫臣王國棟謹奏為奏明事據岳州營㕘將禀稱華容縣地方於本年三月十一日風雹驟至城内城外兵民草房吹倒數百間並未傷損人口其祠宇衙署塘房亦被刮損田園菜麥間有損壊大約横計四五里直抵湖北之石首縣交界五六十里等情又據華容縣詳報前來臣等隨行布政司飛飭該地方官將田園菜麥兵民草房以及祠宇等項傷損之處逐一確勘明白仰體皇仁酌動公項銀兩飭令分别賑恤修葺外理合據實奏明謹奏觀汝等封疆大吏之伎倆再加以曾靜輩之百姓地方上自應有此災異原不足為怪也硃批諭㫖巻六十中欽定四庫全書硃批諭㫖巻六十下硃批王國棟奏摺湖南巡撫臣王國棟謹奏為遵㫖丈勘復則田畝限内報竣仰祈睿鑒事竊查湖南長沙衡州辰州各府屬之攸縣安仁􅌕縣沅陵辰谿黔陽等六縣未經復則田畆經前署撫臣布蘭泰題請荒熟併丈臣於雍正五年八月内到任後接准部咨奉㫖交臣同布政使趙城悉心辦理揀選賢能諳練之員將六縣荒熟田畝限二年内一併丈勘報竣仰見皇上慎重田賦務期均平至意臣隨行司遴委能員分往各縣秉公實力詳細查丈去後旋據布政司趙城詳據原任安鄉知縣趙琳原勘官署黔陽知縣吳大煒前往沅陵辰谿黔陽三縣查勘隨據三縣士庶俱踴躍急公情願復則查明復則田地共應科徵銀五千九十九兩零請於雍正六年起徵造具冊結詳報經臣核題在案又據該司詳准原任衡永道徐聚倫咨稱帶同委員原任安鄉知縣趙琳調任江華知縣鄭鼎勲并署安仁知縣段一騤原任澧州知州黄炎并􅌕縣知縣劉朝佑分勘安仁􅌕縣田畝隨據二縣士民俱感悟自首安仁丈出復則田地應科徵銀共四千六百五十八兩零應科徵米共二百六十五石零􅌕縣勘明全復原則應科徵銀共二千四百四十五兩零又丈出溢額田地應科徵銀共一百八十六兩零均請於雍正七年陞科造具冊結詳報亦經臣核題在案又據該司詳據衡州知府陳沆詳稱帶同委員原任醴陵知縣袁振緒并現任攸縣知縣陳文言查勘該縣田畝隨據里民歡呼踴躍情願陞科丈出復則田地應科徵銀共三千四十九兩零應科徵米共一千七百三十八石零請於雍正七年起徵造具冊結詳報臣現在核確具題以上沅陵等六縣丈出復則田地通共應科徵銀一萬五千四百三十九兩零應科徵米二千四石零此皆仰頼聖恩寛大准予自首免罪小民俱感悟踴躍樂於輸將各委員亦能殫心清釐均於限内報竣理合具摺奏聞謹奏朕嘉悦覽焉似此實心任事之員當察列等差援㫖題請議叙以示鼓勵湖南巡撫臣王國棟謹奏為敬覆諭㫖事臣謹跪讀皇上硃批臣㑹奏酌派養㢘摺内諭㫖仰見聖訓至明至當勉臣辦理務要均平可使永逺遵守弗致日後更張臣雖至愚敢不矢公矢慎查南省各屬州縣向來所得耗羨多者或至一二千金少者或止二三百金原屬偏枯不均前荷聖明洞鑒令將通省耗羨計算均勻分給臣與督臣邁柱布政使趙城公同分别衝僻酌量繁簡總期多者不致糜費少者不致掣肘凡係事繁賦重之地方州縣各官幕友家丁必須多人一切費用自倍於簡僻地方則養㢘不得不量為加多然巳減於從前所給之數其餘稍繁稍簡最簡地方在州縣各官調度既易費用亦省因之酌盈劑虛均勻派給今計最簡州縣所派養㢘較諸最繁州縣其數誠如聖諭大相懸殊若比諸向来所得二三百金已加至倍實可撙節足用臣惟凜遵聖訓殫心料理不敢稍有草率以負皇上體恤臣工至意為此具摺奏覆謹奏前諭甚明朕實不深悉外任情形總期汝等秉公合宜料理妥協務使永逺可遵可守還朕一是字而巳湖南巡撫臣王國棟謹奏為苗疆務在得人懇留賢員以䇿後效事竊惟楚南一省州縣半屬苗疆必須熟諳㢘幹之員方可遴選補授而現今准改為流之永順保靖桑植各土司經督臣邁柱㑹同臣酌議分設四縣管轄料理題明在案此等地方乃係新附苗疆非曾經熟悉苗情土俗潔已勤公之員斷難勝任今查得湖南衡州府屬之臨武一邑地屬苗疆訪知原任知縣趙侗斆居官數載頗有聲名苗夷情形俱經諳曉實係廉介勤慎之員兹因該員失察前任知縣卜瑗冒銷老民老婦銀兩一案奉文革職又欽奉恩㫖著臣出具考語送部引見臣思地方緊要人材難得仰懇聖恩俟該員赴部引見後倘䝉聖鑒以該員尚可錄用仍請𤼵回楚省聽臣以新設之縣酌量補授該員亦必感激思奮益圖報稱庶要地收得人之效矣理合奏聞伏乞睿鑒批示遵行謹奏引見時候朕審觀其人而酌用之至於汝之鑒别殊難聽信也湖南巡撫臣王國棟謹奏為奏聞事竊臣接到怡親王及大學士等寄字有原任施州衛千總王倬因改衛為縣裁缺另補今王倬並未到部或仍留在楚亦未可定巡撫可即密行查訪倘王倬尚在楚省即密行解送來京以與曽靜有對質之事等語臣遵即差人確訪查拏一面密札督臣在武昌省城密緝去後兹准督臣邁柱在武昌城内拏獲該弁委員押解前来除經起具文批差巡檢毛峻徳將王倬一犯押解刑部查收外理合具摺奏聞謹奏此人緝獲可嘉曾靜所供一事辦理甚屬糊塗有㫖交怡親王大學士等轉發湖南巡撫臣王國棟謹奏為敬覆硃批諭㫖事竊臣家人恭捧批回奏摺到長沙臣隨跪接開讀内奏聞辰闗木税一摺並調補王克修一摺俱奉有皇上硃批臣遵查辰闗木税原無定則自王柔監收以来現在照買木價值定則徵收而商民狃於積習不無物議王柔於正月上省時力言今歳不願接管臣面諭方今聖明在上但當竭力辦理如以人言為疑現今藩司商酌具詳請將前後收税情形咨部王柔始言如果咨部永定章程則今歳情願接管是以臣據詳咨部併具摺奏明兹䝉訓㫖至聖至明無微不照臣知識愚昧實切慚惶至王克修莅任二載有餘能將積欠清完實為能吏但士民有以故入人罪控者有以多収火耗控者臣因其致怨有由又因其才有可用仰體皇上愛惜人材至意委曲保全嗣因慈利縣係苗彊要缺且有積欠一時不得其人臣與布政使趙城共商將該員題請調補并將地方怨咨之情上達天聽臣受恩深重總期事無欺隠據實陳奏今䝉天恩切加訓誨臣惟凛遵聖諭刻骨銘心以勉供職守而巳為此繕摺奏覆謹奏朕乏神仙技術豈能探微索隠不過據汝等所奏衡情酌理而巳諸凡如欲據實不欺即當盡情剖露一字不隱若不欲據實則仍循故套含糊支吾可也何乃半吞半吐令朕㑹意於章奏之外及至降㫖嗔責始將所餘一半情由陳奏從而巧為支飾是則朕之過舉實係汝等有以陷成之也據汝前奏王克修朕之批諭便與天下人公看公論朕實無過湖南巡撫臣王國棟謹奏為奏明事竊查原任辰沅靖道張楙前在長沙府及署岳州府任内分賠長沙等縣虧空並張聖弼等開欠各項共銀一萬三千二百餘兩穀二千石零先後准到部咨俱經飭行催追立限嚴比據張楙呈稱奉追銀穀自應遵限完補但楙先因分賠茶陵善化等州縣虧空以及王之樞許大定等開欠之項已將原籍産業盡行變賣完公業奉移咨本籍搜查家産盡絶出結在案今各案分賠開欠萬難補苴惟有從前各省官員借欠張楙銀兩及楙賣出田房可以找價銀兩并審明題定原任巡撫王之樞名下應追還抵項銀兩共計銀一萬七千一百二十七兩俱有借約印契及書札并審案可據並非假揑雖䝉分咨查追但隔省延挨亟請題追等情臣查張楙名下應完銀穀雖非本身虧空然分賠等項均闗國帑當即照原呈所開分咨直隸河南江西廣東湖北等省查追隨批司確查兹據布政司趙城查覆張楙欠項已據各該省咨覆欠銀人員俱已自具認呈等因原任巡撫王之樞亦巳自行招認其所開各項似非假􅑃但隔省咨查恐致遲誤臣先據實奏明一面另行具題請敕各該員人等任所原籍查追完補庶國帑不致乆懸謹奏其秉公實力辦理若互相推缷延捱亦㫁不能逃朕覺察也湖南巡撫臣王國棟謹奏為奏聞事臣因貴州現在勦撫生苗竊慮苗中暗通信息屢經密札鎮道整飭兵馬嚴加防範續據鎭筸鎮臣周一徳覆稱十二月十一日親歴各汛遊巡查所屬三岔坪兇苗吳老賞同伊子吳普六等及雀兒寨兇苗石老虎偷盜拏人黨串窩盜復因苗頭吳老四欠伊銀兩擅將乾州左營兵丁齊國俊捉白抵黒萬難寛縱現委該營守備陳友設法勦除等情又據鎮臣周一徳札稱雍正七年正月十二日守備陳友同鳳凰營通判白豐押同百戸吳貴三苗目吳老四等帶領兵役前往協緝詎吳老賞等藏匿雀兒寨石老虎家膽敢操戈拒捕戮傷苗目吳老四右手吳貴三等當將吳老賞吳老元石老虎三兇殺死又生擒吳普六吳老滿二名各寨頑苗見渠魁不保首領共生畏懼等情并據通判白豐稟同前由伏查兇苗拒捕誠為罪不可逭今見首惡就戮咸知警畏臣又密札本管文武宣布皇上徳威相機撫戢固不可喜功生事亦不可釀惡長姦務期剪惡安良以靖苗疆以宏聖化除在事百戸苗目人等經鎮臣分賞牛酒花紅銀牌外理合具摺奏聞謹奏如欲清釐楚省此等事件非邁柱王國棟輩督撫之所能諸凡當量巳之才力而為之不可因見有猷有為之人整理得法遂爾起心欣羨勉强效顰也湖南巡撫臣王國棟謹奏為奏明事竊查辰沅靖道王柔盤獲江西流民許英賢等經臣具摺奏聞並將湖南查無朱文先等藏匿南岳及王柔續獲許世基等各情由奏陳天聽兹准署江西撫臣張坦麟密咨内稱行據廣信府貴溪縣前往上清宫公同署真人張慶麟逐户挨查並無張易珍其人止有逺族張翼軫生平訓䝉餬口不與外人往来訊據鄰佑僉供並無為匪情弊又據南康府行據建昌縣確查江自得劉惟和劉冠祿並無其人江東榮江東號原往雲南行醫已於丙午年身故許世基許世朝俱徃湖廣行醫其許世堂許世胄許世龍盧士竒出外未回止拘獲生員李次文許英賢之父許有儀許世基之父許冠瑞代許世基帶回銀信之許英資代許世朝帶銀之許冠祿及收世朝寄銀之許世治又據南昌府奉新縣拘獲張子明并稱所開何黄道住三溪橋係建昌縣所轄今查亦無其人又據九江府行據徳化縣遍查並無朱文先名目經該撫臣張坦麟及司道公同嚴訊張翼軫李次文張子明許有儀等口供取具署真人張慶麟及各府縣送到印甘各結前来臣查閲江西撫臣来咨各供與許英賢在臣案下所供相符似非揑飾查許英賢假天師捨藥名色騙人財物自非善良但既巳查明並無謀為不軌情事似可無庸具題俟雲南督臣鄂爾泰查覆江自得虛實覆到之日臣即將現獲各犯咨解江西撫臣衙門飭𤼵各原籍地方安插收管其為首哄騙之許英賢仍聽撫臣張坦麟酌擬𤼵落完結所有准據江西撫臣查覆縁由合先具摺奏聞謹奏此一件小事何必如此屢屢煩瀆總之根本立心處祗為已私起見所以枝葉𤼵出一言一事非過則不及也湖南巡撫臣王國棟謹奏為奏聞事竊查湖南各府州自春至夏雨俱霑足惟常徳一府及岳州西屬雨尚未足後於五月初旬各處俱大霈甘霖插蒔之後禾苗暢茂五月内暨六月初旬雨澤均沾將来再沛甘霖則中晚二稻可望秋收今早稻秀實收成頗好俟各屬報齊分數再行奏聞又辰州協副將李國采稟報永順王村地方於五月二十五日未時有風雹一陣揭損民間草房臣現在行令地方官確查輕重應賑恤者即動公項賑恤理合一併附奏伏乞睿鑒謹奏覽俟秋收後方可言必也惟當加勉誠敬以待之湖南巡撫臣王國棟謹奏為欽奉諭㫖事本年五月二十日湖南觀風整俗使臣李徽至長沙口宣皇上諭㫖王國棟前任浙江觀風整俗使爾到湖南可諸事問伊即云是朕如此傳諭又爾與王國棟兩人辦理地方事務當一心一意如同一人等因欽此臣跪聆之下感激無地臣前奉命赴浙荷䝉皇上諄切指示俾臣得有所遵循又與督臣李衛共事同心協力罔敢隕越今臣謬膺封疆屢叨聖慈詳加訓誨柰因南省民風習成刁悍臣實才識短淺亦嘗加意曉諭而勸化未徧亦嘗竭力稽查而耳目未周仰賴聖明特簡李徽畀以觀風整俗重任並諭臣等一心辦理臣隨將浙江觀風任内所有臣自行辦理并與督臣公共辦理各事務及湖南地方情形與臣現在料理之處備細告知從此恪遵聖諭協力同心整齊化導務期人心和厚姦慝潛消以仰副聖天子化民成俗之至意為此繕摺謹奏朕用李徽取伊具有一片良心至於其才其能不必問者甚與此任相宜彼此互相協助為之湖南巡撫臣王國棟謹奏為敬覆硃批諭㫖事竊臣家人恭捧奏摺到長沙臣跪迎開讀内敬覆諭㫖一摺并奏明許英賢一摺俱奉有硃批伏念臣愚無知識荷䝉聖恩深厚委任封疆夙夜兢兢時憂舛誤王克修一事臣前摺所奏原未詳悉許英賢一事本屬小事訛傳臣又將江西撫臣張坦麟咨覆縁由復行陳奏此皆臣智識短淺辦理實未妥協兹䝉皇上髙厚之恩詳加訓飭臣跪捧硃批反覆尋繹無地自容悚惶既深感激尤切惟有小心惕厲殫慮竭誠以求無負聖訓而已臣無任戰慄惶恐之至謹奏但務本莫逐末如田文鏡等皆因根源清潔所以枝流邊無往而非是遂有得心應手之效若捨本求末譬如入海算沙何有窮盡耶湖南巡撫臣王國棟謹奏為奏聞事雍正七年六月初十日准兵部火票遞到和碩怡親王等寄字内開據逆賊曽静供稱記出有兩箇偶爾傳言的人一是安仁縣生員姓何名忠立曽説他聽聞有箇茶陵州人姓陳字帝錫傳説朝中有人上議皇上多條又永興縣十八都有箇醫生姓陳字象侯也説他在一處人家行醫聽得人説茶陵州有箇堪輿姓陳字帝錫口傳有箇本章諫議皇上那上本的臣子姓岳名鍾琪等語巡撫可密將安仁縣生員何忠立永興縣醫生陳象侯茶陵州堪輿陳帝錫行提到省細訊何忠立陳象侯伊等向曽靜如何説并問陳帝錫所傳之語本於何處伊等若承認直供則將伊供出之人一面奏聞一面提問如伊等不肯承認巡撫可委曲開導伊等猶不實供則用刑訊刑訊若仍不得實著將何忠立等解京與曽靜對質又曽靜供所傳收密親王妃嬪等語是雍正五年五六月内往来路上人傳説衡州路上押解一箇犯官過如此説等語巡撫可密行查訪五年五六月間何犯過衡查明一併具奏且將五六月間過衡人犯姓名密行知㑹廣西巡撫等因到臣隨分差標員密檄各州縣逐一查提先據永興縣獲解醫生陳象侯到臣取有該犯親供並供出武生何獻圖臣即密行拘提去後又據安仁縣獲解生員何立忠即忠立并獲解供出之何獻圖茶陵州獲解堪輿陳帝西即陳帝錫各到臣亦俱取有該犯等親供又據陳帝西供出何獻圖妹夫張繼堯據供若提到張繼堯情願與他對夾等語臣查逆賊曽靜在京所供陳象侯何立忠傳聞之言均出堪輿陳帝西之口及訊現犯何立忠及供出之何獻圖亦俱稱陳帝西告知是陳帝西實係傳言要犯經臣反覆開導詰其傳自何處得自何人據供實係張繼堯傳説臣恐狡飾仇誣當經刑訊該犯堅供必俟張繼堯到案對質著落除現在密提張繼堯并追取抄録孔明碑文到日質審明確再行具奏外所有訊取現犯供單先呈御覽至奉查雍正五年五六月内經過衡州官犯臣即密查是年五月二十二日兵部遞過人犯一名達色六月初四日兵部遞過人犯一名蔡登科臣又細查是年四月初七日兵部遞過人犯一名馬守柱七月初十日兵部遞過人犯二名耿桑格六格太監一名呉守義七月二十四日兵部遞過大監一名霍成俱係𤼵往廣西之犯臣當經密行知㑹廣西撫臣金鉷在案理合一併奏聞伏乞皇上睿鑒謹奏爾地方上頑民有此等惡習漫無覺察致令他處發覺特命部臣前来究審又不能將一類姦匪查出巡撫封疆之謂何從京指名數犯交爾審究葢恐姦徒聞風逺颺故令爾就近設法鞫訊以得其實情今閲所奏但將已經問出之供任其彼此推缷延捱時日究未知出自誰口亦可謂才徳兼全忠誠任事之巡撫矣此一干人犯自然須解京審問如再究出他犯亦自然在爾地方上但必將有名人犯一一交出方可湖南巡撫臣王國棟謹奏為欽奉訓㫖事雍正七年六月十七日准兵部火牌遞到内閣大學士等寄字一封内開雍正七年五月二十日皇上𤼵下硃批湖廣巡察御史王瓚奏摺二件奉㫖爾等可將王瓚奏摺及朕所批諭㫖抄録寄與王國棟看王瓚所奏皆湖廣地方之事朕以其不能體諒督撫之苦衷巳嚴切申飭但思督撫等如果實心辦理事事妥協亦不至被人指摘條奏可寄信與王國棟有則改之無則加勉欽此遵㫖謹將硃批奏摺抄録寄來等因到臣臣跪讀之下仰荷聖慈體諒復䝉聖訓誡勉臣雖至愚亦有天良嗣後惟有殫心竭力更期詳審以無負皇上有則改之無則加勉諄切期望之至意為此繕摺謹奏仍同前諭改勉與否則在汝自為之也湖南巡撫臣王國棟觀風整俗使臣李徽謹奏為奏聞事竊臣李徽在衡州地方據衡協副將崔起潛宻稟據把總王言禀稱梅田塘兵盤得浙江紹興府諸暨縣民周楠言涉曽靜逆案隨經臣李徽密傳親訊據供曽靜黨羽為首有信通知曽靜實係在省袁熾又稱門簿及往來書札可查等語臣李徽隨差員飛至長沙知㑹臣王國棟經臣王國棟查明袁熾係督催通省部務之人當即密檄長沙府拏獲收禁搜查該犯書籍字札封固貯庫臣李徽自衡回省即㑹同臣王國棟面委在城司道等取供去後今據㑹訊周楠供稱小的因往洪江生理遇見曽靜地方上共有八九箇人内有一箇呌楊天佩一個呌朱士元一個呌王友生其餘不知名姓據他們説袁熾與曽靜有書信往来都是他起頭的我們為這箇奴才往雲南去避避再小的於閏七月初三日從洪江来同一箇在綏寜縣作長隨姓張的一船往長沙他説曽靜可比方孝孺又説這箇事袁提塘膽大了些再雍正元年二月小的在家聽得杜海在孟伯籲藥店裏毁謗皇上有陳學松徐萬成周孟文連小的四個人聽得的那杜海是袁州衛守備袁信的家僕都是諸暨人等語訊據袁熾供稱並不認得曽靜若説傳遞音信是何音信在何處與他的若有往来的字跡經過多少大人審過其書籍現在貯庫豈有不查出的理若與袁熾往来不軌曽靜還有不説的麽今周楠説聽見人説的又供説的人往雲南去了這明是虛話毫無憑據等語隨經密提周楠供出之綏寜縣長隨張姓據伊妻何氏到案供稱伊夫張鳳本年三月往綏寜當長隨閏七月初回家住不幾天往廣東去了等語錄供詳解前來復經臣等公同㑹鞫供情無異隨將搜查袁熾家中現在札簿書籍當堂細檢並無與曽靜往來確實字跡除現在據供檄行永興縣確查該縣有無楊天佩朱士元王友生等曽否避往雲南并密行綏寜縣確查張鳯現在該縣充當長隨與否如已往廣東應再移咨查拘確訊外臣等備查周楠指首袁熾與逆賊往來雖係得之途人之口然事闗重大未便以曽靜從前未經供及現在未有確據致有縱漏敕下浙江督臣查拏確究合併附奏統候睿裁謹奏此所奏是地方上凡如此等事皆當留心察究不可臆㫁其無而或致疎忽縱漏也湖南巡撫臣王國棟謹奏為奏聞土苗聚衆撫諭解散地方寜謐事竊查湖南辰州府屬新設改流之永順地方原設同知一員專司撫綏彈壓前任郴州宜章縣知縣潘果係屬苗疆州縣在宜邑任事二載地方安靜臣隨題請補授永順同知該同知赴任時臣復再三訓飭永順土司初經向化地方事宜逐漸整理方不驚擾隨據該同知稟稱土司舊用舍把頭目不卞百數此輩向預民事凌制小民卑職始至大張條約禁革不許私擅行事務絶假借之端以免欺陵之累等情前来臣又當即批飭漸次料理毋得驟事更張去後詎兩月以来聞得永順土民於本年四月十六日擁衆百餘及田王二峝亦聚集多苗在永順南門城外聚衆噪嚷四路守塞聲言潘同知酷刑重耗差役下鄉苛索滋擾并捉拏衙役等情臣思新附苗疆非内地可比雖所稱劣蹟虛實未定而撫綏不善即難辭責似此不職㕔員斷難姑容臣一面將該同知㑹疏題㕘一面飛檄辰沅靖道王柔辰州府知府袁承寵持臣告示前往曉諭解散土衆委常徳府通判劉法祖署理同知事務又檄行布按二司將該同知摘取印信押回内地確查劣蹟實情嚴拏擾民蠧役及究處倡首土民確審定擬在案嗣㨿該道府禀稱田王二峝土衆已遵奉約束漸次散去永順舍把土民亦遵奉曉諭俱已解散具呈懇請銷案等情到臣復飭行該道府悉心安輯再加曉諭毋仍蹈前轍務期永逺寜謐至該同知所有劣蹟虛實并土民聚衆起釁情由巳檄行司道府詳加確查統候奉㫖飭審一併定擬另行題報臣謹將現在永順土民聚衆已經解散情形具摺奉聞又臣揀選未當惶懼實深業於疏内檢舉聽候部議合併奏明謹奏汝猶靦顔陳奏可謂無恥之極矣似此新闢苗疆要任所保題者乃潘果之流其他尋常之缺尚可問乎以汝此等督撫而令朕假以舉劾之責何從信任然亦無怪乎汝等朕簡用之督撫皆如王國棟等輩則督撫保題之員應皆如潘果等流也奈何奈何此皆朕乏識人之明源不清而望流之潔庸可得乎朕亦無顔降㫖責汝矣惟自愧而已夫復何論湖南巡撫臣王國棟謹奏為永順地方遼濶委員分駐以資彈壓事竊查湖南新改流土司地方惟永順一隅最為寛廣又田王二峝各苗更為頑梗現在駐永止有同知一員管轄實屬鞭長莫及臣向於江西寨相近永順地方委乾州同知沈元曽分駐管理今沈元曽奉差往京查有原任醴陵縣知縣袁振緒諳練苗情因攸縣丈量事竣回省臣即檄委協理辰州同知駐劄江西寨同永順同知分管在案但查該員原係減則案内解任之員經臣查係無干題請開復併請留楚補用部議准其開復應否留楚之處俟引見時欽定今因該員委勘攸縣田畝尚未給咨引見惟是永順地方係新闢苗疆非才裕守㢘熟諳風土之員不能勝任查袁振緒實屬㢘幹之員可於苗疆緊要缺内補用仰懇聖恩准其留楚彈壓地方併請於永順等處新設四縣内酌量將該員題補一缺俟料理地方諸務就緒後再行給咨引見庶要地得人而臣亦得收臂指之效矣為此具摺奏聞伏乞皇上睿鑒批示遵行謹奏或又如潘果之流亦未可定既據奏稱為地方人材起見姑照所請委曲懐疑而試用之已有㫖諭部矣湖南巡撫臣王國棟謹奏為奏聞事竊查湖南地方早稻收成分數據各屬具報通計七八分不等長衡永寳辰郴靖各府均稱雨水調龍神廟祈求并檄行該府縣䖍禱兾沛甘霖目下米價上米每石九錢七八分至一兩不等中米八錢七八分至九錢不等理合一併奏聞謹奏該省遇汝等一類督撫朕實不敢望雨暘時若也何則不能移易吏治民風惟憑一已榮辱之私腸而欲上格天心斷無是理幸獲收成一兩年亦屬上蒼赦過之仁耳且楚地為向来豐稔之省今直省連歳俱獲成熟惟湖南非旱即水如布蘭泰之巡撫在上曽靜之小民在下則頻年大水之應何莫非上蒼從輕降罸耶布蘭泰在湖南則被水患調江西則致旱災汝等督撫之上干咎徵如此至明且速而猶不知信懼亦可謂㝠頑無識者矣然朕亦豈能辭其責但若以雲貴河東浙江陜西等省而論則又不可概言過在朕躬也亟當思維根本之治誠求上天垂佑之道庶幾和氣下應地方獲福無窮矣再者聞按察使郭朝祚一味柔善因循沽買名譽朕許兩司俱得摺奏從未見伊將所聞所見據實上陳以盡臣子之心惟以茍且塞責迎奉上司為得計觀伊志趣似欲仍學伊父當日積年老練巧詐鑽營以為一生安享子孫受用光景殊不知大謬矣其命伊學趙𢎞恩作為若不肯悛改如醉醒夢覺洗滌肺腸恐一旦禍及身家將伊父從前欺詐負國婪贓不法處逐一發擿時莫謂朕不教而加之處分也諭伊深思朕拔擢之恩為伊父幹蠱之道今此訓諭之㫖並伊自身所立之志反覆揣量是非利害輕重大小而為之可也明白向伊傳㫖令其差人来京到大學士張廷玉處轉奏湖南巡撫臣王國棟謹奏為聖恩髙厚臣罪難辭仰懇陛見面聆聖訓事竊臣奏永順土衆解􅄆一摺䝉皇上硃批嚴飭切責臣跪讀之下恐懼戰慄無地自容身任封疆似此緊要地方誤薦潘果撫綏不善潘果有難辭之責即臣有莫逭之罪伏念臣愚無知陛辭之日俱蒙有忝職守以致上煩聖慮臣寢食居處刻不自安縁臣在外日乆弗獲親聆聖慈准賜陛見臣將楚南一切緊要案件次第趕辦於十月武闈竣事之後暫以印務交布政使趙城獲理臣兼程入都瞻仰聖顔將湖南吏治民風及各屬苗疆事理凡摺奏所不能盡悉之情形得一一面陳君父之前跪懇皇上詳明誨導庶臣知所遵循勉盡厥職得以稍報殊恩皆皇上造就裁成之徳也臣不勝戰慄惶恐之至謹奏所當訓諭者從未聞朕訓諭之人不知朕意所向之人及全未經歴學習之人汝於未任觀風整俗使以前受朕面訓何啻至再至三如鄂爾泰以江蘇布政使擢授總督来京陛見如此重任亦不過留京四五日面見數次田文鏡從祭嶽回京即命往山西察賑此後諸任再未面領朕訓李衛自雲南来時止留京三日此三人並非多聽朕諭深知朕之意向而能迎合之也豈有聞教而不能受受教而不能遵遵教而不能行之人令其曠官離職往返道途諄諄頻加訓諭之理此奏更屬可笑爾切勿存凡事見面一言即了之念若然則廷臣無一獲罪者矣何愚闇至於此極况朕已事事不辭千萬言批諭總不能領㑹不能奉行不能振作鼓舞不能察吏化民而忽思及陛見面請訓諭實不解汝具何肺腑朕意與其令汝前来受朕誨導反不如將汝隸於田文鏡李衛之屬下隨二人學習數年或可助汝心力之不及也湖南巡撫臣王國棟謹奏為奏明事竊查湖南地方長衡永寳辰郴靖七府州今歳雨水俱不欠缺秋成有望惟長沙府屬湘隂一縣北鄉地近岳州六月中旬後雨水稍缺岳州府屬之巴陵臨湘華容澧州石門安鄉岳州衛九谿衛永定衛常徳府屬之武陵桃源龍陽共十二州縣衛自六月初旬至七月中旬雨澤愆期禾多枯槁紛紛詳報臣現委員分往確勘除不成災州縣衛外果有實在成災者當先將被旱情形具題一面催造分數册結另報但恐今冬明春一時米買穀石分别輕重賑恤平糶動用之後即委員赴長衡所屬有收州縣採買穀石運至本處其散賑處所即以司庫三分耗銀照數買補其平糶處所即以平糶價銀照數買補一轉移間而於地方民生實有裨益再查現今十三州縣衛雖經報旱但岳常二府今春二麥大熟目下米價未長臣為將来民食起見預為籌畫謹具摺奏明以便臨期料理伏祈皇上睿鑒謹奏直省督撫中惟汝湖廣為次故今嵗天下豐收亦惟汝湖廣被旱天道之感應可見分毫不爽休咎之徵如此捷若影響而猶漠然不以為意朕實不解朕命田文鏡兼督山東則今歳東省收成人言自四十一年来為第一歳此豈可以虛詞揑造者乎況東省從来難遇豐收湖廣向来頻逄大有設若命汝巡撫山東則朕至於不敢言矣覽所奏有何可諭惟深嘉汝一轉移間之一句耳似汝移粟平糶等舉不過剜肉醫瘡即幸獲平復焦頭爛額之功亦何足取耶總不知務本於一切事率皆先失機宜復從而追維補救濟否尚在未悉又居然自以為得此等襟懷伎倆朕亦無如汝何矣刑部侍郎臣王國棟謹奏為奏聞事竊照東省賑濟一案臣於出京時跪請聖訓蒙皇上念切民瘼特命臣㑹同查賑大臣加意辦理務令災民均沾實惠并查實奏聞臣到濟南之日查賑侍郎臣劉於義牧可登已經回省隨細加面詢據稱所賑之處俱係實在被災地方貧民悉沾實惠確訪輿論亦俱符合現據各屬報到賑銀州縣衛所共七十六處計銀六萬九千七百餘兩賑穀州縣衛所共八十四處計穀一百二十餘萬石雖賑銀之數無多而􅄆穀已經普徧是以領賑貧民此時俱各相安但尚有出外聞賑而歸並無藉刁猾之輩以及髙阜居民見人領銀領穀因生覬覦紛紛向委員或地方官衙門求賑臣偶因公事出署亦有具呈求賑者臣已嚴飭各屬如確係被水災民聞賑而歸者查實酌量補給以廣皇仁其有本未被水挾官求賑之地方姦徒現在嚴拏究治禁遏刁風惟是被災州縣地方遼濶􅄆賑各官率多試用之員未諳賑務其中胥役鄉保串通生監舞弊重複冒領之處恐未全除有現經委員確查旋即刪減者臣復嚴飭布按兩司并五路監賑大員確實清釐仍一面密訪重懲如有玩視賑務之州縣立即指㕘不敢姑容現在各州縣地方安堵並無哀號賣鬻情形此皆我皇上蠲賑並施浩蕩天恩之所及也所有東省賑恤縁由理合繕摺奏聞謹奏盡心撫恤窮黎實力清釐諸弊刑部侍郎臣王國棟吏部侍郎臣劉於義謹奏為奏明事竊照直省地方凡遇有災傷必須先報情形後再勘實分數造冊題報此定例也今東省因撫臣岳濬奏明俟查賑後一并核報在案臣等到任後即檢查巻案傳詢布政使孫國璽據稱十月間曽詳報成災歴城等州縣衛所共八十七處經撫臣岳濬簽駁歴城等六十九處應准成災其淄川等十八處應分别被水輕重另行核報等因現轉行確查未經詳覆臣等日事嚴催於十一月二十四日據布政使詳稱淄川縣等十八處移行道府確查僉稱實係成災已經一體賑恤並無混冒取具切實印結應請一并入冊等情前來臣等初莅東省未能深悉從前被水情形既據司道府州等取具印結詳送隨㑹啇督臣田文鏡今督臣以先據司詳業查内有齊河諸城二縣應另行確查批司駁飭在案未便畫題并據布政使孫國璽申報督臣批駁情由前来伏思今督臣批飭與前撫臣簽駁皆以慎重災傷不憚詳審臣等何敢稍有草率除現飭布政司再加確勘另詳俟到日㑹商督臣核明定議題報外惟是報災定例甚嚴處分最重今公文往返需時歳内未能題達事闗重大現在另疏題明合再將情由據實奏聞謹奏所奏是理應查核確實詳慎為之者刑部侍郎臣王國棟吏部侍郎臣劉於義謹奏為奏明事竊照東省今歳漕糧䝉皇上浩蕩洪恩特頒諭㫖山東被水稍重著將被水州縣之漕糧全行蠲免業經撫臣岳濬欽遵出示曉諭通行在案但臣等伏查東省被水之初申報災傷處所頗多歴經撫臣岳濬飭查今督臣田文鏡現在批駁尚未覆查確實其實在成災之州縣除地丁應准蠲免外漕糧亦應全蠲若僅止被水猶未成災之州縣則地丁不在應蠲之列似漕糧未宜獨邀蠲免今臣等細加訪察秋間被水之時雖災傷勘有輕重而所被水患皆同幸賴皇上恩膏疊沛賑恤宏施斯民得以安堵現在時值寒冬若於目下催徵漕糧則小民困苦之餘亦覺輸納維艱兹當辦漕之際州縣紛紛具詳請示除一面仰體皇仁已面諭司道暫緩催徵外伏查被災分數現在飭司查實另詳歳内未能核定若俟題報之時再行附請尚需時日理合具摺奏明可否將被水未成災之州縣漕糧一體蠲免抑或緩至次年麥熟之後折色徵收皆係皇上格外鴻慈出自聖恩臣等未敢擅便伏祈皇上睿鑒批示遵行謹奏覽奏已悉候另有諭㫖署理蘇州巡撫印務臣王國棟謹奏為恭報秋成分數事竊查今歳江蘇等府屬地方夏月雨水調勻入秋以来天氣晴明目下早禾巳節次登塲晚稻亦漸及刈穫皆稱豐稔兹據蘇州布政使白鍾山冊報蘇州松江鎮江江寜四府屬收成俱有九分常州揚州二府屬八分淮安府屬七分太倉州屬七分通州屬八分等因前来臣覆核無異惟徐州及所屬四縣并徐州衛因七月間被水低窪田地蕎麥晚豆有傷其髙阜仍屬有秋現在委員勘查先據禀詳已將情形照例㑹同署督臣尹繼善具疏題報是否成災再行具題其海邳二州距蘇稍逺尚未據報到收成分數合并陳明至各屬米麥等價現在俱平即徐州地方據知州白潔稟稱雖低窪之地被水目今米價照常亦無昂貴理合恭摺奏報并另繕分數清冊敬呈御覽謹奏似汝巧詐不實之奏朕殊不敢信以為然署理蘇州巡撫印務臣王國棟謹奏為恭謝天恩事竊臣於本年十月初八日接准部咨奉上諭嚴切教訓仍令臣往浙江暫署巡撫印務等因欽此臣跪讀之下惶悚無地除另具疏命署理蘇州巡撫印務臣跪聆聖訓感激之誠􅒢心鏤骨惟刻刻以整飭吏治仰圖報效為念是以甫入江南境内隨留心訪問各官賢否即行奏聞乃不細加詳慎於叙列現任各官優劣内并將舊員皇上格外洪恩仍令臣往浙等侯俟督臣李衛起身之洪慈於萬一所有微臣感激天恩理合恭摺奏謝伏祈睿鑒謹奏覽署理浙江巡撫印務臣王國棟謹奏為恭請聖訓事竊臣荷䝉洪恩暫署浙江巡撫印務視事半月以来於從前辦妥事務不敢自逞臆見再有紛更其現在應行事宜亦不敢稍有觀望因循推諉致有貽誤但兩浙地方遼濶海疆重大逺處未能周知未便冒昧妄奏且臣智識短淺辦事無能屢䝉聖慈格外寛宥復奉諭㫖批飭教導敢不痛自刻責加意奮勉伏懇皇上天恩訓誨指示臣得欽奉遵循庶於地方事務不致舛錯感戴隆恩無既矣臣謹具摺恭奏伏祈皇上聖鑒訓示施行謹奏肯依李衛勸勉之言力行與否在汝自問耳朕有何可訓誨處署理浙江巡撫印務臣王國棟謹奏為彚報雨雪米穀情形事竊照浙省上年冬初雨水稍多後漸晴霽晚禾皆得刈穫十二月初九日降有瑞雪經臣等㑹同具摺奏報又於十二月十五十七暨本年正月初二初三初八等日俱得大雪據杭嘉等十一府屬各申報積地約有尺餘至八九寸不等立春之後旋即晴和日内又有小雨潤澤豆麥春花俱藉發生惟因上年交冬隂雨米穀價值有不甚平減之處將來或恐稍昂臣現㑹同署督臣李燦飭行布政司查明酌議量將倉穀平糶以廣民食至嘉興府屬七縣及杭屬之海寜一縣間被蟲傷䝉我皇上天恩將應完漕米減價折收民人踴躍歡呼且因折漕米穀留存民間更得流通接濟是以八邑米價現今亦無加増為此具摺奏聞伏乞聖鑒謹奏王國棟之奏何足為憑不過聊一過目耳署理浙江巡撫印務臣王國棟謹奏為恭報微臣勘過海塘情形仰祈睿鑒事竊照浙省海塘闗繫地方民生緊要時厪宸𠂻今臣於本年正月十六日乗未開印之前親往海寜及海鹽平湖等縣各海塘地方逐一親勘查自老鹽倉大石塘起至海寜縣城南門一帶從前係樁板塊石塘自雍正六七年至今間叚改修大小條石塘又自城南起至念里亭一帶從前係舊塊石塘今連年改修大條石塘俱保固無虞其自念里亭至尖山等處舊塊石塘歴有坍缷者均隨時搶修完固至海鹽三澗塞塘工最為險要經督臣李衛題修舊塘八十丈新塘四十丈又矮石塘一百丈現在各委員開工修築又鹽邑朱公亭寨等處附土石塘一千三百餘丈現照原題酌量頂次衝險加築石工平湖縣乍浦至獨山東舊石塘有數百丈亦節次拆修惟因辦石頗艱先經委員在於湖屬武康等處採石不敷今又飭於紹興府屬開採石宕隨得隨運以副緊工除分令工員趁此春和潮小趲修堅固并草土各塘草盤頭等工如有應修整者俱於歳修案内隨時確核整理以資防禦外合將微臣勘過海塘情形具摺奏聞伏乞皇上聖鑒謹奏海塘一應工務稍若懈怠遲悞及或妄立主見不循李衛章程辦理致有疎虞必將汝正法示衆斷不姑貸然海潮情形遷變不常權宜措置尤不可緩遇有應改移處當星速咨詢李衛而行毋得任意更張署理浙江總督臣李燦署理浙江巡撫臣王國棟謹奏為請留賢員以裨地方事竊查紹興府知府顧濟美於本年正月十九日在任報丁母憂業經照例具題并委紹興府同知潘銓署理在案今據署布政使張元懐按察使劉章糧儲道朱倫瀚寜紹道孫詔等㑹詳稱該府顧濟美年力富强辦事明敏自到任至今料理事件從無舛誤實係賢員請留在任守制等情前來臣等伏查紹興一府濵連山海為浙省繁劇之郡知府顧濟美勤慎練達民情相安上年臣等奉命赴浙於未經受事之前將應行事宜以及各屬賢否備詢督臣李衛曽經李衛言顧濟美居官勤慎於紹郡相宜今據司道等㑹詳請留在任守制縁臣等均係暫署印務未敢冒昧具題又不敢壅於上聞可否將顧濟美給假兩月令其回籍料理仍赴浙省准留在任守制則駕輕就熟於地方實有裨益矣謹繕摺具奏伏乞皇上睿鑒奏照該署督撫所請行署理浙江總督臣李燦署理浙江巡撫臣王國棟謹奏為奏明事竊照浙省因上年冬初雨水稍多晚禾收穫之後米穀價值不能甚賤幸屢得瑞雪春花漸見茂盛二月中連雨經旬不止直至二十五日始晴臣等委員分往四鄉查看并據各屬禀報僉稱於春花尚無妨礙但查米價未免稍昂臣等㑹商檄行布政使張元懐酌議平糶照督臣李衛向例於省城内外分設糶厰四所各委文武官二員量撥倉穀照時減價平糶至於通省各屬亦皆據詳平糶已飭令遵照每年存七糶三之例多設厰所分委佐雜各員量為減價出糶以廣民食其嘉興府屬七縣上年偶被蟲傷内平湖海鹽二縣較為稍甚目下雖俱遵照定例飭將倉穀平糶恐將来或有不敷臣等再加酌量變通陸續平糶如有細户小民無力插種者現在飭查量為資助工本之需務俾民食接濟不致缺乏臣等謹具摺奏明伏祈皇上睿鑒施行謹奏覽奏知道了王國棟署理撫篆安望浙省地方雨暘時若耶署理浙江巡撫印務臣王國棟謹奏為恭謝聖訓事雍正十年二月十八日接准督臣李衛寄信内開雍正十年二月十一日奉上諭杭州各官正月初一日拜牌時向例鋪氊三條署總督李燦因王國棟退縮在二班地上行禮李燦即手提氊子轉身親遞與王國棟接取朝賀有闗大典二人甚屬失體孫國璽在傍不敢入班且聞李燦署理總督印務以来諸事急遽無序舉動多有未協之處王國棟軟弱游移可寄信回去著實嚴加申飭欽此謹遵㫖寄信前來當凜遵聖訓改革前錯警惕勉勵嗣後諸事俱宜按照輕重緩急加意詳慎辦理毋致貽誤為要等因到臣臣跪讀諭㫖感激悚惶愧悔無地荷䝉天恩不加譴責僅命督臣李衛傳㫖申飭臣惟有敬凜遵奉益加警惕諸事詳慎辦理將錯誤之處痛自勉勵悛改以期仰副𢎞仁於萬一為此繕摺聖訓伏祈皇上睿鑒謹奏勉勵悛改與否朕實難憑信署理浙江總督臣李燦署理浙江巡撫臣王國棟謹奏為恭報海塘秋汛平穩及田禾情形仰祈睿鑒事竊查浙省海塘闗係地方民生最為重大而潮汛至秋更屬緊要本年七月十五六兩日適遇風潮猛烈工程在在險迫臣等親率工員實力防護已保平穏至八月十七八等日正值大汛潮頭較七月望汛更大臣等預飭在工各員多備料物人夫晝夜防守隨坍隨築又兼新築草塘日夕趲工將次告竣得資捍禦幸保無虞今九月初汛巳過霜降以後將屆立冬潮汛自可平緩合將秋汛情形繕摺奏聞再查浙省各屬田禾被蟲先經臣等具摺奏明茲據委員先後回省覆稱各屬業已淨盡消除惟諸暨景寜海鹽平湖等數縣内有低窪之田被傷稍重臣等已飭動備公銀兩酌量賑恤外再湖屬之安吉州因七月十五六兩日大雨山水驟發近山最低之田浸壤者約有一萬餘畝又烏程歸安二縣暨嘉屬之桐鄉縣各禀報於本月初九日有數鄉忽雨冰雹臣等查禾苗將屆成熟之時不無損傷即檄行布政司星飛委員確勘被傷處所酌量辦理其寜郡被颶風之定鎮慈象等縣近海田禾收成少減恐將来米價騰貴現在預為籌畫於産米之地買運接濟至此外各屬禾稻情形據各府縣申報中稻現在登場晚稻俱盛長結實時近刈穫天氣晴明秋成不致歉薄合併奏聞伏乞皇上睿鑒施行謹奏王國棟署撫篆似此等災異乃上天慈恩薄罰耳硃批諭㫖巻六十下
