body:
  text: 欽定四庫全書硃批諭旨巻二百七上硃批史貽直奏摺雍正七年正月二十日吏部左侍郎仍兼管户部侍郎事臣史貽直謹奏臣奉旨差往福建審理喬學尹及禪濟布等案又面奉諭旨命臣教導福建督臣髙其倬撫臣劉世明臣於上年十二月内到閩即㑹同督臣髙其倬内閣侍讀學士臣西柱一面先提集各案巻宗及案内官犯證佐撫臣劉世明於本年正月到任所有應查應審之事容臣等次第辦理分案具奏外臣遵奉諭旨於接見督臣髙其倬撫臣劉世明之時即詳加教導仰惟皇上洪慈覆載體恤臣下者無所不至聖哲天亶照臨臣下者無所不周凡屬臣工幸得遭逢聖主皆當竭盡忠誠力圖報效況督撫為皇上特簡之大員信任專而委畀重一切興利除弊整綱肅紀之事尤當不避嫌怨不憚勤勞不博長厚虛聲不踵因循陋習事事凜遵訓旨實力奉行庶幾民可以安吏可以察政可以舉教可以興貪墨者知懲豪强者斂跡盜風止息國賦阜盈文武協和兵民輯睦方無忝節制之重任方無負簡畀之殊恩今試問心自揣果能如此奉行盡善經理咸宜乎夫督撫者羣吏之表也政治者斯民所觀化也若大臣身任封疆不能使地方日有起色風俗日見淳熙其何以膺節鉞而無愧乎故必行之一年則有一年之成效行之數載又有數載之規模而悠忽從事茍且自安皆當深戒也雖才具或有短長智慮或有深淺而有志自勵者無不可學習而至試觀今日督撫中如鄂爾泰田文鏡李衞等俱重荷皇上之殊恩僃極人臣之榮遇而要其所以上合天心者皆由於事事悉能仰遵聖訓而又克盡其撫綏封疆之職其吏治民風實有可觀故能仰邀恩眷至於如此古人云彼丈夫也我丈夫也豈可同爲督撫不思效法而甘居此數人之後乎然所以致此者非僅行一文張一示遂可為遵行不怠也亦非舉一吏劾一官遂可為奉職無欺也即不然或奉皇上之諭旨勉行數事凛皇上之天威矯飾一時皆不可為臣心已殫臣力已盡也大凡人臣事君不但當以身事更當以心事此心唯知有君而不知有人此心唯知有君而并不知有己斯可以身任封疆之重葢心者身之主此心既肯許國自然公忠自矢至誠無欺不必有意迎合而辦理皇上平日之所以訓臣及臣平日之所以凜遵者轉相誥誡務使其咸喻濟柔和方為盡善撫臣劉世明雖係初任海疆而感激天恩志圖報效人亦明爽可以有為但歴事未久稍俟聖訓之下俱各感激歡忻共思益加勉勵仰報聖恩除督撫兩臣各另摺恭謝天恩外所有臣遵㫖敎導過督撫二臣緣由理合覆奏至於閩省大小員弁凡因公進見時臣俱留心察看於宣揚聖徳之餘復又勵以官方并詢其土俗民情叩其治行雖稍歉収然僅止福泉二府中之數州縣晚禾微欠雨澤早禾原屬豐収統計尚有五六分収成其餘俱各豐稔今蒙皇上大沛恩膏蠲免歴年民欠截留漕米接濟近奉恩㫖又将臺灣之未補倉粟二十五萬餘石槩行豁免聞謹奏遵㫖敎導之語朕嘉悦覽之聞此而不感奮振作者則誠為木石矣髙其倬亦有覆奏摺来閲其情詞十分肫誠懇切似有動心光景但恐熟處難忘於汝回京復命後又仍循前轍也臨行時可再諄諄勸勉之同日又奏臣於到閩後准户部咨開閩省雍正四年春秋二季册報實存庫銀六十一萬四千兩零經臣部按册奏撥該督撫屢請免解究無確數報部恐庫帑不無虚懸請将閩省庫貯錢糧一并交與侍郎史貽直徹底清查如有那移虧缺立即題㕘著追果無虧那即行據實奏報等因奉㫖依議欽此移咨到臣臣遵奉諭㫖隨即檄提布政司一切卷宗簿册詳細察核復又親至藩庫徹底清查今臣查得雍正四年春秋二季册報銀兩原係臣部撥令解京之項前署司陶範因該年兵餉緊急將季報實存銀兩那借二十五萬九百八十兩零墊給兵餉業經陞司沈廷正催完歸款理應将此六十一萬四千九百七兩零即行解部以清款項豈意陞司沈廷正與署司喬學尹復又遞相那用而原任廵撫毛文銓将前項歸款銀兩朦混造入雍正五年春秋季報實存銀兩項内竝不聲明某項即係雍正四年春秋二季原撥未解之銀迨後接任廵撫常賚亦不詳細確查遽行造入雍正六年春季册内經臣部據册動撥内有撥解雍正五六兩年京餉及酌留閩省動支并撥給雍正五六兩年兵餉等項共計銀二十三萬九千九百八十一兩零臣細閲節年案巻逐款詳查始知從前册内造報雍正五年春秋二季及六年春秋二季實存銀内即将雍正四年季報原撥未解歸款之銀混行牽入今查款項并動用銀數俱屬相符以上二十三萬九千九百八十一兩零應請准其免解除現存庫銀一十六萬三千六百九十六兩零外尚應存庫銀二十一萬一千二百二十八兩零俱經陞司沈廷正及原署司喬學尹任内預給雍正五六兩年兵餉那用無存臣查此項銀兩係應行解部之項即稱暫時那借亦應詳明題請方可動用今竝不具題又未報部擅行那用迄今三年之久尚未歸還原款所有擅行那移之前署司陶範陞司沈廷正接任署司喬學尹及朦混造册之原任廵撫毛文銓常賚不行確查之總督高其倬容臣於疏内照例題㕘其現存庫銀一十六萬三千六百九十六兩零現在檄飭具批解部至於未補銀二十一萬一千二百二十八兩零臣已檄飭現任藩司趙國麟在於雍正七年地丁項下勒限本年奏銷前解補完足如逾限不完著落從前那用之員及徇庇之各上司名下分賠再查藩庫現貯一切正雜錢糧臣於盤庫之時一并逐細查核俱各清楚竝無虧空合并聲明謹奏察覈料理甚屬妥協詳明之至具題到日有旨雍正七年二月初八日吏部左侍郎仍兼管户部侍郎事臣史貽直謹奏臣於雍正六年十一月初七日途次接到户部郎中安圖齎交和碩怡親王大學士公馬爾賽等字帖一封内開閩省修造戰船上諭一道臣抵閩省後即遵奉諭旨飭令督臣高其倬將閩省修造戰船因何遲延之緣由具奏請旨并嗣後修造戰船務須照依定限作速告竣且須堅固完好愼勿仍前怠玩因循等因移咨去後兹准督臣髙其倬咨覆前來據稱跪讀聖諭不勝赧惶查閩省修造戰船因近日本省桅木難覓并廣東之棪舵浙江之樟料皆買之隔省近亦少産覓購稍難且需時日又承修之員屢易其人遲延實由於此但戰船闗係緊要臣不能如期料理又不将遲延情由具奏罪實難逭仰蒙皇上特命欽差大臣嚴加申飭跪聆之下感激涕零嗣後凡有修造戰船必使如期竣工堅固完好不致遲緩倘再有誤臣一人願甘獨認重譴等因咨覆到臣准此謹將督臣髙其倬祗遵欽奉及臣遵旨申飭過緣由理合覆奏所有奉發提臣藍廷珍奏摺一件相應恭繳再審理喬學尹及禪濟布等案臣已一一㑹審完畢現在繕本具題約計二月下旬即可竣事起身除各另摺奏聞外合并聲明謹奏朕更有續交爾㑹同督撫察議之事二月内且毋起身北上侍郎臣史貽直總督臣髙其倬巡撫臣劉世明學士臣西柱謹奏臣等審得原任福建巡撫朱綱題㕘原任福建革職按察使喬學尹一案臣等檄行按察司查取喬學尹任内凡故縱開脱及辦理錯誤各案令一一查出詳報兹據現任福建按察使潘體豐造册呈送巻宗前来共計十二案臣等逐案查審将其中喬學尹扶同毛文銓之處及喬學尹於各案内或有意開脱或故為縱盜或減重為輕或增輕為重等情節一一究訊喬學尹惟有俯首認罪自愧不能秉公執法詳慎用刑深負聖恩悔莫能及再查喬學尹署内潘姓幕賓與外面勾通作弊一事訊據喬學尹供稱實無其人不敢隠諱再四窮詰矢口不移臣等查前撫朱綱疏内亦稱原係訪聞未有確據今現據福州府縣報稱逐户挨查竝無其人出具印結申送在案應請毋庸深究臣等查喬學尹任内各案除丁長枝一案審係喬學尹錯擬從重外其餘悉係喬學尹故出之案查律載官司故出人罪若囚未決放者減一等杖一百僉妻流三千里喬學尹應照律杖一百僉妻流三千里再查册開十二案内除彭瑞仁許萬崑吳勝龍陳仲能廖細妹丁長枝張向余由賽舉九案已奉旨結案外其吳徐張正吳祖三案尚未審結今臣等已㑹訊明確應仍歸入各本案内逐案另疏具題完結合并聲明謹奏喬學尹甚屬可惡題到之日另有諭㫖同日又奏竊原任巡臺御史禪濟布摺㕘臺灣縣革職知縣周鍾瑄并與原任巡臺御史景考祥互揭一案臣等逐一秉公察審俱各取有確供查周鍾瑄額徵正穀外違例加派耗銀六千七百五十兩除餽送銀兩舉放錢債輕罪不議外合依官吏非奉上司明文因公科斂所屬財物入已者計贓以枉法論八十兩絞律應擬絞監候禪濟布係蒙皇上特差巡臺御史不能潔已率屬収受屬員衙役餽送又給發本錢縱容書役張浩等於所部内典當財物違禁六分取利且諸事任性行止卑汚實屬有玷官箴應請敕部嚴加議處景考祥㕘劾禪濟布之處雖審明竝無挾怨情弊但身為御史奉命巡視臺灣乃袒庇年姪陳朝棨帶令冒籍亦屬不合相應一并交部嚴加議處知府范廷謀於搜查周鍾瑄貲財時雖審無徇私情弊但周鍾瑄係范廷謀本管屬員違例加徵耗穀竝不查察揭㕘實難辭咎應與從前徇庇不行揭報之各上司於題本内逐一查明列㕘至於案犯繁多其應行究擬之處及周鍾瑄禪濟布各名下應行入官銀錢物件統容臣等於題本内按律擬罪照追入官謹將審訊過各案大畧情由繕摺先行奏聞謹奏覽所審理究擬之處甚屬公當詳明具題到日有㫖雍正七年三月十二日吏部左侍郎仍兼户部侍郎事臣史貽直謹奏為奏明事雍正七年三月初十日臣行至江南常州府地方接到吏部咨文一角内開欽奉諭旨著臣㑹同髙其倬劉世明將福建知府以下知縣以上各員優劣詳加甄別造册具奏等因到臣臣於上年十二月二十六日抵閩所有奉命查審各案臣晝夜辦理業經逐案審明已於本年二月十三日事竣由閩起身回京復命今途次接准部咨䝉皇上命臣㑹同督撫二臣將福建知府以下知縣以上各員優劣詳加甄別造册具奏所有臣審過禪濟布揭㕘周鍾瑄一案喬學尹一案清查閩省庫貯錢糧一案俱各繕本分案具題又提臣藍廷珍摺奏監生陳華嶽侵占廟地一案另繕摺具奏俱一面交與臣部主事朱叔權先行齎領進京恭呈御覽臣一面仍由江南常州府星馳赴閩遵旨會同督臣撫臣甄別各員除俟核定優劣造册具奏外所有臣再行赴閩緣由理合奏聞謹奏朕未料爾辦理如是爽速也今既途次接奉諭旨復回閩省深愜朕懐雍正七年四月十二日吏部左侍郎仍兼管户部侍郎事臣史貽直謹奏臣於本年三月初十日行次江南常州府地方接准部文奉旨命臣會同福建督臣高其倬撫臣劉世明甄別閩省知府以下知縣以上各員優劣造册具奏臣遵即於常州府起身回閩四月初二日行至建寧府屬之葉坊驛接到兵部遞送内廷交出奏匣一箇蒙皇上批發原任南平縣革職知縣梅廷模奏摺一件臣於四月初七日抵福建省城即會同督撫臣嚴加查審俟審明後於臣回京時齎摺面奏至於甄别各員一事臣一入閩省即行文知府以下知縣以上各員令其赴省會同驗看詳加甄別今陸續到省者已多臣隨即會同驗看畢即令各員回署辦事勿令片刻稽遲致使遠離職守是以行之甚速約於五月初旬即可事竣起身進京復命謹將臣到閩緣由先行繕摺奏聞謹奏朕已降㫖命爾署理福建總督印務矣爾其勉力為之所交各事件應題者具疏應摺奏者具摺奏聞原任福建延平府南平縣革職知縣臣梅廷謨謹奏為奏聞事竊閩省倉庫虧空纍纍荷蒙皇上欽差大臣前往徹底清查據實㕘追原撫臣楊文乾以福州府候官縣印務委臣署理臣將前任已故知縣王夢賢之子王溥仁移交歴年盤册細加磨對見其種種牽混茫無頭緒其流水日報拆封紅簿皆那張脱頁印信參差臣悉照正收正支分年歸款縷晰查核所有虧空那移皆據實通詳揭報經司府審擬欽差會勘已據王溥仁直認不諱各年庫吏供招確鑿具題在案今王溥仁竟敢經年不補分釐儼同無事臣曾密訪王夢賢虧空之由錢糧皆伊子王溥仁收掌其素性嗜賭日與幕客曉夜呼盧揮金不惜迨父病故將巳徵在庫之銀及伊父所遺之貲刧藏萬金分寄於省城洋貨店永成號楊監生家又恐盤查敗露商同幕友王能之將歴年流水簿册那改錯亂捏造民欠册四百六十三本皆無印信可憑朦混造交臣身任盤查惟知凜遵諭旨徹底清查不敢徇情容隱乃王溥仁虧那案成已經一載突於雍正六年八月間聞知廣東撫臣楊文乾已故兼閩撫臣常賚布政司臣沈廷正各陞調去任忽搆狡詞混呈各衙門謂臣刻薄駕害是不過惡臣不為容隱而思傾陷以遂其報復之私但臣當日揭報皆據王溥仁交册查核如有不實當府司歴審欽差會勘王溥仁何難辯白究其心跡顯係以原日審擬各員今俱去任妄圖翻案得以享其藏積臣思錢糧絲毫皆關國帑一經發覺自應完補且胥役侵蝕盈萬其本犯不能完補者例於各任失察官名下追賠查王夢賢在任最久姦胥之弊最多其所侵蝕力不能清完者皆責於王溥仁名下是彼代父彌補之項不僅虧空一著倘不行嚴比查追竊恐貪徒志遂相率成風反噬計行效尤益衆是清查竟為無益錢糧終屬虛懸臣不敢避嫌懼怨冒懇皇上嚴飭查追庻侵虧不完之員皆知所儆惕矣謹據實奏聞朕觀梅廷謨人甚明白才具亦好諒伊所奏必皆真實不虚汝會同該督撫将此案嚴加察審莫令姦人得以漏網汝若起程離閩已逺則將朕批此摺轉交劉世明令其查究如雖經起程離閩尚近則仍回福州將此一事審理清楚然後再来覆旨雍正七年四月二十九日侍郎臣史貽直總督臣高其倬廵撫臣劉世明謹奏為遵旨察審事本年四月初二日臣貽直於建寧府屬之葉坊驛接到兵部遞送内廷交出奏匣一箇内原任福建南平縣革職知縣梅廷謨奏摺一件奉有硃批臣貽直到閩後即會同督臣髙其倬撫臣劉世明嚴加察審今臣等審查得據梅廷謨奏稱王溥仁將伊父已徵在庫之銀及伊父所遺之貲刧藏萬金分寄於省城洋貨店永成號楊監生家等語臣等即拘提王溥仁楊監生及幕客王能之到案嚴加審訊據監生楊璉供稱竝不曾替王溥仁寄頓銀兩據王溥仁供稱亦竝没有銀子寄放在楊監生家刑訊之下堅供不易臣等目擊情形事屬子虛但恐尚有遁情復又密行察訪知梅廷謨所奏實係風影之詞毫無實據即查梅廷模奏摺内亦稱事由訪聞原無確實其為妄奏更屬顯然臣等謹據實陳奏伏乞聖明慈鑒但事關奉旨查審所有王溥仁楊璉二犯臣等現發候官縣覊禁候旨定奪再查梅廷謨奏稱王溥仁於雍正六年八月間聞廣東撫臣楊文乾已故兼聞撫臣常賚藩司沈廷正各陞調去任忽搆狡詞混呈各衙門謂臣刻薄駕害思傾陷以遂報復之私等語臣等復又審訊王溥仁據供上年八月内在廵撫朱綱布政司趙國麟兩處衙門曾具呈辯白此外竝未再到別衙門控告等語但查此事經欽差楊文乾會同審訊業經具題從前王溥仁已供認不諱又何得復行控告明係冀圖翻案臣等詰訊之下王溥仁亦俯首無詞再查候官縣胥役蒲華等侵蝕各年錢糧共一萬三千六百一十二兩零現在各胥役名下勒限嚴追俟限滿無完另案具題請旨其幕友王能之審無捏造民欠册籍以及與王溥仁呼盧等事業已先行摘釋至於王夢賢任内所虧銀兩米穀俱著落伊子王溥仁名下家産追賠現在勒限嚴比如不能完補著落徇隱之各上司名下分賠應於原㕘虧空案内具題完結謹將審過情節據實奏聞臣等未敢擅便伏候敕旨所有奉發硃批梅廷謨奏摺一件理合恭繳謹奏覽奏已洞悉情節矣審理明晰甚為可嘉梅廷謨所奏既屬子虚豈可枉屈平人照所奏辦理可也雍正七年五月二十一日吏部左侍郎仍兼管户部侍郎事臣史貽直謹奏恭請皇上萬安朕躬甚安朕向不耐熱往年每至夏令輒覺不爽今歲都中炎暑為日甚久總無些微煩苦而且精神起居更覺增健此皆仰頼上天垂慈竝皇考神靈䕶佑所致特諭知之以釋汝之遠念同日又奏臣於本年四月初七日復抵閩省遵旨會同督撫二臣甄别福建知府以下知縣以上各員優劣并續奉到硃批原任福建南平縣革職知縣梅廷謨摺奏王溥仁寄頓貲財一案會同督撫嚴加察審於四月二十九日事竣由閩起身於五月十四日行次浙江杭州府地方接吏部咨文内開奉上諭福建總督髙其倬著進京陛見福建總督印務命臣署理欽此臣一面將臣會同督撫甄别過各員優劣題本一件及會同察審過王溥仁寄頓貲財一案另繕奏摺俱敬謹封固交臣家人恭齎入京進呈御覽臣一面從杭州府起身復回閩省伏念臣一介庸愚才識短淺頻年以来日侍禁廷荷䝉聖恩髙厚訓誨時加俾得稍有知識兹蒙皇上特恩命臣署理福建總督印務海疆要地責任非輕臣何人斯膺此重寄聞命之下悚惕靡寧惟有益加勉勵正己率屬竭盡丹誠以仰報聖主隆恩於萬一耳除臣任事日期容臣到閩後遵例具題并另疏恭謝天恩外所有臣復起身回閩緣由理合先行奏聞謹奏朕之用人行政汝所深知惟期毋辭勞瘁以副委任而巳此外無可更諭也勉之雍正七年閏七月二十四日署理福建總督印務吏部左侍郎臣史貽直謹奏為奏聞事竊查福建九府一州晚禾在在布插田水俱足惟閩縣候官福清惠安四縣雨水缺少今正在望雨甚亟之時據各縣報稱於閏七月初十十一十三十五十六等日俱得有透雨四野霑足現在田禾秀茂倍常其餘各府縣於數日内報稱得雨者亦多田禾俱各暢茂行見豐収可望再查通省米價省城及汀州府每石一兩一錢興化建寧二府每石九錢泉州府每石八錢一分漳州府每石一兩零五分延平府每石一兩一錢二分邵武府福寧州每石一兩一錢五分臺灣府每石九錢四分臣又訪聞向来省城内每遇鄉試之年各府士子雲集米價昻貴惟今歲米價照常甚平總因早稻豐収民間家給人足之故實屬昇平景象理合一并奏聞謹奏覽奏得雨及米價情形朕懐深慰汝今署理閩督若能堅持初志不稍遷移朕可保休徵堪致有感必應也同日又奏為奏聞事雍正七年閏七月十七日臣接臺灣廵察御史赫碩色夏之芳手札云今歲春夏臺地雨暘時若惟七月終旬望雨孔亟二十五六七等日甘雨大霈沾足及時惟二十六日夜大雨之中􅄓風兼作来自昬黑猝不及防商哨等船多吹送沙灘岸上溺沒者亦有積年頺敝之瓦厝草房亦有倒塌查各處田禾俱云早禾巳割晚禾纔經插蒔正在趁水栽種甘雨及時風過之後地方安靜人情帖然至房舍船隻仍飭文武衙門清查確報等語續據臺灣道府㕔縣報稱臺地於七月二十六日夜􅄓風大作雨勢甚暴海水漲溢數尺二十七日卯時稍息查田禾得雨甚為茂秀竝無損傷惟大小商哨船隻居民營房木城鹽倉亦有損壞漂失并淹死哨丁民人商漁水手等現在確查另報又據臺協水師副將禀報七月二十六日酉刻大雨􅄓風查有擊碎哨商船隻并吹倒民居營房衙署房屋潮水驟長數尺軍工厰中桅木板料漂失澳中交厰變價船擊碎三隻破壞五隻三營戰船亦有漂失槓椇或擊傷船水底俱堪修理現在修整以僃哨防惟定字十四號船被風擊碎淹死兵丁五名澄字八號十六號船防守鹿耳門被風擊碎淹死兵丁尚未查明容俟另報并據臺郡總兵澎湖水師副將各禀報到臣臣隨飛差臣標把總前往臺灣確查田禾民居船隻及淹沒兵民實數并加意安撫設法賑䘏俟查明到日另疏具題外所有臺灣得雨被風情節合先奏聞謹奏查明傷損加意撫恤之候朕另為斟酌更降諭旨同日又奏為敬陳慎選㕘遊都守之員以收得人之效事臣查福建一省自督撫將軍以及提鎮共統轄七十營計㕘將遊擊都司守僃等官共一百二十餘員凡有沿海地方缺出例應總督衙門揀選人員題補是為督臣者必須察知該員平日之操守若何政績若何孰宜於陸路孰宜於水師曉然於胸瞭如指掌然後一遇缺出即可擇其人地相宜之員題請補授庶於地方有益臣䝉皇上天恩畀署督篆以来凡近省武職各官每於因公進見時臣俱留心察驗其餘遠駐各營之㕘遊都守等官臣到任未久多有未經謀面者臣俱斟酌道里之遠近現在陸續輪流調驗惟臺灣一府遠隔重洋各營武職未便照内地之員輪流調驗臣細細留心察訪自可悉其優劣但全省之幅員甚廣臣一時之耳目難周若不體察明確一遇缺出即冒昧題補倘該員不宜於陞調之缺必致貽誤地方臣不揣愚昧懇求皇上天恩准臣自閏七月初六日接印之後此數月内遇有應臣題補缺出容臣咨商水陸提臣令提臣於營員内揀選合例之員咨送到臣臣復親加驗看如果人材壯健弓馬熟􅈺習知水性者臣即具題請旨俟臣将各員輪流調看完畢此後遇有缺出臣即可揀選熟悉之員題請補授如此不特臣心得以少安地方亦収得人之效矣臣為慎重海疆起見謹繕摺奏明仰祈睿鑒謹奏此奏是交部議覆有旨同日又奏為奏聞事本年閏七月十二日據閩海闗監督準泰呈稱為照營哨船隻向来每多包攬客貨侵蝕錢糧本闗聞此積弊於到任後即經恭録敕書通飭在案詎金字十六號哨船經由法石口不服查驗在臭塗地方阻撓廵哨隨即僃咨水師提督暨金門鎮查覆去後不謂該營目兵仍然於厦門洋船回港之時縱放小船搬運偷漏將海闗廵哨之船連人攔截回營横毆放走偷漏在前之四槳船故意鈎住在後之闗哨船此中情由大不可問該營雖將人船兩次送還稅館亦竟置之不問将来營兵遇哨行兇勢必畏縮不前無人廵查任其恣意横行包攬侵蝕國課何以充額等因咨呈到臣臣思營兵之設原以廵防汛口稽察姦宄似此包攬客貨侵蝕課銀種種積弊豈可不亟行禁革況闗差在閩勢力甚孤若非督撫大臣彼此協助未免諸事呼應不靈所以臣接見該闗咨呈即刻移咨水師提鎮并嚴飭該營將僃務必究明該營哨兵有無通同偷漏情弊以憑按法重處臣復又多發告示飭令張掛各汛口稅館地方嚴禁營兵不許包攬客貨臣仍不時稽查務今積弊盡除國課充裕臣謹繕摺奏聞謹奏可嘉之至大凡國家事體皆當不分彼此一秉至公方無忝封疆大臣之任也雍正七年八月初二日署理福建總督印務吏部左侍郎臣史貽直謹奏為敬陳酌通福興泉漳四府之積穀以免浥耗以實倉儲事臣自署理督篆以来無時不以倉儲民食為念因查福建全省地勢為東南最下之區内惟延建邵汀四府及福寧一州地處上游在省屬為畧髙之所若福興泉漳四府更居卑下每歲濕熱薰蒸倉穀易於霉壊從前原有存七糶三之例祇因福建濵海之地惟臺灣一府與延建邵汀四府福寧一州均係産米之鄉其福興二府産米不多泉漳二府産米更少是以福興泉漳四府及府屬各㕔縣將倉穀糶出甚易買補最難而定例内凡前任官折價存庫者又不許新任官接受交代典守各員畏懼因循不敢輕言糶易竊恐積貯年深倉穀必多紅朽若不及早設法圖維将来即将典守各員㕘處追賠究於倉儲無補臣謹詳細籌畫得一變通之法查福興泉漳四府之倉及府屬㕔縣各倉共額貯穀九十五萬五千五百餘石每年臺灣例應碾運米五萬石赴泉漳平糶又應碾運兵眷米一萬二千餘石又應碾運厦門提標金門鎮標兵米二萬一千餘石合計應運米八萬三千餘石若令臺灣停其碾米照一米二穀竟将穀十六萬六千餘石運至厦門令福興泉漳四府及府屬各㕔縣按其積穀之多寡派令分運各倉即將府㕔縣各倉内現貯舊穀照數碾米以為平糶及碾運兵眷厦門提標金門鎮標兵米之需似此出陳易新陸續轉換旋易旋補舊穀既免積久陳朽之虞倉儲亦無懸久不補之弊輪至六年之内即可盡易新穀存倉嗣後歲歲遵照更易誠為經久可行之計矣至於臺灣改米為穀運脚自當倍增福興泉漳四府及各㕔縣由厦門運穀入倉不無運脚等費臣又從長籌畫查福興泉漳四府及所屬之穀雖照時價酌減平糶臺灣之米價賤而内地之米價昻除解還臺灣米價外此中尚有盈餘即以此盈餘之價為加添脚價之需足敷各項之用合併聲明如䝉俞允容臣另疏具題伏乞睿鑒施行謹奏出陳易新轉移得法足見籌畫精詳應如是辦理者雍正七年八月二十七日署理福建總督印務吏部左侍郎臣史貽直謹奏為奏聞事竊照臺灣地方於七月二十六日因雨驟風狂擊碎商哨船隻淹溺兵丁吹壊瓦草兵民房屋臣據報即專差標員前往確查并飛檄臺灣鎮道文武各員将損壊船隻兵民等逐細查明具報隨經繕摺奏聞續據文武各員将七月二十六日被風情形逐一細查呈報前来又於八月十七日據澎湖副将報稱七月二十六日澎湖雖有風雨卑職兩營哨船俱各平安房屋無損今於閏七月二十三日東南風發三更忽轉􅄓風驟雨人力難施本營寧字四號十五號戰船二隻衝礁擊碎片板無存淹故兵丁十名沉失軍械等項兵民房屋商船多有損壊飄失查明另報并據臺灣鎮臣報同前由各等因到臣臣查臺澎先後被風兵民遭溺情殊堪憫且損壊房屋頗多誠恐沿海兵民一時無力起蓋不得不亟為籌畫安全臣仰體皇上愛養兵民至意即於恩賞臣養亷銀内捐銀一千兩遣員齎銀前往并飛檄臺澎文武各員將溺故兵民及商船户水手人等格外厚加賑䘏吹壊之民房分别有力無力之家逐户給銀修整務使各安寧宇至於吹倒之營房塘汛闗係更屬緊要尤須速行修葺臣查臺灣耗羡銀兩除酌派各官養亷外尚有存公銀六百餘兩原屬僃貯公用之項臣一面飛飭地方官動支會同營員先行勘估修葺如有不敷再行詳請撥給現在兵民俱各得所除報損戰船軍械等實在飄失若干容臣造具確冊另疏題請動項興修外所有據報臺澎兩次被風情節及臣捐銀賑䘏并動用公項飭修營房各緣由理合繕摺奏聞謹奏被災兵民亟應加意撫恤捐賑之銀為數似少如不敷散給可於準泰闗稅盈餘内動用一面奏聞可也雍正七年九月十九日署理福建總督印務吏部左侍郎臣史貽直福建廵撫臣劉世明謹奏為覆奏事本年九月十二日臣史貽直准兵部遞到欽奉恩賞奏匣一個内大學士公馬爾賽等字帖一封内開雍正七年八月十二日奉上諭聞得江南福建廣東及浙江杭嘉湖三府有匪類結黨潛謀為匪其為首者係江寧人各處用銀結納等語外間既有此言不得不一為留意爾等可密寄信與史貽直劉世明令其密密留心整飭營伍預為防範但不可驚惶聲張使屬員弁兵等知覺緣由倘致洩漏於事無益徒滋驚擾若江浙有文知會時或有查拏同黨之人即便作速嚴密緝拏勿令一人兔脫欽此遵㫖寄信前来總督廵撫可遵照密行辦理可也等因到臣臣隨即密交與撫臣劉世明公同閲看臣等欽遵諭㫖俱各密密留心嚴飭将弁整頓營伍操練兵丁預為防範竝不聲張亦不令屬員弁兵等知覺查今歲閩省各府雨水勻足秋收在即到處大有興歌現在紳士兵民俱各懽欣鼓舞共樂昇平然臣等受恩深重斷不敢因年歲豐稔地方寧静遂萌怠忽之心一切海疆事務臣等俱各密密盡心辦理倍加防範以期仰副聖懐如江浙有文移知會查拏匪類同黨之人自當密速緝拏不令脫所有臣等奉到諭㫖緣由理合繕摺奏聞謹奏據奏密加防範甚好事係風聞似屬子虛但汝等封疆大臣於此種匪類當時刻以察訪剗除為務毋避多事之嫌俾致養姦遺患此軰之害較盜賊為甚而蹤跡又詭祕無憑察訪尤難非公忠自矢實心任事之賢大臣率多膜外視之不但不能行及竝亦念不及此也所以吕留良曾静軰肆行無忌至數十年之久竟無一人察究不以為戒可乎同日又奏為遵㫖酌議事本年九月初七日臣劉世明差員齎摺回閩欽奉到具奏雅片煙一摺蒙硃批李治國於此一事雖欠明察然乃過於從事之咎情理尚在可原不就此案㕘處甚是若果才具平常不勝要任則當與史貽直商酌或調任事簡之缺或題請以部曹補用可也欽此欽遵臣劉世明敬錄諭㫖移送到臣史貽直公同商酌臣等查得漳州一府民刁俗悍地方遼濶為閩省内地中最要之郡知府一官非精明強幹之員不足以資彈壓現任漳州府知府李治國居官尚屬醇謹而才非肆應實難勝此要任查有奉㫖補授延平府知府之郭朝鼎才具優長辦事明敏洵稱幹員延平一府事簡民淳較之漳州一府實為易治之區若將郭朝鼎調補漳州府知府則繁劇之地益足以展其所長即以李治國調補延平府知府該員老成謹飭處此事簡之府尚堪表率屬員倘䝉聖恩俞允准其調補則兩郡均收得人之效矣再查李治國係調簡之員例應給咨送部引見俟郭朝鼎到漳州府任後與李治國交代清楚給咨送部引見合併聲明臣等謹遵㫖酌議合詞繕摺具奏伏乞皇上睿鑒批示遵行謹奏照所請行李治國不必送部引見該部知道署理福建總督印務吏部左侍郎臣史貽直謹奏為請㫖事竊照閩省山海交錯分設水陸營制水師有戰船出洋廵哨之責非熟諳水務人員不克勝任是以副㕘遊守以及千把大半係閩省人員若陸路既非水師可比副叅遊守等官必擇人材弓馬均有可觀能整飭營務又非本省籍貫者方與地方營伍兩有禆益我皇上明竝日月洞悉情形是以簡用陸路之副㕘遊守現在各員多係别省籍貫之人但内中惟守僃一缺較副㕘遊守各缺為獨多每遇缺出例應於千總内揀選别省籍貫之員題補臣查千總等官多係閩省本籍之人是以每遇守僃缺出往往乏員補用臣署理督篆以来出有守僃數缺業将奉㫖命往以守僃補用人員内揀選題請補授但命往人員僅有數員而守僃不時缺出實屬不敷選用仰懇皇上天恩於别省送部年滿千總内簡發十員或十五員来閩遇有守僃缺出即可題請補用庶營伍不致缺人而於巖疆大有裨益矣臣謹繕摺請㫖伏乞皇上睿鑒施行謹奏所請是交部議覆檢選發往同日又奏為奏聞事竊照臺灣各營換班兵丁例應派撥内地千把總一員管押過臺仍令該弁将赴臺之兵丁送至各營収伍即将各營期滿之兵丁帶回内地此向来之舊例也臣訪得從前管押兵丁過臺之弁員如送至南北兩路及淡水各營俱有數百餘里之遠中間經由番社地方往往役使番民勒供酒食柴草牛車稍不如意即将番民凌辱甚為滋擾臺灣鎮臣因該員係内地營弁非其統屬不便嚴加約束以致番社每受擾累臣思戍臺兵丁每歲陸續換班絡繹不絶似此頻頻苛索番民何以堪此臣聞知既確何敢不亟除此弊隨即移咨水陸提臣并通飭内地臺地各鎮協營一體遵照嗣後凡有換班兵丁止令管押之該弁送至臺郡将兵丁花名册呈送臺鎮衙門查驗明白即令鎮臣於伊本標内另委妥員轉押兵丁送至南北兩路及淡水各營入伍隨将各營應換回内地之班兵造具清冊交原押之該弁帶領回營如此庶轉押之員悉屬鎮標管轄之弁鎮臣即可就近嚴加約束自不敢仍前擾累番民原押之弁員止令在臺守候管領換班兵丁不令前往番社則無從滋事而番民之感沐皇仁益無涯矣冄查澎湖換班兵丁雖係臺鎮所屬但與臺灣尚隔一洋毋容遠送臺鎮應令送至澎湖副将衙門交収入伍合併聲明謹奏番民得免擾累自然久遠相安料理可嘉之至雍正七年十月二十一日署理福建總督印務吏部左侍郎臣史貽直福建廵撫臣劉世明謹奏為要地亟需能員仰懇聖恩俯准借補以収得人之效事竊照福建泉州府屬之晉江縣為郡城首邑兵民雜處事務殷繁非精明强幹才具優長之員不克勝任現任晉江縣知縣王時翔雖遇事不憚勞苦而才非肆應每多遲鈍然該員居官勤慎潔己有餘倘調於事簡之地循分供職猶不失為良吏若令處此繁難之邑則才不稱職臣等查現任知縣内幹員固不乏人但其所處地方悉屬緊要未便調補至於命往閩省試用人員内現在或令學習辦事或令委署試用又未便遽以劇邑委令署理再四籌度難得其人適有奉㫖命往閩省以同知補用之候補同知王之琦到省臣等於該員進見時詳細詢問見其言論明白練達老成且查其從前曾任霸州通州悉係畿輔要地似屬才能幹練之員仰懇聖恩将王之琦以同知職衘管理晉江縣知縣事倘該員任事之後果能整頓地方著有成效或二年或三年俟本省再有賢員可以接辦晉江縣事即将王之琦以知府題請陞補以示鼓勵倘䝉聖恩俞允所遺王時翔一員臣等查有泉州府屬之永春縣尚未補人該縣係事簡之缺請将王時翔就近調補永春如此則一轉移間而地方既収得人之效中材亦免隕越之虞矣臣等謹合詞具摺請旨伏乞皇上批示遵行謹奏候交部議覆有㫖署理福建總督印務吏部左侍郎臣史貽直謹奏為㕘員罪有可原仰懇聖恩寛宥以勵人材事竊照原任臺灣南路營㕘将林子龍於雍正五年軍政時因原任臺灣鎮臣陳倫烱以該員招會婪贓縦兵聚賭廢弛營伍等款揭報經督臣髙其倬據揭題㕘奉㫖提審在案今據府司審解到臣臣復逐款詳加審訊除縱兵聚賭廢弛營伍二款毫無憑據均係陳倫烱妄揭外惟招會婪贓一款訊明因林子龍奉文調考軍政時有臺灣義民功加陳慶傳見子龍缺乏盤費邀同曾士髙等一十四人共湊銀二十兩公送盤費於雍正五年七月初二日交送子龍署中至七月初四日子龍始令陳慶傳散還後經曾士髙等復又送入子龍始終不受歴審竝非婪贓亦無入己但不合遲留兩日始行發還不無先侵後吐情弊今将林子龍照例擬杖折贖臣另疏具題在案但臣細查林子龍從前效力戎行頗著勞績臣於提審之時親見該員人材壯健應對明白且所揭各款似屬寃抑臣日侍禁廷仰見我皇上愛惜人材凡遇臣工有寸長足錄無不隨材器使是以人才之盛蔚然可觀今林子龍一員臣見其人尚屬可用若遽令罷斥甚為可惜臣因人才起見不敢不據實奏請倘䝉聖恩俯念該員罪有可原赦其小過予以自新俾令来京引見可否委用出自天恩非臣所敢擅便為此繕摺請㫖謹奏據奏林子龍罪有可原人材尚屬堪用朕嘉是覽之已有㫖諭部矣同日又奏為奏聞事竊查閩省晚禾向例每於十月内奏報収成分數但今歳夏間欽奉上諭嗣後可細加分别一府之中如九分者居十之幾八分者居十之幾照此類推據實奏報欽此欽遵今閩省晚禾現在結實成熟豐稔倍常雖将次登場但未經普徧収穫臣不敢以約畧分數冒昧奏聞俟収割完畢查明實在収成確數另摺具奏謹将豐熟情形先行繕摺奏聞再查閩省現在米價前因早禾豐収市價頓減目下晚禾漸次可以収穫時價較前更平省屬兵民在在安居樂業合併奏聞謹奏據奏晚禾豐熟及米價平減情形朕懐深慰以手加額覽焉雍正七年十一月十二日署理福建總督印務吏部左侍郎臣史貽直福建廵撫臣劉世明謹奏為奏聞事竊臣接准内閣字知雍正七年六月初六日奉上諭向来各省督撫奏報年歲収成皆云幾分至幾分不等似此未曾分晰清楚未免朦混嗣後可細加分别一府之中如九分者居十之幾八分者居十之幾照此類推據實奏報則朕可以詳悉収成之分數爾等可密寄信與各省督撫知之欽此遵㫖寄信到臣臣隨檄行布政司遵照在案目今晚稻収成已屆據布政司潘體豐詳稱查得福州府屬収成十分者居十之三九分者居十之四八分七分者居十之三興化府屬収成均係八分泉州府屬収成十分者居十之一九分者居十之二八分者居十之二七分者居十之五漳州府屬収成十分者居十之一九分八分七分者各居十之三延平府屬収成十分者居十之三九分者居十之三八分者居十之四建寧府屬収成十分者居十之四九分者居十之三八分者居十之二七分者居十之一邵武府屬収成十分者居十之二八分者居十之八汀州府屬収成九分者居十之二八分者居十之三七分者居十之五臺灣府屬収成九分者居十之五八分者居十之五福寧州及所屬収成九分者居十之三八分者居十之五七分者居十之二各處米價平減軍民稱慶臣謹會同撫臣劉世明合詞繕摺奏聞謹奏覽奏曷勝欣悦此皆卿等忠誠感召所致史貽直能如是立心經理閩疆自䝉上天錫佑此理顯而易見無足異者其奈庸流多自覆蔽而不能確信耳署理福建總督印務吏部左侍郎臣史貽直謹奏為奏聞事竊照福建厦門地方鎻鑰全臺為閩海出入必由之要路而提督一官統轄水師二十五營控制閩省最要之形勢所繫非輕臣近訪聞得水師提臣藍廷珍患病沉重復據興泉道劉而位密禀前来與臣訪聞相同臣思海疆闗係重大無論藍廷珍猝有不虞固需大員急往署理即或尚無他慮而現在病劇之時若無大員協辦亦恐諸事叢脞臣查通省水師各鎮内惟南澳鎮臣許良彬熟悉彼地情形堪以代理臣隨即飛調該鎮令其星夜前往厦門看視提臣病證即令駐劄厦門以資彈壓如藍廷珍病證無恙目下暫同協理俟病體少愈令其仍回南澳設有不測提督印務一面即委許良彬先行署理一面奏明候㫖定奪臣因厦門地方緊要不敢不預為籌畫所有提臣藍廷珍患病臣令鎮臣許良彬前往協理緣由理合繕摺奏聞謹奏巳有㫖諭部矣許良彬協理之委深與朕意相合同日又奏為奏聞事竊照閩省三江口地方奉㫖建立旗營安設水師官兵於雍正六年十二月督臣髙其倬委員監造營房船隻臣奉命署理總督印務以後屢檄飛催承造各員趕工完竣所有戰船已經配兵完工經臣題報在案兹於十月半後據委官禀報營房将次完工臣於十月二十二日會同將軍臣阿爾賽親至三江口安設官兵并閲看旗丁水師操演各兵技藝雖未純熟然再加練習必成勁旅臣伏覩三江口地方外為閩安水師協營係省城海口咽喉今内復設立水師旗營嚴密鞏固誠為萬世之利我皇上睿慮周詳以閩省旗丁不可不熟習水務設官駐兵實為海疆永賴臣躬閱之下益徴聖明無微不照所有營房完畢官兵安設臣會同將軍臣阿爾賽閱看情節謹繕摺奏聞謹奏覽奏巳悉朕亦謂此舉洵有益也同日又奏為奏明事本年十月二十三日准兵部咨議覆臣奏請輪流調驗㕘遊都守等官一摺奉㫖閩省所有應題武職各缺著史貽直揀選人員委署俟髙其倬回任之日再行酌量題補欽此咨會到臣臣隨即欽遵諭㫖通行水陸提鎮嗣後凡有應題武職缺出臣俱揀選人員委署俟督臣髙其倬回任酌量題補外但臣自署事以来題請陞補武職已有一十五員因彼時尚未奉到諭㫖凡有武職缺出部咨内俱行令臣會同提臣題補唯恐海疆要缺不便久懸是以臣咨商水陸提臣揀選合例人員送臣親加驗看之後即循例具題在案今臣既准到部咨自當欽遵諭㫖奉行所有臣從前具題各案俱係未奉諭㫖以前辦理之事理合繕摺奏明謹奏前因卿具摺奏請到任未久㕘遊都守等官察訪未周海疆緊要又不便懸缺以待欲咨商水陸提臣檢選題補所以朕有此諭至從前題補各員已俱照所請允准矣隨後復有命卿将深知灼見之員仍行題補之㫖諒已到閩如經接閲其酌量行之石雲倬之所咨送尚可見信於朕若藍廷珍之所咨送殊難盡信少不妥協恐累及於卿朕意如是竝非因信卿不及而發此諭也今如有確知優等將僃人員但只具疏題来不必回䕶同日又奏為請㫖事竊照休致海澄公黄應纘因爭襲世爵經臣會同督臣髙其倬撫臣劉世明審明以伊姪黄仕簡堪膺襲爵奏聞在案現在飭取宗圖印結另行具題但黄應纘既經告休理應安居鄉里循分自守豈得恃其世爵恣意妄行臣署事以来訪知黄應纘平日陵虐小民蔑視府縣因其恃有欽頒印信一顆動稱公府文書可以直達部院肆其強横尤可異者應纘爭襲一案經臣會審具奏所有欽奉皇上硃批諭㫖豈敢輕以示人乃黄應纘係此案聽審之人竟敢擅用印文遣人齎投臣署公然索看硃批奏摺傲慢無禮不遵當日頒給海澄公印信之故因彼時海氛未靖海澄公標下設有官兵不得不頒給印信以資統轄今海澄公標下官兵久奉裁革印信實無所用抑且因此滋事實於海疆地方甚不相宜仰請皇上將海澄公印信敕令送部銷毁將来黄仕簡承襲之時另頒敕書一道俾其世襲如此則不特黄應纘不致怙侈蔑禮克保身家即將来嗣襲之員皆知安分不敢復蹈前愆矣為此繕摺請㫖伏乞皇上批示遵行謹奏巳有㫖矣雍正七年十二月二十四日署理福建總督印務吏部左侍郎臣史貽直謹奏為覆奏事本年十一月十六日撫臣劉世明差員齎捧奏摺回閩蒙皇上諭令臣公同開看撫臣劉世明隨會同臣敬謹恭閱硃批臣跪讀之下仰見皇上欽頒諭㫖實屬大中至正之道遇事訓誡無非䇿勵諸臣改過遷善之至意蓋督撫係封疆大吏惟有秉公執正不徇情面不愽虛聲俾胸無偏倚庶幾舉劾屬員料理庶務方能協乎羣情合乎天理而自可上契乎聖心若於有聲名之處留意周到凡干科甲之事盡心辦理無論稍有徇情袒䕶固屬壞法營私即使竝無此等茍且之事而以此居心即屬沽名釣譽已非忠誠體國之純心寧非為臣下者所當痛戒乎至於聖諭有云一務名則不誠以不誠之心辦理事務斷無是當之理又諭云人之精力有限專於此必忽於彼務名者未有不廢實行之理根本一失必遭鬼神譴責上天既不錫佑人力何能支撑凡諸訓諭悉皆精一之至言雖帝典王謨垂戒臣工無以逾此豈特撫臣劉世明當奉為寳訓銘佩終身即凡屬臣工均當凛遵訓㫖以為立身行已之準繩今蒙皇上命臣竭力規誡以臣之愚何能宣揚聖意於萬一臣於奉到諭㫖既與撫臣劉世明敬謹詳細講明復於晤對之時每事轉相誡勉撫臣劉世明感激天恩慚愧無地矢志痛加改悔以期仰報髙厚隆恩所有臣奉到諭㫖緣由理合覆奏為此繕摺奏聞謹奏隨時隨事將朕意明白宣示以開導之於臨回京時再加諄切勸勉可也劉世明大體不謬但恐識見淺狹一經流入偽途則成廢材殊為可惜耳同日又奏為奏聞事竊查福建本年晚稻収成分數業經臣會同撫臣劉世明奏聞在案是閩省各處豐稔已可上紓聖主宵旰殷懐但臣訪聞往年閩省每至歲底民間或因逋欠未清或因家務彚集不無拮据艱難之狀惟今年豐稔倍常省城及各府州縣每米一石僅值市價七八錢及六錢有零不等紳士兵民在在盈寧俱各從容度歲揆厥所由蓋因福建本省既獲有秋而鄰近諸省又各豐稔是以家給人足民氣雍和此皆仰頼我皇上一人有慶上感天和以致錫福凝禧兆民永頼濵海地方民安物阜白叟黄童懽欣鼓舞歌咏昇平臣目擊輿情理合據實奏聞謹奏以手加額覽焉此皆卿等忠誠任事慈愛及民有以感召休徵之驗朕深為欣悦兼代卿慶幸之同日又奏為瀝陳下悃仰祈睿鑒事竊臣一介庸愚頻年以来仰沐聖恩至優至渥雖天地之覆載父母之顧復無以逾此本年閏七月間因督臣髙其倬入京陛見奉㫖著臣署理福建總督印務聞命以来日夕感悚雖捐糜頂踵何能仰報髙深唯有凡事不敢自欺以欺君父祇此一念犬馬愚誠稍冀仰酬萬一顧臣有不得已之下悃敢為我皇上敬陳之伏念臣賦質羸弱向有心悸之證每遇操勞輒竟夕不寐又臣生長京師不宜南方水土自到閩之後即覺脾氣虛弱肚腹不調然初到閩中猶冀習慣水土自可漸安無如邇来脾氣益弱飲食不能運化加以心悸不寧精神短少竊思福建係山海要疆總督為文武表率誠恐稍有疎虞貽誤不淺臣蒙皇上委任之重恩遇之隆至於如此茍徒貪慕外任之顯榮不自度德量力據實陳奏則是皇上以腹心待臣臣不以赤心報主負恩曠職臣罪滋深況福建自督臣髙其倬任事以来已四年於兹一切海疆事務悉心料理實屬練達周詳臣既自揣精神才力實不如髙其倬之優裕又何可掩己之短而抑人之長用敢瀝陳下悃伏乞聖恩鑒察曲賜矜全俾臣早得還朝仰承聖訓不特犬馬戀主之誠得以稍慰而京師水土相宜精神可以復舊臣日侍禁廷尚可勉竭駑駘力圖報效庶臣心安而臣職亦可稍盡矣為此冒昧奏懇天恩臣不勝惶悚待命之至謹奏朕洞悉汝之情悃去歲冬初即聞汝不服閩中水土深為繫念後阿爾賽到京僃詢情形為之少慰今覽所奏殊覺不能釋然於懐髙其倬素諳堪輿命其擇地已得上吉之方因又命往盛京瞻視三陵諭其便道審觀闗外風水所以稽遲時日大約四月盡五月初間方可旋閩卿其勉力支撑此數月可也硃批諭㫖巻二百七上欽定四庫全書硃批諭旨卷二百七中硃批史貽直奏摺雍正八年二月初三日署理福建總督印務吏部左侍郎臣史貽直謹奏為據實奏明仰祈睿鑒事本年正月二十一日准福建觀風整俗使臣劉師恕咨開漳州府知府楊一正於雍正七年十二月二十九日到任在籍紳衿俱各迎賀楊一正於八年正月内大放花燈演戲開筵十六日延請本城紳衿飲酒觀燈城内居民亦令入署遊玩所當特疏糾㕘等因具稿會㕘前来臣以楊一正歴任福清候官俱各勤慎稱職今陞授漳州知府莅任甫十餘日竝無劣蹟若因此等小節遽行㕘劾致令賢員廢棄似覺過於苛刻臣仰體皇上愛惜人才之至意不敢附和㑹㕘伏乞聖明睿鑒倘該員此後復不自檢别有過犯臣自當執法糾㕘斷不敢稍為寛貸所有臣不會同觀風整俗使臣劉師恕㕘劾知府楊一正緣由理合據實奏聞謹奏所見殊屬可嘉之至劉師恕題㕘到日自另有諭㫖此事汝即不奏朕亦斷不允行也同日又奏為奏聞事上年十二月十四日臣准到浙江督臣李衞密咨内開照得浙省現獲不法棍徒陸劍門訊據該犯供稱有一箇呌髙晴係福建福州府濱海居民能説幾省的話常於洋内往来誘人入夥等供據此查陸劍門陰蓄姦謀往来各省煽惑為匪當即敗露就獲所有供出之犯合亟密咨訪拏質審等因移咨到臣臣隨即飛飭福州府屬沿海各員密差幹捕嚴行躧緝已將髙晴一犯緝獲到案逐細詰問據供本名髙情向充船匠今在海壇鎮標食糧改名髙泉從前在江南浙江沿海等處修造洋船與洋船上人相熟等語臣查髙情即係髙晴姓名既屬相同又常在洋面来往似與浙省密咨緝拏之犯相符已於本年正月二十日專差標弁押解赴浙質審訖所有臣緝獲髙晴到案解赴浙省緣由理合繕摺奏聞謹奏差委得人方能有緝必獲甚屬可嘉雍正八年二月十六日署理福建總督印務吏部左侍郎臣史貽直謹奏為奏聞事本年正月十四日准廣東提臣王紹緒咨開據恩平縣詳報在於土𤓰蓢地方拏獲姦匪李時英等搜出令旗偽劄等項并供出謀為不軌之夥黨多人恐逃匿隣境移咨一體緝拏前来臣接閲咨文後隨即星夜移咨廵撫并水陸提臣檄行各鎮協營及司道府州縣嚴密加謹防範如有匪犯逃入境内務令上緊查拏勿令脱通飭去後嗣於正月二十三日接准廣東督臣郝玉麟咨文又於二月初六日接准廣東撫臣傅泰密札均稱陸續獲到姦徒四十餘人現經飭審究擬今餘黨已散地方安堵惟據獲犯供開夥黨有福建人氏傳聞福建亦有姦匪分散偽劄祈檄飭所屬密行查訪堵禦等因各先後到臣臣復密飭所屬文武各員在於各該地方并闗津隘口遍加密查一有匪犯分散偽劄等事即刻嚴拏解報不得疎縱臣復細加察訪知閩省地方各處兵民安居樂業竝無此等姦匪潜匿境内分散偽劄之事入春以来民間俱各耕鑿謀生地方寧静實可無庸上厪聖懐所有閩省現在查無匪犯緣由理合繕摺奏聞謹奏粤東一案乃係無頼棍徒假捏虚聲誑騙鄉愚謀為不軌之事毫無影響正犯李梅雖尚未獲姦匪情状巳盡悉無隱矣雍正八年五月初六日暫行署理兩江總督印務吏部左侍郎臣史貽直謹奏為微臣受恩逾分悚懼難安瀝陳下悃仰懇聖慈垂鑒事竊臣在閩省欽奉恩綸蒙皇上念臣水土不服上厪聖懷又以暑熱難行特許越例於交界地方與督臣髙其倬面交印務此雖父母之愛其子亦不能若是之委曲周詳臣感激而悲涕零如雨正在星馳赴闕行至杭州途次又奉暫署兩江總督印務之㫖臣望闕謝恩之餘不覺驚懼汗流手足無措夫以臣之材力不足勝兩江鉅任又本籍例應迴避之處皆在聖明洞照之中而恩命忽加者聖主或鑒臣感恩念切必不敢以鄉曲之地有所營私即才質庸下亦可暫時鞭策以勉一日之力然而臣心實有滋懼者在臣之身家尚輕而皇上之封疆為至重也念臣世居江左宗族姻親所在皆有雖其中賢愚不等而臣今日受恩深重惟知上有君父此外不知有人并且不知有己一切事情止憑國法稍有干犯必不容情而姦徒不遂其欲或借名挾制或無影生端揣摩於莫須有之中汚衊以不能白之謗又或嫉惡過嚴怨毒為甚假手報復莫可防閑臣任勞任怨勢所必有然此僅闗於臣之身家臣亦有所不顧惟是兩江之幅員甚廣事務殷繁甲於他省此即精明強幹之人尚恐難以勝任矧臣秉賦薄弱精神短少即使竭盡耳目心思斷難膺此繁劇艱鉅之責一有舛錯貽誤不淺為此披瀝肝膈上懇於聖明之前伏乞皇上俯念字字出於衷誠竝無一毫支飾恩賜垂鑒速簡賢能大臣膺此重寄俾臣早得還朝仍任部務則皇上始終矜全之大德臣益當矢報於生生世世矣除另疏恭謝天恩外為此繕摺瀝陳下悃仰祈聖恩慈鑒謹奏不待覽奏方悉卿之誠悃朕早已體知卿之難於此任也因一時不得其人故暫命署理今將髙其倬調任兩江亦有所不得已而然朕命伊乘驛来京陛見後再赴新任大約冬初可抵江寧雖止此數月間暫行署理亦不可不加意振作致令政務稍有廢弛若以辦理精神而論卿之才力綽然有餘也勉之凡百就近與李衞密商而行有益雍正八年六月初四日暫行署理兩江總督印務吏部左侍郎臣史貽直謹奏臣荷蒙恩命暫署兩江總督印務自受事以来日夜悚惶惟懼不克勝任有負聖主簡畀之至意兹於四月二十日接准部咨内開奉上諭髙其倬著調補兩江總督乘驛来京陛見再赴新任其兩江總督印務仍著史貽直暫行署理欽此臣聞命之下感激涕零臣何人斯仰蒙聖恩曲賜矜全一至於此臣自此得以入覲天顔時聆聖訓獲遂葵藿之願少伸依戀之忱欣幸之私鏤之心聞外其地方吏治臣留心細訪大約貪墨不肖茍且營私者既在聖主照臨之下久已革面洗心但其間不過兢兢自守循分供職之員求其公爾忘私實心實力不顧利頼督撫兩司統率於前道府等官承宣於下無論尊卑大小皆當視國事如家事合衆心為一心然後政成事理不負我皇上委任之至意臣稔知髙其倬久任督撫封疆之事其所熟練且秉心純正清慎老成實係誠心為國之臣今兩江諸務闒茸非數年整頓不能改觀以髙其倬之歴練封疆蒙皇上之委託也又如江蘇撫臣尹繼善莅任以来臨事精明識見敏㨗臣屢過吳門見其辦事勤敏伊向臣言一切張弛俱奉署按察司喬世臣向為臣部司官素知其為人端謹醇樸今甫署臬司不改前轍蘇松糧道馮㬌夏為人誠實而於錢糧事務尤為明晰精詳實他人老練然非肆應之才蘇州府童華才具雖優但自淮安府臣尚未到松江府乃係署員其各屬州縣多未親見惟金匱縣知縣王喬林年富力強有才奏上江則民俗少醇事務亦簡案牘不及下江之半恐不稱臬司之職其他道府以下臣實未周知又江西一省程途窵遠臣正在留心訪察然茍非深知灼見何敢妄奏臣到任未久就臣所見不敢容隱謹繕摺恭呈御覽餘俟臣察核確實再行陳奏為此繕摺謹奏詳覽所奏俱屬公當同日又奏為整葺營汛以資防禦事竊照設兵原以衞民故於水陸隘口及衝要之區各建汛地每汛撥兵五名常川防守蓋造營房以為棲止築立墩臺以資瞭望今查江南地方營房卑隘墩臺圮毁且有倒塌無存就寺廟以棲身者防禦廢弛莫此為甚臣蒙皇上恩命暫署兩江督篆莅任以来案牘紛紜現在次第辦理而盗竊案件詳報纍纍雖疎於防範文武均有處分而汛守廵查消弭不可無法則修理營房墩臺責令汛兵廵緝實為弭盜之急務也但向来修理皆責成州縣邇来州縣已定養亷竝無餘資可以捐助茍且因循勢所不免臣於五月内赴常州會審與蘇州撫臣尹繼善當面商酌共圖整理以期一勞永逸聞下江等府有無礙公項可以動給隨令司府等確查明白據實開報以便按照水陸汛地估計修造俾沿途營房墩臺煥然一新汛兵棲身得所責其殫力廵查復委營員往来察其勤惰以定賞罰如此則壁壘堅而軍威壮宵小於以潛蹤矣但臣係初到未能確指何項可以動支除俟司府查明及估計工料到日另行會題其上江各屬營汛現在檄行司府確查有無公項可以動支修理俟查覆到日再行具奏外理合繕摺奏明謹奏整葺營汛之請甚是凡地方應行事宜毋因暫署而延緩推卸髙其倬赴任為期尚早雍正八年九月二十日都察院左都御史仍暫署兩江總督印務臣史貽直謹奏恭請皇上萬安朕安朕躬已全愈安和如舊矣諭汝知之同日又奏請分首府之屬縣改隸别郡以均繁簡事竊臣籍隸溧陽縣地居大江之南僻處東偏向隸江寧府屬建置己久臣何敢冒昧陳請以滋更張但臣生長於斯素知江寧府之管轄溧陽在府有鞭長不及之虞在縣有公務遲誤之咎今蒙皇上殊恩畀署江南總督印務臣不敢因溧陽係臣祖居本籍輒為避嫌不言請為皇上敬陳之伏查江寧一府所轄八縣而上元江寧句容江浦六合等五縣地當衝要庻務殷繁守斯郡者即才具優長已慮汲深綆短况尚有溧陽溧水髙淳三縣錢穀刑名一切事件悉資料理勢難兼顧此江寧府之不宜多轄屬縣也再查溧陽縣距府二百七十里由縣至上興埠水路小河沙淺舟楫難行由上興埠陸路經溧水縣山路更屬崎嶇且非驛遞通衢是以公文上下與夫解糧解犯等事俱係繞道而行素稱不便一有緊急公務每至呼應不靈此溧陽之不宜隸於江寧府也臣又查該縣誌書漢時原係鎮江府舊屬今鎮江一府止轄丹徒丹陽金壇三縣不若江寧八縣之多況溧陽至鎮江府城路程較之江寧更近四十里且係内河水路一舟可達遞送公文押解糧犯深屬便易又不若江寧之水陸間隔也臣請將溧陽縣改隸鎮江府則江寧無鞭長不及之虞溧陽免公務遲誤之咎矣是否可行臣未敢擅便伏乞聖恩批示容臣另疏具題抑或即將臣摺敕部議覆恭候皇上睿鑒施行謹奏交該部議奏矣同日又奏為請定沿江汛兵替換之期以杜賄縱事竊查兵丁廵哨本有替換之例如出洋廵哨官兵則係四箇月一換貼防松江等處海汛官兵則係六箇月一換往来更替立法盡善惟沿江塘汛兵丁從未據各屬具報換班之期其以一兵久防此汛可知在汛既久似宜熟知江面情形與夫盜賊出沒之處鹽徒窩頓之區發縱指示旦夕可得矣乃臣訪聞塘汛之兵慣通匪類以捕盜為名受其賄不惟縱盜而更且為盜以詰私為事艷其利則不但縱私而更且販私其故皆由於久在汛地從無替換上司之查察置若罔聞匪類之行蹤往来甚密所以失事之案甚多弋獲之犯無幾臣再四思維惟有定限輪班不使之久於此地則彼初到汛地未能輒與盜通及至稍稍通熟又已將及班期是兵尚無暇致其賄盜亦未肯以重賄而買此将去之兵也臣請嗣後定以六箇月一班每汛照應撥馬歩名數遴選精壮之兵輪流替換該管将僃将換過之處開具塘汛地名兵丁花名册報督撫提鎮查考其間倘有違犯即將該管將僃題㕘議處似此定限輪班不但可杜賄縱之弊而退汛歸伍之兵亦得隨操考驗於營伍不無裨益是否可行伏乞皇上批示遵行謹奏候交髙其倬再加酌議具奏有㫖雍正八年十月二十二日都察院左都御史仍暫署兩江總督印務臣史貽直謹奏為被水人民賑恤得所仰慰聖懐事竊查上江夏間秋禾被水除涇縣等二十一州縣鳳陽等二衞勘不成災外惟有宣城旌徳銅陵懐逺建平五縣被災六七八九十分不等蒙皇上天恩特諭臣等動支帑銀確查賑濟臣遵即會同安慶撫臣程元章按照被災分數酌量發銀委員往賑矣又奉恩㫖有應免錢糧之處即著曉諭停徵將應免數目確查奏聞又奉恩㫖被水州縣之漕糧按成災分數蠲免又准部咨動用存倉捐積米石煮賑三月臣又與撫臣會商令成災與不成災各州縣衞將存倉米穀一體減價平糶兹據各屬禀稱災民俱各安居復業歡聲雷動感頌皇仁現在市集米糧充積米價不昂民無艱食再查下江被水之邳州等十八州縣淮安大河二衞内惟邳州宿遷桃源清河海州沭陽睢寧七州縣被水為甚臣與蘇州撫臣尹繼善一據各屬報到即便委員分頭確查水中堤上露處窮民先行開倉賑恤其離城遙遠運米不及者臣等各捐養亷銀先行賑給以濟燃眉隨即欽奉恩㫖著清查錢糧侍郎馬爾泰等動支藩庫銀數萬兩速行賑濟今年額徵錢糧悉行蠲免巳經完納者准作明年額徵之數又奉恩㫖大口每月給米一斗五升小口減半兩月之外加增一箇月又奉恩㫖允臣所請將鹽義倉米穀撥運減價平糶如有倉榖不敷之處即動撥賑濟又奉恩㫖漕糧按成災分數蠲免臣又准撫臣咨會三路合算計共大小災民五十一萬三千餘口已於司庫動撥銀一十八萬兩解赴河道庫交収聽散賑大員就近撥領濟用又除倉糧足資僃賑州縣外宿遷縣撥米八千石徐州邳州各撥米六千石沭陽沛縣各撥米五千石海州寳應各撥米四千石桃源豐縣各撥米三千石山陽碭山各撥米二千石俱赴鹽義倉領運僃賑髙郵州撥米一萬石邳州撥米八千石宿遷沭陽海州徐州寳應桃源山陽清河各撥米五千石安東興化豐縣沛縣蕭縣碭山各撥米三千石鹽城撥米二千石俱赴鹽義倉領運減價平糶又據各州縣詳請將捐貯社倉穀石借給貧民又河工海塘等處大興修築少壮窮民皆得赴工力役餬口其房屋倒塌之處又經給價安頓是以今歲淮揚等處被水特甚而災民尚不至流離失所俱得安堵寧家上下兩江先經被水現在涸出之地俱已布種二麥以待春収冄查兩淮鹽場本年六月二十一二等日海潮漲漫被淹經臣會同鹽臣發倉賑濟減價平糶現在會疏具題亦俱安居復業煎鹽辦課如故合并繕摺奏聞仰祈睿鑒謹奏覽奏朕心為之少慰同日又奏為奏報江西全省秋収豐稔仰祈睿鑒事竊查江西一省隔屬遥遠臣雖時加察訪僃悉今歲夏秋以来雨暘時若年穀順成然未敢冒昧具奏臣飛行確查兹據江西布政司詳報秋収分數到臣并稱全省地方無分髙下晚禾成熟近又連日晴霽皆已収穫登場童叟歡呼載道婦子共樂盈寧臣覆加查核無異理合繕摺奏聞謹奏據奏江西全省豐収朕欣悅覽焉雍正八年十一月十五日都察院左都御史仍暫署兩江總督印務臣史貽直謹奏為奏聞事竊照上下兩江被水各州縣蒙皇上天恩發帑賑濟貧民得所經臣繕摺具奏今查下江邳州等十八州縣被水人民及衞屬軍户於八月十三日賑起至十月二十六日兩次共賑過大小口五十七萬三千七百七十二名共賑過銀一十七萬八千九百七十九兩四分再房屋被水衝倒者共八千一百九十四户每户酌給修葺銀四錢共給銀三千二百七十七兩六錢已經賑竣兩月至奉㫖加賑一月口糧業經侍郎臣馬爾泰等奏明在於冬末春初再行給發被賑之男婦老幼莫不歡呼載道安居樂業如常市集米價亦平麥苖現已長發雨暘時若理合再行奏聞臣又訪得淮揚一帶地方民間廣開燒鍋將各項糧食蒸酒發賣以致耗費米糧未免貧民艱食臣飭令將燒鍋暫行停止俟来歲豐収之後冄許開燒庶幾糧食益見充盈於民間大有裨益再者江省今歳因夏間雨水過多濕熱薰蒸倍於往時臣霑染潮濕現在遍生瘡疥肢體臃腫雖於辦事無妨但痛癢交加行走拜跪頗覺艱苦臣受恩深重即小疾㣲疴亦當瀆奏於君父之前理合一并奏聞謹奏俗云疥癬之疾何足介意内有所積濕熱因此盡可發出目下雖覺轉動不便却於身體有益也同日又奏為奏聞事雍正八年十一月十二日據江寧縣禀稱本月初十日有李國輔投帖要㑹當即接見帽戴藍頂據稱北直永平府盧龍縣人癸巳科進士雍正七年十一月奉㫖引見共有五十七名揀用二十四名山東發往八名山西發往八名浙江發往八名我係發往浙江試用上元縣縣丞李恩係我同宗故来拜候五月内到江寧奉㫖密查典舖利息輕重今查江寧典舖利息甚輕我欲具摺回奏等語具禀到臣臣思李國輔既係癸已科進士奉㫖引見命往浙江試用自應給有部照定有限期豈得遶道逗留竟至一年之久尚不赴浙即據稱奉㫖密查江寧典舖利息輕重此事亦屬易查何庸自五月留住至今半年方得查訪明白且又公然拜往該管之地方官將奉㫖密查之事向人洩漏迹其行事大類招揺詐騙之徒除一面行文江寧按察司將李國輔暫行拘留并密咨浙江督臣李衞查明有無奉到李國輔等命往浙江試用之㫖逐一究訊外為此繕摺奏聞請㫖伏乞皇上睿鑒批示遵行謹奏便實係命往試用人員亦豈有諭令密察典舖之理乎明屬詐騙復有何疑雍正八年十二月二十八日都察院左都御史臣史貽直謹奏為恭謝天恩并陳下悃仰祈睿鑒事本年十二月二十六日督臣髙其倬抵江寧臣出郊跪請聖安督臣髙其倬口傳諭㫖爾到江寧傳㫖與史貽直令其回家度歲過新正初五以後起身進京欽此臣跪聆之餘感戴天恩淪肌浹髓何敢不踴躍祇遵惟是臣於雍正六年十一月間奉差出都迄今已逾兩載違侍禁廷從無如是之久依戀之切無時不縈繫於心兹督臣髙其倬已抵江寧臣惟願早覲天顔以遂瞻依下悃若回至溧陽往返輒須數日家鄉再一擔擱必致遷延時日臣在外多住一日京師即遲到一日犬馬戀主之念實難一刻自安現在將總督印務移送督臣髙其倬并將地方事務逐一交代明白臣即於十二月二十九日自江寧起程赴闕恭請聖安所有臣不回溧陽度歲情由合先繕摺奏聞為此恭謝天恩謹奏自當遵㫖而行何必如此怱遽爾不是矣雍正九年六月二十四日都察院左都御史臣史貽直謹奏為恭報秦民感戴情形仰慰聖懐事竊臣面奉諭㫖命臣辦理西安鳳翔二府宣諭化導之事於六月初二日到西安省城即將欽奉上諭遍貼城鄉市鎮先於省㑹之地分設三處謹擇於六月十二日宣講起至十八日四城宣講已畢每處宣講地方俱恭設龍亭香案傳集紳衿耆庶將欽奉上諭臣親捧講解復令各員分頭宣講詳悉開導一時聽講士民感聖朝疊沛之恩施荷聖主曲成之敎誨且共悉皇上萬不得已而用兵之聖心俱各望闕嵩呼叩謝天恩萬口如一宣講之時士民恭聆之下甚有感激涕零者臣細察情形實出至誠竝非假飾至於辦理軍需之處臣暗加體察知百姓俱循分急公現今運糧已竣民情帖然毫無怨語間有數處奉行不善之州縣已於臣另摺内奏明除西安府屬各縣分遣各員前赴宣諭化導臣仍不時稽察務令遠鄉僻壤家喻户曉俟府屬事竣容臣次第奏聞外總之臣子入告期於一字不欺民情未極歡欣鼓舞而故為粉飾其詞固蹈欺罔之罪若民情實在感恩戴德而不以上達亦非臣子事君之誠臣目覩西民抒忱感化萬口同聲理合將西安省城宣諭化導過情形據實繕摺奏聞謹奏據奏陜省民情深慰朕念諒卿不忍將如是闗係之事欺瞞於朕也但恐耳聞目見之所不及情形或有異同此處尤當加意體察同日又奏為奏聞事竊臣欽奉諭㫖命臣將辦理軍需各項悉心察訪臣入陜西境内即一路明查暗訪及到省後又復細加查察見撫臣武格與欽命協辦軍需之工部侍郎臣馬爾泰料理俱屬妥協本年西鳳二府及同華乾耀四州各屬共運米十五萬石目下俱運送完訖現今正在解送馬匹民情俱各帖然内惟西安府屬之髙陵縣因署縣事水利通判髙豫採買餧養軍需馬匹草料辱罵百姓又因運米之際百姓欲用牛車輓運而髙豫必欲槩用騾車以致民人赴縣喊嚷旋經西安府知府前往曉諭而散今撫臣武格業將髙豫撤回另委别員署理又有盩厔縣朱文炳亦於運米之時該縣百姓欲用車辆輓運朱文炳以車運稍遲欲用騾頭䭾運致與民情不合百姓欲赴省控告該縣朱文炳尚係曉事之員隨即聽從民便現今米已運完竝無遲誤又有乾州知州張于渡因餧養軍需馬匹不另撘棚厰將馬匹分發城外各店舖餧養月給房租以致各店舖俱稱不便亦經撫臣武格將張于渡撤回委别員前往署理以上三處俱因地方官料理未妥以致民情稍不相安但臣細加察訪尚無扣尅科派情弊撫臣將各員撤回亦屬允當臣思國家辦理軍需雖不取辦於民財實不能不借資於民力如果地方官扣尅派累自當即行嚴㕘若平日居官尚屬奉公守法祇以識見拘泥未能因地制宜似應斟酌事之輕重量為完結葢民隱固宜體恤而刁風亦漸不可長臣愚昧之見是否有當仰祈皇上睿鑒謹奏所見甚是與該撫等和衷協力酌量為之然以目下情勢論之體恤民隱與恐長刁風二者當以體民為要務懲刁為次舉至於其間輕重緩急通權逹變又在卿等因時制宜而措施之也同日又奏為奏聞事竊臣查陜西省屬州縣今嵗麥秋十分豐収民間俱家給户足惟入夏以来雨澤愆期六月初旬後望雨甚廹兹於六月十四日省城得雨數寸四野霑潤續據西鳳二府屬各縣邠乾耀華同鄜六州所屬各縣報稱均於是日得雨二三寸以至六七寸不等秋禾已種者得以發生未播者得以栽種將来可望豐収為此繕摺奏聞謹奏朕正在憂念覽奏曷勝額慶雍正九年八月初七日都察院左都御史臣史貽直謹奏為據實覆奏事本年七月初九日接大學士公馬爾賽等寄臣字札一封内係轉傳上諭因甘省所屬民情經撫臣許容陳奏蒙皇上命臣知會侍郎臣杭奕祿署内務府總管臣鄭禪寳悉心體察就近酌量據實辦理臣欽遵諭㫖隨即知㑹去後伏念臣自入陜省以来雖遵㫖專辦西安鳳翔兩府臣於甘省所屬事宜無刻不留心察訪知甘省民情向来樸直自逆夷肆蠢以来無不切齒痛恨咸思仰仗天威滅此朝食是以西鳳百姓輓運軍需經過彼地俱簟食壺漿歡迎道左該省本年應運料豆亦各爭先輸納踴躍急公據臣所聞竝現在復加體察實與撫臣許容所奏無異臣查甘省人民既素篤尊君親上之義又毫無怨懟之情且共喻皇師𠞰寇安邊伊等即可永受其福是以抒忱向化實出至誠臣就近酌量允宜欽遵諭㫖專心辦理西安各屬即帶往各員亦應多派於西鳳地方聖訓指示實屬至明至當但西安一府臣率領多員辦理已畢業經家喻户曉目擊輿情感激愛戴更有甚於甘省者其西安省屬之榆林延安兩府亦經杭奕祿鄭禪寳先後辦完目今僅餘鳳翔漢中兩府及直隸州數州尚未辦理將来自應多派人員在於此數府州及各所屬之内廣為宣諭化導兹臣於七月十八日又接准部文奉㫖命侍郎杭奕禄協辦軍需其宣諭化導之事著交臣與鄭禪寳分辦臣今分得寧夏慶陽平凉三府鄭禪寳分得甘州涼州兩府及肅州一州臣不日率領多員前赴鳳翔府宣諭化導容辦理事竣之後臣再前往寧夏等府悉心化導理合繕摺奏聞謹奏覽今命爾協理陜西廵撫事務矣勉為之雍正十年二月初三日兵部尚書臣史貽直謹奏為奏聞請㫖事竊臣於上年五月間奉差赴陜蒙皇上面諭將曾靜案内之張熙命臣帶往陜西察其情形於宣諭化導事竣之日奏聞請㫖臣隨将張熙携帶同行出京之日臣即密遣誠謹家人沿途伴走凡一言一動皆令據實禀知到陜後臣於辦公之暇復不時面加詢問據稱從前因曽静誤聽流言我又誤聽曾静之言遂致犯此彌天大罪仰蒙皇上如天好生之恩寛宥釋放雖粉身碎骨亦難圖報我如今想起家有老親實恨曾静誤我與曾静師弟之義已絶等語臣細細體察見其感恩悔罪實出至誠但觀其言動舉止實係卑汚下賤之軰且身體亦甚薄弱每每醫藥調治時疾時痊今臣宣諭化導已竣應否於臣復命之日仍將張熙帶領入京抑或别有安置之處臣謹繕摺請㫖仰祈皇上批示遵行謹奏張熙准回原籍命其在家候㫖毋令遠離鄉土如有用伊處諭到即便前来爾將此情由具文咨明該撫趙宏恩知之并將張熙送交該撫轉送本家可也雍正十年八月十七日兵部尚書協辦陜西廵撫事務臣史貽直謹奏為奏明事竊臣上年奉差陜省旋復協辦撫事因與署撫臣馬爾泰公同辦理一切廵撫任内應奏事件俱經封入臣馬爾泰原奉内廷奏匣内一同拜進今臣馬爾泰遵㫖赴肅其原奉奏匣悉行齎往而臣前次䝉恩頒賜之奏匣臣於江南回京時已經恭繳所有臣今次奏摺另用黄夾板固封進呈理合奏明謹奏奏匣另賜来矣同日又奏為甘凉西肅之兵糧折價不敷據實密陳仰祈睿鑒事竊查雍正十年甘省地丁銀兩及民屯糧草奉㫖悉行蠲免此誠皇上軫恤民依為從来未有之曠典伏查甘涼西肅一帶係沿邊重地一提三鎮星羅碁布所設額兵最多向来兵丁月餉每年八箇月折給銀兩四箇月支給本色此定例也但此項本色皆出自額徵今歲徵収来年始有支放若一經蠲免則無項可支往往於支給本色之月每糧一石折銀一兩每草一束折銀一分是將四箇月之本色悉改而為折色矣臣查平慶臨鞏寧夏五府秦階二州糧草價值尚平兵丁所得折色猶足敷用惟甘涼西肅等處為軍需總滙之區兵馬往来輓運絡繹糧草昻貴數倍河東此一提三鎮兵丁若將本色悉改折支則本地時價相去甚懸實不敷用臣愚以為甘涼西肅一提三鎮兵丁之癸丑年應得四箇月本色折價一項似應酌量議增查西寧涼州兩處價值頗昻糧每石一兩外應酌加四五錢草每束一分外應酌加四五釐甘州肅州兩處價值更昻糧每石一兩外應酌加六七錢草每束一分外應酌加六七釐如此量為加給庶於兵民兩皆得所當此軍興之際需用浩繁臣何敢不慎重經費但仰體皇上愛恤兵民至意委曲周詳無微不到臣每委員前赴甘省訪查米穀豆草僃悉甘涼西肅兵丁折價實屬不敷臣又何敢不據實密奏是否可行鴻恩出自聖主非臣所敢擅便為此謹奏甘凉西肅兵糧折價議增之處交辦理軍需大臣㑹議具奏雍正十年九月二十五日兵部尚書協辦陜西廵撫事務臣史貽直謹奏為覆奏事竊臣等前據潼闗縣詳報潼商道張正瑗家人張魁等出署喧嚷一案臣與署撫臣馬爾泰一面奏聞一面即批行布按二司查審去後兹據該司等審詳前来據稱張魁等指稱伊主張正瑗逼姦僕婦周氏等各情事俱無實據細加究詰總緣該道平日為人苛刻馭下過嚴稍不如意即將婢婦嚴加撲責以致張魁等積怨日深不願跟隨遂一同辭主出署及至轅門撞遇人役盤問張魁等無知忿激不顧名分遽爾羣出穢言實屬確情臣查張正瑗雖審無逼姦情事及張魁所供各款亦屬子虛應免㕘究但身為道員不能約束家人咎實難辭已飭記大過一次其家人張魁等雖審據各供原係回明伊主出署然不合揑詞誣主殊干法紀惟是再四嚴詰實因轅役盤問一時隨口妄供與有心誣告家主者有間臣業經批飭布按二司将張魁等各枷號一月重責四十板并將一干男婦遞回原籍結案訖所有此案審明緣由相應繕摺奏聞仰祈睿鑒謹奏據奏審明張魁等所供俱屬子虛知道了硃批諭㫖巻二百七中欽定四庫全書硃批諭㫖巻二百七下硃批史貽直奏摺雍正十一年五月初十日署理陜西廵撫臣史貽直臣鄂昌謹奏為要郡亟需能員仰懇聖恩俯准陞補以収得人之效事竊照西安一府地當省會之區兼值軍興之際事務殷繁膺斯任者非精明强幹之員實難勝任現任西安府知府王紹文近因患病纒綿呈請解任回籍調理業經臣等㑹疏題報在案西安係最要之缺未便一日乏員臣等查有現任西安府理事同知烏靈阿練達老成實心任事仰懇聖恩俯准將烏靈阿陞補西安府知府庶要地得人臣等獲収臂指之效如蒙俞允所遺理事同知員缺聽部另行銓選再查該員引見已滿三年例應送部引見但陜省辦理軍需正在需員任事請俟大兵凱旋之日補送引見實為恩便合併聲明除西安府知府印務臣等已先委烏靈阿署理外為此繕摺奏請仰祈睿鑒批示遵行謹奏好候另有諭㫖雍正十一年六月初六日署理陜西廵撫臣史貽直臣鄂昌謹奏為欽奉上諭事竊臣等承准大學士臣張廷玉寄字内開雍正十一年五月十二日奉上諭聞得陜西之三原涇陽咸陽渭南富平等縣燒鍋各以千計其餘州縣亦皆有之朕思燒鍋既多必將糧食耗費甚屬無益但恐遽令禁止又滋煩擾爾可寄信與署撫史貽直等令其悉心籌畫若禁止不致累民則禁之為便抑或多方勸諭令其醒悟不期禁而自止是惟封疆大臣斟酌行之不可強廹欽此等因到臣等跪讀之下仰見皇上愛養黎元敦本重農之至意伏查燒鍋一項西北各省所在有之衹因小民圖利往往舍本逐末臣史貽直自前歲莅任即檄行所屬地方各官不時查禁在案兩年以来各處燒鍋已減去十之七八臣等復思欲杜燒鍋之原當嚴造麯之禁民間每於麥収之後不以積儲為急務而以踏麯為生涯所費之麥不可數計惟嚴禁造麯則燒鍋不禁而自止矣然陜省糧食之耗散不僅由於本省之燒鍋而在於晉商之販囤陜省每遇豐収之年則晉省富商預將資本散給於西鳳各屬之農民農民貪取目前之現價不顧日後之盈虛一至糧食登場悉聽晉商搬運以致糧石耗費葢藏空虛臣等稔知各種情弊現於今歲麥収之時遍行出示剴切曉諭毋許民間私自造麯更於晉商販運之要路委員前往稽查不許糧石私販出境現今陜省糧食可免耗費之虞惟是秦民艱於生理往往借日用之需以為餬口之計倘本地糧食充裕百姓藉燒鍋以覓微利亦屬謀生一道若欲概令禁止則誠如聖諭不無煩擾臣等仰體天心惟當因時酌量視年歲之豐歉審民力之盈虛或出示嚴禁或多方勸諭務使閭閻有儲蓄之需草野有資生之策庶於國計民生均有裨益今䝉諭㫖下頒理合據實奏聞謹奏覽奏可謂得因時制宜之意所見甚屬妥協雍正十一年七月二十七日署理陜西廵撫臣史貽直謹奏為奏聞事竊臣近閲邸鈔伏讀上諭武弁中熟習水師之人甚為難得該管大臣若不於平日留心儲養何以収人地相宜之效每見督撫提鎮中有將熟習水師人員題請調用陸路者此皆未曾周詳籌畫之故著通行傳諭嗣後細加體察若在水師中為平常之員而長於陸路者准其調補陸路若係長於水師之員俱留於水師員缺題補不可以陸路一時需人輕易改調欽此仰見皇上至聖至明務期海疆重地用得其才之至意伏查水師之職不特熟諳水務者固難其人而能正已率屬者尤不可得葢水師各缺多係本省之人由千把歴任陞轉或係行伍出身或由船工抜補大率節取其長不復詳核其品及至身為大員其所轄之弁兵皆其平時熟識之親朋未免瞻顧私情諸事牽制再一立身不正則其間百弊叢生或因賞罰不公或因扣尅虛冒漸致士卒不服號令不行營伍廢弛大率皆由乎此臣於雍正七年䝉恩命署閩督印務於通省水師人材每留心察訪以僃顧問今臣自離閩省己逾四年舊日屬員已多陞遷事故惟現任閩安協副將張天駿現任督標中軍副將王振此二員者才識優長熟嫺水務每於因公進見時詢以海疆事宜應對詳明歴任水師均能實心任事著有聲名且其籍貫一係浙江一係江南與不得已而用本省之人更為有間以臣之愚觀此二員堪膺水師總兵官之任伏念内外大小臣工其賢否優劣悉在聖明洞鑒之中臣亦何敢更置一詞因近奉上諭以熟習水師之人難得令該管大臣留心儲養臣向年曾任閩疆稔知該員才堪大用是以不揣冒昧敬舉所知如果臣言可採仰懇皇上將張天駿王振二員恩賜記名將来遇有水師鎮臣缺出伏乞再降諭㫖詢問該省督撫臣可否任用出自聖恩非臣所敢擅便也為此具摺奏聞仰祈睿鑒謹奏張天駿原記名在上上之列近日以来無因思及幾至遺忘此奏甚愜朕意至於王振乃庸常材具耳且年齒亦輕副將尚恐弗克勝任雍正十一年十一月初二日署理陜西廵撫臣史貽直臣鄂昌謹奏為奏聞事臣等前准部咨行令撥運西鳳邠乾等府州粟米六萬京石并湖廣運到粳米五千京石令陸續運至肅州等因業行西安司道遵照在案今除粟米六萬京石現撥各州縣存倉穀石碾運外惟另撥楚米五千京石一項尚應變通辦理敢為皇上陳之查今歲楚省運到米石悉係稄子糙米色味原不甚佳又因自楚至陜装載􅤭船船板澆薄米多受潮且自龍駒寨運至省城正值大雨時行復受潮濕難以久貯在倉止堪就近撘放兵米是以臣等奏請在於西安八旗及督撫城守營三標兵丁領餉時撘配支放業經奉㫖依議欽遵在案至於今次派運之米悉係大營官兵日用所需必得顆粒圓淨煮食甘美方於軍糈有益若將楚省之稄米照議撥運竊恐夏間潮濕薰蒸成色業已稍減又復自陜運至軍營道路迢遙為時甚久再經風霜雨雪輾轉搬運必致成色更減氣味不佳徒費轉運之勞於官兵未必有益臣等再四籌畫今歲陕省秋成豐稔所収粟穀顆粒分外乾圓色味亦甚甘美似應將原議派撥之楚米五千京石改撥粟米五千京石陸續碾運既與原派米數相符兼於軍營食用有濟較之輓運稄子糙米美惡實相逕庭臣等稔知楚米運至軍營斷不適用故敢據實直陳奏請改運粟米除一面檄行司道派撥各州縣如數碾運并移咨陕甘督撫兩臣知照外所有將楚米改運粟米緣由理合繕摺奏聞仰祈睿鑒為此謹奏所見是當之極如此為國家辦理事務始克稱通權達變也嘉悦覽之同日又奏為欽奉上諭事本年十月二十四日奉到上諭著將此次許容奏撥陕米六萬五千石令史貽直鄂昌曉諭民人照例給發運價等項乘此農隙之時陸續運至肅州交卸欽此欽遵等因到臣等當即檄行司道遵㫖辦理隨復頒發告示宣布皇恩徧行曉諭陕省民人令其乘此農隙之時陸續輓輸以達於肅庻上以答聖主之深仁下以紓甘民之勞瘁然陕省之民數年以来雖值軍興而仰戴天恩之浩蕩其忠義感激之誠浹髓淪肌日思報效故凡遇軍需事件俱各奮力向前實與甘省之民同一歡欣鼓舞莫肯後時但臣等前因甘撫臣許容奏請陕民長運接准廷議令署督臣劉於義及臣等妥議辦理臣等伏查雍正九年陕省之民長運至肅人夫牲畜十有餘萬跋渉長途甚為苦累臣等目擊情形以為長運艱難不若仍為遞運而督臣劉於義所見與臣等相合遂會稿具奏在案今欽奉諭㫖仰見皇上睿慮周詳同仁一視陕甘百姓均屬朝廷之赤子均受皇上之鴻恩理應隨時變通權宜協辦其於軍務民生洵有裨益臣等仰體天心自應盡心料理斷無貽誤所有臣等欽奉諭㫖現在辦理長運縁由理合具摺奏聞為此謹奏好勉力為之同日又奏為彚報秋禾収成分數米糧時價仰祈睿鑒事竊查陕省今歲秋禾収成分數節經西安等府州縣陸續呈報前来臣等隨專差妥員分路確查竝行西安布政司覆查去後兹據該司碩色詳稱西安府屬十四縣鳳翔府屬八州縣邠州一州竝所屬三縣乾州一州竝所屬二縣同州一州竝所屬四縣華州一州竝所屬三縣耀州一州竝所屬二縣秋禾収成俱係十分延安府屬八縣秋禾収成統計八分漢中府屬九州縣秋禾収成統計九分榆林府屬四縣秋禾収成統計八分興安州竝所屬六縣秋禾収成統計九分商州竝所屬四縣秋禾収成統計九分綏徳州竝所屬二縣秋禾収成統計八分鄜州竝所屬三縣秋禾収成統計八分至現今米糧價值西安省城大米每京斗價銀一錢九分六釐粟米每京斗價銀一錢一釐小麥每京斗價銀九分一釐大麥每京斗價銀五分六釐豌豆每京斗價銀九分一釐黄豆每京斗價銀一錢五分四釐穀草每束重十斤價銀一分七釐其餘各府州屬所報糧價約畧相同等因到臣等與臣等差查之収成分數糧價俱屬相符理合據實分晰奏報至収成分數應同督臣公奏因署督臣劉於義現在駐劄肅州是以臣等一面奏聞一面會稿合併聲明伏祈皇上睿鑒謹奏秋禾収成分數并米糧時價情形以手加額覽焉此皆卿等公誠任事有以感召天和之所致朕深為嘉悅西顧崤陕再三為秦民慶幸也雍正十一年十一月十六日署理陕西廵撫臣史貽直謹奏為奏聞事竊臣於雍正九年三月奉差陕西宣諭化導曾將舉人候選知縣姜順龍奏請帶往陕西辦理公務該員勤慎奉公實心辦事臣於宣諭化導事竣之日業將該員列入一等同帶往各員一併咨部在案臣彼時適奉協辦陕西廵撫之恩命一時未帶幕賓值此軍興之際公務浩繁需人分理因該員辦事明白小心復經臣奏請留臣署中幫臣辦事俟臣回京之日令其赴部請以六部主事補用經吏部議覆以可否以主事補用之處俟尚書史貽直回京之日帶領引見恭候欽定等因奉㫖依議欽遵在案伏查宣諭化導案内帶往陜甘辦事共五十一員各於事竣之日仰沐天恩得邀議叙年来在内在外各員業己悉登仕版唯該員因臣奏留陕西辦事未及録用迄今又復兩載有餘該員近見臣回京無期其意唯恐久淹臣署不得及其年力進取功名以圖報效臣窺見隠衷又何忍固執臣之原奏勉留該員在陜阻其仕進之階况西安廵撫衙門事務簡少不比東南諸省案牘繁多臣自莅任後悉心整理數年以来諸事頗有就緒至軍需事件亦各有條規不難從容辦理署中協助之人亦在可有可無之間今臣己一面給咨該員赴部聽候帶領引見臣謹繕摺奏聞為此謹奏俟引見時朕鑒觀材具酌其所宜而用之署理陕西廵撫臣史貽直臣鄂昌謹奏為僃陳河道疏濬之難仰祈睿鑒事本年八月二十八日准户部咨湖廣督臣邁柱奏請疏濬荆子闗至龍駒寨一帶河道經廷議交臣等相度情形乘此冬月之時估工動帑以垂久遠之利以紓輓運之勞臣等遵即檄委潼商道商州知州等前往龍駒寨荆子闗一帶河道相視地形詳觀水勢勘丈灘口估計工程隨據該道等繪圖繕冊詳覆前来臣等細加查核只就現在河身平淺之時量為疏濬計用夫匠三十五萬一千六百九十工合動帑銀一萬八千三百九十三兩零臣等仰體皇上利濟民物之懐建萬世平成之績敢不悉心籌畫以為一勞永逸之圖但河道實有難於疏濬之處敬為皇上陳之伏查秦省商州所屬之龍駒寨至河南之荆子闗中間一水名曰丹河西源秦嶺南滙淅川夹乎兩山之中乘其上流之勢紆回曲折經途有三百七十里之遥湍激奔騰灘流有一百八十處之險無旁支以蓄洩無他道以疏通其最險者危巒陡削巨石星羅飛瀑狂瀾衝砂走礫工匠無駐足之地斧斤無鏟鑿之方次險者水溜稍平而淤沙壅塞山根稍遠而亂石縱横欲將淤沙挑挖則河泓一線無隙地可以容沙欲將亂石搬移則壁立兩崖無平原可以壘石若聚沙於山脚則怒濤一刷沙仍壅滯於水中若積石於河干則髙浪千層石復漂流於灘底况夏秋之間豫陕兩省農民均藉丹水灌田各處築堰蓄流涓滴不容滲漏唯餘中泓一線輓運實難至若積雨之後山水驟發田間各堰盡開百谷奔流頃刻水髙丈許此時衝斷縴路人力難施徒歩者尚褁足而不前操舟者益望洋而驚阻所以自古迄今丹河之水聽其自然設有輓運之事唯當隨時疏濬從無永遠通利之方在督臣邁柱此奏原為運道民生起見意非不善奈伊遠在楚疆未能洞悉其形勢臣等身當職守豈敢冒昧以經營訪之土人㕘之輿論皆曰天定無假人為臣等何敢罔恤民勞虛糜國帑再查督臣邁柱所奏原為輓輸楚米起見但臣等前因楚米水陸輓運均屬艱難曾經奏請停運竝請於豫省之河南府及陕州沿河各屬積穀二三十萬石以為陕省源源接濟之用業經奉㫖俞允欽遵在案是此後現有豫省積穀可以就近輓輸不必冄運楚省之糧則疏濬此河尤屬可緩臣等謹將丹河難以疏濬情形據實具奏伏祈皇上睿鑒俯准停止興工則民力不致徒勞而國帑亦可節省矣為此謹奏丹河一水聖祖昔年曾有意疏濬後因勢不可行而止朕深知邁柱係未悉情形之論初閲伊奏即經向大學士等詳諭具故復思當日奉使之臣查勘或有未周須再加審視方足决疑故發廷議今據此奏觀之曷啻蜀道之難原應聽其自然豈可強為施措所見是知道了同日又奏為恭報瑞雪日期仰祈睿鑒事竊照陕省今歲秋収以後民間普種二麥必得瑞雪應時方於麥苖有益兹於十一月初一日西安省城自午時降雪起至初二日寅時止得雪三四寸復於初七日午時降雪起至十一日申時止得雪尺許再查西鳳延三府屬及邠乾同華耀鄜商綏德八州屬各呈報得雪八九寸一尺不等四野普徧於麥苖大有裨益民情歡慶所有瑞雪日期理合具摺奏聞謹奏瑞雪應時預卜来年豐兆實緣卿等忠勤職任感格天地神明獲䝉垂佑也朕曷勝慶喜雍正十二年正月初六日署理陕西廵撫臣史貽直謹奏為請㫖事竊臣荷䝉聖恩特授户部尚書仍暫留西安總理廵撫竝一切軍需事務俟諸務妥協命臣具奏請㫖回京臣何人斯膺兹恩眷感激慚悚圖報無由倘臣心思所能及才力所能勝又何敢稍留餘量上負聖主簡畀寵任之恩下愧臣子宣力奉公之義唯是陕省地方事宜以及軍需重務數年以来臣仰體聖心加意整理諸務悉有章程上下曉然不難遵照辦理而秦民風俗淳良各衙門案牘簡少較之東南不啻什伯又百姓感沐皇仁咸知大義凡遇軍需悉皆踴躍急公争先恐後此種情形臣業經節次奏聞在案使目今諸事未妥臣豈敢因西安廵撫已經補授有人遂萌卸責之念今新任撫臣碩色久任此邦吏治民情素所熟諳一切軍需皆其始終經手臣年来所辦諸事竝皆與之商酌措施又此次陞補司道各官皆平時協辦軍需之員諸務熟諳竝著賢能更足収臂指之效現今唯運米赴肅一事稍覺重大然為數無多更兼年歲豐稔民力有餘又時值春令節候晴和非如九年於四五月間起運長途跋渉暑雨不常者可比至或用車運或用馱載各處風俗不同臣於上年即檄行司道轉飭各屬因地制宜民間甚稱便利至於安設站員接濟飯食草料修理橋梁道路沿途專委大員總理稽查舉凡一切事宜臣早已派撥妥協目前正在陸續起運約計二月初旬即可盡出陕境必無貽誤現在地方情形及軍需事件均無未妥之處用敢據實奏聞伏念臣自雍正九年春月奉差赴陕違侍天顔已逾三載犬馬戀主之心至誠至切倘蒙聖慈俞允准臣回京朝夕敬聆聖訓俾得知所凛遵少展微臣忠愛下悃臣曷任激切屏營之至為此具奏請㫖伏乞皇上批示遵行謹奏覽陜省官民情形及起運軍糧日期深為慰悦至回京之請候朕再加詳酌其遵㫖行同日又奏為聖主之恩施至厚微臣之感愧實深恭謝天恩仰祈睿鑒事雍正十一年十二月二十五日臣標把總自京齎摺回陕接到大學士伯臣鄂爾泰寄臣字札一封内開閩省督撫奏稱史貽直署閩督任内曾長支養亷二千五百九十六兩零應著賠補現在嚴催等語奉硃批史貽直長支銀兩著在潘體豐劉藩長名下追補還項欽此特字寄知臣領閲之餘且感且愧汗浹涕零格外天恩臣夢想所不敢冀望伏念臣之一身蒙我皇上生成教育十有餘年受皇上之恩眷最隆荷皇上之矜全獨厚乃不自謹飭致以長支銀兩玷辱生平既不能檢點於從前復不早彌縫於事後遂被指摘干凟宸聰皇上不加以罪名且寛其責罰免其追補聖恩髙厚曠古罕倫查雍正七年臣奉命署理福建總督印務維時福建初定養亷之項規條草草總督養亷每年應得一萬六千兩該布政司潘體豐呈送養亷或十日或半月陸續解到不比他省按季按月有一定之例也臣隨収隨用亦不曾計月清算至雍正八年三月二十五日奉㫖著臣回京匆匆束装然後將収過養亷通盤核算始知有長支之數彼時臣己將離任實無餘力補還行次中途復奉特㫖命臣署理兩江總督臣星馳赴任兩江地大事繁莅官八月竭蹷不遑未暇計及此事雍正九年到京不數月即奉命赴陕宣諭化導隨辦廵撫事務臣在陕省每年應得廵撫一半養亷銀一萬兩臣因前項未清日夕惶恐兩年以来隨事節省凑成二千五百九十六兩零業於上年九月十三日差臣家人齎往福建補還庫項隨於十二月二十八日准福建撫臣照數収明咨覆到臣乃福建撫臣於臣解還銀兩未到之先業將情由具奏以致上厪君父之懐臣捫心自問罪無可逭法無可原蒙皇上特賜包容曲加矜宥天恩浩蕩至渥至優臣雖庸下具有心胷自此有生之年皆臣竭力之日惟有冰淵愈勵丹藎益抒以仰報聖主鴻恩於萬一耳為此繕摺恭謝天恩伏祈皇上睿鑒謹奏朕洞悉卿非有心之過何用愧為雍正十二年正月初十日署理陕西廵撫臣史貽直謹奏為恭謝天恩竝陳下悃仰祈睿鑒事竊臣近日接到臣子在京寄臣家信知臣兄史貽簡於兵部武選司郎中任内因失察衙役犯贓一案部議降三級調用欽奉特㫖兵部降調郎中史貽簡著照所降之級留任欽此臣聞命之下叩頭伏地感激涕零以無可寛宥之罪戾荷蒙皇上特賜寛宥以無可加恩之小臣荷蒙皇上格外加恩微臣兄弟撫躬自省亦何幸而遭逢聖主受此殊恩伏念臣兄史貽簡於雍正六年由内閣中書歴俸陞選山東東昌府同知臣揣其才具必不能任外吏據實奏明仰蒙效徒以賦性闇昧遇事疎忽以致衙役犯贓全無覺察竊思臣兄史貽簡䝉特恩加等陞用之員遇有過愆即加倍議處亦分所當然乃蒙皇上特頒諭㫖仍留原任似此異數鴻恩實為從来所未有臣之一家雖生生世世子子孫孫亦莫能仰報髙深於萬一也抑臣更有不得己之下悃不敢不據實直陳於君父之前竊臣兄史貽􅂤賦質樸誠見事遲鈍既乏應通達以之為外任固屬萬萬不能即兵部選郎亦聖恩下虧臣職𫉬罪益重抱疚益深清夜捫心何安何忍臣不揣冒凟仰懇皇上天恩解其兵部郎中之任賜以閒散衙門無兵刑錢穀之責俾其效力行走庻或可以始終保全臣蒙皇上天地父母之恩逾常越格用敢敬申下悃干冒宸嚴臣曷任感激悚惶之至為此恭謝天恩謹奏覽奏已悉候遇便裁酌雍正十二年二月十七日署理陕西廵撫臣史貽直臣碩色謹奏為雨雪應時疊降麥秋豐稔可期據實奏聞仰慰聖懐事竊照陕省地方上年冬月瑞雪普徧業經臣史貽直奏報在案今自正月以来連降雨雪各屬均霑據西鳳二府屬及同華等州屬各報自正月初一及二十七八等日或雨或雪俱入土四五寸不等而邠州乾州一帶正月二十七日得雪獨多自八寸以至一尺不等延榆漢三府屬及綏徳等州屬各報正月初一十三十五二十七八等日各得雪三四寸以至七八寸不等近又據西安府屬具報二月初七八九等日連得雨雪入土四寸現在陕省各屬麥苖暢茂萬姓歡欣至米糧時價有減無增省城粟米豌豆每京斗價銀八分零小麥每京斗價銀九分零所有陕省連得雨雪竝米糧時價理合具摺奏聞謹奏覽奏陕省連得雨雪二麥有秋洵可期矣朕懐曷勝欣悦雍正十二年三月二十六日署理陕西廵撫臣史貽直謹奏為密陳陕省武職人材仰祈睿鑒事竊臣奉命署理西安廵撫三年以来無時不以察吏安民為念至於通省武員雖非臣所統轄然臣荷蒙聖恩髙厚逈越尋常既已身任封疆則武臣之優劣亦不敢不留心體訪謹將臣所知者為我皇上陳之查西安滿洲右翼副都統達色辦事精詳識見敏捷凡管束旗員以及練兵挑甲悉皆公正無私毫不瞻徇微惜其氣體稍弱局量不宏此外如興漢鎮臣張傑臣從前署理福建總督時伊曾為臣標中軍副將其人心地光明器量濶達抑且久歴戎行熟諳軍務今蒙聖恩擢授興漢總兵自莅任以来整飭營伍訓練官兵調度合宜措施悉當洵為陕省鎮臣中之聲名最優者督標中軍副將王友詢人材偉幹殫力奉公督臣雖遠駐肅州而伊訓練標兵不懈承辦本標軍需事件竝皆妥協安詳人亦老成持重鳳翔協副將米國正漢仗驍雄曉習軍旅前署興漢總兵及現今鳳協任内皆能稱職西安城守營㕘將現署潼闗協副將事王廷極操練士卒防守地方實心實力近見其修整煙墩稽查闗口亦井井有條頗有才幹又臣標左營守僃徐子茂人材壮健弓馬熟嫺凡料理營務以及委辦軍需悉皆奮往向前勤慎明白至若延綏一鎮東接晉疆西連甘界南障西安省屬北控鄂爾多斯統轄有三十六營之多綿亙有一千餘里之遠居斯職者非素有威望之員難以勝任現署延綏總兵印務花馬池副將惠延祖雖小有才幹而操守平常行止浮動署任數載不得兵心凡所行為俱不協於人望以臣觀之似不稱延綏總兵之任以上各員止就臣所知者據實奏聞是否有當伏乞聖明睿鑒謹奏甄別詳確甚與朕意相合同日又奏為奏聞事伏查陕省今歲正月以至二月初旬雨雪應時二麥盛長臣業經具摺奏聞今查陕省各屬府州縣自二月到今疊降甘霖油然沛然至霑至足臣每因公事親歴郊原伏見禾苖暢茂穠緑盈疇不但二麥可卜豐登其餘豌豆菜子以及各種雜糧竝皆碩大蕃多倍於往歲臣細問田間白首鄉農提携婦稚無不環列臣前僉云今歲麥秋實近年所罕見歡欣舞蹈頌我皇仁臣謹將年歲情形以及民心歡樂之處具摺奏聞謹奏雨水禾苖田野情形宛然在目朕懐為之深慰雍正十二年四月初六日署理西安廵撫臣史貽直臣碩色謹奏為據實奏聞仰懇天恩事竊查渭南縣民李悉義李月賢同謀勒死李全義一案前據渭南縣知縣岳冠華審擬斬絞由府司詳解到院經臣史貽直同協撫臣鄂昌覆審具題經部臣以李悉義應擬斬決等因題駁隨復轉行審擬間忽據按察使何師儉報稱前詳勒死之李全義自行投到據此伏查此案前據該縣岳冠華以李悉義誘姦李全義之妻恐其覺悟故邀同李月賢將李全義用繩勒死棄屍井中是以將李悉義李月賢擬以斬絞今李全義竝未身死自行投到臣等聞之不勝駭異因事闗重案隨批飭同城司道公同㑹審去後今據按察使何師儉會同布政使楊馝驛傳道任晟訊供詳報李全義原因李悉義誘姦其妻假神嚇逼於雍正九年出外未歸而謀死在井之説實出於寡婦張氏巫覡通傳之口乃知縣岳冠華竝不詳察確情躧尋踪跡因於枯井内起出屍骨隨謂謀死李全義無疑遂將李悉義疊夹成招且將張氏通傳情節一并删去以杜上司駁詰之端又故為旋風繞身之誕詞以神其事以逞其才今李全義既經歸里則井内屍骨另當究訊而岳冠華之煆煉虛招草菅人命百喙何辭除將岳冠華㑹疏題㕘并從前審轉之知府烏靈阿陞任按察使楊馝及臣史貽直一并檢舉現在具題請㫖敕部議處外查李悉義姦拐李全義之妻尚有應得之罪而案内李月賢乃無干之人從前錯擬絞罪則審轉之司府例應分别降調革職臣等何敢更置一詞但思此案實係岳冠華自逞才能删詞詭詳煆煉成獄而李月賢等又畏懼該縣於解審之時直認不辯以致司府各員據詳審轉情似可原臣等不揣冒昧仰懇皇上天恩俯念陕省現值軍興需才辦事可否將楊馝烏靈阿應得處分恩賜從寛仍留在任俾其效力以贖前愆則不特該員等仰沐鴻恩益當感愧圖報而臣等亦可収臂指之效矣謹繕摺具奏伏祈皇上睿鑒施行為此謹奏知道了具題到日酌量有㫖雍正十二年六月二十五日署理西安廵撫臣史貽直臣碩色謹奏為遵㫖代奏事竊照旗員隨任子弟年十八歲以上者悉令歸旗肄業或披甲食糧乃皇上教育之天恩而另有情節不能相離者又准臣等代奏尤聖恩俯體下情之曠典臣等查得興安州陞任州同張毓珂係正黄旗漢軍張達佐領下人自雍正七年調赴軍前今經六載前雖題補綏徳州知州然仍留軍前尚未回任伊父原任監察御史張文教年已八十七歲迎養任所自毓珂調赴軍前之後惟次子張毓璋在任侍奉父子相依今因毓璋年逾十八例應歸旗臣等屢經查催而張毓璋以父年遲暮老病日增實難離侍懇請留養俟伊兄回日歸旗等情具呈到州由布政使楊馝詳請前来臣等伏查張毓珂既在軍前不遑事父而張文敎年逾八旬老病日篤則張毓璋實有不能相離之下情可否仰邀皇仁俯准留養俟張毓珂回任之日再令張毓璋歸旗臣等未敢擅便理合繕摺代奏請㫖伏祈皇上睿鑒施行為此謹奏准其留養仍咨明該旗知道同日又奏為恭報得雨日期仰慰聖懐事竊照陜省二麥収成之後民間布種秋禾必須雨澤應時禾苖始能滋長自入夏以来天時稍覺亢旱雖曾得雨數次田疇未能霑足農民望雨甚切今於六月十七十八十九二十等日甘霖大沛晝夜滂沱西鳳二府屬邠乾同華耀商等州屬各具報得雨一二尺不等四野均霑禾苖暢茂且此番得雨正直初伏之時於秋禾大有裨益民情歡樂共慶有秋所有陕省得雨日期理合具摺奏聞為此謹奏覽時雨霑足情形朕心之喜筆莫能罄雍正十二年九月三十日署理西安廵撫臣史貽直臣碩色謹奏為恭報得雨日期仰慰聖懐事竊照八九月間正值陕省秋禾秀實二麥播種之際前因雨澤愆期農民望雨甚切臣等率同文武各官虔誠祈禱業經具摺奏聞自具奏之後續據漢中鳳翔及邠乾耀興商鄜等府州俱屢報連得透雨惟西安府屬及同華二州屬雖於九月初四初八十六十八等日各得雨數寸然究未霑足亦未普遍今於九月二十九日未時起至三十日辰時止共得雨一二尺不等現在濃雲密布雨勢未止民情歡慶歌咏太平雖此番得雨較遲秋榖収成分數不無稍減然秦民所重在麥今得此甘霖髙低田畝二麥遍種則来歲夏収庶可有望閭閻尤為慶幸所有得雨日期及陕省二麥普種情形理合繕摺奏聞謹奏自閲前摺以来朝夕翹首西望今據奏得雨如是深透豈止憂懐頓釋且不禁額手稱慶也雍正十三年正月二十九日署理西安廵撫臣史貽直臣碩色謹奏恭請皇上聖安朕安鄂昌係因汝等推薦始加擢用未料少年福淺負朕委任至於如此之甚不但行止乖謬且日入醉鄉前在陕時汝等豈竟毫無知覺耶同日又奏為仰懇聖恩簡補道員以重地方事竊照西安驛鹽道任晟於上年十二月二十七日病故臣等另疏題報外伏查驛道一缺總理通省郵傳今又兼理鹽法必須才守兼優之員方克勝任今陕省所屬各府或係新任未久或係循分供職竝無可以題補驛道之員伏乞皇上特簡賢員補授庶要缺得人而臣等亦可収臂指之效矣為此繕摺奏請仰祈皇上睿鑒施行謹奏有㫖諭部矣雍正十三年三月初四日署理西安廵撫臣史貽直臣碩色謹奏為彚奏雍正十二年社倉糧石數目仰祈睿鑒事竊查陕省社倉糧石臣等於上年四月内查明除民借外實貯穀四十七萬一百七十九石零業經奏聞在案嗣後飭令各州縣稽察經理照例於歲暮分晰開報竝行據布政使程仁圻彚核呈齎前来臣等統計雍正十二年分共収過生息穀一萬二千五百五十二石零又収續捐穀二百石連上年原奏穀六十三萬八千八百八十七石零共該實存穀六十五萬一千六百三十九石零内除給過倉正倉副口食竝修倉鼠耗等項實應存穀六十四萬六千九百四十七石零内民借未還穀二十三萬九千九百七十二石零應俟収穫之後聽倉正倉副經理收還臣等仍飭令各州縣加意稽查外現存穀四十萬六千九百七十五石零其出納支存各數目應俟十三年年底照例查報另摺具奏所有十二年社糧數目理合繕摺奏聞謹奏當核明確實數目無俾屬員虚捏徒美觀聽雍正十三年四月初七日署理西安廵撫臣史貽直臣碩色謹奏為恭報甘霖疊降通省均霑仰慰聖懐事竊查陕省西鳳邠乾等府州二月内所得雨澤臣等前已奏聞在案其餘各屬雖得微雨數次究未普徧霑足兹據西延鳳漢榆五府屬并邠乾耀同華興商鄜綏葭等十州屬各具報於三月二十一二十三等日得雨三四寸以至五六寸不等又於二十五日連得透雨自五六寸以至七八寸不等又於二十九日寅時得雨起至申時止入土尺餘現今四野霑足二麥暢茂糧價大減所有節次得雨日期理合繕摺奏聞謹奏春雨如膏最為難得豈止二麥暢茂諒秋禾亦大獲滋培矣覽奏甚為欣慰署理西安廵撫臣史貽直謹奏為覆奏事本年三月初九日欽奉到臣等恭請皇上聖安一摺奉硃批朕安鄂昌係因汝等推薦始加擢用未料少年福淺負朕委任至於如此之甚不但行止乖謬且日入醉鄉前在陕時汝等豈竟毫無知覺耶欽此臣跪讀之下汗流浃背惶悚無地臣以庸下之才荷蒙聖恩畀以封疆重任凡所屬各官之優劣倘有灼知不敢不據實入告伏查鄂昌於雍正十一年二月奉㫖協辦西安廵撫事務於四月二十日到任臣與之朝夕共事見其恂恂謹飭少年老成凡遇地方案件以及軍需事宜甚肯虚懐講求細心學習是以將鄂昌及平日所知之各員一併具摺奏聞至鄂昌前在西安臣除同辦官事外間有會席之處從未見其於人前縱飲或其私居飲酒亦未可定但臣與之分居各署原未留心訪查實臣疏忽之咎伏思鄂昌以新進小臣蒙皇上鴻恩不次超擢自應夙夜恪共力圖報稱乃竟敢上負聖主簡畀隆恩且日入醉鄉漫不留心政務由此觀之不但其福量淺薄兼可謂下愚不移臣實不料其䘮心病狂一至於此至臣昧於知人不能聽言觀行誤將此等庸劣之員冒昧保薦濫舉之罪實不可逭臣曷勝惶恐悚惕之至緣奉硃批諭㫖理合據實覆奏為此繕摺謹奏經歴此番當深以為戒凡事稍存纖芥之私未有不貽後日之悔者大則噬臍莫及小亦見輕於人所以智者預鑒而不為也雍正十三年六月十五日署理西安廵撫臣史貽直臣碩色謹奏為再籌因時買麥以敷撥運之倉項事伏查闗中為四塞之區歴来軍糈民食均頼本地之収成非若闗東各省水陸交㑹舟楫相通可以仰食於鄰封也頻年軍務繁興而兵食充然有餘即偶值歉収而民間不至乏食皆賴倉貯豐裕得以接濟兵民是預僃倉儲實陕省第一要務故臣等於前歲上年節經奏請買麥買穀俱蒙俞允欽遵在案今查西鳳邠乾等府州從前運送軍糧共動京斗倉穀六十七萬石内除節次奏明動銀十五萬兩内用銀十四萬七千五百兩已買還穀三十六萬四千九百八十餘石又奏明將平糶穀價買麥易穀除買還原穀外多出餘麥共易穀十萬七千七百七十石零又上年奏明酌動銀五萬兩買貯麥六萬二千七百一十三石零已於今春糶借應俟秋後照一麥二穀之例易穀還倉共應易穀一十二萬五千四百餘石統計以上抵還穀五十九萬八千餘石較原運之數尚缺七萬餘石原應俟秋収之後買穀還倉但上年已買之麥或借或糶均應秋後易穀而今春借糶之糧亦應於秋後還倉若再發銀採買恐致穀價翔踊有妨民食查今歲夏麥豐収倍於往歲現今糧價日賤西鳳等處每京斗麥一石價銀八九錢不等况五月内甘雨連旬秋禾暢茂夏麥已慶盈寧秋収又復可望今於六月初一日以後天氣晴霽糧價自必益賤臣等愚見似應再動五分公用銀五萬兩酌發産糧價賤之處買麥存貯俟来春借糶秋後易穀則漸次經理倉項得以補還而邊陲要地兵民皆有攸賴矣除行布政司及時辦理外謹繕摺具奏伏乞皇上睿鑒施行謹奏通融辦理甚屬合宜如應咨部存案咨明該部可也同日又奏為奏聞事臣等伏查甘省之㑹寧靖遠固原環縣等處民間多食窖水今歲春夏之間雨澤愆期水草缺乏誠恐彼地百姓有就食鄰封者臣等業經飛飭各屬如有甘民到陕務須照料安插兹據隴州汧陽二州縣已報有固原等處就食貧民一百五十三名口臣等仍飭該州縣加意撫綏安插無致失所併俟各府州查報到日将應於何時資送回籍之處咨商甘撫臣許容會同辦理外謹將安插甘民緣由繕摺奏聞謹奏就食貧民務宜實力撫恤不可虛應故事以圖塞責硃批諭㫖巻二百七下
