body:
  text: 欽定四庫全書硃批諭㫖巻五十八硃批郭朝祚奏摺雍正七年閏七月二十一日湖南按察使臣郭朝祚謹奏為遵㫖囬奏事雍正七年閏七月十九日奉湖南巡撫臣王國棟傳㫖聞按察司郭朝祚一味柔善因循沽買名譽朕許兩司俱得摺奏從未見伊將所聞所見據實上陳以盡臣子之心惟以茍且塞責迎奉上司為得計觀伊志趣似欲仍學伊父當日積年老練巧詐鑽營以為一生安享子孫受用之光景殊不知大謬矣爾傳諭令伊學趙𢎞恩行事若不肯悛改如夢醒醉覺洗滌肺腸恐一旦禍及身家將伊父從前欺詐負國婪贓不法處逐一發擿時莫謂朕不敎而加之處分也諭伊深思朕拔擢之恩為伊父蓋愆之道今此訓諭之㫖並伊自身所立之志反覆揣量是非利害輕重大小而為之可也明白向伊傳㫖令其差人來京到大學士張廷玉處轉奏等因欽此欽遵臣即望闕叩頭祗聆訖伏念臣至微至賤䝉聖主不次超擢五年之内自知府歴陞臬司皆荷特恩雖肝腦塗地難以報稱若稍有沽名釣譽迎奉上司茍且塞責之處不特有負㫖摺奏皆係謹密遵奉此時臣尚在道府之任未奉通行知照至雍正六年十二月初一日到按察使任臣智識短淺以為兩司必須特奉諭㫖方可摺奏臣以未經奉㫖不敢冒昧具奏今荷聖恩命巡撫臣王國棟傳㫖令臣差人到大學士張廷玉處轉奏跪聆之下感激涕零惶恐無地竊思臣屢䝉聖主擢用之恩并念為臣父蓋愆之道今此訓諭之㫖臣自身所立之志清夜捫心自問汗流浹背實無地以自容伏讀諭㫖如夢醒醉覺惟有凛遵聖諭奮發悛改洗滌肺腸竭盡駑鈍凡有見聞即據實陳奏學趙𢎞恩之做官實心辦事以仰報髙厚洪恩於萬一耳理合遵㫖恭繕奏摺差家人馳赴大學士張廷玉處轉奏伏乞聖主睿鑒施行謹奏世間禍福榮辱靡常惟人自取而巳所謂自取者在行不在言也豈可徒以紙上一篇語言文字而欲聳動朕之耳目耶觀汝湖南雨𤾉年歳汝等大員刑政之得失吏治之優劣不問可知上天所嘉者惟公與誠所棄者惟私與偽能知天道斯克盡人道天下未有克盡人道而猶慮獲罪於君上之理為人臣者要須見理明立本固若大本不立而惟於枝葉上施為不肯為國致身任勞任怨一味巧猾譎詐冀幸保全功名身家豈可得乎更有將國法王綱藉為積隂功之具假公濟私如汝父一流不明大體不學無術之姦猾老吏軰種種謬論悉不可為訓亟宜敬慎秉公實力報效以期克盡人道庶無忝厥職不然朕諄諄屢諭付之流水違訓之罪必不汝貸汝能當否嗣後倘仍不洗心滌慮奮勉自新猶循故智以為老成穏當執定庸愚謬論奉為龜鑑牢不可破至噬臍無及時追思今此之恩諭晚矣硃批諭㫖巻五十八
