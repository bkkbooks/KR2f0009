body:
  text: 欽定四庫全書硃批諭㫖巻六十一硃批汪漋奏摺雍正四年二月二十四日廣西廵撫臣汪漋謹奏為遵㫖查覆事竊臣扵雍正三年十月二十七日赴圓明園謝恩蒙皇上召至勤政殿訓諭地方事宜又䝉諭臣到廣西訪左江總兵官梁永禧居官如何據實具奏欽此欽遵臣到任後因左江總兵官駐劄南寜府與桂林省城相距甚逺臣宻加訪察梁永禧辦理營務尚去得在地方亦不多事臣謹據實具奏伏惟我皇上至聖至明無逺不燭凡臣下賢否之分難逃日月之照臣履任日淺耳目未周不勝惶懼之至仰祈皇上睿鑒謹奏既云履任日淺耳目未周則辦理營伍去得在地方亦不多事之奏亦屬荒唐南寜至桂林不過數日之程即以為相距甚逺京城去粤西數千里之遥而謂朕之聖明無逺不燭其賢否之分難逃日月之照云云何不體情理一至於此耶爾初次奏摺即如此依違瞻顧居心不純已見一斑殊大失朕之所望封疆大吏既受國家知遇之恩當思竭力盡命之義切忌柔佞巧詐獨善巳身而不乃心國計朕披閱所奏甚憂汝不克勝此任也勉力為之書生章句虚文非此任所需之物茍不以實心行實政秉公甄別賢否據實入告動輙瞻前顧後持首䑕兩端之見以圖自便則大負朕任用之意矣勉之慎之雍正四年五月二十五日廣西廵撫臣汪漋謹奏恭請皇上萬安朕安捐穀之奏交部議行摺留中候部文行知同日又奏為恭報雨水米價事竊粤西春雨連綿已資耕種入夏晴雨相間五月初農家栽插正殷尤望時雨喜初四夜至初六日甘霖大沛各屬俱報霑足栽插適宜農人僉云雨澤應時可望豐年再米價二三月間倉斗每石七錢嗣因廣東販糴頗多致廣西之沿河府州縣米價漸長梧州因接近廣東商販絡繹其價尤貴現今桂林府米價九錢平樂潯州南寜栁州等府米價八錢四五分不等梧州府米價一兩四錢當兹青黄不接之時米價日長捐穀存七糶三現奉俞㫖臣巳令各屬平糶以裕民食至粤西麥已成熟但種麥之處甚少我皇上軫念民瘼遐方赤子時厪聖心所有雨水米價謹繕摺奏聞臣謹奏天下一家何分彼此隣省遏糴之舉當知斷不可行同日又奏為叩謝天恩事臣齎摺人回捧到臣查奏梁永禧一摺恭奉硃批飭戒臣跪讀之下戰慄汗流置身無地愚闇冒昧罪不容逭䝉皇上恩賜矜全不即罷斥復荷硃批諄諄訓勉即祖父之教子孫師長之訓弟子不能如是臣恭繹再三涕零感激惟有時凜聖訓實心以行實政秉公以別賢否屏絶虚文黽勉盡職以期無負皇上任用之至意并稍贖罪愆於萬一耳謹繕摺恭謝天恩臣謹奏天下類此者頗多皆縁私心未融識見不髙舉歩即履此取愧之途也公之一字最為切要時當自省雍正四年六月十六日廣西廵撫臣汪漋謹奏為恭謝天恩事竊臣奉旨調補江西廵撫業經恭疏叩謝天恩伏念臣賦質駑鈍毫無才識叨沭皇上特達之知畀以廵撫重任受事半載未效寸長臣前遵旨查梁永禧居官之處冒昧具奏罪不容逭皇上恩賜矜全不即罷斥硃批諭飭訓勉諄諄臣頂戴洪恩日夜恐懼勉盡職守猶慮隕越重厪聖懐今調補江西廵撫聞命自天感恩無地雖捐糜頂踵難報殊恩扵萬一臣謹扵六月十七日起行馳赴南昌所有廣西事務另摺具奏為此繕摺恭謝天恩臣謹奏勉之毋沽虚名毋做假好官振起精神勉勵造就成一人物方不負朕之委用也同日又奏為奏眀出糶捐穀事竊臣前因廣東米價騰貴商販絡繹扵廣西搬運甚多致瀕河郡縣米價日長而梧州府尤甚是以摺奏捐穀存七糶三䝉皇上恩允已飭各屬開倉照時價出糶其初民間價平每石自三錢以至四錢二三分不等後漸增長若倉穀亦照市價加增恐兵民皆憂米貴食用艱難臣仰體皇上愛育羣黎之意飭各屬仍照初糶價值不許随市價增長并不得賣多報少雖陳穀碾米視新穀畧少然價平易糶饔飱有賴兵民莫不歡欣共戴皇仁合計桂梧南栁四府捐穀已糶過十六萬五千石零俟新穀登場停止又平潯二府亦照例存七糶三應扵秋收後買補還倉以符部議價有贏餘若干仍歸解部項下統俟新撫臣甘汝來接任料理縁係臣任内事務理合奏明仰祈皇上睿鑒臣謹奏甘汝來接任料理諒應妥協不至差謬也同日又奏為敬舉廉能縣令事竊臣受事廣西細訪屬員有平樂府平樂縣知縣吳元鉽持躬清廉辦事練達催科有法又實心撫字民切愛戴賔州上林縣知縣栢𢎞智才具勤敏扵猺獞仇殺案件剖理審結勸懲得宜愚頑知警以上二員上年計典内督臣孔毓珣前撫臣李紱俱經附薦兹臣察其居官果係廉能著有實績不敢壅扵上聞謹繕摺具奏仰祈皇上睿鑒臣謹奏知道了但汝此奏不過循孔毓珣李紱之軌轍耳大凡他人之指使萬不可從究須自立主見方好同日又奏為奏眀拏獲礦徒事竊梧州府屬蒼梧縣有芋莢山其地接連廣東為開建賀縣蒼梧三縣分轄之區峻嶺窮崖徑路岐出近有廣東饑民同蒼梧賀縣愚民潜往此山偷穵礦砂臣随飭蒼梧縣協同武弁嚴拏驅遂昨據蒼梧縣禀報已經拏獲二十九人懲治竊思此輩不過乏食窮民妄希覔利餬口但恐蟻聚無常貽害地方臣曾經咨商督臣孔毓珣提臣韓良輔嚴飭員弁勤加防禦相應奏眀仰祈皇上睿鑒臣謹奏既知係乏食窮民即當籌畫其食使至不乏斯地方安寜矣何須防禦然未聞善良百姓偶因乏食遂敢為非也類此等語悉屬迂見雍正四年八月初一日江西廵撫臣汪漋謹奏為奏聞事竊臣䝉皇上洪恩調補江西廵撫扵七月十三日到任受事旬餘適逢科場監臨所有地方一切應行事宜容臣體訪確實次第另摺奏聞查江西省米價入春來較之往嵗似覺稍昻仰賴皇上福庇五六月間雨水調勻臣到任正當早稻登場訪察各屬收成分數據報南昌等十三府收成約有八九十分不等俱屬豐收又據南昌瑞州袁州臨江撫州廣信饒州南康九江南安等十府報到米價毎倉石自八錢七八分至九錢四五分一兩不等惟吉安建昌贑州三府米價自一兩一二錢至一兩三四錢不等以界聨閩廣買米者多是以價值稍昻但早稻既獲豐收價亦漸減交秋以來各屬雨水霑足晚禾暢茂間有近扵江湖低窪之處畧被水淹者水退種烏禾雜糧可望收穫民生有賴共樂昇平臣謹奏覽所奏收穫并米價情形深慰朕懐同日又奏為恭繳硃批奏摺事雍正四年七月二十八日臣齎摺人回至江西捧到御批奏摺理合恭繳所有臣前任廣西委員監收潯州稅務臣愚昧不明誤用右江道喬于瀛臣獲罪實深荷䝉皇上天恩硃批訓示臣不勝戰慄惶悚之至臣謹奏所奏知道了用人何能保無錯悮但若有心狥私則雖戰慄惶悚亦復何益同日又奏為欽奉上諭事臣䝉皇上天恩調任江西廵撫扵到任後查前撫臣裴􅏍度任内接准部咨内開欽奉上諭著將江西存倉之穀碾米十五萬石動用脚價遴委能員即速運至閩省交界地方先期知㑹閩省督撫委員領去分給各地方以濟民食等因欽此經前撫臣轉行欽遵在案臣體皇仁遵即通查江閩交界地方嚴檄就近碾米委員速行運送已扵七月十八等日將南昌等三府現在碾就米二萬石先行押運經臣具䟽題報仍飭該管知府陸續随碾随運正嚴檄飛催間旋扵七月二十四日接准到福建撫臣毛文銓咨文内開閩省各屬六月以後雨澤及時早稻登場晚禾無不布種民心大定米價漸平此項奉𤼵之米似可從容緩運現在從長計議具摺請旨遵行除巳碾者聽先期知㑹領運外所有未碾者希即暫停恭候硃批至日另行知㑹撥運施行等因移咨到臣是福建六月下旬以後雨澤及時米價漸平閩省之民仰賴皇上洪恩漸次可以樂享豐年而皇上宵旰憂勤宸衷亦可稍舒矣此項碾運米石可否暫停緩運理合繕摺請旨伏候皇上批示遵行至所有巳經碾成米石現在仍檄令委員陸續押運合併聲眀臣謹奏已另有旨諭該部矣雍正四年九月十八日江西廵撫臣汪漋謹奏為陳眀江省被水情形事竊江西八月初旬以來霪雨連綿至八月十五六等日山水湊集江湖泛漲一時不能消洩以致省㑹之南昌新建進賢豐城徳化龍南並建昌清江等八縣各低窪田禾被水淹沒居民房屋間遭傾圯龍南一縣倉穀亦被浸濕經臣先後題報在案併即飛查南昌省㑹向有府道公捐節備倉一項並臣倡率司道公捐銀兩分𤼵各縣令地方官親往確查田畝成災及倒塌房屋實在被災窮民先行按户賑恤撫慰得所現在民情安帖至查南昌等八縣被水地方原係濱江帶湖低窪之地故易為災其髙阜之地晚禾俱各無恙惟是南昌新建二縣係江西省㑹進賢豐城亦與省㑹不逺因有被災百姓紛紛赴臣衙門呈請宜禁閩廣兩省搬運米石雖經臣撫慰去後然未雨綢繆所當仰體聖衷周詳籌畫臣已另摺奏請旨兹将被水情形據實奏聞臣謹奏覽奏已悉另奏一摺現發部議同日又奏為請旨事竊查臣屬南昌府寧州知州李化龍扵本年四月内到任接受前任劉世豪那缺流抵倉庫銀米未清因南昌知府張景偉力為擔承立有印約定限雍正五年奏銷前如數清完該牧業經出結接受在案今扵九月十二日據該牧將接受銀米未清前情據實自首通報到臣併申報欽差部臣邁柱前任撫臣裴度均請清理随據布按二司及糧道等㑹同揭報前情同日又准裴􅏍度咨同前由令臣㑹疏題㕘臣思州縣錢糧豈容那混該知府張景偉顯有勒令交代情弊例應糾㕘但細繹原奉上諭命部臣邁柱來江清理是此案似應㑹疏經臣備文咨商旋准邁柱咨覆内開查本部奉命來江專為徹底審究徳安武寜等縣各虧空揑稱民欠併闔省交代未清上司抑勒出結等案今李化龍自首之案正本部奉旨同藩臬二司竭力清查案内之事現在㑹同清查審理本部不便逐案具題俟闔省此類案件盡行審理清楚具題之日再行咨達等因到臣是寧州銀米未清之案臣應聽候欽命部臣邁柱将闔省似此類案件盡行清楚具題完結但臣本愚鈍恐蹈欺隱之愆可否聽臣糾㕘抑或統聴邁柱徹底查察清楚完日一併彚題臣謹繕摺請旨伏候皇上批示遵行臣謹奏自應聼候邁柱於徹底清查案内完結何必重複具題雍正四年九月二十八日江西廵撫臣汪漋謹奏為欽奉上諭事竊查江西省因廖科齡虧空一案蕭彬互揭知府李熙驛鹽道孫蘭苾一案皇上特命部臣邁柱來江審理並令前任撫臣裴􅏍度留江將従前一切流抵民欠陳奏清楚仰見我皇上眀並日月國計民生均有裨益惟臣以履任之初事闗通省錢糧雖巳欽命部臣清理而身任封疆刑名錢穀實為總滙臣扵監臨撤闈後業已嚴加核查并分檄飭行各屬将從前一切交代有無抑勒接受未清之項令各州縣自行首出外仍将臣衙門原存前撫臣裴􅏍度任内一切交代案巻徹底稽查經臣現在查出並據各知府報到者有南昌府屬之寧州豐城建昌府屬之南城南豐臨江府屬之新淦新喻贑州府屬之興國共一州六縣除寜州那缺縁由臣前經具摺奏眀外所有豐城等六縣各以民欠交代流抵接受前任認徵之項可否聽臣逐案㕘出審追抑或仍欽遵上諭聽部臣邁柱同前任撫臣一一陳奏清楚臣未敢擅便伏乞皇上批示遵行再臣查前候補知府王景望條陳抑勒交盤者州縣直掲部科經部議嗣後州縣交代除實在民欠外其有巳徵在官之錢糧侵蝕虧空捏稱民欠令接任官接受者接任官即行揭報部科等因移咨到臣臣細繹部文係單指侵蝕虧空揑稱民欠者言其有實在未完民欠州縣因畏奏銷時未完之處分輒那動存庫銀兩将前項未完民欠先行墊解奏銷時即将前項民欠報作完數冀欲扵次年徵完前項民欠以抵那動存庫之項及至解任交代上司往徃以實有民欠可抵輙勒令新任官接徵此等民欠将来作何處分督撫應作何畫一辦理部内並未議及伏乞皇上敕部一併議覆施行臣謹奏交與邁柱者自應邁柱辦理其未議及者汝為廵撫乃一省綱領莫非責任内應辦之事又何庸敕部議覆耶雍正四年十月二十九日江西廵撫臣汪漋謹奏為請動常平倉穀石借給災民以廣皇仁事竊臣屬今嵗八月内秋雨過多一時山水陡𤼵江湖泛溢致南昌等十一縣被水情形經臣先後題報除龍南永新二縣勘不成災外将南昌新建等九縣查勘成災分數造冊題免在案所有應行賑恤之處臣仰體皇仁業将省城公捐節備倉餘存穀價并臣倡率司道公捐銀兩𤼵給各縣先行按户賑恤訖随經臣查節備倉實貯穀一萬七千餘石均令開倉分𤼵各縣碾米煮粥賑濟俱扵十一月内開賑至次年正月止所用煮粥柴薪人工器皿等費俱扵存公銀兩内給𤼵並不動支倉庫正項無庸題銷現在臣巳随宜料理民心安定可不至上厪聖衷矣惟是被水人民凡八九十分成災者今嵗晚禾無收則眀年春夏耕種無資勢必至荒蕪田畝臣仰體皇上軫念元元至意請将被水各縣存貯常平倉穀石扵雍正五年春初借給實在被水人民為春夏耕耘之資令地方官查造花名清冊取具借領至秋成豐收後還倉是否可行出自洪恩伏乞皇上特頒諭旨令臣遵行以布皇仁臣謹奏督撫大吏代朕宣猷布化責任綦重簡用失人乃朕之大過地方水旱成災事所必有此天理之當然者也硃批諭旨巻六十一
