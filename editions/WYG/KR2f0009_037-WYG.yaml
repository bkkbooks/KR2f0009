body:
  text: 欽定四庫全書硃批諭㫖巻三十七硃批吳存禮奏摺康熈六十一年十二月十八日江寧廵撫臣呉存禮謹奏為欽奉上諭事竊照康熈六十一年十二月十六日臣接准吏部咨開奉㫖先聖主一應硃批諭㫖俱著敬謹收集彚繳欽此欽遵敬惟我皇上乗乾御宇應運當陽統六合以敷仁謨烈仰升恒之盛撫五辰而出治臣民覩作述之隆伏查臣自康熈四十九年陞任滇撫於五十五年調任江撫所有歴年奏摺除䝉先聖主已經發部及未奉硃批者不敢進呈外今將遵奉硃批奏摺臣按年順序共計四十三封恭呈御覽此外臣斷不敢抄冩存留隱匿燒燬遺失自干重罪目今江省雨水調勻人民安業米價白米每石一兩一錢五分梭米一兩麥七錢五分豆七錢為此繕摺奏聞伏乞聖鑒臣無任瞻仰之至謹奏爾向來居官聲名平常而且偏於軟懦朕初御極一切仰體皇考深仁厚徳六十餘載之用人行政立意保全爾等中外大臣爾諸臣亦當勉力自愛以清正率屬教養百姓撫安疆宇庶克成全朕之孝道諸如收受節禮陋規侵蝕空糧以及縱容地方豪富等弊若仍蹈前轍怗惡不悛國法無私噬臍何及查弼納來時朕已曽詳悉靣諭爾其加意振作更改一畨方不負朕容爾自新之大恩也再者爾薦舉㕘劾屬員務須一秉至公以鼓舞人材倘狥私納賄顛倒是非不符衆論則欺誑之愆朕不為爾逭也勉之慎之硃批諭㫖巻三十七
