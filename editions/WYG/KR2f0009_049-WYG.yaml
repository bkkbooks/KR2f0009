body:
  text: 欽定四庫全書硃批諭㫖巻四十九硃批莽鵠立奏摺雍正二年四月十五日廵視長蘆鹽課監察御史臣莽鵠立謹奏為欽遵諭㫖事竊臣一介庸愚至微至陋荷䝉皇上特簡廵鹽於雍正元年五月初八日恭請聖訓欽奉上諭長蘆鹽法大壊今特簡爾前去清除弊端整理鹽法非二三年不可爾若能於一年之内辦理妥協亦即奏明更換欽此欽遵臣自受事以來冰兢自持留心訪察一切有關鹽政者盡力興除總以甦商裕課為念不敢少懈其長蘆鹽務規模已定臣於本年正月内在京曾經奏明今山東鹽務臣於二月十八日甫到濟南率同運司漆紹文逐一確議凡有利於乏商窮竈者無不舉行各項弊端悉皆革除實力奉行大槩山東鹽政規模亦定此皆欽遵聖訓指示一年之間興除殆盡地方有司咸知督銷之責而商竈亦各安煎運之業矣相應奏請皇上另委賢員更替令臣回京得以時覲天顔勉竭駑駘以圗仰報皇㤙於萬一為此繕摺請旨恭候睿裁謹奏已有㫖矣雖據爾奏稱鹽政規模已定但其中次第尚多未妥處務期斟酌妥協定為成例方可行之久逺也同日又奏為核減鹽規事竊臣欽遵面奉諭㫖將長蘆各官鹽規已經酌量核減奏明今臣於本年二月十八日到東省隨移行撫臣等去後准撫臣黄炳覆稱去歳前任鹽道呈送鹽規銀二千兩當即收受犒賞三營兵丁訖隨將收受鹽規犒賞兵丁情由奏明但兵丁固所當恤而商困亦所當紓相應盡行裁去又據布政使博爾多詳稱本司衙門向無鹽規無憑裁減又據按察使程光珠詳稱本司衙門向有鹽規銀一千二百兩本司並無收受無庸議減議留各等情到臣據此除將濟南等各府㕔州縣向有鹽規者檄飭運司嚴行核減毋許累及商人外其撫臣及按察司鹽規銀兩既稱盡行裁革無庸減留相應一併裁革以甦商困臣未敢擅便理合請㫖遵行謹奏鹽務係爾專責事若當行則行何庸奏請耶雍正二年八月十七日廵視長蘆鹽課監察御史臣莽鵠立謹奏為奏銷之嚴限已届元年之銷引未完再請據情陳奏仰懇皇仁事竊照長蘆額引臣於去歳莅任後欽遵諭㫖徹底清理查康熙六十一年之引未領運者甚多已據商人等籲懇奏銷展限經臣奏請寛至雍正二年奏報䝉皇上㤙准展限一年欽此欽遵已於今年五月内奏銷全完在案衆商因儘力先運六十一年積引以致雍正元年之引除領運過外尚有未能盡領者十萬餘道前據商人等呈懇將元年未完之引仍照去年之例再寛至雍正三年奏銷等情經臣題請寛限䝉部議覆不准展限仍令照例造冊奏銷等因劄行到臣奉此隨行運司遵照去後今據該司段如蕙詳據闔綱商人李培源等呈稱商等元年額引之内現有已領未運已運未到者若此時遵奉部文廹於奏銷必有坐繳包賠之苦實因先完六十一年積引以致元年之引尚有未領運者現在儘力告運叩懇轉詳憲院奏請再懇皇仁展限奏銷等情詳請前來臣查六十一年之引原係遞年所積至臣到任以來衆商先儘運完積引二十萬道又急公并力領運過雍正元年額引八十萬有零現今止剩十萬餘道元年之課已經全完惟元年之引雖有未完然較之去嵗已為多運十餘萬道矣今奏銷元年之引户部催令照例造報不准展限所議甚是但長蘆鹽引之積由來已久查今嵗各州縣所銷之引實勝徃年之數今臣若遽為題㕘該州縣畏懼考成勢必勒令坐繳引目而辦課商人仍有包賠之累臣為錢糧起見不得不冒昧奏請再賞展限二年將現在未完之引每年帶運一半於雍正三四兩年之内積引可以全完從此以後年銷年額再無壅滯之虞矣理合具奏伏乞皇上㤙准施行謹奏據莽鵠立所奏元年未完額引雖未能全銷已銷大半辦理尚屬勤慎准照所請展限若於此限内再不能完將莽鵠立一併治罪該部知道雍正二年九月十五日廵視長蘆鹽課監察御史臣莽鵠立謹奏為陳明均引分引事竊長蘆鹽法積弊已經臣節次條奏均䝉俞允現今日有起色而山東積弊其最大者有二一在銷鹽之引地不均一在復引之分派不公以致窮商受累課額艱辦臣已飭行運司齊集衆商會同濟南府等秉公妥議去後兹據該司漆紹文等詳覆均引一事將現在州縣額引均勻搭配細加増減裒多益寡洵得均平造具清册前來至於按名分引一事亦據該司詳稱檢查案巻傳齊各商公同協議據商人等具呈俱願按名均分懇請核題使闔司商人貧富輯睦永杜爭端等情到臣但未據造送引數商名清册無憑核題除仍飭運司查明造備俟臣會同撫臣察核另題外今將均引清册送部查核臣會同山東撫臣陳世倌列名繕疏具題候㫖遵行謹先繕摺陳明謹奏知道了既經會題聽候部議漆紹文係一能員雍正二年十月初三日廵視長蘆鹽課監察御史臣莽鵠立謹奏為奏明餘銀候便彚解事竊查長蘆廵鹽御史衙門每年有養㢘銀二萬兩臣䝉皇上知遇深㤙莅任以來絶賔客忘室家惟日夜勤慎清理鹽務以圗報效於萬一所留養㢘銀二萬兩内除臣在津一年薪蔬盤費莭賞公用等項動支過銀三千兩又捐造新設廵鹽守備把總駐劄衙署兵丁營房動用銀八百兩外猶存餘銀一萬六千二百兩臣素性儉樸又無交接餽送在臣實無可用之處隨飭令運司傾銷元寳現收司庫候有解交部餉之便一併交付差官彚解到京另文解交内庫此係鹽花規禮原無加平之項理合預先奏明伏乞睿鍳謹奏知道了嗣後每年養㢘之項當酌量存留不必勉强拘執雍正三年四月二十三日廵視長蘆鹽課監察御史臣莽鵠立謹奏為奏聞事竊臣於本年正月二十六日起程赴山東會理鹽務於二月初九日抵濟南府駐劄五十餘日今春雨澤愆期撫臣等日事祈禱至臣四月初二日起程回津時雨未霑透運河水淺南船未過八閘即徳州小米糧船亦為淺阻沿途一帶麥將枯槁臣於十七日到津查得天津本月初七日得雨二指十七日又得微雨土脈旱乾不足滋潤民情廹切今臣同鎮臣道臣文武等官現在齋戒祈求謹將濟南天津尚未得雨情形繕摺奏聞謹奏據實直達甚屬可嘉虔誠祈禱自蒙上蒼昭格也雍正三年五月初六日廵視長蘆鹽課監察御史臣莽鵠立謹奏為宻摺奏聞事竊臣案查原任運司宋師曾在任八年惰徴蘆商積欠課銀一百一十六萬餘兩業經奏准分為十二年帶徴及宋師曾保陞廵道接任運司段如蕙盤查掲報虧空庫銀三十八萬餘兩内有商竈欠銀二十二萬兩零原任青州分司杜于藩未交銅觔脚價等銀一萬七百兩零部議奉㫖交與運司勒追還項内有餽送總督趙𢎞燮銀一十萬兩此項贓銀例應入官另追虧空乃䝉皇仁寛宥准其抵補虧空復有私借給張安世馬世煜等三千餘兩亦令於各名下追還在宋師曾本身應追虧空止不過四萬七千餘兩從前審虧空時宋師曾原供稱有祖遺産業約五六萬兩情願盡行變賠等語今伊家産抵變無幾仍混指蘆商尚有未完前督撫號銀一萬七千餘兩求總督李維鈞行文飭追代填虧空遂致曲庇偏狥希圗報完代為開復自去嵗檄令天津同知嚴比乏商一年之内已經追得三分之二補完虧空尚少六千餘兩今督臣又據宋師曾呈詞所需解費飯銀仍行令勒追尅期全完臣因窮商哀籲業經兩次移文求緩李維鈞執意不從竊思撫號一項係當年直撫之規禮非宋師曾應得之物李維鈞身為封疆大臣何得為私㤀公偏庇至此致下累窮商上誤國課臣職司鹺務勢難緘黙不得不據實宻奏伏乞皇上睿鍳謹奏此奏著李維鈞明白回奏同日又奏為聖徳格天甘霖霑足事竊臣遵奉諭㫖䖍誠祈禱聖諭宣播百神效靈於五月初二日申時即得大雨入土約有四五指至初四日晚隂雲宻布是夜四更甘雨普降土脈融和田禾霑潤瑞兆豐年萬姓歡呼不啻雨珠雨玉洵我皇上至誠感神休徴旋應臣等不勝踴躍歡忭之至所有得雨日期理合具摺奏聞謹奏覽奏得雨情形大慰朕懐所奏宋師曾事甚屬可嘉去冬年羮堯在朕前大為宋師曾乞恩爾宻宻將宋師曾如何夤縁年羮堯李維鈞之處察訪明白據實奏聞雍正三年六月初二日廵視長蘆鹽課監察御史臣莽鵠立謹奏為請飭禁仕途積弊以肅功令事竊思純臣之義以君國為重不顧其家不有其身方能圗報效於萬一如其私結聲援瞻狥交好即有黨同伐異之心矣臣見鑽營附勢之徒廣通聲氣投拜門生未中者遇科場則求闗節已仕者遇計典則圗薦舉且有素不相睦一拜師生遂成膠漆求分説情每至以直為曲偏狥庇䕶㒺顧法紀此等之人既無品行安望其純一乃心恪供厥職哉臣以為投拜之一途所當嚴禁也至於棘闈取士固有師生定分但主考房官為國求賢原非私意豈容市徳乃有無厭之軰一遇門生陞授外職老師世兄以及同年故舊或親行探望或差人索取名曰抽豐在門生情不能却送徃迎來周旋應接非剥削民脂即那移正項窮員虧空從此漸多倘稍為拒却人皆鄙笼指為刻薄寡情臣以此等求索亦宜一體嚴禁如此則人品日端風俗日古於治道實有裨益矣臣不揣鄙陋冒昧具奏伏乞皇上睿鑒敕部施行謹奏師生黨比之風朕所深惡此奏甚屬得理與朕意合九卿議奏雍正三年六月初三日廵視長蘆鹽課監察御史臣莽鵠立謹奏為請懲刁玩之竈户以肅法紀以完場課事竊臣奉命清理蘆東鹽政已歴二年因見竈丁賠累竈地迷失已經題請編審竈丁丈量竈地所以為恤竈計也復查得竈户中有刁頑積習倚恃貢監生員包役抗糧以完課為恥以逋賦為能積年拖欠者甚多場員莫可如何倘催追一𦂳即砌欵揑證奔控督撫有司提審不由鹽法衙門場員官卑職微不敢與抗毎至奏銷代受處分而頑户悍然不顧總之身恃衿監為護符目無場官此等刁風漸不可長臣愚以為嗣後如遇此等竈户㫁宜重懲使刁徒知有國法錢糧不致拖欠微員得以任事其如何嚴拏審追之處伏祈皇上睿鑒敕部定議施行謹奏九卿議奏雍正三年七月初八日大理寺卿仍管理長蘆鹽政臣莽鵠立謹奏為酌議捐修隄岸工程以䕶城垣以保生民事竊查天津逼近海口地勢卑下每遇河水漲發海潮壅遏之時宣洩不及其受衝𦂳要之處有三一城西南之教場一城北之老君堂一城東北之小闗口三者之中目下惟老君堂為最盖教場賴有大隄防䕶其小闗口尚有版隄捍禦再加修築可制洪波至若老君堂舊基前有南河後有北河南既臨岸而北河汎濫漫過支渠直薄其下又無隄岸防䕶連年前後衝塌數十餘丈僅存一線土埂現今水勢陡發南北兩河之水相隔此埂不過丈餘左右居民腹背受患況此地一決則兩河之水直衝城北單街夫單街逼近津城市㕓商民不啻數萬而城墻多傾且薄不足禦水霪雨連綿大為可憂兹據士民等公呈臣會同鎮臣道臣親徃土埂查勘一面各捐數金暫令募夫培築一面祈禱閘口龍神力為保障今幸雨霽河水汎濫之勢漸覺停止目前可以無虞但未雨綢繆為將來萬全之策宜先從老君堂一帶築隄保䕶并將北河之支渠用土填塞次將小闗口並教場兩處隄岸加謹堅修凡居此土者官吏商民或捐貲或助力莫不各出情願除據呈批飭天津道詳查妥議到日捐修外合將河形地勢繪圗進呈御覽伏祈皇上睿鑒施行謹奏如此為地方公事留心甚屬可嘉但修築堤岸徃徃有便於此而妨於彼者倘修築不中肯綮徒勞無益侍郎牛鈕熟悉河務朕已諭伊過秋汛於公事畢後前詣天津到時爾與伊詳細商酌而行海口龍王廟朕亦欲加修理爾差委的當人員用心看視將應作何修理之處具奏以聞再者隆科多詐騙王廷揚銀二萬兩應追入官之項可作修廟之用今彼處商民若情願急公捐修朕將此項留充他用倘爾修堤工程力有不足處即將此項賞助湊用亦可總在爾相度衆人之力量情形據實直陳候朕裁奪再若有人情願將廟工堤工擔承效力修理者爾亦即據實奏聞朕另賜予議叙但出於情願方可萬不可抑勒也雍正三年七月二十一日大理寺卿仍管理長蘆鹽政臣莽鵠立謹奏為具報被水情形懇㤙暫開海運以濟地方以安窮黎事竊查天津一帶地面低窪自六月以來隂雨不止陸地諸水合併横流天津城外一片汪洋四野村田盡被淹溺且米價騰貴柴薪無覔臣委批驗所大使帶領臣衙門承役前至鹽坨地方傳齊堆鹽各商聚集居民覔雇人夫併力培築保䕶鹽坨又勸諭衆商捐資買米數千石現委分司兼管煮賑以救饑民今沿海民竈逃荒山海闗外就食者甚多臣訪聞闗東地方糧米頗賤與天津一海之隔懇乞皇上天㤙敕下奉天將軍部臣作速出示曉諭本處行户如有囤集米糧情願發賣者許其暫行販運來津公平買賣半年之間可接來嵗麥秋不特津城附近居民今冬無凍餒之憂即隣邑被水貧民亦免流離之患矣臣目覩天津水害如此除移咨直隸督臣設法撫綏外理合據實具奏伏乞皇上睿鑒㤙准施行謹奏早已有旨矣雍正三年八月二十二日大理寺卿仍管長蘆鹽政臣莽鵠立謹奏為情願捐修海廟仰荅皇㤙祈准輸納事竊據署長蘆運司李俊有詳稱據太僕寺少卿王廷揚辦課商人秦嶠抱呈内稱竊廷揚一介庸愚至微極陋疊荷皇上殊㤙畀任卿員天髙地厚之㤙捐糜莫報兹值鹽憲欽奉諭㫖修理海口龍王廟揚情願捐銀一萬兩少抒蟻忱不敢仰邀議叙惟祈轉詳批行等情到署司據此理合詳請諭㫖修整大沽海神廟情願捐修不邀議叙實出真誠臣隨准捐令工程浩大難於估料俟秋汛過後臣等再行會看估計另請修築外理合繕摺奏明伏祈皇上睿鑒施行謹奏所奏是知道了雍正三年九月十二日大理寺卿仍管理長蘆鹽政臣莽鵠立謹奏為暫留能員委辦公務事竊照天津奉㫖改衛為州原任督臣李維鈞委覇州知州逯選署理天津事務查霸州有賑濟修城等事該署州不時回本境料理以致天津公事竟無專員辦理臣查原任衛守備王昭威雖為武弁然係科舉出身辦事勤慎堪以委用新任知州陳雅琛至今猶未到任兹天津教場老君堂小闗口各處隄岸現議修築須得能員督修辦理臣請將王昭威暫留天津辦理修隄公務查該備係廣東撫臣楊文乾奏明奉㫖派徃廣東之員今既暫留應俟天津修築事畢再令該員前徃臣更有請者原任直隸河間縣知縣馬騤雲曾在清江浦河工效力熟悉隄工現在丁憂臣因河間一帶現任州縣官内各有要務原無可委之員懇將馬騤雲准臣差委徃産木之處採買柏木杉篙等料以備修築應用并令其監工完日再為補用如此則公務不致有誤而辦理亦得專責之員矣理合繕摺請㫖伏乞皇上睿鑒施行謹奏照所請行該部知道雍正三年九月二十日大理寺卿仍管理長蘆鹽政臣莽鵠立謹奏為欽奉上諭事竊照北倉地方倉厫潮濕先經臣等會議令李維鈞浦文焯賠修今年先行拆卸培築牆基明春併力督修不誤截漕繕摺奏明臣隨檄行遵照去後嗣准倉場督臣托時移會奏准直隷截留漕米二十萬石暫收北倉應俟撥運完日拆毁等因又准奉天府府尹臣尹泰知會内稱奉上諭瀋陽海運之米到天津時交與地方官收貯或天津道或總兵或鹽政俱可天津盖造新倉即於新倉收貯欽此相應知會米船到日照數查明收貯新倉等因到臣該臣看得拆修倉厫必在嵗内動土培築基址較之春時倍為堅固今既截漕暫貯應將貯米之厫暫緩拆卸其餘空倉便可令其先拆及時培築若盛京海運米石到津之日臣等公同交與道臣柯喬年等查明天津各米行舗或寛大廟宇暫寄收囤至河水凝凍米價昂貴之時將此囤米減價平糶以足民食至年内動土培地并明春修造建􅆆須用吉日良時仰懇皇上敕下欽天監精擇日時臣得剋期奉行理合一併具奏伏乞皇上睿鑒施行謹奏所議修倉貯米之處均屬允當其修造日期爾宜就近覔人選擇何必又多一番事耶雍正三年九月二十八日大理寺卿仍管理長蘆鹽政臣莽鵠立謹奏為請修天津城垣以保民居以固疆圉事臣竊惟天津一城為東海之咽喉神京之鎖鑰臣見城垣四面雉堞傾圮門樓頺壊磚無全塊城壕填塞修建之事實難姑緩今據長蘆商人金義錢仁本名安岐禀稱修築城池乃邦家要務上有益於國下有益於民岐父安尚義聞此美舉踴躍鼓舞情願竭力捐修勷成盛事等情到臣據此該臣看得天津城垣南北三百三十餘丈東西五百二十餘丈牆髙三丈既據安尚義父子擔承修築可謂好義急公惟是工程浩大須經嵗月安岐現在行鹽辦課其修濬之工難以兼顧相應令伊父安尚義親来估計辦理且安尚義人甚老練自必盡心竭力臣再會同鎮臣等委地方官弁盡力督修徑於年内擇吉興工理合奏明伏祈皇上睿鑒俞允施行謹奏城工既有安岐承修何必又欲伊父安尚義前徃安尚義若自願到工看視一任其便伊既急公捐修爾同地方官亦宜相助料理雍正四年七月二十八日兵部右侍郎監理長蘆鹽政臣莽鵠立謹奏為欽奉上諭事竊天津蓋造倉厫之事雍正元年九月初八日接准部咨奉上諭令臣等會同詳審地形或另擇髙阜地方或將舊基培墊交與李維鈞等賠修欽此咨行到臣隨經總督倉場托時會覆仍於原基改造應著落李維鈞等賠修等因奏明奉㫖依議欽遵在案於九月二十八日又准總督托時欽遵諭㫖移會到臣准此臣隨令李維鈞浦文焯遵奉諭㫖如式賠造於去年十月内將原造厫房盡行拆卸先將厫内地基用灰土堅築比舊加髙三尺倉外院地加髙二尺選用原料内堅固木植外加添披水望板地板楞木鹻板鹻草及石灰瓦磚葦箔釘麻等料於本年二月初九日開凍興工起臣與廵鹽御史臣顧琮不時到工親身催督務期堅固而李維鈞等亦甚畏罪悔過朝夕不離努力營造賠修於五月内倉厫大局已完於七月十七日各工間知府來津請暫於厫内收貯臣等因厫内圍牆尚未乾透恐滿貯小米薰蒸發漲厫牆受傷是以著該委員暫做席囤於厫内收貯理合一併奏聞謹奏甚好如此方可謂實心任事雍正五年四月初五日刑部右侍郎署理長蘆鹽政臣莽鵠立謹奏為奏聞事竊照天津一帶地方今歳雨澤愆期臣會同鎮臣及州城文武各齋戒虔誠祈禱三日未雨臣隨至盧家嘴督催營工目今官署營房數日内俱可盖完惟堡牆院牆城壕橋閘等項現在加工砌造開挖大約月盡月初亦可完工而盧家嘴沿海地方風多雨少今於四月初四日夜四更時分大雨至五更將明方止共得雨二尺民心歡悦仰見我皇上念切民瘼痌瘝為懐所有得雨日期繕摺奏聞謹奏閲所奏之詞忽東一句忽西一句甚覺支離朕觀爾甚有昏憒光景慎之慎之雍正六年二月初三日甘肅廵撫臣莽鵠立謹奏為恭報甘肅得雪日期事竊臣䝉皇上隆㤙授以甘肅廵撫重任自雍正五年十二月十八日到任因念民以食為天及時雨雪最為𦂳要随飭布政使查報去後兹據布政使孔毓璞呈報平慶臨鞏甘凉寧西八府屬於上年十一月初五初七十六十七十八十二月初十等日得雪一二寸至三五寸不等又據鞏昌府禀報所屬地方今春正月二十二日得雪三寸有餘所有甘屬各地方雖得雨雪尚未甚霑足情由理合據實奏聞謹奏覽但宜勉竭誠敬凡督撫大吏不沽名釣譽實心為國為民則上天之賜嘉應朕可保其不爽也勉之勉之雍正六年二月十五日甘肅廵撫臣莽鵠立謹奏為奏聞事竊今春臣訪聞得河州蘭州狄道金縣數處窮民擕帶子女徙往平凉固原等處傭工趁食者不一而足臣隨行查據布政使詳委候補知州李毓徳前往平凉一帶沿途招諭令所在地方官量給口周知適遇此等逺行趁食之民不敢隐瞞謹將委員招諭量給口糧送回安插情由據實奏聞謹奏雖莅任未久未能周知民情亦當細訪其緣由奏聞爾其徐徐察訪自得其實情也同日又奏為據實奏明仰祈聖鑒事竊臣䝉皇上洪㤙補授甘肅廵撫邉疆任重時切冰兢祗因莅任未久屬員賢否一時不能周知是以未敢冒昧遽行舉劾兹查凉州府武威縣革職知縣常琮因多收耗糧經督撫臣題㕘革職嗣經審非常琮侵收入已擬以杖徒折贖俱免等因具題在案今奉部駁常琮有先侵後吐情弊令該撫再加詳審妥擬等因到臣經臣駁令嚴訊常琮所收耗糧原係預備公用現存在倉被㕘之日當經該府盤明封貯並非入已委無先侵後吐情弊除仍照原擬具題外再查常琮又有續㕘虧空各年雜税及草束等項經臣審明實係因公那用於㕘後限内俱已全完照例免罪前亦經臣具題在案但臣於訊鞠間見常琮才尚堪用查從前被㕘原因多收耗糧常琮所收止有加一並未逾格且現存在倉並非入已若使終於廢棄殊為可惜臣於出京陛辭之日曾䝉諭㫖凡屬下官員有過應㕘者即行題㕘不必瞻狥此内如有情理可原人材可用者據實宻摺奏聞欽此欽遵今臣既審明情由不敢私行隐匿理合據實奏聞伏祈皇上睿鑒施行謹奏常琮如情願效力贖罪留辦軍需試用可也俟後有效力處事畢奏聞請㫖同日又奏為奏聞事竊查西寧地方預備軍需甚屬緊要隨委凉莊道殷邦翰協同新任西寧道劉之頊在寧辦理在案今據劉之頊等禀稱西寧拴養滿漢官兵馬匹及運糧騾頭應需料豆草束除西寧現在存倉豆石外其餘不敷料豆並草束應於各處採買俱經發給銀兩現在採買速催交納等情到臣臣查西寧極邉地方草束一項最為艱難榖草不能多得今查該屬地方有燕麥草山麥草均可餧養馬騾從前軍需俱經用過臣已令其兼收採買現今督臣岳鍾琪奏明添買騾二千頭應需餧養豆草亦已檄令如數備辦再查進藏官員應需粳米西寧縣倉現有存貯粳米儘足支發又進藏官兵應需裹帯炒麪西寧縣大通衛二處倉内現有收貯青稞儘足磨用又滿漢兵丁連跟役人等裹帶四箇月及住西寧四十日口糧所需粟米除西寧倉現在存貯粟米支用外經布政使等在臨洮鞏昌二府屬撥運粟米於正月陸續運送至三月間即可全到西寧再查欽奉上諭陜西採買騾頭甘省前後共應採買騾二千頭臣現在委員嚴催各屬上緊購買送臣親驗發布政司分派加意餧養至運糧需用口袋鞍屉一切等件臣亦嚴飭上緊備辦務期三月内解運到寧以備需用至各處解送馬騾沿途應需豆草臣亦已檄令轉飭沿途地方官早為預備勿致臨時有悞軍需重務誠恐上厪聖𠂻理合將備辦情由繕摺奏聞伏祈皇上睿鑒謹奏朕何暇覽此等章奏便覽訖亦不敢遽言其是否總諭爾辦理莫悞母令屬員冒銷二句之外更無可批諭也凡軍需之項須待大兵凱旋事事清楚之後方可論其功罪耳勉為之雍正六年三月二十三日甘肅廵撫臣莽鵠立謹奏為恭報雨雪日期事竊惟甘肅地方時届季春正田苗長發之時雨水最為緊要今據布政司據詳呈報平凉府屬於二月二十一二及二十七八等日得雨雪一二寸至五六寸不等慶陽府屬於二月二十一二及二十七八等日得雨二三寸不等臨洮府屬於二月二十七八九及三月初四五等日得雨雪一二三寸不等鞏昌府屬於二月二十一二及二十七八等日得雨雪二三寸至四五寸不等甘州府屬於二月二十一二等日得雪一二寸不等凉州府屬於二月二十一二及二十八等日得雪一二寸不等西寧府屬於二月二十八日得雪一寸寧夏府屬於二月二十一日得雨一二寸不等理合繕摺奏聞謹奏如欲感召天和惟在秉公克已存誠主敬黽勉吏治上蒼自無不垂佑之理勉之敬之此理朕見之甚透同日又奏為奏聞事竊臣奉命廵撫甘省兼理茶馬重務其一切茶法利弊敢不悉心籌畫仰荅天㤙於萬一查前撫臣石文焯於雍正五年正月内遵照部行將西寧莊浪洮岷河州甘州等五司官茶毎司每封各酌定價値銀數具題隨准部文以所議價銀與督臣岳鍾琪所奏價値大相懸殊令據實確估另行具題等因雖經屢次嚴行催比無如五司官商㫁不能如數售變所以至今未能定議具題臣查督臣岳鍾琪從前所奏每封變銀一兩二三錢之説縁彼時西寧正値軍興大兵雲集番漢雜處需茶甚多是以茶價騰貴今臣嚴行申飭細加確訪各處時價實屬不一各司每封價値與前撫臣原題酌定之數並無懸殊若照此價將各司庫茶陸續發商分年代賣尚可漸次銷售如照部駁指定一兩二錢之價則銷售實屬維艱況現今五司官茶已積有百萬餘封塵堆在庫再加每年應收新茶二十七萬餘封若不亟行設變將來遞年累積難免浥爛之虞國課反致虚懸再查茶商交納官茶昔年俱以黄茶交庫其質低薄商人自賣但係黑茶其價髙昻臣思昔年輸納黄茶原為招番中馬今既不中馬所納之茶乃係變價歸課之項臣請自雍正四年為始應納之官茶飭令各商一體交納黑茶不許仍前髙低置辦則官茶商茶均易銷售而國課亦不致虚懸再查官茶壅滯難於發變皆由私茶横行而地方營汛各官非關切已稽查不嚴所致是以臣到任之始照依鹽法之例通飭陜甘所屬各地方文武官弁盡力查拏近日私販稍覺歛跡臣請嗣後地方文武官弁如有勤於緝私拏獲多販者按照拏獲私鹽例議叙將所獲茶内酌量分數給賞兵役以示奬勵倘或怠玩縱私一經查出官弁糾㕘兵役嚴處庶文武各官咸知儆惕於茶政實有裨益是否可行伏候聖裁謹奏茶政之弊甚多朕實未達即爾甫到甘省據所聽聞一二人之論亦未必能洞悉隐微朕意與其於未透徹時急遽更張不若俟深知灼見後再為酌劑庶免後日仍復改正朕既未洞徹其事不便批諭是否全賴爾秉公詳審為之仍與督臣岳鍾琪商酌川陜之事伊甚熟諳可與之斟酌定議應題者具本題奏雍正六年五月二十一日甘肅廵撫臣莽鵠立謹奏為奏聞事竊臣前奉命親往西寧料理官兵出口事冝查蘭州莊浪以至西寧一帶地方因雨水稍覺愆期疫癘流行兵民皆有傳染臣仰體皇上敬天勤民之至意隨行令布政使率同文武官弁虔誠祈雨一面配合太乙辟瘟丹廣行施濟臣又配合袪疫藥茶在寧分發各營弁兵凡有傳染者三五日即皆全愈今蘭州西寧各地方於四月二十一二及二十九等日連沛霖雨疫氣全消蘭州又於五月十八九兩日連得大雨四野霑足又據平慶臨鞏四府稟稱四月初十二十一至二十六七等日俱得甘霖雖尚未霑足而夏苗可保無虞秋田亦可播種從前疫氣雖多傳染目下已經漸退寧夏府稟稱四月二十三至二十七等日大霈甘霖入土約有五六寸查看大清唐漢三渠水澤俱十分充微雨雖未霑足目下雪山冰泮儘足灌溉民間疫疾幸止臥病四五日即愈凉州府稟稱四月十七二十二十九等日大雨滂沱四野無不霑足雖有疫疾傳染然越三日即愈並不為害肅州㕔稟稱天和所致臣謹繕摺奏聞謹奏覽雍正六年六月初一日甘肅廵撫臣莽鵠立謹奏為奏聞事竊臣奉命前赴西寧料理官兵出口事宜於四月初六日自蘭起程十二日到寧臣隨督率道員殷邦翰劉之頊等將官兵需用裹帶口糧米麵等項分頭趕辦齊完各路官兵陸續先後俱已到齊嗣於四月十六日總理西藏軍務左都御史臣查郎阿副都統臣邁禄等到寧議將大兵分為二起擬定五月初一初六兩日起程於二十三四等日據西安府通判張勤寵等各押解一二三起騾頭并帯鞍屉等項陸續到寧隨據總理運糧官臨洮道盧官保等詳稱查驗解到鞍屉澆薄兼有破損繩索籠頭嚼環又多不全等情臣即一面咨明督臣一面飭令殷邦翰等將破損者星夜修補頭起官兵於五月初一日起程臣隨於前一日飭令盧官保等檢選鞍屉連夜先行裝備米麵䭾載於初一日隨頭起官兵起運出口是日臣等公同出城親送官兵起程查看鎮臣周開㨗力言軍糧重大闗係匪輕必須另辦寛厚氊屉方於長途有濟公議官兵既已起程即令先行出口至阿什漢水地方等候將糧䭾暫行停卸俟鞍屉辦完再行趕送隨將糧䭾暫卸教場而騾頭多係初駕生性未馴已多奔􅄆除民間收獲者繳還外其餘奔失騾頭遍尋未獲者二百餘頭臣因軍需緊急刻不可緩即令暫動軍需銀兩一面飭令將騾頭購補足數一面委官分頭各處採買氊片星夜置備先行儘數趕辦分交各營官兵俱於初六日起程至阿什漢水地方會齊其趕辦不及之鞍屉臣督催修整不二日内如數完備即將初一日所留頭起兵糧盡行裝䭾於初八日委官趕運送至阿什漢水地方交明官兵前進臣隨於五月初十日自寧回蘭訖除將另辦氊屉并買補騾頭借動銀兩現在飭查核明確數到日咨會督臣酌議分别著落賠補還項外所有大兵前進及臣拮据料理無誤縁由謹繕摺奏聞伏乞皇上睿鑒謹奏汝雖拮据料理無誤亦難免從前差委不得其人之咎觀於此緊要軍需尚如是疎忽則地方官懈玩不實心任事之風仍然如舊甚屬可惡更聞所雇趕騾番子夫役人等皆赤身至寧是何理也可會同岳鍾琪嚴察㕘奏重處以警其後不然此惡習所闗甚巨何能改革汝等絲毫毋得姑息瞻顧若少有疎縱恐累及汝也此摺批發之後岳鍾琪㕘摺亦到二摺所奏已有㫖諭部矣雍正六年六月十三日甘肅廵撫臣莽鵠立謹奏為奏聞事竊照甘屬夏禾情形經臣飭行布政司查報去後兹據報稱平慶臨鞏四府所屬地方夏禾豆麥正在吐穗􅐘榖現在播種雨水調勻又甘州府所屬地方夏禾現今生發尚未吐穗揚花又涼州府所屬地方夏禾正當滋長復得甘霖必獲有秋惟所屬武威縣地方有微被氷雹之處現在差員查看另報又西寧府所屬地方土冷播種甚遲夏禾小麥青稞現在滋長尚未吐穗又肅州㕔所屬地方夏田俱各茂盛又寧夏府所屬地方夏禾茂盛􅐘榖現在播種等情彚報前来所有甘屬夏禾滋長情形理合繕摺奏聞謹奏似爾此等廵撫朕知地方必無豐收之理天降冰雹惟在莾鵠立陳時夏魏廷珍之所屬地界中亦大竒可畏爾甚不妥慎之慎之總之爾枉已狥人之病再不能改諄諄教訓不肯領受奈何奈何雍正六年七月二十七日甘肅廵撫臣莽鵠立謹奏為據實奏明仰祈聖鑒事竊臣前奏大兵起程日期及臣拮据辦理軍需縁由一摺奉到硃批諭㫖跪讀之下臣不勝感激惶悚戰慄之至竊臣才本庸愚性復迂拙荷䝉聖㤙補授甘肅廵撫到任之初正值辦理軍需督臣岳咨移飭催司道等官遵奉辦理於三月内接准督臣咨稱通飭各屬解寧騾頭各按程途逺近計算出口日期於四月盡五月初到寧餧養約以十日為期等因迨總理西藏軍務吏部尚書臣查郎阿等於四月十六日到寧始知官兵擬定於五月初宿不開若欲一齊牽送則村少人稀一時難覔多夫又兼三省騾頭接踵而至該縣等才乏肆應以行差員前徃疏通騾頭催夫料理於五月初五六等日始得陸續到齊至解到騾頭併鞍屉等項俱係總理進藏運糧官事務從前臣原委凉莊道殷邦翰進藏總理後經督臣以殷邦翰另有用處飭手跑失者以致騾頭短少盧官保自知驗收不慎情願自行賠補足數起運出口後經臣察訪有解運騾頭之涇州州判王以中串通兵役混行牽拉一府騾内竟少交騾一十九頭臣已經咨會督臣題㕘嚴究至於各屬騾頭解寧稍遲鞍屉又不如法怠忽誤公理合即行嚴㕘因彼時官兵立待起程鞍屉等項隨到隨修亟須趕辦急如星火若將各官遽行究㕘人心惶惑則官兵起程日期勢必違誤臣本庸愚似此緊要軍需不能督令料理周備皇上睿鑒臣不勝惶悚待罪之至謹奏待罪自不必言惶悚亦遲矣硃批諭㫖巻四十九
