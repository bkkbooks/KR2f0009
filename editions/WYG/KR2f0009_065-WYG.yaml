body:
  text: 欽定四庫全書硃批諭㫖巻六十五硃批張元懷奏摺雍正四年三月初十日巡察河南户科掌印給事中臣張元懷謹奏為敬陳彰衞二府地方情形仰乞睿鑒事竊臣䝉聖恩俾以巡察河南重任於正月二十九日抵磁州入河南彰徳府境至二月十九日巡察彰徳州縣訖於二十二日抵淇縣入衞輝府境至三月初六日巡察衞輝府縣訖臣察河南地方於雍正三年十一月内始奉撫臣牌示編行保甲之法甲樹一旗户懸一牌自州縣以及村莊累累相望臣竊以為實力奉行不在塗節耳目隨檄行各州縣令其不時稽察務期實力遵行即沿途旅店臣亦行文各府照依保甲之法令其互相聨保一店盜竊互保之店不行舉首俱行連坐重處又訪得黄河各渡口間有不肖船户暗通盗賊往來接應臣亦行文令將沿河過渡船隻俱連環具保稽查匪類臣查彰衞二府强竊盗賊並無新案所有舊案臣已飭該州縣嚴緝以寜謐地方所有三府驛馬俱各足縣令之才再訪州縣錢糧火耗毎兩加一錢四五分不等合並奏聞至於塘汛煙墩兵丁俱各守汛但兵丁箭上多不書本兵姓名臣愚以為箭不書名甚有關係隨行文營弁令其書寫凡有煙墩俱係空設不裝糞草夫煙墩原為瞭望起見臣皆令其裝實蓋好此臣巡察彰衞二府情形理合繕摺恭進睿鑒謹奏覽奏知道了實力行之毋怠同日又奏為請㫖事竊臣巡察河南至衞輝府屬寺兒山地方係汲縣新鄉輝縣三縣交界之區其間去縣治各有四五十里不等地勢曠野路徑紛雜並無營兵汛守訪之土人皆云此地往往多盜且其地有大寺係明代潞王遺址崇垣峻壁周圍二三里雖有僧人居住但形勢空濶亦易藏姦臣查舊案康熙五十八年九月内山西客商秦璉被盜馬白等在山前刦害於雍正二年九月内正法亦因此地曠野無兵汛守故也臣愚以為必得安設汛兵以資彈壓如事屬可行臣即移咨河北鎮臣河南撫臣俾公同商議設立煙墩或三處或四處分撥防兵或十五名或二十名撫鎮二臣定議報部臣為地方起見伏乞皇上睿鑒施行謹奏事關設兵安汛自當言之撫臣會商具奏雍正四年九月二十二日巡察河南户科掌印給事中臣張元懷謹奏為恭報微臣巡察河南各府州縣已周仰乞睿鑒事竊臣奉㫖巡察河南於本年正月二十九日入境次第巡視通計豫省一百十州縣今俱徧歴臣查各屬盜案自六月以後漸次稀少揆厥所由實因我皇上聖徳感召時和年豐二麥咸登三秋多稼所以中州百姓户慶盈寜人各樂業臣遍歴郊圻遇黄童白叟宣布皇仁示以緝盜安民之故並勸其勤儉以積粟守望以相助百姓聞之歡頌皇仁語言質樸愈覺意向肫誠仰見站馬匹俱各足數惟據汝寜府署汝陽縣呈送驛馬冊籍内開額設馬二十二匹内止收交代馬三匹餘十九匹俱係老弱殘傷未經接受臣隨行文驛道查報續據該驛道囘文内稱署汝陽縣所有未接馬匹業巳買足隨經該署縣將馬匹趕赴查驗臣親看逐一印烙交驛訖再河南衝路煙墩兵丁俱各守汛房屋亦各修葺完好凡前項事件係臣巡察職任之事為此具摺恭奏伏查吏部原議内開臣等巡察官務於一年之内徧歴各府等語臣於正月間入河南境至九月内睿覽施行不勝敬謹待命之至謹奏河南吏治較之他省可謂善矣至於汝有所見所聞處不妨隨時具奏但一切須秉公據實上聞不可聽人指使自取罪戾勉之慎之莫辜任用廵察之職凡事以警戒為先慎勿過於嚴刻宻之雍正五年八月二十二日巡察河南户科掌印給事中臣張元懷謹奏為微臣巡察河南各府州縣地方一周仰祈睿鑒事竊臣䝉皇上聖恩再留巡察豫省地方於本年二月二十七日具疏恭謝天恩隨於二月二十九日巡察河南五府七州所屬州縣於六月二十五日渡河巡察河北三府所屬州縣至八月十九日通省所屬地方巡察一周伏查鏡咨送到臣於臣所到地方隨便查驗以上係臣巡察事件除有廢弛溺職之員移咨督臣查實主稿題㕘外今臣巡察已周仰體皇上宵衣旰食勤求治理之聖心謹繕摺奏聞以期稍慰宸衷於萬一所有奉到硃批合併恭繳謹奏欣悅覽焉同日又奏為奏聞事竊臣於八月初十日廵察至彰徳府准督臣田文鏡咨内開准山西護撫臣髙成齡咨為妖言聚衆等事移拏山西澤州案内逃犯楊世龍楊鉄山焦養祿靳廣王君祿陳桂翟神仙郎裁楊副將衛智劉三賈四即賈坤全田瓜即陳志榮申三樊百川張冉公范溪衛四程廷賔等犯緣由咨㑹到臣臣隨宻檄各府州縣嚴查速緝去後嗣復節次嚴催在案除濟源縣已獲翟神仙宜陽縣拏獲楊世龍楊鉄山窩家宋文元寶豐縣拏獲陳志榮并子陳雲州葉縣拏獲程廷賔外餘犯現在協同督臣嚴催各府州縣多方躧緝上緊查拏緣係協緝晉省要犯事件謹繕摺奏聞謹奏此案人犯當盡力嚴督設法緝捕務令全獲内楊副將靳廣二犯尤為緊要毋忽雍正五年十二月二十二日廣西按察使臣張元懐謹奏為恭繳硃批諭㫖叩謝天恩仰祈睿鑒事竊臣於雍正五年十二月十六日在陳州西華縣地方接准河南督臣田文鏡咨文荷蒙聖恩越次超擢廣西按察使聞命之下感激涕零伏念臣身受國家豢養深恩一十五年來俱係在京供職於錢糧刑名之事絲毫未諳雖在河南廵察二年究與身親民事者不同況粤西地近邊陲民獞雜處臬司乃刑名總滙之地倘有一事未得平允所關匪細伏望皇上俯念臣顓蒙下材准臣進京跪聆訓㫖俾臣恪謹遵守或可稍免隕越之愆如䝉恩㫖俞允臣即輕騎減從馳赴闕廷仰覲天顔臣不勝敬謹待命之至所有奉到硃批奏摺理合恭繳謹奏往返千里徒勞何益即速赴新任可也粵西地方最為𦂳要而刑讞乃民命所關當勉思盡職勿負擢用田文鏡之居心行事見許於朕係汝所深知者須以為楷模而仿效之直省督撫司道等官若不肯如是公忠任事而欲望朕姑容不可得也所訓汝者除將科甲朋比務虚名廢實政之陋習竭力改除之外餘無可諭勉之慎之欽哉毋忽雍正六年九月十五日廣西布政使臣張元懐謹奏為恭謝天恩謹繳硃批仰祈睿鑒事竊臣一介庸愚䝉皇上聖恩擢用廣西按察使未及兩月旋蒙聖恩擢用廣西布政使受恩深重圗報無由夙夜兢兢恒懼隕越臣自本年六月十二日到任藩庫銀兩於半月之内遂巳盤查清楚而通省倉貯榖石遵例委員清查因地方廣濶各屬貯榖頗多至九月初八日各府州縣方行查完出結到司臣謹另摺奏聞外前於臣赴粤之時蒙聖恩頒賜御書福字抵粤之後又蒙聖恩頒賜柏梁體詩一册叠蒙恩遇有加無巳臣惟有嚴以自律不敢一念稍寬詳以處事不敢一時稍忽以求盡職而巳所有原奉硃批奏摺理合恭繳謹奏如是矢志甚好遵奉前諭勉力為之同日又奏為遵㫖奏聞事竊臣於本年九月初十日接到怡親王等寄字轉傳上諭各省藩臬有准其具摺奏事者亦有本人未曾奏請具摺朕遂未曾降㫖者今思藩臬乃地方大員應准其各就所見所聞具摺陳奏且即此可以觀其人之居心辦事爾等可寄信與廣西布政使張元懐伊若有陳奏事件初次具摺差人交門上奏事人轉奏嗣後從何處轉奏朕再降諭㫖可也欽此欽遵伏念臣本駑駘下質􅑋沐聖恩屢加超擢凡有所見所聞理應具摺奏聞乃蒙皇上俯念愚蒙特示明訓跪讀之下感激涕零謹將臣任内事件以及地方情形分摺奏聞伏祈皇上睿鑒謹奏嗣後奏摺齎交大學士蔣廷錫處轉奏同日又奏為奏聞事本年九月初十日西隆州知州劉徳健報到土賊顔先色顔光東聚黨拒捕被圍自潰於八月二十二日為其寨内土衆所殺業由撫臣具題在案臣謹將本案前後情節為皇上敬陳之伏查顔光色等恃險刦掠巳非一日西隆州知州劉徳健詳請官兵𠞰擒三月二十八日提臣田畯委遊撃常顯虎帶領官兵八百名往擒土田州岑應祺帶土兵七百名從之西隆州知州帶土勇八百名駐劄弄髙西林縣知縣韓三善帶土勇一千名駐劄八陽漢土官兵不為不多此時土賊寨中礮臺未築木栅未樹顔光色見官兵驟至令人詐降乞緩攻五日率衆出投遊撃常顯虎信而許之以致土賊礮臺木栅暗行修築遂敢抗拒官兵自四月以至八月官兵陸續増添廣西提鎮各標官兵一千六百五十四名貴州安籠鎮漢土官兵二千五百五十四名雲南廣羅協㑹同廣南營漢土官兵二千二百名前後三省共發漢土官兵九千七百零八名俱係准咨開載兵數其運糧守隘土兵不在此内至於軍前需用糧餉奉督撫牌行司庫共𤼵銀二千六百兩西林宣化隆安武縁等縣共報𤼵銀二千五百五十二兩俱於二釐耗羡及公用銀兩項下動支其軍前支給口糧以及沿途供應軍糈應俟旋師之日各該州縣册報到日彚核實數具摺奏聞謹奏此應題奏事件核明實數之後該督撫自然具題何庸汝摺奏耶雍正七年正月二十五日廣西布政使臣張元懐謹奏爲初春雨澤霑足事竊照粤西地方冬春二季最需雨澤葢因民間塘田俱於此時蓄水以為栽插之本去冬雨雪不缺今嵗正月膏雨連旬自初一日至二十日未嘗間斷目今春麥滋長至二月下旬禾苗即可佈種我皇上勤民重農感召天和臣職任旬宣所有查詢雨澤事宜謹繕摺奏聞謹奏覽奏膏雨優渥朕懐深慰驗試貢監考試吏攅選舉老農三摺俱交該部議奏矣雍正七年三月二十日廣西布政使臣張元懐謹奏為粤省雨澤霑足事竊查粤省正月雨水調勻經臣繕摺奏聞外至二月望前天氣晴暖耕耘得力自二月望後至三月初旬甘霖頻施土膏滋潤塘水充滿目今春麥俱巳揚花結實各屬稻禾俱巳次第佈種粤西雨暘時若農民歡慶理合繕摺奏聞謹奏覽雨暘調順情形朕懐深慰雍正七年十一月初一日廣西布政使臣張元懐謹奏為奏聞事雍正七年八月初十日奉撫臣金鉷准吏部咨開廣東道試監察御史髙山條議各省督撫藩臬衙門一體封鎻幷將各書役一年更換通行直省實力奉行等因到臣臣查粤西邊徼地方書辦人等多屬愚蠢較之江浙狡猾姦巧巳自有間臣衙門各房書吏貼寫共一百五十五名其中畧有明白事件每房稿辦不過一二名餘皆書寫文移册籍而巳一遇𦂳要事件尚須晝夜攅造以上書役皆常川伺候向無分設上下兩班亦無内班外班之分若將現在之書辦分作上下兩班無論事繁人少不敷所用且隔一年之久往往上班所辦之事下班接管頭緒茫然恐有舛錯若另募増添邊末愚民通曉文移者少既難招募且新進之人更不知各項巻宗原委即臣前在臬任并護撫印之時原係封鎻一日兩次開門而各房書辦則係按季三月輪換亦無外班書辦至其接管交替之時尚有前後錯誤之處是撫臬二臣衙門書吏亦難按年換班况臣衙門錢糧總滙項欵紛繁未可絲毫舛錯是一年一換實於辦理案件未便即念其常川伺候不過酌量於一二月内量行給假數日料理家務庻㡬無誤辦公再查臣衙門有支放各營兵餉収兊各屬正雜錢糧以及通省屬員因公到省不時以地方諸務當面商酌等事如一日之間拘定兩次開門未免勢有難行臣與撫臣金鉷臬臣元展成悉心􅆕商亦俱意見相同可否允臣凡遇収放錢糧幷有𦂳要公務隨時彈兊収放辦理事竣即行封閉庶為妥便為此據實奏聞伏乞皇上睿鑒施行謹奏地方情事原各有不同汝與督撫臣權宜斟酌為之可也同日又奏為敬陳管見仰祈睿鑒事竊查雍正六年四月内定例各省流犯在配脫逃一面移咨原籍緝查一面令配所該管官勒限緝獲到日先解布政司衙門枷號兩箇月責四十板滿日加徒役三年等因又雍正七年八月内定例凡律載應流之犯如情罪甚重者在配脫逃被獲之日於本罪上加等擬絞監候其該管兼轄各官均分别議處等因各欽遵在案是流犯犯罪案情各有輕重脫逃治罪亦分差等誠屬至公至當永逺可行各該犯自應悔悟畏懼不敢復行潜逃矣而各屬申報流犯脫逃者又往往有之臣愚以為此等流犯皆蒙皇上覆載生全原情寬宥易地發遣安插為民冀其改過遷善悔悟為良地方各官原無差押拘禁之例且伊等在配無可度日或捕魚為業或樵採營生勢難禁其出入如其蓄心潜逃乘機兎脫實屬未易防範臣查雍正二年五月内定例直隷山西河南山東陜西五省連家屬發遣之人有能種地者前往布隆吉爾地方種地令地方官動正項錢糧採買種地籽粒牛隻給與種地之人三年以後交納糧草等語今粤西州縣現在議行開墾荒地可否比照雍正二年定例凡安插粤西携帶妻子之流犯有能種地者令地方官動項買僃牛種量給荒地墾種編入保甲互相稽查仍按墾荒年分照例陞科其單身貧難之流犯與不能種地者如於配所願充夫役即就該地方額設橋渡河站各夫内遇缺補充照例日給工食仍聼夫頭約束其流犯之挾有資斧或别有手藝者在配經營聼從其便該管各官仍於朔望㸃卯稽查毋致疎脫如此則在配各犯既有營生之業以安其身而該管各官亦得嚴其防範之法庻或踈脫者漸少而所全者實多臣就粤言粤誠見流犯人等似當隨地安置是否可採伏乞皇上睿鑒施行謹奏是否可行與督撫商酌雍正九年五月初六日署理河南廵撫印務浙江布政使臣張元懐謹奏為恭謝天恩事竊臣於本年四月二十四日接浙江總督臣李衞抄咨蒙皇上聖恩命臣署理河南廵撫事務欽此欽遵謹將臣藩司任内一切錢糧事件造具清册於五月初四日移交臬司臣劉章署理外臣隨於初六日起程前赴河南署任伏念臣庸愚陋質蒙皇上屢加擢用洊歴兩司日夜氷兢常恐辦理未協以致有負聖恩兹者乃蒙皇上簡署封疆重任聞命之下愈滋惶悚況豫省為四方通會之區凡錢糧兵馬河道漕運以及察吏安民事件俱關係重大臣謹遵㫖前赴河南暫為署理伏乞皇上另簡才識卓越之員畀兹重寄方與地方有益并叩懇皇上垂照臣愚恩賜訓誨俾臣到豫敬謹遵循庻幾不致有所謬誤也為此具摺恭謝天恩謹奏覽居心行政一一效法田文鏡何有謬誤之失勉為之雍正九年六月十二日署理河南廵撫印務布政使臣張元懐謹奏為奏明事竊臣於本年五月二十九日抵豫省遵㫖即赴督臣衙門面見督臣田文鏡聼其指授地方事宜隨於六月初一日任事訖初二初三等日臣連次往見督臣田文鏡因感冒微寒未得接晤臣竊思田文鏡在任八年地方事宜無不深悉熟練又蒙諭㫖命其指示交代臣自應朝夕面請領受教益方得奉為章程有所遵循今督臣田文鏡於初次相見之時向臣言及急欲進京家口則留在衙署俟八月起行其家口留署臣自當料理防護但督臣年踰七十現今身又抱病當此炎暑自應暫留豫省衙門調理俟秋涼體健徐緩進京臣現在撥役照常護衞伺候并俟督臣田文鏡見臣再為面請豫省一切事宜仍堅留緩行在豫頤養外理合奏聞謹奏田文鏡先巳奏聞業經有㫖矣雍正九年六月十七日署理河南廵撫印務布政使臣張元懐謹奏為奏聞事竊查豫省自入五月以來雨澤㣲少晚苗未能盡行播種望雨甚殷兹於本月十四十五兩日風雷不作暢沛甘霖由日及夜四野霑足凡應種禾豆俱可及時播種而巳長田苗益覺發生暢茂臣民胥慶道路歡忻此皆我皇上宵旰勤民至誠感格所以應時沛澤惠濟羣生也至於各府州縣地方得雨日期晚苗長發情形俟查明再行奏聞謹奏甘雨及期以手加額覽焉雍正九年六月二十九日署理河南廵撫印務布政使臣張元懐謹奏爲奏明事竊念豫省去年稍被水淹我皇上軫念民艱特命刑部侍郎臣王國棟馳驛來豫𤼵倉賑濟計口授粟不令一夫失所皇仁普被實惠均沾豫省人民無不感激歡呼此臣赴任經過地方及來省城目撃之情形也乃臣自署任以後案查侍郎臣王國棟奉命來豫共賑過榖五十餘萬石零續又查首冒濫領榖一萬石零内議著落該縣嚴行追比如百姓不能繳補着落該州縣賠補等語臣查賑濟一事刻不容緩愚民見小乘機冒領其罪固無可逭而州縣奉委詳查不能勘實開報則責有攸歸賠補亦所難辭但小民無知一時冒領業巳用盡今二麥甫及登場即欲如數交還其中恐有實在無力不能繳還之人百姓不能繳還而州縣又慮自行賠補止求自巳之無累豈顧百姓之難堪其為朝夕催追嚴行徵比諒難逃聖明洞鑒之中我皇上大沛恩膏豫省賑過榖石五十餘萬之多乃於一萬餘石濫給之榖致令放賑未㡬即有追比之舉甚非仰體聖主軫恤豫民之至意仰惟我皇上仁周庻類澤被蒼生欲使普天率土無一夫不得其所方可稍慰宸衷必不因萬餘石之榖石與茅簷編户較有餘不足之數臣署任方始不敢以此案巳經具題俾浩蕩皇恩於蠲賑事竣之後復留些小欠缺臣謹據實奏聞伏乞睿鑒施行謹奏如果州縣查勘詳確何有冒領之弊候朕另有諭㫖雍正九年七月初九日署理河南廵撫印務布政使臣張元懐謹奏為奏聞事竊豫省六月十九二十兩日省城附近得雨分寸及霑足地方臣巳具摺恭奏外嗣於二十三四以及二十九三十至七月初二三等日各府州縣又陸續申報得雨臣恐所報或有未實隨委員分路確查今據各員申覆前來大約黄河以南開封歸徳南陽汝寜河南五府陳汝鄭陜禹許六州其中亦間有一二縣雨澤稍遲晚禾未盡栽種其餘悉皆霑足早晚秋禾亦無不遍種青葱茂盛秋成巳可預卜惟光州一屬州境巳報得雨所屬四縣尚未周徧其黄河以北懐慶一府雖屢報得雨均未霑足巳種秋禾不過十之五六彰徳衞輝二府亦有三四縣巳報霑足其餘悉未得雨巳種秋禾不過十之三四臣現飭河北各州縣日内倘得雨澤窮民無力置辦籽粒立即酌量借給務令及早補種或有遷徙他往者務令加意撫綏不致流離失所再光州所屬之固始商城交界地方竹園内於六月二十一日忽生青蟲形似蝗蝻將竹葉􅅙食幸未生翅當即撲滅並未傷損田禾合并奏聞謹奏據奏青蟲似蝗􅁞食竹葉等語即實係蝗蝻亦惟有嚴飭屬員速行撲滅而巳此外别無良䇿也同日又奏爲奏聞事竊查去年直隷山東江南河南被水乏食窮民趁食於鄰省者蒙皇上恩諭各督撫轉飭地方官動支常平倉榖計口授食又念三春耕種之時若不旋歸本土恐致荒棄故業動支存公銀兩賞為路費資送囘籍嗣後以此爲例欽遵在案兹查六月下旬以來復有北來窮民㩦帶家口渡河而南大約直隸山東之人居多亦間有河北彰衛等處之人每日七八起至十餘起不等臣伏思去年恩㫖原為時届三春耕種之際恐其荒棄舊業故令資送回籍此誠皇上軫恤流民至周至宻之盛心也今時方交秋而此等覔食窮民絡繹而至若照先行事理遇有來者即差件遣還是旋歸之日巳過耕種之時或反致其失所亦未可定若但聽其往來則以五方雜處之人東西覔食無依無著安保其不别生事端臣以為時勢不同或當於安集之中隱寓稽防之意因嚴飭沿河州縣於各渡口處所詳加察詢倘欲於豫省州縣依附親朋傭工覔食者詢明欲往地方除力能自給者無庸資給外其有實在窮民酌量給與口糧仍知照該州縣令其善為安挿再通行各府州縣如有此等流民經過務必加意防護倘其中有欲往湖廣之人則開明籍貫姓名察其有力無力酌量資遣出境臣現在咨明湖廣督撫二臣俾其轉飭該地方官預為查照以上趁食窮民若至來春思還故土而又無力起行則仍行遵例資給回籍如此則撫綏察查各盡其職隨處安集既無流離失所之虞沿途稽防亦不致有相聚爲匪之慮矣所有臣現在料理渡河流民情形理合具摺奏聞謹奏此奏是實力為之雍正九年七月二十四日署理河南廵撫印務布政使臣張元懐謹奏爲奏聞事竊豫省立秋之前大河以南各府州縣雨澤先後霑足惟河北彰衞懐三府尚未周徧經臣具摺恭奏外隨於七月十一十二兩日省城連得大雨彰衛懐三府亦於此兩日之内俱報霑足百姓俱各及時補種蕎麥是河北州縣得雨雖覺稍遲目下補種晚苗俱巳𤼵生將來民食有頼至於無力窮民如有不能置辦籽粒者臣遵照部議巳迅飭各該州縣酌量借給令其及早補種伏思今嵗節候較遲倘至八月下旬早霜未降則可望普収矣再查省城米價六月内粟米毎石價銀一兩七錢今自七月以來每石減至一兩三錢想因時雨頻施青苗遍野囤米之家不肯久積是以米價頓平所有河北三府雨澤霑足及播種情形理合奏聞謹奏覽奏河北得雨霑足朕為豫民曷勝額慶同日又奏爲奏聞事竊六月内據固始商城二縣報稱交界地方竹園内生有青蟲當即撲滅並未損傷田禾經臣具奏外臣恐留有遺種滋害田苖地方官所報未盡確實隨委汝寜府前往詳細勘驗今據禀覆係商固接壤之處地名馬岡集居民石峩家有竹園約計十頃其葉俱為青蟲所食該二縣當即率衆撲滅並未損傷田禾亦更無遺留滋蔓竊念竹園十頃地方不為不大竹葉食盡其蟲不為不多乃止食竹葉而於禾苗毫無損傷實為可異再中牟陽武原武三縣交界地方於七月初九日亦生小蟲形似蝻子大如蒼蠅臣飛飭各該縣正在上𦂳撲滅間隨於十一十二兩日連得大雨所生之蟲隨雨俱滅亦無遺留禾苗毫無所損伏思五六月間雨澤㣲缺從前低窪積潦之區魚蝦遺子變為蟲蝻固屬事理之常而止食竹葉無損禾苗又得大雨消除此實黙有神佑豈人力所能致者仰惟皇上聖徳感召徵應如響所以嵗轉有秋蟲不為害而臣撫心自思益覺兢惕悚惶時時滋懼也爲此奏聞謹奏青蟲或係專食竹葉之蟲耳何乃為是誇誕之詞雍正九年八月二十二日署理河南廵撫印務布政使臣張元懐謹奏為奏聞事竊照豫省地方仰蒙皇上聖恩先事預籌截留漕米二十萬石備將來賑恤之用或於明年青黄不接時候平糶臣遵照部行巳派委南汝道董自超帶佐雜及試用人員三十餘員雇覔民船先赴臨清聽候分派押運在案至豫省各種秋糧現今雖未盡収然據各州縣申報及臣委員驗看髙粱巳經刈穫實有十分収成棉花豆子晚榖查彰衛懐三府屬得雨稍遲入秋以後雨水調和収成亦不致甚減其餘各府州縣皆極茂盛指日便可豐収又七月中連雨兩次間有一時水壅被淹之處亦不過零星低窪畝數臣隨遣員撫恤資給籽粒補種蕎麥今至八月以來天氣晴暖所種蕎麥亦皆敷榮結實可望有秋再洧川尉氏二縣雙洎河決口民房報有水淹塌損者嵩縣伊水漫溢亦淹塌民房百餘間臣亦委員星赴查勘視其房屋坍塌情形酌動存公銀兩或二三兩或四五兩賑給修整房屋民皆安堵再北來流民臣遵照部文遣員於各渡口查驗給票或資給口糧或勸諭回籍皆知各本籍奉有安輯聖諭巳日漸稀少但數日之内臣又訪聞江南省徐州所屬之蕭碭二縣界連歸徳彼處人民頗多挈携老幼來豫臣未悉係何縁由隨即遣員星往查驗并飭地方官照例撫恤今二十日河南布政使臣髙斌赴任抵豫道經歸徳親遇徐屬流民詢知因彼處黄水有決口之處但出自流民之言未審的確臣因皇上軫念民生無一事不上厪聖衷所有地方次第収成豐稔情形及流民稀少又新有來豫之處合先奏聞謹奏汝自署理豫撫印篆以來事事辦理不及敷奏不實一惟瞻顧因循是務大失朕之所望所奏知道了雍正九年九月初一日署理河南廵撫印務布政使臣張元懐謹奏為酌議徵漕補倉事宜仰祈睿鑒事竊臣於八月二十四日准部覆督臣田文鏡奏請將徵漕抵補賑榖其賑過之州縣本地漕榖未必適如所賑之數應令不賑之州縣酌量撥運動用鹽規存公銀兩給𤼵雇脚運送移咨到臣此誠酌盈濟虚預備倉貯之計但臣以爲補倉固為𦂳要而撥運似屬可緩以本地之漕榖補本地之倉額事最省便無可疑議若欲以别州縣之漕榖撥運補額則今年豫省豐収之處居多固非急需撥運補貯之時且一經撥運則動須車脚而運榖較之運米數當加倍則費亦加倍以有用之存公銀兩徒供車脚之費實屬可惜臣之愚見以爲莫若照先准部咨將徵収之榖各徵各貯俟明春酌其有餘不足隨時平糶糶出榖價撥給動賑之州縣於秋収後陸續買榖補倉再若不敷動賑之榖則現在截留二十萬石之漕米部議原令平糶之後易榖貯倉以此項平糶銀兩令動賑州縣逐漸買補以足舊額如有贏餘存貯司庫以備撥用如此一轉移間既免搬運之煩又省車價之費各州縣倉榖原額亦無不補足矣再查豫省徵収漕米向例每石加収耗米一斗五升爲折耗運脚等費今既停運改徵榖石每榖一石約可碾米六斗統算収榖二石合之収米一石巳有加耗在内若仍照舊収耗則於民未便可否仰請聖恩特頒諭㫖將今年漕米収耗之處曉諭豁免将來徵米起運仍照舊徵輸則恩出自上有益於民而於官亦無所損伏祈睿鑒施行謹奏所奏言之田文鏡如果當行伊必具奏請行其中或有可議伊自剖悉指示於汝亦可増長識見將奏摺倂朕批諭俱與觀之可也同日又奏爲奏明事竊臣於八月二十六日接到督臣田文鏡來札内稱䝉聖恩仍令回豫視事但恐各屬於授受之際不無因循觀望稽延舛誤飭令兩司將應辦事件作速詳慎辦理免致遲錯縁係奉㫖札致特此奉達等因到臣遵查臣到任三月一切應辦事件俱遵照料理隨時檄催外查督臣田文鏡留交命盗案件共有二百八十餘案臣謹依次辦理其中尚有二十五案係田文鏡巳審而未經具題之案臣具題本内例填覆審無異字様竊念命盗案件關係重大臣未經親審遽稱覆審無異何敢自蹈欺誑之罪臣因逐一提訊依次審結其間提觧審理不無稍遲時日今亦現在陸續具題不敢稽延至於舛誤之處臣自分庸陋或有心力之所不及知識之所未周乃限於臣之才絀智短實聖明鑒照縁係奉㫖寄示之札理合據實奏聞謹奏此奏甚屬可笑朕原以汝為知朕之人及觀汝署理豫撫以來前次今番所奏乃大負朕恩之小人向之信任寧不可惜若再不痛自改悔惟疑防揣度是務恐非汝之福也慎為之硃批諭㫖巻六十五
