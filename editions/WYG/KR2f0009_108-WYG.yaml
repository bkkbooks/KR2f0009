body:
  text: 欽定四庫全書硃批諭㫖巻一百八硃批馬覿伯奏摺雍正元年四月十三日山西大同總兵官臣馬覿伯謹奏為奏聞事雍正元年四月初一日准軍前兵部通圖知㑹内稱各營兵部噶喇大多其納索和托禀稱我等各營現在官兵甚少不彀當差今綠旗營有兵五百二名礮手五十餘名令派堆子二處請將軍定奪等語奉將軍諭著令綠旗營出街上堆子一處出看倉堆子一處等因知㑹到臣隨即行令守備千把派出去後據守傋王紀呈稱䝉此既奉將軍諭令自當遵奉但查當日礮在八旗營内礮營兵丁止應礮上差使並不應别項差使今礮在綠旗營内噶喇大屢次扳差祈本鎮移明兵部轉請將軍仍將礮位照分八旗承管願與一同當差等因呈報到臣隨移覆軍前兵部外於初五日准兵部傳文奉將軍諭令京營官接管礮位綠旗營著令應堆子二處再派兵一百八十名往烏蘭滾種地並往卡路及察罕叟兒看城去等因遵將礮位交送京營收管所派官兵遵照派往今將交礮日期奏聞抑臣更有請者綠旗兵五百二名今既派往卡路等處二百名臣帶領官兵無幾若進兵時仰祈聖主將大同營路官兵准臣提調三百五十名以備進𠞰為此一併具摺請㫖謹奏覽爾所奏行營兵馬情節知道了已有㫖矣雍正元年十二月二十五日山西大同總兵官臣馬覿伯謹奏為奏聞事竊臣奉㫖帶兵一千名前往甘州於十二月初三日出殺虎口仰賴聖主洪福天氣和暖未甚寒冷水草未致缺乏官兵馬匹俱獲平安於本月二十二日進横城口二十三日已至寧夏俟闗支口糧之日起程前往甘州所有官兵進口到寧日期理合具摺奏聞謹奏覽奏知爾等巳抵寧夏時値嚴冬霜雪在地兵馬幸不至於苦累朕甚慰悦雍正二年五月初四日山西大同總兵官臣馬覿伯謹奏為恭請聖安事竊臣欽奉諭㫖帶領官兵前往甘州兹奉大將軍年羮堯令臣將所帶官兵撤回大同等因䝉此臣帶領奉撤官兵於本年四月二十九日自山丹起程五月初三日抵臣屬汛保德營地方俟接印視事之日另疏具題外謹先繕摺恭請聖安為此謹奏朕安所奏已悉帶回官兵人馬如何情形隨便摺奏以聞雍正二年七月初二日山西大同總兵官臣馬覿伯謹奏為奏聞事竊臣於去嵗十二月内欽奉諭㫖令臣帶領官兵前往甘州有署事永北總兵臣兄馬㑹伯到鎮臣將嚴飭各營文案曁除革事宜向馬㑹伯交代去後今臣於五月初五日回任隨復行查標協各路營伍據各營路將弁報稱經署事總兵馬㑹伯並㕘領陳王章飭行整理演習今皆遵奉施行等語臣親查標下三營兵丁軍器雖皆整理而技藝尚不能純熟所有各路營務非臣目覩難以憑信臣請俟秋收後親歴各營查閲操演務期兵强技熟方與營汛有裨至各官飬亷荷䝉聖主恩施格外臣俱照署事總兵臣馬㑹伯㕘領臣陳王章所存之數支發不敢再為增加又查大同等處今嵗雨水調勻夏田俱收秋禾甚好米糧價値日漸平減理合一併奏聞謹奏馬㑹伯陳王章經朕諭令不可刻薄從事致爾回任後難以措施但伊等或有過寛過嚴之處皆未可定且伊等並未定有成例斯乃爾本任内事應添應減爾宜再加斟酌損益務求得中而行毋得藉諉伊二人也雍正二年八月初四日山西大同總兵官臣馬覿伯謹奏為奏聞事竊臣前奏俟秋收後親歴各營查閲操演一摺奉到皇上硃批臣跪讀之下感戴靡涯伏思臣受恩深重任事一日即有一日之責何敢藉諉他人以負聖主體恤武弁之至意除營伍事宜臣盡心料理外各官飬㢘俱查照原任湖廣提督俞益謨奏准提鎮副㕘以及千把等員親丁名糧之數留給養㢘各官俱各足用查臣屬副將㕘將遊擊都司守備共五十二員所管兵一萬六千一百餘名除各官親丁糧外酌量營頭之大小每營各留有公用糧八九名或六七名二三名不等共留公用糧一百八十五分以作各項公用敢有多占即行叅處如此則兵餉水無剋扣寛嚴亦屬得中為此繕摺奏聞伏祈睿鑒謹奏凡事只在行為不在言語間也如果實力奉公潔已率屬朕自有見聞勉之雍正二年十月二十日山西大同總兵官臣馬覿伯謹奏為奏聞事竊臣於本年八月二十六日前往殺虎平魯老營水泉偏闗河保利民東路北樓靈邱山隂新平得勝助馬等處各該副㕘遊都并所屬備弁大小營頭點閲查看得各該營路旗幟器械鑼鍋帳房俱已整理齊備兵丁技藝弓馬鳥鎗亦皆漸有起色同撫臣諾岷㑹疏題叅在案今臣於十月十五日事竣回署仍嚴飭各官勤加操防不許缺兵侵餉如仍前欺玩懈怠查實立即入告謹將微臣查閲營汛起程回署日期繕摺奏聞謹奏言之可聽耳循名責實或未必然雍正三年正月二十四日山西大同總兵官臣馬覿伯謹奏為欽奉上諭事竊臣䝉兵部劄付欽奉上諭直省督撫提鎮并道府以上等官禁止蓄飬戲子仰見我皇上洞悉羣情無微不照既正風俗兼省糜費甚盛心也臣向有家生僕人七八名各習樂器以便春秋祭祀之用並未登場演戲今於奉命之日即令分散各司别事不敢再用為此據實奏聞以免隱匿之愆謹奏業既散遣不用何為隱匿知道了蓄飬戲子小過也無足介意爾等内外文武大臣惟戒鑽營權要乃第一要務切莫為此有害無益之事雍正三年二月十八日山西大同總兵官臣馬覿伯謹奏為奏聞事竊臣前奏遵奉不敢蓄飬戲子一摺奉到皇上硃批臣跪讀之下仰見我皇上明並日月鑒徹萬方内外文武臣工贒愚不肖難逃聖明洞照之中臣兄弟數人屢䝉皇恩任以封疆皆由異數隆恩並非薦舉所致逢迎餽送素不敢為今奉天語煌煌敢不益加警惕以無負聖主至誠開導訓廸周詳之至意除欽奉遵行外謹將硃批原摺一併恭繳謹奏朕意未必盡如所奏湏心口相應言行相符方好雍正三年三月初七日山西大同總兵官臣馬覿伯謹奏竊臣接准署撫臣伊都立移咨令臣赴省臣隨於二月二十二日起程二十七日到太原伊都立轉傳上諭爾等於陛見時朕曾面諭諸事聽廵撫諾岷敎導近聞得爾等諸事俱聽年羮堯指示殊為不是此舉干係爾等功名嗣後諸事當與署撫臣伊都立商酌而行欽此臣跪聽之下惶悚無地臣與年羮堯素未識面昨臣領兵赴甘年羮堯駐劄西寧臣駐防山丹未乆西陲平定即令撤兵回汛至山陕隔省事不相渉況䝉皇恩凡所屬營伍事宜准臣具摺奏請臣世受國恩擢任總兵雖極愚鈍而犬馬之心惟知戀主何敢聽年羮堯指示屢䝉天恩敎誨自當益加警惕恪遵聖訓勉盡職守仰報高厚於萬一耳為此繕摺謹奏滿口支吾一派謊詞對君父之前豈可如此欺誑乎據此看來乃係不明大義過而不改庸愚下流之人爾意謂憑仗舌辯遂可以瞞朕耶硃批諭㫖巻一百八
