body:
  text: 欽定四庫全書硃批諭旨巻二十九上硃批韓良輔奏摺雍正元年五月二十日鎭守天津總兵官臣韓良輔謹奏為請旨事竊臣屬務關營㕘将緣事革職所遺員缺例非題補應候部推但念此地為畿南各省入京孔道肆應維艱綏緝不易非得幹員難以勝任臣選有隨臣出師之石匣營遊擊魏國璽才猷敏練辦事精詳洵屬幹員現今古北提臣董象緯於欽奉上諭事案内遵旨保舉才能臣仰懇天恩請将魏國璽補授務關營㕘将庶要地得人料理臣亦獲收臂指之效矣可否允行理合繕摺請旨謹奏但要爾等實心任事秉公無私一切不妨據情奏請當行與不當行朕自有裁酌所奏是已諭該部矣同日又奏為請㫖事竊臣屬河間恊副将徐仁原係臣石匣副将任内所轄石塘路都司䝉聖祖仁皇帝以都司優擢今職臣深知其人才能幹練馭衆有方兹於雍正元年五月十五日據河間府士庶兵丁等數百人環擁臣署呈稱副将徐仁寧謐地方和輯兵民允屬賢能今推調寶慶現在陛見伏乞保留以慰輿情等語臣既知其才而羣情又戀戀如此不敢壅於上聞可否将徐仁准以陞銜留任理合奏請睿裁謹奏所奏甚是朕意原欲留伊此任同日又奏為恭謝天恩事竊臣奉兵部劄付内開為轉行事職方清吏司案呈准預備粘竿子處管侍衛内大臣阿爾松阿等咨稱雍正元年五月十一日将預備粘竿子處之陜西甘州武舉韓勳引見奉旨将韓勲發往伊父總兵官韓良輔任所學習欽此煩貴部轉行文天津總兵官可也等因到臣隨恭設香案望闕叩頭謝恩外伏念臣長子韓勲年力方壯正宜在御前出力報效今命在臣任所學習於臣子非不甚便於臣實有未安竊思臣䝉恩在外不獲身在御前服勤奔走臣有子可以代臣效力又復聚居一處惴惴之心日夜靡寧今不揣冒昧請将臣子韓勲仍賜留御前賞當苦差以代臣身庶臣父子皆圖報有地矣為此謹奏朕前旨原係施恩爾父子令聚首一處為朕效力今覽爾奏懇出於眞情姑從爾請仍留在内矣特諭雍正元年九月十五日廣西提督臣韓良輔謹奏恭請皇上聖安朕安爾原係朕十分賞識之人自應不謬覽爾所奏數摺深為嘉悅眞好提督朕惟幸得人而已至所奏公費親丁名糧暨屬員丁糧之摺足見居心廉正朕無可訓飭雖然𩔖此𤨏務爾等封疆大臣自行酌量則可朕不便代定準䋲爾等行為是否合宜斷不能逃朕耳目但只盡力做去朕自有鑒照孔毓珣處亦有諭旨爾其詢之再禁革陋規一摺雖云剔弊恐奨勞士卒整理器械等處乏資亦未免棘手百凡取所當取用所當用總在爾等大員權宜相機為之朕殊難以逐件訓諭但若情通理順朕無不體量既一塵不染而事又不悞固屬上䇿但恐未必能耳觀爾如此居心自然不致舛錯勉為之同日又奏為恭請聖訓事臣未入粵境撫臣孔毓珣署理提督事務潔己率屬實心辦事訓練營伍製辦軍器抑且不避嫌睿覽一粵西猺獞雜處最難馴服經署提臣孔毓珣發兵擒戮四境聞風斂戢臣愚意謂威令既已大行自宜繼以寛大到任之後即發示曉諭猺獞人等今皇上新登寶位至聖至眀無論漢土人等從前過惡恭逢登極恩詔已一槩赦免務須改惡從善共樂昇平之福若再怙惡不悛臣即一面奏一粵西操練徒有虚名全無實濟即如操演鳥鎗不用鉛子但取響聲是以全無準頭臣於經過協營塘汛乘便考較諭其打鎗須加鉛子敎以準頭至於平日操練之火藥鉛子令各協營於所留公一考拔把總乃預儲干城之選豈容狥情受賄臣遇把總缺出於本營不論隊目兵丁挑選漢仗魁偉弓馬嫺熟人材出衆者與五營㕘遊守備千把一粵西地僻路遥所推陞武員每多逾限未到如思恩副将趙士儀桂林副将龔治邦梧州副将楊𢎞基潯州都司鄭愷鎭標遊擊王興化新泰㕘将蔡成貴離任調任等缺俱缺官一年有餘推陞諸員尚未到任臣竊思廣西地接安南界連滇黔川楚粵東諸省中雜土司猺獞缺官既多且遲至年餘未曾到任設有題留及丁憂事故則缺官不可以時日計矣伏懇皇上聖恩預發記名人員十名來粵遇缺即補是否妥協伏候皇上批示謹奏因各營標缺員甚多所以昨於八月内將各省保題之人按省分相近者盡行補足矣爾此奏甚是朕自然留意至爾所轄弁員中如有優者與總督孔毓珣商酌薦舉仍宜預行摺奏方好不然或朕已有旨或該部已推選有人則更換改易殊多未便雍正元年十二月初三日廣西提督臣韓良輔謹奏為製辦軍裝事伏查臣標甲械經督臣孔毓珣署事時製造盔甲腰刀鳥鎗子母礮外尚缺旗幟帳房鑼鍋鍬鋤等項且臣標歩兵弓箭手頗多而粵西山多林密利於牌刀故将弓箭軟弱架式平常者改為籐牌挑刀其牌刀等項俱須添辦臣擬造籐牌二百五十面挑刀二百五十口大纛八十六面小旗五百一十六面帳房四百頂鑼鍋四百口鍬鋤八百把併預備一年火藥鉛彈等項以上共約需銀四千四百六十兩零臣查出臣標每季有朋馬餘銀五百兩向係上下侵肥今現存雍正元年秋冬二季共銀一千兩再擬預借雍正二年春夏二季朋馬銀一千兩公費銀一千兩前提臣左世永所還公費銀一千二百七十一兩共設措銀四千二百餘兩已委營員領銀製辦矣再查臣標兵丁向來皆係自備馬匹疲小不堪俟製完軍裝之後所有朋馬銀兩委員就近購買臕壯馬匹給兵騎操是否允協伏候睿裁批示謹奏爾能如此實心整頓營伍為國家效力上蒼自當垂佑錫爾多福也爾係朕所特擢之人如此行為實不負朕委任至意於朕亦覺增光且字字皆實言亦得理朕甚為嘉奬爾其勉之同日又奏為恭領聖訓事臣前摺奏宣揚皇上威徳綏戢猺獞事宜奉有硃批臣謹祗領自當恪遵聖訓事事與督臣孔毓珣商酌務使計出萬全不特不致傷兵累民即脅從之賊若傷死一名亦難定讞桂林經過故舉劾等事俱咨請督臣會題庶無彼此互異之咎又荷皇上念臣禁革陋規恐奨勞将卒整理器械等處需用匱乏聖恩高厚體恤至此銘心刻骨實難報稱但為大臣者必先正己方能率屬若濫取分文有負聖恩縱聖徳如天曲加寬恕而神明必不能容臣亦有何顔立於将士之上至於摺薦才能将弁自當遵旨早奏所有奉到諭旨現在欽遵理合繕摺奏覆謹奏覽奏朕實嘉悅之同日又奏為恭報粵西豐稔事竊查廣西今歲雨𤾉時若晚禾俱已收穫計通省年成約八九分不等各府米價每石自三錢七八分至四錢以及五錢四五分不等漢土兵民無不家給人足雖蠻鄉獞境亦俱處處豐收歡忻鼓舞咸頌聖天子萬壽無疆臣目覩兵民樂業感激皇恩如出一口理合據實奏聞謹奏此皆爾等文武大吏仰體朕心戢兵安民所致之效朕曷勝欣悅之至同日又奏為恭報發兵擒獲獞賊事竊查桞州府屬來賔縣獞賊覃扶成等截刦客商現據告發恃險放鎗不服拘喚據來賔縣知縣詳請發兵擒拏督臣孔毓珣與臣密商於本年十月二十一日撥遣臣標中軍㕘将今陞梧州副将蔡成貴左營遊擊姚應龍帯領官兵同右江道萬際璋往擒預遣潯州副将馮廷輔堵其後路獞賊見各隘口俱有官兵堵截盡将鳥鎗器械投於江中四散藏匿陸續擒獲過案賊覃扶成等五十九名此實仰頼皇上徳威遠播不傷一兵不累一民積賊盡皆就縳地方得以肅清今官兵俱各回營所獲賊犯人等俱於十二月初三日解送督臣衙門親審定案所有擒過獞賊緣由理合繕摺奏聞謹奏眞屬可喜之事因爾能實心任勞感格神眀黙助所以善全此案也從此闔省寧靜不特良民樂業將卒亦得安枕矣同日又奏為懇恩特放熟練營員以收臂指實效事臣查粵西營務廢弛已久猝難整理臣抵任之後時加操演實力訓練邇來漸有可觀其各協營臣又聲言欲親往查驗亦俱聞風整頓料理但耳目難周再得一二熟練營員分任經理則易奏效查有向隨臣出師口外之石匣營千總馬仕鳯隨前張家口副将陳棟出師之藍翎黄永泰漢仗弓馬俱優辦事又復勤愼今廣西出有平樂恊左營守備一缺鬱林營守備一缺現在咨眀督臣尚未會題倘䝉聖恩将馬仕鳯黄永泰就近召試如果可用伏懇賞補平樂鬱林守僃二缺則外協營汛訓練有人臣尤得收臂指之效矣謹奏已據爾奏請即諭部矣但黃永泰業經擢補他處都司將馬仕鳯賜爾可也其一缺候朕揀選一人或調補一好員與爾嗣後再遇要缺將爾所知員弁只管具摺奏請同日又奏為懇恩特設武職衙門吏書以便核兵清餉事伏查文職衙門雖敎職典史亦皆有吏攢辦事而武職至提督總兵竟無經制書吏不特提鎭衙門有題奏本章所關綦重即都守千把亦有兵糧冊籍往返文移難以缺人向俱選擇食糧兵丁繕寫名曰字識竊謂兵丁繕寫既非所長又不能分身操練若武職衙門亦許酌設吏書幾名年滿照例考職與文員吏書分班選授彼見上進有路雖無糧餉亦必争先求進則武職衙門字識名糧俱可招兵補伍矣臣因淸餉核兵起見謹繕摺陳奏可否允行伏候皇上睿鑒謹奏此奏是吏兵二部會議具奏雍正元年十二月十五日廣西提督臣韓良輔謹奏恭請皇上聖安朕躬甚安今西海之事仗天地神明佑助並仰頼聖祖在天之靈大局已定自兹邊陲可無兵革之患矣且西虜使來情詞卑順似有求和之意果能如此則可以休養我兵民培植國家之元氣朕因此不勝欣慶隨便示知令爾歡喜孔毓珣處遇便亦諭令知之新正新禧願爾闔省平安兵民樂業風雨調順百物咸亨同日又奏為懇頒訓誡兵丁聖諭以便宣講事臣細繹皇上欽頒聖諭天語周詳無微不到雖臣之至愚但須一一恪遵便可克盡職守謹抄錄成冊朝夕跪誦思繹以圖黽勉報稱又恐武員不識字義者多臣於操練之餘敬将副将㕘将遊擊等員奉到聖訓節句之下細為註解演成通俗易曉之語刋刻成書俟告竣日頒發各協營使其易於遵循臣擬於聖徳告誡勸勉不啻至再至三但係訓誡将弁未及兵丁臣不揣冒昧仰懇皇上親灑宸翰頒賜訓誡兵丁聖諭一道俾臣得以一一講解勸導使人人忠君愛國盡力報效庶見聖朝徳化雖貔貅之士亦遠邁於往古萬萬也為此繕摺謹奏此奏甚合朕意朕自去歲秋間將聖祖御製訓諭十六條逐條註釋敷廣六七百言約計共有萬言名曰聖諭廣訓正在刋刷裝潢今歲秋冬即通行頒發時常以此講解訓導兵民庶望有感發之益同日又奏為仰懇聖恩欽定頒換傳敕之例以昭法守事竊粵西各協營所有傳流敕書原係因地制宜凡形勢之險易營制之大小及統轄援守事宜一一指示實與皇上所頒武員聖訓相為表裏但未定更換之例歷年已久南方地勢卑濕霉朽摺損勢所不免每遇新舊營将交代之時互相推諉駁訐文移往返幾於楮敝頴秃况係紙書豈能歴久不敝将來營将若非枉罹㕘處必致䝉蔽不報臣愚竊謂将各協營傳敕盡行呈繳督臣收貯俟有齎表差員之便彚齊繳部細查各協營或有昔險而今易或有宜於昔而不宜於今及營制改易者斟酌增刪令詞臣撰擬進呈御覽發部俟下次齎表弁員領回以免擾驛遞併定若干年繳換一次永以為例則營将不虞有觸損之咎而恭讀静繹得以知所職守矣謹奏此奏是該部議覆施行同日又奏為奏聞事臣因營伍軍裝等項緊要将查出現存朋扣銀湊發製辦併擬預借明年春夏二季公費朋扣銀兩湊給添製已具摺奏聞頃臣咨明督臣孔毓珣預借藩庫朋馬銀兩孔毓珣以營馬亦屬緊要其朋扣銀兩仍令購買臕壯馬匹添補督臣竟捐出銀二千兩幫辦軍裝其原數不敷銀一百八十兩督臣亦一併捐出其幫銀二千一百八十兩遣員齎送來栁臣前所奏製辦各項軍裝足以敷用今将督臣所幫銀兩扣出發過秋季朋銀五百兩差員分領就近購買臕壯好馬給兵騎操所有督臣公忠體國幫銀添造軍裝於營伍大有禆益理合繕摺奏聞謹奏知道了如此急公任事自屬可嘉且孔毓珣之好處尚不止此非一時書寫可盡汝二人亦可謂志同誼合廣西通省兵民之幸也勉之雍正二年二月十八日廣西提督臣韓良輔謹奏為恭賀事臣伏讀皇上硃批臣請安奏摺内諭旨臣跪誦之下不勝欣忭謹望闕叩頭稱賀從此邊圉寧静兵革永息誠如聖諭可以休養兵民培植國家元氣實天下萬世臣民之福謹遵旨通知督臣孔毓珣外理合繕摺恭賀謹奏邊事今已大定竟可謂萬全如意矣同日又奏為甲械告竣驗交營将經理事竊照督臣孔毓珣署理提篆時清出隨丁公費糧餉及銷鎔廢鐡製備甲械并在栁所造鳥鎗一千五百桿腰刀二千口俱陸續驗給兵丁佩習今臣標守備趙大任在廣東製造盔甲一千身子母礮二十五位亦交營經管督兵披習以上甲械俱係督臣設法製造今已告竣經臣驗明發交五營将備取有收管冊籍是祭纛始給兵披掛餘日俱收貯新置櫃内以免霉蛀至於臣續製旗幟帳房刀牌鑼鍋鍬鋤等項俟告竣日另奏外所有驗過督臣製造甲械發營披習緣由理合繕摺奏聞謹奏軍器齊備實壯觀瞻可嘉二字外無可再諭同日又奏為恭解聖訓敬呈睿鑒事竊臣伏讀皇上敕諭提督聖訓悉皆典謨訓誥之精義字字足以為提臣之衡鑒藥石臣謹繕錄成冊每日清晨盥誦反覆思繹祗期深悉聖意克盡職守又讀聖訓總兵副将㕘遊等官各有諭旨爾亦應詳細體察同心協力共相策勵欽此臣隨敬請營将所奉之聖訓入署恭誦純熟及詢之各将弁有能通曉辭意者十無一二臣因不揣冒昧演成通俗易曉之語於每月朔望傳集将弁為之宣講務期盡皆通曉遵高深設解釋錯誤臣罪滋大謹繕寫成冊恭呈御覽伏乞皇上於萬幾之暇俯賜睿鑒指示紕繆之處以便改正刋刻頒發俾将弁一體遵依恪守則臣與各将弁益受我皇上敎誨成全之聖恩於生生世世矣謹奏知道了冊留覽俟遇便發還同日又奏為奏聞請旨事臣伏讀皇上御批欣悉西邊寧謐不勝抃舞已恭摺奏賀外遵旨摘抄西事硃批併将臣奏摺奉過諭旨有關地方政事者摘寫通知督臣孔毓珣以期協恭報國至於恩綸褒錫以及應密之語臣惟銘心刻腑不敢洩漏一字以蹈誇耀之罪謹将傳諭督臣原單繕呈宸鑒以後或應照此通知仍行奏聞或應一槩祕密伏請皇上聖訓遵行至於關係國計民生之事彼此意見偶有不同自應不時密奏聽候聖主採擇不敢隱黙謹繕摺陳奏伏祈睿鑒謹奏諭令通知者通知無諭者密之至若地方上協同辦理應知會事又在爾斟酌可否相機而行當通知者一面通知仍一面奏聞可耳同日又奏為恭謝天恩事雍正二年二月初四日臣齎摺把總恭捧硃批奏摺八扣欽賞貂皮寧紬藏香克食等件到柳臣出郊敬迎至署恭設香案望闕叩頭謝恩親捧御批啓匣跪誦仰荷聖恩深厚感入心膈不禁涕下沾襟雖粉骨碎身亦難圖報惟有日夕頌祝皇上萬壽無疆聖躬康泰萬邦賓服六合咸安上副皇上叅贊化育之聖心下遂臣螻蟻報國之微忱耳為此繕摺恭謝天恩謹奏覽卿奏謝知道了賞罰之柄雖執在朕若偏狥於愛惡之私則對天下後世不能無慚惟一出於公而施之當然後人心悅服是賞罰雖云在朕而實在於海内臣民之自取也故曰賞一人而天下勸今朕加恩於卿毋視為私恵而徒懷感激但加奮勉可也雍正二年三月十六日廣西提督臣韓良輔謹奏為廢員尚堪驅策仰請睿鑒應否酌用事臣䝉皇上特授廣西提督昨於赴任時道出邯鄲有大名協革職守備楊世威來見臣向任大名副将時世威係臣標中軍深知其弓馬嫺熟可供驅策遂帯之入粵令巡察塘汛堆卡頗著勤勞其懷集一汛係楊世威徃查熟悉懷邑形勢故差其齎捧圖冊進呈以備皇上顧問查楊世威因盜案規避革職洵屬允協但據云實係染患發背現有瘡痕可驗似與無病規避者有間况現奉上諭文武廢員許赴都察院具呈代奏仰見我皇上聖徳如天棄瑕宥過之至意今楊世威漢仗技勇頗堪驅策倘䝉召試如果尚堪任使仰懇聖恩或發臣標或發部錄用或令赴都察院具呈統候睿裁為此繕摺奏聞謹奏舊案尚未結楊世威過亦不輕此時未便錄用或在地方上俟有捕獲賊盜勞績顯著時再行舉奏候朕裁酌雍正二年閏四月十七日廣西提督署理廣西巡撫印務臣韓良輔謹奏為謹領聖訓恭謝天恩事臣䝉皇上恩命署理巡撫印務自柳往桂舟遇臣標把總齎捧御批奏摺來粤臣遂跪迎入舟啓匣恭誦仰荷溫綸褒美指示周詳臣受恩逾格感極涕零謹遵旨此後臣摺奉到硃批有諭通知督臣者立即通知其餘一槩愼密如有關係地方機宜應公同料理商酌之事一面通知一面奏聖諭皆天下臣民之所自取聖衷原無成見但綸音愈溫臣心益懼惟有倍切冰兢殫力整頓决不敢隨俗茍且怠棄職守以上干斧鉞之誅也為此恭謝天恩謹奏人心虚而靈寂而妙天下萬事萬理但持之以靜自無不得其情理也何事不可辦耶同日又奏為敬陳粤西招徠墾闢之宜以盡地力以副聖心事臣查粤西土曠人稀一望皆深篁密箐夫篁箐既深且密則其地非磽确斥鹵可知若去其篁箐舊根而入以稻穀新種則必盡成膏腴沃土矣頃臣䝉恩署理撫篆自柳逹桂沿途見棄地頗多細思其故大抵有六山谿險峻猺獞雜處其間所墾之田與村莊稍逺便慮成熟後被人盜割徒勞工費一也民性樸愚但取濵江及山水自然之利不知陂渠塘堰可資蓄洩二也不得髙卑所宜雜糧之種三也不識各省深耕易耨之法四也出産止有米穀納賦非銀不可且差徭隨田而起恐貽後日之累五也良懦墾熟豪衿猾吏每每指為祖業恃勢霸佔强弱不敵六也此土民之所以畏縮不前而多曠土也臣愚以為宜遴選大員専司其事督率守令逐件料理先購宜植之種兼僱敎耕之人然後相度肥饒空曠之地約可容聚數十家足以守望相助者為之撘葢茅舍招徠貧民聚居又貸以牛種敎以興陂塘井堰之利至於相近協營之處則查出餘丁亦酌倣屯種之意廣為播種嚴彼冒佔之禁寛以陞科之期一處有效又擇他處照前勸墾但取妥協不在欲速守令又時輕騎減從常㩦酒食勸農敎耕其所舉給頂帯農人即命為農師以督敎其鄉人則粵民見有利而無害有不奮發興起者乎将見人稠地闢煙瘴漸消衣食足而禮義興邊徼盡成樂土矣臣不揣庸愚冒昧瀆奏如有可採伏懇皇上諭令新撫臣李紱斟酌舉行統求睿裁批示謹奏將此摺與新任巡撫李紱看諭李紱知朕閲此奏甚為嘉賞其得理處難以枚舉今將開墾一事命韓良輔與爾協同辦理爾等須一徳一心成此美政毋推諉毋猜忌惟宜虚懷共籌但期與民興利其錢糧陞科等務悉屬末節爾等接諭後斟酌妥協奏聞勉力為之同日又奏為恭報粤西二麥豐收事竊照粤西省早麥於三月底已穫晚麥於四月内亦俱刈畢早禾於四月初間插種其晚禾目下已插種十之八九臣自柳至桂沿途親見早禾茂盛百姓歡忻鼓舞咸頌皇恩謂粤西自聖主御極以來十分收穫今年二麥又比元年增收一二分禾苗又極茂盛秋成可卜大有此皆皇上宵旰憂勤至誠感召之所致也臣又查目下桂林府米價每倉石六錢四五分麥價五錢三分穀價二錢七八分其濵河通商之地米價每石六錢一二分至七八錢不等其不通河道之處則現在米價不過四錢四五分至八九分不等理合一併奏聞謹奏覽奏深慰朕念全頼爾等封疆文武大臣同寅協恭緝匪安良有以感召天和方能致此也同日又奏為請酌停邊員三年即陞之例俾得盡心敎養以廣皇仁事伏查粤西南太慶思四府煙瘴酷烈文武缺出向例選擇熟悉風土者調補三年俸滿即陞近武員雖停而文員仍舊今又定部選者五年調補者三年之例是亦矜䘏邊員之意但各府州縣雖在一省之中俗有淳頑政有繁簡俱要因地制宜悉心籌畫若轉盼三年有陞無降其調補之員身未入境早已屈指遷期何暇慮及民事即有賢員不敢粉飾欺瞞然至土俗人情盡諳而俸期已滿或欲行而不果或行而未效又将匆匆離任矣臣故仰請酌停三年即陞之例欲使各員盡心敎養以副皇上維新之治然邊地煙瘴酷烈若不變通其法以示鼓勵而欲其竭誠盡力亦恐難求實效臣愚竊謂調補之員無論已滿未滿三年如不能稱職立即題叅其邊員三年俸滿撫臣就近委員查覈将養民者某事敎民者某事督墾過某處田園若干畝增植過桑麻雜糧若干種一一造冊具結詳送藩臬轉呈督撫再加詳覈加結具題照例代掣銜籖以所陞之銜留原任再歷三年撫臣照前遣員将以上四欵覈實加入舉行過善政若干件滌除過陋俗若干件社倉如何舉行社學如何舉行如果稱職照前造冊加結具題掣銜留任再歷三年督撫照前将以上八欵覈實加入改惡從善者若干人孝親敬長者若干人民間積粟可支幾年賓興籲俊中式幾士僃造九年實政實績確覈加結始准其出缺連人保送引見予以不次之擢以旌優異仍取接任之官印結報部倘有欺瞞粉飾扶同揑報者将保題出結之督撫各官一併治罪如邊員著有勞績於九年内病故令督撫酌給路費将其家口遺櫬送歸仍量其勞績奏聞仰懇天恩賜其子一官似亦鼓舞之一道也更有瀆奏者武員多異省來仕者尚停其調補彼敎職乃本省之人豈有未悉風土而即欲紛紛更調乎是敎職亦應以九年缺出同守令各官之例一體分別陞奬臣管窺之見是否允協伏懇聖衷乾斷不必以臣摺發部則仰荷皇上保全之恩於生生世世矣謹奏將爾條奏邊員之摺裁去銜名發交九卿會議矣此事從前有人奏過意見大槩相似經部駁議未行今覽爾此奏更覺周詳剴切俟九卿議覆後朕再為裁酌凡條陳摺奏遇有跡渉嫌怨者朕俱令裁去前後然後發議若竟作上諭發出恐廷臣或存阿順之心不無遷就依違若顯露姓名恐於條陳之人稍有不便則生畏縮之心而鉗口不言矣所以朕每如此愼密其事欲使一切人皆可傾心放膽而論奏也同日又奏為恭報署篆初政事臣䝉皇上隆恩署理廣西巡撫印務莅任之後時深蚊負之虞誠恐少有瑕疵為人指摘上累皇上知人之明則臣罪莫逭故日夕兢惕不敢踰越尺寸惟是持廉秉公始終如一臣之所能也若智踈識闇未嫺吏治雖係暫時署理然一日有一日之責恐有舛錯貽誤此臣之所懼也兹将署事以來所行諸事繕摺恭呈睿鑒伏懇聖恩訓誨謹奏覽爾所奏俱悉朕觀李紱為人膽畧才情皆好且心口直爽但尚氣好勝每招怨尤所以輿論率多不取朕惜其才故㧞諸泥塗而登之雲霄諒伊自當感德懷恩盡力於地方事務所不深信者恐未必能純耳爾其留心看伊居心行事據實奏聞如有偏執褊狹疵病毋得絲毫為之隱飾然亦祇宜自據耳目評斷不可聽信人言大槩與伊不睦者居多隆科多年羮堯皆不取其為人朕排衆論而㧞用之欲其感恩悔過革非砥行以報朕知遇之恩也但人固難知倘或下愚不移亦未可定爾近在同省可細訪其吏治密奏朕知不可稍存私意於其間以負朕股肱耳目之信任也密之又密至伊任性尚氣無心小過爾竟披誠規勸令其省改并陳述朕恩激其加勉既同事一方務須文武和洽方能安輯兵民綏靖地方愼莫有辜朕委託封疆之至意特諭雍正二年六月十四日廣西提督臣韓良輔謹奏為恭報粤西早禾豐收晚禾茂盛併進晴雨冊籍事竊粤西通省仰仗皇上福庇二麥并春蕎俱已豐收今早禾粟米已經收穫大半四鄉場圃堆積充盈惟於五月下旬桂林等處微有旱意臣見晚禾正在吐花之候若少一分雨澤即少一分收成遂於六月初一日設壇祈禱即於是日大霈甘霖連雨三日柳州府初四五日雨猶未止桂林府於初九日又大雨如注至今各處連綿不絶晚禾十分茂盛米價照前畧增每石自六七錢至四五錢不等謹将雍正二年正月初一日起至六月十四日止各郡晴雨日期造冊恭呈御覽謹奏覽奏深慰朕懷今歲䝉上蒼垂佑聖祖在天之靈黙為庇蔭大槩直隸各省俱獲豐收朕惟以手加額仰天叩謝感懼耳特諭爾知為朕歡慶雍正二年六月十五日廣西提督臣韓良輔謹奏為恭謝天恩事雍正二年六月十二日新任撫臣李紱舟至桂林府城外臣即出郊恭請聖安擬於十五日自桂回柳已經具摺奏聞正在束裝之際適新任梧州副将張傑於十四日齎捧皇上欽賜臣藏翎及琺瑯翎管硃批聖訓直解到粤臣郊迎入城望闕叩頭謝恩跪聽口傳諭旨敬謹領受喜忭難名伏思寵錫悉屬竒珍睿訓比隆謨誥從此朝夕頂戴莫非高厚之天恩時刻遵循咸凜照臨之聖鑒臣惟有始終砥礪竭盡葵藿之心犬馬之力以仰副聖訓周詳之至意於萬一耳為此繕摺恭謝天恩謹奏知道了全賴爾等文武和協為朕安輯兵民綏寧地方至如同省大吏中有不稱厥職者亦不可隱覆包容若以此為和協則又悞矣惟以不狥私好同心奉公始可為眞和協勉之雍正二年八月十三日廣西提督臣韓良輔謹奏為率土咸書大有粤西尤慶豐登謹陳歡忭微忱事前臣所奏粤西早禾豐稔晚禾茂盛一摺欽奉皇上硃批臣跪讀綸音仰見我皇上聖不自聖峻德巍巍比隆三代臣實歡忭慶幸莫可名言及恭讀諭旨朕惟以手加額仰特持盈保泰足培億萬年之鴻基而愼獨之聖學精一之心傳胥萃於懼之一字中矣以此感召天和有不雨暘時若薄海豐登者乎即如粤西一省早禾久已豐收晚稻又将倍穫兹因新禾豐熟米價驟減故邊民得以鼓腹嬉遊而各直省莫不處處豐稔皆我皇上朝乾夕惕勵精圖治之效也所有微臣感激歡忭之誠謹一併奏聞謹奏惟賴爾等封疆文武大臣能舒暢兵民之心和氣致祥始獲䝉上蒼之垂佑也朕甚欣慶同日又奏為遵旨覆奏事竊臣前奏恭謝天恩摺内奉到皇上硃批伏思臣䝉皇上委以股肱耳目重寄敢不矢公矢愼以仰酬天高地厚之洪恩已另摺奏謝外謹查得廣西按察使白洵惟以唱戲頑耍為務一切政事全不留心其命盜案件俱極草率此實大吏中之不稱職者臣不敢隱諱亦不敢以私廢公謹據實覆奏伏乞睿鑒謹奏知道了朕命伊兄勸戒令其改過嗣後能改與否爾再據實奏聞其才具何如之處亦未深悉同日又奏為恭繹聖訓叩謝天恩事臣以至庸至陋蒙我皇上委以封疆重寄自問實難勝任故戰兢慙懼之忱形諸章奏乃蒙皇上諭以降衷本虛而靈具衆理可以應萬事道心尤寂而妙操至簡可以御至繁仰承訓誨之周詳敢不步趨而黽勉但臣賦性愚蒙學識淺聖誡下曠臣封疆之職守此臣之所懼也再臣前陳墾荒之政蒙皇恩褒嘉逾格敎誡精詳臣跪讀諭旨但期與民興利其錢糧陞科等務悉屬末節爾等斟酌妥協奏聞大哉王言實出典謨訓誥之上矣臣即修書遣員齎捧硃批奏摺至省與撫臣李紱商酌兹得撫臣回札極為踴躍且云已具摺奏請暫動存倉陳穀為借貸牛種修築壩堰之費俟奉旨俞允後與臣商酌具膺兹寵渥然臣之所以仰懇皇上勿以臣摺宣示外廷者祇以臣身任提督凡有敷陳皆關殊遇臣之髮膚頂踵久已捐置度外若猶顧惜身家避嫌遠怨有負我皇上委任之德意則天地神明亦決難容又豈能逃聖明之洞鑒乎謹攄忱瀆奏伏籲皇上鑒宥謹奏朕居藩邸四十餘年親身閱歷不少此等處豈有不鑒照者乎同日又奏為恭進關隘地圖併陳邊境情形事竊臣仰荷皇上隆恩畀以封疆重寄上體聖主安不忘危至意不敢不防患於微故自入粤以來即留心諮訪安南邊境情形今已稍知大槩謹將各關隘山川道路繪畵成圖恭呈睿覽臣查廣西邊境之内與安南連界者皆屬土司雖設有龍憑等營每營僅設兵一百五十餘名俱分守各隘鎭南大關為貢道出入鎻鑰謹嚴關外種有刺竹關内築有牆垣數十丈雖稍有坍塌已併將通省城池凡有傾圯之處造冊先後咨明督撫設法修築矣惟下雷思陵湖潤諸土屬並無隘口可守雖藉山嶺間隔何難越度臣留心細查其安南之人披髮跣足服製不同從不敢闌入粤境若楚粤貧民向日多有興販貨物及濳出偷挖安南山礦臣聞知即會同督臣鎭臣嚴行禁止不許各土司縱放一人出隘又慮土司安南交界之地無邊牆限隔或致漏越故併檄行凡通土司地界之塘汛槩為嚴禁稽查至於狑狼猺獞生性頑梗所有改土為流之地尤為兇暴仇殺之風尚不能免已令各屬督率各鄉村老會團禁戢内有仍前不法者即會商督撫令營弁與文員協捕解交有司審究惟滇黔楚蜀交界之所悉苗巢獞窟恃其險遠尤喜仇殺抑且販私挖礦刦奪公行臣當與督撫臣悉心籌畫務使鈐制有法張弛合宜逐漸變頑為淳俾得同沾聖澤俟有成議再行奏聞兹因恭進安南關隘地圖謹將邊境情形附奏其安南水陸路程一併繕摺進呈伏懇皇上睿鑒謹奏安南恭順勤修職貢歷有年所自朕視之莫非臣民何分中外況往來貿易商民所便登記檔案稽查姦宄可耳若一旦槩禁出入既不便於民且生逺人疑懼非善政也偶有刦奪搶掠干犯國典之案隨事盡法審究示懲毋稍姑縱修理牆垣整飭汛兵皆係應行要務圖冊留覽嗣後地方關隘等事務須咨移督撫商酌可否而行不可擅専鹵莽而為切記切記同日又奏為提標續造之軍裝告竣營兵敎操之武藝漸嫺繕摺奏聞附陳綏靖地方機宜事竊照廣西提標軍裝經臣續造之籐牌挑刀牌刀鍬鋤鑼鍋帳房旗纛火藥鉛彈等項俱已告竣臣於八月初七日俱一一驗眀分別收給操習取有各營收領存案軍器整齊營伍改觀且按期敎演各營兵丁技藝俱漸嫺熟臣愚竊謂趁此威聲自宜加意整頓以期綏靖地方查得粤西猺獞出入必帯刀鎗故行兇頗易臣雖多方勸化禁戢綦嚴然其㩦帯刀鎗往來皆於深山曠野是以塘汛兵丁難於稽查故又檄行各協營并咨會督撫轉行有司令各處村老獞目練總會團禁止如有蠻獞仍前㩦帯刀鎗出入即協力擒拏今桂林全州平樂等協營之陂源峝興安汛荔浦汛等猺獞俱將鳥鎗長刀繳出其餘各處尚在查繳如有殺刦之案兇暴昭著不服拘拏者即與督撫臣商酌萬全於霜降之後農事既畢撥兵順時討捕拏究以期綏靖地方理合預為陳奏是否允協伏候皇上批示謹奏猺獞帯刀素習巳久或以之防身捕牲未必専為殺刦而然也其刁悍之俗但應徐徐化導有犯即按律究處以示懲創若無故紛紛禁止刀鎗不惟無益且恐滋擾亦斷不能禁絶又閲與督撫商酌萬全霜降後撥兵順時討捕拏究等語國家設立大法必俟有罪而後加刑否則此等舉動萬不可輕忽也將此摺亦與李紱㸔同日又奏為謹陳撫綏土民勸懲土官事宜仰求睿鑒俯賜訓誨事竊照粤西各土司中其官之昬愚貪暴民之困苦顚連從來如是非一朝一夕之故也臣莅粤以來仰體皇上一視同仁之意曉夜孜孜思所以撫綏之術而未得嘗欲商酌改土為流之策竊恐官雖改流而土目土俗猝難更易又欲議土官倣流官三年大計之典以行黜陟又慮土司陋習有一事必藉名科派反致擾累又嘗欲商請增設學校廣置生徒以行敎化而誨頑愚恐以兇頑之徒而忽假之以衣頂多一土學之生員必增一嚼民之狼虎此數者非不可行也但行之有漸耳若今日急務則勸懲土司之道不可不嚴矣如太平田州等土知州此土司中之優者也臣擬加之奬賞以激勸其餘又如思明泗城龍州思陵忻城等土府州縣以及興隆永順等長官司此土司中之劣者也臣已告誡再三倘仍不知悛改擇其尤不法者會同督撫臣具疏奏聞加以重法嚴行懲創以儆其餘然後擇師以敎土民之詩書可也增設學校以選英俊亦可也先舉三年大計之典徐行改土為流之策均無不可也臣受恩深重毫無裨補於國家妄以管窺之見瀆陳天聽竊恐於封疆之計未協關係匪輕伏懇皇上恩宥敎誨謹奏粤西土府承襲巳久若無故奪其職守改土為流未免羣起驚疑殊非安邊之道地方大吏惟宜於其貪暴昭著者嚴加訓飭遇有藐法抗拒者然後發兵勦除庶幾理正言順亦必先正渠魁之罪而後再議改流猶當查其宗支斟酌可否豈可無因輕舉生此無益之事乎將此批諭與李紱㸔開闢田土興修水利乃民間要務朕先嘉許爾所奏原止據州縣所屬内地而言亟宜多方勸墾照例報部陞科但不必廹促耳若令百姓侵奪土司地土則斷然不可且清丈一事擾民累官尤不當輕舉雍正二年九月初八日廣西提督臣韓良輔謹奏為恭報年成米價事竊照廣西一省晚禾已經收穫查得桂林府米價倉斗每石六錢八分平樂府五錢四分梧州府六錢三分潯州府五錢柳州府三錢八分慶遠府四錢思恩府四錢五分南寧府四錢六分太平府六錢五分又據臣差去查關把總禀稱馬平縣米價每石三錢來賓縣遷江縣三錢五分賓州二錢七分上林縣三錢二分米價甚賤邊民樂業理合附奏恭慰聖懷謹奏覽奏米價情形曷勝慰悦雍正二年十一月初八日廣西提督臣韓良輔謹奏為遵旨據實再奏事竊臣前奏按察使白洵演戲廢弛政務一摺奉到皇上硃批臣遵查得白洵為人尚覺坦率除茶果外亦未嘗濫取乃中人才具但喜聽戲頑耍臣前署撫篆時披閱文移見其於命盜等案只圖草率外結了事若能愼重民命為我皇上出力則尚堪供職至於近日之人命賊盜等案仍前草率與否因文武殊途尚未確見容訪實再奏為此繕摺據實覆奏伏候皇上睿鑒謹奏按察使為提刑大吏其優劣賢不肖何能逃通省之評論訪實即行奏聞同日又奏為再陳邊境情形仰請聖訓事臣前恭進安南關隘地圖蒙皇上硃批訓誨仰見我皇上保全臣下之聖意至周至渥臣受兹高厚感激涕零敢不倍加兢惕伏查提臣衙門舊例調發兵馬必事有警急猝不及待者一面咨會督撫一面乘機𠞰捕若非萬分警急從未有不商之督撫擅自發兵之理至於有搶奪刦掠干犯國典之事督撫臣必委員會審從不敢姑縱謹再將邊境情形據實陳奏仰求皇上敎誨查安南國境東接廣東界西接雲南界南距大海均可任其往來獨廣西控阨安南之鎭南關封閉謹嚴凡至該國進貢之年先行訂定月日屆期新泰營㕘将會同左江道及左江鎭標遊擊并調土州各率弁兵等齊至關内啓鑰驗明然後放入迨至貢使返國其出關之例相同設有公文來往亦必先報太平府及新泰營一面發鑰啓關接遞公文一面飛報左江鎭道轉報督撫提臣夫以一紙公文國法尚如此綦嚴是以通行飭禁各隘口不許私放姦徒越隘今伏讀硃批諭旨曲賜訓誨敢不倍加黽勉仰副睿懷臣因再四籌畫或移事簡之同知通判一員與龍憑馗纛二營守僃駐劄大關按時啓閉如有商民過關查無㩦帶違禁貨物即便登記檔案放其出入其餘所有私隘令各土司概行堵截如敢私行縱放即將該土司及吏目等官一併從重治罪但更改關制移駐文員事體重大臣未敢冒昧率奏應否咨商督撫臣會疏題請伏乞皇上聖訓遵行謹奏與督撫臣詳議允協會疏具奏朕日前批諭不過據大概情理而論未悉向來粤西舊例如此綦嚴不可因朕一時之諭勉强將順但向永久安寧處悉心籌畫定議可也爾等其確商之同日又奏為仰承聖訓恭謝天恩事臣前奏撫綏土民一摺奉到皇上硃批仰見我皇上生成之德同於天地臣恭承聖訓敢不時刻警惕上慰聖懷謹再披瀝敷陳叩求恩訓查粤西地多荒蕪即臣恭進馬平一邑圖冊推之可以墾闢之土甚多自不必侵奪土司之地至於有司奉行不善其清丈擾民累官誠如聖慮故臣前奏淸丈不可行於墾荒之始也又伏讀硃批諭旨改土為流豈可無因輕舉恐起土官驚疑殊非安邊之道天語煌煌誥誡周密但須一一遵循便可無憂隕越臣雖至愚敢不倍加謹愼一切地方政務自當事事咨商督撫然後舉行臣謹遵旨將撫綏土司併臣續造軍裝告竣之摺俱緘封専差標員齎送撫臣李紱恭閱畢仍封交該員齎回另摺恭繳理合繕摺覆奏伏乞皇上睿鑒謹奏知道了地方上一切興利除弊之舉爾等總宜文武和衷殫心籌計而後行之同日又奏為恭謝天恩事雍正二年十月十六日新任右江道臣喬于瀛到柳臣出郊恭請聖安道臣口傳恩旨爾告知韓良輔伊做官好朕信得及伊等十二人朕俱保得定是不肯改易素志者臣跪聽之下感深肺腑不禁涕泗交流竊念臣一介庸愚受兹寵渥雖粉骨碎身亦難仰酬萬一設有一點改易上累聖主知人之明即蒙皇上憐臣不加誅戮而天地神明亦決難容臣惟是臣之所能自信者只此寸心若臣之才識智慮則實難仰副皇上委任之意聞命自天悚懼倍切惟有益切冰兢竭盡蟻忱以仰報皇上亘古未有之殊遇耳再有奏者右江道臣喬于瀛送到緘封奏摺匣一箇據稱面奉聖旨交臣轉達理合一併恭進謹奏知道了文員道府武職副㕘中朕亦間許其摺奏倘有借此挾制上司妄作威福者據實密奏以聞同日又奏為謹陳微臣近政仰求訓誨事臣受恩深重無可報効雖竭盡駑駘之力黽勉趨事祇慮才識謭劣有負我皇上格外拔擢至意除營伍中一切職守應行事宜不敢瀆奏外謹將臣近日所行政事繕摺奏聞仰求皇上訓誨一臣前署撫篆時聞全州學宮已鞠為茂草曾捐資製疏倡修今馬平縣學僅存大成殿三間已將傾圮伏念馬平為臣駐劄柳州府之首邑臣亦竊被詩書之澤豈容膜視因親製募疏并捐貲移交一臣署理撫篆繙閲舊巻部文内開奉旨俞允侍郎蔣廷錫條奏著令州縣大鄉鉅堡開立社學鄉民子弟内有立志讀書者聽其送入等語臣思鄉民尚有貧富不同若營兵之子弟則尤為貧苦柳州兵丁四千餘家無力讀書者多亦宜一體敎育適臣署之西頗有空房臣修葺完整改為義一臣欽奉恩詔内旌表節義一條臣前署撫篆時於桂林府查出天主堂一區改建節孝祠蒐訪桂郡節烈闡播幽芳一一舉行已經奏聞外臣旋柳之後又思兵丁身後其妻有茹冰飲蘗矢志勵操者亦宜表揚故臣於柳郡城内亦建造節孝祠一所於廣西通志内查出軍衞弁兵婦女蕭氏等一十五名又檄行各協營查訪節烈俟彚報一臣前摺奏開墾荒蕪蒙硃批令與李紱同㸔又經李紱先後題奏候旨欽遵今查出臣標營兵之弟男子姪三百餘人年力強壯素無恒業俱堪負耒耕耘現在咨商督撫俟奉一本年秋冬之交多風少雨柳州府城廂内外屢便難撲滅其救火之具急宜製辦庶幾有備無患隻以備不虞一臣查廣西一省天氣溫暑地氣鬱蒸草木山泉之氣感而為病有冷瘴熱瘴啞瘴之不同按其證候治得其道皆可安痊乃粤民貧苦之家無力服藥多致不起深可憫惻臣仰體皇上矜全民命之德意於桂林延請老醫來柳買備各以上諸事雖犬馬報效之忱臣愚惟恐未能仰體聖心伏懇曲賜敎誨為此繕摺謹奏爾等封疆大臣特被簡用咸能外嚴内仁以布徳施惠代朕作福是即朕之福也若刻虐其下惟以自奉則為朕造孽何可當耶勉為之陸續保送之奏甚是正合朕徐徐引見之意摺留覽硃批諭旨巻二十九上欽定四庫全書硃批諭旨巻二十九下硃批韓良輔奏摺雍正三年二月初三日廣西提督臣韓良輔謹奏為邊營務在得人謹遴選保奏伏懇皇上恩准補授以收臂指之效事竊廣西邊境與安南接壤其鎭南關所設營汛甚屬緊要臣查得馗纛營守備潘克演防禦懈弛不守官箴臣已經咨移督臣孔毓珣會疏題㕘又河池營中軍守備劉應奉推陞員缺所轄俱屬猺獞界連黔省狆苗亦屬要地以上所遺二缺恐部推之員未悉風土臣謹遴選得臣標中軍千總陳治邦辦事勤愼熟諳邊情柳慶恊左營千總奏可否恩准伏候皇上睿裁謹奏覽同日又奏為恭承聖訓據實覆奏并懇天恩賞賜平安丸藥事臣欽遵皇上硃批查得現在粤西道府副㕘中實無借奏摺威嚇僚屬挾制上司者如有此等不肖之員臣自當據實密奏又蒙皇上硃批平安丸一藥甚好賜汝二百丸僃用欽此我皇上仁同覆載布德流惠彌綸六合臣不勝歡欣舞抃倘蒙天恩俯允多發數百丸皇恩益無紀極矣至於安南邊境及土司猺獞一切事宜容臣與督臣孔毓珣撫臣李紱盡心籌畫務求久安長治之策商酌妥協陸續會題摺奏恭請皇上睿裁謹奏柔逺之道安邊為要萬萬不可貪利圖功輕啓釁端一有事出則所得不償所失矣惟宜順情度理而愼為之其猺獞事宜卿等共相悉心區處毋忽同日又奏為恭報雨水米價事伏查兩廣地方去年自秋徂冬數月無雨天時雖覺亢旱然在收穫之後尚於農事無妨自去冬十二月二十二日至今廣西地方時雨時晴連綿不絶土膏滋潤犂鋤遍野是今歲收成又可以預卜豐盈矣其米價雖覺稍昂然較諸他省甚賤此皆仰頼我皇上宵衣旰食惠養元元之聖衷感浹天心是以萬祥畢集風雨以時臣不勝歡欣蹈舞之至為此繕摺謹奏覽奏甚為欣慰全賴爾等封疆大臣安輯兵民寧謐地方有以感召天和也勉為之雍正三年五月十三日廣西提督臣韓良輔謹奏為邊營要缺需員謹遴選保舉仰籲皇上簡補以收得人之效事伏查廣西現出有三里營安隆營守備二缺三里一營界連古零白山東蘭諸土司所轄地方獞蠻素稱頑梗安隆一營所轄之十甲周圍數百里俱係㺜猺雜處獷悍異常又界聯滇黔苗猓以上二缺俱極𦂳要誠恐部中推陞之員未諳邊境情形臣查得柳慶協千總甘棠秀人材壯健弓馬嫺熟經臣保奏在案又桂林協千總李成奉人材弓馬俱優撫綏陂源峝猺獞著有勞績以上二員實係操練精勤巡防周愼努力上進之員倘蒙皇上允臣所請以甘棠秀陞補三里營守備以李成奉陞補安隆營守備庶地方營伍均可收得人之效矣為此謹奏照韓良輔所請補授該部知道同日又奏為邊省之疆界最為遼濶接壤之營制急宜聯絡以戢苗夷以綏地方事竊照滇黔西粤俱苗夷雜處之區惟黔之安籠滇之廣羅廣南粤之泗城鎭安安隆上林等協營為三省交界之處層巒疊嶂綿亘無際㺜狼狆猓巢窟其間每與隣省睚眦小怨輙互相讎殺不已葢緣地屬分轄兼距府窵逺有司鞭長莫及因之蠻徒負嵎肆行無忌現在欽奉上諭分防各弁不論何標何汛凡係附近地方毋分彼此互相接應欽遵在案但思三省蠻夷接壤之處疆界遼濶巖穴險固非有統轄之大員督責其間則隔省弁兵平素既未聯絡緩急豈能呼應似宜急為變通方於巡緝有濟今查貴州之安籠一鎭本為控禦苗蠻而設其駐劄之地距粤西安隆營之三道溝汛僅八十里而安籠西南為三江入紅水河之處實為三省接壤要區其河之西為滇之廣羅協汛河之北為黔之捧鮓營汛河之南為粤西之安隆營汛由此上下數百里俱係苗猓㺜狆狼猺雜處或黔與粤接或粤與滇接或滇與黔接犬牙相錯之處甚多若將廣西雲南二省凡與安籠接壤之土司與改流地方之各協營汛悉受安籠鎭節制而該鎭亦聽三省督提節制其將弁之舉劾兵丁之汰補糧餉之銷算仍照各本省舊制以免紛更惟讐殺刦擄諸事悉令安籠鎭就近調度撥兵擒捕俾疆界聯絡事權畫一倘有將弁玩縱或匪𩔖逃遁隔汛不互相策應者即行咨會題㕘照例治罪庶將弁有就近之督責不致推諉因循而苗蠻知軍威之堪凜亦漸可回心向化於地方似有裨益謹繪滇黔粤三省交界地圖恭呈睿覽如果臣言可採伏乞特諭三省督撫提鎭詳議會題施行謹奏此奏甚屬可嘉如此留心地方籌畫周詳抒誠入告方為不負朕之任用也已有旨矣同日又奏為恭繹聖訓叩謝天恩事竊臣前奏恭謝聖訓據實覆奏摺内奉到皇上硃批臣祗領開讀伏惟我皇上量同天地明並日月凡所以奠中外於磐石之安者聖慮周詳無逺不屆茲安南小國遠在荒服之外欵誠恭順尤荷聖慈軫念指示柔逺之道詳切周摯臣雖愚陋敢不静繹聖訓悉心體究竭力撫綏如近日歸順土州之惡目黄徳成等漢姦陳元賓等糾集懶漢私越隘口搶奪恐啓邊釁又修仁縣之十排兇獞韋扶晚等恃險肆掠不服擒拏臣與督撫臣屢經曉諭至再至三不得已而懾之以兵始一一就縳俱送交有司收審現聽督撫臣依限題報歸結不但不敢貪利圖功即順情度理之事亦不敢張皇矜詡上勞睿慮也至於安南邊境久安長治之策現在咨商督撫臣轉行布按二司會議應聽督撫臣會疏恭請皇上睿裁為此繕摺謹奏地方上有應料理處自不宜因循玩愒至於邊境隣接外夷極當愼重諸凡率由舊章何有悔吝近日雲南開化生一無益之事幸見幾尚早方得潛消黙化總之開疆拓土好大喜功之念絲毫不可存於胷中也雍正三年八月十八日廣西提督臣韓良輔謹奏為恭報粤西年成雨水并進米價淸摺事竊照粤西今歲自正月至七月上旬各處雨暘時若二麥及雜糧俱已豐收早稻又將成熟晚稻暢茂惟七月十六至二十日大雨連綿江水泛漲桂林平樂思恩南寧潯州梧州等府濱河田地被水淹浸幸即消退低窪之田未免少減分數而高田尚可豐收其年成分數俟刈穫之後再奏至於米價較前甚平謹將各州縣米價另繕淸摺恭呈御覽合併奏聞謹奏米價平減即豐登之驗朕懷深為欣慰同日又奏為奏聞發兵擒捕三疃獞賊緣由仰祈聖鑒事竊臣於雍正三年七月十五日准撫臣李紱移咨撥兵擒捕慶逺府天河縣福祿里之三疃兇獞覃明將等且稱獞賊所居各隘險阻異常環而攻之當亟乘八月禾稼未收之際整兵堵隘令其坐困自投若過八月彼糧食有餘即難奏效等語臣因未准督臣移會不敢擅専發兵遂札商撫臣恐隘外田畝或有良民禾稼在内宜俟秋成之後督臣覆咨到日然後發兵始為萬全似可不必拘定八月之期撫臣覆札云良民稻田自應加意䕶持已令多張告示諭以無恐照常收穫務使鷄犬不驚乃為盡善仍於八月進兵為妥又云督臣業已咨移不及候其覆示等語於七月二十九日甫接覆札而撫臣遣千把各一員帯兵一百名已抵柳州城下臣見撫標官兵已出不便任其獨往一面咨明督臣一面先遣臣標僃弁各一員率兵二百名協同撫標官兵前往堵截各隘并檄柳慶協副將孫士魁酌帯兵丁統率調度又檄河池營千總李榮帯兵堵截賊巢後路仍給發告示曉諭三疃村老兇獞人等令其痛改前非自行投到照例從寛減等倘或執迷不悟俟督臣咨覆到日臣即續發臣標官兵前往協同搜捕務獲有名案賊解交有司收審以靖地方理合據實奏聞謹奏若輩愚頑不法之徒先當以徳感化猶不馴服則不得不以威制之萬不可姑息因循以養癰成患大凡天下事毋為禍先釁自彼生而我後應之不論如何若何皆可也再者爾奏李紱條陳之摺留中矣朕閲李紱所議亦有甚是處候朕細加斟酌另發旨與新任撫臣鄂爾泰同日又奏為敬繹聖訓據實奏聞事臣前摺奏安南邊境事宜現在咨商督撫臣會題荷蒙皇上硃批諭旨臣仰承聖訓至明至切煌煌天語敢不細心體繹竭力遵循查安南邊境事宜臣已咨商督撫臣會疏入吿迨准撫臣李紱咨覆謂即酌稿會題是以靜候將及四月頃接撫臣疏稿知已特疏條奏但撫臣於營制未嘗深考又未與督臣會商遽議分撥弁兵代土司防守邊隘殊非重内輕外之意事關封疆大計臣不得不繕疏具題葢廣西營制與他省不同即如雲南有臨元等七鎭貴州有安籠等三鎭即廣東除督標將軍標外尚有潮州等六鎭并閩粤分駐之南澳鎭不似廣西之僅左江一鎭而雲貴提鎭各標之額兵亦不似廣西提鎭兩標之貼防分防各州縣况通省額兵除撫提鎭三標外其各協營僅一萬零一百五十八名且雲貴各協營俱設有馬兵廣西則除撫提鎭三標設立馬一步九外其各協營止有步兵是廣西營制事事與他省懸殊外控安南内轄土司猺獞幅􅊷最廣兵力最單臣方且日夕惴惴寧敢隨聲附和再議分撥臣仰遵安南邊境之睿訓惟有率由舊章倍加警惕以副我皇上委任之至意理合據實奏聞臣再有奏者撫臣李紱操守甚好學問甚優臣實敬服但任性偏執喜順惡違抑且好名之念未除臣以國計民生為重無事不委曲婉轉悉心細商以求至當此番因事關營制撫臣既許會疏乃並不會商督臣先已特題臣職司軍旅故亦冒昧具疏仰瀆天聽設撫臣因此反致固執前議恐於地方營伍久安長治之計未協伏懇皇上乾斷俾營制仍遵舊規以免紛更則地方幸甚微臣幸甚謹奏此等重務何可隨聲附和自應各出己見論奏為是今廷臣已議令爾等再加詳議矣所奏知道了雍正三年十一月十四日廣西提督臣韓良輔謹奏為天威丕震蠻獞革心向化據實奏聞仰慰聖懷事竊照廣西慶逺府天河縣三疃地方猺獞獷悍歷來讐殺之案纍纍極為頑梗雍正三年七月十五日准撫臣李紱咨商發兵擒捕緣由臣已經奏明在案臣愚竊謂専事德化恐漸流於姑息若不敎而誅又難副聖主一視同仁之至意遂檄令柳慶協副將孫士魁帯領弁兵會同慶逺府知府劉之頊率領南丹等處土兵并臣標左營遊擊金國泰河池營㕘將李必顯三里營守備甘棠秀柳慶協守備蕭伏各帯千把兵丁四路前進仍一面給發剴切詳明告示曉以利害許其自行投首則轉咨督撫照例從寛減等大軍所至彼蠻獞人等莫不歡欣鼓舞感激皇上天恩聲震山谷於是各峝有名案犯上疃莫東旺等中疃覃貴翁等下疃覃明甲等俱先後自至軍前投首現交有司審理從此三疃地方十餘年之積案一朝頓清於九月二十日撤師回至慶郡臣預先飭諭行間文武乘此兵威將宜山縣之那隘及三岔各案蠻獞按名擒拏以正國法乃師行之日甫抵三堆村其首犯覃應太覃道照先至軍前投到迨兵抵崙頭村則餘黨俱一一自投到案均交有司審結臣標官兵自八月十九日出師至十月初三日班師回柳計期四十餘日不損一兵不累一民不費張弓隻矢三疃既已悉平而那隘三岔之犯又俱自投到案此皆上頼我皇上威德覃敷指示周詳是以督撫臣及行間文武將士和衷用命各案獞犯一一投首地方得以寧謐臣不勝歡欣感戴之至理合據實奏聞謹奏覽奏忻悅殊屬可嘉之至爾之實心報效調度有方朕皆悉知但能始終如一永久不懈為佳爾其勉之同日又奏為恭進粤西米價淸摺附陳管見伏候皇上睿裁事竊照廣西今歲二麥粟豆俱已豐收惟低田之禾被水淹浸高田之禾又間生螟螣未免畧減分數通計約有八分收成查米價以倉斗合算每石俱在五錢以内謹另繕淸摺恭呈睿覽抑臣更有奏者廣東一省向藉廣西米穀接濟今歲東省肇慶等府偶罹水患在西省搬運米穀者更多而督臣又因修築圍基現在差員購買商差船隻運載米穀出境者絡繹不絶小民不知蓄積葢藏之道見米穀得價盡行出賣以致米價日昻竊恐明歲春夏之交兵民必致乏食伏查廣西一省倉庾除米石外尚貯穀一百六十餘萬收積既久恐漸至浥爛當兵民乏食之際若酌量十之一二照依時價平糶實於兵民裨益匪淺倘荷聖慈敕諭新撫臣詳加斟酌或明歲二三月間至米價湧貴之時於桂林柳州南寧三府重兵駐劄之地開倉平糶其所糶價銀解貯藩庫俟九月間收穫既畢酌量歲豐則仍舊照數買穀還倉倘或歉收則留俟下年買補如此則倉穀無浥爛之虞而兵民得免乏食之苦矣但奏請平糶原非武臣職掌本不應妄瀆聖聽臣因皇上宵旰憂勤日夕以民生為念若至明春米缺價貴之時然後入告粵西地處邊逺恐緩不及事故敢冒昧預陳伏乞睿鑒施行謹奏爾亦膺封疆重責𩔖此地方要務若知而不言報效之謂何汪漋為人和平老成恐才力少覺不及爾其盡心相助此事何必朕另為飭諭爾即與之商酌而行可也雍正四年二月二十四日廣西提督臣韓良輔謹奏為恭繹聖訓敬謝天恩事臣前摺奏出師三疃一事䝉皇上硃批褒嘉誡勉聖恩愈厚兢惕倍深敢不益勵初心夙夜匪懈以仰副皇上委任之至意又臣奏請平糶捐穀一摺恭讀諭旨遵即具札備言目今廣西蒼藤諸邑米價每倉石已賣至一兩一錢將來靑黄不接恐日益昻貴小民一至缺食並無他省米穀接濟實為可慮并將臣去年摺報米價曾以此意附奏通知撫臣頃接撫臣覆札謂近日米價騰貴殊可憂慮現貯穀甚多日久必致霉爛急思變通之計知臣於去歲曾經摺奏當即令各屬實力奉行等語俟撫臣作何斟酌平糶容臣另摺奏聞謹奏平糶之舉李紱到京所奏亦同巳諭部矣雍正四年六月十八日廣西提督臣韓良輔謹奏為奏聞酌行撫提鎭三標會巡之法以靖河道以壯聲援事伏查粵西通省各標協營惟梧州協有水師一營額設水師戰守兵丁三百九十八名除分防大江二十三汛府江一十五汛共撥出兵二百五十九名存營僅一百三十九名兵力殊覺單薄不稱水師之名且去歲廣東歉收臣恐河道不靖預商防範之策隨移咨撫臣鎭臣咨覆允行在案近因廣東米價日昻窮民乏食於東西邊境偷挖礦沙攔奪穀米兩省弁員現在帯兵分頭堵逐解散并准臬司咨呈移商督撫臣會驅外因思此番遊巡必須多帯口糧在於梧郡久駐使其彈壓地方庶東西邊境得以寧謐臣已會同撫臣鎭臣商酌三標各撥弁兵每季㑹巡已准撫臣鎭臣各撥標員帯兵駕船分巡三江會集梧郡駐泊操演以壯聲援以資彈壓俟八月中禾稻登場之後然後各回本標照前按季遊巡庶通省河道俱可肅清而梧協之水師不為徒設矣所有撫提鎭三標會巡彈壓緣由謹據實奏聞謹奏防範固屬當然但不預為籌畫民食至臨事而講求彈壓仍屬末策雍正五年正月初六日廣西提督署理廣西巡撫印務臣韓良輔謹奏為奏聞事伏查天河縣獄内拘禁莫東旺一名係昔年挾讎刦擄傷死韋順學之犯雍正三年臣等發兵擒捕三疃蠻賊之時該犯畏懼天威自縛出投經府縣審明具詳前撫臣李紱以事在赦前照夷例批飭枷責追贓結案因該縣正署各官李振宗成其發鮑準等疊經更易延及一載尚未追贓發落以致蠻獞糾集多人於雍正四年十一月十八日夜由縣堂右側推倒土墻蜂擁入監將莫東旺搶去脱逺颺其獞蠻之罔知法紀固當務獲嚴懲而該文武之疎防怠忽亦難輕貸現在勒令將各犯拏解自贖但恐山峝巇險未易弋獲已於去年十二月二十五日咨商署督臣阿克敦如獞蠻恃險負嵎不服拘拏則一面將該管文武㕘處一面發兵圍堵擒捕務獲餘黨嚴行懲究以申法紀謹繕摺預為奏聞伏乞皇上睿鑒謹奏知道了應如何料理方為允妥與督臣詳悉商酌而行可也同日又奏為恭謝天恩事雍正四年十二月十七日准署提督左江鎭臣齊元輔咨稱䝉兵部劄付十一月初七日奉旨韓良輔人品端方操守廉潔自莅任廣西以來實心辦事今伊嫡母溘逝聞之深為軫惻廣西提督事務關係緊要且又署理廣西巡撫印務正資料理伊母之櫬既現在廣西任所著韓良輔在任守制俟巡撫甘汝來陛見回任朕再酌定署理廣西提督印務之人給與韓良輔假期扶櫬回籍該部知道欽此并移送提督印信到臣臣驚聞寵命感深肺腑不禁涕泗交流隨䖍設香案望闕叩頭謝恩接印視事已經繕疏題報謝恩外伏念臣一介庸愚才疎識陋䝉皇上特恩由副將擢至提督又兩奉特旨委署廣西巡撫印務聖恩高厚圖報無由頃丁臣嫡母李氏憂例應離任守制復荷皇上天語褒嘉命臣在任守制另給假期扶櫬回籍臣受兹曠典雖肝腦塗地亦難酬洪恩於萬一竊念臣父已故重慶總兵官韓成雖入籍四川歿葬於合州郊外臣是時方任大名副將不能奔䘮是以未嘗一履蜀境迄今每一念及椎心泣血無地自容祇以受恩深重未敢乞歸省視今沐聖慈矜許恩賜給假扶櫬回籍得以展拜臣父之墳塋經營臣母之窀穸子道少盡從此有生之年皆誓捐頂踵以圖報效之日也為此繕摺恭謝天恩謹奏朕既委任封疆自必令爾得遂孝思隨有旨實授爾為廣西巡撫辦理諸務不可以為暫署而將就因循勉之舉凡李紱甘汝來汪漋三任内如有隱蔽欺朦處毋稍為之諱飾而代受過咎須一一密奏以聞同日又奏為恭報粤西年成米價事伏查廣西一省去歲通計約有八分收成因廣東商販搬運米穀而兩省有司又皆採買糶三之穀補倉米價比往歲稍昂小民不知蓄積之道得價即儘數出糶恐今歲春夏之交民間乏食價更昂貴亦未可定臣愚竊謂炎鄉地暖冬間從無霜雪儘可種植雜糧祇以粤西陋習每歲秋收甫畢即縱放牲畜恣食田野小民雖欲種雜糧而不可得臣署事之初即嚴禁牲畜踐食勸民種植麥蕎豆菜等物以濟匱乏并飭有司視窮民艱於籽種則代為區處若好義紳衿百姓情願借給者查實給扁奬勵又責令農官村老督率勸導盡力料理資助如村老著有成效則核實註冊挨年題授農官或農官怠於勸率即行詳革并曉諭有司俟撫臣回任臣當囑其視各州縣勸民冬耕有無成效於計典時以此定其優劣是以倍加鼓舞現在通省種植雜糧耕鋤遍地即使穀價昂貴而小民亦不憂乏食矣理合附奏仰慰睿懷謹奏因地制宜因時勸耕洵屬美舉御史謝濟世粤西人也今乃黨附李紱而誣㕘田文鏡其事之始末諒爾閱科抄自已知悉無煩朕諭可將謝濟世宗族行止若何鄉評褒貶若何并李紱前在粤西有何恩恵及伊之處詳細訪明繼以糾劾毋稍瞻狥隱飾務得實情奏聞倘若漏洩聲息或體訪不實則必累及汝也諒爾斷不肯負朕愼之密之雍正五年二月初二日廣西提督署理廣西巡撫印務臣韓良輔謹奏為遵旨奏覆并恭繳諭旨事雍正五年正月二十日欽䝉我皇上頒發諭旨到臣臣謹遵密訪查得謝濟世係廣西桂林府全州人雖非大族然同姓亦不下百十餘丁其祖思恩敎授謝明英其父生員謝賜紱俱故其叔兩浙巡鹽御史謝賜履已經休致細查謝濟世乃無知小人恃少年科甲狂妄悖謬居鄉則以小才私智每每輕忽老成為族黨之所痛惡服官京師惟知結納鑽營兹又黨附李紱聽其愚弄指使將實心任事不避嫌怨秉公持正之封疆大臣加以貪贓壞法之汚名肆意誣詆顚倒是非撓亂聖政誠國法之所難恕者也臣又查李紱於雍正二年六月十三日入桂林撫署而謝濟世適丁憂起復至省謁見於七月初二日即領咨赴部補用只此一事章㕘劾不敢瞻狥臣正在繕摺間適准刑部咨文奉上諭命謝賜履立即進京臣即於是夜檄行布按二司奏并繳硃筆諭旨一道伏乞睿鑒謹奏知道了同日又奏為恭請簡補邊缺官員事伏查邊省應題補各缺現在欽遵諭旨與督臣確查定議分析具題聽候部臣會議其現在員缺未歸部選亦不敢照舊例調補如廣西省南寧府出有宣化縣一缺横州一缺永淳縣一缺太平府出有通判一缺思恩府出有西隆州一缺武緣縣一缺慶逺府出有天河縣一缺俱係邊境要地其員缺未便久懸仰懇皇上特簡賢能星馳來粤任事則地方收得人之效矣為此繕摺奏聞仰祈聖鑒施行謹奏該部照所請揀選人員引見同日又奏為恭繳硃批奏摺并進泗城地圖事雍正五年正月二十二日欽䝉皇上頒發硃批雲貴督臣鄂爾泰奏摺一扣到臣臣查摺内所奏邊境惡習切中滇黔粵西流土地方情形又不僅奏已邀聖鑒今幸隣省督臣同心共綏邊境又䝉天語敎誡諄切臣倍增踴躍敢不萬分愼密竭力料理預為準備惟是貴州提督駐劄之安順府至廣西泗城土府之板貴村僅二百二十里而臣現在駐劄之桂林府至泗城土府計程已水陸一千九百餘里又自土府至貴州邊界五六百里不等逺近懸殊是以文移往返最為遲滯今臣已專差齎劄諮商鄂爾泰如即應出兵則俟撫臣甘汝來回粤俟雲南督臣到日會同審究面商改土為流之策庶幾不致貽誤但查泗城土知府岑齊岱已於雍正二年十一月病故其子岑映宸於雍正三年十二月始受印視事至今尚未接領號紙雖案犯未曾擒獻然該土府外哨二十五甲各有世襲頭目管理該官男亦未能鈐制約束其情似有可原仰懇皇上天恩俟兩省積案清結之後或德意設或無端逃匿抗拒則國法所在誅戮必多恐無以上副我之策尚應俟臣與鄂爾泰面商萬妥方敢具題請旨臣待罪封疆有關國家大計不敢依違附和以蹈欺罔之罪理合具摺密奏併繪泗城土府輿圖恭呈睿覽謹繳硃批鄂爾泰奏摺一扣伏乞皇上恩賜批示遵行為此繕摺奏聞謹奏爾與鄂爾泰虚衷熟商務期當理愼毋膠固已見而貽患地方向來督撫料理土司事件率多先張大其事後懾之以威稍令彼知畏服即貪圖賄賂中道而止從不肯徹底清楚籌計久逺非以推廣皇仁為名即以荼毒無辜為辭反自謂將大事化為小事以沽安静和平之譽其實為一時小利起見置日後貽害於不顧也爾等今番料理切毋仍蹈欺罔前轍虎頭蛇尾草率塞責以圖了事地方上稍經一番懲創自當安静數年迨後撫馭失宜萌蘖依然復發爾等或可推諉於後人朕豈肯將難處之事貽患於後世子孫耶其竭力為之同日又奏為恭謝天恩事雍正五年正月二十日䝉皇上欽賜臣御書福字一幅臣恭迎入署敬設香案望闕叩頭謝恩訖伏念臣至愚極陋疊沐我皇上天高地厚之隆恩涓埃未報日切慙惶兹又膺錫福之典龍章璀璨鳯藻流輝臣何人斯屢邀異數雖捐糜頂踵亦難仰酬萬一惟有益加兢惕悉心籌畫綏靖疆圉以盡犬馬報主之心而已為此繕摺恭謝天恩謹奏覽卿奏謝知道了請州縣人員一摺巳交該部揀選請二十萬石平糶一摺俟九卿議覆後朕酌量依爾所奏行雍正五年閏三月初八日廣西巡撫臣韓良輔謹奏為恭謝天恩事本年三月十七日臣標把總齎捧皇上硃批奏摺回粤臣恭迎入署跪讀天語惶悚之下繼以感泣伏念我皇上萬幾日攬宵旰不遑乃以臣之愚昧亦上煩睿慮訓誡周詳凡臣之一切小知小見治不求本之積習一經聖慈指示無不瞭然終夜静思慙懼無地誓當益加惕厲竭蹶圖維以盡臣職至於鄂爾泰臣雖未見其人但讀其條奏無一非仰佐我皇上安輯邊境之良謀以臣之迂愚淺陋敢不黽勉效法上報國恩臣俟甘汝來到粤立即交代星馳往滇與鄂爾泰斟酌機宜悉心籌畫務期一一欽遵聖訓會商定議繕摺奏覆請旨遵行決不敢潦草塞責致干罪戾所有微臣感激之誠謹繕摺恭謝天恩伏惟聖鑒謹奏凡為大臣者大之一字不可忽畧若識見不廣為國家辦理一切事務不謀久長之策而茍簡從事止顧目前是乃小人之淺見與大字相去逕庭矣然此一大字非具純然公忠之心亦不可强而能也同日又奏為奏明事臣蒙聖恩賞給假期回籍葬親今臣奉命往滇會議又欽奉上諭前朕准給韓良輔假期送其母櫬回籍著俟公事定議後伊酌量動身欽此臣思滇黔山嶺高峻既難扶柩同往若停泊粤西臣心又切不安是以先遣臣子扶臣母櫬從水路往川暫停於重慶府城外之白崖莊臣俟公事定議之後奏請給假由滇入蜀扶柩前往合州經營臣母之窀穸瞻拜臣父之松楸則臣之私事已畢從此有生之年皆捐糜頂踵仰報我皇上隆恩之日也為此繕摺奏懇伏乞聖慈矜宥謹奏爾到滇商酌定後仍有回粤料理之事非到滇一言即可卸責而竟長往蜀道也必當回署將一切料理畢再去為是同日又奏為恭謝天恩事臣接到家信知臣弟莊浪營㕘將韓良卿仰蒙皇上特授寧夏中衞副將伏念臣父子兄弟一門均受逾格隆恩雖共捐頂踵亦難上酬高厚惟有交相誡勉諄囑臣弟竭誠盡瘁恪供職守以期無負我皇上委用至意除敬設香案望闕叩頭外謹繕摺恭謝天恩伏祈聖慈垂鑒謹奏凡為人臣者只操持自已一身斯可矣至於親友之間不必關照心一關照不能無繫累其向上之資自能成立不煩縈心其下愚之質終於不移更不必縈心人能將自已保守一箇全人最為良策人各自能保守人人皆為全人矣何用互相牽扯聨絡恐因此反不得純全當熟思朕旨其中意味深長内外大臣果肯心悦誠服翻然警醒身體力行何愁天下不治平耶同日又奏為奏聞事前撫臣甘汝來酌將廣西潯梧兩關所徵稅銀内改留十分之一以資公費查督撫書吏俱係按季分班封鎻在署其工食廩給在所必需至於解京路費飯錢以及關役巡攔算手工食日用亦所不免臣恐一槩清釐將來無項可支必致另生欺隱侵蝕之弊倘荷聖慈恩准存留俾官吏關役人等辦理有資則皇恩益浩蕩靡涯矣洪恩出自皇上非臣所敢妄請伏惟聖明垂鑒謹奏自然賞留伊等為食用之需倘復借端逞無厭之求有苦累商民等弊若不能查究是乃爾之過也雍正五年四月初八日廣西巡撫臣韓良輔謹奏為恭報粤西春麥豐收并附奏雨水米價事伏查粤西今歲桂林所屬之臨桂全州諸處大小二麥於四月初旬俱已收穫約計有九分收成入春以來雨水調勻今正在栽插禾苗之時甘霖連霈豐盈之兆已見至於去歲收成原非歉薄祇以東省搬運者多以致米穀騰貴一經摺奏即蒙我皇上如天之仁勅發倉穀二十萬石平糶接濟民食皇恩浩蕩遐邇歡騰踴躍感激之情實難名狀今廣西米價每倉石潯州梧州等府一兩二三錢桂林平樂等府一兩至一兩一錢不等麥價八九錢至一兩不等太平南寧柳州九錢至一兩不等其他思恩慶逺則仍七錢至八九錢不等更有奏者欽奉上諭撥運廣東倉穀三十萬石已照數全運起程訖其往楚採買之米亦於閏三月中俱已運到現在與倉穀一體平糶正當靑黄不接之時窮民均沾渥澤理合一併繕摺恭慰聖懷謹奏朕正為粤西民食厪念覽奏逺懷稍寛矣同日又奏為恭報微臣交送撫篆赴安籠會議邊境機宜事臣蒙皇上允臣摺奏前往雲南與督臣鄂爾泰面商邊境事宜若道由泗城前進恐該土府驚疑逺竄似與機宜未協故前擬由貴陽安順一帯入滇今臣於四月初二日接鄂爾泰手書云俟部文一到即先至安籠相待囑臣檄調泗城土府及田州土知州隨臣同往安籠料理勘界事務彼若疑而不至即是抗違便可勒兵擒治此言甚切事機臣恐貽悞邊務今聞甘汝來李紱已於閏三月十六日抵武昌計期將入粤境臣不及久候擬俟再有確信即差員齎送印信交付甘汝來署理臣即於送印之日起程星馳前往安籠與鄂爾泰悉心會商邊境機宜至於以黄水河之南北為黔粤分界臣愚以為此則不僅安隆為然而泗城亦當以黄水河為界也蓋藉泗之土田以益黔之貢賦則黔之兵餉不煩鄰省之協濟矣據泗之形勝以固粤之疆圉則粤之營汛無鞭長莫及之憂矣况因河為界畛域截然不紊土民田産既非犬牙相錯無倚强侵弱之患而讎殺刦奪之風可息實於黔粤兩省大有裨益一切機宜容臣至安籠之日與鄂爾泰悉心酌議會奏請旨遵行所有臣交代撫篆及自粤起程前赴安籠緣由先繕摺奏聞伏乞聖鑒謹奏爾之識見較之鄂爾泰不啻霄壤諸凡總宜虚懷與伊斟酌料理已之所見亦不可隱而不言無論合宜與否向伊備悉傾吐聽伊立定繩墨實力行之可也雍正五年八月十九日廣西巡撫臣韓良輔謹奏為恭報微臣往黔會商邊境事宜告竣謹繕摺奏聞事臣前奏覆往黔與雲貴督臣會商邊境事宜欽奉硃批諭旨臣恭承之下感激涕零敢不仰體聖衷悉心斟酌料理凡關粤西一切邊境形勢民情土俗兵馬營制及善後事宜茍有一得之愚無不纖悉面陳并列單送交督臣鄂爾泰以備查覈臣竊皇上徳威其土府岑映宸懼罪跪繳印信號紙呈請改流存祀當委泗城理苗同知劉興第署理泗城府印篆會同貴陽府同知泗城協副將等前往安撫土民淸查户口錢糧酌設營汛外所有一切邊境事宜俱經會疏㫖回署料理經由泗城地方沿途選擇能通土語之兵役遍為曉諭使椎髻跣足之倫咸知我皇上之深仁厚澤土民聞臣宣諭聖德自喜得覩天日無不歡忻踴躍感頌皇恩如出一口臣幸生聖世躬逢盛事不勝歡忭感激之至理合繕摺奏聞謹奏若依爾所見而行能目覩此光景否耶同日又奏為淸查改流州縣科派陋規以肅政治事竊臣前䝉皇上天恩委署撫篆訪聞得西隆州有私派私稅諸弊當將該牧特疏題㕘遴委桂林府同知錢志和往署州篆囑其淸查一切陋規以甦民困隨據該署州呈繳須知冊籍到臣又據西林縣知縣韓三善詳報裁革各項陋規銀兩臣俱檄司查核務期徹底澄淸俾無隱匿嗣臣奉命往邊會議公務沿途細訪土俗人情備知改流各州縣所派陋規久已習為成例雖經裁革尚為土目中飽倘日後上司稽查稍懈未必不仍循陋例科派終與土民無益臣愚竊謂除改流之泗城土府紅水江以南現委文武清查賦稅户口另疏具題外其西隆州西林縣亦應一併委員將已革未革各種陋規逐一查出酌存十之一二為地方官養廉減其十之二三以甦土民之久困其餘十之五六載入正額撥充兵餉俟查核明晰會疏題報將淸出正賦數目入於雍正五年奏銷冊内載入全書以為定額雖為數無幾然與其徒飽土目之腹莫若使官民均沾聖澤合先繕摺奏聞伏乞聖鑒謹奏酌量料理惟宜秉公行實有益於官民之政凡沽名釣譽無益之舉俱不可為朕毎觀大臣行一博虚譽之事即有一實禍隨之歴歴不爽於今五載矣前車可鑒當深戒之同日又奏為恭陳斟酌料理邊境先後緩急事宜籲請聖訓事臣查邊境土司其泗城土府雖已改流尚有流土地方應行整頓料理者皆係臣巡撫之責敬為我皇上陳之以左江邊境而言如土龍州改設之土巡檢趙墉趙陞不能撫綏土民經臣奏請將太平府通判移駐其地彈壓料理將來或另擇賢能承襲或竟改土為流臣已檄行該府酌議俟其申報到日再行奏聞又前思明土知府黄晟昏庸愚闇已經吿休其滋事之安馬寨土目䝉士孔等業經署撫臣甘汝來結案已安插於柳慶二府地方惟鄧横等四寨接壤安南三面環氷植竹自衞其中頑梗土民時出為盜每每恃險拒捕臣已面囑左江鎭臣齊元輔并諭思明同知顧延琮將有名案犯嚴行拘拏矣又有已經改流之思明土州從前所有陋規未經裁革今應盡行革去淸出地畝户口賦稅編入全書歸於太平府之首邑崇善縣管轄將原設吏目裁去改設巡檢一員令其治理地方庶官制不紊而綏戢合宜矣俟經理布置已定再行具奏以右江而言歸順土知州岑佐祚因其庶兄岑啓祚爭襲彼此各分羽翼而岑佐祚又昏庸孱劣不能鈐束其下是以各兵目専權用事擾累地方亦應捕其惡目置之於法將土知州岑佐祚革職改土為流但地方與交趾連境又與雲南土富州兇㺜接壤改流之後必應移兵彈壓前巳會疏題請增設右江一鎭倘荷殺抗不服拘此等惡目俱結寨山頂或數百人千餘人不等亦須大用兵力方能就縛應俟設立右江鎭及隆林營遊撃之後營制部署已定然後發兵庶易為力至於柳慶各府地方其頑梗藐法之土目等俱當逐漸分別懲治追出兵田革去目舍名色遴選賢能州縣題請調補其地使之盡心撫綏安戢則邊徼土民永享昇平之福矣以上諸事現在與督臣孔毓珣提臣田畯商酌次第舉行臣因親歷邊境目覩情形謹分別先後緩急機宜冒昧瀆奏是否允協伏懇聖慈批示再臣前聞謹奏觀所奏數事似欲一時並舉借以洗滌前羞之意所關甚巨過猶不及也泗城之事既定餘當次第緩為何必汲汲皇皇如是據奏與田畯孔毓珣商酌其間先後緩急機宜或未必有益曷若密札仍與鄂爾泰商酌以得其要領耶朕意當緩者從緩為上阿克敦到時將此摺密與伊看恐於爾動身後伊不會朕意或致孟浪舉措也同日又奏為土府之私派實繁微臣之愚昧已極現在檄司查審核確立即繕疏題㕘謹據實預奏事竊惟泗城㕘革土知府岑映宸之父岑齊岱不法臣於雍正二年署撫任内曾繕摺具奏然不知其横徵濫派於十年之間遂至數萬之多也并不知其子岑映宸襲職之後仍踵父故智每亭派承襲銀一百六十兩婚䘮銀八兩合計一百二十九亭半共派銀二萬餘兩前蒙我高厚感激涕零然臣決不敢有絲毫不肖之心欺瞞隱飾上負皇上格外之隆恩此亦難逃聖鑒者也現在將岑映宸檄發按察司查審確情實數會疏題㕘但泗城外哨已割隸黔省且距鄂爾泰駐劄之地較近距臣駐劄之地甚逺臣愚恐拘提案犯往來稽遲時日且當改流之初正須撫恤土民若驟拘各目質審土人愚頑或致驚疑亦未可定仰懇皇上於具審究甚為便易更有疏題㕘合併預奏臣不勝悚惶待罪之至謹奏覽同日又奏為再瀝微忱仰祈睿鑒俯賜恩允事臣欽奉皇上硃批到滇商酌定仍回粤西一切料理畢再行赴川欽此臣因准雲貴督臣鄂爾泰咨札改訂於安籠會議今泗城土知府岑映宸懼罪將印信號紙呈繳即將該土府岑映宸檄發思恩協副將梁名望押解過泗城地方交左江鎭遣員轉解廣西省城發按察司收管安插其子岑𢎞仁并其弟岑映翰等亦俱投到諭解員帯至桂林一併候旨發落其改流分界及設鎭添兵一切事宜俱經酌定會疏具題至安撫夷民革除陋弊清查疆土户口錢糧諸事俱已遴委文武官員現在料理布置臣欽遵諭旨於雍正五年七月初四日自安籠起程仍由安隆泗城馳回於八月初十日抵廣西省城桂林府已經接印任事另疏題報在案惟是臣子扶臣母之櫬回蜀至今尚無消耗臣寤寐懸切仰懇皇上俯念蟻忱恩允給假回蜀親營臣母窀穸事畢即當趨赴闕廷恭謝天恩跪聆聖訓不特地方事務知所遵循亦得仰瞻天顔以遂臣犬馬戀主微誠於萬一伏懇聖慈批示遵行謹奏已有旨矣并有面降按察司郭鉷口傳之㫖於郭鉷未到之前若阿克敦先到且勿將印信送交候郭鉷到遵密旨行同日又奏為恭謝天恩敬繳硃批奏摺事竊臣標把總齎捧皇上硃批奏摺并欽賜紫金錠等珍藥十種至貴州安籠地方臣謹跪迎至臣行署恭設香案望闕叩頭謝恩伏念臣屢膺格外寵遇未報涓埃兹又䝉我皇上軫念炎方特頒藥餌旅疴頓釋愚臣既獨被深恩嵐瘴全消下卒亦均沾渥澤蠛蠓微質無不悉荷再造之仁犬馬餘年惟有益堅匪懈之志所有微臣感激之忱敬繕摺恭謝天恩并繳硃批奏摺七扣伏乞睿鑒謹奏爾乃由武臣莅任封疆凡一言一行惟務篤實誠恪為貴觀爾光景漸染李紱甘汝來等之陋習似此誇飾空文慿仗幕賓調弄筆墨虚套亦何足取同日又奏為恭報廣西年成米價敬慰睿懷事臣於夏初奉命往黔會商邊務沿途見雨水霑足農民盡力耕作已卜有秋迨臣事竣回粤果見早稻俱已豐收晚禾亦甚芃茂惟南潯梧三府濵江之地畧被水淹旋即消退桂林柳州二府交秋以來微覺少雨羣黎待澤正殷今柳州已霈甘霖通省約計有八九分等微臣目覩通省人民羣歌樂利之奏恭慰聖懷謹奏粗鄙之習未脫氣度殊屬卑小極矣硃批諭旨巻二十九下
