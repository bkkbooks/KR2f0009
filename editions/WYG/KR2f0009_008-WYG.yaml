body:
  text: 欽定四庫全書硃批諭㫖巻八上硃批石禮哈奏摺雍正二年八月初七日貴州威寧總兵官臣石禮哈謹奏為奏聞事竊臣䝉皇上隆恩特擢威寧總兵趨覲天顔跪聆聖訓恩施稠疊感激難名陛辭出京於八月初三日抵臣父河南廵撫臣石文焯任所敬宣聖諭臣父跪聆之下感激涕零伏念臣父子均荷聖主逾格隆恩曠古希有惟有共竭愚誠以仰報聖恩於萬一兹臣於八月初七日由豫省起程赴任理合具摺奏聞謹奏知道了極當勉盡厥職莫負朕知遇之恩雍正二年十一月十六日貴州威寧總兵官臣石禮哈謹奏為遵奉硃批諭㫖事竊安籠總兵臣蔡成貴差人齎書到臣抄奉摺奏硃批諭㫖向日聞爾聲名好今覽此奏朕甚嘉之足見實心任事也至於貴州吏治戎政石禮哈来時朕巳當面悉諭爾等可協同心力加意整理勉之又臣齎摺家人回署欽奉硃批諭㫖知道了極當勉盡厥職莫負朕知遇之恩臣跪讀之下感激流涕臣於通省之事雖未䏻周知亦必盡心訪察凡有關於地方事務有不便於民生者臣一面奏達天聽一面即咨㑹撫臣毛文銓斷不敢有一毫欺隱至於臣標營伍事宜尤臣職分當為之事現在悉心整理不敢少有怠玩並致書於蔡成貴協同心力共圖報效以仰副皇上察吏安民至意理合奏聞伏乞睿鑒謹奏覽奏志切報効殊為可嘉蔡成貴果否名實相當毛文銓居官如何之䖏據實奏聞同日又奏為生童聚衆辱官阻考事竊查本年九月初五日學臣王奕仁至大定州按考威寧府屬生童有畢節縣劣生邵藩奭等指稱童生邵汝鈞為冒籍不容赴考統領多人將邵汝鈞拏至住䖏非刑綑打大定州知州蘓霖泓出差拏究忽有劣生張時煥等與邵藩奭邀約多人即将州差毆打聚集生童數百人擁至州衙百般辱罵又擁至教官䖏将畢節縣應考童生冊􅃃搶去學臣嚴禁不止随出示云冒籍應攻巳批提調官審詳劣生等肆行無忌仰将怠玩教官職名及劣生惡蹟開送俟題明命下之日調赴貴州考試等語經知州逰擊各學教官生員等懇求學臣方於九月二十六日開考但查畢節縣生童始而各攻本學冒籍繼而閙入知州公堂辱官搶􅃃雖經學臣将張時煥等褫革若不嚴究首惡止以斥革枷責結案此軰終無畏懼臣差人訪察事係􅃀實理合奏聞並通知撫臣毛文銓嚴查具題伏乞睿鑒謹奏應如是據實入告不為容隱整飭地方懲惡較之旌善更為切要也同日又奏為奏明營伍廢弛掛欠銀兩事竊臣查向例總兵有親丁糧六十分係蒙皇上髙厚之恩優恤武臣始得借此養亷外有各營公費糧數十分不等以辦理一切公務添造器械等項聖恩浩蕩至優且渥臣到任後即查營中積弊見標下将弁皆有掛欠銀兩細加查問據云前鎮臣麥世位任内每年公費糧六十分尚不敷用又分外長使銀八百餘兩令營内借銀填用又令擔認麥世位自用借庫兵餉銀一千五百兩共欠庫銀二千三百餘兩等語臣查麥世位離任之後䕶理總兵印務副将張禹謨未到之先中間有二十一日将虚懸之親丁糧公費糧内扣填銀二百五十兩現缺欠司庫銀二千一百餘兩今威寧府知府姚謙係麥世位兒女姻家現在代其彌補如可補完官兵無累臣再另摺奏明仰懇皇上格外施恩免其究䖏倘不能完臣照例咨明雲貴督臣髙其倬一面題㕘一而轉咨本籍令麥世位来黔清完欠項理合預為奏明至臣到任以来各項公費併一應修補器械等項俱令三營将弁核算每營量存公費糧各十分以便辦理公務至於親丁糧六十分臣止留四十分以作養亷查臣標三營馬步兵丁共一千五百名鳥鎗止有六百桿臣現在捐造二百桿火藥鉛子等項臣皆捐備𤼵給凡此本不敢凟陳天聽因前鎮臣麥世位營務廢弛巳極不得不将營内情形一併奏聞伏乞睿鑒謹奏此奏更屬可嘉益見汝實心任事處麥世位所欠之項即使補完此等劣員何可姑寛朕早聞其聲名不好所以将伊解任因未得實蹟難以處分今汝所奏事皆有據正宜将伊發黔不但令完虧空并其從前貪吞者盡令傾吐以為整理營伍修補器械之需庶足以舒暢兵弁之心也雍正三年正月十三日貴州威寧總兵官臣石禮哈謹奏為奏明鎮標兵米事竊臣查威寧鎮兵米支給半年本色半年折色其本色即以威寧府所收糧米支給其折色係撥黔西州永寧縣二䖏折色支領乃歴年僅支米三箇半月搭支蕎麥兩箇半月臣問三營将弁皆云歴年如此及查奏銷冊内皆開半年本色兵米並無搭放蕎麥字樣兵米關係𦂳要今與奏銷冊内互異理合奏明臣查威寧府所屬之大定黔西二州皆係米多之處可以彼此轉移如大定州常平里之魯普澤等地方赴大定州上糧皆有六七日之程若赴威寧府上糧不過二三日之程今将常平等里之糧改令就近赴威寧府上納則猓民路近一半一轉移間於兵民兩便至如改撥之内尚有不足米數百石即於府倉内酌補其大定鎮標兵丁所需兵米則黔西州離大定不過一二日之程即以黔西原撥威寧鎮標之折色改為本色就近撥還大定尚少數百石亦可於黔西州補足據臣愚見似屬可行也臣更有奏者臣差人宻訪聞威寧府之徴收照倉斗奏銷而照市斗收糧每市斗一石合倉斗三石而歴年開墾地畝既多俱不得􅃀據且地䖏黔省極邊該管三十三䖏猓民頭目頗稱繁雜知府姚謙雖無貪婪之蹟吏治不過中才未䏻除奸剔弊如欲徹底清查必湏換一才守兼優實心辦事之員一年之内諸弊可清如涿州知州楊永斌寧晉縣知縣鄭錫爵臣所素知者可否於二員中皇上特用一員授為威寧府知府使之清理一切自䏻使一府積弊於一年内查清如果與臣訪聞相同則威寧兵米每年應支五千四百石不必大定黔西二州轉移即威寧本地之米儘足以全支本色矣臣係武職本不敢議及文員之事但世受國恩至深至厚凡有關於地方利弊之事理合據實奏聞伏乞皇上睿鑒謹奏如此實心辦理以誠對君可嘉之至皆照爾所請行矣但所奏事件朕不便即降諭㫖俟楊永斌到時與之逐件悉心計慮更同撫臣商酌而行勉之勉之毛文銓之向日居心行事併近来吏治如何之處據實摺奏以聞同日又奏為恭繳硃批諭㫖事臣於雍正二年七月初七日奏摺䝉皇上硃批訓勉交至臣跪讀之下感激惶悚臣惟有日夕氷競時加奮勉以期無負天恩所有奏朕望爾将来成一大器可将今日所存之心始終如一永矢莫渝勉之同日又奏為恭謝天恩事竊臣閲邸報雍正二年十一月十五日奉㫖法海補授浙江廵撫石文焯調補西安廵撫欽此伏念臣父子䝉皇上天髙地厚之恩頻加教訓培植成全畀以封疆之任今臣父石文焯又䝉聖恩由河南廵撫調補西安廵撫臣一門仰沐皇恩知遇之隆曠古罕有㣲臣父子雖竭盡駑駘不䏻仰報髙深於萬一臣謹具摺奏謝伏乞睿鑒謹奏汝真為汝父之跨竈子也自莅任以来諸凡辦理殊為朕所鑒賞勉之朕原欲擢汝為提督一者因汝少年經朕簡用未久汝之居心行事一切敷奏外人不知恐生議論二者威寧一鎮亦需汝措置盡善所以将馬㑹伯補用也此人亦好到任後光景何如據實奏聞同日又奏為奏明城垣傾圯情形酌議捐修事竊臣思城垣為地方之保障關係綦重况威寧為邉逺之地與川滇接壌苗猓雜遝之䖏城垣尤關𦂳要臣到任之後查閲威寧城垣週圍倒塌不堪随督率将弁細加丈量週圍共一千二百二丈内有尚存墻根數尺者訃三百五十四丈其餘皆連根倒塌共大小缺口六十八䖏節經康熙二十四至六十等年於通行各省等案内工部行文捐修前威寧文武各官估計修理需用工料銀二萬餘金工程浩大捐資有限所以無力修整臣今細加估算工料等費減而又減亦不下一萬三四千金若止堆築土城則地方盡是粗鬆礆土難經雨水臣酌量權宜之法按其缺口之大小其缺口小而尚有墻根者僱工運石以灰泥堵築其缺口大而連根倒塌者採買雜木編排堵禦加以荆茨臣與威寧知府姚謙現在議修擇扵二月間興工理合奏聞謹奏邉城為保障攸關亟宜修整所奏甚是月餘後俟朕降㫖酌動萬金交爾修築爾當竭力以董其役同日又奏為奏請聖恩要缺湏得䏻員以收實用事竊臣前於陛見之時以直𨽻撫標守備哈元生大名協守備田昌友候補守備官禄等三員保奏䝉聖恩准臣所請著臣帶至貴州以遊擊補用臣未到任時威寧鎮標遊擊賀元吉經督臣髙其倬提臣趙坤題㕘奉㫖革職臣遵例咨明督提二臣以哈元生補授臣標中軍遊擊㑹題在案今臣閲邸報見威寧鎮標中軍一缺於十一月二十五日巳選江南督標左營遊擊程希演臣查威寧一鎮接壤川滇苗猓雜遝為黔省極邉之䖏况中軍一官有兵馬錢糧之任必得才技兼優歴練營務者使之督率将弁操練兵丁方於營伍有益懇求聖恩以哈元生補授臣標中軍遊擊實為人缺相宜於營伍甚有裨益為此具奏伏乞睿鑒謹奏著将哈元生補授威寧鎮標中營遊擊韓勲即留貴州俟雲貴有遊擊缺出另行補用該部知道雍正三年三月初八日貴州威寧總兵官臣石禮哈謹奏為奏聞事竊臣䝉皇上隆恩至髙至厚每有所聞據實陳奏竊謂事君無隱理當如是乃撫臣毛文銓事事懐疑時時猜忌近日臣聞得毛文銓悖理之事甚多每㕘一官則曰吾豈好為此刻薄哉吾若不㕘若被别人啓奏吾擔不是矣又如五開衛守備李孝者奉㫖𤼵往貴州撫臣毛文銓審訊毛文銓與司道言曰李孝居官本無不好之處不過有些性氣我向来認得他這件事作何審法甚覺難處又聞得皇上因定畨州狆賊之事有諭㫖與毛文銓責其啓奏不實而毛文銓向司道言曰此必石總兵所奏也又如黔省查明税規官荘一事聞得皇上有諭㫖與督臣髙其倬髙其倬抄冩諭㫖與撫臣毛文銓有通盤打算之説而該撫與司道威寧府等官言曰此必石總兵所奏也吾豈願為聚歛之臣留罵名於後吾不得巳也又戒司道等官在外勿言我皇上至聖至明恩溥萬方江南省舊欠錢糧七八百萬盡行豁免凡各省有地方公事俱令動支正項錢糧聖恩浩蕩如此而毛文銓乃以查明税規官荘為聚歛大負我皇上除積弊以厚民生之至意况臣每見上諭勉臣下為臯䕫稷契之臣不啻耳提面命至再至三而毛文銓自謂不得巳而為聚歛之臣臣誠不觧其何意臣受恩深重凡有聞見理合一一據實奏聞伏乞睿鑒謹奏毛文銓向来輿論不一朕懐疑未釋所以調伊来京以審觀其人並非因爾所奏而起見也今命爾署理廵撫印務其勉為之但爾少年心性未免好動喜事朕只慮爾太過不慮爾之不及也撫治地方雖當振興不冝因循然斷不可孟浪生事一切作為必講求萬全而後舉行切諭切諭同日又奏為奏明事竊查畢節縣生童聚衆辱官阻考一事臣於雍正二年十一月十六日一面查實奏聞一面通知撫臣毛文銓題明究䖏随接毛文銓回字云此事巳經學臣摺奏在案應從容候㫖等語後聞大定平原二州奉學臣批令㑹審通詳及威寧府轉詳到院撫臣将詳文退出不收而欲改輕情節速完此案臣查劣生惡蹟􅃀係實情有關士習民風是以奏逹天聽若事屬平常臣何敢以輕為重装點詞説凟陳於聖主之前也理合陳明伏乞睿鑒謹奏毛文銓之奏摺𤼵来汝看即知朕意矣但既係巳過之事汝署理印務不必復究如更有此等不法之徒再為振作以整飭之可也同日又奏為遵㫖回奏事臣接奉硃批蔡成貴果否名實相當毛文銓居官如何之䖏據實奏聞欽此臣查得安籠鎮臣蔡成貴於營伍事務鎮相仿據臣所聞如此嗣後另有見聞臣再行具奏廵撫毛文銓居官吏治中平並無貪酷之事但事多粉飾不䏻無欺隱之䖏又性多疑忌凡屬員有稅務出息者收其稅規節禮若地方苦者不收又多偏袒之私如貴陽知府徐如玉等虧空倉米數萬石按現行例不得留任彌補乃該撫将徐如玉援浥爛例題㕘革職留任限年追補臣又閲邸報見撫臣毛文銓所奏飭行查議事内稱貴陽府等均堪勝任無庸置議臣思貴陽府貴筑縣一為首府一為同城之首縣地方饒沃而虧空倉米至十五萬石尚云均堪勝任則其餘不䏻勝任者更當何如此難逃聖鑒者也臣䝉皇上賜問不得不據實奏聞謹奏不待汝奏看伊一切奏摺巳可見其居心為人矣朕自另有裁奪雍正三年四月二十二日貴州威寧總兵官臣石禮哈謹奏為恭謝天恩事竊臣接臣父石文倬家信知陛見之時䝉皇上賞賜御府珍物又将河撫任内冬季養亷賞給又接臣叔石文焻家信䝉皇上特授正白旗漢軍額外㕘領父子兄弟叔姪盡邀寵眷殊恩異數曠古所希今臣齎摺家人回署又䝉皇上賜臣五綵蟒縀一身内縀三聨克食一匣臣随出郊跪迎至署望闕叩頭謝恩祇領跪讀硃批恩諭肫摯奨勵交深伏念臣何人斯受恩深重至於如此總兵之職自慚過分何敢更萌提督之想我皇上期許愈深微臣之報効愈難矣為此具摺奏謝天恩伏乞睿鑒謹奏覽爾奏謝知道了朕但恐爾因報効心切少年輕躁或反致過舉耳百凡當詳悉斟酌慮始慮終然後見之施行慎勿尚氣切戒孟浪以防踈失誌之同日又奏為奏聞事有前任貴州廵撫帶来一人名王日生者聞係湖廣荆州府之惡棍也前撫臣任江蘓布政司時即以之為用人後補授雲南布政司亦以此人為總商通省銅厰所出之銅皆經其手所得之利不計其數王日生與督撫布政司均分後於康熙五十八年陞授黔省廵撫時王日生又同至黔省到威寧府開採天橋等厰至四川重慶府發賣所過之䖏仗廵撫之勢俱不納國課得銀數萬金與撫臣平分将名王棟材者過繼為子巳捐知府又将無恥下賤之人王家材者亦認為子為之捐官今南城兵馬司指揮是也當此聖明之世豈容汚穢卑賤不堪之人有玷名器臣在威寧實知灼見之事不敢不據實奏聞謹奏此等人如何䏻逃朕之鑒照早巳有㫖矣同日又奏為敬陳管見仰請聖鑒事竊臣查威寧府為黔省極邉之地凡隣境猓目及本地各土目燒殺搶擄之案經撫鎮臣衙門竟有二三年至七八年不結案者任其牽連拖累經年累月不究臣到任以来查閲舊案即傳諭各土平沃有小河三道可資灌溉此地昔年原係種稲之地因與四川之烏䝉土府相近每至秋成收割之時屢遭猓目統衆搶奪遂久棄為荒土臣到任後即訪輿情欲開墾者甚衆而又懼收割之時不為己有臣随令署中軍遊擊哈元生等丈量地勢細加􅃀勘查得稲田壩地方果係平土約可開水田二萬餘畝每年可收榖數萬餘石尚有山坡可種蕎麥者其地甚多等語臣恭讀勸農聖訓仰見我聖主愛養蒼生重農務本之至意今以二萬餘畝之沃土豈冝棄於無用但查稲田壩之西北二十里地名八仙海子乃威寧府屬阿底烏䝉土府接壤之地彼此仇殺搶擄歴来數十餘年若欲使猓目安猓之願開墾者皆踴躍而至其自備耕牛籽粒者定以三年起科若無耕牛籽粒者著地方官查明奏銷臣又查威寧鎮標之兵丁有地土者百無一二其弟男子姪中有願開墾者一照民猓開墾之例兵民皆有恒産可耕矣再者商賈販運紬縀布疋等物往往至烏䝉地方貿易經過無人之䖏蠻猓見有貨物即肆行搶刦客商等赴文武各衙門控兵民無從購買今若開墾稲田壩每年可得米蕎臣籌畫威寧地方事冝惟此為第一要務将来地無荒土米穀漸豐三年之後則山城寒苦之地可㫖遵行伏乞睿鑒謹奏逐欵批諭矣同日又奏為恭繳硃批遵㫖回奏事雍正三年四月十四日奉硃批毛文銓之向日居心行事併近来吏治如何之䖏據實摺奏以聞欽此臣查毛文銓在雲南布政司任前督撫臣俱貪婪不堪毛文銓身為方伯大員並不䏻自立規模惟随聲附和而巳所辦軍需亦不䏻無冒銷之弊後雲南布政司李衛新舊交代結為兒女姻親諸事一力擔承得以脱然無累因此敬之如神明言聽計從毛文銓所仰仗者惟布政司李衛而巳臣查錢糧衙門必以接任官出結為初八日回奏之摺巳奏明矣但其心多疑忌聞有雲南布政司任内帶来衙役數人任作心腹各䖏查訪甚是不妥臣更有不可觧者凡大吏經理地方必期文武協和兵民安輯以至公之心協同辦理為妥今撫臣毛文銓見提鎮與同城道府州縣相好即便疑忌此其一大病也臣謹據實回奏伏乞睿鑒謹奏朕因疑之所以調来陛見大槩此人不甚妥當雍正三年六月初三日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為要缺湏得䏻員事臣查黎平一府最為𦂳要必得幹練深悉苖情之員方堪勝任有陞任正大同知馬駿者曽署黎平知府撫苖有方經督臣於計典薦舉奉㫖巳授雲南曲靖府知府若以馬駿調補黎平府輕車熟路於地方大有裨益又聞得都勻府知府魏鴻基者年過七十在地方甚不妥協臣尚未見其人俟訪聞􅃀實另䟽題㕘外查現任永寧知州今調黔西州王鼎鋐者才守兼優請以補授都勻府知府亦於地方有益再查貴陽府㕘革留任之知府徐如玉庸碌不堪現有虧空倉糧容臣查明之日另䟽題㕘外今陞授涿州知州鄭錫爵者辦事操守小心謹慎若以之辦理貴陽府事臣可保其必無虧空浥爛等事以上三員果否應用出自皇上天恩再查鎮寧永寧二州皆生熟苖人最為多事之䖏其鎮寧州知州祝鼎儁者才守中平於此缺甚不相宜查有修文縣知縣朱齊年才守兼優堪以補用其永寧州知州金獲闒茸不堪容臣另䟽題㕘外查得平逺州知州郭士英才守素裕堪以調補其平逺州缺即以祝鼎儁調補俱為人地相宜至於黔西州一缺頗稱繁雜亦湏幹員治理有湖廣荆州府枝江縣知縣陳悳榮者辦事頗勤操守亦好臣所素知堪稱此任又如貴筑縣乃省㑹首縣事繁糧重現在缺員臣前任正定府同知時有元氏縣知縣紀廷詔者辦事敏練係正藍旗人現丁憂歸旗以之補授貴筑縣亦為人地相宜以上各員應請輪班引見如有可用出自聖恩非臣之所敢擅便也伏乞睿鑒謹奏因爾署理黔撫印初次奏請且爾所舉劾黔省各員適值毛文銓在京朕面詢於伊所見相同故悉照爾所請行矣若再似此隔省題官斷然不可試思何省不用賢員何缺不係要任雖爾以人事君出於報効之誠然少年孟浪好動喜事之病當深以為戒市恩立威之嫌宜時以自警如此方可保全始終也不然一蹈年羮堯之覆轍噬臍莫及矣慎之同日又奏為恭繳硃批事五月二十七日臣齎摺家人回署臣跪讀硃批諭㫖開臣愚昩感激流涕凡地方一切應行事宜今當詳悉斟酌慮始慮終奏明請㫖然後遵行斷不敢孟浪致負聖恩至䝉皇上𤼵下撫臣毛文銓前後奏摺一十三件示臣臣一一展看跪讀硃批伏惟聖明天縱於臣下隱微無不洞燭訓誡開導至周至悉總以吏治戎政苖情民隱為念容臣細細體認其中作何辦理之䖏另摺奏繳外所有臣奉到硃批奏摺理合恭繳謹奏爾前奏黎平添鎮一摺朕巳𤼵與髙其倬令其詳議具奏毛文銓到京朕面詢於伊據伊奏稱此舉可以不必如果地方文武得人苖民向化即現在所有數百兵卒儘可彈壓若苖民跳梁即添設一鎮亦未必足資備禦云云再爾奏内欲徐将八萬古州生苖俱令歸誠之說斷乎不可爾云先以徳撫不從則調四面各路之兵示以不得不服之勢等語倘苖民探知此信恐於未事之先即預思阻撓妄啓釁端俱未可定朕亦将此意併諭髙其倬矣朕所深慮者爾若不加縝宻脱以消息漏洩於外反使古州現今安帖之苖猓或致疑畏生事也從来治天下之道仁者無敵好大喜功之念胸中不可少存爾少年血氣未定孟浪二字當切以為戒凡謀一事将前後左右籌度萬妥猶恐慮或不周何況設鎮添兵之創舉乎斯事並非因毛文銓到後朕方有此論於毛文銓未到時巳批𤼵髙其倬矣廷臣中與知者數人爾既不取李衛之生事於安南如何又自萌此八萬古州之念耶朕於李衛開化之奏即嚴飭其生事随有有利何可妄圖無利取這塊地方何用之諭今爾此奏與開化事同甚不惬朕懐地方上諸如此等之事雖云從報効起見豈宜銳意輕舉妄動總以安静持重息事寧人奉為龜鑑時加儆惕為要毛文銓爾前奏甚不足其行為大誤矣朕觀毛文銓老成妥當因從未面朕未免觀望畏縮今經召對殊可大用之人似黔省尚屈其才既持重又練逹光景操守亦優再爾論李衛之奏更屬誣謬之至李衛狂直不謹則有之赤心為國人也國家人材難得何忍如此妄談覽爾㕘李衛之摺朕甚薄爾孟浪無知重爾之心減却大半矣凡為臣子者妬賢嫉䏻之念當纎毫毋存於中秦誓若有一个臣之一章要湏時刻誦而繹之今現有人在朕前㕘爾将此摺𤼵来爾看内如向趙𢎞燮李維鈞二人投拜門生為年羮堯買馬㕘奏趙坤姚謙之不慎宻䖏何欵不真朕豈肯因此即将爾一可成之器中道而棄之乎朕不易為人揺惑之主也亟宜痛自刻責感朕成全之恩遵朕訓誡之㫖謹言慎行勿更慢忽少不宻禍即随矣爾與李衛如此才品所短者即斯狂縱不宻之病将来必受大害但可惜辜負朕一畨鑒㧞之恩耳大凡才不可恃年羮堯乃一榜樣終罹殺身之禍何況才不及伊而踈更甚焉君不宻則失臣臣不宻則失身古人經歴之言毫髮不爽一切目前之情面勢利些微不可顧瞻宻諭之㫖一字不可宣露榮耀全不藉此年羮堯之榮耀而今安在哉自古大臣遭患皆由於竊弄人主予奪之柄也始而不過貪一時之浮榮漸進於怙勢攬權馴致朝野側目方且自以為得計殊不知禍根巳種於此近則身家不保久則甚至大逆不道上下兩俱無益充其貪榮慕勢之量不至於是而不巳其害豈淺鮮哉讀朕之諭必如醉醒夢覺翻然警悟拳拳服膺以為終身戒方䏻永逺受朕之眷顧也爾試思之朕用爾未及半年即招如此嚴㕘豈非自取朕今曲為寛恕者欲望爾感激思奮省愆悔過易轍改絃克慎克宻庶君臣兩得其道設或不然以為被人如此㕘劾上皆不疑而寵仍如舊更加肆志放恣復踵年羮堯之故跡朕即欲保全之亦難以措辭矣極當深自愛惜莫負朕恩莫辱朕之顔面勉之慎之同日又奏為奏明事竊臣䝉聖恩署理廵撫印務所有本省十一府内除貴陽安順二府貴筑一縣虧空倉糧巳經㕘奏外其餘府州縣倉庫錢糧容臣遴委賢員逐細盤查有無虧空務於奏銷之前另摺據實奏聞至奉上諭通省清查一事臣現在飭行布政司徹底清查通行㑹計正雜各項公費若干各官養亷若干存備賞勸兵丁苗猓等用若干務令均平以仰副我皇上一視同仁之至意容臣􅃀查妥議另行具奏請㫖為此謹奏惟在爾秉公為之朕觀其成效而巳此等紙上空言何足為憑信耶同日又奏為奏明再行嚴禁惡風事竊查保留官員久經嚴禁臣每見大小官員或調或黜必有棍徒數人倡首聚衆保留投遞呈状種種惡風各省有之從未聞得陞美缺而地方有此舉動也況黔省苖民雜䖏其中土著之民無多大半係湖廣江西流寓近者威寧知府姚謙奉上諭以貴州簡易府分補用即有流棍約聚愚民數十人罷市保留經臣委中軍遊擊哈元生曉諭始散又如提臣趙坤奉㫖陞鑾儀衛使安順府城内遂有多人壘砌轅門城門罷市要結不散經趙坤再三曉諭始定從古亦有遮道攀轅以誌愛戴之意不聞有壘門罷市之惡習也仰請皇上諭各省督撫提鎮嚴行出示曉諭此後如有此等聚衆砌城之事即嚴拏為首之人照光棍律治罪庶頑風不致滋長也伏乞睿鑒謹奏朕每惡此風屢禁不息覽奏巳有㫖矣似此經朕准行之事少不宻於汝徒有害無益況此不過小事偶因汝言及重申前禁耳試觀人㕘汝奏摺反将𩔖斯好事議為懐私之舉矣若再不宻是自貽伊戚也可不慎諸同日又奏為奏明黔省豐年情形事臣自威寧至貴陽一路所見髙坡山地早蕎皆收平地水田現在挿秧俱甚茂盛正值需雨之際連日雨澤頻降四野霑足查每年當青黄不接之時米價増貴今各屬所報時價與去年秋成之價相去無幾皆頼我皇上至徳昭格将来秋成必係大豐之年理合具摺奏聞謹奏覽奏深慰朕懐今嵗京畿雨水過多猶幸天心慈愛入秋漸賜晴霽否則不止於損禾稼也雍正三年八月初三日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為恭繳硃批諭㫖敬謝聖訓事臣齎摺家人回署臣跪讀硃批䝉皇上俯鑒愚誠褒嘉奨勵又慮臣少年孟浪特加教誡剴切周詳言言切中臣弊此誠我皇上天地父母之心也臣惟有凜遵天語倍加謹慎斷不敢孟浪行事致有踈失以負皇上生成教訓之洪恩再臣敬陳稲田壩一摺䝉聖諭命臣詳細料理總與髙其倬熟籌深計以折𠂻之若議論相合㑹同具題倘有互異各将所見摺奏以聞欽此臣謹遵㫖敬録硃批奏摺移送督臣髙其倬詳細㑹商務期籌畫萬全公同具題外所有硃批諭㫖理合恭繳謹奏朕未即擢爾為廵撫者因爾少年過於銳進且不慎宻與李衛同病凡朕批諭之㫖多有漏洩封疆事鉅恐致有錯誤耳可惜爾如此材質惟冝老成歴練是務不可恃才肆志以自棄也同日又奏為奏明籌補司庫缺項仰祈睿鑒事竊臣䝉皇上𤼵到撫臣毛文銓奏摺内有盤查一摺稱前任撫臣金世揚動支庫銀一十八萬二千兩零惟康熙六十年軍需據開五萬四千九百八十餘兩之一項奏明餘皆私用等語臣徹底清查欵項冊籍鑿鑿可考縁撫臣毛文銓于滇藩任内與前撫挟有嫌隙所以摺内未經聲明臣惟以公言公不敢附和今将前任撫臣所虧庫項逐條分晰為我皇上陳之其一係因軍需那用未經歸補之項查康熙六十年撤回江浙滿兵備辦船隻等項共支用銀五萬四千九百八十餘兩經前任撫臣奏明以水銀籌補在案又五十八年備辦調撥駐滇江浙滿兵馬匹等項共支用銀七萬一千餘兩此係䕶撫臣遲炘任内之事除題明通省俸工捐至雍正二年全完外尚有未經題明銀八千二百一十五兩零至今虚懸應于遲炘名下追補其一係因黔省公費那用未經抵還之項查黔省每年必需公費銀四千八百餘兩從前俱以俸工捐抵還項自護撫臣遲炘以軍需七萬餘兩題請将俸工按年捐還遂至歴年公費無項可補前撫臣不得巳将私收濫木厰水銀稅銀先抵六十一年以前公費其六十一年以後尚有無抵公費銀一萬八千餘兩前撫臣仍批令将水銀餘息抵補應俟水銀變價一併清還其一係動支收買水銀未經賣補之項查康熙六十一年二月起至雍正二年四月封閉止前藩司裴􅏍度詳明前撫臣動支庫銀一十二萬有零共收買水銀七千一百八十九擔除賣去七百餘擔價銀二萬有零歸還庫本外尚該庫本銀十萬兩零以上三項共一十八萬兩有零即毛文銓所奏前撫臣虧空之數也臣於雍正三年接准部咨奉㫖金世揚所欠黔省庫銀即著落伊家人張二等完補如不䏻完将𤼵往滇省金世揚之子到滇将伊父所欠銀兩完補後再𤼵往黔省同伊家人清楚等因欽此臣遵即行布政使轉委䏻員押同張二速将所存水銀發賣完補去後但黔省天末山區客商稀少至今並無一擔賣去再四區畫必得委員運至江南廣東價髙之䖏方可速售查前撫臣有三子可将一子留滇完伊父虧空将二子𤼵黔㑹同差員分往兩省公同𤼵賣再查前項水銀原係前藩司裴􅏍度任内收買今裴􅏍度現任江西廵撫與江南廣東隣近臣請皇上勅諭江西撫臣裴􅏍度委員到黔同黔省委員押同前撫臣之子分運二省照時價發賣賣得價銀随觧司庫不過一二年間即可照數全售則庫項易於歸結矣抑臣更有請者水銀運往兩省𤼵賣如果價髙除歸還正項缺額外所得餘息即令製買藤牌縀疋甲面器械旗幟等物則邉地軍容愈加整肅矣是否可行伏乞睿鑒批示遵行謹奏據奏運賣水銀以清庫項乃公私兩便之舉何靳而不為金世揚與朕何嫌何怨但䏻了結公務朕所樂從也與張謙商酌而行此所奏請甚當廵撫印務爾雖卸任交代與張謙張謙接受之後即将此事委交爾辦更好至於裴􅏍度朕不便勅諭爾等或咨商於伊或竟具題奏請俱可再爾請将金世揚之一子留滇二子發黔之奏當與髙其倬㑹商朕發往雲南之意原使其清理伊父兩省首尾今自應令分頭料理為是若餘息之說金世揚兩省之虧缺纍纍恐未必䏻如數補足而更有餘息也如果有餘既非正項錢糧不論作何支用可也将爾此摺併硃批與張謙看爾等斟酌允妥行之同日又奏為欽奉硃批諭㫖事竊臣閲撫臣毛文銓謹陳行伍情形摺奏撫標兩營兵丁怠惰成風現在督率勤操又往外省聘取弓馬髙強者教習又閲奏明陋規摺内請将各屬節禮銀七千兩製備盔甲弓刀與應辦地方公務等語臣查毛文銓於營伍事情非不留心辦理但整飭無方究於營伍無補竊思大吏整飭營伍先在勤稽将備簡補虚糧至於訓練兵丁兩營将備多員内中豈無弓馬鳥鎗嫻熟者又何必外省聘取為之教習耶臣署理廵撫印務勤飭營員不時訓練仍親加勸懲務令振起頽靡以仰副皇上整飭營伍加惠兵丁之至意再養兵原以衛國不宜冐濫虚銷查撫標左右兩營額兵一千五百名内馬兵止一百五十名而歴来撫臣親随食糧六十名是標下巳缺六十名馬兵矣今廵撫衙門既有養亷豈可再存虚糧以虧軍食臣現在挑選㧞補召募充頂使馬步兵丁皆得足額至添補盔甲弓刀毛文銓原取給於節禮之内差人買備紬縀甲面等物臣到任後巳經買到臣現在委兩營将備製造旗幟衣甲以壯軍容臣䝉皇上洪恩委署封疆重任凡毛文銓所奏事件有裨益於地方者固當即行辦理其有未盡妥協者亦必斟酌奏明請㫖遵行總期有益於兵民不致上煩聖慮以盡臣圖報之心於萬一耳為此謹奏毛文銓人甚歴練妥帖因從未召對每多瞻顧不前不肯傾心任事今既面朕復經朕之教誨試看伊新任必當刮目朕可保其為撫臣中之一翹楚也同日又奏為奏明黔省官吏民苖共戴天恩一視同仁事竊臣䝉聖恩署理貴州廵撫印務欽奉上諭令将各屬錢糧稅規并文武官荘通行㑹計酌定各官養亷之外量存公用俾免虧空加派之弊仰見聖明在上籌畫均平俾闔省官民咸沾渥澤洵千載一時之盛也臣與督臣髙其倬悉心詳議遵将火耗稅規官荘三項通盤打算酌議各官養亷及一切公費數目各繕摺另呈睿鑒外從此黔省各員缺好者上司無可苛求不致虧空其缺苦地方既有養亷自可勉為循吏至於窮員苦役俸工銀兩今既照數支給可永免派捐之累再地方陋規向因養亷不敷藉口派取竭民苖之脂膏以供費用甚屬苦累今養亷巳定加派之弊可以永除從此官吏苖民無不感戴皇上天恩又查通省之耗羨截長補短統算約有加一五之數仍令照舊徴收其向在加二之外者悉令裁減此後如再有私増耗羨者臣立即㕘䖏所有各屬送到清摺理合抄録恭呈御覽謹奏所奏殊為周詳摺開各數目亦甚明晰張謙抵黔後将此奏併各清摺俱付伊看同日又奏為恭繳硃批奏摺事竊惟黔省清查各項酌定養亷以杜虧空以革私派等弊一事䝉皇上𤼵下硃批大定鎮臣丁士傑奏摺示臣臣跪讀聖諭仰見天心仁愛惟恐行之少有未當致滋官民之累是以諄諄下詢臣細閲丁士傑奏摺内以黔省不可與山西比例恐奉行不善日久弊生等語在丁士傑亦係留心地方從恤官愛民起見然於官民兩便有利無弊之䖏未之知也臣等所議各官皆有養亷公費悉經籌畫餽送俱巳杜絶私派盡行革除此誠至公之舉有利無弊官民共樂者也臣密訪輿情自司道以至府㕔州縣下及民苖莫不踴躍鼔舞人人樂從其間或有一二缺美之官貪戀向日贏餘甘蹈逢迎舊習如威寧府屬皆為黔省美缺大定一州每年所得稅規銀兩恢恢有餘今養亷既定則所得不䏻皆為己有未免妄生異議以惑士傑而士傑不知其中詳細遽爾陳奏但據一人之言豈可定一省之事耶臣䝉皇上殊恩署理廵撫印務若有不妥之䖏聖恩如此下問臣何敢固執前見草率滋弊致厪聖懐理合據實囬奏恭繳硃批丁士傑原摺伏乞睿鑒謹奏知道了總與髙其倬詳議妥商而行俟張謙到時将爾前後區畫情節備細告知看伊以為何如同日又奏為奏眀黔省歴年驛站冒銷事臣查黔省驛站共二十四䖏通省驛馬共一千八十五匹原因貴州山坡險峻路甚﨑嶇驛馬奔馳易致倒斃每年共額報到斃馬六百七十六匹每匹報銷銀二十八九兩三十兩不等通共銷銀一萬九千九百七十五兩八錢每匹止給各驛銀十九兩通共實𤼵銀一萬二千八百四十四兩餘銀七千一百三十一兩八錢每年呈送督臣衙門二千兩撫臣衙門二千兩驛道自得銀一千九百三十一兩八錢奏銷各衙門飯銀一千二百兩臣受恩深重署理廵撫印務斷不敢以朦混欺隱之事奏銷逹部除本年春夏秋三季仍照每匹二十九兩五錢五分報銷外請自本年冬季起照雲南廣西二省之例每匹報銷銀二十二兩理合預為奏明容臣㑹同督臣髙其倬合詞具題伏乞睿鑒謹奏所奏可嘉将汝如此料理之䖏俟張謙到来備述與伊令其知之同日又奏為欽奉硃批諭㫖事竊臣䝉皇上洪恩委署封疆重任接督臣髙其倬抄送謄黄上諭諭督撫提臣籌畫於未事之先倡率文武練兵恤民使生熟苖猓皆畏威懐徳効命輸誠臣又讀皇上𤼵下撫臣毛文銓奏摺硃批貴州吏治武備令與提臣細心籌畫宻商萬全又因狆苖滋事令貴東糧驛道李日更傳諭撫提二臣㑹同確議應否添兵之䖏明白回奏臣欽奉之下仰見聖明無微不照懐逺籌邉之念無時不在睿慮中也臣今細查黔地情形除貴陽安順等屬地方巳經督撫提臣於詳陳酌劑條奏内添設塘汎現在撥置無庸另議外至黎平都勻二府中隔八萬古州地廣苖多藏奸習惡為黔省最大之事如都勻所屬之獨山麻哈二州俱係頑苖其地有吴家司吴姓土苖與獨山司䝉姓土苗皆結連各寨世相讎殺其間有地名宣威營者係吴䝉各苖寨之要地向無官兵彈壓臣前摺奏請於黎平設一重鎮都勻改設一協如䝉聖恩俞允則宣威營係麻哈獨山二州之要地即於都勻協標下或分防守備一員或千總一員駐兵百餘名彈壓則吴䝉二姓及各寨之苗可以永杜讎殺之端至於通省尚有險要之地容臣細查情形與督撫二臣㑹商因地制宜分別布置另行奏聞再苗狆中有䏻愛惜部落無苛𣲖凌虐縱盗殃民者令所管有司核實報送加以奨賞如有獷悍不法仍前滋事者則重懲一二䖏以儆其餘總使之畏威懐徳以地方寧静為主如此一二年之間兇苖讐盗燒刦之大案庶或漸息矣為此謹奏苗猓乃係犬羊之性若非賞罰公當何䏻使之感畏耶恩威二字不但施之於苗猓即治理内地百姓舍此豈另有第二法乎都察院左副都御史署刑部侍郎事臣梁文科謹奏為黔省之軍糧太重伏懇聖恩勅部減則以寛民力事竊查黔省自裁衛歸縣之後軍民一體當差無別而獨田畝尚有軍民之分黔省民田納糧不過一斗有餘而軍田納糧竟有每畝四五斗不等者此係明朝衛官取租之例相沿尚未改易因此軍户日就窮苦不䏻耕種欲轉售與人而軍田糧重又無人承買每年徒受苦比伏思聖主之愛民逺勝往古将江南蘓松之重賦減去四十五萬兩又将江西之浮糧減去數萬餘兩從此江南江西百姓感戴髙天厚地之恩永永無極臣請将黔省軍田亦照依民田科則輸糧約計不過減去一萬餘石而闔省軍户咸叨聖恩於無既矣臣從前任貴州平越府知府八年親見其累今幸逢聖主在上念切民瘼正小民沾恩戴徳之時謹據實宻奏伏候睿鑒定奪施行謹奏此事爾意以為何如朕經詢之毛文銓據云通省軍糧約計有十一萬石每年除支用外尚可餘一萬石所奏原屬得理但恩出於上等語夫萬餘石糧在國家何所増損不難於寛免苐恐地方上正用不敷未便輕率即降㫖以示恩也察直省𩔖斯應免者不可枚舉而豪户隱匿不報之糧亦復不少地方大吏往往取以肥己而於此等重賦乃云關係國用不敢議減一任百姓嗟怨朝廷置若罔聞爾仰體朕意查核地方中有隠匿者増出以抵此數則兩全其美矣不知爾黔省果有可轉移䖏否其詳細清釐具奏至此項之應開恩與否亦一併奏聞特諭雍正三年九月十二日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為遵㫖回奏事竊臣䝉皇上發下署刑部侍郎梁文科摺奏黔省軍糧太重伏懇聖恩勅部減則以寛民力等事欽奉硃批諭㫖到臣臣跪讀之下仰見我皇上厪念民生之至意臣遵查黔省賦役全書所載軍民田地科則不一所謂軍田者縁昔設立衛所留軍屯守每軍撥田令其自耕自食自裁衛歸縣之後仍係軍户承項非比民間價買之業可以輾轉相售也其起科之例亦與民田不同民田有條編馬館等名色軍田止徵秋糧米不徵條編馬館銀間有徵米一二斗以上并徵嵗用銀二三分至七八分不等内有最重者惟普安州之屯田徵糧三斗七升兼徵嵗用銀二錢三分有零大約起科之例各屬互異如謂軍田偏重則民田之徵米一斗兼徵銀一錢以上及徵米三斗者與軍糧之重者不甚懸殊是科則之重者不獨軍糧為然如欲酌中定制軍田民田一例徵收臣揆度情形實非易行之事查平越一府民田起徵米止二三升以上銀止一錢以内較之軍田起徵米二三斗以上并嵗用銀一分有零稍有輕重梁文科所奏是就平越一府言之也至於軍田不得賣者縁係官田例不准賣非人之不願買也再查黔省軍田二十二萬餘頃共徵米豆四萬八千七百餘石嵗用銀二千五百餘兩若改軍為民所減之糧奚止一萬有餘誠如聖諭有地方正用不敷之慮再黔省數十年来生齒日繁荒蕪田畝漸次墾熟聽其自墾自報隱匿之弊較别省必多巳在聖明洞鑒之中臣思隱匿必湏清丈但邊徼山區田畝畸零漢少苗多非同内地臣再四思維惟有一法可以漸次清理查黔省告争田土甚多其告争之䖏大約新墾者居半臣現在辦理凡於告争侵占或明指欺隠者令地方官履畝清丈丈出餘田按畝陞科但欺隱田糧定例甚嚴仰請聖恩俯念邊民無知免其照例治罪追糧竟照本年起科之例即令按畝納糧並出告示曉諭各屬地方漢苗人等宣布皇仁令其自首入冊得永為恒業如此則漢人以及熟苗之馴者隱匿可以漸出矣至軍民田科則之最重者不過數䖏臣仰體皇上浩蕩洪恩俟查出隠匿量所増之數可補應減之數不致正用不敷再為具摺請㫖臣謹預為奏覆欽奉硃批諭㫖理合恭繳伏乞睿鑒謹奏逐畝清丈徒滋紛擾萬不可舉行若将隱匿之田從實首報自當寛其䖏分近日河南山東似此據實報出者頗多祗令陞科而巳槩免其罪也此摺宻與張謙看同日又奏為遵㫖回奏事臣齎摺家人回署䝉硃批諭㫖劉業浚人何如欽此臣查劉業浚先為都勻營㕘将後陞黎平協副将並調定廣協副将今署威寧鎮總兵操守謹慎諳練營務但微有性氣待下過嚴理合據實回奏伏乞睿鑒謹奏此人之優劣朕博採輿論品評不一同日又奏為奏明秋成分數事竊查本年夏田分數經前撫臣毛文銓奏報在案兹届秋成之候據布政使劉師恕詳據貴陽等十一府㕔州縣報各該地方自夏至秋雨𤾉時若均得及時播種早稲晚穀俱有十分收穫至米價各屬市斗不齊以倉斗計算每斗不過四分以上至六分止再查威寧府地方因入秋雨水過多間有分數畧減一二者又該府屬有與滇省霑益州連界之䖏於六月初二日夜雨水驟漲溢過隣境臣一聞稟報即飛委該府通判葉方葱查勘去後續據覆稱被水之田不過百畝其水於次日即消田禾無恙理合據實奏聞謹奏覽奏秋成豐稔米價平減朕懐深為欣慰殊為我邉民稱慶也同日又奏為恭繳硃批諭㫖敬謝天恩事竊臣前奏為要缺湏得䏻員一摺奉有硃批諭㫖臣謹祗領伏念臣年少無知急於効力冀得䏻員共勷治理越例隔省題官未䏻籌及各省俱用賢員各缺俱是要任少年孟浪好動喜事咎實難辭仰䝉聖恩不加罪譴俯允臣之所請更加恩訓反覆開導保全臣之始終臣跪讀之下仰感聖主髙厚之殊恩追悔過愆無地可容從此惟有凜遵諭㫖循分効力刻刻以年羮堯為戒斷不敢上負聖恩自取罪戾也為此敬謝天恩所有奉到硃批諭㫖理合恭繳謹奏觀汝諸事不宻而又局量褊狭恃才自用頗有年羮堯之風但不似其貪耳可惜汝具如此資品若不通盤計慮盡情洗滌恐終難免蹉跌之虞也同日又奏為恭繳硃批諭㫖敬謝天恩事竊臣䝉聖主知遇隆恩同於天地之鈞陶勝於父母之教育俯賜硃批寛臣孟浪之愆恕臣無知之失惜臣可造之材諭㫖訓飭諄切周詳臣跪讀之下如夢方覺如醉初醒感激涕零鏤刻肺腑臣自八月二十七日奉到諭㫖謹録一道并抄秦誓若有一个臣一章時時捧誦自此以往凜遵謹言慎行之聖訓痛改輕舉妄動之過失現在年羮堯之榜樣時存戒懼事事縝宻不敢再蹈前愆自罹不宻失身之禍有負聖主再造洪恩也至臣所奏黎平添鎮一事謹遵聖諭統聽督臣髙其倬議覆再臣被㕘一摺仰邀聖明洞鑒未令臣回奏臣亦不敢置辯一詞惟有感戴皇上髙厚之恩永竭犬馬之報耳為此恭謝天恩所有奉到硃批理合恭繳謹奏徒思感激天恩永竭犬馬何如深自儆戒砥行保身忠孝皆在其中矣試觀年羮堯今日忠乎孝乎同日又奏為恭謝天恩事臣齎摺家人回署捧到欽賜鮮荔枝一瓶臣随恭設香案望闕叩頭謝恩祗領訖伏念臣受恩深重報効未䏻乃以愚魯無知致招㕘奏䝉聖主天地洪恩不但不加貶斥且加恩教訓更賜尚方佳果殊恩異數有加無巳臣跪領之下感激流涕刻骨銘心惟有勉圖犬馬之報仰答皇上髙厚洪恩於萬一耳為此恭謝天恩謹奏朕實惜汝至汝自惜與否不在他人而仍在於汝也即朕皇子朕亦不䏻彊之使然同日又奏為遵㫖查奏事臣於到任之後准督臣髙其倬専差齎捧抄録硃筆諭㫖一道到臣除制馭苗民之䖏臣謹欽奉㑹同辦理外其黔省大小各員養亷一事臣跪讀聖諭仰見我皇上愛育民苗軫惜臣下聖因心普徧一視同仁誠亘古以来未有之曠典遵即檄行查報去後今據布政使劉師恕等㑹同查報前来經臣等覆加㑹核查黔省稅銀一年共贏餘銀三萬四千一百七十四兩零又通省地丁錢糧耗羡銀一萬七百九十二兩零又額徵秋糧餘米折銀九千一百二十三兩零又官荘學租收糧餘米折銀一千四百七十九兩又黔省俸工銀三千六百四十兩以上五項共銀五萬九千二百零八兩臣㑹同督臣詳細商酌将前五項羡餘銀兩通行計算議給廵撫衙門養亷銀八千五百兩學臣養亷銀二千兩布政使四千五百兩按察使三千兩糧道二千兩廵道一千八百兩貴陽府一千三百兩鎮逺安順威寧三府各一千一百兩黎平都勻平越三府各一千兩思南思州石阡銅仁四府各八百兩貴陽同知南籠通判各五百兩正大同知貴陽通判各四百兩威寧通判三百兩貴筑縣七百兩定畨廣順麻哈獨山大定平逺黔西鎮寧永寧普安十州各六百兩黄平州五百兩開州四百兩普定鎮逺永寧畢節四縣各五百兩貴定永從等二十縣各四百兩共分給養亷銀五萬二千三百兩餘銀六千九百零八兩除每年額支公費銀四千八百一十八兩外尚餘銀二千九十兩存貯司庫以備添補科塲賞賚兵役及苗猓之用此係就臣等愚昩之見酌定料理恐有不協臣謹㑹同督臣髙其倬繕摺恭奏伏乞皇上睿鑒訓示遵行再照此案清查各摺於八月初三日臣巳進呈御覽兹准督臣髙其倬㑹稿前来理合㑹奏合併聲明謹奏髙其倬亦經奏過但聞此舉甚屬不妥俟髙其倬到京朕尚欲向伊面詢也雍正三年十月十三日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為奏明事竊查黔省貴陽府屬之定畨廣順二州深山宻箐苗劣兵單素號巖疆仰䝉聖明洞鑒准督臣髙其倬調劑事冝添撥一營設立塘汛臣接准部咨即遴委廣順州知州盧兆鶚撫標右營遊擊趙文英踏勘該地方情形在在險隘定畨一州應添設千總二員兵丁三百四十名共有汛塘一十七䖏廣順一州應添設守備千把總五員兵丁四百三十一名亦有汛塘一十七䖏其衙署兵房共該八百七十六間至所費造建銀兩經臣前摺奏明於存貯藩庫驛站羡餘項内動用但念狆苗兇悍性成或見起蓋營房安兵防禦不便横行乗間焚燒亦未可定不得不預為防範臣今於附近州城之塘汛先為起蓋以次而進則聲援聫絡呼應得靈庶不致有踈失之虞矣為此具摺奏明伏乞睿鑒謹奏所慮甚是凡百皆應周詳籌畫而行有益無損也同日又奏為恭繳硃批諭㫖事臣家人齎捧奏摺回黔臣跪讀硃批仰荷聖慈俯賜諭㫖除将各摺俟新撫臣張謙到任時欽遵聖訓逐一轉交明白外伏念臣以菲材叨䝉天眷總兵之責猶懼隕越何敢妄冀廵撫重任䝉皇上格外殊恩曲賜包容矜臣少年孟浪不䏻慎宻惜臣才質可造訓誡諄詳仰見皇上優容至意雖天地生成之徳父母鞠育之恩無以加於此也臣祇遵天語夙夜謹凛以期改過自新仰副聖主知遇隆恩於萬一所有欽奉硃批諭㫖理合恭繳謹奏改過遷善全頼自䏻體察謹宻二字一生用之不盡當奉為指南不可斯須少忽同日又奏為微臣戀主情殷再凟天恩仰祈睿鑒事竊臣一介庸愚仰䝉聖恩不次超擢復命臣署理貴州廵撫印務封疆重任揣分難勝於本年九月十二日具摺恭請陛見縁臣才識短淺諸事孟浪非奉皇上時加訓飭則無所遵循兹聞新任撫臣張謙於十月二十七日到鎮逺接印任事十一月初七日到署俟到署日将臣奏摺欽遵諭㫖一一詳細靣交撫臣張謙酌量料理臣謹束装候㫖仰懇天恩允臣陛見臣不勝望闕待命之至謹奏自黔至都長途迢遞何必徒為無益之往返即来見朕亦不過仍将批𤼵之諭㫖以朂勉汝耳若䏻身體力行勝如頻来陛見也雍正三年十一月十九日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為奏聞事竊臣據鎮逺縣知縣俞作霖禀報復據廵撫衙門頭接官役稟稱新任撫臣張謙至常徳府病勢漸重於十月二十一日病故於湖南沅州旅店臣随傳詢有無子姪親戚據稱止有家人長随十名㩦帶銀兩僅敷来黔盤費現向伊各親朋借覔臣思新任撫臣荷䝉皇上簡任封疆大吏長途赴任並無子姪跟随病故旅舍無人料理臣即委通判盧兆驥千總侯𢎞道給領藩庫公用羡餘銀五百兩星夜馳赴沅州辦理事畢即令千總侯𢎞道送回原籍所有新撫臣張謙病故縁由理合奏聞謹奏朕覽奏不禁為之惻然張謙卒於途次石禮哈果䏻如此料理著察明将石禮哈議叙張謙歴任亷潔諒伊家道自必清苦其旅櫬歸至本籍時著該撫将司庫銀賞與千金該部知道同日又奏為欽奉硃批諭㫖事竊查黔省存貯司庫水銀臣前具摺奏請𤼵賣以清庫項䝉皇上硃批臣跪讀之下仰見聖主明並日月恩同天地俟新任撫臣到黔臣遵照協同辦理兹據布政司劉師恕禀稱普安州知州洪奕隆籍隸廣東明敏謹飭且伊家現有行店委其辦理甚為妥當臣復加細詢洪奕隆據稱粤東五六月間洋船到日水銀價髙時每擔可賣銀四十兩以外價平時亦賣銀三十五六兩不等現存水銀五千六百二十九擔約計二年可以賣完今新撫臣巳故應否恭候皇上另簡撫臣莅黔公同協辦抑或令臣委洪奕隆領運赴粤辦理臣繕摺請㫖敬候硃批遵行俟臣一面具題一面咨明廣東督撫臣照時價發賣所得價銀就近交明廣東司庫則絲毫無有欺隠而庫項亦不致懸缺矣再臣前摺奏請勅諭江西撫臣裴􅏍度委員同往𤼵賣今止粤東一䖏可以銷售似可無庸咨㑹裴􅏍度合併聲明伏乞睿鑒批示遵行謹奏據奏粤東得價易售應照爾所請運往爾即獨任其事竟行料理可也同日又奏為奏聞事雍正三年八月二十七日䝉皇上𤼵到署刑部侍郎臣梁文科原摺恭奉硃批臣欽遵諭㫖確杳黔省軍民田地起科首重次重者惟貴陽一府南籠一㕔開州鎮寧普安黄平四州貴定龍里修文清鎮普安安南平越餘慶湄潭都勻十縣上重科則田共一萬二百四十九畝零次重科則田共五萬六千九百四十四畝零其田畝多寡徵納銀糧細數臣另開具清摺恭呈御覽臣照依前摺奏明辦理之法數月以来威寧府黔西州平逺州畢節縣普安州等府州縣共自首田地一萬四千八百五十八畝零應起科米蕎共一千五百六十五石二斗九升零應徵銀三百六十餘兩自此隱田漸出陸續據府州縣首報約訃雍正四年奏銷時可先補首重減則不足之數此後自首隱糧再減次重科則大概數年内可以酌補完竣臣又聞首重次重田内有名黔記大畝者一畝抵常田四五六畝不等是朝廷徒受重賦之名百姓久冒欺隱之罪未便因循必湏清釐臣於屬員接見時令其徧行曉諭宣布皇仁凡大畝内包有餘田概免丈勘許本户據實首報如果一畝實徵米四五斗者似宜酌減如一畝可抵常田四五六畝者免其加賦追糧惟将現納糧額照首出之田均勻攤算每田一畝不過徵糧一斗内外誠如上諭一轉移間兩全其美矣以上首出田糧實數與黔記大畝名目并前後報眀隠糧細加較算増出之數果䏻補足減則之數聽候睿裁将首報隠糧同首出大畝餘田懇照新開自首之例具題歸入奏冊至首重科糧應行減則出自聖主特沛恩綸非臣所敢擅便也謹奏覽汝所議甚屬妥協将前後情節明白備悉述與鄂爾泰令伊再加詳審酌定奏聞硃批諭㫖巻八上欽定四庫全書硃批諭㫖巻八下硃批石禮哈奏摺雍正四年正月十七日署理貴州廵撫印務威寧總兵官臣石禮哈謹奏為奏聞事雍正四年正月十五日雲南廵撫管理雲貴總督事務臣鄂爾泰到黔臣随出郊跪請聖安臣據督臣云前出京時我抱恙未痊上厪聖懐所以經過省㑹地方俱令督撫代呈我的奏摺所有督臣鄂爾泰摺匣恭呈御覽臣面見督臣鄂爾泰精神氣色甚好病體全愈巳於十六日起身赴雲南任所矣理合奏聞謹奏覽此奏朕深為欣慰鄂爾泰當代人物也汝宜以為儀型而效法之同日又奏為恭謝天恩事雲南廵撫管理總督事務臣鄂爾泰到黔臣跪接上諭欽承之下仰見我皇上明並日月恩同天地竊臣識見愚鈍材智短淺䝉不次殊眷畀署黔撫八月以来實懼曠職聖諭以臣頗䏻實心効力無甚過䖏仰荷恩綸彌深惶悚又䝉念及臣年少未經歴練或致有差錯之事非其福也是聖主加恩於臣至深至重臣敬奉上諭不禁感激涕零俟新撫臣抵黔臣凜遵諭㫖即回威寧總兵任所惟有竭盡心力以期仰報髙厚於萬一理合具摺恭謝天恩伏乞睿鑒謹奏汝更䏻涵養氣質以化其偏亦不可多得之才也當自珍重舉凡天下事理過猶不及中和之道人所難䏻於公私義利界限辨明不惑尤為不易勉之雍正四年三月二十日署理貴州廵撫印務威寧總兵官臣石禮哈提督貴州總兵官臣馬㑹伯謹奏為奏聞事竊查前雲貴督臣髙其倬於謹陳調劑黔省事冝等事案内㑹同題請移撥大定鎮弁兵分防長寨羊城坉等䖏定畨州所屬青籐斷杉樹兩處設立塘汛護衛行人巳遵奉俞㫖准行在案随令勘明扼要形勢估計蓋造官署營房臣等恐夷苗從中滋事復轉飭地方文武官員傳集各寨衆苗先賞給花紅面加勸導咸皆踴躍傾心無如苖蠻性同犬羊反覆不常旋即更變二月内據廣順州知州盧兆鶚禀稱有長寨狆苗抗違不法用石堵塞路口輪流把守聲言不容進内蓋造營房臣等查長寨狆苗向多頑梗遣官化誨曽将把總綑縳箠楚祼體放回皆由從前文武因循姑息不即懲治相沿至今愈無忌憚臣等悉心㑹商欲狆苗知威之可畏必先示以恩之可懐於三月十三日差撫標遊擊趙文英提標遊擊卜萬年齎帶告示遍行張掛剴切曉諭倘䏻畏法輸誠不敢阻撓則營房即可蓋造自應恕其前愆勵以後效設諭之不遵怙惡不悛臣等與督臣商酌勢不得不用兵以彰國法臣自敬聆硃批訓㫖無時不以安静地方為念斷不敢以有事為榮孟浪輕率亦不敢畏縮推諉致負天恩此事臣務與督臣鄂爾泰細加籌畫計出萬全方始舉行所有各䖏營房修造俱巳告竣獨長寨營房狆苗阻修情由臣等不敢欺隱理合據實㑹摺奏聞謹奏凡事當籌畫萬全切毋稍渉孟浪所奏知道了同日又奏為欽奉上諭事竊查滇黔粤西三省邊界接壌安籠鎮䝉皇上命臣等悉心商酌各出己見覆奏臣恭繹聖諭細按輿圖並遴委屬員㑹同滇粤委員細加確勘相度地方形勢斟酌道里逺近有冝歸安籠鎮者有冝仍照舊制者巳就臣愚昩之見奏聞併恭繕黄冊進呈御覽外臣更有請者臣聞東川一府自改土歸流以来設立遊擊一員守備一員千把總六員兵丁一千名向隷川省管轄每見該營弁兵赴川領餉必由黔屬之威寧畢節永寧等縣方入川境計程二千餘里往返兩月有餘甚為遥逺兼之川省界限中隔黔屬地方遇有𦂳要之事每致緩不及濟查雍正三年十月内烏䝉土目禄鼎坤領兵欲占巧家地方該東川府飛報本省撫提諸臣並就近禀報雲貴督臣髙其倬於十一月初三日𤼵曲尋鎮及援𠞰協兵共一千名前往該土目見雲南發兵畏懼退回迨至十二月十七日川省差千把各一員始到畢節縣前事消弭巳久是蓋鞭長不及之明驗也查東川距滇省七站兼程三日可到距滇省之援𠞰左協四站兼程二日可到若東川一府就近改𨽻雲南即将援𠞰左協所轄官兵分防移駐頗為便捷查該協額兵一千六百名今自尋甸州起安設塘汛至東川府沿途四站所需塘汛兵丁約計二百名再抽八百名撥該協遊擊一員守備千總各一員把總三員分駐東川府餘兵六百名該協仍駐劄尋甸州儘足以資捍禦至於東川一營額設官兵似應移駐八仙海子地方彈壓開墾稲田壩等䖏地土如此一轉移間則東川營弁兵可無領餉逺涉之勞川省撫提諸臣亦無鞭長莫及之慮即威寧地方得有本䖏稲田壩米糧接濟将来亦可漸致富饒矣如果臣言可採伏乞聖主批𤼵川滇督撫諸臣勅諭確查核實覆奏施行謹奏東川改歸滇省巳有㫖諭部現交廷臣㑹議移駐之舉事關重大且兵丁未免有戀土之情似覺不便開墾一事朕細詢髙其倬其中大有隱情不應茍且圖利而滋害俟諸務料理就緒彈壓防禦之䇿措畫萬全然後再為區䖏未為晚也況朕聞烏䝉之勢甚衆若止撥兵數百何足以資鎮撫攘外安内機宜所繫匪輕慎毋易視徒起釁端凡事慎之謹之雍正四年六月十八日威寧總兵官臣石禮哈謹奏為奏聞事竊惟廣順州所屬長寨頑苗阻修營房一事臣與提臣馬㑹伯㑹摺奏明新任撫臣何世璂於四月初二日到任所有奉硃批面交撫臣之事遵㫖逐件面交清楚臣因狆苗梗化地方有事是以未敢即囬威寧鎮署又接雲南廵撫管總督事臣鄂爾泰来書云狆家苗黔省大患震懾羣苗在此一舉雖新撫到任湏與提督始終此事業巳摺奏等語臣在省與撫提臣悉心商酌調遣官兵相機𠞰撫嗣扵五月初九日起至六月初十等日陸續攻破谷隆長寨者貢羊城坉等䖏其長寨者貢之首惡阿革阿紀以及各小寨一切脅從羣苗俱赴軍營乞憐臣又准督臣鄂爾泰照㑹於六月初八日前赴軍營見賊穴俱巳攻開首惡亦巳就縳頑苗皆魂驚魄散從未有如此之畏懼者因思頑苗四䖏潛逃将来無以餬口保無不在別地方刦擄生事除将阿革阿紀等移觧撫臣何世璂審擬另行奏聞外臣嚴飭各該将弁不許妄行誅戮一面出示諄切曉諭寛宥脅從悉歸安業并将拏解一切婦女童穉詢明住址親識先為摘釋以昭聖朝寛大之恩至從前督撫提臣題定安營䖏所臣一一親歴其境相度形勢應如何布置安頓條分縷晰與督撫提臣㑹核覆奏施行臣恐上厪聖懐合将現在辦理縁由具摺奏聞謹奏朕為斯事時縈懐抱今覽此奏欣慰實難筆喻爾之可嘉殊非尋常如此方為不愧朕所簡㧞至爾臨事果敢赤心報効䖏其他恩賚不足以酬爾之邊功朕另有㫖賜還爾父原職也既有此勞績當更加謙恭持己和平應物毋得傲慢自詡以氣陵人恃功矜䏻而致踈於職任勉之慎之同日又奏為恭謝天恩事雍正四年六月十四日准兵部咨奉㫖石禮哈着陞補廣州将軍伊威寧鎮任内有朕交與辦理水銀之事着石禮哈一面委員辦理一面速行馳驛赴廣州任欽此欽遵移咨到臣臣跪讀之下即設香案望闕叩頭謝恩訖伏念臣一門世受國恩至深至厚時切犬馬圖報之誠但臣賦質愚昩智短才庸往往心有餘而力不逮辦事率多過愆悉䝉聖主曲賜矜全兹復䝉特㫖陞授臣廣州将軍驚聞寵命踧踖難安自顧駑駘不知作何報稱臣惟有益矢氷兢更加黽勉以仰酬髙厚於萬一耳為此繕摺恭謝天恩再運賣水銀一事䝉皇上交臣辦理臣随即檄調普安州知州洪奕隆千總李世英赴省辦運合併聲明謹奏朕原期許爾可為國家柱石之資但惟和平是務不可恃才自用勉之雍正四年九月十九日鎮守廣州将軍臣石禮哈謹奏為恭謝天恩事竊臣准貴州撫臣何世璂咨准吏部咨開内閣交出雍正四年七月十七日奉㫖貴州狆家苗肆行不法十餘年来擾害平民朕知之甚悉石禮哈方署廵撫印務即奏其罪惡多端應行征𠞰然此事甚有關係朕心時時厪念今據石禮哈奏報谷隆長寨者貢羊城坉等䖏俱巳攻破首惡阿革阿紀及為從􅇯苗川販等亦俱就擒縳等語朕甚為嘉恱石禮哈調度有方籌畫盡善除事竣具題到日照例議叙外今先沛特恩於其父着将石文焯革職之䖏復還以示朕賞功推恩之意欽此欽遵轉咨到臣臣當即望闕叩頭謝恩訖伏念臣父子世受國恩均任封疆重寄撫心自問毫無寸長足録䝉聖主加恩於臣不次超擢至於臣在省辦理狆苗一事仰仗皇上天威擒拏首惡寛宥脅從㑹商督臣料理撤兵此皆臣分所當為之事兹䝉天語褒嘉先沛特恩准復臣父石文焯廵撫之職聞命自天不覺感激涕零抑臣更有凟陳者臣父䝉皇上天恩復還原職巳為逾分若臣於事竣具題之日再邀議叙清夜思維愈加跼蹐仰懇𢎞慈免臣議叙俾臣心得以稍安則更沐髙厚之恩於無既矣伏乞聖鑒謹奏朕極知汝辭譲出於至誠但在朕有不得不加恩之䖏汝其仰體朕𠂻欽承毋遜同日又奏為奏聞事竊臣前往軍營将一切辦理事冝於六月十八日具摺奏眀在案臣随於二十二日親赴長寨等䖏查看山勢陡峻頑苗盤踞其中從前並未設有營汛一無防範遇有事故尋常差役些少兵丁不敢過問先經雲貴督臣髙其倬㑹同撫提臣題請於長寨各險要等䖏安設營汛實深有見於此乃兹狆苖輙敢壘石阻修營房糾衆抗拒屢次化誨不從臣與提臣馬㑹伯㑹商督臣鄂爾泰不得巳而有用兵之舉至於督臣鄂爾泰老成持重不特長寨營房一事深謀逺慮綏靖巖疆凡滇黔兩省事宜總理大綱秉公持正文武無不敬畏兵民聖主之知人善任也臣以軍營大局巳定随於六月二十七日旋省将所看山川形勢應設營基酌議添兵之䖏繪圖㑹商督提臣公同確議恭呈御覽臣於九月十九日遵情愛戴洵稱才守兼優之員迨往軍營辦理一切苦此二員者登山陟險身先士卒均為有用之才臣受恩深重為聖主得人起見不敢緘黙合併繕摺奏聞伏乞睿鑒謹奏覽雍正四年十一月二十四日鎮守廣州将軍臣石禮哈謹奏為奏聞事竊臣䝉聖恩陞授廣州将軍臣查四營将弁親丁糧餉俱照定額數目並無虚冒扣剋将軍衙門定例有親丁糧一百分儘足臣之養亷此外尚有相沿房租每年計收銀五百四十六兩零臣将此項銀兩留為操演賞兵之用抑臣更有請者查上三旗披甲兵共一千一百七十九名冊開壮丁二千三百八十六名下五旗披甲兵共一千八百六十一名冊開壮丁二千四百六十八名是下五旗之壯丁較上三旗止多八十二名而下五旗之披甲較上三旗實多六百八十二名所以下五旗頂補甚易而上三旗頗難以臣愚見合将上三旗壮丁查其無本戸熙二十二年内撥留駐廣披甲一千一百二十五名今生長繁庶共有一萬二千二百九十餘人人多則賢愚不一逃亡者有之行竊者有之防範應湏嚴宻臣意欲仿照民人編立保甲之法十户立跡可察而壮丁之攤派均勻矣是否可行統候聖明批示臣另行具題請㫖伏乞睿鑒謹奏徐徐次第措施諸凡慎勿急遽以求速效也雍正四年十二月二十九日鎮守廣州将軍臣石禮哈謹奏為奏聞事竊臣伯祖在日原任兩廣總督止生臣叔一子回京之日遂将康熙九年内所買之江西人沈維相令其出户並未給與執照後臣叔年長曽任雲南曲靖府同知沈維相尚留在廣於今二十餘年臣䝉皇上簡任廣州将軍沈維相前来叩見現為辦鹽課商人商名沈吉占因出户既久向臣求給執照情願與臣銀八萬兩先交銀二萬兩其餘未交銀六萬之時米價昻貴酌量八旗及緑旗四營人口多者自福建将軍臣宜兆熊以福建邊海旗纛宜繪飛其餘續交銀六萬有臣父修化育溝堤工原借欠為此謹奏覽同日又奏為奏聞事臣查緑旗四營毎馬兵額馬一匹定例差操過三年者准其開報買補無庸置議惟巻查八旗披甲馬匹毎披甲一名支給十名口糧三匹馬草料自康熙二十九年為始相沿至今臣昨查八旗馬匹毎披甲實止養馬一匹細詢其故據稱歴来如此事非得巳八旗自到廣州全仗口糧養贍有家口多者不敷日給只得将兩匹馬草料添補度日且地方濕熱馬匹難養所有買補即在此兩匹馬草料銀内添凑非比緑旗馬匹三年一准開報實出無可奈何等語臣再四思維以數十年相沿之習自臣甫到而即奏請整理八旗披甲人等不知臣辦事之本𠂻而皆恩既久一時驟難更易仍准照舊關支特恩出自聖主如以錢糧難容浮冒請寛臣時日得以悉心經理再明年冬季輪班該臣入天顔與在廷臣工賡颺拜舞一伸三年来犬馬戀主之心一将廣州八旗馬匹之事備細陳奏庶臣之積誠稍慰而事務有所遵循矣謹奏馬匹一節小事也況歴来相沿巳久但當於旗軍營兵加意訓練整飭頽風此為急務至於錢糧些湏糜費藉以養贍窮兵不論如何若何皆可向聞廣州駐防上三旗藩下官兵不法者頗多總縁在地方多年與粤民聨婣締友漸染陋俗錮蔽巳深所以日前為米價閧閙撫堂種種挟制地方官䖏四年以来巳盈朕耳今於在京八旗中撿選五六十人𤼵来更易以整理汚染舊習爾其於駐防官員内體訪生事啓釁不安分者或三二十員或四五十員查送来京此事由爾從外料理殊不露聲色若朕降明㫖諭部施行未免多一畨形迹爾領悉朕意止将此𩔖人查送不必更撿選補放之員也恐爾錯㑹所以宻諭爾知同日又奏為奏聞事十二月初九日午刻臣正在衙門忽報稱街民驚慌擾亂舖面關閉不知何故臣即差員查拏見有二人各手執長柄挑刀一把在街上亂跑當即拏雖百貨流通而居民半鮮恒業易至流為匪𩔖又上諭仰見我皇上治益求治挽澆漓而返醇樸法無善於此者今若照行甚為有益合無仰請皇上揀選一老成持重者畀以觀風整俗使之任與撫臣楊文乾徧行化導自可無頑不革矣是否可行伏乞睿鑒謹奏覽雍正五年二月二十五日鎮守廣州将軍臣石禮哈謹奏為恭謝奏謝在案伏思提督職任統轄全省兵馬方今海宇路村荘追捕盗賊其内港外洋一帶凡漁船灣泊出入隘口向以大小樑頭各有䋲尺禁其器械限其齎糧定其朝出暮歸若弁兵一索規例未有不摺奏謝伏惟睿鑒謹奏王紹緒乃鄂爾泰之所薦舉者朕所以不次擢用調伊来京引見其人果然眀敏穩妥武臣中實不可多得故即用為提督復經連次召對觀其奏請數事似覺偏於善柔恐未免在行小惠沽名一邊可於伊受事後留心採聽便中據實奏聞同日又奏為奏増劇實難供職除據詳另䟽題報外所遺員缺臣前路過廣西見全州營㕘将胡灝漢仗好議論軍務甚有條理因知先在四川出兵後在陕西軍前頗曽歴練懇求聖恩可否以胡灝陞補臣標中軍副将使之督率将弁操練兵丁於海疆營務必有裨益抑或另䝉聖眀揀選補放俾臣得收臂指之用統候睿鑒謹奏胡灝乃從陕西保舉經朕簡用之員人甚諳練洵係将材業巳照爾所請補授後因平樂一缺𦂳要故又調用也金國泰人亦甚優到任後爾試觀之雍正五年閏三月初十日鎮守廣州将軍臣石禮哈謹奏為請㫖事臣接閲邸報奉上諭現今各省所出遊擊員缺著交與各該将軍督撫提鎮於本標及所屬營内人去得操守好練兵勤慎之俸深守備每缺秉公揀選二員擬正擬陪具題送部引見欽此仰見我皇上整飭營伍博搜精覈之至意臣遵驗查臣標緑旗四營現出前營遊擊一缺應即在四營守備内揀選保送但守備四員一係革職一係病廢現在二員無堪保送者自當移咨署督臣阿克敦在通省營備内揀選保送臣又思皇上任人維才初不拘定何等員缺必用何項人員今守備内不得其人查有鑲白旗防禦陳士璠年力精壯弓馬嫻熟但旗營進取殊途臣不敢冒昩保送然臣向閲邸抄在聖祖仁皇帝時有以旗員陞營員者即我皇上御極以来亦有以旗員陞營員者若得比照此例伏懇聖恩批示臣即将防禦陳士璠揀作一員具題送部引見謹先具摺請㫖伏乞睿鑒謹奏偶一為之則可若云比例題送則不可旗缺亦關𦂳要豈不用䏻員乎果遇有出格人材不妨越例保題陞補旗缺以示鼓勵可也若開此陞補營缺之例殊起奔競之風将見少不遂意即生怨望之心反怠於供本職矣是所謂用一人而動旗員千百人不安分之念也甚無益同日又奏為奏栽秧苗漸長皆皇上聖徳及民感召天和之所致也再署撫臣常賚自為布政臣與同城五月見其居官為人不矯情立異而坦白無私不餙智矜才而臨事果决今接署撫篆士民商賈無不額手人情如此恱服地方益覺寧謐理合具摺奏聞伏乞睿鑒謹奏常賚為人素性平和但氣度少覺狭小辦事亦不及楊文乾之勤敏若其志操不随境而遷将来亦可成器同日又奏為奏聞事臣接閲邸抄伏讀上諭籌畫廣東礦徒一事臣前於署提督時間聞竊𤼵然為數無多驅除亦易一經委員查拏即便星散臣向在貴州聞廣西南丹州地方内有礦厰積匿宜特命署撫臣韓良輔赴滇與督臣鄂爾泰面議籌䇿此前據阿克敦奏報巳擒獲礦徒中之一渠魁矣此事全在地方各官實力奉行朕思孫士魁之論或係聞人恐嚇之語而誤信為真耳否則何故言之鑿鑿如事果實蜂屯蟻聚如許多人豈無為首者有以號令之而䏻羣居帖然耶其所得礦銀寒不堪衣饑不堪食又䏻不紛紛四出䭾載交易耶誠若此或稽查其交易而禁止之翦削其黨羽而分散之使其漸消也不難倘不安分少有動作則㧞本塞源動衆以𠞰滅之亦甚易至云禁絶油米欲其自困殊可𤼵一大􅀏也况礦徒亦屬黔黎目擊盤踞至十餘萬衆一任其将礦砂公然持出獲利又聽其将百貨食物公然持入用度而不一過而問焉則地方各官皆成木偶矣有是理乎孫士魁向汝言時寧不自愧歟或伊故作戲談以紿汝亦未可定南丹不在世外出入必有路徑路徑多行走易則官兵胡不入山驅逐令其觧散道途隘險往返﨑嶇則堵塞其必由之門户彼将自求觧散之不暇矣除此漸消𠞰滅二法之外餘無善䇿朕意如此而巳雍正五年四月十八日鎮守廣州将軍臣石禮哈謹奏為覆奏事昨因臣標中軍副将馬𢎞道患病乞休一摺奉到硃批臣祗領開讀知臣前帶往貴州之哈元生經理苗疆巳有成效是皆仰頼我皇上威徳遐宣神謨廣運督臣鄂爾泰欽承廟算調度得宜遂使烏䝉部落刻期改土歸流從此邊逺苗民咸樂堯天舜日臣向見哈元生膽量技勇超出尋常計議營陣事宜具有方畧今果䏻實心効力著績蠻方可謂謀勇兼全無忝閫外之寄兹䝉皇上宣示臣無任踴躍歡忭謹繕摺覆奏伏祈睿鑒謹奏薦舉得人孰有榮於此者歟即朕簡畀爾等内外諸卿亦然如藻鑑不爽用當其任顔面皆為之光輝心志咸為之舒暢設或誤用一人朕之苦衷實難筆喻卿等言念及此當深體朕心勉之又勉也雍正五年六月十五日鎮守廣州将軍臣石禮哈署理廣東廵撫印務臣常賚謹奏為奏聞事竊臣等准刑部咨奉㫖李濵身為道員何至以此有限銀兩引刀欲行自刎著交與石禮哈常賚務将實情詳審明白具奏該部知道欽此欽遵移咨到臣等臣等随将審過供情繕䟽題報外臣等據李濵供稱楊撫院到任李濵初次迎見説李濵好曽在聖上前薦過随委管理關務且要題做糧道李濵堅辭拂意後計議洋行事宜要派㡬個専行李濵說専行不便商畨又拂了意至八月初六日楊撫院丁憂離任於十月十六日差承差荘耀趕回對李濵説楊撫院是在任守制的一切税羨皆應得的要候到日繳去等語李濵巳先将關税正羨俱觧孔督院歸公楊撫院回任大怒因交盤事對李濵説若不把繳督院的税羨賠出繳来要想交盤得明白麽所以借糧道交盤故意刁掯将通省驛站船隻指稱缺少朽爛一槩都要李濵修補堅固勒要李濵賠出帑銀七千七百二十五兩又賠驛丞小修船曲江髙要保昌等䖏船五十四隻共銀一千二百四十三兩署道殷邦翰説賠了這些船将二年原船一百零三隻抵作未完的銀一千二百二十五兩就出結了李濵因此不論應賠不應賠止圖完事於雍正四年二月内完結過了半月結又不出又説就是伊要出結撫院不依也是無用李濵叠被凌逼三月有餘實難忍耐引刀自刎是這苦情若楊撫院㕘在前李濵抹頸在後就是李濵無賴因李濵抹頸在前楊撫院㕘在後其中實是寃抑等語及詰其從前因何不行詳辯據供楊撫院現在廣東殷邦翰又係承審官百凡含忍圖個活命回去是以前問官審問督院駁審再三也只照楊撫院原題本認供了今䝉皇上聖明究審别情跪聽之下喜見天日纔敢将寃抑實情供出等情臣等查驛船關係𦂳要理宜慎重但内有分撥各縣專管者有發給驛丞修理者有期届本年拆造者李濵署事甫經三月自應分别賠補今李濵自認獨賠從中不無抑勒之䖏至供荘耀一事當堂對質惟自認先来做總廵往見李濵查楊文乾於十一月十四日到任荘耀於十月十六日回廣似無官未任事而先換人做總廵之理則荘耀往見李濵之䖏不為無因又洋行議立専行一事行據司道等覆稱從前粤東洋行名曰十三行雍正四年三月内改僉六行専理上餉下貨等語臣等查粤東洋行向聽商畨願投交易窮民擔荷貨物亦得藉以餬口自楊文乾議立専行之後不無髙擡貨值商畨百姓悉皆含怨所有此案畧節理合繕摺具奏伏惟睿鑒謹奏李濵身任監司祗抹頸玷職一節雖百喙亦講不出一是字来若督撫之威遂䏻逼勒道員至於自刎則朕為何如主耶況朕屢降諭㫖甚明凡大小官員有被督撫所寃抑者許事後赴闕面陳當盛清之時楊文乾有何勢何力而䏻畢道員之命以滅口種種刁詐奸巧實屬無頼棍徒之行為也汝等以不識大體之庸才因李濵小人含忿生事遂欲藉此以雪平昔不睦之私怨甚屬無知負朕任用巳有㫖矣即以洋行一事而論行多行少楊文乾料理亦必有故若云係圖利起見則宜有染指實據豈有因射利羣小之不便即加罪撫臣之理若此則督撫之任不可一朝居矣楊文乾因日前查拏旗軍㕘奏李杕巳犯衆忌汝接署其任當防衆口讒譖挑弄汝二人不和方為明察有識今反聽信無頼之誣謗毫不顧國家用人行政之體誠為不學無術躁妄舛謬且汝甚闇於知人如㕘奏李衛謂為不可容留之軰是何心也寧目無珠耶幸汝尚有學好上進之志朕所以諸凡曲為恕宥倘汝立心不純似此顛倒是非惑亂朕聰為罪甚巨㡬不䏻為汝寛貸矣自此當痛加惕勵改悔前非不然将来受累無窮慎之戒之雍正五年九月二十二日鎮守廣州将軍臣石禮哈謹奏為恭謝天恩事竊臣接閲邸抄奉㫖石文焯審理程如絲之案甚屬錯誤今雖陳辯認罪總不出朕從前所降諭㫖之外石文焯畏縮因循素性如此但為人居官小心謹慎伊子石禮哈實䏻盡心辦事石文焯著從寛免其䖏分准回甘肅原任其俸禄永行停止嗣後當痛改前非黽勉効力倘仍蹈故轍定行從重治罪該部知道欽此臣隨恭設香案望闕叩首繕本恭謝天恩竊思臣世受國恩臣父與臣累䝉超擢任用感恩圖報寤寐難安但以敬慎自将本屬臣子常分即使殫竭心力亦無報稱可言顧重任之難勝遂愆尤之日積仰維我皇上眀如日月之照臨恩同天地之覆載體恤臣下曲賜成全臣父今荷格外恩施臣舉家益深感激奮勵惟期勉之又勉力圖後效以庶㡬仰酬天髙地厚之徳於萬一耳所有感戴微忱謹再具摺奏謝謹奏聞爾父甚覺衰邁兼之兩耳重聽近日西藏有用兵之舉恐爾父力量不䏻料理巳調内矣從此爾可為爾父放心不必縈繫也同日又奏為恭謝天恩矜宥愚矇事竊臣家人齎摺回署内有審理李濵一摺䝉硃批訓㫖臣跪讀之下悚惶無地臣縁一時愚昩祗據司道官逹等質審招詳遂與署撫臣常賚拘喚覆審情辭無異即㑹同題奏但李濵身為道員抹頸玷職臣等一時未曽見及罪實難逭乃䝉聖恩不即加譴責仍命候楊文乾回任㑹同阿克敦與臣審理俾臣得贖前愆不致重罹昏憒聖心諄摰委曲成全臣既感且愧無可言喻惟深自刻責俟楊文乾回任悉心研審務得實情以仰副皇上公平眀恕之至意合先具摺奏謝伏惟睿鑒謹奏率皆似此昏憒從事即石禮哈所以仰報朕之髙厚䖏也同日又奏為遵㫖奏聞事竊臣前奉諭㫖令臣於提臣王紹緒受事之後留心體察臣今查得王紹緒居官行事稍渉𤨏細然念念不忘聖恩志潔行清勤於辦事至於本年八月十四日提標兵丁有傳帖聚衆赴恵州府衙門繳械辭糧一事臣細加體訪縁提督衙門舊有戎旗兵一千名随從驅使雖分隷五營並不赴營差操惟聽提臣委員統率今提臣王紹緒揀選五百名仍留戎旗備用餘五百名𤼵入五營差操衆兵以向在戎旗不受千把管束且得安閒自在一聞發營之令心多不平此倡彼和遂寫傳帖聚衆恐嚇以為阻撓之計實係兵心驕悍所致非主将失馭之過是應嚴行懲治以申紀律今聞将為首之謝陞楊士龍等𤼵恵州府嚴審究治其餘發營之五百名兵丁均知畏懼悉皆帖服矣臣又聞七月内南雄協標兵有進南雄府衙門繳械辭糧一事查南雄協副将李建功到任纔四十日或有殘虐貪劣等事兵丁應赴上司告理不應赴知府衙門辭糧臣又閲邸抄漕標兵丁亦有不願當兵辭糧一事似此標兵屢屢辭糧總皆驕悍惡習伏思聖祖仁皇帝深仁厚澤休養甲兵者數十年我皇上御極以来徳政覃敷四維清晏籍伍兵丁多係自幼食糧至老不親兵革者自古養兵無若我朝之厚乃兵丁受國家豢養深恩不知感奮遂有積逸忘勞怠惰驕縱之習臣竊見生員聚衆我皇上整飭士習猶必盡法䖏治今荷戈之士動輙聚衆挟制此風更不可長是應仰請皇上勅下各省督撫提鎮遇有兵丁傳帖糾衆繳械辭糧等事務必嚴行查究将為首主使營棍審出實情即照軍法治罪毋得姑容結案則懲一以警百庶各䖏兵丁不致聞風相效而驕悍惡習自然漸就歛戢矣臣謹具摺奏聞伏乞睿鑒謹奏巳有㫖矣爾料朕於此等事件豈有姑寛之理故為此迎合之奏耳爾於責任内應嚴厲者比皆踈縱欺隱将𩔖斯不干己之事如此具奏以取信可謂巧於自䖏矣爾若照此居心将来必至負朕石禮哈當捫心自問舉頭看天慎毋差錯爾念爾此任甚不逮在黔之時知之雍正五年十一月初六日廣州将軍署理廵撫印務臣石禮哈謹奏為恭謝天恩事本年十月二十三日臣准到部咨奉㫖韓良輔因軍需案内觧任廣西廵撫印務著阿克敦前往署理楊文乾未回廣東之先廣東廵撫印務著石禮哈署理欽此臣随恭設香案望闕叩首具本恭謝天恩訖伏思臣才庸識淺屢荷殊榮自任廣州一年於此毫無補報毎切悚惶兹乃以撫臣楊文乾未回廣東署撫臣阿克敦奉調粤西特䝉皇上任使之恩益深微臣警惕之念以臣之材質駑鈍斷不敢妄事紛更然今兹職任封疆亦不敢因循茍且惟任一日之事即盡一日之心竭力黽勉庶㡬仰酬髙厚於萬一理合具摺奏謝伏惟睿鑒謹奏亟加勉力今秋西藏有事適䇿妄阿喇布坦巳故伊子遣使告哀意雖恭順奏詞甚自誇大朕思諄噶爾醜虜終為國家隱憂亦皇考未了之志欲因西藏之役遂興師問罪於諄噶爾一切籌畫機宜雖俱妥備尚宻而未宣廷臣亦未通曉西路委任岳鍾琪督領㕘議亦不乏人北路統領傅爾丹甚為勝任八旗内外大臣中勇猛破敵之将不計其數而㕘贊軍機輔助傅爾丹者竟不得人此舉所關甚鉅朕意調爾来協任此事大約在明年夏秋之間有㫖爾其預為料理以俟諭調切宜宻之同日又奏為請㫖事竊臣念海邊要區旗民雜䖏曽請将八旗四營編行保甲䝉聖恩俞允巳轉行旗營編查去後近時匪𩔖亦漸消弭但十家門牌必得有關防鈐蓋方為憑信又䝉聖主天恩撥運廣西捐貯倉榖以為旗營平糶之需臣将運到穀石東四旗交正藍旗協領管理西四旗交正黄旗協領管理四營交中軍副将管理凡收放減糶並秋成買補還倉之穀交收務湏確實但查該旗員俱無關防為信凡一切呈請文案殊難昭信守而核事實臣思京城八旗㕘領俱有部頒關防今廣州八旗協領可否仰請皇上准照京城八旗一例給與關防以預防詐偽抑或就左右四旗各分給關防一顆俾臣於八旗協領中慎選老成質實者専掌凡遇公事四旗各就公所用印則案牘有憑而文冊不致朦混矣臣謹具摺請㫖伏乞聖鑒謹奏所奏甚屬合宜巳交該部議行矣同日又奏為奏聞事竊臣准雲貴督臣鄂爾泰咨稱安南國渭川州與雲南開化府南界接壤初經攷誌清查巳據具本懇請䝉皇上念其屢世恭順准議立界繼經委員確勘議收回地四十里仍予八十里地又䝉皇上恩允該國王理應上表謝恩乃復具本求逹因𤼵還其本遂令守關土目不接雲省公文並云雖有勅書應送廣東大路今姑限兩月之期如其照常迎接便可寛宥若仍堅拒應即布告文檄聲罪致討巳一面整調滇黔兵馬候期迅𤼵一面移咨廣東著由大路預備截路奪關機宜除具摺奏聞理合行文知㑹等因到臣臣随咨㑹督臣孔毓珣續准咨覆現在備兵縁由諒督臣自有奏聞無庸臣再為凟奏惟思安南小國䝉聖朝胞與懐柔自来世効恭順恪備外藩况當我皇上天威逺播東西南朔莫不畏懐現今逺隔重洋從不通職貢者猶且慕聖来朝向風恐後區區安南依附邉末如云不接雲省公文即有勅書送廣東大路誠為愚昩無知但此乃守關土目之言未足深較若喻以大義該國王自必翻然改悔料不致有布檄興師之事惟是兵可備而不用不可用而不備安南本交阯同國自漢迄明叛服不常臣除備查該國事蹟及山川形勢關隘道路彚冊咨送雲貴督臣外臣巳整修盔甲器械訓練馬步将士如有用䖏即可候㫖遵行伏惟睿鑒謹奏蕞爾安南依附邊陲念其累世恭順方将恩徳是加豈足與之較量况鄂爾泰寧肯輕開邊釁汝既信服於平日而不䏻信之於斯事耶所事巳平定完結矣同日又奏為奏聞事本年十月十二日欽差御史常保住奉㫖送玻爾多斯國使臣麥徳羅回廣州於二十一日自廣州起身二十六日到澳門因使臣麥徳羅感激聖恩留御史常保住在澳門公同頌祝萬夀於十一月初四日常保住回廣州今於初六日回京復命理合奏聞謹奏聞常保住此行甚不安静雖係奉朕特㫖差往但将麥徳羅指為竒貨到䖏誑嚇地方官相待越禮亦甚失國體云云果否如是據實奏覆雍正五年十一月二十二日廣州将軍署理廵撫印務臣石禮哈謹奏為奏聞事竊臣䝉聖恩畀署撫務因念各屬倉穀一項最關𦂳要自宜照前兩署撫臣常賚阿克敦勒限通催之法接續行催但粤東各屬倉穀現今廣州府倉未補穀五萬餘石南海縣倉未補穀一萬一千餘石又畨禺縣倉未補穀八千餘石今廣州府知府張鋗等到任皆以倉穀未清不肯接受交盤臣竊思省㑹尚如此他䖏可知以此𩔖推廣東倉穀比他省缺額較多今現據布政司詳揭雷州府徐聞縣倉穀原額一萬三千餘石纔據該府楊俊傑申繳該令趙好義倉收實貯旋即詳請平糶情屬可疑随經該司另委亷州府知府躬詣盤查實少穀八千四百餘石臣應據司揭題㕘外此等情弊各屬皆不䏻無是以前兩署撫臣嚴立限期定在七月内買補十分之五十月内照數通完然至今買補者十無一二臣雖暫署撫務未便過嚴亦不敢因循諉卸臣又轉寛五十日之限令其作速補足統扵封印前買補收貯封印後委員盤查於查明之日臣再另行奏聞倘至期仍然盤有缺少臣自應各照未完之數列名題㕘分别分賠治罪若現今遇有陞遷事故新舊交代揭出虧空經該司揭報臣亦應據揭題㕘伏惟睿鑒謹奏廣東所缺倉穀不宜勒令急補今春孔毓珣楊文乾来京陛見時朕經明諭候楊文乾回任料理與爾無過也雍正六年正月初八日廣州将軍署理廵撫印務臣石禮哈謹奏為奏聞事竊臣據連州知州朱振基詳稱連屬朱岡下湟村犯事黜革生員黄翰臣糾伊族棍黄明威黄上權等與村民吴光逑等為奪風水随經查勘明白歸斷吴姓黄翰臣等不遵控府提審抗不到案揑散揭帖威逼族衆稱寃過楚以圖挟制帶領男婦三百二十人由藍山縣往臨武經星子廵檢司㑹同臨藍營㕘将出城阻拏並好言勸慰始各回籍當即諭令回家安業仍移營協同宻拏為首鼓衆之刁棍黄明威等不意甫獲黄待聘一名行至石馬逕地方忽被黄姓族衆百餘人攔路刦奪而去等情據報臣即檄行按察司㑹同布政司迅差嚴提確審如果審有該知州狥私枉斷之䖏自應據實揭報題㕘若審係黄翰臣等恃強鼓衆装點出境形徑希圖挟制問官情事是實務執法重究以警刁頑以遏兇横者也所有據報情由合先奏明伏惟睿鑒謹奏此等刁風萬不可令其滋長當盡法懲䖏楊文乾回任時将此諭𫝊知同日又奏為奏聞事竊臣於雍正五年十一月初一日接署撫篆随查各屬雍正三四五等年碾支兵米及平糶共穀七十七萬一千九百六石零據布政司文報各屬買補穀二萬九千七十五石零臣署任内叠檄嚴催十一十二兩月據各屬報買穀一十三萬六千七百二十六石零其餘尚未報到今聞撫臣楊文乾約於正月十四五日可以到粤所有未報到之穀石應俟撫臣回任飭催買補理合奏眀伏惟睿鑒謹奏粤省倉穀之虧欠朕所悉知即此報稱買補之數亦未必確實巳備細面諭楊文乾伊回任後自然次苐料理同日又奏為議将回籍流民墾荒安挿免再入川事竊粤東人民有從前挈家流入川省經川陕督臣岳鍾琪奏明奉㫖𤼵營田水利捐項觧川為牛具籽種口糧等費仰見我皇上天地生成大徳不使一夫失所之至意臣細推其故祗縁川省多未墾田畝米肉價值較賤於粤是以無識愚民赴川者衆臣自上年十一月内准部咨即分飭通省官吏務查該管地方如有男婦成羣經過務必盤詰禁阻慰勸回籍毋仍膜視随據韶州府知府禀報於上年十一月内有始興等縣男婦多人經過韶地欲往湖南入川者當經各官勸諭回籍臣又訪得有一種包攬棍徒訛言川省米肉價賤一去落業立可富饒毎戸得銀包送愚民被惑不特貧者堕其局中即有業者亦鬻産以求富足臣現在檄查勒令回籍因思此等愚民赴川如歸者以傳聞川中地土閒曠易於謀生也臣查粤省髙雷㢘三郡儘有荒地可資耕種而曽無一人就墾者總縁粤俗彊梁未開則置不問遇墾則来訟奪是以長年任委草莾臣與督臣孔毓珣商議将三郡荒地内有不係沙礫可開墾者盡行查出分別是官是民杜其争訟之端寛以陞科之限将勒回入川男婦並各屬有願去開墾者取具各官印結一概遷就落業積至多户聨成保甲以為安置流民之所至於籽種牛具口糧等費其力有不䏻者臣與督臣公同捐給今撫臣楊文乾将次到粤臣知識淺陋所議是否可行伏乞皇上勅𤼵督撫臣再加詳議具奏統惟睿鑒謹奏此議甚是去嵗孔毓珣楊文乾将粤省所有開荒之地亦經奏聞請㫖雍正六年五月初四日鎮守廣州将軍臣石禮哈謹奏為奏聞事本年二月至三月中旬以前廣州得雨日期及田苗長𤼵情形臣經摺奏在案自三月二十以後由四月至五月初間或二三日一雨或五六日一雨或一雨連朝竟夜或一日乍雨乍晴均勻調暢俱非暴風疾雨人人皆説廣州遞年雨水無似今年及時恰好現今早稲茂盛穎碩儘有十分收成指日登場所以民間囤穀出糶米價日平目今好米毎石不過一両二錢五分次米一兩一錢五分臣思雨暘時若禾稼盈疇皆由我皇上敬天勤民躬親耕耤廣祀先農是以太和協應闔省官民欣逢大有仰頌皇仁所有感激歡忭輿情理合具摺奏聞謹奏覽廣省雨水米價情形深慰朕懐此皆該督撫孔毓珣楊文乾知過自新實心任事之所致若似阿克敦常賚等督撫雖朕一人極盡敬勤欲望上天如此垂庥斷不䏻也實與朕無渉同日又奏為披瀝下情仰懇睿鑒事竊臣䝉皇上畀任廣州一年於兹無可仰報惟以樸誠愚直慎守職分久荷聖明洞鑒臣到廣州因先年湖廣五開衛守備李孝一於臣此案督臣孔毓珣署督臣阿克敦俱經審過雲撫常賚係原舊承問之員備知始末經臣批司道㑹審前来檢閲從前供看未嘗不為詫異及至㑹同公勘再四推鞫堅供不移但此案止有李濵一人臣是以看内有均屬李濵一口之語詎知據供覆形容李樹徳之堂弟撫臣楊文乾以山東曺州知州先經李樹徳題陞東昌府知府後以東昌府卓異陞聖恩用至将軍接見文武屬員頗多即平行衙門未有不候傳禀直入川堂之理其時李逹徳来臣衙門轅役不敢攔阻直入川堂臣因含容接見逹徳即訴號房阻辱臣遂責革號房以抒其忿逹徳盛氣不息臣安慰至再猶復出言無状大罵號房而去其申飭教導原不必列之章奏乃撫臣見咨宻令謝禹臣等之事在官逹歴任京職吏治未諳不識去年十一月初五日接准部咨奉㫖官逹方願瑛俱著觧任文内即有王謩尹繼善各前往署理布政司按察司印務等因到臣臣又先於十月二十八日接閲邸抄九月二十五日奉㫖少詹王謩郎中尹繼善差往廣東省著馳驛前去臣意既係馳驛来粤自不日可到臣移商督臣孔毓珣亦謂署員馳驛前来似毋庸另委等語臣查廣西撫臣韓良輔奉㫖觧任曽候署撫臣阿克敦到任交代則官逹方願瑛任内一切章奏仍俱列三人職名臣實毫無私意難逃聖眀照察再臣奉署撫篆聞督臣孔毓珣署撫事時曽延江南人黄元湜辦事臣於十一月内從南海縣皇上日理萬㡬宵旰不遑若臣下挟嫌校短論長縱聖訓裁成頗知敬慎不敢孟浪故任撫臣極力翻騰臣仰賴龍以来世受國恩臣父石文焯䝉聖主隆恩歴任廵撫現今陞授吏部左侍郎臣䝉聖恩髙厚位至将軍荷寵邀榮至此巳極臣夙夜冰競實切圖報前奉硃批北路之役臣誠感奮踴躍比月以来身雖在廣安居心巳先馳北塞現今八旗弓馬較昔可觀交鎗純熟所有八旗旗幟甲衣交鎗将次造完至旗營丁口偶有䑕竊狗偷之事巳嚴行該管官加意防範若呼𩔖逞強魚肉小民妄行生事故習可保必無臣儘可赴京陛見以慰數年来犬馬戀主之誠並跪領口外一切方畧臣精力正彊自信可以出力惟求皇上另簡賢員前来彈壓或天髙地厚之恩施於無盡矣臣情切具奏伏惟睿鑒謹奏覽雍正六年七月初四日鎮守廣州将軍臣石禮哈謹奏為奏明事竊臣於五月二十四日因感時症身體漸困至二十九日頓然疾作渾身外熱内燒痰涎壅滯語言𤼵譫神氣昏迷十餘晝夜目不交睫至十二日齎摺人回署䝉皇上天恩賜臣上方良藥臣始於十三日甦醒臣先病重之時正在昏迷間撫臣楊文乾将奉㫖㑹審李濵一案咨移到臣訂於六月初四日㑹審臣據病咨覆後臣稍省人事巳知撫臣題請展限在案臣竊念感此病症自分萬無生理又五月内臣妻病故臣當妻亡子幼之時遘兹重疾乃幸託聖主福庇復獲保全皆我皇上心通化育徳動神明遂使犬馬之微臣亦順栽培之洪願既圖報之有日自感戢於靡涯但臣病稍蘓撫臣随亦病作臣今扶人可以行走而撫臣又於七月初二日不省人事矣所有臣患病展限縁由理合奏明伏祈睿鑒謹奏汝二人違朕訓誨剛愎自用負此乖戾之氣必致於不省人事而後巳今雖稍蘓倘仍不知愧悔改過遷善不省人事之病将復作矣慎之慎之硃批諭㫖巻八下
