body:
  text: 欽定四庫全書硃批諭㫖巻七十三之一硃批王士俊奏摺雍正六年十月初八日署理廣東布政使臣王士俊謹奏爲恭謝天恩事竊臣生長邊方至愚極陋於雍正元年由庶常蒙皇上揀徃河南補授外吏兩任牧令未效寸長雍正三年經前任廣東撫臣楊文乾保奏奉㫖帶徃廣東題用雍正四年蒙特㫖超陞肇髙廉羅道臣受恩深重惟知上報國恩下恤民瘼凡上司同寅或喜或怒皆不顧及上年八月内因原任藩司官達收受重役朋充之李長茂銀一千二百五十兩濫充肇慶府黄江厰典吏臣有稽查之責即詳報督撫奈署撫臣阿克敦袒庇官逹欲思消弭其事恨臣不從計無所施聽信解任臬司方願瑛顚倒教唆揑稱臣經收黄江厰落地稅少解銀一千二百兩將臣糾㕘羈禁竊臣管理黄江厰稅儘收儘解阿克敦所㕘少解之稅羡臣早已解交前撫臣楊文乾收充公用在案阿克敦亦明知臣非欺隱稅羡之人原欲借欺隱稅羡大題或可聳動聖聰并欲陷前撫臣楊文乾之意臣被㕘之後官達方願瑛撥役環守百般凌虐致令深秋衣葛終日斷餐意在滅口無證即可消弭官達婪贓之案嚴禁七十六日臣自料命若懸絲萬無生路乃皇上明同日月大沛綸音矜恤保全仍舊供職是臣性命功名無非天恩所再造嗣於本年八月十三日欽奉回京另用之諭㫖臣隨即領咨兼程北上九月初八日行至韶州府曲江縣地方接奉諭㫖著臣署理廣東布政使印務欽此臣隨回至廣東省城遵於十五日接印署事訖九月二十四日署撫臣傅泰抵粤交臣御頒摺匣四箇鎻匙二把并傳諭臣有奏摺俱交大學士張廷玉轉奏欽此臣叩頭祗皇上超拔委任之至意所有臣感激微忱謹先繕摺奏謝伏乞皇上睿鑒謹奏閱爾奏中有明同日月等語須知非朕之明乃天道昭著自然之理也凡人但能幽獨無怍對天無慚竟可坦然勿慮若輩具何伎倆豈能害人起心加害適足以自陷其身此非一大明驗歟今汝藩司之職不比道府表率數縣而已必將通省屬員激揚訓導兼能顧恤方稱勝任不宜過於嚴刻百凡以和平公正處之如在下位與同寅不睦猶可特立孤行獨盡乃職今居通省屬員之上若不能悅服其心反令各懐怨憾則一事不能行矣切戒使氣更勿挾恨從前縱有一二不相協和之人當開誠勸勉容其自新遇有下愚不移者密奏以聞候朕裁酌或調或退自有措置克遵訓諭而行方爲不負知遇如此則君臣契合可傳爲千秋佳話矣勉爲之同日又奏爲恭報米價事竊照粤東田畝一嵗兩收本年自春至夏雨暘時若早稻豐稔晚禾茂盛省城上米每石價銀一兩二錢四分中米一兩一錢八分下米一兩一錢二分廣州府所屬各州縣米價較賤於省城肇慶府屬米價較賤於廣州而高州府羅定州所屬米價又較賤於肇慶上年潮州荒歉民食維艱今嵗二麥早稻俱獲豐收夏間米價頓減目今晚稻又熟上米每石價止一兩中米九錢五分下米九錢惠州米價與潮州相等南雄山多田少米價少昂上米每石一兩四錢中米下米價值遞減南雄所屬之始興縣密邇韶州府上米每石價止一兩二錢中米一兩一錢下米九錢七八分韶屬米價又漸減於始興至瓊雷廉三府米價更減於他郡目今雷屬上米每石九錢中米八錢五分下米七錢五分瓊屬上米九錢二分中米八錢九分下米八錢五分廉屬上米八錢八分中米下米價又減少海疆豐足萬姓歡呼除田禾收成分數俟收畢另報外所有粤東現在米價謹先據實繕摺奏聞謹奏覽奏米價平減深慰朕懷同日又奏爲陳明倉穀事竊照廣東通省府州縣衞所原額貯倉穀一百六十四萬三千六百餘石又廣西運到穀三十萬石使皆實貯在倉何慮僃荒無策奈各府州縣積習相沿或竟虧空無存或有懸價未買其虧空者已被㕘追懸價者似與虧空有别故從前督撫惟有檄催買補而已本年正月内前撫臣楊文乾自閩回粤勒限催買各員業經買穀交倉者十居七八但現今尚有雖已買足而未運入倉者有奉文平糶而未及買補者有碾支兵米而尚未徵還者必須逐一查明方免揑飾虧短之弊今值晚稻豐收之際臣一靣飭令上𦂳買補一靣委員逐項盤查俟查明之後如尚有實在虧空詳請督撫題㕘已買未運者令其即速交倉碾支兵米拖欠在民者令其即速徴補務使倉儲充盈必不敢縱容缺少合先繕摺奏明伏乞皇上睿鑒謹奏從容次第爲之不必太驟將眞實情形直陳無隱最爲要務同日又奏爲奏明短少解部銀兩事竊照錢糧解部兊交分毫不容虧缺既因短少催補自應按數全完臣蒙特㫖署理廣東布政使印務細查舊巻有歴任正署藩司並不造入交代冊内者一件付催短少銀兩事雍正四年六月十六日户部咨稱管解京餉三次差官常三書短少銀六千九百六十八兩四次差官汪苕文短少銀四千八百兩催令解部等因屢經户部咨催皆以正署各司疊相交代致未起解咨覆在案臣查歷任正署各司並未將前項銀兩補解現今亦無毫釐貯庫因喚庫吏細詢情由乃知雍正二年以前解部錢糧兌平短少奉部行催之後即將通省俸工抵補是以隨欠隨完迨奉㫖俸工槩不捐扣而三次四次短平銀兩竟無著落前司常賚議將火耗扣解查粤東丁地錢糧解交藩庫者每年不滿一百萬兩向經督撫議定每兩扣火耗四分令各州縣解貯藩庫以充一切公用無如通省公事甚多本年解到之火耗尚不足辦本年之公事欲其補解三次四次短平銀兩勢必不能况歷任正署藩司惟王謩未曾收受陋規如圖理琛朱絳方願瑛常賚官逹除飬廉之外所得陋規甚多伊等在任時絶不以短少部帑爲念第以正署各司疊相交代致未起解爲詞支飾拖延則正署各司交代朦混已見一斑臣現在詳明督撫題請著落圖理琛朱絳方願瑛常賚官達分賠解部併藩庫此外有無未清之項俟臣徹底盤查另行奏聞謹奏所奏是應如此秉公辦理以爲漫不清查完補者之戒雍正六年十一月十五日署理廣東布政使臣王士俊謹奏爲恭報豐收事竊照廣東今嵗早稻登場咸稱大有秋冬雨暘時若晚稻又盡豐收臣細查各府州所屬收成俱有七八九分以及十分不等各處米價每石自六錢七八分至一兩二錢五分不等臣抵粤三年目睹收穫之豐熟米價之平減實惟今嵗爲獨異四野盈寜萬民樂業當此穀價甚賤之時嚴催各屬及早買運交倉俾無升斗虧欠是又臣所私心欣幸者耳理合繕摺奏聞伏乞皇上睿鑒謹奏覽收穫情形深慰朕懷汝等撫藩大吏但能秉公察吏除暴安良以暢遂輿情則感召和氣嘉祥畢至朕可保其必然也勉之勉之同日又奏爲奏明革除積弊事竊查廣東藩司衙門之前向有銀匠舖四座名爲官銀匠收兌錢糧驗看成色是以州縣錢糧解到省城先將銀桶寄頓舖内該銀匠勾通解銀僕役私開銀桶取出足紋元寳傾銷九八成色止留足紋元寳二錠置諸桶靣該銀匠與藩庫吏書通同一氣扣色分肥當藩司收兌時庫吏止取桶靣足紋元寳呈驗官不及察堕其術中盡收貯庫按月給𤼵兵餉弁卒暗受其虧臣訪知其弊已將官銀匠革除臣又聞州縣起解錢糧之日州縣之銀匠每千兩寄給省城官銀匠銀五兩冀免故意吹求更給解役銀一兩五錢供其途中酒食而州縣之銀匠遂藉端需索以致納銀之花户受累多端臣經通飭州縣徧示嚴禁立法以來里民稱便至如典吏攢典役滿請咨考職向有督撫藩司陋規臣已詳明督撫禁革矣本省捐納各員領咨赴選向有藩司陋規臣已面諭該員槩免餽送矣州縣徵收錢糧紅簿送司蓋印事屬無益兼多虚耗臣已詳明督撫題請停止矣粤東未議火耗四分解充公用之前事事派諸州縣因州縣捐解不完今猶頻檄催促一經新舊交代纍積難清臣已酌定欵項詳請督撫批免捐解矣藩司爲錢糧總滙諸弊叢生事無鉅細臣惟有逐一清理屏却情面杜絶苞苴務使囊無餘資案無留牘或少可仰報聖恩於萬一耳所有臣裁革積弊理合奏聞謹奏覽不必矯廉尤戒深刻諸凡惟宜通情酌理而行過猶不及四字常存諸胸中以自省欲速則不達一切事徐徐循序爲之同日又奏爲㨿實奏明事本年十月十七日署撫臣傅泰行知到臣一件欽奉上諭事准吏部咨内閣交出奉上諭原任廣東廵撫楊文乾係宣力封疆之大臣朕聞其病故心甚憫惻聞阿克敦自廣西回至廣東與官達方願瑛等懐挾私怨以楊文乾病故爲快演戲開筵置酒稱慶又楊以寧係獲罪應行拘禁之人公然乗轎至伊等之寓酣歌宴㑹無所忌憚似此凌囂薄惡之風以大臣之摧折爲幸其存心甚屬可惡著將阿克敦官達方願瑛楊以寜拏問嚴加拘禁交與孔毓珣傅泰等嚴審定擬其四人名下所有各案俱著審明加倍治罪孔毓珣身爲總督一任伊等肆意妄行不加約束甚屬無耻若查審各案再稍有瞻狥寛縱之處經朕察出定行從重議處欽此仰見我皇上日月同明無逺不照諭㫖到日粤省臣民無不驚異惶悚所有阿克敦等各案欽差臣留保喀爾吉善㑹同督撫臣逐日審理自無寛縱又原任羅定州知州楊廷翼被督臣孔毓珣糾㕘詐贓一案亦經欽差臣留保喀爾言善同署撫臣傅泰現在㑹審查臣在肇髙廉羅道任内楊廷翼於本年七月十四日以武舉彭士望係㕘革署州楊以寜虛出糧票之欵證誣揑廷翼勒索士望銀一千八百兩等情具詳到臣當將原詳即批該州有無勒索彭士望銀兩彭士望是否挾仇誣陷既經臬司提犯訊究仰即詳明臬司聼候核奪並候據詳轉移繳臣隨經據詳移明臬司在案至七月二十一日督臣孔毓前奉督臣發稿補掲情由不敢欺隱理合據實奏明伏乞皇上睿鑒謹奏覽同日又奏爲敬陳各員賢否事竊臣生長邊陲倖登科目素無交結孤立少援雍正元年奉㫖揀徃河南兩任牧令雍正二年查賑浙江雍正三年赴粤題用凡臣足跡所至必採訪風俗之美惡官員之賢否黙記於心而不敢忘兹蒙御頒摺匣容臣繕摺臣敢不將當奏之事據實上聞伏查廣東按察使一缺命盗詞訟多於他省非精心鹽政裁革陋規通省知府十一員瓊州府知府宗思聖經臣遵㫖保舉外肇惠亷三府尚在乏員廣州府知府張鋗外假渾厚之名内蓄苞苴之念收受州縣養廉俱索穢蹟彰聞臣現在察訪俟核實詳掲請㕘韶州府知府呉騫秉性廉介辦事勤敏南雄府知府王鉽潮州府知府胡恂髙州府知府葉思華皆知恪守官箴無慚表率廣州府理猺同知陳鴻熙瓊州府同知李達徳雷州府同知馬世樞俱年力精壯才具可觀韶州府通判陸國柱居官勤慎臣已詳明督撫題補沿海之萬州知州其餘各府同知通判皆堪循分供職至通省州縣畧有吏才者盡經調補沿海之缺新任各員止可徐觀後效如瓊州府感恩縣知縣業世美已陞雲南楚雄同知因題補有人部議令葉世美赴滇候補臣查葉世美在粤多年熟悉風土海豐縣缺調補乏人臣已詳明督撫擬將葉世美以陞銜好題補海豐洵屬駕輕就熟瓊州府崖州知州程哲已治堪供驅使原任浙江湖州府革職知府曹掄彬皇上睿鑒施行謹奏覽同日又奏爲奏聞事竊人臣辦理公務自當盡心竭力毫不存私方稱厥職今有廣南韶道林兆惠貪婪性成姦詐百出如監修船隻則冒開物料收受養廉則勒索隨封此皆臣未署布政司以前之事未便咎其已徃又如萬年吉地需用楠木自宜敬謹採辦雍正四年十一月内督撫檄委林兆惠採辦運送查廣州府屬之從化縣楠木頗多產在官山不須價買惟用人工採運遂可出河林兆惠支領藩庫正項錢糧一萬一千三百兩先後報獲楠木九百八十五根又遣順徳縣馬寜司廵檢艾國煐向藩庫支銀三千兩指稱從化築􅄵蓄水運木等費臣署理藩司印務錢糧出入責任攸闗林兆惠已領銀一萬四千三百兩爲數未嘗不多採辦已歷二年爲時未嘗不久報獲楠木九百八十五根到厰僅二百二十根揑報情弊已露從前領過銀兩節經催取所用數目並無隻字移覆窺林兆惠之意不過俟事竣之後一總開銷以便侵蝕且廵道爲督緝盗賊之員上年六月内從化縣盜賊公然搶刦林兆惠之木厰將搶去人役勒令備銀取贖盜犯肆横寧復有廵道在其目中則林兆惠之居官庸懦更屬顯然查廣南韶道一缺甚屬緊要林兆惠人無才具術善逢迎使久任海疆恐盜風日熾臣受恩深重何敢隱黙瞻狥理合據實奏聞伏乞皇上睿鑒施行謹奏前諭甚明林兆惠果有不法劣跡竟行具掲詳㕘倘或目下得人朕即降㫖更替亦未可定同日又奏爲密陳管見事竊查廣東通省額編匠役九千零一十二名逓年每名應徵匠價銀四錢五分三釐六毫共徴銀四千零八十七兩八錢八分一釐解交司庫撥充兵餉惟是州縣徵收匠價時書吏原差勾通匠頭藉催納匠價名色凡遇匠役之家無不逐户苛求百般勒詐葢縁匠價一項逢卯止比原差匠役並不到案是以衙蠧得肆其苛求而匠役盡被其魚肉臣仰體皇上軫惜百工之至意請照江西浙江等省之例將匠價銀兩勻入地丁項下則積弊可除而花户順便輸將衆擎易舉匠役永免重累受益無窮是否可採伏乞皇上睿鑒施行謹奏此事交該部查議候奏覆有㫖同日又奏爲奏明事竊查廣東外海内河戰船繒船艍船槳船等項船隻每逄修造之期一切工料悉於藩庫内支領部定價銀文武員弁公同修造歷因部價不敷詳報督臣議令州縣派捐幫貼縁文員不諳修造勢不得不假手於武弁奈武弁因有捐貼之議任意需求按修造部價每百兩勒令州縣捐貼銀六十兩及八十兩不等雍正四年三月間臣署理瓊州府事適値修槳船六隻部價六百七十二兩零每百兩照加六捐貼應捐貼銀四百三雨零臣已將瓊郡陋規盡行裁革州縣以修船捐費無措向臣商酌臣訪知武弁以修船爲利藪遂親詣海口購辦工料不使同事各員少有侵漁及工竣之日臣止捐貼銀二百一十五兩照應捐貼之數已省十之四五廣東産木之地各府木價不甚懸殊但使監造督修文武各員盡肯矢公修造一切捐貼自可節省况現在州縣議給養廉雜派盡除將來凢有工作等費悉支公項以公項而塡私槖尤屬不可臣擬將修造船隻於部價外雖應幫貼必須從實核减之處詳明督臣果否批允尚在未定合先繕摺奏明伏乞皇上睿鑒謹奏該部密議奏聞雍正六年十二月初十日署理廣東布政使臣王士俊謹奏爲承審㕘案據實奏聞事竊廣東前任撫臣楊文乾在任時摺奏原任布政使官逹及遵㫖續㕘官逹婪贓各欵或係林氏等告發或係陳成元等出首在官達得贓有據楊文乾㕘劾非虛已久在聖明洞照中矣乃自楊文乾病故之後官逹即與阿克敦等來徃潛謀詭詐百出密囑出首之陳成元等於未經𤼵審之先同赴督臣衙門遞呈推缷於廣州守張鋗雷州守甘士琦㑹審之日盡翻前署藩司王謩署臬司尹繼善等審確之原供俱稱被糧驛道何師儉逼勒以爲開脫官達汚衊楊文乾之計督臣孔毓珣於本年九月内已將何師儉糾㕘十一月二十四日孔毓珣同欽差臣留保喀爾吉善署撫臣傅泰提何師儉嚴審因其極口稱寃當堂立將何師儉上鎻押發按察司監禁及二十七日何師儉革職部文到粤署撫臣傅泰檄令按察使公元㑹同臣訊供詳觧臣隨同公元㑹審陳成元指稱何師儉遣家人沈二勸伊出首何師儉力辯並無其事將沈二嚴加夾訊亦堅供不認又將何師儉逐一推究據何師儉剖白甚明及駁詰陳成元等莫不理屈詞窮惟范禧勸章燦出首尚屬有因然何師儉亦無恐嚇逼勒情弊再查林公官一案前經知府張鋗等㕘審數次各犯證並無供及糧驛道書辦黎永姓名茲因何師儉被㕘鎻禁林公官忽改前供揑出黎永為見證其為賄囑朋謀情甚顯露官逹欲自卸婪贓之罪必先令陳成元等盡翻原供欲波累楊文乾必先歸咎何師儉總以楊文乾之存歿顚倒㕘欵之是非臣目擊官逹等隂謀翻案情形審過何師儉並無逼勒情節理合據實繕摺奏聞伏乞皇上睿鑒謹奏爾其公正爲之朕從不預横成見於胸中論事惟凖乎理用法惟期於平前命傅泰署撫并差留保等徃粤於陛辭時朕經僃悉訓諭伊等亦皆領㑹朕意斷不至為匪黨所惑至於何師儉朕怪其與礦徒貪利甚屬負恩其别案巳有㫖矣秉公審理可也同日又奏為奏明礦徒情形並陳管見事竊廣東各屬山場所在皆產銅鐵鐵爐現在開煽輸稅未奉停止惟銅礦久經封禁但粤省田少人稠民無常業自銅礦奉禁以來附近居民仍復羣聚偷挖在地方文武各官視銅礦為小民衣食之地明知偷挖不行攔阻督撫提鎮知有礦徒聚集雖檄飭官弁驅逐無如伊等聲息甚通官弁未到之先則已另徃他處官弁既去之後旋回壠口挖砂其實礦徒究未勅令督撫勘明各屬山場照雲南湖廣之例一體開礦收買新鑄制錢分運各府換銀行使支放兵餉撘國寳流通於薄海羣黎食力於銅砂是誠一舉而兩得也或以開採銅礦疑夫役易聚難㪚但銅礦與鐵厰無異今鐵厰所需夫役頗多取結互保並無奏粤東開採一事言之者甚衆朕殊不以為然葢縁粤省不比滇黔一者民俗善盜二者米穀不敷開採雖獲礦砂之利然寒不堪衣饑不堪食而聚集數十萬不耕之人於荒山窮谷之中其害不獨有悞農業而已也縱云窮黎餬口資藉終非養民之上策現據金鉷亦有開礦之請尚未議定俟試行後再降諭㫖同日又奏為奏明事竊廣東沿海州縣共三十五缺例應於通省現任州縣内揀選調補向因前撫臣楊文乾入覲之後奉命赴閩署撫臣常賚阿克敦石禮哈接續交替以致沿情隨將連平州知州李焞擬補崖州韶州府通判陸國柱擬補萬州感恩縣陞任知縣葉世美留補海豐縣西寧縣知縣薩海擬補新寧縣乳源縣知縣王維炳擬補呉川縣平逺縣知縣劉延泰擬補遂溪縣靈山縣知縣林榆擬補合浦縣開建縣知縣邵成正擬補徐聞縣至南海番禺二縣現在缺員雖非沿海之缺然附在省㑹尤須幹員方能勝任臣因選擇英徳縣知縣劉庶擬調南海縣普寧縣知縣藍鼎元擬調番禺縣已節次詳明督撫聽候否無不留心稽查如雷州府知府甘士琦聞其收取巳革陋規需索盤倉夫價臣恐人言未確復行細加訪問使甘士琦果有劣蹟彰聞自不敢代為容隱倘無確實欵證亦不敢冒昧揭㕘臣惟一秉至公勤愼辦事以仰副皇上愛惜人才之至意耳謹奏甘士琦人甚庸平前經批諭矣即使此事訪無欵證亦一無足取非可惜之材器也雍正七年三月初三日署理廣東布政使臣王士俊謹奏為恭謝天恩事本年二月十五日臣齎摺家人回粤蒙皇上賜臣御書福字一幅哈密瓜一圓臣即趨至河干叩頭跪接捧入臣署恭設香案謝恩祗受訖伏念臣一介庸愚至微極陋乃荷聖明擢用寵賜遥頒敬瞻宸翰增輝實為見所未見初識西陲異品更屬嘗所未嘗瓜由竒種非同四月生瓜福自異數感激靡涯敬謹繕摺奏謝伏乞皇上睿鑒謹奏覽朕觀傅泰識見甚不妥協汝意以為何如其操守若何居心立志若何辦事之才若何統率屬員公私明闇若何秉公抒誠據實奏聞但須密之少不密則自貽伊戚亦不可因係上司而曲為回護據汝所見無欺無隱奏來同日又奏為恭報米價平減二麥豐盛事竊粤東天氣温和農家播種甚早二三月間即係青黄不接之際故每嵗米價入春必貴上年雨暘時若各郡豐收現在之糧米較諸去冬每石復減價一錢一二分不等民無艱食人皆樂業目今大麥小麥遍野青蔥惠潮二府種麥最多更為茂盛春末夏初悉可收穫是皆我皇上聖徳感孚屢豐獻瑞海邦童叟共樂盈寜所有粤東米價平減二麥豐盛情形理合繕摺奏聞謹奏汝等守土之官果能公忠誠恪懋修厥職以敬迓天庥自當頻獲嘉應也同日又奏為恭進方物以展微忱事竊臣自雍正元年由庶吉士奉㫖揀補河南牧令迄今數載未效寸長乃蒙皇上軫恤生全逾格超用又於常禄之外給以養亷高厚之恩有加無已而臣獨無以少盡葵忱歉仄何可言喻茲購覔粤東土產九種裝封齎進雖些微方物未足盡臣至誠至敬之心皇上宵衣旰食亦不以些微方物為輕重第臣六年外吏遥隔天顔犬馬戀主之私愈久愈切計惟有藉此些微方物庶可展臣至誠至敬之心於萬一是以不揣菲䙝跪叩上陳伏祈皇上睿鑒謹奏豈有是理朕覽奏愕然未料王士俊如此向朕展布誠敬也荒謬不通處曷勝批諭同日又奏為懇賜起運銅斤留粤就近鼓鑄事竊照粤東錢法甚壞臣於上年十二月内已經繕摺奏聞矣但鼓鑄一日不開則砂錢舊錢一日不止粤人所置器皿等項用錫者多用銅者少自奉零除銅價外每斤應支水脚銀三分共需水脚銀一萬六千六百三十一兩零皆於正項開銷仰懇皇上洪恩將雍正七年分解部銅斤留在粤東就近設局鼓鑄以解銅水脚充為鼔鑄之費而有餘所鑄之錢按數撘放兵餉不必拘定一成二成之數則國寳流通於百越而砂錢舊錢隨便收買民間自不復行使矣臣為錢法起見故敢冒昧陳請伏乞皇上睿鑒施行謹奏設局鼓鑄之請現交部議候旨遵行將解部銅斤即留粤省何不經之論至於此極耶同日又奏為敬請開例墾荒事竊照粤東幅員遼濶生齒殷繁奈逐末者多力田者少以致每年本省所收之米麥不敷民食臣抵粤歴今四載每因公務徃來目擊各府之荒地無處不有而肇高雷廉等府為尤甚當即僃詢父老或云不通水利小民無力開渠或云原欲墾荒一時苦無農具此粤東之田地所以每致抛廢而糧米時致缺乏也臣見現在直隸興修水利而民有良田雲貴開墾邊疆而野無曠土各省俱有成效粤東應亟舉行已於本年正月詳明督撫將粤東荒地照雲貴開墾捐納項欵其牛種等費每畝折銀一兩頃數銀數照直隸水利營田題請暫開事例奉督撫批令查明荒地確數然後具題斯固督撫愼重周詳之意但抛荒之地清查匪易必欲得其確實數目惟有日延一日年復一年任其終歸廢棄而已伏查雲貴督臣鄂爾泰請開事例亦止聲明有地可墾未嘗實指荒地幾何良以荒地高下錯雜一時難以數計迨至無荒可墾始有成規倘蒙皇上洪恩將粤東准同雲貴一例開捐則不耕之土均變膏腴嵗歳加増國課萬年開粒食之源人人力作謀生百越享盈寜之樂矣是否可採伏乞皇上睿鑒施行謹奏觀汝非請開礦即奏開捐朕甚疑之汝等大員操守為第一要著大不法則小不廉其吏治官箴尚何可問也愼之朕念各省荒地有願墾而力或不逮者已特㫖飭諭該督撫等動用存公銀穀查借矣其已墾未報者准令自首免其隱匿之罪亦經頒諭通行汝但當遵照諭㫖遇願墾無力者量為資借已墾未報者實力勸首申飭州縣有司一體奉行自有成效何得援滇黔之例而欲另起爐竈耶粤省非如雲貴土廣人稀又係新闢苗疆之可比此奏大不是矣同日又奏為恭謝聖訓敬繳硃批事雍正六年十二月二十八日臣初次齎摺家人回粤臣叩捧硃批敬謹細繹仰蒙皇上憫臣愚昧無知矜憐備至命臣統率屬員須激揚訓導兼能顧恤不宜過於嚴刻跪讀再四起敬起畏刻腑銘心涕淚交下及讀至克遵朕諭而行方為不負知遇如此則君臣契合可爲千秋佳話之諭㫖臣望北瞻天俯首搶地中心感激口不能言臣何人斯其堪當此異數耶迨本年二月十五日臣第二次齎摺家人回粤跪讀硃批蒙皇上訓臣滌除科甲袒護之習諸凡不必矯廉尤戒深刻過猶不及欲速不達仰見我皇上訓誨臣工周詳懇摯冀其溫厚和平端方正直甚於父師之教子弟臣雖駑鈍亦具肺腸倘不念茲在茲心體力行何堪復與於人數惟有凛遵聖訓凡事詳情酌理不敢嚴刻務殫精誠整躬率屬以期無負知遇之洪恩於萬一耳所有臣頂感下情理合繕摺奏謝并將兩次奉到硃批奏摺彚齊恭繳伏乞上睿鑒謹奏奉朕奬許之批作嚴訓觀誡飭之㫖作温諭解能如此始能負荷朕教誨之恩若稍加奬許便肆意舞巧偶遇誡飭即驚惶退縮斯乃糞土朽木之質何堪雕琢凡接讀訓諭俱當返身内省有則改之無則加勉不必窺探朕之喜怒但具一片忠誠對越天地神明以期克盡臣節庶幾無忝厥職否則身膺守土之責尸居表率之任寧無愧乎思之誌之硃批諭㫖巻七十三之一欽定四庫全書硃批諭㫖巻七十三之二硃批王士俊奏摺雍正七年四月二十日署理廣東布政使臣王士俊謹奏爲遵㫖明白回奏事雍正七年四月初二日署撫臣傅泰傳臣入署宣讀皇上諭㫖此呉如譯所奏四摺孔毓珣傅泰王士俊樓儼具摺明白回奏覽呉如譯奏詞儘有不通識見卑鄙處但粤省吏治民情至於如此在傅泰初到且不論外如孔毓珣王士俊樓儼三人受朕格外成全委任捫心自問當如是報朕乎能不汗顔乎乃王士俊反有開礦之請是何意見耶嗣後若再不實心整飭貽悞地方不但法難寛恕亦何靣目立於鄂爾泰田文鏡李衞等數人之列也朕實爲汝等愧之爲粤省憂之奈何欽此臣敬聆之下戰兢悚惶跪不能起謹就呉如譯所奏各欵逐一另摺遵㫖明白回奏外竊念臣一介庸愚居官絶無瞻顧前因招怨被㕘蒙皇上格外保全兼邀擢用感切圖報奮不顧身自署理藩司以來首以澄清吏治愛養民生爲急務訪明屬員中之有玷官箴者俱經詳㕘訪知州縣内有私𣲖者痛加禁革除姦剔弊弭盜安良現在吏皆守法奉公民悉安生樂業臣所自信少可仰酬知遇之隆者惟此實心辦事而已使果若呉如譯所奏各摺是良民盡爲盜賊官吏無不貪婪臣竟同木偶一無覺察辜負聖恩罪已擢髪難數皇上即不立加譴責臣何敢靦顔人世茍且偷生豈僅不堪與於鄂爾泰田文鏡李衞之列亦斷不足列於人類之中查呉如譯所奏四摺不獨原非呉如譯確有所見聞亦並未出自呉如譯之手筆本年皇上鑒賞用呉如譯爲督撫另行厚謝等語臣以呉如譯愚不至此未之深信何意呉如譯竟將遊客之虗詞上厪聖明之顧慮在呉如譯輕率欺罔咎固難辭而臣遥隔天顔未能遽釋皇上焦勞之念不克分憂之罪又奚敢自恕今惟有倍深悚惕竭盡駑駘於吏治民生益加上緊整理以期仰副皇上委任勉勵之洪恩於萬一耳爲此繕摺謹奏覽爾所奏朕心雖覺少慰然究未能釋然而不疑也勉爲之同日又奏爲陳明徵糧積弊事竊照粤東通省額徵民屯糧米三十二萬八千五百餘石儘數支放兵糧康熙五十四年間前撫臣楊琳以各屬有離鎮營窵逺者本色難於解運共改徵折色米二萬一千餘石將價銀㪚給兵丁令其自行採買題允遵行在案其餘之米自應照額仍徵本色解放兵糧因納户艱於運米樂於折銀而經徵之州縣雖借名順從民便其實别有所圖如徴米一石則多收價銀一二錢不等又有米舖與兵丁交結勾通包攬支放每石較諸時値多索錢餘州縣交價於米舖兵丁即向米舖支米及米舖納價於兵丁任其另行買食此粤東之積弊也第州縣存倉穀石於雍正二年間經督臣孔毓珣題定每年春夏二季應支兵米在於存倉糶三穀内碾放俟秋冬徴穀還倉民力自覺寛舒倉穀可免浥爛立法未嘗不善無如州縣貪折徵而得高浮之價並不以倉穀紅腐闗心納户喜折徵而省解運之勞絶不以倉穀霉浥動念且兵丁於米賤時則欲折銀自買冀有贏餘米貴時仍欲按額支米希圖便益止此收放糧米一事難免諸弊叢生臣不敢瞻顧因循遵例嚴飭各屬春夏碾穀支放秋冬儘數徴還并訪有番禺縣米舖黄聲知等八名久慣私收州縣米價包攬射利已經提訊究處餘俟次第整理爲此繕摺奏聞謹奏剔除積弊可嘉之至諸凡但於公誠不欺處勉之汝非未經訓飭初仕新進不知朕者可比朕之是非棄取可以深信無疑復何顧慮之有同日又奏爲㳟報二麥豐收米價日減事竊查粤東本年自春入夏雨水調勻二麥俱收有十分之數早稻將次種畢矣目下米價惟南雄府每石尚需銀一兩一錢至一兩四分不等省城米價每石八錢六七分至八錢不等惠潮肇高等府米價每石更減七八分廉雷瓊三府米價每石七錢至六錢不等臣奏覽雨水米價情形朕懷深慰但敬愼之念毋得一時少懈雍正七年六月十一日署理廣東布政使臣王士俊謹奏為恭謝聖訓敬繳硃批事雍正七年六月初三日臣齎摺家人回粤奉到硃批臣叩頭捧閱仰荷綸音肫摯指示周詳自當事事實心遵行無少隕越臣因愚昧無知前經僃物呈進蒙皇上恩賜訓誡並大學士臣張廷玉傳㫖嚴加申飭臣跪讀再四惶悚靡寧深自刻責伏念臣識見淺陋愧乏寸長遭際聖明倚任擢用臣清夜自思七年外吏所可藉以報奏請開採銅礦捐納墾荒亦止知爲地方起見何敢稍皇上憫臣庸愚開臣茅塞自蒙皇上訓誨一番則臣之識見長進一番臣之愧悔已極臣之感激愈深理合繕摺奏謝聖訓并將奉到硃批奏摺恭繳伏乞皇上睿鑒謹奏覽同日又奏爲營汛乗機搶奪密請敕部嚴加治罪事竊查沿海設汛原以緝盜而廵海兵弁徃徃乗機搶奪如雍正六年八月有福建龍溪縣人徐榜與同伴陳貴等徃噶喇吧貿易而回行至粤東新寧縣黄茅頭海面遭風壞船廣海寨守僃鄧成同兵丁麥興瑞等廵哨至彼撈獲銀錢私分不報且忍視徐榜等危急不救現今起出銀番錢一箱經臣具詳督撫題㕘在案又有香山縣澳門番人月旺踈夏置買納縀銀器等物徃交趾貿易在瓊州府㑹同縣潭門埠下海靣遭風船被打傷該汛百總文秀因何庇官報知即駕小船四隻搬運貨物及上岸時止交還月旺縀八疋銀器五件餘盡侵匿不吐現在檄行瓊州府審確究追臣聞此等惡習凡沿海各省在在皆然既悉情形不敢隱黙理合仰請敕部嚴定加倍治罪之條庶兵弁皆知畏懼而商船可保無虞矣臣謹繕摺密奏伏乞皇上睿鑒施行謹奏此奏甚是候朕另有諭㫖同日又奏爲恭報早稻收成米糧價値事竊粤東春夏雨水調勻田禾茂盛第廣肇二府所屬之南海高要等縣近河田畝俱頼圍基保護每年西省水漲時被衝决五月二十三四等日西潦乍發水勢汪洋南海縣屬之沙利碧岸仁亨花岡黄枝等處圍基俱有衝塌臣即遣南海縣知縣劉庻迅徃查勘督率圩長鄉民堵塞今據劉庶查明西潦未𤼵之前田禾收割將半及水退田乾之後各圍仍有收成臣復加意撫恤委係勘不成災其餘各屬早稻收割將完查通省實有九分十分之數省城米價現在每石八錢四五分各郡之米賤於省城如潮州府屬普寧大埔等縣米價每石止五錢三四分雷廉等府米價每石亦止五錢以至六錢不等理合據實奏聞謹奏深慰朕懷蒙上天優錫豐年獲如此收成當益勉吏治勸導黎元改除囂習共效淳良以期永迓天庥可也同日又奏爲遵㫖據實密覆事雍正七年六月初三日臣齎摺家人回粤捧到硃批諭㫖臣欽遵查得署撫臣傅泰於雍正六年九月二十五日署理撫篆迄今已閱八月餘矣傅泰待臣甚好無所掣肘臣於一切公事無不開誠布公告知傅泰請其主裁奈傅泰胸無定見毫無可否偶有議論亦屬平平傅泰之識見久在聖主洞鑒之中臣未敢以爲髙明也至於屬官之禮節陋規傅泰並未收受年底端陽止收司道食物一二種而已惟訪聞粤海闗新充書辦陳炳文范九錫潘棟髙維新柳大本五名傅泰每名各得銀三百兩方准入冊著役有庫房書辦周瑛經手送繳即此一端傅泰之操守臣未敢信其廉潔也人之立志居心原難窺測然聼其言語觀其作爲已可知其立志之髙下居心之邪正傅泰雖才力未優而志非卑陋雖猜疑太甚而心切公忠傅泰之立志居心臣未敢以為不善也人之辦事敏鈍每視其才具之短長傅泰性拙善忘粤東案牘繁劇未能周知原委府州縣進見時言及錢糧但云你向藩司說言及刑名但云你向臬司說傅泰之辦事臣未敢以爲敏練也凡督撫之統率屬員自當甄别賢否不可少存瞻顧原任廣南韶道林兆惠承辦楠木侵冒之銀甚多督臣孔毓珣因林兆惠係伊保舉之員情願代林兆惠𤼵銀五千兩交庫以爲採運楠木之用臣屢次詳請㕘追完帑乃傅泰竟被孔毓珣愚弄每以事闗欽工不便題明致令侵冒銀兩尚無著落其餘府州縣有貪劣確據者經臣訪明詳掲已陸續糾㕘傅泰未嘗不極力稽查但耳目所寄不得其人事未行而機先露縱無不公之處却有瞻顧之形傅泰之於屬吏臣未敢以爲明决也至傅泰性雖優柔人實謹厚吏才不足而怠惰絶無縁奉諭㫖下詢臣斷不敢一字渉欺一毫狥隱謹據實繕摺密爲奏覆謹奏所奏傅泰之居心行事甚屬公當既然好醜相半猶可徐觀後效如肯立志向上自日有進益若委靡不振則漸沉於汚下矣可推誠協助莫失同舟之誼同日又奏爲奏聞事竊照粤東各道員缺蒙皇上厪念海疆特命李可淳劉運鮒陶正中于其珣等四員來粤補用經督撫將陶正中委署糧驛道李可淳委署廣南聞伏乞皇上睿鑒謹奏覽雍正七年七月二十四日署理廣東布政使臣王士俊謹奏爲恭謝聖訓敬繳硃批事雍正七年七月十四日齎摺人回捧到硃批臣即叩頭跪誦蒙皇上訓勉僃至指示周詳臣銘心刻腑務期竭盡公誠力行㒺懈查粤東人情不甚厚道風俗未敦古處田畝之欺隱頗多富户之慳吝更甚蒙皇上矜憐愚昧昭示津梁諭㫖諄諄通行布告欺隱准其自首富户勸以通融大哉王言如綸如綍臣即轉飭各屬多寫告示勸諭紳士鄉民臣又恐地方遼濶告示未能逐處遍貼遵將兩道上諭敬謹刋刻各刷四萬張分發州縣衞所家諭户曉俾窮鄉僻壤無不周知以仰副皇上立訓之至意合將奉到硃批奏摺一併呈繳伏乞皇上睿鑒謹奏多刋廣布甚好原當如此實力奉行同日又奏爲遵㫖密覆事臣齎摺人回蒙皇上頒示廣東左翼副都統呉如譯奏摺一扣并奉硃諭呉如譯此論據汝意見又謂何如密之少不密非自利之道也欽此臣細訪粤東鹽務本籍素無殷實商人從前聲勢赫奕之埠商半係督撫司道之奴僕盈千累萬之資本盡屬伊主之宦囊今則從前𤼵本行鹽之督撫司道無一在粤久將原本收回家人星㪚現在之商人類皆外省之賈客多則萬金次則數千金僅可勉力拆運無誤餉項而已至於商人承埠必因某州某縣缺商辦課該商呈明督臣先令預完一年之餉方准給帖挨次拆鹽商人雖愚必不肯獨力辦課甘讓當道覇占行鹽取利呉如譯所奏商人辦課當道行鹽之處似亦傅㑹昔年督撫司道行鹽之說而非今日之實事也粤東各埠徃徃乏商承認而道府州縣之親友擕資到粤承埠認商者有之各官幕客積蓄舘金辭幕充商者有之若輩上有禆於國課下無害於民生商人原無一定有本即可承充是亦情理允協無足怪者他如順徳等縣屢次招商無商承認該地方官不得不代爲運銷又有無力運銷之州縣則由督臣撥發帑鹽官運官銷如惠潮所屬之長樂平逺等縣是矣在封疆大吏方且招商之不暇何致反有倚勢奪埠之事呉如譯所奏封疆大吏倚勢奪埠之處似亦影響於官運官銷之說而未得其確實也至於沿海之州縣漁船出海捕魚悉買私鹽醃浸經鹽臣題明增立漁引令漁户買用官鹽埠商給標便於查驗乃漁户貪圖賤買私鹽以致官鹽壅積缺餉無完漁户不領官鹽情願每船一隻幫貼埠商餉銀三錢五分及總督管理鹽政歷經嚴禁飭令漁户赴埠減價買鹽欲使官引多銷則正餉不致拖欠無如私鹽價賤漁户以幫餉甚輕若買官鹽價須加倍故仍有赴埠領標者發給乾標作爲已買官鹽之符劵但乾標止利於買私之漁户而不利於賣鹽之埠商管理鹽政者甚惡此弊亦何樂而縱之也呉如譯所奏沿海標過山標之處事非無據商人既在該州縣開埠賣鹽凡事仰頼州縣扶持不得不按季餽送幣銀冀其照拂臣爲肇髙廉羅道時已將需索商人之封川令蔣文煒詳報於署理布政使時復將署潮陽令藍鼎元列欵掲㕘督臣與鹽法道雖節次禁革恐州縣陽奉隂違終不能一塵不染呉如譯所奏需索規禮之處事非無據臣庸愚陋劣誠樸無欺地方利弊時刻採訪倘此中果有錮弊難破之處臣斷不敢代人隱諱早已奏聞况蒙皇上垂詢八千里之外敢不倍加敬謹小心遵即再三細訪僃悉情由理合據實密覆再前代作條陳賣與呉如譯之趙之璋係浙江杭州人現爲呉如譯欵留署中倘將來出外生事臣當查確訊究合併奏聞謹奏此奏甚屬公當詳明朕已僃悉情形矣曾經詢問史在甲所奏大槩與汝相同同日又奏爲恭報米價事竊照粤東今嵗自春夏至秋雨暘時若通省早稻豐登米價逐日遞減現在各府米價每石自八錢五六分以及五錢五六分不等茲値晚稻又經種畢萬民樂業安生臣當此豐豫之年惟有勸民益加節省仰承天庥再上年九月臣初署藩篆時各屬未買之倉穀尚有二十餘萬石今皆照數買足無虧惟有撥運西穀三十萬石分貯粤東州縣奉㫖動用正項錢糧建造倉厫據州縣紛紛請發蓋倉銀兩臣已詳明督撫按州縣工料之多寡先𤼵銀十分之七檄飭興工建倉貯穀統俟告竣之後委員核實報銷合併奏明謹奏深慰朕懷實可慶幸之事粤東米價減至五六錢近年以來所罕聞者當益加誠敬以仰答上天之慈佑也同日又奏爲奏明稅契贏餘銀兩事竊照民間置買田房産業例按正價每兩稅契銀三分解司充餉之數嵗有常額然常額之外類有贏餘臣經屢飭屬員務將民間舊買田產匿不稅契者悉令投稅并將稅􅆻贏餘儘收儘解已據各州縣將雍正六年及本年稅􅆻贏餘銀解存司庫共有四萬八千四百四十八兩零統俟嵗底彚總詳報月到任以來竭力清查除正項外一切雜項銀兩分爲歸欵充公二條凡有暫不報部而將來必應歸欵者臣即詳明督撫列入歸欵項下有並不報部而將來無項可歸者臣悉詳明督撫列入充公項下今存庫充公之項現有五千餘兩臣檄飭各州縣查報荒地即以此存庫充公之項爲墾荒牛種之需倘有不敷又於每兩提解火耗四分作通省公用項内動支臣於錢糧出入絲毫必加詳慎所有存庫欵項理合繕摺奏聞謹奏覽同日又奏爲陳請復設經歴事竊照各府之有經歴猶州縣之有吏目典史所以僃差遣任首領原爲不可少之員凡各省衝繁大府於經歴之外尚有知事照磨檢校等官即簡僻小府亦皆設有經歴惟廣東通省十府既無知事照磨檢校又將經歴一缺於康熙三十九年盡行裁汰以致知府左右乏人事多遲滯而收放公文惟委諸吏書之手尤爲易生弊竇似應將粤東各府經歴一槩復設庻知府得有首領之員經歴得供任使之責實於各府有所禆益臣在粤巳久頗悉各府事宜深知經歴必不可無故敢敬陳管見伏乞皇上睿鑒施行謹奏此奏是候交部議覆後照汝所請行同日又奏爲密陳各鎮賢否仰祈思瓊郡孤懸海外歷來民弱兵强全頼鎮臣加意防範不偏不黨今施廷專一任兵丁驕悍於營伍地方毫無禆益荷蒙皇上於粤省各鎮之中擇一持重鎮靜者調補瓊鎮自覺人地相宜兵民安戢臣爲海疆起見故敢據實密摺奏聞伏祈皇上睿鑒施行謹奏覽同日又奏爲敬陳管見以廣皇仁事竊照各官有罰俸之處分原所以懲其既徃勉其將來使之勤謹奉公無少隕越法誠善也苐官職有崇卑俸銀有多寡其在州縣以上均有分給養廉即議處罰俸不難措解惟佐貳雜職官卑俸薄一經罰俸措解甚難臣一介庸愚僃員布政使茲値雍正六年錢糧奏銷之際查造册籍奈粤東縣丞吏目典史廵檢驛丞等官從前罰俸之案甚多有在任甫及一年而罰俸已逾三四年者其罰俸銀兩未能解繳復被㕘追臣細訪佐貳雜職向來不無私准詞訟收受以身試法微員各有父母妻孥必需日用衣食按季領俸猶覺餬口艱難倘經㕘罰安有俸銀完解但罰俸原有定例臣何敢冒請變通倘蒙敕部止嚴罰俸之處分停其陞轉免追罰俸之銀兩贍其食用則微員俱有實在之常禄不虞朝夕之無資咸感天恩於無既矣可否採擇伏乞皇上睿鑒施行謹奏此奏是候朕另有諭㫖雍正七年九月十五日廣東布政使臣王士俊謹奏爲恭報米價事竊照粤東天和地潤一嵗兩收早稻登場在於六七兩月晚稻刈穫常在冬間今嵗雨水調勻早稻十分豐收各屬米價逐日遞減現在廣州之米每石價止七錢二三分至六錢六七分不等其餘各府州所屬米價每石自六錢七分至五錢一二分不等至於晚稻茂盛結實一二月内可保豐収粤東近年米價未有賤如今日者此皆我皇上敬天勤民聖徳感孚之所致也理合據實奏聞伏乞皇上睿鑒謹奏歳熟米賤實慰朕懷覽奏不禁以手加額際此豐亨當益加寅畏勉竭公誠整飭吏治以敬迓上天之垂恩錫佑同日又奏爲奏明粤東吏治事竊臣自上年九月奉㫖署理布政使及本年七月奉㫖實授以來屢䝉諭㫖深以吏治爲念臣凡接見郡守牧令諄切勸誡儆劉庶署番禺令龎嶼三水令陶徳燾新安令王師旦政績綽有可觀其餘州縣亦各奉公守法爭自濯磨而奉㫖來粤試用人員以及知縣以下試用之員孫嵃等歷經委署縣篆尤能竭蹶辦公偶有一二不可姑容之輩已被督撫糾㕘如前督臣孔毓珣呂留良牌位於呂留良姦惡敗露後經臬司臣樓儼訊有確據㑹同臣詳明署撫臣傅泰題㕘在案再新任韶州府知府陳鴻熙爲廣州府理猺同知時頗有辦事之才奈自陞授韶州知府以後志得意滿口出大言聞於官㕔内直呼督撫姓名罔識尊卑之分臣又訪得陳鴻熙奉署撫臣委管太平闗稅務苛刻商民其前在順徳縣知縣任署撫經年兢兢自守爲人謹愿性亦和平臣遵奉諭㫖惟有與傅泰同心協力整理封疆斷不敢一念存欺致違多屬清苦臣仰體皇上軫恤微員至意已與傅泰熟商各議給養廉通省州縣所收田房稅銀臣時刻稽查自上年冬季及本年春夏秋三季已有羡餘銀七萬兩零解存司庫微員養廉并修理城垣補建倉厫俱可於稅羡内支用統容詳明督撫另行題請合並奏聞謹奏覽同日又奏爲清查溢額錢糧以增國課事竊照錢糧按畝徵收原屬嵗有常額然於常額之外有縉紳士庶將錢糧欺隱不報者有州縣官吏將錢糧私收不解者縉紳士庶欺隱田地疊奉諭㫖寛展限期准其首報臣遵將諭㫖刋刻印刷分布州縣遍貼村莊俾窮鄉僻壤無不周知但通省地方遼濶伏計諭㫖分布之日已値定限將届之時愚民或恐逾限干咎雖有欺隱之田地仍將畏縮不敢遽然呈首臣懇皇上將粤東一省隱田自首之例再寛限一年容臣徧行曉諭悉令儘數報出則縉紳士庶無復有欺隱之弊矣其官吏私收錢糧侵漁不解者皆係里民呈報墾荒之地畝從前之州縣不行轉報私自陞科年復一年積累溢額多者數百兩少亦數十兩遂爲官吏所朋分而歴來之州縣每將正供已經徵足先扣收溢額之餘銀下剰者抵作民欠之正供在任則續徵尾欠以補解離任即指民欠以交盤粤東錮弊相沿莫知究詰臣深悉原委隨即通飭各州縣將溢額銀兩據實首報不得仍前隱匿侵漁已據番禺香山增城順徳從化東莞等縣俱將溢額銀兩詳報前來臣思官吏侵蝕錢糧法固不容寛假但事久年深官經屢易勢實難於追究仰懇皇上洪恩恕其已徃私收之罪緩其將來數月之期統俟各州縣陸續報到臣於嵗底彚詳督撫題明歸入正項一體徵解則國課有加田糧無隱清查既力流弊自除矣合先繕摺奏聞伏祈皇上睿鑒謹奏是彚詳督撫具疏題請候㫖遵行可也同日又奏爲敬請添設廵道以資兼轄事竊查粤東肇高廉羅道管轄肇高亷三府羅定一州駐劄肇慶雷瓊道管轄雷瓊二府駐劄瓊州肇慶密邇省城原不需道員駐劄因督臣移駐肇慶兩司俱在廣州肇慶留一道員聼候督臣批審事件必不可少但自肇慶以至高州水陸計十有餘日自亷州以至肇慶歩行亦需二十日幅員遼濶呼吸難通肇高亷羅道之不能兼顧高廉其實勢所必至雷州雖爲雷瓊道所管轄奈雷州在海之北瓊州在海之南中隔大洋風信靡定猝有緊急公文傳遞阻滯雷瓊道之不能兼顧雷州更屬顯而易見雷州僻處海濱與交趾接壤爲粤東要地高州居雷廉二府之中僅有總兵彈壓兵弁而無敵體之廵道同城共事公務莫與咨商其勢甚孤臣請添設廵道一員駐劄高州府即以高雷廉三府州縣隸其所屬名爲高雷廉道改肇高廉羅道爲肇羅道仍駐劄肇慶改雷瓊道爲海南道專轄瓊州則海南道鮮海洋遥隔之虞肇羅道無鞭長不及之慮而高雷廉道得居中馭近之宜矣抑臣更有請者惠潮道駐劄潮州接連閩省山海交錯闗係非輕應與添設之高雷廉道及改設之海南道俱加兵僃道職銜庶兼轄兵民益足壯監司之聲望協和文武自能弭盜賊以潛蹤臣敬陳管見可否採擇伏乞皇上睿鑒施行謹奏此奏甚是即具詳督撫㑹商題請可也朕意便將爾此摺交𤼵部議自必仍以飭行該督撫查議奏覆徒致躭延時日莫若爾徑詳督撫較爲速便同日又奏爲敬陳黎峝情形事雍正七年八月初四日廣東提臣王紹緒遵㫖齎奏摺示臣臣恭設香案望闕叩頭捧閱内有奏請於瓊州黎人五指山開路一摺欽奉硃批臣跪讀之下凜懼悚惶仰見我皇上訓誨諄切籌畫周詳日月照臨無微不燭臣於雍正四年三月署理瓊州府篆抵任之初亦以黎人聚居境内恐有事端及細察情形始知黎人雖極愚蠢無不感激聖恩如花梨貢木產自黎峝深山地方官每年採辦黎人砍木運送奔走維勤此即奉公守法之明驗也瓊州孤懸海外環延二千餘里其中爲五指山路徑﨑嶇四圍約有五百餘里府屬三州十縣分列海濱瓊鎮總兵官駐劄郡治副將統率水師逰廵海靣各營汛星羅碁布防守黎口水陸控制在在得宜黎人或以數十家為一峝或以數家為一峝藉五指山爲依棲之所附近州縣者為熟黎一體輸糧納課僻處山中者為生黎力作謀生今日之熟黎何莫非昔日之生黎則今日之生黎自必為後日之熟黎漸摩以仁義並濟以恩威蠢爾黎人悉與平民無異今提臣王紹緒奏請於五指山開路識量殊屬淺狹夫天地之大何所不容我皇上澤沛遐方仁覆萬物凡在海隅日出之區無不誠心悅服况黎人近在瓊州内地伏息山間謹守法度毫無過舉使必欲鑿山開路致令無地安身殊非仰體皇上民物胞與之至意也臣曾在瓊三月深知黎峝情形理合據實奏聞謹奏朕一覽王紹緒之奏便覺其所論不恊故發來與爾等看閱今爾所見甚屬可嘉於情於理應如是者雍正七年十一月初十日廣東布政使臣王士俊謹奏爲恭報收成米價事竊照粤東今嵗早稻豐收之後自夏末以至冬初雨暘時若田禾茂盛逈異常時茲據各府申報晚稻収成分數俱有十分九分八分不等現在各屬米價每石自七錢起至五錢三四分不等再本年九月十六日惠州府呈送河源縣所産嘉禾一莖三穗四穗以至六穗者共四十八本到臣伏查粤東濱海之地水鹹土瘠非中原沃壤可比今產此嘉禾耆老士庶皆以爲目所未見歡呼載道衆口同聲良由我皇上重農貴粟而四郊屢慶豐年敬天勤民而百粤遂呈異瑞臣私心欣忭惟有與各屬倍加敬慎共期息事寧人撙節愛養以仰副聖主子惠元元之至意理合繕摺奏聞謹奏欣悅覽之向日粤省米價常昂於直省今嵗平價惟粤東爲第一實屬希有當愈勵敬畏之念以仰承天庥不可少肆心志失於放逸也勉之同日又奏爲奏明定弓虛稅事竊照田地按畝陞科原無虛設之稅其或水衝沙壓有稅無田一經地方官查勘確數應請督撫具題豁免從未有因本縣之錢糧缺額將他縣之陞科移抵借端隱占牢不可破如南海縣之定弓虛稅者也臣僃查南海縣地畝自萬歷九年清丈不知何故冊載缺額田二千四十二頃零六畝有竒該銀八千二百七十五兩四錢七分向議每畝加銀一分六釐四毫以足原額此定弓虛稅之由來也行至萬歷四十六年又議將廣州府屬香山等縣新報荒坦起徵銀兩移抵南海縣虛稅至今猶遵行之約計香山等縣歷年陸續詳報墾荒移抵之銀共六千九百九十二兩九錢九分零南海本縣歷年陞科自抵之銀僅三十三兩四錢九分零尚有未抵虛稅銀一千二百四十八兩九錢九分零縁雍正七年有畨禺等縣首墾起徵銀二百九十二兩零奉署撫臣傅泰批行准抵南海縣虛稅臣即轉行南海縣知縣劉庶查明抵補隨據劉庶詳稱本年未抵虛稅一千二百四十八兩九錢九分里民有全完者有完將過半者臣以里民既經全凡匿不陞科者悉飽豪强之貪壑情弊顯然臣極知南海縣實無虛稅因令劉庶徹底清查有實在缺額者即爲詳免委係隱匿者勸諭自首并將歷來香山等縣移抵之銀六千九百九十二兩九錢之田糧自出雖清理在一邑而闗係在通省合先僃悉奏明伏乞皇上睿鑒謹奏此奏嘉是覽之若爲除弊起見乃極善之舉若爲増額則小矣哉粤省民風惟利是圖凡闗興利之舉極當詳慎設居心行事未能令吏畏民懷雖具有公忠之心不能敷補救之政也此治粤之第一要訣知之觀郝玉麟自到任以來惟以清楚錢糧爲要務朕巳批諭訓誡矣如有太過處汝可盡力規諫之不妨將朕此諭作汝意微露令伊知之汝等督藩之間或當逺嫌不便通知則可不必同日又奏爲清查冒領㑹試銀兩事竊舉人赴京㑹試給以盤費銀兩原係皇上作養人材之至意伏查粤東㑹試文武舉人每科動支正項銀一萬四千四百四十餘兩每人給二十兩零以爲公車之需但從前每科請咨領銀者不下七百餘人而到京㑹試者十無五六皆由庸陋舉人無志上進惟借㑹試名色俱在本省混請咨文以爲冒領之計及領有盤費不復進京㑹試止於所領盤費之内扣銀二三兩連咨文印批交託實在㑹試者赴部代投并代領回批寄付本人収執以爲曾經㑹試之驗積弊相沿科科如此茲値庚戌科㑹試伊邇通省舉人赴臣衙門請咨者甚多臣不得不按名起送然錢糧分毫爲重難容虛揑花消仰懇皇上敕令禮兵二部俟㑹試之後將文武舉人入場名姓查照點名冊行知粤省如有並未㑹試之舉人冒領盤費銀兩即可追回貯庫庶㑹試無假揑之弊而盤費無冒領之人矣臣從愼重錢糧起見不敢瞻狥容隱伏乞皇上睿鑒施行謹奏此奏雖是但事屬𤨏屑朕不便特降諭㫖該部自必行查直省以杜冒領之弊同日又奏爲據實密奏事竊總督乃通省大吏必須除暴恤商道員爲各郡監司自當實心辦事廣東督臣郝玉麟語言便㨗人似精明到任後未能深悉土俗民情將按察使臣樓儼起出私藏軍器積惡窩盜之黄元㨗提至肇慶竟行保釋將黄元㨗之壻蕭明出示招告治以重罪蕭明素非善類固屬法不可寛黄元㨗係窩盜巨兇安可置而不問况粤民健訟自奉招告之明示無不揑詞赴訴未免頓長刁風又粤東鹽埠各商先完課而後拆鹽故鹽雖未即俱銷而課實無掛欠乃督臣欲將各商歷年完課之鹽埠悉歸州縣賣鹽收其餘利彚積歸公臣以埠商完課在先不便無故驅斥且州縣徵收皇上不加譴責而臣心委難自恕者也至於粤省各道共見者王璠昨日自瓊至省臣問以楠木多寡則未知確數詢以屬員賢否則無一深知人雖老實而才具平常似難勝海疆廵道之任再廣東學政奏舉凡密奏之事闗汝利害不輕臣不密則失身一語當時刻誦之少不謹密貽悔無窮至於擅作威福純臣賢士斷不出此若不深計利害是非或致輕忽洩露則為躁妄之人把柄被人所持雖百喙奚辭其咎愼之愼之新授觀風整俗使焦祈年乃一派天良忠誠端正人也到粤時可與之和衷共濟將地方民情風俗官常吏治一一僃悉告之彼此互相協助莫負朕之諄諄諭㫖同日又奏爲審明假冒道員事雍正七年十月初六日督臣郝玉麟㨿肇慶府并高要縣審詳廣西臨桂縣撥役護送口稱候補副使道之梅廷馥檄𤼵到臣即㑹同按察使臣樓儼逐加研訊縁梅廷馥即鍾肖尼係江西安逺縣無頼之徒昔年流蕩京城在原任詹事府少詹事梅之珩寓所代寫名帖後即竊其康熙甲午科典試江南同榜録一本帶徃江浙福建冒認梅之珩之子假充辛卯科舉人於本年六月内前赴廣西又假充候補副使道揑稱奉㫖同前任撫臣楊文乾徃福建盤查倉穀在於廣西省城用紅心坐褥戴珊瑚帽頂拜㑹兩司肆行無忌迨瓊州府同知李逹徳運送楠木路過桂林僃言閩省盤糧並無梅廷馥其人而廣西各官猶畏其聲勢莫敢過問惟遣役送至肇慶潛居高要縣監生黄廷蕚家被保長赴縣首報彼時鍾肖尼仍穿蠎袍仙鶴補服至督臣衙門官㕔内高坐旋經肇慶府查審不吐實情及臣庭訊之下加以三木方將前情一一供出臣即將鍾肖尼押𤼵南海縣監禁僃録供詞詳請督撫具題嚴究所有臣審明假冒道員情節理合奏聞謹奏覽奏甚屬可嘉類如此等姦匪不法之徒何地無之原當不時留心訪察一有發覺即行拏究盡法懲處以警將來地方大吏果肯人人如此秉公除惡姦匪安敢不斂跡潛蹤有益於世道民生也大矣勉之同日又奏爲奏聞事竊照粤東額徴民屯糧米原以支放兵糈縁小民憚運送之勞樂於折色州縣貪高浮之價止愛收銀從前並不遵照定例將存倉穀石春夏碾支兵食秋冬徵穀還倉臣前經繕摺奏聞隨嚴飭各屬不得私收米價邇來州縣類皆徵收本色但粤省兵丁於米賤時俱欲折銀以得多餘價値於米貴時必欲支米以圖升斗無虧積弊相沿習爲故智今嵗早晚二稻俱極豐收米價甚賤州縣惟以本色支放不敢折給價銀兵丁每有口出怨言欲誣揑有司以洩其憤又如粤省錢糧火耗徃年名爲加一五六實有加一七八仍於火耗之外事事泒累里民彼時同城武弁得以私泒重耗挾制文員以致武員說情受賄文員勉强聽從今嵗火耗已經奏明每兩錢糧加耗一錢六分奏銷刑名二項部費另加耗九釐此外並無絲毫雜泒官皆守法民無他累乃武弁不能復以州縣爲利藪每於修葺營房墩臺等項百計苛求甚或教唆副將誑禀督撫臣亟期料理地方協和文武斷不使胸存芥蔕少有參差皇上聖明無微不燭臣不敢代爲隱諱理合據實奏聞謹奏近日朕經降有諭㫖此奏未免粉飾之詞汝似因有所聞而云云朕於此不能無疑也同日又奏爲密陳管見事竊查粤東提鎮恊營朋扣銀兩一事向於領餉時不分水師陸路武職每員每月扣銀二錢馬戰兵扣銀一錢歩戰兵扣銀五分歩兵扣銀三分彚存司庫遇有營馬倒斃該弁詳明督臣赴司領銀買補此係粤省之成例臣思各標鎮恊營内惟馬戰兵始有馬匹今於陸路官兵名下扣留買補馬價固屬至當乃於無馬之水師官兵亦按月扣存兵餉以添陸路買馬之需似未妥恊况水師除報部船隻之外每營尚有内河槳船八九隻不等遇有破爛並未聞陸路兵丁相幫修造之員俱自奉㫖之日截支俸薪即業經領過者亦必按數扣追惟俟接劄到任之日方准起支此亦粤省之成例伏思武職自奉㫖陞調及至接領劄付其間或隔月餘或經兩月有竒均未可定未經接劄之先該員尚在本任辦事倘有盜案踈防仍然㕘處辦一日之事自應食一日之俸乃辦事如故㕘處如故而俸薪以奉㫖之日預爲截支不復給領能無枵腹辦事之慮似應請照八旗之例凡有武職陞遷調補其俸薪銀兩統於離任之日截支庻營旗無所互異而食俸皆可畫一矣臣敬將管見密奏是否可行伏乞皇上睿鑒謹奏武職俸薪截支之議甚是觀汝粤省文武不甚協和朕將汝此奏連名發出令武員聞知因此或發感汝之心與地方殊屬有益候㫖可也硃批諭㫖卷七十三之二欽定四庫全書硃批諭㫖巻七十三之三硃批王士俊奏摺雍正八年正月初二日廣東布政使臣王士俊謹奏爲據實奏聞事竊粤東上年早晚二稻通省豐収米價逐漸平减臣業經繕摺奏聞今自冬入春米價平减如故二麥早已布種四野一望青葱較諸徃年更爲茂盛再粤省各州縣錢糧歷來封印時徴解司庫通計不過五六分之數臣查雍正七年分錢糧花户輸將踴躍已完納八分有零今嵗開徵後即可全完合並奏聞謹奏朕前諭甚明但不可少肆心志敬以處之自蒙天鑒同日又奏爲書役藉勢横行密請嚴禁事竊各衙門設有書役所以供抄寫僃差遣易姓名替換承充盤踞既久百弊叢生臣自任事以來逐一點驗年滿者悉行革退犯贓者枷責押追痛戒招揺嚴加約束現在書辦封鎻辦事衙役歴各省每見督撫司道之書役狐假虎威無惡不作然司道之書役猶恐督撫訪拏稍知畏懼惟督撫之書役恃勢横行毫無顧忌兇惡不能枚舉書辦有内外班名色内班經管案件外班傳遞消息朋比爲姦種種索詐飽其貪壑則改重爲輕拂其所欲則批駁不已至督撫衙役有承舎旗牌等名色各役皆自號爲差官即督撫給票差遣票内亦寫差官某人字樣由是通省吏民無不以差官目之平日巍坐班房包攬詞狀俟府州縣謁見督撫時彼即囑託濫准枉斷稍不遂意即妄肆萋菲及差徃他處則騎馬乗轎沿途拜㑹州縣收下程而折夫價若輩或以小惠小信趨奉督撫因委其察訪屬官事跡益沾沾自喜故意聲揚以賄賂之重輕定屬員之賢否大抵書辦舞文弄法差役縱肆婪贓各省皆然臣知之最確因敢密請諭㫖通加嚴飭庻書役知所警戒而吏民得免欺凌矣伏乞皇上睿鑒施行謹奏所奏未嘗不是朕姑發諭一道通行誡飭試看但恐亦屬無益果遇督撫精明不待朕諭自能約束如遇昏懦者此輩吏胥之舞文作弊猶輕道府州縣之貪婪不法為害更甚從未有賢督撫能率通省屬員而不能拘管本署胥役之理今此之諭亦不過令直省咸知朕已洞悉此事耳有治人無治法不得其人亦無可奈何之事也同日又奏爲奏聞事雍正七年十二月初八日臣聞督臣郝玉麟於本月初五日半夜時遣撥㕘將守僃帶兵五百名前徃肇慶府恩平縣臣以督臣連夜𤼵兵必有意外之警當即遣役探訪消息隨於初九日據署恩平縣知縣姚孔鋅報稱在於該縣土瓜蓢地方拏獲姦匪六名搜獲黄綾令旗九面内四幅寫楚震公三字一幅寫羅平二字黄綾僞劄九張内五張塡有總兵李昆玉㕘將劉國敬梁高陞藍登其呉建晃姓名職銜白綾僞劄四張内二張塡寫副總李士貴㕘將朱榮姓名職銜編列五千二三百等字號等情到臣後於十二日春江協副將陳顯禀報署撫臣傅泰内稱風聞恩平地方有姦匪萌動差兵丁誘出温亞七投首供出頭子李六軍師李先生約定十二月初二日搶恩平纔搶陽江等情又㨿恩平等縣陸續拏獲供黨梁子賓等五十四名解赴督臣衙門押𤼵肇慶府收審傅泰亦遴委南海縣知縣赴肇公同研訊據各犯僉供係李梅即李先生名李贊韜又名李世信與陳京幹做劄分散李梅先稱陽江縣太平地方有銀一坑伊有術可取及取銀不驗乃稱交趾有李九葵聚集六十萬兵馬十月裏就到廣西年號歸化劄付從李九葵領來又供有一人生辰八字俱是壬寅今年八嵗現在交趾山西陜西福建廣西各省都有劄付又供臺灣朱一貴之子朱三太子在交趾小西天已出到巫山有幾十萬人不乆有大兵來并有瘟疫鬼魅若領其劄付不怕瘟疫兵鬼又供廣西大倫地方有文姓之兄在陜西要圖大事招兵二十五萬從廣西就到廣東楚震公是文姓之弟軍師是和尚智開能使法術等語種種口供甚屬支離臣未敢信以爲實又據各犯供稱領他旗劄怕有兵疫好保身家並非想要做官李梅賣劄一張要銀三兩或索錢數百文李梅身帶木印一箇黄綾數幅有人領劄就塡寫賣給質諸跟隨李梅之蘓子卿亦供稱小的向雇與李梅挑包袱賣藥看地理十月跟他到陳京幹家見他做旗做劄想騙人家錢財等語至十二月二十七日據南海縣報稱審據李梅之壻區在台堅供十一月初七日跟隨李梅到陳京幹家說要散劄騙人小的說散劄是犯法的事做不得李梅說只要弄得人信哄得銀錢就好你替我塡寫何妨小的無主意就塡寫了三十多張那些三千幾百的號數都是虛寫哄人月分是倒塡七月的又供那陜西廣西交趾許多兵馬都是李梅講的大話沒有一點影響無非聳動人騙銀錢原無憑據的那木印是李梅自巳篆寫的等供在案臣初聞恩平縣起獲劄付之日即知爲不過借劄騙錢之計大凡逆賊結黨爲匪其聚衆必有巢穴軍器必有鎗刀且必畜養馬匹堆積糧草四者缺一不可臣訪知李梅原充東安縣書辦犯事革退常以賣藥爲生茲細按各犯供情李梅散劄騙錢之原委歷歷如繪而梁子賓等分居各村皆自本犯各家拘獲無一竄聚賊巢器械馬匹毫無所有明係李梅私造旗劄造言惑衆誠可不動聲色而消除者矣今各犯已吐露實情兵亦撤回百姓安居如故各縣挨查甚力實無匪類潛藏是可仰紓皇上南顧之憂也臣當此訛言之後倍加防範嚴飭各府州縣上緊緝拏李梅推訊情由盡法究治必不敢少有踈忽上厪聖懷合先繕摺奏聞伏乞睿鑒謹奏諸如此類常將小事作大事觀切不可失之輕忽地方姦匪之為害生民烈於盜賊當時刻留心察訪稍有影響隨即跟究毋存姑息省事之念而使滋長蔓延也譬如呂留良輩皆因地方大吏聾瞽踈慢致令數十年公然肆行無忌是當深以為戒封疆大吏常以防未然三字一日三省可也誌之同日又奏爲奏明事雍正七年九月十五日臣遣家人齎摺進呈用摺匣二箇一裝奏摺一繳硃批及十二月初一日臣家人齎摺回粤僃言十二月二十日蒙皇上𤼵回摺匣二箇一係空匣未鎻遵即敬負背上雇騾起程不期行至江南廬州地方氷滑騾驚墮跌路旁未知摺匣有無傷損等語臣恭捧細視惟空匣鎻内跌下銅鈕一小塊理合據實奏明並將原匣及跌下銅鈕呈繳途間氷凍墮騾固屬家人踈忽然臣未能慎擇罪戾甚深日夜悚惶望天叩籲伏乞皇上俯賜寛宥另賞臣摺匣一箇頂沐洪恩於生生世世矣謹奏路途遥逺安能常保無虞此細事也何須如是驚惶朕深惡過甚之虗文向後不可雍正八年二月十六日廣東布政使臣王士俊謹奏爲恭報米價事竊照粤東徃年時値春間米必稍貴今自正月以來米價日减現在廣州府米價每石六錢四五分至六錢一二分南肇二府米價每石七錢至六錢一二分其餘各府州米價每石六錢至五錢二三分不等通省米價甚賤小民餬口有餘兹二麥徧野青葱雨暘時若臣當此盈寜之候益存兢惕之心仰體聖主足食安民重農積穀之至意諄諄勸諭士民隨時節儉常念稼穡艱難永樂昇平豐裕所有粤東現在米價理合據實奏聞謹奏粤東米價如是平減實屬罕聞惟當愈加敬畏從事絲毫無懈時自檢點也同日又奏爲敬陳推廣良法事竊州縣城内設有鄉約朔望宣講上諭遵行已久雍正七年閏七月内又經大學士公馬爾賽等議令各州縣於大鄉大村人居稠密之處俱設鄉約之所於舉貢生員内揀選老成有學行者一人爲約正再選樸實謹守者三四人以爲値月每月朔日齊集鄉之耆老里長及讀書之人宣讀聖諭廣訓闡明大義詳示開導務使鄉曲愚民咸生孝友敦睦之思置徳業可勸者爲一籍過失可規者爲一籍每月朔日先讀聖諭廣訓抗聲宣講約正推說其義剴切丁寧講畢於此鄉内有善者衆推之有過者値月糾之約正詢有實狀命値月分别書之於籍嵗終考校其善過彚冊報於縣官縣官設爲勸懲之法有能改過者一體奬勵已奉俞㫖通飭遵行在案臣因思記過之籍第可爲鄉村守分農民偶有過犯而設若素非善類及曽爲盗賊者月朔不來聼講約正無可糾繩是亦不可無法以處之今大鄉大村既設立講約之所臣請於約所之側令州縣各竪一木榜開列鄉村姦盜詐僞干名犯義有傷風俗現今犯法治罪之姓名於榜上俾鄰里宗族皆得直指其非以啟其愧悔之漸倘一年之内該犯果能深自刻責毫無過舉即著約正値月報明州縣去其榜上姓名予以自新以視置籍記過更覺彰明較著實於地方不無裨益臣因設立約所而推廣良法是否可採伏乞皇上睿鑒施行謹奏此不過小試行道之端他省亦有照此行之者若夫姦盜詐偽匪類欲以木榜書名感發其愧悔之心恐未必能然朕意果遇強横不法之輩鄉里必不敢書其名以籍其罪無非將良懦鄉民之小過塡寫一二以塞責而已雖屬有名無實之舉然亦係有益無損之事何妨試行但恐徒為百姓之笑具耳同日又奏爲敬陳管見事竊臣奉廣東督撫牌文准雲貴廣西總督咨商據廣西梧州府知府袁璣詳請將廣東肇慶府屬之封川開建二縣歸入梧州府等因臣思普天之下莫非王土封川開建或隸肇慶或隸梧州同爲皇上之疆域何分彼此但𡊮璣欲將封川開建二縣歸入梧州者以梧屬之蒼梧懷集二縣與肇屬之封川開建二縣田地村鄉犬牙相錯故詳請歸入梧州其說近是臣查梧州與肇慶接壤自梧州順流而下一日一夜可抵督臣駐劄之肇慶再經一日一夜可抵撫臣駐劄之廣州若由梧州以至廣西省城非隔十餘日不能即到程途相去逺近懸殊倘蒙聖裁將肇屬之封川開建二縣歸入梧州將廣西之梧州一府改隸廣東則公文徃來呼吸可通去逺就近莫有便於此者其梧州府所收落地稅羡銀兩按數移解廣西藩庫以充西省各官養亷於西省究無所損臣前請添設高雷廉道一員改肇高廉羅道爲肇羅道一摺欽奉硃批遵即詳明督撫題達在案今梧州府如改隸廣東自可歸肇羅道兼轄至於廣西蒼梧道管理通省驛傳鹽法原應駐劄桂林不須分守蒼梧臣從因地制宜起見故敢敬陳一得之愚是否可採伏乞皇上睿鑒謹奏此奏事闗兩粤候諭兩省督臣㑹商奏覆有㫖同日又奏爲修輯省志事竊各省志書每多殘缺於雍正六年十二月奉㫖重加修輯臣奉文之後隨即轉行各府確查舊志未載事蹟并於所屬紳袊之内每府選擇一二人送至省㑹設局纂修但恐本省紳袊不無狥私情弊必於外省聘一素有學行者總理大綱庻事無闕濫而責有專司茲有翰林院庻吉士浙江人魯曾煜康熙六十年與臣㑹試同榜臣知其人品端方學問淹貫向因伊祖母年逾九十父年亦有六旬蒙聖祖仁皇帝恩賜回籍侍養今其祖母已故父尚強健况有二孫俱經成立非家無次丁可比臣商之署撫臣傅泰遣役徃接魯曾煜到粤給以脩脯令與粤省紳袊悉心考訂修輯志書容俟告成之日恭呈御覽合先奏明謹奏修輯志書一事直隸各省殊覺過於遲延當速行辦理為是同日又奏爲請禁私賣制錢事雍正七年八月雲南撫臣委員運送新鑄制錢二萬串到粤臣觀銅色黄亮錢文厚重與粤東舊錢逈異隨於各營兵弁赴臣衙門領餉時即將銀七錢三發給領回均勻撘放庻否狡飾容俟縣府審明擬罪伏查新鑄制錢一千文約重九斤餘兩每制錢一千價止紋銀一兩以一兩之錢價可得九斤餘兩之黄銅照黄銅時價可賣銀一兩四五錢如打成煙袋即可數倍其値錢價賤而煙袋貴姦民貪利違禁恐不僅劉昂霄已也臣一面出示嚴禁一面詳請督撫將黄銅打成煙袋者悉令地方官照收買黄銅器皿例給價俱經各營兵弁領回本應按名分散何故盡歸舖户之手此中顯有兵弁增價私賣情弊雍正八年正月臣奉署撫臣傅泰牌文准瓊州鎮總兵李順咨稱有左營外委周維經奉差赴省領出制錢竟敢動用私賣浮開侵利實屬不法等因轉行到臣雖周維經未曾供明將錢賣與燬化之舖户然此亦兵弁私賣制錢之確證制錢撘放兵餉各營俱有領出私賣恐不僅周維經已也理合仰懇諭㫖嚴禁俾武弁知所畏懼不敢私賣制錢而姦民無從收買自不能將制錢燬化矣伏乞皇上睿鑒施行謹奏朕不解汝意何居憑何降旨今既銀錢兼撘與兵而禁其易賣與民令其惟行使於營伍中耶自省領錢歸汛或慮質重易銀以便攜帶就中少圖微利亦人情之常今必揆其賣與燬錢之舗户乃不揣本而齊末之論也如果姦民竟敢大開爐座燬壞制錢則汝等地方大吏所司何事此奏不明亦且不當同日又奏爲密請聖裁事竊沿海額設戰船各營兵弁依期乗駕廵海其或遭風壞船即按原定工價動帑修造若非因公事出海壞船責令該營賠補此厯來之成例也嗣因廣東龍門恊副將景慧渡海考驗并該協把總謝廷彥率兵廵海被風飄沒奉諭㫖凡官弁兵丁若因公事差委遭風受困者當照軍功加恩倘有不幸至於身故者當照陣亡之例優䘏著九卿分别詳細定議具奏景慧謝廷彥及兵丁等應如何加恩之處一併議奏欽此隨經部議景慧謝廷彥案内被飄身故之兵丁照軍功陣亡例每名䘏銀五十兩被飄生存之兵丁照軍功頭等傷例每名賞銀三十兩俱經照數支銀䘏賞在案此實我皇上矜憫沿海兵弁特賜䘏賞之至意其實係遭風身故之兵弁叨荷䘏典自屬允宜第慮無頼營兵視聖主之洪恩爲射利之㨗徑或値行船擱淺偶爾擦傷或船已停泊近岸撞碎是皆駕船不謹之故原應令其賠補而船内兵丁惟恐修賠反揑人船飄溺各營代詳請賞甚有將戰船暗地毁損希圖朦混邀賞者如雍正七年五月内龍門協把總張賓帶兵三十名廵至象骨沙船被風浪打壞據報把總兵丁均扶篷登岸無一身故又雍正七年閏七月内香山協把總陳秀帶兵六十名廵至蜘洲離岸里許船被翻溺淹死兵丁三名餘盡生存同日百總徐禧帶兵一十八名護送鹽船兵船被風打壞人俱登岸生存屢奉督臣飭令按名詳請給賞在督臣照例而行非爲過舉臣職司出納不得不慎重錢糧竊思張賓等兵弁三十餘名悉可扶篷登岸則非受困可知陳秀等遭風處所離岸頗近則非難於登岸可知使不分别遭風受困情形槩行賞銀三十兩其中保無借端混冒者乎臣請嗣後除遭風身故兵弁仍照例優䘏外其有雖經被溺俱獲生全者可否免其給賞庶冒領錢糧之弊可除而兵丁希冀之念自息矣臣密陳管見伏乞皇上睿鑒施行謹奏所奏甚是朕初意亦恐有冒領之弊但念此係格外特恩舉行之始兵弁必將感奮思報何暇作弊孰知小人無良輙敢如是殊屬可惡亦屬可笑之至另有諭㫖頒發同日又奏爲遵㫖密舉幹員事竊臣於前奏爲㨿實密奏事摺内奉到硃批現在粤省如有能勝監司之幹員其密奏以聞欽此臣在粤多年於各官之賢否留心訪查觀其人品考其吏治實有可信者惟廣州府知府呉騫老成練逹才守兼優瓊州府知府宗思聖勤勞辦事廉潔自持俱能勝監司之任更有南海縣知縣劉庶理繁治劇潔已愛民委屬幹員足勝省㑹郡守之任夫薦舉人才原臣子職分所當爲第恐不加詳愼知之未確或微露其意於所舉之人以存掠美市恩之念非渉於交結即失之粗踈臣斷斷不敢出此凡臣之一切敢不謹而又謹密而又密以凛遵諭㫖諄切之至意謹奏覽同日又奏為聖徳覃敷生黎誠服事竊粤東瓊州五指山係黎人羣處之地黎分生熟二種自秦漢以來生黎並未輸糧入籍我皇上洪恩徧及遐方是以生黎莫不傾心向化雍正七年十二月據瓊州府知府宗思聖詳報崖州生黎王那誠等男婦二千三百七十三名口瓊山縣生黎符天福等男婦二百二名口定安縣生黎王天貴等男婦六十七名口陵水縣生黎那萃等男婦二百八十六名口開明户籍或願輸將糧米或願完納丁銀各懇附入版圖臣已轉詳督撫題達竊思黎人不讀詩書茫無知識乃上年恭逄萬壽黎人入城叩祝採辦楠木黎人踴躍運售黎長復願代買此實亘古未有之事本年正月内値該府宗思聖到省臣將所餘養廉銀在省城買布八百疋面付宗思聖囑其分給採辦楠木之黎人又製理合奏聞謹奏黎人向化欣悅覽焉同日又奏為據實陳明事雍正八年正月初十日臣奉署撫臣傅泰檄開奉上諭有人條奏内稱廣東諸務廢弛弊端種種因提解耗羨而火耗轉致加增因清查稅課而有司轉行苛索因禁止私販而漁户並受苦累是以朕愛養百姓之善政而奉行顚倒以濟貪營巧取之私置除暴安民移風易俗之政於度外該省從前督撫受朕倚任之重身在地方焉有朕已聞知而伊等漫無覺察之理郝玉麟傅泰到任未久向後宜整頓經理勿蹈前轍此㫖到日著悉心確查嚴行禁約倘不肖有司仍有不知悛改者叅革拏問請㫖正法如督撫等再有狥隱失察等情經朕察出定行從重治罪特諭欽此臣捧讀至再兢惕悚惶伏思我皇上宵旰勤勞勵精圗治諭㫖頻頒諄諄告誡臣猥以陋劣職任藩司自到任以來圗報情殷錢穀固屬專司在在條分縷析即凡臬司經管之賭盜糧道經管之糧米鹽道經管之鹽政茍有所知亦必力爲整理每念海疆重大辦事宜勤倘欲避嫌疑分彼此未免因循拘泥有誤地方臣素無瞻顧痛絶交情早作夜思總期無負皇上知遇今如條奏内所稱火耗全行提解兵米盡收折色漁人增餉數倍稅務嚴加剥削及盜賊公行賭具仍賣等語俱屬摭拾無憑事跡任意冒陳毫無實據茲奉到諭㫖倍加敬畏務期除暴安良移風易俗嚴飭各屬奉公守法剔弊釐姦且共存知過必改無則加勉之心以仰副皇上訓誨諄諄至意為此繕摺奏明伏乞睿鑒謹奏但望如是果若所奏乃朕求之而不得者同日又奏為恭謝聖訓敬繳御批事雍正八年正月二十七日臣齎摺家人回粤奉到硃批臣即恭設香案望闕叩頭敬捧跪讀蒙皇上訓誨周詳無微不到臣感激天恩銘心刻腑伏念臣與武臣原無不相和睦之處第粤東武職厯來或向知府包攬漏稅或向州縣囑託求情視若成規恬不為怪臣屢飭各屬痛革弊端遂為一二武職所不喜因以臣勤謹辦事則指為過於急􅏥以臣毫不狥私則指為擅作威福臣聖裁原不敢邀恩市美乃蒙皇上呼臣姓名特頒諭㫖欲使武職知臣奏請情由皇上憐臣孤立凡所以保護而矜恤者甚於慈母之撫嬰兒臣若不仰體宸衷協和文武尚足與於人類乎至於督臣郝玉麟語言明白人亦誠實縁到粤未久不能因地制宜一切施為似欠妥協茲奉硃批令臣盡心協助臣惟有欽遵諭㫖務竭愚誠以盡贊勷之道以期無負皇上諄諄教誨之洪恩於萬一耳所有前奉硃批奏摺理合呈繳伏乞睿鑒謹奏覽奏俱悉勉之雍正八年四月十一日廣東布政使臣王士俊謹奏為恭報二麥豐收米價平減事竊粤東沿海各府地土滋潤民間種麥者十有六七近山各府間有沙磧種麥漸少本年入春以來雨暘時若沿海之廣惠潮三府二麥收穫俱有十分其餘各府州有九分八分不等現在通省米價每石自七錢三四分至五錢一二分不等至於早稻各屬播種已完合併據實奏聞謹奏覽麥収分數已悉至於禾稻俟秋成後方敢言其必然須克誠克敬以待之絲毫毋得肆志同日又奏為密舉能員事竊臣一介庸愚蒙皇上不次擢用日夜感激惟思得人以報聖恩臣前為河南祥符縣知縣時刑名錢穀案牘紛繁必需幕賓以資助理因訪知浙江㑹稽縣監生候選主簿童蕃甚有才能當即延至臣署自河南以抵廣東迄今六載臣與童蕃相處既久深悉其存心誠實無欺辦事精勤不懈熟諳吏治才具優長現任州縣中求如童蕃者實不易得倘蒙皇上將童蕃交於廣東督撫試以衝繁緊要之缺或命徃他省委用俾得身親民社料理地方其供職必勤其收效必速臣仰體皇上簡㧞人材不拘資格至意因敢密摺薦舉可否採擇伏乞睿鑒謹奏交該部查議奏覆有㫖同日又奏為恭報採獲楠木事竊查廣東應辦萬年吉地需用楠木一千一百根塊原任廣南韶道林兆惠承辦兩年僅得合式楠木二百八十根臣因商之署撫臣傅泰密囑瓊州府知府宗思聖在於瓊屬黎人山内平價採買先經宗思聖報獲楠木五百根雇覔大船等候風順運送來省續因現任廣南韶連道李可淳接辦日久所得合式之楠木甚少臣又詳明督撫令宗思聖赴領價銀再辦二百根昨接宗思聖來文僃言黎人感荷天恩莫不歡欣踴躍今已辦有二百四十餘根木質堅潤材料長大惟俟陸續齊到省城臣即委員運送通州交納所有採獲楠木情由合先奏聞謹奏此係遵照部文辦理之事非闗地方利弊急務何必如是頻頻煩瀆同日又奏為奏明事竊東安縣姦民李梅上年私雕印信散賣劄付事𤼵脫逃緝拏未獲臣已多差幹役押同識認李梅之陳忠信四處密訪尚無李梅蹤跡後陳忠信途遇識認李梅之鍾亞二告知李梅曾在高要縣石下村監生梁志揚家臣役薛猶龍等即至高要縣向知縣楊麒生言之該縣喚訊梁志揚供出高要縣白諸都地方黄占元窩藏李梅等語查李梅係散劄要犯該縣亟應親徃嚴拏奈楊麒生止遣縣役同臣役前徃捕拘以致縣役通信於練總先令李梅躱避後至黄占元家搜覔不得僅帶黄占元到案楊麒生任其狡不承認又不嚴加訊究竟將梁志揚黄占元解至省城以為卸責之計署撫臣傅泰隨將二犯交與高要縣縣丞陳永中鎻押回縣囑令勒緝李梅乃梁志揚船至峽口揑稱急欲出恭陳永中漫不經心私行開鎻以致梁志揚投水身死臣現在查取縣丞陳永中踈縱并知縣楊麒生怠玩職名詳請督撫糾叅復㑹同臬司委令署恩平縣知縣姚孔鋅督同各役四處緝查務獲李梅嚴究外合先奏聞謹奏用非其人事何能濟地方大員不妥協其貽悞至於如此奈何奈何同日又奏為恭請聖裁事雍正六年九月二十日奉㫖將張恕等二十員命徃廣東交與該督撫委署試用欽此伏查試用人員内除沈柱臣未曾到粤其張恕王廷鐸單居安陽城張元方陳洪範李昌呉用楫彭述先趙方謙呉宣楊崇俱係候選知縣到粤後隨皆委署縣篆今單居安巳被糾叅彭述先業經病故張恕現有踈脫旗逃一案應聼部議楊崇庸懦無才署撫臣傅泰尚欲留用未便咨送回部其張元方等各員委署經年均能辦理地方事務臣酌量人地之宜已將粤省未經部選知縣各缺詳請題補傅泰以各員間有叅罰案件屢次批駁是誠愼重官方之意原非過刻但臣查現任州縣調補沿海各缺本任或有經徵督催承追緝犯等案該員明知例限届期必被降革營求調補冀免處分故定例不准調補所以杜規避之弊也至於試用人員委署稱職題請補授實與調補有别即署任内曾經罰俸降俸亦非畏有㕘罰希圖調補他縣可比况㕘罰等案各縣皆有倘因偶被㕘罰而概不題請則試用者寧有補授之日耶况奉㫖來粤試用上年有王元樞等二十二員本年有許鍾霖等八員皆須酌量委署使先到者尚未補授則後來者更安有補授之日耶我皇上求才若渴各省毎有命徃試用之員該員既膺民社何能保無叅罰之處分雖委署而有叅罰粤東原無不准補授之部行然叅罰可否題補吏部必有一定之成例伏乞皇上敇部查議知照粤省俾得遵循無誤頂沐洪恩不朽矣謹奏交部議覆有㫖同日又奏為敬聆聖訓恭謝天恩事雍正八年三月十七日廣東右翼副都統安華陛見回粤臣隨同督撫跪請皇上聖安時安華敬宣上諭廣東習氣甚屬不堪賊盜最多朕甚不放心汝到廣東傳諭總督郝玉麟廵撫傅泰布政使王士俊將軍蔡良令伊等務期留心訪查息盜安民要緊欽此臣跪聽之下兢惕悚惶惟有凛遵上諭嚴飭各州縣協同武弁實力查拏并請督撫二臣在於内河大小港􅆜撥兵廵緝務使盜息民安上慰聖懷三月十八日傅泰傳臣入署密示硃批粤海闗稅務一事臣跪閱之下仰見皇上訓誨周詳無㣲不悉斯不獨傅泰應知改悔在臣亦倍加敬畏竊思人臣上邀知遇外任封疆自當潔已愛民公忠體國尤須務竭協恭之道全無忌刻之心若少有偏私偶存芥蔕勢必辜負聖明抱慚幽獨本年二月初九日郝玉麟來至省城經今兩月臣聽其言論窺其意志亟欲與傅泰事事和𠂻奈傅泰近日性情執拗愛憎失宜竟與郝玉麟不甚相合郝玉麟曲為含忍而已臣以為傅泰與祖秉圭不睦所關猶小與郝玉麟不睦所闗甚大臣為督撫屬員但願督撫和衷臣辦事始無掣肘是以於進見撫臣時再四箴規傅泰惟點頭微笑臣不能力爲調劑負疚已深倘不據實奏聞益增隱匿之罪矣所有安華回任臣得與督撫共聆聖訓臣心感激愚忱理合繕摺奏謝天恩伏乞皇上睿鑒謹奏凡如此等之奏極當密之少不愼密至噬臍不及時莫忘今日之恩諭也有人奏汝曾有但具三寸封奏即可遣發呉如譯離粤之語前呉如譯之離粤東由伊自取今又離鎮江亦係伊自取豈王士俊復能令呉如譯離鎮江耶從來屬員之賢否出自上官朕未有將汝上官之去留決之於屬員之理但慮事或暗合未免啓庸愚猜疑之心上關朕用人之體下闗汝身家之患於此不思加愼加密而毫無忌憚但顧目前假榮不計異日實禍則為無知之小人矣誌之愼之雍正八年六月初二日廣東布政使臣王士俊謹奏為恭謝聖訓敬繳御批事雍正八年五月初四日臣齎摺家人回粤捧到硃批當即恭設香案望闕叩頭訖臣啓匣跪讀逐字體認儼若靣對天顔耳聆聖訓如臣奏請兵丁賣燬制錢一事臣第知制錢撘放兵餉自應各營赴省領回按名散給以供兵丁零星使用以免舖户全買化銅並不計及兵丁赴省領錢運回沉重就地易銀實為妥便及跪閱硃批仰見皇上聖明鑒照洞悉下情臣賦性愚昧不能細加推度前摺冒昧具奏可勝負疚悚惶自奉聖訓周詳臣獲頓開茅塞洪恩高厚感激靡涯理合繕摺叩謝所有前奉硃批奏摺一併呈繳謹奏覽大抵公誠則能生明據奏愚昧失於推度等語究係欠公欠誠之所致亟當自省可也同日又奏為微臣戀主情殷恭請陛見事竊臣自雍正元年七月内由翰林院庶吉士引見命徃河南補授牧令厯任今職八年外吏未得一覲天顔臣受恩愈重依戀愈深在外之年愈多求見之念愈篤現在粤省雍正七年分奏銷冊籍已經攢造題達則無慮奏銷之遲悞粤省雍正八年分額徵錢糧奉㫖減免四十萬兩則無慮收兌之紛繁從前粤省吏治廢弛民食艱難臣應日夕料理原不敢暫離職守今屬官知勵廉隅年嵗屢登大有諸務章程已定自不致或有更張伏乞皇上賞臣四月之假准臣赴京陛見俾臣得以敬聆聖訓并可面奏一切事宜庶臣之八年積悃百結微忱亦可藉以稍慰矣為此繕摺奏請仰懇皇上恩賜准允臣無任禱切待命之至謹奏新撫初更正資協助且不必來京同日又奏為據實密奏事竊廣東民風刁悍習俗澆漓因致上厪聖懷殷殷顧慮特命通政使司右通政焦祈年為觀風整俗使臣前奉硃批新授觀風整俗使焦祈年乃一派天良忠誠端正人也到粤時可與之和衷共濟將地方民情風習官常吏治一一僃悉告之彼此互相協助莫負朕之諄諄諭㫖欽此臣於焦祈年未經到任之先將觀風整俗使一切事宜預為料理整齊聞其將次入境遣人迎於百里之外臣之所以委曲周旋者亟欲與焦祈年同心協力整理地方以仰副皇上移風易俗之至意耳不知焦祈年受何人愚弄故為尊大之狀接見知府則南靣正坐知府長跪叩頭毫不回禮歷來督撫敇書謄黄止發首縣刋刷焦祈年將敇書謄黄用硃筆諭帖𤼵臣刋刷且儀制三品京堂出差外省則坐八轎四品京堂則坐四轎焦祈年係四品京官到任至今居然竟坐八轎令司道俱用手本伏查焦祈年敕書之内開明通省教職士子等聽其稽察焦祈年直欲管轄司道似屬違悖敕書外官到任之次日必先謁聖廟後拜同僚焦祈年則先拜將軍督撫後赴聖廟行香省㑹士民指爲話柄其他不合體式之事不堪枚舉焦祈年人雖誠實而舉動未合時宜臣向伊極口苦勸窺其意亦自不安但焦祈年與臣素未謀靣聼臣之言殊覺逆耳然臣惟有凛遵諭㫖務竭協恭之義事事箴規縱使勸善而善不行規過而過不改臣亦必多方開導冀其悔悟斷不敢䄂手旁觀有負聖訓也理合密摺奏聞謹奏當竭力規諫之焦祈年臨行時朕向伊將日前方願瑛之黨比餘波至今粤省尚受其害諸凡咨詢王士俊而行等㫖訓諭甚悉料伊自必聽從汝言也至其妄自尊大乃愚直之所使耳亦無甚大干礙處况其責任不過為稽查耳目之寄非有專閫重權縱使儀制少逾庸何傷乎硃批諭㫖巻七十三之三欽定四庫全書硃批諭㫖巻七十三之四硃批王士俊奏摺雍正八年九月初九日廣東布政使臣王士俊謹奏為敬陳兩廣情形密請聖裁事竊照東西兩廣雖分二省其實共為脣齒之邦向係兩廣督臣統轄自雍正六年廣西因八達用兵時督臣孔毓珣調遣失宜欽奉諭㫖將廣西一省割歸雲貴督臣鄂爾㤗節制兩年以來督臣措置有方調遣官兵動中機宜土司苗猺罔不畏威懷徳悦服輸誠皆我皇上睿慮周詳知人善任之所致臣職守粤東本不敢越分言事但就臣一得之愚竊以廣西暫歸雲貴管轄者原為西省邉界如泗城西隆等府州與雲南接壤雲貴督臣可以就近調遣耳若以桂平梧柳潯南等府而論其地交錯廣東則離雲南甚逺査桂林至百色従前本無馬遞公文皆由舖役傳送約二十日方到復由百色至八隘經廣南府以達雲南陸路亦湏二十三站共計四十三日往返幾及三月今自桂林安設馬塘遇有𦂳急公文往返飛逓亦兩月有餘且聞西省因設馬塘公費無出於州縣飬㢘内除藩司提觧外驛道又提觧一分為馬塘之用西省州縣飬亷本屬不多又因公費添觧益加掣肘至武員之調考拔補者毎因水陸跋渉盤費艱難其苦更甚況查廣西鹽政皆由官運官銷現歸廣東督臣管理而西省州縣各官又屬雲貴督臣管轄未免呼應不靈臣思雲貴之與廣西遼濶三倍於東省文武職員又皆逺莫能至當此邉境敉寧苗蠻向化之候似應將廣西一安等各流土府州就近交與雲貴督臣兼管其桂平梧柳潯南等府仍令廣東督臣照舊節制如有地方要緊重務應相關㑹者雲貴兩廣督臣公同廣西撫臣和衷辦理則地近而耳目易周不患鞭長之莫及矣抑臣更有請者西省欲將肇慶府屬之封川開建二縣改隷梧州一案其初本由雲貴督臣因梧屬之懐集一縣四面皆鄰東省議割歸東而西省藩司元展成時於臬司任内經管鼓鑄見懷邑現有銅山且查開建産有金礦即與梧屬現今開採之芋莢金山近在咫尺遂有割并封川開建歸入梧州之議但開邑逼近督臣駐劄地方金礦封禁甚嚴故人無敢窺伺若竟歸廣西開採東省民人見利而趨必相率爭先其為東省之患實深叵測豈同此一縣屬之西省即無聚集為匪之事況西省未歸廣東督臣管轄則密邇之地竟屬鄰封彈壓無資恐易滋事是開建之不應歸入廣西至明且切矣合併繕摺奏聞伏乞皇上睿鑒謹奏封川開建二縣改隷梧州因汝奏稱可行所以特發兩省督臣悉心定議今乃復有此奏何前後矛盾至此朕殊不解可明白奏覆同日又奏為奏明就近支領兵餉事竊臣蒙皇上天恩畀以藩司重任諸務悉心籌畫毎見兵丁赴司領餉有跋渉之勞守候之苦州縣起觧錢糧有護送之煩水陸之費故臣於雍正七年查各協營有離省窵逺與州縣鄰近者令該州縣將所徵地丁銀兩按夏秋冬三季就近支給兵餉惟春季則令各營赴司領餉以清長支扣缺等銀詳眀督撫批行在案兩載以來無不稱便但人心有無厭之求而立法無屢更之理今並此一季亦欲就近撥支現在詳請督撫批臣查議臣查各營支領兵餉歴係預支一季如春季造過官兵領餉冊籍夏季即照春季舊冊請領秋冬亦然及屆散餉之期兵有逃故馬有倒斃官有叅革陞遷將所領之銀截除名曰長支該營即以此項銀兩留之營中為公私借用雖亦陸續造冊報司然必到年底始能核算清楚故於冬季各營赴司領支春餉之時即以該營長支之銀於春季餉内扣除補發庶欵項得清而錢糧無侵冒之弊臣亦詳明督撫不便准行在案臣返衷自問為武員兵丁謀者至詳且悉矣且各鎮協營因公來省臣等酬酢徃來如同昆弟之交人人共見共聞今伏讀上諭聞粤東文武不和上厪聖懷臣不勝惶悚戰慄竊思文員武員同為皇上臣子若不和衷共濟必致下則貽誤地方公事上則辜負聖明簡用雖至愚頑何忍出此臣見粤東文武意見稍異之處不能必其盡無而顯然露之形迹彼此爭執實未見其有此也謹將臣支放兵餉及近日文武情形據實奏聞謹奏不論實行若何但於辭説是務則非矣文武之間和之與乖返躬内省自應不昧必待露諸形跡而後始謂為不和耶雍正八年十月十一日廣東布政使臣王士俊謹奏為恭報晚稻豐收米價平減事