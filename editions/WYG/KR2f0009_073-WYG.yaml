幾圖毎圖立圖總一人分作十甲毎甲分十餘戸不等再立甲總一人即著落該圖甲里戸公舉身家殷實素相推重者報名充當責成秉公丈量查算再刋刻戸單一紙其式前列某圖某甲某戸務開的名不許混開老名次列該戸額税若干再次列該戸現管田地山塘上中下則税畝若干註明的實土名及坵段四至弓口尾結一總合之原額有無溢税註明結總之下此單盖以縣印毎戸給以三張俱令業戸自向圖甲總處領單公同清丈逐一填註其田在本圖本甲者即本圖甲總據業戸填單細加清查其田在别圖别甲者别圖甲總據業戸填單查明完糧税額是否相符以定有無溢税其戸單業戸圖甲總各存一紙圖甲總細查業戸田畝果無欺隠然後造冊出具甘結繳縣核對現徴糧册如該戸田税巳足即歸入全書額内如不足數扣出此戸再查如有溢數即令報陞免究從前欺隠之罪毎圖限以四月造册呈縣如該圖戸單未經繳齊圖册未經造就之時業戸或將田畝漏造自行出首者仍許圖甲總查明歸入本戸陞輸若圖册已經造繳到官被旁人出首者是該戸安心欺隠或現在告争田畝不肯填入户單者圖甲總查實稟明該州縣即行按冊查丈將首出田地分别賞給首人仍治本人欺隠之罪田鄰一併究處如此則造册之先有自為清查之法欺隠者自必踴躍填單造册之後又有被首給賞治罪之條欺隠者自必交相警惕矣臣現將此法飭行南海縣詳眀督撫實力奉行臣復同南海縣共捐銀三百兩為户單册籍紙張之費士民歡欣樂從巳據自行首報者不一而足頗有成效將來推廣行之通省州縣俱可照此清查惟有所需册籍紙張之費大縣約須三百兩中縣二百兩小縣百餘兩州縣之飬㢘為充州縣之用勢難責令捐辦可否仰懇天恩凡有清查之州縣所需册費准於司庫所存落地税羡餘銀内動支給發則通省税畝俱有册籍可稽而在官在民不致仍前滋弊矣理合繕摺奏聞伏乞皇上睿鑒謹奏一二州縣牧令得人尚可試行非通省可行之事也若令通省照行恐更紛擾無益雍正九年正月十二日廣東布政使臣王士俊謹奏為恭謝聖訓敬繳御批事雍正八年十二月初六日及二十九日臣齎摺家人先後回粤奉到硃批随即恭設香案望闕叩頭訖臣啟匣跪讀口誦心維聖訓諄切不啻耳提面命臣心凜肅倍切矢慎矢公臣有一得之愚聖明悉加採擇臣有愚昧之處聖恩必加提撕臣雖至愚極陋敢不殫竭駑駘以仰報皇上洪恩於萬一理合繕摺恭謝並將兩次奉到硃批奏摺一同呈繳謹奏實心承領遵奉方能獲益也同日又奏為敬陳要地之宜經畫以圖乆逺治安事竊查粤東廣肇韶三府地居全省上㳺所屬州縣非濵臨大海即枕藉崇山其間設縣分防文武控制臂指各得其宜惟廣肇二屬之新㑹開平二縣界内有名大官田者其地東距新㑹縣城六十餘里西距開平縣城八十餘里逼連皁幕崑崙等處大山前因宵小出沒不常縣營逺莫能及以致大官田禾谷坪等處原有可耕地畝約計八百餘頃人無所恃概置荒蕪自康熙五十年以後恵潮貧民漸有來此樹藝者并有力之家結伴耦耕開荒成熟者現在墾荒無主之地十有六七漸成村落究無城郭可恃未免徘徊觀望地利不能盡舉先據民人伍徳彛等情願捐銀六千兩請作建縣墾田工本随據如數繳貯廣州府庫臣為地方起見業經詳請督撫二臣飭委糧驛道陶正中率員前往大官田查勘田畝村落及可否建縣一切情形俟覆到另行妥議請㫖外再查廣韶交界之清逺英徳二縣地處衝途萬山環疊深林密箐最易藏姦且内連猺峝更稱難治先經前任撫臣楊文乾議於英清交界適中之大埔坪分立縣治以資彈壓嗣因經費無出臣於雍正七年十一月内擬將韶州府通判移駐其地并於府屬營汛抽撥千總一員兵丁八十名與通判駐劄一處協力廵防庶幾文武交資稽查嚴密詳覆在案尚未題請兹撫臣鄂彌達到任伊始臣將一切經理地方要務向撫臣悉心商酌聼撫臣次第舉行以圖乆逺治安仰副皇上宵旰勤求之至意合先繕摺奏聞伏乞睿鑒謹奏所奏建縣各事宜均當詳明督撫聽候酌定同日又奏為酌開電白河渠利賴永埀萬世事竊照髙州一府接壤雷廉二郡土曠人稀地勢平衍素稱産榖之區米價甚賤且南海等處百貨駢集惟因中隔陽江縣之直壠及恩平縣一路舟楫不通米榖無由直逹省城貨物艱於陸運究之直壠等處原有古河可以疏濬相通者備查髙州府志内載前明成化五年分廵僉事道陶魯曾經啇之父老相度情形由茂名縣之梅菉至電白城西開通南港以達陽江縣之直壠通恩平縣之河道即可徑抵省城計期五晝夜可到米榖貨物無不流通啇民利益甚大惜其疏濬已至直壠惑議中止數百年來無有再為議及者臣屢囑髙州府知府張兆鳯親身踏勘嗣據禀稱查電白縣沙􅷦歴茂名縣梅菉以達化州呉川現通舟楫無庸開濬外惟電白城西舊河以至直壠約二百餘里内有原日河身大半壅塞中多熟田等語臣以事關重大未敢率為詳請但思直壠地方既有舊河形跡恩平現有河道可達省城不難設法疏通今若於電白河渠因其舊跡遴委幹員悉心相度於壅塞處所逐段丈估悉照河工土方之例核明定價發帑興工并將開穵河身之成熟田畝豁其税額另行報墾抵補如此河渠一開直通省㑹不特百貨流通啇民便利且髙州米榖源源輸運不致陳陳相因將見廣肇恵韶各府居民向之仰給於西省米糧者今更取資於本省而利賴永垂萬世矣臣現在據詳委員勘估繪圖另行詳請督撫二臣酌量核題請㫖外謹先繕摺奏聞謹奏該督撫具題到日有㫖同日又奏為遵㫖議覆事竊照兵部議覆原署廣東撫臣傅泰奏請民間所用刀鎗馬义概令報官刋刻姓名一案奉㫖此本内所議刀鎗馬义俱令刋刻姓名及取具兩鄰保甲互結存案之處似屬紛更民間未免擾累且恐姦猾之徒私藏器械而良善之民畏懼盤查不敢存留轉無禦盗之具著郝玉麟鄂彌逹王士俊各抒己見悉心酌議具奏欽此欽遵轉行到臣仰見我皇上保護安全立法務期詳慎之至意臣伏查粤東地方依山濵海民間禦盗防家必資器械除律載應禁軍器不許存留私用外其餘刀鎗馬义為類不一俱不在禁限之内比戸皆有非如鳥鎗本係應禁民間可以不用責令其按照尺寸報官鏨字者比是以刀鎗馬义良善之民有之猶可共相抵禦姦惡之徒舍之即不克以逞兇原不在於有無刋鏨名姓也皇上睿鑒至明其刀鎗馬义等械刋鏨姓名之處似應停止惟令各該地方按照甲册將某某戸内實有刀鎗馬义及合式刋字鳥鎗等械不拘何項悉令自行開註門牌甲册之内練保查明彚册報官存案如有遺失亦即據實呈明於門牌甲册之下分析開除以慿察核如此則民間捍禦有資有司稽查有據而無所紛更擾累矣抑臣更有請者鳥鎗火藥定例綦嚴自應立限查繳但粤省地方如猺排黎峝等處有難槩論者従前失察鳥鎗之例止於罰俸一年地方官尚畏避處分即有鎗礮犯案皆不敘入以求免罪今降調處分更重其為規避之計更當益甚立法猶未盡善應否再為分别如命盗案内有擅用鳥鎗人犯州縣官即據實敘招開報並無隠諱或經别縣審明追繳者将失察之地方官仍照従前定例予以罰俸處分倘有明知案内私用鳥鎗人犯不行敘入追繳希圖隠諱經上司察出開報職名者亦照諱盗之例降二級調用如此則失察之咎平日既無可寛諱報之條事後處分嚴切各官自必實力查追不敢姑容狥縦矣除詳督撫二臣轉請代奏外理合繕摺奏聞謹奏題到之日有㫖雍正九年四月十一日廣東布政使臣王士俊謹奏為奏明事竊潮州鎮臣馬紀勲於本年二月欽奉諭㫖命往肅州軍前辦理軍務奉文到日潮州隔越省城千有餘里臣素知馬紀勲清苦一應軍裝盤費或恐不能措置以致有誤行期臣随經飛飭潮州府知府即速資助離潮赴省時遇督臣在省臣即先為面禀督撫二臣籌畫伏查西北等省凡有奉差辦理軍務之員皆沐皇上天恩賞借本任俸薪與随丁糧餉今馬紀勳奉命前往其家口仍留在潮亦賴俸薪以資飬贍適馬紀勲差役到省借司庫銀二千五百兩以辦軍裝督撫飭議臣議於司庫公用銀内暫支銀二千五百兩俟其到省即可製備起程復慮長途用度不足臣又另與督撫二臣各幫盤費銀五百兩當經督撫允議借支迨馬紀勳於二月二十五日抵省臣即如數兑交二十七日随即馳赴軍前矣至暫支公用銀二千五百兩馬紀勳願於應得俸餉内分限四年扣還呈請督臣檄行査議詳明咨部在案應否賞給出自天恩理合恭摺奏明伏乞皇上睿鑒謹奏馬紀勲所借銀兩不必仍令扣還即將此㫖傳諭督撫可也同日又奏為密請聖裁事竊照直省將軍督撫提鎮標兵特荷皇上天恩次第賞給銀兩營運生息為伊等吉凶用度之費務使公平辦理均沾實恵此誠曠古未有之殊恩臣前後接奉督撫二臣檄行欽遵諭㫖陸續動支司庫銀共一十二萬兩為將軍督撫提鎮標兵生息之用伏查廣東一省通計駐防額設并新添水陸兵丁共七萬五千八百七十一名内將軍標駐防旗兵共六千五百零七名并照部文開列督撫提鎮標兵共二萬五千七百五十一名已領帑銀生息賞給外尚有水陸協標營塞兵丁四萬三千六百一十三名未䝉賞給臣查伊等分防設汛有戍守之勞窘廹尤堪憫恤似應恭請敕下督撫提鎮諸臣將現賞帑銀之内一體通融勻給項俱經啇人借領行鹽按月二分行息彚交鹽道轉繳其各鎮有議開典當者有議置買田園者有議借給鹽啇者有議屯積貨物者迄今啇議未定臣思兵丁平時糧餉之外或有吉凶需用無所取辦毎至加五六七八負債填償計及有借當還必力加撙節不敢妄費今以生息為其分内所應得一遇吉凶事務必有不當用而用者并有可以不領而領者甚至希圖多領不遂而反生怨望或營運偶缺不足支應而歸咎於人者皆事所恒有臣不揣愚昧熟思審處與其營運以待將來之賞給莫若將前項帑銀分貯各標營公所凡有兵丁吉凶要務許令五人互結出具保領以四兩五兩為率准其借用毫不取利仍於月餉内按季分扣歸既免營運而多籌畫之煩在兵得沾餘潤而無轉貸之苦恵均利溥帑項自可常存無缺矣㣲臣就粤言粤是否有當伏乞皇上睿鑒謹奏覽雍正九年五月初六日廣東布政使今陞湖北廵撫臣王士俊謹奏為聖恩委任愈隆臣心戀主愈切恭懇陛見敬抒誠悃事竊臣一介庸材九年外吏受恩日深思慕日甚於上年恭請陛見未䝉俞允中懷迫切感戀難名兹復叨䝉聖恩用臣為湖北廵撫聞命戰慄感激涕零不知所措伏思楚風勁悍素稱難治諸凡整理措置臣才識短淺何以設施允當雖力圖犬馬之報不敢絲毫少有怠安第未親奉聖眀訓誨示臣規則知所法守深恐有負我皇上委任盛心臣現在欽遵諭㫖俟新任藩司臣楊永斌抵粤將一應經手正雜錢糧并地方公務交代眀白随即起程外仰懇天恩准臣赴京陛見俾得仰覲天顔跪奏一切稍遂數年戀主之心且獲祇聆聖訓更知楚境吏治民風之要矣為此恭摺陳奏臣無任瞻戀依馳激切待命之至謹奏有㫖命爾來京陛見矣同日又奏為恭報早禾秀茂米價平減事竊照本年粤省三春足雨早禾栽插以時立夏之後更復雨暘時若髙下田禾現在吐秀成實暢茂倍於往年米榖時價較春間更為平減查各府州屬毎米一石自三錢八九分起以至五錢五六分不等轉瞬早稻登場米價更當平減閭閻足食共慶豐亨是皆我皇上徳洋恩溥澤徧寰區之所致臣覩此大有景象惟倍切冰兢敬迓天庥永永無極謹奏覽奏粤省雨澤霑足米價平減朕懐深慰雍正九年十月十二日湖北廵撫臣王士俊謹奏為密請聖裁事竊查直省奉行秋審定例毎年五月内將各州縣題准部覆在監人犯提解到省經督撫司道等官公同察審具題是皆欽恤深恩務求平允之至意臣自初任祥符以及在粤六年毎當秋審屆期一切人犯府縣並未覆加察核無論路途逺近俱將監犯預為僉解臬司衙門在途往返則有脱逃疎縱之虞到省寄監復有擁擠薰蒸之患炎暑易生疾病瘐斃恒至多人迨秋審之日總以各案原招為主未嘗逐名將原犯情節再行翻駁臣思題逹重案當州縣承審之初一有未協府司院再三駁審及成招之後觧府觧司觧院業已幾經審勘然後詳請具題列入秋審者盖欲察其情罪之輕重分别情實緩決可矜三項候㫖遵行也是則秋審之案惟察原招之有無遺漏以定爰書非謂其情罪尚有可疑必須調犯親審者可比可否仰請聖恩嗣後毎逢秋審責令州縣將各犯原招細加覆勘分别輕重詳府覆核由府彚册詳報司院聼候屆期在省公同察勘原招詳加區别或有縣府所定不符者院司改正具題不必盡將監犯觧省以致有脱逃病故諸弊庶幾仰副我皇上如天好生之徳於無極矣是否允當伏乞睿鑒施行謹奏覽所論奏殊失輕重之宜秋審係國家大典循行已久何必復議更張雍正九年十二月初六日湖北廵撫臣王士俊謹奏為恭報湖北現今米價事竊査楚省本年時值豐收仰賴皇上福庇人民安業三冬天氣晴暖麥苗早巳吐青省城漢口米價亦無増減詢據布政使徐本開報各府州屬米價毎石自七錢五六分起至八九錢一兩以及一兩五六分不等俱係市斗之價比倉斗較大民間俱云豐收之後米價亦平臣惟詳加勸諭務令加意節儉愛惜米榖豐年愈謹盖藏以期克副我皇上子恵元元之至意耳為此具奏伏乞睿鑒謹奏覽奏湖北米價情形朕曷勝額慶同日又奏為仰體皇上敬陳睿鑒事竊查山東被水之民䝉我皇上特頒諭㫖令於所致之處查眀留飬動用存公銀兩給以口糧資其路費毋使一夫失所皇恩浩蕩實為從來所未有東民聞風感泣頂戴無已臣由河南一路經過於信陽州以南見有大小男婦陸續來楚者詢係山東郯城沂州等處人民居多據伊等稱被水之後即覔食外方原不知本省有遣官賑濟之皇恩及到江南廬州等處俱有地方官日給口糧因彼處柴草騰貴聞得湖廣豐收所以來此就食眀春仍要回去耕種營生等語臣随飭令所過州縣凡遇東民到境務必仰遵諭㫖加意撫恤給以口糧路費安頓得所兹臣抵任半月有餘據江夏縣陸續報到東民共五百六十餘名口漢陽縣報到東民三百六十餘名口黄陂黄岡應山監利等縣共報到東民一百一十餘名口俱各随到随即安頓寺院庵堂分散居住各給口糧鹽菜不致缺少臣又捐𤼵銀兩製備棉衣按名給領目下尚有續到者雖未有定數自當料理妥協令伊等不致失所待至新年資給回鄉不誤耕作所有楚省安置東民情節理合具摺陳明伏乞睿鑒謹奏能仰體朕心將隣省災黎如是撫恤周到甚好同日又奏為據實陳奏事竊查湖北八府一州民風剽悍而武漢黄安荆襄等府又素稱多盗臣到任伊始見楚省一切情形有不得不急為整理者如弭盗莫先保甲乃臣自入楚境所過鄉村市鎮問以保甲而門牌甲冊多未舉行即州縣民壯止供差遣之役操練竟為虚設甚而汛防疎懈千把竟不帶刀兵丁亦無整束是以緝捕不力竊刦頻聞此保甲民壯廢弛之咎所急當整理者一也至如府州各縣承辦案件向皆疲玩相仍命盗不加確審實情未得朦混招詳以致徒事駁查二恭限滿猶未審結臣檢查舊巻不下百餘件甚至互相標榜茍且偷安大関政體此吏治因循之咎所急當整理者二也再如楚省士風向多澆薄漢口一鎮騾行客店半皆無賴青衿局騙吞啇盡屬著名劣監教官不為約束有司不為嚴究猫鼠同眠優劣不分此士習頹靡之咎所極當整理者三也又如臣經過道路若黄梅縣之白湖鎮三省通衢堤廢不修應山孝感黄陂漢陽等縣之楊店灄口漢鎮等處俱係官啇大道而路徑低窪缺陷難以馳驅正道兩傍均未開溝種樹行旅商賈苦於跋渉此道路不修之咎所急當整理者四也其他水利堤工是否完固社倉積榖是否無虧臣俱現在逐一清査通盤辦理而督臣邁柱適於臣到任之日即往襄陽料理涼州軍務未及面商一切俟其回署即當和衷斟酌實心整飭總期有益地方不敢少存意見之私亦不敢稍有扶同之弊上欺君父自干重譴也理合一併奏眀伏乞睿鑒謹奏百凡詳審徐徐次第為之不可急驟毋涉孟浪欲速則恐不達魯論所以埀戒也同日又奏為據實奏聞事竊查養㢘一案雍正六年七月内欽奉諭㫖各省内或有尚未分給養㢘之員著各督撫悉心商酌一面辦理一面奏聞寕可以州縣應出之項觧至藩庫従公發給而不可使其自相授受廢公義而狥私交留禮儀交際之名而長貪婪賄賂之弊也倘再有私受規禮者將該員置之重典其該管之督撫亦從重治罪欽此煌煌聖諭至眀且悉各省無不欽遵奉行在案詎湖北迄今三載尚未定議各州縣錢糧名為加一火耗俱有坐平等項名色核算實有加一四五不等所有司道府􅆹州縣養㢘止照前任督臣楊宗仁定議於加一耗羡之内以三分二釐扣為州縣養㢘以三分觧布政司為通省公用以一分五釐為布政司飬㢘奏銷之用如臬司六釐各道一分五釐知府一分同知四釐令各州縣自行分送為各衙門之飬㢘至管税管糧之同知通判謂伊自有羡餘亦未定有若干數目此盖一時權宜之計其實大州縣按額收耗即扣留三分二釐積算有多至二千兩以外者小州縣即以加一之數全給亦有不足百金之數者不均實甚臣查司道府􅆹州縣除火耗飬㢘之外尚有鹽規糧規當商雜税等項歴來各自收受添補養㢘有數千金數百金之不等均未據實報出觧至藩庫從公發給偏枯更甚夫司道府􅆹飬㢘私相授受不免開餽送需索之端鹽規各項自行收用不無額外勒取之弊再如府州縣之經歴縣丞雜職等官均未議及飬㢘伊等餬口無資勢必寡亷鮮恥剥削小民尤為深害㢘隅不飭吏治何以澄清臣受恩深重何敢瞻狥扶同不亟為整理現在恪遵諭㫖檄行布政司詳查各項實在數目總歸藩庫分給酌地方之繁簡定飬㢘之多寡大小均沾章程永定仍一面㑹同督臣邁柱悉心斟酌妥協另行具奏外所有辦理通省飬㢘情節合先奏聞伏乞皇上睿鑒謹奏養廉一節務令大小均平毋致稍有偏枯確商妥議奏聞同日又奏為據實宻奏事竊查湖北通省照糧均丁一案於雍正六年十二月内經督臣邁柱㑹同原任撫臣馬㑹伯據原任布政使徐鼎詳報具題部覆奉㫖准行在案内將武昌等四十二州縣減丁銀一萬八千九百二十八兩八錢零攤入江夏等一十九州縣之内照糧加増各州縣有額丁本多加増者止有數十兩并數百兩及千兩二千兩以上者民間已多賠累至鍾祥一縣向額丁少糧重今照通省勻攤於原額丁銀二千四百三十兩有零之外又加増丁銀三千五百八十六兩零以致上年九月通縣民人羣至縣堂公繳農具求請詳豁今年三月内縣差下鄉催徵加丁銀兩而通縣一十三鄉百姓復於城東武當宫地方聚衆呼籲知縣王世經並不委曲勸諭為民請命竟知㑹城守率領兵役出城捕捉衆皆驚惶奔走彼處橋窄人衆墮水死者一百餘人該縣随以聚衆抗糧通詳題究至今尚未審結臣訪聞確實寢食不寧伏思丁随糧轉原屬便民實政但各省各有情形貴於因地制冝方無此増彼減偏重偏輕之弊故各省攤丁皆以本縣之丁仍随本縣田糧原額勻攤者赤丁枯丁得免賠累事出至公間有通省勻攤者必其科則人丁不相上下方見均平従未有加派均丁之數反多於該縣額丁之數者欲强其以此縣之田糧代賠别縣之丁賦無怪鍾民抵死不完以致激成民變總由従前經理錯誤以至於此臣何敢扶同隠諱貽無窮之累究於國課無補而且民命攸關以臣愚見楚省均丁應照河南廣東等省以各州縣之丁銀歸各州縣随田完納無増無減乃為至當不易至現今聚衆一案為首者固當執法自不可以姑容然民負切膚之痛縣官身在地方不能撫馭以致斃命多人亦不能稍為寛假也臣為地方民生起見不得不據實瀝陳密奏伏乞皇上睿鑒施行謹奏與督臣邁柱會商妥確具題請㫖可也硃批諭㫖巻七十三之四欽定四庫全書硃批諭㫖巻七十三之五硃批王士俊奏摺雍正十年正月十八日湖北廵撫臣王士俊謹奏為恭報冬雪春晴米價平減事竊照湖北上年豐收麥苗遍野於十二月十五六七等日冬雪滿郊正月元旦晴明初二初三等日又得大雪盈尺有餘麥田霑足農民無不欣悦現今武漢兩府近省米價較前平減即黄州安陸荆襄等處亦皆冬雪春晴與省城無異米價亦平東作漸興春耕有賴為此繕摺奏聞伏乞皇上睿鑒謹奏據奏楚省晴雪應候米價平減朕以手加額覽之同日又奏為敬陳一得仰懇睿鑒事竊照鹽觔為民食所必需亦為課餉所關繫故引有定額價有定數源源運售則市價常平商本不虧民無淡食斯為兩便查湖北一省毎年約銷淮鹽三十五六萬引又帶銷引鹽四萬道合計不下四十萬引由兩淮完餉掣鹽候𤼵桅封始得開行至楚俱在漢口鹽店分發行銷但查向來額引雖有定數商人辦課不無遲速掣放桅封又有守候緩急之不一是以鹽船到楚多則商有虧本之慮少則民有淡食之苦且鹽臣並無數目知㑹鄰省無可稽察商人毎於年底需鹽之時捏稱鹽缺暗短觔頭重價累民臣思鹽價之所以長落不常者皆由額引未經按月撥定之故如湖北額引四十萬以一年計算毎季應銷十萬引毎月應銷三萬三千三百有零鹽臣於毎年批定額引之中立定限期務令商人將一季應運之鹽於季前完足課餉場鹽一到立行盤掣改綑上船即發桅封開運不令守候一面將所運鹽觔數目并開行日期咨明銷鹽省分之督撫按期查察不許中途故意逗遛即或風信不常遲亦不過半月如過半月不到督撫立即咨催鹽臣嚴行查究如船到漢口商人即將所到數目報明該縣轉報并令選擇正商經理如此運鹽有定數商人得以分季完餉力自有餘開行有限期鹽船不致任由停泊事有専責按季分運既免壅滯不銷有虧商本随時充足亦無陡長價值致累貧民至鹽規一項查據商人開報現奉鹽臣核定湖北各衙門共九千兩縁従前未定飬亷各官相沿收受今通省飬廉不足現於自首羡餘銀内仰懇天恩賞給則此項鹽規自應永行革除以紓商力且免藉口長價是否有當理合恭請聖裁敇示遵行謹奏楚省鹽務情節詳悉致札於尹繼善汝二人商酌妥協會同奏聞候朕裁定將此奏并朕批諭俱令伊明白知之同日又奏為據實奏聞事竊知府有表率屬員之責必須精明强幹方能察吏安民事無叢脞今有安陸府知府談九敘年已望七精神懈怠政事因循不能振作臣面加策勵據伊自稱年力就衰雖欲勉盡職守而精神照管不到諸事不覺漸至懈弛等語臣查安陸一府民頑多盗最為緊要似此年老委靡實不克勝重任必致有誤地方但無甚劣蹟理合據實奏明仰懇皇上天恩另揀記名能員補授安陸府要缺其談九敘給咨赴部引見伏候聖裁庶要地得人吏治整飭矣謹奏候朕另有諭㫖同日又奏為恭請聖裁事竊查湖北廵撫衙門向設筆帖式三員以備翻譯清書之用今現在二員一係鑲藍旗人伊爾根於雍正元年來楚一係正藍旗人𤓰爾察於雍正二年來楚俱經准到吏部咨行在案迄今七八年翻譯清書之外别無所事額俸有限飬贍不敷若因目前無事咨送回京則伊等在外年乆亦能熟悉風土人情未便置之閒散臣伏查在京各旗筆帖式内如有才具可觀年力富强者原有保舉挑選補放同知通判等缺之例今伊爾根𤓰爾察二員臣見其年力甚壯人亦明白可否仰請天恩准照在京之例遇有楚省同知通判缺出許令酌量委署若能勝任具題補授既免伊等坐糜廩禄而随材器使益當乘時奮勵報效皇恩矣是否有當伏乞皇上睿鑒施行謹奏送部引見候㫖遵行同日又奏為請㫖揀發人員以資實用事竊湖北一省地居衝要所屬州縣佐貳等官於本任職守之内尚須黽勉策勵各勤所事方免誤公至於員缺委署以及公務差遣在在需人伏查雍正八年以前奉發楚省以知縣試用并知縣以下酌量題補人員内除事故等項外餘俱陸續題請實授及現在委署試看者止有數人臣與督臣邁柱公同商酌仰懇皇上天恩准將在部候補候選之知州知縣内揀選十員知縣以下試用并雜職等官揀選一十五員令赴楚省遇有員缺以憑酌量委署試用如能勝任按照例限具題實授庶委署得人公事克辦實於吏治有益理合繕摺恭奏伏乞睿鑒施行謹奏照該撫所請行吏部知道雍正十年二月十三日湖北廵撫臣王士俊謹奏為恭報麥苗得雨米價平減事竊湖北入春以來天氣晴暖風日融和二月初三初四等日連朝得雨麥苗早者長有六七寸遲者亦有四五寸青葱滿目恩膏普被共樂恬熙省城漢鎮米價較前平減其餘各府米價俱平理合繕摺恭奏伏祈睿鑒謹奏覽奏湖北麥苗得雨米價平減不勝欣慰同日又奏為請㫖通行事竊惟社稷山川載在祀典毎年春秋二祭俱動支正項錢糧依期致祭凡以昭事明禋春祈秋報實關國家鉅典是享祀之誠壇壝之制毋容缺畧不修䙝越従事也臣在廣東布政使任内毎祭務必躬親行禮修築壇位繚以周垣前設壇門後植松柏以全規制通省舉行在案今查湖北武昌為省㑹首郡社稷山川並未設立致祭壇位毎屆祭期布政使僅委員行禮荒郊草具䙝玩不恭而通省竟有不知舉行者臣随嚴行查勘刻日建立通飭去後伏思社稷山川之神本與先農並重均載祀典守土者各盡敬誠以祀之則隂陽和而風雨時利益民生實非淺鮮今府州各縣止知按額支銷祭品銀兩並未將牆垣壇址擇地營建随時修整以致日就缺畧各省恐亦未盡舉行似應仰請聖恩敕諭直省督撫將所屬州縣應設社稷山川兩壇坐落基址丈尺并築圍牆前門後樹務合體制該地方州縣原有者敬謹奉祀未建者擇地舉行造册達部遇有陞遷事故俱照先農壇忠孝節義祠定例一體列入交盤頂内查明接受偶或坍損随時修整完固庶典禮永埀不致循名失實而治民事神俱各咸知謹凜矣為此繕摺具奏伏乞皇上睿鑒敕議施行謹奏所奏是另㫖通行飭諭同日又奏為敬陳末議仰祈睿鑒事竊臣知識短淺毎伏讀皇上欽定律例精詳允當於明罰敕法之中廣如天好生之徳臣下奉行惟恐不力尚有何詞敢贊髙深於萬一但就成例之内可以推廣聖恩情法兼備者臣不揣愚昧謹列四條為我皇上敬陳之一獨子留飬之例孀婦尤為可矜也一强竊同居之父兄等知情不知情減等擬罪之處尚須定議飭遵也一逾限處分應分别初叅二叅之輕重也一州縣刑書宜一體添設總吏也以上就臣知識所見敬陳末議是否有當伏乞皇上睿鑒敕議施行謹奏試交廷臣酌議朕觀四條中未必有一二可採擇者同日又奏為請㫖事竊查各省鄉試應用簾官自雍正五年欽奉諭㫖將本省知縣入簾之例槩行停止議將隣省在籍候選之進士舉人確訪文行素優者縣府保送督撫親加驗看俟隣省調取限八月初一日齊集調取之省城照例關防主考進闈之日監臨督撫傳集當堂公同掣籖掣得内簾者即令入闈分校其餘即令回籍至外簾之收掌受巻彌封謄録對讀五所官仍於本省府州縣佐貳等官選擇委用其調取之進士舉人往來路費毎人給銀三十兩在本省公費銀内動支等因奉㫖遵行在案今湖北省例分十一房應調取隣省房考二十人江南七人江西七人河南六人此二十人内掣用内簾十一人其餘九人即應回籍不特虚糜公費亦且旋來旋去徒滋往返之勞以臣愚見與其無事空回不若即令分掣外簾五所俾得各司所事免調本省府州縣佐貳等官委用則隣省人員既不虚跋渉之苦而本省佐貳亦可無調委之繁矣再查各省現有藩臬兩司衙門學習進士或十人五六人不等皆係甫登科第文藝未荒學習非比専官又無地方責任若非分派學習亦為隣省應聘人員似應一體查明經書如湖北應調二十人現有學習進士六人止湏調取隣省一十四人於臨場之日與隣省人員一同掣籖分入内外簾之用如此則簾官俱慎重周密佐貳亦得各勤職守於科場條例及料理地方似屬均有禆益伏乞皇上敕示遵行謹奏此奏是交禮部議覆有㫖同日又奏為備陳鄖歸二屬勸墾修城之要務仰祈睿鑒事竊查湖北缺荒地畝惟荆襄鄖歸四府州皆不足原額而荆襄二府猶為荒熟相等惟鄖陽府屬六縣通計原額徵糧田地共四萬九千二百六十餘頃現止成熟陞科五千六百一十餘頃尚荒四萬三千六百四十餘頃歸州所屬除恩施一縣新經改設外通計一州三縣原額徵糧田地共一萬六百餘頃現止成熟陞科五百六十餘頃尚􅂽一萬餘頃上年奉部文行將民間舊荒地畝逐一查勘分别可墾不可墾内有貧民無力者許借給牛種限年陞科一案臣到任後詢據鄖陽府開報所屬可墾田地僅一百一十九頃有零歸州所屬尚未清查報到臣詳加訪察鄖歸二屬荒缺固多而民間欺隠包占者亦復不少府州各屬以地處偏僻悉皆因陋就簡並不加意招徠實心勸墾不但賦税虚懸亦且經費無出従前未定飬㢘官役俸工不敷一切取之里下以致毎年完辦雜派多於正供如果田地盡屬缺􅂽安能有此額外之承應此事理之顯而易見者臣現在􅊾行曉諭宣布聖恩務令陸續首報概免従前隠匿之罪一面飭行鄖歸二屬設法勸墾其有主荒地勒限半年聼本人自行墾復按照水旱限年陞科倘過限不報即許他人赴官承墾開明頃畝四至給照管業出資墾熟完糧以期次第足額并請如保康鄖西竹山竹谿四縣并歸州之城現俱僅存基址至興山長邑巴東恩施各縣則原本無城可否姑緩置議其鄖西等州縣坍廢城垣自應酌制臣未敢擅便合先具摺奏請伏乞皇上睿鑒飭示遵行謹奏覽同日又奏為謹陳屯衛事宜仰祈睿鑒事竊湖北九衛一所各有經管屯田毎逢漕運之時衛所僉㸃旗丁除領錢糧之外一切幫費皆由屯軍所出故當日屯田之設原為贍運而屯糧之輕本以䘏軍迨後軍有逃故田日荒蕪或為軍墾或為民墾其貧苦屯丁又將軍田輾轉典賣田去丁存幫費遂無所出查毎船旗丁幫費有二百餘兩者有一百七八十兩者亦有一百三四十兩者歴有收冊為憑原係因屯尋軍亦猶民賦之丁随糧辦也自屯為勢豪兼并在户衆屯多者幫貼尚易惟屯田已無一畝丁又單寡力難幫貼不追則運費無出追則赤貧無完而兼并之家日據無差之產坐享糧輕之田窮丁不敢過問而旗丁之私收幫費又無定額總屬預收肥槖比至漕運開船旗丁又屬空手不但窮丁受困亦於漕運無濟今欲除此弊惟有因屯起運之一法如一衛該船若干隻該幫費若干兩統計一衛屯糧若干石従公酌定照上中下則分派毎石幫費若干就其一船所收之數再加核減寜少毋多所派幫費随糧完納平徵無耗官徵官給彚觧道庫毎年修船出運時當堂散給旗丁收領濟運總之按田出費並不按丁派銀則苦樂均平豪强不能脱漏窮丁獲免追呼矣現今徳安襄陽蘄州三衛皆已照糧徵收已有成效但未經題請各衛従違不一理合據實奏明請㫖再查各衛屯田坐落不一有丁在湖北而屯在湖南者亦有丁在湖南而屯在湖北者相隔遥逺屯丁完納錢糧不能自封投櫃止憑衛所差役墨帖收糧至省代納侵收花費那舊掩新積欠仍累屯丁官民均受其害以臣愚見似應援照山東山西陕西廣東之例將衛所裁汰查明各屯坐落處所歸并就近州縣徵收所有僉丁出運等事俱令清軍同知管理將貼軍幫費悉如前議按田均徵州縣徑觧道庫臨運給發自無貽悞如此各歸各縣屯民完納甚便幫費官徵官給旗丁亦得實濟漕運永無遲悞民屯不致相岐實於地方有益合併陳奏請㫖伏乞皇上睿鑒施行謹奏所奏屯衛事宜與邁柱趙𢎞恩詳細斟酌妥確㑹題請㫖同日又奏為據實奏聞事竊臣受恩深重夙夜祗懼抵任以来事必躬親政無旁貸確見楚省吏治總屬因循疲玩案無論難易一概沉擱遲延事無分緩急悉以㳺移請示中無辦事之實心徒多掩飾於耳目臣凡接見屬員罔不諄諄告誡而面從心違者比比皆是臣因特設課吏一法通飭令將毎日所行大小政事備細開單近省府州縣地方之大者半月一報簡僻者一月一報逺省府州縣地方之大者十日一報簡僻者半月一報臣親自披閲有應指示者逐條就單批諭舛謬者教之勤勞者奬之庶各屬之才情識見随時如見其人不能毫忽欺掩臣復密加訪察互相稽考情操練民壯平治道塗以及修整學宫規制重建社稷山川壇壝清理積案滌除陋規無一非有關政體次第通行但整頓在積玩之後奉行伊始或多畏難茍安未免視為多事臣䝉皇上訓誨之諄期望之切何敢瞻前顧後畏首畏尾避嫌避怨甘心自蹈庸碌之咎而不力為整飭以致貽悞地方除現在一切事宜悉與督臣邁柱和衷商酌分别題奏外謹就臣到任後所行各項事件不揣冒昧一一據實陳明伏乞皇上睿鑒謹奏如是勤敏奉職秉公察吏甚好朕實嘉悦覽焉勉之雍正十年三月初八日湖北廵撫臣王士俊謹奏為聖主誠敬逺孚楚省麥苗雨足米價平減恭慰聖懷事竊臣前准部咨以近京雨雪冬春未溥欽承上諭令廷臣督撫預籌良䇿仰見聖心時切民瘼至誠昭格有感胥通仲春望前伏聞京都得雪兆庶歡呼天心仁愛悉由聖主誠敬之所致而楚省亦於二月十二日以後連朝得雨二麥盛茂至二十五日天氣大晴楚民復於冬耕餘剰之田添種春蕎力勤東作三月初三四等日又得微雨滋潤麥俱揚花吐秀省城以及各府米價現在平減臣復切諭所屬相時平糶務求民食無缺不敢絲毫縦肆庶幾上迓天和仰慰聖懷於萬一耳所有楚省麥苗雨足米價平減縁由理合恭摺奏報伏乞睿鑒謹奏以手加額覽焉同日又奏為請留大員督墾以收實效事竊湖北荆襄鄖歸四府州俱有荒缺田地而鄖陽歸州所屬為尤甚除從前欺隐者諭令速行自首外其實在額荒自應設法勸墾前經陳奏在案臣思勸墾之法固當責之該地方官而於四府州内廵行查察招徠勸課必得大員親身董率方克有成伏查湖廣廵察歸宣光今當一年期滿現在具題候㫖臣見其留心地方所至加意整飭勤行化導官民相安詢其廵歴鄖歸等處亦言勸墾宜力知為熟悉風土之員可否仰請天恩准令歸宣光以廵察職銜専理荆襄鄖歸四府州開墾事宜臣另選辦事幹員協同各該地方官查明可墾地畝如有力者聼其自行呈墾無力者許借給牛種限年陞科造册申報廵察稽查考核如委員及地方官不實力奉行廵察移㑹督撫查㕘三年之内墾業足額准予從優議叙如此督率既有大員勸墾自有實效其於地方大有禆益矣理合具摺請㫖謹奏鄖歸等處荒缺田地初由歸宣光奏聞朕方知之今即命伊督理其事似覺不便另有諭㫖更留伊在楚廵察一年其勸墾事宜汝於屬官中遴選才幹之員令其實力奉行盡心辦理可也同日又奏為請酌定漕船修造之例以紓屯累事竊查湖北額設漕船二百二十八隻毎船定例十年大造一次毎隻額領料銀二百一十兩有零其實毎船約費至六百金方能如式堅固不敷銀兩歴係九軍幫貼毎年小修毎隻額銀七兩五錢又需幫貼銀六七十兩不等均係按屯出費若十年内或偶有失風沉溺則管船旗丁於下運賠造新船一隻其費出九軍派造不領帑項此賠造新船不論起造年分惟合舊運屆滿十年即船身尚屬堅固仍照例另行打造幫費復派九軍此湖北修造漕船之成例也臣查漕船大造以十年為率如未屆五六運而失風沉溺者賠造無庸再議若其船已經七八運而有失風沉溺之事則距大造之年為期僅有二載乃既令旗丁賠造於二年之前又復另行打造於後不特木料尚新拆廢可惜而窮苦旗丁何堪疊受賠累此失風賠造之船應於定限十年之内稍為變通領修者也又如十年限内毎船或有失風一二次例應下運賠造假如賠造之船在五六運内則距大造正限止有五年其船身堅固者多不妨再運一二年然後領帑大造或十年限内並無失風賠造等事該船於九運已屬朽壊又不妨先期領修以濟漕運此十年大造之例又可不必一概通修者也以臣愚見請嗣後除該船於七運以前損壊者仍著旗丁賠造外若已經八運果係失風沉溺者即准旗丁具領大造帑銀先期大造免其派賠而此八年限前領造之船仍多運二年至一十二年方准再行領帑又如十年限屆船身尚屬堅固者再令艌修輓運一二次不必屆限即造或十年限内雖無失風等項其船已歴九運朽壊修工浩大者亦准先期一年領帑拆修仍補運一年俟運足一十一年方准大造如此則先後逓修既可以紓衆軍之力而預領補運亦無違於十年之限紓軍力而重漕防似屬均有禆益是否有當伏乞皇上睿鑒敕議施行謹奏所論雖屬近情但各省船隻甚多此端一開未免復滋捏報冒領稽遲草率等弊且亦㕘差難齊不勝其擾仍照舊例循行為是同日又奏為奏明事竊查湖北省㑹武昌府學宫為通省首善之地崇聖鄉賢名宦等祠必湏位置得體難容紊越有失觀瞻臣自到任恭謁見各祠俱列宫牆之外相隔遥逺明倫堂反居正殿之後随令酌量移改動支道庫存公閒欵内銀五百兩發交江夏縣擇吉興修於丁祭前告成又查漢鎮内從前所建飬濟院日乆頽廢并黄梅縣屬白湖堤等處為江廣通行大道堤身斷續有妨行旅亦俱動用存公銀兩次第整理各在案再臣撫署大堂右側係書吏科房收貯巻宗承辦事件居住之所歴年乆逺破損欹斜毎當風雨不特吏書如同露宿而一切重大巻宗俱被風吹雨濕壊爛不堪不得不急為整葺當即傳喚江夏縣縣丞逐一確估計需工料銀七百六十兩現在􅊾行布政使確查藩庫存公閒欵銀兩動支購辦工料擇日興工外理合據實奏明伏乞皇上睿鑒謹奏覽奏知道了但存公銀兩亦當留意節慎不可視為閒欵而任情揮霍恐為汝日後之累同日又奏為密陳睿鑒事欽惟我皇上聖明溥照澤厚恩深矜全肆赦並行於懲貪癉惡之中將雍正三年以前追賠侵那等項銀兩查明具奏恭候諭㫖分别減免釋放已經陸續奉㫖行知遵照在案是此項追賠侵那等銀俱屬從前各員虧缺正供國帑尚䝉聖主敕查減免此外如州縣徵收耗羡本應起觧充公者或因飬㢘不足未觧藩庫或因正項有虧私行抵補或前官事故無從起解或現任作難不行交代經年累月勒比無完以致正項雖清例應給咨回籍而耗羡未完仍留本地方追比查楚省現有㕘革黄陂縣知縣鈕國亮鍾祥縣知縣李素沔陽州知州髙廷鋐胡御琦通城縣知縣吳文琦孝感縣知縣張𢎞敏江陵縣知縣李徳澂等俱係離任廢員日給不敷何能完解況查李素吳文琦等本名下虧空正項銀米已䝉查奏奉㫖豁免則凡雍正三年以前未完耗羡並非正項自應一併豁除以廣皇恩方與特㫖無悖且容留廢員定例嚴切更不便藉端稽留臣現在分析確查辦理合將雍正三年以前未完耗羡各廢員勒追無完縁由密陳睿覽各省多有類此者應否邀同正項豁除之例概免追求即令給咨回籍則仰戴天恩愈深愈厚矣伏乞皇上訓示遵行謹奏虧欠充公銀兩各員何得混請豁除非正項三字豈可對朕而言侵那公項較諸正項尤宜懲戒此等劣員奚容疎縱當嚴追之雍正十年四月初三日湖北廵撫臣王士俊謹奏為恭報三春雨足米價平減事竊湖北正值東作方興三月初十至十三二十八等日連得時雨早晚二麥倍皆發榮滋長漸已成實豌􅁞二豆春蕎亦俱豐茂鄉民現在陸續浸種四月望後即可插秧所有現今米價均屬平減並無增長不日麥熟登場民食更當充足臣身任地方夙夜倍深敬畏不敢一刻縱肆以期上迓天和仰慰聖懷於萬一謹繕摺奏聞伏乞睿鑒謹奏覽奏二麥雨水情形深慰朕念同日又奏為密請睿鑒事恭照闗聖忠貫日月義赫古今我皇上特隆曠典追封三代備極尊崇解州洛陽之後裔均䝉世襲博士之職殊恩異數直與孔廟同垂不朽矣臣查楚省荆州府為闗聖當年鎮守之地後人即其帥府建立廟宇現在荆州府城南門之内而闗聖陵墓亦在陸安府屬當陽縣之漳鄉迄今封域巍然班班可考是當與解州之祠廟洛邑之陵墓一例尊崇以昭妥侑者也臣抵楚後即飭荆州府知府周鍾瑄親身查勘據稱府城廟宇創建年乆殿廡日就頹損且崇祀三代竟無後殿甚為缺畧其漳鄉祠墓亦俱卑隘不稱觀瞻兩處約湏七八千金即可修葺等語理合密摺恭奏仰懇聖恩准將荆州府城廟貎并漳鄉祠墓特敕整修於公項内動支敬謹承辦庶大典光昭永護萬年之有道威名逺震愈彰赫濯之聲靈矣再查彰鄉奉祀之處現據該府縣詳稱選有裔孫闗朝泰援照解州洛邑准予世襲博士之例另行會疏題請合併陳明伏乞睿鑒謹奏正值軍需浩繁之際汝身為封疆大臣不體國家緩急率意奏請甚屬貿貿無知此工汝其籌度若地方公用所能承辦則酌量修整如或不能姑且待之同日又奏為請㫖事竊楚省州縣毎嵗經徵民米例分漕南二項其漕糧則旗丁領運各於水次冬兑冬開運至通倉交䣃其南糧則各州縣運送荆倉以供滿洲標營兵食臣查通省州縣江分上下相距各千有餘里及二千里不等上江如荆州府屬之江陵公安監利松滋等縣向例南漕均辦如應辦漕糧必運至省城查驗方得交付旗丁裝運下江如黄州府屬之黄岡蘄水蘄州廣濟黄梅武昌等州縣向例亦南漕均辦如派撥南糧俱係逆流輓運毎至四五月内始抵荆倉上下互運不但船戸脚價需用浩繁且風濤不測常有漂覆貽累之苦而兵食反至遲誤所當酌量變通務期漕南兩有禆益者莫如將上江荆屬之江陵等縣無論南漕俱就近留貯荆倉以給兵食下江黄屬之黄岡等州縣無論南漕俱就近兑交旗丁起運如此一經改撥將凡州縣之近南者歸南近漕者歸漕既無遲悞又免跋渉兼省脚費一舉而備三善實為經乆可行現在檄行司道會議詳題理合繕摺恭請睿鑒敕示遵行謹奏具題到日有㫖同日又奏為據實陳明事竊查荆襄等處鄉村貧民前於雍正四五年間被水之時曾有賣身荆州將軍標旗佐領等家服役以圖衣食者當日所得身價不過二三兩契内填一十餘兩不等年來此輩賣身之人因年嵗豐收陸續私潛鄉里地方官縁其賣身旗下不敢不查拘解訊往返拖累甲鄰人等未免廢時失業且一經回旗服役父母妻子不能團聚情殊可憫臣訪聞確實仰體我皇上子恵元元之至意隨密札商之荆州將軍呉納哈凡四五兩年賣身窮民准備當日實在身價許其收贖放回完聚以免查拘拖累兹准吳納哈密覆業將情願贖身之人只􅌳當日原價放歸本籍者已有數百人等語現聞荆襄等處窮民歡聲載道無不感頌皇仁至呉納哈與臣並未識面臣到楚後聞其在荆鎮静和平兵民愛戴即此贖身一節准臣密札即行辦理妥協理合據實奏明伏乞睿鑒謹奏此非呉納哈之辦理妥協葢慮朕有所知聞而見責故為是舉耳操守一節向原可取餘無他長且年齒亦近遲暮矣雍正十年四月二十日湖北廵撫臣王士俊謹奏為楚省晴雨以時入夏秧青麥熟米價平減恭慰聖懷事竊查湖北八府一州仰賴聖主洪福三春雨水調勻二麥長茂米價平減屢經摺奏兹自四月初三日雨後即晴至初七日復經得雨迄今將及半月風日晴朗大麥業已黄熟現在收割小麥豌蠶二豆亦皆秀穗結實鄉村農事克勤田疇水足榖秧亦俱青𤼵二三寸許犁耕蒔插婦子歡忻米價並無增長省城漢口毎石七錢五六分至八九分不等黄州安陸荆襄等府米價俱平且現有常平倉榖遵例出糶民食自能充足為此繕摺具奏伏乞皇上睿鑒謹奏覽雨水麥禾情形及米糧價值朕懐深慰同日又奏為奏明事竊臣奉命撫楚到任五月隨時隨地無不凛遵聖訓夙夜祗懼察吏安民之外即以整飭營伍訓練兵丁為要務查湖北撫標額定經制馬步戰守兵共九百五十五名内除上年臣未到任之先挑選赴陜兵丁外臣於現在標兵無論分防營汛皆嚴諭臣標中軍暨兩營逰守千把等官務令按期操練汰除老弱選募壯健以次頂補總期有一兵必得一兵之實用又以將弁有訓練之專責臣不時傳進内署箭道面加考驗輪番較射分别奬勵以定優劣又因湖北籐牌兵丁俱不能嫺熟臣隨差人前至廣東製買籐牌一百面己經運回分給標兵督令教師演習以備實用臣雖不才向亦留心武備今謬膺重任敢不殫心竭力加意整飭以盡職守理合將訓練標兵事宜具摺陳奏伏乞皇上睿鑒謹奏武備實為地方要務極當竭力整飭勿懈同日又奏為據實自行檢舉仰祈睿鑒敕部嚴加議處事竊臣前在廣東布政使任内因保昌縣縣丞邱慤委辦修築圍基實能勤謹任事並無遲誤曾於遵㫖保舉案内經臣保舉引見荷䝉皇上天恩命往廣東以知縣補用復經督撫會題實授陽江縣知縣三年以來未有隕越及臣自上年奉命撫楚離粤之後仍時為訪察恐其少有過犯臣咎難逭兹臣差家人自粤回楚風聞邱慤於本年正月内官署盜失餉銀匿不通報輙刑訊無辜索借士民銀兩賠補餉銀似此不職之員臣訪聞既確深愧不能知人誤保理合據實自行檢舉伏乞皇上敕部嚴加議處施行謹奏大凡舉薦人員何能保其始終不移但能除去私心不相袒庇亦可以告無過矣所奏知道了雍正十年五月十八日湖北廵撫臣王士俊謹奏為恭報二麥收成禾苗得雨米價平減上慰聖懷事竊照湖北三春晴雨以時二麥長茂前經屢摺奏報兹查通省二麥收成分數十分九分八分者居十之五六七分者居十之三四鄉民一面收麥即一面䅤秧臣於五月初六日率同司道府縣各官齊至郊外勞勸農夫宣布皇恩勉其力作親見四野秧青如繡田間饁餉婦子維勤正在望雨誠求而本日晚至初七日午前即得甘霖禾苗滋長今本月十一十五等日連得大雨髙下田疇無不霑足不特早稻之秧已插者浡然興起即晚稻之秧苗亦各乘時遍插現今武昌漢鎮米價毎石七錢六七分至八錢徳黄荆襄各府米價亦俱平減所有二麥收成分數及禾苗得雨情形理合恭摺奏報伏乞睿鑒謹奏二麥收成分數暨禾苗米價情形以手加額覽焉同日又奏為請㫖通行事竊臣歴任河南廣東以及現今楚省凡接准部行奉㫖事件轉行下屬豫楚院司各衙門俱用紅筆圏點標日判行廣東則於部文奉㫖轉行文内院司俱用劄付式年月下墨筆標日後用押字概不點硃三省式不畫一臣思上司行文下屬例用紅筆明統屬也若部行奉㫖事件則有君命在焉臨文詎可不加敬謹今一概硃標僉判實非臣子所敢安臣循照而行舉筆倍深惶悚如照廣東程式不知者又謂紛更不敢不據實陳奏請㫖敕部定議嗣後各省接准部行内有奉㫖事件俱用劄付式墨筆書押概不用硃惟院司自行牌票仍照常僉判如有轉行奉㫖事件違例用硃者以違制論如此則等威有辨一奉行而尊卑之分秩然上下率由一舉筆而敬謹之心常在矣臣不揣愚昧是否有當伏乞皇上睿鑒敕議施行謹奏與督臣商酌行之何慮有紛更之議此事直省各循舊式其來已久不便敇諭通行改易同日又奏為據實奏聞事竊查楚省江湖村鎮毎多竊刦臣到任之後即嚴行保甲實力稽查武漢沿江如八吉堡等處最為要害之地該處輪派標兵分防彈壓臣復密飭署中軍㕘將阮玉堂守備林武畧不時查訪積窩慣賊會同各縣捕廵立法嚴拏在案兹據該備躧緝八吉堡地方有積窩徐中和錢晋封二人暗樓邃室慣積外來匪類駕船竊刦坐地分贜查有上冬漢口河下客舟被盜失去黄絲胡椒各案捕役知二人素為窩家密與講和受賄縱放僅以匪竊三人出名頂案復令徐中和冒稱行家首報巧為漏網等情密禀到臣即飛飭擒拏當獲積窩徐中和錢晉封即於徐中和錢晉封家樓房内搜獲匪黨徐三周四并行刦江南儀徵縣有名盜犯楊起夏又起出盜贜以及為匪囤船三隻灣泊河下續獲匪犯劉夸子等俱經押發按察使唐繼祖收審竊刦各夥黨其江漢兩縣捕役劉玉李祥劉元陳泰亦俱獲禁現在嚴究事闗拏獲積窩理合奏報伏乞皇上睿鑒謹奏能靖積窩方為弭盗之源殊屬可嘉之至同日又奏為據實密奏事竊臣撫楚以來留心察吏毎見所屬各官怠於政事且操守一節通省州縣俱難憑信甚至貪詐而以為才能巧取而視為固有潛遣家人坐省専伺上司意指希圖掩飾趨避勾通院司書吏在外打網張羅密行交結探聼風聲造作蜚語乘間抵隙讒妬公行深為風俗人心之害臣嚴加察訪訓誡提撕立法稽查設單課吏所有院司衙門網工積蠧俱各嚴拏究處一切坐省家人悉皆飭行驅逐不許潛居省會恣意招揺無非肅清吏治整飭官方共勉實心實政不邀虚譽虚名臣以藩司為通省庶官之領袖賢否優劣自宜隨地留心得資考核闗防嚴密詳慎機宜最為緊要是以臣凡訪有屬員劣蹟必交藩臬兩司公同確訪并密商督臣細查實據然後分别㕘處乃臣毎詢藩司徐本其於屬員之優劣究屬茫無確見凡有臣交訪密單多宣洩外揚一切辦事毫無擔當且藩署名為封鎻闗防一切吏役未能嚴加約束此臣所不敢代為狥隠者也邇來各屬坐省家人雖亦稍知顧忌而肆意妄行者尚多陽奉隂違即如興國州知州魏鈿臣訪其劣蹟有勒借衿監富民十餘户毎人各一二百兩託稱買榖勒賠􅌳價私立鹽税索派里民辦理軍需短發馬價皆有受害確據臣現已密商督臣飭審在案而魏鈿更有縱容無忌者本年三月二十三日臣當堂親拆各屬公文於魏鈿申文内忽夾私書一封隨經拆閲仍欲探聼上司新聞中多隠語又云坐省人已如昔矣夜郎烏知之等語臣知其誤投而坐省一語有闗吏治特發兩司傳訊魏鈿據供係伊内幕劉容所作因劉容之父係武昌革職知府張淑郿内幕平日父子勾通探聼消息此書原欲投知府衙門不料投入廵撫文内及訊其坐省家人則現有家人蘇貴在省訊其夜郎何指則斥臣為貴州人現有兩司取魏鈿親筆供單可據臣隨將私書􅊾行署武昌府康忱提訊蘇貴劉容交通情節魏鈿不但庇匿劉容更云臣係邉省孤人知府何故急遽乃爾等語竊臣荷蒙聖明知遇千載一時察吏除姦是所専責不避嫌怨不狥情面有言必告何敢稍有欺蒙自干重咎今楚省吏治若此所闗甚大力除惡習整飭宜先除魏鈿劣蹟現俟督臣飭審題㕘外所有察出私書并驅逐網工坐省各情節理合繕摺恭行密奏伏乞睿鑒謹奏秉公執法整理地方是乃専責有何顧忌耶雍正十年閠五月十三日湖北廵撫臣王士俊謹奏為恭報楚省田禾雨足米價平減仰慰聖懷事竊照湖北本年麥熟登場之後通省晴雨以時米榖價平人民無不安居樂業勤力耕耘禾苗徧野自五月十五日大雨霑足至二十一二三等日連得時雨閏五月初四初七初八等日屢獲甘霖逺鄉僻壤髙下田疇稻黍雜糧以及瓜蔬各種悉皆豐茂早禾現已揚花吐穂中禾晚稻亦俱芃芃生發不特武漢二府近省為然即據黄安徳荆襄鄖歸各府州陸續具報所屬得雨日期雖稍有先後亦無不足之處現今武漢二府米價俱平各府亦無増長所有楚省目下禾苗雨足米價平減情形理合恭摺具奏伏乞睿鑒謹奏覽奏楚省雨水霑足米價平減曷勝欣慰同日又奏為直陳汛兵􅃅召之弊請㫖嚴行飭禁事竊查楚省江湖􅆜港四通八逹所設塘汛左近毎有漁船匪棍及積窩夥黨平日皆與汛兵熟識私餽魚觔財物不法之徒利其常規勾通一氣多有暗傳消息行刦分贜者盖楚省江湖各汛向用牛角海螺二種以為號召聲援之具毎當客船灣泊過夜汛兵見無重貨客船則借螺角之聲私傳暗號姦匪知無所得伏而不行若有重貨客船見其人多準備汛兵輙將螺角另易其聲以便姦匪相機行事或止有貨船而無準備者則螺角之聲又作一樣吹動肆行竊刦而遁臣前會試往來楚省親身目擊其事迄今留心察訪此害未除大為行旅之患臣思安兵設汛原以衛民守夜廵更梆鑼鳥鎗實堪利用彼螺角出於人聲變換作姦使人莫測不若梆鑼聲響難於假借放鎗警衆捍禦功多應請嚴行飭禁嗣後水陸塘汛不許仍用海螺牛角私傳暗號惟於定更之際許放鳥鎗傳警以次鳴鑼擊梆捱更守望毋得間斷本管員弁密加查察違者即行究治一遇有警梆鑼齊擊立即放鎗追捕不許遲延託稱黒夜縱逸并於緊要口岸之塘汛嚴定賞罰以示勸懲如此則暗通消息之弊可杜而塘汛得収實效矣是否有當伏乞皇上睿鑒施行謹奏無論吹角鳴鑼皆資防守乃營汛中之小節何難言之督提二臣㑹商更定耶雍正十年六月十二日湖北廵撫臣王士俊謹奏為據實查奏事竊湖北兩司不和一案臣檢閲原巻其事初縁鹽道書辦陳臯聲私刻假印水程給商行銷引鹽經襄陽府同知李昌期查出通詳發審總由前任鹽道柳國勲曲護鹽房書辦不行嚴究假印水程反囑承審之官輕擬外結承審知縣王琪遂因此婪贜按察使王肅章扶同狥隠於前訪聞檢舉於後布政使徐鼎則以會審之事獨自詳駁延案不結均難辭咎今據現任布政使徐本會同各道審詳招解到臣而假印水程一節依前審擬究屬含混不明難成信獄臣即嚴加駁飭覆審并密諭現任鹽道楊宴㑹同糧道張廷樞將鹽道衙門歴年各州縣所􅌳水程逐細按照號簿查驗有無假印以憑究審隨據該道等檢出雍正五年正月行銷乙已綱假印水程八十四張雍正四年十二月乙已綱假印水程五十七張雍正元年行銷辛丑綱假印水程三張康熙六十一年辛丑綱假印水程八張并於稿簿内查出雍正元年三月十一日該書辦竟用假印案稿繳銷鹽引赴兩淮鹽臣衙門投遞公然釘入簿内從前各官總未察出明係鹽道衙門書辦歴來積弊今始一一敗露當飭嚴加究訊已據審出假印水程原係從前經管水程書辦王曰恒即王北山販買私鹽而起後被陳臯聲看破隨通同偽造行使當拘王曰恒質審供認不諱除現飭該司道等徹底清查究明該書辧等得贜若干并歴任鹽道有無知情行鹽各商是否通同作弊確審定擬招解外惟是臣於命盜等案無不細心推鞫隨到隨審具題完結案無留牘不敢稍有稽延而獨於此案總因司道等多所瞻顧一味因循憚於窮究不得不為出假印水程根由理合據實具奏伏乞睿鑒謹奏覽雍正十年六月二十七日湖北廵撫臣王士俊謹奏為恭報早稻收成分數米價平減事竊查湖北地方自六月十五十九二十一等日大雨之後旋即晴明鄉民各將早稻收穫據藩司開報武昌府屬早稻收成十分者居十之三九分者居十之七漢陽府屬十分者居十之四九分者居十之六黄州府屬十分者居十之三九分者居十之五八分者居十之二安陸府屬九分八分者各居十之五徳安府屬九分八分者各居十之五荆州府屬十分者居十之二九分者居十之五八分者居十之三襄陽府屬九分者居十之四八分者居十之六鄖陽府以及歸州山多田冷早稻無多收成亦有八分至於各屬中禾現皆秀碩晚禾悉皆暢茂目今米價因新榖已登較前日漸平減通省大畧相同理合繕摺奏聞伏乞睿鑒謹奏覽早稻收成分數深為額慶同日又奏為據實查案陳明仰祈睿鑒事本年六月二十日臣於邸抄中見有督臣邁柱一件題明事查㕘黄州府知府康忱於署武昌府任内以黄安縣典史通揭知縣馮為榕重耗係藩司委員拆兑康忱捏作自行訪聞違例用武昌府印文揭報又狥縱典史貪婪於前屢圖規避處分於後督臣作自行檢舉題㕘等因臣接閲全抄不勝駭愕隨即細查原案康忱於本年三月二十五日委署武昌印務其本任黄州府事恐不能兼顧雖委蘄州知州蔣嘉年暫行護理而一應經手錢糧及所屬倉庫俱例不交代業經咨准部覆在案實與本任卸事者不同康忱於四月二十一日在省訪聞黄安縣知縣馮為榕重耗曾嚴檄行查并闗護府查報府牌於四月二十六日行到黄安該縣典史章文傑乘機始於二十八日具詳報府原未通揭護府蔣嘉年據該典史文轉報於五月初三日到省經臣批行藩司委員前赴黄安拆驗銀櫃并訊取總吏經承確供飛報去後護府蔣嘉年復先准康忱移會即於初三日密委黄州府經歴前往黄安提取銀櫃於五月初八日押解到司藩司即將銀櫃發交康忱㑹同署武昌通判卞澍拆兑重耗是實康忱隨於五月十二日通揭并據兩司轉揭經臣會疏題㕘在案是馮為榕之重耗確係康忱查訪在先厥後典史之詳府藩司之委拆又係康忱經手據實報㕘並非因典史通揭藩司查出而康忱敢於捏作自行訪聞也今督臣並不詳查案情先後月日又不與臣會稿輙以疑似之見檢舉題㕘是欲暗歸臣咎而臣實無瞻顧􅃝護之處臣受皇上隆恩畀以廵撫重任幸與督臣共事惟願同心協濟始於封疆有益何敢有一毫私意致蹈黨同立異之嫌但督臣才識逺大臣雖不才亦不敢依違遷就有負聖恩不得不將康忱被㕘情節備陳天聽仰懇聖明洞鑒抑臣實有請者臣以寒素書生邉方愚陋䝉我聖主特達之知拔置雲霄之上臣日夜感泣惟恐報稱之未遑何敢復有冀望與督臣爭較之處第臣識見短淺封疆重大督撫偶有不協必致貽誤地方闗係非淺伏乞皇上天恩憫臣愚魯調臣部員俾臣朝夕親領命之至謹奏康忱一案交汝審理已有㫖矣其間有無屈抑是否捏揭汝查審後自悉假若被枉是實即當秉公為之剖析設汝懐私袒護抑或固執已見文過飾非亦難逃朕之鑒照汝與該督邁柱意見不協遂奏請内調甚屬無謂全不知朕用人行政之苦心卑鄙褊淺殊失大體從來同官共事未有公而不和者朕時時以此訓諭内外臣工即訓汝亦經數次豈竟遺忘耶果能公自無不和在内在外俱係坦途倘不能公則跬步之間難免滯礙何有内外之分汝不過因㕘官一事偶與邁柱不合輙輕視封疆委任祇為一身利害趨避計此心尚可問乎由是觀之失和衷之道在汝而不在督臣向後當返己省疚切勿甘狥私懐而負朕知遇之恩如邁柱含怨於汝或有假公濟私之端亦安能逃朕之覺察也此奏朕甚不取未料汝胷襟狹隘不知朕至於斯極朕雖乏聖哲之資但一光明正大無固執袒庇之念實可質諸天日汝第加勉自信之道朕信在其中矣無須瞻顧揣度從前訓汝者甚明悉宜遵奉行之雍正十年九月十二日湖北廵撫臣王士俊謹奏為恭謝天恩事雍正十年八月初五日臣齎摺家人回楚恭捧皇上賞臣花屯絹兩疋蜜荔枝一瓶到臣隨恭設香案望闕叩頭祗領訖伏念臣職任楚疆時深兢惕疊蒙我皇上至髙至厚之恩賜衣賜食之寵絹出尚方機杼而新成花樣仰皇上睿鑒謹奏覽奏謝知道了同日又奏為恭謝聖訓敬繳御批事本年七月二十四日八月初五日臣兩次齎摺家人回楚奉到御批摺匣臣俱恭設香案望闕叩頭敬謹啟匣跪捧硃批祗凛諭臣公則未有不和任事豈容瞻顧煌煌天語至聖至明警誡之中倍加策勵聖恩深重至此報稱愈覺難言況臣邉方下士特荷千秋之奏覽同日又奏為恭報鄉場試竣仰祈睿鑒事竊照湖廣鄉試荷蒙聖恩南北分闈之後湖北毎科額中舉人五十名外輪加五經中額本科應得三名又恩加正額五名共該中式舉人五十八名臣於場前將一應科場事務遵照部頒條例應出示者大書告示明白曉諭應備辦者􅊾行藩司先期料理於八月初三日欽差正副主考李錦鄧啟元到省臣即照例闗防嚴密於初六日將主考房考等官一併送入文闈自初八日起至十六日止三場試竣稽察嚴密士論帖服至於場内受巻彌封等五所臣俱親身督察無分晝夜勤慎小心次第交明巻數批解内簾聼候秉公取録今於九月十二日揭曉出闈除題名試録另行恭疏題報外所有㣲臣監臨場務辦理完竣事宜理合繕摺具聞往屆三場試藝貼出違式者甚多皆由學臣録科濫取之故今科合計三場錯誤被貼者僅三百乞皇上睿鑒謹奏嘉悦覽之同日又奏為奏明事竊鄖陽所屬墾荒一案自奉㫖之後臣即詳悉曉諭鄖屬民人勤力務本各將就近未墾田地相度土宜用工墾闢飭令地方官不時親身督察善為勸導力能多墾者酌量奬賞無力開耕者借給牛種助其耕作將現墾地畝報名入冊仍按水田旱田起科年分照例輸糧務使民無餘力地無曠土以仰副我皇上子惠元元之至意今自本年五月起鄖屬六縣據報現已開墾及自首田地共二百六十六頃有零尚有陸續墾報者甚多其鄖屬各縣令内除竹山縣知縣王模奉㫖署理甫經到任容試驗外其鄖縣鄖西房縣竹谿四縣現於勸墾案内竭力辦理俟試看半年之内果否實心勝任再行酌量更換請㫖調用業經咨准部覆在案至保康一縣地僻民刁現任知縣何塏辦事平常於勸墾一事奉行多有未善臣現在會同督臣另選能員題請調補以收實效理合奏明再查楚省鄖陽一府之外如直隷歸州及荆州襄陽等屬亦多未墾地畝臣俱一體通行示諭已據各州縣漸次報墾俟有成效另行具奏合併聲明伏乞睿鑒謹奏覽奏墾闢情形知道了勤加督率該有司實力為之同日又奏為奏明事竊照荆闗税務臣自上年十一月到任接管俱委交荆州府知府周鍾瑄就近查察監收無論正税餘羡悉令儘收儘解一切陋規加耗嚴飭革除務使弊絶風清以仰副我皇上加惠商旅裕課釐姦之至意惟查闗書差役必得會計精熟廵查勤力者方堪任使前因趙之均管闗案内督臣審題將通闗書役一百一十餘人概入欽案問擬追贜幾無一人辦事即新募書役又俱一時不諳闗務辦理茫無頭緒臣再四籌畫若輩姦良不一原難概論在有名積蠧固不容復入滋事其間豈無誠實因人連累者坐贜非其本罪平時尚屬小心則與已革復充者有間與其驟行召募既難旦夕任用且多係伊等子姪親朋承頂除之不可勝除不若擇其舊役之謹慎守法素諳闗務者嚴加約束兼同新役暫為㕘用俟新役熟練再將舊役飭令歸農如此則公務不致有誤而定例亦無違悖矣臣為辦理闗務起見理合據實奏明伏乞皇上睿鑒謹奏召募書役係汝等酌度可否而行之細事不應上聞於朕此奏甚覺失體朕亦無可批示雍正十年十一月初三日湖北廵撫臣王士俊謹奏為恭謝聖訓敬繳御批事雍正十年十月二十四日臣齎摺家人回楚捧到御批摺匣臣隨叩頭敬啟跪讀硃批各摺諭㫖字字提撕言言策勵擴淺狹之知識而責已貴嚴即一言一動必熟思審處求其至當而後可措諸施行篤僚友之寅恭而待人以誠即所見所聞必設身處地為所當為而不敢一毫矜傲事必歸諸公正茍執人已意見即為有負君恩理無取乎黨同稍或瞻顧依違必致有乖國體是我皇上之訓誨周詳皆聖賢所不能外而我皇上之期望深逺亦祖父所不能加臣撫躬惶汗感激難名惟有凛遵聖訓公正統屬和平接物安詳舉動慎重言行協和同寅慈愛黎庶務期身體力行必誠必敬以仰報髙厚深恩於萬一耳謹此繕摺叩謝天恩并將奉到御批奏摺恭繳伏乞睿鑒謹奏今命卿總督河東矣田文鏡莅豫七八年來可謂殫竭心力諸凡舉措深愜朕懐事事俱屬妥協卿向為屬員洞悉伊之居心辦事況蒙保薦始獲陞晉兼公私之誼而論皆當一一遵守成規不宜任意更張另求美好也能如此即為朕所嘉是若别逞伎倆冀朕優奬為超越田文鏡之人則反誤矣卿不及田文鏡逺甚祗遵朕㫖勉力為之同日又奏為恭報楚省豐收米價平減事竊照湖北本年雨水調勻髙下田禾俱獲豐稔前經具摺奏聞今據布政使鍾保開報通省實在收成分數查武昌府屬十分九分者居十之六八分者居十之四漢陽府屬十分九分者居十之七八分者居十之三黄州府屬九分八分者各居十之五安陸府屬九分者居十之七八分者居十之三徳安府屬十分者居十之三九分者居十之七荆州府屬十分九分者居十之七八分者居十之三襄陽府屬九分者居十之四八分者居十之六鄖陽府屬九分者居十之三八分者居十之七歸州屬九分者居十之四八分者居十之六再查武漢二府米價毎石六錢三四分至六錢八九分不等雜糧亦俱充足其餘各府屬米價俱不出七錢之外城鄉黎庶無不含哺鼓腹共樂昇平臣身任封疆欣逢樂嵗惟有宣布皇恩勸民力敦節儉倍深寅畏不敢一毫怠肆以期敬迓天和於永久耳所有湖北收成米價情形理合繕摺恭報伏乞睿鑒謹奏以手加額覽之邁柱王士俊同省共事感蒙上天慈佑屢賜豐年乃自然之理也知此理之昭然不爽而不愈勉寅畏可乎同日又奏為仰懇聖恩事竊照荆州府城闗帝廟宇為當年鎮守之帥府前因年乆坍損經臣摺奏於荆闗節省飯食項内動支修整去後今據荆州府申報前項廟宇擇其應行修整者逐一辦理并新建三代崇聖祠及鐘鼓二樓俱於本年十月初二日竣工廟貌煥新觀瞻大壯共用工料銀二千餘兩等情前來臣伏思闗帝血食萬方而荆州尤為靈爽式憑之地且當陽祠墓巋然載在史冊本年又據後裔闗朝泰呈請援照解州洛陽之例題請䝉皇上天恩敕部議准世襲五經博士給劄欽遵在案兹逢闗廟新修神靈妥侑臣不揣冒昧敬敢上懇天恩准賜頒𤼵御書扁額俾臣敬謹恭製擇吉懸掛昭示萬世則龍章寵錫益彰赫濯之聲靈宸翰光昭永護金甌於鞏固矣謹奏照該撫所請行交翰林院擬扁進呈候揀定書𤼵同日又奏為據實奏聞事竊照本年夏間山東兖州等處雨澤偶愆荷蒙皇上天恩差員分賑嗣經得雨旋獲豐收東省民人無不仰被恩膏樂業安居各得其所臣毎閲邸抄實深慶忭兹於十月初九二十四五等日據江夏漢陽二縣陸續具報東省來楚就食民人徐梅李應成等一百六十八戸計大小男婦五百七十餘名口詢據伊等咸稱俱於本年閏五月間未經得雨之前各由郯城沂州等處小路沿鄉覔食而來不知本省十分豐收等語臣隨諭令江漢二縣好為安頓并查伊等年力强壯者居多從前一時無知逺出本非樂於轉徙游惰忘歸者可比現今雖值隆冬天氣晴暖自楚至東計日可到必年内早得歸家春耕始可無誤自不便任其久留覓食臣即一面查照伊等籍貫住址密咨河東督臣田文鏡山東撫臣岳濬知會接收安插一面即自捐飬廉按照冊開大小名數逐名各給路費委員分起護送出境仍令闗會前途州縣按起接護前進今據江漢二縣具報於十月二十七八等日俱經委員逓送起程去訖但恐尚有陸續前來者臣當一體捐給隨到隨行護送不致少有失所也所有資給東民回籍縁由理合據實奏聞謹奏欣悦覽焉料理殊屬可嘉之至雍正十年十一月二十五日湖北廵撫臣王士俊謹奏為陳明勸墾之實效仰祈睿鑒事竊照楚省荆襄鄖歸四府州所屬曠土固多隠匿亦復不少歴來州縣各官祗以奉行為具文未見實心辦理甚至民間已將現墾之地首報陞科州縣於首報之年即私收銀米入己捏稱新墾詳報上司挨至六年十年方行入冊徵解是小民尚知畏法奉公而官吏竟敢私侵中飽此楚省積年錮弊從前院司道府狥隠之咎所不能辭者也臣扺任後廉訪巳得其概不但檄行申飭至再至三亦且耳提面命多方誡諭不遺餘力本年五月欽奉諭㫖令臣督率勸墾臣復令州縣官隨地因時善為勸導實力開墾通計荆襄鄖歸四府州屬據報雍正十年分共首墾田地二十三萬五千一百餘畝除新墾者俱按照年限陞科首報熟業者俱即隨年入額徵觧從此實力奉行自當日有成效仰副聖懐至於官吏私侵糧税現據襄陽府查出棗陽縣於雍正二年報墾旱地一萬八千餘畝毎年該納糧銀七十餘兩計至癸丑年方届陞科之限而前任各官即於報墾之年侵收入己現經會疏㕘追在案此外或有似此侵收在官者俟確查到日再行㕘追理合將現今勸墾巳有實效情形恭摺奏聞伏乞睿鑒謹奏楚省勸墾一事甚為緊要今既行有成效可詳悉告之新撫徳齡倣照經理同日又奏為敬陳末議仰祈睿鑒事竊查私鑄錢文定例為首及匠人斬決為從及知情買使者絞決房主鄰佑總甲十家長知而不拏獲舉首者俱照為從例絞決等語夫為首者造其意匠人者成其事俱罪無可寛至於為從之中間有鄉愚無知一時受雇傭工為之挑水打炭所司間雜之事而非合夥分利幫同鑄造者其情似稍有可原知情買使之中亦有停工散局之後方知私鑄貪其價賤偶為買使而非當場興販者房主甲隣人等或非貼近居住一時失於查察及有聞見即行驅逐因恐牽連遂各扶同狥隠而非受其賄囑庇護者此等之人皆非本身自犯亦屬稍有可矜因例内向未分别重輕故俱問擬絞決若輩到案自知必當正法往往茹刑狡辯案莫能結轉使為首匠作諸人監斃獄底不能明正其罪前有孝感縣拏獲私鑄一案經前撫臣魏廷珍審明將知情受雇之李世熙等定擬絞決具題蒙皇上如天好生念係受雇傭工之人與合夥私鑄者有間𤼵往口外種地處效力贖罪欽遵在案雖此案出自特恩非臣下所敢援引定擬臣恐以後案件有承審之員疎忽從事者以例内原無輕重之分不將各犯情由逐細審出致該犯等情罪不能上達聖聰亦未可定故敢冒昧陳請嗣後承審私鑄之案可否亦照强盗并鹽梟聚衆拒捕之例令承審各官務將法所難宥及情有可原之處一一分析於疏内聲明仍照本例分别斬絞定擬立決聽候法司覈覆將法所難宥者即行正法情有可原者酌議發遣或懇敕部將從前定例酌量情罪再為分别以定輕重庶無知誤犯之人皆沐矜全而承審之員亦得易於審結案件不致乆懸矣再查拏獲賭具定例知縣加二級知府加一級司道督撫等官紀錄二次又拏獲賭具製造不過半年者照例議叙失察已過半年拏獲者止免失察處分不准議叙典史廵檢吏目守備千總把總等官拏獲者亦照州縣例議叙等語誠我皇上鼓勵臣工之曠典也但地方各官賢愚不一狡詐多端如一官拏獲而同城文武佐雜等官輙稱會差查拏紛紛具報更有後官拏獲而前官稱為先已訪聞移闗新任拏獲者弊端不可枚舉伊等之意不過圖免失察故為捏報存案迨後審解又因通報之時已稱協同查拏承審各官無從察其底裏遂照原案將協拏各官職名一併開列聼候部議是伊等既得規避失察處分復敢倖邀議叙其為欺罔實甚臣愚以為欲禁其欺罔之端先開其可寛之路應請嗣後拏獲賭具亦照拏獲私鑄之例文官拏獲并免同城武職處分武弁拏獲亦免同城文職處分交界之所此縣拏獲彼縣亦免處分止令拏獲之員據實申報俟結案日准予議叙如有實在協同拏獲之員必將如何協拏之處一一聲明以憑察核倘有捏飾從重議處至知府以上各官拏獲者不得概免所屬官員處分致使屬員怠玩不行查禁其後官拏獲者若將前官竟行寛免恐其在任之時以為事無後慮不實力稽察亦未可定惟甫經離任失察不過半年者方准免議如失察已在半年以上離任者後經别官拏獲前官仍行議處再查例内所開失察已過半年拏獲不准議叙之條似指本身失察而言若前官失察已久而後官於到任後半年以内拏獲者其從前失察之處實與後官無涉亦應照例一體議叙又有捕盗同知通判直隷州州同州判等官例内尚未議及如有拏獲者或照州縣例議叙或照知府例議叙仰懇敕部一併分别定議至督撫司道等官加級紀録之處應仍照定例遵行庶查拏之員不敢再生欺罔而賞罰攸分拏獲之員益知感戴力圖報效矣以上二條係臣芻蕘之見是否有當伏乞皇上睿鑒施行謹奏所奏是該部詳細分别定議具奏雍正十年十二月初十日新陞河東總督臣王士俊謹奏為恭謝聖訓敬繳御批事本年十二月初七日臣齎摺家人回楚捧到御批摺匣臣隨恭設香案望闕叩頭敬謹啟匣跪讀硃批諭㫖欽遵祗領之下伏念臣受皇上天恩至髙至厚平時之訓諭提撕靡不刻鏤心版寤寐弗諼至督臣田文鏡公忠體國宣力封疆七八年來事事實能仰契聖心克盡大臣之職臣向在祥符親承教導感佩實深志期則傚已非一日今蒙聖恩授臣以河東重任步趨其後論臣之材識萬不如田文鏡之逺大周詳而念臣之居心實無異田文鏡之致身竭力何敢妄逞一毫意見輕事更張非特私心無以自安更何以仰承君命惟有祗遵聖諭恪守舊章奮勉自勵以求無忝職守所有臣恭領聖訓理合繕摺叩謝並􅌳硃批奏摺伏乞皇上睿鑒謹奏如此立志朕嘉是覽之硃批諭㫖巻七十三之五
