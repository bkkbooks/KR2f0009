body:
  text: 欽定四庫全書硃批諭㫖巻一百九十五硃批彭維新奏摺雍正七年閏七月十六日吏部右侍郎署理蘇州廵撫印務總理清查錢糧事臣彭維新謹奏為請㫖事竊照清查江蘇各屬積欠錢糧前奉諭㫖令原任戸部侍郎臣王璣與臣㑹同撫臣尹繼善御史伊拉齊總理其事所有欽命總理清查關防一顆向係王璣收掌因王璣奉㫖革職於本年七月二十一日交送到臣臣隨具疏題報在案臣伏讀諭㫖工部侍郎馬爾㤗著往江南與彭維新等同辦清查錢糧之事御史安修德亦著前徃協同辦理欽此欽遵今侍郎臣馬爾㤗同協辦御史安修德俱巳抵蘇其清查事宜臣等謹遵聖諭凡一切案件俱係公同敬謹辦理所有總理衙門關防應否交送馬爾㤗收掌嗣後凡公辦清查錢糧事理仍行公同用印相應繕摺請㫖伏念臣受恩愈深矢報彌切臣於清查一案責任固不敢稍諉心力更不敢稍懈惟是從前所辦實屬負職荷䝉皇上不加罪譴更命臣署理廵撫重任臣從此益加勉勵督率印協各員實力辦理務期清釐以圖仰報聖恩為此謹奏清查一事汝等秉公盡心與否斷不能掩朕耳目斯乃朕留心經理之要務也勉爲之同日又奏為奏聞事臣查江蘇所屬地方自夏入秋雨水調勻早禾業巳登場據各屬報稱收成俱有八九十分不等市上米價平減其晚禾現在晾花結穗青葱荗盛將來秋收豐稔巳可預慶理合繕摺奏聞仰慰聖懷謹奏深慰朕懷但以公忠之心黽勉吏治上天自無不昭錫嘉應之理其效㨗如影響也勉之同日又奏為據實奏聞事臣仰荷聖恩署理江蘇撫篆到任之後查得本年六月初三七月十六十八二十二二十八等日據潼安衛邳州睢寜宿遷江都等縣各報蝗蝻生發隨飛飭撲滅去後復據各屬覆稱幸係蝻子初生尚無羽翼立時撲滅淨盡竝未損傷田禾又據六合縣報稱七月十四日夜風雨交作倒塌民間瓦房四十七間草房一千三百二十一間營房六間被水男婦八百二十九名口打傷男婦二十二名口壓死男婦十二名口随經飛飭布政司一靣查勘一面議動公項銀三百兩委員往查賑濟又據長洲縣報稱閏七月初四日未時火藥局失火燒坍小屋三間當即救滅燒斃夫匠王茂榮曹阿華二名燒傷程三等十四名臣即捐銀分給燒斃各家買棺領埋被傷各家醫藥調治復據蘇州府查報緣藥局初移地潮藥濕匠頭程公遠將藥曬晾各匠在於石臼中碓藥臼嘴迸出火星烘去火藥四十餘石硝磺十餘石即時救滅幸大火藥局依然無恙竝未延燒民房經管局官情願賠補等情除嚴飭官匠人等嗣後加謹防範不致稍有疎虞外理合據實奏聞謹奏覽所奏數件大槩朕皆巳聞矣内惟火藥局聞係新改設者或方向有不合宜處亦未可定再舊局地方恐有遺存前人所藏之藥搬移未盡者尤當檢點詳愼雍正七年八月二十九日總理清查江蘇等處錢糧事務署理蘇州廵撫吏部右侍郎臣彭維新等謹奏為奏聞事臣等奉命清查積欠錢糧時凛聖訓凡與分查大員㑹商及接見各府州縣印官協查人員均行切加訓誡飭令實心辦事倘各員内有辦事不妥之處臣等一有所聞即當陳奏兹聞得分查鎮江府錢糧汀漳道朱鴻緒辦事任性舉動輕率江常鎮道王之錡來蘇時臣等公同面詢據稱朱鴻緒辦事頗能盡心而行事率多任意有丹徒丹陽民役人等因其告狀不實回話舛錯或令自吞狀紙以辱誣告之人或令舌䑛塵土以示錯誤之罰又因金山寺僧有積欠錢糧百餘兩朱鴻緒令其全納以瓦片摩頂示辱又在城隍廟速報司内將欠糧人姓名單令道士日逐念誦儆其完糧又於拖欠錢糧之胥役人等不行杖責令人以掌擊頸又或對人云積欠錢糧務於兩年限内全數通完方免分查後累等語度其心原為急欲懲治頑抗而迹其所行諸事未免輕率怪誕本應立時叅奏臣等再四思維朱鴻緒係分查大員若以催追稍覺過嚴舉動渉於輕率遽被叅劾恐長刁風業經傳調朱鴻緒來蘇靣加訓誡嗣後如仍不悔改臣等再行據實題叅合先奏聞謹奏所奏是朱鴻緒舉動雖屬失於檢點之小過尚在可恕但似此輕率怪誕恐大過即隨之矣議覆條奏之摺另有㫖交部頒發雍正七年九月二十五日吏部右侍郎署理蘇州廵撫印務總理清查錢糧事臣彭維新謹奏為據實覆奏仰祈睿鑒事竊臣具奏早禾收成分數一摺奉到硃批臣惟有敬遵聖訓黽勉吏治永矢公忠於一切政務䇿勵駑鈍不敢少有怠忽又臣具奏清查錢糧一摺奉到在的名則將來自難拖欠又臣具奏蝗蝻雨水火藥局失火一摺奉到硃批臣查看改設藥局方向係正南實不相宜今謹擇壬癸方四面距民居濶遠地復髙爽將來專貯硝磺其軍器等項當另貯髙塏之房至舊藥局有無收藏或搬移未淨現在確查竝深掘驗看又臣具奏辦理積案一摺奉到硃批臣自接印辦事以來毎日竭力儹辦臣辦過新舊案件巳經具題者共二百二十餘案巳經咨部者共一千一百八十二案從兹舊案漸覺清理合併奏覆謹奏嘉悦覽焉同日又奏為據實奏聞仰慰聖懷事竊照江蘇所屬地方今嵗晚禾收成分數經臣行據布政使髙斌查據江寜蘇州鎮江淮安四府屬通計約有十分及九分以上不等常州松江掦州三府太倉通州二州屬通計約有十分九分八分以上不等邳徐海三州屬通計約有九分八分七分以上不等其髙梁豆粟芝麻棉花并各色雜糧俱皆豐熟霜降以後連日晴霽俱巳收穫登埸各屬市鎮米糧價值平减羣黎樂業父老歡呼理合具摺奏聞謹奏覽收穫情形實慰朕懷同日又奏為奏聞事竊照鄉試掄才大典攸關兹臣聞得江省榜發後鬨傳第二十二名王以式第七十九名王以秀俱係省城縀店王公瓚之子内通關節外作傳遞兄弟同中省城徧貼歌謠十八日主考㑹同監臨等官覆試除有無情弊俟覆試後聽監臨主考查察外事關科埸理合奏聞謹奏朕早聞矣此事似無情弊乃係棍徒揑詞誣謗耳雍正七年十二月初四日總理清查江蘇錢糧事務侍郎臣彭維新馬爾㤗謹奏為奏聞事竊江蘇各屬厯年積欠錢糧至千有餘萬兩我皇上明無不灼於積欠弊端洞悉無遺深知官侵吏蝕多揑造入民欠之中以致混淆不分特降諭㫖命臣等總理清查分晰官侵吏蝕民欠三項絲毫不容混淆臣等恪遵聖諭徧為敷宣屢加開導動其天良令官吏侵蝕弊混人等俱遵㫖據實自首免罪仍准分年帶徵又頻飭分查大員及印協各員務期詳細查察不可絲毫徇隱借端擾累無如各屬積欠錢糧弊端叢集難以悉數其中除民欠之外官侵吏蝕者實居大半臣等雖殫心釐剔竭力稽察而才識短淺聞見不周致上厪君父之心周詳誥誡兹跪讀諭㫖愧勵交至當即欽遵刊布徧貼曉示使遠鄉僻壤益悉聖意但恐前項胥役紳衿積弊巳深猶不能無觀望希冀之想仍襲故智臣等仰承聖主任使自當更加詳細察查使從前舞弊人等不致稍有躱閃現又追查出經胥等私藏底簿而侵蝕包攬之徒惟恐其不能掩蓋不無拂意懷私仰賴我聞謹奏汝等雖極力分辨究於錯㑹朕意識見卑鄙二語不能辭其咎也雍正八年十二月初四日總理清查江蘇錢糧事務吏部右侍郎臣彭維新謹奏為奏聞事竊照江蘇等屬積欠錢糧侵蝕甚多臣等奉命清查自雍正七年三月内起酌式造册遞次挨查至雍正八年七月内遞據各屬具報侵蝕人等自首及察出侵蝕包收等項銀共三百一十六萬兩零今自本年七月内起至十一月又遞據各屬續報官吏自首侵蝕銀八十四萬二千三百四十餘両連前通計自首及察出侵蝕銀四百萬二千三百四十餘兩俱令將所侵都圖戸名核查註明冊内其向未陳首與首而不盡者仍在陸續補首我皇上明照萬物洞悉江蘇等屬積欠弊源特命徹底清釐凡編戸黎庶鼓舞歡忻深悉聖主為民除累盛意目今祗胥役土棍中有極其詭猾之輩希冀觀望多方䑃混尚將侵蝕之項弊中舞弊誘壓鄉愚囑託親友代認作為民欠者臣等現在嚴切曉示設法稽查至挨查未竣之屬時飭詳細剔清即巳報查竣各屬仍飭更將查過冊籍逐細研核俾免混淆此外又據各屬官吏自首及察出侵蝕災蠲銀七萬一千八百餘両内有與清查民欠相䝉之項竝飭協查之員一併確查註冊臣仰沐恩光俯思職業惟有矢竭愚誠詳慎查察稽核釐剔不敢少懈期於積弊畢呈清查有效庶幾上答聖主任使洪恩於萬一為此繕摺奏聞謹奏覽奏知道了務須言行相符以副朕特命清查之意雍正九年六月二十六日總理清查江蘇錢糧事務侍郎臣彭維新協理清查御史臣安修德謹奏為奏明事竊臣等於雍正九年五月二十七日欽奉諭㫖民欠中有揑稱侵蝕者著詳細確查有應更改之處即行更改務使分晰清楚毫無疑竇欽此欽遵仰見我皇上睿慮周詳不惟使侵蝕民欠逐一界畫分明且恩憐臣等愚䝉得以釐謬正誤臣等跪讀之下欣惕交并迅即通行布政司各分查大員暨該府州及各州縣印協等官一體欽遵務必詳加確核分晰清楚以期仰副聖主為民除累至意伏思臣等奉命清查屢䝉我皇上訓誨諄切極思竭誠辦理期無牽混此案頭緒紛繁各屬實徵等冊又大半不全多方蒐羅參證始克造冊挨查且吏役弊根深隱印協官才識參差即據報不渉㳺移而端委更須確核中心惴惴時防有誤雖經切飭各屬將查明侵欠數目分晰開單發給糧戸收執以杜胥役欺誑且慮侵欠數内尚有不盡不實或侵蝕揑作民欠民欠混入侵蝕者均得據實呈明更改嗣雖據報有更改之屬而臣等留心察訪猶有更須磨核者即如各州縣有厯年經管錢糧之人其名則圖書區書里排等類隨地殊稱其人則民庶衿監各色人等充當承頂其家則田地產業有無不等俱係日在衙門承催應比雖𨽻民籍實與役為伍勾串包侵是其慣技其無田者自首包侵必湏開具都圖戸名清釐即有田者臣等必飭印協官詳細核查逐加分别若係自田自欠仍為民欠其侵收他戸錢糧亦必查明確實始列侵蝕但此輩狡幻百出本無田地者毎將他戸錢糧詭立自巳戸名頻年收侵堅稱自欠即本有田地者或將他人錢糧併入巳名或揑立詭戸假稱所分子戸恣意侵用使人無從指摘其間為侵為欠迹介微茫若查察稍疎刁蠧弊串遮瞞羣然揑侵為欠然稍渉執泥查察偶一過當又不免混欠於侵如此等類尚須核正兹欽奉聖諭益加詳慎備細確核倘有似此民欠揑稱侵蝕之項即行逐加查明據實更改務將官侵吏蝕民欠三項分晰清楚不留疑竇并此外一切清查事務惟有矢公矢慎不敢少近苛刻亦不敢少渉和同平情酌行次第辦理擬統於事竣之日分别奏明未敢頻數列摺冒瀆聖聰也為此繕摺奏聞謹奏目前難言汝等之是非俟清楚結局時自有水落石出之定評也勉力秉公為之總理清查江蘇錢糧事務吏部右侍郎臣彭維新謹奏為敬陳江蘇錢糧善後條件仰祈聖鑒事竊臣奉命總理清查江蘇積欠錢糧欽遵聖訓詳慎察查辦理以來隨事隨地時刻留心凡得之見聞驗之察訪稽之案巻徵之事情見吏蝕之弊至於不可枚舉穢官侵虧由彼迎導雖其侵蝕之詭術多端侵蝕之情狀萬變而䆒其弊之所從生由於在官則糧冊既無的名簿籍不存内署在民則戸甲常被暗換科則非所素知夫官不知糧戸實在姓名完欠民不知在官實在科則甲戸官民兩相隔絶是以官之徵比民之完納一聽操縱於吏胥之手遂致百弊叢生恣意侵蝕也今值清查之時侵蝕胥役雖畧收斂現年錢糧亦少包侵然根柢不趁此剔清則侵蝕仍乘間萌起懲其巳往之弊可防其將來之姦此清查錢糧善後之法有宜亟為審酌者臣請為我皇上陳之一錢糧宜歸併的戸也一科則便民小單宜給發也一關係錢糧𦂳要簿冊宜存貯内署也一版圖清賦之法宜行也以上四條臣因江蘇錢糧巳然之弊而審思將來防範侵漁包攬之方其事簡約庸近然於杜弊清賦之大要庶幾千慮之一得焉用敢不揣愚昧謬抒鄙見是否有當伏祈皇上睿鑒施行謹奏能思及善後方為不負朕之任用否則今日之清查亦屬徒勞無益况汝等之功過實係於此所奏其中細微曲折朕雖不能洞悉無遺姑據二者而論如歸併的戸塡註姓名居址一條恐致紛繁滋擾如給發便民小單糧完呈繳一條似覺通順易行可與尹繼善李衛㑹同詳細斟酌更訪求現在各官内胸有識見熟悉該地土俗人情者共相和衷論究務得永久行之而與國計民生有益無損處妥確定議奏聞硃批諭㫖巻一百九十五
