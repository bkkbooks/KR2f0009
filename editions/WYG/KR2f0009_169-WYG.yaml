body:
  text: 欽定四庫全書硃批諭㫖巻一百六十九硃批王世琛奏摺提督山東學政臣王世琛謹奏為奏聞事雍正四年十一月初八日臣接准部劄欽奉上諭二道一飭勵士習一薦舉優行臣跪讀之下仰見皇上加意作人敦崇實行之聖心臣職司學政敢不夙夜殫心正已率屬宣揚聖化除通行各屬曉諭外即每於各學生童試文後令伊等當堂公舉品行優劣并採訪平日鄉評合之敎官所報分别懲奨應俟歳試畢造册送部任滿之日繕疏彚題至於有猷有為有守之士固未可多得臣現在悉心體訪確實亦俟通省試畢後擇其材品尤異灼然可信者方敢登諸薦牘不敢草率濫舉以負皇上鼓勵學校化民成俗之意所有微臣現在欽遵上諭奉行綠由合行奏聞謹奏十室之邑必有忠信者焉若能虛公採訪莫慮時無眞才也勉之毋忽提督山東學政臣王世琛謹奏為敬陳武生敎演之法以收實用事竊查武生原以儲干城之選文義雖不可闕尤當以騎射膂力為重但入學之後敎官止能考課文義不能敎演武藝平日無事必至怠惰荒廢或更恣其勇悍之氣游手生事為害鄉里勢所必然臣愚以為宜就附近標營春秋開操時令該教官督率伊等一體演習該標營官加意敎導如有怠惰不率敎者該敎官責懲頑抗者詳革處治如有弓馬嫺熟為人勤謹可用者該弁與敎官呈送臣衙門考騐確實即移咨撫鎮衙門效用并酌定效用年分擇其中材力出羣者比照年滿千總例咨部引見恩賜擢用如此則武生益加鼓舞不致怠廢而毎歲操演亦必無游手生事之患矣臣愚昧之見伏候聖裁謹奏武生隨營操演之說且緩至其為害鄉里豈止於此而已提督山東學政臣王世琛謹奏為謹陳東省監榖積貯事竊惟常平倉榖毎歲出陳易新存七糶三所以平榖價杜朽蠧法至善也而東省昔年所收捐納備賑之榖分貯各道府州縣倉者獨未議及出陳易新之例臣聞初收捐時原止榖價後将價分發各處糴榖貯倉至今巳十餘年乆貯之榖恐至霉爛臣請皇上敇部定議照常平倉例令各該管官毎歳出陳易新則民間青黃不接時可以平價濟民食而倉儲亦不致浥爛矣臣又聞分發榖價有至今尚未糴足者有因前此虧空後經追出尚未糴榖者此項銀兩存貯府州縣庫恐易虧空臣愚以為宜分别府州縣之大小酌定應貯之數竝查現在貯榖數多足備賑給者將未糴榖之價繳貯藩庫其現在貯榖數少者將所存榖價酌量多寡限一二年内榖熟時糴榖入倉如此則兩三年内倉皆新榖而存貯之價亦無虧空之虞矣臣愚昧之見伏候聖裁謹奏出陳易新便於收貯原屬良法係朕夙昔所知者提督山東學政臣王世琛謹奏為請杜生監干預公事之端事竊東省濟兗東三府所屬州縣俱有漕米定例徴收本色兌運因州縣之離水次遠者運送維艱又濱海之沙土產米原少山僻之區車行不便此等州縣向皆糧户折價與官官遣役往水次糴米兌運漕務無誤民亦稱便無如州縣官明知折價之便民而懼違徴收本色之定例恐地方劣惡生監訐告阻撓故毎年於徴漕時先集生監公議折價聯名具呈州縣乃據以申詳上司出示徴收此臣所聞徴漕之事一也其他或更有如此類者亦未可定臣思此等事旣無誤於公有益於民州縣官即應詳明上司定議奉行何必假借生監以示公論倘欲於公論之中存自利之私則劣惡生監必有逢合意指剝民媚官以為結交把持之端從此妄行生事州縣官不復能制矣臣請皇上敕下督撫凡地方公事應隨時隨地斟酌宜民者皆令地方官據實詳明督撫小則批示大則請旨如有假借生監呈議申詳者即係假公濟私將地方官生監一併叅處如有地方官詳議允協而生監故意阻撓者即行褫革從重治罪如此則有司盡職而生監安分干預公事之端可杜抑臣更有請者東省向來徴漕折價之州縣仰懇皇上敕下督撫於毎年秋收時該州縣將米榖時價詳報督撫酌定折價數目曉諭糧户輸納州縣官仍於水次糴米兌運如有於定價外浮徴者即行㕘處則州縣無違例之嫌漕務易辦官民俱沐皇恩於無既矣謹奏九卿速議具奏提督山東學政臣王世琛謹奏為奏聞事臣學識庸陋䝉皇上簡任督學山東歲試已周現在接行科試通省士習仰被聖天子訓諭諄誠感激悔悟日就循謹至通省今歲夏秋兩熟百榖俱各豐稔瑞麥嘉禾所在多有臣廵試所至目覩熙皥之休風沾被光華之帝治得以策勵駑鈍勉奉職守實深慶幸兹據所聞士習錢糧二事不揣愚昧繕摺恭呈御覽伏祈聖恩裁鑒謹奏覽條陳地方事宜二摺留中至徴收隱弊之奏諒田文鏡自能區畫得法必另有一番整飭也提督山東學政臣王世琛謹奏為請杜州縣徴收之隱弊事竊查東省州縣拆封時皆令本學敎官監拆但新舊錢糧不一毎番拆封時户名不啻千萬計敎官豈能逐一查算自不得不隨州縣具文詳報且聞櫃書隱弊種種不一為今之計必先使現徴之銀無可那動又必使糧户實完之數不由州縣開報不俟拆封司府先巳知之而後那動之端可杜臣酌陳末議伏候聖明俯賜裁擇一徴收之法設流水號簿連三串票而此毎日徴收之數直俟拆封始行總報上司則改多為少司府何從查察臣以為宜於連三串票中再添解上司一票當糧户完銀時櫃書將給糧户解上司兩票一併寫交糧户親齎赴學敎官騐明騎縫號印始將兩票截開一給糧户一存敎官再於流水簿外設日收簿毎本百頁騎縫用府印該縣毎日查對流水串根挨號鈔入日收簿分晰新舊欵項算明總數鈐印就所鈔之若干頁拆開於次日移送該學敎官將昨日糧户所交之票與該縣所送日收簿挨號查對明晰即將所收之票若干張簿若干頁毎日各自封固鈐用學印積至五日票解知府簿解藩司是不由州縣開報不待拆封司府已皆知其實徴之數俟至半月或一月知府彚計總數一面詳司一面委員監拆如數起解倘有不符即行嚴䆒如此則徴拆之數絲毫難以那動官役無從侵隱矣一州縣新舊交代查核完欠全憑流水串根今聞竟有揑造隱匿託言遺失者新任無憑查核若欲傳集糧户細查蠧書等即賄買里民詭名承認新任信以為實便行接受後雖覺察而接受在前恐干處分轉為掩䕶矣臣請嗣後離任官有將流水串根揑造隱匿託言遺失者新任官即行掲㕘先議處分查出實弊照例追䆒如臣所陳票解知府簿解藩司之處䝉恩准行則新任官詳請府司將收存票簿發出查對便完欠瞭然姦蠧無所售其欺矣一東省錢糧有糧户將銀靣交櫃書秤估如式然後眼同封固入櫃者有糧户自已封固入櫃櫃書據所開銀數寫給串票者此自已所封之銀當拆封時或致低潮短少其中固有糧户作姦而櫃書乘間偷換之弊亦多臣以為收銀時宜悉令櫃書秤估如式眼同糧户封固入櫃倘有低少責之櫃書賠補不得濫拘糧户則櫃書偷換與糧户作姦之弊俱可杜矣一敎官所有書役亦止辦學政文移如臣所陳䝉恩准行則毎日收發串票繕寫文牒其事較繁應另行募選書役專管照州縣總吏例滿考職以酬其勞如有於驗票時收發遲延勒索紙筆費用者州縣不時查察其查對不實遺漏票簿詳解遲延并勾通州縣櫃書作弊者司府不時查察役則革處官則䆒㕘以上諸欵在州縣官吏必以為繁瑣難行但錢糧闗係重大若能不厭煩勞使蠧役無能作姦將行之漸熟竝亦不覺其煩上清國課下恤民生而官之受益鴻多矣謹奏東省新命田文鏡兼轄以田文鏡之歴練老成總督其地自必一一清理何庸汝未逹吏治之書生管見為耶且閱汝條奏内有許多窒礙難行處即或可行於簡僻之州縣而繁劇之處則萬不能行夫既不能通行無礙止於簡僻地方不論如何施設皆可又何必多此一番煩擾迂腐之誚汝何以免硃批諭旨巻一百六十九
