body:
  text: 欽定四庫全書硃批諭㫖巻八十二硃批馬紀勲奏摺雍正五年正月初三日四川川北總兵官臣馬紀勲謹奏為奏明事竊臣邊鄙武夫荷䝉皇上簡拔隆恩得補四川川北總兵受恩深重時切圖報伏查川北一鎮上連秦省下接荆襄雖居腹地實為水陸要衝幸䝉我皇上教養有加地方寧謐兵民相安營伍事宜漸次就理惟營中盔甲旗幟縁節次口外出師大半破損操練之際不足以壯軍威今臣現在咨商提臣動支公費加意補造務期軍容改觀仰副聖主慎重疆圉整飭營伍之至意理合繕摺奏明謹奏覽奏知道了凡百處惟只據實方好雍正五年九月初二日廣東韶州總兵官臣馬紀勲謹奏為恭繳硃批奏摺事竊臣扵川北總兵官任内敬具奏明事一摺恭奉硃批伏思臣躬沐天恩至深至厚凡屬應辦事務敢不實心整理今欽承諭㫖惟有益加黽勉以期仰酬殊眷惟是臣奉命調補廣東扵本年三月二十一日自川北起程時其步兵盔甲已經造成二百三十四頂副號褂四百件餘因公費不足尚未造竣臣已飭行該標中軍令其陸續製造以壮軍容所有硃批奏摺理合恭繳伏乞皇上睿鑒謹奏覽廣東營伍懈弛将弁貪婪廢壊已極當竭力整飭務令改觀莫負朕委任至意勉之勉之同日又奏為恭謝天恩事竊臣於川北總兵官任内遣家人恭進跪請聖安奏摺因臣初次進摺不諳欵式冒昧之罪實無可逭乃荷皇上洪慈曲賜寛宥不加議處格外殊恩雖捐糜頂踵亦何能仰答摺奏謝謹奏覽雍正六年四月二十六日廣東韶州總兵官臣馬紀勲謹奏為恭繳硃批奏摺事竊臣於雍正五年九月初二日敬具恭繳硃批一摺奉到皇上硃諭仰見聖明在上洞悉靡遺臣跪讀之下感悚無地惟有竭力整飭仰報皇上髙厚之恩臣於所屬營伍時加訓飭今已漸次整理其現在将弁臣亦諄切教誡尚俱克稱厥職如後有懈弛不法臣㫁不敢姑容貽誤上負聖主委任至意又臣敬具恭謝天恩一摺奉硃批實心辦事四字人皆視為口頭常語殊不知言之甚易行之甚難於此加勉可也欽此臣感沐皇上簡拔殊恩銘心刻骨分宜竭盡忠誠力圖報效惟是實心辦事要非克盡私欲行之實屬甚難今欽承聖訓臣實力奉行以副聖主知遇之隆恩所有硃批奏摺理合恭繳伏祈皇上睿鑒謹奏内外臣工但能勉一誠字何愁天下不大治少渉欺蔽朕之耳目偶或不到則必至悞事矣汝等大員身膺封疆重寄無論本省他省凡闗國計民生要務皆宜秉公據實入吿倘私意未融㡬事不密擅作威福惑朕聽聞則大不可若如此不但於朕無益自亦不免禍殃汝年方壯盛當為朕分外效力以報知遇殊恩然須審已量力設不能秉公愼密則又不如止盡職分内事毋為出位之思也雍正七年三月二十二日廣東韶州總兵官臣馬紀勲謹奏為恭繳硃批奏摺事竊臣於雍正六年四月二十六日敬具恭繳硃批一摺奉有皇上硃批伏念臣受恩深重未報涓埃敢不竭盡愚誠以仰答知遇但恭逢聖明在上萬國盡登熙皥已無不遂之民生况臣智識硃批奏摺理合恭繳伏祈皇上睿鑒謹奏條陳一摺留中凡有密奏密之一字最為切要臣不密則失身稍有疎漏傳播於外經朕聞知則貽害於汝匪淺追悔亦莫及矣愼之愼之同日又奏為敬陳管見仰祈睿鑒事竊臣邉鄙庸材身受皇上逾格隆恩即捐糜頂踵亦難言報稱惟一誠自矢知無不言庻以稍盡臣職謹抒一得之愚為我皇上陳之一錢糧宜剔弊源也竊惟錢糧之虧欠多由於胥吏之侵蝕而胥吏之舞弊必恃乎幕客之勾通臣請嗣後各州縣經管錢糧之内幕年終令出並不勾通胥吏之結與司道府倘胥吏侵蝕發覺則經管錢糧之内幕與之同罪若錢糧三萬兩以上之州縣幕客經管至五年吏無侵蝕民無積欠官無一盜案宜會審也伏查定例内營兵獲盜不許武員私審移解州縣官審理今宜稍為變通查營兵獲盜移解後係原失事之州縣官自上𦂳即行嚴案難結故意稽延時日圖卸責於後任不知緝盜以速為要如所獲之盜到案迅即訊明確數飛擒夥黨自易結案若遲延不即審訊黨羽巳聞風遠颺矣又有沽名之人故意將實作虛聽其狡辯之詞遂將盜賊縱放武員竟無所查察止任州縣之操縱不但盜賊每多漏網更足以長盜風臣請嗣後獲盜之日無論捕役營兵之所獲應令州縣官會同營貟共訊將公審供由令營員具文通報存案營員有同審之責時時得以催訊州縣自不能稽延營員為同審之官虛實得以參酌州縣自不能縱脱而營員訊知盜黨之蹤跡即可以跟緝立擒矣一要缺不可虛懸也竊見邊海各省有苗猺猓㺜黎獞之地多係煙瘴之區地既僻逺民亦難治除知府之外即同知通判等官亦俱有撫綏彈壓之責非長材難以勝任故督撫於州縣中特題亦有於内地之同知通判中調補有三年俸滿即陞者有五年俸滿即陞者所以恤其苦而酬其勞也臣原為地擇人仍留内地委署竟似為人擇地名雖要缺需才實則借缺引手臣請嗣後所調之沿邊沿海要缺同知通判等官必令其實赴本任即署篆亦止令署本府所屬之州縣庶㡬要缺得人以整飭諸務皆綜理經營則俸滿遷除方不為倖致矣一水利宜興修也竊照民生所最切者為農事農事所最切者惟水利臣為粤東計則水利尤所宜修查前任撫臣楊文乾疏稱廣州府屬三水南海兩縣肇慶府屬高要高明四會三縣圍基共七十一處其頂衝二十六處宜用石工修築次衝四十五處亦必須用椿用埽上植榆柳使之根生蔓延難即以土圍基而論每一圍田數百頃每歲修至數百金若衝決又需數百金是土圍基之歲修每年合計數萬金一皆出之民間惟改用石工可省小民無限之金錢第石工費大不便動支正項臣請開一事例敕下督撫酌量應捐數欵妥議確數報部先估計所用該若干完工即行停止再請修浚圍基而外村中之陂塘竇閘田間之溝洫泉源亦宜疏濬將各府之同知通判加以水利職銜各在所屬州縣各村一誠心報主故不避越職之嫌謹繕摺奏聞如果臣言可採伏祈皇上敕部議覆施行謹奏覽雍正七年六月十五日廣東韶州總兵官臣馬紀勲謹奏為敬陳一得之愚仰祈睿鑒事竊臣接閲邸鈔見凖噶爾不遵王化背負國恩侵暴兇殘跳梁跋扈我皇上欽命大將軍出師征討臣宜荷戈前驅以宣力疆場緣粤東僻逺得見邸鈔甚遲所載節畧不能詳備是以未敢冒昧奏請伏思軍前一切機宜自䝉我皇上指授方畧大將軍等必奉行盡善臣材庸識陋不敢置議至腹裏應辦併邊上事宜就臣見聞所及為我皇上陳之一大兵出塞邊防更宜嚴密也一軍需宜另設員督理也一軍前辦事之員應令督撫揀選咨送也一軍前咨取人員不得濫調多人滋勒索而曠職守也一馬駝宜多備也一奏銷宜變通也以上六條據臣管窺臆見未知有當與否伏乞皇上睿裁謹奏覽奏朕嘉汝之心而鄙汝之識汝所知者乃向日邊塞情形今僻處粤東總未聞此番措置之方畧耳如所陳六條尚思慮不到仍須汝之條奏然後採擇施行則朕亦何敢孟浪而輕為此大舉耶其中不得已之情總仰頼上天垂慈助佑將來天下後世自能洞然明白也硃批諭㫖巻八十二
