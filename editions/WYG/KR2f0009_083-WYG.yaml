body:
  text: 欽定四庫全書硃批諭㫖巻八十三硃批張起雲奏摺雍正八年二月二十日福建金門總兵官署理南澳總兵官印務臣張起雲謹奏為據實陳明事竊臣世受國恩高深莫報仰荷皇上不次超擢由叅將特授金門總兵方懼庸愚弗克勝兹重任復奉聖㫖以南澳亦屬𦂳要著臣前往署理受命之下益切悚惶每事殫竭愚誠不敢稍有草率以負皇上天地之恩兹有事闗欺冒不得不據實奏聞者案查雍正六年二月内奉旨嗣後沿海官弁兵丁有因公差委遭風受困没水登岸幸獲生全者照軍功頭等傷例賞給其或飄没身故者照軍功陣亡例分别給與祭葬銀兩此誠我皇上覆載鴻慈千古未有之曠典凡在軍伍者無不感激自奮今有雍正六年六月内南澳鎮右營廵海六號繒船一隻遭風飄溺淹故官兵一案遵奉恩㫖照例應賞給淹没兵丁每名銀五十兩生存兵丁每名銀三十兩前此鎮臣未經給發今據臣標右營遊擊王棟詳請將領到廣東布政司庫銀二千零八十兩會同文員唱名散給臣因事闗卹賞恐有冒濫隨復細加確查其把總翁徳一員兵丁黄春等一十四名委係淹没至生存兵丁實止劉國明等九名其餘林禹等三十七名並未上船隨行冒列姓名濫邀賞賜皆由左右哨千總蔡文郁張開秀把總蕭光贊陳紹文劉必鳯濫行造報守備林甲俊冒昧轉詳適因鎮臣許良彬署事金門即據詳咨呈督臣孔毓珣據呈題報外事闗國帑難容欺冒臣既經查出斷不敢徇隱以干扶同之咎應將實在存没兵丁二十三名先行給賞其餘冐濫兵丁林禹等三十七名共銀一千一百一十兩扣除不發臣謹據實奏聞伏乞皇上睿鑒施行謹奏此奏可嘉之至汝能如是存心何慮不為千百載之人物也實屬奉公不欺有㫖諭部議叙勉之雍正八年六月二十日福建金門總兵官署理南澳總兵官印務臣張起雲謹奏為奏聞事竊照南澳一汛上通閩洋下連粤海實係要區若廵查少疎恐致姦徒濳踪出没臣自抵澳即自率兵船按閲廵查各處洋嶼嚴飭屬員加謹哨防不令偷安惟思查緝姦宄必當制於未萌之先海中原無盜賊皆由陸地無藉之民結夥濳出與其追拏於在洋巳發之後不若防緝於在陸未發之時而搜剔線窩得其踪跡尤當用以賊攻賊之法臣現於所属協營多方密尋舊通姦匪者一二人勸以厚賞寛其舊犯朂以自新使之緝賊報效密為耳目時刻留心四處躧探如有不軌之徒暗謀糾夥出海果有確證立速飛報臣及協營刻即知會就近文員同往緝拏臣仍時時查訪如果實有效力酌量奬勵如敢藉端生事即加痛懲仍飭臣各處汛弁汛兵嚴查地方内如有素非善類蹤跡可疑無端外出者即密行跟究則陸地之根脚漸清汛口之究查又密復加在洋船隻勤於哨廵庶使姦頑稍知斂迹地方得以安堵臣庸愚之見是否有當理合具摺奏請伏乞皇上睿鑒施行謹奏加謹廵查悉心料理雍正九年正月二十二日閩粤南澳總兵官臣張起雲謹奏為微臣効力情殷仰懇睿鑒事竊臣䝉皇上特恩於雍正八年十月内實授臣南澳總兵官欽承之下感激無地今查南澳地方雨暘時若五榖豐登兵民安堵海不揚波臣受任海疆仰託我皇上洪福迄今一載有餘並無盗賊在洋剽竊除出哨廵查外别無涓埃可補持禄養安實懼曠職近者西陲小蠢未寧致厪睿懷雖諸文武大臣祗承皇上神機廟算天兵所指剋日蕩平然竊念臣以千把末弁歴授今職虛糜廩粟從無尺寸之功若不及此時力圖報效問心何以克安輙敢冒昧懇請願躬赴邊徼以駑鈍之身效犬馬之報縱至愚極拙不足以供驅䇿第以稍盡臣子微末下忱倘䝉皇上天恩俞允容臣趨赴闕廷面請聖訓隨星馳西土聽候指揮臣不勝踴躍待命之至為此謹奏西陲之請目今暫且不必後有用汝處亦未可定候㫖遵行雍正九年六月初八日署理福建陸路提督臣張起雲謹奏為奏聞事竊臣䝉皇上天恩署理提篆經今四月臣惟勉竭駑駘整飭營伍練兵恤民冀仰酬高厚於萬一兹查閩省年嵗情形四月内二麥登場約有八分収成旱禾亦俱茂盛惟泉州興化至省城福寧各地面五月中雨澤間有數處愆期雖值青黄不接之時幸各處居民以二麥新収米價九錢一兩不等最貴之處亦不越一兩二三錢督撫臣復檄行有司發糶倉榖因是人情大安止有福州府屬之羅源縣福寧州屬之寧徳縣人民素稱刁悍喜於聚衆為非臣於六月初四日據羅源營遊擊守備等呈稟俱稱羅源食米不敷價值騰貴知縣發糶無方百姓不能均沾於五月二十五日高墩舖地方陳秀南子生員陳至陛家有糶剰榖五百餘石為多人開倉搶去隨查獲謝亦言等六名交有司衙門収審又二十六日在護國舖地方有無數人衆將居民游允奇倉揭開搶去榖百餘石正在查緝又二十七日夜復於護國舖地方聚集千人將居民郭元海陳秀南鄭玉英家倉榖挑去隨緝獲搶榖民沈文第等五名又王沙舖曹壠地方民人藍世聰報稱二十八日夜有疊石郷人張應生等三十餘人先詐飯食後搶米榖共失去榖一千斤稉米二百斤又陳洋坂民林春秀等家於五月二十八日夜為方厝塘余家塘竹兜峙陽各地方人不計其數各執火把將林春秀等六七家米榖物件盡行搶去隨擒獲陳新如等六名亦交有司収訊又據福寧鎮標遊擊稟稱寧徳無米可糶價值日騰有寡婦林氏家存榖不及二百擔竟有二百餘人齊集强勒糶賣經弁員力勸方㪚誠恐横行日甚將來或至滋事等語臣據稟星即咨明督撫臣設法調劑又移行鎮臣營將協同嚴拏為首之人從重究治以儆刁風外因事闗聚衆搶奪不敢隱匿謹據實奏聞伏乞皇上睿鑒施行謹奏覽奏知道了凡百但務據實直陳絲毫不渉粉飾方是雍正九年十月初一日署理福建陸路提督臣張起雲謹奏為奏聞事竊臣一介武夫䝉皇上天恩署理福建陸路提督印務受恩深厚雖期黽勉盡職而才識短淺無能仰酬萬一撫衷悚懼夙夜難安不意微臣自二月抵泉視事至四五月天氣炎熱臣過於貪凉為風露所侵先患筋骨疼痛旋乃肺氣喘逆延今三閲月肌肉消瘦歩履艱難臣䝉皇上如此隆恩即使粉骨糜身亦分所應爾是以前此尚能力疾料理不敢遽行陳奏今則精神非舊難以支撐又何敢隱黙不言以致茍延貽誤除經咨商督臣劉世明謹將陸路提督印務暫行委員協理外臣為封疆重任起見不得不先事預籌伏乞皇上特簡賢員畀任閩省賜臣退閒俾得調治庶地方不致貽悞臣疾幸得痊愈誓此餘生再效犬馬臣不勝感激涕零之至謹繕摺奏聞伏祈皇上睿鑒施行謹奏汝其加意調治候朕另有諭㫖硃批諭㫖巻八十三
