body:
  text: 欽定四庫全書硃批諭㫖巻一百九十一硃批石成峨奏摺江西布政使臣石成峨謹奏恭請皇上萬安竊臣至愚極陋荷䝉我皇上特恩以候補道員拔用江西布政使聞命自天感激無地受事之日即循例請撫臣代行奏謝外臣到任以來夙夜兢惕念布政一官為錢糧總滙惟有裁酌陋規清查完欠庶可以正已率屬仰副我皇上愛飬元元之盛心稍盡微臣職守於萬一查得江西布政衙門向有時節生辰署印規禮以及解庫平頭每年約有四萬餘兩臣到任後將一切節規盡行裁革止存平頭一項每收銀一萬兩有平頭銀一百七十五兩每年約二萬三四千兩内除總督飬亷銀四千四百兩廵撫飬廉銀八千八百兩尚餘一萬兩上下之數内又除心紅紙張墊補衙役工食約用一千餘兩延幕書算日食費用約用一千五百餘兩衙門公事諸費及應捐俸辦理之處約三千餘兩臣家口衆多日用薪水亦需四千餘兩臣受皇上格外鴻恩即此平餘亦不應染指但臣再四酌度若併此裁去不特臣一時難以支撑亦恐後來贍飬不給或致貪黷累民或反虧空庫項不得已留此以為飬廉臣自問何人叨沐異數至此惟有不貳不欺兢業供職倘日後稍有貽誤辜負主恩不特臣罪難逭更恐天下臣民以為誤用匪人上累聖明則臣之罪實為天地所不容矣為此據實陳奏伏乞睿鑒謹奏據奏似此瑣屑零星朕何暇計及惟向爾等責成一是字而已爾但勉力做一眞實好官仰副朕望不在此分晰奏聞以希見信也凡一切取與之間總期合宜得當屬員不可偏徇民風毋使驕惰立心行政以不苛不濫為凖的至於取所當取以備公用亦何不可之有惟當相機度時而行不辱朕見用之顔面以勉圗上進慎勿茍且小就中道而止勉之勉之江西布政使臣石成峨謹奏恭請皇上萬安臣於十月初六日祗領硃批諭㫖叩頭跪讀蒙天語諄諄指示臣惶悚無地感激涕零伏念臣至微至陋叨沐異數不次擢用雖捐糜頂踵亦難報稱髙深於萬一今復荷主恩如天訓誨明切臣敢不遵㫖實心供職黽勉從事仰副聖懷為此具摺叩謝天恩謹奏知道了聞爾自莅任以來聲名頗好勉之勿懈硃批諭㫖巻一百九十一
