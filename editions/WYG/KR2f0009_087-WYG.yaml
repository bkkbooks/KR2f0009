body:
  text: 欽定四庫全書硃批諭旨巻八十七硃批蔡珽奏摺四川廵撫臣蔡珽謹奏十二月十二日臣在成都叩接大行皇帝遺詔痛深五内欽惟皇上盛徳在躬當陽正位聖明天縱巨細緩急萬無不協但臣寸草微忱不能自已謹就愚慮所及者冒昧上陳我朕勉強從事以繼皇考未竟之志今朕初豋大寳突然孟浪撤兵若如此将以皇考舉行此事為非乎倘賊人見我忽然撤兵以為内地必有事故乗隙跳梁将何捍禦汝此奏朕不解汝具何心胸識見甚屬褊淺西藏之説正在此與廷臣計議汝不必為朕過慮朕生平不用權術惟以誠對天以誠接物諒賴上天垂佑皇考遺惠可望相安朕秉性只知畏天從不解畏人放心放心覽四川巡撫臣蔡珽謹奏為恭懇聖恩簡員預發以偹補用事竊查川省地方遼濶道府州縣等官每至缺出委員兼攝道途往返經旬浹月不無顧此失彼之慮兼以辦運軍需正在需人仰懇皇上敕部於候補候選人員中揀選道府三四員知州十餘員知縣一二十員立限到川遇有奉差者即令署理遇有離任者即准題補庶任用不患無人事務不致叢脞矣為此謹奏覽此預發人員之奏似與邊省地方有益雲南亦當如是著吏部㑹同總理事務王大臣於翰林院編檢庶吉士及卓異行取留京候缺并候補候選各項人員内㨂選毎省道府四員州縣二十員速𤼵與該督撫以備委署題補之用特諭四川巡撫臣蔡珽謹奏為請旨事竊川省需員臣巳具摺請勅㨂選候補候選等官臣亦有素所知者數人懇請以道府用今四川現有順慶府缺可否即授為順慶府知府候補同知王坤為人勤愿曽進藏效力要州縣用以上五人臣緣需人起見不敢避嫌如䝉俞允伏乞敕部施行謹奏覽四川巡撫臣蔡珽謹奏為恭讀聖訓惶愧無地事竊臣齎摺家人囘川奉有硃批臣跪讀之下仰見我皇上智慮淵深無微不到臣之管見實不能仰窺於萬一但臣因愛君愚誠将一得之迂見入告今恭奉硃批煌煌天語備悉周詳無一不在聖明洞鑒之中臣如夢方覺深知才識短淺不明大體前奏甚屬孟浪臣本下質庸愚實實愧赧無地自容曷勝惶悚之至謹奏愧赧惶悚皆可不必君臣之間無不可以言者若少涉私心為恐嚇之舉則不可也戱諭四川巡撫臣蔡珽謹奏為恭懇聖恩給員辦理工程事竊查松潘口外羊峝新撫生番三十一寨臣准提督岳鍾琪咨稱應於適中要隘之地建城一座左右數十里内各立闗隘一所又准部咨於打箭爐之外中渡河口建城一座其城垣闗隘官􅅟營房俱應酌量建造但此項工費浩繁川省用兵之際需費正多不便支動正項錢糧仰懇聖恩於應罰令當差之員或𤼵一二員或𤼵二三員令其效力修建費既有出而工可速成於邉防大有裨益伏乞皇上睿鑒施行謹奏所請不合况亦無罰令當差之員其城垣闗隘等工動正項錢糧修建可也應如何葢造作何估計之處與年羮堯商酌一定速為舉行四川巡撫臣蔡珽謹奏為恭請陛見祗聆聖訓事竊臣自揣愚昧濫叨巡撫重任識短才疎時深恐懼四川為邉要之區一切事宜非面陳天聽不能詳悉非親受聖訓罔所遵循伏乞皇上俯鑒下衷俾得輕騎來京恭請聖示庶臣心得盡而地方事務或可無大誤矣為此激切具摺謹奏汝不必來京諸事與年羮堯悉心商酌而行亦不致有錯誤也四川巡撫臣蔡珽提督臣岳鍾琪謹奏為據咨敬陳管見恭請睿裁事本年三月二十七日准署定西将軍公臣䇿旺諾爾布密咨據台吉諾彦哈什哈寄書云西海大小諾彦於㑹盟之時宻謀遣使向䇿妄阿拉布坦欲仍尋舊好等語随經該将軍具摺宻奏知㑹到臣臣等伏思西海人心誠不可深信但羅卜藏丹津則實庸劣西海台吉皆人各懐私自相疑忌亦不能一心始終况䇿凌敦多布師敗逃歸大損人畜縱令羅卜藏丹津等果差人前往臣等料䇿妄阿拉布坦亦不過與結和好聨絡覊縻之而已諒未必肯復來西藏也夫安不忘危乃有國之常事臣等職任邉疆無日不宻飭沿邉營汛整飭防備并令人前往西海一帶部落暗行偵探如果有逆舉俟其形迹彰著之日恭請天討仰仗聖主仁威料亦不難於撲㓕此時似無庸遽滋他議臣等為此㑹同具摺謹奏所奏甚合機宜朕已備悉其情状前於奏到時曽有旨矣爾等再明白向年羮堯知㑹公同商酌相機而行可也四川巡撫臣蔡珽謹奏為請旨事臣前接部文成都府知府劉世奇陞補甘肅按察使今又接部文甘州府知府彭振翼陞補四川按察使竊思川陜两省現在有事之秋今两人既皆係賢能之員所陞又同是臬司臣之愚見莫若一為轉移劉世奇久為四川首府即補四川彭振翼係現任甘肅之員即補甘肅則駕輕就熟於地方大有裨益矣如果臣言可採伏乞皇上敕部施行為此謹奏劉世奇彭振翼二人著照蔡珽所奏調補四川巡撫臣蔡珽謹奏為奏明事臣准督臣年羮堯宻咨因駐劄西寧之侍郎常夀所奏面奉聖旨命宻咨四川提督帶兵二千前往松潘其一切兵馬錢糧等事令臣速為料理到臣随經提臣岳鍾琪咨請照例支借需用各項錢糧經臣於司庫支給移交提臣外獨是松潘素不產米且山路崎嶇裹運維艱查督臣年羮堯曾有捐買支存之米及青稞堆貯松倉可照折色給本色支用餘容臣與年羮堯商酌妥確再行奏聞謹奏知道了此係年羮堯在京之時朕宻降諭旨交伊之事並未經部議今一切兵馬糧餉等項例應具題者皆與年羮堯商量妥確然後舉行四川巡撫臣蔡珽謹奏為恭懇聖慈事竊臣素受主知感恩最切當奏代爾兄完補虧空一摺巳發部議矣四川巡撫臣蔡珽謹奏臣前接年羮堯宻咨即經具摺今提督岳鍾琪已出松潘兵馬錢糧之事俱料理無誤西海人心不定傳言不一其裏塘等處臣已㑹商年羮堯岳鍾琪已令總兵周瑛暫駐師其地相機而行無事則已有事則仰仗聖主之威福協力撲滅臣近見周瑛所報口外之事心甚深細料理俱好至四川今年稻已栽完栽秧時各處幸俱得雨皆云可望大豐為此謹奏所奏巳悉一切機務俱遵照年羮堯轉傳諭旨凛奉而行毋得絲毫另立意見彼此齟齬互相掣肘或致有誤事宜慎之四川巡撫臣蔡珽謹奏為預籌庫項事竊查川省毎年所徴正雜錢糧應解司庫者實計三十三萬两有零而毎年所需滿漢兵餉俸工驛跕等項約一百萬两是撥給於外省者多川省現今用兵之際需用甚繁外省協餉毎不能如期而至以按月支放之需待外省無期之餉司庫無儲所闗非小伏思朝廷庫帑貯之各省與貯之川省無異撥於來歲與撥於今歲無殊而貯川以預邉儲預撥以備支用實係急需不可緩待仰懇皇上敕部除毎年應撥之外再将鄰近省分銀两預撥一年餉銀迅令剋期到川倘有動用之處一面報部一面支用如事定無動支之項仍留充下年兵餉則庫項有儲緩急可恃而軍需不患無備矣為此謹奏於爾未奏之前已有旨矣凡如此等先事預籌之舉與年羮堯㑹商妥議再行具奏庶無錯謬四川巡撫臣蔡珽謹奏四川今歲収成成都松潘卭州雅州嘉定眉州等處俱有十分保寧敘州馬湖遵義東川瀘州等處亦有八分龍安有七分潼川微旱然亦有六分惟順慶䕫州重慶三府屬秋旱米價亦貴市石毎石至二两餘幸俱通江路臣現在細查相機設法料理再臣目疾因近日服藥去痰較前稍愈理合一併奏聞謹奏覽奏重慶等三府歉收潼川亦不成熟據此被旱地方甚廣亟當修省吏治慎勿泄泄視之年羮堯撫川十餘年未聞米價貴至於此况川陜今正在用兵之際爾於一切正務其小心兢惕毋忽倘有失誤推託病患不能逃責也如智力所不逮之事虚懐諮詢年羮堯而行之四川巡撫臣蔡珽謹奏護軍統領那秦到川口宣諭旨戒飭嚴切臣跪聆之下踧踖無地伏念臣一介下愚罪譴日積䝉聖恩不即處分尚賜訓誡且令臣事事與年羮堯商議而行俾臣得所遵依仰沐鴻慈直同覆載臣惟有恐懼感激恪守恩訓日凜天威於咫尺耳謹奏若不小心翼翼克勤克慎以服勞盡瘁恐終不免於隕越之虞也四川巡撫臣蔡珽謹奏為奏明事臣前因重慶蘷州順慶等府秋旱曾經繕摺具奏隨一面委員查看並行附近豐收州縣各令商民載米前往貿易復自行買米减價平糶今幸查此三屬俱不成災且秋蕎頗茂十月可收而米船驟集米價亦平民人並無失所為此謹奏據奏三府既不成災米價又復平减大慰朕懐四川巡撫臣蔡珽謹奏十月二十三日接到硃批臣前奏年歲收成一摺以川中有事之秋上厪聖念當皇上宵旰之時臣斷不敢存絲毫推諉之意上負聖主髙厚之恩今跪接上諭三道仰見安一併奏聞謹奏覽四川巡撫臣蔡珽謹奏為請留道員以濟軍務事該臣看得松潘一路大兵糧餉經臣委松茂道孟以恂總理今伊母馬氏病故例應離任丁艱但思軍務闗係甚重值此需人孔殷之候臣與總督年羮堯共商仰懇聖恩准令該道在任守制則於軍務實有禆益矣如果芻蕘可採伏乞皇上敕部施行謹奏孟以恂著在任守制該部知道四川巡撫臣蔡珽謹奏為奏聞事竊思羅卜藏丹津負恩叛逆凡西寧及四川各處俱有勝兵且賊已敗奔惟慮其逺遁入西藏故總兵周瑛奉調兼程入藏以截殺之今臣接周瑛咨稱我兵已於雍正元年十二月十八日抵藏貝子噶隆等已遣公隆巴乃帶兵前往哈喇烏蘇把守要隘並挑沠唐古特兵馬一萬聽候調遣如羅卜藏丹津逃竄至藏即鼔勵兵番合力擒殺等語伏思我兵既已到藏藏内人心又忠誠歸附如此必獲全勝為此具摺謹奏我兵抵藏已據周瑛奏報矣汝所料理亦屬可嘉領侍衛内大臣公臣馬爾賽兵部尚書左都御史臣蔡珽謹奏為請旨事臣等於初八日起程十一日到保定臣等面問李維鈞你做直𨽻總督年羮堯在保定城内置房産藏財物你豈有不知如何不奏呢據供從前因未奉旨查他的家産所以不曾奏既奉旨之後就奏了其箱籠等項初時尚不敢開查後又請旨方敢開箱查記並無隐瞞等語藩司羅宻供查魏之輝家私時曽搜出書一包總督不與我們看自已看了一两封就令封起裝入箱子内了後與我的冊子上並無此書信我因令府縣添著開上我與按察使去開箱同看都是魏家親戚的家書但從前不與我看知道這書子是真是假呢總督於抄家之後又與魏家三四百两銀子等語臣等将書信不公同藩臬開看復不行登記並不奏聞情由暨為何給魏家銀两之處訊問李維鈞據供銀子三百餘两因年家的人一百餘口籍没之後無以度日所以給他們為日用之費的我因書信是魏家親戚的所以不曽奏這是我疎忽之罪冊上不曾開想是遺落了這也是我疎漏之罪等語據此李維鈞身為總督年羮堯家財現在省城之内乃並不叅奏及奉旨行查始抄没家産又不将書信登記且不公同藩臬開看情殊可惡臣等謹将總督印信摘至公所李維鈞亦暫行覊候敬遣侍衛松艾齎摺請旨伏候批示遵行謹奏所奏明悉料理甚屬公當知道了已有旨矣兵部尚書左都御史都統臣蔡珽謹奏本月十九日臣接到部文奉旨命臣署理直𨽻總督印務欽此欽遵除将李維鈞交付公馬爾賽帶領赴京外臣擇於二十五日入署辦事至期具疏謝候恐羅密出去别生事端是以即令其看守李維鈞不致另生别事今李維鈞已出城赴京兵民安静之至合行一併奏聞謹奏知道了賑饑之事乃目下第一要務朕日前備籌救濟之法思及河間静海等州縣城垣有應葺理者查十數處𤼵十數萬帑金以修築之窮黎借此可以傭工餬口亦寓賑之一善䇿也現命該部㨂選人員随即𤼵往各州縣㑹同地方官查勘估計諭旨到日爾其嚴飭該屬盡心竭力以任其事特諭兵部尚書左都御史都統臣蔡珽謹奏二十二日齎摺人回䝉恩賜臣鮮棗葡萄臣叩頭敬領訖謹此恭謝天恩再松茂道孟以恂十八日過保定臣問其川中之事云添税是實今已裁革矣至復知府衙門糧規亦實有其事成都府為甚謹奏已據孟以恂面奏矣朕觀其品質不過中平或恐是一殘忍之人向日存心有隂刻處否雖非棄材亦非大器也兵部尚書左都御史都統臣蔡珽謹奏順天河間保定等府被水之區䝉皇上俯念窮黎特諭賑恤臣面詢李維鈞據云曽經摺奏賑恤一月已䝉恩准現在委員各處分賑臣令两司確查務使均沾實惠今跪捧硃批諭旨朕備籌救濟之法思及河間静海等州縣城垣有應行葺理者查十數處𤼵十數萬帑金以修築之窮黎借此可以傭工餬口欽此仰見聖猷逺及憂勤周到臣自當遵旨嚴飭屬員盡心任事目下省城米價騰貴臣今即令臬司浦文焯帶脚價銀两至天津将截留漕米星速運三萬石其二萬石直至省城平糶一萬石量留沿途被水州縣以救目前之急伏候指示謹此舉是已有諭矣兵部尚書左都御史都統臣蔡珽謹奏直𨽻總督衙門有來往清字文書稿冊臣謹将随臣來之筆帖式温普馮傑英留辦翻譯為此請旨謹奏温普馮傑英照所請留用覽奏賑恤之摺已悉爾意但截留之米因天津去年修建之倉厫潮濕不堪難以收貯今已另議矣朕又特諭将通倉變色米命減價平糶四五十萬石兹爾既著浦文焯赴津請運米三萬石候朕飭部臣與倉場督臣議定當作何𤼵與浦文焯之處另有諭旨也爾摺亦一併𤼵交該部署直𨽻總督臣蔡珽謹奏布政司羅宻非外吏才適見邸抄聖明先已洞鑒将伊調囘令徳明署事但思藩司為通省首領諸事總㑹之衙門無事時未經外吏者尚可為之今直𨽻現在賑濟必得曾為外吏曉事之人方能勝任伏懇聖慈或将孟以恂或御史張廷棟令其辦理賑恤之事并令協助徳明數月於地方事既有裨益而臣亦得收臂指之效矣謹奏已有旨命余甸蔡起俊領通倉米數萬石運往天津二人即聽爾調委於賑濟事務處協助給㪚矣覽此奏可謂君臣不約而同朕甚嘉悦署直隸總督臣蔡珽謹奏賑恤一事深厪聖心臣目下催查户口雖尚未送到然以臣所聞者計之大小口配撘約計大口一百萬毎日毎人三合毎月即需米十萬石今河南小米截二十萬石余甸蔡起俊運通倉米十萬石海運闗東米十萬石共四十萬石若奉旨准令李維鈞運南四府米二十萬石則今冬明春似可足用今冬既無工作則賑而不糶明春有工作民有傭工之錢則多糶而少賑似可有濟若䝉上天鑒皇上愛民之苦衷明春麥收則小民安全而聖主宵旰之憂可釋矣謹奏所奏俱悉至於李維鈞運南四府米之説俟朕再為斟酌定其可否署直隸總督臣蔡珽謹奏為奏明事竊查户部侍郎蔣廷錫條奏水利五欵内一欵係廣平縣之南至冠縣之西有池溝一道若於此處因淺加深因狹加廣可復引漳濟衞之利并置閘座以時啟閉於衛河運道甚有裨益奉旨遣學士何國宗等五員㑹同督臣看閲詳議且奏又何國宗等面奉諭旨倘總督有緊要事務或稍候數日或往就㑹議勿致貽悮地方欽此經前督臣李維鈞准工部咨㑹欽遵在案今臣奉命署理直隸總督印務自當遵旨㑹同欽差看閱詳議但現有賑災截漕等事俱闗緊要不克親往伏查前項河道係大名道所轄之區臣特委該道趙國麟隨同看閱俟看明之日臣即㑹同欽差詳議奏覆為此謹奏是爾可以不必親往況爾初到地方諸務紛紜其河道形勢又未獲周悉應如所奏行署直隸總督臣蔡珽謹奏竊查李維鈞所奏被水州縣只三十餘處今續報到者已共九十七處有應緩徴者即先批令緩徴俟查明被災分數照例題報其應徴者再行補徴總期被災窮黎均沾實惠而胥役棍徒不得藉端冒領再被水州縣明春有城工而今冬則無可恃仰懇充盈民享樂利矣再天津所盖倉厫潮濕查六十一年天津無倉乃係分貯沿河州縣今莫若仍照前例分貯将來賑糶更便至州縣虧空若遇年饑賑糶以無為有以少報多官有賑糶之名民無實不時巡察再徳明到省傳旨禁止燒鍋臣謹即遵行以上事宜有候旨批示者有恐厪聖慮而奏聞者統祈睿鑒謹奏所奏各欵俱悉署直隸總督臣蔡珽謹奏竊查直隸虧空趙𢎞燮實為罪魁李維鈞一味蓋掩不肯令敗露清苑縣無倉榖一事臣前曾摺奏今保定知府葛斗南虧空倉榖五千石求李維鈞令新任知府温儀出結竟赴鹽道任及聞臣署事方星速遣人前來清楚已完二千五百石其未完二千五百石持銀二千五百两與温儀求算為米榖似此之類者不少如永清縣如河間府之交代比比皆然若令俱将銀買米交倉恐米價驟増非目下荒歉時所宜籌之固不可少緩而繩之又不可太驟臣思如遇此等事察其罪雖應問而情尚可原新任官如肯擔承者准其以米一石作銀一两令其具詳據實聲明限至次年秋收必令買米實倉若至期不将倉米補足則必嚴㕘李紱實心任事必能踵臣之所行一二年之後此等倉榖庶能足而緩急方可恃矣可否如是伏候批示遵行謹奏情法兼盡公私無礙随宜濟時當如是也署直𨽻總督臣蔡珽謹奏竊查賑濟之事官有怠玩吏多狡猾兼有劣衿積聖天子與田野小民至誠感應呼吸俱通若此欣喜之聖念甚殷民情既切臣職在奉上撫下實日夜憂懼恐上負主恩下慚民望乃䝉硃批奨勵尤所難當今歲水甚大民堤之衝決臣所知者三十二處目下只有二處報完兹䝉聖慈令動正項為民修築臣謹即飛飭地方官矣臣又聞蘇家橋等處堤工頗大臣巳遣大名府知府曽衝決諸民堤除現在徧行查勘外就臣所知所聞者先行繕摺謹奏覽署直隸總督臣蔡珽謹奏前肅寧縣賑濟遲誤臣業已題叅今又訪得霸州髙陽亦未賑濟霸州知州因往天津署印現有詳文聲明尚為可原髙陽縣知縣旨革職合併奏聞謹奏川省武弁中有為年羮堯之用人曽過繼伊子者不知是副将或係叅将其姓名朕亦忘之矣爾如記起錄出奏聞此人行為何以至今尚未見各處奏報耶署直隸總督臣蔡珽謹奏齎摺人回䝉恩賜臣風乾羊肉臣謹叩首祗領訖臣見部文以天津新倉潮濕令李維鈞賠修前據李維鈞云南四府不虧空臣思莫若即令李維鈞将南四府之米罰其自備脚價運二十萬石至被荒之地明春賑糶尤為有益也前者省城米價驟長今聞聖恩准令浦文焯即運米來平糶民心感悦米價亦漸减矣謹奏知道了前因照爾所請業諭截留漕米二十萬石可分貯各州縣矣署直隸總督臣蔡珽謹奏竊查直隸賑糶等事需員稽查而現任州縣等官各有職守殊乏可以調遣之員且恐伊等向係同官或有互相徇隐之弊臣今将賑糶等事委令武員稽查再有𤼵來料估城工之十三人亦求聖恩令協助查賑伊等與地方官向無交手自然從公者多且三冬查賑之後明春修城伊等亦得先熟知地方之情勢也謹奏此番㨂選人員惟皆取其誠實者𤼵往内恐有迂拙而短於才者俟伊等回京朕再加甄别降旨交𤼵與汝於查賑處酌量委川署直隸總督臣蔡珽謹奏保定府所拘禁魏之輝家人有保定之民而為其雇工者男女大小四名毫無干渉俱一同被拘甚聖恩於再造又順徳府知府范𢎞偲聞得操守亷做官好百姓感戴今緣事罷職因保留新例甚嚴民不奏覽署直隸總督臣蔡珽謹奏臣聞目今天津之船甚少而河至小雪即凍河凍後輓運甚難䝉任邱新安鹽山等處原議查丈馬厰目下甫經被水正官忙民歉之時查丈實可緩至明秋均望聖恩批示謹奏查丈馬厰一事俟朕與怡親王及塞徳商酌後再定朕思丈量之時地方有司不過分委數員即可足用豈有多需官員之處乎去歳係霸昌道卞之錀經管其事今若差員來查丈時可仍舊委伊經管倘竟行停止則不待言矣署直隸總督臣蔡珽謹奏齎摺人囘䝉之處容臣訪的再行具奏賑糶之事臣日夜思維定為十四欵謹呈御覽求指示可否将來㪚賑官各給一張並出告示貼所賑之地庶或有少益也賈大所捐銀六萬两只交四萬奏盛京運來之米已據奏報将次至天津矣馬厰地畝今巳停止其查丈改期於明歳秋間再行差往也賑濟條約一地方官之侵冒斷難姑容也今歲直屬地方雨水過多田禾被淹民間乏食荷䝉皇上發粟賑恤該地方官理應仰體一胥役之漁利分肥所當盡法究處也賑濟窮民寛貸一衿棍把持亟宜剪除也各州縣多有一二惡劣紳衿出入公庭兼有土豪地棍互相倚賴遇有賑荒等事逼脅把持官吏受其挾制愚懦被其欺凌遂致㷀㷀小民竟有忍饑而莫訴者如宻訪得實斷不寛宥其有貧儒寒士膏火無資者許敎官查明㑹同地方官一體賑濟以廣皇恩一被水荘村民户宜逐加查察也發粟救荒原以賑乏食之窮民若将力能自給者冒濫一名則真正乏食者即少沾一名之惠該地方官務湏親詣村荘挨户確查如有田地未盡淹及有貿易手藝一查明應賑之民宜給以印票也各村荘應賑之民衆多焉能人人而識之應按户給以印票一張可杜重冒之弊矣一㪚賑窮民應照逺近分先後也如一境之内則有四郷東西南北次第及之定以日期預為曉諭一運到之倉糧當就水次領給也該地方官倉無貯米者業於截留南漕並撥運通倉米石分𣲖領運以備需用但米至沿河必俟起卸入倉而後示期開賑既多輾轉輓運之繁更滋窮民守候之苦應於前七日曉諭㪚賑日期凡四五十里以内者前赴水次照數領回則脚價可省而民無待哺之一現在之倉糧先應均勻㪚賑也各屬貯倉米榖有不敷賑給之數者或派運新倉之貯米或撥運隣近之倉糧接濟而補足之若以米未運到藉詞本倉之米不敷坐致稽遲必致有誤應将現在之一造報之冊籍宜清查更正也賑濟災民原屬緊急奉文之初不及清查偶有或遺或濫之處不可以訛傳訛不可将錯就錯其有誤報於前者亟令一聞賑歸來之民當為續報也被水地方從前有覓食他郷㩦家出外者值此㪚賑之際必有歸來之民當按名造報一體賑濟再各州縣内有别屬窮民其本處現在㪚賑者即善為勸諭回籍領賑勿得竟為膜視也一賑濟米數宜嚴查扣剋也夫賑給窮民原為餬口之需乃有玩法胥役通同作弊扣剋侵漁該地方官務湏親加查察如有升斗不符米數不足或攙灰灌水者立即於㪚賑處所盡法究治倘地方官不行覺察定以溺職嚴㕘一冬三月之米應作两次給𤼵也賑濟三箇月之米充九十日之饑若一次全給恐有無知之民到手花消竟歸烏有以致寒冬歲暮俯仰無資不若矣一領賑之村荘無容紊亂也㪚賑之法應按四鄉而一鄉之内則有各村荘若不預為𣲖定則臨期必致混雜擁擠應毎村與以紙旗一面上寫村名一㪚賑之日宜稽查匪類也乏食窮民㩦粟而歸恐有䑕竊狗偷之輩乗機搶奪亦未可定應於㪚逐欵合宜速為如法行之再城工一事亦應嚴禁地方衿棍以杜絶包攬此㪚賑示文内當以遵奉上諭作起俾官吏實力奉行兼宜加意訪察為要署直隸總督臣蔡珽謹奏按察使浦文焯奉旨同李維鈞拆蓋天津新倉但目下有查賑之事又積有命盗案件且李維鈞現在天津拆倉浦文焯已差家人工匠在彼同拆況目下将凍只可拆卸必俟明春方可動工可否令浦文焯暫辦查賑明春再往天津恭請批示謹奏凡事自當擇緊要者先之照爾所請留浦文焯辦理賑務署直隸總督臣蔡珽謹保定起程恭祝萬夀合併奏聞謹奏十九日起程前來似覺太早於二十七八日抵都恰當其時将印篆隨身帶來仍可辦理任内一切文移十一月中旬朕躬親詣祭陵留爾在京同怡親王及馬齊殷徳料理諸務頗需時日於爾地方事件亦不致貽誤方為两便署直隸總督臣蔡珽謹奏為請旨事竊臣查得年羮堯資財藏寄保定者共箱匣厨櫃捆包等項四百三十一號俱有查造清冊又魏之耀魏之輝等所貯玩器首飾紬縀衣服器皿等項共八十六號亦逐一造明細數又據易州冊報有年羮堯家人嚴二等存銀四千三百餘两紬縀衣服首飾等物共六十五箱亦造送細冊臣曾親審刑訊伊等據供年羮堯之物在保定者止此其餘或在京中或在四川已為阿齊圖岳鍾琪等所封禁今魏之耀等俱已解部質審應聽部臣嚴審究追再據易州清苑安肅滿城完縣涿州昌平東安武清玉田等州縣報到年羮堯房屋地畝臣核算共地二百九十七頃有竒房一千二十餘間應俟查齊之日分析造冊報部至魏之耀等産業已經聖主特恩仰祈皇上批示遵行謹奏拉錫到杭據伊摺奏年羮堯之可惡處實為意想所不及真大竒事俟朕見爾時再備悉面諭爾知也伊等大約於十一月初三四抵京世間竟有不欲求生之人殊為可訝可怪之至署直隸總督臣蔡珽謹聖恩寛宥賈大捐銀一事彼見其主事事敗露因設計捐銀又借稱變産實脫身逺避耳䝉皇上時再當細奏也賑濟十四條䝉皇上批定臣謹以欽奉上諭作起即令刻頒各州縣命其多行抄貼至将來應賑者約計有六七十處臣意令余甸蔡起俊張廷棟分為三路徳明浦文焯於近省城之處亦各分天雖寒尚可耐荒年之最難禁者十一十二正月也臣請於十一月㪚起正當其期二月間又有城票至領米後即将印票上濃塗一筆仍與本人既臣又訪得州縣有因倉糧全無而竟不賑者有應聖恩諭吏部直隸州縣除因賑糶事被㕘者容臣以𤼵皇上軫念民瘼之心而已然終不能知将來之賑果能如意否也謹奏觀爾一切措置甚合朕意今冬明春無一鳩形鵠面之民流至京師方覺大為我君臣生色也各處堤工恐爾鞭長莫及所以遣石麟會同逯選前來協助積水若不預為設法瀉乾至明春仍恐束手無䇿計日未免已遲朕因此甚為厪念署直隸總督臣蔡珽謹奏初四日保定府得雪臣細詢農人云地土甚濕不慮蝗蝻可寛聖懐也呉隆元一摺臣查議後另當具本奏聞張廷棟詳議驛站一事臣已具本昨有天津州知州好且騎馬亦只二三匹又非逺出只在本城是以且未題叅現在批司查審合行一併奏聞謹奏赦小過舉賢才為政之體當如是也雖然查審之後方可定其有無情故耳署直隸總督臣蔡珽謹奏臣於初四日接永平府知府滿雲鷫詳稱喜峰口於三十年前有永平各屬所運貯之漕米捐米共一萬三千六百二十餘石年久腐爛請於青黄不臣今定於十一日往天津查米往玉田豐潤永平等處查賑至永平之日臣親身到喜峯口實查米數確估成色一面請旨一面令其平糶可否如是伏乞批示遵行謹奏喜峯口何必親往若因順便或可一到然事闗盤查非多需時日恐不能得其確實也署直隸總督臣蔡珽謹奏静海縣因前任知縣開報倉中有糧及至查之乃並無糧臣是以題㕘現令藩司查其虧空數目而所運漕米不足用臣又令天津道運米六千石又令布政司與銀七千两折㪚今日方接到天津道一信云米因阻凍現用拖牀前運而河冰又厚薄不等有不能行處知縣新任毫不解事又兼有此故是以所賑甚不妥協今星飛遣人前往凡不妥處俱令補足臣到保定後将要緊案件三四日審完即親身前往再米少之處搭銀折放舊例銀一两折米一石但目下米價貴臣意欲照市價折之庶有便於民相應請旨批示謹奏據奏則新令亦係無能為之人也折價㪚賑固屬可行但當将原委題明著落捏報之知縣賠補如力不能完則著落失察徇隐之上司李維鈞等分賠汝湏親往一看朕仍遣三人來助汝查覈署直隸總督臣蔡珽謹奏鑲紅旗漢軍候選縣丞張鍾雖品貌不揚語言遲鈍然學問好頗諳吏治伊父两任外官幕事皆伊辦理前曽捐往陜西效力年羮堯知係臣之親戚竟令閒住許久並不得效力咨遣回京昨八月方到張鍾昔年曽在皇上處奔走效力難逃聖鑒目下㪚賑需人可否𤼵來辦事若果有勞績以何缺補用伏祈聖明定奪謹奏從前張鍾何故往陜西去朕並不知現今諭部引見另有諭旨也此人向為朕所深悉甚屬老成忠厚即貌亦無不揚處原係劉琪薦入府内者至於劉琪乃一不堪匪類伊兄弟之間情如水火無怪其然一大奇事兹特諭爾知初三日白晝突有一虎至齊化門外該地方報知步軍統領阿齊圖帶領新滿洲等前往擒捕而虎已伏於河畔葦草之内伊等因到時已晚共執鎗爇火而圍之守至夜半虎忽躍出南往自東便門登城從城上行至正陽門由馬道下城亦並未創艾一人遂直入年羮堯家蹲踞屋上阿齊圖復率領新滿洲等追至其家舉放鳥鎗虎始跳下避入年遐齡之花園中被新滿洲等用鎗戳斃世間有此奇事乎年羮堯正法之兆顯然矣天道如此彰明顯示能不令人愈増凛畏朕實驚詫之至奇哉即攷之前代亦為罕聞之事也朕於元年有夢虎之事不記曽向爾道及否日間刻無寧晷時夜漏下二鼔燈下隨筆所書莫哂字畫之醜率也署直隸總督臣蔡珽謹奏齎摺人回臣恭讀諭旨虎入年羮堯之家此事真是奇極臣伏見上天之慈佑皇上事事指示明顯之至鍾愛實實至矣極矣聖祖之付託皇上上合大心即此亦是一大徴驗平常之人有些微之善尚不肯墮落廢棄皇上得眷既已若此自然益懋皇上曾向臣說元年有夢虎之事臣今雖記不甚明然硃批修堤之事聖心因稍遲而厪念此則不妨目下尚遍地皆水無可取土則先時尤難措手實不為遲臣細查此堤甚奏數處之城工但估修此堤勝於修城多矣臣又聞上諭作起各立條約數欵恐厪聖念謹一併繕摺恭呈御覽伏候酌定謹奏條約甚詳悉允當於修工减糶等處張貼可也署直隸總督臣蔡珽謹奏初八日跪領皇上𤼵回二摺内臣請往喜峯口查驗倉米一事奉有硃批恐盤查多需時日臣思得一法不必盤查而事自妥一日即能完但非臣親身到不可查永平到京有南北二路南路由豐潤玉田北路由遷安遵化喜峯口在遷安遵化之間既不甚逺由遵化一路查賑而歸實為至便也謹奏知道了近日窮黎流移至都中者頗多或為希冀朕恩而來亦未可定爾必飭令州縣各官多方撫輯使不至逃亡方好不然則無所底止也朕亦現在設法諭府尹及司坊官等給資送回本土署直隸總督臣蔡珽謹奏臣於二十七日到保定此番途間見乞食之人凡十五六起問之有自山東來者有自河間等處來者其河間等處來之人咸云三月之賑已得目下河冰未開加賑之米未至是以出外總之冰開日米既到堤工一起民必歌樂土矣外有喬學尹一摺所叅祁州知州甚屬允當又呉隆元一摺分别所查諸地方官之賢否除已經叅革者外其景州河間縣二處亦原屬不好理合一併奏聞謹奏所奏俱悉近日來京就食者亦甚衆嗟此窮黎㷀㷀莫告朕現諭五城増米煮賑矣署直隸總督臣蔡珽謹奏為銀米兼收徴糧平糶以足民食事竊查賦從地出江浙諸省有本色折色之分獨至直隸賦税俱完地丁銀两而不兼收米毎於完糧之日小民必以粟易銀賤糶完納至春青黄不接又貴糴謀食雖是豐年亦多拮据一遇災荒便有流離瑣尾之苦臣仰體皇上愛飬元元至意再四思維合無請照江浙省銀米兼收成例将直隸額徴錢糧統計均作二分編為定額一分完銀一分完納麥米豆髙粱其銀於開徴日交納麥於五月交納米豆髙粱於秋收後交納俟來春青黄不接之時令地方官将交納之糧務照定額所徴銀數平價糶賣所糶之銀即以解司解部定限四月内全完以地之所産徴之於民而民自易辦以官收之糧平糶於民而民食常足一轉移間國課民生均為妥便為此繕摺具奏伏乞皇上睿鑒勅部議覆施行謹奏據奏銀米兼收國計民生兩益但百年成例一旦更張之非細事也俟爾回京面商可否硃批諭旨巻八十七
