body:
  text: 欽定四庫全書硃批諭㫖巻一百四十九上硃批魏廷珍奏摺雍正元年六月二十八日湖南廵撫臣魏廷珍謹奏為恭報早稲收成仰慰聖懐事臣荷蒙皇恩擢撫偏沅仰體皇上愛民重農至意凡民間雨水田禾不時查詢今嵗秋間另報外所有早稲收成及米糧價值理合先行奏明再臣到任甫經兩月地方事宜悉心料理次第具奏至庫中錢糧俟原任布政司宋致到長沙交盤清楚再報合併聲明謹奏知道了爾向日居官為人清正和平朕所悉知但惟欲避垢離塵以求自潔而不肯任勞任怨今膺廵撫重任非當日清髙閒散之職可比處事貴剛果嚴厲不宜因循退縮地方利弊之應革應興屬員賢否之應舉應錯須盡力振作一畨方冀可收成效楚省近年以來被滿丕王之樞張連登宋致張聖弼等貪庸之流剝削糜爛吏治民生胥不可問矣此輩皆當立正典刑之人朕不忍即加誅戮暫寛其死全賴爾等殫竭心力滌除惡習將從前一切虧空之貪吏劣員盡情㕘革勒追彌補若猶不能完楚即題請將滿丕等削職拏解該員著落賠償斷不可連累新任屬員滋擾百姓尤不可将舊任屬員革職留任賠補俾令遺害地方切須秉公破面為之毋得絲毫瞻徇私情此數人皆大有手眼財賄通神汝若不能支撑少被摇動代人負罪見棄於朕恐無能為汝周全者也凡事悉與楊宗仁商計而行於此數人不少寛假倉庫自能填實汝等亦何憚而不為之宋致到後不但司庫錢糧即通省虧空俱應向伊清楚伊至不能展轉時自必供出滿丕王之樞伊等三人實為罪魁貨悖而入者亦悖而出殊不為枉也密之勿露撫標兵丁直省撫臣率皆不以為事就中惟孔毓珣標下整齊可謂天下第一爾極當留心鼓舞訓練不可疎懈雍正元年九月初六日湖南廵撫臣魏廷珍謹奏為恭報秋成事竊湖南早稻收成經臣於六月内具摺奏聞今各屬中稻晚稻俱已陸續刈穫據七府二州所屬及布政司鄭任鑰彚報臣復差查其收成有六分七分八分不等收成六分者共十九處七分者共二十九處八分者共十七處又查各府州縣米價貴賤隨時長落不一其現在報到者自五錢二三分起遞至一兩不等其五錢二三分者共三處自六錢起至零六七分者共十一處自七錢起至零八九分者共三十一處自八錢起至零四五分者共十二處九錢者共二處一兩者共六處地方寧靜兵民樂業所有秋成分數米糧價值理合奏明再臣接部文奉㫖差兵科掌印給事中陳世倕至湖南採買米石今於八月二十八日已到長沙與臣較長沙市斛比發下倉斛大有加一其價貴賤亦殊俟採買後科臣另報隨於九月初四日赴湘潭採買其到長日期科臣自具一摺親送臣處代為恭齎合併奏聞謹奏覽所奏收成米價數目甚悉陳世倕採買米石如有滋擾地方處不可絲毫隱諱亦不可慮及次年更來過言採買之無益務湏據實奏知雍正元年十一月二十五日湖南廵撫臣魏廷珍謹奏臣查湖南地方水陸要衝苖猺雜處道府州縣管轄多係要隘之處今臣查得湖南現在缺員府守則有衡州寶慶常徳辰州知府四員未到任㕔佐則有長沙寶慶通判二員未到任州縣則有武岡靖州桂陽長沙瀏陽寧鄉安仁耒陽新化城歩巴陵華容慈利沅陵麻陽興寧綏寧十七員未到任以上共二十三缺乏員治理即委員兼攝道途徃返需時恐有顧此失彼之虞又明春二月鄉試内外簾官約需二十餘員地方遼濶庶務曠廢闗係匪輕如部中有已奉陞補銓選者伏祈皇上敕部催令赴任庶綏輯得人而巖疆大有裨益矣為此謹奏已将人員揀選發來矣據部臣奏稱未到任人員竝未逾限因值封印未及領憑耳爾之居官廉謹安靜固在不言但過於軟懦非封疆所宜聞該省許多命案處斷不當皆傳為笑柄夫賞善罰惡首貴得中次則寧嚴毋寛督撫大吏常過於嚴有裨政治火烈民望而畏之故鮮死焉寛之一字古人所難豈爾輩中材所能者耶一被屬員小民覷破慈柔罷軟則百度廢弛難以振作矣地方無事時猶可將就倘小有舉發怠玩成風為害匪淺至於武備尤為急務若偏執以徳化人之説視干盾甲胄為棄物操習廵防為具文殊與國家寛猛兼濟恩威竝施之教大相逕庭也讀朕訓諭當加意整飭一畨務令營伍改觀聞爾標下兵丁甚屬不堪嗣後若仍固執儒生迂見不顧國家重計則大負朕信用委託之意矣勉之甄别将領優劣訓練標營兵弁申明法紀懲姦罰惡絲毫無容寛懈再諭同日又奏臣查湖南藩庫錢糧宋致任中除去解過并實存數目查出虧空十萬七千餘兩又欠湖北藩庫中一萬七千餘又欠各州縣軍需動用銀兩一萬七千餘又應補解過廵荆道庫銀四萬七千餘俱未清完已經具疏題㕘但據宋致詳稱係前任督臣滿丕撫臣王之樞批明動用以為軍需等費所以請發来楚或就近問供以清庫項統祈皇上批示遵行又督臣楊宗仁轉𫝊上諭各州縣倉榖務湏顆粒實在不得存貯折價㫖問及湖南採買米石一事以臣愚昧之見亦視乎每年收成若何如有八九分十分豐收即採買十萬石亦屬易辦如收成不足八九分似宜停止葢自科臣陳世倕採買米石錢糧清楚無累地方辦事亦敏今已買完十萬石俱照發下部斛分五幫次第起行矣又長沙湘潭衡陽三處所買之米貴賤均算京斛一石合銀六錢七分餘再加一路船户脚價食米共一石約得一兩一錢可以抵通理合一併奏聞謹奏所奏俱悉雍正元年十二月二十日湖南廵撫臣魏廷珍謹奏科臣陳世倕會同臣採買米十萬石俱已全完滿載船隻於十二月十二日自長沙過江起行因江中守風至十九日方盡離長沙北上臣查所買之米合部斛十萬石共支司庫銀六萬七千六百七十三兩餘又雇覓民船一百四十五號合一路脚價食米起撥等項共支司庫銀三萬八千六百九十五兩餘又外帯去銀五千兩以為沿途費用如有餘剩到京交部以上共支司庫銀十一萬一千三百六十九兩餘臣即委長沙恊守備王成功押到淮安交替又委衡州府同知俞欽押到通州已經具疏題報科臣又因船隻衆多運經大湖長江前後恐不能照顧面與臣議又委茶陵州州判朱光表押送過江再委湘潭縣縣丞崔鏏千總雒璧二員管押到京理合一併奏明所有米石採買全完米船俱過長沙情由及科臣一摺一併奏聞謹奏知道了陳世倕於此採買米石一事始終料理若何據實奏知毋得絲毫徇情瞻顧雍正二年二月初二日湖南廵撫臣魏廷珍謹奏臣任兩淮鹽差一年所運辛丑一綱鹽引各項中有節省銀兩臣去嵗三月離任之時通綱合算雖有節省之銀但鹽引未經銷完而節省之銀竝未實收入庫臣即飭運司何順并兩淮商人將此項節省銀兩速收入庫去後今當辛丑鹽引奏銷之期臣所運一綱之事已竣於正月十四日據運司何順及兩淮商人報到辛丑一綱各費節省銀共收九萬三千兩又臣在兩淮一年經費銀一萬三百五十六兩除臣一年日用飲食及四季節賞衙役外尚餘銀五千兩臣離任之時仍封貯運司庫中又據行鹽衆商屢䝉聖恩感激莫報情願捐助兵餉六萬二千兩以上三項共合銀十六萬兩今已收完實貯兩淮運庫聽候撥解為此具摺奏明將此項銀兩解部充餉伏祈皇上批示遵行謹奏知道了潔巳奉公可謂不負聖祖之㧞擢任用也行文何順将此項銀兩解交户部雍正二年閏四月十九日湖南廵撫臣魏廷珍謹奏臣查湖南地方最險要者惟洞庭湖自到任以後即差人裏外探視一年之間已三次出入備悉情形極為安静臣謹為皇上陳之查洞庭湖為楚南諸水所滙成為大湖其中惟湘沅澧三江之水最大其湘江自南来入洞庭之南口有長沙協副將兵在上流防之其沅江自西来入洞庭之西口有常徳提督標兵在上流防之其澧江自西北来入洞庭之西北口有澧州㕘将兵在上流防之其洞庭湖水之出口在東北岳州下流直達武昌有岳州㕘将兵在湖口防之又有洞庭水師副将兵一在常徳一在岳州廵防此洞庭湖之周圍設兵安塘俱有規模也至洞庭湖之中雖有數山皆是孤立無曲港泊舟之處其中所用米糧多仰賴于四岸州縣况既無泊舟之處而匪人亦不能作巢穴所以至今安靜臣嘗差人過湖徃探其水自春至秋正泛漲之時一片汪洋無際及至冬間衆水歸壑各處洲渚畢露水涸沙長其深者不可測其淺者僅深尺餘舟到其中徃徃阻淺不能通行所以湖之裏外帖然無事此洞庭湖目前情形理合具摺奏聞謹奏朕亦聞近來甚屬平靜但恐日久懈弛或致姦究濳藏時加小心防範可也同日又奏臣查湖南各屬報到今嵗自二月以迄四月大湖以南州縣晴雨及時各屬早稻無不徧插秧苖茂盛至湖南米價隨時長落不一長沙府現在米一石價九錢五分餘至各州縣衞所報到七十三處現在米價自六錢五分至一兩一錢不等其六錢五分至零七八分者有八處其七錢至零六七分者有二十一處其八錢至零七八分者有二十三處其九錢至零六七分者有一十三處其一兩至零一錢餘者有八處又湖南地方宜稲不宜麥州縣報到種麥者甚少今查得二麥收成自六分至八分不等其收六分者有七處其收七分者有七處其收八分者有九處除四月以後雨澤米價及早稻收成容臣另報外所有現今晴雨及時春麥收成早稲徧插米榖價值地方安靜各縁由合先具摺奏聞謹奏覽奏湖南米石價平麥收稻茂深慰朕念但不可絲毫渉於粉飾同日又奏湖南鄉闈初創士子踴躍来試者八千四百餘人無不懽忻鼓舞感戴聖恩至揭曉後士民翕然各無異言安静之極又衆士子俱赴臣處具呈以湖南分闈既蒙接到督臣楊宗仁差齎上諭一道至長沙為社倉一件有奉行不善令熟籌經乆之法臣跪讀之下仰見聖明無㣲不燭洞見地方利弊如指諸掌臣查湖南各屬有報到社倉捐榖者俱俟今秋稻熟之後方行入倉此時捐輸實貯者甚少如有奉行不善之州縣容臣再查今當奏銷之期督臣楊宗仁目下即到長沙盤查司庫臣即會同司道與督臣熟籌經久之法另行具報合将奉到上諭縁由一併奏聞謹奏爾除操守之外一切吏治毫無可取同日又奏臣於二月十六日在貢院中接到御批奏摺蒙皇上問及科臣陳世倕採買一事臣自其離長沙後又復細查其於司庫銀兩收支俱清其於米行舖户出放錢糧不使有浮開盈餘又聞其過洞庭到漢㨗其於錢糧實係清楚臣於三月二十三日齎摺人回又蒙斷不敢寛縱屬員也至於撫標兵丁臣到任後查其營伍果然不整即於去年十月中製造大小旗幟一百六十八面又製火藥一千三百餘斤令演湖南書院惟有嶽麓山一處係朱子在長沙講學睿慮臣罪何辭惟有望皇上時加訓誨俾得成人更加勉力以仰報聖恩於萬一耳所有臣接到硃批奏摺理合恭繳謹奏嗣後仍不加勉自勵斷乎不可雍正三年二月初九日盛京工部侍郎臣魏廷珍謹奏臣到任後檢查檔案據昭陵掌關防董魁邦等咨文寶頂因年久風雨石灰三合土剝落臣即親到仰瞻已繕本具題修整臣又查得康熈六十年中福陵昭陵寶座褥子年久色舊另行新製盛京户部無此色樣緞疋隨即具題領取今該部已自都京領到織造緞疋理合奏明臣一面差官敬謹裁製安設又查得康熙五年陵宫新有安設褥子等項将舊者即於嵗暮在陵前焚燒又查工部庫中亦有存貯陵宫更換舊物應否存貯或宜焚燒臣未敢擅便理合繕摺請㫖欽遵施行謹奏移咨詢明京中工部循照舊例遵行雍正三年四月二十八日盛京工部侍郎臣魏廷珍謹奏臣接到福陵掌關防雅圖據總管來文内開石壘河堤馬頭等處倒壞臣已具題修理外又開大河之内東西小河溝長三百一十六丈五尺寛一丈三尺又有自東山流水二溝俱各年深日久不曽修理被風雨吹旋淤沙填滿若不修理倘遇大水流去不及必致正門兩傍牌樓紅牆等處浸壞亦未可定等因臣即親自會同關防總管查看内小河溝東西共長三百餘丈收東山之水過福陵之前至西南歸入大河其入大河之口現在尚有一丈四尺餘深竝無點水存貯以臣愚見常使内河身髙於外河水面其流下入大河必速小河内必不存水若一加深挑内河身低於外河水面再當夏秋隂雨外河水發其水面髙於内河之底則外河恐致倒灌於内又查工部文巻歷來竝無挑挖小河檔案又正當陵寝前面未敢輕議挑濬臣已回咨關防再加商酌盡善方可請㫖遵行臣亦不時親自查看夏秋雨水果否外溢再行奏請此項工程未敢遽挑相應将此情由先為具摺奏聞謹奏如此方見實心任事甚屬得理殊為可嘉雍正四年二月二十四日江南安徽廵撫臣魏廷珍謹奏臣到任後檢查各項檔案因自去嵗九月間新舊接署延積甚多現令陸續查明具題又查上江地方自冬至春雪雨連綿春氣甚佳麥苖青茂今安慶府米價每石九錢五分其餘各府俟催齊另行具報謹将所查各件條列奏明查得按察司朱作鼎其才屬中才其為人尚質樸查得學政俞兆晟初到上江考安徽廬州二府取文章尚才華其生員童生無私賣之弊但在安慶府每日供給必要三十餘兩至廬州府每日供給又查得新開河一事緣大江自安慶南門又轉東北至樅陽口六十餘里其中江東岸磯石甚多舟楫難行乃自安慶府東門外自江北岸開新河一道北通各湖由湖出樅陽口共四十里餘以避江磯之險且逺也但必夏秋間江水大發灌入新河及各湖中然後舟楫可行至冬春二季江水涸退俟另行具報又據布政司博爾多禀明藩司衙門有各州縣解錢糧耗羡銀内有八千兩為臣衙門中一切應用飲食之費臣隨令存貯司庫尚未提用因臣家口甚少所費無多俟将用處另行具報理合先行奏明伏祈聖鑒謹奏博爾多年餘來居官供職光景若何據實奏聞同日又奏臣到任後即查蕪湖正陽兩關稅務惟蕪湖一關煩雜臣委廬鳳道吴應鳳稽查監收目下稍有條理至鳳陽一關即委鳳陽府知府朱鴻緒稽查監收仍俱令所收税課十日一報收至一月即将一月收税檔案解赴臣處查核如或有以多報少及私收隠漏等弊即行㕘處以仰副皇上恤商裕課至意所有委官管理關務縁由相應恭摺具報謹奏吳應鳳朱鴻緒二人當留心委用其干係皆在爾身也雍正四年六月初八日江南安徽廵撫臣魏廷珍謹奏臣赴江寕㑹同署督臣張楷清查陞任布政司博爾多存庫各項查得地丁正項錢糧開明實在存庫者竝無缺欠惟自雍正二年起收存各屬公捐俸工節禮銀六萬餘兩查此項當日原為彌補上江虧空起見因虧空銀兩後經部議無着虧空将每年各官鹽規補完有着虧空仍向各員名下追補博爾多遂将此項俸工節禮等銀那借三萬三千餘兩竝未在庫其餘止存二萬六千餘兩博爾多屢次詳明動用臣俱未批行但此俸工節禮收存數目臣衙門竝無底册可查隨令新司石麟徹底清查今據查明借動各款并博爾多任中掛欠部平一萬七千餘兩現在無項起解隨即揭報仍向博爾多名下追補臣查此案巳經借動者既懸項無補而應行補解者又無項起解隨據詳於五月十九日具題此中情由合再聲明又臣欽遵硃批諭㫖看得博爾多為人辦事亦勤但任性恃氣不細心認理初到任與同城官不相和其後來始相安至於錢糧正項無欠其雜項不清楚合併奏明謹奏巳有㫖矣其嚴行察審定擬具奏以為若輩負恩者戒同日又奏臣又查得新開河一事臣由江寧回過新河口親看夏間水長形勢自三月初間江水灌入新河已不能挑濬現在停工查葛繼孔自新河南口挑入五里自北口挑入五里又查其料估全河工程俱按張楷所開舊勢挑濬此河共費不過一萬一千餘兩但仍是夏秋行船冬春不能行如開令冬春俱可行船則所費甚多矣葢冬間新河已成陸地其中髙於江水面一丈餘及一丈七八尺者此必開深二丈餘新河冬間始有一丈之水且新河南口抵當江水一帶鐡板沙進口一里餘兩岸又俱係流沙隨挑隨坍仍淤河身即便挑後必湏設立嵗修非一勞永逸之計共南北四十里開成大河四季行舟實非二萬金可能辦理莫若令葛繼孔於直隸興水利之地罰令效力現在可益民生為急務也此時正在停工難挑之際臣今又新見冬夏形勢就臣愚見謹将此河前後情由具摺奏明伏祈聖鑒謹奏據奏如此情形何必徒為無益之舉已有㫖詰詢張楷矣葛繼孔著另候諭㫖同日又奏臣查上江安慶各屬四月以前雨澤時若稲巳布種五月十二日以後霖雨大沛民間俱巳插秧目下隂雨連綿數日未休至六月初六日始有晴色又查上江二麥收成據布政司詳到安慶寧國池州鳳陽及廣徳六安潁州亳州統計收成七八分徽州滁州屬收成六七分太平府屬收成八分廬州府屬收成七分和州屬收成八九分惟泗州初報可收七八分後又被黄水淹沒現行查勘另報又查二麥價值安慶池州太平滁州廣徳泗州亳州七處小麥一石價六錢至八錢餘大麥一石價三錢至六錢餘鳳陽六安潁州三處小麥一石價三錢六分至六錢餘大麥一石價二錢八分至四錢餘寧國廬州和州三處小麥一石價七錢至一兩大麥一石價三錢八分至六錢惟徽州小麥一石價八錢五分至一兩三錢大麥一石價八錢至一兩二錢又查州縣六十處米價長落不一隨處各異就其現在一石價七錢六分者二處八錢至七八分者十處九錢至七八分者二十一處一兩至一兩二錢者二十處一兩三錢至一兩五錢者六處一兩八錢者惟歙縣一處地方安静人民樂業理合将近日雨澤二麥收成及米麥價值逐一開明恭呈聖覽謹奏知道了休咎徵應全在爾等督撫大吏之所感召此理實如立竿見影誠之敬之切勿視為𣺌茫雍正四年七月二十六日江南安徽廵撫臣魏廷珍謹奏臣前題報泗州地處低窪被黄水灌淹荷䝉皇上發司庫銀二萬兩命布政使石麟前徃散賑石麟欽遵聖㫖星馳前徃泗州被水男婦老幼莫不感頌皇上天恩歡呼載道可以無煩睿慮其續題貴池銅陵等沿江各縣因五月内大雨浹旬低田逼近江岸及臨内河者被水漫溢再因大江水漲内河之水不能消洩以致低下田地尚多積潦不能布種除現在委勘是否成災隨到隨題再黟縣石埭等處被水又因山水陡發衝入田畝雖其勢極速人不及防而易長易消非同平衍之處散漫停滀故水過之田較之水淹者其被災又有輕重不同即此幾州縣低田被水其無水髙田仍是稲禾茂盛可望有秋合併聲明謹奏吏治不純感召自當各異可望有秋乃汝操守亷潔之善應是否成災係汝巧譎不實之咎徴天心人事濳通黙契分毫不爽極當敬信而凜畏之不然非汝福也雍正四年十一月二十六日江南安徽廵撫臣魏廷珍謹奏臣查蕪湖鳳陽兩關稅務一年限滿所收錢糧今嵗比前俱極豐裕除解蕪湖鳳陽兩關正額銀二十七萬三千八百餘兩又除解兩闗銅斤水脚銀四萬三千三百餘兩外今尚有盈餘銀十萬六千免缺額矣臣請将今嵗盈餘銀兩可否仍解户部五萬兩其餘五萬六千五百五十兩解貯安徽藩庫遇米賤之時散於各州縣買榖存貯以僃賑濟之用葢查上江各州縣存貯米石甚少現在䝉聖裁指示以便遵行為此謹奏整飭地方諸務能一如料理錢糧則可入第一等廵撫之列也自莅任安徽以來若較前湖南之任則不啻霄壤之分然朕之望汝者尚不止此當更加勉勵振作以仰副朕意同日又奏臣監試武闈後仍由江路回安慶已經題明在案其兩岸被水地方臣一路細加查訊俱巳涸出其晚稲十月至十一月初間收割始完臣問民田收成分數及布政司石麟所報除被水州縣已䝉聖恩發粟賑濟外其各府州縣髙阜田土如鳳陽亳州所屬報收七八九分安慶所屬及泗屬之天長五河報收七八分徽州池州廬州潁州六安州所屬報收七分寧國和州廣徳報收六分滁州報収六分以至七分至各屬米價隨時長落不一就其現在者六十州縣中米一石價五錢至六錢者六處價七錢至八錢者八處價九錢至一兩者二十八處價一兩一錢至一兩二錢者十一處價一兩三錢至一兩四錢者五處價一兩六錢者一處價一兩七錢者一處臣就現在目見及查明者具摺奏明伏祈聖鑒謹奏今嵗江南秋末冬初雨水未免過多目下米價雖未甚昂開春青黄不接不可不豫為籌畫也勉之毋忽雍正五年閏三月初六日江南安徽廵撫臣魏廷珍謹奏臣到任年餘清查各處錢糧其自康熙五十五年起至雍正三年已經奏銷者查出官役侵蝕俱已㕘處仍尚有未查確之處應嚴定限期速為清理其中民欠最多者惟徽州府屬歴年丁地米豆折色民欠共有三十七萬餘兩其餘如寧國池州廬州滁和二州俱有五萬餘兩太平府有二萬餘兩鳳陽泗州潁州俱不過一萬餘兩廣徳州屬有五千餘兩其餘民欠俱少臣愚以為凡經管錢糧之員非親身稽查終恐不實惟州縣官身在其地能親身清釐惟知府直隸州能親身查察所以専責成於知府直隸州而歸重於州縣也又查州縣官到任後一交代出結查出虚捏即干徇隠朦混之咎是以州縣接受交代莫敢自為發覺此後有已交代出結之州縣将虚捏民欠據實查報不敢掩飾者仰懇聖恩俯照自行查出之例免其處分則州縣官既感戴皇上寛其冒昧接受之恩又懼不行查出分賠之罪自必和盤托出而積年民欠可以清矣臣已細列各項另行繕疏題明以請聖㫖合併具摺奏聞謹奏覽爾題疏朕甚嘉悅未交部議已降㫖允行矣如此則知改悔實心任事矣籌慮殊屬精詳妥協一切若肯悉照此居心行為何愁諸務不就理耶勉之同日又奏臣查上江所屬共存漕米九萬一千二百石内安慶府存米六萬一千二百石除放春季三月兵米外其餘經鄭任鑰保住親至安慶每倉俱一一過斛盤量無虧其倉内浮面有氣蒸變色之米俱經搧淨易換新榖至廬州府存米一萬石今換榖二萬石前因有霉爛據司詳㕘一面立押賠補今俱已賠補全完又經鄭任鑰保住親到廬州府每倉過斛盤量無虧仍有鳳陽府存米二萬石今換榖四萬石於三月十九日鄭任鑰保住自安慶樅陽起程上鳳陽盤查尚未據盤查完報合先将盤過安慶廬州二府漕米緣由先行具奏伏祈聖鑒謹奏盤量無虧甚好但恐其中或有那借富户米榖搪塞一時亦未可定仍當再為留心察訪積貯乃第一要政萬不可絲毫疎忽雍正五年十一月十九日江南安徽廵撫臣魏廷珍謹奏為恭謝天恩事臣䝉恩賜欽定詩經傳説彚纂御製律厯淵源臣即郊迎至署恭設香案望闕叩頭謝恩訖臣跪捧敬閲御製詩經序文知詩之為敎所以明勸懲而行黜陟葢治世之大經非文人學士風雲月露之辭深有以𤼵明聖祖仁皇帝修經垂敎之意孔子刪詩取思無邪之􅈲則詩之為敎自兹以後彰著流行如日月之經天江河之行地矣至律厯淵源一書闡理數之㣲奥集中西之大成使七政之行度五音之條理九數之本原明如指掌則天地費隠之道古今不傳之祕自此而發所未發矣臣當日僃員内廷躬充校對親炙聖祖仁皇帝乙夜披閲不輟寒暑一字一句裁定悉出聖心數十年来始能彚輯成書今日告厥成功復蒙恩賜臣跪捧荘誦儼然如對聖祖在天之神感激之至不覺嗚咽涕零不能自巳臣惟祕藏世世寶之䖍恭修摺以謝天恩為此謹奏據奏感激聖祖深恩嗚咽流涕既如此何不勉竭心力以盡仰報之道况汝現守封疆又非無位者比若果非虚文但将今日感激真情存而不忘時時自省能具純然一誠則雖愚必明雖柔必強矣勉為之同日又奏臣兼理蕪湖鳳陽兩關今又滿一年矣查兩關錢糧除解正項二十七萬三千餘兩再解銅斤水脚銀四萬三千餘兩今嵗仍有盈餘銀十萬餘兩其中惟鳳闗獨多至八萬四千餘兩而蕪闗甚少止一萬七千餘兩查今年夏秋間江水長發港􅆜處處相同商船自上流曲􅆜小河多直抵廬鳳可以不由蕪關所以蕪闗甚少而鳳關獨多也又查自江西沿江以来有九江蕪湖龍江三闗俱收江廣及川江之運到貨稅而蕪闗之稅額最多所賴者湖廣豆船之紛集以益課稅今秋湖廣受水豆船販來稀少故税不及徃年臣惟即兩關所收多少之數據實解報為此具摺謹奏但稽查得法報解據實不令屬員吏胥滋隱匿之弊即是矣何論徴收數目之或多或寡也同日又奏臣於十一月初一日自江寧回至安慶一路沿江田地巳種菜麥俱極青葱復得霖雨土脉滋潤又據署布政司噶爾泰報到各屬中晚稲俱巳收穫其安慶廣徳州收有六分池州鳳陽收有七分亳州收有六七分太平和州潁州收有七八分寧國廬州六安泗州收有八分徽州滁州收有八九分至米價隨時長落不一就現在價值六十州縣中每一石價七錢至八錢餘者共八處價九錢至一兩餘者共十處價一兩至一兩二錢餘者二十二處價一兩三錢至一兩四錢餘者共十四處價一兩五錢至一兩六錢餘者共四處價二兩者惟歙糧價值繕摺奏聞謹奏覽同日又奏臣查上江一省錢糧自雍正三年以前厯十數年已厯二十餘年共有五萬餘兩厯年廵撫催追者止有二萬餘兩其餘係總督催追臣巳将當日徇隠失察及承追督催各官聖鑒允臣所請則此項可易辦矣一項有着虧空共二十二萬餘兩亦經二十餘年矣厯年廵撫催追者亦止有二萬餘兩其餘俱係總督催追臣将臣所應催各案親提嚴比上江惟此一項尚容查追彌補又臣到上江兩年有鹽規二萬兩臣兩年絲亳未收俱行文布政司查催入庫俟交收完日另行奏明又臣在藩庫平規銀兩實用不盡其仍存留庫嵗矣雖可勉強但覺精神不如徃年當此重任何敢一毫自欺以致誤公伏祈皇上另簡賢能料理地方使臣得補修書之地勉力校對以盡職守得聆聖訓使臣晚年學問有所長進則臣之晚節末路得以保全皆我皇上生成教誨之恩也臣䖍恭修摺謹以具奏在朝較之在外擔荷之任案牘之繁原省心力况在廷大臣朕朝夕接見推誠恩遇體恤周僃協和一堂汝自應欣羡企慕但汝䝉朕簡任封疆惟務潔已自好於民生國計毫未補益一切虧空錢糧案件率多畏首畏尾未能清楚一事而遽望内轉清要安閒適志以保禄全名如是則為臣不易之語謬矣仍若不肯身任勞怨竭力料理因循玩愒悠忽嵗月亦不過如張楷裴􅏍度鄭任鑰李紱等之結局耳汝日前一片感激聖祖嗚咽流涕之誠切寧非欺誑耶汝其勉之如欲晉秩内廷為君臣聚會之慶須有整飭地方之勞績方可遂意否則莫輕望也果能奮勉精神經理有效令朕嘉悅豈止内補修書之地而巳乎雍正六年三月十九日江南安徽廵撫臣魏廷珍謹奏臣奉上諭為計議總督臣范時繹養廉一事仰見聖恩高厚無㣲不周凡為臣子莫不感激臣到任後於雍正四年五月中至江寧盤查藩庫及雜項各款據陞司石麟面言督臣轄三藩司其上江藩庫中有平銀四千兩為總督養廉之資至上年十月中臣到江寧封貯銀兩又據署布政司噶爾泰亦言有此項銀兩今奉上諭復行署司查明另行具奏合将以前原由具摺先行奏明伏祈聖鑒謹奏覽三省奏齊之日有㫖同日又奏臣查上江錢糧除民欠及各官虧空另行分案題明仍有各州縣錢糧火耗未經具奏葢因上江錢糧一年解布政司庫止有一百二十餘萬其通省公務自辦理木植修造船隻以及每年額辦顏料起解餉銀除發正項之外其餘不足者俱出於各屬火耗之中如提各屬火耗分給各官養廉再辦理公務竟至不敷所以未敢遽奏臣今夙夜思維一省之公事當合一省之財賦通計之其中正雜各項俱可資以補苴合上江正項錢糧再算及雜項雜稅共有一百七十餘萬再将各州縣漕糧南米麥豆等項加入共有二百萬若每年徵收全完以加一耗算則有火耗二十萬矣除辦理公務及各官養廉尚且有餘可以為錢糧虧空補苴之用臣已行令布政司将各州縣錢糧火耗合計通省所有確數另行開列細數及各用項奏明請㫖合先繕摺奏聞謹奏提火耗之舉如肯秉公為之乃極有益於地方百姓之事設或以私心辦理措置不協其為害亦甚此在爾等大吏斟酌可為則為之若自信不及不敢為則不為亦可倘不發於本心又不肯秉公實力措畫均平曉諭百姓開導屬員聲言出自聖意而令闔省官民歸怨於朕試仰面對天能不愧歉耶近日直省相率彷行者頗多奏摺到朕槩如此批諭仍叧有㫖由内閣頒示矣同日又奏為恭謝天恩事臣於三月初四日接到大學士臣馬齊等寄字内開奉上諭覽魏廷珍奏謝賜嘉榖圖栢梁體詩及帽頂式樣等物一本内有野而有文草茅童叟咸識盛朝之制作等語殊属牽強不妥若係他人章奏中有似此荒謬之語朕必究問今魏廷珍所奏錯誤朕姑不深究爾等可寄信前徃令其知之欽此到臣臣聞命之下惶愧無地惟俯首叩謝天恩格外寛大臣本淺學庸材當書寫之時實不自覺其語不成文辭不達意兹䝉聖明指示臣始深知荒謬既感且愧寤寐難安皇上猶不即加顯斥止令寄信通知直如天地覆載之徳無所不包父母矜恤之心有加靡已臣惟愈加砥礪使學問有所長進皆我皇上敎誨之恩也臣無任悚惕感激之至為此繕摺恭謝天恩謹奏覽奏已悉念爾内廷行走多年身受聖祖天髙地厚破格殊恩料必不忍為此譏諷文章所以姑從寛恕汝當深自省察果出於無心不過一時忽畧小過若出於有意宜大加警惕痛自克責慎莫存此不可對越天地神明自取誅戮之念也硃批諭㫖巻一百四十九上欽定四庫全書硃批諭㫖巻一百四十九下硃批魏廷珍奏摺雍正六年六月二十日江南安徽廵撫臣魏廷珍謹奏為據實奏明事雍正六年五月十一日接到怡親王暨大學士張廷玉寄字一封内開雍正六年四月二十二日皇上發下條奏一件内稱各衙門缺主前䝉皇上盡行查禁一時弊絶風清天下無不歌誦聖明獨安徽廵撫衙門三十餘缺多屬徽州之人至今未能盡除子弟衣鉢相傳出入鄉黨鮮衣肥馬甚於富豪其舞文作弊無所不有而錢糧房尤甚葢盤踞日久上下書吏俱串通一氣州縣官平時情面徃来者即有虧空一切俱為支吾登答掩飾侵那本官不能一一清查受其朦蔽是以安徽所屬州縣虧空甚多皆由於此今後似宜遵例查禁凡廵撫衙門書吏名缺務令七府七州秉公考取殷實農民取具里鄰甘結加具該府州縣印結保送充當毋許仍存舊習則弊端可息等語奉上諭各衙門缺主舞文作弊甚為吏治之害年來巳降㫖令該管官嚴行禁革何以安徽衙門尚有此等之人把持盤踞今既有人條奏必非無因魏廷珍何以漫無覺察爾等可寄信詢問之欽此遵㫖寄信前来等因到臣伏查臣自雍正三年十一月十一日到安慶廵撫之任查點各房書吏多係徽州府人誠如聖明所諭臣恐其通同盤踞舞文作弊為吏治之害欲一時盡去徽人又勢所不能當時臣初到任凡一省錢榖事件惟憑案巻而查核案巻之書吏尤在熟練况上江有二十餘年錢糧未經清楚之案頭緒紛煩若驟換一班新進其以前案巻一無所知而目下諸務又無所據錢糧事件難以清楚所以仍用原班各書吏辦理且各書吏俱係經制巳經咨部有名未曽察出過犯亦難革退然全用徽人恐終有弊端所以臣自到任後已經陸續将各府人兼補現在安慶廬州池州太平泗州等處前後已共募補十有二人臣又行文張示各府州縣招募農民考補無如各屬募到農民不特文義不通且字多錯誤問以刑名錢榖茫然不知而律例又一字不曽入目所考多人而中選者甚少現在仍行招募漸次更換至缺主之弊自雍正元年巳經奉㫖禁革臣到任後又復嚴禁凡經制五年役滿者即令赴部考職另募更換其刑名錢榖各房臣親自僉點不使有一定之缺今奉上諭臣復令書吏各具竝無缺主名色結状存案以永杜缺主之弊至條陳所云州縣錢糧虧空一切俱係廵撫書吏支吾登答掩飾侵那事或有之以臣愚見又不盡然葢州縣之去任有虧空者其交代接受之官必不肯受臣亦嚴禁必不令其接受一毫虧空其州縣之現任有虧空者於年終奏銷知府盤查虧則揭出如有容隠即行并㕘責令分賠至廵撫衙門凡錢榖刑名案件應咨應題俱以藩臬兩司詳文為憑如州縣虧空司府州縣揭報至院而廵撫不㕘出此則廵撫書吏作弊為之壓案也臣自到任後如有屬員揭到虧空皆親自查核并無一案虚懸而不㕘者臣㫁不敢任其掩飾壓案不行也總之為書吏者初雖農民久則狡猾舞文作弊勢所不免要在本官為之主持如官将一切文案件件入目則舞文之弊從何而生如官将一切文案并不入目或入目而不能解其文義雖俱換新役弊亦不免臣現将書吏在各府招募陸續更換或有耳目未周之處舞文作弊招揺生事者再加密訪查拏斥革究處外理合将臣到任後已經更換各府屬書吏情由據實奏明伏祈聖鑒謹奏果如所奏應免物論矣然空言殊難凖信雍正六年十一月十八日江南安徽廵撫臣魏廷珍謹奏竊查上江十四府州所屬秋收分數今據署布政司鹽臣噶爾泰報到安慶池州六安州屬收成俱報八分徽州寧國太平鳳陽滁州廣徳潁州亳州各屬收成俱報七分八分不等廬州府屬收成報收七分和州泗州屬收成俱報八分九分不等至六十州縣中米價隨時長落不一今就現在之價具報每米一石價銀六錢至七錢餘者共十二處八錢至九錢餘者共二十六處一兩至一兩一錢餘者共十五處一兩二錢至一兩三四錢者共五處一兩六錢者惟休寧縣一處二兩者惟歙縣一處臣謹将收成分數并現在米石價值具摺奏明伏祈聖鑒謹奏據奏安屬米價内惟歙邑與各州縣逈不相同所以然之故朕殊不解且通省俱報豐熟而坐視一邑昂貴毫無調劑爾所司何事朕更為不解同日又奏竊臣兼理蕪湖鳳陽兩闗至九月二十日一年限滿其鳳陽闗委鳳陽道何宗韓徵收蕪湖闗委蕪湖縣知縣張鷲徴收統計一年所收税銀除解兩闗正額銅斤水脚共三十一萬七千一百餘兩外仍共有盈餘銀十萬零三百八十餘兩其中蕪闗盈餘三萬九千二百四十餘兩鳳闗盈餘六萬一千一百四十餘兩現在僃文起解户部理合先行具奏又䝉上諭查各闗現行則例與原頒則例有不同者盡行徹底查明另刋頒示臣署在安慶離關路逺連年俱是委官管理未經親身徴收臣接部文之後現在逐款稽查未免稍遲時日俟一查明即行具題合併奏明伏祈聖鑒謹奏此奏似屬預留地歩汝意倘至不能徹底查明即以未經親身徴收一語借以塞責耳稍遲時日何妨但莫令後人檢點方可獲免過咎雍正七年正月初十日江南安徽廵撫臣魏廷珍謹奏竊臣奉上諭計議各官養廉一事伏查署布政司鹽臣噶爾泰送到各屬實徵冊開安徽等屬每年共額徵地丁雜辦蘆課等項銀兩并本折米麥豆漕糧通計共銀二百三十一萬八千一十六兩零臣會同督臣范時繹計議又據署布政司噶爾泰稱其漕糧正耗米二十六萬六千二百七十七石零所有耗羨止敷兌運之費其各屬解司道本色米麥豆六萬九千餘石所有耗羨亦止敷州縣解省船脚舵脚沿途折耗之費均無庸提解耗羨外實計共徴銀一百九十八萬二千七百三十九兩零今請自雍正七年為始計應提加一耗羨銀一十九萬八千二百七十三兩零通計闔省公務并各衙門養廉共需銀一十七萬八千八百兩零仍餘存銀一萬九千四百七十一兩零以為臨時有公務急需及每年錢糧徵解不能十分額數之開除合将通省公務所費及各官養廉約計支存數目另具清單敬呈皇上御覽伏乞聖明指示施行謹奏閲汝所開公費各款項有十餘條殊為朕所不解俱經批諭單内以朕不解之心又兼信汝不及從何指示耶雍正七年二月二十二日江南安徽廵撫臣魏廷珍謹奏臣奉上諭計議各官養廉一事上江初議舉行未能一時定妥容臣陸續具奏如有臨時増用者另行再報如有臨時酌減者仍貯司庫其與下江條件相同者俱照下江已行之成規斟酌煩簡開銷庶無參差浮冒之處而事亦無貽誤矣前摺各條下未開明原委是臣之疎愚謹将硃批十一條逐一聲明再行恭呈御覽一總督衙門齎表路費銀一百二十兩此項以前係在江寧齎表故係江寧布政司中辦理今錢糧歸款故開入耗羨中臣今議裁去一總督衙門修理執事銀九十六兩此項原係一百九十二兩分上下江公辦今議裁去一總督衙門奏清書銀二百兩此項以前係布政司中辦理今照依下江開入耗羡中一将軍總督閲操銀一百四十兩此項以前共用二百八十兩係上下江司道公辦為操演賞兵之用今照依下江開入耗羡中一錦衣衞役工食銀二十七兩四錢此項衞役惟江寧府設凡遇迎送敕書詔誥慶賀大典承捧傘扇各項其工食向係上下兩江捐給今各項錢糧俱巳歸款臣照依下江開在耗羡中一廵撫衙門嵗修執事銀一百二十兩此項新任新年有此費用故照依下江開入耗羡中臣今議裁去一江寧塘餉銀一千兩臣前開坐京提塘公費銀四百兩是廵撫衙門中所給以辦公務此條原係工墨銀二千一百八十兩係州縣捐給臣先議裁據署司噶爾泰稱坐京提塘料理本省公事查封部文不止鈔報此項議裁無人辦公今議酌減照依下江開入耗羡中每年給銀一千兩一江寧養喇嘛銀一百八十二兩零此項原係上下江四六分辦上江應出四分係各屬捐給今照依下江開入耗羡中一每年藩庫解餉到部約需解費等項二萬兩此項係照依下江開四萬兩上江止開二萬兩據署司噶爾泰合算每年解餉到部五十萬每千兩用公費四十兩是解五十萬餉即用公費二萬兩如解餉數少即有餘剰仍存司庫一每年藩司採辦顏料錫蠟等項每年市價低昂不一約需協貼銀二萬兩此項銀兩據署司噶爾泰稱布政司中承辦一年即有成規俟辦完之後貼銀若干據實開銷臣以此項亦照下江開入俟今年承辦時悉照下江已辦之數核酌實用另行開報一布政司衙門各節表箋銀一百四十兩此項亦照依下江開入耗羡中臣今議裁去原摺又有廵撫南北提塘紙張飯食銀一百六十六兩一項此係江寧一處凡江寧安慶兩處文書往来恐有沉擱舛錯在此稽查分發又有臨淮一處自京中部文到臨淮分路一向江寧一向安慶恐有沉擱舛錯在此稽查分發不在坐京提塘之中合併聲明伏乞聖鑒指示施行謹奏件件必效法下江辦理始不愧封疆之任耶既欲模範他人歩趨而後舉足乃不效法田文鏡李衞而甘心效法陳時夏張坦麟足見識見之超越矣據所開各款既俱倣照下江定議朕有指示亦祗宜専諭下江汝自倣照而行何用諭汝為也雍正七年六月三十日江南安徽廵撫臣魏廷珍謹奏竊照江省二麥因有閏月所以成熟稍遲兹據署布政司噶爾泰報到各屬麥田收成分數如安慶府六屬七分者三處八分者二處九分者一處如徽州府六屬俱報七八分如寧國府六屬六七分者二處八分者二處九分者一處尚有涇縣未據報到如池州府六屬俱報八分如太平府三屬俱報七分如廬州府五屬俱報八分如鳳陽府八屬五六分者一處六七分者四處七八分者二處八九分者一處如滁州并二屬七八分者二處八九分者一處如和州并一屬俱報八九分如廣徳州并一屬俱報七分如六安州并二屬俱報八分如泗州并三屬六分者一處七分者二處九分者一處如潁州并二屬六七分者二處七分者一處如亳州并二屬七八分者二處八九分者一處至各屬米價隨時長落不一就現在報到之價六十州縣中每米一石價銀六錢至七錢者六處八錢至九錢者二十處一兩至一兩一錢者十九處一兩二錢至一兩三錢者五處一兩四錢至一兩五錢者四處一兩六錢至一兩七錢者二處一兩八錢者惟歙縣一處尚有涇縣䝉城銅陵未據報到理合具摺奏明又據鳳陽臨淮盱眙三縣交界中鳳陽屯衞地方報有蝗蝻生發臣立即差員查撲巳據各縣衞詳稱蝗蝻始生已經撲滅具結報到竝未傷損禾苖又據泗州報新設潼安衞楊家湖邊虹縣報宿遷縣交界瀏馬灘地方生有蝗蝻臣又差員星夜查撲務盡今於六月十二十七等日俱具結報已經撲滅淨盡并未傷損禾稼合将情由一并奏明伏祈聖鑒謹奏覽奏二麥收成分數内與朕所聞相逕庭者不止一處大抵将各州縣報文鈔録一通而已竝未留心確訪至各屬米價未開低昂先言隨時長落不一乃係自信不及預伏㳺移之語以防舛謬之失耳似此無憑無實儘可不必具奏且逐處皆用如字汝意葢謂故套如斯然則上江如是直省亦莫不如是若據汝意而論聖祖當年特命各省督撫奏報雨暘米價是誠徒煩無益之事矣汝既有此見即當詳議直陳請朕裁酌停止斯舉也同日又奏竊臣前摺所開耗羡中有總督廵撫衙門儧造各標營糧餉各案奏冊紙張銀二百四十二兩俱係照布政司開來原單繕入摺中臣今正當核造兵馬錢糧奏冊之時即将布政司中書辦清書等共十三人喚入臣署扄户修造共三十六日造完按日給以飯食毎人四分竝自江寧至安慶来往水脚盤費一共合算止用銀二十五兩有餘臣已行布政司以後兵馬錢糧造冊俱照此開支至總督衙門造冊公費另行開報再前摺中又開藩司衙門採辦顔料錫蠟等項約需協貼銀二萬兩臣已聲明俟辦完之日協貼若干據實開銷臣於五月中在江寧秋審正當採辦之時臣将採辦官徽州府同知傅楫面詢每斤每擔原價若干協貼若干以至解交水脚費用各項若干令其據實細開不得浮冒仍由藩司轉報今於六月中據署布政司噶爾泰據同知傅楫細開上江一年所辦一切顏料共止應協貼銀一萬一千九百餘兩竝不需二萬之多臣復令再行核實另報至于公事應用者如在安慶臣親厯其事俱行查照確實開銷今将查明二項具摺奏明開支臣更有請者廵察御史戴音保在上江開支伏祈聖恩指示以便遵行謹奏覽雍正七年九月十六日江南安徽廵撫臣魏廷珍謹奏竊照今科文闈輪臣監臨臣凜遵功令率同在事諸臣克勤克慎士子入塲點名臣親身監查第一場搜出上元縣生員楊大芳夾帯文四十八篇第二場搜出奉賢縣生員相溥夾帯表五篇又搜出懐寧縣生員張一元夾帯表一篇臣俱遵例枷責斥革於九月十一日揭曉至十六日忽訪聞匿名帖有第二十二名中式王以式第七十九名中式王以秀係伯叔兄弟俱不能文同榜叨中有傳係關節有𫝊係𫝊遞若非公同覆試正偽難定除現在咨會正主考臣黎致逺副主考臣李清植及在事諸臣公同覆試如果有闗節𫝊遞情弊臣即另疏題㕘嚴審究擬謹先具摺奏聞并附有主考臣黎致逺李清植摺一封一併恭呈聖鑒謹奏若無主考官之奏諒汝亦置之不覩不聞而已雍正七年十月二十五日江南安徽廵撫臣魏廷珍謹奏竊臣自江寧由水路回安慶已經具題報明在案臣在江面查看兩岸麥田俱經種植有田間已出苖者俱極青葱碩茂其各屬秋成分數并米石價值據署布政司噶爾泰報到細查其中俱按收成幾分之數逐細開明摺中冗長難以分析臣謹将收成數照冊另開清單恭呈聖覽至上江六十州縣中現在米價每石六錢至六錢五分者共七處七錢至七錢八分者共十八處八錢至八錢五分者共十四處九錢至九錢六分者共七處一兩至一兩一錢者共八處一兩二錢至一兩三錢者共四處一兩四錢者一處一兩六錢者一處理合一并奏聞謹奏覽冬雪闗係來年麥禾預兆當竭誠為蒸民籲禱若但以一已之利害私心邀求則未必見應於汝也同日又奏竊臣欽奉上諭密拏趙七一案隨查小孤山為江西上江交界其旱路為潜山營所轄臣即委潜山遊擊雷逢春差員横截江面密緝又查梁山采石為上江下江交界是遊兵營所轄臣即委梁山遊兵營遊擊閆璥横截江面密緝其中間安慶池州蕪湖各令本地文武官上下往来緝拿臣自江寧回一路俱面見申飭至揚州儀徴是趙七居住之地臣又咨下江通聞此臣愚見先行奏明至河間府河間縣貢生王之鋭臣原俟其一到安慶即差人伴送到京臣候至今忽於十月二十三日王之鋭到安慶臣細訊来自何處據云為河東督臣田文鏡差員伴送到京問明無干奉㫖釋放回家難以度日以臣係同府人又同為李光地選㧞貢生来求資助臣将王之鋭已覊留在署但聖明指示謹奏覽同日又奏竊臣兼理蕪湖正陽兩關八月二十一日又滿一年限期臣自江寧至蕪湖查點錢糧合蕪正兩闗總數一年共解正額并銅斤三十一萬七千一百餘兩之外今嵗錢糧豐裕仍有贏餘銀一十一萬餘兩葢因今年秋中江水平順未曽漲溢每年商庫所收耗羡銀兩據署司噶爾泰稱今嵗所收各州縣耗羡銀兩已經十萬有餘詳請散給各官養亷銀兩前来臣隨與督臣范時繹面商各官養廉已先發一季除所收耗羡辦理公事外陸續按季給發各官養廉理合一併奏明伏祈聖鑒謹奏養廉乃係即應給與之項必多方掯勒朕殊不解其故在汝無非潔身預防之意耳同日又奏竊查今科江南鄉試於九月十一日揭曉至十六日訪聞有匿名帖中式舉人王以式王以秀係叔伯兄弟一榜同中云係關節𫝊遞臣隨先行奏明一面會同正主考臣黎致逺副主考臣李清植布政司臣噶爾泰提調臣劉永鐄等於十八日出題二道復加面試王以式王以秀俱各成二篇竝非目不識丁者但細看面試之文氣尚清順中有二三錯字隨令江寧府李如蘭懸重賞購求匿名人即於二十三日拏獲貼匿名人係武舉陳鋭與王以式王以秀對門而居據供有夙嫌所以挾仇而貼除飭提調官劉永鐄外監試江寧府李如蘭嚴審如果有闗節𫝊遞情弊或係陳鋭挾嫌誣貼照例究擬另行奏聞再臣離安慶巳兩月有餘匿名人已經拏獲其應親審具題事件積累甚多臣於九月二十五日即自江寧起程先回安慶料理理合一并奏明伏祈聖鑒謹奏黎致逺李清植來京復命将此案情節已僃悉奏知矣雍正九年三月二十五日署理湖北廵撫臣魏廷珍謹奏竊臣接到大學士張廷玉蒋廷錫字奉上諭嚴訓臣偏執多疑駁查案件以致遲延不結計及米鹽等事臣捧讀之下惶悚無地臣䝉皇上髙厚之恩署撫湖北夙夜兢惕事無大小親身料理未嘗一日敢自暇逸奈臣材質魯鈍事多愆尤屢蒙天恩不即罷斥又䝉敎訓委曲懇切臣感愧交集無以自容敬将各件為我皇上陳之臣平日遇事過於拘謹臣亦自知屢加改悔至於偏執已見臣則不敢凡地方應咨應題之件必須會稿臣若偏執其非督臣亦斷不肯會稿况案件俱上達於聖主之前日月照臨之下豈容偏執即如湖北民欠有查出書役侵蝕者從前僅私行催追補項臣於此極言必㕘出審追使以前侵蝕者力為完結則以後之書役知所懲而不敢侵蝕所以公同會稿㕘出竝未有督臣不會稿而臣偏執獨行之事至楚省厯年案件遲延臣到任後即用三催之法遲則㕘其官如遲至二限不結者即照例嚴㕘将遲延之官革職留任在案如果因臣駁查至於遲延臣何能再㕘以革職葢湖北案件以前幾年拖延不結者皆因案内牽連督撫司道大員府縣不能取上司之供所以甘受㕘罰久而不結臣到任後已将田關一案審結将以前廵撫藩司㕘處再假印水程一案又将兩司㕘出革職發審竝不敢有瞻顧之處此二案係臣所自審俱已題明至徐聚倫揭武關一案係督臣與臣會審之件司中尚未審解至於駁案如情節未明定罪不當此應駁者若無情弊一駁即可回覆若駁之即遲延不回覆者皆有弊也凡有弊之案多不早審早解挨至限滿廹以無可駁之時日欲朦混結案一經駁下又歸遲延於上司此楚中審案之積弊也臣巳屢加嚴㕘無奈積習已久恐駁出以前之弊端故有是言現今假印水程之案五年不結其明證也至地方官厯来求廵撫為之擔當者多是不當外結之案求作外結免其㕘罰或倉庫錢糧求通融支放除此之外别無求擔當之處但此乃是上下通同之積弊臣則力除之於應㕘者必㕘錢糧不合例者不支此所以謂臣不為之擔當或因此謂之偏執然此皆弊也臣故不敢與之通同也至官員議事應行應止臣必面為分析不使有疑似之處葢地方官即臣所屬如有事件即可當面問明又何用臣之疑乎至山東饑民一件係上年冬月江邊忽来小船數隻既非漁人又不載貨恐為匪船令人探視其形跡不似匪人臣故云既非匪船聽他去罷不必驅逐但必查其来厯及查其来厯又有自陸路来者方知為饑民遂令武漢兩府查明賑濟現今陸續委官送回原籍不誤春耕至臣衙門每早開門放水菜時恐書役𫝊遞信息賖欠貨物及私添數目字句俱可暗藏作弊臣所以将日用菜蔬及書役食米各釘一簿凡開載明白者方許買入每早令一人稽查此臣所以防其弊竝非臣親身計及於此也臣見厯来官吏㕘案俱是門上作弊臣在湖北故用此法門上之弊庶乎可查臣自奉天進京䝉皇上面諭臣聖祖皇帝有保臣不與阿其那同黨之聖㫖又䝉皇上格外洪恩畀以封疆重任今年已六十有三僅生一子甫及三周臣之有後惟望天恩保全夫復何所疑懼何所瞻顧一切傳聞臣過伏望聖明時加敎訓有則徹底洗滌無亦倍加勉力夙夜勤惕策勵駑駘以仰報髙厚於萬一耳為此繕摺具奏伏祈聖鑒謹奏此奏嘉悅覽焉若肯如是存心復有何可訓諭恐汝不識朕意妄生疑懼耳今既胸懐渙然無他顧慮但當竭力勉盡職守以仰副任用王士俊交代畢來京陛見後方赴湖北為期尚早一切政務毋因暫署渉於草率從事雍正九年四月初六日署理湖北廵撫臣魏廷珍謹奏竊臣據黄州府知府康忱黄安縣知縣鍾彝詳報拏獲縣中居民管廷訓即管天申彭又文學習邪敎又在伊家前後搜獲銅劍符書圖印紬符紙符等件據管天申供習大成敎係彭又文彭皇次所𫝊而彭又文供彭皇次係從信陽州胡良友家學来再羅山縣亦有此等同教之人事關邪教惑衆例應通詳因口供不一夥犯不齊虚實莫定除将管廷訓彭又文收監起獲符書銅劍等貯庫一面關提彭皇次胡良友等獲日另詳臣按學習邪教例應㕘糾除飭審明口供另行陳奏外理合先為具報伏祈聖鑒謹奏似此例應題結案件何必多此一畨凟奏耶雍正九年七月十三日署理湖北廵撫臣魏廷珍謹奏竊查湖北地方交夏以後雨澤調勻稻田茂盛早稲現今收割各屬俱報有八分九分十分中稲亦俱豐茂結實七月後可以登場即瓜果菜蔬亦俱收熟據民間云數年来今年各項俱收至江間水汛五月平順六月初間始見大發每日長至一二尺初十日以後漸平交七月初間始定較之上年江水尚小一二尺查各屬臨江堤岸據布政司徐本據各州縣報到堤岸現在修築完固竝無衝決除一面仍令加謹防護尚有秋汛務保無虞又各屬有存七糶三之米米既有餘早稲又已新收米價甚平兵民安業除中稲收成分數查明另報外今據各屬報到早稲收成分數米石價值臣謹另摺分析恭呈聖鑒為此謹奏據奏早稲巳收米價平減以手加額覽焉雍正十年四月二十六日漕運總督臣魏廷珍謹奏竊臣於本年二月二十二日跪請聖訓即於二十五日起程途中接到大學士鄂爾泰張廷玉蒋廷錫字欽奉上諭寄信與臣即将性桂所派廟灣等四營兵丁改隸於左右兩營仍不時親加訓練務使技藝精鋭以僃調用其一應添設員弁等項事宜悉遵前㫖行欽此臣於三月二十一日到任而廟灣營遊擊適在淮城臣隨宣布皇仁明白曉諭各将僃兵丁無不歡欣踴躍於四月十二日廟灣新兵七十名俱送至淮城臣即親自逐名點騐賞以銀米安頓入官房屋居住使其得所分收左右兩營朝夕訓練於十七日又據鹽城營報将新募兵丁六十六名亦送到淮城時臣已起程渡過黄河隨即令臣標中軍副将點驗賞以銀米安頓訓練仍有海州東海兩營新募兵丁尚未送到今糧船全數俱行催過黄河已進中河天庾甚重臣又親自押漕北上抵通但淮城營房至今尚未修造兵丁孑身而来其家口仍在本處臣隨咨明督臣尹繼善撫臣喬世臣并行布政司令其速為料理葢造營房使逺来兵丁有以安身且令其家口俱搬入淮城再東海一營所添新兵其中有前任漕臣性桂召募趕繒船水手九十二名俟到淮時看驗如果海洋路熟善操舟楫即令在東海營作水手其淮城兵丁另行召募如仍是初募農民未經學習水戰似應仍歸入一千名數之内其趕繒船水手另行召募臣又已咨商督臣尚未准有回咨臣到任後在署僅有二十餘日今又至山東臺荘督催漕船過闗所有應行事宜容臣查明另行節次具報外合将調到廟灣鹽城等營新兵收隸標下左右兩營訓練原由先行奏明伏乞聖鑒謹奏覽奏俱悉武僃闗係綦重其加意訓練時刻毋得少忽同日又奏竊查淮安城中漕標及城守營兵丁共一千七百七十五名再添新兵一千名以及廟灣鹽城海州東海四營兵丁共有五千五百一十名其每季糧餉俱自淮安府庫支領但淮安府庫竝無存貯銀兩預僃兵餉俱係各州縣撥解到淮支銷每季旋解旋支稍有撥解未到兵丁係按月授食府庫又無别項可支每致周章以前漕臣衙門遇有急需即調取河庫銀兩兹臣面問河臣嵇曽筠云今嵗河工工程頗多亦不能寛裕以臣愚見淮城七營兵餉請照上年湖北所行每府存貯一二萬兩之例以僃急需将司庫錢糧撥三萬兩即交於淮安府知府常貯府庫其每季兵餉仍照例在各州縣撥解如至月初撥解未到即先動支存貯之項俟解到撥餉補足不得懸欠如有軍需應用者即一面具題一面動支每年奏銷時一例盤查如有虧空即行嚴㕘究追一以預僃軍需一以接濟緩急庶公事有僃而士馬飽騰矣臣愚昧之見伏祈聖明指示如允臣請臣即另行具題為此謹奏具題到日有㫖雍正十年五月十三日漕運總督臣魏廷珍謹奏竊臣奉上諭将性桂所派廟灣鹽城海州東海新添兵四百名收入臣標不時訓練臣到任後已據廟灣鹽城二營送到新兵一百三十六名分入左右兩營訓練業經奏明在案今又據海州營送到新兵一百二十名東海營送到新兵一百四十四名臣俱令中軍副将點騐分入左右二營朝夕訓練務使技藝精鋭其應添員弁葢造營房修整甲器與督臣尹繼善撫臣喬世臣商酌妥協另行具奏合将新添兵四百名俱已送到淮城收入臣標訓練縁由先行奏明臣更有請者淮安貧民草房多用葦墻竹竈皆易於引火臣前在山東臺荘接到報文清江浦民間失火延燒三百零二家草房五百餘間竝未傷人臣已嚴查尚未查到但今新葢營房基址俱附連衙署民舍又逼近倉獄之地若一例葢作草房火燭堪虞臣令料估屋頂以瓦覆之所費不多且可經久合并奏明伏祈聖鑒謹奏營房覆瓦以防火患曲突徙薪之見也是雍正十年十一月十一日漕運總督署理兩江總督臣魏廷珍謹奏竊臣准前署督臣尹繼善移交京口挑河一案縁今年七月内江潮湧發沙淤淺阻經尹繼善行常鎮道王之錡會同㕘革河庫道留南效力康宏勲估計挑濬臣復據詳駁核確估造冊前来臣查京口一帶為南北運行咽喉毎年撈浚止取浮泥今秋江潮湍發岸上之土下缷隨潮之沙積留據王之錡詳稱目下河水深處止二三尺淺處僅七八寸往來重船實難行走撈淺不足以濟事必得大挑方可遄行自江口起至丹徒閘計程二十餘里河面挑寛七丈底寛四丈深八尺其中運土逺近不一其挑土方打壩車水各項共估銀一萬八千餘兩復令核減仍需銀一萬七千九百餘兩亦不須動正項地丁錢糧查藩庫有厯年蘇松等處協濟嵗修此河節省銀一萬一百六十三兩可以動用如有不敷查㕘革河庫道康宏勲荷蒙諭㫖效力贖罪願捐銀三萬兩以僃效力之用即可於康宏勲捐款内動用再丹徒糧船曩泊運河兩岸民船往來擁擠難行今查有支河二道一名拖板橋河長六百五十三丈餘一名利渉橋河長三百二十七丈餘年久淤塞今議開挑估銀八千七百餘兩臣令核減仍需銀六千七百餘兩挑後令糧船住泊其中修艌受兌不致擠礙河道阻滯商民至挑河打壩車水工程甚多時已冬深難以再遲臣不揣冒昧請一面具題一面即動厯年協濟存銀支用庶不誤事即委常鎮道王之錡鎮江知府毛徳琦監浚再令康宏勲協修竝令熟諳河員分任其事至拖板利渉二支河俟運河工竣之日明春次第舉行其銀兩亦酌於康宏勲捐款内動用且今秋被風潮之民藉此傭工度日又有裨益除将挑河各事宜另疏題請仰懇聖恩俯賜允准合先将挑河各縁由繕摺奏聞伏祈睿鑒謹奏挑河各事宜於題本到日有㫖雍正十一年正月二十四日漕運總督署理兩江總督臣魏廷珍謹奏竊查蘇松等屬上年七月内風潮之後沿江沿海州縣營房墩臺城垣等項多有坍缷之處隨經前署督臣尹繼善一面繕摺奏明一面檄行通查酌量動項興修在案今據蘇州布政使白鍾山詳稱常熟昭文華亭奉賢婁縣金山上海南滙青浦福泉江隂靖江太倉鎮洋嘉定寶山崇明通州如臯等十九州縣分委各員協同地方官悉心查看其營房墩臺為兵丁棲止瞭望廵防之所海疆要地修理不容刻緩今於十九州縣中除福泉縣工程無多已經該知縣捐修又崇明嘉定二縣估勘尚未報到外其現在十六州縣共估銀七千餘兩此亦不須動正項地丁錢糧查各州縣現有從前捐修營房墩臺以濟軍工銀兩提解應用又查藩庫内有雍正九年於無礙於國無礙於民案内查出不充餉鹽規兩淮運司嵗解藩庫銀七千三百八十兩内動支修整又查上海南滙靖江太倉嘉定寶山崇明等七州縣城垣坍缷逼近海濵修理亦難稍緩但工程甚繁一時難以畢舉今酌於被水最重而坍缷最甚者於七州縣中先将上海南滙太倉崇明并太倉同城之鎮洋等五州縣先行興修共估銀七千五百餘兩其銀亦不須動地丁正項錢糧查司庫中現有奏留公用所收鹽商壬子綱匣費銀五萬兩内酌動修造且當此青黄不接之際小民藉此工作亦可出力餬口等因前来臣以所詳營房墩臺海濵城垣實属緊要一面先将最要者動工興修一面再令駁核確實數目造冊另行具報合先繕摺奏聞伏祈聖鑒謹奏所奏興修營房城垣各工及動用之項均屬合宜知道了同日又奏竊查下江沿海地方於上年七月内風潮之後據各營報到有漂失戰船馬匹等項亟應次第修補前經署督臣尹繼善行蘇州布政司確查動項修補去後今據布政使白鍾山詳覆前来臣查崇鎮各營擊損趕繒船六隻沙船一十六隻狼山鎮營沙船一隻唬船二隻吳淞營沙船二隻崇明戲臺等沙應設小哨船十隻原議将現存入官鹽盗船十隻改用今入官船十隻亦被漂失應另行成造以上共船三十七隻俱係廵防要艘未便缺少曩例於地丁項内動用今請仍於地丁銀内動支或應成造或應加修俟核明工料確數另報又查得提標竝崇鎮各營共淹失馬一百八十二匹營馬闗係操防為數既多不能責之兵丁又不便遲久虚懸已准提臣南天祥動支軍需加乾等銀買馬補伍在案查購買戰馬曩動朋扣銀兩今查藩庫現存雍正七年各營解到餘剰朋銀五千餘兩應於此内動撥每匹一十四兩共銀二千五百餘兩葢因戰船馬匹營伍不可一日缺少况沿海地方尤為緊要除一面具疏題請一面飭令藩司分别核實另冊送部外合先繕摺奏聞伏祈聖鑒謹奏業既具疏題逹何必又具摺奏况其中竝無請㫖裁酌處類此煩凟嗣後不可以已乎雍正十一年三月十八日漕運總督署理兩江總督臣魏廷珍謹奏竊查江省二月以後雨暘時若土膏滋潤天氣和旭前於三月初六日臣自到郊外親見四野青葱麥苖茂盛收成可慶竝據上下兩江各屬陸續開報前来臣查江寧府屬報入春以後連得瑞雪雨水調勻二麥甚茂惟江寧上元二縣於三月初三日雨後氷雹一陣麥苖無損安慶府屬報二麥長發茂盛已經苞花将次出穂徽州寧國府屬俱報雨水霑足二麥暢茂太平廬州池州府屬俱報麥苖青葱雨水調和收成可望鳳陽府屬報雨澤調勻二麥茂盛雜糧次第下種低窪之地更覺茂盛滁州和州廣徳泗州并所屬俱報二麥長發情形暢茂六安州潁州亳州并所屬俱報春雨四野均沾二麥茂盛蘇州府屬報麥苖茂盛入春雨水調勻可獲豐收松江府屬華亭奉賢婁縣上海青浦福泉等縣俱報二麥茂密青葱惟金山南滙二縣尚未報到常州府屬俱報今正雨水調勻目下天氣和暖麥苖暢茂惟宜興靖江二縣報三月初三日将晚風雨冰雹一陣麥苖受傷無多約有一分鎮江府屬報麥苖秀發青葱可愛揚州淮安府屬俱報入春雨雪覃敷温和晴霽麥苖長發茂盛太倉州并所屬嘉定鎮洋二縣俱報晴雨調和麥苖茂發内惟寶山崇明二縣報二月雨水稍多現在晴霽滋長徐州海州通州并所屬俱報四鄉霑足麥苖漸長茂盛邳州并所屬之宿遷睢寧二縣尚未報到理合繕摺奏聞伏祈聖鑒謹奏覽奏江南全省雨澤調勻麥苗長發朕不禁額手欣慶雍正十一年四月二十四日漕運總督署理兩江總督臣魏廷珍謹奏竊查四月以來各屬報到大麥結實多巳收穫小麥暢茂漸已結實農家深為欣慶今有江寧江浦二縣沿江交界於初七八等日具報二縣江洲蘆葦叢中偶有蝻子生發臣隨飛委標員協同地方官星夜撲捕民有交蝻子一斗者賞給錢文荘民利賞紛出捕捉遂即報完竝未有傷麥苖禾稼又上江之潁上縣亦報低窪湖地内有蝻子生發甚少遂即撲滅竝無傷損麥苖臣隨通飭各屬不時查察嚴加防閑毋得疎懈再徐州沛縣睢寧交界處所於三月三十日雨中帶冰雹一陣田禾稍有損傷雖據報通州縣而計不及十分之一猶恐間有當其重者現在飛飭該州縣查明田畝有無力者借給籽粒補種以冀有秋再二麥漸次登場民間種秧在即田内㣲覺少水臣於四月初八日設壇祈雨江寧府屬據報初九十一十四五六等日得有㣲雨蘇州松江常州鎮江等府屬據報初八初九初十十四五等日俱報得雨尚未霑足臣仍擇期䖍誠祈禱恐厪聖懐理合繕摺奏聞謹奏蝗蝻初生亟宜撲捕須嚴督該有司竭力為之此猶人力所可消弭之事年來屢試屢騐但若一令飛起則難以措施矣切不可被屬員欺蔽暫時疎畧遺害非細倘致成災則責歸於汝也慎之毋忽雍正十一年六月十九日漕運總督臣魏廷珍謹奏竊查五月内淮安以北州縣間有蝻子生發除當即撲滅外惟徐州安東沛縣豐縣地方尚未捕盡先是臣在江寧因上年夏間江南生蝻今嵗淮北舊生蝻之地恐復有生發臣隨預行各屬并淮揚淮徐道府各州縣及漕河二標中軍副将淮安城守營㕘将預先差人各處查勘有即撲滅當其初生亦易為力也後據各屬陸續報到或幾塊或幾畝所生無多又經節檄嚴飭委員督率速令撲捕今徐州安東沛縣三州縣俱報捕滅葢因徐州豐沛等縣接連山東地方俱近於㣲山昭陽二湖湖水大則沿湖邊之蝻子變而為魚湖水小則沿湖邉之魚子又變而為蝻惟此等處恐尚未盡臣於六月初三日到淮又委標員督同地方官上緊查勘撲捕毋分此疆彼界協同撲滅隨於本月十三等日據徐州安東沛縣豐縣報到以前所報之蝻俱已捕滅恐厪聖懐理合繕摺奏聞伏祈聖鑒謹奏據奏蝗蝻俱經撲滅深慰朕念硃批諭㫖巻一百四十九下
