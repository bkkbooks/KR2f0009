body:
  text: 欽定四庫全書硃批諭旨巻二十七上硃批傅泰奏摺雍正六年十一月初二日署理廣東巡撫印務臣傅泰謹奏為奏聞事竊臣蒙聖恩署理廣東巡撫印務遵旨於九月二十五日到任視事已經具疏題報在案所有一切事宜現在逐一辦理分别應題應奏陸續入告外臣自南雄入境經由韶州抵省一路查問收成年景晚稻俱極豐熟廣州各縣有八九十分不等潮州各縣俱有十分惠肇髙雷亷瓊等府各縣有九分十分不等韶州各縣有八九分不等南雄各縣有七八九分不等羅定州各縣有八九分不等現今省城米價每石一兩二錢至一兩一錢有零南韶肇三府與省城價值相等惠潮瓊羅四府州俱每石九錢有零髙雷亷三府俱七錢有零人民樂業地方寜静誠恐上厪聖懐謹将晚稻分數米糧價值繕摺奏聞謹奏覽奏晚稻收成分數并米價情形深慰朕懐同日又奏為覆奏事竊臣於九月二十四日舟抵廣州各官出郊恭請聖安所有頒給署布政使王士俊摺匣四個臣面交王士俊并宣傳諭旨如有奏摺可送交大學士張廷玉轉奏王士俊即叩首祗領訖又臣抵任後欽遵面奉自恃己見性情時有偏執此二人近在省城時常相見今将臣訪察情形先行據實密奏又欽遵面奉諭旨訪得提臣王紹緒操守極好惟為人稍覺柔懦但提臣駐劄惠州距省三百餘里所聞恐不的確容不凛遵聞合併繕摺奏覆謹奏覽署理廣東巡撫印務臣傅泰通政使臣留保工部郎中臣喀爾紀善謹奏為奏聞事竊臣等奉命前往廣東㑹同督臣孔毓珣查審阿克敦等各案欽遵面奉諭旨留心察訪抵粤之日即聞前撫臣楊文乾所㕘官達一案孔毓珣已将糧驛道何師儉署三水縣知縣范禧題㕘訪其所㕘之故因原出首之陳成元章燦林公官於廣州雷州二知府審時不知受何囑託忽然翻供從前首吿官達事件俱係何師儉等指使孔毓珣即偏聽據供糾㕘又聞官達係奉旨革職嚴審之犯先於李長茂案内審明婪贓是實並不照例發監直至九月内接到楊文乾遺夲所奉聖旨始於九月十六日将官達拘禁似屬狥庇然臣等初到未悉事之原委不便驟定其是非及至㑹審時於阿克敦常賚二案尚無曲庇之處迨審李濵一案即云從前石禮哈常賚所審有從公之處今署布政使王謩署按察使尹繼善所審有屈抑之處等語臣等查對案巻供情毫無寃抑因照兩司原擬定稿具疏孔毓珣雖已列銜㑹題而勉强之意見於詞色及審至官達一案則凡有干渉楊文乾之處必欲曲盡其詞凡有翻改之處即欲録供為據臣等細加諮訪乃知孔毓珣與楊文乾原不相睦及楊文乾故後遂有觀瞻偏狥之意是以有㕘劾何師儉之舉嗣於十月十七日准到部文内開奉上諭阿克敦官達等以楊文乾病故為快演戲開筵置酒稱慶聞孔毓珣不加約束甚屬無恥等因孔毓珣始覺惶恐畏懼雖楊文乾原㕘各案未能預定虚實臣等惟知凛遵聖訓從公審擬斷不使孔毓珣主持掣肘遂其私心今孔毓珣欽奉訓飭或能翻然改悔去私從公亦未可知其現在所露意指臣等不敢隱匿謹先據實密奏伏乞皇上睿鑒謹奏所奏朕嘉悅覽之但傅泰與孔毓珣現在同省共事不宜絲毫稍存芥蔕當務和衷為要此奏尤宜宻之勿露果若推誠相與尚不感動徐徐再行據實奏聞況孔毓珣老成練達尚屬感恩小心奉職可取處頗多汝等須互相推誠勸勉莫負朕之倚任也雍正六年十一月二十日署理廣東巡撫印務臣傅泰通政使臣留保工部郎中臣喀爾紀善謹奏為密奏事雍正六年十月二十日接到怡親王大學士張廷玉等寄字内開奉上諭羅定州知州楊廷翼原係楊文乾保舉之人聞其承審楊以寜之案過嚴今以詐贓被㕘或楊廷翼實有其事或其中尚别有情由爾等寫信與傅泰留保喀爾紀善留心體察秉公審理欽此臣等即欽遵㑹同将楊廷翼等提齊審訊復加密訪楊廷翼並無詐贓之事反覆研鞫備得真情除將揑詞誣吿之武舉彭士望等照例定擬具疏題報外所有彭士望揑詞控吿並督臣孔毓珣發司審訊據詳題㕘情由合謹另單呈覽至楊廷翼審無詐贓看其為人亦儘有上進勤勵之心但年少輕浮尚欠老成應否開復留任出自聖恩合併聲明謹奏凡事惟貴秉公直陳不可絲毫迎合阿順若然則大悮矣雍正六年十二月初十日署理廣東巡撫印務臣傅泰謹奏為覆奏事竊臣欽遵面奉上諭於出京之日即悉心體察看得留保為人居心淳厚遇事謹慎一同赴粤於語言動静間巳得其大槩及抵廣州㑹審各案件其聽斷之際敬謹慎密並無偏私執拗之處且值案情龎雜供情反覆皆能按理推情次第剖析但因自幼讀書迂緩之氣皇上加以訓誨俾其迂緩漸消心胸開拓誠為國家有用之材也至喀爾紀善為人見事尚能通曉用心亦復細密但資質器格皆覺褊淺而謹慎小聖諭指示者臣不敢為之隱諱也就臣愚見遵旨繕摺密奏伏乞皇上睿鑒謹奏覽此奏可嘉足見觀人精細處雍正七年二月二十四日署理廣東巡撫印務臣傅泰謹奏為奏請聖裁事竊查粤省東莞等十一縣於雍正三年秋間被水奉旨賑濟動用倉榖五萬八千三百餘石部議捐納監生補足又准部咨於海陽等六縣應増貯榖三十四萬石亦令收捐加貯查自開例至今止共捐過監生一百三十七名收過捐榖二萬四千九百餘石為數甚少因部議止令鄰近之江西湖廣廣西三省生俊各在夲省買榖運送廣東交收盖恐夲省購買復致榖價騰貴立法甚善但江西湖廣俱有山嶺阻隔惟廣西一省水路相通是以赴納寥寥臣愚以為别省買榖原期免使夲省榖貴至捐納之人似可不必拘定省分況粤省生俊現往浙省捐監者甚多可否將原例畧廣其途照康熙五十三年之例不論夲省外省旗民皆准其赴捐仍令在鄰省採買榖石親運来粤取具賣榖地方官印結同繳仍嚴禁持銀来粤就近買榖及私收折價以杜弊端如此畧為通融則輸納自多倉儲易充而懸案亦可速結矣是否可行伏乞皇上睿鑒以便另行具疏請旨遵行謹奏旗人逺至廣東捐納不合餘發該部議覆後酌定同日又奏為山瀕海素稱多盗臣於抵任之後據各屬申報竊刦之案甚多及解到親審其中積年慣賊為首糾月内欽奉上諭盗賊未經緝獲到官其中為首造意及殺傷人命之犯若自行陳首朕酌其情稍可原者量從寛減若思維欲求一潜消黙化之法以仰副聖天子弭盗安民之至意臣愚以為惟有行令密首於未刦之前與擒捉於將刦之際則事主之財物可以無失而此軰之罹罪尚可從輕今擬設立預首給賞之法或可為消黨散夥之計盖盗賊之心不過圖財行兇肆惡惟欲分贓今懸賞以待則一經出首既可得財又不獲罪雖下愚之人未有不知及同夥各姓名開寫明白令夲人之親屬密赴地說知出首之人姓名夲人仍令隨夥偕行俟將上到官該州縣即時發銀五十兩給賞出首之人倘夲人從前曽有刦過别案亦准供明免罪其商謀之弊庶於弭盗之法或可小補惟是給賞銀兩與奏觀爾憫恤刦盗其柔軟不必言矣請廣捐欵操守不可信矣為旗人開路受請託狥私情之意顯然矣似此光景豈為有用之成材耶治術多端從未聞有賄買匪𩔖不為盗之理似此則未行盗刦之人將作何奬賞耶假若誣䧟平人如何防其姦處分既輕夥同騙賞如何審其詐耶據奏將被首之犯押交族隣約束免其重罰則此被首者異日與出首之人豈肯干休不相仇訐耶被首此一次遂能保其改悔永不為匪耶種種差謬不能悉諭總之一蹈婦人之仁存好行小惠之念不但不能料理巖疆大省統率屬員識見日漸流於卑鄙淺狹即為旗下領催亦不能稱職矣觀爾景況將朕日前訓諭數月間已盡忘無遺奈何奈何幸有一事可取奏朕候㫖方行耳汝既具如此識見嗣後凡地方事宜絲毫必奏毋得擅便施行如少有専執隱匿之處朕則不汝貸也同日又奏為奏聞事竊照粤東各府上歲禾稻豐收業經具摺奏聞今嵗入春以来雨水調勻寒暖得宜所有菜麥等項俱各茂盛各處米價仍前平減人民樂業地方敉寧因廣省距京路遥誠恐上厪聖懐謹將現在情形據實陳明俟播種之後再行具奏伏乞睿鑒謹奏稂莠不除嘉禾不長觀爾胸存縱盗之心恐未必能感召天和也朕甚憂之同日又奏為覆奏事竊臣前回奏廣州府知府張鋗等一摺奉到具題請㫖補授又樓儼於二月初九日已到按察使任臣自當欽遵諭㫖留心體驗據實密奏又臣奏凛遵聖訓時刻訪查奉硃批固宜不時訪查更須不被人言所惑明之一字從公字生出方為真明勉之欽此臣惟有謹遵勉盡職守仰副委任於萬一耳為此恭繳硃批謹奏覽雍正七年三月二十九日署理廣東巡撫印務臣傅泰謹奏為奏聞事竊查粤東禾稻每嵗有早晚二熟早稻應於三月中旬挿蒔而種禾之際正需雨水今年入春以後雨澤及時每越十餘日即得滂沱大雨四郊霑足聞恭慰聖懐謹奏用爾此等人為巡撫朕心不期慰悅但冀爾等少減朕憂則亦可謂能盡人臣之誼矣同日又奏為奏聞事竊照粤東素稱多盗而廣州府屬番禺縣之茭塘沙灣市橋等處尤為盗賊之藪歴年以来竊刦甚多懸案莫結臣細加確訪沙灣之内石碁村一處較之茭塘市橋為更甚捕役有技莫施若發兵勦捕又恐玉石不分今嵗二月間臣與督臣孔毓珣從長斟酌遣撥文武官員帶領兵捕前往駐劄將盗賊自首准予寛減免罪之上諭出示遍貼伊等感激天恩陸續自行投首者共有二百六十餘名現發布按二司訊明所犯事由分别輕重議定作何歸案治罪及安置約束之法俟議覆到日即具疏㑹題外臣先將招到積盗縁由繕摺奏聞謹奏朕前諭甚明傅泰巡撫粤東盗刦案件不可問矣雍正七年四月二十四日署理廣東巡撫印務臣傅泰謹奏為遵㫖眀白回奏事夲年四月初三日廣州副都統臣吳如譯齎摺家人回粤捧到欽頒摺匣一個臣即恭設香案叩頭開看内有諭㫖一道并副都統臣吴如譯奏摺四件臣跪誦之下惶悚無地感愧靡寧伏念臣至愚極陋仰荷聖恩署理廣東巡撫印務抵粤以来時慮耳目未周心思不到恐被屬員蒙蔽恐有查訪糢糊以致利弊罔聞因革失當重負聖天子委任之至意倘有旁觀者真知灼見明指是非俾得亟為悛改仰答髙深此臣之幸也今吴如譯陳奏四摺其居心立論無非因地方民生起見但其間有中弊之處亦有未悉原委止就傳聞而遽以入吿者今奉㫖令臣明白回奏臣固不敢絲毫欺隱一字支飾亦不敢不將事之實情備細上達臣謹各條分析遵㫖繕摺另行回奏伏乞皇上睿鑒施行謹奏此後再加留心察訪汝到粤未㡬地方遼濶一切民情土俗吏治政刑何能洞悉無遺耶同日又奏為恭領聖訓感謝天恩事夲年四月初七日准刑部咨内開雍正七年三月初六日内閣發出紅夲三十四件内一件署理廣東巡撫印務傅泰題為請減煩瀆等事欽奉皇上嚴㫖并諭令將原夲擲還等因欽此咨行到臣臣跪讀聖訓之下既切悚惶復深悔悟伏思我皇上宵衣旰食日理萬㡬親覽章疏寒暑不輟此臣隨侍禁廷素所深知者乃抵粤之後因見審結定擬監犯病故者舊例逐名具題愚昧淺見以為定擬之犯似與初審之案有間遂以章疏滋繁恐瀆聖聽妄請減省殊不知人命所關更宜慎重我皇上勵精圖治恩被萬方止期政務平允寧惜觀覽之煩臣之見識卑鄙不知大體越分瀆奏罪實難逭乃蒙髙厚殊恩不即治罪将夲擲還又復頒示諭㫖開導愚昧感激之深愈増惶懼臣惟有益殫駑駘時加黽勉以圖仰報天恩於萬一所有感惕㣲忱謹繕摺恭謝伏乞皇上睿鑒謹奏凡似汝等庸材非過則不及務髙遺細捨近求逺以致重輕顛倒無足怪者若逐件治罪亦不勝其處分且將公私二字辨别清楚操守一節時加警惕其餘徐徐講求歴練將来或望有成若於此二者稍有不妥經朕覺察則莫冀更為姑容也雍正七年六月初四日署理廣東巡撫印務臣傅泰謹奏為奏聞事竊照粤東今嵗雨暘及時田禾茂盛先經奏聞在案今於五月二十五日以後雨水畧多廣西之水東注所有三水髙要等縣河道窄狭之處水漲數尺臣飛行該地方官將所轄圍基竭力培築日夜防守幸無衝决之患惟南海縣江浦司圍基坍塌數處亦即行令立時搶築堅固日内天已晴霽水勢漸退不致妨礙至近處早稻現將成熟大約收成各有八九十分不等統俟各府報齊再行具奏各處米價自五錢四五分起至七八錢不等米糧平賤小民樂業今將圍基保䕶年景豐熟情形先行據實奏聞恭慰聖懐謹奏欣悅覽之粤東米價毎石賤至五錢㡬分為從来所未聞但消長難憑低昂莫定又為粤東向来之常事也雍正七年七月十九日署理廣東巡撫印務臣傅泰謹奏為密奏事竊照廣東學臣顧仔現在廣州府考試忽有掲帖徧處粘貼内稱學臣専用積蠧何嘉賔一切呈狀及嵗考時列五等生員鑚提三等俱係嘉賔播弄關通衙内與學政之子三相公作弊膽串舊稿房何國偉及羅濕眼等招搖包准兹廣州科試蠧又稱三相公并内幕門路串同香山縣訓導黄旒珊等攬封大縣每名銀一百五十兩中縣每名銀一百二十兩小縣每名銀九十兩兼抄出夲童所作文字為信包管取録招覆拆繳肆無忌遏刁風為此據實密奏伏乞睿鑒謹奏顧仔毫無瞻顧因循自為衆所嫉怨此必係不肖匪𩔖誣揑所為務將匿名粘貼掲帖之人究出嚴加懲創具奏以聞同日又奏為奏聞事竊照廣州府屬番禺縣之茭塘沙灣市橋石碁等處素稱盗藪歴来搜捕編查未能凈絶根株即今年會同招撫其投首者不過十之三四其餘族大人多者仍復潛匿不出查茭塘沙灣各設有巡檢一員稽查而沙灣石碁市橋三處又各撥有都司千把總分防似可責成緝捕矣但微末弁員聲勢不能懾服以致姦徒仍然出没臣思此四處距縣稍逺必須將文武大員移駐一員庶可彈壓臣隨檄行布按二司查議去後今據覆稱廣州所屬同知通判共三員各有専司難以移駐惟查左翼鎮標左營遊擊現駐省城似可移駐茭塘責令督飭巡查但移駐武職係總督衙門事件除移咨督臣孔毓珣提臣王紹緒㑹商妥協并行司議定遊擊衙署營房作何建造㑹疏題請外所有酌議移駐遊擊緣由合先奏聞伏乞皇上睿鑒謹奏覽奏移駐遊擊情節與王紹緒所奏約畧相同候另降諭㫖同日又奏為覆奏事竊臣前奏奉㫖命往粤省各道員一摺奉硃批陶正中于其珣二人恐蹈科甲陋習當留心試用如有不妥協處即行奏聞莫令貽悮地方將此諭亦令伊二人知之欽此查陶正中現補糧驛道駐劄省城臣即傳到宣示聖㫖至肇髙亷羅道于其珣於六月二十日因公来省臣亦將聖諭宣示臣惟有敬遵諭㫖將二人居官行事時時訪察倘稍有不妥協處即行奏聞以免貽悮地方所有宣過聖諭緣由謹繕摺覆奏并將御批恭繳謹奏再三留意試看于其珣恐近下愚不移未必肯除盡因循袒比陋習而實心奉公任事也將此諭仍令二人知之若一時無因来省面見爾即宻錄傳示伊等可也同日又奏為奏聞事竊照春江協副將陳政先經署兩廣總督臣阿克敦以虚冒糧餉虐使兵卒怠玩哨巡等情題㕘奉㫖交與前撫臣楊文乾審擬經楊文乾審眀定擬具題部議以陳政收過餉米銀兩俱貯中軍櫃内值月百隊取千把總認狀支用應公則該中軍百隊必係陳政用事之人顯有通同分肥情弊駁令另委賢員遵照原㕘詳審實情等因今據按察司審解前来臣覆加核審當日陳政議留名糧實俱為公務起見並無絲毫染指現有支銷細冊并兩營千把總領狀可查且據當日經手支發百隊字識人等衆口一詞代剖甚力查陳政雖屬因公起見但未經通詳立案即屬違例是以臣仍照前擬具疏題覆外合將審眀實情繕摺奏聞抑臣更有請者臣於審鞫之際細看陳政精力壯健應對眀白於營伍事宜頗覺熟諳臣又查其從前居官凡訓練兵弁巡緝地方皆稱勤慎盡職是陳政年力才具尚可為國家出力似屬有用之材可否給咨令其赴京引見聽候聖裁謹奏此奏甚屬可嘉給咨陳政令其赴部引見可也同日又奏為奏聞事竊廣東總督臣孔毓珣題㕘糧驛道何師儉署三水縣范禧違禁開礦縱集礦徒侵蝕銅價勒唆首吿顛倒是非一案奉㫖交臣一併嚴審究擬具奏欽此臣查勒唆首吿情節應歸㕘革藩司官達案内審擬經臣㑹同欽差臣留保喀爾紀善并督臣孔毓珣研審將何師儉范禧各擬杖流具題奉㫖依議欽遵在案其違禁開礦侵蝕銅價一案另案行司審詳去後隨准部咨奉上諭何師儉及三水縣知縣范禧被㕘之案傳聞亦有緣由著傅泰秉公確審毋令致有屈抑欽此兹據布按兩司詳解前来臣逐一親加研訊雍正五年分銅觔因原委辦銅之羅定州知州張安鼎病故何師儉始行接辦所有帑價該知州前已發商何師儉並未經手其無侵蝕情弊固無庸再究矣至雍正六年分銅價何師儉俱照部價全數發給商人王國鼐廖芳式等取具領狀分頭採買師儉毫無侵蝕領銀各商與見領諸人異口同詞共為剖白至於商人廖芳式在惠州府屬之三兠竹墟市收買礦銅師儉稱並不知情固難深信但奉委辦銅若銅有遲悮價有缺少皆應罪坐師儉其商人領銀採辦又豈能禁其不向有銅地方收買况糧驛道駐劄省城專管糧驛離挖礦之處甚逺議以失察似屬過當且歴查從前辦銅各官所辦解部之銅無不半出礦場乃云何師儉違禁開礦縱集礦徒不特師儉搶地呼寃即同案之人亦代為稱屈是以將何師儉免議具題至臣審理何師儉兩案於官達案内法應擬罪固不敢絲毫輕縱至辦銅案内屢審並無别情臣亦不敢因督臣所㕘扶同故入除具疏題報外謹將所審實情繕摺奏聞伏乞睿鑒謹奏覽奏巳悉汝㕘奏謝希賢等二人之摺交部發該督察審此番汝所奏五事朕皆嘉許之能如此一一秉公據實入吿方為不負朕之任用也勉之同日又奏為恭謝天恩事竊臣齎摺家人回粤捧到御賜各種錠子藥一匣臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏念臣叨荷聖恩署理撫篆緣才庸識淺到任以来並未有一毫報稱之處清夜捫心實滋悚惕乃蒙恩賜逺頒臣跪領之下感懼交集惟有時時瞻仰刻刻儆心如對天顔恍聆諭訓益竭駑駘敬謹辦事以期仰報髙厚於萬一理合繕摺奏謝伏乞皇上睿鑒謹奏於操守一篩不能遵訓砥礪朕實愧覽汝之奏謝也雍正七年閏七月十二日署理廣東巡撫印務臣傅泰謹奏為欽奉上諭事雍正六年十二月初一日准吏部咨十月二十二日内閣奉上諭著京官大學士以下主事以上之漢軍漢人外官督撫以下知縣以上之滿洲漢軍漢人每人各舉一人除現任知縣以上官員不必保舉外或係舉貢生監或係山林隱逸果有品行才猷可備任使者即親戚子弟亦不必引避嫌疑令内外各官皆得據實保舉欽此欽遵行文到臣臣自接部咨即於族黨親戚及平日認識之中逐一記憶或居心誠實而才力不及或才可辦事而人不端方實無深知篤信之人足備聖天子求賢輔治之至意矣又夲年五月二十四日准吏部咨四月十八日内閣奉上諭京官自學士侍郎以上外官自藩臬以上著各人密保一人將其人可勝督撫之任或可勝藩臬之任據實奏明不必拘定滿漢亦不必限定資格即府縣等員官階尚逺者果有真知灼見信其可任封疆大僚亦准列於薦牘之内若一時無深知可舉之人容其從容採訪不得草率塞責有負諮詢特諭欽此臣奉命署理撫篆時日未久大小屬員試騐未確不敢輕舉容臣再加查訪如果有可膺藩臬之任者自當遵㫖奏愈加老成諳練問其料理機宜無不慎重精詳且其居心敬謹圖報甚殷倘蒙皇上再加訓勉或堪為國家有用之材緣奉宸衷亦非臣所敢輕為置議也臣謹繕摺密奏伏乞皇上睿鑒謹奏覽同日又奏為奏聞事竊臣於上年十一月間欽遵面奉諭㫖將提臣王紹緒操守為人之處業經具摺覆奏今半載以来臣復加密訪并察其所行事件外貌雖似柔軟及遇緊要有關係之處毫不寛假縱容無善績可稱亦皆相安無事統容臣再加密訪一有的確見聞另行密彈壓施廷専於瓊郡地方似不相宜臣因地方關係不敢避嫌隱諱謹據實密奏恭候睿鑒又臣欽奉奏覽同日又奏為覆奏事竊臣欽遵去年面奉上諭到任半載以来看得布政使王士俊才具練達辦聞至於樓儼近已奉㫖實授按察使感激天恩報稱心切雖甚勉勵但刑名非所素諳若於事簡皇上特簡賢員補授廣東按察使將樓儼另行調補則於地方官民均有裨益矣臣為公務起見冒昧密奏伏乞皇上睿鑒施行謹奏覽同日又奏為奏聞事竊照廣州府屬番禺縣茭塘地方素稱賊藪而李士雄即李亞豹一犯係茭塘市橋石碁一帶積年大盗黨羽甚多犯案纍纍實為渠魁今春臣與督臣孔毓珣遣撥官兵前往搜捕招撫雖已招出二百六十餘人俱係夥盗其首盗李士雄及慣賊李亞賛等堅匿不出究未弋獲今有署番禺縣事試購線懸賞無不舉行先將李亞賛之親叔誘捕到案令其潛往哄引各盗投首旋據李亞賛李國强胡亞三投首前来并自願將李士雄擒獻贖罪等情龎嶼即准其擒解首報去後今於閏七月初一日果據李亞賛等擒獲李士雄解報到縣臣查李士雄與李亞賛等所犯案件甚多論其情罪均係法所難寛之犯但李士雄於各犯之中又為最重今李亞賛等既將士雄擒解贖罪似與供出盗首即行拏獲之例相符應否援減除行司細查歴年㫖外今將誘擒積年大盗緣由先行繕摺奏聞謹奏緝盗當以察拏窩家為要此乃弭盗根夲不可少有疎縱觀汝於盗案一篩識見偏於柔懦若復似阿克敦常賚將積盗窩主開脫自以為積隂功則大悮矣前汝在京時朕以刑名事件惟當務一平字諄諄訓諭何啻千百次若不能領㑹遵承則是愚頑不醒之人即於爾到任後摺内批諭更復不少倘仍見不透是誠無用之材矣勉之毋忽再者朕之硃批訓㫖汝往往竟不覆奏是何理耶向後接到一切批諭當總具一摺一一登答回奏為此特諭同日又奏為海關交代已竣奏眀羡餘實數事竊臣兼理粤海關稅務自上年九月内到任至十二月止即届一年報滿之期臣已將前官及臣接任所收正稅贏餘俱巳具疏題報又分頭擔頭一項及行家繳送先收一半一項俱已另具批文解送戸部轉解内庫訖又臣將各書吏及各口巡役向来收用陋規令其儘收儘報除酌給飯食紙筆贍家使費之外尚餘節省銀一萬零二兩又在分擔及行家繳送之外未經請㫖不敢遽解戸部且因粤海關事務交代在即則自上年十二月二十四日以後又有各書役繳報者是以先經奏眀統俟祖秉圭到任之後交代清楚再將陸續所收各項彚齊解送怡親王請㫖查收在案今查自上年十二月二十四日起至今年四月十一日卸事止所有收過正稅贏餘及分頭擔頭等項銀兩俱已發貯藩庫取有庫收移送監督臣祖秉圭於一年滿日分别題報起解外又據各口巡役陸續繳報節省銀二千五百七十四兩零連前節省銀一萬零二兩共一萬二千五百七十六兩零一併解送怡親王聽候代奏請㫖以便交收至上年各行家應繳未交銀九千六百四十兩原約在今年九月間繳足臣巳將各結狀移送祖秉圭照數查收彚解合併聲明謹奏祖秉圭乃游移活動未可深信人也自其到任以来居心行事若何留意體察據實奏聞硃批諭㫖巻二十七上欽定四庫全書硃批諭㫖巻二十七下硃批傅泰奏摺雍正七年八月初六日署理廣東巡撫印務臣傅泰謹奏為奏請恩賜試用人員以收實效事竊查粤省所屬十府二州八十五州縣地方遼逺如東之潮屬去省二千餘里西之廉屬去省一千八百餘里往返動以月計且瓊屬僻在海外風信更無定期查從前奉㫖命往試用委署知縣者共有十八人以知縣以下試用者共有十二人現俱分别委署如遇知縣不敷委用并間於知縣以下人員内擇其才力優者借署縣事然接署卸事必有經手錢糧倉榖造冊交盤其中稽核出結非數月不能竣事是以再有缺出便無可委之人勢必仍令隣縣署理第恐鞭長莫及兼顧為難臣為地方起見叩懇皇上敕部將現在候選候補之知州知縣揀選引見再命一二十員来粤隨時委用庻篆無兼攝缺無懸待於地方公務實有裨益不致遲悮矣為此繕摺奏請伏乞皇上睿鑒施行謹奏候揀選得人時多發數員前来敷爾任用同日又奏為奏聞事竊照廣肇一帶夲年閏七月初八日颶風頓發自午時起至戌時止又於初九日自寅時起至巳時止民間房屋瓦片間被吹去河下船隻亦有擊傷幸無猛雨急流是以人口田禾俱未傷損訽之土人皆云近海之地颶風每年常有若無驟雨便無妨礙而窮民房屋或有被風吹損者臣隨行令各地方官加意撫恤不致失所外此雖並未成災但關係地方之事臣不敢不據實奏聞伏乞皇上睿鑒謹奏粤省颶風間嵗毎有之事查明被傷居民實力撫恤俾毋致失所同日又奏為奏請聖示以裕鼓鑄事竊照粤東收買黄銅器皿設局鼓鑄一事布政使王士俊繕摺具奏奉硃批交部議奏候㫖遵行如將解部銅觔留為粤省鼓鑄何不經之論至於此極欽此嗣准部議粤東去雲南尚近今雲南又開濬水道廣東若於滇省採買銅觔由廣西而下所費水脚無多應令王士俊詳加確訪以定粤省開鑄之事等因奉㫖依議欽此移咨到臣隨經轉行遵照去後旋據王士咨明戸部在案俟百色地方倘果買有銅觔臣即酌定鼓鑄事宜設局處所具疏題請開鑄外臣又訪得惠州府屬向有礦徒私挖銅觔從前原賣與夲省及别省辦銅官湊同解部自去年督臣孔毓珣將辦銅之糧驛道何師儉糾㕘可惜但原係礦銅若不奏眀請鑄至有礦各山仍行嚴禁不許藉名收銅混行偷挖如此則現在之銅不致久匿在山之礦仍禁私刨於公事似有裨益是否可行伏乞皇上睿鑒施行謹奏似此識見奈何奈何雍正七年九月十九日廣東總督臣郝玉麟署理廣東巡撫印務臣傅泰謹奏為奏聞事夲年九月十七日布政使王士俊詳稱據惠州府詳據河源縣申稱夲年八月初五日據闔邑士民張華賢等為呈報嘉禾事竊賢等生長嶺南僻處海疆叨蒙皇上恩膏疊沛比年以来嵗獲屢登固已含哺鼓腹羣安耕鑿之風今逢嘉禾叢生實為目所罕見皆我皇上惠愛元元感召天和所致呈請轉詳并將嘉禾送驗前来據此合將嘉禾呈驗等因由府詳司轉詳到臣等臣郝玉麟在省盤查隨將送到嘉禾㑹同在省各官敬謹觀看共有四十八夲内一莖二穗者一十四夲一莖三穗者二十夲一莖四穗者一十二夲一莖五穗者二夲據省城士民老幼環繞觀看歡呼雷動咸稱皇上愛飬百姓至德感孚所以嘉禾呈瑞是乃粤省萬年豐亨之兆海隅萬姓永受無疆之慶等語臣等因雍正五年十月内奉有停止進獻嘉禾之㫖是以未敢遽行具題進獻今將送到嘉禾發交布政使加意收藏外伏查惠郡濵海之區屢獲豐登米價平減已為從来所罕見今嘉禾徧發更屬希聞臣等目睹庥徴曷勝踴躍歡忭所有恭逢瑞榖粤省士民感激慶幸情形不敢壅於上聞理合㑹摺奏聞伏乞睿鑒謹奏朕欣悅覽焉但不可絲毫肆志當愈加寅畏期以誠敬之念格天忠愛之懐圖治大公之道馭屬員威惠之術撫兵民汝等封疆大吏能似此居心朕可力保上天年年嵗嵗賜如是嘉應也莫謂水旱為世間必應有之事概委之氣數使然若稍存此等念慮乃不明天理之庸流曷可與論人道試觀鄂爾泰田文鏡等所轄地方之感召徴騐亦當信心奮勉向有粤東人稠地狹豐年亦必資隣省之論朕每言無是理今蒙上蒼慈眷甫獲豐熟二載米價便更賤於他省可見謬論之不足憑也如此乗兹樂嵗廣收竭力訓導閭閻愚氓加意盖藏珍重榖粟不可少致狼戾以招暴殄之咎勉之敬之同日又奏為請留能員仰祈睿鑒事竊臣等荷蒙聖恩均受封疆重寄欽遵訓㫖無日不以吏治民生為事兹有韶州府知府陳鴻熙年力富強辦事敏練且久任海疆熟悉風土現今報丁父憂前来臣等查得韶州一府實屬粤省衝繁之地該守董率屬員料理地方事務著有成效委係能員懇祈皇上天恩准其留任守制於地方實有裨益臣等為地方得人起見除㑹疏具題外謹繕摺㑹奏請㫖定奪伏乞皇上睿鑒批示遵行謹奏具題到日有㫖但聞陳鴻熙蒙朕連次拔擢至此任遂覺志氣盈滿狂妄時作閒嘗將督撫皆任意呼名不似從前敬慎汝等既經保留在任當切加訓誡朂其遷改將此㫖亦傳諭令伊知之有人奏汝新㸃粤海關書辦陳炳文等五名每名收受銀三百兩方准入冊著役庫吏周瑛經手送繳等語汝此意何居操守二字實難朕經屢諭勉力堅持以全滿洲大臣顔面汝乃竟不遵承以此為巧取無礙殊不知小貪不戒必漸至大貪不法而後巳且天下從無巧事未有眀獲廉稱而暗得賄賂名實兼收之理如此欺心負朕行當有意外取辱之事至矣與其愧恨於後何如於根夲處戒慎以自勵自勉耶似此奈何奈何署理廣東巡撫印務臣傅泰謹奏為欽奉諭㫖據實覆奏事夲年九月初四日臣齎摺家人回粤捧到硃筆諭㫖一道臣跪讀之下驚悚無地感愧交集伏查粤海關頂充書吏向例每名有花紅銀三百兩以作公費臣到任之後陸續查革犯事及重役共五名至頂充時據伊等每名照繳銀三百兩臣識見卑鄙以為各書吏自願繳送愚昧因循未經裁革咎實難辭今蒙皇上不加處分恩賜訓飭臣捧誦之下不勝驚懼惟有恪遵聖諭痛自咎責立即悛改今粤海關已遵㫖歸監督管理臣現在所管太平關凡書吏頂充舊例每名亦有花紅銀二百四十兩臣任内止收過一名銀兩巳彚入節省頂内報解嗣後益當砥礪亷隅凡有陋規未盡革除者一概革除斷不敢再存鄙念致厪睿慮臣謹據實覆奏并將奉到硃批恭繳謹奏但務夲莫逐末若事事皆待朕指示訓誡而後改易反之於心能無愧乎即凡此等相沿陋規小利亦當奏眀請㫖然後收受嗣後若再有絲毫隱蔽將来必大為已累將朕此諭切誌毋忘莫貽噬臍之悔同日又奏為奏聞事竊照今嵗粤東晚禾茂盛先經臣奏眀在案目下將值收穫之時其收成分數容俟各屬報齊查眀的確另行奏報至各府米價每石自七錢二三分至五錢三四分不等較之早禾收穫之後更覺平減當此豐年臣惟有恪遵之慶理合據實奏聞謹奏嚴禁出洋於此米價平減時尤為切要此舉好實力行之同日又奏為奏聞事竊照粤東沿海漁船經前督臣孔毓珣前撫臣楊文乾㑹議立法具摺奏眀通飭編查造報在案今查粤東大小漁船向雖飭催造冊而各屬有已經造送者有未經造送者亦有雖曾造送而其中有拆改遭風年久朽爛未經開除者又有新造船隻未經入冊者按冊而稽難得確數照名問船又多詭頂冊内既無的名則事發之日澳甲船總皆得髙下其手任意賄改弊竇叢生不可枚舉臣於五月間専委惠潮道劉運鮒親往惠潮兩府沿海各縣港口將所有大小漁船逐一編查挨甲給照取結繳核去後今據造送兩府各冊前来嗣後若續有拆改朽爛及新造者即時申報補登入冊如此徹底清查倘有事發便可按冊而稽澳甲人等既難作姦舞弊姦宄之徒亦難僥倖漏網矣至廣州府屬沿海各縣因廣南就近不時查㸃加意督察毋得先勤後怠毋許胥吏作姦以期弊絶風清民安盗息所有臣委員確查沿海漁船數目船戸的名緣由理合繕摺奏聞謹奏好須力行以期實效莫止於章奏美觀而行不符言則是因圖功而反獲罪也同日又奏為敬宣諭㫖據情覆奏事竊臣前回奏糧驛道陶正中肇髙亷羅道于其珣宣過諭㫖緣由一摺奉到硃批查陶正中係駐劄省城于其珣因充文闈監試亦在省城臣隨將二人傳到密將聖諭宣示二人皆免冠叩首據陶正中奏稱臣累蒙聖諭教訓臣雖至愚安敢仍蹈袒比因循陋習自負生成惟有竭盡駑駘實心任事仰遵聖訓稍報天恩懇求轉奏等語除臣欽遵聖諭再加留心試看外所有宣過諭㫖及陶正中于其珣覆奏緣由先行錄宜至糧驛道陶正中臣先次回奏摺内奉有硃批其陶正中三字并奉共事一月細看其辦事誠實小心勤敏乃欽服我皇上賜之激久政務未諳臣現在委其查勘各事使之學習歴練如果不辭勞苦熟習幹練便可為在一城時加察看其為人禀性頗直自顧顔面辦事實心不肯扶同且於鹽庫錢糧十分慎重似屬可用之才臣因道員有稽查表率之責甚有關係所有就臣察看各員居官情形謹據實附奏伏乞睿鑒謹奏覽雍正七年十月二十八日署理廣東巡撫印務臣傅泰謹奏為請㫖事竊查雍正二年五月内欽奉上諭設立普濟堂經前任撫臣年希堯建設將老疾無依之人收飬棲息至於堂内日給費用從前年希堯兼管粤海關稅時查知洋船来粤買貨有每兩分頭銀五釐又每船一隻進口有放關規禮銀一百三十二兩向為左翼鎮等衙門規禮年希堯將此項銀兩撥入普濟堂應用歴任相因已經六載兹海關監督臣祖秉圭諭令通事將此項銀兩繳貯關庫迨廣州府將前項情由具詳祖秉圭批云飬濟孤貧事隸有司非夲監督所能定奪等因今據布按二司詳稱堂内現收貧老三百五十八名日給柴米鹽菜及董事人役工食置買各老人冬衣等項每年約共銀一千八百餘兩全藉此洋船銀兩支應若悉繳關庫則普濟堂老民嗷嗷乏食恐非皇上軫恤貧老之至意等因前来臣查祖秉圭諭繳關庫雖為慎重錢糧起見但普濟堂費無所出臣查關庫臣未敢擅便謹具摺奏請伏乞皇上睿鑒施行謹奏將祖秉圭厲色叱辱之傳㫖與伊觀此一事其負朕之念毫未改悔也小心保全首領為要同日又奏為敬陳末議恭請睿裁事夲年十月初十日接准部咨議覆大學士臣陳元龍條奏貼黄内要語未詳等因經部議覆令督撫諸臣凡夲後貼黄務融㑹全疏之始末節其繁冗擇其緊要遴選善書之人照部夲式繕寫務期字畫端楷明朗字行疎密得宜如有題奏夲章其貼黄草率刪節以致事不詳明或字畫細小微茫或字行疎密任意即照違式例分别議處等因奉㫖依議欽此臣遵將一應夲章貼黄加意料理外伏查夲後貼黄向例用半幅紙密行書寫難以披閲於雍正三年正月十九日經内閣奏請言詞繁多者俱令用整幅書寫言詞甚少者仍令用半幅書寫奉㫖依議欽遵在案惟思題奏章疏原以通夲情節總叙看語又以看語情節摘叙貼黄雖言詞繁多者巳經奉㫖改用整幅書寫但行數雖可加增而字數每行仍止二十格遇有情節繁冗之案看語叙至七八幅者一經節刪頗多晦滯難明殊非恪恭敬謹之道况貼黄於看語中摘出不得於看語之外另添一字是以偶遇節刪接續之處竟有文義不能貫串者欲其情節顯亮又不得不多叙數語以期明爽遂致行數增密字數仍多御覽之下甚覺徒費目力而貼黄拘於成例究於案情不能顯亮臣愚以為貼黄之外請將全疏緊要情節另行統摘情由用整幅紙繕寫以十二行為率夾入貼黄之後恭呈御覽其摘叙事由不必照看語内字句止就夲案情節簡明直叙則睿鑒之下一目了然既於貼黄體制無礙而字大行疎亦不致上費聖心過勞目力矣謹將現題疏看摘叙一式繕寫進呈是否可行并應否具題請㫖伏乞皇上睿鑒批示遵行謹奏汝乃中等材質朕因封疆重任一時不得其人姑將就試用之似此通行事件應徐徐仿效歴練老成同軰督撫踵而行之既無超羣出衆之能於夲分内事尚多不能辦理何暇旁及於此況議論皆屬可笑一邊據奏於貼黄之外另行統摘情由繕寫呈覽等語既慮朕披覽繁冗而復多增一層是何意見耶若欲朕止閲統摘情由則貼黄竟為虚設又何必繕寫入疏耶且從来滿夲専譯貼黄今則將譯一廢一耶抑概行翻譯耶似此自相矛盾强不知以為知朕實代汝愧之凡人深知巳之不及猶可冀望將来造詣似此自是自得朕實又代汝憂之奈何奈何幸係密摺具奏設若具疏題達亦如彚報監斃人犯一例之事重自取辱矣同日又奏為覆奏事夲年九月十四日接到大學士公馬爾賽等来字内開八月十二日奉上諭聞得江南福建廣東及浙江之杭嘉湖三府有匪𩔖結黨潛謀為匪其為首者係江寧人各處用銀結納等語爾等可密寄信與傅泰令其密密留心整飭營伍預為防範但不可聲張滋擾若江浙有文知㑹時或有查拏同黨之人即便作速緝拏務須嚴密勿令一人兔脫欽此臣即一面密遣的當人役潛往福建江西湖廣各交界處所暗暗查訪并借别項公務遣人往浙江江南密探蹤跡一面加意留心操絲毫聲息然臣不敢因無聲息遂爾忽視除現在留心訪察若果有可疑之事立即設法嚴拏一面據實飛奏斷不敢一毫疎忽亦不敢洩漏聲張以致滋擾也再臣於十月初十日又接大學士公馬爾賽等来字内開為羅教一案欽奉密諭等因到臣欽此欽遵辦理并即轉飭州縣實力奉行倘有拏獲報解者臣當與藩臬二司酌其情罪輕重將生事倡首者嚴行解部將無知附和者量密諭及奉行緣由先行繕摺覆奏伏乞皇上睿鑒謹奏覽同日又奏為奏聞事竊照粤東晚稻收成據布政使王士俊呈報十府二州屬惟南雄府屬收成統計有八分其餘各府州屬收成均有九分十分不等各屬米價每石自七錢至五錢六七分不等等因前来臣查米榖為民食之夲今幸遇豐登正宜加意儲蓄臣身在地方惟有諄諭屬員敬謹民事勸諭百姓撙節愛惜毋得糜費並行布按兩司嚴禁棍徒囤積射利外所有晚稻收成分數及現在米糧價值臣謹據實奏聞謹奏導民務夲原係第一要政然徒為紙上虚文而不實力督率屬員奉行亦復何益粤省吏治民風不堪言喻近有㫖從内閣頒發汝接到之日可竭力遵行毋昧一身利害辜負朕之委託敬慎黽勉為之同日又奏為覆奏事竊臣前奏提臣王紹緒居心誠實辦事敬謹兵民和輯營伍整齊實堪勝任一摺奉到硃批兹於夲年十月初二日提臣王紹緒適因公務来省臣即遵照猶覺過軟之諭㫖旁引曲喻再三勉勵王紹緒大有㑹悟領畧之意且以從此悔過務必痛自改易嚴察將弁整飭營奏至於原任瓊州鎮臣施廷専尚未到左翼新任容俟其到日臣即遵㫖就近訪察秉公奏聞外其新調瓊州原任左翼鎮臣李順於奉識見實覺老成歴練仰見聖明鑑别絲毫不爽隨材器使人地相宜今李順已於十月初六日起程赴瓊俟其到任之後臣再行密訪如果言行相符臣即據實奏聞謹奏覽同日又奏為請㫖添設學政一官端士習以育人材正民心以厚風俗事竊照粤東僻居嶺外距京甚逺内有八排狼猺外有黎人雜處是以風俗人情皆與内地逈異好勇鬭狠剽掠刦奪習以為常恬不知怪臣思士為四民之首士習果端則小民觀感興起咸知崇尚亷恥不肯流於汚下是以國家特設教職以司訓廸又設學政嵗科考校以正文風并考察教職以分勤惰乃今年巳酉科鄉試臣於文武兩闈見各府州縣送試教官其中年力富强辦事勤敏者固有之而年邁有疾衰弱罷軟者亦頗不少除將察出不稱各員發交布政使令其覆騐眀確分别詳請咨斥勒休外伏查教職雖微而平日陶鎔士子砥礪亷隅其責實為綦重則稽查考核較之佐雜等官更宜嚴密無如督撫藩臬各有地方重務不能時刻察訪而學臣考試按臨亦止匆匆一看其甄别賢否難免遺漏此軰庸劣教官不過茍且因循豈能振興督課作飬人才甚至不肖之員或貪小惠或圖串結猫䑕同眠絶無顧忌以致生監人等踰閑敗檢多不可問平日如此一旦身登仕籍又安望其竭忠報效耶士習如斯欲求民風敦樸習尚淳良更不可得矣臣愚以為欲嚴教職端士習惟有仰懇奏伏乞皇上睿鑒批示遵行謹奏覽奏不禁發笑實屬可憐之封疆大吏也雍正七年十二月二十七日署理廣東巡撫印務臣傅泰謹奏為奏聞事竊照粤東晚禾豐收分數經臣具奏在案今時届隆冬誠恐販戸搬運富戸囤積是以時刻留心稽查禁止兹據布政使開報各屬因豐收之後米價日減通省十府二州米價每石自六錢一二分至四錢六七分不等等因前来伏查粵東濵海之地人稠糧少從前屢以不敷民食為慮今米價如此之賤實屬數十年来所未有者是以南番二縣素稱多盜今嵗並無刦案申報山無伏莽海宇昇平民安耕鑿商賈雲集此皆皇上至德覃敷洪恩普被方獲此時和嵗稔熙皥成風之盛臣惟有與文武各官愈加警惕益切敬謹以期永荷鴻庥於弗替所有粤省現在康阜寧謐情形理合繕摺奏聞謹奏年嵗豐登盗賊自少此從来情理之常但感召天慈屢賜雨暘時若之應則全在汝等竭力以公誠勤敬自勉也同日又奏為奏聞命盗案件仰祈睿鑒事竊照粤東山海交錯姦匪混雜民風刁悍是以命盗案件較多於他省臣於夲年四月間回奏副都統臣吴如譯條奏案内查眀從前據報强竊盗案已㕘疎防未㕘疎防者共有五百六十餘起從前據報命案共有三百一十餘起自臣於上年九月到任至今據報盗案七十餘起巳㕘疎防者五十餘起未㕘疎防者一十餘起内已經獲賊者四十餘起未獲賊者二十餘起現在嚴加督緝不使縱逸又據報竊案三十餘起向例原不題㕘疎防止應獲賊審明分别題咨完結至於臣任内審明題咨過强竊盗案總計新舊共有一百一十餘起審明完結過强竊盗案總計新舊共有三十餘起其餘現在查催按限審題又臣到任後據報命案共四百六十餘起内謀故鬭毆等案居十之三四自盡命案居十之五六至於臣任内審明題咨過謀故等命案總計新舊共有七十餘起審明自盡及情有可原屍親願息完結等命案總計新舊共有二百七十餘起其餘現在查催按限分别題結此係臣莅任一年有餘已經辦理之數謹逐一開明具摺恭奏至廣州府屬南番二縣盗案又多於他縣因去年至今田禾豐熟米價日平是以南海止有盗案二件番禺止有盗案六件現今地方安寧小民樂業理合一併奏聞謹奏緝盗固屬寧静地方之急務而察拏匪𩔖尤為要著莫以其無被害呈控而遂慢忽視之偶有聞見率委之曰瘋狂無憑或藉詞不肯拖累滋擾及胸中預横何苦多事之念以致往往飬姦遺患𩔖汝庸常之流不審輕重不為國家慮久逺之謀每存此等意見者居多切勿踵循陋習自取玷溺之咎留意勉為之同日又奏為奏聞事竊照粤東廣州府屬之南海番禺東莞順德新㑹三水清逺花縣肇慶府屬之髙要髙明四㑹等縣沿河地方俱築有圍基以保護田廬雖歴来俱有修防之例不過憑圩總圩甲按田出夫隨坍隨築聊以塞責自前督臣孔毓珣題請責令廣南韶連道肇髙亷羅道管理并將最要之南海三水髙要三縣縣丞加銜水利専司圍基雖董理有員無慮遲悮而預辦物料及工役飯食費無所出倘遇報險恐一時莫濟查沿河各州縣有魚鴨埠等項租銀向来或為神廟香燈祭祀之用者有之或為紳衿豪棍占取者有之臣思以地方之所出即辦地方之公務似有禆益臣現在皇上睿鑒謹奏覽同日又奏為恭繳御批事竊臣前與督臣郝玉麟㑹奏惠州府河源縣瑞榖叢生一摺奉到硃批伏念臣隨侍禁廷時聆皇上至誠格天之訓諭時見御批理合恭繳又臣與督臣郝玉麟㑹奏韶州府知府陳鴻熙報丁父憂懇祈恩准留任守制一摺奉到硃批隨行令陳鴻熙於封印後赴省將聖㫖宣示俟其作何回奏再行覆奏外伏查臣等因陳鴻熙年力富强辦事敏練是以懇恩將伊留任臣自當不時訓誡勉其殫力居官敬謹辦事如敢盈滿狂妄怠玩忽畧即據實糾㕘斷不敢因題留在先少存瞻顧也所有奉到御批先行恭繳謹奏忽爾保留忽爾糾㕘言何太易陳鴻熙若無甚大咎不過少年習氣小疵加之誡訓俾令悛改斯可矣豈可因言語少不檢㸃遂將一幹員即行㕘處是何理耶似此逐處依違迎合毫無定見又兼平時以聾瞽而尸位封疆奈何奈何同日又奏為奏繳聖明逐一指示臣惟有敬謹銘心奉以為法不敢但據外貌不敢預横主見并欽遵聖示明試暗訪務得實在人材之優劣宻行奏聞又臣奏廣惠潮三府沿海漁船委惠潮道劉運鮒清查㸃丈一摺奉到殊批伏念劉運鮒於清查一事誠如奏又臣回奏海關新充書辦繳有花紅銀兩一摺奉到硃批伏念臣因識見卑鄙是以於花紅銀兩一項未經革除自欽奉訓諭之後臣日切悚惕愧悔痛自咎責今復奉批諭惟有益加敬勉凛遵務夲切戒逐末嗣後凡有可以歸公之項無論多寡務必恪遵聖諭預先請㫖再行收取斷不敢絲毫隱匿自干重譴也所有奉到御批合併恭繳謹奏撫臣膺封疆重任凡關國計皆宜留心聞汝於關稅事務毫不協助膜外視之向来地方官掣肘刁難監督之陋習朕耳聞目睹四十餘年矣今汝若仍蹈前轍倘致祖秉圭有招怨悮課愆尤伊之升沉榮辱尚在未定傅泰則必不撫粤矣秉公慎為之私腸少有洗滌不淨究為一身之累體騐自知向後凡接奉此等訓諭皆宻令王士俊同看同日又奏為密奏事竊夲年十二月初九日據肇慶府屬之署恩平縣事姚孔鋅報稱㑹同該汛千總邱尚忠巡查姦匪至土瓜蓢村見該村人舉止慌張遂拏獲六犯搜出令旗九面内四幅寫楚震公字樣一幅寫羅平字様黄綾偽劄九張内五張填有劉國敬李昆玉梁髙陞藍登其吴建晃姓名白綾偽劄四張内二張填李士貴朱榮姓名現在審究搜拏等情并聞督臣郝玉麟已經遣撥官兵前往臣即委標員帶領弁兵由三水新㑹等縣二路分頭前去令其協同各該處文武宻探踪跡聚集何處立即圍擒毋使兔脫并宻移提鎮嚴行附近各府州縣協營堵截搜捕去後十二日據春江協副將陳顯報稱風聞恩平地方有姦匪萌動隨差兵丁陳韜誘出温亞七一名投首供出頭子李六軍師李先生約定十二月初二日搶恩平再搶陽江等語臣又飛行各文武分飭查拏布政使王士俊等亦各遣人前往宻探督緝隨陸續據報在恩平新㑹陽春陽江東安等縣拏獲羽黨梁子賔等共五十四名經督臣提解至肇發府究審臣亦委南海縣赴肇公同審訊各供俱稱係李梅即李先生與為首陳京幹做旗做劄分散各省騙人錢財并稱聚集兵馬等語臣初疑此案匪𩔖既有偽劄必有為首之人聚集之地今細按各供參差不一彼此互異始以陽江掘銀哄動鄉愚繼又分散偽劄倐稱大兵將至倐稱瘟疫流傳甚至有鬼兵之說似屬揑造訛言驚恐男婦其以劄賣銀又係圖騙錢財且皆稱出自李梅之口則此案之根源底裏必須獲到李梅與各犯嚴加質訊究出同夥確數果否另有首犯方可定其虚實輕重又據布政使王士俊遣人宻往四處查訪所稱李梅者從前曾充東安縣兵房書辦犯事革退毫無技能各路亦並無絲毫蹤跡動静現在仍行加意查訪一有確據即行飛報等語現經督臣將犯發交布按二司㑹同嚴訊俟押解来省如有的確實情另行宻奏外至供内李九葵自交趾帶兵来廣及文姓自陜招兵到廣并山西陜西福建廣西俱有散劄及李九葵朱三太子現在交趾之處似屬誕妄或係李梅混行揑造騙惑愚民亦未可知但既有此供何敢忽視臣現在備錄各供遵奉十月内上諭繕寫宻札加以印信知㑹隣省督撫宻查防範并遴選妥人前往交趾宻訪并行各交界文武官嚴加稽查毋許疎忽臣謹據實繕摺先行宻奏至各縣去省稍逺臣得信畧遲是以奏報少緩合併聲明伏乞睿鑒謹奏此事業據郝玉麟奏聞矣若不設法將李梅擒獲到案斷然不可雍正八年三月十七日署理廣東巡撫印務臣傅泰謹奏為奏聞事竊照粤東今嵗入春以後晴雨及時田疇霑足菜麥等項無不茂盛至於髙低田畝禾苗俱巳栽插臣因公赴順德等縣沿途親見田苗滋長一望青蔥老幼婦子皆勤耒耜茅簷蔀屋熙皥成風至於各屬雨暘現皆得宜海澨山陬俱極寧静理合據實奏聞伏乞皇上睿鑒謹奏覽雨水禾苗情形朕懐深慰然必待秋成後方敢言豐熟也惟克誠克敬順理處事以靜俟上天垂佑可耳同日又奏為奏繳御批事夲年二月初八日齎摺家人回署臣恭設香案望闕叩頭開看臣謹遵㫖將欽奉硃批逐一登答另摺彚奏外理合將奉到御批原摺一併恭繳為此謹奏覽亦不可將一片心神専用於登答批諭之間而致忽慢廢弛職守也塞楞額前在東省日夜惟以料理摺奏為務是乃汝之鑑戒諸凡慎為之審其輕重而為之同日又奏為欽奉上諭事夲年正月十五日新補惠州協副將繆𢎞到粤宣傳上諭聞得雍正二年間有四人鷂鞋棕帽口稱王府差人前往廣東公幹一路氣勢甚雄相貌亦兇惡此非安分之人恐到廣東布散流言愚民無知被其鼓惑大為人心風俗之患爾傳㫖與督撫著用心宻訪此項人或尚在廣東若稍有蹤跡斷宜及早根究如曾静張熙之流言乃出於發遣廣西人犯之口幸而發覺早所以不難追問造言之人但亦不必招揺只宜留心暗訪聞得廣東火耗米折俱重誠恐不便於民朕御極以来宵旰憂勤無刻不以民生為念即用人行政亦惟期有益於民生至維正之供不得不取之於民其火耗一切亦當定為畫一之制庶無累於民間若一任有司輕重必有重耗殃民者甚非朕愛飬元元至意又聞沿海窮民以漁為生每出海捕魚俱於鹽埠領票名曰干票回水納銀名曰幫餉相習巳久皆出情願今聞鹽埠欲避干票之名令漁船實在領鹽出口按船計數希圖多銷恐不便於窮民為督撫者此等處當細心體查務得其平使民生樂業庶不辜朕之任用一省事務全頼督撫必公忠體國同心共濟方於地方有益且一省事歸一轍朕亦好辦理若各存意見將一省事分為兩途朕從何辦理如孔毓珣楊文乾當時兩人雖無㕘奏形跡各人意見不同朕所以一同調来引見當引見時朕曉以大義反復開導彼二人亦感激流涕誓願和衷辦事回任後聞伊等果然交往似乎相和邉海重地督撫相和是以朕心稍安不意楊文乾纔故孔毓珣盡變其所為當時楊文乾所行若非伊身為總督豈不能救正於生前若楊文乾所行皆是又豈可更變於死後若人在即順之是以國事作人情可乎朕因此鄙薄其為人前日孔毓珣引見時朕面斥其非伊惟有叩首認罪而巳是伊一生名節俱敗於此爾傳㫖督撫各存公忠為國之心公則無有不和即意見或稍有不同必不致迥别要知所辦者國事當以國事為重自然合而為一國以民為夲凡有便於民生者商酌奏請施行伊等身為大吏當仰體朕心宣揚徳意使邊海小民盡知尊君親上之義人心淳厚風俗丕變方不愧封疆之重寄若悠忽從事必致廢弛豈不辜負朕之任用爾將朕㫖傳與總督巡撫知之欽此欽遵臣即將奉諭敕查鷂鞋棕帽四人宻飭司道府州轉飭各州縣共相留心暗訪若得有蹤跡立即具摺宻行奏聞至火耗米折俱重并按船銷鹽等事臣現在將上諭所指各條明查暗訪若果有不肖州縣踵此積弊自當據實糾㕘如果查無此弊亦必將各州縣現今作何辦理實在情形備細開列㑹同督臣郝玉麟另行具疏覆奏又奉上諭一省事務全頼督撫必公忠體國同心共濟方於地方有益臣跪聽至此不覺敬畏交至感懼兼深惟有時時敬誦刻刻自省欽遵訓勉以國事為重與督提藩臬諸臣和同商酌辦理㫁不敢各存意見將一省之事分為兩途致厪宸衷也所有奉到上諭及欽遵緣由理合繕摺覆奏伏乞皇上睿鑒謹奏繆𢎞所傳諭㫖舛錯處甚多兼之汝信口登答殊無足觀亦無暇改正不過付之一覽而巳同日又奏為奏聞事夲年正月二十九日准督臣郝玉麟移知奉㫖頒到提臣王紹緒條奏順徳新㑹香山等處移駐官員改換汛防招民開墾預買桅柁等項原摺四件又怡親王并前任廣東督臣孔毓珣議覆各摺奉上諭令臣等㑹同確議欽此臣思移駐換汛均關緊要必將地方情形親身確勘方敢㑹議是以臣經具疏題明於二月二十一日自省起程先至順德次往香山後至新㑹逐一確勘查順徳一縣居省城之西南在新㑹香山虎門之中内海外洋相連逼近而且港􅆜多岐船隻甚衆縣城内外人烟湊集實為近省緊要之地海口繁劇之區總兵駐劄於此遥制新㑹香山等縣似得居中控馭之道至新㑹在順德之西地方簡於順德其厓門海口並非商船出入停泊之處非澳門虎門可比移駐總兵之說似未盡善但臣看厓門地方亦甚遼濶即不另設營汛亦應多添兵丁以固汛守其香山縣又在兩縣之東南城南一百二十餘里為澳門現係西洋人居住其交界處建設一閘以分内外關閘之北有前山寨有香山協都司守備駐劄防守臣看前山寨係西洋人及内地之人往来隘口關係緊要距縣甚遥似應於此處添設同知通判一員與武職協同稽察遇有爭毆偷竊漏稅賭博等事便可就近發落而文武互相牽制其巡查亦必倍加謹慎至原駐都守二員若添設文職應酌撤一員回駐縣城臣既經勘明當與督臣細加斟酌從長㑹議公同具摺覆奏外所有臣看過三縣地方情形先行奏聞伏乞皇上睿鑒謹奏既係㑹奏事件何必多此一番煩瀆雍正八年四月二十七日署理廣東巡撫印務臣傅泰謹奏為欽奉上諭事夲年四月二十日接大學士臣張廷玉来字内開雍正八年二月二十四日奉上諭前廣東都司趙璉被㕘巳降㫖交與該撫嚴審究擬近聞其中尚别有情由今將朕所聞者另錄一單可即寄與傅泰黄文煒秉公審訊務得實情不可使趙璉受屈若朕所聞不確亦即據實陳奏從公審結不必回䕶欽此又抄發另單一紙到臣隨傳到按察使黄文煒敬將上諭宻行宣示令其秉公據實審解不得絲毫枉縱伏查此案先據臣標中軍丁銓生詳稱都司趙璉酒後持刀傷兵又據趙璉詳稱巡夜見兵睡卧喝醒跑走失跌撞傷各等情今案内原詳之丁銓生若不到案對質難成信案但丁銓生巳調補欽州營遊擊臣現已檄調来省質訊俟審得實情除具疏題報仍另繕摺將情由據實覆奏外謹將奉到上諭日期先行奏明謹奏此案務須秉公詳慎究出實情具奏以聞同日又奏為奏聞事竊照臣衙門兼管太平關稅務所收正稅向發藩庫彚充兵餉其零星羡餘等項俱係臣衙門自行收貯彚齊解部巡撫衙門向無銀庫即於二堂傍屋設立銀櫃封貯每晚撥值堂巡捕文官一員并夲標千把總一員值宿防守五日一換輪流更替夲年四月初四日至初十日輪該巡捕官孫源與左營把總劉應元上宿乃初十日早據孫源禀稱初九日夜同劉應元至庫上宿今早天明見劉應元在伊睡牀檻上自縊身死臣即傳到夲標中軍遊擊并南海縣知縣喚到劉應元之子夲姓馬名正禹正鴻騐明委係自縊並無别故其因何自縊之處訊據馬正禹等供稱伊父因做把總多年今遇有千總缺出正當選㧞之時伊父手上生瘡不能拉弓不得與考功名無由上進且家中母病垂危醫藥無資心裏煩悶屢次聞有怨命之言並無别故等語隨據伊子領出埋葬并將劉應元縊死緣由咨明兵部外理合據實奏聞伏乞皇上睿鑒謹奏此事未得所以然之情由當詳加體察雍正八年十月十九日署理廣東巡撫印務臣傅泰謹奏為宻奏事竊查嶺南向有三大家名號一名屈大均號翁山一名陳恭尹號元孝一名梁佩蘭號藥亭俱有著作詩文流播巳久第以粤撫任内事務冗繁臣辦理不暇故未覔其書集看閱及臣近日敬看頒到大義覺迷錄内有曽静之徒張熙供開亦有屈温山集議論與逆書相合等語臣思屈温山與屈翁山字雖有别其音相似隨即購覔書坊竟有屈翁山文外詩外文鈔及陳元孝梁藥亭詩集等書查梁藥亭詩文詞無悖謬而翁山元孝詩文中多有悖逆之詞隱藏抑鬱不平之氣又將前朝稱呼之處俱空擡一字惟屈翁山為最陳元孝間亦有之臣觀覽之際不勝駭愕髪指查屈翁山陳元孝身故至今約有三十餘年雖倖逃法網現有惠来縣學教諭屈明洪係屈翁山之子臣正宻與布政使王士俊商酌拘審之法適值屈明洪於十月十六日到省前往布政司繳印又往廣州府投監據供伊父屈翁山向犯滔天大罪著作悖逆文詞止因父死時年幼無知存留詩文及刋板在家未曽察閱今任教諭奉到頒賜大義覺迷録宣讀之際知有屈温山姓名與父翁山聲音彷彿隨檢查伊父所著詩文始知伊父亂紀悖常竟親自投首投監請正典刑等語據布政使宻報前来臣即行令布按二司嚴加究審至於陳元孝之子孫屈明洪諒必得知臣隨飭勒令供出一并拘拏究審擬議題報請㫖外所有查出逆書緣由理合據實宻奏伏乞皇上睿鑒施行謹奏殊屬糊塗煩瀆不明事體之至硃批諭㫖巻二十七下
