body:
  text: 欽定四庫全書硃批諭㫖巻一百九硃批蔡良奏摺雍正五年二月二十七日福州將軍臣蔡良謹奏為恭謝天恩事竊臣賦質庸愚從無寸長足錄荷䝉皇上洪㤙補授漢中副將屢次超擢至福州將軍隨扵雍正四年十月二十八日到京陛見䝉皇上格外寵榮恩施稠疊臣即捐糜頂踵何能仰報涓埃除臣到任日期已恭疏題報外臣自莅任以来日對屬員兵丁人等必委曲開導詳加勸勉教以各務職業恪遵規矩勵勤儉之風知上下之分臣敬記皇上聖訓期扵寛嚴相濟不敢稍存偏見務潔已奉公使人心風俗日趨端整冀不負皇上簡畀深恩教誨至意為此具摺恭謝天恩伏乞皇上睿鑒謹奏好竭力勉為之閲爾錄來朕之訓㫖不甚詳備猶可原恕但語句太覺鄙俚粗俗可將此諭稍加文飾繕冩呈覽同日又奏為奏聞事竊閩省駐防習氣不好屢䝉皇上諭令臣正人心改風俗臣跪聆之下仰見皇上明並日月無微不照臣敢不悉心竭力究其根由絶其弊端查閩省四旗披甲人等臣現在訓練凡演習鎗箭務令精熟不使生疎凡行走差使令習勤勞不許怠惰其度日不能節省行事不合規矩并彼此護庇交相徇隠者臣必盡力漸次整頓更有兵丁之弟男子姪雖係壯丁尚未披甲逰手好閒遇事生風將無作有以訛𫝊訛向因伊等自以為身係閒散之人無人約束而為官長者亦因伊等尚未披甲漫不稽查此平日因循懈弛之所致臣向任㕘領知之頗詳此項之人更須加意整頓今飭令各旗協㕘領防禦驍騎校等官將伊各旗壯丁内除力可營生者任其自贍仍不時嚴加查察其餘皆令官員帶領習學弓箭鳥鎗稽查其出入行走之處臣亦時加看視教訓其有技藝􅈺熟平日又毫無過犯之人遇有甲出即令選擇頂補倘有不肻習學而又為非者雖伊夲家甲出亦不准其頂補仍責成其父兄親族人等交相勸勉令其悔改伊等俱係駐防年久之人非披甲不能飬贍今既開以上進之路又示以不能得甲之勢如此則知法者自必更加勉勵即向來逰手無藉亦漸知法度不敢為非矣為此繕摺具奏伏乞皇上睿鑒施行謹奏此奏甚屬可嘉未料爾能如是留心整頓旗習出於朕之望外殊為欣悦之至但務行與言符實力為之加勉勿懈同日又奏為奏聞事竊臣陛辭之日面奉諭㫖駐防兵丁均係旗人竞有與漢人聨姻者爾莅任後此事當加嚴禁欽此臣扵到任後即令四旗該管官將伊各旗兵壯家口細數姓名伊等夲身娶何人之女為妻共有㡬子子娶何人之女共有㡬女女嫁何人之子及其父兄伯叔子姪之子女及奴僕之子女嫁娶何人不許遺漏一人逐一開造清册前來臣復詳加看視查得此地四旗馬歩兵丁并另户壯丁暨户下壯丁共一萬二千六百餘名四旗互相嫁娶臣現在嚴行查禁此後總不許與漢人聨姻只許四旗互相嫁娶仍令各旗将有子而未定妻室者有女而未許聘與人者俟将來一奏伏乞皇上睿鑒施行謹奏覽雍正五年九月十三日福州将軍臣蔡良謹奏為奏聞事竊臣䝉皇上洪恩畀以將軍重任海疆要地時切悚惶惟冇凛遵聖訓敬謹黽勉不敢一刻少懈所屬各員每次進見必諄諄告以凡教管兵丁當以身先之一切稽查操演之處莫謂我已親往便可掩飾耳目必須實心考驗詳察所管之兵平日行事如何當差如何以及射箭打鎗之生熟演習上𦂳與否好者奨勵不好者勤加訓練若再不好回眀斥革臣每扵操演之地必逐人指名詳問各該管官令其逐一詳說如所說與臣所知者不合或所說不甚切實詳細者即係未經用心當即嚴加申飭臣将來總以各員教管兵丁之實與不實稽查之嚴與不嚴為各屬員之賢否其各兵丁之射箭打鎗當差行走臣俱時時嚴密查管不令偷惰放縦至駐防兵丁無事之時向民間地方走動往來最為惡習臣除竭力嚴加管束外每日令每旗派出官二員分城之内外日逐廵查其四旗協㕘領等官每半月一輪派令總查倘有兵壮人等在外閒逰生事即令帶至臣衙門懲治又旗下兵丁扵城守該班之處見地方各官以為不係管伊之人或彼此交頭舉手相語或故意站立不正傲慢無禮者臣俱諄切教導嚴加禁約使知官兵各有等分近來陋習頗改所有各情由臣謹具摺奏明伏乞皇上睿鑒施行謹奏覽管教兵丁諸條約朕更有何諭處只要言行相符日久不怠勉之勉之雍正六年三月十六日福州将軍臣蔡良謹奏為敬遵聖訓恭繳硃批諭㫖事竊臣扵雍正五年九月内将臣飭令各屬員實心教管兵丁各情由具摺奏明欽奉皇上硃批臣跪讀聖諭䝉皇上諄諄誡勉至備至周凡臣職所當行臣力所能行者事事悉心辦理斷不敢稍有怠忽茲恭承訓㫖惟有益加砥礪不敢纎毫粉飾言與行違當時時敬奉言行相符之天語以期報答隆恩扵萬一耳所有奉到硃批奏摺理合恭繳謹奏能遵諭奉行甚好勉之近聞石禮哈與楊文乾不睦文武大吏乖異殊於地方無益朕欲調爾廣東将軍如接㫖後即行赴粤到彼當愈加黽勉莫移今日之志雍正六年四月十一日福州将軍臣蔡良謹奏為奏聞事竊照閩省駐防習氣不好久在聖明洞鑒之中臣自抵任迄今凡有闗係風俗人心之事無不時刻留心體察期扵實力挽回悉心整頓一載以来畧有成效猶恐庸愚之輩經臣嚴飭之下貎是心違每扵衆人之前必時時痛加切責務使其滌慮洗心内外如一至扵節儉之風所以省財亦以惜福臣每扵操演地方必諄切曉諭務敦節儉禁尚紛華近來奢靡習氣亦漸次歛息再如賭博酗酒之犯尤為不法臣先經飭令四旗該管官嚴行申飭復令時勤查察嚴加約束更恐日久懈弛又每旗派撥官一員小撥什庫數名各按其所管之兵壮每日輪流挨户稽查又總委協領一員專司其事臣仍不時密行訪察如有失扵稽查或徇私容隠經臣訪出将夲犯照例分别治罪外官則以失察糾㕘容隠之小撥什庫一體連坐至臣標兩營之弁目亦照此法行之在奉行者既畏代他人受過則稽查自不敢懈怠而不肖之人亦不敢妄行生事矣為此繕摺具奏伏乞皇上睿鑒謹奏嘉恱覽之即照所奏實力整飭開導毋得始勤終怠凡關風俗人心之事必行之日久方収實效目前勉强遵依不過因畏法而然豈可為凖返澆還淳革薄從厚原非易事勉為之雍正六年九月十二日廣州将軍臣蔡良謹奏為奏聞事竊臣䝉聖恩髙厚調補粤東扵到任之始即向旗營各屬員諄切勸導凡一切教管兵丁分内應辦之事務各竭力秉公以稱職守臣現在将八旗四營兵丁鎗箭挨次輪看尚未周遍其中歩伐進退間有未合之處臣當即親加教導将来時勤訓練自可漸次純熟臣查廣州駐防兵壮向来為習俗漸染樂扵嬉逰往往不能安分邇来此風稍覺歛戢臣扵較閲各旗甲兵當官兵聚集之時必靣為曉諭操差務要精勤使令必聽管約進退合乎規矩上下須别尊卑俾人人知法紀當遵惡習當改其壮丁人等俱飭令各官及該管之小撥什庫不時稽查勿令其出外閒逰使之學習技藝再查廣州五方聚㑹且地當濱海最易蔵姦臣所屬旗汛地方亦有民人雜處恐姦宄溷跡其間勾通旗下不肖兵壮容留窩頓引誘為非先經前任將軍臣石禮哈扵旗營汛地編查保甲實為清查弊源之要但既有民人雜處則其來歴根源并眷口人數悉應填註更有如鑲黄旗之兵壯住居正黄旗汛地者或係租賃彼旗房屋在住址原難畫一然稽查必須兼到臣愚以為凡有此等錯綜居住之兵壮既照住址編入保甲自應聽其查點而夲旗該管人員亦應赴彼稽查不得以夲旗之兵壮因住居扵别旗之汛地竟置之不查不問之列臣已飭令八旗四營各官將旗營街道所住兵壯民人旗分籍貫戸口人數備細填註造具清册不惟按册得以一目了然而稽查尤易為力矣為此繕摺奏聞伏乞皇上睿鑒施行謹奏覽奏約束有方訓練有法朕甚為欣悦可嘉之至勉力為之雍正七年三月初三日廣州將軍臣蔡良謹奏為微臣受恩深重再伸謝悃仰祈睿鑒事竊臣荷䝉聖恩由福州將軍調補廣州自揣任鉅才微時懐隕越乃荷皇上温綸奨勵更䝉格外施恩將臣名下代臣父蔡毓茂應賠銀兩免其賠補臣何人斯膺茲寵眷感皇仁之疊沛思報稱之愈難惟有兢兢業業凛惕冰淵一刻不敢懈弛一事不敢茍且以仰報殊恩扵萬一其扵臣職所當行之事若不殫心實力愈加奮勉稍存怠弛之念致負髙深則臣此身斷難容扵天地覆載之中矣所有微臣感激愚忱雖先經恭疏奏謝天恩然臣朝夕思維刻難自已謹再繕摺奏謝伏乞皇上睿鑒謹奏果能永久不忘今日感戴之誠何職不稱何任不勝但人心無恒最易變遷或辦理稍有差悞奏報微渉欺隠奉朕數行嚴諭則今日之感遂即付之流水此乃就常情而論非為汝而發也但當謹記斯諭時加體察將此等念慮遏之扵未萌殊於身心節義大有禆益同日又奏為奏聞事竊臣自去年八月内到廣任事後謹将誡飭屬員化導兵丁以及清查旗營兵壮戸口住址各緣由繕摺具奏敬䝉皇上硃批諭㫖臣謹遵奉勉行駐防兵壯人等亦俱凛然聽受惟密訪向來賭風甚熾邇來曽不少息臣巳嚴飭各旗該管官員密加查訪又扵八旗派出小撥什庫四十名臣標四營派出百隊二十名俱令其值月毎月一换責令專管查拏賭博倘小撥什庫等徇私縦放經臣察出立加懲處如該管官失扵覺察定以束兵無術廢弛溺職題㕘今上下稽察嚴宻賭風亦漸覺歛息庶兵壯獲免花銷浪費而風俗人心亦可以漸次轉移矣再查廣州駐防八旗報逃甚多臣每扵遞報逃牌即將各旗呈送兵壯戸口册籍按名查對大半皆係兵壯戸下所買之民人殊不知此輩民人原無根底如果善類孰肻輕投旗下無知兵壯只圗所費身價無㡬即可多得人用而此輩犯逃在外一經為匪則夲兵即不免株連貽累此種弊端早䝉聖明洞鑒特頒諭㫖嚴禁嗣後旗下不許擅買民人欽遵在案今臣凛遵聖諭飭令只許八旗兑買其從前所買民人如果安分守法者准其留用倘有犯逃者即係自回亦必令其交還原中保領去収回身價仍聽其為民如此遵㫖奉行逃人自可逐漸稀少矣以上二條臣現在轉飭實力奉行試之漸有成效謹将緣由具摺奏明伏乞皇上睿鑒謹奏所奏二條可嘉之至朕欣悦覽之但務期行與言符不可徒託空文勉之再如奢靡之習尤當加意訓誡此為養兵根夲之道慎勿稍忽雍正七年七月初六日廣州將軍臣蔡良謹奏為敬遵聖訓恭繳硃批諭㫖事雍正七年五月十六日齎摺把總回廣捧到硃批奏摺二件臣跪讀之下仰承天語益切悚惶臣謬任封疆時慮未能稱職而愚𠂻勉圗報效未敢少萌欺隠之心君恩髙厚感戴難忘惟有敬遵聖訓務當言行相符殫心實力庶㡬謹飭身心勉盡臣職以期仰答髙深耳至䝉皇上諭以奢靡之習尤當訓導此誠聖主敦夲厚俗崇儉黜浮之至意臣當益加化導務使盡去澆漓全歸淳樸不敢慢忽上厪睿懐也所有奉到硃批原摺理合恭繳伏乞皇上睿鑒謹奏覽奏已悉就汝現今并已往而論不但盡羙竟可謂盡善矣至扵此後則在汝自有以加勉也廣州將軍臣蔡良右翼副都統臣安華謹奏為奏聞事竊照駐防廣州八旗甲兵䝉皇上體恤洪慈特發帑銀二萬兩命臣等公同存貯營運生息如駐防兵丁家有吉凶之事將生息銀兩酌量賞給以濟其用此誠聖主格外隆恩臣等欽承諭㫖敢不公平辦理以仰副聖心茲扵夲年五月二十五日已經布政司解送庫銀二萬兩到臣臣等即委員兊収封貯公所臣等隨將作何營運生息之處欽遵聖諭公同悉心酌議務期妥協萬全而左翼副都統臣月収利不過二百金臣等今查得八旗兵丁吉凶之事只就五六兩月㡬及百件即此數計算每月約有四五十件不等應需賞銀三百餘兩所得息銀既不敷每月充賞之費又不得不按月扣除再如兵丁中誠實者借此銀兩以作正務之用猶為得宜倘有不肖之徒因見公項銀兩借給便易銀有難以舉行者臣等因公同籌畫營運之計議以借給商民并開張典舖兩事並行其借給商民之銀可以按月収利俟數月之後生息銀兩彚總成數如遇兵丁家有吉凶之事即可陸續充賞而典舖營運勢難即取息銀必待一二年後俟其利息轉動方可取給以上二條臣等公同商酌已扵夲年六月二十六日定議其時副都統臣呉如譯亦同㑹議續扵七月初一日有殷實商民具領借銀當據協領申文貴等查明確實禀請借給臣蔡良即令其向兩副都統處回明後兊發復扵初三日該協領等回稱奉左翼副都統吩咐云我已具摺請㫖嗣後凡有借給商民并開張典舖營運生息之事總不必回我我亦不與聞其事如兊發銀兩爾等呈繕摺奏眀伏乞皇上睿鑒施行謹奏朕但以呉如譯之奏為非亦不輕許汝等籌畫為盡是何也朕未親到廣東何可遥定凖䋲總在汝等因地合宜斟酌妥協而為之還朕是當二字而已雍正七年九月十一日廣州將軍臣蔡良謹奏為欽奉聖諭凛遵訓勉恭繳硃批諭㫖事竊臣前奏敬遵聖訓一摺并奏明前䝉皇上恩賞營運生息濟兵銀兩一摺奉到硃批跪讀之下仰見聖明訓示周詳睿慮無微不照臣現在将營運生息濟兵銀兩㑹同新任左翼副都統臣馬士傑右翼副都統臣安華欽遵諭㫖詳細斟酌妥協公同悉心辦理以仰副皇上恩恤兵丁之聖心至臣一介微末疊荷隆恩不次擢用雖責專任大無寸長足錄而感恩報主之心不敢少怠三載以來兩任海疆重地每懼識淺才庸措施未當幸䝉皇上頻頒聖訓臣得敬謹遵循兹復䝉天語諄詳臣益當奮勉儆惕以圗仰報髙厚於萬一所有奉到硃批原摺理合恭繳謹奏但能堅持此念終始不移時自省察益加黾勉朕有何可諭耶同日又奏為奏聞事竊查廣東駐防習氣久厪宸衷臣自上年八月到任之後多方告誡力挽頹靡業經兩次具摺奏明均邀睿鑒至前䝉訓㫖諭以奢靡之習亦當加意訓誡仰見聖諭精詳實為養兵根本之道所當亟為奉行者也臣欽遵諭㫖開誠化導立法勸懲伊等亦皆省悟知蕩檢之無上諭轉飭嚴查如有干犯除将本犯照例擬罪外其失察之該管各官并小撥什庫以及本犯之族長俱駐防仰䝉皇上天恩賞住官房給領餉乾一切衣食用度何莫非皇上豢養所及近又䝉皇上格外𢎞慈體恤爾等如遇家有吉凶之事臨時無所措辦特發帑銀營運将生息銀兩賞給以免拮据如此浩蕩皇恩従古未有當時時感戴念念不忘倘差操怠惰管約不遵或恣情扵賭博逰蕩以及酗酒鬭毆等事不但身罹國法實為仰負君恩至扵犯事之後噬臍無及何若扵事前時時感戴宏慈力圗報效自然奉公守法不敢為非臣仰䝉聖訓悉心整頓今各兵實有感恩戴徳之誠竟無怙終不悛之習而臣化導挽回仍不敢少遺餘力務使其始終如一共臻一道同風之治所有臣遵㫖開導并現在兵壮感化緣由理合繕摺奏聞謹奏勉之勉之切戒日久怠生尤不可視目前光景遂謂巳収感化之效也雍正八年五月二十六日廣州将軍臣蔡良謹奏為請㫖事竊臣扵雍正七年十二月二十六日准兵部咨開夲年十一月初七日奉㫖當日各省設立漢軍駐防因人數不敷是以添設綠旗兵丁令該将軍管轄今漢軍生齒日繁駐防之餘丁日漸蕃衍足供差操之用嗣後将軍標下綠旗兵丁缺出即将漢軍餘丁頂補仍食綠旗糧餉其綠旗兵丁内有父祖食糧年久者其缺既令漢軍頂補則伊等子弟不得食糧未免衣食無資著扵夲省督撫提鎮標下併同城附近營汛内有開除名糧即将此等之人充補欽此等因到臣當經轉行旗營一體欽遵遇有四營糧缺臣等公同考驗扵八旗壮丁内首先驗其材技兼優者頂補次及扵家口衆多者補之仍聽各營將備管轄歸伍差操至該壯丁頂補營糧之後如有伊父兄所遺甲缺仍将該丁掣回頂甲另行驗補營糧再查四營馬戰名糧缺出如即於新補歩糧之旗丁内㧞補不惟奉行伊始頂補之數無多且查現在綠旗歩戰兵内其人材壮健弓馬可觀差操勤慎者四營各有其人若不将此等酌量㧞補則人材廢棄甚為可惜臣愚以為四營馬糧缺出将巳經頂補營糧之旗丁同現在綠旗歩戰兵丁内挑選材技兼優者一并考驗較其尤者㧞之或以之互相間補如此則不獨超羣出衆之人得有上進之階而新食營糧之旗丁與現在綠旗營兵皆益加奮勉争自濯磨矣為此繕摺請㫖伏乞皇上睿鑒施行謹奏交大學士議政大臣㑹議具奏雍正八年十一月二十日廣州將軍臣蔡良謹奏為年嵗豐収地方寜謐恭慰聖懐事竊臣查得廣州府屬之南海新㑹從化增城花縣龍門等處歴據臣標分撥貼防員弁節次禀報各稱逰廵地方雨𤾉時若収成俱有九分十分米價每石五錢六七分至六錢一二分不等鄉民安堵盗賊稀聞其餘各府州縣雖非臣標逰廵之地臣亦不敢膜視時為採訪如廣州府屬番禺等縣以及韶肇惠潮髙雷㢘瓊等府収成俱有八九十分不等如南雄羅定連州所屬収成有九分十分其各處米價自五錢上下起至六錢一二分止總計通省年嵗均係豐収並無米價昻貴之處又聞潮州府屬田中生有嘉禾此皆我皇上敬天勤民至徳感召之所致臣目覩兵民歡欣景象理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏朕懐深慰當倍加敬慎鎮撫地方果能文武協和兵民輯睦自然永迓上天之庥應也雍正九年六月初一日廣州將軍臣蔡良謹奏為敬奉聖諭凛遵訓勉恭繳硃批諭㫖事雍正九年二月初十日臣齎摺把總恭捧硃批奏摺回廣當即跪迎進署敬讀諭㫖忭悚彌深竊臣奉職海疆寸長莫效幸際皇上至治郅隆嵗豐時泰粤東連年大稔今嵗春夏以來雨水霑足田禾豐茂故雖青黄不接之際米價並不加增目今早稻現在収穫新榖将次登場米價自當更减竊盗頗稀詞訟亦少此皆我皇上敬勤感召所以太和翔洽嶺海億兆咸登樂利臣重荷殊恩躬逢熈皥惟有恪遵訓諭敬慎小心俾文武協恭兵民輯睦共矢公忠倍加黽勉庶冀永迓天庥於弗替以仰慰聖主宵旰之殷懐所有奉到硃批原摺理合恭繳伏乞皇上睿鑒謹奏據奏粤東雨水霑足田禾豐茂以手加額覽之雍正九年九月十二日廣州將軍臣蔡良謹奏為恭繳硃批諭㫖事雍正九年八月十八日齎摺把總回廣捧到硃批奏摺臣跪迎至署叩頭祗讀訖竊臣受任海疆知識疎淺惟恪遵聖訓殫竭愚誠協和文武輯睦兵民以冀仰答隆恩扵萬一欣逢皇上至徳遐孚精誠昭格年豐物阜盗靖民安微臣身居嶺表目擊情形據實奏聞䝉皇上睿鑒天語煌煌臣捧讀之下曷勝感激懽忭莫能自已惟有益加警惕時切寅恭以敬迓天庥仰紓睿慮所有奉到硃批奏摺理合恭繳伏乞皇上睿鑒謹奏爾自此任以前無可訾議此任以後操持不改則在汝有以自勉也硃批諭㫖巻一百九
