body:
  text: 欽定四庫全書硃批諭旨卷一百二十九硃批王紹緒奏摺雍正五年三月初九日廣東提督臣王紹緒謹奏為欽奉諭旨恭謝天恩事竊臣於雍正四年十二月十一日陛辭後束装起程時有兵部職方司員外富海到臣寓所傳旨雍正四年十二月十一日尚書查弼納交出奏摺一件奉旨守備施致雲陳申著照依提督王紹緒所請帶去劉得紫係旗下人己經歸旗爾部行查引見王紹緒以金山營㕘将劉永貴漢仗好做官亦好奏請帶往粤東題補但金山地方𦂳要且㕘将係屬大員粤省難以題補爾差章京一員趕上王紹緒将此旨口傳與伊欽此臣質本駑駘仰沐皇上隆恩特授廣東提督因念各員微材可取是以冒瀆天聴復䝉聖鍳不獨臣感激天恩於無既而劉永貴施致雲陳申劉得紫受恩益厚自必益加奮勉盡心職守䇿勵清操仰報主恩於生生世世矣俟施致雲陳申到廣之後遇缺另疏題補外合将奉到諭旨縁由恭摺奏謝伏乞睿鍳謹奏伊等受恩何湏爾代為感謝觀爾頗渉傾身為人習氣如有此病不切以為戒小則狥私欺隱大則背公結黨皆由斯滋長於家於國有害無益也為大臣者惟剛方清介正色執法始稱勝任夫事君尚不惜致身何惜身外之人大義尚欲滅親何况屬員及親友耶戒之勉之於爾甫陛辭後朕曽向廷臣降諭恐爾犯此流弊今覧初次奏摺果不出所料故不得不眀白訓誨以防微杜漸爾其回志易慮捐除一切市恩邀譽瞻顧善柔之風専意奉公盡職可也朕雖如是批諭實能遵承與否以至受益罹害邀福賈禍總在爾自取之耳同日又奏為欽奉上諭事雍正四年十二月初九日臣於乾清門面奉諭旨廵撫楊文乾做官好才亦好朕不患其不能辦事而患其急於辦事爾到廣東可将此旨傳與楊文乾隨指座前扁語恩諭戒急四字示臣曰朕昔年性最急時䝉聖祖訓以和緩之道今登大寳治理諸務惟恐仍渉於急有負我聖祖之訓敬書此扁得以時加警惕看爾係過於和緩人又當以急於辦事為要也爾其勉之總督孔毓珣做官好朕心喜悦爾若途間與之相遇可将此旨傳諭於伊再者前提督萬際瑞曽摺奏碣石鎮總兵陳良弼爾到廣東查眀具摺奏覆欽此臣於上年十二月十一日陛辭出京一路南来與總督孔毓珣並未相遇理合聲眀今於本年三月初八日在廣州府三水縣地方接印視事初九日過廣州府省城遵将所奉諭旨傳與撫臣楊文乾祗聆訖碣石鎮總兵陳良弼臣入境時即聞其居官聲名不堪収漁船陋規在營伍賣糧又因上年荒歉陳良弼遣人到恵州採買米穀甚多以致米價昻貴民怨沸騰萬際瑞查伊批牌並無註眀採買數目且聞其以接濟兵民為名實係圖利是以萬際瑞摺奏但萬際瑞摺中所列陳良弼之事未䝉聖恩眀諭今臣訪其事蹟如此理合恭摺覆旨至臣材質愚鈍處事每恐過於和緩敬聞天語訓誨惟有與撫臣楊文乾互相箴規過者抑之不及者勉之益加䇿勵竭盡駑駘仰報主恩於萬一謹此奏謝伏乞睿鍳謹奏以爾之眀敏而賦性和緩此種氣質之人每易流於善柔巧詐時當返躬自省若不犯此病将来可為一大人物否則終屬棄材此等蠱壊國家之風習朕斷不姑容也當竭力戒之毋負朕簡擢之恩同日又奏為恭謝天恩事竊臣西蜀庸材由千把微員歴官逰撃恭逢我皇上御極雍正三年陞臣太湖營叅将雍正四年陞臣湖州協副将旋又特授臣狼山總兵恭請陛見又䝉授臣廣東提督仰承訓諭諄諄錫賚稠疊臣感激涕零之下因念臣少孤失學今日得沐殊榮實由臣叔新命撫養教訓所致是以於上年十二月初九日在京具摺陳情䝉皇上恩准臣帶臣姪楫桓二人隨任讀書併學習弓馬今己到粤至臣子武舉植亦䝉聖恩准臣帶往粤東今尚未到俟其自川来粤後咨㑹署督臣阿克敦考補千總另疏題眀外伏念臣一介武夫寸長未效荷䝉異數一嵗三遷而至提督此誠千古未有之隆遇畢生難報之深恩何敢即以細事於拜颺之頃驟瀆聖聰祗縁受聖主優容命准隨帶此又千古未有之國恩於萬一為此繕摺奏謝伏乞睿鍳謹奏覧雍正五年六月二十七日廣東提督臣王紹緒謹奏為奏聞事竊廣東為山海交錯之區而瓊州一鎮離督撫提臣甚逺係駐劄海島外控黎夷内資屏翰甚屬緊要所頼鎮臣强幹精眀而嚴以飭下訓練有方操守廉潔方能整軍容而資彈壓今查現任總兵黄助年近八旬操守甚屬平常且送臣考驗弁兵弓馬人材合式者少其平日營伍廢弛可知矣海疆重任關係非輕臣合具摺奏聞伏乞睿鍳謹奏據奏黄助廢弛營務知道了但水師人材甚屬難得同日又奏為據實奏眀臣標營伍事竊臣䝉皇上隆恩畀任全省提衡則通省營伍自應皆為整飭惟提標兵馬係通省觀瞻尤當先為經理臣驗閲聖恩付以山海重寄若不急為整飭則臣之罪更甚於前人矣故不敢隨聲附和以葢他人之愆謹據實敷陳仰祈聖主洞鍳庶臣得從容辦理次第整飭臣現在将馬歩兵丁加意訓練約一年之後可觀成效查營中鐡綿盔甲有堪披戴者有不堪披戴者其大纛旗幟亦應製造今擬修整盔甲製造旗幟通共估計實價銀三千零三十四兩但此修整置辦銀兩若云捐俸即屬欺隱臣查各省提督例有親丁糧八十分惟廣東從前提臣於八十分外又有家人食糧二十分臣䝉皇上厚恩家人等於八十分内儘可贍養何敢違例致干罪戾隨将此二十分退出并查五營将備自王文雄提督時起有多食親丁糧二三分者臣嚴行申飭亦並勒令退出計今共退出歩戰糧四十六分自本年閠三月起至十二月終止糧餉二項共用漸次整理約二年内全備其糧缺即募精壮照數補足再查廣東通省鎮協營将備其現在親丁特恩乃邀於一時非經久通行之例臣隨遵照康熈四十二年湖廣提臣俞益謨題定親丁額數九卿議覆奉旨通行之例申眀通飭即行改正其退出糧缺勒令募補現據各鎮協營将備出具遵依改正名缺召募補此細事也足存案合併聲眀至於通省營伍臣今春赴任時順道經由者按閲之下即嚴飭将備務為整頓其非經由及在逺處者即嚴行申飭令其一洗從前因循之習但非躬親查閲恐難振起頽靡合併請旨准臣於軍政事竣後即輕騎減從遍查各營兵丁技藝盔甲旗幟器械等項臣亦得備識地方形勢嚴飭操防務期山海交錯之區營伍壮觀民安盗息庶㡬仰報髙深於萬一耳理合恭摺奏聞伏乞睿鍳謹奏詳閲所奏無非瑣屑之務粤省武弁貪黷盗賊狡黠總未言及如何整飭如何消弭而将此易於辦理之事不必奏聞之言鋪張如許閒文奏朕何益若能将貪風革易盗蹤止息此外亦無可整理處矣㡬分名糧有何關係召募數兵有何大益據是觀之爾乃専務細微而忽緊要不識輕重之人也似此本末倒置充類而言自必以取悦於衆為是而反以見賞於君為非斯乃背公之陋習庸材之常態當切戒之凡百處惟於大者逺者是務方克勝任同日又奏為恭謝聖訓事夲年五月初三日臣齎摺千總回恵臣跪迎御批摺匣到署叩頭啟視敬誦皇上硃批諭旨併閲張廷玉查弼納等公同寄信轉傳上諭仰見聖眀洞鍳臣惶懼慚赧實無以自容伏念臣愚昧武人受恩深厚所愧性渉善柔致有為人愚見今䝉聖恩指示臣得省悟其非幸沐皇恩寛大不即賜罷斥復荷訓諭諄諄俾臣自新不啻家人父子臣欽遵之下感激無地惟有力洗善柔為人之習孤介自持時時加勉悉秉至公至正激濁揚清仰報我皇上髙厚之恩也所有奉到聖訓理合恭摺奏謝伏乞睿鍳謹奏能幡然省悟乃爾之福若不能改悔實心遵奉而行徒可惜朕恩終為天下後世所笑耳朕豈肯以封疆重任為市私恩之物耶雍正五年九月十一日廣東提督臣王紹緒謹奏為奏聞事竊臣查廣東提標向来選有勁兵一千名曰戎旗為提臣援勦之用名雖分隸五營而其實不赴五營操演惟聴提臣委設總統一員率其操練但自設戎旗以来歴年已久或弟男頂替或懦弱夤縁藏拙於此且有安閒之樂又因不受五營将備鈐束操演驕縱自恣結黨抗挟刁風尤甚臣逐加閲驗因内多漢仗平常弓馬生疎者誠難任其閒曠且念提標五營水陸汛地甚屬廣逺在汛之兵操岐程鴻徐顯貴楊顯韓昌張金生等責革立即遞國法隨即赴營聴候差操但此馭兵申律是臣分内皇上睿覧施行謹奏覧同日又奏為奏聞事竊查粤東自七月以来民間晚禾陸續俱己栽插髙雷廉瓊四府禾苖甚是茂盛豐収可望惟廣肇恵潮韶南六府八月内雨水稍覺愆期低田車戽可施豐亨可冀其髙田離水甚逺者惟待甘霖一霈則通省咸慶豐稔矣目下米價髙雷廉瓊四府每石八九錢一兩不等廣肇恵潮韶南六府每石一兩二三錢至一兩六七錢不等兵民相安地方寜謐所有現在秋禾雨水米價情形理合恭摺奏聞謹奏覧禾苖米價情形知道了條奏交印禁火器二摺留中同日又奏為恭繳硃批叩謝恩訓事夲年五月初三日臣齎摺千總回恵臣郊迎御批摺匣到署叩頭開匣跪讀硃批訓旨欽此欽遵隨於本年六月二十七日跪繕奏摺恭謝恩訓後兹七月十八日兩廣督臣孔毓珣自京回任臣前赴三水縣地方跪請聖安督臣口傳上諭王紹緒人雖好但於交情太重凡市恵近名令人感激之舉伊必樂於從事若釐姦剔弊招人怨憾之事伊即未必肯為欽此臣跪聆之下天語煌煌儼如咫尺臣惟仰體訓諭力洗前習益加䇿勵以期仰報天恩於無既理合繕摺将前次奉到硃批敬謹封繳併叩謝督臣孔毓珣口傳到臣恩訓伏乞皇上睿鍳謹奏當聴朕訓旨竭力改勉切毋自以為是但以公之一字時時放在目前審度孰輕孰重則胸中自必了了無疑矣大率人之識見容易狭小最難廣濶若偏於行小恵一邊諸凡正務必致廢弛而不能振作也此乃理之必然朕實見透而言勉之勉之雍正六年二月初三日廣東提督臣王紹緒謹奏為恭謝聖訓謹再陳眀仰祈睿鍳事竊臣前以本標戎旗兵選剰之五百名發營操差情事摺奏奉有皇上硃批臣跪讀之下惶懼交廹伏念臣才質庸愚處事未當仰䝉聖恩詳細批示益切感激伏惟前事因臣将戎旗兵發營操差之時有刁兵傳帖狂詞欲行繳械辭糧等語情屬可惡而以其尚在未行且事機冝速是以将訪拏出資糾衆為首之謝陞審究確實於操期之際當五營兵衆立行杖斃其次為首之楊士龍及為從之李昌岐等分别責枷示衆革伍編民衆心畏懼咸知國法至今操差無懈但此事本應具題縁揆此中情節與雍正五年七月間督臣孔毓珣與臣㑹不同皆為援勦以及辦公差遣之用昨臣業經酌裁五百名歸伍操防其選留五百名之材技猶有具摺陳眀伏候敕旨其南雄協繳械辭糧一案現在奉旨審擬聴督臣孔毓珣另疏題覆合併聲眀伏乞皇上睿鍳施行謹奏覧雍正六年六月二十四日廣東提督臣王紹緒謹奏為恭謝聖訓敬繳硃批事竊臣齎摺家人節次回恵捧到臣前奏恭謝聖訓事一摺暨奏眀臣標營伍事一摺又捧到臣恭謝聖訓謹再陳眀仰祈睿鍳事一摺俱奉有硃批臣叩首祗領伏念臣材識庸陋疊荷聖恩訓誡指示詳眀臣欽奉之下如仰覲天顔面聆恩諭惟時時惕厲事事凜遵以期仰報隆恩於萬一耳臣謹恭摺奏謝併繳硃批奏摺伏乞聖鍳謹奏覧奏知道了既為大臣當於逺大是圖若好行小恵拘執小節市恩立威惟小是務仍不脱走卒小人之態度必致貽悮職守而後己竭力遵朕訓諭强勉為之日久自然習慣假若固執不回自以為是終恐非爾之福如吴陞魏經國等巧詐行為今皆敗露矣夫復何益切戒莫流於下愚不移也同日又奏為奏聞事竊臣准湖廣提督咨㑹内稱湖南永州府寜逺縣生員荆之寳家於雍正六年二月初一夜被盗入室刦去銀錢衣飾等物殺傷男婦三人擄去五人勒銀取贖一案隨經題報後兹據永州府該地方文武員弁呈稱現據本案緝獲夥犯供稱内有盗夥五六十人係廣東三江口連州連山縣等處人餘係廣西及湖廣本省人猺人等因到臣臣即飛檄三江口副将及連陽營逰撃按照住址逐名拏解復遣臣標千總前往督緝業經陸續拏獲二十七名撥兵押解楚省聴審其未獲之犯姓名住址半多不確現在緝訪俟獲日即押觧至楚聴楚省究擬題結外合将先獲盗數恭摺奏聞伏乞睿鍳謹奏據奏姓名住址半多不確今盗犯既獲有如許名數何難詰問的實此語似有推缷之意其将所奏併朕批諭知㑹總督孔毓珣不可以為隣省案件而遂膜外視之也案内盗夥無令一人漏網同日又奏為奏聞廣東早稻収成現在米價雨水情形事竊查粤省早稻自春時栽插以来雨水調順五月間即已成熟通省収成有九分十分不等現在米價髙雷廉瓊四府毎石六七八錢不等廣肇恵潮韶南六府每石八九錢至一兩外不等民間現在耕種秋禾雨水均調所有早稻収成及現在米價雨水情形理合恭摺奏聞謹奏此等奏聞處若少有粉飾涉於欺隱則汝領罪不起百凡但以據實為務謹誌毋忘雍正六年九月十九日廣東提督臣王紹緒謹奏為城垣久塌請旨飭修以資防禦事竊臣於雍正五年三月内抵任時即遍閲駐劄之恵州府城垣見墻垜城根共倒七處積算約六十餘丈查係歴年風雨傾圯并雍正四年間發水淹衝所致又閲附郭之歸善縣城垣倒塌更甚積算竟有一百五十餘丈之多亦係歴經風雨又縁地勢低窪更受發水淹浸所致臣隨移咨督撫一併議修嗣經屢催終未舉行雍正五年七月内准工部咨開議覆陕西延綏鎮臣孫繼宗所請設法修理城垣奉旨依議通行之文臣復屢催至本年四月内准督撫咨覆始稱委員確估嗣據歸善縣知縣張世錫詳稱㑹同河源縣帶匠估修恵州府城垣應需工料飯食銀七千一百餘兩估修歸善縣城垣應需工料飯食銀一萬一千二百餘兩後以核減再估為詞迄今杳無興修音耗致昨六月間大東門城樓又已倒塌若再延挨城益傾圯工費浩繁愈難修理矣惟是城垣為保障所係當此省費可修之時臣備咨督撫自應速修無奈屢催因循如故是以奏瀆宸聰仰請敕行督撫作速議修興工報竣庶地方得資防衛矣伏乞睿鍳施行謹奏直省似此為修理城垣奏請者甚多朕亦時常在念與督撫臣再加商酌可也雍正七年四月十二日廣東提督臣王紹緒謹奏為特掲貪汚曠職千總以肅軍紀事竊臣於雍正六年五月十五日據肇慶協副将李建功掲報前事内稱協屬右營千總黄雲龍以兵丁勾賊越獄復将賊犯藏匿向新興縣索詐花紅銀兩分肥入已又擅離汛守等情到臣臣即據掲咨請督臣孔毓珣斥革究擬去後隨於六月初一日准督臣咨覆業據副将李建功掲報經檄飭肇慶府確審究擬通詳核奪俟該府審詳到日㑹核定奪等因在案其所審供情迄今杳無通詳咨覆忽於雍正七年二月臣接准督臣孔毓珣㑹稿并咨以千總黄雲龍題補瓊州鎮標右營守備員缺臣縁黄雲龍係現在候審之弁不便即邀題補是以未經註題以期另選賢員不謂督臣於未送㑹稿之先己列臣銜名業經繕疏拜題且即給咨黄雲龍赴部引見矣臣甚駭異竊思千總黄雲龍者貪縱居心得贓有據反荷題補之榮奚以昭激揚之典謹将原案封呈睿覧伏乞皇上敕将千總黄雲龍發回廣東審眀聴該督覆旨外其瓊州鎮標右營守備員缺即懇聖恩簡放庶免要缺久懸抑臣更有請者嗣後凡将軍督撫提鎮等如遇預行保題及循例題補并奉旨㑹同揀選保題事件題覆之日仰乞敕旨務令先期㑹稿畫題并取該管上司及㑹題之員印結送部查核以免虚􅑃合詞之弊謹此具奏伏乞睿鍳敕部議覆施行謹奏王紹緒此奏甚屬可嘉黄雲龍便堪題補亦當於審眀無干後具摺請旨豈有特掲貪汚曠職之案尚未完結遽行題補之理該督孔毓珣此舉甚屬不合該部嚴行察議餘一併議奏以聞雍正七年六月初四日廣東提督臣王紹緒謹奏為請開黎路并設官兵以分夷勢事竊照瓊州一郡孤懸海外周行二千里中設三州十縣南北綿亘五百餘里東西横隔三百餘里係黎岐所居惟以弓矢田獵為事從未見衣冠禮義之風動輒自相仇殺或聴漢姦唆弄南北峝夷立即傳箭結連啟釁貽害地方此誠不可不急為籌畫以分其勢查黎之附近於各州縣者則為熟黎或至城市與民貿易所種地畝薄輸賦税其與治境窵逺者則為生黎又為岐人俗尤狡悍然其居處咸有村峝可名攷諸紀載眀臣海瑞有黎中開十字路之議揆之於今日則又事半而功倍仰請敕下督撫檄令該地方文武等官自儋州至萬州東西横開一字路除熟黎境界外生黎地方僅二百餘里宣揚聖徳次用工力剋期開闢以通商民往来於適中之沖山地西設叅将一員兵一千名安營立汛内外廵防則南北隔截其勢既分而釁端自消復諭以衣冠禮義之教清其地畝薄其賦税不數年間畏威懐徳之下佇見熟黎全附版圖生黎亦同為盛世之民矣其開路等費及設官抽兵營制一切事冝統候俞允之日再議葢經營事後莫若先事預防臣躬履其地目睹機宜敬陳管見繪圖恭呈聖覧伏乞睿鍳敕議施行謹奏覧奏黎地情形皆朕素所悉知廣東因督撫提鎮未盡得人盗風未靖民習未淳營伍未整吏治未清目前諸事尚多不克就緒朕乏識人之眀正爾愧悔不遑何暇逺及境外耶惟冝以息事安内為要若非其人非其時而勉强舉動不但無益恐致别生事故汝等庸材自取恥辱猶屬小節國體所關甚鉅其嚴飭員弁鎮靜彈壓令若軰知恩之可感威之可畏相安於無事無作如是不自量之妄想如云事小易於成功既不能於國家生民為大患害更不必荼毒㝠頑無知之人以啟禍端也此議且置俟郝玉麟到任後再看汝等文武果能竭力經理俾吏治營伍井井可觀黎夷性雖愚蠢亦具有耳目心思臨時只湏數紙告條可保不煩張弓隻矢即己措置妥協斯事非粤省目下所應行亦非汝軰大臣所能辦汝見誤矣将此摺併朕批諭與郝玉麟傅泰王士俊同看同日又奏為奏眀臣標營伍仰乞加訓練外其應修整添造盔甲旗幟等費将從前提臣及将備多食隨丁糧缺退出暫停募補将糧餉銀兩以為添修之費業己經臣恭摺奏眀原定二年後修整齊足再摺奏聞今己報竣實用銀三千一百二十八兩零又見五營素無帳房鑼鍋臣復買備帳房三百頂鑼鍋三百口再臣標五營向有督臣孔毓珣買穀五千石以備青黄不接之時各兵借食臣見甚是有益且有恵協兵丁同居一城向無貯穀遇臣標兵領穀之時不無希冀臣是以於上年夏秋豐収穀賤之際又買五千石另建倉厫収貯以足標兵及恵協兵丁接濟之需三項實用銀三千九十兩零其銀係臣原報各官退出多食隨丁糧餉及歴年馬價羡餘存公銀内動用兹臣身任提督己二年有餘相應将添造盔甲等項恭摺奏覆抑臣更有請者前項増修買備一切遇營員陞遷事故必入交代方無廢壊侵欺之弊臣思増修買備悉係以公濟公謹於聖主之前據實逐細預先奏眀可否止以公費羡餘銀睿鍳批示遵行謹奏當竭力謹慎操守勉加風厲不令屬員欺蔽玩視方能稱職矣條奏四摺留中俟廷臣議覆後另有諭旨同日又奏為欽奉上諭事竊臣承准兵部劄付内開通行直省督撫提督上諭一道粘單一紙䝉恩派賞臣標銀一萬八千兩於布政司庫内領囘永逺作本營運生息遇兵丁有吉凶之事酌量将息銀賞給等因欽此仰見我皇上恵濟兵丁至意標營兵目歡呼踴躍感激聖恩另容據呈題謝臣現在具領遴員營運生出息銀遇兵丁有吉凶之事酌量賞給年底造冊送部查核外兹臣更有請者臣駐劄之恵州府地方偏僻業少經營素無當舖各兵或遇有急需每以重利向人私借而尚不能必得今䝉聖恩兵丁有吉凶之事固己得沐殊恩但尋常疾病事故亦所時有其間不無稱貸與其重利向人私借不若官借而止取其微息似屬兩益臣謹懇聖恩除兵丁吉凶之事遵睿鍳批示遵行謹奏所奏甚屬不達事體同日又奏為奏聞事竊臣於雍正六年十一月初八日題眀查閲邊海情形即日自署起程由海豐碣石至潮州澄海渡海抵南澳黄岡至閩疆交界處而返從饒平鎮平於十二月初七日囘恵州一路年嵗豐収穀價甚平初八日臣復自恵州起程由廣州肇慶而至髙雷兩府詢問年景亦甚豐収二十九日至海安登舟渡海雍正七年正月初一日至瓊州府於初二日閲驗鎮標兵營初三日啟行歴觀儋萬崖三營兵丁及海疆形勢十九日囘至瓊州海口詢問海南年成去秋亦係豐收臣因風信不順不能渡海阻行二十日二月初九日南風始起即渡歸海安從廉州欽州順由廣西之潯梧二府慶廣州廵閲各海疆又至南雄韶州由乳源縣而過湖廣宜章縣地方到三江看猺排形勢由新安大鵬平海各海汛而囘恵州一路二麥収成俱好又值雨水霑足禾苖俱經栽插臣今抵署後現在十一月初八日起程到本年四月二十七日囘署於本省經由之處即順便驗閲營汛兵伍所有和平海門雷協春江廉州平海廣海龍門香山等協營将備中之行事乖張營伍廢弛弓馬生疎老病庸劣者經臣先後咨㑹督臣孔毓珣及臣具題糾叅在案其餘各協營分隊伍猶屬可觀汛防亦無怠玩臣仍飭各官益加整頓勤慎供職外俟後順守備魯之芳及該協營各官弁兵丁臣俱面加奨賞訖至如潮州鎮臣尚瀠紀律嚴眀營伍整肅南澳鎮臣許良彬為人誠實熟諳水師碣石鎮臣蘇眀良整躬率屬訓練有方髙州鎮臣陳倫炯人甚眀白清操尤著但見識畧有拘迂處其營伍亦屬整齊瓊州鎮臣施廷専馭兵有術因前鎮臣黄助玩弛之後益加整飭營伍可觀至左翼總兵所轄水陸一十四營地方遼濶該鎮臣謝希賢雖云熟悉水師而陸路終猶不諳且操守平常舉止亦不甚得體右翼鎮臣馬紀勲營伍中平而地方一切甚是留心以上鎮臣現在供職處合併據實奏聞伏乞皇上睿鍳謹奏議論諸鎮情形較朕向所知聞頗相符合足見不誣非因所奏能與朕意相協而許汝公當也嘉悦覧之雍正七年八月初六日廣東提督臣王紹緒謹奏為奏聞拏獲礦徒現交發審事竊本年六月間訪聞歸善博羅永安縣屬各處山場有礦徒聚衆偷穵臣即遣撥標下将弁督帶兵丁前往拏逐隨據營汛官弁具報礦徒俱己聞風逃散壠洞填寨寮房燒毁山場清淨各等情昨又訪得碣石鎮右營屬海豐縣梅壠墟汛有匪徒聚集七月十九日搶奪徐秉閑等舖房一十一家傷死二人等情臣先遣標下前營守備哈雲棟帶兵跟追旋據營汛官弁禀報復即遣将帶兵并檄行隣汛咨㑹碣石鎮臣蘇眀良一體撥兵箚付恵州府遣歸善縣縣丞謝道進督率鄉勇共力圍擒堵截去後隨據臣所遣標員等禀報賊至山羊寨地方見四面兵威勢難脱於閏七月十六日據賊首謝恩榮呈稱我等原係各處開礦窮民從未做賊因被逐回家中途湊遇曽在梅壠墟奪食誤傷民人今情願投撫并納姓名冊内開謝恩榮等一百二十三人隨即按名全數點解前来臣即咨解督臣郝玉麟聴發按察司収審至搶奪徐秉閑等家實在正犯名數統聴督臣確審定擬題結所有拏獲礦徒發審情由合先據實奏聞謹奏此事朕早己聞之經數處奏報矣同日又奏為奏聞早稻収成現在米價及晚禾雨水情形事竊照廣東早稻今嵗雨水霑足至六月間収成各府俱有七八分至九分不等現在米價恵潮二府毎石六七錢不等廣肇二府每石七錢上下不等髙雷廉瓊四府及南韶二府每石八錢上下不等其各處晚禾現亦茂盛雨水均調将来可望大有伏查廣東連年俱值豐収人民樂業地方相安實荷我皇上福庇所致臣目覩盈寜􅂚勝額慶之至理合據實奏聞伏乞睿鍳謹奏覧米價禾稻雨水情形朕懐深慰同日又奏為恭謝聖訓事雍正七年六月初十日臣屬題補澄海協副将許大猷自京引見回粤口𫝊面奉諭旨到臣臣恭設香案望闕叩頭謝恩伏念臣質本庸愚為人柔軟仰䝉聖眀洞照天語逺頒臣跪聆之下自問何修得荷皇恩造就若此自兹以往惟有事事凛遵聖諭益加䇿勵持綱秉紀嚴毅率屬以副我皇上訓誨之至意理合恭摺奏謝伏乞睿鍳謹奏朕所訓諭切中汝病湏實力遵奉若不心悦誠服痛自改勉恐終為後患時時返身内省可也雍正七年十二月二十四日廣東提督臣王紹緒謹奏為欽奉上諭恭謝天恩事竊臣齎摺家人捧回摺匣臣叩頭開讀䝉發回原摺二件外有大學士公馬爾賽等寄字内開雍正七年十月十八日皇上發下提督奏摺令我等閲看奉上諭朕屢次批諭王紹緒若伊以朕言為是自當於摺中一一回奏若伊另有意見亦應據實敷陳今伊摺中只将朕屢諭之語照樣繕寫進呈並無一自行陳奏之處似此草率糊塗實屬䘮心病狂天奪其魄矣著将原摺發還令其另行具奏爾等可寄信切責之欽此遵旨寄信切責到臣臣跪讀之下惶懼無措愧汗交流伏念臣知識庸愚前具奏摺奉有硃批屢䝉聖恩訓誨指示仰見天言至當臣實無意見敷陳但䝉我皇上萬㡬之暇如此諄切批示而臣敬聆之後祗将硃批繕寫進呈無一自行陳奏之處實臣昏憒愚昧草率糊塗罪莫能逭䝉我皇上格外鴻恩不即加罪諭令閣臣寄信切責臣益愧悔無地感激涕零如夢初醒痛自警責謹遵恩旨一一另行具奏外所有皇恩深重感激愚忱謹并奏謝伏乞皇上睿鍳謹奏若能加勉自勵不獲罪於天地神眀方不有負為人之理也雍正八年九月初九日廣東提督臣王紹緒謹奏為恭謝天恩事竊臣承准兵部劄開雍正八年七月十三日内閣奉上諭江南提督栢之蕃著来京另有用處江南提督員缺著廣東提督王紹緒調補廣東提督員缺著廣西提督張溥調補俟張溥到廣東交代後王紹緒再赴江南新任欽此隨恭設香案望闕叩頭謝恩訖伏念臣西蜀武夫仰荷聖恩授臣廣東提督自雍正五年三月初八日到任三載有餘屢䝉聖訓不啻家人父子深愧才識短淺愆尤過多悉邀天恩寛免今又䝉特旨調補江南提督聖主隆恩有加無已臣感激難名惟有益甘冰蘗勉竭駑駘料理地方營伍實心報效仰答皇上髙厚之恩於萬一耳俟新任提臣張􅄎到廣交代後臣即前赴江南新任外所有感激天恩下悃謹具摺奏謝伏乞睿鍳謹奏覧奏謝知道了此任若仍以不及見責於朕則汝為無用之廢材矣勉之同日又奏為奏聞事竊查廣州左翼一鎮係邊海重任外鎮逺夷内為省城保障現轄二協十營地方遼濶必謀畧深沉才猷肆應方克隨地制宜整理一切無誤查現任左翼總兵李維揚操守亦好但為人粗率遇事未諳才難肆應不足以勝衝繁鉅任臣因地方營伍起見據實奏聞伏乞睿鍳謹奏據奏左翼總兵李維揚才難勝任已有旨矣雍正八年十月二十一日廣東提督臣王紹緒謹奏為微臣戀主情切恭請陛見伏乞恩准以抒下悃事竊臣仰荷皇上特恩由狼山總兵於雍正四年二月初一日陛見即䝉恩旨特授廣東提督自到廣任事以来勉竭駑駘時深蚊負之懼幸䝉訓諭屢頒至諄至切不啻家人父子臣毎跪讀感激涕零益加黽勉但臣質本庸愚愆尤叢積捫心自問殊切慚惶謹於雍正七年十一月内恭疏題請陛見未䝉恩准兹又仰奉恩綸調臣江南提督聖主殊恩有加無己微臣瞻望闕廷彌深孺慕伏乞皇上念臣依戀下情准臣廣東交代後起行順由江西兼程入京拜颺殿陛恭請聖安敬聆訓旨隨即兼程赴任計往返路途止多二十餘日庶犬馬下忱得以稍慰而江南諸務亦得有所遵循矣伏候睿鍳敕示遵行謹奏不必来京且赴新任觀汝光景恐未能勝斯任也勉之同日又奏為奏聞事竊惟各標營伍欽奉上諭發帑生息賞給兵丁吉凶需用又奉恩旨俟營運利息豐裕再行給與欽此欽遵隨據臣標中軍朱鈿詳稱藩庫領回銀一萬八千兩借給殷商汪贊眀等照貿易行規紋銀九七扣庫平九八兑毎兩每月二分行息按月繳収其本銀十箇月一繳再聴酌借移查鹽法道據覆各商殷實請為借給隨經借給去後臣具題咨部在案兹自雍正七年九月起至八年八月止十一箇月共収得利銀三千九百六十兩又兩次出借扣存平色銀一千八百兩及将前項収存利息平扣復陸續借出又存平色銀三百二十一兩零収得息銀四百五十二兩零前後總共収得利息及平色銀六千五百三十兩零若至年底共應得利銀八千三百兩零又經臣具摺奏聞兹據該中軍稟稱查所得息銀六千五百餘兩内除陸續借出五千二百兩轉為生利外尚餘息銀一千三百兩有零又現収九十兩箇月利銀共計二千二百餘兩間貯在庫今擬於附近石瀧汛開設典舖一座三分行息不僅皇仁恵濟於營兵民間亦可得通緩急等情到臣臣隨准其開設外至賞給兵丁吉凶需用臣經擬定賞格具摺請旨如荷恩諭即令賞給計臣標毎月可収商利銀四百六十餘兩月収月賞約有餘剩亦陸續發給典舖作本至各商内如有繳還原本者亦即發給典中為本是兵賞不匱且能永久源源生息矣事關國帑臣今調任江南現候交代起行所有開設典舖情由除造冊咨部外理合具摺奏眀伏乞皇上睿鍳謹奏觀所經營處總屬不甚妥協候張溥代汝接續辦理歸於是當耳雍正九年六月十六日江南提督臣王紹緒謹奏為敬陳裁馬益兵末議以収標營實用事竊惟兵制之設貴乎因地制宜西北平原曠野馳騁衝突利在馬兵東南山水交錯登渉進攻宜於歩卒江蘇地方外近海洋内連湖澱因地制冝似應多設歩戰兵以資䇿遣提標有援應通省之責臣前任廣東時所設兵制現係馬一戰七守二今江南兵制係馬二戰一守七設馬戰兵八百零二名歩戰兵四百九十五名守兵二千五百八十六名共設馬歩戰守兵三千八百八十三名内守兵數多戰兵實少且松城濱海地氣潮濕水草瘠薄馬匹易生癀證實難餧養歴年倒斃每浮於一百八十四匹之定額况係四面水區多馬亦屬無用臣敬陳管見請将所設馬戰兵八百零二名止留馬戰兵四百名減去戰馬四百零二匹該兵改食歩戰糧所餘加餉草乾共銀六千六百一十三兩零每守兵嵗加餉銀五兩六錢五分零可改為戰兵一千一百六十八名共得馬歩戰兵二千四百六十五名尚存守兵一千四百一十八名仍符原額亦止成馬一戰五守四之營制是減無用之馬以益有用之兵一改移間額餉未増而兵自强盛實有益於防禦但裁馬四百餘匹一時驟難更張似應陸續改除如馬匹倒斃者停其購補該兵即改為歩戰兵遇有事故者即将馬戰兵缺改為歩戰名糧於守兵内拔補其陸續裁出之馬即分補通省各營倒斃之額而所裁馬價亦得歸還藩庫矣再查松江城守一營現在馬歩戰守兵制與臣標相類事同一體請亦照此改設以収實用均祈皇上飭議施行謹奏所陳裁馬益兵之議與尹繼善李衛商酌㑹疏具奏同日又奏為恭繳硃批并謝聖訓事竊臣前於廣東提督任内恭具奏事各摺奉有皇上硃批到臣一一開讀伏念臣質本庸愚屢沐天恩飭訓得有遵循感激無地惟江南為財賦重地水陸交錯臣才識短淺膺兹重寄時切不能勝任之懼幸荷皇上訓勉諄切臣自顧何人得沐隆恩造就至於此極惟有益竭犬馬之力辦理地方營伍緝私弭盗整躬率屬文武和衷以期仰副皇上訓勉至意并報髙厚之恩於萬一耳所有奉到硃批理合一併恭繳具摺奏謝伏乞皇上睿鍳謹奏聞爾在粤将蓄積寄頓省城被火焚燬所餘囊槖尚用人夫七百餘名扛擡過嶺於離任起程時屬員之所餽送概行収受云云果若是王紹緒捫心自問安乎否耶此任設仍不檢點専務巧取密藏恐終無濟也恩不可負當極加省察戒慎為要硃批諭旨卷一百二十九
