body:
  text: 欽定四庫全書硃批諭㫖巻一百八十一硃批喬于瀛奏摺雍正二年十一月初七日廣西右江道臣喬于瀛謹奏為恭謝天恩事竊臣由縣令行取陞授部郎仰䝉皇上特恩補授右江道員於雍正二年六月初四日跪聆聖訓誥誡周詳勸勉兼至又奉具摺或附李紱或附韓良輔之恩㫖又賜三月三日御製詩墨刻并香珠貂皮茶葉錠子等物當即叩頭謝恩祇領併奏明初六日起行臣遵於是日出京前赴粤西於十月初十日先至桂林府廵撫衙門恭傳皇上面授聖諭十六日抵臣駐劄之柳州府又先至提督臣韓良輔衙門恭傳皇上面授聖諭隨於本日到任受事訖臣謹遵㫖繕摺恭設香案望闕叩頭敬附提臣韓良輔處進呈奏謝伏乞皇上睿鑒謹奏知道了凡事不可越分慎之毋忽同日又奏為奏聞事竊臣於雍正二年六月初六日自京起行凡旱路所見髙下地畆仰賴我皇上洪福雨水霑足禾稼茂實臣於江西湖南二省水路經過地方沿途歴問雨水情形收成分數米糧價値據各鄉民俱稱六七兩月沛有甘霖近水之田收成約有九分上下其餘山阜之區亦俱有六七分不等每米市斗一斗有賣至七分以内者亦有賣至八分以外者其桂林府屬與臣駐劄之桞州府屬亦自六七月時沛甘霖至八月又得㣲雨綂計收成約有八分米價每市斗五六分内外不等再臣由江西湖南至粤每過地方買取食物舖户小民即問帶有雍正制錢情願以一當十隨問此間㑹否有無僉稱從未見過其懽欣欲得一見之輿情在在如同一轍臣目擊此等情形不敢壅於上聞可否特頒諭㫖飭部行令各省督撫就地所有之銅觔酌量購買鼓鑄給發舖戸兌換民間與康熙制錢撘配矣除臣右江道所轄三府一切事宜與土民苗獞情形如有應奏之處容臣查訪切實另摺具奏外所有前項各情由理合奏聞伏乞皇上睿鑒施行謹奏所奏俱悉地方諸務應詳者呈詳上司而行不得瀆奏不可借此逞挾制之私凡闗密逹之事毋露一字干係爾身禍福不輕須慎之又慎雍正三年五月十三日廣西右江道臣喬于瀛謹奏為恭謝聖恩髙厚無疆微臣感戴弗諼事竊臣䝉皇上賜發硃批臣奏摺到粤隨出郊跪迎至署恭設香案望闕叩頭密啓敬讀仰見聖主恩深教誡彌摯臣不勝感激惶悚之至臣嗣後斷不敢一事稍有越分應詳上司之事臣斷不敢越分瀆奏亦不敢借此挾制上司至於密奏之事臣䝉皇上何等隆恩斷不敢一字輕露自蹈萬死之罪又䝉御批愼之又愼之訓㫖臣嗣後愈加敬凛斷不敢一事一刻不小心謹愼致負皇上敎誡之聖恩理合恭摺奏謝臣仍就近附於提臣韓良輔處進呈伏乞睿鑒謹奏知道了朕非不令爾奏逹地方情形但務慎密為要爾本任内事既有上官不應擅專何可越分陳奏其不干爾之事無論本省隣省凡有所見所聞只管據奏以廣朕之耳目即風聞不甚的確朕亦原恕不加譴責也同日又奏為奏明事竊臣屬桞州慶遠思恩三府民止什分二三半係土著半係流寓猺獞狑狪狼苗獠蠻各種之人居其七八凡有具控官司之事非稱礮火刦殺即稱黑夜燒擄皆因積有讐隙臣屬所謂盗賊諸如此等情事為多若必繩以法律恃險抗拒差莫能拘勢必動兵未免騷擾殊非地方之福臣價倉斗每石銀五錢内外不等冬春至今約畧相同又入春至今雨水調勻田疇優渥民俱樂業預慶有秋合併奏聞伏乞皇上睿鑒謹奏所奏四摺一摺留中矣雍正三年十一月十四日廣西右江道臣喬于瀛謹奏為奏明事竊臣於本年七月起至九月遵照撫臣李紱檄委盤查桞州慶逺思恩三府屬各州縣倉榖所歴程途千有餘里經過村莊煙户稍多之處無論民猺以及堡目團練鄉勇村老必傳集當面宣揚皇上愛養之聖德靡不歡忻忭舞俱稱願作好人嗣後總不為匪犯法臣既目覩此等情形不敢壅於上聞再臣凡有關係地方民生之事應詳督撫者臣即備具情由詳請酌奪所有臣奉到硃批奏摺臣俱封固親齎赴省交與撫臣李紱轉奏外此次奏摺仍就近附於提臣韓良輔處進呈御覽謹奏知道了勉力循分盡職莫務奔競同日又奏為土民之禮義非讀書莫啓請立土官勸懲令民一體力學應試以廣皇仁以隆文教事竊臣查粤西土府州縣土民禮義鮮知不通文理總由土官平日願其愚不樂其智竝不令民多讀書稍通文理誠咎不在民而在於土官也臣愚請嗣後土府州縣土民子弟俱責土官實心令之力學如五年以内即有童生應試者該土官錄送由府轉送學臣考試十人之中量取一名其新進童生除土屬建有學宫設有教職之處即歸本學外其餘俱先附該管之府府學俟人文漸盛照地方大小酌定名數建設學校另選教職至於初次新進童生一名及初次中式舉人一名進士一名者將該土官分别議叙示勸如五年以外竝無童生應試十年以外仍無童生應試者將該土官分别議降示懲俟有童生應試進取之日分别開復如此則土官咸惕於勸懲而民皆得沐浴於詩書人人知有禮義矣臣為土屬人心風俗起見不揣冒昧恭摺密奏是否有當伏乞皇上睿鑒施行謹奏此事應與爾該督撫商酌直據所見而言勿云㑹經奏過同日又奏為奏聞事竊臣屬桞慶思三府屬各州縣併新奉改之直隸賓州所屬各縣地方今嵗髙下地畝早晚禾稻收成實在有六七八分至九分十分不等惟桞州府屬之象州因七月間大雨田疇微有被淹之處收成稍歉實止五分其現在三府一州所屬地方新榖每倉斗一石價銀二錢三四分至二錢七八分不等紅白糙熟各色新米每石價銀五錢至六錢内外不等又查各屬棉花收成亦有五六七八分不等至於早禾收割復栽蕎麥豆子亦俱有收所有臣屬今歲地方收成仰賴皇上洪福民食民衣兩俱有藉即象州收成稍歉而地處近水船運徃來貿易米榖價平民間亦不致有困苦理合一倂奏聞謹奏覽所奏收成分數米糧價值知道了百凡總宜據實直陳毋稍粉飾雍正四年五月十六日廣西右江道臣喬于瀛謹奏為遵㫖商酌事竊臣前恭摺密奏請立土官勸懲令民一體力學應試以廣皇仁一摺奉到皇上硃批諭㫖臣即遵㫖與督撫兩臣商酌竝不敢聲言奏過情由督撫兩臣俱令臣詳到核奪臣於本年三月二十五日備文分詳督撫聽候核奪訖所有臣遵㫖商酌情由擬合據實奏明謹奏㸔汝光景不似不聲言人也同日又奏為奏明事竊臣准布政司臣黄叔琬照㑹遵照撫臣汪漋批委臣監收潯州厰税臣隨自桞州起程赴潯於本年四月二十日接管任事所有應抽貨稅俱照原定稅例竝從前各經管酌減分數公平抽收斷不敢苦累商民致負我皇上恤商愛民之聖恩至於每月抽收税銀務俱儘收儘解斷不敢茍且營私自干罪戾統俟毎月收有成數臣當逐一㨿實密奏擬合奏明伏乞皇上睿鑒施行謹奏於具奏不敢營私之時業既營私矣爾之聲名不好亟宜小心硃批諭㫖巻一百八十一
