body:
  text: 欽定四庫全書硃批諭旨巻一百四十一硃批慶元奏摺額外御史監督淮安關稅務臣慶元謹奏爲據實陳明仰祈天鑒事竊臣䝉皇上天恩特命管理淮安關務加銜久任兩次陛辭䝉寵賜上珍兼賞盤費聖恩稠疊萬難圖報惟有潔已奉公通商裕課庶幾少副皇上任使至意聞淮關連年虧缺經管河漕諸臣節次推諉訪求其故則知淮關徵稅以豆麥棗棉等件爲重皆自北至南如北省大熟販運接踵九十月間日收之數比常數倍一年之計惟此是賴是以前任河臣趙世顯加額歸併初年徵足之外尚有贏餘其後北省連歳歉收商販巳少而關口搜索特嚴商旅畏避從間道繞越比年額課益虧職此之故臣自到任後恪遵聖諭革去冊書勤加查驗放行招徠商旅節省浮費斷不敢少事奢靡及爲分毫私蓄之計冀於正賦不無少補惟是東豫兩省屬久荒之後今歳雖稱有秋而民間元氣初復販運者少是以北貨甚稀又聞蘇常等處河路淤淺舟楫難行南販亦復寥寥臣於八月間到淮迄今巳逾四旬實止收銀二萬此歳歳豐收臣益加謹毖庶不負聖慈鑒原謹奏知道了額外御史監督淮安關稅務臣慶元謹奏爲遵旨查覆事竊臣奉聖諭查趙世顯帶管淮關侵蝕隱瞞實數臣於到任後向節年經管書吏追取徵收底冊核算按冊開趙世顯自康熙五十八年六月兼管起至六十年六月止共徵收銀一百一十七萬八千九百八十四兩八錢零共解過正浮羨餘銀七十六萬五千三百九兩四錢零共餘銀四十一萬三千六百七十五兩三錢零自六十年六月起至六十一年正月離任止共八箇月二十二日應徵額銀二十五萬五千五百八十三兩六錢零按冊收過銀二十二萬三千七百九十九兩五錢零實缺額銀三萬一千七百八十四兩零内實解過銀八萬二千五百九十兩六錢零查有批迴可據其餘那移未解之項巳屬侵蝕現經部議將趙世顯第三年所欠銀兩著落追賠并管關同知分賠之處容另疏具覆外今臣據冊查出前兩年隱瞞銀四十一萬三千六百七十五兩三錢零趙世顯身爲大臣其歸併稅務又係自行題請所有贏餘理應悉輸公帑方不負任用之意乃於多徵者恣意隱瞞於缺額者又不將餘銀賠補罔利負恩莫此爲甚臣奉旨查察不敢一毫徇隱所有據底冊查出之數相應據實奏聞謹奏此事爾㑹同查弼納察議具奏額外御史監督淮安關稅務臣慶元謹奏爲恭繳御批并報初季徵解實數事竊臣前奏查覆趙世顯隱瞞關稅一摺奉御批此事會同查弼納察議具奏欽此巳移咨督臣酌議另覆所有奉到御批原摺理合恭繳至臣到任迄今十一月十八日爲一季按額扣算應徵額銀八萬八千一百二十一兩零今實徵正浮耗銀七萬四千五百六十兩零實缺銀一萬三千五百六十兩零此缺額之内尚有折夫銀一千二百餘兩應州縣分徵彚解臣現在嚴檄催徵至於季發關役工食日用等項向於此内支給臣念公賦未充何敢遽恤其私百凡務從撙節未敢擅用分毫今分別款項盡行解發訖臣思課額之盈虧固視年歳之豐耗而裕課之道惟在通商因前河臣帶管以來需索過甚致商人漸漸畏避臣受事之後惟於勢豪無所假借雖供運御用船隻亦未敢聽其夾帶貨物此外肩挑零販從寛弛貸客商輸鈔並無苛索臣不時濳行察訪巡瞭人役遇有勒索立卽責治仍出示曉諭冀使商旅爭赴而板閘一關與宿遷揚州由閘相望六百里間尤賴同心共濟若一關稍苛則三關皆受其累目今三處俱隸督撫其遴委管理之員諒能顧惜官箴宣揚皇上恤商便民之德意臣疊䝉聖訓惟益加勉勵以圖後效耳謹奏勉圖後效之見甚好但盡心料理朕自能鑒照勿慮朕不汝信也額外御史監督淮安關稅務臣慶元謹奏爲奏聞事竊惟漕艘回空關係新運向來途次稽滯司漕諸臣雖加意催趲而尾後數幫不免於八閘守候直俟東風凍解方得南行今年河道通流船隻陸續抵關臣不分晝夜立時騐放巳於十二月十七日盡行過關訖臣因事關漕務恐上厪聖懷合行奏聞謹奏覽奏漕船盡數過關深爲慰悅額外御史監督淮安關稅務臣慶元謹奏爲遵旨議覆仰候睿裁事該臣等奉旨會同查議前任河臣趙世顯隱瞞關稅一案臣等議得趙世顯兼管淮關二年八箇月零二十二日覆查日收底冊前二年内除解過額課浮羨贏餘銀兩外共餘銀四十一萬三千六百七十五兩三錢零第三年八箇月零二十二日額該徵銀二十五萬五千五百八十三兩六錢零實徵過正浮耗銀二十二萬三千七百九十九兩五錢零止缺額銀三萬一千七百八十四兩零據趙世顯在部供稱缺額銀九萬九千六百九十七兩七錢零内係捏報缺額六萬七千九百一十三兩六錢零查此項捏報缺額銀兩與伊那移銀兩共十八萬八千六百四兩零現在部議著落趙世顯家産并伊子孫勒限嚴追在案其前兩年所隱瞞之餘銀四十一萬三千六百七十餘兩不據實報解情殊可惡臣等遵旨會查按冊細核絲毫無枉不能爲趙世顯寛也再查趙世顯淮關費用總計三年内各院司道地方官交際規禮并解餉解冊使費盤費及解船政㕔加平色銀心紅紙劄各口岸及衙門書役工食又犒賞催漕防汛兵目捐給孤貧設立義學墊解各州縣折夫關署各廟每月牙祭行香添換執事銀鞘橋船各費以上共銀十三萬四千一百二十五兩卽在四十一萬餘兩之中用去尚該餘銀二十七萬九千五百五十兩三錢零臣等竊思趙世顯身爲大臣理應革除陋弊諸凡節省而倍加侈靡負恩巳極雖云淮關相沿舊例卽或有可原情之處臣等絶不能代爲開除其多收銀兩應請敕部嚴追充餉或得於相沿常費之内量賜寛典出自聖恩非臣等所敢擅便者也合先具摺奏聞應否另具題疏伏乞皇上御批施行謹奏其用去之十三萬餘兩旣係相沿常費將此項開除具本題奏額外御史監督淮安關稅務臣慶元謹奏爲恭報次季徵解實數事竊臣仰荷天恩委司關務其第一季徵解缺額情由業經具摺并另疏奏聞訖今自上年十一月十九日起至本年二月十八日止又滿第二季按額扣算應徵額銀八萬八千一百二十一兩零今實徵過正浮耗銀共六萬三千九百五十一兩零併各州縣未經完解折夫銀兩共缺額銀二萬四千一百七十兩有竒巳分別款項解發訖臣訪聞淮關舊例每當九十月十一月之交時屆秋成商販湊集賦稅充盈恒倍他季惟十二月至正月漕艘擁擠兼遇河凍冰合商販稀少稅額倍虧向來監督每將前數月之有餘以補後數月之不足尚有贏餘乃臣受事之始正値秋成之候偶因鄰省薄收稅竟缺額第二季雖當歷來缺額之時商販往來第畧減於初季而稅額不至大虧惟目下南北貨船俱因河水淺阻未得通行所以商販甚稀前二月二十一淮屬地方甘霖大沛入土五寸有餘又於本月初一日夜雨逹旦比前入土尤深且聞大江南北俱於二月中旬以來遠近得雨二麥浡興豐登巳兆卽今河水漸增將見漕濟商通年豐貨集臣仰體皇上寛商恤民之大德竭力招徠多方撙節庻幾稅充課裕將贏補絀或不負皇上格外栽培之至意耳除恭疏題報外理合具摺奏聞謹奏知道了此番時雨七省同日普霑乃從來春季難遇之事朕不勝欣幸至於稅務爾放心料理諒爾斷不欺隱於朕也縱少有欠缺朕自然原恕何必爲此憂慮況各關累年以來增添似覺過多朕爲此正在留意額外御史監督淮安關稅務臣慶元謹奏爲恭請叩覲天顔仰祈聖鑒事竊臣自雍正元年七月二十六日陛辭赴任以來巳經半載有餘依戀愚誠至忘寢食且關𣙜情形猶有非摺奏所能盡逹者若得叩覲天顏跪領聖訓臣幸有所遵循庶免將來隕越況目下三四月間漕船擁擠商船稀少臣乘此𣙜務稍閒之時星馳赴京往返亦不過四十餘日其關梁啓閉錢糧收納謹委的當家人付臣私押鈐記小心料理仍飭淮安稅課司員每日臨關查驗自當無誤仰祈皇上俯鑒微忱使臣得遂犬馬戀主之誠臣不勝踴躍感戴之至爲此謹奏明歳來京可也爾甫到任受事未幾地方情形并關稅事宜尚未必周詳僃悉於次年來爲是額外御史監督淮安關稅務臣慶元謹奏爲季報徵解實數并恭繳御批事竊臣自本年二月十九日起至閏四月十八日止滿第三季按額扣算該徵額銀八萬八千一百二十一兩零今實徵過正浮耗銀共八萬一千四百八十兩零併各州縣未經完解折夫銀兩共缺額銀六千六百四十兩零臣合算三季共收銀二十一萬九千九百九十一兩零除第三季正額外共缺加添浮羨銀四萬四千三百七十二兩零除另疏題報外合行具摺奏聞臣查今年春雨應期淮屬二麥豐登聞東豫兩省亦較近嵗倍獲收成且大江南北於閏四月十五六兩日遠近得雨又聞寶應縣以南常州府以北近生蝗蝻地方官現在撲捕幸二麥巳收禾苖未長諒不至爲災若再得大雨則蝗種可以盡除矣再各省重運俱於閏四月初六日盡行過關訖又太常寺少卿臣于廣奉旨在湖廣採米十萬餘石於前四月二十九日悉巳過關臣職司驗放相應附奏所有從前奉到御批奏摺一併恭繳謹奏覽奏深慰朕懷今嵗麥收光景及現今雨水情形天下大槪相同朕惟以手加額感天地之垂佑并聖祖在天之靈之慈䕃耳慶喜之衷非可言喻額外御史監督淮安關稅務臣慶元謹奏爲仰體皇上宣揚聖德事竊雍正二年閏四月二十一日接到部劄内開欽奉恩詔酌議事理將各鈔關加添贏餘銀兩盡行裁去每年應徵額稅銀兩自河臣趙世顯管關任内加增浮費羨餘銀十五萬兩并贏餘銀三萬兩俱爲定例遂將日收印冊之内於正項外另加浮費名色以充正供且又加浮費之耗所以稅額滋繁商民滋累今䝉皇上湛恩汪濊澤及梯航特命將各關加添贏餘銀兩盡行裁去臣欽承恩命仰體皇上愛商恤民至意隨卽恪遵諭旨於本月二十二日遍示通衢曉諭商民自本日爲始將前河臣所加浮費一項并浮費之耗盡行革除并鈔粘部劄宣揚聖德遠近商民無不踴躍歡忭謳吟感激除另疏恭謝天恩外所有遵旨減除浮費浮耗情由理合具摺奏聞謹奏覽奏知道了此事應如是施行額外御史監督淮安關稅務臣慶元謹奏爲牙稅之盈缺不齊折夫之捐賠有例謹請永遠代輸以濟工需以甦窮戸事竊臣查淸江厰項下折夫錢糧歳額五千五兩有竒訪係明季時客商南北往來俱於高家堰過壩凡車船騾馬等牙行列聚堰旁每歳捐貲募夫助修堰堤名曰折夫後壩開道通牙行星散錢糧無著因散派淮屬城鄉鎭集零星牙儈輸納此項錢糧由淮關徵解河庫遂爲成例但牙行開閉無定非地丁錢糧可比其間逃亡者有勾補頂充之擾現存者有抑勒分賠之累自前河臣靳輔以河銀關係歳修急需等事題明准部議覆嗣後將該司應解河道項下錢糧務於額徵別項稅銀内照額解足不得缺欠等因遵奉在案從此折夫錢糧稍有欠缺厯任監督俱將別項溢收銀兩墊解後於康熙三十七年前河臣董訥咨部歸併地方官徵解三十八年及四十一二兩年監督馬爾漢查林布納言三任内山陽縣共欠解折夫銀六千一百二十兩零題作民欠歷任帶徵毫釐未完至四十六年部議將督催各官照例處分仍無完解五十年監督窪哈理咨准將前三任欠項分作十年監督代賠方得完結臣自到任後厯查此項墊補情由不但相沿巳久且實無戸可徵因恐有誤工需除各州縣衞所解到現存牙稅銀共一千七百五十二兩有零外其餘循例照額完解伏查折夫一項内有淸江浦無名牙儈銀六百一兩零向屬監督墊解外海州淸河縣安東縣宿遷縣大河衞鹽引所等處共額銀一百一十四兩零厯年無缺山陽縣厯年報缺逃亡銀二千六百五十二兩零止解銀一千六百三十八兩零是原額五千五兩有竒而厯任之墊賠至三千二百五十餘兩其現解之一千七百五十餘兩凡州縣衞所之徵比巳經六七衙門而城鄉鎭集之追呼何止百千窮戸在當年稅額浩繁之時其三千二百餘兩尚且厯任墊賠以濟工需況今恩免贏餘之後此一千七百餘兩何難一併補苴以甦窮戸伏乞皇上俯准臣請自雍正二年八月爲始將前項折夫原額五千五兩零每年盡歸淮關墊解不得缺欠致誤工需其各州縣衞所歳徵散行牙儈折夫錢糧盡行蠲免並請敕諭督撫會同微臣通行淮屬勒石曉諭嚴禁重徵永遠欽遵則河工不致遲誤於歳修而窮牙均沾聖澤於萬世矣爲此具摺奏聞應否另具題疏伏候皇上批示施行謹奏大凡錢糧減之蠲之最易增之則難逋欠之項雖百萬數十萬俱可豁免額徵之項卽數千數百亦輕易裁汰不得近日朕雖特免各關加添贏餘仍令各監督將贏餘據實奏報不過寛其缺額之處分耳今據奏請將折夫一項錢糧永遠代輸諒贏餘之外無可墊解殊未思贏餘卽係公中錢糧也當日窪哈理之咨准代賠亦如殷逹禮之題請長蘆二萬兩帶銷相仿外觀雖似公當其實巧取私利爾此舉固屬善政但恐後來監督未免借爲口實朕意若果欲行此一事何必令監督代輸竟不如增入該關正項額徵則錢糧旣不虧數而正額加之有名將來監督亦無可借口如此還可若照所奏將歷來額徵裁去而令監督以贏餘賠補是將正項錢糧化作虛徵將公項羡餘算作監督效力於錢糧毫無益處反暗中銷爲烏有矣反覆看來折夫一項應增入淮關正額爲是具題聽候部議可也額外御史監督淮安關稅務臣慶元謹奏爲仰遵聖訓再行奏明事本年九月初九日奉到御批臣所奏折夫錢糧摺子伏䝉皇上敎誨諄切周詳臣跪讀之下不勝感戴伏查折夫一項原係淮關正額錢糧向因有司厯報缺額三千二百五十餘兩厯任監督恐誤奏銷每將羨餘暗中補墊冀免㕘罰但羨餘之多寡均應報解若暗中墊去是折夫之額雖充而羨餘巳不盡屬報解之項矣更有巧爲脫卸之計開作民欠則折夫明虧正額而羨餘暗飽私槖且以經徵不力委罪有司又以督催處分卸罪後任遞相推卸錢糧終無歸著此當年窪哈理所以有十年均賠之議也至撫臣吳存禮管關時所有折夫原額五千五兩之數巳經盡免徵解臣思正供錢糧未便私免仍令各州縣開徵一年之内止解銀一千七百五十餘兩其三千二百五十餘兩據報實係厯年缺額無戸可徵所以臣請將缺額之三千二百五十餘兩明使監督照額完解則正額之數依然不虧羨餘之銀可歸公帑而蠲免之實亦彰明較著矣但臣識見淺陋以爲缺額之三千二百五十餘兩旣屬監督墊補則現徵之一千七百五十餘兩似不必更令有司徵解致滋煩擾故懇請一倂蠲免總歸正額完解使奏銷得以畫一今奉聖訓誠千古不易之名言實非愚臣所能見及惟是臣荷皇上格外寵遇若有羨餘不據實奏明則欺天之罪又何能逭即暗行墊補不行奏明亦爲欺隱上負洪恩今臣仍將舊缺之三千二百五十餘兩循例完解至其餘一千七百五十餘兩現有著落臣仰體聖意知逋欠之項雖多可免額徵之項雖少難蠲今現有之項自不容裁仍令地方官照數徵解如是則折夫之名仍然不廢而正額既不致有缺羨餘亦不致暗虧臣幸得逭欺隱之罪矣爲此繕摺覆奏并請天恩免臣另具題疏致煩部議伏祈皇上批示遵行謹奏此事爾讀朕諭究未透徹來京面朕再定可也爾當於十一月之十五前後起程赴京陛見印務可交與知府祖秉圭暫行管理額外御史監督淮安關稅務臣慶元謹奏爲叩謝天恩事竊臣於上年十二月初八日跪請聖安伏承天顔和藹聖訓周詳臣仰瞻之下懽忭靡涯復䝉恩賞稠疊有加無巳感戴私衷鏤心刻骨臣自正月初三日陛辭初四日就道於十九日巳抵關署業經恭疏奏謝所有欽奉聖諭應行事件臣現在次第遵行另疏奏聞臣自出京南行沿途地方俱仰賴皇上福德照臨比年豐稔去冬雨雪應期即今正月十七日經過郯城宿遷又俱得雨霑足二麥靑葱大有預慶合倂奏聞謹奏都畿一帶雨雪亦甚透足誠可爲稱慶者額外御史監督淮安關稅務臣慶元謹奏爲恭報次季錢糧徵解實數事竊臣䝉皇上天恩命管理淮關其第二年第一季徵解實數并贏餘銀兩俱經奏明在案臣自雍正二年十月十九日至十一月二十一日計管稅務一箇月零三日即遵旨起程陛見將印務暫交淮安府知府祖秉圭管理祖秉圭自十一月二十二日接管起至雍正三年正月十八日卸事止計一箇月零二十七日合臣前所管一箇月零三日巳滿第二季查臣前管之一箇月零三日共收過正耗銀十一萬三千二百三十兩零内除應解作正額并儘收儘解等項共銀一萬八千五百七十三兩有零外實餘銀九萬四千六百五十七兩零連前第一季共餘銀十六萬三百五十六兩零亦經奏明在案知府祖秉圭接管一箇月零二十七日共收過正耗銀四萬九千九百四十四兩零内除應解作正額并儘收儘解等項共銀三萬二千一百五十四兩有零外實餘銀一萬七千七百九十兩零合臣所餘之數共餘銀十七萬八千一百四十六兩零俱存貯在庫俟年滿彚解田疇霑足即河道亦俱寛深合併附奏都中於正月内亦得透足雨雪洵爲可喜之至光祿寺少卿監督淮安關稅務臣慶元謹奏爲恭報第三季錢糧徵解實數事臣自雍正三年正月十九日回任之日起至四月十八日止巳滿第三季按額扣算計該額銀五萬二百九十五兩九錢零又儘收儘解銀四百九十二兩三錢零共該銀五萬七百八十八兩二錢零今實徵收正稅火耗銀共十五萬四千八百七十二兩六錢零除分別款項照額解給外尚餘銀十萬四千八十四兩四錢零合前兩季共餘銀二十八萬二千二百三十兩四錢零俱封貯在庫俟年滿彚解相應據今淮安地方亦俱雨暘時若又各省糧船陸續過關者巳五千二百三十七隻惟湖南尚有兩幫未聞謹奏聞爾待人過嚴在爾雖係秉公在人未免怨憾不知爾亦曾有所聞否光祿寺少卿監督淮安關稅務臣慶元謹奏爲恭謝天恩事臣齎摺人回奉到皇上恩賜辟暑金丹一匣臣恭設香案叩頭謝恩祗受訖伏奉御批訓臣以待人過嚴致人怨憾臣跪讀之下反覆循省感激涕零伏念臣一介庸愚荷䝉天恩委司𣙜務自任事以來夙夜兢兢務期商通課裕藉報隆恩於萬一惟是淮關地當孔道稍不如意則易於滋怨久在皇上洞鑒之中兹䝉聖諭不啻耳提面命使臣得以朝夕警覺庶不負皇上訓誨至意第恐任事日久或致滋怨日深統祈皇上曲賜憐憫終始矜全則臣生生世世感戴聖主生成之大德於靡涯矣爲此具摺恭謝天恩謹奏知道了終始矜全四字不但於爾云然即凡一切人朕無不如此存心相待但須爾等亦自能保全始終方好譬如隆科多係朕不始終矜全之耶是伊自不保全始終耶再如曲賜憐憫一語更爲非理之談豈有一味徇私之天子乎總要爾等爲人臣者恪秉公誠勿見小而失大以自貽伊戚假若己原無過橫被誣枉朕可保其斷然不妨倘自爲不善而欲仗朕曲賜憐憫以終始矜全之愼莫虛作此想萬萬不能也光祿寺少卿監督淮安關稅務臣慶元謹奏爲恭謝聖訓并瀝陳下情事本年七月二十二日接奉御批伏䝉皇上訓誨臣跪讀之下慚悚無地臣䝉皇上天恩至深至重苟有人心皆當知感臣非草木寜不自勵伏念臣前摺所陳實因錢糧重地不敢久處奉命三年今經兩載所收稅額巳可約計乘此可以上邀天恩使臣入覲天顏朝夕侍從一以免將來之隕越一以不負皇上委用之隆恩乃下情惶恐詞不逹意冒昧之罪復何容逭今䝉聖訓惟有銘心鏤骨服膺遵守以期勉盡職業何敢更萌私念上負皇恩自干罪戾臣謹瀝陳下情仰祈天鑒倘䝉皇上俯念愚誠賜臣入覲俾得親聆聖訓臣不勝感激惶悚之至謹奏惟以秉心奉公所行得中爲要即日在朕之左右亦不過以此二語訓諭耳勉爲之光祿寺少卿監督淮安關稅務臣慶元謹奏爲恭報第二季徵解實數事竊臣䝉皇上天恩委司淮關第三年分内第一季徵解實數業經奏明在案今自雍正三年十月十九日起至四年正月十八日止巳滿第二季共徵收過正耗銀八萬九千七百一十六兩二錢零内除一季額銀五萬二百九十五兩九錢零併儘收儘解銀三百八十二兩三錢零俱分別款項照額解給外尚餘銀三萬九千三十七兩五錢零合前一季餘銀之數共餘銀九萬五千四百四十三兩四錢零臣俱封貯庫内俟一年期滿彚解除恭䟽題報外理合據實奏聞再淮屬地方於正月十二三四五六連日瑞雪應期二麥巳屬有望豐登之兆於此可見現今漕船擁擠所以商販寥寥將來河路漸寛運販自當接踵而至臣仰賴皇上福庇倘得稅充課裕則瓜期在邇庶免有所隕越或不負皇上格外栽培之至意謹奏知道了謹愼和平爲之百凡處不可自恃更勿縱性硃批諭㫖巻一百四十一
