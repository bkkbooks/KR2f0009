body:
  text: 欽定四庫全書硃批諭㫖巻九十七硃批路振揚奏摺雍正四年六月十五日陜西固原提督臣路振揚謹奏竊念微臣以不學無知之庸材逢聰明睿智之聖主殊恩異數浹髓淪肌雖經恭疏奏謝但犬馬感激之心未盡萬一下情恒懐蘊結自問何人得飽自揣分何敢當此惟仰體聖主教育之心日夕兢業務求内外如一始終不二臣年六十三嵗末路晚節得少過愆實為萬幸理合再為披瀝奏陳伏乞睿鑒謹奏此係密奏猶可若向外傳説徒令人笑汝之粗鄙無識同日又奏為奏明臣標應補盔甲仰懇聖恩賞撥正項錢糧以資補造事竊臣查得固原提標五營鎗礮旗幟鑼鍋帳房等物俱堪應用惟馬戰兵二千九百九十名原存鐵盔甲步兵一千名原存棉盔甲因歴年出征巴里坤西藏各處其中致有損壊臣到固原隨經逐細親加驗看馬步兵鐵棉盔甲其中破損不堪披戴者有一千二百一十七頂副當經行令五營將僃千把將需用銀兩數目分别確估去後今據該將僃等公同確估呈報到臣據稱補造前項破損鐵棉盔甲共計需銀二千六百六十一兩零除行查臣屬各協營路所存盔甲什物有無傷損缺額之處俟呈報到日另奏外所有臣標應補盔甲需用銀兩查公費一項實難兼濟理合詳細奏明仰懇皇上天恩俯准賞給正項錢糧承領修製庶軍實有資軍容益壯矣為此謹奏在爾止據固原一標而言固屬無幾天下之大營伍之衆若槩動正項補造則所費不貲矣向來成例皆係營中公糧料理之事率因將弁將此等餘糧肥巳所以廢弛至此爾應權宜措置為是乃奏請賞給正項製造大錯矣幸是具摺密奏馮傑即因類此具題不合致罹降革爾豈不間乎此項盔甲自當動用拴養馬駝餘剩銀糧製辦抑或暫動幾分公糧限年徐徐完補與岳鍾琪密相商酌而行戎政究以操演選練鼓勵振作為要如果闔標營兵丁各各得人材力壯健技勇超羣即使赤身執梃可以撻堅甲利兵而有餘朕非謂盔甲可以廢缺但專致飾於此而反置訓練於不講則非也同日又奏為恭謝天恩事竊臣於雍正四年六月十四日接臣兄路振聲家信恭録謝恩奏摺所奉硃批諭㫖知道了汝弟路振揚堪以大用之材可惜朕用遲了欽此錄齎到臣隨恭設香案望闕叩頭謝恩訖伏念臣本不學武夫欣逢聖主知遇之隆逾格過分實古今所未有臣自顧何材能堪大用荷䝉聖恩褒勉警惕益深犬馬下情面奏尚不能盡摺奏又何能陳其萬一耶謹將臣感激之私恭繕奏摺叩謝天恩謹奏朕有㫖一切密諭非奉㫖通知不許傳告一人今路振聲公然將朕批諭鈔錄宣示於爾甚屬不合朕已另諭申飭可見爾等武夫粗率不達事體也同日又奏為奏明公費名糧數目事竊臣查得固原提標五營從前原有公費馬糧一百二十名以備製買火藥鉛彈并每季領餉脚價盤費及修補一應軍裝等項之用經前提臣馬煥准督臣岳鍾琪咨文改為步糧一百二十名臣於今嵗五月十一日到任隨據署中軍遊擊開報公費步糧一百二十名季領銀五百一二十兩不等除將領到雍正四年夏季公費銀兩盡數用完外尚不敷銀一百四十九兩零在於拴養馬駝餘剰料草銀内借用應於秋季公費銀内還項等情據此臣謹將臣標留存公費名糧數目繕摺奏明伏祈皇上睿鑒謹奏此等事爾應照常料理期合於公當而巳何必如此煩瀆同日又奏為敬陳愚見仰請睿裁事竊惟國家設禄養廉立法懲貪恩則至厚法則至嚴而貪黷之弊乃猶未能盡除查例載凡有以財行求及説事過錢者審實皆計所與之贓與受財人同科是皆有應得之罪也又查名例自首條内凡犯罪未發而自首者免其罪猶徵正贓是自首者罪雖免而贓仍追也此固垂世之常經然必使之敗露得其實據而後得以罪之也竊思此等營私之徒彼此容𨼆其事不易敗露即或有人告發猶必互相掩飾臣愚請倣假冒軍功并官員在京借債過二千兩之定例開其自首之路凡上司保題之所屬官員并大計軍政卓異薦舉人員若屬員以財行求而上司受其贓私巳經染指彼此皆應治罪如受者於事後能據實盡首則免追原贓并應得之罪止罪與者及説事過錢之人如與者於事後能據實自首則照原贓倍追給主免其應得之罪止罪受者及説事過錢之人若説事過錢之人能據實盡首除免贓給賞例内分别巳詳外亦免其應得之罪止罪與受之人如此則彼此皆存顧慮之心恐為所賣未事則畏懼不敢為既事則爭首惟恐後是或除貪之一法也是否有當伏祈睿鑒謹奏向聞路振揚居官操守甚好今覽此奏非一塵不染之人不敢具此摺也甚屬可嘉發交該部議行并將路振揚議叙具奏雍正四年八月十九日陜西固原提督臣路振揚謹奏竊臣齎摺家人捧到硃批諭㫖臣密開跪讀隨望闕叩頭謝恩伏念臣不學武夫知識淺陋不達事體罪戾多端䝉皇上天恩不即處分上煩聖心詳加批示俾臣愚昧得以知過思改臣欽遵之下感激惶悚無地自容惟有凛遵聖訓凡事周詳慎審循分供職以期仰答聖主優容之恩於萬一耳理合恭摺陳明謹奏此等知識短淺之過朕自然寛恕加之教訓但須知過必改方不有負朕恩凡為大臣者慎密二字最為要緊君不密則失臣臣不密則失身可不畏乎勉之慎之雍正五年閏三月二十一日陜西固原提督臣路振揚謹奏為戰守均賴礮位數少不敷應用敬陳管見仰祈睿鑒事竊臣查礮位闗係重大經議政議奏一千兵内設立子母礮六位威遠礮四位奉㫖通行欽遵在案臣愚以為各處營制大小不同額設兵數多寡不一且邊海腹裏地方形勢各别似不便一槩按照兵數額設礮位如臣所屬固原鎮標協營路統計二十九處除標下五營及慶陽靖遠西鳯潼闗四協原設兵數或八九百名五六百名不等外其餘駐劄㕘遊守千把等官之二十營額兵數目多者不過三四百名少者則一二百名至小營分或止六七十名四五十名不等凡此大小營汛無事守護城垣有事調遣行走皆惟礮位是賴今議設立礮位以兵數一千名額定子母礮六位威遠礮四位臣以此定數計算每營額兵必數足百名者方可設礮一位如駐劄㕘遊守大營兵數三四百名一二百名者止應設礮三四位一二位以之守護城垣猶為未足設有調遣行走之處緩急不敷需用其千把專城兵數不足百名者并不應設礮一位是守城行走皆無所恃矣臣謂不按營汛大小不分地方形勢而統以兵數一千額定子母礮六位威逺礮四位似乎額數太少不足應用臣仰荷天恩謬任封疆愚見所及不敢不據實陳奏伏乞睿鑒謹奏子母礮位現在交部察議據爾奏稱額設礮位數少不敷應用似乎近理候發議政王大臣一併詳議具奏朕再為酌定雍正五年六月十五日陜西固原提督臣路振揚謹奏為奏聞事竊臣於去年五月間到任查㸃臣標五營馬步兵丁鐵棉盔甲内有破損缺額應行添修因公費不敷奏懇皇上賞賜正項錢糧修製䝉硃批諭㫖詳悉指示臣欽遵動用拴養馬駝餘剩銀兩委員照數製造今巳添補足額共費過銀二千四百八十四兩零至於臣屬各協營路缺額盔甲等物經臣查明隨即飭令該營官弁陸續以公費修補務期齊全事涉瑣碎不敢煩瀆天聽所有臣標修整過盔甲及動用過銀兩數目理合恭摺陳明謹奏操練技勇申明紀律較製辦器械為要訓誨兵丁令知尊君親上致身報國明曉大義學做好人為更要凡事當務根本不可逐末惟循真實毋務巧詐此等隨宜措置之事何必瑣瑣瀆奏雍正五年七月二十四日陜西固原提督臣路振揚謹奏為據實陳奏雨雹情形事雍正五年七月二十三日臣接閲邸抄知護理甘撫印務臣鍾保奏報固原州暴雨聚水縁由奉㫖該部速議具奏臣不知鍾保疏内如何陳奏但既奉諭㫖著部臣速議仰見聖明軫念倍切痌瘝臣查固原州於本年五月二十四日天降大雨帶有冰雹州城東南地勢低下臨河不逺河水泛漲直衝城下將城墻包磚剝落數丈城内地高北闗地卑城中雨水流聚北闗最低之處約有二三尺浸塌兵民房屋二百五十餘間田禾雖被冰雹零星打傷亦不成災見今夏田收穫糧價較前更賤秋禾發生茂盛至於浸塌兵房臣巳酌動營中公項每兵借銀三四兩令其急為修補其城工費用所需不過二三百兩臣率同文武官弁捐輸銀兩委員修理七月盡即可修補完固地方兵民並無被水不安之處理合據實陳明仰紓我皇上軫念民生之至意為此繕摺謹奏覽奏固原聚水情形愛君之誠於此可見朕甚嘉悦雍正七年二月初六日兵部尚書暫理陜西固原提督印務臣路振揚謹奏為奏聞事雍正七年二月初一日臣據八營守備秦信呈報據楊建堡原任提督馬煥家人馬成宗首狀為首報拏獲狂言招搖棍徒事正月二十八日家主染病在家忽有棍徒騎騾到門口稱要會家主因伊出言無狀形跡可疑只得抱病相見伊口稱他叔父在省打發他到各處傳言勸化人不必賭博勿要閒言伊執出貼金紅紬番字言他叔係伺候十四王之人成宗家主一聞此人狂言必在各鄉招揺不得不羈留拏獲特為首報等情據此即差兵拏獲棍徒并紅紬貼金番字傳箭一枝硃筆紙單一張到營卑職訊問據伊供稱小的名呌馬忠小的叔子呌馬倉他在西安府與小的紅紬番字一幅硃筆紙單一張著説與固原一路掌教知道若我們回回大兵過處不必驚慌小的到楊建堡説與馬大老爺就將小的拘拏等情據此卑職即具文移送固原州嚴審確供外擬合報明等情到臣臣隨劄行固原州嚴加審問去後兹據固原州知州朱亨衍親帶馬忠至臣衙署回話臣同朱亨衍詳加審訊取有該犯口供臣即飛咨督臣岳鍾琪署陜撫臣碩色署甘撫臣張廷棟并靣諭固原知州將供出之馬倉等嚴拏質審外理合繕摺奏聞謹奏此事據岳鍾琪張廷棟俱經奏過知道了硃批諭㫖巻九十七
