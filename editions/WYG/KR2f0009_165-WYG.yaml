body:
  text: 欽定四庫全書硃批諭㫖巻一百六十五硃批柏之蕃奏摺雍正四年五月二十日山東兖州總兵官臣柏之蕃謹奏為奏聞事竊臣䝉皇上天恩畀以封疆重寄深慚逾分夙夜冰兢惟有清白自矢毫無欺隱以圖仰報皇上知遇之恩臣自抵兖以来一切陋弊盡行屏絶不敢稍存茍且之心其營伍事宜挨次檄查各營整飭外今查得臣衙門有親丁馬糧四十分又有公費步糧二十分臣自顧何人邀䝉聖恩豢養若是之深也再查有官地三處一在兖州北鄉一在界河一在滿家硐等地方詢其来厯不甚明晰即令臣標中右兩營逰擊李登華王良佐二人確查情由去後今據李登華王良佐稟稱查此地並無案巻可稽據里人言係明季廢藩遺産除從前開給民種之外尚存官地四十三頃五十五畝有零因循相承至今除中右兩營官弁兵丁耕種共二十七頃五十六畝有零其餘一十五頃九十八畝有零自雍正二年添設兖州總兵官遂將此地歸與總兵衙門照舊收租毎年在該縣上納錢糧等語據此臣查兵丁現種二十七頃五十六畝有零原照百姓一例在縣完糧臣思既照百姓一例在縣完糧則兵民皆可耕種似可毋庸更改至臣衙門一十五頃九十八畝有零之地雖在該縣上納錢糧但臣既有俸薪等銀復又占種官地自覺不安請將此地歸併有司以充公項伏乞皇上睿鑒施行為此謹奏此項地畝毋庸歸併有司照舊留存添助薪水之資可也雍正四年六月十二日山東兖州總兵官臣柏之蕃謹奏為奏聞事竊臣於雍正四年六月初五日將漕船盡數催出東昌之通濟橋閘即於初六日起程赴省㑹查盜犯事件并飭將備等官押解糧艘業經繕疏題報在案今臣於六月十一日據臨清營副將吉自隆呈稱浙江嘉興府白糧尾船於六月初十日盡數催出臨清磚板二閘除委該副將押催北上務期速為抵通外所有尾船出磚板二閘日期理合具摺奏聞謹奏今歲河水暢流糧艘得以遄行省汝無限力矣雍正四年九月初一日山東兖州總兵官臣柏之蕃謹奏為請㫖事竊臨清營中軍守備陳染患目疾精力衰弱懇請告休業經臣㑹同撫臣陳世倌具疏題請休致在案所遺員缺應聽部推但案查雍正二年十二月初九日兵部為欽奉上諭事議得將三等侍衞張炳等四員發往山東省分酌量試用奉㫖依議欽遵在案於雍正三年二月初十日劄行到兖内有藍翎馮世傑一員在兖行走催趲糧船辦事黽勉臣到任後見其人材健壯弓馬可觀試令教習兵丁鳥鎗亦頗勤勞原係試驗補用之員堪以補授臨清營中軍守備臣未敢擅便謹先具摺請㫖如蒙俞允臣另行繕疏具題伏乞皇上睿鑒施行謹奏交發該部議奏矣候覆到有㫖雍正四年九月十七日山東兖州總兵官臣柏之蕃謹奏為奏聞事竊臣於雍正四年九月初十日自兖州府起程至臨清催趕回空糧船業已繕疏題報在案臣於十四日行至荏平縣地方據臣標東昌營都司劉驤報稱有江南淮安府知府劉之頊奉欽差刑部侍郎黄炳總河齊蘇勒牌仰馳驛星夜前往沿河一帶追趕淮安關監督慶元資財船隻於本月十二日行至東昌㑹同東昌府知府金啓洛并都司劉驤將慶元大沙飛船三隻俱經拏獲内箱櫃資財物件共計二百八十號盡行封固并拏獲慶元管事家人李福夀等十三人仍復押囘淮安又於本月十六日據臣標徳州營㕘將郭魯藩稟稱本月初十日南來淮安鈔關慶元行至劉智廟地方有總河差官一員協同徳州知州陳留武將慶元拏獲即委把總馬麟紱帶兵二十名䕶送囘南等情到臣臣隨飛檄南北將備派撥弁兵逐程押䕶去後即於本日臣在磚閘催船見南來人役在關查事臣問之即係淮安府知府劉之頊因而宻問其事據云慶元之資船除被獲三隻之外先有大沙飛船一隻便民船一隻於本月十一日已過臨清關矣故此知府劉之頊追趕北上臣復檄聞伏乞皇上睿鑒謹奏所奏知道了雍正五年三月初三日山東兖州總兵官臣柏之蕃謹奏為武童無知習慣妄為事竊臣自莅任以來朝夕凜遵聖訓惟知兢兢業業使兵民相安地方寧謐以仰報皇上髙厚洪恩於萬一兹縁本年二月内兖州府府考各縣文武童生來兖應考突於二月二十九日午刻有單縣武童單姓等四五十人羣聚臣衙門首口稱有兵丁武姓得罪我們甚是可惡如不當面綑打我等俱各散去不赴考試等語臣即令其寫明情節具一呈詞以便查究衆童應聲而去頃刻之間聚集二百餘人復到臣衙門首並不具呈喧嚷不休彼時中軍逰撃李登華以婉言勸導令其且散俟查明自然責處而衆童必欲當面綑打隨至中軍衙門蜂擁毒詈至晚方散及訊據步兵武登超供稱實因衆童在寓賭錢與小的只隔一墻且房主又係小的親眷惟恐惹事故去勸阻以致觸怒臣思兵丁一人即有口角相争而武童亦不應聚衆恃刁至此但一面之辭難以遽信隨令中軍遊撃李登華備文立將步兵武登超觧送兖州府知府質審因該府現在考試尚未查訊俟其審明之日另行具奏臣聞山東此等刁風相沿已久揆厥所由皆因從前屢犯姑容未究習以為常之所致除一面咨明撫臣外理合繕摺奏聞伏乞皇上睿鑒施行謹奏直省此種刁風在在皆有不僅武童即已進已中之衿舉輩亦然如果羣賭是實當就斯一事具疏題㕘嚴懲數人以儆頑劣雍正五年九月二十六日山東兗州總兵官臣柏之蕃謹奏為奏聞事竊臣於雍正五年九月十三日自臨清起程赴省與撫臣塞楞額㑹商軍政除囘空船隻已催過臨清關四千三百二十五隻其未過船隻檄委臨清營副將吉自隆催押業已具疏題報在案本年九月二十四日據臨清營副將吉自隆呈稱蒙委催押囘空船隻於本月二十二日將金山衞尾幫船隻俱催過臨清關訖等情到臣所有尾幫過臨日期臣謹具摺奏聞伏乞皇上睿鑒謹奏覽地方事宜如民情吏治年嵗豐歉何故未見陳奏一字莫非改移初志所以如斯耶雍正六年四月初六日江南松江提督臣柏之蕃謹奏為敬陳莅任事宜仰祈睿鑒事竊臣一介庸愚蒙皇上髙厚洪恩擢授江南提督重任臣感激悚惶時切冰兢惟有竭盡心力秉公任事不敢稍有瞻狥以仰報聖恩於萬一臣自入江南境内經過營汛皆細加點閲飭令將備時加操練寧謐地方及抵松江衙門後隨點閲臣標在城兵馬其中技藝嫺熟者臣凛遵聖訓加以奬勵令其知所鼓舞其技藝生疎者分别訓飭勤加操練並嚴飭各營汛查拏鹽梟緝捕盜賊而江南地方私鹽充斥在在皆然臣今抵任月餘已據各營汛拏獲有犯私鹽六起無犯私鹽七起移交有司復查厯来有犯私鹽係交該管州縣審擬變價其無犯私鹽亦有觧交提督衙門變價充公者臣思武職衙門不應留鹽變價今一併觧交聞至於海塘工程竝沿海各營兵馬臣閲看之時另疏臣衙門額有隨丁小糧七十分臣遵收為養廉之費外有陸營公費小糧一百三十分以供營中一切修補盔甲器械廵船購買兵丁火藥以及拏獲私鹽奬賞並春秋二操賞給兵丁等費臣細查以上費用在所必需准其照舊存留再松江十三營兵米除折色外每年實撥觧二萬四千石有零交納裕軍倉收散其各州縣解米赴倉之時所有零星雜項使費臣已嚴飭革除尚有每石耗米五升共一千二百石據中軍㕘將周寶云此項耗米除潮濕霉爛散放之時零星折耗其餘添補營中公費臣思雖屬霉爛耗折以及凑添公用其中亦不無餘剰臣蒙皇上豢養深恩所有俸薪隨糧已堪食用擬將此項耗奏請㫖伏乞皇上訓示遵行謹奏覽雍正六年六月初二日江南松江提督臣柏之蕃謹奏為閲過沿海各營兵馬謹具奏聞仰祈睿鑒事竊臣於四月十二日自松江啟行前赴沿海各營查閱兵馬當即從金山營起至柘林青村南滙川沙黄浦上海右營吳淞劉河福山蘇州太湖平望沿海一帶逐營逐汛細加點閲見各營汛兵丁弓箭雖未熟練而式樣猶覺可觀至於施放鳥鎗並各塘汛駕駛廵船生疎者甚多臣嚴飭各將弁勤加訓練於兵丁中勤謹上進者量加奬拔老弱充數者陸續更換揀選精壯以實操防約計交冬之時自應漸次熟練再江北安徽所屬各營去臣較逺其間更有夀春營所轄之潁州亳州泗州等處盜竊案件甚多在將備各官身受皇上豢養深恩自當實心報效但以地方遼逺官弁既多其中懈怠者亦必有之雖現在檄行整飭臣必得親身查看方可核實擬於入秋之時另疏題請輕騎減從親往察閱務期一歸整肅寧謐地方以仰報我皇上髙厚洪恩委任微臣之至意謹繕摺具奏伏乞皇上睿鑒施行謹奏親身查看以收實效誠善舉也雍正六年六月二十六日江南松江提督臣柏之蕃謹奏為奏聞事竊照松郡地處邊海私鹽充斥臣到任以来嚴飭查拏自本年三月起至六月二十三日止據各該營陸續𫉬觧過私鹽三十七起約鹽二萬五千七百餘斤俱照例交有司變價招擬並咨眀浙江總督兼理兩浙鹽政臣李衞在案今於六月十七日據臣標金山營㕘將李必懋禀報内稱訪得金山縣張堰鎮地方向有日航船二隻夜航船二隻係原任户部郎中王圗煒家人包管取其規例雖係裝載行商時有私鹽夾帶經把總袁有禄於六月十二日現獲王圗煒家人張象九所管航船一隻起出私鹽一千零四斤並獲在船水手一名桂蘭生復有阻撓盤查之楊振宇據稱係浦東場大使楊國英之姪相應一併拏解等情前来臣正在查解間又據臣標右營逰撃葛世雄詳報該營中軍守備徐潛在於上海縣七寶鎮等䖏拏獲鹽犯鮑恵章張永歪馬大奚童元包秉一等五名私鹽三百斤鹽船三隻據稱奚童元包秉一二名係蘇松廵道差役現於兩犯身内搜出廵道印信票照七張等情各據將船鹽人犯先後報解到臣據此臣查松郡各處鄉鎮俱有日報航船以便鄉民附撘多係鄉紳家僕包管名曰埠頭今據報王圗煒家人張象九包管埠頭夾帶私鹽現今人鹽並獲及當時阻撓查鹽之楊振宇殊干功令至廵道衙役夥販私鹽均為不法若照平常鹽案飭發有司查審難免瞻徇輕縱臣因將兩案船鹽人犯一併咨觧署總督臣范時繹嚴審律擬庶可徹底根究令其知儆並咨明浙江總督兼理兩浙鹽政臣李衞在案臣謹據實奏聞伏乞皇上睿鑒謹奏兩案船鹽人犯如此辦理是當之極但必將情由備細咨明該督撫方為有益否則伊等又將市徳輕縱及或聽憑屬貟胥吏朦混開脫也此諭宜令伊等知之今將下江一切緝捕事務併交李衞節制諒嗣後可望盜風少息矣雍正六年九月十七日江南松江提督臣柏之蕃謹奏為奏聞事竊臣於八月二十六日據海州營逰擊王應元呈報准山東安東衞營鮑都司移㑹内開山東亭子蘭地方於七月二十三日有鳥船二隻住泊海面因其形迹可疑汛兵打礮數次彼竟不理而去等情據此又准署總督臣范時繹前署廵撫臣張坦麟先後移咨到臣臣即咨明蘇松鎮臣林秀狼山鎮臣王安國及飭沿海各營嚴加廵緝並飛檄海州營逰撃王應元備查確實情由去後兹於九月初四日又據該逰撃呈報准山東安東衛營鮑都司移㑹開准膠州水師營謝逰撃覆稱查得前在亭子蘭住泊二船於八月初一日進膠州頭營子口驗係来膠貿易商船一鳥船户張炳照票係勤字一百四十二號一鳥船户金隆順照票係同字一千二百七十九號年貌籍貫俱各相符今現在源盛行居住等情前来據此臣查鳥船定例原以各色分派各省今白色鳥船雖係浙省顔色而該營文内並未聲明係何省何䖏之船且此項鳥船如係時常貿易海面来往應行之船則山東營汛不致生疑打礮若係違例行走之船即當早被盤詰豈能飛越北海況江南現有蘇松鎮臣林秀狼山鎮臣王安國帶領官兵輪班出哨来往海洋以及沿海各營皆有官兵駕船廵哨豈竟與此二船一無撞遇乃至直抵山東驗其照票方知為貿易商船雖現據報係商船其中保無夾帶違禁貨物何得絶無盤詰未聞隻字報明臣因鳥船人等現在膠州源盛行居住除一面咨明山東登州鎮臣萬際瑞飭營查覆外復選差誠實馬兵王大彪甘棠即赴膠州源盛行内面詢船户實係何處鳥船在何䖏置買貨物從何處出口在洋貿易或係初次或已多年經過何䖏洋面曽否撞過出哨官兵有無盤查掛號之處令其逐一根詢俟確查詳悉至日臣當另摺奏聞為此謹奏所奏可嘉之至封疆諸臣咸肯如此實心任事精詳查詰庶無疎漏之虞朕於各省地方復何憂何慮奬許之諭筆不能悉勉之勉之同日又奏為奏明嚴防海洋營汛事竊照江南地方廣濶而上江之夀春等營離臣甚逺盜案繁多其間營伍恐有廢弛之䖏臣原擬於入秋之時親往察看以仰副聖恩委任之至意先經具摺奏明奉㫖俞允臣正在束裝間適於八月十一日接准浙江督臣李衞宻咨内稱風聞東洋日本近来不甚安静形迹不無可疑江浙洋面相連應即一體留心備禦等因到臣臣思松郡為海疆要地既准来咨不便即行逺離而事屬軍機臣亦並不聲張外露惟以慎重海防為詞於八月二十七日親赴沿海先至逼近海口之吳淞川沙等營遍厯各䖏礮臺將礮位逐一安設平稳指示兵丁如法試放復將各營額設戰船除廵洋外其餘俱調集黄浦江面洋船聚集之所使之往来行駛上下折戧竝將臣標演熟聨環鳥鎗及籐牌等項一應軍器令其在船挨次操演各䖏洋商船户在彼觀看者甚多知聖世武備精嚴皆為悦服查沿海各營離臣衙門近者止數十里逺亦不過百有餘里臣自此以後仍當不時親往綂率各營勤加操練仰賴皇上天威列兵耀武使海洋貿易商人目覩邊境防維之嚴宻道路相傳逺達化外量彼即有狡計隂謀亦可使之聞風斂跡矣臣謹恭摺奏聞伏乞皇上睿鑒謹奏此見是所謂消患於未萌也雍正六年十二月初五日江南松江提督臣柏之蕃謹奏為奏聞事竊臣荷蒙皇上隆恩簡任松江提督自到任後於整飭營伍查拏盜賊之外所有私鹽一事積弊甚多臣凛遵聖訓時刻留心察訪查松郡濵海私販公行從前文武官弁並未實力查拏以致紳民兵役無不買食私鹽甚至不法兵捕通同興販遂致私鹽日盛官引難銷臣嚴行禁約加緊廵查現今臣標五營千把總經浙江總督兼理兩浙鹽政臣李衞奏明欽奉俞㫖在於松郡内外酌開鹽舖監賣鹽斤本年十月初八日准鹽臣運到官鹽二百一十二引十數日之内即已銷完從此弁兵實力奉行將来松郡引鹽自不難於源源銷賣至於沿海各處私鹽自臣到任至今據各營陸續獲解過鹽犯二百零四名私鹽一十四萬八千餘斤俱經交發有司收審變價在案嗣後臣益當嚴飭弁兵加意巡緝則私販塞而官引自無阻滯之弊矣再查淮揚一帶亦多私販臣時時飭令各營嚴加巡緝又經署總督臣范時繹差委江寧城守營副將張玉金等前往查拏自臣到任至今共拏獲過鹽犯七十五名私鹽五十三萬四千餘斤除經分晰咨明署總督臣范時繹兩淮鹽政臣噶爾泰飭審變價外所有拏獲過淮浙兩處私鹽數目理合繕摺據實奏聞伏乞皇上睿鑒謹奏察拏私販殫竭為之緝盜一事尤為緊要能與李衞同心合謀盡力剗除則全是矣勉之江省兵丁習氣甚屬不堪嚴加訓飭可也同日又奏為查明據實陳奏事竊臣前據海州營呈報山東亭子蘭地方有鳥船二隻停泊海面形迹可疑汛兵打礟不理等情隨又據報係南往貿易商船業經收入膠州海口等語臣當即一面咨飭沿海各鎮營通查巡哨官兵曽否撞遇兩船因何並不詳報一面移咨山東登州鎮臣萬際瑞并專差馬兵王大彪等赴膠面詢船户詳查來歴並將前項情由繕摺先行奏明仰蒙我皇上天恩髙厚訓勉周詳臣敬讀硃批感愧無地惟有凜遵諭㫖益加警惕實心任事精詳查詰以期仰副隆恩於萬一耳兹據臣差往膠州之馬兵王大彪等囘松稟稱查得前項兩船一船户金隆順係福建泉州府同安縣人一船户張炳係浙江寧波府鄞縣人俱各領有本縣照票常往膠州貿易有牙行王源盛等與之熟識已久今金隆順之船於雍正六年六月三十日在寧波府鎮海關掛號空船出口張炳之船於雍正六年七月初二日在廣東虎門汛掛號空船出口俱往膠州置貨因於七月二十三日在山東亭子蘭洋面遇風停泊離岸約逺十餘里該汛防兵以本非泊船之所姦良莫辨遂爾生疑放礮兩船畏懼隨即折戧開行至八月初一日始進膠州海口業經該州查驗人照相符牙行認保有案等語并准山東登州鎮臣萬際瑞咨同前情到臣又據江南沿海各鎮營覆稱江省廵洋官弁向例在於外洋馬蹟山等八處来往逰廵報部有案今金隆順等兩船係從進山花鳥以外之大洋直達東省所以廵哨官兵未經撞遇報明等因前来據此臣查金隆順張炳等二船一由寧波鎮海關掛號一由廣東虎門汛掛號實係赴膠貿報明其中並無推諉情弊臣因事關海洋不敢不細心查察今將查確縁由據實再行奏聞謹奏知道了雍正七年四月二十六日江南松江提督臣柏之蕃謹奏為請旨隨征效力少伸圗報微忱伏祈俞允事竊臣微末旗員仰荷皇上格外殊恩由㕘領擢用副將旋授總兵繼陞提督天恩深重圗報無由臣今接閱京報諸王文武大臣等奏請發兵征𠞰噶爾丹䇿零一疏已蒙皇上准奏辦理臣思漢人尚多效力臣係旗人又蒙皇上豢養拔擢之恩天髙地厚自愧毫無效力之處是以俯仰生慚難安寤寐况臣年力尚未衰老正當竭盡犬馬力圖報效之時再臣等漢軍原係火器營即今鎗礟等項臣亦自能施放託賴皇上天威派臣於何項差使恩准隨征滅此小醜庶得少伸臣子報效之心亦不致虛生聖世矣謹此繕摺請㫖伏乞皇上恩允施行謹奏身爲提督統率全省官兵不思訓練營伍保固封疆上報國恩乃甘以虛生聖世之人自居且又言願效施放鎗礮之勞置萬人敵於不講而學一人敵縱極精熟亦何濟於事可謂不識大體卑鄙之極江南營務廢弛兵習懈惰為日已久亟當竭力整理以盡厥職不必作分外之想也同日又奏為恭謝天恩事臣進摺家人於本年正月二十一日囘松齎捧皇上恩賜御書福字等賞到臣臣隨郊迎至署恭設香案望闕叩頭謝恩祇領訖伏念臣才本駑鈍識復庸愚叨受殊恩膺兹重任一載以来愧無寸長報效耿耿之衷實深慚悚今復蒙我皇上聖恩髙厚頒賞御書跪展龍箋覩天章之煥麗髙懸宸翰瞻雲漢之昭囘臣當世守家傳奉為至寶臣自問何人邀兹異數戴天恩之愈厚實朝夕之難安臣惟有公忠自矢用承聖眷之優隆竭蹶駑駘仰報生成於萬一耳理合繕摺恭謝天恩謹奏覽既差人來奏謝爲何不將雨水米價情形乗便奏聞似此職任封疆將地方事務漠不關心即至軍前亦不過隨伍逐隊充數而已豈能破格與國家致身效力耶同日又奏為奏聞事竊臣於本年三月二十六日接據蘇州營逰擊賀喜稟報内稱三月二十四日據本營守兵顧鶴宻禀有戰兵孫起龍告訴小的説有一箇欽天監做過官的姓顧為首要糾合些人幹不法非為之事孫起龍意欲出首小的耳聞驚駭理合首禀等情隨據孫起龍稟稱於去年十二月二十邊有撫標右營兵丁雷彩文官名張寶勾合小的到開元寺琵琶橋北首顧忠思家據説欽天監做過官知些天文術數要糾合些人做歹事小的在他家吃過一囘酒同席崇明王四雷彩文還有兩箇不識姓名的人連小的與顧忠思六箇人等語據即宻喚顧忠思王四雷彩文前来㑹同撫標中軍逰撃武進陞就近囘明廵撫候示飭審並詳報江浙總督廵察御史在案等情到臣當即飛檄逰撃賀喜將顧忠思一案實在是何情由此外更有何人並廵撫作何審理定案逐一詳細查報去後嗣據該逰撃鈔送蘇州府暨撫標中軍逰撃等㑹審顧忠思等前後兩次供冊前来據顧忠思供係欽天監書辦役滿考授經厯職銜官名顧文煥又供本有癡顚痰證鄰里皆知小的酒後狂言對張寶説你去合㡬箇人来得這蘇州城的話是有的又據供冊内詰問有無私蔵書籍囘供並無私蔵書籍若有時縣裏就該搜出来了等供在巻續經署理江蘇撫臣王璣親提審訊又於四月二十日飭發吳縣審理皆與前供相倣臣查此案顧忠思飲酒狂言係王四雷彩文孫起龍四人同席知情其孫起龍所供之不識姓名二人據顧忠思供名喚王連王二係屬顧忠思姨姪飯畢先去並不知情但其中情事虛實必俟署撫臣審勘完結之日方得確情今原首營兵顧鶴已經取保其顧忠思等四名現俱監候未經定案臣謹將此案情由奏聞謹奏地方上凡遇此等匪類即當極力窮詰勿輕放過若視為多事之舉而不屑追究及或臆度謂必無此理而忽畧之皆足以致悔顧鶴賀喜孫起龍俱應奬賞以示鼓勵雍正七年閏七月初四日江南松江提督臣柏之蕃謹奏為恭繳硃批事竊臣前奏隨征效力一摺荷蒙皇上訓誨諄切指示周詳臣跪讀硃批諭旨頓生省悟深愧從前實屬愚昧今臣感激之中益増慚懼至於江南營伍臣自抵任年半以来夙夜不遑力圖整頓凡遇各營將備来松考驗之時其中勤勞供職者即面加奬勵少有懈忽者必再三勸誡更將臣標操演式樣逐一操與伊等觀看令其囘營照式操演再臣駐劄松江查係沿海要地當以火器為先従前緑旗鎗礮施放未能便捷臣到任後將在京操演火器之法親加訓練近已漸次熟悉再查江南兵習驕縱日久臣凛遵皇上睿鑒謹奏勉之慎之毋自貽悔雍正七年閏七月十一日江南松江提督臣柏之蕃謹奏為奏聞事竊臣於本年閏七月内聞得崇明縣地方有等無知之人口稱奉有上諭羣往殷厚之家硬借銀錢經太倉州知州翁甫生於七月二十二日赴崇將為首之黄銀蠻子仇聖勷二名枷責發落又有鄉民范三船載稻穀路被二三十人恃强索借隨經蘇松鎮標汛兵將稻船䕶送至施翹河口查明强借之施大年等二十七人亦經太倉知州將稻船給還范三訪拏為首四人帶至太倉州發落但臣伏讀上諭恩㫖何等周詳仰見皇上至聖至仁萬物一體以孝友睦婣任䘏之道教養民生冀其緩急相周守望相助此誠一道同風之聖治唐虞三代之休風也惟是小人居心狡詐不無引誘愚民必須責令鄉約里保人等宣揚聖諭詳細講解務使賢愚共曉感格從風方不負我皇上愛養萬民之至意今此等强借之人必係愚蠢鄉民未能通曉字義為姦徒鼓惑所致臣現在檄行營汛凡遇此等刁頑務必拏交有司訊明懲儆縁係地方事件臣謹據實奏明伏乞皇上睿鑒謹奏將類斯强梁匪徒皆視為愚蠢鄉民地方上有汝等如是寬仁長厚文武大臣宜乎百姓中有如是可憐可恕之事也此案已據數處奏到葢縁崇明知縣暨總兵林秀俱赴省城該地空虛無人彈壓所致然亦平時化導乏術風俗澆漓之故耳雍正七年十一月二十九日江南松江提督臣柏之蕃謹奏為恭繳硃批事竊臣微末庸愚感蒙皇上格外洪慈由㕘領擢至提督更荷聖恩髙厚下及臣身者至深至重而感激微忱亦非臣言所能奏達也每念努力致身猶不足圖報萬一若使稍有瞻徇非惟難免聖明之洞察亦且為天地所不容祇縁愚昧之極耳目不周今蒙皇上硃批訓飭臣跪讀再三不禁汗發沾衣無地以自容也惟有痛自策勵竭蹶向前以期仰副皇上教訓之至意耳臣不勝恐懼戰慄之至所有奉到硃批奏摺理合恭繳伏乞睿鑒謹奏章奏焉足為憑須行與朕看若欲以虚偽之言冀聳朕聽適所以自欺耳何益之有同日又奏為鄉民燒燬差船事竊臣聞得奉賢縣蕭家橋地方有華亭縣糧户蕭禹臣住居該地華亭縣差役譚元於十一月初一日雇船前往蕭禹臣家催討舊欠錢糧即於本日夜間忽有各圖百姓聚集三四百人竟將差船燒燬臣隨専差兵役前往確查並飭青村營守備溫元鳳將起釁實情為首名姓及有無傷人之處查明禀覆今據溫元鳳及臣差役覆稱果因催討錢糧起見其時差役譚元係在糧户蕭禹臣家内本日二更時分有鄉人口稱捉賊到蕭家門口就問這可是差船麽譚元囘説是差船衆人便㸃火將船燒燬但時值昏夜人多且係各圖聚集之人今止查出附近居民張五陶天章朱珠李徳四名在内縁係地方事件臣謹據實奏聞伏乞皇上睿鑒謹奏此事若不能查出首犯實情尚靦顔居於松江提督之任乎既云數百人聚集則非形跡詭祕可比設法體訪豈有不得確據之理今乃以昏夜人多止查出附近居民某某奏聞想汝具摺時正在昏昏醉夢中也殊堪發一大笑觀汝甚屬不妥矣雍正八年四月初四日江南松江提督臣柏之蕃謹奏為恭謝天恩事雍正八年正月初六日臣齎摺家人囘松捧到恩賞福字一幅臣隨郊迎進署恭設香案望闕叩頭謝恩供奉訖欽惟我皇上天恩廣被聖夀無疆率土臣民均邀福庇臣何人斯疉荷御書之下逮也仰宸翰之輝煌凜天威於咫尺臣惟有勉竭股肱矢效犬馬以報聖恩髙厚於萬一耳所有感激微忱謹繕摺奏謝伏乞皇上睿鑒謹奏斯不過頒賞封疆諸臣一例下逮於汝耳奚庸如此鋪張虛文汝自弗克承受朕安能强賜汝福若不返求諸已惟以朕賜福是賴則大誤矣如吳希聖乃朝廷重犯伊父吳存禮於汝尊非祖父情非叔伯身為封疆大臣豈宜負君背公違法失體不時差人饋遺殷勤款接至於此極汝具何肺腑而若是行為耶吳存禮於汝何恩何惠而若是懇摯耶吳存禮便係汝祖汝父猶當大義滅親况異姓各宗兩不相涉耶或以吳存禮為公忠大臣謂朕處分有寃抑乎若然何不從前向朕白其寃而雪其枉耶一一據實明白覆奏以聞朕於前摺曾經批諭觀汝甚屬不妥今即此事而論瞻徇私誼毫無忌憚其餘矢志盡職處不問可知朕諭洵不謬矣雍正十年六月初六日廣州將軍臣柏之蕃謹奏為奏聞事竊臣蒙皇上天恩補授廣東將軍於本年三月初七日跪請聖訓之後自京起程至四月二十五日抵任欽遵面奉諭㫖查得曽合一案係康熙五十年正月十五日實有之事賊衆原以放火為號因號火不發衆賊濳遁各官雖亦知覺並未查究後於康熙五十六七年間曽合等復在廣東廣西分散符劄煽惑愚民業經廣省督撫將各犯陸續拏獲及細詢廣東向年多盜之由官弁土民僉云皆因従前官不捕盜盜不懼官以致盜案盈積自督臣孔毓珣涖任加意振興此後地方官等又皆悉心經理所以數年来盜風頓息閭里敉寧等語再臣查曽合案内尚有未獲之犯以及李梅等一切姦匪督撫現在嚴行成精鋭至今年廣東地方自春抵夏雨水及時目下早禾竟有十分收成四五月間米糶一兩一二錢至一兩一石不等現今新米每石只賣八錢二三分若秋禾再得全收民間必益慶豐盈矣臣因甫經涖任一切事宜未能詳悉嗣後凡有見聞備行入告斷不敢少為瞻徇觀望以重欺隐之罪再臣將軍任内原設有馬糧二十分戰糧八十分倂所領俸薪以為臣養贍家口並衙門應用之費每月收有房租銀四十餘兩為差人進京盤費之用臣自顧何聖恩於萬一耳臣臨奏曷勝感戴瞻依之至謹奏覽同日又奏為請㫖事竊照各省標營俱係每兵百名抽糧三分作營中修補盔甲旗幟器械之用此項公費廣東將軍標下四營尚未奏請臣到任後案查廣東督臣郝玉麟咨開雍正七年八月二十日奉㫖各省營伍所需火藥俱預行成造收貯備用但多貯火藥恐有疎虞或收貯硝磺臨時配用或酌量足用少為製造如必需多為預備應作何收貯於營伍有益之處著常明㑹同兵部工部宻議具奏欽此隨經部議内有潮濕地方量備三年髙燥地方量備五年成造貯庫並著各標營將應用火藥一體購備以便出陳易新等因議覆奉㫖依議欽遵咨行在案又於本年五月初三日准署督臣鄂彌達咨稱將軍所屬四營酌量添造火藥備用一案現今製造應照各鎮協營一體請動正項錢糧至扵將来每年動用應以何項銀兩造補等因查臣標四營鎗礮二項每年額需火藥一萬六千七百四十餘斤三年共需火藥五萬二百餘斤均應照例備貯至扵修補盔甲旗幟等費従前未曽設有公項並現今應貯火藥亦宜一體預備項無所出臣仰懇皇恩將臣標額設馬步兵三千四百六十七名内比照各省營分之例毎百名抽糧三分以作公費但臣標四營皆係戰糧百名之内只抽二分足抵守糧三分之數計共抽戰糧六十九分一年約有銀一千兩火藥毎斤部價五分四釐三毫三年需備火藥五萬二百餘斤共需價銀二千七百餘兩除陸續補還備買火藥價銀外毎年所有餘剰銀兩俱交經管錢糧之該營守備收貯以為修補盔甲器械旗幟等項公用臣仍不時稽查毋許虚糜侵蝕並飭令將每年修補過器械等項數目繕造清冊送部查核為此具摺請㫖謹奏均係職分内應行事宜酌量為之可也雍正十年十一月初四日廣州將軍臣柏之蕃謹奏為叩謝天恩仰祈睿鑒事雍正十年九月十八日接到大學士臣張廷玉寄字内開本年八月十四日奉上諭朕聞柏之蕃自到廣東將軍之任以來操守雖無可議而料理營伍事務甚覺廢弛伊莅任已經數月並未操閱一次每日念佛誦經至四鼓方臥次日已刻方起屬官有事禀見難於伺候所管旗營漸至懈怠迥異扵蔡良在任之時此朕之所聞者廣東將軍管理駐防弁兵責任最為重大向来營務廢弛兵丁習氣不好朕特簡將軍蔡良前往教訓整飭年来漸次改觀柏之蕃係朕宥過復用之人謂其必能實心黽勉以繼蔡良之政績乃伊罷軟性成悠忽不改將蔡良整理之䖏日漸廢棄従前伊在江南時但務勤職之名不知體恤兵丁風雨寒暑一槩操演朕曽降㫖訓諭今伊在粤竟不訓練非太過即不及深負朕任用之恩可即傳㫖切加訓飭倘仍不悛改經朕訪聞必從重處分毋貽後悔欽此等因到臣臣捧讀聖訓悚惶無地當即恭設香案望闕叩頭謝恩訖伏念臣一介微末蒙皇上再造之徳宥過洪仁授以將軍重任早夜兢兢圖報未遑何敢稍存懈怠查廣城操演因夏間雨澤過多天氣炎熱向例於四月十六日住操八月十六日開操臣於四月二十五日到任雖已停操誠恐兵丁技藝生疎俱著該旗營協領㕘領將弁在伊等小教場按以日期射箭演鎗不致懈怠并令早時演習業於八月初二日開操每月旗營按例合操一次射箭之期面考優劣餘日皆令兵丁演連環鎗打把子並令練習步行務要嫺熟健捷以收實效所有水陸汛地逰廵弁兵令其加謹廵防毋許多事仍飭時常操演及更換囘汛復親加考驗以防怠惰至若教導屬員訓誡兵丁皆臣職分内事凡屬官接見之時無不勉其做好官實心辦事不可疎懈旗營甲兵亦時飭其加緊習學安静守法共報皇上豢養之深恩兹臣欽奉聖訓惟有益加䇿勵勉竭心力勤慎供職以仰報皇上髙厚仁恩於萬一耳為此繕摺奏謝伏祈睿鑒謹奏奏内益加策勵之語指念佛誦經之功課而言乎天下未有不能勉盡忠勤曠官廢職之善人吉士也以此修福適足召禍孟子所謂甚於縁木求魚後必有災者也至期竊怨天道不佑佛教不靈謬矣雍正十一年三月十一日廣州將軍臣柏之蕃謹奏為據實陳奏懇祈睿鑒事竊臣案查雍正七年十一月内奉上諭嗣後將軍標下緑旗兵丁缺出即將漢軍餘丁頂補仍食緑旗糧餉如緑旗兵丁内之祖父食糧年久者其缺既令漢軍頂補則伊等子弟不得食糧未免衣食無資著於本省督撫提鎮標下并同城附近營汛内有開除名糧即將此等之人充補欽此欽遵奉行在案此誠聖慮周詳俾八旗壯丁與標營之子弟各皆衣食有資無一夫不獲其所皇恩浩蕩感激彌深今查八旗壯丁業經頂補四營兵缺二百六十七名其餘壯丁經臣親身查驗除老㓜殘疾及曾有過犯者俱不録取外通共現有壯丁一千五百餘名臣俱令其在於各旗甲兵之下幫差行走先時學習以待陸續挑補甲缺之用至於臣標四營兵丁子弟臣查檢家口細冊共有一千三百五十餘名其中頗有堪以驅使之材業蒙皇恩在於本省督撫提鎮標下并同城附近營内有開除名糧即將此等充補之恩諭臣到任後即細心體察此等餘丁今皆倚靠食糧之父兄同居度日彼此藉以照看是以勢難逺就兵糧另立煙户而同城附近之各營如有開缺名糧必儘本營兵丁之子弟接續頂補則臣標四營之餘丁不能補糧不惟艱於衣食其中有志出力效用者並置閒散未免抑其上進之心臣愚以為嗣後各營名糧開缺請將八旗壯丁與四營餘丁相間挑補則旗營共沐皇仁均相鼓勵咸得收其實用似於營伍微有裨益可否相間遞補出自皇上天恩臣不揣愚昧為此繕摺請㫖伏祈睿鑒謹奏所奏與鄂彌達張溥詳細商酌具疏題請雍正十一年九月十一日廣州將軍臣柏之蕃副都統臣毛克明臣安華謹奏為旗人學習清話謹遵聖㫖務收實效事竊惟八旗兵丁遵㫖學習清話先准兵部行文現在飭令學習又於雍正十年五月内准兵部咨稱本部將杭州廣州預行保題之領催帶領引見奉㫖伊等俱不㑹清話爾部再嚴加行文與西安等䖏凡有漢軍兵丁駐劄之省分欽此移咨到臣等遵即傳行八旗一體奉行并選能説清話之人分撥各旗勒限教習惟是駐防官兵扵康熙二十二年分駐廣州其子弟多在廣東生長非但不曽㑹説亦且聽聞稀少耳音生疎口脗更不便捷即有聰穎善學者又因不得能教之人為之教習即今現在學習兵丁除本身履歴之外不過單詞片語尚能應對如問以相連之語即不能對答臣等再三籌度查廣州將軍衙門原設有筆帖式四員伊等扵翻譯清文之外頗有餘閒若用以教習清話自得收其實效擬以一員分管二旗督率教導俾有遵循則嫺熟者即可轉相教導庶初學者咸得其指授而易於入門但筆帖式翻譯文案是其専任教習清話本非所司欲其實心教習理合具摺奏請如蒙俞㫖允行臣等將現任筆帖式南吉禄等四員咨明吏部俟有成效仰懇皇上天恩量加鼓勵而八旗兵丁共沐教養洪仁於溥徧矣為此謹奏汝等衙門之筆帖式以翻譯餘閒教習旗兵清話亦屬分所當然乃不能令其效此微勞必俟請㫖咨部邀求鼓勵然後施行可謂笑談矣殊屬卑鄙之至雍正十二年二月十九日廣州將軍臣柏之蕃謹奏為酌辦存庫息銀以廣皇仁事竊查廣州八旗生息銀兩自雍正七年五月内蒙皇上恩賞銀二萬兩即將一萬四千五百兩借給鹽商每兩每月二分五釐起息又將銀五千五百兩開設當舖一座歴年以來惟將商息分賞自雍正七年起至雍正十一年十二月底共收商息一萬八千七百七十二兩零内賞給八旗共銀九千四百一十四兩又四營自雍正十一年六月間開賞起至十二月底共賞出銀一千一百二十二兩八旗四營共賞出銀一萬零五百三十六兩尚存商息銀八千二百三十六兩零現在存庫又當舖存息銀四千七百七十四兩零存當生息未曽動用兹廣省督撫等標共帑銀十萬兩現在鹽法道處借給鹽商每兩毎月二分生息分賞各標臣標四營與本省各標事同一體臣請將八旗存庫息銀内撥出八千兩照依督撫等標亦交鹽法道每兩二分生息每月可得息銀一百六十兩以為賞給四營之用臣欽遵聖諭在於旗營二處通融辦理其收囘之息應交臣標中軍衙門收貯就近按事據領給賞臣另立冊檔不時稽察每年將此八千兩作本綂入奏銷冊内所有當舖厯年存息銀四千七百七十四兩零仍存當生息其撥剰之息銀二百三十六兩零及每月收囘息銀仍貯旗庫陸續備賞如蒙俞允臣并咨移督臣鄂彌達將銀轉發鹽法道經理借給則旗營俱得寛裕矣是否有當伏乞皇上指示遵行謹奏與督臣鄂彌達商酌行之同日又奏為請㫖事竊照廣省八旗壯丁頂補緑旗糧缺一事前經兩奉部文俱已遵行在案兹查自雍正八年二月起至雍正十一年底共頂補過四營糧缺三百六十二名内戰糧三百三十六名馬糧二十六名皆隨營操習凡有遊巡水陸地方以及貼防汛守差使與四營之兵一例行走臣每於操演之時看此内人材亦有壯健可觀弓馬嫺熟之人且遇有馬糧兵缺例得與緑旗步戰兵互相拔補再如伊等在旗父兄出有甲缺仍准挑囘頂甲皆蒙皇上恩施髙厚至周至渥查伊等除逐年囘旗補甲外今在緑旗食糧之人現有三百六十二名臣思伊等上蒙皇恩在標營食糧久經學習標營事務或可於標營拔補之處未經奏請如有標營外委缺出將伊等與緑旗兵丁一體考驗拔取其尤者以之頂補若著有勤勞照標營一例拔用則伊等自當益加感奮數年之中遇有出格人材俱得拔擢以備戎行之選臣仰體皇上浩蕩深恩為此具摺奏請應否在於標營拔補伏乞皇上指示遵行謹奏此奏甚屬不合頂補兵丁内如果有出格人材既可拔用營弁獨不可揀選旗員乎一例拔用益加感奮是何言歟候另㫖諭部硃批諭㫖巻一百六十五
