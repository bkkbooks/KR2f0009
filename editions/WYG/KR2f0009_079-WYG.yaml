body:
  text: 欽定四庫全書硃批諭旨巻七十九硃批李元英奏摺陜西平慶道臣李元英謹奏為遵旨奏聞仰邀睿鑒事竊臣至愚極陋蒙皇上隆恩擢用平慶道召至養心殿面奉訓旨敎誡諄諄又奉諭旨令臣將所知地方事務具摺交本王轉奏欽此臣抵平慶道任奉督臣岳鍾琪行委㑹同寧夏道董新策查勘寧夏新築八旗城工衙署營房有無浮冒果否堅固臣一路查訪頗有怨聲俱云從前估計城工原未詳細而經理督修者又皆冐昧從事假公濟私所用木石磚瓦鐡釘等項件件累民以致窰户陳萬言等怨恨沸騰寧夏三衞賠累難堪寃抑莫訴及臣至寧夏查勘城垣外面用磚包砌裏面與城頂惟用土堆築虚鬆不堅再查勘各衙署槪用木釘間架窄狹而營房更為不堪木植旣屬細小止用草簾一頂遮蓋上鋪薄土搭蓋平棚而巳所以上漏下濕不蔽風雨每多坍塌如此𦂳要城工而被估計督修承修各官王景灝楊廷相趙世朗嚴世傑等彼此回護推卸不肯實心料理營私貽悞臣不敢不據實奏聞伏候皇上乾斷至糧草一項最為緊要寧夏一歲所收之糧止可供寧鎭兵丁之需今添此三千滿洲官兵旣未定隣近之撥運又地方所出有限目前最為急務臣已稟撫臣石文焯聽其作何籌計撥運矣至將軍衙門並各衙門之經制書役及心紅紙張各役工食等項俱未議定章程從前始事之官亦難免草率之咎謹繕摺奏聞伏祈皇上睿鑒謹奏已用爾為按察使矣將摺内所奏各情由僃悉詳明該督撫看伊等作何料理奏聞朕自有裁酌此奏甚屬可嘉向後莫移此志諸凡勉力秉公為之陜西蘭州按察使臣李元英謹奏為恭謝天恩事竊臣賦性庸愚材質駑鈍蒙我皇上格外天恩以知州而擢用監司越陞數等到任未及三月復蒙皇上特授臬司隆恩異數至矣極矣兹接臣胞兄佛保家信奉旨特授湖廣鎭筸總兵官又臣子侍京繼與佛保為子者荷蒙皇上特放佐領是臣父子兄弟一門均沐皇恩浩蕩犬馬尚且知恩臣具有人性能不感泣思奮惟有交相勸勉必思整頓巖疆安輯地方必思屏絶私情正已率屬始終如一不違初志庶幾上報皇上殊恩於萬一所有感激血忱實難遏抑用敢繕摺恭謝天恩謹奏朕如此加恩心非木石寧不知感何待奏陳但恐思路一邪而感激之忱隨化為烏有耳每觀福量淺薄不能承受之徒往往如此自御極以來䝉朕特恩擢用者頗不乏人朕原期其感恩圖報庶幾利濟於社稷蒼生設或徇欲昧理因私害公而冀朕袒護姑息不可得也爾等漢軍及滿洲大小臣工於利之一字勘破者少殊不悟因些微小利致斷送身家䘮失名節為失計之大也總之服官第一以操守為要勉之勉之最難事也莫作等閒看其間義利之分公私之辨幾微不審後悔何及可惜朕恩卽付之流水矣愼之愼之陜西蘭州按察使臣李元英謹奏為恭繳硃批事竊臣前奏恭謝天恩一摺實由感切寸心不能遏抑冒昧陳奏仰䝉皇上硃批訓諭詞嚴義切敎誡周詳臣跪讀之下感激涕零惟有敬誌於心朝夕黙誦時時警惕以為終身之戒庶不負我皇上訓勉之洪恩於萬一耳所有奉到硃批理合恭繳謹奏近日爾之聲名雖無甚不好處較前志操則大為不如甚不敷朕所望勉之愼之陜西蘭州按察使臣李元英謹奏為奏聞事竊臣沐皇上天高地厚之恩凡關係通省事件無論所管與非所管均當時刻留心細加體察謹以時下所聞并臆見所及不揣冒昧僃悉陳奏一估撥之例宜為畫一也查甘省估撥定例於九十月間將本年額徵糧石估撥次年兵食先為報部次年照數支散又因甘省營驛歲需糧五十六萬餘石而每年額徵糧止有四十九萬餘石每於本色之外約估折色此例行之已久惟是州縣營汛多寡遠近總無一定章程以致胥吏作姦上下其手竟成錮習每於估撥之時州縣營汛紛紛營謀以求各遂其私臣查雍正二年間曾奉部文令將兵糧秉公撥定畫一造冊報部永為定例嗣經前任布政使傅德以甘省非他省可比䑃混咨覆至今舞弊如故以臣愚見仍請將州縣額徵之多寡與營汛之遠近逐一計算定為某州縣應撥某營汛若干俱為畫一以定章程永遠遵守每年奏銷不得增減改易如此則積弊可除似於倉穀兵民均有裨益矣一均丁之法宜加詳議也臣見甘肅奉行均丁之法有與他省似同而實異者蓋他省則以本州本縣之額丁均入本州本縣之地畝原額仍無增損小民自樂輸將今甘省均丁則不按地畝止按通省額徵銀糧通計合算每銀九錢零毎糧九斗零攤入一丁額徵多則攤丁亦多額徵少則攤丁亦少以致各州縣有比原額多增至二三千兩不等者毋怪乎紛紛具呈以為均丁之不公也推原其故因甘省州縣中有糧少丁多者若就本州縣均攤誠恐糧額少而載丁過重是以泥於通融之說不復詳議但查甘肅州縣其糧少丁多之處有産有丁現在完納者已居其六七無産有丁艱於完納者止居其二三若以二三分之窮丁歸入六七分之糧戸仍無過多之處况查甘省地多糧少如有餘剩窮丁卽就本地近報開墾猶未陞科並所有熟地未經報糧之戸均攤則有地者不蹈隱糧之咎而無糧者免受空丁之累一舉而兩得矣以上撥糧均丁二事原非臣之職任然所聞如此敢不據實奏聞伏候聖主睿鑒謹奏旣知成法滋弊善政失宜何不言之於早今見鍾保如此因而弄巧舞智以表已長殊負朕恩總之於朕前逞一毫機巧作用皆屬自害之道若不能眞實克已奉公而惟欲假公以濟私禍一及身追悔莫及雖前車覆轍歴歴可鑒而内外臣工竟不省悟悛改朕實不解也愼之愼之陜西蘭州按察使臣李元英謹奏為奏聞事竊本年十月初十日布政使鍾保革職奉撫臣石文焯委臣暫為代理隨於十月二十八日鍾保送到交代冊籍臣逐一查核除現存庫銀九十八萬餘兩照數查收外尚有借支銀六百萬餘兩其中疑項混雜種種不清雖非鍾保之侵蝕而實係鍾保朦混接受於前又為遮飾於後以致庫項無著與侵盜錢糧者何異臣若再因循怠玩漫不稽查不特上負聖主天恩卽臣犬馬本心亦覺自負今臣按欵清查每遇一事必詳究其根底兩月以來亦不過僅得十分之三四其餘未清之項甚多尚湏逐一清查謹先將查出各欵情弊及其中備細縁由另具清單恭呈御覽謹奏刑名旣不能秉公料理錢糧何能徹底清查所具清單朕總未覽一字陜西蘭州按察使臣李元英謹奏為恭繳硃批事竊臣質本庸愚才復駑鈍荷蒙我皇上天恩遇事敎誡雖以臣犬馬無知亦覺深自省悟臣前奏撥估兵糧并人丁歸併二事復蒙聖訓諄切臣跪讀再三仰邀天地之恩愈切悚惶之念自今以後惟有益勵初心奮勉辦事斷不敢始勤終怠有負高厚洪恩所有奉到硃批理合恭繳謹奏恩已負矣何云不敢有負此皆積隂功賣法徇私之報應不知爾將如何底止也硃批諭旨巻七十九
