body:
  text: 欽定四庫全書硃批諭㫖巻二百二十一硃批余甸奏摺雍正二年七月二十日山東按察使臣余甸謹奏為恭謝天恩事臣自閏四月十四日叩辭闕廷祗承聖訓瞻戀實深十六日起程二十五日抵濟南府二十六日恭設香案望闕謝恩黽勉從事三月以来雨暘時若禾稼滋榮皇仁流蔀屋念撫字應寓催科徧德及囹圄必祥刑斯稱董戒至於新舊虧空随撫臣徹底以清查倉庫糧銀偕藩司斟酌而挹注節日用開講院而致眀師裁陋規立義倉以備荒嵗臣心所期如是次第舉行臣才實有不堪咄嗟莫辦謬膺重任猶負邱山受國厚糈如臨淵谷此則臣之所夙興夜寐不敢告勞咫尺天威深虞隕越者也臣謹奏所奏知道了但不得好尚虚名廢弛實政刑名惟貴得中毋偏於慈善致令無良者藐法此外皆信得及爾也勉之雍正二年十一月初六日山東按察使臣余甸謹奏為恭謝天恩事竊臣才具疎淺䝉皇上特簡山東按察使受任以来日夜兢懼務期亷訪命之下悚惕逾深謹於十一月初二日承接藩臣博爾聞臣謹奏覽硃批諭㫖巻二百二十一
