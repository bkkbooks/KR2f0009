body:
  text: 欽定四庫全書硃批諭㫖巻一百六十八硃批楊鯤奏摺鎮守雲南曲尋武霑等處總兵官臣楊鯤謹奏為受恩至重圖報至殷謹瀝下悃仰祈睿鍳事竊臣於雍正元年正月内具摺請謁先帝山陵荷䝉皇上俞允九月抵都侍闕五日六覲天厨時膺寵錫殊有之榮洵非夢寐所敢希冀臣自旋滇以來㣲忱感激每至涕零今雲南提督郝玉麟現駐义木多地方部議中甸令挑選總兵官駐劄臣不揣謭劣仰懇皇上天恩俯將副將孫宏本令其撤囘原任准臣帯兵前駐中甸遇有相機進𠞰之處臣必竭力行走以盡犬馬之勞則臣報效之心庶可少伸萬一為此繕摺具奏伏乞皇上睿鑒施行謹奏此事督臣高其倬自必有所見奏朕何庸爾多此一奏耶鎮守雲南曲尋武霑等處總兵官臣楊鯤謹奏為遵㫖密陳事竊臣陛見之日欽奉皇上陳之守聲名俱好原曲靖府今調麗江府知府楊馥才守俱優辦事好雲南邊地如䝉賞發來滇以緊要㕘遊缺用必能及時效力一地方劣員南鹽道回子沈元佐係其姻親張文煥任内受託徵賄俱係金懐瑋過付聲名不好人亦平常以上官員賢否非臣職分當言緣係欽遵諭㫖謹繕摺奏聞謹奏豈惟總兵大員凡食祿者皆有當言職分但將公私二字要辨别清楚耳直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊臣至微至賤荷䝉我皇上簡任重鎮日夕惴懼恐負聖明惟有事事不敢欺隱僃達天聽仰遵皇上訓誨指示竭力辦理庶臣愚昧之人獲免隕越矣謹將所有事宜敬為我皇上陳之一正定鎮荷䝉諭㫖復設總兵其官弁兵丁俱循舊例添設所有原額馬步兵丁共二千九十五名今現有馬步兵丁一千八百六十名尚須添馬步兵二百三十五名部議即令於所屬各營内酌量抽撥照數補足惟是正定既已改鎮統轄遼濶其馬歩兵丁雖照舊額添設除撥給龍固營守兵三百名又分防州縣外汛共兵一千一百九十六名外實在標下存城兵止五百九十九名縱改銜缺仍是汛廣兵單其於汛防操練之處究竟不敷分撥替換臣請於原額馬步兵二千九十五名之外再於所屬各協營内抽撥守兵二百零五名以足二千三百之數則存城有馬步兵八百零四名庶幾兵勢少振得以輪換更替操練有資其於汛防巡查不致廢弛矣臣聖明指示一臣囘京之時經由滇黔楚豫沿途所過塘房烟墩俱各新鮮堅固及過黄河至淮慶鎮地方墩臺便已倒塌不堪汛兵空虛無人迨入直隸所在塘房烟墩悉皆倒壊今䝉皇上隆恩授臣正定總兵莅任便道復將經過塘汛再為查看坍塌之處難以指屈目下酌議修理自不奏一正定城池屏障畿南實為重地臣於到任後閱城見東門一扇損壊不能啟閉週圍城垣俱被雨水衝刷坍塌甚多目下加𦂳修築計工需費已自不少若再遲緩則磚墻外頺工程更大必致乆糜錢糧臣既身任封疆聖鑒一正定兵丁分防外汛已去三分之二存城無幾官兵懶惰偷安從不知操練技藝以故甲械旗幟十缺八九除一應旗纛臣與將僃等公同商酌捐兩八錢解交藩庫此外羨餘約畧相等臣尚未確查關稅始末但各營既有此項出息不應令該將僃等潤其私槖擬將所有羡餘盡行歸公以為製辦軍裝之費是否可行伏乞聖明指示以上四條均關地方營制臣冒昧奏聞伏祈皇上睿鑒謹奏覽直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊查武職親丁名糧總兵舊額六十分副將三十分臣到任之日據中軍遊擊開送前任副將存留親丁名糧三十分到臣伏念臣受恩豢養四十餘年每慚虛糜廩禄旦夕難安所有親丁糧三十分應否存留賞給臣之家人長隨出自皇上天恩臣未敢擅便為此具摺奏明謹奏名糧止於此數可謂第一清廉總兵矣何須奏請直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊臣請以各營抽收關稅羨餘歸公製辦兵丁什物盔甲帳房等項荷䝉皇上硃批臣查關稅羨餘既已歸公該管將僃無所沾潤未免失意若將稅務仍專屬該將僃抽收恐致隱漏侵蝕以及額外多抽臣今以固關龍泉二處委令臣標左營遊擊胡兆吉倒馬茨溝二處委令右營遊擊董芳各選殷實老成之人前赴該關協同監收其插箭嶺一處臣委人前徃監收除將原額正項解交藩庫外每年共計可得羨餘銀二千餘兩俱令解交臣標中軍遊擊胡兆吉經理每届一年臣將實在羡餘數目摺奏一次庶有稽核其什物盔甲帳房等項製完之日臣逐一開銷摺奏竝將以後節年羨餘作何解交存貯之處一同請㫖再查紫荆馬水白石沿河等關口原係正定鎮所轄地方康熙二十七年改隸巡撫今不屬臣管轄兹䝉硃批合併奏明又臣查營中凡霜降開操祭旗揚兵犒賞以及雜項公費亦繁不能在在捐僃正定新設鎮制公費名糧尚未酌定俟抽撥兵丁到日容臣再為斟酌另摺奏明謹奏所奏知道了直隸今嵗盜案甚多畿輔地方尤為緊要可竭力嚴督緝捕巡防直隸正定鎮總兵官臣楊鯤謹奏為恭繳硃批諭㫖事竊臣前奏覆關稅羨餘摺内奉到皇上硃批仰見我皇上宵旰憂勤無時不以民生為念臣職任地方未能安民緝盜以致上厪宸衷惶懼汗浹寢食難安誠無地可以自容臣自抵任後查檢春夏以來盜案㕘劾疎防即慮地方宵小滋害屢經出示各汛竝飭所屬協營務必實力防範設法巡緝復又製就大小巡哨令旗分發各屬嚴督在汛弁目逐日持旗各於所管之道路村莊來往遊巡臣復委員總巡各屬務期盜息民安至於積盜窩家率與有司之慣捕人役潛通線索若非捕役實心訪拏驟難得其巢穴是以臣竝移咨督臣李紱飭行文職嚴拏窩盜所有緝獲賊犯亦必嚴究根底研審確情不得規避處分巧為諱飾以竊完案庶盜賊斂跡今兩月以來民間秋稼登場鼠竊狗偷之輩漸覺稀少但轉瞬入冬廵防更宜嚴密臣惟有殫心竭力督率弁兵不敢一時弛懈以求仰副靖盜安民之聖心而已所有欽奉硃批原摺理合恭繳謹奏弭盜自當以訪拏窩家為要風聞真定縣有一積窩朕已密飭步軍統領專差番役往拏爾宜留心伺察蹤跡從來武弁每推諉捕役而文員又以緝拏為兵弁專責似此皆非實心辦公之道果肯實心任事文武各有責成豈容推卸嚴督緝拏不如密察巧捕方有實濟此事密之毋將朕諭宣露於外直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊正定城垣所在倒壊荷蒙皇上垂念右輔重地遣派章培基潘沅父子等效力修理其一切城工交臣監管臣因工程浩大智識短淺今效力人員雖未到工所有城工情形及修理事宜謹先逐條繕摺并繪圖恭呈御覽伏祈聖訓指示庶臣有所遵守至於臣係奉㫖督修之員自宜秉公無私於動工之日即率同在事人員䖍詣隆興寺焚香設誓如有利慾薫心希於此中染指分文以肥私槖者國有顯戮諒無所逃其效力人員更應仰體皇上宥罪鴻慈竭力報效倘或支飾推諉巧計延挨臣即指名嚴㕘為此繕摺恭奏伏乞睿鑒謹奏工程可以將就處固不必糜費但增培單薄安能久固不可草率從事惟圖目前之節省總期適中得當一勞永逸方好所奏各條并圖樣俱悉至於此中染指等語許國桂黄廷桂二人公私之報應判然可鑑諒爾斷不肯負朕也直隸正定鎮總兵官臣楊鯤謹奏為奏明關稅羨餘銀兩數目事竊臣因標下兵丁盔甲帳房多係朽敝無項捐製請將所轄固關等五處營僃所管抽收稅羨歸公製辦軍裝當於七月内具摺奏明荷䝉硃批臣即檄令五關營遵照去後兹據各闗營按季解到雍正四年分秋季八九兩月冬季三箇月除額稅正項外共解餘羨銀二千三百兩零臣俱批發中軍遊擊胡兆吉收貯現在製僃兵丁盔甲帳房俟造完之日銷算清楚另摺奏聞再臣更有請者查五關營所解餘羨未及半載已有二千三百餘兩臣標製造兵丁盔甲帳房諒已足用不須再為存貯今自雍正五年為始每嵗解交餘羨約計可得四千餘兩無處支用似應仰祈聖恩嗣後每於年終准令解交内廷充用可否允行伏乞睿鑒謹奏既無處支用當與督臣李紱商酌以為煙墩戍兵住房之需或留為幫貼修城之用俱可爾之經管屬員亦令其少得從容爾更酌量有何動用之處具摺奏聞解交内廷充用之奏殊為大笑話矣不可直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊正定城工情形修理事宜經臣具摺奏明兹於嵗前十二月二十二日有潘沅之子潘景儀到工臣即於二十三日傳至公所相見令其星速預備磚灰物料春融即應興工復於二十八日將城工西北二面通共計長一千八百三十六丈一尺其中坍塌坐裂鹻壊之處逐一指明交與修理但該員到工之後臣留心察看觀其少年虛浮僕從一二人寓所又不嚴密誠恐該員攜來效力貲本防範不謹致啓宵小覬覦之心因令營員會同正定知縣親詣該員寓所面商令將貲本交貯縣庫俟動工之日支用以免疎虞當據該員面稱伊雖效力前來實係素手竝未攜帶分文無物送貯等語臣現今委員節次催辦物料該員尚無預僃合併奏明伏祈皇上睿鑒謹奏亟加嚴催如再諉延即據實題㕘交部重處直隸正定鎮總兵官臣楊鯤謹奏為奏明事竊潘景儀玩誤城工經臣㕘奏業已遵㫖解交刑部監禁在案伊父潘沅於本年四月初五日解到工所臣即飭令多僃物料上緊修理當據報稱於四月十一日興工臣查其所僃磚灰零星買辦每日用大小工三十餘名尚不能接濟應用臣再四嚴催潘沅始猶支吾今則堅稱實在無力修理等語似此動工伊始便已推諉臣何敢聽其延挨除巳另疏題㕘外相應奏明謹奏知道了應㕘劾者直隸古北口提督臣楊鯤謹奏為奏明事竊臣荷䝉天恩補授提督所有古北自來傳留親丁步糧六十分臣謹照例存留養贍家人長隨此外協營臣不敢私占一分名糧亦不敢需索絲毫規例相應奏明至於臣標兩營舊有斗子一項嵗收所入可得四百餘兩留為營中公用前提臣宋可進奏請禁革另於兩營請設公費步糧十四分奉㫖斗子一項年深日久仍留與營中公用公費糧亦准行欽此仰見我皇上聖明洞鑒無㣲不照而宋可進莅任十日旋調甘州提督未及細查營中經費又復回奏請將十四分公糧停止設立在案惟是提標兩營每年春秋二季兵丁應僃火藥鉛彈兩次開操揚兵犒賞霜降迎神以及修補廨署軍器一切雜用等費皆係不能裁節之項臣莅任古北預將每年所收斗錢數目與兩營應需公費銀兩通盤核算實有未敷謹將前後情節僃細陳明可否准於斗錢之外仍於兩營一千四百名兵内共留步糧十四分賞給臣標添辦公費庶營中經用有資天恩出自聖慈為此繕摺具奏伏乞皇上睿鑒謹奏所奏是知道了中軍㕘將等員一摺交部議行直隸古北口提督臣楊鯤謹奏為恭進瑞穀事竊臣古北所屬地方今嵗秋稼豐稔倍常兹於八月十六日據外委張福秀呈騐大店子一帶所產瑞榖雙穗三穗者到臣臣敬謹封固恭進御覽為此繕摺謹奏穀有至十三穗十五穗者矣此雙穗三穗何足紀異耶直隸古北口提督臣楊鯤謹奏為冒罪瀆陳仰懇聖恩事竊臣俯查定例凡武職調任一次即准加銜一等臣由雲南曲尋鎮荷䝉天恩特調正定新設總兵似與緣事離任調缺者不同臣當即呈請兵部照例加銜部議以臣係奉㫖另用未准加給今臣過邀恩眷擢陞古北提督任内所領劄付仍係副將職銜用敢不揣冒昧仰懇皇上天恩特施異數量准加銜可否出自聖慈微臣不勝惶懼悚慄之至謹奏楊鯤似應予加銜該部查議具奏直隸古北口提督臣楊鯤謹奏為詳陳提塘虛冒尅減之弊以清積蠧以肅功令事竊臣查得直隸提塘抽調臣標所屬密薊永昌四協營守兵共二百六十二名安設古北所屬地方沿途傳遞京報公文名曰京塘撥兵葢自古北設鎮之初便巳安置此項兵丁統歸提塘管轄永不赴營查點凡更替放餉均係提塘之事竝不經營員之手其撥兵何人設撥何處差使有無苦累餉米曾否支給營員總不與聞臣抵任後選差幹練千把會同按撥密查所有二百六十二名兵數之中查出該提塘虛冒無人者五十名其餘所設現兵半皆雇覓鄉民頂替每季散給餉銀每名俱各尅減自二三錢起以至二兩二三錢止多少不等約計每年侵蝕銀兩不下一千三四百金蠧餉病兵莫此為甚臣愚以為提塘之設不過令其齎進本章投領部文而已所有臣標各處撥兵相應停其管轄聽臣責令密薊永昌四協營各於該管汛地及應設之處酌量安設彼此通融接應傳遞不過一百五六十名即足布置餘皆撤囘原汛以實營伍其餉銀米折各該營按季差官派撥親自給散即令就便查驗如此則虛兵冒餉扣尅頂替等弊咸可杜絶矣至於提塘料理本章部文既有奔走之勞且每年送看報鈔不無紙墨之費臣擬於四協營中每年各捐一百二十金共給銀四百八十兩資其養贍以便驅使抑臣更有請者臣標撥兵如此則直隸各鎮協營其抽調者亦自不少倘可盡行改歸各營自為安設彼此鄰汛通融傳遞足以省兵清餉甚似有益臣雖非節制全省提督但忝為各鎮表率不敢以越俎自嫌相應一併冒昧陳奏是否允協伏乞皇上睿鑒謹奏觀爾料理諸事頗屬公直今命爾節制全省矣其通盤籌計摺奏以聞但一切不可過刻惟務秉公酌中整飭廢弛剔除陋弊而已何必多事搜求耶直隸全省提督臣楊鯤謹奏為奏明宣鎮火藥銀兩事竊宣化鎮臣李如栢奏將該鎮製造火藥羨餘銀兩歸公存貯一摺奉㫖令與臣商酌欽此移商到臣臣查得宣鎮每年演放礮位共需火藥三千二百餘斤舊係宣府所屬各州縣輪流製造開銷正項銀六十二兩嗣因州縣造不如法恐誤軍需每藥一斤折銀一錢六分共折銀五百一十三兩除開銷正項銀六十二兩外餘銀係州縣賠墊交納宣鎮衙門自為製辦然此項火藥計費工本實止用銀一百二十八兩有零其餘銀兩向皆歸入鎮臣由來已久今鎮臣李如栢以雍正五年所有羨餘業已捐造鳥鎗請自雍正六年為始俱歸公存貯原為營伍起見但臣細查州縣解交火藥銀兩現今俱稱不便仍願輪流自辦以免賠累臣仰遵聖訓事事期於秉公何敢因營伍沾有羨餘之利而令州縣長貽賠墊之繁用是詳為籌酌莫如將前項火藥查照往例咨明督臣准令州縣照舊輪辦方為妥協但恐文員自製而營員又指稱造不如法致有刁難亦未可定臣擬於每年製火藥之時即令宣鎮委員監同製造庶無藉口如此則營中之火藥不誤而州縣之積累亦除所有李如栢請將羨餘存貯之處似可毋庸置議也為此繕摺謹奏覽爾此奏甚公與該督酌議妥確而行可也直隸全省提督臣楊鯤謹奏為酌請廢弁入伍以慎人才以勉後效事竊查千把一項原係微員然兵丁出身行伍由此進階多有洊厯提鎮大員者是誠鼓舞戎行造就人才之路也但其職銜卑小易遭斥革内中如有因公罣誤而平日為人勤慎有志向前弓馬漢仗又皆優卓者槩以緣事被黜營中拘於廢弁不便復令食糧遂至閒棄終身殊為可惜臣仰體皇上慎重人才至意請將嗣後革職千把内遇有因公罣誤平昔勤慎才技優卓者仍准令收伍食糧俾得再圖進身之路庶人才不致淹沒而此輩感激思奮益必勉圖後效矣臣因人才起見可否採擇伏乞皇上睿鑒施行謹奏此奏得理可嘉之至朕忻悅覽之已有㫖諭部矣直隸全省提督臣楊鯤謹奏為遵㫖商酌仰祈睿鑒事竊照正定鎮臣張起鵬因鎮標千把兼防二三州縣不等請於馬兵内照運糧隨幫之例選委署把總協防效力每署把總一員該鎮願將親丁糧賞給二名以資養贍等因具摺陳奏奉硃批朕意只在得人實力奉行不必只管更張再與楊鯤商酌欽此密商到臣臣悉心籌酌查正定千把兼防二三州縣者地方固為遼濶但每州縣之中均有外委百隊帶兵協防今於千把外再設署把總既非經制之官仍與外委無異添設殊覺重複伏讀硃批上諭洵為至當不易臣等提鎮果與將僃千把殫心實力各盡職守地方自獲寜謐似不必過為瑣瑣更張也再該鎮又稱深州地方向有右營守僃駐防彈壓此一汛應令守僃為專汛等語查守僃為一營中軍凡兵馬錢糧皆當綜核操練今若令其專汛一州是千把反有二三州縣之責而守僃竟可安坐無事亦不便聽其如此曠閒理合具摺奏明伏乞皇上睿鑒謹奏所奏甚與朕意相合知道了保題守僃一摺交部矣直隸全省提督臣楊鯤謹奏為奏明事竊查虛兵冒餉營伍首禁臣凜遵聖訓屢行嚴飭今有昌平營㕘將巨有徳於額食親丁糧二十名之外違例令其家人占食馬糧一分守糧六分又娶民人楊姓之女為妾將妾之父兄頂名食糧以資養贍臣察訪正確旋據該將亦行具禀自首前來查巨有徳料理營伍頗為練習今就事指㕘似非深體聖心容其改悔自新之至意但臣近於欽奉上諭事案内將臣有徳填註考語列為一等會同督臣宜兆熊等咨送兵部添寫履厯進呈在案今該將有干功令臣何敢瞻顧緘黙相應預為奏明自行檢舉請將微臣冐昧列等之處敕部嚴加議處至於巨有徳前由守僃荷䝉皇上特用㕘將自應感奮圖報似此居官不潔實為有負聖恩應否聽臣繕疏題㕘竝祈睿鑒批示遵行謹奏姑寛題㕘嚴飭伊改過自新至於開列等次已有㫖諭部俟部文行到遵㫖改列咨明可也直隸全省提督臣楊鯤謹奏為撤囘京撥兵丁以實營伍事竊臣前奏直隸提塘抽調各營兵丁一摺奉到硃批臣即加謹籌酌務期省兵清餉因查外省塘兵俱各兼送武職文報通融接遞從無各營專設送文撥兵之事今直隸沿河均有塘兵若亦令其兼送武職文報洵屬便宜所有京撥兵丁自可一槩撤囘臣隨咨行各鎮協應照此查議去後陸續准據鎮營查覆前來除正定宣化二鎮保定紫荆馬水沿河白石等營原無京撥名色無庸置議其津鎮雖有抽去京撥兵五十八名為數無多且有現在營中支餉點驗者亦不必另為更定外惟有提屬密薊永昌四協抽去京撥兵二百六十二名馬蘭鎮屬抽去京撥兵八十名兹據該鎮協營俱稱奉查塘兵兼送武職文報儘可通融接遞京撥可以節省歸營極為有益今已按名撤囘均於本年四月初一日招補入伍等語據此以上共撤囘撥兵三百四十二名但提塘供送四協營報鈔均需工墨齎進本章竝投領部文亦資奔走不可不酌給工食臣請即於四協營撤囘之撥兵中存留三十二名不必招補每年約得餉銀四百八十兩以為賞給提塘工食之用如此庶提塘得以竭力辦公而糧餉亦不致多占虛糜矣相應據實奏明至於存留名糧賞給之處是否可行伏乞聖訓指示謹奏此事料理得中殊屬妥協知道了直隸全省提督臣楊鯤謹奏為奏明事竊臣前在正定總兵任内查出所屬固關龍泉倒馬插箭茨溝五關營抽收䭾稅均有餘羨經臣具摺奏請歸公製辦軍裝在案計自雍正四年八月初一日起至十二月終止五關營解完此五箇月正額共收餘羨銀二千三百兩有零臣因念五箇月所收餘羨如此以此計算每年五關營除正額解費人役飯食之外約計餘羨可得五千餘兩臣於雍正五年五月内陞任古北各關稅務交鎮臣張起鵬接任經管兹臣節制全省又據各關營報到雍正五年四季分馱稅正羨數目到臣當經詳細核查五關營除解正額外共計一年連閏十三箇月止收餘羨銀二千一百四十六兩較臣任中五箇月所收之數尚少銀一百五六十兩且此二千一百四十六兩之中其春季仍係臣任内經管曽收過餘羨銀九百五十六兩有零夏秋冬三季張起鵬經管實止收過餘羨銀一千一百九十兩是其三季所收之數止畧浮於臣一季所收之數在張起鵬即無通同侵蝕而其漫不稽核博取寛大之名致有隱匿之弊臣實不能代為置辯矣再五關營中除茨溝餘羨無幾不議外查雍正五年四季分固關㕘將傅為斗共解過該關餘羨銀九百一十九兩零實係儘收儘解其龍泉關遊擊牛洪解過該關餘羨銀三百二十兩零雖亦不無侵蝕尚自有限惟有都司曹維坤所管倒馬關等處來徃馱貨最多每年所出餘羨可得二千餘兩今查該都司所報雍正五年四季餘羨止五百七十餘兩顯有侵匿情弊又插箭嶺餘羨銀兩雍正四年五箇月解過餘羨銀四百一十九兩零今雍正五年四季守僃魏應政止解餘羨銀二百九十三兩零侵匿亦屬過多似此隱蝕劣員均難姑容所有都司曹維坤守僃魏應政應否據此題㕘伏乞皇上睿鑒批示遵行再曹維坤係貴州武舉曾充蔡珽長隨合併奏明謹奏㕘奏張起鵬之處甚是已有㫖矣如此毫不瞻顧秉公無隱朕實嘉之此摺所奏皆汝分内應辦之事看其中情有可原人尚可用者嚴加訓飭以戒將來其情由可惡如曹維坤輩即行具疏題㕘可也直隸全省提督臣楊鯤謹奏為恭謝天恩事竊臣家人等於四月十五十六兩日齎摺回敬捧皇上賞賜御磁一匣岕茶二瓶到臣當即出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖伏念臣質同瓦賤材似樗庸何期兩日之間疊拜九重之錫感洵莫罄報實無由臣惟有凛簠簋之明箴傳家世寶滌心脾之積垢浹髓淪肌而己為此繕摺恭謝天恩伏乞皇上睿鑒謹奏覽閱爾保舉爾子楊先榮之摺朕甚嘉悅如此方為能體朕心也從來知臣莫若君知子莫若父爾必深信無疑始敢具保諒爾子必不負朕調來一看自知爾若於滇省未置產業何不令爾子移家北來朕欲另用爾子於别省俟爾寄信往滇遲一月後朕然後降㫖否則恐爾家信反後期矣直隸全省提督臣楊鯤謹奏為奏聞事竊臣於本年八月十三日據分防虎什哈把總于彥禀稱有一人約年三十餘嵗來跡可疑歇在白岩子三旗王姓人家把總令房主密察動靜據房主口稱訪得此人是巡按老爺姓陶又聞有一位姓苗的早分路往歸化城去了昨日有報子來回話云苗老爺吩咐各人奏各人的事等語隨後陶巡按將把總傳去吩咐聞你已經知道我了恐你禀報提督竝十汛官員知道不便你切不可洩露等語把總理合密密具禀等情到臣據此臣查巡察順永宣等處御史臣苗壽陶正中等現由居庸關一路巡視前進何得獨行出口必係假冒當即密遣弁兵糚扮行客尾隨探聽防其遁逸一面差人星赴昌平打聽巡察經過信息去後又於十六日晚刻據把總于彥稟稱陶巡按於十四日晚騎馬到營房要看兵射箭吩咐兵丁許多查汛當差的好話把總送囘他去又聞房主王姓有分家聚單一紙上面有他的圖書把總將此聚單誆出細看字跡圖書甚有可疑又據房主口稱過了十五就要起身進京等語同時又據昌平營㕘將巨有徳禀稱查有巡察御史苗陶二位於本月十二日進居庸關今現按臨昌平卑職俱經謁見等語據此則口外陶姓巡按實係惡棍充冒隨即遣員飛拏當於十七日晚將假冒巡察之犯人談仲武竝窩家王徳隆并子王永福一併押解到臣衙門除將該犯并窩家先行解送刑部究審尚有該犯結拜之張秉琯報子梁興旺亦經密差查拏獲到力行送部外臣謹繕摺奏聞伏乞睿鑒謹奏查拏惡棍甚屬可嘉據奏從前來跡即應查拏有何可疑縱係真巡察如此舉動亦當㕘究但不知此惡棍假冒巡察意欲何為曾訊供否直隸全省提督臣楊鯤謹奏為奏明事竊查津正宣三鎮派出操車兵丁經臣摺奏請將敎習三等侍衛馬國竒藍翎陳如雄劉順每鎮分送一人前往督率操演去後兹據三鎮咨呈俱稱所派車兵今已學習熟諳除將各兵發囘原營外所冇教習侍衛藍翎相應咨囘等因到臣臣查各鎮應操車兵既已遵式演熟其敎習侍衛等自當仍送囘京惟是臣見馬國竒陳如雄劉順三人年力俱各精壯敎演車兵亦復勤敏有法臣為營伍得人起見可否仰懇天恩請將馬國竒等三人賞留臣標其三等侍衛遇遊撃缺出藍翎遇都守兩缺出照例以次題補將來或有驅遣之處庶幾駕輕就熟可收臂指之效矣謹奏此三員原係侍衛中之好者仍遵前㫖行直隸全省提督臣楊鯤謹奏為恭懇聖慈賞留幹員事竊查正定鎮屬廣平營守僃党彥人材精健諳練營伍又正定鎮標左營千總王帶廵查道路勤力小心人亦熟練可用兹因肥鄉縣崇明寨村外賊犯張瞎掄搶奪賣麻人錢文一案肥鄉專汛把總鄭觀諱匿不報業經據揭題㕘署廣平守僃事千總王帶現任廣平守僃党彥失於覺察亦經附㕘在案今臣接到部文所有守僃党彥署守僃事千總王帶均因此案降調伏查定例所在臣亦何敢囘䕶竊念該弁均係幹練勤敏之員因公罣誤情有可原用敢仰體皇上愛惜人材至意恭懇聖慈可否仍將党彥王帶准其降調仍留原任俾圖後效抑或賞給臣標遇有𦂳要相當之員缺另為題補為此恭請訓㫖施行謹奏照提督楊鯤所請准仍留原任該部知道直隸全省提督臣楊鯤謹奏為奏明事竊今嵗直隸年景十分豐稔而口外各處收穫尤倍於常惟是熱河十汛旗民雜處環繞皆山臣從未一至其地所有汛防要隘必得親身查閲方能周悉情形且樂嵗豐裕之秋臣為遍厯閭閻亦可少資彈壓但事關出口巡查未敢擅便理合奏明伏乞皇上睿鑒施行謹奏爾所屬營汛在彼應當前往巡查直隸全省提督臣楊鯤謹奏為酌調幹員以禆營汛事竊通協所屬張灣一營水陸交衝守僃一官既有防範操練之責更有催趲漕運之任必得勤敏強毅之員方可肆應無誤現今出缺應聽部選誠恐人地非宜未免又滋岐誤臣查有廣平營守僃党彥歴任通協天津千把熟諳催漕勤於捕緝以之調補張灣營守僃洵為駕輕就熟可收實效所遺廣平營守僃員缺汛地遼濶稽察匪易仰懇皇上天恩俯賜揀補一員更於營伍有益為此繕摺請㫖謹奏以党彥調補此缺洵屬人地相宜照楊鯤所請行該部知道直隸全省提督臣楊鯤謹奏為仰請簡補守僃以收實效事竊黄花路守僃李漢魁尅餉虛兵不理營伍現據查出劣蹟經臣叠疏嚴㕘在案伏查該路四面環山邊隘險要當此劣員偷安侵冒之後非得才堪料理潔巳自愛之人無由整頓改觀以收實效兹臣查有標下左營千總韋正年力精壯技藝優嫻而且勤慎自持辦事明白似於黄花路守僃一缺可稱人地相宜仰懇聖慈將千總韋正恩准臣送部引見其可否簡補黄花路守僃之處天恩出自聖裁謹奏將要地需人情由聲明送部引見候朕酌定直隸全省提督臣楊鯤謹奏為請㫖事竊照總兵額食親丁糧六十分此雖定例所在然必因地酌量先圖國事後計身家原非必不可少之數而斤斤求盈以期滿願者也即如正定一鎮設立伊始臣莅任之初查悉汛廣差繁誠恐多占一糧即少一兵之用是以只將副將原食額糧三十分留為養亷不敢分為多在臣家口百餘茹飯食蔬亦未嘗以三十分見少也昨臣會審赴涿適遇新任正定鎮臣魏麟路過相見面向臣云我食親丁名糧不足定額我家口四十餘人必足六十分方可養活等語臣答云我在正定時三十分糧曽養百十餘人今貴鎮四十餘人反不能養活耶若必要食足六十分我不敢擅便非據實奏明不可臣於彼時心甚薄之兹於十月初四日又據魏麟咨呈内稱本鎮恭赴圓明園䝉恩召見賞加養亷糧三十分連舊有糧共六十分應俟開除空缺陸續補完等因前來因事關開食兵糧臣未奉有上諭不敢遽為咨覆相應將前後情節據實繕摺請㫖謹奏親丁名糧原係朕詢及賞加非魏麟自請也凡為提鎮者果能守此數十分名糧知足而不分外貪求則亦可告無過六十分糧賞伊用度再觀伊作何施設行為朕所重者在彼不在此也直隸全省提督臣楊鯤謹奏為請補都司以勵實心之員事竊查倒馬關都司一缺經徵䭾稅須操守亷潔方於國課有益前任都司曹維坤抽收雍正五年馱稅經臣以侵匿額外餘羨糾㕘在案所遺員缺當委命往直𨽻以都守兩項補用之藍翎黄正前往署理該員到關任事即將曹維坤任内侵匿實據徹底查出尚有隱占名糧亦俱指報不諱署事半載以來辦理勤敏臣核其所報正羨課稅儘收儘解分文不染洵屬實心任事其倒馬關都司雖經部選有所有部選之都司冦廷輔臣俟其到直再於通省都司缺内酌量請補一轉移間可收得人之效矣謹奏照提督楊鯤所請行該部知道直隸全省提督臣楊鯤謹奏為查明通省墩塘數目條陳愚昧之見應否舉行恭請聖裁事竊惟直隸一省地稱首善萬國車書咸來會集所有沿途墩臺塘房不但嚴謹斥堠所以肅清畿輔抑且飾觀壁壘正以崇壯帝都也我皇上明無不照洞悉直隸墩塘所在頽廢武職力難興修有司虛應故事兵丁無寜居築舍無成功者非一日矣臣於去冬進見荷䝉聖主垂詢未得詳細陳奏今謹將通省墩塘查明數目分别衝僻酌量應修應省之處調停興工保固之法以及責成交代竝倡率種柳各事宜逐條繕冩清摺恭進御覽臣愚昧之見總期一勞永逸不致虛糜錢糧但所費浩繁未便輕舉是否可行仰冀聖訓指示謹奏已交怡親王大學士詳議具奏矣直隸全省提督臣楊鯤謹奏為署鎮不勝重任仰祈聖裁事竊查直隸四鎮之中惟天津控要海陸幅員最廣漕運往來旗商雜處必得嚴明幹毅之鎮臣以為表率方於重地有益臣查署鎮張三讓識闇才淺凡遇將僃禀白公事茫無主見不能決定機宜訥訥在口終欠明白所屬員弁均無敬憚畏服之心又該鎮於本年正月内散放春餉竟將標下三營步兵每名扣銀六錢二分製辦各兵號衣竝不軫念窮兵艱難致多嗟怨兹因臣有聞見始將所扣銀兩於二月内復行散給殊非實心急公之義臣思鎮臣關係封疆天津實屬要地合無仰懇天恩另賜簡用賢員以資料理張三讓仍令回原任庶巖疆不致貽誤矣為此繕摺謹奏所奏是張三讓實不稱職俟斟酌得人時有㫖直隸全省提督臣楊鯤謹奏為微臣受恩愈厚圖報彌殷俯竭愚誠仰祈睿鑒事竊查直隸一省蒙我皇上垂念政務殷劇旗民繁雜故總督設正協兩員以資辦理無非因地制宜之良法也臣質庸材菲仰荷聖明簡署除現在繕疏恭謝天恩竝報起程日期外惟是懼不勝任感悚靡寜伏念有督臣劉師恕共相助辦心力可分良多欣願但臣素性介直事無回䕶抵任之後止知矢報皇上天恩顧忌瞻狥萬不敢有誠恐機務繁多臣等雖不敢不盡心公辦然意見難以相同則遇事不無踟蹰賢愚各有鑒别則用人恒多牽顧利害既有分責則行止必多推諉勞怨不肯獨任則是非兩有遷就况臣兼辦提督事務胥吏兵役各有闗防不能同居一署應辦文案兩處送閲恐有乗隙漏泄之弊屬員分頭禀話來往傳聞亦難商訂畫一事事預籌均慮首鼠臣若避嫌隱黙以致臨事岐誤在臣戴罪何辭惟是上負聖主倚任之重臣益不能自容於世矣倘䝉皇上垂念總督重務宜與專責臣雖駑駘衰鈍自當竭蹶奮勉以期集事不刻求不姑息秉公持正奬勵人才如有擅作威福恣意自便之處聖明逺照無遺咫尺何能遁免其有事體重大知識不及者臣即具摺恭請聖訓以便遵行臣以任大責重期盡血誠謹將愚昧之衷據實密奏伏乞皇上睿鑒臣無任悚慄屏營之至謹奏覽所奏足見一片誠實報效之心深為嘉悅朕亦正有此意但地方事務頭緒殷繁初到未必即能周悉且協同辦理月餘候朕另有諭㫖爾來京見朕再赴新任署理直隸總督事務提督臣楊鯤謹奏為奏明盤查藩庫事竊查督臣莅任例應盤查司庫臣於本月二十三日公同協理督臣劉師恕親往布政司衙門將庫貯一切正雜錢糧共銀一百四十餘萬兩抽鞘彈兌每百兩元寶内短銀自一錢至二三四六七八錢不等詰問楊紹據稱凡一應收兌錢糧向係庫大使執平彈兌訊之庫大使龎汝霖自認不辭明有以輕報重朦混收兌營私肥巳之處臣即將龎汝霖摘印發縣收覊隨即委員前往龎汝霖衙門查出現銀一千九百餘兩金四兩有奇并借給各舖户銀三千兩此外尚有銀器衣服等項臣俱一併飭交保定知府李正茂分别貯庫其缺少銀兩細數俟新任布政司王謩到任再令逐一彈兌明白轉報外查庫使㣲員耑司收放而龎汝霖敢於朦混蓄有家財似此營私敗檢之員臣實不能容其安享楊紹職司錢糧不能察覺庫使致令欺蔽洵屬誤公除現在繕疏一併嚴㕘外臣謹據實奏明伏乞皇上睿鑒謹奏紏劾甚當王謩乃一幹員但慮其科甲習氣未除不能殫心竭力以任事耳於伊抵任後其再三朂勉之如有因循瞻顧沽名釣譽之處密奏以聞署理直隸總督事務提督臣楊鯤謹奏為仰懇聖恩俯准賞補守僃事竊查直隸督標右營守僃現今懸缺臣抵保定閱看督標兩營兵丁技藝生疎急須訓練非得敏幹之員無由整頓兹臣查有密協右營千總王之琳辦事向前熟諳營務現今隨臣在保其於督標右營守僃員缺足稱人地相宜以之補授必收臂指之效用敢仰懇聖慈將王之琳准臣送部引見可否簡補督標右營守僃之處天恩仍出聖慈為此繕摺謹奏王之琳照該督所請補授仍著來京引見該部知道署理直隸總督事務提督臣楊鯤謹奏為奏聞事竊查直隸地方土脈堅厚今嵗届春以來雨雪調暢昨三月初一二日京北永宣等處復降瑞雪自一尺以至二尺不等京南各府時雨普沛均報霑足土膏既融民事畢舉所有通省雨雪霑足情形理合具摺奏聞謹奏但能以忠誠上對彼蒼自無不垂佑之理期與爾共勉之署理直隸總督事務提督臣楊鯤謹奏為恭謝天恩竝懇聖慈事竊臣次子千總楊旭前因俸滿經臣具摺奏請仍以千總留標奉硃批送部引見後朕再賞與汝欽此欽遵當即給文赴部兹於三月初九日荷䝉特㫖補放廣東提標後營守僃聞命自天感激無地臣隨恭設香案望闕叩頭謝恩訖伏念臣子豚犢菲材渥膺寵眷舉家身世捐糜頂踵未足仰酬萬一在臣子年力及壯近地逺省無非竭蹶犬馬以圖報稱臣雖至愚豈敢留戀䑛愛之私但臣前次具摺請留標下實因臣節制全省事務繁多遇有緊要行走之地驅遣臣子堪以信任分身今臣兼署總督益藉指臂合無再懇聖慈俯將臣子仍准賞與或以守僃職銜留標效力或於就近各營守僃缺出令臣題補則臣益仰戴天恩於無既矣可否允行伏乞皇上睿鑒謹奏此奏朕嘉悅覽之昨引見爾子楊旭朕一時未經思及遂補授廣東標下今己另有㫖矣君臣之間諸凡悉照此推誠無隱何事不可整理而猶慮或致參差也署理直隸總督事務提督臣楊鯤謹奏為奏明微臣養亷事竊查直隸總督正協兩員荷䝉皇上天恩每年准於充公耗羨内支銀一萬二千兩竝蘆商公費銀八千兩為養廉之用體恤優隆無不僃至臣又何敢過自矯飾故為損節但臣提督任内原有親丁名糧六十分去冬十月又荷聖慈賞添二十分將來補足共計八十分每嵗約得餉銀二千三百兩儘足養贍今臣署理總督事務殷繁未免多延幕客加以差遣使用需費倍多然臣量入為出每年止須蘆商公費銀八千兩便可應項内全數支訖合併奏明再有通省各官養廉臣檢查舊案有無多寡殊聞謹奏覽署理直隸總督事務提督臣楊鯤等謹奏為恭報雨澤沾潤及時麥苗生發極旺事竊查三月初一日通省得過雨雪經臣具摺奏聞兹於三月二十日竝二十一日保定府地方竝所屬附近州縣又得時雨入地四五寸不等麥苗發旺之際復經滋溉盈阡連陌蓬勃非常民間婦子靡不欣忭為此再具摺奏仰慰聖懐其别府得雨分寸容俟陸續報到彚摺奏聞謹奏深慰朕懐但毋稍涉縱恣惟益加誠敬以仰候上天慈愛直待秋成豐熟方可必也署理直隸總督事務提督臣楊鯤等謹奏為請㫖事竊照噶爾丹悖逆不法上干天討所有直隸一切應辦軍需臣等准到部咨現在加謹料理惟是宣府一路經由衝要若遇緊急軍務就近需用錢糧不可不預為籌畫伏查口北道庫除兵餉之外别無存貯一旦動支必俟該道移請藩司申請院示往返逾旬誠恐緩不及事臣等請於藩庫内將雍正六年充公耗羨項下撥銀三萬兩暫存口北道庫以僃不時之需動用即造報開銷不用俟事竣解還歸款似屬妥便但事關撥動庫帑臣等未敢擅專為此繕摺請㫖伏乞皇上睿鑒施行謹奏此番大兵出口沿途支放草豆等項朕特選差部院官攜帶庫帑前往協同地方有司料理口北道無須動用錢糧處所奏將耗羨撥僃之舉不必署理直隸總督事務提督臣楊鯤等謹奏為奏聞事雍正七年三月十二日據深州知州申稱學院於二月二十八日按臨深州連日考試辛勤因乏至三月初二日夜被賊從前門檻下挖孔進内盜去皮箱所貯衣服等物現在勒捕緝賊等情到臣竊思學臣駐劄處所關防嚴密兵役廵邏晝夜無間何致鼠竊窺伺得以從門孔進内攫贓雖據報稱被竊其中恐有諱飾情弊除一面批行按察司嚴查確情飭比捕役限日緝賊務獲竝差人密訪如係强刧容臣等繕疏另㕘外事關學臣衙署失事理合據實奏聞謹奏嚴飭緝捕務獲朕意大約是竊非强署理直隸總督事務提督臣楊鯤等謹奏為恭報通省雨澤情形仰慰聖懐事竊惟我皇上念切民依雨暘稼穡時厪宸衷今值春夏之交二麥在隴更望甘霖時沛兹於四月十七十八兩日之内陸續據順天永平宣化大名廣平天津各處報稱所屬各州縣衛俱於初十以後連日得雨自三寸以至四五六寸不等均慶普沾農人歡幸至得雨畧微之處查今春雨水調勻二麥見在秀發十日以内再沾㴻雨益可穩卜豐稔臣等一面據報正在繕摺恭奏適准大學士公馬爾賽等查問仰見聖懐廣運無刻不繫念民生所有四月初十等日通省得雨情形相應據實奏聞謹奏奏報如此怠緩甚屬不合署理直隸總督事務提督臣楊鯤謹奏為奏明前任督臣動存公用銀兩數目事竊查前署督臣宜兆熊協督臣劉師恕因總督衙門每年公用浩繁不能於養廉内支給奏請於雍正五年耗羨派提銀一十三萬四千九百六十兩之内撥出銀二萬四千九百六十兩以為該督臣等本年賞官犒兵公出盤費及額外工食繕書口糧等項種種公用所有雍正五年分週嵗共支動過銀一萬四千九百一十九兩有奇經該署督等於雍正六年四月内具摺奏銷在案外剰銀一萬四千兩零又經該署督等奏明留以為六年公用今臣於雍正七年二月到任准協督臣劉師恕將雍正六年分週嵗支用過公用銀九千六百四十九兩零又革職布政司楊紹任内複開盤費銀一百二十兩現在追補外實止存銀二百七十一兩零由布政司王謩核算明白摺報到臣除將雍正六年分前署督臣宜兆熊何世璂協督臣劉師恕等支銷過款項繕造黄冊進呈御覽外所有動存公用銀兩數目理合奏明謹奏據冊開署督協督已皆賜有養廉之資何得又於公用項内動支盤費至門吏執事夫役人等既有經制工食何以又於公用項下支給銀兩此四項不准開銷速於劉師恕宜兆熊名下追補還項另行造冊咨部存案其動支盤費二項亦令二人倍賠留充公用署理直隸總督事務提督臣楊鯤謹奏為請撥督臣衙門公用銀兩事竊查督臣衙門於雍正五年内䝉皇上天恩准於該年派提耗羨内賞撥銀二萬四千九百六十兩以為本年公用除前署督臣宜兆熊何世璂協督臣劉師恕等雍正五六兩年共計動支過銀二萬四千六百八十八兩有零經臣已於另摺分晰奏明今雍正七年分僅存銀二百七十一兩零臣查督臣每年賞官犒兵公出差遣盤費製僃火藥紙張轅門人役工食修理營伍助辦地方公事而典吏繕書一百餘人之額外飯食口糧尤為𦂳要葢必使之餬口足資方可杜其作姦滋弊以上種種需用均係不能裁減臣謹再四酌量伏查雍正七年提解耗羨内除撥給養廉平飯外應剰銀三萬四千九百餘兩臣請以二萬兩存庫所餘一萬四千九百餘兩仰懇天恩賞准撥為督臣衙門雍正七年公用并原存銀二百七十一兩零統於嵗底具摺奏銷如有餘剰留為下年公用是否允協伏乞皇上批示遵行謹奏汝之養廉仍遵前諭支取二萬兩為是至提督任内之名糧一分亦毋與魏經國魏經國乃從藩下歸旗賤品刀斧餘生不思實力報效一味柔善自便沽買衆譽大負兩朝厚恩之人姑試用於此任令其戴罪效力倘少有不妥朕必將伊重懲示衆汝應支養廉之資除用度外果有餘剰地方公務儘可捐助何必徒為無名之節省而人亦莫知汝之清儉也無庸矯廉當遵朕兩次批諭行將朕此諭亦令魏經國知之署理直隸總督事務提督臣楊鯤謹奏為酌定通省養廉繕造黄冊恭請御覽事竊照直隸各官荷䝉皇上天恩准於錢糧耗羨内存留養廉固已惠逮羣工優恤周至矣惟是前任督藩各臣酌派存留提解似尚容有意見以致多寡參差苦樂弗均又直隸順永宣三府向因額糧無多不提耗羨而順永宣之道府州縣各官遂無議給養廉亦覺豐嗇偏枯今臣與新任布政司王謩欽遵上諭秉公確議所有直隸通省耗羨相應一概提解司庫而通省各官養廉咸為酌定成規量其地方衝僻事務繁簡使有準則期得均平庶幾遵循可乆而聖慈普被咸在飲和食徳之中矣謹將各官養廉數目分晰繕造黄冊一本恭進御覽再除直隸州同州判外其餘州縣佐雜等官職微事簡所得薪俸足以自給無庸議及惟是遇公差遣不無車馬飯食之需既無養廉可支所當酌量道路時日給與盤費以勵急公者也合併奏明是否允協伏祈皇上睿鑒謹奏覽所定規則似屬妥協照數支給將原冊送部存案但縣丞以下㣲員俸薪不多似亦宜量與資助今計通省耗羨幾及三十萬兩除酌定成規二十二萬兩外尚有餘剰其縣佐等員或量給百金數十金汝等再加酌定奏聞署理直隸總督事務提督臣楊鯤謹奏為請㫖事竊查直隸各官養廉經臣另摺奏聞竝繕造黄冊進覽此外惟有直隸三路巡察御史滿漢共六員又巡農御史一員古北口驛站員外郎一員均係未給養廉者今臣所造冊内亦未議給但屢准各御史咨稱遍厯地方車馬多費而古北口驛站員外亦屢次詳請養廉臣以事屬創始未敢擅便應否酌量給與之處相應請㫖遵行為此繕摺謹奏巡察御史所經過地方朕已有諭㫖准用驛站廩給其無驛之處亦著該督檄行各州縣照驛地廩給供應何必又議給養廉至古北驛站自康熙六十年設員以來至今九載竝未聞有所缺乏何得冒昧詳請希圖僥倖甚屬卑汚無恥當傳㫖嚴加申飭署理直隸總督事務提督臣楊鯤謹奏為派提雍正七年耗羨事竊照直隸本年耗羨經臣與布政司王謩公同確議全數提解現於各官養廉摺内僃細奏明該臣查得雍正七年分直隸額徴地糧竝均攤丁匠共銀二百四十七萬二千六百四十八兩零内共應徵耗羨銀三十萬八千一百八十七兩零本年奉㫖蠲免地糧應蠲耗銀五萬三千二十六兩零實應徵耗羨銀二十五萬五千一百六十一兩零内給通省各官養廉銀一十七萬九千九百六十兩又應扣部餉平飯銀二萬五千五百九十二兩零又應扣司庫解餉每兩一分充公平飯銀一萬四千六百九十八兩零外實應剰耗銀三萬四千九百一十一兩零所有派提雍正七年耗銀數目理合奏明伏乞皇上睿鑒謹奏提解到庫給發之時再行據實奏聞署理直隸總督事務提督臣楊鯤謹奏為酌調同知州牧以收人地之宜事竊查保定府同知一官雖屬佐貳但駐劄會城終年奉差盤查勘丈事多繁要必得才器老成之員以應任使今之調補保定同知足勝驅䇿其現任保定同知甘請調補直隸冀州必能表率屬縣所有冀州知州見是否允協伏乞皇上睿鑒施行謹奏覽署理直隸總督事務提督臣楊鯤謹奏為恭報京南四府五州得雨情形竝二麥秀實分數仰祈睿鑒事竊查正順廣大四府竝定晉趙冀深五州暨所屬各縣地方均於四月二十七八兩日内得雨自二三寸以至四五六寸不等其四寸以上者均皆霑足其三二寸者上下濕土相接二麥秋禾咸皆滋潤有益所有各屬二麥現在具報十分九分八分七分收成不等惟磁州地方具報五分理合據實奏聞謹奏麥尚未收即定分數具奏甚屬糊塗硃批諭㫖巻一百六十八
