body:
  text: 欽定四庫全書硃批諭㫖巻一百四十二上硃批王柔奏摺湖南衡永郴道臣王柔謹奏為敬陳管見事竊臣一介庸愚知識短淺荷䝉皇上鴻恩由㕔員特授監司殊榮異數報稱無由謹將地方情形素所熟悉實有禆於國計民生者敬抒一得為我皇上陳之一六里之宜歸復也查乾州六里地方與保靖土司接壤乾州隔越窵逺鞭長莫及今保靖奉㫖設流臣愚以為六里地方宜歸保靖同知就近管轄一邉營之宜嚴密也查設立邉徼營汛必須聲息相通首尾聨絡今桑植添設副將而容美等土司未設流官保靖添設遊擊而永順六里未經措置形勢間隔聲氣難通臣愚以為宜將桑植副將移於容美而桑植分駐都司弁兵防守保靖遊擊改為副將移於六里永順分駐都司保靖分駐守備各帶弁兵防守一鳥鎗之宜勒繳也查沿邉紅苖習用鳥鎗凡偷刦牛畜悉恃為逞兇之具兼用以拒捕傷人臣請敕下鎮臣飭將備㑹同文員帶兵勒繳如敢藏匿即以私造軍器例立置重典庶頑苖懼威兇器既無地方得以安静矣一税闗之宜移設也湖南辰州徴收鹽木課税由來乆矣惟是該州地方山峻灘急每遇山水暴漲之時地棍通同姦商乘黒夜隂雨私偷過闗無可稽查臣詳查形勢常徳水勢稍平為南北要衝若移税闗於其地則偷越之弊可杜於税務大有禆益矣一厰利之宜亟興也湖南邉徼地方重山複嶺金銀銅錫鉛鐡所産者不一其處郴州桂陽雖開採黒白二鉛而其餘封閉者尚多人跡罕到之區率姦棍勾通蠧役強霸偷挖㣲弱窮民反徃滇厰傭工伏祈敕下楚省督撫查境内産礦地方令有司據實通報遴委能員按厰分管儘收儘解母俾土豪強霸姦民竊挖雖未必處處有濟但得一二有成效者則經費有濟數十萬失業之民得有營生之處矣謹奏王柔條奏各欵該督撫詳悉商酌應題者具題應摺奏者具摺奏聞内開採一事另有靣諭王柔之㫖湖南辰沅靖道臣王柔謹奏為恭謝天恩事竊臣山左庸愚才識鄙陋荷䝉特授監司重任抵楚之後涓埃未報復奉諭㫖著臣署理桑植副將同知各印務隨於六月初二日抵桑植任事接讀家信知臣父王􅕵奉㫖補授四川成都府知府繼又接家信知臣弟王機䝉恩命徃河工效力補用當即望闕叩頭謝恩伏念臣何人斯一家父子兄弟屢沐皇恩至優至渥理應奏謝復恐違例僭妄今因陳奏開闢苖疆要務特具摺叩謝天恩稍逹愚悃臣父子兄弟惟思竭盡駑駘努力勤慎以仰報高厚於萬一耳謹奏覽奏謝知道了竭力勉為之諸凡不可急驟太過猶如不及須緩緩次第為之汝所奏數摺均大有闗係之事候朕詳細酌定另降諭㫖至於未經歸流各土司盡數改歸之説則萬不可行再者汝任不比尋常道員而督撫止議給三百金殊屬不通之至朕巳諭與汝五千金養廉以為犒賞之需矣從來有非常之人方可建非常之業汝所奏事件亦非邁柱王國棟如此力量督撫所能督辦者倘或孟浪舉行而不能收功所謂畵虎不成其間闗係匪細目今且以安静處之不可輕躁當領悉朕意少待機㑹徐徐循序料理為上湖南辰沅靖道臣王柔謹奏為呈繳硃批恭謝天恩事竊臣前奏恭謝天恩一摺跪接硃批䝉恩賜五千金養廉以為犒賞之需復䝉恩賞哈密𤓰一簍臣何人斯屢叨優眷在臣初意本為受恩深重自應抒力報效故懇請借帑冀公私兩濟即䝉俞允巳屬望外乃竟䝉我皇上仁恩下逮命以五千金賜臣養㢘臣寤寐輾轉覺聖明之主臣今日涓埃未報復過䝉賞賚殊覺無地以自容矣跪懇我皇上念臣愚藎令圖報素志稍盡些㣲臣查現今桑植永保三司開修道路盖造營房以及差委官役犒賞正多需費臣即以皇恩所賞此項銀兩節省辦公俟事竣之日再具清摺聖明鑒原臣復敬繹硃諭凡事不可急驟太過猶如不及諸凡徐徐次第為之此誠聖主俯恤臣下因人教誨之至意臣惟有益加勉勵於桑永保新闢地方加意撫綏其於現今一切應行圖報蚤夜凛凛無刻或諼者耳所有奉到硃批理合恭繳謹奏覽湖南辰沅靖道臣王柔謹奏為密行奏聞事臣䝉皇恩於雍正六年五月内委署桑植副將同知各印務於六月初二日到桑任事於十一月十二日新任副將朱文華到桑臣隨即交代清楚因沿邉地方廣濶建治設營之議尚未奉行是以臣遂起程赴永順保靖各土峝一帯廵查於十二月初三日行至永順猛洞地方見有粘貼招子上書張宦為母聘醫施藥病愈免謝字様臣心竊疑此等作為或非善類因遂詢問該地土人據云近日見有四人沿村捨藥貼此招子臣即差役四處訪拏前後陸續拘到許英賢陳世名即盧安臣盧瑞臣劉英士盧安相趙張太等到案再三盤詰各取口供查該犯等俱係江西人前以代張易珍捨藥為詞後據許英賢供出兵書符咒喫血酒給官職分往各省招人等語臣見其供吐鑿鑿不禁寸衷憤激晝夜靡寜故於上年十二月二十日自永順起程於本年正月初八日星赴長沙回明撫臣隨令臣與布按二司公司審訊與前供無異繼經撫臣復訊竝發臬司審問許英賢俱改前供似屬虚實未定本不應冒昧徑奏致厪宸念但目前狡供恐事渉匪虚貽誤不淺臣何敢隠黙不言故特繕摺奏聞竝將從前㣲臣所取供单録呈矣謹奏此事據王國棟訊供後之奏似屬荒唐然遇此等事件寜防意外之虞不宜玩忽汝為國家留意訪姦不避多事之咎朕甚嘉之即使渉虚汝有何過案内如許英賢輩斷非安分良民察究亦不為寃抑無辜百凡處但能秉公為之朕保汝一切無礙也勉之湖南辰沅靖道臣王柔謹奏為密陳礮位闗係重大跪懇聖裁事竊臣署桑植副將時接署提臣劉世明來文催飭各將營查繳子母礮位等因臣身歴永順桑植土司地方訪有子母礮位隨即於沿邉各苗土嚴行查追是巳改之土司既製有此礮則其餘未改各土司諒必久已私相仿造又見提臣通行文内有福建提臣石雲倬曽奏哈密回子地方有子母礮二位目今復接提臣來文知兩廣督臣孔毓珣亦奏稱彼省有沙礮班鳩礮等器皆仿子母礮製法不過變換其名今奉諭㫖查繳子母礮直省無不凛遵盡行解部但能禁内地之不得存留而邉外之私相仿造實難以㮣禁是轉使利器在人深為未便臣受皇上格外天㤙特為沿邉沿海地方起見不敢隠嘿不言倘䝉皇上俞允飭各邉海鎮營仍留子母礮位令其據實造冊報部嚴飭各鎮營密藏軍器庫内至操演之時按名授給演畢即令貯庫不得暫㽞營外如遇有損壊待修之處令本營熟習打造軍器兵丁於營内密地修補毋使地方工匠幫造致令窺見製造之法其於邉外以及各土司有存子母礮位者嚴行查繳倘有隠匿以及私造者查出從重治罪則子母礮位既不敢遺留於邉外而内地得時加操演國家之軍威益藉以永壯矣可否准行伏候聖裁謹奏所奏是前此孔毓珣等亦有沿海地方仍留子母礮位之請現命三省督撫㑹同詳議俟議覆到日將汝此奏一併交部議行湖南辰沅靖道臣王柔謹奏為據實奏明事竊臣自上年抵任以來凡臣署錢糧刑名與闗税事件併永保桑三司地方籌畫建治立營諸務多奔馳於沿邉各處親身相度稽查小心謹慎辦理其於檢查一切巻宗與上下文移登記號簿不得不需人幫助今查有臣之舊屬原任辰州府瀘溪縣知縣陳煥係直𨽻宛平人因前署黔陽縣事為跟究三命一案錯誤被㕘革職又有原任黔陽縣知縣王作人係浙江錢塘人因伊前任知縣武宏登揑報皇賞老婦銀兩未經査明首出奉到部文以徇隠革職離任此二員者臣任乾州同知時素知其人尚明白老實今皆置身閒曠猶儘可為臣署檢案記簿之幫助臣意欲留用但廢員例應回籍臣不敢擅便故直抒愚忱跪懇於我皇上之前倘䝉俯鑒恩允所請則臣得資臂指之助庶易遂圖報之㣲忱矣謹奏陳煥王作人准王柔所請留用該部知道湖南辰沅靖道臣王柔謹奏為密行奏聞事竊臣上年十二月内廵查邉地於永順猛洞地方拏獲許英賢等一案當經録取口供一靣差役徧行嚴緝許英賢所供之許世基許世朝等臣隨即帶許英賢等星赴長沙回明撫臣臣於正月十三日在長沙業經繕摺奏聞至正月二十五日據前差役報稱於湖北散毛土司地方拏獲許世基盧士竒許世朝三名又於湖北蠟璧土司地方拏獲許世龍許世胄二名俱交辰州府沅陵縣收禁臣當即兼程回辰將各犯逐一審訊隔别研究僉稱許英賢惟呌伊等掛張宦為母聘醫捨藥病愈免謝招牌并説治好病不要錢與張天師傳名的話其餘許英賢所供别事堅供實不知情則許英賢前供出於一人之口又似無有確據但許英賢是否係聚集多人造言惑衆抑或果係實有别情事處各省難以懸定統俟各省督撫將許英賢供出之江自得張子明等拘獲訊問則虚實自明除將各犯移交按察司質訊相應將臣續獲各犯并訊供縁由具摺奏聞謹奏此案朕亦料屬子虚前諭甚明湖南辰沅靖道臣王柔謹奏為瀝陳㣲臣苦衷跪懇聖鑒事竊臣本山左庸愚賦性粗直自服官以來凡遇職守事件惟思實心辦理不敢稍存瞻徇之念與衆浮沉自欺罔上臣於雍正五年三月内䝉前撫臣布蘭㤗題委監收辰州府闗鹽木二税臣即將積弊悉心清查據實詳定木價則例凡遇姦商之偷闗漏税者悉行查追第往回千里不無逃脱之失臣輾轉無奈因查常徳河洑地方為商木聚集發賣之區故從前有移闗之請乃該地姦棍梁越生等恨積弊難容遂於署布政司事糧道楊馝處以臣虐民邀功紊亂成章粘單控告但臣前因苗邉事務曽赴湖北謁署督臣傅敏彼時見有楚省採買皇木底冊臣曾得一本因將冊内木價數目比量較對如伊粘單所開杉木圍圓三尺者􅑃稱向作價八錢經臣詳作價五兩近査採買皇木價值係發銀十兩以此較對則臣詳定之木價實竝未嘗加重倘非得採辦皇木底冊對證則臣清查闗税積弊之苦衷幾無以自明矣臣當將此案始末以光棍藐法嚇官阻税籲振國憲嚴除刁風事通詳各上司在案至今因原告首犯梁越生逃匿以致懸案未結不料竟滋物議反謂臣於辰闗加税聚斂恐以後闗税不足難於賠墊故請移闗常徳貽累他人等語及至督撫將臣條奏移闗常徳一事遵㫖飭行各府查議而常徳知府王葉滋武陵知縣陳沆等朦混揑稱謂移闗常徳則木牌自辰至常沿途發賣無從稽查因議移闗為斷難舉行之事巳經詳准近且以楊緒貽誤堤工他出即揑詳潛入桑植務使株連於臣以倖報復今楊緒幸已到案其曾否身到桑植審訊之下虚實自明假使楊緒潛逃無蹤則王葉滋等又豈不謂臣暗行窩隠臣即百喙恐亦莫辨矣伏念臣係皇上特用人員彼悠悠之口臣一身受之何足重輕而仰荷皇上千載之知遇殊覺上闗天顔跪懇我皇上立降諭㫖將臣革職并闗税楊緒兩案内之各犯一併解京敕下三法司質訊使臣果屬情虚即将臣加倍治罪以為負恩者戒如臣實係受人誣謗一經剖析不但臣之負屈得伸即内外臣工亦咸知我皇上竝非任用匪人嗣後㣲臣坦白報君之心亦得以竭力向前旁無阻礙矣臣不勝戰慄待命之至謹奏果若自信無慚悠悠物論一切不妨少若反躬而慊即辯亦何益百凡只求可以對天一秉忠誠為之人言烏足介意况事情經朕心目照鑒真偽自有判斷今閱此奏後定案反以為先入之言得力可惜朕一片公明之恩付之流水矣似此皆因不深知朕意所致耳湖南辰沅靖道臣王柔謹奏為敬陳末議跪懇聖裁事竊臣㸔得各地方凡有機密事情務須防閑謹慎勿使洩漏方克辦理有濟至沿邉土苖案件更屬𦂳要查土苗詭譎者多遇有事件發覺即勾引漢姦賄以重利多為散布潛往大小文武衙門探聽一切消息而大小文武衙門凡一應文移俱由書吏鈔冩即使釘封密差在書吏預受賄囑業將上下文移之辦理情由底稿暗通消息土苖得信先為布置非顯行抗拒即兔脱逺颺所闗匪細以臣愚昧跪懇我皇上敕下督撫提鎮通行所屬官員凡遇土苖機密事件許屬員暫且具密禀鈐盖印信釘封申報各上司即督撫提鎮與各上司有應行批飭之事亦暫用手札鈐蓋印信釘封飭發該管官員至於文武平行衙門亦以手摺鈐印知㑹總不得經書吏之手并徑用文書通行俟本案歸結之後再照手札與屬員禀摺按其年月另換文書粘巻存案庶苗土姦宄無從探聽信息承辦各官自得相機料理而案件不致難結矣是否可行伏候聖裁謹奏該部詳議速奏湖南辰沅靖道臣王柔謹奏為跪呈硃批感愧無地仰懇聖恩俯鑒事竊臣前奏辰州闗税與楊緒等事一摺奉到硃批諭㫖敬讀之下戰兢悚懼深自悔責仰見我皇上量同天地明竝日月而臣胷臆淺隘輒以一身受謗之細事妄為剖析在愚昧之罪固不能逭且於我皇上公明御下之天心大相違悖是何異於頂戴高厚而不知天地之廣大䝉被照臨而不知日月之精明識鄙智陋莫臣為甚自今以後惟有仰遵聖訓諸事反躬内省力戒自欺勉期無愧不敢再計人言心懐瞻顧致負我奏覽又汝敬陳末議一摺甚屬可嘉交部議行矣此弊朕知之最悉湖廣督撫衙門皆有若輩耳目但有舉動悉皆預聞雖知如此亦竟無奈彼何未思及以印鈐盖簡牘暗相申報問答之法也此見甚善湖南辰沅靖道臣王柔謹奏為請定佐雜之差委以專職守事竊臣查各官之差遣委署亦甚有闗於吏治之興廢如沿邉之分防同知通判有彈壓苖土之責假令差遣逺出而接署之員土俗未暗遇事固多生疎之失即以邉員而再為委署然一官兩印亦難免顧此失彼之虞再如各州縣之吏目典史專司捕務監獄㸔守城池倉庫職雖卑㣲而責任綦重雖遇有京差與鄰省各差其缺亦仍行委署然盜案於接緝之員例無重處捕役乘隙賣放署員徒聽其逺颺而至於本省差遣與鄰治兼攝雖曠日持久亦從不為委署盖以州縣有兼理之責也不知州縣牧令遇有鄉村命盜田土案件其親身相驗與查勘往返亦須時日遂至無縣丞之小縣與州治佐貳之巳奉差外省者其正印與佐雜等官悉屬空懸此在腹裏地方固已不可而在苖邉更屬未便臣請敕諭督撫檄飭藩司嗣後遇有差委之時除腹内之府佐首領廵檢等官與苖邉之州同州判縣丞仍照舊差委外其於管苖㕔員廵檢與腹内州縣之吏目典史一槩停其差委更請將楚省試用人員諭督撫選其材幹超俊者發二三員令跟隨苖邉㕔縣學習倘遇有苖邉㕔縣缺出立行飭委就近署理再於通省㕔縣内另行㨂選題補其於苖邉之廵檢典史缺出應令於附近之廵檢委署外即於本省之廵檢典史内立行選調補授至各州縣吏目典史遇有缺出應即委該州縣之佐貳與鄰近之廵檢兼署亦不得委别州縣之吏目典史為代理似此責任既専地方自無廢弛之失矣臣為地方起見敬獻芻蕘伏乞聖裁謹奏此奏現發廷臣查議候奏覆有㫖湖南辰沅靖道臣王柔謹奏為清除川硝之私販仰乞睿鑒事竊臣查得永順之里耶地方與四川酉陽土司連界該司素産焰硝外省小販多以布鹽雜物向煎熬之家零星易換約價每斤不過分餘統運至梅樹地方發賣而私販者即於此處雇船裝載由永順之里耶河路下抵辰州之北河而入於沅江分往各處發賣屢經該管文武官之兵役拏獲詳報治罪不一而足且楚省沿邉苖土又與該司接壤更多偷買私製火藥甚有未便是亟宜嚴禁煎熬以絶私販者也但查該司土民多藉此為生業倘行禁止勢必無所依頼游手為非且楚南各鎮營之操演兵丁更不能不於此處購買臣請我皇上敕下川省撫臣於管轄該司之流官酌發公項銀兩飭令查明該司内各産硝地方即曉諭各寨土民令將所煎焰硝悉行交官照常給價按季造報該撫查核除通行本省各鎮營之有需焰硝者令報明該撫採買倘鄰省鎮營有礙於此處採買者應報明本省督提預咨川撫轉飭該管之員驗明採辦印票照價收明即將官硝如數給發所收價銀仍令買硝存貯如有外來姦徒及土苖竊買者該員即查拏究擬倘再遇有竊買私販别經發覺定將該員嚴加治罪似此則私販既除而煎硝土民亦得資生之計矣是否可採伏乞皇上睿鑒施行謹奏此事交該部詳查議奏另有諭㫖湖南辰沅靖道臣王柔謹奏為敬陳初仕之造就以勷吏治事欽惟我皇上御極以來闢門籲俊多方取士凡各省俱發有試用人員前福建撫臣劉世明奏請將發往人員令隨藩臬兩司學習吏治再為委用似於試用人員大有禆益然臣愚以為兩司事件悉屬知府與直𨽻州核轉已成之案即令初仕人員跟隨學習亦不過總覽稿案格式與大槩情由至刑名之如何承審招擬錢榖之如何徴收奏銷俱由各州縣逐件辦起又何得洞晰其源委是初仕人員之學習必須於政治始基之處目覩身親方得操練成熟臣請將奉發各省試用人員令該督撫就其中有素諳吏治者先行選擇試用其餘存人員應查所屬繁劇州縣有諳練吏治者酌派分撥令其跟隨學習如果學習半年事無錯誤識見明敏該州縣即將所辦事件造冊詳報該督撫查核以備題補州縣之用倘學習半年事多舛錯識見糊塗實係庸愚之輩亦將所辦事件造冊詳報該督撫查閱即行具題咨回原籍若遇有賦性貪劣逐事滋擾者該州縣即詳揭督撫題㕘如此則吏治易熟人才易成其賦性庸劣者悉不得濫與於試用之内而委署各地方亦不致有貽誤之失矣是否可行伏乞聖裁謹奏朕正為試用人員思忖候酌定另降諭㫖湖南辰沅靖道臣王柔謹奏為叩謝聖訓跪呈硃批事臣於六月初一日為謹奏敬陳末議一事䝉我皇上不棄芻蕘敕部議行臣是時因永順聚衆之案㑹同鎮筸鎮臣周一徳合詞繕摺具奏荷䝉皇上開誠指示冝鎮静彈壓督率員弁加恩撫綏數時再行懲治此誠我皇上覆載之大徳臣等知識淺陋莫獲仰見宸衷先於未經奉㫖之前即將聚衆姦舍拏獲到案聽候欽差審訊又念聚衆一事曾經摺奏恐厪天心故將獲犯解候情節輒行上聞乃䝉聖恩不以臣等輕忽多事即加處分尤復訓臣等向後事冝敬慎持重辦理臣嗣後惟有祗遵訓㫖不敢稍有輕忽致負天恩垂訓之至意竝將敬陳末議一事奉到硃批原摺跪封呈進謹奏覽奏敬慎持重四字好常存過猶不及之念自無過不及之慮矣湖南辰沅靖道臣王柔謹奏為叩謝天恩事竊臣父王􅕵以罷職之員於上年欽奉皇上特㫖召見荷䝉恩施格外補授四川成都府知府臣闔家固已感激無地至本年閏七月初七日接閱邸鈔知四川撫臣憲徳以放縱無禮等事將臣父題㕘臣正在晝夜徬徨恐懼莫寜不意初九日復接邸鈔覩知臣父王􅕵又䝉皇上恩㫖特令赴京以京官補用臣闔家驚喜殊出望外當即恭設香案叩頭謝恩伏念臣父子何人涓埃未報乃䝉天恩高厚若此有加無已臣即竭盡駑駘亦何足仰酬萬一用是銘心鏤骨無刻釋懐臣因摺奏事件謹披瀝丹悃叩謝天恩伏乞皇上俯鑒謹奏朕一生得力處惟在不負人三字歴來獲䝉上天聖祖之隂相黙祐實由朕寸衷之所感格朕以此存心所以凡負朕之人亦未有不自取敗亡者於斯益信報應之來皆在人而不在天也湖南辰沅靖道臣王柔謹奏為奏聞事竊臣查所屬之辰靖與新設永順等處地方其收成年景幾及十分惟永順與沅陵瀘溪辰溪等縣境内在夏雨調勻之村莊稻榖収穫俱有八九分至雨水未勻之村莊稻榖收穫僅有五六分然春秋二季雨水悉屬調勻所種雜糧等項則多屬豐收統算幾及十分至於米價每倉石不過八九錢謹將地方收成情形據實奏聞謹奏收穫情形欣悦覽焉湖南辰沅靖道臣王柔謹奏為請定密㫖之遵奉以免承辦之洩漏事竊臣於本年八月間接准本省通行文内准兩江總督咨開雍正七年八月初一日接准内閣大學士字寄恭奉上諭查拏大盜趙七一案内開該犯遊弋於江南江西湖廣之沿江各處地方黨羽數千強刦肆行而上下各捕盜衙門之兵役皆受賄護庇飭令設法査拏務期必獲等因到院除密飭該管文武員弁上緊查拏外所有寄到字札相應照鈔移㑹煩為查照希即併飭該管各文武官弁一體偵訪設法擒拏等語併粘鈔原字臣因檢閱原字乃知江湖大盜趙七聚集匪黨猖狂無忌姦宄異常我皇上深慮民害急思剪除因諭大臣等寄信於各省該管督撫令其密相知㑹設法緝獲則承辦之督撫大臣自應仰體聖心立傳該地方之文武大員密為籌畫即仍用密札轉致於各省之該管督撫互相闗照密行查拏自必不至於漏網若沿江一帶文武衙門其兵役既久為勾通又安可通行飭知令該犯之耳目得以竊聞乎今江省督臣承辦此案乃將内大臣等所寄密㫖用文書照鈔移㑹各省併令通飭該管文武官弁一體偵訪擒拏則豈能保其必無洩漏之失臣愚以為各省事務凡在内大臣欽奉密㫖札屬之件上下往來一切文移統應改換密札俱於内署鈔冩用印鈐盖外加釘封插羽差役親投方稱慎密倘仍擅用文移以致事經洩漏應將起始承辦不慎之官敕部議定處分以為漫不經心者戒庶嗣後凡遇密諭事件悉知敬謹辦理不敢稍洩機宜而案無難結之虞矣為此繕摺具奏伏乞皇上睿裁施行謹奏所奏朕甚嘉之此案據數處奏到朕之批諭與汝奏詞若合符節所以不得其人事每難結奈何奈何若咸似鄂爾泰田文鏡李衞實心體國之大臣必無此等疎忽不慎之舉也湖南辰沅靖道臣王柔謹奏為跪呈硃批恭謝天恩事竊臣前奏叩謝天恩一摺欽奉硃批朕一生得力處在不負人三字臣跪讀之下不覺感激涕零如臣於上年十月内接京鈔見順天鄉試題名録内臣胞弟王檢中式第三名舉人又於上年十二月間接京鈔見臣父王􅕵特授順天府府丞至臣於楊緒一案從前愚昧相與罪實難辭復䝉我皇上寛免處分再四矜全是即就臣父子兄弟而論我皇上非惟不負於臣而且恩施彌厚乃臣於雍正六年五月抵任以來逮今將及三載如永順改土臣以疎忽而土蠻滋事以致上干宸念如六里廢弛至今未經開闢紅苖兇頑未盡悛改臣日返躬自責有負於君恩為甚多臣輾轉五内漸愧益深戰慄愈甚幾無刻可以自容今幸撫臣趙宏恩抵任以來諸事急圖整飭庶臣之素矢圖報於君上者或得稍伸犬馬之㣲忱於萬一耳臣不勝感激奮勵之至所有奉到硃批原摺理合呈繳謹奏感恩思報何為辜恩若恃恩自滿難保不負恩矣報之之道惟當勉求從容中理期於有濟凡事過猶不及不可一味孟浪勇往置是非成敗於不論為急公效力也勉之誌之湖南辰沅靖道臣王柔謹奏為奏聞事臣查辰永靖各屬地方上年冬臘兩月雨雪調勻本年正二月至今氣序和暖春雨霑足現今春蕎油菜與二麥青苖俱各茂盛而早稻亦俱經播種將來春季收成可望十分而沿邉各州縣村民俱皆安樂為此據實奏聞謹奏覽奏深慰朕念湖南辰沅靖道臣王柔謹奏為備陳苖疆情形仰懇皇上迅賜批示以便清理事竊臣於雍正七年十月親抵鎮筸細查紅苖内之險巢共有四十五寨其各寨内之兇苖共有一百二十餘名又查紅苖界外即係六里土苖逼處廣袤五百餘里乃楚蜀黔三省咽喉實為紅苗之内巢深穴歴來沿邉兇苖凡潛入内地捉人牽牛悉於此處寄頓窩藏兼距鎮筸邉營百有餘里官兵畏其險阻平素不敢深入追擒以致沿邉兇苖與六里土苖表裏為姦猖狂無忌邉民受其騷擾案牘纍纍臣再四籌畫實有見於六里為紅苖之巢穴其安兵設官彈壓為清理之要策兹值撫臣趙宏恩抵任後臣因於本年正月赴長沙省城將沿邉情形并從前移㑹兩司於六里地方應須安設文武官兵條議俱開清单與撫臣詳閱靣商適值雲貴督臣鄂爾泰由粤西回滇路過長沙詢及此事亦以速宜招撫添設官兵為妥因於六里南界黔省所屬之正大營令銅仁協副將移駐并帶重兵弹壓務使於六里新營接連以備應援而撫臣趙宏恩以新闢苖疆其添設官兵宜多而不宜少因查照臣從前添兵八百名之原議復議應添兵四百名較臣原議更覺周密臣謬議於六里安設官兵妥協之後臣即㑹同鎮臣於沿邉紅苖責成該管將弁及管苖百户傳集各苖目寨長酌行賞賚宣布皇仁詳加訓誨令將所管寨苖户口并各家之牛馬器械數目査明造冊以便稽査其於該管各寨地方有道路險峻人馬難行之處臣即捐發銀兩令各寨苗民及時修理平坦臣㑹同鎮臣親行廵視將各營所管汛地畫清疆界均分寨數責令各汛弁百户以便就近管轄并於鎮筸四營令各由所屬紅苖地方分設四路塘汛直抵六里新營使通聲息倘各苖寨有倚踞險峻者則勒令遷居平坦如遇有無業窮苖臣即代為籌畫另行奏請安插其於所查兇苖名數即應相機誘擒設法𠞰除而鳥鎗亦即可以漸次收繳倘或再有兇苗蠢動則六里保靖既有官兵控制又兼有鎮筸四營為之協助内外交攻勢如破竹自可以畏懾其心志而永絶其刦掠之根株矣抑臣更有請者六里添兵倘䝉俞允尤懇我皇上迅賜敕下督撫凡應議設文武官兵務須預為調撥齊全俟臣於六里土苗一經招集化誨酌行奬賞後即便帶兵前進立為分布安設營汛庶不致防範稽遲至有他虞其所需添設之兵應先於就近邉營抽調至應設副將一員臣誠恐該員新莅邉圉未悉苖情動静與事冝應否緩急之處或與臣意見不合臨時舛錯臣不揣愚昧跪懇我皇上敕下督撫即令臣身帶領應設官兵進内調度布置俟安設妥協後臣再詳請督撫另為揀選武員題補庶苖疆咸得清理而免致有貽誤之失矣是否有當伏乞皇上批示遵行謹奏所奏候朕詳細斟酌另降諭㫖湖南辰沅靖道臣王柔謹奏為密行奏聞事竊臣近訪聞各省臣工所進奏摺其齎摺人役行至中途歇店夜遭竊刦者有之伏思奏摺事件俱係緊要機密之務乃致宵小得以窺見不獨國家事機洩漏所闗匪輕而以此入告至尊之奏件致使宵小膽玩偷竊亦大有闗朝廷體統臣請皇上密飭各省督撫轉飭各官嗣後凡差委齎摺人役沿途不得住歇客店應給護身印牌仍自雇脚騾令於沿途俱赴驛站衙門歇宿併飭各驛官查驗印票登簿容留以便往回查對即撥該地方汛兵防護庶沿途自無稽遲遺失之愆而於摺奏重務不致稍有疎虞矣謹奏汝此奏不通之極道府等員乃係小臣品級卑㣲無奏對之分朕因欲廣聞見許令具摺密奏雖許密奏不時誡諭汝等毋得張揚洩露作福作威以挾制上司凌駕同僚今若特降明㫖將㣲員下吏之家丁差役槩令驛官查驗撥兵防護殊覺封章絡繹道路紛紜觀瞻之下成何禮體即督撫齎進奏摺亦未曽如是行事兩司奏摺至京皆命廷臣代轉不許徑至宫門況汝等末職耶觀汝逞一時高興孟浪乖謬處頗多朕實代汝憂之當知已之識見庸平切戒恃才任性方保無虞百凡處慎密為之不然莫謂朕之恩遇不久長也湖南辰沅靖道臣王柔謹奏為姦土悍惡不悛萬難再為寛容復瀝愚忱跪乞聖恩迅賜乾斷事臣於雍正六年十月十三日以籌畫邉疆要務上瀆天聽曽將容美酉陽抗拒安塘謀為不軌及諸小土司殘虐横暴要約聫絡種種姦惡情形瀝忱具奏䝉我皇上鑒臣愚悃訓誨諄諄臣惟欽遵不敢輕躁亦不敢稍有疎忽近聞容美酉陽與諸小司俱私製有子母礮位暗地操演更為肆膽實非可以義理化誨者必得兵威方能懾服臣查該土司之地方形勢容美處東北酉陽處西南十八小土司則紛處其中形如長蛇容美為首酉陽為尾而諸小司為胸腹據其前則後為之動撫其左則右為之擾若行進𠞰必須環匝布置四圍防禦以備緩急應援令彼無所躱閃方為控制全䇿臣擬於各省附近邉土地方如川屬重慶黔江縣界應備兵二千名湖北之恩施縣應備兵二千名湖南之九谿衞應備兵一千名黔屬之正大營應備兵二千名皆於外靣駐劄遥張聲勢至中路進用之兵則斷需三千由辰州永順而直入於龍山以抵十八小土司之境在各小司人寡勢弱官兵所至自必俯伏聽命諸司既歸即以重兵分布彈壓是長蛇之胸腹已據而首尾難以相顧然後移師酉陽聲明其罪藐茲醜類當無不歸誠恐後亦即以重兵鎮之是長蛇之身尾已獲諒彼容美既四顧無所援藉自當束縛而請罪縱暋不畏死復敢抗拒然已實為籠鳥釡魚更安所逃遁於其間哉是兵雖多備而仍不用實與我皇上覆冒無疆之盛徳原未嘗相悖此臣所以輾轉躊躇而復敢冒瀆天聽也但各省官兵之備援以及一人臨時之調遣必得才優望重熟練邉務者方可為之提衡倘䝉我皇上俯鑒愚忱懇請命雲貴督臣鄂爾泰總統辦理則事易舉而功易成於以静邉圉而除民害翦兇暴而廓霾氛庶千里荒廢之疆土即可成億萬年錦繡之規模矣為此繕摺具奏伏乞皇上睿鑒施行謹奏土司中容美酉陽原有僭妄不法舉動近日亦皆知悔過斂跡國家未有無故興師征勦之理容美向稱富庶此皆武弁貪利圖功無事生事之論汝何可踵襲而言及此耶况蕞爾土司如果内地吏治清明營伍整肅伊具何伎倆輒敢謀為不軌效當車螳臂以取王師之誅戮此即三尺之童亦能料及者汝今張大其辭以聳朕聽不知具何肺腑似此孟浪乖謬之見速宜改除惟以安靜彈壓地方是務不可更生多事貪功之念倘有激成事端形迹罪不汝貸矣將朕此諭竝所奏密令周一徳知之湖南辰沅靖道臣王柔謹奏為籌畫兵食以資飽騰事竊查各省督撫提鎮與協叅等營之請領兵餉毎年四季俱係於本季初月委員赴藩庫請領此歴來之定例但查各營内有駐劄省城與去省鄰近者其按季請領兵餉皆無需多日即可到營支放惟各省之沿邉營汛其去省窵逺動輒千有餘里者如春餉係正月内委員請領程途往返及投文守候每至仲春後方得抵營給散則兵丁前此兩月之食用勢不得不向舖户賖借而舖户資利養生自然米鹽價值較現買者稍加增添且逐季請領每次更多盤纒轉運之費臣不得不冒懇皇上敕部飭行直省督撫查各鎮營中有去省窵逺者其營餉悉令兩季兼發併令各營於季前請領以便臨季即為給散庶兵丁免致有等候之苦與多請領轉運之費再查各營兵米一項有領本色者亦有領折色者查本色每兵一月應給米三斗至折色如該米一斗則折銀六分當秋冬收穫之後其兵丁所領折色價銀猶可糴買如數若至春夏青黄不接之期米價昂貴則所領折色價銀實大不敷用臣請於各省營兵之支領月米折色者悉令改給本色至從前有未經徴米之州縣俱令於額徴錢糧十分内查照兵米折色數目除八分仍舊徴餉約計二分改米其扣算改米銀數如花户有應完餉六分者則令納米一斗在百姓以巳田所穫榖石碾米交納較糶米易銀輸餉既可免行户之費用又可省傾銷之折耗是非惟於兵有益且更覺於民有便均戴皇恩於無既矣謹奏此奏是朕命部中查明舊例酌量有㫖湖南辰沅靖道臣王柔謹奏為冒抒愚忱密行奏聞跪懇聖裁事竊臣於本年三月初六日閲邸鈔見河東督臣田文鏡為奏明武職事奉㫖武弁等養贍家口僕從除名糧外别無所資若但給以歩糧恐不敷用著自提督至守備馬歩各半千總馬一歩四把總馬一歩三各省一體遵行臣伏讀之下仰見我皇上洞察武員㣲情加意體恤用勵清操此誠聖恩之高厚無㣲弗至矣但臣查各省營制其額設馬歩兵數從前悉係於各地方相度形勢之險易籌畫駐兵之多寡計慮周全然後定額是馬歩戰守兵丁誠缺一名不可且查南省各營制俱係馬一歩九為定額如楚省南北地方幅員數千餘里其額設營馬僅四千餘匹今約除親丁馬糧一千四百餘名其南北兩省各營所存馬糧止遺二千六百餘名一旦遇有調撥之處而欲倉猝備補勢必愈為周章欽惟我皇上御極以來凡為國計民生計者每動及數百萬金而不惜臣見兵馬營制實有闗於國家之重務故不避斧鉞冒昧陳奏跪懇我皇上敕下督撫令武員自提督以下至於千把悉按伊等所食親丁名糧數目查照各省每年應存公項改給養贍倘不敷用即動支正項竝令先期即速核算清楚密行奏明我皇上欽定至從前額設馬歩戰守兵丁俱令召補足數如有虚冐發覺按律治罪庶武弁之養贍已足既可以悉砥廉隅而朝廷之兵威赫濯營制整全更為萬年鞏固之宏規矣為此密行繕摺奏聞伏乞聖裁謹奏數次頒諭之㫖甚明自必斟酌得法而後行也湖南辰沅靖道臣王柔謹奏為安全無業之窮民以廣皇仁事竊査我朝昇平日久生齒彌繁凡腹内州縣幾野無曠土而農民蕃衍多苦田有未足除川黔浙三省䝉皇上隆恩給發牛種現今墾荒外仰懇我皇上敕下各省督撫轉飭所屬州縣先將該管地方内所有荒坪山土與民無恒産者一一秉公據實查出分析造冊詳報該督撫查核所屬各府州縣内某州縣之荒坪山土若干畆與窮民若干户如每户於荒坪則應撥給二十五畆若遇山土則須撥給四十畆庶足以資一户之養贍按照户數均勻分撥一靣奏聞一靣安插并請將藩庫所存正項錢糧酌給牛種與築居之資助其餘如本省荒土已經招墾而猶有多餘窮民與本省窮民已經安插而猶多未墾荒土悉令詳晰造冊具題竝懇我皇上敕部查核先於鄰界各省查明某省所屬州縣之荒坪山土若干畆與某省州縣之窮民若干户飭令就近遷移安插但窮民遷徙路費維艱更不得不仰懇皇恩給發口糧以資養贍毎日每站大口給米一升小口給米半升即准動常平倉榖辦理迨至開墾州縣地方該管官即將查出冊報之荒坪山土按例撥給安插并查照户口多寡給發一年口糧為養贍再動支正項錢糧酌量借給為築居牛種之費令其盡力開墾統計所領口糧與築居牛種銀兩數目畫為五分俟開墾成熟後於五年之内按數徴收補解藩庫倘本省與附近省分之荒坪山土俱巳安插此外尚有無業之民仰懇我皇上敕令直𨽻督臣與奉天府尹及貴州廣西與山陜各督撫悉行揀委能員查明沿邉巳闢未墾之地其中之荒坪山土盡行造冊詳報咨部統行查核并飭各省督撫令該管窮民之原籍州縣造冊咨明隣省凡經過地方俱令撥給口糧一抵墾荒處所該地方官亦即遵照前例善為撫綏安插但查朝廷之正項錢糧毎年俱有經費請先借正項辦理并懇援水利營田事例開捐補項庶帑項無虧曠土盡闢窮民悉得安居飽食普天率土永戴皇仁於無既矣謹奏此非孟浪草率而行之事候斟酌看湖南辰永靖道臣王柔謹奏為跪呈硃批恭謝聖訓仰祈睿鑒事竊臣前以跪呈硃批恭謝天恩事繕摺具奏荷䝉皇上格外訓示諭臣以報恩之道惟當勉求從容中理更於陳奏姦土悍惡不悛摺内䝉硃批諭臣孟浪乖謬之見速冝改除惟以安静彈壓地方是務不可更生多事貪功之念又於密行奏聞事䝉硃批諭臣當知巳之識見庸平切戒恃才任性方保無虞欽此臣竊自惟山左庸愚賦性粗鄙荷恩深重感激心切故遇事冒抒鄙忱多有未當之處幸䝉皇恩高厚不以臣干瀆宸聰即行斥革復逐件恩賜訓飭教誨諄諄令臣茅塞頓開恍悟前非臣於惶悚戰慄之下益覺感激涕零嗣後諸事惟有敬謹小心循理辦行斷不敢謬執鄙性自蹈咎戾有負我皇上訓誨成全之至意所有奉到硃批原摺理合跪封呈進謹奏但知過猶不及利害相等則可保永無隕越之慮矣湖南辰永靖道臣王柔謹奏為奏明招撫安設情形仰祈睿鑒事竊臣於本年三月初十日具奏備陳苗疆情形一件於七月間接到部文奉㫖著臣管理副將事務帶領官兵前進六里招撫安設臣當即差役張示各里徧布皇恩因悉心籌畫安設事宜稟明督撫聽候酌示竝移商藩臬兩司公同㕘酌隨准督撫提㑹商調撥各營官兵一千二百名於八月二十日後齊抵鎮筸臣於八月二十八日分發官兵陸續抵保靖㑹齊於九月初七日臣即同保靖遊擊王進昌率領官兵由六里花園前赴六七八九十各里地方招撫安設凡抵一寨臣等即喚該寨頭目傳集各散苗宣示皇仁浩蕩視爾苗民同為赤子不忍令棄化外是以命官設汛為爾等保護身家俾各得相安耕鑿共樂太平而各苗民亦悉感動天良朝闕叩謝遂即相度地勢險易酌量官兵多寡安設營汛約計前進各里招撫安設往還不過半月而六里各寨苖民悉帖然寜謐此皆我皇上徳化逺被聲教覃敷故悉得仰頼天恩隨到即行安設毫無阻礙至鎮筸鎮臣周一徳由鎮筸所屬陽孟寨地方一路前進臣於初九日早至十里排補美地方等候㑹合因伊至初十未到臣於次日即前往八里九里招撫安設伊於十一日由陽孟寨帶兵復於十里至九里一路安設小塘前來㑹合俱經通報督撫提臣在案但此事創議自臣今更䝉恩令臣領兵辦理事無為難之處覺於旁意不合因多招擅攬之忌嫌合併陳明伏惟宸鑒謹奏天下事惟在自信何如耳若果自信秉公持正適中合理至於旁意忌嫌亦奚暇瞻顧計慮耶湖南辰永靖道臣王柔謹奏為請設鹽引以便商民事竊查臣屬新闢之永順四縣及六里等處從前係土司與生苖地方河道未通兩淮引鹽未至而此地一帶之食鹽悉因西與川省之酉陽聨界該地土苖多於重慶府屬之産鹽地方私行盤運販賣而川省官引前亦未載由來日久今䝉我皇上不棄荒僻多方撫綏建治立營竝開濬河道通聨江漢是以腹裏居民一視同仁則食鹽既為民生所必需而私鹽又為國法所嚴禁在土販自必多畏兵役之盤查或久而致滋需索之弊竇勢必至鹽稀價貴商民均屬未便伏乞皇上敇部查照直省行銷鹽引之例其每口逐日食鹽應需若干按照新闢各縣與六里之户口數目統計每年應需食鹽若干斤數并應設官引若干道數飭行楚省督撫轉行各地方官招徠殷實商民令伊於川淮各産鹽處所自度運販之便具呈承􅂶某省鹽商該地方官加結詳報該督撫査核具題逹部以憑給引納課行銷仍嚴飭各地方文武官弁兵役不得借端需索竝示禁各鹽商亦不得昂價累民庶商民兩便而食鹽得以通行矣伏乞皇上睿鑒施行謹奏鹽引國課攸闗且係創設例應督撫題奏之事湖南辰永靖道臣王柔謹奏為密行奏聞事竊查黔省銅仁府所撫三不管之生苖其猖獗傷官一事固由苗性兇頑亦因地濶兵少乘隙煽惑之所致今據黔省巳稱擒獲正兇惟須搜捕餘黨但臣念苖情叵測反復無常則該地營汛之安設更不可不急為綢繆臣於上年九月内㑹勘黔楚疆界時親查得黔省已撫之坡西及以北未撫之牛角山一帶邉民四十餘寨東與六里接壤北與保靖縣聨界而正西一靣又與川屬之石耶酉陽土司接連亦應令黔員招撫為黔省坡西之捍衛臣於彼時相度形勢坡西地廣幅員約四百餘里應須設遊擊一員守備一員千總二員把總四員帶兵一千名分汛防範至坡西地覺窄狹東與鎮筸紅苗聨界北與六里接壤幅員二百餘里附近黔省之正大營應須設千總一員把總二員帶兵四百名分汛防範仍歸正大營遊擊管轄其兩處應設官兵數目須速行安設方足分佈彈壓免致疎虞而川屬之石耶土司亦應撥歸黔省管轄以除挑釁之後患此臣一得之見理合據實密奏伏乞皇上睿鑒施行謹奏安營設兵等務諒鄂爾泰自有料理湖南辰永靖道臣王柔謹奏為跪呈硃批恭謝聖訓事竊臣於上年九月内以奏明招撫安設情形仰祈睿鑒事繕摺具奏荷䝉皇上硃批訓臣以秉公持正適中合理欽此臣當即望闕叩謝仰見我皇上之教臣者深成臣者大臣自覺茅塞頓開惟有欽遵永誌以敬承我皇上裁成之至意所有奉到硃批原摺理合跪封呈進謹奏果能心悦誠服欽遵奉行方為有益如或不然徒於口角稱誦仍自以為是則可惜朕一番成全期望汝之意矣硃批諭㫖巻一百四十二上欽定四庫全書硃批諭㫖巻一百四十二下硃批王柔奏摺湖南辰永靖道臣王柔謹奏竊查新闢六里一切善後事宜除臣巳移㑹藩臬兩司詳請督撫核題外謹先摘大畧恭呈御覽一城垣官署營房宜速建也一兵丁月米宜給本色也一各里雜糧宜按户均攤也一民苗宜准結姻親以潛移習俗也一苖人宜分别良頑以示勸懲也一請設義學以廣教化也以上六條是否有當伏乞皇上睿鑒謹奏該督撫題到之日自有諭㫖湖南辰永靖道臣王柔謹奏為再行奏謝伏乞聖鑒事竊臣前為新闢各苖土地方請添設鹽引一件具奏奉硃批諭㫖鹽引國課攸闗且係創設例應督撫題奏之事欽此臣遵即將前事具文通詳其准行與否至今未經議覆且近查此新闢各地方淮鹽既以路逺而價貴川鹽又以私販而阻禁該地方食鹽現今每斤價值幾至四分民實難堪臣因思此新闢各苖土地方原未經設有引鹽是臣前議之無病於商也明矣况引鹽設而裕課利民亦未始不有益於國計再查此苗土各處去川省重慶府屬之産鹽處所計程不過六七百里而道途之水陸各半至距江省淮揚兩府之産鹽處所則相隔三千數百餘里其引鹽之運行自當逺貴而近賤則此地之應食川鹽無疑矣但念邉徼偏僻其民人之殷實者恒少更恐以招募外商而致滋各官之需索與遲疑掯勒之弊竇臣反覆籌畫莫若查照川省引鹽之例請借支藩庫帑項即令新闢各地方官承行運銷照時價酌減發賣除辦交國課外其所獲羡餘銀兩先行扣還帑本後則據實歸公既不誤課更為便民相應懇請我皇上俯念㣲臣為國計民生起見可否將臣前後兩議敕部議奏此臣一得之愚理合再行奏明伏乞皇上睿鑒施行謹奏户部速議具奏湖南辰永靖道臣王柔謹奏為新兵之浮設宜裁謹據實奏聞事竊臣伏念兵為民衛餉為兵需此皆經國之要務而不可使其有餘與不足也近查鎮筸四營於額兵三千外復請添新兵四百名臣意以為似應仍遵舊額無需復加竊考鎮筸之設鎮及分中前左右四營添兵至三千之多者此本為鎮筸之西北邉外合六里為一區域其幅員千里該苗民之兇頑者多表裏為姦猖獗無忌故於沿邉以内㑹議以邉營代邉墻為一帶之堵禦此所以有方鎮與重兵之安設今六里業經開闢其分撥幅員之五百餘里者已設有永綏協營安兵一千六百名以為彈壓是曩昔鎮營之所堵禦於邉外者今巳分去一半矣至查目今鎮筸之所管轄苗疆界址則自西南之鳯凰營起由鎮城而直抵東北之喜鵲營止其延袤不過一百八十里再自附近民村之沿邉苗寨起直抵西靣之新設永綏交界止其横寛不過六十里至鎮城更係從前所改五寨土司地方除東南一帶盡屬内地其餘西北之二十里以内者亦悉係民村是合茲苖疆之幅員而約計其數亦僅五百里即較諸永綏之汛地亦未見其或多惟以鎮標之額兵三千名較之永綏之兵止一千六百名則為數㡬於加倍况查鎮筸所屬之北鄙其向之毗連永保等土司地方者今又建營設汛巳成掎角之勢若是則鎮標之舊設額兵三千至今日而巳覺其多也乃前鎮臣周一徳復請添兵四百名又何為哉臣於此事始則未獲預議繼亦未經奉文然不敢以浮兵糜餉之事瞻徇隠黙以自處但念此件經督撫提臣㑹題今臣復將浮設縁由據實具奏如䝉睿鑒或將臣奏摺仍發交本省查議勢必將愈加回護惟懇我皇上特命親信之欽差同臣於鎮筸及永綏一帶苖邉通行踏勘併於鎮筸四路營汛斟酌布置繪圖呈覽庶虚實自彰而臣心愈白矣謹奏此奏是候另有諭㫖湖南辰永靖道臣王柔謹奏為奏聞事竊查辰永靖所屬州縣及新闢永綏地方上年雨水霑足百榖豐登農民咸慶大有惟因安設六里及應援黔省官兵悉借支辰屬各縣倉榖碾備米糧運供軍需迨冬月買補還倉故現今之米價凡倉斗每石有賣至八九錢不等其於冬月至今則雪雨應時田土大獲潤澤腹地安康邉疆寜謐理合據實奏聞謹奏深慰朕懐湖南辰永靖道臣王柔謹奏為籌畫治理邉疆之永圖敬抒管見仰祈睿鑒事竊照楚南苗土各邉徼叨䝉皇上仁慈普照有見夫各土司之暴虐與頑苗之仇殺不忍棄於化外急思登諸袵席敕諭楚省臣工先後經理建官分治設兵彈壓併不惜動支帑金之浩繁其所以為苗民謀生全者備矣但既經設有官役之治理弁兵之防衛則其為俸工之支給與糧餉之請領是每年各添此數萬之經費而不可以稍減則凡臣工之承辦者理冝謀此經費之所出臣反覆思維欲求經久之長䇿莫若及時開墾隨地興殖之為善也大張開墾之示檄飭腹地各州縣查有家室之農民而身無過犯者准本地鄉保出具甘結該州縣具文申送該府㕔點驗以憑安插其各邉徼之荒土則曉諭該苗土等令各據實呈報更嚴飭該府􅆹與各縣務再遍歴查勘除先儘苗土認領墾種外其餘山林地土之猶有棄遺者則約計畆數分給各招徠之農民認承墾種統飭該㕔縣編造魚鱗冊申送該司道存案査考照例五年起科以憑轉詳督撫題逹如此則野無曠土自民多餘糧而官兵之食米易於覓買取資無盡矣至科糧久有定例查田分則因則起科悉屬寛大便民之典固巳較土司火坑之苛徴苗目保寨之科歛其輕重巳大相逕庭則苗土良弱者諒自無不心願而樂從也其地産五金之處則准令該地民夷之採取而外來之姦匪禁焉以及山之材木拱把者則令其封禁而畜植合抱者則准其採伐而興販悉令按例輸税如此則邉徼之民夷更悉將於農忙而用力南畆農閒而有事興殖將見衣食饒裕而咸有身家之顧忌自不肯聚集為非矣迨果家冨人足其興行教化之道亦即可次第舉行其新設之各府㕔縣等則責成加意治理即於此奏效之多寡而分政績之優劣予以勸懲如此則利無不興夷無不格而吏無不勤其兵糧無資於外糴俸餉無損於額賦固大利於民生復有益於國計矣為此繕摺具奏伏乞皇上睿鑒施行謹奏候發廷臣議覆有㫖湖南辰永靖道臣王柔謹奏為分貯各府州之帑金宜預為防範以免侵虧事竊臣於雍正九年春接到通行部文内開奉㫖為各州縣辦理軍需與應付急切公務之用不容刻緩䝉敕諭大學士等議奏著該督撫於各省藩庫内酌留帑銀數萬分發於各府州庫存貯以備應付欽此欽遵奉行在案臣伏念此項銀兩計數匪少且為預備急切公務之需更所係匪輕但分發於府州各庫存貯此非如隨發隨用而報銷迅速之項其中稍有虧空即難以掩飾者可比使於此而不為防㣲杜漸竊恐不肖之徒平時任意侵那惟專探上司一有盤查之信即暗向所屬紳衿與舖商等那借墊補俟該上司之實貯印結一出盤査方回而此銀亦即潛還原主即遇有急切公務之用彼仍復左借右那隨時掩飾而不露倘遇有㕘革病廢離任事故其虧侵之銀數則不能不水落石出雖將該員科罪勒追而帑項巳虧一旦遇有急切公務之需勢將坐視其貽誤所闗非小臣因慮及於此再四思維以為此項銀兩雖巳分貯於各府州庫内而各府城之有首縣與各直𨽻州之有學正者即責令該首縣與學正為監察令於該府州庫内所分貯之帑銀悉將各包封編號而於每百兩之封内其散銀之錠件數目更行詳記復令造印冊五本按照號次開載其各號封内之錠件數目俱詳註於各號之下併令該管道員親同查驗各加押封更於各冊加印鈐盖除印冊四本分齎督撫司道存案查核外其下存印冊一本則發交該首縣與學正收貯以便遇有急切公務隨時監同府州按冊照號逐次支用一靣即於詳内開明通報該督撫司道查核再各府州庫内所用貯銀木櫃之鎖鑰責令該首縣與該學正親加押封其鑰即封交該府州收貯如遇有開用之時該首縣學正等俱即靣同該府州支取仍即親行鎖閉照前押封併於詳内聲明至該道員之四季盤查務當按冊查號復抽封點數倘遇有舛錯虧短不符者則其為侵蝕借墊無疑矣即准該道員立將封内之錠件不符銀兩齎解撫臣查驗併將借墊之府州與監察徇隠之縣學一同掲㕘俱嚴加議處著落催賠倘該道員徇情容隠一經該督撫藩司查覺除該道員㕘革不用外仍於該道員名下查照該府州之借墊銀數罸令額外賠出如此則侵虧之弊端永除即遇有急切公務亦必不致有遲誤之虞矣為此繕摺具奏伏乞皇上睿鑒施行謹奏嚴密稽查以預杜虧那之弊主見固是但所設之法未免過於瑣屑候另㫖飭議湖南辰永靖道臣王柔謹奏竊臣查鎮筸所屬紅苗既經開闢安設四路營汛所有應添文員及善後事冝除詳明督撫轉題外謹摘大畧奏明一紅苗素皆耕種山地不諳開濬水田故一遇旱潦即多歉收因致偷盗難禁今既經開闢化導懇請敕諭楚省督撫即於今秋豐收後動發公項銀兩飭令乾州同知鳯凰營通判各買備雜糧五千石於所管四營苗地查適中處所酌建倉厫分貯春借秋收倘遇荒歉即令賑濟至永綏地方亦令一例遵行庶苗民得免飢餒咸感皇仁浩蕩自益蒸蒸向化矣一鎮筸紅苖既經四路開闢雖從前設有百户催糧約束然該弁悉屬鄉民恐私作威福及需索情弊今查有鳯凰營通判屬内之池河營與應仍歸乾州同知屬内之地良坡既相隔窵逺兼係紅苗適中之地請各設廵檢一員就近稽查以専責成一鎮筸四營所屬紅苗内舊有逃匿刦殺兇犯與滋事苗目此等最易為愚苗之煽惑難以久容應令該管文武確査舊案除巳奉恩赦外其餘各案兇苗逃犯先行密報竝即設法誘拏按律治罪如應􅂶發者亦即援例􅂶發以除嗣後煽惑之害不得仍援九欵例枷責了局庶姦惡除而愚苗自悉歸於馴良矣一乾州城垣與該司知所管屯田秋土俱雜於瀘溪縣屬界内遇有民人犯事既多借地躱閃迨經移文查拏又多聞風逺颺此歴來難治之根由應令該㕔縣清查疆界各編保甲以専責成再乾屬之二三四里土民歴來設有鎮谿所土千總以為専汛但念該弁籍𨽻本地不無親族恐多瞻徇偏袒請將土千總裁革於乾屬適中之司馬溪地方改設廵檢一員以便管轄治理庶免茍且因循之弊而地方日有起色矣一乾州自西南城外起抵鎮筸城八十餘里所有田土民人俱係鳯凰營通判管轄故乾州同知於附近村民之為非者素多不受約束該通判又多鞭長莫及臣因飭該同知通判靣議曽定於適中之洞口哨地方畫界各分四十里就近治理以専責成再鎮筸四營苗地從前因乾州管轄六里其地方遼濶故曽將右營苗地亦撥歸鳯凰營通判管轄今六里既經添設永綏同知則現今乾屬僅有左營苖地一處請將右營所屬苗民仍撥歸乾州同知管轄其中前兩營所屬苗地則仍令鳯凰營通判管轄庶分治均勻而沿邉苖務不致貽誤矣以上數條皆係緊要邉務伏乞皇上敕諭楚省督撫迅速辦理毋致任延實於邉方大有禆益謹奏將所條奏各事宜呈詳該督撫聽其酌定湖南辰永靖道臣王柔謹奏為奏明邉務事竊臣查得辰靖兩屬地方寛廣臣自莅任以來為辦理永順與六里事務未獲廵歴周遍今於本年四月後復於各屬地方親身遍歴詳察情形及水陸道途其中猶有防範疎畧與水路阻滯尚須籌畫之處謹抒管見為我皇上陳之一辰州協營既設副將與中軍都司駐劄府城而左營守備亦住城内實屬曠閒查辰州府西南邉隅有沅陵縣之六􅋭與瀘溪縣之六堡兩界交聨多係崇山峻嶺與永順苖疆接壤土民愚悍每多為非動輒拒捕請將該協守備酌帶本營兵丁移設於六􅋭六堡之適中地方駐劄再請將鎮筸浮設兵丁撥給五十名以資彈壓兼為永順旦武營之掎角則官兵皆得實用而頑民悉知顧忌矣一沅州地方延袤千里苗猺雜處上接滇黔下通辰常實為楚省西南之緊要門户向設偏沅廵撫及總兵帶兵二千餘名駐劄彈壓迨後廵撫移駐長沙而總兵又移設鎮筸該地則改設副將至今查額兵則僅六百九十名除分防及各官親丁公費等項外存城兵丁僅一百七十餘名兼多護送差遣雖從前各副將屢有添兵之詳請俱未准行臣因查黔邉北靣一帶苖夷寛廣多與沅界通聨揆諸形勢殊覺單寡不得不懇請我皇上俯察黔楚兩省交界輿圖則沅州疆圉之有闗緊要及營制之單寡與否自在聖明洞鑒之中再沅屬西南之晃州地方逺去州城一百二十里請於沅州協營添兵五百名竝設守備千把各員以資分布協助更於晃州地方酌撥守備帶兵分防以為楚省邉地之籓籬更為黔疆各營制之掎角况官兵更無需增添臣查湖廣提標五營俱駐常徳城内竝無分防之處是即於提標官兵内按數抽撥沅州駐防非惟提標不覺其寡少且楚黔兩界更獲大彰夫國威矣一靖州協營分防本州及㑹同通道兩縣幅員㡬二千里地多崇山複嶺苖猺雜處與黔粤接壤實屬險要及查該營額兵則僅四百八十五名一切汛防城守俱屬單寡現經該副將詳請增添尚未議准臣伏念該協營係楚粤黔三省苗夷極邉不得不懇請我皇上敕諭楚省督提將鎮筸浮設兵丁内撥給二百名以資靖協之分布防守則一轉移間而兵獲實用其極邉地方永受寜謐之福矣一靖州併所屬三縣城多殘廢靖州舊係石城綏寜㑹同兩縣亦係石城垜口殘毁城墻傾圯惟通道一處原係土城竝無城垜今更坍塌查此各州縣城垣俱經該員請修未准今不得不懇請我皇上俯念邉城為内地之籓籬闗係匪輕敕諭楚省督撫令發公項修造竝嚴飭該州縣確實估計毋致浮冐至通道城垣圍圓不過里餘地近山嶺取石甚易其修築費用不繁懇乞亦令建造石城庶垂久逺一靖州河道上至黔省黎平府屬地方下通辰常大江現今黔省古州採買軍糧皆由此河裝運今查有㑹同縣界内之大鼎小鼎牛歩亂石等灘極其陡險船隻最易損傷懇祈皇上敕諭楚省督撫立飭該州縣確實估計請發公項開濬務期寛平以利舟楫一靖屬綏寜縣地處苗邉歴來盗案堆積自雍正五年於黄桑坪添設遊守官兵分布彈壓而靖屬頑苗近多遵法惟隣界寳慶府屬城歩縣之長坪大寨等處兇苖越境焚刦肆無忌憚往往拒捕此實由該管文武從不於該地議設營汛居中彈壓故致有恃險猖獗之積弊且查城歩汛地係武岡營屬該營額兵四百餘名僅防此一州一縣且該州北居城歩腹内民多猺少平素安静而該遊守則帶領多兵駐劄州城至城歩則懸寄武岡之南靣極邉兼與粤猺聨界姦宄潛藏素稱難治今僅派委㣲弁帶兵分防此本布置錯繆邉患安得消除懇請我皇上敕諭楚省督提於城歩之長坪大寨等處相度地方將武岡營遊擊令酌帶本標兵丁移駐分布彈壓則城苖自無不畏法而歸化矣以上六條臣謹繕摺具奏伏乞皇上睿鑒施行謹奏此所奏六條亦言之該督撫斟酌可也湖南辰永靖道臣王柔謹奏為跪呈硃批恭謝聖訓事竊臣於本年正月内以籌畫治理邉疆等件繕摺陳奏䝉我皇上不棄芻蕘俯垂天鑒至於臣識之庸鄙有過於瑣屑之處更仰邀聖恩訓示臣跪讀之下感激難名今將奉到硃批原摺理合跪封呈進謹奏觀汝頗有下愚不移光景湖南辰永靖道臣王柔謹奏為恭謝天恩事竊臣於本年六月十五日接閱邸鈔見臣父王􅕵仰荷皇恩簡授太常寺卿仍兼光禄寺卿事臣伏念臣父子何人而乃叨沐殊恩異數若斯寵榮逾分感戴無地惟有益竭忠誠赤心圖報以上答天恩於萬一所有感激㣲忱理合繕摺奏謝伏乞睿鑒謹奏陞遷降革正在未定湖南辰永靖道臣王柔謹奏為恭謝天恩仰祈睿鑒事竊臣接閲邸鈔見山左東兖二府歉收叨䝉皇恩散賑減糶復簡命臣父王􅕵同本省人員前往查賑此誠欲民隠無蔽賑恤周遍實屬曠典臣本籍山左身受殊恩益時凛報稱未至隨即寄字臣父王􅕵務期查賑周密俾饑民無一户之或遺庶無負我皇上委用之至意所有臣感戴㣲忱理合繕摺奏謝伏乞睿鑒謹奏汝父於此一差辜負朕恩處不可枚舉湖南辰永靖道臣王柔謹奏為據實奏明事竊臣自歴任苖疆以來惟時時仰體天心凡一應辦理新闢事務務期籌畫妥協不敢因循稍留遺憾今因永順境内尚有更改布置與議辧未妥之處謹分析陳奏一永順所屬王村河南之田王二峝及功冲西英四旗地方幅員二百餘里皆崇山複嶺頑苗雜處逺距該府百里之外臣前議於喜鵲營設同知一員以司捕務又設田家峝廵檢一員以備廵查俱行移司轉詳題逹奉㫖依議欽遵在案及至雍正八年春前任藩司楊永斌竝未查勘即議將喜鵲營同知改駐旦武營田家峝廵檢移駐舊司治但査旦武營不過永順東南邉隅臣巳議設官兵防禦若復以同知移駐則西去保屬窵逺實舍中而處偏至於舊司治則去永順府城僅二十里若以廵檢移駐更屬棄逺而就近臣因見其議改未協當即札移藩司兼禀明督撫未見允行今於本年四月内據沅陵縣詳報永順縣民張志賢等打傷劉名科等四人一案又據永順縣詳報該縣民石教化等打死石往哥等四人一案查此二案人犯悉處功冲兩旗地方現今嚴飭該縣移營査拏審擬是則該同知廵檢之駐劄地方更置錯繆巳有確據臣何敢不據實奏聞仰祈皇上飭諭楚省督撫仍查照臣之前議各令移駐管轄庶就近治理大獲裨益再該同知駐劄苗邉其於所屬地方時應廵查化誨需兵護衛請於鎮筸浮設兵丁内撥給五十名跟隨駐劄竝令附永順協營造報一永順府縣城垣冝築建石城查該地土性不堅取石甚易議令建造石城需費無多臣前曽與陞任藩司楊永斌靣語未見允從業經詳請題逹悉建土城今復據永順府禀稱邉地土質多沙各衙署所築圍墻隨築隨圯若城垣築土更髙萬難保其堅稳等語臣伏念邉徼城垣係内地之籓籬尤宜預圖久逺不得不懇請我皇上敕諭楚省督撫仍令築建石城嚴飭該府縣確實估計勿得浮冒庶新建邉城咸獲鞏固之慶臣謹繕摺具奏伏乞皇上睿鑒施行謹奏言之督撫臣酌定奏聞湖南辰永靖道臣王柔謹奏為奏明事竊照楚南各府州所屬地方多山嶺重複産鐵之處甚廣雖歴來禁止開採然私行刨穵者終難杜絶伏查新例嚴禁廢鐡出洋而楚南産鐡各地方外來射利商販悉於就近設罏錘鍊下船裝運赴湖北漢口發賣或由漢口而轉運兩江遞販臣念由江入海其勢甚易若不設法稽查則姦商圖利或私販出洋亦未可定不得不懇請我皇上敕諭楚省與兩江督撫於各闗口處所嚴飭該員稽查俾不得私販入洋至楚南之各商販罏煉鐡斤應否輸税之處更乞皇上敕部查例施行庶公私兩得其便矣謹奏候另有諭㫖湖南辰永靖道臣王柔謹奏為披瀝愚衷仰祈睿鑒事竊臣自雍正六年正月荷䝉天恩簡任苖疆歴今五載仰叨聖訓隨事敬謹辦理不敢稍有疎忽除六里開闢業經二年凡該管文武熟悉風土兵苖相安臣復於所屬辰永靖各地方遍歴查勘其於治理事務又有須籌畫之處今更另摺奏明倘䝉聖鑒如可採擇惟懇敕諭楚省督撫公忠為心切飭各該管文武實心奉行以専責成而地方自無遺憾但臣惟念受恩深重圖報心切每懐惟日不足且近閱邸鈔見有凖噶爾小醜之跳梁致以調兵選將上厪聖懐臣每中夜徬徨跼蹐靡寜此正為臣子者各當殫精竭力奮往圖報之日也但念西粤之地勢與逆賊之情形兼我軍之所以料敵制勝者臣俱未得與聞雖欲獻管窺之計謀實阻於難以遥度跪懇天恩准臣馳驛赴京匍匐殿陛敬聆軍務情形臣亦得於近屯逺戰之法權度變通以竭陳芻蕘倘有可採即跪請聖訓折中機宜試諸軍政俾臣得仰仗天威自效犬馬㣲力圖致逆賊之敗亡以上報聖主之知遇於萬一若夫僻處而安居者實㣲臣之所深恥也為此􅄋忱具奏伏乞皇上睿鑒施行謹奏真可謂思出其位大言不慚也湖北按察使臣王柔謹奏為據實奏明事竊臣在辰沅靖道任内因辦理苖疆事冝需人協助查有臣之舊屬原任黔陽縣知縣王作人明白老實堪以驅䇿隨於雍正七年三月内繕摺具奏奉㫖准臣留用歴今四載有餘該員於苖土新疆事務俱隨臣跋渉幫辦寒暑莫避允屬勤慎臣查該員革職之案係因前任㕘革知縣武宏登開報皇賞老婦銀一十五兩零屢喚該家屬未到存貯縣庫致以不先查首附㕘其銀兩隨經觧部今臣奉㫖陞任湖北所有新疆事務俱巳告竣謹將王作人幫辦勤慎縁由據實陳奏懇請聖恩可否念其急公㣲勞准令赴京引見恩出聖裁伏候皇上批示遵行謹奏詳明該撫將王作人送部引見可也湖北按察使臣王柔謹奏為敬陳管見仰請睿裁事竊臣謬荷聖恩莅任苖疆每見黔省咨調湖南兵丁䇿應俱令多派鎗手而需用火藥必取給於湖北因湖南向無藥局其各營火藥又皆存貯無多不敷接濟臣伏思腹地悉有城池倉庫防範冝嚴其沿海沿邉尤闗緊要火藥一項與其酌籌於臨事何如預備於平時與其調撥於他方孰若取用於本處逺近遲速之間所闗匪細且楚省如此他省可知仰請皇上敕部行令各省督撫提鎮查明各地方險易酌定存貯多寡轉飭各府州縣㑹同營汛查原存火藥若干及應須酌添若干如有多貯之處准其均勻移撥如無存貯則請動正項置備每於嵗底令營員造具實貯冊結呈請報部查核庶為有備無患再查各處礮位率多收貯不謹雨淋日曬每致銹朽無用臣愚以為亦應查照地方險易酌量多寡數目勻撥存㽞飭令加謹收貯勿致銹朽似亦整飭武備料撿軍實之一端也如果芻蕘可採伏乞皇上敕議施行謹奏言之督撫二臣湖北按察使臣王柔謹奏為敬陳苖民感化情形及現在措置事宜仰祈聖鑒事竊查六里地方自䝉恩開闢以來俱各嚮化維殷輸誠恐後臣於上年冬月間復遍廵各里村寨親見苖民悉歸馴順凡向之荷戈執械日以防仇報寃為事者今俱出入無阻彼此相安鎗刀棄置不用即如近奉恩㫖許令兵苖結親其已完姻之苖女俱自幸有衾裯衣履之安且鼓樂迎娶伊父母更欣以為榮而旁觀村寨苖婦因咸以赤足露體為恥是以苖人等爭先央媒樂與兵丁結親往來歡洽兵苖大相親睦至該協營有奉㫖准存苖糧二十分為賞勸辦事苖目工食臣即率同文武官弁於六里大小各寨分别苖目等次均勻散給俱知感戴天恩急公踴躍分管約束已得振裘挈領之要矣惟是苖俗崇尚巫鬼宰牛還愿之積習牢不可破臣仰體聖心屢以勿宰耕牛詳晰開導伊等亦頗知覺悟但據稱若不宰牛恐鬼祟難脱近見内地多有菩薩廟宇傳説鐘鼓聲響鬼多聽聞逺去懇求建立廟宇請供菩薩懸置鐘鼓以驅逐鬼祟等語臣迎機化導即為相度地勢捐俸造寺延僧焚修講解輪廻懴悔俾知茹素持齋可以消災延夀諒行之數年苖民不信鬼祟則宰牛惡習自除矣統俟梵宇告阻隔邉隅與禽獸無殊今䝉皇恩安官設汛得見天日感戴難報聞知有採辦萬年吉地木植伊等俱於該地山林查有合抱楠木急圖恭進但因不諳河道水運維艱臣見苖民一片血誠不便壅阻已與督撫言之聽其酌議合併奏聞伏祈聖鑒謹奏苖目進獻之説當婉詞却之汝與督撫臣酌量其木植如果可用給以厚價酬之為是湖北按察使臣王柔謹奏為恭謝天恩事竊臣接到家信知臣胞弟王檢中式新科二甲進士欽授翰林院庶吉士臣隨恭設香案望闕叩頭祇謝訖伏念臣父王􅕵以革職之員仰荷殊恩歴階卿寺臣以邉隅同知疊膺宸眷畀以楚北臬務今臣弟王檢少年新進更䝉聖主洪慈准令讀書中祕臣一家父子兄弟不識何修而叨沐天恩有加無已若此也惟有矢竭悃誠力圖報效并字囑臣弟黽勉學習勤謹行走以仰副我皇上栽培之至意臣曷勝感戴悚切之至謹奏凡為人臣者但宜講求一身盡職之道不必牽纒弟兄手足以及子姪親友此即營私之巢窟不可不知湖北按察使臣王柔謹奏為奏明事竊査湖北贖鍰銀兩例係各屬申解臣衙門貯庫其題咨案件聽候部覆彚批搭解若係督撫批斷追貯之項名為外結或動用修造救生船隻及給水手工食或修盖監獄或賞給捕役等項悉屬地方公務詳請督撫批准支銷從不報部但臣查康熙七年五月内刑部議覆御史徐旭齡條奏嗣後凡州縣等官自理贖鍰嵗底造冊申報臬司査核藩臬自理贖鍰造報督撫查核督撫彚造清冊俟題報到日查核如有折多報少竝隠漏等弊該督撫查㕘治罪等因具題奉㫖依議欽遵在案今湖北從前外結贖鍰悉於本地公務動用未經報部實與原題定例不符此係臣衙門經手錢糧何敢因循緘黙理合奏明請敕下督撫嗣後一切外結贖鍰務於奏銷時彚造簡明清冊將公務動用各項悉於冊内註明報部查核庶與原題定例相符并可杜日後侵漏之弊矣是否有當伏乞皇上睿鑒施行謹奏此係汝任内事詳明該督撫題請方屬合宜湖北按察使臣王柔謹奏為請禁各營長支之弊免致虧缺攤賠事竊查兵餉馬乾例應扣除小建每季各營差弁請領藩司率將全季餉乾悉照滿數給領回營存貯名曰長支有於下季請領時將上季小建扣存銀兩抵作應領正數者亦有賄通藩司書吏拖延壓捺至數季而尚不扣清者每致不肖營員任意侵那虧缺一遇事故離任水落石出於是經手錢糧之弁目事出無奈往往以甜言好語婉勸闔營代為攤賠分認實於兵丁不無貽累臣思月建大小儘可預為扣清毋庸長支以啟侵蝕之漸請敕部通行各省嗣後按季給發餉乾之時即將小建銀兩扣存藩庫如有書吏通同受賄仍前作弊長支者査出嚴加治罪庶營員不致侵那兵丁永免攤賠之累矣是否有當伏乞皇上睿鑒施行謹奏該部議奏湖北按察使臣王柔謹奏為奏明事竊查湖南永綏協營設兵一千六百名均由外營先後抽撥其中多有年貌不符者臣於道任内兼理副將事務曾將不符縁由通報督提并飭令都守逐名清查造報繼因陞授湖北赴任倉卒各冊未據造齊自應接任副将催造惟是營員舊習多以糧名年貌先經逹部有案只可陸續報換碍難總造臣念永綏係新設邉營與内地不同且武備務求實濟未便留此不符冊籍致滋弊竇似應飭令該管協營逐一查造實在年貌逹部實於邉營有益為此繕摺奏明伏乞皇上睿鑒施行謹奏言之督臣邁柱飭行接任副將查造可也湖北按察使臣王柔謹奏為請定審案報駁核批之例以省拖累事竊照欽部案件以及命盜重情州縣審招解府之時一靣將供㸔開造方冊先行通報名曰様招其州縣審擬未協之案經知府駁回知府審擬未協之案經臬司駁回者各将駁由通報立案此現行之成例也若即将駁語與様招兩相比對則招擬之是非與駁飭之合否固已洞若觀火矣乃今之報駁者或止云供情可疑引擬未協已經駁飭等語或全録駁語止用驗文申報而院司衙門每將様招與駁文置之高閣不為核其是非及至府解司而司始駁查司觧院而院始駁飭其未經到司到院之先率皆因循怠忽更或有所瞻顧每於解到後復藉端苛駁以致案件不能速結無辜枉受拖累甚非大吏公忠辦事之道臣請嗣後凡知府駁州縣之案令将駁語改用詳文報司即取州縣様招與駁語細加確核将應駁與不應駁并未及駁到之處秉公批示則案經知府報駁之後便有成規其知府審定解司亦令將様招通報督撫如尚有情罪未盡允協及犯證口供互異臬司必湏駁審者亦將駁語詳報督撫即將知府様招核明批示則一經解院覆訊便可立時具題庶案件易於速結而人犯免致拖累矣是否有當伏乞皇上睿鑒施行謹奏該部議奏湖北按察使臣王柔謹奏為奏明事竊臣案査本年六月初八日據南漳縣知縣孫叔諫通禀内稱計㕘典史周世榮於正月内打傷刑書李緒經職差押隨即潛逃於五月内拏回因其辱及祖父當即薄責禀府提訊而世榮又肆口誣衊等情隨經督臣檄行藩司以世榮巳經計㕘例應候文處分不合罵毆行兇該縣擅行扑責亦屬違例竝如何誣衊情由飭令㑹臣確查旋據襄陽府通詳孫叔諫於上年九月内指借計典名色得受典史周世榮銀十二兩又先得過生日禮銀四兩係總吏朱若錦經手又世榮於被恭不謹之後打傷刑書李緒叔諌將世榮鎖押世榮潛逃後被拏回先責後枷等情臣即具揭稿密送藩司鍾保㑹行當據字覆今早奉督憲靣言此案已批㑹同查例稿内未經聲明容俟明早靣為商定次日鍾保至臣署云總督説此係㕘後反噬即日果奉督臣批仰㑹同查例詳㕘夫以督臣之批檄合之鍾保之靣言則是指此案為反噬也明矣臣查㕘後首告例不准行但事闗行賄受贓何敢置之不問兼奉撫臣批飭查明詳㕘當即轉行該府至八月初二日據該府詳稱審明朱若錦供認過贓是實援縣教互掲之例將周世榮并朱若錦等批觧前來臣當同鍾保㑹訊供詞無異但孫叔諫未經到案對質難以遽定為實遂將應否題㕘究審抑或先提叔諌到案發武漢二府審實詳㕘等情㑹詳奉撫臣批仰速確查詳㕘奉督臣批仰即飭提到案發審隨即行提孫叔諌到省發武漢二府確審據該府等轉據江漢二縣訊供詳解臣隨㑹同署藩司朱㵢弔集覆訊據朱若錦自供贓銀係伊中飽臣恐係賄囑改供遂加刑訊矢口不移臣等揆之情理叔諫如果得贓何敢於計典内㕘揭世榮而復行枷責是中飽之供確有可信但叔諫即未得贓而昏庸失察違例濫刑亦難姑容當即㑹詳請㕘革職業經撫臣㑹疏題㕘在案但係計典届期㕘員行賄之事有闗督臣㑹核臣不能以奏明伏祈皇上聖鑒謹奏此案朕未親理從何定汝是非又據奏稱觸怒督臣等語果係因公抑或因私其中情節全未明晰豈聽汝一靣之辭遂乃譴責上官而嘉與下吏乎若然則朕為先入之言所惑矣湖北按察使臣王柔謹奏為奏明事竊臣案據前任襄陽縣知縣今陞襄陽府同知徐宗奭通詳一件為打死弟命事雍正十年十二月初八日據縣民陳之㨗指報趙雲成等於初六夜打死伊弟陳之欽相驗􅇟門右眉叢左鼻孔刀傷左耳輪右手指咬傷腎􅇸揪傷訊供未認經督撫暨前署臬司朱㵢批行確審去後十一年六月十二日據襄陽府詳據徐宗奭詳稱審明趙雲成竝未殺死陳之欽請行保釋另緝正兇臣查核原巻初六夜趙雲成同陳宏聖等至陳之㨗家報信云之欽身死之㨗即云必是趙家人打死雲成隨即跑避情有可疑駁令確審九月二十三日據該府詳據署襄陽縣張鍾秀請照原詳將趙雲成保釋報㕘仇盜未明臣查閱詳内叙有陳之㨗在府告詞内稱前縣審訊雲成曽經供認等語何以前詳刪除不無疑竇又即駁審十一月初八日據該府詳解前來臣隨親訊趙雲成始猶狡飾畧加究詰便稱求提趙士竒到案寃就伸了當即飛提趙士竒質對據雲成供士竒從前打死陳淑玉賄買仵作用藥掩傷揑稱中毒被陳之欽擦去敷藥驗出傷痕問成絞罪買通屍親假做獨子留養所以懐恨去年十月十三日拏十五兩銀子與小的要小的同去殺害至十二月初六夜殺死陳之欽是他帶一把小刀殺的腎􅇸的傷也是趙士竒揪的而屍兄陳之㨗亦稱陳之欽從前為堂兄陳淑玉被趙士竒打死帶領陳子玉告状及擦洗屍傷是實訊據趙士竒雖不認謀殺陳之欽情事而假揑獨子留養之處則自稱係用銀六十兩買陳家出結且將有兄趙士璧有弟趙士璜直認不諱隨查舊巻亦係徐宗奭任内據陳子玉告趙士竒於八年十月十九日打死伊兄陳淑玉驗有眼胞腎􅇸二傷將趙士竒擬絞以該犯之母薛氏年七十二嵗家無次丁附請留養九年七月内准到部文奉㫖趙士竒從寛免死減等發落准留養親經前臬司唐繼祖欽遵轉行在案臣思趙士竒從前打死陳淑玉被陳之欽洗傷擬抵賄揑留養則其懐恨之欽黒夜殺害似為情之所有且該犯既非獨子則前案亦難寛縱除駁發該府將趙士竒假揑賄買各情一併審明取應㕘各職名分案招解并報明督撫外但此案有干從前承審出結各官處分而徐宗奭又係督臣題陞之員臣益將不免於嫌怨理合預為奏明伏乞皇上睿鑒謹奏公則何妨倘私而復私自必觸怒而益觸怒矣仍如前摺批諭湖北按察使臣王柔謹奏為􅄋陳苦衷跪懇天鑒事竊臣自雍正六年春陞授道員䝉皇上特恩着臣摺奏臣惟感高厚難酬凡事闗國計民生者知無不言言無不盡未免觸督臣之避忌積恨日久但從前逺處苖疆猶不過牌票文案之間受其斥辱臣何敢瑣凟今臣仰荷聖恩陞任湖北臬司惟知謹守理法凡遇事案有情罪可疑者臣俱詳加究訊一經審出寃抑則承審各硃批此係汝任内事詳明該督撫題請方屬合宜臣當經具詳而督臣即斥臣為多事更如兵餉小建一事經臣具奏而督臣復厲言變色將臣痛加詈辱臣惟念朝廷莫如爵倘稍露詞色督臣必謫臣以倚恃君恩目無國法致臣難以自剖是以俯首忍受笑靣相迎孰意見臣順受不抗習以為常於僚屬同見之際有議論未合者輒肆行怒罵幾視臣同奴𨽻矣臣既不能曲就勢必受罵無休但臣職任提刑為通省各府州縣之表率似此屢遭挫辱而竟一味忍氣吞聲臣亦幾成隂險小人觀瞻不雅我得不跪懇聖慈之垂憐臣曷勝惶恐待命之至謹奏觀汝自莅任道員以來一味任性縱肆凡所陳奏躁言妄論十居八九率不可行朕悉予寛恕者念汝存心尚有效力之誠耳近日所奏彌覺狂誕不經頗露恃恩使氣景象果如此則是在上既無表率之能在下又無遜順之雅乃為朽木糞土之質不堪雕琢造就朕從前望汝成汝之意誤矣嗣後若猶不知改悔勉勵一經督臣邁柱㕘劾必嚴加懲處不汝姑貸當切加詳慎莫負恩諭湖北按察使臣王柔謹奏為請綏邉土事竊照容美土弁田旻如不法經督臣題㕘奉㫖着來京詢問嗣因該土弁懇請寛限至今未報起程前於十月二十五日臣接督臣密札據彛陵鎮禀稱容美斑竹園等處土民男婦三百餘人逃出鄔陽闗等情當飭歸巴等州縣安撫去後茲於十二月初四日復接督臣密札奉有檄問田旻如㸔伊如何回覆一靣就近酌調官兵詳籌妥備之上諭密鈔轉行到臣臣查田旻如倚恃土職恣意妄行我皇上屢加赦宥仍不悛改今復䝉聖恩寛大暫停革職着令赴京詢問理應即日起程何得藉詞寛限如果剋期就道情猶可原倘仍復推延自應加以兵威使知懲戒從前永保桑等處臣仰承聖訓敬謹辦理竝無滋擾今容美情形臣久悉其大槩且現任楚省更當身任其事懇請皇上准臣總任辦理撥帶官兵前壓該境先於附近諸土司宣布我皇上徳威曉以大義悉使安静絶其附和即擇能幹土弁傳諭田旻如開其愚䝉使知覺悟諒不待張弓發矢自可輸誠倘仍負固執迷逞其螳臂只須分佈附近各營官兵四路堵截伊自困於範圍之内便可設計就擒而使邉土永臻綏靖也但必事權歸一呼應始靈更懇皇上將一切機宜准臣措置調度無致將弁掣肘庶臣得以悉心籌畫慎重辦理一勞永逸斷不致有輕率孟浪及遲誤事機之虞耳除經回明督撫二臣聽候示行外臣謹恭摺奏請伏乞睿鑒俯賜俞允施行謹奏觀汝似有瘋顚之疾不然何狂誕至於此極也湖北按察使臣王柔謹奏為再陳管見敬請睿裁事竊臣前以通裕民食之法請於秋成確探上游豐收之處差員領銀前往採買至次年青黄不接之時減價平糶繕摺陳奏業經奉㫖發議惟是豐收地方一經各處差員赴買恐一時米價昂貴更不得不為籌及臣查豐收之地其米價未得平減者多因富商大户恣意囤積所致若必強之使賣恐有不肖胥役藉端滋事而需食之民仍未均沾實恵臣再四思維有不禁自除之法莫善於各省府州縣遍開常平倉捐榖之例以備積儲以資轉運也盖富商大户蓄積銀榖每思遇開恩例急公上進祇以開例之地離鄉窵逺不能自赴上納輒轉託親友順帶包捐不無多用盤費且有被騙重納者以故率多觀望今若於各省府州縣悉開常平捐榖之例使本地之人即於本地親身上納既無詐騙亦免盤費節省稳便凡有米榖之家無不踴躍一遇豐收之歳米榖必半在官而半在民矣其所收榖石遇有鄰省差員赴買價銀收貯藩庫即可碾米撥發領運則鄰省採買之員不必求米榖於市而止問米榖於官自無市價高昂之患而囤積者更無所容其姦如有謂捐多米貴者殊不知本地收捐之榖即可於本地隨時碾米減價平糶更不須逺謀於他省尤為便㨗似於通裕民食之計大有裨益如果臣言不謬伏祈皇上敕部議覆施行謹奏此奏是然尚非其時須待可行之日再當斟酌湖北按察使臣王柔謹奏為敬陳管見事竊查私鑄律禁綦嚴而江安豫楚各省界連地方仍不能盡絶者則以制錢尚少不能遍處流通故私錢猶有雜用之處也欲絶其弊務須多為鼓鑄使官錢充足而私錢自除惟是制錢工本浩大各省銅鉛轉運維艱自難悉為鼓鑄似宜擇適中之地開爐辦理使制錢四靣流通兼須節省工本則莫便於武昌也臣訪聞鼓鑄之法每紅銅百斤白鉛百斤共鑄制錢二十千零八百文内除人工雜項三千一百一十四文凈得錢十七千六百八十六文以運京價脚而論銅每百斤約需銀十七兩五錢鉛每百斤約需銀九兩二錢是費銀二十六兩七錢之多而所得錢文尚不及十八千值銀不及二十兩如積數千萬串而計之其貼賠銀兩不下數百萬國家經費詎可不酌籌慎重乎査楚省採買雲南銅價每百斤交藩庫銀十三兩臣前據永綏協副將張鶴靣言伊於雲南遊擊任内辦理東川厰務礦商所得賣價每銅百斤不過八九兩自東川而至武昌水陸運脚不過二兩五錢通計脚價二項不過十二兩其雲南藩庫收價十三兩於中不無浮費且責令楚員赴買滇省不無岐視價必昻貴宜令滇省厰員照實在價值收買開報即令滇員運至武昌交收更可節省浮費至湖南郴桂等州縣悉出白鉛每百斤價銀三兩三錢其滇黔所産白鉛官買礦商價值不過三兩加以運至武昌脚費總不過四兩有竒是合銅鉛兩項需銀不及十八兩即可得錢十七千六百餘文絲毫竝無貼賠將來節省何止百萬倘䝉聖恩俞允於武昌設局開爐鼓鑄竝請欽差亷幹部員至楚監督銅鉛兩便則制錢自多其鑄出之錢即令江安豫蜀各省差員赴楚領回搭放兵餉國寳既得流通私鑄自可凈絶此臣芻蕘之見如有可採伏祈皇上睿鑒施行謹奏通盤議論皆係未見顔色之瞽説朕何暇一一指駁訓示汝此等愚頑也湖北按察使臣王柔謹奏為敬陳楚蜀水陸道途之險請敕開闢疏鑿以利攸往事竊查湖廣入川大路由彛陵以至簡州多崇山峻嶺草木叢雜其濵江道路毎係山頂懸厓窄隘尤甚下臨不測之淵倘值坍頽塌卸偪仄尚不盈尺行人乘騎失足不但無從救援即身屍亦難撈獲至於水路除川省各灘不計外即以楚之歸州而論水大則有拽灘之險江心大石横亙中流舟行必迎石而放將次抵靠則須急扭頭招從旁㵼下頃刻數十里勢不可遏故唐詩有千里江陵一日還之句倘操舟毫釐差謬即撞硼瓦裂莫可挽留若水小則又有新灘之險四靣狼牙怪石中僅溶道一泓勢更衝激而湍下則係深坎數丈形同瀑布稍一誤觸雖巨艦立成齏粉縱舵工水手十分諳習亦難保必無舛錯臣前在湖南同知任内奉委觧運川餉陸路而往水路而回數濵於危至今每一念及輙魂飛天外近詢之往來蜀中者亦莫不驚怖毎嵗每月之間行人必遭覆溺貨物每被沉淪殊堪憫惻臣查夔闗荆闗兩處税課盈餘大倍往昔則知楚蜀道路百貨虞其陸路之濵江者則宜酌加改闢寜紆程數日務使有實地可憑方不致誤墮淵阱也夫當日設險守國蓋為割據地利而言方今天下一家聲教四訖東西朔南悉在幅員版圖之内更宜使血脈流通周行無滯臣不揣愚昧懇請修鑿平坦不特往來商旅咸祝我皇上仁夀萬年即一切解運轉輸亦均資利便矣為此謹奏觀汝屢次論奏俱屬狂妄不經莫非爾身果有瘋證耶全不計及事之可否施行乃於君父之前矢口亂道是誠何心大抵素性偏於粗浮所以但喜多事而不耐閒靜耳硃批諭㫖巻一百四十二下
