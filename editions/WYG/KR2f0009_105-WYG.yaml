body:
  text: 欽定四庫全書硃批諭㫖巻一百五硃批楊鵬奏摺雍正四年四月初二日山東沂州營副將臣楊鵬謹奏恭請皇上聖安朕安今用爾為南陽總兵矣所奏二事留中候酌定朕是爾知己恩主爾知之乎衆人設計排陷復加㕘奏朕俱不聽一見即以爾為可用不但不加罪譴而反格外超擢且爾曾䝉聖祖知遇身受兩朝眷顧若稍有孤負舉頭何以對天前任董玉祥聲名甚好爾接任後如少不及仰面何以對朕勉力為之凡百處據實無隱公勤辦事和輯兵民訓練營伍整飭塘汛殫心盡力以圖報稱毋令人竊議朕乏識人之明也同日又奏為奏聞事竊臣查營汛墩臺之設有緝盜安民盤詰姦宄之責今東省每墩設馬兵二名歩兵三名晝則瞭望夜司戍守誠不可一刻稍懈但查墩兵均係土著間有距家一二百里之外者兹隻身撥派責有攸歸何敢擅離汛守惟念煢煢兵卒旣派斯墩其地勢情形加謹防範日乆人地漸皆熟諳若復行更換雖勞逸得均而新兵初至未必相宜且一兵所領月餉為數無多難堪兩地炊㸑衹因墩臺原無兵丁家口棲身之所以致按年更易徒滋往返臣愚昧無知仰懇皇上天恩請照山西墩房之例敕下撫臣東省凡有大路墩臺地方除原有馬棚並公所營房二間之外每墩設法蓋造營房十間務必實力奉行修葺堅固寛大使兵丁眷屬棲止得所該管營員擇兵之家口少者令其擕眷永遠居住如此則有家室之安無兼顧之慮得以盡心廵防不獨有便於墩兵亦且有裨於地方矣臣不揣愚陋謬陳芻蕘伏祈聖鑒施行謹奏此事當詳明該撫鎮細加斟酌具題請㫖雍正四年六月二十六日河南南陽總兵官臣楊鵬謹奏為恭謝天恩敬繳聖諭事雍正四年四月二十日跪接硃批諭㫖臣即望闕九叩恭讀聖諭不禁涕泗交流臣何人斯受此隆恩雖粉骨碎身亦難圖報萬一竊思臣一介庸愚毫無知識由千把微弁荷䝉聖祖仁皇帝天恩於㕘將任内即奉特㫖委署山西大同鎮印務彼時馬覿伯雖巳陞補未經到任緣臣賦性愚直屢因公事觸怒馬覿伯伊遂設計排陷暗行㕘奏幸䝉我聖主恩同天地明並日月不惟曲賜矜全而且隆恩疊沛補授今職伏念臣父子兄弟均䝉聖主洪恩至於此極即木石猶知感動況臣具有人心敢不力圖報效臣惟有凜遵聖諭益加感奮潔已奉公無欺無隱竭盡犬馬血誠仰副我皇上格外委任之至意耳所有奉到硃批原摺理合恭繳謹奏覽奏知道了勉力為之以副朕望同日又奏為請㫖遵行事竊臣荷䝉聖主隆恩擢補南陽總兵官自入境之初經過臣屬營汛見其隊伍旗幟皆舊敝不堪臣思旗幟為軍中眼目若因仍舊習不為整頓非所以壯軍容而嚴部伍也因查臣屬七營歩兵缺少額設棉盔甲二千六百零四頂副業經前鎮臣董玉祥應需大小旗幟若干面即委員製造數月之内約可全僃造完之日復行補造盔甲統俟足額報竣伏乞聖主敕示施行抑臣更有奏者臣到任後查閲案巻已獲未獲之盜案共計四十餘件現在報強報竊者不一而足揆厥所由皆因專汛文武官弁平日怠玩廵防所致臣隨飛檄各營將弁嚴飭廵防墩堡兵丁日夜廵查以期盜息民安但兵丁有守汛廵防之責而實無離汛遠緝之例必湏文武協力清查盜源方克有濟臣已諄切咨㑹河南撫臣轉飭各府州縣勤保甲之稽查嚴捕役之窩縱文武同心地方自享寜謐之福如果有實力奉行之員著有成效臣當會同撫臣另䟽題薦倘或因循懈怠臣即㑹同撫臣特疏題㕘此臣慎重地方管見是否妥協伏候聖裁再查臣衙門從前親丁糧原係百分經董玉祥遵照恩賞之例減𤼵四十分入於各營公費奏請補造盔甲惟存馬歩糧六十分此六十分之内有馬糧四十八分歷來交代並無馬匹只有馬價額騎坐馬匹起文赴部請票購買以補原額再臣既䝉恩賞親丁糧六十分臣亦不敢全糜國帑現有隨臣任所家人二十餘名頗曉騎射俱飭令頂補實伍一例差操理合據實奏明統祈聖主睿鑒施行謹奏亦不可過於清苦取分内應得養廉朕不嗔責汝也同日又奏為恭報二麥收成上慰天心事竊臣叨䝉隆恩擢補總兵重任不獨軍務係臣專職凡地方年嵗情形理宜據實陳奏臣到任後隨查得臣屬七營之南陽汝寜歸德三府並開封府新改直隸許陳二州汝寜府新改直隸光州所屬四十九州縣地方自春徂夏雨暘時若二麥收成咸稱豐稔米糧價値甚平民無艱食之虞入夏以來又復甘雨時霈秋禾秀𤼵大有可期臣身列戎行睹此豐登景象欣忭無似謹據實入告上慰宸衷伏乞聖主睿鑒謹奏據奏二麥收成秋禾秀𤼵朕懐深慰凡如此等奏報務宜據實直陳若稍渉粉餙欺隱則為負朕也雍正四年十月初九日河南南陽總兵官臣楊鵬謹奏為請均勞逸以收實效事竊照臣屬之平頭垜嵖岈山在汝寧府遂平縣之西四十里實居本省之中山非峻險徑路分明居民又皆土著無可藏姦今汝寧營添設把總一員馬歩兵丁三十名僅守此山别無汛地廵防較之别汛一弁而兼管兩縣中軍復司汛地者勞逸懸􅊋臣查汝寧營㕘將之中軍守備旣有兵馬錢糧之責復予以廵防汛守之司即使才堪肆應亦難分身兼顧臣愚請將平頭垜之把總帶兵十名移駐汝陽縣其城内地方仍屬中軍守備專防城外盡歸把總汛守其平頭垜仍留兵丁二十名歸隸確遂把總擇委頭目一名督率防範一轉移間汛守廵防地方各收實效矣冄查臣標右營所轄南陽南召當年原係兩縣今雖南召歸併南陽地方實屬遼濶專責把總一員不無綆短汲長之慮因查臣標左右二營存城尚有千把二員請將南陽汛地責成千總而把總專管南召汛務存城只留把總一員䕶送一應來往差遣如此則勞逸得均而汛防有賴矣抑臣更有請者臣屬汝寧營地當吳楚之衝歸德則山東接壌陳州係江南連界㐮城乃衝繁大道俱稱緊要營汛若不親歴廵查恐布置未周伏懇皇上准臣輕騎減從隨時親歴查閲庶官兵知儆營汛整肅而宵小自必歛迹矣臣因營汛地方起見冒昧陳請伏乞睿鑒批示遵行謹奏所奏俱是其撥兵移駐等務與撫臣田文鏡商酌妥協會疏題請可也同日又奏為恭繳硃批諭旨敬陳下情事雍正四年七月二十五日臣家人齎捧硃批奏摺到臣跪讀之下仰䝉聖訓周詳不啻耳提面命自當心體力行所有奉到硃批奏摺理合恭繳至臣前摺陳奏前任鎮臣董玉祥所留隨丁馬糧四十八分䝉天恩賞給飬㢘受恩愈重報稱實難第查隨丁馬糧向無馬匹止存馬價銀八百六十五兩新舊交代歴有年所今董玉祥那用此銀已䝉聖主矜恤𢎞仁特恩寛免但思此項馬匹折價根由皆因新舊交收之際借此居奇指稱疲瘦老弱勒掯刁難因照重價折銀以致永成流弊今若再動公費購買補額則將來交代弊竇復萌臣思既䝉皇上隆恩擢補總兵重任隨帶辦差馬騾豈無二三十匹既係隨丁即應自備如遇差遣一例輪流且彼此俱行自備則新舊得免交盤既無缺額之馬不受勒掯之累倘䝉聖恩俞允臣隨任現有馬騾二十二匹臣再購買二十六匹以足四十八匹之數聽候遣調抑臣更有奏明者查臣屬七營礮位寥寥無㡬今臣謹捐造子母礮四十位標下左右二營存留二十位荆子闗安設四位其餘十六位酌量分發各營險要處所礮位缺少營汛安設敎演均期施放純熟有備無患庶稍資軍實而臣亦得盡犬馬微忱於萬一謹具摺奏明統祈皇上睿鑒施行謹奏類斯等事只要所行是當而已朕不便批諭雍正五年二月二十六日河南南陽總兵官臣楊鵬謹奏為恭繳硃批諭㫖敬陳欽奉緣由事竊臣前摺奏請製旗幟捐礮位查營路分汛防種種愚忱荷䝉聖鑒臣跪讀硃批感凜益甚臣隨於封印之後輕減騎從秋毫不累營伍親視地方險易就便操演兵丁技藝因廵至臣屬之歸德府鹿邑縣地方與江南亳州接壌東西大路延袤一百二十餘里係山陜通商要路其間並無塘汛行旅往來無以防衞臣即飭令各該營酌定遠近添設汛防三處臣因便道面商撫臣令該有司修造兵舍墩臺庶晝夜防䕶有藉而道路行旅自可無虞矣其餘或有應添汛防之處容臣酌妥會商安設至於旗幟業已製造報竣分給各營以壯觀瞻所有歩兵盔甲未完之數現在仍行補造其子母礮位臣已捐銀造就照前摺奏明處所分給安設務期教演純熟有備無患統俟盔甲造齊之日逐一分析造冊報部備案至南召南陽平頭垜移緩就急等事臣已咨商撫臣尚在委員查勘俟勘明妥確移覆到日遵㫖㑹題所有奉到硃批奏摺理合恭繳謹奏聞爾聲名甚優勉之爾子楊琦朕面見時另降諭㫖同日又奏為雨雪及時麥苖茂盛據實奏明上慰聖懷事竊臣節據臣屬各營將備報稱去冬得雪三次每次約有五寸六寸不等俱皆入地足滋沾潤交春以來復時得雨雪在地麥苖勃然興起及臣廵視營汛果見臣屬地方二麥茂盛將來收成十分可望田夫野老莫不懽愉鼓腹時豐嵗稔兵民熙皥理合據實奏聞伏乞皇上睿鑒謹奏覽奏雨雪霑足深慰朕懷爾等文武大員皆實心任事能以忠誠感格上蒼則地方自䝉錫佑之慶勉為之雍正五年五月十二日河南南陽總兵官臣楊鵬謹奏為恭謝天恩謹請陛見以遂瞻戀微忱事竊臣仰沐皇恩至高極厚自顧駑駘毫無報效夙夜捫心正切慚悚臣子何人復䝉召問聖訓諄詳賞賜緞疋更荷天恩賜臣貂皮捧齎到署之日臣即率領臣子楊琦望闕九叩謝恩袛受訖伏念臣自山西老營營㕘將叨䝉特恩補授山東沂州副將赴京陛見之後到任未㡬旋奉特㫖擢補南陽總兵官自違天顔將近二載戀主之私時刻莫釋竊念南陽一鎮地居腹裏京師咫尺往返非遙況路當孔道營汛繁多一切廵防事宜臣方竭力整飭若不恭聆聖訓恐未免措置失宜伏乞聖恩准臣於十月初旬辦理軍政事畢馳覲天顔跪聆聖訓庶犬馬依戀之私得以少遂而臣一切職守亦得有所遵從矣為此具摺奏謝仰祈恩允臣無任懇切待命之至謹奏河南係腹裏地方無甚緊要今調爾湖北可速赴新任竭力黽勉莫移素志毋負朕恩目今無庸奏請陛見爾經見朕數次曾䝉詳細訓諭何必為此無益之往還到任後遲三二年自命爾來京見朕也遵㫖毋違勉之勉之同日又奏為夏麥豐收秋苖茂盛上慰聖懐事竊查臣屬七營所轄府州縣地方三月内雨澤愆期地土微旱臣即虔誠祈禱於閏三月初三初七初十等日連得時雨四野霑足及至四月雨暘時若不獨二麥收成俱屬豐稔而秋禾更得播種通計臣屬各營所報麥收分數實有八分以上禾苖亦甚秀發將來可期大有理合據實奏聞上慰聖懷伏祈皇上睿鑒謹奏如此方見留心地方從來武員每於田疇雨澤膜外視之殊不知兵民原屬一體文武大臣均有地方之責曷可漠然不顧所奏朕嘉悦覽焉雍正五年九月十六日湖廣襄陽總兵官臣楊鵬謹奏為恭謝天恩敬繳硃批事雍正五年六月初六日跪接硃批諭㫖臣叩頭捧讀仰䝉我皇上訓諭諄切不啻耳提面命更荷賞賚香錠一匣榮幸彌深感激無地所有奉到硃批奏摺理合恭繳伏念臣犬馬庸愚罔有知識荷䝉聖主隆恩擢補南陽總兵寸長未效復䝉特恩調補襄陽重鎮嗣接臣兄楊鯤家信又䝉皇恩浩蕩擢授直隸古北口提督臣與臣兄自揣何人均邀異數聖恩愈厚圖報愈難惟有交相誡勉永矢冰蘗之心共竭駑駘之力以盡臣子當盡之職仰報聖主難報之恩於萬一而已所有感激微忱理合繕摺恭謝伏乞皇上睿鑒謹奏但照管自己一身為要交共等字皆黨援朋比之藉詞乃朕所深惡者假如楊鯤一旦被譴則從而共怨交恨乎果若此則不勝其株連矣凡如斯等小見皆不宜存況未必𤼵於眞情亦未必能交相勸勉共矢公忠不過虚文故套耳朕甚厭覽同日又奏為請復㧞補千把舊例以收實效事竊臣查從前拔補千把除武舉功加之外例由食糧目兵遴選考補或以本營之目兵即拔本營之把總考補本營之千總或以本鎮協之目兵即拔本鎮協之把總考補本鎮協之千總葢緣生長於斯歴有年所風土情形無不深悉縱有匪類託足不難搜捕駕輕就熟得展所長今奉部文内開嗣後考定拔補之後即調别營一員與之對換其現在之千把總亦應各就近營漸次換易等因遵照在案兹臣荷䝉皇恩調補襄陽竊見對換千把絡繹不絶或隔數百里之遙或越千餘里之遠奔馳道路資斧維艱父母不能搬移妻子不能攜帶不惟嵗時伏臘嗟無聚首之期偶遇暑濕風寒鮮有親信之託雖云公爾忘私未免内顧多憂不能專心供職且千把之設原以資廵防而衞民生貴乎人地相宜若對換之弁乍到一營不諳汛防之險易不識道里之遠近萬一地方有事勢必措施鮮當顧此失彼貽悮良多臣不揣愚昧仰懇聖慈請嗣後拔補千把仍循舊例停其對換不特末弁得免奔走跋渉之苦而於防範廵緝大有裨益矣是否有當伏乞皇上睿鑒施行謹奏此奏不是矣國家政令豈宜朝行夕改營弁對換亦未必盡皆千餘里之遙汝懷邀譽之心具此一偏之論俾恩歸於己則怨將誰歸況此事係大員條奏經九卿定議然後施行今據汝一介武夫市小惠而不顧大體之奏遂爾更改成例可乎若又不慎宻致令無知微弁羣懷怨望則恐汝禍不旋踵也雍正五年十月二十九日湖廣襄陽總兵官臣楊鵬謹奏為凜奉聖諭恭謝天恩事雍正五年十月二十四日臣家人齎捧硃批奏摺到臣臣叩頭跪讀仰見聖諭煌煌諄詳訓示臣目覩心驚血淚交并自悔自責悚惶無地伏念臣螻蟻末質疊荷皇上異數隆恩無可仰報是以茍有管見即行奏請蓋緣臣年六十六嵗已及桑榆智昏識短思慮不周以至有無知妄舉不顧大體之奏罪無可寛悔懼無及但臣一介戎行實無力延請幕友事事皆臣具草惟因目昏字拙故囑臣婿薰沐代書何敢一字漏􅂥自蹈不謹之罪兹䝉聖主洪恩諄切垂訓臣惟有益加兢惕夙夜小心凜遵天語無敢稍懈以圖仰報萬一耳所有奉到硃批奏摺理合恭繳伏乞皇上慈鑒謹奏覽爾情詞巳悉調換千把因定例攸闗朕嚴行批諭係出一時之見隨於各處訪詢知爾所奏頗屬有理前諭錯責汝矣候另有㫖雍正六年五月十六日湖廣襄陽總兵官臣楊鵬謹奏為仰懇聖恩賞准入籍事竊臣本籍山西因臣父殉節江右臣隻身隨寡母流寓江南即寄籍江寧投營效力及今四十餘年由千把歴䝉皇恩擢授今職臣於山西江南素無家産履任以後以官為家亦未謀及田宅惟在湖南長沙守備任内十有六年因無衙署積俸銀一百五十兩置得房屋二十餘間不意十六年之中臣之妻子女媳相繼淪亡皆寄厝長沙伏念我皇上寛仁厚澤何在不曲體矜全犬馬私𠂻皆得自逹臣故不揣冒昩據實叩懇如䝉聖恩賞准入籍長沙俾臣得遂家室之謀復免搬移之累則生生世世子子孫孫永沐天恩於無量矣為此繕摺奏懇伏祈聖明恩鑒施行謹奏爾今現任湖廣入籍長沙之請不便准行似此奏請者不一朕俱未允准況爾弟兄同氣亦未有異籍之理此事當與爾兄楊鯤商酌而行雍正七年閏七月十二日湖廣襄陽總兵官臣楊鵬謹奏為夏麥豐登秋成大有據實奏明上慰聖懷事竊臣叨沐隆恩畀以封疆重任軍務之餘惟宜勤求民隱仰慰宸衷查得臣屬六營所轄襄郡七州縣地方自春徂夏雨暘時若農事維勤播種及時二麥已獲豐收萬民咸歌樂嵗交秋之際雨水愆期仰荷皇上至誠感格隨求隨應時雨頻施粟穀雜糧現今俱已豐收其晚稲業已成實野老田夫懽愉鼓腹但聞襄陽以南秋禾微旱然米價尚平理合據實陳奏伏乞皇上睿鑒謹奏覽奏知道了汝兄楊鯤豈有如此負恩之理朕實愧於諭汝向時知遇寧不可惜汝當追念祖父深自奮勵毋效汝兄玷辱先人顔面也同日又奏為微臣受恩深重乞效犬馬稍慰下悃事竊臣駑駘末質樗櫟庸材屢䝉皇上殊恩不次超擢即捐糜頂踵何能仰報高深兹於本年閏七月初四日接准湖廣署提臣岳超龍來咨為欽奉上諭事並諸王大臣議覆奏摺臣恭閲之下知噶爾丹策凌兇頑無狀逆天背理恭承聖諭熟慮深思允宜命將興師滅此小醜俾衆䝉古俱得安生伏念臣一介武夫荷䝉聖恩畀以封疆重任今當臣民争思效力之際臣何敢優游内地安享虚糜況臣有長子楊世春係候補守備隨臣任所幫辦事宜値此軍興之時邊陲要地不無轉運軍糈調度兵馬之任懇祈主愚悃於萬一更有請者臣有次子楊琳由武進士叨列侍衞雍正三年䝉猶熟習弓馬是以雍正五年臣特令其齎摺赴闕仰懇聖主賞一差使當䝉召問恩賜緞疋且邀聖諭命臣訓其成人聽聞之下感泣涕零此兩子者均屬年富力强正堪驅使懇祈天恩於此番兩路進兵之㑹為此繕摺請㫖臣不勝懇切待命之至謹奏覽同日又奏為敬陳一得之愚仰祈聖明採擇事竊念兵丁以技藝為先行軍以火器為重茲當用兵之際巳久䝉皇上睿慮深思練以雷車濟以火器誠大有裨益於軍旅者也楚地兵馬柔弱大非秦晉壯健可比惟籐牌之設繪以虎豹之形步武有方進退有則逆兇所恃者馬若出其不意跳舞旋繞賊馬見之必皆驚竄後以鳥鎗繼進無不以一當十也籐牌之技以閩粤為最今臣所屬六營亦時加操練臣思軍皇上此番用兵或於閩粤湖廣等省揀選數百名派入步軍火器之内酌委熟諳籐牌之員董率前往況協伏乞睿鑒施行謹奏洵為大笑談果係年老昏憒乎汝其據實奏朕知之雍正七年九月二十四日湖廣襄陽總兵官臣楊鵬謹奏為遵㫖據實奏聞事竊臣家人齎摺回署臣跪讀硃批荷䝉天語下逮開示愚䝉臣敬誦之下豁然省悟不惟我皇上以鄙陋之見為可笑即臣亦自覺無補愧悔莫及且䝉我聖主寛厚殊恩不即罷斥諭臣據實奏知臣益感激涕零悚惶無地但臣年及桑榆才庸識短心餘力絀思慮不周誠如聖諭年老昏憒也惟念臣自雍正三年䝉皇上特授山東副将引見之後叩違天顔又經五載戀主之私時刻莫釋茲泣求聖主格外天恩容臣再得瞻天仰聖俾犬馬依戀之心得以稍遂至臣兄楊鯤荷䝉皇上逾格擢用上負天恩罪無可逭臣惟凜遵聖訓竭蹷駑駘循分供職斷不敢稍效臣兄茍存不肖之心仰負聖恩身罹國法并無以見臣祖父於地下臣不勝戰兢悚惕之至伏乞皇上慈鑒施行謹奏所慮者汝精神不佳或致貽誤職守若猶可支持朕所願也何必來京陛見徒為無益之往返如實覺有衰邁龍鍾光景據實奏聞朕保䕶汝完名全節不亦美歟然進退二者務宜自信無欺固不可圖一已之清閒而虛負國恩又不可強勉支持曠誤公事貽笑同官并見譏於屬員也總宜量力為之雍正八年正月初七日湖廣襄陽總兵官臣楊鵬謹奏為恭謝天恩據實陳情事竊臣家人齎捧奏摺到鎮仰䝉皇上恩諭諄切周詳不覺涕淚交并感激微悃實非章奏所能陳達竊臣一介微末䝉我皇上知遇隆恩拔於排陷之中畀以總兵之職是臣以負罪之末弁遭逢格外之殊恩歴䝉優擢年齒将届七旬揆之臣心更何不足但勉強竊禄臣固不敢若力可支持借故圖安臣實不忍今䝉皇上恩諭進退二者令臣量力為之臣若不據實直陳是全無人心者矣臣當年於守備任内奉差苗疆地方右臂曾受風濕邇來年及桑榆不能張弓挾矢但臣精力尚健於操練兵丁約束将弁巡查地方臣雖不敢妄自矜詡而自揣儘可支持臣惟益加勤慎勉力供職以期仰報天恩於萬一若至臣力實有不能之時斷不敢貽誤地洪恩矣為此據實直陳伏乞皇上睿鑒施行謹奏覽硃批諭㫖卷一百五
