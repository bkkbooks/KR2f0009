body:
  text: 欽定四庫全書硃批諭㫖巻一百二十二硃批藍廷珍奏摺雍正元年八月二十二日福建臺灣總兵官臣藍廷珍謹奏為懇恩改名事竊照禮諱嫌名分宜引避臣夲名廷珍伏查珍字與御名第二字音聲無異似於尊敬之義未協擬將臣名廷珍改為廷瑛仰祈敇部行知庻臣心得以稍安伏乞皇上睿鑒施行謹奏不必更改向來止避上一字近議下一字並避朕名之下一字同音者頗多若盡改似覺太煩况珍字與朕名迥不相同惟滿字無二音故伊等改書徴字以别其音聲至若漢字音義判然何必更改且爾之名甚爲朕所喜仍書原字可也雍正元年十月二十九日福建臺灣總兵官臣藍廷珍謹奏為恭謝天恩事夲年十月二十八日臺灣協標中營遊擊蔡徴温到臺口𫝊皇上温諭並恭捧御賜花翎緯帽到臣臣恭設香案望闕叩頭謝恩訖伏念臣一介武夫至微至賤叨沐聖恩髙厚非常眷遇祗受難安惟有矢竭涓埃勤慎自勵以圖仰報髙深於萬一耳為此繕摺恭謝天恩謹奏覽爾奏謝知道了勉力做好官莫移初志姚堂居官不爲上等其所施設未必盡善一切營務應更易振作者不可茍且因循必用心整理一番始不負朕任用之恩也雍正二年四月二十日福建水師提督臣藍廷珍謹奏為恭繳硃批事竊臣齎摺家人捧到臣前奏臺灣總兵任内恭謝御賜翎帽一摺奉有皇上硃批臣叩頭謝恩并𫝊示將備一體凜遵著實振作整理外伏念臣一介愚魯遭逢聖世䝉皇上逾格拔擢又欽承硃諭告誡勸勉懇切周詳自問無可報稱惟有潔巳奉公和輯文武整頓舟械簡練卒伍清理兵餉保固疆圉以仰答知遇於萬一耳所有奉到硃諭理合㳟繳謹奏知道了爾居心忠赤及人材膽量俱無可議論若能勉勵操守如吳陞一般可成千古人物即不能似彼一塵不染畧相仿彿亦好不然同在一省相形之下殊不雅觀當竭力勉之雍正二年五月十二日福建水師提督臣藍廷珍謹奏為恭謝天恩事雍正二年五月初十日接督臣滿保手書内另單一紙鈔録御批聞藍廷珍之操守甚為不足爾善為勸誡將朕恩可惜之處告之欽此天顔咫尺臣跪讀之下汗流浹踵望闕叩頭謝恩伏念臣一介武夫至愚極陋荷䝉聖主異數隆恩曠古所無即木石亦應感動非但碎骨粉身不足為報即子子孫孫亦不能報稱萬一况潔已奉公係臣分内之事乃奉職無状致厪宸衷理應即予罷斥乃猶寛臣蠢愚冀臣悔改命督臣移書開導臣䝉擢用榮遇於前又受保全厚恩於後臣惟有痛洗肺腑勉勵清操正巳率屬圖蓋前愆庻幾補過於将來或可贖罪於晚節臣不勝感激悚惶謹繕摺奏謝以聞謹奏爾等大臣既䝉主知受封疆之寄當以千古名節爲重若爲目前小利自壊聲價無乃愚甚縱不能效法古之名臣即如吳陞魏經國韓良輔清廉之譽爾豈不聞乎今之輿論即千秋史册之憑據但實乃名之夲名乃實之華必躬行實踐方爲名實相副非可矯情虛詐而能者設以矯誣博一時虛名事久論定終必敗露爾果能實行朕自有鑒照不在此一奏也爾等有功於國之人若肯自愛非但成全自已乃成全朕待功臣之有始終也否則朕豈可因爾等一時之功而隳朝廷萬載之法紀以姑容之耶向後當勉之又勉雍正二年九月初三日福建水師提督臣藍廷珍謹奏為謹陳臺灣善後事宜仰祈睿鑒事竊臣自出兵至臺灣與賊對壘凡臣身所經歴及考之圖籍得諸訪聞於臺灣形勢之險易事權之輕重雖不能盡悉要領而亦畧得大槩所有善後三欵敬為我減半給以馬匹以便偵探追逐以上三欵臣因身在臺灣四載目之所及心之所思巳非一日故敢冒昧瀆陳是否有當仰祈皇上睿鑒施行謹奏覽同日又奏為奏繳硃批事竊臣前奏恭繳臺灣總兵任内所奉硃批一摺奉有御批臣恭設香案望闕叩頭謝恩訖伏念臣一介微賤䝉聖朝殊遇由千把歴陞提督受恩如此敢不赤心抒忠以圖報國至擒賊殺敵係臣武人分内之事有何膽量乃䝉皇上褒嘉感激之餘愧赧無地至臣不學無術義利不眀以致操守不能堅固皇上既有見聞不立賜罷斥而猶温㫖訓誨臣敢不痛自改悔潔已奉公事事效法吴陞務使暮夜絶苞苴之迹暗室無衾影之慚庻可以仰副訓㫖下盡職守為此㳟謝天恩并繳所奉硃批謹奏全視爾操守若何捫心自安即可以對朕無慚也雍正二年九月二十日福建水師提督臣藍廷珍謹奏為恭繳硃批并報奉到聖諭日期事雍正二年八月二十六日臣標把總齎到臣恭謝天恩奏摺奉有硃批臣跪讀再三感激流涕以臣愚昧猶䝉聖主洪慈開導䇿勉敢不欽遵訓㫖實踐躬行以圖少報主恩於萬一又於九月十九日准福寕鎮臣顔光旿咨轉𫝊諭㫖藍廷珍在臺灣出兵打仗拏賊之處俱無可議論但操守平常當學魏經國吴陞纔是欽此伏念臣沐聖朝殊恩由微弁歴陞鎮提俱奉特㫖陞授乃以未能砥礪清操仰副皇上期望以立千古聲名又䝉聖恩浩蕩不即罷斥訓誨疊頒恩同天地臣惟有見賢思齊時加刻責實在潔已率屬不敢假務虛名以辜我皇上寛容大徳伏乞聖主俯鑒愚衷則臣永矢犬馬圖報於生生世世矣為此繕摺謹奏知道了過而能改則無過矣時刻反身自省何善不能遷耶勉之雍正三年五月十三日福建水師提督臣藍廷珍謹奏為遵㫖咨商回奏事竊臣前奏原任廣東提臣許正功姪許帶至厦臣抵任後確查該員歴年帶領兵船出洋實力哨捕臣因閩海水師人材難得爰敢奏請聖明因才噐使照蔡文以即用知州改授武職之例遇閩省水師相當缺出題請補授奉到皇上硃諭令與督臣商酌欽此欽遵臣即備文咨商督臣滿保去後茲准咨覆内開查甄拔能員因才噐使誠奬勵人才之意惟是文武分途國家定例凡有改授資格皆奉特㫖殊恩今該員許良彬請改武職自應統聽覆奏㳟候聖主睿裁等因到臣縁奉㫖與督臣商酌事理臣謹繕摺㳟請聖主批示遵行謹奏滿保當與爾同具摺奏方是許良彬著來京引見候朕酌定同日又奏為恭繳硃批事竊臣前奏㳟陳臺灣事宜一摺并奏繳硃批二摺俱奉有皇上硃諭除恭陳臺灣地方事宜遵㫖與督臣滿保㑹商具奏外伏念臣資質凡陋過受寵榮朝夕矢志效忠冀竭駑駘之力祇以未能勉勵操守致厪聖懐臣萬死不足贖責乃我皇上猶逾格保全訓勉無巳臣雖木石豚魚亦知感激敢不益加兢惕凛遵訓㫖細細體認刻刻操存改悔猛省務使志慮精純下全臣節上報主恩臣不勝感激涕零謹繕摺奏謝所有原奉硃批理合㳟繳謹奏要實力奮勉自新不在數行奏詞也朕日前批朱文摺子之諭㫖爾當鈔録一看雍正四年八月十五日福建水師提督臣藍廷珍謹奏為微臣恭奉諭㫖欽遵勉勵仰祈聖主垂察事竊臣接海壇鎮臣朱文宣示諭㫖爾到厦門親向提督藍廷珍説伊若操守好便是好官務須著實勉勵欽此臣隨望闕叩頭謝恩訖伏念臣仰沐聖祖仁皇帝生成大徳復䝉我皇上培植深仁洵亘古非常之殊遇臣感激恩深惟有矢志潔清正已率屬綏靖地方冀盡職守是以去冬陛見時業經將下情披􅄋陳奏幸邀聖明洞燭矣茲重䝉皇上諄諄示訓臣惟益勵冰蘗以期俯仰無慚庻可仰副聖天子期望於萬一耳臣謹繕摺専差臣標右營千總戴進齎捧奏謝天恩再照該弁生長海濱經康熈六十年征臺用命年見合併聲明謹奏閩省向來武職大員多係夲省人率皆袒護鄉黨私徇請託以故舉劾不公諸務廢弛惟爾不然一切破靣整飭朕皆知之已曾面諭爾所欠者惟砥礪清操耳近日聞爾陛見回任實力悛改頓非前比朕甚嘉悦如此方是勉之勉之但聞汝待屬員兵丁稍過於嚴從來統轄營伍原當以嚴爲主然又必濟之以寛方爲合宜若止罰而無賞則偏於苛刻殊失駕馭之道汝標下兵弁頗有怨望者第一以綏服人心爲要須先正己而後正人再加以寛嚴相濟威徳並施則怨者少而感者多矣假若一味執法小人羣起必百計千方陷汝於不是而後巳嗣後若能以和平待偏裨以恩恵施兵卒令皆知威可畏知徳可感則汝在封疆諸臣中可謂全材矣勉之勿怠雍正四年八月二十二日福建水師提督臣藍廷珍謹奏為恭謝天恩事竊臣接福建撫臣毛文銓咨内准吏部咨開欽奉上諭事理等因到臣臣跪讀之下惶悚無地查臣前謬將髙鐸保舉罪實難逭幸䝉我皇上寛容不加譴責隨恭設香案望闕叩頭謝恩訖伏念臣以介胄武夫庸愚凡質仰沐聖天子如天之仁頻施雨露曲為培植不知臣何人斯得邀恩遇之隆若此惟有益加砥礪凡事敬謹以期無負職守冀得少報主恩於萬一耳所有微臣感激下情理合繕摺奏謝伏乞聖恩俯鑒謹奏知人則哲自古稱難然必毫無偏私於自心不愧方可告無大過若於㕘劾保舉中去取不公専徇好惡乃招天譴之事慎之慎之雍正五年正月十九日福建水師提督臣藍廷珍謹奏為奏聞事竊查上年十月盡撤廵之後有粤東姦匪假扮商艘於十二月初間飄入閩洋伺刦臣聞信即派撥官兵前往哨捕并檄飭沿海各營舟師㑹擒解報去後續據大担汛守備等觧到被刦晉江縣商船户林進興人船并載回賊夥五名臣隨訊供録敘供由星移粤東督撫提鎮諸臣并照㑹劄行恵潮道縣按照供出各賊姓名務獲解閩歸案審題并差員押帶賊犯二名前往廣東惠潮二縣認緝賊首夥黨又於十二月十五十七等日節據臣標署中軍㕘將王良駿報稱有晉江縣商船户鄭得勝等同安縣商船户張盛隆等漳縣船戸陳元興各船於十二月初九十二等日在鎮海將軍澳各外洋被賊過船刦去衣服銀信等項仍有擄去水手船戸共五名并押坐張盛隆商船一隻等由臣一靣嚴飭出洋舟師竭力追捕一靣咨移督臣髙其倬撫臣毛文銓在案於正月初二日准南澳鎮臣聶國翰咨據商船户張盛隆到汛報稱伊船遇賊刦坐被哨船追捕𤼵礮打死賊夥三名􅂸命乘風逃走至廣東海門烏塗地方散夥將小的船隻同被擄水手船户俱各放回等情前來續又節准聶國翰并廣東潮州鎮臣尚濚先後緝獲賊夥共七名現經觧到臣署四名尚留三名在彼處認緝賊首經臣訊據獲到各賊犯咸供同夥實只四十二人於上年十一月内從粤省飄入閩洋刦掠商船被官兵發礮打死三人現獲一十二人其餘俱有姓名住址鑿鑿經臣備敘供由劄行緝拏務期浄盡俟陸續觧到専差觧送督臣髙其倬發審㑹疏題報所有營汛疎防各員弁職名臣仍一面飭取咨送督撫臣分案㑹疏㕘處為此繕摺奏聞謹奏如此實心辦事方爲不負封疆重任甚屬可嘉爾之盡心效力處朕皆知之若論吴陞之操守爾原不及今於伊故後瑕疵畢露惟一味姑容邀譽至於營伍之廢弛兵弁之疎懈皆置之不問所以云天下事久而自明如爾實心爲國家效力之人雖有謗議豈能惑朕聽聞久之水落石出羙惡判然難掩更將清操二字遵朕訓誨時刻砥礪此一節若能竭力自勉則爲全人矣朂哉毋忽雍正五年五月二十六日福建水師提督臣藍廷珍謹奏為恭謝天恩事竊臣齎摺人回恭捧皇上欽賜人參貂皮并硃批微臣奏摺到厦臣㳟設香案望闕叩頭謝恩訖伏念臣以草野武夫叨受聖朝厚恩歴擢邉海重任中夜思維祇以涓埃未報抱慚衾影縁上年冬間粤匪假扮商船突入閩洋行刦臣即嚴飭捕緝業經具摺奏聞但臣不能先事預防方且惴惴自懼乃䝉我皇上如天大徳不特曲為寛恕復叨硃批嘉臣實心任事又欽賜人參貂皮臣叨受跪讀之際伏思聖主恩施不啻天髙地厚臣惟有欽遵諭㫖凡事加勉更將操守二字時刻堅持以副聖天子期望成全至意理合繕摺㳟謝天恩謹奏朕與諸卿當共相勉勵以仰酬聖祖數十年教養深恩勉之勉之朕能勉與否諒難掩天下人之耳目卿等其審觀而效法之雍正六年八月初七日福建水師提督臣藍廷珍謹奏為據實陳明仰祈聖主睿鑒事竊臣接新任南澳總兵臣許良彬到厦𫝊示諭㫖隨望闕叩頭謝恩訖伏念臣仰沐聖朝知遇歴擢邉海重寄溯自雍正三年十月内赴京陛見叨䝉聖主提命周詳回任後惟有勉竭犬馬餘力凡一切海疆機宜悉夲愚衷敬謹辦理以期稍報聖恩於萬一茲竊查臣所轄標營船隻有應行修造者三項並小修大修船隻俱經前撫臣常賚具題請修應於雍正六年三四等月完竣臣巳屢次咨請督撫二臣嚴檄飭催兼工趕竣而至今逾限巳久報竣者竟屬寥寥臣一面嚴檄飭取福漳臺三厰監督武員職名開報以憑㑹疏究㕘一面咨請督撫臣㑹飭查㕘惟是沿海船工㝡闗𦂳要雖經屢次咨請嚴催至今未能全竣實係微臣不力之咎理合將遲悮船工實情自行奏請聖主敕部嚴查議處庶承造各員咸知儆畏矣為此謹奏覽奏已悉㕘夲到時有㫖聞初有徳甚好果然否又聞陳祖訓人甚平常皆據實密奏以聞雍正六年九月十三日福建水師提督臣藍廷珍謹奏為恭謝天恩事竊臣齎摺人回恭捧皇上硃批奏摺并欽賜磁噐果品藥錠到厦臣隨郊迎至署恭設香案望闕叩頭謝恩訖伏念臣以草野武夫竊禄三十餘載雖時切冰兢勉供職守但聖恩髙厚實難圖報况歴年以來眷顧倍加寵錫無巳臣每中夜細思不知此身作何勉勵庻可仰報聖徳無沗靖共惟有欽遵聖訓凡事勉之又勉務期言行相符以副聖天子勉勵成全至意為此繕摺恭謝天恩謹奏能自加勉甚好尤宜勉勵操守時刻省察切毋差錯念慮再所奏二摺留中雍正六年十一月初十日福建水師提督臣藍廷珍謹奏為遵㫖據實奏聞事竊臣欽奉硃批查得漳州總兵臣初有徳自抵任至今兵民和輯文武相安地方寧謐現調金門總兵臣陳祖訓向無聲譽臣跪讀皇上硃批聞得陳祖訓人甚平常仰見聖明洞燭無逺弗届該鎮臣自調任以來臣每當接見即互相朂勵務期恪供職守以仰副聖天子寛容委任至意臣謹據實奏聞伏乞睿鑒謹奏陳祖訓若仍依故轍因循委靡切毋容隠即據實奏聞可也雍正七年六月十二日福建水師提督臣藍廷珍謹奏為恭謝天恩事竊臣於雍正七年二月十七日據臣齎摺標員捧囬皇上硃批奏摺并欽賜平安丸一包縀四疋貂皮一包哈密𤓰一枚風乾羊一隻果品一盒御書福字全幅又於三月十八日據臣標員齎回皇上硃批奏摺并欽賜果品一盒風乾豬一隻到厦臣俱郊迎至署恭設香案望闕叩頭謝恩訖伏念臣以草野武夫叨承聖天子簡畀閩海鉅任時加訓誨更且寵錫疊施有加無巳臣何人斯際此亘古難逢之殊遇感激之深不覺零涕惟有矢竭愚誠勉盡職守以圖報主恩於生生世世耳為此恭謝天恩謹奏覽奏謝知道了爾近日聲名較前更好但有人論爾頗存親戚𤓰葛之私鄉井瞻顧之念即此亦當改易凡爲人臣者惟貴秉公執正任勞任怨洗浄私腸致身報國庻幾始終保全令名爾今年巳髙大試思君上之奨許史册之記載較之目前一二庸愚不肖親朋隣里之感悦孰輕孰重耶凡事當務逺大始不愧身為大臣求名務建大名求利須謀大利逺害亦當計慮大害方是大丈夫之胸襟局量若斤斤好行私恩小恵以自矜汲汲只圖微名小利以自益是乃小人之情態夫豈封疆大帥之所當爲戒之勉之雍正七年九月初三日福建水師提督臣藍廷珍謹奏為奏聞事竊臣叨聖恩深重未由圖報惟有著實整頓營伍并嚴飭在洋舟師相度天時竭力哨捕以仰副我皇上慎重海疆至意節據出廵各員弁十日一報欣逢聖主徳威逺暨海宇肅清且年來收成有慶臣所轄沿海地方以及澎臺米價平減每石大斗只在一兩以内兵民樂業地方敉寕實皆皇恩之廣被惟於閏七月及八月内兩次接准廵臺御史來札並澎湖臺灣副將等禀報七月二十六日夜間大雨颶風閏七月十三日夜間大雨颶風復作擊碎船隻漂失厰中桅木板料並吹倒官署民房營房墩臺淹死兵丁幸各處早禾巳割晚禾亦未傷損各等由到臣臣即一面備咨督撫委員確勘一面移行臺澎鎮協立将被風損壊戰船官署營房墩臺作速修整被淹兵丁加意撫恤并飭逐一清查實數現在情形具文彚報以便咨題去後俟查明到日臣當即咨㑹督撫二臣合詞繕疏具題伏思臺澎海外地方每值秋潮節候颶風時有今雖據報兩次被風猶幸早禾巳登晚禾得遇時雨大有可期且現在沿海各處米價悉平地方安堵特恐尚厪聖衷為此繕摺奏聞謹奏颶風為患臺郡每不能免據該廵察御史等陸續奏到已特命督撫臣加意撫恤矣硃批諭㫖巻一百二十二
