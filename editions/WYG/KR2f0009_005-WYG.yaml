body:
  text: 欽定四庫全書硃批諭㫖卷五硃批伊都立奏摺雍正三年二月十五日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事竊臣查得陽曲縣地方糧價小米每石價銀八錢六分九釐小麥每石價銀一兩二錢六分五釐黒豆每石價銀五錢七分七釐秫米每石價銀四錢九分五釐為此謹奏覽奏殊為可喜别府州縣價值低昻約畧相同否其更查奏以聞雍正三年三月初八日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事近經臣摺奏陽曲縣米糧價值奉有硃批諭㫖臣欽遵查得各屬報到糧價俱約畧相同其太原府以北之忻代等州至大同府一帶米價尤賤現今各屬米糧俱甚充足自正月二十三日通省得大雪以後二麥長發二三月間正需雨澤今於三月初五日戌時起細雨至初六日已時止經陽曲等附近州縣已報到者俱云入土一二寸不等於麥苗大為有益臣到任時聞平陽府一帶地方頗覺少雨即行令該地方官䖍誠祈禱近臣差人自陜西回來初五日住宿汾州府之介休縣地方彼處得雨較大㸔來雨勢自南而北平陽府屬是日諒應得雨俟報到另摺奏聞外為此謹奏大慰朕懷若果敬信一誠上格更能黽勉吏治天居髙而聽卑斷無不響應之理爾試行㸔雍正三年三月十五日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏明事竊惟知府一官職司一郡凡地方巨細事務均宜刻刻留心方可無誤今值二麥長發之候雨澤最闗𦂳要臣到任後聞平陽府地方和煖種麥獨早此時正需雨澤該知府董紳理宜䖍誠祈禱而該府並無隻字申報及至所屬州縣已報得雨而該府尚未将有無得雨之處報聞經臣嚴行飭諭置若罔聞今忽具詳以患病告休臣詢之髙成齡等俱稱該府於地方事務甚屬玩忽臣思似此闒茸之員必致貽悞地方隨批令布政司委員騐㸔俟詳到臣即具題抑臣更有請者平陽府為晉南第一要缺亟需賢員料理伏乞皇上揀選才守兼優之員補授此缺方有裨益臣謹具摺奏聞謹奏知道了具題到日朕自有㫖同日又奏為恭請聖裁事臣自抵任後檢閲案巻見有前任撫臣諾岷條奏衛所改設郡縣一疏臣因事闗經制隨與布政使髙成齡詢問地方形勢人民衆寡果否妥􅃀之處據髙成齡云所議大同府改設各處均為妥協惟寧武偏闗二處係邊陲要地資員彈壓前撫臣諾岷止議改為二縣恐地廣人多兵民雜處縣令不能控制且以寧武隸於代州偏闗隸於保徳州相距各二百餘里又有鞭長莫及之虞似應將寧武所改為寧武府并建寧武縣為附郭其寧化一所隔寧武九十里地實褊小應設巡檢司隸於寧武縣神池堡改為神池縣將利民八角二堡隸焉偏闗所改為偏闗縣将老營所隸焉五寨堡改為五寨縣将三岔堡隸焉其餘附近營堡各就便分隸縣治總歸寧武府管轄亦儼然一雄郡矣再寧武偏闗二同知只留其一改為寧武府同知駐劄偏闗以彈壓邊界又查寧武偏闗各營堡今既酌改郡邑則鎮西衛亦應裁併以上郡縣均有城署學宫即間有未備應俟新選各官抵任後陸續酌議修補等語臣披閲輿圖復諮詢該管各官均相符合髙成齡所議似屬布置得宜可補前議之未周理合具摺奏聞伏乞皇上将此議歸入前撫臣諾岷條奏飭部妥議施行謹奏該部議奏雍正三年三月二十四日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事䝉皇上念切民生勅下督撫勸諭民間建設社倉以備積貯臣到任以來即留心查問各屬皆仰體皇仁於各鄉各里勸設社倉現今大州縣有捐至三五千石者其餘州縣亦皆有數百石至百十餘石不等惟最小州縣并大同一府地畆磽薄尚未設立臣已諭州縣令其從容勸諭務有成效至省城地方前撫臣諾岷動公費銀五千一百二十四兩零買榖一萬石臣赴倉查㸔俱已買足嚴飭加謹收貯訖目今糧價甚平倘值價值騰長之候臣即減價平糶於地方殊有裨益謹奏甚好但社倉之舉不可涉於勉强惟宜勸導鼓舞聽民自便毋稍抑勒若以督撫威勢嚴諭州縣州縣因之逢迎取媚則百弊叢生矣故云斷不可强同日又奏為凜遵聖訓事臣前次奏摺内鎮慎字樣俱少一點䝉硃批訓誨奉命之下不勝惶悚伏念臣愚昧無知䝉聖恩寛恕復賜指示臣自此知所遵循又䝉皇上将奏匣封固𤼵回臣始知奏匣封口式樣臣初任外吏未諳陳奏體式幸逢聖主提撕訓誨臣惟有時深檢點冀免隕越臣無任感激悚惕之至謹奏諸如此等慎而無禮可笑之舉皆由於敬君之心不誠也凡事務求其本能以真實自矢則鬼神亦當黙助矣同日又奏為遵㫖具奏事竊臣接准部咨内開欽奉上諭各省道員内有兼科道職銜者行文該督撫問明本人有情願不兼科道銜在道員任内効力者該督撫據實具奏留任其有不願在道員任内効力者亦令據實奏明欽此欽遵行文到臣臣查山西省惟糧驛道胡瀛一員兼監察御史職銜臣欽遵詢問該道據稱胡瀛䝉皇上𢎞恩特放山西道員惟有恪慎供職循分効力斷不敢稍有倚恃今䝉聖諭自當益加勉勵以圖報稱懇請代題免兼御史職銜留任効力等語臣查胡瀛為人誠實官聲亦好其辦理驛道任内事務甚屬盡心現今署理按察司印一切審案亦皆明敏伏乞聖恩准其不兼御史職銜仍留道員任内効力臣亦得收臂指之益矣除據詳具題外臣謹據實具奏伏乞皇上睿鑒謹奏巳有㫖之事自然留伊在任此人原係朕所甚賞鑒者但不知将來如何果能始終如一否也同日又奏為奏聞事臣查平陽一帶俱種秋麥此時正需雨澤今據平陽各屬報稱自三月初五日至六七等日陸續得雨土皆滋潤麥苗及時長發其潞安澤州蒲州等近南之處與平陽相仿至太原汾州大同三府平忻代保等州所屬地方二十日以前接連得雨俱入土三四寸不等二麥甚為得濟今嵗麥秋又可大獲現今米價甚平與半月以前相同謹奏近日聞河南山東缺雨爾前畨亦奏稱平陽一帶望雨朕因此頗為厪念今覽爾奏憂懷減却一半矣雍正三年四月十七日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事晉省三月二十日以前得雨日期俱經繕摺奏聞自三月二十日以後十數日之内省南各屬竟無雨澤至四月初三初六初八初九十一等日據平陽蒲州澤州一帶雖節次俱報得雨然終未霑足今二麥尚未結穗米價亦較前稍長臣查潞安澤州及平陽府以南州縣山地居多雨水少遲即有旱意誠恐市價日增民食維艱查各州縣俱有存倉米石經前撫臣諾岷以貯米不能經乆題准易榖臣思此青黄不接之際即将此項米石減價平糶俟秋收買榖還倉誠為兩便臣已行各屬令其将米石照時估減價一錢陸續糶賣又将積年民借倉糧停其徵收則市價自不致騰貴民食亦不致艱窘矣再查太原以北大同代保等府州所屬雨已霑足糧價亦平其省南各屬俟得有透雨星馳奏報外所有平糶倉糧縁由合先奏聞謹奏減價平糶允為濟時善政但須慎防屬員吏役借此網利其中倘有羡餘亦應存留備用於秋收買補還倉更為從容也雍正三年四月二十日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏明事臣到任之初有絳州知州萬國宣呈報署襄陵縣知縣吳世雍勒掯前任交代加收錢糧耗羡等情到臣臣隨𫝊問布政司髙成齡據稱吳世雍因虧空全完開復經前撫臣諾岷一面将世雍題補襄陵縣一面委令前徃署理該員署任方及一月且聞萬國宣與前任病故知縣俞之琰誼屬鄉里恐難慿信隨即檄調世雍到省面詢并密委洪洞縣知縣孔𫝊忠􅃀查去後嗣據孔𫝊忠回稱襄邑百姓素稱刁健前任俞令衰老昏慵一切錢糧事務俱聽户頭現年經管自吳令署任即設錢糧紅簿稽查甚嚴户甲不能自便隨有加耗名色拆騐並無實據至前任交代因吳令盤查存倉榖石扇颺過重折耗太多之故並非掯勒等語臣復差人密訪與孔𫝊忠所禀無異嗣有部選襄陵縣知縣葉心朝持憑到任臣以部選有人吳世雍原係署事之員因令其在省候部文定奪後又於四月初一日接准部咨吳世雍已實授襄陵縣知縣其部選之葉心朝留在山西令臣遇缺題補臣隨給文令吳世雍赴任兹本月二十日據吳世雍禀稱於十四日抵任十五日忽有縣民號召多人聲言不要世雍任事在縣喧閙已将為首之張功等四人拿獲等語臣隨委平陽府同知劉登庸等給𤼵告示前徃曉諭并􅃀查起釁縁由到日酌量情罪定奪另奏外合先奏聞謹奏此事自應先将刁民懲創即一面􅃀查吳世雍果係賢員宜加意保全毋令長此刁風倘吳世雍原有不協自侮而後人侮則予以兩敗俱傷可耳總在爾秉公斟酌為之也雍正三年四月二十五日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為再行奏聞事臣查襄陵縣百姓號召多人在縣喧閙經臣據報委員􅃀查并𤼵示曉諭縁由當即繕摺奏聞兹據該管絳州知州萬國宣并該縣吳世雍等禀稱襄邑百姓於十五日聚集十六日該州即赴縣飭諭并鎮臣袁立相差逰撃李順於就近帶兵彈壓即行解散等語臣查山右民俗素稱强悍動輙聚衆若不嚴究恐長刁風臣已諭令該州并同知劉登庸等查拏首謀之犯同先經該知縣吳世雍拏獲之張功等四人􅃀審起釁情由定擬治罪其餘附和愚民概行免究以省拖累合再奏聞謹奏此事前已有諭原不應連累多人同日又奏為奏聞事先因省南一帶地方得雨尚未霑足糧價稍長經臣飭行各屬将存倉米石減價平糶縁由繕摺奏聞今於十七八九及二十三四等日仰頼聖主至誠感格甘霖普降所有省南之潞安府澤遼沁三州并平陽府以南浮山翼城蒲解等州縣及汾州府所屬地方俱報得雨霑足其各屬米糧因開倉平糶又時雨遍霑市價日減省城亦連日得雨省北代保等州大同府屬原未缺雨糧價同前臣謹具摺奏聞以慰聖懐謹奏朕正為爾晉省憂慮今閲此奏大慰朕懷觀爾自署事以來其他尚未見所長頗覺實心任事朕甚嘉悦如果能一秉真誠為國為民則上天之感格垂佑朕可為爾操左劵也雍正三年五月初九日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為恭謝天恩事雍正三年五月初七日臣齎摺把總捧回臣報雨一摺奉到硃批諭㫖臣跪讀之下感愧無地隨恭設香案望闕叩頭謝恩伏念臣身受殊恩有加無已署理巡撫到任三月寸長未効方深惶悚乃䝉恩㫖逾分褒嘉并勉臣一秉真誠臣自問何人遭此隆遇惟有恪遵聖訓愈加黽勉益竭駑駘以期無負我皇上造就之洪恩耳臣謹繕摺奏謝謹奏雖云報効心切諸凡宜以持重妥協為要不得孟浪從事一切作為必慎終惟始籌畫萬全而後舉行方不致舛謬也雍正三年六月十一日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事臣㸔得山西省城於六月初五日大雨如注四野十分霑足且喜隂雲宻布得雨甚寛臣隨飛查各屬去後兹據太平潞汾大五府澤遼沁等十二州俱報初二至初五六等日得有透雨此皆我皇上念切民依至誠格天所致農民歡慶感頌皇恩臣無任歡忭之至謹具摺奏聞再查晉省以南平陽蒲解等處天氣稍暖自太原府以北州縣地氣寒冷所有二麥收穫較他處獨遲今現在已報收穫者平陽蒲州解州絳州各屬收成自四五分起至八九分止不等其餘尚未收割俟通省報齊臣即分别各府州細數彚摺具奏恐上厪聖懷合先奏明謹奏深慰朕懷頃聞邉外一帶竟至熟荒去年朕曽有諭内地百姓如有情愿用船載糧從黄河販運者任其販賣毋禁如此似内外均獲利濟今嵗不聞有照此行者爾其􅃀查情形果若有益無損何不諭地方官勸導百姓行之但不可彊之使為也假若照此行後邉内糧價豈不更下乎總須爾酌量行之雍正三年六月二十九日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏明事臣齎摺家人回署恭捧臣前奏為奏聞事一摺奉到硃批諭㫖臣欽遵查得今年五月間准歸化城都統丹津來文令商人前赴歸化城糴買存倉􅐘子臣即徧行出示曉諭嗣據各屬回稱因米糧充足價值甚平􅐘子非民間常食之物並無願赴採買之人臣復咨覆都統丹津在案今䝉聖恩軫念口外熟荒令臣酌量而行臣思山西地方各處米糧市價亦賤雖現在諭地方官加意勸諭但恐願徃採買商人終屬稀少現今口外米糧壅積不能流通以致熟荒不可不急為圖維臣已給𤼵銀兩差右衛理事同知前徃歸化城土黙特一帶地方採買米榖􅐘子等項一萬石如尚不濟事再行領銀採買務使口外米糧疏通於䝉古邉民有益所買米榖近黄河者由黄河運至其近陸者即行陸運至口内地方如有糴買之人令其糶賣俾商販知有利息或有願赴採買之人則内地糧價自必愈賤於百姓亦有裨益如無糴買之人酌量分撥大同汾州二府屬貯倉俟來春青黄不接之時減價平糶於地方積貯亦屬有益統俟買齊運貯後另行備細奏聞謹奏料理甚屬妥協但不可稍涉勉强若百姓不願糴買即中止可也陸運之説當再加斟酌同日又奏為奏聞事山西通省於六月初二初五初六等日得有透雨業經臣繕摺奏明嗣於初十日以後二十二十一等日又連得雨澤秋禾甚為得濟惟平陽府屬之聞喜縣絳州屬之稷山縣太原府屬之太原縣傍山四五村荘因山水陡𤼵間有衝倒房屋及損傷秋田者臣已給𤼵銀兩委員分頭前徃各該地方将衝倒房屋給銀修整損傷田禾給與籽種令其及時補種蕎麥晚豆内有乏食窮民散給米糧併借給倉糧被水村荘錢糧且暫停其催徵兹據各委員回稱居民俱各安業地畆俱已補種仍可有秋等語理合具摺奏聞仰慰聖懷謹奏知道了山西地方窪下處少遇兹多雨之年為害小而獲益大今嵗直隸山東兩省雨水過多猶幸堤岸皆保無虞也雍正三年七月十二日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為轉奏事七月十一日欽差吏部左侍郎臣史貽直刑部右侍郎臣髙其佩将奏摺一封差人齎送到臣交臣差員馳奏理合代為轉奏再史貽直等審理鹽茶二案事竣已經於七月初六日起身今臣於初四日接准部咨陜西郃陽縣秋審人犯楊鵬九等一案因原擬罪名不符奉㫖并交侍郎史貽直髙其佩􅃀審等因臣即日移知今史貽直等於初六日行至二十里舖接到臣咨仍回平陽相應一併奏聞謹奏知道了伊等将事審畢令仍在平陽等候朕差員前來有另交伊等辦理事件雍正三年八月初十日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏明事臣准戸部咨開奉上諭歸化城土黙特地方連嵗豐收有榖賤傷農之虞查黄河由黄甫川邊口流入係山西陜西二省交界之處著将歸化城米糧照時價糴買由黄甫川邊口運至内地圖拉湖地方建倉存貯歸化城大青山黄河岸上亦建倉買米收貯其由黄甫川運米船隻應在大青山木植盛産之地打造再於圖拉湖打造船隻将米石運至陜西潼闗地方此立倉造船徃返輓運使不至糜費錢糧及派撥㸔守倉厫監工督運一切經理事宜應差員前徃㑹議刑部員外郎覺羅明夀係朕深知之人著理藩院再派謹慎誠實章京一員與明夀一同馳驛速徃㑹同山西巡撫伊都立歸化城都統丹津等詳細􅃀議具奏如此事辦理得宜使食貨流通則外地䝉古内地百姓均獲裨益欽此欽遵行文到臣仰見睿慮周詳内豐積貯外益邊民之至意臣一面委太原中路同知張淮右衛守備王松齡分頭􅃀查大青山以及晉省陜省等處河路情形并令沿河州縣詳細查明報臣臣於八月十二日自省起程前赴歸化城㑹同欽差員外郎覺羅明夀都統丹津等将立倉造船運送人夫等項􅃀議臣即從大青山由沿河一帶到潼闗親徃􅃀查視其有船隻不能經行之處應添造船隻接運及倉厫作何建葢㸔守船隻如何修造務期酌議明􅃀使錢糧不致多費運送亦得便㨗詳悉具奏并可熟悉黄河一帶情形再此沿河有與陜省地界相連之處并潼闗蒲州一帶州縣又與秦豫兩省接壤前䝉上諭令查明疆界轉瞬已届秋收臣亦可乗便将𦂳要處所查明經理除将起程日期另行具疏題報外理合繕摺奏明謹奏朕原命伊等就爾㑹商恐悞爾地方諸務今爾既起程徃㑹伊等更好但地方要緊慎毋貽悞政事乆稽延於境外也爾其酌量輕重而行之同日又奏為奏明雍正二年耗羡銀兩事竊臣據布政使髙成齡将雍正二年分耗羡銀兩收除實在并已未完數目開報前來臣查雍正二年分共應收耗羡銀四十九萬五千三百八十九兩已徵完銀四十五萬九千二百二十六兩零共開除各官養亷公費等項銀二十九萬三千八百五十一兩零共存庫留補無著虧空銀一十六萬五千三百七十五兩零未徵完銀三萬六千一百六十二兩零俟徵完之日内應撥留補無著虧空銀三萬四千六百二十四兩零以足二十萬兩之數餘剰銀一千五百三十八兩零臣親赴司庫逐一盤查無異謹繕黄册恭呈御覽再臣提解耗羡先經臣摺奏諾岷髙成齡回覆有益之處奉硃批諭㫖知道了爾試行㸔欽此欽遵臣到任至今五月以來留心試行細加體訪此事實與地方有益上不累官下不累民誠為兩便况奉行兩年並無弊端亦無他議似應照舊毋庸請停惟是原議将耗羡留二十萬兩彌補無著虧空查晉省無者虧空據布政使髙成齡稱有九十餘萬兩除元年至三年共有耗羡銀六十萬兩彌補外再得兩年耗羡扣抵臣細查九十餘萬兩内有欒廷芳贓銀三十萬兩查贓銀非正項可比自應向伊嚴行究追豈可代為彌補除此三十萬餘兩外無著虧空實止六十餘萬兩俟雍正三年耗羡收完巳有六十萬兩所缺無幾再将虧空各員家産搜變即可與原估之數相去無幾臣仰體皇恩意自明年開徵為始将耗羡再行酌減以廣皇仁務期有益民生有裨國計并使現在虧空不致倖免而将來州縣各知儆畏酌量妥􅃀另行請㫖謹奏何煩朕再諭是極好極總在爾相機合宜而為之耳雍正三年九月初十日署理山西巡撫印務刑部左侍郎臣伊都立謹奏為奏聞事竊查太原省城自迤西以至迤南逼近汾河北城以外又有澗河一道向有水患前撫臣蘇克濟在城西修築土堤一帶北門以外另有護堤以防澗水使歸入汾河因歴年乆逺土堤侵損今嵗六月間澗水漲湧衝開北門䕶堤水不能歸汾而西門以外地勢又極低窪河水幾入城内臣即親督地方官将北門䕶堤剋期幫補澗水仍歸舊槽但臣細㸔舊築堤岸堤身甚是單薄堤根亦不堅牢其南城一帶又向無堤岸且北門䕶堤亦祇可少抑一時水勢終非乆長之計必須亟為修築居民田舍方保無虞臣已逐一查勘将城西舊有土堤先用木樁栁埽打定根基再用土幫築堤身城之東南添築新壩北門以外另為培填庶一勞永逸現在估計預備木料因目下天氣漸寒容俟來春興工其所需工料約計銀一萬餘兩查有雍正元年餘剰耗羡銀兩可動事闗地方公務理合恭摺奏聞謹奏所奏是事闗防䕶城池保衛民生理應及時修理者也雍正三年十一月二十四日總督管理山西巡撫事務臣伊都立謹奏為奏聞事竊臣自京起程一路留心體訪直隸地方收成雖覺歉薄在集糶賣米糧猶不至缺乏自正定府以西由山西省販去米糧騾䭾車載接踵而行民食自可無虞且固闗以東於初十日又得雪三寸明年春成有望至於山西地方仰頼皇上福庇今年米糧原甚充足近來平定一帶米糧販徃直隸者多價值較前少長小米每石九錢九分然亦不為昻貴臣恐省城東北州縣官因糧價少長禁止外販致直隸米價過昻已諭令不得禁止販運臣思晉省現在米糧外販者多倘明春糧價騰貴即将各屬倉貯之米平糶斷可不致缺乏况麥苖現在滋𤼵一至春熟即有接濟至太原以北大同府屬并潞澤一帶其糧價俱與一月以前相同並未増長所有臣經過地方情形并山西糧價縁由理合繕摺奏聞謹奏爾此見甚好詩云普天之下莫非王土雖係隔省理應一例視之雍正四年正月初二日總督管理山西巡撫事務臣伊都立謹奏為恭報瑞雪事欽惟我皇上聖澤同天恩膏匝地屢年以來上瑞頻徵嘉祥疊見山西各屬於去年十一月二十八日十二月十三日連得冬雪業已普徧今於正月初一日太原府地方雨雪三寸連日彤雲密布得雪之處必寛新正元旦覩兹嘉兆仰見聖敬之感孚預慶豐年之有象臣無任歡忭之至理合繕摺奏聞謹奏新正雨雪朕懷深慰冬雪但稱普徧何未将情形詳析奏聞耶雍正四年二月二十四日總督管理山西巡撫事務臣伊都立謹奏為恭報得雪十分霑足事竊查山西地方去冬雨雪并今年正月初一日得有瑞雪業經臣繕摺奏聞今時值仲春二麥出土農民正在望雨之際適於二十二十一日省城連得大雪臣即飛查各屬曾否霑足去後據報太原府以北并汾州平陽府以南俱於此兩日内得雪入土一尺有餘十分霑足平陽府南州縣地氣較别府温和故農民一年所望惟在麥收而秋成次之今聞府南各屬俱得透雪豐稔可期萬民歡躍感頌皇仁臣職任地方覩此康阜氣象上藉以仰慰聖懷下得以俯安民望歡忭非常理合繕摺奏聞謹奏天人交感之際實屬呼吸相通但敬慎人事於下自能召致休徵於上此乃理之必然者切勿髙興肆志實力勉之敬之朕躬無日不如是也雍正四年六月二十二日總督管理山西巡撫事務臣伊都立謹奏為奏聞事竊臣於六月初十日起程於二十一日回署巳經另疏題報外臣自京北至宣化及大同等府一路經由留心查㸔地方甚是安靜糧價亦甚平減一帶居民俱熙熙皥皥有含哺鼓腹之樂且見秋苗茂𤼵萬寳咸亨此皆我皇上惠愛黎民培養元氣之所致臣覩此太和景象無任欣躍理合繕摺奏聞至臣面奉上諭事宜并所交事件容臣次第實力奉行陸續具奏謹奏觀民嵗之豐嗇驗政治之純疵理固不爽然朕總不計及於此也惟辦一誠以對越天地神明仰慰皇考在天之靈而已功効皆所不問同日又奏為奏報二麥收成分數事竊照晉省二麥收成分數臣先在京時當即𤼵諭令各州縣據實查報今臣回署檢查各屬報到分數太原汾州二府并忻州代州各屬俱係十分潞安府澤州遼州平定州保徳州各屬俱有八分惟平陽府蒲州解州絳州隰州其二麥有五六分收成者居多亦間有八九分者詢問地方官據云平陽東南府州廣種麥田向來統計有七分收成即為豐稔再大同朔平寧武三府尚未報到臣路由大同所屬州縣見尚未刈割而種麥者亦甚少問之土人皆云彼處地氣寒冷每年俱藉秋禾二麥不過稍為接濟故所種不多今嵗約有八九分收成等語其朔寧二府地方相近大畧相同臣統計闔省二麥共有八分收成民食大為􅂶足兼之各屬報到各色雜糧價值甚平理合繕摺奏聞恭慰聖懷謹奏統計闔省果有八分亦可為豐收矣朕懷曷勝慰悦第當克誠克敬勿怠勿肆加勉吏治以迓天庥則晉民䝉福正未艾也雍正四年七月初一日總督管理山西巡撫事務臣伊都立謹奏為奏明事欽奉上諭以制錢不能流通敕下部議嚴禁私鑄并将錘邉沙板禁止不許攙和令赴官出首半價收買臣於二月二十七日接准部咨隨即行文各屬查禁取具遵依并出示曉諭及諭司道府各官實力查察不得視為故套僅以空文塞責今臣回任見山西省城行用皆係制錢並無錘邉沙板攙和各屬亦俱送並無攙和私錢遵依在案臣查鼓鑄制錢原期泉布流通便民日用今禁止私錢則私錢無用私錢無用則私鑄自絶又令将私錢赴官首買使之不得存留於下将來亦無所用其攙和此誠正本清源之良法也但恐各屬並不将私錢實力收買徒以並無攙和具報雖嚴禁於一時終難免復行於異日查定例内私鑄准於示到一月内赴官首明将私錢貯庫年終彚報户部若一月後經紀舖户人等仍敢攙用俱𤼵黑龍江給披甲人為奴立法既嚴則犯法自少至地方官有無收買私錢臣愚以為亦當示以章程始不敢視為具文臣復行文各屬再限一月将所屬私錢盡行收買在官報解司庫如彚報時並無收買私錢起解者明係奉行不力臣即指名題㕘聽部議處庶各官知所警懼而私錢自可斷絶矣相應奏明伏乞皇上睿鑒施行謹奏如此方為盡力奉公具疏題請可也同日又奏為奏明養㢘銀兩事竊查山西巡撫衙門經前撫臣諾岷奏明䝉皇上每年賞給養㢘銀三萬一千七百兩臣䝉皇恩簡任自雍正三年二月到任至今年二月止計足一年據布政司陸續解銀三萬一千七百兩臣一年内除衙門一切日用等項動用外尚餘銀二萬兩臣叨任封疆仰藉皇上洪恩一年用度甚是從容所有存銀二萬兩臣謹具奏恭進伏乞皇恩諭令解交何處仰候聖㫖遵行謹奏此係奏明每年養亷所需分内應得之項何庸奏進殊屬無謂或暫存公處以濟地方事務則可如果用度有餘積乆數多再行請㫖酌量亦不為晚雍正四年七月十九日總督管理山西巡撫事務臣伊都立謹奏為恭報雨澤事竊臣回任後聞得山西地方太原汾州潞安平定忻代澤遼沁等各府州所屬秋苗俱未缺雨其平陽府以及蒲州解州絳州等處所屬自二麥收割之後六月半以來未曾得雨巳種秋苗者固需雨澤尚有收割麥田未得補種秋禾待雨尤殷臣在省城䖍誠祈禱一面行查各屬俟得有雨澤飭令飛報去後兹據平陽府及蒲解等處州縣具報於七月初八初九十一十三等日陸續得有透雨未種者俱已趕種晚榖蕎麥雖播種稍遲但彼處地方和暖猶未為晚再查大同府屬大同陽髙二縣自六月後雨澤尚欠霑足今於十三日亦得有透雨省城於是日亦大雨如注從此秋成可必臣謹将各屬得雨縁由繕摺奏聞謹奏朕諭果不謬否前摺戒爾髙興肆志正為此也雖據奏稱秋成可必收穫未免稍歉矣汝等封疆大吏一言一動甚有闗係莫作等閒㸔其敬凜毋忽同日又奏為恭録訓㫖進呈御覽事欽惟我皇上徳並唐虞道宗洙泗惟精惟一彌六合而胥在并包盡性盡人綂萬方而同歸化育秉乾剛而立極咸欽􅅥厲憂勤闡經義以垂型悉是典謨訓誥臣猥以菲材荷䝉聖恩簡畀封疆履任以來自愧措施之未當每懷報稱而無由兹奉命進京親承聖訓諄諄開導至再至三不啻家人父子臣從此遵循有自茅塞頓開俾得勉竭駑駘力圖報效皆我皇上逾格栽培曲為造就之洪恩也臣謹遵㫖恭録聖訓謹呈御覽伏乞睿鑒謹奏朕面訓之㫖記載甚屬詳明若非傾耳竦聽専心領受不能如是也深為可嘉覽畢即命鈔𤼵直省各督撫提鎮閲視矣同日又奏為聖恩格外寛容㣲臣罪難自逭事竊臣齎摺家人回晉接到順承郡王錫保等於雍正四年六月十六日面奉諭㫖前者諭令山西總督伊都立宻訪僧人洪寛今據奏稱遍訪五䑓山各寺院中目今無有此人等語但向來曾有此人與否並未聲明五䑓係多人來徃聚集之所緝訪其人自宜嚴宻􅃀實若五䑓果係現無其人亦必細訪明􅃀切實奏覆豈可以形状倨傲蹤跡可疑之明學集賢二人依違具奏徒使彼地大衆驚擾甚屬不合糊塗之極爾等可即飭行欽此合即飭知原摺并𤼵臣聞命之下恐懼戰慄無地自容兹復據差去之人遍行宻訪五䑓山各寺院内實無僧人洪寛向來亦無此人理合據實覆奏至臣先於五月十四日順承郡王錫保等傳㫖令臣宻訪洪寛臣因六月係五䑓山開廟之期隨宻差千總相克寧前徃進香暗行查訪亦不告知由來並再三諄囑不使稍露形跡即諭令五䑓縣赴山查㸔二麥收成分數亦係縣令每年常事適逢其時乘此體察亦不諭知此人來歴此皆泯然無迹之事實未嘗驚擾大衆但臣以方外僧人每多更易姓名假揑年嵗即據五䑓縣所禀以集賢明學二僧形状倨傲適住文殊院東廂房心竊生疑冐昧具奏實屬糊塗臣思奏對君父一切俱宜切實何得以影響疑似之説入告雖䝉皇恩不加罪譴逾格優容臣返躬自問實深愧悔理合叩謝天恩伏乞聖慈鑒宥謹奏似此小心過甚反招大膽之咎百凡處但務據實乃適中之道亦係對證之良藥也傳云心有所恐懼則不得其正自視一身利害太重即屬私念何能得事理之宜戒之勉之雍正四年七月二十九日總督管理山西巡撫事務臣伊都立謹奏為請㫖事竊臣自雍正三年二月内奉命撫晉到任以後聞得山西各州縣地方丁銀一項並不陞富擦貧向例俱按本户本甲本里頂補如丁缺則輾轉相尋層層疊併以致一丁包納數丁一戸均賠數户苦樂不均深為未便隨令州縣議将丁銀歸併地畆使丁地畫一貧富區分誠一勞永逸之良法也嗣據各州縣議以晉省居民置産者少逐末者多且地土􅇤薄不同於他省若一經歸併恐地價愈賤并恐無人承買輸賦愈難事在難行臣因為窮民起見復再三開示令其因地制宜委婉設法今據夀陽平遥介休徐溝孝義等州縣已将丁銀歸入於地其餘州縣俱趁此編審之年現在傳同士庶公議尚未定局臣惟恐事難一例不敢冐昧具題然思晉省地土􅇤薄居民素多貿易不置田産原不同於他省亦屬實情但日復一日年復一年歸併日多丁銀日重實為窮民之累雖現在議歸地畆而其中或有萬不能行之地方惟有均丁之一法如五年編審清查人丁将闔州縣成丁者盡行查出除紳衿優免本身外其餘俱照現在丁銀額數按丁均攤如前以一丁所納今則以數丁分交如前以一戸獨認今則以各户均完賦不加重丁實加輕再嗣後每遇五年編審照數清查均派丁日多而銀日少似於國賦民生均有裨益已經行司轉行各屬查議俟議覆到日臣意欲具題定例是否可行伏乞皇上指示以便遵行謹奏覽所奏係為一已得失起見似此難行之事從何指示汝前在勤政殿奏朕之本心併朕訓誨之㫖豈皆遺忘耶諄諄命汝秉公據理勿計利害得失但還朕一是字今遇疑難莫决乃欲委卸於朕以圖免過朕既未曽宦遊晉省閲歴風土奚能決汝之疑觀此則愚迷之病復作矣朕用人行政從不預定成見於中惟隨人隨事度其是非而措置之耳此外無他技能雍正四年九月初六日總督管理山西巡撫事務臣伊都立謹奏為奏明事竊查晉省各屬秋禾豐稔現今俱陸續刈割俟收穫告畢臣另行繕摺具奏外臣䝉皇恩職任封疆又仰承聖訓令臣留心積貯當此豐年正宜急為圖維查山西原貯米穀及勸捐社倉糧米不下百萬餘石又經臣議覆前任學臣劉於義條奏每年動銀四萬兩在通省各屬採買穀石以備積貯現在時届秋成催令州縣及時採買并諭令各屬加意勸捐社倉務使通省積蓄實在充足有備無患斷不敢揑詞粉飾有負我皇上念切民依之至意再臣去年自京回晉見平定州一帶地方糧食俱徃直隸正定井陘獲鹿等府縣運送販賣又至直隸定州一帶訪問彼處所糶糧食俱從山西廣昌縣交界之紫荆闗販去甚為得濟臣思平定州廣昌縣為晉省東路要區且與直隸接壤宜趁此豐收榖賤在於彼處多積米糧以備需用今在平定州再添貯榖一萬石廣昌縣添貯榖一萬石此二處與晉省之樂平盂縣夀陽徐溝祁縣廣靈崞縣繁峙五䑓定襄等州縣并與直隸之井陘獲鹿正定易州阜城唐縣各處俱屬相近如遇緩急或減價平糶或陸續輓運於兩省俱屬有益又平陽府至蒲州左右一帶州縣地方遼濶向來從陜西販買糧石至彼處糶賣者甚多今嵗陜米到來甚少米價稍長亦不可不預為籌畫怠庶可通融接濟再查晉省應試舉子沐浴聖化文風日盛今嵗入場者較徃年多增三千餘名貢院號房不足臣雖令搭葢棚厰編號坐下不致貽誤但此係一時權宜之計必須添葢方可永逺查貢院兩傍尚有隙地可葢號房三千餘間其應需工料并採買穀石建葢倉厫銀兩俱在盈餘公費之内動用俟用過若干另行奏聞糧石造册報部相應先行奏明伏乞皇上睿鑒施行謹奏所奏俱悉同日又奏為恭謝天恩事竊臣恭録聖訓繕摺奏繳欽奉硃批朕面訓之㫖記載甚屬詳明若非傾耳竦聽専心領受不能如是也深為可嘉覽畢即命鈔𤼵直省各督撫提鎮閲視矣欽此隨恭設香案望闕叩頭謝恩訖伏念臣本庸材職任總督毫無報稱入京陛見仰䝉聖主諄諄訓誨臣朝夕誦記惟恐隕越有負皇恩乃荷恩綸逾格鼓舞曲為栽培雖父師之循循善誘亦無此親切臣之榮幸實何如之惟有兢兢業業務必事事見諸實行以期仰報髙厚之恩於萬一耳為此繕摺叩謝天恩臣謹奏仰報固朕所期若迎合揣度混亂更張似此仰報不勞汝耗費心力也如陛見回任後加増火耗是何仰報之道豈具有人心之人所忍為者庸愚無識至於斯極有是理乎雍正四年十月初四日總督管理山西巡撫事務臣伊都立謹奏為奏明雍正三年耗羡銀兩事查晉省耗羡銀兩經前撫臣諾岷奏明提解司庫以為通省各官養㢘并公費等項外存庫銀二十萬兩每年奏銷正項錢糧時将收用過耗羡數目繕摺奏聞兹據布政使髙成齡将雍正三年分耗羡銀兩收除實在并已未完數目造報前來臣查雍正三年分共應徵加耗錢糧二百八十六萬五千九百七十七兩零共該耗羡銀四十九萬五千七十七兩零已徵過耗羡銀四十六萬七千七百九兩零共開除各官養㢘公費等項銀二十九萬四千六百三十一兩零共存庫銀一十七萬三千七十七兩零未徵完銀二萬七千三百六十七兩零俟徵完之日内撥存庫銀二萬六千九百二十二兩零以足二十萬兩之數尚餘剰銀四百四十五兩零臣親赴司庫逐一盤查並無虧短謹繕黄册恭呈御覽再徵足雍正三年銀二十萬兩合雍正元年二年存庫銀共六十萬兩合併奏明伏乞皇上睿鑒施行謹奏所奏全然不解朕竟無㫖可降此事須覿面向爾問明方可定大奇大奇前奏請於封印後來京陛見朕原命偕髙成齡同來面商豈料爾如此庸材殊屬可笑可嘆若非天奪之魄何昏憒乃至是耶今併髙成齡亦不必諭知矣同日又奏為恭謝天恩并自陳罪状事雍正四年九月二十三日准户部咨内開雍正四年九月十一日内閣交出諭㫖諭山西總督伊都立前爾聞陞雲貴總督之命将欲離任之時将山西闔屬耗羡飭令裁減今聞得爾回任山西以公用不敷又将裁減之數復行徵收大凡地方舊例之所有欲行裁減必合前後計算而後舉行若既已裁減而奉行不乆又復徵取則朝三暮四有同兒戯甚屬不合如此則何以取信地方官民無知庸愚之極諭㫖到日可速照原裁減之數仍行裁減若少陽奉隂違朕有所聞必治以重罪特諭欽此欽遵跪讀之下無任惶恐驚懼負罪深重不能自逭伏念臣䝉皇上天髙地厚之恩三年之内不次超擢陞至侍郎未及一年復䝉簡命陞授總督隆恩異數至極無加為臣子者正宜殫心竭蹷為國為民思圖報效乃不思前後不慮始終逞一己之私邀一時之譽於離任之時減耗取悦已屬不合及回任之後心無定見意慮顛倒復将耗羡照舊徵收至今回思實屬無知已極庸愚己極今䝉皇上父母之恩日月之明特降諭㫖令照原裁減之數仍行裁減伏讀綸音寛洪廣大将臣短處曲為寛宥留臣顔面仰見聖慈包容皇恩浩蕩靡所不周臣惟有痛恨已徃責效将來事事實心圖始圖終竭誠盡力以贖前愆遵将上諭恭刻頒𤼵各屬曉諭士民外查臣舊年所減火耗以雍正四年為始從前原不及加一三者照舊徵收向來徵耗加二者一槩減至加一三今除雍正四年錢糧已徵過司庫銀八十五萬八千餘兩收過耗銀一十六萬三千餘兩尚有已徵在櫃銀兩仍恐各州縣借端侵蝕俱已委員拆封照數起解其餘未徵錢糧俱以文到之日為始照原減之數徵收嗣後每年俱照裁減徵交并飭各州縣實力奉行如有於裁減之外私加多徵者即據實題叅務使共沐皇恩均霑實惠斷不敢陽奉隂違自蹈欺罔之罪臣謹繕摺恭謝天恩并自陳罪状伏乞皇上睿鑒施行謹奏事出情理之外實為意想所不及朕並未寛宥何以謝為頃雖降㫖責詢尚恐前聞未􅃀今據奏云云果有其事矣奇哉雍正四年十一月初二日總督管理山西巡撫事務臣伊都立謹奏為恭報瑞雪事竊查晉省地方仰䝉皇上福庇連年以來二麥秋禾俱獲豐收實有家給人足之慶含哺鼓腹之風臣以菲材身任地方際此時和年豐深為欣幸今據平陽府南州縣并蒲州汾州府潞安府澤州隰州等處俱報於十月二十三日得有瑞雪大同府地方亦報十月初七日得雪臣正在繕摺奏報間今於十一月初一日太原省城亦經得雪臣親至郊外查㸔據農民云多得冬雪之年次年麥秋必獲豐收俱歡忻鼓舞共歌聖澤理合恭摺奏聞謹奏得雪厚薄淺深未經分析殊屬含糊不明平魯營㕘将徐元勲於引見時觀其人甚屬平庸且聞伊聲名不好爾及該鎮從前何以不行㕘奏硃批諭㫖巻五
