body:
  text: 欽定四庫全書硃批諭㫖巻一百十二硃批楊長春奏摺雍正元年六月初十日江西南昌總兵官臣楊長春謹奏為恭謝天恩事雍正元年五月十九日䝉兵部劄付内開欽奉上諭各省總兵官有具摺奏事者亦有從未具摺奏事者著行知伊等嗣後如有應奏之事俱各密摺陳奏欽此行文到臣伏念臣世受國恩由廕監生補授佐領㕘領䝉聖祖仁皇帝不次拔擢洊歴總兵官寸長未效恭逢皇上御極以来隆恩疊沛厚澤頻施祇因未奉諭㫖不敢進摺奏謝今䝉特恩賞准摺奏俾臣犬馬愚忱時得上達宸聰而地方緊要事務亦可密請指示聞命自天感激無地理合繕摺奏謝謹奏知道了爾向日居官聲名甚好爾之為人居心朕巳深悉更加勉力毋懈雍正二年十月初一日浙江提督臣楊長春謹奏為奏明事竊臣仰荷聖恩補放浙江提督陛辭之日欽承聖訓臣惟凛切氷兢黽勉供職以仰報殊恩於萬一臣於雍正二年九月初八日抵浙任事業經題報在案兹接兵部劄付内開欽奉上諭各省道府同知通判州縣等官内有才幹素著廉潔自持者著總督保奏三員廵撫保奏二員布政使按察使各保奏一員將軍提督亦屬本省大員將所知者亦令保奏一員俱各密封保奏不得㑹同商酌欽此劄行到臣伏念臣到浙未久現在整飭地方營伍其通省文員内才幹素著廉潔自持者一時廉訪未盡周知不敢冒昧陳奏仰冀聖恩寛宥俯俟查有深知灼見之員另具密摺保舉外理合奏明伏祈睿鑒謹奏所奏合宜應如是雍正二年十月十六日浙江提督臣楊長春謹奏為奏明事竊臣於雍正二年十月十三日據寜波府知府及城守營遊擊禀稱本日有慈谿縣後海居民數百人聚衆入城前至縣署鬨鬧等情知府先巳馳徃臣即刻令寜波府城守營遊擊守備星夜前徃安撫解散去後旋於十四日據差去遊擊禀稱職等到縣詢問情由民人等俱係二十八都民竈等户因本年七月内遭風雨海潮之患日望賑濟今聞餘姚地方俱巳賑過獨慈谿一縣賑濟銀兩被縣官侵蝕未曾給發故此来縣的職等㑹同知府多方撫慰又經知府買發食米七石分給災民方行散去現今居民安堵地方寜謐等情今遊擊守備等俱於十五日回寜訖所有災民聚散情形臣不敢壅於上聞謹奏知道了凡事皆應據實直陳一毫不隠方不負朕之任用也勉之雍正三年四月初七日浙江提督臣楊長春謹奏為據實覆㫖事臣於雍正二年八月初一日恭聆聖訓指示周詳併諭臣密訪處州鎮總兵官王安國居官何如欽此欽遵敬謹留心訪察迄今半載以来訪聞得總兵官王安國從前居官操守並無聲譽自臣到任至今其於地方險要必親歴廵查官兵亦勤加訓練且並無貪冒扣剋之處實屬勤慎小心循分供職理合據實覆奏伏祈皇上睿鑒謹奏據奏巳悉大都人情莫知其子之惡旁觀猶易當局更難勉之勉之雍正三年六月十四日浙江提督臣楊長春謹奏為恭謝天恩事竊臣齎摺家人回寜恭捧欽賜藥錠一匣到臣當即郊迎至署恭設香案望闕叩頭謝恩祗受訖伏念臣謬膺重寄湥愧涓埃未報今䝉我皇上優渥宏仁以上方之丹藥賜邊海之武臣俾無疾厄之虞永享安寜之福從此犬馬餘生皆係圖報之日矣理合繕摺奏謝謹奏覽奏謝知道了前月輪流保送郝宏勲穆廷弼蘇明良三人因何未經密奏考語其據實補奏可也雍正三年八月初七日浙江提督臣楊長春謹奏為遵㫖據實補奏考語事竊臣前奏恭謝天恩一摺奉有皇上硃批命臣將輪流保送副㕘郝宏勲等三員之考語據實補奏欽此臣跪誦之下驚惶無地伏思臣以駑駘下質謬膺重寄雖事事敬謹矢公矢慎尚難仰報髙深於萬一今乃將保送考語遺漏是臣愚昧巳極又䝉皇上隆恩不即加罪容臣補奏臣何人斯邀此殊遇不覺感激涕零謹遵㫖將郝宏勲等三員考語另摺補奏伏乞聖慈寛宥臣無任待罪之至謹奏朕前奏摺尚有忽畧之失地方諸務保無精神不到之處封疆事重脫有貽悞可乎勉力勤慎切毋以老自惰同日又奏為欽奉上諭事竊臣接到部文欽奉上諭各省副將以下遊擊以上官員未經引見者著令輪流來京引見其漢仗弓馬朕一看便知至於操守如何訓練營伍如何之處著各省將軍督撫提鎮於給咨赴部時據實密摺奏聞欽此欽遵劄行到臣將浙省不屬鎮轄之嚴協副將郝宏勲湖協副將穆廷弼臣標中軍㕘將蘇明良三員另疏㑹題保送給文赴部投候引見外理合遵㫖恭繕密摺補行進呈伏乞皇上睿鑒施行亦優爾若似此瞻徇情面殊屬不妥矣雍正三年九月初九日浙江提督臣楊長春謹奏為欽奉上諭事竊臣䝉兵部劄付奉上諭内外文武官員曾經面奉諭㫖除不能記載者其餘俱将諭㫖並年月日一同繕寫進呈文武大吏自行封進其不應奏摺之人著封固交與該管上司轉奏欽此劄行到臣臣隨移行各鎮協營一體欽遵去後今據乍浦營遊擊黄天寅呈送封固奏摺一封前来臣謹遵㫖轉奏伏乞睿鑒謹奏黄天寅之奏粗鄙不堪之至若不能記憶則不寫亦可乃如此混行書寫進呈甚屬無謂黄天寅居官何如之處據實奏聞雍正三年九月十八日浙江提督臣楊長春謹奏為敬聆諭㫖恭謝天恩事雍正三年八月二十九日署理浙江廵撫臣福敏到任視事臣自寜波赴杭恭請聖安隨䝉𫝊㫖朕聞浙江提督楊長春做官罷輭官兵怠玩著他奮志勉力欽此臣跪聽之下不勝惶懼益深感激伏思臣以庸鄙武夫謬膺全浙重任分宜勉竭駑駘力圖報效緣浙省營伍廢弛日久又兼臣才智短淺迄今一載尚未能振作興起罷輭之愆實難自逭今復荷恩㫖寬容不加罷斥俾臣知過臣從此惟有謹遵聖訓益加奮志勉力以圖補過於将来理合繕摺奏謝謹奏徒言何益要當勉力行之果能奮志振興朕自然知道雍正四年二月初八日浙江提督臣楊長春謹奏為恭謝天恩事雍正四年正月十九日臣齎摺把總回寜恭捧欽賜福字一幅到臣當即郊迎至署恭設香案望闕叩頭謝恩祇受訖伏思臣以庸陋武夫毫無報稱頻年以来荷䝉皇上賞賜教訓有加無巳固巳感激難言今復䝉九天御墨頒賜邊海逺臣洪福照臨之下臣舉家生生世世皆享皇上昇平之福於無既矣臣惟有日凛誡諭時圖振作竭盡駑駘以期仰報髙厚於萬一耳理合繕摺奏謝謹奏知道了趁爾年力未至衰邁宜殫竭以圗報效黽勉以全始終不可隳頹志氣雍正四年四月二十日浙江提督臣楊長春謹奏為恭謝天恩事竊臣齎摺家人回寜奉到皇上硃批諭㫖臣隨恭設香案望闕叩頭謝恩訖伏念臣才疎識淺到任以来雖勉竭駑駘亦僅循分供職並無寸長報效乃䝉我皇上浩蕩之恩不即罷斥屢頒誡諭臣跪讀之下不勝惶悚警惕感激涕零惟有敬遵訓㫖以臣未盡之餘年竭力黽勉奮志圖報知遇之隆恩巳耳謹繕摺奏謝伏乞睿鑒謹奏循分二字莫看作輕易果能循分盡職無少玷缺則職分之外更有何長可效耶朕之諄諄勉勵汝者亦正謂凡責任中所當為之事令汝循分為之庶可無忝厥職毋罷軟毋廢弛更毋柔善自處以邀屬員之譽姑息寛縱以驕兵丁之心似此皆令汝循分盡職之諭也爾其奮勉勿怠
