body:
  text: 欽定四庫全書硃批諭㫖巻十上硃批李維鈞奏摺雍正元年五月初六日直隸巡撫臣李維鈞謹奏為清查通省虧空據實奏聞事竊查錢糧關乎國帑稱有虧缺例應查㕘勒限追補仰荷聖恩髙厚特頒諭㫖凡有虧空無論巳未㕘出三年之内務祈如數補足等因欽遵在案臣到任後令各道府將從前虧空清查開報去後除宣化府屬多徵本色其地丁條銀甚少不開外計八府屬虧空共銀四十一萬三千餘兩伏思以上虧缺雖由前督臣趙𢎞爕所致特䝉之所餘積纍填補臣能於二年内督令清完至原署撫臣趙之垣俟有完補銀兩另行奏請聖裁外臣謹具摺陳明謹奏州縣官令少從容不慮窘乏方可責其盡心撫字少有餘資亦可自為地方興利之舉何可勒令為他人補苴虧缺耶雍正元年五月初七日直隸巡撫臣李維鈞謹奏為奏明事竊查臣衙門向有親丁名色動支臣標營馬兵三十五名餉米馬乾銀每年共一千四百餘兩臣䝉皇上深恩復荷聖訓日凜冰淵之懼一切舊規悉已革除而於營汛尤嚴虚冒今臣親丁不過數人何敢踵襲虚造虚支自蹈欺罔上負聖恩已將馬兵三十五名缺額選㧞騐補以實軍伍並咨明户兵二部在案理合據實奏明伏祈睿鑒謹奏革除隨丁名色以實軍伍固屬善舉但恐爾等大吏過於窘乏或致費用不敷酌量為之所屬境内無論逺近一有雨澤即行奏聞雍正元年五月十三日直隸巡撫臣李維鈞謹奏為恭報雨澤事竊據各屬陸續具報得雨日期前來查順天府屬之武清河間府屬之交河慶雲廣平府屬之成安宣化府屬之宣化萬全等縣於五月初二三等日得雨二三寸不等保定府屬之蠡縣博野束鹿正定府屬之安平武强武邑晉州等州縣於五月初八九十等日得雨一寸五六分及二寸餘不等大名府屬之元城魏縣大名開州濬縣長垣清豐南樂東明等州縣於五月初二三等日得雨三四寸餘不等滑縣得雨七八寸内黄縣得雨四五寸其餘各屬俟報到另行奏聞再查正定府屬之井陘一縣歴嵗歉收雨澤愆期夏收無望獲鹿一縣地丰平衍稍有四五分收成臣仰體皇上愛養元元至意已於守道庫内借銀三千兩發井皇上發囘臣奏摺跪讀硃批内有所屬境内無論逺近一有雨澤即行奏聞欽此仰見皇上勤求民瘼無逸居心萬方生計無時不上厪聖懷所有得雨之處臣謹繕摺奏聞謹奏雖得微雨尚未霑足内外一體専誠懇禱庶望天心下應甘霖大沛也雍正元年五月十四日直隸巡撫臣李維鈞謹奏為恭報二麥收成分數事竊查二麥因去秋旱乾播種稀少今嵗三月内幸得甘霖普降頗多秀實其續種春麥入夏缺雨收成減薄兹據各道府將二麥收成分數陸續呈報前來查順天府屬收成内窪地及有水可灌之地約有八分至五分不等髙地約有四五分不等永平府屬收成内有窪地及有水可灌之地約有七八分不等髙地約有四五分不等河間府屬收成内窪地及有水可灌之地約有八分至六分不等髙地約有四五分不等正定順徳二府屬收成内窪地及有水可灌之地約有八分至五分不等髙地約有四五分不等廣平大名二府屬内窪地及有水可灌之地約有七分至五分不等髙地約有三四分不等宣化府屬收成内窪地及有水可灌之地約有六七分不等髙地約有四五分不等所有二麥收成分數理合具摺奏聞謹奏覽奏已悉麥秋獲此大半收成幸賴三月内之恩膏不然朕畿内赤子將何以餬口耶雍正元年五月十六日直隸巡撫臣李維鈞謹奏為奏聞事竊查直屬内荘頭以及大户有勢力者從前半皆强横不法流毒肆虐人人側目自皇上御極以來各知歛跡革面革心者固已不少惟宛平縣之鵝房莊頭索保住併子八哥姪烏允一横霸一方田連阡陌所招佃户一呼千諾供其驅使其姪烏允一兇惡尤甚酗酒毆人全無忌憚本年五月初二日有李世英活被打死索保住與房山縣夏村荘頭六哥原係至戚交好更密互為犄角朋比作奸六哥家富勢大男女混雜彈唱演劇耍拳㺯棒以前窩頓響賊近則各處開礦開窯以致宣化府士民罷市現在查明另疏具題所有莊頭索保住等豪横擾害之處臣查訪得實不敢容隠謹具密摺恭奏以聞伏祈睿鑒謹奏爾既奏聞且靜聽勿使彰著將此數人即諭内務府拏解交爾同法敏嚴審究擬毋得瞻狥情面此二人之家産俱不下數十萬之富所以敢於驕縱現存者清查隠匿者搜追並其爪牙黨惡擾害百姓者即於此案内一併推究審出勿使漏網以示懲創以舒暢小民怨抑之氣但此輩向日専以鑚營結納為事與内廷勢要無有不交接往來者爾斷不可㳺移軟懦倘遇難以推却之處直告之曰上意指示何敢少寛特諭雍正元年五月十八日直隸巡撫臣李維鈞等密奏為訪拏勢惡以除民害事臣等到任後即密加訪查有房山縣居住之李信父子併宛平縣居住之索保住父子及姪烏允一素性淫虐驕侈僣妄受害人民皆懼伊勢力豪富雖百般受害無敢控告者此等之人一日不除則地方生民俱不安枕謹將伊等惡蹟臚列密以奏聞一李信父子於房山縣地方聚衆數百人違禁獨霸石行將附近居民牲口强奪拉車一房山縣礦場李信霸佔開採一年約可得銀四五萬兩伊家人于五劉二董理場務百姓稍有違抝即非刑拷打一李信强佔宛平縣良民于文龍之媳王氏并房山縣陳鐵匠弟婦三兒為妾一重息放債折算百姓房産若有不能完者即將妻妾子女勒買為奴一於房山縣張房等處開印子舗重息殃民本村人王重元管事一索保住父子招集佃户一呼千諾逞奸作惡無所不為稍不遂意即指令抄毆横霸一方一廣放私債違禁取利如不能完威逼半價凖産勒買其妻女一索保住父子濟惡又聫結李信父子朋比為奸勢大莫制被害畏懼無敢告訴一烏允一恃勢妄為酗酒肆毒於本年五月初二日有李世英活被打死一李信父子併索保住及其子姪倚恃百萬財産肆行不法出入行走輒問斷不能盡得其實但拏問地方惡棍務須審擬具題伏乞此密行陳明謹奏知道了人犯解到時一一逐欵研審確情奏聞同日又奏為再報雨澤以慰聖懷事竊查順徳府屬之沙河南和唐山任縣邢臺等縣於五月初十日得雨二寸五分宣化府屬之西寧縣於初九初十等日得雨四寸保定郡城於十七日酉時起微雨至十八日午時雨尚未止入土約有三寸此雨未足尚在祈求伏念皇上宵旰殷懷望雨甚切臣謹將各屬續報得雨日期及保定郡城得雨情形先行遵㫖繕摺奏聞謹奏覽奏殊慰朕之憂懷京城於十九日薄暮亦得大雨真可為内外同慶也雍正元年六月十七日直隸巡撫臣李維鈞謹奏為改就武職以圗報効事據正定府同知石禮哈呈為竊禮哈年四十嵗正白旗人由嵗貢捐納同知選授今職復遵西安駝例捐陞副使道深念祖孫父子兄弟世受國恩豈可虚縻嵗月不思圖報伏查成例康熙六十年間川陜總督年羮堯將同知武正安題授永寧副將雍正元年湖廣總督楊宗仁將廣州左衛守備范宗堯題授漢陽縣知縣此文武互用有例可援禮哈情願改就武職以効犬馬之報特懇摺奏等情到臣臣查正定府同知石禮哈即係河南撫臣石文焯之子年力正壮騎射頗嫺情願以文改武援照武正安等改補之例呈請摺奏欽惟我皇上用人無方不限資格倘蒙俞允將石禮哈所捐副使道之銜改用武職查正定協副將王𢎞基告休員缺請即以石禮哈改授則整飭操練就近可覘厥効仰請皇上准令引見詢察之下應否改調伏候聖裁抑臣更有請者石禮哈如䝉恩准改授出缺查保定府蠡縣知縣浦文焯慈祥廉潔才具優長若以之陞補正定府同知則分猷佐治必能弭盜安民雖以知縣題同知與例不符但臣為地方緊要人材難得故冐昩奏請仰祈睿鑒謹奏准爾所請着石禮哈來京引見宜文宜武朕觀其才質再定將此摺封固交與石禮哈帶來雍正元年六月二十二日直隸巡撫臣李維鈞謹奏為遵㫖具奏事雍正元年六月二十一日准兵部咨為欽奉上諭事内閣交出監察御史覺羅莫禮博等條奏二摺咨交到臣臣欽遵拆閱内奉硃批交臣察議具奏欽此臣查得請嚴私稅之禁等事摺内土棍吳三勾串旗人鄭四借山主抽分名色併致傷人命之處前據遷安縣詳報已批令巡道飭審招解在案至立號私抽現在飛飭該道府州縣嚴禁密拏俟查明確實另疏具奏外其敬陳愚悃等事一摺臣議得薊州知州趙松聲名原屬平常遵化州知州毛徳琦辦差洵為軟弱誠如臺臣所奏但趙松於差務頗稱幹練毛徳琦官守亦能謹飭是以未遽指㕘今臺臣以薊遵二州接近陵寢差使絡繹必得才幹有守之員方能辦理無誤應如所請仰祈皇上於卓異薦舉人員内簡選補放實於地方大有禆益倘䝉勅臣於通省州縣中酌量調補容臣慎擇題請至趙松毛徳琦二員應否從寛作何調補恭請聖裁謹奏薊州遵化二缺爾於屬員中揀擇人地相宜者具題調補趙松毛徳琦如能改絃易轍奮勉上進則已倘仍委靡不振即嚴加㕘處示懲雍正元年六月二十三日直隸巡撫臣李維鈞謹奏為奏聞事竊永定河工臣於汛水未發之先即嚴飭河員加意防護在案今於六月二十三日據南岸分司雅思海呈報本月二十一二等日河水陡長洶湧異常將郭家務大堤漫坍四十餘丈等情前來臣隨即檄發銀兩飛委中軍官朱文華等前往漫坍工所協幫分司同知勒限作速堵築堅固具報併查明有無民舎田廬漫坍丈尺確數到日另摺具奏外所有漫坍堤工縁由臣謹具摺先行奏聞謹奏此皆平日漫不經心臨汛失於防護以致隄工坍塌實屬怠玩亟當嚴察㕘奏以戒將來雍正元年六月二十五日直隸巡撫臣李維鈞謹奏為奏聞事竊臣將直屬得雨情形歴次奏明臣又差人四處確查九府所屬州縣俱已透足在在秋禾茂盛據土人僉云七月初旬再得一雨皇上至誠昭格所致惟廣平府屬之永平邯鄲雞澤曲周廣平肥鄉成安等七縣得雨稍遲臣隨委冀州知州魏定國等星馳㑹同地方官借給倉糧銀兩及時補種今據各縣稟稱西成大有可望所有直屬秋禾情形臣謹查明具奏至雨澤已足此後不敢繁叙以凟宸聽臣前在守道任内於通省積弊知之甚悉自面聆聖訓於四月初九日囬署將弊端之尤甚者力行革除其餘小者去之太驟或恐利此累彼尚須次第釐省原輕今令照舊徵收道府州縣量留養㢘而以其餘彌補巳往之虧空俟趙之垣名下各項清楚之日另請聖裁臣恪遵聖訓勉力奉行以圖吏治民風日歸醇正倉儲國賦實在充盈但材識短淺時懼隕越謹將微臣到任所行事宜一併奏聞謹奏所奏俱悉畿甸之内旗民雜處向日所在旗人暴横小民受累地方官雖知之莫敢誰何朕所稔悉爾當奮勉整飭不必避忌旗漢冰炭之形迹不可畏懼王公勲戚之評論即皇莊内但有不安分擾害地方者一人亦毋得姑容皆密奏以聞朕自有處置爾之取重及見輕於朕正在此等處與法敏同心協力將此習俗務須矯正改革方不負朕委任之意也勉之雍正元年六月二十九日直隸巡撫臣李維鈞謹奏為奏明事竊臣遵㫖察議薊州知州趙松遵化州知州毛徳琦經臣繕摺具奏䝉皇上硃批薊州遵化二缺爾於屬員中揀擇人地相宜者具題調補趙松毛徳琦如能改絃易轍奮勉上進則已倘仍委靡不振即嚴加叅處示懲欽此臣即應選擇題請因准部咨八月十八日恭遇大行皇太后梓宫至陵薊遵二州實為差務重大今為日已迫若遴選題補候㫖赴任輾轉需時恐諉卸遲誤况新任之員於地方未能熟悉猝辦大差終慮疎畧今臣再選委二員與趙松毛徳琦協同辦理自必無誤俟差竣日容臣慎擇賢員另疏題補理合奏明伏祈皇上睿鑒謹奏所請是此選委二員果能克勤克慎事無遲悞即以調補二州正屬人地相宜何必又另為選擇也雍正元年七月十二日直隸巡撫臣李維鈞謹奏為奏明事竊查直屬丁銀偏累窮民若攤入田糧内實與貧民有益臣現在具題請㫖但有力之家皆非所樂或有阻遏其請者况部中止知成例不肯變通必議不准仰祈皇上乾斷允臣所請則無地貧民永戴皇仁而州縣徵收亦自此較易臣為縣令州牧時確知其弊曽在山東江西四川行之皆善故敢剴切題請若推之他省則利民無窮伏祈睿鑒謹奏此事尚可少緩更張成例似宜於豐年暇豫民安物阜之時以便熟講利弊期盡善盡美之效今既經題奏候部議到時朕再酌定雍正元年七月十七日直隸巡撫臣李維鈞謹奏為欽奉上諭事竊河南山東由水路來直販賣麥榖數目部議行令查明按月奏聞奉㫖依議欽遵在案今據守道桑成鼎呈稱雍正元年六月分查無豫省來直糧石止有山東自水路北來又自海運至津麥豆芝蔴髙糧共四千七百六十三石等因具報前來臣謹繕摺恭奏以聞臣前於奏雨摺内有土人僉云若七月初旬再得一雨便有十分收成之語今於七月初七日至初八日果又大雨滂沱早晚田禾咸獲豐收農民歡慶理合一併奏聞恭慰聖懐謹奏今嵗秋成似無煩爾之章奏遥慰朕懐矣惟當以手加額共為慶幸更相黽勉而已不但畿甸以内即山東山西河南數省之天年實咸出於望外此皆爾等封疆諸臣仰體朕任用之意竭誠盡力於地方以故感召天和並皇考聖靈垂祐之所致耳朕心歡暢筆不能罄再爾所奏解餉脚價一項經部駁追凡如此等不合案件今怡親王現在留心釐正此人剛方公正一𣲖天理良心深明大義朕想此事即不諭部伊自必有料理之道摺留覽賜爾鮮荔支一罐可少分賜與桑成鼎法敏二人雍正元年七月二十日直隸廵撫臣李維鈞謹奏為監司務在得人仰請聖裁簡補事竊查霸昌道員缺内拱京畿外扼邊口必得賢員方勝屏障之任仰祈皇上於薦舉卓異人員内特簡補放實於地方大有禆益而臣於屬員中時加廉訪若河間府知府張紹賢才猷頗逹操守亦潔允惬輿情洵稱良吏我皇上用人無方倘蒙勅令引見詢察之下可否簡用伏候聖裁臣叨荷重寄到任以來所薦舉調補之道府同知皆荷特㫖允准何敢屢為凟請但因地方起見人才難得謹舉所知伏祈睿鑒謹奏知府之任刑名錢榖為其專責較之道員更屬𦂳要張紹賢宜仍留河間供職霸昌道員缺朕為爾酌簡一能員補用雍正元年七月二十二日直隸廵撫臣李維鈞謹奏為恭謝天恩事竊臣猥以庸材叨兹重寄仰蒙知遇疊荷恩施兹於七月十七日蒙皇上賜臣鮮荔支一罐到保臣隨出郊跪迎至署望闕叩頭謝恩祗受訖臣欽遵聖諭分頒守道桑成鼎廵道法敏各叨異數即於臣署望北叩謝天恩外臣謹繕摺恭謝天恩伏祈睿鑒謹奏覽卿奏謝知道了脚價一事面詢怡親王據奏此事向來部臣之不准銷原不合情理臣部正欲將此事請㫖李維鈞所奏甚是今將五十九六十年分者仍照前駁回統候六十一年奏銷案内將從前各年分者一並題奏云云怡親王又奏陵上有一項官兵錢糧滿兵准銷緑旗不准亦甚不合於理果有此事否具摺奏覆雍正元年七月三十日直隸廵撫臣李維鈞謹奏為察訪勢惡害民密行奏聞事竊直屬豪横不法之大户莊頭臣密訪寳坻縣住居之焦姓莊頭兄弟濟惡不在李信之下焦國棟焦國璧等分住城鄉各肆横覇田土千餘頃當舖店房各處開張受害人民畏勢吞聲此等豪惡若不剪除則地方之受累無窮謹將伊等惡蹟臚列密以奏聞一焦國棟姦淫家人妻女衆家人情急將國棟綑綁㕔堂該縣并守備親至其家好言安撫解放一打死家人劉進台賄買屍親不行呈報一打死家人崔之林之婦將屍抛在河内一隠瞞壯丁女子柱姐為妾一焦國璧强姦家人萬六之婦不從自縊又將萬六打死一打死壯丁常住李三一打死夥計孔㑿子一喂養鷄鵞糧食奉旨恩赦國璧指稱使費打點派大糧莊頭三百餘家共計銀二萬餘兩一私立集塲一包攬民人張海宇强姦僱工人之婦不從打死命案得賄銀八百餘兩一包攬民人王二打死僱工人張姓命案得賄銀數百兩以上各欵俱經密訪得實必嚴加拏問始暢民情但伊等住非一處其田産當舖又散在各邑伏祈皇上密交臣同廵道法敏遴擇幹員分委查拏封鎻庻無隠匿搬運之虞為此密行奏聞謹奏除暴安良爾分所當為𩔖此等事宜極力振作更勿慮朕以多事見責倉場甚屬緊要目下漕務正殷料理需人已將法敏陞用矣今以常徳夀補授廵道此人不在法敏之下俟伊到來即將此事一靣題叅一靣嚴拏各犯並將家産封鎻􅁝毫毋得瞻狥疎縱如六哥等一例嚴審追擬特諭雍正元年九月二十四日直隸廵撫臣李維鈞謹奏為奏聞事竊查大名一協地接兩省兼三郡之營汛統轄之員尤宜善於撫綏今署事之㕘將劉可徳於八月初八日抵任並不拊循亦不訓練惟向各營汛需索規禮又私役兵丁買辦一任侵蝕短價賖欠擾累行户以致兵民交口怨騰臣念該副將任事伊始或可改悔臣一靣嚴加訓飭令其自新倘將來怙終不悛即當特䟽題㕘臣蒙皇上靣諭凡應㕘之員不可因特放之人少有瞻狥故不敢知而不言伏祈睿鑒謹奏原係一介武夫當嚴加誡飭不能改過自新即行題叅若不實心悛改亦不可姑容雍正元年九月二十八日直隸巡撫臣李維鈞謹奏為恭請聖裁事竊直隸巡道為通省刑名總滙事繁任重今巡道常徳壽已丁母憂除另疏題報外伏查常徳壽斷獄明晰為人亦復和平似此賢員若竟離任深為可惜可否特頒諭㫖准其在任守制如未荷俞允臣屬員中惟通永道髙鑛亷明謹慎臣知之最久倘蒙簡補於刑名必能清理臣冐昧具奏恭候皇上聖裁謹奏常徳夀准其留任至於髙鑛當再加試騐其人朕殊不深信也密之雍正元年十月十五日直隸廵撫臣李維鈞謹奏為恭報瑞雪及時事竊今二麥在地正賴冬雪及時來春土膏滋潤兹保定郡城於十月十四日天降大雪隨落隨消據清苑縣查報入地五寸且觀是日雲氣甚廣得雪必寛俟各屬報到另行彚奏外所有保定郡城得雪緣由理合具摺陳明謹奏冬令之雪消蝗潤麥洵稱瑞應我君臣惟共相朂勉以恭迓天庥不因瑞雪及時遂爾逸豫怠忽則一誠上格自必嵗嵗年年永承彼蒼之􅂷佑也按地輸丁原屬優恤窮民之善意但直隸江浙等處田地多有名為有地而其實無租税可收者其故大畧有四從來置産之家多係鄉紳富戸其棄田之人賄通置田家人將髙下錯雜一槩指為美産徃徃以九畝作十畝或以九畝五六分作十畝當其富饒之時無從細察亦并不覺有代為納糧之累及至家業漸貧必鬻其實在八九分之産而此一二分之虗地虛糧無從推去不得不照户納課此有地無租之一也再向日置産之時原係髙下錯雜今則急而求售不得不盡鬻其髙者而獨留其下此下地所入十年九空偶有收成僅足完一年之糧不足賠九年之累此有地無租之二也再有一種棄産之人原因一時急用希圖日後取贖故趙甲之田賣與錢乙而户名不即改換趙甲收錢乙之糧為之代完乆之究竞無力取贖𫝊及子孫户名仍在而趙甲遂為無田有户不得不照户納糧此有地無租之三也又有一種棄産之人原係出入衙門窮困無賴或係武舉劣衿身倚護符既已棄産仍復希圖包納於中取利然其利止於一時而其累及於子孫遂有年代久逺無從推收過户趙甲之家有不得不為錢乙每嵗納糧者此有地無租之四也至於直隸之順天保定河間永平宣化五府多有圈佔之地其所撥補大約逺隔數百里不等而地畆半屬窪下每年除完糧之外所餘無幾應令該撫查明直屬地畆分為上中下三則其上則中則按其多寡攤入丁銀至於下則及有地無租之人並與清查免其一體均攤務期糧歸實在有田之人不得私相影射如此則無地窮民與有地無租之窮民均不致有賠累之苦矣前因九卿議内有無地窮民賠糧之語朕深怪之業諭照爾所請施行今九卿内有數人宻奏一摺辨明此語看來似覺有理爾可再為詳悉規畫務與國課無損窮黎有益懸之象魏無可譏評方合琴瑟不和解而更張之之義設爾前説或少有利此累彼不便之處慎母固執巳見不妨密以奏聞另為商酌莫負朕獨斷專任之意也勉之密之特諭雍正元年十月十六日直隸廵撫臣李維鈞謹奏為酌議按地輸丁之法恭請聖裁事臣伏查密奏内有地無租四條如所云虗地虚糧江浙地窄人稠畝無足數以九分作一畝從無丈實分數之例至於直隸多有以二三畝作一畝者其地皆有浮餘九卿虛糧之説未實也又如所云所鬻之産盡鬻其髙獨留其下或不免於賠累然直隸下産每畝亦值兩許或值數錢非不可鬻之産九卿下田賠糧之說未實也再如所云趙甲賣與錢乙户名不改收糧代完此弊在在有之但代完之人歲向得地之家催索糧銀如一年不出不難推收改戸安有無地有戸無從推收之累且臣止因直隸無地窮丁起見而北五府丁浮於地尤為苦累故條奏攤丁未嘗議請通行各省九卿牽入江浙等省甚不相渉惟所云直隸之順天保定河間永平宣化五府地多圏佔其所撥補半屬窪下完糧之外所餘無幾誠如九卿所慮而臣亦計之再三北五府地少丁多難就本州縣之丁銀攤入本州縣地糧之内自當籌度盡善以蘇民困今接准部咨將丁銀均攤地糧之内事關更定賦役作何均攤徴收之處令臣造冊具題等因奉㫖依議欽此欽遵臣查直隸通屬地糧共二百零三萬四千七百兩有竒丁銀共四十二萬零八百兩有竒統為核算將此四十二萬零八百兩之丁銀均攤於二百零三萬四千七百餘兩地糧之内仍照上中下三則之田各計其納糧輕重之數而分攤其丁銀永無偏累之患所有現在無地窮民尘生世世感戴皇恩於無既矣臣謹陳末議可否如是仰祈聖裁批示遵行謹奏朕因九卿所議四條内或恐有爾想不到處故發来著爾再加熟計今覧爾此奏分析甚明籌度極當實可准行即遵㫖悉心料理具本覆奏可也雍正元年十一月初一日直隸廵撫臣李維鈞謹奏為謹瀝下情仰祈睿鑒事竊臣一介孤踪九年守道今兹撫直心切報主權勢嫌怨皆不顧忌如紏叅李麟業張鵬飛及奏請按地輸丁盡與時宜不合至劉可徳虐兵厲民雖經嚴飭仍不悛改於所轄殷實馬兵每圖需索以致衆兵積怨於初四日夜皆㑹集關帝廟要繳盔甲經大名府知府吳允謨勸止朱姓馬兵忽放百總羣𫝊受賄從張家口帶去馬匹散給五營兵弁每匹收價銀十五兩又奴使兵丁各懐憤恨幸䝉聖明調囘兵民無不感恱惟劉可徳以臣紏叅肆有後言必圖報復然臣重沐殊恩即肝腦塗地尚有不恤况以直結怨自此以後當益矢公忠㫁不瞻狥情面貽悞地方臣雖一無所恃而受知獨深已不為孤立是以謹瀝下情仰祈皇上察臣之愚終始矜全臣之感荷聖恩生世以之矣謹奏朕當年即是孤臣並無恃援此心自有上蒼鑒察但祗驀直做去坦然勿慮若信不得自已即信不得朕矣朕之耳目豈易為人熒惑耶同日又奏為奏明事竊照天津關稅據代理關務長蘆鹽運使段如蕙禀稱康熙六十一年九月二十八日起至雍正元年九月二十七日止應餘正額贏餘銅觔水脚等銀共八萬二千九百七十兩有竒又各項雜費銀五千八百一十八兩今四季徴收過税銀統計現虧缺二萬三千兩又據禀稱願甘賠補臣思津關稅銀雖有缺額何至虧缺二萬三千兩之多明有徴多報少之弊當喚經手官役將各關口所徴税銀逐一分析開單實收過八萬四千兩就正額贏餘銅觔雜費通行算入僅虧缺銀四千七百八十八兩零臣隨傳同守巡道面詰如蕙惟有引過認完竊念如蕙匿其實徵揑作虧缺本應題㕘但已悔悟願甘清完臣仰體皇上用人無求備至意故未即指㕘然臣不敢不據實奏明為此繕摺謹奏念段如蕙平日官聲頗好准爾所奏免其處分不然似此欺隠情弊何可姑寛爾之據實奏聞可嘉請寛㕘劾亦是雍正元年十一月初九日直隸巡撫臣李維鈞謹奏為聖恩髙厚感戴彌深事竊臣具摺瀝陳下情䝉皇上硃批勗勉天恩指示周詳古稱以冀少答主知於萬一臣夙守硜介歴任多年與王公大人一無交接而與怡親王亦未嘗謁見今秋進京臣詣闕廷得奉怡親王面詢攤丁臣遂悉心以對嗣扈從聖駕東行一路徃返於宫門外時承怡親王諭問臣心雖感而於私第終不敢徃來通問今蒙諭㫖凡有為難不便奏聞小事密使人同王商酌欽此臣敢不謹密自後倘遇有為難不便奏聞之小事敬使人啓怡親王商酌遵行伏祈睿鑒謹奏如許年來即怡親王亦係孤介自持之人從不與人交接而為多事務名之舉朕昔在藩邸與諸兄弟除公處相見之外並不曽私結恩好以圖彼此倚仗自經大事後朕即位以來見伊真實赤心許國深明大義而且公正和平目能識人誠有人之有技若己有之之品量如此等為國竭忠之王大臣彼此敬重互為勸勉以期報効朝廷斯乃有益之事朕所樂聞况爾既奉朕諭㫖不必疑畏將來爾或改易操行王或更變初心彼時則任從爾等之便也朕惟願内外諸臣相欽相惜同心合徳共懋公忠普天率土和氣盈溢不願羣工妬賢嫉能彼此陷害也朕因念爾孤介寒儒今膺重寄恐偶遇掣肘不能自達之處故有前諭朕若於怡親王少有疑惑王若非實心重爾朕亦無此一諭也坦然放心遵㫖而行雍正元年十一月十五日直隸巡撫臣李維鈞謹奏為要地需才謹舉所知恭請聖裁簡補事竊查口北地方西接大同北聨沙漠是以建設道員以資彈壓且兵馬錢糧専司支放地甚要而責甚重也原任口北道董思凝病故員缺查順徳府知府范𢎞偲自到任以來操守頗潔辦事亦勤臣從前面奏曾經具摺保薦順徳一郡縣少事簡易於敷治未盡厥長若以范𢎞偲補授口北道實於邉塞大有禆益如䝉俞允其順徳府知府員缺查正順河漳河同知曾逢聖才守俱優亦經臣具摺保薦今三年俸滿業已保題應陞倘以之補授順徳府知府則銜缺相當而人才亦可收實效矣以上二員可否補用恭候聖明裁奪謹奏范𢎞偲素履拘謹恐非倜儻肆應才也雍正元年十一月二十九日直隸廵撫臣李維鈞謹奏為奏明事竊查本年十月内接准内務府咨開奉旨莊頭内有在地方為惡者着地方官即具報内務府爾等查問教訓如不悛改即行革退將此交與直隸廵撫凡有上三旗之州縣通行曉諭欽此臣隨行廵道飛飭州縣通行曉諭並加意確訪各莊頭自巨惡李信等奉旨查拏之後莫不兢兢守法洗心改過如豐潤縣居住莊頭陳扇墜子向實奸邪今則聞風歛迹灤州居住莊頭李著伯並其族兄李萬扶等從前恃富肆横今則不惟改惡自新且將地土租糧當舖利息各减一分遇有貧難者義譲樂與現今旗民相安咸頌府屬米價每石八錢正定順徳二府屬每石九錢聞謹奏覽雍正二年正月十九日直隸廵撫臣李維鈞謹奏為奏明事竊各處莊頭已知改悔如有怙終不悛立即究㕘經臣摺奏奉硃批果能悛改固應容其自新但恐秉性難移耳仍不時留心訪察如少蹈前轍立刻㕘處不可稍存姑息之念朕必永斷此惡習而後已全在爾地方大吏奉行公嚴毋得始勤終怠欽此臣益加確訪通行密查今據天津道年裕詳稱住居静海縣之鑲黄旗花子佐領下莊頭李大權不知歛迹仍肆横行誘取有夫之婦女十餘人窩藏在家恣行姦佔横勒嫖錢種種惡蹟實干法紀非僅報内務府所可查問訓改者將李大權己經拘到相應詳明等情到臣臣徧行查詢地氣潮濕麥苗漸長若二月内得滋雨澤麥秋即獲豐收矣理合一併奏聞謹奏朕在此正爾顒望雨雪期與爾共竭誠悃以祈天賚各省俱蒙天地神祗眷佑咸報雨雪應時惟畿輔近地微覺缺少不知何以致此要當返躬痛切修省耳同日又奏為奏明事竊照直屬虧空臣請於二年内彌補當經具摺奏明今查各屬皆在陸續完補惟祁州知州鮑錞玉田縣知縣張星炌將雍正元年錢糧任意虧缺而祁州又虧空康熙六十年六十一年錢糧米榖臣現在另疏題㕘如將虧空之項能於限内完補應請聖恩寛免治罪倘不能完嚴審定擬以昭法紀庻倉庫錢糧不致虚懸矣謹奏不惟法所當然於情於理亦應如是此等劣員豈可一日姑容具疏題㕘可也雍正二年正月二十七日直隸廵撫臣李維鈞謹奏為恭懇聖恩簡員發用以收實效事竊念吏治實關民生而欲清吏治莫若試可而後用仰懇皇上於候補候選人員内特簡二十員發臣臣於公務之餘與論治道曉之以土俗民情朂之以清慎勤敏并遇事差委以試其才如果才能出衆有緊要員缺臣即具題請補其才具少次者亦酌量繁簡請補若醇謹有餘而地方之任力不能勝者臣謹咨回吏部以閒散職員補用則於地方大有禆益矣臣不揣冒昧瀆請仰祈皇上睿鑒謹奏直隸咫尺京師無懸缺久待之慮且不比山西之大為更革此説不可行即逺省揀發人員亦不過暫時權宜止一二次而已非為常例也爾將一省屬員内量才器使通融調補不妨隨時摺奏以聞雍正二年二月十三日直隸廵撫臣李維鈞謹奏為欽奉上諭事竊臣准戸部咨開奉旨行文直隸各省督撫凡遇有公事奏請捐俸工之處著永行停止欽此伏念官俸役食原不應有捐輸之名失其飬贍之實即因公願捐亦出臣下急公之誼而動輒奏請非所以崇尚政體今永行停止仰見我皇上端本澄源至意臣查直屬修築太行堤工經前督臣趙𢎞爕題明暫動道庫銀兩以通省俸工自康熙六十一年起分作五年捐還又截漕運貯廣大二府脚價亦經題明動借庫項俟俸工有餘捐還各在案若竟行停止則此項庫銀深慮還補無術且直屬公務較繁於他省臣愚以為正雜佐貮中凡係窮員苦役悉予支領以資養贍此外俸工將前借庫項按年捐還以後遇有公事地方大吏捐資料理倘力不能辦必頼衆擎易舉此係臣下職分當然其奏請捐俸工之處永行停止則國帑實而政體崇公事濟而臣職修矣是否可採伏祈睿鑒謹奏此事爾當自行斟酌可否朕不便代爾立準繩也同日又奏為奏明事竊查永定河同知全寳因伊父陶錦虧空解任賠補業准部提起解矣昨准侍郎臣牛鈕欲以全寳留任賠補㑹同覽雍正二年二月二十日直隸廵撫臣李維鈞謹奏為奏聞事竊臣准宣化鎮臣許國桂咨稱修造沙城指定處所並築堤護城繕摺奏明緣由到臣臣思修造沙城所需丁匠夫役皆係民人武職衙門恐有呼應不靈且人衆易於生事必須多委文職官員協助庻克有濟今臣飛委口北道范𢎞偲在宣化及沙城兩處徃來稽查又委宣化同知滿雲鷫居住沙城專司查察又念時值三春東作方殷若赴工所或失本業盡令力耕又誤城工俾田功城堤兩無貽誤方為妥協臣擬於三月初十後親詣沙城同鎮臣酌議料理并查勘宣化府城工河道㑹同商妥另行奏明合先具奏仰祈睿鑒謹奏𣲖委已屬妥協修造之事工料備而已矣矧董役者原有人范𢎞偲許國桂儘可從容辦理爾不必親徃勘視亦無庸更委大員也同日又奏為奏明事竊照大名郡城徐秀勾盗一案查徐秀向充大名協標兵丁因守備楊世威將伊革退懐恨勾結羽黨以圖報復於康熙六十一年十月十八日夜潛入副將楊天祬之署楊天祬猝不及覺被其擁至楊世威署内家人潘斌出禦被殺世威得以幸免相持至於次日楊天祬乘間奪刀將徐秀砍倒守備袁士魁賈勇撃賊盡數被獲陸續瘐斃者十有五名臣於抵任後查此案之釁原起於楊世威即欲題㕘第慮悍卒益増驕氣故於疎防案内附㕘革職惟是徐秀等於是夜上盗實共止一十八人若一推求恐致株害無辜故就現獲審理照盗案定擬今准刑部咨駁復飭嚴審臣復提解親訊明白己經題覆仰祈聖明乾斷結案不使部臣再行駁查則現犯免於拖延而無辜不致牽累矣謹奏此非朕可乾斷之事公然於郡城之内明火執械將副將刦去而云上盗止十八九人揆之理勢實屬不符朕亦不將此意諭部憑伊等秉公議覆朕但依議而行耳雍正二年三月十二日直隸廵撫臣李維鈞謹奏為恭謝天恩併報微臣回署日期事竊臣恭遇聖駕謁陵於三月初二日自保起程於初五日上朝請安䝉將御製喜雨詩賜臣跪誦仰見聖徳凝承天心格應而睿思濬哲寳翰輝煌自古帝王詩章書法未有如我皇上之超神入化者也隨荷召見䝉將御前珍饌特恩賜與初六日扈蹕至烟郊奉旨地方事務緊要廵撫回去料理欽此臣於初七日兩䝉宣入行宫奏對之次皇上念聖祖付託之重孝思彌篤勉臣下公忠之義恩浹益深乂䝉賜御馬一匹天閑良驥非比尋常且日䝉恩賜克食臣不知何修而上荷主眷以至於此也初八日臣於三河縣地方跪送聖駕即刻起程於十一日已回臣署伏念臣叠荷恩施至優至渥寵逾其分心益若驚雖勉竭駑駘而才力短淺何能仰報髙深於萬一所有微臣感謝天恩併回署日期理合一併奏聞謹奏於爾回任後即接閲大將軍年羮堯西海㨗報兼雨後晴明風和日麗陌不揚塵十一日陵祭告竣即日旋蹕於十三日還宫一路如意覽卿奏謝知道了特諭同日又奏為恭報雨澤事竊直屬地方入春以後麥田需雨甚殷䝉我皇上至仁育物軫念民依於二月二十六日䖍禱於黒龍潭三月初三日即得甘霖廣沛今據順永保河正順廣大宣九府屬各報初三日得雨八九寸及五六寸不等在在俱已透足惟良鄉永清文安密雲寳坻遷安交河阜城天津新樂井陘元氏寧晉南和平鄉永年邯鄲赤城十八州縣得雨三四寸不等地土已潤麥苗長發農民遍野雷動歡呼莫不感頌我皇上敬天勤民至誠感召之所致也所有各府屬得雨緣由臣謹繕摺奏聞謹奏此日之甘霖不止畿内優渥山西陜西山東河南江南所報皆同均得透足真可謂天恩浩蕩也喜何可言皆爾等封疆大吏仰體朕懐實心為國愛民感召之所致也朕不勝欣幸之至我君臣惟當愈加敬謹將此兢業之誠對越上帝以邀永永之錫嘏耳雍正二年三月二十三日直隸廵撫臣李維鈞謹奏為奏明事竊臣猥以庸愚仰䝉皇上洪恩逾格夙夜兢惕誓圖報効所有微臣行過事宜如虧空地丁銀四十二萬餘兩已補十分之四攤免丁銀合計二百萬户盡沐皇恩道府㕔州縣賢者薦用不肖者㕘革貪殘之習漸除徴收火耗直隸素輕於他省北五府納糧一兩等今已量减二三分部撥兵餉州縣起批解府由知府騐封索規禮銀每兩加二分其兵餉仍令州縣自解司餉各道衙門嵗為州縣之累今令州縣解貯府庫由府彚解各道州縣得免費用需索若𣲖修衙署新官到任鋪墊物件及里下分買驛遞役里甲同心稽查協力擒拏聽斷詞訟飭行速結募補未乆借端革退復募新兵必有賄囑方收入定府城内三營盔甲旗幟已粗購備飭令營將勤五錢以養家口若令學習武藝恐亦終屬虚名臣照晉省添設汛房每一汛𣲖馬兵二名歩兵三名今蓋屋十間令汛兵挈眷同居不許輪流更替則屬鎮臣管轄臣雖一面移㑹轉飭遵照或恐陽奉閉所以盗竊任意出入今擬於大村莊外圍之以土墻堅築髙厚起土之處即為深壕村内開一總俟八九月後農隙時酌可為而為之目下之計先内應行之事何敢縷陳以凟聖聼但臣愚拙立志甚篤恐行之未當繕摺奏聞伏祈睿鑒謹奏在他人朕猶聽其言而觀其行在汝朕聽其言而信其行所奏俱為合宜但當徐徐次第為之耳雍正二年四月初六日直隸廵撫臣李維鈞謹奏為奏明事竊臣伏讀示吏民羣相勉勵以上副我介田畯雖無專官而臣竊計可倣而行之兹選委霸州知州逯選廣平府通判張禹錫先徃保河正順廣大六府地方率同州縣官親徃各鄉詢民疾苦勸民耕作貧者借以牛種惰者予以責懲必於農事少有禆益并令二員相度地勢可以興水利皇上訓示遵行謹奏所奏知道了前者大興令髙純嘏一案在汝原可寛恕朕意降汝一級罹此輕罰嗣後嚴飭屬員更覺有詞人亦難以深刻之名加汝係朕有心而為之也雍正二年四月初九日直隸廵撫臣李維鈞謹奏為續報雨澤事竊查直屬地方於三月初三日己得甘霖大沛兹於四月初二日保定郡城并附近州縣復得雨澤業於奏明事摺内附奏在案今據各屬陸續呈報如河間府屬之鹽山等九州縣於初二日得雨三四寸不等滄州等五州縣得雨一二寸不等正定府屬之武邑等十二州縣於初二日至初三日得雨四五寸不等饒陽等七州縣得雨一二寸不等順徳府屬之邢臺等四縣得雨二三寸不等唐山等四縣得雨一二寸不等廣平府屬之威縣清河二縣於初二日至初三日得雨霑足永年等七縣得雨三四寸不等大名府屬之元城等十一州縣於初二日至初三日得雨四五寸不等保定府屬之祁州束鹿博野深澤四州縣於初二日得雨一二寸不等其餘各府屬州縣内僅得微雨者不敢繁叙上瀆宸聰臣查此番雨澤於霑足之後又得膏澤普施二麥益加暢茂秋禾己播者漸皆長發農民樂業預必豊盈理合陳奏以慰聖懐謹奏初十日都中己得透雨逺近霑洽朕感戴天恩篤厚不勝慶幸之至書曰天視自我民視天聽自我民聽爾能仰體朕意使畿甸黎元各得其所人和黙契夫天和所以致斯膏澤也觀一氣之相感有如立竿見影我君臣可不益凛冰淵更加黽勉乎雍正二年四月十三日直隸廵撫臣李維鈞謹奏為奏聞事竊查去嵗天津截留漕米囤貯日期經臣奏明在案今准兵部右侍郎臣李紱咨稱於二月二十一日自京起程赴津督運京通二倉交納等因臣即檄守道桑成鼎并令飛調去嵗截留漕米原經手各官赴津協同料理轉運去後兹據桑成鼎呈報已於二月二十五日僱募船隻開囤發運起至四月初六日止運過米共四十一萬三千五百五十五石零俱陸續轉運全完再上年臣飭令桑成鼎隨帯銀八千兩以備動用當經臣具摺奏明查截留入囤以及剥運京通一切脚費等項原於各旗丁僱剥等項銀錢動用惟席囤葦柴幫添扛價賞㸔守米囤兵丁等項於守道隨帶銀内共用銀三千餘兩此臣下所當稍効微力者也臣謹一併奏明伏祈皇上睿鑒謹奏李紱於督運一事之効力處實屬可嘉據伊囘奏云此畨在事之大小文武官弁無不踴躍趨赴實力奉行朕聞之不勝嘉恱此皆爾督率得法鼔勵勸教之所致天下事咸能如此則胡禁不止曷令不行耶同日又奏為恭謝天恩事竊照大興縣髙純嘏一案臣實有失察之愆部臣照例議降一級乃䝉皇上恩諭優容體恤臣跪讀之下置身無地嗣後當嚴飭屬員共矢公忠仰報萬一謹此奏謝兹於四月初十日保定郡城得雨雖不甚大然同雲密布沾被必廣俟各屬報到另行彚奏外合併陳明謹奏初十日都中得雨透足今嵗光景上天似有降福之兆朕實欣幸之至餘奏俱悉雍正二年四月十九日直隸廵撫臣李維鈞謹奏為奏明事竊查各屬雨澤大名廣平二府各已霑足永宣正順河五府於初二初十等日兩次得雨鄉河故道淤塞堤壩衝决旗民之地淹沒三四千頃今查勘明白委官疏濬築立堤壩告竣之日另繪圗奏聞宣化府同知滿雲鷫係奉留任之處理合奏聞再霸昌道湯之旭服官雖無敗檢才力甚覺短淺書生迂見議論難行政體未逹復查其關防不謹縱皇上另簡賢員補用庻於地方有益伏祈睿鑒謹奏覽雍正二年四月二十三日直隸廵撫臣李維鈞謹奏為奏聞事竊保定府屬待雨甚殷前於奏明事摺内仰荷硃批連日燠熱光景應有大雨欽此臣捧讀之下知聖徳上格自必雨澤立沛果即於二十二日甘霖廣沛至二十三日大雨滂沱四野透足麥田秋種皆可滿收書大有而紀屢豊皆我皇上誠敬感召之所致也除各屬報到另摺彚奏外所有得雨透足緣由合先奏聞恭慰聖懐謹奏真屬可喜可幸之事易曰二人同心其利斷金我君臣同心肫切為萬姓祈禱䝉上蒼垂憫沛然普賜甘霖朕與爾此番之幸喜實非他人所能喻也雍正二年閏四月十五日直隸廵撫臣李維鈞謹奏為恭請聖安并申微悃事臣自三月初八日跪辭囬署孺慕依戀日切於懐臣謹繕摺恭請聖躬萬安伏念我皇上萬幾稍暇勤觀書史探求治道兼之睿藻日新宸翰流輝一字一句實為千古楷模臣謹備筆墨數物冀充尚方之御伏懇睿慈納臣愚悃再查九府麥秋九分十分者居十之七八七分八分者居十之二三俟報齊另奏順徳府所屬之邢臺南和平郷三縣建閘開溝已得水利可灌地三千餘頃工完之日將村莊地畝繪圖恭呈御覽豫東兩省蝗蝻發生大名廣平順徳三府州縣與豫東連界者屢報有蝻子幸所委文武及地方各官廵撲勤密已滅十之八九全未為害數日内餘孽可盡合併奏聞謹奏朕祗知山東河南江南數州縣生發蝗蝻正爾憂慮不謂直隸亦有今幸已撲滅覽奏中全未為害之語深惬朕懐但恐遺有餘孽亟宜選委幹員督捕盡絶此係數省連界之地互相推諉之弊不可不慮當嚴飭屬員各專其責况愚民習惰偷安未必樂從全在地方官勤敏不懈勸導鼔舞齊心盡力為之方克有濟也臣見沿途修造營房令兵丁永逺住居於民實有禆益但奉行必以實心善政庶乎可久如山東地方多用磚瓦自然堅固至直隸各墩皆係土房易至傾圯將來兵丁恐不免遷徙廢弛之虞且臣聞州縣將此工程交鄉長地方料理有毎間發銀一兩五錢者有發銀二兩四錢者有先於民間派取木料人夫俟落成之後給銀者是奉行不善不惟誤公反以累民也有一人條奏營房一事朕疑其有心誣陷及至問爾聲名彼又盛稱爾之清公勤慎所以將此奏發來爾㸔至於土房之說只可如此而已山東因脩葢營房擾累地方前已特諭新撫陳世倌矣爾查通省屬員中或有奉行不善者亦未可定須嚴加訓飭再者宣化一帶不宜於沙石之地種植樹木聞地方官皆勒令百姓栽種民間甚以為苦當留心察詢又聞獻縣知縣范時珍火耗取至加四未知確否細加體訪實則即行㕘劾不實亦另為奏聞雍正二年閏四月二十五日直隸巡撫臣李維鈞謹奏為奏覆事竊臣於本月二十三日敬啓批回摺子内發條奏一摺䝉皇上硃批有人條奏内論及汛房一事朕疑其有心誣䧟及至問爾聲名彼又盛稱爾之清公勤慎所以將此奏發來爾看臣恭讀至此不禁感極涕零伏查各汛添設營房每間需工料銀四兩臣幫發銀一半嚴飭不許𣲖擾其木料等物均係價買惟人夫工食量給錢米臣思力役之征自古有之添設營房原以衛民即有小勞亦不為害至北地土房嵗加修補亦有二三十年之久若葢瓦房則費用浩繁不無擾累䝉諭土房之説只可如此而己聖明洞鑒無微不照臣恐屬員之中或有奉行不善謹遵聖諭再行嚴飭至宣化地方地多沙石原難種植今春插柳臣即諭地方官不必勉强臣今遵㫖當再飭地方官相度土宜而行勿强民所不能為以副我㫖北五府僅有加一即南府亦不過一錢四五分加四火耗非特直省無之即他省亦無此重耗欽奉諭㫖下詢理合一併奏聞伏祈睿鑒謹奏所奏俱悉同日又奏為恭報約計二麥收成分數事竊今嵗畿輔地方雨暘時若現今二麥在在秀實漸可登場臣通行確查兹據各道府将約收分數呈報前來查順天永平二府屬約有九分至六分不等保定河間二府屬約有十分至八分不等正定府屬約有十分至七分不等順徳府屬約有九分至七分不等廣平大名二府屬約有十分九分不等宣化府屬約有八分至五分不等臣查今嵗二麥處處豐登惟順天永平宣化三府屬山阜沙礫之區者間有五六分現在麥價頓賤無不含哺鼔腹感頌皇上仁恩所有各屬報到二麥收成分數謹繕摺恭奏以聞伏祈睿鑒謹奏聞南四府今嵗麥秋確有十分收成數十年來所僅見者閲爾此奏北五府分數似覺少過今正望雨甚殷大内現在立壇祈禱朕觀直省民風惟顧目前茍安率皆忽於蓄積當飭地方有司通行勸教趁此豐年撙節食用省無益之費寧使少有存留以為來年接濟州縣良吏若肯殷勤提命家諭户曉幸值年嵗屢登則耕一餘三耕三餘九之隆何難再見於斯世耶雍正二年五月初一日直隸巡撫臣李維鈞謹奏為奏報事竊今嵗畿輔地方仰賴聖主福庇雨𤾉時若二麥豐收經臣將約收分數查明奏報今麥已登場秋田正需雨澤於閏四月二十八日自未時起至酉時止得雨甚密農民歡忻咸云秋禾巳種者勃然茂盛凡收過麥地俱可以種晚稼且濃雲似墨得雨必廣今據清苑縣查報得雨入土五寸除各屬報到另行彚奏外所有保定郡城得雨縁由臣謹繕摺恭奏以慰聖懷謹奏京都左近二十八日雖亦得雨未透於初一日雨至初二日早方十分霑足朕深為忻慶况夏至日有事於方澤朕親詣行禮向蒙髙天之恩今復叨厚地之徳也惟黙感篤祜益加凛惕耳特諭雍正二年五月初五日直隸廵撫臣李維鈞謹奏為續報雨澤事竊照保定郡城於閏四月二十八日得雨情形經臣具摺奏聞今據各屬陸續呈報查順天府屬之東安等七州縣已得雨霑足霸州等十六州縣各得雨三四五寸不等保定府屬之祁州等十二州縣各得雨四五寸不等新城等三州縣己得雨霑足河間府屬之任邱縣天津衞已得雨霑足滄州等十二州縣各得雨二三寸不等正定府屬之定州等八州縣各得雨三四寸不等順徳府屬之内邱縣宣化府屬之懐來縣各得雨二三寸不等正在奏報間保定郡城於五月初三日又得雨三寸甚為及時小民歡慶臣查各屬自四月以來屢得雨潤我皇上念切民依猶於大内設壇祈禱今甘霖疊沛四野均沾皆我皇上誠敬感召成此豐年之象也臣謹將各屬續報得雨及保定府又得雨澤縁由繕摺陳明謹奏連降時雨大約霑被寛廣朕憂嵗之心已釋雨澤分數此後可不必頻頻奏報矣雍正二年五月十七日直隸巡撫臣李維鈞謹奏為恭謝天恩事竊五月初三日臣進摺人囘䝉皇上賜臣香袋七箇荷包二箇鰣魚五尾恭齎到保臣出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖伏念臣材識疎淺毫無寸効乃䝉皇上格外賞賚疉加恩賜臣何人斯頻邀異數涓埃莫報感激滋深惟有益加砥礪以仰荅皇恩於萬一耳再玉田縣還鄉河嵗淹旗民田地臣仰體聞謹奏覽卿奏謝知道了硃批諭㫖巻十上欽定四庫全書硃批諭旨巻十下硃批李維鈞奏摺雍正二年六月十二日直隸巡撫臣李維鈞謹奏為保留良吏恭請聖裁事竊順德府邢臺縣知縣戴天球自莅任以來廉以服官儉以持已催科撫字折獄勸農皆以實心而行實政且濬渠灌地已及千頃臣現在令其再仰祈睿鑒謹奏朕覽奏不禁大笑驚訝人之不可限量有如是乎若果係真實奮勉學做好官具本題留可也同日又奏為奏聞事竊邪敎潛滋愚民易惑臣欽奉硃批諭旨遵即於南四府地方飭令道府加意密訪今據順德府知府曾逢聖密訪邢臺縣之中巖寨有劉大師傅等倡名順天敎聚衆講法煽惑鄉愚當移行通判胡開京等密拏大㑹首劉言基即劉大師傅到案供出羽黨要國卿等并山主馬征等復經密拏審訊明白呈報到臣臣細閲各供查此敎始於劉言基之曽祖劉才運與要國卿等之祖昔年同入中巖寨託稱修行持齋起會倡為順天教名色沿及言基仍為大㑹首幻稱眞空老祖金公無生佛母黄婆塑像供奉每年三十兩月聚衆燒香斂取銀錢書符消災誑誘愚民雖非白蓮教之遺派實係邪教男婦混雜有壞風俗自應按律嚴治以罪但劉言基等皆係鄉農因祖代相繼恬不為怪其志蓋在圖取香錢以為衣食之資故久假不歸今各知悔悟情願改邪歸正似可從寛分别枷責開其自新之路應否如是臣未敢擅便理合復嚴飭守備千把等弁盡心稽查勿使匪𩔖潛藏再知府曾逢聖才具素優開濬水利灌田三千餘等邪教首先訪實拏獲解散尤為强幹之才洵係賢良之吏臣謹一併奏聞伏祈睿鑒謹奏曾逢聖聲名好如緊要處遇有應陞缺出具本題奏同日又奏為奏聞事雍正二年六月十二日據通永道高鑛呈報通州武清縣二處運河樁土各工原係侍郎臣牛鈕領帑辦修與地方官一無相涉但今大雨時行河水驟長武清縣屬運河東西兩岸河西務棋子淀等處俱各漫開皆因向修堤岸𩔖多單薄虚鬆朽裂拆陷所致理合報明等因到臣查運道關係重大臣一面飛飭高鑛親赴驗看各堤衝决若干丈尺有無損壞村莊田禾俟查覆到日另摺具奏所有武清縣運河堤岸衝漫情由理合先行奏聞伏祈睿鑒謹奏牛鈕所修工程朕謂斷不至如高鑛所報之甚伊受恩深重諒非木石何忍如此負朕今歲雨水原係異常之大所以致有衝決但伊秉性生平與人不睦每每招尤惹怨而旗人憾伊者更多因此堤岸衝決欲乗機以傾陷之耳爾於人言不可深信其為人猶屬直率頗稱歴練加之訓教尚可委用非棄材也同日又奏為奏明事竊照永定河堤岸關係綦重蒙皇上發帑培修遣員廵查誠防護水汛永衛民生之至計也身其事者自當仰體聖心潔已辦公以上副皇上睿鑒謹奏覽雍正二年六月二十二日直隸巡撫臣李維鈞謹奏為奏覆事竊臣查武清縣屬之河西務等處運河兩岸據通永道高鑛呈報衝漫甚多臣念漕運重大而村莊田禾又關民命身任封疆何敢不據報牛鈕查看永定河堤岸時伊子木爾泰亦相酌議因彼有巡查之責一切工料若不令其㑹估則日後巡查不無異議是以繕摺奏請令木爾泰㑹同分司蘇敏料估在臣之愚𠂻原冀其同心協力固堤岸而省錢糧也至荷硃批錢糧既不分發巡察一次三四百金出自何處臣實為愚昧今當逐細確查并將節省為公入己之處密訪明白另摺奏聞再邢臺丁憂知縣戴天球邢邑賑濟得法民頗得所范𢎞偲陞任時向臣力薦今知府曽逢聖亦極嘉奬近因丁憂復據守道桑成鼎詳請題留臣亦亷訪其政聲頗好故不揣冒昧瀆奏初不知其為皇上藩邸舊人臣再當採其政蹟確實遵旨具本題留再永定河石堤蟄陷並未開口民田廬舍毫無傷損直屬順天府之豐潤縣永平府之灤州保定府之清苑等五州縣河間府之故城縣正定府之冀州等四州縣順德府之邢臺等七縣廣平府之永年等七縣大名府之元城等四縣俱報有蝗蝻雖隨報撲滅全不為害然臣恐地氣蒸濕或有餘孽或有飛蝗嚴飭文武官弁不時竭力巡查大約過六月便可保其不復生發五月以後毎隔旬日即得時雨田禾茂盛合併奏聞謹奏田禾茂盛大慰朕懐聞蝗蝻又有新發者亟宜嚴飭地方官務令滅盡而後已雍正二年六月二十三日直隸巡撫臣李維鈞謹奏為奏明事竊吏治固重廉潔然有守無才則治理無術事多叢脞臣凡於屬員不敢求備然必期其人地相宜以免貽誤如河間府之吳橋縣知縣常三樂據知府浦文焯禀稱呉邑頗為衝要有修防催漕之責常三樂操守尚好但懦弱不振難膺民社之寄請題調補守道桑成鼎亦禀稱常三樂懦不任事臣以操守未濫不㕘其廢職而以教職題請補用部議内稱常三樂係引見奉㫖補授之員並未令巡撫試看等語伏念選補各官皆蒙引見補授若必奉㫖試看而後可以察㕘則非試看之員即不可以糾彈乎部臣又以生性懦弱必有廢弛實跡駁臣並未開欵查列欵糾㕘必應提審擬罪而懦弱非有罪之員矧常三樂係題請調補尤非㕘劾可比何庸列欵至大計以亷為首部臣之議誠是但非一亷即可以膺卓薦必有才以濟之而後堪膺民社之任在常三樂操守亷潔臣不敢掩其所長而才具平庸臣亦何敢隠其所短今吏部所議似屬有意搜駁臣不揣冒昧謹具摺奏明伏祈睿鑒謹奏似此披誠分剖絲毫無隠朕實嘉之朕閱部本時曾經再三斟酌因汝原題内有操守好一句部議若但取才而不取守恐人皆不尚廉潔所駁得理朕故依議前有刑部一事吏部此議不過作一不阿從朕意之舉朕若再為正之恐庭臣謂朕有意袒護汝也此事亦甚易處常三樂如果罷軟汝但據實㕘奏於本内聲明前因伊原無貪蹟所以題請改補教職今奉部駁查常三樂居官罷軟殊屬溺職相應㕘革如此具題庶不貽悞地方亦不失爾寛貸屬員之意也雍正二年七月初四日直隷巡撫臣李維鈞謹奏為奏明事竊臣欽遵面奉聖諭試看得保定府知府葛斗南品行實好而才非肆應誠如賑恤自各得所再臣前奏團練之法因值農忙各勤力作無地之民傭工餬口臣故緩而未行今盜風漸息為開導曲為訓飭倘能知改猶屬賢員臣謹繕摺奏明伏祈皇上睿鑒謹奏覽雍正二年七月十六日直隷巡撫臣李維鈞謹奏為奏明事竊查驛站夫役馬匹二項應增應減之處准部咨行妥議臣查直隷為萬國㑹歸之區所設驛站差使絡繹較之他省衝繁實甚夫役萬不可減而馬匹亦祇可少為調劑也如夫役一項自應如九卿所議照額募足但平時工食盡給與額設之夫一旦大差疊至額夫不敷應用臣酌將額設之夫每於十名内常時募足八名扣留二名工食每日所積便足大差僱募之資庶錢糧不致侵冒夫不累而差不誤水驛亦令比照此例至於馬匹臣愚以為減正驛有用之夫馬不若裁僻遞無用之夫馬直屬九十三遞除正定縣一遞歸入正驛青縣南皮二遞久廢外見存九十遞其摃轎抄牌跟馬等夫及接遞皂隷共約二千二百餘名此項夫役有名無人所當盡數裁汰每年可節省銀一萬五千兩再各遞接送公文遞馬共一千四百八十一匹馬夫五百五十名今酌於每遞留馬十匹共留馬九百匹共留馬夫四百五十名裁去馬五百八十一匹馬夫一百名實節省銀一萬四千六百餘兩合計裁汰僻遞夫馬二項每年共可節省銀三萬兩既可省錢糧之麋費又無虞驛站之廢弛臣謹抒末議己經分案題覆是否允協理合繕摺奏明伏祈睿鑒謹奏此事須待各省到齊𤼵該部詳議具覆朕再加斟酌然後可定同日又奏為要缺需人謹舉所知仰祈聖裁簡用事竊照大名府接壤兩省賦繁事劇知府一官必得才品優長之員方克勝任臣於通省道府中細加採擇所可深信者惟河間知府浦文焯順大名道陳志源今亦因病乞休俟查驗到日即應題請查大名道統轄三郡缺難久懸並祈内得蒙聖恩允臣所請調補所遺員缺查有順德府通判胡開京歷任年久服官勤慎實有肆應之才又保定府理事同知齊式老成練達辦事勤敏若於此二員奏伏祈聖明批示遵行謹奏覽雍正二年八月初六日􅀡隸巡撫臣李維鈞謹奏為恭請聖裁事竊山西布政使高成齡摺奏火耗一事臣於邸抄中閲九卿議覆伏讀上諭提解火耗原一時權宜之計將來虧空清理府庫充裕有司皆知自好則提解自不必行火耗亦可漸減矣此誠皇上籌國是軫民依明體達用上下公私之間俱得善全各省督撫所當遵行之良法也查􅀡屬共虧缺銀四十一萬三千餘兩臣亟圖彌補於通省耗羨量留道府州縣養亷之資以其所餘期於二年内完補清楚臣於雍正元年九月通行起至今年六月核算完補已有二十萬兩其未完補銀二十一萬三千餘兩計於雍正三年奏銷時可以清完俟清完之後則火耗似宜免提然臣更有請者從前之虧空雖完不能保後此之必無虧空必預籌彌補之法庶國帑不致虚懸臣查直省火耗較他省為最輕而順天永平宣化三府錢糧火耗尤為輕減應槩免其共計二十三萬二百七十一兩有竒内將耗銀六萬兩留貯道庫以補無著虧空則帑項可免虚懸矣再將五萬兩存貯道庫以備修理城堤補葺營房整頓營伍及種種隨時之公費一皆取之自上則公捐之累自絶矣將二萬兩為道府各㕔養亷之資順天永平宣化三府火耗既不提解霸昌通永口北三道永宣二府㕔州縣聽其沿舊無庸議給守道巡道天津道均可養亷亦無庸酌給惟大名道及保河正順廣大六府每員應各給銀二千兩同知通判計共十二員毎員應各給銀五百兩節儉敷用則需索之弊可杜矣所餘耗銀七萬二百七十一兩有奇給與六府五州屬之九十二州縣衛分大中小三等大者給以一千二百兩中者給以千兩小者給以八百兩上司之餽遺既絶通省之公費有資上下各有養亷之項則虧空之患可以永除矣至留補虧空及通省公費每年逐案造冊恭呈臣謹酌議陳請可否如是伏祈聖訓指示遵行謹奏爾職為一省之綱領凡地方上此等事總在爾酌量料理合宜朕有何不見信之處耶雍正二年八月初八日􅀡隸巡撫臣李維鈞謹奏為恭報微臣公出日期事竊臣標屬協營臣擬於暇時親徃考驗乆經奏明今吏務少清而各營伍生兵虚兵之弊恐未盡絶臣擬於八月初八日自保起程赴正順廣大等處協營查驗所有微臣起程日期理合陳明謹奏知道了保舉武弁一摺留中報秋成分數一摺另有旨諭部眞可慶喜之事也雍正二年九月初一日􅀡隸巡撫臣李維鈞謹奏為奏聞事竊臣徃南府各協營查驗馬步兵丁惟忠順營之虚冒為尤甚查守備李仲銀係臣前以技勇保薦蒙恩特放之員不思報効廢弛營伍臣不敢以向經保薦少有狥隱現在繕疏應撥馬兵二名步兵三名但營内馬兵有不敷分再九月望後方為農隙當飭地方官督率鄉民修省民生營伍實有裨益臣出行從不用地方車馬瀾即日嚴㕘合先一併奏覆伏祈睿鑒謹奏覽雍正二年九月初九日直隸巡撫臣李維鈞謹奏為特舉賢員仰祈睿鑒事竊惟潔已奉公竭忠効力原屬臣子之常分但才守兼優者未易多得查巡道常德夀自履任以來勤於辦事自甘淡薄實為才守兼優之員臣何敢隱匿謹具摺奏聞仰祈睿裁簡用惟是直隸巡道一官為通省刑名總滙又兼管驛務最為繁劇臣方藉常德壽為臂指之使倘荷聖恩擢任加以陞銜食俸仍留原任陞轉非惟常德夀感激無地益勵公忠而臣亦可得臂指之用臣為賢才起見非敢狥私妄保伏祈皇上睿鑒謹奏常德壽原好朕所稔悉因直隸巡道之任甚屬緊要所以留伊供職不然早另用於他處矣爾此奏與朕意甚合隨另有諭旨也雍正二年九月十九日直隸巡撫臣李維鈞謹奏為奏覆事竊查今年直屬秋收大有比户盈寧惟順天府屬之霸州大城東安武清寶坻玉田梁城等七州縣所夏秋雨大田禾淹損仰䝉皇上念切民依勅諭臣將倉糧酌量施恩賑濟毋使生民失所欽此轉行欽遵萬姓歡呼莫不感頌如天之仁查據守道桑成鼎勘明霸州等七州縣所被水之處既荷殊恩賑濟已無艱食之虞但本年錢糧心切急公力有未紓倘䝉格外𢎞仁将雍正二年應徵錢糧緩至雍正三年麥收後帶徴則有加無巳之殊恩萬民之感戴尤無紀極矣但應否緩徴出自特恩臣謹攄愚忱㐲祈睿鑒謹奏七州縣所既經被淹餬口尚且艱難未有一面賑濟又一面催徴之理當援賑恤之旨題請緩徴可也同日又奏為奏聞事竊天津關額税之外所有贏餘銀兩特荷聖恩悉行裁去如有贏餘令臣據實奏聞欽遵在案臣查鹽法道叚如蕙於一年期内代理二季零二十六日任内未經奉裁計日核算應解贏餘銀二萬兩有奇據如蕙止報有六千二百餘兩尚少一萬三千七百餘兩雖據稱冬季河凍貨阻致有缺少然不應虧缺如許之甚臣恐其徴多報少現在嚴駁查㕘嗣改委通永道高鑛接管在一年期内代理一季零六十四日若循舊例核算該有贏餘銀一萬四千九百七十餘兩今據報有一萬七千三十兩有奇較之舊額多銀二千六十餘兩内除十日内額定贏餘銀九百七十二兩有奇係在未奉裁之先飭令仍照例解部外實存贏餘銀一萬六千五十八兩應否徑解内庫抑令解貯道庫撥發天津建倉之用㐲祈聖裁批示遵行再據高鑛稟稱今年夏秋河水深通商船湊泊故贏餘較多臣查天津關贏餘銀兩歲有盈絀難以額定總照每歲徴收實數悉行報解至於髙鑛所管二季錢糧亦能潔已奉公矢志不欺理合奏聞仰祈睿鑒謹奏贏餘銀兩照例送部前旨甚明高鑛殊多此一稟若仍按額定之數較量多寡則與裁去之旨復相左矣果能連年奉行盡善朕自然加恩議敘此乃有賞無罰之事但令伊據實無欺即為盡職也雍正二年九月二十八日直隸巡撫臣李維鈞謹奏為奏明事竊查玉田縣之還鄉河於康熙四十二年間衝決被淹民田四千三十一頃旗地千有餘頃臣仰體皇上軫恤民瘼至意備發銀兩委武清縣知縣陳良襄玉田縣典史李文標修築並不廢民一錢勞民一力據報稱自運河頭起至牛見莊止共計六十二里有奇寛十一丈至三四丈不等挑挖淤沙疏濬深濶兩岸堤埝培高添厚其莊前決口建月牙大堤一座堤前臨水又築滚水壩一座莊南決口亦俱下樁堵築堅固水歸故道暢流入海舊淹旗民之地已盡數涸出今工程告竣繪圖呈送到臣臣念還鄉河兩岸地土有淹有涸今河濬堤築自後地盡可耕糧皆有著臣節省辦理價半工倍若循例料估動用帑項必至萬金矣所有還鄉河修濬工竣并確核繪圖恭呈御覽伏祈皇上睿鑒謹奏修濬還鄉河計日成功甚屬可嘉該撫並委員陳良襄等朕巳諭部議敘矣雍正二年十月初一日直隸巡撫臣李維鈞謹奏為奏聞事竊查直屬地方自秋收之後徧播麥種已漸次生發今於九月二十八日之晚至二十九日夜以繼日普降甘霖訪之農民咸相慶幸預卜麥秋定獲大有若冬深得雪必得十分收成理合奏聞恭慰聖懷謹奏明歲收成原賴今冬雨雪然為期尚早朕何可預為希冀也惟我君臣敬持今歲無逸之念不敢荒寧料上蒼必仍賜與今年之瑞應也願與卿共勉之雍正二年十月十四日直隸巡撫臣李維鈞謹員前徃永平府採買關口留阻運送稽遲至六月七月始陸續運至工所即飛飭浦文焯嚴督監造今據呈報建造倉厫照通倉之式共應建連三厫十六座因木植到遲惟恐留漕有誤併力儹工先建十二座於十月十二日工竣已可貯米五十萬石尚應建四座木瓦甎灰悉已備齊但天寒將凍臣已同河臣齊蘇勒㑹疏題報在案矣臣稽之徃昔伊尹耕莘之時有區田之法收穫倍蓰臣繪成區制在保定城内賃地二畝僱人試行之其播種灌溉尚未如法而二畝之地已收榖十六石若無地窮民得荒廢之地數畝俾其區種則數口之家即能養贍或歲遇旱澇仿而行之於農功大有裨益臣一併奏聞㐲祈睿鑒謹奏區田一説向日視為迂濶之談亦未聞有行之者觀爾所奏收穫倍蓰則非荒唐矣此法倘能通行獲益良匪淺鮮雖係古人成法亦爾一片為國為民之心感格神明之所黙授朕實欣悦之至俟後再有成效更為源源奏聞此誠美政也雍正二年十一月十三日直隸總督臣李維鈞謹奏為遵旨奏覆事竊臣面奉諭旨宋師曽虧空完日令臣一面具題一面摺奏欽此臣查商欠虧空一案宋師曽名下應追賠補不足銀四萬七千四百九十三兩有奇勒限三年清完今據宋師曽於一年限内陸續交還守道鹽法道庫貯訖除俟守道桑成鼎鹽法道段如蕙将所交銀兩彚查詳覆另疏題報外所有宋師曽名下應追銀兩於一年限内照數清完緣由臣謹繕摺先行奏聞謹奏賠補銀兩既經清完具題可也為宋師曾乞恩係爾之意見抑或出於年羮堯之意見若係爾意朕即施恩若出於年羮堯之意朕則不施此恩也近日年羮堯陳奏數事朕甚疑其居心不純大有舞智弄巧潛蓄攬權之意爾之獲蒙知遇特由於朕之賞識拔擢自初次召對時見爾藹然有愛君之心見諸詞色所以用爾自用之後爾能盡心竭力為國為民毫不瞻顧因而遂取重於朕斯豈年羮堯所能為政耶我君臣之間若有一物間隔二人皆減價矣年羮堯既不能於李紱田文鏡諾岷等為禍又焉能於爾作福近有人奏爾餽送年羮堯禮物過厚又覔二女子相贈之説朕實不信想斷無此事但念卿事朕如此忠誠與朕如此契合朕凡有言何忍隠而不宣至卿向日與年羮堯之交徃曽經奉有諭旨朕亦不怪今年羮堯既見疑於朕故明白諭卿以便與之疎淡宜漸漸遠之不必令伊知覺年羮堯奏稱俞兆晟在京招搖多事頗不利於卿云云此一節自當面諭俞兆晟轉以諭卿總之朕之待卿一字不瞞卿亦當惟命是從赤心奉戴為是諸王大臣中秉公為國家愛惜人材者惟怡親王一人卿倘有不便達朕𤨏屑之隱情怡親王儘能照拂並可為卿周全卿何不樂為此不擔干係之坦途耶大笑書此特諭雍正二年十一月二十二日直隸總督臣李維鈞謹奏為密奏事竊蒙皇上批回摺子臣恭捧跪讀不禁感極涕零臣荷聖諭敢不瀝陳微悃臣前陛見時在乾清門年羮堯傳旨宋師曽虧空清完即具摺來欽此臣旋蒙召見當即面奏隨荷上諭宋師曽虧空完日一面具題一面摺奏欽此臣於回署後據報全完是以繕摺先行奏聞然所交銀兩須俟守道鹽法道彚查詳覆方可具題臣已於摺内聲明至臣身受逾格皇上簡任巡撫今又特授總督加銜兵部尚書賜祭賜廕榮寵非常内外臣工未有如臣之受恩深重若以年羮堯之薦或䝉晉臣一階斷無有如此相遇之隆者臣知之甚明實未曽感恩於私室也十月内年羮堯過保定問臣有何舊蹟隨將所有法書三册畫幅四軸送看彼即取去三件亦非臣有心餽遺此外實無他物臣蒙皇上恩榮已至更何所求更何所畏且心頗向上何肯朝所見諸王大臣實惟怡親王公忠為國愛惜人材見臣孤立極加知愛然臣未敢親近逮荷恩諭徃來共輸赤心互相敬重亦從未私結恩好以圖倚仗而於他人更可知矣臣於初五日面恩遇愛護至於此極若懐有二心則犬豕不如將臣罪暴之天下亦覺尚有餘辜矣臣之私心惟願大小臣子一心事再請陛見披肝露膽於聖主之前庶臣之隱情可以少達伏祈睿鑒謹奏朕意大概諭俞兆晟前來傳諭於卿封印後不必來京朕諭明白剴切卿但知之至於卿所有難盡之忱朕皆洞悉又何必多此一番形跡耶雍正二年十二月初六日直隸總督臣李維鈞謹奏為續報得雪事竊保定郡城於十一月二十八日得有瑞雪緣由經臣具摺奏聞今據各屬陸續呈報前來查順天府屬州縣衛十一月二十五六八等日得雪一二三寸不等保河正順廣五府所屬州縣衛十一月二十八日得雪一二三寸不等宣化府屬各州縣十一月二十五日得雪五六寸不等直隸冀趙深晉定五州并所屬各縣十一月二十八日得雪一二寸不等似此瑞雪普降預兆豐年之慶理合繕摺陳明謹奏闔省得雪莫非吾民之幸但慮微少不足以滋潤二麥朕連日仰瞻雲氣正爾希望未已雍正二年十二月十一日直隸總督臣李維鈞謹奏為恭懇聖恩請留賢員事竊臣叨膺重任惟賴一二屬僚同心恊力以圖報効巡道常德壽才守兼優實資助理前經具摺保薦懇恩仍以陞銜留任今常德壽叨沐特恩陞授江西布政使浦文焯陞補常德夀員缺我皇上知人善任固將使賢員分佈共襄至治惟念畿輔重地尤在得人見今守道桑成鼎亦經陞任所遺員缺䝉恩簡用自必賢良之選臣何敢置喙但常德壽任直年餘事皆熟悉而臣又知之甚深且守巡二道缺已荷特旨改陞藩臬兩司衙門員缺相當臣不揣冒昧仰懇聖恩將常德壽調補直隸布政使則駕輕就熟察核必清實有裨於吏治民生臣謹具摺奏懇㐲祈皇上允臣所請臣無任惶悚待命之至謹奏羅密較之常德壽更好雖未經外任其人品操守俱優且老成持重汝一見即知矣目今須汝推誠提挈逮一半載間事務練習之後是一超羣出衆之布政司也雍正三年正月十三日直隸總督臣李維鈞謹奏為恭報雨雪事竊上年冬雪甚微麥田未潤臣與各屬員方共殷憂兹於正月十二日申時起至戌時止普降膏雨入土三寸自亥時起至十三日午時止復得大雪積地六寸四野均沾萬民歡悦皆由我皇上仁慈育物誠敬格天所以上感穹蒼下沛膏澤豐年之象可以預必理合繕摺先行奏聞謹奏眞為可喜可慶朕惟以手加額感極而彌増敬慎之忱前於爾陛見時朕曽向爾言看節氣光景正月内必有應時雨雪矧値祈穀大典之期膏澤普降更見上蒼昭示賜禧之象朕仰瞻間寅畏之心不覺凛然此二字我君臣共勉之雍正三年正月十九日直隸總督臣李維鈞謹奏為奏聞事竊直屬各處大道為萬國所經由毎遇夏伏或天雨水發窪者成河平者泛溢行人病渉而􅅵畝亦被淹害再四籌度莫若於大路左右開溝二條寛深各一丈以備蓄洩則田土行役均受其利臣擬於二三兩月間農工之暇撥夫給粟委員督率以為此舉但今距二三月為時已迫臣雖現在具疏題明深慮部議稽阻則行有未逮臣抄疏繕摺先行奏聞是否可行伏祈皇上乾斷謹奏此事且勿具題朕與在廷數人商酌各議論不一乃利害相半之事況非急務今歲不必舉行俟冬間爾來見朕時面定可否或於近水窪下之處試開數里驗其果否有益似乎猶可第恐新加之土一遇伏雨更致泥濘䟦渉維艱亦須預為籌及也雍正三年正月二十五日直隸總督臣李維鈞謹奏為續報雨雪事竊保定郡城於正月十二至十三日得有雨雪經臣奏聞今續據呈報如順天府屬於正月十二三日涿州保定得雪七八寸東安得雪五寸餘固安文安永清武清房山寶坻良鄉得雪二三寸又保定府屬之雄縣得雪七寸容城安肅得雪六寸祁州慶都定興唐縣蠡縣深澤博野完縣淶水高陽得雪三四寸安州易州新城新安滿城得雪五寸又河間府屬之寧津得雪五寸河間青縣東光得雪一二寸靜海任邱得雪四寸又正定府屬之正定行唐直隸晉州深州定州及所屬之新樂得雨雪二三寸直隸趙州及深州屬之饒陽安平晉州屬之無極得雪一二寸又廣平府屬之永年邯鄲曲周雞澤得雪一二寸又宣化府屬得雪一寸其未報到之州縣及永平順德大名三府屬俟報到再行彚奏外正在繕摺間保定郡城於本月二十三日又得細雨入土六寸四鄉透足前於正月十三日値祈穀大典之期普降雨雪方及一旬於二十三日復得膏雨五風十雨預兆豐年是皆我皇上敬天勤民盛德之所感召也臣謹具摺奏聞伏祈睿鑒謹奏初春解凍遂得雨雪如此透足實為罕遇然二麥之收穫究於麥秋後始可定耳雍正三年二月初一日直隸總督臣李維鈞謹奏為奏覆事竊查保定府之定興縣知縣梁燦因稽延年羮堯奏章例應降一級調用臣於正月初二日進京路由定興沿路居民環稱梁燦勤愼愛民公籲題留臣亦素知其稱職是以懇求皇上將梁燦降一級留任而不知吏部議處已於上年十二月二十二日奉旨依議欽遵在案所以臣准部咨不敢再有瀆奏今接内閣學士臣吳士玉信䝉皇上令臣將保留之知縣覆奏伏念皇上日有萬幾宵旰不遑臣所奏留僅一縣令乃䝉念及臣奏特命吳士玉傳問臣謹據實具摺奏覆伏祈睿鑒謹奏不但縣令之職宰制百里生民所繫理宜鄭重即動靜食息之間朕未嘗不孜孜以勤愼自勉也同日又奏為敬抒愚悃仰祈聖鑒事竊臣蒙皇上恩遇信任優渥巳極感激彌深報効無地苟知識所及敢不披誠入告如舅舅隆科多大將軍年羮堯過失多端疊頒上諭固已昭示天下然不即加罪者誠我皇上恩同覆載布廣大之仁欲使其聞而知悔悔而知改仍保全其始終也但臣恐二人不悟㒺知改悔反生疑畏則難以辦理事務而君臣上下未免有所間隔以臣愚見將二人之黨以漸而散二人之權以漸而輕則其權勢已去自知循分謹守仍祈皇上録其微功示之以恩時加賚予既凜天威更沐矜全是皇上之恩威並著而二人之感戴亦㒺替矣臣不揣冒昧披瀝愚忱密摺奏聞是否可採伏祈睿鑒謹奏卿之忠誠朕所素悉前於面奏時朕已明諭矣今復有此奏更見悃忱但朕自有定見不必過慮隆科多年羮堯之輩豈能逃朕之範圍也雍正三年二月二十五日直隸總督臣李維鈞謹奏為奏聞事竊臣前以大路兩傍開挖深溝具奏欽奉硃批仰見聖慮周詳臣何敢冒昧通行敬遵聖諭先試行之臣就近在清苑安肅滿城三縣地方親徃察看形勢每遇鄉民詢以路傍開溝僉云若一開通不獨利於行旅地土可免被水之患臣即面曉官民次日興工而鄉民趨事不召自至今巳開通數十里每夫一名給米一升錢十五文資其口食民尤鼓舞今定興慶都二縣亦踵而行之矣竊計三月十五日以前東作未興可以推廣行之如有未妥之處即當暫停俟秋收後再為酌行查自良鄉縣至邯鄲縣計一千二百里自涿州至景州計六百里合算兩傍里數共三千六百里應給工食約用米三萬餘石約用銀一萬六七千兩查雍正二年捐貯社倉穀有五萬餘石伏懇聖恩將此項穀石動支給發所需之銀容臣在前奏准公費五萬兩内支用此事臣蓄志十年未得舉行今蒙皇上命臣試行不料民情踴躍如此至直隸地形每多路卑而地髙一經大雨官路成河行人甚苦今開溝新塡之土即有泥濘亦無甚礙況目下天氣晴和見在所塡之土已乾燥易行可無上厪聖慮也臣為地方起見不揣冒昧再行瀆請伏祈睿鑒俞允臣不勝惶悚兢惕之至謹奏開溝非不可待之事如此急遽殊屬悖謬倘有人以干礙風水之罪議加於汝則朕亦不能為汝寛貸也此事必通盤將地之高下水之去來明白繪圖審視斟酌而後可定豈可乘一時高興汲汲皇皇以從事乎至奏中如有未妥之處即當暫停是何言歟汝甘為貽笑於人之督撫朕不甘為輕舉妄動之人主也汝於此一事之固執大誤矣雍正三年二月三十日直隸總督臣李維鈞謹奏為微臣負咎實深仰祈聖慈矜察事竊臣猥以庸愚疊荷聖恩高厚至極靡加而才識淺陋動多隕越路傍開溝臣妄以為利冒昧瀆奏恭奉硃批跪讀之下惶悚伏地汗浹於背蒙皇上寛恩即不加以重譴而開示明晰訓誨嚴切臣感懼益深尤覺無地自容今遵諭旨已將開溝之工星行停止矣但臣之輕舉妄作咎實難辭謹負罪瀝情繕摺具奏伏祈皇上睿鑒矜全臣無任惶恐戰慄之至謹奏大抵行為不宜過偏貴乎執中即報効之心亦然朕並不謂此事不當行但未洞悉其情形且非不可緩之事何必如此輕率急遽所以有前此之諭今既經停止俟冬間爾來見朕時備悉敷陳可也此時預將沿途地之髙下水之去來勘明繪圖進呈朕覽明庶便酌定雍正三年三月初七日直隸總督臣李維鈞謹奏為恭謝天恩事竊臣接鹽臣莾鵠立來書以臣清貧將舊有鹽規與衆商酌議願歲輸銀八千兩與臣養廉已具摺奏奉旨俞允通知到臣伏念兩年食用皆從前所積之宦資一絲一粟何莫非天家之膏澤且此項鹽規臣前巳奏明裁革兹重荷聖慈允鹽臣所請臣何人斯乃䝉皇上豢養宏恩至於此極臣感戴日深報稱愈難矣謹繕摺奏謝伏祈睿鑒謹奏此係爾應得之項且匿情務名朕最不喜不但此一項舉凡分内所應得者不妨取之留為公用身為一省總領賞勞之費亦所必需何庸矯亷與事無濟朕生平所取惟在適中得當而已同日又奏為奏明事竊開溝非不可緩之事而臣輕舉妄作負咎實深乃䝉聖慈矜恕指示諄切臣惟恪遵諭旨將地之高下水之去來明白繪圖但臣未能徧歴察看委霸州知州逯選自良鄉縣南至景州自涿州西至邯鄲縣逐一相度備細繪圖到日恭呈御覽伏候聖裁再古北宣化天津三提鎭營伍軍實提鎭諸臣各有整飭專責但臣䝉特恩統轄將弁兵目尚未簡閲臣於正月内面覲天顔曽經奏明於公務之暇次第巡查今臣於三月十二日由河間天津通州涿州各鎭協逐處考察古宣二處容臣於秋間徧徃巡查至臣徃通涿二協道路所經密邇京師臣戀主情深必欲詣闕請安恭聆聖訓則有所遵守可免隕越臣無任依戀待命之至謹奏前陛見未久目下不必來京即通州亦宜俟秋冬之際一路順便察看爾於冬初巡查至京之日適當朕謁陵之時方為一舉兩便不然仍分為二事矣辦理地方諸務亦屬緊要何必僕僕於道路耶雍正三年三月十五日直隸總督臣李維鈞謹奏為雨澤及時恭慰聖懐事竊查直省自正月得過透雨麥田滋潤二月至今未降雨澤麥已將花秋禾盡種望雨頗殷今臣於三月十四日路過大成文安霸州靜海等處自夘時起至申時止得雨三四寸不等詢之鄉民僉云雨雖不多已可接濕麥可全收秋種亦必茂𤼵矣且此日同雲四布得雨必廣此皆我皇上愛民誠切實黙感乎上蒼每値望雨之候甘霖為之立沛也為此謹奏暮春時雨潤麥滋禾不啻甘露誠可欣幸朕觀景象此日之雨大槩寛廣北數省必獲均沾膏澤也雍正三年三月二十五日直隸總督臣李維鈞謹奏為奏覆事竊查文安大城兩縣交界之艾頭莊至灘里村等處被水地方經都統額爾金奏請挑河築堤奉旨前徃查丈之日會同總督勘明詳議具奏欽此户部咨行到臣臣欽遵於本年三月十五日㑹同額爾金并率同子牙河分司蘇瞻霸昌道卞之錀文安大城兩縣勘得子牙河堤東有艾頭莊莊前有一支河長二十餘里濶四五六七丈不等其河南抵子牙河大堤北通淀河水大之年淀河之水灌入支河河邊共十九村莊徃徃被淹臣等會商於艾頭莊前築一小堰攔截淀水不入支河則可保衛十九村莊而艾頭莊之百姓又以東北風大則淀河之水勢直衝艾頭莊若將支河口子堵截則艾頭莊之受害比十九村為更甚臣細觀水勢其言非謬因從支河口泝流而南地名張毘口向有民堰一道髙出水面二尺其址猶存係前人修築成規臣等擬於張毘口照舊堰基址築堰一道仍高水面二尺則水小之年十九村可以保守水大之年艾頭莊亦不獨受衝激矣臣謹遵旨會同勘明詳議具奏伏候聖裁謹奏爾遵旨親詣會勘仰體朕意自必周詳合宜即照所議行同日又奏為續報雨澤事竊臣於三月十四日在路得雨當經具摺恭奏在案今續據各屬呈報前來查東安保定武清易州新安淶水蔚縣延慶懐來九州縣各得雨三四寸不等房山清苑安肅正定四縣各得雨三寸昌平通州涿州良鄉定興深澤雄縣蠡縣新城河間東光寧津故城定州藳城獲鹿武邑栢鄉延慶十九州縣衛各得雨一二寸不等又據清苑縣呈報三月二十日至二十一日得雨二寸再此兩日涿州易州三河三州縣各得雨三寸通州得雨霑足定興滿城容城淶水高陽博野唐縣安肅八縣各得雨二三寸及一二寸不等除未到各屬俟報到彚奏外所有續報得雨之州縣衛合再繕摺奏聞謹奏昨於十九日京中得雨是日雲氣濃郁光景雨澤必廣不料竟未逺被殊為意想之所不到頃聞河南頗覺亢旱朕甚憂之大約南四府雨亦不甚霑足也雍正三年四月十七日直隸總督臣李維鈞謹奏為奏聞事竊直屬雨澤永平宣化二府屬及京東各州縣俱已霑足保定河間二府屬雖屢得雨尚屬不敷南四府雨澤甚少以致上厪宸𠂻今大名府屬之南樂内黄開州滑縣東明長垣等六州縣據報於四月初三日各得雨二三寸不等正定順德廣平三府屬亦有得微雨者總未霑足臣日夜兢惕䖍誠祈禱十一十二兩日僅得微雨二次是臣奉職無狀何能感格伏念我皇上體天之心勤求民瘼省刑減賦賑濟蠲租仁恩廣被日致天庥是以山西河南兩省荷聖主黙禱甘霖立沛臣惟仰賴皇上德孚天心福庇生民自必甘霖大沛也臣不勝惶悚感惕之至謹奏去年朕之政事常恐不逮爾之治績今歲爾之治績遠不逮朕之政事矣所以上天垂戒昭著此亦顯然可見者也愼之發來二摺秉公回奏雍正三年四月二十一日直隸總督臣李維鈞謹奏為天恩彌厚臣咎愈深仰祈睿慈事竊臣䝉皇上批回摺子臣跪讀之下惶懼失措感激難名伏惟我皇上之聖明猶勵精圖治宵旰不遑事無大小盡善盡美臣下縱竭精神材力豈能仰補於萬一正猶天之不可階而升也臣以庸愚兩年以來幸免隕越皆荷聖訓指示今年辦事雖不敢懈弛而識力闇陋多蹈愆尤乃䝉皇上不即加以重譴諄諄訓勉雖天地之生成父母之顧復無此慈覆臣惟有益矢忠誠以圖少答皇恩於萬一再䝉皇上發來二摺容臣細查確實秉公奏覆斷不敢曲狥情私伏祈睿鑒謹奏觀爾一切章奏文情口氣甚與年羮堯相仿總緣爾等字蹟徃復稠疊彼此熟習之故耳朕每諭毋務虚詐爾竟不能領畧猶為此種浮泛套語朕深不取也雍正三年五月初一日直隸總督臣李維鈞謹奏為續報雨澤事竊直屬雨澤㨿各屬呈報前來查四月十七日香河西寧得雨三寸五分二十三四等日昌平阜平得雨霑足宣化得雨五寸保安順義懐柔得雨霑足新河唐山栢鄉得雨一二寸宛平大興得雨五分二十三至二十五日蔚縣得雨尺許隆平内邱得雨四寸深州得雨霑足臨城邢臺滄州趙州武邑任縣沙河南和得雨一二寸臣查各屬得雨透足者已多尚有未透足之處惟保定河間兩府有數州縣衛雨澤更稀臣見在遵漢儒董仲舒春秋繁露祈雨之法䖍誠祈禱除各屬再有報到另奏外理合將得雨地方具摺奏聞謹奏覽奏因檢春秋繁露細閲其祈雨之法朕意似此皆可不必蓋獲罪於天無所禱也大凡地方水旱沴不虚生或朕朝政闕遺或爾等封疆大吏治理紕繆或小民習尚澆漓之所致消弭之道當應之以實不應之以文惟反躬修省克已改過然後齋肅籲懇則天人交感之際潛孚黙契有如響之應聲但庸愚視為杳渺無憑耳朕即位以來凡有祈禱從未命僧道之流設壇作法祇令其諷誦經典代達一疏文而已朕嚴恭寅畏敬天之心無時敢懈至於鬼神之道體物不遺第宜敬而逺之固不可輕忽亦不可溺信而渉於謟瀆兹亟應省察吏治檢點刑名其有關於國政者奏聞於朕我君臣期共懋勉以恭迓天庥可也聞高鑛近甚怠惰諸事不理詞訟皆批發該州未知確否細加體訪奏聞同日又奏為奏明事竊臣受恩深重惟有實心報主凡䝉聖諭凛奉恪遵但識見愚陋常多未能領畧是以所具章奏雖意出眞誠而敷陳不達文情口氣實非學年羮堯而與之相仿也臣與年羮堯於康熙六十年在順德途中始相認識以後通問歲不過一二次自䝉恩旨臣遂與年羮堯相絶並無字蹟徃復雖年羮堯恨臣日深然臣既知年羮堯不純若仍與來徃則臣心亦有不純矣矧䝉皇上知遇之隆更何求於年羮堯而尚敢依囘以蹈欺天之大罪也謹陳愚悃伏祈睿鑒謹奏據奏與年羮堯通問歲不過一二次是何言歟西安總督官㕔内未有隔五日不見直督李維鈞之介使此衆目昭彰之事何可强辯觀爾今日猶左遮右揜則從前改悔之説盡屬虚詞人非聖賢孰能無過果能奮然易轍不少依回則可謂勇於自新者若仍如此巧言粉餙暗留地步以狡獪為得計以隱蔽為深謀恐一旦發覺則有心之罪無辭可逭也如欲盡釋朕疑須挺身與年羮堯作對盡情攻訐暴其奸蹟與天下人知使年羮堯恨爾如讐則不辯自明矣此又在爾之樂為與否設與年羮堯通同相約做成假象以圖眩惑耳目斷不能逃朕之鑒察也爾其思之雍正三年五月初十日直隸總督臣李維鈞謹奏為密陳實情事竊臣受我皇上重恩内外臣工莫可企及報効微忱雖赴湯蹈火亦所不懼豈以朋友私情而反有所顧惜依回實縁秦中情事未知確切不敢以虚泛之語冐昧劾今就臣所知聞者繕就㕘本已於初十日拜發伏祈皇上恕臣從前愚昧俾臣得盡心料理地方為聖世無虧之人臣不勝榮幸歡洽之至謹奏汝不盡心力亦不過如年羮堯棄之不用而已朕歴觀四十餘年内外臣工中出𩔖㧞萃堪為柱石之材者良不易得即以年羮堯而論初何嘗不以人材目之今一旦敗露至於如此川陜之遺害無窮兵民之怨恨切骨較之蘇克濟李樹德常鼐滿丕等不啻倍蓰國家亦安用此輩為哉汝祗為一身利害計則可若言經朕躬信用倚任之人即當為無虧之全臣堯時尚有四凶斯豈朕所能耶但不為奸徒之愚惑或可勉强一二耳大抵人之有過如身之有疾以痛改為藥惟須眞切方收實効若以機械變詐為良醫恐疾愈深而害愈大也愼之愼之㕘本到時朕覽訖自洞徹汝之肺腑也雍正三年五月十四日直隸總督臣李維鈞謹奏為恭報約計二麥收成分數事竊查今歲畿北地方二麥頗稱暢茂而畿南各府自入夏以來雨澤稀少收成不無減薄兹據各府道并直隸五州將二麥約收分數陸續呈報前來查順天府屬收成約有十分至六分不等永平府屬收成約有九分至六分不等保定府屬收成約有十分至五六分不等河間府屬收成約有九分至五六分不等正定府屬并直隸五州所屬收成内窪地約有九分至五六分不等高地約有七分至三四分不等順德府屬收成内窪地約有八分至六分不等高地約有六分五分不等廣平府屬收成内窪地約有六分五分不等高地約有五分至三分不等大名府屬收成内窪地約有五六分不等高地約有三四分不等宣化府屬收成約有九分至七分不等所有各屬報到二麥收成約計分數臣謹具摺陳明謹奏所奏麥收分數不實大有損有餘補不足潤色豊年情景雍正三年五月十七日直隸總督臣李維鈞謹奏為遵旨秉公回奏事竊臣䝉皇上發交密摺令臣秉公回奏臣遵將薊州知州李英劣蹟逐一密加細訪雖非盡無因然或屬全虚或屬已甚如李英果係貪劣害民斷不敢因從前曽經保薦有所狥隠今查李英雖於職守不無瑕疵而猶與百姓相安且地當孔道應付差使頗能料理無誤倘䝉聖恩寛容臣當再行嚴飭限以三月奮勵自新觀其後效若仍因循臣即據實指㕘可否如是伏祈皇上批示遵行謹奏此人斷然不可姑留近又聞伊行賄於蕭永藻松阿延銀各一千兩為更換交糧斗斛兵丁甚怨且此事看守陵寢之大人正在游移未定爾若不能得其實蹟朕即降旨提拏發部究審也雍正三年五月二十二日直隸總督臣李維鈞謹奏為奏聞事竊據霸昌道卞之錀昌平州知州梁永佑等呈稱領兵駐防阿爾泰將軍木克登行文知照二十四日起程於二十三日先有伊哈二姓到沙河勒索不遂打搶草束木克登到時仍不約束一任衆兵搶草既搶之後又照正數折價二十五日不宿正站副都統花姓駐宿昌平之舊縣打搶草束折取重價甚於沙河再於二十三日搶草拏獲富倫布等共四人問明搶草是實當有隨營兵部石姓等三人勸放不允隨稟知木克登反云擅拏伊人呌隨營兵部審取管草老人口供勒將口供改為買草被拏要老人李國正甘結而去等情所有木克登領兵經過地方騷擾不堪臣謹具摺密奏伏祈睿鑒謹奏此奏直陳無隱殊屬可嘉紀律不嚴何以主兵巳交部嚴察議奏矣雍正三年六月初一日直隸總督臣李維鈞謹奏為謹抒下情仰祈睿鑒事竊臣與年羮堯向屬交好䝉皇上硃批令臣漸漸逺之臣恪遵諭旨遂與疏逺惟於歲杪趙宏燮繼子由保定赴西安臣順寄一書亦候問常語自今年正月以至於今謹披誠瀆奏伏祈皇上睿鑒謹奏目下之不罪汝者因汝前日之㕘奏也但年羮堯在保之事豈此一㕘之所能盡而汝之所聞所見又豈止此數事而巳不加罪之旨汝雖數次摺奏朕未曽批示一字正看汝將來之續㕘如何令年羮堯痛恨以釋朕杯中蛇影也朕既經屢頒諭旨豈肯食言在汝等自為之耳若不必然以汝輩投畀有北將見朝野肅清矣今將年羮堯之非人口所出之奏摺發來汝看殊為可笑可愧之極雍正三年六月初六日直隸總督臣李維鈞謹奏為續報雨澤事竊臣據各屬陸續呈報除得微雨者不敢繁敘外查五月二十一日龍門縣萬全縣各得雨五寸二十四日遷安縣得雨霑足香河縣得雨五寸餘梁城所得雨五寸薊州得雨三寸東光縣得雨一寸二十六日盧龍縣得雨五寸遵化州豐潤縣各得雨四寸三河縣得雨二寸肥鄉縣永年縣邯鄲縣各得雨一寸二十七日曲陽縣得雨二寸六月初二日東光縣得雨七寸武邑縣内邱縣各得雨三寸隆平縣唐山縣各得雨二寸初二初三兩日南宫縣得雨四寸良鄉縣得雨一寸餘衡水縣得雨霑足寧津縣得雨六寸呉橋縣得雨五寸冀州棗强縣各得雨三寸初四日易州得雨二寸正在繕摺間保定府城於初六日自丑時起至辰時甘霖大沛四野霑足秋禾暢茂農民歡頌除俟别屬報到另行彚奏外所有各屬續報雨澤縁由理合繕摺陳明謹奏此後不必報雨目今大雨時行之際但慮太過耳雍正三年六月二十六日直隸總督臣李維鈞謹奏為敬陳管見仰祈睿鑒事竊查河南漕運每因衛河淺阻到運遲緩以致上厪宸􅇆伏閲邸抄特䝉聖諭令直隸大名府屬之濬縣滑縣内黄縣改隸河南之衛輝彰德二府俾河南運道得專責成法至善也第臣逺稽徃制近按衛河若河南糧艘兑運仍循舊次似屬利便臣謹為我皇上陳之查河南兑糧水次自元明以至本朝俱在直隸大名府元城縣之小灘鎮糧船受兑開行由小灘鎮歷元城之善樂營而入臨清運河河身寛深從無淤沙淺澁之阻其路近易行糧運無悞也自康熙三十五年間豫撫臣李國亮題請改次衛輝相沿至今查在衛輝受兑開行至直屬之濬縣經歴淇河噴沙老鸛嘴石崗石柱險阻又中錯湯隂縣河道皆係流沙聚散不定建壩則無地簽樁堅固難保修閘則水性下刷蓄洩無資毎年漕船行至濬縣内黄縣地方募夫挑挖僱船剝運官民交困糧艘難行二十五六年矣夫河南漕米二十五萬石在直屬採買居多且由衛輝而入濬滑等縣以至山東臨清州路有六百餘里方入運河其間築壩築閘挖淺剝運費盡人力而糧艘不得速行莫若仍復小灘為兑次直扺臨清州路僅二百一十餘里河水深寛無阻其路之難易逺近判然易決若慮小灘非河南所轄民或抗違臨兑次時兩省各委道府一員同駐小灘協恭辦理永著為例則河南無呼應不靈之虞矣臣因漕運重大不敢以隔省岐視曽移商河南撫臣田文鏡未准咨覆臣仰體聖懐敬抒管見是否可採伏祈睿裁謹奏小灘開兑之説先經詳議因有難行不便之處所以中止若將此摺交發豫撫再議諒必仍執前議不移與事無益今既將濬滑内黄等三縣歸併豫省明歲兑漕時自有分曉也雍正三年六月二十七日直隸總督臣李維鈞謹奏為奏覆事竊臣姪李宗渭原非奉旨發徃亦非部内揀發係臣姪自願捐駝効力在陜三年終不議敘題咨今西海業䝉廟謨神算悉己蕩平似無効力之處應否仍遣其赴陜其貪婪之處實有未盡如趙之垣自願進銀三十萬兩發與年羮堯催完僅繳二十萬兩年羮堯代為請豁西安人見趙之垣送年羮堯禮物毎次必用皮箱數十隻不知為何物此時趙之垣雖悔亦無及矣謹奏此事豈難分曉趙之垣如能知悔則轉禍為福矣更有可笑可惡處將來發露自當曉然明白也雍正三年七月初六日直隸總督臣李維鈞謹奏為奏聞事竊永定河南岸第五工鹹厰大堤於本年六月二十五日被水漫開經臣一面奏明一面飛委理事同知噶布喇前徃恊幫堵築在案今又據分司蘇敏呈報六月二十六日大雨傾盆晝夜不止河水較前更漲南岸第一工玉皇廟沙堤坍卸一百餘丈北岸第一工朱家營沙堤坍卸四十餘丈幸未成患南岸第五工黄家灣大堤漫開二十餘丈等情前來臣隨委布政司羅密前徃查明坍卸丈尺確數及有無淹損田禾村舍到日另行摺奏仍委理事同知噶布喇協幫分司同知將兩處漫堤勒限作速堵築堅固具報外所有堤工被水漫開縁由臣謹具摺陳明謹奏水患豈無故而生理應如是乃朕意丙之事也雍正三年七月十三日直隸總督臣李維鈞謹奏為奏聞事竊武清大城東安文安薊州玉田六州縣被水並固安永清二縣因永定河南岸第五工大堤漫開田禾被淹各緣由經臣先後奏明在案今據霸昌道卞之錀呈據霸州知州逯選申報本年六月初六至二十九等日隂雨連綿以致永定琉璃高陽玉帶等河泛漲平地水深七八尺三四尺不等田禾淹没房舍坍塌等情又據河間府屬之任邱縣知縣袁圻申報六月二十九日高陽縣䗫螂口之南冦家墳廢堤漫開任邑地接下流尚書等村莊淹没田禾等情又據通永道高鑛呈據寶坁縣知縣呉祖留申報六月二十五等日大雨滂沱民堤被衝田禾淹没并梁城所亦因隂雨連綿田禾被淹等情各報前來臣隨即分飭布政司委員前徃㑹同該地方官將被水村莊輕重情形細查確實并令加意撫恤其被漫處所飭令該州縣上緊堵築完固外合將被水緣由具摺陳明謹奏從來乖氣致異朕固知畿内今歲必至於如是也天道不爽殊可凛懼同日又奏為奉旨發審人犯事竊薊州民馮兆隆等四百餘人在皇城内保留薊州知州奉旨將為首之馮兆隆等二十五人拏送本省總督或有受人賄囑情弊著總督審明欽此臣遵將解到人犯發布按二司訊取確供詳解去後兹據布政司羅密按察司浦文焯審據各犯僉供㕘革知州李英平日催徴錢糧審理詞訟不曽輕易責打愚民感其小惠一聞㕘革摘印即羣向通永道懇其轉詳保留繼知不能轉達恐來官不及李牧復赴京城籲留誤入皇城干犯法紀實無受人賄囑等情律擬解審前來臣復親加研審各供無異臣查李英居官實多踰閑但平日頗以小惠愚人耳目故鄉民聞其摘印即向通永道籲留實無賄囑情由因通永道不能轉達旋赴京具呈實出一時愚見惟是各犯不安分守業擅入皇城保留不便照律止杖一百應將名列呈首之馮兆隆做呈詞之陳琂挺身遞呈之楊建勲均杖一百折責四十板仍枷號一箇月楊建勲年老收贖其餘劉天榮等二十二名與未拏獲之衆人可否仰邀皇仁槩從寛典分别責儆臣未敢擅便伏候聖裁批示遵行謹奏高鑛既不為之轉詳即應曉諭令各散歸今反指使一起無知愚頑擅入禁城向怡親王訴懇情屬可惡此事罪在高鑛當一併附㕘何可寛貸也雍正三年七月十九日直隸總督臣李維鈞謹奏為奏聞事竊查直屬地方六月以來或被河水漫衍或被山水衝發報災踵至然高阜處尚屬無礙自入七月連旬大雨低窪之地一望無涯北府高地亦多有被淹者南府高阜地多窪下地少雖有淹損不足為憂皆臣奉職無狀上違天和日夜改悔警省焦愁孔廹寢食不寧頭暈心悸計無所出臣已委幹員分徃撫恤其如車馬難行咸阻中途俟稍可舉歩臣即督令星馳前徃協同地方官逐一查明分頭料理其乏食窮民萬難坐視或散銀錢或給米穀先行撫恤若循例查明始行奏請必需月日恐被水之民難免失所非所以仰體皇上愛養元元至意其被水最重地方容查覆到日臣當分行撫恤伏祈睿鑒謹奏乏食災黎曷可令其枵腹一面速為賑恤一面確查明白再行題奏同日又奏為奏聞事竊保定郡城年羮堯房屋係去夏所置其貲財係今年二月四月内從西安運來者臣同布按二司并府㕔縣各官親徃嚴查逐細檢點今查出鎻子甲二十八身密針箭頭四千根盔四箇并銀兩金銀器皿紗縀紬疋玉器磁器銅器字畫什物等項俱加封固又定州房屋内查出什物器皿亦皆封固臣先具摺奏明至細數册容各屬查覆到日一併分晰同田房數目彚造伏祈皇上睿鑒臣思年羮堯家貲鉅富狡兎三窟今檢其物件除現銀五萬一千四百兩外其餘紗縀古董等物約值銀十萬餘兩並無貴重之物可見藏匿他處甚多也謹奏為年羮堯爾將來仍恐不能保全首領也雍正三年七月二十六日直隸總督臣李維鈞謹奏為奏聞事竊查永定河南北兩岸及武清運河等處堤工衝漫各緣由經臣先後奏明在案今又據文安縣知縣楊楠申報七月初七八等日大雨如注將縣屬清河堤工崔家房迤東漫溢三十餘丈左家莊迤西漫溢四十餘丈等情又據霸州知州逯選申報所屬清河堤工七月初七日將趙哥莊以至高橋堤工間斷漫溢二百四十餘丈等情又據東光縣知縣李文淑申報所屬運河穆家口河堤漫溢十七丈有餘等情又據香河縣知縣周世儀申報所屬運河秦家房之堤工漫溢十九丈零二百户堤工漫溢七十餘丈巳經報明欽差監督現在分頭搶護等情各申報前來臣隨即飛飭各該州縣印河各官將漫溢堤工上緊搶護堵築堅固俟詳報到日另為摺奏外所有四州縣申報清運兩河堤岸被漫緣由理合具摺陳明謹奏人事乖戾無形之感也災異譴告有形之應也有無形之感然後致有形之應斯言洵不誣矣雍正三年七月二十九日直隸總督臣李維鈞謹奏為奏聞事竊今年六七兩月雨水過多北府被水州縣如霸州文安東安大城永清固安武清薊州玉田寳坻及裁併之梁城所與任邱等十二州縣所被水情形臣巳先後奏聞續據呈報香河豐潤保定安州新安獻縣青縣景州南皮東光寧津天津慶雲交河滄州鹽山静海肅寧及津軍㕔葦漁課共一十九州縣㕔以上共計三十一州縣㕔所房屋坍塌田禾淹損既難餬口更虞流離䝉皇上軫恤民瘼特諭速行賑濟臣欽遵即飛行賑濟一月計每州縣被水村莊之多寡確查實係貧民按口給食毎日大口給米三合小口給米二合俟此一月賑完查明户口確數臣再題請續賑外再三十一州縣㕔所錢糧伏祈皇上特頒諭旨緩至雍正四年麥收後徴輸則皇仁浩蕩尤永被無疆矣謹奏朕憫惻畿内黎庶被災巳特諭賑恤矣至於題請緩徴乃汝職分中事有成例可循所請倘與例不符自有一定處分朕何所據而特頒緩徴諭旨耶雍正三年八月初四日直隸總督臣李維鈞謹奏為懇乞聖恩慈覆矜全事竊臣查年羮堯貲財具摺奏聞恭奉硃批臣跪讀之下魂魄俱喪情極呼天惟有懇求怙冐伏念臣重以多愆負罪滋甚仰䝉覆載屢賜寛容如年羮堯奸逆狂悖臣民共憤臣始不察交之於前絶之不早既深愧恨幸䝉聖明矜察俾臣知所改悔得以奮志自新嗣將年羮堯罪狀屢㕘實以年羮堯負恩背義禽獸奚擇臣非特與之世結深讐并不欲與之並生聖世何敢少懷怠志上干天罰臣同布按二司摉查年羮堯貲財何敢少存私意況耳目昭然更何能掩飾其私藏軍器盔甲箭頭不臣不法臣雖特疏㕘劾第恐尚有隠匿現在將年羮堯家人魏之輝嚴三等臣同布按二司嚴究貲財下落俟審明有無寄匿另摺奏聞臣無任感愧恐懼之至謹奏朕本心原欲開一面之網保全爾之身命無如爾自執迷朕亦末如之何矣總之年羮堯乃爾之禍媒也朕特許十二人中不意有爾等負恩三人矣殊覺赧顔朕惟愧少識人之明耳夫復何尤硃批諭旨巻十下
