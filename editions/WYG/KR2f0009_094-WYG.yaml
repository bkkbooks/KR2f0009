body:
  text: 欽定四庫全書硃批諭旨巻九十四硃批任國榮奏摺雍正五年七月十一日四川重慶總兵官臣任國榮謹奏恭請皇上聖安竊臣至愚至賤叨䝉天恩畀以總兵鉅任刻骨銘心感難言罄於閏三月二十六日抵重慶隨訪地方風俗淳厚郊野敉寧兵民和協皆感戴皇上教養𢎞慈臣到任後卽點驗所屬黔彭忠州二營兵丁弓箭軟弱鳥鎗生疎且前鎭臣并各營將僃等官向來各以長隨家人頂食名糧臣當卽革退現在親加教導務期衆兵技熟力強始堪效用所有各營員弁業經輪調考過千把内有年老久病弓馬不堪者已欽遵諭旨沙汰及驗看額設盔甲旗幟軍裝等項因屢次出師口外以致多有損缺查去年八月内前提臣周瑛奏准額定戰守空糧六十分爲鎭標公費臣卽將所致誤公亦不致累兵再查各路原設有水塘並無船隻臣巳買快船一十九隻分發水塘兵丁撑駕巡查另造大船三隻以僃委員遊巡之用原設旱設向係鎗手自僃不無苦累今按臣標下三營併黔彭忠州二營共鳥鎗一千二百桿礮二十七位操可否仰邀皇恩俟有開除之缺陸續酌留戰糧八分守糧十二分諭旨命臣留心文武官員優劣臣自京由山陜入川一路留心止聞山西太原府清源縣知縣周人龍人明白操守好陜西漢鳳營㕘將高攀桂錢糧淸楚屬酉陽司土官冉元齡素性貪殘當卽飛檄訓飭現在密查如得劣蹟卽與督臣提臣斟酌糾㕘臣標員弁弓馬稱職者固有生疎者亦有臣現令學習再考又訪得重慶去歳米價止一兩三四錢不等其市斗一斗較倉斗有二斗三升因本年自春入夏楚省絡繹搬運曾賣至三兩今賴聖主福庇雨水調勻田禾豐稔早穀已登米價巳減至一兩七錢將來晚穀一出自然更減嗣後如有應行事宜容臣另摺具奏再臣前曾面奏出巡一事俟七月十五日開操後於八月中旬起程前往合併聲明伏乞睿鑒批示謹奏嗣後再有奏聞須一事一摺以便朕逐件批諭雍正五年十二月十三日四川重慶總兵官臣任國榮謹奏爲奏聞事竊臣看得重郡兵民聚處戸口實繁今見浙楚二省買米差員接踵而至外販又運往下江絡繹不絶人心徬徨紛紛環繞臣署膚愬臣隨與知府張光鏻酌議令下江米販暫停搬運俟浙楚官米買竣仍聽其便當卽咨明督撫在案臣查川省固爲產米之區而重慶郡城則惟賴上江米客陸續販來糶賣始得價平而食足自去冬浙省採買數萬石之後外省米商又源源運往下江以致今年春夏米價頻增每石竟賣至三兩幸秋收至今上米一石價銀二兩三錢中米二兩一錢糙米一兩五錢五分地方兵民恐搬運過多價値仍前騰貴買食維艱情詞廹切臣旣咨明督撫應聽酌奪但臣身在地方目擊情形敢不上達宸聰仰懇聖裁爲此具摺奏聞謹奏米價情形憲徳亦經奏過此全在地方大員相機因時料理固不可遏糴亦不可令販運過多地方皆朕幅員百姓皆朕赤子惟一視同仁公平措置合於中道爲是今川省米價巳至此數極當撙節與撫臣憲徳商酌行之同日又奏爲冒昧陳奏事竊臣昨於遊巡之時查得右營汛地内有塘田一十二處歷年給與塘兵經管除完糧外每歳共收租穀銀五十二兩有零名雖公用實無濟於營伍且臣訪聞此田時値千餘金現今軍裝什物廢缺尚多以臣鄙見莫若將此田招民頂接收價以製軍裝等項庶陋習不致久沿公務亦得早竣於營伍甚有裨益緣官土不敢因循理合奏明可否伏祈門之旁共有空地一十九處租出蓋房每年共收租銀六十餘兩以充修理大小衙舍之費此項伏懇滋弊臣謹具奏伏乞皇上睿鑒施行謹奏覽同日又奏爲敬陳汛地情形仰祈睿鑒事竊臣看得重屬地方遼濶連歸併有二十州縣汛地臣巳遵旨於本年八月十六日起身將各路營汛及水陸各塘躬親逐一勘明十月二十五日囘重所有地理情形併添設事宜敬爲我皇上陳之巴縣乃重郡首邑水陸交衝永川榮昌二縣俱臨上省通衢一路有鎭店行人絡繹其歸併永川之璧山縣與歸併榮昌之大足縣俱在深山寄籍多於土著長壽縣濱臨大江亦通旱路墊江縣在山内與長邑緊接均爲協餉經由要道綦江縣在重慶府東南綦江之上旱路通遵義府屬而至黔省向爲川販出没之區彭水黔江二縣在重慶府東南涪陵江之上水陸皆通山高灘險爲楚民及川販往來捷徑合州在重慶府西北爲涪漢諸水總滙之處且有歸併定遠一縣幅員袤廣落業之楚民又多以上各汛稽察尤宜嚴密但查原設水陸各塘止有兵丁二三名不等誠屬不敷臣隨飭各該營每塘添足五名聯絡巡查庶有裨益其涪忠二州江津酆都二縣原設之水陸各塘兵丁俱足巡察無庸增添南川縣在萬山之中小路通遵義府正安桐梓等州縣亦係川販由黔入蜀之地歷來有汛無塘實爲缺畧臣隨勘明路徑量設三塘撥兵稽查銅梁縣亦在山内原與安居定遠二邑歸併合州均係右營汛地當奉文復設縣治係草蓋經撫臣檄令有司料理槪用磚瓦以爲堅固長久之計其塘汛兵目臣飭令各該營將僃每月遊巡處處加嚴時時加意則匪類自無藏身之所矣又臣前聞外省民人搬家入川者甚多臣親身逐處留心查訪在重屬居停者無幾亦俱面同有司鄉甲取具田主房主併本人甘結暫留傭佃資生在案理合一併奏聞伏乞睿鑒施行謹奏覽雍正七年六月二十七日四川重慶總兵官臣任國榮謹奏恭請皇上聖安竊臣於三月初三日抵裏塘後卽將一切情由具奏在案所有達賴喇嘛於三月十五日坐禪念經起彌月不出臣與副都統臣馬徳臣鼐哥亦常去通候至四月十五日圓滿坐牀進香者實繁有徒臣等進見欵洽尤殷總之自始至今啟齒便云感激皇恩報答不盡具見悃誠且凡差人往藏搬取物件或往爐採買食物俱令喇嘛來告臣知臣仰體與各弁兵亦皆慶幸春生寒谷此皆由我伏懇聖訓以便欽遵庶免隕越爲此繕摺奏聞謹奏覽同日又奏爲遵旨事竊臣前於陛辭時面奉諭旨令臣留心文武官聲名欽此除先將由山陜一路入川以及遊巡之際所訪各員優劣經臣繕摺具奏外臣復不時查訪隨處留心今將察實各員弁恭摺開具職名敬陳廉潔諳練營伍但不識字謹奏俱悉同日又奏爲奏聞事竊臣欽奉上諭駐劄裏塘原以防護達賴喇嘛嗣於本年四月十一日臣准提臣黃廷桂咨商督臣岳鍾琪委臣總統進𠞰瞻對之官兵臣因此事在臣未到之前所有起事緣由漢土官兵數目尚未深知不敢造次隨行據各領兵官逐條開報前來臣復細加查察看得瞻對深處萬山羊腸鳥道界連西海巴裏等處地方設有安撫司一員側冷滾布管理番民久沾王化緣昨年巴裏二塘地界上有被賊番搶刦之各案經督臣岳鍾琪派令護理化林協印務黎雅營遊擊高奮志小河營守僃吳鎭分路統兵查捕該遊擊於六年十二月内由裏塘抵翁布中地界木納中無慿無據以滾布爲盜魁責差瓦述番目往調滾布該遊擊於七年正月初十日軍次瞻對地界占多十五日滾布到營投見該遊擊並不取一供令其出營伺候十六日將滾布傳入使左右倒執鳥鎗劈頭打死其跟隨七人亦同時擊斃遲之數日又去搗其巢穴以致震驚番衆顧命拒敵及被官兵殺敗守死不出此實情也詎該遊擊報爲滾布屢調不出率兵赴營拒敵被擒斬首五子聲言報仇赴營拒敵傷兵等情請兵援𠞰隨奉欽差吏部尚書臣查郎阿督臣岳鍾琪先後派調守僃戴奕熊劉貴進𠞰靈卡石等處之小河營守僃吳鎭駐劄裏塘之疊溪營遊擊常力行各領兵到彼卽經滾布之子差人赴常力行營盤持信投誠復央原供養之長蓋喇嘛至高奮志營内請降又據滾布之母率數百餘人哭赴吳鎭行營投順且遣伊家人切產奔臣行署哀鳴供情慘切并呈驗遊擊高奮志於六年十一月二十九日所給番字牌一紙上鈐化林協印信内譯出你差管家到我跟前來送我禮物我若不收你的羞了你我都收了你同我差官一齊來我還有話吩咐等字樣則是滾布猶知差接猶知送禮猶知遵調親來固不爲抗逆卽按各盜案内亦無滾布所管之人乃旣死於非命而負險傷兵之兇犯巳當被官兵攻殺甚多今伊老母幼子同衆土番又仰畏天威紛紛歸誠恐後情有可矜臣仰體皇上好生之徳一面密商督撫提臣一面宣布天朝威徳將滾布之家人切產等押囘軍前令該將僃查明戸口定明部落造冊取結去後兹據該將僃辦理明白呈齎印信號紙冊結到臣經臣覆核無異及查側冷滾布旣故其安撫司印信例應長子班滾汪札納登承襲另行換給號紙以便管理地方約束番民照例貢馬一體當差再查去歲巴裏二塘所報被刦賞需軍糧塘馬客貨三起除巳經該將僃𠞰撫完結外惟桑昂邦一處因守僃吳鎭調來瞻對故未淸理臣巳令該僃囘兵前去完結剋期可竣現今巴裏二塘地方寧謐無庸大兵久駐邊隅是以臣將陜兵六百名先行撤囘陜省餘俟桑昂邦事定一併撤囘以免糜費所有瞻對歸順各緣由理合具摺奏聞伏乞皇上睿鑒施行謹奏將遊擊高奮志揑報各情由嚴察明確一一據實㕘奏至善後事宜務期布置妥協毋得只圖目前了局草率料理不能使兇番洗心革面致日後復有蠢動則汝領罪不起竭力與督提二臣共秉公忠商酌辦理可也凡如此等事件稍偏善柔將就及渉欺隱斷乎不可愼之特諭雍正七年八月十八日四川重慶總兵官臣任國榮謹奏恭請皇上聖安叩祝萬壽聖節欽惟我皇上功叅覆載徳邁勲華御極以來凡爲天下久安長治計者無一時不上厪宸衷無一事不仰煩睿慮薄海内外凡有血氣者無不均沾教養共深愛戴矣此皆由皇上至誠彌健參贊上天公溥之心睿鑒謹奏覽同日又奏爲奏聞事竊臣查得昨歳巴塘所屬大朔奔义木元根地界被刦軍糧塘馬九月内奉督臣岳鍾琪飭委小河營守僃吳鎭帶領漢土各兵進𠞰靈卡石駕英邦桑昂邦等處賊番除靈卡駕英俱經𠞰滅因該守僃吳鎭調赴瞻營以致未將桑昂邦淸理至六月内瞻對歸誠事竣臣隨令該僃仍同提標守僃劉貴統領兵弁前往淸理去後今據該僃等呈稱職等奉文前進帶兵直抵桑昂邦總滙地名蒼抵所有官兵經過地方沿途番目俱離巢遠迎先後赴營投見預僃各兵柴草甚爲恭順復將各番目白馬奪吉等逐一研訊俱稱桑昂邦是總地名有十四處我們各住一箇地方山深路窄出入不便前䝉岳大人差官進來招撫後並未出來作盜那作盜的是靈卡駕英人都被官兵殺了我們正喜歡忽聽得官兵進來我們狠害怕故出來投誠求饒我們的命照舊當差納賦供情懇切且案查行刦軍糧塘馬並無確據今見官兵深入紛紛離巢歸順似此情形若使乘便誅戮非特衆心不服抑且上違聖主好生之徳隨經守僃等選差外委及通事人等分頭進彼巢穴查造戸口冊併取各結亦一一遵依但彼地方遼濶煙戸零星倘不量其遠近分别管轄則恐漫無約束猶非善後之圖今查十四處内有附近巴塘者卽交巴塘土官管理附近乍了者卽交乍了胡土圖管理附近官角者卽交官角諜巴管理俱照舊額當差納賦取有保結在案除將發囘各番目飭令仍安住牧傳諭衆番永遵法守外合將完結緣由併各項冊結呈齎察核等情到臣又據該番目白馬奪吉等不憚千里之遥赴臣行署哀鳴經臣覆訊供情無異臣卽宣揚皇上徳威明白告誡給賞囘巢各安住牧訖惟是彼中地界紛繁煙戸零星若不乘此嚴定管轄難以善後應如該僃等所議就近分管責成加意稽查約束照舊當差納賦永爲遵守隨預咨督撫提臣酌定所有軍前漢土官兵爲時甚久臣巳先將諜格乍了巴塘土兵悉令囘家以省糜費其餘漢土兵丁併遊擊常力行所領駐防各兵應次第撤囘裏塘酌量留駐囘汛免致稽延除臣一併咨明督撫提臣外爲此繕摺奏聞伏乞睿鑒施行謹奏覽奏知道了凡如此等番夷情事務須徹底料理安頓妥協萬不可苟且將就完結致貽後患誌之同日又奏爲恭謝天恩事竊惟臣本庸愚前以遊擊微員仰䝉皇上天恩超拔洊至總兵及陛辭時又奉旨將臣子任世傑任世英引見發巡捕營當差以千總補用俾臣父子三人一時均沐隆恩實逾常格舉家頂戴靡涯不期臣子世英無福早逝僅有臣長子世傑在營當差行走臣不時寄書教誡今據臣子世傑家信得悉巳於四月内補授巡捕營東南一千總臣曷勝感激涕零隨恭設香案望闕叩頭謝恩外所有微臣銜感私衷理合具摺恭謝天恩伏乞睿鑒謹奏敎誡汝子世傑當朂伊奉公除私任勞任怨莫爲假君子莫做眞小人若於此處能領會一二將來可望成人雍正八年九月初一日四川重慶總兵官臣任國榮謹奏爲奏聞事竊臣前查所屬地方情形業經繕摺奏明臣念各汛緊要不敢怠忽復差幹員分路遍查今查得重慶各州縣士民俱安耕讀各塘汛弁兵亦咸遵法守實力稽查匪類四野敉寧再查各州縣所種田禾原有早晚二種但種早禾者不過十分中之一二得雨雖遲亦有五六分收成其所種晚禾田水霑足處處皆熟且四鄉播種雜糧頗廣甚爲茂盛現今郡城米價上米每石一兩七錢中米一兩六錢下米一兩四錢各州縣城市鄉村總與郡城價値不甚懸殊爲此繕摺奏聞伏乞皇上睿鑒謹奏覽奏俱悉汝之才情併供職處均甚屬平常當更加勉勵若一味潔身是務必致汚巳而後已恐非自益之道凡數次差委皆不副朕望汝之意愼之勉之雍正八年十一月二十五日四川重慶總兵官臣任國榮謹奏爲奏聞事竊臣於本年九月二十七日准提臣黃廷桂咨開内稱烏夷悖叛變起倉卒大肆䲭張現在三省派撥官兵會𠞰查川省先後所派漢土官兵已計四千三百餘員名若無大員就近節制調度殊非所宜是以本提督與撫都院會商移咨貴鎭卽速量帶人役星赴敘府駐劄以便居中節制統聽雲貴督部院調遣事關軍機幸勿延緩等因到臣臣卽於二十八日酌帶弁兵一百餘員名兼程前往於十月初八日抵敘州府隨將提臣先後派遣應援烏鎭三路漢土官弁兵丁催令各照指定路數小心防範兼程前進所有官兵分路進𠞰沿途擊斬賊夷之處臣因辦理伊始不敢遽行瀆奏昨准提臣咨移令臣將一切官兵案件交代川北鎭臣張玉料理等因而鎭臣張玉於十一月二十三日到敘臣巳於二十四日詳細交代訖伏念臣本愚賤疊受天恩卽捐糜頂踵亦不足仰報高厚於萬一兹値用兵正臣效力之時但臣才識短淺自駐敘月餘兢兢業業竭力殫心敬愼辦理實愧毫無報稱惟仰仗天威曁雲貴督臣四川提臣指示周詳俾臣得以遵行無誤今雖交代寢食難安旣准提臣咨會不敢遲違隨於十一月二十五日仍率原帶弁兵囘汛臣惟頂戴聖明整飭營伍保固地方勉盡臣之職守巳耳爲此具摺奏聞伏乞皇上睿鑒謹奏慚愧尚且不知洵屬無用之物硃批諭旨巻九十四
