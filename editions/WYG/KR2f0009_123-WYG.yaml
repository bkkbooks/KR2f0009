body:
  text: 欽定四庫全書硃批諭㫖巻一百二十三硃批張耀祖奏摺雍正二年二月二十六日雲南鶴麗總兵官臣張耀祖謹奏為報明到滇日期並陳出口䇿應事竊臣一介武夫叨䝉皇上洪恩由將弁越次優陞廣東瓊州總兵官巳屬非不勉竭駑駘以效驅馳是以奉命之日思雲南係西藏要口不敢由孔道躭延自廣西由小路趨赴滇省雖沿途鳥道﨑嶇瘴氣頗多幸南省城與督臣髙其倬面商因奉㫖差員䇿應知臣前任熟悉邊情遂著臣出口赴天柱奏今臣已於二月二十六日由省起程所有到滇日期並出口彈壓情由合併奏聞謹奏所奏知道了勉為之雍正三年八月初六日雲南鶴麗總兵官臣張耀祖謹奏為恭請聖安事竊臣仰䝉皇上𢎞恩補授廣東瓊州總兵官叩辭丹陛之日欽承恩㫖准臣到任一二年後一面啓奏一面赴京陛見臣聞命之下欣感無地抵粤未幾旋䝉特㫖調補雲南鶴麗總兵正值西海悖逆滇省現在用兵臣即兼程赴任抵省之日隨㑹商督臣髙其倬帶兵出口䇿應提臣郝玉麟臣自駐劄天柱寨一載有餘仰仗皇上天威番夷畏服逆賊蕩平臣愧無報效之處今臣承准督臣照㑹帶兵暫駐义木多彈壓地方臣自當仰承聖意約束兵丁和輯番衆惟是臣叩覲天顔經今二載瞻戀之私寤寐難安而身在軍營又未敢冐昧陳請陛見犬馬愚衷愈滋輾轉謹繕摺恭請聖安伏乞皇上睿鑒謹奏前諭准爾於到任一二年後來京陛見乃係泛言耳今駐劄塞外彈壓地方豈可徒為無益之往返以曠職守即所奏知道了雍正五年二月十三日雲南鶴麗總兵官臣張耀祖謹奏為奏明事竊臣駐劄义木多欽奉諭㫖撤師回汛所有雲南招撫之地方二十七處前經欽差散秩大臣鄂齊等㑹同四川提臣周瑛奏明交給逹賴喇嘛者木魯巴敦等五處其餘南稱等二十二處地方交給駐劄西寧散秩大臣逹鼐查明辦理欽差自藏往回臣𣲖撥官兵沿途護送至川兵駐防之革達接替回營今臣奉命撤師查得义木多軍前存倉有四川交代之糧米一千三百零九石炒麵二百二十二石大兵盡撤既不便仍畱兵丁看守以費帑餉若運回内地則所費脚價倍多臣令管理錢糧守備王五采盤量封鎻交與义木多胡土克圖並頭人昌諸壩小心看守訖臣由擦哇岡過大雪山闕廷將近四載犬馬戀主之忱無時稍釋俟臣將鎮屬營伍盡心整飭料理後叩乞聖慈允臣入覲以伸下悃所有駐劄帶兵回汛逺近番民向化樂業情形理合繕摺奏聞謹奏勉力職守為要爾係曾經面朕之人程途遥逺何用徒勞往還不必來京雍正六年七月初三日雲南鶴麗總兵官臣張耀祖謹奏恭請皇上聖安朕安念爾年齒老大領兵駐防塞外服勞盡瘁幾歴星霜朕心實為不忍幸䝉上天慈祐所到事竣功成皆由汝一片忠誠所感而然也朕嘉悦之懐筆不能盡同日又奏為陳明進𠞰情形仰祈睿鑒事竊臣一介庸愚知識短淺承督臣鄂爾泰檄委統領滇黔官兵進剿米貼軍機重務惟恐弗克勝任幸賴天威逺播大兵所至夷賊蕩平臣於收服米貼之後細查形勢田地頗廣誠可設縣今賊巳剿滅自是永逺寧帖查呑都地方離米貼一百八十餘里原係川界不法逆夷以地勢險要往往據為巢穴今雖暫駐川兵恐將來撤回兩省官兵未免難通聲息以臣愚見宜於呑都飭令川省添設一營安遊擊一員帶兵五六百名與滇省駐防米貼官兵聲勢連絡控制諸夷甚為有益再查米貼有子一種乃屬良苖自耕而食猓賊恃强向以奴僕役使臣至米貼凡屬猓賊俱剿殺無遺查知子並無助逆情罪隨出示招撫者十六户令其各安住牧以遵督臣除暴安良之示諭又内地漢人有曽為夷賊綁擄久而成家者臣訪聞猓賊傷害官兵時曽有右協兵丁逃竄躱避者漢人給以口糧暗為送出伊等雖住居夷地尚知保護漢人畏懼國法臣將此輩悉行免死交地方官安揷計男婦五十三名口又查叛婦陸氏罪在不赦實因川土司徳昌而起臣訊據陸氏所供幫兵倡逆皆係徳昌主謀實為罪魁若無徳昌惑衆倡亂米夷必不敢傷害官兵因官兵窮追深入川界巳至馬湖府地界恐驚擾良苖兼准永寧協咨移著落遊擊王谷宰守備師翰正土司安永長擒獻自難兔脱至於雷波土司楊明義一切事務俱係伊母沙氏管理江外雷波蝗螂沙罵各土司界連千有餘里直達涼山而噶哈結覺阿照阿路諸夷人親戚勾連不無藏姦納叛昨因楊明義覊畱永寧協行營其屬下部夷擅殺永寧協把渡兵丁遊撃沈國卿許連科合兵搜捕而噶哈結覺夷人竟有阻糧傷兵之舉皆法所難容臣具稟督臣欲興問罪之師必得二萬精兵方可盡行掃蕩因目前江瘴正起兵力難施昨承准督臣照㑹巳據禀密商四川督撫提臣去訖臣又據遊擊許連科沈國卿驗報永寧協派遣叙馬營遊擊鄂世威帶兵會剿噶哈結覺而雷波沙氏悔罪投誠親見永寧協副將禀稱氏所屬部落聞貴協調兵征剿噶哈結覺咸生疑懼懇祈暫緩師期氏情願擒獻屋基母雞及過江賊黨以贖前愆等語臣隨檄行米貼駐劄遊擊康世顯守備馬似龍如川省㑹兵剿賊務協力堵擒策應並行知永寧協酌奪凡擒獲賊犯觧交新設烏䝉鎮臣劉起元一切機宜就近通知外所有米貼情形理合具摺奏聞伏乞皇上睿鑒施行謹奏此番剿平米貼實賴爾等戮力及在事官兵忠誠奮勇之心有以感格上天所以如此不需時日容易收功也實出朕之望外殊屬可嘉之至業經降㫖諭部矣雍正七年正月二十一日雲南鶴麗總兵官臣張耀祖謹奏為恭謝天恩事雍正六年十月十八日臣家人齎捧臣具奏進剿米貼情形一摺欽奉硃批諭㫖並欽賜臣海龍皮㡌一頂團龍􅂁褂二件火鐮包一副寳刀一把克食三箱到臣行營臣隨望闕叩頭恭謝天恩訖伏念蕩平米夷皆仰賴皇上天威下承督臣指示並官兵感䝉國家豢飬深恩奮勇出力所致臣原無寸效兹䝉温綸奬勵御賜隆頒凡頂戴被服以及器用食物莫不邀分外之恩榮臣感激難名益深悚慄惟有勉竭駑駘圖報於生生世世而已為此繕摺奏謝天恩伏乞睿鑒謹奏今用爾為雲南提督矣勉之又勉同日又奏為奏明事雍正六年十二月十二日四川提臣黄廷桂差員到臣行營知㑹令臣同副將哈元生赴拖科㑹議欽奉上諭事理臣於十月十三日遵即起程前往一面於搜緝處所飛調副將哈元生前赴拖科哈元生亦於十四日至營提臣黄廷桂𫝊示硃批諭㫖臣等跪聼之下仰見聖主仁同天地明並日月雖萬里遐荒而兵丁效力情形並夷人悍獷形狀無不洞察無遺臣率領官兵叩謝天恩並㑹同悉心籌畫業經合詞奏聞自䝉睿鑒臣查阿驢賊蠻作逆起事不過拖科覺過拉金阿勒並亨以夸數人助逆亦止阿都之别哺加樂阿必等數人餘皆脅從之黨今拉金阿勒眷屬並亨以夸夫婦及頭人阿驢者呢業已獲觧而别哺加樂阿必並阿必之子亦經川師拏觧至於川界逃匿者惟拖科覺過一人四川提臣黄廷桂總兵臣王剛趙儒嚴督官兵搜擒自難漏網臣查逆夷不法傷我官兵即盡行屠滅亦罪所自取但蚩蚩蠻夷愚蠢無知一人倡首羣起附和又係哈元生輕視所致若概行誅戮非所以仰體皇上如天好生之至徳臣是以將拏獲賊人内訊明實係傷殺官兵而又拒捕之犯不得不於軍營正法以彰國典而儆蠻夷其餘男婦人口悉遵督臣鄂爾㤗示諭俱行招撫安挿莫不歡呼頂祝共戴皇仁臣於剿撫事竣仰體聖主念冬寒而恤士卒節糧運以舒民力之至意撤兵仍回原汛除另疏題報外所有夷地情形並撤師縁由理合繕摺奏聞伏乞皇上睿鑒施行謹奏覽奏知道了據汝看一帶地方兇蠻經此番懲創向後可保相安無事否據實具奏以聞雍正七年五月二十二日雲南提督臣張耀祖謹奏為遵㫖具奏事竊臣於阿驢務都得撤師回汛具奏夷地情形一摺奉有硃批諭㫖仰見聖主洞察夷情兇惡反覆不常必使久安長治邊夷永寧之至意臣查得苖蠻賦質蠢愚住居險逺其敢於作祟者皆因從來未覩兵威故罔知畏懼如米貼呑都一帶素稱頑梗自臣帶兵進剿之後苖人已膽落魂飛振旅言旋督臣鄂爾泰飭令地方文武加意撫輯凡回巢復業者知兵威可畏向後可保無他虞矣又澑筒江外那窩阿驢務都得等處苖蠻素稱獷悍臣帶兵進剿遵照督臣指示殱其渠魁而撫餘黨凡釋放回巢以及招回安業者經此大懲之後亦皆震懾兵威向後可保寧貼再查東䝉鎮臣帶兵現駐烏䝉府汛防碁布控制苖蠻凡滇界一帶地方自皆安静至於附近米貼之雷波附近阿驢之沙罵阿都等處歴來原係川界屬川員管轄雷波一帶自川師蕩平之後一切善後事宜四川提臣黄廷桂自能仰體聖懐悉心籌畫布置得宜而沙罵阿都各頭人據四川提鎮諸臣咸稱恭順效力等語但地廣蠻稠接連涼山一帶甚為遼濶其夷地一切事宜係川省提鎮諸臣辦理向後可保相安無事與否臣未經閲歴不敢妄奏微臣愚昧無知伏思蠻夷所恃者不過山髙箐密彼此勾連官兵勢重則䑕竄狼奔兵力稍單或逞兇猖獗起事則奮不顧身事後未嘗不知悔懼連年官兵所至仰仗天威逺播無不立靖妖氛遐邇苖夷聞風畏懼諒不敢各於汛防要隘處所嚴謹斥堠整肅軍旅庶夷人起釁無由咸懐各保身家之心不敢萌越界刦掠之念而兵端可息矣臣仰荷天恩垂詢據實冐昧陳奏伏乞睿鑒謹奏是雍正七年八月初一日雲南提督臣張耀祖謹奏為恭謝天恩事竊臣齎摺家人回滇䝉聖恩賜臣平安丸藥並内府紗疋到臣隨恭設香案望闕叩頭謝恩祗領外又臣遵㫖回奏夷地情形一摺奉有硃批臣跪讀之下感戴悚惕臣因於康熙二十年間隨提臣桑格蕩平雲南即奉差遣於蠻夷各地方效力行走後於廣羅協守備任内三征廣南兼剿平三江夷地情形躬親閲歴察知蠻夷起釁根由皆因地方文武諸臣不善撫輯以致借端蠢動故臣以宜加意撫輯嚴禁騷擾冐昧入奏今奉温綸奬勵我皇上至聖至明臣何能仰贊萬一惟有同督撫二臣嚴加教誡屬員並盡心整頓營伍務期漢夷永安地方寧謐以稍盡職守耳理合具摺恭謝天恩伏乞皇上睿鑒施行謹奏所論甚属合宜勉之勿怠雍正七年九月二十四日雲南提督臣張耀祖謹奏為犬馬戀主情慇恭懇恩准陛見以伸積悃事竊臣自雍正元年得覲天顔之後仰違闕廷巳經七載前於雍正五年二月内自义木多回汛曽具摺恭請陛見荷䝉硃批勉力職守為要爾係曽經面朕之人程途遥逺何用徒勞往還不必來京臣欽遵諭㫖兼連歲征苖辦理軍務不敢再為瀆請今又巳三載兼受皇恩簡畀重任瞻天請訓之心至䖍至切竊喜督臣鄂爾㤗自黔旋滇軍務告竣地方寧謐保題武職人員皆係督臣真知灼見操練營伍兵馬督臣素有成規臣可以具奏恭懇入覲倘䝉聖恩俯允微臣輕騎就道往回半載即可旋汛不獨犬馬之念獲以稍伸而得聞天語庶地方營伍一切事宜俱有所遵循矣為此繕摺請㫖伏乞皇上睿鑒施行謹奏滇黔新闢苖疆地非一處正資料理彈壓豈汝逺離本任前來陛見之時耶候㫖可也雍正八年四月初三日雲南提督臣張耀祖謹奏為奏聞事竊臣至雲南省城聞得廣東肇慶府屬之恩平開平等縣有姦匪聚衆散布偽劄隨即陸續擒獲又聞得粤西泗城府武舉岑映翰首報李天保等散布偽劄隨與土田州協力拏獲現在嚴審根究查泗城與滇省之廣南府交界李天保等雖經拏獲恐有餘黨逃匿鄰省臣密諭廣南營㕘將轉飭各汛防弁兵嚴加訪拏毋使脱續據該㕘將稟報雍正八年三月十二日據歸朝汛把總報稱前奉廣西右江鎮蔡憲牌查拏受劄之黄玘平蔣先生黄國雄趙大哥羅老四五名選差兵目㑹同土州差目於本月初八日押觧前往右江鎮所有拏獲叛賊縁由理合具報等情臣於雍正八年四月初一日又據廣南營㕘將驗報内稱本年三月三十日奉廣西右江鎮蔡牌文内開仰該㕘將即便㑹同廣南府㑹撥幹役前赴富州守催該土官立將要犯黄玘趙李盤王黄卜昌黄那何斗冲按照住址勒限拏獲徑觧廣西撫都院衙門質審等因奉此卑職即移㑹廣南府又即選差千總飛騎前往富州協同該汛把總㑹同土富州嚴行密拏觧究外理合申報等情據此臣即飛檄該㕘將務將要犯黄玘趙李盤王等嚴拏務獲觧究所有續差弁員往緝要犯縁由理合具摺奏聞謹奏嚴飭上𦂳查緝毋少疎忽方不致有漏脱之虞也雍正八年七月初九日雲南提督臣張耀祖謹奏為奏聞事竊粤西泗城府武舉岑映翰首報李天保等散布偽劄一案臣巳將拏獲姦匪黄玘平等觧交右江鎮並差千總㑹拏要犯黄玘趙等情由具摺奏明兹臣於本年六月二十八日准少保雲貴廣西總督臣鄂爾泰咨開為密行查拏事案照土富州地方有姦匪揑造偽文投至署鎮安府雷通判處該通判提訊供出輾轉付遞之犯呈報到本部院隨經檄飭廣南營㕘將㑹同廣南府多差兵役帶同富州土知州拏觧在案昨巳據該營府禀報拏獲班英農禄二犯觧赴右江鎮轉發收審并黄玘趙一犯亦據報獲今又准廣西撫都院金移㑹審訊黄玘平供出為首之李盤王現住富州煉村即大倫地方并有黨羽兵那阿等合行鈔供密拏為此牌仰該副將文到即便知㑹開化右江二鎮暨思恩協酌撥弁兵至相接土富州之各要隘先行堵截毋致逃脱一面率領廣南㕘將知府傳喚土知州沈肇乾詢明有無同謀知情相機行事其應帶弁兵並廣南土兵俱聼該副將酌𣲖前往大倫地方嚴拏姦匪李盤王兵那阿等務期擒獲訊取確供請示觧審等因除行廣羅協及照行開化右江二鎮思恩協即便酌撥備弁帶領兵丁前往接連土富州各要隘分布堵禦俟廣羅協副將馮鸞等帶兵至大倫地方嚴拏姦匪李盤王等如有潛逃務期盤拏獲報發審如有頑抗即行并力協擒倘玩忽縱漏軍法具在決不少為寛假等因并行廣南府營遵照外相應咨㑹等因准此臣即飛文移行開化右江二鎮思恩協并廣羅協副將暨廣南營㕘將遵照督臣原行事理將姦匪李盤王兵那阿等務必擒獲毋得延緩洩漏致令逃脱有干嚴究去訖理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏巳悉鄂爾泰業經奏聞矣雍正九年正月初三日雲南提督臣張耀祖謹奏為恭謝天恩事雍正八年十二月初七日臣齎摺千總自京回滇到臣行營荷䝉聖恩賜臣摺匣一分共五箇鑰匙五把内廷畱下摺匣一箇鑰匙三把發交臣摺匣四箇鑰匙二把并䝉賜哈密𤓰一圓臣恭設香案望闕叩頭謝恩祗領訖伏念臣愚魯庸材毫無報效謬司軍旅時懐悚惕疊䝉恩賜之厚逈異尋常兹復荷此殊恩自問何以報稱臣惟有殫心竭力矢效犬馬以期仰酬髙厚於萬一耳為此具摺奏謝天恩謹奏朕實愧悔加恩於汝也同日又奏為奏明進剿情形仰祈睿鑒事竊查烏賊悖叛侵犯東川境界督臣鄂爾泰同臣調遣各路官兵進剿臣隨帶領本標兵丁六百名星夜兼程至省起程由東川一路前進業經具疏題報在案臣於九月十七日至尋甸據攝理知州事曲靖府同知崔乃鏞禀稱烏䝉猓賊勾結東川蠻猓肆行猖獗今捉獲姦猓四名意在窺伺攻城人心甚為惶惑臣一面出示安民令將擒獲姦猓梟示人心始定於十九日臣帶兵至功山差人躧探賊情正在四路嘯聚臣飛催所調各處漢土官兵分路前進又㑹商督臣𣲖撥臣標暨各鎮協營官兵由威寧東川兩路進剿仰賴皇上天威逺播督臣指示周詳官兵用命凡懸巖險􅋭賊人負固之處莫不冐矢石而先登密箐深林賊人嘯聚之區亦盡破排柵而直入所向必㨗百可當千猓賊喪膽亡魂獸奔鳥散臣查東川賊首禄良珍原係渠魁而禄良宰祿承爵禄承鼎等悉係逆目其龍潭村之蘇八十乃定計設謀領兵刦殺窮兇極惡之渠魁今據叅將南天章報稱於十二月二十七日擒獲蘇八十因服毒藥隨即斃命二十八日擒獲禄良宰禄良珍等解省聼候督臣審擬又准安籠鎮臣哈元生咨開拏獲禄良珍之妻陸氏并禄良宰之母安氏并據各路將弁擒解東川逆賊家屬人口到營俱經解送督臣訖其現在禁守行營及交地方官監禁審訊賊犯人等亦俱續行起觧外所有臣自功山以至東川據各將弁觧到原屬叛逆又拒敵官兵之逆賊即於行營斬首以伸國法以儆蠻猓兹東川之元兇巳獲地方蕩平人民復業惟有逃竄逆黨數人臣同楚姚總兵官臣官禄正在嚴督官兵竭力搜緝釡底遊魂自難漏網所有各路官兵奮勇殺賊備細原委並擒獲逆夷姓名數目臣另摺奏聞外為此謹奏尚復何顔繕具此摺奏朕是所謂掬盡湘江難洗汝愧殊屬無耻之至硃批諭㫖巻一百二十三
