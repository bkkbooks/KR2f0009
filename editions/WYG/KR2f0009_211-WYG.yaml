body:
  text: 欽定四庫全書硃批諭旨卷二百十一上硃批程元章奏摺福建學政臣程元章謹奏爲恭謝天恩事竊臣中州菲材僃員史館蒙皇上特簡臣提督福建學政跪聆聖訓時切悚惶乃到任甫及年餘即蒙特恩超陞臣翰林院侍講旋陞侍讀旬月之間疊膺寵擢聞命自天感激無地夙夜捫心惟懼素餐又蒙特恩賞給臣每年養廉銀三千兩臣何人斯屢受格外隆施是臣一飲一食俱荷皇上生成之恩撫躬省慮感愧交幷惟有竭盡犬馬心力以圖仰報髙厚於萬一耳爲此繕摺奏謝天恩謹奏覽奏知道了訓飭士子毋辭任怨切戒徇私廢公善柔沽譽勉之福建學政臣程元章謹奏爲遵旨保舉事竊臣兩次跪讀上諭令内外臣工各舉所知仰見我皇上以至誠信任臣子而欲其所舉皆實務使野無留良此曠古未有之盛典臣敢不警惕愼重細思臣之鄉里戚族中有爲人謹愿而才實不足有爲者有文學可觀而不敢信其有守者惟有臣親堂弟廩生程慶章年四十歲居家孝友端方操守堅定臣所素知隨臣在閩看文兩年晝夜苦心幫臣剔除内外積弊其才尚可任事近因臣祖年老於四月間回家省視且苦志讀書欲赴明年鄉試伏乞聖恩許臣於三年考試事竣復命之日帶領叩見天顔可否堪任仰候聖鑒爲此謹奏已有旨諭部矣福建學政臣程元章謹奏爲凜遵聖諭叩謝天恩繕摺恭繳事竊臣於按考福寧州科試畢回省督臣髙其倬差官齎捧皇上御批臣謝恩奏摺到臣隨恭設香案跪接叩頭捧至靜室跪讀字字銘刻於心不敢怠忽於九月出巡按考興泉漳等府科試於十二月初抵漳州處處嚴訓不少寛貸敬奉聖諭以行臣查泉漳等府士風之澆無過好鬭好訟抗糧三件須力懲此三者以挽頺風臣歲試放告所收投告生監詞狀至數百張所准批發府縣官審實應責應革俱按法懲治科試所收詞狀不過數負職守惟有益加奮勉毋敢徇私毋敢沽譽竭盡犬馬心力以仰報聖恩髙厚於萬一耳所有奉到硃批奏摺理合恭繳謹奏立志甚好竭力勉爲之朕又簡命觀風整俗使來閩協助汝等化導士庶果能挽回積惡俾風移俗易汝等造福於地方寧有涯量耶福建學政臣程元章謹奏爲凜遵聖諭恭謝天恩繕摺奏繳事竊臣於本年四月在建寧府科考督臣髙其倬差人齎捧皇上御批臣奏摺到臣隨恭設香案叩頭跪接捧至靜室跪讀仰見我皇上用中建極事事以公正持平之道開廸臣子洵非臣庸淺之識所能見及萬一臣字字銘刻於心愈加小心敬愼斟酌辦理斷不敢以深受恩寵而遂稍有任情率意之舉也臣身膺提學必使風俗醇厚士習端方乃爲盡職拔取文章特其一端耳兹蒙皇上欽差觀風整俗使來閩處處宣揚聖諭是皇仁普被既蠲賦截漕以資其贍養又匡直輔翼以發其天良從此士習民風未有不歸涵濡甄陶而蒸蒸向化者臣於十月後差滿候新舊交代尚需半年現在司理學政一日務竭一日之心不敢以觀風整俗使到而作局外旁觀推諉辭勞有負我皇上髙厚隆恩也所有領到硃批訓旨理合恭繳謹奏朕今命爾署理浙江藩司事務當竭力洗滌向來科甲習氣將一切因循黨庇營私而不急公求名而不務實等疵屏除淨盡一意效法李衞之居心行事可也汝到浙與李衞共事後方知逈非高其倬督撫輩心行之可比者勉之福建學政臣程元章謹奏爲恭謝天恩敬陳愚悃事竊臣保舉親堂弟程慶章因其人尚可策勵奮勉是以奏請於臣復命之日帶領叩見天顔乃即蒙我皇上有旨諭部臣與臣弟何人竟承天語煌煌榮及蓬蓽雖其可否堪任尚候聖鑒而臣聞命之下感激悚惶愈深驚懼臣謹望闕叩頭恭謝天恩至臣冬月差滿之日理應星馳復命但念臣祖年九十歲臣父年六十四歲前蒙特恩寛假由河南省親後赴任今再叩懇天恩賞假俾臣祖孫父子相聚數日則臣祖與臣父均戴皇仁於生生世世矣謹奏汝抵浙後看地方事體光景與李衞商酌再行具奏請假汝祖雖年逾耄耋若身猶強健迎至任所朝夕團聚不亦美乎署理浙江布政使臣程元章謹奏爲恭謝天恩事竊臣中州庸才蒙皇上特恩著臣提督福建學政三年之間㳙埃未報乃蒙皇恩疊沛以編修超陞至詹事府少詹事寵榮逾分儆惕靡寧兹又蒙特恩命臣署理浙藩印務聞命之下愈加儆惕臣思布政使乃一省總滙衙門政務殷繁錢糧重大而臣又庸碌無能一切地方事宜全未經理即矢竭犬馬心力不能無才小任大之懼伏乞皇上睿鑒於臣負荷不勝之時恩召來京俾臣日聞聖訓黽勉學習則臣之有生皆沐我皇上生成栽培於無既矣爲此繕摺恭謝天恩謹奏事屬一體奚慮大小理無二致何分難易如能洗滌向時因循黨庇潔身而不奉公沽譽而不體國之陋習忠勤職守懋勉實政何有不勝任之慮李衞非比高其倬一流不肯爲國家致身之督臣也當以爲楷模而效法之事事領教請益伊自然推誠相告和衷協謀可無失誤之虞也勉爲之倘或仍執科甲鄙見不肯實心改革豈特李衞不能有益於汝朕亦無如汝何矣署理浙江布政使臣程元章謹奏爲奏聞事竊臣奉旨署理浙藩星馳就道自入浙境目睹早稻盈疇處處成熟雨水調勻太平景象臣喜不自勝隨於本年八月初三日到任陸續據各屬申報早稻收成分數前來雖有十分九分以及八分七分六分不等合之通省分數要皆大有之年再查今歲八月大潮之汛已過各處沿塘堤壩俱保無虞止有海寧縣草塘坍矬數處㑹稽縣海塘衝壞一處現在飭令搶修堅固其餘俱慶安瀾居民亦皆樂業臣謹繕摺奏聞伏乞皇上睿鑒謹奏據奏早稻成熟堤壩俱保無虞朕懷深慰署理浙江布政使臣程元章謹奏爲跪讀御筆訓旨繕摺奏繳敬陳愚悃恭謝天恩事竊臣於八月初三日到浙江布政司任跪接皇上御批奏摺到臣欽承訓諭命臣竭力屏除科甲向來因循黨庇求名而不務實之陋習跪讀之下感激悚惶益加奮勉臣前在福建學政任内矢公矢愼力除此弊無論其居家之翰林進士舉人不容干求即現在福建由科甲而居顯位者臣亦不敢徇私廢公一毫瞻顧即如臣由閩赴浙之前一日鹽驛道孫國璽來告臣云現有你的上司署浙江巡撫蔡仕􅘎聞你做屬官差人連夜趕來有書子說他兒子蔡登魁不應考試可混附入拔取錄科之中你意如何臣聞之心中不服即回云三年來不容人之干求豈可因做他的屬官即順情的道理斷然不依孫國璽亦云你此時不順從的極是如順從即爲受挾徇私矣只是他家人可惡出言不遜說此時比不得做學院既做我們的屬官還敢作怪麽我聞此言未免著惱將他家人叱呵幾句將書子擲還他去了等語臣於此時亦毅然拒之無所瞻徇畏懼臣於八月初三日到任初六日署撫入闈至十三日署撫忽傳杭守入闈吩咐如今外簾新例用的是幾箇府州縣佐貳官辦事遲鈍可傳諭布政司速選幾箇科甲人入闈辦事臣驚駭云士子考過兩場如何另選得外簾官違科場條例即是違旨這斷行不得至下午杭守又來說蔡大人之意定要如此臣又回云大人要行我當以科場條例具詳斷不敢委曲順從似此等違例壞法之事無論其當如何修築或云補漕倉穀當乘此豐年及時購到任數日支放提標閏月米折銀兩即有書役邵瀚與營弁通同索取陋規每石四分於提督處發任即催辦乍浦水師滿營糧餉適署督臣性桂閱視海塘署撫臣蔡仕􅘎入闈所有撥定糧餉必俟督撫批詳到日始辦恐趕不及臣即一面具詳一在酌量緩急情形有不可拘泥之處耳再臣前摺奏請皇上賞假省親者原爲今冬明春復命之日便道而言也今䝉天恩授臣以藩司重任一切庫帑及地方事宜正需料奏并繳御筆訓旨三摺叩謝天恩謹奏所奏朕甚嘉之堅持此志毋稍遷移可也署理浙江布政使臣程元章謹奏爲跪讀聖訓感激銘心繕摺恭繳再陳愚悃事竊臣於十月十八日跪接皇上御批奏摺到臣隨捧至靜室跪讀荷䝉聖恩優賞訓勉臣感愧交集倍深悚惶伏念臣識淺才庸䝉皇上授以重任刻刻儆愓不敢不竭盡心力凡屬當行御批謹奏但循理而不尚氣方稱大丈夫之行爲聖人貴和而不流太上不敢爲天下先能於此處得力何往而不利貞也署理浙江布政使臣程元章謹奏爲密陳事竊臣到任之初即料理水師滿營赴乍浦先催運糧餉次作四次委官䕶送其家口臣密問䕶送之官及平湖知縣水師營踴躍如何皆云糧餉不敷其用不免窮愁之狀臣查此水師八百名有在杭之未汰兵三百七十四名原食甲糧每月領米二石五斗餉銀二兩馬乾銀三兩原可贍養八口十口之家一入水師即去其馬乾三兩爲數巳減尚可支持而又報故一名即汰去一名不能常得此數其新抜之四百二十六名每月只領銀一兩五錢米三斗實在不敷其用即就現在相形而論同一水師同一操練新拔者與未汰者食餉相去懸遠亦未爲均平近䝉我皇上仁恩疊沛格外賞給生息銀數萬兩滿漢各營俱歡欣踴躍感激無地獨此水師滿營日用艱難未免有殷殷待澤之想臣看海疆重地設立水師所以捍外而衛内倘其内顧心憂恐非所以鼓勵軍心也臣因密語於督臣李衛亦與臣見相符爲此謹陳愚見此滿營水師不必加糧而可加賞欲議加賞宜先定罰或每月大操一次其勤習熟練者賞銀米若干其懶惰生疎者除不賞給外尚當懲戒如此則恩與威並用而賞罰予奪之大權總由我皇上主之而勤者感激愈奮即惰者亦鼓舞爭先矣臣職司出納非不知國帑爲重敢於糜費錢糧緣目睹艱難情形不敢不據實奏聞伏乞聖鑒謹奏所奏可嘉自另有諭旨至於以賞罰勸懲而寓養兵之論殊有未協若不限以一定之數如何久遠循行此見頗屬迂疎署理浙江布政使臣程元章謹奏爲奏明晚禾豐收米穀價平海塘安瀾地方寧謐事竊照浙省今值萬寶告成所有晚禾收成分數據各屬稟報前來自十分九分八分以及七分六分不等米價自七八九錢一兩至一兩一錢不等再查浙省錢糧素稱難追自我皇上沛從古未有之鴻恩既減嘉湖浮糧永著爲例今歲又蠲免十分之二額賦六十萬兩士民頂戴皇恩慕義向風輸將恐後時維九月而全完者則有嘉興府屬之嘉興秀水平湖石門桐鄉嘉善海鹽七縣杭州府屬之富陽縣嚴州府屬之壽昌縣寧波府屬之定海縣解司地丁悉報全完現在本年錢糧通省未完者不過四十餘萬明嵗奏銷似可通完此實浙省從來難得之事而獨見於今日者也再浙江海塘於九月初二初三兩日風潮大作報到海寧縣草塘石塘坍卸數百丈臣即親赴海寧一路閱看隨將看過潮險情形及搶築工程回至省城據實申報署督撫多委人員修築臣觀浙江潮勢全歸海寧其西南紹興所屬地方近有漲出田畝現在勘丈報墾所以潮勢側注直逼海寧也查從前塘外尚有數里漲沙䕶塘至今年六七月大潮將沙土刷洗無存潮汛每日早晚去來四次衝刷塘根實甚危險其草塘之坍卸則有曹殿壩陳文港數處東石塘之坍卸則有華嶽廟念里亭數處幸而有督臣李衛預撥鹽務銀一萬兩委道員王斂福督同在工人員搶修杜築方保無虞而其衝刷之勢則未全寧息也臣看閱塘工後將題撥秋汛銀兩詳明署督撫發銀二萬兩督臣李衛回任後親驗情形又發銀一萬兩辦料興工乘冬月潮退修築以防春汛大潮理合恭摺奏聞謹奏搶修草塘等處坍卸幸保無虞深慰朕念但海塘乃浙省第一要務當竭力協助督臣敬愼爲之時刻不容疎忽者浙江布政使臣程元章謹奏爲恭謝天恩事竊臣於本年正月接奉督臣李衛轉行部文到臣䝉聖恩實授臣浙江布政使臣隨恭設香案望闕叩頭謝恩除詳請督臣代題叩謝天恩外臣才識淺陋伏讀御筆訓旨以循理而不尚氣敎臣仰維聖言中正和平該括天地古今經常不易之理臣日夜恭繹刻刻銘心臣嘗見賦氣餒者不入於推諉廢事即流爲俯仰從人而賦氣壯者不入於偏執自用即流爲慷慨爭先夫推諉廢事其心固不堪自問而慷慨爭先其道亦未爲全是總之立一念行一事實是爲國可以上告君父不但督撫可擔即藩司亦可擔也如實非爲國不敢以上告君父不但藩司不敢擔即督撫又豈敢擔乎此中只爭公私之界是理與非理之間而一切矜才恃氣總無所用之臣惟夙夜省惕悉心體㑹聖諭理氣二字凛遵以行斷不敢頃刻有違也謹繕摺恭繳聖諭叩謝天恩謹奏所立之志及所見處俱是矣惟當加勉實行浙江布政使臣程元章謹奏爲據實僃陳海塘情形事竊海塘爲浙江第一要政臣曾兩次具摺奏聞䝉聖諭諄切臣時刻警心不敢疎忽上年十二月㡳及今年正二兩月報草塘坍矬六十餘丈臣即親往逐段細加勘驗査西塘自華家衖至浦兒兜長二千餘丈俱爲草塘草塘者用柴加土築成堤岸潮平可以無虞潮險不時坍矬隨坍隨築恐不可恃所以督臣李衛奏請於草塘内再築石塘一道以僃潮汐現在勘丈估修過草塘之東爲五百丈大石塘此大學士朱軾爲浙江巡撫時所修也其塘底用梅花樁上用大石版層層合縫工程堅固並無坍卸過大石塘之東經海寧縣至尖山七十餘里俱爲塊石塘塊石塘者用大小石塊參差錯雜堆砌成墻原不過一二尺内用土築不用灰不合縫料物原儉而工程亦不堅固外用坦水二三四層不等坦水如階級式外用樁排内塡石塊以緩潮之勢保䕶塘根法非不善但前年有漲沙數里潮不爲患及至沙洗無存而坦水塘身多至坍卸有報坍數丈數十丈者現在就其坍塌段落改築條石塘下寛八尺頂寛五尺庶乎可以禦潮矣但臣細看舊日塊石塘工俱屬鬆薄不堅此修彼坍實無一段可以站立者今欲將數十里盡行拆修不惟浩費不貲難以動工且潮刷塘根亦不敢俱行拆毁興修也臣即將勘驗情形與李衛再四啇量現在有陳世侃所捐之四十萬兩以爲僃工辦料之需坍卸一段改築條石一段其未坍之處俱飭工員加土培濶即塊石坍卸而尚有堅土捍禦可以搶築目下督理塘工杭嘉湖道王斂福人頗耐勞修理亦勤工員同知吳𢎞增李煚李飛鯤三人分段趕築無敢諉卸其所修工程亦屬著力將來可以無虞理合據實奏聞謹奏敬愼料理毋致少有疎虞浙江布政使今陞安徽巡撫臣程元章謹奏爲恭謝天恩瀝陳下悃叩請陛見跪聆聖訓事雍正八年五月二十四日臣接到督臣李衛准吏部咨奉上諭安徽巡撫魏廷珍著調補湖北巡撫安徽巡撫員缺著浙江布政使程元章補授魏廷珍程元章俱著即赴新任若有奏請訓旨之處具摺陳奏欽此轉行到臣臣隨恭設香案望闕叩頭謝恩訖竊臣中州菲材叨列史館不數年間荷蒙聖恩超擢陞授安徽巡撫聞命之下感深五内悚惶莫措伏思巡撫乃封疆重寄通省事件無一非其職任以臣庸愚豈能動合機宜仰懇我皇上允臣陛見俾臣得一一跪聆聖訓不但微臣戀主誠悃得以稍慰而祗奉訓諭辦理庶可不致貽誤封疆爲此繕摺恭謝天恩叩請陛見謹奏目下不必來京往赴新任聽候諭旨安徽巡撫臣程元章謹奏爲謹將經歴地方情形據實陳奏事竊臣於上江一帶地方多未經歴且廬鳳二府現報水災臣思由大江揚帆赴任則地方情形並無見聞臣隨渡江由陸路赴任所有臣經歴地方情形一一爲我皇上陳之一臣自江浦縣至安慶府將及千里經過滁州定遠合肥舒城桐城等州縣雨水調勻禾稻茂盛米價亦平民俱安樂惟鳳陽府屬之臨淮懷逺并泗州數處貼近淮河一遇水漲常多被災報到日臣即於途中委員星飛確勘撫恤另疏題逹一臣看廬鳳二府田多荒蕪細察所由其地習俗多靠婦人耕種男子遊蕩以致可耕之田無不抛荒地方官多置不問臣即面飭府州縣諄告以省耕勸墾之道倘申飭過一年之後田不勸墾民俗游惰惟該地方官是問一江北一帶乃江西廣東等省驛路通衢京餉不時過往竟有二三十里無一營汛者甚屬可虞臣即面飭州縣寛以三月限期令確查一路險要荒僻營汛疎濶之處詳明酌量添設已設營汛之處俱行修葺完好如再廢弛定即嚴㕘一臣到任伊始地方官賢否未能周知其大槩光景推諉廢弛者居多俟臣訪查確實秉公舉劾不敢絲毫瞻狥有負我皇上簡畀重任之至意一各州縣倉穀現在委員査盤藩庫錢糧速催署司劉柟查盤出結後臣即親赴江寧查盤清楚具題一刑名案件闗係尤重安徽臬司一缺於臣到蘇州接印時署督臣史貽直云已題委江安糧道劉永璜署理矣臣雖未與劉永璜共事而史貽直既經題委自必實有所見臣看其辦理刑名何如再爲據實陳奏一安慶府城枕臨大江上接湖廣江西下通江寧等處省城相去俱有數百餘里盗賊出没其間撫標城守水陸各營最闗緊要從前撫臣每不親加操閱以致營伍廢弛臣蒙皇上特恩授以封疆重任何敢仍蹈前轍不加整頓現在嚴飭將弁按期操演臣再不時親閱以示鼓勵以上數條臣識淺才庸膺兹重任蚊負難勝伏乞聖恩詳加訓誨俾臣得夙夜凜遵以期仰報高厚於萬一謹奏覽所奏各條俱悉竭力勉爲之毋辜負朕之委任安徽巡撫臣程元章謹奏爲詳陳地方情形事宜仰懇聖訓事竊臣於到任後即將臣所經歴見聞略陳梗概至今二十餘日以來臣趕辦未接任時壅滯一切刑名錢榖案件仍詳加訪詢闗係地方緊要事宜有廢弛日久不得不整頓者數條爲我皇上陳之一沿江要地營署營房煙墩塘船等項亟宜修葺也一廬州府城内河道亟宜開濬也一城垣坍塌所宜亟修也臣查江塘巡船所費不過十兩之内塘汛營房墩臺望樓等項所費無多仍責成地方官修理至城垣河道工程以及水旱偏災急需非府縣官所能捐辦而正帑錢糧亦不可輕動臣聞各府州縣尚有未全報出之鹽啇規禮銀兩俟臣查出若干奏爲辦公之用再署藩司噶爾泰曾統報藩庫盈餘銀五萬餘兩撫臣衙門並無册案可查俟臣查盤藩庫後逐款詳悉奏明仰懇皇上睿裁賞給辦公則緩急有賴而地方事宜可以漸次整頓矣謹奏此奏高其倬帶往江南與程元章㑹啇辦理安徽巡撫臣程元章謹奏爲敬陳愚悃恭請聖訓事竊臣查山東被水饑民蒙聖恩蠲免錢糧發帑賑恤固己共慶生成不致失所矣而其素無産業佃田傭工不能自立之人亦有一遇荒歉未待賑濟即扶老攜幼匍匐鄰境就食者查上江地方外來饑民雖不甚多而其情形亦甚堪憫現在署督臣史貽直與署藩司劉柟將奏留署司噶爾泰養廉銀三千餘兩助給盤費遞送回籍是亦毋使流離失所之意臣思此等饑民既跋渉一二千里來至上江目下米價甚平壯者或佃田傭工覓食亦易其老幼廢疾不能謀食者臣查上江原有捐積之米每畝二合存貯各州縣以爲僃賑之需臣移㑹督臣酌量動支按名日給三合可以不至饑餓度此寒冬俟明年春和再設法勸諭資助回籍庶爲安全再遏糴一事最爲各府州縣之通弊其意以爲鄰境搬運恐豐收者或至不足職守地方不得不然殊不知無分此疆彼界均是聖朝赤子運此地之有餘以補彼地之不足憂樂相闗豐歉與共庶幾仰副我皇上四海一家萬物一體之至意况豐歉原無定所目前鄰境籍資於此地安保此地不藉資於鄰境豈可拘守一偏之見致使災患竟不相恤江蘇所屬被災地方鄰近安徽者不能不資安徽安徽山東得以相資而民食不至艱難矣爲此謬陳管見伏乞聖訓謹奏已有諭旨矣安徽巡撫臣程元章謹奏爲據實陳奏事竊臣到任數月以來訪確聲名狼籍不堪之太湖縣李佳士六安州李懋仁斷難姑容巳經臣具題劾㕘其勤愼供職試俸已滿者臣已經會疏保題其才不勝州縣之任者俟臣酌量題請改用敎職其餘州縣若非貪劣昭著尚可勉勵者仍不時嚴飭以觀後效署按察司糧道劉永璜勤愼供職頗不瞻徇所屬知府七員安慶府知府徐士林操守好人明白太平府知府李暲謹愼勤敏池州府知府李士傑操守好人謹飭餘則俱平常供職倘有查出瞻徇情弊斷不姑容以貽誤地方有負皇上任用之至意也謹奏察吏爲督撫第一要務能如是留心甚好安徽巡撫臣程元章謹奏爲陳奏事竊臣才庸識淺辦理地方事務懼不勝任謹僃細陳奏伏乞睿鑒一安慶所屬勘明夏被水災有宣城旌德懷遠銅陵建平五縣勘明秋被水災有寧國無爲壽州鳳陽臨淮懷逺虹縣泗州五河潁上十州縣鳳陽長淮二衛俱巳核明饑口造册放賑外獨鳳陽之靈璧縣被災實有七分而知府葉旉知縣吳之綱暨委勘之試用䝉城縣知縣魏允中通同隠匿捏結報不成災續據委員鳳陽道何宗韓等勘明諱災匿報是實雖經臣立即題㕘飛飭撥榖補賑而失察之咎臣實難辭也一鳳陽府知府葉旉係忠節之後臣上年赴任過鳳陽府屬地方面加勸勉冀其努力自愛無負聖恩乃觀其人辦理地方事情俱浮而不實詢以屬官一捧讀聖諭查賑咨送外來饑民臣與督臣咨啇畫一大口每日給盤費銀五分小口三分一面查明造册賑恤一面咨㑹鄰省彼此接送給與盤費收留安插至饑民中有百工匠作素無田產專靠手藝營生者如一例送回本籍荒年既無雇覓工作其人又無田土可耕必致束手無策臣與督臣咨啇於此等一上江所屬州縣積玩巳久如墩臺營汛等項坍卸者甚多臣到任委員查看限以三月之内修理完固今春委員查驗而修完者尚不及半臣復與一臣前奏請將藩司盈餘銀兩酌存辦公督臣高其倬到任後臣又啇議此款銀兩藩司巳造入正項册内部文撥解京餉無庸議留至臣所奏各屬尚有未經報出之鹽規禮飭令報出存爲公用各屬陸續報有數千兩尚未報齊督臣又云鹽臣伊拉齊亦查此項未便查奏臣思鹽臣與督臣撫臣一安慶撫標城守三營弁兵宜按期操練以肅軍紀臣於二月操期又親看大操一次較上年冬間奏逐條批諭矣安徽巡撫臣程元章謹奏爲棍徒糾黨假公濟私沿門嚇詐大干法紀事竊臣據署布政使劉柟詳稱據潁州詳霍邱縣有一夥無賴光棍糾合多人將各保凡有田之家開列長單以首告欺隠爲名沿門嚇詐肯助盤費者即去其名無論有欺隱無欺隱俱要詐財若不依從定要列姓名詞狀拉到江寧安慶拖累到二三年一單動開數十百家沿門恐嚇民心惶惶莫可言狀等語又據潁州詳與司詳無異臣正在察訪間於八月十六日放告果有霍邱縣棍徒蔣正陳班姚文重方子亮朱恆等控首多人當據霍邱縣被害民人陸從禮等十餘人當堂訴質嚇詐財物有據隨發署按察使劉永璜審問據該司訊供詳報據蔣正等供同夥八九人陳天爵爲首嚇詐得數十家米稻銀錢是實俱各供認不諱等因前來除將供認得財之陳班等五人幷其夥黨批司轉飭該州縣訊明追贓究擬外其田之有無欺隱臣現在諄切出示令民據實自首與其隱匿不報徒飽光棍之慾壑何如遵旨一一首明安然爲盛世之良民隨檄行該州縣勸導去後臣再有請者嚇詐財物罪在不宥而欺隱田糧亦法所難寛臣思該州縣除首報欺隱外尚有隱田亦未可知臣懇皇上天恩再寛以半年之限令其自首陞科如限内不肯首報或經查出或經保甲告發令該地方官親行按册抽丈多則計畝論罪小民諒亦無敢隱匿矣事關清查田畝臣不敢悠忽從事亦不敢孟浪輕舉伏乞聖訓指誨俾臣得以祗奉辦理謹奏照所請准予寛限該部知道安徽巡撫臣程元章謹奏爲謹陳詳委屬員仰懇聖訓事竊臣查府州縣缺出向例皆由藩司詳請委署此雖往例而於安慶行之實有未便安慶去江寧布政使衙門七百餘里詳文往來一次每至半月有餘倘所詳未協再駁另詳或批定之後該委員别有事故又復遴員詳委往還稽遲每懸缺至三四月之久以致地方諸務每多廢弛臣請嗣後凡督臣主稿出缺之處即就近令藩司具詳委署仍移咨撫臣衙門飭知臬司存案凡撫臣主稿出缺之處即就近令臬司具詳委署仍移咨督臣衙門亦飭知藩司存案如此則員缺不致久懸而地方諸事均免貽誤矣爲此敬陳管見伏乞皇上聖訓俾臣得祗奉辦理謹奏該部議奏安徽巡撫臣程元章謹奏爲恭報雨水米價二麥長茂情形事竊臣查正二月雨水調勻二麥長茂三月以後雨水較多二麥尚不至受傷安慶府屬米價每石八錢八分九錢一兩一兩三分一兩一錢不等徽州府屬中米價每石一兩四錢五分一兩五錢一兩一兩二錢五分一兩二錢一兩四錢不等上米貴者一兩六錢五分寧國府屬中米價每石一兩二錢一兩二錢五分一兩三錢五分一兩四錢一兩五分不等上米貴者每石一兩四錢五分池州府屬中米價每石一兩一錢二分一兩五分一兩二錢五分一兩一錢不等上米貴者每石一兩三錢五分太平府屬中米價每石一兩五分一兩四分九錢五分不等上米貴者每石一兩一錢廬州府屬中米價每石一兩六分一兩五分一兩二分一兩一錢一兩二錢五分不等上米貴者每石一兩三錢鳳陽府屬中米價每石一兩一錢五分七錢八分一兩四錢九錢五分一兩三錢一兩七錢八分不等滁州屬中米價每石一兩一錢一兩五分一兩不等上米貴者每石一兩二錢和州屬中米價每石一兩一錢五分上米一兩二錢五分廣德州屬中米價每石九錢一兩五分不等上米貴者每石一兩一錢六安州屬中米價每石八錢五分一兩一兩四錢五分不等上米貴者每石一兩五錢泗州屬中米價每石一兩五錢五分一兩二錢一兩三錢二分不等上米貴者每石一兩六錢潁州屬中米價每石一兩一錢二分一兩一錢五分九錢五分不等上米貴者每石一兩二錢六分亳州屬中米價每石一兩二錢一兩四錢五分一兩四錢七分不等謹奏覽所開米糧價値甚屬繁而不明安徽巡撫臣程元章謹奏爲密陳事本年二月二十日准湖南撫臣趙𢎞恩密咨到臣查曾靜所供姦人王澍根底家屬産業及王澍舊日同窓原任耒陽縣知縣張應星家屬現住徽州府先即摘喚確訊王澍家屬下落并其與王澍同窓交好之處移到王澍圖形一紙鈔供册一本臣當即選差把總李竒前往徽州地方愼密緝訪三月十二日據李竒密禀訪得張應星家屬向住徽州府城内張應星已故伊子張秀公遷移在休寧縣三十一都一圖小濱居住臣隨密飭休寧縣協同李竒前往密查喚訊不得疎縱亦不得驚累無辜俟拘到張秀公詢明伊父平日與王澍同窓交好之處并王澍家屬下落嚴拏審究容臣另奏外謹將密訪張應星之子張秀公住址下落先行奏聞謹奏覽奏知道了毋得少有疎縱以及枉濫株連安徽巡撫臣程元章謹奏爲盤查積貯以濟平糶事竊臣到任後撫臣魏廷珍移交各屬實貯穀米共十五萬餘石臣俱委員盤查取結由藩司彚詳題報在案安徽所屬十四府州存貯倉穀僅有此數係屬最少上年夏秋成災共十七處撥賑穀九萬餘石續查出靈璧縣成災現在確查饑口撥榖補賑共約費穀十萬餘石是一歳之賑而通省餘存實貯不過四五萬石不足以濟今春平糶之需臣查雍正四年蒙聖恩特發銀十萬兩分派安徽各屬買榖貯倉僃賑至今尚未報銷巡撫衙門無册可稽臣隨飭藩司確造款册如有虧缺即行題㕘據報各屬共買榖一十八萬五千餘石尚存銀三千九百餘兩臣一面委員盤査令各地方官將買貯榖石於此青黄不接之時酌量平糶以濟民食以仰副我皇上愛育黎民之至意爲此繕摺陳奏伏乞聖鑒謹奏覽奏已悉秉公竭力辦理以期無忝厥職安徽巡撫臣程元章謹奏爲恭報二麥收成分數事竊照今歳上江地方雨暘時若二麥暢茂今已刈穫臣通行飭查據各府州將收成分數開報前來俱有十分九分八分以及七分六分不等其二麥價値大麥每石自三四五錢至一兩一錢不等小麥每石自六七九錢至一兩六錢不等又據安徽十四府州屬報到雨水俱已霑足田禾插播齊全青葱長發可望有秋所有二麥分數價値秋禾插播情形恐厪聖懷謹繕摺恭奏伏乞睿鑒謹奏據奏闔屬二麥收成分數及雨水禾稻情形以手加額覽之安徽巡撫臣程元章謹奏爲遵旨陳奏事竊臣前奏安徽各屬春季米價一摺䝉硃批訓旨覽所開米糧價値甚屬繁而不明欽此臣跪讀之下恐懼戰兢惶悚無地臣前奏因據各屬所報價値按其縣分挨敘以致價値高下錯雜無序實屬繁而不明兹謹將春季各屬米價另繕清摺再爲陳奏伏乞睿鑒臣不勝悚惕惶懼之至謹奏朕一日之所披閱及一切訓諭甚屬殷繁舉凡爾等奏章朕皆自首至尾詳視不遺如或覽或不覽何必諄諄命爾等具摺耶當諒朕心力所能擇緊要處簡明陳敘以聞方是若動以幕賓門客綴輯閒文混行冒瀆甚至以數兩幾分花賬連篇累牘任情開列以相煩瑣於心忍乎思之安徽巡撫臣程元章謹奏爲再陳愚悃事竊臣前密陳漕務闗係重大不敢遽議停運一摺實臣區區愚衷不敢不敬陳於君父之前未蒙諭旨訓誨臣彌切悚惶臣於另摺跪讀訓旨當兹軍需浩繁之際内外宜視爲一體諸凡公用留意節愼欽此仰見我皇上睿慮周詳因時制宜超越臣愚識見萬萬也臣因思國家經費應有緩急移緩就􅇥實通融酌劑之道臣前就天庾積貯計之則見漕務關係重大不敢遽議停運而於軍需浩繁之際漕糧於三年之内勻折一年是亦通融酌劑之議今督臣高其倬亦議將安徽司道折徴一半之議改照江蘇三年勻折一年之議咨覆漕臣性桂并移咨到臣漕臣亦催臣議覆臣思十月收漕之期轉瞬即屆不敢遲誤隨亦議三年勻折一年咨覆漕臣俟漕臣彚齊奏請聖裁伏念天下大計移緩就急運籌酌劑惟我皇上聖謨宏深籌畫盡善非臣愚所能見及萬一臣才庸識淺不敢膠執管見亦非敢奏議互異懇乞皇上訓誨開導俾臣得以祗奉辦理爲此謹奏汝錯㑹朕意矣前摺所批軍需浩繁之諭葢指地方不急之浮費可以節省者而言非令汝等設法協濟國用也何庸愚不逹一至於此安徽巡撫臣程元章謹奏爲密查事竊臣准湖南撫臣趙𢎞恩札開照得曾靜所報姦人王澍一案本都院遵旨査詢今將節次詢過曾盛任鍾湘羅一奎等各供情繕摺奏聞外查各供王澍係江南人爲此照鈔全供照繪圖像密札前詣貴都院請煩查照在於貴屬密訪王澍根底或另有的名的姓併查拏家屬財産其原任耒陽縣知縣張應星親屬己回原籍徽州亦再煩爲摘喚確詢密爲扎覆以便擬奏等因到臣臣隨經密差把總前赴徽州府屬查出原任耒陽縣知縣張應星之子張秀公密報到臣一面密飭休寧縣嚴拏看守隨將拏獲張秀公緣由繕摺具奏續又於本年四月二十六日接到大學士公馬爾賽等寄來原奏摺内開據湖南巡撫趙𢎞恩查審姦人王澍一案訊據曾盛任等各供王澍到曾靜處及停宿祝融庵鍾湘等家與鄧子參羅一奎等供詞相同且據僧彌增鍾湘鍾清霞羅一奎俱稱形狀與畵圖無異是大領垇已死之姦人爲王澍無疑應如趙𢎞恩所議將已死王澍銼屍揚灰其供明鍾湘一干人等俱行釋放但羅一奎既供王澍係江南人應密行文江南督撫令其留心查訪倘得蹤跡即查拏家屬密行訊究以窮姦黨而快人心其曾靜稟呈王澍原帖臣等密封收貯爲此謹請旨雍正九年四月初九日奉旨依議欽此等因并鈔趙𢎞恩奏摺及曾盛任等供詞封寄到臣隨密飭按察司提犯查訊續據該司稟據休寧縣訊據張秀公供出同在耒陽縣任所之孫儀周張振蕃二犯隨密飭一併提訊於五月二十二日恭接硃批諭旨覽奏知道了毋得少有疎縱以及枉濫株連欽此欽遵密催按察司迅提張秀公等去後隨據徽州府委員押解張秀公等到皖臣隨提犯親訊據張秀公孫儀周張振蕃各供均不認識王澍並非張應星同學亦無僧人彌增持書借銀之事臣恐其畏累狡飾又設爲唐思在湖南巳供認僧人彌增到縣取銀并張應星與王澍同學之語以窮其詞伊等堅供並無影響願求提到唐思對質據此查各犯供詞不無狡辯難以遽信但查湖南審供王澍與張應星同學係彌增轉述王澍之言而彌增原供又稱銀帖是王澍呌曾盛任代寫給與僧人的僧人因不信他所以不敢赴縣領取銀子等語是取銀之事原屬烏有且果係同學彼此筆跡自相熟識託人代取財物尤以親筆爲憑王澍令彌增向應星取銀何不自寫字帖乃假手於曾盛任代寫致令筆跡無憑此等供情尚未確鑿至唐思即唐詩久在應星署内供役王澍於雍正元年盤桓耒陽等縣地方果與應星交好必曾到署探望唐思依附應星非親非友又非豢養家僕張秀公等即畏罪狡辯唐思必不能代爲支飾縱令唐思曲徇張秀公等而應星在任日王澍往來衙署斷難掩書役人等之耳目似應一併移查確供再行質審方可定案再湖南審供曾盛任代王澍筆墨彌增領王澍銀帖鍾清霞與王澍談文鍾湘延王澍處館羅一奎爲王澍僕從日親日近當無不細問王澍籍貫之理今湖南各犯但稱王澍係江南人其實係江南何州縣地方俱未供明況曾静與王澍密邇知交定知籍貫根底今曾靜及曾盛任等現在湖南仍應查訊確供指出王澍實在籍貫立究黨羽盡拔根株庶可鋤姦黨而快人心除現在遍行密查王澍家屬下落將張秀公等嚴禁看守并密咨湖南撫臣查覆外所有臣密訊張秀公等供詞另繕一摺恭呈御覽理合將訊供咨查情由繕摺陳奏伏乞皇上睿鑒施行謹奏仍遵前諭行其中人犯如審明實係無干者即予釋放或尚有候質處暫令保出在外毋致無辜久繫囹圄須知寃抑平人與疎縱匪類其過相等秉公爲之安徽巡撫臣程元章謹奏爲密查事竊臣前具摺陳奏據湖南撫臣趙𢎞恩密咨原任耒陽縣知縣張應星與姦人王澍同窻借銀情事提訊其子張秀公等一案奉有硃批訓旨臣跪讀之下仰見我皇上訓示平允之至意硃批到臣之時督臣髙其倬巳將張秀公提審解赴江寧臣即敬錄諭旨密齎督臣衙門一體欽遵辦理俟關取湖南各犯確供到日再行提訊定案其王澍家屬下落現在遍行密查務究根株不敢疎縱所有遵奉諭旨辦理之處理合繕摺奏聞謹奏此等些小事何必頻頻瑣瀆安徽巡撫臣程元章謹奏爲恭報秋禾收成分數事竊照今歳安徽等屬地方雨水霑足秋成豐稔臣通行飭查據各府州將收成分數呈報前來査安徽寧池太廬鳳七府並滁和廣六泗頴毫七州及所屬收成俱有七八九十分不等此皆我皇上敬天勤民時以稼穡爲念所以秋穀豐登咸慶大有除將各屬收成細數另摺分晰恭呈御覽外爲此繕摺奏聞謹奏覽秋成分數朕懷曷勝欣慰安徽巡撫臣程元章謹奏爲陳奏事竊臣査安省雍正八年正當舉行大計因署督臣史貽直與臣均係履任未久屬員賢否未能周知俱經題請展限於雍正九年補行今督臣高其倬調署雲貴廣西總督印務署督臣尹繼善甫經署事復又題請展限緣計典例應督撫㑹核舉行臣亦循例具題請俟雍正壬子年補行尚未准有部覆伏思察吏安民封疆首務臣不敢因大計暫停稍爲寛假因循於屬員中貪婪不法昏庸溺職者俱經特疏糾㕘其才力不及者并請改補教職外臣查安屬尚有才非肆應而身任繁劇者有辦事勤敏而職任簡僻者均應酌量調補庶於地方有益但目下正當收漕之候一時更換恐致推卸貽誤統俟漕務事竣臣與督臣酌量繁簡㑹疏題請調補再安徽現在試用及清查事竣人員内有經委署辦事勤愼者亦酌量相宜之缺題委署理一年如能稱職另行題請實授如此則才具中平之員不致貽誤要地而才猷敏練之員亦得各展所長矣臣謹繕摺陳奏伏乞皇上睿鑒謹奏既係照例㑹疏題請之事何必多此一番瀆奏朕萬幾繁勞奚暇批覽汝之閒談泛論也安徽巡撫臣程元章謹奏爲陳奏事竊臣前奏酌調繁簡一摺奉有硃批臣跪讀之下愧悚交集汗下通身如夢方醒因思酌調繁簡原有成例可遵臣當與督臣啇酌㑹疏題請不當瀆奏以煩聖聽實臣愚昩無知非敢有心塞責乃蒙皇上指示寛容不加嚴斥臣五夜惶悚儆惕不安惟有感激聖恩勉竭駑駘心力以仰報髙厚於萬一謹奏汝爲封疆大吏於朕一人尚不能仰體而致忠愛況各牧司百姓何能體察顧惜之也動稱愚昧無知惶悚不安以自解縱使斯語果實亦何益之有併此悚惶猶涉虛文殊無足取今後當知愧奮加勉莫負朕之委任安徽巡撫臣程元章謹奏爲奏聞事竊查安徽所屬地方上年麥秋收成豐稔物阜民安秋收之後種麥最爲急務臣於冬月即飭各屬查明二麥曾否種齊雨澤有無霑足據實申報去後今據安徽寧池太廬鳳七府滁和廣六泗潁亳七州各申報所屬地方二麥俱巳種齊雨澤霑足又據各屬報到雍正九年十二月初九十五等日得雪二三寸至五六寸不等雍正十年正月初三日得雪一二寸至一尺二寸不等現在正二兩月又得透雨麥苗長茂臣查瑞雪普被雨水調勻米價不昂人民樂業皆由我皇上至誠感格之所致將來二麥可望豐收所有二麥長茂雨雪霑足情形臣謹繕摺恭奏伏乞皇上睿鑒謹奏據奏安屬雨雪霑足米價平減以手加額覽焉安徽巡撫臣程元章謹奏爲恭報二麥收成分數事竊照今歲安屬地方雨水調勻二麥成熟臣通行飭査據各府州將收成分數呈報前來查上江十四府州屬二麥業巳登場俱屬豐稔羣黎樂業至四五兩月正値插秧之時有需雨澤隨據各屬陸續報稱甘霖疊沛四野霑足高下田畝禾苗插種齊全現在長茂可望有秋所有上江二麥收成分數臣謹另繕清摺分晰開明恭呈御覽伏乞睿鑒謹奏覽二麥收成分數及雨水情形朕懷曷勝欣慰安徽巡撫臣程元章謹奏爲奏覆事竊查廬州府城内向有金斗河一道壅塞年久一遇水漲無從宣洩素爲民患經臣具摺奏明設法開濬以衛民生隨檄飭廬州府知府徐大枚合肥縣知縣趙良墅㑹同委員逐段估勘督率勸諭而闔郡紳士里民皆仰體皇上宏開水利之深仁靡不踴躍捐輸爭先恐後自上年十一月十八日興工至本年六月初二日閱數月而十里長河挑挖已竣適値大雨時行水自西闗湧入而河身深廣容納暢洩民居安堵水不爲害據該府縣詳報實用過工價銀共四千八百餘兩悉出士民急公樂輸至新築堤岸土尚鬆浮一經大雨不無衝潰之虞臣復檄行該府縣出示勸諭居民各量力隨時釘樁不但防衛河堤兼可保䕶屋基從此永慶安瀾常資利賴矣所有開濬金斗河竣工緣由理合恭摺奏覆伏乞皇上睿鑒謹奏興修水利固係美舉但當一順民情不可稍涉勉强如果事在應行於民有益何妨動用公項如法開濬以資利賴耶安徽巡撫臣程元章謹奏爲恭謝天恩事本年七月二十五日准吏部咨奉上諭浙江總督印務著安徽巡撫程元章署理欽此欽遵移咨到臣臣隨恭設香案望闕叩頭謝恩并循例具疏奏謝外竊臣一介菲才荷䝉皇上隆恩不次擢用簡任安慶巡撫兩載以來涓埃未效時切氷兢兹復蒙恩旨著臣署理浙江總督印務聞命之下感激惶悚益深警惕伏念浙省幅員遼濶統轄文武兼理鹺政海闗事事均關緊要在在皆須整理臣受此委任覆餗滋懼惟有念念君恩念念地方務期整飭營伍澄肅官方釐剔姦宄乂安黎庶嚴緝私販以疏官引稽查𣙜稅以愼錢糧不敢存一毫私意執一已臆見因循瞻顧貽誤封疆第臣知識短淺誠恐措施未當仰懇聖慈時加訓誨指示俾臣敬謹遵循勉竭駑駘心力以圖仰報聖主洪恩於萬一臣已將徵收闗稅錢糧料理起解於八月二十五日起程赴浙所有臣感激愚悃理合恭摺奏謝天恩叩請聖訓伏乞皇上睿鑒謹奏覽奏知道了已有旨實授卿總督矣嚴緝私販一如李衞爲之不可絲毫存姑息之念再者浙省向稱僧海爲釋敎焚修勝地務令俱各得所若以蔑僧闢釋爲理學標準則誤矣除此二者之外朕俱信得及卿無可訓諭者竭力勉爲之浙江總督臣程元章謹奏爲陳奏事竊臣奉命署理浙江總督印務於九月十五日由秀水縣平望地方入境一路察看田疇晚禾俱巳成熟現在收穫居民樂業惟嘉興府屬之石門桐鄉二縣湖州府屬之歸安烏程二縣於九月初九日夜雷雨交作帶有冰雹在田禾稻間有被雹打傷長二三十里及一二十里寛四五里及二三里不等臣即諭令各該府縣確勘幷加意撫恤去後履任之日隨酌動恩賞僃公銀兩分别賑恤毋致失所查此雹係自東至西所傷地方原不寛廣通縣計之例不成災惟是就各村各户而論現已無收目前十月初一日即屆漕米開徵之期今被雹田稻既無收成難於完漕臣伏覩我皇上宵衣旰食勤恤民隱凡所以愛養黎元者無微不至今石桐等四縣内被雹田畝約計應納漕米不過二三萬石幷漕項等銀仰懇聖恩概准緩至癸丑年秋成帶徵或分作兩年帶徵民力更覺寛紓其南米一項係給本省兵糧幷請借支倉榖碾放統俟帶徵還補如此則被災貧民目前得免追呼而惟正之供將來仍不虧缺閭閻小民實沐聖澤於無疆矣臣因事關民瘼不揣冒昩恭摺奏請伏乞皇上訓示遵行謹奏該部議奏浙江總督臣程元章謹奏爲陳奏事竊查浙省海塘爲第一要務今秋沿海各地方風潮甚大塘工尤當加意保䕶臣於履任之初即面詢杭嘉湖道王斂福據稱今歲入夏以來潮勢更大晝夜衝刷海寧接連仁和一帶地方俱屬險要業經署撫臣王國棟等將一切石草各塘應修應築之處分晰具疏題報在案後於七月十六十七等日􅄓風陡作潮勢雖極洶湧仰賴皇上至誠感格海神黙祐當夜風轉潮退即獲安瀾現今已屆冬令潮水漸平可保無虞等語臣因履任伊始政務殷繁現在竭力辦理稍有就緒即當親往海塘逐一細加確勘相度形勢飭令各委員上緊趕築防䕶務期完固以資捍禦容俟勘明之日將應否添改修築之處詳細另行奏聞所有據禀海塘平穩情形合先恭摺陳奏伏乞皇上睿鑒謹奏覽奏已悉海塘一事應飭在工人員各具忠誠之心以對越神明再加以勤愼從事盡力保䕶以期安瀾奏績浙省雖云政務殷繁而海塘工程最爲緊要時刻不可釋懷萬勿因惜小費致誤大事極宜留心查勘多方防䕶工料等項更須預爲區畫庶免臨期失措敬愼爲之毋忽浙江總督臣程元章謹奏爲遵旨督辦賑恤江省竈丁事本年九月二十五日接准部咨欽奉諭旨以南滙縣下沙頭二三場等處竈户鹽丁被水署督臣李燦鹽道江承玠彼此遲延觀望不速行賑濟以致窮丁嗷嗷待哺流離失業著臣督率江承玠盡心辦理仰見我皇上軫恤窮丁無微不至臣先於赴浙舟抵江寧時即聞沿海竈户鹽丁被水甚衆亟須賑恤抵任之後隨面詢鹽驛道江承玠各該場被水竈户作何撫恤據稱從前止動支存公銀四百兩委員往賑八月底復動銀四千八百兩倉米一千七百石借給各竈户爲修葺竈舍置僃柴滷之需又兩次共撥鹽義倉米五千五百石并存公銀一千兩委員運往賑恤俱經詳明有案等語當查各巻與該道所禀相符第後發銀米爲時已覺遲緩且曾否俱已運到各委員辦理有無未協之處諭令該道飛檄飭查去後今欽奉恩旨除一面轉行該道欽遵一面委令原任金華府知府吳烱星往下沙頭二三場等處將上諭遍示宣布皇恩督同各委員逐一確查加意賑恤咸令得所毋任胥役從中侵冒倘前發銀米尚有不敷立即詳報酌量再撥務期妥協辦理俾被水竈丁均沾實惠以仰體我皇上格外加恩之至意所有遵旨督率辦理緣由理合恭摺奏聞伏乞睿鑒謹奏好盡力爲之務令窮丁均沾實惠日前所降諭旨非欲徒博優恤虛譽也不可錯㑹朕意稍涉疎慢致成有名無實之舉浙江總督臣程元章謹奏爲欽奉訓諭據實覆奏事本年十月内臣齎摺家人到浙隨恭設香案望闕叩頭敬謹開讀内恭謝天恩一摺奉有硃批臣跪讀之下仰見聖訓周詳無微不照伏思浙省鹽政自前督臣李衛兼辦以來固巳漸次清釐其辦理妥協者臣皆照依而行不敢故爲矯異其鹽務項下有可節省之處臣斷不敢濫用糜費至於私梟私販礙課病啇臣素所深惡前任安徽巡撫時凡私鹽案件俱由臣衙門理結臣必按律究擬從不稍爲寛貸今臣兼辦鹽政則緝私究販乃係專責更何敢少存姑息枉法縱姦以負浙江古刹叢林最多而杭郡尤甚誠如聖諭可稱僧海臣本庸愚屢䝉皇上訓誨心體力行時時奮勉政事之外不敢標立理學之虛名前䝉聖訓敬謹遵行今先據實覆奏伏乞皇上睿鑒謹奏硃批諭旨卷二百十一上欽定四庫全書硃批諭旨巻二百十一下硃批程元章奏摺浙江總督臣程元章謹奏爲奏聞事竊查浙省從前有截留漕米四十萬石以僃賑糶支銷之後開捐買補除派發各縣分貯外其餘二十萬石陸續易榖積貯省城永濟倉向交寧紹嘉松兩分司經管後因米穀在厫年久不無折耗於雍正五年間經前督臣李衛議令收米之時每石加收四升五合以僃折耗在案詎寧紹分司徐有緯於上年推陞離任查明伊經管項下缺少米七千四百餘石又穀六千五百餘石除將預收僃耗米穀抵補外實少米五千八百九十餘石穀三千三百四十餘石又雍正九年撥運江南淮北米石内搧出氣花厫底等項米五千四百餘石除鹽商捐銀二千五百兩抵補外尚少米三千石此項已經署督臣李燦准於鹽道庫内動支鹽務餘銀三千兩現交署分司汪徳馨買補其餘所少米穀徐有緯指稱年例應銷名色希冀將别項公銀代伊補墊又因前督臣李衛摺奏節省鹽商公費銀兩動用款項内附有撥補永濟倉折耗及氣花葢頭等項米穀一語遂欲於此項節省商費内代爲彌補臣到任後據司道議詳請以鹽務餘銀撥抵臣查李衛送到摺稿現稱永濟倉抵耗一項於節省十三萬兩内撥補臣以倉糧闗係重大不便虛懸是以照虧空倉穀一面糾㕘一面買補之例批令乘此秋收速行買補仍一面具摺奏請聖裁定奪其如細查鹽道庫貯李衛所奏節省銀十三萬餘兩或先已撥用或現在工程待支或别項借用或尚欠在商未經捐繳未有餘剩在庫是銀米兩懸徒爲紙上空談臣思倉儲米穀倘有缺少霉爛俱應著落經管之員賠補定例昭然各省遵奉今徐有緯缺少米穀已將在倉僃耗及商捐并鹽務餘銀共撥抵過米穀一萬餘石合之所稱應耗之數巳屬浮多此外復有缺少明係虧空豈容又以年例應銷爲詞重開折耗況鹽務盈餘雖非正項但業已節省歸公止可於公務支用豈可以盈千纍萬之公銀代不肖之員彌補虧空耶臣荷蒙高厚殊恩惟知謹守繩墨不敢掩飾扶同除將徐有緯照例題㕘請旨究追外合將從前已經准銷撥補折耗緣由具摺陳奏伏乞皇上睿鑒謹奏㕘劾徐有緯甚是至於鹽道庫貯節省之項曾經李衛摺請動用辦理數處工程朕記憶未清汝其一面確查一面咨詢李衞可也内如彌補徐有緯虧空不應之濫用難言其無若云李衞於中染指料係必無之事總之查詢後自然水落石出此奏朕嘉是覽之浙江總督臣程元章謹奏爲奏聞事竊照浙省烏程歸安桐鄉石門四縣於九月間偶被冰雹其受災田畝艱於辦漕臣先經具摺奏懇天恩准予緩徵在案又查今歲夏秋之交各府田畝間生小蟲傷害田禾得雨之後漸次消弭但蟲少傷輕及早先得雨之處收成不過畧減惟嘉屬之平湖海鹽湖屬之武康紹屬之諸暨等縣境内有一二處被蟲較重又湖屬之安吉州蟲患雖輕因天目山發水灌注低窪田畝間有淹浸以上除諸暨一縣不徵漕糧外其餘四州縣被傷之田闔縣通計原不成災而被蟲之户催令完漕未免難於辦理統計四州縣被蟲田畝應納漕糧僅三四千石爲數無多似不必與被雹之田槩請緩徵臣再四思維酌令各州縣借動倉榖碾米應兌俟來歲早穀登場時遵照上年蟲傷一案所奉恩旨每漕米一石折徵銀一兩責令該州縣照數買穀還倉如此則一轉移間被蟲貧民既免催呼漕糧重大亦無遲誤而徵銀買補倉儲仍不致有虛懸矣至於各府被蟲之田先經署撫臣王國棟等飭將僃公銀兩酌量賞給助其補種菜豆臣抵任後復行令查明實在乏食貧民按户酌恤是以小民不致失所咸頌皇恩歡聲遍野惟是通省各州縣有捐監補漕及本年平糶各穀俱應買補今歲收成歉薄米價不能平減若再責令購買足數誠恐市價昂貴小民艱於謀食今近水各縣皆赴外省糴運其距水遥逺之地暫緩至來歲早收買補價銀俱令解貯府庫以杜虧空之弊臣謹將見在辦理緣由據實奏明伏乞皇上睿鑒謹奏辦理甚屬妥協浙江總督臣程元章謹奏爲欽奉上諭事本年八月三十日大學士奉上諭因黄巖鎭臣吳進義陳奏練習兵丁頭頂夾銀一摺奉旨吳進義識見庸愚有忝總戎之職傳旨申飭并令將諭旨與臣同提臣萬際瑞看欽此隨據鎭臣吳進義齎捧到臣臣跪讀之下仰見我皇上明竝日月無微不照伏思訓練三軍原有經常不易之正道似此頭頂夾銀腹皮搪箭實係無賴之人游戲欺人之舉豈可以此教演兵丁爲此無益之事聖明訓飭至周且悉其噴筒一項臣已察看以鉄爲之比竹堅實但配船是否適用提臣萬際瑞明於水師俟其驗明㑹商定奪至鎭臣吳進義前任杭協時臣爲浙江藩司同城一載見其應對奔走尚屬伶俐而誠實不足且素好奢華恐其操守亦不可信若嚴加鈐束猶可黽勉任事臣惟有時時勉勵加意督率以觀後效所有臣欽奉上諭緣由理合恭摺奏覆伏乞皇上睿鑒謹奏覽奏知道了吳進義當加意䇿勵之浙江總督臣程元章謹奏爲欽奉上諭事竊臣接准大學士鄂爾泰張廷玉字寄内開雍正十年十一月十四日奉上諭江浙地方地廣人稠其中秀頑不一難保無姦邪匪𩔖造作浮言煽惑人心冀生事端者從前尹繼善李衛俱留心稽查以防其漸今魏廷珍程元章接辦總督事務仍當留心稽察不可疎忽此事雖似在吏治官方之外然較官方吏治更爲關係緊要該督撫所當設法密察先事預防者倘目前疎縱將來發覺時朕必於魏廷珍程元章是問再者江浙營伍海防向來廢弛年來尹繼善李衛俱留心整頓著魏廷珍程元章加意訓練毋令懈惰爾等可傳旨密諭之欽此遵旨寄信前來等因到臣伏查江浙地方爲四通八逹之地五方雜處之區人煙稠密秀頑不齊間有遊手好閒之徒造作謡言互相傳述或圖哄騙財物或臣於抵任之初先經移行提鎮將弁勤加操練臣不時調考以驗優劣遍加訪查以稽勤惰幷通飭文武嚴察口岸上緊巡防務使軍伍整齊山海寧謐今蒙聖恩訓諭臣惟有益加整飭時刻訓練盡職守以仰報聖諭緣由先行覆奏伏乞皇上睿鑒謹奏二事俱爲至要之政當時刻留心毋忽浙江總督臣程元章謹奏爲奏聞事本年正月内據臣兩標中軍雷逢春呼麟稟送直隸總督臣李衛發來諭帖内云近聞湖上旗民雜遝放馬蹂􅏳民間田地踐蹋勝景塗抹神像攀折果木令其派撥弁兵稽察查究旗人解送將軍民棍交給兩縣幷稱新督院公務忙甚不必請示而後行等語伏查督臣李衛於雍正九年十一月離浙臣於十年九月抵任因叩謁聖祖仁皇帝龍位及往天竺寺稽察工程不時由西湖來往見各處廟宇景亭俱極整肅潔淨竝無旗民踐踏田地勝景及塗抹神像攀折果木等事不知李衛從何有此風聞且竝未咨㑹到臣而關係拏究旗民之事直諭兩中軍不必向臣請示似以浙江中軍惟聽命於直隸總督而浙江總督竟不得過問與聞於朝廷體統未免有悖臣細思李衛辦理地方事務可以效法之處亦多其性情高亢舉動任意則係習慣性成臣惟謹遵平日所奉和衷辦事不可尚氣之諭旨學其所長略其所短總以國家公務爲重斷不敢因其越俎欺凌遂存芥蔕彼此牴牾以致上厪聖懷但因李衛發來此諭已經通省共知臣何敢復爲隱匿謹具摺密奏伏乞皇上睿鑒謹奏李衞之粗率狂縱人所共知者何必介意朕取其操守亷潔勇敢任事以挽回瞻顧因循視國政如膜外之頹風耳除此他無足稱朕歴來用人每多隨材器使不拘定格惟以有益於事及人地相宜爲準而已如果自信得及一切盡屬不妨但涉擬議迎合揣度預防則邈若河漢矣誌之勉之浙江總督臣程元章謹奏爲欽奉上諭據實覆奏事竊臣接准大學士臣鄂爾泰張廷玉字寄内開雍正十一年二月初五日奉上諭上年程元章赴浙時曾奏稱嘉湖所屬有一二縣遭被冰雹田榖歉收請將漕糧寛至癸丑年完納等語冬間奏摺來亦祇略言地方蟲傷薄收之情形竝未詳陳一切朕意以爲蟲災尚輕該督等自已料理妥帖矣今聞浙省上年被蟲之州縣甚多其中有收成大歉者今春米價甚昻乏食貧民嗷嗷待哺竟有公行搶奪之事此語似非虛傳不知程元章何以未曾詳奏爾等可即寄信詢問令其留心訪察倘果閭閻窘乏餬口艱難即當多發倉糧減價平糶貧苦之民設法賑濟一面辦理一面奏聞毋得回䕶前非負朕倚任欽此遵旨寄信前來等因到臣臣跪讀之下不勝悚惕伏查浙省上年夏秋之交各屬田禾間生小蟲雖多寡不等處處皆有前署撫臣王國棟給油灑救又旋得大雨隨即陸續消弭禾苖依然秀發是以委員㑹同地方官查勘俱出有不致成災印結在案迨收穫之時穀穗不綻米粒細小收成未免歉薄其中惟嘉屬之平湖海鹽湖屬之武康安吉紹屬之諸暨等州縣爲最甚又嘉屬之石門桐鄉湖屬之烏程歸安於九月初九日被雹損傷禾稻臣於抵任後即具摺先後奏明請將應徵漕糧分别帶徵及動倉穀碾米應兌幷酌動僃公銀兩按户賑給已䝉聖恩俞允轉行欽遵惟是浙省米糧即豐熟之年向藉江楚等處客販接濟九十兩年連遇蟲傷業已民鮮蓋藏附近之江南江西二省米價亦不甚平客販無多市價漸昂貧民謀食維艱臣訪知情形即通行各屬將存倉穀石於上冬十二月及今年正月即行設厰減糶以濟民食至原奏傷重之海鹽平湖諸暨及台屬之黄巖等縣則於僃公銀兩賑恤之外臣復率同司道府各員捐發銀兩幷撥運省倉米穀動支鹽務滷耗或設厰煮粥或按口給米幷另委員前往監賑臣又慮應糶地方現存倉穀或有不敷復經題明借支鹽務公費銀五萬兩委員赴價平地方購買米穀運回接濟此浙省上年歉收及臣辦理之實在情形也細加查核原止歉收米貴竝非旱潦成災顆粒無收者比惟是浙省民貧性猾稍遇歉薄即冀蠲免錢糧通行賑濟不遂所欲即造言生事如台屬之黄巖與寧屬之鄞縣現今米價較平於浙西而一二姦民竟敢藉米貴爲由向殷實之家用強勒借米穀確查其人竝非實在饑民巳將爲首者嚴拏重處其風始息臣在地方固不敢忽視民瘼上負我皇上保民如赤之盛心又何敢張大其詞以沽名釣譽今蒙諭旨諄切仰見皇恩浩蕩惠養黎元有加無已臣敢不悉心籌畫宣布皇仁通飭各屬再行確查分别輕重緩急應糶者多設厰所使逺近得沾應賑者即發銀米如有不敷詳請續發按口實給麥熟停止務使正實貧民不致失所亦不使姦猾之徒乘機影冐臣斷不敢因循回䕶貽誤地方致厪聖懷也謹此據實覆奏伏乞皇上睿鑒謹奏覽奏始僃悉情形朕懷深慰料卿非辜負擢用之人也浙江總督臣程元章謹奏爲奏聞事竊照本年三月初三日夜風雨驟至雷聲震作逾時始息臣恐春花豆麥或有傷損隨飛飭各屬確査去後旋據杭屬之海寧縣嘉屬之石門桐鄉二縣湖屬之安吉州烏程歸安德清長興武康等縣陸續禀報初三日夜雷雨交作帶有冰雹在田春花豆麥幷新發蠶桑間有被雹打傷等情查各州縣所報情形有一鄉一村偶被微傷者有被傷偏重地方稍寛者其中輕重不一内惟石門桐鄉烏程歸安四縣先於上年九月被雹傷禾目今菜花豆麥蠶桑等項正在長發復遭冰雹民情倍覺拮据臣據報當即檄行布政使王紘委員星往被雹各州縣㑹同該地方官逐一履畝查勘被災輕重分晰詳報一面酌動款項速行按户給賑務使災黎不致失所容俟查明詳覆到日另行題報外所有海寧等九州縣被雹情形合先繕摺奏聞謹奏杭嘉湖等府所屬九州縣冰雹情形知道了加意撫恤毋忽浙江總督臣程元章謹奏爲恭報年歳豐稔情形仰慰聖懷事竊查浙省上年偶被蟲祲兼有數州縣被雹被水收成歉薄經臣節次奏明荷蒙聖恩軫念民依將應完漕米漕項及雍正九年以前舊欠錢糧分别帶徵幷動支僃公銀兩按户給賑閭閻小民不至失所而尤望今歲春花成熟以資接濟乃自三月來仰邀聖主福庇雨暘時若菜豆二麥處處豐收而杭嘉湖三府屬所育蠶絲均有十分收成麥收之後即得時雨早禾俱巳插種齊全五月初一初二等日又獲甘霖大沛四野霑足晚禾現在遍插凡屬小民無不餬口有資安居樂業交相慶幸感戴皇仁除飭催布政司將各府實在收成分數查明彚報另行具奏外所有年歲豐稔雨水調勻情形合先繕摺奏聞仰慰聖懷謹奏覽麥熟蠶收雨水調勻情形朕不爲浙省憂念矣浙江總督臣程元章謹奏爲奏聞事竊照浙屬台州一府地當濱海田少山多上年偶被蟲傷收成歉薄米糧減少今春夏之交正直魚汛魚船雲集皆就台買食本地倉穀減價發糶恐有不敷而江楚採買之米又慮轉運維艱臣再四思維查接壤之閩省地方上年收成豐稔米價尚平若委員幷招啇赴閩購買由海運回以資接濟猶易爲力隨咨啇閩省去後旋准福建督撫臣咨稱閩省所産之米只敷本地民食且啇人販運未免稽遲酌議於厦門存貯臺穀内動撥二萬石就閩委員運台交明地方官發糶如有不敷再委員赴閩撥運等因臣即一面移覆閩省撥運一面飛檄台州府遵照俟閩穀運到速即盤收酌派各縣領回糶賣今前項穀石現在陸續運至但計到台之日各屬二麥已經收穫十分豐稔民食有資倘不須平糶臣即飭令分撥各縣存貯以實儲僃將各縣上年及今春平糶未曾買補穀價解閩還項倘或價脚稍有不敷臣當酌量於公項内撥給以符閩省原價所有動撥鄰省倉穀酌款歸補緣由理合繕摺奏明伏乞皇上睿鑒謹奏因時制宜如此料理是浙江總督臣程元章謹奏爲恭報雨水情形事竊查浙省各屬今歲春花俱十分收成四五兩月雨水亦甚調勻早晚二禾皆獲及時插種惟自六月以後雨澤愆期髙田未免乾燥臣先於省城寺觀及續往嘉興掣鹽隨處俱建壇祈禱倂飭凡缺雨地方一體舉行務求甘霖大沛以保有秋兹於六月二十日以後陸續據各屬申報先後得雨日期及巳未霑足各等由前來臣查杭州嘉興湖州三府屬據報屢次得雨分寸約略相同雖未十分霑足禾苖尚皆暢茂寧波府屬據報鄞縣奉化象山等縣得雨霑足其餘早稻漸次收割晚禾亦甚秀發紹興府屬山隂㑹稽蕭山餘姚諸暨上虞等縣相繼俱報得雨雖未十分霑足要皆可望有秋早稻俱已成熟晚禾亦皆青茂台州金華二府屬報雨水霑足者多早稻皆已收成惟蘭谿縣據報缺雨禾苖尚無妨礙衢州府屬西安龍游常山開化等縣俱報得雨霑足早稻成熟者多惟江山縣有無得雨尚未報到嚴州府屬遂安縣得雨霑足餘縣尚在缺雨惟壽昌縣現在蟲孽萌動巳飭作速設法撲除不致爲患溫州處州二府屬俱報得雨早稻收割將完晚禾亦甚暢茂至通省尚在雨水未足之處臣飭令虔誠祈禱務求甘霖普遍俟續報得雨齊全另同早稻收成分數恭摺奏明外所有現在雨水情形謹繕摺奏聞謹奏覽雨水不足情形朕深爲厪念汝自督浙以來屢著種種災異莅政臨民必有不合天心處亟當返躬内省勉圖遷改上蒼斷無枉施之理若仍執迷不悟自以爲是馴致大不是矣浙江總督臣程元章謹奏爲據情代奏仰祈睿鑒事竊照外任旗員子弟年十八歲以上者奉旨悉令歸旗至伊等子弟中有可以助其父兄辦理事務者准奏聞請旨而道府等官不能自逹者督撫代奏等因欽此臣接准部咨隨即通行各屬欽遵在案兹據糧儲道朱倫瀚呈稱切倫瀚係正紅旗漢軍有親子候選州同朱孝先現年三十四歳例應歸旗但倫瀚管理通省漕運事務繁多須得親子代爲照料庶免貽誤實有不能相離等情又據杭州府知府秦炌呈稱切炌係鑲黄旗漢軍出守杭郡緣省城地處繁劇兼查海塘工程必得親信子弟相爲照料所有親弟秦焯請留任所協助辦理以免跋前㚄後等情各循例呈請代奏前來臣查糧道杭府均屬緊要事務殷繁助理需人仰懇聖慈俯准朱倫瀚之子朱孝先秦炌之弟秦焯各留伊等父兄任所協助辦理俾收臂指之力則感戴天恩於靡涯矣理合恭摺代奏伏乞睿鑒批示遵行謹奏朱孝先秦焯准留伊等父兄之任咨明各該旗知之浙江總督臣程元章謹奏爲奏聞事竊查溫州鎮標瑞安水師營派撥弁兵駕船出洋巡哨至六月二十八日早潮忽遇􅄓風浪湧一時躱避不及候至晚潮仍不能進港只得在洋抛泊不期本夜風勢更猛千總楊元坐駕五號戰船椗䌇俱斷衝礁擊碎淹斃兵丁三名功加林逢春坐駕九號戰船椗斷漂流不知去處又玉環守僃邱宗義坐駕八號戰船㑹哨到洋遇風是夜一同抛泊亦被風擊碎淹斃兵丁十餘名據署溫鎭黄有才瑞安副將魏國泰玉環營叅將顧元亮各禀報前來臣即飛檄飭行查明被淹兵丁確數加意撫恤及九號人船下落併沉失礮械槓椇等項仍飭作速設法撈獲容俟查明另行題報外所有戰船遭風兵丁被淹情由臣謹繕摺奏聞謹奏此皆六七年來未聞之事朕實代汝畏之浙江總督臣程元章謹奏爲奏請折留漕米以裕民食事竊查杭嘉湖三府屬地方地窄人稠民間多以育蠶爲業田地大半植桑歳産米穀除辦漕外即豐收之年尚不敷民食向藉外江啇販接濟上年偶被蟲水歉收民情拮据荷䝉聖恩將歉收田畝應完漕米分年帶徵發帑賑恤小民賴以得所近今江廣等省米價亦昻啇販稀少是以杭嘉湖三府米價至今尚未平減且今歲夏秋之交雨澤未勻杭屬之新城湖屬之歸安烏程等縣高阜山田間有被旱之處續雖得雨但節序巳逾似難望其結實臣業將情形具疏題報并飭委員確勘在案其是否成災尚須勘明方定而收成終不免歉薄明春青黄不接之際誠恐米價更昂現在安程二邑應完漕糧即此細碎之米亦難上納事關天庾民食臣身任地方不敢不預爲籌畫伏查省城永濟倉存貯米穀除從前運往江北山東散賑尚未議補其餘又撥給乍浦滿營水師兵糧及湊放海塘夫役工食所存無幾鹽義倉穀石除湊撥江北山東協賑及上年賑濟松江各場被水竈户併發場員易買竈鹽已無存貯各屬存倉穀石上年平糶未補以及本年平糶爲數既多恐一時驟難補足近准部咨御史翁藻條奏每年於秋成前視年歳之豐歉酌動庫銀往江廣等省産米之地買米運貯平糶誠爲先事綢繆之計臣巳飭布政司酌動銀兩委員採買但江廣各省現在米價亦昻加之水脚等費成本既貴將來平糶不能多減價値恐屬無益臣再四思維細加體察杭嘉二府屬晚稻尚獲豐收仰懇聖恩俯准各截留本色漕米五萬石以僃來春酌撥糶濟民食湖屬之安程二縣既屬歉收本年應完漕米一十八萬餘石并應帶徵雍正十年漕米七千六百餘石應請一併改折徵收解部以紓民力則三府羣黎均沐皇仁於無既矣如䝉聖恩俞允其折收米價可否照雍正九年恩旨嘉興所屬漕糧每石折徵銀一兩抑或照雍正五年部定每石折徵一兩二錢之例出自皇上天恩臣未敢擅便謹具摺陳奏伏候諭旨欽遵謹奏有旨諭部矣浙江總督臣程元章謹奏爲奏聞事竊照前任湖協副將范宗堯經直隸督臣李衞以驕縱狂悖抗違怠玩㕘奏奉旨革職令往北路軍營效力欽此臣接准部咨隨照例委員摘印著令來省將所㕘各款一一示知給咨令其作速赴京在案臣查范宗堯自恃清操貧而有傲骨凡欽差往來從不出境逺迎謁見上司禮數間有不周臣前任藩司即知其爲人上年臣奉命總督浙江宗堯因調考來省臣以其平素性傲面加訓飭彼亦俯首愧服竝非不可教之人查湖協每年向有鹽啇餽送規禮銀四百餘兩宗堯到任數年以來澹泊自甘即將此項留存營中以爲周恤兵丁之用竝未絲毫入已其於營伍事務亦肯留心整頓缷事後止僕從三四人囊無長物同城之府縣共助銀一百兩甫得起身臨行時各兵情深愛戴結綵相送臣面詢湖州府知府唐紹祖委丈湖所田畝之候補通判傅柟異口同聲言之確鑿臣按督臣李衛所㕘各款皆係從前舊事臣未能盡知但據其操守辦事愛恤兵丁非無一長可錄之處臣既有所知不敢不據實奏聞伏乞皇上睿鑒謹奏范宗堯係朕深知之人其操守更所稔悉原素有身家非貧宦也據奏行李蕭條之狀殊屬瞽論浙江總督臣程元章謹奏爲微臣戀主情殷恭請陛見以伸愚悃事竊臣謭陋凡材仰沐皇上特逹知遇之恩由翰林院編修特簡福建學政數年之間不次超擢洊陞安慶巡撫受恩深重方慚涓埃未報乃於上年七月復奉恩命畀以浙江總督重寄伏念浙省幅員遼濶事務紛繁以一人而兼督撫鹽三任詰戎講武簿書期㑹緝私疏引黽勉莫逮兼之海塘關係甚鉅尤須加意辦理臣雖殫竭心力不敢稍懈而才短識淺彌深覆餗之懼臣到任後緣上年浙屬偶被蟲傷收成歉薄亟須整理撫綏今春又蒙皇上軫念海疆特命内大臣海望等赴浙㑹同查勘海塘動帑興修是以未敢冒昩陳奏今舊塘附土培築高濶催趲巳竣而土僃塘工程約在秋杪亦可報完且今歳春花蠶絲俱獲豐收六月以來正在望雨之候各屬又陸續報獲甘霖者多地方頗覺寧謐一切政務亦稍就緒正臣子瞻仰天顔之日跪懇聖慈俯准將浙江督撫鹽三任事務命員暫署容臣保䕶海塘八月大汛後謹於九月中束裝赴京恭請聖安跪聆睿謨指示訓誨俾臣得敬謹遵循矢竭駑駘力圖報效庶緊要封疆不致辦理錯誤則頂戴皇恩於生生世世矣謹奏陛見之請且可不必既云才識短淺幅員遼濶綜理紛繁又云一切政務已稍就緒何期年之間奏效如是之速耶果能殫竭心力整理地方俾有起色勝如僕僕往返多矣勉爲之浙江總督臣程元章謹奏爲奏聞事竊查浙江海關自歸巡撫衙門帶管以來因距省稍逺向委道府䕶理而沿海各口即係管關之員派撥書役家人巡查照則監收除正稅外各口所得飯錢俱作三股均分在口書役及管關家人各得一股餘剩一股呈送臣衙門以爲家人衣服之費每年約計收銀二千五六百兩不等歴任相沿已非一日伏思臣荷聖恩畀以封疆重寄又䝉賞給養亷以資用度設有不敷自當據實奏請斷不敢因循舊例輒於關稅之内絲毫有所染指惟查此項銀兩原係啇人量給書役飯費出於情願若一旦革除則在口書役家人飯食無資勢必另立名色於中巧取不無病啇如竟發還該關又徒爲胥役人等中飽於事無益所以臣到浙後查有前署撫臣王國棟交存飯費銀八百兩當即分發海鹽平湖諸暨三縣爲湊給賑濟之資臣任内又陸續解到二千三百兩俱飭發臣標中軍收貯以爲拯恤地方偏災及緊要事務差委員弁盤費賞給救火出力兵丁等項之用并飭造冊報臣衙門核查僃案庶事不紛更而於公務有裨所有臣酌留海關飯費存充公用緣由理合繕摺奏明伏乞皇上睿鑒謹奏海關飯費固屬應留但𩔖斯瑣屑之舉只可隨宜辦理不必諄諄留意葢天下事未有務近小而不遺逺大之理浙江總督臣程元章大理寺卿臣汪漋原任内閣學士兼禮部侍郎臣張坦麟謹奏爲奏聞事竊惟海塘關係重大荷䝉皇上睿慮周詳允内大臣海望等所奏鳩工興築臣等遵照原議先將一萬四千餘丈之舊塘背後附土加培高濶并興築土僃塘一道緣浙省五月内梅雨連旬六月以來又値戽水灌田兩工竝舉人夫無多加培舊塘附土催趲將竣其僃塘工程現有四分約在秋杪可能報完兹六月二十日臣程元章在嘉所掣驗引鹽見東南風甚大晝夜不息惟恐塘工或有坍矬專差標員星往工所嚴督各員加意防䕶復於二十二日親往海寧㑹同臣汪漋臣張坦麟沿塘查視因二十日晚潮洶湧浪高丈餘風激未退二十一日早潮又至風勢更烈潮水撲上塘面以致草石舊塘間段坍缷矬塌者約有一千餘丈仰賴聖謨宏逺智燭機先舊塘附土加高培濶擁䕶於後潮水不能溢過塘身近塘居民廬舍田疇俱無傷損臣等督同文武員弁多方雇覓人夫協力搶修所喜二十二日以後潮汛漸小人力易施正在督率修築間據東塘兵丁報稱二十四日午後潮平風靜之時附近尖山地方係上年坍缷塊石塘現改築大條石塘忽然蟄䧟三十六丈等情臣等隨即星馳查勘見塘前漲沙連塘後民地坍成環月勢形幸民地尚高尺餘不致爲患當即測量蟄䧟之處水深二丈有餘勢難搶修遂飛調工員人夫連夜於塘後身搶築灣月土塘以資捍禦所有坍矬各段詳細丈尺容臣程元章另行具題外伏念塘工緊要時厪聖懷謹先㑹同臣汪漋臣張坦麟恭摺奏聞謹奏朕實代汝憂之朕之憂懷未知汝亦體諒否也浙江總督臣程元章謹奏爲陳奏事竊照兩浙啇人行運引鹽每年夏冬兩掣向例定於六月十二月爲期凡各啇收買鹽斤務先報明捆運數目然後按所驗掣此兩浙歴來之鹺規也臣蒙高厚隆恩倂令兼管鹽政惟有事事仰遵聖訓恪守成例不敢違越但偶値勢有阻礙又不得不隨時變通如本年夏掣臣於六月初先掣杭所即於六月中親掣嘉所至六月底啇人引鹽已到所十之五六後因雨澤愆期附場鄉民將河道築壩蓄水灌田啇運引鹽必須盤壩剝淺每鹽一引多用脚費銀一錢有餘統計各所幾及盈千纍萬實困啇力若欲恤啇而毁拆民壩則又有妨農業欲使啇民兩全惟有寛期補掣之一法臣查夏掣之鹽早已報有成數稍緩時日顆粒難以混淆而各啇省費實多民得蓄水灌田禾稼竝無傷損誠屬兩便之道隨即傳知各啇將已經裝運之鹽按數悉掣其未曾捆運者暫貯在場另期補掣至紹所松所情形大槩相同併飭一體暫停俟得雨疏通之日一併補掣臣於七月初一日回署旋即連得雨澤於二十六七八等日甘霖大沛田禾無藉蓄水壩開而鹽船通行臣即飭行鹽驛道飛催各場將六月三十日以前啇買之鹽照例悉歸夏掣七月初一日以後啇收鹽斤留爲冬掣是夏冬兩期應運之引鹽各歸各掣仍劃然不紊今各所將次掣竣統計本年夏掣引鹽現有五十六萬餘引較上年所掣更有溢餘臣因時權宜雖與成例略有變通而實爲恤啇利民起見不敢拘守固執謹將掣過引數併補掣緣由繕摺奏聞伏乞皇上睿鑒謹奏引鹽驗掣等務朕實未經留意不便批諭是與非也如有變通成例之處仍應咨明該部浙江總督臣程元章謹奏爲奏聞事竊照浙省風俗習尚浮華喜沽名譽其略知文藝者往往尋章摘句摭拾陳言刋刻成書以邀著述之虛名臣蒙皇上髙厚殊恩委任重寄蒞浙之日即通行所屬嚴加禁飭詎有淳安縣告假回籍宛平縣縣丞吳茂育狂悖無知愍不畏法本年十一月初九日據嚴州府禀稱有淳安縣生員吳雰係吳茂育之族兄赴府首告茂育刋刻求志編二本語多狂悖等情并繳原書到臣隨加翻閱其中講學各條𩔖多拾人唾餘毫無心得而評論古今則語言感慨詞氣不平肆口妄談毫無忌憚伏思聖朝重熙累洽我皇上徳被萬方薄海内外靡不傾心向化茂育生逢盛世身受國恩不思感激報効乃敢以無知狂吠刋刻傳播已屬喪心而書首李沛霖序文止書癸卯九月不書雍正元年更干法紀臣披閱之下不勝髮指隨飭密拏去後兹據該府將吳茂育拏解前來并於其家起獲未釘求志編一部與吳雰呈繳之書磨對内多自序五頁書有國朝年號除行按察使劉章嚴審究擬并提吳雰質訊因何兩書序文互異之處一面查明茂育職銜履歴詳革外所有現在拏究緣由竝繳到原書二本又未釘一部相應一併恭呈御覽臣謹繕摺具奏伏乞睿鑒施行謹奏此奏嘉是覽之宜嚴加審究毋涉疎縱大凡匪𩔖之爲害世道生民甚於盜賊何也蓋盗賊確有形迹可憑兼爲成例所限該管有司雖欲怠忽而亦勢所不能至於姦匪之徒或托名斯文或藉口著述儘可置之弗問所以除賊猶易而除匪甚難地方大吏每膜外視之皆係不識輕重欲避勞怨而已豈純臣奉公之居心乎咸似此留心搜訪懲治則若輩自不敢復萌妄念更肆邪說裨益國家造福黔黎實非淺鮮浙省此風向時甚熾自李衞總督以來大半斂跡矣卿當踵而行之以繼其後毋使其故智復萌切不可因遠多事苛求四字之嫌而貽誤於世道生民也果能於斯一節汲汲剗除勝於治理刑名錢穀案件之功不啻什伯相倍卿其謹誌奉行勿替浙江總督臣程元章謹奏爲陳奏事竊照浙省海塘關係緊要仰蒙聖恩特允内大臣海望等所奏添設海防兵僃道一員總理塘工并舊有海防同知一員外復添設一員分管東西兩塘以專責成誠屬有禆臣查兵僃道王斂福前在杭嘉湖道任内年給養亷銀一千六百兩因兼辦海塘公務又增給銀一千兩俟工竣停其添給今調補兵僃道專理仁寧鹽平等縣塘工往來稽察兼之管轄兵馬政務殷繁用度亦多應請照依寧台溫處二道之例每年酌給養亷三千兩外加給僃公銀四百兩以資費用至杭嘉湖道劉復不復兼理塘工似應將續增之一千兩停其給發但乍浦新設滿漢船厰經臣題明委令該道監督料理業經准有部覆則該道督辦船工亦有往返奔馳差遣盤費等項若僅給銀一千六百兩實有不敷應請仍照舊例年給養亷銀二千六百兩以足用度再海防同知每年向給養亷銀六百兩又留給鹽規銀二百四十兩今添設一員自應一例支給養亷其鹽規銀兩不便額外增添應令將舊有之數各半分用至該同知等專辦塘工事務孔殷非閒曹可比應請每年各加給僃公銀二百兩庶辦理公事不致掣肘以上各項銀兩均請於餘耗項下動支事關酌給官員養亷僃公臣未敢擅便理合恭摺奏明伏乞皇上睿鑒批示遵行謹奏覽汝辦理海塘工務甚不副朕所望浙江總督臣程元章謹奏爲恭報晚禾收成分數事竊照浙省晚禾毎年俱於九十月間始行登場今已收穫臣通行飭查據杭嘉湖寧紹台金衢嚴溫處等十一府各報所屬收成惟新城分水烏程歸安四縣夏秋之間雨澤愆期高阜田畝間有一二被旱之處收成不無稍歉其餘各州縣俱有十分九分八分七分不等閭閻小民靡不含哺鼓腹感戴皇仁且當刈穫之時天氣晴和春花豆麥均已布種齊全十一月初連得甘霖滋􅃳現在長發而十三十四二十一等日又獲瑞雪八九寸及四五寸不等四野均霑來歳春熟豐稔更可預期至杭嘉湖三府米價毎石一兩二三錢及一兩五六錢不等上游寧紹台金衢嚴溫處八府每石八九錢及一兩一二錢不等除晚禾收成細數臣另摺分晰恭呈御覽外所有浙省雨雪情形暨米糧價値理合一併奏聞伏乞睿鑒謹奏浙省晚禾收成分數米糧價値并雨雪情形以手加額覽焉浙江總督臣程元章謹奏爲奏聞事竊查浙省地廣人稠秀頑不一其間游手好閒之輩妄作非爲煽惑人心冀生事端不能保其必無所以臣到任後隨通飭文武員弁留心稽察先事預防毋許疎忽兹據衢州府知府楊景震禀稱率同署江山縣知縣陳廷訓親往該縣青湖峽口仙霞嶺念八都及閩省浦城交界一帶深邃處所查勘情形訪得江邑念五都民人王益善蹤跡詭秘交結匪𩔖學習拳棒正在查拏間有該犯堂叔王攀雲因見追拏嚴緊懼累呈首前來當即拏獲王益善并起出僞劄一張訊據供係陳明章在詹人文即詹子彬家拏來又周廷鳳亦得僞劄一張等語即委員密拏詹人文陳明章周廷鳳三人到案據詹人文供稱僞劄係江西玉山縣民吳士榮私造給伊散賣又同祝皆照式翻刻轉給陳明章周廷鳳王益善王昌禹等所刋木板已經銷煆其磚刻印子尚在祝皆家内等情稟報到臣查詹人文等結納匪𩔖謀爲不軌私造僞劄輾轉散布事關叛逆且僞劄上寫奉主字樣必有主謀爲首之人分給僞劄定不止此數張恐有私藏花名册籍除一面飛差標員星往該地方并密飭衢州府楊景震衢協副將葉應龍各委員㑹同按址協拏吳士榮等追起僞劄刋板究出造意首犯并查餘黨及有無巢穴地方密拏全獲務盡根株嚴審明確律擬招解一面密咨兩江督臣江西撫臣飛飭所屬查拏移解來浙收審竝移咨閩省督撫臣一體嚴查毋使潛匿鄰境外所有查拏匪𩔖緣由相應繕摺奏聞并將王益善名下起出僞劄一張一并齎呈御覽伏乞皇上睿鑒施行謹奏覽訪獲匪𩔖情由殊屬可嘉之至封疆大臣能如此留心地方朕復何慮嚴拏各犯徹底追究務盡根株毋存絲毫畏避煩瑣茍簡完結之心倘隣省奉行不力據實摺奏以聞浙江總督臣程元章謹奏爲陳奏事竊臣前奏淳安縣告假回籍宛平縣縣丞吳茂育狂悖無知私刋求志編一摺奉有硃批諭旨臣跪讀之下仰見我皇上明竝日月洞徹姦宄情形實有關於致治之本源臣荷聖恩簡任封疆凡地方姦宄邪說無不留心體訪密行查拏嚴加懲治務期姦匪邪說悉除根株俾風俗淳良人心警惕以仰副聖世一道同風之至治除吳茂育一案現在嚴審從重究擬外今欽奉硃諭理合繕摺奏覆爲此謹奏闢邪說以正風俗懲姦匪以警人心能見及此殊屬可嘉浙江總督臣程元章謹奏爲奏聞事竊照查拏江山縣匪𩔖王益善等交結散劄謀爲不軌一案經臣將拏獲各犯幷追起僞劄緣由兩次具摺奏明兹正月二十二日又據衢州府禀稱訊據吳士榮之父吳汝昆供稱伊子十來年前有箇江西省城齋堂裏姓傅的呌傅廷兆一箇李子蘭一箇姓王不記得名字當年都到玉山地方來算卦兒子因與他熟識引誘起的或一年去一回或二年去一回那齋堂在撫院衙門近邊前年兒子在齋堂裏拏了兩張劄付回來小的親眼見過給了詹子彬一張祝龍即祝皆一張小的兒子又說封他文陽王是正的那劄付上的主字就是王師父的兒子也在齋堂内不曉得他名字目今小的兒子或逃在那裏去亦未可定等因禀報前來臣細查吳汝昆供情則此案首惡自屬江西之人除又耑差臣標守僃龔炳帶同弁兵星飛前往一面密咨江西撫臣添差弁員協同密拏有名各犯務獲撥兵䕶解來浙究審外相應繕摺奏聞伏乞皇上敕下江西撫臣速行一體查拏務盡根株嚴押解浙歸案究擬庶姦匪不致漏網而重案得以速結矣爲此謹奏已降有嚴旨申飭謝旻矣前諭甚悉竭力遵奉而行浙江總督臣程元章謹奏爲奏聞事竊照匪𩔖王益善等交結散劄謀爲不軌一案屢據衢州府禀報陸續拏獲各犯追起僞劄幷供出爲首及夥黨住址多係江西之人經臣節次耑差標員密咨江西撫臣添差弁員協拏解浙竝三次繕摺奏明兹正月二十七日又據衢州府禀報續獲夥犯鄒英士訊據供係江西撫州府宜黃縣人原同傅秀山吳士榮李繼清啇謀做的傅秀山即傅廷兆是軍師住在江西省城總城隍廟間壁楊家厰地方曾對小的說奉的主呌黄森官今年二十來歳了就是江西省城齋堂内黃師父的兒子黃師父是豐城縣人如今現住在省城那傅秀山還對小的說封禁山有好多人在那裏也是扶助這黃森官的因李子蘭同一箇不知姓名的老生他們曉得黃森官是主情願扶助他的那黃森官實是草頭黃姓不是三畫王姓前說王姓是吳汝昆錯供的紫薇星彌勒佛就是黃森官一人前吳士榮於正月十三日半夜到小的家說這事破了拏了一把􅐸逃往江西省城齋堂同傅秀山啇謀去了他們若到省躱不得必往豐城縣黃森官家裏去了黃森官住在豐城縣鄉裏蓮塘地方離縣有三十里地名呌小崗口傅秀山甥女就是黃森官之妻有箇舅子呌胡元龍那齋堂内還有李子蘭父親李孔瑞又有貴溪縣人胡海濱都是同夥俱在省城等情錄供具禀到臣除臣又耑差標員星飛前往并密咨江西撫臣添差按址協拏有名各犯務獲撥兵䕶解來浙究審并査明封禁山係何縣所屬夥黨聚集若干立即設法密拏全獲務盡根株外所有續獲匪犯訊供緣由合再繕摺奏聞伏乞皇上敕下兩江督臣江西撫臣一并嚴拏解浙歸案究審按律定擬庶匪犯不致漏網而地方得以寧謐矣爲此謹奏覽奏知道了已經密諭該督撫遵照矣浙江總督臣程元章謹奏爲奏聞事本年正月初四日准吏部咨奉旨王紘補授安徽巡撫刁承祖調補浙江布政使欽此移咨到臣隨即轉行欽遵去後伏思藩司爲通省錢糧總滙度支出納關係甚重未便一日乏員辦理刁承祖逺在河南且有經手錢糧交代之事一時未能即至而王紘係特奉恩命簡任封疆又難久待臣再四酌量查同城之按察使劉章刑名事務繁多勢難兼顧糧儲道朱倫瀚又値辦漕押運赴淮亦不便委署惟鹽驛道張若震年力富強辦事勤愼堪以就近暫委署理已於本年正月二十日接印任事王紘隨將庫貯錢糧交明於二十九日起身赴皖所有暫委署理藩司印務緣由理合繕摺奏明伏乞皇上睿鑒謹奏所委甚屬允當浙江總督臣程元章謹奏爲奏明首犯就獲事竊照江山縣匪𩔖王益善等交結散劄謀爲不軌一案據各犯供稱爲首係江西省城齋堂内黃師父即黄廷臣之子黄森官經臣節次耑差標員密咨江西撫臣添差協拏解浙去後兹二月十七日據守僃龔炳禀稱於二月初五日已在江西齋堂内拏獲李子蘭李孔瑞幷首犯黄森官之弟黄林官三犯其黄森官父子逃往豐城縣現在飛拏等語又於十八日據南昌府知府楊毓健禀稱飭委署經歴司郭克恭協同臣標差員星夜密往豐城縣查拏隨於初八日據報已將黄森官及伊父黄廷臣拏獲并於黄森官家拏獲吳易盛等其先獲之黄心寛即黄林官李子蘭供出之犯現在嚴拏另禀等情同日又據衢州府知府楊景震禀報續獲匪犯張齊雲周徳二名并追起僞劄二張僃錄訊過供情具禀到臣除即分飭各該府無分疆界星飛選差按址密拏有名各夥黨務期全獲解歸浙省發覺地方嚴審究擬毋使姦匪稍有漏網外所有爲首渠魁已經就獲幷續獲夥犯僞劄緣由合再繕摺奏聞伏乞皇上睿鑒謹奏據奏渠魁已經就獲俟押解到案時遵照前諭嚴審定擬可也浙江總督臣程元章謹奏爲奏明米糧價値雨水情形仰慰四錢民食有賴入春以來又幸雨水調勻菜花豆麥俱各暢茂目下天氣溫和正在育蠶將來豐收可望緣米糧價値雨水情形關係地方民生均厪聖懷理合繕摺奏聞謹奏覽浙江總督臣程元章謹奏爲陳奏事竊查臣衙門養亷一項經前督臣李衛奏留總督一半養亷銀五千兩并舊有鹽政衙門公費銀四千八百兩以資用度又奏明每年兩次掣鹽每掣有規費銀二千兩爲本身公事犒賞等用至恩賞巡撫毎年養亷銀一萬兩存於藩庫抵補從前無著虧空迨後虧空已經補足前督臣李衞因用度不敷具摺奏請奉旨准其動用欽遵在案但臣素甘淡泊諸事儉樸辦事奴僕不過十餘人每年公事犒賞只須千金上下既有總督養亷五千兩鹽政衙門養亷四千八百兩再加掣規一項除犒賞外每年約有三千兩共計一萬三千兩臣謹身節用已敷辦理三衙門之用其巡撫養亷銀一萬兩臣到任以後竝未支取仍存藩庫以充地方有益公事之用所有臣任内動支養亷緣由相應據實奏明伏祈皇上睿鑒謹奏從前李衞督浙朕尚以爲不敷在程元章今日即減至此數朕猶以爲過分捫心自問方知毋斤斤以潔已爲得也若仍執迷不克返省則受恩重者罪亦匪輕將來陷溺既深恐莫之能援矣督撫重任非權巧作用所能負荷惟竭誠格天抒忠許國此外别無良策詳思而審處之可耳浙江總督臣程元章謹奏爲欽奉上諭事本年六月十三日接准大學士鄂爾泰張廷玉字寄内開雍正十二年五月二十四日奉上諭昨據隆昇摺奏海塘引河告竣請定善後事宜數條朕已諭令隆昇㑹同程元章詳悉定議具題請旨朕思善後事宜固應設立規條然亦必須該地方官實心奉行始有裨益況沿海沿江居民刮沙瀝滷每不樂於河道之疏通保無有作姦舞弊以圖自便其私者此等稽查防範皆地方官之責程元章始初辦理此事識見不及今辦理既有成效程元章更當合志同心成此捍患禦災之善舉倘稍挾私衷回䕶一已顔面惟願淤塞新開引河以顯已是於地方公事不竭力經理以贖前謬以致有司怠玩懈弛奸民因而騁志有一於此則程元章之身家性命繫焉爾等可作字傳諭程元章知而愼爲之欽此遵旨寄信前來等因到臣臣跪讀之下不勝悚愓恐惶愧悔交并伏念浙省海塘關係重大仰䝉我皇上睿慮周詳特降諭旨於中小亹地方開挖引河一道分江流入海以減水勢著臣等相度地勢酌量辦理臣隨詳加察勘因見地勢東邊微高西邊微低挖至數尺之下即係瀾沙恐難成功是以冒昧陳奏今開挖成河南北兩岸居民靡不歡欣鼓舞感戴皇上而沿海竈丁向來刮沙瀝滷必用車載肩挑八里十里之逺始能裝船運竈兹河既通一葦可航往諭旨既感且愧所有善後事宜臣與隆昇詳悉妥議㑹題至地方官敢有怠惰不力及奸民從中舞弊者臣不時㕘拏以儆怠玩而懲刁風務使引河暢流裨益塘工以仰副我皇上愼重海疆軫念生民之至意所有欽奉上諭緣由理合恭摺覆奏伏祈皇上睿鑒謹奏覽浙江總督臣程元章謹奏爲跪讀訓旨感激覆奏事竊臣陳奏雨水情形米糧價値一摺蒙硃批朕之福全在汝等封疆大吏秉公竭誠有以感召天和風雨調順庶冀物阜民安化行俗美朕端居九重與有榮焉若人各潔身自便而不圖惟國事惟計一己之害而不顧萬民之利必至百務廢弛地方彫敝朕福從何而來浙省連歳歉收朕業既薄福何一旦仰賴洪福而遂俱獲豐收耶此等虛浮之奏經朕屢次訓飭已將硃批諭旨刋刻頒賜汝等矣程元章獨無心目乎莫非天奪其魄而使然乎朕實代汝憂之欽此臣跪讀之下汗流浹背感激悚惶伏念我皇上訓諭封疆大吏事事務公誠而不務虛文念念在民生而不在一已乃臣熟聞讀訓旨感激微悃理合恭摺奏謝天恩謹奏觀汝景況朕所頒賜硃批諭旨總未過目也昏瞶錯謬何至於此浙江總督臣程元章謹奏爲陳奏事竊臣於六月二十四日偶感時證身發寒熱時發時愈十有餘日臣雖勉強支持辦事而醫家謂大汗之後避風數日最爲𦂳要所以適當兩次拜本之時臣不得已委中軍副將雷逢春在大堂跪拜臣在内堂亦復望闕九叩頭所有臣偶感時疫委官二次代拜本章緣由臣不敢不據實陳明謹奏將國家公務一如爲已之周詳細緻何事不辦何政不理耶浙江總督臣程元章謹奏爲恭報晚禾收成分數事竊照時當冬月正晚稻刈穫之候行據各府將收成分數開報前來臣查嘉興紹興二府所屬俱有十分收成其餘杭州湖州寧波台州金華衢州嚴州溫州處州等九府各屬俱自七分至十分不等收成各屬自入秋以來雨暘時若晚禾秀實俱穫豐收目今天氣晴和春花豆麥漸次插種齊全將來豐稔可期各府米價自七八錢至一兩二三錢不等居民樂業地方寧謐所有田禾收成米糧價値理合恭摺奏聞伏祈皇上睿鑒謹奏據奏浙省晚禾豐收米價平減欣慰覽焉總督專管浙江巡撫臣程元章謹奏爲恭謝天恩事本年十一月十二日接准吏部咨開雍正十二年十月十六日内閣奉上諭向以浙江吏治營伍俱須整理而浙閩總督駐劄閩省未免隔越是以特授李衞爲浙江總督兼管巡撫事務此係因時制宜隨材任使一時變通之政事竝未永著爲例也今浙江事務經李衞辦理以來已漸整頓而程元章又切以伊之才力難兼總督巡撫鹽政三重任恐致曠誤爲辭頃郝玉麟來京陛見朕看其才具精神足以貫注兩省著仍照舊制命郝玉麟爲浙閩總督程元章以總督銜專管浙江巡撫竝兩浙鹽政事務等因欽此移咨到臣臣跪讀之下不勝感激涕零伏念臣謭陋庸才䝉我皇上知遇宏恩畀以全浙重寄兩載以來時切悚惶誠恐𦂳要封疆稍有曠誤有負皇上任用之至意是以不揣冒昧據實奏請另簡賢能赴浙任事容臣趨叩闕廷朝夕跪聆聖訓俾獲敬謹遵循力圖報稱今奉恩旨將總督事務仍照舊制歸於閩省督臣管理命臣以總督銜專管巡撫鹽政則責任既分或可竭蹶辦理不致隕越聞命自天感激無地臣惟有殫竭駑駘心力倍加奮勉以冀仰報聖恩高厚於萬一除總督事務現在料理清楚俟福建督臣郝玉麟到浙移交接辦外所有臣感激愚忱理合恭摺奏謝謹奏向日李衞督理浙鹽可謂盡善近聞兩浙鹺務頗不及前似有漸至廢弛光景愼爲之虛譽未必能抵實禍偷一時之安致無窮之累當審度之莫忽總督專管浙江巡撫臣程元章謹奏爲陳奏事竊惟國家設立鹽政因天地自然之利用以裨益羣生上裕國課下資民食其間恤啇養竈良法美意無不僃至惟在司事者調劑得宜斯能行之無弊臣查兩浙年額行銷正引七十萬一千六百九十餘道從前行引地方半爲私梟侵占而松江一所爲尤甚以致引壅課絀自前督臣李衛兼理以來加意整頓禁逐私梟銷清歴年壅引至雍正七年起每年兩掣溢銷餘引二三十萬道不等臣接任辦理一切掣驗運銷事宜仰遵聖訓恪守成規而於督緝私鹽創懲梟販尤不敢一刻懈怠數年以來不獨積販巨梟必按律究擬即零星小販亦未嘗少存姑息是以現今兩浙各所引鹽俱獲廣銷無滯計臣任内掣數毎年俱銷餘鹽三十餘萬引溢餘課費等銀二十五六萬兩不等年銷年引年清年款啇人亦各踴躍急公竝無誤課較前歴掣有盈無絀此皆仰蒙我皇上訓示周詳俾臣得以遵循辦理臣斷不敢以現在掣數有增稍存怠忽之心惟有倍加整理防微杜漸留心督緝務期私梟斂跡官引廣銷以仰副聖主整飭鹺綱之至意所有臣歴掣遵循辦理緣由理合據實繕摺奏明伏祈皇上睿鑒謹奏鹽務之整飭廢弛人所共知共見顯然有據何在多言但李衞之整飭乃出於公忠體國任勞任怨非歸怨於上邀譽於下以示不得已於屬員兵民之舉耳鹽務倘稍至廢弛不妨更令李衞赴浙督辦自復就緒彼時不知程元章何顔立於當世也勤愼爲之總督專管浙江巡撫臣程元章謹奏爲陳奏事竊查兩浙竈地配丁辦課之外海塗漲沙廣濶可墾之地甚多祇以外無堵禦潮汐往來種植無益遂致淪棄水濱今竈丁生齒日繁地未加廣各竈謀食維艱煎鹽辦課多有拮据臣思地有餘利人有餘力誠能因民之利而利之勸導鼓舞築塘以禦潮汐建閘以資蓄洩則塘内沙塗均可開成沃土雖竈地科則甚輕於民賦然使窮丁衣食有資安心煎鹽辦課實於鹺務更有裨益臣先於鳴鶴一場立法勸諭飭令場員趙湘按丁築塘按丁分地不許豪强霸占各丁歡欣踴躍爭趨赴工不一月而告成報墾地一萬四千餘畝經臣具摺奏明臣又通行各場鼓舞勸導如有此等棄置沙塗飭令一例興築旋據附近鳴鶴之清龍石堰二場竈丁覩此築塘利益咸願接築土塘現在興工舉行其餘各場亦皆聞風踴躍咸願按丁出力計丁分地一體興築惟是土塘之中尚有應建閘座以僃蓄洩之處因工費無出羣相籌畫臣思築塘墾地贍養窮民乃地方有益公務今竈丁既願各出已力挑築數百里之土塘已省數萬兩之工費若再令其捐建閘座竊恐民力不能仍致觀望推諉臣查兩浙衆商公用引費加意撙節毎年遞有節省餘銀除將臣任内四掣節省銀兩兩次奏充海塘工費外臣請將第五掣節省餘銀酌撥爲建閘工料之用庶不費民財而工程易竣臣現在飭令該管道府縣場各官并遴委勤幹能員分場督勸實力舉行如有必需建閘之處確估工料造册詳請酌給工完核實報銷現今各場竈丁咸知樂利莫不歡欣踴躍感戴皇仁爭趨挑築容俟工竣之日丈明墾田實數同動支建閘銀兩分别造册送部陞科報銷查明實心任事之員奏請恩旨議敘外臣謹將勸築塘堤建閘開墾事宜繕摺陳奏伏祈皇上訓示遵行謹奏但還朕是當二字何不可之有總督專管浙江巡撫臣程元章謹奏爲據實奏覆仰祈睿鑒事本年四月十六日接准大學士臣鄂爾泰張廷玉字寄内開雍正十三年四月初一日奉上諭有人密奏浙江仁和縣知縣錢學洙貪婪各款似此不法劣員朕尚聞知程元章身爲督撫何以漫無覺察爾等可寄信密問程元章竝將各款寄去若其中果有確實之處著即具本嚴㕘欽此遵旨寄信前來并款單一紙到臣臣跪讀之下不勝悚惕伏念臣以庸愚荷蒙聖恩高厚簡畀封疆重任察吏安民乃係專責況仁邑附郭省㑹屬在同城尤宜不時留心體察今奉諭旨詢問著將各款查明其中果有確實之處具本嚴㕘仰見聖明整肅官方務期核實之至意臣欽遵諭旨謹按款單逐一細加察查均無實據查錢學洙年力強壯辦事尚屬勇往操守亦謹但其爲人過於剛執不避嫌怨者有之臣荷聖主知遇隆恩惟矢此一念愚誠冀圖仰報萬一斷不敢於屬吏劣蹟稍存徇隱自蹈欺罔之罪臣謹按原開各款逐一分晰另單呈覽外所有欽奉上諭緣由理合繕摺據實奏覆并將款單恭繳伏祈皇上睿鑒施行謹奏果如是則前奏爲不確矣但其中若稍有徇庇屬員回䕶已失情故則日後領罪不起也當切加訓誡錢學洙令其勉力奉職特諭總督專管浙江巡撫臣程元章謹奏爲恭報春花收成分數事竊照浙省今歳入春以來雨水調勻春花豆麥俱各暢茂時當仲夏刈穫登場行據各府將收成分數開報前來臣查惟紹興府屬收成均有十分其餘杭嘉湖寧台金衢嚴温處等十府所屬收成九分十分者居十之三八分者居十之五六分七分者居十之二而杭嘉湖三府屬所育蠶絲亦各收成八九分不等當插秧之候正値霉雨時行早晚二禾俱已布種齊全現在青葱長發秋成可望各府米糧每石自七八錢至一兩一二錢不等價値頗平居民樂業地方寧謐所有春花收成米糧價値理合繕摺奏聞伏祈皇上睿鑒謹奏朕訪聞浙省三郡因春寒蠶絲頗屬不及今乃云八九分收成殊與前聞不符是何故也硃批諭旨卷二百十一下
