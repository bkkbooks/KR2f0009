body:
  text: 欽定四庫全書硃批諭旨卷十九上硃批黃國材奏摺雍正元年正月十七日福建巡撫臣黃國材謹奏為請旨事竊臣於康熙六十一年十月二十一日䝉聖祖仁皇帝特旨補授福建巡撫臣跪聆聖諭福建旗下官兵甚屬驕悍動輒鼓噪藐抗將軍副都統前為銀兩細事即欲砌將軍衙門督撫膜視總不料理此等刁風漸長斷然不可寬恕嗣後再有似此犯法之人爾即請出王命將為首者不論官兵即行正法餘黨俱解送來京當差如將軍尅扣兵餉縱兵害民亦即據實題參更有一種姦惡之徒唆人妄為及被唆之人身罹重罪他却躲避竟得漏網若此等輩尤宜留心查出重處將朕此旨下與李樹德滿保欽此欽遵臣出京路過山東巳遵旨傳知李樹德到閩之日亦傳知滿保一體欽遵訖今宜兆熊奉皇上特旨補授福州將軍到閩之日應否將聖祖仁皇帝訓旨下與宜兆熊欽遵之處臣未經奏明不敢擅便理合摺奏伏乞皇上指示遵行謹奏皇考約束駐防官兵寓寬於嚴聖諭明切自應傳示宜兆熊永遠欽遵雍正元年三月初六日福建巡撫臣黃國材謹奏為奏聞事查得福建地方仰賴聖主福庇今年正月二月各府州縣雨水俱各霑足將來油菜二麥可望收成目下福州興化二府米價每石一兩泉州漳州二府每石一兩一二錢不等延平建寧汀州邵武等府每石九錢一兩不等臺灣府每石七錢八錢不等理合奏明以慰聖懷謹奏覽奏雨水米價情形俱悉爾此番撫閩稍不及向日聲名勉之同日又奏為奏聞事竊查各省駐防官兵子弟䝉恩豢養皆有志讀書苦無上進之階欲回京應試則微辨窮兵進京路逺盤費艱難可否推廣皇仁恩准駐防官兵子弟令其就近聼該省學臣考試酌量許進文武生員幾名遇鄉試之年仍令赴京鄉試庶八旗子弟益加鼓勵讀書得以上進皆我皇上造就之天恩也是否可行出自聖恩為此具摺謹奏駐防官兵子弟赴考京師行李維艱之處朕亦曾念及但外省設立駐防原為彈壓地方起見專以武僃為重准其子弟科舉已屬特恩若竟令隨本省民人就近考試恐皆爭尚虛文從風而靡殊與重武僃專防禦之本旨不符非美政也雍正元年四月二十五日福建巡撫臣黃國材謹奏為叩請聖安並懇皇上節勞頤養事欽惟我皇上至孝性成每因追念先帝悲痛倍深親送梓宮奉安陵寢躬捧神主回京往返跋涉聖躬過勞今先帝大事已竣伏乞皇上念宗社為重悲痛之思勉加節減即萬幾待理亦望皇上少為節勞不致過費聖心則孝治益𢎞皇圖永賴實天下臣民之至幸也臣受恩深重犬馬戀主之忱情不自巳用敢具摺叩請聖安並懇節勞頤養為此謹奏覽爾摺奏情詞懇切巳悉愛敬之誠滿保處存有密旨甚明無庸為朕過慮也同日又奏為請復熱審減等之例以廣皇仁事伏查聖朝定例自順治八年奉有熱審減等之條遵行甚久康熙四十三年停止熱審蓋恐罪人希冀減等挨延時日不無夤緣賄縱之弊是先帝杜絶陋弊之至意臣何敢瀆奏請復但近年以來凡遇夏月必䝉特沛恩綸暫釋刑具仰見先帝格外哀矜猶寓減等之盛心臣見閩廣地方潮濕監犯之苦更甚伏思皇上慎重民命直省讞案必親加詳察多豫矜全我皇上好生之德真同高厚臣愚以為此夏日罪囚似宜仍復熱審舊例准其減等如慮延挨幸免則嚴飭各官凡有罪犯按限完結毋聽胥吏作弊遲延有犯此者除本犯不准減等外官吏嚴加議處如此庶囹圄之內悉䝉寬恤之仁作弊姦胥亦凛處分之重矣是否可行恩出聖主為此謹奏此事朕經特降諭旨巳列於聖祖入廟詔條之內但入廟擇期尚在九月目今熱審將屆減等之恩遲則今歲不及矣爾所奏甚是現在發部議行雍正元年五月十四日福建巡撫臣黃國材謹奏為恭繳硃批事雍正元年五月初六日臣齎摺家人回閩捧到臣奏請將駐防官兵子弟就近考試一摺奉皇上御批到臣臣跪讀之下仰見皇上天縱聖明睿慮至深極遠臣知識短淺實實見不及此詳繹諭旨自知冒昧不勝惶悚謹將御批原摺恭繳伏乞睿鑒謹奏覽奏已悉但不可因此沮抑遂畏懼而不敢言不寧惟是即朕特降之諭旨如有牽制難行無益於地方民生處不妨封固繳奏將爾所見僃悉縷陳君臣內外互相參酌必求合於盡善而後舉措方可免謬舛疏漏之虞書曰汝無面從退有後言若一切阿順勉强遵奉非朕所望於爾等之意也總之爾但自省可以告之天地鬼神而不愧怍之事勇往直前坦然為之即誤被朕所嗔責亦何懼之有倘計不出此而惟瞻狥迎合是務雖或一時幸邀朕之奬賞其如昭昭在上凛然難欺何爾等領會朕意勉力講求一箇是字盡心圖維一箇當字則一生之能事畢矣志之同日又奏為恭繳硃批事竊臣齎摺家人回閩捧到臣奏雨水年成一摺奉皇上御批到臣臣跪讀之下不勝悚惶羞愧之至伏念臣祖父子孫世受國恩即肝腦塗地實難報稱今䝉皇上不加譴責恩賜教誨臣惟有欽遵諭旨凡事實心效力仰報皇上眷注之恩於萬一但臣年已六十四歲精力日衰邊海地方事務紛繁惟恐思慮不到難免錯誤叩懇皇上不時教訓俾臣得免隕越實為至幸為此具摺叩謝洪恩并將御批原摺恭繳謹奏君臣為五倫首重內外本一體相關惟宜中正真實同心合德彼此期於披誠無間而已人非聖賢孰能無過偶然錯誤勿慮朕不為爾原諒也同日又奏為奏聞事竊查福建地方今年油菜二麥收成豐足米價平賤已經繕摺奏聞現今四五兩月各府州縣雨水俱各霑足早稻十分茂盛目下米價福州府每石九錢一兩不等興化泉州漳州等府每石一兩至一兩一錢不等建寧延平邵武汀州等府每石九錢一兩不等臺灣府每石八錢九錢不等地方寧謐百姓俱各安居樂業理合具奏以慰聖懷為此謹奏據奏雨水霑足地方寧謐民咸安居樂業此皆爾等督撫正己率屬措施合宜感召天和之所致也勉之雍正元年七月二十九日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩恭捧臣前奏雨水年成一摺奉有御批到臣跪讀之下不勝感激惶悚之至伏念我皇上踐膺寶位以來仁覆同天愛民如子用是上感天心甘霖時沛臣勉循厥職時切隕越之懼曷克感召天和乃䝉聖語褒嘉勉勵臣惟有恪遵訓旨以期無負奬勵訓勉之天恩所有奉到御批理合恭繳再查福建福州等各府地方於七月十七八九等日俱得大雨田疇霑足臺灣府地方雨水亦俱霑足晚稻禾苗茂盛米價七八錢不等合併奏聞以慰聖懷謹奏雨澤優渥大慰朕懷凛兹上蒼之眷顧倍勵臣節之清勤勉之敬之同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩恭捧到臣奏繳硃批事一摺奉有御批臣跪讀之下仰見我皇上訓誨周詳綸言諄切臣恭遇堯舜之君惟自愧無報效之實何敢畏懼不言以負廣咨博詢之至意凡有一得之愚或稍有益於國計民生之事無不據實直陳仰祈睿鑒至於一字欺隱一言迎合欺聖主以欺天臣雖至愚斷不敢為也所有奉到御批理合恭繳謹奏果如所奏將見我君臣治隆福集用敷錫厥庶民而蒼生被澤無窮矣期共勉之同日又守僃有應援全省之責必得諳練營伍熟悉地方形勢者庶幾可收實效今有臣標中軍左營遊擊員缺查有臣標右營遊擊蘇明良整飭營伍訓練兵丁洵屬能員以之調補誠為人地相宜銜缺相當至右營遊擊員缺查有臣標右營中軍守僃陳棟年富力强才猷練達堪以補授其右營守僃員缺查有臣標左營千總連英人材壯健技勇兼優堪以補授又臣標左營守僃楊士虎身故員缺接准部咨令於年滿千總內考驗題補但恐人地未必相宜查有臣標左營千總徐德年力精壯弓馬熟嫺堪以補授臣查陳棟係署守僃小銜又定例守僃缺出將部發年滿千總補放現任千總不准題補與例均屬不符部議必不准行但福建地方非比內地臣之標員非比外營叩懇皇上逾格施恩准其補授實於地方營伍大有裨益矣理合具摺奏明伏乞睿鑒謹奏海疆重地緊要員缺應以得人為務原不必拘於成例膠柱鼓瑟也具本時將與例不符之處僃細聲明朕自有裁奪雍正元年八月十二日福建巡撫臣黃國材謹奏為請禁服色僭越以維風俗事竊查風俗奢靡由來巳久服色條例歷經遵旨飭禁在案而奉行者視為具文僭越者毫無忌憚臣思章服為上下尊卑體統所繫豈容紊越況物力艱難尤宜愛惜臣歷任外吏目擊地方淳朴者頗多殷實貧瘠者必係奢靡而邇年臣在京師親見八旗風俗大抵崇尚奢靡悉因衣服貴賤相同上下無别是以毫無約束不知節省臣愚以為欲致百姓之富庶旗人之殷實必以嚴禁奢侈分别服色為先臣請皇上嚴禁僭越杜絶奢華凡在京在外現任官員每日按品俱穿補褂其有職未仕之人許穿暗織補服至白丁下賤人等止許穿黑色布匹不得混穿各色綾羅錦縀以及貂皮狐皮種種冠服違者以僭妄論從重治罪如是則以次節儉返朴還淳風俗以正民生以厚矣臣冒昧奏聞是否可行仰祈睿裁謹奏此奏切中時病在廷羣工比比奏請奢僭之弊朕亦稔知但以陋習因循巳久一旦遽然禁止若非立法嚴峻有犯無宥不能使之永遠遵奉揆之於理移風易俗宜漸不宜驟究以從容不迫為貴爾等內外諸卿姑且徐徐勸導誘掖維持倘仍不改革然後嚴為定制以法繩之耳朕御極之初諸務未遑豈宜汲汲舉行此事耶稍遲歲月朕另有處置所奏甚是雍正元年九月十一日福建巡撫臣黃國材謹奏為恭繳諭旨事竊臣齎摺千總回閩臣跪接特頒諭旨捧讀之下仰見我皇上愛養百姓惟恐弗周防範地方惟恐弗至從古帝王未有如我皇上之教養兼施於安民戢盜之宜若此之仁無不育明無不照者也臣查得閩省自前任撫臣覺羅滿保通行社倉捐貯穀石現存四萬餘石今年仰賴以示勸懲至胥役兵丁串通地方匪類賭博竊盜貽害良民臣當遵皇上化民成俗之至意總之臣受恩深重䝉諭旨理合恭繳謹奏覽奏情詞真切所行必力甚屬可嘉勉為之同日又奏為奏聞事竊督臣覺羅滿保與臣面商浙江地方今年雨水短少米糧不能接濟寧波等處民食維艱福建今年雨水調勻各府秋成可望米價平賤欲將福建省城撥米五千石臺灣府撥米五千石由海運至寧波等處地方減價平糶以濟民食除現在督臣會臣行文地方官撥運外理合奏聞謹奏移粟平糶以濟鄰封誠為善舉凡為督撫大吏者當思寰宇之內莫非王民自應視為一體何分彼此之見耶雍正元年十月初六日福建巡撫臣黃國材謹奏為奏聞事竊臣蒙皇上種種天恩有加無巳臣自問何人膺兹眷顧雖永矢捐糜莫能仰報臣自到閩以來查得建寧府延平府至福州府地方山路崎嶇行走艱難臣捐銀委官修理平寬又查此三府水路俱係灘河險厲非常臣捐資協同督臣委官修鑿又臣准部文賞給琉球國王使臣人等縀布等物臣俱置辦照數賞給又省城內有鰲峯書院一所係生童讀書之地年來房屋傾圮臣捐資修葺又查臣標兩營馬步兵丁衣衫藍縷臣捐資置僃布衣一千四百套按名給與其器械旗幟已收拾整齊鎗手火藥俱捐資給與將僃千把頭目亦俱給與銀兩衣服等物以示奬勵哨船朽壞臣俱捐資修造又查福州府城垣年久不無傾圮之處臣會同督臣捐資修葺凡此皆臣分所當為何敢奏瀆宸聰惟是臣仰見一切有關地方有益民生之事無不上厪聖懷合將臣到閩以來捐辦各事宜具摺奏聞以稍紓睿慮於萬一伏祈聖鑒謹奏大抵凡事惟宜務實果有其實不待爾之陳奏朕亦頗能照察也勉力為之雍正元年十月十八日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事竊臣齎摺把總回閩臣跪開賞賜黃匣奉到臣前奏調補撫標官員一摺奉有硃批臣捧讀之下仰見皇上洞鑒邊海地方緊要營伍務在得人雖與例不符皇上自有聖裁凡屬將辨莫不感戴天恩踴躍奮勵實心效力仰報主恩於萬一所有奉到御批理合恭繳叩謝天恩謹奏古人內舉不避親外舉不避讎舉賢薦能總要出於至公無私經云知人則哲在聖人猶以為難若欲所舉之人始終不渝更為不易惟公之一字既可以弭衆論亦足以釋已之遺憾其要訣未有過於此者至於營私射利之輩種種不一則不可同日而語矣有寧候朝廷選用人來向其需索而不肯為擔干係者有舉後向之索取者更有貪叨之徒併此等干係都不暇顧慮惟估定價值擇其數多而從之者似此尤為可憐也若非但知有國而不知有身之人不能勝封疆之任亦斷不可操薦舉之衡且觀人之法宜信目勿信耳必考其實行以品定賢否毋因其語言面貌而被所愚惑也切諭將此諭與滿保看爾省中凡有保薦之任者皆使知之雍正元年十一月初九日福建巡撫臣黃國材謹奏為奏聞事竊查今年福建地方晚稻豐收業經臣具摺奏聞自十月以後又陸續得雨米價照前八九錢一兩不等又前經督臣滿保㑹商於福建省城併臺灣府共撥米一萬石運至寧波平糶亦經奏聞嗣因浙江象山定海等處地方需米接濟經督臣將福州府撥米改為七千石臺灣府撥米改為一萬石遣官分送不日俱可抵浙合併奏聞以慰聖懷謹奏覽奏已悉深慰朕懷同日又奏為遵旨奏明再叩天恩事竊臣前奏懇皇上天恩請將臣標千總連英徐德二人補授臣標左右兩營守僃緣由一摺奉硃批海疆重地以得人為務具本時將與例不符之處僃細聲明朕自有裁奪欽此今准兵部咨開議得臣前題請以千總連英徐德補授臣標左右兩營守僃之處與例不符均無庸議等因但臣查千總連英徐德雖與例不符然在閩日久誠為人地相宜是以臣於七月二十七日一面具疏保題并具摺叩懇天恩破格補放已蒙聖明洞鑒今部議不准臣謹遵諭旨將與例不符緣由聲明另行具本題請外理合具摺奏明仰祈皇上格外施恩准將千總連英徐德補授臣標守僃則於地方營伍實有裨益矣伏乞皇上恩准施行謹奏前者朕於部覆時偶爾忽略矣君臣之間事事皆當如此推究方無舛誤之失果能自信無歉一切不必畏縮若稍有疑二則宜愼之雍正元年十一月十九日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏撥福建米糧接濟寧波地方平糶一摺奉有硃批跪讀之下仰見我皇上民胞物與高厚同仁誠視天下為一家視億兆為一體欲海內元元無不歌樂利而慶豐亨臣欽服感奮仰體聖主愛民之主恩於萬一所有奉到御批理合恭繳謹奏果能如此奮勉可謂老當益壯朕實嘉悅之至古人云為善日强爾之事業寧可限量耶同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏為社倉保甲稽察賭盜等事一摺奉有皇上硃批訓勉褒嘉至再至三惟欲臣等事事實心實力奉行期於家給人足盜息民安聖衷始為少慰臣敢不恪遵訓旨嚴飭所屬總以實心實力四字共相勉勵不敢視為具文虛應故事有負皇上愛民如子之聖心所有奉到御批理合恭繳叩謝天恩謹奏閩省有滿保同爾經理朕可坦懷無慮但目前亦不過隨事酬應猶不得遂謂克諧治平之道也必能移風易俗為地方上立千百年永垂不壞之良模方可稱體國宣猷之賢臣耳目身心一時毋少怠忽務須正己率屬以實心而敷實政舉凡有益於國計民生之事我君臣互相推誠從容商較以協時措之宜漸臻化行俗美物阜民安始不虛負聖祖數十年生成教養之深仁厚澤也期共勉之雍正二年正月初三日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺把總回閩奉到臣前奏恭繳諭旨一摺欽奉硃批臣跪讀之下仰見我皇上愼重官方洞悉利弊特頒諭旨訓誨周詳無非欲臣等公忠報國期於保薦得人之至意臣即遵旨與督臣滿保公同跪看并通知省中將軍都統提鎮諸臣一體欽遵外臣惟有恪遵訓旨凡事從公以仰報皇上訓勉指示之天恩於萬一所有奉到御批理合恭繳謹奏進賢退不肖爾等之專責也非公無以濟明朕之前諭其繹之毋忽雍正二年正月二十五日福建巡撫臣黃國材謹奏為恭謝天恩事竊臣前奏君恩實難圖報等事一疏奉旨黃國材乃皇考簡用之人自撫閩以來操守廉潔辦事明白軍民共相愛戴今雖年老身尚健壯著照舊供職不必以衰老求罷該部知道欽此臣跪讀之下不禁感激涕零隨恭設香案望闕叩頭謝恩訖伏念臣自到閩一載以來日夜焦思兢惕恐懼寢食不寧精神頓減是以具疏乞休冀免隕越之愆荷蒙皇上綸言奬勵至於此極臣又何敢自惜衰老不思報效臣之精神志慮稍可支撑一日即當為皇上效力一日倘至十分衰邁不能效力之時叩懇天恩容臣奏請休致俾得優游教誨始終保全臣之萬幸除另疏恭謝外所有感激微忱先行繕摺叩謝天恩伏祈睿鑒謹奏覽同日又奏為恭謝天恩事雍正二年正月十四日臣齎摺家人回閩恭捧皇上恩賜御書福字一幅到臣臣恭設香案望闕叩頭謝恩祗領訖伏念臣至愚極陋毫無報效兹值新正上元令節荷䝉皇上錫福自天臣實感恩無地此不獨臣之一身及臣世世子孫俱得䝉皇上之福即海疆萬民人人普被歲歲盈寧亦莫不均沾洪福於無窮矣理合繕摺叩謝天恩謹奏福之一字朕原與天下臣民共之者也同日又奏為恭謝天恩事臣齎摺家人回閩恭捧兩次荷䝉皇上天恩賞賜湯羊克食到臣臣恭設香案望闕叩頭謝恩祗領訖伏念臣䝉皇上天恩眷顧兩次遠頒克食臣自問何人叠膺異數感激欣幸莫可名言臣惟有在閩一日竭盡一日心力圖報聖恩於萬一理合奏謝天恩謹奏海疆赤子正資爾愛養撫治朕之所以期望爾者豈止一日二日一年兩年耶勉之同日又奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏雨水年成並續運米石接濟浙江象山等處一摺奉有硃批臣跪讀之下仰見我皇上念切民生實欲使海宇之內無一人一處不被深仁厚澤之至意再查閩省交新正以來風和日暖民間因豐收之後米價甚平每石八錢九錢不等各府地方俱各寧謐臺灣府地方亦甚安靜合并奏聞以慰聖懷所有奉到御批理合恭繳謹奏歲豐米賤地方寧靜朕心深慰三月三日京師甘霖大霈中外歡欣特諭爾知應為朕慶喜也雍正二年二月二十四日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺把總回閩捧到臣前奏恭繳諭旨一摺欽奉硃批臣跪讀之下仰見我皇上信任之重勉勵之切不勝感激欽服之至伏讀諭旨目前隨事酬應猶不得謂克諧治平之道也必能移風易俗為地方上立千百年永垂不壞之良模方可稱體國宣猷之賢臣諭旨及此尤見我皇上治益求治安愈求安之聖心竊思聖祖仁皇帝六十餘年生成教養深仁厚澤固己登斯民於衽席措天下於治安我皇上御極以來祖述憲章勵精圖治宵旰不遑已足令九州六合俗美風移所行之政皆千百年永垂不壞之良模至臣在閩應行事宜嗣後惟有恪遵訓旨仰體聖心務期與督臣滿保共相勉勵耳目身心不敢一時少忽正己率屬以實心而敷實政仰報皇上天恩於萬一所有奉到御批理合恭繳謹奏自古堯舜之君亦必資贊助之臣朕雖有治益求治安愈求安之心全賴爾等封疆大吏竭力效忠宣猷布化始克奏熙皥豐亨之效也勉之勿懈雍正二年三月二十六日福建巡撫臣黃國材謹奏為奏聞事竊查福建各府地方於二月二十四五等日俱得大雨至三月十九并二十四五等日又得大雨目下雨水俱各霑足稻田盡皆插秧早麥巳經秀實福州等府米價照常臺灣府米價七錢八錢不等督臣滿保會商臣撥動福州臺灣二處米三次共三萬七千石運往浙江平糶嗣又因台州溫州等處食米尚有不足督臣會商臣撥動福寧州米一萬石委官運往平糶近又據督臣查看得浙江缺米地方再得米二萬石可以接至麥熟又㑹商臣委官往臺運米二萬石分送平糶總俟米價解閩之日即於産米地方照數買補還倉合併奏聞謹奏汝等和衷協恭自必庶務咸宜可嘉之至同日又奏為恭聆訓旨事竊臣據提塘宋士璞遞到內閣交出諭旨一封臣敬謹跪開係臣前題請省可省之章奏等事一疏奉旨聖祖仁皇帝御極六十餘年孜孜圖治聖壽已至七旬猶日攬萬幾不倦於勤朕仰承鴻業自宜效法前規朝乾夕惕事無巨細親為裁斷豈當年富力强之時而可稍圖暇逸乎如果中外大臣仰體朕心抒忠為國辦理事務井井有條雖封章堆疊朕心樂於披覽不以為勞若不殫心竭力茍且塞責以致事務廢弛雖日無一章朕心豈得安乎今黃國材身為封疆大吏自應將地方利弊作何興革官員賢否作何勸懲之處盡心辦理何得以省簡奏章之事為愛君之意迎合君上況伊曾以年老氣衰具疏乞休止應養其精神料理伊任內事務今迎合瀆奏用心於無益之地殊屬不合原本著發回欽此臣跪讀之下不勝恐懼羞愧之至臣受恩深重仰見我皇上自登大寶以來綜理萬幾刻無寧晷微臣愚昧之見惟恐過費天心是以冒昧具奏伏讀訓旨臣惶悚愧悔無地自容臣惟恪遵聖訓於任內事務竭力辦理熟察利弊悉心興革確訪賢否實力勸懲以仰副皇上訓勉至意於萬一而已所有恭領訓旨理合具摺奏聞為此謹奏汝既有愛君之誠何妨摺奏以達汝意率爾具本特題殊屬不合於體也雍正二年閏四月十三日福建巡撫臣黃國材謹奏為奏聞事竊查福建地方三月四月連次得雨經臣具摺奏聞今自交閏四月以來又經連次得雨禾苗十分茂盛福州府米價每石九錢一兩不等興化泉州漳州等府每石一兩一二錢不等延平建寧汀州邵武臺灣等府每石八錢九錢不等地方寧靜人民樂業合再奏聞以慰聖懷謹奏閲爾所奏深慰朕懷畿內時雨霑足秋禾長發茂盛各省麥收大槩不相上下朕荷䝉天地洪慈皇考靈聖默賜眷佑陰陽順序年歲頻登惟以手加額感激慶幸而益深警惕耳同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏恭繳硃批一摺欽奉諭旨仰見我皇上敬天法祖既宵衣旰食之不遑置腹推誠亦心膂股肱之是倚臣知識淺陋無以仰贊髙深惟恪遵副我皇上治益求治安愈求安之聖心於萬一而巳所有奉到御批理合具摺奏繳謹奏聖人惟以敏行為貴故曰古者言之不出恥躬之不逮也君臣當共勉之同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏繳諭旨一摺欽奉硃批爾果能如此奮勉可謂老當益壯朕實嘉悅之至欽此臣跪讀之下不勝感激踴躍之至伏念臣以庸愚疊荷聖恩高厚勉勵褒許至再至三臣惟有益加奮勉整頓精神實心效力以仰副皇上眷顧之洪恩於萬一而已所有奉到御批理合恭繳叩謝天恩謹奏爾不必為爾子黃炳憂慮朕非有譴責之意因伊少年心性尚氣陵人與衆不睦謗言日盈於耳朕包容巳一載矣若令久於外任恐致不能保全朕故將伊調回畀以內職以稍挫其鋒鋭且使之得以歷練老成其才其志將來猶可任用也便中密諭爾知亦可不必令黃炳與聞雍正二年五月初五日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏雨水年成並續運米石接濟浙江寧波等處地方一摺奉有硃批臣跪讀之下不禁感激欣幸歡忭之至臣幸生聖世伏見我皇上念切民生聖心與天心相為孚應既目覩閩省之甘霖疊降又欣聞北數省之雨澤應時臣惟與宇內億萬蒼生感激皇上天恩相與額手稱慶而已至運米赴浙荷䝉諭旨屢賜褒嘉臣感激欣幸莫可名言惟有益加勉勵於地方民生之事竭盡心力恪謹奉行以期仰副我皇上嘉奬微臣愛惜民生之至意於萬一所有奉到御批理合恭繳叩謝天恩謹奏所慮者第恐有名無實耳果能為國為民一念精純奉行不怠上蒼自有照鑒見得透信得真其效如響之應聲影之隨形至於朕之褒嘉奬譽猶為第二義同日又奏為奏聞事竊查福建地方自三月四月至閏四月連次得雨米價照常經臣具摺奏聞今於閏四月二十一至二十五等日又得大雨四郊霑足田禾茂盛米價照常又查臺灣府於四月二十七八等日亦俱得雨地方寧靜人民樂業合併奏聞以慰聖懷謹奏人事修而後天和應陰陽序而後雨澤調若非爾等大吏措置有方令行政舉曷克臻此朕實欣慰之至益加敬畏勉勵可也同日又奏為欽奉上諭恭謝天恩事竊臣據閩浙督臣覺羅滿保齎摺把總捧到兵部交發欽頒御筆課農勸墾上諭到閩臣出郊跪迎恭設香案望闕叩頭跪聽宣讀祗領訖隨分頒司道府㕔州縣各官一體欽遵仰見我皇上念切民依無遠弗周無微不到睿慮精詳聖謨深切實為從古帝王之所未有臣惟督率各屬恪遵諭旨倡導鼓勵務使無有廢時無有失業其沿山可以開墾及近海可以築堤之處務令設法墾治因地制宜仍諭以孳生畜牧之法俾轉惰為勤豐衣足食以期仰副我皇上嘉惠元元厪念民依之聖心於萬一所有臣欽遵諭旨奉行緣由理合奏聞謹奏莫謂迂遠而泛泛視之當曲體朕心勤懇勸導以期水到渠成之效雍正二年五月十八日福建巡撫臣黃國材謹奏為恭謝天恩事竊臣接閲家信內稱奉旨聞得山東巡撫黃炳伊屬官百姓皆有怨聲且省內政事與伊原奏之語不符亦不能有益於地方看其為人存心才幹還好著學士陳世倌與黃炳調補欽此臣聞命之下不勝感激之至隨恭設香案望闕叩頭謝恩訖竊思臣子黃炳自䝉皇上簡畀封疆以來少年未諳才不稱職是以臣朝夕焦思寢食憂慮臣子一日身任封疆臣心一日惴惴未安今臣子奉職無狀不能有益地方乃䝉皇上不加譴罪特頒諭旨調補內閣學士臣子樗櫟下材獲膺洪恩優渥終始矜全臣感激主恩情不能已至於流涕臣惟有朂勉臣子黃炳凡事恪謹實心效力不敢稍有懈忽以期圖報高厚於萬一理合具摺叩謝天恩臣不勝感激悚惶之至謹奏朕巳將黃炳用為刑部侍郎矣爾當朂勉之令其恪謹奉職又聞爾長子黃焜人材亦優朕欲擢用為按察使且密之勿宣雍正二年五月二十一日福建巡撫臣黃國材謹奏為奏聞事竊查福建地方雨水霑足田禾茂盛經臣於五月初五日具摺奏聞今查福州等七府及臺灣府俱各雨水霑足早稻現在收割米價照常地方寧靜人民樂業惟據泉州府知府王道成報稱於五月初七八等日大風初九初十等日大雨溪水泛漲低窪田禾被淹又城墻倒塌十餘丈等語臣差役往查其早種之稻已經秀實者無甚妨礙遲種之稻被風吹雨浸收成歉薄臣仰體皇上愛民至意隨委興化府知府卞永嘉齎帶銀兩前給稻種補種晚稻務期不至失所至倒塌城垣現在查明併令修築堅固合併奏聞以慰聖懷謹奏似此偶有歉收即隨宜撫恤貧民不至失業濵海黎庶朕復何憂耶雍正二年六月十四日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏雨水米價一摺奉有硃批臣跪讀之下仰見我皇上念切民生凡在海宇之內雨暘寒燠時厪宸衷至於閩省之雨澤霑足米價平賤實係我皇上聖德感召臣惟與海疆百姓羣沾渥澤共戴皇仁而已所有奉到御批理合恭繳叩謝天恩謹奏雖云上天錫福於朕亦賴爾等內外臣工有以匡襄贊助屢省乃成方克致休徵之應也期共勉之同日又奏為奏聞事竊福建泉州府於五月初七八等日風雨過驟收成少薄經臣委員賑恤巳經具摺奏聞今續據泉州府報稱五月二十九至六月初一等日連日大雨初二日雨止水退早禾俱已收完並無衝壞但窪地民房被淹一百二十餘間等語臣即委員查明被淹之家量給銀穀毋令失所又據汀漳道報稱漳州地方於五月二十八至六月初一等日連日大雨初二日雨止水退幸早禾俱已收割不致損傷等語臣隨委員會同該府查明被淹之家量給銀穀毋致失所其餘福州等府早稻俱已收完實有九分十分收成即漳泉兩府亦有六七分收成再查臺灣府雨水霑足田稻茂盛各府米價照常人民安堵理合奏聞謹奏民間祁寒暑雨亦所時有惟宜據事直告不得絲毫隱飾以蹈欺蔽之愆也同日又奏為恭領聖訓據實回奏事竊臣准閩浙督臣滿保抄送上諭一道到臣跪讀之下不勝恐懼羞愧之至臣愚昧之罪實無所逃除邵武府知府李秉衡等經督臣先後會疏題參併委官嚴查各員家産另奏外臣嗣後惟恪遵訓旨不時詳察屬員內如有貪婪不肖居官聲名不好者臣即據實糾參不敢稍為姑容狥隱自取罪戾叩懇皇上天恩恕臣愚昧容臣改過以贖前愆臣實萬幸謹將恭領聖訓及臣愚昧實情具摺回奏伏乞睿鑒謹奏既往可以不咎向後類此等事宜加檢點毋自棄以見棄於朕也愼之同日又奏為恭領聖訓事竊臣准閩浙督臣滿保抄送上諭一道到臣臣敬跪讀知䝉皇上天恩諭以保甲弭盜之法且更念保甲弭盜行於鄉村尚未行於江湖又頒訓旨將南方水程之上行劫商民不用器械不露形跡或用迷藥或用悶香種種情形指示明晰令臣等加意防範嚴加緝捕併查駕船為業之人令保甲鄰佑具結給票詳書姓名籍貫併攬載緣由記册存查遇有失事按册追緝不難弋獲仰見皇上至聖至明無微不照臣查閩省山海交錯盜賊實多茲䝉諭旨臣自當凛遵訓示嚴率各屬實力奉行以仰副我皇上戢盜安民之至意所有恭領訓旨緣由理合奏聞謹奏正須實力奉行豈在言語章奏間耶嚴飭各屬員毋得茍且塞責虛應故事如有窒礙難行之處不妨據實奏覆切勿陽奉陰違令天下後世竊笑我君臣徒於紙上談兵也雍正二年六月二十五日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事雍正二年六月二十一日臣齎摺家人回閩捧到臣前奏雨水米價一摺欽奉硃批臣跪讀之下伏念我皇上事事敬天法祖時時貴粟重農所以為地方民生計者周僃詳悉有加無已是以感孚天地與聖祖在天之靈無不垂慈默佑京畿之雨澤霑足禾苗茂盛各省麥收俱慶豐亨此皆我皇上聖德同天至誠感召之所致而猶聖不自聖益加警惕佇見我皇上福流有永慶衍無疆臣惟有與海疆百姓共戴浩蕩皇仁於靡既而已所有奉到御批理合恭繳叩謝天恩謹奏詩云立我蒸民貽我來牟今歲上蒼降福頗有豐年穰穰氣象朕何德以堪此同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏恭繳諭旨一摺奉有硃批臣跪讀之下不禁感激涕零隨即恭設香案率領臣署老幼望闕叩頭謝恩訖伏念臣子黃炳前任山東巡撫封疆巨任少年未諳加以賦性愚直每多招怨臣時刻憂心今䝉皇上洪恩洞鑒臣子少年心性尚氣陵人與衆不睦調補內任俾得保全又時加教訓使其歷練老成猶加任用復念臣愛犢私心逺頒密諭令臣不必憂心似此天恩真同高厚生成實為亘古所未有臣父子感激之忱口不能言筆不能述繕摺至此情實難已不覺感激流涕惟殫竭血誠實心效力日夜叩祝我聖主萬壽無疆而已所有奉到御批理合恭繳叩謝天恩謹奏朕不靳殊恩以成全爾父子亦望爾父子感恩圖報爭自濯磨有以追踪千古賢臣垂名竹帛顧不光明俊偉歟若祇庸碌僃員竊位保祿難免時論之所指摘且必妄加擬議謂為朕潛邸舊識以名器濫假私恩朕豈肯甘膺此昵比之枉乎爾父子要當互為規戒交相砥礪以仰答朕知遇之恩庶不為虛負耳設或不此之務而反恃恩縱恣天難諶命靡常則將來之得失榮辱亦未可逆料也總在爾父子審擇而自處之同日又奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏恭繳諭旨一摺欽奉硃批臣跪讀之下不禁感激奮勵之至伏念臣服官四十餘年凡事自矢朴實不敢稍存緣飾恭遇我皇上推誠置腹視臣子如心膂股肱凡在臣工稍有知識者莫不愛戴尊親臣受恩深重迥異尋常惟愧思慮不周無以仰報高厚何敢稍存欺飾今䝉皇上訓勉諄切臣惟益加奮勵事事實力奉行以期無負訓勉至意所有奉到御批理合恭繳謹奏閲汝奏詞似出悃忱然所行有不當處汝自不覺如彭鵬之二子學業品行俱屬平常考其鄉評亦不聞甚美豈可懷曩日故吏私情舉為孝廉以薦之朝廷乎汝於此事深為朕輕縱念伊父粵中舊好於其家門細事時加青目亦足以伸酬報之意乃將此等庸材下士濫充孝廉之選俾朕用舍兩難質之奏中不敢少存欺飾之語殊不相符矣每見爾等大吏往往私昵為心流於黨比之習可奈何將此諭亦令滿保知之雍正二年七月十七日福建巡撫臣黃國材謹奏為恭謝天恩事臣齎摺家人回閩恭捧恩賜御筆詩扇一柄臣不勝感激榮幸之至隨恭設香案望闕叩頭謝恩祗領訖臣敬誦天章金聲玉振之詞既超前而軼後恭瞻宸翰鐵畫銀鈎之筆誠古法而今師臣以庸愚謬膺重寄幸邀恩賜益思報稱之難感激褒嘉尤切冰兢之懼惟愈加奮勉竭盡心力恪供職守以圖報高厚之恩於萬一而已理合叩謝天恩謹奏覽汝奏謝知道了汝之才情朕所素悉但於廉隅二字當加砥礪撫閩以來聲名原居督臣滿保之右近日滿保聲名頓然改觀汝少不逮矣及其老也戒之在得宜於此語時繹之以自警焉可也同日又奏為恭謝天恩事竊臣接閲家信內稱六月十二日奉旨涂天相員缺著黃炳補授仍兼學士行走欽此臣聞命自天感激無地隨恭設香案望闕叩頭謝恩訖伏念臣子黃炳賦性愚鈍前任山東巡撫寸長未效荷蒙天恩格外優容曲賜矜全調補內閣學士今復蒙特恩補授刑部左侍郎臣子屢邀高厚至於此極竊思刑部為各省刑名總滙臣子膺此重任恐才不稱職有負聖恩惟誡勉臣子實心效力恪謹供職不敢一毫欺飾不敢一事懈忽以圖報天恩於萬一而已理合繕摺奏謝天恩謹奏黃炳心術似尚正但須歷練耳朕徐加琢磨以觀其成猶可器使之材也同日又奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏雨水米價一摺奉有硃批臣謹祗領伏念臣自到閩以來毫無報效百凡政令咸賴聖主時加教誨俾得事事祗遵至海疆雨水霑足收成豐厚尤皆我皇上念切民生天心感應所致臣之措置何敢當此兹蒙諭旨臣惟益加敬畏勉勵凡事恪謹勤愼不遺餘力以期無負我皇上訓勉之至意所有奉到御批理合恭繳謹奏一切災祥實由朕與諸卿之所感召而至毫不可視為渺茫無憑而懷或然或不然之心也敬畏二字斯須毋忽爾等所奏鹽務一摺留覽但聞革退商人之後地方有司奉行不善以致通省無藉窮民羣趨私販而其夥內有恃强爭奪毆擊相傷等情此事甚有關係若不早為稽察處置恐致别生枝節爾等一面將情形據實奏聞一面加意料理不可稍為忽略特諭雍正二年八月初三日福建巡撫臣黃國材謹奏為恭繳諭旨據實奏聞事竊臣齎摺把總回閩恭捧硃批諭旨一道到臣臣跪讀之下仰見我皇上至聖至明無微不照臣敢不據實奏聞自干欺飾之罪伏查上年九月間更改鹽政之初鹽務未有頭緒泉州沿海居住無藉窮民三五成羣紛紛私販甚至夥內恃强爭奪相毆事誠有之臣等訪聞隨即委員前往各處一面嚴查私販一面出示曉諭百姓併查明各處鹽場委員管理凡販買小民止收正課聽其挑賣不許勒索分文督臣與臣日夜留心稽察如稍有奉行不得法者立刻嚴行飭禁人心久已安帖並無私販恃强爭奪毆擊相傷之處臣等身在地方何敢任其生事上厪天心至鹽價貴賤情由業奉上諭折中定價令各縣實力奉行不許高擡價值併飭行興泉道一體遵行在案目下鹽價已平地方俱各寧靜今蒙諭旨臣絲毫不敢忽略加意料理斷不致無藉私販之徒恃强爭奪毆擊相傷以致别生枝節有負皇上厪念地方民生之盛心謹將現在情形據實奏聞以慰聖懷謹奏覽奏朕之疑懷渙然冰釋矣仍不時嚴為稽察可也同日又奏為恭謝天恩事竊臣接閲家信內稱六月二十九日奉旨王景灝著補授四川巡撫西安按察司員缺著黃焜補授欽此臣聞命之下不勝感激欣幸之至隨恭設香案望闕叩頭謝恩訖伏念臣以庸愚荷䝉天恩稠疊有加無已臣長子黃焜前荷主恩補授洮岷道寸長未效今又䝉皇上格外洪恩補授西安按察使臣父子係何人斯一門並沐殊榮疊膺異數至於此極雖生生世世長竭駑駘終不足以仰報萬一惟有勉盡心力永矢血誠并朂臣子黃焜事事實心效力以期圖報我皇上天高地厚之洪恩而已理合繕摺叩謝天恩謹奏任官惟賢才朕恩豈肯假借爾子黃焜似能稱職王景灝材器頗優撫川可謂得人也同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前為臣子黃炳奉旨調補內閣學士恭謝天恩一摺欽奉硃批臣跪讀之下不禁感激涕零恭設香案望闕叩頭謝恩訖伏念臣次子黃炳由內閣學士復䝉天恩優渥補授刑部侍郎臣長子黃焜又荷諭旨褒嘉旋䝉天恩擢用西安按察使主恩深重無以復加感激之忱銘心刻骨臣父子不知生生世世如何圖報方克仰酬我皇上高厚之恩於萬一所有奉到御批理合恭繳叩謝天恩謹奏覽奏已悉當切切訓勉伊等惟以真實為務至誠不息天地所以悠久無疆誠之一字能篤信而固守之則爾之子孫綿遠祿位正未艾也雍正二年八月十九日福建巡撫臣黃國材謹奏為微臣受恩愈重戀主愈殷叩懇天恩准臣陛見以伸瞻仰微忱事竊臣賦質愚蠢知識短淺仰荷高厚之恩畀以海疆重任兩載以來雖時奉諭旨不啻耳提面命但未獲親仰天顏莫遂瞻雲就日依戀之私臣實不能自已況臣疊荷皇上有加無已之恩雖經恭疏奏謝未獲親赴闕廷叩謝天恩臣心實難安查福建地方雖負山濵海事務繁劇有督臣覺羅滿保在閩日久民情土俗無不深知而又能仰體皇上愛民勤政之聖心封疆寧謐人民樂業臣雖年老尚可馳驛來京不過月餘仰祈皇上天恩准臣所請於封印後束裝輕騎星馳赴闕瞻仰天顏叩謝天恩跪聆聖訓之下有所遵循而日夜戀主之微忱亦得以少慰矣臣不勝懇切待命之至為此具摺伏候皇上睿鑒恩准施行謹奏覽奏知卿出自悃忱但此行可以不必一者朕初承基緒政教伊始爾等封疆任重不可輕離二者爾年非少壯馳驛長途未免勞瘁況濵海數省督撫中爾尚為朕昔年識面之人其餘姓名向皆不知者咸請陛見俱未允行若止令爾來京伊等胥懷疑畏矣當祗遵朕諭相見有日惟將地方事務盡心經畫為國家宣布德澤勝如往返馳驅僕僕道路也特諭雍正二年九月初十日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺把總回閩捧到臣前奏恭繳諭旨一摺奉有硃批臣跪讀之下仰見我皇上愛民念切天心與聖心相為孚應是以豐年穰穰户樂盈寧天下臣民咸歌帝德於無疆也所有奉到御批理合恭繳謹奏今歲各省雨暘時若滿擬可書大有不料浙東有海嘯之異沿海一帶户口田廬被淹朕心深為憫惻已諭該撫等多方救濟矣密邇鄰省諒必聞之同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏恭繳諭旨一摺欽奉硃批臣跪讀之下不勝感激悚惶之至伏念臣父子䝉皇上格外天恩委曲成全加意訓誨臣若不思竭力報效而徒竊位保祿庸碌僃員有負主恩臣實犬馬不如矣至於恃恩縱恣臣父子斷斷不敢嗣後惟有恪遵訓旨仰體我皇上提撕警覺之聖心互為規戒交相砥礪務竭愚誠以圖仰報知遇洪恩於萬一所有奉到御批理合恭繳叩謝天恩謹奏藝藝黔首乃聖祖六十餘年以來煦嫗之仁所生聚者朕荷付託之重夙夜靡寧故於在廷諸王大臣亦時時開誠誥誡惟願君臣一德同心為億兆謀衽席之安以期仰承皇考保民如赤之聖心而已爾其勉之以副朕懷同日又奏為恭繳諭旨事臣齎摺把總回閩捧到臣前奏恭聆訓旨指示查緝海洋賊盜一摺欽奉硃批仰見我皇上睿慮無微不到於海洋賊盜行劫情形指示纎悉靡遺又諭以實力奉行不許茍且塞責臣跪讀諭旨實切悚惶兢惕益當嚴飭屬員實力奉行斷不敢茍且塞責虛應故事更不敢陽奉陰違有負我皇上訓勉之至意所有奉到御批理合恭繳謹奏朕之所望於卿等者正在此也果能言行相符則海疆士庶可以安枕無憂矣同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏恭繳聖訓一摺欽奉硃批臣跪讀之下伏念我皇上恩同覆載明並日月寬已往之愚䝉矜全格外䇿將來之後效勉勵頻加臣恪遵諭旨事事檢點留心訪察如有屬員貪婪不肖者立即題參以副皇上澄清吏治愛惜民生之至意所有奉到御批理合恭繳叩謝天恩謹奏激濁揚清固為第一要務然不可稍涉寃抑朕前諭公之一字須時刻奉為指南同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏恭繳諭旨一摺欽奉硃批臣跪讀之下不勝惶悚戰栗之至隨將諭旨傳與督臣覺羅滿保欽遵訖伏念臣賦性愚昧受皇上恩施至優極渥若不思報主而存私欺飾於聖明之前斷斷不敢惟見我皇上御極之初見令其不拘何處行走學習成人實未敢薦入孝廉之列也今蒙御批理合恭繳叩謝天恩謹奏前車之覆後車之戒改過不吝其權在我雍正二年十月十五日福建巡撫臣黃國材謹奏為奏聞事竊查今年福建地方雨水調勻目下各府晚稻俱已收穫年成甚好米價照常福州府每石八錢九錢不等興化泉州二府每石九錢一兩不等漳州府每石一兩一二錢不等延平建寧汀州邵武等府每石八錢九錢不等各府地方寧謐人民安堵理合奏聞以慰聖懷謹奏據奏稻己登場民情安堵朕心深為欣悅同日又奏為恭繳諭旨事臣齎摺家人回閩捧到臣奏繳硃批接濟浙江米石一摺欽奉硃批臣跪讀之下伏念臣賦質愚鈍荷䝉皇上訓誨勉勵至再至三惟有恪遵聖諭時刻以實力奉行四字敬謹勉勵力圖報效以期仰副我皇上諄諄教誨之至意所有奉到御批理合恭繳謹奏實力奉行四字乃我皇考四十餘年諄諄誨朕之訓旨也朕謹志不忘今願與卿等共勉之同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏報雨水一摺奉有硃批臣跪讀之下仰見我皇上聖不自聖時刻以敬天勤民為心雖治臻熙皥户慶盈寧猶時凛監觀益昭誠敬兹頒諭旨令臣等共凛天心之感應而又勉之以敬畏戒之以毋忽臣惟有刻刻以敬畏自勉不敢一毫怠忽以期仰副我皇上加意訓勉之至意所有奉到御批理合恭繳叩謝天恩謹奏對天以敬持已以誠操存無間庶可仰不愧俯不怍也同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏䝉賜詩扇恭謝天恩一摺欽奉硃批臣跪讀之下不勝惶悚感愧之至伏念我皇上聖明洞鑒逺邇不遺督臣覺羅滿保與臣同城共皇上之照臨如日月之中天無微不及也至於臣自幼食貧茹苦僃極艱辛自䝉聖祖仁皇帝天高地厚之恩歷任內外四十餘年方得從容度日臣今現有九子長子黃焜次子黃炳俱䝉皇上天恩擢用侍郎臬司四子黃煒陜西乾州知州六子黃焵驍騎校其餘諸子或在京城或在涿州俱有房屋可以居住各有薄産可以養贍成立者得食天祿年幼者薄有家産臣若再營心家計不刻苦自勵實犬馬不如也況臣年已六十五歲即竭力報效恐無多日臣豈肯辜負主恩以干天譴至於臣之操守皇上自有睿鑒臣惟有恪遵聖訓以戒之在得四字時繹之以自警實心黽勉竭力圖報以仰副我皇上教誨矜全之盛心而已所有奉到御批理合恭繳叩謝天恩謹奏朕有聞即諭從不蓄疑藏怒於胸中無非欲卿等有則改之無則加勉之意耳即或朕有過失卿等亦當亹亹規諫以匡不逮如此則都俞吁咈之盛何難再見於今日不必汲汲於諭旨之抑揚以爭聲價但反求諸已自信無慚即可對朕不餒也朕豈肯以耳代目採一二無稽之談以品定爾等封疆大吏之高下乎惟宜務本無庸逐末同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏雨水年成一摺奉有硃批臣跪讀之下伏念我皇上宵衣旰食念切民生近又䝉天恩浩蕩蠲積歲之逋緩帶徵之粟海疆之沾沐洪恩有加無已而雨暘寒燠猶時時上厪宸衷是以感召天和獲此雨澤霑足收成豐稔之慶也臣見海疆百姓共樂盈寧羣歌帝德惟相與感激鼓舞頂祝聖壽無疆耳所有奉到御批理合恭繳叩謝天恩謹奏朕代天理物四海之內一夫不獲咎將誰歸所以御極以來夙夜兢兢而不敢少自暇豫也此心可告之上帝同日又奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏恭繳鹽政諭旨據實回奏一摺欽奉硃批仰見我皇上身居九重之上念周四海之遙惟恐更改鹽政以來地方有恃强爭奪情事致厪宸衷今覽臣奏地方並無爭奪緣由人情安帖天心方慰又降訓旨令臣等仍不時稽察欽此臣必當與督臣滿保時刻留心稽查斷不使無藉之徒恃强爭奪務期海疆寧謐以慰聖懷所有奉到御批理合恭繳謹奏閩省山海交錯民風頗僻況鹽徒易於生事稽察豈容少懈耶雍正二年十一月二十六日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺家人回閩捧到臣前恭報雨水一摺欽奉硃批仰見我皇上念切痌瘝心殷拯恤一聞浙江沿海被災聖衷深為憫惻敕下督撫即動帑金於山東河南江西湖廣等處買米運赴浙江以濟民食又屢頒諭旨加意撫恤務令得所臣聞命之日為浙江億萬生靈稱慶督臣滿保與臣仰體皇上愛民如子之聖心會商浙江寧波紹興等處恐江西湖廣之米一時未能接濟遂先撥閩省倉穀碾米二萬石臺灣倉穀碾米三萬石現在由海運赴寧波紹興二府以應目下民食已會摺奏聞諒䝉聖鑒所有奉到御批理合恭繳謹奏此舉可謂權變得宜卿等推廣朕心以為心朕遵循皇考之政以為政何愁天下不太平萬民不樂業耶朕實嘉之同日又奏為恭繳諭旨事臣齎摺把總回閩捧到臣前奏嚴緝海洋盜賊一摺奉有硃批臣跪讀之下仰見我皇上屬望之殷勉勵之切伏念臣荷䝉高厚之恩畀以封疆重任緝拏賊盜以靖地方以安良善臣之職也既䝉特頒訓旨指示情形又加以訓勉諄切臣惟有恪遵諭旨務期言行相符實力奉行使盜賊潛踪封疆寧謐以仰副我皇上愼重地方愛惜民生之至意所有奉到御批理合恭繳謹奏東南一隅地處邊海時繫朕念果能禁暴安良民沾實惠上蒼監觀不爽自必介福於爾也同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣奏繳硃批舉薦彭鵬之子一摺奉有硃批臣跪讀之下不勝感激惶悚之至伏念臣一時愚昧錯薦彭鵬之子荷䝉皇上天恩俯賜優容不加譴責又䝉開誠指示私意未融必致終有悔吝臣愚昧之罪實無所逃感激悚惶一時交集惟有恪遵訓旨痛自改悔以期無負我皇上教誨矜全之至意至於彭聖垣聖坦現在京師未經請旨不敢回籍叩懇天恩容臣遣人帶回令其在閩肄業少全臣之顏面則臣感激聖恩不啻天高地厚矣所有奉到御批理合恭繳叩謝天恩謹奏二人誠為糞土朽木之質令回故土藏拙可也仍戒飭伊等安靜毋得於地方上招搖生事雍正二年十二月二十四日福建巡撫臣黃國材謹奏為奏聞事雍正二年十二月初四日據臺厦道吳昌祚等報稱鳳山縣南路山前生番有歷歷社等五社諸羅縣北路山前生番有本祿社等四社又鳳山縣山後傀儡生番有八里罔社等六十五社通計共七十四社共男婦五千七百九十九名口各遣土官造具户口冊歸化前來臣即捐發銀兩飭行道府採買鹽布等物給賞俟督臣核明户口冊照例會題外欽惟我皇上御極以來德威遠播恩澤覃敷是以海外生番各皆感慕聖治相率歸誠日益衆多此實古來罕覯之盛事所有生番歸化情由合行奏聞謹奏朕以凉德踐膺大寶總賴我皇考在天之靈有以庇佑之耳自即位以來考之天時人事無僭無忒即如逺人向化皆不期而自至然朕實無慶幸之懷益增凛惕之誠也敬慎二字我君臣期共勉之硃批諭旨卷十九上欽定四庫全書硃批諭旨卷十九下硃批黃國材奏摺雍正三年正月二十日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏叩請陛見一摺奉有硃批臣跪讀之下伏念臣前因戀主心切叩請陛見荷䝉皇上天恩洞鑒臣之叩請出自悃忱又承天心眷念臣年非少壯馳驛長途未免勞瘁不必來京捧讀恩諭感激涕零實愧頌揚莫盡今䝉皇上御批覽奏欣悅又於臣摺內俾得優游聖世以保餘年之處奉硃批為期尚早念臣乞休之志憐臣已朽之年溫綸褒恤至於此極臣雖衰老當兹隆遇惟有努力自奮勉竭駑駘以仰報皇上高厚之恩於萬一耳所有奉到御批理合恭繳叩謝天恩謹奏古帝王以豐年為祥瑞而不以景星慶雲靈芝甘露為祥瑞以賢才為寶而不以珠玉為寶矧耆艾舊臣閲歷既多藴蓄必厚其嘉猷善政有益於天下國家非寶而何朕所以於爾等老臣尤加珍惜爾等體朕此意更宜自愛加勉果能為蒼生造福必當獲福壽之報又何衰老之足慮耶雍正三年二月十六日福建巡撫臣黃國材謹奏為起解稅羡銀兩事竊臣荷䝉聖恩將閩海關稅交臣令地方官兼管接准部咨即委糧驛道韓奕管理在案今據該道報自雍正二年二月接管起至三年正月止連閏已滿一年各口共收過稅銀一十萬六千六百五十六兩一錢除閩海關稅額銀六萬六千五百四十九兩零照數解交布政司庫取具庫收同冊檔送部外共有羡餘銀四萬一百六兩零內解銅斤水腳并給各役工食共銀七千二百五十兩零又解户部銀三萬二千八百四十八兩零所有羡餘稅銀儘收儘解不敢絲毫糜費以負皇上委任至意至稅銀之盈縮一在客貨之多寡又在風信之遲速難以預定為此具摺奏聞謹奏朕原有諭在前若將羡餘銀兩拘以定數又係額外加額矣盈縮不一但祇據實報解可也雍正三年三月初一日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺把總回閩捧到臣前奏臺灣七十四社生番歸化一摺欽奉硃批皆賴先帝庇佑且以敬愼二字訓勉諄切臣跪讀之下伏思皇上聖明天縱而猶聖不自聖安愈求安臣惟有事事仰體皇上誠敬之盛心時切氷淵之懼常凛指示之嚴事事省察刻刻檢點不敢稍有縱逸以期仰副皇上訓勵深恩於萬一所有奉到御批理合恭繳謹奏朕生平不作違心之談前諭實係由中而發非故為遜詞以邀謙光之譽也同日又奏為奏聞事竊查福建漳泉二府去秋雨水稍多又兼臺灣稽查嚴密商販稀少以致今春米價驟貴臣飭行布政司動撥倉穀碾米平糶先經具摺奏聞兹值清明前後正田疇望雨之際於二月十九二十等日各處皆得時雨菜麥有收早稻得以及時插種米價亦漸次平減惟查泉州府屬之惠安同安金門沿海處所去冬番薯歉收今春又值米貴近海窮民不無艱苦臣因浙江米價已平會同督臣滿保將前會奏臺灣運浙平糶米內未經運往者截運泉州飭行有司同前運泉之米多撥平糶併令動支社倉穀石酌量賑恤毋致窮民失所誠恐上厪聖懷理合奏聞謹奏地方上隨宜補救全賴爾等督撫大吏之善於措畫也盡心竭力為之同日又奏為奏聞事竊臺灣七十四社生番歸化情由經臣具摺奏聞併會同督臣滿保具題在案兹雍正三年二月初四日復據臺灣道吳昌祚等報稱新設彰化縣內山又有巴萊遠社麻著麻著社獅仔頭社獅仔社生番共男婦八百五十一名口各土官造具户口冊歸化等情由前來臣隨同督臣滿保捐發銀兩飭行道府採買鹽布等物給賞仍照例俟督臣核明户口冊會題此皆我皇上恩周四海澤及萬方天意人心一誠相感是以海外野番相繼輸誠接踵歸化臣幸遇聖主欣逢盛事歡忭之私實難名狀謹將彰化縣內山生番歸化情由先行奏聞謹奏今日之接踵輸誠固屬可稱他日之掉臂逃叛亦屬可慮全在地方上文武官辨安輯得法始不至遺笑將來也此等處封疆大吏不可不豫為籌及嚴飭屬員施恩布教務令野番心悅誠服向慕歸附永無變更方不愧柔遠之道雍正三年三月十三日福建巡撫臣黃國材謹奏為奏賀事竊臣接准部咨皇上御極之三年二月初二日庚午日月合璧五星聯珠欽䝉恩旨與天下臣民同福共慶臣跪讀之下當即恭設香案望闕叩賀併通行所屬文武出示曉諭兵民一體慶賀外欽惟我皇上德僃中和道隆位育是以上格天心致此瑞應皇古以來實屬罕覯臣欣遇聖君恭逢盛事慶幸私衷莫可言喻祇因身羈職守不獲馳赴闕廷躬親拜舞除具本恭賀外專差把總同家人齎摺叩賀代伸微悃伏乞皇上睿鑒為此謹奏朕以眇躬際斯景運俯仰之間愈增慚懼耳上蒼實鑒朕衷同日又奏為奏聞事竊福建地方於二月十九二十等日各處俱得時雨菜麥有收等緣由先經具摺奏聞兹於三月十一十二等日又得時雨各處菜麥收完早禾俱已插種米價漸平人民樂業地方寧謐理合奏聞以慰聖懷謹奏覽奏朕為閩省黎庶釋懷矣雍正三年四月初三日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏叩請陛見一摺奉有硃批伏念臣荷國家豢養深恩中外服官幾五十年祇以賦性愚蠢年雖老邁識見未周毫無報效今䝉皇上念臣效力多年曾經閲歷特賜褒嘉復荷恩綸諭臣自愛勉臣造福臣跪讀聖訓仰見皇上眷恤保全聖慈愷惻無不曲盡臣感激之私實難言狀臣惟仰體皇上如天之好生心存濟物念切愛民宣力國家以圖報皇上錫福賜壽之洪恩於萬一耳所有奉到御批理合恭繳叩謝天恩謹奏言行為君子之樞機而言尤不可不愼也朕凡有諭旨本於至誠從不心口互異久之天下臣民自當曉然洞悉朕衷也同日又奏為奏聞事竊查福建各府地方於三月十一十二等日俱得時雨菜麥收完早禾插種經臣具摺奏聞現在各處雨水霑足田苗茂盛人民樂業地方寧謐理合恭奏以慰聖懷謹奏據奏雨水霑足田苗茂盛朕心深為欣悅雍正三年四月二十六日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏起解海關羡餘一摺奉有硃批仰見我皇上執中建極秉道綏猷凡措諸政教者無不協事理當然之則為萬世不易之經臣跪讀諭旨中心悅服莫可名言臣若不仰體德意敢於稍涉欺罔誠天地神明所不容矣惟有益加警凛事事據實以副皇上開誠訓誨之至意所有奉到御批理合恭繳謹奏據奏讀朕之諭旨中心悅服朕願豈止於此而己要當兢業萬幾推恩四海俾普天之下凡有血氣者莫不欣欣向化心悅誠服庶幾稍答我皇考四十餘年顧復提命之深恩於萬一耳惟賴爾等內外臣工同心一德共襄治理以成朕志朕日望之雍正三年五月初二日福建巡撫臣黃國材謹奏為恭繳諭旨事臣齎摺家人回閩捧到臣前奏彰化縣生番歸化一摺欽奉硃批仰見我皇上本以德服人之政行久道化成之治事不期於速效功必貴乎圖成以生番歸化之後全在地方文武安輯得法防微杜漸之意寓於施恩布教之中臣跪讀聖訓精詳感服倍切欽遵諭旨移行所屬文武將己歸化各番宣布皇上德意多方撫綏安輯務使海外新附編氓莫不心悅誠服疆宇日增地方永靖以仰副我皇上之明訓於萬一耳所有奉到御批理合恭繳謹奏臺郡孤懸海外生番野性難馴駕御之方時刻在念毋得忽略倘致偶啓釁端别生枝節非認罪頌聖即可了結之事當勤為訪察嚴飭各屬愼之愼之同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏臺灣七十四社生番歸化一摺奉有硃批臣捧讀之下仰惟我皇上存誠主敬學貫天人自臨御以來以實心行實政凡典謨之宣布中外者皆聖主之躬行實踐身體力行者也臣惟有仰體德意事事盡心務實以副我皇上教誨之洪恩耳所有奉到御批理合恭繳叩謝天恩謹奏稱誦朕之言行不如效法朕之存心同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏欽奉上諭一摺奉有硃批諭旨伏念臣父子䝉皇上天恩格外優容訓誨保全至矣極矣臣父子雖才質駑鈍不能圖報但報主之誠天日可矢其一切夤緣之弊黨護之習不惟不敢蹈襲且恭遇聖明之主何情不可上達何事不可直奏臣豈肯狥私阿附他人負聖主之洪恩玷祖父之名節兹䝉皇上鑒臣微忱恩頒明諭臣雖愚昧敢不凛遵聖訓言行相顧以仰副皇上提撕警覺之至意所有奉到御批理合恭繳叩謝天恩謹奏朕觀汝居心每於章奏之間情見乎詞似屬忠誠但所辦事件多有未協或係被人誑惑所致抑或究竟居心缺純當亟加檢點毋負朕恩勉之同日又奏為請免調換水師千總把總事臣准部咨各營千總把總俱令就近與别營調換以便約束兵丁此誠整肅營伍之意但以臣之愚見此法槩行於水師似有未便查海洋港口紛岐支分𣲖雜水有强弱深濶之異道有平險旋急之分且各處海面水色不同山勢各别若非熟識水性之辨實難駕舟遊巡今若以水師之千總把總俱同陸路一例調換雖仍調在水師但各汛海面不同誠恐海道生疏水性不熟與水師未必遽有裨益以臣愚見如得免其對調使各千把總仍舊在各營本營海面巡哨則駕輕就熟似屬有益臣受恩深重凡有見聞不敢隱默謹據實直陳是否有當伏乞皇上睿鑒施行謹奏已有旨諭部矣此奏不合同日又奏為叩謝天恩事竊臣接家信知廣西捐穀一事撫臣李紱准通政使臣王沛憻移咨情由李紱據咨具題欽奉恩旨臣跪讀之下感激涕零隨即恭設香案望闕叩頭謝恩訖伏念我皇上至聖至明無微不照以各處捐納原有贏餘槩行究問必開訛詐之端或不清查恐啓效尤之漸著取各供咨臣令臣據實奏聞仰見我皇上本天地之心以為心察萬物之情以為情恩法務期得平仁智靡不兼盡千古帝王實未有如我皇上之聖明至仁至恕者也兹臣䝉皇上洞鑒隱微不加譴責不令赴質跪讀諭旨皇恩浩蕩聖德寬洪臣即肝腦塗地實難仰報髙深感激聖恩深入心骨莫可名言除捐納始末實情臣欽遵諭旨候廣西撫臣李紱將各省口供咨到之日臣一一據實奏聞不敢絲毫隱飾外所有奉到恩旨理合叩謝天恩謹奏兩葉遮目雖泰山在前而不見雙丸塞耳雖雷霆在前而不聞欺蔽之為害也甚矣朕最惡之爾果絲毫不隱和盤托出縱有一切情弊朕皆為爾寬恕也雍正三年五月十一日福建巡撫臣黃國材謹奏為恭謝天恩事臣接閲家信臣子黃焜䝉皇上特恩補授河南布政使臣聞命自天感激無地隨恭設香案望闕叩頭謝恩訖伏念臣子黃焜賦質庸愚身受髙厚之恩竭力難報蒞任臬司每懷祗懼今復䝉聖主格外洪恩補授河南布政使臣感切悚惶莫可名狀臣父子即生生世世竭盡駑駘不足仰報萬一臣惟有率臣子黃焜共矢血誠實心效力以圖仰報皇上天高地厚之恩日祝聖壽無疆而已理合具摺叩謝天恩謹奏朕設官分爵惟才是用雖施恩無望報之心在爾等為臣子者豈可茍祿素餐不思有以仰酬知遇乎然所謂報者其道多端要不過一誠而巳若少懷欺僞即朕不爾責其如上蒼之鑒察何爾父子宜共勉之雍正三年五月二十二日福建巡撫臣黃國材謹奏為奏聞事竊臣接臣子黃炳家信將正月二十七日䝉皇上恩旨抄録到臣臣即一面具摺回奏一靣敬謹繕録轉傳臣子黃焜恪領聖諭一體欽遵臣并寫信切諭臣子黃焜務要自立事事實心效力以報主恩切不可依附他人等由去後兹接閲臣子黃焜回禀內稱我父子世受聖主隆恩至深至厚即肝腦塗地亦難仰報今奉恩旨如此諄切惟有事事自立赤心效力竭盡駑駘圖報萬一斷不肯阿附他人負恩自棄但感激之忱情不自已雖臬司無具摺之例而心實難安是以不揣冒昧特具摺求為代奏等語臣念其感激深切出自血誠謹具摺奏呈御覽伏乞睿鑒臣不勝冒昧悚惶之至謹奏閲奏已悉宜戒爾子黃焜今日為人屬吏不趨炎附勢將來或䝉朕晉擢亦不市恩植黨能如此清介傳家可保世世安寧無事也須內外如一堅持不易方有後效若明離暗合面是背非以巧詐詭密為得計則恐滋害更深耳同日又奏為據實奏聞事雍正二年三月十四日准户部咨行令福建督撫辦解橄欖木鎗桿五千根長一丈五尺圍四寸五分嗣後每年各解千餘根等因當准督臣滿保會臣轉行出産地方採辦去後隨據侯官等縣詳稱橄欖木雖産福建地方但查此木高大直幹者少兼之氣味香甜年久樹大中即生蟲一經蟲蛀便不適用實難如數解辦等由臣與督臣覆查無異當經咨部請核減免准到部覆以奉旨著取之項不便減免嗣督臣請照山東起解白蠟鎗桿之例以圍圓四寸長一丈一二尺為准咨請部示准部允行復經照式行催辦解去後又據各屬禀稱即照所減丈尺採買合式亦少實難購辦稟請免解等由前來臣親加察訪合式之木實難多得即有數株堪用者民間留之結果不願售賣臣仰體皇上嘉惠元元愛恤小民至意有此實情不敢隱默理合奏聞除先已解過一千根現在又起解一千五百根外嗣後可否恩免辦解相應請旨伏乞睿鑒施行謹奏鎗桿惟橄欖木最佳現今演習無論别種木材俱可若製為鎗桿應用非此木不可軍器有關緊要無容漫忽倘前定尺寸不能如式仍行咨商該部酌議丈尺圍圓切毋令不肖有司借此擾纍百姓及不盡心採辦反倡言惑衆以致誤事朕少有風聞爾等難辭失察之咎如一時難以驟辦即於三五年內購得亦不為遲但不知此木栽蓄幾年方可長足合式尺寸將來須陸續辦解亦當留心詢明預為籌畫同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏恭賀日月合璧五星聯珠一摺奉有硃批仰惟我皇上道全德僃亘古獨隆是以瑞應嘉祥於今特盛臣幸生聖世欣際昌期具摺奏賀手舞足蹈莫喻歡忭之誠兹蒙諭旨謙德彌彰臣跪讀之下仰見我皇上聖不自聖至意臣雖至愚仰承聖德敢不時存戒懼益加惕厲以副皇上誠敬之聖衷於萬一所有奉到御批理合恭繳叩謝天恩謹奏存誠主敬為立身之本內外諸臣皆當效法朕以居心也雍正三年六月初三日福建巡撫臣黃國材謹奏為奏聞事竊查福建地方從前有奸民王還初假借邪教煽惑愚民經前任督撫訪拏杖斃臣聞得王還初有孫王文治形跡可疑時有面生之人往來其家臣隨密諭該管文武官員留心察訪因王文治出外未經緝獲於五月十九日據府縣禀稱王文治回家隨准督臣滿保約臣到署差督標參將同臣標守僃協同地方官密拏王文治到案併搜出經卷等物供出為首傳教之陳立昭知情相幫之王文卜等當經飭拏到案確訊各供實係假借邪教惑衆誆騙愚民銀錢並無别故閩省亦别無夥黨本應奏明在閩發落示衆但供內有在浙江溫州等處同范子盛行教之語除各犯聼督臣滿保解赴浙江溫州質審明白請旨完結外所有閩省查拏王文治等緣由理合奏聞謹奏發姦擲伏總在察訪密而緝捕速自無兔脫之虞此案獲犯可嘉請安摺用綾絹為面表汝等鄭重之意猶可至奏事摺面概用綾絹物力艱難殊為可惜以後改用素紙可也將此諭亦傳知滿保遵奉同日又奏為奏聞事竊查福建各府地方春夏以來雨水應時高下田禾俱皆霑足現在早稻陸續收割約有八分九分收成米價平減人民樂業再查臺灣府地方雨水亦皆霑足稻田十分茂盛可望豐收目下米價亦賤地方安靜此皆我皇上敬天勤民之感召是以時和年豐民物咸寧臣仰叨聖主福庇曷勝欣幸之至理合奏聞以慰聖懷謹奏閲所奏雨水收穫情形朕懷深慰雍正三年七月十五日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏廣西捐穀叩謝天恩一摺奉到硃批臣伏思廣西捐穀一案䝉皇上天恩不加譴責不令赴質臣感激聖恩實難言喻此誠皇上格外天恩曲賜矜全臣跪讀之下感恩涕泣永鏤心骨臣若再存一點隱飾之心是真不知恩實與禽獸無異矣除俟廣西撫臣李紱咨到各供臣即一一據實回奏外所有奉到御批理合恭繳叩謝天恩謹奏汝到粵西將捐穀弊竇盡情剖露纖毫不隱或可邀寬宥之恩同日又奏為恭繳諭旨事臣齎摺人回閩捧到臣前奏起解海關羡餘一摺奉有硃批欽惟我皇上御極以來庶績咸熙仁恩廣被是以天心豫順民情悅服我皇上猶聖不自聖敬勤之念彌殷操持之功益密開誠訓諭委曲周詳臣跪讀之下惟有益加自矢實心效力盡忠報主以仰副皇上教誨之天恩以盡臣報效之微忱耳所有奉到御批理合恭繳謹奏朕時時以真誠為諭爾事事惟巧詐是務所謂誨之諄諄聽之藐藐也若不及兹改圖難以挽回矣同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏欽奉上諭一摺奉有硃批伏念臣幼年孤立荷䝉聖祖仁皇帝及我皇上隆恩由中書歷升今職每念國家豢養深恩圖報之誠銘心鏤骨祇因少年失學每至見理不明被人誑惑辦事錯誤之處實多今䝉皇上開誠指示諭令檢點臣跪讀天語感激涕零嗚咽難言竊思臣今年六十六歲臣子焜炳荷䝉天恩升授侍郎藩司其餘諸子及孫年已長成者俱邀恩出仕是受恩深重者莫過於臣臣現在桑榆暮景豈不思保全名節以為子孫長久之計乎況臣自臣祖父以及臣之子孫一門五代世受國恩臣若少有欺飾黨護不惟王法不宥實天地之所不容矣臣嗣後惟有欽遵聖主明訓事事務必實心檢點期免錯誤以副皇上成全高厚之恩臣不勝感激悚凛之至所有奉到御批理合恭繳叩謝天恩謹奏開口以孤立自許真屬奇談似此指天畫地恬不知懼如年羮堯一類之人朕實不解是何等肺腸也殊可詫異雍正三年八月十二日福建巡撫臣黃國材謹奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣前奏賀日月合璧五星聯珠一摺奉有硃批臣跪讀之下仰見我皇上存誠主敬不二居心是以乾健運行潛孚默感上契天心因而上瑞駢臻嘉祥協應今歲秋收定占豐稔天下臣民共享盈寧之福也兹䝉諭旨以誠敬二字訓誨諄諄臣雖賦質愚昧必當黽勉凛遵竭力效法我皇上之居心仰副聖主訓誨臣子成人之至意所有奉到御批理合恭繳叩謝天恩謹奏覽爾一切奏覆無非信口酬酢隨事敷衍全不由衷無怪以朕諭旨亦皆作具文觀也仰副二字朕信不及同日又奏為恭繳諭旨叩謝天恩事臣齎摺家人回閩捧到臣代臣子黃焜啓奏一摺奉有硃批臣跪讀之下感激涕零伏念臣自幼孤立荷䝉聖祖仁皇帝及我皇上格外洪恩得有今日是以持身訓子從不肯阿附他人兹䝉皇上諭旨今不趨炎附勢將來或被晉擢亦不市恩植黨勉臣世守許臣無事皇上之成全訓誨實屬有加無巳臣父子若稍存一點姦巧明有王法幽有鬼神斷不敢負恩欺飾自干罪譴敬將聖諭傳示臣子黃焜及臣諸子令各恪謹凛遵務使事事實心效力以報皇上高厚之恩於無既也所有奉到御批理合恭繳叩謝天恩謹奏如果孤立不倚赤心許國必䝉上天之所祚祐若巧言飾忠懷藏欺詐則天地神明必加譴責至理昭然分毫不爽者也同日又奏為恭繳諭旨叩謝天恩事臣齎摺把總回閩捧到臣前奏臣長子黃焜䝉恩補授河南布政使恭謝天恩一摺奉有硃批臣跪讀之下不勝感激悚惕之至伏念臣父子俱䝉聖恩委曲成全逾格超擢至今絲毫未報即肝腦塗地尚不能仰酬萬一若少存一點欺飾之心辜負主恩自干天譴臣雖至愚極蠢斷斷不肯亦斷斷不敢至於臣子黃焜雖係庸材然處家孝友頗知大義亦斷不肯稍萌欺巧上負主恩下玷祖宗甘作不忠不孝之人我皇上恩德同天雖施不望報臣父子受恩最深若不時刻感恩思報不但上天可畏實乃禽獸不如矣臣惟謹遵訓旨率同臣子黃焜等事事務竭一誠以仰報聖主髙厚之恩於萬一耳所有奉到御批理合恭繳叩謝天恩謹奏如郃陽一案非欺隱乎即禽獸不如之謂也雖云孝友其如不忠何雍正三年九月初一日解任巡撫臣黃國材謹奏為叩謝天恩據實奏聞事竊查廣西捐納一案臣因候廣西撫臣李紱咨送各供到臣臣以便遵旨將收捐始末據實奏聞不期至今尚未咨到是以臣不敢冒昧先奏兹奉旨黃國材著解任發往廣西將捐納多收欵項明白質審欽此臣查廣西開捐一事係康熙五十三年原任撫臣陳元龍具摺奏請照廣東開捐事例奉旨准行後撫臣陳元龍與督臣趙𢎞燦會議委桂林府知府吳元臣等在省城收捐委梧州栁州南寧三府知府李世孝趙世勳沈元佐等在本府收捐自五十三年夏季起至五十五年夏季止共計捐過穀一百一十七萬八千二百五十石彼時因運穀艱難公議每穀一石收銀一兩一錢每石各府自存六錢買穀蓋倉等項使用外有羡餘係管捐府㕔各官分得其餘銀五錢內部費一錢督撫各一錢布政司一錢按察司本道各四分院司衙門書辦紙筆造冊人工飯食以及解冊等費各一分至於道共得銀四十四萬七千七百三十五兩此數目臣知之最確其四府收捐所得羡餘臣未經手且臣即升任貴州是以未知其詳今聞管捐各員揑辭推卸總之此事已歷十有餘年彼等見趙𢎞燦楊琳俱已病故陳元龍去任惟臣係現任巡撫是以俱諉臣一人以脫自巳賠補之計種種詭詐均非實情難逃聖明洞鑒兹䝉皇上天恩不加譴責令臣解任赴質聞命之下感激難名臣現在束裝前赴廣西到彼之日不特將臣名下所得之項據實供出及其餘督捐之督撫臬司各道以及管捐之府㕔各官所得羡餘銀兩彼等即有狡賴臣亦當一一著落具奏不敢有負聖主格外洪恩臣不勝感激瞻戀之至為此具摺叩謝天恩謹奏天下事譬如涇渭清濁自分何可牽混當時共事之人雖有去任及物故者然屬員吏書衆耳衆目縱歷多年證據難泯朕料汝必有此分析之奏但終屬一面之辭莫若汝親詣粵西質明或脫然事外或據實自認朕無不從寬恩宥假若舞智弄巧則恐自取辱耳朕之居心行政黃炳已悉大半較之凡情庸見實有不同汝從未面經奏對無怪其然今為汝計除披露一誠更無良䇿也思之雍正三年九月初七日解任巡撫臣黃國材謹奏為奏聞事竊臣因廣西捐納一案奉旨解任往廣西質審臣欽遵即於八月二十八日將印信交與督臣覺羅滿保正在束裝起行間隨准督臣滿保寫字與臣厦門地方於八月二十五日晚有匪類數十人持械入城聲稱劫庫經官兵擒獲賊夥十餘名兵丁亦有受傷餘黨雖逃但我現患病在牀恐有緊要事務商議留臣緩行臣嗣聞賊夥已經拏獲十餘人其餘俱行逃散地方無事定於九月初九日起行又准督臣滿保咨稱伊患病日重恐有不測已經奏請將印信交將軍臣宜兆熊接署留臣在閩協理伏思臣既經奉旨解任何敢逗留但臣查督臣滿保患病垂危提督臣藍廷珍業巳進京陛見新撫臣毛文銓尚未到任地方緊要臣不敢因已解任膜視相應暫行在閩俟新撫臣入境臣即啓行前往廣西理合奏聞謹奏封疆任重遇事自不應拘泥常例不但解任之員即經革去職銜亦當暫緩行期彈壓地方方合通權達變之義滿保病不忘公朕深嘉之硃批諭旨卷十九下
