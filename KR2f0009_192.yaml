body:
  text: 欽定四庫全書硃批諭㫖巻一百九十二硃批劉廷琛奏摺雍正元年六月二十九日廣西布政使臣劉廷琛謹奏為據實奏明事竊臣世受國恩復䝉皇上特用跪請聖訓時天語諄諄破格賞賜竝諭臣用摺子聞命之下感懼交深臣於六月十七日到任視事敬將皇上面諭六條備悉口傳廵撫孔毓珣跪聆謝恩訖臣又准䕶司梧州府知府張若霈齎送聖諭一道跪迎開讀隨具詳廵撫代題謝恩在案臣本衙門錢糧交盤與各府州縣有無虧空重耗等弊臣現在清查外伏查從前各屬解司錢糧每一百兩加平銀八錢廣西地丁米折合解銀三十萬四千二百兩零共計加平銀二千四百三十三兩零再各屬節禮九府及六十三州縣約計每節共得銀一千三百餘兩以上二項臣遵奉㫖定奪目今廣西雨水調勻地方寧靜早禾俱已收穫米價每石六七錢不等較之去年更好嗣後遇有緊要事件自當據實摺奏若琑屑小事不敢屢瀆天聽為此具摺謹奏凡百處不可越分毋因廵撫係漢人遂失兩司之體而主張分外之事朕如有所聞必加以僣妄處分也若無緊要應奏之事摺亦不必頻上特諭雍正二年四月二十八日廣西布政使臣劉廷琛謹奏為遵㫖恭繳奏摺事竊臣於雍正元年六月内到任後隨將臣衙門大概事宜具摺奏聞奉有硃批訓㫖臣跪讀之下細繹凛遵一年以來敬奉案前時刻觸目警心伏查粤西錢糧雖少各州縣每有那新掩舊之弊臣細心訪察一由劣衿土棍每年輪充冬頭里長包攬錢糧希圗侵蝕任意抗延州縣顧惜顔面不除錮習今䝉特頒上諭百姓完納錢糧當令糧民戸戸到官不許里長甲頭巧立名色生監除去儒戸宦戸名目抗頑者即行治罪如此則錢糧頭緒畢清而包攬之人立除矣一由廣西皆無本鹽商悉係地方官代拆代銷每每以錢糧為鹽本年復一年牽混不清今督臣孔毓珣深知其事前經奏請借帑官辦通融銷售裕課便民奉㫖允行在案如此一二年後積引銷完各歸各欵州縣無那移之弊矣再查廣西倉穀原額常平捐榖二項共有一百六十二萬八千七百餘石為數甚多何能顆粒實貯府㕔州縣内有十分之二三存價者欣逢皇上洪福齊天元年豐登大有督臣嚴行遍飭諄切告誡臣又委貟各處坐催去歳三冬月處處盡力彌補俱各造報全完臣查别府所屬内實無不足之數惟桂林一府所屬還有三四處未曾清楚督臣現在又委三道親身盤騐虚實斷不容隱匿至議行社倉之法春借秋還以權子母督臣前已詳悉奏明臣轉飭各州縣實力奉行務求合乎人情宜乎土俗毋得有累百姓致失皇上愛飬元元至意目下廣西春麥收成甚好雨水調暢米價平賤地方安靜臣愚昧無知所司錢糧倉榖諸事自當盡心料理以副厥職如有屬在總督提督應行應奏者臣斷不敢越分干與為此繕摺具奏并繳前摺伏乞睿鑒謹奏知道了觀爾此任雖屬平平無奇亦無蕩檢踰閑之處照此謹飭做去亦可但爾前於按察司任内有一二事殊屬不妥慎毋執迷隱飾過而不改是為過矣有過能改反成懿行將爾已往之事偶爾錄示不過令爾知朕耳目之不爽也硃批諭㫖巻一百九十二
