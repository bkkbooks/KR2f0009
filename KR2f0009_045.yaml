body:
  text: 欽定四庫全書硃批諭㫖巻四十五上硃批沈廷正奏摺雍正二年十二月二十五日河南開歸河道臣沈廷正謹奏為遵㫖回奏事雍正二年十二月十八日撫臣田文鏡𫝊臣至署捧岀硃批諭㫖開讀臣随即叩頭謝恩伏念臣一介庸愚荷䝉國恩服官二十餘載及恭逢皇上龍飛御極兩嵗之内四蒙特㫖遷擢洊歴道員臣屢膺異數感深無地日夜冰兢正懼稍有隕越以致上負聖恩乃復䝉諭㫖特頒諄諄訓誨惟恐臣有請託瞻顧不與撫臣同心料理致壊地方吏治且責臣來豫時有不願之意臣伏思臣與撫臣田文鏡素未同官亦未㑹面但臣於在陜時原曾聞人𫝊説田文鏡待屬員過嚴及臣至豫數月見撫臣田文鏡竭忠辦事實心為國至於整飭官方亦屬職分所宜是以臣甚心服地方公事臣必請撫臣之訓示撫臣亦必與臣商酌甚是和衷臣始知昔日所聞盡屬浮言惟我皇上乾衷獨斷不惑羣言知人善任實千古帝王之所未有也兹臣欽奉訓諭惟有益加黽勉屏絶瞻顧與撫臣同心一徳料理地方以圗上報聖恩於萬一耳緣奉上諭令臣回奏交與撫臣田文鏡轉逹謹此繕摺據實回奏伏乞皇上睿鑒謹奏朕為汝主田文鏡係汝上官但能同心一徳他處無可顧慮也君臣大義千古名節須要見透守定時刻勿忘汝姪沈竹觀其行為將來必至不保首領雍正三年正月二十一日河南開歸河道臣沈廷正謹奏為恭䝉聖訓謹瀝下情仰祈睿鑒事雍正三年正月十七日撫臣田文鏡傳臣至署捧出臣前奏摺子奉有硃批臣伏讀再三仰䝉天語煌煌提撕偹至欽遵之下不勝感激涕零伏念臣數十年來仰沐皇上逾格深恩臣之身實皇上豢養之身臣之官實皇上簡畀之官臣之居心行事無一不為皇上所周知而洞鑒非若疎逖之人天高聽逺必藉他人援引提㧞也今臣既受聖訓下頒臣惟有朝夕捧誦益加惕厲以期仰報聖慈於萬一耳臣姪沈竹一介微末亦䝉皇上訓詞下及臣不勝悚惶祇緣未奉宣示諭㫖是以臣不敢冒昩轉宣惟有作字訓誡示以大義敎以名節務期小心謹慎以報主恩但臣姪沈竹自幼失敎臣時以為慮今在陜西臣又逺隔不能親為管束倘䝉皇上憐念仍令回京辦理本旗㕘領事務使其學習官方則臣實舉家頂戴皇恩於無疆矣為此繕摺敬交撫臣田文鏡轉達所有奉到硃批理合恭繳謹奏汝姪沈竹豈但不能小心謹慎前次甫經批諭汝摺而其所行殺身之事業巳敗露矣雍正三年二月二十二日河南開歸河道臣沈廷正謹奏為恭䝉聖訓謹再披瀝下忱仰祈睿鑒事雍正三年二月十七日撫臣田文鏡傳臣至署捧出臣前奏謹瀝下情仰祈睿鑒一摺奉有硃批臣自分何人乃䝉皇上逾格提撕既鑒臣愚誠復誡臣欺飾委曲訓誨至於此極祗遵之下感激涕零臣姪沈竹身受皇恩罔知報效行事乖違有干國憲果不出聖明洞鑒臣因外任年久有此親姪未能敎誨䝉我皇上不加臣重譴預示先㡬雖家人父子何以逾此臣躬沐殊恩沁肌入髄惟有捐糜頂踵矢竭駑駘以期仰報聖恩於萬一耳為此繕摺具奏所有原奉硃批理合恭繳謹奏不但爾為其叔不能化誨朕昔在藩邸時何言不加訓誡無如竟不遵承惟利是圖即性命有所不顧朕因深悉其行為故於即位後又復諄諄嚴飭縱内不悛改外亦當懼王章國法不致仍蹈前轍何乃毫無忌憚又作如此等事尚容留於天地之間可乎誠所謂下愚不移之流可憐真孽障也雍正三年五月二十四日河南開歸河道臣沈廷正謹奏為恭䝉聖諭微臣慚感難名謹具摺奏謝天恩事竊臣因河南漕船在直隷内黄縣之草坡等處地方被淺阻滯自草坡而下尚有河南之湯陰縣地方三十餘里河路亦俱淤淺臣随親赴督率地方官建壩催趲由草坡陸續過淺於本年五月十二日將漕船盡行催出豫境臣於十八日回至省城䝉撫臣田文鏡傳臣至署捧出皇上硃批臣奏摺臣當即叩頭祗領伏讀再四不禁感激涕零竊念臣姪沈竹性情貪鄙行事乖違乃䝉皇上先於藩邸時每事必加敎訓及登大寳又屢行嚴飭寛以導之威以懾之蓋欲生全成就之聖心不啻如父師之於子弟此誠亘古未有之遭逄臣姪沈竹自應洗心滌慮痛改前非力圖報效以期無負聖恩詎意臣姪沈竹心同畜類蠢然無知既不能悛改於外復不能恐懼於内今又作如此等事以自取重罪此誠如聖諭所謂下愚不移者也但臣身係親叔不能敎誨臣姪罪實難逭今䝉皇上宥臣失敎之罪恩賜訓諭臣祗承之下既深感激復切悚惶所恨才短識庸未知如何圖報始可仰酬高厚之恩於萬一耳為此繕摺叩謝天恩并繳硃批謹奏無庸悚惶爾效力之處朕皆鑒悉加勉以圖上進可也雍正四年五月三十日福建布政使臣沈廷正謹奏為恭謝天恩事竊臣一介庸愚荷䝉皇上格外洪慈於雍正三年十二月内由開歸河道擢為河南按察使到任未幾又䝉皇上特㫖授為福建布政使命臣赴京陛見後再赴新任臣聞命自天感激無地随即起程於雍正四年五月初二日瞻仰天顔荷䝉温語顧問屢次賞臣克食初三日又賜紫金錠藥扇墜諸珍物初七日又䝉皇上召見指示敎訓僃極周詳賜給上諭一道朋黨論一道御製詩一幅金扇茶葉等件命臣由河南一路前赴福建布政使新任又䝉皇上鑒臣愚誠令臣凡有陳奏之事繕摺交怡親王轉逹伏念臣以樗櫟之材仰䝉聖主屢次超擢已覺捐糜難報今復受此種種異數實為格外曠典感激涕零筆難陳繪臣自陛辭後即赴吏部領憑起程於五月二十六日到河南省城遵將皇上諭㫖宣示撫臣田文鏡臣於五月三十日自河南起程前赴福建除有應奏之事遵㫖陸續繕摺交與怡親王轉逹上請聖裁外所有微臣銜感蟻忱理合具摺奏謝天恩謹奏知道了從來受恩易報徳難勉之觀毛文銓在閩甚覺不妥據實奏聞同日又奏為敬陳管見仰祈睿鑒事竊臣荷䝉聖主特逹之知超擢今職随䝉恩諭令臣有應奏之事具摺奏聞臣欽承之下感深五内茍有一得之愚安敢隠黙不言以負皇上顧問至意今將臣在河南深知有可以裨益於國計民生之事謹為我皇上陳之一豫省臨河州縣應以黄河為界分管南北以便廵防一豫省附近兑漕水次之沿河地方應預為積貯倉糧以濟漕運一丁銀俱應按地𣲖徴以廣皇仁以上三條是否可採伏乞皇上垂覽鑒擇施行謹奏所奏三條俱好已發部議矣雍正四年九月二十九日福建布政使臣沈廷正謹奏為奏聞事竊臣於本年八月初二日到福建布政使任所有臣衙門經管通省一切錢糧倉榖等項經臣詳明督撫現在委官分路盤查容俟查明照例具詳督撫題報外至查臣衙門歴來陋規每年約收各屬致送節禮夀禮等銀一萬餘兩又各屬解司起運錢糧每正銀一兩外加銀二分以為總督廵撫布政司鹽菜養廉之用通省每年額徵起運正銀一百二萬六千九百七十七兩零共該收鹽菜養廉銀二萬五百餘兩但此項銀兩係随正解收每年各屬正項錢糧嵗内不能如數全完故鹽菜養廉一項每年約止收銀一萬五六千兩不等内除送給督撫銀各四千餘兩其下剰銀六千餘兩留為布政司鹽菜養廉今臣到任將各屬致送節禮夀禮等項俱皆禁革惟止存鹽菜養廉一項不敢遽革合謹繕摺奏聞伏祈皇上睿鑒謹奏類此等奏朕槩付之不覽但務實行自能鑒悉何待汝之陳奏耶同日又奏為恭謝天恩事竊臣前奏敬陳管見仰祈睿鑒一摺奉到硃批伏念臣所條奏原屬管窺蠡測恐不足以當聖明採擇今䝉硃批奬許發部議奏此誠格外天恩臣感難言喻惟有殫竭駑駘實心報效以期仰副皇上奬許鼓舞之聖心已耳所有奉到硃批一併齎繳謹奏知道了朕之褒奬寵眷不可恃惟信已之居心行事則百無一失也同日又奏為奏聞事竊臣查得本年八月初七八九等日閩屬地方連日大雨有福州府屬之侯官古田連江羅源等縣福寧州屬之寧徳縣俱被水淹浸當據各地方官申報随經臣將情形一面詳請督撫題報在案今臣委官細查惟連江縣受災稍重所有被災窮民業經督撫撥發銀榖賑救現已安寧其餘各縣雖經被水但水勢随長随消惟有沿河低䧟處田禾稍減分數其高阜田禾並無損傷現俱豐茂至查今年閩省地方早禾收成豐稔是以各處米價自八月至今日漸平減又查各屬晚榖豐茂異常民間咸稱收成俱在十分以上今已時届九月轉瞬十月即可收獲將來晚榖登場米價自必更減誠恐地方民食上厪宸衷理合將閩省田禾豐茂米價平減情形據實奏聞謹奏總賴爾等地方大員實心敷政有以感召天和方可獲豐登之慶也朕曽言高其倬一入閩界必有一番維新氣象今果然矣試觀天人交感之理昭然不爽於此若仍信不及非庸愚而何勉之同日又奏為恭謝天恩事竊臣於本年八月十七日接到部文知陜西廵撫圗理琛以臣先在延安府知府任内因會審汪元仕虧空一案限滿將周涌收貯西安府庫銀兩擅那代完等語具疏題㕘致奉部議革職乃荷皇上格外𢎞慈特賜恩㫖沈廷正在豫省開歸道按察使任内聲名俱好從前此案乃畏懼年羮堯勢力逼勒所致並非伊之本意沈廷正著從寛免革職欽此臣随恭設香案望闕叩頭謝恩伏思臣被㕘之案罪實難辭乃䝉皇上聖明洞鑒特賜矜全免臣革職此實從來罕覯之洪恩而臣獨身承如此殊遇跪聆之下感激涕零即肝腦塗地亦難仰報高深於萬一惟有益加惕厲勉盡匪躬之節以期上副我皇上鑒㧞之深恩而已所有微臣銜感下忱謹繕摺恭謝天恩伏乞皇上睿鑒謹奏類斯等事亦止可邀恩一次亟當深自愧悔若視此以為無妨因而倚恃恩寵放膽肆志殊非將來之福也勉之慎之同日又奏為恭謝天恩事竊臣於本年五月初七日䝉皇上召見面奉降與河南廵撫田文鏡諭㫖并御賜田文鏡鼻烟壺荷包命臣前赴河南宣給田文鏡臣恭奉諭㫖随即就道於五月二十六日到河南恭傳諭㫖并將御賜物件恭交田文鏡外臣随將宣給過緣由具摺奏聞今䝉皇上將臣原摺發回臣敬謹啟封伏閲臣原摺内䝉皇上將臣向撫臣田文鏡宣述諭㫖内用硃筆抹去七句仰荷聖恩特賜硃批内有錯記者巳改發與田文鏡矣欽此竊念臣一介庸陋仰䝉聖主事事優容屢加訓勵今將面奉皇上所降河南廵撫田文鏡諭㫖不能記憶錯誤傳宣昏昩之罪實所難逭乃䝉皇上不加譴責且復䝉批諭使臣知所警惕臣跪讀之下既深感激更切悚惶嗣後惟有敬遵皇上批飭時加佩誦夙夜冰兢以期無負我皇上天高地厚之隆恩於萬一耳謹此繕摺奏謝天恩並將奉到硃批一併恭繳謹奏殿陛之間面聆諭㫖傳述一無錯謬原屬難事諸如此等不及之過朕自諒汝也同日又奏為微臣奉到硃批謹據實回奏仰祈睿鑒事竊臣欽遵皇上硃批訪查得福建撫臣毛文銓自到閩省先因不諳地方情形或將窮民有拖欠地主租榖者通飭地方官照依徴比錢糧之例勒限拘追以致窮民不無嗟怨或將貪暴不法之官如興泉道陶範延平府知府張道沛不行糾叅反令陶範仍管鹽務令張道沛兼管海闗事務而引為肘腋信用之人以致官民多有不服又查有沿海向係地方官給照稽查之商船毛文銓聽信張道沛言語止令海闗給照不令地方官稽查以致商船出入海洋無可稽考又有章二杜四等係毛文銓管堂家人欺瞞伊主結連衙役孟愛等在省城開設銀號米舖又令門子陳瑞等前赴光澤縣一帶行鹽覔利遂致百姓有廵撫愛錢與民爭利之謡後經毛文銓覺察將陳瑞革役不許行鹽銀號米舖亦已停止又有各屬倉榖毛文銓止據各屬報到之冊籍為憑並不細加盤查以致多有未清此等行為誠如聖明洞鑒實屬不妥但此俱係毛文銓初到閩省所行之事自臣到任之後細看毛文銓為人尚屬忠厚而辦事亦甚勤謹凡有從前所行與地方不甚相宜之事現與督臣高其倬和衷商酌逐一更正以故數月以來官民俱各相安再查本年五月十一日百姓至廵撫衙門嚷閙一事緣彼時省城米少價昂百姓見南臺客米八船欲販徃興化府糶賣百姓阻住不容開船毛文銓以興化地方需米甚急客販不可阻滯令閩縣知縣前徃曉諭該縣不善開導勸諭以致擁進省城齊至廵撫衙門嚷閙直至毛文銓親自出堂明白曉諭復將嚷閙者查拏十餘人當即責懲百姓始認罪散去至今人皆傳説實係百姓刁頑等語此皆臣到閩所見所聞之事合謹據實奏聞至撫臣毛文銓此後行事如果有未妥之處容臣再行具奏斷不敢稍有隠諱以負我皇上垂問至意所有原奉硃批一併恭繳謹奏知道了毛文銓行為若此即甚屬不妥汝意必如何方謂為不妥耶雍正五年正月初七日福建布政使臣沈廷正謹奏為聖恩愈重慚感益深謹具摺奏謝恭繳硃批事竊臣因前任陜西廵撫圖理琛題㕘臣在延安府知府任内㑹審汪元仕虧空一案部議革職仰䝉皇上格外矜全從寛免臣革職臣随具摺恭謝天恩今䝉皇上將臣摺發回臣叩頭啟封敬閲硃批諭㫖伏念此案荷䝉聖主寛宥巳屬格外殊恩今復荷硃批提撕警覺曲加訓勉雖家人父子亦從未有如此之諄切敎誨臣跪誦之下感激涕零愧悔無地嗣後惟有凜奉諭㫖朝夕警省每事愈加小心謹慎以期無負我皇上成全訓誡之深恩耳謹此繕摺恭謝天恩併繳硃批謹奏朕用天下羣才素非謀面止據羣工之薦揚糾劾尚欲甄别淑慝黜陟幽明況藩邸有數幾人皆向所稔悉茍有一長可取者豈肯不㧞擢任用以示勸其言行乖違怙終不悛者何容不譴責棄逐以示懲若一任倚恃私恩干犯法紀在汝等䘮失天良自招罪戾此其小者天下後世將謂朕為何如主耶如𫝊鼐博爾多朕何嘗不期望成一人物其奈小人福淺何此二人即係汝等榜樣惟自信無他方保始終盡善試思於朕前能陷害人者為誰能援庇救濟人者為誰朕之耳目心思匪可簧鼓搖惑也努力實行做一好官成一好人以報效國家垂名史冊顧不美歟較之眼前浮榮小利奚啻徑庭勉之勉之毋辜朕望同日又奏為恭謝天恩事竊臣前因陳奏河南事宜三條仰荷皇上洪恩特敕部議臣随繕摺恭謝天恩今䝉皇上將臣原摺發回臣叩頭啟封敬閲奉有硃批仰見我皇上敎育恩深無微不至以居心行事朂臣俾臣時加省察駑鈍如臣猶䝉皇上訓示諄諄有加無巳臣跪誦之下感深肌髄莫能名狀惟有敬謹服膺朝夕惕厲以期無負我皇上天高地厚之洪恩巳耳為此具摺恭謝天恩併繳硃批謹奏覽奏巳悉奮勉實行加謹加慎方克有終雍正五年閏三月二十一日福建布政使臣沈廷正謹奏為恭謝天恩事竊臣因前任陜西延安府知府任内會審汪元仕虧空一案部議革職仰䝉皇上格外洪恩從寛免臣革職復荷硃批諄諄訓勉臣随繕摺奏謝聖恩今䝉皇上將臣原摺發回臣叩頭敬閲奉有硃批伏念臣一介庸材仰䝉皇上數十年豢養之恩洊授今職頻荷聖諭誨勉有加無已兹復䝉皇上硃批訓誡諄切周詳既示臣以榜様更示臣以他人不能陷害勉臣作一好官報答國恩提撕警覺期望彌殷臣跪誦之下不勝感激涕零嗣後惟有凜遵聖訓勉力實行始終氷兢恪盡臣職以期仰副我皇上敎誡之深恩巳耳為此繕摺恭謝天恩並將原奉硃批恭繳謹奏一切訓諭只在能行與否不宜惟以章奏為務若不實心實力信奉遵行將來至噬臍不及時悔何及也同日又奏為恭謝天恩事竊臣前因陳奏河南事宜三條䝉皇上特敕部議臣随繕摺奏謝天恩仰荷硃批令臣只信自巳居心行事諄諄訓勉臣復繕摺奏謝兹䝉皇上將臣原摺發回臣即叩頭敬閲奉有硃批仰見我皇上恩同覆載訓誨維殷臣惟有恪遵聖訓加謹加慎期保克終以上報聖主垂誡之深恩於萬一耳謹此繕摺恭謝天恩併繳硃批謹奏能於朕諭誠信一分則受福一分能加勉敬慎則禄位悠久此亦自然之理但地方上一切吏治民風雨暘年嵗何故一字不及數千里之遥僕僕道路止齎呈一篇閒話將欲借奏摺聲勢以挾制督撫恐嚇同寅誇示屬員耶徒滋勞費於事何益之有閩省如無可上聞事件似此毫無益於用人行政之奏嗣後不必雍正五年四月十六日福建布政使臣沈廷正謹奏為據實奏聞伏祈聖鑒事竊臣自抵任後訪得閩省府㕔州縣各官向來因循瞻顧怠玩廢弛倉庫多有虧缺督臣高其倬深知陋弊令臣詳委専員將各屬倉庫徹底盤查臣即詳明督撫將各府㕔州及附郭首縣俱委道員盤查以専責成其餘各縣悉委別府屬縣分盤以杜同府之瞻狥今催據各委員送到盤查倉榖冊結臣查閩省官民捐積監榖通共一百八十二萬四千二百二十二石零内除征臺軍需并連江縣水災豁免以及叅追虧空等項外其餘各屬貯倉之榖據稱有歴年發糶尚未買補並前任流交現存榖價者有碾米給兵尚未徵補者有歴任流交民欠及發價採買未補者現在實貯之榖合之原額數目未及其半此倉儲之所以有名無實也查平糶一項原因青黄不接暫濟民食當秋收之時自應照數買補無如各屬任意延緩並不買補槩存價銀今臣已詳明解貯司庫以杜虧空俟秋收時發還買補又碾米給兵一項查兵米原係地方官徵收支放祇緣青黄不接之時民間輸納不前兵食又難緩待是以從前題定每年春夏二季兵米暫借倉榖碾給該地方官自應於秋收後照數徵補乃借後任民拖欠以致歴年多有未清臣因係糧道専司一面移道嚴查一面分檄各屬飭令照數徵補倘有以完作欠立即揭報督撫㕘追又流交榖價一項乃係歴任各州縣交代之時倉貯缺額遂折價移交以副交盤之限每石價銀自三錢八分至四錢四五分不等近年榖價稍貴不足買補是價雖實貯榖巳虛懸更有流交民欠一項據稱發價採買尚未交倉但歴任相沿漫不催交以致僅存空領榖無實貯以上各項前於三年奏報案内俱皆捏造實貯此番盤查務期徹底清楚飭令各屬據實具結在各道府多有仍照往年一槩出具實貯印結臣詳明駁換各屬觀望延挨稽誤時日而限期迫届臣随將各道府報到榖數彚造草冊呈送督撫復核經署撫臣毛文銓將臣草冊内兩次粘簽令臣將三年捏報實貯榖數改作四年平糶臣查三年捏報實貯榖數一切流交民欠未買等項俱各包藏在内今若改作四年平糶固可符三年捏報實貯之數然臣何敢改移年分以自蹈欺罔之罪随向毛文銓再四婉禀不便改造在毛文銓以臣為行事刻薄過於膠執即各屬亦俱恐罹三年捏報之重譴怨恨更甚今各知府自知三年捏報實貯之榖不能掩飾随俱陸續具報買補臣以各屬盤查後續報買補米榖必須委員盤驗明確方可入冊而毛文銓云各屬報買米榖一面委員盤查一面只管造冊限期已逾不能久待如查有不足随後亦可題㕘等語臣只得詳明入冊惟漳州一府因該知府耿國祚與汀漳道劉燦彼此互揭所以漳州一府十縣之倉榖有無虧空實難懸定應俟糧道李玉鋐盤明回日方知確實臣已將情由詳明督撫俟盤查明白後另行造報不敢彚冊詳送其餘各屬倉榖屢據福州府知府胡承謀向臣禀稱總督意在保全屬員將流交并三年捏報榖石司冊内不妨改作四年平糶只須我們經管各府縣將現在平糶江浙米榖糶少報多既可歸還價銀又可買榖補倉將來亦無後患一轉移間不特廵撫可符三年奏報之數而各屬亦可免三年捏報實貯重譴且閩省歴年未清倉榖經總督此番盤查之後再待兩三月俱可實在盡成實貯將此美名歸於總督此事我們公同商議巳就等語臣思知府胡承謀所言若出於毛文銓之意情或有之高其倬必無此意臣於到任後高其倬屢與臣言倉榖一事務要據實造報不可稍有狥隠且我們兩人亦賠不起即廵撫有三年奏報案内捏造實貯之數亦不能代為掩飾語言何等嚴切豈有令各府縣糶少報多巧圖彌補之理至於毛文銓一聞臣據實造冊之言遂怒形辭色必欲將各屬未補流交民欠等項盡造實貯方合其意是以各府縣結成黨羽與廵撫通同一氣紛紛具報買補將完何從前艱於採買而此時一旦買補如此之易欺朦掩飾情弊顯然臣雖立刻委員盤驗查取倉收奈所委之員不過係閩省各官伊等暗相聨絡百計扶捏虛實殊難憑信臣思倉榖頗易盤查尚有如許掩飾而錢糧之那新掩舊以完作欠并己徵在官溢額銀兩侵隠不報混淆更甚容臣確查另摺奏聞外臣目擊情形寜受廵撫與屬員之怨恨不敢稍有瞻顧隠瞞謹據實繕摺上陳聖聰伏候皇上睿裁謹奏朕原謂毛文銓不妥高其倬亦慮其偏於善柔爾此奏甚屬可嘉但恐擇善不固言行不能相符倘亦被誘入其中通同欺隠料常賚到時必不肯隠黙縱令常賚仍復追随歩趨現有直隷江西湖北榜樣朕既知其不妥自當逐漸清理到爾閩省彼時爾等身家性命干係較之廵撫各屬之忌恨試思孰輕孰重耶秉公正色勉力為之負君悞國之咎斷不可蹈宵小之怨憾何足介意汝自處於不敗之地他人其如汝何坦懐勿慮可也雍正五年七月初三日福建布政使臣沈廷正謹奏為敬陳倉榖造冊原委仰祈睿鑒事竊臣前因察盤閩省各屬倉榖巳將一切情節繕摺奏聞外嗣緣漳州一府并所屬十縣倉榖查有虧缺未清必須盤查明白臣方可造冊詳送而署撫臣毛文銓令臣止照知府耿國祚造報實貯之榖彚入冊内臣再四不敢依從又汀漳道劉燦先因揭報耿國祚虧空未肯出結及到省數日旋即出結而出結之後又因耿國祚造送冊結不符復具文通詳云被耿國祚哄騙出結等情署撫臣毛文銓無可如何只得將閏三月内劉燦與耿國祚互揭虧空勒索各情由於六月初六日具疏題㕘在案所有漳州一府十縣倉榖随經毛文銓批令臣不必彚造而總督臣高其倬又批令臣止將漳州府并龍溪縣二處扣出其餘漳屬九縣仍令造冊此外各府屬縣凡雍正三年捏報實貯之榖或巳經買補或現在存價無論多寡臣自應據實開造無如毛文銓見冊内造有存價字樣者即為不悦適於六月二十三日臣接到署撫牌文内開係䝉皇上所降署廵撫毛文銓訓㫖并將福州府知府胡承謀革職即速進京等因欽遵轉行到臣臣随將盤察倉榖一案據實造冊於六月二十六日詳送自送冊之後毛文銓諸事吹求臣惟有順受至臣此番所造察盤倉榖清冊俱係據實開造凡買補榖石年月僃細註明是以與往年冊式不同臣謹將造冊緣由繕摺奏聞謹奏知道了易云臣不密則失身前次之奏併今此所奏俱當固密為要稍露則禍即随之矣同日又奏為據實奏聞事竊照閩省察盤倉榖一案臣已將各屬情形并造冊稽遲緣由於本年四月十六日繕摺奏逹聖聰外今臣檢查雍正二三兩年察盤倉榖底冊有泉州府屬之晉江南安永春三縣漳州府屬之龍溪漳浦南靖龍巖四縣俱開有被水發糶榖石查雍正二年泉漳二府曾報被水並不成災惟龍溪南靖二縣倉榖淹濕具有報案至晉江南安永春漳浦南靖龍巖等縣因流交榖價僅有四五錢不等不敷買補是以捏作被水發糶並無報案今值察盤之際臣日事督催除永春漳浦南靖龍巖四縣已於雍正三年買補外其南安晉江龍溪三縣近據該府縣具報將存貯榖價俱照數買榖補倉并送倉收在案又原任泉州府㕘革知府王道成攝理晉江縣事任内虧空榖價銀九百七十三兩未經完補接任知縣葉祖烈屢次通詳並不著落究追竟聽王道成請咨歸旗葉祖烈以榖價無著不得已請將耗羡銀内抵補經毛文銓批允今於盤查之時始據葉祖烈照數買補又原任汀州府叅革知府吳澍虧空未補榖三萬九千三百七十八石零存價銀二萬九千六百六十四兩零經前任總督滿保題明發給邵武建寧二府買榖補倉嗣於雍正三年復經總督滿保㑹同廵撫黄國材題報邵武建寧二府除將前項榖石買補全完外又多買榖石剰有贏餘銀兩請將採買各官議叙經部議奉㫖准將府縣各官議敘在案臣查此項榖石當日題請議敘之時惟建寜府買足貯倉而邵武府屬之邵武縣光澤縣俱尚有民欠倉榖未交前任督撫遽以照數買足題報府縣各官遂邀議敘今委員盤查之後始據光澤縣報收全完出具倉收到司而邵武縣尚有未買榖八百一十石價貯府庫臣屢檄嚴催始據邵武府以價貯府庫現今買收府倉等語申覆以上三案雖據該府縣俱巳照數報買但臣既經查出除察盤冊内登明外理合據實奏聞謹奏前此之虧缺果能買補足數則可以巳但恐所報者尚未必實貯在倉也諸凡弊端統俟欽差到時偹悉言之同日又奏為奏聞事竊臣於上年八月到任後查得泉州府屬之南安縣㕘革知縣黄廷鑑虧空案内有康熙五十六年起至雍正二年止民欠地丁銀三萬五千餘兩接任知縣湯啓聲知民欠不實在於櫃書家内搜出空白印串情弊顯然是以湯啓聲不肯出具認徵民欠印結具文詳報臣随於上年九月内轉詳督撫題明奉㫖嚴提詳審追擬兹據泉州府知府張無咎申報南安縣知縣沈楩㑹同晉江縣知縣葉祖烈暨署泉州府通判王仁詳稱審據南安縣管糧經承陳新供出現任福州府理事同知時惟豫於康熙五十九年間在前任泉州府海防同知任内第二次署理南安縣印務將徵完康熙五十九六十兩年地丁錢糧内共截出銀五千四百兩侵欺入已并將流串日報拆封簿燒毁無存捏造民欠流交後任已據陳新具有甘結并稱時惟豫曾差人賄囑不令供出等情知府張無咎以縣審並不加具切看一面駁審一面轉報前來臣查南安縣民欠錢糧既據經承陳新供有時惟豫侵蝕情弊是否確實必須質審方可定案随嚴檄該府作速審解并將理事同知時惟豫揭報督撫立請題㕘解任質審外事關官吏侵欺錢糧臣謹據實奏聞伏祈皇上睿鑒謹奏不特此案一切案件總同欽差秉公辦理可也雍正五年七月初八日署理福建廵撫印務布政使臣沈廷正謹奏為奏聞事竊照閩海闗税務經前署撫臣毛文銓題委泉州府知府張無咎管理徵收今張無咎因將厦防㕔未買倉榖捏報實貯經臣㑹疏題㕘在案所有閩海闗税務亟需賢員料理臣查鹽驛道陳豫朋老成練達辦事勤慎堪以接管税務除現在委令該道前往暫行管理并確查從前徵解税銀數目俟該道呈報接印日期到臣臣即照例題明請㫖遵行外謹繕摺奏聞伏祈睿鑒謹奏好海闗税務可謂委署得人同日又奏為奏聞事竊閩省察盤倉榖一案臣已據實分析造冊詳送督撫在案祇緣各屬所出倉收印結恐有欺朦情弊臣於造冊後随詳明覆加盤查兹據前署泉州府厦防同知事汀州府同知李暲詳稱厦防㕔倉有流交并碾米給兵共未買榖二萬七百餘石止存價銀係知府張無咎報買足數寫書囑令捏出倉收又李暲將運厦平糶浙米二千餘石抵給兵米捏作倉榖碾米放給等情自行檢舉前來臣随將知府張無咎同知李暲㑹疏題㕘外伏查閩省倉榖前因知府胡承謀結連同寅屬員覬覦江浙平糶米榖彌縫買補那掩捏報洵為罪魁仰䝉皇上聖明洞燭將胡承謀革職進京之後一切弊端漸已顯露將來各府縣中如厦防㕔之捏出倉收謊報實貯者更不知凡幾矣除現在逐一再行嚴加確查外謹繕摺奏聞伏祈睿鑒謹奏所奏知道了朕今簡命楊文乾等來閩諒伊等到時自將一一清楚也雍正五年十月初三日福建布政使臣沈廷正謹奏為恭繳硃批事竊臣前將捏報倉榖失水及耗羡補完虧空并冒邀議敘等案各緣由繕摺奏聞兹䝉皇上將臣原摺發回奉到硃批臣跪誦之下仰見我皇上天地為懐大公至正凡在覆載之中共切生成之戴臣遵將諸凡弊端於欽差到閩之時巳一一偹悉明白造冊分送在案今廣東撫臣楊文乾㑹同撫臣常賚將閩省府㕔州縣各員缺盡委命往人員署理盤查總期徹底澄清務使水落石出如有假捏不實貯在倉者臣立即據實揭報聽候題㕘斷不敢一毫狥隠上負隆恩所有奉到硃批理合恭繳謹奏從來天下事以得中為貴但能屏去一私自無不當之理若恐累及己身而過於從事名為公舉仍屬私心惟相機合宜只求益於國計民生而為之則雖私亦公也是非當否全在公私二字即上蒼之錫福降災亦各因公私而譴祐也可不慎歟凡人解悟此理者少勉為之同日又奏為恭謝天恩事本年八月十二日欽差廣東廵撫臣楊文乾到閩𫝊㫖沈廷正此番辦事如果盡心竭力朕必用伊為别省廵撫若稍有狥隠瞻顧朕决不輕恕欽此臣跪聆之下不勝感激悚惶伏念臣䝉聖主豢養任用之恩至深至厚縱竭盡駑駘力圖報效亦不能仰答高深於萬一又何敢少存狥隠瞻顧之念自蹈欺君負國之罪惟是心切報主不避怨嫌每致事多掣肘正際孤立寡援之候特邀聖恩畀臣署理廵撫印務復遣重臣來閩清查倉庫俾臣職守應為之事欲言未遂之志得以稍盡心力仰見聖主憫臣孤立格外矜全從此戴高履厚之年皆犬馬圖報之日矣所有欽差臣楊文乾來閩㑹同撫臣常賚辦理事宜就臣見知者謹陳其槩如閩省府㕔州縣有倉庫闗係者其已㕘及出差離任等缺經督撫委署在先酌量現署之人如係來閩人員甫經署事現在交盤者俱不更換外其有雖係來閩人員署理但為日巳久又經出結者惟恐從前或有逼勒扶同之弊即將現到候補人員改署查其虛實再有於倉榖案内已㕘聽侯部議未離任之員及雖無倉榖罣礙在任年久各官交錯調換委候補人員分往署事盤查以倉庫之虧足定本官之去留更將委往之員又斟酌地方之繁簡試看才具之短長因地制宜随材器使復令臣將通省各項倉榖及歴年未完正雜錢糧江浙運閩米榖糶賣價銀各數按項造冊徹底清理又念漳泉二府為財賦重地令郎中鄂彌逹往漳州府員外郎伊拉齊往泉州府親身察盤俱於八月二十八日自省起程矣合併陳明緣臣奉到聖訓謹此繕摺恭謝天恩謹奏如是辦理甚好仍須加勉自勵庶無放恣之失同日又奏為奏聞事竊查閩省自八月初二日得雨以後雨水稀少臣恐有妨田禾遍行各屬確查情形及體訪老農俱云雨水雖然不足幸露重不患乾燥惟漳州府屬之詔安縣雨澤愆期將來收成不無稍歉再汀州府屬之永定縣夏被水災經臣詳報撫臣具題在案今雖勘不成災但恐被水人戶寒冬無以資生又詳明督臣委員往永定被災之處查明乏食窮民或銀或米酌量撫恤俾免失所至臺灣府屬之彰化縣夏間偶遭風患嗣據報稱亦無傷損田禾前九月二十七八兩日省城連得大雨四野霑足閩省田地依山傍海高低不一是以收割亦有遲早不同約計分數福興延建汀邵六府俱有八九分及七八分不等泉漳二府約有六七分及五六分不等臺灣府屬禾苖現在結實亦約有八九分不等福寜州屬亦俱有六七分不等再查福興泉漳四府地𤓰番薯俱巳成熟是統計閩省本年早晚二禾收成雖不獲盡登大有但較之歴年以來似又不可多得者矣臣謹繕摺奏聞上慰聖懐謹奏覽收成分數朕懐深慰雍正五年十二月二十五日福建布政使臣沈廷正謹奏為恭繳硃批仰祈睿鑒事竊臣齎摺人回捧到臣奏捏報失水等事一摺奉有硃批臣跪讀之下仰見我皇上天地為懐仁慈普被凡在化育之中無不提撕警覺格外生成似臣之愚昩若不䝉聖明照鑒洞徹隠微臣雖行之終身而不自知其非今自奉聖諭之後不覺心地豁然辦事循循有序朝夕每捧誦硃批字字箴規實可垂訓萬世臣具有人心敢不敬遵益加勉勵屏去私心恪秉一公以仰副皇上敎訓成全之盛心於萬一所有奉到硃批理合恭繳謹奏訓諭雖由於朕確信與否力行與否則在爾也不但朕不能强即爾自身亦看福量何如耳辨别公私二字甚難莫看作易事勉之勉之同日又奏為據實奏聞事竊查來閩侯補知縣管景濓題授侯官縣旋即丁憂離任奉欽差委往福清縣清查舊欠錢糧遲延不覆經欽差檄行申飭管景濓即拘承催之保長責比衆人即匿名貼揭又以管景濓帶往侯官縣書辦蔣秀門子楊貴需索銀錢一時逞刁即將管景濓坐轎毁碎管景濓亦以福清縣糧房李信等侵糧弊露唆使所致具禀通報臣一面轉詳即據詳提犯續將先到案人犯嚴審據李信等供認指使毁轎不諱質訊侯官縣書辦蔣秀門子楊貴俱供認得有福清縣各糧房銀錢等語臣即將審過情由通詳欽差暨督撫二臣併聲明提到餘犯另審在案又訪聞學臣程元章考試漳郡正在看箭之時人多擁擠守役執鞭驅逐誤及武生與考生童及觀看閒人輙以辱及斯文羣起擲石諠譁學臣即將本役薄責随即停考務拏出首犯懲儆然後考試後因衆生童懇求情切復行考試仍嚴拏為首棍徒適署漳州府知府潘體豐在省臣即諄囑確查為首之人嚴拏懲究嗣奉督撫准學臣來咨行臣轉飭查拏臣復飛檄催提外理合繕摺奏聞謹奏此二事於汝奏未到以前朕業巳聞之矣同日又奏為恭謝天恩仰祈睿鑒事竊臣前將欽差初到閩省所行盤查倉儲事宜約畧具摺奏聞今臣齎摺人回奉到硃批仰見聖主敎訓成全有加無巳臣敢不敬遵諭㫖小心謹慎益加勉勵兹通省府㕔州縣倉庫俱委現署之員徹底查盤如錢糧内有虧空那移官侵吏蝕及虛開民欠者經臣陸續通詳欽差臣楊文乾等㑹同撫臣常賚題㕘仍勒限完補内有續完者即詳題開復至奉㫖發審之耿國祚等各案臣謹遵聖訓小心謹密㑹同接察使喬學尹秉公審理逐案詳解欽差㑹題在案其一切案情不敢重複瀆陳外惟有通省倉榖臣分别官民捐積監榖將從前額數及㕘後買補並現存價值者條分縷析偹造清冊詳題内有虧缺霉爛者另詳㕘追現存之榖臣面禀欽差徹底盤查以榖一石碾米五斗足數者照額盤收倘不足五斗及有盤少者照缺少之數合算賠補至於存庫榖價有多寡之不同地方有産榖不産榖之分臣悉心斟酌揆度情形除興化府已買補不議外所有福泉汀漳四府素非産米之區應委官齎價協同原經手之員往隣省豐收地方購買其延建邵三府并福寜州各於本地採買惟福寜州恐一時買不足數亦令隣省購買其往外處採買者定限六個月運回收貯其本地採買者照榖數之多寡定買補之限期多者限以三個月為止俱令現任官督同原經手之員依限買補如逾限將督買與經手之官㕘處其脚價不敷之處經欽差㑹同撫臣常賚行令原任廵撫毛文銓賠補俱現在通行各官遵照從此通省之積弊頓除千載之規模永定若非我皇上睿慮周詳委用得人安得官不煩而民不擾八閩之倉庫充裕海疆之兵民俱有攸頼也臣愚無知躬逢盛世安享敉寜實切惶悚惟有殫心竭力永圖犬馬之報巳耳現在欽差廣東撫臣楊文乾於本年十二月二十一日赴廣浙江觀風整俗使臣許容吏部郎中臣鄂彌逹亦於同日起程矣至員外郎臣伊拉齊撫臣楊文乾𫝊㫖補授福建鹽驛道合併繕摺奏聞伏祈皇上睿鑒謹奏欣悦覽之朕顧慮閩疆之念少釋矣雍正六年正月初八日福建布政使補授貴州廵撫臣沈廷正謹奏為恭謝天恩仰請陛見以抒下情事竊臣於雍正六年正月初六日奉督撫二臣准吏部咨文内開奉上諭何世璂到京另有用處貴州廵撫員缺著沈廷正補授等因欽此轉行到臣臣聞命自天感激無地随恭設香案望闕叩頭謝恩第念臣智識短淺閩藩兩載未效涓埃幸䝉皇上聖訓頻頒是以得免隕越今復荷皇上天恩畀臣貴州廵撫任愈重而懼愈深感悚之忱訓㫖恐黔省苖猓雜處一切地方事務無所遵循輾轉思維孺慕益甚臣擬於交代清楚之日即星馳就道在江西湖廣適中地方恭候恩㫖伏乞皇上憐臣愚昩犬馬戀主出於至誠准臣入京陛見躬承聖訓親授方畧庶邊疆緊要之區措施不致失宜矣謹此繕摺奏聞臣曷勝激切待命之至謹奏爾今往撫黔省較之閩藩之任尚易諸凡諮詢鄂爾泰而行可也此人心地非如高其倬一流但知自顧而不顧人實乃當代偉器為古名臣中之罕見者爾到任後自知爾為藩司時朕不惜諄諄訓誨兹任廵撫表率通省寜不更重然朕一無所諭惟與鄂爾泰同心協力誠信相孚斷不至有損於爾一切地方事務請訓於朕不如就正於伊封疆之責最要者惟察吏一著不宜故立異同凡有所見與伊詳悉商酌辦理諒必無差謬果能謹遵朕㫖實心奉行保爾為平安悠久一好撫臣也如交代巳竣速赴新任毋遲同日又奏為奏聞事竊查閩省去嵗秋冬收成分數雨水情形經臣繕摺具奏俱䝉聖鑒今嵗新春訪查米糧價值米有上中下不等故價亦有多寡不同福興二府屬每石一兩二錢及一兩三四錢不等泉汀漳三府屬每石一兩三四錢及一兩五六錢不等延建邵三府屬每石八九錢及一兩一錢餘分不等臺灣府屬每石一兩餘分及一兩一二錢不等福寜州屬每石九錢餘分及一兩有零不等通省米價頗平百姓俱各安居樂業麥苖現在秀發理合繕摺奏聞謹奏據奏閩省米價尚未見其甚平雍正六年四月初二日貴州廵撫臣沈廷正謹奏為恭謝天恩事本年四月初二日臣於延平府地方據臣齎摺人回捧到臣前奏懇請陛見一摺奉有硃批臣跪誦諭㫖諄諄開導不啻面對天顔親聆提命敢不銘心鐫骨字字恪遵實力奉行以仰副我皇上隆恩異數有加無已之盛心至貴州地方情形屬吏賢否與夫興革撫綏事宜容臣到任留心察訪凡有闗於庫帑積儲吏治民生者臣惟仰遵聖諭一秉至公諮訪督臣鄂爾泰詳悉商酌辦理斷不敢故立異同偏執己見致負國恩除臣起程日期已另行奏聞外理合繕摺奏謝天恩并繳硃批謹奏朕意不但諮訪事宜而已當竭力效法其居心為要勉之同日又奏為恭繳硃批仰祈睿鑒事竊臣於雍正五年十二月二十五日將欽差清查倉庫明白緣由具摺奏謝天恩奉有硃批又將漳郡武童不法罷考及候補知縣管景濓奉委福清縣清查民欠被百姓毁轎各情由具摺奏聞奉有硃批又將原奉硃批具摺恭繳奉有硃批臣俱敬謹跪領伏念臣碌碌庸材坐糜廩禄揣分難安夙夜思維何莫非聖主洪恩澤及微臣敢不敬凛訓諭竭盡駑駘黽勉報效於萬一所有奉到硃批三摺理合恭繳謹奏矢志報效固好但須實力行之恪秉一誠無欺無隠為要雍正六年七月十六日貴州廵撫臣沈廷正謹奏為奏聞事竊臣䝉皇上天恩陞授貴州廵撫於本年六月初八日到任業經恭疏題報在案臣到任時署撫臣祖秉圭至臣署將籌畫糶借倉糧並嚴禁地方官於秋收後𣲖發民間買送米榖一事向臣説知臣自入境之時即訪聞黔省各府州縣去嵗平糶倉糧減價太多以致秋成官民買補維艱又聞糶賣倉糧時本官多有不親自赴倉查察惟委佐雜官監糶以致豪棍衙蠧人等各捏戶名一齊赴倉爭先糶買窮民終日守候不得顆粒到手及糴買時又被府州縣親戚家人勾同書辦將戥頭斗面任意高下暗中取利百弊叢生臣到任後随行文嚴飭司道府州縣各官力除積弊如敢仍蹈前轍臣即㑹疏題㕘究處倘各屬果能親身監糶不致欺隠秋成斷無不敷買補之理所有𣲖發民間買送之弊臣自當嚴行禁革至借給倉糧在祖秉圭謂糶不如借臣愚以為糶糧尚有價銀存庫而借糧多係豪衿地棍串通姦胥猾吏為之倡議引誘一二窮民列入呈首向州縣借領雖有領狀保人多有假名假姓難以憑信或秋收稍薄或經手官陞遷事故遂藉口延挨虛懸倉儲故青黄不接之時只宜平糶不可輕易借給若地方實係歉收窮民嗷嗷待哺無力糴買倉糧又應仰體皇仁一面酌量照例借給一面繕摺奏聞此係暫時權宜非可定例與平糶並行臣管窺愚見未知當否伏候皇上訓示遵行謹奏覽借糶二議汝所見是祖秉圭原係庸平人也同日又奏為奏聞事竊黔省地方自五月下旬以來雨澤愆期在得水低田並無妨礙而高田灌溉難施未免亢旱臣到任後率同司道文武各官齋沐設壇竭誠祈雨齊赴福黔潤澤龍神廟行香并通飭各屬一體䖍禱又聞米價稍長前署撫臣祖秉圭雖經檄令各屬開倉平糶止有省城府倉糶賣其餘多有未曽開糶臣恐貧民乏食復又行文飛飭平糶以廣皇仁幸於六月十三四及十七八等日各府州縣并離省數十里地方俱得雨澤嗣於二十三四等日及七月初一初五初十至十一二三等日連沛甘霖自省城以至離省數百里地方盡皆霑足其離省窵逺之處雖未報到但密雲四布雨澤自必普被臣於七月十六日親赴四郊騐看雨水禾苖情形細詢農民據云黔省坑落老田名為爛田又名濕田今逢久曬此時又得透雨禾苖比往年更加暢茂將來秋收必有十分其低平田畝現在雨水充足禾苖亦盛定獲豐收惟新墾山上高田名為乾田率多沙石是以未得雨之前禾苖半帶黄色不能滋長兼有枯色者自得透雨之後禾苖盡轉青色驟長吐穗將來六七分收成可望其雜糧更加茂盛百姓衆口同聲云黔省總以老田收穫為主今嵗統高下合算必有八九分收成等語惟黔西州從前所報雨澤比他處微小所以收成稍薄臣謹據實奏聞謹奏覽得雨情形朕懐深慰同日又奏為奏請聖裁事竊照黔省苖猓雜處良頑不一恭逢皇上徳威廣被聲敎覃敷凡各路生苖陸續向化惟黎平鎮逺平越都勻等府與楚粤接壤一帶生苖每有欺陵百姓干犯法紀而八萬古州九股生苖盤踞深山道路不相通達聲息不相連貫經督臣鄂爾泰特委按察使張廣泗前往化誨招撫清理疆界臣到任後因張廣泗親赴苖疆盡心招撫所有跟随出力官兵必須時加賞賚即投順生苖亦應賞給花紅銀牌斷不可少且張廣泗行營需費甚多雖經督臣給過銀一千兩但恐不敷應用臣再四思維現在司庫無項可動惟捐納項下所存七分公費銀兩可以撥給臣随即寫書與督臣鄂爾泰計議商酌嗣接鄂爾泰覆稱如有不繼聽臣酌量料理等語伏查捐納項下公費銀兩臣未經奏明何敢擅自撥動可否仰懇皇上天恩將司庫存貯捐納公費銀内撥動一千兩以五百兩為預偹賞賚官兵苖民之用以五百兩給聖明批示遵行至官兵需用行糧臣巳檄飭附近各府州縣預偹接濟在案現據張廣泗禀報八寨等處投誠苖民共大小一百一十餘寨又就撫生苖共大小四十五寨其地界週圍約計二百六七十里俟遍户議糧造册通報今即赴凱里㑹集料理丹江一帶等情理合一併奏聞謹奏覽同日又奏為奏聞事竊查黔省軍田前經工部侍郎申大成條奏令頂種百姓每畝上納税銀五錢許照民間一體買賣過割報明布政司給以契尾執照永為己業等因奉㫖行文欽遵經前撫臣轉行各屬飭令將作何清查之處詳報到日出示曉諭尚未具有詳覆臣到任後随嚴飭各屬作速查明軍田畝數并現在承種管業戶口姓名造册詳報毋使隠匿遺漏又奉行不力随行文通飭至部定價值原據直𨽻各省不産銅鉛之處通為酌定今黔省出産倭鉛其價甚賤又接壤雲南紅銅之價亦不甚高以紅銅倭鉛煎煉黄銅計算不及部價若不酌照時價恐有射利之徒多攙倭鉛私行鑄造黄銅生熟器皿交官領價亦未可定黔省雖收買無幾但錢糧關係不得不因地制宜臣随檄行布政司查議在案俟詳覆到日臣再為確核咨請部示又建造先農壇廟置買耤田臣恐各屬從前或有草率辦理虛冒錢糧之弊巳行令布政司委員查勘至於忠孝節義祠宇並未據各屬報有建造者豈黔省竟無可表揚之人再如州縣額設民壯或有虛應故事冐銷工食又從前各官侵蝕賞給老民銀兩或尚有隠匿不首均未可定臣俱檄行布政司嚴查在案更查黔省礦厰税務等項絲毫闗係國課從前雖有専員管理並不委員稽察臣現在與布政使鄂彌達細為籌畫清查謹此繕摺奏聞伏祈皇上睿鑒謹奏留心庶務甚好惟貴力行無倦同日又奏為據實奏明仰祈睿鑒事竊查黔省從前地方官遇有命盜案件僅草率具文詳報上司而上司即據詳一批再催牌幾次嗣後任其沉擱即各屬有將正犯拏獲詳報者多照苖民犯法之例從寛外結竟不按限審擬具題自前嵗督臣鄂爾泰到任之後仰體皇上慎重刑獄鋤暴安良徳意與前撫臣何世璂加意整頓凡苗民命盜案件不許外結各屬始知畏懼處分不敢諱匿但積案纍纍多未完結一時驟難清理容臣逐案確查俟查明㡬案先行陸續具題外再有從前實係命盜重案而首犯或久已在逃或久伏㝠誅承審各官亦久已病故者或本非正盜正命原可無庸題結者臣不敢冐昩具題一面將輕案人犯酌量情罪發落一面將重案審擬具題其自盡命案有情節可疑者臣務必細加根究不使其有絲毫疑竇然後具疏完結謹此繕摺奏聞謹奏好竭力整頓務使陋習盡除刑法出入稍失其平則上干天和不加詳慎敬謹可乎朕今調爾為滇撫黔省事務毋因暫署而存諉卸之心雍正六年八月十二日署理貴州廵撫事務雲南廵撫臣沈廷正謹奏為恭謝天恩事本年七月十七日准吏部咨開奉上諭雲南廵撫員缺著貴州廵撫沈廷正調補欽此臣恭設香案望闕叩頭謝恩嗣於二十五日復准到吏部咨開本年六月二十二日内閣交出奉上諭據鄂爾泰奏稱黎平鎮逺等處一帶生苖近日聞風向化皆思内附現今委令張廣泗前往招撫等語張廣泗既有化誨生苖等事其貴州廵撫事務仍著沈廷正署理俟張廣泗到任後沈廷正再赴雲南新任欽此臣即叩頭謝恩并偹文飛檄新任撫臣張廣泗欽遵在案竊臣昨䝉聖恩調補雲南廵撫自念才庸任重倍切冰兢随具疏恭謝天恩兹復荷皇上洪恩命臣署理黔撫印務聖恩稠疊有加無已臣犬馬私衷感悚交集惟有矢竭丹誠益勵精白以圖仰報高深於萬一耳除另疏奏謝外臣謹繕摺恭謝天恩謹奏勉盡封疆職守以仰副朕委任之意可也同日又奏為恭謝天恩事本年七月十六日准吏部咨開為欽奉恩詔事雍正六年五月初六日題本月三十日奉㫖依議沈廷正著降一級從寛留任沈廷正任内處分之案甚多朕俱開恩寛宥者因伊前任福建布政使任内將通省錢糧倉榖未清之項徹底查明據實陳奏朕遣楊文乾許容等前往確查始將積年虧空盡行清理實係沈廷正陳奏之力朕彼時不將沈廷正之奏宣示於衆者因沈廷正現為閩省藩司恐清查之員有所瞻顧牽制且藩司専司通省錢糧凡各屬未清之項或有干渉沈廷正之處亦未可定今楊文乾許容等將各項清查歸結沈廷正已陞黔撫而福建藩司任内並無絲毫未清之項實屬不狥情面實心辦事之員甚有功於閩省則朕屢次加恩寛免之由理應曉諭内外知之欽此移咨到臣随恭設香案望闕叩頭謝恩竊臣一介庸愚仰䝉皇上敎育深恩數年以來凡臣前任内議處之案屢荷聖慈寛宥雖肝腦塗地奚足上酬高厚今臣又因前在陜西延安府知府任内失察甘泉縣侵蝕老民銀兩一案部議照例降一級調用乃䝉皇上格外之恩以臣前在福建布政司任内曽將錢糧倉榖查明據實陳奏特沛殊恩將臣降一級從寛留任臣跪讀恩㫖不禁感愧無地是今日之官實皇上再賜之官受恩愈重圖報益難惟有倍加儆惕竭盡駑駘以期無負聖主屢次矜全之大徳於萬一耳除具疏奏謝外臣謹繕摺恭謝天恩謹奏勉之莫辜屢次擢用之恩莫辱今日特降之㫖若稍随境遷移自問懐慚則常賚傅鼐博爾多皆可為前車之戒試思昔日受知於朕效力於朕處較伊等厚薄輕重相去若何不但臣子之誼當盡數十年培養之恩當報即以巳身利害言之亦宜倍加誠敬期保克終倘或職任有玷致損朕之聲名顔面而欲希冀袒䕶私恩不可得也存諸内者竭力務一誠字復以鄂爾泰之居心行事奉為準則而效法之庶㡬可矣同日又奏為奏聞事竊照廣西西隆州八達寨土目顔光色等屢行不法恃衆拒捕業經安籠鎮臣蔡成貴統領官兵於本年七月二十二日起程赴粤會合攻𠞰在案臣於八月初一日准安籠鎮臣蔡成貴咨稱七月二十三日行至壩榜地方據遊擊賀成等報稱七月二十一日職等率兵進𠞰已經攻到八達寨下詎知粤西各路兵丁四山觀望不前賊兵圍繞以致守偹李文仲把總王承文并營兵二十六名土兵一面咨會督臣鄂爾泰提臣楊天縱及廣西督撫提鎮諸臣聽候遣撥官兵㑹合進𠞰一面檄委貴西道王廷琬前往南籠督辦黔省官兵需用軍糧並飭南籠知府協同料理在案臣思安籠鎮標下遊守等官俱随鎮臣蔡成貴出師八達而南籠郡城地方緊要不可無弁員防禦即於臣標内派撥馬兵六名歩兵四十四名共五十名委千總王家猷於八月初四日起程前赴南籠府駐劄以資彈壓又查臣標左右兩營原額設馬歩戰守兵丁一千五百名内奉文抽撥長寨兵丁一百二十名外撫臣張廣泗招撫生苖起程時帶去兵丁五百一十名臣撥往南籠府防禦兵丁五十名今撫臣張廣泗又調撥兵丁三百名左右兩營僅存兵丁五百二十名省㑹重地現在存兵無多臣再三籌畫城地方亦可稍資防守兹督臣鄂爾泰提臣楊天縱俱已𣲖撥官兵携帶大礮前往八達進勦而安籠鎮臣蔡成貴亦咨報於八月初一日領兵前進㑹勦理合繕摺奏聞謹奏覽同日又奏為奏請展限盤查仰祈睿鑒事竊照廵撫新任例應於三箇月内將各屬倉糧盤查明白造冊保題臣抵任之後即檄飭布政司糧道遴員詳委分路盤查在案今查臣别案題㕘之䕶貴陽府事定番州知州葛敬夫竟將䕶府任内平糶米價銀一千八百四十餘兩内虧空銀六百四十餘兩又虧空府倉米七百五十餘石榖三十石零又定番州任内僅平糶榖一千石價銀四百五十兩虧空無存又虧空前在貴筑縣任内倉米八百二十餘石臣現在一面繕疏續㕘一面通飭各屬將州縣平糶價銀解貯府庫將府倉平糶價銀解貯道庫俟秋成照數預先飭發領回及時買補庶可杜侵那虧空之弊但通省地方遼濶以葛敬夫一人而論府州縣各任内俱有虧空由此而推則各屬倉糧果否實貯殊難憑信必須徹底盤查始能確知實數而徹底盤查又必須寛展限期臣不揣冐昩仰懇皇上天恩俯照福建督臣高其倬新任盤查展限之例於正限外再賜展限三箇月俾得徹底逐細盤查庶倉儲有賴而虧空掩飾之弊俱立見矣除另疏題請外臣謹繕摺具奏伏祈睿鑒謹奏若不徹底盤查何能杜絶掩飾之弊題到有㫖但諸凡事務亦不必過於苛刻同日又奏為奏聞事竊照新任撫臣張廣泗招撫生苖一案臣於本年七月十六日已據張廣泗所報招撫過八寨等處生苖寨戸數目繕摺奏聞兹於八月初四日准撫臣張廣泗移稱附近凱里之丹江一帶頑苖不遵化誨糾衆抗拒將情願向化各寨脅制不前七月二十四日行抵丹江枯桐隘口頑苖等施放鎗礮官兵奮勇連克隘口六處至二十五六七等日頑苖復來迎敵随分遣官兵追𠞰殺死頑苖數十人我兵奮勇用命受傷身故者十一名但丹江共計百十餘寨地勢深險丁壯約有數千所當亟請大兵始可應濟機宜請於撫標内再撥官兵二三百名前來等因又張廣泗寄臣書云丹江苖人藐横無忌非官兵五六千名不克濟用等語臣當即一面選撥撫標官兵一面檄飭司道預偹軍前應用糧石并調思南府知府吳榖専司督運其輓運糧石及公文差使往來各路必須安設臺站始免遲悞亦行文司道查議兼委署貴陽府知府王玠協同平越營遊擊田玉前往查勘料理又撫臣張廣泗需用盤費賞賚等項臣前聖衷權宜料理随行文布政使鄂彌達動支銀一千兩委員齎往撫臣張廣泗行營交收臣冐昧之罪伏祈聖鑒至一應情節臣俱偹具咨文并寫書知㑹督臣鄂爾泰提臣楊天縱聽候調度在案又於八月初六日張廣泗差把總常富到省移稱丹江頑苖違梗現在請調大兵所有一切需費為數頗繁請於司庫公項内撥銀一千兩偹用統俟事竣造冊報銷等因臣即行文藩司照數支給把總常富領齎於八月初七日將選撥撫標馬歩兵丁共三百名委左營守偹徐希達右營把總楊漢飛管領起程馳赴軍前提臣楊天縱亦𣲖撥官兵九百五員名委定廣協副將蘇大有帶領前赴軍前臣謹具摺奏聞再查辦理糧務必須委員専司其事今黔省各官多有䕶署篆務不敷委用臣先已咨商督臣經督臣鄂爾泰㑹疏皇上勅令星速來黔以便委用合併奏聞上候聖裁謹奏覽雍正六年九月十三日署理貴州廵撫事務雲南廵撫臣沈廷正謹奏為恭謝天恩事竊臣於本年八月二十六日接准河東督臣田文鏡咨一件為誣盜屈命事内開准刑部咨㑹議汝陽縣革職知縣繆之弼誣良致死褚乾一案等因雍正六年六月十二日題十九日奉㫖依議沈廷正高文愷俱著照部議所降之級從寛留任欽此移咨到臣臣即恭設香案望闕叩頭謝恩伏念臣一介庸愚才識短淺歴任以來屢有議處之案捫心自問罪實難宥疊荷聖主殊恩予以寛典不即罷斥訓勵將來臣膺斯異數方在夙夜惶恐寢食靡寜之際今又因臣前任河南按察使任内失察之案部議降一級調用復奉恩㫖著照部議所降之級從寛留任臣跪讀之下感激涕零不能自已臣惟有勉竭駑駘力圖報効以期無負高厚之恩於萬一耳除另疏奏謝外謹繕摺恭謝天恩謹奏於一切動静云為處捫心自問仰首看天不愧不怍行去自然皆是日前屢次訓㫖甚明若少渉恃恩肆志則朕諭殊為可惜耳其矢誠矢公勉力為之同日又奏為奏聞事竊查黔省山高土冷每年雨水過多所以老田收成只有七八分光景今嵗夏間晴霽日久而老田收成詢之農民據稱竟有十分之外低田有八九分收成至新墾山田亦有六七分收成惟安順府所屬州縣山勢更高沙石愈多是以山田收成較别府少減分數然低田仍屬豐收而老田亦與别府無異又威寧府屬之黔西州高低田畝合算亦有五六分收成查往年各屬山坡田地原比今嵗收成畧厚但今嵗老田大收通省約計實有九分收成較往年收成甚好現今各屬早稻業巳登場晚稻飽滿結實其蕎麥等項雜糧俱皆茂盛目下各屬米價每倉石八錢至一兩不等將來收穫完畢自必更減兹據布政使鄂彌逹查明詳報前來臣謹據實奏聞伏祈睿鑒謹奏覽收成分數米糧價值深慰朕懐同日又奏為奏聞事竊照廣西西隆州八達寨土目顔光色等抗拒情形業經臣繕摺奏聞並差人前往八逹查探去後嗣據回稱安籠鎮臣蔡成貴於八月初四日巳抵八達随有顔光色頭目人等屢次到營求饒等語今於九月初九日臣接准鎮臣蔡成貴咨報八月二十九日㑹合三省官兵將八達蕩平得勝凱旋臣随將從前𣲖往南籠府防禦撫標兵丁五十名行文撤回訖所有官兵大㨗緣由應聽督臣及提鎮二臣題報外臣謹繕摺奏聞再撫臣張廣泗招撫生苖一事各路官兵俱已到齊張廣泗現在調集土兵先將八達布置然後再進丹江合併奏明謹奏據奏八逹凱旋丹江招撫各情形朕懐深慰同日又奏為敬陳管見仰祈睿鑒事竊臣抵任後查得黔省從前命往人員俱巳挨次用完現在府㕔州縣多有懸缺待人之處雖委員䕶署未免顧此失彼當即咨商督臣鄂爾泰去後随經督臣酌委滇省候補知縣黄宗器試用知縣曹三善曹廷襄曽紀常林璵等五員又試用知縣盧造一員赴黔暫行委用并㑹疏具題仰懇皇上簡發人員來黔委署補用在案臣思府㕔州縣員缺固屬緊要而雜職官員有協理地方事務廵查差遣之責亦不可一日缺少今查新選黔省雜職人員多因路遥費難無力逺行或至中途逗遛不即赴任所以致員缺久曠臣愚以為嗣後貴州所出雜職員缺在湖南廣西四川雲南附近省分應選應補人員内按次銓補令其就近赴任較之逺省銓補之員赴任甚為便㨗但係臣管窺之見並無成例可援未敢冐昩具題是否可行伏候聖裁謹奏朕將爾此摺發交部議據該部覆稱以為不可今將部覆發來爾看諒必亦以為然也所奏以縣丞通判用之劉復向一摺亦交部議俟覆到時另降諭㫖同日又奏為奏聞事竊臣據貴西道王廷琬詳揭署普安州事試用知縣王汝賢貪劣各欵内開該州𣲖撥民夫輓運軍糧縱令家人衙役等每米一石逐家𣲖夫價銀三兩六錢及該州雇夫運米每石實給脚價銀二兩三四錢不等其所餘價銀通同分肥又該州所運米石竟係米榖攙雜粗糲不堪以致漢兵不肯赴領押令土兵勉强支食又該州調赴軍前經管糧石起程時勒𣲖舖戶夫馬價銀九兩五錢又該州額設驛馬除現在三十五匹多疲瘦不堪其餘十匹前經委員查勘俱係現覔充點等情前來臣查貴西道王廷琬詳内雖稱據南籠府知府黄世文詳揭等語但黄世文並未通詳揭報亦未預先將王汝賢劣蹟偹細禀知且所開濫𣲖夫價舖户等項又無受害人姓名可據其驛馬疲缺從前係委何員查驗因何不行詳報事闗糾㕘貪劣不得不查明證據是以随批布政司㑹同按察司糧驛道移行貴西道南籠府細查確實并咨明督臣鄂爾泰在案俟該司等查報到日如果確鑿臣即㑹疏題叅外所有臣批查緣由理合繕摺奏聞謹奏自當秉公確查必真知灼見後方議罰懲豈可令無辜者有寃抑耶同日又奏為奏聞事竊照藩庫錢糧闗係綦重故接受交代之時最宜詳慎今布政使鄂彌達為人倜儻言語明白但素未做過外官到任以來未免諸凡疎畧不細加查察其與前任革職藩司赫勝額交代冊結臣屢次行催始據鄂彌達詳送前來臣於八月二十日親赴布政司衙門率同在省各官將存庫錢糧按號彈兑其元寳每百兩短少二錢散封每百兩有短少三錢六七分不等者内中又偶有多一錢四五分及三錢四五分不等者臣當即查問據鄂彌達云昨接受交代時止照元寳數目查點接受並未彈兑臣因司庫錢糧闗係支放豈可輕重互異随回署繕文行令布政使鄂彌達將庫貯銀兩眼同在省各官逐一較準以便復盤而鄂彌達與糧道楊永斌當即親至臣署據鄂彌達云我一向做京官實在不諳錢糧所以彈兑時輕重不一凡有短少我自當照數補足遂取手本一箇向臣云這是舊日盤查規矩臣云盤庫乃係公事餽送規禮斷然使不得你如今身受皇恩不該仍踵舊習凡有陋規須悉行除去纔是鄂彌達將手本收回深以臣言為是随將錢糧彈兑補足復詳請盤庫臣於二十九日又往盤查每封元寳一箇餘皆小錠凑成一百兩彈兑足數現在將盤明正項錢糧照例另疏具題外臣聞得外面傳言云鄂彌達接受交代時為赫勝額所愚得過赫勝額交盤禮四百餘兩故不將錢糧彈兑遽行接受等語雖無證據而人言藉藉臣不敢不為奏聞又查黔省捐納一案鄂彌達所收銀兩惟聽庫官端木令儼及管捐書辦人等用民間使用貴平彈收每銀一百兩加平四兩到庫平上彈兑每一百兩實多銀三兩較從前藩司赫勝額署司趙𢎞本任内每貴平一百兩多收銀一兩凡捐納貢監生者庫官與書辦毎名額外收使費銀六兩内分給布政使家人一兩二錢實有二兩之數餘銀𤓰分如捐納知縣每一員收使費銀二十四兩自黔省開捐歴來如此交納迨鄂彌達到任有逺省鄉間人交納捐銀者庫官等見其過於老實又多收使費銀二三兩不等此等作弊庫官斷難一日姑容但臣細思㕘處庫官與鄂彌達遂有干礙且臣素䝉聖訓凡屬員中或有小過茍可敎導必須仰體皇上愛惜人才至意多方勸勉以觀後效况藩司係皇上擢用大員當簡用之時甚費聖心臣是以未敢冐昩將庫官端木令儼㕘處謹將鄂彌達不諳錢糧任聽庫官及書役䝉蔽作弊情由據實繕摺奏聞伏候皇上睿裁批示再鄂彌達到任之後凡有錢糧項欵不明例限舛錯之處臣俱將始末原委偹細説知總期敬謹辦理俾無錯悞而鄂彌達一經明白當即改正惟庫官端木令儼䝉蔽一事臣屢次向鄂彌達諄切相告鄂彌達總云庫官為人老實回䕶其非今臣不得不再為開誠説知如鄂彌達將庫官詳揭臣即據揭㕘處倘仍固執巳見臣惟有恭候諭㫖遵行合併陳明謹奏鄂彌逹才具原屬中平朕亦非有深知灼見而用也初因伊本部堂官雖滿漢屢經易人未有不稱其優者及差往閩省又能不辱朕命明白竣事回京復㫖所以擢授今職爾其留心訪察如猶肯矢志向上砥礪操守止於不諳外任事體從兹虛心學習日久不難練達設存茍且不肖之心抑或自恃暨有懐私沽譽等疵即據實奏聞於朕類此者原係試用朕不執定成見於胸中也同日又奏為奏聞事竊臣查得前任撫臣金世揚因黔省軍需公費借動司庫錢糧不能彌補動帑收買水銀賣價補庫一案經接任撫臣毛文銓奏明將水銀存抵奉㫖令金世揚作速補完嗣又奉諭㫖著落金世揚之子同伊家人清楚等因欽遵在案除前任布政使劉師恕申大成各任内賣過水銀價銀歸補外尚有貯庫水銀五千三百三十五擔抵銀一十五萬九千六百六十兩零經前署撫臣石禮哈題明將所存水銀分作兩次運赴廣東售賣巳委普安州知州洪奕隆赤畢營千總李士英押同金世揚之子金昭運去水銀二千七百擔餘剰水銀二詳請前撫臣金世揚動帑收買查原委前任普安縣知縣姚應鶴普定縣知縣何經文及前任修文縣知縣朱齊年等經手收買其水銀價銀連脚費繩筐等項每擔僅十五兩五錢有零而抵作二十九兩九錢存庫雖經部議賣不足數於金世揚之子名下追完但其子金昭等果否力能完補無由而知錢糧闗係重大豈容以暗少之價值存抵庫項之實數而從前歴任正署布政使劉師恕等於交代之時惟據冊開水銀即作舊管内一十五萬九千六百餘兩之錢糧遞相朦朧接受並不按照彼時各官所買水銀之實價確核詳報以致暗虧國帑歴久未清臣随將暗虧緣由細向布政使鄂彌達説知并行文飭查去後兹據鄂彌達查明通詳臣現在㑹同督臣鄂爾泰㑹疏具題伏候皇上敕部議覆外臣謹據實奏聞謹奏題明交部立案催追歸欵亦屬當然朕謂此項錢糧歴經有人擔荷諒必不致虛懸也同日又奏為奏聞事竊臣聞得布政使鄂彌達家人蕭大路過鎮逺府在貢生顔致明店内住歇即託致明買妾致明因原任鎮逺營守偹李應祥有一女未字現在擇親遂暗施巧計將自巳使女假作原任守偹李應祥之女向蕭大説合經蕭大當面看中講定聘銀二百五十兩迨説成付銀之後被李應祥風聞此事欲行控告蕭大聞知此信遂向致明要退原聘不買此女致明輒令黨棍出言無狀將本省官長娶本省民女之語挾制蕭大而蕭大無可如何不敢索取原銀情願人財兩空旋即私回藩署臣思布政司家人在本地買妾固屬非理但顔致明竟敢公然設計騙銀亦屬目無法紀此等棍徒斷不可容於地方臣現在密查顔致明素日有何惡欵俟查明確實臣即據其惡欵另案咨革嚴拏究處外謹此繕摺奏聞謹奏此事必須兩罰方為平允若回䕶藩司家人而偏究顔致明斷乎不可將此諭亦令鄂彌達看雍正六年十一月初六日署理貴州廵撫印務雲南廵撫臣沈廷正謹奏為奏聞事竊照四川雷波土司楊明義助惡不法奉㫖擒勦一案臣接准部咨即一面飛咨督提二臣一面委思州府知府劉䕶威寜府事大定州知州陳嘉㑹等辦運軍糧該府等俱各上緊料理已將糧石運送在案嗣緣軍務將竣所有㕘將哈元生遊擊卜萬年原領滇黔官兵在於川省交界堵截今哈元生等奉文撤師於九月二十一日起程至賊黨阿驢地方忽遇阿驢部落蠻賊前來抵敵陣亡千把總蘇世爵劉雄張應舉馬玉等四員兵丁三十餘名臣接閲報文知官兵又須前往擒勦糧務甚屬緊要随飛咨督提二臣并差臣標千總執持令箭馳赴威寜催運軍糧並探聽確情臣又思䕶威寜府事知州陳嘉㑹現在専司糧務而威寜城守營㕘將楊馥亦領兵出師威寜一切地方事宜不可不加意料理是以委銅仁府知府姚謙前往威寜借督運之名令其體察民情凡有緊要之事協同辦理臣謹繕摺奏聞謹奏爾等地方大吏猝聞意外事件最宜鎮静以無事處之若稍驚惶失措不特自亂主見亦且揺惑兵民視聽所闗甚鉅至於奏朕原可不必矯情飾詞然亦以奏報詳確氣度舒徐為貴觀爾殊屬褊狹不暗大體之甚朕非訓爾作意欺隠也更勿錯㑹似爾無能小器非過則不及柰何同日又奏為恭繳硃批仰祈睿鑒事竊臣前因奉㫖調補雲南廵撫復又命臣署理黔撫事務繕摺奏謝天恩奉有硃批又奏請展限盤查各屬存貯倉糧緣由一摺奉有硃批臣跪讀之下字字銘心鏤骨諸事務期準乎律例合乎情理固不敢瞻狥廢弛以博寛厚之名亦不敢分外吹求致有苛刻之處惟上遵皇上至公至明無偏無倚之聖訓敬謹辦理以圖報效於萬一耳所有原奉硃批奏摺理合恭繳謹奏朕觀爾之才具即心有餘而尚恐力不足若復不矢志勤恪倍加敬慎更當作何底止耶同日又奏為微臣恭䝉聖訓慚感彌深謹具摺奏謝敬繳硃批事竊臣因在陜西延安府任内失察甘泉縣侵蝕老民銀兩一案部議降一級調用仰䝉天恩從寛留任臣随繕摺奏謝今䝉皇上硃批敎訓令臣存諸内者竭力務一誠字復以鄂爾泰之居心行事奉為準則而效法之臣跪讀訓㫖不啻躬聆提命臣自問何人仰邀聖主成全期望之深恩至於斯極感懼踧踖莫可名狀天恩并繳硃批原摺謹奏覽同日又奏為奏聞事竊查黔省每年秋冬之間天多陰雨今嵗九十兩月以來細雨連綿晴日甚少是以各屬地方雖獲豐收而正當收穫之時值此陰雨且本年平糶之米各屬上緊買補還倉故米價比前稍覺増長臣思倉糧固須速為買補而民食亦不可不仰體皇仁因時籌畫所有本年平糶米石各屬既在買補若將歴年存價未買之糧一時並買勢必米價高昂再四斟酌自宜將歴年未買糧石暫緩買補俾採買既少米價自平適據布政司及糧驛道等具詳一兩一錢三分不等其餘各屬米價毎倉石八九錢以至一兩三四錢不等昨於十月二十七八等日天氣開霽自十一月初一日至初六日甚是晴朗臣謹據實奏聞謹奏覽同日又奏為據實奏明仰祈睿鑒事竊臣接准吏部咨文内開將湖廣湖南廣西等省保舉之貢生生員馮臣烈等帶領引見奉㫖馮臣烈崔汜向志文吳士堯周京勲劉樵丁應䇿陽造極陳齊襄吳鳳林命往貴州交與該督撫以知縣以下等官酌量委署試用魏琛著以訓導用欽此臣查命往人員内有陳齊襄係臣女壻今臣雖荷聖恩調補雲南廵撫但現在署理貴州廵撫事務查翁壻原無廻避之例而誼屬至親諸凡誠有未便伏懇皇上格外洪恩將臣壻陳齊襄命往别省委署試用令其效力則感戴天恩於無既矣臣謹繕摺具奏伏祈睿鑒謹奏黔撫印務爾係暫署所謂五日京兆耳乃故為避嫌之舉𤨏𤨏煩瀆殊屬不曉事之極同日又奏為奏聞事竊臣准原署貴州撫臣祖秉圭咨稱秉圭在署廵撫任内奉有御賜地理全圖大小十軸當即叩頭祗受嗣秉圭聞訃丁憂將地理全圖擕帶歸旗後始知降三級調用又接閲邸抄奉㫖朕所賜各省督撫提鎮等地理全圖出自特恩如該督撫提鎮等有陞轉他省及予告回籍者許其携帶前往其革職降調者不許帶回著留在本衙門交與接任之員與上諭等件一同敬謹收貯欽此所有欽賜地理全圖理合専差家人齎送查收等因到臣臣随將齎到欽賜地理全圖大小十軸恭設香案望闕叩頭查明與從前交代之上諭等件一同敬謹收貯除繕疏題明外謹具摺奏聞謹奏似此既經具題事件何必又多一番瀆奏揆汝之心但求於已無過而巳至於朕之煩勞毫無仰體之誠可謂庸愚無識之至雍正六年十二月二十六日署理貴州廵撫事務雲南廵撫臣沈廷正謹奏為奏聞事竊臣前䝉皇上天恩命臣署貴州廵撫事務伏讀上諭俟張廣泗到任後沈廷正再赴雲南新任欽此遵奉在案今接撫臣張廣泗來書云丹江等處事務既竣其上下九股俱經就撫即清水江一帶節據鎮逺府禀報向化者巳多惟黎平之古州一處雖宣導在先現俱寜帖而地廣人衆猶須親身一往布置但黎平窵逺非如凱里都勻之尚近省㑹兼之丹江八寨諸凡善後圖維尤闗緊要擬於正月初間暫回省城再當星赴黎平等語臣思丹江生苖業經就撫今撫臣張廣泗既定於正月初間旋省俟届期臣理宜欽遵諭㫖將印信等項交代明白即赴雲南新任但張廣泗又有到省後再赴黎平料理之説臣現在寫書請敎督臣鄂爾泰如督臣以臣必須送印起程臣俟張廣泗到省即將印信等項及一切事宜交代明白恭疏題報前赴雲南新任如督臣别有商酌臣自當聽其指敎另摺奏聞至督臣鄂爾泰為人正直公忠其居心行事悉皆報國愛民無偏無私實為人臣之表式數月以來臣事睿鑒謹奏張廣泗既於黎平古州有尚須親往布置之處則爾自應仍留黔省署理以待事竣但督臣鄂爾泰又有來黔與金錤面議之事滇省亦不可無人滇黔二省或去或住之處與鄂爾泰熟商妥議而行可也同日又奏為奏請聖裁事竊惟龍神専司雨澤福國祐民欽奉諭㫖令各省督撫迎請供奉本地䖍誠展祀仰見聖主愛民重農之至意前撫臣何世璂接到大學士富寜安等寄書内開可於廵撫衙門相近擇吉方潔淨之處建屋數間以為祠宇等語彼時因廵撫衙門左近並無可以建祠之地適署前東南隅昔曽建有明臣王守仁書院一所號為陽明書院遂興工修葺改作福黔潤澤龍神祠宇供奉䖍祀將王守仁牌位另置他所臣查王守仁謫為貴州龍場驛丞時著書立説講明聖賢之學化民牖俗黔之人士無不被其敎澤咸知誦習詩書臣考之記載訪之輿論王守仁實屬有功名敎而陽明書院素為貴州省城士子瞻仰誦讀之所今一旦改為龍神祠宇勢必另為經營創搆以臣愚見自應特建龍神専祠始足以妥神靈而昭誠敬臣前與司道等在於省城看有龍井泉地方一處甚是潔淨且與廵撫衙門亦屬相近約需工價銀三百餘兩即可於此處建造祠宇數間供奉龍神將此祠宇仍作陽明書院不特彰王守仁牖民講學之功而衆士子亦得在内肄業一轉移間神人胥悦莫不感戴皇恩於無既矣是否可行伏候聖裁批示謹奏此舉是當妥協之至前任所辦大錯矣且觀前此改作或有私意存焉何也何世璂素乃留心理學儒臣伊等皆各立門戶互相是非今以陽明書院改為龍神祠若云無心之失何錯悞竟至於此然一切不必究論但俯順輿情料理為是同日又奏為恭繳硃批仰祈睿鑒事竊臣前奏布政使鄂彌達初任外官不諳錢糧一摺奉到硃批臣遵查布政使鄂彌達先因諸事生疎偏執巳見迨臣屢次開誠相告而鄂彌達恍然明白已於九月十八日將庫官等所得捐納陋規槩行革除勤加稽察杜絶弊端近日辦理一切政務雖比從前留心然尚多不諳凡與臣商酌者臣無不偹細説知務期情理允協不致錯誤倘從此果肯黽勉自勵誠如聖諭日久不難練達矣若鄂彌達不仰體聖懐存私沽譽臣自當據實奏聞不敢為之諱飾也所有原奉硃批理合恭繳謹奏知過能改則無過矣果肯虛衷學習何事不可漸諳但當據實奏聞不必為之隠飾硃批諭㫖巻四十五上欽定四庫全書硃批諭㫖巻四十五下硃批沈廷正奏摺雍正七年正月十六日雲南廵撫臣沈廷正謹奏為奏聞事竊臣於上年十二月内因撫臣張廣泗寄書云丹江事務既竣定於正月初間旋省之後再赴黎平料理臣随將應否移交印信前赴雲南新任緣由寫書請敎督臣鄂爾泰嗣准覆稱新任既到送印自屬正理等語臣又准撫臣張廣泗咨稱於正月十七日抵省到任是以臣將印信等項於正月十六日照例委員齎送撫臣張廣泗接受任事臣即於十七日起程前赴雲南廵撫新任除另疏題報外謹繕摺奏聞至於臣在署貴州廵撫任内事無鉅細俱皆請敎督臣鄂爾泰商酌辦理所有現在檄飭司道查議未經完結各緊要案件今臣起程赴滇俱巳偹文咨明撫臣張廣泗酌議辦理矣理合一併陳明謹奏爾署理黔撫一任頗稱盡職可謂不玷委任勉之勉之身膺封疆重寄於地方無事時自當謹守倘遇有應行料理處須將智識局量再加擴充逺大庶免狹隘之疵此又在汝審巳量力而為非朕所能强者張廣泗雖經擢授今職朕尚未與謀面爾觀其人以為如何同日又奏為恭報大㨗仰祈睿鑒事竊臣前因擒𠞰四川雷波土司楊明義一案有領兵㕘將哈元生等在川省交界地方堵截於撤師之時被阿驢部落蠻賊拒敵官兵臣随委員辦運糧務及督臣鄂爾泰遣兵進𠞰緣由繕摺奏聞今於本年正月十二日據雲南元江協副將哈元生報稱所有阿驢者呢等犯前經就縛而賊首拉金父子四人並家屬已於十二月二十四日拏獲奉鶴麗鎮張總兵諭令撤師隨於二十七日帶領官兵起程回營等情臣伏思我皇上天威逺播至仁廣被是以各路㺜苖悉皆蕩平使姦頑頓除善良歸化凡屬臣民共享聖世昇平之福於無既矣謹將大㨗緣由繕摺奏聞謹奏朕於凡事非有竒謀異䇿惟虛心順理仰承天地神明之錫佑並我皇考之垂庇耳然每有所指授俱幸成功即此推之汝等封疆大吏但能以忠誠之心對越上天未有不邀福之理何必皇皇為一身榮辱利害計耶鄂爾泰實能如此當竭力效法之雍正七年二月十九日雲南廵撫臣沈廷正謹奏為奏聞事竊臣仰䝉皇上天恩調補雲南廵撫巳於本年二月初一日抵任所有一切地方事務臣俱請敎督臣鄂爾泰而鄂爾泰公忠為念無不開誠指示且精神甚好娓娓不倦臣受益良多兹督臣因有盤查貴州藩庫并經理苖疆及廣西地方事宜於二月十八日起程前往貴州矣臣膺斯重任惟有遵守督臣鄂爾泰良規夙夜黽勉以圖上報聖恩於萬一耳再查滇省地方上年收成頗獲豐稔今值東作方興於二月初九日得雨二十四日舉行耕耤後又得雨澤二十七日夜間得雨霑足豆麥可望豐收此皆我皇上誠敬昭格宵旰勤求是以邊末遐方均䝉聖澤臣謹繕摺奏聞謹奏所奏知道了能自知是一庸平材質在己常思勤以補拙事上惟務不欺不隠庶可循分供職非朕獨私於汝而過任之督撫中似汝不勝任者尚不可枚舉人為才限亦屬無可如何之事若更行不符言少渉欺隠則常賚博爾多傅鼐等皆可為前車之戒如能效法鄂爾泰十分之一即一生用之不盡但恐器小不能大受是在汝之自勉自進也雍正七年五月二十一日雲南廵撫臣沈廷正謹奏為奏聞事竊據大理府城守營遊擊姜忠臣禀稱有本營兵丁金貴於本年三月十六日在街場拾得銀五兩不肯挾歸守候失銀之人尋認随有賣鐵鍋之趙忠福因失銀呼號金貴查詢明確當將原銀交還不受謝禮又據威逺同知章元佐詳報有陜西人馬伯倫王國輔江西人蕭五同至威逺地方於本年三月十九日用朦汗藥將江西客商蕭維先叔姪迷昏攫取銀兩旋即盤獲一案有威逺賣煙小販彭士竒於三月二十六日在獲賊處所拾得銀一包計六十兩赴該同知衙門投繳查係馬伯倫遺失贓銀士竒並無絲毫隠匿等情臣查兵卒農民拾金不取克敦亷節此實聖朝敎化逺被是以各省尚義之事接踵而見随寫書通知督臣鄂爾泰去後今覆稱前有廣南兵丁李應芳拾得生員羅國榮聘銀交還却謝據報即行奬賞以偶見一事尚未具奏今大理營兵金貴不取遺金威逺烟販彭士竒拾贓投繳逺方兵民尚義輕財實皆聖徳感孚所致除奬賞外理應一併奏聞等語臣謹據實奏達聖聰伏祈睿鑒謹奏據鄂爾泰奏聞巳有㫖矣同日又奏為奏聞事竊查滇南各屬麥豆收成分數臣據布政使張允随詳報前來據開昆明嵩明尋甸阿迷通海定邊等州縣二麥收成有十分并有倍收之處蠶豆俱收成十分又宜良南寜新興永平雲龍鎮沅等府州縣二麥收成有十分蠶豆收成九分其餘各屬二麥收成亦俱有十分蠶豆收成俱有八九分不等更喜五月十一日起至十九日連得透雨民間栽插滋培均屬有賴惟據曲靖府屬陸凉州具報有馬厰一處於四月十六日因上流河水泛漲將麥穗淹浸等情臣随委曲靖府知府劉斌馳赴確勘情形并令查有實在貧民酌給倉榖加意撫恤去後兹據回稱馬厰田地通計三百餘頃向係牧馬之所其地勢最低每值收麥後至五六月間凡曲靖所屬霑益馬龍等州河水泛漲悉皆滙歸馬厰今嵗因有閏月節氣稍遲麥穗尚未收穫忽於四月間發水致淹田地二百三十七頃有零尚有未淹田地一百餘頃俱獲十分豐收在被淹小民咸稱馬厰田畝甫經承認耕種題報輸糧今既被淹無從辦納惟求免徵本年糧銀不敢具領倉榖等情臣查陸涼州馬厰田畝百姓承種方新偶值淹浸糧無所出是以籲懇免徵本年糧銀實係小民下情臣仰體皇上惠愛邊黎至意随同在省司道商酌若照分數具題蠲免無㡬可否恩施格外將馬厰被淹田地應輸本年糧折銀一千餘兩免其徵收在於藩庫偹公存剰銀内撥補完項其未淹田地應完糧銀仍令百姓照數輸納毋許冐濫請免是新陞糧銀既已有項可補而承種馬厰小民咸得沾沐聖澤且通省豐收惟一馬厰被淹又可免於題達臣業經寫書請敎督臣如鄂爾泰以臣所議為是當即一面另摺奏聞一面照此辦理如必須將被淹分數題報臣亦即㑹疏具題為此謹奏當日正因地非沃壤所以作為馬厰也照汝所請料理無庸㑹疏題報同日又奏為恭繳硃批仰祈睿鑒事竊臣前在署貴州廵撫任内聞撫臣張廣泗自軍前抵省臣應否赴雲南新任緣由繕摺具奏奉有硃批又奏請另建黔省龍神専祠緣由一摺奉有硃批臣跪讀之下不啻躬聆聖訓感深肌髄至督臣鄂爾泰之學問識見迥非㝷常泰而鄂爾泰無不條分縷析向臣説知今鄂爾泰雖暫往黔省臣亦事事寫書請敎均承詳細指示臣得遵循辦理但自揣器小才庸惟有犬馬愚誠時時對越我皇上造就微臣之洪恩於萬一耳所有黔省另建龍神専祠臣欽奉硃批随通知督臣鄂爾泰并寫書與貴州撫臣張廣泗遵照辦理矣敬將奉到硃批原摺恭繳謹奏勉為之毋令朕抱誤用之慙也雍正七年六月十八日雲南廵撫臣沈廷正謹奏為恭逢盛世嘉徵日華與慶雲並耀事竊照雲南省城於本年六月初十日巳午未三時日光炳耀五彩繽紛更有慶雲捧䕶山川城郭映照輝煌随據司道府縣紛紛禀報前來臣登署中平臺仰視不勝抃舞欣慶而十二日巳午二時又復呈現與初十日煥麗無異實屬千載難覯之嘉徵亘古罕見之詳瑞臣叨任邊方恭逢上吉雖聖主不言瑞應但臣等既有所見何敢不敬陳黼座除寫書通知督臣鄂爾泰外謹據實奏聞并繪圖恭呈御覽再應否與督臣㑹疏具題伏乞皇上批示遵行合併奏明謹奏於鄂爾泰奏摺内已批有諭㫖矣同日又奏為奏聞事竊本年五月二十八日臣據曲靖府知府劉斌詳據南寧縣報稱五月二十一日夜間天降大雨山内起蛟發水以致東北二鄉衝決圍堤四十餘圩秧苖被淹近堤房屋亦有倒塌人民幸無損傷等情臣因督臣現在黔省一面寫書通知一面批令布政司飭委澂江府知府王鐸星馳前往率同該縣親履查勘并動給司庫偹公銀五百兩及常平倉榖令將實在被淹小民酌量輕重分别賑恤去後又據南寧縣禀稱東北二鄉地勢原屬低窪今被淹之田約有一萬餘畝倒塌民房約有二百餘間幸天色晴霽水漸消退高阜田禾尚屬有望等語臣查該縣所報偶值起蛟發水其是否成災雖尚未據該委員確勘造冊具詳但被淹田畝係久經輸糧老田是以臣㑹同督臣鄂爾泰先將被水情形照例題報俟勘明果否成災再行題明謹奏查明被水情形加意撫恤題本亦經到部矣雍正七年七月二十九日雲南廵撫臣沈廷正謹奏為聖朝恩威逺播遐方慕義輸誠恭摺奏聞仰祈睿鑒事竊臣據元江府知府遲維璽報稱臨元鎮邱總兵自思茅地方寄書云接到老撾國南掌那管島孫緬文内云天朝皇帝聖明風調雨順南掌沾恩特遣使貢象二隻乞轉達等語臣查老撾國即古之越裳氏自成周朝貢以後歴數千年史不多見兹不煩兵威不須招致一旦聞風慕義恭進方物此實我皇上徳威逺播超邁百王是以使從未歸誠之逺域梯航重譯效順王朝也臣敬體聖主加惠逺人懐柔萬國至意即與布政使張允随商議動支公項銀兩酌偹紬縀布疋委令知府遲維璽齎往思茅交鎮臣邱名揚從優賞賚并令遲維璽擕帯供給銀兩沿途加意料理照例伴送使臣來省臣巳將此情由寄書黔省通知督臣鄂爾泰去後正在繕摺間今又接鎮臣邱名揚來扎云該國所貢二象因途中水土不服行至闗坪等處相繼病斃使臣甚為惶懼但其誠既著其物原可不問且牙骨猶存表文具在仍即遣員慰賚伴送來省等語臣復又通知督臣俟使臣到省之日統聽督臣㑹疏題報外理合繕摺奏聞謹奏覽鄂爾泰亦經奏聞矣同日又奏為奏聞事竊臣前因曲靖府屬南寧縣東北二鄉偶值起蛟發水田畝被淹業將委員查勘緣由繕摺奏聞并將情形題報在案兹據布政司詳據委員澂江府知府王鐸等將勘明被淹田畝分數造冊具結請題蠲免前來臣現在與督臣鄂爾泰㑹疏具題外再滇省今嵗入夏以來雨水過多據晉寜宜良呈貢富民新平等州縣并楚雄府陸續禀報六月二十五六及七月初一二等日各該地方連值暴雨河水驟發近河田畝間有被淹等情臣随批令司道委員確查并通知督臣去後即於七月初三日設壇祈禱幸賴聖主精誠黙孚上格穹蒼晴光即行呈現雨水漸稀至初六日雲開日朗天氣大晴據楚雄等各該府州縣報稱數日之内積水盡消田禾並無妨礙等情到臣伏思滇省地處高阜山田十居七八故從來雨水畧少即不能遍施栽插今嵗高低田畝悉行播種雖窪下之區偶有被淹然亦旋即消退惟南寜東北二鄉地勢最低積水不能盡消其餘各屬早稻業巳結穗晚稻現在吐花雜糧亦皆葱欝而元江鎮沅兩府因天氣較别屬炎熱故早稻現已豐收合併據實奏聞謹奏鄂爾泰暫離滇境地方上即疊報小災斯豈無因而至歟汝若不知愧懼則非具人心者矣似此徵應之理昭如影響朕實為之凛然汝等受封疆之重寄内省二字當時刻勿釋懐抱同日又奏為奏聞事本年七月二十八日據大理府城守營遊擊姜忠臣禀報大理城内於七月十四日戌時起至十七日連次地動趙州城内亦於十六日亥時地動兩處城垜哨房及素有欹斜之居民房屋倒塌數處并損傷大小婦女二口等情又據永昌道及大理府趙州各禀報地動日期俱與遊擊姜忠臣所禀相同臣随批司委員確勘情形並動支司庫偹公銀兩將倒塌房屋損傷人口之處照例賑恤在案又接得提臣張耀祖來扎云自七月十四日至十七日偶然地震即與永昌道設壇齋戒祈禱十八日至二十一日遂安静寜謐不復震動等語臣伏思滇省四境皆山無通江大河以洩地氣故父老人等咸稱地震之事歴來恒有且今地動非雍正二年地震可比除寫書通知督臣鄂爾泰併俟委員勘明覆到之日另行奏報外理合據實奏聞謹奏值兹上天垂示災異毫無愧懼不知修省乃謂為恒有之事汝若似此無忌憚居心必至不克有終將朕此諭謹誌勿忘若不痛自刻責盡消鄙陋存一分不信不畏之心則増一分自障自礙也試體驗看同日又奏為恭繳硃批仰祈睿鑒事竊臣前奏自貴州起程抵雲南廵撫新任日期并雨水情形一摺恭奉硃批訓勉以常賚博爾多傅鼐為前車之戒如能效法鄂爾泰十分之一即一生用之不盡欽此伏念臣賦質庸愚才識淺薄屢䝉皇上諄切敎誨勉其不及䇿其將來臣心非木石寜不自知是以抵滇以來早夜黽勉時深恐懼今復䝉皇上硃批垂誡言言金石切中臣弊臣敬遵寳訓刻骨銘心惟有矢竭愚誠效法督臣鄂爾泰之十一以仰酬我聖主敎誨之洪恩耳所有奉到硃批理合恭繳謹奏竭力倣效之其或庶幾耳同日又奏為恭繳硃批仰祈睿鑒事竊臣前因官兵擒獲阿驢部落賊首随將大㨗撤師緣由繕摺奏聞奉到硃批伏惟我皇上宵旰靡遑念念感孚天地勵精圖治事事推本聖祖是以天眷彌隆逺邁千古臣謬任封疆雖才識庸陋未能仰報涓埃而忠君親上之大義臣實朂諸寤寐勵諸終身兹䝉聖諭臣跪讀之下倍深感惕惟有勉力效法督臣鄂爾泰矢竭丹衷以圖報聖主屢次敎誨之恩於萬一耳謹將原奉硃批恭繳謹奏朕非好為是頻頻訓諭也所諭者又無非此數語然朕之所以不憚煩者葢恐下愚不移之質漸摩匪易而人情又每於熟處難忘故於汝時加提撕儆覺耳倘能觸目動心努力向是處立定脚根則汝之福祉未艾而於朕用人顔面亦有光也勉之但捨巳之短法人之長甚屬難事莫作容易看雍正七年八月二十日雲南廵撫臣沈廷正謹奏為恭繳硃批仰祈睿鑒事竊臣前奏恭繳硃批摺内奉到殊批朕亦有昧知人之明而誤用者指不勝屈覽汝此奏殊増慚愧欽此仰惟我皇上聖明天縱行政用人超軼前古是以小廉大法吏治澄清即有改易操行不實心奉職者乃其自甘暴棄而於聖主知人之哲無與也臣伏讀硃批自揣不勝惶悚所幸督臣鄂爾泰學問深䆳才識超羣諸凡地方事宜臣無分鉅細逐一請敎承督臣開誠指示婉轉周詳臣又見其開闢苖疆撫綏軍民諸務人皆視為艱鉅難能者而督臣調度得宜速奏厥功使從來頑梗之苖民俱輸誠納賦樂聖慈於無既矣所有奉到硃批理合恭繳謹奏覽雍正七年十一月初七日雲南廵撫臣沈廷正謹奏為奏聞事竊滇省自本年六月十五日以前日華慶雲瑞應俱經督臣鄂爾泰同臣㑹疏題達嗣據布政司詳報烏䝉府於十月初九日擇吉營建萬夀亭闔郡文武兵民仰見日麗中天彩雲捧䕶歴午未申三時至初十十一兩日更覺光華倍常新闢苖疆見此慶雲莫不歡欣踴躍感頌皇仁又臨安府屬之新平縣於九月二十八日皎日當空旁繞五色慶雲經卯辰巳三時等情到臣臣巳據詳㑹同督臣現在恭疏具題外又本年八月内大理武定兩府地方山間俱産有靈芝閏七月内大理府屬趙州詳報白崖地方仙女莊蝦蟇口兩處地湧醴泉二股可以灌溉雷鳴田畝有益民生臣随批司道㑹勘去後兹據覆稱委員勘明仙女莊蝦蟇口兩處相隔二里並出醴泉且蝦蟇口於具報後九月内泉傍又湧小泉兩穴滙入大泉分流浥注惠及七村等情臣謹按書史昔時雖有醴泉未必有益民生可濟農功今所湧醴泉實為從來未有之上瑞要皆我皇上宵旰精勤至誠昭格是以天不愛道地不愛寳瑞應頻仍萬姓䝉福黄童白叟無不踴躍稱慶頌戴皇恩臣身任封疆屢䝉皇上提撕儆誡遇此嘉徴疊見惟有益加敬謹勉盡厥職以圖涓埃之報於萬一耳除㑹同督臣鄂爾泰恭疏題報外理合一併奏聞謹奏滇省此數種祥瑞與爾毫無交渉實係鄂爾泰忠誠感格之徵應朕亦不居也莫存無恥之念同日又奏為恭繳硃批仰祈睿鑒事竊臣前因南寜縣起蛟發水被淹田畝照例題蠲又因滇省今嵗入夏以來雨水過多晉寜宜良等州縣近河田畝間有被淹随繕摺奏達聖聰今奉到硃批臣伏念天人感格之理昭然不爽督臣鄂爾泰公忠體國克著勲猷是以滇省數年來時和年豐兆民樂業今嵗督臣因公赴黔暫離滇省即䝉上天垂示小災實臣敷政不能上格蒼穹所致故前於祈禱之時夙夜惶懼痛自刻責兹復䝉皇上諄諄告誡臣雖愚鈍若不更加敬畏時刻自省則固犬馬之不若也所有微臣謹遵聖訓銘勒情由理合繕摺奏聞併繳硃批謹奏魯論云君子有三畏可見畏之一念時刻不可去懐果能如此日久無間上天神明自有照鑒為人為臣之道畢矣同日又奏為奏聞事竊臣前准戶部咨文欽奉諭㫖各省地方每銀一兩止許換大制錢一千文不得過一千文之外等因欽此臣伏查滇省出産銅鉛設爐鼓鑄且將鑄出錢文運送他省易銀歸本原與别省不同故向來錢價每銀一兩換大制錢一千五百有零及一千四百餘文不等不惟官運無虧本之虞即民間日逐零星使用購買薪米食物等項亦稱利便昨部文到時臣恐市肆貿易價值不能即随錢價低昂彼時督臣鄂爾泰因公在黔臣正與布政使張允隨商酌間適督臣亦寄扎藩司囑令因地權宜暫緩出示臣又寫書請敎督臣覆稱滇省厰有銅鉛開局鼓鑄原與他省不同等語及督臣回滇臣復面為斟酌督臣云現在民間錢價已經漸次昂貴今且暫緩出示將來自然歸到每兩一千之數既得上遵諭㫖又可下便民情因地制宜似為妥協緣事關錢法理合據實奏聞謹奏朕諭葢為直省通盤大局而發也其間斟酌損益全在汝等因地制宜而時措之此事若依汝庸愚之見自必但以遵㫖為然拗直作曲削方為圓勉强驅迫以圖集事而時勢之經權民情之便否概置不論矣朕之所以信重鄂爾泰田文鏡李衛者正在此等處百凡但聽督臣指示而行未有不合朕意之理較汝等庸才迎合之道迥異似此以一是字求合故羣工胥莫能及三臣之秉公順理不事迎合所謂能盡恭順之大者也其勉力則而效之同日又奏為恭繳硃批仰祈睿鑒事竊臣前奏恭繳硃批一摺奉有皇上訓諭伏念臣以駑駘下質䝉聖主頻賜敎誨期望成材又諭臣竭力效法督臣鄂爾泰俾有進益臣每念高厚隆恩不勝感激涕零至捨巳之短法人之長誠如聖諭實為難事以督臣鄂爾泰之學問經濟臣雖竭力效法欲得其十分之一尤非容易是以臣不但事無鉅細請敎督臣且復再四懇請督臣將臣素日我皇上之訓㫖也惟是臣自問何人䝉皇上屢次諄切敎導即寤寐飲食實多感愧臣雖至愚至鈍寜不觸目警心益加努力向是處立脚以期無負我皇上生成造就之恩於萬一所有奉到硃批理合恭繳謹奏朕拭目以觀汝之勉勵也同日又奏為恭繹聖訓微臣愧悚難名敬繳硃批仰祈睿鑒事竊臣前因大理府城并趙州城内於七月間地動随繕摺奏聞奉有硃批臣當即免冠叩首惶悚愧悔流涕自責望闕謝恩伏念臣䝉皇上天恩㧞置廵撫身膺重寄不能上感天庥以致大理府並趙州兩處地動臣初接該府州禀報五内凛惕戰懼恐惶日夜引咎自省以冀感格蒼穹乃繕摺之時未曽將臣愚悃寫入竟將滇省俗𫝊以地震之事為歴來恒有等語繕寫摺内罪實難逭今䝉皇上諄諄敎誨提撕警覺臣惟有謹誌聖訓不敢以無忌憚居心痛自刻責益加信畏以仰副我皇上敎誨成全之恩於萬一耳合將原奉硃批恭繳謹奏從來小人但知畏威畏害畏貧而巳此外則恬然不以為意不如是聖人何以言小人而無忌憚耶正為其不當畏而畏當畏而反不知畏也雍正八年三月二十一日雲南廵撫臣沈廷正謹奏為恭繳硃批仰祈睿鑒事雍正七年十一月二十日臣齎摺家人回滇恭捧皇上硃批原摺六扣臣叩頭跪誦仰䝉我聖主萬㡬之餘訓誨微臣叮嚀剴切臣受此殊恩彌深感悚雖肝腦塗地難答高深惟有欽遵聖諭將督臣鄂爾泰敎導之語實力勉勵俾愚陋漸開稍竭犬馬之報於萬一耳敬將奉到硃批原摺六扣恭繳謹奏實力勉勵與否在汝捫心自慊仰天不愧耳同日又奏為恭繳硃批仰祈睿鑒事竊臣前奏滇省疊次瑞應一摺奉有順之大也兹䝉子者臣何幸而得遭逢聖主且與督臣鄂爾泰同事一方朝夕相晤臣惟有夙夜孜孜效法督臣鄂爾泰以竭盡犬馬之微誠耳至滇省嘉徵疊見實係皇上誠敬感召所致且簡任總督臣鄂爾泰節制三省公忠宣力故祥瑞屢昭䝉皇上格外提撕戒臣莫存無恥之念臣跪誦感激惟有時時敬畏益加惕厲凡事請敎督臣鄂爾泰指示而行以上酬高厚生成之恩於萬一耳理合將原摺硃批恭繳謹奏覽同日又奏為恭繳殊批仰祈睿鑒事竊臣前恭繳硃批奏摺三扣内奉硃批從來小人但知畏威畏害畏貧而巳此外則恬然不以為意不如是聖人何以言小人而無忌憚耶正為其不當畏而畏當畏而反不知畏也又䝉硃批魯論云君子有三畏可見畏之一念時刻不可去懐果能如此日久無間上天神明自有照鑒為人為臣之道畢矣又䝉硃批似汝庸才仍未解鄂爾泰同任封疆不便直言之意朕姑以數語譬曉之令汝明悉如鄂爾泰乃係為國家做官沈廷正係為沈廷正做官此所以二人有霄壤之分也根本處見未透枝葉邉縱千萬言亦講不備汝自言切中汝弊猶屬醉鄉説夢不但未解鄂爾泰之意即朕訓汝局淺量狹之意亦未能領㑹也誠欲力改弊病惟務本毋逐末而巳又䝉無忌憚與三畏之君子迥然霄壤大哉王言闡前聖之精微發先儒之未及誠足為萬世之謨訓矣臣雖至愚極鈍自當慎擇其所當畏者時刻提撕以仰副我皇上懇切垂誡之至意臣上不能體聖主之訓下不能喻督臣鄂爾泰之意自是臣賦質愚昩理㑹不到所致今䝉皇上諄諄開導又復直截提撕指點根源跪誦再三感激流涕臣惟有竭盡愚誠夙夜敬畏以仰報高厚於萬一耳所有原奉硃批理合繕摺恭繳謹奏諄諄言之不啻舌敝唇乾若猶不能領㑹而無憤悱之心則為木石之無知洵非人類矣同日又奏為恭謝天恩事竊臣因原任陜西延安府任内有鄜州革職知州高怡等各任内私借倉糧一案未經查出經部議革職奉㫖從寛降三級留任臣跪讀之下感激涕零愧悚靡涯隨恭設香案望闕叩頭具本奏謝外伏念臣一介庸愚過愆叢積寸長未效屢䝉皇上逾格隆恩正在惶愧恐懼寤寐難安兹復荷恩綸寛宥臣益覺慚感交集此生即捐糜頂踵亦不足上酬高厚之恩惟有夙夜氷兢圖贖前愆恪遵諭㫖愈加勉勵以仰報皇上生成之恩於萬一耳臣不勝激切惶恐之至謹繕摺恭謝天恩伏祈睿鑒謹奏玷職之羞至於再三不特汝懐慚恧朕亦代汝愧之同日又奏為保舉事前欽奉上諭外官所轄之現任佐貳雜職等屬員亦准其保薦等因仰見我皇上因材器使慎選庶職臣至滇省以來凡末僚進見亦必加意體察延訪庶務以觀其才具見烏䝉府經歴金言人頗明白辦事勤慎可勝州縣之任臣於上年即與督臣鄂爾泰㑹商據鄂爾泰亦云金言前任晉寜州吏目時奉職勤敏調陞今職在烏䝉辦事努力洵堪保舉之員臣彼時因金言現委運制錢前往廣西俟其回滇之日再為保送今金言已經回任正在保送間適接部文奉上諭著將各保一人之例停止欽此臣不敢越例保送但臣見金言能勝州縣之任亦何敢不據實奏聞以仰副皇上愛惜人才之至意倘䝉恩准引見臣即給咨令其赴部伏祈皇上睿鑒批示遵行謹奏准爾保送即援此㫖咨明該部可也同日又奏為仰䝉聖恩垂訓感激難名敬抒下悃伏祈睿鑒事本年三月十九日督臣鄂爾泰將前在桂林接到爾泰陳明鹽務厰局事件應聽撫臣沈廷正總理摺内欽奉硃批沈廷正操守甚不可信卿酌量之回滇時將朕諭令沈廷正知之欽此臣跪聆之下惶悚無地感激涕零當即叩頭謝皇上特賜寛宥諭㫖敎誡開導諄切靡所不至若猶不能恪守清操稍萌不肖之念則實無以自列於人類兹復䝉皇上令督臣鄂爾泰轉傳諭㫖臣惟有益加勉勵砥礪廉隅以期無負皇上敎育之洪恩於萬一耳所有督臣轉傳諭㫖緣由理合繕摺恭奏伏乞睿鑒謹奏但當痛加洗滌勵心砥行空言無益也雍正八年五月二十四日雲南廵撫臣沈廷正謹奏為恭謝天恩事竊臣因前任福建布政司任内將存庫銀内通融預給兵餉雖循例借動詳明督撫現今陸續解補還項但造送雍正五年季報冊内失於分析聲明疎忽之咎實所難辭兹經部議革職奉㫖沈廷正從寛免革職著降二級留任臣跪讀之下感激流涕随恭設香案望闕叩頭具本奏謝外竊念臣以庸愚下質歴任過愆叢多屢䝉皇上逾格隆恩予以寛典正在捫心惶恐無地自容兹復䝉恩綸寛免許令自新臣益覺漸感交集恩重身輕惟有朝夕儆惕愈加奮勵以仰報高厚生成之恩於萬一耳臣不勝激切愧感之至敬繕摺恭謝天恩謹奏朕實代汝愧之倘仍不知耻誠可謂下愚不移者矣自此以後若不革面革心改絃易轍現在雖獲僥倖終至不能保全也勉之慎之雍正八年十月二十四日山東河南河道總督臣沈廷正謹奏為恭請陛見仰祈俞允以抒下悃事竊臣於本年十月二十日接准部咨欽奉上諭雲南廵撫沈廷正著補授山東河南河道總督欽此臣聞命自天感悚無地當即恭設香案望闕叩頭具本奏謝外伏念臣於雍正四年䝉恩擢授福建布政使得以仰覲天顔之後迄今四載有餘依戀愚誠時縈寤寐原擬今嵗之冬恭請陛見稍抒微悃今又荷聖恩補授山東河南河道總督則微臣之趨赴闕廷瞻仰雲日更為切近且河道情形及堤工諸務尤關緊要自必躬親跪領聖訓指授方能料理妥協伏祈皇上俯念河務工程關係重大准臣陛見臣現赴河南恭候諭㫖不勝感激待命之至謹奏應至京見朕然後再赴新任雍正九年二月初九日山東河南河道總督臣沈廷正謹奏為奏聞事竊臣於本年正月初五日叩覲天顔荷䝉皇上訓諭周詳兼念桃汛在邇命臣速回豫省查勘河工俟督臣田文鏡㡬時可以交印令其具奏臣已於正月二十六日抵豫随將諭㫖向督臣田文鏡宣述并將面奉皇上交臣帶給督臣田文鏡奏摺一紙交付祗領訖臣即於二十九日起程查勘黄河北岸工程至二月初八日順道進省將勘過工程向督臣田文鏡請敎復於初九日由祥符縣南岸程家寨一帶查勘俟勘竣另摺具奏外臣昨從祥符封邱陽武原武滎澤鄭州中牟等州縣經過地方見有乏食窮民鳩形鵠面沿路求乞而村鎮中更有賣鬻男女為山陜客商買去者每日遇有數起又聞鄉村有糧百餘石之家即為附近貧民覬覦每於夜間羣相借貸甚至集場街市竟有將孩童插標出賣並有搶奪食物茍延喘息之人即省城亦然臣已據目擊情形與督臣詳細説知督臣遂云從前招回窮民到家之後俱各給有口糧以資養贍上年嵗底又曽捐散過錢七十餘千而司道以及州縣等官亦有捐散之項現在開倉平糶還令地方官酌量借給至於鄉村窮民乗夜借糧之處洧川縣已有報案賣人之事亦有所聞但未知如此偹細何以近日情形一至於此等語臣又云豫省沿河十四州縣除武陟縣高阜田地居多上年被水尚少其餘各屬田地原有高低被水自有重輕未可一槩牽扯而論今既開倉糶借必須擇實在被水乏食窮民與陸續招回戶口平糶之外再行分别借給并將應完課賦暫緩差催以息追呼之擾現今麥苖在地若能接濟兩月口糧俟至二麥成熟小民便獲安全督臣採聽臣言随即寫札諭令各屬作速料理至於賣鬻男女之中保媒人督臣即欲拘拏究處嚴行飭禁臣思窮民賣人原因一時不能度活暫為保全性命之計彼此情願若一經追究反無生路只須速為調劑㑭其度日有資自然不禁而止臣謬抒管見不過就時論事今督臣田文鏡現在籌畫安頓料理必能使被水之民共沾我皇上浩蕩殊恩也緣事關民瘼理合一併奏聞謹奏覽奏豫省災黎近日情形已悉凡事如此據實不隠朕甚嘉之雍正九年二月二十七日山東河南河道總督臣沈廷正謹奏為奏聞事竊臣前因豫省沿河各屬被水地方見有乏食窮民接濟無資是以將目擊情形偹細向督臣田文鏡説知兹臣於二月二十日查勘黄河工程事竣旋省督臣與臣面言從前乏食窮民不但將沿河被水州縣現在委員確查即此外尚有鄰近州縣乏食小民亦俱飭令一併清查除平糶之外無論有田地無田地擇其果係實在乏食者每戶按大口小口概借給兩月之糧亦不論將來能還與否以濟其青黄不接凡逺鄉僻壤諄諭各屬實力奉行務使無濫無遺臣見城鄉百姓俱知總督現在委員清查將來不虞乏食且喜近日天氣晴和麥苖長發只須於三月中得雨一次二麥可望收成謹據實奏聞謹奏覽奏朕之憂懐少釋雍正九年六月初六日山東河南河道總督臣沈廷正謹奏為奏明事竊照東省戴村壩工臣兩次親詣詳勘應將接連滚水壩之新建石壩高出二尺之處先行拆去恰與舊壩相平與部議適相符合其接連亂石壩之新壩高於舊壩止有六寸接連玲瓏壩之新壩高於舊壩一尺三寸若俱拆去二尺尚應另為補鋪方與舊壩相平但辦石鑿砌大需時日目今伏汛經臨恐工未竣而水驟至非特徒糜帑金且汶水傾注不能抵禦關係匪輕況霜降過後仍應㑹勘拆修則此接連亂石玲瓏之新壩似應停其拆砌統於霜降後勘明興工臣赴豫省將此意商之督臣田文鏡及協理河臣朱藻意見俱各相符巳經㑹同咨部俟秋汛過後臣再㑹同朱藻前往確勘興工另行奏聞臣因督臣田文鏡現在奉㫖進京調養起程在即所有東豫兩省工程錢糧臣與田文鏡商定確核凡應題應咨事件俱經一一㑹同辦理至禹王臺竹絡壩工臣前因領帑分築之沂郯海贛同知吳象賢玩工侵帑業經兩次㑹叅遴委泇河通判蔣祈年前往署理接修自任事以來勇往急公所修竹絡壩上下兩層照估剋期築竣現在儹砌邊絡不日完工俟竣工之後應聽江南河臣嵇曾筠㑹疏題報惟是沂郯海贛同知一缺經管兩省工程最為緊要今通判蔣祈年辦事勤敏洵堪膺此要任臣與督臣田文鏡商酌題請而督臣以蔣祈年係其至戚不便書題臣思要缺全在得人若以蔣祈年補授沂郯海贛同知實屬人地相宜臣謹繕摺奏請聖訓是否可行伏乞皇上批示以便另疏題補統祈睿鑒謹奏所請是將蔣祈年具疏題補可也同日又奏為奏聞事竊照濟寜臣標設有中左右城守四營而城守一營獨隸都司統轄則州城内外汛地是其専責必須整飭營伍加意廵防方為盡職今城守營都司李懐義怠玩成習諸事廢弛民間遇有失火不惟不行飛報亦不力為撲救該汛兩次命案至今亦均未緝報且馭兵無術廵查疎懈似此玩廢劣員斷難一日姑容除臣現在繕疏題㕘外理合恭摺奏聞抑臣更有請者濟寜地方為南北水陸通衢其間五方雜處姦良莫辨最宜嚴謹稽查小心防範是以城守一營専司州城内外地方而城守官弁俱駐劄城内查濟寜關廂戶口殷繁商賈雲集若官弁俱駐城内夜間設有匪竊失火等事憑何擒拏救䕶必得専員督率方可綏静地方據臣愚見似應於該營内𣲖撥千把總二員廵查南北二闗外委千把總二員分查東西二關俱令酌帶兵丁駐劄適中緊要之地日則盤查姦宄夜則廵防失火匪竊偶遇有事一面星飛傳報城内一面救䕶擒拏如此則州城内外均有専責聲息相通而逺近地方民皆安堵永戴聖恩於無既矣臣為關係地方起見謹陳末議已於疏内聲明統祈皇上睿鑒謹奏俟題到時有㫖同日又奏為奏聞事竊照東省運河堤岸攸闗漕艘往來要津必須修理堅固方足以資挽拽而衛民田經前署河臣田文鏡估計題修仰䝉俞允發帑興工臣接奉部文随撥發帑銀檄令道㕔等官遴選幹員上緊募夫分修復親赴各工詳加覆勘務期努不虛糜工收實效臣兼至汶上縣所轄之何家壩查勘壩工情形該壩坐當汶河西岸關係蓄水濟運衝刷流沙為南北運行之闗鍵因建立年久底樁腐朽欹斜石塊坍塌錯落復經上年大水其雁翅堤岸又俱潰缺一遇汶水泛漲沙流入運劉老石頭二口遂致淤墊淺澀此項壩工急須按照舊制速行修整俾令蓄洩有資臣已飭兖寜道王鴻勲據實確估俟具詳到日即當題請修築臣伏念黄河工程較運河更為緊要且伏汛經臨秋汛踵至尤須親督修防隨於五月二十日由東省曹縣黄河芝麻莊一帶查勘各工俱各平穏惟豫省儀封縣北岸趙家寨工程坐當全黄頂衝現今大溜掃灣直射堤根甚為險要臣相度情形亟宜未雨綢繆當即飛撥料物飭令道㕔等官督率兵夫星夜邁埽加鑲上緊防䕶一面將需用工料銀兩估報臣再為酌核興修臣於五月二十五日抵豫省祥符縣程家寨工所看得該工逼近省城最為喫緊上年黄河大溜直趨南岸危險異常前署河臣田文鏡督率搶救平穏近因河溜仍復南趨灘崖日被汕刷是以前署河臣田文鏡㑹疏題請於北岸開挖引河導溜北徙以保南岸堤工荷䝉聖恩俯允業將引河如式挑挖深通正在守候開放間詎今嵗四五兩月以來北風連作全河水勢傾注南岸頂衝大溜上提下坐不時蟄陷洵屬險工臣一面嚴飭管河道劉永錫随同協理河臣朱藻在工無分晝夜下埽加鑲竭力搶䕶一面飛檄儹辦各料并撥運料物以濟急需方保無虞臣復親率各員加緊修做仍早夜駐宿引河工所一俟水勢漲發風色順利即相機開放第南岸程家寨險工十分緊急亟應修做大工據管河道劉永錫估計臣已另疏㑹題外所有臣勘過各處工程情形并搶䕶修築緣由敬繕摺奏聞伏祈皇上睿鑒謹奏目下亢旱恐氣候一轉雨水驟多則在在堪虞亟宜恪秉誠敬以祈神佑竭力防䕶以盡人事也雍正九年七月初七日山東河南河道總督臣沈廷正謹奏為奏聞事竊照豫省黄河兩岸考城縣顔家支河歴年每遇汛水長發漫灘進水以致田畝屢被淹浸臣臨工相度特委濬縣縣丞何祖夀並效力人員協同該管㕔汛分别搶修建埽壩以塞支河築月堤以資重障其顔家莊迤上陳家莊等處堤工通身幫築寛厚復又擇緊加鑲保䕶周密本年四月十四五六等日河水長至五尺支河並不進水口門漸次受淤不但大堤得免浸汕而向日淹漫之區盡成膏腴之産二麥豐登倍加收穫現在秋禾又復茂盛查顔家莊迤東約長八十餘里約地三千餘頃每畝收麥多至一石五六斗一石七八斗不等約計收麥數十萬石沿河數十村民人僉稱從此可以辦課養家莫不感戴皇恩而考城一邑亦皆比戶盈寜臣目擊豐登景象實切欣慶敬繕摺奏聞謹奏覽奏不禁以手加額為豫民稱慶也同日又奏為恭報程家寨北岸引河開放南岸工程平穏仰慰聖懐事竊照豫省祥符縣南岸程家寨工程為全黄埽灣之區上年河溜南趨灘崖汕刷是以前署河臣田文鏡㑹疏題請於北岸開挖引河以保南岸堤工臣早晚相機住守以待風色水汛督率道㕔搶鑲南岸下蟄埽工正在晝夜分任料理間於六月初八日水漸増長風亦順利臣相其大溜逼近河頭於初九日巳時連底水共長至二尺二寸臣相度機宜當即䖍祀河神趁其溜頭之急藉其風勢之猛率同道㕔帶領兵夫併力開挖但見水頭湧注全黄直趨開闢暢達頃刻成河復又乗舟由引河來往探量水勢深通暢流而對岸南逼之溜漸次減緩程家寨埽工俱經蟄實平穏現今南岸漸長淤灘該工可保永固兩岸老㓜鄉民莫不歡呼踴躍感戴聖恩所有程家寨開放引河緣由理合恭摺奏報伏祈睿鑒謹奏覽奏引河開通暢流朕懐深為愉悦同日又奏為奏明事本年七月初七日據臣標署中軍副將楊鐸報稱六月三十日濟寜南鄉新店等地方有蝻子生發離新店南十數里窪地荒草内及牛頭河地方亦有蝻子數片相隔一里半里不等今營員及知州等現在率領兵夫撲打等因又據濟寜州知州張綸呈報前來臣當即飛檄上緊撲滅仍令不時在於各境廵查撲打并檄委效力員弁前往協同撲捕務期浄絶根株毋致漫延兼咨山東撫臣岳濬轉飭撲捕在案臣思蝻子初出翼翅未生必須趁時撲淨庶免蔓延第直隷河南山東並江南各屬地方多有臨水低窪之區或有積水乾涸魚子未化日曬生蝻亦未可定伏懇皇上敕下督撫諸臣轉飭各屬加意查察預為防範以仰副我皇上軫念民生之至意臣因蝻子關係禾稼不揣冒昩繕摺奏聞伏祈睿鑒謹奏魚子化生蝗蝻向曽聞之汝即言之各督撫轉飭該屬預防可也雍正九年九月初八日山東河南河道總督臣沈廷正謹奏為恭報黄河秋汛安瀾工程平穏情形仰慰聖懐事竊照本年秋汛水勢疊増而黄河險工多在下游臣往豫省之歸河及東省之黄河各汛細加廵查適值東省戴家樓黄奶奶廟等處豫省河夫營䝉牆寺等處積水倒漾浩瀚汪洋臣往來相度督率道㕔等官或搶築子堰或加鑲防風晝夜監催俱經一律完竣其上游各汛險工臣復嚴飭該管㕔汛貯偹料物加謹修防亦俱保固平穏臣仍前往逐加查驗務使帑不虛糜工收實效查自入秋以來霖雨時沛黄河日漸増長據寜夏府知府鈕廷彩連次飛報八月初六日寜夏水長一尺六寸初八日水長二尺臣随飛檄該管各官上緊廵邏預為防範仰賴聖主至誠感格神明顯應昭然儀考兩縣地方連開天然引河俾最險要工得以保固東豫二省河道俱獲安流且自寜夏報水之後豫省水勢不過微増並無大漲今霜降在邇汛水日消各工在在鞏固河流永慶安瀾至山東運河水勢現在深通暢流回空糧艘遄行無阻統俟霜降後照例恭疏題報外理合具摺恭奏仰慰聖懐謹奏東豫兩省河道俱慶安瀾朕以手加額覽焉硃批諭㫖巻四十五下
