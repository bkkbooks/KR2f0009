body:
  text: 欽定四庫全書硃批諭㫖卷二百一上硃批嶽濬奏摺雍正五年六月二十一日山東布政使臣嶽濬謹奏為奏聞事竊臣恭逢聖世䝉被殊恩以回避之府佐䝉特簡為道員方愧寸長未報今復荷恩綸超擢東藩殊常寵授非分所當所有感激之私詳請撫臣塞楞額代為題謝在案伏念臣父子一門受恩愈重報效愈難惟有凛遵聖訓仰酬髙厚於萬一臣自本年五月二十四日到任隨同前布政使張保將庫內錢糧逐項盤查實在存貯丁地雜項等銀一百二十四萬九千一百八十兩零存留腳價銀一萬二千三百一十六兩零丁地羡耗銀二十七萬一千六百三十兩零衛所羡耗銀三千一十八兩零州縣長解羡耗銀二百三兩零七分羡耗補平銀二千五百四兩零丁地運費銀七千五百六十九兩零丁地飯食銀八千八百三十兩零河工部飯銀六千九百六十七兩零至充公撫司分規稅項節省等銀各款細數另摺分晰敬呈御覽臣謹監守之責并嚴出入之防嗣後凡支收正雜錢糧及從前一切動用款項容臣陸續摺奏臣膺此重任深恐愚昧疏略不無隕越仰懇聖主訓誨時加俾臣知所遵循所有查明庫項緣由理合恭摺奏聞伏祈皇上睿鑒謹奏覽奏知道了勉力盡職以副委任雍正五年十一月二十八日山東布政使臣嶽濬謹奏為查明司庫收支存貯耗羡銀兩開冊進呈仰祈睿鑒事竊臣荷䝉恩擢於本年五月二十四日抵任前司張保送冊交代臣逐項查收業將接受交代并俟查款續奏緣由具摺奏聞臣謹將東省各屬解過司庫耗羡自雍正二年七月原任布政使博爾多任內起至升任布政使張保任內止各官經收動支并存貯在庫銀數僃查造冊進呈御覽其中動支耗羡銀兩如彌補通省流抵發給各官養廉等項俱經前任撫臣陳世倌奏明有案此外支撥公用逐項開具在冊臣檢閲舊案或稱曾經摺奏或稱舊例相沿或稱巡撫批准或稱先撥後補除條款清楚名色分明各項無庸申說外所有應題未題應補未補懸項無著者臣復加查核分别具摺據實陳明統祈皇上全覽冊摺於應否動支之處俯賜批示俾臣接司管庫得有成式可遵加謹收支免致隕越實感戴髙厚洪慈於靡既矣為此繕冊具摺奏聞伏祈皇上睿鑒謹奏檢核殊中肯綮可嘉之至未料汝能如是清釐也勉之勉之此心此行切勿纎亳改移但推誠秉公一惟朕躬是倚可保更無有人能榮辱汝者雍正六年三月二十九日山東布政使調任山西布政使臣嶽濬謹奏為奏明續貯充公銀兩仰祈睿鑒事竊臣荷蒙恩㫖調任晉藩隨將東省藩司任內收過雜項解費稅課規儀以及書吏節省銀兩存貯充公業經開摺奏明兹因交代在即逐項清查復查得州縣地丁解司各有零星尾數及至支解各項歷來俱以釐數為止毫絲以下概不算入雖為數無幾而積少成多臣任內經手秋春二撥各項支解節次併封共存銀四千四十八兩零向係藩司自得之項伏念臣職司管庫出納維嚴一絲一毫均係國帑何敢稍有欺蒙侵肥入已謹將前項併封銀兩留貯司庫僃充地方公用再查雜項解費自正月二十日開印起至三月季終止共收過銀六百兩以上二項通計銀四千六百四十八兩零現在一總造入交代冊內俟新任布政使張坦麟到任之日逐一交明所有續貯充公銀兩緣由數目理合繕摺奏明伏祈皇上睿鑒謹奏能如是刻厲自持有何可諭汝年方少壯無窮事業由兹始基正宜勉力以期上進堅守此志可也雍正六年六月初九日山東布政使調任山西布政使臣嶽濬謹奏為陳明賑榖捐項已補未補各案仰祈睿鑒事竊查前任巡撫陳世倌升任布政使張保任內雍正三年彚報秋禾被水等事公捐賑榖除已經捐補之項無庸開列外尚有濟南府屬之歷城等四縣動用府倉捐米折榖下剩未補榖九千九百九十九石零每石原價五錢共該銀四千九百九十九兩零又東昌府屬之堂邑等五州縣動用常鹽折漕榖石未補榖二千五百六石零每石原價三錢共該銀七百五十一兩零又德州等九州縣那墊煮粥柴薪水腳等費下剩未補銀二千二百九十一兩零以上三項共計銀八千四十三兩零俱議公捐還項但彼時竝未按款捐補而隔任事後之員又難責以續捐以致銀榖虛懸無補臣現今詳明撫臣塞楞額題請著落原經手議賑議捐之巡撫陳世倌布政使張保各名下照數分賠庶可以補懸項而銷積案再查巡撫陳世倌有捐存養廉銀四千七百二十九兩零布政使張保有捐存署按察司任內養廉銀四千六百一十兩零通計養廉銀九千三百三十九兩零留以補還捐賑銀榖但臣查前任巡撫存充公今張保所存署按察司任內養廉雖稱捐項實非出自已資以之歸還耗羡似屬妥協查耗羡項下一給還平原縣煮粥柴薪銀五百兩一給還兖寧道倉撥賑德州聊城等九處榖價竝水腳共銀八千四百九十七兩零一給各州縣那墊柴薪水腳等費銀三百四十二兩零以上三項共銀九千三百三十九兩零隨將捐存養廉盡數撥還經臣於雍正五年十一月二十八日具摺奏明是前撫藩捐存養廉一項悉已撥補耗羡則前項銀榖無可扣抵若非著落分賠終難歸結誠恐陳世倌張保仍以捐過養廉為詞致費查核理合僃悉陳明繕摺具奏伏乞皇上睿鑒謹奏賠還捐賑抵還耗羡名雖不同其實則一要須分剖明晰方可使伊二人無言置辨何辭一番查核耶雍正六年六月二十二日署理山東巡撫印務布政使臣嶽濬謹奏為恭謝天恩兼陳下悃統祈慈鑒事雍正六年六月二十一日捧接部文內開雍正六年六月初十日奉㫖塞楞額著解任回京補授工部侍郎山東巡撫印務著嶽濬署理欽此欽遵臣恭設香案望闕叩頭謝恩訖伏念臣一介庸材無足比數荷䝉皇上逾格洪恩不次超擢簡畀東藩旋調山右因候新任交代未得起程復䝉特旨著署理山東巡撫印務山東為屏垣之要地巡撫乃封疆之重臣自揣疏庸何以當此巨任私懷悚惕不知所為第寵命既頒恩施彌渥臣雖愚駑敢不竭蹶祗承以圖報效萬一竊聖主髙厚玉成之恩臣生生世世銜結於無盡矣除俟接印任事另疏奏謝外所有微臣跪捧恩旨感激瞻戀情由謹繕摺具奏再查臣布政使任內經手一切錢糧款項業巳徹底查明分晰造冊今接任布政使費金吾奉旨速赴新任諒不日即可來東是布政司印務無庸另行委署臣照常辦理俟費金吾到任即便逐一清交理合一併聲明統祈慈鑒謹奏田文鏡乃督臣中之傑出者當效法其居心行事汝果虛衷受益伊必推誠相待若以外任臨民之事而論其老成練逹實不易得非與共事日久無由稔悉其長較之塞楞額輩奚啻霄壤費金吾到任後面詢自知朕命汝署理撫篆之意一者因不得人二者正欲汝持循伊之軌轍也勉之雍正六年七月十三日署理山東巡撫印務布政使臣嶽濬謹奏為請將驛道陋規解司充公仍懇另給養廉事竊查東省濟東道管理通省驛務各屬送有陋規相沿已久歷來聽其收受作為養廉從未逐項清查確知銀數臣接受撫篆後即值濟東道牟錝元革職離任隨遴選登萊青道李英署理印務併切囑其將驛道一切陋規查明造報以憑核奏今據李英禀稱查得各州縣驛有額解濟東道衙門驛站奏銷供廪糧僉中伙併中伙隨封等項銀一萬二千九百六十兩零白夫水驛冊費併隨封等項銀七千九十三兩零通共銀二萬五十三兩零內除去奏銷部費飯食銀二千七百兩併巡撫衙門奏明充公額規銀二千兩尚餘銀一萬五千三百五十三兩零俱係濟東道收為養廉之資謹將查明各項細數造送清冊聽候核奏等語臣查東省道員從前議於耗羡項下每年支給養廉銀六千兩經前撫臣陳世倌奏明今濟東道陋規所得照依養廉六千兩計算多寡懸殊夫養廉為君上恤下之典陋規為臣子肥已之資當日存陋規而不給養亷已非戒貪止賄之道況同一道員而官給者止有六千兩私收者反有一萬五千兩於理不順於情不均兩有未協臣請嗣後濟東道養廉在於耗羡內每年撥給銀六千兩其驛站規禮飭令該道照數催收除奏銷部飯巡撫充公二項銀兩及本衙門各房紙筆雜費一千兩之外餘銀盡數移解司庫以充地方公用則祿養均沾廉隅共飭實於整肅官方有益再查東省自雍正二年七月內議給各官養廉起歷今四載濟東道前後接任各員皆以陋規作為養廉每年除公項雜費外多得贏餘隱匿不舉應否指名參處照數追還擬合一併陳明統祈聖鑒批示遵行謹奏此奏甚屬可嘉牟錝元已有旨矣其餘各員令其據實自行檢舉摺奏以聞倘仍隱匿不報嚴加參劾可也雍正六年八月十二日署理山東巡撫印務布政使臣嶽濬謹奏為恪遵訓旨敬逹謝忱事竊臣荷蒙特旨署理山東巡撫印務受事之日即經具摺奏謝并將臣材庸質駑懇祈皇上特加訓誨情由一併陳奏復䝉聖慈眷注垂諒顓蒙將摺內廣咨確訪四字硃圈指示委曲裁成多方䇿勵臣即愚同草木蠢比昆蟲亦知銜感洪恩實心報效若猶稍存欺隱悖理營私神明之所不容人類之所不齒有靦面目何以立於光天化日之下乎區區之誠伏祈聖主鑒察又蒙諭旨僃述督臣田文鏡於地方外任之事老成練逹著臣效法其居心行事俟費金吾到日詳細問知臣自服官以來即聞督臣田文鏡公忠廉潔治行無雙久已私懷仰慕今欽承指導倍切景從昨七月二十一日布政使費金吾到任連次接見詢知督臣居心純篤行事精勤凡其為國為民之訏謨實係可法可師之嘉範嗣後有地方緊要政務臣具摺上奏懇請聖裁若例應㑹同督臣辦理之事臣當悉心請教次第設施雖才識粗庸未能仿效萬一而藉其啓迪作為楷模協力奉公和衷集益以仰副我皇上諄諄訓誡之至意所有微臣奉到硃批感激遵行情由理合繕摺具奏伏乞睿鑒謹奏所奏欣悅覽焉果肯遵朕訓諭實力循行保汝一生不負蕩檢踰間之疚勉之雍正六年八月十七日署理山東巡撫印務布政使臣嶽濬謹奏為奏明事竊臣蒙恩署理巡撫印務受事以後即將各屬命盜未結之案逐一清查因檢閲積年舊卷見有從前撫臣應題未題命盜十四案內命犯十二人賊犯二人俱批令地方官牢固監禁懸案不結如前任撫臣蔣陳錫批禁賊犯劉九命犯王二賀守祥三案前任撫臣李樹德批禁命犯房竒馬文傑楊三秦雪李明俊于三鄭七劉囤兒傅世友等九案前任撫臣陳世倌批禁賊犯劉二和尚楊召遷二案臣細繹各案供招或有罪犯重典倫紀攸關而隱諱不題者或有證據未確應俟另緝正犯質對定案而因循不題者亦有情事已明理應題結而延擱不題者除房奇馬文傑業己監斃外其劉九等十二犯積久監禁歷三四年至十餘年不等情實者既不曾明正典刑可矜可疑者又不得援照末減實屬未協臣現在檄行按察司分案確查仍密訪本犯實情俟查訪明析應作何題參完結之處另摺請旨今將查出未題命盜各犯緣由先行具摺奏明伏祈皇上睿鑒謹奏清理滯獄最屬要政可嘉之至查訪明確時僃叙情由具疏題逹同日又奏為奏聞事竊查山東向有邪教未除愚民易被誑誘臣隨密飭各屬留心巡緝兹訪有教首牛三花拉託名貿易寄居諸城往來於膠州髙密等處倡行邪術號空字教有徒弟李大本代為傳播煽惑愚民且牛三花拉又騙娶吳姓之女為妾尤屬不法諸城等州縣俱在訪拏而牛三花拉攜妾吳氏棄家潛逃今據膠州髙密獲有黨羽數人諸城縣拏獲牛三花拉之妻女并一二附和愚民訊無下落及獲其徒弟李大本到案嚴訊實情供稱牛三花拉實係教首隨處改易姓名蹤跡無定有族家在東平州之安山鎮又魚臺曲阜鄒縣俱有平日熟識之人等語一經報知臣即委員密赴諸城縣挑選幹役四路嚴拏仍密飭東平等州縣一體緝捕逐處跟尋毋得侈張其事致滋擾纍業經僃悉飭行去後臣查此等邪教借名誑騙雖無惡跡顯著必須防微杜漸預絶根株臣不敢稍存玩忽隱諱之念為此具摺奏聞伏祈睿鑒謹奏此等邪教罪在渠魁務須捕獲萬勿疏脫其脅從黨羽咸係被所煽惑但當懲其尤者不可波纍多人致滋紛擾雍正六年九月初四日署理山東巡撫印務布政使臣嶽濬謹奏為奏明事竊查前任山東按察使楊紹於本年正月二十六日奉旨升授直隸布政使所遺員缺著臺灣道吳昌祚補授隨經前撫臣塞楞額檄委鹽法道梅庭對署理按察司印務於二月初一日接篆署事經今半載有餘吳昌祚尚未抵任而梅庭對職本鹽法正值欽差工部侍郎臣繆沅㑹同鹽臣鄭禪寶查審鹽政積弊案牘紛繁俱屬鹽道專責勢難兼理刑名之事必須改委他員庶無貽誤臣伏見新任濟東道唐綏祖才猷敏練識見明通秉憲逹情長於聽斷堪以署理臬司印務隨即檄委唐綏祖於八月二十六日接印署理所有改委署理按察使印務緣由理合奏明伏祈皇上聖鑒謹奏唐綏祖才具甚好已將伊調用鹽法道矣委署可謂得人雍正六年九月十五日署理山東巡撫印務布政使臣嶽濬謹奏為據實奏明仰祈聖鑒事竊東省巡撫衙門兼理臨清關倉事務查臨關稅額每年應解正稅銀二萬九千六百八十四兩又解賠銅斤水腳銀七千六百九十二兩零此外解幫庶吉士竝置辦羊毛解內務府以及傾銷添平飯銀册費等項共需用銀三千九百二十四兩零通計銀四萬一千三百一兩零連年稅料缺額無可措賠前任巡撫俱於臨倉耗羡內通融撥補又查各州縣解交臨倉米麥折色席草等正項銀共八萬四千三十六兩零按加一八收耗共該銀一萬五千一百二十六兩零內除部費添平考核及書役紙張飯食等費約共需銀四千一百七十一兩零尚餘銀一萬九百五十四兩零除撥補臨關缺額銀兩外下剩耗銀解交藩庫充公是臨倉之耗羡既供本倉之公費又補臨關之缺額節年所餘銀兩悉行解庫充公絲毫俱有著落誠無容議裁議減者也但查臨倉耗羡應隨米折交收原與藩庫無涉嗣因前任布政使統計耗羡不曾分析款項槩行催提前任撫臣失於查核以致各屬交兌米折業將一八耗羡全繳臨倉又於藩庫賠解一倍那移措墊貽纍不堪將來州縣力不能賠勢必加派百姓臣深悉其弊不敢不將一耗兩解緣由據實上陳可否將藩庫重提臨米耗羡一項滿但得徴收如數足供解支即將臨倉餘耗一萬餘兩悉以充公若有缺額勢須撥補亦必逐一確核具摺奏明斷不敢於關稅內收多報少混將臨米耗銀撥補以自蹈侵蝕欺隱之咎也合并聲明統祈皇上聖鑒謹奏凡百事務秉公據實揆情酌理而為之何不允協之有雍正六年十月二十八日署理山東巡撫印務布政使臣嶽濬謹奏為疊荷聖慈敬陳謝悃事竊臣奉署東省巡撫印務材庸識淺日凛冰兢荷蒙皇上諭令臣效法督臣田文鏡辦事臣恪遵聖示奉為楷模今督臣因㑹審前任撫臣黃炳等一案於九月二十三日來抵濟南臣郊迎相㑹歡洽異常此後不時進謁凡東省錢糧倉榖河道營伍關係國計民生之要務臣竭誠請教督臣逐一指誨老成練逹實有以朂臣不逮廣臣未聞臣感佩嘉言深為欣幸又於十月十三日督臣敬録硃批卿至東省靣晤嶽濬時推誠相告料伊必歡欣領受而且佩服實係少年美才將來大有可望加意開導如朕前諭照親子弟一般相待將所批之旨亦密令知之欽此密以示臣跪讀之下仰見我皇上洪慈垂注委曲玉成期督臣以啓迪之勤勉微臣以領受之切疊頒諭旨剴摯周詳荷此天地父母之隆恩臣惟有䇿勵駑駘悉心求益景從賢範體國奉公以仰副我皇上殷殷訓誡之至意所有臣疊荷聖慈遵循感激情由理合繕摺奏謝伏祈睿鑒謹奏覽奏知道了爾㑹晤田文鏡時未有不心悅誠服之理朕已言之於先矣勉力企及是務同日又奏為奏覆事本年九月初九日接奉怡親王大學士張廷玉蔣廷錫寄字內開雍正六年八月二十八日奉上諭聞得有內地之人潛往日本國在彼教習射箭及打造船隻等事且有福建浙江革退之千總及武舉等人亦在其內此雖傳聞之說然亦不可不察從前聖祖皇帝欲訪問彼國情形曾遣人同商人前往及至彼國設有僑寓商人處所名曰土庫將內地貿易之人另住此地不令聞知伊國之事且防範甚密朕思向來採買銅斤之商船往來彼處目今又開南洋之禁不可不留心稽查以防詐僞爾等可密寄信與嶽濬加意查訊防範若有應行奏聞之事具摺密奏欽此遵旨寄信前來巡撫可遵照留心辦理可也等因臣欽遵諭旨尋覓福建浙江江南并東省沿海人員密加細訪日本地境因知日本國與浙江寧波府相對往來最使福建江南洋靣俱有路可通山東相隔遼逺竝無商船往來彼國情形無從探聽惟是東省亦屬濱海要區我皇上睿照周詳特頒密諭臣於海疆文武官辨諄切誡飭令其於海口往來船隻加意稽查以防詐僞臣於明春當親往青萊登三府將沿海緊要處所逐一查勘有應行奏聞之事即當具摺密奏不敢疏忽隱諱貽誤地方所有奉到諭旨現在查訊防範緣由理合先行奏覆伏祈皇上聖鑒謹奏密行體訪勿事張揚前言非有確實憑據不過防未然之意耳雍正六年十一月初十日署理山東巡撫印務布政使臣嶽濬謹奏為臬司需才甚重據實陳奏仰祈聖裁事竊查臺灣道吳昌祚於雍正六年正月內奉旨升授山東按察使歷今十月有餘尚未到任前經臣遴委濟東道唐綏祖署理臬司印務具摺上奏欽奉硃批唐綏祖才具甚好已將伊調用鹽法道矣委署可謂得人欽此兹於本年十一月初八日奉准部文題覆侍郎繆沅等奏稱唐綏祖現經署理按察司印務鹽政頭緒繁多必得專心辦理勢難兼理刑名應如所請行令河東總督田文鏡署東撫嶽濬即另委員署理按察司印務奉旨依議欽此行咨到臣遵即與督臣田文鏡商酌於各道員中另委一員接署臬司但恐才乏兼長終難勝任臣伏思東省鹽政頭緒雖多自經侍郎臣繆沅等釐剔諸弊之後俱有條理可循而臬司一官管理通省刑名案牘尤關緊要今唐綏祖自署篆以來聽訟精明斷獄平允一切刑名案件次第清理而於本任鹽務亦勤於稽察毫無廢弛實屬才具優長堪以兼理可否仰懇聖恩仍准唐綏祖照前署理臬司印務抑或以臬司比之運使職守更重得人更難即將唐綏祖升授臬聖主格外拔擢之恩非臣所敢擅請也為此據實奏陳統祈皇上慈鑒謹奏伊若能兼理無誤且令暫署吳昌祚亦計日可到矣雍正六年十二月二十五日署理山東巡撫印務布政使臣嶽濬謹奏為奏明事竊查曲阜聖廟工程屢奉諭旨上緊興修務期堅固巍峩光復舊制從前因參革都司鈕國璽買木遲延又丈尺不能合式續遣通判黃家炳等向南省買補大料雖據禀購買完僃而長途運送歲內尚未到工以致大成殿等工不能尅期起建所有現在可以興修之工程及可以製造之木料臣已節次檄催第未親身查驗不能僃悉情形兹因奉文㑹審馮侯南一案前赴濟寧事竣之後即東至曲阜親詣聖廟工所調齊承修各員逐一查勘查得應修各工其中則大成門金聲玉振門大成殿寢殿左右兩廡御碑樓其西則金絲堂啓聖殿查金絲堂啓聖殿木料齊僃業已先行建造僅未蓋瓦油飾其左右兩廡每廡四十四間南段已蓋二十七間兩邊共計五十四間其未蓋之北段因地址逼近大成殿應留為大工搭架之所未便全數蓋完至如大成殿等工一切石料甎瓦俱已備就凡有合式梁柱及斗栱簷椽門窗神座等項亦皆預為製造惟俟大木運到各料全僃即便興工臣惟有敬謹催趲作速修竣以仰副我皇上崇表先聖注望告成之至意為此繕摺奏明伏祈睿鑒謹奏聖廟工程淹遲數載怠忽莫此為甚汝今署撫東省實惟專責其竭力催督作速告成以慰朕羮墻之念可也同日又奏為交明司庫耗羡繕册進呈仰祈聖鑒事竊臣前於布政司任內接收前司張保交下藩庫耗羡銀兩曾經確查收支存貯各款項繕册奏明欽奉硃批在案今臣自雍正五年五月二十四日受事起至雍正六年七月二十日卸事止經手司庫耗羡業與接任布政使費金吾交代清楚一切收支存貯款項理合照前繕册進呈其中有因公動用數條或係奏明有案或係舊例相沿或係就事酌給總因關係地方公務不得不動支應用謹於各本條下摘叙原委據實聲明併將前奉硃批耗羡原册一併呈繳以僃查核為此具摺併册上奏伏祈皇上慈鑒批示遵行謹奏大凡錢糧耗羡等項料理得宜無出田文鏡豫省之右者嗣後一切俱與伊共商同辦同日又奏為酌核動支耗羡款項仰祈聖鑒事竊念司庫耗羡絲毫俱關國帑凡有動支理應細加酌核今查巡撫衙門每年於耗羡項下一支發書吏鹽菜銀每月一百二十兩此係舊例相沿以供各吏飯食之用難以核減一支發心紅紙張夾板絨繩等項價銀歷任巡撫所用竟至一二三千兩不等因無定額未免任意耗費臣自署理撫篆至今半年以來約用心紅紙張等價銀三百餘兩若以一年倍計之止須動支銀六百兩儘堪供用應請著為定額以杜浮濫之弊一支發執事炮手等役工食每年計銀四百八十二兩零查各役向無額設工食歷來俱於耗羡項下支給均無浮冒無可裁汰惟以司庫公項之耗羡支作撫署下役之工食又義所不安因念巡撫兼理臨清倉務每年額收米麥所折銀兩內有在本處支放月糧官俸等項銀一萬七千兩有零應存剩餘平銀四百餘兩向係倉務額外贏餘之項臣不敢私自取用請即以此項移作執事炮手等役工食按數發給無庸再於耗羡項下支銷以上數項臣逐加酌核或應照常支給或應分别減省總期釐定款額重庫項而絶弊端為此據實具摺上奏伏祈聖鑒批示遵行謹奏應取用者照常支取應用毋庸矯廉即此等款額亦與田文鏡商酌增減沿革一聽伊之區畫而行絲毫不必遲疑朕可保斷不至於舛謬其老成之見較爾屬員毫未閲歷之輩相去奚啻什伯也雍正七年二月二十四日署理山東巡撫印務布政使臣嶽濬謹奏為捧讀硃批欽遵奏覆事竊山東布政使費金吾為敬陳錢糧事宜等事具摺上奏欽奉硃批凡地方事務之宜緩宜急悉聽督臣田文鏡之指示實力行之不可陽奉隂違另立主見田文鏡朕可保其必無過不及之舉其所令緩者固不可急於求效其所令嚴者亦不可過急而推怨於督臣須同心合德商酌為之能如此則東省之民風吏治一兩年間可望如豫省一般假若各懷意見時而針芥時而矛盾朕則不能必其後效也將此諭亦與嶽濬看欽此費金吾於本年二月初九日謹捧原摺交臣觀看臣跪讀之下不勝悚息伏念地方公務動關國計民生緩者不宜過嚴急者難容少縱督臣田文鏡老成籌畫斟酌咸宜臣奉作楷模竭蹶從事景賢報主情出至誠前經據實奏陳悉蒙慈鑒今復以硃批賜示使臣與費金吾一體欽遵臣敬録全文朝夕警察務期同心協力整飭地方以仰副我皇上諄切告誡之至意所有捧讀硃批感激惕勵情由理合具摺奏覆伏祈睿鑒謹奏無非欲汝等實心聽從田文鏡之指示耳毫無他意悚息何為雍正七年三月初一日署理山東巡撫印務布政使臣嶽濬謹奏為遵旨酌議東省各官養廉仰祈聖裁事雍正六年八月初十日欽奉上諭各省內或有尚未給養廉之員著各督撫悉心商酌一靣辦理一面奏聞等因欽此仰見我皇上惠愛臣工體恤周詳之至意臣案查東省自撫司至州縣俱經前撫臣陳世倌議給養廉但定數多寡未得協宜而佐二各官之應給養廉者均未議及亦屬疏漏臣謹㑹同督臣田文鏡逐加酌核竝將豫省各官養廉數目比照增減悉心辦理所有東省各官增減養廉細數謹另造清册進呈御覽伏候皇上批示遵行再查東省從前每年支給各官養廉共銀一十八萬五千五百兩今另行酌議共增銀六萬七千八十兩合併聲明為此具摺奏聞統祈皇上聖鑒謹奏所議大小各員均屬妥協惟田文鏡今既兼督東省亦當增給養廉萬金方為合宜督臣統轄將辨較之撫臣賞犒所需尤覺繁多在伊自難啓齒汝未議及於此殊屬忽略矣雍正七年四月二十日署理山東巡撫印務布政使臣嶽濬謹奏為聖恩髙厚難名恭達謝忱仰祈睿鑒事雍正七年四月二十日接准吏部咨開奉上諭川陜總督嶽鍾琪統兵進𠞰準噶爾在西安起程之時著伊子嶽濬前往親送伊父至肅州再回山東原任今著嶽濬先期預僃候朕再降諭旨到日起身前赴西安等因欽此伏念臣自雍正三年十月內在口北道任內值臣父進京陛見蒙皇上諭臣隨侍親送啓行迄今四載有餘定省久違心懷瞻戀但臣叨署撫篆職守封疆正思圖報涓埃何敢以烏鳥私情妄希恩鑒兹乃荷蒙特旨命臣星赴西安親送臣父前至肅州仰見我皇上如天之仁無微弗照無逺弗周俾臣得趨侍親闈面承臣父教誨即臣母多年暌隔亦得再覩容顔沐聖主優渥之恩獲天倫聚㑹之樂戴髙履厚感荷難名惟有敬效嵩呼望闕九叩以仰達謝忱於萬一而已除現在預僃行裝專候再頒諭旨起程外所有微臣奉到恩諭欽遵感激情由先此具摺上奏伏祈皇上睿鑒謹奏已有旨從部頒發矣可即起程詣陜與汝父歡晤仰蒙上天垂庇汝父振旅凱旋時朕仍召汝來京與觀飲至䇿勳也雍正七年八月二十七日署理山東巡撫印務布政使臣嶽濬謹奏為聖主眷遇益隆微臣感戴彌切敬陳下悃恭謝天恩事竊臣於雍正七年八月二十五日自肅州回至西安接視邸鈔欽奉上諭嶽濬著加僉都御史銜署理山東巡撫印務蔣泂著補授山西布政使欽此臣當即望闕叩頭恭謝天恩訖伏念臣年少庸愚才疏識暗疊蒙髙厚洊歷旬宣幸荷聖德洪施頻承訓諭俾臣遵循得以勉竭駑駘昨臣父寧逺大將軍臣嶽鍾琪奉命西征統兵逺出蒙我皇上曲體至情特命臣來至西安送臣父肅州出口之後再回山左身受洪仁愛注不識臣父子何修至此頃臣於肅州向臣父拜别之時臣父嶽鍾琪感激聖恩涕零切囑令臣矢清矢慎謹飭小心不負君恩即符孝道臣跪聽父教泣不能言惟有銘刻中心以伸報悃今重荷寵錫擢授京員復署撫篆臣心同犬馬深知報稱難名而臣父嶽鍾琪仰思隆恩優渥愈切藎誠益與將士奮志勵忠誓殄小醜胥慶敉寧共報髙厚於萬一惟臣年輕謭劣巡撫巨任自問難勝仰懇聖主鑒臣微悃於臣回至山東之日德之忱皆出自皇上豢養成全之賜也今臣現在西安起程容俟回任後遵照部咨奉旨事理另疏奏謝外臣先繕摺恭謝天恩伏祈睿鑒謹奏覽奏謝矣雍正七年十月初三日署理山東巡撫印務都察院僉都御史臣嶽濬謹奏為敬遵諭旨圖報聖恩事竊臣於本年八月二十五日自肅州回至西安隨繕摺奏謝竝請趨覲天顏恭聆聖訓奉有硃批諭旨臣泥首跪讀感激涕零伏念臣年齒未强才識疏淺自邀廕以及受職疊荷皇恩訓誨栽培不次拔擢破格作養凡有摺奏俱邀天鑒批諭諄諄以督臣田文鏡為效法臣每咨詢事宜而督臣無不周詳指示俾無隕越臣質雖顓蒙心竊向往不敢稍自暴棄致負君父生成之恩是以微臣回東過豫繞道開封歷觀豫省之民風羡慕督臣之政治僃聽督臣之經畫用為東省之楷模臣不甘作不移之下愚惟敬遵聖訓以上進務期竭力學習留心倣效以仰答皇上告誡洪慈庶無負聖主委使重任所有微臣感奮下情理合繕摺恭奏伏祈睿鑒謹奏如此矢志甚屬可嘉勉之同日又奏為請發人員以僃委用事竊臣案查前署撫臣費金吾於本年閏七月內奏請揀發知縣二十員隨於本月十一日欽奉上諭著將盛開池等九人命往河南交與總督田文鏡於山東地方酌量委署試用等因欽此又於十三日欽奉上諭著將范嶽山等十一員交與田文鏡於山東地方酌量派委試用等因欽此內除林靖唐一人係山東拔貢督臣欽遵上諭留豫試用外所有奉發至東盛開池等十九人俱經督臣酌量派委試用臣思東省牧令新委之員交代倉庫久任之員調任盤查倘有州縣開缺若再令其兼署不無顧此失彼反致誤公臣過開封僃將地方事宜靣商督臣田文鏡因知豫省欽奉上諭廣收人材策勵僃用所有公舉人員己經送部引見臣思督臣遵旨遴選自必舉賢擇能伏懇皇上揀選人員即將督臣保送之人發下東省二十員如遇州縣懸缺以便㑹同督臣田文鏡委署試用實於地方吏治裨益良多矣為此繕摺奏請伏祈皇上睿鑒施行謹奏俟保送之員到部引見後斟酌有旨但豫省人員忠厚者居多明逹者甚少倘或臨事遲鈍辦理維艱則汝反難措置矣雍正七年十月二十四日署理山東巡撫印務都察院僉都御史臣嶽濬謹奏為恭報瑞雪敬慰宸衷事竊臣於十月十六日正在武闈內簾瑞雪紛降一晝夜隨查四境地方得雪分寸嗣據近省州縣節次飛報十月十六日得雪三四寸不等又據青萊登等府州縣飛報十月十四五六等日得雪四五六寸不等臣查東省二麥遍播早霑隂雨之膏六出紛霏更益提封之潤二十餘年僅見之大有今歲已書百一十屬預兆之豐登明年再慶皆聖主敬天勤民所感召為羣黎含哺鼓腹之休徴所有東省普降瑞雪情形理合繕摺奏聞伏祈皇上聖鑒謹奏瑞雪普降深慰朕懷奏內明年再慶云云似此誕肆之言切勿輕出諸口即斯奢望之念併不可預存於心不但明年便明日事亦何可逆料惟以忠勤蒞事誠敬對天方能感召休徴之應也識之雍正七年十一月初七日署理山東巡撫印務都察院僉都御史臣嶽濬謹奏為欽奉上諭事竊臣案查雍正七年九月二十四日准户部咨九月初三日內閣鈔奉上諭山東泰安州神廟奉祀東嶽泰山之神歷代相傳靈顯昭著佑庇萬民明神之功德其來久矣逺近人民感荷默佑之恩焚香頂禮罔不䖍肅其廟宇重修於康熙十二年距今五十餘年兹據署巡撫費金吾奏稱廟宇盤道有傾圯頽壞之處應加繕葺山路亦當修整著發內帑銀兩命內務府郎中丁皂保赫逹色前往督工敬謹修理務使廟貌輝煌工程堅固速行告竣以副朕為民報享之至意特諭欽此欽遵等因在案臣於九月二十七日自陜回東繞道至泰安州靣晤欽差郎中丁皂保等僃述親承聖諭緣由又據署泰安州知州方世壯詳稱欽差大人於九月二十一日到州恭宣上諭爾等前往泰山修理廟宇盤道務使廟貌輝煌工程堅固不可惜費取山東布政司庫銀十萬兩支用欽此今各處工程俱經欽差估計蒙諭所用木植磚瓦石灰等項須先採買約用銀二萬兩應向藩庫支取其餘銀兩俟應用之時再行支取等語臣查事關欽工需銀緊急隨於司庫公項銀內動支二萬兩委員兩此後尚有應用之處亦在公項銀內支取理合繕摺奏明伏祈皇上睿鑒施行謹奏遵照伊等所傳諭旨一靣如數撥發一靣咨明該部同日又奏為奏明事竊查泰安州泰山廟香稅舊例每香客一名正稅八分之外有廟工銀一分以為遞年廟內添補用度之費又有裁留聽支明加等銀五分八釐四毫八絲是以每香客一人計正稅公款共納銀一錢四分八釐四毫八絲所有各年奏銷部飯及在山辦事人役工食收稅經承紙筆飯食解稅盤費等銀即於公款銀內扣解支給今公款等銀題明歸公而每客所納廟工銀一分之數自應扣留兹廟宇盤道應修之處巳䝉皇上發帑欽差估計大加修理所有本年及以後扣存廟工銀兩一時尚可不用應令解貯司庫俟有動用之時詳請發給至在山辦事人役及收稅經承紙筆飯食等項據州詳請經臣飭查今據布政司移㑹濟東道查核在山巡查收單火夫造飯等役工食及收稅經承紙筆飯食等費每年共應給銀一百四十四兩詳請於歸公項內按季撥給更向來每年香稅奏銷有部飯銀六百兩及解稅等盤費亦應於歸公項內撥出理合奏明請旨遵行為此繕摺具奏伏祈睿鑒謹奏封疆大吏之責宜於大者逺者悉力籌畫如察吏安民防姦靖盜移易風俗肅清刑名等務是也凡人精神有限一日光隂無幾不可在區區絲毫釐忽上耗費心志若禀賦獨厚另具有巨細不遺力量則又當一論要在善自審度耳雍正七年十二月十二日署理山東巡撫印務都察院僉都御史臣嶽濬謹奏為跪讀硃批恭申謝悃事竊因前署撫臣費金吾為恭謝天恩事一摺遵奉諭旨敬録硃批原摺密交到臣跪讀之下謹按原摺內開伏念臣質性魯鈍才具疏庸前在河南幸田文鏡老成練逹臣遵旨每事請教得免貽誤凡臣所見不到者禀商諸田文鏡而得立一主見喜而且愧等語欽奉硃批非汝見不及也究係忠誠少遜耳如田文鏡之老成練逹者頗不乏人不過愈增其譎詐趨避之伎倆而巳豈徒無益於國事且將新進後生輩引入邪途而為之作俑也此等老吏之惡習朕深惡之汝當效法田文鏡之根本立心處若從外象施設邊倣學則終不能有及之之日也勉法之欽此又摺內開東省錢糧倉榖鼓鑄制錢建造倉厫㑹勘水利添設滿兵衙署營房修輯通省志書等事俱未能逐一完妥凡此辦理稽遲之咎皆臣質鈍才庸之所致等語欽奉硃批如汝歷舉此數條豈一時即能尅期就緒者耶究其所以蓋緣屬官未悉汝之心志所在故也能令屬官深信上司是則必是不是則必不是自皆相率竭力急公矣如此而後可望通省吏治次第就緒若不如是汝等一二大員縱竭盡心力何能一一躬親辦理也凡事惟當端本為要將此奏摺批諭密與嶽濬看令伊知之欽此伏念督臣田文鏡練達素著臣恪遵訓旨奉為楷模每慮識淺才疏未能僃悉仿學兹恭繹硃批因知效法賢臣但宜體其心地之忠誠不在襲其外象之施設總以勉法其根本自然馴至有成至於通省吏治不能尅期就緒皆由臣等率屬無方是以辦事寡效再繹硃批又知身為上司必須是非不淆勸懲允當俾屬員咸知畏感向上急公總以端本為先自然次第就緒凡此剴切詳明之聖訓均係希賢奏治之要圖臣雖至陋至愚反覆思維亦覺憬然有悟從此悉心務本竭力圖忠庶幾獲效涓埃以仰答聖主委曲指導之至意所有微臣跪誦感激緣由理合繕摺奏聞伏乞皇上聖鑒謹奏今實授汝為山東巡撫巳有旨矣竭力勉為之百爾臣工倘至有玷厥職罪責止於不忠而已在汝則又多不孝罪責可弗愼歟兹為汝計事事第循田文鏡軌轍萬勿另移步趨不但好勝之言不出於口即見長之念亦不存於胸儼如後生之於師長下吏之於上官遵從維謹愼莫聽信屬員撥弄而輕違君父慈愛之訓誨也田文鏡年近七旬從伊學習十年至得心應手精詳熟諳時然後呈獻底藴展布謀猷猶未為晚何必目前向班倕爭巧而較短論長於尺寸間耶斯乃朕知真見透之諭當拳拳服膺奉以為圭璧同日又奏為奏明事竊查東省南北大路多有窪下難行荷蒙聖懷軫念特遣工部侍郎法保等來東踏勘隨經督臣田文鏡委員㑹查估計覆奏臣自陜回東於十月初二日接准部咨欽奉上諭爾工部即行文三省動正項錢糧乘此農隙之時派委賢員作速興工務於明春雨水前告竣朕仍遣員往查等因欽此復准督臣移咨到臣臣就近飭令沿途十一州縣領帑興修查照原估或築髙官道或改就民田或於地頭挖土墊修一切溝路俱遵估定式樣在民田限於地勢難以展闢惟於原估丈尺不容缺缺其官道地面本濶路根溝底較之原估丈尺酌令加寬以防坍塞路則令其夯硪堅固溝則令其開浚深通其應給田價上價照額發領不許吏胥侵扣除地方正佐各官分段承修外臣仍遴委能員逐一查催現稱修築完固次第竣工但時值天寒又經大雪之後土脈尚在凝結誠恐春和凍釋漸致浮鬆仍飭承修官於交春之際再加夯硪培補保固無虞至於應建橋梁業巳採辦石料前因寒凍未解難以築基今漸近春和上緊建造務令尅日完僃聽候欽差勘查總期路廣溝深津梁利涉以仰副我皇上王道蕩平惠恤行旅之至意所有現在修治道路建造橋梁情形理合繕摺具奏上慰聖懷伏乞睿鑒謹奏諸凡工作惟勤查確勘屬員吏胥方不敢舞弊若少涉疏慢必致有名無實潦草塞責其遴委誠實人員不時催督看驗務俾修築堅固以利便行旅永免躑躅之虞至於帑項第不令姦貪侵蝕耳何可吝惜節省之念斷不宜存果能錙銖皆用於工內即較原估稍多亦朕所樂聞也又具奏李樹德一案暫為留中候交部議覆有旨雍正七年十二月二十四日山東巡撫臣嶽濬謹奏為恭謝天恩兼陳下悃仰祈慈鑒事雍正七年十二月二十二日准吏部咨欽奉上諭朕見嶽濬少年老成克遵伊父嶽鍾琪家訓是以令其署理山東巡撫印務自署事以來實心供職才守兼優且虛懷受善能資總督田文鏡之益和衷共濟田文鏡亦奏稱嶽濬克勝巡撫之任著將嶽濬實授山東巡撫欽此臣恭設香案望闕叩頭謝恩訖伏念臣世受國恩至優至渥自幼隨侍臣父朝夕所聞惟以竭忠報主為訓臣悉心聽受敬志勿忘祇因年少材庸不克䇿勵上進荷䝉聖恩鑒拔不次超遷由藩司署理撫篆任大責重隕越堪虞仰賴聖主垂諒愚蒙事無巨細訓示周詳又命督臣田文鏡隨時引掖指導機宜臣奉為楷模虛衷請教不敢稍存己見而督臣推誠相告一載以來受益洪多嗣因臣父領兵西征蒙皇上特恩令臣前赴肅州侍送出口臣父將臣署撫任內事件逐一詢問深恐臣庸劣不職有負皇上天地生成之德諄諄戒飭及臣自陜回任欽奉特旨授臣為都察院僉都御史仍署理山東巡撫印務敬聞之下感悚交集兹復荷蒙恩旨實授山東巡撫兼以臣為克遵臣父之家訓能資督臣之教益聖慈垂注重賜褒嘉臣自揣何人膺此逾分之光榮受此特逹之知遇委託愈重報稱愈難惟有夙夜冰兢倍加勉勵事事凜皇上剴切訓誡之至意時時體皇上委曲栽培之盛心與督臣田文鏡協力效忠恪供職守以仰答洪恩於萬一耳所有微臣感激下忱俟開印日具疏題謝外合先繕摺恭謝天恩伏祈睿鑒謹奏爾當青年膺兹重寄亟宜淬礪以期無忝前摺批諭甚明其實力遵行勿替硃批諭旨卷二百一上欽定四庫全書硃批諭旨卷二百一下硃批嶽濬奏摺雍正八年正月初十日山東巡撫臣嶽濬謹奏為跪誦硃批敬陳下悃仰祈慈鑒事雍正七年十二月二十九日臣於跪讀硃批恭申謝悃事摺內奉有硃批諭旨伏念臣年少材庸無足比數忝膺署撫時以不克勝任為虞今荷特恩實授巡撫循分自揣彌切悚惶前此屢奉硃批䝉皇上格外鑒原時加訓誡又諄諭臣居心行事皆以督臣田文鏡為法剴切指示至再至三是皇上恤臣之顓蒙諒臣之駑鈍而以督臣田文鏡樹為師表使臣悉心仿學以庶幾獲免隕越也臣即愚昧寡識而一隙之明亦知仰體聖慈虛衷求益是以署理撫篆一載以來凡有地方公務無不禀請督臣教導逐一遵行從不敢妄自衒長另立意見亦不敢聽人撥弄陽奉隂違惟願追隨督臣多歷年歲廣見聞之所未逮增材力之所不能藉以竭效涓埃仰酬恩渥即臣父嶽鍾琪平日忠勤自矢諄諄以竭誠報主訓臣聞臣受教督臣漸有進益亦未有不感激皇上委曲玉成之至意而勉臣以恪遵賢範始終勿渝者倘臣自矜少壯藐視老成欲與之分異同較長短罔循軌轍甘蹈愆尤是直下愚不移自暴自棄負君恩而違家訓不忠不孝兩無逃罪此臣之所斷不出此而亦不敢不時時警惕者也臣惟有凛對宸嚴瀝陳下悃期於實心受教竭力效忠以仰冀聖主垂照於萬一而已為此繕摺呈奏伏乞皇上慈鑒謹奏所奏嘉悅覽之倘遇臨時應變迅發速辦之事又不可遷延觀望致誤機宜也然此等處究屬稀少同日又奏為據情上奏仰祈睿鑒事竊查原任山東禹城縣知縣郭傳世由舉人挑選引見命往山東於雍正五年四月內補授禹城縣知縣受事未久隨經臣父川陜總督臣嶽鍾琪奏請將郭傳世調赴陜西軍前委用於本年十一月初三日奉旨允准前任撫臣塞楞額接奉部文行令該員離任交代星馳赴陜嗣因郭傳世在禹城任內有應買監榖常平倉榖共九千二百八十六石竝未採買貯倉即經塞楞額於欽奉上諭等事開報玩誤職名題參奉旨將未買倉榖之州縣衛各官革職俱留本地㑹同現任官員將倉榖買足之後始准回籍欽此遵即咨提郭傳世由陜來東於雍正七年十月內㑹同署禹城縣知縣陶士倧照依議定時價領銀買榖如數通完署令出具倉收咨送户部訖兹據郭傳世呈稱切傳世因買榖遲延被參革職荷蒙皇恩諭令買榖完足即准回籍今傳世採買通完實貯在倉理應遵旨回籍但傳世前於雍正元年九月內自僃鞍馬呈請軍前效力隨師進𠞰播下熱當等五處逆番又於雍正二年隨師進𠞰爾郭隆寺青海桌子山棊子山等逆賊隨於雍正三年八月內經川陜總督嶽鍾琪查明效力功績單咨保送吏部吏科在案兹因仰沐皇仁無可圖報仍請再赴軍前聽候委用竭力辦事以稍效犬馬微忱於萬一伏懇據情奏逹等情具呈前來臣查郭傳世從前兩次隨征效力熟悉邊務實屬才有可用之員今呈請再赴軍前情詞懇切理合據呈繕摺上奏可否將郭傳世給咨引見發往軍前委用伏乞皇上批示遵行謹奏郭傳世無庸來京引見徑由該省發往軍前效力將伊呈內情節一靣咨部存案一靣寄字與汝父酌量差委於大兵凱旋之後分别勞效多寡奏請叙用可也雍正八年二月初二日山東巡撫臣嶽濬謹奏為祥雲獻瑞萬姓歡騰據實奏聞以昭聖德事雍正八年正月初九日據登萊青道孫蘭芬呈報雍正七年十二月二十八日亥時仰見西北五色祥雲繚繞碧空明如日照等語臣以地近海隅或霞光時有煥發是以未敢冒昧遽行奏聞當即飛飭沿海文武官辨併確詢地方居民詳悉具報以憑據實核奏去後隨據登萊二府文武官辨各報稱雍正七年十二月二十八日夜彩雲旋繞燦爛光華起於海中之長山島歷亥子丑三時久而彌顯老幼歡騰等情併准登州鎮臣曾謨咨㑹到臣伏查雍正七年十二月二十八日二更時分西北祥光自海中長山島而升五色輝煌歷亥子丑三時午夜昭回中宵煥彩萬目共覩衆口同詞洵為亘古希聞生民僅見之盛事皆由我皇上治隆化洽昭格天心是以有此嘉祥顯應也臣謹據實繕摺奏聞伏祈皇上聖鑒謹奏海雲獻瑞適閲費金吾摺而未見汝奏意謂汝或另具題本是以於伊摺內批諭具題到日有旨也此事本屬尋常無庸誇詡若尚未繕疏竟行停止為是雍正八年三月二十二日山東巡撫臣嶽濬謹奏為奏明事竊臣於本年三月十七日起程赴青業經奏明在案今臣於十九日到青適值欽差都統臣拉錫尚未起行隨帶臣往看新建營房基址一帶平衍地勢高阜實屬相度得宜復准御史臣偏武咨取銀二萬兩臣即於司庫照數動支委員解交偏武查收其現在到工各員亦即令其赴偏武處聽候派委併嚴飭各員務須精白一心勤愼任事以速大工臣隨於二十日由青前赴廟工所有微臣到青情由以及赴曲日期理合奏明伏祈皇上睿鑒謹奏覽奏知道了拉錫此番籌畫措置俱甚協當又請檢發人員一摺業巳交部照汝所請行矣雍正八年四月初六日山東巡撫臣嶽濬謹奏恭請皇上聖安朕安汝父統兵塞外托賴上天祐庇士卒和輯汝父平善特諭知之同日又奏為恭報雨澤仰祈聖鑒事竊查東省今嵗入春以來髙原下隰土膏滋潤二麥悉皆茂盛秋禾俱已播種春夏之交尤資霖雨今臣於三月二十二日自青赴曲二十五日途次泰安天降雨澤不急不驟絲絲入土計深五寸二十八三十日臣在曲阜又疊沛甘霖計深四五寸不等臣恐通省或尚有未經霑足之處即於二十五日飛檄通查旋據濟南府之歷城等州縣報稱於三月二十五等日得雨三四寸不等復據兖東登萊青五府以及泰安等九州所屬各報同日得雨四野均霑等情臣於三十日冒雨起程至四月初四日回署所歷地方青葱遍野夏麥秋禾益覺暢茂發生野老村農歡聲載道所有東省得雨緣由竝臣回署日期理合繕摺呈奏伏乞皇上聖鑒謹奏甘雨應時深慰朕念以手加額覽之雍正八年五月初一日山東巡撫臣嶽濬謹奏為恭謝天恩事本年四月二十一日臣齎摺家人回濟捧到臣恭請聖安奏摺欽奉硃批朕安汝父統兵塞外托賴上天祐庇士卒和輯汝父平善特諭知之欽此臣隨恭設香案望闕叩頭謝恩訖伏思宣力疆圉乃人臣之大義加恩無已實聖主之洪慈去歲臣父奉命出師䝉皇上念臣父子之情令臣赴陜逺送俾得一家團聚一路追隨稍伸烏鳥之私固已銜感無地今年臣父逺馳塞外家信難通臣正念臣父在外之安否復蒙皇上於萬幾之餘曲體下情批示臣父平善使臣為子之心得以少慰臣跪誦之下不特臣感激涕零即臣舉家無不感激涕零臣父子蒙髙厚之恩至於如此臣雖生生世世捐糜頂踵亦莫能仰報萬一矣臣謹繕摺叩謝天恩伏祈皇上聖鑒謹奏今年暫停進𠞰朕與兩路大將軍有靣商機宜即日宣召汝父來京汝不必深為繫念也雍正九年二月初八日山東巡撫臣嶽濬謹奏為東省車兵懸額未補謹陳末議仰懇聖鑒事竊東省撫鎮各營於雍正七年五月內奉旨挑選車騎營兵二千名派往北路出師欽遵派往在案伏查東省左控海疆右臨漕運路通九省水陸交衝登兖兩鎮竝撫標馬步兵共一萬六千六百八十二名除各員親丁名糧之外實在馬步兵共一萬五千二百六十四名緣地方遼濶汛務殷繁各路散防僅供差撥派往北路車兵二千名又經按營抽撥十分之內挑去一分有餘是以汛廣兵單不敷差遣因查出征車兵各本名歲支糧餉荷蒙聖主恩慈准其按季支領養贍家屬俾無內顧之虞臣仰體皇仁豈敢輕議募補而營伍關係甚重又亟需補足原額臣再四籌畫莫若將該兵子弟諭令各家報明該管鎮將擇其壯幹者暫令頂補充伍俟大兵凱旋之後本兵回營仍將前項暫充之子弟俟有開除名糧即准拔補以示鼓勵既不煩另給錢糧又寸以共資防護實為一舉兩得倘該兵竝無親子弟姪無可頂補可否念營伍為重另募鄉農添補足額仍懇恩准另給步糧暫資口食俟本兵歸伍停其支給即將新募之人與暫充之該兵子弟一體候糧拔補雖增給糧餉所費稍多而兵額無懸實於營伍地方大有裨益再查兩鎮兵丁俱係督臣管轄且直隸河南山西各有車兵均未酌補非臣一隅之見所敢臆論但臣身居東省目睹情形不敢不據實密陳上瀆宸聽倘臣言可採仰祈皇上特頒諭旨將東省原撥車兵分别補充以實營伍併懇免將臣摺發部不使臣顯蹈越爼之愆益戴聖恩於無既矣為此繕摺密奏伏乞皇上聖鑒謹奏營伍汛防關係封疆要務言所當言何為越爼已另有諭旨矣雍正九年五月十五日山東巡撫臣嶽濬謹奏為仰懇聖恩簡擢標員以重職守事竊臣標兩營將辨雖非防守汛地而統兵千名自當愼重武僃不時訓練以壯戎行但從前怠玩成習積久廢弛臣自涖任以來留心整飭督令將辨加謹操練近日兵丁稍有紀律而臣標中軍遊擊一員綜理營務兼有稽察關防鎖鑰等事職守尤重必得熟練營伍辦事謹飭之員方能勝任今中軍遊擊程簡具詳乞休經臣驗實題報亟請簡補臣查有高唐營守僃劉屏藩為人勤愼甚能操練營伍弓馬漢仗均屬可觀臣所素知據實保薦儻蒙皇上天恩將劉屏藩升補臣標中軍遊擊實於營伍關防均有裨益為此繕摺具奏伏祈皇上睿鑒施行謹奏劉屏藩著來京引見該部知道雍正九年六月十八日山東巡撫臣嶽濬謹奏為遵旨據實覆奏仰慰聖懷事雍正九年六月十五日接到大學士公馬爾賽等寄信內開雍正九年六月初十日奉上諭近日京師亢旱朕心甚切焦勞聞山東地方五六月間雨澤亦少不知近日如何著巡撫嶽濬據實奏報從來蝗蝻之生往往由於水潦之地存留魚子及水退之後次年雨少又加烈日蒸曬所留魚子遂變化為蝗此古書之所載亦土人之所知者朕曾切諭地方官民留心防遏今思山東州縣上年有被水之區若因魚子存留釀成蝗蝻之害不可不防之於早也略有萌動之機以人力制之尚易若因循瞻顧必至難於撲滅為害甚巨小民怠惰偷安又恐踐踏禾稼未免撲捕逡巡不可不明白曉諭竝飭地方有司實力奉行以副朕為民防患之至意等因欽此臣跪讀之下仰見我皇上宵旰焦勞軫念民瘼指示明切籌慮周詳伏查東省五月內雨澤稀少高阜之地稍缺滋潤然民間收穫二麥利於隨收隨曬不致蒸濕生芽皆以晴霽為幸惟交六月以後禾黍正當長發之時民情望雨甚切臣先期飭查各屬隨據各州縣節次報到初一初三初四等日得雨者七處初六七八等日得雨者三十八處自二三寸至四五寸不等又十二三四等日重雲四布雨勢甚寬濟南得雨巳透各屬報雨每日約有十餘處悉稱四野霑足統計六府九州惟東昌一府濮州東平兩州從前得雨甚少直至十三日以後始報均霑通省雨澤巳遍可無乾旱之虞至於水潦之地魚子易化蝗蝻為害甚巨臣於五月初間嚴飭各州縣文武官辨留心探訪但有蝻子萌動一靣盡力搜捕一靣具禀飛報以憑委員協捕勿使蔓延昨聞東平州安山湖內魚子蒸化似蝻非蝻雖據土人稱為青頭螂竝非蝗蟲種類不害田禾但恐此種變化不常仍飭地方官盡行撲滅此外州縣竝無蝻子生發詢之土人皆云因去年冬雪甚厚是以蝗蝻絶跡以上俱係東省現在情形足以上舒睿慮臣仍凛遵諭旨加謹飭查斷不敢玩忽因循有負聖主諄切訓示之至意所有東省業經得雨及竝無蝻子生發之處理合遵旨據實奏覆伏祈皇上聖鑒謹奏據奏既無蝗蝻之害又無乾旱之虞山左民生今歲漸有起色矣朕實喜出望外同日又奏為謹陳東省嚴緝盜案情形仰祈聖鑒事竊查東省去秋各屬被水成災計八十餘處自八月以至今年四月州縣報盜甚多伏思東省時經災歉愚民易於為非其中有本地不法凶徒乘機倡率而外省積匪亦復潛入境內糾合成夥亟宜嚴捕首惡以杜姦萌臣一靣檄飭州縣實力巡緝仍挑選幹練捕役捐給工食設立賞格發按察司衙門凡遇緊要凶盜密遣搜捕節次報獲通查東省各州縣盜案獲犯者什之六七俱飭確審定擬緝拏逸犯其外省逃盜陸續被獲者如曹縣則拏獲河南寶豐縣行劫王世太家積盜郭二又拏獲江南沐陽縣行劫錢銘家盜犯郭蘿蔔頭子嶧縣則拏獲邳州行劫周瓆家盜犯周起林等四名巨野則拏獲河南信陽州商邱竝江南蕭縣慣盜劉天章等十二名單縣則拏獲行劫河南商邱縣徐棠家盜犯趙玉等十八名恩縣則拏獲山西平遙縣行劫梁琦家越獄盜首魏二即魏文英以上奏再查東省自五月以後二麥豐稔秋禾滋茂現在姦匪潛消地方寧謐合併奏逹伏祈睿鑒謹奏為政之道自省乃第一要務加意愼勉毋或少懈雍正九年七月二十一日山東巡撫臣嶽濬謹奏為恭報東省雨澤溥遍禾榖茂盛上慰聖懷事竊查東省各府州屬俱於六月內得雨霑足惟聊城堂邑等十四縣尚未溥遍嗣據聊城堂邑等縣連日報到悉於六月二十九三十日七月初一二初九初十十一二等日得雨二三寸至尺餘不等臣已先期飛飭各縣竝委試用各員分鄉確查一經得雨勸民及早補種晚豆蕎麥其無力買種之家遵旨借給籽粒一體催令布種是此十四縣雖得雨稍遲而秋禾尚得滋生晚豆蕎麥補種無誤惟范縣一處報稱得雨未透秋禾多巳枯黃其補種之豆蕎猶有可望等語臣隨委員㑹同該縣確勘果否成災仍將得雨稍遲之各縣凡屬高阜鄉莊有無被旱一體查明如有應行賑恤之處臣與欽差侍郎臣趙殿最酌核辦理再查東平濟寧魚臺汶上寧陽五處湖河低窪處所魚子蒸曬多有化作小蝻臣仰遵聖訓早經嚴飭各屬但遇蝻子發生立即多方撲捕仍遴委幹員協力同撲現據各報消淨無損田禾又查郯城寧陽樂安三處值本月初十至十二日大雨疊注沂沐汶淄等河水勢驟長數尺幸賴新修民堤足資捍禦即有漫溢一二處旋即退涸田廬均無妨礙現今天氣晴明各屬早榖早豆俱在收穫其晚種之豆榖蕎麥悉皆滋潤生發遍野青葱訪之土人均稱豐稔有望莫不歡欣鼓舞感戴皇恩所有東省得雨溥遍禾榖茂盛情形理合據實奏報上慰聖懷伏祈皇上睿鑒謹奏東省雨澤普遍情形以手加額覽之今歲天恩如此篤厚殊非意料所及諒汝必不忍涉於欺誑朕之憂懷盡釋矣雍正九年十月初一日山東巡撫臣嶽濬謹奏為計典展限已届謹據實陳明再祈聖鑒事竊文職三年大計乃國家激揚之巨典東省去年大計届期經督臣田文鏡奏請展限荷蒙聖恩垂鑒准於次年舉行今次補行計典臣㑹同督臣自當矢公矢愼上緊辦理何容再有陳奏惟查東省闔屬六府九州各知府中止有青州東昌二府歷任巳滿三年其濟兖二府未滿二年登萊二府未滿一年各直隸知州內止有泰安莒州題補將及二年其餘七州俱係委署試看未曾實授又各屬知州知縣共九十五處內有甫經調署以及新任未久者共四十五員任事一二年者共四十一員其歷任三年竝三年有餘者通計止有九員伏查計典之制三載考績原以甄别供職己久優劣昭著之員若任事不及一二年及調署新任正在試看者尚無循績可録亦未即有過犯當繩而歷任三年之府州縣共一十一員內有合例而堪膺保薦者現需題補要缺其餘皆勉供職守竝無干犯應劾之條再查東省自去年十月奉文展限以來凡庸劣不職經督臣與臣㑹參革職者一十五員因公降革者七員改教勒休者九員即佐雜教職節次咨革者亦有二十二員是東省之計典雖已展期而臣與督臣加謹訪察凡有干八法之員立即參處竝不敢少有姑容留待大計今若速行舉劾恐考核無幾不足以昭彰疸之公臣再四躊躇不得不據實陳奏仰請恩鑒儻蒙特頒諭旨再寬一年之期則各員歷任漸深功過易見容臣與督臣詳加考察分别舉劾以仰副我皇上澄叙官方之至意又查計典所關甚重可否再請展限應與督臣田文鏡㑹商啓奏但督臣初經回任政務殷繁往復咨詢有稽時日况展限本無成例允准出自聖恩原非臣等所敢擅請是以未行商酌合併聲明伏祈皇上聖鑒批示遵行謹奏三載考績黜陟幽明大典所關正當與督臣田文鏡商酌㑹題朕豈便但據摺奏遂爾批允此舉錯謬之極雍正九年十二月初四日山東巡撫臣嶽濬謹奏為恭報東省得雪州縣上慰聖懷事竊東省自入秋以後雨澤調勻民間種麥甚廣更望冬雪溥降滋潤土膏今據濟南府所屬州縣於十一月十三日得雪一寸至三寸不等青州府所屬州縣於十一月十三日得雪一寸至四寸不等萊州府所屬州縣於十一月初三十三等日得雪二寸至五寸不等登州府所屬州縣於十一月初二十三十八等日得雪一寸至六寸不等武定濱州髙唐等三州所屬各縣於十一月十三日得雪一二寸不等瑞雪應期麥田含潤民情歡忭莫皇仁所有東省得雪州縣申報到臣合先繕摺呈奏上慰聖懷伏祈皇上睿鑒謹奏似此微雪奏聞則巳何必過於鋪張若崇尚虛文必至流於詐僞居心既有不誠安望其能感召天和也雍正十年六月十一日山東巡撫臣嶽濬謹奏為仰體皇仁奏明請旨事竊查東省撫標兵丁於雍正七年四月內欽奉恩旨賞給帑銀四千兩營運生息以僃兵丁一時之用臣奉領銀兩倣照豫省之例分發各當商作本營運每月二分起利以雍正七年七月為始按月收銀僃用嗣奉諭旨賞給兵丁營運生息銀兩原係特恩期於永逺周急有資若定以數月之限即行支賞則所生利息無多不能接續將來恐有不能普遍之勢著行文不必定以賞給限期俟營運生息豐裕足用之日再行給與欽此臣謹將所收利銀存貯縣庫暫停給發惟有出師兵丁家口需用婚喪之費奉准部文行令照數支賞婚費給銀六兩喪費給銀十二兩轉飭遵照在案伏查原領銀四千兩自雍正七年七月起至十年五月每月收利銀八十兩共收銀二千八百八十兩內除出師兵丁節次支給銀三百四十八兩現存利銀二千五百三十二兩臣查撫標兵丁共九百一十六名前奉諭旨原俟生息豐裕足用之日再行給與今現存利銀二千五百兩臣照前起息每月可收利銀五十兩合計原銀共六千五百兩每月應收利銀一百三十兩足資賞給之用所有臣標在營兵丁應否一旨再查出師兵丁效力邊陲家口在籍仰荷皇仁加厚資給婚費給銀六兩喪費給銀十二兩今在營兵丁與出師者有勞逸之分未便援照此數相應酌量核減婚費給銀四兩喪費給銀八兩庶撙節得宜可以為普遍經久之計合併陳明統祈皇上訓示遵行謹奏多寡增減亦在汝酌量為之者雍正十年九月十三日山東巡撫臣嶽濬謹奏為恭懇聖鑒事竊查青州府設立駐防滿營所有衙署兵房業經監督臣偏武等次第監造其駐防兵丁居家什物臣奉准部咨隨於司庫存公項下動支銀一千四百八十三兩零發給青州府遵照僃辦在案嗣准部咨青州將軍鄂密逹於本年九月初二日自京起程帶領官兵匠役及家口人等共計一萬五千餘人分作四隊前赴青州等語臣伏思青州非比省㑹市集交易糧貨無多今以一萬五千餘人一時駐劄每日需用米糧草料等物為數繁巨購買維艱兼之初設滿營商民不曾熟習未免觀望不前而姦狡牙行轉因此增價射利致滋掯纍臣再三籌畫亦應先期採買以僃所需隨於臨倉耗羡項下暫支銀四千兩發給登萊青道暨青州府知府即令委員在於近府之夀光昌樂二縣照依時值購買糧食草料陸續搬運至府給令鋪户照本平賣絲毫不得添增仍著地方官㑹同理事同知不時巡查務令彼此協和公平交易併藉以招徠商販食貨流通兵民有相資之益矣除臨倉耗羡俟收齊價值如數歸項存貯外所有僃辦緣由理合繕摺奏明伏祈皇上聖鑒謹奏東省駐劄滿兵不過使其不缺衣食足矣原為防守地方而設非比出征用命之師不可縱容致令肆志希冀分外若事事俯就殊非所以愛之之道然朕意竝不謂此事辦理不協而諭毋得錯㑹官兵入境之後自將軍以至兵丁跟役稍若不遵法度欺凌百姓騷擾地方無論事之巨細悉行奏聞倘隱諱不言朕於他處聞知必當嚴咎汝等將此諭亦令鄭禪寶知之雍正十年十一月二十六日山東巡撫臣嶽濬謹奏為恭報東省得雪州縣仰祈聖鑒事竊東省八九月內民間種麥甚廣時值雨澤調和結根堅固更望冬雪溥降滋潤土膏臣節次檄查闔屬今據登州府屬蓬萊等八州縣報稱於十月十五十六十九二十四二十五二十七等日得雪二次三次自一二寸至尺餘不等又據萊州府屬掖縣等七州縣報稱於十一月初四十四等日得雪自一二寸至六寸不等又據青州府屬益都等十縣報稱於十一月初四十四十九等日得雪自一寸至三寸不等又據濱州及所屬利津等三縣報稱於十一月十四十九等日得雪一二寸不等又據武定州并所屬海豐陽信等二縣報稱於十月十五十一月十九日得雪一二寸不等又據濟南府屬之歷城齊東鄒平新城等四縣報稱於十一月十九日僅霑微雪以上登萊青三府俱巳得雪武濱二州亦皆霑被惟濟南以東如東昌兖州二府泰安東平髙唐曹濮沂莒等七州尚未得雪除俟各州縣報雪到日另摺續奏外所有東省得雪州縣合先據實恭報上慰聖懷伏祈皇上睿鑒謹奏覽奏巳悉都中亦甚望雪乃咫尺如天津等處又報霑足大抵今冬雪不為歉第稍覺不均耳雍正十一年正月十八日山東巡撫臣嶽濬謹奏為恭報東省得雪州縣仰祈聖鑒事竊東省各屬上年冬季雨雪未均止有登萊青三府武濱二州於十月內得有瑞雪經臣具摺奏報嗣於十一月二十一二十八等日登萊青三府等屬復有得雪處所而濟南以西各府州等屬不過數處稍霑微雪兹於雍正十一年正月初三日據兖州府所屬滋陽等十州縣均報得雪積地一寸至三四寸不等又據莒沂二州并所屬各縣均報得雪積地二寸至四五寸不等又濟南省城於正月十二日晚間初得微雨繼以大雪臣遣員四路探查據稱各路得雪積地四五寸不等復據濟南各屬并兖州東昌青州等府屬泰安東平沂莒等州屬俱報得雪二寸至五六寸不等除將未經報到之各州縣飭查有無均霑外所有東省現經得雪情形合先據實奏報上慰聖懷伏祈皇上睿鑒謹奏些微雨雪難言深透地脉朕懷何由而慰或已足慰汝心則朕不得而知也雍正十一年七月十五日山東巡撫臣嶽濬謹奏為奏報事雍正十一年六月三十日據德州報稱該州所管衛河上流泛漲水勢暴發境內堤岸日加防護復值本月二十三四等日大雨如注晝夜不息河水倍增洶湧隨於二十四日將東岸老虎倉地方衝溢堤口五十餘丈直注東北一帶又州城小西門外振河閣石岸磚岸俱有衝坍現在搶修等語臣隨飛委員辨齎帶銀兩馳赴德州交與該州多僃工科作速修築并令該員辨等將德州左近河堤逐一查勘回覆今據禀稱老虎倉溢口一處約有五十餘丈水深五六七尺不等其水直趨東北向直隸之吳橋寧津竝東省之德平樂陵等縣流去該州督率人夫於七月初二日興工下樁上緊堵塞又振河閣下護城石岸坍塌一段長一十二丈寬二丈磚岸坍塌一段長一十七丈寬二丈現在下掃墊土日夜防護又德州衛所管河道哨馬營堤岸漫溢一段長三丈四尺第三店堤岸漫溢一段長二丈三尺該僃均在搶修等語臣隨檄委署糧道廣夀督催該州衛修築完固尅期報竣復據德州并德州衛報稱該州衛境內既有溢水奔注又有積潦橫流田禾房屋均在被水又鄰近衛河之冠縣武城竝溢水經由之德平樂陵皆被淹灌各詳報到臣隨㑹同督臣王士俊飛飭布政司委員星赴該州縣衛逐一查勘除冠縣水已消退無礙田廬外其德州等處先將境內積瀦設法疏導凡被水窮民有房屋坍塌無可棲身者按等給銀令其苫蓋草舍以蔽風雨仍履畝細勘秋禾果否成災據實申報臣現與督臣商酌辦理悉心綏撫不致災民失所所有德州衛河水漲衝堤竝六州縣衛被水情形理合具摺奏報伏祈皇上聖鑒謹奏速飭該屬員悉心疏宣竭力搶築竝確查被水居民加意撫恤務令俱各得所以慰朕念雍正十一年九月初六日山東巡撫臣嶽濬謹奏為恭報東省各屬秋成分數仰祈聖鑒事竊東省自五月以來甘霖疊沛滋長秋苗一切榖豆雜糧無論種植早晚均獲成實雖與江南豫省接壤之州縣河湖蘆葦之中偶有蝗蝻生發即時撲滅竝不傷損田禾又濟東等府秋雨稍多而旋雨旋晴不致積水淹潦亦有瀕河州縣八九處漲溢為災然亦不過一二窪下鄉莊秋成稍覺減薄此外各屬俱係豐收兹查通省各府州所屬州縣收成十分九分八分者居十之八七分六分五分者僅十之二兼之各州縣多植果木棗栗梨柿悉有六七分收成均資食用現今市糧甚賤諸物充盈商販流通民情饒裕至於被水處所欽遵諭旨委員履畝確勘併查驗窮民給銀葺屋計口授食是不特豐收之州縣户慶有年即被水之村莊亦人霑實惠均有以仰慰我皇上厪念民依之至意所有東省各屬收成分數理合恭摺奏報伏祈睿鑒謹奏收成分數果如所奏亦可謂中歲矣但不可少有隱飾雍正十一年十一月十五日山東巡撫臣嶽濬謹奏為恭報東省瑞雪溥霑仰祈聖鑒事竊東省八九月內雨澤勻調民間及時種麥即有一二低窪之地積潦消退亦俱漸次補種必須冬雪滋培苗根方屬有益嗣據濟南府歷城等屬報於十一月初二三日得雪二寸至四寸不等兖州府滋陽等屬報於十一月初二三日雨雪竝霑有二寸至一尺不等東昌府聊城等屬報於十一月初二三日得雪一寸至三寸不等青州府益都等屬報於十一月初二三日得雪一寸至六寸不等萊州府掖縣等屬報於十一月初三日得雪三寸至五寸不等登州府蓬萊等屬先於十月初六七以及二十八等日各報得雪二寸至四寸不等又據泰安曹州東平沂州髙唐濮州莒州等七屬均報於十一月初二三日得雪二寸至四寸不等惟武定濱州等二屬未經得雪今於十一月初九日省城大雪紛降積地八寸是日同雲四布雪氣濃厚臣遣員各路探看皆稱得雪霑渥連日據濟屬之章邱等十三州縣兖屬之滋陽寧陽曲阜等縣東屬之堂邑博平茌平清平臨清夏津武城等州縣又泰安州及所屬三縣髙唐州及所屬四縣莒州及沂水蒙隂等縣均報於十一月初九日得雪二寸至七寸不等其從前未經得雪之武定濱州等屬亦報於十一月初九日得雪自二寸至六寸不等伏思東省農務麥田最關緊要臣訪查各屬種麥甚廣且旬日之內得雪兩次逺近均霑覆積田間隨融隨凍足以斂生氣而固深根麥田有資民情共懷欣愜所有東省州縣連次得雪情形理合繕摺奏報上慰聖懷伏祈皇上睿鑒謹奏冬雪均霑朕懷深慰然亦必待來年春雨接續麥秋方為有準也雍正十二年三月二十四日山東巡撫臣嶽濬謹奏為據實奏聞事竊東省向有邪教流傳妄立名色煽惑鄉愚臣節經拏獲嚴加究懲仍切諭各屬文武官辨留心訪察兹於三月初六日據署髙唐州知州汪連蕚密稟該州西北村莊有居民楊翠王天柱等七人妄入邪教現經拏獲訊稱係夏津縣陳永順所傳名朝天一炷香又名愚門弟子教一日三時向太陽磕頭念持咒語祈求降福消災上年十月十二月今年正月三次收錢每人出錢三文交作祭祀太陽之用陳永順又是肥城王弼公所傳并供出同教之楊世公鄭玉起孟興莘等現在密關查捕等語臣當即密飭嚴拏去後隨於本月初八日據夏津縣禀稱拏獲邪教陳永順訊供係恩縣楊世公所傳等語本月十一日又據肥城縣禀稱拏獲邪教王二秃及伊子王配天供出伊女友姐現在平隂縣栁溝莊齊進忠家掌教又供有同縣王君照徐克儉張化平王世明等以及滋陽縣之閻敬義王者起陳少言姚成業等俱係同教現在查拏等語本月十七日據恩縣禀稱拏獲邪教楊世公竝鄭玉起起出教書一本仍現在嚴拏孟興莘等語又據滋陽縣拏獲邪教閻敬義王者起陳少言姚成業等并供出之曹三等語又據肥城縣禀稱拏獲邪教徐克恭王世雷張化平并於徐克恭家起出雕牌小旗圖章册劍等語以上各禀共獲邪教二十人未獲各犯現飭嚴拏仍於獲犯內研審教首根究黨羽嚴加懲治其中有被誘未久實係鄉愚無知者臣分别辦理不敢波纍多人致滋紛擾所有髙唐州等屬拏獲邪教緣由理合據實奏聞伏祈皇上聖鑒謹奏諸如此類邪教人犯要當察其有無為匪情故以定罪之輕重為是雍正十二年五月十九日山東巡撫臣嶽濬謹奏為恭報甘雨沛霑仰祈聖鑒事竊東省民間麥熟之時固宜天氣晴霽便於收穫蓋藏而榖豆髙粱又需膏雨滋長兼之麥收之地亟待雨後耕犁布種晚榖秋豆兹省城於本年五月十五日得雨四寸十六日又得雨五寸隨據濟屬之章邱淄川鄒平長山新城齊河齊東濟陽肥城青城德州德平商河等州縣又東屬之堂邑博平茌平清平恩縣夏津等縣青屬之益都臨淄博興髙苑樂安夀光昌樂臨朐安東衛等縣衛泰安州併所屬長清新泰萊蕪等縣武定州併所屬陽信海豐樂陵等縣濱州併所屬利津霑化蒲臺等縣髙唐州併所屬禹城平原陵縣臨邑等縣共四十五處俱陸續報稱於本月十五六日得雨入土二三寸至五六寸不等除將距省道逺之府州各屬飛檄飭查外所有省城及章邱等屬甘雨沛霑情形合先繕摺奏報伏祈皇上聖鑒謹奏甘雨沛霑情形深慰朕念近日直隸與東省接壤數縣據報蝗蝻生發現在撲捕其加意預防勿使至於蔓延雍正十二年七月二十六日山東巡撫臣嶽濬謹奏為德州衛河漫口旋經堵築據實奏聞事竊東省自六月中旬以後大雨疊沛甫稱透足汶泗等水雖有增長未至泛溢兩岸惟臨清以北之衛河逺通河南衛水山西漳水上源雨漲衆川滙流自六月二十六日起連次報增至七月初九日長至二丈有零隨於本日亥時將德州衛哨馬營白鹽地方漫溢東岸寬十丈餘水注曹家堤口入鈎盤河以逹老黃河據該州衛飛報到臣臣思白鹽地方即臣與直隸督臣李衛等㑹勘開河之道原係衛河頂溜關係匪輕臣隨僃具工料銀兩委員馳送德州交與糧道廣夀給發該州衛辦料鳩工竭力堵築并飭該道親加督率兹據該州衛詳稱現於白鹽漫口建築月堤一道長六十五丈寬一丈圈阻溢水自十一日起至十五日已時合龍訖衛河漲水不復旁注坡地淤存之水悉已消退等語連日又據報稱衛河水勢漸次消減新舊各工小心防護均保無虞等語臣查今年水勢較之上年更覺奔湧惟幸速於消減河流易平是以搶築月堤尅日工竣除檄飭該州衛將溢水經過村莊田廬有無被淹確查另報外所有德州衛河漫口旋即堵築情形理合據實奏報伏祈皇上睿鑒謹奏適據李衛亦已奏聞衛河漫口堵築迅速尅期竣工甚屬可嘉百凡處果能確秉忠誠殫竭心力未有不蒙天地神明隂相默助者是乃一定不易之理無如庸流每多信不及耳雍正十二年八月初八日山東巡撫臣嶽濬謹奏為僃籌稽察海口豆船事宜奏請聖鑒事雍正十二年六月內臣接准署兩江督臣趙宏恩密咨江南米糧出洋現在查禁惟東省豆貨為江省民食所資由海販運誠恐姦徒於米禁之後轉求豆粒雜糧致有私販偷漏之弊應令東省查明某府州所屬可由內河行走某府州所屬必由海洋販運除內河行走者聽其自便其必由海運者應令地方海口各官查明商客船户姓名年貌船隻字號梁頭丈尺豆貨數目出口月日徑行詳咨江省海關并一面詳明臣巡撫衙門移咨江省海關於進口時查驗明白咨覆東省互相稽察等情咨商到臣臣即密同布政司鄭禪寶確查情形查得東省登州萊州青州沂州等府所屬州縣衛濵海之處距內河甚逺必由海道前抵江南各海口私販米榖出洋久經嚴禁惟青白二豆素資江省民食不在禁例今江南嚴行米禁或恐東省豆貨出海乘機偷漏亦未可定自應設法稽察惟是所議詳報移咨之法竊思豆船出口一遇風順數日即抵江省該州縣衛等若將徑申江省海關之文由內地鋪司遞送非經月不能送逹其詳明臣巡撫衙門之文由濟南轉咨江南道路更逺逐鋪傳遞動至月餘恐豆船不能在江省海口守候如此之久且各屬豆船絡繹出海若令每船具詳亦覺不勝案牘之繁臣再四籌畫擬於詳文之外另設給票之法嗣後各海口豆船出口該管之州縣衛設立兩聯印票一為照票一為存查票上開明商客船户及舵工水手姓名年貌籍貫船隻字號梁頭丈尺豆石數目出口月日一樣兩張每年按月編定十二字號月月更換於票之連縫處編定號數竝於票內一體編列一切數目年月上用印鈐蓋每船截給照票一紙每發一號即於票尾將從前出口豆船挨書三號開明某號某客某船户載豆若干石於某月日出口前赴江省是此號船隻一到從前三號有無到口一覽便見即可藉此稽查每船除給照票之外該州縣衛另繕驗文將票內所注字樣照式開叙徑詳江省海關封固密釘一併交與船户齎赴海關交投竝將照票呈驗海關監督查勘文票人船豆石一一相符准其上稅進口即於照票上填明該商船到關日期查勘相符緣由用印鈐蓋給與船户持回回時呈送該州縣衛繳票銷案各該州縣衛繕給船户文票每滿一月彚查各號照依票內所注字樣挨號造冊申送到臣臣即咨送兩江督臣衙門發下海關與原文核對再查豆船一項由東省販運江南者尚少惟江南販貨來東發賣之後即買青白二豆帶回江省者十居六七此項船隻係江省查明出口之船來往販運例不飭禁嗣後東省州縣衛亦用兩聯印票之法如式填寫二張將照票截給江省船户仍具文徑詳海關并給船户齎投照前查驗驗畢之後即將東省所給照票收存海關按月報送兩江督臣衙門咨回東省由臣巡撫衙門轉行各屬查對銷案以上船隻倘驗對票册之時人船豆數不符察出影射偷漏情弊彼此咨明嚴拏究治如有後船已到而前船經久不到者一并咨行兩省沿海各口逐一查究如此立法則豆船往來兩省互有稽查姦徒無由滋弊船户商人亦不致有稽滯之纍矣臣淺陋之見分别置議業經密覆署兩江督臣趙宏恩公同斟酌聽其核奏請旨畫一遵行事關愼重海防稽察豆貨所有臣密議咨覆情由理合僃述奏明伏祈皇上聖鑒謹奏詳覽籌議如此立法雖屬妥便或恐其中仍有隱弊未能周察無遺既經移咨江督趙宏恩俟伊核奏到日再為酌定規則可耳雍正十二年九月二十四日山東巡撫臣嶽濬謹奏為恭報東省各屬秋成分數仰祈聖鑒事竊查東省今歲二麥豐收夏秋以來又得雨澤渥沾秋禾極其茂盛兹當收穫之期臣行令布政司飛飭各屬將秋禾收成分數據實具報去後兹據該司彚報到臣伏查東省八府四州所轄各屬收成十分者共四十四處九分者共四十一處八分者共二十七處七分者共六處不惟原阜膏腴之野十分豐登而卑窪沙鹻之區亦隨處有穫即新墾之荒地凡有種植悉皆收成至於棗栗柿梨以及棉花之屬結實繁盛咸資食用之需現在三農樂業比户盈寧有以仰副我皇上念切民依之至意所有東省收成分數理合據實奏報伏祈睿鑒謹奏覽奏秋成分數齊魯編氓汔可小康朕實為之額手稱慶也同日又奏為恭讀硃批敬陳下悃仰祈恩鑒事竊據布政使鄭禪寶敬録硃批諭旨內開奏為東省秋成大有連慶豐登仰慰宸衷事雍正十二年八月初三日奏十六日奉到硃批今歲麥禾齊登非係朕之敬勤所致亦與汝輩無涉乃督臣王士俊之忠誠感蒙上天鑒照而然耳何以言之如云朕德所致則應直省皆同如云汝等之功則王士俊未督東省以前不應水旱頻年相繼也試觀田文鏡撫豫時心力充足諸務妥協而年歲之豐遂為天下所莫逮後命兼督山左老病之餘精神衰耗汝輩屬員不無朦混一切吏治逈不及前而兩省之災眚遂亦屢見洊臻此非彰明較著之徴驗也歟朕臨御寰區十二年來灼見汝輩撫藩大吏政之美惡休咎攸分實捷如影響思之而不悚然懼惕然勵可乎汝等每以地方雨暘歸美朕躬夫用人之賢否關朝廷之得失其間功之與過朕固不能辭然為官擇人朕為政蒞事臨民則汝為政設汝等不肯竭忠盡職朕有何術以仰邀上天之眷佑耶觀汝此奏大有矜肆之意朕甚憂之蓋恐上天許王士俊之是則必責汝輩之非汝輩之是非朕尚歷歷見聞况天地神明之無微不照乎一切處其愼為之舉一念當仰首上視行一事即捫心俯思審義利於俄頃之間辨公私於毫釐之際忘身體國克己勤民直省大吏若咸能如是朕可保薄海以內溥沐浩蕩洪慈一如東省今歲之優渥也將此諭與兩省督撫司道共觀之欽此欽遵齎送到臣臣跪讀之下仰見我皇上指示周詳告誡明切髙厚生成有加無已伏思臣荷蒙恩擢授以封疆重任皇上之所簡注即上天之所照臨忠勤則克荷天慈怠廢則有干天譴每念地方之豐歉實由吏治之是非是以一穀未盡登場不敢信秋成之全獲一處未曾申報不敢量此邑之有收即今各屬豐登咸稱康阜亦必念從前何以歉薄今歲何以盈寧愧臣平日之感召無由即思督臣王士俊之忠誠上格斷不敢妄矜天佑稍萌一毫肆滿之心伏繹硃批恐上天許王士俊之是則必責汝輩之非臣雖至昧至愚跪讀至此倍懷凛惕惟有䖍奉訓旨時時以天地神明昭昭朗鑒為念務期竭抒忱悃盡職奉公以仰答聖慈諄訓於萬一耳所有微臣跪讀硃批感激悚惶情由理合繕摺具奏伏祈皇上聖鑒謹奏朕此篇批諭實有所見云然須身心體驗潛喻默㑹方見不誣非泛泛尋摘於字句之間所可得而解者也敬之愼之勉旃勉旃雍正十三年二月初九日山東巡撫臣嶽濬謹奏為遵旨揀送農民赴粵仰祈聖鑒事雍正十三年正月初八日准户部咨開內閣鈔出廣東督臣鄂彌逹等摺奏粵省開墾請敕下山東河南二省選善種旱田者二十人給與口糧路費來粵教耕布種其給過銀兩統俟到粵補還等因奉旨交與王士俊嶽濬照鄂彌逹等所請辦理欽此欽遵移咨到臣臣遵即飭司轉行各屬揀選農民送驗去後隨據布政司詳據濟南府歷城縣德州等處挑選各農民申送前來臣親加逐細查驗選得素習農業善種旱田之王存得等十名堪以赴粵但查東省至粵水陸各程共計四千六百餘里農民等離鄉逺涉路費口糧固宜按程量給即行裝家口亦應體恤周資臣隨逐一酌量所需路費口糧以及辦裝安家等項共計銀一百七十四兩零即於司庫公用銀內動支分給仍照粵省督臣等原奏咨明銀數解還補項已將各農民專差伴送於二月初六日起程赴粵所有遵旨辦理揀送農民情由理合繕摺具奏伏祈皇上聖鑒謹奏孟子云上農夫食九人則是衆口所賴者惟此一夫今離鄉逺出所給銀兩辦裝可矣養家之資或恐不敷耳雍正十三年四月二十五日山東巡撫臣嶽濬謹奏為恭報省城得雨日期仰祈聖鑒事竊東省二麥當兹初夏正在吐華結穗而春間所種雜糧均需雨澤今於四月二十三日省城得有大雨自戌時起至二十四日丑時止入土七八寸透地霑足隨據濟南府歷城縣申報前來臣復親詣四郊查看二麥俱已秀穗得此雨澤沾濡漸可結實而布種之豆榖髙梁瓜菜棉花等項亦加滋長土膏渥潤遍野菁葱農業有資民情欣愜除現在檄查各屬得雨日期分寸俟報到叧摺具奏外所有省城得雨情形合先繕摺奏報伏祈皇上聖鑒謹奏聞東省暮春以來雨澤歉少正爾厪念今覽此奏朕懷曷勝欣慰雍正十三年七月二十七日山東巡撫臣嶽濬謹奏為恭報東省各屬秋成分數仰祈聖鑒事竊查東省秋禾今嵗五月以內雨澤疊霑至六七等月各屬報雨雖皆有霑被而日期早晚不齊凡得雨均調之處秋成豐熟有十分九分八分不等間有雨潦漲溢以及得雨稍晚之處每縣髙窪牽算收成亦有七分六分不等兹據布政司將各屬秋成分數彚報前來臣查八府四州所轄各州縣收成十分者共三十一處九分者共五十四處八分者共一十七處七分者共十處六分者一處至於棗栗柿梨以及棉花等項悉皆結實繁盛足資食用之需百榖順成三農樂業有以仰副我皇上念切民依之至意所有東省收成分數理合據實奏報上慰聖懷伏祈睿鑒謹奏秋成分數以手加額欣悅覽之夫節和則年豐民安斯物阜大抵天時人事默感潛通未有無因而至者際斯豐亨善應愈當警惕身心省察吏治不可纎毫涉於矜肆也雍正十三年八月初五日山東巡撫臣嶽濬謹奏為恭報東省得雨日期仰祈聖鑒事竊東省各屬秋成分數經臣查明具摺奏報值此節交八月民間收穫之地布種二麥正需雨澤隨據兖沂曹三府所屬之嶧縣郯城定陶鄆城等縣報於七月十六十九等日得雨入土三寸至七寸不等又據登州一府所屬州縣及萊州府屬之膠州平度等處報於七月二十日得雨入土三寸至五寸不等今省城於七月二十六七八等日連得大雨透地霑足復據各屬先後報到如濟南府所屬十六州縣兖州府所屬十六州縣衛所東昌府所屬十六州縣衛青州府所屬十二縣衛武定府所屬十州縣沂州府所屬七州縣泰安府所屬七州縣曹州府所屬十一州縣均報於二十五六七八等日得雨入土五六寸不等又據萊州府所屬之平度州濰縣二處報於七月二十六日得雨入土四五寸不等查通省各屬州縣惟登萊二府距省道逺有尚未報到之處其餘悉經得雨乘此土脈滋潤民間得以及早耕犂布種二麥於農田甚有裨益所有東省各屬得雨日期理合恭摺奏報伏祈皇上聖鑒謹奏山左地方今歲雨澤甚屬均調此奏欣悅覽焉硃批諭旨卷二百一下
