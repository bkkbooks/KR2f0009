body:
  text: 欽定四庫全書硃批諭㫖巻五十四硃批常徳夀奏摺雍正三年四月初三日江西布政使臣常徳夀謹奏為奏眀事竊臣䝉皇上隆恩特授江西布政使自抵任以來查得江西藩庫虧空通共銀二十八萬二千四百兩零内本省各縣行追年久無著銀五萬三千八百兩零并米穀折價銀六千二百兩零外省州縣虧空無著咨囬原籍行追銀五萬五千五百兩零并米穀折價銀一萬一千八百兩零以上通共銀一十二萬七千三百兩零經廵撫裴􅏍度摺奏以通省各員公捐節禮補項約一年之内可以補完至於現在追審各案虧空銀共一十五萬五千一百兩零米穀六萬五千石零臣現今嚴飭承追各官竭力搜查追補如果無可追另行詳眀廵撫議補具奏又查江西通省應存倉穀一百一十五萬五千五百石零應存倉米三千石零内據各道府申報各屬折價穀三十二萬三千石零今已買過穀二十八萬四千二百石零臣猶恐各屬倉糧虚報數目地丁錢糧那新掩舊現在委員盤查務必徹底澄清據實出結俟申報到日其虧缺無多者臣速催立即變補完足如有虧缺繁多一時不能完足者即行詳揭廵撫題㕘究追以清庫項為此繕摺奏聞謹奏知道了所開錢糧穀石各欵項甚悉勉為之同日又奏為奏眀事竊臣查得江西藩庫従前一切陋規歴任已經革盡止存火耗一項每年額解司庫地丁銀一百五十萬兩零向例平費每兩一分七釐五毫一年全完共有平費銀二萬六千四百兩零内舊例應繳總督平規銀四千四百兩廵撫銀八千八百兩下剰銀一萬三千兩零又每年奏銷各屬收繳存留平費銀一千四百餘兩内除臣衙門一切公用約共需銀四千五百兩又臣幕賓束修一千五百兩毎年共該用銀六千兩其他或有額外之費尚未可定至扵臣日用薪水等費無多總不過三二千兩俟嵗底另行摺奏竊思臣受此殊恩圖報難盡斷不敢有一念私心為身家計謹據實奏聞謹奏日前朕曾面諭總期於好而巳亦不必矯廉立異也雍正三年八月十八日江西布政使臣常徳夀謹奏為奏眀事竊臣恐江西各屬倉穀虚報數目地丁錢糧那新掩舊是以委員細查務使徹底澄清當經摺奏今除貴溪興安鉛山等縣虧空地丁銀兩屢催並不補足俱經揭報廵撫題㕘現在審究搜追外再查上饒宜黄弋陽峽江永豐餘干東鄉等縣虧缺地丁或一千以至二千兩不等臣勒限將各員徵收耗羡并令原籍變産俱已補足無缺又金谿東鄉貴溪豐城興安等縣共盤缺倉穀一萬餘石亦經催令照數買足其泰和臨川南城新城星子等縣存價未買穀二萬七百餘石并湖口彭澤新昌清江等縣存價未買穀三萬餘石俱據各府詳稱目下早穀雖已登場晚稻尚未成熟價未平減俟秋收價平自當如數買足倘至期查有不行補足者即將通同狥隱之知府一併詳揭廵撫題㕘為此謹奏惟貴實心任事一切據實奏聞若稍欺隱負恩為禍不淺雍正四年三月初八日雲南布政使臣常徳夀謹奏竊臣䝉皇上洪恩特調雲南布政使遵旨乗驛於上年十二月十五日到任除交代庫項錢糧照欵確查清楚具結詳送廵撫咨題外所有臣衙門經收各項贏餘銀兩随經按欵細查每年有經收民屯條丁商稅奏表等項約共剰平頭銀九千餘兩再查有箇舊錫厰除經收正課錫票及羡餘歸公等項外毎年嵗底核算約贏餘銀二千餘兩臣正欲俟交盤清楚後逐一奏眀適接新任浙江撫臣李衛寄臣手札内云滇中藩庫贏餘平頭銀兩曾經奏眀當䝉皇恩著李衛寄信與臣將此項留作養廉等語臣感深刻骨受此天高地厚之徳即捐糜頂踵恐不足仰報隆恩於萬一所有臣感激私衷理合繕摺恭謝聖恩至於滇屬各府州縣官員賢否因到任未久尚未周知其倉庫錢糧現行委員細加盤查尚未報到俟查眀後各員内有虧數無幾平日居官稱職者即令剋期彌補若有虧空數多居官平常者随即據實揭報督撫題㕘斷不敢因循姑容有負聖主簡用之恩為此謹奏分別虧數多寡以示勸懲甚好但須實力行之耳同日又奏竊臣到任以來見各屬教職懸缺甚多即或委員署理而隣近州縣乏人相隔遼逺者又難扵兼顧伏查銓選教職之例原由本省將恩拔嵗副貢生挨順科目年次造冊送部遇有缺出吏部即照冊掣選但雲南去京七千餘里每遇缺出咨部銓補徃返必須六七月以及八九月之久始得文憑到省又復轉行所屬取具文結方赴撫臣衙門考驗倘有文藝荒疎老邁不堪者勢必繳憑另選所以經年累月以致員缺久懸臣仰懇皇上敕諭吏部將滇省咨部冊内應選教職人員挨次截取二十員發滇令撫臣預先考定文理精通分析等第註冊送部存案一有缺出照各省揀選之例即將考定之員挨次委署一面咨請實授俟前項人員將次補完另請截發如此源源相因則教缺不致久懸學校隆而人文盛矣是否可行伏乞睿鑒施行謹奏此奏甚是巳有旨諭部矣同日又奏竊滇省鼓鑄一事最為𦂳要查錢局毎爐毎卯用鑄銅六百觔倭鉛四百觔共計價銀七十三兩二錢鑄錢一百零四串内除人工物料等項錢一十八串二百文外每卯實得錢八十五串八百文若照従前原定每串作銀一兩尚餘息錢一十二串六百文今因鼓鑄二年有餘錢文累積壅滯且又行使不逺所以錢價日賤目下毎銀一兩換錢一千三百五十文較之原定報部價値毎兩虧短銀二錢六分毎卯計虧短銀九兩六錢四分有零此就省局每爐每卯核算若按照臨安大理霑益等局通計毎月共虧短銀一千三百九十五兩有零臣細訪時價日低之故總為錢文不能流通別省以致累積壅滯若不設法流通將来虧帑更甚臣扵接見屬員時細加訪問據彌勒州知州伍綱昌稟稱職係廣西人廣西錢價甚貴毎銀一兩換大錢四百文換小錢一千六百文每大錢一文作小錢四文使用雲南至廣西交界剝隘地方馬運計程二十站自剝隘上船可直運至廣西省計錢一串約需水陸運費銀二錢三四分等語臣計算滇省目下時價每錢一串合銀七錢四分連脚費運至廣西省城每串核銀九錢七八分不等如雲錢運至廣西行通自廣西水路運赴廣東甚易其行使既逺不獨國課無虧商民樂利而錢文自可長逺鼓鑄矣但雲錢從未運廣若不奉旨敕行恐到彼不能行使亦未可定為此繕摺恭請睿鑒如果可行伏乞皇上敕下廣西廵撫㑹同雲南督撫妥議合詞具題請㫖施行謹奏滇錢運粤是亦通融之道當禀商督臣鄂爾泰酌議雍正四年七月二十六日雲南布政使臣常徳夀謹奏竊照雲南各府州縣一應經徵地丁稅課等項臣委員細查飭令據實詳報先經具摺奏眀兹據各委員陸續查報前來細覈各屬經收條丁等項銀兩俱無短少惟有存倉米穀内多虧缺雖雲省存倉米穀歴係糧道經管但倉儲闗係重大臣何敢不實力稽查今查得調任順寧府知府韓鍾扵雲南府任内虧空倉糧除有項抵補外尚虧少米一萬四千餘石現在催令照數補足又富民昆陽彌勒等州縣缺少米二三百石為數無幾現在嚴催均著剋日買補還倉又查曲靖武定二府和曲鎮南二州共缺米穀二萬九千四百石據各府州指稱有民欠未完者有存銀未買者有因俟秋收後若不全完據實詳揭題叅究追至扵雍正三年地丁奏銷各册臣已依限造送祇因各屬有虧少米穀未清經督臣楊名時㑹題㕘展造冊遲延亦期速令彌補之意再禄勸州知州賈秉臣奉調引見業己詳委署員後因缺少倉穀一萬一百餘石據稱係前任移交民欠抵欵查賈秉臣居官稱職甚得民心若遽行詳㕘恐失鼓勵之意續據該屬百姓具呈懇留該牧辦理清田均賦是以督臣楊名時復㑹赴部引見總不敢因循姑縦有負皇上簡用殊恩再滇省種植五穀蕎麥居半今嵗雨暘時若據各屬稟報蕎麥已熟現在收穫俱有九分十分不等禾苖亦甚暢茂將來亦有九分十分收成米價自必更賤而各屬缺少倉糧亦易扵買補矣理合一併奏聞謹奏雨暘時若深慰朕懐同日又奏竊臣查得俸工一項䝉皇上體恤官役特旨永行停捐欽遵在案惟滇省昔因大兵進藏軍需動用浩繁先經督臣楊名時題眀將通省俸工銀兩捐補還欵今除康熙五十六年起至五十八年止捐補過軍需銀一十萬一千二百餘兩已經扣抵歸結外尚有五十九年起至六十一年十月底止應捐軍需銀四十萬二千三百八十餘兩原題以雍正三年為始按年捐補歸欵臣抵任以來循照題定之案其雜職微員詳眀督撫給以半俸養廉齋膳禁卒等役給以一半工食其餘州縣以上各官俸工盡行捐抵還項通計扣至雍正十一年方得補完所有滇省扣捐俸工抵補軍需之處實與別省不同為此繕摺奏聞謹奏滇省有鄂爾泰如此督臣事事當禀商籌議而行所奏知道了同日又奏竊查滇黔二省田少山多額徵錢糧不敷支應故嵗需兵餉俱賴外省協濟夫同是王土王民何至盈縮懸殊雖曰田有肥磽亦由人事之未修也雲貴幅􅊷遼濶除石山陡崖以外非盡不毛之地若能因地制宜近水則種秔稻高阜則蓺菽粟莫非膏腴沃壤縁流官管轄者十之三四土司管轄者十之六七土司不識調劑夷人不知稼穡俗語雷鳴田遇雨則耕無雨則棄坐守其困嵗嵗相仍而流官又因循舊習惟知嵗收額編條糧了事此外槩置不問所以地荒民窮而欲兵餉充足何可得也且各屬土苖素性兇悍動輙殺掠而土官營長暴斂横徵豪占勢奪錢糧侵蝕過半田地强霸殆盡甚至擄人妻女殺人放火亦視為常事今若概行㕘革改流未免羣相驚畏臣愚以為各土司内除現在小心供職夷民恱服者仍令照舊管理土地人民如果罪惡昭著者即行詳請㕘究以土改流尚有㝠頑不靈全憑漢姦撥置之輩飭令該管上司官不時嚴飭訓誨改過若不能輙改者應請止照原領頒發號紙職銜准其承襲永不許干預地方事務查其舊有祖業酌撥房産若干務足養贍其家口一切所管村寨田土户口以及従前占奪私莊俱令備造清冊轉詳督撫確覈地方之逺近大小或題請添設州縣或歸併附近州縣盡革土司之苛𣲖禁嚴胥役之需索自必羣情踴躍欣為聖世良民其占奪私莊或賃民耕種額納官租或招民承買交價入官同各村寨田土户口造冊題報其荒蕪田地勸其開墾照例陞科他如舍傍田畔以及荒山不可耕之處度量土宜教種樹木將見野無曠土户有葢蔵賦課日增兵餉漸足於國計民生似有裨益是否可行伏乞皇上睿鑒施行謹奏苗猓情形事務經鄂爾泰陳奏甚悉伊所料理斷無過不及之虞同日又奏竊滇省逺在天末産物無多一切服用之具無不取資外省全賴商賈流通務使近悦逺来方獲有濟然商賈未能雲集貨物仍復昂貴者皆因滇黔一帶山路﨑嶇舟楫不通來徃搬運艱苦倍常且自貴州鎮逺府至滇計程僅二十七站而設立税課七所夫設一所即多一所之費沿途查點需索躭延以致商販裹足查商販所運貨物一到鎮逺非運貴州即運雲南並無別路可通以臣愚見若在黔省者則立鎮逺貴陽二稅將安順普安永寧三處歸併貴陽其三處稅課按數令商販一總投納給發稅單執照齎驗在滇省者則將平彝縣之税歸併雲南其税課按照平彝縣原數投納仍取驗貴陽所給税單照數抽收以杜漏稅之弊雲南貴陽二處稅務俱在省城同城大員易扵稽查雖有不肖胥役何能作弊如此則國課仍無虧缺而商販得免需索躭延之累兩省商民均沾實恵矣因係兩省之事臣未便具詳督撫為此繕摺奏聞恭請皇上睿鑒施行謹奏何云未便應具詳督撫斟酌辦理者雍正四年十二月十一日雲南布政使臣常徳夀謹奏竊臣前恭進奏摺於雍正四年十一月十九日欽奉硃批回滇遵即叩迎啟讀荷䝉天語諄詳訓誨備至跪聆之下感深刻骨現今督臣鄂爾泰徃貴州審理長寨狆苗一案尚未回滇俟回署後凡有一切地方事宜臣欽遵聖諭事事與督臣斟酌辦理以仰副皇上懐柔邊方撫綏漢夷至意再滇省各屬缺少存倉米穀臣前繕摺奏眀之後日事嚴催兹據各府州縣詳稱俱經完補等語臣猶恐各屬有買少報多之處現在委員盤量如有虧缺即行詳請㕘追至調任順寧府知府韓鍾虧缺前雲南府任内倉糧除催交銀兩照依市價買補外其餘並未全完經臣清查虧數據實揭報督撫題㕘為此奏聞所有奉到硃批一併恭繳謹奏知道了盡心為之爾為鄂爾泰屬員得以親炙其人乃爾之大幸當竭力效法之其才曷可企及其心可以勉能者鄂爾泰乃滿漢内外大臣中第一人也同日又奏為恭謝聖恩事雍正四年十一月二十一日奉雲貴總督仍管雲南廵撫事臣楊名時牌開准吏部咨為題眀事雍正四年八月十八日奉旨依議圖理琛張楷俱著於現任内罰俸三箇月布蘭泰法海福敏常徳夀石文焯鄂爾泰查弼納裴􅏍度陳世倌俱從寛免其罰俸欽此抄出到部咨院轉行到臣随恭設香案望闕叩頭謝恩伏念臣至愚極陋荷䝉皇上殊恩歴任藩司未報涓埃兹於江西布政使任内有未完虧空五案督催不力部議罰俸廼䝉皇上格外𢎞慈特賜寛免欣寵命之遥頒戴天恩之罔極惟有小心勤慎益加砥礪仰報皇恩於萬一耳為此繕摺恭謝聖恩謹奏從來受恩易報恩難勉之雍正五年閏三月二十六日雲南布政使臣常徳夀謹奏竊烏䝉鎮雄兩土府久為邊疆大害荷䝉皇上將烏䝉土府禄萬鍾革職交與川陜雲貴兩督臣委員㑹審督臣鄂爾泰聞命之後晝夜籌畫不遺餘力仰荷天威首惡就擒羣兇授首従此改土歸流永杜後患但此時若不計出萬全將来仍難善後兹因奉委大員曲尋鎮總兵官劉起元永昌道賈擴基己抵永寜據稱川省委副将張瑛與松茂道李世倬亦同到境據張瑛自稱在京條等語臣竊思分疆畫界此兩督臣之事何敢妄㕘末議但欲剖烏䝉之半以歸滇省臣職任滇藩利害所闗甚大又何敢不言臣看川員行事自始至今多不可解前部文到後督臣鄂爾泰随委總兵劉起元糧道張允随即赴東川期與川員約至威寜㑹審相候六十餘日川省委員並無音信亦未将奉㫖革職部文行提土府後督臣鄂爾泰檄提候審而惡目楊阿台往川求救川陜督臣岳鍾琪反給以備兵五千印牌並不移知滇省使得藉為護符整兵三千先攻魯甸幸而督臣鄂爾泰防備周宻得以無事及滇黔進兵土府脫逃禄萬鍾母子己投川境川員絶不通知鎮雄土府勾通烏䝉擁兵聚衆拒敵官兵及勢窮同奔隴慶侯母子亦投到川營復不移㑹迨至守備馬似龍逰撃張寉面㑹質問然後承認亦不拘帶候審徑送到成都更可異者㕘將王剛銜稱欽差黒白大人但係要犯俱送赴成都不許根問逰撃龍有印等久經領兵駐劄筠連縣任憑官軍冒險前進夷賊拒敵既不前来接應并不隻字相聞及阿木固等沿途設伏拒敵官兵及敗走逃赴川省乃給以外委守備并補褂縀疋銀牌等項反令查勘烏䝉人馬貲財器物至兩土府積惡屢世今又聴漢姦劉建隆等隂謀指使違㫖抗拘擁兵拒敵罪不容誅乃據劉起元等面晤張瑛等具道川陜督臣之意只審六案其餘年深日久互相刦擄不必㑹審但令各有司報結即兩土府已革職繳印不審亦可我們不過問問詳憲具題而巳劉起元云既是㑹審凡屬三省刦殺大案俱一府原有上方下方之別上方是其衙署下方是其巢穴不獨器用財賄屯聚下方凡屬姦猾刦殺之徒皆聚扵此今欲以鹽津渡為界是本為剿除之謀仍留為養姦之地事不畫一終難料理且不獨一郡不可中分即烏鎭兩府亦難以各屬現在事闗重大不敢不留意謹将始末據實奏聞謹奏凡百照此據實奏聞甚是此雖朕己知己辦之事閒覽何妨或係未知未辦之事遇有可採取處於事寧不大有禆益耶嗣後但有所見所聞悉當如是奏知同日又奏竊查鎮沅土府自改土歸流以來夷民恱服並無異議惟刀瀚所屬土舍頭目人等向來兇悍罔知法紀忽於雍正五年正月十七日聚衆數百人放火焚燒衙署將署府事威逺同知劉洪度殺害刦課放囚并在抱母井地方抄擄不法各情由督臣鄂爾泰聞報之日即飛調官兵并移咨提臣郝玉麟等發兵𠞰捕随撥運附近倉米以濟軍食臣随詳委師宗州知州章元佐前徃署理鎮沅府威逺同知事務清查鹽課招撫夷民竈户安業去後續據文武各官報稱各鎮協營官兵直抵鎮沅府四路布置堵禦嚴宻仰仗聖主天威各夷猓聞風盡皆逃匿深林宻箐官兵遍加搜捕業將為首之刀如珍刀西明等及猓賊姦細并随聲附和諸兇陸續拏獲共一百餘人搜獲銀四千二百餘兩其放去鎮沅監禁威逺之猓黑五名亦全行擒獲又遣撥官兵土練前徃威逺𠞰捕猓黑務盡根株以靖邊方所有驚竄夷民及逃避竈户盡行招集現今上𦂳趲辦鹽觔并稱鹽課確數因文巻冊籍燒燬尚未查實俟徹底查眀另報各等情前來并將拏獲倡亂助惡之刀如珍等一百四十名俱巳解省現今臣同按察使江芭細心嚴訊確情分別首従招解督臣覆審題報正法安插所有夷猓肆横焚燒殺擄並官兵拏獲各犯搜追銀兩數目及招集夷竈情形理合繕摺奏聞謹奏此事業經督撫提鎮備悉奏過矣類斯該督撫必應題達案件無庸摺奏可省一番煩瀆硃批諭㫖巻五十四
