body:
  text: 欽定四庫全書硃批諭旨卷一百五十四硃批葛森奏摺雍正五年六月初七日江安糧道臣葛森謹奏竊臣至愚極陋荷蒙皇上天恩逾格超擢簡任糧道感沐洪仁夙夜冰兢惟有矢忠矢愼勉竭駑駘仰報聖恩於萬一臣自本年四月初八日到任迄今方及兩月其一切事宜尚未深知容臣查確再為另奏兹交代錢糧册內查得前任糧道馬世烆有接受前道王希舜動給未還并本任內透支墊給預借各項共銀五萬七千九百六十餘兩米二百一十三石零雖有借支領結尚可追抵之項並非盡屬無著但現今交盤倉庫巳非實在交收至現在交收存庫銀四十四萬八千四百餘兩馬世烆未經解部將來起解每千應有飯銀十兩添平銀三十二三兩約共需銀一萬九千餘兩臣向馬世烆催交據稱前任並無交下之語馬世烆當日亦未詳明著落從前經收之員以致懸項但飯銀添平係解部必需之項臣何能代為賠墊只得一并揭報總督巡撫現候批示再查糧道倉內有捐監還漕米二萬八千五百八石零經督撫題明奉旨準發蘇州松江太倉三府州屬減價平糶臣現在按數給發所有馬世烆任內那移未淸款項臣謹另單臚列恭呈御覽伏乞皇上睿鑒謹奏理應代催完項者毋得苛刻若與例不符徇情欺隱之款豈可代人認過馬世烆猶可王希舜貪叨巳甚萬難寬宥然馬世烆聰明人也交代之際王希舜若不以利動之亦焉肯甘為徇隱百凡總以秉公處之雍正五年八月十六日江安糧道臣葛森謹奏為恭繳硃批叩謝天恩事竊臣至微至賤荷蒙皇上格外洪仁超用糧道感戴聖恩夙夜惶悚兹於八月十四日跪接硃批諭旨當即望闕叩頭謝恩捧讀之下仰見聖諭明切周詳無微不照臣何人斯得蒙皇上硃批教訓感激難名銜結無既惟有凜遵諭旨不敢苛刻亦不敢徇隱矢公矢愼實心奉行以仰答高厚於萬一耳為此繕摺叩謝天恩所有奉到硃批諭旨理合一併恭繳伏祈皇上睿鑒謹奏朕觀旗籍人員大都不可以臨財每利令智昏身家性命皆有所罔顧不知無恥習氣何至於此汝於操守二字極宜加勉保全滿洲顔面為要如博濟等非前車之戒乎從來貪夫徇利未有不害及其身者當彼營求之際孳孳不倦亦豈知正所以賈禍也言之殊堪憫惻可惜父母生育之身可惜君上成全之德可惜半世功名千百年人物區區銅臭寧足相抵且又弗克受享則亦何所為而樂此不為疲耶能於此一節把持得定其餘保汝皆堪從容造就勉之勉之雍正五年九月二十八日江安糧道臣葛森謹奏為恭繳硃批叩謝天恩事竊臣於本年九月二十五日跪接硃批諭旨當即望闕叩頭謝恩敬讀之下感蒙聖訓周詳懇切操守二字垂誡再三臣自思何等之人得蒙皇上恩旨頻頒硃批屢降讀至可惜父母生育之身可惜君上成全之德可惜半世功名千百年人物之諭旨即天地亦未有如此生成父母亦未有如此顧復聖意宏深期在遠大臣感激難名銜結無既滿洲顏面皇上教訓惟有潔已勵操竭力遵行以仰答聖恩於萬一耳謹將奉到硃批諭旨繕摺恭繳伏祈睿鑒謹奏言之易行之難凡事固由勉強而後臻於自然然勉於一時易勉於久遠難必須時時省察事事體驗見理明透立志剛堅方不被物欲所囿以致虧節失度提起一腔血性鼓動丈夫氣槩漸次自有得力處也雍正五年十一月二十二日江安糧道臣葛森謹奏為恭繳硃批叩謝天恩事臣於本年十一月十一日跪接硃批諭旨當即望闕叩頭謝恩敬誦聖訓廣大精詳無所不該伏思行不逮言即為浮辭終不如始即為改操伏讀恩訓勉臣以言之易行之難勉於一時易勉於久遠難聖意宏深造就之心期在遠大及讀至時時省察事事體驗見理明透立志剛堅方不被物欲所囿以致虧節失度聖言涵蓋并包萬有矣更讀至提起一腔血性鼓動丈夫氣槩漸次自有得力處教誨之中寓有誘掖周詳懇至反覆叮嚀天地生成父母教育未有如此臣何人斯得蒙恩訓屢降感激無地夙夜凜遵臣本屬至愚何能到自然地位惟期言行相顧不使操守二字徒託空言始終不渝勉力奉行以仰報聖主教訓隆恩於萬一臣謹繕摺奏謝所有奉到硃批理合恭繳謹奏仰遵前諭加勉可也至於言行相符與否斷難逃朕耳目雍正六年正月二十四日江安糧道臣葛森謹奏為叩謝天恩恭繳硃批事雍正六年正月二十日臣跪接硃批諭旨並欽賜福字當即恭設香案望闕叩頭謝恩祗領訖伏念臣至微極賤毫無報效荷蒙皇上不次擢用巳屬逾分又蒙告誡屢頒宸翰寵錫臣何等之人叨受格外洪恩深重至此欣忭惶悚一時交集惟有凜遵訓旨竭盡駑駘朝夕警惕勉副皇上日月明鑒仰答高厚於萬一耳為此繕摺叩謝天恩所有奉到硃批合併恭繳謹奏寵錫之加固在朕躬能否永遠承受則在於爾也諸凡愼之雍正六年十一月二十八日山西按察使臣葛森謹奏為恭謝天恩叩請陛見敬聆聖訓事竊臣蒙皇上恩簡江安糧道自雍正五年四月內到任以來歷今一載有餘涓埃未報捫心自問悚惶無措兹又荷聖主隆恩將臣升授山西按察使聞命自天慚懼無地伏念臬司一官為通省刑名總滙務俾盜息民安刑淸政肅始能無負皇上任使至意若不仰懇聖恩賜以訓旨臣雖殫竭駑駘總不能免於貽誤伏乞皇上垂念臣知識短淺外任未久俯容將經手錢糧交代淸楚之後星馳赴闕叩請聖訓庶仰體祗遵不特臣得免隕越而晉省官民亦共沐皇恩於無既矣理合繕摺奏請仰祈聖鑒為此謹奏允爾所請到京聆朕訓旨然後再赴新任雍正七年五月初十日山西按察使臣葛森謹奏為欽奉上諭事本年五月初九日臣奉總督范時繹牌行準部文內開奉旨西安軍需錢糧著倉場侍郎劉于義山西按察使葛森前往淸查核算欽此欽遵當即恭設香案望闕叩頭謝恩訖伏念臣一介卑微毫無知識荷蒙皇上天恩屢次超擢有加無巳每逢命下輒自慚汗無措今復降恩旨令臣協同倉場侍郎劉于義前往淸核西安軍需錢糧拜命之日惶悚益深惟有敬凜遵奉竭盡駑駘以仰副皇上任使至意但臣自應即刻赴闕恭請聖訓因有經手糧道任內倉庫錢糧除庫項業巳交與署道張暻樞查收外所有存倉稻榖五萬九千一百餘石尚未盤量但此項榖石貯倉將及兩載不無氣頭厫底未免略有折耗若俟署道逐一盤量必致濡滯時日倉榖關係重大臣何敢忽略現在呈請督撫委員公同監掣如有折耗照數按補臣又將糧道任內所得收放羡餘銀兩留存道庫以僃買補折耗一俟督撫批準臣即兼程赴闕請訓為此繕摺奏聞謹奏今差汝赴陜查核軍需錢糧斯乃大案也總以秉公得當為要倘或徇庇寬縱以及瞻顧因循抑或深刻搜求至於拖纍無辜均屬不可汝身之見重見棄於朕即在此舉莫負一番特恩委任莫誤半生事業功名愼為之毋忽雍正七年十二月十五日辦理噶斯軍需甘肅布政使臣葛森吏部郎中臣鼐滿岱刑部郎中臣福寧謹奏為請旨事竊臣等奉旨辦理噶斯軍需事務俱關動用錢糧干係甚重須以印信為憑伏懇皇上可否準給關防一顆將來文移往來始有憑據俟事竣之後恭繳禮部再臣等查得自肅州至京程途稍遠軍需緊要若雇兼程腳騾往返甚需時日難免遲滯臣等仰祈聖恩嗣後奏摺可否準於驛馬飛齎則事無遲誤而於軍需亦屬有益矣為此繕摺請旨伏乞皇上睿鑒施行謹奏巳有旨矣張廷棟亦曾奏過汝等前此請將騾頭更換西路大兵馬匹移為噶斯軍需之用何荒唐至於此極有如是輕重倒置之理乎另有旨諭部雍正八年三月十七日辦理噶斯軍需甘肅布政使臣葛森西安布政使臣張廷棟吏部郎中臣鼐滿岱刑部郎中臣福寧謹奏為奏聞事竊噶斯軍需臣等一切遵照部文敬謹辦理去歲因天寒草枯之際新買之馬恐急切不能臕壯冒昧奏請欲買騾頭易換大兵馱載馬匹又欲暫撥營馬蒙皇上訓誨諄切指示詳明臣等無任惶恐驚懼又蒙皇上將出京之兵寬期月餘其應需馬匹臣等隨即在於寧夏洮岷西寧并口外蒙古扎薩克各地方分頭採買自正月二十五日起至三月十五日止照依時價自五六兩至十一二兩不等陸續買獲正餘馬共一千一百三十匹俱巳收槽餧養臣等現奏蒙高厚於萬一謹此繕摺奏聞謹奏將緊要處應用馬匹而欲撥換於間處僃用汝等昧於輕重之識見可知將他人辦就之事而欲移為己益汝等徇於偏私之念慮可見一生為人居心被朕輕鄙而毫不愧悔但以未加處分為幸汝等寡亷鮮恥之胸懷更可笑矣汝等雖猶靦顔強為摺奏朕批諭之際殊覺筆毫澀滯也雍正九年六月初四日雲南布政使臣葛森謹奏為恭謝天恩事雍正九年五月二十九日奉雲南巡撫牌準刑部咨為羣盜劫掠事案內因臣署江蘇布政使有盜犯沈聖文改名沈章曾為司差不能查出部議降二級調用奉旨葛森著降二級從寬留任欽此臣隨即恭設香案望闕叩頭謝恩訖伏念臣至愚極陋荷蒙皇上天恩歷擢至司道於地方姦匪理宜嚴加稽察前因署江藩任內不能稽查周密致為衙役欺蒙疏忽之罪實難辭責乃蒙皇上高厚洪慈矜憐愚昧從寬留任跪讀事期夙夜補過仰圖報效洪恩於萬一耳所有感激微忱理合具摺奏謝伏乞睿鑒謹奏覽同日又奏為奏聞事竊查滇省地方今歲自春徂夏雨暘時若據各府屬所報豆麥收成實有十二分十分八九分不等通省高低田地遍行栽插並蚤蕎雜糧無不茂盛近來闔省米糧價值較之往年平減漢夷歡騰軍民忭舞此皆我皇上敬天勤民感召所致也理合具摺奏聞仰慰聖懷謹奏覽路途遙遠既無緊要應奏事件何必徒勞往返為塞責之舉若借此欲以挾制上司恐嚇屬員則尤屬不可志之汝庸才也惟務實行做好官是乃良圖若勉強舞才具弄聰明非長策矣勉力效法鄂爾泰居心可也雍正九年八月十九日雲南布政使臣葛森謹奏為奏聞事竊查烏蒙新改之昭通府自兵燹之後田地荒蕪米價昻貴凡安插之殘黎招來之農賈俱給田地各與籽種并於大關壩等處隙地委員採買蕎種督率耕種以望秋收又撥米糧減價平糶接濟民食今於七月內據昭通東川二府稟稱昭通府之稻田壩八仙海等處并魯甸各寨以及東川巧家等處去歲夷人種過蕎地今年並未耕種忽從舊根發生新蕎俱甚茂盛與本年新種者無二漢夷歡騰米價大減又六月二十八日八仙海稻田壩等處禾苖忽生赤蟲蠶食稻葉忽有飛來烏鴉將赤蟲食盡稻苖並無傷損等語臣思蕎自天生蟲為鳥食實見所未見聞所未聞此皆我皇上欽若之誠感召天恩所致而臣歡忭之下愈深警惕悚惶再滇省地方今歲自春徂夏雨暘時若至六月間數次大雨山水暴發以致雲南曲靖二府之昆明宜良尋甸州馬龍州陸涼州等處所有低窪田地略被水淹間有倒塌牆房當即委員查勘以闔縣而論俱不及百分之一但被水本户偶值歉收未免觖望督臣鄂爾泰撫臣張允隨仰體聖主軫念民瘼之至意經委迤東道遲維璽前往將倒塌房屋牆垣之家逐一酌賞并將被淹田地查明數目按户賑恤現俱得所其餘各處高下田地俱極茂盛近來省城與各處米價較之往年甚是平減為此繕摺奏聞謹奏覽汝等司道不過奉行承辦非有專主之責似此督撫例應奏聞事件遙遙萬里差人齎摺前來不知汝具何心思也可謂愚昧率妄之至雍正十年六月十六日雲南布政使臣葛森謹奏為奏聞事雍正十年六月初三初四等日據普洱府分防思茅通判朱繡暨元江府知府祝宏將普思一帶苦蔥聚衆不法情形各通報到臣臣查普洱府分防思茅所屬蠻壩河蝙蝠洞訛傳緬僧為神仙思茅苦蔥羣相拜賀遂有土把總刀興國等暗行勾結謀為悖叛攻圍思茅城池復鼓脅夷民劫掠村寨燒燬塘房蔓至普洱接界元江地方驚擾新平威遠鎮沅邊界并阻截道路致攸樂為思普所隔至今信息不通經署督臣高其倬撫臣張允隨聞報當即會商飛調官兵於六月初四日即委護普洱鎮副將李宗膺遊擊王先韓雯鵬等帶領官兵由元江一路進𠞰又調臨元鎮總兵董芳為總統帶領官兵於六月初九日星赴元江援應前後共調迤東官兵三千二百名土兵四百名俱由元江一路聽總兵董芳調遣進𠞰兼顧新平當又飛咨雲南提臣蔡成貴酌派迤西兵數百名兼程先往繼又飛咨提臣再撥迤西官兵二千名俱由景東一路直入普洱攻𠞰兼顧鎮沅威遠并援思茅攸樂在案現今大兵雲集東西兩路攻𠞰料此小醜不烏東之例竭力辦理不敢稍有遲誤其運糧等項仰體皇上愛惜黎元至意俱給以腳價並採買騾馬分運軍糧以紓民力理合繕摺奏聞伏乞睿鑒謹奏覽硃批諭旨卷一百五十四
