body:
  text: 欽定四庫全書硃批諭㫖卷七之一硃批孔育珣奏摺雍正元年二月二十四日廣西巡撫臣孔育珣謹奏為奏聞事竊臣鄒魯菲材至愚極陋伏䝉先帝超擢今職任大責重惟有夙夜兢兢以期仰報髙厚於萬一欽惟我皇上乘乾御極景運維新伏讀上諭至聖至眀無逺不照臣身任封疆合將倉榖錢糧地方情形據實奏聞一布政司貯庫歷年一切錢糧並無虧空蒼梧道庫驛鹽錢糧亦無虧空其各州縣收存倉榖前撫臣髙其倬因歲歉平糶三十九萬石零未及買補補十分之四仍不時嚴催期於雍正元年秋成後買足倘疲玩之員惟事因循不肯上緊買補勢須一廣西猺獞雜處頑悍無賴往往互相仇殺臣飭令各屬多方誡諭如凶惡不改者臣即設法擒處俾知警戒不敢瑣瑣陳奏屢瀆宸聰右六條均應據實奏眀伏乞皇上教訓俾臣得免隕越永戴聖主生成之德於世世矣臣謹奏朕於向日頗聞爾居官聲名今覽所奏甚為嘉恱但當勉之又勉堅守此志莫稍遷移以副朕惠養元元之意可也雍正元年五月初九日廣西巡撫臣孔育珣謹奏為恭報雨水情形事竊臣查廣西省今嵗自春入夏以來雨水調勻下隰髙原咸獲霑足據各屬申報田禾栽插俱各得時目下早稻雜糧禾苖茂盛與臣訪查無異其收成之分數俟秋間再為報聞現今上米每石價銀八錢一二分次米七錢五六分不等小民安業共樂太平理合奏報以慰聖懷臣謹奏覽卿之奏深慰朕懷但一切必據實無隱方為可信爾等封疆諸臣日前慣作粉飾之詞以寬慰皇考朕所悉知所以今覽此摺猶屬疑信相兼向後當體諒朕心凡事據實直陳幸䝉上蒼垂佑值兹豐收之歲朕據奏即實實慰恱不然總在疑信之間也爾諸卿其共諒之同日又奏為請㫖事竊查廣西省蒼梧道一缺管理通省鹽務最關緊要茍非清亷敏逹之員難堪勝任有梧州府知府張若霈操守廉潔辦事勤愼若以補授蒼梧道則於鹽政大有裨益更有太平府屬之左州養利州現今升任員缺查二州俱界連安南地多瘴癘向例南太慶思四府屬缺出將桂平潯梧栁五府內選擇熟悉風土品級相當之員調補今五府屬之知州內無合例可調之員查梧州府屬之博白縣知縣佟世俊興業縣知縣王國祚俱係熟悉風土清廉愛民之員若以佟世俊補授養利州以王國祚補授左州實能有益地方至梧州府知府一缺有桂林府同知徐嘉賔才具優長堪以補授其桂林府同知一缺有陽朔縣知縣胡式瑗勤敏供職堪以補授其博白興業二縣員缺查有丁憂靈川縣知縣柏𢎞智因係賢能前撫臣髙其倬題留在粵候補現將服滿堪以補授興業又宜山縣縣丞蕭垣光由臨桂縣縣丞因係賢員調補宜山三年俸滿現准部咨即升之員堪以補授博白以上各員雖銜非越等而與例不符未敢具題臣為員缺緊要有益地方起見用敢冒昧請㫖恩出聖裁非臣所敢擅便也臣謹奏俱照爾所請諭部補授矣內蒼梧道缺業巳部選殷邦翰爾奏稍遲再若請補人員須在部銓之先方好趙𢎞仁係有名劣員為何姑容待㫖然後革退今因張若霈居官聲名較殷邦翰頗優所以亦允爾所請至其餘各員均未悉其優劣念爾統率一省該屬員自必有深知灼見處始行奏請兹皆一一允行將來倘有敗檢虧空等事亦皆惟爾是問此等保薦之員假若日後改易操行切毋存回護之念姑息從事今日因其賢能而保薦後日因其改易而紏參正見爾之公正無私將朕此旨轉諭伊等俾各知警懼時加愼勉庶不敢恃被薦在前而稍有放縱也向後即遇應題之缺如不得人亦不可茍且塞責如果得人雖係越例不妨密摺奏請但保薦一事甚難已之一身尚恐偶因牽染而至不能把持何况他人或懷衒玉求售之心掩其不善而著其善一被愚惑他日受纍不淺所以此一節斷不可䡖忽而髙興於一時也朕將合省百萬赤子付託爾等督撫似此薦舉數人有何可疑而不推心信任令爾等暢意舒懷以治理朕之封疆但須還朕是好二字其餘細務俱可置之不問其間設有狥情納賄假公濟私實據一入朕耳則斷不從輕放過也勉之愼之雍正元年六月二十日廣西巡撫臣孔育珣謹奏為奏眀事竊臣標內舊有親丁步糧一百分曾經奏眀留為操賞兵丁修理添補器械帳房等用近接奉上諭䝉我皇上以訓練士卒充實營伍為念臣敢不仰體聖慈益加振刷臣隨即召募親加挑選已補過親丁步糧六十分其臣標兩營器械帳房等物須不時修理添補暫留四十分支用修補每季核算所有補過親丁步糧名數臣謹奏眀其四十分應否暫留以為營伍公用或俱行補足伏乞皇上批示遵行臣謹奏類此等事朕不便代立主意既將封疆重任委付爾等一切應行應革事宜憑爾等酌量為之只要通盤還朕一是字而已似此逐欵逐件細務朕何暇籌畫及此爾在撫臣中可為優等但當於地方上實心竭力公勤不懈行去朕自有鑒察何必於斯等小事上希朕見重耶特諭同日又奏為謹陳下悃事竊臣率同司道各官捐銀五萬兩解送西安藩庫幫助軍需一本不行預先奏特恩非常榮寵感激圗報之忱銘肌刻骨臣到任以來凡州縣節禮槩未收受惟桂平潯梧四府每年共有橋稅幫費八千兩歷任撫臣俱收為養廉之費又布按二司及蒼梧道節禮每年共銀三千五百兩臣到任一載共收銀一萬一千五百兩因見西陲用兵急公念切是以未經預先奏聞今接內閣知㑹恐地方官捐銀有科斂民間之處仰見我皇上愛養黎元之至意臣幫助銀兩係臣收存之項斷不敢科斂民間其各官幫助銀兩實係俸工亦無科斂謹據實奏眀至臣每年用度不無所需所奏二項應否仍留以資微臣用度是又皇上格外之洪恩也臣謹奏朕自御極以來凡督撫諸臣此等奏摺俱置之不覽爾督撫權操一省非比微員其取豫辭受豈可以法繩而數限耶況從來有治人無治法朕但向爾等責成一好字而巳封疆大吏一切賞勞兵辨資養家口幫助親朋諸凡應酬及部費等項何可枚舉朕豈不諒之爾等取所當取用所當用不悮國計不纍民生不至於貪婪枉法一任權宜節愼為之朕斷不忍加罪也若欲指示某項當取某項不當取朕實不知亦斷無此理爾乃有守有為之好撫臣亟宜加勉自愛不必在此等細微處於朕前留心特諭雍正元年七月十六日廣西巡撫臣孔育珣謹奏為請㫖事竊惟馬平縣為栁州府首邑獞多民少兼之提督駐劄兵民聚集必需能貟料理查現任馬平令侯靖書生初任謹飭有餘而才具不足臣在栁州訪之輿論俱云前任馬平縣知縣章曾印在任時辦理地方頗稱安妥查章令係康熙六十一年護撫臣王沛憻題准終養在案臣聞章令之母尚在强健章令因馬平地方淡薄而難治恐其有纍故到任未久隨告終養而章令任內有督臣楊琳委銷帑鹽尚未銷完現今尚留粵西臣思其才既與地方相宜未便任其避難而去可否令章曾印仍任馬平縣事以資料理其現任馬平令侯靖或令其赴部另補或令其留粵俟有簡僻小縣缺出容臣題請補用伏祈皇上批示遵行臣謹奏侯靖如尚屬可用留粵題補若實係平常令其赴部將章曾印具本題補可也同日又奏為恭報早稻收成事竊查廣西省早稻於六月下旬已經登場收成有七分者有八分者有九分者通計約有八分收成目下雨水調勻晚稻及雜糧俱生長茂盛上米倉斗每石價銀六錢四五分次米價銀六錢一二分不等邉土黎民無不欣欣樂業理合據實奏報以慰聖懷臣謹奏今歲直省之收成多半出於望外朕惟以手加額感謝上蒼垂佑並皇考在天之靈默為蔭庇惟有益加乾惕期與諸卿共相加勉耳同日又奏為奏聞事竊臣聞廣西提鎮標兵空糧頗多營伍廢弛因知之未確未敢輕率奏聞今臣署理提督印務親身赴栁細為清查糧餉器械盔甲等項看驗弓馬鎗炮應料理者臣即便斟酌舉行其細小之事不敢瀆奏謹將營務中之緊要者據實一一奏眀一定例自提督以至千把所食親丁名糧各有定數臣到栁之後即行清查俱多逾例臣已飭令募好補共陸續補過名糧三百零二名惟是臣思提督為封疆大臣且在邊地每年不無用度即參逰以下亦各有用度若令盡行照例招補恐有不敷我皇上體恤臣工無不備至或許各員於定例之外量加皇上臣未敢擅定仰祈睿鑒批示遵行一額設制兵必須名名精鋭方不虛糜糧餉臣查驗提標兵丁內有年老力衰者現在陸續裁汰挑選壯健之人頂補并移鎮臣及通飭各協營一體遵行一營伍器械最屬緊要而輕重長短之制又須與人力相稱方裨實用臣查驗提標現在鳥鎗斤數過重難於施放臣擬另造鳥鎗一千五百桿分給兵丁更驗各兵腰刀全無鋼火臣擬將五營舊存廢壞軍器并舊鳥鎗銷燬打煉購買鋼鐵另造腰刀二千口散給衆兵一提臣左世永所製鐵棉盔甲本屬不敷臣今招募新兵補額又需盔甲擬另造鐵盔甲一千副散給各兵一提標舊有大炮已飭令各營蓋房收貯又有子母炮二十二位因年久俱已鏽壞臣擬造二十五位分給五營收貯一臣考驗提標鎗手俱極生踈細究其故知火藥鉛子俱係本兵自備是以無力勤加操演臣今用一臣總計製辦鳥鎗腰刀盔甲炮位并蓋造貯炮瓦房等項約共需銀五千四百六十兩零查得提標原有公費糧一百五十分臣到栁細查此項從前餉銀已經用完尚存從前糧米至夏季止共二千四百五十二石本年秋冬二季又該公費米二百六十六石共可變價一千六百五十餘兩至本年秋冬二季又該有公費餉銀九百兩零連前米索俟其照數繳足凑辦軍裝各項所少無幾再臣署理提督印務所有親丁糧銀米除操賞之外如一營員中賢否不一不能無所舉劾臣查提標內有廢弛營伍行止不端者題參以警其餘至中軍參將蔡成貴清查糧餉料理營務任勞任怨勤慎不欺現今增造軍器該員又實心經理目下提標事務正需整飭仰祈效臣署理不過暫時伏乞皇上嚴飭提鎮兩臣專心振刷庶成節制之師無負聖主愛養兵民之實意也至鎮標各協營散處各郡其應行整飭之處容臣細訪具奏合併聲眀臣謹奏詳閲所奏欵欵可嘉向聞爾撫標營伍可稱天下第一今用爾為廣西提督兼理巡撫事務爾其從容一一整理臨諭曷勝嘉賞之至同日又奏雍正元年六月十七日新任廣西布政使劉廷琛到粵口傳諭旨臣敬謹跪聽一一凛遵理合奏眀臣謹奏知道了劉廷琛人頗謹慤但才具甚屬平常時加教𨗳留心試用如不能稱職密奏去之同日又奏為恭繳御批奏摺事竊臣前奏請將張若霈等補授蒼梧道等缺䝉聖恩允臣所請家人齎摺回粵臣跪讀御批戴天恩之浩蕩感聖訓之周詳我皇上保全臣子不啻天地父母令臣感而欲泣遵即於所舉諸人內有現在省城者傳集臣署將御批之意反復訓誡各該員無不感激皇恩爭相奮勵惟是知人不易誠如聖眀洞鑒嗣後所舉各員內如有改易操守行止臣即便題參不敢瞻狥至臣身任封疆其責甚重惟有恪遵聖訓精白一心亦何敢納賄狥私以負天恩自取罪戾也所有奉到御批奏摺理合恭繳臣謹奏朕雖未睹爾面聞爾聲名已久近覽奏摺諸凡料理合宜乃封疆大吏中實心任事之臣甚屬可嘉極宜加勉勿怠朕非負人之主雍正元年七月二十九日廣西巡撫臣孔育珣謹奏為奏聞事竊臣赴栁署理提督印務所有料理提標營伍事宜業經具摺奏眀今臣據護理左江鎮印務平樂協副將王天益將該鎮標缺糧細數具報到臣臣查所開各官親丁名糧逾例甚多隨即咨㑹護鎮臣挑選精壯陸續頂補但提標各官親丁名糧臣前曾奏眀或於定例之外量加親丁之處洪恩出自營共一百三十六分書辦紙張火藥百隊等項糧又共有七十八分亦屬浮多其中應留應補之處新鎮臣邊士偉到任在即容臣咨商裁補所有護皇上睿鑒臣謹奏今命爾總督廣西諸凡徐徐次第整理至將辨之名糧須酌量去留必令各得養廉方為允當營伍中但能操習􅈺熟器械整齊亦何必在此瑣屑處計較總要爾酌中為之特諭同日又奏為奏眀剿除凶獞事竊查栁州府屬雒容縣地方之東塘村獞賊莫貴鳳者兄弟子姪及族姓人等共居一村恃强劫奪不法多端相近之馬平栁城永福等縣良民每受其害地方官差役拘質竟抗拒不服臣署理提督印務到栁查東塘村距栁州七月十五日到東塘村攻圍剿捕當場殺死獞賊二十五人活擒莫貴鳳等一十八人毁其村寨而還臣隨訊眀各供尚有餘黨逃脫未盡就獲若不即行正法無以威服羣獞臣於七月二十日恭請王命旗牌供奉將莫貴鳳等押赴市曹處斬示衆訖餘黨現在搜捕理合具摺奏眀再獞人肆惡劫奪拒捕總因歷年姑息太過以致養成黨羽尚有數處鴟張無忌者臣當仰體皇仁剴切曉諭如仍不悛在栁慶等府者臣即㑹商提臣發兵擒處如地近桂林者臣即遣臣標官兵擒處庶獞人不敢為匪良民得安生業矣為此繕摺奏聞伏乞睿鑒施行臣謹奏覽爾一切奏聞暨所料理之事洵屬實心任事之封疆大臣朕深為嘉奬至此案了結尤為得體允當之至雍正元年九月二十八日廣西總督兼理巡撫印務臣孔育珣謹奏為遵㫖回奏事竊臣䝉皇上將條陳廣西鹽政奏摺發臣留心籌畫密摺奏聞臣謹查得廣西各處鹽價部定自一分二釐至二分六釐不等以産鹽處所道里之逺近而定價值之低昂僻逺難運之地加增二三釐亦或有之若云貴至四五分六七分及屢月無鹽則實無是事也至條陳所云設官産鹽之地將鹽引即於本地徴課商無定名聼民買賣惟是既聼民便恐荒僻處所販賣者不至小民有淡食之虞而無有專責恐通省額引未能盡銷有虧國課等語查廣西鹽政實有與官民不便之處臣仰體聖慈再四籌畫所有微臣管見另具摺奏聞是否可行仰祈睿鑒臣謹奏詳覽區畫之策甚屬妥協同日又奏為恭報晚稻豐收事竊查粵西各屬晚稻於九月二十日前後陸續登場其收成有七分八分九分不等約計通省收成八分有餘米價各屬不一倉斗每石銀自五錢五六分至六錢六七分不等兵民安樂共慶豐年理合據實奏報以慰聖懷至從前各屬所虧倉榖趁此豐收現在竭力設法嚴催買補還倉合併奏聞臣謹奏該省有爾如此督撫表率一方自當感召天和獲䝉上蒼錫佑也同日又奏為欽奉上諭事臣䝉皇上頒發密諭二道臣跪讀之下伏見我皇上九重萬幾無刻不以閭閻之疾苦為念欲使四海之內熙皥成風無一夫不獲其所也竊惟社倉一事為濟衆備荒極善之政臣仰遵聖諭輾轉圗維請先行常平借貸之事而漸通乎社倉之法臣查粵西各州縣俱積有常平倉榖請於眀歲為始將此榖大縣以二千石為率中縣以一千六百石為率小縣以一千二百石為率令州縣官於春耕時小民欲借者零星借給秋收還倉豐年還息歉收止還借本荒歲則緩俟下年還本如是三五年必有贏餘其贏餘之數即分貯四鄉建造社倉擇里中老成信實者為社長司榖之出入收息免息悉依前法日久榖多一方可無饑饉之患矣臣未敢通行謹遵旨將州縣中之眀白者選擇數人行之以期漸次通行至於保甲一事乃弭盜安民之良策臣謹遵聖諭先於城市鎮店漢民聚集之處舉行查編至於各州縣鄉村因粵西地廣人稀山多田少零星散處又有猺獞雜處之地未能一體編立臣因細加查訪各屬鄉村居民向有團練堡目欵頭之設雖名色不同而借以禦盜則一其下又有鄉勇村大者十餘名村小者五六名屬團練人等統率近因日久廢弛臣請隨其土俗令府州縣官將原有團練堡目欵頭鄉勇人等查有誠實强幹者留之如不堪勝任者汰之另為選補以備捍衛設盜賊竊發若能奮勇擒獲者報官奬賞倘有怠惰必加議罰如此則賞罰既眀人自踴躍猺獞亦易於遵守其於弭盜安民亦同保甲一轍也臣才識短淺謹就睿鑒指示臣謹奏覽所奏二事悉中機宜嘉奬之懷筆莫能罄雍正元年十二月二十六日廣西總督兼理巡撫印務臣孔育珣謹奏為請旨事竊查栁州府屬來賔縣新舊王二白藤三村居近江濵獞賊覃扶成等糾衆駕船於江上行劫當據客民白際和等控告來賔縣差拘詎凶獞恃險放鎗不服拘喚該縣詳請撥兵擒拏臣隨咨㑹提臣韓良輔委梧州副將蔡成貴帶兵前往臣又委右江道萬際璋協同擒拏去後嗣准提臣咨覆先後拏獲獞賊共六十三名并據右江道申報相同臣即檄飭解司勘訊臣復加親審查覃扶成等雖行搶劫並未傷人臣仰體皇上如天好生之心請將為首之覃扶成韋道奉等八名俱照苖民白晝搶奪聚衆不及五十人亦無殺死人命例各枷號兩個月責四十板為從之李妙慶等三十三名各枷號一個月責三十板仍於各皇仁抑臣更有請者獞民賦性凶惡恐枷責滿日放回月朔望州縣點卯稽查既各有約束又散其黨類庶不至再行為惡也臣愚昧無識未敢擅便統候皇上睿鑒指示遵行臣謹奏知道了照所議行同日又奏為粵西倉榖補足恭請遣員盤驗事竊照廣西各州縣存倉榖共一百六十萬石有零前撫臣髙其倬因歲歉平糶又有各州縣未經詳眀糶賣並紳襟里民借領榖石臣曾具摺奏眀臣上緊催補今各州縣將缺榖於歲內已完十分之九通計所少不及十萬石眀歲二月俱可全足即或不能全足亦不過二三州縣以及民間零星尾缺臣謹具摺睿鑒施行臣謹奏倉榖催補有方朕深嘉之同日又奏為欽奉御批事竊臣欽遵諭旨查得右江道萬際璋係福建人年六十二歲精力尚健居官勤慎人亦老成為此繕摺據實奏覆臣謹奏萬際璋據奏已悉劉廷琛白洵何如猶能稱職否斯二人皆係中材因粵西事簡省分又有爾統率指示故試用之如小心謹愼猶可姑留若併此不能則棄材也絲毫毋為容隱據實奏聞雍正二年三月初九日廣西總督兼理巡撫印務臣孔育珣謹奏為欽奉御批事竊臣於雍正元年六月內布政司劉廷琛赴任到粵口傳上諭臣具摺回奏於九月內接奉皇上硃批知道了劉廷琛人頗謹慤但才具甚屬平常時加教𨗳留心試用如不能稱職密奏去之欽此臣因劉廷琛到任未久其賢否未能深知不敢草率回奏今巳數月見其居官安靜辦事勤慎錢糧清楚臣謹奏聞至按察使白洵到任亦將數月該員為人朴實居官安靜辦事勤慎合併奏眀臣謹奏知道了伊等隸爾屬下所謂形端表正即中材亦可化導為良吏也雍正二年四月十九日廣西總督兼理巡撫印務臣孔育珣謹奏為恭繳御批奏摺事竊臣於本年三月初九日已將劉廷琛白洵二人居官為人辦事之處具摺奏聞續於臣奏右江道萬際璋摺內恭奉皇上硃批命臣將劉廷琛白洵居官如何之處據實奏聞欽此臣謹查得劉廷琛白洵二人現今居官實在小心勤慎恪供厥職理合再行奏覆并恭繳硃批臣謹奏知道了如此甚好朕亦聞伊二人猶屬小心供職但劉廷琛前於按察司任內有一二事甚為不妥同日又奏為恭繳御批奏摺事竊臣前奏粵西倉榖補足恭請遣員盤驗一摺欽奉皇上硃批臣跪讀之下仰見我皇上信臣之深臣惟有益加小心勤慎以仰酬恩遇於萬一所有通省倉榖去冬約計有二三處未能補足今逐倉盤查尚有四處雖未買足亦皆有項抵補理合奏眀今當小民耕種之時臣現遵旨通行各屬借榖舉行社倉合併奏眀所有奉到御批理合恭繳臣謹奏社倉之舉萬不可急驟切勿彊民惟聽其自便所收數目亦毋令地方有司造册存案徐徐勸𨗳行之一二年後俾百姓不疑不畏胥踴躍樂從方可望久逺遵循而收實效也諭兩廣總督孔育珣朕自御極以來觀爾料理粵西諸務悉屬實心任事毫無瞻顧因循一切章奏亦甚眀白切當即欲擢爾總督兩廣但皇考所用內外諸臣凡無甚大過者朕皆保全冀其自新楊琳總督任內尚無貪酷形跡念係熟練地方之人未忍遽去然其為人不識大體每好護其巳往之咎因循自便任諄諄教誡不肯傾吐肝膈振作舊習正在去留未定間而遺本已至矣廣東風俗百姓不以盜竊為耻近年竟至劫掠公行乃地方大吏十案外結八九兵辨不被賞罰勸懲孰肯用命兼之武備廢弛不堪而小民魚鹽之利又盡為官有資生無策故易為不安分之事至於官常中舉劾百無一公此所以吏治民生均至不可問也目今合計直省地方之淳澆廣東為第一難治且境接海洋如西洋人之安插亦未甚妥外來之洋船發放尤屬不當一切不可枚舉今命爾總督其地爾其盡心竭力一一料理至年希堯董象緯輩皆不必懷畏讓之念朕果若親信伊等即用伊等為總督矣何得及爾年希堯庸愚無識自以為能被楊琳所籠絡將從前弊政皆代為隱飾董象緯初到地方一切未諳爾在粵西比鄰數年自必周悉無遺諸凡措置當自立主意倘伊等不肯同心興利除弊少有掣肘處密奏以聞朕即行遷調若應手無阻爾等文武共相協力和衷必將一切吏治民生治理盡美盡善方愜朕意朕今將粵東地方交付爾矣兹有金鐸梁文科等條奏粵省數事并楊琳前奏未了事件俱發爾詳細酌定具奏廣東不比廣西任久熟悉雖係切近鄰省不過得之傳聞究未身經目覩諸務不必匆忙朕不急求速效到任逐件眀白後徐徐籌計允當再行奏聞三年有成不為遲也所奏未銷鹽課一事巳諭部交新任撫臣李紱料理粵西揀發人員之奏照依所請諭李紱帶往劉夢正亦經發往任爾於兩省中委用粵東又命揀發數員前來備用但揀發之員俱非朕深知灼見之人不過觀其文字言談相貌而已况巳舉行數次其中不無營謀之弊今既受朕揀選之恩即當立心向上方不辱命若行止少有茍且是乃下愚不移之流更當加倍處分倘或若輩倚恃揀選及憑仗請托而不實力奉公爾等又念係揀選之員曲為姑容則為害不淺大失朕命往之意矣前者諾岷參劾許多揀選人員朕甚嘉之爾等當效法伊如此居心可也所參羅士奎已諭部發粵交該撫嚴審定擬矣爾於此等處朕實深加奬許全無漢官推諉瞻狥習氣甚有古大臣之風真不愧聖裔也勉之莫移此志再者原任左翼總兵金鐸未悉向日居官如何有言其性情直率不肯阿附同官作弊因被中傷者又有言其在任聲名甚屬不堪者輿論不一爾於無意中留心訪詢確實奏聞原任道員沈澄亦細加訪察具奏以聞年希堯董象緯二人優劣何如之處一併據實奏知以上所諭俱當密之勿宣雍正二年閏四月初九日兩廣總督臣孔育珣謹奏為仰懇聖恩調補道員事竊臣以菲材陋質蒙聖恩畀以兩廣總督聞命自天感激無地伏惟兩廣地方遼濶事務繁多臣材小任重益深惶恐惟有竭此丹誠以仰酬髙厚俟到廣東之後凡有應奏事宜另摺請旨遵行惟念兩廣鹽政裕課培商最關緊要現在運使孔興璉係臣族叔例應回避必得一才守兼優之員方能勝任臣查廣西右江道萬際璋才足以清課守足以恤商仰懇聖恩准將萬際璋就近調補廣東鹽運使甚有裨益如蒙恩允則右江道員缺亦屬緊要並祈皇上特簡賢員令其作速到任則兩地皆收得人之效矣為此繕摺請旨伏乞睿鑒施行臣謹奏照爾所請已諭部矣同日又奏為恭報雨水情形事竊查粵西自春及夏以來雨水調勻處處霑足二麥豐收早稻俱已栽完晚稻現在及時栽插通省米價上米倉斗每石價銀七錢七八分次米每石七錢一二分不等兵民安業共樂太平理合奏報以慰聖懷臣謹奏覽雨水米價情形深慰朕懷同日又奏為奏聞事竊提臣韓良輔奉旨署理廣西巡撫印務仰見我皇上知人善任其左江鎮臣邉士偉到任之始臣聞其留心營伍臣曾經大槩奏聞數月以來空糧俱巳招補訓練亦勤旗幟甲械咸各添造鮮眀此係邊士偉居官好處惟是待下多驕矜之氣遇事每缺分眀是以官兵多不恱服臣與提臣韓良輔俱經勸誡今已稍改理合奏眀臣謹奏如此直奏方見據實無隱爾其推誠勸誡朕遇便亦必另發訓諭命伊悛改雍正二年六月初七日兩廣總督臣孔育珣謹奏為籌畫辦理地方公務斟酌兩全之法據實奏眀事竊查廣省辦理一切公務銀兩經前督臣趙𢎞燦撫臣楊琳公議每年將知縣以上俸工捐出解司辦理今奉旨俸工一槩停捐仰見皇上優恤臣下之至意臣等何敢瀆陳惟是廣東每年十一兩又辦解廣鍋應貼補銀七百九十兩又辦解京銅五十五萬四千餘斤除部價每斤一錢四補走遞京報部文塘兵及提塘工食銀二千二百集司道公同核算各項減無可減現今俸工停捐畫議以民壯工食一項遵旨實發并微員苦役俸工照舊不捐外其自知縣以上俸銀及别役工食仍行捐解司庫以為辦理通省匿理合據實奏眀謹奏此事朕不便批諭要須爾等詳籌熟計公當為之果爾等督撫於地方上類此細務竟至於力不能辦亦朕所樂聞但恐未必然也王朝恩司庫錢糧一摺暫留中王朝恩不日到京見朕伊若甘心賠補令其完結如原係地方上因公那用仍應爾等在本地方上料理豈可諉卸於升任之人耶此事經年希堯圗理琛㑹同奏眀在前若徑著落王朝恩賠補似屬未協候朕向伊詢眀便中批諭爾知同日又奏為奏報早禾收成米糧價值事竊照廣東一歲兩稔本年夏秋大雨時行現今早禾收畢合省髙低田地俱有九分收成晚禾亦現在栽插米價廣惠潮肇等府每石七錢八錢不等髙雷等府每石五錢六錢不等理合奏報臣謹奏覽奏收成分數朕懷甚慰通政司右通政臣梁文科謹奏為謹陳粵東事宜事竊查廣東省地處海濵水多田少偶遇歉收之歲民間便苦乏食故凡可以為民生衣食計者皆須預為籌畫使百姓平日有糊口之計庶臨時得免饑餒之虞盜賊可以稀少地方可以安靜查廣東各處地方不在海邊即在河畔所産魚蝦之類俱可供小民衣食之資向來勢力豪強之人凡有田地近河近海者懇求地方官批給執照每年納糧數斗竟將近河近海之處占為已業不許窮民採捕致資生雖有些微課稅悉與豁除則窮民咸感厰內嚴查出入不使其為匪可也再查香山縣澳門地方眀季嘉靖年間租與紅毛居住屢年以來户口日增居心未必善良不可不嚴加防範以杜隱憂今宜設一辨員在澳門彈壓凡外洋之人只許往來貿易不許久留此地并不許內地姦民勾通紅毛夷人為匪則地方安靜庶不致有意外之虞矣是否可採伏候聖裁謹奏發來條奏三欵爾其詳細訪詢籌計妥確具奏以聞雍正二年六月二十四日兩廣總督臣孔育珣謹奏為遵旨回奏事竊臣蒙皇上發到通政司右通政臣梁文科條奏敬陳粵東事宜一摺硃批發來條奏三欵爾其詳細訪詢籌計妥確具奏以聞欽此查原奏內稱近河近海之處被勢力豪彊批照納糧占為己業不許窮民採捕請嚴行禁止一條臣細查廣東各屬內河地方並無豪彊霸占之處無庸置議惟外海原無稅糧向有豪彊地棍認納魚課霸占海靣號為海主港主前督臣楊琳業已查禁革除海主港主名色有福建投誠漢軍公鄭克塽家屬以奉部行分定為詞占管南澳海靣經督臣題請永禁於雍正元年十月內欽奉不許窮民採捕者重加懲處以恤窮民又原奏內稱廣東各處山內出産鉛錫任民刨挖以為糊口之計一條查廣東田少人多窮民無以資生鉛錫等礦原係天地自然之利所以資養窮民臣愚以為棄之可惜不如擇無礙民間田地廬墓出産鉛錫之山場招商開採俾附近窮民可藉工作養生旨到日遵行又原奏內稱香山澳門居住紅毛人户口日增宜設辨員彈壓一條臣查其地原有香山協把總一員帶兵五十名防守又澳門內旱路十餘里地名前山寨設有城池關閘不容西洋人擅入內地現有都司守備帶領兵丁駐防四面安設炮臺控制是原有官兵彈壓惟嚴飭用心巡查無庸另議安設矣惟是康熙五十六年定例禁止南洋不許中國人貿易澳門因係夷人不禁獨占其利近年每從外國買造船隻駕回貿易船隻日多恐致滋事臣擬查其現有船隻仍聽貿易定為額數朽壞准修此後不許添置以杜其逐歲增多之勢容臣另題請旨飭行至於外國洋船每年來中國貿易者俱泊於省逐一回奏臣謹奏知道了爾等封疆大臣料理地方一切事宜當於逺大處熟籌深計凡出一令舉一事必期永久可行有利無害方好不可止顧目前小利或被庸愚屬員無知小民一時謬論所煽惑也要須酌量輕重詳審始終必深知灼見洞徹其微然後施行方免失誤愼毋造次輕舉勉之慎之同日又奏為遵旨回奏事竊臣欽遵密諭查得撫臣年希堯居官謹愼小心提臣董象緯臣未曾㑹靣聞得不留空糧約束兵丁亦嚴臣初到廣東所知者乃其大槩容細察確實自當不時陳及巡海之年地方洋靣失事甚多大約行不逮言原任雷瓊道沈澄臣初到時見過二次詢以地方情形利弊應對眀白似有才幹者至其在雷瓊居官如何俟臣察訪詳細另行具奏緣奉密諭事理合先回奏臣謹奏知道了所奏公確另奏漁船一摺留中朕意尚在未定仍須詳悉斟酌大約禁止為是切勿暫弛得旨後遵奉而行雍正二年七月初九日兩廣總督臣孔育珣謹奏為奏眀事竊照前任督臣楊琳任內承養內廷效力法琅匠楊士章等十一人俱家住廣東向來各匠家屬每季赴總督衙門領取養家銀兩各匠在京房屋飯食俱為供備逐日進內廷做工今臣䝉聖恩補授兩廣總督循照舊例在京在廣一體給養理合奏眀謹奏爾地方中之民人效力內廷照看亦屬應當家口在廣照例給養可也至於在京之匠役領取用度甚不合理不但粵東一省即别省者朕俱降旨察眀賞賜錢糧房屋及一切養贍之需自眀歲正月始爾可無庸照管其住廣之家口每名一年所需若干如何給養之處亦當奏聞一者恐小人無厭之求爾等難滿其欲二者或爾等因係部下該管縱失於照看亦何敢言竟至給養缺乏小民離家數千里來京供役家中妻子身受饑寒亦朕心所不忍將所需之數奏眀則兩無礙矣同日又奏為奏聞事竊臣欽奉諭旨廣東風俗小民不以盜竊為恥近年劫掠公行武辨不見賞罰孰肯捨命從事臣跪讀之下仰見皇上於廣東民情吏治洞悉無遺臣朝夕凛惕思所以挽積習而報聖恩嗣據順德營縣報稱本年五月內有談德五等客船在獅含口被劫經順德營兵追趕全獲盜犯梁亞月等七名贓物悉行奪回等情臣即提到各犯親審供認不諱并查俱係積賊若待題請正法尚隔數月奸民不知畏懼臣隨於七月初三日請出王命旗牌將積盜梁亞月等七名押赴市曹處斬示衆其率兵捕盜之管隊立即拔補把總守兵等即補戰糧給銀犒賞并通行曉諭使知犯盜立即正法捕盜得有重賞以示勸懲臣因多盜地方起見不得不如此權宜振作理合奏聞臣謹奏爾初到地方上如此振作一二事猶可若竟以為常則不可正法後亦當即行補題何則一者人命重大例應內外察核二者恐人猜議斃盜滅口諱大事為小事爾亦承當不起若監候請旨而外有黨援或慮意外踈虞則當權宜為之亦須一靣施行一面將情由據實奏眀為是此所奏知道了辦理俱好至於地方上人命盜案萬不可隱諱以及私和暗銷宜留心詳加訪察所屬境內如有此等情弊即將該員嚴行參處兩廣總督臣孔育珣廣東提督臣董象緯謹奏為回奏事臣董象緯條陳水師守備等缺仍揀選水師人員以專責成副將參逰勿拘水陸惟將幹員題補一摺奉皇上硃批水師難於得人即陸路亦屬不易此事甚有關係大半總督之責與孔育珣商酌可也欽此臣等公同酌議西北之人長於馬上自幼不經水靣一至海船輒頭暈嘔吐站立不穩副將參逰有督率巡哨領兵追捕之責若登舟畏難安能率屬督兵向例水師缺出仍於水師中遴補有不得不然之勢然諳練水性又兼才具優長實心任事者實難具報於每年出洋巡哨時一同演習行走多次果也再查廣東外海水師副將六缺逰擊十一缺如必論缺論銜照例補用並無合例可補之員併請嗣後外海員缺果有智勇兼優熟諳水性者准其矣緣奉諭旨商酌事宜理合回奏謹奏合詞具疏題奏同日又奏為回奏事臣董象緯條奏水師虧缺每借口於捐修船隻請將通省應發馬價藩庫每匹扣存三兩如遇逰巡船隻因風損壞該營詳眀督撫於扣存馬價內赴領修葺等因奉硃批此事亦當與督臣斟酌今將陸路之錢糧修補水師之船隻一者恐陸路兵辨不甘二者恐水師中小人輩見現有修補之項不費已資因而隱匿揑報等弊不能保其必無似非良策也欽此臣等酌議水師船隻因海上颶風歲有舉發擊損沉沒無歲無之未到修造之年不便槩動正項錢糧從前督撫定以文職捐賠七分武職三分或至出洋緊急不及等候捐修自為補葺水師不無賠纍臣董象緯所以請將陸路馬價每匹扣存三兩以為修船之用原為以公完公起見查廣東通省歷年倒馬報銷總在一千四百餘匹之內臣等細詢每年所倒之數實不止此因定額巳久不敢多報而馬匹未過三年倒斃者例有賠樁銀兩各營馬兵以多倒之馬不准開銷遂立私朋名色每月散餉時馬兵自行扣貯遇有應賠樁銀及不准開銷馬匹於私朋銀內動用逮日久弊生凡遇倒馬竟先將私朋一項買補不足者方將官領馬價添入餘則留為製備火藥帳房營中公用不肖將備亦有侵收入已者因有此私朋故馬價得有羡餘今臣等公同酌議不如將私朋名色革除此後凡應賠樁銀及多倒馬匹俱在於官領馬價內通融扣解買補則馬價已無羡餘可以扣給水師修船陸路辨兵庶得辦火藥之用至於水師船隻蒙皇上眀照萬里令武職承修接准部文現在查議臣查額定修船工料原屬不敷向來道府承修每隻俱有貼補若武職止可責其承修不能責其貼補臣湊用若未屆應修年分果係因公巡哨遇風擊碎片板不存者照例無人看守以致擊碎者則將辨兵參處責令武職隱匿妄報之弊矣臣等公同酌議是否有當伏候聖裁謹奏覽所議甚當但此係不應具題之事只可爾等督提㑹同料理諭令該屬員等秉公奉行耳雍正二年九月初八日兩廣總督臣孔育珣謹奏為欽奉上諭事竊臣齎摺把總回粵捧到皇上硃筆諭旨三道一廣東蛋民編立埠次約束一載貨船隻給以印票稽查一悶香迷藥重立賞罰拏究臣跪讀之下仰見我皇上眀照萬里民間纎悉無一不入聖眀洞鑒之中臣身任封疆約束蛋民稽查船隻拏究奸盜實有專責謹將各條逐一立法并諄諭屬員因地制宜實力奉行以仰體皇上宵旰憂勤孜孜圗治至意所有奉到上諭實力遵奉緣由理合回奏并繳諭旨三道臣謹奏酌量輕重審詳先後徐徐不間為之不可過於嚴急同日又奏為奏眀鹽務清楚事竊照前督臣楊琳經手鹽務有新餉舊缺羡餘三項其新餉一項查有康熙六十一年課餉銀二萬八千兩未完臣於到任後催收今巳全完無缺舊缺一項查有雍正元年應帶徵舊缺銀八萬三千兩未完今臣亦收抵全完具疏題報在案又羡餘一項查自康熙五十七年起至六十一年止歷年共羡餘銀二十四萬四千七百四十一兩零俱經起解陜西軍需及湊解京餉訖惟雍正元年收鹽羡餘據運使萬際璋核造清冊應有羡餘銀五萬一千一百八十五兩零因鹽包存積未銷未能收回實屬有抵俟銷鹽之後鹽價收足即可撥餉亦經臣題報在案是楊琳任內經手鹽務俱係清楚其原任運使孔興璉庫貯錢糧經署運使廣州府知府宋瑋及新任運使萬際璋清查交代眀白造具冊結前來現在具題再臣前奏楊琳送到冊開發往廣西銷抵康熙六十一年餉稅及舊存鹽包并商人拖缺共計應收鹽價十萬一千八百餘兩請寬限兩年追完奉旨將原摺交新任廣西巡撫李紱料理嗣經署總督事廣東撫臣年希堯核眀楊琳原冊除去中途失水及收抵餉稅之外共未收鹽價八萬六千八百一十三兩零造冊咨送廣西巡撫衙門存案臣到任後巳陸續收起銀一萬二千三百九十三兩零抵過課餉舊缺外未收銀七萬四千四百一十九兩零內應歸抵雍正元年分羡餘銀五萬一千一百八十五兩零又應抵還運庫鹽價銀六千兩零尚餘銀一萬七千二百三十四兩零但內有存貯耗折及拖缺無追并人工火食開銷俟鹽包銷完之日除抵補各項外實餘剩若干又廣東省亦有歷年積下零星未清鹽價臣現在逐一清查俟追完若干臣當一併具摺恭進合併奏眀臣謹奏如此方見實心任事也朕甚嘉之諭兩廣總督孔育珣據奏請於廣東開採以濟窮民以靖地方朕發交廷臣㑹議知昔年粵省開礦聚集多人督撫奏稱四五萬其實不下一二十萬遂致盜賊漸起鄰郡戒嚴是以永行封閉夫養民之道惟在勸農務本若皆舍本逐末爭趨目前之利不肯盡力畎畝殊非經常之道且各省遊手無賴之徒望風而至豈能辨其奸良而去留之勢必至於衆聚難容况礦砂乃天地自然之利非人力種植可得焉保其生生不息今日有利聚之甚易他日利絶則散之甚難曷可不徹始終而計其利害耶至於課稅朕富有四海何藉於此原因憫念窮黎起見諭爾酌量令其開採蓋為一一真實無産之民許於深山窮谷覔微利以糊口資生耳爾等揆情度勢必不致聚衆生事庶幾或可若招商開厰設官徵稅傳聞逺近以致聚衆藏奸則斷不可行特諭雍正二年九月初八日兩廣總督臣孔育珣謹奏為欽奉上諭事竊臣齎摺人回恭捧廣東開採礦砂諭旨一道到臣仰見皇上至聖至眀因利計害非臣下淺見所能窺及臣前摺所請招商開厰設官徴稅之處實屬冒昧今奉聖諭臣仰體皇仁如深山窮谷內窮民暫時零星偷採糊口者寬其禁捕若訪得聚集人多地方文武即撥兵役驅逐解散再若生事地方則擒拏究治如此分别立法庶逺方無賴之徒不致聞風而至本地乏食窮民聊得藉砂易食仍一面勸民守分力田以副皇上重農務本德意所有奉到諭旨理合恭繳臣謹奏此論猶屬得中但須實力遵奉而行諭兩廣總督孔育珣爾任廣西巡撫時與提督韓良輔㑹奏大金蕉木等山礦徒地方官不能驅逐添設官兵防汛今廣西巡撫李紱摺奏有外省無藉礦徒流入蕉木山隨飭賀縣知縣㑹同富賀營守備帶兵三路並進驅入廣東又稱廣東梅峝宿塘等處礦徒梁老二聚集多人汛兵子弟亦多附和巡檢不能防緝等語據此廣東既有巢窟雖從廣西暫驅出境亦復何益此關係地方利害爾總督全粵宜㑹同兩省巡撫提督設法驅除解散毋因前曾奏請開礦少有回護以致慢忽因循且聞所聚礦徒已有名目將來為害不輕非比一二窮民偷採或可法外寬宥斷宜速行嚴禁解散無使滋蔓督撫身任封疆重寄職在戢暴安民如應提調官兵處悉心籌畫而為之不可姑息省事而養癰成患務期地方寧謐以副朕意特諭雍正二年十月初九日兩廣總督臣孔育珣謹奏為回奏事雍正二年九月二十八日接兵部咨文送到內廷封發硃筆諭旨一道係為廣西大金蕉木等山廣東梅峝宿塘等處礦徒聚集之事命臣㑹同兩省巡撫提督諸臣設法驅逐無使滋蔓等因到臣臣跪讀之下仰見皇上指示周詳不禁惶悚感激查本年六月內據富賀營守備胡起龍賀縣知縣韓牧吉報稱六月初八日有礦徒進蕉木山盜挖礦砂探係廣東宿塘梅峝等村人民現在督率辨兵鄉練驅逐等情臣隨分飭廣西該營縣及行廣東之三江協連山縣各帶兵役驅逐并查拏為首之人解究嗣據平樂協副將王天益報稱千把捕巡各帶兵役分為三路並進礦徒連夜逃散由廣東三峝而去等情臣復檄廣東之三江協連山縣查眀礦徒散匿何處有無聚集嚴行防範約束在案臣查蕉木山西係廣西之賀縣東接廣東之連山縣并與湖廣之江華縣相近因蕉木山出産礦砂廣東附近窮民乘間偷採驅則散回各家每歲必有幾次即湖廣廣西之人亦間有在內偷採俱屬附近居民並非逺來亦非另有巢窟其知有姓名者則係屢次偷礦之人然畏查拏姓名復更改不常此臣訪得歷來之情形也至臣初到廣東時因見人多田少冒昧題請開礦及奉皇上指示利害眀白曉諭臣至今愧悔倘地方有事臣總督責任更重斷不敢回護慢忽自取罪戻今蒙聖諭已密訪梁老二蹤跡拏到之日按律治罪并㑹同兩省撫提諸臣加謹防間以靖地方至於宜善司巡檢黃振孝原不能防緝兼且多事已經撫臣年希堯㑹臣咨部斥革合併奏聞並繳原奉諭旨一道臣謹奏所奏知道了汝言與爾同舟共濟之年希堯甚屬不及朕意欲更換之同日又奏為奏報晚禾收成米糧價值事竊照廣東夏秋之交雨水充足晚禾茂盛自八月初旬以後雨水稀少水田收成七八九分不等旱田收成亦有六分惟雷州府屬之海康遂溪二縣上年被鹹潮湧浸滷氣未消之田不能種植業經撫臣年希堯題眀水旱田計通省共有七分收成現在米價廣南韶惠潮肇等府細米每石八錢五六分粗米每石七錢七八分不等髙雷廉瓊等府每石五錢六錢不等至廣西晚禾統計收成共有八分各府米價不同每石有八錢七錢六錢不等兩省地方俱各寧謐理合奏報臣謹奏覽收成米價情形已悉惟宜黽勉吏治以敬迓天庥該臣等前議廣東漁船若船式准令寬大恐無知小人以為海禁漸弛復行販米接濟賊船應照舊制今督臣孔育珣奏稱沿海居民捕魚須在深水洋靣欲將漁船梁頭改為九尺設立船長㑹同汛兵保結查點不許夾帶器械米糧等語臣等再議得海洋盜賊出沒靡常其所用米糧船隻俱取資於內地而漁船往來難保無私賣米石之弊向來海賊甚為地方之害近年海洋平靜未必非漁船改小之故未敢輕議改換且船大則夾帶必多稽查匪易多帶米糧重價賣與賊船亦勢所必至况小民捕魚為業沿海地方可以取利不必盡在大洋之中船隻若照舊制即偶有違式偷寬丈尺者非地方官為之主即係鄉紳之船為數無多尚易稽查倘一概寬其梁頭則漁船盡為大船可以出洋即可以越境雖分别油飾編列字號而數千餘隻盡出洋面斷難稽查矣或揑稱遭風難回刮去油飾賊人得以行劫陸地四五年後恐亦難保又據督臣奏稱目今漁船私放寬大文武官吏每多勒索等語夫稽查乃地方官之事今日稽查違式之小船可以勒索賄縱則設立船長之後稽查夾帶之大船亦可受賄作弊立船長之後可以禁絶弊端則今日亦即可禁絶矣臣等愚見漁船之式似應仍照舊制但念現有之船已費民力若一概拆毁改造則小民失業其舊有船隻免其拆毁新造者仍遵定式查禁可也謹奏廷議漁船仍照舊式甚是總之海禁寧嚴毋寬餘無善策爾等地方大吏不可因目前利便而貽他日之害當照依此議實力奉行可也同日又奏為回奏事竊臣㑹同提臣董象緯奏覆拖風漁船一案於本年九月三十日奉到硃批廷議漁船仍照舊式甚是總之海禁寧嚴毋寬餘無善策爾等地方大吏不可因目前利便而貽他日之害當照依此議實力奉行欽此欽遵臣現將沿海漁船逐一編查油飾照依廷議舊有船隻免其拆毁新造者仍遵定式查禁不許寬大并選擇船長稽查一港船主又責成船主稽查一船水手使各知警懼安分守法以仰副皇上慎重海防之至意又臣前奏將積盜梁亞月等正法一摺原屬一時權宜振作不敢視以為常今欽奉硃批臣惟仰遵聖諭斟酌事情緩急請旨而行又陸路將備千把情願在水師效力者令於每年出洋巡哨時一同演習行走已遵旨合詞具題又候補道員方願瑛到粵口傳上諭已一一凛遵所有奉到聖訓遵行緣由理合具摺彚奏臣謹奏所奏皆是惟貴力行勿懈絲毫莫隱雍正二年十月二十九日兩廣總督臣孔育珣謹奏為恭繳硃批諭旨事雍正二年閏四月十六日臣齎摺人回粵捧到硃批諭旨一道跪讀之下䝉皇上訓臣料理地方修已治人之道無不備悉并諭臣不必匆忙逐件徐徐籌計允當再行奏聞臣遵將所知所見事件陸續回奏恭讀聖諭內西洋人之安插未甚妥協外來之洋船發放不當可竭力盡心料理欽此查各省居住西洋人先經閩浙督臣滿保題准有通曉技藝願赴京效力者送京此外一槩送赴澳門安插嗣經西洋人戴進賢等奏懇寬免逐回澳門發臣等查議臣思西洋人在中國未聞犯法生事於吏治民生原無大害然厯法算法各技藝民間俱無所用别為一教原非中國聖人之道愚民輕信誤聽究非長逺之計經臣議將各省送到之西洋人暫令在廣州省城天主堂居住不許出外行教亦不許百姓入教遇有各本國洋船到粵陸續搭回此外各府州縣天主堂盡行改為公所不許潛往居住業㑹同將軍撫提諸臣具題其澳門居住之西洋人與行教之西洋人不同居住二百年日久人衆無地可驅守法納稅亦稱良善惟伊等販洋船隻每從外國造駕回粵連前共有二十五隻恐將來船隻日多呼引族類來此謀利則人數益衆臣擬將現存船隻編列字號作為定數不許添造并不許再帶外國之人容留居住亦經具疏請旨此安插兩種西洋人是否妥協伏候聖裁再外來洋船向俱泊於近省黃埔地方來回輸納關稅臣思外洋逺來貿易宜使其懷德畏威臣飭令洋船到日止許正商數人與行客公平交易其餘水手人等俱在船上等候不得登岸行走撥兵防衛看守定於十一十二兩月內乘風信便利將銀貨交清遣令回國則關稅有益而逺人感慕亦不致别生事端矣其查貨收稅係撫臣管理臣所行發放之法理合奏聞所有原奉硃批諭旨具摺恭繳并繪香山澳門圗恭呈御覽臣謹奏朕於西洋教法原無深惡痛絶之處但念於我中國聖人之道無甚裨益不過聊從衆議耳爾其詳加酌量若果無害則異域逺人自應一切從寬爾或不達朕意繩之過嚴則又不是矣特諭兩廣總督臣孔育珣廣東巡撫臣年希堯提督臣董象緯謹奏為欽奉上諭事案准工部咨奉硃批諭旨沿海戰船朕意欲歸營員修造使州縣無賠纍之苦而於軍政甚有裨益可速行㑹議具奏欽此查地方官承管修造戰船營員多方勒索乃歷來積弊戰船係營員駕配巡哨身命所關歸令營員修造自必益加堅固惟是各船修造工料從前題定之價實屬不敷武職止可責其出力不能墊補應將戰船改歸武職修造不敷銀兩仍令文員幫補業經臣等㑹疏具題但文職幫補未定數目地方物料價值不等恐將來不無推諉爭執行據布政使圗理琛議將戰船歸營員修造廣肇惠潮四府産木稀少俱從外方買運照題定工料銀每百兩應幫貼六十兩韶髙雷亷瓊五府俱産木植照題定工料銀每百兩應幫貼三十兩臣等核算確當現在通飭文武遵照立案因題銷戰船工料止可照原定價值不便將幫貼數目敘入疏內理合公同奏眀臣等謹奏此奏是近日因查弼納修船之奏頗屬妥協現交九卿詳議議定後由部頒發爾等遵照奉行假若廷議內有於爾粵省不便處不妨另摺奏聞雍正二年十二月二十二日兩廣總督臣孔育珣謹奏為回奏事雍正二年十一月二十二日廣東糧驛道吳炯赴任口傳八月初一日欽奉上諭廣東産礦之處因礦商聚衆網利窮民不得沾惠是以未經准行但天地自然之利窮民藉採挖資生若止二三人或可聽其自便地方官於出礦之處仍當禁止封閉至海上漁船大半富户出資打造名為寸欽此又口傳八月十八日欽奉上諭廣東海疆重地督撫等第一應留心武備先事預防文武辦事尤貴和衷文官愛惜兵丁武官愛惜百姓文武一心百姓安分守法兵丁不致驕縱多事地方自然得享升平之福再地方私和人命乃斷乎不可之事務令地方官審得實情督撫題請定奪當抵償者抵償當開釋者開釋國法昭彰久之命案自少何必以多為諱欽此臣俱一一凜遵理合回奏臣謹奏知道了朕諭大略如此在爾等封疆大臣仰體朕衷相機合宜而為之但要據實勿隱吳炯乃一庸平才具恐不達時務宜勤加教𨗳令其黽勉非朕嘉奬信用之人也正白旗漢軍副都統臣金鐸謹奏為邊海宜專責協營巡防以重職守事臣查廣東邊海各口岸設立協營防守後又定例使南澳碣石二總兵每歲更換一員以為總巡原欲弭盜安民加意防範也但總巡出洋自欽州至南澳綿亘四千餘里而所帶隨巡微員不過二十人戰船不過二十餘隻未免前去後空顧此失彼徒有巡海之名究無裨益之實況各口岸協營於總巡毫無統轄呼應不靈及至地方呈報盜案協營以外洋瞭望不及例免疏防處分然臣思既有地名可以查報則屬內地無疑而協營借詞推諉致凡有疏防參處不開專汛悉歸總巡是各協營反因有總巡而廢弛職守也臣請嗣後竟專責各鎮協營逰巡本管海面加意嚴密巡查彼此疆界㑹哨而督提不時稽察毋許偷安怠惰果能上下實心彼此照應則處處有兵處處有船商民自然樂業又何必用此總巡倘有踈忽即按其經管地方嚴加處分則責成既專無所推諉邊海一帶得以永奠矣臣謹據愚昧之見具摺奏聞伏祈睿鑒施行謹奏此奏巡海機宜爾意有當於用否詳悉斟酌奏覆雍正三年二月二十五日兩廣總督臣孔育珣謹奏為回奏事竊臣接奉皇上發下正白旗漢軍副都統金鐸摺奏廣東巡海條陳一件奉有硃批臣謹查康熙五十六年以前廣東巡海舊例原係於南澳碣石兩鎮內一年輪委一員為總巡誠如金鐸所奏海道綿長顧此失彼前去後空有名無實於五十七年即經更定南澳為閩粵交界瓊州孤懸海外南澳總兵及瓊州水師副將各帶標員專巡本管洋靣自南澳而西平海營而東分為東路以碣石總兵澄海水師副將輪為統巡帶領鎮協標員及海門達濠平海等營員為分巡自大鵬營而西廣海寨而東分為中路以虎門香山二協水師副將輪為統巡帶領二協標員及大鵬廣海二營逰守為分巡自春江協而西龍門協而東分為西路以春江龍門二協水師副將輪為統巡帶領二協標員及電白吳川海安􅚑洲等營員為分巡每年自二月至五月為一班六月至九月為一班統巡分巡俱輪流更換逐年兩次題報是各鎮協營派出分巡官止專巡本管洋靣不隨統巡官逺去不至顧此失彼而向之僅有一員總巡者今巳定有六員不至前去後空遇外洋失事則本管之分巡官與輪委之統巡官一併參處無可推諉矣金鐸所奏可無庸置議臣惟嚴飭統巡分巡各官實力巡查以靖海洋理合回奏并繳硃批原摺臣謹奏所言得理金鐸之奏朕意原在可否之間故命爾詳悉斟酌也今春萬際瑞到京面奏海洋統巡無益與金鐸所奏大槩相仿所以朕面諭伊到廣與爾商酌具奏及伊出京後復博訪多人皆云統巡於海洋大有裨益始知萬際瑞前言並非深知灼見之論隨另降諭旨發萬際瑞矣今覽爾此摺所奏殊屬得中萬際瑞若固執己見於事無益自應仍循舊例為是聞陳良弼黃助皆諳練海洋宜悉心與之共商不可惑於一偏之論前陳良弼進摺條奏巡哨事宜適值萬際瑞在都彼時朕是萬際瑞之論不取陳良弼所奏因於伊摺內批諭統巡尚屬無益正在斟酌欲行停止何况巡哨事宜耶今萬際瑞之論既不周詳陳良弼所論或有可採爾向伊眀白咨詢詳悉斟酌然後具奏仍諭萬際瑞不可膠固不過講求地方事宜得當並非於此較優劣也朕因不達海洋情形但觀條奏皆似有理所以搖搖未能决定爾須代朕博訪廣求審思熟籌務得凖的若亦不能洞悉機宜寧遲月日無妨也更與楊文乾陳良弼黃助萬際瑞等平心和衷詳議㑹奏以聞同日又奏為奏眀事竊照髙雷亷總兵藺佳進素日聲名不好亦不留心營伍上年臣到任後委員查點各營兵馬該鎮標兵丁技藝生疏該鎮來肇見臣臣面加勸戒冀其自新至十一月間該鎮呈報親往所屬各營查驗兵馬船隻臣意其從此振拔整頓後訪聞該鎮所到之處百般勒索屬員難受共議餽送每營八百四百三百二百兩不等官兵交怨貪婪殊甚現在列疏題參仰懇皇上重加議處懲一警百則邊海營將各知凜惕矣理合具摺奏眀臣謹奏另有嚴旨諭部此等不法劣員豈可一日姑容所參甚是兩廣總督臣孔育珣廣東巡撫臣年希堯提督臣董象緯謹奏為奏聞事竊據廣東龍門營縣禀報龍門營千總劉貴隨帶拏帶行未及半里草內忽出賊徒三四十人搶犯千總奮力擒捕被賊傷故并傷故跟隨兵丁一名賊徒搶犯而散等情各到臣等據此查龍門從化匿臣等分飭各營縣嚴行緝拏并委肇慶協副將李斯援帶領督標辨兵廣南韶道戴綸督率營縣搜捕節次據報拏獲賊犯唐友興等三十二人現在四靣極力搜緝餘黨究審為首及下手殺人之犯一面奏眀臣等謹㑹奏地方上凡遇此等事件但要據實奏聞何罪之有若隱諱支飾則反獲罪於朕矣總之上下內外互相推誠不欺毫無隔礙以期協於至當何愁庶務不就理耶勉之雍正三年四月初一日兩廣總督臣孔育珣謹奏為奏報雨水米價事竊查廣東自上年冬月至今春正月雨水略少自二月十九日起大雨三日此後或三日一雨或五日一雨高低田地盡得栽插苖禾茂盛廣肇二府米價每石九錢八錢不等外府米價每石七錢八錢不等廣西各府雨水亦足俱得及時播種豐年有兆萬姓歡騰理合奏報臣謹奏覽奏深為欣悅雍正三年六月二十八日兩廣總督臣孔育珣謹奏為奏眀事竊廣西賀縣蕉木等山出産礦砂向有礦徒偷挖臣在廣西任內曾㑹同提臣韓良輔奏請添兵巡防復蒙皇上聖鑒察知為首礦徒係連山縣之梁老二諭令查緝臣細查梁老二本名聶維寬嚴行連山文武緝拏詎該犯逃匿廣西更名髙竒相串結賀縣為首礦徒陳秀華偷開癩頭嶺錫山富賀營守備胡起龍帶兵擒捕傷斃礦徒二十九名生擒八名餘即逃散兵丁亦被礦徒傷斃三人臣據報嚴飭搜捕并提到現犯親訊供出為首係陳秀華聶維寬二人臣隨嚴檄緝拏於本年六月十五日據三江副將彭成將聶維寬陳秀華獲解到案復加細訊據二犯自認為首不諱供出同夥六十一人查陸續拏獲并當場殺死之犯共四十八名尚有未獲之犯一十三名首犯既獲將來礦徒自當斂跡現將獲犯押解廣西按察司確審招解撫臣李紱覆審具題再廣東龍門營千總劉貴捕賊受傷身故臣已將情形㑹㫖正法臣叨授總督重任地方盜賊礦徒不能消弭致有損傷官兵之事罪實難寬惟有嚴行緝捕不使漏網以蓋前愆於萬一理合繕摺奏眀臣謹奏兩省遼濶何能保得地方竟無一事但只據實無隱朕不罪也遇此惟以嚴緝務獲為要斷不可潛消暗滅希圗掩蓋不令朕聞硃批諭旨卷七之一欽定四庫全書硃批諭㫖卷七之二硃批孔育珣奏摺雍正三年七月二十六日兩廣總督臣孔育珣謹奏為奏聞事竊照廣東按察使宋瑋才守兼優勤慎明白於上年十一月間身患虛弱之症而刑名事務勉力辦理案件無誤奈精神氣力尚未平復行走未能便捷又廣東布政使朱絳歷練勤敏才具優長於本年五月間忽染風痰之症調治半月巳能坐立力疾辦事並無遲誤庫項清楚今尚力弱腿軟難於步履臣念二員俱屬有用之才方在壯年不忍遽行題請解任但藩臬管理通省責任匪輕二臣抱恙未愈恐有貽誤之處臣擬再令調治一月如仍不能痊可即題請解任調治合先奏聞臣謹奏朕有㫖調宋瑋來一見今既身染疾病且不必令其赴京調治平復然後令其前來可也必俟大愈途中可以步履方令起程北上切勿任伊勉強扶病而行甚屬可惜之人也同日又奏為奏明交代撫篆事竊廣東撫臣年希堯升任臣於五月二十二日循例署篆赴省駐劄嗣聞新任撫臣楊文乾將次入境臣於七月初一日齎送印信俱經題報在案俟新撫臣到省臣恭請聖安再靣行交代即具疏奏請陛見然後回肇慶府臣駐劄衙門料理案件候㫖起程以遂瞻天仰聖之願其臣署篆經管太平粵海兩關稅務俟逺近報齊之日將經收正稅羡餘數目具摺逐一奏聞臣謹奏陛見之行且可不必俟楊文乾熟練地方情形之後朕另有諭㫖雍正三年九月初九日兩廣總督臣孔育珣謹奏為恭聆天語叩謝聖恩事本年八月十二日瓊州總兵臣萬際瑞陛見回粵靣傳上諭朕未見孔育珣之靣亦並無人在朕前保舉因聞其居官聲名好所以將伊重用可傳諭伊知悉當益加勉勵欽此臣跪聽之下不禁感激涕零臣巳疏請陛見俟奉㫖到日趨赴闕廷叩謝天恩合先具摺奏謝至奉上諭營伍事宜萬際瑞巳升廣東提督俟其到任㑹商舉行合併奏明臣謹奏朕實於章奏之間得知爾之居心行事又兼採聽輿論言是者多所以如此信任從未有人著意於朕前稱譽者因此更見卿之孤介不事夤緣宜乎邀朕之見重也勉之同日又奏為奏明料理被水地方事宜事竊照廣東之廣州肇慶二府沿河低窪田地兩岸築有圍基以禦水患七月初旬大雨連綿至七月二十一二三等日廣西諸水及廣東南韶等府山水湧至歸海不及以致髙要髙明四㑹三水南海五縣低處圍基水漫基靣基隨水卸田禾淹浸房屋亦間有倒塌並未損傷人口幸離海不逺數日即漸消退臣於八月初三日自省旋肇沿途親驗漫溢處所田巳漸次涸出勸民補種晚禾如晚禾補種不及則多栽豆麥雜糧臣身不能親到者委員分路查勘撫恤一靣將被水情形題報在案臣查圍基所以保護民田向係圍內有田之家按田出夫修築但被水之後恐民力不繼臣委員往廣西採買米石并看驗圍基根腳有水急衝深之處應用樁木者亦差員採買俟逐一備齊分貯工所十月間農隙之時分段委員按照應築土方傳集圍內有田之家合力工作仍按人按日給以飯米不必百姓費錢止須出力自樂趨事不過兩月之內可以竣工至早禾收穫未久八九月間尚不缺食冬底明春不能無缺臣擬臨時酌動各縣新行社倉穀石賑濟倘社穀不敷再借支常平倉穀令於來年秋收還倉臣惟有隨時布置以仰副皇上子惠元元務使窮民得所至意所有臣料理被水地方事宜理合具摺奏聞臣謹奏圍基被水情節知道了力所能者權宜辦理如力有未逮不必拮据從事酌量應題請者具疏應摺奏者摺奏以聞朕不吝恩施卿之實心任事辦理有方朕實嘉之勉為之同日又奏為奏明復署撫篆事竊七月二十九日撫臣楊文乾到任臣恭請聖安一應署篆事務面行交代八月初三日疏請陛見回肇候㫖初七日忽聞撫臣楊文乾丁憂復將印務交送到臣臣因一身管理督撫鹽政兩關五篆惟恐心力不周當即新撫臣到日交代也再巡撫衙門兼管粵海太平兩關徵收關稅原有火耗除分給各關口巡攔橋兵書役人等工食外太平關計有加一火耗粵海關計有加二火耗從前不入贏餘之內臣查雷州府屬東洋堤閘於雍正元年八月間被颶風海潮衝倒題報在案因堤長三千丈閘大小二十餘座工力浩繁未得修築臣先署撫篆查撫臣年希堯任內尚有存貯罰贖銀兩湊入臣兩關所得火耗即於七月十五日委雷瓊道王璠廉州同知施上治齎往工所募夫興修約十二月內可以完工又因七月內南海三水髙要髙明四㑹等五縣地方圍基衝漫即以火耗湊買飯米樁木率民興工以上二起工程不敢絲毫纍民亦不令屬官幫出分文即以皇上賞給臣下之火耗為皇上辦理地方公事合併奏明臣謹奏以公完公極好之事料理甚屬可嘉同日又奏為奏明到粵外國洋船事竊照本年六月初四初五十五等日到􅟖咭唎國洋船三隻所載俱係黑鉛番錢哆囉嗶吱等貨七月初四日到法蘭西洋船一隻所載黑鉛番錢羽縀哆囉等貨七月十七日到􅟖咭唎國洋船一隻沙國洋船一隻咖喇吧國洋船一隻所載胡椒蘇木檀香等貨七月十八日到嗎吧喇斯國洋船一隻二十八日到􅟖咭唎國洋船二隻所載係胡椒檀香黑鉛番錢等貨以上六七月共到外國洋船十隻俱灣泊黃埔地方委員彈壓稽查不許內地閒雜人等擅入夷船生事併嚴飭牙行通事人等貿易貨物公平交易務在年內乘風信盡令開發歸國所有到粵外國洋船數目理合奏報臣謹奏知道了嚴加約束稽查不可仍令沿襲故套雍正三年十一月初十日兩廣總督臣孔育珣謹奏為奏明事竊臣一介庸愚荷䝉皇上知遇隆恩臣即捐糜頂踵難報萬一奈事出無心實干重罪悔愧驚懼不知所措緣雍正二年九月內年羮堯遣人至伊兄廣東巡撫年希堯處託年希堯代買紫檀木二百擔并託臣代買紫檀木二百擔臣一時應允及後年希堯買木之時臣亦墊銀七百六十兩買紫檀木二百擔大小計四十一根差人運送訖臣不料年羮堯大負聖恩罪惡滔天與之代買代運罪實難逭臣愚昧無知不能預料於事先理合據實奏明認罪臣謹奏此等過失朕豈有不諒之理並不嗔責爾也年羮堯負朕深恩乃敢如此不法不但爾未料及實出朕之意外爾非黨附下流輩之可比朕雖未睹爾靣深悉爾之居心為人為伊買木一事毫不必繫懷朕無識人之明誤寵匪類正自引咎不暇何顔復株連無辜此奏知道了朕從無心口互異之言日久天下臣民自當了然洞悉也雍正三年十一月十五日兩廣總督臣孔育珣謹奏為奏報晚禾收成米糧價值事竊照廣東今嵗晚禾除廣肇二府屬之南海髙要等五縣因七月間山水陡發圍基漫溢田禾淹沒經臣勘明具題在案此五縣內圍基未溢處所仍係豐收髙雷廉三府屬因雍正元年塘倒鹹潮淹浸之處尚不能種植餘則大熟惠州府屬之海豐縣潮州府屬之普寧饒平二縣今年雨水稍多收成略薄亦不成災其餘各府州縣俱係豐熟合計通省收成約有七分米價細米每石九錢粗米每石八錢廣西收成據報九分八分不等米價每石七錢六錢不等再南海等五縣衝決圍基有將次築完者有築至五六分者雷州府海塘堤閘亦有一半工程歲內俱可完工合併奏聞臣謹奏收成米價情形知道了其圍基海塘等處工程不可有名無實當務一勞永逸為之方好不然築猶未築於民仍屬無益也同日又奏為轉奏事案照文武官員凡有面奉諭㫖令該員繕寫具摺進呈如不應具摺之官封固交該上司轉奏等因欽遵在案今據廣東瓊州府知府嶽綸呈稱將面奉諭㫖繕摺封固交臣代為恭進前來理合遵㫖進呈謹奏將嶽綸原摺發回爾看內折角處字句差謬乃至如此不通且所記之語與朕諭大相懸殊此人甚屬粗率愚拙伊本部堂官及王大臣等並無奏伊好者因差往天津山東等處截漕回京復命猶似老成無欺朕棄短取長補授外郡雖經補用恐其不克勝任今覽此奏摺洵非通逹事體之人爾察其在任如不能供職有貽誤處即行參奏疏內不必援引此㫖若尚可姑留其嚴加飭諭令伊重寫另摺奏來同日又奏為恭繳硃批奏摺事竊臣兩次奉到硃批奏摺八扣理合恭繳再臣前奏廣東按察使宋瑋現患弱病奉㫖著宋瑋調理好日再令起程來京因宋瑋巳於九月初九日起程臣接內閣行文遣員趕往前途臣齎摺差員先於江西萬安縣地方遇見宋瑋將原奉上諭交給宋瑋欽遵緩緩而行隨據宋瑋呈稱病巳漸愈并請代為謝恩前來臣即具題代謝在案合併聲明臣謹奏覽奏知宋瑋病巳漸愈朕甚愈悅萬際璋朱絳二員好官殊為可惜雍正四年二月十二日兩廣總督臣孔育珣謹奏為聖遇獨隆感激難名事本年十一月十四日臣齎摺人回粵奉到硃批䝉皇上以孤介二字許臣又䝉頒賜哈密瓜二個臣望闕叩頭謝恩跪讀領受訖欽惟皇上聰明睿智超越千古凡大小臣工賢否誠僞無一不入聖明照鑒之中而臣區區愚悃更邀聖上鑒察聆天語之褒嘉嘗上方之珍味感激涕零臣益懼有忝職守上負聖明特逹之知則臣罪滋大惟朝夕警惕益加勉勵以圖報效耳為此具摺叩謝臣謹奏朕向在藩邸時自信然諾不茍每以心口互異匿怨交人為恥今君臨萬邦而反以權術御下必無是理日久天下臣工自然洞悉朕之居心也君臣之間惟以推誠為貴朕與卿等期共勉之同日又奏為奏報鹽課事竊兩廣鹽課東餉西稅每年額徵銀五十萬三千四百餘兩今據兩省鹽道造報雍正二年課銀已徵完四十六萬四千四十兩零未完銀三萬九千四百兩現在催徵計已完九分以上又雍正二年分廣東收鹽羡餘銀七萬七百一十九兩零廣西官銷羡餘銀五萬四千六十兩零二共羡餘銀一十二萬四千七百七十九兩零俱經臣具題在案合併奏明臣謹奏覽奏鹽課已悉國計民生輕重均屬相等若過偏則為弊政萬萬不可其秉公勉為之同日又奏為奏聞事廣東布政使常賚於雍正四年正月十九日到任見皇上用人之當理合具摺奏聞臣謹奏常賚資質頗好可以造就之人但要伊自能加勉始終無間則其增長何可限量耶同日又奏為敬聆上諭感激陳情事竊新任廣東布政使臣常賚到肇口傳面奉上諭臣跪聽之下一一欽遵外伏念臣一介庸材愆尤日積䝉皇上曲宥矜全屢荷溫㫖慰諭臣銘勒五中感激無地惟有盡心竭力料理地方生生世世永圖報效而巳臣之屢請陛見者緣臣今年五十九歲非少壯可比受皇上特逹之知未獲面覲天顔叩謝洪恩實寢食夢寐為之不寧今傳奉上諭臣不敢即具疏復請但臣總督衙門每年冬春二季最為緊要而夏秋次之仰懇聖恩憐臣誠悃於夏秋之間調臣陛見倘䝉俞允并懇欽定可以署理之員俾得遵㫖交送印務合併奏聞臣謹奏陛見之行且緩楊文乾到任伊始其報效之志辦理之才固不必言或恐其過於勇往直前急求奏效反致有不妥帖處須稍遲時日歷練諸務候有㫖召卿來時總督印務即命楊文乾暫行署理也同日又奏為奏明西洋使臣回國日期事竊西洋教化王臣伯納地哆於上年六月間遣使臣噶噠都易德豐進貢臣委標下千總李成明護送赴京䝉皇上優加賞賜遣員送回於雍正三年十二月二十五日回到廣東省城值法蘭西夷船到粵貿易回帆使臣等即齎捧賜物搭法蘭西夷船開行回國訖住省西洋人仰沐隆恩無不感激愛戴所有搭船回國日期理合奏明臣謹奏知道了逺夷慕化而來惟宜示以恩德萬不可與之爭利切記同日又奏為奏明事竊照廣東之南海三水髙要髙明四㑹五縣上年七月內被水秋冬之間米價頗平至冬底春初日漸增長每石價至一兩以外臣即斟酌將被水村莊社倉所儲穀石本村之民支用外但積穀無幾難以遍及窮民查存倉穀石例應存七糶三臣到任時見地氣潮濕倉穀久貯必致浥爛經具疏題請每年春夏兩季兵米即於應糶三穀內碾米支給秋收徵穀還倉支給餘剩穀石照例平糶奉㫖俞允因上年初行衛所奉裁多有先徵米石給兵者未及赴倉碾穀又值米價平賤亦無人願買倉穀所以應碾者未碾而應糶者未糶臣見此時米貴將本年應碾給兵之外應糶者及時減價平糶并將上年未碾未糶之榖一并陸續平糶以惠窮民至五六月間即接早稻收成或早稻未收之先米價已平即可停止庶窮民免食貴米而倉穀亦得出陳易新奏明再雷州海塘雍正元年被颶風潮漲衝壞三千餘丈石閘一十五座臣已委雷瓊道王璠等帶員分界督修其南海髙要等五縣圍基臣委各地方正雜官并發粵試用知縣等分圍督修照河工之式製備木夯石硪分發各工教以使用之法每挑加上春雨降時草根生發草長根結則堤土可固又廣東有一種榕樹其根最多傍水可生臣於三植各工於十一十二兩月內節次俱報竣工尚有原未衝決而低薄者臣亦酌發錢米幫築髙厚仰賴皇上聖德格天川瀆安瀾海潮不至漲溢自可永保堅固矣臣謹奏覽雍正四年四月二十二日兩廣總督臣孔育珣謹奏為奏報雨水米價事竊照廣東廣肇二府屬之南海髙要等縣上年被水業經題奏奉㫖蠲免錢糧發倉賑濟其惠州府屬之海豐縣碣石衛潮州府屬之海揭等縣因去年秋雨稍多雖未成災收成減薄又因今春隂雨連綿天氣寒冷民間所播穀種不得發芽有穀之家藏匿不賣米價陡長廣州府屬每石一兩三四錢至六七錢不等惠州府海豐縣碣石衛每石二兩五六錢潮州府屬及南澳地方每石二兩八九錢及三兩不等臣等即將糶三倉穀及上年未糶之穀通行發糶又撥惠州府倉應碾三穀石雇備海船運赴碣石海豐減價平糶再撥惠州府屬之長樂興寧二縣倉穀由內河運至潮州府城及南澳平糶幸三月二十二日起天氣晴霽和暖禾苗巳俱栽插看來頗覺茂盛將來早稻豐收則百姓安享樂利矣至於南韶髙廉等府上年原未被水米價俱平再廣東場鹽全賴日色曬成自去秋至今春隂雨日多場鹽亦少合併奏明臣謹奏所奏知道了秋成難以預期諸凡當早為料理寧可備而不用毋至用而不備也同日又奏為奏報廣西米價事竊廣西舊歲原屬豐收惟臨江州縣間有被水之處亦不為害因今歲春季隂雨寒冷兼以商販搬運米價較前稍貴合算倉石桂林府每石一兩柳州南寧太平等府每石八錢九錢不等梧州府每石一兩三四錢不等撫臣汪漋照存七糶三之例現將倉穀通行平糶目下天氣晴暖稻苗茂盛栽插將遍理合奏明臣謹奏知道了廣西積貯尚屬有餘似可以無慮同日又奏為奏聞事竊廣東去歲秋收歉薄今春米糧漸貴經臣一面奏明將應糶三之穀發出平糶一面通飭遵行臣駐劄肇慶自二月初一日起每逢三六九等日每穀一石定價四錢二分零星平糶廣州南海三水二縣四鄉亦發倉穀平糶省城內係撫臣楊文乾自赴廣西採買米穀并廣東連州清逺等處買穀平糶至三月二十八九等日商船到省甚少米價陡長自一兩八九錢以至二兩省城閧傳云巡撫攔截穀船用官價強買平糶以致米穀不敢來省於三十日男婦老幼齊集多人在巡撫轅門求免官糶俾四路米穀放心前來米價可平始而擁集轅門懇求經管門人役趕逐繼則人多勢衆擁集大堂將公案執事打壞撫標兵丁進往擒拏現獲數十人衆人至晚方散當日責釋二十餘人尚留十一人官糶停止米價亦漸平減適臣於四月初四日到省㑹盤藩庫據巡撫楊文乾面說拏獲人內有將軍緑旗兵丁一名旗下人數名據將軍李杕說壯丁册內並無各人名姓巡撫現在發審理合奏聞臣謹奏此奏未得事之真情業巳遣部院堂官前往查審矣雍正四年五月二十八日兩廣總督臣孔育珣謹奏為微臣幸遂瞻天之願踴躍難名事雍正四年五月二十六日接吏部文開奉上諭兩廣總督孔育珣素諳河工事務伊從前屢請陛見今准其來京著先至河上詳勘水勢協同齊蘇勒將河工通盤修理事宜細加商酌妥議後請㫖來京兩廣總督印務著兵部侍郎阿克敦前往署理孔育珣俟阿克敦到廣後方行起身欽此臣聞命之下喜不自勝遵俟阿克敦到日臣將地方情形經手事務面相交代趨赴河工協同齊蘇勒將朱家口漫溢處所及通盤修理事宜商酌妥議敬請皇上訓㫖面叩天顔恭聆聖訓合先具奏臣謹奏如近日河工情景原可以不必令爾前往看視但總係北來便道至彼與齊蘇勒商酌一番亦未必無益同日又奏為奏報早禾豐盛事竊照廣東去秋薄收今春隂雨連綿米價漸貴幸三月二十二日晴霽自後五風十雨田禾勃發秀茂結實勝於往年早者現在收割遲者不過二十日內可以收齊恐厪聖懷理合奏聞再春初米價漸貴經臣奏明將應糶三倉穀并舊應糶未糶之穀開倉平糶臣駐劄之肇慶每倉穀一石定價四錢二分近城者分厰糶賣鄉間及被水地方撥載穀石就地平糶自二月初一日起至四月二十五日止共糶過貯府倉穀四萬六千三百石零飭將穀價貯庫俟秋收買穀還倉再髙要南海等五縣被水處所䝉聖恩豁免錢糧又䝉賑濟得慶更生歡呼載道其未成災地方有實係乏食窮民臣於肇慶東西北三門各設粥厰買米煮粥自四月二十六日起給粥一個月初時每日止二萬餘人日漸增多竟至五六萬人今早稻陸續收成令其各散回收穫合併奏聞臣謹奏朕在此正為粵東米貴憂慮覽奏朕懷甚慰同日又奏為彚報擒獲洋盜事竊臣因今春米貴窮民多有乘間偷越出海為盜者隨嚴督巡海官兵竭力查拏去後節據陽江縣報稱三月二十七日在太平驛地方營縣盤獲陳亞璉等二十二名詢係登岸洋盜又據香山協報稱拏獲行劫潮陽縣商船户洋盜談建平等三名押解前來供出同夥二十八人現將供出各盜分行提拏又據廉州府同知遊擊等拏獲一起曾玉等供出在海行劫載穀船一隻同夥十七人已經全獲等情除發按察司逐案審解撫臣審題外自拏獲數起之後海上已覺平靜且早稻登場米糧日賤出海為盜之人自少再查盜犯等行劫多在中路海面臣已將偷安不職統巡中路之護理虎門協副將事都司黃洪圖分巡虎門守備林石香山都司余元隆及千把總等俱題參革職以為怠玩之戒合併奏明臣謹奏能如此嚴緝盜匪以靖地方庶無忝封疆重寄甚屬可嘉同日又奏為酌議沿海緊要鎮營貯積穀石以備兵食事竊照廣東素稱魚米之鄉然生齒繁庶家鮮積蓄一歲兩次收成僅足糊口而潮州一府界連福建田少人多即過豐歲米價猶貴於他郡民間賴有常平捐積等穀每年平糶接濟惟營內兵丁家口日繁一遇米貴即食用難支臣細籌通省形勢擇其緊要者先為預備議於南澳鎮城貯穀二千石鎮屬之澄海協貯穀一千五百石海門營貯穀一千二百石逹濠營貯穀五百石潮州總兵駐劄潮州府城貯榖三千石鎮屬之黃岡協貯穀一千五百石潮陽營貯穀八百石碣石鎮貯穀三千石鎮屬之惠來營貯穀八百石平海大鵬二營各貯穀一千二百石又提標五營駐劄惠州府城貯穀五千石督標連水師六營及肇慶城守營貯穀七千石以上共貯穀二萬八千七百石連造倉運腳並穀價共該銀一萬六千零二十兩臣蒙聖恩補授兩廣總督收稅各府向有茶果銀兩臣經奏明除每年食用及一應公事之外尚有餘剩是皆皇上之所賞賜即為皇上兵丁貯穀備荒每年遇青黃不接時借給各兵於秋收散餉時令其照數買還槩免加息年年如是其穀責成各營將備經管提鎮盤查倘有侵蝕缺少題參追賠本應俟穀石買足之後題報今臣接到部文奉㫖陛見除咨明署督臣阿克敦行催各鎮營務在實買貯倉并題請定例永久遵行外理合奏明臣謹奏積貯穀石以濟兵食實為美舉且籌計亦屬恰當知道了同日又奏為恭繳硃批奏摺事竊臣陸續奉到硃批臣奏摺共一十六件臣俱跪接一一凛遵訖所有原奉硃批奏摺理合恭繳再臣於上年十一月內據瓊州府知府嶽綸將奉過訓㫖具摺回奏請臣代為恭進等情臣隨遣人齎摺進呈及奉到硃批知所奏與聖訓大相懸殊可見該員粗率鄙俚訓㫖下頒全無領㑹正在發回飭諭間而嶽綸已經撫臣楊文乾題參離任似無庸令其重寫進呈理合回奏臣謹奏知道了嶽綸真可謂庸材實係不應姑留之人雍正四年六月十五日兩廣總督臣孔育珣謹奏為欽奉上諭事雍正四年六月初八日臣齎摺人回粵奉到硃批諭㫖臣跪讀之下不勝歡忭踴躍念臣庸碌之人仰荷殊恩叨膺封疆重任未得一覲天顔恭聆聖訓犬馬依戀之私日夕難安是以不避瑣瀆屢次陳請今䝉恩准得遂微忱河工事宜臣前任邳睢同知時所管不過偏隅識見有限總河臣齊蘇勒任事年久料理自必合宜臣先到河工與之和𠂻商酌悉心籌畫盡臣愚見請㫖遵行臣候阿克敦到來所有一切事件并地方情形臣當逐一向其說知然後遵㫖起程所有欽遵緣由并奉到硃批諭㫖理合恭繳臣謹奏今春因朱家海決口合龍復潰朕心甚憂猶幸桃汛伏汛水勢平靜諒無大患矣卿仍遵前㫖過淮見河臣齊蘇勒與之悉心商酌可也議奏藍鳯條陳六事所議甚是摺留中待卿到京面諭雍正四年七月二十二日兩廣總督臣孔育珣謹奏為奏明防禦狆苗遁逸事案照雍正四年五月二十四日准廣西提臣韓良輔咨准貴州提督馬㑹伯咨開廣順府屬長寨羊城坉等處因擒拏狆賊阿進等一案安汛設塘乃各寨狆苗恃險塞隘不容修建營房巳調官兵撫剿恐凶苗奔逸鄰省請檄交界營汛撥發官兵堵禦等因到提督轉咨到臣除附近交界營汛經提臣飭撥官兵防禦外臣即檄行廣西思恩府知府㑹同營辨嚴加堵禦去後本年七月十五日據思恩府屬之西隆州禀稱探得貴州提督調發官兵進剿狆苗五月初七日分路前進已取得長寨并十三小寨今凶苗俱奔至羊城坉上其地髙險官兵現住長寨地方坉後係大箐界近粵西徑通泗城等情禀報到臣臣即分飭廣西按察司思恩府并思恩副將泗城副將等多撥官兵在於交界要隘處所㑹同堵禦毋使凶苖遁逸仍將情形不時探報等因并咨廣西貴州撫提諸臣查照各在案事關防禦凶苗理合奏聞臣謹奏此事朕曾再三籌度狆苗甚為跳梁非加一番懲創不可因命舉行今據該撫提諸臣奏報業經剿撫平定矣同日又奏為奏明事竊臣題覆原任撫臣年希堯疏參鹽商查良石即石興祚控告髙州府知府郭志道套埠志道有套埠吞本聽撫臣另審外臣查此案緣湖廣糧驛道許大定虧空銀米供出石興祚借缺伊銀七千兩准湖廣巡撫咨追石興祚業因鹽餉未完將商名查良石告退躲避獲後控官旋即病故臣於伊子石之瑜名下追銀完項在案今准部駁內開石興祚因不能完餉告退何病故後伊子即能將七千兩之項照數完納等語指駁誠是但其間實有隱情彼時石興祚見伊子被獲自知難免遂具套埠吞本情詞將郭志道控告以圗推卸未經質審遽爾病故伊子石之瑜質對無辭竟自承認臣思石之瑜乃異鄉赤貧之人承認銀七千兩係抵補許大定虧空帑項難容懸待轉飭承審各官完銀定案郭志道係解任質審之員以為是非已得明白急圗結案暗中代為完項臣以帑項為重知此情由聽其代完是實但不早為奏出愚昧之罪無可置辨理合據實奏明仰祈聖恩矜宥臣不勝惶悚畏栗之至臣謹奏是非自有定論朕亦豈得偏私俟該撫審明結案後看雍正四年十一月十五日兩廣總督臣孔育珣謹奏為奏聞晚禾收成米糧價值事竊照廣東省廣惠潮三府屬低田晚禾於七八月間兩次被水經撫臣楊文乾㑹題在案今據布政司詳委幹員查勘惟廣州府之東莞增城清逺花縣與惠州府之歸善博羅共六縣沿江低窪之處成災幸俱未多目下栽種雜糧亦甚茂盛其餘各府州收成自六七分以及八九分不等通省合計約有七分米價廣惠肇韶南五府屬每石自一兩至一兩二三錢不等潮州府屬每石一兩五六錢髙雷廉三府屬每石自七錢至八九錢不等至廣西省晚禾通省收成俱有八分各屬米價每石自六錢起至九錢一兩不等兩省地方寧謐合并奏聞臣謹奏覽兩廣秋成深慰朕懷同日又奏為奏明微臣交印起程日期事竊臣於六月二十日准兵部咨開奉㫖廣州將軍員缺著阿克敦署理俟石禮哈到廣州阿克敦將將軍印務交付石禮哈之後孔育珣再起程來京孔育珣起程之後阿克敦再署理兩廣總督印務欽此今廣州將軍臣石禮哈於十一月初九日抵廣州任臣欽遵聖諭將一切事宜備悉與署督臣阿克敦說知於十一月十六日交印起程所有雍正三年九月初七日奉到海洋事宜硃批諭㫖一道與硃批臣議覆金鐸條奏摺一道因撫臣楊文乾提臣萬際瑞尚未畫一議覆不能㑹奏今臣起程遵將諭㫖二道面交署督臣阿克敦俟撫提二臣覆到㑹奏所有微臣起程遵㫖先往河工日期理合奏聞臣謹奏毋因急欲見朕將河工事宜不行詳悉商酌而草率塞責亦不可故意耽延稽遲日月雍正四年十二月二十九日兩廣總督臣孔育珣謹奏為奏明微臣已到河工日期請㫖恩准協理河務事竊臣遵㫖自廣東肇慶府起程先往河工日期業經奏報在案今於雍正四年十二月二十九日至江南徐州地方由邳宿桃源清江髙堰中河一帶查勘至於應行修理緊要之處臣必悉心相度再同總河臣齊蘇勒通盤商酌另奏外臣思河工關係重大兩廣地方雖屬緊要然內外諸臣才堪辦理者多而曾任河官者少臣壯年時曾為河員於河務略有分曉現今䝉皇上軫念民生不惜帑金修築一切緊要工程俾萬世永賴伏懇我皇上天恩賜臣以副總河職銜協同催督工程相地防險奔走查勘以佐河臣齊蘇勒精力之不逮臣盡心竭力務期和衷共濟以盡臣區區圗報之愚衷仰懇聖恩俯允再照前奉聖諭將修理事宜妥議後請㫖來京但臣瞻天念切懇恩准臣同河臣㑹議具題後一面即起程赴京合先請㫖恭候命下欽遵臣謹奏仍遵前㫖行毋違至於爾之宜廣宜淮朕自權輕重而酌量任用硃批諭㫖卷七之二欽定四庫全書硃批諭㫖卷七之三硃批孔育珣奏摺雍正五年二月十五日兩廣總督臣孔育珣謹奏為奏聞事竊臣欽奉諭㫖先至河上詳勘將通盤修理事宜細加商酌臣遵同總河臣齊蘇勒逐加㑹勘酌議業經河臣㑹疏具題外臣查黃河自徐州地方起至安東縣止一路詳勘兩岸嵗修各工俱屬平穩朱家口已經合龍又築月堤一道工程不日可竣看來亦可穩固惟宿遷縣治之西黃河與中河相近處建有草壩名曰汰黃壩運河水大則清水分流由汰黃壩入黃河以刷黃如黃河水大則黃水分流紆回由汰黃壩入中河以濟運實屬有益查從前入中河濟運者黃水十分之一二近今黃河南岸長一沙嘴逼溜北行其黃水歸入黃河者十分之六入中河濟運者十分之四且水流亦急臣看此處頗有關係因三次親歷其地詳細確勘併與河臣確商齊蘇勒以為將汰黃壩兩壩向中俱進掃兩排壩口收小以束水勢即可無虞現在下掃臣猶不敢放心又加詳勘見南岸沙嘴之上黃水灣曲處可挑引河以避此險如果汰黃壩收小之後水勢平緩則應致有厪聖懷也臣原擬將勘過情形面奏今於宿遷縣地方接准部文奉㫖命臣㑹勘江南水利有稽時日合先據實奏明臣遵於本月十五日即赴清江浦㑹同前往勘議妥確㑹題臣謹奏所奏知道了江南水利詳悉籌畫㑹奏以聞雍正五年五月二十九日兩廣總督臣孔育珣謹奏為恭謝天恩事竊臣於㑹勘黃河議興水利事畢即遵㫖赴京親承陛辭日荷聖恩錫賚日飽天厨異味錫以宸翰賜以冠服種種隆恩優渥難數我皇上孝思純篤以臣為聖祖仁皇帝舊臣特賜臣聖祖所遺寶玩俾臣長瞻手澤廣錫類之𢎞仁極人臣之榮寵臣何人斯膺此皇上髙厚之恩於萬一耳臣䝉聖恩准假六日臣於五月二十三日抵汶上縣地方與臣兄孔育琮手足相聚闔家老幼叩謝天恩於五月二十七日前赴闕里拜祭畢即於二十九日起程赴廣俟回任後照例繕疏另行恭謝天恩外合先具摺奏謝臣謹奏覽同日又奏為欽遵聖諭事竊臣受皇上隆恩世世子孫圖報不盡臣第三子孔𫝊焯原捐通判應升臣受恩深重臣子正當共效犬馬之報不揣冒昧奏懇皇上請將臣三子孔𫝊焯以侍衛效力荷䝉聖恩面諭臣欽遵俞㫖即令臣子孔傳焯齎摺叩見皇上并代臣奏謝𢎞恩臣謹奏已有㫖矣爾子孔𫝊焯若用為武職殊覺可惜但觀其志趣似近於華而不實宜亟加教誨令伊務一實字同日又奏為奏明事竊臣於五月十三日陛辭出京一路所過州縣地方留心訪問官俱循分供職民亦相安樂業惟至闕里廟工處所臣見有堆貯做就石料并燒成磚瓦而並無匠作興工臣細問情由據曲阜縣知縣孔育琚口稱原任巡撫陳世倌差委都司鈕國璽領銀採買木料將買來木植沿途私賣現經巡撫發按察司審訊聞得鈕國璽已將私賣情由供認所有運到木植與原估之式不合所以未能興工等語臣思皇上發帑興修實萬世之曠典自應盡心辦理速行儧工告竣以垂不朽都司鈕國璽何得採買木料多不合式且任意沿途私賣玩誤欽工殊屬不法撫臣陳世倌並不仰體聖心慎重欽工遴選賢員混行差委以致侵冒誤工更屬不合為此據實奏明臣謹奏此事經塞楞額據實奏聞朕己特降諭㫖命其嚴查矣雍正五年八月十九日兩廣總督臣孔育珣謹奏為奏明補栽晚稻情形事竊臣恭聆聖訓回任路由廣州府所屬三水縣及肇慶府所屬髙要縣地方見沿江圍基以內田畝積水未消晚稻未栽臣詢之農人僉云本年五六月間雨水過多兼以江水漲發經久不消各竇不能泄水以致圍內水深是以不能栽插將來水即消退亦無力買秧補種等語臣思三水髙要兩縣圍內之民較之别縣為稍貧若聽其收成無望將來補救益難臣於七月十九日回署即䖍心默頌皇上訓臣㫖意步禱至天妃廟祈求水退一靣發銀差員購買民間栽剩秧苗竊喜仰賴皇上至誠感格十九二十二十一三日之內江水陡退各圍竇門俱開積水暢泄圍內田畝陸續悉行乾出臣將差員所買秧苗俱散給兩縣各圍百姓十日之內皆已補栽完畢現在禾苗青茂嗣後雨水及時可得晚收是皆仰賴皇上之福庇也臣謹奏人神交感之理實如影響但以公誠祈禱未有不應者若瀆諂營私則不能遂所願也同日又奏欽惟我皇上垂念民瘼各省收成米價時厪聖懷臣回任路經南韶以及廣肇屬縣見晚稻栽插俱青茂可觀其餘各府亦栽插完畢近今米價肇慶每石一兩四五錢廣州一兩五六錢南韶惠羅定各府州縣或一兩二錢一兩三四錢不等髙雷二府亦一兩一二錢不等惟潮廉瓊三府因去歲歉收較他處為貴屬縣內有賣一兩八九錢暨二兩外者將來若得晚稻豐登米價自必漸減理合據實先行奏聞臣謹奏粵東米價原屬消長難憑目下一時稍昻似無足慮同日又奏臣於陛見時䝉皇上諭臣潮州分司俞文耀為人甚猾臣以文耀錢糧清楚其為人猾處未能看出回奏既而出都途中每自思忖我皇上睿智天錫觀人一言一動即已洞徹隱微文耀為人自難逃於聖鑒臣一抵肇慶查其督收場鹽玩忽從事果不實心辦理隨經具疏糾參但臣識見淺陋愧乏知人之明惶悚無地嗣後惟有加意訪察不為屬員所蔽以仰副我皇上任使之至意臣謹奏觀人之難大抵皆同何敢保其必不悮也似此亦不過偶然符合耳同日又奏為奏聞事竊臣據肇髙廉羅道王士俊詳報黃江厰典吏李長茂重役朋充髙要縣知縣姜𢎞焯朦混出結並李長茂用銀一千二百五十兩賄鑽布政司陳庫官方肯詳院給劄等由到臣經臣批行按察司㑹同肇髙廉羅道嚴審實情通詳核奪去後臣又面訊髙要縣知縣姜𢎞焯隨據禀稱黃江厰現在填單書吏鄧作斯原係肇慶府錢科典吏五年役滿因在厰中白役一年隨串同李𢎞材投認厰吏李𢎞材等許本道王士俊心紅銀四百兩本道即牌行卑縣督取印結卑職不肯出結遂挾嫌通詳等語臣又詢據按察使方願瑛口稱從前肇髙道王士俊曽向署撫常賚要將李𢎞材投充典吏因常賚不允不能獨得心紅銀兩是以挾嫌通詳等語其重役朋充一案尚未審詳於雍正五年八月十四日准署撫臣阿克敦移送疏稿以該道王士俊欺隱黃江厰稅羡銀一千二百餘兩題參摘印除俟按察司方願瑛分别審詳外理合將道詳縣禀各由據實奏聞臣謹奏已有㫖矣爾係知朕之人非他可比百凡惟以公當為主萬不可絲毫涉於瞻狥官達方願瑛二人皆深負朕恩於中若少有瑕釁切毋為之隱蔽秉公察審明白具奏陳祖訓原係朕記名好官近日始廉知伊任汀州鎮時將陳有功在任年久廢弛營務之處並不奏聞亦不行整理甚屬不及兹南澳一鎮更為緊要何可如此因伊人材可取姑豫寬恕俟其請安奏摺到來當切加訓諭朂伊改過但恐下愚難移怙終不悛爾其時刻留心查訪奏聞雍正五年九月二十九日兩廣總督臣孔育珣謹奏為南丹礦徒遵法解散事竊臣欽奉皇上靣諭廣西南丹土州礦徒一事臣回任後即差標員前往確查路由栁州府提臣田畯亦差守備㑹同前去臣又行知河池州河池營協同差辨齊至南丹地方帶領南丹土知州莫我謙確查前項礦徒如有聚集即宣布皇上德威曉諭礦徒總督仰體皇上好生之仁不即發兵𠞰捕須速解散等語隨據河池州營禀稱查勘南丹錫厰共井礦四十餘處礦徒及住家開鋪人等約有萬餘人曉諭之後咸知遵法內中單身傭工者即時散去其帶有家室居住者亦俱雇夫挑運行李陸續搬散淨盡等情續據臣差標員回肇禀同前由并取有土官印結等情臣查南丹錫礦界聨貴州之獨山州及豐寧上下土司自宋至今黔楚之民時聚偷挖雖歷來從未生事亦不便任其聚集今仰賴皇上德威逺播礦徒盡散地方自可永靖除臣一靣知㑹黔省并飭行廣西文武仍不時查察外所有南丹礦徒遵法解散緣由理合奏覆臣謹奏欣悅覽之南丹礦徒聚集已久今如此不動聲色一旦散去朕實未料及即泗城土府之事亦出於意外凡此皆仰賴神明默助聖祖在天之靈護佑之所致朕感幸之懷莫可言喻同日又奏為場鹽盛産事竊照廣東場鹽缺收臣回任後將怠玩督收各官題參在案今臣又委官嚴飭各場耙曬八九兩月天氣晴明場鹽盛産現在源源配運我皇上愛恤商民恐致上厪聖懷合將鹽斤盛産情由奏聞臣謹奏場鹽盛産民無食淡之虞朕懷深慰同日又奏為奏明催補倉穀事竊臣回任後查廣東省倉穀自臣題請每年存七糶三於糶三之內碾支兵米將民間應納糧米秋成徴榖還倉兵民兩便雍正三四兩年間廣惠潮等府偶因被水歉收賑濟之外其平糶接濟貧民者甚多廣西省平糶穀石未曽買補者亦不少查詢各屬均稱榖價尚未平減須得陸續還倉臣隨嚴加檄飭務期買補足額現在兩省各屬俱上緊採買雖現今民間收成不等榖價貴賤不同其各屬平糶原價有敷亦有不敷臣念倉儲關係重大必不肯令屬員藉此挨延惟是我皇上愛惠元元倘因一時買榖數多將來或致米價昻貴臣當查明所買倉穀果係缺額無多臨時㑹同撫臣酌量據實奏明另行請㫖遵行合先奏聞臣謹奏所奏是隨時制宜酌量為之同日又奏為覆奏事竊臣欽奉皇上靣諭張象乾原因怡親王保舉所以用為知府朕聞伊從前聲名不好朕在藩邸時如傅鼐博爾多俱是自幼在門上行走之人因伊等後來做官不好朕俱執法處分豈有怡親王保舉之人做官不好朕不處分之理可傳㫖與張象乾令伊改過勉力做好官欽此今於雍正五年八月二十四日據惠州府知府張象乾到肇謁見臣敬將靣奉聖㫖密傳訖理合奏覆臣謹奏再三教導留心察驗雍正五年十一月十六日兩廣總督臣孔育珣謹奏為奏聞晚禾收成米糧價值事竊照廣東今歲晚禾髙雷廉瓊四府收成俱有九分十分米價每石自五六錢以至八九錢不等南韶二府收成約有八分米價每石八九錢一兩不等惠潮二府收成約有六七分米價每石一兩五六錢不等廣肇二府收成亦有六七分米價每石一兩二三錢不等其廣西一省通計合算收成約有八分理合奏聞臣謹奏覽收成米價情形深慰朕懷同日又奏為奏聞辨兵捕盜傷故事案據廣東肇慶協副將李斯援報稱髙要縣金利墟民黃德公等鋪於本年八月二十一日夜間被盜行劫鄉勇兵丁救敵當場殺死賊犯一名鄉民被賊傷故二名有肇慶協左營把總陳章帶兵接續追拏賊犯放鎗傷故把總陳章并兵丁劉鳳陳武二名隨陸續獲賊黃亞三陳亞六等移解髙要縣收審等情據原署縣黃六吉及現任髙要縣知縣戴維賢先後報稱訊據賊犯供稱同黨三十二人為首係黃翻眼下手傷故官兵係大春四黃亞三等今現獲黃翻眼大春四黃亞三等二十六名殺死關日上一名未獲亞澤十三亞短長腳六關亞六五名等情經臣檄飭嚴拏未獲各盜并審招解去後查把總陳章捕賊身亡深可憫惻臣親加致祭并將傷故兵丁二名家屬俱重加賞恤以示鼓勵查開疏防職名另參外所有辨兵捕賊傷故並現經獲賊緣由合行奏聞臣謹奏未獲盜犯飭令嚴緝毋致少有疏縱及隱飾情弊同日又奏為奏聞事竊查廣西思明土府屬鄧橫安馬那練蕾蓬四寨其地鄰近交夷各寨土民周圍種竹挖濠往往恃蠻不法盜剠牛隻搶奪客貨并彼此尋仇捉人勒贖臣回任後委思明府同知帶同城守把總前往該寨曉諭令其清查煙戶砍竹填濠勒拘有名罪犯繳出軍器如果改惡自首准豫從寬倘敢違抗即撥兵擒捕去後今據思明同知等報稱於夲年十月初二日前往各寨曉諭該地土民悔罪求寬砍去圍竹露出村莊土濠填塞繳上鳥鎗十五桿并將搶牛捉人各犯莫賔昌黃選髙等解出各寨造具煙戶細冊出具改惡遷善甘結并據廣西升任按察使徐湛恩轉詳前來臣仰體聖慈念土民既經革心悔過准豫自新從寬分别責結如有再犯倍加懲處批行發落在案所有清查過鄧橫四寨緣由理合奏明臣謹奏既取有改過自新甘結存案自應姑免重懲再犯不可絲毫寬宥同日又奏為奏聞西洋官商在澳慶祝萬夀事竊據惠潮道樓儼禀稱奉署巡撫阿克敦行委陪御史常保住伴送西洋使臣麥德樂歸國於夲年十月二十六日前至香山縣澳門西洋使臣麥德樂等請於十月三十日率領兵目理事夷商慶賀萬夀御史常保住再三宣諭我皇上崇尚節儉不事繁文西洋使臣麥德樂等僉稱皇上深仁厚澤加惠逺人實為異數謹擇於天主堂誦經恭祝聖夀並非别樣虗文等語常保住見其感激出於至誠不能勸止至期夷官商民排班行禮䖍誠慶賀於十一月初一日常保住在澳起程回京等情到臣理合據報繕摺奏聞臣又聞御史常保住一路廉靜待夷人亦甚得體合併奏聞臣謹奏此奏與朕所聞不侔比聞常保住一路將麥德樂視為竒貨到處多索人夫騷擾地方諸事過當殊傷國體在麥德樂自應感激其如中國體統何果否如此據實奏聞毋因此奏在前少存回護致涉容隱雍正五年十一月二十六日兩廣總督臣孔育珣廣東提督臣王紹緒謹奏為酌存營中公糧以辦公務事竊查廣東地方山海交錯防範彈壓全重整飭營伍臣等荷䝉皇上天恩職司全省兵馬敢不實心釐剔以期餉無虗冒兵皆精鋭仰答𢎞仁而營中實有公用有不得不直陳於聖主之前叩懇聖恩者臣等查水陸各鎮協營每年辦理公事俱有必需公費臣孔育珣在京陛見時仰見我皇上於一切營伍情形無不洞悉機宜周詳籌畫今營中公用臣等何敢隱瞞謹再四㑹商與其任各營虗扣掩飾不若酌留公糧定其數目核實支用議令各營按照額兵多寡在陸路營合馬步戰守每兵一千名內酌留守糧三十名水師營每兵一千名內酌留守糧四十名將銀米留貯在營以支公用倘於定數之外再有空糧并扣尅虗冒等弊查出嚴參治罪如是則營中公事可辦混冒影射可除似於營伍有益是否可行恭請聖明指示臣等謹奏總在卿等揆情酌理料理合宜雍正六年二月初六日兩廣總督臣孔育珣謹奏為添委土官協丈歸順公田事竊廣西歸順土知州岑佐祚請將公田苗價銀六千五百兩歸公充餉臣經題報并請委思恩府知府陳堯賢勘丈在案但查此項公田原為土州世業向因岑佐祚年幼襲職其母許氏行止不端多有私用印照將田分給親狎頭目久巳據為己有厥後許氏雖經物故而岑佐祚懦弱頭目强悍不能清回往往致訟是以詳報歸公臣思流官知府恐有未諳土俗事宜而土人蠻野性情難測臣查有田州土知州岑應祺頗能出力辦事且又熟諳土情隨委協同查丈倘有土棍阻撓易於拘拏方為安妥再公田清丈之後如土知州岑佐祚查無别項養廉臣當與撫臣酌撥養贍數目一并具題請㫖以廣聖恩合先奏明臣謹奏所奏是其岑佐祚養贍當寬裕賜給勿令窘乏凡經理新定改流州縣但以安輯地方為要至於財賦細事不宜與之錙銖較量致令無知土人不信國家救民水火之心反謂貪其地土戶口也此事關係甚重若稍辦理不妥將來追悔莫及當深體朕心籌畫盡善毋忽同日又奏為欽奉上諭事雍正五年十二月二十五日署廣東布政使王謨署按察使尹繼善同到臣署密傳聖諭臣謹祗領竊查肇髙道王士俊具揭解任布政使官達等一案臣准到部文經檄委署藩司王謨署臬司尹繼善㑹審詳解在案今撫臣楊文乾回任路經肇慶至臣衙門靣商又添委糧驛道何師儉鹽運使史在甲㑹同布按兩司審理俟詳解到日臣當遵㫖與撫臣楊文乾將軍臣石禮哈從公審出實情具題請㫖所有臣奉到上諭緣由合先奏覆臣謹奏秉公審理務得實情具奏以聞同日又奏為奏聞泗城户口田土事宜事竊查泗城土知府岑映宸奉㫖革職地方改土歸流以紅江為界江北歸黔江南歸粵一應户口田土錢糧及所收土官自食官莊田米據黔粵委員并泗城知府劉興第等冊報到臣經臣批行布政司查議在案嗣准原任廣西撫臣韓良輔疏稿據泗城協副將王大綬貴州貴陽府同知黃世文雲南楚姚鎮標遊擊馮鸞等禀稱官莊族役田可變價二萬餘兩題請變價并查現在收米不止知府劉興第所報之數等因又據泗城知府劉興第詳稱土知府自食官莊五百二十六白之田除應給武舉岑映翰存祀并尚有老土知府眷口亦得量給未可概賣其族目久工各役之官田一千八百五十六白分食已久役既裁革若賣其田即數百家失業且奉民搬運卑府通詳又獲罪於武員故以難行之事責令辦理若不瀝情具詳致生事端罪恐難測等由各到臣除批廣西布按二司確議外臣查官莊族役田二千三百八十二白除遵㫖酌給武舉岑映翰留祀等項外多者自應變賣歸公而據該知府劉興第詳稱族目久工各役既有數百家分食已久又當仰體聖慈不可令其失業致生事端臣愚以為右江鎮臣假良輔所題二萬兩之數而內哨官田有九千九百餘白即照知府劉興第所議每白上稅一兩約可收銀一萬兩又每白徵銀四錢每年可額徵銀四㫖臣然後咨㑹廣西撫臣雲貴督臣㑹商舉行再泗城副將王大綬前因其漢仗弓馬頗優是以考列一等咨部今有此貪贓與守備龔進忠容臣另疏題參合併奏明臣謹奏王大綬朕亦甚為奬賞人明白才具可取前泗城總兵缺幾欲將伊擢補因疑其心缺誠實所以未用今果若此矣但其受賄情節當詳加推原必得實據方為不誣不可因文武不和據一面之詞即行糾參豫受之際蓋必有由如或出於土官情願餽遺從前無强逼勒索之狀受後無枉法廢公之舉不過托交接之誼染指些須猶可念其向日效力處等其功罪而量加處分也同日又奏為奏明安插廣東自首賊犯事竊臣於上年十月間訪聞清逺四㑹等縣交界山場有賊徒潜聚隨密飭撥兵分布擒捕賊徒知風於夲年正月初四日為首馮友順帶同夥衆朱相泰等二十七名赴臣轅門投首又於二月初五日據清逺縣遊擊禀稱有馮友順同夥邱及蘭等一十七名赴清逺縣該將衙門投首今帶押前來驗訊一并安插等情據此臣訊據各犯供係廣東潮州惠州韶州并福建人民平日種藍燒鐵舂香粉等業生意微薄商欲為盜聞得發兵拘拏各人出來投首求生實未有劫過村莊等語臣查驗各犯俱係壯年若令回籍安插未必始終安分若欲處治伊等既屬自首又均供並未行劫現在亦無發覺之案臣因挑選人材壯健之馮友順等七名分發臣標充伍食糧溫盛開等十三名分發各鎮協營食糧均令其用命捕盜其廖文普等十四名因順德等縣巡緝私鹽向設巡丁給發口糧臣即發令充當使有拘束臣於賊犯不敢寬縱今因其投首向化自新是以酌量羈縻視其後來果能出力即為有用若有違犯立可處治是否有當合行奏明請㫖臣謹奏卿留心緝盜實屬可嘉如此料理安插亦屬得宜但聞粵東向年督撫輩已有先此行之者無如凶徒率皆積年劫虜為生飲酒食肉習慣成性不甘營伍之勞苦淡泊旋復逸去為匪如故更因此輩盜賊出身入伍食糧未免為衆所賤每不能日久相安要當詳審為之恐暫時羈縻終貽地方異日之纍不可不預為防範也朕意謂此等凶徒匪類竟無可寬恕不若盡法懲處為上餘無他策然似此自首並無行劫之案者則又當一論耳惟慈祥二字斷不可施之於盜賊貪吏切戒切戒同日又奏為奏明事竊臣准刑部咨開雍正五年十二月初五日准正白旗漢軍都統咨稱夲旗劉漢傑佐領下工部尚書兼都統黃國材名下應追捐榖等項銀共二十五萬餘兩一案據黃國材呈稱賠項甚多無力完交所有各處房地家産盡行變賣以完賠項兹有從前交過兩廣總督孔育珣銀七千兩代置房地即係制臺族人之産俱在山東地方我係旗人不便前往守賣理合開單呈明咨部轉行將我山東房地仍交代置之總督孔育珣查收將原價銀七千兩照數還給凑解賠項等情轉咨到臣竊臣於康熙五十六年間任廣西按察使時今尚書臣黃國材前任廣西布政使與臣同寅黃國材曽托臣代覔山東産業臣再三推辭逮後臣家人韓啓因染病回家黃國材聞知又欲差人同往臣云爾公子黃炳現任山東臬司何難尋覔黃國材云他既現任不便出名我已寫諭呌京裏辦理家人到山東候我這裏自已差人送銀去並不要你的家人經手置買只要他向牙行裏說一聲等我家人自已成交有何難處等語臣因同寅中不好推托曾囑臣家人韓啓說知牙子事則有之今黃國材忽稱交過臣銀七千兩代置房地係臣族人之産請將房地交臣查收給還原價殊可駭異查産業原非臣為伊代置自應仍令伊原經手家人覔售若以臣住居山東而隨憑空壓受殊非情理但臣從前囑臣家人帶信傳說亦屬不合臣情願備銀一千兩交黃國材添完追項以罰臣從前不慎謹將情由據實奏明伏乞皇上睿鑒謹奏此事黃國材大錯矣朕已諭伊自行料理兼諭該旗部辦理此事者矣據奏助銀一千尤屬不可卿如此毫不顧忌據實陳奏朕甚嘉之可謂深知朕意至卿凡所辧理奏聞之事寬嚴適中尤愜朕懷朕實嘉恱之至勉之莫移此志雍正六年三月二十二日兩廣總督臣孔育珣謹奏為奏明修葺沿海炮臺營房事竊查廣東沿海營縣設立炮臺經前督臣楊琳題明著各州縣時加修理入於交盤案內出結申報嗣因沿海地方風雨較內地更大炮臺營房易於損壞各州縣雖有交盤之名終少修理之實臣查海防關係緊要不便任其遲緩於上年十二月內分檄嚴飭各府委官協同營員勘估并查點炮藥器械去後今已據各府申報前來各縣有已經修理完工者有現在興修者有尚未興工者其需用工料無多之炮臺營房各州縣自為修葺其有炮臺多而工料繁者州縣力不能修恐有遲誤臣亦酌量幫給修葺俟各處工完之日另行奏聞合先奏明臣謹奏海防緊要如此留心甚好實力為之務期與所奏相符同日又奏為奏明分賠廣西司庫俸工銀兩事竊據廣西布政使郭鉷詳稱粵西雍正元二兩年俸工銀兩內有前司王沛憻護司張若霈前司劉廷琛任內餽送欽差并主考路費共支用銀九千七百八十兩俱係酬應交際之費並非地方公事不便開除查前司王沛憻等支用銀兩之時俱在院臺任內是否院臺與前司公同支用應否補還惟候批示等情到臣臣查各省捐解俸工於雍正元年九月十一日奉㫖停止臣廣西巡撫任內未提州縣耗羡地方應辦公事將未經奉㫖停止以前提貯司庫之俸工公議照依向例支用今廣西布政使郭鉷所詳支送欽差并主考路費共銀九千七百八十兩實臣任內與正署布政使公議動支之項該司以為酬應交際之費不便開除乃慎重庫項殊為公當臣名下應分賠銀四千八百九十兩現在湊發廣西布政使貯庫外至此項俸工解支已久官役無可給還廣西地方公事現有提解州縣耗羡二分辦應無所支用相應報部充餉所有臣認賠銀兩緣由理合奏聞臣謹奏知道了但此項銀兩不應報部充餉仍存之夲省以為地方公用可也同日又奏為奏聞撥兵擒捕西隆土目事竊查廣西西隆州之八達寨其地山深而險有土目顔光色顔光東弟兄最為頑惡今於夲年三月初五日准廣西提臣田畯咨據署上林營守備呈稱顔光色顔光東於正月十八日帶領土蠻千餘與弄忙亭尋仇虜去者莫者岡等寨人口牛隻殺傷人命至今不肯解散請撥兵擒捕等語臣隨經咨㑹提臣撥發官兵㑹同該地方文武務期將為首之顔光色等擒拏到案并知照貴州安籠鎮臣蔡成貴於黔滇交界營汛堵禦以防遁逸俟捕獲之日究訊另行具奏外所有臣飭撥兵丁擒捕土蠻緣由合先奏聞臣謹奏據各提鎮等業俱奏聞矣事關撥兵𠞰撫須當詳愼辦理同日又奏為奏聞協捕楚省賊徒事竊臣據廣東連陽營遊擊趙國志禀稱夲年二月二十一日准湖廣永州鎮標左營遊擊公移據寧逺汛把總禀據生員荆之寶報稱夲年二月初一日夜被大盜數十餘人各執鎗炮蜂擁入家虜去姪男五人殺傷男婦三人現帶兵丁搜緝希於接壤隘口堵禦擒拏等因前來隨飭附近楚省交界汛辨帶兵堵擒去後嗣准永州鎮標遊擊署臨武營參將張起鵬公移內開據永州鎮標營員帶領馬步兵丁到寧逺縣移稱前行劫荆之寶家賊夥嘯聚深山地名楠竹坪地方查道州江華越嶺即係藍山所轄夲月十八日經左營楊遊擊帶兵進𠞰失利聞得賊衆意欲潜逃希飭所轄各㲹辨嚴加堵禦擒拏等因准此卑職除再委把總帶兵星馳於楚省藍山交界地方堵禦外理合禀報等由到臣臣即檄飭三江協副將張傑連陽營遊擊趙國志速令備辨督兵飛馳分布協捕復檄文員帶領捕巡練役探緝并委標員星往持文守催督令文武堵禦協捕外合行奏明臣謹奏湖南此案情節據該省文武俱經奏聞矣料理甚屬周詳妥協同日又奏為遵㫖稽查採辧木植事竊臣接怡親王及大學士等寄字內開雍正五年十一月二十九日奉上諭各省採辦木植等項俱著該督撫遴選賢員辦理照民間價值給發不許絲毫扣尅時加察訪倘稍有不遵必將該督撫一并從重治罪欽此欽遵寄信到臣臣查廣東採辦木植係遴委廣南韶道林兆惠敬謹辦理查廣東木植産於清逺縣之黃華峝吉河從化縣之大坪三丫塘等處深山據該道禀稱從化之木係仙娘溪五寨居民公山清逺之木官山與民山各半屢喚鄉民領價俱稱此係萬年吉木小民受萬歲深恩報答不盡斷不肯領受價值今奉皇上聖諭又復再三勸導據稱既然萬歲如此恩典我們公議俟這地方共採過合式木植若干一總公領價值等語其價照時值估計候給領後冊報至於一切打造器具工匠與砍木運木人夫等項俱照民間工價給發並無短少等語臣留心訪查果無尅扣其廣西省採辦木植尚未據有報到所有臣欽遵聖諭并現在採辦無尅扣纍民緣由合行奏覆臣謹奏果如所奏甚好此番採辦木植若令小民有一人含怨日後聞於朕耳卿追悔莫及一切動用錢糧寧費毋省同日又奏為遵㫖奏覆事竊臣前奏西洋官商在澳門慶祝萬夀又聞御史常保住廉靜待夷人得體一摺奉到硃批臣跪讀之下惶悚靡寧臣查常保住伴送西洋使臣麥德樂來廣臣駐在肇慶來回俱未㑹面因問之見過常保住之署南海縣知縣周天成據云其人安靜待西洋人和氣臣又聞省城各官公送程儀八百兩常保住不收臣以一時所聞遽以廉靜得體具奏實為愚昧兹奉聖諭臣欽遵細行密查常保住伴送麥德樂回廣除勘合口糧夫船之外每站另有幫貼夫船其經過廣東各站伊之前站家人抄填勘合索銀二兩小包銀三錢亦有得銀四兩者座船吹手厨子火夫視站之逺近各縣額外幫貼銀數錢以至數兩不等額外水手人夫二百二十餘名每名幫銀六分以至一錢不等常保住回京除勘合之外亦另有夫船前站家人抄填勘合亦仍需索銀兩厨子等項亦有幫貼其在澳門收受西洋人食物則人皆知道收受西洋人是何禮物則外人不知至待西洋人過優亦甚失體理合據實奏聞至臣前因傳聞未確遽爾入奏愚昧之罪實無可辭合併陳明仰祈聖鑒臣謹奏似此或出於無心則可若係有意將毋遺忘去年陛見時所立之志向耶同日又奏為請㫖留存炮位以禆邊海事雍正五年三月內准兵部咨各省於一千兵內設立子母炮六位威逺炮四位本省倘不足用將就近省分移取嶽鍾琪現送來之威逺炮挨次遞送令各省照式揀選存留餘剩威逺炮子母炮解送來京等因又於雍正五年十一月內准兵部咨各省舊存及捐造子母炮查明悉行送部至炮位為軍中必需之器除威逺炮外尚有何項衝擊便利詳細造冊到日按冊酌撥以符原議一千兵十位之數等因奉㫖依議各處應設炮位俟撥給齊備之後將彼地所有子母炮齎送來京交部欽此除移行欽遵查報外臣查廣東廣西炮位雖無威逺炮名色而現在准遞送到陜西之威逺炮驗其體式並加試用與各營現存之行營炮大概相等無庸另造其子母炮一項廣東廣西現有者少而相似者多如砂炮河塘炮斑鳩炮每炮一位俱帶有子炮三四枚雖形式較異於子母炮其實為用與子母相同兩粵山海邊地攜帶巡防輕便利捷莫過於此且外海內河哨巡船隻衝擊之便尤所必需現據各鎮協營紛紛呈請存留前來相應懇請聖恩俯念兩廣實係邊海要區水陸營伍關係緊要准將子母炮砂炮等項一體存留或止將子母炮一項解部其砂炮河塘炮斑鳩炮准令照舊存留臣為邊海起見是否可行不敢冒昧具題合先具摺請㫖遵行臣謹奏此事甚有關係現將奏摺抄發廷臣㑹議候㫖遵行兩廣總督臣孔育珣廣東巡撫臣楊文乾謹奏為遵㫖㑹議漁船事宜事雍正五年五月初十日臣孔育珣等在京奉皇上靣交撫臣楊文乾覆奏廣東漁船一摺聖諭著臣回任同撫臣楊文乾㑹商具奏欽此今查撫臣楊文乾所奏諸條定例現行者實應再加整飭未備者㑹同斟酌謹逐條㑹商定議仰祈聖鑒一漁船陋規與販運米榖出洋一條臣等遵照定例歷經飭禁恐有陽奉隂違應照楊文乾所奏將陋規開明勒石永禁責令文武互相稽察按季出結庶各員咸知警惕一網繒大船站洋一條查網繒漁船梁頭過小即不能捕魚應照楊文乾所奏嗣後成造此等大船梁頭不許過八尺其從前違式者限三年內改造不許久出站洋至於小漁船仍照舊制梁頭不得過五尺蓋板披水不許裝釘本港採捕務令朝出暮歸違則按法重處一漁船報官印烙編甲一條查漁船成造時地方官先取保結裝成後驗眀印烙給照每十船編為一甲俱係定例今楊文乾稱有私造無照之船在港行駛深恐日久法弛應照所奏再加嚴飭編甲查點造報稽核一禁多帶淡水一條查出洋必帶淡水若禁其多帶可杜久留海靣之弊應照楊文乾所奏禁止至於海船風篷俱視船隻之大小長短製定其油飾書號業經奉㫖遵行今應再加通飭一小船夲港採捕每日帶米一升五合嚴禁夾帶軍器硝磺等物一條查粵東漁船向來每人每日帶食米一升餘米一升今楊文乾所奏米數相去無多無庸更改至於小船止令本港採捕朝出暮歸并禁夾帶軍器硝磺等物俱係定例應如楊文乾所奏再行申明一富戶製造船隻租賃務報夲名一條查製造船隻雖例係地方官取結查驗但有本户恐日後事纍揑造詭名難保必無應照楊文乾所奏再行明白申禁一改定漁船換照之期一條甚為有便漁民應如楊文乾所奏每遇一官到任換照一次以免每年換照漁民守候之苦臣等再請換照必於正任之官其署印官不許換照以杜重復并可免署官擾纍之弊一各口岸派撥州縣民壯三四名或五六名協同兵丁巡邏一條查沿海口岸甚多各縣民壯無幾臣等再議與其派撥民壯不如令文職州縣一體查察若守口辨兵需索許各縣照依將備一體揭報如無需索令各縣出結送查倘有揑結查出并以狥庇參處以上諸條原係參酌成例臣等遵㫖定議如䝉聖恩准行臣等即逐條明白分晰出示申明不必另行具題伏乞睿鑒批示遵行臣等謹奏所議殊屬妥協准照此行爾等酌量若無應行報部之處可以不必具題雍正六年四月十一日兩廣總督臣孔育珣謹奏為奏聞廣東早禾栽插遍滿事竊照廣東入春以來雨水調勻早禾已插三月內連得大雨凡逺近髙低田畝無不霑足民間俱稱今年雨水得時早收可冀大有是皇上敬禮龍神之應驗等語至麥子油菜收成俱好地方亦安靜恐厪聖懷理合奏聞臣謹奏覽奏雨澤應期深慰朕懷凡為督撫者果能一秉公正實心教養兵民上天之護佑朕可力保人多視為杳茫奈何須知人神交感之理捷如影響信得及一分獲一分福信不及一分受一分禍但肯實力體驗自當默㑹也同日又奏為奏覆事雍正六年二月二十二日接怡親王及大學士等寄字內開禁用黃銅上諭一道到臣欽惟我皇上至聖至仁體恤民隱無一不周今以日晷儀器之類來自外國古銅香爐花瓶造自前代鎖鑰匱箱上事件用銅無多只禁其販賣不令搜察民間又恐臣等奉行不善特諭寄信前來臣等欽遵酌量據司道㑹議收銅事宜實屬不寬不嚴民間並無苦纍查廣東省據驛道何師儉二次具報共收買過黃銅器皿六千九百二十五斤十兩廣西省據布按二司申報收買過黃銅器皿七百二十斤俱於撫臣衙門造冊報部我皇上便民利用之聖心臣等自當敬體欽遵合行奏覆臣謹奏覽奏已悉但兩省所收銅斤為數何故甚少同日又奏為奏覆粵西文職事竊臣上年陛見欽奉皇上面諭將廣西省文職官員開填考語具奏臣回任後細加訪查并有親自驗看者除司道大員俱在皇上聖鑒之中無庸開列外其府㕔州縣臣謹具考語彚併一摺另呈聖覽臣謹奏所開廣西省府㕔州縣職名一摺留中至司道等大員朕只知其在京不知其在任如何但悉其已往未悉其以後如何亦應開列呈覽其廣東省人員一併開列具摺奏來同日又奏為奏明廣西再加節省羡餘事竊臣上年以酌請積貯榖石等事題明廣西鹽斤官運官銷彼時以事在創始需用頗繁各屬領銷鹽斤每包酌支火足銀三錢今行之已久細加查核三錢之內可以節省銀一錢每年共可節省火足銀九千三百兩零請即動用於􅠏下白沙建倉貯榖接濟竈丁此後遞年將節省銀兩歸公充餉在案兹又據廣西鹽驛道張體義詳稱查廣西鹽務自雍正二年內奉行官運事創用繁今已行四年運銷熟悉其各運官養廉工火夫腳雜費及運鹽水腳等項俱可節省平頭銀色亦稍有羡餘統計每年尚可節省銀四千兩理合詳請奏明充公等情到臣據此相應將該道詳稱之節省銀四千兩並前項節省銀兩彚同西省官運官銷羡餘銀兩一併歸公充餉合行奏明臣謹奏覽張體義人甚敏練且聞其聲名好實心任事同日又奏為奏聞緝獲楚省賊犯事竊查湖廣寧逺縣生員荆之寶家被盜劫虜殺傷官兵臣據報檄飭廣東連陽營并連州文武飛撥備辨兵役於交界地方協力擒捕并委標員前往督催將緣由奏聞在案今於四月初八日據廣東連州知州朱振基詳稱三月初九日差役黃昌在連山縣宿塘墟緝獲賊犯梁國太梁國安二名交連山縣收監又在湖廣廣西交界楚洞地方緝獲盜犯覃貴元即覃阿乾解州卑職細加訊問據供為首大哥是韋廷耀二哥是韋廷祥同夥共一百四十人二月初一日夜打劫荆之寶家得銀四百兩并衣服紬緞又捉了他兩個男人一個女人二月十八日同官兵打仗小的們夥內陶亞德李宗秀等十二人被官兵殺了那官兵不知殺了幾人小的們於二月二十七日在錦田大山各人逃散等語除一面密緝夥黨外合行報明等情到臣據此除分檄廣東廣西交界地方文武再行嚴加緝捕并將已獲盜犯起解楚省歸案究審外所有拏獲楚省盜犯訊供緣由合行奏聞臣謹奏嘉悅覽之直省封疆諸臣咸肯如此不分爾我同心協力整飭此種匪類自當斂跡不敢肆行矣朕覽前奏己知辦理妥協料若輩不能漏網餘犯務令竭力緝捕毋致一名兔脫更宜詳察有無揑報情弊勉為之如晋省翟斌如一案河南總督田文鏡之辦理可嘉之至當效法之諭兩廣總督孔育珣聞粵東廣南韶道林兆惠於六月間差役往從化山採買木料被盜虜去十二人放回四名寄信勒要規禮數百兩始准贖回又聞五月間大盜數百商謀行劫苦無器械羣至龍門營之七子汛搶奪兵器在汛官兵三十餘人避匿不敢出敵任其席捲器械而去遂往各鄉肆意行劫失案纍纍阿克敦並不具題亦不嚴飭緝捕反暗囑有司止令揑報十餘名審作兵丁睡熟致被偷竊因而薄責兵辨茍且了事又聞五月內髙州府電白縣山中聚盜千餘白晝沿鄉搶掠竟至一日之內連劫二十七家練勇往追被捉入山割去兩耳放回寄信令勿再追且聞將軍標兵窩盜分贓常賚咨提質審將軍不惟不革兵糧發審囑令審作誣良常賚瞻狥情面竟不再提亦未奏聞地方上傳為笑談以故匪類公行無忌常賚署中亦皆被盜失去摺匣鑰匙轉向將軍石禮哈借用諸如此類該撫該將軍概行隱諱不奏省㑹之中盜賊竟敢如此肆橫文武大員所司何事無怪家家寢不安枕民間有孔督去阿婆來盜結黨民何賴之謡夫設兵原以衛民而總督將軍實掌督兵之權今阿克敦石禮哈乃如此弛縱隱諱以致盜賊捉人割耳搶兵器械甚至一日劫掠數十家撫署亦經失事又復通同欺隱朦混似此負朕深為可惡爾其詳悉查究奏聞雍正六年五月初九日兩廣總督臣孔育珣謹奏為備陳疏忽情由仰祈聖鑒事竊臣欽奉皇上諭㫖并接怡親王大學士張廷玉等寄字轉傳諭㫖令臣將廣南韶道林兆惠採買木料被虜人勒贖等五案與巡撫楊文乾查審務將實情究出具奏等因欽此臣與撫臣逐一㑹審除分案具奏外內臣疏忽情由當另行據實陳明認罪查廣南韶道差役何英等於上年六月十四日木厰被劫雖係署督臣阿克敦任內之事而題參疏防係臣回任之後臣以限期已逾按察使身任刑名詳內既稱查明諒屬無悮隨不經意細查阿克敦任內原案即行據詳具題罪無可逭本案盜犯係屬礦徒所搶皆是食物捉人放回未得銀兩亦無損傷當時官兵擒捕傷故盜犯十九名現獲二十一名各犯有供行劫木厰者有供曽於五月內行劫長寧縣陳錦成等家者俱經題參疏防之案臬司方願瑛詳請分案完結雖非縱盜而刪去勒贖等項情節實屬違例又督標貼防新㑹縣龍門七子汛被劫軍器一案阿克敦署任時道府等已審作竊賊完結臣回任後未據各屬將改竊情由禀知是以未經補參罪實難辭又電白縣蔡文瑞等家於上年五月十一日被劫縣詳據事主呈詞十三紙共二十七人內中多有同姓係阿克敦署任內之事而題參疏防亦臣回任之後臣亦以疏防逾限按察使所詳諒必查明情實因不加詳對原案匆忙據詳具題疏忽之罪無辭臣向無縱盜之心今以不加詳愼竟至與人並蹈愆尤負罪實深惶悚無地俟臣審題之日於疏內請㫖敕部嚴加議處合併陳明仰祈聖鑒臣謹奏據奏已悉業既審出實情未有不可恕之過也候題到日降㫖審案數摺留中雍正六年五月二十四日兩廣總督臣孔育珣謹奏為奏聞驅捕礦徒事竊查廣東惠州府歸善縣之白馬山石門仔山又永安縣之鐵嶂山報有礦徒聚集偷挖礦砂文職官役不能驅捕臣咨㑹撫提二臣檄行司府飭令歸善縣親往曉諭一面行委惠協副將及提標遊擊各帶兵丁於各處山場查拏雖現在未聞滋事而聚黨人多不得不及早擒捕俟捕獲之日臣等㑹商懲治外所有臣撥兵驅捕礦徒緣由合行奏聞臣謹奏知道了必應驅逐解散毋因循毋憚煩同日又奏為奏聞粵東早稻豐收事竊照廣東地方田禾豐茂經臣奏聞在案今歲雨𤾉時若廣東十府一州早稻十分豐熟現在收割登場者約有三分之二米價平減理合奏聞至廣西地方雨水調勻田禾亦俱豐茂臣謹奏早稻豐收深慰朕懷以手加額覽之汝等督撫一分吏治一分年成此理朕實見透其加敬加勉同日又奏為奏聞欽差到粵日期事竊安南國奉㫖錫以四十里之地欽差由粵前往據左江道閻純璽報稱欽差杭奕祿任蘭枝於四月十九日到南寧府寓於公館准該國王柬文以溽暑懇逮秋初迎接䝉欽差面諭今雖天暑但奉有聖㫖敕諭不敢稽遲本道咨覆該國王在案合行具報等情臣又接據安南國王黎維祹柬稱亦同前由到臣經臣照㑹該國王欽差已到迅速迎接俟出關之日另行題報外所有欽差到粵日期併臣照㑹該國迎接緣由合行奏聞臣謹奏此事何煩催促識見小哉同日又奏為據實奏聞事雍正六年四月二十三日欽奉皇上批回臣奏覆審理肇髙道王士俊具揭解任布政使官逹等一案奉硃批秉公審理據實奏聞欽此臣等行據司道等審解前來即與撫臣楊文乾將軍臣石禮哈公同㑹審另疏具題并將臣等從前不革陋規請㫖敕部議處外所有審訊供由另單恭呈御覽至於撫臣楊文乾先後參劾官逹各案容臣秉公審明之日另行具題臣謹奏所奏知道了具題到日再降諭㫖百凡處惟貴秉公據實迎合二字不惟悮事日後亦且自悮愼之毋忽同日又奏為恭請聖鑒事竊查廣州府理猺同知陳鴻熙於本年四月內委署惠州知府印務有海豐縣葉亞益人命一案二參限滿現在具疏題參例應離任聽候議處臣等查陳鴻熙辦事勤敏其署府之時本案限期止餘八日於五日內審轉其過尚有可原謹仰體皇上愛惜人材至意不揣冒昧瀆奏可否調令引見出自聖恩臣等謹奏此奏甚是候降㫖諭部汝等但能秉公據實何慮屬員不知感畏屬員果皆知感知畏曷禁不止胡令不行耶肯效法田文鏡之居心行事朕自然信任不疑倘稍有一二私見未融則志慮不純難以傾信彼此皆無益矣惟當矢諸天日屏盡私腸自蒙上蒼鑒照朕亦必能覺察此乃為人臣之第一良法餘無二策如欲成全此身做一千百年不朽人物只在一公字而已勉之勉之雍正六年六月二十八日兩廣總督臣孔育珣謹奏為奏明委撥臣標參將督捕西隆土目事竊查廣西西隆州八逹寨土目顔光色兄弟逞凶不法遣撥官兵㑹捕臣經具摺奏聞兹准廣西提臣田畯咨㑹撥發右江鎮思恩協隆林營兵七百名委遊擊常顯虎統領同提標守僃熊文舉帶領千把於三月二十八日自泗城皈樂起程又撥田州土知州岑應祺帶領土兵三百名俱於四月十二日至羅英地方有周邦寨係顔光色長子所踞率凶拒敵四月十六日官兵攻破周邦寨傷死土蠻五人擒獲四十一名官土兵丁各被傷一名十八日移兵至八逹之前山嶺十九日土惡衝敵被官兵鎗傷數人遁回因八達地方山巖險固官兵雖周圍分布一時未能攻入四月二十一日將泥洞土目蘇亞養即蘇文斌捕獲五月初五日惡黨岑扭投首到營旋即病故五月初十日西林知縣韓三善率領土勇奪取山梁殺死惡黨三人官兵夾攻亦炮傷惡黨三人土勇被傷二人五月十四日官兵進攻鎗炮傷斃惡黨十餘人土兵傷故四名十八日官兵進攻鎗傷惡黨八人傷故官兵一名土兵二名連占數處山峯因路徑甚多天時暑熱惡黨時出時沒且欲攔截土兵口糧土知州岑應祺已撥添土兵四百名等情又據右江鎮臣假宗嶽呈報咨㑹左江鎮臣齊元輔撥中軍遊擊塢元度帶兵三百名合擊等情臣先後檄催右江鎮臣假宗嶽星飛親往調度查臣標後營參將武繩謨頗諳軍機臣於六月十六日即委該參將飛往軍前相視形勢飛報如有委用該參將之處即聽右江鎮臣委遣并囑詳慎辦理相機進取務將蠻惡捕獲淨盡以靖地方理合奏聞臣謹奏此番進𠞰官兵甚屬不堪所奏尚未盡其情狀或汝被伊等瞞過亦未可定事竣之日嚴察參處以警將來須知悮事緣初次已失機宜與續調官兵無涉同日又奏為奏聞事竊查廣東早收豐稔米價平減惟是五六月間天等府地方六月間各有少雨之處今於六月二十三四五等日連日大雨霑足暑熱少減疾亦漸愈我皇上念切民依合行奏聞臣謹奏頃聞粵東通省大熟今覽此奏殊不相符同日又奏為奏聞礦徒解散事竊臣准廣東提臣王紹緒咨㑹據提標遊擊趙一廷惠協副將鄂鼐報稱㑹同文職帶領兵役齊進白馬山礦徒聞風先已逃散隨將寮房燒燬壠口填塞又至石門仔礦徒亦先解散已撥辨兵在該地巡守其餘官兵回營至三兜竹地方查有銅一百六十四包頓貯謝飛萬店內稱係糧道差人採買再白馬石門仔二處礦徒雖係陳大肚等領衆偷挖實係髙仕登蔡隆為首業經拏獲等由又據提標中軍參將姚源忠禀據惠協千總陳啓禀稱奉差前往三兜竹又搜出銅二十七包今同糧道家人及店户謝飛萬一齊押解來惠等情除交惠州府收審外相應咨㑹等由又據惠協副將鄂鼐報稱差員㑹同文職各帶兵練前往鐵嶂山查拏礦徒已經逃散淨盡等情臣除行廣東按察司將為首挖礦之髙仕登等嚴審并查現獲銅斤是否糧道何師儉辦銅差人採買查訊明確定擬解撫臣楊文乾審究外所有礦徒驅捕已散緣由合行奏覆臣謹奏何師儉此舉是何心耶此處絲毫不容瞻狥傳諭楊文乾據實察審地方上凡遇此等事不可因循養姦必將類斯者整飭數件其餘自當畏法斂跡不敢為匪矣封疆大吏姑息二字隱飾二字所關甚巨戒之毋忽切不可忘去年面諭之㫖更不可移面朕所立之志王紹緒何如克勝此任否田畯暨伊二人朕深慮其不及據實奏知陳祖訓亦當留心訪察恐非實心任事之人同日又奏為奏聞事竊廣西那地土州逃犯羅鳥羅將等原與該土知州羅㑹禧一族彼此尋仇搆釁及至擒捕羅鳥等每逃匿於貴州都勻府平州土司楊武功處案經年久今據升任按察使張元懷詳據慶逺府知府徐嘉賔詳稱羅鳥等帶黨百餘騷擾村莊今盤踞於龍葛峝羅中興主謀又有楚棍七人為羽翼土知州羅㑹禧帶兵捕敵被羅鳥捉去哨總一名殺傷土兵二名該土州請撥鄰近土兵㑹捕前來除飭東蘭南丹二土州撥發土兵㑹捕外合行詳報等因又准提臣田畯咨同前事各到臣臣即檄行該地文武速飭南丹東蘭那地各土官多撥土兵協力擒捕去後兹准提臣咨稱羅將一犯於貴州平州土司地方拏獲等因除再嚴飭各該文武務將羅鳥羅中興等逐名擒獲究治外合行奏聞臣謹奏覽田畯何如能稱厥職否其新任副將董芳凡有擒凶𠞰賊冒險之處不必令往將此諭亦密令提臣撫臣等知之雍正六年七月十八日兩廣總督臣孔育珣謹奏為奏明事竊廣東粵海關徴收稅課係撫臣衙門經管臣聞前撫臣楊文乾於夷船稅例規禮之外又於洋行另有所取今臣署理撫篆問之管關官役俱云不知詳細臣𫝊洋行密問據稱此事實屬院與洋行另有交往則加一抽收俟貨物上船繳送者其銀係番錢九一二成色行中自赴撫院衙門兌交外人並不知道今大人署印我們俱情願幫助公用照依夷船每隻大小估送但懇求不可併入羡餘致成定例等語臣思此項銀兩既出自行家情願似可順伊繳送於錢糧有益至於夷船之來全憑行家招致今伊等不願併入羡餘臣請照所收數目解進批示遵行臣謹奏覽同日又奏為奏明委管關稅事竊查廣東巡撫兼管太平粵海兩關其太平關稅務經前撫臣楊文乾委韶州府知府吳騫管理粵海大關稅務委廣州府知府委各該知府管理俱經題報而各關稅多之處俱係楊文乾自差家人同胥役坐口經收今臣接署印務竊思錢糧關係重大不敢輕託家人經手致生事端隨將各稅口照前撫臣原委各官檄令専管督同胥役經收但各海口相隔遙逺恐有胥役通同作弊臣飭附近各口將僃千把不時密行查察而廣州府首郡事繁知府張鋗經管粵海大關查察難周不無疏漏臣標合奏明至於兩關雜項陋規以及總管內司等項名色臣既不差家人一併照數歸公斷不敢絲毫欺隱俟臣交印後將收過數目具奏臣謹奏此等稅務細事卿有何不見信於朕耶同日又奏為請㫖事雍正六年七月十四日准吏部左侍郎臣阿克敦咨內開為移咨事雍正六年六月初十日准部文奉㫖阿克敦仍回廣東有奉㫖交與楊文乾詢問阿克敦各事件俟詢問清楚阿克敦來京欽此遵於七月初二日到廣當即赴巡撫衙門就問楊文乾因病不能相見旋即身故問伊第二子據一應硃批諭㫖俱經封繳等語今貴部院署理撫篆有無准到原任巡撫楊文乾交送事件請煩查照示覆等語臣於七月十四日據楊文乾次子楊應琚封送從前阿克敦常賚咨覆楊文乾印文各一件到臣查俱係答覆楊文乾詢問粵海關收過稅銀之事又據撫院書吏林廷顯禀稱七月初四日楊前院內署發出前撫標遊擊丁銓生未批詳文一件司道印禀一件繳送察核等情臣查詳禀內俱係阿克敦之家人王姓索取暹羅國船規之事未知此皇上敕部訊問抑仍留廣東候㫖差員查訊理合請㫖遵行并將司道㑹訊口供印禀遊擊丁銓生詳文阿克敦常賚回文抄録恭呈聖覽臣謹奏候欽差前往㑹同爾與署撫將阿克敦常賚各案嚴行查審務究實情具奏二人深負朕恩朋謀傾陷楊文乾甚屬可惡汝若不屏除瞻顧之心謂楊文乾已故若輩現存少為之用意周旋則汝又忘去年之面諭矣寧嚴毋寬不得絲毫遷就以圖了事雍正六年八月初四日兩廣總督臣孔育珣謹奏為遵㫖奏覆事竊臣前奏覆收買黃銅器皿一摺奉到硃批臣謹祗受竊查廣東收買銅器省城設立公所委糧驛道何師儉專管其事各州縣俱於司庫領銀自行收買按季彚解省城今臣詢問何師儉銅斤收少之故據稱廣東係銅錫並用之地收買價值並不短少而收解寥寥者因未曽立限嚴查民間以現成器皿仍然藏匿私用不肯繳官必得立限嚴查將地方官加以處分庶幾官民仰遵功令等語臣查收買銅器之少實在民間隱匿不肯繳官我皇上體恤民隱不令滋擾臣不敢過嚴然聽其自繳終屬無多臣今復通行示諭愷切勸導令民間速繳領價如再隱匿不遵治之以法并飭各府州縣實力奉行以期寬嚴並用理合奏覆臣謹奏此事在粵可以不必過嚴朕前批諭黃銅數少不過偶爾閒問禁銅原為銷燬制錢起見廣東等處出産銅錫之省諒無此事俱無庸過嚴但亦不可置之不問當勤加勸諭而不專繩之以法官亦不必參處惟向屬員耳提面命不時申飭分别其勤惰而勸懲之可也同日又奏為奏明曠軍田地餘米歸公事竊廣東從前設有都司衛所管理屯糧屯丁因有逃亡故絶田地拋荒衛所各官自僃工本招民墾復給與佃耕每年百姓按畝輸租除完額糧之外餘羡米榖謂之曠軍餘米衛官收作養廉今廣東除沿海緊要存留八衛所其餘己裁併州縣此項餘米應清出歸公臣檄行布政司轉飭各府清查兹據布政司詳稱廣惠潮肇髙等府屬共曠軍餘米五千六百石榖一千六百九十餘石錢三千二百文臣先行具題歸公其未據具報之各屬飭令自首到日另行具奏臣查此項曠軍田畝每年收租非屬經久之道若以此官田僅照黔省頂耕之例止上稅銀五錢即給為業亦非情理之平臣再四酌量不若令民承買變價歸公臣現飭各屬將田土查明上則下則照時值收價充餉其未有承買者仍行收租歸公既有益於百姓復有益於國帑實為兩得合行奏明臣謹奏此項田地照他省之例仍存作官田收租以偹公用為是何必令民間承買耶此舉可以不必同日又奏為奏請酌撥汀引速清餉項事竊查福建汀州府屬八縣引鹽經臣題請改歸府縣官協辦之後因連年雨水偶多鹽場少産兼以正署交代轉運稽遲以致雍正元二三年共缺餉銀四萬九千四百餘兩經前署督臣阿克敦以請定汀屬引鹽銷售之法等事具題准部咨覆將汀屬引鹽以雍正四年為始仍照前督臣楊琳辦理之法發帑融銷委員辦理并將前項積缺銀兩作何勒限分年帶完之處妥議具題其每年帶完舊缺之外應有羡餘若干亦照例據實查明奏聞充餉等因臣隨行據鹽運司史在甲詳據署潮州運同陳鴻熙詳稱請將汀屬新舊引目每年分為新七舊三撥帑兼銷統俟三年之內銷清積缺每年十分之額鹽以七分運銷新引抵足全年之新餉其三分運銷舊引帶完雍正元二三年之積缺至於羡餘無從議及俟帶完舊缺清楚之日全運現年新引再行查明核定羡餘實數等由轉詳前來經臣覆核具題在案今准部覆內開從前楊琳將兩廣積缺課銀九十一萬餘兩題請分作五年帶完除額餉并每年帶銷舊缺之外歷年尚有羡餘題報今汀屬引鹽既照楊琳之例發帑融銷則未完積缺銀兩為數無多何以請分作三年之久且羡餘一項又俟舊缺帶完清楚之日全運現年新引始將所得羡餘充餉較之楊琳題請發帑收鹽帶銷舊缺之例不符應令該督孔育珣將汀州府屬未完積缺勒限一年照楊琳之例於該府額行鹽包復帶完銀一錢三分抵補舊缺如有未敷亦將難銷之埠拆於易銷之埠帶完清楚並將新餉一并全完造入該年奏銷冊內報部等因到臣臣查從前楊琳清補積缺九十一萬餘兩之內汀屬共舊缺一十三萬七千四百八兩零核其五年之內汀屬止共帶完銀六萬八千兩其餘銀兩俱係五省捆徴通融完補是今日即定以三年猶恐逾限如必勒限一年新舊俱令全完此萬萬不能之事臣接准部咨伏念國課為重不敢復行瀆請再四籌畫惟有暫為通變之法臣請將汀屬二三年分未拆之引概行撥出俟臣酌量各省完餉易銷之埠陸續搭銷除歸抵餉項鹽價水腳工火之外所有羡餘照數歸公其汀屬本埠令其專銷該年額引如遇天氣晴明場鹽廣産運銷足額亦可稍有羡餘但以閩省未完之引目撥出各省代銷實非成例合行奏明再照今時已八月年內為日無幾臣除一面撥銷外伏乞聖恩再寬臣一年之限敕部查照俾臣竭蹶辧理以期無誤則感戴天恩於無既矣臣謹奏此事候朕諭交戶部密議具奏將所議覆者發來遵照辦理可也該部議事之公朕可力保外省所辦者如果情理通順斷不過於苛求若不通情順理即具摺密奏朕未洞悉原委豈便遽立主見曲從所請耶其中倘有萬不得己之情不妨據實直陳切勿朦混巧飾該部亦必不為之遷就也雍正六年九月十一日兩廣總督臣孔育珣謹奏為奏明事竊廣東左翼鎮總兵一缺駐劄順德縣城管轄水陸營汛甚為緊要現任總兵官謝希賢臣觀其人甚明白亦粗知文義但近聞操守平常聲名不好臣面加嚴切誡飭令其改過以無負皇上擢用𢎞恩如伊果能悔過自新可以仰邀聖恩寬宥倘不悛改臣即據實糾參合行奏明臣謹奏謝希賢向聞操守不好因其署印時奏對甚屬明白朕以為前聞不確故又用今職於陛辭之日為此曽經諄諄教訓若仍不悛改誠乃下愚不移之人也查有貪劣實蹟一面摘印一面題參如尚無贓欵確據或能從此悔過自新則猶可姑寬同日又奏為奏覆事竊臣前奏五六月間廣東廣西民間多有暑疾一摺奉到硃批臣謹祗領臣查五六月間民間暑疾偶有傷生者亦不為大害自六月二十三四等日連得大雨之後暑氣頓解隨俱全愈廣東早稻通省實係豐收至晚稻廣肇惠髙雷廉瓊等府雨水及時田禾現俱豐茂惟南韶二府山田居多得雨稍遲將來晚收只可五六分其潮州一府髙田亦有得雨稍遲者較勝南韶查潮州民間原多種番薯以代米糧現俱大收每斤賣錢一文黃岡碣石一帶每十斤賣錢七文約計一人一日之食費錢不過一二文通省米價每石八九錢至一兩二三錢不等廣西省晚稻得雨有遲早不同其收成分數尚未據報到米價每石八九錢至一兩一二錢不等恐厪聖懷合併奏聞臣謹奏覽奏民間暑疾不致為害米價亦平深慰朕懷同日又奏為欽奉上諭事雍正六年九月初二日接怡親王大學士張廷玉等寄字內開奉上諭廣東濵海之民以魚鹽為業近聞地方官辧理鹽務巡查緝捕過於嚴密未免窮民難於得鹽有妨資生之策於地方無益爾等可寄信與孔育珣令其悉心商酌當看地方情形如何若從前所報贏餘之數後此或有不敷不妨據實陳奏懇恩酌減并飭司鹺之員體恤窮民不得苛刻以妨其衣食之計欽此寄信前來等因到臣臣敬閲之下仰見我皇上愛養元元無逺弗屆之至意臣敢不欽遵奉行惟是廣東沿海産鹽之地民情頑劣鬻私販私食私習以為常臣雖嚴飭文武官辨上緊緝捕私鹽尚難杜絶官引猶多壅滯課餉未能完足若少加姑息則私鹽愈行充斥不特無贏餘之項即正課亦難徵比臣查粵中之販私者多屬遊手無賴鬻私者乃場竈之積奸食私者由豪强之窩縱非盡屬無以資生之窮民也臣欽奉聖諭凡有果係貧難老幼肩挑背負者自當仰體聖慈寬恤其習慣鬻私販私奸徒應仍查察緝捕庶免誤公至於沿海地方今歲米價頗平無妨於民生衣食之計合行據實奏聞臣謹奏原係與卿商酌計議卿身任其事目擊地方情形所見自必不謬知道了雍正六年十月初十日兩廣總督臣孔育珣謹奏為奏明遵㫖防範事雍正六年十月初六日接怡親王大學士張廷玉等寄字內開欽奉防範日本國上諭一道到臣臣謹祗領伏查本年九月二十三日接浙江督臣李衛密札內開東洋日本國有匪徒潜往打造戰艦招集閩廣浙江之人除奏聞外希嚴為防範等語臣思我皇上聖仁威武四海嚮風蕞爾島夷諒無他念但浙江器於汛口出入人船嚴行稽查炮臺時加瞭望今奉諭㫖臣俟㑹審事畢即赴崖門虎門􅓝門附近緊要海口親歷查察舟師并汛守炮臺其不能周歷之處分委道府大員巡查如有應行奏㫖外所有臣奉到諭㫖防範緣由合行奏聞臣謹奏仍候另降諭㫖同日又奏為欽奉上諭事竊臣接怡親王大學士張廷玉等遵㫖寄信到臣內開各省建立祠廟供奉龍神上諭一道臣欽遵奉行查廣東龍神祠在巡撫署東向有僧人一名看守香火住於接連之關帝廟內祠內柵門向係封鎖朔望官員行香始開並無民間男女人等進廟䙝慢臣署撫篆欽奉上諭復嚴飭僧人敬謹䖍奉毋得擅令一人私入廟內觀看以致䙝瀆所有臣奉到諭㫖緣由合行奏覆臣謹奏燒香瞻拜亦屬無妨但不應妄造荒誕之言以愚惑民俗此當嚴禁耳同日又奏為請㫖調補緊要之道員以收地方實效事竊廣東雷瓊道一缺防範海疆非有才具之員不克勝任又廣東引鹽行銷五省向無富商大賈一應收鹽徴餉全賴運使熟悉鹽法方得調劑轉運得宜此缺亦關緊要今雷瓊道王璠丁憂員缺臣查新任廣東鹽運使黃文煒雖才具優長而於鹽法未能熟練若以之調補雷瓊道則於海疆有益至鹽運使一缺臣查現任廣東韶州府知府吳騫老成練逹臣於該府前任惠州知府時曽委署理鹽運使事辦理甚屬得宜今若以之升補廣東鹽運使則於課餉更有禆益臣因地方與錢糧起見不揣冒昧奏請可否調補出自聖恩臣謹奏留王璠在任守制已有㫖諭部矣其間若有人缺不相宜處將此數員應如何互調方收禆益或仍摺奏或竟具題候朕再降諭㫖同日又奏為奏明事竊臣准吏部咨為欽奉上諭事雍正六年八月十三日將署直隸總督何世璂保舉之原選湖廣上荆南道李可淳帶領引見奉㫖李可淳著賜以道銜道俸命往廣東現今廣東肇髙廉羅道王士俊署理布政使印務其員缺或即將李可淳署理或另調道員署理肇髙廉羅道事所遺員缺即將李可淳署理之處著孔育珣𫝊泰酌量委署欽此咨行到臣臣查李可淳係臣親兄孔育琨女壻乃臣之姪壻雖例不回避但以至戚而為屬官臣不敢隱瞞理合據實奏明臣謹奏李可淳人材甚屬可取所奏知道了當加意朂勉令其實心任事毋専務潔己而涉於因循瞻顧之習雍正六年十月二十日兩廣總督臣孔育珣謹奏為恭謝天恩事雍正六年十月初十日臣齎摺人回粵欽奉皇上賜臣克食一匣哈密瓜一個寧細四匹臣出郭跪迎進署望闕叩頭謝恩領受訖竊臣一介庸愚屢受皇上恩賜已極人臣未有之殊榮今又䝉賞賜上方克食並內府寧紬仰荷寵頒感激無地臣惟有殫竭誠悃并臣子子孫孫仰圖報效天恩於萬一耳理合具摺奏謝臣謹奏覽卿奏謝知道了所奏八逹寨西隆州二摺留中廣西距汝駐劄處所相離甚逺實屬鞭長莫及汝自總督兩廣以來身所到處朕俱見信至於調遣將領任用屬吏鼓舞勸懲并訪察地方情弊此等處甚不及朕觀廣西吏治戎政均屬廢弛故特命鄂爾泰督理巳有㫖矣今既無兼顧之纍可専力一省若廣東仍有不妥協處不但負朕深恩亦何顔對直省同列諸臣耶當竭力勉為之同日又奏為州牧不宜邊地請㫖調補以收實用事竊查廣西西隆州地方原係改土為流山深瘴重民情蠻野近又改為直隸知州管轄俱係苗蠻是州牧一官必得老成持重者方為人地相宜現任知州劉德健性情𥚹急除𠞰捕八逹賊衆行間文武不和尚屬小節不必咎責外惟查泥峝寨土蠻原為八逹黨附土目蘇亞養已經拏獲該州調取泥峝土勇二百餘名即當設法羈縻乃於五月十四日冒昧點發禦賊竟致歸入賊巢幫拒官兵嗣經右江鎮臣段宗嶽等差人招出泥峝把事波弗波歡等四名投撫據供我們舊土目先被土黃寨陷害因請蘇亞養為頭目保護地方三年以來在州上糧從無抗違今劉州官將蘇亞養交土黃頭人勒斃揑報病故又放在土黃呌我們看因此傷心又那日搬營打仗土兵帶來糧食喫完人餓得狠又呌打仗是以投入八逹今求免罪情願招波社各土人共捕顔光色等語經泗城府同知陳師儉㑹訊准其投撫臣查該州劉德健既不能相機料理又偏聽土黃頭人之言人多怨望恐將來未能相安但加參處則劉德健以文員而軍前數月亦頗著勤勞相應密摺奏請皇上特㫖將該知州劉德健另調别地補用其員缺臣查有栁州府雒容縣知縣馬朴又有桂州府靈川縣知縣牟泰齡此二員均有才具熟練蠻情皇上欽定一員以之補授西隆州知州於地方得資經理可否伏候諭㫖遵行臣謹奏聞劉德健甚屬不堪其布置失宜情節卿秉公察明酌量或應調用或行革黜一面料理一面奏聞同日又奏為奏聞晚稻豐收米價平減事竊粵東自九月十月以來晚稻結實之候通省雨暘時若現在收穫登場潮州府收成九分八分七分不等南韶二府屬收成七分廣肇惠髙雷廉瓊等府并羅定州屬俱係十分豐收通省米價髙雷廉瓊并惠潮沿海一帶每石七錢至八九錢不等廣肇南韶羅定等屬每石九錢至一兩一錢不等地方兵民感沐皇仁咸歌樂利理合奏聞臣謹奏覽奏深慰朕懷切勿增添分數涉於粉飾但以忠誠自律實心為國為民上天之垂賜嘉應朕可保其必也勉之勉之今將楊文乾日前所奏并朕之批諭發來爾看即知朕所以待楊文乾與楊文乾所以見信於朕之原委矣或冥冥中伊有負心處耶否則不應身罹此報然此亦不過疑辭朕惟念其生前之長耳此數摺之奏詞及所批之㫖俱當密之又密若稍漏一二語將來必見棄於朕也雍正六年十一月初七日兩廣總督臣孔育珣謹奏為敬聆天語恭摺奏覆事竊臣欽奉皇上硃批諭㫖一道并發硃批楊文乾奏摺三件到臣臣跪讀之下仰見我皇上優恤大臣推心置腹既褒寵於生前復加恩於身後不獨楊文乾銜感九原即臣同為臣子者覩此洪恩不覺感而泣下我皇上天地為懷始終成全臣實如一體身受自當仰體聖慈成全其一生臣節所有欽奉硃批并原發奏摺合行恭繳臣謹奏果能領悉朕意信而不疑復何憂何慮一切處可放膽為之不必畏首畏尾辜負朕倚任之心設或仍存為己私見消融未盡則朕亦減一分倚任之心矣孰得孰失思之勉之同日又奏為奏覆事竊臣欽遵硃批查得廣州府知府張鋗才具稍短辦事拘謹實非首郡繁劇之才但其操守清廉人品端正臣因首郡得人為難廣東一時乏此人地相當之員是以未敢遽請調補今䝉皇上詢及理合據實奏聞臣謹奏通省道員朕已有㫖命卿酌量人地相宜更調似此者竟行斟酌委用可也卿等果肯秉公察吏各員優劣朕之所知自不及卿等就近甄别方為真知灼見也勉為之若一涉私不但不能見信於朕且恐貽誤不淺封疆重任惟在察吏一節稍有不公誰肯心服衆心不服則呼應不靈諸務難以奏效地方受害不可勝言矣勉之愼之同日又奏為據實陳明仰祈聖鑒事雍正六年十月十七日准吏部咨開內閣交出上諭一道到臣臣聞命之下不勝惶悚除將阿克敦等㑹同署撫臣傅泰欽差臣留保喀爾紀善嚴審定擬㑹疏具題并開列臣職名附參聼候部議外惟是前撫臣楊文乾故後臣於七月十二日到省阿克敦方願瑛等私相聚㑹臣失於覺察約束罪實難辭荷䝉聖恩訓飭臣感激無地理合據實陳明仰祈聖鑒敕部嚴加議處臣謹奏似此己誤已失雖悔何益從此知過痛戒將來猶未為晚倘執迷不悛因仍自若恐噬臍莫及也雍正六年十一月二十二日兩廣總督臣孔育珣謹奏為奏明事竊臣前題參革職留任廣東羅定州知州楊廷翼一案臣據羅定州被詐武舉彭士望控告批司提審嗣據按察使公元審供具詳贓證鑿鑿臣始據詳題參逮准部文奉㫖交撫臣審擬今欽差臣留保喀爾紀善㑹訊聞兩次訊供凡案內說事過錢犯證并楊廷翼家人陳三俱各供認確鑿復又連日㑹審嚴刑各令改供不許與原供相同而反罪及無辜臣非以楊廷翼為臣所參必欲證實其罪但臣荷䝉聖恩髙厚不敢隱諱所有本案實情及臣題參緣由合再奏明伏祈聖鑒臣謹奏此案聞所參不公已有㫖矣硃批諭㫖卷七之三欽定四庫全書硃批諭㫖卷七之四硃批孔育珣奏摺雍正七年二月二十八日廣東總督臣孔育珣謹奏為敬聆天語恭摺奏謝事竊臣前奏恭謝御賜克食一摺奉到硃批臣跪讀之下感激愧悚不禁涕零伏念臣愚拙無能於廣西不能逺顧以致八達蠻瘴之地損傷兵辨自分罪無可逭仰荷皇上恩施格外以路逺分轄委曲保全種種髙厚𢎞慈臣實生生世世報答難既廣東地方臣當勉力料理雖自揣力邁才疏惟有殫此誠悃率同屬員交相砥礪以仰報聖恩於萬一耳所有微臣奉到硃批感激緣由理合具摺奏謝臣謹奏今調爾為河道總督矣來京領朕面諭同日又奏為奏聞地方情形事竊查廣東地方入春以來米糧仍賤民皆樂業現在春雨及時東作已興臣於二月初四日赴省㑹審官逹阿克敦方願瑛院司朋謀一案定擬具題後臣即於二月十六日往虎門查勘炮臺頗為堅固火器兵械亦屬齊備臣因番禺縣屬之茭塘沙灣二巡檢司地方密邇省城多有積盜出沒隨細勘該地形勢港汊叢雜倚山帶海村落連綿回環約五六十里戶口甚多若遽發兵圍捕又恐驚擾良民然積盜不除地方不靖臣回肇後即委標員㑹同番禺縣前往查㸃各烟戶相機清釐自首拏獲分别歸案所有廣東地方情形與臣赴省回署緣由合行奏聞臣謹奏盜靖而民不擾方為緝捕有術所見是相機為之雍正七年三月初三日廣東總督臣孔育珣謹奏為奏聞事雍正六年十二月十八日准浙江督臣李衛咨開東洋地方有廣東年滿千總陳龍光係潮州府人潛同奸商出洋在夷國打造戰船操演水師合亟密封咨拏等因到臣隨即密飭各文武官辨查拏在案又於雍正七年二月初八日准福建水師提臣藍廷珍咨開准浙江總督李衛咨洋商郭裕觀曾招僧人出東洋并送馬匹本人現在厦門等情隨即差拏而郭裕觀自雍正四年三月間因染瘋疾即回潮州相應咨㑹緝獲移解等因到臣臣星飭潮州鎮府密拏去後今於三月初二日據潮州鎮臣尚瀠禀稱遵即密㑹海陽縣將洋商郭裕觀拘獲因其人已染瘋癱不能從陸路而行巳於二名姓亦未可定臣現在密緝訪查不敢輕忽亦不敢聲張牽纍所有浙省咨拏洋商郭裕觀已獲緣由合行奏聞臣謹奏知道了雍正七年六月二十一日廣東總督今調江南河道總督臣孔育珣謹奏為奏聞早稻豐收事竊廣東全省今年均屬雨水調勻田禾豐茂自五月二十二三等日起雨水稍多江水自廣西發來其勢頗大臣即令署肇髙道于其珣督率沿江之知縣佐雜各官各赴圍基保護廣肇二府各大圍基俱係平穩早禾豐收九分十分不等惟南海髙要二縣屬之小圍各有衝塌者內中田土無多其早禾亦搶割將半據報收成亦有四五分水勢數日即退現在修築並不為災瓊州潮州二府俱十分豐收其餘各屬收獲未完雖分數尚未報齊亦俱豐熟通省米價平減恐厪聖懷合行奏聞臣謹奏覽早稻情形深慰朕懷然必俟登場後方可實信為豐收也同日又奏為奏聞運送楠木及補辦情由事竊查廣東應辦萬年吉地楠木據布政司詳准原任廣南韶道林兆惠三次移報共得方圓楠木九百餘件夫匠工價與修築水陸運費等項先後領用司庫銀共一萬三千三百兩緣林兆惠於山中採取止去粗皮估視成料急欲見功即報合式及運至三水與海幢寺兩處水次木厰臣親往看視亦覺外觀頗好但楠木貴重質細不同凡木臣令敬謹細加修整木內體質多有疵孔趕運修改僅選得合式方圓楠木二百八十根塊并鐵梨木九件於六月初七日委員先行運送起程由廣西湖廣進京其應補辦與原未報得之木現委署廣南韶道李可淳等接辦查林兆惠採運楠木千餘株出山合式解京者僅得三分之一從前工費多致虛糜實難辭咎即林兆惠亦自悚懼無地情願認還帑銀但一時不能庫銀五千兩俾其辦運俟林兆惠還足帑銀之後再還臣代交之項合并奏聞臣謹奏此事委用辦理始終俱不妥協候交部議另有諭㫖雍正七年十月二十八日江南河道總督臣孔育珣謹奏為遵㫖奏覆事竊照清河南岸御壩工程臣陛見時西奉上諭康熙三十八年聖祖仁皇帝南巡閲視河工時指授修建挑水壩一座挑溜向北引河得以暢流兼於清口有益聞得近日此壩比從前短窄爾到任時可細加查勘仍照從前原修加築寬長為是欽此臣自京赴任於十月初八日舟抵清口即至壩上細看查得此壩自康熙三十八年建築之時工長三十丈寬七丈五尺嗣後遞年加修現在壩身共長四十一丈寬十二丈又陸續添建雁翅三道重重包護較之當日原建丈尺巳增頗為堅固臣相其形勢壩巳逼近中泓欲再為加長即越過河心樁掃難以穩立欲再為加寬而上水雁翅掃工已斜至堤根土堰下水雁翅掃尾又溜避沙淤現成平緩臣細加相度此壩寬長丈尺均可無庸加築臣謹將查勘過御壩情形繪圖貼說恭呈聖覽臣謹奏據奏壩工情形乃朕所聞者悮也既如此惟當遵守皇考舊時指授保固勿失不必另議加築矣圖留覽雍正七年十二月初二日江南河道總督臣孔育珣謹奏為奏明清口引河情形事竊查清口迤上舊有引河七道各引全湖之水使之滙合出口用以濟運敵黃關係甚重昔緣湖水奔騰下注直逼髙堰是以自武家墩起即建築石工而髙堰與武家墩俱係迎溜頂衝故危險最甚嗣因清水之力有時而弱以致黃沙倒漾武家墩下灘地漸長再外而周家灘地亦漸增淤日積月纍髙堰之頂衝移在山盱汛內工程之險又非復昔日情形矣臣乘駕小舟溯清口而上將各引河逐細詳勘查天然引河與爛泥淺引河俱已淤淺帥家莊引河竟淤淺難流惟張福口與張家莊裴家場三處引河尚屬深通但臨湖河頭亦覺微淺其三岔引河一道以周家灘嘴節年迤邐南淤武家墩之外黃水灌入沙淤成灘此河亦漸淺窄臣覩此情形日夜惴惴欲求清口之暢闢全在引河之深通而興工挑濬工程浩大臣輾轉思維竊擬倣照前河臣靳輔挑濬清口沙淤之意相度情形離河身二三丈各挖深槽一道俾其分頭衝洗漸漸刷開前河臣行之有效自應倣照而行但現在係水落之後淤淺雖多或汛水長發勢能衝刷情形另有不同臣俟來年水汛之時再細看黃淮交㑹之勢引河出水情形如果挖槽有益相度舉行另行詳悉具奏所有清口引河現在情形理合具摺奏聞伏乞皇上睿鑒臣謹奏相度妥確然後試行看朕意謂猶非探本尋源之䇿若能使淮强黃弱勢可相敵即不行挑濬亦必暢流無滯不然徒恃此數道引河恐湖水未必能應手濟用也惟速將湖南一帶石工加髙加厚一律修砌堅固俾湖水無涓滴漫溢之虞其勢自强自當從清口暢流而出可免淤淺之患矣朕向未留心河務據理而論治河方略莫善於此宜急為斟酌籌畫者毋因愼重錢糧區區小見貽悮河防要務為此特諭凡朕為河工事務所批諭㫖皆令尹繼善知之批諭伊者亦令其通知於卿可也即將此諭傳諭尹繼善知之同日又奏為奏明髙堰石工情形仰祈睿鑒事竊惟髙堰山盱一帶臨湖石堤外而抵刷黃溜內而保障淮揚實係河工第一關鍵臣於抵任後欽遵諭㫖帶同河員即由陸路赴工往還相度又乘駕小舟沿堤上下將堤根樁石逐加相視查此堤南屬山盱北屬髙堰西面臨湖堤長一百六十餘里自康熙三十九年興築之後至今年久風浪汕刷不無樁朽縫鬆根腳空虛之處是以年年俱有坍塌臣再三審度擬將此堤現在石工完整髙固堤根尚堅者無庸加修外其堅實而卑矮者即就上面用石加髙其樁朽石欹鼓裂損壞根腳不堅者若再加新石上重下虗更難經久莫若全行拆起另換新樁重為修砌以資捍禦其石工原有十三層九層以及七八層不等髙矮不齊地勢亦有髙下不一俱應以武家墩地勢為準用水平逐段測量不拘層次惟視南北地勢加石一律平整務期髙堅永固方足以仰副聖意臣又查得湖堤自北而南共有掃壩十一座向因內堤險要故特包過石工越築掃壩以資重障獨有清水潭一壩壩外係掃工壩內係土堤外壩稍有疏虞壩內土堤不能抵禦應於壩內一體加築石工以資鞏固又大堤背後雖於漕運全資等事案內加幫但此土堤與石堤相為表裏尚有單薄之處應為加寬一律堅厚以永作全湖之屏障臣正在籌畫繪圖繕摺恭請聖訓於十一月二十四日接准部文欽奉上諭以髙堰堤工必應加增修理發戶部帑銀一百萬兩交與孔育珣尹繼善籌畫相度再著汪漋對琳張坦麟吳昌祚前往淮上協同悉心辦理欽此臣隨即移咨撫臣尹繼善㑹同相度在案今欽差侍郎臣汪漋等於十一月二十九日到淮俟撫臣尹繼善到日臣再㑹往詳勘妥議具摺另行請㫖外謹將臣勘過髙堰石工情形先為奏明伏祈皇上睿鑒臣謹奏此事俟汝等㑹同相度詳勘妥議摺奏到日再降諭㫖同日又奏為奏覆淮城情形事竊臣於陛見時欽奉上諭淮安府城逼近河濵爾到任時可詳細相度城外堤工舊有石工卑薄者加修髙厚無石工者建築石工欽此臣於抵任後親赴淮城沿堤悉心詳看查得淮安府城西門一帶乃係兜灣頂衝素稱險要於康熙三十八年建有石工長三百六十丈現在堅固其自西門以至南角樓止堤長二百丈水勢平緩非係迎溜之處是以當年止做柴土工程邇年歲歲修防臨河添下掃個堤身培薄增卑現在髙寬堅厚足資保障若議改建石工轉滋糜費且不能尅日告竣似可不必改築臣仰體聖心再四區畫務期城社民生永固無慮以上副宸𠂻伏查淮郡城西舊有護城河一道自運口迤下文華寺閘起至白馬湖止計程八十里原屬分泄運河暴漲之水以保淮郡堤工并備暵乾之時涵洞分逹利濟西鄉田畝實屬緊要因年久淤墊堤埂坍頽一遇開閘宣泄水無收束漫衍橫流西鄉一帶田疇悉被淹浸且暴漲之水宣泄不暢仍歸運河臣細勘河勢情形請將此護城一河挑濬深通并將兩岸堤堰加修寬厚凡值汛水異漲即將文華寺閘啓放俾一水分而為二以六分入運河四分歸湖內河身深通水各循軌而去堤工自可鞏固不特淮郡三城永資屏障而西鄉一帶民田既免淹浸之虞且可獲灌溉之利矣是否有當伏乞皇上睿鑒指示遵行臣謹奏此奏亦命抄發廷臣㑹議覆奏之日有㫖同日又奏為水利上下深通併請疏濬中假支河以收全效事竊惟淮揚髙寶江都等七邑凡河湖之水其上游來源皆自洪澤下游之水逹至串場等河以入於海蒙我皇上念切民生恐洪澤湖天然等壩泄出之水溢浸民田諭臣相度修築壩下束水堤工又淮安運河之水臣請疏濬文華寺閘護城一河以固城社現經另摺奏聞其串場等河先蒙我皇上欽差郎中臣鄂禮等監督興工將次告竣是尾閭業己深通上流又復通暢若中間支河聫貫之處稍有淺阻則下遏上壅堤工民田均有妨礙臣勘髙寶諸湖一帶情形查天然等壩宣泄之水俱入寶應湖由傅家嘴唐溝港等處以達於界首髙郵等湖隨逐處探測惟傅家嘴入水處淺窄應加疏濬寬深其寶應縣運河東岸之范家舍橫溝馬家垜蛤蛇溝清水口蟹兒溝蜆子灣等處皆間假淤淺其界首髙郵諸湖之水由運河東岸自髙郵州之南關大壩五里中壩車邏大壩分泄現今各壩口門之外俱有淤淺其南關五里壩之水入於南澄子河者自河頭起至十里尖地方止約七八里間假淤淺車邏壩下橫河亦屬淺窄均應疏濬又淮安運河東岸舊有澗河一道自興文閘起下逹馬家蕩專泄淮郡三城積潦兼之運河水漲時亦可分泄緣歷經年久河底墊髙蕩口淺澀一遇水漲即有盈溢之患亦應相度疏濬以利宣泄以上各支河若加疏濬則上下源流全體通暢自無溢漫之虞惟是現在黃運兩河工程在在緊要臣往來查勘不克分顧如蒙俞允伏乞皇上敕下江南督撫并水利諸臣㑹同勘估興工速儧完竣從此淮揚七邑人民永沐皇上天髙地厚之恩於無既矣為此繕摺奏聞伏祈皇上睿鑒臣謹奏此奏議論通暢深中肯綮現命廷臣議奏候㫖遵行同日義奏為河庫河務均關重大請敕照舊分管以専責成事查江南河庫錢糧原有河庫道専管經前河臣張鵬翮題請以淮徐道兼管河庫道事務歷今已二十餘年相沿成例兹蒙皇上發戶部帑銀一百萬兩加修髙堰工程錢糧繁多出納匪輕淮徐道管轄徐屬邳睢宿虹桃源黃河工程者四㕔運河宿桃中河一㕔而徐邳宿桃一帶黃河更屬險要該道勘估工程稽查料物督催修防俱須親身往來且又分巡地方不能兼顧庫務臣仰懇聖恩將江南河工錢糧照舊復設管理河庫道一員以司收支出納俾淮徐道得以専心經理地方河務如蒙恩允臣請將庫道一缺即以現在兼理庫道事淮徐道康𢎞勳補授其淮徐道缺查現在㕔員臣尚未深知惟聞山東兖寧道吕維炳諳練河務原由江南外河同知題補今職查山東河務不比江南之險仰懇聖恩俯將兖寧道調補淮徐道其兖寧道缺敕令河東督臣田文鏡與河臣嵇曾筠㑹同於豫東二省揀選題補則該道員缺自可得人無誤臣為錢糧河務起見不揣冒昧可否俯允伏祈皇上睿鑒欽定臣謹奏此奏甚是已有㫖諭部照所請行矣同日又奏為奏明事竊臣於雍正四年間䝉皇上特㫖命臣來工詳勘水勢協同前河臣齊蘇勒將河工通盤修理事宜細加商酌妥議臣隨欽遵㑹同齊蘇勒將黃運兩河堤岸等工年久殘廢之處逐加勘驗分晰估計共銀六十八萬七千六百餘兩㑹疏具題復荷聖恩俯念工程浩大欽命原任工部侍郎臣靳治豫原任奉天府府丞黎致逺專司稽查凡工程錢糧報明河臣齊蘇勒查核次第興修於雍正六年七月二十七日通盤修理完竣具疏題報并聲明按工查丈如式完固在案所有丈尺銀數清冊經齊蘇勒磨對核算尚未題銷嗣蘇州撫臣尹繼善接署總河印務駁冊參展遲延亦未覆核題報臣思此項通盤修理大工自河南山東以至江南縱橫綿亘其間土掃磚石以及防風排樁等工甚屬繁多臣於勘閲别工時經由帶看數處與報竣驗看時不同而土掃各工歷桃伏三汛水溜衝蟄更難悉符原估之數若按原冊題銷現在工程丈尺多不如式何敢冒昧入告若逐工丈量核減而原侍郎臣靳治豫等督察完竣之工業經前河臣齊蘇勒驗勘應無差錯且承修各員多有保固限滿者勢必均以日久為詞事關銷算大工臣不敢草率理合據實奏明可否恩准照前河臣齊蘇勒核定原數題銷抑或照現在丈尺逐工勘核再行具題臣未敢擅便伏乞睿鑒指示遵行臣謹奏此項工程作何銷算之處須卿據情據理秉公辦理朕若不令查核即准照齊蘇勒核定原數諭令題銷從無此例若命卿止照現在丈尺勘核不論保固限滿衝蟄與否槩令追賠世間更無此情似此兩難之事朕從何批諭卿與尹繼善揆情酌理詳籌熟計而為之毋憚煩同日又奏為奏聞事竊查前署山東巡撫布政使費金吾奏請開挑東省河渠以泄濟寧等州縣滙入魚臺縣之積水因各州縣應開河道俱在江南必須查明出水處所㑹同疏濬等因經部議覆令費金吾㑹同河東總督田文鏡北河總督嵇曾筠署江南總河尹繼善詳確妥議具奏奉㫖依議欽此欽遵經前署河臣尹繼善等行文兖寧淮徐二道㑹同勘議在案今據兩道勘覆前來臣細查勘議情形雖據稱遍歷查勘諸水皆有歸宿但江南地居下游稍有不愼所關匪細查徐州黃河北岸李道華家樓起至蘇家山止約計七十餘里向來不議築堤每值異漲之年漫溢之水從十字河岡頭湖荆山口一帶輾轉入運今議開挑荆山口迤下河渠所有入運之水挾帶濁沙誠恐仍致淤墊又自三岔河迤下運河窄狹今議修建閘壩水大之時運河宣泄不及泛漲堪虞至駱家湖添納諸水自必倍加漲湧衝激又恐運道一線堤工難資捍禦湖水既盛其三合土壩勢難滚泄滚泄不及湖水滿盈反髙於運上游之水更從何處宣泄再自三合土壩起由五花橋合劉老澗之水導入龍溝經由宿桃等六州縣地方逶迤綿亘計長七百餘里其間挑河築堰工程浩大而劉老澗乃宣泄中河之水多係濁沙更恐挑濬之後復致沙淤於宿遷桃源清河沭陽安東海州六州縣之民田或有妨礙事關重大若不區畫萬全不惟重糜帑金且漕運民生均有關係除飭令㑹同再行詳悉確議外臣不日親往各處逐一詳看細加測量如果宣泄暢流無傷運道無礙民田自當據實具摺先行請㫖恭候命下之日臣再㑹同河東督臣田文鏡等詳議具題為此繕摺奏聞伏祈皇上睿鑒臣謹奏前據費金吾摺奏云與卿等議同所以有命陳世倌等之㫖今覽此奏所見甚屬周詳慎重與費金吾原奏大相徑庭事關重大卿㑹同河臣嵇曾筠等議妥具奏到日候朕再加詳酌降㫖同日又奏為遵㫖奏覆事竊臣前於陛見時欽奉諭㫖天然等壩泄出之水恐其溢浸民田爾可相度動帑於壩下修築束水堤工務令各壩所泄之水悉歸湖內毋致民田被患欽此欽遵臣於抵任後親往湖堤五壩之下逐細詳看查得壩下一帶地方坐落淮郡西南其間糧田萬頃村落星羅向因湖堤緊要設立滾水三壩并天然南北二壩分泄水勢以保堤工逮至康熙四十五年間恭荷聖祖仁皇帝軫恤民瘼大沛恩綸特發內庫帑金於壩下挑河築堤收束放壩之水歸入寶應髙郵諸湖減水壩下於射陽湖入海水行地中民安袵席莫不仰戴洪恩羣歌樂利因此工創築已久各壩年年開放衆水經由巨浪撞擊堤工日見殘缺細看形勢總緣各壩口門甚寬兩堤逼束過狹且短之過也臣思壩下堤河原備束水欲使壩水循軌誠如我皇上聖明洞鑒必應修築堤工以束其勢俾來無漫衍去有滙歸方足鞏固湖堤而保衛田畝查舊堤處所土性堅硬地勢平坦從前於此處估築堤工原屬得宜應請將南甸堤徑窄狹之處自南岸王家菴起至趙家莊止取灣就直改濶二三十丈長三百丈另築新堤一道即將舊堤之土挖築新堤以免阻滯水路其堤尾距湖尚有二十餘里向無堤工若不接築加長則無堤之處散漫不能直逹於湖應於南岸堤尾馬家墟至應家集約十七里接築新堤一道北岸葉家莊堤尾勢漸北向不能束水應自周家墟至李良橋約十五里接築新堤一道再將南北兩岸舊堤按其假落分其平險遞為增減一律加髙培厚庶兩岸夾束水勢湍流自無旁溢之患自應家集李良橋迤下去湖尚約有六七里臣相度該處地勢窪下土性虛鬆本難築堤且逼近湖邊一遇水長縱有堤工亦必淹浸湖內徒費帑金况此處成熟田畝無多無庸議築以上應築堤工約需帑金一十一萬一千餘兩實於湖堤民田兩有禆益至於應修丈尺及需銀細數統俟確估另題外謹將臣勘過諸壩泄水情形及應行添築堤工緣由合行繕摺奏聞併繪圖貼說恭呈御覽伏乞皇上睿鑒指示遵行臣謹奏此工民生國計均關大事也原摺抄録留中與廷臣詳細酌定後再降諭㫖同日又奏為仰懇聖恩賞賜藥丸事竊臣向荷聖恩賞賜平安丸藥臣偶有微疾服之輒效緣此藥有竒驗濟人者多今經服完臣到任後因路上感寒思得此服慣之藥伏懇皇上恩准再賜臣百丸則感戴聖恩更無既極矣臣謹奏此藥有益無損洵乃竒方既常服有效賜五百丸來備用雍正七年十二月初六日江南河道總督臣孔育珣謹奏為請㫖事竊查髙堰加築石工欽䝉我皇上發戶部帑銀交臣與撫臣尹繼善相度並欽差侍郎臣汪漋內閣學士臣張坦麟對琳通政司右通政臣吳昌祚來淮協同辦理其預偹料物等項臣將管見所及另摺奏聞外惟是此堤工程浩大堤身甚長欽差四人應否分開工假查督抑同臣一總辦理不必分工相應奏請皇上批示欽遵臣謹奏朕命四人來意令其監工自當分假管理以專責成其如何興修事宜悉聽卿與尹繼善指示而行伊等陛辭時已曾面諭况伊等於河務皆茫無所知卿二人亦無可與之商酌處但留心訪察其行為少覺不妥即行奏知莫待貽誤後藉口委卸於欽差二字朕不專罪伊等也將此諭亦令尹繼善知之同日又奏為奏明平餘銀兩事竊查河庫向例發辦物料工程錢糧每平一百兩較庫平短一兩八錢謂之平餘蓋民間買賣皆用市平故也每年河庫繳送臣總河衙門銀三千兩與鹽商規禮銀二千兩同作養廉俱經前河臣齊蘇勒奏明臣思此項銀兩係往來日用所需相應奏請皇上恩准仍賜存留今我皇上發帑興修髙堰等大工此係聖主念切民生特頒之曠典凡辦料等項應仍照民間買賣之市平給發所有平餘臣俱令存貯河庫俟大工完竣銷算錢糧之日一併歸公合行奏明臣謹奏凡有需費處一面取用一面奏聞可也同日又奏為謹籌髙堰工程事宜奏請睿鑒事竊查髙堰加築石工欽奉聖諭令將應用物料歲內預備仰見我皇上念切民依料物預購俾大工速得興修告竣之至意臣籌酌辦理候撫臣尹繼善到日再行㑹商但撫臣來淮遲速未定合將臣所擬辦理緣由臚列先行奏請皇上指示一石料之應先採也查河工石料向採覔於徐州山中與盱眙縣澗溪地方臣擬先行分委幹員前往採辦又恐石多匠衆委官未能彈壓在徐州採石者今擬添委淮徐道往來查催在盱眙者擬令河工學習內閣學士臣西柱督催一運石之船應打造也查民船艙深板薄不能載石必須另造臣擬於道庫內先動銀兩給發辦石之員即令一面打造船隻雇募水手以資裝運統於辦石項內銷算一裏磚之宜預燒也查石堤裏石之內例用襯磚臣擬委員先往備貯至於石灰一項恐先燒走性俟將用之前委員燒運一葦柴之宜預備也查石堤之損裂外塌者勢須拆砌另釘樁木但必於湖內捲掃築壩戽水乾後方能興工臣擬先期委員購備柴料一樁木之宜預購也臣擬委員於蕪湖乍浦等處採買樁木又擬委員於山西等處製造應用鐵錠釘鋦汁鍋等項一石匠之宜預募也查石料係陸續採取運工而石工鏨鑿需時臣擬有石到工俱先鑿平整堆貯以便臨時取用一興工之宜相時也查堤工需石甚多一時不能運齊轉瞬之間即屬桃汛水發時候築壩修堤壩身不能穩固倘石工一經拆動關係匪輕臣擬將石物各料預備完整於明年霜降後一齊動工儧竣庶汛水可以無虞而一齊興工亦免曠日持久一委官之應擇人也查此堤工大費多必得殷實實心任事之員分董其事臣已另摺奏請皇上揀發其效力官中臣亦現在分别選擇至凡有經管黃河工程之㕔員本人汛地修防緊要臣擬一概不行調委一磚灰樁木并雜料之宜委總催也查辦理石料已擬委員其樁木磚灰雜料等項與招覔夫匠不可無大員督催臣擬委淮揚道白鍾山綜理其事以上各條臣愚見所擬是否有當奏請聖主指示欽遵至戶部帑銀諒即可到但料物應早為預備臣擬於河庫內先借支銀十萬兩分給委員早為採辧俟帑銀到日即行還庫合並奏明臣謹奏朕已有㫖命於江南鹽藩二庫撥銀百萬交卿等採辦物料矣庫帑解到時即分委能員採辦齊備於來年霜降後興工覽一齊動工儧竣之議甚是至選擇河員一欵將汝另奏之摺抄發該部查議奏覆降㫖其總催之員照卿所奏專委白鍾山綜理甚屬妥協同日又奏為據實查奏事竊照河工㕔員有經手錢糧之責如有祖父缺帑者自應照例解任以杜虧那掩飾之弊今查現任山安同知常建極係原任己故裏河同知常維正之子常維正於裏河同知任內虧缺各案帑銀一萬七千餘兩自康熙四十六年著落常維正長子常建岐名下追賠歷今二十餘年僅完過銀一千五百餘兩查常建極亦係缺帑已故常維正之子何得己身居官脫然事外况伊本任未完雍正四年贏餘蕩柴價銀三百餘兩經前署河臣尹繼善題參限一年追賠現在又無交納且山安所屬係黃河緊要地方該員所做工程多屬遲延似此缺帑玩工之員留之無益合先奏聞再查現任徐屬同知張鐸伊兄張鎧原署桃源同知任內虧缺辦料銀兩經前河臣齊蘇勒題參審追在案臣訪聞該員將㕔庫錢糧代兄那墊隨委員盤查據張鐸稱係搶修備料用去及問其搶修工假因何銀數浮多則又稱發辧各工物料尚未運到臣現在勒限一月飭將物料全運貯工如再藉延逾限或銀料不抵即行題參究追外惟是徐屬地方為黃河扼要之區汛險工長關係重大該員縱將帑項彌補清楚亦不便仍留要缺但可否念其人屬青年以簡缺調補或以居官闒茸與常建極俱行題參臣未敢擅便合併請㫖遵行臣謹奏將常建極即行題參可也其張鐸一員查明㕔庫若係虧空亦當題參如果備料是實可否姑留調補簡缺之處汝其酌量為之雍正八年正月初十日江南河道總督臣孔育珣謹奏為奏聞事雍正七年十二月十九日據宿遷縣詳稱本月十二日本縣歸仁集地方忽有多人口稱岡民原種岡地今又輸納衛糧不能完納要向店戶借貸集上店户聞知此語俱各閉門等情詳報前來臣隨飛差辨員前往㑹同該地文武慰諭集上居民并細查為首生事之人嚴拏審訊去後又復密差千總徐奇星赴該處密訪起釁情由及現在居民曽否安業至二十六日據千總回稱密訪得本地鄉民咸稱是日因新設潼安衛守備尤玉珍差人下鄉拘拏缺戶其時集上人多內有一二缺糧花戶聲言我等原種有糧岡地並非領墾新淤地畝之人今輸納衛糧要向市上鋪户借貸完納店戶聞知隨即閉戶移時鄉民亦各星散次日縣衛各官到集慰諭店戶居民仍照常生理其起釁之岡民陳廣修等四名宿遷縣已經拏獲究審等語臣隨飭淮徐道將拏獲之陳廣修等嚴行審訊招解督撫二臣外臣查民地錢糧屬州縣徵收者謂之民籍衛地錢糧屬衛地徵收者謂之軍籍此向來之定例也今新淤地畝原係民領民地自應州縣徵收且查邳泗睢宿桃五州縣新淤地畝逺近相隔二三百里不等而潼安一衛設於五州縣交界之間鄉民赴衛完納錢糧未免路逺多費若再守候更妨農業實有未便合無仰懇皇上隆恩將新設潼安一衛竟行裁去并敕令現在清查新淤地畝之督臣范時繹撫臣尹繼善俟此案地土丈清之日各歸州縣輸納錢糧如此則小民不特便於輸將而輿情亦踴躍樂從矣是否可行伏乞皇上睿鑒施行臣謹奏覽奏歸併州縣之議甚屬合宜即密行知㑹督撫臣范時繹尹繼善等查丈新淤地畝清晰之後將潼安衛議裁具題請㫖可也同日又奏為奏明河工飯食銀兩事臣查南河各㕔從前原有工部飯食一項係各㕔自行交送其數目多寡本無一定歷任河臣俱不經管亦不稽查雍正七年七月至十月歷准工部咨文內開南河每年應解飯食銀一萬七千六百五十兩係奏明養廉之項催令解部經前署河臣尹繼善行令淮揚淮徐二道轉飭起解臣抵任之後據兩道轉據各㕔遵奉部文先凑飯食一半銀八千八百二十五兩請咨起解臣隨給咨解部交納在案但查此項銀兩臣未到任之前即據各㕔㑹詳稱河工飯食一項向係各㕔自行交部銀數多寡並無定額今既奉大部每年飭解飯食銀一萬七千六百五十兩應於歲搶修工程項下以每㕔承修多寡照數均攤彚解但歲修於本年十月題估而搶修於次年四月報銷此項飯食既照歲搶修銀數分攤必須兩次起解方免遲誤等語臣思此項飯食銀兩係部堂司官作為養廉之用但事屬創始可否如各㕔所詳於歲搶修項下均攤彚解抑或仍照從前聼各㕔自行交送理合據實奏明請㫖臣謹奏據奏似應行令淮揚淮徐二道照嵗搶修工程計算多寡均攤彚解為是但未悉此項銀兩或出自工程節省之內或於給發錢糧內扣除其中有無侵帑纍工之處察明據實具奏至於部費之存而未革因向來河員循行日久已成定例而部中需索無厭不肖官吏借此任情開銷不如作為一定之數庶幾內外無擾之意今日河員若不願出此費便不行解交亦不畏部中借端掣肘據實奏明朕即飭諭該部竟將此項革除密之同日又奏為奏明挑築運口越河以利運行事竊照瓜洲由閘運口乃漕船出入咽喉最為緊要雍正六年間前河臣齊蘇勒因先改運口逼近城垣而繞城一河又復甚窄題請復開舊時運口建壩挑河使糧艘商船經由故道於漕運城社大有禆益查瓜洲由閘之下向有石閘一座名為四閘與由閘相為表裏次第啓閉賴以蓄潮濟運今江流北徙四閘塌去久已無存而退潮大溜之洶湧既無四閘以制其性又無支河以分其勢兼之淮水巨流灌注是以閘下之水勢若建瓴湍激異常臣到任後即知運口商民船隻往來艱險且不日重運經臨所關匪細隨於上年十二月飛委營員星赴查勘擬挑越河一道以利漕商又復檄行淮揚道妥議確估去後今據該道詳稱應自由閘以上青蓮菴起至尤家碾止挑挖越河一道計長三百六十七丈寬十二丈仍於河頭上建築束水草壩一座收束水勢現在飭㕔造冊申送等因到臣竊思此項要工目今重運將臨若俟該㕔造送估冊再行發帑恐緩不濟急臣隨飭知河庫道速發帑銀四千五百兩委員挑河築壩限一月內完工以利漕便民臣一西㑹同蘇州撫臣尹繼善親赴該工相度情形督催完工一面飭令淮揚道將工假丈尺以及需用銀兩數目確造細冊另行㑹疏具題外合先繪圖具摺奏聞伏乞皇上睿鑒臣謹奏挑築此河甚有禆益㑹題到日再降諭㫖圖留中江南河道總督臣孔育珣蘇州巡撫臣尹繼善謹奏為㑹勘髙堰大工謹籌修理事宜仰祈睿鑒事竊照髙堰石工䝉我皇上特發百萬帑金交臣等籌度修理於雍正八年正月初三日臣等同赴髙堰一帶細加相度勘得髙堰石工自武家墩起至小黃莊止地勢本髙工程尚屬堅固無庸加髙惟內有脹裂欹斜者九假應行拆修堅固又查該工自六堡起至小黃莊止大堤背後土堤應加幫髙寬以資堅厚內有侯二門等四壩舊有石工原屬卑矮且歷年久逺樁水朽腐應行拆修比照髙堰石工一律加髙以資鞏固又有小黃莊起至山盱古溝東壩止現今石工地形低窪且歷年既久底樁朽腐之處甚多必須通身拆起另換樁木一律加髙與堤面相平苐修砌石工必先建築越壩以攔湖水然後可以施工今議倣照從前髙堰修砌石工成例將舊有石工連石工背後之土堤共寬二丈俱仍留不動以代越壩於此二丈之後開槽釘樁砌石俟新工立定根基再將外護舊石逐漸拆起攙搭選用但既退進二丈則舊日堤身較他工單薄且堤頂挖槽建築更須慎重查土堤之後有應加幫裏創工亦宜加築髙寬以資內護內有清水潭裏越堤原係土工應創建石工使得一例完整乂自古溝東壩以南至滚水南壩石工地勢本髙現在堅實無庸通身拆砌亦不用加髙內有樁歪石欹之處共計八假應一律拆修堅固其大堤背後土堤自古溝東壩起至滚水北壩止亦應幫築髙寬以資堅厚以上髙堰山盱一帶應行加修拆砌以及創建各石工約估銀八十二萬餘兩應幫土工約估銀十五萬餘兩通共約估銀九十八萬餘兩臣等仰沐深恩身膺重任似此緊要大工自宜同心協力趕築完竣但所用石料採辧需時且三汛之內水勢長發亦未敢輕拆舊工再四斟酌與其興工以待料不如料足而興工已經選擇幹員各處開山覔匠上緊辦料於秋汛後併力動工至於土創急宜先築現在派委多員於開印後即分假修築土工務期夯硪堅實一律寬厚幫護石堤捍禦波浪以仰副我皇上念切民生之至意所有臣等㑹勘過髙堰工程情形理合先行具摺奏明伏乞睿鑒臣等謹奏朕不惜百萬帑金以衛民濟運工程當務久逺堅固一勞永逸此外即再增數十萬兩亦不為多若因省小費致悮大計則所費百萬仍屬虛用也堤工卑矮之區固應增髙而單弱之所尤宜加厚可再詳加相度勘視切勿胸存小見凡有卑薄以及傾圮處悉將堤身拆砌務令自頂至底一律堅實期於永久獲益所需錢糧不必限定此數切諭至囑至所奏查估工假採辧石料築土代壩等項事宜俱屬妥協照所議行雍正八年四月初八日江南河道總督臣孔育珣謹奏為奏明微臣病患獲痊情形仰祈睿鑒事竊臣於上年九月間趨覲天顔得遂兩載依戀之私自陛辭赴任道路之間偶感微寒痰嗽間作尚不為患至今春正月內胸膈膨悶飲食漸減繼為庸醫所誤參藥雜投轉增脅痛腹痞之症一月之內時卧時起一切公事雖力疾辦理不致貽誤但各工未能親往查勘中心惴惴刻不自安至三月下旬有山東醫生馮煓授臣草藥丹方一劑乍投下淤血數次不覺沉疴頓減神氣清爽目下漸進補藥飲食亦增自此加意調治前症悉除猶可勉竭駑駘力圖報效以後餘年皆叨皇上如天之福庇也所有微臣病患獲痊情形擬合據實奏聞臣謹奏覽奏知卿疾愈身安深慰朕念宜加意調攝愛養精神諸凡量力而為不可勉强從事過於勞頓硃批諭㫖卷七之四
