body:
  text: 欽定四庫全書硃批諭㫖巻七十四硃批楊天縱奏摺雲南臨元總兵官臣楊天縱謹奏恭請皇上聖安朕安聞爾居官聲名甚好如此方為不負朕之任用勉之切莫改移心行雍正四年十一月初三日貴州提督臣楊天縱謹奏為恭繳硃批奏摺叩謝天恩事雍正四年二月初九日臣在雲南臨元鎭據臣標把總捧到皇上硃批臣請聖安摺子一扣并䝉賞賜克食一匣臣隨郊迎至署恭設香案望闕叩頭謝恩祗受訖竊臣至愚至陋䝉我皇上隆恩畀以總兵重任二載有餘毫無寸長足録時切悚惶臣具摺請安乃䝉皇上硃批嘉勉臣跪讀之下愧感無涯今又䝉特授貴州提督任大責重愈深蚊負之懼惟有凛遵訓㫖益勵氷兢竭盡駑駘以期仰報萬一斷不敢改移心行致負我聖主任用之殊恩也所有奉到硃批理合恭繳叩謝天恩伏乞睿鑒謹奏黔省狆苖經此番徹底整理省却爾許多力但諸凡善後事宜均屬創舉愼厥終惟其始幸遇督臣鄂爾泰非尋常人當一一聽其指授實力行之可也效力人員一摺留中雍正五年三月二十七日貴州提督臣楊天縱謹奏為欽奉上諭事雍正五年三月初八日雲南楚雄鎭總兵官南天培自京陛見回任過臣駐劄之安順府臣跪請聖主指授方畧發兵勦撫安設營制頑苖悉皆懾服其畏懼逃避苖衆臣抵任之初仰體皇仁即委員前徃各寨安撫招回復業而各寨頭人齊赴臣署投見臣宣揚皇上好生之德剴切化誨并各給與棉衣花紅銀牌米石撫慰遣歸復思長寨用兵以來春耕已誤秋成無收難免饑寒失所適督臣鄂爾泰來黔臣與之面商必須捐給米石及春耕籽種以資其生隨咨移撫臣何世璂并司道諸臣籌畫捐給今督撫兩臣現在委員散賑兹䝉皇上垂念地方初平復下宸衷為此繕摺奏聞謹奏覽同日又奏為奏明事竊臣於雍正四年十二月十五日准雲南督臣鄂爾泰咨開四川烏䝉土府禄萬鍾縱容夷目刦搶為害地方經川陜總督岳鍾琪題叅奉㫖革職令川滇會委大員嚴提審擬隨照會雲南曲尋鎭會同糧儲道前徃川黔適中處所會同川省委員提審在案恐禄萬鍾桀驁性成不服拘提酌調威寧鎭標遊擊哈元生帶兵八百名畢赤營遊擊吳朝應帶兵二百名大定協守備何廷鳳帶兵二百名分駐八仙海等處聽候調遣等語嗣因禄萬鍾逃匿鎭雄土府隴慶侯朋比為姦點集夷兵預謀抗拒於本年正月十八日准督臣鄂爾泰劄調漢土官兵前來臣即飛調安籠等營及撫標兵丁共二千一百八十名各令遊守千把帶領專委臣標後營遊擊詹天祥總統帶至畢節適中地方駐劄并咨明曲尋威寧二鎭臣節制調遣去訖於本年二月初九日據遊擊哈元生報稱正月十九日攻破發烏關二十三日抵甕迭􅋭白女迭復招集夷賊在甕迭􅋭對敵元生帶領弁兵攻打上􅋭大破賊衆各賊膽落滚箐而逃等情於二月十二日准督臣鄂爾泰咨禄萬鍾隴慶侯智窮勢廹俱奔投川省不須多兵提督所調官兵應先撤回等因到臣臣隨將調發各路官兵檄撤陸續回營矣除烏䝉鎭雄抗拒情形應聽督臣鄂爾泰具奏外所有臣准咨發兵駐劄畢節聽候調遣並撤回情由理合繕摺奏明謹奏此事已據督臣鄂爾泰備悉奏聞矣實出朕之望外可喜之至同日又奏為密奏事竊惟五年軍政實為朝廷激揚大典查定例提鎭自陳恭候上裁副將以下把總以上係督撫提鎭㑹覈賢否分别去留具題舉劾立法至善至公乃臣自服官以來每見軍政之年各省多以千把劾叅竟至一二十員不等似非澄清整飭之意矣夫千把雖屬微員平時有防汛護餉解逃捕盗之責遇敵有身先士卒之任㧞補之時俱稱人材壯健弓馬嫺熟以備臂指心膂之用倘拔補之後懶惰偷安弓馬生疎行事乖張殘廢昏憒者自應不時斥革免致廢弛營伍又豈宜姑容待至五年軍政始行叅劾耶臣由把總服官四十餘年其中情弊知之最悉皆縁從前有不肖提鎭或利慾薰心或左右讒謗不論賢否即以有千八法劾叅一則代為大員塞責一則又得錙銖講究去一千總必拔一把總補一把總必拔一兵丁祇圖飽其囊槖不思良心盡昧上負君恩下屈末弁如此陋弊恐未盡除臣受恩深重不敢緘黙冒昧具摺密奏伏懇聖慈敕諭各省提鎭嗣後千把總内遇有劣員即時斥革不得於軍政案内塞責庶大典肅而人材不致寃抑矣如果臣言可採伏乞皇上睿鑒施行謹奏所奏甚屬有理不止千把微弁内有此陋弊武官五年軍政文員三年大計總成虚套朕深惡之但念舊典相沿已久不便遽行停改當將千把塞責之弊先為革除耳候隨便有㫖雍正五年七月二十日貴州提督臣楊天縱謹奏為恭繳硃批奏摺叩謝天恩仰祈睿鑒事雍正五年五月十五日臣家人齎捧皇上批臣奏摺並賜臣紗六疋到黔臣隨郊迎至署望闕叩頭謝恩祗領訖敬讀各摺内硃批彌深感悚臣身受殊恩逾於覆載一切事宜敢不殫心竭力相機辦理伏查長寨處在腹裏原隸廣順州管轄從前敢於横肆者因彼東南西南一帶與粤西泗城地界交接處所有種苖人恃其巢穴險峻地多煙瘴不服州縣約束號為無管生苗此輩以内地狆苖為肆惡之媒内地狆苖以此輩為藏身之窟裏勾外連徃徃作祟現今長寨既平若不趁此將生苖招撫來歸恐其日後仍敢生事臣隨商之督臣鄂爾泰將附近生苖邊界各熟苖頭人先差員喚出臣逐名賞給衣食等物後委臣標中軍叅將劉成謨多帶銀牌花紅告示並熟苖頭人於本年閏三月内前徃彼地開誠化誨仰仗天威各寨生苖皆感激向化苖頭六十七名當隨該中軍至臣署投見臣復面加撫慰令其剃頭給以衣帽酒食并花紅盤費繼又化出生苖頭人四十七名臣照前賞給並給與盤費差送回家諭令轉化去訖今共化出生苖一百四十八寨計男女共五千六百四十七名口伊等各量地土情願具結認納錢糧永作盛世良民其未化及者尚多因此時彼地煙瘴正熾待霜降後再令劉成謨前徃招撫所有化苖情由理合陳明并奏繳硃批原摺叩謝天恩伏乞睿鑒謹奏生苖歸化欣悅覽之雍正五年九月初四日貴州提督臣楊天縱謹奏為奏明事竊查湖廣靖州與貴州黎平府接壤之謬沖花衣苖恃險負固屢行不法臣先准楚省來文即檄飭前任黎平協革職副將劉業浚遣發官兵與楚省委員訂期㑹拏在案於雍正五年閏三月内又准湖廣及雲南督撫提諸臣咨文調撥官兵協𠞰前來臣即飛調鎭逺協兵丁二百名黄施營兵丁五十名并黎平協兵丁一百名委鎭逺協左營遊擊韓勲總統前徃㑹合楚省官兵相機𠞰擒去後隨據劉業浚呈准湖廣靖州協㑹商訂期進𠞰當委守備左垣帶領官兵同黎平府知府張廣泗等親領衙役於閏三月二十一日自黎平前徃㑹擒二十四日與楚省官兵分作三路齊進謬沖兇苖伏險拒敵官兵奮勇殺死賊苖十餘人活擒一名賊衆奔竄當即焚燬巢穴連日搜拏擒獲賊苖主謀首犯李玉樓等鎗傷兵丁一名傷死衙役二名嗣據總統遊擊韓勲報稱帶領官兵於四月初六日抵三里驛探訪賊蹤㑹同搜擒今楚省陸續拏獲兇苖男婦大小八十餘名口黔省拏獲五十餘名口附近謬沖並無逸賊遊擊韓勲㑹𠞰事竣於本年八月十八日帶領官兵回營除擒𠞰謬沖情形并拏獲兇苖男婦應聽楚黔督臣撫臣分别審擬外所有臣調撥官兵㑹擒縁由理合具摺奏明伏乞睿鑒謹奏覽奏知道了據此情形尚未可謂徹底清理也雍正六年三月初六日貴州提督臣楊天縱謹奏為恭繳硃批奏摺叩謝天恩事雍正五年十月十五日臣家人齎捧皇上批臣奏摺並賜奏摺匣四箇蜜漬荔枝一瓶到黔又於十一月二十二日臣家人齎捧皇上批臣奏摺並賜哈密瓜一箇到黔臣俱出郊跪接進署恭設香案望闕叩頭謝恩祗領訖臣伏讀恭繳硃批奏摺内因化誨生苖䝉聖主硃批生苖歸化欣悅覽之欽此臣跪讀天語不勝懽忭臣將前後化出苖人寨數户口節次造具清冊移送督臣鄂爾泰題報在案臣又委叅將劉成謨化出五寨現在查造户口俟查明同再化出者造冊咨送督臣具題至凡有應招撫者臣遣員次第招撫務期各種生苖盡附版圖地方永獲安靖以仰副將李登科等徃古州八萬地方察㸔形勢今督臣鄂爾泰委令張廣泗等籌畫妥當帶領官兵再徃化誨並清查煙户俟查明回日或設立營汛郡邑硃批覽奏知道了據此情形尚未可謂徹底清理也欽此竊查懲創謬沖兇苖一切情形臣已同黔楚兩省督撫諸臣㑹疏具題若再於摺内敘入恐其煩瑣是以只將調撥官兵㑹擒縁由具奏茲䝉聖恩批飭臣惶悚無地惟有殫竭駑駘以期仰報於萬一耳為此繕摺叩謝天恩並繳硃批原摺伏乞睿鑒謹奏覽爾諸凡奏聞與所料理事件俱屬妥協詳明居官聲名亦甚好朕深為嘉悅勉之又奏陳黔省田賦情弊尤屬可嘉若封疆大臣槩能存此毫不瞻顧推諉之心事事據實入告何愁吏治不清地方不就理耶摺暫留中目今撫臣係新任恐土俗民情尚未熟諳急為整頓或致錯悞而督臣鄂爾泰又有烏䝉之事精神安能處處周到朕所以暫緩發諭相機而為之耳同日又奏為奏明事雍正六年二月二十二日准威寧鎭總兵臣孫士魁咨稱烏䝉米貼土目禄永孝之妻陸氏奉行提審抗拒不出統領猓賊於二月十二日將雲南援𠞰右協副將郭夀域並所帶官兵傷害本鎭隨撥官兵三百名令遊擊顔文選帶領星夜馳赴烏䝉應援又飛調大定黔西平逺畢赤四協營兵丁九百名星赴威寧聽本鎭率領前徃調遣𠞰擒並請派撥官兵速赴烏䝉救應㑹𠞰等情到臣臣隨飛飭大定黔西平逺畢赤四協營遵照該鎭檄調官兵兼程速徃聽候調遣援應臣恐兵丁單薄又飛調定廣長寨貴陽安南普安盤江新添安順等協營並臣標官兵共一千三百名令臣標後營遊擊詹天祥統領尾赴烏䝉鎭雄分佈防守聽候㑹𠞰並咨移四川督撫提鎭堵禦協力𠞰擒外所有猓賊不法並調遣官兵㑹𠞰情由合先具而止用滇黔官兵恐未能盡淨根株請將建昌永寧等處官兵暫令督臣鄂爾泰節制聽受調度俟平定之後仍歸川省專轄庶呼應得靈而軍機有濟矣是否允協臣謹一併密奏伏乞皇上睿鑒施行謹奏川省督撫提諸臣已於各路派遣官兵協力堵禦而督臣岳鍾琪亦請將各路官兵悉聽鄂爾泰節制所奏情節與爾相同雍正六年六月初四日貴州提督臣楊天縱謹奏為奏聞擒獲頑苖仰祈睿鑒事竊查烏䝉米貼土目禄永孝之妻陸氏糾黨拒捕傷害官兵臣接威寧鎭臣孫士魁來文隨飛調各標協營官兵星赴烏䝉㑹𠞰並咨移川省速為堵禦情由業經具摺奏明嗣准督臣鄂爾泰檄委雲南鶴麗鎭臣張耀祖尋霑營叅將哈元生總統滇黔官兵𠞰捕並咨臣委員帶兵前徃鎭雄彈壓臣即飛調臣標後營遊擊詹天祥於前調撥官兵内分領四百名速徃鎮雄駐劄臣又委臣標前營遊擊卜萬年由小路馳至烏䝉統率黔省官兵㑹𠞰有鶴麗鎮臣張耀祖等議定三路進兵令遊擊卜萬年等帶兵由中路進鎮臣張耀祖帶兵由左路進叅將哈元生等帶兵由右路進俱於本年三月二十四日起營進𠞰其威寧鎮臣孫士魁駐劄烏䝉接應而猓賊於各路口關隘俱立排柵堆集滚木擂石拒敵我兵用命攻殺連破數􅋭直搗井底􅋭門坎山賊巢斬擒甚衆又擒獲四川所屬吞都土千户德昌主文梁嘉楷供稱德昌幫助陸氏拒殺官兵等語三路官兵奮勇搜𠞰又攻克五險􅋭等處險要賊窟陣斬賊首毛臉擒殺賊黨不計其數五月初一日追至羊呢箐硐内擒獲酋婦陸氏並賊首水牛母雞男婦五名口初十日又擒獲逆首立之户吞並陸氏之女其吞都土千户德昌以及拒捕傷官賊黨現在嚴飭各路官兵上緊搜𠞰務使盡淨根株永安邊地此番用兵皆仰仗我聖主天威逺震方畧遥頒所以到處成功臣不勝慶幸之至理合繕摺奏聞伏乞皇上睿鑒謹奏應慶幸者朕未料此事能如是速結皆仰賴上天垂慈聖祖黙祐之所致朕之方畧有何足道同日又奏為奏明事竊查貴州苖狆野性兇横兼之漢姦唆使刦殺綑擄無所不為臣抵任以來據告種種兇殘之事者指不勝屈臣思苖狆雖屬異類然孰不畏死貪生乃敢放肆無忌者皆由因循姑息茍且從事以養成之耳臣嘗見有司每遇盗案正兇正賊俱已擒獲經年累月不審不完使被害及牽連無辜人等在城守候苦累萬狀而正兇正賊反在監中安坐待至日久官有陞遷解任事故胥役作弊或從輕開脫或乘隙使逃故兇惡不知畏憚而地方受害無已也臣受恩深重不敢因循舊習避越俎之咎除邊壤生苖以及素行抗賦頑夷臣量給賞費委員化導招之來歸並除户婚田土人命鬬毆一應民事臣不干預外凡拏獲刦殺綑擄兇賊並漢姦等犯臣即公同安順府知府審問確實將為首者各按應得之罪或割斷脚筋或枷號懲處其餘情罪可貰以及證佐無辜之人臣審明即先行發落釋放寧家並不株連拖累此臣因貴州地方實與他省不同是以懲治一二禁止惡風邇來稍覺寧謐但自奉㫖准督臣鄂爾泰題請有罪應論死者一槩不許外結等因行文到臣欽遵後臣拏獲兇賊俱交有司審擬惟聽督撫具題所有臣到黔因地制宜懲處賊犯情由理合具摺奏明伏乞皇上鑒宥謹奏因地制宜何傷乎不但從前即嗣後遇應如是處斷案件仍不妨奏明料理朕之不令外結者恐其諱匿隱飾草率完結之故耳假若不行外結即與地方事機有掣肘之處當與鄂爾泰㑹商將情由奏聞候朕另為斟酌不過欲令地方受益百姓受福耳更有何所為耶同日又奏為敬陳黔省行使制錢之法仰祈睿鑒事竊惟制錢係國家通寶各省皆用惟貴州一隅未能通行臣細察其情並非民之不用實由於地方官之不樂行也蓋每年應收正雜錢糧每兩明則加火耗二錢其實竟有加至四五錢不等且布政司衙門每兌收銀一百兩加輕平銀五兩若收錢則無羡餘是以不行收納從前滇省曾發制錢試用在民間隨手交易較之用銀毫釐不折孰不稱便只因糧賦一項官不收錢民間因置而不用臣思欲使制錢流通必先籌行使制錢之法臣查黔省地丁等銀以及稅課每年通共約計不過十數萬兩俱在本省支銷非他省錢糧衆多者比臣仰懇聖裁敕令督撫兩臣飭行貴州各府州縣凡百姓應納錢糧一兩以下者俱收制錢一兩以上者或銀錢並收聽民自便再各稅口亦許銀錢並納母得掯勒刁難其地方官所收銀錢除銀仍起解布政司彈收貯庫至徵收之錢無庸解交以省脚價即如臣標下兵餉每季需銀萬兩可以錢二千串撘放就附近地方官所收錢内支給而各鎭標協營兵餉亦照此撘放至一應驛費各項俸工俱將錢文支發如此則黔省錢文流通而滇省鼓鑄自然不至壅滯矣管見如斯是否允協伏乞皇上睿鑒施行謹奏此奏朕不深以為然錢既不能通行恐撘放與兵無益至云地丁稅課皆准令百姓納錢而後制錢方可流通似屬有理然考之他省並未有納錢代銀之例何以錢貴於銀而每苦錢之不敷用耶於此觀之前說恐仍非探本尋源之䇿朕不過就事就理而論爾再與督臣鄂爾泰詳加籌計可也雍正六年八月二十日貴州提督臣楊天縱謹奏為奏明事竊查原任貴州按察使今陞巡撫張廣泗前徃都勻府清理苖疆公同該處文武酌商機要體察情形已由八寨帶領官兵分路前進宣導嗣據凱里營都司羅資衮等報稱本年六月十七十八兩日烏留寨兇苖不遵化誨糾合丹江等處兇苖前來對敵分遣官兵三路夾攻兇苖大敗等情臣恐兵單又飛調貴陽營官兵二百名星徃協助茲於八月初五日准撫臣張廣泗咨稱附近凱里之丹江一帶頑苖寨數甚多地勢深險再三化誨乃敢㝠頑固結抗敵傷兵兼之屢經殺敗毫無畏懼所當暫緩前進亟請大兵嚴加懲創庶此一處帖服其餘部落自然望風而靡一勞永定等因咨臣調撥官兵六七百名前來臣即派撥臣標官兵四百名大定黔西平逺定廣新添等五協營官兵五百名檄令定廣協副將蘇大有統領星速前赴撫臣張廣泗駐劄處所聽候調遣署撫臣沈廷正亦派撥官兵三百名前徃𠞰撫去訖所有丹江頑苖不遵化誨糾衆拒敵並臣遣𤼵官兵前徃協力𠞰撫情由理合具摺奏明伏乞皇上睿鑒施行謹奏覽奏已悉鄂爾泰亦經備細奏聞矣同日又奏為奏聞事竊照廣西西隆州八達寨土目顔光色等結連西林縣之岑扭岑顚屢行不法擄掠居民一案臣於雍正六年六月二十五日准廣西右江鎭總兵臣段宗岳移咨官兵會𠞰前來臣隨轉咨安籠鎭臣蔡成貴去後嗣准該鎭兩次咨報遣派遊擊田昌友賀成署守備李文仲並千把等帶領漢土官兵前徃㑹𠞰七月二十五日又准鎭臣蔡成貴揭帖内開該鎭於七月二十二日統領守備趙延𢎞張超並各營弁兵兼程前赴八達㑹𠞰同日又准雲南督臣鄂爾泰咨移行調廣羅協廣南營及安籠鎭添撥漢土官兵務期滅此兇夷以靖隣界縁由臣亦㑹咨去後茲於七月二十八日准安籠鎭臣蔡成貴咨為報明事内據遊擊賀成田昌友禀報本月二十日有右江鎭令職等三路進兵二十一日職等率兵照依左右山梁攻進守備李文仲督礮攻取賊兵礮臺已經攻到八達寨脚詎知粤西各路兵丁四山觀望不前離寨十餘里放礮虛應故事未臨賊寨先即奔潰以致賊兵四路圍繞將職等困於寨脚垠下致害官兵職等奮勇攻出守備李文仲把總王承文俱皆陣亡等情本鎭據報不勝駭異此實由粤西領兵官常顯虎左吉等不遵分路㑹攻原議始則袖手旁觀繼則率兵奔潰以致我軍勢孤失事茲據前情合先通咨等因到臣即行派撥臣標及長寨安順兩營官兵令守備許應虎帶領前赴八達聽候鎭臣蔡成貴總統調遣㑹勦於八月初一日又准廣西右江鎭臣段宗岳咨為飛報軍情事内據遊擊賀成田昌友呈稱職等遵奉憲令分撥率兵由左右山梁下攻賊寨守備李文仲督率礮隊攻取礮臺直抵八達寨脚詎知憲撥各路之兵一人未至惟四山觀望而已以致我兵孤注力竭賊兵恃粤通同外應竟四圍旋繞將我官兵困於寨垠之下職等奮力攻出而守備李文仲把總王承文在陣身亡士卒帶傷者數十餘人竊思官兵既令㑹合進𠞰自當彼此相援奮力攻擊庶成厥功不料憲臺所存何意竟按兵不動使我兵困極遂至失機等情前來竊本鎭督同左右兩江官兵所取賊右平寨與田將等所取賊左平寨及左遊擊土田州等所取弄髙俱係中間賊寨山横箐密非若平荒大野彼此相顧者比兼以賊人狡猾密布藥弩鎗礮我兵奮力進攻俱難近寨詎意田將輕敵前進遂至有失本鎭急遣官兵馳救施放沙礮打死賊徒六人始得漸退猶令於八陽河北遥作復進之狀以待田將兵退賊徒復來對敵戰至申刻始得歸營今田將等反欲誣飾卸過且謂賊兵恃粤通同外應之語不知出自何心何所指實而云然也等因到臣除飛飭調撥官兵星速前徃立即𠞰滅以申國法以靖邊疆並咨安籠鎭臣蔡成貴將官兵被害實情確數嚴查咨㑹統聽督臣鄂爾泰具疏題報外理合繕摺奏聞伏乞皇上睿鑒施行謹奏此事情形朕皆洞悉無遺其㑹同鄂爾泰詳加籌畫相機調遣速行𠞰滅早奏捷書可也雍正六年十月二十二日貴州提督臣楊天縱謹奏為奏聞事竊照粤西八達寨逆㺜拒敵傷兵一案臣遣發官兵前徃協𠞰隨經具摺奏明今三省官兵將八達𠞰平情由業同督臣鄂爾泰㑹疏題報矣至滇黔復遣堵𠞰川逆官兵今於本年十月十一日據雲南尋霑營叅將哈元生報稱奉四川提督憲檄仰將滇黔官兵撤回九月二十日先令遊擊張世傑帶兵起身二十一日卑職率領遊擊卜萬年等自校頭口起營至阿驢地方猓古劄營二十二日卯時起營行有三五里路忽然四山蠻子約有數千呐喊竟來對敵即將阿驢杻鎻行營卑職帶兵架礮衝開殺散賊蠻搶上赤布岩卜萬年帶領官兵奮勇登岩㑹合有千總蘇世爵劉雄把總張應舉馬玉四員奮勇爭先陣亡二十三日官兵奮勇殺死賊蠻無數搶上赤衣臺卑職差調張世傑到赤衣㑹合駐劄二十四日三下夾攻賊蠻大敗四路逃竄縁賊蠻懐恨卑職連年征𠞰烏米之仇作叛俟張總鎭官兵到日分兵進𠞰以盡根株職查阿驢交界阿路嗎阿都沙罵等處俱係阿驢姻親一帶現有川兵臨近駐劄可否移咨四川提憲令其將弁就近堵𠞰等情次日又准鶴麗鎭臣張耀祖咨稱九月二十九日據哈元生等驗報隨於即日率領官兵自涼山拔營前來應援并移四川提督飛檄官兵前徃㑹𠞰又咨移烏䝉鎭派兵三百名速赴軍前各等因到臣臣即飛飭威寧營速發官兵二百名調取土兵五百名并調畢赤營官兵一百名星徃應援并咨移四川提臣黄廷桂就近遣發官兵堵𠞰務盡根株以申國法臣等仰仗天威諒此餘孽不日即可掃除也理合一併奏聞謹奏黄廷桂業經備悉奏聞矣此事實出意外傷損如許官兵朕心惻然處實筆不能宣同日又奏為奏明事竊照新陞撫臣張廣泗前至丹江招撫頑苗不遵化誨糾衆拒敵並發官兵協𠞰情由臣業經繕摺具奏後伏思此種頑苖必大加懲創使其黨類畏懼而後可以望其革心向化臣查各標協營雖存有滅逆大礮但黔省山髙箐密礮體沉重携帶維艱其餘礮位多不及逺臣隨星夜製造靖蠻大礮三位能攻數里又造過山烏一十八桿俱能攻逺且甚便捷臣於標下選派備弁兵丁帶臣新造大礮二位過山鳥四桿前赴撫臣張廣泗行營聽用嗣恐兵丁不足分佈適因粤西八達兇㺜已經𠞰平黔省㑹𠞰官兵俱各回營臣隨調安籠安南等營千把兵丁携帶大礮三位五子礮三位檄令遊擊田昌友管領又調大定黔西長寨等營千把兵丁攜帶五子礮四位檄令遊擊史應貴管領同田昌友所領官兵俱赴凱里隨副將張禹謨一路聽候調遣分佈進攻又派臣標弁兵帶臣新造大礮一位過山鳥十四桿并五子礮一位又調平逺協弁兵帶五子礮一位令守備任龍管領於十月初八日起程前赴撫臣張廣泗行營聽用俱經咨明督臣鄂爾泰署撫臣沈廷正在案兹仰賴我聖主天威撫臣張廣泗於九月二十九三十兩日遣發官兵攻取甲些烏歸等十餘寨擒殺不計餘皆奔逃十月初五日丹江及各處頑苖聚衆千餘前來攻營埋伏官兵四起奮勇截殺苖賊大敗乘勢追逐攻破乜告等大小數寨初六日又將首惡之楊牌楊堯楊烏暨附和抗違之也條楊列等二十餘寨盡行搗除初七日又將逞兇之者良等寨亦行攻𠞰連日斬殺苖賊無算餘衆皆畏懼奔竄隨有壩構楊亭番仰等寨赴營悔罪求生是此番懲創各處頑苖俱已破膽消魂況九股生苖經副將張禹謨等開導化誨歸誠者已十之六七則丹江等處内已奪其所恃外有重兵壓臨宣揚我皇上恩威順者撫之逆者𠞰之指日即可平定所有臣製造靖蠻礮過山鳥並節次遣𤼵官兵前徃協𠞰及據報大敗苖賊情形臣謹繕摺奏明伏乞睿鑒謹奏覽奏深慰朕懷爾儿所料理甚合機宜實屬可嘉同日又奏為恭繳硃批奏摺叩謝天恩事雍正六年四月二十一日臣家人齎捧皇上批臣奏摺並賜臣翎帽牙盒到黔臣隨郊迎至署恭設香案望闕叩頭謝恩祗領訖伏讀臣奏明事摺内所奉硃批恐其諱匿隱飾草率完結仰見我皇上愼重政治之盛心向後苖狆案件遇有應如此料理者臣遵㫖奏明料理若與地方事機有掣肘之處臣與督臣鄂爾泰商酌奏請奉有硃批伏念臣庸愚武夫知識短淺未能探本尋源乃䝉聖主批示臣跪讀之下不勝惶悚感激隨欽遵聞擒獲頑苖事一摺奉有硃批臣思陸氏逞兇督臣鄂爾泰仰遵聖主指授方畧遣發官兵不旬日而即𠞰平實仰賴上天垂慈聖祖黙祐暨我皇上聖德天威所以成功如此之速不但我皇上慶幸微臣慶幸即天下臣民亦莫不深為慶幸矣所有奉到硃批奏摺理合恭繳叩謝天恩伏乞睿鑒謹奏朕本涼德惟上賴天祖之庇祐下仗卿等賢臣之贊助耳期共勉之雍正七年正月十九日貴州提督臣楊天縱謹奏為天威逺震頑苖歸誠事竊照丹江等處頑苖梗化抗阻臣業經具摺奏聞䝉我皇上敕撥湖南兵丁來黔並命荆州將軍及楚省撫提預備大兵聽候調遣威聲大震遐邇苖蠻無不膽落魂驚又䝉欽差廷臣頒授方畧撫臣張廣泗欽遵親率官兵撫𠞰兼施今仰賴我聖主仁威梗化各寨俱已平定其餘苖寨及自古不服王化之下九股八萬古州等處生苖悉聞風向化陸續相率歸誠而接壤鎭逺黎平邊界地方清水江各處生苖據鎭逺知府黎平副將等具報節次化出磨反迷反等一百六十餘寨共八千九百九十餘户歸附版圖認納糧賦從此邊疆永享寧謐之福者皆感戴我皇上之所賜也至阿驢逆蠻悖順恣惡糾黨阻截傷害弁丁經川滇黔三省官兵分路進攻仰仗我皇上天威逆首俱巳擒獲餘黨悉皆投誠三省官兵各已撤回矣再黔省上游安順等府州地界接連粤西邊境生苖除前節次招撫内嚮苖民俱經㑹疏具題在案今臣令署臣標中軍事副將劉成謨㑹同貴西道王廷琬署安順府知府朱齊年差委員弁兵役土人又陸續化出髙要等百十餘寨以上歸化各寨生苖臣現委副將劉成謨㑹同知府朱齊年等及接壤各該地方府州等官將從前嚮化生苖界址㑹勘明白分定管轄收納錢糧籌設汛防並令將有未化及者悉行化出統俟化出之日彚造户口冊籍移送督撫兩臣㑹核題報理合一併具摺奏聞伏乞皇上睿鑒謹奏覽奏俱悉善後事宜尤為切要勉為之同日又奏為謹陳頑苖梗化情由仰祈睿鑒事竊臣叨䝉皇上殊恩授以提督重任時凛氷淵猶恐隕越凡地方諸務臣與共事諸臣惟一心一德協恭盡職不敢違我皇上諄諄訓誨至有不諳事機者雖已去任臣亦不敢為之隱諱也丹江等處頑苖底定情形除另摺具奏外臣將此番梗化之由為我皇上陳之查丹江等處苖人上年正月内督臣鄂爾泰面與今陞任撫臣張廣泗籌畫苖疆必逐處清理俾之盡入版圖議令量帶兵丁隨護宣布聖主好生之仁柔逺之德使諸苖人傾心内嚮原無用兵之意也乃有前任署撫臣祖秉圭不諳事機於張廣泗未行之先日在教場操點兵馬聲言要盡𠞰九股丹江生苖以致苖人聞知啓其貪生畏死之心逞其蠢頑兇横之性繕甲械築險要肆行阻抗勞師動衆費用錢糧臣不知祖秉圭是誠何心祖秉圭不諳之處猶不特此也鎭逺府施秉縣屬石狗琵琶二寨被刦之事乃一尋常盗案而劄臣調兵欲大加懲創至如米貼酋婦陸氏悖逆拒捕殺害官兵雖屬隣境臣恨不能滅此朝食隨飛調各營路官兵前徃協𠞰而祖秉圭意謂事非本省乃將撫標兵丁不行遣發夫事有大小情有輕重凡為封疆大吏務必細察熟籌然後措施庶免混淆祖秉圭乃顚倒紊亂幾至誤公可謂不諳之甚者也今丹江等處悉已平定所有梗化之由臣不敢隱諱謹具摺奏聞伏乞睿鑒謹奏所奏各情由知道了然頑蠢生苗亦必經此一番懲創方可圖維久安之道至祖秉圭之不能勝任朕因覺照所以即予罷退也諸如此類情事焉能逃朕鑒察雍正七年八月十一日貴州提督臣楊天縱謹奏為年歲豐稔仰祈睿鑒事竊照黔省今歲雨暘時若凡民苖地方所種麥蕎俱有十分收成至所播田禾各處亦俱豐收今早榖登場晚榖亦將收穫豆苖悉皆茂盛軍民咸歌大有兼聞雲南亦稱樂歲臣在省城將及三月於布政司處見有思州府詳報本年七月初八初九初十十七十八二十二等日府城連見慶雲彩色異常等語隨據鎭逺協副將張禹謨禀據分防思州把總報同前由到臣其慶雲彩色督臣繪圖進呈御覽又據黎平協副將趙文英呈報文英奉檄清理苖疆於七月二十五日至梅得後山單刀嶺上劄營是日從未至酉忽覩祥雲起於西南華光燦爛五彩異常凡在軍營漢土官兵並歸順苖人同時觀望無不額手懽騰稱為竒瑞理合報明等情據此欽惟我皇上御極以來竒祥疊獻嘉瑞頻呈今慶雲於一月之内連見數次乃從來之所未有亘古之所罕聞此皆我皇上敬天法祖至誠感召之所致也臣生逢盛世忝任邊疆覩此風調雨順物阜民安臣實不勝懽忭之至謹具摺奏聞伏乞睿鑒謹奏據奏年歲豐稔慶雲疊見實縁鄂爾泰忠誠之所感召朕曷勝嘉悅欣幸之至雍正八年十月二十六日貴州提督臣楊天縱謹奏為恭報天威逺播克復烏䝉併大敗鎭雄逆賊情由伏祈睿鑒事竊照烏䝉逆猓悖叛猖狂臣據報之時即飛調官兵咨移安籠鎮臣哈元生總統前徃撲滅並咨川滇撫提諸臣速發官兵堵禦㑹𠞰臣業已繕摺奏聞亦經督臣鄂爾泰具疏題報在案嗣於九月十六日據雲南鎭雄營叅將韓勲報稱鎭雄夷目施額法漏等勾通作叛臣隨飛檄前遣官兵内酌撥星赴鎭雄奎鄉援應並徑檄四川永寧協速發官兵前徃鎭雄彈壓㑹𠞰九月二十六日准鎭臣哈元生咨稱本鎭帶領官兵於九月二十日抵得勝坡駐劄二十一日烏䝉逆賊約有二萬之衆分三股漫過官防海子將村寨塘房盡行燒燬張旗呐喊殺奔前來本鎭同副將徐成貞遊撃王友文各帶官兵分中左右三路而進與賊對敵從辰至酉鎗礟打死夷賊無數斬獻賊首三十餘顆賊衆大敗等情到臣十月初一日又准鎭臣哈元生咨稱九月二十一日殺敗賊人情形業經通報在案二十二日夷賊分作十二三路而來本鎭仍同徐副將王遊擊分兵三路與賊對敵從辰至未相持甚久見其為首者係阿底夷目黑寡莫莫本鎭隨箭射黑寡落馬斬其首級復射兇賊一名夷兵方行敗遁追殺約五里之遙時因天晚收兵回營等因到臣十月十一日據鎭雄營叅將韓勳報稱九月二十六日晚逆目施額法漏勾通烏賊並夷良一帶地方叛目阿布等帶領夷賊七八千劄立奎鄉對面山嶺甚是猖狂於二十七日竟分九股前來拒敵卑職與遊擊王弼守備王應熊等各率千把外委分兵七路與賊對敵鎗礮打死百十餘人斬獻首級六顆夷賊大敗二十八日逆賊又來圍攻卑職等復分兵攻擊傷斃夷賊二百餘人生擒四人斬獻首級五十餘顆賊又大敗十月初二初六兩日又殺敗逆賊追趕二十餘里至近龍街子地方焚燬逆夷五十餘寨等情到臣十月十五日又准鎭臣哈元生咨為恢復烏郡飛報大捷事内稱本鎭於本月初八日自得勝坡督率官兵分途進𠞰前至以那劄營有叛逆二萬餘衆竟在對山呐喊連站十有餘里本鎭於初九日夜密令遊擊王友文叅將康世顯等分帶官兵預於各路埋伏以聽信礮為號出竒攻擊初十日五鼓時分本鎭同徐副將統領官兵由中路對敵逆賊分數十餘股止顧拒敵不知信礮聲響左右兩路竒兵突出賊衆不能抵敵大敗四奔官兵奮勇追殺連踏賊營八十餘座鎗礮打死逆賊不計其數追至稻田壩官兵奮勇冒險殺過松林直搗巢穴恢復烏郡實為大捷並喜官兵俱保無虞隨劄營於鳳凰山至於羣兇授首分遣官兵接應東川鎭雄統俟另文咨報所有恢復烏郡𠞰殺逆蠻情形理合通咨等因到臣臣看得烏䝉悖叛兇殘已極凡我官兵無不痛心切齒即食肉寢皮猶有餘恨今仰仗皇上天威兼得督臣鄂爾泰籌謀調度各官兵奮勇攻擊賊衆大敗恢復府治臣准到捷文即出示曉諭兵民無不慶躍懽騰至鎭雄叛目施額法漏等已經㕘將韓勳率兵攻擊賊衆潰散東川逆夷亦經雲南提臣張耀祖統率官兵𠞰殺大敗不日俱㑹集烏䝉但此逆夷窮兇極惡實無比倫必須搜𠞰淨盡始獲寧謐今雖恢復而賊首賊目尚未就縛官兵駐劄鳳凰山更宜嚴壘防備臣隨飛咨哈元生務要嚴加𠞰洗無遺根株並謹慎防維不致疎忽去訖除各路進𠞰逆賊一切情形統聽督臣分析題報所有屢敗逆賊克復烏䝉情由臣謹具摺奏聞伏乞皇上睿鑒謹奏此番克復烏郡𠞰滅逆猓功效捷速實仰賴上天神明祐庇殊非人力之所能者朕不勝感慶之至雍正九年九月初八日貴州提督臣楊天縱謹奏為奏明事竊照古州清江丹江八寨來牛定旦等處苖民俱稱安靜都江上下河道亦已開通地方寧帖惟滚縱及外滚塘才瓦等寨尚未歸化近經署古州鎮臣董芳先後布置皆感畏聖主恩威投誠繳械認納錢糧悉歸版籍至於銅仁稿坪落塘等寨兇苖經新調古州鎮臣韓勲副將張禹謨等先後動兵將逞兇與夫附和匿犯各寨搗燬正兇亦已拏獲楚兵業經撤回其餘黨今亦陸續捕獲至附近苖民俱已嚮化就撫獻繳鎗標該文武等現在㑹商清編户口分布彈壓此皆仰仗皇上天威聖德所以到處成功如此之速苖疆從茲安定邊隅永享寧謐之福矣臣不勝慶幸之至除一切善後經逺事宜俟臣與督撫兩臣悉心籌畫另疏㑹題外臣謹具摺奏明伏乞睿鑒謹奏凡此皆縁卿等文武和衷忠誠任事有以感格上蒼垂祐之所致嘉悅之懷筆難宣諭同日又奏為奏聞事竊照烏䝉猓賊叛逆仰賴天威逺震醜類立除其地方應添設官兵業經督臣鄂爾泰具題奉㫖俞允欽遵在案所有應撥兵丁除滇省已陸續到彼外至黔省撥添威寧鎭雄兵丁共七百名臣於上游各標協營招募新兵内已經撥發交明收伍其黔省前留戍守官兵亦在陸續撒回至昭通地方並稻田壩等處田畝本年六月内偶起螣蟲昭東鎭臣徐成貞於本月二十六二十八兩日公同文武列牲具文詣郊致禱越二日忽有神鴉結羣從空飛來將田内螣蟲盡行啄食禾苖甚是茂盛並無傷損又曠土内蕎籽遍野自生結實漢夷紛紛割取充食此實亘古未有之竒祥皆由我皇上除害保民聖德神功之所感召也臣准據昭東鎮臣徐成貞威寧營㕘將田昌友各咨報前來曷勝懽忭慶躍之至除咨督臣具題外臣謹繕摺奏聞伏乞皇上睿鑒謹奏嘉悅覽焉雍正九年十二月十七日太子太保原任貴州提督臣楊天縱謹奏為請㫖事竊臣前荷聖恩賞給奏匣四箇地方有應辦之事令臣陳奏今䝉我皇上隆恩加臣宫保職銜予歸田間閒住雖無事辦理但臣沐恩深重瞻依心切若非不時具摺叩請聖安犬馬戀主之忱何由少慰所有欽賜奏匣或准帶回或應繳進之處臣未敢擅便謹具摺請㫖伏乞皇上睿鑒施行謹奏摺匣允汝帶回留為請安之用朕因念汝年紀過髙准予歸休蓋出於不得已終始成全起見朕實深惜之今雖在家閒住如偶有所聞所見以及朕之用人行政處凡關益國益民之言何妨照舊陳奏以盡汝奉公之心特諭雍正十年六月十二日太子太保原任貴州提督臣楊天縱謹奏為敬抒未盡之愚衷仰祈睿鑒事竊臣一介庸陋叨膺簡任黔提尸位素餐毫無報稱乃䝉皇上垂憐衰老曲賜保全加以職銜准臣休致是臣受聖主隆恩實逾於覆載即世世銜結何能報答髙深臣今歸里閒居曉夜心懷感激回思黔地尚有苖疆各處要缺宜令揀選保題者臣不敢以去任而緘黙不言查黔省上游之長壩歸化長寨定廣平越威寧下游之都勻銅仁黎平黄施及新設之古州清江丹江等鎮協營皆為苖猓巢藪最關緊要内止定廣都勻黎平三協營准其保題在案其餘俱係要缺守斯土者非熟悉苖情曉暢機務人地相宜之員弗克勝任若候部推恐新選之員不諳此地情形未免僨事臣愚謂以上各標協營自副將起至守備等缺宜一例准其題補庶營伍實收得人之效而地方大有裨益矣抑臣更有請者雲貴廣西三省内擁猓僰猺獞苖狆諸蠻外通西藏緬甸交趾等國實西南最重之隅必謀畧超倫經濟𢎞逺勛績昭著者方能節制今陞大學士伯鄂爾泰自奉命總督三省軍務以來仰遵聖主指授方畧事事措置得宜而威望久為番夷凛畏但地處遐邊人最狡悍此時雖曰安靜然界連西番猶當慎加防範且烏䝉古州等處新經平定久安長治事宜尚須圖維臣仰懇皇上命鄂爾泰仍赴總督之任再行辦理實於三省地方大有裨益至於江南亦屬緊要督臣髙其倬實係賢能大臣應令回任辦事則彼此政事均慶得人也此臣愚昧之見是否允協伏乞皇上睿鑒謹奏所見目前固是不可行之久逺朕自有權度輕重辦理之道硃批諭㫖巻七十四
