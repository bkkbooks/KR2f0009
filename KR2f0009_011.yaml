body:
  text: 欽定四庫全書硃批諭旨卷十一上硃批陳時夏奏摺雍正元年正月二十二日河南開歸道仍帶廣西道監察御史臣陳時夏謹奏為恭謝天恩事竊臣蒙皇上擢臣河南開歸道仍帶御史銜前往恭聆聖訓諄切周詳隆恩異數超逾格外臣雖捐糜頂踵未足仰酬高厚敢不竭盡愚誠以矢報效於萬一臣於正月十三日抵開封十四日到任一路訪察地方情形自彰德衛輝至延津縣河北一帶地畝麥種甚稀道路男婦乞食者多緣兩年歉收又因去年秋冬雨雪全無地土乾旱間有種者不過十之二三河以南種麥者亦止十之四五至本月十三日得雨寸許十八日得雪尺餘人民歡悅已種者麥漸青長未種者尚可耕植臣前欽承聖訓早已念及仰見聖慮周詳惠愛黎元至意臣今會同護巡撫印布政使臣牟欽元設法捐賑但恐未能遍敷可否請皇上特頒諭旨命撫臣或發倉穀或動帑金賑濟或蠲免被災地畝錢糧則青黃不接之時被災羣黎得以均沾皇仁之廣被將來西成可望從此獲盈寧之福矣所有臣入境目矚情形謹具摺奏聞伏乞睿鑒謹奏此奏甚屬可嘉已有旨矣雍正元年十一月十三日河南開歸道仍帶廣西道監察御史臣陳時夏謹奏為據實陳情仰貇聖恩事竊查河南省漕糧每歲額徴二十五萬有零除附近水次州縣徵運本色米一十萬餘石外其餘各屬額徵米一十五萬有零例係折收銀兩交臣採買起運今歲以米價昻貴採買維艱經撫臣石文焯題請折銀解部而部議以漕運上關天庾仍令辦運奉旨依議欽此欽遵行文到臣臣伏查河南連嵗荒歉民鮮蓋藏幸蒙皇上賑濟疊施停徵舊欠閭閻始有起色今秋甫慶豐收民間元氣尚未全復現今米價每石一兩一二三錢不等若採買一十五萬餘石之漕米市價必致益昻恐小民有艱食之虞况辦漕額價每石止六錢五分合之市價多有不敷臣無力賠墊勢必有誤兌運若欲借項湊買則那移虧空將何補苴隨又詳請撫臣再懇聖恩而撫臣以奉旨不準改折不敢復題仍催辦運但臣茍能勉力圖維寧敢推諉干咎實以民食艱難辦運無措用敢冒昧直陳伏乞皇上天恩將此一十五萬漕糧仍折銀解部則全豫生民盈寧有慶而微臣獲免咎愆皆我皇上矜全所賜矣為此具摺請旨謹奏豐收之時以元氣未復而請折漕倘别省皆如此效尤天庾之需奈何況經張廷樞題此一事之後民心搖惑若必欲強遂此舉則大負朕用爾之意矣國計民生一體緊要爾前在京為米價騰貴曾經與議倉中積蓄人所共知若如此折色天庾少虛關係豈小況爾一介小臣以巡撫所不敢題之事徑行上奏甚屬恃寵僭越朕命爾亦得摺奏之意恐或有與國計民生禆益而不得上達委曲掣肘之事故令爾密奏非為爾已身難辦之事以私起見越分妄陳自希便宜而許爾摺奏也若絀國計以徇爾私求此等清官朕何所用之且爾係朕初即位首先簡用之人更當出衆效力方不有負拔擢之恩若如此沽名釣譽惟知自善已身則朕用人錯矣於此處觀爾與石文焯均非為國家盡力之純臣不過便己自私之巧宦耳據奏元氣未復乞免辦運假若天年歉收又當作何區處書生管蛙之見甚屬不合初次姑豫寬宥再若將此等無理之奏冒瀆決不輕恕戒之雍正四年十月初六日加布政使銜署理江蘇巡撫印務臣陳時夏謹奏為奏聞事竊臣至愚極陋荷蒙皇上格外隆恩特加超擢復得面奉聖訓俾臣有所遵循又蒙賞賜臣母人參貂皮大緞克食更將臣所餘飬廉賞為盤費母子沾恩寵榮無既惟有舉家感戴洪慈務竭駑駘以期仰報臣回任後查前道張璨報解部餉不實并銀匠黃誠信呈報銀匠夏文熊拐銀逃走等情當即差役嚴緝經臣具奏在案旋於九月二十六日據原差吳廷標等拏獲夏文熊并伊兄僕妻妾人等到案隨發天津州分兩以示鼓勵至臣任內共收過正雜錢糧一十九萬一千三百二十二兩零除解支兵餉俸銀外實存庫銀七萬六千八百九十二兩零又前道張璨所存庫銀內除奉文撥解營工外實存庫銀二萬八千一百六十一兩零業經臣分造清册已送鹽院查核再臣回任後續收養廉銀并清歸各項餘銀共計銀三千三百餘兩俱封貯庫內聽候敕撥河工之用今將印信敕諭交送鹽臣收貯臣於十月初六日赴蘇到任謹具摺奏聞伏乞皇上睿鑒謹奏所奏知道了敬陳管見一摺留中諭行同日又奏為遵例請革供應鋪陳什物以免商纍事竊臣蒞長蘆任時見有鋪墊擺設被褥桌椅器皿等項詢知皆係衆商買備查新例內開凡文武衙門所置器皿等物造册交與接任官員等語通行遵照在案則運使衙門亦應照例遵行臣當將鋪陳被褥等物發給衆商變價二百兩桌椅鍋碗等物皆係需用之物隨令開明價值計銀二百兩臣照數捐出連鋪陳變價共銀四百兩均貯在庫抵作雍正三年秋冬帶徵引課雖省銀無幾然除此積習相沿之弊亦可有禆於將來今臣起程赴蘇所有家伙什物等項逐一造册交與新任查收如新道任內有置添什物遞造入册交與接任如此照例遵行庶免衆商備辦供應之纍臣恐日久廢弛用敢冒昧陳奏伏乞皇上敕部議覆施行謹奏正所謂毋以善小而不為也應如是雍正四年十一月二十日加布政使銜署理江蘇巡撫印務臣陳時夏謹奏為奏聞事竊臣蒙聖恩加銜署理江蘇巡撫重任除將到任日期題報外於雍正四年十月初六日自天津起程二十六日入宿遷江南境接印任事經臣題報在案十一月初一日抵揚州臣見淮陽一帶河渠水滿低田多有被淹自鎮江以至蘇常等處地勢愈下低田被災業經署督臣范時繹將江寧等二十九縣衛水災具題查勘在案臣到任後現在確查分數據實具題蓋因八月至九月隂雨連綿至今晴雨不時查高鄉田畞雖有收成緣場地未乾所收稻穀不能晒燥難以礱米交糧水漬田間又不能耕鋤種麥各縣開倉徵漕完納者少必得晴朗半月乃能有米輸漕但較往年未免稍遲恐不能副冬兑冬開之限且於稻花開放之時天多隂雨穀不堅實以致礱出之米頗多細碎是以督臣有紅白兼收之請百姓稱便臣察江南高阜之鄉收成尚有七八分但高低相半收穫不齊小民素沐聞至一應地方吏治事宜容臣漸次體察另行密陳謹奏已實授爾為江蘇巡撫矣竭力勉為之以副朕委任之意同日又奏為請旨事臣接準部文奉旨毛德琦曾經陳時夏奏請帶往江蘇之人看來人甚老成去得李維鈞奏請調簡大錯矣著調鎮江府知府欽此仰見我皇上用人至公至明毛德琦身受殊恩自當倍加感激報效臣亦得收臂指之用為此叩陛見之時請旨允臣帶來酌量題補之候補同知金文宗候補知縣蔡益仁臣素知其誠謹無欺能任勞苦今松江府海防同知一缺有督捕緝盜之責兼有監修海塘工程事務需員料理蘇州府屬之吳縣一缺係省會首邑又值料理漕務之時必須能吏方能勝任請以金文宗補授松江府同知蔡益仁補授吳縣知縣均屬人地相宜於公事有益除恭疏具題請奏覽雍正四年十二月初四日加布政使銜署理江蘇巡撫印務臣陳時夏謹奏為據實奏聞仰祈睿鑒事竊臣查江蘇等屬秋間雨水過多低處田禾致被淹沒據勘原報續報成災共三十八州縣衛業經查明分數陸續題報在案惟是時當冬季正辦漕兑運之候而自十月至今雨多晴少有禾稻在田零星未刈者有既刈而不能築場晒穀者以致礱米完糧稽遲時日查各屬報完漕米寥寥無幾臣經屢次嚴催以副兑限而各屬詳據里民呈稟咸稱今嵗隂雨過多秋禾被損又值鄰省州縣亦有被災之處購買米石殊屬艱難惟冀聖主天恩準將災田漕米照雍正元年二年之例緩徵一半俟來年帶徵搭運并求稍寬兑限以便設法輸完臣念小民望恩固切而漕儲重務國計攸關未便延誤隨嚴行批駁并示諭里民上緊完漕去後而各屬百姓哀籲情迫實非怠玩可否仰邀聖主之前亦不敢邀譽於百姓之口也又安慶撫臣魏廷珍勘災疏內有將新舊錢糧概懇聖恩暫緩俟明年麥熟開徵江蘇小民亦冀一體邀恩紛紛具呈臣未敢冒昧題奏但念窮黎被災之後輸納實屬艱難應否將被災田地新舊錢糧暫與緩徵仰祈皇上特頒諭旨則億萬生民益戴皇仁於無極矣抑臣更有請者近奉諭旨將江安二屬漕糧截留十萬石改收穀二十萬石運貯閩省臣查下江所屬應分派運穀十二萬石現在飭行徵收備運但江蘇稻穀因隂雨過多不甚堅實一經舂碓必多折耗不敷二穀一米之數有當仰祈睿裁特頒諭旨遵行再查吳地風俗澆漓竊劫頻聞臣甫到任即遵朝廷辦事不邀虛譽何懼人言現在嚴飭各屬實力奉行理合一併奏聞伏乞皇上睿鑒謹奏江蘇所屬州縣被水歉收處據范時繹奏到朕已特差羅其昌等前往清查倉糧截留漕米會商酌動以濟民食并令動支庫項委員於米多鄰省地方採買以備賑糶又將捐納貢監之例令其改為米穀減數交納有此數事諒小民可不至於窘迫矣汝當隨宜相機悉心料理盡力籌畫有應奏應行之事即行奏請凡督撫辦事固宜慎重然亦不可過於拘謹於事無益也至如汝所請緩徵一事不過止求寬限兩月此在汝酌其緩急不加嚴催稍紓民力可耳何必特請頒諭由此一事汝可類推也同日又奏為請旨事竊臣於陛辭之日奏明原任山西霍州知州陳士炯請旨帶往江南量才委用蒙聖諭朕一時不甚記憶想此人年已老矣臣欽承諭旨查陳士炯由雲南定逺縣知縣卓異升授山西朔州知州調任霍州康熙五十九年在西寧軍前效力運米到藏咨部議敘六十一年在巴爾庫爾效力三年復回晉省經前任山西撫臣題參虧空部議解任限一年全完於雍正三年山西撫臣伊都立以陳士炯虧空銀兩俱經賠補全完題請開復給咨赴部引見奉旨陳士炯著以原品休致等因欽遵在案查陳士炯年五十一歲臣見其強幹明白是以冒昧帶來今查明履歷理合覆奏仰邀聖恩可否允臣將陳士炯送部引見臣未敢擅便伏候諭旨遵行謹奏大約不準開復者其人未必甚優但人材難得朕或忽於一時亦未可定爾將緣由聲明咨部可也同日又奏為據實奏聞事竊臣欽遵諭旨查得揚州府知府吕大雲年少有才但其居心操守臣未能深信因揚關稅務兼管乏人適吕大雲稅委其就近管理䇿其後效臣仍密行察訪如果實心辦事另行題奏近查常州府屬之武進縣知縣郭朝弼虧空錢糧業經題參在案署理之人必得幹練之員方克勝任臣於陛見時請旨允臣帶來題補之人己將候補同知金文宗委署松聖恩準以知縣補用其人老成歷練操守清白堪膺武皇上發出孔尚鑑朱爾介二員到臣奉旨㨂補嘉定縣缺臣查二員均屬精明練達之材但孔尚鑑係蘇松巡道孔育璞之族姪孫嘉定現隸蘇州例應回避其朱爾介已丁父憂臣思人材難得皇上格外隆恩也查鎮江府屬之金壇縣知縣王廷枚金壇縣缺合先摺奏另行具題又蘇州府屬之震澤縣知縣彭鎔年老糊塗難膺斯任現今察其有無虧空以便題參臣見震澤縣縣丞鄭金明白謹慎年富有才若即以補授震澤縣缺於公事有益臣以地方得人為重另行具疏奏聞臣查江南州縣勤慎稱職者固多而因循疲玩者亦督運解銅辦差委署等公事往往乏人仰懇題補似有裨於公事臣謹冒昧請旨伏乞皇上睿鑒施行謹奏覽雍正五年正月初十日蘇州巡撫臣陳時夏謹奏為恭謝天恩事竊臣於雍正四年十二月二十六日接準部文內閣奉旨陳時夏著實授蘇州巡撫欽此臣隨恭設香案望闕叩頭謝恩訖伏念臣駑鈍庸材一無知識蒙皇上不次擢用俾署蘇州巡撫印務到任未幾涓埃莫報復蒙特旨將臣實授聞命之下感激惶悚惟是受恩深重報稱彌難雖竭盡愚誠益加奮勉恐智識短淺不能仰答聖恩於萬一仰祈皇上俯鑒臣愚恩賜時加訓誨俾臣得以恪遵奉行或免隕越則臣始終皆仰荷聖主成全造就之恩矣除俟開印後具題謝恩外合先繕摺恭謝天恩謹奏但不務虛名懋勉實政爾可成一大人物若一涉詐偽則為國家之蠱蠧也朕豈肯姑容勉之慎之如裴􅏍度鄭任鑰皆已敗露成何局面與科甲斯文一道寧稍有補益乎誠為朕之所不解切毋謂功名今已到手縱改志易行上眷如是未必即有所更移也元首股肱一德一心之理時刻不可去諸懷抱勉為之同日又奏為黃河澄清敬伸慶賀事欽惟我皇上至德覃敷仁心丕冒神功聖治亶千古之精微敬天勤民垂萬代之法守是以天心感應河嶽呈祥竊照雍正五年正月初三日據署淮揚道劉之頊稟稱黃河上自虞城下至邳州於十二月十六日澄清宿虹一帶上自邳睢下至古城又桃源所屬一帶黃河俱於十七日澄清上下並無濁流與湖水無異直至二十三四等日尚係澄清士民無不稱瑞實係千古竒逢等情到臣除飭行該地方官將此後澄清月日另報到日再行具奏外伏查史册黃河澄清為升平上瑞然從未有綿亘六百餘里澄清閲七八日如今日之盛者也臣恭逢盛世欣睹嘉祥倍深雲日之瞻依彌識天人之協應容俟開印後恭疏題賀外臣謹具摺奏聞謹奏由龍門底柱起至古城桃源已二千餘里自十二月初九日清至正月初八日張元懷奏到時已將閲月而豫省黃河尚無濁流豈止六百里七八日而己哉朕蒙皇考福蔭上蒼昭示此希有之祥悚懼敬惕之心實筆不能喻已頒有諭旨爾行即得知也同日又奏為敬陳管見仰祈睿鑒事竊查鎮江府京口旗營兵米嵗需八萬餘石向來派撥附近州縣運米放給自康熙二十五年經前總漕臣徐旭齡題準將鎮江漕糧截留抵給嗣因法久弊生是以前署撫臣何天培題請將鎮江漕糧仍舊起運而部議將所需旗營兵米每石折銀一兩二錢於司庫動給但鎮江居民繁庶産米有限若將本地漕糧盡數起解再令各兵買米是一運一買計需米一十五六萬石米價以臣管見不若仍照舊例將鎮江府丹徒縣漕糧截留抵給京口旗營兵米再有不敷以丹陽金壇之米撥湊則兵有儲蓄之糧民有蓋藏之慶而運力可為若不溯其源流終無利濟如蘇松之太湖吳淞江白茆河劉河等處俱為江海要路而年久淤塞致內地之水無從宣泄是以積水難消臣愚以為江南地勢水利尤急必得動帑興修約計十餘萬金可以足用若再循照直隸營田水利條議之法鼓舞效力或尚可以減費而水利既治田野攸賴江省億萬生民當永戴係積蠧窩盜姦徒貽害小民屢經犯法漏網臣今聖主天恩也謹奏朕並無沽名示惠與爾等大臣爭譽之心也即如此水利一條事在可行朕斷不湮沒爾之好處諭旨發出時爾自當知悉也若將不可行之事先露意市恩於人至不能行時令歸怨於朕朕深惡者此也所以云一切未定未行之奏密字甚有關係不然面是背非大失一德同心之理矣自漢唐以來君臣之大道漸泯殊可嘆息再者閲爾所開米價單價值殊覺過昻當青黃不接之時須加意籌畫也雍正五年正月二十八日蘇州巡撫臣陳時夏謹奏為奏聞事竊查江蘇有額設省塢黃快船一項共計九十四隻以備裝送龍衣竹木及進京一應勘合差使之用每船三年準修一次三修之後倘係朽壞即行拆造乃今歷任相沿修船工料銀兩逐歲支銷而船隻竟置不問查有朽壞不能應差者十二隻片板無存缺額未造者三十隻今據新任驛道張暻樞詳報前來臣查船政廢弛冒銷國帑升任道員楊紹雖在任未久皆係驛道徐克祺任內之事而通同接受匿不報明殊屬不合臣正擬題參兹據楊紹呈稱已經辦料情願賠修補造自限閏三月內完工臣現在嚴催臨期倘有遲延臣即題參追補再查省塢尚有沙便宣樓等船係督臣經管亦有朽壞不堪者楊紹亦經認賠修造合併奏聞謹奏朕觀楊紹可成一人物朕正怪伊至今為何未赴新任此人何得有如此欺隱之事如許船隻伊有力賠修耶其中必有多人畏罪協助料理者可密密訪查的確隨便奏聞至所缺船隻既情願賠補足數便誤遲期限亦宜少為從容何必參破耶如有意諉延朦混則不可姑容耳同日又奏為請旨事竊臣前奏原任山西霍州知州陳士炯履歷緣由一槢奉到硃批仰見我皇上慎重名器愛惜人材之至意但陳士炯於雍正四年十二月二十五日聞訃已丁母憂臣既欽承諭旨應否仍將陳士炯歷任緣由并丁憂情節聲明咨部臣未敢擅便謹具摺請旨遵行謹奏陳士炯人尚明白猶屬可用朕己記憶前非為其庸劣而不準開復也因係諾岷參處之員伊都立接任代為奏其寃抑并補完虧空之處題請開復朕一者恐啓鑽營之路二者不喜伊都立之自市私恩而歸怨於諾岷也爾於咨部文內自應將情節聲明并寬與月日令陳士炯得以料理伊母葬事畢再行赴部可也類汝等科甲出身之大員不可勝數如楊名時李紱魏廷珍鄭任鑰汪漋陳世倌并旗下舉人如張楷之庸流皆為同年故舊老師門生之牽扯爭相偏袒姑容以沽名釣譽遂至欺隱朦蔽貽誤國計民生種種悉皆敗露似此奈何此風不息將來斯文掃地矣既頂儒冠當持名教朕近日每每訓誡勸導在廷諸臣諒汝亦已聞知當竭力挽回陋習不但為卿一身一家之福實係朕與國家蒼生之福也勉之勉之同日又奏為據實密陳事竊查採辦銅斤一案原係八省承辦舊案雖偶有遲延參後即能完補自康熙六十一年歸併江浙二省之後以江蘇一省而辦五省之銅則有蘇州府同知趙光謨拖欠銅三百三十七萬餘斤之案嗣又題減二省以江蘇一省而辦三省之銅則有蘇州府知府蔡永清拖欠銅一百一十六萬三千餘斤之案至雍正四年則係蘇州府知府溫而遜承辦現今不能依限辦解前撫臣張楷題請寬限未蒙俞允臣業經題參在案現在勒令欠銅各員并辦銅各商等定限設法補完但目今辦銅若復仍循舊轍則歷年愈久積欠愈多殆無完清之日以臣臆見莫若仍循舊制八省承辦江蘇止辦本省之銅將兼辦二省之銅仍歸該省自辦計每省辦銅止五十五萬四千餘斤數減職專易於辦解自可逐年清完不致懸欠矣謹具摺恭奏請旨遵行謹奏所奏雖屬得理似近推卸當日歸併必有情由也又有人言原係江蘇謀辦之事朕思或未必然今汝欲請仍歸各該省具本題奏候朕酌定同日又奏為遵旨酌議奏明仰祈睿鑒事竊去歲江南隂雨連綿收穫甚遲臣具摺奏聞奉到硃批仰見我皇上恩育蒼生至周至渥百姓歡呼頂戴咸知漕糈緊務踴躍願輸但因稻穀受雨礱出之米猶帶潮濕是以不敢急催及至嵗底新正米色乾潔完漕之分空以上厪聖慮也至奉旨運穀赴閩一案臣以稻榖多不堅實具摺奏請易米運貯奉到硃批命臣斟酌妥確竊查江省因去年被水歉收出米實少而福建一省除漳泉二府被災外其餘皆屬有秋江南米穀似可不必運送但閩省係海疆重地雖云嵗稔而山多田少且有漳泉二府屬被災之處臣訪得閩省米價每石至一兩八錢現在福建督臣動銀委員各處買米諒亦需米孔殷江南朝廷赤子自宜彼此兼顧臣謹酌議請將江安二屬截留漕米十萬石將五萬石運赴閩省其餘五萬石留為本地平糶之用又臣昨具摺奏江南水利急宜興修倘蒙聖恩俞允則江省億萬生民感沭洪恩於無既矣惟所需用約計十餘萬金臣前摺奏照營田水利開捐可以不動帑金但江南近奉恩旨已開捐穀事例似難重復臣意中另有設法料理之處可以濟用有餘附具密摺伏冀睿裁至疏浚治理之法臣知蘇松巡道孔育璞熟悉水道源流堪資辦理現在送部引所能勝任臣查升任武昌道趙宏本歷任江南地利情形久經熟練再懇理俟水利告竣再行赴任則臣得收指臂之效工程易於辦理矣為此具摺奏聞伏乞睿鑒謹奏覽雍正五年二月十七日蘇州巡撫臣陳時夏謹奏查有揚州府江都縣鹽商黃光德者家擁厚資為富不仁父子兄弟一門淫邪乖倫背理聞聖祖仁皇帝時曾發皇上大沛洪仁動帑金數百萬廣興水利以育民生計今江省興修所需不過十餘萬金之數此輩資財堪以協資濟辦以成巨工伏冀聖裁謹奏覽雍正五年三月十七日蘇州巡撫臣陳時夏謹奏為敬陳芻蕘仰祈睿鑒事竊查錢糧耗羡一項留於下則糜費不足歸於佐二等員俱各給以養廉通計支用若干應存若嗣後虧空之弊可以永杜矣再查禁用銅器奉旨通行於三年之內盡行毁賣臣以為收買已成之銅器須嚴禁造賣銅器之人除鑼鍋等物為軍需所為是器物甚多請一併收買令各州縣設一收銅之局委佐二官專司其事照時值給發官價收買責令體皇上裕泉源以利民用之至意不避瑣屑冒昧具奏伏乞睿鑒施行謹奏覽同日又奏為據實奏明仰祈睿鑒事竊照去秋江南雨水過多收成歉薄仰蒙皇上軫恤民艱加恩賑濟又蒙發帑買米平糶開捐以裕倉儲小民頂戴洪恩謳歌載道恭值欽差來南確查江安糧道存貯還漕米石并淮安府分貯漕米會同臣等商酌分别留運平糶以濟民食臣等確查江安糧道收捐漕米二萬八千五百餘石實貯在倉并盤出備折耗米共計米二萬九千六百餘石又淮安府康熙五十八年截留江廣漕米五萬石除賑用銷耗實存剩米一百三石零亦經盤量足數惟從前凡有留漕米石俱當清查臣查康熙五十三年截留江廣存貯江蘇淮并本地漕米通共三十萬石除從前賑用報銷并上元等縣參案內虧空米石現在查追外仍應存米八千七百餘石因折耗無存經前撫臣吳存禮題參著落追補臣又通查各屬常平倉積貯米穀及升任布政司鄂爾泰買貯米石并積穀等項除從前已經動賑外其現存各屬米共三萬八千餘石穀麥雜糧共七萬八千餘石現在動用賑粥俟賑過若干報銷此外尚有各縣社倉義倉所存米穀容臣備細查明另具題奏又奉恩旨動帑買米平糶臣已欽遵委員赴江西湖廣採買備糶惟去冬隂雨低田積水難消春麥不能及時播種江蘇常等處民田未種麥者十居三四誠恐將來米價愈貴今擬將各屬所存米石并採買之米酌量縣之大小分别撥貯可敷平糶之用至開捐貢監之例目下赴捐甚少惟當收存以備倉儲合將通查江蘇存貯米榖數目據實奏聞伏乞皇上睿鑒謹奏覽爾前奏商人黃光德借帑一事朕已諭部密查據覆奏云此項皆已還清矣此事既虛其他亦未必實似此等身家殷實之富户被人誣捏陷害須當詳察母令枉屈大約富家未免過於奢靡遊蕩與世道風俗不無關礙然未干國法亦豈可無故苛求惟當徐徐勸導不宜遽加以法致滋物議從來貧之嫉富賤之妬貴乃小人之常情斷不可墮入此輩局中審之雍正五年閏三月初七日蘇州巡撫臣陳時夏謹奏為請定吏胥役滿考職酌捐銀兩免其赴考之法以收實效以廣聖恩仰祈睿鑒事竊照定例各衙門吏攢歷事五年役滿情願捐納者捐銀選職其無力捐納者俱令赴部考試等因欽遵在案惟查直隸山西山東河南等省各衙門吏攢役滿赴京考試計程甚邇路費無多間有親身赴考之人其餘路逺各省無力捐納者每多託人代考即有包攬之徒騙取銀錢作姦犯科之輩捏造假照種種弊端不惟誤若輩之功名且有虛朝廷加惠吏胥之至意臣思吏員本屬寒微是以捐職者甚少而親考則力有不能代考則上干國法致終身不得一命之榮臣請嗣後各省衙門役滿吏攢情願赴部考職者聽其親身赴考外其有不能親赴者各照品級酌半捐考該州縣收貯出給實收詳司轉報臣咨明户部移咨吏部出給職銜執照免其赴考其所捐銀兩州縣官收貯彚解布政司委員解交户部查收留撥公用至應給執照仍令吏部移發臣衙門飭司轉發給領如此庶各省役滿吏攢均沐聖恩廣大而有進身之階矣如果臣言可採伏乞皇上將臣姓名裁去特諭吏部議覆施行謹奏此奏係為國家用人公事並非沽譽市恩之舉何必隱匿姓名具題聽候部議可也同日又奏為密奏事臣前奏商人黃光德之事伏讀硃批諭旨仰見我皇上至德如天至明如日臣查黃光德一案緣伊子貢生黃履暹起造園亭蓄養戲子濫交匪類經伊父名揭帖內有行賄滅案之語經江都前令審查毆旨定奪又臣會勘興修水利見太倉州知州王溯維性題參外合先密奏上聞謹奏覽雍正五年四月十一日蘇州巡撫臣陳時夏謹奏為欽奉上諭事竊臣題參太倉州知州王溯維一案奉有硃批諭旨臣伏讀之下不勝悚惶臣查王溯維平日居官嚴刑酷罰民間有王老虎之號兼聞其有貪迹臣恐傳言不實正在訪查適有枷責童生閧閙拆門一事臣一面嚴行按察司查拏務獲不法棍徒按律究擬一面委員驗訊實係枷責致死臣以冒領試卷小事何致重刑斃命其平時之酷虐可知臣因據情題參但不俟審明枷責是否理當即行題參之處實係臣之愚昧仰蒙皇上訓誨明切臣益增感激悔懼難安嗣後惟愈加謹慎小心以仰報聖主教訓之洪恩耳謹奏王溯維前經鄂爾泰甚稱其不畏強梁遇事不肯瞻顧引見時朕亦親見其人應對甚屬明白恐爾惑於人言或姦詐機巧之輩撥弄是非均未可定故有前諭蓋恐誤棄一實心任事之員致令踴躍辦公者皆觀望不前也朕亟欲振刷因循自便之惡習此等勇於辦事之員若察其情有可恕處仍當保全之假若此人惟知實心任事别無情故偶有過誤而上司遂越格保護之孰不觀感而奮勉耶取捨之間吏治隆替攸關可不留意乎諸如此等人員遇此等事凡為大吏者要當用一番深心料理也同日又奏為陳明河工海塘情形仰祈睿鑒事欽惟我皇上恩周庶類念切民瘼特發帑金興修水利目今先濬婁江工程己有六分計日可以告竣己動發司庫銀二萬兩業經具題在案臣會同副都統臣李淑德等逐一查勘應濬幹河建閘之處亦經會疏具題百姓感頌聞臣赴松江查勘海塘工程現築漴缺至東灣計一千七十餘丈實當海潮衝要最為險工其塘砌石十一層計高一丈五尺堅固整齊臣於築基處所查勘根底密釘木椿十分堅實誠為永逺不壞之基離塘開運料小河一道取土以幫塘腳兼得灌溉田禾百姓稱便目今分築金山嘴西段工程俟完竣後再行分築周公墩等處合將勘過築完漴缺至東灣一帶情形繕摺奏聞謹奏欣悅覽之同日又奏為密奏事臣前摺奏江蘇黃快船朽壞缺額共四十二隻係升任驛道楊紹賠修聞有楊紹至親幫銀一萬兩今查知楊紹親家係候選同知江國綬江南六合縣人先送到銀五千兩據驛道張暻樞申稱升道移過銀八千八百兩現有家人在省料理船工己有五分蒙聖主寬大之恩奉有奏聞又臣衙門舊有例規等項臣訪查布政司衙門除節禮不送外一年應繳規禮視解司錢糧之多寡或一萬二千兩至少亦八千兩不等臣到任半年至今止開送銀二千兩臣詰其欵項則云一總在內臣知漆紹文為人不實又在離任之時更無實言臣以此項非比公事未便急於查催今新任布政司張坦麟於本月初八日到任諸凡查察料理臣愚昧無知仰蒙皇上隆恩惟以實心實言陳於聖主之前不敢有一字之欺飾也謹奏君臣一體當一德同心百凡照此毫不隱蔽朕實嘉之張坦麟自然較漆紹文為優但不料漆紹文忍如此負朕也所以天下事莫難於用人一節同日又奏為奏聞事竊查江省雨澤應時二麥茂發但低田積水難消未能種麥是以收成不等今查江寧楊州松江三府屬俱五六分蘇州府屬六七分常州府屬五分鎮江淮安二府屬俱七分太倉州屬七分通州徐州邳州海州七八分不等至前奉諭旨運閩米十萬石謹遵旨照數發運自今春以來福省督臣二次遣員到蘇買米一萬一千餘石麥九千石外有商販等六次共計買米二萬餘石皆由閩省督撫給咨來蘇接買江廣之米逐次運回以資接濟現據閩省督臣咨會令遊擊張起雲等將所剩買米銀兩借貯蘇州藩庫咨內稱閩省米價漸平江南之米可以停買等語則是閩省動帑買米已停其江南採買矣乃近日閩商仍復接踵來蘇齎領督撫咨文接買江廣之米臣查蘇州地狹民稠産米無多即係豐收亦資江廣之米以敷食用今閩省已經搬運三萬餘石之多若復接踵而至必致蘇州米價高昻小民艱食臣已咨覆閩省督撫請飭各商販前赴江廣産米地方採買如值江廣來蘇之米果多仍可在蘇接買如此則彼此通融實屬兩濟為此繕摺具奏伏乞皇上睿鑒謹奏閩省情形朕再無不洞悉之理汝但不存彼此之見酌中通融相機料理為是耳所奏知道了雍正五年四月二十六日蘇州巡撫臣陳時夏謹奏為欽奉上諭事雍正五年四月十六日接到內閣大學士行文內開桃源縣監犯張二金棍等劫獄脫逃一案欽奉諭旨務令設法擒獲不得容其漏網欽遵寄信等因到臣臣查此案人犯張二金棍等皆係弟兄子姪臣經飭緝密訪各犯潛逃在河南裕州捕役吳六家輾轉藏匿正在添差懸賞嚴拏今奉上諭臣又密行多選幹練捕壯星往河南設法擒拏又移咨河南撫臣田文鏡協力密拏務期必獲臣斷不敢稍有疏懈俟獲日另行題報謹奏甚好如果逃匿豫省田文鏡自必協力密飭緝拏也同日又奏為密奏事竊查嘉定縣知縣朱爾介臣以其才能幹練具疏題補在案不意該令抵任未及一月嗜酒任性近因煮粥賑飢撥到吳縣存倉陳米煮粥不稠署吳縣知縣李玫著令册書經承糶易新米未免其中虧折朱令查數缺少以為侵蝕責令賠償嚴刑疊夾册書葉方衍當時夾斃經承顧景越九日斃命臣訪知確實傳該令面飭俯首無辭臣以胥役舞弊者多不便據此旨題參合併奏明謹奏覽同日又奏為據實密奏事竊查陳沂震貪婪悖謬上負國恩蒙皇上不加重典令於江南水利出資財一二十萬兩為題在案又革職員外郎鄭玉珩致死匠作邱羲二一案緣羲二包造花園玉珩短少工價羲二以各行欠帳催迫縊死審無致死别情仍擬玉珩威逼重杖今據玉珩之母仲氏為子贖罪願於水利捐銀聞又商人黃光德之子黃履暹被誣毆父毆師一案經題聽候部議臣不敢擅便先具密摺請旨遵行又黃光德恭逢皇上興修水利題理合併奏伏祈睿鑒謹奏覽雍正五年六月初四日蘇州巡撫臣陳時夏謹奏為臣母恭沐天恩平安到署微臣感激難名涕泣奏謝事雍正五年五月二十六日臣會同欽差河臣督臣等查勘朱家口等處淤地舟次淮安清河口地方接得家書內開臣母特蒙皇上隆恩臣臣隨恭設香案望闕叩頭謝恩跪讀聖諭不勝感激伏地涕泣不能自已竊思臣之一身受皇上如許厚恩無以仰報於萬一乃臣母復蒙聖𠂻垂念更邀曠古難逢之盛典謝五月二十八日又蒙皇上頒賜臣母人參四封恩諭為高年人藥餌之需臣跪接叩頭祇領泣感隆恩稠疊無以復加即生生世世為犬馬亦圖報不能盡也聞臣母一路康健倍常已於五月二十六日闕叩頭恭領另將疊受皇恩情由具本奏謝臣謹先繕摺叩謝天恩伏乞聖明垂鑒臣不勝激切悚惶之至謹奏朕欣悅覽之自滇省奏聞卿母起程直至閲卿此奏朕每不能不繫諸懷抱今聞平安抵蘇心方釋然矣此實出朕至誠誑詞市惠邀人感譽之事朕殊恥而不為何也斯舉不止為施恩於卿一人已也將年已八旬封疆大臣之母朕特旨令其跋涉數千里倘道塗之中少有不虞實關朕之顔面今如此順適如意乃上蒼作成好事朕甚感慶焉些須微物聊賜卿母為添壽之意耳今訪聞得揚州府知府吕大雲於鄭玉珩家縊傷人命案內要商人李益茂銀二千兩免其到案牽連知府用人衙役戴鴻升得銀二百兩吕大雲署理揚關有書辦參費除二百四十兩歸公外每名要銀一百二十兩又生日門生送禮收玉杯玉壺等物又訪聞得江都縣知縣張有觀去年承追鹽商贖罪銀兩時得程公益銀六百兩吳敦厚銀四百八十兩吳雨山銀二百兩知縣用人衙役徐檜得銀二百兩知府衙役戴鴻升知縣衙役徐檜諸凡差使招搖作惡勒索要錢將此二事密訪的實如果事有確據張有觀之罪或猶可姑寬而吕大雲如此負恩自棄罪更不可逭矣亟當嚴行參奏同日又奏為據實回奏事蒙賜發摺單內開揚州府知府吕大雲於鄭玉珩縊傷人命案內要商人李茂益銀二千兩免其到案并收門生玉杯玉壺等因臣查鄭玉珩案內並無商人李茂益之名容臣細加密訪吕大雲如果有如此婪贓納賄之事實係負恩貪劣之員罪不容逭臣當立即嚴參至府役戴鴻升經布政司張坦麟到任之始即同江都縣衙役徐檜一並訪拿發該府縣枷示其得贓生事之處容臣查察具奏惟是關上書役參費一項原係相沿舊規五月初間吕大雲送臣關上規禮內有參吏四名每名公費銀二百四十兩即係此項現繳臣處收存臣蒙皇上隆恩不敢存私隱匿凡係臣衙門應得之項俱親手封貯俟歲底摺奏請旨定奪至吕大雲臣訪其官聲頗好試其辦事能幹在上司前應對明白尤戅直不拘小節臣每容之其為人殊少謙遜之容多招尤怨臣惟取其辦事實心如關上收稅實係儘收儘解今未至半年而額數己足下半年所入皆是贏餘比之趙宏本尤勝查江蘇知府有才有守實心辦事者惟揚州府知府吕大雲淮安府知府劉之頊松江府知府周中鋐常州府知府包括四員臣所深信鎮江府知府毛德琦雖到任未久其才守亦可深信乞皇上容臣回署將吕大雲有無劣迹之處細加察查據實密奏請旨至江都縣知縣張有觀所得程公益等銀兩與衙役覆伏乞聖主睿鑒謹奏朕料呂大雲不敢負朕亦不忍負朕伊年尚少日後功名不可量亦不當如此自暴自棄也但朕聽政五年以來儘有福薄小人天奪其魄如隆科多年羮堯傅鼐蔡珽等尚有不可勝數之輩實出人意想之外者所以朕竟不敢以人心天理而槩為慿信也用人之難用人之苦至矣極矣可為痛哭流涕者實莫過於此也呂大雲果肯如此實心學好則當惜而玉成之趙宏本原係庸材劉之頊實好周中鋐聞亦甚好恐有沽名之疵包括不過老成忠厚耳中材也深信二字不可亦何必乃爾若過於深信必受深欺今日只講今日後日再看一事只論一事他事再言不宜預存疑信之見於胸中蓋過信則不防其改操深疑必不容人改過均非時中之理也魯論云不逆詐亦當不逆不詐爾等封疆大吏既不欺朕又不被人所欺朕則無憂矣不被欺之道惟不深信一句而已如隆科多等朕若過於深信未必能如此一旦覺察也勉之勉之切記切記同日又奏為據實奏聞仰祈睿鑒事竊查副都統李淑德到工臣留意看其為人略喜浮華而查勘河道丈量估計却亦慎密近日接到家眷聞其置買婢僕四人但工上錢糧不經伊手亦别無生事乖張作福作威之處察無實據是以未經奏聞鄭玉珩黃履暹二案臣酌將該犯情願捐銀贖罪各於本案內聲明其各犯捐贖銀數總歸一本具題合先奏明至黃履暹受誣應復貢生免其捐銀并商人黃光德助公之項朱爾介人本明白但因嗜酒濫刑前經摺奏今蒙聞蘇松糧道楊本植所欠部餉挂平一項臣經奏臣前摺奏照直隸河南等省之例將江南耗羡歸公一事臣行司通查據布政司漆紹文稟稱江南火耗有數而公事繁重公捐甚多以為未便且恐其所查之數尚有隱漏難於即行是以再加細察稍遲時日兼又值漆紹文丁憂以致因循今臣與張坦麟正在細加確核必期斟酌萬妥是否行之有益無弊奏據奏米價不但爾江蘇一省直省米價皆昻湖廣亦長至一兩外矣乙已丙午二年不得謂為歉嵗朕意各省實因買補倉儲之所致耳朕於此一則以憂一則以喜同日又奏為奏聞事竊五月十四日接到部文內開上諭劉河白茒二河為歸海要道必須徑直深廣令水暢出為一勞永逸之計恐有紳襟土豪占種地畝請别開支河另開新道或稍徇情面使積水不能暢出漸至壅塞則汝等罪不可逭矣等因欽此臣等仰體聖𠂻查勘濬河皆由故道務必深廣直流歸江入海不皇上愛飬黎元之至意也臣前奏原任松江府通判祖秉震等五員自備盤費在水利效力巳蒙俞允查通判祖秉震因雍正三年押運漕糧進京曾蒙朝廷公事請將祖秉震留工或俟水利告成再行旨又運閩米十萬石已經配船裝運分作七次起運五月十四日領運官遊擊李燕具報全行運閩訖除用過水腳等項另行確核題奏外合并奏聞伏乞皇上睿鑒謹奏覽硃批諭旨卷十一上欽定四庫全書硃批諭旨卷十一下硃批陳時夏奏摺雍正五年七月二十四日蘇州巡撫臣陳時夏謹奏為奏聞事竊臣標把總齎捧硃批奏摺回蘇臣跪讀之下仰見我皇上聖謨廣大睿慮周詳諭以為政之大端治民之先務臣惟有服膺地畝并七浦閘白茒河往返幾及兩月所歷地方見遍處田禾密插近值風雨旬日並無傷害若得上鬆致有瀉落漸久淤填即嚴禁百姓毋許栽種以防頽瀉臣會同欽差額爾成格劉藩長署督臣范時繹等查出桃源宿遷睢寧新淤地一萬二千九百餘頃前經奏明在案又據淮徐道康𢎞勳稟稱勘出泗州淤地九千一百餘頃統俟丈明無隱分别上中二則召種升科造册題報隨赴揚州公同會勘陳公等塘下接串場河為揚州諸水入海之要道五塘舊有閘壩引水灌田因年久侵占成田五塘堙塞而閘壩遺趾尚存串場河亦淤淺窄隘今應逐一嚴查清理浚河設閘奏查水利工程時值農務正殷鄉民不及赴工趨役暫行停工欽差郎中臣鄂禮於六月十四日到蘇臣與鄂禮公同户部尚書臣蔣廷錫署督臣范時繹原任山東撫臣陳世倌會勘太倉州之七浦閘查七浦為巴城諸湖入海之下流其上流水深八九尺七浦僅得水一二尺髙於上流民田難資蓄泄驗之形勢毁臣等現在詳慎確議期於萬全會疏題奏又就近查天妃閘現今整理物料與白茒河應奏明查各河故道皆係從前豪強侵占為田湮沒舊制聖諭甚明臣當逐處嚴查清出決不姑容以致河流紆折有負聖心又地方凡有惡紳劣襟富豪光棍恃勢橫行者臣不時留心訪查密聞也又前命往河工效力程夢瑛等十七員已陸續到工僅供料理河工內有候選知縣暫行委署試用查江蘇現任廳員佐二俱有本任責成又有兼理塘工河工事務並無間員臣衙門遇有緊要公事乏員差委奏伏乞皇上睿鑒施行謹奏覽同日又奏為密奏事竊臣前奏嘉定縣知縣朱爾介醉酒濫刑一摺奉到硃批臣欽遵察訪聞該員醉後糊塗片時而醒近日亦自知警戒及臣於會勘事竣回署即傳朱爾介靣宣恩旨爾介跪聽叩謝天恩感激泣下自誓戒酒改悔自新竭力辦事以圖報效我皇上愛養人材恩垂格外該員感激思奮定當勉為好官如仍敢陽奉倉州屬之寶山縣知縣唐彥龍賦性疏慵諸事叢脞其經理濬河工程又多懈怠似此庸才難堪邑務查該令原由學正升任今應否請以教官補用旨又署徐州碭山縣知縣吳大成查察盜賊漫不經心該徐州知州張昕昏庸徇庇均屬溺職經臣一併題參以懲積玩合行具奏又鹽城縣越獄盜犯唐良臣等三名係審題擬斬之犯奉奏伏乞睿鑒謹奏覽同日又奏為奏明事臣於會勘淤田回署即同署督臣范時繹赴布政司察盤庫項查有前任布政司漆紹文任內承造天津戰船一項多用庫銀三萬四千餘兩布政使張坦麟揭報前來臣經具疏題參在案查建造船工江南各州縣向有協貼之例每部價一百兩協貼一百五十兩應共貼銀一萬二千餘兩尚有多用銀二萬一千九百餘兩據漆紹文詳稱此項硃批恩旨酌量伊力量能與不能料理今楊本植一力擔承業經解補清完矣運閩米石以恐有黴爛仰蒙聖心籌及臣查潮米變蒸多在春氣發動之候運閩之米於四月兑解巳過春期係乾潔好米况內有上江一半秈米尤為堅實似可無上厪聖懷至江蘇通省所屬倉庫各項臣嚴飭各屬如有歷任因循舊欠盡令據實開報以慿著落賠完或應題參歸補現在通行兹有前任蘇州府通判張禹錫署如臯縣任內欠解船工協貼銀一千三百兩經前任布政司楊朝麟將地丁銀兩扣抵禹錫自任完補嗣因病故未完兹新任交盤查出揭報正在未經題參合據實奏明又商人黃光德公捐一項奉硃批令伊向鹽臣處具呈臣遵將黃光德原呈著令赴經解審因臣會勘淤田并七浦河閘至七月初四日回署方行審將許華生捐銀三千兩誤寫史取善名下一時錯洪慈曷勝惶悚之至并具奏聞謹奏覽同日又奏為臣母疊受殊恩感泣奏謝事雍正五年七月十三日臣恭接硃批摺子蒙聖恩賜臣母貂皮寧紬伽南香珠眼鏡鼻煙壺奶酥餅果子乾到署臣恭設香案謹隨臣母望闕叩頭謝恩祗領訖跪讀硃批恩旨臣母子感激難名正在繕摺奏謝七月十七日接到部文奉旨諭吏部巡撫陳時夏之母賞給巡撫封典欽此臣隨恭設香案望闕叩頭謝恩訖伏念臣滇南下士歷仕多年親闈萬里迎養徒懷若非聖天子眷顧深恩安得十九年親顔再覩更蒙賞賚頻頒天恩賜夀且復榮邀封典格外垂恩聞命頻驚凛寵榮之疉至拊心多咎揣臣分以奚安臣母俯伏涕零朂臣竭力報賜到硃批雲南督臣鄂爾泰奏摺臣伏讀之下念督臣欽遵聖諭保護臣母安頓家室親至臣家看視起身感難言喻更讀至視臣母如已母一語臣惟有遙拜泣謝聖訓師之法之奉為典型者也謹繕摺恭謝天恩臣無任激切悚惶之至謹奏覽卿奏謝至誠愷切知道了雍正五年九月十三日蘇州巡撫臣陳時夏謹奏為密陳戰船之弊敬抒芻蕘仰祈睿鑒事竊惟戰船一項臣查江南通省大小營船共計三百六十五隻內除吧唬船及哨船一百三十二隻向例營員自修仍照舊例外惟艍犁趕繒沙唬戰船二百三十三隻經前督臣查弼納議奏又經廷臣會議於蘇揚鎮三府設總厰修造每年派道官一員領帑承修往來監督副將一員公同監視外以府佐一員同該船之本營遊守一員坐厰辦理工竣之日令督撫鎮中之就近一員親驗交營等因奉旨遵行在案臣留心細察其船工之堅固自無可虞但浮費仍不能省而需索之弊仍不能免查此項船隻巡哨海洋一年二次何至朽壞無如營兵捕盜等以文員承修有例每將屆期修造而扛具什物早已偷賣殆盡不得不從新整備且有藏匿錨舵大桅詭稱損失拆毀梁頭板片揑作無存原船捕盜坐厰查工或以木植不堅故為刁掯或以釘稀板薄極意苛求及至修整完固而本船遊守掯勒拆換即有領回船隻而應出營收亦必遷延時日故意作難必得使費陋規遂其欲則草率無辭拂其意則刁難萬狀如此而欲求節省斷不能也若歸各營修造則百弊盡除且工速而費省皇上聖明曾有歸營之旨早巳聖鑒及此矣奈營員百計推辭實欲避其勞而安其利臣再四籌之目今且緩其營修而預為營修之計合無仰請皇上將此項船工飭令道官一員與副將一員公同領料理互相監制稽查務將各船扛具什物桅錨之類查點全交有應行更換而可以不必更換者有應行備辦而可以不必備辦者互相斟酌損益無致糜費如此監修一二次使營辨兵丁經手熟習漸歸於營則需索推諉諸弊可杜矣查現今墩臺汛守皆歸巡察督查戰船亦係靖盜捍禦之需各汛又係巡察經巡之地應請皇上將戰船一項亦歸併巡察管理其用過部價協貼照例令布政司查核報銷巡察會同督臣題報如有經修文武工程不堅侵尅冒銷及營中有刁難勒索等弊巡察即飛章參奏從重議處庶幾各知所警而節省浮費俱歸實用矣謹據實密奏伏乞皇上睿裁敕諭施行謹奏爾此奏得無有所聞乎向來修船之弊朕所稔悉於即位之元年巳命詳議現今奉行因其不甚妥協近日正諭令該部密察或另降諭旨尚在未定如專責武員修理萬不可行所奏知道了同日又奏為奏聞事竊查江蘇地方臨江沿海之民每以沙灘漲地告爭不巳遂致率衆抄殺焚房經年結訟如丹徒縣巳革武生王大觀商謀令王志聖統衆爭墟致死蔣廷宇等十五命燒尸焚房一案延今一十五年不止一二百人皆由從前承審各官不實心查緝以致日久無蹤類皆流亡死絶僅獲王志聖張聖宇二人而志聖旋亦病故現犯王大觀等監斃者既多案內牽連流離身死者不知凡幾臣念此等姦徒固屬法所不赦但案經久不結巳故者皆伏冥誅現存各犯依律治罪足蔽厥辜若再行拖纍恐盡登鬼籙情有可矜是以仰體皇上好生之心不得巳就現犯審題不敢有一毫徇縱揑飾也但愚民見利忘害凡各屬告爭灘漲田地現在查審者二十餘案即今審明定斷值地方官一有更易刁頑之徒又必翻告爭端復起臣請查各屬爭奪地畝不能輸服者將爭興訟者臣亦歸公召種以息爭端應否如是伏乞皇上批示遵行再臣查松江與浙省交界之處鹽梟巨十年賣於正藍旗轉賣正白旗逃回除現今查訊明白另疏具題外合將該同知拏獲巨梟情由據實奏聞謹奏覽同日又奏為據實奏聞事臣家人齎捧硃批奏摺回蘇臣跪讀諭旨仰見皇上播德敷仁至公至當時以吏治民生各屬蚤禾巳於八月收穫因七月間風雨稍多收成略減不過十分中之一二晚禾正在收割蘇松常三府屬實有九分十分七月間大雨連綿虎邱一帶驟漲三尺幸得先濬婁江河道諸水滙入婁江由劉河暢泄水急勢勇潮水為之阻退是以蘇分邳海二州屬六七分查江鎮淮揚徐州海州所屬十四州縣夏秋水發臨江近湖低田間有被淹之處惟沛縣尤甚臣巳將各邑被災情形具縣人候選副使道張棠特赴臣衙門具呈情願捐情前來臣恐有人激勸勉強捐輸因傳張棠蔣文瀾等敬宣皇上洪恩動皇上天恩廣興水利將來河工告成士民實受無窮之福今歲蘇松大稔獲利已多莫非皇恩所賜棠等願捐實出一點誠心並非因人勸勉懇切具呈請題臣不敢壅於上聞伏乞皇上睿鑒施行謹奏覽雍正五年十一月初六日蘇州巡撫臣陳時夏謹奏為奏聞事臣奉行收買銅器一事今於蘇州城內設局委佐二一員守備一員動發庫銀收買臣以衙門所用黃銅器皿首先發出領價次及司府各縣俱令盡行交出以為民倡并嚴飭各典鋪故衣鋪將典存收買之黃銅物件俱令交出領價尤先禁絶打造銅器店鋪并將所存器皿盡令交官領價其紳襟冨户以及鄉民之家臣著於保甲內稽查令甲長收銅估色臣謹遵聖諭飭令收買人員公平估色較凖部稱平買毋許尅甲稽查窩賭之家及造賣賭具之人定以勸懲之法務期禁絶臣不敢視為具文始勤終怠也合并奏聞謹奏覽同日又奏為謹籌耗羡歸公之法仰祈睿鑒事竊臣歷任河南直𨽻俱係耗羡歸公經理有方度攴有節可以杜虧空而礪廉隅法至善也臣蒙皇上隆恩簡畀江蘇巡撫即思照例請行曾經摺奏奉有硃批仰見聖明洞鑒情形臣何敢不愼重周詳以期至當惟查江蘇賦重耗輕不同他省兼之修造戰船採辦顔料公用欵項甚多加以各員養亷之費前布政司漆紹文恐用度不敷以致因循臣訪察各州縣火耗不一因先通查實數據各屬開報紳襟富户每完銀一兩僅加耗六七八分不等百姓完銀則有包收之侵漁銀匠之傾折每兩火耗實計一錢有零臣現在嚴行通飭不論宦户民户火耗一例以加一為率嚴禁包收等弊與布政司張坦麟通盤合算江蘇額徴地丁雜辦錢糧并帶徵舊欠銀兩除正額外每年共計加一火耗銀四十一萬五千二百五十兩零臣意將此項耗羡總歸司庫督撫司道府州縣養廉俱從司庫支取請自雍正六年為始各州縣耗羡照全提之例同正項一總解司經收應給各衙門養廉照所定之數按季給發他如修造戰船則可隨時辦理以免各邑協捐之遲誤辦解顔料錫蠟公用以及應給各衙門胥役工食等項俱可次第料理凡屬動用耗羡之處布政司逐一詳明督撫照數支給造册送核統於歲底將一年提貯耗羡與支用之數開造清册會核密摺簡惟在錢糧耗羡之多寡即以錢糧耗羡之多寡定州縣之養廉酌於各州縣耗羡內扣存二分以為養廉以八分解司公用以通省之耗羡辦通省之公務按季造册申報督撫存剩若干嵗底具摺政司張坦麟之議也臣思耗羡歸公係國家公事臣與張坦麟所議意見不同蓋以州縣養亷尤宜斟酌均平張坦麟概於耗羡內扣存二分以作養廉查大邑錢糧十數萬兩應扣存二分銀二三千兩加以收漕耗米贏餘之益似屬過多簡僻州邑如海州睢寧地丁銀一萬餘兩若計扣二分火耗養廉僅止二三百兩又屬太少臣今分别有漕糧州縣酌給養廉一千兩有漕糧之簡僻小州縣酌給養廉八百兩其無漕糧之大縣酌給養廉一千五百兩則大小各州縣之養廉可無多寡奏覽同日又奏臣查江蘇各屬額徴地丁雜辦銀三百五十六萬一千八百五十八兩零又帶徵康熙五十一年至雍正元年均徵一分舊欠銀五十九萬一千一百八十七兩零共計加一耗羡銀四十一萬五千三百四兩零內除州縣徑解河工糧道驛道銀一百三萬一千七百兩應需補平飯食等項銀三萬九百五十兩零外實提解司庫耗銀三十八萬四千三百五十四兩零至雍正二三四五年民欠錢糧不在額徵之內其解司耗羡應以徵完之數另行聲明外今將通省公務及各員養廉銀兩數目約計存剩銀兩數目繕具清摺另呈睿覽伏乞聖鑒謹奏此奏朕不達不便判斷當與否是與非也諒卿自必斟酌妥確而後舉行朕不過一覽而巳但就中藩臬二司養廉皆一萬餘金似屬太過如修船辦料等項何至七萬之多修船或有貼費辦料但有贏餘耳豈庸幫貼其添平銀兩亦何至四萬之多再如道府州縣之養廉又少覺不足此朕未達之論偶爾書示亦不為準也同日又奏臣查蘇州布政司一年收銀數每年各州縣解司庫銀約三百餘萬兩每百坐平銀一兩三錢共銀三萬九千餘兩又水腳銀每百八錢飯食銀每百七錢約共銀四萬五千兩再每年放銀數除兵餉足發不扣外給發驛遞銀每百扣平三兩船工俸薪雜項每百扣平二兩缺站銀兩每百扣平二兩又扣部費二兩銅斤紙價銀兩每百扣平二兩每年約給放銀一百四五十萬兩共約扣平銀三萬兩以上收放坐平扣平約共十一萬四千兩此臣所略知之大概也猶有臣一時未及查出者尚有三萬餘兩為此謹奏此內各項應一一察明者諒張坦麟自必據實奏出倘伊見不及此當諭令奏明請旨同日又奏為奏聞事臣齎摺家人回蘇跪讀硃批諭旨仰蒙聖恩垂問臣母臣謹隨臣母望闕叩頭謝恩不勝感激臣自知愚昧叨任封疆屢蒙皇上隆恩諄諄教誨凡吏治之經權民生之利弊人情之誠偽與姦惡之必宜剪除科甲之不可瞻徇詳悉宣示實皆大中至正千古不易之定理臣惟黽勉力行以期仰副聖主一道同風之盛治再查吳淞等處水利巳於十月二十一日興工但歲內工程天寒日短力作有限要在開春併力可得三月大工河道當有成效矣伏讀硃批諭旨飭臣嚴訊滿州二姑沈氏徐二等仰見我皇上為民除害之題斷不敢稍有寬縱臣母年衰好靜日惟念佛以祝奏明查今年被災州縣輕重不齊蒙聖恩浩蕩發帑金二萬兩交督臣為上下兩江賑濟之用黎民呼頌皇仁聲聞山澤惟沛縣被災獨重黎民環懇天恩請照康熙四十八年之例緩徵本年漕糧俟來歲秋收補徵搭運臣查沛邑委因被災獨重勘係實聖鑒至被參巡察博濟騷擾驛站索詐情由奉旨交署江寧將軍何天培與臣嚴審臣欽遵拏到博濟及內幕家人等監禁因應審各犯未到博濟現今皇恩不加重典惟令於江南水利捐資效力自認捐銀題參治罪合先見臣欽遵分别具題又桃源縣劫獄犯人張大金棍等逃匿河南臣選差捕役往捕并移咨河南督臣田文鏡差捕協拏未據緝獲又據漕臣張大有咨稱各犯轉逃湖廣聖明睿鑒施行謹奏覽同日又奏為奏明事臣接準部文奉旨周中鋐居官聲名甚好但聞伊前任略有虧欠未楚如果有虧欠之項則不便準其管理關稅著陳時夏酌量委用欽此欽遵臣查周中鋐前係崇明縣縣丞升補華亭縣知縣任內正雜錢糧俱係交代清楚並無虧空即其署印六合宜興上海三邑亦並無未清之項及升授松江府知府向無存倉存庫錢糧又查從前管理海關稅務額外贏餘俱經解訖有案可據亦無虧欠未楚之處且周中鋐以縣丞不十年間荷蒙特升知府感激皇恩實心報效毫無欺隱臣是以委之重任今臣遵旨檄行布政司張坦麟嚴查有無虧欠應否另委之處再行題覆合先奏聞謹奏覽周中鋐原係好員朕偶有所聞所以諭察乃詳審之意無他故也同日又奏為微臣戀主情殷恭懇聖恩允臣歲底入都陛見事竊臣仰蒙聖主隆恩畀以江蘇重任於上年十一月到任迄今一年遙望闕廷依依戀切雖時刻凛遵聖訓勤辦地方事宜但才短性拙愧無以裨益民生仰報聖主今幸年豐歲稔辦理漕糧計日可以完兌而水利工程將屆隆冬應行停止至一切公事俱各依限料理完結臣計封印一月得以少間用敢仰懇聖恩允臣馳驛陛見仰覲天顔叩請聖訓臣於地方或有奏摺所未盡之事得以面陳躬聆訓示而臣犬馬依戀之私亦得少安矣謹繕摺請旨伏乞睿鑒批示遵行謹奏今歲不必來京即來亦無面諭之旨爾諸凡皆是惟於盜案刑名事件料理未協識見甚淺愼毋膠固痛加改悔可也雍正五年十一月二十四日蘇州巡撫臣陳時夏謹奏為奏聞事雍正五年十月二十六日怡親王同大學士張廷玉遵旨寄字到臣臣跪讀上諭仰見聖心無所不周訓諭無微不晰凡有利於民之事無不舉行有害於民上諭有關於民生風化者注明某年某月因何事所降之旨一并續行刋刻通飭各屬照式多刻自城市以至僻逺鄉村無不遍貼曉諭使咸知皇上教養萬方之至意目今收銅之令正在嚴行并令保甲稽查勒限交收無使隱匿其賭博並造賣賭教妖言之類自我迫民生樂業有熙熙皥皥之風再臣由高寶徑赴山陽鹽城會同欽差額爾成格劉藩長河臣齊蘇勒署督臣范時繹等查勘射陽湖淤地甚為廣濶約有二萬餘頃盡屬膏腴現委淮陽道等履畝查丈分别領墾統於雍正七年升科另容會題外惟查山陽一邑所轄甚寬周圍三百餘里縣令一官附於府城不能遙顧查廟灣現有城池應否將山陽分設一縣移駐廟灣則錢糧刑名諸務得專責成且查濵湖沿海亘綿六七百里止有廟灣設遊擊一員地廣人多亦恐鞭長不及似應於此處添設巡道一員以資彈壓防禦則地方謹嚴似屬有益臣與河臣督臣細加籌畫容查議妥確另行具屬能員今訪其修理文廟借名勒索各號沙船換票銀兩約得萬金又借詞訟罰銀至數千兩之多止以百金修飾廟貌餘竟浸匿入巳現在被人首告但張文英係臣與督臣范時繹保與署督臣范時繹會稿題薦一時疏略竟未留心查察經手錢糧遂即給咨送部引補上邑兩任內有未完船工銀二千餘兩又署嘉邑任內未還賑米一百八十餘石又錫邑未完漕項銀一千一百餘兩又上邑接受前任交盤未完銀一千七百餘兩又借欠原任山西巡撫蘇克濟家人趙七銀四千兩種種未完之項臣不敢隱匿聞謹奏覽同日又奏為欽奉聖明訓誨微臣感激難名恭謝天恩仰祈睿鑒事雍正五年十一月初七日臣於淮安舟次謹接大學士馬齊朱軾張廷玉孫柱遵旨寄字到臣臣望闕叩頭敬繹恩諭仰見我皇上代天御世立法無私以慈祥愷悌之深仁行除暴安良之善政使庸懦之徒婦人之見恍然悟養姦之足以貽害求福之適以濟惡臣愚昧頓開心誠悅服鹽梟孫四等拒捕傷人一案冒昧比照自首律擬罪實屬錯謬臣之性情柔軟不能秉公執法臣罪何辭乃蒙皇上洪慈不即加罪更不欲顯斥臣非教訓諄諄反覆開導至於此極臣具有心胸敢不奮勉濯磨時刻詳愼臣正在淮安會勘淤地容臣回署當細心查案妥擬具題并嗣後一切案件臣祗承訓旨尤當細加研究務期執法平允斷不敢枉法徇縱以仰副聖主保愛蒼生之至意也為此叩謝天恩謹奏汝諸凡皆可惟於刑名禁約二事識見甚屬卑淺朕屢經嚴飭若仍執迷不肯洗心改悔汝既深負朕委任之恩朕亦再無寬貸之理也如田文鏡料理刑名案件汝豈不知能無愧乎同日又奏為欽奉上諭事雍正五年十一月十三日接奉大學士馬齊等遵旨寄字到臣伏讀上諭仰見我皇上敦崇節儉愛惜物力一器一物俱期適用不尚華麗亦不肯置之間地至於外間督撫大臣進獻之物皇上鑒其悃忱不忍拒却酌收數種實屬天恩然亦必期於適用如黃地紅花之氊實非常用之物內庫收貯巳多若外間又復陸續進獻實耗費於無益之地今蒙皇上明白曉諭嗣後祗遵諭旨再不敢以此進獻臣并全録來書上諭知會文武大吏共仰體皇上敦崇節儉愛惜物力之聖意咸各敬謹遵行謹奏朕非為沽節儉愛物之名而令傳諭也因其實不適用耳覽奏朕甚愧之若似此卑屑體會朕意則大誤矣同日又奏為敬攄臆見仰祈睿鑒事臣於十月間會同河臣齊蘇勒查勘七浦吳淞河閘其時連日藴熱忽發大風二日海潮陡長盈丈勢甚洶湧幸海塘工程十分堅固高聳民人恃以無恐臣爰思塘工共四十里其石塘三千八百五十餘丈臣前細勘漴缺口工程其建築堅固之法巳經備細摺風濤旋轉無定而土塘與石塘連接仍恐波濤日夜衝嚙聮絡之處歷久不堅不若一例請建石塘誠屬一勞永逸之至計今查估土塘工料一萬二千九百餘兩以次險石工計之約添木樁大石鐵錠石灰等項所增工費十萬餘兩可以一例建築石塘則成四十里之金城為海隅萬世之利矣是否有當伏乞奏者蘇州有致和塘自婁門至崑山綿亘七十餘里為蘇松接壤要道田疇千萬頃藉為隄防查係宋時建築歷年既久坍塌甚多有跨塘橋一帶橋坍塘倒不特行人病涉驛馬難行一遇水發則汪洋溢漫田禾首先被淹且賊䑸出入無阻今據地方耆老士民頂香具呈請照浙省海塘之例紳襟富户捐資農民派役修築此塘利益萬世臣查石料現存約添加二層并僃內外樁木加以石灰工食所費約數萬金倘蒙皇上頒旨飭估興修則紳襟富户士民踴躍捐輸共成盛舉便於驛馬往來利田疇而弭盜賊裨益地方甚大永戴皇恩於無既矣應否具題合先密奏伏乞睿鑒批示遵行謹奏致和塘工程照此具題候朕酌奪聞得常保住伴送西洋使臣一路虛張聲勢甚不安靜伊等過蘇時爾出郭十里逺迎即於來使前向常保住跪請朕安殊屬失儀且聞爾親請赴筵中設正席旁設看二之席相待果有其事乎又聞常保住勒索人夫多至數百名是何道理可一一據實奏聞毋得絲毫隱飾朕旨不過令地方有司優待一切供給勿致缺少而巳初未嘗令封疆大臣如此越格失體而行也況常保住不過包衣微員因向日西洋人往返中華於時聖祖皇帝俱令包衣人員伴送朕今仍照舊例而行之事爾此番舉動若果如所聞則大不合矣雍正五年十二月二十四日蘇州巡撫臣陳時夏謹奏為據實奏明仰祈睿鑒事臣蒙皇上硃筆諭旨訓臣迎接貢使欵待失體聖訓嚴切不勝惶悚臣於八月初間報聞蘇祿國貢使回國有欽差御史護送巳至蘇州胥門臣即出迎欽差叩請聖安實因敬主心誠不知為包衣微員也胥門離臣衙門二里實無出郭外十里迎接之事及貢使至臣衙門進見時待茶而别彼面稱要往虎邱遊玩有吳縣長洲元和三縣於公所僃滿漢席并尋常果點各二桌邀請貢使請臣與布政司相陪貢使因病不來赴席即將所僃之席送去並未設有看二之席臣亦無親請赴筵之事至常保住舟過蘇州三縣照常例供應縴夫數十名接送過境細查並無勒索數百名之事即或别處地方有需索之事臣實無所聞不敢混行具奏仰蒙諭旨諄切臣伏思外國來使臣原不應許其入城進見以及向包衣微員恭請聖安之處是臣粗率失體咎實難辭曷勝感愧惶悚理合據實奏明伏乞睿鑒謹奏常保住經過山東浙江等省皆多索夫役船隻到處將朕所賜之物稱揚賣弄與地方官看家人收受門包鑿鑿有據何獨於江蘇三縣則不然再行詳察據實奏聞同日又奏為奏聞事欽惟我皇上聖明光被惠澤覃敷海晏河清星聯璧合嘉禾瑞麥疊見庥徵近奉旨通行停奏瑞榖仰見皇上敦崇實政之至意今雍正五年十二月初九日據松江府華亭縣詳報據里圖士民吳兆龍夏彥威等呈稱十一月二十四日瑞雪方晴風和日暖河工一帶地方天降甘露樹枝茅屋之上大如晶珠自辰至巳凝結不散仰蒙聖天子愛養元元致此太平景象仰懇轉詳具題恭謝等情又據金山司巡檢陶世英報稱卑職奉委疏濬運石河催儹工程十一月二十四日天降甘露自辰至巳凝結枝頭光彩的礫合行報明等因具詳到臣我皇上聖不自聖安愈求安德沛天下而不自居恩渥萬民而如不足惟務勤民之實政禁止獻瑞之繁詞但此甘露竒祥實屬古來罕見父老歡呼羣黎傳播臣不敢壅於上聞謹繕摺奏伏乞睿鑒謹奏具題到日有旨頻年以來屢蒙上倉垂賜休徵朕若不欣幸感慶非人情也然朕意但以爾等封疆大臣得人代朕宣化為真瑞似此嘉穀甘露景星慶雲河清海晏之祥朕實不敢以感召自居而亦不敢以祥瑞誇詡於天下後世也卿等亦當具如此想為是期共勉之愼之同日又奏為奏聞事竊臣標把總齎捧奏摺回蘇跪讀硃批諭旨臣不勝悚惕伏思臣雖至愚仰蒙皇上諄諄誨誡敢不勉勵奉行以期刑法至當禁緝謹嚴實心竭力辦理地方事務惟時時服膺徹聖恩垂鑒前奏耗羡歸公一事敬繹硃批臣謹遵與布政使張坦麟細加商酌全提耗羡以辦公事以給養廉務在秉公酌議定於雍正六年舉行一面另行具覽奏又松江府知府周中鋐承辦銅斤例限屆滿洋商行奏明又陳沂震未完銀兩蒙恩諭半年之限似屬太嚴然臣恐一經因循或致設法隱匿藉延歲月令地方官寧嚴無寬庶克有濟今廖賡謨捐銀之案亦在嚴追據繳完銀七千八百餘兩金三千一百八十兩零又金飾物件三十四兩零現行估變其餘捐贖之案亦俱上緊嚴追不使延緩合行奏明近日狼山鎮臣郭祺報稱拏獲洋盜袁三等九名搜出器械衣被贓物供認江面行劫此等盜犯本擬即行處死以除民害但在洋為盜必有餘黨自應窮治因發按察司嚴究以盡根株另行具臣於刑名盜案恪遵聖訓事事認真辦理斷不敢稍有寬縱也今在殘冬禁賭查夜處處倍加嚴緊地方安靜二麥秀發米價聞謹奏覽同日又奏為奏明事竊查蘇州府震澤縣革職知縣鄭金先於四月間查比積年舊欠錢糧有簡村地方居民藉稱重徵擾纍擁進縣堂打毁門牆通報到臣即批布按二司嚴拏審擬隨有鄉民等赴臣衙門投具無名呈狀臣即查訊拏到張為公等十七名并惡棍楊秀林一名一並發審去後據蘇州府知府溫而遜審詳布政司稱此案各犯取供後陸續病故七名按各犯供稱有傳催保戶錯開欠戶者亦有匱書收侵在逃者但不據實稟明輒敢赴縣閧閙將為首之犯照律充軍為從者減徒在逃之楊秀林嚴緝另結失察重徵之知縣鄭金巳經另案革職免議監斃人犯之典史記過免參等語兹據布政司會同按察司詳稱此案係該府溫而遜抗延承審拖斃多命徇庇朦詳率結請將溫而遜以溺職題參等因到臣臣查積年舊欠半屬抗頑原非良戶即有匱書傳催保户重開之弊在縣令固難辭咎但不稟明查究輒敢倡衆閧閙公堂刁風甚不可題參合行密奏伏乞睿鑒批示遵行又原任江撫吳存禮身故其欠項纍纍臣密囑各屬留心察查産業據高郵知州報稱有吳存禮家人李朝佐住居州境查出房屋二所計二百五十間田地九處共計三十頃有餘訊係吳存禮置買之産今將房屋人口嚴加看守此外有無隱匿别項産業併令各屬密行查察外合將高郵州查出旗員産業先行密到臣臣思此等賊黨散處各方惟應密行訪緝隨差中軍遊擊協同蘇松巡道於震澤縣近烏鎮地方密訪拏獲積窩武舉金士吉一名向係慣藏大盜坐地分贓之人又獲得女盜沈吳氏一名混名雌老虎有名積惡大盜俱撥兵押護解赴浙省督臣究審合具奏聞謹奏覽雍正六年正月二十九日蘇州巡撫臣陳時夏謹奏為奏聞事臣家人齎摺回蘇恭讀硃批諭旨蒙皇上訓誨嚴切臣不勝悚栗惶懼臣以愚昧無才識見卑淺於刑名盜案致多疏縱失職上負聖恩委任之重捫心自愧罪實難辭蒙責事事整飭嚴謹以贖前愆斷不敢執迷怠誤也臣接準部文各省鑄錢搭放兵餉奉旨俟合省報收銅器到日看所收斤數可以開鑄即行文設局鼓鑄於錢法甚有裨益欽此臣查蘇城所收黃銅器皿巳有三十餘萬斤今各府屬縣設局收買所報多寡不齊布政使張坦麟陸續發銀現在上緊催收源源交納俟各屬報到遵將收銅之數按季旨定奪再臣讀硃批諭旨聞先修石工甚不堅固倘遇有前年大潮恐不能捍禦所以朕有旨令察為何不見回奏欽此臣查部文於雍正五年十二月十一日到蘇臣恪遵諭旨即咨會署督臣范時繹原任山東撫臣陳世倌郎中臣鄂禮現在訂期會勘臣先於去年四月因海塘漴缺口工程報完臣親赴查勘驗其建築之法跟底排釘木樁深密堅實纍砌大石十一層縱橫鑲嵌膠以石灰鈐以鐡錠似屬堅固曾經摺奏在案今蒙特頒諭旨仰見皇上綢繆萬全之至意臣欽遵會同范時繹等公同會硃批諭旨又捧讀張坦麟摺奏內硃批諭旨臣與張坦麟酌核全提火耗於二月開徵後舉行至各員養廉應行增減之處臣等公同酌量妥協另具奏聞謹奏聞江南有奉旨提耗之説陳時夏若忍為此語不畏頭上昭昭之鑒察乎誠如此則是為君上者推誠二字萬萬不可矣同日又奏為奏明事竊蘇松糧道楊本植丁憂離任今準部文欽奉特旨楊本植如交盤清楚即令到京不得逗留欽此隨經轉行飭催在案茲查楊本植一應錢糧俱經清楚無虧祗因存庫項下應解部銀四十餘萬兩所需飯食解費銀兩尚無交出新任道員欲以正項扣出抵作解費短少正項詳為虧空楊本植懼難彌補必致遲延不能起身今情願將應解存庫正項照數自領協同委員赴部解交應需飯食添平等項本植在京措足交部料理掣獲批回以副即行進京之旨則公事無誤不致逗留似屬兩便臣一面取具交盤册結造報仍於交盤案內聲説題明但恐舊員無協解錢糧之例格於部議合將情奏明又原任兩淮運使何順認辦松江海塘續添樁木一項需銀七萬三千餘兩蒙聖恩借動庫帑著追完補在案今何順呈稱願將現存田地房産并親友欠項變抵外尚有不敷庫銀四萬六千餘兩有兩淮運使任內雍正二年衆商規禮節禮五萬四千兩未經繳收懇將此項抵補歸庫等因臣因事關庫帑隨即行查今兩淮運使張璨詳據衆商稟稱雍正二年綱規節禮五萬四千兩未曾攢送何順未曾收受是實臣查各商應出舊規既未交收即屬公項或提撥公用抑或準抵完庫臣未敢擅便合行密奏請旨批示遵行謹奏兩淮鹽商為國家急公效力處頗多豈有代何順催追商欠完項之理此説悖謬何順若無銀還庫自有身命可抵何庸爾為伊激切耶同日又奏臣自雍正四年十一月初六日到任至五年十二月連閏計十五個月所收司道各關規禮銀共二萬四千七百六十八兩零又臣於天津鹽道起身時蒙皇上賜臣作盤費銀二千一百八十兩零又臣於河南開歸道任內代各屬縣墊過驛站銀三千兩巳經各屬送交江蘇收訖連前各項通共銀二萬九千九百四十八兩零臣自到任起至雍正五年計用去銀數除承造船隻製造軍械并撫標兵丁號衣旗纛及臣閲操賞兵家口食用齎摺人進京盤費幕賔束修各項共用去銀九千九百四十兩零實存銀二萬兩現貯臣署仰請皇上諭旨另發公用或將此項收買銅器或修理倉厫買榖積貯伏祈聖明批示遵行又臣所收銀數以及用度各項俱臣親手登記纖悉無遺臣無總管堂官一應屬員並無門包陋規所有司道各員所送舊規外有隨禮銀共四百餘兩臣給散家人為衣履之用事屬瑣屑本不應煩瀆聖聰但臣不敢絲毫欺隱合併聲明謹奏覽所奏何瑣屑猥鄙至於如此果肯秉公正色如鄂爾泰田文鏡於地方上興大利除大弊令百姓沾永逺之惠國家享悠久之福其功與能豈此二三萬金所能酬答耶假若庸碌無能沽名釣譽甚至誤國殃民即取用此數千金亦屬過分朕前面諭汝者甚明今此奏令朕如何批諭耶據云一一親手登記纎悉無遺誠如此何暇辦理政務況江蘇事繁一日之光隂無幾一人之精力有限專於細小者必致遺誤大者要者多有人論汝見小不識大體今覽此奏果不謬矣譬如逸盜不捕而嚴約奢靡銅賭不禁而驅逐娼優類斯者不可枚舉捨本而趨末避難而謀易無非沽名而巳人心不服雖令不從也誠能將大者難者力圖數事俾令行禁止人咸感畏其餘些小易辦之事只須出一告條若不各各遵奉朕知必無是理也且用人必須得當捕役中可信者亦不多得若將幹役皆差辦碎雜末務遇緊要事則不得人而使矣況輿臺下胥窺見巡撫務小競以卑鄙瑣屑之事來相迎合成何體統耶朕通盤看來祗取汝之不事欺隱一節然朕實鄙之從此若不能醒悟痛改再加以掩飾則朕無可為汝恕矣身為大臣但當於逺大留心幾許銀兩多寡增減有何關係少寬裕自無不感過苛細再無不怨此人情之常不待言者此外朕實不能諭如何若何也雍正六年正月二十九日兵部尚書降一級調用臣何天培蘇州巡撫臣陳時夏謹奏為奏聞事竊被參巡察博濟奉旨交署江寧將軍何天培與陳時夏會同嚴審臣欽遵於勘河事畢回蘇路由常州協同何天培到蘇會訊博濟巳將經過滁州等各州縣勒索婪贓情由逐經供認在案其中有口供未符之處今正開印後臣等復經質訊明白正在成招會題不期博濟畏罪於正月二十三日夜間自縊身死臣等隨委員查驗委係自縊身死查博濟係奉旨發審重犯該地方官不嚴加看守以致疏虞所有疏懈各官現在嚴查另疏會參外合先繕摺奏聞謹奏殊屬疏忽之極雍正六年三月二十九日蘇州巡撫臣陳時夏謹奏為仰荷聖恩訓誨微臣感激難名涕泣奏謝仰祈睿鑒事雍正六年三月初四日臣標千總齎捧奏摺回蘇臣恭讀硃批仰蒙訓諭嚴切臣不勝感激悚惶又於三月二十一日接準部文奉駁周得安命案欽奉諭旨等因到臣臣恭繹之下仰見我皇上至聖至明無微不照且感且愧俯伏汗流竊念臣微賤庸愚深荷皇上宥之反覆開導切中臣病我恩叩頭流血而不知也臣今服膺聖訓愚昧頓開勉力改圖惟將疏懈者整飭之因循者聖明洞鑒臣愚感恩至極謹繕摺奏謝伏乞睿鑒謹奏孤立黨援朕皆不論但須還朕公是二字如不公不是即使孤立無援於國計民生又何益耶第一要著俾闔省官民知畏勝如感恩也毋差錯爾念同日又奏為奏聞事臣查江省各衛調幫兌漕抽幫兌白一案係漕臣張大有具題奉旨允行今訪有通倉退役王八等來南招搖撞騙臣隨密令署蘇松糧道毛德琦嚴拏訊究今據毛德琦訊明王八即王天申巳經供認得過銀二千三百兩但查搜出合同議單等項派費銀二萬有竒又經搜出朱斐徐朝鼎一札指稱有怡親王的當之人名色揑開使費一萬七千兩更為駭異臣思怡親王公忠體國稽察屬下甚嚴久在聖明洞鑒之中內外臣工無一不知今棍等竟敢造言指騙甚屬不法除將造札之朱斐等現在嚴拏并拘案內未獲要犯嚴審實情分别定擬具題外所有該犯等妄札臣謹密封進呈聖覽伏乞睿覽施行謹奏此一事之奏聞及辦理處甚屬可嘉如此方是其未獲要犯巳諭怡親王在京亦嚴行察拏妄札合同暫留以備獲犯後質證同日又奏為據實奏聞事臣欽奉上諭以松江海塘不甚堅固令臣等會勘臣欽遵會同署督臣范時繹陳世倌鄂禮前赴公所公同詳察細加籌畫巳經會題在案臣於途次聞得嘉定縣知縣朱爾介催科認真因徵催積欠於二月十一日夜有刁民將四門城外弔橋木板拆棄水中杜絶催差下鄉并聲言完舊糧者同衆抄搶隨據朱爾介拏獲周福元等皇上垂念督臣范時繹未定養廉之項著江西安徽江蘇巡撫悉心計議如何定為總督養廉之處具奏欽此臣向聞督臣衙門上下兩江布政司每年各送規禮銀四千兩江西亦然驛鹽道亦有規例未知聞目今七浦河福山河徐六涇吳淞江正在開濬將次亦平民生樂業地方安靜又奉旨嚴拏劫獄逃犯張大金棍等臣差捕由漢口復至河南跟緝據報於南陽縣地方巳被漕臣兵辨擒獲張大金棍張二金棍鈕解來淮合行奏旨發來試用各員現經量才委署巳經咨明內部今新任布政司趙向奎因料理公事差委乏員與臣商量懇請題明試用倘或才品不及臣即據實題明仍令回京應否如是伏乞皇上批示以便具題謹奏覽雍正六年四月初四日蘇州巡撫臣陳時夏謹奏為奏明事案查雍正二年二月升任通州知州白映棠奉調入闈署內被竊庫銀七百兩當經吏目與收書公同賠補未經通報至雍正三年十一月復有葛喜閃入匱房行竊被獲究出前失之銀經葛喜供認同邵大等七人夥竊各分銀一百兩寄頓錢鋪高士偉程宜善等七家該州拘高士偉等嚴訊俱各照數供認繳完高士偉隨於是年十二月病故及臣到任之後白映棠隨升山西汾州府知府離任之後高士偉之父高振以伊子誣寄賊贓受刑身死具控據按察司白清查訊程宜善等俱改供寄贓無據畏刑認賠高士偉實於刑訊後一月因病身故具詳將白映棠題請解任質審等情前來臣查白映棠以二次盜竊庫銀之重案匿不通詳縱盜遺殃溺職殊甚高振之子病故巳逾一年忽行控理衆口翻供難以懸斷必得原問官質審始得實情相應據詳題請將升任知州白映棠解任提來質訊明白將偷盜庫銀重案究擬定罪并將匿報情由具題合行奏明伏乞聖明批示遵行謹奏似此理應具題之事何必又多一番瀆奏總之爾素性瑣屑不諳大體遇事遇言自不覺顯露本來面目也同日又奏為奏聞事竊江蘇地方今春雨水調和二麥茂盛現據蘇松常鎮四府屬俱報七八分收成其餘各屬俱稱正奏外臣前具奏蘇州致和塘驛路頺圯羣情願捐資修築現今各紳公議樂捐密估工料以定捐數容另具題但查致和塘祇係自蘇至松之要道尚有由蘇而上至京口下至吳江與浙省交界通衢往來馬路歷年久逺日就傾頺若不急行修築將來滋費愈大臣因水利工程緊急未經議及今幸開濬各河將次告成閘座亦在興修俟各河完工之日臣會同署督臣范時繹另行題請將通衢馬路同欽差查勘或動松江府知府周中鋐率同河臣送到裏河營把總陸章等日夜料理堵築三月二十九日正在合龍周中鋐陸章乘掃船衝流督夫下掃值回潮水溜題報外該知府管理海關稅務承辦銅斤監修海塘公事重大查同知金文宗同事松江熟悉事務人亦勤幹誠實即行委署速令料理諸務臣向知周中鋐辦銅收稅之事係伊胞兄周中鏜同胞侄周印梅二人經手稅銀正在清查其上運銅斤現經督催毋致遲誤查松江府為濵海要區必得熟練之員方克勝任仰乞聖明揀選能員補授則要地得人臣可收指臂之效矣伏乞睿鑒施行謹奏莫非要地豈止松江一郡為然為汝收臂指之效其事小國計民生所關甚大豈不欲得賢員而用之奈汝等庸碌督撫不能秉公察吏舉錯失宜殊可惜國家人材耳既不知鼓舞又不能訓導致令良吏垂首劣員得志自損臂指而竟不覺奈何奈何即如吕大雲豈應破格保薦之人乎若言伊庸劣似屬寃抑若照爾之薦語實不至此似此品評屬員之高下孰肯心悅誠服耶同日又奏臣查南滙縣知縣欽璉履任以來勤於催科理訟頗稱有才今因違誤欽工臣不敢不會稿題參但欽璉實係地方能員臣不敢隱匿不言合行密奏伏祈皇上睿鑒謹奏既係有才之員何至違誤工程耶爾觀人之術朕甚信不及雖非存私目力不明亦安能甄别賢否雍正六年四月十八日蘇州巡撫臣陳時夏謹奏為請旨事竊臣庸愚無似仰沐聖恩畀以蘇撫重任兼理各關稅務蚊負是懼時深兢惕凡委理關務之員必擇才守兼優者飭其實力奉行今查上海一關歷年贏餘銀兩自一萬五六千至二萬七千有竒臣因查勘河工兩歷上海地方留心訪察知關外海道四達商船往來無定全賴管理之員實心稽察寬嚴並濟則商販聚而國課裕較歷年贏餘之數實可加增臣意欲自行試收一年以核實數臣雖不能分身前往有臣子候選州同陳萬里尚可驅䇿如責其專心在關上緊稽察毋使吏役侵肥逐日儘收儘報似於稅務有益臣因清釐稅務起見用敢冒昧瀆陳是否可行伏候聖裁批示遵行謹奏關稅原係責成巡撫辦理之事無論如何題請皆可但身任封疆統率羣僚不能信托一人威服一人甚至稅務小事皆欲親身料理又欲委用親子恐難免人竊笑也觀此一關尚不得人管理則通省屬員中一無可信一無令從之人可知矣國計民生大事如何辦集其一切茍且塞責俱在不言之表也奈何奈何同日又奏為奏聞事竊查江蘇二麥收成分數江寧府屬有十分九分八分不等蘇松常鎮四府屬九分八分七分不等淮安府屬高田八分低田六七分不等揚州府屬九分八分六七分不等太倉州通州各屬九分八分徐州七八分不等邳州海州尚未報到惟揚州府屬之江都縣四月初三日偶有氷雹仙女鄉地方二麥微有損傷常州府屬之靖江縣氷雹稍重據報二麥被傷秧芽壓壞臣經委員查勘俟勘明確實如果成災設法撫恤窮黎容另嶽廟令各商捐錢每大船一隻錢三十文中船一隻錢二十文小船一隻錢十文給票為據自前織造胡鳳翬收起至今仍行照收查東嶽廟並未興工不知此項錢糧每年奏銷內曾否開入臣處無從查核惟恐關役人等借端侵蝕伏乞奏仰祈聖鑒謹奏知道了雍正六年六月十一日蘇州巡撫臣陳時夏謹奏為欽奉上諭事臣接準吏部咨文蒙皇上垂念督臣范時繹未定養廉之項著江蘇安徽江西巡撫悉心計議各就地方局面如何定為養廉之處具摺啓奏欽此臣遵即移咨安徽江西撫臣去後今準安徽撫臣咨稱司庫有應繳督臣規禮銀四千兩江安糧道有應繳規禮銀四千兩江西撫臣咨稱例有應繳督臣規禮銀四千兩臣遵查江蘇司庫有應繳規禮銀四千兩三省向例約略相同合共銀一萬六千兩照例繳送但督臣統轄兩江費用浩繁實有不敷之處臣就蘇松地方局面悉心計議請於議給各官養廉項內較舊例增銀二千共給督臣養廉為六千兩應否如是臣未敢擅便其安徽江西應聽撫臣魏廷珍布蘭泰各行計議覆奏臣謹具摺奏聞伏乞皇上批示遵行謹奏此所計議是交與布政司張坦麟料理可也同日又奏為欽奉上諭遵即覆奏事雍正六年六月初四日接奉怡親王同大學士張廷玉蔣廷錫寄字緣張坦麟摺奏臣囑令趙向奎勒掯交代欽奉上諭寄信到臣臣因張坦麟調任後有作速赴任之旨臣即令交代清楚無致久留始因欵項甚繁清查未楚繼又以五年分解部餉銀平飯銀兩尚未交清逮至限滿猶復各執己見彼此互詳臣業將情由據實具奏在案查張坦麟交存應解部餉銀一百萬一千兩零係雍正五年分經收之項所需飯食添平銀三萬七千三十餘兩彼時各屬解司庫係隨正收存張坦麟自應照數交出以為將來解部之用今張坦麟見臣提取耗羡除派撥各官養廉之外尚有贏餘遂將此項平飯銀兩竟不移交欲移支於雍正六年耗羡之內但耗羡銀兩一年有一年之用各有欵項所剩贏餘賴以彌補從前各案無著虧空原為國帑起見若五年解費而預支六年耗羡是臣此番提取耗羡之議非為國計竟為張坦麟彌補虧缺矣此臣與趙向奎所以不能從之也至臣與張坦麟同城共事或偶有意見不合之處皆朝廷公務毫無私怨今司庫交盤臣有查盤督率之任固不敢懷私以誤公更不敢避嫌而徇隱立法之始國帑攸關不得不一言持正若有一點加意吹求以圖勒掯臣可以矢天自誓斷難逃於聖明洞鑒者也趙向奎以張坦麟交代遲延并庫項虧缺陸續揭參臣因摺奏在案祗候聖裁批示是以但參遲延今蒙皇上以嶽濬等待張坦麟甚切遵即令趙向奎作速交代謹候硃批臣前摺到時即令作速起行庶於兩省公事無誤伏乞皇上睿鑒批示遵行謹奏此事之可笑處朕亦不再諭矣總之汝識見卑鄙褊淺實非巡撫才經朕屢加訓諭而不能奮勉改革才智限於此亦無可如何也汝自蒞任以來盜不能緝吏不能察承追二百五十萬錢糧不能完二十分之一蘇郡城內大開銅鋪而不能禁止築堤濬河工程遲誤而不能勸懲於刑名案件則一味姑息其餘不職處不可枚舉惟能令戲班減少大半縀鋪關閉數十座僧道數千百人還俗祠廟數處改為書院在汝意以王道變化風俗但不知實有益於民生處何在對人時感恩泣下而不能仰體朕𠂻辦理一事似此報德於朕躬處又復何益殊不可解除可笑之外實無以批諭汝也雍正六年七月二十五日原任蘇州巡撫臣陳時夏謹奏為感謝天恩仰祈睿鑒事竊臣至愚極陋荷蒙皇上隆恩畀以蘇撫重任原期矢心殫力仰報高厚於萬一奈臣才短識淺貽誤日深有辜聖訓復蒙聖主寬宥戒其前愆冀其後效調署山東布政司事務奉命之下感激涕零臣即於六月二十四日交印卸事當即照例題報在案臣於二十八日起行赴任適接邸抄奉有陳時夏仍留蘇州會同辦理各案虧空之旨遵即停舟祗候隨準署督臣范時繹署撫臣張坦麟各移咨到臣捧讀諭旨愧悔靡寧因思各案虧空贓罰歷年以來不思實力催追以致積欠如此之多咎實難辭臣現同署督撫臣細加商議設法查追力圖清楚以期稍蓋前愆於萬一至臣會同辦理事件例應具題者當會疏具題外倘另有應自奏請聖訓以便遵循之處或有聞見應奏之事件并請容臣繕摺具奏伏乞皇上恩賜批示遵行謹奏遇有應奏之事自當照常摺奏何必又請批示硃批諭旨卷十一下
