body:
  text: 欽定四庫全書硃批諭㫖巻七十一硃批王瓚奏摺廵察湖北湖南等處吏科給事中臣王瓚謹奏為敬陳管見事竊臣荷䝉天恩拔擢廵察湖廣日夕氷兢仰圖報稱謹條陳三事伏冀聖眀採擇一湖廣全省民猺雜處風俗刁野尤喜訐訟臣伏讀聖諭廣訓一書覺世化民至為深切著眀現今各處固巳奉行宣講但日久相循視為故事愚民耳目不新無以望其警醒臣愚以為廵察一官雖專司緝盜及之遂覺肅然第向無此例理合奏眀臣更有請者每見各府州縣宣講聖諭之時各官聚集一處胥役環繞聽者擁擠觀望實無一現在欽遵諭㫖自司道以下各員俱設民壯以為長随護衛臣思各州縣民壯俱係民人承充其中分有鳥鎗弓箭操練之法亦與營兵相同竊查各省營伍例由歩兵漸次考㧞而民壮别無上進之路在技勇可觀者既不樂於承充而各處所設仍不過以老弱衙役虚名應付也臣愚以為司道以下各員護衛之民壯俱嚴慎選收照營兵一例操練三年之後果庶寓武備於民壯之中可免虛冒之弊矣一候選候補州縣人員䝉皇上引見分𤼵各省以便遇缺委用臣思州縣為地方正印固不宜久曠而佐雜等官如同知通判以至州同州判吏目典史亦有地方之責俱不可令其人缺久懸臣見楚省佐貳雜職等官一遇缺出聽候部選動須半載雖亦經督撫委員兼攝然不無顧此失彼之虞臣愚以為現在赴部候選佐貳雜皇上敕下督撫酌議施行以上三條至為淺陋是否可行伏乞睿鑒批示謹奏覽所陳奏實一無可採假若勉强採用翻為王瓉所笑用汝之悞自係朕乏識人之明耳復有何說廵察湖北湖南等處吏科給事中臣王瓚謹奏為直陳管見恭請睿鑒事臣查州縣為親民之官最關𦂳要我皇上澄清吏治各省分發人員俱令量才試用其有人缺不宜者督撫復酌量調補所以察吏安民者無不至詳且備臣淺陋庸愚亦復何敢置議惟是臣就而造就之法莫要於稍寛時日俾得訪察利弊厯練事機除庸劣者不時紏㕘無庸姑息外其試事教導如能學習辦事漸臻純熟者題請實授不得於一年内屢行更調及任事三五月遽請改教則為時既久得以從容察核胥吏之姦詐嚴加整頓而胥吏亦有所畏懼不敢肆行䝉蔽似亦造就人才肅清吏治之一法是否臣言有當伏乞睿鑒施行謹奏汝此人朕實悞用矣硃批諭㫖巻七十一
