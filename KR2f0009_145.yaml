body:
  text: 欽定四庫全書硃批諭㫖卷一百四十五硃批唐執玉奏摺雍正七年七月十五日署理直隸總督左都御史臣唐執玉謹奏為遵㫖查奏事本年六月十三日大學士臣蔣廷錫傳㫖將巡農御史舒喜請建清河倉房一摺交臣查奏臣到任之後即細加訪察查舒喜至清河地方其時知縣王瀧業已告休委署試用知縣郭二成不過暫行署理似無賄囑之人查直隸州縣現奉恩㫖蓋造倉厫臣以各州縣估價浮多現在嚴行核减并欲另委賢員責令估計不敢聽其冒銷亦無賄囑之項再臣細查歷任知縣告休參處多由倉榖不清則舒喜所奏似非虛妄相應據實奏聞謹奏據奏如此則凡似清河縣者俱當作速修整料理不容延緩雍正七年八月初九日署理直隸總督左都御史臣唐執玉謹奏為恭報秋禾收成分數事竊照直隸秋成分數據各道府由布政司轉報到臣查霸昌道屬收成有十分九分及七八分不等永平府屬收成有九分八分七分不等保定府屬收成有十分九分八分不等河間府屬收成有十分九分不等天津州屬收成有八分七分不等正定府及五州屬收成有十分九分八分不等順德府屬收成有十分九分及七八分不等廣平府屬收成有十分九分八分不等大名府屬收成有十分九分八分不等宣化府屬收成有十分九分及七八分不等今嵗秋成洵稱大有臣目覩豐亨不勝欣忭惟霸昌屬之武清一邑夏間大雨時行河流暴漲堤岸衝激致被水災荷䝉皇上軫念民生發帑賑濟天恩浩蕩士庶歡騰又據隆平縣詳報農民嶽迪吉等呈送藉田內所産瑞禾一莖雙穗碩大堅好共有三十三本臣欽遵諭㫖停其進獻飭令敬貯先農壇宇以志休徴合并奏聞謹奏覽秋收分數深慰朕懷同日又奏為奏聞事竊據保定府清苑縣詳稱本年閏七月二十九日夜四更時候監內賊犯乘禁卒睡熟有孫京趙大力趙虎兒魏七兒栁老包五名扭打鎖挖通監墻越獄脫逃等情臣即嚴飭在城各營辨兵協同地方官嚴加查緝當將魏七兒等四名拏獲收禁外尚有栁老包一名未獲臣復飭令在城官役密行查拏續據清苑縣詳稱於八月初二日又將栁老包拏獲以上越獄賊犯五名俱已全獲等因到臣查定例越獄逃犯當時即行拏獲者免參疏防咨部備案等語今清苑縣越獄賊犯五名俱已全獲除檄令按察司查眀刑書禁卒人等有無賄縱情弊另案歸結并照例咨部備案外事關省城賊犯越獄臣不敢以巳經全獲匿不奏聞為此謹奏知道了越獄賊犯當加倍處分以示警戒何竝未議及耶雍正七年八月二十九日署理直隸總督左都御史臣唐執玉謹奏為覆奏事竊夲年閏七月二十九日清苑縣賊犯孫京等越獄脫逃一案經臣將脫逃復獲緣由繕摺具奏奉有硃批臣捧讀之下不勝惶悚伏查賊犯越獄臣巳咨明刑部使將來加倍治罪有案可稽乃奏摺內未及聲明甚屬疏漏臣粗率之罪實無所辭伏乞聖恩寬宥為此謹奏似此疏漏向後不可又奏為奏聞事前任張家口城守營參將守僃等官將下堡城壕令民自行填平蓋造房屋又將操兵教場周圍空地令民耕種伊等取租入已費用相沿以來歷經數任於雍正三年緣原任萬全縣知縣王德懋與原任參將韓劻不睦即將此項房屋地畝租價緣由查明通詳伊該上司從此參將守僃將此項房地租銀竝未收取迄今五載地方官員竟無定著因無收租經管之人小民誠恐現今無人收租日後至有纍及家産之虞一年所得租銀計二三百餘兩現今五年未行收取共有一千餘兩懸擱無著臣思此項房基地畝俱係官地則此項租銀相應交與地方官員查明入官及今不行查收以至年久積多一時收取而民不能交納反滋苦纍若將此項租銀交與直督查明定議不惟小民不至年久積多一時不能交納而錢糧亦不至兩懸致有虧缺矣為此謹奏地方上類斯等件雖屬末節亦皆應次第料理者朕若不勤察好問何由得聞封疆大吏固可以籩豆之事卸責有司而該州縣亦竟置之膜外汝等寧不當過而問耶再者王德懋通詳案內韓劻有無寃抑處亦當察明摺奏以聞雍正七年九月二十六日署理直隸總督左都御史臣唐執玉謹奏為覆奏事竊臣查張家口城守營參將守僃將下堡城濠令民填蓋房屋又將教場空地令民耕種取租一案雍正三年正月十八日原任宣化鎮臣許國柱據張家口鄉約王榮瑞等具呈內稱本堡有官地民房韓參將等私取房錢鋪民受纍等因移咨原任總督李維鈞又據原任參將韓劻呈稱夲營把總署東空地又堡外城濠及教場空地租與民人蓋房每年把總收銀五兩六錢守僃收銀八十三兩參將收銀不及六十兩等因隨經李維鈞飭查去後嗣據原任萬全縣知縣李三光造送清冊各數俱與營報之數相符歷任督臣往返批查亦未即行定議延至夲年三月十五日始據萬全縣現任知縣修鑑確查此項租銀每年參將實收銀九十六兩零守僃實收銀一百三兩零把總實收銀五兩六錢通共二百五兩七錢各地户租種教場地畝歷年收租穀七十二石零租銀二十八兩零內除在萬全縣納夲色糧三十三石零又耔粒銀三兩八錢零係入奏銷之項其武職衙門所收房租地稅除納糧外每嵗約可餘銀二百七十餘兩或自雍正五六年起著地户照額輸租歸入正項等因具覆而張家口參將沈力學又請將此項房地租稅照舊催收以資公用具詳前署督臣楊鯤隨行口北道宣化府妥議去後至今未據查覆臣現在嚴催俟覆到核實具奏外謹先奏聞至於韓劻從前犯案重疊俱䝉皇恩寬免發往安西當兵效力今查此事亦無寃抑相應一併奏明所有奉到硃批奏摺一扣合先恭繳謹奏覽奏已悉昨張璨到京僃奏卿不惜心力辦事精神甚覺勉强暫時尚可支持若為日長久病軀恐不能堪等語朕聞之深為軫念卿自履任以來辦理諸務公勤不懈一切奏對咸出於誠敬兼且明悉無遺朕甚嘉之當節省無益之勞於瑣細案件何必過費精神百凡惟總持大綱其餘委之兩司各屬貟以責其成無庸一一躬親料理也朕因一時不能得人故委卿於此劇任大約明春二三月間史貽直可到意欲命來代卿今特遣冀棟至保診視調治商酌藥餌其加意攝養痊愈以慰厪念卿暨兩司皆到任未久新歲朝賀不必來京特諭雍正七年十月十五日署理直𨽻總督左都御史臣唐執玉謹奏為奏聞事夲年十月初六日臣齎摺千總捧到硃批諭㫖初九日宗人府府丞臣冀棟奉旨到保宣傳上諭并欽賜人參二斤臣望闕叩頭祗領訖伏念皇上高厚之恩逾於父母銘心鏤骨感激之切難以名言臣今仰體聖懷現在調養俟冀棟回京之日另行繕摺恭謝天恩外合先奏聞謹奏覽卿奏謝知道了遵㫖加意調攝可也同日又奏為恭報瑞雪及時事竊直屬地方雨𤾉時若禾稼豐收今二麥在地正賴冬雪及時來春土膏滋息得以茂實兹保定郡城於十月十一日自亥時起至十二日寅時止天降瑞雪隨落隨消據清苑縣查報入地一二寸不等其各屬得雪分寸俟報到另行彚奏外所有保定郡城現得瑞雪緣由臣謹具摺先行奏聞謹奏都中得雪盈尺乃保郡雪消入地止一二寸何咫尺之間如是逈異耶實出朕之意外雍正七年十一月初四日署理直隸總督左都御史臣唐執玉謹奏為請㫖事竊照直屬各營馬步兵丁春季糧餉若俟各屬徴解到日支放必得二三月間兵丁難以久待是以歷來督臣奏懇皇仁借動司庫存貯銀兩於上年冬底預行支給俟部撥之後徴解到日即行清扣還項由來已久今據布政使王謨呈請將直屬各提鎮協營㕔并各駐防應需雍正庚戌年春季餉銀二十五萬六千九百四十兩零循例在於司庫現存雍正七年地糧銀內照數先行撥解各司餉之道府州衙門按名散給以資兵食等因前來理合具摺奏請皇上天恩循照往例將庫貯銀兩預行借給俟部撥徴解到日扣還歸款於兵丁實為有濟臣未敢擅便伏乞皇上睿鑒施行謹奏此項兵餉自應循照舊例預行借給所奏知道了雍正七年十一月初九日署理直隸總督左都御史臣唐執玉謹奏為再陳下悃恭謝天恩事夲年十月初十日宗人府府丞冀棟來至保陽宣傳諭旨命臣凡事總理大綱愛養精力并賜人參二斤天語周詳聖恩稠疊臣恭膺曠典感激涕零隨經冀棟診脈立方専用溫補之劑迄今一月精神較勝從前步履亦覺輕便自此有生之年皆出皇上恩賜倘臣不即填溝壑誓當勉竭駑駘以繼臣未盡之志而已為此謹奏覽卿奏謝知道了仰遵前旨愛養精神加意調攝量力辦事嗣後有仍須冀棟斟酌方藥處即行奏聞保郡密邇可再命伊前往也雍正七年十二月初八日署理直隸總督左都御史臣唐執玉謹奏為懇賜陛見以逹愚忱事夲年十月初六日奉硃旨臣暨兩司皆到任未久新歲朝賀不必來京欽此臣理應恪遵但臣賦性迂愚到任半載一切事務雖未能詳悉周知而於地方情形目覩耳聞亦巳略見一二其中僃細有摺奏所不能盡筆墨所不能宣者兹當封印之後案牘清閒容臣扶掖入都僃陳一切庶得親承指示有所遵循或於地方稍有裨益再查按察司姜穎新請訓未久無庸復請陛見至布政司王謨到任將及一載併乞俞允隨臣進見以遂其嚮往之誠臣不勝激切待命之至為此繕摺請㫖謹奏既有面奏之事歲內且不必來新正十二日朕恭行祈穀大典之後約於十二三日至圎明園駐蹕卿於初十日自保起程十三日可抵御園候㫖進見王謨不必俱來都察院左都御史臣三泰謹奏為據禀奏聞事竊臣族弟明亮䝉皇上天恩於雍正六年四月內特放熱河理事同知又於夲年十一月內奉㫖調任永平府理事同知今據明亮將熱河稅務一事具稟前來看其字內為國課起見合將原稟一竝恭呈御覽謹奏此事可密查確實詳議奏聞前據楊鯤奏請將陳肇奎調補熱河同知朕心疑之著將陳肇奎在彼居官優劣如何之處亦一併察明具奏以聞同日又奏為遵旨查議事竊臣奉皇上發到左都御史三泰奏摺一扣并永平府同知明亮原稟一件奉有硃批諭旨臣查明亮所稱熱河稅銀若果儘收儘解實可收銀五六千兩等語又稱若將榜什營三岔口等處一併徴收則商販貨物無從走漏竟可與張家口所收二萬兩之數不相上下等語臣隨遣人出口僃細稽查此項稅銀原無一定之額如遇豐稔之年口外糧食絡繹進口則同知陳肇奎所報四千五百兩之外實有盈餘若遇歉收之年則貨物希少正額尚恐不足故止以四千五百兩為折中定額是明亮所稱儘收儘解實可收銀五六千兩之語止據豐收之歲而言雖未可定為章程其言亦非盡屬虛妄至所稱榜什營即巴克什營也離古北口外七里為熱河喀喇河屯之總路又東北十八里為三岔口為鞍匠屯紅旗營十八里汰一百家䝉古驛站之總路係行人往來出入之區非商賈貿易之地竝無貨物可以抽收且巴克什營離熱河一百八十餘里熱河既已收其落地稅而巴克什營又抽其過路鈔銀則一百八十里之內抽稅兩重恐商賈裹足不前或致正稅缺額是明亮所稱榜什營三岔口一併徴收可與張家口二萬兩之數不相上下之語殊難憑信至明亮所稱牙行陳金玉者原係先在熱河私侵客稅之陳國瑞改名陳金玉充認牙行舞弊作姦為同知陳肇奎斥革遂與先經革退之牙行許登科等赴部具呈每嵗願認額徴銀三千三百兩今陳肇奎所報巳至四千五百兩與陳金玉所認之數多寡已屬懸殊又眀亮所報伊任內半年盈餘共報出銀九百五十餘兩通年計算亦止一千九百餘兩今陳肇奎所報較之明亮所報又屬浮多揆此情形恐係陳金玉等被逐不甘希圗報復故為張大之詞以遂其姦狡之計即明亮亦墮其術中而不知也但熱河地方旗民雜處陳肇奎身係閩人於䝉古語清字文茫然不解人地實不相宜再查陳肇奎現在居官雖無貪劣確據但其居心頗缺誠實臣久巳疑之據臣愚見熱河稅務似應仍照四千五百兩之數徴收將陳肇奎調歸內地就近試用遴選滿洲誠實人員責令儘收儘解俟一二年內權其所收之多寡以為定額倘日後所收溢於四千五百兩之外即在陳肇奎名下照數追賠庶人地相宜於國課亦有裨益矣為此謹奏於此一事陳肇奎明亮等二人朕皆不能無疑另委滿員試驗甚為得當候朕斟酌一優者再降諭旨雍正八年正月二十五日署理直隸總督左都御史臣唐執玉謹奏為奏聞事竊臣查永平府屬遷安縣知縣王孔彰詳報教諭賀耀祖與訓導張世寧之子竝伊親陳姓顧姓肆行賭博又據教諭賀耀祖等訐報知縣王孔彰受賄縱令劉思毅私開燒鍋并短發工食違例受呈與坐轎經過文廟等款據永平府及布按二司詳揭到臣經臣題參奉旨這所參賀耀祖著革職張世寧著解任其互訐各款情由及夲內有名犯證該督一併質審定擬具奏王孔彰不必革職亦不必解任如有質對之處令其質對該部知道欽此欽遵飭審去後今審明賀耀祖賭博是實按律擬罪其王孔彰違例受呈坐轎經過文廟二款審無其事但王孔彰縱開燒鍋受賄銀二百餘兩巳自行承認至短發工食祭祀等銀約四十餘兩亦各役供詞有據臣查遷安縣知縣王孔彰於燒鍋案內受賄又扣尅工食等銀婪贓不法既經審有實據似應將王孔彰題參革職究擬理合先行具摺奏聞謹奏王孔彰革職究擬理所當然何待言耶前旨不令解任者或恐教官有挾怨詆誣情弊耳今既審有實據朕亦何所顧惜而欲縱此貪吏殊屬多此一奏向後但須秉公執法而為之類此等事朕便諭令姑容猶當力爭豈特不必預為奏請朕以汝為深知朕意之人今即此觀之則汝竟未能領悉朕意也同日又奏為續報得雪事竊查上年十月十一月所得瑞雪地方經臣具摺奏聞今復據各屬續報前來除得雪一二寸者不敢繁敘外查昌平州及順義懷柔二縣於上年十二月二十六七八等日各得雪四寸延慶衛得雪八寸通州得雪一尺餘寸再大城東安二縣於雍正八年正月十六日各得雪六寸霸州於正月十六至十七日得雪一尺餘寸文安永清二縣竝延慶衛各得雪四寸固安縣得雪八寸清苑縣得雪一尺餘寸安州得雪五寸安肅縣雄縣得雪六寸唐縣得雪三寸祁州得雪四寸蠡縣得雪八寸深澤縣得雪九寸滿城定興完縣慶都四縣各得雪六寸易州高陽博野三州縣各得雪五寸新城新安容城三縣各得雪八寸河間故城二縣各得雪五寸正定元氏二縣各得雪七寸井陘獲鹿二縣各得雪一尺欒城行唐平山三縣各得雪四寸贊皇武邑衡水三縣各得雪五寸南宫縣得雪三寸棗强新河隆平柏鄉高邑臨城寧晉七縣各得雪五寸武强縣得雪八寸饒陽安平無極三縣各得雪五寸藁城縣得雪六寸曲陽新樂二縣各得雪五寸巨鹿縣得雪四寸唐山縣得雪三寸延慶州得雪三寸所有各屬續報得雪緣由臣謹具摺恭奏以慰聖懷謹奏畿輔州縣得雪優渥朕以手加額覽焉雍正八年三月十七日署理直隸總督左都御史臣唐執玉謹奏為請旨事竊查密雲城外白河夏秋之交山水暴漲直逼城西是以沿河一帶舊築石子大堤以護城身復築土堤沙堤木壩以護石堤惟是河流迅急土木堤壩不能捍禦近年以來衝刷殆盡所存僅有石堤一道倘石堤再或被衝合邑人民難免水患先據密雲縣知縣吳璪詳請興修復據調任霸昌道張慶曽以築壩塞流未能一勞永逸議請於河身之西自李家莊至師家莊另開新河一道由北口直趨南口水勢得泄可無泛溢之虞其言似屬近理經臣於夲年正月十四日靣奏欽奉諭旨以築壩挑河不可偏廢令臣委員查勘詳悉奏聞臣隨委現任霸昌道李如梓等詳勘去後據稱李家莊至師家莊八百餘丈地勢高出河身三丈有餘若開挖新河大費人力更須多築堤壩堵塞舊河東口方可引順流之水歸入新河否則仍然旁溢而應築堤壩之處又直當正衝堤壩難於築立徒糜重費無濟於事即舊設之沙堤土堤木壩俱橫攩急湍山水奔騰直下與壩相激縱使多費物力旋築旋衝究無裨益詳察河形上有土嘴以逆水性下有堤壩以遏水勢是以泛溢瀰漫驟難泄㵼議請挑去土嘴寬讓河身使水暢流直趨南下併請貼近河身另築堅厚土堤一道以幫石堤堤根用榆囤載石以固其基務使石堤完好則城垣鞏固舊日被衝之堤壩俱無庸更議修築以省糜費據估挑挖堤嘴築立幫堤共需工料銀四千四百四十兩零臣隨將先後各議再四審度李如梓等所議順水之性事易成功合之疏瀹之法似屬允宜謹將送到圗形恭呈御覽如或可行應請於司庫所貯雍正三年耗羡銀內動用給發擇日興工為此繕摺請旨謹奏覽所議甚屬妥協作速興工務令於夏月發水以前告竣照例咨明該部存案可也同日又奏為請旨事竊查密雲城工自康熙五十五年興修之後迄今十有五年城垣漸次坍塌歷據該縣正署各員詳請修築前任督臣駁查核減未經奏聞臣署事後復據布政司申報請修臣隨飭委道府等員查勘確估去後兹據造冊詳報前來臣親加核減通計坍塌城墻陂岸海漫土牛夾道等項共一千四百二十六丈零共需人工物料銀九千九百六十六兩零據稱實係必需委無浮冒應請於雍正三年耗羡項內照數動撥給發修理臣再令加意節省如有餘剩解還歸款除工料細數統候奏報完工另行核實造冊送部外所有動帑修理城工緣由理合具奏請旨再查雍正七年八月二十四日奉旨嗣後修理城工俱交與該督撫布按每人各管一處若止一二處者則令挨管欽此欽遵今密雲城工應臣保固合併奏聞謹奏一應物料等項并興工日期應咨明該部者咨部存案雍正八年三月二十六日署理直隸總督左都御史臣唐執玉謹奏為恭報得雨事竊臣查今嵗春間積雪之餘繼以雨澤麥苗茁長欣欣向榮二月二十五三月初五初八等日各州縣所報得雨分寸自一二分至五六分不等臣擬俟各屬到齊彚行奏報乃自夲月初八日大名府屬得雨之後經今半月各州縣竝無報到又兼二十一二等日大風迅發風高土燥於田稼頗不相宜臣目擊情形不勝憂懼隨於二十四日禁止屠沽率同文武各員設壇祈禱二十五日隂雲布濩時雨沾濡據清苑縣報稱四鄉得雨自二分至五分不等雖未據報霑足而土膏潤澤田禾滋長民心頗安臣現在仍率司道各官虔誠祈禱俟各屬報到再行具奏先此奏聞謹奏昨據清查地畝官員回京奏稱在完縣地方經遇兩三次透雨何摺內竝未言及似此汝於地方諸事總未之知也諺云百里不同風從未有通省風雨如一之理乃不逐處留心察訪但欲保定雨暘應時而置他州縣於不問是何理耶正因汝以目前區區私心從事祈禱所以四境頗皆霑足而獨保郡僅得五分雨澤今後若不恪秉忠誠之念以感格天地神祇徒恃禁屠設壇虛文希冀嘉澤下降則大誤矣雍正八年四月初一日署理直隸總督左都御史臣唐執玉謹奏為據實陳奏懇賜處分以懲溺職事竊臣於恭報雨澤一案自知辦理錯謬未奉諭旨之先臣寢食不寧已數日矣查從前各屬報雨臣智識短淺以為尚非望雨之時怠忽因循未經奏報及至半月無雨難以奏聞又不將從前遺漏緣由檢舉補奏乃復循襲具文設壇祈禱愈辦愈錯怠忽如此溺職之罪實難自解除將三月二十五日以前未經奏聞及三月二十五日以後現應奏報者分繕清摺恭呈御覽外伏乞忽因循有玷厥職則叨沐天恩無既矣臣不勝慚愧悚惶之至謹奏覽署任總兵蔡永文居官何如詳加訪察據實具奏以聞雍正八年四月十五日署理直隸總督左都御史臣唐執玉謹奏為續報雨澤事竊臣查四月初二日以前各屬報到所得雨澤經臣具摺奏報今據各屬續報前來除得雨一二寸者不敢繁敘外大城縣四月初八日得雨三寸昌黎縣四月初四日得雨三寸唐縣四月初八日得雨四寸河間阜城東光三縣各得雨三寸寧津縣得雨四寸吳橋縣得雨五寸天津州大雨四野霑足靜海縣滄州各得雨三寸慶雲縣三月二十五日得雨三寸鹽山縣得雨三寸平山縣四月初八日得雨三寸井陘縣得雨五寸棗强縣得雨六寸衡水縣得雨四寸武邑縣得雨三寸深州得雨三寸新樂縣得雨三寸清河縣得雨四寸威縣得雨三寸大名元城二縣三月三十日各得雨四寸四月初四日各得雨三寸清豐縣魏縣各得雨三寸東明縣得雨五寸南樂縣得雨四寸開州得雨五寸蔚縣三月二十五日得雨三寸懷安縣四月初一日得雨三寸俱稱霑足查各屬得雨月日不同而報到亦有遲速是以參錯不齊除俟各屬再有報到另奏外所有現在得雨緣由臣謹具摺奏聞謹奏據奏得雨分寸尚未霑足仍當竭誠䖍禱可也但諸如此奏切勿聼信有司揑報以多為少致開迎合之門而貽掩耳盜鈴之誚虛僞二字朕甚不取戒之雍正八年四月二十日署理直隸總督左都御史臣唐執玉謹奏為奏明耗羡銀兩事竊查直隸雍正三四五六等年耗羡自雍正六年開徴起至年底所有已未完及動存各數經前署督臣楊鯤於雍正七年四月內按年分晰開具清冊奏明在案所有雍正七年正月起至年底收除過三四五六等年并七年耗羡已未完動存各數復行據布政使王謨查明造冊呈送前來臣復加確核除將各冊另行送部存案外所有逐年耗羡巳未完動存各數理合繕具黃冊恭呈御覽伏乞皇上睿鑒施行謹奏章奏中凡遇此等事件朕止一過目而已從不更加察核總在汝等秉公辦理不致後來人檢點為是其中設有出入不當存私朦混處曽奏過三字亦豈能免咎況經報部存案之事絲毫皆按款可稽也所奏知道了雍正八年十二月十六日兵部尚書暫署直隸總督印務臣唐執玉謹奏為微臣戀主情殷恭請陛見以聆聖訓事竊臣於夲年正月十四日入覲天顔荷䝉聖諭周詳諄切訓誨使臣知所遵循感激之私銘諸肺腑但臣才識疏庸雖竭盡駑駘而於地方事務終愧未能妥協深恐措置失宜有負皇上委任至意今計封印之後案牘簡少伏懇天恩容臣率同布政使王謨按察使姜穎新恭請聖安親聆指示勉力奉行使得免於隕越庶於地方有益而臣犬馬依戀之𠂻亦少慰矣臣不勝激切待命之至謹奏仍照依去歲諭旨於新正起程來京可也雍正九年三月初十日兵部尚書暫署直隸總督印務臣唐執玉謹奏為恭報雨澤事竊照直屬上年冬底得雪深廣在在土膏滋潤雖不十分需雨然時當季春麥苗得雨發生更盛豐稔可必今據順天府屬之涿州申報三月初六日得雨六寸保定府屬之清苑安肅定興容城高陽新安六縣申報是日各得雨三寸淶水慶都易州三州縣各得雨四寸滿城縣得雨五寸咸稱四野均霑農民歡悅等因前來除各屬所得雨澤一二寸者甚多俱不敢繁敘并俟報到再行奏報外所有直屬得雨緣由臣謹先行奏聞謹奏春雨滋苗最為難得覽奏曷勝欣悅雍正九年四月初十日兵部尚書暫署直隸總督印務臣唐執玉謹奏為據實陳奏事竊直屬河間大名等府上年偶被水災荷䝉皇上特遣廷臣分路賑濟發帑發粟蠲免停徴冬春之間復准平糶倉糧出借社穀拯恤洪恩逾於常格直屬生民早已安居樂業更無乏食之虞矣惟大名府屬之開州東眀長垣三州縣上年雨水過多而長垣一邑西接蘭陽東連曹縣被災尤甚臣深切隱憂入春以來經臣絡繹稽查前後捐穀一千五百餘石捐銀七百兩飭令地方官設法賑濟以待麥收現在青苗倍茂豐稔可期雖多就賑之民而民情尚覺安堵今䝉聖德如天有加無已復命臣與副都統臣趙𢎞濟㑹商加賑兹已欽遵諭旨委員分路稽查其被水尤多應行加賑者飭令核實賑濟外至開州東明長垣三處亦已多委幹員跟隨趙𢎞濟前往親查酌量加賑務使民沾實惠延至二麥登場以仰副皇上愛育元元之至意先此具摺奏聞謹奏地方上類斯民間疾苦猶煩朕之厪念汝等寧不愧赧耶同日又奏為恭報雨澤事竊照直屬各得雨澤分寸經臣具摺奏聞今復據各屬續報得雨前來查長垣東眀二縣三月初八日得雨三寸涿州四月初五至初六日得雨五寸永清縣得雨三四寸不等密雲順義房山完縣滿城淶水六縣四月初五日各得雨三寸唐縣得雨五寸俱各霑足餘俟再有報到另行奏報外所有現據申報得雨緣由臣謹繕摺奏聞再查順天府屬之良鄉固安永平府屬之盧龍遷安撫寧豐潤保定府屬之易州清苑慶都安肅定興容城河間府屬之河間獻縣正定府屬之正定井陘贊皇獲鹿順德府屬之邢臺廣宗唐山沙河巨鹿內邱南和平鄉任縣廣平府屬之永年曲周邯鄲清河威縣成安雞澤大名府屬之開州元城南樂直隸趙州併所屬之柏鄉高邑臨城寧晉隆平直隸深州併所屬之饒陽直隸定州併所屬之曲陽新樂等四十八州縣據陸續申報於三月初八初十二十二十一二十三及四月初一初五六等日各得雨一二寸不等因未及分寸不敢逐一繁敘合併陳眀為此謹奏畿內前此得雨俱未霑足近日以來頗覺氣候調和或可普被天澤也雍正九年五月初十日兵部尚書暫署直隸總督印務臣唐執玉布政使臣王謨謹奏為欽奉上諭事竊臣等欽遵諭旨會同副都統臣趙𢎞濟料理加賑一案隨將上年散賑冊檔逐一查核并委雄縣知縣謝應魁等跟隨趙𢎞濟前赴長垣東眀開州三處查看料理其餘如大城景州交河吳橋沙河南河任縣永年邯鄲雞澤衡水武邑青縣滄州東光等處亦係上年被水稍重之區亦經遴委賢員㑹同各地方官確查一體加賑去後兹據各委員及該地方官查眀現在平糶倉穀市價巳平有地之家固可待至麥收無地之人亦得營工糊口且有借給社穀資其耕作竝無失業乏食之人逐一出具印結申覆無庸加賑外其開州東眀長垣三州縣臣等仰體皇仁酌量加賑二十日仍照上年大口日給穀一升四合小口日給穀八合開州共賑過窮民大小口八千二百口東眀縣共賑過窮民大小口二千九百三十口長垣縣共賑過窮民大小口一千八百五十三口其長垣縣原未被水而現在粥厰領賑貧民又賑過大小口二萬八千六十四口各州縣窮民歡聲載道於賑務告竣之日俱執香羅拜嵩呼萬嵗叩謝天恩所有已未加賑緣由理合奏聞謹奏萬姓感戴朕恩且置勿論其如怨汝何雍正九年五月二十二日兵部尚書暫署直隸總督印務臣唐執玉謹奏為恭報二麥實在收成分數事竊照直隸二麥收成分數經臣確查去後據各道府州陸續呈報到臣查順天府屬實有十分九分并八分七分不等永平保定二府屬俱十分九分并八分不等河間府屬九分天津府屬九分八分并七分不等正定府屬十分九分并八分不等冀州屬十分九分并八分七分不等趙州屬十分九分并八分不等深州屬十分晉州屬九分八分不等定州屬十分并八分七分不等順德府屬九分八分并七分六分不等廣平府屬十分九分并八分七分六分不等大名府屬十分九分八分并七分不等咸稱二麥收成豐稔物阜民安等情前來臣謹恭摺奏聞再查順德府屬之邢臺內邱二縣於五月初三四等日有五廓霍樓等七村莊偶值冰雹經委員確勘除內邱縣之五廓等四村莊業據查眀麥巳登場損傷甚少例不成災其邢臺縣之霍樓等三村莊俟勘眀實在情形另報外合併陳眀謹奏聞昌平一帶地方近日望雨甚殷且通省雨澤均屬未足當竭誠自返省察吏治可也同日又奏為據實陳奏事竊臣前因天津新設府治規模初定事務紛繁宣化府知府馬益新承訓旨似欲勉圖報效而北路軍需俱係口北道王棠張家口同知白石辦理知府一官或可通融調補故臣冒昧奏請而宣化一缺緊要甚於天津未曽計及臣之愚昧咎實難辭今詳加揀選廣平府知府李梅賓刻苦自勵不辭勞瘁不尚虛名計典中經臣附薦荷䝉俞允准其卓異在案如以升銜調補天津知府人地似屬相宜再天津縣一缺亦係緊要前以試用人貟萬申祺擬補近見該員設心狡詐即長垣煮賑一事不惟不行捐助且於公捐項下尚有侵漁臣現在飭查未便復行擬補清河縣知縣徐而發屢經委署於地方事務俱能盡心料理以之調補天津縣缺自能勝任再蘆溝橋西路同知一缺臣以雄縣知縣謝應魁擬補河間府河捕同知一缺臣以定州知州王大年擬補前准部咨俱以不合例駁飭令臣另行揀選臣查通屬一百四十州縣合例者止一二人其餘簡僻小縣僅能供職俱非可調之員臣實出於萬不得已敢祈皇上俯念用人之難破格録用或另行敕部揀選補授臣因地方起見斷不敢稍有私心固執已見貽誤將來伏望聖眀垂察為此謹奏類斯違例保題只宜偶一行之豈可為常除此不合例者再無可調之人是何言歟所擬數員果皆超卓之才乎恐亦未必然若實有萬不得已處據情再行題請併將人員送部引見候朕酌定雍正九年六月二十二日兵部尚書暫署直隸總督印務臣唐執玉謹奏為續報雨澤事竊查直屬州縣得雨分寸經臣前已具摺報聞今復據各屬續報得雨前來除得雨寸餘及二寸之處俱未及分寸不敢逐一繁敘外查順天府屬之涿州六月十九日得雨二三寸不等昌平州薊州六月十五日各得雨三寸梁城所六月十二日得雨三寸永平府屬之玉田縣六月十五日得雨三寸保定府屬之祁州六月二十日得雨三寸俱各霑足所有各屬申報得雨緣由合行奏報再查良鄉等州縣聞亦得有時雨臣現在飭查俟查有分寸另行摺報合併奏聞謹奏據奏雨澤分寸果係我君臣能感天和之所致耶朕已代汝深為慶幸但未知汝曽思及朕亦似汝之厚顔否硃批諭㫖卷一百四十五
