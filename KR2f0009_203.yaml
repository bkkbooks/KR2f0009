body:
  text: 欽定四庫全書硃批諭旨卷二百三上硃批查郎阿奏摺雍正七年六月初四日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為奏聞事竊查陜省西安等屬四五兩月得雨日期分寸前經督臣嶽鍾琪撫臣武格繕摺具奏今豆麥俱已登場秋田及時播種需雨正殷之時仰荷皇上洪仁博濟上應天心於六月初一日已時起至初二日卯時止又於初二日申時起至初三日辰時止西安府地方甘霖連霈入土至一尺有餘現在濃雲四布雨意尚存而臣等細看雨勢得雨地方亦廣詢諸農民僉云秋禾正在發生得此時雨自必益加暢茂況入土既深地脈滋潤霑足將來秋成大有可以預卜此誠聖主仁心感格是以慶叶豐盈臣等謹將陜屬西安得雨日期分寸情形繕摺奏聞伏祈皇上睿鑒謹奏雨水情形欣悅覽之然必待秋成後方敢釋此懷抱也雍正七年六月二十九日吏部尚書署陜西總督臣查郎阿謹奏為玩忽之習未除請旨嚴飭以靖地方以安民生事竊臣恭荷聖恩畀署川陜總督印務雖才識庸愚見聞未諳而於地方事務惟有加意慎重以期上報洪仁今臣任事甫及一月凡各屬呈報事件臣留心檢核如四川一省內人命姦盜等案具報纍纍其或揑冒職官或稱奉差員役以及越禮非分之案不止一端推原其故惟因五方雜處其中姦良混聚致有不法之徒勾引藐法然若使保甲之稽查既嚴營汛之巡察不懈雖有姦民豈能縱逞此皆由文武各官漫無覺察鄉保汛兵悠忽偷安所致臣當即嚴飭該管文武各官將保甲汛防事宜加意整飭復刊刻告示遍發陜甘川三屬通行曉諭查禁外但川陜相距既遙甘屬地方亦廣文武屬員內奉職惟謹者固不乏人怠惰自曠者亦所必有臣雖密訪查參誠恐玩忽成習仰懇聖恩特降諭旨嚴飭各撫提諸臣務將保甲汛守之法實力經理通飭所屬各員不時稽查如再有姦徒濳住境內肆行不法將該管各官分别參究鄉保汛兵嚴加懲處庶伊等咸知凜畏而於地方民生均有裨益矣理合繕摺請旨伏祈皇上睿鑒謹奏汝膺統轄之責保甲汛防各事宜且就汝意嚴飭該屬并移咨撫提諸臣互相查禁倘仍奉行不力據實奏聞再降諭旨同日又奏為奏明咨商情節仰請聖鑒事竊查四川建昌涼山土司安承裔梗頑不法前經撫臣憲德題參究審嗣將安承裔審明抗玩情實擬以併將家屬遷徙江西地方安插部覆奉旨允準欽遵在案今準撫臣憲德咨稱安承裔之父生子五人四子俱已早歿無子安承裔排行第五襲受土職將其所生二子均繼與伊長嫂沈氏次嫂大米氏為子無庸遣發其所遺土司事務議照河西土婦嶺氏令伊子安祥茂管事之例即以安承裔之長嫂沈氏次嫂大米氏分管土務等情咨商前來臣查涼山土族番民改土歸流事宜經督臣嶽鍾琪議以附近州縣衛所者歸地方官管轄近營汛者令營汛管轄止於土民番人內擇其誠謹之人照內地之例充任鄉約保長稽查保甲經催糧賦之類並未將不法土司之家屬復令其管理土務也再查部覆督臣嶽鍾琪條奏內開河西土婦嶺氏並無親支應遷入內地酌量安插給與房地存養自應照議料理因何忽有安祥茂稱為嶺氐之子又復委管土務且僃查舊卷並無詳報之案至安承裔於官兵進𠞰涼山之時抗不發夫故違糧運今擬以遷往安插已屬寬典其所遺土民亟應改土歸流就近分隸管轄方於原議相符況沈氏大米氏繼嗣之子皆屬安承裔之遺孽更不便仍令分理土務致啓滋蔓之漸至於涼山土族番民既已改土歸流奉有諭旨分設郡縣增設營汛現今授職有人募兵充伍一切番土人民俱在版圖之內尚何漢土之攸分復令土婦承領其事臣因撫臣憲德咨商情節均未合宜隨即咨令另為確查妥議俟至日再行具奏外所有前項緣由理合繕摺奏明伏祈皇上睿鑒謹奏所見甚是涼山土司事務分管之議憲德殊屬錯謬之極當密札斥責之同日又奏為奏聞事竊查雍正七年二月二十五六等日督臣嶽鍾琪節準署湖廣提臣嶽超龍湖南撫臣王國棟密咨移稱據辰沅靖道王柔盤獲匪棍許英賢等供稱係張天師之叔張易珍令伊等四處捨藥誘惑哄騙併將同伴姓名以及行走省分串遊土司地方逐一供明其原供內稱張子明現在四川敘州府劉惟和帶著兩箇徒弟亦在四川何子雲劉公俊李天華前往陜西等語粘單移會密拏經督臣嶽鍾琪據咨密飭陜甘川三省地方官嚴查訪拏在案今於六月二十七日臣準四川提臣黃廷桂咨稱據威茂營參將吳進寶報稱據所屬神溪汛兵王建盤獲捨藥遊棍四人解訊當即詰問據伊等供稱一名江子文一名熊旌儒一名塗以寅一名塗為安俱係江西南康府建昌縣人因天師母病差伊等往各處施藥等語隨將各犯所帶行李檢查內有印牌一紙係天師銜姓此外止有藥料衣服併些少銀錢不等當即轉飭將江子文等四犯解交地方官員訊審併將原獲印牌移交撫臣各等因咨報前來臣隨將所獲四犯姓名與楚省原咨查對雖不相合但查辰沅靖道王柔原獲之許英賢等既已供稱託名捨藥今川省盤獲之江子文等又以施藥為事且復執有印牌則前後供情如合一契而從前所供之遊走不法情節似非無因必須嚴訊確情庶姦徒不致漏網臣即飛飭四川按察司詳細研審務得實情併令詳明撫臣憲德移咨江西撫臣嚴查有無給牌施藥情節咨覆定擬臣復密飭所屬不時稽查外所有川省盤獲匪棍情由理合繕摺奏聞伏祈睿鑒謹奏此事已據本省徹底審明悉屬子虛不須更加嚴訊但天師張慶麟因母患病而分遣無藉棍徒各省施藥是何道耶殊屬無知可笑之舉雍正七年七月十五日吏部尚書署陜西總督臣查郎阿謹奏為據實密奏恭請聖鑒事竊查現任蒲城縣知縣朱間聖才守可觀辦事勤敏緣同州知州任晟揀補鳳翔府知府送部引見所遺印務經督臣嶽鍾琪檄委朱間聖署理今任晟已經奉旨準補鳳翔府知府回陜赴任其原管倉庫一切事務例應交代當經任晟分案造册移交而朱間聖亦即接受盤查以便核報因查任晟交代册內有歷年捐貯火藥鉛子在州署儀門外另房三間加緊封貯朱間聖因事關交代雖火藥不便細盤而鉛子自應稱驗因於六月十一日率領家人吏役將鉛子盤出空地稱至四千餘斤時已晌午朱間聖回署喫飯令家人吏役在彼照看不意突見火起奔救無及在場之家人吏役俱已燒斃起火緣由莫可救詰其未經盤出鉛子三千斤封貯火藥二萬餘斤房屋三間焚燬無存現據朱間聖願甘賠補併據布政司張廷棟等揭報前來臣查燒燬火藥例有處分是以照例題參在案伏查朱間聖才具優長尚堪任使仰思聖主愛惜人才至殷且切前奉皇上特恩非臣所敢擅請理合繕摺密奏伏祈睿鑒謹奏覽雍正七年八月十二日吏部尚書署陜西總督臣查郎阿謹奏為恭謝天恩事雍正七年閏七月初十日奉到欽賜臣鮮荔枝一瓶當即望闕叩頭謝恩祗領訖竊念臣駑駘下質樗櫟庸材蒙我皇上豢養栽培至深且渥愧臣虛糜廩祿未效寸長今又荷聖恩遠注頒賜鮮品銜感之下浹髓淪肌臣惟有勉勵犬馬之丹忱上報洪仁之高厚而已理合繕摺恭謝天恩伏祈皇上睿鑒謹奏言感言報皆屬末議地方休戚民生安危所關甚要將已身利害置於度外百凡順情循理勇敢為之方不有負朕之倚任也勉之同日又奏為奏聞事雍正七年閏七月三十日準撫臣憲德咨準欽差管理噶達廟工趙殿最等咨稱據孔薩頭人羅頂稟稱今有瞻對番人領兵將我地方搶了一半又將我們圍困望大人們將我信子上的話説與化林協等處發兵前來救我等語查我等並無管轄地方責任且不能知其情形始末但既據具稟前來除一面飛差明正土司保保前往勸止外理合咨明等情轉咨到臣臣查瞻對番人甫經投順因何又復逞凶劫掠孔薩其是否係瞻對番族何故起釁緣由臣飛飭駐劄裏塘重慶鎮臣任國榮署化林協副將許連科就近確查勸諭解釋併將為首不法之人查拏究處復咨會撫提二臣轉飭撫緝去後又準提臣黃廷桂咨同前由併聲明已移行鎮臣任國榮等確查安撫等情與臣所飭辦理情節俱屬相同今又據提臣咨據署化林協副將許連科呈據孔薩頭人羅頂稟稱有呷呷並呷呷的兒子又有賈呷七立賈各扎什平白羅桑結六箇人從前説我羅頂不好要害他們都跟著喇嘛往藏裏去了後有欽差周等進藏到甘咨的時節我曾稟過蒙欽差到了藏裏就吩咐喇嘛將他們打發回來不想呷呷等投往瞻對領了他們的三十多人躲在甘咨寺裏引的兵來占了我的地方我的人少與他打不過仗求呌章谷竹窩麻子三家的人來幫我才好再喇嘛昂旺是我的兄弟他坐寺院只管得喇嘛别的事他如何管得那呷呷等六人不是好人他説的話求吩咐喇嘛不要聽他等語查羅頂所稟情詞兩相互異除復行確查外合再咨明等情臣查孔薩頭人羅頂稟報情事雖兩不相符而察其原委皆由本族番人積有夙嫌勾引瞻對不法之人以圖報復即據羅頂所稱喇嘛昂旺係伊手足今繹其詞意不無彼此參商因而呷呷等藉此滋事臣思邊防以寧謐為重不便聽其自相凌並轉生事端隨復移行提臣黃廷桂等查明化誨各安住牧外理合奏明伏祈皇上睿鑒謹奏邊防固以寧謐為重然亦豈可養姦遺患要當查明原委示以勸懲毋致滋蔓難除也同日又奏為據報奏聞事竊臣於雍正七年二月內自西藏回至裏塘適遇管理軍糧之郫縣知縣羅國珠口稱昨因進勦瞻對官兵所需口糧運送接濟行至擦馬所地方被賊番劫奪傷及土兵今軍糧關係緊要若不派兵護運恐致遲誤臣隨選撥陜省健兵五百名將糧石鉛藥押送高奮志軍營當經奏明在案及臣署理督篆之後據郫縣知縣羅國珠報稱二月內被劫軍糧一案細加挨查據擦馬所頭人澤隆奔蔥等回稱劫糧賊番係瞻對夾壩他們將劫的糧石烏拉沿途拋棄如今我們檢得炒麵七十四石烏拉牛五十一隻等情今又據駐劄裏塘重慶鎮臣任國榮報稱據裏塘土官昻邦稟稱擦馬所原係瞻對番族改歸裏塘管轄素性本非馴良今土官傳喚頭人查詢乃伊等抗不出見又將原收炒麵牛隻私自食用止交出炒麵五十五石牛三十六隻及差人詰詢竟至出言無狀且訪知劫糧賊番即係擦馬所番人等語隨令遊擊常力行即於燭燈納駐防地方就近差員調喚擦馬所頭人澤隆奔蔥等查詢情節詎竟糾集番衆堆放木石負嵎抗拒若不整兵懾服恐致長姦貽患隨派撥守僃康國泰等並裏塘營官昻邦共帶領漢土官兵二千餘名分路前進搜捕不法賊犯並頭人等審明究擬等情呈報到臣臣查賊番從僃辨先將官兵整嚴臨境宣示聖主恩威明白開導令其將劫糧為首賊番查明擒獻其所少糧石牛隻照數賠補並令頭人等至營出具不敢生事甘結斟酌綏輯料理不得惟恃兵威妄加勦殺倘果𡨕頑不服亦當相機措置毋致輕忽玩事除俟事竣之日另行具奏外理合繕摺奏聞伏祈睿鑒謹奏覽同日又奏為欽奉上諭事竊臣前因署同州知州事蒲城縣知縣朱間聖焚燬鉛藥一案繕摺具奏欽奉硃批諭旨臣跪讀之下仰見我封盤驗以致焚燬鉛藥燒斃胥役是朱間聖之急遽疏忽誠如聖諭皆由苛求所生之災今臣因朱間聖之事由此類推益加凛惕惟有恪遵上諭務期事合公平不刻不苛以仰副聖主訓迪之至意而已臣謹將原奉硃批諭旨繕摺恭繳伏祈睿鑒謹奏覽雍正七年九月初七日吏部尚書署陜西總督臣查郎阿謹奏為𠞰撫事竣據咨奏聞事竊臣前據駐劄裏塘重慶鎮臣任國榮報稱擦馬所姦番收貯軍糧炒麵烏拉牛隻任意侵蝕而頭人澤隆奔蔥又復抗調不出其所屬逆番竟敢紏衆抗拒隨派撥將僃辨員帶領漢土官兵二千餘名分路前進搜捕情由經臣繕摺奏聞今準四川撫臣憲德咨稱八月初一日準鎮臣任國榮咨據派領漢土官兵遊擊常力行呈稱職等於七月二十七日起程分兵進𠞰於閏七月初一日抵擦馬所上溝寨子賊番嘯聚碉房放鎗拒敵經我兵奮勇爭先運柴焚燒連破碉房五處殺傷賊人百十餘名陳亡兵丁二名帶傷官兵二十二員名初二初三等日仍令各兵火攻又被我兵鎗炮打死賊番一百數十人正在督兵前進有數十番人各牽牛馬俯伏道傍內一人口稱係頭人澤隆奔蔥今見官兵殺死夾壩我們喜歡故來投誠情願賠還他們搶的糧石烏拉我們照舊當差獻納戶口不敢做夾壩等語詰其從前為何抗調不出據供那夾壩們不好我若出來他們先要殺我故此不敢出來那日劫去糧石是下溝地方做夾壩的人就是禁在裏塘那兩箇為首之郎結扎什索浪結塔再偷喫糧石是蔥戎扎希陳披他兩家住在上溝今上溝碉房都被官兵燒燬逆番們已被鎗炮打死等語據此卑職隨收兵劄營繕文具報間又據守僃陳云蛟報稱閏七月初二日抵擦馬所下溝寨子賊番恃險拒敵我兵用火攻燒連破碉房數處殺死賊番無數陳亡兵丁二十二名帶傷十八名正在督兵前進於初四日辰刻有番人男婦七十餘名口跪哭道左稱係良民情願認賠糧石烏拉服裏塘管轄永不敢做夾壩等語相應收兵劄營具文請示等情呈報到職理合一並呈明等情到鎮查劫糧為首夾壩郎結扎什索浪結塔現獲裏塘業經取供梟示正法今澤隆奔蔥等既稱並未行劫願賠糧石牛隻哀訴投誠似應允其歸順住牧當差其澤隆奔蔥所賠糧四百六十四石三斗如數交明糧務官還項烏拉三百三十七隻發還原雇主收領所有𠞰撫事竣撤兵回至裏塘緣由並漢番戶口甘結各一套等因移咨前來相應轉咨等因到臣臣查鎮臣任國榮一切辦理頗合機宜除移行撫提二臣暨鎮臣任國榮就近綏輯妥協並令將陳亡帶傷漢土官兵姓名查明造册送部外所有𠞰撫擦馬所事竣緣由理合繕摺奏聞伏祈皇上睿鑒敕部施行謹奏此奏交部録存矣其應加賞恤之漢土官兵人等俟造册到日照例賜給同日又奏為遵旨具奏事雍正七年八月二十八日西安副都統臣蘇穆爾吉向臣密宣奉到硃批諭旨常色禮不妥協處朕已有訪聞轉諭查郎阿令其知之將爾此奏並朕所降諭旨亦俱密以告之昨六七兩月間西安一帶旱甚以致秋禾歉收伊為何不行奏聞欽此臣當即跪聆欽遵正與副都統臣蘇穆爾吉密商原奏情事又於九月初一日奉到硃批將軍臣常色禮奏摺欽奉諭旨查郎阿等看訖遵照批諭施行將摺交常色禮家人持付常色禮看欽此臣遵將硃批諭旨僃細跪讀仰見我皇上訓示周詳無微不至今臣欽遵諭旨與蘇穆爾吉等逐條曉諭禁飭辦理妥協另行奏情形自六月初二初九十七等日得雨之後正逢暑伏炎烈旬日未雨漸有旱意即七月十五日以前雖間有微雨亦不透足至七月十六日大雨竟日以後雨水連綿秋禾望雨尚屬及時惟西安府附城四鄉三四十里之內從前缺雨較他處稍甚至各州縣境內有得雨霑足亦有得雨未透並秋秋禾不日登場臣現在分路確查統俟收穫事竣臣將各屬收成分數據實分晰繕摺恭呈御覽所有副都統臣蘇穆爾吉向臣密宣諭旨事宜臣謹遵旨具奏伏祈皇上睿鑒謹奏覽雍正七年九月十八日吏部尚書署陜西總督臣查郎阿謹奏為欽奉上諭事竊臣前據駐劄裏塘重慶鎮臣任國榮呈報派撥漢土官兵進𠞰擦馬所賊番一案經臣繕摺具奏今奉硃批諭旨依汝如此見解遲誤機宜必不能免且使得以多結羽翼小事釀成大患俱未可定凡事不論應行與否但以未經奏明決斷是非則汝胸襟狹隘擔當怯懦不能勝任可知矣朕甚憂之欽此臣跪讀之下實切悚惶戰栗查擦馬所賊番將軍糧等項竟敢劫奪於前今復抗拒於後鎮臣任國榮派兵進𠞰誠如聖諭乘其羽翼未成速為翦滅不致遲誤機宜乃臣見識疏淺以為未經奏請不便遽行加兵則臣之不能擔當上厪聖憂臣愆實無可逭今蒙聖主洪恩訓諭周至臣益悚切中心惟有推類擴充痛自改革凡遇應行事務即斟酌辦理合宜下盡職分之所當為上報洪仁於萬一而已今擦馬所賊番仰仗天威逺播刻期報捷臣已於九月初七日具摺奏聞所有奉到硃批奏摺理合恭繳伏祈皇上睿鑒謹奏極力振作最為要務大抵一切番衆無有不畏服嶽鍾琪者今使知陜省又來一嶽總督諸凡易為彈壓耳若稍露將就省事怯懦求安形態被其窺破各處乘隙而起則汝將不勝其料理矣示以風厲何容刻緩思之勉之雍正七年十月初五日吏部尚書署陜西總督臣查郎阿謹奏為遵旨具奏事竊臣於雍正七年七月初五日準寧逺大將軍臣嶽鍾琪移送摺奏川省復設雙流等縣治一案欽奉硃批諭旨甚好交與查郎阿徐徐斟酌辦理奏聞欽此臣當即欽遵復行四川布政司等確查議報去後嗣於雍正七年八月十三日據四川署布政司呂耀曾等議詳前來臣正在遵旨確核具奏間隨於八月十七日準撫臣憲德移送會題案件到臣內有復設雙流等一十四縣會題稿一件會題簿一本又向臣致札云因入闈在即一切會題事件俱於八月初六日拜疏等語臣思地方事務凡應會題者例應移商明確書題咨送至日方行題報再查現今會題事件如係已經拜疏者即於會稿內注明日期若係未經拜疏而止移送書題者稿內年月下不注小日今撫臣憲德移送復設雙流等縣會稿內年月下並未注寫小日其是否亦在題報之內無從確知是以臣不便書題一面札詢撫臣一面將復設事宜密行咨訪今於九月二十八日又準撫臣憲德札稱復設雙流等縣一案已經拜疏等語臣查此案係督臣嶽鍾琪奏明奉旨令臣斟酌辦理之事雖撫臣自行具題臣謹遵旨確查如重慶府屬原裁歸並涪州之武隆縣歸並銅梁之安居縣夔州府屬原裁歸並梁山之大昌縣現今糧輕事簡俱能兼顧誠可無庸復設至復設之雙流縣崇寧縣彭縣彰明縣羅江縣大足縣璧山縣定遠縣新寧縣大寧縣安嶽縣彭山縣青神縣威遠縣此一十四縣應設知縣典史並裁汰驛丞改撥訓導添設教職各事宜與署布政司呂耀曾撫臣憲德原詳原題情節俱各相符惟查入學名數撫臣疏內尚未議及臣思縣治雖請分設而人文原有定額似應仍照原進額數分入兩學庶於學校不致冒濫至於出貢食廪補增併汛防辨兵數目統俟部臣將復設事宜定議請旨允準之日敕交撫臣學臣提臣分别妥議題請其建造城垣衙署倉庫學宮祠宇營房監獄並官役俸工等項應令撫臣於奉旨準咨至日將應需銀兩確估酌核題請部撥以資辦理所有川省復設雙流等一十四縣事冝併撫臣憲德徑行題報情節臣謹繕摺具奏伏祈皇上敕部彚議施行謹奏復設縣治一事前據憲德奏到已交部覆有旨內設學一節既未經議及汝等應行會疏補題至於入學名數但當詳查原案若經裁汰則宜照復如係歸併祗須將原數撥回奚庸更為定額不然與張楷分縣增額之舉何異其詳愼為之勿因欲沽一時之譽而越例妄請同日又奏為倉儲所關綦重謹陳末議恭請聖鑒事竊查陜屬西延鳯漢四府乾華同耀邠商鄜葭綏德興安等十州所屬倉貯各案糧石統計一百三十餘萬石有竒雖經漸次易榖貯倉而出陳入新亦當按年易換以免浥耗之慮今嵗陜撫臣武格蒞任之後以倉糧恐致虧空止令出糶解價秋收即可買榖還倉若仍照例出借則不肖官吏影射侵蝕易於滋弊隨經武格檄飭在案臣因思倉糧既有存七糶三存七借三之例今撫臣止議出糶不令出借似與借糶兼行之本意不相符合是以臣將陜屬地利民情以及應糶應借之處密行察訪統計可以出糶地方止在十之二而出借之區居十之八因再四思維弊端固宜剔除民食亦須酌計伏查各州縣徵解地丁支給工食有責令同城教職武員監拆監散之例今陜屬倉糧之出糶出借臣請嗣後亦倣此例令同城教職武員監糶監借則事異理同諸弊可以覺察而於國計民生均有裨益但臣知識短淺是否有當理合繕摺具奏倘蒙聖主鑒允或臣另行具題或即將臣摺敕部定議之處恭請訓旨遵行為此謹奏所奏是照此具題候朕酌奪武格執拗悻愎於斯益可槩見從前屢經訓誨陛辭時又復諄諄面諭凡事再四講求必深知灼見而後決定行止方可久逺遵循無礙不謂粗率自用仍復如故舉動若是而欲俾屬員心悅誠服豈可得乎將朕此諭令其詳閲明白回奏雍正七年十一月初四日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為恭報秋禾收成分數仰祈聖鑒事竊照陜屬今嵗秋禾俱已登場行據西安布政使張廷棟將各屬收成分數彚報前來臣等查西安延安鳯翔漢中四府直隸乾華同耀邠商鄜葭綏德興安等十州所屬各州縣秋禾收成自十分九分八分以至七分六分五分不等米糧時價西安省城粳米每斗價銀一錢三分五釐零粟米每斗六分六釐零小麥每斗五分六釐豌豆每斗四分五釐零大麥每斗三分一釐零黃豆每斗七分其餘各屬之糧價亦多相倣所有陜省四府十州所屬州縣秋禾收成細數臣等遵旨謹詳晰臚列另單恭呈御覽伏祈皇上睿鑒為此謹奏數年來陜省從未至如此薄收汝二人當極加修省檢點政刑西北地方冬雪最與來嵗禾麥有關更宜竭誠祈禱以慰民望然不能確秉公忠之念感格神明徒以利害私心從事亦難期徵應也吏部尚書署陜西總督臣查郎阿謹奏為奏聞事竊臣於前奏欽奉上諭事摺內荷蒙皇上硃批極力振作最為要務大扺一切番衆無有不畏服嶽鍾琪者今使知陜省又來一嶽總督諸凡易為彈壓耳若稍露將就省事怯懦求安形態被其窺破各處乘隙而起則汝將不勝其料理矣示以風厲何容刻緩思之勉之欽此臣跪讀之下仰見聖主訓諭誨勉至殷至切伏念川陜重地督臣嶽鍾琪仰遵聖謨指示動合機宜是以諸番畏服臣蒙聖恩畀署督篆地方大小事宜雖各有成規可以率循第節制三省巖疆責任何等重大而邊圉關係尤資彈壓今𠞰撫擦馬所賊番事竣情由臣前已另摺奏報而諸番部落衆多必使威行邊境逺近番情各知警惕莫不誠心輸服則封疆寧謐諸事易於辦理何敢稍存將就之見以滋事端臣欽承訓旨益切凛遵惟有推廣聖主德威加意奮勉振作有為以仰答洪恩於萬一而已所有原奉硃批奏摺理合恭繳伏祈皇上睿鑒謹奏亦何須特意振作但不令所屬以汝為怯懦畏事茍且將就之人則不期其為而有為矣同日又奏為奏聞事竊查西大通鎮屬測爾兔地方應設遊擊一營馬步兵八百名前經督臣嶽鍾琪題明俟測爾兔城垣衙署營房工竣之日將原派裁撥涼州西寧等處各標協營路馬步兵丁搬移駐劄其應設遊擊等官㨂選題補等因在案今測爾城工建築已竣臣準署大通鎮印務提臣馮允中甘提臣宋可進各將移駐兵丁事理咨商前來臣查測爾地方乃口外新設之區既無附近村莊又未屯墾種植况時值隆冬即有負販亦不能於此時赴彼貿易且其地相去西寧頗逺一切食物往來購買亦不甚便再領兵之遊擊等官臣現在揀選題請似不便先令兵丁移駐臣因照署鎮臣馮允中之議先於鎮標酌派辨兵攜帶口食前往測爾看守衙署營房俟明嵗三月內天氣融和將原派馬步兵八百名照大通鎮標白塔川營兵丁移駐之例按大小口數程途逺近給與車價口糧銀兩同家口搬移居駐仍照督臣嶽鍾琪原議令移駐兵丁子弟屯墾試種再加天氣和暖商賈往來利便且官兵既已屯駐其一切貿易之人亦必相率漸聚日用有資於兵丁誠有裨益臣一面咨會提臣宋可進即照署鎮臣馮允中所議辦理併將應設遊擊守僃千把等員揀選分别題咨請補外理合繕摺奏聞伏祈皇上睿鑒謹奏應如是辦理者值兹內外一家邊隅寧謐之時原不必急遽從事也同日又奏為奏聞事竊查陜屬州縣標營分餧軍需正騾一萬一千五百頭係明春拽運糧車出口之需最關緊要臣前準寧遠大將軍臣嶽鍾琪移咨令將分餧騾頭加意餧養臕壯於七八月間解交甘屬收餧隨即通飭所屬務須餧養臕壯臣復不時委員查驗期於臨時適用嗣於閏七月內軍需馬匹俱已解送起程即照撁馬兵丁原站將騾頭分起解送除固原分餧騾三百頭係甘屬地方無庸再解外其陜屬分餧正騾一萬一千二百頭並隨解餘騾各案陜甘近便境壤分作南北兩路遴委文武官員詳愼挑驗小心解送其北路者解交平涼慶陽臨洮等府屬收餧南路者解交鞏昌府屬收餧各在案及北路應解平涼等府騾頭事竣據驗解文武各員彚册造報臣按册查核統計北路解交平涼慶陽臨洮三府屬收餧正騾餘騾共五千四百一十四頭册內注有微瘸微病者一百九十五頭臣思驗解之時既有微瘸微病騾頭自應即行挑退令原餧官更換好騾驗解何得含混解送臣正在飭查間又據北路解騾各員繳驗批回內平涼等府收騾之員已於批上注明瘸病字樣臣即嚴飭驗解文武委員同原飭官照數速買壯健好騾自僃草料人夫解送平涼等屬更換至南路解交鞏昌府屬收餧正騾餘騾共五千八百六十五頭據驗解之文武大員知府任晟等各册造內開俱係足臕壯健好騾及解至鞏昌亦俱照數驗收各給有批回在案嗣於驗收之後節據驗收騾頭之鞏昌府知府髙夢龍報稱陜屬南路解到騾頭逐起驗收分餧內有臕瘦腿跛流鼻眼霧咳嗽瞎瘙流淚吐沫烙疤疙疸肺病五攢等症之騾共五百八十六頭又漢中府病騾二十一頭詳令陜屬原餧官另買好騾補換等情臣隨嚴飭西安布政司張廷棟等飛調驗解各員並解騾各官訊取確供詳加查核以憑嚴行參究著落補換去後今據鳯翔府知府任晟等向臣面稱西鳯二府騾頭俱係足臕健騾驗明解送現據解官劉方夏等掣有回批並未填注病瘸字樣或因長途撁送有減臕跛蹶生症等事但鳯翔至鞏昌府屬之清水縣交騾地方止有五站何至有病廢騾頭如許之多如果有如許病廢騾頭即應於回批上逐一注明以便查明陜屬原餧各員名下勒令買補更換何以驗收之時並不填注俟給發回批收餧之後始以病廢詳報顯係揑飾等語復據解官劉方夏白文炳等報稱所解騾頭俱係臕壯好騾交鞏昌府驗收現掣批回炳據實無疲瘦病廢之騾至職等交收起身之後忽又報有病廢等騾不知是何緣故等語臣思驗解與解送各員既稱實係壯健好騾且程途不逺時日又近何以驟得病證者竟多至五百餘頭既有如許病騾何以當時遽出印結收管且於批回上並不填注明白或知府任晟及原解官劉方夏等係屬一面之詞而鞏昌府知府髙夢龍所報情節亦難偏信軍需重務必須根究明確方可責令應行賠補之員更換臣隨即飛移撫臣許容就近確查一面密飭在蘭協辦軍需之西安驛傳道趙挺元前往鞏昌秉公察驗去後頃準甘撫臣許容咨稱解甘騾頭誠如來咨必須確查明白方見持平愼重今雖檄委分查但恐文員不諳又啓日後推諉之端且不特鞏昌一府應查即平慶臨三府騾頭亦當遴員委驗令臣於陜甘二屬各派武職二員分路秉公查驗等因臣隨即遴委副將遊擊等員分路查驗俱令其每至一處將所餧騾頭確加驗看如有病廢不堪者即查明陜屬原餧地方官辨所造册內之毛片口齒號數立即飛報以憑嚴飭原餧官辨星速購買壯健好騾自行解送補換再延安府屬州縣標營分餧騾頭內尚有未解騾九十七頭據委驗之延安府知府徐洹瀛署宜君營參將劉可德驗報册內注有六分臕五分臕兼有三四分臕者臣思此項騾頭分餧半載有餘因何止有三四分臕息明係經餧員辨或餧養玩忽或扣蝕草料均未可定臣即飛飭速買健騾驗明補解仍令確查騾頭疲瘦最多之處將原餧之員指名揭報參處庶於軍需責守可以整飭詳愼即現今甘屬收餧騾頭各員亦咸知警惕承辦矣所有陜屬解甘收餧騾頭節據報有病廢現今委員查驗飭令買換補解各緣由理合繕摺奏聞伏祈皇上睿鑒謹奏此項騾頭乃運送軍糧所需攸關甚巨若但以錢糧為重下僚是諉加之參處責令賠補彼固難辭而於汝遲誤軍機身家性命干繫究莫能解也竭力辦理必期無誤為要至於應參應賠之員何妨徐徐查議耶覽奏深為憂慮汝其詳加審度毋忽雍正七年十一月十六日吏部尚書署陜西總督臣查郎阿謹奏為奏聞事竊查陜省解赴甘屬接餧軍需騾頭前據甘屬驗收各員呈報內有疲病生證之騾共八百二頭經臣將節次嚴查併檄委武員星赴甘屬分路查驗著落賠補買換各緣由繕摺奏明今於十一月十二日又據鞏昌府知府髙夢龍報稱陜省解來騾頭據解官劉方夏押解頭運第一起騾三百餘頭到清水縣地方即公同解官劉方夏清水縣知縣張昌裕併牙行獸醫等眼同看驗如有病證騾頭即報明口齒毛片注明係何病證登記號簿即將收過若干驗明有病無病若干具文通報計南路解送之騾共十八起至九月十四日收完每起俱照第一起劉方夏驗收之法隨驗隨收隨報如驗騾之時若係好騾妄報有病解官何不立時質證而默無一言似此軍務重事安敢疏忽朦蔽所以逐細分晰注明將有病證騾頭一併驗發各州縣餧養者因念陜甘雖屬兩省而軍需則係一體或因長途解送偶得病證自今年八月餧養起至來年二月底止尚可冀其調治痊愈以期無誤並無捏報等情據此臣復飭令西安布政司張廷棟等嚴訊劉方夏等確供去後惟是軍需騾頭關係重大甘屬所報既有如許之多則從中疲病者亦必不少若俟查驗之後再行著落買補更換則往返需時轉瞬明春為期甚迫勢不能餧養臕壯恐難以拽運所關非細不得不預為籌畫因與撫臣武格酌議先動撥司庫銀一萬四千兩星速採買壯健好騾一千頭上緊餧養預僃俟委驗各員呈報到日即一面按所報之數逐起解送補換一面查明應行賠補之員將所買騾頭價值併餧飬草料銀兩俱在各員名下照數勒追歸還原款所有病騾仍令各員領回庶不致臨事周章似於軍需有益除就近檄飭辦理軍需之布政司張廷棟按察司碩色等即照數發銀務須購買壯健好騾預僃外事關動用錢糧臣謹會同撫臣武格繕摺奏聞伏祈皇上睿鑒謹奏迭覽所奏知汝等辦理必不能妥協已特遣部臣赴陜命其來往稽察矣雍正七年十一月二十二日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為恭報陜屬得雪日期分寸仰請聖鑒事竊查陜省各府州所屬地方於八月內民間播種二麥之後自十月十五日以前雨水調勻土膏滋潤麥苗俱已秀發而延安府屬并各州屬於九月二十二二十四十月初五等日皆得雪三四寸今於十一月十五十八二十二十一等日西安等各府州屬連得瑞雪入土七八寸不等現在同雲密布得雪尚不止此是誠上天鑒錫以孚我皇上重農愛民之至意也除以後得雪情由另行續為奏報外所有陜省各府州屬得雪日期分寸臣等謹繕摺具奏伏祈睿鑒謹奏朕為陜省農田雨雪夙夜厪念延安等府既於九月內得霑膏澤乃復隱而不奏殊不解汝等具何肺腑也雍正七年十一月二十六日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為奏聞事竊查陜屬各府州地方今冬得雪日期分寸臣等於十一月二十二日繕摺具奏今即於二十二暨二十四五連日雪霰交集入土至五六寸不等臣等訪詢農民據稱冬雪愈多愈好今得雪之時並無風力飄捲雪皆凝積在地於麥根更屬有益等語所有陜屬續經得雪日期分寸緣由合再繕摺奏聞伏祈皇上睿鑒謹奏覽接續得雪情形地氣諒已沾潤陜屬可無乾燥之虞矣但甘省未據報到尚在懸念雍正七年十二月十一日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為遵旨議奏事竊查督臣嶽鍾琪前準部咨欽奉諭旨目今各省內或有尚未分給養亷之員著各省督撫悉心商酌一面辦理一面奏聞欽此當即通飭欽遵隨經督臣嶽鍾琪將甘屬河西各官養亷公費酌議具奏而甘屬河東各官養亷公費亦經撫臣許容會議具奏惟陜屬應給首領佐二雜職等官養亷公費以及應增應減各數目初據西安布政司張廷棟查議具詳督臣嶽鍾琪以所議未協逐一指駁行令妥議嗣據該司更議具詳適督臣嶽鍾琪起程西進隨將卷案帶往蘭州俟核明主稿會奏及統兵擇吉出口之後因軍務殷繁復將核明原案移回令臣等核議辦理具奏今臣等悉心詳核統計陜屬尚未分給養亷之首領佐雜等官共一百四十二員每年應給養亷公費共銀一萬零六百兩又直隸知州十員有統率屬縣盤查倉庫與府屬知州不同今於原給養亷六百兩之外每員每年增給養亷銀四百兩共應增銀四千兩再西安府管糧通判今改為水利通判稽查涇陽等五縣之水利往來行走必須給以公費應照寧夏水利同知之例每年給公費銀三百六十兩又按察司衙門為刑名總滙原給吏書飯銀二百兩誠屬不敷今增給銀二百兩以上每年共應增給養亷公費飯食等銀共一萬五千一百六十兩再查原給布政司養亷銀一萬四千兩前據布政司張廷棟議稱每年領銀一萬兩儘可敷用應減去養亷銀四千兩又原給榆林神木漢興三道每年公費銀五百兩惟西安驛傳道議給公費銀一千兩今查驛傳道事務不繁應減去公費銀五百兩與各道公費俱屬畫一再原給西安府每年公費銀二千兩較之各府五百兩之數逾額三倍前據西安府知府王紹文議稱西安雖係省城首府承辦公事自與外府不同但二千兩公費為數太多應減去銀一千兩每年止給公費銀一千兩可以足用以上每年共應減銀五千五百兩臣等請將應給應增養亷公費飯食銀一萬五千一百六十兩併應減銀五千五百兩統於雍正庚戌年正月為始照數給扣至佐雜等官既已議給養亷公費凡從前一切陋規俱嚴飭禁革如有私收情弊臣等察出立即嚴參究擬再查布政司減去養亷銀四千兩係張廷棟從前詳議之案是以照議算入應減項下今張廷棟已經解任如新任布政司方覲到任後或有不敷再行奏請合併聲明所有遵旨議給陜省各屬未給養亷公費之首領佐雜等官銀兩併應增應減各數目謹僃繕清摺恭呈御覽是否合宜臣等未敢擅便伏祈皇上訓示遵行謹奏覽佐二雜職之議尚屬可行其直隸十州榆林等四道及各府知府增減之數多寡懸殊似乎不均未悉汝等具何意見云然至西安一府為省會首郡據王紹文之請遂爾從減能必將來接任之員咸皆如此節儉耶若布政司養亷一萬則儘足敷用矣汝等當再加詳議奏聞身為地方大吏此等細事不能料理允當而必請朕訓示思之寧不愧乎今所屬各員率多供辦軍需非平時可比如俟議定始與養亷必至窘乏難支須一面酌議一面給發可也雍正七年十二月十五日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為奏聞事竊查陜省解甘軍需騾頭前據甘屬各員報有疲病生證等情臣等隨遴委文武大員分路秉公查驗復動撥司庫銀一萬四千兩飛飭辦理軍需之西安司道碩色等分飭各屬星速購買壯健好騾一千頭預僃補解各緣由俱經繕摺奏明今據西安驛傳道趙挺元報稱遵奉檄委即前赴鞏昌府并秦州所屬共十三處逐一細驗前次所報病騾內其有病證難以拉車者合算共止有六十四頭係該州縣平心開造毫無抑勒等情又據查南路騾頭之遊擊張思永等會同各地方官查驗聨銜鈐印册報現在病瘸騾頭數目與驛傳道趙挺元所報之數相符惟册開尚有堪以調治騾十四頭臣思鞏昌府并秦州所屬原報病瘸等騾六百六頭何以查驗之數相去逈殊恐有以多報少情弊適趙挺元事竣回陜臣等面詢一切據稱此係國家大事惟有秉公據實查報不敢稍有瞻徇如果病瘸之騾尚多職道豈肯少報代人受過惟秦州禮縣二處有碎小騾數頭雖無病證似覺單弱等語臣等又思碎小之騾與尚堪調治之騾俱應一體補解更換隨將採買預僃騾內挑選壯健好騾一百三十頭委員管押於二月初五日起解鞏昌府清水縣交收補換訖至臨洮府屬廳州縣六處原報病騾據署副將席國芳等會同各廳州縣查驗册報實在病騾共八十二頭臣等即照數挑選壯健好騾於十二月十一日委員解赴蘭州交收補換訖其慶陽府屬四處平涼府屬六處原報病騾據副將于義等會同各廳州縣查驗册報實在疲病等騾共九十餘頭臣等即挑選壯健好騾一百頭於十二月十四日委員解赴涇州交收補換訖查從前因據報病騾過多是以飭行採買一千頭今已購買三百餘頭補換即可如數第解甘病瘸倒斃以及調治堪用并碎小騾頭雖俱已更換尚須上緊料理臣等復嚴飭接餧各員及監餧之營將等加意督率餧養併不時密差查察務使臕力壯健可以負重致逺不致貽誤以仰副我皇上重念軍務之至意所有採買解甘補換騾頭情節數目日期理合繕摺奏聞伏祈睿鑒謹奏因拽運軍糧騾頭關係匪輕已特降諭旨於查弼納等令其再為逐細查驗矣如瘦小不堪者多三百頭仍不敷更換迅即動帑另行購買以濟要需汝等當共相商酌遵旨辦理吏部尚書署陜西總督臣查郎阿謹奏為據咨奏聞事雍正七年十二月十三日準四川撫臣憲德咨據重慶府屬墊江縣報稱十一月初七日據捕役張岐山稟稱訪得離縣二十里新場地方有忠州來的衆人帶有牌票招人之事未知真偽等語隨即委典史王天篤同駐汛外委唐文彥帶領兵役等密往緝拏即於初八日清晨獲到人犯楊大銘董先朝黃四鞠永久左亮安徐應詔董世榮董愷董洪仁董汝近黃應舉黃自先田文交田子先黃義黃常黃琰鄭登位黃輝等一十九名馬二匹未裝舊鳥鎗一桿又於楊大銘家搜出硃標紙一條上寫楊大銘名下招人一百字樣俱獲解到縣隨即隔别研訊據楊大銘供稱係江西吉安府廬陵縣人剃頭生理雍正五年十月內到新場今年八月十一日有墊江人黃四趙汝海董良模董先朝呌到董家大灣山上説趙汝海出銀子呌同到渠縣去買棉花彼時不肯去九月初六日趙汝海呌左亮安來説呌同往忠州去買棉花初七日隨同左亮安董老二董于飛趙汝海至沙河沈四家住了次日同沈四等先至酆都縣白石了王可久家趙汝海同鞠永久父子後到又有墊江縣人何大何二何四董先朝董老五黃四又湖廣人陳姓劉姓李姓陳裁縫又酆都縣人張尚志董伯恆張含英董二張士林萬輝吉王永久王仲久等共四十多人别的不知姓名在大魚寺歇初九日王可久呌大家喫血酒發誓結拜了才説出忠州楊愛嘴地方出了楊家將為頭的呌楊成勳他家有金鑲玉印劉伯溫碑記他第七箇兄弟必要為王送在酉陽司去了那碑記上的話我看了記不得也有鈔了去的這帖子是十月二十九日王可久同一姓陳的與的這兩匹馬是十一月初四日一箇姓劉的同張尚志騎來都在董先朝家住歇至初五日有董愷因從前到白石了去尋馬擾過王可久所以治酒酬他邀我去陪到初七日夜被差役拏了前聽得王可久説招了一萬多人為首的是楊成勳陳文彬杜炳凡王可久四人呌衆人各先與銀一兩造劄付定於十二月在王可久家過年散劄正月上成都呌不要僃別的器械每人自僃鐵標一根曽畫了樣子與衆人看過我不曽製造等語併將董先朝等各犯録供詳報現獲人犯俱已監禁未獲人犯現在分路飛緝等情同日又準撫臣憲德咨稱據署忠州營守僃蔣宏英稟稱十一月十三日準墊江縣移會遵即密差目兵陳國彥等十五名扮作商民前往楊愛嘴密屣去後至十六日據忠州差役趙瓊回稱奉差前往行至州役夏魁家説起楊成勳而夏魁云須先問保長陳三捷他若呌去才可去及到陳三捷家伊已出去正欲轉身忽聽四山牛角聲響隨向一李姓家探問據云或者是吹角拏人不一時只見二人各執牛角行走李姓向前問詢據稱方才拏了幾箇人捆放在榖倉裏了所以星夜回稟等語因復差兵丁周國興等間往探信據兵丁嶽進美等探稱將捆的人都放了隨據前差目兵陳國彥等十五名回營稟稱離楊家不遠忽聽四下牛角一響突出一二百人圍擁在楊成勳家去捆綁拷問後面還有兵來拏我們否因言我們是來查禁散布謠言不是拏人的隨將我們捆禁在榖倉內衣服盤費俱已搜去至半夜時忽見兩人來解放説楊成勳縊死了衆人都散了你們去罷隨將楊成勳兩箇哥子拏來等語當即會訊楊成勳之兄楊成賢楊成舉據供是陳萬一説有墊江人來云墊江把扯旗的人拏了幾箇如今又行文到忠州酆都來拏人兄弟楊成勳陳萬一陳文彬等約了七八十箇人及捆拏兵丁時楊成勳不在家是陳萬一同楊成祿莫丁甲併幾箇湖廣人與近鄰人等拏的至楊成勳回來我父親埋怨了一陳楊成勳就去屋後樹上縊死了衆人散了我家並沒有第七箇兄弟等語一併移咨前來臣查撫臣憲德兩次咨開墊江忠州酆都等屬姦徒楊成勳王可久等揑造妖謠煽結黨羽插血誓盟訂期散劄及見官兵探緝竟敢吹角嘯聚捆拷兵丁叛迹顯著不知地方文武平日所司何事除飭取文武各職名至日另行照例題參外臣隨即飛移撫提二臣速飭幹員選撥兵役將供出姓名未獲各犯併不知姓名姦徒分路訪查確實勒緝嚴拏不致脫漏網亦不得波纍無辜至楊成勳乃首惡要犯一見事露勢必潛逃必無自縊之理再所供首逆楊七既稱在酉陽土司處自應嚴查勒獲其玉印碑記等物俱應搜追存貯臣俱飛飭署按察司劉應鼎護重慶鎮印務參將胡兆吉密速料理外理合繕摺奏聞伏祈皇上睿鑒謹奏覽奏知道了汝謂楊成勳一見事露勢必潛逃此論是至云首逆楊七既稱在酉陽土司處自應嚴查勒獲等語朕則以為不然試觀楊大銘所供楊成勳家有玉印碑記他家第七箇兄弟必要為王則是謀為不軌明矣該土司若素行恭順斷不敢招納叛逆即或心懷不逞又豈肯容留無藉之徒而奉戴之乎倘聽信此等荒唐支飾之詞遂向該司勒獲楊七殊非情理之當汝其詳審虛實斟酌辦理庶期正犯就獲無辜可免波纍勿令無知將辨孟浪舉動以致滋生事端將朕此諭密速鈔寄憲德黃廷桂劉應鼎胡兆吉等一體遵奉同日又奏為欽奉上諭事雍正七年十二月十二日接到撫臣武格恭録奉到硃批諭旨此案查郎阿理應會審屢次推諉識見甚屬卑鄙將朕此諭令查郎阿知之欽此臣當即欽遵訖伏查本年十一月十一日臣與副都統臣蘇穆爾吉卓鼐張正文等在臣署議辦旗下事件有撫臣武格來向臣言莫爾渾一案原奉諭旨交與將軍常色禮會同查審昨常色禮因前赴涼州駐劄曽將此案令巡撫會同何人審訊之處具奏奉旨承審之處與常色禮無涉欽此今將軍常色禮差家人將奉旨緣由傳知所以特來商量如一同會審可以不必具奏如不會審我即當請旨等語臣隨向撫臣言莫爾渾之案原係常色禮與你二人奉旨會審之事我未奉諭旨不敢擅專今常色禮既赴涼州應會同何人審理之處你該請旨為是隨經撫臣武格繕摺具奏今奉硃批諭旨臣前己準大學士臣馬爾賽等密信內奉有訓旨臣當恪遵秉公會審據實具奏外所有撫臣武格敬録奉到諭旨臣謹欽遵奏明伏祈皇上睿鑒謹奏一味偏於拘謹其奈汝何總緣為已得失利害之念重為國竭力致身之念輕遂至事事物物無往而非進退維谷之境矣能於本體講求得法其用自然充裕若不論經權但欲卸責於人殊不知終歸為已身之纍也戒之志之雍正七年十二月十八日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為欽奉上諭事竊照雍正七年陜省西安等府州各屬秋成分數經臣等繕摺奏報欽奉硃批諭旨臣等跪讀之下仰見我皇上敬天勤民至誠至篤又蒙聖恩啓迪臣等共矢公忠屏除私念以敦感召之本以裕衣食之源臣等心非木石敢不痛自修省誠心致禱以期雨暘時若五榖豐登伏思本年收成較之往年原覺歉薄臣等各有封疆之責能無悚切中心今仰賴聖主福庇西地冬雪既已霑足臣等惟有恪遵聖懷而已所有原奉硃批諭旨理合繕摺恭繳伏祈皇上睿鑒謹奏誠求感應豈易言哉若不能直抒一派公忠祇以利害榮辱私心將之任竭悃忱末能感召也必也文武各盡其職兵民各得其所事事井井有條政令秩然不紊閭里恬熙太和翔洽此真祈禱良術試行看同日又奏為欽奉上諭事竊臣等前據西安各府州屬申報得雪日期分寸經臣等繕摺奏報奉到硃批朕為陜省農田雨雪夙夜厪念延安等府既於九月內得霑膏澤乃復隱而不奏殊不解汝等具何肺腑也欽此臣等跪讀之下惶悚無地伏思我皇上宵旰勤求時刻以民生為念而西地冬雪尤關緊要是以聖心眷注更殷今延安府屬九月內既經得雪理應隨時具奏乃臣等以為延安逼近邊塞氣候寒冷得雪甚早硃批諭旨繕摺恭繳伏祈皇上睿鑒謹奏覽吏部尚書署陜西總督臣查郎阿謹奏為奏聞事竊臣準四川提臣黃廷桂咨稱查得重慶鎮標左營遊擊保璠貪婪為心目無法紀前於署黔彭營遊擊任內與所轄酉陽司私書往來蹤迹詭祕始而利其財物假以交好為名繼因會審李文海具控冉土司之子冉廣烜姦占董昌規之妻為妾一案挾勢勒索或措求銀兩任飽溪壑或收受騾馬徵及婢女且恣取鎗犬縱情遊獵罔恤兵艱種種不法實難枚舉似此罔利營私行同鬼蜮蕩檢踰間莫此為甚兹準護重慶鎮印務參將胡兆吉揭參前來與本提督訪聞無異斷難一刻姑容相應移咨恭候主稿會參請旨革職嚴審究擬以警官邪除行文重慶鎮照例羈候外至冉土司的係何名查該護鎮文內並未聲明俟行查至日另咨等因復據護鎮胡兆吉揭報到臣臣查遊擊保璠款惡多端贓私纍纍誠不可一日姑容而冉土司夤緣行賄亦應一併參革究擬臣因查酉陽冉土司名係冉元齡盤踞酉陽素不安分且查川省墊江忠州酆都等屬姦徒楊成勳王可久等結黨散劄一案據供楊成勳家有金鑲玉印劉伯溫碑記他第七箇兄弟楊七必要為王送在酉陽司去了等語經臣繕摺奏明則冉元齡窩藏首逆之罪更不止於行求納賄實難疏縱養姦應即嚴行參究今提臣黃廷桂以冉土司的係何名俟查明另咨等語臣雖檢查冉土司之的名乃係冉元齡而提臣咨內未據聲明不便含混具題除飛移提臣黃廷桂查取冉土司的名至日會疏題參請旨將保璠冉土司一並革職究擬外臣謹先行繕摺奏聞伏祈皇上睿鑒謹奏此事候朕另有諭旨又係不當嚴而嚴之舉也不審事之來歷情之重輕率意辦理胡能免顚倒錯亂之失非過則不及奈何奈何硃批諭旨卷二百三上欽定四庫全書硃批諭旨卷二百三下硃批查郎阿奏摺雍正八年正月初四日吏部尚書署陜西總督臣查郎阿謹奏為奏聞事雍正七年十二月二十六日據辦理噶斯軍需甘肅布政司葛森等呈稱會查得京城官兵至肅州出口應給馬八百八十六匹又馱運放卡安臺需用帳房鑼鍋馬十七匹共馬九百三匹奉文行令採買預備因本年大兵出口需用馬匹甚多俱在西涼等處沿邊一帶採買無餘此時即用重價亦難得臕壯之馬若買蒙古馬匹目今天寒草枯正在疲瘦之時餧養驟難長臕均屬緩不濟急惟有購買臕壯騾頭易換明春押糧兵丁之馱載馬匹在兵丁亦所樂從似此通融辦理方可濟用應於西安甘肅二省採買正騾九百三頭再買餘騾七十頭以備添補之用統於部撥軍需十萬兩內動用等情到臣臣查兵丁馱載馬匹今春正二三月內分起押送糧車起程前赴巴爾庫爾即於此項馬匹內挑選精壯之馬為大兵進𠞰之用關係重大不便以騾易換相應仍令葛森等在沿邊一帶作速儘數購買馬匹縱新買之馬尚無臕息然約計京城官兵須於三月底到肅目今猶可隨買隨餧以期長臕足用至出口駐防之時己屆四月口外青草發生牧養亦易倘買不足數即於附近之存營馬匹內摘撥以足九百三頭之額其摘撥空缺之馬仍照例每馬一匹給銀八兩令各營陸續買補均無貽誤除一面咨明欽差總理稽查軍需兵部尚書臣查弼納等查照并飛飭葛森等星速加謹辦理外理合繕摺奏聞伏祈皇上睿鑒謹奏所議甚屬可嘉於此奏未到之先已有旨矣雍正八年二月初五日吏部尚書署陜西總督臣查郎阿謹奏為欽奉上諭事竊臣前因承審莫爾渾一案經臣繕摺回奏今奉到硃批一味偏於拘謹其奈汝何總緣為巳得失利害之念重為國竭力致身之念輕遂至事事物物無往而非進退維谷之境矣能於本體講求得法其用自然充裕若不論經權但欲卸責於人殊不知終歸為已身之纍也戒之志之欽此臣跪讀之下悚惶無地伏念臣之一生本屬拘謹之人又因責任重大雖勉竭駑駘常覺才識未周心力未逮誠如聖諭事事物物無往而非進退維谷之境今欽承訓旨至殷至切臣祇有恪遵聖訓鏤心刻骨改過自新講求本體竭力致身以期臣職之靖共以答君恩之髙厚而己所有原奉硃批奏摺理合恭繳伏祈皇上睿鑒謹奏拘謹二字不過為一身得失利害起見正乃私心之根蒂也當竭力剔除雍正八年二月二十八日吏部尚書署陜西總督臣查郎阿謹奏為奏聞事雍正八年二月十三日督臣嶽鍾琪衙署據報失火臣隨即飛騎前往查係二門內大堂之東四川書辦房內火起延燒房屋臣與撫臣武格率同標下將備督令兵役協力救護登時撲滅共燒燬房屋三間內中題稿文卷亦有被焚者臣前於川陜房各撥書辦照例封鎖看守文卷以備檢查取閲又因文卷關係緊要復不時嚴諭小心火燭加意防範今川省文卷房失火則看守書辦法難寬貸除將書辦冦金聲飭發按察司碩色嚴訊起火確情并查明燒燬卷宗數目照例題報外所有督臣嶽鍾琪衙門書辦房失火情形臣謹繕摺奏聞伏祈皇上睿鑒謹奏此皆平時疏慢未嘗加意照顧之所致今已灰飛煙滅縱查處一二胥役亦難掩汝面之恥也雍正八年三月初七日吏部尚書署陜西總督臣查郎阿謹奏為署鎮袒護徇私謹據實密陳仰祈聖鑒事竊查寧夏鎮屬石空寺堡守備楊芳因阻撓軍需羊隻一案經臣特疏參拏所遺員缺即照會寧夏鎮臣張善揀選合例人員呈請委署去後茲據鎮臣張善呈稱遴選標下左營千總陸清堪以請委等情臣查千總陸清係拆毁阿寶額駙房屋案內經欽差兵部侍郎臣通智奏明奉諭旨著張善嚴加查處欽此隨經鎮臣張善查明陸清係總理查看牧駝之辨乃縱容所帶兵丁住居作踐相應責處記過以䇿後效所有拆毁房屋門窗仍著陸清等賠修完固以警踈忽等情呈報在案則千總陸清方當責處記過之後若遽行委署守備何以昭示勸懲且聞陸清即係寧夏人家道殷實乃鎮臣張善之親戚何以不顧公論任意徇私顯有情弊除一面嚴行飭駁另移甘提臣宋可進揀選合例人員署理外臣伏思鎮臣張善身受皇上簡任封疆重寄理應感戴天恩實心任事乃敢違例妄行徇私作弊深為負恩宜乎不能整飭屬員於軍需事件安心玩視也臣見聞既確未便以張善調任安西稍為徇隱謹善摺密奏應否具疏題參之處恭請訓示遵行謹奏張善原不妥協器具狹小為人善柔緣大將軍嶽鍾琪越格保薦而委任者即今安西之調亦因奏稱勝任故也伊隨嶽鍾琪周旋甚久或另有深知灼見方如是推奬但朕目中殊未覩所長且試用看奏內情節知道了雍正八年三月十三日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為奏聞事竊臣等於三月初七日將陜屬兩次得雨日期分寸繕摺奏報之後隨於初九初十十一等日連得時雨入土一尺有餘土膏透潤麥豆秀穎詢之農民咸稱民間多喜食麥二麥乃一嵗日給之本今得此時雨沾足夏收豐穫己定等語所有陜屬地方續次得雨日期分寸雨澤沾足情由理合繕摺奏聞伏祈皇上睿鑒謹奏得雨日期分寸以手加額覽之畿輔地方自春徂夏風霾時起大有旱徵朕憂心惄如西顧陜省尤深繫念今為此奏解釋大半矣再者聞知州張勤寵貪飲廢事聲名不堪汝二人亦知之否耶吏部尚書署陜西總督臣查郎阿謹奏為欽奉上諭事雍正八年二月二十七日奉到硃筆諭旨一道并敕發廣東督臣郝玉麟密摺一件臣跪讀諭旨并詳閲摺內匪類造言煽惑情節仰見我皇上睿算周詳防微杜漸仁育義正胞與為懷之至意臣伏思人雖至愚孰不自愛身家自惜身命祇因一二匪類揑造神竒怪異之説足以駭人聽聞遂至受其煽惑墮其圈套日積月纍迷而不悟以致糾集黨羽夜郎自大逮一朝發覺而刑戮隨之并其父母兄弟妻子宗族人等俱罹法網誠如聖諭匪類之為害甚於盜賊也凡有民社之責者均當留心察訪思患預防況督撫大臣身膺封疆重寄尤當先事預籌加意整飭至於川陜巖疆更非他省可比地方遼濶幅員最廣內而民生商賈外而邊隘番夷宵小易於藏姦愚頑最能滋事全在實心查察竭力防範使匪類無容身之地善良有自得之天方於地方有益臣於署理督篆任事之初業經通飭各屬嚴行保甲慎重汛防禁緝妖謡查拏地棍各在案今欽承諭旨訓示至周至備臣益當恪遵聖訓竭力勉為隨會同撫臣互相稽察於文武大小員辨晉謁時即諭以嚴查匪類寧謐地方果能於所屬境內不時留心嚴行巡緝自有鼓勵之道如敢虛應故事經别案發覺或被别屬查拏定以踈縱窩藏參究臣又思預消弭患之法莫善於保甲而保甲之法又在分定月日分定地方嚴立賞罰以專責成以昭懲勸現在詳議條目分别賞罰數目再為通飭三省遍貼鄉村城市務使家喻戶曉法在必行倘不肖官吏仍敢陽奉隂違始則記過繼則參革以為玩忽者戒如果查拏具報輕則記功重則保薦以為勤慎者勸其巡役防汛以及保長甲長人等之賞罰亦如之臣愚以為如此辦理則立法既嚴查察自密各甲各保無不照例奉行庶幾匪類斂迹不敢為非將見比戶可風地方寧靜長享升平之福矣所有奉到硃筆諭旨理合繕摺奏繳伏祈皇上睿鑒謹奏據奏現在詳議條目分别賞罰通飭三省遍貼鄉村城市務使家喻戶曉法在必行等語若然則曷勝其紛擾耶保甲社倉二事固為古今致治良法然必待有猷有為有守熟悉地方情形之人且具有踴躍從事之心方可舉行非可以勢驅力迫而奏效者今司府不知感畏督撫百姓不知愛戴州縣胥役兵辨視文武大小各官直同兒戲乃欲嚴繩以法而冀臻比戶可封之隆盛何不自忖量至於此極也如欲借嚴保甲以稽察匪類祗宜密諭屬員相機為之不時留心體訪一有拏獲即示以奬勸如斯而已況正在軍需之際事務浩繁無故又申一番功令是豈寧帖地方之道朕實為汝等憂之隨波逐流毫無定見如何如何同日又奏為請旨事竊查陜甘所屬各標營派調領兵出征之副參遊守等員所遺汛務俱已委署有人惟安西鎮屬沙州協原派出征副將張豹前因甘屬𣲖留糧運官兵議於今春出口復經寧逺大將軍臣嶽鍾琪酌留署涼州總兵印務興漢鎮臣曹勷同副將張豹至期管領前進今糧運現在出口副將張豹己遵檄前來統領其所遺副將印務前未議有委署之人臣查副將乃係大員責任綦重正在一面遴員委署咨會寧逺大將軍臣嶽鍾琪間忽據安西鎮標中營遊擊衛維康報稱奉西安鎮委令署理沙州副將等語臣查委署之例自遊擊以上大員皆由提臣揀選咨會督臣委署從無鎮臣自行委署之例且署安西鎮臣袁繼蔭既未將沙州副將印務照例呈請揀委及自委遊擊衛維康署理之後又無一字呈報况沙州係新闢重地必須幹練之員綏輯兵民整理稽察方於汛守有益查遊擊衛臣謹繕摺具奏所有沙州協印務或蒙特簡人員署理或即令費上志署理之處恭請訓旨遵行再遊擊費上志如蒙聖恩準其署理沙州副將其靖逆營遊擊印務臣即照旨伏祈睿鑒謹奏覽雍正八年四月十三日吏部尚書署陜西總督兼署西安將軍臣查郎阿謹奏為欽奉上諭事竊臣前因滿州八旗官兵按期操演及應行訓飭應行甄别各事宜繕摺具奏欽奉諭旨愷切詳明至周至備臣跪讀之下仰荷聖主教誨啓迪不啻面命耳提無微不至臣何人斯乃蒙我皇上訓勉開導懇摯諄篤一至於此臣伏地飲泣幾不能言惟有恪遵聖訓加意奮勉時時仰體聖心事事求其至當勤加訓練次第漸摩啓其為善之心豫以自新之路嚴立賞罰昭示勸懲務期人人洗心滌慮爭自濯磨相率而歸於祇父恭兄忠君親上之道以仰報聖主豢養愛惜之仁如此則臣心方可少安臣職方為無忝至於善柔適足以滋事姑息更易於長姦若徒事寬容沽名釣譽尤為負奏請外所有原奉諭旨理合繕摺恭繳伏祈皇上睿鑒謹奏誨爾諄諄聽我藐藐云如之何雍正八年四月二十八日吏部尚書署陜西總督臣查郎阿謹奏為奏聞事竊照雍正八年分甘屬額徵錢糧欽奉諭旨悉豫蠲免聖主浩蕩洪仁有加無己甘省子民莫不含哺鼓腹共慶生成而地方牧民之官尤當敬體聖天子惠愛元元之至意實力奉行加意撫綏方於邊郡民生實有裨益無如所屬有司往往奉行不善每多擾民之病兹於本年四月二十三日據渭源縣詳稱歸并臨屯西票各寨屯民陸光宗等自雍正五年分歸渭源管轄迄今四載所有雍正五年六年七年未完折色銀三百餘兩未完本色糧一千二百餘石自開徵至今抗不赴縣輸將及至催頭差役下鄉催輸而陸光宗等刁頑不法相率五六十人混嚷口稱投歸狄道抗不遵拘等情詳報前來臣思甘省錢糧係按年估撥兵餉關係支放何得拖欠纍纍任意頑抗誠難輕縱以長刁風第查甘撫臣許容因詳請不敷兵餉等事一案自雍正三年起至雍正六年止將本省本年額徵銀兩照數全撥兵餉而每年各有未完民欠經前任布政使鍾保等將應扣朋建銀兩借墊供支共那動朋建銀一十三萬八千餘兩題請將各年未完民欠銀兩勒限一年責令布政使孔育璞照數催徵補項等因嗣經甘撫臣許容通飭各屬凡厯年舊欠錢糧趁此皇恩蠲免新糧之際立限四月完半九月全完倘不能如數徵起定拏親信家人同經承赴轅究比等因臣伏思未完民欠關係兵餉自應催徵補項但欲以一年而清數年之舊欠全在賢能州縣勸諭設法寓撫字於催科使小民踴躍趨事輸將恐後方為持平辦理如遇不肖官吏唯恐嚴限緊迫或完不如數則家人經承難免提拏究比遂徒事敲撲任意催追無怪乎渭源屯民有抗糧混嚷之報臣愚以為頑戶抗糧固應嚴加懲治有司之催徵無術亦難寬宥姑容而撫臣許容提拏家人經承究比之檄飭殊非立法之善者也臣因密札致撫臣令其善為料理務使地方寧靜徵輸無誤外所有渭源縣屯民陸光宗等抗糧情節臣謹繕摺奏聞伏祈皇上睿鑒謹奏許容於此一事局度狹小識見卑鄙曷可勝言候另有諭旨頒發同日又奏為欽奉上諭事竊臣前將四川各標營兵丁演習軍器事宜繕疏題報今準兵部咨雍正八年三月十二日奉旨查郎阿原奏內稱步兵弓箭鳥鎗手於鎗棒二項應聽伊等自行學習至藤牌一項軍中固不可少亦不必專兵學習有願習者仍聽演用等語夫藤牌既為軍中所不可少何又云不必專兵習學既不必專兵習學而又云有願習者聽其演用兵丁技藝全在訓練督率況於本分之外未有禁兵丁不許復習他技之條也倘願習者乏人則又徒托空言於軍務有何裨益查郎阿所奏前後自相矛盾甚屬支離背謬而部覆之駁令定議則暗令禁兵丁分外習他技之論也亦屬糊塗將原本發還著查郎阿另行具奏欽此計發紅本一箇粘單一紙等因移咨到臣臣跪讀諭旨仰見聖鑒周詳而臣議奏之時未經備細分晰實屬背謬伏查陜甘二屬議派兵丁操演事宜經督臣嶽鍾琪酌定疏稿移臣具題嗣準部覆照議分演在案其四川省屬兵丁應如何操練用何軍器之處臣恭繹上諭奉有因地所宜酌定規制之諭旨而川省兵丁應演之器械是否與陜甘相同未便槩定臣因移會撫提二臣并將陜甘議稿録送以便參酌定議節準撫臣憲德提臣黃廷桂等議稱川省係苗疆重地應照沿邊省分定例每兵一千名設立鳥鎗四百桿同弓箭炮位二項俱應專兵熟演其長鎗棍棒亦照陜甘之議令馬兵兼習遇有行走携帶馬上以備兼用至㓲刀一項向係專派守兵演習因川省林深箐密㓲刀可戳可斫轉折捷便又可護衛炮位應仍令派兵專演惟藤牌一項川省止有提標設立二百面應行加謹收貯如步兵弓箭鳥鎗手有願兼習者仍聽其演使不必按兵分派等因臣查憲德黃廷桂所議應設鳥鎗數目同弓箭炮位專兵演習并令馬兵兼習鎗棒之處俱屬允協而㓲刀又為川省利用之器議令派兵專習是即因地所宜亦於營務有益惟藤牌一項既稱止有提標設立二百面不必按兵分派聽願習兵丁自行演習臣因思川省地勢山嶺險峻道路﨑嶇密箐深林藤牌或難施展從前各標營俱未設立者或亦職此之故至於步兵技藝除弓箭鳥鎗之外其行走之際鎗棒等械難於攜帶是以各照所議并將藤牌一項俱不派兵專演而臣於題報疏內未經詳細分晰聲明又以藤牌為軍中固不可少實皆臣之疏忽誠如聖諭前後自相矛盾甚屬支離背謬也今臣欽遵諭旨復加斟酌如前議馬兵弓箭鳥鎗手兼習鎗棒應令於操演之時與專習之弓箭鳥鎗一體訓練各臻純熟以資兼用再步兵弓箭鳥鎗手於行走之際難以攜帶他物其鎗棒等械應請仍照原議令其自行兼習至提標原設藤牌二百面應於提標額設守兵六百八十三名內派兵二百名專習藤牌務令操練精熟遇有行走自可備用除將原議情節并現今遵旨另行議奏緣由容臣於本內聲明具題外臣謹繕摺恭奏伏祈皇上睿鑒謹奏類斯題覆事件何必又多一番煩瀆諒將曩日在廷目擊朕之萬幾紛繁刻無寧晷情景舉皆忘之矣似此毫無愛君之誠但顧一己之得失一身之利害豈查郎阿從前心志果盡改易耶雍正八年五月初四日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為欽奉上諭事雍正八年四月初二日奉到硃批諭旨聞知州張勤寵貪飲廢事聲名不堪汝二人亦知之否耶欽此臣等跪讀之下仰見聖主明照四方無逺弗屆伏查直隸興安州知州張勤寵上年因公來省晉謁之際臣等以該員世受國恩務須努力向上潔已愛民恪勤任事等語諄諄勸勉而張勤寵亦稱自當勉勵報效誰料性耽麵糵懶於辦事雖興安一州地僻事簡無甚繁重之案而日行事件並不留心辦理每多廢弛訪其作為惟以唱戲飲酒為事所屬縣官等因公稟謁不得即見必守候日久方得進見而於屬員所稟一切地方事務亦不著意又聞於本年二月間生日屬員赴州祝夀連日演戲飲酒不顧公事則其怠諭旨始知己蒙睿鑒除一面繕疏題參外所有原奉硃批奏摺理合恭繳伏祈皇上睿鑒謹奏卿等能如是精明察吏朕焉有不嘉悅者乎實代汝二人愧赧無地同日又奏為奏報動用公用銀兩事竊查雍正六年分動用西安布政司庫貯公用銀兩前據西安解任布政司張廷棟造册分送查核隨經寧逺大將軍臣嶽鍾琪令將養廉公費地方公用并安藏軍需預備西路軍需案內動用銀兩各另分案查造核銷不便牽混復據張廷棟查明案次分晰造册呈送寧逺大將軍臣嶽鍾琪查核又據新任布政司碩色造册呈報臣等核銷前來臣等查雍正六年分舊管新收二項共公用銀三十一萬九千三百四十三兩零內共動用過銀二十六萬三千三百五十三兩零臣等隨將從前詳請原案照數查核均屬相符尚應實在餘剩存庫銀五萬五千九百九十兩零應徵雍正四五六等年民欠未完耗羡銀一千五百三十九兩零統於雍正七年動用公用銀兩案內另行奏報外所有雍正六年分地方公用并安藏軍需西路軍需各案內動用西安布政司庫貯公用銀兩并支收細數臣等謹分案繕造淸摺恭呈御覽伏祈皇上睿鑒謹奏此不過一筆花帳朕何暇觀覽不在奏與不奏惟在秉公查核將來不致被人檢點為要耳倘少有不符曽奏過三字豈遂足以卸責耶雍正八年十月二十六日吏部尚書署陜西總督臣查郎阿西安巡撫臣武格謹奏為奏聞事竊查陜屬地方秋時得雨二麥播種情由臣等前經具奏在案今節據延安鳯翔等各府州屬報稱所屬地方俱已得雪積地自六七寸以至一尺有餘不等臣等正在繕摺恭奏間而西安府屬并各州屬亦於十月二十一日咸得瑞雪積地有五六寸農情歡洽共頌上天錫佑垂鑒聖主愛民之仁冬雪及時麥根滋潤豐登預兆稱慶同聲所有陜屬得雪分寸情由理合繕摺恭奏伏祈皇上睿鑒謹奏陜屬得雪情形知道了不可少肆厥志敬之慎之吏部尚書署陜西總督臣查郎阿謹奏為恭謝天恩事雍正八年十月十七日準部咨欽奉上諭尚書查弼納著馳驛即速來京另有交辦事務西路軍需諸務著署督查郎阿前往肅州辦理仍兼理川陜總督印務秦布著即回西安將軍之任護軍統領哈爾吉著前往涼州代秦布統領兵丁仍著鄂善協理欽此臣隨即欽遵將軍需册檔併臣衙門應帶卷宗俱各逐一檢查齊備於十月二十六日束裝起程併將起程赴肅日期另疏題報外伏查西路一切軍需荷蒙我皇上睿謨廣運訓示精詳凡糧運兵馬各項事宜莫不上承宸算籌畫萬全今因尚書臣查弼納另有交辦之事馳驛進京其軍需諸務需人辦理乃蒙聖心眷注以臣猶堪驅策令臣前往辦理西路軍需諸務仍兼理總督印務臣上荷殊恩膺兹重任敢不竭此愚誠勉盡駑駘祇有事事恪遵訓旨加意慎重實力料理期於糧運毫無貽誤軍需辦理妥協以上副我皇上委任之洪仁而己所有微臣感激愚衷理合繕摺恭謝天恩伏祈睿鑒謹奏勉之必使所屬各員心悅誠服畏威懷德諸務方克有益蓋地不一處事復多岐獨運智力萬難遍及然非濟之以公明亦何能收臂指之效也須竭力黽勉以求其本雍正九年二月初七日吏部尚書署陜西總督臣查郎阿謹奏為準咨密陳恭請聖鑒事竊照巴爾庫爾軍營因逆夷猖獗節次派撥兵丁前赴應援臣隨酌派預備軍需事宜五條繕摺奏聞辦理今於雍正九年正月初七日準甘撫臣許容來咨據署鞏昌布政司趙挺元詳稱奉𣲖製造火藥鉛彈各十萬斤查火藥內所用物料如硝磺二項蘭城素不出産今欲辦十萬斤之多一時難以猝就懇即咨移一併飭令西安藩司在於陜省現有之火藥鉛斤內製造解送等情移咨令臣酌定辦理伏思鉛藥乃軍營必需之物查寧逺大將軍臣嶽鍾琪議奏續增款册內開準部咨欽奉諭旨以行陳火藥最為緊要應多為製備隨經嶽鍾琪欽遵轉飭在於蘭州司庫軍需銀內動給銀兩令各領兵鎮將在甘屬就近製造一體報銷在案况陜省各州縣儲備之鉛藥所需硝磺鉛斤俱從别省採買原非本地出産之物且自大兵出口裹帶之外續用之處甚多各州縣原貯鉛藥已屬有限自不便統於西安預備製造致滋偏重糜費趙挺元現署藩篆奉文之日即應詳委文武妥員請給印文印票赴鄰省購料製造何得以硝磺二項蘭城素不出産為詞臣即於咨復撫臣文內嚴飭趙挺元併令作速遴委幹員採買物料回日即會同營員設局製造以重軍需如再推諉當即會參等因咨令撫臣許容速飭辦理在案逮寧逺大將軍臣嶽鍾琪到肅向臣面言前過蘭州時巡撫許容因製造鉛藥一事將臣申飭趙挺元之文以為有意駁他與彼不存體面大有抱怨之詞臣聽聞之下深為駭異竊思督撫為封疆大臣且現在辦理軍需更宜和衷協力方於軍務有益今以臣分省製辦之鉛藥趙挺元欲推諉西安製造冒昧具詳而撫臣許容既不就近駁飭又復據詳率咨及臣將趙挺元駁飭並未干涉撫臣一語乃撫臣許容輒以此猜嫌疑忌殊非慎事辦公之道現今軍務殷繁臣何敢以此瑣屑之事上瀆聖聰第撫臣許容既有抱怨之言臣不敢稍為徇隱謹繕摺密奏伏祈皇上睿鑒謹奏克信己之公正何妨人之猜嫌此奏甚失大臣之度有違和衷之道朕殊不取雍正十年四月十一日吏部尚書署陜西總督臣查郎阿謹奏為聖德感孚甘霖時沛恭摺奏報事欽惟我皇上敬天勤民若保赤子頻頒諭旨誥誡臣工務令先事圖維痌瘝乃身奉公殫職仰見聖主至誠惻怛諄切懇摯伏查陜甘二省民人素常食麵全資二麥兹當春夏之交正麥苗萌生秀長之候土膏尤宜滋潤今據陜省之西安延安鳯翔漢中榆林等府屬併直隸邠乾等各州屬節次摺報於三月初三初四初五初十十一十二二十以及二十一二十七等日各下雨下雪分寸多寡不等入土四五寸至一尺有餘四野霑足等情又據甘省河東河西各府州屬節次報稱於三月初十日十一日十二日十七日二十日二十七日各得雨雪入土深淺不等俱各普遍等情至於肅州地方現今渠水暢流又於四月初六初七兩日細雨綿綿入土深透其甘州所屬亦於初六日得雨雨勢甚廣詢之農民咸稱甘雨應時於麥田甚有裨益俱各勃然秀發等語此皆由聖主感格天心是以陜甘二省霖雨普霑軍民胥慶理合繕摺奏聞伏祈睿鑒謹奏全陜獲霑天澤深慰朕念以手加額覽焉雍正十年閏五月二十四日吏部尚書署陜西總督臣查郎阿謹奏為奏聞事竊查陜甘為邊疆重地兩提八鎮士馬殷繁營伍事宜最為重大而額設馬匹尤關緊要正值軍興之際不時摘撥調遣更須加意餧養務使臕肥壯健則緩急足恃行走有資臣於陜甘各標協營時加嚴飭不憚三令五申但地方遼濶營汛繁多全在提鎮大臣實心宣力共矢忠誠慎重料理方得收其實效然求其妥協周備殊非易事即如駐甘之延興二鎮官兵調赴軍營所需馱載馬在於甘提標摘撥二千匹查甘標存營之馬尚有三千餘匹於此中摘撥二千匹似易為力及甘提臣宋可進準咨之後以馬匹臕次俱減不能如數摘撥一面奏明於西寧鎮摘撥七百匹大通鎮摘撥三百匹甘標僅摘一千匹乃到肅後臣親為查驗此一千馬內尚有疲瘦者又挑去一百九十匹於駐肅滿兵馬匹內照數撥給方得出口彼時理當參奏因思甘提臣宋可進久任邊疆整理營伍老成厯練平兩例於正月初關領惟是秋間料豆登場草束衆多之時物價自各平減至冬天則漸長至春天則更昻兵丁領到冬季餉銀即及時購買己不比秋間若領到春季餉銀更難免重價覓買臣再四思維莫若將冬春二季應支草料銀兩統於七八月間令各標營全行領回趁物價平賤之時採買齊備俟十月初一收槽則處處攢槽餧養合之原估額設之本色料草儘足飼餧飽騰此項料草銀兩專交各提鎮遴選廉能之將辨及時採買經理督餧臣復不時委員查驗如有漫不經心不能起臕或致疲瘦者據實稟報參拏嚴究倘提鎮稍有瞻徇亦一併嚴參如此料理則兵丁飼餧有資既無苦纍將備分任辦理各有責成實於馬匹軍務均有裨益除一面移行辦理外所有預支料草銀兩於價平時先期購買緣由臣謹繕摺奏聞伏祈皇上睿鑒謹奏覽同日又奏為密陳臣悃仰祈聖鑒事竊惟西塞用兵機務重大臣駐劄肅州疊奉諭旨屢接廷議仰思聖主之宵旰憂勤籌畫機宜訓諭誥誡者已無微不到廷臣之宣猷協贊委曲詳議者亦無所不周微臣身任封疆辦理軍務受恩髙厚未報涓埃而清夜自思上念國體之所關邊庭之攸繫何以進取而𠞰除何以安邊而守固每至廢寢忘餐坐卧不能安席况軍機事宜何等關係臣沗為大臣不能少為君父分憂少為國家出力并不能少陳一知半見以仰贊髙深臣實慚愧無地臣實恐懼不遑此臣之隱衷臣之愚悃有不能自己者伏思巴爾庫爾軍營其將士之局面兵馬之情狀與夫塞外之地方形勢臣住肅兩年密邇軍營時刻留心察訪頗知備細亟欲敬效悃忱而事關機密非奏牘所能詳載兹查目下軍需事件俱有就緒甘涼肅駐防官兵派調赴營早已料理出口其副將軍劉世明等亦己自肅馳赴軍營辦理軍務計算時日臣於七月底可以輕騎減從馳驛進京陛見將口內口外一切事務邊方之扼要官吏兵民之性情凡目之所見耳之所聞心之所知慮之所及為摺奏所不能道者均可一一陳奏於聖主之前仰懇皇上天恩準臣所請於七月底起身馳驛入覲親聆訓諭指示俾臣遵循辦理而臣之深知灼見寸衷微悃得以詳悉敷陳以備採擇冀於軍國重務稍有裨益不負聖主簡任之恩臣心亦可少安臣職或可無沗至於西路軍需及總督印務有副都御史臣二格孔育璞可以暫時署理且往返不過兩月之期設有緊要之事仍可於途中隨時酌辦亦不致有貽誤如果審時度勢實不可暫離肅州亦不敢冒昧陳請臣為軍務關係重大心志激切萬難再為緩待不辭冒瀆謹繕密摺請旨伏祈皇上睿鑒謹奏朕意亦欲見汝但七月間大兵移駐穆壘內外軍需俱關緊要汝未便逺離肅州所欲面陳一切機宜可備細具摺一一上聞雖不能如口奏詳明朕自鑒悉耳目所及縱或有干涉大將軍之言亦不妨直書以奏此際暫且不必來京雍正十年九月十五日署寧逺大將軍臣查郎阿謹奏為奏聞事竊臣於本年七月二十二日接奉諭旨臣因統兵任重務期謀出萬全且軍營兵馬情形須大為振作另行整理其機宜逺大必得跪聆訓旨指示周詳方得先操勝算是以一心瞻仰馳驛來京及行至花馬池地方承準大學士臣鄂爾泰來咨奉到欽定吉期甚近又欽奉諭旨隨欽遵回肅而軍務攸關中心日切惶恐自大學士臣鄂爾泰敬領諭旨到肅宣布凡內外事件軍務機宜精詳明備仰見聖明逺照而大學士臣鄂爾泰與臣晝夜面商熟籌機務凡所教導於臣者洵皆卓識鴻猷極為逺大臣心領神會諸事明白雖自愧臣才之不如實深幸臣心之相合從此恪遵聖主睿謨領略元臣碩畫安邊靖寇計日凱旋曷勝歡忭謹繕摺奏聞伏祈皇上睿鑒謹奏所奏欣悅覽之我君臣亦惟有勉盡人力以敬俟上天慈佑耳卿其朂哉硃批諭旨卷二百三下
