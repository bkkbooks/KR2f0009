body:
  text: 欽定四庫全書硃批諭旨卷一百七十二硃批王奕仁奏摺雍正二年十二月十八日提督貴州等處學政翰林院編修臣王奕仁謹奏為遵旨條陳事竊臣於雍正二年二月二十七日恭請聖訓仰蒙皇上面諭學臣無地方責任有見聞的確之事即當據實敷陳隨便於巡撫提督處附奏欽此臣到任之初一切利弊訪聞未的不敢輕瀆天聽數月以來歷試五郡有關係學政之事理合奏聞又以在外關防考試未獲遇便附進今歲暮旋省謹從撫臣毛文銓處附進奏摺六件因字數繁多一事各具一摺仰求聖恩全覽臣不勝感激依戀之至謹奏字數繁多何有妨礙但閲所奏數事皆不出於公誠頗近私巧同日又奏為請嚴武生考課以宏造就事竊惟學校之設原以養育人材文武諸生總屬一體舊例文生員於歲試後另行録科武生有歲試而無科試即以歲試所取一二等准作科舉以臣愚見竊謂中人之質每藉䇿勵而後有成若考課疏略自然容易廢弛況武生重在騎射技勇茍不時加簡閲恐其歲試之後不復勤於演習黔省士子不安本分者大半皆屬武生良由怠於肄業遂致習為匪類仰懇皇上聖裁敕部酌議令學臣於科考時照文生之例將武生一體科試方准録送進場如此則武生習藝不敢懈怠既可漸改把持包攬之習而國家亦可以收得人之效矣至於武童入學自當仍遵定例三年舉行一次不必於科試時再行録取也如果芻蕘可採仰祈睿鑒施行謹奏據奏為造就人材起見欲將武生加添科試則當具題請旨候議覆施行非應摺奏之事也同日又奏為苖童宜加化誨以移風俗事臣查黔省苖多漢少其類不一各有生熟二種生苖遠藏巖穴自耕自織從不輸賦熟苖猶通功易事任土納糧名雖有生熟之分實均係朝廷赤子自當漸次招懷俾得盡沾雨露況其中非無秀良子弟可以化導裁成臣愚以為苖人有不奉約束為民之害者督撫提鎮諸臣以兵威法令攝服之其慕義向風有志上進者應藉師儒之教以引掖造就之惠威兼施遐邇胥服今各府州縣皆設有義學臣請敕令地方官出示曉諭嗣後苖人子弟情願讀書者許赴各該管府州縣報名准其一體送入義學專令訓導一員嚴加教誨倘蒙皇上格外施恩再於歲科兩考各州縣定額取士之外加進苖童一名以示鼓勵則蓬頭跣足之子莫不觀感興起漸化而為良善矣謹奏此奏引苖向化是或一道亦當與撫臣㑹商可否同日又奏為據實陳明仰祈睿鑒事本年九月內臣在大定州考棚懸牌於二十日考試畢節縣文童忽於十九日有畢邑生員邵藩奭指稱童生邵汝鈞為伊家奴同族人邵景奭等混行攻打經大定州知州蘇霖泓將邵景奭等拏至州署責禁隨有劣生糜粢盛等往教官寓中尋覓保邵汝鈞之廪生毆打復令童生傅才選等取去邵汝鈞試卷致將册卷搬散據提調官知州蘇霖泓詳報臣以考試事關巨典豈容劣生肆行無忌一面鎖拏為首生童交提調官嚴審一面出示畢邑童生候具題另考隨據大定平遠畢節等州縣各官詳據合邑生童再四懇求轉請收考臣查童生與事者不過二人其餘皆安分讀書不相關涉仍示期考試今據知州蘇霖泓等審擬邵藩奭指邵汝鈞為家奴事雖有因但年代久遠已無契劵可據臨考攻擊明係借端生事殊屬不合已將生員邵藩奭等除名分别杖責枷示童生傅才選等俱夾訊杖責其為首指使童生擅取試卷之糜粢盛雖經除名預先逃避現在嚴拏俟緝獲到日審擬結案臣按試之時有此一事理合據實奏聞至臣初蒞外任不諳律例邊郡愚蒙為細故而干國憲應否從寬發落伏乞聖恩指示施行謹奏邊方愚頑無知藐法自當題參嚴加懲處以申功令似此罷軟姑息將就完結殊屬玷職同日又奏為恭懇皇上頒賜御製朋黨論一册廣布學宮以正人心以端學術事本年十一月內皇上頒賜御製朋黨論於撫臣及布按二司臣從平越回至省城始得恭覩宸章口誦心維手舞足蹈臣以微員何敢邀天文之錫獨念黔省五十一學士子鄙陋寡識往往糾黨營私致被褫責仰懇聖恩俯加憐憫特賜朋黨論一冊容臣摹勒上石刷印數百本齎送各學令司鐸之員於朔望日召集生童宣揚聖教使遐陬僻壤人人知立身報國之大義處則為鄉黨自好之士出則為夙夜匪懈之臣人心以正學術以端黔省士子永荷生成於大造矣謹奏該部議奏同日又奏為黔省寄籍廪生改歸壅滯仰懇聖恩暫免撥回事竊臣於雍正二年五月初四日題請禁革童生冒籍之弊部議准行并令撥歸從前寄籍生員奉旨依議臣現在遵依部劄查明别省冒籍者不論廩增附生武生盡數撥回至本省寄籍生員亦逐處清查改正惟是各學廪生食糧有定額挨貢有定序一旦改歸多寡不均難易頓别如貴陽安順兩府學黃平黔西兩州學各多至五六十名廪糧難給出貢無期似屬未便至於偏僻州縣如永寧永從等州學縣學本籍廪生不過三五名出貢補廪又覺太易此臣原疏所以不敢遽請撥回也查黔省通融考試原奉題定之例亦有童生自就本籍應試而歷任學臣以已意撥往别學者較之他省私自冒籍者實有分别仰求聖明憐念寒生食廪出貢之難許臣先將增附生武生撥回其廪生暫免改撥一遇本生中式出貢等事即行改歸原籍寬限數年悉當釐正黔省諸生感戴聖恩無既矣伏乞皇上敕部施行謹奏此事可否通融當與督撫酌議㑹題何得自具密摺奏請觀爾數奏殊不妥協將朕此諭與毛文銓看爾等妥商具奏愼之愼之硃批諭旨卷一百七十二
