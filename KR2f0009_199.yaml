body:
  text: 欽定四庫全書硃批諭㫖巻一百九十九硃批吳關杰奏摺雍正二年八月初四日山東兖州府知府臣吳關杰謹奏竊臣蒙皇上特達之知簡任兖州府知府無時不以民生為念自上年到任後見荒旱情形目覩心傷百計撫慰遽難安集幸頼我皇上捐賑頻施䖍誠祈禱以致雨𤾉時若上年秋收與今年麥熟均有六七分目下秋収更倍往昔據百姓僉云二十年來無此収成雖有蝗蝻生發隨即撲滅幸不為災臣因盤查捕蝗毎至州縣僻壤見黄童白叟鼓腹含哺咸頌我皇上敬天勤民所以上感天和下惠黎庶人歌大有户慶豐登為此繕摺奏聞謹奏知道了幸遇如此豐年亟當勸導百姓積蓄蓋藏此為要務爾之官聲雖無不好之處亦未登上好之列朕意尚以為不足勉為之莫負朕簡用之恩同日又奏臣伏查闕里誌曲阜縣知縣自唐以來間授孔氏後裔至宋皇祐三年詔復於孔氏子弟中選用金元以衍聖公兼知縣事為世襲縣尹明季改為世職由衍聖公保舉嘉靖以後不由衍聖公保舉我朝初由衍聖公咨部題授等語今現任曲阜縣知縣孔衍澤於康熙五十一年由衍聖公保舉補授自臣履任後毎遇曲阜呈狀無論事之大小非孔氏族人即孔氏親戚縣官威令固不能行而情面亦不能却諸事掣肘甚難歸結臣查世職知縣原以聖人之鄉用聖人之後綿聖澤恤聖裔也今由衍聖公保舉未免有所牽制且世職知縣與各縣知縣一體處分又不得與各縣知縣一體陞轉是降罰有分而陞遷無望至保舉不按宗支遇族人有事質審公庭往往以卑幼責懲尊長於理有未順而於情亦有未安臣請將現任知縣孔衍澤調任他邑如該令别有事故缺出仍令衍聖公保舉一人咨部籖掣於別省補用則世職之恩依然如故而曲阜知縣仰祈皇上揀選補用既非孔氏族人而又不由保題則自無瞻顧遇事可以執法於民生不無小補臣係小臣何敢冒昧妄陳因為地方起見所以冒瀆天聽伏候睿裁謹奏此事應呈稟撫臣竟自奏達未免涉於越分仍具詳該撫等商妥再行轉奏方是朕思曲阜縣令其來已久似不便更張爾等撫司道府如果能執正無私不瞻顧情面稱職者留不勝任者去則保舉自當得人矣倘遇其尊長輩質訊對理之事不妨詳明上司另委賢員審鞫亦未為不可當再加斟酌同司撫合詞具奏雍正三年五月十七日山東兖州府知府臣吳關杰謹奏竊臣蒙皇上隆恩末由報稱毎於國計民生無不細心體訪今年二麥收成八分至五分不等目下連得大雨秋禾又皆下種秋收有望抑臣更有聞者山左多山各州縣向有不墾之地蒙聖祖仁皇帝深仁厚澤浹洽寰區生齒殷繁故不毛之地毎多開墾成熟陞科然而山地廣濶間有歴年漸懇未經報部相沿日久隱漏頗多州縣官誠恐一經通報勢必根究反多未便以故因循隱匿臣思寸陬尺壤皆屬王土豈可終於不報惟祈我皇上洪慈令各州縣自行據實陳明赦其巳往徵其將來自雍正四年為始盡行報部歸入正額其雍正三年以前縱有州縣自用或充公用者概予弗問清查之後仍有絲毫隱匿從重治罪則百姓竝無加損而於國課不無小補臣為錢糧起見冒昧瀆陳伏候聖裁謹奏此亦摹倣田文鏡之行為耳然有心學好則好即為所有矣呈稟撫臣具疏題奏同日又奏竊臣於雍正元年五月間恭接御製訓誨知府上諭臣跪讀之下仰見我皇上聖明天縱官方民隱事事周知雖典謨訓誥無以復加臣隨敬録一幅懸掛堂中朝夕瞻仰身體力行一年之中覺有遵循隨於雍正二年冬月謹照臣鄉學宫明倫堂刋刻大學聖經一章於屛門之例鐫刻上諭於大堂屛門之上時凜天顔於咫尺勿忘聖訓於湏臾觸目警心甚為有益臣請皇上於各省文武大小衙門各照明倫堂於屛門上刋刻聖經之例一體刋刻上諭於大堂屛門之上俾在外諸臣各知則傚共相勉勵庶於吏治稍有禆益謹奏此等迎合之舉皆可不必況爾未具超羣出類之資果能身體力行克盡爾分内之事則亦可矣似此多事涉及分外朕殊不喜雍正五年二月初一日山東兖州府知府今陞湖廣辰沅靖道臣吳關杰謹奏為恭謝天恩事竊臣一介庸愚至微極陋蒙皇上特恩由郎中拔授兖州府知府抵任以來深愧一無報稱虛糜廩祿今又蒙聖恩陞授湖廣辰沅靖道聞命自天感激無地臣何人斯遭此隆遇受恩愈重圖報愈難惟有竭盡心力以期不負我皇上特達之知遇也臣交代事竣領憑赴任俟到任後有應奏請事容臣於湖南撫臣處轉呈合併聲明為此繕摺奏謝謹奏爾任兖府數年以來雖無甚不好亦屬庸常無奇今授爾此職非朕嘉奬而擢用之也至新任當勉力自效毋得錯㑹朕意若以向日所聞尚料爾未必能清楚交代今既舊任事竣行矣勉之布蘭泰非陳世倌可比慎之毋忽硃批諭㫖巻一百九十九
