body:
  text: 欽定四庫全書硃批諭旨巻一百五十二硃批景考祥奏摺雍正三年五月初四日廵視臺灣監察御史臣景考祥謹奏為敬宣敕㫖據實回奏事竊臣面聆聖訓著臣宣諭總兵林亮臣於四月二十七日至臺之時因敬宣皇上諭㫖名亦好聖心甚是注念爾此後更要加意做好官凡爾所屬大小將官以及兵丁人等爾當着實教訓伊等倘有不是處爾係將主當時時存公忠之心不可稍徇情面伊等能遵爾之約東乃是守朝廷之法度務要人人小心謹慎安分盡職方不負皇上委任封疆大臣體恤逺方將士之至意欽此該總兵隨叩頭領㫖訖臣又向林亮云總鎮當即傳知各營將官以便回覆聖㫖至五月初二日隨據總兵来文内開據本標各營大小將官等呈稱職等䝉傳宣聖諭跪聽之下咸知凛惕益加黽勉小心謹慎安分盡職守朝廷之法度聽將主之約束俱各實心遵行不敢違犯合具欽遵呈覆臣謹備述縁由繕摺覆旨謹奏知道了但務文武和衷安輯地方爾等果實力任事朕之耳目自能周悉雍正三年五月二十五日廵視臺灣監察御史臣景考祥謹奏恭請皇上聖躬萬安朕安所奏三摺俱悉閩鹽之奏甚屬可嘉此事朕巳早聞因其中備細尚有不確所以未經整理凡百咸能如此據實無隱方為不負朕之任用也勉為之雍正三年十二月二十八日廵視臺灣吏科給事中補授福建運使臣景考祥謹奏為恭謝天恩敬陳下悃仰邀聖鑒事竊臣一介庸愚至微極陋荷䝉聖恩頻加委任自愧才識淺陋寸長未效兹於雍正三年九月内復䝉特㫖補授福建運使協理鹽務臣聞命之下感激彌深悚惕無已隨於十一月二十日自臺灣起程十二月十五日到臣衙門任事訖謹循例備文詳呈撫臣代為題達恭謝天恩竊念臣在臺灣半載訪察利弊尚多應行事宜謹繕奏摺恭呈御覽伏乞皇上採擇俾得盡犬馬之微忱謹奏既用汝運使後方聞汝聲名不妥頗不安静果若此殊為大負朕恩矣慎之硃批諭㫖巻一百五十二
