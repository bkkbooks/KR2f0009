body:
  text: 欽定四庫全書硃批諭㫖巻一百七硃批佟世鏻奏摺雍正元年五月二十日河南南陽總兵官臣佟世鏻謹奏為南鎮霖雨及時二麥均收恭進新麥仰慰聖懷事竊臣查南汝地方各州縣霖雨及時二麥收成皆足八分而南陽之西南浙川鄧州等州縣二麥更加茂實户慶豐年民歌大有臣荷䝉聖主隆恩鎮守南汝不時緝查各汛地方俱皆安静臣不勝欣幸為此恭進新麥上慰聖懷謹奏覽奏深慰朕懷但一切務湏據實不渉粉飾方足取信耳雍正元年五月二十五日河南南陽總兵官臣佟世鏻謹奏為敬陳管見恭請睿裁事竊南陽一鎮統轄七營五十二州縣汛地各營將備千把共四十七員有一縣一千把者有兩州縣一千把者惟汝寧府屬信陽確山遂平三州縣僅一千總防守查此一州二縣衆山連絡盜案甚多且係楚豫通衢臣愚以為地方既屬緊要全在盤詰姦宄汛防周宻三州縣僅千總一員兵丁八十七名何以資彈壓而嚴稽查臣謬陳管見請將現在千總一員仍防守信陽一州其確山遂平二縣另添把總一員駐劄確山廵防二縣信陽一州舊有兵四十七名無庸添設其確遂二縣汛兵僅有四十名湏另添五十名於汝寧各弁之公費占役兵内選補派入可以不湏增募惟湏添設把總一員以資防守庶免鞭長莫及之患是否可行伏乞睿裁指示以便㑹同撫臣具題謹奏所奏甚是如此方見實心任事朕深為嘉悦添設把總一員或二員皆可㑹同撫臣具疏題奏雍正元年八月初六日河南南陽總兵官臣佟世鏻謹奏為請補幹員以裨益營伍事竊臣標左營中軍遊擊一缺為七營之首領且有兵馬糧餉專責必得幹員方克勝任查有臣標右營遊擊王瑞材乆諳營務實心任事若以調補中軍遊擊誠為人地相宜又有臣標右營守備周三竒人材健壯辦事勤愼堪以陞補右營遊擊之缺但河南原無題補之例臣為營伍地方起見是以據實奏請應否准行伏乞皇上睿鑒批示以便具題謹奏爾自抵任以來實心任事營伍較前整飭大有可觀朕深為嘉賞益當勉力辦理以圖上進遇此等缺出如得勝任之人只管奏請不必畏懼應否准行朕自明白批諭此中軍一缺因已補用有人今𤼵該部查議若可轉移仍照爾所請行其静候部議可也特諭雍正元年九月十八日河南南陽總兵官臣佟世鏻謹奏為南鎮秋稼告成地方安静仰慰聖懷事竊臣查南汝地方夏麥豐收之後家有蓋藏民多饒裕入秋以來禾黍暢茂惟於成實之候雨澤遲早不一不能十分豐足詳勘兩府秋成計有七分俱已收穫至鎮屬各營士卒臣不時操練嚴飭廵防地方俱各安静為此繕摺奏聞伏乞睿鑒謹奏覽奏大慰朕懷凡事只以據實直陳為是勉之雍正元年十一月二十八日河南南陽總兵官臣佟世鏻謹奏為地方寧謐瑞雪及時據實奏聞仰慰聖懷事竊查臣鎮屬荆紫闗界連秦楚為三省隘口甚屬緊要臣親廵其處將闗門堡牆損壊之處并各路墩臺堡房之坍塌者俱咨明撫臣轉飭州縣修築其旗幟軍械牌架等項臣已捐俸逐一添整鮮明又於緊要隘口添設兵丁以嚴防守又慮汛守兵丁平素不諳緝盜諭各營將兵丁内挑選技勇聖主一人有慶地方俱各安静且查南汝二府今嵗秋成之後二麥俱已播種昨十一月二十八九日連降瑞雪四野均沾將來二麥自可豐收矣理合一併奏聞謹奏覽瑞雪情形朕懐深慰同日又奏為恭謝天恩事竊臣齎摺家人捧回硃批諭㫖並欽賜火鐮包鼻煙壺到臣臣隨郊迎至署恭設香案望闕叩頭謝恩袛受訖伏念臣謬膺重寄毫無報稱䝉皇上恩訓頻加寵頒屢及臣感激寸誠銘心鏤骨又於十月十六日得接部劄欽奉硃批諭㫖將遊擊王瑞材守備周三竒照臣所請補用臣聞命之下益深感奮惟有益加砥礪恪勤供職以期無負天恩高厚已耳為此繕摺奏謝謹奏知道了聞爾聲名甚好更當加勉可也雍正二年三月十五日河南南陽總兵官臣佟世鏻謹奏為禾稼得雨墩堡告成據實奏聞仰慰聖懷事竊查去冬南汝兩府得雪之後二麥俱皆𤼵生今於本年二月二十二十一日及三月初三初七等日屢降甘霖四野霑足麥苖日見暢茂榖黍俱皆播種再查臣鎮屬各路墩臺堡房俱經修葺軍械亦俱完整惟荆紫闗門牆堡房臣咨撫臣轉飭之後有司方興工作築壘需時俟告竣另具摺奏今查得春雨及時地方寧謐理合據實奏聞謹奏所奏朕嘉悦覽之爾之實心任事處朕俱洞悉勉之毋懈雍正二年閏四月二十八日河南南陽總兵官臣佟世鏻謹奏為南鎮二麥豐收秋禾茂盛恭進新麥仰慰聖懷事竊臣查南汝地方各州縣二麥收成皆足八分而南陽之西南浙川荆紫闗及桐柏縣等處二麥更加豐收現在各處秋禾暢𤼵人民樂業地方寧謐臣不勝欣幸今將新麥恭進上慰聖懷下達蟻悃為此謹奏二麥豐收朕懐甚慰撲捕蝗蝻勤惰光景如何據實奏聞雍正二年六月二十九日河南南陽總兵官臣佟世鏻謹奏為遵㫖據實奏聞事竊臣奏二麥豐收一摺奉硃批令臣將撲捕蝗蝻光景據實奏聞欽此臣查訪得開封府之原武中牟懐慶府之河内温縣武陟修武河南府之鞏縣衞輝府之獲嘉新鄉輝縣等處俱有蝗蝻生𤼵先經撫臣石文焯委員查勘後漸生羽翼於五月二十二日羣飛過河至開封府新鄭縣地方係臣鎮所屬隨委守備㑹同有司已經撲打淨盡隨後忽有遺下蝻子生𤼵臣復嚴飭撲打現在撲滅將盡其禾苖幸未傷損至中牟河内温縣修武鞏縣輝縣俱經有司撲打已盡惟原武武陟獲嘉新鄉等縣現在有蝗俱係百姓自捕遺下蝻子漸生羽翼又復延飛而原武之茨菇堤並獲嘉之亢村驛張家堤等處飛蝗現今更盛高糧豆榖食傷過半此各處撲捕蝗蝻情形謹據實奏聞伏乞睿鑒謹奏知道了百凡惟宜務實倘渉隱諱及有絲毫迎合處被朕於他處聞知則自取輕棄矣爾之官聲甚好當竭力保全始終雍正二年九月初六日河南南陽總兵官臣佟世鏻謹奏為南鎮地方寧謐秋稼豐登恭進方物仰慰聖懷事竊查南鎮各路地方俱各寧謐汝南各州縣秋稼登場榖黍收成俱有八九分不等兹値萬寶告成謹將臣鎮屬汛内出産之岡榴木瓜購選敬貢上達蟻忱外所有奉到御批奏摺理合恭繳謹奏據奏秋成甚為欣慰此皆爾等地方文武大吏和衷任事安戢兵民有以感召天和之所致也勉之雍正二年十一月十六日河南南陽總兵官臣佟世鏻謹奏為奏明事竊臣廵查鎮屬荆紫闗界連秦楚為三省隘口臣因見無闗門牆堡難以防守經臣具摺奏明咨㑹撫臣修築今已告成至於臣鎮屬七營旗幟鳥鎗弓箭帳房什物臣抵任時查驗缺少屢飭設法添補今皆漸次修整第查軍器之利者無過於鳥鎗籐牌聞各省營標有籐牌者甚多惟臣鎮屬各營向未預備臣今與各營將備情願公捐置造籐牌二百四十面分派各營雇覓敎習不時操演庶軍威壯而武備修矣其籐牌現在差員辦造理合奏明謹奏據奏各營捐造籐牌雖云出自情願切湏檢㸃勿令借滋扣尅之弊悮汝一生功名上進之途也雍正三年正月二十四日河南南陽總兵官臣佟世鏻謹奏為恭謝天恩事雍正三年正月初四日撫臣田文鏡差把總齎捧御書福字到臣臣出郊跪迎進署恭設香案望闕叩頭祗受訖敬瞻宸翰感戴靡涯惟有持躬率屬恪勤供職以期無負天恩於萬一耳謹奏爾係大可上進之人惟宜孤介自持為要其勉為之雍正三年四月二十四日河南南陽總兵官臣佟世鏻謹奏為恭報得雨仰慰聖懷事竊臣鎮屬南汝歸德三府於正月二十二十四等日得雨之後二麥茂盛豐收可期不意三四兩月雨澤愆期二麥結實不能豐滿至四月初三初七等日連次得雨俱有三寸四月十四日臣奉㫖前往桐柏縣致祭敕封東瀆淮神於十七日抵桐即落微雨十八日大降甘霖今臣於二十一日回署查得南陽府屬各州縣俱於十七十八日霖雨透足早禾皆已發生晚禾現在播種其二麥收成約計四五分不等至汝寧歸德兩府得雨分數日期以及二麥收成分數臣已差員分路細查俟查明另奏謹先將南陽府屬州縣得雨日期據實奏聞謹奏所奏已悉紀成斌居官如何據實奏聞朕前諭爾以孤介二字自持若不能回奏則上進亦在所不能矣從京趕馬到豫分派營伍一事如何情由其據實陳奏如知悔過朕猶寛恕若仍欺隱恐未必妥也硃批諭㫖巻一百七
