body:
  text: 欽定四庫全書硃批諭旨卷二百十硃批楊馝奏摺雍正八年十月二十六日西安按察使臣楊馝謹奏為請旨事竊臣一介庸愚至微極陋由縣令歷升郡守洊至監司今復蒙聖恩升授陜西西安按察使臣自顧何人膺斯特簡惟期勉竭駑鈍矢公矢慎察吏安民恪供職守以仰答聖主髙厚於萬一惟是西秦地處邊要幅員遼濶政務殷繁臬司一官總滙刑名責任綦重臣才識疏淺時切惶懼仰懇聖慈容臣輕騎赴闕瞻仰天顔跪聆訓旨庶於地方事務皆得欽遵奉行不致稍有隕越矣所有虔請聖訓微誠理合繕摺恭奏伏乞皇上睿鑒施行謹奏勉盡厥職何必赴京請訓百凡惟以誠實為貴若巧黠居心趨避是務則大失朕簡擢之意矣識之雍正九年四月初二日西安按察使臣楊馝謹奏為恭謝聖訓事竊臣前具摺奏請陛見於雍正八年十二月初一日奉到硃批諭旨臣即恭設香案望闕叩頭謝恩虔誦訖伏念臣賦質愚魯識見淺陋仰荷天恩授以臬司重任時切綆短汲深之虞今蒙天語提撕訓旨諄切臣鏤心刻骨惟有欽遵聖訓實心實力黽勉辦公務期竭盡忠誠不敢稍存私念以仰副聖主訓誨宏恩於萬一耳所有原奉硃批奏摺理合恭繳謹奏覽奏知道了勉力為之毋玷官針同日又奏為敬陳一得之愚仰祈睿鑒事竊查問流人犯雖犯案不同大約窮苦者居多到配之後資生無䇿每向里民橫行勒索甚至於集鎮交易處所恃強取討里民恐其脫逃受責不敢與爭只得隱忍湊給久之習慣成俗流民竟視為分所應得毫無顧忌是以有罪流民養成遊惰反令無辜赤子受纍無窮臣再四思維似應定為安置之法請嗣後解到流犯飭令該州縣當堂訊問該犯向習何業查其所攜資囊稍可自給者聽令各照本業自謀生計仍取具該里甲收管責成看守如係貧乏不能自給而年力強壯者應令該州縣於額設各項夫役內酌量令其充當給以工食以為養贍如有頑梗即行責懲至於流犯到配後年老疾病不能自食其力者該州縣官驗明撥入養濟院內給以孤貧口糧以養餘年如此定為分别則里民不致受纍擾害而流民治生有策并免脫逃之弊矣臣謬獻芻蕘以僃採擇伏乞皇上睿鑒施行謹奏將此事言之撫臣武格等具疏題奏請旨如或撫臣不以為然與爾意見有不同處令其明白詳悉摺奏以聞朕更命碩色會同再加商酌雍正十一年四月二十六日西安按察使臣楊馝謹奏為敬陳管見仰祈睿鑒事竊臣一介庸愚仰荷天恩畀以秦臬重任晨夕兢兢凡有關於吏治民生者靡不悉心籌畫以圖少報涓埃伏查承審案件縣州府司歷經確審申解督撫各有責成不可逾越缺略所以州縣審擬申解情罪未協知府即可就近駁訊惟是直隸知州一官其責同於知府所有屬員承審案件俱從該州審轉而直隸州自理一切刑名事件既無專轄查審之員一徑解司議擬妥協者便可審轉呈解督撫倘情罪不符勢必駁查離省窵逺人犯往返難免拖纍臣思直隸知州固不隸於知府而上有該管道員可以就近核審移解且查承審限期如四箇月限者州縣限兩箇月府州限一箇月六箇月限者州縣限三箇月府州限箇半月一年限者州縣限七箇月府州限兩箇月今直隸本州案件無專轄承審之分扣是一官而兼兩官之限為期似覺太寬臣查陜省直隸各州倉庫錢糧俱由該管道員盤查出結官方賢否亦由該管道員出具考語咨牒兩司詳請保題實授他如疏防諱盜諱命等項該管道員均有管轄處分之責是道員之於直隸知州原係親臨上司臣愚以為陜省直隸興安同華商乾邠耀葭鄜綏德等十州其本州一切刑名命盜等案嗣後請照盤查倉庫詳請實授之例悉歸該管道員照依知府承審之限核審出看牒移解司如有情罪未協該道員即行就近駁訊如此則直隸州自理之案件不至草率拖延而情罪亦得彼此詳慎酌議自免出入之愆至於該道員一切承審處分悉照知府之例分別察核似於刑獄重案或有裨益矣臣不揣愚昧謹獻芻蕘是否有當伏乞皇上睿鑒施行謹奏言之督撫二臣聽其酌定雍正十一年十二月二十八日西安布政使兼管河東鹽務臣楊馝謹奏為恭謝天恩伏乞睿鑒事雍正十一年十二月十五日奉到部文內開雍正十一年十一月二十四日內閣奉上諭湖北布政使印務著陜西按察使楊馝署理欽此臣即望闕叩頭謝恩遵於本月二十日詳委交印正在束裝起程間又於本月二十四日奉署撫臣史貽直牌文內開雍正十一年十二月二十三日準兵部火牌遞到內廷頒發奏匣一件雍正十一年十二月十三日內閣奉上諭碩色補授西安巡撫史貽直仍暫留西安總理巡撫並一切軍需事務俟諸務妥協伊可以來京時再具奏請旨楊馝補授西安布政使兼管河東鹽務西安按察使員缺著何師儉補授西安驛傳道員缺著鳳翔府知府任晟補授其西安督糧道並鳳翔府知府員缺著該督撫揀選委署題補欽此臣復恭設香案望闕叩頭謝恩訖竊臣一介庸愚屢荷皇上殊恩由府道而至按察使巳邀非分之榮今蒙天恩命臣署理湖北布政使印務復蒙特授臣以陜西布政使兼管河東鹽務聞命自天感激無地臣何人斯疉蒙隆恩如此之極惟有益加勉勵矢公矢慎不敢少存因循苟且之心以圖仰報皇恩於萬一除另行遵例詳請撫臣代為奏謝外所有微臣感戴下忱合先恭摺奏聞謹奏覽奏謝知道了感恩圖報固好須將汝等漢軍向來陋習滌除淨盡其一切老練巧猾伎倆絲毫勿用惟以公誠之心行平實之政則無往而不合乎繩墨矣竭力勉為之莫負委任雍正十二年六月初八日西安布政使兼管河東鹽務臣楊馝謹奏為恭繳硃批諭旨并謝天恩事竊臣蒙皇上天恩補授陜西布政使兼管河東鹽務具摺恭謝奉到硃批臣隨望闕叩頭謝恩訖伏念臣庸材陋質荷蒙皇上鴻恩不次擢用既授陜省布政使司復諭總理河東鹽務責任愈重圖報愈難臣惟有凛遵聖訓益加勉勵竭盡血誠潔已率屬以仰報髙厚隆恩於萬一所有奉到硃批奏摺理合恭繳並謝天恩伏祈睿鑒謹奏今命汝署理湖北撫篆巳有旨矣其倍加勉勵以副任用雍正十二年六月十三日署湖北巡撫臣楊馝謹奏為恭謝天恩仰祈睿鑒事雍正十二年六月初九日接陜西巡撫案驗內開本日準吏部咨開雍正十二年五月十七日內閣交出奉上諭協辦西路軍需副都御史二格巳準給假回京其西路軍需事務著湖北巡撫德齡前往協同署督劉於義辦理湖北巡撫印務著西安布政使楊馝前往署理西安布政使印務著河東鹽運使程仁圻前往署理河東鹽運使印務著大理寺少卿髙山前往署理欽此欽遵到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣謭劣庸材至愚極陋蒙我皇上特恩補授陜西布政使兼管河東鹽務半載以來涓埃未報茲復欽承恩旨著臣署理湖北巡撫印務聞命自天悚惶無地臣何人斯膺此封疆重任惟有恪遵聖訓殫心竭力正已率屬益加黽勉以仰報聖主髙厚隆恩於萬一耳除將陜西布政使司任內一切軍需錢糧事件備造清册俟署司程仁圻到任交代清楚即行起程前赴湖北外所有微臣感激私忱理合繕摺奏謝伏乞皇上睿鑒謹奏勉為之毋負知遇之恩雍正十二年七月二十一日署湖北巡撫臣楊馝謹奏為恭報微臣起程日期事竊臣蒙聖恩畀署湖北巡撫茲據署西安布政使程仁圻於七月十五日到任臣隨將一切經手事件及軍需錢糧逐一造册僃移交代清楚臣謹於七月二十一日起程赴楚除一切應行事宜容臣抵任後盡心辦理不敢貽誤懈弛致負皇上擢用深恩外所有微臣起程赴任日期理合奏聞伏乞睿鑒謹奏覽奏自陜起程日期已悉撫任統率全省文武更非藩臬可比將巧宦二字盡情擺脫秉公竭力奬善懲惡務以實心整飭地方夫居官行政不外察吏除暴為先致身報國為本倘少涉權譎即虧忠誠忠誠有缺則不能下協輿情上感天和也如汝輩老吏以經歷諳練處而論較諸新進後生何啻霄壤然不能置利害於度外審公私於幾微舞智預為謝過之謀弄巧先覓立腳之地舉凡此等作為皆屬便已之小利有礙奉公之大道究至大道徒乖小利併失向之所謂自便者適所以自害而已類斯顛倒愚昧之見亟須看透將謬妄頽風竭力挽回上益國家下濟生民垂名竹帛遺福子孫不亦美歟勉之雍正十二年十月十八日署湖北巡撫臣楊馝謹奏為敬陳現在辦理案件事一刑讞事關緊要湖北府州縣向來承辦欽部案件率多拖延不結甚至案情遊移前後互異疉參遲延臣到任後嚴行申飭凡一切塵案徹底查催隨到隨即審一今歲秋成豐稔臣前經恭摺奏聞但小民收穫之後正值錢糧輸納之時誠恐不肖州縣重耗纍民臣仰體皇上愛養元元至意多方密訪倘有貪酷劣員并廢弛吏治實迹者立即糾參其書役需索糧戶等弊臣是訪察得實即飭司道嚴提究處不敢寬縱長姦致貽民害一楚省乃水陸通衢商客雲集之區盜賊最宜防範臣與督臣邁柱不時嚴飭文武各官設法捕緝並力行保甲以靖盜源其餘私鑄私宰賭博掏摸陋恐有不當之處仰懇皇上天恩時賜訓誨俾臣得有遵循以免貽誤伏祈聖鑒謹奏勉力盡職以副委任雍正十二年十二月初三日署湖北巡撫臣楊馝謹奏為奏聞事竊照鹽政最關緊要臣蒙皇恩署理湖北巡撫於到任之初即訪察要隘并將鹽政應行事宜檄行鹽道查議復通飭各屬加意巡緝凡與江西淮北長蘆河東川廣接壤之區又經備移鄰省督撫各嚴疆界設法堵緝在案至本省一切隘口臣復會同督臣邁柱不時嚴飭文武各官并添撥兵役查拏所獲私鹽必根究由來以警失察又淮商設立卡巡其法頗善但日久不無懈弛而原設尚未周密臣查卡巡本係各商親友彼此原無統屬若不分別優劣恐無以示勸懲如緝私有方者應加奬勵庶各鼓舞急公其疏忽廢弛者亦當革換俾知警惕再查各商與牙販行戶買賣交易多有拖欠情弊呈控有司又復延擱不追臣思鹽價乃商人血本豈容拖欠隨通飭嚴禁凡告追之案責成知府勒限催追并令按季造册報查以稽勤惰臣恪遵聖諭協力辦理夫積引難銷誠宜堵緝鄰私而卡巡懈弛尤貴分別勸懲至牙販人等拖欠鹽價已經立法催追如此庶積引漸次疏銷而商本源源接運以仰副皇上恤商裕課之至意謹奏覽奏裨益鹽政各事宜可謂得其要領詳慎為之雍正十三年正月十七日署湖北巡撫臣楊馝謹奏為恭報瑞雪事竊照二麥在地全賴冬雪及時則土膏滋潤茲於十二月三十日午時起至正月初一日夜省會武昌府及附近漢陽府地方瑞雪繽紛積深尺餘續據黃州安陸德安荆州襄陽鄖陽歸州等七府州開報同日得雪情形自尺餘至九寸八寸七寸五寸四寸三寸不等通省普沾臣伏思元旦為一歲之首我皇上敬天勤民感應如響瑞雪應時而降不惟麥苗益茂抑且預兆豐年臣曷勝欣慶惟有恪遵聖訓益加兢惕敬迓天庥所有湖北瑞雪情形理合恭摺奏報仰慰聖懷伏祈睿鑒謹奏履端之辰闔省普霑瑞雪以手加額覽焉今命汝往撫四川其倍加勉勵蜀省居西南一隅乃邊疆重任務須確秉公忠令屬員誠服兵民感畏方為無忝厥職所交察審事件會同申珠渾詳慎審理毋得絲毫涉於瞻徇特諭雍正十三年二月十五日四川巡撫臣楊馝謹奏為恭謝天恩事竊臣雍正十三年二月初八日準吏部咨開雍正十三年正月二十二日奉上諭四川巡撫員缺著楊馝補授即速赴新任欽此欽遵移咨到臣隨恭設香案望闕叩頭謝恩除具本奏謝外伏念臣一介庸愚知識淺陋仰荷皇上隆恩屢膺重任臣矢竭駑駘涓埃未報茲奉恩旨授臣四川巡撫聞命自天感愧無地竊思西屬為苗疆邊隅撫綏安輯之道敢不夙夜圖維而因時因地之法尤貴措施得當臣惟有恪遵聖諭益勵臣職事事實心實力刻刻主敬主誠以期仰答髙深於萬一耳所有感激下悃理合具摺恭謝天恩伏祈睿鑒謹奏朕惟訓汝竭力勉一公字餘無多諭雍正十三年五月初八日四川巡撫臣楊馝謹奏竊刑讞之道必須精思熟習講明有素俾臨民治事判決允當蓋明刑所以弼教我皇上勵精圖治中外一體初無區別於其間也臣查川省司道府州縣將一切題達事件不按成憲率多錯謬甚至刑讞重案援引議擬輕重失宜有一案之中供看遊移情罪互異兩岐三截顛倒夾雜不明讞法體式難以據入章奏詢問其故皆以邊末遐方吏胥未諳向來如此臣數月以來事無巨細詳加指示駁飭復擬格式心辦事亟宜加意整飭務各去偽存誠始有裨益之別省倍多臣檢查各案逐一察核矢公矢慎期於平允以仰副聖主明慎用刑欽恤民命之至意查通省人犯共計二百五十二起二百六十一犯臣等謹議得楊文炳等十一起擬為情實袁述等二百四十二起擬為伏祈皇上睿鑒謹奏汝前歷數任於每到之初輒有如是一奏頃汝離楚境吳應棻接任後據稱伊閲歷數省從未見吏治廢弛如湖北之甚者汝尚何顏鼓弄脣舌復具此一奏耶今於斯任若仍前怠忽不實力整飭須防纍及身家凡百臣工但當確秉公忠實心為國盡其在巳以奉乃職倘倚仗權勢惟鑽營是務而欲以巧詐之術欺誑君上殊非良䇿夫督撫大吏為全省表率非有司下僚可比一一所行皆至朕前其間是非皎然難逃鑒照豈他人所能周旋護持為福作禍者哉如鄂爾泰今日為朕所倚任即為權勢所在然亦係朕所畀與伊非敢自立權勢也其如無知小人祇圖暫時倚庇槩置利害公私於不計何自兹以往其痛加悔勉更勿以虛飾空言冀邀朕之嘉許慎之戒之雍正十三年六月初八日四川巡撫臣楊馝謹奏為遵旨具摺明白回奏並謝聖訓事接大學士臣鄂爾泰臣張廷玉字寄內開雍正十三年五月初五日奉上諭吳應棻奏摺可抄録寄與楊馝閲看湖北吏治疲玩公事廢弛如此楊馝居巡撫之任何以全無整理亦並無一字奏聞於朕是何意見若云楊馝在任未久今吳應棻蒞任未及兩月留心體察便巳周知諸弊楊馝安得以受事日淺自寬其咎乎爾等可傳旨詢問楊馝令其具摺明白回奏今四川之任若仍如此瞻徇模稜則大負朕之任用矣決不輕貸欽此遵旨寄信前來等因到臣欽此隨恭設香案望闕叩頭謝恩訖臣跪讀聖訓不勝惶悚慚懼感極涕零伏念臣質夲愚鈍荷蒙皇恩署理湖北巡撫印務於雍正十二年八月十三日任事檢查欽部案件不獨如吳應棻所奏經年纍月拖纍不結且有疉參遲延數年未結之案甚至命案有尸傷屢經檢驗未確尸骨疉經易換未明或因要犯未獲難以懸擬或其間司府州縣承審各官正署疉更以致輾轉遷延事多廢弛臣嚴行申飭將一切塵案徹底查催隨到隨即審題并立三催之法檄行藩臬二司議詳通飭各屬依限速辦以杜沉擱拖延錮弊所有從前數年塵案應題應咨事件臣在任半年竭力清理至藩庫錢糧耗羡尤加意慎重臣以受恩深重凡職分所當為務求實效如屬員中貪贓虧空并廢弛者立即糾參斷不敢姑容即書役等弊亦不時訪拏究懲惟是一省之中司道府廳州縣賢愚趨避不一每當督撫新任不無觀望之習必待振作數月方得就理誠如吳應棻所奏地方官吏如此疲玩倘數月之後仍不能振作另當據實陳奏請旨定奪等語此實各省積習使然難逃聖明洞鑒臣於湖北巡撫任內未能整飭驟效皆由臣之才疏識淺耳目未周咎實難辭乃蒙聖恩寬恕復賜指示誡飭臣敬繹聖訓言言痛切字字深警臣自今以往痛自切責知非補過凡川省吏治惟有殫心竭力體察整理事事據實奏請聖訓指示遵行斷不敢因循苟且瞻徇模稜上負天恩自貽罪戾理合遵旨具摺明白回奏并陳感激下忱叩謝聖恩伏祈皇上睿鑒謹奏似此認咎直陳不事文飾情尚可恕但當奮興砥礪以期無忝此任否則未必有人能始終庇汝不至覆敗也同日又奏為據實奏聞事竊查鹽茶驛傳道顧贄接受參道曹源邠交代一案巳逾半載始據造册請題臣思該道所管錢糧多至二十三萬有奇豈容違例不由藩司盤查出結率請具題臣一面駁飭一面行知藩司乃顧贄遂改用鹽課宜加等事仍造册呈送到臣并據面稟曾見邸鈔他省不用盤查等語臣因顧贄任性偏執隨檢查廣西福建江西等省盤查成案指示開導嚴行誡飭伏思定例責成藩司盤查者無非為慎重錢糧起見詎顧贄始終偏執不識何心臣復留心體察聞伊所用幕友即參道曹元邠舊幕並不關防任其出入無忌保無通同彌縫情弊况此缺甫經新設管理鹽茶驛站職任甚屬緊要必得才具優裕明白諳練之員方能振作有為今通省茶引行銷不均顧贄事多未諳且人非誠實難以深信與其貽誤於後莫若陳奏於前可否將顧贄改調鄰省簡缺仰懇聖主特放賢能補授庶鹽茶驛站得人整頓均有裨益矣是否有當伏候聖裁謹奏所奏是顧贄朕原信伊不及係因督撫保薦而加擢用非深知灼見之人也有旨諭部矣同日又奏為奏聞勸墾首墾情形仰祈睿鑒事竊照川省荒僻之地實多可耕之土州縣視勸墾為具文向多因循苟且並未實力奉行即如欺隱一項從前雖經查丈仍有不盡不實所當設法清釐實於國計民生均有裨益臣於到任後將委員先為試行緣由一面具摺奏聞一面敬刊歷年勸墾上諭遍行宣布務使窮鄉僻壤家喻戶曉俾知務本力農為子孫世守之業臣復會同督臣黃廷桂不時通飭既不可怠忽因循亦不容急遽圖功轉滋奉行不善之弊勤者奬之玩者戒之查地方有逺近難易之分陸續據報通計兩月以來各州縣墾荒田地並首出墾熟田地共四十萬一千一百四十餘畝此內民人首報最多者臣即給扁奬勵以開其鼓舞急公之心除俟通省報齊分別首墾新墾上中下則按照年限升科由司彚核至日臣會同督臣黃廷桂察核另行題奏外如委員勸墾得法著有成效臣等核其實迹仰懇聖恩準豫議敘以示奬勸其始終玩忽之員臣亦即據實題參以警懈弛所有試行兩月巳經報出田地四十餘萬畝緣由理合繕摺具奏伏候聖訓謹奏據奏首報最多者加以奬勵開其急公鼓舞之心固屬應行但須通盤詳查細較果其勤力墾荒自當奬以示勸至若今日多報墾熟者即係從前多隱賦稅之輩則免罪為幸復何功之有該牧令中或有丈量不實妄邀議敘以致纍民者尚當查參以為冒濫之戒方為合理同日又奏為恭請聖訓事竊照打箭爐口外地方四面環夷為西藏孔道凡出兵運糧護送喇嘛等事現係署明正宣慰司土婦喇章承辦查喇章之姑桑結本屬明正土司之女嫁與木坪土司雍中七立後因明正司乏嗣桑結回爐襲職即與伊子堅參達結聘娶金川之女喇章為妻冀為日後接襲雍正三年桑結身故先經題準以董卜宣慰司堅參達結承襲明正司之職祇因堅參達結原係木坪宣慰司雍中七立之子不過往來兼管並非常住在爐其打箭爐事務向係伊妻喇章在彼辦理一切差使急公效順毫無遲誤雍正十一年堅參達結病故遺妻喇章駐劄明正司遺妾王氏么么雖生二子年歲俱屬幼稚難以承襲先經請將明正土司印務暫令伊妻喇章署理其董卜土司印務亦請暫令伊妾王氏么么護理統俟伊子長成之日另請承襲在案惟是土民賦性愚拙每以署印不同承襲或有緊要事務恐致呼應不靈今喇章辦理地方甚屬勤謹夷衆悅服若以喇章承襲以資撫馭似於邊陲有益可否照伊姑桑結之例妻繼夫職容臣等另疏題請承襲以專職守以慰夷情出自皇上天恩臣與督臣黃廷桂商酌意見相同理合繕摺具奏伏候聖訓遵行謹奏此事甚有關係其再加詳查確議會疏題請倘該屬員於中或有納賄偏徇隱蔽情故亦未可定不可不審也硃批諭旨卷二百十
