body:
  text: 欽定四庫全書硃批諭㫖卷一百三十八上硃批謝旻奏摺雍正七年十月初六日署理江西巡撫印務太常寺卿臣謝旻謹奏為恭陳應行事宜仰請聖訓事竊臣奉命署理江西巡撫天恩髙厚感激難名竭盡駑駘未足圖報自揣才識短淺曽經具疏奏請陛見跪聆聖訓未蒙俞允隨即星速赴任今抵江西將近一月查閲新舊案卷體訪地方情形通省事務約略得其大概除綜核錢糧操練兵馬嚴查虧空稽察驛遞清理訟獄等項次第舉行外查江省原係內地本為易治惟民情近於刁健如現年錢糧今甫完及五分歷年錢糧迄今尚多舊缺地畝欺隱盜賊未消賭博未絶詞訟每多誣告而借命抄搶尤為惡習更有地方積棍因官所行之事有不便於姦民者動輒假公濟私以罷市罷考挾制官長此由從前過於寬縱遇此等事每以枷責結案未按律例䆒擬以致一處容臣通行查議設法修理大抵江省屬員闒茸者多必應嚴行整飭但稽查州縣責在知府而知府與州縣最親不無徇隱臣一人耳目實恐難周即藩臬兩司管理通省錢榖刑名事務實亦紛繁查向來分巡兩道每自視為承接衙門督率屬員非其專責糧驛兩道亦自謂漕糧驛鹽之外可以不問往往不深體察臣今以饒九南三府仍責成於原管之饒九南道以南贛二府仍責成於原以飭官方以嚴吏治凡此俱臣職分當為之事本天恩於無既矣為此謹奏據汝奏稱江西內地本為易治此語謬矣察吏安民天下總屬一理何難何易前者張坦麟亦言江右非比蘇松繁劇臣力猶可料理朕當即批伊摺內云汝但稍存輕易之心將來必至不能勝任後果應朕諭今汝又言易治二字所以朕更為汝憂之督撫封疆責任惟斯統率屬員一事倘馭失其道不能使之心悅誠服則諸務末由經理百姓從何化導是非不無乖錯刑賞或至倒施將見向之所謂易者反覺甚難而不可為矣然欲邀屬員之感畏又非動輒參劾曲意姑息之所可得必也大公無我將恩怨毁譽置於度外而後不期然而然漸收成效也第能勉此其餘皆屬末節汝其敬之勉之同日又奏為奏聞事竊臣抵江西接准前撫臣張坦麟移送內閣寄字雍正七年閏七月二十日欽奉諭㫖密緝江湖大盜趙七等因到臣臣思趙七既係江湖大盜自必出沒無常往來不定若不確訪蹤跡難於弋獲隨與鎮臣陳王章密商細加察訪因知有南昌縣民王登科向在沿江上下一帶行走即令南昌縣拘拏究訊據供昔年曾與大盜陳三疤子在安慶地方行劫商船一次得銀三十六兩錢三千分贓時候陳三疤子說這所得還小必要弄些大客人成堆分銀方才快活小的恐怕弄出大事來往後就不曾敢入他的夥後來聞得陳三疤子肆行無忌船上張打坐鎗假裝官府攪擾得水路上下俱不安靜這陳三疤子臉上有一疤聞他詭名又呌趙七他本是江寧人如今搬在揚州關上普濟庵對過洪四家居住等語臣即同鎮臣陳王章差委標辨各帶兵丁押同王登科前往所供之處踏訪得實即令酌量飛報江南督撫添差兵役一同協拏已於九月二十日去訖除陳三疤子果否即係趙七應俟弋獲之日另奏外所有微臣現在訪獲夥犯押同察拏緣由合先奏聞伏祈皇上睿鑒謹奏可嘉之至竭力督緝務獲嚴究但當更加愼密毋稍張揚恐聞風逸脫愈難就擒矣世間如敗苗之莠者盜賊與匪類二種而已蹤跡雖迥不相同就其輕重而論則匪類為害更甚汝等地方大吏須時刻留心一有所聞便應根究若恐招多事之誚及先存波纍無辜之慮皆謬見也如曾靜吕留良率因督撫疏慢不察以致若輩肆行數十年毫無忌憚可不深以為戒乎此等處惟李衛用心周到勤於訪察當效法之同日又奏為奏聞事竊臣抵江西於雍正七年九月十二日准刑部咨為遵㫖密拏事行令各府州縣查有羅教庵院即拏庵內接教之為首住持人等并羅教經卷一并解部等因緣係奉㫖事理即行所屬訪拏至九月二十六日承准內閣寄字九月初十日奉上諭前阿齊圖等奏羅教一案朕曾面降諭㫖因未將諭㫖繕寫呈覽遂爾行文各省是以其中語意多有不符朕意之處爾等可寄信與各該省督撫知之查羅教始於眀代流傳已久其中有聚衆生事者亦有無知附和者概嚴不可概寬亦不可惟在地方官隨事因人分别輕重倡首生事者不可不懲無知附和者量加寬宥未有盡行解送來京之理惟期化導愚頑去邪歸正以杜蠱惑人心之漸豈可株連無辜也著該督撫大僚轉飭州縣實力奉行善為辦理其宜寬宜嚴之間就近酌定朕不便明頒諭㫖總之不過驅除邪教之意耳欽此臣跪讀之下方知前准部咨與㫖意尚有未符仰惟皇上愛惜人民恐民人誤入其教欲將倡首生事者治罪無知附和者寬宥期於去邪歸正此實天恩寬大不忍株連無辜之至意臣仰體聖懷又即密令各府州縣細加察訪如有羅教之人不必槩行解送止令密行具稟臣當查明倡首附和分别奏明請㫖為此合先奏聞謹奏所奏是總之罪不可縱法不可枉盡此二語而已雍正七年十一月初九日署理江西巡撫印務太常寺卿臣謝旻謹奏恭請皇上聖安朕安效法田文鏡之居心涖政時刻不可懈弛務須身體力行設或陽奉隂違面是背非徒致工於語言章奏之間莫能逃朕之鑒照也勉之同日又奏為奏明事竊照江省各州縣有額設進士舉人貢生旗扁及新進生員花紅共銀一千五百一十六兩零歷年除支給之外其無中式進士舉人之州縣則將銀扣存而其扣存銀兩向因武場鄉試需用供應酒筵等項銀一千餘兩無項動支遂將前項扣存銀兩動支應用自康熙二十七年至今相沿已久臣到任後值武場鄉試據布政使具詳前由臣思旗扁係額編正項錢糧既有支剩自應報部充餉今為武場鄉試之用雖係公事而歷届奏銷仍以進舉生貢支領全用造冊報銷實屬揑報臣不敢因循舊例今於已酉科武場鄉試用銀三百餘兩飭布政司於司庫耗羡內動支應用其扣武場鄉試動用耗羡均屬創始理合據實奏明伏祈皇上睿鑒謹奏舉凡錢糧款項均應正支正銷據實辦理為是似此移花接木積久相沿皆屬滋弊之藪亟應清理者同日又奏為遵㫖議奏事竊查江省鹽規銀兩前撫臣張坦麟奏請歸公經怡親王等議將所有額規及潯贛二關平餘銀兩酌量為各員養廉之用并酌給佐二微員養廉之資奉硃批是依議行欽此臣查各員養廉業於耗羡內支給惟佐二微員前因公費不敷未經議及今查通省自司府首領以及州縣佐雜等官現在共二百五十九員所有鹽規除解部買榖等項并裁革生辰節禮外止餘銀四千兩其二關平餘銀約三千五百餘兩若儘此支給微員養廉每員止可派給銀二十九兩似屬太少今以每員酌給六十兩計算需銀一萬五千五百四十兩應再於司庫公費內動支八千兩湊給至於督撫以及州縣各官養廉從前張坦麟因原定數目不均曾經另議奏明但州縣官於加一耗羡內照糧額多寡分别扣留多者至一千八百兩少者止四百餘兩多寡甚屬懸殊臣愚以為應分大中小三等糧多地衝者作為大縣給養廉一千二百兩糧多地僻及糧少地衝者作為中縣給養廉一千兩糧少地僻者作為小縣給養廉八百兩其道府各員養廉亦再為酌量增減惟督臣與臣及藩臬二司糧鹽二道各府佐二等官仍照舊定之數支給統計所給銀數原與張坦麟所議銀數相等臣謹將每年應提耗羡總數給發各官養廉之數并將餘存銀數及每年額定應用欵項數目另繕清摺恭呈御覽如䝉俞允請自雍正庚戌年為始通飭遵行再查江省學政衙門向未給與養廉從前新進生員每名有贄儀二兩按考各屬舟車食費等又有州縣供應足以資用今學臣傅王霅將贄儀供應槩行裁革若無養廉自屬辦理無資似亦應行支給伏候皇上睿裁批示遵行謹奏閲所開款項數目辦理甚屬妥協但慮存留公費銀兩似覺太少倘遇地方有應用處必致不敷候另有諭㫖同日又奏為要地急需能員遵㫖揀補事竊照新建縣一缺係省㑹要區必得精明强幹之員方克勝任查前撫臣張坦麟以南城縣知縣鮑源疏請調補新建部議以鮑源係奉㫖令督撫試看如不勝任以簡缺調補之員未准調補仍令於屬員內另行揀選奉㫖依議欽遵在案臣到任後每於通省屬員細加體訪查有寧州知州楊廷翼釐剔弊端不避嫌怨且辦事敏捷洵屬廉幹之員仰懇皇上俯念省㑹要地容臣題補新建以資助理如䝉恩俞允寧州亦屬要缺查有原任寧州知州李化龍係參革開復經前撫臣張坦麟疏請留江補用之員即以補授寧州駕輕就熟亦為人地相宜臣從因地擇人起見謹繕摺奏請伏祈皇上睿鑒批示以便遵㫖具題為此謹奏交部議覆有㫖同日又奏為奏聞事竊臣據建昌府知府楊敏稟稱建昌營遊擊陳聖訓因南城縣知縣鮑源新任設席相延復延原委署篆之通判梁德崇原任知縣陳廷稷并咨提來江之原任山西蒲州知州崔佩及本營守僃李璉把總孫世祚等相陪適鮑源以審理案件遲到伊等校射守僃把總先已飲醉鮑源到時遜讓坐位衆客推鮑源為首席詎把總孫世祚面叱鮑源以多大知縣僣坐通判之語鮑源分辨孫世祚即出定例遊擊陳聖訓平時不能約束屬官亦可槩見臣因知府所稟與臣所聞尚未盡合一面移咨督臣范時繹一面檄行藩臬兩司將知縣鮑源與把總聖訓因署任與新任交代致隙設席邀飲以致爭閙與知府所稟亦異又經并查在案容俟查明到日咨㑹督臣范時繹核參理合先行奏聞伏乞皇上睿鑒施行謹奏此事應參劾者同日又奏為請發人員以資委用事竊查江省試用知縣自雍正六年五月准部咨發十一員來江俱經陸續委署試用再有員缺委署乏人仰懇聖恩揀發十員來江俾臣得酌量委署俟試用稱職題請補授伏乞皇上睿鑒施行謹奏候揀選得人時發往雍正七年十二月初六日署理江西巡撫印務太常寺卿臣謝旻謹奏為敬領聖訓恭謝天恩事雍正七年十一月二十三日臣標千總齎回硃批奏摺到臣隨叩頭跪讀仰承聖訓之周詳彌感天恩之深切臣惟凛遵諭㫖於稽察屬吏緝查匪類等事敬謹奉行不敢易視不敢畏難不敢一事不奏不敢一字涉虛總期言行相符內外如一以仰副皇上之誥誡至蒙諭㫖宜以田文鏡李衛為法二臣公忠正直事事實應則效臣於上年引見面承睿鑒謹奏覽同日又奏為奏聞事竊照來歲之豐登必視今冬之雨雪江西地畝兼種二麥春花收穫更賴滋培兹於十一月十七十九等日省城已得瑞雪計積五寸嗣據南康等府陸續具報亦有三四五寸不等農民皆歡歌帝德共樂升平臣謹具摺奏聞上慰聖懷伏乞皇上睿鑒謹奏據奏得雪分寸尚不為優渥當審察吏治化導民俗以敬迓天庥何乃於章奏間遂露驕矜之氣耶同日又奏為奏聞事竊臣奉㫖緝拏積盜趙七一案緣有王登科供稱其昔年所隨之陳三疤子詭名趙七在揚州與洪四同住即遣標員等押同往拏隨以密札知㑹督臣范時繹於臨時協緝業經奏明今據該辨稟稱陳三疤子並非趙七已於三年前身故即洪四亦於本年三月身故拘到伊子洪尚義伊甥髙士明稱有胡應龍王君科二人於江湖熟悉隨又拘到胡應龍等細問稱有大盜二人一名鐵膀子李三一名鼻涕劉四慣在江湖行劫得此二人即可知趙七下落而此二人已往湖南等語該辨即就近密稟督臣遣員協同跟追該辨又於中途以江湖之大盜探問應龍知有行劫鹽船之魏二等十四人隨在江南采石磯地方拏獲王二焕等六盜尚有魏二等八人未經緝獲該辨已將現獲盜犯與未獲各犯姓名交遊兵營遊擊轉解督臣范時繹在案今該辨等又往湖南訪拏李三跟尋趙七下落去訖所有密拏情形并另獲盜犯緣由合再奏聞謹奏此事正因汝等督撫庸劣辦理無術張揚不密致令趙七逺揚無蹤今何從跟追緝捕耶汝等身膺封疆之寄一任大盜公行漫無覺察朕特書姓名示知而又如是草率從事混行塞責豈不有玷厥職若趙七終於不獲觀汝等尚何顔忝居督撫之任也同日又奏為請㫖事竊照直省常平倉榖每年有存七糶三之例前因江西倉榖虧空於雍正五年正月內欽奉上諭將糶三之例暫行停止俟各州縣倉榖查清之後奏聞再行欽此今計各屬倉榖共有一百一萬九千五十四石零已經前撫臣張坦麟查清保題在案臣到任後訪得各屬俱無虧空又經飭令確查除俟取具册結到日遵例另行題報外惟是江西地處卑濕舊存倉榖已歷有三四年恐致黴變而民間當青黃不接之候榖價自必較貴應請於明年三四五等月令各州縣照市價減糶至八九十月秋收後買榖還倉庶青黃不接之時小民不致貴糴而每年更换倉儲又可無黴變之虞緣奉有倉榖查清奏聞再行之㫖用敢具摺恭奏如蒙俞允容臣具疏題請伏乞皇上睿鑒批示遵行謹奏具疏題請可也同日又奏為遵㫖覆奏事竊臣承准內閣寄字雍正七年九月十八日奉上諭湖南賣藥匪類一案據許英賢招係張天師之叔張易珍所使前經行令張坦麟訪拏張易珍而張坦麟奏稱遍訪並無天師之叔張易珍其人今雲南拏獲之江自得供稱伊親至龍虎山太清宫許英賢領見張易珍在山五月餘與易珍相見四五次是張易珍確有其人矣爾等可寄字與謝旻令其密行訪察如得張易珍即取供押解湖南併將鄂爾泰奏摺鈔録發去欽此到臣伏查奉㫖訪拏之張易珍並鄂爾泰奏摺內江自得所供之徐祥吉臣欽奉諭㫖當即密遣的當人往龍虎山中於各道院密行偵探訪無蹤跡復將自楚解回許英賢等設法研訊堅供實係出外賣藥借名哄騙銀錢因辰沅靖道疊夾難忍信口誣供多係揑造詭名實在並無影響等語至問其江自得之蹤跡則供在滇曽遇有江子德亦有指其為建昌縣行醫之人止見一面並未交言臣隨密行建昌縣訪查果有江子德在外行醫未歸即拘伊妻熊氏訊問所供年貌住址與自得在滇所供相符則江子德即為江自得無疑但張易珍徐祥吉遍緝無蹤因傳嗣教真人張慶麟到省與司道公同詢問據稱大義滅親雖父子兄弟亦不敢匿何况族人如張易珍者實在未聞其名何敢隱瞞自干重咎等語隨將伊家族譜并親供及日後查出願甘滅族印結一并存案臣思滇省既拏有江自得供吐鑿鑿必非無因除現准楚省咨提臣已將許英賢等遣員解赴湖南質訊外仍一面密行訪察一面知㑹湖南撫臣趙宏恩審有確據密咨到臣再為搜拏所有現在查訊咨解緣由合先奏聞謹奏類斯等事切不可因一時不得蹤跡便視為子虛俟湖南訊明如有咨移應行擒捕人犯當嚴飭該屬詳加訪緝務獲解交可也同日又奏為敬陳末議恭請聖裁事竊照江西九江一府襟帶江湖上接江南安慶池州二府下連湖廣黃州武昌二府為三省之交㑹沿江一帶盜賊出沒靡常蓋鼠輩明知此地為三省交界易於躲藏遇有緝拏可以東走西逸故當行舟被失呈報到官彼此移關訪緝或耽延時日漏泄風聲或彼界此疆膜視推諉總緣省有界限官無統屬是以匪竊頻聞商旅受害伏查饒九南道管轄饒九南三府向係駐劄饒州臣請移駐於九江府其九江接壤江南之宿松望江東流等縣接壤湖廣之黃梅蘄州廣濟興國州等州縣以上各屬除錢糧詞訟外一切强竊案件皆歸該道統轄平時則督率各屬沿江查察一遇失事具報該道立刻行拏不俟關提直行檄緝庶隔省可通姦匪皆知斂跡矣至於武職均有防守之責今九江協現設副將一員亦請照該道之例除兵馬錢糧外凡沿江汛守俱歸該副將管轄則文武均有專司巡查更為嚴密臣因稽察姦匪起見不揣愚陋敬陳末議如䝉可採請皇上睿裁施行謹奏覽同日又奏為奏明事竊查南昌府知府許鎮驛鹽道魏錫祚衙署內於雍正七年閏七月初一初二夜連被竊劫前經署撫臣張坦麟題參疏防在案嗣有焦成吉在新建縣首報盜犯沈二等竊劫之後逃往别處即㑹同營員協差兵役隨路追緝直至河南安陽縣地方拏獲沈二楊二并盜戚髙姓等三名當經安陽縣追出衣飾贓物又於本地拏獲窩犯梁彥貴一同收禁嗣經河南將沈二等遞解來江行至湖廣孝感縣地方盜犯沈二楊二忽於飯店扭鎖脫逃一時追拏莫獲據原役羅祥等稟稱河南界內一路撥有千總一員帶兵二十名押護一至楚省止有解役七名營兵二名等因臣隨移咨湖北督撫飭查是否縱放押令緝拏并咨㑹河東督臣及盜犯所供原籍地方一體查拏在案所有盜犯已獲復逃緣由理合據實奏聞謹奏楚省文武員辨何乃如是疏懈已降㫖嚴飭矣雍正八年正月二十日署理江西巡撫印務太常寺卿臣謝旻謹奏為恭謝天恩事雍正七年十二月十八日臣標把總齎回奏摺䝉欽賜御書福字到臣臣隨出郊跪迎至署恭設香案望闕叩頭祗領訖伏念臣一介庸愚遭逄盛世業與天下臣民共享太平之福臣又䝉聖恩賞臣福字輝煌御筆彩生奎璧之光璀璨龍章寶並琳琅之重臣惟竭殫愚誠矢報涓埃念念不忘皇上錫福之天恩以仰承聖主萬年之純嘏耳為此繕摺奏謝伏乞皇上睿鑒謹奏福之與孽在人自取朕亦何能錫汝之福歲歲書賜內外臣工福字蓋欲咸各觸目警心忠勤以植福敬愼以保福之意切勿謬㑹誤解不特此也即國家之福猶賴羣工百僚翊贊朕躬敬承天貺也勉之同日又奏為遵㫖據實覆奏事竊臣欽奉皇上硃批諭㫖陳王章聲名何如據實具奏以聞不可少涉迎合卜度欽此臣自上年九月內到任始與陳王章識面觀其言貌頗覺有才而訓練兵丁亦能整飭但伊用度過奢及查其俸薪隨糧每年所入不及二千兩似不能敷其所出因留心訪察聞伊從前拔補千把員辨經書辦謝居仁千總李時沛說合酬儀又於各屬文員到省時王章善於交結圖其德已以利其餽遺省城多有物議據臣所聞聲名實屬平常理合遵㫖據實陳奏伏乞皇上睿裁謹奏操守一節朕知之矣其餘聲名如駕馭屬員約束兵丁緝捕賊盜彈壓地方以及居心行事等處其道多端何得泛泛以通套數語草率具奏也同日又奏為欽承聖訓恭申謝悃事竊臣於跪請聖安摺內奉有硃批臣敬謹跪讀不覺感深隕涕夫臣之於君尊如天地親如父母皇上不以臣為庸劣訓示諄切至再至三是聖主之期望於臣不啻天地父母之殷懷栽培造就有加無已若臣猶不實心實力事事以田文鏡為效法敢於陽奉隂違是臣自暴自棄斷難掩飾於聖明洞照之中臣已跪書聖諭供奉密室寓目警心不敢稍有一毫懈怠之念以圖仰報我皇上髙厚隆恩臣謹繕摺奏謝所有奉到硃批理合恭繳謹奏果肯如此矢志朕復何慮但恐自恃才識别有主見未必竟以朕諭為然而心悅誠服效法田文鏡耳試清夜逐事內省始信朕洞悉汝肺腑之不謬也朕之所以諄諄訓諭不已者蓋恐汝不法其忠誠之本而徒於外貌施設處倣其一步一趨不能仰邀神明之祐助則非徒無益而有害焉勉之雍正八年三月初一日署理江西巡撫印務太常寺卿臣謝旻謹奏為奏聞事竊查江省所轄九江贛州二關臣上年抵任時正值兩關先後報滿之候業將一年解部額稅并􅑿餘銀兩據實奏明今臣於兩關循環簿內細查收支各數九江徴收船料每正稅一兩加耗銀一錢七分零又有并封平餘銀鹽船木筏神福銀在外贛州徴收貨物每正稅一兩加耗銀四錢五分亦有并封平餘銀臨關零稅銀照票單銀在外除將正稅照額解足外多者即為􅑿餘又將耗羡支用一切公費外多者亦入贏餘項下彚總解部至其所用公費則有起解盤纒添平飯食部科冊費以及管關委員守口丁役書吏紙張薪水工食租房犒賞等項應用俱係從前額定舊規經臣細加密訪收支數目皆屬相符謹將兩關一年之內所收正額耗銀并平餘各項以及支銷公費名色另繕清摺逐一開明恭呈睿鑒謹奏關稅之改令地方官管理罷遣京員者原為便商裕課起見近日庸劣督撫委員每多不檢怨言載道聲名甚為狼藉而於贏餘中又任意侵蝕即閲爾所開各項支銷數目亦一筆花帳耳奏與不奏與稅課錢糧有何關係嗣後當竭力整飭毋為此小事所波纍而見棄於朕也日後倘被人指摘曽奏過一語亦何能脫然免咎愼之愼之同日又奏為奏聞事竊查九江府知府蔡學皓前在永新縣知縣任內有失察書役私收民缺錢糧一案經臣查明題參請㫖敕部議處惟因該員催科得法前任永新未及年半徴完新舊民缺十萬餘兩今在九江任內又能勤愼辦事臣仰承皇上愛惜人才之諭㫖未經摘印候㫖定奪業於疏內聲明合先奏聞可否留任以示䇿勵伏乞睿鑒謹奏具題到日有㫖同日又奏為奏明請㫖事竊臣查江省各營向遇奏銷造冊祭祀修整盔甲器械帳房旗幟操演火藥等項各費俱於兵糧內每一百名扣存五名糧銀以供支用臣標左右二營與袁州九江二協從前均照南昌鎮標之例一體扣留緣原任撫臣布蘭泰禁止扣用募兵補糧營中公費皆令將僃等捐墊至署撫臣張坦麟任內兩協兩營㑹詳請復公費遂令仍照舊例遇守兵缺出漸次扣留充用臣查營中公費均不可省將僃等官實無力捐墊應否照舊扣留以作公費理合據實奏聞伏乞皇上睿鑒批示謹奏募補名糧而令將僃捐墊公費乃係布蘭泰之謬舉奚足效法汝意若應遵循則即踵行如云不當則何不照依張坦麟現行之例而行此等小事尚疑慮不定而奏請於朕朕亦不知所從如何批諭耶似此利害關心是非莫辨充類而言可謂拔一毛而利天下不為也如是居心尚安望汝致身為國辦理他事乎封疆大吏不能擔荷即為不克勝任未有不叢脞事務貽誤地方之理戒之勉之觀汝光景似遺忘田文鏡之居心行事矣同日又奏為奏明事竊查司庫錢糧凡存貯項款理應逐一清查絲毫無容遺漏今江省司庫內所存之銀除奏報外另存歷年節省解餉水腳銀六千三百五十八兩零因司庫公用不敷蒙皇上恩諭將江省落地稅并稅契贏餘銀八千餘兩撥存公用今此項節省銀兩應否亦歸公費內以僃不時之用如有緊要動支之處均造冊報部此外更有各處城濠隙地賃民搭房居住之濠租銀每年七百餘兩官基地租銀八百餘兩查此二項向例支給瞻雲寺看守行宫僧人養贍并刷印上諭及鄱陽湖所設救生船隻防湖哨船江邊各渡船內水手工食修船工料火藥器具與臣衙門炮火等項之用除支給外有餘剩者留為修理橋梁道路之需理合一併奏明伏乞皇上睿鑒謹奏覽奏知道了如應咨部咨明該部存案雍正八年四月十二日署理江西巡撫印務太常寺卿臣謝旻謹奏為覆奏事竊臣前奏欽承聖訓恭申謝悃一摺奉有硃批臣跪讀之下不勝惶悚伏念人臣之道洵無過忠誠二字忠誠不由於心稍有外飾即為不忠不誠之尤況誠中形外原必不能掩其不誠不忠之實臣蒙皇上屢頒諭㫖深恐臣外託於忠誠而內涉於僞妄所以警戒微臣者至諄且切臣敢不敬凛在心刻刻以此自勉今封疆大吏中竭忠誠以圖報效如鄂爾泰田文鏡李衛實為最優者鄂爾泰臣未經相識惟於前任江蘇布政使時臣家在其治下鄉人俱稱其善李衛向與臣同為户部司官知其有才今在浙江聲名甚著然亦止得於傳聞未親見其行事若田文鏡在河南臣以署布政使為其屬員一年以來日見其公忠辦事稽查所屬執法不移臣久已心悅誠服今相離雖逺而思其居心行事可法可師臣雖無其才而願學之志實非一日也兹屢蒙聖訓諄切臣惟有竭力奮發黽勉步趨以仰報皇上教誡洪恩於萬一耳為此繕摺覆奏伏祈皇上睿鑒謹奏怡親王已仙逝汝當加勉自勵不辱所薦以保全朕賢弟之顔面書此諭時不覺淚墮果係不及之愆自豫原恕倘犯有心之過則必加倍懲治不汝貸也勉之勉之同日又奏為遵㫖奏聞事竊臣前奉諭㫖將南昌鎮臣陳王章居官聲名繕摺具奏奉有硃批臣跪讀之下不勝惶悚伏查陳王章彈壓兵辨駕馭惟嚴操演騎射亦無懈怠遇有盜賊竊發不惜盤費差人遍加屣訪以期捕獲惟稽察屬員每以一已之好惡定各官之優劣是以間有未當而所屬亦未盡悅服至其居心機巧語言未能誠實行止浮夸喜以結交為事此臣半年來留心體察所稔知者也合再據實奏聞伏祈皇上睿鑒謹奏此後如有於官方甚不協處再奏以聞同日又奏為奏聞事竊臣准浙江督臣李衛咨稱匪犯陳銓供出之吕東陽解浙質審等因到臣隨令新建縣密行屣緝今據該縣選差幹役訪明豐城縣洛溪村居住之吕學一即吕東陽㑹同豐城縣役拏獲訊據吕學一供認即吕東陽與匪犯陳銓同夥緣由具報到臣隨經飭令審訊其江省有無夥黨去後又據該縣詳據吕學一即吕東陽供出伊於雍正三年二月在直𨽻淶水縣遇見陳銓又遇有田開玉是山西榆次縣人蘇鎮山是江南淮安府人唐德是山東萊州府人髙之初是江南貴池縣人因陳銓要拜弟兄各醵分金同喫血酒聽得陳銓說海上有二十一號船為首的名呌陳廷秀混名撲天飛是廣東佛山人常在浙江福建一帶海面上來往因給伊鉛圖書一箇以為記認約其到天津衛下船赴海伊因家有妻女不捨得去嗣後遂不來往現今江省並無夥黨等語詳覆前來臣復提該犯細加親訊與在縣所供無異查吕東陽係浙省咨拏質審之犯其所供情由與供出各犯是否確實應聽浙江督臣李衛將陳銓與吕東陽質審明白臣一面將吕東陽嚴押解浙並將供情咨明一面仍將供出各犯分咨各省查拏徑解浙江質審外所有訊取口供解浙與陳銓質審并密咨各省緣由合先奏聞謹奏凡遇直省似此緝捕緊要匪犯當較平時倍加愼密實力察拏務獲解交不可泛泛從事潦草辦理也同日又奏為請㫖事竊惟吏治貴在得人隨才可以器使我皇上愛惜人才每於引見各官不以一眚廢棄是以大小臣工無不踴躍思奮以期報效臣查有原任廣信府鉛山縣知縣張崇朴緣興安縣交代案內委勘不實經前署撫臣張坦麟據揭題參部議降級調用現在給咨赴部候補但該員離任將及一年臣訪聞鉛山民情至今愛戴近因請咨到省見其年力精壯人亦明白臣思人材難得可否將張崇朴仍留江省遇有人地相宜之缺准帶所降之級其題引見候㫖補用伏祈皇上睿鑒批示遵行謹奏准留江省補用仍一面咨明該部雍正八年五月十九日署理江西巡撫印務太常寺卿臣謝旻謹奏為奏聞事竊江省今嵗三四月間連旬隂雨晴日無多臣恐低窪之區田禾被淹深為憂慮率屬䖍誠祈禱併飭各屬遍加確查陸續據報各處田禾現俱茂盛早稻已經秀出惟九江饒州南康三府濵江濵湖一帶低窪洲地因水驟漲一時宣泄不及暫被淹浸臣又飛行飭查被水窮民量給節僃倉榖現今五月以來日日晴霽各處漲水全退俱已補種晚禾插蒔完畢理合繕摺具奏仰慰聖懷謹奏亟當省察吏治訓導士民敦厚風俗以感召天和敬之愼之同日又奏為覆奏事竊臣因九江贛州二關收稅加耗并支用公費開明清摺恭呈御覽奉有硃批伏查關稅原係巡撫之事雖委員分理各關而欲上無侵欺稅課下無苛纍商民總責成於巡撫臣緣各關距省稍逺惟恐有弊不能深悉深以為憂是以到任以來時時察訪原不敢稍有懈怠今蒙皇上誥誡深切訓誨周詳敢不益加整飭以期弊端永絶除嚴飭分管道府各加查察外今又不時遣人扮作客商搭船過關暗行密訪如訪有弊端役即拏究官即參處斷不敢稍為徇縱自貽扶同之咎總惟竭盡臣心以仰答皇上諄諄教導之至意耳所有奉到硃批原摺合併恭繳謹奏凡事非言之難而行之為難試行與朕觀之雍正八年十月十七日署理江西巡撫印務太常寺卿臣謝旻謹奏為請動公費糴買榖石以便民用以裕民食事竊照江省連嵗豐收今年更稱大有各屬榖價俱平而南昌瑞州饒州南安贛州五府價為尤賤現今每石自三錢三四分以至二錢七八分不等蓋緣户盡豐盈市鮮收買故自秋收至今民間之需銀使用者反苦於無從糶賣臣思民用民食均所必需酌盈劑虛似宜通變請將司庫公費支銀一萬五千兩分給南瑞饒南贛五府知府各於本處照現在價值乘時買榖收貯如來年青黃不接之時價值稍貴即同存七糶三之常平榖石一體發賣倘彼時價仍照舊則儘本省别府價貴之處運賣外如有多餘遴員運至别省價貴之處糶賣所有賣榖贏餘價銀一併歸於公費項下以充公用實為有益謹此繕摺奏聞伏候皇上睿鑒批示遵行謹奏與督臣髙其倬商酌為之雍正八年十二月初四日江西巡撫臣謝旻謹奏為奏聞事竊照江省今年收成豐足米糧價賤近有山東兖州等處被水乏食貧民攜帶妻子來江趁食於南昌饒州九江等府臣行令各地方官各於境內查明人數暫令安插寺院動支節僃倉榖碾米散給大口每日給米六合小口四合又大口每日給錢八文小口四文以資鹽菜柴薪之用俱令地方官親身督散每五日給發一次不至失所仍時加稽查毋致為匪今散給之始已據南昌縣新建縣共報有王永昌等大小男婦七十八名口此後再有續到並至饒九二府者俱令一例散給統俟春和時量給路費資其回籍所有安插散給賑恤緣由理合繕摺奏聞伏乞皇上睿鑒謹奏已有㫖矣此所辦理與朕意相符同日又奏為恭報開濬蓼花池口竣工事竊查南康府屬星子縣蓼花池地方為廬山九十九灣之水所蓄轉流於鄱陽湖向因出水之口堆沙擁塞田土被淹小民心力不齊不能開濬致難播種經臣奏請於公費銀內動支八百餘兩幫給民間飯食物料之費以資開濬奉㫖交户部存案欽此臣一面咨部一面飛飭南康府乘農隙水涸時即速挑挖并行布政司照給幫費去後今據該府具報該地居民踴躍赴工挑挖沙土并建橋梁於十一月十二日工竣現今積水暢流入湖田土次第涸出來春即可播種居民感戴咸各執香望北叩謝天恩等情到臣除將用過銀數核明俟嵗底報部外所有竣工日期并居民感戴情由理合繕摺奏聞謹奏此係地方應行事宜不過惠民之一端耳何須如是誇張同日又奏為酌請分貯各府庫銀仰祈睿鑒事竊臣接准部咨遵㫖議將江西雍正八年地丁銀十萬兩分給各府收貯以僃州縣急切公務之用仰見我皇上體恤臣下之至意但臣就江省各府而論如南安贛州二府離省各約千里吉安袁州廣信饒州四府離省四五百里不等餘俱離省不逺若於各府槩令分貯臣思此項庫銀必遇最要之公事方可動用是動用之處甚少收貯之日實長恐收貯日久守令視此項為閒款彼此營求徇庇致啓通那侵虧之漸可否稍為變通於最逺次逺之南贛吉袁饒廣六府并最衝之九江府俱有協鎮參將大員駐劄之地將應貯之銀酌量分貯責令該管道員不時稽察每於歲底親行盤查以期歷久無弊其瑞州撫州臨江南康建昌五府與省㑹之南昌府應貯銀兩統存司庫如州縣偶遇有急切應用之事赴司請領原屬甚便至每年奏銷盤庫時臣一體盤查奏報臣因江省各府逺近衝僻不等是以將分貯銀兩之處籌畫變通繕摺奏請伏乞皇上睿鑒批示遵行謹奏㑹同督臣髙其倬詳細酌議具奏硃批諭㫖卷一百三十八上欽定四庫全書硃批諭㫖卷一百三十八下硃批謝旻奏摺雍正九年正月二十四日江西巡撫臣謝旻謹奏為請更同名之縣以杜滋弊事竊惟各縣以印為憑一切案卷文冊皆必徴信於印查江西省吉安廣信二府所屬皆有永豐縣其印信篆文同一字樣並無分别共在一省之中而有相同之印倘姦徒假借以此縣所用印信朦混於彼縣恐一時難辨易滋弊端仰祈皇上賜將一縣另改嘉名庶免混淆之弊至此外江省州縣又有同名於各省者如江省有寧州而陜西雲南所屬皆有寧州江省有長寧縣而奉天四川廣東所屬皆有長寧縣江省有新城縣而直隸山東浙江所屬皆有新城縣江省有龍泉縣而浙江貴州所屬皆有龍泉縣再如江省有新昌縣而浙江亦有新昌縣江省有德化縣而福建亦有德化縣江省有安仁縣而湖南亦有安仁縣江省有廣昌縣而山西亦有廣昌縣江省有石城縣而廣東亦有石城縣江省有興安縣而廣西亦有興安縣江省有永寧縣而貴州亦有永寧縣其他各省之州與州同名縣與縣同名者尚多并有府與府同名者如姦徒有意作弊則借此影射隔省更恐無從辨察應否一併查改伏乞皇上睿鑒謹奏該部議奏同日又奏為酌陳停運漕糧之議仰祈睿鑒事竊惟漕糧上貢天庾所以充裕京儲關係最巨臣准漕臣咨准部咨蒙皇上念京通各倉積貯豐裕欲紓輸將之力恤挽運之勞又欲民間受折徴之益辨丁無停運之纍以嵗運漕糧作何變通之處行令漕臣籌畫漕臣咨商臣等定議仰見我皇上念切民依必期立法盡善之至意臣查運漕各省惟江西湖廣産米尤多向來鄰省每於江楚糴買江楚之民亦賴糶賣米石得價資用若令停運則各省所存之米既多向外省糴買者必少而江西湖廣之米糶賣無多恐於完糧資用之處稍有未便再查辨丁以挽運為業若令停運則無行月錢糧恐其資生無䇿況各省糧船約有七千隻以頭舵水手計之不下十萬餘人而糧船經過之地需用剝淺短縴提溜等項人工沿途之民藉以糊口者又不下數萬此等貧民無田耕種又無手藝不無苦纍再查定例每隻糧船准帶土宜一百擔頭舵水手人等亦准帶二十六擔統計糧船七千隻約帶土宜一百萬擔南北貨物多於糧船帶運京師藉以利用關稅藉以充足而沿途居民藉此以為生理者亦復不少若一停運則雖有行商販賣貿遷未必能多貨物必致阻滯關稅亦恐不無缺少再查成造糧船每隻需銀二百八兩七錢零用至十年即應更造如一年停運每船即虛糜銀二十兩八錢七分以各省糧船七千隻計之每年共虛糜銀十四萬五千六百餘兩至於漕運暫停而糧船自應仍留僃用則歲造歲修之費亦難節省臣與藩司糧道密行酌議可否於今年額徴漕米先以半本半折徴收將糧船分作兩班循環迭運其下運之船即令先期修艌聽候受兊不必俟上運回空方行開兊則在民已受折徴之益而挽輸又可不費商賈仍資貿易貨物仍可帶運辨丁水手人等雖有一半停運仍於下年出運亦可不至失業至嗣後應否折半起運統俟户部㑹同倉場另行酌核盈縮請㫖定奪臣管窺之見是否有當伏祈皇上睿鑒謹奏該部將此摺暫行收存俟總漕倉場諸臣議到一併確議具奏雍正九年三月初十日江西巡撫臣謝旻謹奏為奏聞事竊照田土滋培宜於雨雪江省上年冬月兩次臘雪各有二三寸不等至入春以後正二兩月省城春雨及時現今麥苗暢茂早稻蒔插足資灌溉併據各府陸續具報各地方亦皆雨水調勻理合繕摺具奏仰慰聖懷伏祈皇上睿鑒謹奏覽江省春雨應序農事及時朕懷深慰雍正九年六月二十四日江西巡撫臣謝旻謹奏為奏聞事竊照江省今年春夏以來雨水調勻經臣具奏近自五月望後旬日不雨臣分遣標員前赴四鄉查看回稱塘水尚可車灌農民望雨甚殷嗣於五月二十八九六月初一等日甘霖疊沛四郊霑足目下田禾暢茂今歲可望有秋并據各屬陸續呈報各皆得雨前來所有江省雨水霑足情形理合繕摺奏聞伏乞睿鑒謹奏據奏時雨霑足以手加額覽之同日又奏為奏聞事竊臣遵奉定例將各縣常平倉榖令於青黃不接之時糶三以濟民食通行在案五月二十一日據上饒縣詳報姦民姜天佑等八人率衆赴縣强借倉榖等情經臣批飭查拏去後隨經密訪緣上饒縣倉書張德懋串同斗級張亮等乘糶倉榖私有勒索又串通礱房髙得玊徐逹生二人多糴倉榖囤積以致衆心不服羣欲將張德懋毆打德懋隨躲至髙徐二家衆人趕進見有囤榖遂共搶榖五石二三斗搬貯縣堂挾制强借致有鬨鬧臣思倉書勒索礱房囤積姦民强借均屬不法已行藩臬二司將倉書斗級及姦民人等提審業據詳報將姜天佑等拏獲收禁俟審得實情分别究擬參處外理合繕摺奏聞謹奏將此案執法完結隨當就事訓飭闔屬愚氓咸知有所懲艾務須通行曉諭反覆開導令各懷凜惕之心庶免再犯之慮斯乃善政宜諄諄留意者與其干法後齊之以刑何如於無事時先為道之以德也同日又奏為遵㫖覆奏事竊臣據按察使樓儼鈔録奏摺一件請定藩臬兩司新任展限之例奉皇上硃批諭㫖宜商之於該撫若意見相符具題請㫖可也欽此臣查督撫新任與州縣新任均有展限之例藩臬兩司分管通省之錢榖刑名雖不同於督撫之兼管而事務繁多實有十倍於州縣者若新舊更替之時稽查尤為非易倘以限期迫促失於草率不無錯誤誠宜展其限期俾得從容辦理臣隨咨商江南督臣髙其倬接准咨覆江南上下兩江藩臬兩司新任署任俱扣展限一月現在遵行等語臣思此例已行於江南而江西未奉通行是以向來藩臬兩司新任俱未展限今欽奉諭㫖除據布按兩司㑹詳恭疏具題請㫖敕部議奏并請將知府一例同展限一月外所有樓儼鈔奉硃批奏摺諭㫖緣臣與樓儼所見實同謹繕摺奏聞伏乞皇上睿鑒謹奏覽奏已悉樓儼之居心行事如何并其精力如何之處據實奏聞密之同日又奏為奏聞事雍正九年五月二十一日晚三更時分南昌省城章江門外居民失火臣立即率同文武員辨督領兵役攜帶救火器具前往撲救是晚北風甚大延燒民房四百餘間并江邊之滕王閣亦被燒燬惟閣門之內有聖祖仁皇帝御書滕王閣序石刻碑亭並無纖毫損壞當查人口亦未損傷隨經檄行藩司將被火居民分别賑恤并將地方官職名照例咨參在案臣思滕王閣有御書石碑為省㑹觀瞻之所容臣酌量設法另圖重建以復舊觀所有居民失火及延燒滕王閣緣由臣謹繕摺奏聞謹奏古閣固宜重修非急務也徐徐為之雍正九年八月初八日江西巡撫臣謝旻謹奏為奏聞事竊查江省學臣傅王霅性本拘迂識非明察近聞其考試撫饒二郡所取童生多有物議臣細加察訪緣有學臣差役胡天秀朱象昆等勾通學臣幕內親屬家人欺瞞作弊現有臨川縣取進童生李敷奏為人指摘經教官熊淑藻稟知學臣始將承差胡天秀學書熊宗紀各皆責處李敷奏除名而朱象昆尚充承差未經責革臣查學臣傅王霅拘謹自持雖無茍且實跡而關防無術未免約束不嚴以致書役招搖輿論不協臣又聞饒州教官夏懋誑稟學臣以取進覆試童生試卷應用學印公然出示令諸童赴學勒索硃儀貧生苦纍不堪學臣亦無覺察臣現在行查俟查明咨革究擬外所有學臣考試致有物議緣由理合恭摺奏聞謹奏有㫖諭部矣同日又奏為奏聞事竊照江省各屬早稻現在俱經收穫今嵗春夏以來雨水調勻是以皆獲有收臣行據布政使報稱南昌府屬收成十分者十之二九分者十之三八分者十之三七分者十之二瑞州府屬收成八分者十之八七分者十之二袁州府屬收成十分者十之一九分者十之三八分者十之四七分者十之二臨江府屬收成十分者十之一九分者十之三八分者十之六吉安府屬收成九分者十之三八分者十之五七分者十之二撫州府屬收成九分者十之四八分者十之三七分者十之三建昌府屬收成十分者十之二九分者十之五八分者十之三廣信府屬收成九分者十之二八分者十之四七分者十之四饒州府屬收成十分者十之二九分者十之三八分者十之三七分者十之二南康府屬收成八分者十之五七分者十之五九江府屬收成九分者十之二八分者十之六七分者十之一六分者十之一南安府屬收成九分者十之五八分者十之四七分者十之一贛州府屬收成十分者十之二九分者十之四八分者十之四至於市賣米價南昌瑞州袁州吉安撫州建昌南康等七府每石自六錢八九分至九錢五六分不等臨江南安贛州等三府自五錢四五分至六錢七八分不等廣信饒州九江等三府自七錢五六分至一兩四五分不等再查各屬晚稻據報亦俱暢茂容俟秋成後另奏外所有早稻收成分數并現今各屬米價理合繕摺奏聞伏乞皇上睿鑒謹奏覽江省早稻收成及米價情形朕曷勝額慶同日又奏為請㫖事竊臣查九江府屬德化縣地方有石閘一座緣該縣有封一封二等鄉沿江近湖地形窪下向虞淹沒是以前眀萬厯年間官買嚴姓之地建築石閘名為嚴家閘不特化邑田地旱潦藉以蓄泄而楚省黃梅蘄州之田亦資其利但歷年已久民間每歲雖亦略加修葺而閘身欹側閘底罅漏居民惴惴常恐江流湍激一時倒塌則田地廬舍俱有淹浸之患況其地又係往來驛路行人艱阻亦多不便該地士民屢欲拆卸重建每因心力不齊因循中止兹呈縣具詳到臣經臣批司查勘據布政司委九江府親勘前情洵宜急為修築併據估計工料約需費銀一千六百兩仰懇天恩准於司庫銀內照數給發趁今冬水涸之時委令該地守令等官辦料鳩工重新拆建務俾堅固以垂久逺如䝉俞允容俟修竣之日將用過銀兩造冊報部臣謹繕摺請㫖伏祈睿鑒批示遵行謹奏當軍需浩繁之際汝等封疆大臣亦宜為國家念及類此地方事宜固係應為於汝等公用項下措辦則可請動司庫銀兩殊屬大誤矣雍正九年九月初四日江西巡撫臣謝旻謹奏為奏明事竊臣准部咨令於江省民人內揀選人材壯健技勇可觀者五十名咨送兵部隨檄各屬召募揀選臣復出示廣行勸募併他省現在江省之人有願赴挑用者亦令入選嗣據各屬陸續送到經臣㑹同司道逐加考驗已足五十人之數遵照部文動支司庫公項每名先給製僃行裝銀六兩又各給銀二十四兩為雇騾盤費之用現在委員伴送於九月初十日起程由陸路赴京臣又查有原任南康營守僃蕭公讓先因星子縣民沈淑仁家被盜案內以扶同報竊革職又有原任建昌營守僃李璉先因該營把總孫世祚與南城縣知縣鮑源在遊擊陳聖訓署內㑹飲角口案內牽連革職俱經審結准有部覆正在給咨回籍間先據各呈稱願在五十人之內充數赴部臣緣部咨內並未議將廢員收入是以不敢遽令充數後據伊等呈稱願自僃鞍馬前往軍前效力臣見其人材壯健弓馬熟嫺仰體皇上愛惜人材之聖心不敢壅於上聞隨令與委員等管領五十人一同赴部并於咨部文內聲明外理合恭摺奏明可否准其效力伏乞皇上睿鑒敕部施行為此謹奏蕭公讓李璉二人到京之日交辦理軍需大臣處候㫖同日又奏為遵㫖覆奏事竊臣前奉硃批樓儼居心行事如何并其精力如何之處據實奏聞密之欽此伏查按察使樓儼於上年十一月到任臣見其履歷開寫年六十三歲恐其年力就衰精力雖非强健亦尚不至衰邁凡遇案件猶能虛衷奏樓儼緣由理合據實繕具密摺奏聞伏乞皇上睿鑒謹奏覽雍正十年正月初二日江西巡撫臣謝旻謹奏為奏聞事竊照江省連年雨水調勻收成豐稔民皆樂業兹於雍正九年十二月初八初九兩日省城得雪四五寸至十五六七等日又共得雪一尺一二寸并據各屬陸續報稱各處皆得雪五六七八寸不等農民慶幸咸稱為來歲豐年之兆所有江省得雪日期理合繕摺奏聞謹奏江省得雪情形以手加額覽焉雍正十年二月十六日江西巡撫臣謝旻謹奏為請留熟悉風土之員以收吏治之效事竊查原任吉水縣知縣黃雲因永豐縣參革知縣沈儼案內以驗傷不實部議降一級調用奉㫖令臣等將伊居官如何之處出具考語送部引見欽此臣緣黃雲居官謹愼業經㑹同署督臣尹繼善咨送吏部引見其應作何補用之處自在聖明洞照之中但該員在江日久熟悉風土倘蒙聖恩仍令來江遵㫖補用洵於地方有益再原任餘干縣知縣程光鄂係前撫臣布蘭泰以不職題參之員嗣經督臣高其倬審明部覆准其開復在案因該員請咨赴補來謁臣見其為人明白在江已久風土民情均所熟悉又據布政使李蘭稱其在任之日催科有術新舊錢糧俱無掛缺可否仰懇皇上將程光鄂准留江省遇有相當缺出容臣另疏具題送部引見候㫖補用以上二員臣因地方得人起見用敢繕摺奏請伏乞皇上睿鑒批示遵行謹奏該部知道雍正十年三月十五日江西巡撫臣謝旻謹奏為請㫖事竊查布政使李蘭操守廉潔才識敏逹綜核錢糧極為詳愼稽察屬吏亦為嚴明緣有前署撫臣張坦麟改換寧都縣民羅天榮等供詞一案經司换詳部議李蘭降三級調用因新任布政使伊拉齊在江南清查積缺未竣奉㫖仍著李蘭暫行管理臣查通省錢糧自康熙五十四年至雍正七年共積缺銀三十八萬八千餘兩恐有官侵吏蝕託詞民缺情弊因商同該司分委各員一面清查一面帶徴至上年歲底計算除參出各官虧空一千二百餘兩并查出吏役侵蝕銀二千一百餘兩現在勒追外業已帶徴完過銀二十八萬七千餘兩其餘未完積缺尚在清查數月之內可以竣事近聞伊拉齊於署兩淮鹽政任內奉㫖解任出缺安徽按察使王紘奉㫖升補江西布政使新司到任伊邇李蘭自應交代赴部另補但清查積缺姦胥蠧役諸弊叢生李蘭熟悉弊端實能釐剔今若於將竣之時另换生手恐一時頭緒難清致稽時日又臣近經題請將九江關量船定稅奉㫖俞允現在舉行是丈量船隻之事亦正資其協助可否仰懇聖恩暫將李蘭留任數月俟事竣之日赴部候補臣從愼重錢糧起見是否可行伏乞皇上睿鑒施行謹奏李蘭准暫留江西協同王紘將清查積缺等事辦理完竣再令赴京雍正十年閏五月初七日江西巡撫臣謝旻謹奏為奏聞事竊照江省今歲春夏以來雨水均調二麥秀實兹遇各屬收成之際臣行據布政使王紘報稱南昌府屬二麥收成六分者十之五七分者十之一八分者十之四瑞州府屬七分者十之六八分者十之四袁州府屬五分者十之二七分者十之四八分者十之四臨江府屬七分者十之五八分者十之五吉安府屬六分者十之五七分者十之四八分者十之一撫州府屬六分者十之七七分者十之二八分者十之一建昌府屬七分者十之一八分者十之七九分者十之二廣信府屬六分者十之四七分者十之四八分者十之二饒州府屬六分者十之一七分者十之四八分者十之四九分者十之一南康府屬六分者十之三七分者十之三八分者十之二九分者十之二九江府屬七分者十之五八分者十之五南安府屬六分者十之四七分者十之四八分者十之二贛州府屬六分者十之五七分者十之四八分者十之一所有各府屬二麥收成分數謹繕摺奏聞伏乞皇上睿鑒謹奏前據報稱冬雪霑足春夏雨水又復均調何乃麥收分數至於薄減閲各府所屬未有一處至十分者今日之奏實則前日之報未免涉虛二者必有一草率不確處明白更奏以聞雍正十年六月十五日江西巡撫臣謝旻謹奏為請㫖事竊臣管理潯贛兩關夙夜思維非但弊竇亟宜剔除即浮費亦應稽核臣查兩關每年起解􅑿餘銀兩皆係委雜職官同該管家人雇覔騾頭馱載赴部每解銀一萬兩約用腳價盤費銀一百餘兩即在􅑿餘項下扣支歷來相沿不由驛遞撥運臣思兩關正額除贛關抵充贛鎮兵餉外潯關每季正額俱由驛遞撥夫運解今􅑿餘銀兩均係解部錢糧乃舍長設之站夫而用雇覔之騾腳此項解費實屬虛糜臣請嗣後起解􅑿餘照依起解正額之例亦由驛站撥夫擡運非但前項糜費可以裁併􅑿餘而一鞘兩夫悉係在官人役更可沿途照看不致疏虞且每關一年止解一次仍於驛遞毫無苦纍所有􅑿餘銀兩請由驛站起解緣由臣謹具奏伏乞睿鑒批示遵行謹奏汝酌量合於是當而為之同日又奏為奏明拏獲匪犯家屬事雍正十年五月二十七日准廣東撫臣密咨內開已獲妄稱玉龍太子匪犯的名曽合流寓廣西梧州府一帶地方分散符劄研訊曽合供係江西㑹昌縣人居住土名案頭地方有父曽唯母髙氏長子祖祐次子文昌仔現在原籍合咨密拏等因到臣臣即密行司道府各官飛著該縣查拏去後隨據㑹昌縣詳報於閏五月初七日已將曽合之妻髙氏長子祖祐媳吳氏拏獲收禁其父曽唯毋髙氏次子文昌仔俱久經住房三間俱㸃明封記等因臣一面咨覆廣東一面復行按察司嚴查該犯係何年月因何事故出赴粵西平日果否並無音信來往本籍有無匪犯夥黨家資有無隱漏再行逐一查明取結另報外所有拏獲匪犯家屬緣由理合奏聞謹奏覽奏知道了雍正十年十月十一日江西巡撫臣謝旻謹奏為奏聞事竊照江西贛橋關雍正九年稅務經臣題委吉贛南道王世繩接管自該年九月十六日起連閏扣至雍正十年八月十五日一年之期已滿除將正額稅銀四萬六千四百七十一兩零准部咨照例撥充䖍鎮兵餉外所有該關贏餘銀共五萬五千二百三兩零現在委員領解交部轉繳內庫理合繕摺奏聞伏乞皇上睿鑒謹奏江西贛橋九江等關稅務向聞積弊相沿甚缺妥協近日較前稍覺整理否據實奏覆毋得絲毫隱飾當嚴飭該管人員將病商纍民之處搜剔屏除務令弊絶風清不得明革暗取陽奉隂違倘被朕别有所聞其咎仍歸於汝也同日又奏為奏聞事本年八月十六七八等日大雨連朝溪河水發有臨江府屬之清江新淦新喻等三縣沿江一帶低窪田內晚禾被淹經臣另疏題報外尚有吉安府屬之龍泉萬安兩縣南安府屬之崇義南康上猶三縣亦因山水驟湧溪邊居民房屋豆麥棉花皆有衝塌淹浸其因倒屋壓死者男婦共五名口幸於水發之後隨長隨消田稻被浸未久間有沙礫壅塞之田畝亦屬無多臣將節僃倉糶存榖價動銀二千兩分委各員各令帶銀前往按其倒塌之房舍計其田地之種植并壓斃之人口逐户按名分别賑恤務俾被水窮民不至失所以廣皇仁至晚禾收成雖分數不無稍減而被水止在沿溪一帶勘不成災是以未同清江等三縣一例題報臣謹繕摺奏聞伏乞皇上睿鑒謹奏當嚴飭委員竭力奉行務令小民均沾實惠毋致虛應故事更須加意訪察各該有司撫恤之勤惰以别其優劣雍正十年十一月十五日江西巡撫臣謝旻謹奏為請㫖事竊臣於雍正八年查江省歷年錢糧自康熙五十四年起至雍正七年共積缺銀三十八萬八千餘兩恐有官侵吏蝕借稱民缺等弊行令布政使李蘭一面催徴一面委員分往各縣按圖逐户徹底清查至本年三月因李蘭降調經臣奏請留江協查蒙恩允令協同新任布政使王紘辦理今經查明計已完過積缺銀三十萬六千餘兩未完銀八萬一千餘兩其未完銀內除豐城清江新淦三縣沙荒缺額無徴銀二千一百九十餘兩現飭確勘查核分别詳議另題外查有書役侵收并總催户首人等私收共銀三千一百餘兩具勒令一年通完其實在民缺尚有新淦等十一縣積年未完銀共七萬六千餘兩應即勒令速完但念積缺已久若將一十五年之缺概令完於一年之內民力既恐難紓而現在經徴之官徒受處分似亦無益可否仰懇皇上天恩准以分年帶徴則民力紓而官催易舊逋既可陸續通完新糧不難依限上納似於國課官民均有裨益如䝉聖恩俞允容臣另疏題請臣謹將積缺帶徴緣由繕摺奏聞伏乞睿鑒批示遵行謹奏分年帶徴之處具疏題請可也雍正十一年正月十八日江西巡撫臣謝旻謹奏為奏聞事竊照江省上年入冬以後於十二月初二日得雪自午時起至次日辰時止入土三四寸五六寸不等本年正月初三初四初九等日連得雨雪入土四五寸至六七寸不等查據各屬陸續具報并稱現今髙下田地俱各潤澤麥苗油菜發生滋長等情到臣理合繕摺奏聞伏乞皇上睿鑒謹奏江省雨雪接續情形以手加額覽焉同日又奏為遵㫖覆奏事雍正十年十一月二十六日臣標把總齎回奏報贛關􅑿餘稅銀原摺奉有硃批仰見我皇上愛民恤商至深至切臣跪讀之下不勝悚惕伏查江西兩關徴收錢糧有正稅有耗羡每年遵照定額解部外多者為􅑿餘解部轉交內庫此外尚有平餘銀兩係正稅贏餘兩項歸併彈兑多出之數贛關每年有平餘銀三百餘兩九江關每年有平餘銀三四千兩不等經臣奏明解貯司庫同鹽規銀湊給微員養廉僃用在案該關又有鹽船木筏給與關役之陋規名為神福每年約計銀二千餘兩臣到任後查各役已給工食豈可仍聽其收受故將此銀亦併入平餘項下彚解司庫僃用每年奏銷時同各項存公銀兩一併盤查奏報此臣經管兩關徴解之大略也贛關向照貨物抽稅零星揀查不無瑣屑又有則例不載比照上納者商民難於通曉自雍正二年欽奉上諭將稅則刋刻木榜𥪡立關口俾各商一望而知嗣因字跡糢糊重加鐫刻將比照之例一併刋入已無關蠧䝉蔽之弊其上稅時有書役飯錢押差插籌口岸照票巡欄查艙并算數等項名色臣酌其必不可少者量存一二仍減定數目毋許多收餘皆禁革其九江關例稅船料從前船隻到關俱由書吏隨口喝報得以髙下其手經臣題請丈船納稅可杜其弊但緣商民難與圖始初丈之時船隻稍有守候不無繁言今行之既久各船到關照額上稅不受關役欺蔽皆稱利便臣又因向來兩關稅簿俱用關印恐有更換遺漏改用臣衙門關防按季送核以杜多收少解并嚴禁地棍包攬以免誆騙科索而委管贛關之吉南贛道王世繩委管九江關之廣饒九南道劉均俱奉職惟謹實心任事至臣總理關務上關飭該管人員盡除病商纍民之弊斷不敢少有隱飾上負皇恩自罹重譴也所有料理兩關緣由理合據實覆奏伏乞皇上睿鑒謹奏若照所奏有何可諭必實能如是方於奉公恤商兩無愧也雍正十一年三月十六日江西巡撫臣謝旻謹奏為請㫖事竊照江省上年原屬有收近緣江浙兩省米價騰貴商販絡繹以致江省米價日增現今省城每石賣至一兩二三錢不等而鄰省之遣員前來購買者又接踵而至臣既不敢不為鄰省通其有無尤當為本省人民計其粒食恐米價日貴貧民買食維艱查江省常平倉榖并易漕之榖分貯各縣者共有一百二十餘萬石向例於青黃不接之時存七糶三接濟民食今當米價稍貴可否仰懇皇上天恩不拘糶三之例准令各屬酌量糶賣或十之四或十之五總以不得過半為率統於秋收時買補則目前平糶稍多既可廣濟貧民而將來易新還倉似於積儲亦有裨益如䝉俞允容臣於買補還倉疏內聲明題報是否可行伏乞睿鑒批示為此謹奏因時制宜酌量為之雍正十一年五月十六日江西巡撫臣謝旻謹奏為奏聞事雍正十一年四月二十八日據南安府申報附郭之大庾縣因四月十七日大雨連宵山水暴發十八日清晨城內水深五六尺至本日申刻漸退官民房屋人口田畝皆有衝壞等情臣即商同署布政使宋筠飛飭贛南道王世繩往勘情形督同該府縣查明被淹田屋人口數目即令動支贛關義倉存榖照上年崇義等縣被水之例作速散賑務俾不至失所去後五月初十日復據該府查報該縣淹斃男婦二十六名口衝倒瓦草民房約計一千餘間衝壞田禾約計一千五百餘畝又所屬之南康縣因接壤大庾溪流泛溢衝塌民屋七百餘間人口田禾俱無淹壞等情又據贛州府申報所屬之信豐縣亦於是日水發居民房屋衝倒約計一千餘間壓死幼孩二名沙土壅壓田禾約計一千餘畝等情臣俱飛行該道王世繩逐加查勘一體散賑其衝壓田禾亦酌給工本勸令開挖補種晚􅬘外臣正在繕摺具奏間復於五月十五日據撫州府屬之崇仁縣吉安府屬之吉水永豐二縣臨江府屬之新淦縣各報本月初九初十等日山水驟發沿溪村落俱被水淹房地人口皆有損壞容俟查實另報等因臣又委員攜帶公項銀兩星夜前往分路確查撫恤并查附近各縣有無被水如有成災之處另疏題報所有各屬先後被水情由理合奏聞伏乞皇上睿鑒謹奏似此撫恤之舉務令災黎獲沾實惠方為有益若但虛應故事委卸屬員一任不肖輩就中開銷以及姦胥蠧役乘機舞弊侵蝕中飽朕有所聞則罪歸於汝也詳愼為之雍正十一年六月二十八日江西巡撫臣謝旻謹奏為奏聞事竊照江省大庾南康信豐崇仁吉水永豐新淦七縣被水臣據各屬具報先經繕摺恭奏并聲明委員勘賑在案續據峽江清江豐城南昌宜黃樂安等六縣亦報被水又經委員勘賑嗣據各委員㑹同各該縣具報此番被水惟崇仁永豐吉水新淦峽江等五縣為獨重共計淹斃人民九百餘口衝塌淹浸房屋五萬餘間臣聞報驚駭深愧奉職多愆致民有此水厄隨商同署布政使宋筠酌定銀榖賑數多差幹員攜帶存公銀兩分往各縣并檄行各該地方官動用倉榖公同委員分路查勘隨查隨給銀榖並賑如榖不敷用即於鄰縣動撥協濟今於六月二十六等日據各委員具報照依賑恤之數核算大小人口計日給發以早稻登場之日為止酌給銀兩收掩遺骸資葺房屋現在人民有補種晚稻者有改種雜糧者房屋亦經修葺已無流離失所其餘各縣淹斃人口倒塌房屋俱為數無多臣亦飭令一概賑恤以上各縣動用倉榖多者約至四五千石少者一二百石所給銀兩多者約至二三千兩少者二三十兩不等統於賑畢後造冊報銷除南康信豐二縣被水甚輕勘不成災外餘俱遵例具疏題報俟查明分數另行具題仰惟皇上軫恤民瘼痌瘝念切合將分别被水輕重賑恤緣由恭摺奏聞伏乞睿鑒謹奏加意撫恤不可有名無實草草塞責江右境內屢見災眚汝等之不合天心弗問可知即朕誤用之咎亦何辭以謝亟宜返身自省愼之愼之雍正十一年七月二十八日江西巡撫臣謝旻謹奏為覆奏事雍正十一年七月初四日臣標把總齎回五月十六日恭報各縣被水原摺到臣奉有硃批諭㫖臣跪讀之下不勝惶悚伏查臣先據各縣報水業於六月二十八日將委員攜帶銀兩飭令動支倉榖查勘賑給緣由恭摺奏明隨於六月二十九日具題在案嗣經奉到硃批仍恐委員虛應故事或有浮冒開銷以及胥役中飽等弊臣又密令誠實人員細加察訪據各回稱訪得各處災民領賑之數與報賑之數皆屬相符被水之民莫不歡呼感戴仰頌皇仁現在並無失所等情除將各縣是否成災確核分數另疏具題聽候部議外其各縣賑恤之處業據布政司轉據各員開報淹斃男婦人口分别大小及有無親屬酌量多寡給令收瘞衝塌屋宇分别瓦房草舍及有無存剩屋料酌量多寡資令修葺被災人民分别人口大小及有力無力酌給口糧資令接熟又如田畝勘不成災水退補種須用人力者亦酌量資給以上各項通共給銀八千七十六兩有零榖二萬二千二百四十石有零統俟另行分别題咨報銷所有賑恤數目及查無冒銷中飽緣由理合具摺奏聞伏乞皇上睿鑒謹奏雖據奏稱查無冒銷中飽等弊然該縣賢愚各異而被淹人口又多寡不齊其間或稍不妥協皆惟汝是問也同日又奏為欽承聖訓謹瀝臣衷仰祈睿鑒事竊臣據江西署布政使宋筠將該司報水奏摺欽奉硃批諭㫖敬録傳示到臣臣跪讀之下不勝惶悚伏念人生之本惟忠與誠稍有不忠不誠不可以問心即不可以對天不可以對皇上也臣才識庸愚謬膺重任惟恐奉職多愆時時反躬惕懼蒙皇上提撕警戒示以忠誠皇上之訓臣者如此其切勉臣者如此其至臣敢不仰體聖心益加自勵惟有勉同宋筠等永矢精純不務名而務實盡除顧慮不問迹而問心將利害之見悉去忠誠之志益堅以期仰報天恩於萬一耳臣謹將凜遵聖訓微忱恭摺奏覆伏乞睿鑒謹奏夫誠者真實無妄之謂忠者內盡其心而不欺之謂皆非可以言說見也汝此奏仍不過口頭禪耳烏足取同日又奏為奏明存庫耗羡等項銀數事竊照江西司庫存公銀兩臣於每年奏銷盤查時將耗羡及各項充公等銀一併盤明歷經奏報在案今雍正十一年奏銷雍正十年錢糧照依往例親赴司庫逐一盤查俱無虧缺除正項錢糧㑹同督臣題報奏銷其耗羡等銀自雍正二年至雍正十年支用細數遵例於歲底造冊送部外所有現存各項共銀一十七萬一千五百八十六兩零臣謹繕具清摺進呈御覽伏乞皇上睿鑒謹奏覽奏知道了毋因存庫饒裕而涉於濫用雍正十一年九月初六日江西巡撫臣謝旻謹奏為奏聞事竊照江西按察使孫詔於本年八月初二日到任即於初五日患病據醫生云係內傷外感之證迄今一月有餘客病雖已稍退而身體虛弱難於即痊不能坐堂理事臣查雍正六年十月欽奉上諭嗣後督撫等倘有一時患病難以辦事者不可勉强支持即著一面奏聞一面將印務酌量委人署理俾得安靜調攝則所患自然易於痊可足以慰朕體恤臣工之至意若兩司中有似此者著該督撫仰體朕心亦酌量委員代辦具摺奏聞欽此欽遵在案今臬司孫詔患病不能速愈臣自當仰體皇上愛恤臣工之至意委員代辦俾得安靜調攝以期痊可緣布政使宋筠先經署理臬篆辦事詳愼臣是以委令暫行代辦一俟孫詔病痊即令自行辦理臣謹恭摺奏聞謹奏此奏是孫詔多令調養數時毋俾勉强從事如應逹部咨部存查雍正十二年正月初八日江西巡撫臣謝旻謹奏為奏明事竊照江省司庫存公銀兩前因每年存剩無多恐有一時需用之事未免不敷荷蒙皇恩將雍正八年稅契銀七千八百五十三兩零撥存司庫以僃地方公用欽遵在案今查司庫公項歷年支剩現存銀一十七萬餘兩似可敷用前項原撥稅銀至今未有支動臣思稅銀原係解部錢糧公項既敷似應仍行解部可否容臣咨明户部聽候撥解臣謹繕摺具奏伏乞皇上睿鑒批示遵行謹奏公項既稱敷用照例仍行解部可也雍正十二年四月初六日升任江西巡撫臣謝旻謹奏為奏聞事竊照江省因匪犯黃森官等一案查拏餘黨各屬遇有面生可疑之人隨即嚴行盤詰今據奉新縣盤獲道人一名姓朱名一如瑞州府髙安縣人因其言語支吾搜查行李內有布包木板一塊寬長僅止寸餘上刻山川射稷久久一定八字背面刻堯紀龍三字又有殘缺推背圖一本形跡可疑似非善類差押解省隨發南昌府細加研訊併飭密行高安縣確查該犯的實住址姓名有無親屬平日作何生理有無為匪蹤跡去後兹據南昌府呈報經髙安縣拘到該犯族鄰訊明該犯年四十歲原名姚長政因出家改名朱一如有妻朱氏有子二人現住髙安城內該犯向曽開店賣藥於雍正元年出外浪游往來無定今年二月到家賣田不遂復即他往等語質之朱一如供亦相同至詰其所攜木牌來歷據稱伊於雍正元年赴四川峨眉山出家其師號德正道人姓劉在峨眉山打坐一百二十多年現今約有一百五六十歲布包木牌即係德正道人所給令伊於雍正十二年八月內往江寧賣藥遇楊一道人來㑹時開拆詰其木牌所刻字跡是何隱語社字何以刻作射字楊一道人住居何處㑹見欲作何事因何已經開看據稱德正道人止說木牌是講坐功却病之法並未說有何隱語亦不知刻作射字緣故楊一道人原想到江寧訪問實不知其住處因向有痰疾德正原說㑹見楊一道人將木牌開拆病即可愈上年患病不好所以即行開看詰其殘缺推背圖來歷據稱是上年六月在奉新上富地方將十餘文錢向杜姓算命老人買來查提杜姓算命之人隨提到伊子杜希登據供伊父名杜應邦今年有七十六歲已於上年十一月內病故向曽在上富地方擺桌子算命其有無賣給朱一如圖本伊係不識字之人並不知道等語詰訊朱一如何故行蹤無定因何來至奉新且攜帶禁書明有為匪情事據稱窮苦遊方行醫度日原無一定住處今年二月聞奉新白雲菴有田可住到菴數日回家欲賣田買牛因妻子不肯仍回菴來隨即被拏并云一向患病如此模樣豈能做得匪類等語嚴訊至再矢口不移並不知有散劄為匪之事録供呈詳到臣臣查朱一如雖無為匪實據但隱匿名姓行蹤詭祕木牌圖本字義不倫未便輕縱除密咨四川江南督撫查獲德正道人及楊一道人訊供移覆再行確䆒外所有盤獲人犯緣由理合繕摺奏聞伏乞皇上睿鑒施行謹奏此二道人料非善類俟各該省獲解到日嚴訊自明硃批諭㫖卷一百三十八下
