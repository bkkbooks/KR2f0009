body:
  text: 欽定四庫全書硃批諭旨卷一百九十硃批鞏建豐奏摺雍正五年十月十三日提督雲南等處學政右春坊右中允臣鞏建豐謹奏為恭謝天恩事雍正五年九月十九日據雲貴督臣鄂爾泰承差自京齎捧到皇上賜臣欽定詩經二函臣方考試在外隨出郊跪迎至署恭設香案望闕叩頭謝恩祗受訖伏念臣才識凡陋視學滇南自考校士子以來諄切提命多方振興正懷覆餗之憂叨蒙聖恩之賜載歌天保仰祝升恆循諷皇華每懷諏度啓金函而盥誦敬什襲以珍藏惟有勉竭駑駘洗詞章訓詁之陋習加意鼓勵成溫柔敦厚之淳風以仰報洪恩於萬一云爾謹此具摺恭謝天恩伏乞皇上睿鑒謹奏此應具題之事何得摺奏將迂腐二字須當洗淨袒護科目之惡習尤宜屏除無遺勉之愼之其餘無恥不端之行諒汝不為朕亦有以相信也雍正六年二月二十五日提督雲南等處學政翰林院侍講臣鞏建豐謹奏為恭謝天恩事竊臣前蒙恩賜欽定詩經二函具摺奏謝奉有皇上硃批臣隨恭設香案望闕叩頭謝恩訖伏惟臣奉到賜書理應具本恭謝緣愚昧無知誤用摺奏乃蒙皇上不加譴責指示詳明跪讀諭旨感懼交集至於迂腐之習臣屢荷聖訓痛自改責務期洗滌淨盡到滇以來遇有抗糧劣行士子即行黜革懲治不敢稍存袒護私心惟有益自勉勵恪守亷隅盡心校閲使邊方士習克端以廣右文之化庶幾仰答洪恩於萬一耳謹此具摺恭謝天恩所有奉到硃批原摺合併恭繳謹奏如果行能踐言可謂不辜朕之期望矣但習俗最易染人被染既深不自覺知者多同道相濟四字誤盡人一生名節品行不可不知若能遵朕訓誨心悅誠服一日三省事事體察逐漸洗除舊汚始可進言移風易俗也莫作容易理會勉之硃批諭旨卷一百九十
