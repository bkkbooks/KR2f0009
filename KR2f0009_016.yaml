body:
  text: 欽定四庫全書硃批諭旨卷十六硃批費金吾奏摺雍正六年八月二十七日山東布政使臣費金吾謹奏為欽奉上諭恭謝天恩事雍正六年八月十五日接怡親王大學士張廷玉字開奉上諭各省藩臬乃地方大員應準其各就所聞所見具摺陳奏等因欽遵寄字到臣隨恭設香案望闕叩頭謝恩訖伏念臣至愚至陋重荷皇上天恩由知府歷升布政使自顧菲才恐難勝任惟冀聖主示以章程庶幾微臣知所遵守兹蒙皇上俯鑒許臣摺奏俾下情得以上達以藩司而內比卿寮外同督撫臣何人斯仰邀皇上成就之恩至於此極臣今年六十二嵗賦質本來薄弱自雍正三年請訓之日蒙皇上恩賜人參嗣在河南又蒙欽賜養廉充裕竟得常服參苓時加調養數載以來精上諭日期并感激私衷理合恭摺奏謝今臣初次奏摺謹遵奏覽同日又奏為敬陳地方事宜仰祈聖訓事竊臣一介庸愚荷蒙天恩畀以布政使重任初到地方恐有錯誤時切焦思惟幸得請聖訓凡所未諳庶有章程謹將臣到任以後所聞所見之地方情形有關吏治民生錢糧利弊者臚列具懦所司鹽政不能振作清釐近署臬篆刑名案件叢脞難清業經面稟署撫臣嶽濬寄稟督臣田文鏡改委濟東道唐綏祖署理矣糧儲道魯國華於漕弊稽察不嚴致州縣收漕每多浮溢今督臣出袁霯居官狼藉現在詳查欵迹安邱縣知縣陳姚英鄆城縣知縣徐寧禹城縣知縣沈宗熹臨邑縣知縣金陵縣知縣王與彭陽信縣知縣劉鼎玉率皆庸懦無才或催科乏術或聽斷不明難勝牧民之任臣伏念人才難得為上司者當以化導裁氣習已成猝難驟改况臣在河南幾及三載從督州縣等官現在分別參究改用二項詳請具題外所有鹽法糧儲二道不能勝任緣由臣已稟知督撫二臣聽候查核謹奏以一惰徴之積習宜懲也山東省額徴地丁錢糧除存留解支外每年起解司庫銀計二百六十七萬兩有竒臣查核歷年完欠實數自康熙五十八年起至雍正六年七月臣到任之日止通計新舊未完銀四百八萬九千三百六十餘兩而存庫項下之積欠尚不在內較諸河南之連年通完者固相懸殊竊疑各省亦未必有似此疲頑者臣每伏讀上諭為政務寬嚴相濟今山東當積寬之後似宜濟之以嚴臣既進山東界即於途間檢查册籍見有本年地丁錢糧分釐未解者到任十日已八月朔矣而金鄉知縣錢紹祖朝城知縣祁邦鼎清平知縣時並楚仰體皇上用一緩二之至治先將本年及雍正五年分與五年分帶徴之各年舊欠嚴督完解限於兩月內將所限之項全數通完過期即嚴提經承究責并取惰徴職名詳參言期必信法在必行俟行之有效再將一年之欠限令通完如此則立法雖嚴而行有次序庶惰徴之積習或可漸次改移臣愚昧之一隱地之清查宜亟也竊惟首報隱地一事蒙皇上仁同覆載寬其既往之誅假以自新之路先定一年之限又展六月之期聖恩浩蕩茍有心胸者無弗欲全數報升而恐後唯是偏隅僻地或未能洞悉周知村鄙鄉愚或不識丈量規法以致全未首報者有之首而不全者有之臣前在河南將自首免罪之恩旨并欽定首報之限期俱撮敘要略刋刻小單并將丈量規法録刋一本一併飭發地方官分給地户俾得自行查丈嗣據各州縣丈首隱地陸續詳報前來自雍正五年六月奉旨以後至六年七月臣離任日止統計各案首報隱地共二萬二千餘頃今查山東省自奉旨以後至今首報隱地共止二百九頃有竒恐隱匿未首者所在俱有臣愚以為小單丈法行之於河南既有成效似可行於山東稟商署撫臣嶽濬亦以為然今山東現在刋刻式樣俟詳定通飭舉行抑臣更有請者首報出具並無隱匿印結申送督撫司道府州備案如逾至限外仍有隱匿地畝除本户照定例治罪外即將揑結之地方官作何從重處分倘有不肖官吏借查丈名色索詐派纍抑或不法棍徒挾嫌誣首以及接任官故將窄小弓口查丈誣陷前官亦逐一分別治罪如此則地方有司畏法奉行不敢虛應故事矣如蒙諭旨頒到本地之日為始臣愚昧之見未知當否伏乞聖裁以上事件微臣管窺之見實不敢自信恭請皇上睿鑒施行謹奏所奏可嘉之至朕一一欣恱覽焉同日又奏為敬籌盤查倉庫之法仰祈睿鑒事竊惟州縣倉庫責成府州而各省報參虧空由督徴官察出者少而為接徴官揭報者多夫豈上司之威嚴翻不如接任亦豈後官之精察必過於府州良以州縣官印信在手則百弊叢生實情難得雖日事盤查終為故事逮新舊交代盤查之際印信已在新官舊官一無權柄則經胥方敢將舊官某年某欵虧空若干緣由和盤托出同一盤查而難易若此實經胥以印信之去留為從違也臣請皇上降旨定例凡府州盤查所屬倉庫於按臨州縣之時先令該州縣將印信交出當面驗封貯庫而後喚齊總吏庫書經承調齊各項文卷册籍逐一盤查嚴訊是否揑造有無虧空務得實情如無虧空仍將印信啓封交還州縣一有虧空星速具文通揭一面將徴存銀兩代填批文鈐蓋府州印信起解司庫一面將城池倉庫及虧空之員交與佐二捕官加謹看守聽候參審如此則經胥無瞻顧之慮而州縣之虧空易於盤查矣是否可行伏乞皇上睿鑒施行謹奏爾此論殊於大體有礙如果該管府州實力多方訪察此數屬員之貪廉優劣何難洞悉若因防禦一二不肖州縣將屬貟盡如防盜然遍行摘印一次成何規模觀聞甚覺不雅朕意可以不必雍正六年十月十八日山東布政使臣費金吾謹奏為奏聞事竊惟州縣之賢否上關國計下繫民生全在人地相宜方收實效查髙唐州京省通衢東阿縣驛衝民悍夏津縣掖縣皆沿河沿海要缺而知州郭孝穆知縣何一蜚金秀謝名洪皆不稱職又邱縣境無河工而知縣王輅則長於河務德平縣民稠事雜而知縣袁舜裔乃不諳書生其他不相宜者尚多亟宜因地樹人通籌酌調者也至於歷年帶徴之民欠胥役里書包收侵蝕者甚多亦宜設法查追從前派買之倉榖數目多寡尚欠均平尤須變通料理再如餘稅隱地黃銅等事重耗陋規私派等弊臣職在藩司又當隨時隨事督率稽查以期實效者也以上各項事宜現在查詳督撫核奪具成例稍有更移者謹一併附奏伏乞皇上睿鑒施行一臣到任之後聞山東運河夫食項下歷有浮冒銀兩上而院道胥吏下而佐二河貟與夫積年盤踞河工之姦猾夫頭莫不染指分肥至於河官額外多索之夫價印官指一派二之幫錢更無從稽查弊難枚舉近年雖有節省之名大率出於額外多索之夫價其每年額設幫貼項下所侵蝕者較之未節省之前僅減十之二三究未能全歸實用伏乞聖裁一臣據曲阜縣知縣孔育琚稟稱衍聖公府有歷朝聽撥屯厰種地之佃户灑掃廟庭之廟户及自置田産種地之佃户并家人之佃户悉號户人甚至一人種公府一畝之地而其宗族三黨悉冒充户人此等户人中凡窩賭窩娼窩盜并賊線燒鍋等事無一不為曲阜縣衙役俱不敢過問等語到臣臣查凡衍聖公府佃户俱不入牌甲遇拘提人犯必由衍聖公發解此不服地方官拘喚之所由來臣請嗣後衍聖公親隨家人如犯細事該地方官申報衍聖公自行懲治如依勢橫行及情事重大者許一面通報上司一面徑行拘審至若佃户廟户等一概編入牌甲約束稽查無論大事細事一有告發俱聽地方官徑拘審明實則治罪倘有朝廷之法立而衍聖公亦不致為匪人所纍如蒙皇上允臣所請容臣定議具詳督撫再加察核題請定例永逺遵行謹奏覽雍正六年十一月二十八日山東布政使臣費金吾謹奏為恭謝天恩事竊臣接臣子費謙流家信本年十月內蒙皇上隆恩補授湖廣德安府知府臣隨恭設香案望闕叩頭謝恩嗣於十一月初六日臣子謙流馳到臣署敬宣皇上恩旨準臣子取道濟南聞命之下欣感無似伏念臣一介庸愚涓埃未報臣子謙流年輕質陋閲歷尤淺仰蒙皇上天恩由知縣歷升知府半載之中湛恩疊沛復荷垂鑒臣舐犢之念臣子烏鳥之私俾臣父子相聚天恩浩蕩報稱彌難臣因德安地方緊要已令臣子於是月十九日星馳赴任諄囑臣子謙流夙夜維勤氷淵時惕殫心力之所至盡職分之當為以仰副皇上天髙地厚之恩於萬一耳所有微臣感激私𠂻理合恭摺奏謝謹奏當加意教訓之朕觀謙流誠慤有餘才具少覺不及須勉其精勤自勵莫被屬員欺誤為要雍正七年正月十四日山東布政使臣費金吾謹奏為敬陳錢糧事宜仰祈睿鑒事竊臣於雍正六年七月二十一日抵任時通計本年應徴錢糧除存留外未完新舊起運丁地銀四百八萬九千三百六十餘兩官吏積玩完解稽遲臣按册查考急思整頓一面揭參惰徴之尤者以警其餘一面設立限單催提之法以省差擾復據臨清齊東魚臺滋陽等州縣報出收書侵蝕多至一二千兩少亦數百兩不等其所侵蝕者多係帶徴錢糧查康熙五十八年至雍正元年各民欠蒙皇上天恩分作八年帶徴原為東省窮黎紓其餘力乃姦胥猾吏竟以每年應徴分數有限儘可通融那此掩彼而徴收官亦以全完年限尚逺遂置若輩侵收於不問欽蒙皇上至聖至明洞悉東省錢糧積弊叢生著督臣田文鏡主張料理命臣盡心竭力協同贊助臣敢不矢公矢慎日夜圗維所有各年帶徴錢糧不獨從前應徴分數未完者當嚴查有無侵蝕即如已酉庚戌辛亥三年帶徴錢糧亦不敢以非係本年應徴之數因循怠忽釀成虧空是以臣即詳明督撫通飭將八年帶徴錢糧及早嚴查在案封印之後臣通計自到任迄今共催解過正項銀二百萬兩有竒尚有未完起運銀二百八萬餘兩再加本年額解銀並今年應帶徴銀共三百一十餘萬兩合計已酉年新舊通共該徴解銀五百二十萬餘兩臣以疏才當此巨任實切氷淵之懼而受恩深重圗報無能惟有竭盡駑駘勉供厥職不敢偷安茍逸以負君恩而已所有臣辦過雍正六年錢糧事宜理合恭摺奏聞伏乞睿鑒施行謹奏凡地方事務之宜緩宜急悉聽督臣田文鏡之指示實力行之不可陽奉隂違另立主見田文鏡朕可保其必無過不及之舉其所令緩者固不可急於求效其所令嚴者亦不可過急而推怨於督臣須同心合德商酌為之能如此則東省之民風吏治一兩年間可望如豫省一般假若各懷意見時而針芥時而矛盾朕則不能必其後效也將此諭亦與嶽濬看同日又奏為欽奉聖訓恭謝天恩事竊臣前奏臣子費謙流奉命補授湖廣德安府知府取道濟南赴任臣父子感激謝恩一摺奉到硃批諭旨伏念臣子謙流質本迂愚才尤短淺我皇上至聖至明洞鑒無遺命臣教導勉勵莫被屬員欺詐睿慮周詳天語諄切臣惟有愈加切囑臣子仰遵訓旨兢兢業業竭盡駑駘以供職守圖報天恩浩蕩於萬一也兹於新正臣復寄信嚴飭謙流令其恪遵雍正元年欽頒上諭知府一道察吏勤民不辭勞苦不避嫌怨凡事實心實力而行庶表率屬貟不愧知府之任以無負皇上天恩曲成不遺之至意所有微臣欽遵緣由并感激愚忱理合恭摺奏謝謹奏好遇便即朂勉之日久生懈隨境遷移乃人情之常心為一身主宰尚時有搖惑君父之訓何能一聽不忘須頻加提撕自必獲益良多雍正七年四月二十八日山東布政使臣費金吾謹奏為恭謝天恩敬請聖訓事雍正七年四月二十六日奉山東巡撫牌開準吏部咨開奉上諭嶽濬著於五月初起身赴陜送伊父嶽鍾琪前往肅州俟嶽鍾琪統領大兵起程後再回山東任所山東巡撫印務交與布政使費金吾暫行署理欽此欽遵牌行到臣臣隨恭設香案望闕九叩謝恩訖伏念臣本庸才現在藩司事務閲歷已經數載猶覺綆短汲深今署理撫篆責任尤重伏乞皇上俯念臣愚恩垂聖訓俾臣奉為章程措諸行事則於封疆重務既裨益宏多而臣獲免錯誤亦得為聖世稱職之臣尤感皇恩於生生世世矣為此繕摺恭謝天恩謹奏虛心聽從督臣田文鏡之指授實力奉行不懷嫁怨推過之念訓汝章程止此二語勉之倘遇緊急事􅟢又當一論亦不可因往復商訂而遲誤機宜原為汝稔悉田文鏡之居心行事所以調汝山東但能於根本主見處暗相契合枝葉邊即少有同異亦無妨也雍正七年六月初八日山東布政使臣費金吾謹奏為恭報二麥豐收秋禾遍播仰慰聖懷事竊今嵗東省地方仰荷聖德涵濡雨㿩時若二麥豐稔查得濟南等六府泰安等六州所屬各州縣二麥收成據報七八九十分不等惟鄒平昌樂安邱等縣五月初七日偶下氷雹麥收稍減其雹重之處臣已飛飭查明如有無力補種晚榖雜糧者酌給社倉糧食以資籽種日內正當秋苗望雨晚禾補種之時於六月初三初七等日連得大雨早禾暢茂晚禾補栽省城新麥價值每倉斗一石銀五錢五六分千村萬户共慶盈寧所有二麥收成分數并得雨日期理合繕摺奏聞謹奏覽奏麥收分數并得雨情形已悉至於秋禾必待登場方可謂之收成惟宜誠敬以迓天庥切毋肆志預為大言同日又奏為奏聞事竊查山東藩庫耗羡公項銀兩欵項不一如耗羡則有一錢四分者有七分者公項則有扣缺養廉有雜項充公有撫藩分規俱應繕摺奏報謹將臣自雍正六年七月到任起扣至雍正七年四月止所有耗羡公頁銀兩管收除在數目分析造具清摺恭呈御覽又前任布政使嶽濬暨臣各查明藩庫併尾餘平銀兩數目謹一併繕摺奏聞再查從前歷任布政使任內支用銀兩有現經奉旨追補者有未經奏請而動支者有不應動支者有支用浮多應核減者均須分追還項臣前已詳請署撫臣嶽濬酌奪猶未及逐一酌定所有已經酌定追還之項臣已於新收項下登明尚有未經酌定追還之項因嶽濬已往陜西臣今復稟商督臣田文鏡去訖俟督臣核定示知到日另摺具奏合併聲明謹奏統聽督臣田文鏡核定奏聞朕無暇細覽此等琑屑計簿也同日又奏為奏聞事竊照朝貢驛使併伴送人員所用夫馬廩膳應遵定例支給若額外需索濫應與受均有應得之罪雍正七年五月十二日據茌平縣知縣稟稱暹羅國朝貢使臣人等於五月初二日到茌平境俱遵照勘合應付於初三日出境今將廣東號票二紙山東交界州縣入境出境日期同前途傳知草單稟送等情到臣隨將草單與號票比對所用夫馬車輛廩給口糧多寡不符且草單內開有通事前站押象及象奴人等銀兩并酒席等項事屬違例支給法應查參臣巳將貢使所歷之山東州縣分諭嚴查因各屬稟覆情節參差不一正在嚴諭駁查是以未敢具奏兹於六月初五日接準部咨欽奉上諭令州縣等官將伴送暹羅國貢使人員勒索騷擾之處據實首報臣現在遵旨嚴檄各屬據實首報如有含糊隱匿即行題參謹此繕摺先行奏聞謹奏前既隱匿未奏後若不能確察實情則不能辭其咎也毋聽屬員文飾之詞自干欺蔽之過加意訪察以聞雍正七年六月十七日山東布政使臣費金吾謹奏為請定復職人員補用之例以裨吏治事欽惟復之員該督撫題報全完即給咨本官隨本引見數月始得明悉而試用新選之員尤未易熟諳以地方凡臨民辦事既知所趨向而該省多得熟悉風土之員於吏治亦不無小補臣愚昧之見是否可行伏乞聖裁謹奏此奏殊無可取録用廢貟係朕格外之恩若作為成例不令離本省本任則將因公罣誤庭分視為具文矣今仍令離任引見候旨伊之功名得失尚在兩可之間畏法之心自不能已及至開恩録用感奮之心必當倍切若照汝所奏則法不畏而恩不感大非朕此舉之初意矣爾於此一事識見甚屬卑淺總之到用人一節未有不被牽扯淆亂主見之人也為君難治天下之道除用人外更無難事若不能深體此一難字而以専去取作威福為快意事則與求才用人之道大相悖謬矣同日又奏為科場經費不敷請旨動用庫項事竊惟雍正七年已酉科鄉試在邇所有科場事宜現在上緊料理查文場經費項欵有二一係貢院修理一係場內鋪墊供給以上二項額設香稅銀兩不敷應用從前開銷香稅之外將俸工銀兩添補逮俸工停捐則動耗羡銀兩添補案查雍正四年丙午科修理貢院動用丁地銀四千五百六十八兩有竒其鋪墊供給動用額設香稅銀二千五百一十二兩有竒又添補耗羡銀六千四百兩有竒臣細加查察鋪墊供給一項從前尚無浮冒唯貢院修理一項弊竇甚多尤當加意清釐是以今年二月間即委濟南知府金允彛估計修理據估報工料銀四千八百兩有竒臣思東省貢院於丙午科題請大修之後逮今甫及三年何至需用工料如此之多臣隨親往驗看內外房屋并舉子號舍果皆坍塌不堪逐一估計約需銀二千六百餘兩臣細訪坍塌緣由及濟南府多估之故緣東省向有蠧棍曾衍泗韓世傑等名為貢院經承一遇鄉試之年委員估修彼即承當料理勾通各匠頭崔進舉各蠧役工匠拏禁現在審擬其修理貢院之事改委齊東令李浤監督現在興工但額設修理之費只應開銷香稅銀五百六十兩約不敷銀二千餘兩例係耗羡銀兩添補今查有從前刑名部飯餘剩銀二千兩適可敷用是本年已酉科修理貢院可無庸更動耗羡添補矣至於鋪墊供給一項以往科計之約需銀七千二三百兩但額設鋪墊供給只應開銷香稅銀二千四五百兩其不敷銀四千七八百兩例係耗羡銀兩添補今擬將卷價節省可餘銀二千餘兩添補應用則鋪墊供給項下所不敷者只有二千七八百兩臣擬於司庫公項銀內動支應用事竣核實具奏事關動用庫項臣未敢擅便伏候皇上批示遵行謹奏肯如此細心辦理地方事務朕復何慮可嘉之至雍正七年七月十二日山東布政使臣費金吾謹奏為奏聞事竊查兖州府屬之魚臺縣濵臨運道地勢低窪又為濟寧嘉祥濮州巨野曹縣單縣城武金鄉定陶諸邑出水咽喉一遇大雨則上遊諸邑之水建瓴而下莫可遏禦抑且下遊江南沛縣之荆山口等處淤塞日久水無所歸致魚臺縣頻年被水是魚臺縣之水利亟宜講求唯慮魚臺之淤河一開則東省十餘州縣之水全注於江南沛縣夫江南山東之民均屬朝廷赤子豈可異視是欲開魚臺之淤河必先開沛縣之淤河欲開沛縣之淤河必先查沛縣出水之處臣已於本年二月間嚴諭魚臺縣關會沛縣查謙疏濬於四月內據魚臺縣詳稱準沛縣覆稱沛邑昭陽湖迤東有張孤山十字河等處可逹荆山口引水入於運河因河形年深久廢現在詳請開挑未蒙上司批示等情到縣轉詳到臣臣隨詳請河臣嵇曾筠咨催江南河臣撫臣會同疏濬去後尚未接奉回咨於七月初五日據魚臺縣報稱六月初七初八十六等日天降時雨各處咸慶甘霖而魚臺為聚水之區以致兩岸低窪地方翻被水淹等情到臣除飛飭該府縣加意撫恤并勸諭補種雜糧外伏思魚臺縣地勢低窪臣若早能會同江南設法疏濬俾髙下地畝全省豐收豈非全美乃臣俟沛縣關覆前來始詳河臣咨催以致輾轉稽滯貽誤地方罪實難逭伏乞皇上敕部將臣嚴加議處以為奉行不善之戒再濟寧州嘉祥縣等處應開之河道亦在江南上流必須江南查明出水處所會同疏濬臣均於五月間詳請河臣嵇曾筠督臣田文鏡咨商訖惟俟江南覆準之日殫心竭力會同辦理合併聲明謹奏覽奏已悉江南大員於本省本任內政務尚多曠廢不能料理何暇及汝鄰省咨商事宜耶疏濬事宜命廷臣現今詳議候另有諭旨同日又奏為敬陳東省辦騾實情仰祈睿鑒事竊東省採買軍需馱騾一事蒙皇上特頒諭旨將地方官并解官交部議敘又恐定價暨餧養準銷之銀不敷著該州縣將多添之費據實報明於本省存公銀兩內照數給發欽奉之下仰見我皇上垂恤臣子之洪恩誠無所不至而無以復加矣臣接準部文遵即宣布皇恩通行各屬去訖唯是東省州縣所買騾頭有本地省城之分而其價值亦遂有定價時價之異無庸概行添給其在本地採買者大都買自紳襟富户照依定價給發欣然領受且有急公念切不願受價經地方官再三慰諭而始受者若夫省城採買之故則因州縣辦齊騾頭解至省城經院司挑選不無駁換數頭勢必在於省城牙市就近採買市人昻其價值以致定價不敷難免添補然係州縣原辦未佳無可致怨且選下之騾又仍可變易價值則所添之費亦屬無多荷蒙皇上敕部議敘實為浩蕩洪恩若再添給價值臣子之心何安臣愚以為省城所買騾頭無庸添給價值其本地所買騾頭臣再行曉諭賣騾人户知悉如情願添價者令地方官造册送臣核實給發如急公出於至誠不願添價者亦聽赴地方官呈明令該州縣分別騾頭多寡給以扁額花紅以示奬勵緣係奉旨添價事理臣未敢擅便伏乞皇上訓示遵行至餧養之費誠恐準銷之數不敷現在遵旨確查容查明另摺奏請合併聲明謹奏所奏知道了應題者具題應咨部者咨部雍正七年閏七月初一日山東布政使臣費金吾謹奏為欽承聖訓恭謝天恩事竊臣前奏請定復職人員補用之例一摺蒙皇上諭旨訓示臣跪讀之下感激惶愧一時交集謹望闕九叩謝恩外伏念臣愚昧無知識見淺陋少時僅從事於舉業不識仕學津梁今以卑鄙之見陳其荒謬之言蒙我皇上訓以萬世不磨之至論微臣茅塞頓開始悟臣之前奏非惟無益於吏治亦且足以開奔競之端所言實不當理自兹以後臣唯有凛遵皇上用人之道恪體皇上用人之難益殫愚誠愈矢公慎以仰報天恩於萬一耳為此繕摺奏謝伏乞睿鑒謹奏凡人但當為巳不必為人善為巳者當公而不私善為人者尤當不私而公所謂公者非皆為皆不為也不徇一巳之私名之謂也待人不必信亦不必疑夫過疑則失人過信則自失二者之誤皆由於預立成見故也惟宜虛巳以待其來何難真偽立辨此一事此一時真則信之此一事此一時偽則疑之再來亦復如是何慮被人欺誑一事見信不可即信其將來百事皆實一事見疑亦不可即疑其將來百事皆詐似此公正虛明方不忝統率之任局量須大心行須誠更加培植涵養工夫日久體驗不誣庶幾得御下之道不然根本一差觸處皆謬也勉之同日又奏為恭報查路諸臣入境日期事竊查直隸山東江南大路嵗久成溝一遇雨水之時衆流滙歸積潦難退行人每苦泥濘或致守候蒙皇上深加軫念特遣大臣踏勘形勢另開新道其地形斷續之處則命修建橋梁其溝塍淤積之區則命疏濬水道在行旅既喜皇路之坦平而農人野老更喜田有溝洫凡天下臣民經由大道者莫不賡歌帝澤而山東之窪地從此水道深通水有歸泄尤沐皇恩於億萬斯年矣茲欽差侍郎臣法保等於七月二十二日入山東德州境一路踏勘至二十五日抵齊河縣地方臣謹同省城司道等官出郭跪請皇上聖安并與侍郎臣法保等商問踏勘法則并修治事宜隨據紳士軍民人等感激聖主洪恩紛紛懇請題謝以達輿情臣不敢壅抑除繕本代謝天恩外現在多備丈量繩竿書算繪圗匠役隨勘隨繪小圗俟侍郎臣法保等通行勘明定議彚圗恭呈御覽所有查路諸臣入境日期合行繕摺奏聞謹奏盡心會商辦理以成此美舉雍正七年閏七月二十六日暫行署理山東巡撫印務布政使臣費金吾謹奏為奏聞事竊查東省之德州德平商河等處與直隸接壤素為姦宄出沒之地臣仰蒙天恩暫署撫篆不時留心訪察訪得德平縣地方逃盜賭娼無一不備更有船厰寧古塔遣所脫逃之犯潛匿為匪甚為民害臣嚴飭密拏兹據該署縣報稱閏七月初二日於商河縣界拏獲常四白六于羣楊秀積窩崔國才等其常四白六供係發遣寧古塔而改留船厰之犯又閏七月初六日夜間并初七日於土河涯果園等地方先後拏獲馬思全張三木匠等訊供係發遣瀋陽船厰地方脫逃之犯伏查各犯俱係免死減等之盜犯而怙惡不悛脫逃為盜當拏獲常四白六之時又公然拒捕傷人凶惡已極除跟拏盜夥究追盜贓定擬具題正法并密檄通省州縣屣緝嚴拏外伏思德平一縣既拏獲多犯則他處可知而瀋陽船厰所脫逃者不止此數犯更可知矣將來遣所應作何防範之法似亟應計議為此繕摺奏聞伏乞皇上睿鑒施行謹奏如此勤敏任事朕復何慮但不可因於地方上料理過此一二事遂謂業已盡職向後漸至懈弛也應題者照例題奏同日又奏為祗承聖訓恭謝天恩事竊臣前奏恭謝聖訓摺內蒙皇上俯賜硃批諭臣以用人之道深切精詳皆萬世不磨之至論大要在嚴為已為人之辨而存大公虛明之心臣本下愚跪讀皇言頓開茅塞唯有敬凛諭旨時時猛省以期吏治整肅人才奮興仰副皇上訓誨臣工之至意為此繕摺恭謝天恩謹奏果肯虛懷玩味於統率屬員處實有裨益若橫私見於胸中而謂君上不達下情之難則未必能心恱誠服聽受遵奉也同日又奏為奏聞事竊臣據登州府屬寧海州報稱六月二十九日大雨驟降山水驟長衝壞萊山集傍澗居民草房二十四家淹死男婦十名已給資掩埋酌量賑恤諭令補葺居住至於附近田禾因水勢隨長隨消並無傷損等情申報到臣臣隨飛檄登州府查勘賑恤外謹繕摺奏聞再有地方事宜或因未經查明或因未經定議而不敢具題具奏者臣恐上厪聖懷謹先舉大略附奏於後統祈聖鑒一臣前奏魚臺縣地方因下遊之江南沛縣水道淤塞致秋禾被水緣由已蒙我皇上俞允廷臣之議令臣會同田文鏡嵇曾筠尹繼善確查妥議臣接準部文隨一面咨會田文鏡嵇曾筠尹繼善一面飛委兖寧道吕維炳會同淮徐道康𢎞勳前往沛縣下流查勘去訖統候勘議妥協一泰安州碧霞元君廟在泰山極頂因山髙風大最易傾欹且廟宇木植歷嵗已久非些小粘補可以支撑本年六月初五六等日風雨稍驟更坍損諭旨逐一確核俟核定另摺請旨再伏讀雍正七年三月初十日上諭凡古帝王並往聖先賢陵寢祠墓若有應行修葺之處著動用本省存公銀兩委員料理欽此欽遵在案臣查山東地方少昊陵唐堯陵元聖周公廟復聖顔子廟俱各坍損亦現在估計統俟估確後酌一曲阜縣秋榖有一莖雙穗三穗之瑞臣伏讀雍正五年十月十七日上諭各省田畝産有嘉禾之處俱停其進獻奏聞欽遵在案臣遵旨不敢具奏進獻然臣留意咨訪在東省實為僅見之瑞至於今嵗秋禾通省豐收小民僉稱自康熙四十一年迄今二十八載似今嵗之秋成實為山東第一樂嵗日內早禾俱已登場臣因州縣中播種晚禾者尚勘報未齊故秋禾收成分數未敢専摺恭報所有一知府管轄州縣有督察吏治盤查倉庫審轉案􅟢之責若所屬地方遼濶每致顧此失彼查山東濟兖二府雖經前任撫臣陳世倌於雍正二年題分直隸州而現今濟南府屬尚轄十八州縣兖州府屬尚轄十七州縣至東昌青州二府從前未經分設直隸州東昌現轄十八州縣青州現轄十四州縣幅􅊷既廣耳目難周臣再三籌畫擬酌量道里之逺近政賦之繁簡以濟南府屬之德州分為直隸管轄德平平原陵縣臨邑四縣以兖州府屬之東平州分為直隸管轄東阿陽榖夀張平隂四縣以東昌府屬之髙唐州分為直隸管轄恩縣武城夏津清平四縣以青州府屬之莒州分為直隸管轄日照沂水蒙隂三縣至於錢糧倉庫其德州髙唐州擬歸濟東道盤查東平州擬歸兖寧道盤查莒州擬歸登萊道盤查如此則官制不必更張知府易於照察於吏治似有裨益臣現在詳請督臣田文鏡裁酌俟酌定會題請旨合併奏聞謹奏所議是汝與田文鏡再加詳細斟酌具疏題請雍正七年八月初七日暫行署理山東巡撫印務布政使臣費金吾謹奏為恭報秋禾收成分數仰慰聖懷事竊查今嵗山東地方雨㿩時若通省豐收各府州縣收成俱九分十分即濵海鹽鹻瘠地收成亦有六七分農人歌大有之年野老頌嘉禾之盛臣職司管鑰暫署封疆覩此熙熙皥皥之民風愈欽蕩蕩巍巍之帝德理合據實奏報恭慰聖懷謹奏覽秋成分數深慰朕懷奏議龔健揚條陳之摺留中所論甚屬透徹允當嘉恱覽焉雍正七年八月二十八日暫行署理山東巡撫印務布政使臣費金吾謹奏為恭謝天恩事竊臣齎摺家人恭捧欽賜荔枝到濟臣出郭跪迎至署恭設香案望闕謝恩祗領訖伏思本年閏七月二十日蒙恩賜福荔今又蒙頒廣東荔枝九重玉液才一月而再嘗萬里嘉珍甫三旬而載錫如覆載之甘雨甘露每接踵以澤羣生如日月之朝輝夕輝恆周流以照萬物臣何人而仰承寵賚之稠疊如斯唯有永戴有加無巳之君恩愈殫至愚極陋之臣悃已爾臣祗領欽賜感激難名謹繕摺奏謝以聞謹奏汝近日精神衰健若何有路過山左未見汝面者有奏汝精力不佳辦理案件甚覺費力者朕觀汝摺奏詳明辦事妥協精神頗屬周到充足較之所聞似乎不確爾其據實奏知不必稍有隱飾同日又奏為奏聞事雍正七年八月十七日據曹縣報稱本月初五六等日黃河水長其三堡四堡之水幾與堤頂相平又兼風浪衝激甚為危險卑職即會同河員一面支動幫貼錢購料買土上緊搶護於十三日加幫完竣得保無虞其大堤以外臨河一帶莊村凡有船之處居民早已登舟搬出其無船之處卑職星即雇船連日搬載男婦上岸並查被水里甲莊村另報外合將水勢情形稟報等情到臣除飛委曹州知州星赴被水處所率同該縣確查撫恤造册詳報酌議料理並飭將堤工加謹修防務保無虞外理合據實奏聞謹奏查明被水黎庶加意撫恤務俾不致失所雍正七年九月十三日暫行署理山東巡撫印務布政使臣費金吾謹奏為請旨事竊查臨清倉米折耗羡一事經署撫臣嶽濬備敘始末將藩庫重提耗羡銀兩亟應停止情由於雍正六年九月十五日繕摺請旨於十月初六日欽奉硃批俞允欽遵檄知到臣隨將雍正六年十月初六日奉旨以後重解在庫銀兩撥抵各該州縣別項錢糧訖至雍正六年十月初六日奉旨以前重解在庫銀共計六千五百五十三兩一錢零臣因署撫臣嶽濬文內只有亟應停止語句似専指奉旨以後者而言其從前已解在庫銀兩應否準其抵還未經指明臣未敢擅専隨詳請署撫臣嶽濬酌奪嗣奉署撫臣批令查明已參未參分別置議等因臣查雍正四年九月內定例內開或有應發墊辦之項其墊辦之員已經離任者應令該督撫查明該員如有應追銀兩即準其扣抵如無應追銀兩當時果係該員墊辦則令該貟於布政使處呈領其有離任已久任內並無應追之項又無人承領者扣貯藩庫報部查核等因遵奉在案今墊解臨倉耗羡各州縣誠應遵照定例分別酌議逐一查造細册分別議詳嗣因署撫臣嶽濬赴陜臣隨稟商督臣田文鏡兹接田文鏡回札令臣具摺覆奏臣謹奏聞請旨所有雍正六年十月初六日奉旨以前重解耗銀伏乞皇上恩準抵還臣請逐一分析如係那動別項錢糧墊解現在察參及已參虧空者準其抵還欠項如實係已資墊解而該員已經交代清楚回歸旗籍者遵照定例行文各該員旗籍令本人赴司具呈領回如無人承領者扣貯藩庫報部查核是否允協伏乞皇上批示遵行謹奏所奏與前旨相符甚屬允當照此辦理可也朕欲命爾巡撫湖北或安徽地方省分尚在未定於孫國璽未到之前竭力辦理東省事宜毋因暫署而存諉缷之念孫國璽到時一一詳細將地方情形應辦事􅟢備悉告之莫負朕倚任之心特諭同日又奏為科場事竣奏明歸還庫項事竊臣前奏科場經費不敷請旨動用庫項一摺欽奉皇上硃批臣隨欽遵諭旨逐一辦理在案竊照丙午科冒銷貢院修理銀兩之蠧棍曾衍泗等遵經嚴加究審供出彼時承修官濟南府同知謝載受扣尅銀九百五十兩零又伊家人胡大張四扣尅銀七十五兩零查同知謝載受業已休致回籍現在行文湖廣提解謝載受胡大張四等到日逐一嚴訊分别究擬追賠外兹當雍正已酉科鄉試事竣細查本年修理貢院實用過工料銀二千五百五十七兩零至場內之鋪墊供給等項俱臣經手給發悉倣照河南丙午科督臣田文鏡教導之法凡無益之費概行節省其應用之項悉照往規實用銀四千一百八十餘兩以上二項共用銀六千七百四十餘兩除將查出刑名部飯餘剩銀二千兩零并設法辦賣試卷贏餘銀一千六百二十九兩零歸入應用外其每科額設香稅銀三千一百餘兩業已敷用所有前奏請預備添補不敷之司庫公項銀二千八百兩應仍歸還原欵貯庫理合恭摺奏明謹奏所奏甚屬明晰凡百事務悉如此詳慎細緻方是雍正七年九月十九日山東布政使臣費金吾謹奏為恭報臨關經收錢糧事竊臣仰蒙皇上天恩暫署撫篆自雍正七年五月初六日到任管理臨清關起至九月二十八日卸事止計一百七十三日共經收銀二萬六千二百八十四兩零計贏餘銀八千三百餘兩查臨清關稅課每年正月十一月十二月河道凍阻收數較少自二月至十月商旅通行收數較多而一年統計總不能足額是以塞楞額任內將所收臨倉耗羡撥補上年照往例撥補仍不能敷額因收數更少也今年夏秋之間雨㿩時若榖麥豐登四方糴販糧食者絡繹而至歷查往年夏秋兩季之收數從未有如今年夏秋之盛故臣署任內不惟無庸以耗羡撥補而暇親理關務惟照署撫臣嶽濬成規仍委候補通判王天慶管理並無別有招徠稽察之能事唯因帝德感召天和東省嵗登大有商賈之輻輳實由於萬姓之盈寧臣不勝歡忭之至理合繕摺奏聞謹奏當體察今日此一小節而有歡忭之來由此而究明根本深信不疑則凡所遇所值莫非歡忭之途也何樂而不為之大抵庸夫俗子人事尚不能明曷克領會天道惟能深識感應之理分毫不爽為人之本已得無往而不利貞也將此諭亦令嶽濬知之同日又奏為請旨事雍正七年八月初五日接大學士公馬爾賽等字開欽奉上諭到臣臣伏思西洋人潛居各省誦經行教煽惑人心深為民害於雍正二年我皇上特頒上諭垂念外國之人準其居住廣州省城但不許行教生事又恐搬移之際或被地方之人擾纍給與半年數月之限令沿途委官照看矜恤逺人之恩至優至渥乃越今五載外省州縣中竟尚有西洋人潛住與本地無賴之徒私相往來督撫有司漫無稽察我皇上不遽加譴責復密降諭旨訓誨臣遵奉之下隨用釘封密札飛諭各府州縣加意密查又遴委誠實幹員分頭密訪兹查得歷城縣原有西洋人南懷德等已於雍正二年間進京所遺天主堂二所一改為育嬰堂一改為義學訖此外所有房産因部文未經指明所以尚有房屋八間墳地七畝不敢一併改為公用以致西洋人仍暗中託人每年潛收租息又查得臨清州原有西洋人康和子於雍正二年十月初六日進京現住京城西直門紅橋天主堂內所遺天主堂已改為公所但尚有房屋三十七間并地四頃辦理又於濟南府德州地方查獲西洋人一名頭五塔寺住過於今年四月裏從京師往南海去進香回來要到泰安州去拜佛錯走了路到德州等旨定奪統祈皇上俯賜訓示倘遇續獲西洋羅漢教之人以便畫一辦理再此外或更獲有西洋天主教之人應否遵照雍正二年奏覽雍正七年十月初二日山東布政使臣費金吾謹奏為遵旨陳奏恭謝天恩事竊臣前具摺恭謝欽賜荔枝一摺奉有硃批恐臣精神不佳蒙皇上矜憐垂詢祗領之下感而飲泣謹望闕謝恩伏念臣本來中氣虛弱胃薄血少自幼至老藥餌不離近年蒙皇上欽賜養廉充裕得以常服參苓又蒙天恩屢賜人參臣得時時調養今步履如常精神尚能支持皆我皇上之所賜若論臣之本體即目下之能勉強辦事亦臣所不自料也今年夏秋臣恭蒙天恩暫署撫篆幸我皇上聖訓頻頒田文鏡仰體天心亦時常指示又巡撫事務雖任大責重而挈領提綱較藩司之事尚屬簡少猶能勉強辦理抑臣本年春夏以來又增一病每飯即噎恐成膈症且愈覺善忘與人言語酬酢稍稍長久便照應不來路過之人奏臣精力不佳辦事費力實非無因但臣受恩深重未報涓埃犬馬之力雖衰而戀主之心甚切事繁之職實不勝任伏乞皇上授臣事簡之職俾能悉心辦理稍酬君父豢養之隆恩於萬一庶幾臣子之心稍安此實臣所夙夜冀望者也小臣微軀仰蒙皇上殷殷垂問謹遵旨據實奏聞并叩謝天恩謹奏覽奏深慰朕懷亦曾詢及田文鏡伊奏汝之精神無論何任儘可支撑大抵傳聞之語謬誤不確隨便賜參數斤以助汝藥餌之需同日又奏為恭謝天恩事竊臣準吏部咨開雍正七年九月十七日奉上諭山東布政使費金吾老成歷練實心任事朕另有升用處山東布政使貟缺著福建按察使孫國璽補授俟孫國璽到任後著費金吾起身來京欽此欽遵咨行到臣隨恭設香案望闕謝恩外伏念臣質性魯鈍才具疏庸前在河南幸田文鏡老成練達臣遵教而行究不及河南之可以隨時隨事悉心面商是以調任一載吏治猶未能如河南之肅清民風命臣趨赴彤廷親承聖訓尤不勝歡忭踴躍之至兹撫臣嶽濬已於九月內回任臣署撫事件已經交卸惟有將藩司任內未聖恩於萬一而已為此恭謝天恩謹奏嘉恱覽焉雍正七年十月十七日山東布政使臣費金吾謹奏為恭祝聖夀如天事伏惟載籍所傳五帝之夀皆千百三皇之夀並萬千蓋有洪功定有洪福有大德必有大年此天地自然之理從未有德隆功𢡟俾兆民兆物咸登夀域如今日者欽惟我皇上參天兩地邁帝超王丕顯丕承致海晏河清之瑞善繼善述備文謨武烈之全道德已貫於三才福夀自髙於列聖兹者一陽肇始萬物咸登風雨順時年榖豐稔昆蟲草木並育於太和臣庶黎民同躋夫仁夀恭逢萬夀聖誕微臣職守東隅未能隨廷臣之末拜舞丹墀惟有效華封人之祝唐堯恭祝我元后父母夀同天地福合乾坤螽斯集慶於璇宫重譯來朝於北闕乾行至健悠久極於無強聖德彌新福祿綿於有永臣曷勝呼嵩抃舞之至謹奏凡如此等之奏朕但寓之於目從不敢寓之於心也然欲望朕克臻於此則全賴汝等內外大臣之贊翊劻勷非朕一人自勉所能者同日又奏為恭謝天恩敬陳下悃事竊臣前奏藩庫重提臨倉耗羡摺內奉到皇上硃批諭旨臣聞命之下感激難名即於署內望闕免冠叩謝天恩外伏念臣謭劣凡材仰荷宸眷寄屏藩之重任歷嵩岱之要區每以措置未當自知罪愆孔多乃蒙天言嘉許欽召赴京竊喜小臣或可常依於輦轂何期聖意直欲委任以封疆恩遇之隆至矣極矣微臣何修邀眷至此惟有奮勉以答髙深何敢暴棄以辜化育第臣心之報效甚切而臣力之擔荷難勝有不得不直陳於聖主之前者夫巡撫總庶務之成雖案牘較藩司為稍減而巡撫統羣僚之職其董率較藩司為倍難必有經文緯武之才而具達權通變之識可決疑於俄頃之際能審幾於未形之先任巧幻之來而中有主宰知緩急之序而出之從容救前人之偏而不致矯枉過正補庶事之闕而不使弊隨法生持大體而不為瑣屑之圖務逺謀而不計目前之利茍有益於國勿存畏首畏尾之心但無愧於人勿避招怨招尤之舉然後能整頓地方挽回風俗練兵籌餉而餉足兵精飭吏乂民而民安吏肅必如此方可膺封疆之寄庶不負委任之隆今臣質既迂拘才復駑鈍且風聞湖北安徽二省吏治民風尚須加意整飭以臣之愚陋尤恐難以勝任在人臣宣力效忠東西南北惟君所使豈容趨易避難但必力克仔肩方於國事有濟臣所以自揣而惴惴也孫國璽來東約在年底微臣赴闕約在春初統乞皇上量臣之才力以授職示臣之法守以循行臣惟有愈殫愚誠恪遵聖訓不敢一事茍且塞責一毫瞻顧因循以仰報皇上特達之知逾格之恩於萬一耳臣欽奉恩旨欣感惶愧一時交集不覺奏語繁冗統希恩宥謹奏覽此奏朕嘉恱之懷筆難宣喻既能思及為臣不易之理而又能道出切要綱領朕惟慶又得一好封疆大臣耳無可再諭雍正七年十一月十九日山東布政使臣費金吾謹奏為恭報藩庫餘平銀兩事竊查東省藩庫併尾餘平一項歷任巡撫布政使皆以此項為無礙銀兩私自分用逮張保任內雖將院司分用之餘平約計每兩三釐撥出充公而山東藩庫之餘平實不止每兩三釐自雍正六年七月臣到任起至雍正七年四月止查明餘平銀一萬二千三百一十八兩零經臣於奏報藩庫併尾餘平清摺內奏明貯庫在案今自雍正七年五月起至十一月止又查明餘平銀一萬二千九百四十二兩零總計臣到任以來共一十六月二十五日除動支衙門公用銀三千九百八十五兩零又照往例撥出每兩三釐充公銀一萬七千四百八十四兩零外計查明餘平銀二萬五千二百六十兩零理合奏聞以便交代接任收貯再自雍正七年十一月起至年底止為時僅有月餘所收餘平諒亦無多臣任內不及奏報容臣於交代案內一併交與孫國璽查明彚奏合併聲明謹奏可嘉之外更有何諭耶同日又奏為欽承聖訓恭謝天恩事雍正七年十月十八日臣齎摺家人捧回奏摺內恭謝欽召洪恩恭報臨關錢糧二摺仰蒙皇上硃批訓諭前後數百言無非人臣事君之大原天地福善之至理臣何幸而蒙皇上垂訓至此隨遵旨密與嶽濬恭閲訖竊謂人臣事君之道多端而其本原只此忠誠二字大吏若存忠誠則居心行事咸合天理舉者皆賢錯者皆不肖屬員有不感畏奮興急公向上者乎大吏若能使屬員人人各殫其忠誠則通省無非吉祥之氣上天呼吸可通有不默佑降祥者乎若僅於施設邊言忠言誠而不端其本原非惟違道日逺此心亦必漸不可問矣臣蒙皇上教訓諄切惟有時時以忠誠二字自省并時時以忠誠二字率屬以冀上天神明垂佑已爾臣欽承聖訓感奮無似謹繕摺恭謝天恩謹奏果能一如所奏言行相符不但朕與汝之福難量湖北闔省官民之幸亦國家之幸也勉之勉之雍正七年十二月初三日山東布政使臣費金吾謹奏為君德合符師道闕里呈現卿雲事雍正七年十二月初二日據曲阜縣知縣孔育琚詳稱本年十一月二十六日午時見有祥雲一朵在正南金色輝煌儼若瑞芝隨又分布如竒峯疊嶂五色絢爛由南而東南綿亘璀璨丹黃紫碧各色俱備直達西南光華環繞拱捧紅日似錦非織若組成文復又花紋一片如疊波鋪練藻采繽紛難以描繪又西則五采細雲層層羅布如舞鳯翔翼如花朵飛英紛紛郁郁竒形疊出由午時起歷未而申由正南起歷東南西南三面闔城老幼萬目共覩衆口同聲咸稱實有生所未見無不欣慶歡騰洵屬聖世嘉祥理合具文申報等情到臣據報之頃山東省城紳士軍民莫不歡欣踴躍交相稱慶以為孔廟屢厪宸𠂻既頒內帑興修復簡廷臣董役備規模之美善極制度之崇隆故今秋地現嘉禾之瑞兹大成殿甫經上梁上天又垂卿雲之瑞等語是皆由我皇上道追洙泗直接心源一舉一動萬事萬幾上合昊天之心即無不合乎至聖之心聖聖同揆心心相應所以半載之內竒徴上瑞一見再見於聖人之里固不僅為孔廟將成酬答聖天子崇儒重道之典也臣聞報不勝歡欣抃舞之至除詳請督撫題報外理合繕摺奏聞謹奏此實上天暨先師之靈昭示嘉徴非尋常所可比擬朕惟倍加乾惕寅畏之心愈篤崇儒重道之念已爾感慶之誠筆難宣喻同日又奏為奏聞事竊照山東濟寧嘉祥巨野曹縣單縣城武金鄉定陶魚臺等州縣從前屢逢水患皆由下遊江南地方水道淤塞所致必須將淤塞之處開通俾諸水得有宣泄歸宿庶可永慶豐登經臣於署撫任內奏聞我皇上厪念民依隨交王大臣等查議嗣經王大臣等議覆令臣會同田文鏡嵇曾筠尹繼善詳確妥議具奏等因奉旨依議欽遵咨行到臣臣即移會嵇曽筠田文鏡尹繼善飛委兖寧淮徐二道會同查勘酌議去後兹據該二道勘明會覆前來其大略云濟寧等州縣積水由南陽昭陽微山諸湖下注上關全漕運道下繫兩省民生必導流入海俾暴漲可宣建壩瀦蓄俾水匱敷用再開支河以分其勢增築堤岸以束其流使萬派朝宗悉歸溟渤首尾相貫呼吸相通中間無隔閡之處然後有利無患可垂永久等因會覆到臣臣查兖寧淮徐二道勘議宣泄入海之水道係自江南沛縣之張孤山等處由荆山口三岔河貓兒窩引入駱馬湖而歷宿遷桃源清河安東沭陽海州以歸宿於海計應挑河道二百三十餘里修砌原有五孔減水石閘二座添建五孔減水石閘二座增修加築堤堰丈尺共約七百餘里添築束水子堰一道通共約需夫料土方銀三十餘萬兩成功之後在山東之濟寧等州縣固慶安瀾而江南之沛邑等州縣亦永為樂土矣除詳請河臣督臣撫臣會核外事關兩省往覆咨商動需時日原奉部文係臣暫署撫篆之時令臣會同妥議之事今臣離任在即不及在東襄事謹將兖寧淮徐二道勘議導流入海情形并約需錢糧數目先行恭摺奏聞謹奏所議甚屬妥協巳另有旨矣雍正八年三月二十四日湖北巡撫臣費金吾謹奏為微臣赴任稽遲恭懇天恩垂宥事竊臣遵旨於三月初八日自海淀起程於十六日抵山東濟南府擬歇息一二日即由河南陸路赴任乃以陛辭之後陸行微勞飲食稍減户部貟外郎沈文嵩仰體皇上愛臣之心朝夕診視勸臣靜養旬日由水路赴任臣查山東至湖北由河南陸路而行僅二千里不過二十日可以到任若由水路赴任雖計程三千餘里而時交夏令南風必多遲速難以日計伏思微臣之身皇上再賜之身也臣固不敢自棄以負聖恩然封疆任重又何敢悠悠行路以圖便安輾轉思維不敢遽定謹繕摺恭懇天恩伏乞皇上宥臣赴任稽遲之咎臣現在起程自濟南府陸路緩行至濟寧州水路交界之處候旨遵行謹奏應從水路赴任為是便稍遲數日何妨在路看風勢徐徐而行不可心急盻程當加意靜養慎重調攝撫篆現有邁柱署理亦甚妥協絲毫無庸繫念也硃批諭旨卷十六
