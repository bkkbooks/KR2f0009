body:
  text: 欽定四庫全書硃批諭㫖巻四十四上硃批宜兆熊奏摺雍正元年五月十四日福州將軍臣宜兆熊謹奏為請㫖事竊臣庸碌無能䝉聖祖仁皇帝寵眷優渥由世職歴陞都統復荷我皇上格外殊恩補授福州將軍任大責重惶悚靡寜凡有見聞敢不直陳查駐防四旗鎗營甲兵所用排甲兵以資操演再閩省非出馬之地四旗甲兵馬匹現今陸續買補大馬查隣省廣東湖廣二處土馬到閩水土甚屬相宜餧養亦且甚易以臣愚見土馬與大馬兼買於甲兵實有裨益為此具摺恭請聖裁伏乞恩准批示遵行謹奏大馬與土馬相同但擇其易養為佳耳聞閩地濕熱頗不宜於馬性若不能足三匹之數足兩匹亦可矣切勿因賠補而累及兵丁致滋朋扣等弊至於凑僃公用權變料理又在爾酌宜相機而行也軍營以馬匹為重但廹之不可過嚴亦不可過寛審時量力為之毋得膠固總之以實心任事何事不濟耶勉之不可過嚴之㫖密之勿露於衆朕深信爾不愧將軍之職爾其仰副朕𠂻加意訓養作一太平良將顧不偉歟同日又奏為奏聞事竊臣於雍正元年二月二十二日莅任即清查本衙門一切陋規盡行革除再查琉球國貢使獨於臣衙門向有毎年規禮臣恐受此殊失皇上念四旗兵丁人口蕃滋度日艱難照駐防原額馬匹賞給錢糧四旗甲兵父母妻子盡得養贍老幼無不歡欣鼓舞臣復宣布奏知道了雍正元年六月十二日福州將軍臣宜兆熊謹奏為恭謝天恩事臣齎摺家人回閩捧到皇上恩賜香袋丹藥臣隨恭設香案望闕叩頭謝恩祗領訖竊思臣庸愚下質受恩獨深既膺邉海之重寄復䝉頒賜之殊榮臣感戴知遇淪肌浹髓惟有夙夜冰兢誓竭駑鈍以仰報高厚於萬一而已杏今歲雨暘時若福州府田禾現在收穫其餘八府田禾俱聞成熟此皆仰頼我皇上至誠格天四海共享昇平之樂也理合具摺叩謝天恩謹奏覽奏深慰朕懷皆爾等封疆文武大吏同寅協恭緝兵安民之所致也其互勉毋替但一切敷奏總宜據實不可絲毫掩飾若惟以仰慰聖心為辭則誤矣凡事不本於眞誠即為負朕不可不知特諭雍正元年九月十五日福州將軍臣宜兆熊謹奏為恭謝天恩事臣齎摺家人回閩臣跪讀硃批不禁感激涕零臣何人斯䝉我皇上知遇至於如此雖粉骨碎身不足仰報萬一臣䝉皇上隆恩准臣捐造盤鎗復念臣力薄恩諭陸續緩為捐造但臣所得俸禄儘足養贍且月得餉銀充足有餘捐造為費無多臣已於九月十五日造盤鎗一千一百零一捍散給四旗鎗營甲兵覽奏朕深為嘉悦勉之同日又奏為請㫖事竊查福建駐防官兵操演纛幟向來將軍俱用蟒纛官兵用飛虎纛與在京八旗漢軍纛幟一樣因前任將軍祖良璧自改為月心素纛臣愚以閩地邉海操兵演武纛用飛虎實壯軍威臣不敢自專理合建山多路險崎嶇窄狹以臣管見每旗設攩木五架每架高寛五尺即於四旗壯丁内挑選精壯者皇上賞賜之恩再查臣標左右兩營共馬歩戰守兵一千九百六十名内有鎗手兵八百六十名臣思旗營一體今四旗甲兵現已捐造盤鎗散給操演伏乞聞謹奏所奏俱悉雍正元年十一月十七日福州將軍臣宜兆熊謹奏為恭謝天恩事臣進摺千總回閩齎捧皇上御批併頒賜臣上用果品臣恭設香案望闕叩頭謝恩跪讀御批不禁感激涕零伏念臣一介庸愚荷䝉我皇上特簡福州將軍重任坐糜廩禄毫無報稱乃䝉皇上温㫖頻頒復賜上方異品天恩於萬一耳理合具摺叩謝伏乞睿鑒謹奏向聞福州四旗官兵俱甚不堪今爾揀送來京者諒必秉公選㧞其中之上等人材也朕簡閲之下實屬不堪須爾大費一番心力勤加訓練庶或少能挽回一二不特漢仗弓馬平常即一種下流褦襶形狀亦難入日且全無些微雄勇氣槩今後演習武藝自當著意併其舉止進退亦宜盡力教導再駐防鎮江者亦屬魯衛之政若非大為整飭何能改觀雍正二年三月十三日福州將軍臣宜兆熊謹奏為奏聞事竊臣准兵部咨䝉皇上恩准賞用飛虎旗纛知照到臣欽遵在案臣查明四旗大纛小旗數目現在捐造給散以便春操前䝉聖恩准四旗設欓木二十架甚為有益但旗營合操臣查標下兩營亦湏添設欓木四十架於歩兵内挑選八十名扛擡四旗亦湏再添攩木二十架挑選壯丁四十名扛擡仍於臣隨丁糧内撥出銀四十兩以為月餉之需再臣捐修四旗銹損子母礮八位復於兩營查出銹損子母礮十位臣亦一併捐修所有四旗原設發貢礮八位隨委恊領彭珠并防禦朱士俊等管理督率操演以僃防守所有臣捐製火藥礮子并添葢收貯火藥礮子礮庫俱已告成理合一併奏聞謹奏自汝受事以來凡所料理盡善盡美朕除加奬之外無可諭汝者同日又奏為欽奉皇上指示知人材委實不堪復邀聖恩不加罪責諭臣教訓愛養臣雖駑鈍敢不竭盡心力時時操演教導致負我皇上訓勉之至意臣惟有宣布皇上豢飬之隆恩於萬一耳理合具奏伏乞睿鑒謹奏實與爾毫無干渉如果係爾之咎朕必不曲為寛容也朕之前諭正欲爾勤加訓練俾營伍改觀功效方著接閲諭㫖更當慶喜以踴躍從事何惶悚之有耶同日又奏為請㫖事臣竊思起送官兵寡婦回京歸旗養贍乃聖祖仁皇帝格外殊恩惟恐匹夫匹婦不得其所官妻給以半俸半米兵妻給以半餉半米養贍一年方行住支未及遣送復照坐糧例給以口糧五名口至起程之日停止豢養駐防官兵恩施有加無已至於此極臣愚以為寡婦内有弟男子姪現披甲者可以養贍有情願改適旗人者聽其改適則既可省未及起送之口糧又可省驛站夫馬船隻及䕶送官兵之糜費且可免寡婦長途䟦渉之苦似屬至便如寡婦内有情願回京者臣仍照舊例給咨䕶送回京歸旗則人人得所均沐聖恩於無既矣是否可行伏乞皇上睿鑒批示遵行謹奏此一事觀汝所奏甚合情理具本題奏廷臣議覆時朕再為酌定雍正二年四月二十四日福建將軍臣宜兆熊謹奏為恭謝天恩事臣標齎摺千總回閩捧到御批荷蒙天語褒嘉不勝惶悚伏念臣世受國恩復膺重寄雖捐糜頂踵不足以仰酬高厚之萬一況操練甲兵整理軍器實臣分所當然方恐有忝職守何意上邀温㫖褒嘉臣跪讀之下愈増惶愧惟有竭盡駑駘不遺餘力以圖報效於無既也所有微臣感激天恩之下悃理合具摺奏謝伏乞睿鑒謹奏朕之奬勵褒嘉從無一毫假借必汝實有好處始批一好字勉之勿懈雍正二年閏四月二十一日福州將軍臣宜兆熊謹奏為奏聞事竊查四旗官兵䝉聖恩賞用飛虎纛幟經臣捐造散給邉海巖疆得此操演飛掦照耀軍威整肅士馬歡騰人人感激天恩共思報效但查現在操演子母礮共十八位旗營合操甚覺其少臣以旗營湏設子母礮八十位訓練操演軍威愈壯除現在子母礮十八位外臣今開爐捐造六十二位散給旗營操演防守地方理合奏聞謹奏爾養贍家口不致甚拮据否那得如許多貲頻供捐費朕心殊覺不忍也雍正二年七月初四日福州將軍臣宜兆熊謹奏為恭繳硃批叩謝天恩事臣齎摺守僃回閩恭接御批伏念臣曾祖宜永貴自從龍由白衣人管佐領得授世職至今臣二子現䝉恩廕是臣五代受恩深重兹復蒙我皇上特受臣福州將軍畀以海疆重寄坐糜廩禄毫無報稱乃蒙聖恩垂注毎加優恤慮及臣家口臣何人斯邀兹異數但臣家口親丁惟有二子合家不過四十餘人臣所得俸禄儘足養贍有餘至臣捐造軍器係分内之事乃蒙聖恩念及臣之家口臣跪讀之下不勝感激涕零惟有竭盡駑駘不遺餘力以報天恩於萬一耳謹具摺奏謝伏乞皇上睿鑒所有奉到御批理合恭繳謹奏世受國恩者頗多似爾之繼述祖父感奮思報者殊少急公盡職固云圖報更自砥礪進為千古名臣垂芳竹帛以光前裕後尤所宜務也勉之同日又奏為奏聞事竊查閩省邉海要區防守技藝鎗礮實為有益臣於四旗甲兵内挑選精壯馬上熟練者共二百名臣捐造馬上盤鎗二百捍散給教習馬上放鎗務期操演純熟以僃緩急濟用再臣捐造子母礮六十二位業經造完合前十八位共子母礮八十位交委管礮協領彭珠等收貯礮庫但旗營兩汛子母礮八十位猶覺其少臣復現在捐造四十位交管礮官督率操演務期熟練施放有準庶可以僃防守矣理合奏聞謹奏爾所捐造過多矣向後四旗兩營若有應添造軍噐等物不必捐資其請㫖定奪雍正二年九月十五日福州將軍臣宜兆熊謹奏為敬陳管見仰祈睿鑒事臣查駐防滿洲固山大駐防漢軍協領在京㕘領俱係三品惟列名之處不同查在京滿洲蒙古漢軍副都統缺出在京滿洲㕘領俱得列名駐防滿洲固山大則不在列名之内在京漢軍副都統缺出在京漢軍㕘領亦得列名而駐防協領則不在列名之内惟外省滿漢副都統缺出駐防固山大協領始得與在京㕘領一同列名臣思駐防固山大協領亦有辦事勤慎効力年久之員臣請嗣後滿洲蒙古漢軍在京副都統缺出駐防固山大俱得與在京叅領一同列名漢軍在京副都統缺出駐防協領亦得與在京㕘領一同列名併請不拘旗分八旗一體論俸開列仰懇皇上一視同仁恩准並用則駐防旗員益思自奮矣管見所窺不識可否冐昩上陳伏乞睿鑒施行謹奏此奏與朕意甚合所以朕自即位以來外省副都統缺出率多陞用駐防之協領等也斯事不在開列與不開列惟在朕留意耳内外皆係朕之臣工朕惟一視同仁簡㧞其優者而用之所奏甚屬公當同日又奏為奏聞事竊臣荷蒙皇恩簡畀重任毫無報稱凡臣分内旗營大小事務自應矢公矢愼以求整理無弊查臣衙門蒙皇恩賞給隨丁糧一百名其將僃弁員俱遵照部行提督俞益謨題定隨丁名數副將以及千把臣俱照其應得名數給其親丁頂補再臣標有公費名糧臣莅任即行裁革飭營招募頂補其從前所存公費銀兩隨飭營盡為製造帳房銅鍋籐牌滾刀旗纛火藥等用至甲兵馬上學習放鎗需用火藥臣已於隨丁糧銀内每月散給所有臣隨丁糧銀除捐助欓木月餉等項外餘存尚多兹蒙聖諭不必捐助乃聖恩優渥格外矜恤但臣家口有限而俸祿月米及養馬草料銀併心紅餘銀儘足臣用其隨丁餉銀之餘俱應隨時捐助以盡臣職庻臣心得以少安矣理合奏聞謹奏覽奏已悉爾之居心出於惓惓奉公之誠但宜仰遵前諭量力而為不可過於勉強也同日又奏為恭謝天恩事臣進摺千總回閩齎捧皇上御書扁額到臣臣隨出郊跪迎至署恭設香案望闕叩頭謝恩祗領跪啓黄封敬謹展讀欽奉御書世冇令徳扁額一幅竊臣世受國恩由曾祖以來五代俱食天祿皆受皇恩寵榮已極復䝉皇上殊恩御書扁額不獨臣之身膺曠典者榮逾格外即臣之曾祖祖父一旦光生泉壤且臣復邀御批勉臣為千古名臣垂芳竹帛奬勵期許至於此極聖恩髙厚感深刻骨喜極涕零謹將御書什襲珍藏仍摹勒製扁懸之臣署使旗營將士共仰宸翰之輝煌並識皇仁之浩蕩理合具摺叩謝天恩伏乞睿鑒謹奏往古明主愛一嚬一笑朕之奬勵亦豈濫施天下臣工自具有耳目一切賞罰予奪朕胸中從無適莫今日褒嘉所及乃由卿奉公盡職有以致之也卿扵直省將軍中聲名實居上第卿等竭力懋勉以保全始終為期果能不辜朕之體恤將來勞績茂著榮膺眷顧正未艾也勉之更諭者不特爾閩省事情即别省吏治戎政以至廷臣臧否朕之一切舉措或得或失但有聽聞不必待訪的確先即密奏以聞諸凡無隠方不負朕之信任也密之雍正二年九月二十五日福州將軍臣宜兆熊謹奏為欽奉上諭事竊臣准督撫二臣咨准吏部咨前事内開雍正二年八月十九日舅舅隆科多捧出硃筆諭㫖國家分理庻績務在得人道府州縣等官尤屬要職其有才幹素著廉潔自持者不得以時上聞何以示勸於各省道府同知通判州縣等官内著總督保奏三員廵撫保奏二員布政使按察使各保奏一員將軍提督亦屬本省大員將所知者亦令保奏一員俱各密封保奏不得㑹同商酌如所保之人不當日後劣蹟敗露將保奏上司一併治罪特諭欽此欽遵等因到臣臣雖智識短淺敢不矢公矢愼詳加採訪但臣衙門凡文吏道府州縣接見甚稀惟有漳州府知府耿國祚原任臣衙門理事同知臣見其審理旗民事件清正敏達陞授漳州府知府莅任未乆聲名尤好臣向在同城且係屬員臣所素知謹遵㫖保奏理合具摺奏聞謹奏耿國祚係朕所知之人另訪一員保奏可也再請題補一摺發該部議覆後酌定雍正二年十一月初四日福州將軍臣宜兆熊謹奏為戀主情殷懇請陛見事竊臣由世襲阿思哈尼哈番䝉聖祖仁皇帝洪恩㧞補叅領歴陞都統毫無報稱又䝉我皇上隆恩簡任福州將軍莅任二載仰賴聖主福庇際遇昇平並未效犬馬微力且臣自陛辭之日一覲天顔依戀之私寤寐彌深况臣年近六十仰懇皇上恩將旗缺調臣回京供職俾朝夕得以仰瞻天顔縱報效無能而依戀心遂臣即老死亦可瞑目伏乞皇上憐臣螻蟻下悃俞允所請臣不勝惶悚激切待命之至謹奏為何忽動此念外省專閫之任關係甚重正資爾料理勉為之俟朕簡得年力精壯勝任之人替爾回京諸事加意毋得懈弛雍正二年十一月二十四日福州將軍臣宜兆熊謹奏為恭謝天恩事雍正二年十一月初十日撫臣進摺把縂回閩齎捧御賜哈密瓜一箇到臣臣隨恭設香案望闕叩頭謝恩祗領訖伏念臣屢䝉皇上恩賚兹又特賜上方異品且復䝉御批臣與杭州將軍安泰聲名並居上第又命臣但有聼聞不必待訪的確即密奏以聞勉之密之欽此以臣一介武夫至愚極陋荷䝉天語褒嘉下詢政治信任至於此極誠千古未有之曠典也臣膺兹異數敢不激勵奮勉殫心悉慮知無不言仰答聖恩高厚但臣智識短淺恐管見所窺未必有當大體冒瀆宸聰獲罪匪輕伏乞皇上格外寛宥臣無任惶悚感激之至為此叩謝天恩謹奏但只據實上達不必絲毫疑畏同日又奏為敬陳管見仰祈睿鑒事欽惟我皇上御極以來勵精圖治博採羣言每多下問竊臣愚見以為在京六部九卿科道諸臣外而督撫將軍提督各臣凡有事件准其密奏至於在京武職副都統等在外總兵官等似不宜准其密奏恐言路繁雜不肖者反借此生事妄凟宸聰臣䝉皇上信任殊恩謬陳管見不識可否伏乞睿鑒施行謹奏爾慮言路繁雜朕意不妨聽言當以理察總在鑒别何如耳朕豈輕為之淆惑耶同日又奏為請㫖事竊查福州駐防四旗官兵月支米穀草束價値經前撫臣許嗣興題請加増白米毎石一兩一錢五分粟米一兩零五分穀五錢二分五釐草每束九釐五毫俱䝉聖祖天恩准其折給後於康熈五十一年秋冬起至雍正元年秋冬止歴經各撫臣題請白米每石一兩粟米九錢穀四錢五分草每束九釐亦䝉聖恩俱准折給找支在案查歴年題請實係豐收之年的確價値倘遇歉收即有不足仰懇皇恩嗣後白米每石即照一兩粟米九錢穀四錢五分草毎束即照九釐按月准其關支俾甲兵得以採買無不足之虞且可免按季題請補給之煩也理合具摺伏乞恩准批示遵行謹奏此所奏是從前未經定價固當估報今俱已酌定中價矣何獨福州駐防令其多此一番題請該部議奏雍正二年十二月十五日福州將軍臣宜兆熊謹奏為敬陳管見仰祈睿鑒事竊念福建廣東雲南三省皆係邉地自康熙十九年平定之後福建廣東二省俱設立旗兵駐防惟雲南未經設立以臣愚見均係邉地似應亦設立旗兵以資彈壓其分撥甲兵或就近於浙江荆州駐防内撥派滿洲甲兵各一千名設立將軍帶領鎮守其浙江荆州兩處缺額或即於撥派雲南甲兵之弟男子姪内挑選精壯者留以頂補則丁壯均受皇恩彼此益加感奮思圖報效於無既矣是否可行統候聖裁謹奏添設駐防原係保固疆圉之善政但本省之錢糧足供支銷與否必須籌畫妥確始可議行也爾意已悉同日又奏為奏聞事竊臣荷聖主隆恩毎念臣力薄諭臣不必勉強捐造但臣家口不過四十餘人俸禄足供養贍且復叨聖恩賞給隨丁糧一百名除每月公捐外尚有餘剰況四海太平臣安享無事之福並無有費用之處臣去年將旗營子母礮捐造一百零二位今現在鑄成七十八位毎旗毎營各得三十位旗營子母礮共一百八十位操演已足用矣福建邉海之地山路險阻水洋遼濶防守地方礮火為上子母礮較之鳥鎗更能致遠操練純熟誠足以壯軍威而收實效臣䝉聖主洪恩畀以封疆重任凡旗營事務皆分所應為惟思殫竭臣力隨宜修整以稍盡犬馬報效之心理合具摺奏聞謹奏知道了足見汝急公念切非由勉強也雍正三年四月二十六日福州將軍臣宜兆熊謹奏為聖主隆繼述之孝至仁沛蠲賦之恩海嶠微臣欣祝無疆事臣接閱邸抄内開奉㫖蘇州府額徵銀蠲免三十萬兩松江府額徴銀蠲免十五萬兩著為定例欽此欽惟我皇上御極以來勵精圖治三年之内萬事畢舉尤洞鑒閭閻疾苦除數百年之積弊蠲數十萬之賦稅臣閱邸報欣喜無地伏念聖祖仁皇帝臨御六十餘年深仁厚澤普施中外今我皇上體仁為治蠲從古未蠲之正額恤前代未恤之農民恩覃四海徳沛八方臣欣此亘古未有之仁頂祝萬世無疆之慶恭繕摺具奏伏乞睿鑒謹奏此皆聖祖之遺惠朕推廣而行之耳何得歸美於朕耶同日又奏為奏聞事竊臣奏請捐積穀石䝉皇上洪恩特沛溫綸臣跪讀之下不勝感激惟有捐修倉厫捐買乾潔穀石嚴飭收管平出平入務期不致有累兵弁以仰報聖恩臣現在捐買穀石陸續貯倉併移督撫布政司三臣知照以便每年稽查但穀石增捐數多出陳易新收管盤查尤宜清楚必廉能之員專司其事庻出入不致虧空今選得鑲白旗協領朱廷桂臣標中軍副將梁鳳呈俱各操守清正勤愼小心堪以委管理合一併奏聞謹奏從來利之所在弊即隨之委用之人不得不加意斟酌者也雍正三年七月初一日福州將軍臣宜兆熊謹奏為奏聞事竊臣奏請捐貯穀石其銀出於隨丁糧内亦皆我皇上賞賜之銀荷䝉天恩特沛溫綸賜臣議叙臣聞命自天感激無地自問何修邀兹曠典臣署内旁有大房一所前後共十三間照常豐倉式樣修造於六月十二日告成正値新穀豐登之候臣已將積餘銀兩照時價採買三千石俱如數收倉併移知督撫布政司三臣存案嗣後每歲底將貯倉穀石總數一併奏聞仍移知督撫等以便稽查所有入倉積穀數目理合具摺奏聞謹奏知道了歲底奏聞只宜具摺移文存案亦不過知照而已原係捐貯之穀非正項錢糧可比若作成官事將來反為旗營增一累矣此舉與社倉同一軌轍也雍正三年九月初八日福州將軍臣宜兆熊謹奏為奏聞事竊臣准督臣覺羅滿保咨開為欽奉上諭事查貴都院遵㫖前赴廣西所有貴都院衙門印務已經本部院委員齎送境上而新任撫都院尚未有到任之信本部院卧病巳乆勢難痊愈現今厦門地方水師提督甫經進京而八月二十五日即有兇盗欲行搶刦之事本部院旦夕若有不測則省城止有將軍副都統泉州止有陸路提督地方重大誠恐上厪聖懷本部院日夜憂心已經將具咨請留貴都院緩行起程倘本部院病勢不起將印務交送將軍宜兆熊署理如有緊要事件貴都院在省協同商議料理候㫖欽遵等因於九月初四日具摺奏明仰惟貴都院公忠體國在閩在粤無非為皇上辦理公務當此地方有事亟需彈壓之時伏望以國事為重暫緩起行庻於臣子分誼可盡為此合咨貴都院請煩察照施行等因除咨明原任福建撫都院黄國材外相應咨㑹為此合咨請煩查照施行等因到臣准此即於本日戍刻督臣身故據糧驛道韓奕中軍副將徐左柱齎捧閩浙總督印信王命旗牌上諭併火牌文巻等項到臣臣竊思督臣現在身故撫臣黄國材又經解任且有厦門姦匪一案封疆重大臣不得不暫行署理惟是臣智識短淺恐致貽誤伏乞皇上天恩速簡賢能星馳赴任再解任撫臣黄國材經督臣奏請留閩緩行倘有緊要機宜臣會同商議料理合併聲明謹奏覽奏朕深為惋惜滿保於病劇之際猶諄諄以地方為念足見忠悃甚屬可嘉此時諒毛文銓已抵閩矣爾與之協同心力料理諸務可也雍正三年九月二十八日福州將軍署理閩浙總督印務臣宜兆熊謹奏為奏聞事竊查閩省鹽政自雍正元年前督臣滿保撫臣黃國材會同奏請將鹽政各衙門并商人盡行裁革派委佐雜等官在場稽查收稅附近場竈貧民赴場每擔完課買鹽販賣或自用醃葅似於沿海貧民甚是有益等因具奏續奉部覆允准遵行在案此係奉㫖交與督撫之事臣從前不知其詳今臣接署督篆據文武員弁稟報裝運鹽觔發賣并收鹽完課各縁由臣始知其畧隨加體訪輿情皆以為鹽政更新以來多未妥協臣現在㑹同撫臣毛文銓逐一詳查明白務期有裨於國課民生可垂永久另行具奏外合先奏聞謹奏此事朕早洞悉其不妥於滿保未故之先已另有諭㫖矣雍正三年十月二十四日福州將軍署理閩浙總督印務臣宜兆熊謹奏為奏聞事竊查厦門匪類郭興等一案其逃犯巳據報拏獲現在飭審俟提解到省臣等親訊明確㑹題請㫖外兹又據漳浦營縣各報稱九月二十日漳浦縣城内有姦徒黃尾一名在伊家門首忽插榕樹青枝為記時漳浦營功加官蔡隆馬兵黃進廵查地方見其踪跡可疑將黃尾拏解該營守僃轉報遊擊李彪該遊擊一面帶兵廵邏一面即委守僃成偉㑹同文員查訊據黃尾供有涂廷向彼聲言今晚有匪類進城搶奪富戸你們門首插榕樹青枝即可免搶等語併供出夥犯游躍徐愷寜涂法涂蒲程實昂仔等隨差兵役拏獲游躍游齊涂廷涂法涂蒲程實等又續獲徐愷寜供出林昂為首於九月二十日招伊至陳鎮家會集并供陳鎮家中現藏旗三面皷二面鑼一面單刀兩把等語拏獲陳鎮搜出單刀等物又據供出夥犯林穆周招等十犯即㑹集周招家中又據拏獲林昂一犯訊據供稱伊係行醫度活因林棍家中有厦門逃來流匪吳通陳㒺二名請伊醫治刀傷即商量入夥實係林棍為首欲進漳浦縣城搶刦富戸林棍是箇監生旗布器械都在他家衆人在周招家等語又據拏獲林棍及徐貌解漳浦縣收審等因到臣臣查此案實因厦門匪類郭興等一案是以乘機煽惑今細閲各供為首何人同夥若干尚未明晰現在飛飭查審但此案雖係聚夥商謀搶刦實未上盗似與厦門郭興等拒捕殺害官兵者不同臣等愚見欲於審明之日將為首及藏械藏人者即於該地方杖斃示衆抄没其家其餘夥犯分别輕重枷責禁錮是否可行伏乞皇上指示遵行謹奏此等姦徒即獸中之豺鳥中之鴞也宜嚴加懲治以示警戒毋得毫髪姑息雍正四年正月初三日福州將軍署理閩浙總督印務臣宜兆熊謹奏為請撫生番事竊臣據臺郡文武各官報稱南北兩路番社甚多其為害於鳳諸二縣者惟山猪毛等社其為害於彰化縣者惟水沙連等社皆由從前不繩以國法遂使益無顧忌山猪毛等社向日擒獲兇犯四人稍知畏懼至於水沙連從不一加懲創以致半年之内焚殺疊見撫之不可不得不脅以兵威為今之計當以番攻番令各社之通事土官擇其勇敢者數人為前導率領番壯直抵巢穴而使汛兵駐劄山口以壯聲勢取勝甚易但𠞰番惟賴冬日夏秋之際雨水連綿鎗礮無用一交春二三月又難舉行今現在會商委員剋期舉行等因到臣臣即會商撫臣毛文銓以臺灣各社生番屢行殺人頑梗無知似不便再行姑息即以社丁協同番壯深入擒捕汛兵不過駐劄山口示以兵威諒無他患批令臺屬文武同心協力仍會商廵臺御史務須籌畫萬全切勿輕舉妄動倘彼畏威懾服情願就撫者即宜相機亟為撫綏勿株累無辜以廣皇上柔遠之深仁其發兵若干作何𠞰撫並動贏餘若干俟續報到日另行具奏外合先奏聞謹奏所奏勦撫情節已悉諒卿等自必愼重為之也雍正四年二月初四日福州將軍署理閩浙總督印務臣宜兆熊福建廵撫臣毛文銓謹奏為奏聞事據臺灣同知王佐梅詳報水師提督衙門有差員陳褔等管駕船隻來臺索騐其牌照俱稱係本提督差徃臺澎等處廵哨順帶馬料到厦查各牌照雖有提憲印信可憑而船内舵水俱係不兵不民之人其中是否假藉莫從辨識未敢擅便放行等情到臣等又據署彰化縣孫魯詳報猫霧捒社莊有生番放火燒屋殺死佃丁林愷等八人一案并稟查勘該地原屬禁界為土番鹿場今藍提督又往開墾未免有礙林愷等之被殺明係自取等因到臣等俱經臣等飭行布按二司嚴查去後續准提臣藍廷珍咨稱哨船原係捐僃廵哨給與印牌遴選勤愼之員管押哨探仍嚴飭毋許夾帶等弊又咨稱猫霧捒社莊係自置産業該縣給有照票代納餉銀各等因到臣等臣等伏思自僃哨船與在禁地開墾均屬違例之事查提臣藍廷珍練達水師海疆原有裨益但既有前項事由即不敢茍狥情面不於君父之前據實奏明也伏乞睿鑒謹奏此等事豈可狥隱自應查究其中微有干礙藍廷珍處姑少存地歩密奏請㫖可也同日又奏為奏聞事竊前據臺屬文武官員會請𠞰撫生番業經臣等批飭施行并將緣由奏聞在案兹於雍正四年正月二十三日據臺灣鎮道詳稱因廵臺御史臣禪濟布另欲計議尚未𠞰撫仍各請示前來臣等伏查臺地溝洫甚多一至春雨水漲之時即難舉動所以凡𠞰撫之事非冬日不可今為時已逾似不便仍執前議批令遵行俟今冬再復相機行事所有未𠞰生番情節理合奏聞謹奏知道了斯事自應相時而動不必拘泥也雍正四年三月二十六日福州將軍署理閩浙總督印務臣宜兆熊福建廵撫臣毛文銓謹奏為據實奏聞事竊查臺灣知縣周鍾瑄業經奉㫖解任是非曲直對簿自明廵臺御史臣禪濟布理宜静聽督臣高其倬到日確審實情請㫖遵行豈可别生枝節貽害海疆乃禪濟布不念巖疆重地惟欲加甚鍾瑄之罪歴據各員稟報指使刁民聚集數十餘人拆毁該縣糧書馬仁黃成等房屋而臺灣全縣十五里人民並無一人在場現據十五里人民具結通詳在案是前此聚衆者究不識何等姦徒今幸拏獲李好等四名解省俟解到日臣等即發臬司務秉公審理不得毫髪偏㶷容審出實情另行請㫖外所有疊據稟報前項緣由理合據實奏聞謹奏周鍾瑄之是非曲直禪濟布固宜静聽高其倬到日確審爾等又豈不當遵㫖静待耶據爾等奏稱將李好等即發臬司審訊甚屬不合恐禪濟布將底裏指出爾等眞情亦難掩矣毛文銓自莅任以來一切摺奏及料理事件甚屬不妥雍正四年四月初一日福州將軍署理閩浙總督印務臣宜兆熊謹奏為奏聞事竊臣䝉皇上天恩命臣署理閩浙總督印務自雍正三年九月初七日起至雍正四年四月初一日止總督任内應得平耗馬快銀共三千五百六十三兩零據署布政使事興泉道陶範呈繳前來臣伏念仰荷聖恩署篆半年有餘雖日夕冰兢廉隅自矢而於地方民生毫無裨益且又䝉皇上天恩賞賜俸禄併隨丁糧銀臣家口僅四十餘人儘足養贍何敢復取平耗馬快銀兩懇乞聖恩准臣將此項銀兩交布政司或委員於產米地方採買米石在省會平糶抑或買穀收貯存倉遇歉收之年平糶伏乞皇上批示遵行謹奏汝之亷潔非於今日始克表著也勉之覽奏朕甚嘉悦雍正四年五月十四日福州將軍臣宜兆熊副都統臣鄭繼寛謹奏為奏聞事五月初十日有興化府運米商船到省城南臺地方隨有姦民相聚阻攔閩縣知縣于沛前赴南臺諭令放行姦民等肆行喧嚷不遵以致南臺一帶舖民驚惶罷市是晚城内生事之徒亦相率搶奪舖戸米糧臣等隨委標下副將梁鳳呈撫臣毛文銓委標下遊擊劉定國率領弁兵拏獲搶米人犯二名經撫臣重處至十一日巳刻各姦民竟赴撫臣衙門挨折柵欄進至轅門喧嚷以平糶倉米一錢一分一斗價値太貴求令減價撫臣毛文銓差役拏獲進轅門十七人即行重責枷示原欲置之死地以儆衆後因各門鄉保環跪哀求代為乞命撫臣始行釋放現今地方百姓安静俱各照常開市貿易所有百姓罷市姦民搶奪米舖併在撫臣衙門喧嚷情形理合具摺奏聞謹奏此等事即如此草草完結殊為可笑爾等何怯懦至於此極耶其中必另有情由朕尚未暇詳察雖然刁風何可使之漸長大失朕期望爾等之意矣雍正四年六月二十二日福州將軍臣宜兆熊謹奏為叩謝天恩事竊臣一介武夫至愚極蠢荷䝉聖恩署理閩浙總督印務半載有餘寸長未效兹以撫臣毛文銓會奏臺灣縣知縣周鍾瑄案内一摺欽奉御批臣跪讀之下惶悚無地自愧智識短淺愚昩實深乃䝉皇上天恩不加斥責格外矜恤批示到臣俾臣知所儆省聖恩高厚何以圖報臣惟有洗心滌慮悔過自新從此謹愼小心凡事愈加警惕以報主恩於無既所有微臣感激下悃理合具摺叩謝天恩伏乞皇上睿鑒謹奏向來私比之習朕所稔悉内外大臣當痛改此病夫存心公則念慮誠誠則識見高明處事自得其理不必矯亷沽譽人自無不悦服夫清亷豈非羙德然有所為而為者即是不誠何况狥好惡而議是非借舉劾以酬恩怨豈有不顚倒錯亂貽悞政事之理且作德則心逸日休作偽則心勞日拙即就頤養身心之道而論公之一字亦得許多便宜但庸人識淺率為流俗漸染不能奮志自新耳朕每隨時遇事朂勵諸臣然能仰體朕心而行者僅見怡親王鄂爾㤗二人卿等當以為儀型而效法之朕自有覺照也雍正四年七月二十一日福州將軍臣宜兆熊謹奏為恭謝天恩事雍正四年六月二十九日閩浙總督臣高其倬舟抵閩省洪山橋地方臣與闔城文武官員齊赴跪請聖安督臣高其倬向臣敬傳聖㫖爾到福建可傳㫖與福州將軍宜兆熊福州旗下兵丁風俗甚是不好自伊到任後比從前頗覺更易此是伊盡心效力處朕實嘉之可令伊更加管教務要全好方是欽此臣跪聆聖訓隨望闕叩頭謝恩竊思福州旗下兵丁世受皇上豢飬深恩宜思犬馬報效臣莅任後宣布皇仁嚴加告誡不時訓練技藝比前少熟風俗亦較前稍改兹䝉聖明垂鑒傳㫖嘉勉令臣更加管教務要全好臣惟有仰遵聖訓約束化導俾積習盡除以上副皇上教養兵丁之至意所有微臣感激下悃理合具摺恭謝天恩謹奏駐防官兵不但福建一省率因承平日久怠惰偷安營伍一切流弊不可問矣必須蕩滌其舊染方可鼓舞以更新卿等其體朕諄切至意勤加訓練務令大為改觀庶不有負朕之委任朕亦斷不負卿等之勞勩也勉之更勉硃批諭㫖巻四十四上欽定四庫全書硃批諭㫖巻四十四下硃批宜兆熊奏摺雍正五年正月二十八日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為奏聞事竊臣等清查各屬倉庫案冊前督臣李紱竞於各牧令交代案内有將虧缺社倉穀石批令豁免者有將正項銀米批令將耗羡彌補者有將長墊長欠數目批令准抵缺項者有將現貯社倉穀石批令抵算别項米穀者有將未解耗羡銀兩批令免解者種種欺混紊如亂絲臣等受恩深重不敢扶同狥隱上負高厚除現在飭行布政司造具清冊另疏具題恭候皇上勅部查議外合先奏聞伏乞皇上睿鑒謹奏覽所奏朕嘉悦之至内外大臣皆能如此一秉至公據實敷陳毫不瞻前顧後則直道行而風俗美將見天下吏治肅清於社稷蒼生裨益豈淺鮮哉勉之勉之同日又奏為奏聞事竊查直屬各營馬歩兵丁歴來院司將下年正二三月一季之餉俱於上年之冬借司庫存貯銀兩先行支給俟題撥部覆之後徵解到日即行清扣還庫此事歴來巳久前經督臣李紱奏明借給在案惟查直屬陋弊各營兵丁於預放春餉之外復有借領銀兩本年夏秋冬三季之内陸續扣除前督臣李紱據布政使徳明張适呈詳請示有業經奏明照舊借扣之批是以德明張适先後借出各營三季扣除銀共三萬九千八百七十三兩五錢臣等伏查預放春餉蓋恐撥定之銀解到稍遲則兵丁不無守候之艱是以先於存庫銀内通那預給撥解餉到即扣還項洵為良法可以照行惟是多借銀両三季扣除一事各營兵丁事故不一倘借銀之後若有除名則所借之銀或於新補之兵名下坐扣或於闔營朋扣均非情理况朝廷庫帑豈可市恩私借經年累月任其虚懸此等陋弊亟宜剔除臣等愚見將現在借出銀兩仍於本年夏秋冬三季内照數扣除嗣後永停借給至於督臣李紱曾否奏明臣等未敢遽信理合奏聞伏乞皇上批示遵行謹奏李紱雖曾籠統奏過未經如此分析詳明朕所以有照舊借扣之批也今覽爾等此奏殊屬酌中之論應照所議行同日又奏為奏明事臣等查直隸順天府屬之霸州宛平大城良鄉武清保定府屬之安州髙陽新安雄縣河間府屬之任邱津軍㕔晉州天津州静海各州縣去年因積水未消田畝未經涸出不能播種前督臣李紱因窮民資生無策奏請將督臣衙門鹽務飯銀八千兩又布政使衙門節存平頭銀一萬兩委員煑粥賑濟並聲明倘有不敷容臣奏明酌量借糶在案兹臣等查霸州等處十四州縣報到文冊賑濟三箇月共需銀二萬八千四百二十兩零尚不敷銀一萬零四百二十兩零今據新任布政使張适願捐銀一千兩又捐鹽法道解司項下餘平飯銀六百九十餘兩又前䕶按察使童華願捐養廉銀一千兩實不敷銀七千七百餘兩臣等伏查不敷賑銀雖據前督臣李紱以酌量借糶具奏但查各屬倉糧臣等現在委員盤查若輕議借糶恐藉此滋掩飾之弊再三籌畫擬於司庫舊提公用耗羡之内撥給充用至此外尚有霸州所屬之文安縣續詳該縣之乏食窮黎應賑濟一月需銀一千二百兩據布政司詳請支給前來已批令該司在於存庫耗羡項下先支銀五百九十兩委員賑濟外其未給銀兩亦請於司庫舊提公用耗羡内撥給理合奏明伏乞睿鑒謹奏據奏料理殊屬妥協觀汝二人此數摺敷陳俱為合宜朕甚嘉悅勉之雍正五年二月初三日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為恭報瑞雪事竊臣等駐劄之保定府於本年正月三十日寅時起至亥時止得雪三寸有餘臣等伏查去年臘月得雪業已霑足今又有此雪今歲春麥可望豐收即秋禾亦得藉此發生洵屬豐年瑞應此皆我皇上敬天勤民感格所致臣等與闔省官民歡慶實深除所屬州縣得雪幾分查明另摺奏聞外為此具摺謹奏此日之雪不待爾等奏報朕巳稔知深為感慶然朕不敢預定其必獲豐熟惟敬候上蒼之錫賚吾民耳同日又奏為奏聞事竊查司庫錢糧凡有出納自應正收正支以遵定例前任布政使德明有未奉題撥未經准銷未據解到各項於司庫存貯現銀内預先支給共銀五萬二千二十二兩零又有那給繕書口糧及提塘抄報並添平飯食各官借支等項共銀一萬三千五百九十八兩以上雖非虧空但預支者欵項舛錯那給者還補無期國帑至重難容混淆據布政使張适造册詳報前來除現在繕疏具題外合先奏聞謹奏凡百自應據實無隱但朕曾有㫖與德明令其總聽蔡珽李紱指示而行所奏此二項或係伊奉該督所批或係伊所專主尚未可知耳雍正五年二月十五日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為叩謝天恩事臣等齎摺千總回保捧到臣等前奏養廉不敷懇將鹽課平飯銀兩賞給分用一摺奉硃批應給與者知道了又於耗羡摺内請將銀二萬四千餘兩賞給臣等作賞官犒兵並公出盤費及口糧工食等用奉硃批若不敷所用另當請㫖再定欽此臣等望闕叩頭謝恩伏念臣等庸愚陋質䝉皇上天恩豢養數十餘年頻加拔擢寸長未效深愧素餐今復䝉我皇上於常禄之外又多賜養廉公費銀兩豐餘贍足需用無虞臣等感激之私莫可言喻唯有共相勉勵竭盡駑駘以仰報高厚於萬一為此叩謝天恩謹奏覽爾等奏謝知道了朕於内外大小臣工及天下一切事務惟準之於情理之中而已心無適莫也同日又奏為續報瑞雪普霑事竊臣等駐劄之保定府於本年正月三十日得雪三寸有餘臣等已經具摺奏聞並聲明俟各屬報到另行奏報今據所屬各府州縣陸續申報正月三十日起至二月初一日止得雪六寸五寸至二三寸不等臣等仰見我皇上湛恩普徧無逺弗屆是以天降瑞雪亦無遠弗周豐年預兆闔屬官民咸深欣慶理合奏聞謹奏闔省均得沾沐天恩洵為畿輔黔黎之厚幸朕惟以手加額稱慶而倍増敬謹之誠耳期共加勉愼勿生高興縱逸之念切記切記同日又奏為據情轉請事竊查直屬滿洲駐防官兵所有應給兵米或該地方原有本色米石散給者或相近運河截漕支散者惟良鄉固安大興昌平三河玉田順義寳坻遵化保定雄縣霸州東安等州縣無本色可支前督臣李紱以米貴之年照價折給實屬虧少請照滄州等處就近截留漕米支放等因具題隨准部覆此數州縣距運河較遠裝運需費未便截漕倘歉收之年遵奉諭㫖奏請等因奉㫖依議欽遵轉行在案是良鄉等處十餘州縣駐防兵米將來給價採買臣等自當遵照奉行但臣等到任後據良鄉大興柬安固安四縣駐防協領胡什巴等來文内稱雍正四年秋冬二季米價每石一兩五六錢不等今照折中定價每石給銀一兩實屬不敷業經詳報戸部准戸部覆稱應報明直督題奏等因呈報前來臣等隨查良鄉等處十三州縣駐防兵米内除順義縣業經前督臣李紱咨明户部將倉米支給扣存價銀俟價平買補還倉又雄縣於截漕減糶米價平賤之時已照數採買支給均無庸置議外其餘各州縣有係地方官採買支給詳報不敷者有各兵已照價領去而以不敷情由呈報者有因價少尚未領去者除一面批飭遵照定價給領外所有呈報前由臣等不敢壅於上聞理合據情轉奏應否將良鄉等十一州縣雍正四年秋冬二季兵米一萬四千二百餘石每石量行加增之處出自皇上特頒恩㫖臣等未敢擅便為此繕摺具奏伏乞皇上睿鑒謹奏此項理應代為題請者當準時價之低昂量為加増若至一兩五六錢未免過多小人希冀之心何有底止亦安能滿其奢望耶爾等與各該協領商酌妥確再為具題可也雍正五年三月二十二日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為奏聞事雍正五年三月十七日據房山縣知縣尹元貢稟稱有一人手捧黄匣到職衙門要開門迎接説有陣圖進上等語隨即拏住問其來歴據稱我名孫守禮係交河縣人有父孫應魁兄孫守仁在房山縣住我前年被父親逐出遇見一三功道人傳我陣圖說等渾水清時可將圖樣進上討官做這圖上火礮弩弓我都㑹製造等語看其人貌類瘋顚理合連人同陣圖黄摺解候察奪等由臣等當即押發布按二司公同查訊復據供小的向來做木匠前年在十畝平東山嘴遇見一個道人呌三功道人㑹相面算卦他知道小的是木匠呌小的做四樣兵器是木礮背弩連珠弩木匣走線弩小的學不㑹小的吃了他的一鍾藥酒就跌倒了夢裏見一個姓李的他教小的做這四件兵器小的醒來就㑹了他說他住在七堵泉山後來到那裏找不著他小的就上京到多老爺家做活雍正四年二月多老爺把小的薦到色老爺家收拾牕戸到三月十五日小的在齊化門外日壇西松樹林地方又遇見這個道人他說傳給小的圖樣并圖上詩句他向小的說渾水清時你可將圖樣進與皇上用就可賞你官做那日小的見色老爺在桌上用豆子擺陣小的説我也㑹擺陣勢把兩張陣圖拏出來色老爺看見了圖拏陣書對著看那圖上的字是小的念出來他家的偏思漢寫的小的向他要還沒給小的那色老爺說你若這裏進日後地方官要查問的你果要進到你本地方官那裏去進罷因見今年渾水清了應驗道人的話小的要進圖樣就回到家裏自已畫了三張圖樣央同院住的李四相公照單寫的詩句摺子到房山縣去遞的又問那三功道人如今現在那裏呢據供京裏南城内有個清涼觀還有崇正觀那裏有他的道友只去查問就有下落了等情據此臣等察其供情跡渉妖言大干法紀除飭令將該犯加謹監禁嚴緝三功道人外所有訊據前情理合繕摺奏聞伏乞皇上睿鑒施行謹奏爾等遇事直達不稍隱諱甚屬可嘉此事雖小然跡渉妖妄斷不可姑縱若云小人無知不過希圖僥倖何事不可為而必為此詭異不法之事乎已命該都統將二旗人查拏解徃一併嚴審定擬具題以為天下妖妄不法者戒并可令直省督撫好為隱諱者愧朕豈樂於搜擿微細乎葢治平之道抑邪乃所以扶正不得不如是也倘類斯等事漫不經心官不之理吏不之察則人皆恬不為怪相習成風久之必至於蔓延而莫可究詰矣爾二人自莅任以來立心行政皆優朕甚愉悦勉之同日又奏為請㫖事竊查學臣按試各府凡修理棚厰僃辦什物以及心紅紙張奬賞花紅並日用水菜等項皆州縣供給此各省之通例也惟直隸李維鈞做守道時逄迎學臣勒派屬員令每日折銀五十五兩繳送學臣輪流承値因而虧空科斂百弊叢生流毒至今已成錮弊適學臣孫嘉淦到保公同㑹商亦謂此項實係浮濫亟宜革去臣等當即飭令布政使張适於學臣應得養廉項下支銀五百兩就近交送以為日給薪水之資一面通飭所屬州縣止許循例照舊僃辦棚厰什物等項其折銀供應之陋弊永行革除在案臣等伏查直隸學臣養廉經前督臣李紱銀二千兩在於臣等公用耗羡銀内按季支出添給俾得盡心校士恩出皇上臣等未敢擅便理合奏明請㫖謹奏封疆大吏果能皆正色不阿釐剔陋習天下之弊何難盡除弊既除則利自興矣萬姓豈有不䝉福之理勉之雍正五年閏三月初六日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為奏聞事雍正五年三月二十九日臣等准山西撫臣德明咨開希將任縣北宋里村匪類張文斗張禄紫張弄戈張文標段奇劉起鳳周有懷田帝育趙學朱密拏並將張文斗家所藏不法器物一併搜解等因准此臣等即刻遴委千總王繼禹前徃協同該縣高琚密拏去後隨於閏三月初一日接到欽差二員傳㫖命臣等派委能員協同前徃任縣將匪類張文斗等嚴拏臣等遵即選撥守僃陳明道張士俊立刻帶兵跟隨欽差連夜馳驛去後兹於初五日據臣等先經差去之千總王繼禹回保稟稱於初一初二兩日將張文斗等九人按名全獲於初三日添差兵役交山西來員起解去訖至欽差二員據王繼禹稟稱於栢鄉縣途遇尚未回保合併聲明為此謹奏朕意德明所奏關拏之匪類雖名姓鑿鑿其事或未必然不料竟實有其人大奇事也今幸按名全獲一無脫其中若似有神助云爾雍正五年閏三月十二日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為恭報雨澤事竊直屬地方時已暮春麥苗正需雨澤兹據各屬陸續呈報得雨前來查霸昌道屬之順義懷柔昌平文安延慶衛永清大城房山涿州通永道屬之薊州遵化武清保定府屬之祁州安肅容城淶水完縣新城新安深澤高陽束鹿河間府屬之任邱肅寜故城東光交河景州滄州獻縣阜城吳橋正定府屬之正定井陘平山欒城順德府屬之任縣廣宗肥鄉南和廣平府屬之邯鄲清河宣化府屬之宣化保安直隸天津州直隸冀州並所屬之武邑棗強衡水新河直隸深州並所屬之饒陽安平武強直隸晉州並所屬之無極藁城等各州縣衛俱於三月二十八九閏三月初一二三四等日得雨一二寸至三四寸不等臣等正在繕摺間又據保定府清苑縣呈報閏三月十一日酉時起至十二日丑時止得雨五寸不特麥苗大有裨益而且秋禾亦得播種除俟别屬再有報到另行彚奏外所有各屬並保定郡城各得雨日期分寸理合繕摺奏聞謹奏畿内地方雖賴去冬之雪正二月之雨但入三月以來多風土脈乾燥朕恐已覺微旱前數次之雨甚細不過灑潤而已究屬無益昨於十一十二兩日連雨始覺沾足且得雨處甚寛小東河南俱報透足山西亦聞得雨尚未據撫臣奏報爾等所屬各州縣更有報到者其陸續奏聞同日又奏為請㫖事竊查正定鎮標復設將僃馬歩兵丁應給衙署營房經前督臣李紱准鎮臣楊鯤移會行據布政使張适委員確估據報稱該鎮新添馬歩兵共二百三十五名内除南西北三路臺舖龍固營安設馬歩兵九十名無庸添蓋外實存城馬歩兵一百四十五名共應蓋營房二百九十間又復設左營遊擊現住龍固營守僃舊有衙門其龍固營守僃應另行建造衙署十二間又復設右營遊擊應建造衙署十五間共建造衙署二十七間通共需銀三千六百八十八兩零並無浮冒等情前來臣等自應循例具題動撥正項銀兩給令葢造但查磁州兵丁移駐彰徳府建葢營房經河南撫臣田文鏡題明在於司庫充公銀内撥給建造今此項衙署營房事同一例相應奏明在於司庫充公耗羡銀内撥給建造以資汛防臣等未敢擅便理合奏聞伏乞皇上睿鑒施行謹奏彰徳建葢營房乃田文鏡破格通融之辦理也不可為例今此營房衙署所需銀兩應動國家經費之項何庸撥給耗羡以滋物議況豫省數年以來田文鏡料理得法公用銀兩豐裕可以通融汝等直隸不清之處甚多豈必踵而行之宜少留餘力以為地方公務之用如煙墩礮臺修補城垣等工程皆汝等分内所應設法經營之事也此項仍行照例題請同日又奏為奏聞事竊臣等前奏雍正五年分耗羡摺内聲明雍正元二三四等年耗羡查明另奏伏查雍正三年分耗羡一項原係前任督臣李維鈞奏請將保定河間正定順德廣平大名六府屬及直隸晉州趙州深州定州冀州五州並州屬耗羡提解銀十一萬二千八百八十八兩零以六萬兩彌補無著虧空以五萬兩充各項公用奉有俞㫖在案臣等到任後細查巻案内除被災各處隨正糧蠲免及節次批免銀共除去銀一萬五千八百四十餘兩零是當日奏請雖有一十一萬二千有奇之數實止存銀九萬七千四十四兩再查該年錢糧已徵十分之八而所提耗羡止據各屬完解過銀四萬三千九百九十一兩零尚未完解銀五萬三千五十三兩零其已完銀兩内除彌補過静海縣故令馬任遠等無著虧空銀二千四百四十三兩零似應准其支銷又陞任布政使德明那支銀一千六百一兩零墊發抄報等用無庸置議外尚應存庫銀三萬九千九百四十五兩零内前任督臣李維鈞蔡珽李紱并陞任布政使德明共動用過銀三萬九千五百九十一兩零實現存司庫銀三百五十四兩零臣等現在將各名下動用銀兩逐一查一明繕具清摺欠約銀六十萬兩拖欠耗羡如此之多此皆從前任其那用因循不解且内有陞遷事故離任者將聞抑臣等更有請者直屬尚有從前涿州㕘革知州佟國翼天津州㕘革已故守僃李士謙周兆虎孔興社静海縣㕘革故令馬任遠滿城縣㕘革故令孟以恒六案無著虧空尚未補銀七千九百餘兩應奏覽同日又奏為酌提耗羡事竊查督臣李紱奏請雍正五年各州縣耗羡提解四分為道府各官養廉及通省公事之需其餘六分存留該州縣自行支用䝉皇上發摺查議臣等因查州縣衝僻不同錢糧多寡各異若槩以四六分派立法殊未公允再三斟酌已定議具奏今查雍正四年分錢糧因去年奉㫖停徵未及完納十分之一二兹已開徵所有耗羡自應悉照五年之議分别解存以充支用查保定等六府直隸天津等六州所屬各州縣共應徵收耗羡銀二十六萬九百五十四兩零内除起解内部及司府平飯並各官養廉銀一十三萬五千八百十三兩零實提解司庫銀一十二萬五千一百四十一兩俱令存庫遇有地方公事無庸復派但去年固値停徵各官不無借墊支用是以仍議補給惟陞遷事故之員如其人現在並有揭借未清者亦令照數給予以清墊項若已交皇上睿鑒批示遵行謹奏覽德明任内那借之項張适若有意不力為催補欲歸過於他人以證其前言之不謬則斷然不可設有此等意見爾等豈得任其懷私自用耶欵項既經明晰張适之奏已是矣此間若能照數補完可謂兩全之舉孰有善於斯者乎提督順天學政國子監祭酒臣孫嘉淦謹奏為據實陳情仰祈睿鑒事竊臣受皇上高厚之恩無可報稱每思時時小心事事和平毫不敢出於情理之外伏查學院一官為費甚大按臨考試闔署皆行額設書承皁役三四十人看卷幕客家人長隨及各色人等將近百人封門考試之時値場教官廵風皁隸内班門子火夫不下三四十人此百餘人之飲食柴炭一切所需以及騾馬草豆其費不可枚舉極其省減日費二三十金計一年之需為數甚多此項若出自朝廷則無此制禄之典其勢必需州縣供應三年兩試每縣承値不過一二日歴來相沿已有成規不可輕為更張故臣於請訓之日曽經啓奏照舊取辦比及出廵路過保定見署理督臣宜兆熊協理督臣劉師恕二人合辭力言供應宜除臣屢次相商謂前院舊規五十五兩臣僕從減省但得其半便可足用而劉師恕言减至一兩亦不可行且言伊等自行啓奏皇上撥解公費接濟臣因考牌先行正定生童皆巳守候不便躭延無奈向司庫支銀五百兩前徃正定不及一月銀已用完指据萬狀而伊等並無接濟其如何啓奏之處一切不令臣知臣反覆思維此事實屬孟浪考試大典年年舉行宜圖久遠不可冒昩撥解公費究非成例難以通行且學臣之所需亦不止考棚飲食而已幕客之束修僕從之工食紙筆衣服之資家眷賓客之費皆萬不能已尚望皇上格外之恩督撫解推之誼今乃并公事之一飯而裁之此豈可以久遠通行者哉臣受制於人衣食維艱而人言且謂臣裁供應不近人情將來必誤公事若不詳陳始末仰懇皇仁則是臣内受艱窘之累外負矯偽之名目今欲要供給則州縣不出欲求幫助則督臣不應欲考試則力實不攴欲停考則心實不敢一時愚昩蹈此䧟阱伏望皇上憐臣之愚諒臣之苦勅諭督臣速為撥解先濟目前之急詳為區畫使有久遠之規則不唯臣受再造之恩而將來學臣皆沐皇仁於無既矣臣謹奏前㫖因爾等所奏批行兹覽孫嘉淦此摺朕前諭誤矣孫嘉淦非騷擾地方貪饕者比爾等何不量情一至於此且爾等前奏云孫嘉淦亦願裁革供應等語今觀伊所奏何大相矛盾耶諭到可仍循舊例而行假若孫嘉淦似吳襄之折價抑或分外苛求勒索令地方官詳掲若地方官借名任意冐開亦令學政咨㕘爾等再加留心察訪如是互相稽查檢束方可杜絶後來之流弊孫嘉淦端士也宜作成之雍正五年閏三月二十二日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為遵奉聖訓事䝉皇上發學臣孫嘉淦奏摺臣等欽奉諭㫖即飛飭布政司轉行各州縣於應得養廉内仍循舊例而行嗣後如有分外勒索令地方官詳掲若地方官任意冒開令學臣咨㕘互相稽查後來之流弊庶可杜絶為此繕摺覆奏伏乞皇上睿鑒謹奏今既循照舊規供應則飬亷一項再當斟酌同日又奏為請㫖事竊查天津關稅務原係按察使浦文焯監收今浦文焯因前任河間府任内諭令東光縣知縣李文淑擔承丁憂知縣鄭三才虧空一案經臣等具題奉㫖將浦文焯發審臣等伏思稅務關係錢糧今既缺員自應遴選具題第查直隸各道有水利營田及司放兵餉諸事不能分任而各府知府亦皆有盤察錢糧核審刑名之責既難離署遠去又難相隔遙制現在實無可委之員仰懇皇上於部屬内簡用一員前來經理裕課恤商與錢糧實有裨益是否有當伏乞睿鑒批示遵行謹奏各部郎官優者留辦部務才宜外任者皆揀選道府目下知府員缺甚多需人補用朕為此正在搜羅若有能勝斯任者即早已補授府缺矣浦文焯既離臬司之任更屬閒身若令其戴罪監收税課寜肯營私廢公復蹈愆尤耶或令其再為經管一年抑或令趙國麟兼管之處爾等斟酌妥恊另奏以聞同日又奏為續報雨澤事竊臣等以各屬得有雨澤緣由具摺奏報奉硃批十一十二兩日連雨始覺霑足爾等所屬各州縣更有報到者其陸續奏聞欽此仰見皇上民依念切宵旰憂勤臣等身任地方敢不益加敬惕今據各屬陸續報到未及一寸者不敢繁敘外查霸昌道屬之涿州房山霸州文安保定永清大城東安良鄉通永道屬之通州武清遵化永平府屬之盧龍灤州撫寜遷安山海衛樂亭昌黎豐潤保定府屬之安肅唐縣容城完縣深澤祁州慶都安州新城縣左所博野高陽定興蠡縣新安雄縣淶水河間府屬之肅寜任邱故城滄州阜城正定府屬之阜平行唐直隸冀州屬之棗強直隸趙州並所屬之隆平直隸深州並所屬之安平饒陽直隸定州並所屬之新樂曲陽直隸天津州并所屬之青縣静海順德府屬之邢臺鉅鹿平鄉唐山南和廣宗沙河任縣廣平府屬之磁州清河雞澤廣平成安肥鄉邯鄲大名府屬之元城大名南樂魏縣等各州縣衛所於十一二三等日得雨一二寸至四寸不等除俟再有報到另行彚奏外所有現據各屬報到得雨情形臣等謹遵諭㫖繕摺奏聞謹奏因十一十二兩日京城澍雨霑足朕料直隸通省亦然故前有諭問之㫖後訪知通州涿州得雨不過一二寸薊州僅得微雨一陣甚為可訝觀此情形雖去冬今春雨雪不斷入三月以來風多土燥値兹春夏之交麥禾需雨更殷朕在此䖍誠祈禱爾等亦當省察吏治檢點刑政朕意或由田野之小民廹於催科心志不舒上干天和之所致歟前巳明白曉諭爾等當密諭州縣各官審度民力斟酌行之但民可使由之不可使知之也雍正五年四月初四日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為覆奏事雍正五年閏三月二十二日臣等接到内閣札開閏三月十七日大學士朱軾張廷玉面奉上諭直隸所有帶徴錢糧若目下催徵恐小民力量不足應緩至麥收之後爾等便中寄信與總督令其酌量行之欽此臣等伏誦諭㫖仰見我皇上視民如傷聖恩有加無已遵即細查去歲原報秋成分數如八分以上者目下雍正四五兩年錢糧似不妨並徵若七分以下者目下止徵雍正五年錢糧其一切舊糧俱暫寛緩臣等分别定議密諭州縣留心照行不得稍有違錯但不必出示亦不必撤櫃務期行所無事以仰副我皇上教養兼施之至意是否有當伏乞睿鑒謹奏所奏甚是牧民之道知其疾苦則寛其力以遂其生耳其所以寛之之意又寜必家喻而户曉耶雍正五年四月初八日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為恭報廿雨事竊照各屬閏三月十一二三等日得雨處所經臣等具摺奏報兹又據各屬陸續呈報前來查開州長垣清豐東明於閏三月二十一二兩日各得雨四五寸二十六日又得雨二寸梁城所寳坻於閏三月二十三日得雨二寸武清於閏三月二十八日得雨一寸餘通州於四月初一日得雨三寸文安大城保定於閏三月二十八日得雨三寸永清固安於四月初一日得雨二寸涿州良鄉於四月初四日得雨三寸昌黎樂亭灤州於閏三月二十八日得雨一寸至四寸不等玉田於四月初二日得雨一寸新安完縣雄縣容城淶水於閏三月二十八日得雨一寸至三寸不等安肅易州定興新城於四月初四五兩日得雨二寸至四五寸不等鹽山於閏三月二十二日得雨二寸滄州於四月初五日得雨一寸天津青縣静海於閏三月二十八九兩日得雨一寸至四寸不等廣平於閏三月二十六日得雨一寸宣化懷安保安於閏三月三十日得雨一二寸不等正在奏報間於四月初六日保定郡城得有甘雨據清苑安肅博野深澤新安蠡縣唐縣滿城高陽安州祁州雄縣慶都河間肅寜深州安平饒陽定州涿州保定等州縣於四月初六日各報得雨二三寸至四五寸不等臣等伏查麥田需雨之時得此甘澍不特二麥得以暢茂而秋禾未種地畆亦得乘此播種此皆我皇上䖍誠祈禱上格天心之所致臣等實為欣慶理合繕摺恭奏以慰聖懷謹奏畿内今歲雨澤不均當實心體察吏治刑名恐懼修省以仰答上天譴告前三月底閏三月初旬巳據報稱得雨秋禾何以未經播種查明情由具奏以聞題補河員之摺交怡親王等議行矣雍正五年四月十五日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為欽奉諭㫖事竊臣等齎摺千總回保捧到臣等前奏雨水一摺奉硃批畿内今歲雨澤不均當實心體察吏治刑名恐懼修省以仰答上天譴告前三月底閏三月初旬巳據報稱得雨秋禾何以未經播種查明情由具奏以聞欽此伏查直隸地方今歲雨澤不均上厪聖懷屢頒諭㫖誡臣等省察吏治刑名臣等敢不敬謹服膺實力奉行以副我皇上惠養元元之至意查直屬土俗穀雨種穀小滿種黍稷今歲遇閏節氣稍遲前三月底閏三月初旬有雨之處秋禾皆巳播種其雨少之處人力不齊尚有未經盡種者然此番甘澍得雨地方農民乘時補種可無遲誤之虞也再訪查徃年情形如或得雨最遲即至五月初旬仍可播種晚禾理合繕摺奏聞以慰皇上重農望歲之殷懷謹奏古之人慮患於未然今二麥需雨甚殷而秋禾尚有未播種者則微旱情形已見矣朕為此晝夜焦心爾等乃恬不知懼而曲以閏月節氣為解謂此番甘澍布種猶無遲誤之虞欲以此語寛慰朕懷朕若信以為實遂爾寛懷則與爾等視民疾苦如膜外者何别耶雨澤愆期葢由於爾等漠不關心民隱之咎覽奏不禁為之憮然查各省奏到今歲春雨在在及時霑足即京城左近圓明園一帶亦皆雨澤優渥惟爾等所居畿南保定等各郡縣殊覺暵乾爾等竟毫不介意不知具何等心胸也甚屬惛闇不明天人感應之理亟當返躬自省敬之愼之同日又奏為奏聞事竊查一陞任布政使徳明出納庫帑有正項先支銀五萬二千二十二兩雜項先支銀一萬三千五百九十八兩經臣等題明在案今催據布政使張适轉催各屬徵解前來查正項先支已陸續還欵銀二萬七千九百一十兩零尚未還欵銀二萬四千九十餘兩雜項先支已陸續還欵銀八百五十九兩零尚未還欵銀一萬二千七百三十九兩零除現在嚴飭布政使張适分案查催俟各屬解到並奉准銷到日歸欵另奏外所有已歸各數理合奏聞伏乞皇上睿鑒謹奏竭力催完宣化府知府牟瀜伊父曽任布政使朕因伊亦係科甲出身故用於此缺及面請訓㫖時看其人甚庸碌未知受事後才堪勝任否爾等留心體騐毋因朕特用之員而漫置不問也再知州黄成章聞甚柔懦不能精勤辦事亦當加意考察雍正五年四月二十六日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為叩謝訓㫖事竊臣等齎摺千總回保捧到前奏補種秋禾一摺奉有硃批臣等祗領伏念直屬各府雨澤不均我皇上宵旰焦勞屢誡臣等省察吏治刑名聖諭之指示甚為明晰臣等昧於天人感應之理不能深自警省罪無可逭並䝉皇上諄切訓誨臣等跪讀之下悚惶戰慄愧汗交流竊查數月以來各省春雨在在調和而臣等所屬之保定等府雨澤獨少此皆臣等不能省察不知憂懼之所致也臣等恭繹諭㫖寢食靡寜既巳愚昩於前安敢暴棄於後惟有恪守皇上敬愼之寳訓時時猛省念念服膺以仰副聖主敬天勤民諄諄教誡之至意理合具摺叩謝訓㫖臣等不勝悚惶感切之至謹奏從來天人黙契㨗於影響其間毫髪不爽若信不及天道則不可與論人事也惟恪秉一誠而體騐之斯感應之效由微至顯自必深信而不疑矣同日又奏為續報雨澤事竊照四月初句得雨分寸經臣等具摺奏報兹又據各屬陸續呈報前來查永平府屬之撫寜灤州盧龍昌黎豐潤遷安山海衛玉田俱於四月初六日得雨二寸至五寸不等又於十六十七兩日各得雨五六寸不等通永道屬之梁城所通州三河寳坻遵化薊州於四月初四初五兩日得雨四寸又於十六十七兩日各得雨霑足大名府屬之開州於四月初七日得雨四寸正定府屬之井陘順德府屬之内邱沙河於四月十三日得雨二寸至四寸不等廣平府屬之永年廣平河間府屬之鹽山河間肅寜滄州任邱獻縣交河故城景州俱於四月初六十三十六七八等日各得雨二三寸至五六寸不等保定府屬之祁州安肅蠡縣博野定興高陽容城新城淶水新安雄縣於四月十六十七十九等日各得雨二三寸不等霸昌道屬之大城固安密雲涿州香河懷柔東安永清宛平大興房山良鄉順義昌平延慶衛於四月十六十七兩日得雨十分霑足直隸冀州並所屬之南宫棗強直隸深州屬之安平饒陽直隸定州屬之新樂曲陽直隸天津州并所屬之静海青縣於四月十五六七等日各得雨二三寸至四五寸不等宣化府屬之懷安萬全延慶赤城保安蔚縣龍門懷來於四月十四五六七等日各得雨三寸至五六寸一尺不等除俟再有報到另行彚奏再查慶都唐縣並定州有數村莊於四月十六日奏外所有各屬續報得雨日期分寸理合繕摺奏聞謹奏目下雨澤業已霑足又須晴明數日麥禾得日以晅之方收長飬之功京城左近地方頗覺雨水過多矣爾等寜未之知耶雍正五年五月十六日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為恭報二麥約收分數事據各道府州將麥收分數陸續呈報前來查霸昌道屬收成窪地約有九分八分及六分不等高地六分五分四分不等通永道屬收成窪地約有八分七分不等高地六分五分四分不等永平府屬收成窪地約有十分九分八分不等高地七分六分及五分不等保定府屬收成窪地約有八分七分及六分不等高地七分六分及四五分不等河間府屬收成窪地約有八分七分及六分不等高地四五分不等天津州並所屬收成窪地約有七分六分及五分不等高地五六分不等正定府屬收成窪地約有七分六分不等高地四五分不等冀州並所屬收成窪地約有七分六分不等高地五六分不等趙州並所屬收成窪地約有七分六分及五分不等高地五六分不等深州並所屬收成窪地約有八分七分及六分不等高地七分及五六分不等晉州並所屬收成窪地約有八分七分及六分不等高地六分及四五分不等定州並所屬收成窪地約有八分高地五六分不等順德府屬收成窪地約有八分七分及六分不等高地七分六分及四五分不等廣平府屬收成窪地約有八分七分及六分不等高地五六分不等大名府屬收成窪地約有十分九分八分及六七分不等高地六七分不等宣化府屬收成窪地約有八分七分及五六分不等高地七分六分及四五分不等所有各屬報到二麥收成約計分數臣等謹具摺陳明謹奏今歲初春光景所望不止於此及三月以來大失所望又豈料有此分數耶所奏較朕所聞尚覺少減大約八府六州通盤合算竟有七分以上收成所奏倉糧催補之摺於張适回任時朕自有諭㫖也雍正五年六月初二日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事竊查直屬興修水利營田實係皇上惠民大政臣屢飭地方官督率士民仰體聖意實力奉行以收成效詎有保定府屬唐縣劣生于超于躍劉士熙劣監于思謙等揑造將來加糧名色恐嚇愚民將去歲已經具結情願營種之稻田不許加功寜令抛荒以致羣相觀望經知縣臧珣再三開諭而于超等反赴臣等衙門具詞臣等批營田觀察使清河道會同嚴查去後無如該生等執抗不遵并且不服拘審復赴臣等衙門具訴臣等當即拏交按察使等咨革嚴行究審并委保定府知府親詣唐縣宣布聖恩開導鄉民加意耕耘勿致廢業外但此等劣衿劣監輒敢造言阻撓理合奏聞容臣等酌量情罪嚴行究擬具題請㫖懲一警百庶惡劣衿監知所畏懼而善政可收實效矣謹奏所處甚是案内人犯審明後當嚴懲之他處亦勤加察訪如有類此不法之徒斷不可寛縱以長刁風同日又奏為恭報雨澤事竊查直屬雨澤愆期上厪聖懷嗣於三月後據各屬陸續報到得雨業經屢次奏報在案兹於五月二十二日臣等駐劄之保定郡城天降甘雨入地三寸又於五月三十日至六月初一日遍地得雨入土五六寸而所屬之滿城等各州縣各據報到於五月初一及十四二十二三等日各得雨霑足四野歡忭西成有望此皆仰頼我皇上敬天勤民至誠感格之所致臣等忻幸之餘寅畏益切所有保定郡城得雨情形理合奏聞伏乞睿鑒謹奏目下各處雨水巳覺過多矣而保定郡城於五月盡始得透雨耶前聞滄州左近俱未得雨此時未知光景若何直省各地方雨澤調順惟爾等駐劄之保定數處雨暘不均朕為爾二人實愧且懼魏定國職任提刑或恐訟獄不清乖氣致異耳愼之戒之沽名釣譽優柔弛縱即屬不清也果若此則爾等難以委卸其責可不愼歟雍正五年六月初九日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事竊查磁州地方據滏河上流州境舊有東西二閘攔河阻截向因治屬豫省歴年壩水不放以致下流地方分潤甚難去年奉㫖將磁州改隸直屬併定磁閘按五日一次啓閉水利均平實屬至善兹於五月二十五日當啓放之期有吏員沈國璉刁民顧成法等率衆阻撓不容啓放臣等據報當即飛飭廣平府知府磁州知州將首惡之沈國璉顧成法嚴拏究解并宣布聖意水利務在均平豈容獨霸隨據該府稟稱沈國璉已拏監禁候審招解顧成法畏罪脫逃現在嚴緝而村民俱各帖然聽從已於六月初一日啓放矣除飭行緝拏顧成法務獲一併嚴審解究另結外其餘附和村愚分别省宥以廣皇仁理合奏聞伏乞睿鑒謹奏直隸此等強横之風豈可不力為革除沈國璉當嚴擬具題顧成法飭令嚴緝務獲伊有妻子家屬在籍安能遠颺耶其附和村愚槩予從寛發落卿等若能如此不事姑息大振委靡則歴年之頺風何難挽回朕無憂矣惟期力行不倦毋得偶為此一二事以取信於朕隨復懈弛也朕之或褒或貶亦只據一事論一事就一時論一時耳勉之同日又奏為奏明請㫖事竊臣等據按察使魏定國呈據口北道王棠等掲報宣化縣雞鳴驛驛丞康琦廢弛驛務馬匹疲瘦又馬夫每日每名扣剋工食銀二錢等因臣等即照例咨㕘革職批飭查審去後又准廵察御史臣苖壽等咨會雞鳴驛驛馬疲瘦理應將驛丞叅奏等因又據驛丞康琦詳稱夫役工食扣二又廩飯用一報十各驛皆然因遭宣化縣典史孫珃鑽營陷害等情并摺開藩臬道府縣等衙門併户部兵部各項規禮書辦飯銀規禮等情掲報前來臣等除現在將宣化縣典史孫珃照例咨革親提察審實情另行請㫖完結外據按察使魏定國稟稱驛遞工料項下向有臬司衙門陋規銀一萬六千四百六十八兩零藩司衙門陋規銀七千三百餘兩先經稟明在案今查得管驛各知府暨直隸州衙門共有陋規銀九千四百七十餘兩各衙門書辦陋規銀一萬餘兩共銀四萬有竒俱係歷來相沿等語臣等伏查驛丞康琦廢弛驛務罪無可逭而其所開陋弊亦應查究裁禁况驛站夫馬工料乃國家經費既有羡餘自應節省歸公豈得侵漁分肥其應作何節省歸公并收受各官應作何分别叅追之處容臣等詳加查核審明定議另行請㫖再布政司衙門所有地丁項下解餉陋規作何充公之處俟布政使張适事竣旋署臣等一併酌量定議具奏請㫖合併聲明謹奏陋規自應裁禁第當量情酌理而為之毋得過刻致令後來地方上諸事難於措辦也雍正五年六月二十日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事雍正五年六月十八日據良鄉縣駐防協領胡什巴等呈稱去年八月今歲二月兩季兵米未領差催知縣不給兵丁之婦子赴縣催討有該縣書辦打壞縣鼓踢落公案而知縣反將兵丁毒打鎻拏等情同日又據該縣知縣冉裕棐詳稱六月十五日職正升堂有數人至前稱奉駐防要米又有男婦持仗約三四十人登堂辱罵歐散看堂人役將堂鼔雲板木梆盡行毁壞辱及卑職扯裂衣冠幸廵捕人等赴救現獲張伏兒等四人等情臣等伏查良鄉縣駐防兵米自雍正元年奉㫖折中定價以來俱係照例將銀折給官兵自行採買自去年秋冬二季起該駐防胡什巴等以米價不敷固執不領屢次呈報請題加増經臣等具題於本年五月初六日准到部覆令地方官採買散給臣等隨行布政司轉飭遵照去後復檄委同知崔應階前徃督令採買監放自應平情静候設有遲誤亦應呈報臣等糾叅乃胡什巴始而固執不肯領銀今委員尚未到境一任兵丁婦女閧閙縣堂殊屬多事除飛飭保定府知府李正茂親詣該縣一面監同買散一面確查實在情形稟報到日臣等另行具疏題叅伏乞皇上於臣等題疏到日欽命部員嚴行提審分别究懲以彰國典合先奏聞謹奏良鄉縣駐防兵米之事胡什巴自行投到朕巳冇㫖矣無庸㕘奏雍正五年六月二十八日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為覆奏事雍正五年六月二十二日布政使張适陛辭回保䝉皇上發交臣等前奏條議清補倉糧摺子欽傳傳上諭雍正四年錢糧耗羡所有各官養亷著照應得養存查又傳上諭各省所報雨澤俱各調匀惟直屬雨水不時此必因刑獄不得其平之故按察使魏定國操守朕所深悉恐其於案件或有不明之處嗣後凡有關係民命重大案件著布政使張适協同辦理欽此臣等現在欽遵諭㫖一一敬謹奉行分案完結另行奏聞所有奉到上諭理合覆奏伏乞睿鑒謹奏覽同日又奏為奏聞事竊查宣化府懷來縣居住之莊頭金復輝者因保安州吏目馮德棻差役賈亮在集廵查匪類金復輝將賈亮歐罵並率多人打入吏目署内將該吏目裂衣歐打臣等據報即飭行按察司提審究擬間又據保安州知州稟稱廵察按臨收詞數十張而告莊頭金復輝者甚多批發卑職録供者一二十紙等語又據口北道稟稱莊頭金復輝恃強陵弱欺官害民必嚴加整飭庶知懲戒等語臣等伏查莊頭肆惡久在聖明洞照之中兹莊頭金復輝恃強毆官罪跡彰彰法難輕縱除嚴行按察使魏定國㑹同布政使張适嚴提案犯按欵究擬外所有稟報各情由合先奏聞謹奏將金復輝嚴加究擬具題李甡烏姓莊頭等之舊例具在也不如是懲治惡習何能革除不但此一事他處更當廣為察訪毋致稍有縱容同日又奏為謝事本年六月二十三日據玉田縣知縣呈報六月初六十四等日大雨滂沱山水大發還鄉河東埝沙溝等處堤工衝決二十餘處又薊州運河衝開埝口河水泛濫廬舍田禾現被水淹等情臣等當即飛飭布政司委員確勘并飭地方官核實被水恩膏廣被既命發帑又諭開倉蠲賦賑災有加無巳仰見睿慮憂勤聖衷明斷臣等實屬心悅誠服感激難名除欽遵諭㫖轉飭有司加意撫恤以副皇上愛養之至意理合具摺奏謝天恩再據蠡縣報六月十八日陳村等處堤岸漫溢十餘弓及二十弓不等又據高陽縣報六月十七日馬果莊等處堤工衝决五六弓及八九弓不等又據魏縣報六月初五日馬豐頭西堤決口約二丈各等情前來臣等飛行各該地方印河等官僃料撥夫晝夜修築并查明被水村莊有無淹没田禾俟覆到另行奏報外合併奏聞謹奏一切隄防乃民間田禾廬舍所關豈容虚應故事所委各員如少疎懈即嚴行㕘處以示儆戒雍正五年七月初五日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為請㫖事案照保定駐防新添鳥鎗一百五十桿滄州駐防新添鳥鎗一百桿先據布政司詳稱准各城守尉移取火藥等項銀兩節次駁减去後據各該駐防回稱所用火藥火䋲鉛子等項保定駐防每年共需銀一千七百六十一兩八錢零滄州駐防每年共需銀一千二百四十八兩等情事關錢糧未便草率隨關查山東德州并山西太原等處定例去後隨據德州知州陳留武覆稱德州新添鳥鎗二百桿咨請部示照江南等省之例每年演放八個月毎月演放六日所用火藥火䋲鉛子等項毎年共需銀六十六兩六錢五分其太原駐防每年共需銀一百四十八兩五錢零等情據此臣等伏查保定滄州駐防新添鳥鎗比之德州太原新増之鎗數較少而應用之錢糧多至一二十倍不等經臣等屢飭布政使張适與各該駐防商確定議裁減而各駐防堅不肯減事關動用錢糧若照所需扶同請撥則開銷實屬浮冒是以未敢遽行定議草率具題應否比照江南山東山西等省之例臣等核實數目定議題撥未敢擅便理合奏聞伏乞皇上睿鑒批示遵行謹奏自當照依各省之例題撥豈有因其不肯從減而遂曲狥之乎此奏足見爾等無能亦屬𤨏屑煩凟之甚吏部尚書仍署理直隸總督臣宜兆熊謹奏為瀝情請㫖事竊臣有未婚之壻梁璨現任保定府屬定興縣知縣臣先經奏請撤回另補欽奉諭㫖俟得人後改補欽此今臣之女年已二十六歲向者臣於福建將軍任内原許梁璨為繼室因南北路遥是以未經完婚今臣家口自閩來保若此時就近出嫁固屬甚便但既處嫌疑之際臣實不敢伏念皇上天下一家匹夫匹婦無不達之隱臣之私情不避𤨏屑上凟天聽可否准行伏乞皇上睿鑒批示欽遵抑臣更有請者如䝉俞允則此番婚嫁之後通省官吏勢必盡知臣雖不敢負恩狥庇但恐司道等官知臣之壻或有曲為照看之處即與臣之負恩無二懇求皇上將梁璨速賜另調則臣心始安并祈慈鑒為此繕摺請㫖謹奏題請廻避可也近日秋雨連綿禾稼恐有水澇之虞朕為此寢不安席食不甘味諒汝等定當優游自適也此番霖潦未必非汝二人昏庸愚昧之所致朕前批諭恐雨水過多之㫖不知汝二人猶記得否雍正五年八月初七日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為覆奏事䝉皇上差員外郎張文彬至臣等衙門傳㫖聞保定府城廟内五道神像被人打毁又將財神撩在中軍官㕔是何情由且為何竟不奏聞務要將此人拏究將神像修整奏聞欽此臣等跪聆諭㫖悚惶驚懼伏查本年三月内城中有一二處小廟内神像被人打壞又將財神抛棄中軍官㕔當經清苑縣知縣祝翼曽查拏張三到案訊係染患顚癎即行責釋兹䝉諭㫖臣等切諭布政使張适嚴拏務獲去後據張适詳稱拘到該犯之兄張午據供小的兄弟張三舊年八月裏得了瘋病每日胡言亂語將毋親都打了因此攆出他去如今不知徃那裏去了小的情願協同緝拏送究等情隨據跟緝張三到案據張三供小的去年八月裏得了病終日昏昏迷迷胡打亂駡小的母親把我攆出來日裏向人家要飯吃夜裏在各廟内睡有一晚上小的見一個黒大漢子踢小的一脚小的就與他打架把他打倒了那時節都是糊裏糊塗的後來被縣裏拏去打了幾箇板子就好此了小的討飯到新城縣舅舅那裏舅舅替小的醫治出了汗心裏清楚了如今病還没大好被公差拏來了等情據此查張三現稱病尚未愈難以刑訊統俟醫治病痊確審實情另報外合先詳報等因前來臣等除一面批飭作速撥醫調治務痊嚴訊實情另行具奏請㫖外所有拏獲緣由合先奏聞至所有廟宇神像現在購料興工加倍修整合併聲明謹奏張三是否病瘋固宜確審明白且據伊兄供伊毆毋寜不當究訊耶同日又奏為欽奉諭㫖據實覆奏事竊臣等齎摺千總回保捧到奏摺奉硃批永定北運決口甚多因何並不奏聞欽此伏查玉田等處隄埝衝決臣等據報兩經繕摺奏聞䝉皇上敕發帑銀欽差大臣分路查賑并怡親王等寄字臣等續報之處動地方公用銀兩一體撫恤如何料理之處密摺奏聞臣等自此之後凡各屬有報衝決及被水者一面飭令搶修堵築察其情形稍重者一面委員齎銀前徃路逺不能帶者令其就近於道府等庫借支㑹同地方官隨宜撫恤并令逐一確勘將被水村莊實在乏食貧民親加查核造冊具報咨㑹奏而此外尚有覇州東安永清保定大城文安通州三河寳坻梁城所博野新安清苑雄縣安州定州新城滿城束鹿河間肅寜滄州青縣任邱晉州深州南宫隆平南和任縣邯鄲肥鄉各州縣陸續報到有稱隄工漫溢有稱地畝被水等情臣等亦俱皇上軫恤民隠之至意也今蒙降㫖察詢臣等不勝悚懼伏念臣等受來則臣等頂戴聖慈銜感靡既矣理合覆奏伏乞皇上睿鑒謹奏覽雍正五年九月十五日吏部尚書仍署理直隷總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事竊查直屬天津關經前任督臣李紱題請將解任按察使浦文焯管理稅務今查該關自雍正四年八月二十八日起連閏扣至本年七月二十七日止一年限滿内浦文焯自上年八月二十八日起至本年六月二十七日赴保候審東光縣一案止鹽道趙國麟自本年六月二十八日署事起至七月二十七日止臣等屢次誡諭令將所收稅銀儘收儘解而浦文焯仍復瞻顧歴年成數止據報收羡餘銀二萬餘兩臣等因傳該關書辦任致中到案令其逐一供報隨據開出自上年八二十八日起至本年七月二十七日止一年所收稅銀除已報外尚未報出羡餘銀一萬六千五百九十二兩零所有部科平飯各役工食及該員養亷等項俱在其内臣等伏查關上使用縱有必需該員亦應據實開報俟臣等酌議請㫖恩典出自皇上況所匿之數即冇需用亦斷無如許之多乃浦文焯一槩朦混全行侵隱此等欺公貪利之員若非嚴行究追從重治罪無以為經手錢糧玩法者戒至趙國麟亦未據實申報不無扶同情弊相應一併質審除繕疏題㕘外理合先行奏聞伏乞睿鑒施行謹奏據實糾㕘足見汝等不事瞻狥但業經具題何必又行摺奏且並無密請諭㫖再為題達之處此奏甚屬煩凟同日又奏為請㫖事竊查直屬津軍㕔同知衙門額徵海稅一項今年春季分據署津軍㕔同知翰林陳儀止報收銀一百二十兩零臣等訪聞此項稅銀每年可收六七千兩因嚴行駁查去後始據報増春季銀三百八十一兩零夏季報收銀一千一百二十四兩零而所增之數與臣等所訪之數仍屬不敷明有侵匿雖得之傳聞未便即行㕘䆒然斷難仍令管理相應另選勤愼之員徵收臣等嚴加考核儘收儘報如陳儀果有欺隱之處另行叅奏理合先行奏聞謹奏應委員更换陳儀若果有欺隱情弊辜負朕恩更當加倍處分同日又奏為奏明事竊查宣化府城北門外因逼近洋河水勢洶湧向築石壩以資防䕶今據布政使張适呈據宣化縣知縣俞士恒詳稱東頭舊築石壩被水衝塌八丈有餘向係官築官修今唤匠估計共需工料銀七百四十二兩零應請奏明在於庫貯雍正四年充公耗羡銀内動支給發修築再西頭新築石土二壩中間亦有裂縫處所且堤岸堤根俱經傾卸查此項新壩係欽奉諭㫖派原任宣化鎮總兵官張自誠之子張文燦修築保固三年在案已奉咨准山西撫院將張文燦檄發到宣現在修理等情前來臣等除將估計清冊咨送工部並嚴催張文燦修築完竣外所有宣化府城北門外石壩請動耗羡修補縁由理合奏明伏乞皇上睿鑒批示謹奏知道了總宜督令修築堅固以奏一勞永逸之效不然修補何有了期徒責取保固之名究無益也同日又奏為請㫖事竊照直屬布政司衙門向有錢糧平飯一項按察司衙門向有驛遞公費一項凡各衙門養亷及部科飯銀等費均於此取給今按察司驛遞公費既已裁革則布政司錢糧平飯自應一併歸公以昭畫一臣等即諭令確查去後兹據布政使張适開報前來臣等逐一查核所有布政司衙門各項通共平飯銀三萬二千八百六十兩相應奏明一併歸公再查按察司衙門每年驛站奏銷部科飯費銀三千兩今驛遞陋規業已裁革無庸議給又布政司衙門五年一次編審部費銀二千二百兩臣等已通行嚴禁私派無庸議給又按察司衙門每年刑名飯食銀六百兩應聼該司於養亷内自行支給又布政司衙門每年地糧奏銷部科飯食銀三千四百兩於充公耗羡項下動支今應照數於恩賞臣等公用銀内撥給布政使張适料理無庸置議外惟是督臣養亷銀七千兩學臣養亷銀二千兩布政司每年養亷辦公銀約需一萬兩按察司每年養亷辦公銀約需八千兩向者俱於錢糧平飯及驛遞公費之内取給兹叩懇皇上天恩俱於充公耗羡銀内動支以上通共應需銀二萬七千兩臣等未敢擅便相應繕摺奏請皇上睿鑒批示欽遵謹奏在爾等酌量為之朕不便代為畫定準繩此等銀兩只宜歸於地方公用之項不可歸於庫帑項下也至於督臣七千兩之説係李維鈞狡詐之為將公項任意取用則七千兩之數不過虛設一名色以相誑耳名為養亷實巧濟其貪也督臣養亷朕意應與以二萬金今汝二人各領萬金為一切日用薪水之資此外爾等平情酌理而區畫之亦不必矯亷過刻致令宦場局促至於捉襟露肘不但不近情理而亦萬不能行之久遠也雍正五年十月十九日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事據大名府朱必堦申報本年九月二十八日知府奉廵院關御史李御史牌開據廣平府成安縣典史沈浩稟稱有吳二指稱投充本院内司等情又據典史沈浩首出吳二合同書信合同内開代辦要務議定銀二千兩先交三百兩文到交二百兩事成全完又吳二出首典史履歷一紙發審等因卑府審訊各供典史沈浩託吳二謀陞正印立有合同但沈浩係現任職員礙難審訊除詳覆廵院外擬合報明等情據此臣等查吳二是否廵察御史關住李徽之家人與該典史如何商謀立約代圖陞轉抑係吳二冐捏拐騙必湏嚴審方得實情除移咨吏部將典史沈浩斥革行令兩司㑹審詳解外合將據報情由繕摺奏聞伏乞皇上睿鑒謹奏此事爾等秉公嚴究務得實情向聞關住家人素不安分關住人亦平常伊乃怡親王之小舅王殊鄙薄之情如冰炭也爾等密知之雍正五年十一月十八日吏部尚書仍署理直隸總督臣宜兆熊禮部右侍郎協理直隸總督臣劉師恕謹奏為請㫖事竊照直屬各營馬歩兵丁將下年春季之餉俱於上年之冬借司庫存貯銀兩先行攴給俟部撥之後徵解到日即行清扣完項由來巳久今據布政使張适呈稱兵丁糧餉最為緊要如奉部撥到日始據所屬徵收解放則春季餉銀勢須稽延値此歲暮兵弁不無稱貸空乏之虞應請將直屬各提鎮協營㕔并各駐防應需雍正六年春季兵餉銀二十四萬八百六十七兩零循照向例在於司庫現存雍正四年地糧銀内照數先行撥解各司餉之道府州等衙門按名散給以資兵食等情前來據此臣等伏查向例似應仰體皇仁先行借給俟部撥徵解到日歸還原項於窮兵實有利益但事關借支臣等未敢擅便相應奏明伏乞睿鑒施行謹奏自應循照向例借支為是同日又奏為續報得雪事竊照保定郡城於十月二十日得有瑞雪經臣具摺奏報今據各屬陸續呈報前來查霸昌道屬之大城文安保定固安東安霸州懷柔永清平谷各得雪三四寸不等昌平良鄉延慶衛房山順義涿州各得雪一二寸不等通永道屬之薊州通州武清遵化寳坻三河得雪三寸至七八寸不等永平府屬之昌黎遷安樂亭撫寜灤州豐潤盧龍玉田山海衛各得雪五六寸至九寸不等保定府屬之容城新城得雪一寸清苑安州慶都祁州深澤蠡縣束鹿高陽新安唐縣滿城雄縣定興完縣博野淶水易州各得雪二三寸至五寸不等河間府屬之河間獻縣寜津故城交河鹽山景州慶雲阜城滄州任邱東光肅寜吳橋各得雪三寸至五六寸不等正定府屬之平山井陘獲鹿靈壽得雪一二寸欒城正定元氏行唐阜平得雪三四寸順德府屬之南河沙河鉅鹿唐山邢臺廣宗内邱平鄉任縣得雪三寸至一尺二寸不等廣平府屬之廣平成安永年曲周威縣磁州雞澤肥郷清河邯鄲各得雪三四寸至一尺不等大名府屬之清豐東明魏縣大名元城南樂開州長垣各得雪三寸至一尺不等宣化府屬之西寜得雪二寸天津州得雪二寸所屬之静海得雪六寸青縣得雪二寸冀州屬之南宫得雪二寸新河武邑棗強得雪五寸至一尺不等趙州得雪二寸所屬之寜晉高邑栢鄉臨城隆平得雪三四五寸不等深州得雪五寸所屬之安平武強饒陽得雪三四五寸不等晉州得雪三寸藁城得雪六寸無極得雪四寸定州得雪二寸曲陽得雪三寸新樂得雪二寸各等因臣等正在繕摺奏報間據保定府知府報稱十一月十六十七兩日郡城得雪八寸餘四野霑足臣等伏念當此隆冬屢降瑞雪徧地均沾明春二麥豐稔可期所有各屬得雪情形理合恭奏伏乞皇上睿鑒謹奏冬雪為來歲豐收之兆然麥田究以春雨為主爾等切勿肆志自滿當倍勵公清敬愼以迓天庥勉之勉之同日又奏為懇請代奏給假省親事據直隸廣平府知府鄭錫爵呈稱雍正五年二月二十八日吏部帶領引見三月初一日恭請聖訓卑府面奏臣父年八十三歲臣母年八十歲雍正三年七月内䝉特恩補授貴州貴陽府知府至今家信不通求皇上量賞臣假紆道省親欽奉諭㫖鄭錫爵著補授廣平府知府廣平府知府王允玫著調補平凉府知府鄭錫爵速行到任俟秋成後給假回籍省親卑府又奏容臣屆期詳請督臣代奏請假復䝉恩㫖俞允兹已時屆秋成應遵㫖請假回籍因錢糧正在督催完納倉糧亦須親歴盤查卑府不敢以烏鳥私情貽誤公務懇乞據情代奏俟封印之後給假回籍省親至開印之日即便回任則職守不致曠廢而人子之情亦得稍盡矣等因呈詳前來臣等理合據情代奏應否准其回籍省親伏乞皇上批示欽遵謹奏准與伊假但伊為何不迎養其父母至任所以盡子道朕觀鄭錫爵係一老成忠厚人材質中平與廣平之任頗相宜否同日又奏為遵㫖議奏事竊臣等奉發原任廣平府曲周縣訓導董灥等條奏四摺蒙皇上硃批條奏四摺爾等訪察詳議可行與否奏聞欽此臣等欽遵逐一訪察議覆僃開於後一據原任曲周縣訓導董灥奏稱曲周縣東橋地方商米於此卸載開有糧店數十間窮民藉脚運餬口不下數千人有司指稱帖稅横徴或將脚户濫派差徭甚至買補倉糧短價給發大斗量收請行查禁等語臣等查曲周縣額徴糧食牙帖稅銀止七兩二錢今訪得該縣毎年共徴銀八十四兩實屬濫徴今飭令照額之外不得絲毫濫徵倘敢故違一經發覺從重嚴㕘至脚運窮民毎日所𫉬不過數十文細加訪查實無濫派差徭之事其買據實嚴㕘一據原任曲周縣知縣喻斌奏稱曲邑東南鄉有香城固地方請將把總移駐於彼以查緝匪類䕶守倉糧等語臣等查該縣止有把總一員獄囚倉庫與門禁鎻鑰均關緊要若移駐香固集則城守一據原任保安州知州駱為香奏稱保安一州止有文職查懷來縣之新保安現設有㕘將守僃把總或分撥一員帶兵駐防州城等語應如所奏於保安堡内抽發把總一員帶兵二十名移駐州城協同防守抑臣等更有請者延慶州城内亦無武弁似應於附近之永寜各路内酌量移駐一弁以資防守如蒙一據原任懷來縣知縣張彦昌奏稱懷邑不食蘆鹽每年包納鹽課五百七十餘兩民户獨認紳衿旗莊竟皆漏脫懇飭均完等語臣等確查俱係紳查旗莊田賦不由州縣完納此項蘆課不便獨派均完所奏應無庸議又據奏稱沙城堡東隷懷來西隸保安盗竊事發互相推諉查懷來縣之新保安文職有東路同知武職有㕘將守僃把總懇議一員東西均轄等語臣等查新保安與沙城堡相去不過二十里應飭行該同知嚴密稽察并令懷官無分彼此疆界協力緝拏如州縣並排甲人等袒䕶岐視者該同知分别詳掲拏究以警玩忽似可不必紛更舊制其所奏於新保安同知㕘將内議調一員駐劄沙城堡之處亦無庸議可也以上各條臣等遵奉諭㫖逐一訪察詳議具奏是否有當伏乞皇上睿鑒批示欽遵謹奏覽雍正六年正月二十四日吏部尚書仍署理直隸總督臣宜兆熊吏部右侍郎協理直隸總督臣劉師恕謹奏為奏聞事雍正六年正月初二日臣等聞天津州水師營兵丁與葛沽鎮當商互相爭角擁擠理事同知三保公堂嚷閙一事當即檄委西路同知崔應階確查去後隨據理事同知三保詳稱旗丁傅成額等數百人刦去差役趕打衙役且將磚石抛擲滿堂種種不法請咨都統曉諭等情於十四日據西路同知崔應階等詳稱遵奉確查隨傳齊一干人犯㑹同理事同知併協領公同研訊當商劉召賓并旗兵德寳伯壽傅成額及衙役李全仁張宗智等取具各供縁徳保曾將衣服赴葛沽當舖質錢劉召賓因錢少不肯多質德保等恃旗爭閙召賓隨赴理事同知衙門遞稟及理事同知傳訊見傅成額復率領多人打閙公堂該同知當即通報在案旗兵因係初至間有愚頑生事且不知理事同知為專理旗民互控事件之員遂爾擁擠多人一時喧嚷此亦情之所或有者可否念伊等初至理法未嫺懇請俯賜轉咨都統轉飭各該佐領㑹同理事同知將傅成額徳寳鞭責發落以警將來仍曉諭八旗兵丁使知同知為專理旗民互控事件之員以便各守法度庶理事之責有攸歸而兵民亦得相安於永久等情臣等伏查兵丁強悍法所難寛若官員受賄致滋事端亦難輕縱今此案先據同知三保詳報𫝊成額等閙嚷公堂内有伯壽等指其受賄一節及臣等訪聞該同知又有開舖漁利及放餉遲掯等事又據該同知稟稱旗兵強取舖戸物料種種情節均應嚴查今據西路同知崔應階等㑹審詳覆前來彼此瞻狥實情未得除一面檄委通永道高鑛前徃天津并一面咨㑹都統臣鄂齊亦委大員㑹同高鑛研審務得實情分別究擬詳到另行劾奏外合將委差縁由繕摺奏聞伏乞皇上睿鑒謹奏已另有㫖矣原非汝等欺誑瞻狥昏庸無識之督撫所能查究清楚之事況委高鑛等類舞弊營私之人前徃㑹訊欲得實情更屬可笑雍正六年二月二十三日吏部尚書仍署理直隸總督臣宜兆熊吏部右侍郎協理直隸總督臣劉師恕謹奏為恭報春雨事竊照目下節屆清明正田疇需雨之時兹保定府清苑縣地方自二月二十一日至二十二日得雨三四寸不等土膏霑透餘俟各屬報到另行續奏外所有清苑縣得雨情形合先奏聞伏乞睿鑒謹奏此番春雨應時自然係汝二人秉公執正清理刑政實心為國為民至誠感召之所致日前若將毀傷神像之瘋人正法且將實心辦事之藩司張适正直無私之臬司魏定國保留在任更不知如何雨暘時若也雍正六年三月十七日吏部尚書仍署理直隸總督臣宜兆熊吏部右侍郎協理直隸總督臣劉師恕謹奏為奏明事竊照宣鎮派徃阿爾㤗種地官兵今當更换之期所有行糧馬價等項銀兩業經臣等恭疏具題請撥在案臣等查前次歩兵三百名尚有賞給鐡鍁鐡斧皮馬褂䩺鞋木碗鳥鎗雨套銀兩前任督臣李維鈞扵扣捐俸工項下支給今次更换各兵除鳥鎗停其帶徃則雨套亦無庸製僃應核減銀九十兩其餘鍁斧等項共需銀五百三十九兩四錢相應於充公耗羡項下循例撥給理合奏明伏乞皇上睿鑒謹奏應如數撥給其雨套銀兩何必核減賞與兵丁令其從容足用可也同日又奏為請㫖事竊查雍正六年春夏二季分兵米現據良鄉縣知縣冉裕棐玉田縣知縣馬鴻俊署東安縣知縣戴謨并東安縣駐防博爾本等各呈稱所有兵米雖經照數散給但現在時價每石一兩五六錢不等不敷買食詳請加増各等情前來臣等伏查雍正五年春夏二季各兵米因毎石定價一兩不敷採買䝉皇上天恩特諭臣等於折中定價之外酌量加增在案今春米價不若上年之昂貴豈便以每石一兩五六錢貪冒妄混可否每石量增銀三錢於司庫充公項下照數撥給以資不敷出自聖恩至其餘各州縣如再有詳到者臣等亦照此議酌量辦理事竣彚摺覆奏是否有當伏乞睿鑒批示遵行謹奏爾等虛公確訪地方時價酌量增給同日又奏為續報雨澤事竊照直屬得有春雨經臣等兩次具摺奏報今又據各屬呈報得雨前來查霸昌道屬之霸州等各州縣於二月二十二及三月初一初四五等日得雨一寸五分至三四寸不等通永道屬之寳坻等各州縣於二月二十一二及三月初一初四五等日得雨一寸五分至三四寸不等永平府屬之山海衛等處於二月十八二十二及三月初五等日得雨一二寸至四寸不等保定府屬之清苑等各州縣於二月二十二及三月初四五等日得雨二三寸至五六寸不等河間府屬之東光等各州縣於二月二十一二及二十八九等日得雨一二寸至四五寸不等正定府屬之阜平等各州縣於二月二十一二及三月初一初四等日得雨二三寸至九寸不等順德府屬之平鄉等各縣於二月二十一二及二十九等日得雨一二寸不等廣平府屬之曲周等縣於二月二十二三及二十八九等日得雨一二寸不等大名府屬之魏縣等各州縣於二月二十二三及二十八九等日得雨三寸至五寸不等宣化府屬之蔚縣等各州縣於二月二十一二及三月初一等日得雨二寸至四寸不等直隸冀州趙州並所屬之棗強隆平等縣於二月二十一二及二十八九等日得雨一二寸至五寸不等直隸深州並所屬之安平等縣於二月二十八九及三月初一初四等日得雨一二寸至五寸不等直隸晉州定州並所屬之藁城新樂等縣於二月二十八九及三月初一初四等日得雨二寸至五六寸不等直隸天津州並所屬之静海縣於二月二十二及二十九等日得雨二三寸天勤民之聖意於萬一為此繕摺謹奏覽雍正六年四月十六日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為奏聞事竊臣等訪聞得保定府屬之容城縣因知縣李鍾俾懲役過嚴於本年四月十四日六房書吏及三班衙役俱各散去臣等伏查懲役固宜寛嚴得當但在官人役似此要結挾制此風斷不可長除一面飭諭保定府知府李正茂遴委順義縣知縣廖翼前徃容城縣確查起事情由拏為首各犯究訊另結外理合奏聞謹奏昨者山東亦有類斯一事似此衆役挾官殊屬藐法刁風豈容滋長自應嚴究其中必冇為首倡率之人務宜察出重處以示懲戒雍正六年四月十九日署理直隸總督臣宜兆熊協理直隸總督臣劉師恕謹奏為奏聞事竊查保定郡城自四月初十日以後民間有患頭疼身熱之證者初則三四日即愈近日傳染漸多愈亦稍遲訪之廣平正定近山西之處民間染患者亦多臣等現在建立醮壇齋戒禳解一面配合寸金丹等藥於郡城處所設立藥局施捨拯濟外臣等仰見我皇上念切民瘼理合據實奏聞謹奏月初以來都城内外患斯證者頗多幸天心仁愛不過數日即愈近漸止息矣更聞江浙山陜亦皆如此大約傳染自南而北所屬地方如時氣消退之後具奏以聞硃批諭㫖巻四十四下
