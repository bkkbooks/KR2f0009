body:
  text: 欽定四庫全書硃批諭旨卷一百硃批鄭任鑰奏摺雍正四年五月初四日湖北巡撫臣鄭任鑰謹奏為奏聞事臣以庸陋下材荷蒙皇上殊恩畀以封疆重任一切事宜惟有謹遵聖訓夙夜勤愼以期稍盡職守臣於雍正四年三月十二日入境即見沿路二麥暢茂到任之後行查各屬據報雨水霑足二麥豐收等語現在收穫統計分數約有七八九十分不等米石時價武昌漢陽二府每石八錢五分黃州安陸德安荆州襄陽鄖陽六府每石自七錢二三分至八九錢一兩不等小麥每石五錢五六分至六錢大麥每石二錢六七分三錢不等收成豐稔編氓樂業此皆皇上宵旰勤求保民若赤之所致也至各處早稻俱已播種將畢雨水現在調勻所有二麥收成及米麥時價謹具摺奏聞伏乞睿鑒謹奏二麥豐收米價平減殊慰朕懷千里如面不可粉飾覽督撫二臣之奏似出一手或偶爾相符亦未可定倘係商酌約同之言則過費一番心思矣此後不必約同一人獨奏可也同日又奏為奏聞事竊查湖北地方時當初夏江漢水勢正在日加增長臣恐有妨堤岸已嚴飭武昌守道趙𢎞恩上荆旨遵行更有私鑄一事現在嚴行禁止務期源絶流清至於安民必先察吏臣於到任後已嚴飭各員勉力振作以肅吏治如再有疲玩不職者臣即分别糾參人地不相宜者臣即題請調換以上俱臣分內應行事件不應上煩聖聽現在次第料理恐厪聖懷理合奏聞謹奏私鑄既經嚴禁即應區畫永久可行之䇿而措施之庶百姓輸心樂從也不然姦刁射利之徒煽惑愚民翻生怨望於事何濟此正爾等封疆大吏之責當不避勞怨熟籌謀始樂成之難易為國家盡力為之設有掣肘之處不妨奏眀毋得輒指稱特旨陡頒嚴令以致衆口歡譁而於國計民生仍然無益此等居心行事豈臣下歸功引咎之道歟諸如此類當事事留心若使怨歸於上則恐罪歸於汝等也至於察吏泛泛申飭不如開心見誠勤懇教導使皆竭忠盡瘁以奉公敷治則百廢俱興矣惟宜端本不必逐末勉之勉之所奏各項次第布置力行不間方有成效李成龍似尚不知朕爾詳悉告之雍正四年七月十三日湖北巡撫臣鄭任鑰謹奏為恭繳硃批事五月初四日臣恭具奏摺荷蒙皇上賜覽批發到楚臣伏讀之下仰見我皇上睿慮周詳無微不燭逐一指示開導愚蒙使知遵守臣謹刻骨銘心凡屬地方一切事件總惟實力奉行任勞任怨至於緩急寬嚴臣當愈加小心斟酌務期得宜不敢草率以仰副聖主加惠元元砥礪臣工之至意又蒙皇上硃批李成龍似尚不知朕爾詳悉告之欽此臣遵赴督臣李成龍衙門詳悉敬告訖再臣前奏淸界一事內稱接壤之區有可以便民併隸等語蒙硃批此句不解欽此臣實冒昧措辭疏晦兹謹詳悉奏明竊惟湖北地方有犬牙相錯之地與濱江濱湖坍漲不時之洲土兩境之民多致互爭又有日久荒棄之土為鄰境之民開墾者藉稱舊界希圖占奪興訟臣愚以為莫非王土何分彼此倘州縣接壤之區有此等漲淤洲土與墾熟荒地似應察民所便酌量地之相隔州縣城池遠近如去此縣甚遠可以歸併彼縣管隸有益者立以新界具題請旨定案不特賦役畫一訟端可息而百姓可免遠赴輸將並無推卸命盜差徭之弊矣是否有當伏乞聖慈指示遵循所有欽奉硃批理合恭繳謹奏定界以息訟端原屬善政但須畛域清析確當不可草率從事前諭甚明今爾又復請朕指示朕思此事必得賢能之員盡心竭力慎重周詳公平經理方足以服衆心而止爭競於地方始為有益既云犬牙相錯則分析甚難況濱江濱湖坍漲不時今據目前淤土定以新界水性無常將來如或此坍彼漲又當作何區畫之處不可不預為籌及據爾奏稱定界之後賦役畫一爭訟可息言之似覺可聽恐行之殊不易耳當再四斟酌盡善無弊方可措置勿因本欲便民而反致擾民也雍正四年九月十三日湖北巡撫臣鄭任鑰謹奏為恭繳硃批叩謝天恩事竊臣前奏定界一事蒙皇上訓誨指示諄切周詳臣惟有敬謹遵循不敢草率滋擾務期實在清楚以慰聖懷再前臣摺奏土司清界與代繳上荆南道高淳奏摺冒昧煩瑣輕瀆聖聰蒙皇上天恩不即貶黜容臣醒悟悔改臣接到大學士張廷玉等書札詰責嚴切戒勉僃至臣感激愧懼無地自容自今以後惟有痛自刻責愈加恪謹竭誠盡力以答高厚而巳臣謹望闕叩頭恭謝天恩謹奏汝何嘗遵朕之訓誨指示以居心行事也莫負朕恩毋忘養心殿面奏之言勉之愼之硃批諭旨卷一百
