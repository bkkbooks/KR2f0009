body:
  text: 欽定四庫全書硃批諭旨卷三硃批楊名時奏摺雍正元年二月初二日雲南巡撫臣楊名時謹奏請皇上聖安朕安爾向日在官歷任有聲朕所稔悉自兹益當加勉莫移初志雍正元年五月十一日雲南巡撫臣楊名時謹奏為恭報雲南夏熟收成仰慰聖心事臣看得雲省一春天氣晴和時有雨澤二麥蠶豆俱各茂盛四月中至五月初旬民間逐漸收割共稱豐稔今正在望雨插秧又屢得甘澍灌注溝塍低平之區栽蒔將遍其髙坡山地土脈滋潤亦在以次種植據布政使查報兩迤各府夏熟通計約有九分收成與臣訪聞無異至省城米價每一京石上米一兩一錢次米一兩五六分其餘各府米價每石或有一兩之處亦有不及一兩之處理合據實奏聞謹奏覽所奏雨水米價情形朕懷遙慰往復萬里惟慿一紙摺奏凡事實陳不宜稍為粉飾也雍正元年七月初六日雲南巡撫臣楊名時謹奏為奏明事竊臣於康熙六十年正月蒙聖祖仁皇帝實授為雲南巡撫所有一切規禮銀臣一無收取其銅厰之息銅捐納之羡餘季規羡米及諸陋弊俱行嚴絶又向來運送兵米折取腳價深為民害糧道輕齎銀兩一項逐層扣尅更為民纍臣俱嚴加禁革昆明縣向設五塘僉立頭人一應公事按糧派銀每石至三四兩不等臣盡革頭人按糧均徭民糧一石止出銀四錢屯糧一石止出銀二錢民咸歡悅各州縣之民聞之共赴臣衙門求為立法均徭臣一一詳為酌定濫派清除自臣及司道以下修理備辦等事悉發現銀毫無𣲖擾所有鹽規銀五萬二千兩除留為恤竈修井銀六千兩外其四萬六千兩臣為供用之需又藩司平規四千兩通省稅規七千兩連鹽規共有五萬餘兩係臣衙門目前所入之數也查銀厰缺課每年約至二三萬兩管厰之官嵗罹參追視為畏途臣於康熙六十年六月內具摺奏明專委糧道管理以有餘補不足如再有不敷將督撫衙門舊規墊補全完臣巡撫衙門將所得鹽規撥補銀厰缺課共一萬五千五百五十餘兩又捐賠前任督撫運糧倒斃牛馬等項銀一萬五千兩俱經題明在案再歷年供應在藏官兵各項軍需賞賚又賞臣標兵丁及興修水利賑恤災傷等事併日用交際一切公私各用皆取此規例銀應辦自抵任迄今共用銀一十萬兩有零存有底本不敢瀆塵睿鑒臣有請者若藏兵既撤之後費用簡省懇乞聖恩將鹽規等項下準留若干兩與臣衙門充用其餘以供厰務及恤竈修井平糶等公用則公私俱有所資藉矣再臣標有隨丁糧銀除實丁外每年餘銀一千五百兩懇乞聖恩賞留此項以為製造修理旌旗器械之用則邊省軍容益覺整齊矣謹奏朕凡遇督撫此等之奏不但從未批示亦且槩置不覽取與之際任爾自為但須還朕一是字而巳督撫羡餘豈可限以科則拘以繩墨惟視秉心何如耳取所當取而不傷乎廉用所當用而不涉於濫固不可朘削以困民亦不必矯激以沽譽若一切公用犒賞之需至於拮據窘乏殊失封疆之體非朕意也必使兵民溫飽官辨豐足督撫司道亦皆饒裕乃朕之所願設此數者有一不然而督撫先巳饒裕即朕不加譴責其如昭昭湛湛何此事全在爾等揆情度理而行之其是與否自難逃朕之鑒照可無煩章奏呶呶也今若欲朕命爾某項當取某項當受則斷無之理爾等責任綦重惟宜同心協力懋勉政治以安地方庶無忝厥職特諭同日又奏為欽承諭旨恭謝聖恩凛奉遵行事雍正元年五月二十二日驛鹽道李衛傳旨朕在藩邸從不與各官交接況巡撫楊名時係漢人更不曾識面因聞伊聲名好所以信用朕承聖祖仁皇帝付託之重無時不以地方民生為念雲南離京遙逺伊不過耳聞不能深知爾到雲省下旨與督撫凡地方應行應辦於民有益之事應奏即奏不必疑懼朕不憚煩勞欽此臣跪聆之下望闕瞻天不勝欣躍伏念臣一介愚陋荷蒙聖祖仁皇帝恩擢雲撫高天戴德追慕何窮欣逢我皇上至仁純孝逺邁百王濬哲文思直追二帝臨御數月以來政事之美傳播中外實有稱述所不能盡者臣身任封疆兢兢職守惟恐才識不逮措置失宜乃蒙天語褒勉感愧交集臣謹披陳愚陋伏乞久輾轉交代經過數官若專責之現任之員情理未安查歷來既收規例仍令各竈户加煎餘鹽反致正鹽有缺將此加煎之鹽散派於煙户壓令領受追比正鹽反致壅滯臣到任後禁止加煎以恤竈禁止壓派以恤民竈户小民困始漸蘇將餘滷所出之鹽查州縣虧欠鹽課之多者令其照額鹽薪本發給竈户收買行銷所得羡餘以之彌補舊如果臣言可採懇祈皇上睿鑒奏覽雍正元年十月初九日雲南巡撫臣楊名時謹奏為恭謝聖誨事竊臣奉到皇上硃批諭旨敬謹展觀捧讀玩繹悚息之餘不覺神開意豁昭若發蒙聖心公溥皇言正大爰窺睿學淵深臣伏見唐虞洙泗以中字傳心以過不及為戒帝王聖人諄諄訓迪只求一是字先儒云好名與好利雖有清濁之不同其為私心一也有分辨不茍取謂之廉非以不取為廉皇上之諭無非經書中精義至教洵臣下可永遵而無弊者也臣等任封疆者必仰體聖衷服膺聖誨不立偏見不矯激沽譽仰體皇上欲臣民均足之心臣等亦以屬員百姓均足為心無或偏擁纍下方不負惓惓諄諭至意耳臣不勝歡欣感激凛奉遵行敬具摺陳謝謹奏朕前諭爾之意謂廉且不可為而況貪乎事事惟公平真實是務內外上下毫無隔閡偏枯則和氣盈溢於兩間寧猶慮天下不治平蒸民不樂業耶我君臣當共勉之雍正元年十一月初六日雲南巡撫臣楊名時謹奏為奏明事竊臣看得廣南府知府蔡起俊奉旨升授湖廣按察使因其知府任內交代遲延未得即赴新任入秋後又報在省患病今據藩司毛文銓詳稱病巳痊愈廣南府知府交代巳清請示給慿等因到臣臣查蔡起俊護理驛鹽道任內有情願認賠銀二萬八千餘兩限於雍正二年十月全完經臣奏明蒙聖恩允準在案今廣南之交盤既清且係奉旨超升之員臬司關係緊要臣謹奏明一面令藩司即給慿令其赴任伏乞睿鑒謹奏知道了蔡起俊若非進藏曾效微勞豈能邀朕如此優容遇便寄字勸伊改過自新勉圖上進若仍循故轍禍不旋踵也雍正二年二月初四日雲南巡撫臣楊名時謹奏雍正元年十月初九日臣具摺恭謝聖誨蒙賜硃批諭旨臣跪誦天語開示明切無隔閡則不蔽於近不囿於偏虞帝之明目達聰不是過矣務真實則上以誠感下以誠應周文之迪知忱恂不是過矣風動太和之治行可復覩我皇上以上智之資猶不忘自勉臣中材下士雖竭蹶供職日懼隕越敢不率循至教黽勉朝夕以自效於明良極盛之時惟有載賡豈弟作人之章冀得與於譽髦斯士之列耳臣不勝欣悚之至謹奏欣可也悚何為朕於修齊治平之術良多遺闕爾等嶽牧諸臣若肯直言進諌以匡不逮實朕所樂聞而嘉納者也同日又奏為恭承聖諭祇奉遵行事雍正元年十二月十七日曲尋鎮總兵官臣楊鯤傳皇上諭旨到臣臣跪讀之下不勝悚惕伏見我皇上御極以來智臨無外明作有功念切於察吏安民化捷於風行雷動臣凛遵至意與督臣髙其倬嚴飭屬員清釐一切其不知改悔者節經題參在案今再查應參者即行參處俾吏治益就肅清再土豪光棍深為民害臣現會同督臣加意訪查嚴行拏究以靖地方再新平縣元江府界有土目方景明等與施和尚等讐殺聚集猓衆擾及村寨官兵攻捕方景明等見勢窮蹙與後生猓玀三百餘人束手投服於去臘解至省城看守候勘至自效臣本庸材念受聖祖仁皇帝暨我皇上殊恩無以報稱於辧理兵民事務不敢不勤今奉邊境聲威緣行事理據實陳奏伏乞睿鑒臣無任惶仄之至謹奏所奏諸務惟宜實力奉行莫謂朕之耳目逺而弗屆也勉之同日又奏臣查得雍正元年雲南通省秋收豐稔即有一二稍薄處亦不下六七分收成細問各處麥苗俱好入春以後米價不為髙昂間有稍貴至一兩有零之處省城自臘月屢有雨雪霑潤正月復連得小雨麥苗甚茂蠶豆早者已結實可食市中上米價約一兩一錢次米價約一兩民間氣象甚好理合奏聞謹奏閲奏深慰朕懷畿內以及近省地方蒙上蒼祚祐比皆雨暘時若朕曷勝欣幸之至同日又奏竊臣於雍正元年十一月初六日奏明蔡起俊領憑赴湖廣臬司新任今齎摺人回欽奉皇上硃批臣捧讀之下仰見我皇上功過不掩勸懲備至臣隨欽遵寄字敬録諭旨傳知諄切勸戒勉其自省愆尤惕然改悔奮力做一好官無負皇上格外生成至意所有硃批恭繳謹奏近日觀人不二過者少下愚不移者多蔡起俊謂非幹員不可然其操行朕實未之信也今伊提刑湖廣雖不係汝屬員但汝曾經保奏則非風馬牛之可比理應再三勸勉更當留心採訪伊倘怙終不悛辜負朕恩即實奏以聞不可為之容隱同日又奏為欽奉密諭事竊臣進摺人回捧到諭旨三道一為社倉利益民生及保甲當行責成一為盜案改強為竊及諱盜誣良等弊一為供應煩擾不得濫行餽送京差以滋糜費以上各條仰見皇上愛養民生培植風俗之盛心至為詳盡周密臣等凛遵諭旨敢不日夜在心循循料理以期上副聖懷緣係各督撫應行事件臣恭奉諭旨敬謹安設時刻觸目籌維不敢遽繳理合聲明伏乞睿鑒臣謹奏照所請留閲可也此通行督撫之諭爾等分閫宣猷風土各異要當審習俗順民情因地制宜酌其緩急次第舉行設有牽制難行處抑或行而無益即據實奏覆毋得陽奉隂違更毋因朕諭而膠固迎合以貽天下後世笑也勉之雍正二年五月二十八日雲南巡撫臣楊名時謹奏為奏聞事本年閏四月十六日奉到硃批諭旨畿內以及近省地方比皆雨晹時若臣捧讀之下不勝歡躍良由我皇上念切民依默契天心所致自此永召豐和於萬國也雲南去歲有秋今年夏熟收成有七八分四月閏四月插蒔之時早得甘雨兩迤俱遍歷年髙燥難以栽植之處無不盡行播種五月下旬臣出郊循行阡陌見禾苗彧茂色極青蔥轉盻秋成可望滿收旬日之前雨覺稍多近海最窪之灘有被水淹及者約千餘畝連日來天氣晴霽漸已涸出尚可無傷米價比春間少為平減因雨足苗肥故也臣謹奏據奏雨足苗肥盈寧可望實慰朕念雍正二年九月初六日雲南巡撫臣楊名時謹奏為恭報秋成豐稔民生樂業仰慰聖懷事臣查雲省自夏入秋雨澤甚多兩迤各郡髙原坡阪栽種俱遍昆明縣近海窪田被淹約及千畝七月朔日河水暴漲衝塌關廂民房五十餘間小田屋之民即發錢穀賑助咸令得所省城米價上米每石一兩一錢次米九錢餘為年來最平之價迤西唯定邊縣及鄧川州二處有傍山之民房田畝山水陡下衝坍各一二處該州縣隨巳賑助訖臣詳細訪問兩迤之各府州縣秋收八九十分者聖德如天恩周邊徼感和召祥民登袵席臣惟有乘此豐收之際知嚴之益若私恩小惠尤無濟於事也謹將雲省近日皇上愼簡學使誠移風易俗之要道也情形繕摺奏聞謹奏政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和此誠聖人千古不易之名言也因爾寬嚴互施之語故再及之雍正三年七月十三日雲南巡撫臣楊名時謹奏請皇上聖安朕安今欲擢用爾為總督當勉盡厥職以副朕委任之意雍正四年四月二十日兵部尚書雲貴總督仍管雲南巡撫事臣楊名時謹奏為恭謝天恩事竊臣於雍正三年十二月初二日具疏籲懇聖慈鑒宥前愆仍準摺奏竦息待命夙夜靡寧雍正四年三月二十九日接準部咨內開二月初九日奉旨楊名時既知過失懇切奏請仍準摺奏該部知道欽此臣捧讀之下隨望闕叩頭謝恩伏念臣才疏識譾愆咎多端仰荷我皇上寬宥矜全且復疊沛隆施逈逾常格拊躬愧赧不知所報兹蒙恩命準臣摺奏俾臣得於應行密陳之事恭請指示凛奉遵循臣服念聖慈唯有益加敬謹小心知非補過殫竭微忱以期副君父造就裁成之德意耳為此繕摺謹奏前因人有萋斐之言偶失於舒究耳今既辨白何罪之有朕一時之誤從不文飾以自恕朕之素性如此不以過為疚而以不能改為疚往事當釋然於中不必絲毫介意鄂爾泰深知朕心到滇之日爾其詢之同日又奏該臣查得滇省春杪夏初連得雨澤四月中旬雨尤均遍霑足各郡豆麥雖未全報收成分數然詳加訪問大約可望七八分至五月初皆可登場迤東之臨安元江開化等府迤西之永昌蒙化景東等府天時本暖又得早雨秧苗已多栽插去年因秋雨過多秋熟祇及七分是以大理楚雄臨安開化等郡兵多之處米價俱比往年稍貴省城兵民所聚價值頗昂每一京石約一兩三四錢餘臣等令各處將倉米減價糶賣俟秋冬買補還倉目前之價可不至日昂矣至於水利堤防各已依時濬築報竣姦棍刁徒嚴飭稽察鹽法厰務隨宜酌劑總督事撫臣鄂爾泰到任將巳三月於吏治邊情悉心整飭辦理臣因在滇日久每晤面時以平日所知所見隨事逐為論説撫臣鄂爾泰係肯刻苦有見解之人亦咨謀詳愼務期於事情妥協臣等二人俱各凛遵皇上兩省地方緊要著和衷同商辦理之諭旨實心任職虛心受言平心察理小心防弊庶幾相濟相資於政治民生均有裨益上副聖主厪念邊方訓迪臣工至意謹奏汝二人皆公清自矢之臣自必同道相濟有水乳之合朕覽奏深為嘉悅鄂爾泰乃斯時封疆大吏中卓異之品互相推誠砥礪共敷治理可也雍正四年六月初九日兵部尚書雲貴總督仍管雲南巡撫事臣楊名時謹奏為冒陳鄙見仰祈聖明垂鑒事竊臣在滇於今五載有餘與督臣髙其倬共事三年有餘臣服其公勤清愼沖雅不伐自愧不及其綜理之才今管總督事撫臣鄂爾泰到任將及五月臣見其安心喫苦竭力辦事咨訪籌度愼密周詳皆有重始善終之慮斯二臣者其善人君子之倫乎與之處者內有以檢飭身心外有以諏謀政事交資互益德可進而業可修臣於仕途中僅見其人輒不禁攄陳胸臆於君父之前藩司常德壽臬司江芑等俱和衷師濟雍雍肅肅氣象甚嘉伏惟聖鑒謹奏鄂爾泰髙其倬之才之守不待爾奏朕知之久矣諸王大臣中朕所深許者怡親王鄂爾泰髙其倬三人也卿等克效此三人居心行政方不負朕信任之重常德壽以滿洲人材而論可謂庸中佼佼者江芑中材耳不失為老成人雍正四年九月初四日兵部尚書雲貴總督仍管雲南巡撫事臣楊名時謹奏為恭報雨暘時若秋成豐稔事臣查雲南入七八月以來雨澤調勻自省城至兩迤各府俱各相同偶有一二當山水之衝龍陳冰雹所過及生秋蟲或傷一假或數村少者數畝數十畝多者一二百畝當經該州縣一面詳報一面即動倉穀逐户賑恤不致失所又滇中民夷多食蕎者今年之蕎大勝去歲民間最得其接濟之益是以目下米價比前漸次平減中秋後得溥霑雨澤秋分後亦晴雨得宜晚稻蕎麥咸得滋潤時和物遂婦子恬熙目前刈割過半各處收成九分十分者居十之八此外唯楚雄姚安二府屬稍次於他處然亦有八分收成俟場功陸續告竣臣等誡諭各該有司勸民加謹蓋藏急公清課並飭有司買備倉儲以裕軍糈民食仰副皇上厪念邊方痌瘝懷保至意謹奏雲省有卿等居綱紀之任正已率屬以敷布德化自必感召天和捷如桴鼓朕殊為滇民欣慶之至儲蓄乃第一要務在邊境尤當加意講求朕願觀成效焉同日又奏為恭奏接奉諭旨日期併陳謝悃事雍正四年八月十七日臣於監臨場內接準吏部咨為欽奉上諭事等因到臣臣伏讀上諭敬繹人非聖賢孰能無過改之為貴何以慚為慈鑒臣不勝慚懼竦仄之至謹奏朕因欲汝洞悉朕之居心故走筆而諭不覺言之纚迤而繁也同日又奏為恭繳硃批奏摺事臣蒙聖恩準臣仍具奏摺隨繕摺恭謝奉硃批開諭仰見聖度如天明並日月稽之典籍自堯舜禹湯文武而下未多見也凡在天光離照之內者雖蒙被瑕垢不待湔濯而皎然完白益得勉為全人臣敢不殫竭愚𠂻以期仰酬至德勉副至教又臣另摺奏撫臣鄂爾泰為人肯刻苦有見解與臣和𠂻辧理等情蒙奏凡理勝於辭謂之忠辭勝於理謂之佞宣聖惡佞之言蓋緣季路口給禦人之失而發後世俗儒至理屈辭窮箝口結舌而或以佞詆人以不佞自解不特昧已之良抑且離經叛道為名教罪人誠不可與論洙泗之學也且尼山又云君子不以人廢言詎因己之理屈遂併人言而棄之可乎覽卿此奏思及前諭故引而伸之朕豈好辨哉乃不得已也指迷之論卿當熟讀以增識見古有君臣契合而虛懷論道者往復駁詰必求合乎至當而後已朕每於史册中睹其流風餘韻不禁為之嚮慕焉今我君臣萬里談心寧非人間樂事乎雍正四年十二月十八日吏部尚書以總督管理雲南巡撫事務臣楊名時謹奏為恭謝天恩事臣衙門齎摺承差回滇捧到皇上賜臣御書魏徵十思疏一卷臣恭設香案望闕叩頭謝恩祇領盥手捧擎斂容瞻曯仰見龍文璀璨鳳藻騫騰揮毫煥雲漢之章振腕挾風雷之勢神隨機運法與心融於遊藝而揭針銘睿思宏逺因選言而垂法戒宸翰昭回唯天縱乃兼擅乎多能抑好學斯倍臻乎神妙臣叨蒙寵錫沾被恩榮朝夕常懸恍覲光華於紫極對揚時凛儼承提命於彤廷臣不勝感激曕依之至為此繕摺陳謝謹奏觀爾於講論文字之章奏便覺精神煥發殊不思吏治乃一篇真文章也若徒務紙上空言而於致君澤民毫無實濟聖門之所謂學豈若是歟失之毫釐謬以千里不可不審也同日又奏為恭報地方情形事臣查滇南於冬至前數日省城得雪半寸許各州縣報得雪二三寸不等可卜來年豐稔蟲不為災前蒙硃批諭旨蓄積乃第一要務在邊境尤當加意講求欽此臣飭各官趁此豐收發價平買米穀務令倉儲奏覽雍正五年正月二十五日吏部尚書以總督管理雲南巡撫事務臣楊名時謹奏為凛奉嚴綸瀝陳下悃事臣接準部咨內開內閣交出户部議覆臣為滇省未完鹽課一本奉有諭旨臣伏讀之下慚惶悚懼寢處靡寧伏念臣才識譾劣遇事每多不諳兹因清查鹽課具本緣此項欠課經前督臣髙其倬於查參事案內審明摺奏於雍正二年十月內咨行在案逮承追鹽課二年密批諭旨遂爾照案載入本中此實臣迷謬所致非敢髙深於萬一也臣謹奏覽雍正五年閏三月初八日吏部尚書以總督管理雲南巡撫事務臣楊名時謹奏為欽奉上諭事臣準吏部咨開奉旨雲南巡撫員缺著湖南布政使朱綱補授朱綱到任後楊名時起身來京欽此咨移到臣臣聞命之下不勝欣躍望闕叩頭謝恩竊臣忝任封疆去京萬里我皇上御極之初恭疏陳請入覲未蒙俞允幸今年十月闕行禮今欽奉諭旨令臣俟新任撫臣朱綱到任後來京臣計瞻五雲覲光志切謹繕摺恭謝天恩伏乞睿鑒謹奏一切事務明白之後自然來靣朕也同日又奏為奏聞事督臣鄂爾泰恭傳聖諭令臣等委員送陳時夏母親至蘇州伊家內亦為之照料妥協無令其母繫念又諭起身日期一聽其母之便在路隨意歇息行走不必因乘驛定限欽此仰見我皇上曲體臣下將母之情愛護安全備極周至聖主教孝作忠肫摯若此為臣子者當何以酬答髙深臣等謹已資送盤纏照管啓行之事於三月十九日陳時夏母親巳自省城登程赴蘇州差委昆明縣縣丞張浩同陳時夏之子陳萬里一路小心照料務俾髙年適意陳時夏之母叨沐殊恩洵屬人生希有之遇縉紳莫不羡榮緣遵旨辦理事件理合奏聞謹奏朕加恩於陳時夏之母不過推屋烏之愛耳初未嘗思及縉紳盡羡以為奇榮也若因賞一人咸以為榮而懷感則罰一人必咸以為辱而懷怨此即黨比惡習朕正欲力行滌除爾乃宿學舊臣何亦出此鄙陋之言耶朕於一切事惟以真誠接對天下臣民胸中從不少存絲毫沽名避謗之心上蒼可鑒朕既擢用陳時夏欲其宣力以報朝廷自不忍令伊垂白之母暌違數千里外兩相懸切前據陳時夏面奏願迎飬任所朕準其請又豈忍令八旬老嫗間關跋涉不獲安全是以諭爾等周旋照顧此朕之本意今閲汝奏生出無限文章殊為畫蛇添足翻使朕有遺憾前舉之心且將來施恩於臣下更不得不大費一番躊蹰也特諭同日又奏為聖誨嚴明臣心凛惕恭鳴謝悃懇祈睿鑒事臣蒙恩賜御書魏徵十思疏具摺恭謝臣家人於三月十五日齎捧回滇欽奉硃批跪讀之下心骨俱悚恍如面對天顔親聆誡飭言言痛切字字深警雖晨鐘醒寐遒鐸發蒙未足為喻也自此於致君澤民之道務期勤求熟講雖庸材下質不足與於聖學髙深而服膺至教之餘漸知向往獲免罪戾莫非我皇上矜宥生成提撕警覺之所致也臣不勝感激懇切之至謹具摺恭謝聖恩伏乞皇上俯垂慈照謹奏此奏若出於至誠所謂失之東隅收之桑榆未為晚也否則仍屬無益耳將此數摺批諭與鄂爾泰看雍正五年閏三月二十一日吏部尚書以總督管理雲南巡撫事務臣楊名時謹奏為凛奉嚴綸臣心警惕恭陳忱悃仰祈睿慈垂鑒事竊臣因滇省未完鹽課照前督臣髙其倬咨開硃批原案具題奉旨交部嚴察議奏臣準到部咨隨繕摺陳奏閏三月十五日臣標齎摺把總回滇臣啓匣敬讀硃批訓諭嚴切臣不勝悚惶慚懼伏念臣一介庸迂蒙聖祖仁皇帝由詞林歷擢至滇撫抵任二載恭遇我雲霄捫衷自省雖捐糜頂踵詎能酬報萬一唯有矢公君父之前者我於當陽之離照也伏惟聖諭嚴明諄切無非矜全覺悟之至意臣雖昆蟲草木亦當聞雷聲而啓蟄皇上不倦之教思生成之大德已爾臣不勝懇切依戀之至恭繕摺陳謝伏乞睿鑒謹奏非朕樂為苛細也因爾等之春秋每於字句中寓褒貶之義朕故於爾之章奏留意剖析而不少略焉若因鑒照精嚴不得逞其伎倆遂生怨尤則悖逆之罪更不可逭矣雍正五年六月十七日署理雲南巡撫臣楊名時謹奏為恭報夏熟收成豐稔秧苗栽插普遍仰慰聖懷事臣查滇省兩迤諸郡春夏以來晴雨調和豆麥俱獲豐收雖分數略有參差大約不出八分九分亦有滿收之處又據各府報稱四五月甘霖屢沛禾苗早得栽插髙原坡阪處處都遍秋成豐穰可期山地所種之蕎麥時得雨潤自六月杪以至七奏覽奏為汝抱愧良多同日又奏為恭報辦理銅鹽課項仰祈於鹽務甚為明晰操守廉潔可稱盡職之員銀銅二厰臣自康熙六十年正月到巡撫任後見銀厰自五十八九年約各缺額課三萬數千餘兩銅厰節年缺課銀二萬五千一百八十兩係臣整飭鹽旨查奏銅斤案內奏明每年可辧獲銅一百餘萬斤約可獲息銀二萬聞伏乞睿鑒臣謹奏披閲之間􅑲謾盈紙殊無忸怩不解具何等面皮也雍正五年九月二十日署理雲南巡撫臣楊名時謹奏為滇省秋成豐稔仰慰聖懷事欽惟我皇上仁育萬方孝先天下耕藉重農自九州以及邊徼莫不奉行恐後兹當萬寶告成之日慶集豐穰東西兩迤各郡髙原下隰百穀齊登為數年來所罕見又雙穗兩岐及三穗四穗者生於藉田民田自省城及大理永昌諸郡相接詳報而臨安府建水州已經收穫之禾其根復生苗吐穗結實竟得兩熟尤為從來未有八月以至霜降節中天氣晴明場功計日可畢皆我皇上敬天勤民召和錫福之所致也理合繕摺奏聞臣謹奏感召天和非朕薄德可幾實由鄂爾泰忠誠昭格之所致也同日又奏為欽承聖誨開諭微臣感激難名恭陳謝悃懇祈睿鑒事竊臣前具摺奏謝恩賜皇上硃批此奏若出於至誠所謂失之東隅收之桑榆未為晚也否則仍屬無益耳將此數摺批諭與鄂爾泰看欽此臣捧讀叩頭仰見我皇上天地父母之心諄誠剴切勸勉誡飭所以望臣者至矣臣即甘於暴棄亦何忍自外天顔自必難逃聖鑒臣惟有凛佩綸言時時存省以期克副至教於萬一耳所有數摺巳遵旨敬捧與鄂爾泰恭閲再臣前次奏摺係交齎奏銷鹽將御批之摺由兵部轉發於九月十五日到臣理合一併奏明臣謹奏覽同日又奏為瀝陳下悃仰籲聖慈垂鑒事竊臣摺奏劉業長盡心鹽務稽察周詳張允隨調劑厰務弊除課裕奉硃批恐未必如楊名時所薦之科甲中人物欽此臣捧讀之下不勝悚懼念臣賦性迂拙平日寡交凜遵敢分别出身有心異視每見科甲中頗多匪流異途中不少才俊我皇上因材器使立賢無方何嘗有分門别類之見即如近代先儒無過程朱程子不應科目朱子論科舉額然經理無能計出至拙至下若李衛於辦理鹽天聽伏乞聖慈照察臣不勝屏營戰栗之至臣謹奏覽硃批諭旨卷三
