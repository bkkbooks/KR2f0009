body:
  text: 欽定四庫全書硃批諭旨巻一百七十一硃批趙城奏摺雍正六年十月十一日湖南布政使臣趙城謹奏為奏明奉到諭旨恭謝天恩事竊本年八月二十九日臣於郵封内接書一封内開和碩怡親王大學士張廷玉字寄湖南布政使雍正六年八月初三日奉上諭各省藩臬有准其具摺奏事者亦有本人未曾奏請具摺朕遂未曾降旨者今思藩臬乃地方大員應准其各就所見具摺陳奏且即此可以觀其人之居心辦事爾等可寄信與湖南布政使趙城伊若有陳奏事件初次具摺差人交門上奏事人轉奏嗣後從何處轉奏朕再降諭旨可也欽此遵旨寄信前來臣捧讀之下感激涕零隨恭設香案望闕叩頭謝恩訖伏念臣邊徼寒微叨蒙皇上天恩畀以湖南藩司重任廻思前此疊受之殊恩更邀目今特頒之異數自顧何人仰沭高厚一至於此臣具有人心何忍不誠求報效無如才奏此後一有聞見不時據實陳奏竝懇天恩將嗣後從何處轉奏之處再降諭旨以便欽遵臣謹奏嗣後奏摺交與大學士蒋廷錫轉奏同日又奏為請定養亷銀兩解司分給以免州縣那虧事竊查湖南所屬各州縣徴收錢糧先於雍正元年前督臣楊宗仁檄飭毎地丁銀一兩許加耗銀一錢内將三分解司以充地方公用其餘七分以一分五釐給藩司竝作部餉解費六釐給臬司四釐給廵道一分給知府三釐給同知三分二釐給州縣為各衙門辦理公務以及日用薪水之需乃有不肖之員見養亷一項前督臣檄内有具摺奏明之語遂視為應有無所忌憚毎於錢糧開徴之時不顧州縣已未徴收即行牌催解或致劄要求甚至耑差下縣坐索守提更有不肖牧令乆具逢迎之心無由趨奉一見行催不復計及國帑遂將正項先動墊解以圖上司歡悅夫正供錢糧尚有完半全完之期而隨徴之項反得先行交納因而預支早解彼此相習及至上司遷離多收之項不便過問惟有那新掩舊以應接任之催積習日乆勢必釀成虧空臣請嗣後徴收加一火耗飭令州縣隨同正餉照數全解交臣衙門仍將三分留充公用州縣應得三分二釐亦按正數即給解餉人役領回其餘三分八釐存貯司庫如解交之數足以給發行令各衙門差役赴司具領仍照在任起止月日給發倘遇遷轉離任免致透支其有署事兼攝官員雖公事繁多不無需費但既有本任養亷未便又全給署任養亷應請扣存一半貯司庫統歸公項以為地方公用如此庶養亷不致冒濫而州縣亦免那虧矣如果臣言可採伏乞皇上睿鑒施行臣謹奏與督撫臣商酌行之雍正七年二月十五日湖南布政使臣趙城謹奏為敬繳硃批奏摺恭謝天恩事雍正六年十二月初五日臣家人捧回臣前奏恭謝天恩一摺請定分給養亷一摺到臣隨恭設香案望闕叩頭謝恩跪閱硃批竊查科甲出身之人往往崇私好薄公義實屬向來陋習臣荷格外聖恩不敢稍蹈陋習自棄生成之外今蒙事臣欽奉諭旨即稟明督撫正在商酌疊奉恩綸命撫臣將各府雜稅贏餘銀兩添為各官養亷又諭清查各府未經首報贏餘一併散給恩波浩蕩至於此極臣現在行查一俟查確即請督撫酌量均分至臣衙門原於加一火耗内收一分五釐坐平為養亷臣於上年二月回任至十二月封印止共收過坐平養亷銀一萬二千七百二十三兩九分除臣署内薪水修金工食紙筆及一切用度竝地方公事捐銀又臣前年父母身後安厝等費皆出借貸今償還借欠以上共用過銀一萬一千五百餘兩此外尚存羨餘以僃解餉等項之用又思聖主隆恩雜稅􅑿餘添為各官養亷臣衙門養亷既頗有餘自應裒多益寡臣今現與撫臣商酌就官職大小事件繁簡通長計算酌量均分務使普沾聖澤俟酌定後請撫臣具奏謹將奉發硃批奏摺恭繳謹奏覽凡事宜揆酌情理秉公執中為之亦不必矯亷自異朕所取者惟一是字耳雍正七年七月初二日湖南布政使臣趙城謹奏為州縣解司糧銀請令隨帶法馬以杜中途侵蝕事竊臣查通省地丁糧銀於開徴之後陸續起解赴司彈貯充餉此定例也其彈兌法馬從前奉部頒發之後所屬州縣各照製一副赴司呈較臣衙門較準轉呈撫臣衙門驗明飭發較戥稱收花户糧銀及至起解即用前發法馬彈兌起解原所以杜出輕入重之弊也今各屬解司糧銀按封彈兌輕少甚多毎百兩一秤有少至四五錢及七八錢不等臣思州縣既各有較凖法馬起解之時自必照依彈兌即不無偶爾參差何至大有輕少復加查訪蓋緣州縣起解錢糧必差家丁同糧書管解彼此串通行至中途私啓印封任意侵蝕以致到司彈兌即有輕少在藩司以為州縣解銀輕少惟飭按數補解在州縣又以為上司秤頭重大不敢明言上下岐視若輩遂得中飽臣謹就管見所及詳明督撫請令州縣起解錢糧將原呈驗較凖領去法馬隨餉解司先將法馬較兌隨彈錢糧如無輕少按照彈收倘有輕少再用州縣法馬彈兌實屬輕少即係中途侵蝕立行嚴究追補竝將解役懲治如此則州縣起解藩司彈收皆不容不秉公而姦胥串同中途侵蝕之弊可以永杜臣具詳督撫已奉批准檄飭各屬遵照現今行之頗有成效臣思藩庫收貯錢糧各省事同一例胥役人等中途舞弊亦不能保其必無臣芻蕘愚見如有可採伏乞皇上敕下部議可否通行直省似亦杜弊之一端也臣謹奏自任内事尚未知能行與否何暇念及他省亦可謂舍已之田而耘人之田矣硃批諭㫖巻一百七十一
