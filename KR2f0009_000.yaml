body:
  text: 上諭朕向在藩邸未諳政事不識一人毫無閲歴聞見及受皇考聖祖仁皇帝付託之重臨御寰區惟日孜孜勤求治理以為敷政寧人之本然耳目不廣見聞未周何以宣達下情洞悉庶務而訓導未切誥誡未詳又何以使臣工共知朕心相率而遵道遵路以繼治平之政績是以内外臣工皆令其具摺奏事以廣諮諏其中確有可採者即見諸施行而介在兩可者則或勅交部議或密諭督撫酌奪奏聞其有應行指示開導及戒勉懲儆者則因彼之敷陳發朕之訓諭每摺或手批數十言或數百言且有多至千言者皆出一己之見未敢言其必當然而教人為善戒人為非示以安民察吏之方訓以正德厚生之要曉以福善禍淫之理勉以存誠去偽之功往復周詳連篇累牘其大指不過如是亦既殫竭苦心矣至其中有兩人奏事而朕之批示迥乎不同者此則因人而施量材而教嚴急者導之以寛和優柔者濟之以剛毅過者裁之不及者引之並非逞一時之胸臆信筆直書前後矛盾讀者當體朕之苦心也此等奏摺皆本人封達朕前朕親自覽閱親筆批發一字一句皆出朕之心思無一件假手於人亦無一人贊襄於側非如外廷宣布之諭㫖尚有閣臣等之撰擬也雍正六年以前晝則延接廷臣引見官弁傍晚觀覽本章燈下批閲奏摺每至二鼓三鼓不覺稍倦寔六載如一日此左右近侍及内直大臣所備知者近年以來天下庶政漸次就理下情稍覺洞達臣工之奏摺較前減少而朕躬精力亦不如前批答之事始從簡便此實情實事可舉以告天下者今檢内外諸臣繳囘硃批之摺不下萬餘件因思自古帝王治天下之道以勵精為先以怠荒為戒朕非敢以功德企及古先哲王而惟此勤勉之心自信可無忝於古訓實未負我皇考付託之深恩也又念此等批示之語實出於朕之苦心或可為人心風俗之一助但本人承㫖之時不敢宣露於外他人無由知之今將外任之大臣官員奏摺經朕手批酌量可以頒發者檢出付之剞劂計算實不過十分之二三俾天下臣民展讀咸知朕圖治之念誨人之誠庶幾將此不敢暇逸之心仰報我皇考於萬一耳或人人觀此而感動奮發各自砥礪共為忠良上下䝉福朕心愉快更當何如特諭雍正十年三月初一日御筆欽定四庫全書史部六世宗憲皇帝硃批諭㫖詔令奏議類詔令之屬提要臣等謹案世宗憲皇帝硃批諭㫖三百六十卷雍正十年奉勅校刋乾隆三年告成冠以世宗憲皇帝諭㫖殿以皇上御製後序所載臣工奏摺凡二百二十三人多者以一人分數冊少者以數人合一冊所奉硃批一一恭録或在簡端或在句旁或在餘幅少者數十言多者每至數百言其肯綮之處經御筆圏出抹出者尤為詳悉無不循名責實斥偽求真或即委而知源或見㣲而識著玉衡之正不可欺以重輕金鏡之明不可炫以妍醜推求一事而旁燭萬端端拱九天而坐照四海凡堯儆舜咨具寓于羲畫禹書之中天下臣民循環跪誦葢皆得而仰喻焉伏考典謨所載都俞吁咈大抵面陳秦漢以後章奏既興載于史者不過有省有不省有行有不行耳所謂鳳尾諾不過一字未有連篇累牘一一手勅報之者唐宋以後多出代言故諸臣文集或以批答為内制之一體如宋太祖於截木之章宋真宗於鄰壌之字皆偶然涉筆不過數言亦未有句櫛字比標注甲乙無㡬㣲之不到者至于集彼書嚢積為巨帙多至三四百卷而敷奏報聞無煩訓示者不與焉内外章牘由内閣奏進者亦不與焉尤書契以來所未甞聞見者矣臣等校錄之餘知我皇上勵精無逸登七袠而彌勤者家法淵源有所自來也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
