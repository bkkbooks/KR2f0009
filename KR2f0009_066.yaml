body:
  text: 欽定四庫全書硃批諭㫖卷六十六硃批董永芠奏摺江南安徽布政使臣董永芠謹奏為藩庫交盤已竣僃陳始末仰祈睿鑒事竊臣一介庸愚備員閩臬䝉皇上天恩特㫖調見獲覲天顔特授臣安徽布政使戴德如天措躬無地於三月十八日銜命出京至四月十六日抵安徽布政司任隨即清查庫項緣前升司李馥及署司吳應鳳各任內因地方公事動用庫銀十餘萬兩皆以民缺并遞年俸工抵補竊思民缺固可催追俸工亦皆國帑而現在庫項不便虛懸臣即欲據實揭報因念事屬因公且伊等趕限彌補項有歸著是以不敢輕舉隨竭力催趕兹於兩箇月交盤限內已逐一歸補清楚現今皆實貯在庫並無懸缺除將接受交盤事宜照例詳報撫臣保結咨部外合將庫項己清緣由據實奏聞謹奏覽奏知道了極宜勉力做好官江南安徽布政使臣董永芠謹奏為叩謝天恩事本年十一月二十四日接到浙閩督臣准部咨文為恭報官兵克復臺灣事奉㫖在事官員現行議敘之外著槩行各加一等欽此又粘單內開在省辦理軍務按察使董永芠今升安徽布政使准其加一級等因奉此聞命自天感激無地當即恭設香案望闕叩頭謝恩訖竊念臣世受國恩時因職守所羈不能戮力行間奮身殺賊以辦理之微勞得邀加級之曠典聖德如天有加無已除將感激微忱具詳撫臣代題叩謝天恩外臣犬馬下情不能自巳謹再繕摺奏謝聖主洪恩再鳳陽府屬夀泗等州縣今年秋成歉薄雖不成災而窮民當此隆冬恐致乏食督撫臣各捐銀二千兩臣亦捐銀二千兩買米煮賑仰副聖主愛養黎民之至意合併奏聞謹奏所奏已悉聞汝聲名頗好勉之毋怠江南安徽布政使臣董永芠謹奏為叩謝天恩事雍正二年九月二十六日臣接兩江督臣查弼納牌准吏部咨奉㫖董永芠自擢用安徽布政使以來雖無甚狼藉聲名然大不如在福建按察使任時看其才具不勝繁劇之任博爾多聲名甚好著二人調省用等因欽此欽遵臣隨恭設香案望闕叩頭謝恩訖伏念臣駑駘下質至愚至陋在福建按察使任十有二年毫無報效恭逢聖主登極之初天恩召見特升安徽布政使自任事以來欽遵訓㫖勉做好官勿改初志朝夕兢兢業業安敢隕越自取罪譴惟是安徽地方為財賦繁劇之區臣雖殫心竭力而才具庸劣不能勝任兹䝉聖恩浩蕩不即罷斥特命山東布政使博爾多與臣二人調省用是聖主𢎞施宥過之仁特豫自新之路生成之德實同天地臣惟有從此益加勉勵竭盡駑駘以仰報髙厚之恩於萬一耳臣現在俟博爾多到江寧之日即行交代外所有犬馬感激私衷理合具摺奏謝天恩謹奏爾到新任時若仍然似此因循自便巧猾居心而不奮勉報效臨期追悔莫及也山東按察使臣董永芠謹奏為感激天恩再申謝悃事竊臣一介庸愚幸登仕籍恭遇聖主御極之初即奉恩㫖召見特放安徽布政使江南財賦重地錢糧頭緒紛繁臣才識短淺不能勝任已在聖明洞鑒之中荷䝉天地包容不賜罷斥仍調山東布政使竊念江南與山東事務雖有繁簡其為錢糧則一正在惴惴無以自安旋奉補授按察使之命且仍帶布政司銜臣何人斯得此異數聞命之下感激涕零雖捐糜頂踵不能仰報髙厚矜全之恩於萬一從此惟有益加奮勉竭盡犬馬之力以期無負聖主簡用天心而已臣經手安徽一切錢糧新任布政使博爾多於封印日到任限內交盤清楚出具印結隨於三月十八日起程四月十二日抵山東按察使任除具詳撫臣代題叩謝天恩外所有臣感激下情合再繕摺奏謝謹奏勉力供職可也再若不妥不但矜全之恩不可屢邀行且禍不旋踵矣浙江按察使臣董永芠謹奏為恭聆聖訓叩謝天恩事雍正五年正月十九日浙江觀風整俗使臣王國棟到任口傳皇上諭㫖臣隨望闕叩頭祗領訖伏念臣至愚至陋且賦性懦弱䝉聖主拔置藩臬大僚全無絲毫報效不惟不加譴責又特調浙江按察使計到任以來已經一年才智短淺不能整頓雖浙江大省人心刁險風俗偷薄久在皇上聖鑒之中然臣柔懦無才不能勝任時滋悚懼乃䝉優㫖頻頒臣自顧何人邀兹寵遇惟有感激涕零欽遵聖訓黽勉奮勵不避嫌怨不畏勢力不狥一毫情面以圖報稱而已為此具摺叩謝天恩謹奏據奏矢志圖報須要言與行符也浙江按察使臣董永芠謹奏為恭䝉賜給養亷叩謝天恩事雍正五年七月初四日准布政司知會為遵㫖覆奏事內開前經巡撫臣李衛同布政使臣許容以觀風整俗使並無養亷按察使鹽規節禮俱裁亦無火耗議請各給銀五千兩後因公項不敷支發今酌議減去銀一千兩每年實支銀四千兩自奉㫖之日起支等因到臣欽此謹恭設香案望闕叩頭謝恩外竊惟臣自到任以來將及兩載並無寸長報效之處即不收節禮裁革陋規是臣職所當然何敢希冀養亷乃䝉聖主殊恩允給臣銀四千兩儘足臣一年費用從此臣舉家衣食從容雖捐糜頂踵豈能仰報萬一臣惟有益矢氷兢竭盡駑駘黽勉供職已耳為此繕摺叩謝天恩謹奏亦不須捐糜頂踵方為圖報但不柔善瞻狥取悅紳襟以沽名譽及將命盜凶犯屈法開脫以積陰功克盡臬司責任不玷厥職足矣浙江按察使臣董永芠謹奏為恭謝天恩事竊臣前於安徽藩司任內不能稽察屬員剔除弊竇以致潁州霍邱等屬於恩賞老婦案內揑報冒銷溺職之罪自知難逭部議降調䝉皇上格外施恩從寬降一級留任聞命自天感深涕泣謹恭設香案望闕叩頭謝恩臣至愚至蠢叨沐殊典惟有益加兢惕勉副職守并生生世世永圖報效而已除另詳撫臣代題恭謝聖恩外臣受恩深重情難自已再行繕摺奏謝謹奏朕恩如是若仍不能改易從前巧宦積習則不止於降調而巳也務須實力加勉一番毫無瞻狥一切秉公方不辱朕之委用也勉之慎之浙江按察使臣董永芠謹奏為恭謝天恩事雍正六年三月二十三日奉浙江督臣李衛行准部咨奉㫖董永芠久任臬司刑名素所諳練著調為江蘇按察使欽此欽遵臣隨恭設香案望闕叩頭謝恩竊臣至愚極賤䝉皇上天恩畀以刑名重任歷福建山東浙江三省臬司十有五年雖時刻兢惕不敢枉縱以期仰副我皇上懲暴安民至意而才識短淺照顧不及實無裨於皇上明刑弼教之治今又䝉特恩以臣久任臬司諳練刑名調任江蘇按察使臣聞命自天感激無地惟有勉竭駑駘持平三尺不辭勞怨不狥情面嚴察姦惡以安良善以圖仰報聖恩於萬一耳為此繕摺恭謝天恩謹奏刑名之要惟以平允速結不致拖纍無辜為貴若將盜犯開除殺人者不令抵償而自以為積功纍行天下寧有是理柔善沽譽四字切戒毋犯從古未聞以私廢公之善人也況臬司讞獄輕重為闔省人心畏玩風俗淳漓所關於此若見不透少有過偏則為害甚大勉之慎之汝經歷過督撫數輩須當效法李衛之居心行事不然終遺悔憾朕非崇尚嚴刻之主因於斯理所見甚明執法惟一平字治天下惟一公字雖政術多端要不出此內外臣工若不以此二字協贊於朕非朕臣也豈肯與之共理庶務耶可詳悉思維深自警省勉之勉之硃批諭㫖卷六十六
