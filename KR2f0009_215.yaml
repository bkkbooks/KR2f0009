body:
  text: 欽定四庫全書硃批諭㫖巻二百十五之一硃批鄂彌達奏摺雍正六年九月十一日貴州布政使臣鄂彌達謹奏為奏聞事竊照普天疆土自國朝開闢以來休養生息民間户口日繁宜乎無不闢之土無不耕之地乃查黔省奏報册内現徴錢糧巳熟田土及陸續新墾自首田土共一百四十七萬九千五百畝零未墾田土八十七萬五千有竒以全省之繁庶豈未闢田土尚有如此之多其間或係小民無知欺隠或為豪棍從中阻撓或為官吏徇私抑遏以致報墾寥寥均未可定臣自到任以來清查軍田料理開墾出示曉諭至再至三不意一年之限已滿據各屬開報者不及荒蕪十分之一臣細加思維與其懲治於将來不若清理於目前統計州縣田畝曠闕多者隠匿自多曠闕少者隠匿自少今黔省各處曠闕纍纍自應将最多者先為清丈臣今不揣愚昧欲将侵隠最多之鎮逺縣田地俟秋成後委員查丈果係實在曠闕者招佃給本開墾如已舉首及已報墾而為官吏侵蝕分肥者即為叅革究擬如係豪强地棍侵占者亦即嚴拏治罪庶各屬官民聞風畏惕不待逐處清丈必然首報清楚将見黔無曠土賦額漸增其於國計民生均有裨益矣縁事關清丈合先具摺奏聞伏乞皇上睿鑒謹奏清丈之說不可輕舉當與督撫詳悉斟酌此奏甚屬孟浪爾原不諳外任豈得如是率意妄為凡百須向歴練有識見人再四熟籌然後定議方無謬誤盖地方一舉一動關係民生休戚非旗下事務部院案件之可比也同日又奏為奏聞事竊查黔省有官荘學租一項額徴米三千九百三十六石九斗零内除支給舖兵米一千九百三十九石三斗外其餘米石歴屆奏冊俱作賑濟寒生窮民報銷其實止給省城寒生窮民米二百餘石鳴賛生員九十六名餘剩之米悉為各衙門官役食用相沿為例迨至雍正三年經署撫臣石禮哈奏明變價歸公分給各官養亷前司祖秉圭以職官不便分沾貧民之食又因奏銷冊内未除仍以寒生窮民姓名造報是以定議将前項餘米分給廵撫司道各衙門役食并鳴賛生員以及省城貧民寒生暨各府州縣貧民寒生食用在案臣到任以來查此項米石雖係歸公但事關奏明之項不得不細為籌畫除雍正五年之額米巳經前司議定通行飭遵似難更改外其六年之米除給舖夫口糧之外餘米似宜斟酌舉行查生員之内貧富不等而品行亦有髙下若據呈詞即行批給恐有無耻之軰冒認單寒無從查其虛實似應行令該教官查明取結詳送學院核實移咨院司轉飭地方官照例撥給至孤貧一項原應計口受食豈可定數派撥似應通行各屬確查如建有養濟院房屋在内居住之孤貧按照人數亦依極貧成例支給其無養濟院之處貧民乞食徃來無定毋庸撥給至鳴賛一項有迎接詔㫖宣講聖諭之責應請照舊准其支食其各衙門人役自有工食與貧民不同未便支食官荘米石查各屬罪犯解省覆審俱是沿途求乞殊堪憫惻似應将此項米石每名每日給與八合将所給口糧數目令各屬按季册報稽核以上幾項核實支給之外每嵗約餘米一千餘石應令各屬變價解司於秋成後就近買米存貯省倉如遇青黄不接之際零星平糶以濟民食仍於秋後買補貯倉如此行之年乆不特積貯漸増抑且民食有頼於國計民生均有裨益也縁此項米石現在開徴又據各役紛紛具呈請領臣不便支給合先具摺奏聞伏乞皇上睿鑒謹奏此事應呈詳督撫酌定何得如是自立主見耶将朕所批二摺硃諭與鄂爾泰沈廷正看雍正七年正月十一日貴州布政使臣鄂彌達謹奏為恭謝天恩事竊臣庸陋之質荷䝉隆恩特授黔藩自到任以來凡有關係國計民生靡不朝夕思維殫竭智慮以冀少有裨益遂将摘丈鎮逺縣欺隠田地與官荘學租米石定議撥支二事冒昧繕摺奏聞奉有硃批臣跪讀之下感激悚懼愧悔無地遵即齎送督撫二臣閱看其摺内事宜應聽督撫㑹商審擇行止覆奏外臣自顧何人得沐聖主諄切教訓俾孟浪不諳之處翻然悔悟知所遵循嗣後一切辦理公務自當悉心與歴練有識見人慎重商酌不敢妄生意見以仰副皇上諄諄教誨之至意所有感激㣲忱理合繕摺恭謝并繳硃批原摺為此謹奏覽奏知道了秉公敬慎勉力為之同日又奏為據實陳明仰祈睿鑒事雍正六年十二月初九日撫臣沈廷正傳臣入署将其所奏臣家人蕭大在鎮逺地方欲買使女被顔致明騙詐銀兩一摺奉有硃批令臣開看臣伏讀皇上硃批此事必須兩罰方為平允若回護藩司家人而偏究顔致明斷乎不可将此諭亦令鄂彌達看欽此臣跪讀之下感激涕零惶恐無地隨嚴訊家人蕭大據供小的跟隨赴任時五月二十四日因小的中暑在常徳任宗陽客店養病聽得那邊買使女賤曾有店家之弟來說原任江西裴大㕔的兒子有箇使女要賣小的意欲看定再回請示原呌他領來看過因不好就罷了到七月初間病好起身於二十三日到鎮逺府在龔家歇店住了一夜黑早就走並不認得姓顔的亦無銀子被人騙去等語臣恐家人或有隠匿不吐實情亦未可定遂将蕭大移送臬司衙門嚴加訊究而撫臣不令臬司究審蕭大只教臣照摺内一一應實臣以事屬瑣細若過於辯白殊失朝廷大吏之體所以寧令家人認罪不敢置辯隨将家人在常徳情由認作鎮逺舉動事本未成不曾被騙等語錄一供單送撫臣在案伏念臣受天聽今臬司嚴審致明並不認識蕭大亦無買人騙銀之事請提證佐質訊撫臣云此事奉㫖兩罰可不必提證佐惟令臣照前稟寫供送臬司具詳即為回奏臣若過為辯白反屬偏護家人如不将實情奏明又蹈欺罔之罪今雖照撫臣之意而行其中實在原委不得不直陳聖主之前此後惟有日夜兢惕以仰副皇上曲賜矜全之洪慈為此謹奏斯事沈廷正所奏甚悉巳有㫖矣雍正七年四月十五日貴州布政使臣鄂彌達謹奏為奏聞事竊查黔省地方山多田少每嵗民苖秋成之外兼賴春花資生所有豆麥雜糧均藉雨水調勻以期豐收兹屆春收之際通查各屬雨水及時春花約有十分收成臣親徃郊外細加察勘據農人咸稱所種豆麥雜糧菜蔬顆粒根株較之上年加倍肥大或已經秀實或現在收穫皆有十分至秧田雨水霑足稻苖暢茂現在始行插秧将來秋成可期大有除俟各屬收成分數報齊之日彚册詳送督撫二臣奏報外所有春花豐收情形今因恭繳硃批之便具摺奏聞謹奏據奏雜糧收穫稻苖暢茂欣恱覽之同日又奏為欽奉聖訓事竊臣前因陳明家人蕭大一事繕摺具奏奉有硃批臣跪讀之下感憤交集念佛喜馬哈博爾多等身受皇上隆恩既不能克已急公恪供職守以圖仰報萬一乃復利欲薰心貪贓枉法下愚無耻莫此為甚雖置重典亦不足以蔽其辜今䝉皇上天恩恐臣不自省惕仍蹈錮習諄諄訓誡不啻慈父之教誨赤子身非草木應知感奮況臣家本寒㣲向從節儉所有賞給養亷儘足用度何敢稍存不肖之念如資性利鈍則限於天分辨别物理則限於學問至於操守實能一心主之臣賦性既屬愚鈍辦事又多未諳若復不能潔巳奉公以蹈貪贓枉法之轍乞皇上立置重典以為負恩忝職之戒謹將奉到硃批原摺另封恭繳謹奏非言之難而行之為難也朕前諭甚明今於三人中止將佛喜所奏一二事發來爾看令朕覽此數行空文遂深信其心行可乎雍正七年八月十二日貴州布政使臣鄂彌達謹奏為恭謝天恩事竊臣承准户部照㑹議覆臣具奏京局所需鉛觔動支黔庫捐納銀兩買運至漢口交商人轉運可節繁費一摺部議以事屬難行不便更張具題奉㫖依議户部所奏甚為明當鄂彌達現為貴州布政使於地方事務必將原委利弊確查明白方可陳奏豈風聞言事者可比今乃以偏私之見遽欲更改成例冒昧瀆陳甚屬不合著嚴飭行欽此照㑹到黔欽遵在案臣跪讀之下不勝惶恐愧悔交集實縁臣初任外吏見事多疎因思黔省産鉛甚多商人買運費繁欲節省錢糧起見未及詳查原委一時冒昧瀆陳䝉皇上天恩不即交部重處諭令飭行聞命自天感激無地臣嗣後凡於一切事件惟有虚衷詳慎不敢偏執已見以仰副聖主訓誡之洪恩所有感激㣲忱理合具摺恭謝伏乞皇上睿鑒謹奏常時返省確知已係庸平材質則將日有進益稍若自以為是一渉盈滿驕矜豈止謬誤一事二事而已哉同日又奏為恭繳硃批原摺事竊臣具奏欽奉聖訓事一摺奉到硃批非言之難而行之為難也朕前諭甚明今於三人中止將佛喜所奏一二事發來爾看令朕覽此數行空文遂信其心行可乎欽此伏念上天不可欺主恩不可負神明鑒察形影相隨欺㒺狡詐未有不敗露者臣雖至愚亦知自省惟當恪遵訓㫖即以佛喜之言行相違為終身炯戒時時警惕竭盡駑駘斷不敢飾空文而忘實行以期仰報聖恩於萬一合將奉到硃批原摺二扣并佛喜奏摺二扣另封恭繳為此謹奏果能存誠務實終身堅守不移上天必不汝負也雍正八年正月二十四日貴州布政使臣鄂彌達謹奏為社倉請専委任以明勸懲以收實效事竊查建立社倉勸民捐榖以備荒歉令官吏不得過問聽民自便雖有不肖官吏書役欲上下其手實無從而施其伎倆法至善也第百姓愚昧恐奉行日久視為泛常秋成所捐之榖青黄不接之時仍舊自用如遇稽查虚揑甘結掩飾一時司倉者向來止取家道殷實之人令其掌管名雖禁其出入不公並未立有考成人遂不知懲勸且司其事者俱係鄉閭之人任其虚揑漫無稽查臣再四籌畫若主之於官難杜胥役擾累之弊若聽之於民又多虚揑惟有捐積之事聽之於民而稽查勸懲之方委人專任方有實濟請於每州縣分東西南北四鄉鄉擇適中之地建立倉社十户立一甲長五十户立一社長司倉者令地方官於本地候補候選及考職州同州判以上人員内秉公選擇品行端方者四員每倉著一員總理稽查勸懲勸諭捐積將現在之榖併續捐之榖登簿申報地方官轉報上司存案青黄不接之際願借者由甲長上之社長社長率本人向司倉之人交票司倉者驗實登簿發給俟秋成加息完倉如逢小歉照例免息年底令地方官上倉稽查取結加印申報上司如有虧空奉行不力之處即行揭報題㕘倘地方官不行揭報經上司查出將地方官照扶同徇隠例分賠如三年内勸捐積多收放公慎許地方官申詳督撫核實具題候選考職者即行録用應選應補者加陞一級以示奨勸如此則委任專而積貯實似於社倉不無裨益是否有當伏乞皇上睿鑒謹奏如此則社倉之良法壊盡矣據奏年底令地方官稽查出結申報上司立定考成是所謂官倉何名民社耶若照所奏必遇百姓真實愛戴如父母之賢有司方可否則徒增無限弊端於事何濟之有所見甚屬悖謬雍正八年七月初七日貴州布政使今陞廣東廵撫臣鄂彌達謹奏為敬陳管見仰祈睿鑒事竊照古州一帶地方向為生苖盤踞未通聲教今䝉皇上徳威逺播指示方畧督臣鄂爾泰調度得宜俱巳嚮化其安營設汛築城開河將已就緒惟是苖性反覆不常一切善後事宜實屬要務不得不急為籌畫者也查古州清水江等處新闢苖地甚是遼濶苖獞户口不下數十餘萬今古州清江丹江都勻黃施來牛各鎮協營兵丁合計舊撥新設共九千九百名尚恐地廣苖衆不足以資彈壓倘遇有事除去防設塘汛守城再分布進剿防遏黨援之遊兵則恐現在之數不敷分用臣之愚見請於古州都勻丹江清江四處各添兵一千名以資調遣俟三五年後苖猓感化已深帖然無事然後再議酌減至添兵後兵糧更屬急需查通省新舊兵丁共二萬九千六百四十三名每年需糧一十萬六千七百一十四石八斗額徴秋糧共一十一萬六千八百一十石有竒内附近各營可以設法輓運支領本色者只有六萬三千七百餘石僅足半年之糧其餘離營窵逺難以輓運若盡行折價則新設苖疆糴買維艱如令百姓每年逺運軍營不特有妨農業恐致滋擾若令附近州縣改銀徴米難免周章且統計每年額徴之數則新舊兵丁與現請添設四千名之兵糧尚不敷支給臣再四思維查湖南乃産米之處而辰州府所屬之沅州與黔屬玉屏縣聨界附近軍營至貴州省城僅止八百一十五里至湖南省城則一千五百八十里較其逺近相去一半況今清江一帶河道開通自沅抵黔水路徃來尤為便利仰懇聖恩准將沅州割歸黔省管轄所有該州每嵗額徴秋糧用船直運清江都勻丹江等協營存貯就近支給至於都江河道現在開通舟楫直達粤西柳慶二府查二府屬近水州縣歴年支放餘剰改貯之榖甚多若令古州按季遣員赴粤西近水州縣支領接濟不特輓運省力而在黔無馱載之苦在粤免紅朽之患殊為一舉兩得又查古州八萬苖地出産樹木棉花白蠟等項向縁河道不通生苖阻截以故商販稀少且黔地素不産鹽日用皆藉川淮鹽斤價值甚貴爰是苖民多有食淡兼之布帛鮮有今河路疏鑿開闢已廣正可乗時利民如䝉俞允將沅州歸黔則運米之回空船隻即載苖地之出産貨物帶徃湖廣江浙各處發賣賣完之日即載淮鹽紬布赴黔販賣如此徃來運售交相濟用不數年間苖人與客商交易知獲厚利則謀生之苖猓漸化為守法之良民地方官員再加以隨時撫綏則瘠薄之邊方將變為富饒之樂土矣再查四川重慶府所轄之酉陽司并所屬之邑梅平茶石耶地把等土司離府十八站離黔屬之思南府僅止五站地界相連因離川省窵逺鞭長莫及以致該土司等匿犯藏姦横行不法且其地方遼濶土脈肥沃每有銅仁等府貧窘百姓在彼開墾生理完納土司租賦稍不遂意百般凌虐考之黔志思南府屬之甫南圖地方久被該土司占去似此侵課害民亟宜鈐束清理應請將酉陽等司就近割歸黔省管轄如有應墾地土即給照附近窮民令其前徃照雲貴開墾事例自行開墾并該土司田土一併查明照例納賦以資糧餉如此非特該土司等得以就近約束不敢滋事而於國計民生均有裨益矣臣確訪苖情審度形勢故敢直陳管見是否有當伏乞皇上睿鑒施行謹奏鄂爾泰悉心詳議奏聞候朕裁奪雍正八年九月初六日新任廣東廵撫臣鄂彌達謹奏為恭報㣲臣起程日期仰祈睿鑒事竊臣荷䝉聖恩補授廣東廵撫接准部文已經繕摺奏謝天恩恭請陛見候㫖遵行嗣縁調任布政使張允隨在滇交代未能即赴新任奉督臣鄂爾泰委令糧驛道署理藩篆臣即於雍正八年七月二十七日將布政司印信委員齎送糧驛道王廷琬查收署理并將臣任内經手一切錢糧逐一交代明白聽候查明出結詳報外查廣東乃沿海要地關係重大聞命以來日夜恐懼因思督臣鄂爾泰公忠為國識見深逺又聞伊抱病臣向在黔藩任内凡大小事務無不承督臣剴切指示今署司查核交代册籍尚需時日臣隨星赴滇省請商海疆一切要務自臣到滇督臣病已全愈諸凡事宜承督臣諄諄開導明白講論受益實多臣即回黔於九月初六日起程赴粤東新任訖再臣自黔起程至滇沿路禾稻暢茂碩大堅實問諸民苖僉云數十年未有如此豐盛臣目睹豐亨景象不勝踴躍歡忭之至合併奏聞謹奏覽奏知道了當夙夜省察竭力黽勉照鄂爾泰之居心以居心效鄂爾泰之行事以行事則將來必不虚負朕期望委任之恩也勉之勉之雍正九年正月十二日廣東廵撫臣鄂彌達謹奏為奏聞事竊臣荷䝉聖恩廵撫粤東已將入境到任日期具疏題報在案臣仰體聖主軫念民生至意於湖南廣西經由地方訪問湖南今嵗春間覺雨水過多而秋成倍於徃年廣西亦屬豐收米價甚平臣抵任後行查粤東秋收據布政使彚報各屬收成八九十分不等米價每石四錢五六分起至六錢七分不等年登大有萬民熙皥臣睹此昇平景象不勝懽忭之至惟勤宣聖天子保赤之深仁使海疆黎庶返醇歸樸共樂聖世以仰副皇上愛養元元之聖心臣謹繕摺奏聞謹奏覽奏俱悉爾初抵任即值嵗熟米賤之時原屬可慶然當倍加寅畏不可少有肆志雍正九年二月初十日廣東廵撫臣鄂彌達謹奏為敬陳粤省情形仰祈睿鑒事竊查粤東山海交錯素多盗匪或嘯聚山谷或勾連蛋艇人少則暮夜偷竊人多則白晝刦搶甚至百十成羣私挖山礦一經官弁查拏輙行拒捕致傷兵役其有嗜利惡徒争攘私礦竟成仇敵命盗多由此起從前各官因循故習凡遇案件半多諱匿半由外結因而法令廢弛風俗日壊種種積習難以枚舉臣於抵任後一靣與文武諸臣和衷辦理嚴飭地方有司協力整頓每於親審案件内核其情罪可惡者即痛加懲處事事執法究擬近見若軰稍有畏懼又查廣東地方土豪惡棍在在皆有若不將尤甚者重懲儆衆餘惡仍然玩法而罹重罪者反多今訪有潮陽縣惡棍蘓阿武東安縣惡棍嚴選乳源縣惡棍葉聨芳并其子葉清誠恵來縣惡棍黄髙飛家藏軍器窩匿盗賊欺壓良懦動輒殺人姦淫詐偽無惡不作葉聨芳黄髙飛現今拏獲發審其蘓阿武嚴選二犯現在宻拏但弋獲到案若待提齊受害質證則由縣府司到臣輾轉審解未免躭延嵗月況伊等積惡數十年黨羽數百人受累者不啻千百家若輾轉質解受害之民拖累甚衆且恐疎脫臣愚以為此等豪棍人人切齒一經審明即應提至市曹杖斃示衆庶不法之徒聞風歛迹即受害者之寃抑亦得早伸矣再臣思凡事必當探本窮源源清則流自潔粤東無産無業之民甚多查髙雷亷等府地廣人稀必須設法調劑使其衣食有藉方望風俗還醇臣現在飭查實在荒地水利並保甲練總等項俟查明確實將如何料理之處悉心妥議另奏外所有地方情形合先具摺奏聞伏乞皇上睿鑒批示遵行謹奏訪拏豪惡最尤者懲一警百固屬善舉但一經審明即提至市曹杖斃示衆之論當極加詳慎恐該有司未必盡屬公明其中倘有錯誤或致寃抑所關豈淺鮮哉雍正九年三月二十二日廣東廵撫臣鄂彌達謹奏為請定保甲練總功過以期盗息民安事竊照弭盗之法保甲最善臣到任後飭令各屬印官親身編點有地方遼濶者即於命徃試用人員遴委辦理漸將告竣然保甲既清而村長保正練總三項尤為保甲之要查從前村長惟論年齒保正則按年輪當練總則閒漢充數迨後地方有司凡遇勾攝人犯來往公務以及護送均於保正練總是累遂視為苦役各皆告退即有存名亦皆無頼包當日求有事而巳臣查粤屬各鄉有大姓小姓之分大姓則户口數千餘丁小姓乃雜姓附居遇事惟大姓是聽今擬以大姓户内擇言行公正之貢監立為鄉長令其稽查本家以及附居雜姓隨時勸令務本力農不得遊手好閒倘有違犯許即禀明地方官就近查究擬將役滿考職在籍候選之吏員遴當保正使之盤詰匪類擿伏指姦倘有滋事許地方官不時申究再就於武生鄉勇中擇有力而嫺武藝者以充練總無事則廵邏防範有事則協力救援倘有偷安多事許保正就近稟究若不立以功過予以勸懲恐任事不力擬於三年之内一鄉之中地方寧謐無出境為非者鄉長貢生咨部以敎職即選監生已考職者即以應選之職銜即用其未考職者給以八品頂帶以示鼓勵保正查其考職年分咨請先用練總補伍食糧遇有外委把總缺出選擇挨補如三年之内有藏姦納匪犯案一次者鄉長保正練總各行記過至有三犯鄉長革去貢監保正革去職銜練總責革一切徃來公務永禁不得濫役如地方官因循庇護縱姦殃民查確糾叅庶責有攸歸法無寛縱而盗風或得以少息矣為此具摺陳奏伏乞皇上睿鑒施行謹奏此奏甚不合宜其乖謬處曷勝批諭雍正九年七月十五日廣東廵撫臣鄂彌達謹奏為奏聞事竊查硫磺一項乃配造火藥所必需前據洋行商人陳崇義赴布政司呈報大西洋部多牙國夷商榮貽觀來廣東嶴門生理住家發夾板船徃吕宋國貿易順便帶買硫磺約八百擔装回嶴門今知例禁向商人求議每擔價銀四兩伍錢情願易換水硍等情經司議詳准其照價易換前來臣查硫磺係違禁之物不便聽夷商自行變賣再查貴州運粤水硍原係變售抵帑之項今易磺變價事出兩便且本省旗標各營現需製造常存火藥所需磺斤已經督臣郝玉麟具題委員在於仁化地方設爐煎熬今既有此項磺斤自應留用將仁化縣設爐煎熬之處停止如此一轉移間不特無採辦之煩亦免匪類潜藏致生事端之慮臣即批司准行在案又恐該夷商將磺斤販賣外國隨與布政司商酌即面詢該夷商吕宋每年所出磺斤之多寡據稱約畧不下有數萬餘斤當即諭令將所出硫磺切勿賣與外國年年運至粤省内地通知洋商具稟藩司動支司庫公項銀兩收買或爾等需用他物照爾等所用給發該夷商歡忻踴躍而去嗣後每年所買磺斤除粤東應用外餘磺存貯行内知㑹隣近各省令委員赴粤採買將價歸還原項以免販賣外國之弊事關夷商帶運違禁之物理合具摺奏聞伏乞皇上睿鑒謹奏如此權宜通變甚是同日又奏為奏聞事竊查粤東今嵗自春徂夏雨暘時若早稻豐收晚禾播種山區海甸咸歌大有詎五六月間霉雨連朝潦水陡漲據肇屬之四㑹縣報稱該縣屬内大小圍基皆屬穏固惟大興一圍係頂溜之處舊有石竇一座於六月初三日潦水驟至漫溢圍頂衝動竇石缷開竇傍圍基近圍田畝魚塘被水浸溢等情臣聞報即飛飭肇羅道張渠支領司庫公項銀兩購備木石赴大興圍相度情形星夜搶修一面委員協同地方官查勘撫恤又據雷屬之遂溪縣報稱五月十三日大雨晝夜縣屬低窪田禾間被浸溢民房亦有傾倒又據廣屬之增城縣報稱六月十二三等日大雨至十四日山水漲發當水房屋多有傾倒低窪處所田禾被淹又據恵屬之長寕縣報稱六月十三日風雨徹夜溪水陡發城外當山水衝溜處草房倒塌者多人口俱皆安全各等因具報前來臣俱委員給銀令其齎徃被水等處㑹同地方官分頭查勘如有田禾浸淹者飭令設法疏濬無力播種者借給榖種民房衝倒者查明無力窮民酌給修葺完好毋致失所現在據報水已退消民皆安業恐厪聖懐合將縁由繕摺奏聞謹奏皆縁平日不行預備臨時又不慎防以致如此亟當勘明已衝者力督搶修被淹者加意撫䘏可也雍正九年八月二十四日廣東廵撫臣鄂彌達謹奏為奏聞事竊惟粤東風俗澆漓向多貪詐近來仰賴皇上徳化漸摩淪肌浹髓海隅蒼生皆巳感格即甲胄之士亦能見利思義如右翼鎮標右營辭糧兵丁髙洪才者雍正八年十一月初十日早有江西窰匠遺一布袋在韶州府南門河邊適髙洪才渡河見而拾取開視内貯銀一十一包共重九十一兩五錢當有民人潘得用在彼浣衣見拾維時洪才拾金不昧隨即邀同得用徃凂關帝廟僧人翠雲書寫招帖遍訪原主比原主慌忙尋覓洪才核對銀數相符即將原銀給還絲毫不染雖爾時洪才僅詢知其為江西窰匠不復問其姓名但拾銀之後有書寫招帖之僧人翠雲已屬確證且伊從前曽拾銀三次皆給還原主金有等收明鑿鑿觀其平日之亷潔則今日之還銀自非虚揑據布政司詳據縣府轉據士民舉報前來臣隨給匾額表揚并通行闔屬曉示使人人則效處處觀摩仍飭該縣立碑傳後以示鼓勵外臣不敢壅於上聞謹㑹同督臣郝玉麟合詞具奏伏乞皇上睿鑒謹奏該部議奏同日又奏為奏聞事竊臣猥以菲材荷䝉皇上隆恩簡畀封疆重寄莅任以來無時不仰體聖心以察吏安民為念今查按察使黄文煒居心坦白辦事勤謹人尚明晰操守亦好糧驛道陶正中辦事謹飭才具亦優廣南韶連道李可淳人尚明白辦事小心但稍欠淳樸肇羅道張渠才其優長辦事勤謹再加歴練即成有用之才髙雷亷道毛世榮謹飭吏治尚欠熟練恵潮道劉運鮒為人老實才具平常吏治甚屬不諳不宜外任海南道王璠謹慎安静足供厥職鹽法道馮元方辦事勤謹才亦可觀尚堪供職廣州府知府吳騫才具明敏辦事歴練韶州府知府陳鴻熙才具明敏辦事勤慎肇慶府以同知銜管知府事劉正遠為人老實才具平常勉强供職潮州府知府胡恂敏㨗練達實係幹員髙州府知府張兆鳯為人誠實辦事勤慎雷州府知府葉思華才具平常辦事尚勤亷州府知府劉夢正小心謹慎尚能供職瓊州府知府宗思聖才具頗優操守亦好恵州府知府吳簡民南雄府知府潘思榘看來人俱明白到任未乆尚須試看直𨽻羅定州知州王植人尚直樸但辦事少欠歴練連州知州陶徳燾人尚明晰辦事謹慎理猺同知龎嶼才具優長實係能員潮州府同知龍為霖實心辦事不避繁難實屬幹濟之員南海縣知縣劉庶才具明晰操守亷潔辦事歴練署乳源縣事州同應陞王元樞為人耿直頗有膽氣奮力辦事才具亦優臣查官員之賢否關乎民生之休戚謹將聞見最確之各員出具考語先為奏聞其餘各員臣察試續陳伏乞皇上睿鑒謹奏汝既非明敏出衆之資又未具有超卓之見甫經到任席尚未暖何能將如許屬員一一俱已聞見最確耶此奏殊屬草率輕忽亦可謂不自量無恥之至同日又奏為請㫖事竊臣到任後查閱臣標所屬左右兩營兵丁技藝生疎且多疲弱甚至甲械舊壊不全隊伍亦不整齊臣遂逢三八日期親督操演竭力整頓諄切告誡立以賞罰其老弱不堪者革糧另募有軍械不備者臣即捐給陸續添補目下隊伍技械稍有可觀惟是營中公費無藉恐日乆仍至闒茸查粤東各營每兵百名俱留糧三分以充公用故營中一切公務得以有恃惟撫標從前未經議及是以公事多有掣肘而兵丁需用軍械遂不克及時整理今臣仰體聖恩一視同仁請照各營之例每兵百名存留三分充公收貯中軍衙門遇有修補甲械之時動支料理每年報臣核銷庶公用有資而軍威整肅其於沿海行伍大有裨益矣臣未敢擅便伏乞皇上睿鑒批示遵行謹奏當仿照各省撫標成例而行雍正九年九月初六日廣東廵撫臣鄂彌達謹奏為奏聞事竊照粤東地方環山濱海民猺雜處所有韶州府屬之曲江英徳樂昌乳源四縣界内有一種猺人盤踞其中約計人數不過千丁多係貧窘怠惰不勤耕種者偶或飢寒即出為匪其柳坑水源宫二坑尤甚前經該地方各官稟請増設營汛控制臣思増設營汛如人少則不足以控制彈壓多則日久不無擾累滋事因查英徳縣所轄各猺自明季設立黎陳二姓猺目以來衆猺有所統屬至今帖然不敢為匪向使柳坑水源宫二處亦皆設立猺目時加約束則自不敢肆行為匪遂與兩司酌議設立猺目約束即於柳坑水源宫二猺之中擇其强幹誠實而向無過犯者二名給以猺目劄付每月再賞銀三兩令其管轄猺衆即令猺目將各坑猺人編定丁户每五十户立一甲長甲長毎月給銀五錢使其分管各猺按户稽查猺目猺甲每月一次到縣當堂支領工食所給銀兩應於公項内動支如一年之内所管猺人無盗竊者除給工食外仍行給賞花紅以示鼓勵倘有盗竊之案發覺責令猺目緝拏如或徇隠揑報經兵役拏獲者則將該猺目并猺甲一并分别究處再猺山一帶荒土甚多向因乏本耕作以致曠廢應令該地方官查明借給牛種責令猺目猺甲等督令盡力開墾各安生理再將聖諭廣訓一十六條及强竊搶奪並窩主各條内緊要律例摘叙簡明語句分刋二本發給猺目猺甲等朔望宣講化導使既知朝廷之法不可干犯又令其衣食有所資藉則各猺自可帖然矣為此繕摺具奏伏乞皇上睿鑒謹奏此事在汝等督撫斟酌合宜而為之觀所料理似屬允當雍正九年十月二十三日廣東廵撫臣鄂彌達謹奏為欽遵聖諭實力奉行事雍正九年八月初一日據新任布政使臣楊永斌至臣内署密交諭㫖一道臣跪讀之下仰見皇上指示周詳凡屬臣工優劣皆在聖明洞鑒之中查方願瑛秉性姦邪存心狡詐身為大吏受國深恩乃不思報效耑以沽取虚名阻撓實政致使文武各立一途不相和協臣未到任之先固已聞知而到任之後細加察訪皆因文武官弁遇事各執巳見總不面為商酌遂致心生疑忌不克和𠂻辦公臣俱諄切訓飭文武各員務須同心共濟不得彼此參商至於粤東邊海巖疆盗風甚熾人多嗜利輕生臣荷䝉聖恩委任封疆敢不悉心開導立法勸懲冀其革面革心共為盛世良民所有居心行事如雲貴督臣鄂爾泰者實屬封疆師範臣時深效法惟恐不逮今奉到聖諭如耳提面命俾臣知所遵循得與布政使臣楊永斌同心協賛實力整頓務使文武和衷盗息民安以圖仰報天恩於萬一理合繕摺奏覆伏乞皇上睿鑒謹奏覽奏知道了但以言行相符為務同日又奏為恭報粤東秋收分數仰祈睿鑒事竊照粤東地方一年兩次耕穫民多力穡今嵗夏間已穫豐收兹據布政司將各屬收成分數彚報前來查廣州南雄韶州恵州潮州肇慶髙州雷州亷州瓊州十府並羅連二州及各所屬收成俱有六七八九十分不等再各屬米價每石自五錢四分至七錢不等今新米上市價值自必漸減家給人足户慶盈寧所有各屬收成細數臣謹另繕清摺恭呈御覽伏乞皇上睿鑒謹奏粤東秋成分數以手加額覽焉硃批諭㫖巻二百十五之一欽定四庫全書硃批諭㫖巻二百十五之二硃批鄂彌達奏摺雍正十年正月十六日廣東廵撫臣鄂彌達謹奏為奏聞事竊照陳美倫曽合二犯散劄聚衆謀為不法業經拏獲訊供經臣等兩次㑹奏在案所有陳美倫供出之夥黨羅京相等犯以及覆行嚴訊曽合供出同黨住居西省之錢珍等犯及住居本省之温崇新等犯臣即選差員弁幹役分路飛徃密拏並密札廣西撫臣轉飭該地文武官弁協拏去後今據臣標外委把總黄雲龍把總李秉鈞李育外委千總鄔連等陸續拏獲梁其芬錢珍植直寳陳夢吉吳恵陳夢濟陸始賔梁其珍鄧洪佩梁文廷植瓊玖植滄洲等犯并在錢珍家内起獲天寳年號偽劄五張又於林王茂家窩藏之竹箱内搜獲旗印詩扇等物并拏獲本省之溫崇新溫殿彩游挺仙梁亞十李燦章等犯臣即帶至内署弔并曾合等犯與司道密行嚴訊其大逆不法之處已據各犯直認不諱至詰其天寳年號劄付來歴則據錢珍等供出梁二恭胡百千知道等語臣即委員弁密拏務獲究擬外正在繕摺間據委員左興稟稱於西省蒼梧縣地方㑹同地方官拏獲陳彦清又在平南縣地方拏獲羅京相羅君秀之子羅亞廣韋朝明龔洪潘才潘清歐石福郭上清李滿并在潯州府拏獲楊法倫黄泗廻等禀報前來臣即差員前赴平南縣迅提已獲一干人犯來東質審俟解到另行審明奏聞外其未獲陳漢等犯仍嚴飭委員多方密拏務獲解究為此先行具摺奏聞并將先獲各犯口供及起獲印劄另封進呈伏乞皇上睿鑒謹奏拏獲各犯甚屬可嘉所差委員弁當厚加賞擢以示奨勵此案須徹底嚴究務盡根株不可少渉畏愞率忽致有疎漏同日又奏為奏聞事竊查粤東潮州一府與福建江西連界兵民雜處人烟輳集米榖最為緊要因去嵗豐收之後隣省赴潮糴買者多恐今嵗三四月間青黄不接米價稍昻亦未可定不得不預為綢繆之計查廣西梧州府榖價現在甚平每石價值三錢餘臣與司道等官詳議委員前徃梧州採買二三萬石存貯廣州府倉如三四月間潮州府屬米價昂貴即將潮州原貯倉榖量加出糶接濟民食以平市價即以此項買貯榖石舟運至潮補倉如潮屬價平而省城米價稍昂即將此項榖石在省減價平糶歸補原項一轉移間則米價常平於民生甚有裨益但查藩庫錢糧並無閒款可動惟太平關有自雍正九年五月起至十一月止收過羡餘銀三萬六千二百兩零現存司庫每年俱於七月間方行解部此項尚無急需今暫為動支銀一萬兩交與試用知縣喬徳徵委令前徃梧州府地方買運訖所動稅羡俟糶出榖價歸還按期解部事關籌畫民食暫動帑項理合繕摺奏聞伏乞皇上睿鑒謹奏覽奏已悉咨部存察可也同日又奏為請㫖事竊照粤東地處海濵逼近外國其來廣貿易者實繁有徒惟恐内地姦宄勾通外番色目生事不法臣時加嚴飭各地方官密行訪察詎有吕宋西洋人安多牛方濟各等貿易來廣於雍正八年五月間憑通事林興觀等代徃佛山地方用價一十五兩潜向民人柯勝昌買得女婢一口名喚碧桃年甫十二嵗順便擕帶歸國迨至九年四月内經臣亷訪得實適安多牛等復貿易至廣當飭南海縣訊據該番供認價買碧桃歸國原期撫養作女今自知悔罪願甘立限送還臣察其情詞懇切即宣諭皇上聖徳並示以寛大放歸本國兹該番安多牛等挈碧桃附撘夷商洋船於十月十九日回至省城據洋行商人禀縣轉報到臣臣即令該縣隨傳碧桃親父認明領回伏查將人口出境下海例禁森嚴但安多牛等自吕宋越海重譯逺來前因一時愚昧不知例禁價買碧桃歸國嗣經訪查即改過悔罪立限送還臣仰體聖主柔逺鴻慈暫將該番安多牛等保候可否念其外夷無知誤犯旋即悔悟尅日送回恩准將安多牛方濟各二犯從寛省釋其經手之林興觀等飭司究擬發落臣未敢擅便伏乞皇上睿鑒批示遵行謹奏既知悔罪送還自應寛宥將安多牛方濟各二犯即省釋遣回本國以示懐柔逺人之義雍正十年二月十八日廣東廵撫臣鄂彌達謹奏為恭繳硃批原摺事竊臣於雍正九年十月内具摺奏覆文武和衷縁由奉硃批覽奏知道了但以言行相符為務欽此臣惟凛遵聖諭不敢徒託空言務期見諸實行仰副皇上諄諄訓誨之聖心所有歴次奉到硃批原摺理合另封恭繳謹奏覽今命爾署理總督事務更當加勉以期毋負朕委任之意雍正十年三月十九日廣東總督臣郝玉麟廣東廵撫臣鄂彌達謹奏為奏聞事竊照粤東地方去嵗冬底雨雪優渥二麥豐茂現今俱已収穫自入春以來雨水十分霑足早睌二稻陸續栽蒔將竣禾苖秀茂仰荷皇上敬天勤民休祥協應將來豐稔可期所屬府州縣内間有米價稍昻者亦飭將存倉榖石照存七糶三之例減價平糶秋収買補還倉現今米價俱平自五錢以至一兩不等𤓰茄菜蔬俱皆肥大臣等恐厪聖懐理合繕摺奏聞伏祈皇上睿鑒謹奏覽粤東雨水情形朕懐深慰同日又奏為遵㫖覆奏事竊照廣東肇慶府陽春縣蓮塘寨地方賊衆乗夜打刼居民嚴謙光嚴涵光等家一案於雍正九年十月十六日奉有上諭一道臣等遵查雍正八年十月二十八日夜陽春縣民人嚴謙光嚴涵光等家被刦有賊七十餘徒一節查當日新興石窩汛把總王進賢原報開有賊七十餘徒旋據該縣詳報被刦情形及當時追獲李有徳訊據供開夥黨一十三人並無七十餘徒之多臣等彼時亦曾風聞恐有減報盗數情弊一面密加確訪一面飭司親提事主盗犯解省細審嗣據該縣續獲事主已逐舊僕為首糾刦之林日章等到案僉供同黨實止一十三人合之先獲李有徳初供無異業經臣郝玉麟叙入疎防案内題叅在案迨將事主盗犯提至省城經按察使黄文煒親訊亦與縣報初供脗合嗣又據署電白縣禀稱因觀風院亦有風聞令其訪查伊即屢次密遣親信之人至事主前後左右細加探問盗數實止一十餘徒似無減報盗數情弊又盗夥帶有籐牌鎗刀等械逞兇拒捕一節查此案現據臬司招解經臣等提犯㑹審據各犯堅供實止擕帶扁挑木棍並無籐牌鎗刀等械其當時被獲之李有徳因脚撞傷疼痛落後是以被鄉民等拏獲各犯早已爭先脫何敢逞兇拒捕等語查李有徳係鄉民拏獲交黄泥灣汛把總姚昇因當日係百總盤天揚之父盤子盛同鄉人追趕遂揑為弁兵追獲但該犯既先被鄉人擒拏則無拒捕之處甚明又事主單開贓物等件約計銀一千餘兩該縣指為謊報反將事主掌嘴一節臣等面訊該署縣王博厚據稱實因訊供時謙光自恃府書語言頂撞掌嘴數下是實並無勒令事主改供情弊随查失單所開贓物確估僅止值銀數十金并據接任知縣王元樞再三查訊事主所供贓物俱與單開數目符合則該署縣似無諱飾抑勒情事今奉到上諭臣等逐一㑹鞫密加細察與前情無異再查此案盗夥一十三人已經拏獲十名現在另疏具題其未獲李色國李唐長張耀富三名飛飭選差幹捕分頭上緊緝拏務獲究擬勿使漏網以仰副皇上靖盗安民之至意所有查明原委理合據實奏覆伏乞睿鑒謹奏覽奏知道了然朕於此案究不能無疑廣東廵撫臣鄂彌達謹奏為請改州縣轄屬以便吏治民生事竊照粤東恵州府轄屬十二州縣潮州府轄屬十一州縣廣袤千數百里而兩郡城皆處海濵沿海鎮協營縣布置周密惟北路山中千餘里獨為空虛程鄉長樂等縣乃汀贛恵潮來徃要衝匪類潜滋之處並無大員彈壓且距府窵逺吏治民生多有未便查恵屬之興寕長樂二縣乃在藍關以東水分東流似乎天生形勝已不屬恵而自府城至二縣六七百里挽舟逆流踰山度嶺又買舟順流而下計程十有餘日考試詞訟命盗訊駁徃返維難官民皆苦勞費此二縣之宜籌畫者也潮屬之程鄉平逺鎮平三縣俱在蓬辣灘以北自府城至三縣計程有六七日民庶山深刁蠻健訟潮郡煩劇非常即不須三縣僅有海陽潮陽等八邑已極難治郡守日夜辦理尚恐精力不周此三縣之宜籌畫者也臣思程鄉平鎮興長五縣聚居一處東控閩汀西界藍關南阻萬山北遏江贛天然自一提封不必逺屬恵潮而恵潮東北千餘里寥濶空虚似宜另設直隷州統轄之考程鄉一縣在宋為梅州地居興長平鎮適中四縣路程皆一二日可至以臣愚見應將程鄉改縣為州恭請皇上欽定佳名設直隷知州一員統轄興寧長樂平逺鎮平四縣改敎諭為學正改典史為吏目不必有增官置吏之勞一轉移間於五邑吏治民生大有裨益而恵潮兩府亦不致有鞭長莫及之虞矣臣又思程鄉地處衝要向以千總駐防殊覺太疎今若改為直𨽻州則應將駐劄平逺縣之平鎮營遊撃移駐新州以潮陽營之守備移防平逺縣並將興寧守備原係恵協分防一併就近改屬州營統轄以一事權庶無呼應不靈之患可以綏靖地方逺近享敉寧之福矣再查程鄉文風極盛而嵗科取進生員僅同中學十五名殊未相稱今若改為州學應請皇恩加廣進泮名額以宏鼓勵臣為嶺東遼濶治理事宜起見未敢擅便合先具摺請㫖倘䝉皇上俞允臣即㑹同督臣繕疏具題伏乞睿鑒謹奏潮屬程鄉以縣改州之處與署撫楊永斌再加詳議如意見相同㑹疏題請雍正十年四月十六日署理廣東總督臣鄂彌達謹奏為恭請聖訓事竊臣以菲才荷䝉聖恩超擢畀以封疆重寄莅任年餘涓埃未報兹復奉恩綸命臣署理總督印務聞命之下益深感激悚惶伏思總督統轄全省文武兼理兩粤鹺政臣自揣庸愚何能膺此重任惟有實心實力保固地方整飭營伍一切辦理諸事務必矢慎矢公不敢一毫欺誑亦不敢瞻徇情面稍渉沽名但慮智識短淺未必有當顧此海疆要地不能面聆聖訓恐滋隕越仰懇皇上恩賜訓示俾臣得有遵守禆益封疆從此地方官弁兵民亦共沐聖徳於靡涯矣謹奏覽奏已悉督撫職守封疆俱屬一體但能勉勵公誠何慮不克勝任耶同日又奏為奏聞事竊照總督駐劄肇慶原因向來兼轄兩廣而肇郡介在東西兩粤之間設立總督衙門居中控制兩省之事俱得就近料理誠為因地制宜今粤西一省已歸雲貴總督總轄而粤東一省形勢廣州實為適中之地兹臣欽奉恩命署理總督印務若沿舊例駐劄肇慶則地處西偏恐於一省事務不克周知辦理隨查廣州府原有總督衙門自應駐劄在省則東西南北俱得就近節制甚屬便㨗今臣接受督印之後現在起程赴肇考驗官兵稽查圍基海口等處事竣仍回省城駐劄居中控制彈壓官民且於廵撫觀風司道俱得朝夕咨商同心協辦於地方實有裨益臣仍不時徃肇整理營伍考驗官兵謹繕摺奏聞伏乞皇上睿鑒謹奏好肇廣均屬粤地隨時變通酌量而行可也雍正十年五月二十九日署理廣東總督臣鄂彌達署理廣東廵撫臣楊永斌謹奏為叅奏事竊惟三運萬年吉木乃係欽工急需之物臣等敬謹選料委肇慶府同知陳起騏等星夜催趲小心運送所到關津自應預清河道一到開關護送無使稍有躭延詎有安徽省委管蕪湖關務太平府知府李暲者據差員陳起騏等禀稱上年十二月十三日督押三運楠木抵安慶地方恐關津阻滯請有廵撫通關文照至十九日抵蕪湖關乃管關知府李暲驗閲文批不即放行縱容家人書役勒索掛號下艙小票掣批放關等項規禮又載長大木植之民船十一隻勒加飯食火耗加秤等項以致阻滯稽延至正月初六日始得開行等因到臣等伏查萬年吉木攸關緊要欽工該府李暲何得一任家人書役勒索規禮恣意掯延且有彼省撫臣程元章文照乃敢抗違不遵藐視欽工似此玩縱之員難以緘黙理應具本題㕘縁事屬隔省謹繕摺㕘奏伏乞皇上睿鑒敕部嚴加議處以為玩法誤公者戒為此謹奏該部嚴察議奏署理廣東總督臣鄂彌達謹奏為請㫖事竊照廣州一府為全省總㑹要區外接大洋逼處海濵各路營汛亟宜留心料理查東莞虎頭門一路有水師副將新安遊撃等營汛遏東來洋面之衝新㑹廣海寨一路有㕘將遊撃等營汛遏西來洋面之衝獨中間一帶防範實疎雖順徳有左翼鎮總兵駐劄香山有副將駐劄而潭州黄梁都等數處海口宏開無藩籬之隔實為兩腋要害揚帆直入可以徑抵省城似不可不為籌畫者臣不揣迂愚於廵撫任内遣理猺同知龎嶼帶同精細員弁蜑户詳觀各岸口島澳廣狹險易可以容隠賊舟及賊素出沒之處徃返數月始得其詳臣復親徃海濵查勘的實所有廣州海洋口岸情形并添設汛防撥兵築城建䑓等事宜以及省城城外礮䑓建置之地未得其宜應行更移添築之處臣謹備細繪圖粘標恭呈御覽是否可行合先繕摺請㫖倘䝉皇上俞允臣即㑹疏具題伏惟睿鑒謹奏所奏甚屬周詳允當具疏題請可也至於抽撥兵弁如可以通融足用即照此辦理倘或不敷分派另議添設數百兵丁需費糧餉俱為細務毋因省帑而致强勉從事同日又奏為奏聞事竊匪犯陳美倫曽合等糾黨謀逆一案經臣等將先獲與曽合同黨各犯研審確供備録呈奏在案續據差員署韶州府通判趙𢎞文提到先經委員左興施士超㑹同平南縣拏獲之羅京相等十名又經前督臣郝玉麟差千總劉國樑拏獲之植普潤等四名又據臣差去把總李秉鈞理猺同知書辦符名章拏獲之植普答等十一名西寧縣拏解之吳世友等二名差役郭子正祝漢章拏獲之劉竒勝等二名准廣西撫臣陸續咨解之楊法輪等十五名又准湖南撫臣咨解之唐奕清等二名又據臣差委把總李秉鈞東安縣武生朱權煥躧線拏獲散劄與錢珍等之要犯梁廸官即梁二恭等二名臣俱帶入内署傳同司道弔並先獲之陳美倫曾合等逐一研訊各供確鑿臣查曾合先於省城觀音山新㑹外海山等處謀為不軌今復各處煽惑欲於梧州起兵陳美倫傳唐奕清邪敎鼓惑人心已二十餘年今復欲入朋化里猺山屯聚又欲令陳漢等屯聚於上下麥猺山接應二犯謀逆已久罪大惡極梁二恭散劄糾衆鄧志廣與陳美倫共謀不軌錢珍植瓊玖既受梁二恭偽劄復為曾合糾黨羅京相陳漢歐石福植直寳劉二儍等聽信陳美倫曾合妖言轉相煽誘俱屬罪不客誅倘其勢已成則為禍不小仰賴我皇上天威洪福得以早為敗露經兩省設計誘拏奮力跟緝渠魁俱已成擒黨羽漸次全獲臣等現在將各犯分别情罪依律議擬題請正法所有律應縁坐之家口咨行拏禁未獲之王瓊等遴委員弁分路跟緝務獲究擬審明無干之韋元珠等先行釋放以免拖累已故之余之貴等分别咨行各該地方官確查果否身死覆到另奪在事出力人員另行開明履歴勞績請㫖奨勵厚賞再查梁二恭一犯所供湖廣朱道人授與胡百興轉給之偽劄言詞悖逆情甚可惡臣愚以為必有巨憝大姦為之發縱指示乃胡百興已伏㝠誅而朱道人尚未弋獲研訊兩月有餘始則再三婉誘繼則疊加嚴刑該犯體無完膚所供矢口不易除現在再加窮究并密遣員弁前徃湖廣地方分頭躧緝朱道人下落一面密札湖廣督撫諸臣轉飭地方官嚴拏務獲盡去根株不留遺孽外臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞先行繕摺奏聞并將各犯口供備録另封進呈伏乞皇上睿鑒謹奏覽奏各犯供情巳悉具題到日有㫖同日又奏為遵㫖覆奏事竊照匪犯陳美倫曾合等糾衆謀逆一案先經臣等摺奏奉硃批拏獲各犯甚屬可嘉所差委員弁當厚加賞擢以示奨勵此案須徹底嚴究務盡根株不可少渉畏愞率忽致有疎漏欽此欽遵除臣等嚴究陳美倫等供詞另摺奏聞及理猺同知龎嶼等另摺奏請睿鑒外臣查在事出力之因公罣誤革職年滿千總施士超初由理猺同知龎嶼差委兼同督標千總劉國樑帶領兵役拏獲匪黨楊士元等繼又計擒首惡陳美倫等各犯勞績最著臣考驗該弁人材壮健弓馬可觀原係江西袁州協標年滿千總縁宜春縣民劉閑若窩賭畏罪投水自盡案内擬以威逼革職因與龎嶼有舊赴粤留伊幫緝可否准其開復留於臣標酌量題補撫標外委把總黄雲龍拏獲首惡曾合等各犯甚為出力可否以臣標千總補用撫標把總李秉鈞拏獲惡犯梁二恭等并在錢珍家起獲偽劄五張亦著勤勞可否補授千總以示奨勵撫標把總李育外委千總鄔連均與黄雲龍等同行出力人材俱健弓馬可觀可否將李育補授千總鄔連拔補經制把總東安縣學武生何九星與施士超協力擒賊膽識頗優弓馬亦好可否以經制把總補用又武生朱權煥同把總李秉鈞躧線緝賊亦屬出力馬戰兵郭子正祝漢章張光祚梁朋光等跟隨黄雲龍等協緝獲犯俱甚屬効力應與朱權煥並拔補外委把總再有効力處拔補經制把總督標千總劉國樑初同施士超拏獲匪黨楊士元等四名繼復拏獲黨犯植普潤等三名亦有勤勞應照拏獲隣境夥盗七名例從優議叙差役周用等二十一名俱曽出力臣現在酌量每名賞銀二十兩以上在事出力人員臣謹遵諭㫖逐一聲明勞績分别等次奨賞擢薦㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞繕摺奏聞伏乞皇上睿鑒謹奏辦理俱是照所議行應具題者具疏題奏應達部者咨部存案同日又奏為遵㫖覆奏事竊照拏獲匪犯陳美倫曾合案内之在事出力員弁兵役經臣等分别奨賞擢薦另摺奏聞外查雍正九年九月間臣於廵撫任内因匪首李梅未獲商同前督臣郝玉麟遴委理猺同知龎嶼捕緝該員查至西寧縣地方訪知有猺山散劄一事計擒匪黨楊士元等密訊供出陳美倫等謀逆實情并各犯姓名住址禀報到臣臣即飛飭密拏隨據該員遴委革職千總施士超東安縣武生何九星等帶領幹役徃廣西藤縣五屯所改装設計拏解陳美倫鄧志廣等到臣臣即傳同司道在署密訊供出夥黨羅京相等又因該員熟悉東西兩省情形凡經臣遴選員役指授機宜分頭購緝俱令與該員商酌而行是以本案渠魁夥黨俱已陸續全獲實屬始終效力之員臣查龎嶼由廣西舉人雍正五年命徃廣東試用前經委署鎮平歸善番禺三縣俱能料理地方著有成效自補授理猺軍民同知受恩感激益思報效實心辦事才守兼優洵屬幹練之員欽奉硃批諭㫖格外薦擢因無相當之缺未敢冒昧議請陞補所有同知龎嶼勞績不敢壅於上聞臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞繕摺奏聞伏乞皇上睿鑒謹奏龎嶼既於此案係始終效力之員遇有相宜府道缺出援㫖具疏題補雍正十年閏五月十三日署理廣東總督臣鄂彌達謹奏為奏聞事竊惟粤東田禾一年兩熟仰荷聖主敬天勤民感召和氣屢登大有今春雨水十分霑足二麥俱已豐収禾稻挿種及時臣恐圍基低漥處所雨水稍多因徃肇慶看兵廵視海口營汛之便遂親履圍基查勘因西水旋長旋消各處圍基並無衝決坍洩之處而圍内禾稻俱極暢茂詢諸各處民人僉云今春雨水充足入夏以來雨暘時若圍内圍外髙下田地俱十分豐茂早插蒔者已經収割其稍遲者亦皆豐茂將來自獲大有現在地方寧謐民風熙皥除早稻収成分數俟布政司彚報到日另行奏報外合將臣經過各處豐稔情形繕摺奏聞伏乞皇上睿鑒謹奏粤東雨𤾉時若情形以手加額覽之同日又奏為奏聞事竊查匪犯余猊糾黨謀逆業經臣等恭摺奏聞并將一干人犯提押來省訊據供出閩省夥犯黄五舍等咨提赴粤訊供助匪情實亦經具題在案嗣復將余猊再四窮究又據供出夥犯陳竒和林日恭係揭陽縣人隨又密飭查拏去後續據該府縣禀稱有武舉黄裕典於五月十三日祭祀關帝㑹衆飲酒近地居民多有疑訝等情又經密飭訪查兹該縣將陳竒和林日恭密行拏獲並查出余猊等於上年被拏時曽留信於羅謂玉陳竒和欲令糾衆刦獄將羅謂玉並獲到案與陳竒和林日恭分别研訊各據供認本年四月初十日在於羅謂玉家商謀招黨竒和遂招約林日恭王阿佑并黄裕典而王阿佑又招得吳來亭謝阿天李阿綱及兵丁李廣等商議去救余猊訂於五月十三日拜把因各處地方嚴緊無計可施商量且先下船出海再作道理旋被訪覺查拏各自逃散等語拘到王阿佑等研訊供認相符惟武舉黄裕典兵丁李廣尚肆狡辯等情具報前來臣等查余猊不法已極正在窮究黨羽而羅謂玉等復敢聚謀刦獄似此一黨姦惡萬難輕宥除密飭文武嚴拏餘夥并將武舉黄裕典另疏叅革一面將現在人犯提押至省臣等親加嚴究務盡根株另摺具奏外所有續獲余猊案犯并查出聚謀搶犯縁由臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞先為奏聞謹奏覽奏續獲案犯縁由知道了事關匪徒設謀糾黨慎密為之毋忽雍正十年六月初九日署理廣東總督臣鄂彌達謹奏為安插窮民開墾情形仰祈睿鑒事竊惟粤東地方山海交錯民俗刁悍貧苦者多所以小民惟利是圖每於封禁之礦山濳徃偷挖甚至販私盗竊毫無顧忌雖因習尚澆漓輕蹈法網亦由無田可耕無業可守遂致漸流為匪臣自抵粤以來將奉到歴次諭㫖刊刻遍示曉諭勸導一面嚴飭該地方文武官弁時加廵邏勿任礦徒聚夥偷挖旋據各屬覆稱小民聞有上諭欣喜觀聽咸知感激天恩不敢輕犯原封硐口無人偷挖臣隨行查各屬曠土及實在無業窮民已據各屬報到二千餘户正在商酌安插荷䝉聖主垂念欽差禮科給事中徐把偕臣等悉心辦理隨經科臣徐把親歴山場遍行查勘各處礦硐皆屬封固硐口蔓草叢生並無偷挖之事惟是無業窮民若不悉心調劑使其衣食有賴難保後來不蹈故轍查肇慶府大官田地方新設鶴山一縣及附近恩平開平等縣現有荒地數萬畆以之開墾耕種安插貧民最為相宜臣上年曽委糧驛道陶正中料理新縣城工兼令查勘荒地鶴山縣境現據丈出荒地三萬三千餘畆查業户耕地百畆須佃五人此可安集佃民一千六百餘户恩平開平荒地甚多不止一二萬畆現今丈出五千餘畆尚未及四分之一因該處地廣人稀雖有藩庫墾荒銀兩莫肯赴領承墾臣等諭令有力商民招集恵潮等處貧民給以廬舍口糧工本毎安插五家編甲入籍即給地百畝復念各佃逺來托居雖有可耕之業仍恐日後予奪憑由業户不能相安應為從長計議凡業户領田百畝各佃俱帶領地五畝與田主一例納糧永為該佃世業田主不得過問庶佃户稍有餘資無偏枯之嘆亦可無逋租之虞今恵潮二府貧民就居鶴山耕種入籍者已有三百餘户現在陸續依棲日益増聚兼聞先到之人安頓得所無不踴躍趨赴其各屬未報貧民亦必陸續報出容臣等遍查髙雷亷等各府州縣可墾荒地一并丈出次第設法安插使窮民皆有恒産足以資生不數年間野無曠土地無遺利全粤深山窮谷無復有失業遊手之民風俗淳美夜户不閉地方官民均感浩蕩洪恩於無既矣謹將安插縁由㑹同署撫臣楊永斌科臣徐杞合詞繕摺奏聞伏乞皇上睿鑒謹奏貧民如此安插甚好料理殊屬妥協同日又奏為遵㫖覆奏事竊查潮州鎮臣李萬倉奏請將黄岡協柘林汛左營守備改為柘林水師専防海澳配造船隻分泊柘林管轄港口之雞毋澳西虎仔嶼二水汛哨廵一摺奉硃批言之督臣酌議具奏欽此前經督臣郝玉麟檄委恵潮道胡恂確勘議詳前來臣細加覆核查柘林一汛在黄岡之東為明初沿海五水寨之一向以閩廣上下徃來必經視為海道第一關鎖門户則當時南澳棄為盗窠無官兵守廵之故也我朝掃靖海氛設立總兵大員鎮守南澳左右福廣兩營雄踞海中柘林已在肘腋之内是以汛防定制以黄岡協營守備防守柘林於雞毋澳礮䑓駐防官兵八十四員名西虎仔嶼礮䑓駐防官兵二十四員名皆為陸汛俱屬黄岡協管轄礮䑓之下一帶汪洋俱屬南澳鎮水師管轄設船三隻配兵一百名專防雞母澳大小金門等水汛則以諸汛距南澳鎮城不過二十五里之海面宜歸畫一以專責成不另立水師法至善也兹若將柘林守備改為水師添造戰船則陸汛已屬空虚柘林所轄之馬頭山等處諸礮䑓勢必又另撥兵防守此更改之不便於陸汛者也且二十五里之海面兩岸俱設水師勢必與南澳右營分内外洋界内則咫尺之地無所庸分外則洪濤巨浸難以分清一遇失事反得滋其推諉此更改之不便於水汛者也查雞毋澳礮䑓固為要緊之區然陸汛有官兵駐防水汛有戰船廵緝至周至密可以不必更張西虎仔嶼礮䑓依山傍岸四面俱係礁石淺沙戰船原不能至止因洋面界限無憑分别遥望此嶼為界東屬左營西屬右營並非應防汛之所更可無煩籌畫應將該署鎮所請之處均無庸議理合繕摺奏覆伏乞皇上睿鑒謹奏所奏是將此議當令李萬倉知之以増長其識見雍正十年七月初二日署理廣東總督臣鄂彌達謹奏為恭報粤東早稻収成分數仰祈睿鑒事竊照粤省今嵗春夏雨水霑足早稻業已登場兹據署布政司黄文煒將各屬早稻収成分數彚報前來臣查各府州所屬収成自十分九分以及八分七分不等各屬米價自五錢起至八錢一二分不等目下新米上市價值自必益減其各處農民呈報瑞榖一莖數穂者甚多家給人足共慶盈寧此皆我皇上敬天勤民精誠感格是以海隅蒼生咸歌樂利所有各屬早稻収成細數臣謹另摺分晰恭呈睿鑒為此謹奏覽粤東收穫并米價情形朕實深為額慶同日又奏為酌裁鹽政陋例以節浮費事竊照鹽政衙門向為利藪及歸督臣管理節經查明應歸公者奏明歸公應禁革者陸續禁革現在一無陋例但查運使衙門商人上納鹽餉庫官庫吏每百兩尚有規禮三錢拆引每封規禮一兩經歴規禮二兩每年約數千餘兩又有單房収標修秤埠差等項飯食名色每年約計亦數千餘兩雖積弊相沿由來已久而為數殊覺太過今臣俱一一斟酌約算各官役出入之數量加裁革或存留一半或裁七存三務俾官役可以辦公而亦不容因以為利再查運使衙門向有公匣一項衆商内每年公派六人於運使署側設立公櫃每商拆引一封上價之後運使填發水程不給該商領去轉發管理公匣之人每封繳銀十九兩方将水程給發衆商惟恐領遲以致違限不得不與名曰公費每年約銀六七千兩以備運使衙門不時之需及督臣生日年節禮物之用臣查運使衙門向有収餉每百兩加平三兩三錢上價每百兩加平八錢除支解銅觔水脚都察院飯食起解各餉平頭路費及臣衙門書役工食紙劄外每年約餘五千餘金以作養亷已足敷用不應復累各商至臣衙門禮物向來俱不収受此項銀兩臣曽檄取公匣収支底簿閱看不過供此管匣六人之酒食花銷而已衆商血本所關而此六人假公費名色用如固有甚屬不合臣已嚴飭革除至於各場大使管理竈曬向例發價皆有扣頭収鹽皆有加秤一年四節曬丁栅長皆有額規又有家人司事廵丁各項小禮邊海窮民所得官價尚且不敷工本若再層層剝削民何以堪欲不走私勢必罷曬臣已将扣尅剝竈最甚之博茂場委員陳紹箕咨革究審仍通行申飭現在各場皆知儆懼改悔臣亦容其自新倘有不遵臣亦斷不姑恕臣䝉天恩總理鹽政惟有悉心整頓總期弊革風清以仰副皇上恤商恤竈至意所有酌裁陋例事宜理合據實奏聞伏乞睿鑒謹奏嘉是覽焉務期言與行符實力勉為之操守一節為大臣立身之根本果能於此堅持不移屬員何有不服公務何有不辦加意砥礪自勉莫視為易事同日又奏為奏聞事竊照貴州黎平一帶新闢古州地方素不産鹽又無額引民苦淡食臣前任貴州布政時知其地向俱買食淮鹽價值昻貴民甚不便臣思淮鹽運至彼地路途遥逺脚費繁多自應價貴若粤東運至古州一水可通路費尚少不難減價銷售且粤省産鹽甚廣現在壅滯若黎平一帶鹽可多銷不但便該地民食亦可裕東省課餉一轉移間於黔粤兩省俱有裨益前經廣西撫臣咨㑹議先撥西省存留善後鹽五百包前徃試銷以後即令黔員領廣東引鹽運賣但臣查古州河道開通商賈輻輳銷售必多既需行銷東省鹽包不若東省専委幹員前徃相度㑹同料理庶乎每年銷引封數沿途運脚多寡應責何員考課應定賣價幾何更得核查明確臣現在咨商貴州撫臣撥出子鹽一封專差原任潮贛分司俞文耀運徃該地試銷每觔暫定價銀二分一釐聽該地民苗買食除俟試銷有效酌定引目擬立成規另行題增引餉外理合先行奏聞伏乞皇上睿鑒謹奏試為之如果通行有益具疏題請可也同日又奏為請㫖事竊照兩廣鹽務頭緒繁多苟非經理得人不能肅清無弊查省河與潮州之廣濟橋各場埠係運使運同經理輾轉遷延拖欠累十數萬若不極力整頓款項究不能清誤兵餉而虧帑項臣實不敢因循茍且上負皇上便民裕課之盛心查得運使馮元方才具雖尚明晰但與商人親密徃來遇事每多瞻徇課餉恐有掩飾完欠難以稽查再潮州分司程哲人雖樸實而㑹計無才潮汀各官埠積欠亦多俱未清白雖據稱皆有鹽包可抵竊恐不無那移必須調員徹底清查然後實欠實完方有著落可以漸次督追臣查馮元方不便再留此任現在廣南韶連道李可淳病故臣已㑹同撫臣另本題報查此缺事簡尚易勝任請以馮元方調補觀其後效至運使一缺查有韶州府知府陳鴻熙操守亷潔辦事精明剔弊釐姦不避嫌怨縁其人心直口快不能面從故有狂妄之名其實現任各府罕出其右且從前曽經辦理潮州運同事務於鹽務甚為熟悉以之陞授鹽運使必能弊杜風清倘䝉俞允其韶州知府一缺容臣等另選題補至運同經管潮恵汀贛四府鹽務料理整飭亦須亷幹之員查有潮州府同知張士璉居官明决操守潔清堪以調補運同至現任運同程哲久任海疆尚無别項劣蹟請以借補潮州府同知各該員調任之後實欠實完無能掩飾自易盤查矣臣為清查完欠防侵杜那起見用敢仰懇天恩俯准調補伏乞皇上睿鑒特降俞㫖施行謹奏照所請有㫖諭部矣同日又奏為請㫖事竊照廣州府香山縣屬有淇澳麻子二村淇澳孤懸大海人跡罕至麻子三面倚山一面臨海汪洋浩瀚風濤異常又離縣窵逺稽查莫及兩村居民約數百家恃險為巢半作海洋盜賊臣於本年五月内密諭按察司轉委番禺縣訪查去後據查得麻子淇澳二村之陳理開歐陽徳祐羅象興羅象茂羅恵倫蔡徳明六船近有為匪搶刧等事爰於六月初六十三等日臣與署撫臣楊永斌觀風整俗使臣焦祈年面諭署廣州府事同知龎嶼香山協副将黄錫申前去㑹同該縣親至該村相機擒撫隨經計擒各船首盗陳理開等六人審據供認情實因念渠魁既獲脅從應予自新又人犯衆多緝拏轉易驚逸於是張示曉諭宣布皇仁許其投首槩從寛典旋據陳理開六船之盗夥陳亞五等六十五人自行投首并有别案黄玉純等一十九人聞風同出并繳出小船十有一隻礮械六十四件皆各伏地謝罪情願自新於六月二十日押解來省隨檄行按察司嚴審究擬去後兹據府縣審供由司詳報前来臣查海洋行劫比照陸路响馬罪在不原但查雍正七年七月十九日礦盗謝恩榮等行刧海豐縣梅隴墟徐秉閑等家自行投首一案經前督臣郝玉麟審明奏請奉㫖将拒捕傷人之黄天明等斬决餘犯從寛分發各省當差在案今麻子淇澳二村匪犯一經龎嶼等宣揚皇上保民如赤之盛心伊等即自行投首除各船為首之陳理開歐陽徳祐羅象興羅象茂羅恵倫蔡得明均屬法無可貸既經拏獲律應斬梟逃軍鍾㨗聰另案歸結外其六船盗夥自行投首之陳亞五等六十五人原訪無名聞風投首之黄玉純等一十八人皆屬情有可原查各犯生長海濱駕船度活熟識水性海中俱能潛行數十里查現在各標新設哨船水手兵丁未盡諳練若每船再添一二熟練之人更為有益臣等不揣冒昧仰懇皇上天恩可否俯念各犯既經投首准予自新或發川陜入伍當差抑或恩准仍留廣東配各廵海船隻每船酌撥二人既可教習水師亦易収管約束洪恩出自聖裁臣等未敢擅便再各盗理應分案具題因該犯衆多又經自首若循次議結未免監候日久不無瘐斃堪憐可否敕部議結追贓給主以儆兇頑以寛脅從伏乞皇上睿鑒批示遵行臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞請㫖謹奏此自行投首各犯作何結案之處該部速議具奏雍正十年九月初三日署理廣東總督臣鄂彌達謹奏為人才難得據實奏聞仰祈睿鑒事竊臣一介庸材荷䝉皇上天恩畀以封疆重任蚉負弗勝時虞隕越夙夜思維惟期得人以資治理不特現任屬吏加意甄陶即降黜罪廢之員臣亦留心訪查臣於抵粤之初即聞有原任潮州府普寕縣知縣藍鼎元操守亷潔實心任事被㕘去任百姓謳思臣猶未敢遽信兩載以來細加體訪乃知藍鼎元不特人才可用抑且品行端方查藍鼎元係奉㫖補授廣東普寧縣知縣行文督撫試看以要緊州縣缺酌量題補之員縁雍正六年署潮陽事任内有原任恵潮道樓儼運貯潮陽西榖被押運廵檢范仕化等勾同船户沿途盗賣并買粃榖攙和共缺少榖三千二百石樓儼令鼎元代賠鼎元無力賠補致被樓儼揭㕘革職所有擬追贓項皆同官及士民代為清完臣在粤兩載鼎元從未至臣衙門投一禀刺本年三月内因藍鼎元㕘案已清檄調來省傳入署中細加觀察與臣訪聞無異伏念我皇上愛惜人才寸長必録臣仰體聖心何敢知而不言不揣冒昧謹據實具奏如䝉皇上天恩特賜召見臣即給咨藍鼎元赴京引見自必感激洪恩益加勉勵矣為此謹奏藍鼎元應賠之項如果全完案件既經清楚給咨令其赴部引見可也同日又奏為奏明事竊照雍正九年六月間臣在廵撫任内時有安南番民鄧文武等男女共五十六名口在伊本國平順府開船徃嘉定府販買稻榖洋中遭風飄入廣東銅鼓角海面經廵海官兵搭救護送至省臣隨行飭查騐有該國印照實係遭風破船並無别故臣仰體皇上柔逺洪仁即諭地方官酌給房舍衣食加意撫恤嗣因船商郭廣興徃安南貿易之便臣給發印文資以路費令搭郭廣興船交明該國王安插兹於八月十八日據船商郭廣興回粤禀稱難番鄧文武等均各平安歸國今齎有安南國王回文并帶送臣伽南香沈香生絹棕竹胡椒燕窩魚翅海參等物臣接閲文内無非感謝之詞但臣職任封疆撫恤難番皆仰體我皇上中外一家之至意非敢市恵於該國臣民也所有土儀等物未便収受除暫寄布政司庫俟覓有安南貿易便舟寄還外理合據實奏聞伏乞睿鑒謹奏辭讓不受甚是仍須婉言覆之庶為得體同日又奏為請㫖事竊照粤東一省山海險阻易藏匪𩔖查有廣肇二府連界之百峰山係新㑹新寧香山開平四縣所轄疉巘千層路徑叢雜人莫能識且距海甚近素為洋盗逋逃淵藪舊有無頼匪徒招邀黨羽霸踞山場發標抽取徃來商漁船隻及入山樵炭花紅銀米客民受害無可如何歴任督臣欲行擒剿賊在髙山瞭望官兵進口即先遁藏剿捕難施益無顧忌山中荒田數千頃莫敢前赴墾闢即山外附近之錦被蓢等處膏腴廣衍俱置抛荒數十餘年無人過問皆由伏莽未清是以良民畏避我皇上徳威逺播近年以來已經漸次散去山中匪𩔖不過數十餘人仍索取樵炭船隻花紅擾民若不悉心經理不特客民受害且使千頃膏腴淪為棄壤臣委員密查得其姓氏隨密諭肇慶府知府劉庶開平縣知縣張漺等細心辦理設法躧緝并多發告示諄切開導令其悔罪自新隨據該縣張漺先後招到賊首陳亞滑彭上彩李雅拱三名到臣臣隨與署撫臣楊永斌觀風整俗使臣焦祈年面加開導該犯稽首伏罪皆各感激皇恩情願出力擒招夥黨贖罪臣隨賞給花紅等物仍交該縣帶徃招緝旋據陳亞滑等三人先後招到羅阿九等四十七名赴開平縣及廣海營各報解到臣隨檄委肇慶府㑹同開平縣訊取各犯確供去後嗣據報稱各犯俱供認因貧無食入山抽取炭厰花紅漁船錢米不諱查此案匪黨原係五十七人除鄺天逺等五名先於本年三月内因犯别案拏禁新寧縣監應於彼案審結現在投首人内惟彭擢干等六名供認本年閏五月内搶過伍徳叶柴船一次應俟彼案審明仍照自首例議結未獲張傑有黄傳連到日另結外其餘四十四人並無强劫案犯俱係窮民失業以故羣聚私抽是必安插有方然後地方永靖臣細加驗看查陳亞滑等二十四名俱皆年力精壮諳曉武藝若以分發各營給糧操防則其身心既有約束衣食又有仰賴倘遇搜緝山谷彼皆可以效力至陳祖帶等二十名皆係農民素知耕種臣經檄委糧驛道陶正中勘丈恩平之錦被蓢等處荒地令招民墾作田園擬每名給田二十畝另給牛種口粮銀十兩編入保甲令各保長管束則伊等皆樂業安生不致復蹈前轍矣至百峰山曠地臣當另委能員勘查清丈招墾又可安插恵潮貧民數千家臣為安插莠民開墾荒地起見此現在自行投首人等應否如臣所請就地安插抑應發徃别省當差臣未敢擅便伏乞皇上睿鑒特降諭㫖施行臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞具奏朕未親睹若軰情形何可遥定斯事不便特降諭㫖施行應否就於本地安插在汝審度區處可保他日不擾地方乃係極當之舉若稍渉疑似仍照例辦理為是汝斟酌允協然後具題奏請本内不必援引此㫖署理廣東總督臣鄂彌達署理廣東廵撫臣楊永斌謹奏為遵㫖據實回奏仰祈聖裁事雍正十年七月二十七日臣等奉到内閣交出廣東右翼鎮總兵臣李維揚摺奏内稱外洋商艘從前皆在虎門口外灣泊迨康熙五十年間移入畨禺縣之黄埔距省城僅三四十里其早晚操演銅鐵大礮省㑹之地大非所宜請飭令仍在虎門海口灣泊等語奉㫖李維揚奏摺著寄與署總督鄂彌達署廵撫楊永斌閱看其言可採與否令伊等據實回奏欽此臣等查得虎門所屬巨海汪洋風濤甚險其口外口内皆不可長久灣泊若現在夷船停泊之黄埔實係逼近省城一任夷商揚帆直入早晚試礮毫無顧忌未免駭人聼聞該鎮臣所奏之言實有可採伏查香山縣之澳門河下上至沙篱頭下至孃媽閣地濶浪平可以長久灣船現今澳夷各洋船皆在此處停泊實屬安穩無虞况查從前洋艘原灣此地縁康熙二十五年粤海關監督臣宜爾格圖據澳夷目唩囉哆等結稱澳門原為設與西洋人居住從無别𩔖外國洋船入内混泊等因具題經部覆准故至今各洋船皆移泊黄埔地方但臣等悉心詳查澳門原係内地西洋人不過賃居豈容澳夷視為已物如云澳門為西洋人之地不便容别國洋艘停泊豈黄埔内地顧可任其久停耶臣等仰懇聖恩請自雍正癸丑年為始凡各外國夷船仍照舊例在澳門海口拉青角地方與西洋澳夷船隻一同灣泊所有徃來貨物即用該澳小船搬運仍飭沿途營汛徃回一體撥駕槳船護送礮位軍器不得私運來省如此則内地防範周密夷船亦無漂泊之虞矣臣等謹遵㫖據實回奏伏乞皇上睿鑒施行謹奏九卿㑹議具奏雍正十年九月十九日署理廣東總督臣鄂彌達謹奏為請㫖事竊照廣肇二府連界之百峰山匪黨私抽一案經臣等先後擒招得陳亞滑等五十五名業将别案有名之鄺天逺等十一人分别歸案陳亞滑等二十四名議發各營食糧陳祖帶等二十名議給牛種墾荒未獲黄傳連張傑有到日另結於本年九月初三日具摺請㫖兹復據署廣海寨遊撃馮元禀稱有犯黄傳連率領向年同在山場之李亞七陳亞丁汪亞六三名俱赴營投首於九月十六日押解到省臣等覆加看驗黄傳連李亞七年力精壯頗諳武藝堪以入伍陳亞丁汪亞六皆知耕種堪以墾荒理合分别奏聞或俯照臣等所議安插本省或發别省當差伏乞皇上批示遵行臣謹㑹同署撫臣楊永斌觀風整俗使臣焦祈年合詞具奏遵照前㫖施行同日又奏為呈請代奏恭謝天恩事竊查廣東每年鹽政奏銷各項使費餘剰銀三千餘兩經前任督臣郝玉麟奏請自雍正九年為始将此項餘剰銀兩補給提鎮養亷不敷提督給銀六百兩左翼右翼碣石潮州髙州瓊州南澳七鎮各四百兩等因經大學士鄂爾泰等議覆具奏奉㫖依議由部行文到粤欽遵照㑹在案今據各該鎮臣李萬倉等合詞呈請代為奏謝等由到臣理合據情代奏再照此案又准廣東提臣張溥咨稱叨䝉皇上隆恩畀以封疆重任俸薪之外復䝉賞賜親丁養亷名糧八十分營中公務又有公費名糧儘足用度分給銀六百兩請留為别項公用不必解送等因咨覆到臣臣查此項銀兩既准提臣張溥請留别項公用自應存留充公另撥别項之用合併陳明伏乞皇上睿鑒施行謹奏覽奏知道了張溥養亷銀兩仍當給與同日又奏為敬籌各標生息銀兩永逺流通勻給賞賚之法仰冀聖裁事竊照粤東一省督撫提鎮各標兵丁荷䝉皇上天恩賞給帑銀一十萬兩存公生息以資吉凶賞賚之需復以各協營兵尚未遍及時厪聖懐雖經前督臣郝玉麟奏請於雍正癸丑年一例開賞在案但臣将各標生息本利細加核算尚屬不敷若不悉心料理則通省兵丁不能均沾賞賚查原帑十萬兩現在借給鹽商各標二分生息三年以來皆無缺少已經開賞仍有餘剰至開當各標除清一切費用之外利息不及一分若每月抽銀給賞勢必虧本故開當各標至今兵丁尚未開賞焉有餘潤以及協標臣思生息一項欽奉諭㫖原著臣等通融辦理不必膠於一定如滇黔宜於分派營運自應分散各營若粤東分派煩難則又不如聚總生息臣通盤核算似宜将當舖一總収起俱按引分借鹽商每月每兩二分起息逐月月底繳鹽運使兌収将所得息銀按通省各標營兵丁多寡分派令該營於每季赴省領餉時即将該營應得利銀順便領回以備賞恤最為妥便查現在帑本十萬兩利銀亦約有三萬兩若借給鹽商二分生息每年可得利銀三萬一千二百兩自本年十月起至雍正癸丑年六月則所得利息即可勻給通省各標即協營亦可一例開賞均沾皇上一視同仁之實恵矣臣為均平生息接濟開賞起見已與署撫臣楊永斌面酌並札商提臣張溥俱與臣意見相同是否有當伏乞皇上批示遵行謹奏果能令闔省標協兵丁均沾實恵永逺通行無弊自屬善舉酌量為之雍正十年十一月初九日廣東總督臣鄂彌達廣東廵撫臣楊永斌謹奏為恭報粤東秋成分數仰祈睿鑒事竊照粤東通省晚稻収成分數據布政司甘汝來彚報前來查各府州屬秋成自十分九分以及八分七分不等各屬米價自五錢以至八錢二分不等且據各屬送到瑞榖自一莖雙穂以至七穂一本十數穂以至一百二十九穂自四五尺以及長至一丈一尺者不等實在家給人足共慶盈寧皆由我皇上重農貴粟勤恤民依是以感召天和年登大有臣不勝踴躍歡忭之至謹将各屬所報収成細數另摺分晰恭呈皇上睿鑒外理合據實奏聞謹奏粤東秋成分數以手加額覽焉此皆鄉等忠誠盡職有以感召天庥之所致自兹惟愈加寅畏居心敬慎從事可也期共勉之雍正十年十二月初一日廣東總督臣鄂彌達廣東廵撫臣楊永斌謹奏為奏明事竊照潮州府饒平縣已革武舉余猊因窩藏偷牛賊犯被府詳革枷責挾恨問官糾黨陳阿幼等欲打鬧府署搶刦潮州府城東門行舖冀圖報復事發被拏復囑黨羅謂玉陳竒和等糾人刦犯隨被訪查拏獲業經臣等㑹同先後奏聞在案嗣将各犯提解來省飭發究審據布按二司㑹同審解前來臣等傳同在省司道各官嚴加確審據各犯供認糾黨拜盟歃血訂期思欲鬧署刦舖以圖報復及羅謂玉陳竒和等供認因余猊囑令刦獄相救省城兵役衆多難以搶刦遂糾人拜盟謀俟余猊審明解回之日在途搶刦下海逃躱各情形歴歴不諱至究其有無預備器械船隻米糧等項并有無謀為不軌别情據各堅供當日甫經商議即被查拏並無預備各項亦無圖謀不軌别情臣等覆核案情除懼禍未同拜盟之陳新老等七名及被陳衍鳯哄誘另一起拜盟並無歃血亦不知為匪情事之陳阿龍等六名另擬外其余猊黄五舍等三十四名照依謀叛未行分别首從問擬俱屬符協惟查余猊一犯始因窩竊犯法輒思糾黨鬧署刦舖報復被獲之時復敢囑人刦獄且其平日好為結納浪博仗義之名以致未經謀面之人皆肯為其出力誠屬姦惡巨魁與光棍無二臣等再四確酌應将余猊照光棍為首定擬斬决餘犯照謀叛未行問擬庶情罪各得其當除現在繕疏具題外所有審擬該犯姦惡情形及從重問擬縁由理合繕摺奏明伏乞聖鑒謹奏此案人犯緝捕審擬均無枉縱題到之日有㫖廣東總督臣鄂彌達謹奏為恭繳硃批原摺事竊臣前具奏保舉原任普寕縣知縣藍鼎元一摺奉有硃批臣遵查得原任普寧縣知縣藍鼎元實非尋常之才前因署潮陽縣事被㕘其應追應賠各項俱係同官及士民代完一一清楚業經前督臣郝玉麟題明准部議覆奉㫖免罪此外並無不清之案除給咨藍鼎元親齎赴部聽候帶領引見外理合奏覆並将歴奉硃批原摺另封恭繳謹奏俟引見後有㫖諭部同日又奏為莠民感激聖化相率悔罪自新恭懇皇恩准予安插事竊照廣肇二府連界之百峰山匪黨勒抽花紅一案經臣等先後招撫陳亞滑等五十五名於本年九月初三日繕摺具奏奉有硃批臣等悉心籌畫粤省土疆衍沃四民藝業儘可資生而無頼者恒伏莽為活皆由前此地方官視若隔膜不加約束游手無業之故也人非木石誰自甘為匪類况令甲煌煌在有司亦無難區處惟仰體皇上仁育義正轉移化導盛心自可相安無事臣等摺奏之後續又招到黄傳連等四名復於九月十九日繕摺請㫖兩月以來山陬海角游手無頼之軰頗知悔悟從前失身攘竊感泣愧勵願為聖世良民自行投首絡繹不絶據廣州府屬之清逺縣解到賊首文亞長撫黨禤汝鵬等共十名新寕縣廣海營解到賊首李逢春撫黨朱亞女等共十二名香山縣解到撫黨林開運等二十四名咸聞聖恩寛大願乞改過自新俱與自首免罪之例相符臣等細思此等匪徒皆係饑寒所驅無知犯法非刦殺大盗可比既已嚮風革面似可許其自新若照例發遣他省未免安土重遷背去祖宗廬墓且南人不耐寒冷将以轉徙凍斃為憂而深山窮谷一二藏匿逃竄者亦将畏避不出反塞其自新之路臣等不揣冒昧恭籲皇恩准留本省安插通計百峰山先後招到匪犯五十九名清逺新寧香山三案共犯四十六名臣等派撥分發通省各營入伍當差每營不過一二名約束甚易其老弱朴愚情願耕種者分發在墾田處安插則有保甲業主約束亦不能復流為匪有恒産者有恒心為兵為農皆可安生樂業臣等再飭該管文武留心稽查勿為姑息斷斷不至擾害地方似可行之無疑縁係奉㫖斟酌允協事理謹㑹同撫臣楊永斌觀風整俗使臣焦祈年繕摺奏覆伏乞皇上睿鑒謹奏覽奏已悉斯事原命汝酌宜而行今既經籌思於地方有益無害斷在不疑照此辦理為是雍正十年十二月二十日廣東總督臣鄂彌達廣東廵撫臣楊永斌謹奏為奏明事竊照匪犯陳美倫曽合等在廣西梧州糾黨散劄潛謀不軌一案臣等於雍正九年十一月内查覺陸續拏獲審供俱經先後奏聞在案兹據布按二司審擬招解前來臣等㑹同嚴審已各分别首從按律定擬惟查曽合原供尚認康熙五十年正月十五日同病故大盗李士雄在廣東省城觀音山商謀搶刦又於康熙五十二年六月十九日同已故容得臣在新㑹外海祭旗謀叛兩案亦經録供奏聞兹審擬具題理應并叙但查曽合業於本案問擬凌遲處死而昔年為首之李士雄容得臣等臣等逐一細加確查俱已物故其餘脅從迄今二十餘年大半病故無存若一一根究則株累必多且恐姦民誣指善良借端生事臣等公同斟酌仰體皇上如天好生之深仁不揣冒昧将曽合止就本案歸結從前二案槩予免究庶無辜不致播害即反側無知之徒亦可自安除現已繕疏具題外所有曽合前供觀音山及新㑹外海二案未經叙入縁由理合繕摺奏明伏乞皇上睿鑒謹奏止就本案歸結甚是所奏知道了廣東總督臣鄂彌達謹奏為據實奏聞事竊臣一介庸材荷䝉聖恩超擢簡任封疆數年以來時刻留心人材苟有深知灼見練習吏治者臣不敢不據實奏任事在粤一載廵查各處山場甚屬詳細並未絲毫驚擾地方布政使甘汝來居心醇謹才具明晰得用敢據實奏聞伏乞皇上睿鑒謹奏覽硃批諭㫖巻二百十五之二欽定四庫全書硃批諭㫖巻二百十五之三硃批鄂彌達奏摺雍正十一年三月十二日廣東總督臣鄂彌達廣東巡撫臣楊永斌謹奏為奏明事竊查雍正五年以前粤東沿海地方疊遭水患無藉貧民頗多移往廣西四川二省及渡海至閩省臺灣謀生者而恵潮二府遷民更衆數載以来伊等各在彼地生聚力作其攜貲仍囘本籍者固不乏人而暫囘復去及搬眷同往者亦多計其来往之期俱在冬春二季上年十二月内據各州縣稟稱現有向年前往川省及西省民人兹囘原籍搬眷或迎父母以承歡或挈子婦以偕往或前有聘定之妻兹完娶同去者應否准其搬移等因前来臣等再三斟酌彼於數年以前既皆離别父母妻子前往彼地謀生置有產業若槩行禁止不准搬移則彼等兩地牽連室家不能團聚轉致失所伏念彼此皆係皇上疆土在彼在此俱為皇上任土作貢之民臣等公同諭令各州縣查明彼等實在四川粤西兩省置有產業歸接父母妻子而本籍生計維艱不如彼地者准其挈眷同去不必阻撓更出示曉諭土著居民原無親人在彼者不得信其引誘輕棄故鄉仍恐愚民誤信傳聞私自偕往復遴委幹員查察其有彼地竝無產業偶因誤信傳言輕去其鄉者即動支公項資給護送新設之鶴山縣及恩平開平等處墾荒給以牛具籽種竝給房屋居住為業總期居者行者兩得其所以仰副我皇上懐保之盛心所有料理事宜理合繕摺奏明謹奏為此前經降㫖嚴飭諒汝等尚未接到覽所奏大有回護掩飾形景廣東總督臣鄂彌逹謹奏為奏聞事竊照上年粤省早晚兩稻收成豐稔通省㑹計約有九分以上業經臣先後繕摺奏聞迨至冬日雨水缺少河道乾淺廣肇惠潮四府米價遂稍昻貴有至一兩四五錢者臣仰體皇上子恵元元至意㑹同撫臣飛飭開倉減價平糶又出示曉諭令有榖之家各出助糶分别奨賞富民亦俱鼔舞米價遂得漸平入春以來甘霖屢降二麥豐登河道流通西榖源源運到現在米價自六七錢以至一兩二錢百姓俱皆安堵樂業臣廵歴四郊插蒔秧苖甚是茂盛将來早稻仰頼皇上福庇可期豐收恐厪聖懐理合繕摺奏聞謹奏覽奏自入春以來甘霖屢降二麥豐登米價平減朕懐深為慰悦雍正十一年五月初十日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏覆事雍正十一年五月初一日内閣交出奉上諭朕聞有廣東民人擕老挈㓜前至湖南地方每日或二三百或四五百名口不等問其縁由云係恵州府人因彼處連被風潮傷損田廬禾稼上年秋間尤甚米價三錢一斗貧民難以資生是以前往四川覓食傭工種地等語此有人在湖南地方目暏情形奏聞於朕者諒非虚假鄂彌逹楊永斌身為地方督撫将恵州歉收艱食之處竟不奏聞亦竝不籌畫安插撫綏之法一任百姓盈千累萬轉徙異方深負朕之委任爾可傳㫖密行嚴飭其現在未曾出境之窮民可作速商量賑恤俾不至於失所其已經出境者有無招徠回籍之善策亦著悉心計議但不可勉强従事勒令搬回俾窮民更受苦累朕若冄經訪聞必加嚴處欽此遵㫖寄信前來臣等跪讀之下不勝悚惶伏念我皇上軫念邉海窮民不忍一夫失所臣等身任封疆所司民事敢不悉心辦理竊查粤東雍正五年以前疊遭水患無藉貧民頗多移往廣西四川二省及渡海至閩省臺灣謀生數載以來伊等各在彼地生聚力作歴年皆有回籍搬眷之人而上年冬間比往年較衆據各州縣稟報應否准其搬移前來臣等公同斟酌謹仰體皇上保民如赤使民各遂願欲之盛心諭令各屬確查實在四川粤西兩省置有産業歸接父母妻子完娶而本籍生計不如彼地者准其同往不必阻撓更出示曉諭土著居民原無親人在彼者不得信其引誘輕棄故鄉復委惠州府知府吳簡民等擕帶公費銀兩於入川總路稽查又委布政司經歴趙𢎞文等亦帶公費銀兩於入粤西要路一例稽查分别放行招回業於本年三月十二日将料理事宜繕摺奏聞續恐貧民尚有不由要路別趨小徑偷越者又委長樂縣典史郭啟潤等俱擕帶公費銀兩前往湖南以及川省西省一帶地方沿途查察如有仍願回籍者即給以路費送回鶴山給以籽本墾耕續據西省招回民人二百八十三名口湖南招回民人一百零八名口俱經分發恩平開平鶴山三縣墾荒之處安插現在俱各樂業安居其西省現有親屬願留本地耕種者已經委員前往查明俱各得所至入川各民未知在彼是否安業亦經委員前往查察又将各户繕造冊籍咨明川省撫臣行查因川省距粤甚逺尚未准有咨覆是以招回各情由未經續奏再查粤省上年雖閏五月七月兩次颶風實無損於禾稼業經臣等分別兵民竈丁動撥公項按名賑給俱各得所且查往川及往西省者皆係恵州之興寧長樂龍川和平永安及潮州之程鄉羅定州之西寧七縣民人各該縣俱係山邑竝未稍被風潮上年收成俱有八分以上即惠州所屬上年秋間惟長樂米價最貴然每米一石價亦不過一兩一錢臣等㪚賑開倉數日之内旋即平減竝無三錢一斗之説伏念我皇上恵鮮懐保一夫不獲皆厪聖懐偶報災眚随加賑貸此天下臣民所共知者臣等才薄任重時切戰兢惟有仰體皇上勤恤民依之至意時時悉心體察於地方大小事務俱早夜商酌其闗係稍輕臣等知識可以辦理者即料理妥協一面奏聞其有闗係重大則一面料理即據實奏聞何敢隠諱不言此案止因川省尚未覆回是以尚未續奏遲延之罪實所難寛縁奉㫖嚴飭事宜理合據實奏覆伏乞皇上睿鑒臣等謹合詞繕摺具奏覽覆奏各情節究未免有粉飾㾗跡廣東總督臣鄂彌逹謹奏為水師人才難得據情奏聞仰邀睿鑒事據原任碣石鎮標左營遊撃許元原任恵來營守偹李盛呈稱為罣誤事有可原犬馬報主情切恭懇代題俾得及時效力以贖前愆事竊元等生長閩疆熟識水性恭䝉聖恩拔擢待罪粤東其居官之勤惰被㕘之原委諒已乆在洞照之中無庸復辨竊查閩省督部院於上年秋冬之間檢選因公罣誤弁員咨送天津水師效力元等以尚在粤東未得與選伏思閩粤皆屬一體兩省大憲皆可為國用人元等年力精壯水師船務自幼素嫺冒昧公懇題請俾得及時效力稍竭駑駘仰酬聖恩於萬一則元等感激無既矣等因到臣據此該臣查得原任碣石鎮左營遊擊許元因雍正九年六月十三日該汛海面有閩省徐萬發商船被風打沉許元督兵救活六十餘人又雇船撈獲客貨給主料理尚屬盡心因偶有一二兵民於沙中撿得零星貨物該鎮蘇明良禀報以為許元約束不嚴許元一時浮躁急欲赴省辯寃該鎮随以擅離汛守咨㕘革職至原任恵來營守備李盛雍正八年以該備熟諳水務題調虎門協右營守備尚未到任因雍正八年十二月内恵來縣拏獲土惡黄髙飛經過該備駐防之隆江汛前任提臣王紹緒因該備致送髙飛酒飯以為必與髙飛有交好私情咨叅革職查黄髙飛一方巨棍被獲之後自知難免兩日不食欲圖自盡李盛與該縣密商安慰給髙飛等酒飯令其飲食無非欲得活犯解到上司審明正法竝無他故臣向經訪聞復細詢恵來縣知縣張玿美據云致送酒飯一事原係弁令相商共知共見其實李盛竝未與髙飛有交好私情查二員居官聲名俱好又皆年力精壯而以一眚廢棄終身甚屬可惜今據二員具呈前來臣未便越例具題伏念我皇上愛惜人材㣲長必録應否給咨赴部聴候揀選之處臣未敢擅便謹繕摺奏聞伏乞皇上批示遵行為此謹奏許元李盛二員給咨送部引見可也同日又奏為謹籌便益貧民買食之法仰冀睿鑒事竊查米價騰貴皆由囤户居竒彼等開張米舖惟利是圖往往揑作謡言增長米價或云風為旱兆或云雨係水徵一日之間頻增價值一店長價諸店皆然名曰齊行莫敢異議富民家有蓄積任其髙擡於已無損惟手藝貧民終日拮据不供口食盖肩挑負販為人傭工一日所得無㡬即遇官府有平糶倉榖不過一升半升日糴日食而已無力多買又不能户户有碾米之具且以終日碌碌竝無餘暇故寜貴價向米舖糴米非不知官賣榖石價賤不得已也若欲惠此貧民無如官開米局臣生長京師目擊八旗自皇上降㫖設立米局以來歴年米價皆未昻貴總由米局價平故囤户不能射利法良意羙實可通行伏念粤東省㑹之區貧民待哺尤衆姦民乗機射利往往髙價病民臣擬於粤東省城設立米局三處南門設一米局動廣州府倉榖以該府倉大使管理東門設一米局動番禺縣倉榖以該縣典史管理西門設一米局動南海縣倉榖以該縣移駐之縣丞管理各局将日逐糶賣數目每日摺報該管府縣稽查該府縣十日一報司道存案仍令糧驛道不時查察其米價則額定倉斗一兩一石永成定例無減無増倘市價減至一兩以内仍聼民向各店買食市價稍昻即照定價一兩糶賣其赴局零買者用銀用錢聴随民便仍不許買至一斗以外致啟販賣之端賣出價銀則令随便赴榖賤地方採買源源轉運夫價有定額則胥吏無所容私局既常開則囤户無能専利一切肩挑負販傭工覓食之人三五零錢取擕皆便矣至各府郡城即将府倉榖石碾米開局比照省局之例仍責令該管道員稽查似亦可以一體通行臣為窮民艱於零買稻榖起見是否有當伏乞皇上訓示遵行謹奏平糶不過暫濟一時設局即堪行之永久此奏殊屬可嘉雍正十一年七月初一日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為猺人情性逈殊因俗權宜立法據實奏明仰邀睿鑒事竊查五刑之設笞杖為輕駢斬極重人雖窮兇極惡言及斬決無不寒心獨猺人則畏鞭朴不畏斬殺習俗相沿以為斬首不失為好漢若一受鞭朴則不可以對其祖宗粤東各山猺性俱係如此臣等初聞此言疑為荒誕及細加訪察始知此語非誣若欲懾其邪心莫如惕以所畏查雍正十年十二月内據韶州府乳源縣申報該縣十二月初八夜大布村民黄宗玉家被刦傷死事主之兄黄宗和一案陸續緝獲盜犯皆係猺人據該縣府司道起獲正贓歴審明確律擬招解前來查本案盜夥八人趙雲秀為首起意趙雲武刀斫事主致命三傷盤端賤銃殺事主律應斬決均為法所難宥趙端滿趙友官同行分贓亦應斬決但未下手傷人情尚可原趙大端趙雲偉被誘入夥趙端倫年未及嵗同行而未上盜止於途中偷宰牛隻應照偷牛例另結臣等細加覆審亦無異詞現在酌核具題理應循例候㫖正法但猺人畏鞭責而甘斬決是必惕以所畏然後不敢為非臣等㑹同司道再三斟酌查趙雲秀趙雲武盤端賤三犯强刦殺人原無可寛擬将此三犯發回該縣令廣南韶連道㑹同韶州府知府乳源縣知縣将三犯帶至大布村中𫝊集猺甲猺目猺衆立斃杖下以儆衆猺其趙端滿等雖律應斬決尚可寛減仍候部覆發落實因猺性逈殊欲得民安盜息不得不因地制宜理合據實奏聞再查猺人住居俱係宻箐深山從不往來城市以故聲教不通雖經臣等設立猺甲猺目然無専員料理亦未妥協經臣等酌議将韶州通判題請改為理猺通判専司化誨稽查倘䝉俞允将來自可聲教漸通矣粤東士習民風近來頗知慕義惟猺人尚須整理臣等身任地方自應料理妥協是否有當伏乞皇上睿鑒施行臣等謹㑹同繕摺具奏杖斃與斬決同一正法也既無滅口銷案情弊何為不可卿等酌量合宜辦理仍照例具疏題奏廣東總督臣鄂彌逹謹奏為恭報粤東早稻收成分數仰祈睿鑒事竊惟粤東山海奥區所種田禾收成兩次必得雨暘時若百榖始獲豐登今春播種之時雨水俱皆優渥早稻業已登場兹據布政使甘汝來将各屬早稻收成分數彚報前來臣查廣州府屬清逺花縣従化收成約九分順徳香山三水增城皆八分以上收成番禺新安新寧東莞龍門收成約八分南海新㑹皆七分以上收成南䧺府屬保昌始興二縣雖四月蛟水稍漲核計猶有八分收成韶州府屬曲江仁化等六縣收成皆八分上下惠州府屬歸善連平等十二州縣皆八分以上收成潮州府屬海陽潮陽饒平普寧澄海鎮平六縣收成皆九分以上揭陽程鄉二縣收成俱約九分恵來大埔平逺皆八分以上收成肇慶府屬髙要陽春恩平四㑹鶴山五縣收成皆九分開平開建收成八分以上髙明徳慶廣寧陽江封川皆八分收成新興一縣計七分以上收成髙州府屬茂名電白等六州縣收成皆九分上下雷州府屬海康遂溪徐聞三縣俱八分收成㢘州府屬合浦欽州靈山三州縣收成皆八分以上瓊州府屬澄邁文昌感恩崖州樂㑹五州縣俱八分以上收成㑹同萬州儋州臨髙昌化定安陵水七州縣收成俱七分瓊山一縣約有六分收成羅定州屬東安西寧三州縣收成俱九分連州所屬除連山係一年一熟向無早禾無憑開報外該州及陽山二州縣俱九分以上收成至各屬米價每石自六錢起以及一兩不等今新米上市價值日平此皆由我皇上敬天勤民精誠感格是以邉海蒼生咸䝉樂利臣不勝踴躍懽忭之至理合繕摺奏聞謹奏覽粤東早稲收成分數曷勝欣慰皆縁卿等忠誠任事有以感召天和所致朕為濵海窮黎實深慶幸同日又奏為遵㫖奏覆事雍正十一年五月初十日據潮州鎮總兵官范毓䭲寄到請令營兵照伊河北鎮任内各於本藝之外兼習長鎗短棍連接棍等項一摺奉硃批與督提商酌再定欽此臣等謹㑹同悉心商酌伏查兵丁習用器械務須因地制宜始於營伍有益粤東山海交錯陸路則峻嶺崇山林箐䆳密水師則内河外海港汊多岐與中州山陜諸省地勢平衍者不同兵丁執用器械惟鳥鎗最為便利其次則弓箭籐牌挑刀大礮等項先經前任督臣郝玉麟題准陸路毎兵一千設鳥鎗手五百名水師每兵一千設鳥鎗手六百名其餘弓箭籐牌挑刀大礟等項均勻酌配而礮手兵丁又令兼習扁刀以偹應用此誠因地制宜有益軍務現今各營兵丁俱皆遵照設立該管将弁若能訓練精熟無論水陸逺近儘可臂指相資至范毓䭲所稱長鎗連接棍等項止可用於平原曠野與粤地不甚相宜又况兵丁技藝専則易精多則難熟本藝按期操演尚難望其嫺熟再令兼習别技恐本藝反致生踈似非整練軍實良法臣等愚見以為兵丁習用器械仍應遵照原題定例惟責成該管将弁勤加操演如果技藝専精官則記功兵則優賞其或生踈疲弱官則嚴㕘兵則責革考核公明信賞必罰人人各精本藝自成强勁之師臣等謹按地方情形和衷商酌是否允協恭候聖裁指示遵行臣謹㑹同廣東提臣張溥合詞具奏伏乞皇上睿鑒謹奏所奏是凡如此等條陳當諒其初任地方未諳情形而嘉其肯言之志若稍露鄙薄詞色則阻遏言路矣極宜留心毋忽同日又奏為遵㫖奏覆事竊照廣東布政使甘汝來以粤省換貯抵帑硫磺行匠買運過多請核定觔兩數目由督撫給票買用等由具奏奉硃批言之該督撫酌定奏請欽此欽遵查得粤省各標協營以及舖户行匠需用磺斤向來俱由布政使給票赴廣州府理事同知局内領買而理事同知局貯硫磺則由撫臣給票該同知差委員役赴湖廣等處産磺地方買運回局銷售近因原任貴州撫臣金世揚運粤變價抵帑水銀尚餘一百三十一石無人承買適夷商榮貽觀装載硫磺到澳經陞任布政使王士俊詳明将未賣水銀易換硫磺八百石計重九萬三千二百七十四斤運交廣州府經管凡標營行匠需用帑磺仍由布政使給票買運收價抵帑此歴來銷磺之舊例也但由布政使給票買運誠恐武弁玩視經過塘汛盤詰稍踈弊端易起甘汝來奏請核定數目由督撫給票銷運之處甚屬妥協上年十月内據甘汝來呈詳臣等業将每嵗各行匠應買磺斤較數嵗之中以為常斟酌核定數目不得核外多買通行飭知其行匠與標營買運之時俱令該管文武用印文報臣衙門核給照票行廣州府收價兑發限期繳票回銷仍通飭所屬塘汛騐票放行倘有夾帶私買情弊立拏觧究較前頗為嚴密實可永逺奉行惟查本案帑磺原係九萬三千二百七十四斤自雍正九年八月起至雍正十一年五月止通省標營行匠陸續共銷運過六萬七千餘斤尚存磺二萬五千餘斤此項帑磺銷完之後臣等擬照買運硝斤之例先行動項委員往産磺地方買運回局標營行匠仍照例令該管文武具文報明由臣衙門給票赴局領買其由布政使給票之處永行停止如此則稽查嚴密似可杜夾帶私販之弊所有臣等酌定情由理合繕摺奏覆是否允協恭候聖裁指示遵行臣謹㑹同廣東撫臣楊永斌合詞具奏伏乞皇上睿鑒謹奏粤省硝磺即照此議辦理嗣後永著為例雍正十一年八月二十五日廣東總督臣鄂彌逹廣州将軍臣柏之蕃廣東提督臣張溥謹奏為遵㫖奏覆事雍正十一年三月十一日臣柏之蕃摺奏標下緑旗四營兵糧缺出請将八旗壮丁與四營餘丁相間挑補一案奉硃批與鄂彌逹張溥詳細商酌奏請欽此欽遵臣等伏查雍正七年十一月内欽奉上諭嗣後将軍標下緑旗兵丁缺出即将漢軍餘丁頂補仍食綠旗糧餉如綠旗兵丁内其祖父食糧年久者其缺既令漢軍頂補則伊等子弟不得食糧未免衣食無資著於本省督撫提鎮標下并同城附近營汛内有開除名糧即将此等之人充補欽此欽遵仰見我皇上睿慮周詳無㣲不至體恤兵丁至周極當臣等凜遵奉行何容另議但查駐廣八旗壮丁陸續巳頂補将軍標下緑旗兵缺二百六十七名惟緑旗壮丁内多有倚靠食糧之父兄同居度日彼此相依不能逺就别營兵糧者雖人材壮健而拔補無階亦屬可惜臣等仰體我皇上軫恤兵丁整練軍實至意謹㑹同詳細商酌分别料理查将軍標緑旗四營共額兵三千四百六十七名内食糧二十年以上者七百三十三名不及二十年者二千七百三十四名今議食糧二十年以上者念其效力年久所出糧缺仍准伊等子弟頂補其食糧不及二十年者遇有糧缺即将八旗壮丁挑補至於緑旗壮丁除頂補伊等食糧二十年以上之父兄兵缺外其餘各丁查其有父兄不能分居異爨者咨送同城之撫標及廣州協標入伍其無父母可以移居逺出者咨送附近省城之左翼鎮標入伍俱於本營四缺内以将軍標營緑旗壮丁拔補一缺如此則八旗壮丁與綠旗壮丁俱得糧餉飬贍而旗營均收精健之用共沐聖恩於無既矣是否有當恭候皇上指示遵行臣等謹㑹同合詞具奏所議合宜如應具題具疏題請若無庸經部存案汝等既經㑹奏奉有批諭即遵照施行亦可廣東總督臣鄂彌逹廣東提督臣張溥謹奏為鎮臣庸惰乖張任意勒派據實奏明仰邀睿鑒事竊照總兵一官有統率将弁訓練兵丁之責必須勤慎嚴明正已率屬始於營伍有裨詎有左翼鎮總兵官李萬倉者怠肆性成勒派任意操練兵丁弗躬弗親雍正十年十一月即聞該鎮令家人朱大成與中軍逰撃劉世爵對坐看操臣等猶以為或該鎮身有疾病偶一舉行詎意該鎮視為成例本年四月以至七月凡遇操兵之期皆不親往教塲看閲陸兵仍令家人朱大成代操水師則令家人鮑二代操而朱大成鮑二等亦即恣睢自大公然與逰撃竝坐竝行指揮叱咤守偹以下動輒辱罵聼操兵卒鞭撻妄加各營洶洶不平㡬至醸成事端又惡在城各卒衣服新舊不等勒令三營将弁先捐銀兩交中營外委李欣榮買布另換每疋價銀二錢八分每兵二名領布三疋做袍二件每袍一件扣銀四錢八分八釐以至五錢三四分不等勒限兩月内月餉扣回其餘外汛兵丁袍帽勒令千把代製亦於月餉扣回適值五六兩月青黄未接城汛各兵甚屬苦累又該鎮不勵㢘隅好為結納所轄屬縣吏員李文懿不過稍有家資該鎮遂與聫締宗譜親密往來以致兵卒訕笑更屬非體似此卑汚乖惰溺職之員海疆重地斷難姑容貽誤臣等不敢徇隠理合據實奏明伏乞皇上睿鑒臣等謹合詞具奏李萬倉怠肆溺職知道了已有㫖諭部矣廣東總督臣鄂彌逹謹奏為恭謝天恩事雍正十一年七月二十五日内閣寄到雍正十一年六月十七日奉上諭鄂彌逹之子勒世馨年齒尚㓜清話尚未學習問其漢文亦僅讀完四書所學甚淺尚須著實教導著仍留伊父任所俟再學習三二年送京請㫖爾等可傳㫖與鄂彌逹欽此遵㫖寄信前來到臣本年八月初二日内閣又寄到本年六月二十七日奉上諭鄂彌逹之子勒圖渾著往伊父任所令其用心教導朕看鄂彌逹二子俱甚屬平常雖令隨任亦不能幫助伊父辦理家事爾等可寄信與鄂彌逹令其加意教導務令成人欽此遵聖主洪慈加意教導務令成人以圖報皇恩於萬一所有感激㣲忱理合繕摺奏謝謹奏覽雍正十一年十月初四日廣東總督臣鄂彌逹謹奏竊照粤東恵潮二府民人歴年俱有往來廣西四川二省及挈眷前往彼地入籍居住者而上年冬間為甚臣據報業於本年正月委員前往入川及入粤西要路稽查竝飭各該縣查造遷民清册咨明兩省撫臣行查經於本年三月十二五月初十等日奏明在案猶恐各縣仍有無業貧民復思出境隨諭各州縣多方曉諭凡素無恒産者令其自行報明給貲送至恩平開平等處耕種更於入川要路如恵州之和平連平龍川韶州之樂昌仁化各縣多張告示稽查招徠兼預發公項銀兩存貯各縣遇有入川民人支給資送來省分發墾荒據各該縣報稱自五月以至七月竝無入川民人經過兹於八月二十九月初一等日據龍川長樂二縣禀稱有入川民人一起三百餘人結夥同行該縣親往勸諭各衆啼哭呌號共稱皆有祖父兄弟在川前往團聚俱不肯回雖給以路費船隻俱不肯受該縣以彼等非同罪犯不便過嚴只得聼其前往止勸回十一人等語各到臣細加確訪查得此項民人原非盡係無業貧民止因雍正五年以前粤東民人入川成家者甚衆皆時有信息往來回粤接取親屬前往完聚又有棍徒聳動引誘從中覓利包攬引路送人入川揚言川省膏腴每田種一石可收糓百餘石百物俱賤易於資生以致愚民垂涎賣棄現在産業挾貲而行雖多方曉示給以房屋居住田土墾耕無如彼等惑於川省逸樂之説不願本省墾荒又恐散行勸阻竟寫傳單㑹衆同行查粤東現在早稲收成甚属豐稔雖米糓最貴之州縣每石時價不過一兩晚稲茂秀盛於早稲民間日用原無艱苦而愚民易惑難曉猶復輕去其鄉臣據報除委員擕帶公費銀兩前往招徠如願回籍者給貲送至開平墾荒其實有父兄在川不肯回者委員給照護送往川親至川省查明安插一面再行出示密諭各州縣查明無産業者即資送至省給貲安插竝預委糧驛道陶正中於有可墾荒地處所多造屋宇便民居住一面仍将引誘棍徒密行查拏外理合據實奏明伏乞皇上睿鑒謹奏民不懐土輕棄故鄉此惡風也當竭力挽回母使任意流蕩同日又奏為恭繳硃批原摺事竊臣㑹同提臣張溥議覆潮州鎮總兵官范毓䭲條陳兵丁令於本藝之外兼習别様器械不便定為章程一摺奉有硃批仰見我皇上明目逹聰芻蕘必採臣等荷䝉聖訓諄切誥誡嗣後益當虚懐集益不敢稍露鄙薄詞色以仰副皇上廣開言路之盛心所有奉到硃批原摺理合恭繳謹奏實能如此存心始克稱集思廣益也雍正十一年十一月十五日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為勞臣遺澤在人龥懇破格加恩以酬懋績以愜輿情事竊查有原任粤東撫臣王來任者念切民瘼澤入人心距今六十餘年老幼謳思常如一日臣等涖粤以來濵海耆民屢經環轅攀輿龥題加封祗因王來任曾因京察自陳罷免從前歴任督撫俱以與例不符致下情未能上逹臣等伏查王來任於康熙四年莅任粤東兵燹甫靖民困未蘇又平靖兩藩軍興供億徵派浩繁每嵗虚糜國帑二百四十餘萬復因海氛未靖議者特嚴邉界濵海五十里禁民毋得居住往來頻年轉徙一遷再遷蕩廬舍為平原棄膏腴為荆莾採捕者謀生無策煎曬者度日無資縮地移民因噎廢食王來任甫及下車疏除六害周詳剴切俱䝉聖祖仁皇帝俞允其卓卓可述者開數萬頃良田而流民安集裁百餘萬兵餉而國課充盈汰雜派以恤民財而正供無缺革夫役以紓民力而南畝有秋嚴扳誣而善良安枕禁抽剝而市鎮寧居諸如消弭反側善政多端迨康熙七年間王來任病篤垂危遺疏展界䝉聖祖仁皇帝恩准弛禁哀鴻初定共慶再生凋瘵之餘羣登袵席宜其流澤綿長環海尸祝也及病卒之日白叟黄童環轅號泣家懸遺像户供名牌愛敬之誠久而愈篤兹復據各府州縣紛紛呈詳前來臣等查王來任籍𨽻奉天其子孫之貴賤有無俱已無從稽訪而粤中耆老匍匐再三仰希綸誥之褒揚冀顯勞臣之功績民情如此益信直道不冺亷吏可為伏念我皇上崇徳報功凡大吏實心愛民勤勞為國俱得入賢良祠以昭恩眷若王來任興利除害輿論僉同布徳當年邀榮此日似應懇恩優䘏復職加封崇祀賢良以慰輿情以旌功徳者也縁王來任曾經自陳罷免不便冐昧具題可否不拘成例格外褒崇併應否另行題請之處伏乞皇上批示遵行臣等謹合詞具奏具疏題請可也同日又奏為恭懇聖恩准留鹽場効力事竊照原任肇慶府通判朱瀚經前撫臣傅㤗借補惠州府屬歸善縣知縣嗣於雍正八年到任後見該員才非肆應歸善為恵州附郭首邑恐難以勝任隨将該員調補瓊州府㑹同縣給咨送部引見該員於上年三月回至粤省正擬到任接准部咨以該員歸善縣任内失察賭具例議革職隨經臣等援例題請留粤以知縣以下酌量委用䝉恩俞允續又因該員歸善縣任内先有失察陳理等誣良為盜一案本年八月復准部咨革職在案查該員才具雖非敏幹居官猶無劣蹟兩次㕘革俱屬因公罣誤且年力尚强堪供驅策臣查粤東塩場在在需員料理從前效力各員俱經陸續期滿現在需員接管朱瀚勤謹小心在粤年久風土熟悉料理塩場事務尚可勝任仰懇聖恩准其在場效力三年之後如果實心報效另行具題請㫖開復彼斥革廢員復䝉天恩留粤委用自必愈加感奮矣為此繕摺奏明仰邀皇上睿鑒倘䝉聖恩俞允伏乞敕部查照施行臣等謹合詞具奏據奏朱瀚原係調簡之員復經兩案革職其庸常可知況鹽場事務弊竇多端必精明强幹方能搜剔豈勤謹小心四字所能勝任朕意以為此舉無益汝其再加斟酌廣東總督臣鄂彌逹謹奏為恭報粤東晚稲收成分數仰祈睿鑒事竊照粤東地方仰頼皇上洪仁雨暘時若目今晚稲業已登場萬民樂業四野歡騰兹據布政使甘汝來将各屬晚稲收成分數彚報前來臣查廣州府屬南海畨禺東莞順徳新㑹香山清逺花縣收成俱九分龍門增城新安新寜三水收成俱八分從化縣計有十分收成南䧺府屬保昌始興二縣收成俱九分以上韶州府屬曲江仁化二縣收成俱七分樂昌乳源英徳翁源四縣皆八分以上收成恵州府屬歸善博羅海豐陸豐河源龍川和平連平永安長寜等十州縣俱八分以上收成潮州府属海陽潮陽掲陽饒平普寜澄海大埔恵來等州縣俱九分收成肇慶府屬徳慶髙要開平恩平廣寜四㑹鶴山收成俱九分髙明縣收成約七分新興陽春陽江封川開建俱有八分收成髙州府屬茂名信宜化州石城收成皆九分電白縣計有十分收成吳川縣約有八分收成雷州府屬海康遂溪徐聞三縣均有九分收成亷州府屬合浦欽州靈山三州縣收成俱九分以上瓊州府屬瓊山澄邁儋州臨髙㑹同樂㑹崖州陵水萬州安定文昌感恩昌化等州縣俱八分以上收成嘉應州平逺鎮平收成俱九分興寜長樂約八分以上收成羅定州計有九分收成東安西寜二縣收成皆九分以上連州收成約有八分以上陽山連山二縣均有九分收成至各屬米價每石自五錢八分以至一兩不等今新米上市價值日平皆由我皇上敬天勤民精誠感格是以海隅蒼生咸䝉樂利臣不勝踴躍懽忭之至理合繕摺奏聞伏乞皇上睿鑒謹奏晚稻收成分數米糧價值情形以手加額覽焉凡此莫非卿等公忠任事能令盜息姦消民情暢遂有以感召天和之所致比年以來粤東嵗豐米賤實為向日所罕聞者際此休徵當愈加寅畏更勉公忠不可稍萌盈滿恣肆之念也戒之敬之雍正十一年十二月初四日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為遵㫖奏覆事竊照廣東布政司甘汝來以瓊州府属距省遥逺各營兵餉請就近撥交海南道員收支等由具奏奉上諭布政司衙門為一省錢糧總滙各營兵餉俱應由司庫給發若圖省便就近支領将來必滋弊端此乃必不可行者惟是廣東瓊州去省一千六七百里且往來渡海與内地不同似應變通辦理著甘汝來将伊所奏及朕此㫖與督撫閲看悉心定議具奏欽此欽遵仰見我皇上睿慮周詳杜弊防微之至意伏查瓊州距省甚遠又復隔海各營夏秋冬三季兵餉向來原係将該府各属地丁就近撥給由瓊州府知府支放止緣撥給不敷是以春季仍赴司庫支領業於雍正九年經前督臣郝玉麟㑹同臣鄂彌逹題明准部議覆遵行在案今據甘汝來奏請嗣後每年由布政司衙門撥定各州縣地丁數目改交海門道衙門收支按季散給每年銷算兵馬錢糧之時由該道造冊移付布政司報銷其瓊屬每年地丁不敷支給之數查粤省海闗經收海口税銀每年不下三萬餘兩可以就近撥兑充支等語臣等悉心商酌瓊州歴年兵餉夏秋冬三季原撥該府地丁就近支給惟春季仍行赴省領支甘汝來議請交海南道員收放不敷銀兩以海闗税銀兑支既免逺渉風濤不虞遅誤兼有道員經理無慮侵那所議尚屬妥協應如所請變通辦理将向來夏秋冬三季兵餉由該知府支給者今統歸該道收放以専責成至每年銷算届期該道仍冊送藩司滙總彚報其各州縣解交道庫之時并令造冊報明藩司存案臣等仰承聖謨因地制宜事属可行理合奏覆再查奏銷仍由藩司彚報於定例原無更張應否止将縁由咨部存案無庸另行定例之處伏乞皇上批示遵行臣等謹合詞具奏瓊州各營兵餉照所議行其兑支收放等務應具題者具疏題請應咨部者咨部存案同日又奏為據情奏明仰祈聖鑒事據原任肇慶府知府楊以寜呈稱以寜由舉人選授四川温江縣知縣雍正二年出口管理义木多糧務雍正四年引見奉㫖以廣東緊要知府缺用雍正六年補授肇慶府知府因前署羅定州任内經手倉榖未清被𠫭又因阿附阿克敦擬斬監候待罪囹圄已經六載本年秋審荷䝉皇上天恩改列可矜減等發落此後犬馬餘生皆頼聖恩再造自揣年力未衰冀圖報效情願帶子捐職州同楊錡前赴軍前效力贖罪伏乞題逹等情到臣等據此隨查楊以寜於雍正二年出口管理糧務與前督臣郝玉麟司在义木多地方共事數載郝玉麟曾向臣等言及楊以寜辦理軍需尚屬妥協今幸䝉聖恩已将楊以寜從寛減等臣等查楊以寜才具可用年力未衰且曾在軍前數載諳練邉情與其安插為民置之閒散不如令其效力圖報國恩今據楊以寜情願帶子前往軍前情詞懇切臣等謹據情奏聞可否送部引見命往軍前效力贖罪伏乞皇上批示遵行臣等謹合詞具奏巳有㫖諭部矣同日又奏為人才難得據情奏聞仰祈睿鑒事雍正十年四月内據原任廣東按察使黄文煒詳稱據原任海豐縣知縣王者輔呈請願赴軍前效力仰報聖恩等情經行恵州府查議去後隨據恵州府知府吴簡民覆稱查得原任海豐令王者輔任事時操守潔清辦事敏決盜賊屛跡塵案俱清海豐士民至今愛戴以故其應賠銀一千三百餘兩皆百姓争先代納其致罪事由實縁雍正五六兩年粤東州縣尚未議給飬㢘一切公捐又皆派於州縣該令火耗税契照舊徵收俱屬辦公非同入已有案可查今該令因賠項已清得邀減等感激聖恩願赴軍前效力雖無成例可援但該令年力强壮辦事精明實属有用之才相應俯如所請轉懇題逹等情到司轉詳到臣等據此查該令在粤居官實心任事聲名甚好臣雍正八年初到粤東即巳訪聞臣署向無幕客因於上年五月内将王者輔𫝊入署中令其料理一切事務細加觀察今試看已将二載實属人品端方辦事敏練且於粤省情形以及營伍鹽政均能熟悉似此有用之才廢棄殊屬可惜臣仰體皇上愛惜人才寸長必錄之至意謹繕摺據實奏聞可否将王者輔送部引見恭候皇上批示遵行再查該令係江南天長縣人由生員保舉於雍正五年三月内引見奉㫖王者輔著補授海豐縣知縣人甚去得著行知該督撫欽此嗣因與恵州府知府張象乾互掲幷㕘治罪贓完減徒於雍正九年到省城五仙驛已将滿限合并聲明臣謹㑹同撫臣楊永斌合詞具奏備叙願赴軍前效力情詞具疏題請同楊以寜一併送部引見硃批諭㫖巻二百十五之三欽定四庫全書硃批諭㫖巻二百十五之四硃批鄂彌逹奏摺雍正十二年二月初四日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏明事雍正十一年八月二十八日内閣寄到四川督臣黄廷桂撫臣憲德㑹奏裁汰勇健兵丁簡居仁假冒外委把總職銜一摺奉㫖黄廷桂憲徳奏摺可抄錄寄與各省督撫閲看著留心訪察若勇健營裁汰回籍之兵丁有生事不法及假冒職銜者著地方官嚴拏遵照前㫖従重治罪不許寛貸欽此鈔寄到臣等准此遵查粤東原選送勇健兵丁七十名在京挑退五名在陜挑汰二十一名俱已陸續回粤當經飭令回籍安業在案兹奉諭㫖著臣等留心訪察遵即宻查去後随據各該地方官覆稱現在汰回兵丁俱各守分安業竝無假冒職銜亦無生事不法除宻諭各該地方官仍不時加意訪查無得徇縦外理合繕摺奏聞伏祈皇上睿鑒臣等謹合詞具奏此輩行止率多不端須加意訪察毋忽汝等於從前選送時糜費過當咎已難辭若再失於徇縱則不知汝等具何面皮而不愧赧也同日又奏為奏聞事竊照粤東地處海濵颶風時作然或旋發旋止是以民間不致漂揺兹於雍正十一年九月十四日據髙州府詳報本年八月二十一夜吳川縣地方颶風陡作大雨如注潮水湧漲兵民房屋倒塌者一百四十三户其尚堪修葺者六百五十八户吹去上盖者一百一十八户商漁船漂沒者一十七隻其擊破尚堪修理者九隻淹斃男婦二百三十一名口災傷田禾四頃八十四畝又石城縣地方飄失漁船三隻飄沒水手三名又據雷州府詳報遂溪縣地方八月二十一夜颶風陡發倒塌民房三十九户其坍塌尚堪修葺者二百一十六户吹去上盖者五十三户商漁船飄沒者八隻其擊破尚堪修理者二十八隻淹壓身死男婦八十二名口又海康縣地方擊壊漁船六隻淹斃水手二名嗣又據護理髙雷㢘鎮總兵印務姚源忠呈報電白吳川􅚑州海安各營寨礮臺戰船多有損壊各到臣隨即飛委髙雷㢘道毛世榮㑹同各該府擕帶存公銀兩星往被風各縣賑恤去後嗣據該道呈報遵即親詣各處分别賑給查沿海居民房屋被風損壊者皆係草房全塌者每户給銀一兩其尚堪修葺者每户給銀五錢吹去上盖者每户給錢三百文修理已經足用至田禾被傷者每畝給銀一錢商漁船全壊者每隻給銀三兩其尚堪修補者每隻給銀一兩五錢淹斃男婦每名口發銀四兩給各親屬以資殯𦵏實共賑恤銀一千三百七十三兩零按户支給俱各得所至損壊礮臺等項俱經飛飭該管文武勘估動項修理各在案嗣於十月二十二日又據瓊州鎮臣李順呈報本年九月十八二十三等日瓊屬地方颶風驟雨各協營寨城垣垜口礟臺營房烟墩望樓多有損壊又北洋地方有商船被風飄流抵岸飄失水手三名等因到臣隨飛檄瓊州府確查詳報併照髙雷一例賑恤去後嗣據該府報稱查得被風擊碎商漁船二十八隻擊損船二十一隻淹斃九人其生存難民皆已捐給口糧逓送回籍所費無多無庸動支公項田禾仍有八分以上收成其營房等項現在估計請領藩庫公項修理等由到臣據此除行回加意撫恤無使一夫失所致厪聖懐併刻期鳩工速将營房等項修整具報外所有髙雷瓊三府前後被風情形及臣等委員賑恤縁由理合繕摺奏聞伏乞皇上睿鑒臣等謹合詞具奏粤東近年以來颶風頗甚汝等當體究致災之由講求消弭之道抑或建立風神祠修省籲禱仰邀神明佑庇永息狂飈恵此下民然非國之常典作汝等意見從俗賽祀庶㡬合宜雍正十二年二月十九日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏聞事本年正月初十日據潮州府普寜縣禀稱上年封印後訪有掲陽縣人陳武瑞散符惑衆當即拏獲到案搜出紙符四十五張符上鈐盖木印有天圓泰寳字様除現在密拏黨羽訊究外理合禀明等因連繳紙符到臣等隨即密行潮州鎮潮州府確查夥黨毋任匪徒脱無辜牽累并星飛㑹委臣標把總黄雲龍增城縣廵檢張中立前往協同地方官嚴查密訪有無謀為不法情事去後續據該鎮府先後禀報案内匪首匪黨實共二十三人俱已陸續全獲縁有海陽縣人王阿童欲打刦棉湖寨富户製造紙符布旗詭云符可護身旗可召鬼騙人入夥經給陳阿吉紙符五十張又給甘阿繒紙符五十張小布旗一十二塊嗣陳阿吉領符入手即交陳武瑞轉散其甘阿繒所領符旗尚未散給俱於店主詹祥宜家搜出訊據領符之吳阿聘羅義和陳阿四等各供吐不諱其所造木印訊據王阿童供稱寄藏在老婦董孝嬸家當經起出小木板一塊與符上木印騐對相符等因到臣等據此查陳武瑞散符一案據該府縣訊據王阿童自認為首製造符旗歴歴不諱各犯亦供證僉同細騐其紙符點畫状類巫師邪術符上木印亦與道士木刻印記相似其所造布旗編立號數潦草不堪明係無頼棍徒嵗暮無依倡謀搶刦其領符各犯有實係同夥知情者亦有無知鄉愚惑於邪教一時誤受者今匪首匪黨俱經全獲除一面提犯來省確訊實情分别情罪輕重歸結外所有散符惑衆及拏獲人犯縁由理合先行奏聞并将繳到符旗進呈御覽臣等謹合詞具奏此案匪犯雖無謀為不軌形跡然擅敢製造符旗邀結夥黨希圖搶刦富户其情亦甚屬可惡起意創謀及實係入夥者自當分别首從嚴懲示儆毋俾疎漏至於無知被惑鄉愚情有可原者應予從寛歸結須加意斟酌辦理庶不致輕重失宜廣東總督臣鄂彌逹謹奏為奏聞事竊照粤東地方仰頼皇上福庇雨暘時若屢登大有臣於上年冬底廵視肇慶各屬雨澤優渥二麥豐茂現今陸續收穫入春以來雨水霑足早稲漸次栽蒔仰荷皇上至誠感召将來豐稔可期近據所屬報稱米價俱平自六錢以至一兩一二錢不等油菜園蔬俱皆茂盛恐厪聖懐謹繕摺奏聞伏乞皇上睿鑒謹奏覽粤東雨澤麥禾情形及米糧價值朕懐曷勝欣慰雍正十二年三月初一日廣東總督臣鄂彌逹謹奏為恭進礮位事竊臣於雍正十一年五月内恭進九節大礮一位敬呈御覽随於九月内准辦理軍機處大學士伯臣鄂爾㤗鈔發一件為遵㫖議奏事令臣将九節銅礮如式製造七位即送來京一併轉送軍營并令臣再照造二十位陸續運送來京備用等因到臣當即遴匠選料如式製造業於本年二月初十日造成八位解送至京具摺奏聞臣隨即趕緊接造現在又造成十位俱經試放騐看均屬穏妥謹将現造銅礮十位并礮子五百箇解送備用其餘十位亦已鑄造将成容即隨後齎送理合繕摺奏聞伏乞皇上睿鑒謹奏據奏解送銅礮十位到京知道了甚好雍正十二年四月初八日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為要地需員酌請調補以收實效事竊查州縣一官必得人地相宜庶不致貽誤地方兹有肇慶府屬之新興縣崇山峻嶺巖谷深邃所屬瓮洞等處向為盜賊濳藏之藪甚是險隘目今地方雖屬安静然必防範周密預為留心稽查使宵小無所托足方不致将來有飬姦之患又地當髙雷等府孔道遞觧人犯護送錢糧絡繹不絶實係衝要之區現任知縣許湜到任半載雖屬小心謹慎而才識短淺不克勝任恐致貽誤地方臣等查有髙明縣知縣胡國楷者熟悉地方情形辦事老成練逹以之調補新興縣缺實為人地相宜其髙明縣地方亦有基圍要務必得諳練風土之員方克勝任查有檢發試用之喬徳徵心地明白辦事誠實今試用二年期滿請即以之實授髙明縣則該員必益加奮勉矣至許湜才具雖屬中平尚知謹飭自愛應俟有簡僻小縣缺出另行題補查新興等縣均非題補之缺但臣等仰體皇上慎重地方量材酌用之意為此繕摺奏請可否具題伏乞皇上批示遵行臣等謹合詞具奏将各員缺情節備悉聲明具疏題請同日又奏為謹籌要地倉貯以備民食事竊照粤東瀕海倚山全資積貯而各府之中惟東路潮州西路瓊州其儲緩備急之策有不可不亟講者謹為皇上陳之潮州居粤東偏距省城千有餘里南枕大海東接閩疆人烟稠集山多田少本處榖石除供居民食用尚有閩之漳州每嵗來潮告糴在小民只圖目前之利既不預偹盖藏而閩粤均係朝廷赤子又未便禁遏兼有附近之南澳碣石兩鎮亦時赴潮輓輸倘收成稍歉其勢遂不可支雍正四五年間潮郡偶歉石米竟至三四兩不等總縁地處極東即欲仰給西路而海運則風信靡常不能計日接濟河運則山谿多阻勢難久待此潮郡民食宜為籌畫也瓊州逺隔外洋為全粤屏藩重地鎮協營寨碁置星羅生齒殷繁啇民雲集該地民食每頼髙雷兩郡輓粟接濟惟是本地嵗産榖石既不敷一嵗之需而年景之豐歉難憑米價之低昻無定倘商販罕到轉輸不及一時騰涌實屬窘廹堪虞此瓊郡民食宜為籌畫也臣等再四思維竊謂潮州一郡應於潮屬之潮陽掲陽海陽三縣建倉貯積臣等請借支太平闗税銀五萬兩發二萬兩交該地方官於秋收後就近陸續購買再将二萬兩委員赴西省採買仰懇皇上敇下西撫臣轉飭地方官協同陸續購足運回東省存貯查廣潮相距遥逺向來鹽貨各船自廣抵潮俱由虎頭門港口出走洋皮地方至神泉港入惠來縣徑逹潮陽掲陽海陽臣等擬以販到西榖暫儲西南倉内俟秋冬風信順利陸續撥運甚為穏便計支銀五萬兩除去前項尚餘銀一萬兩合算建倉脚費餘銀仍酌量買榖共可貯榖近十萬石查由潮邑至掲邑由揭邑至潮州均係一水直逹如有急需之處可以及時撥運榖價不致騰昻此潮郡積貯之不可不豫也其瓊州一郡則應於雷州之徐聞縣建倉貯積臣等查向來髙雷米榖本運糶於瓊郡瓊郡民食專待給於髙雷第該府孤懸海島兵民稠集而惟寄性命於賈客之手甚非長䇿查由雷逹瓊道經徐聞縣至海安所渡海自徐聞到海安不過二十里許臣等請借支闗税銀三萬兩交髙雷所屬地方官陸續收買榖石即於徐聞縣城建倉存貯除去工料脚費計可貯榖六七萬石以備瓊州緩急之需則搬運不難可以刻期接應而海上人民不憂艱食此瓊郡積貯之不可不豫也以上潮瓊兩府借支銀兩分十年扣還其倉厫交與地方官料理每年收買發糶以該府同知為専管之官如䝉聖恩俞允所有一應事宜臣等即另疏具題伏乞皇上批示遵行臣等謹合詞具奏儲積米榖原為濟民要務具疏題請候朕裁酌廣東總督臣鄂彌逹謹奏為奏聞事竊照粤東荷䝉聖主福庇連嵗豐登臣於上年冬底廵視肇慶各屬雨澤調勻二麥豐茂入春以來陸續收穫早稲漸次栽蒔經於本年二月内奉聞在案兹續據廣韶恵潮等府先後禀報二麥收成俱約有八分九分十分不等甚属豐稔昨於清明日大雨兩晝夜耕耤前一日大雨一晝夜現今雨水霑足秧苖茂盛米價自五錢六分至一兩一錢不等四民樂業皆我皇上至誠感召之所至也臣恐厪聖懐謹繕摺奏聞伏乞皇上睿鑒謹奏粤東二麥豐收雨水霑足及稲茂米賤各情形朕以手加額覽之同日又奏為請定廵鹽専弁以清私販事竊照疏引辦課莫如緝私而緝私非有專員私梟究不能杜向來積慣梟徒窩囤販賣頑貪性成弁役盤拏公然抗拒此軰今日敢為䀋梟他日即可為巨盜為匪作姦勢将無所不至前經於東西兩路遴委員弁帶役緝拏邇來官引頗能疏通積梟漸次斂跡惟是粤省鹽務頭緒紛繁如福建長汀一埠帑課繁重該地界連七邑漳私透越其連城之張元山上杭之白蓮塘弔鐘巖歴為漳私總滙又江西之寜都等埠俱為閩鹽走漏之區各處辦帑人員耳目難周且地方遼濶寥寥數名廵丁不能寸寸把守其該地官弁雖有盤查之責然文職各有專司武弁難離汛地名為一體盤查實則勢難兼顧屢據長汀縣及各委員禀稱堵緝乏人請設専弁臣以事闗隔省未便徑設員役而官引壅滯實多掣肘伏查浙江前督臣李衛請設廵鹽千總仰荷皇上俞允臣之愚見請於福建之長汀江西之寜都各派設廵鹽千總一員帶役五十名於各該埠地分遣廵緝以杜私鬻之源庶汀帑寜帑可以及時清理如䝉恩准所有廵鹽千總無庸另行增設即於現任千把内擇其謹慎諳練者酌量派用其廵役工食即於羡銀支銷若私鹽杜絶場羨充裕就中撥給甚為兩便如此則責成既専堵擒必力於鹺政民風均有裨益臣謹繕摺具奏伏祈皇上睿鑒施行謹奏該部議奏雍正十二年五月初四日廣東總督臣鄂彌逹謹奏為奏報開墾田畆安插人民事臣莅粤數載仰體聖主鄭重民食之至意經委糧驛道陶正中勘丈廣肇二府荒地招集窮民酌動存公墾荒銀兩給發墾種編甲安插限年陞科復檄行髙雷等府一體清查踏勘招墾又韶州府屬猺山一帶荒地亦多并委廣南韶連道馮元方親詣查明督令猺人開墾俱經臣先後奏聞在案兹據各道府呈報開墾畆數前來查糧驛道陶正中督率番禺等縣共墾荒地二十一萬零一百三十餘畆共安佃七千零三十名内安插欲往川之民人七百三十名又雷州府知府王鐸督率遂溪等縣陸續共墾税田六萬二千九百餘畆共計安插髙雷貧民二千五百餘户又廣南韶連道馮元方督率理猺通判楊國棟勸墾韶州府屬猺山田地共八百七十餘畆共安插猺人四百一十九户臣伏思粤東民食屢厪聖懐臣凛遵上諭不時勸墾各該道府身先倡率頗著勤勞各縣亦能實力奉行躬親勘丈従此野無曠土南畆有秋無業窮黎資生有䇿庶可少慰皇上軫念元元之盛心所有各屬現墾畆數安插人民縁由理合繕摺奏聞伏祈聖鑒謹奏督勸有方可嘉之至能如是闢土恵民庶不負封疆重寄也勉為之同日又奏為奏聞事雍正十一年八月内據欽州知州徐志培報稱有龍門協營弁兵觧到飄風鬼子小船一隻男婦大小共三十四名口訊據船户西利供係東波蔗孤綿國人前往暹丹貿易行至東京海面被風擊破大船扒過小船逃生因西南風飄到天朝這裏求把小的們送到省城遇有便船附搭回國等情理合禀報并将難番男婦給與口糧護送至省等因據此臣仰體皇上懐柔逺人中外一家之至意當即飭令布政司加意撫恤毋致失所俟有便船附搭回國去後兹據該司詳稱難番男婦人口俱經給發口糧養贍現據船户西利等禀稱有船商黄合興莫𢎞源二船前往安南港口貿易甚屬便道懇准搭回等情隨飭将難番三十四名口計算歸程給予口糧宣布聖主恩賞分搭二船回國各番俱皆歡忭叩謝所有難番歸國緣由相應奏聞謹奏飄溺之患最為危險憫惻之懐何分中外亟應加意撫恤者雍正十二年六月十一日廣東總督臣鄂彌逹謹奏為恭報粤東早稲分數仰祈睿鑒事竊照粤東地方仰荷聖主福庇雨暘時若連嵗豐收本年春間雨澤霑足蒔插及時目今早稻登場萬民樂業四野歡騰兹據布政使甘汝來将各屬收成分數彚報前來臣查廣南韶恵潮肇髙雷亷瓊等十府羅定嘉應連州等三州各所屬收成俱有十分九分八分不等其米價自五錢起以至一兩一錢不等今新米上市價值日平此皆由我皇上念切民依精誠感召是以邉海蒼生咸歌樂利謹将各處收成早稻分數另繕清單恭呈御覽外理合繕摺奏聞謹奏覽早稲分數米糧價值深為粤民額慶同日又奏為奏明事臣於本年三月内訪有龍門協革職守備何大武濳往交趾江萍地方鬻販交鹽營私滋擾及右江道出示嚴禁又勾通交趾之人公然扯去臣因江萍一帶為中外要隘即密飭欽州文武員弁訪緝去後兹於五月内據欽州遊擊丁銓生拏獲押解前來訊據供稱於雍正十一年内往江萍販賣交塩歴歴不諱查律載私越緣邉闗塞杖一百徒三年何大武曾任守備理應奉法惟謹乃敢逃匿夷境網利販私情罪尤屬可惡若不嚴加創懲不獨透漏交私於粤省塩政大有妨礙且恐将來滋生事端貽害匪淺請将何大武竄斥逺方以杜姦竇庶使姦匪寒心而邉境獲寜矣伏祈睿鑒施行謹奏所奏甚是應發遣黑龍江以示懲戒雍正十二年七月二十六日廣東總督臣鄂彌逹謹奏為恭謝天㤙事竊臣保送原任廣東海豐縣知縣王者輔軍前效力經部臣帶領引見奉㫖王者輔著命往陜西交與總督劉於義差委效力數年之後該督将伊有無勞績效力如何之處出具考語給咨送部請㫖王者輔係因公科斂革職擬斬之員續以贓銀限内全完減等擬徒結案該員縦才有可觀而其品行之不端操守之不固顯然可見今鄂彌逹出具人品端方考語甚屬不合著嚴飭行欽此臣伏讀之下不勝悚惶縁臣到粤之日訪聞該員居官聲名尚好随經傳入署内見其人尚樸直令其料理一切事務頗屬敏練是以臣出具考語保送不覺言之失當冒昧之罪夫復何辭荷蒙聖恩髙厚不行交部治罪訓飭成全感懼實深嗣後惟有凛遵聖訓力贖前愆於萬一所有感激㣲忱理合奏謝伏祈睿鑒謹奏身膺封疆要任當逺大是務不宜見識淺狹公私界限祗在㡬㣲念慮之間一􅍱瞻徇即為負國溺職重則貽累功名事業輕亦難免物議於已毫無裨益無如燭理不明者比比皆然每爭趨些少光榮以圖目前快志遂置日後無限悔吝於不計也此諭亦使撫臣兩司觀之雍正十二年十月初八日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏聞事竊照潮州一郡逼處海洋當春夏南風盛發恐有不法姦民走險為匪臣等屢經密諭該地文武嚴查隨據恵來縣知縣裘曰菊等禀報訪有姦民方進安等於本年三月内夥同出海等情當即飛飭沿海文武確探嚴拏去後嗣據瓊州鎮臣李順報稱據福建船户陳長茂禀稱四月十四日船至電白放雞洋面被白艚賊船刦去銀物認識賊船寫有永成字樣現泊海口等情隨拏到船户黄永成供係福建龍溪縣人駕白艚船來瓊貿易四月十二日在上下川洋面被盜刦坐賊夥約十餘人多係潮州聲音十四日又刦商船一隻至二十九日駛至恵來地方各盜登岸始放今纔到瓊等由臣等隨即密諭潮守竝密飭各屬作速嚴拏去後據報陸續拏獲盜首方進安林廷輝盜夥陳阿抱楊陳寳等共十五名觧省訊據供稱同夥一十九人於三月二十六日従恵來靖海駕船出口二十七日在外洋搶奪魚船一隻換坐二十九日至甲子洋奪坐殻船一隻将魚船放回四月初三日刦福建客船一隻搶銀一百二十兩衣服十餘件那客人不知甚麽姓名因他船行駛甚遅放他去了仍坐原船四月初八日到放雞洋面刦福建䑩船一隻搶銀一百三十兩衣服二十餘件衆人就換坐䑩船那客人也不知甚麽姓名十二日在下川尾洋面刦福建客船一隻搶銀四百八十餘兩夏布十二桶衣物百餘件衆人就換坐這大船就是如今這黄永成的船十四日又刦福建客船一隻搶銀七十餘兩衣物百餘件那時也不知客人姓名如今纔知是陳長茂衆人仍坐原船於四月二十九日夜駛回恵來溪登岸分散等情查各案俱未據事主具報臣等訪聞密拏嗣據船户陳長茂赴瓊鎮禀報始喚到船户黄永成一併質認其各犯於四月初三初八刦過之福建客船既無事主具報各犯堅供不知姓名現在移咨福建確查俟查覆到日再行研訊至案内洋盜一十九人已将盜首拏獲并獲夥盜共一十五人内許阿序一名下水淹斃尚有餘黨三人未獲現在勒緝另獲究擬幷将各犯所供刦過不知姓名之客船移咨閩省確查其疎防各文武查明另㕘外所有拏獲洋盗縁由謹先行奏聞伏祈聖鑒臣等謹合詞具奏據奏則朕日前所聞可謂不謬矣将疎防員弁查明嚴㕘毋得稍渉徇縱雍正十二年十一月十二日廣東總督臣鄂彌逹謹奏為恭報粤東秋成分數仰祈聖鑒事竊照粤東地方仰荷聖主福佑連嵗豐登本年晚禾尤為茂盛倍於早稻兹據布政使張渠彚報收成分數前來查廣南韶恵潮肇髙雷㢘瓊等府羅定連州嘉應等州各所屬收成俱有八九十分不等其米價自五錢以至九錢五分不等此皆我皇上勤恤民依感召天和是以年登大有家給人足臣不勝歡忭之至謹将各處秋成分數另繕清單恭呈御覽外理合繕摺奏聞謹奏以手加額欣慰覽焉皆緣卿等公忠體國恵澤逮民是以上感天和屢賜豐稔朕嘉與之懐筆難悉諭果能念念不移斯志可保年年常應休徵勉之勉之通省文武大員将此諭咸令知之雍正十二年十一月十二日廣東總督臣鄂彌逹謹奏為請㫖事竊照本年九月十七十八等日恵潮地方偶被風雨隨經臣等委員查勘田禾俱未成災所有查賑縁由現經㑹摺奏報兹據潮恵運同張士璉禀稱潮州府屬之海山恵來浦東東界河東河西小江等場柵共飄失鹽一萬九千七百包零恵州府屬之南竈桂林海甲湖東淡水小晴等場柵共飄失鹽一萬六千四百四十包零共算該帑本銀四千一百兩零伏息發帑收鹽顆粒俱闗課餉自應按數填補惟是各竈曬丁均係窮民若令賠償恐難措辦臣仰體皇仁查有餘鹽羨餘銀兩可以抵補可否即将此項銀兩扺還帑本免其賠償之處臣未敢擅専據實奏請伏祈皇上特降俞㫖施行謹奏應如是權宜辦理免其賠償然須明白曉諭不可以為常例致起愚民覬覦非分之想雍正十二年十二月十三日廣東總督臣鄂彌逹謹奏為奏聞事本年十一月内據潮州鎮臣范毓䭲黄岡協副将郝忠賢先後報稱福建平和縣地方有匪犯葉揚聚集拜把圖謀不軌因伊母生日無戲隨搶荘千總戱童三名日夜演唱幷有漳州分防㕔衙役黄諧亦在其内經該㕔将黄諧枷號詎葉揚糾黨持械破枷搶犯逃入李仔坑該㕔隨㑹同營員圍拏獲犯頼枋幷戲童三名暨葉揚妻眷三口葉揚又逃入南靖縣翠㣲洞經漳州鎮差撥弁兵拏獲觧交漳州府訊據供開同夥二十五人陸續拏獲夥黨黄苖張倬等八人尚有餘黨未獲等因禀報到臣隨經批令該鎮協密諭汛地弁兵加謹廵防毋得絲毫聲張如有匪類逃入粤境嚴行查拏去後理合奏聞伏祈皇上睿鑒謹奏此等匪犯應無分疆界嚴督緝捕務獲雍正十三年正月二十六日廣東總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏聞請㫖事竊照粤東開墾一案従前廣肇二府承墾税畆經臣等陸續奏聞并飭司行委各該鄰縣確勘結報在案臣等於上年八月内經委糧驛道陶正中前往髙雷亷三府㑹同該道毛世榮督辦墾政并清查隠税去後節據報稱髙雷廉等三府所屬共墾首荒熟田六十七萬三千二百餘畆現在飭令核實結報照各該州縣原編科則分别陞輸外尚有合浦縣欽州二屬田共二十七萬二千一百餘畆巳據各圖甲原業民人指地報承但查該州縣西連交趾南濵海島東北皆枕崇山舟車不通商販罕至居民種地餬口難以覓價完糧且各荒地俱係樹木叢雜墾闢既費工本辦賦亦多拮据近據民人聫呈籲懇請減原編科則之半限年陞輸疊經該道陶正中等偹查情形具禀前來伏查合浦欽州二屬為天南最僻之區生計窘窄實與他邑懸殊目今民情效順各思務本三旬之内報首至二十七萬餘畝洵屬遐方盛事而細民狃於小見望恩幸澤冀得輕科可否俯順輿情量従輕減陞輸此實出自天恩非臣等所敢擅議如䝉俞允臣等即另疏具題理合先行奏聞請㫖謹奏百凡皆揆情度理因地制宜而為之何不可之有雍正十三年二月十二日兩廣總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為恭謝天恩事竊臣等保送原任廣東羅定州知州王植經部臣帯領引見奉㫖王植係革職之員希圖督撫保薦是以凡有差委之處黽勉效力看來此人才具可用而其居心非屬端人正士雖此時貌為㢘幹将來得缺任用之後未必不改操易轍貽累保舉之上司今鄂彌逹既具摺力薦竝請留粤委用著照所請命往廣東令該督撫留心委用試看竝将此㫖傳諭鄂彌逹楊永斌知之欽此仰見我皇上澄叙官方之至意臣等跪讀之下不勝惶悚荷䝉聖恩髙厚教導成全感懼滋深嗣後惟有凛遵訓㫖留心試看倘委用之後該員不思實心報效或有改操易轍之處臣等即嚴行糾㕘斷不敢稍為姑容自貽罪戾謹具摺恭謝天恩伏祈睿鑒謹奏汝二人督撫粤東以來可謂循分盡職而已至於羙善則未也其咎在瞻徇之私未除亟當猛省痛改毋渉因循然非極力振作另具逹觀逺識不能擺脱積習也勉之戒之兩廣總督臣鄂彌逹謹奏為奏聞事竊照粤東仰荷聖主福庇嵗登大有上年兩次豐收已經臣奏聞在案入春以來雨水優渥二麥豐茂早稲漸次栽蒔将來豐稔可期米價自七錢至九錢七八分不等地方甚是寜謐再粤東地處天南雖時際隆冬氣候尚覺炎熱是以積年以來霜雪希逢本年正月十三十四等日省㑹一方㣲降雪珠闔省軍民踴躍歡呼咸謂従來僅見續據韶州府屬各邑暨南雄府縣嘉應州屬竝連州以及恵州府屬之長寜博羅縣各禀報本年正月十三四五等日六出繽紛厚積數寸所屬士民額手歡欣俱稱目所未覩臣查雪兆年豐他省亦稱羙瑞況兹炎方普降洵屬未有嘉祥此皆我皇上至誠感召天心黙眷是以海隅大地覯此庥徵臣不敢壅於上聞相應一併奏報伏祈皇上睿鑒謹奏粤東積雪至數寸實屬罕聞況得春雨接續麥稲均獲滋植遥矚炎方曷勝慰悦同日又奏為敬陳管見仰祈睿鑒事臣接准部覆浙江按察司劉章條奏一件内開嗣後窰厰製造御用磁器書寫國號其燒造尋常貨賣磁器不得擅寫致干䙝慢其器具字跡破損散軼者通行各省飭令地方官曉諭鄉保敬謹撿拾務於潔浄處所收貯等因臣奉准部咨隨即出示曉諭竝通行該地方官一體欽遵示諭外伏查六書尊嚴國號煌煌字跡奚容輕䙝該司議飭各地方官曉諭鄉保敬謹撿拾收貯所奏誠當惟磁器製造年號本以垂之永久俾萬世後照舊製造年號以垂久逺是否有當伏祈皇上睿鑒施行謹奏詳細批諭矣汝其審思之雍正十三年三月十五日兩廣總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為遵㫖奏覆事本年二月二十七日内閣寄到雍正十三年正月二十三日因有人條陳禁止粤東開礦一事欽奉上諭一道遵㫖寄信到臣等臣等跪讀之下仰見我皇上睿慮周詳訓誨肫切不禁感激涕零伏念臣等庸材陋質叨䝉聖主隆恩畀以海疆重寄凡已身陳奏事件如有未妥協處自應於聖明之前據實陳明焉敢回護瞻頋自蹈負恩貽誤之咎竊查粤東恵潮韶肇等府礦産甚多原係天生自然之利與其封禁使無知貧民偷穵而罹於法毋寧竟行開採明予以資生之路且工商俱用本地可無易聚難散之虞食口竝不加增又無人滿糧貴之患實於地方有利無害臣等是以奏請開採自䝉聖恩俞允臣等即遴委能員㑹同各該地方官将屬内有礦山場確勘煎試示召本省殷商取具地方官印結令其自備貲本前往開採其需用人夫工丁飭令各州縣查出樸實窮民取具甲隣户首保結開明住址備造清冊移送管理之員如有面生可疑之人濳匿在山者即行拏䆒并於附近厰地之村荘飭令各保甲嚴行稽察如有外來之人歇宿務須根究毋得容留匪人濳行窺探地方文武以及委理之員稍有疎忽即行㕘處如此立法嚴密将來礦旺人多固不虞其滋事即礦竭之時此項人夫工丁原有姓名住址可稽仍可令地方官按冊著令原保之甲隣户首領回照舊安插臣等於未經陳奏之先先已再三籌畫實無難散之虞兹據條陳内稱康熙三十七八年間督撫奏請開採而各處道路村荘因受刦掠之害至康熙五十一年餘孽仍復猖獗刦掠英徳翁源曲江等處名為山賊實係礦徒等語臣等檢查原巻康熙五十一年行刦英徳縣民鍾上位等家係鐡爐停煽工丁闗鳳生等夥同行刦竝非礦徒餘孽至所稱翁源曲江二縣五十一年竝無盜案可稽且查康熙三十七八年間開礦至五十一年已十有餘載封礦既久如何尚有礦徒聚集據云礦徒亦不過數十餘人粤東文武官弁竝兵丁數萬所司何事如何竟任其猖獗至十有餘年不息又條陳内稱入山傭工者即係無頼之窮民今礦山一開則無頼姦徒號召雲集誠恐将來滋事等語臣等查盜賊多屬游手好閒焉肯傭工開礦至於礦徒雖不能保其全係良民但其中傭工受值者多游手好閒者少且窮民入山傭工既得生計尚恐其為無頼而滋事如竝不與以資生之路豈反能保其不滋事乎又條陳内稱粤東一年所收之榖不足供本省半年之食第查粤省雖屬山多田少若無旱澇所産米糧亦可敷一年之食再藉西榖即能充裕是以臣等奏請建倉貯榖無非為充裕民食預備荒歉之計今乃云不足半年民食未免言之太過又條陳内稱鼔鑄之事小臣等請開礦鼔鑄原非専為國家經費起見祗因天地所産金銀有數民計艱難今将銅􅖳鼔鑄使官鑄流通於各省而山場所出皆成有用之金銀粤東百姓增出金銀無數自然家給人足於國計民生均有裨益似非細事但查礦山既開将來各場需用人夫工丁以及買賣食物人等口角爭鬭之事固所不免倘或傳聞附㑹借此以實其言臣等将何辭以自解況即不開採通省盜案亦不能保其必無設将來一有盜案事發盡歸罪於開採臣等身家性命固不足惜即粉骨碎身究無補於地方窮民且深負我皇上矜全之隆恩臣等再三籌議停止開採實屬安靜且恭繹聖諭數年以來粤東年榖順成米價平減盜賊漸少地方寜謐為大吏者當以靜鎮處之不當引之於動大哉皇言誠帝王治世安邦之至理千載不易之良謨臣等不勝感激之至查粤東開採之事奉行未久惟恵州府屬已開三四處在厰人夫不過一二千人辧理少有頭緒其餘各府現在查辦尚未開採停止甚易似應懇聖恩将開採之事敕部暫行停止理合遵㫖據實陳明伏祈皇上恩鑒施行臣等謹奏停止開採甚是地方一切事務自當以久逺寜帖永無後患始為盡善有㫖諭部矣兩廣總督臣鄂彌逹廣東提督臣張溥謹奏為奏覆事雍正十三年正月内右翼鎮臣李惟揚録送奏摺一件内稱中營逰擊楊琳惑於堪輿嫌中營衙門不利圖換右營衙署經詳護理鎮臣王濤批允移住迨右營遊擊王臣到任不肯更換通詳督提楊琳仍移原署自此竟成嫌隙王臣見楊琳結交人衆借稱熟諳水性請調水師以避楊琳及臣回任當面嚴飭化導二人究不能相洽誠恐貽誤營伍等因奉硃批言之督提欽此查右翼中右二營更換衙署一案縁中營衙署在韶州東門逼近河干該營公庫存貯官兵俸餉楊琳因右營衙門枕近鎮署周防慎宻是以具詳更換經護鎮臣批允續於上年三月内王臣莅任以營署不便紛更具詳隨據楊琳禀稱右營既稱不願情甘移讓以協同寅臣又經批布政司㑹同右翼鎮查議隨經該司該鎮以楊琳業經移讓具覆當即檄飭各居原署在案事歴經年已無異説至王臣請調水師據稱四渡重洋熟習船務願就所長以圖報稱臣等以水陸均為皇上效力亦經㑹議俟有水師缺出題請調補在案今鎮臣李惟揚乃又以二弁不能相容陳奏竊思該弁等如果挾隙誤公有玷官箴該鎮即應據實揭㕘若云該弁等才尚可用而人地實不相皇上睿鑒謹奏覽雍正十三年四月初六日兩廣總督臣鄂彌逹謹奏為恭報二麥豐收米價平減仰慰聖懐事竊照粤東今春瑞雪繽紛雨水霑足經臣将二麥秀茂早禾插種情形奏聞在案今據各屬申報二月以來風雨調和二麥豐收俱有十分九分近日米價平賤廣南韶肇恵潮各府嘉應一州上米每石價銀自八九錢至一兩四五分不等中米每石自七錢五六分至八錢八九分不等次米每石自六錢六七分至七錢八九分不等髙雷亷瓊四府羅連二州上米每石自七錢七八分至八錢五六分不等臣隨於三月二十七日自廣赴肇見各處田畆土膏滋潤禾苖暢茂徧詢老農據稱秧苖甚是壮盛現在陸續插蒔民情欣悦臣覩此民安物阜之象不勝慶幸除廣西各屬俟查報到日另摺奏聞外理合繕摺奏報伏祈皇上睿鑒謹奏覽今春普䝉上天恵澤直隷以及各省雨水咸屬均調誠可謂大幸也兩廣總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏覆事本年三月二十三日内閣寄到雍正十三年二月十九日奉上諭前朕訪聞龍為霖劣蹟種種諭知鄂彌逹等伊等始行題㕘今日覽鄂彌逹等續㕘龍為霖失察吏胥偷盜庫銀一本看來似覺有心示以嚴厲毫不徇情者伊等有假此一案便於将來審訊各案時徇情庇護景象爾等可寄字宻諭伊等倘審訊稍有回護瞻徇不公之處經朕訪聞決不寛貸欽此遵㫖寄信到臣等臣等跪讀之下不勝悚惶竊查潮州府廣濟橋商税該㕘守龍為霖自到任接收以來歴年侵欺之銀甚多臣等不早覺察至上年九月内始訪查得實又䝉皇上矜憐臣等愚昧特命大學士等寄信諭知将龍為霖特疏題㕘是従前失察之咎已無可逭臣等尚恐所㕘之外别有欺隠隨宻飭署府鹽運同知張士璉細加查察續據張士璉揭報該㕘守失察胥吏吴應隆偷盜庫銀五千兩等因由司轉掲前來臣等據揭續㕘以冀稍贖前愆何敢陽示嚴厲隂圖庇護自蹈欺君罔上之罪且臣等身受聖主天髙地厚之恩寜不思竭蹶圖報翻欲開脱貪官皇上訓示諄諄益當秉公嚴審斷不敢一毫渉私上干國法除另行審擬具題外理合繕摺奏覆伏祈皇上睿鑒謹奏覽同日又奏為奏聞事雍正十三年二月十二日據護理髙州總兵印務督標中營副将王濤禀稱上年十二月二十日風聞有吳川縣蔡日升客船在彭城港外陡遇賊船一隻刦去錢物等項又聞有木槓賊船飄泊於潿州海面捉拏魚船之人代運贓錢進口等因禀報到臣等隨即飛檄髙州府文武各官分頭嚴緝前項船賊務獲解究一面照行髙州鎮按察司確查被刦實情開列文武疎防各職名照例詳㕘去後兹於三月二十四日據該護鎮王濤及吴川縣知縣章國録各禀報陸續拏獲行刦蔡日升客船盜犯李㨗倫等四名到案𫝊同事主面質訊據李㨗倫等僉供小的們俱係吴川縣人於上年十二月初八日撘了化州洪亞三漁船出海舵工林帝佐係海南僱工無住址洪亞三之僕洪亞生住化州界上篙手李亞花蘇茂俱茂名縣人一共九人至二十日被風飄到安南江坪老䑕山地方灣船遥對彭城見同駐蔡日升客船内多錢物一時起意過去搶奪回船駛至潿州海面不識路徑捉拏漁船上人要他指引隨即放去後來各人分搭小船散踪等語又據續獲蘇茂到縣訊供與李㨗倫等所供相同等因禀報前來臣等除飛檄按址勒拏供黨并失察官員擬議另行題報外事闗捕獲洋盜理合據實奏聞伏祈皇上睿鑒謹奏肅靖海疆固在嚴緝盜匪撫綏内地又在勤察貪員是乃為政之本也勉之同日又奏為奏聞事查副都統臣毛克明近因患病脾泄精力㣲弱辦事雖無遺誤臣等看其精力甚覺勉强支持若不靜攝數月恐遽難全愈副都統毛克明雖有操兵管闗之責然尚有将軍右翼副都統竝副監督諸事尚不致遺誤臣等仰體皇上愛恤臣工之至意理合據實奏聞謹奏命伊暫停辦事靜攝數月朕已遣醫往治行将至矣雍正十三年閏四月初九日兩廣總督臣鄂彌逹謹奏為請㫖事竊臣仰荷聖恩節制廣西任事以來考驗西省将備千把弓馬平常者居多及隨時察詢邉防營制間有應行變通斟酌之處因未親身閲歴無由熟悉周知未敢輕為置議致滋日後紛更今准廣西提臣霍昇鈔送奏摺以栁州城守營兵少差繁無暇訓練技藝生疎人亦罷憊請於提標中營内抽兵一百二十名添入城守營以便輪班更替按期操演等因欽奉硃批與臣商酌意見若同具題奏請欽此臣查同城抽撥雖兵無增減但廣西通省標營或有似此應行酌改之處亦未可定且将弁弓馬考騐尚属平常則兵丁技藝生踈罷􅉵者當不止栁州城守一營為然兵防最闗𦂳要整飭務宜嚴密況栁州接壤古州現今蠢苖尚未帖服若非親身查察不能措置得宜第恐目下廵行不無張惶耳目臣擬於七八月間親赴西省将沿邉内境詳加查看標營兵制逐一考核如有應行相險設防酌量抽調更改之處容臣㑹同廣西撫提諸臣確商妥議一并奏請訓示庶㡬邉方營制無更换之煩而通省軍容收整飭之效矣除将提臣摺奏情節咨明查照俟臣到西省後另行㑹商覆奏外理合具摺請㫖伏候聖訓遵行謹奏廵歴粤西目下且止霍昇抽撥之奏尚屬可行㑹疏題請候㫖定奪同日又奏為恭謝聖訓事竊臣前因部覆浙江按察司劉章條奏尋常磁器不得擅寫年號一案臣以年號係國家體制信今𫝊後中外咸尊所闗甚巨應請照舊一體書寫製造俾萬世群相寳貴等情冒陳天聼荷䝉皇上硃批羙器何如羙政之足為天下後世法大哉王言周詳指示堯舜之世未聞珍玩流傳聖明之朝自有聲名洋溢臣止知器物因年號而尊重所見猶為淺小䝉皇上逐一訓諭不但自愧管窺蠡測不足仰贊髙深於萬一實開臣之茅塞長臣之識見所有感激㣲忱理合奏謝謹奏大抵淺小之誚諸臣率不能免兩廣總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為恭謝聖訓事竊臣等前因保送原任廣東羅定州知州王植赴部引見欽奉諭㫖留心委用試看隨經恭摺奏謝復奉硃批臣等跪讀之下感激悚惶莫可言喻伏念知人自古為難保送務求公當祇因人才難得見有片長足録者不忍令其棄置是以往往冒瀆聖聰其實臣等無知人之明何敢懐私心而稍存曕頋之念況受恩深重又何敢為人而自干濫舉之咎今䝉聖諭諄切惟有銘心鏤骨時時猛省益秉公忠以仰副皇上諄諄訓勉之隆恩謹此具摺恭謝伏祈聖鑒謹奏難事也莫易視之以鄂爾泰之明逹尚不免因此受累況其餘者乎若信不及看不透日後必致悔吝之萌不可不知也雍正十三年閏四月二十一日兩廣總督臣鄂彌逹謹奏為奏聞事竊照黔省古州與廣西栁州緊相接壤自逆苖聚衆為匪臣即密札撫臣金鉷提臣霍昇簡選将弁練習兵馬預備軍糧器械聼候調遣需用竝密飭沿邉文武加謹防範不時確探信息飛報在案閏四月十六日接准撫臣金鉷來咨内稱提督霍昇於閏四月初八日准古州鎮咨調西省官兵二千名星往古州應援提臣霍昇即派提標暨各營兵共二千名交右營遊擊楊剛前營遊擊李正國協同統領悉聼古州鎮調遣等因臣查提臣撥兵二千僅有遊擊等㣲員統率前往則各營兵力勢必不齊且以粤兵而聴古州鎮調撥更恐呼應不靈必得總統大員相機調度方能無誤隨查左江鎮臣王無黨向在古州出師著有勞績熟諳苖寨情形臣即飛檄専委該鎮總統粤兵㑹合古州鎮詳悉商酌㑹同勦捕去後兹於閏四月十七日據古州鎮臣韓勲呈稱古州苖衆本鎮現在相機勦撫復有臺拱清江等處苖人妖言誑結羣起跳梁抗拒官兵蔓延鎮逺府縣内地多被侵陷燒刦又有八寨苖人亦被煽誘敢於攻犯汛防如此肆行猖獗必當大加痛勦提督現在鎮逺施秉一帶指麾佈置古州一鎮乃新疆總隘根本之區兩省脣齒重地闗係匪輕合亟呈請調撥官兵星馳應援均懇勿致遅滯等因并准提臣霍昇飛咨前來臣思逆苖肆横聲息相通最易勾連蠢動黔省提鎮分頭勦捕兵勢單少立待應援而西省沿邉猺獞雜處竊慮聞風滋事彈壓不可不嚴今提臣撥兵二千之外細籌接壤各營以及梧州等協存兵皆不過百餘名又不便再行多調且古州八寨上江等處在在告警粤兵雖有二千仍恐不敷調遣萬一再需兵力臨時無可䇿應臣再四籌度隣疆一體何敢坐視伏查廣東額兵頗多平時操練已稍可觀軍装齊備器械鋒利國㤙豢養有年各兵俱願奮勇出力以之調遣實能用命且廣東一水之地十二三日即到栁州再十餘日便可直抵黎平道路不為遥逺當此隣省緊急軍機西省邉防尤重臣有援勦之責若待請㫖䇿應誠恐有誤機宜是以不敢拘泥成例隨密商廣東撫臣楊永斌提臣張溥即撥臣標兵一千名委中軍副将王濤統領守備二員千把十員於閏四月二十一日由水路前往古州飭令㑹同左江古州二鎮統聼貴州提臣哈元生相機調度一面飛咨廣西撫臣金鉷於黔粤交界之石碑沈口等要隘汛地先撥撫標兵五百名控扼堵禦再撥東提標兵一千名委中軍㕘将任龍為總領守備千把俱照臣督標派撥之數隨後進發統聼古州左江二鎮㑹同調撥合計東西兩省之兵共有四千聲威既壮調遣可以裕如而粤省沿邉交界又有西撫標兵彈壓苖猺知所畏懼自當帖伏寜謐或黔省再需兵力即将西撫標堵禦之兵亦聼貴州提臣就近一并調遣臣現在各路安設馬塘一有緊急調兵之處再於東省附近各營星飛遣撥隨後接應庶為有備無患而醜苖癬疥之疾自可不日掃除矣至西省二千之兵撫臣金鉷已借支三箇月糧餉委員監紀散給東省標兵二千亦預借四箇月糧餉按名散給竝咨㑹撫臣金鉷再委大員督運兵糧以資接濟外其餘一應軍装器藥船隻等項亦俱辦理無誤理合一并奏聞是否有當恭請皇上訓示謹奏撥兵援𠞰之舉深合機宜一切處慎重辦理更防姦匪乗隙煽惑人心不時留意密加察訪毋忽雍正十三年六月十三日兩廣總督臣鄂彌逹謹奏為恭報早稲收成分數并米糧價值事竊粤東地方本年自入夏以來雨水霑足早稻秀實至五月中旬俱已陸續刈穫先經臣通飭各屬将實在收成分數據實查報去後兹據司道府州縣先後申報前來臣查廣州南䧺等十府羅定等三州各所屬俱有十分九分收成其八分收成者僅十餘縣而七分收成者惟三水縣一處至通省米價每石自六錢起至一兩不等今新米上市價值日平現在地方寜謐人民安業此皆我皇上念切民依精誠感召是以邉海蒼生咸歌樂利臣不勝歡忭之至理合繕摺奏聞上慰聖懐伏祈睿鑒謹奏粤東早稲收成米價平減各情形欣悦覽之若非卿等忠誠任事除暴安良懲貪奨㢘有以舒暢兵民之心志何能有此感召目覩庶徵類應速如影響而不倍加寅畏時時自省可乎勉之兩廣總督臣鄂彌逹廣東廵撫臣楊永斌謹奏為奏聞事竊查粤東地方本年雨水霑足早稲豐收臣等現已另摺具奏外惟五月初旬陸續據廣州府屬之番禺従化增城花縣各禀報於閏四月十七八九等日風雨連綿凡港汊紆折窄隘之處疏洩不及其低窪處所民間草茅房屋間有被浸倒壊營房墩臺等項亦間有坍塌等情又據恵州府屬之海豐縣禀報本年五月初五日風雨大作民房舖店亦有倒壊等情各禀報到臣等隨即飛飭布政司動存公銀兩委員帶往㑹同各該地方官確查被水情形給銀賑恤毋令失所去後隨據各委員查勘覆稱被水各屬一縣之中不過一二處縁大雨之後山潦陡發以致壅溢未及一日旋即消退内番禺之江村花縣之羅漢塘增城之楊梅金牛綏寜各都海豐之大液小液等邨田禾間有被水衝浸畧減分數其餘竝未成災従化縣田禾竝無傷損又海豐縣壓斃人民二口花縣衝䧟圍基二十餘丈其餘人口圍基俱無損壊至民間茅篷竹壁及上築牆垣被水浸倒者現在分别按户實給撫恤通共支發銀一千八百八十餘兩即令築復居住俱已得所各等由前來臣等復思此等被水民人雖經加意賑恤但築復廬舍恐不無飯食之需隨乂飭令各該縣将糶三榖石於平價之外再行酌減三四分令被水之民赴買如貧難小户艱於買榖者即将本鄉存貯社榖酌借冬成償還免其加息務令均霑實恵已各得所再連州地方亦據報有風雨傾圮城垣并營房數處乂龍門縣亦報傾圮營房數處但人口田禾俱各無傷倒壊民房亦俱無㡬業據該州縣報稱已經查明捐賑得所毋庸再行賑恤等因臣等復經確查無異除将各處營房墩臺等項以及連州城垣飭令勘估酌動公項作速修葺完固以資防禦外所有各縣偶經水潦情形臣等誠恐有厪聖懐理合将已經詳慎辦理縁由據實奏聞伏祈皇上睿鑒謹奏粤省雨水壅溢之患亦所時有然為民上者當思一夫不獲猶已溺已飢務須實力撫恤俾各安生業始可以告無過也硃批諭㫖巻二百十五之四
