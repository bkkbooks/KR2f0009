body:
  text: 欽定四庫全書硃批諭㫖巻四十八硃批杜濱奏摺雍正六年十月初四日陜西糧鹽道臣杜濱謹奏竊臣一介庸愚荷䝉聖恩由吏科給事中補授陜西糧鹽道本年三月十四日恭請聖訓教誨諄切勉勵周詳又賞臣摺奏著遣家人齎京交與大學士張廷玉轉奏臣何人斯仰荷隆恩實為逾分夙夜悚惕莫知所報隨束裝起程至四月十八日到任清理收支事宜查驗新舊糧石務期剔除弊竇以盡糧道之職至於倉厫六十餘座歴年久逺傾圮滲漏臣於未奉部文之先已開册詳請督撫親驗題達現在飭委有司估計再旗員闗領糧餉不無需索陋習臣不能應伊等亦似相諒不甚刁難惟有賠買不敷粳米一節似屬未協敢為我皇上詳陳之向年民糧未經改折之時糧道經理近三十萬石又草七八百萬束不但耗羡充裕而陋例亦多自雍正二年民糧改折止有額徴舊斗屯糧十萬石並都司裁缺歸併糧道舊斗更名糧四萬餘石至雍正三年前道許容任内悉除陋規將加一五耗羡減去一半酌留七升五合内除三升為各書役工食及修補倉厫併送督撫藩臬月糧料豆公費脚價之用實在耗糧四升五合為糧道衙門公私費用所以議公費養㢘不及於糧道盖以耗糧作養㢘此時尚未有賠買粳米之事也及議定養㢘具奏之後奉部文將八旗不敷粳米交與糧道採買供支除部價外每年約計賠銀二千兩上下無項可動即以養㢘之耗糧動用買支自雍正四年許容任内始也但許容以臬司兼糧道原有臬司養㢘除動用耗糧添買粳米外贏餘詳明充公至雍正五年范𢎞偲任内曾以費用不敷詳請養㢘前署撫臣張保批駁未允本年四月臣到任後檢查巻案知各色糧石不論貴賤部價均屬一兩陜省粟米豌豆小麥每石時價六七錢八九錢不等惟粳米每石一兩六錢或一兩八九錢所以八旗之餉各色俱本折兼支獨粳米則要全支本色臣通盤計算每年除賠買粳米之外餘糧尚可變易銀二千三四百兩加以每年額徴更名差折銀舊例七分五釐耗羡約計五百餘兩原留為本衙門公費者是每年約有三千兩以臣用度並無不足若非賠買粳米實有贏餘二三千石可充公項也但查官兵每支本色不滿十五萬石而在藩庫支十七萬餘石折色之銀皆得有餘之價惟斯粳米一項每年估撥不敷僅二千三四百石多不過二千六七百石部價未足便不肯領未奉部議之先原派之五縣而民受其累既經部議之後乃責之糧道而官任其賠以理推之似未平允此皆督撫所熟悉者臣身任是職不敢不據實奏聞謹奏如養㢘不敷當向督撫言之伊等自必另議請㫖也同日又奏竊臣抵任以來將及半年自愧才識短淺耳目不能周悉聞見偶得一二敬陳數條仰祈睿鑒一查得陜西錢糧無大虧空而倉儲不無那前掩後支飾之弊今嵗秋收榖賤惟在盤查之官不少假借便可買補足額至於甘屬聞頗有虧空又寧夏地方有因派軍需而村民逃避者逺路傳聞尚未得其確實也一陜省賊盜甚多在民間者姑無論但就官署而言除本年正月内岐山縣署中失盜已經㕘出外四月初八日涇陽縣署被盜五月初二日漢中府署被盜六月内鳳翔府守備署中被盜沔縣署中被盜七月二十八日潼闗撫民㕔署中被盜八月初七日朝邑縣署中被盜九月内新任西安府知府王紹文自言赴任於途中被盜其餘臣未聞知者想亦不少臣每向臬司等切言之謂此闗係不小務嚴保甲實力奉行庶可消患於將来而聽者未免視為迂腐之談耳一春間採買軍需騾頭有司奉行不善責之里民因而胥役姦販通同射利每騾一頭價至七八十兩百餘兩渭南縣竟有一百五六十兩者並雇夫餧養派備草料往返挑選一切雜費百姓每石糧派至二三錢五六錢不等臣赴任時途中訪聞最確總督岳鍾琪亦經查知深加懲創此番總督委臣協同藩司張廷棟辦理臣切禁派累嚴察侵冒務期不擾不誤詎有華州知州王徳地仍蹈故轍致劣生姚果實傳帖惑衆闔境騷然臣等現在查審未結一陜省官員强半委署朝更暮改重複移調官員皆視為旅次惟交盤之不遑何暇理及民事臣雖職任監司不得與聞實未解其何故也一廵撫西琳器局褊淺動作乖張不達政務而專好小利每接見屬員有二裁縫旁坐縫衣不但司道恭揖二裁縫穩坐至府㕔以下長跪回話二裁縫穩坐如故凡地方緊要事務一一聽聞大小官員莫不駭異又前藩司馬喀變價官物凡金珠貴重之件廵撫勒令咸長兩縣送交撫署及署咸寧知縣朱文炳改署盩厔新署咸寧知縣張典以馬喀官物不清既無原物又無變價之銀不接交代兩人爭閙禀於總督之前總督礙情付之不管至今未經交代又廵撫有不用之二幕客一姓王薦送於臬司碩色一姓鄧薦送於臣臣即力辭廵撫又使廵捕官向臣言鄧相公在京支過束修五十兩如今薦送與你你可將銀子還了不用亦可臣笑謂天下豈有此理闔城官員無不知之嗤其鄙陋廵撫因臣倔强便有蓄怒之意又諭臣雍正四五兩年未完屯糧可即出倉收報完我要具奏臣謂實在未完何敢揑報全完虚出倉收願受㕘罰必不自蹈欺㒺之罪以此廵撫益怒臣矣一原任咸寧縣知縣胡増瑛去冬領張晟虧空案内銀兩買米每石實價七錢竟以一兩二錢報銷侵冒銀約四千兩與原任知府蔡璉進以美妾互相欺混藩司張廷棟為其所愚轉詳廵撫照數准銷今春總督訪知要㕘廵撫極力庇䕶蔡璉是以總督止將騾行一事㕘審一原任潼闗撫民同知菩薩保徴收税銀不照則例額外加倍勒收本年六月間潼商道張正瑗提騐底簿該同知以假簿送閱張正瑗持簿至省面稟督撫會同藩臬訊明加倍徴收額外勒索是實侵匿税銀四五千兩是實乃遷延日久令該同知倒填年月自首銀二千餘兩上下彌縫和同完結由此推之各處侵蝕税課上司不能查察即查出而有心狥庇者當不止潼闗一處為然也一本年九月二十六日總督自外回署時有一男子持書一封向總督言我師傅教我下山來與公爺投書隨帶進宻訊次日又聞會同廵撫臬司宻訊其書中情由及如何查詰臣無從知只聞係湖廣人未悉其姓名言語可疑情形怪異不知曽入告否臣因陛辭之日跪聆天語謂大吏多有隱瞞下情亦許上達聖諭嚴明何敢瞻顧謹就所知據實奏聞伏祈皇上賜覽謹奏此奏甚屬可嘉朕欣悦覽之内外大小臣工咸肯如此據實直陳天下事復有何隠何蔽何慮億兆不䝉福寰宇不治平耶朕將所列各條以硃筆刪改命另摺録出逐件詳察施行矣恐有人猜度係汝之所奏切須宻之勿露今將硃筆刪改之稿發來爾看即知朕之慎宻矣宻之一字為最要少忽則將後悔莫及也雍正七年閏七月二十日陜西糧鹽道臣杜濱謹奏臣於去年十月内將臣到任後見聞事件恭摺宻奏奉有硃批臣跪讀之下感與懼兼仰沐天㤙慮臣愚魯不知慎宻教誨詳悉臣切銘於心益加敬謹不惟所奏事件未敢宣露即蒙㤙准摺奏臣畏督撫疑忌至今未敢一言偶及也且臣自揣職分夙夜戰兢實不敢以無知之言屢瀆聖聽但凛遵此舊例也署乾州知州甘運清於本年二月十三日到任至六月十三日二㕘限滿交代未清藩司詳委興平令胡蛟齡監催勒限完結並未令臣與聞以非臣所司也忽於六月十七日准藩司咨稱奉院批嗣後直𨽻州交代由道查催核轉是乾州之交代逾限在先臣准咨在後將來之交代道任其責此案之逾限道不分其咎乃廵撫將藩司同臣一併附㕘此非撫臣不知而誤列彈章實係有心而故為苛刻也臣自維謭陋䝉恩擢用惟有報效君父之心實無阿諛上官之才而循規蹈矩亦斷無獲罪上官之處如職分果有未盡處分何辭乃以向例不管交代之道員而今忽罹無妄之議處實屬屈抑聖明在上無微不照臣不敢不據實奏明並繳硃批奏摺伏祈睿鑒謹奏據奏該撫以督催不力將汝同藩司一併附㕘謂為有心苛刻汝誤矣督撫初莅封疆正在整飭吏治之時汝等監司大員似此無闗降革之小過尚不容情列之彈章可見此外别無大過也於兹當感而不當怨何乃遽為斯言耶况上下如是乖違而欲望地方感召和氣必無是理宜乎西安有兩月不雨之徴應至如無阿諛之才一語尤為非理聖人云不獲乎上民不可得而治既為屬員即宜仰承上司意指就中委曲匡救協助以禆益地方始稱良吏若一味剛愎自用亦何足取上司除貪婪欺罔大逆不道之外為屬員者仍以能得其懽心為是豈可但為自巳地步不體上司之難是皆潔身而不奉公之流弊乃小人小臣之形態如此居心行事畢生斷不䏻至大臣地位也不寧惟是若如此居心設或身為大臣必且與君上抗拒而樹恩邀譽以自固此種陋習朕所深惡汝當拳拳服膺以為終身戒接讀訓諭若不返身省過痛自刻責不以已之淺鄙為非而悻悻如舊他日致被上司捉獲欵蹟從重㕘論莫謂朕不汝保全也清夜無事時試熟思玩味之同日又奏臣愚陋寡識謹􅈬所知據實上聞一陜省辦軍需駱駝馬匹口袋兵車火藥盔甲農具牛皮銅𨫼各項俱已次第運甘止有餧養晉豫陜三省採買騾頭一萬三千餘頭大將軍岳鍾琪飭令於立秋後中秋前以地方草料之多寡為先後分運解送明春出口臣協同藩臬所辦事件八十三等日方得澍雨秋禾雖屬無望正可及時種麥一同州火藥局貯鉛子火藥三萬餘因署事官交代盤驗不知因何火發打飄房屋傷損多人此事聞已一六月大旱督撫率同各官集龍神廟祈禱雨澤正齋戒禁屠時將軍常色立屢請兩院喫肉頗有物議又廵撫於齋所坐間向署督談及五月十三牛肉之美言之津津因吩咐縣官丁祭必要肥牛一廵撫武格數月來操守固無可疑但凡事不知各官顧此失彼周章倉皇夫盤糧寧非正事而軍務重大此稍緩時日未妨也又妄駁文移不按繩墨舛錯倒亂前後矛盾致下屬莫知適從競傳其果然混閙無怪外邉議論之言再廵撫初到任審第一起事㕘革清澗令陳錦私派案當堂只説得内犯官莊秉中王嘉賔等謂果係書辦問話以臣細察廵撫外貎似有才情可以辦事但心不虚公徒形其剛愎之氣故善言不入任意妄行而張弛錯謬矣一閏七月初二日各官齊集城隍廟宣講上諭藩司傳集奉㫖發來補用人員驗看内有貢生朱一蜚者督撫謂此禮部錢侍郎外甥可委署髙陵縣知縣時驗看各員俱露不平之色督撫𣪚後有監生范榮者跪於狥私廢公之意由錢侍郎一語招之也一鳳翔縣額徴鹽課六百餘兩知縣任樞南按丁加派至一千二百兩署扶風縣知縣陳恭徴收鹽課耗羡重至加三寳雞岐山郿縣三處鹽耗亦重加三臣職司鹽法訪查確實於本年五月十一日詳報督撫鹽三院而廵撫竟置之不問及任樞南因考棚科派為學政朱曙蓀查出一陜屬延安以北地方廣濶有延半陜之説其習俗悍野鮮知禮義棍徒更多妄行官設三㕔止司塘站而地方事則雜用州同縣丞經歷廵檢等員主之謂之堡官凡錢糧詞訟皆堡官所理其職任與正印官等但官卑職微呼應不靈遇有緊要事常多貽悞總因邉地窵逺從前改設文員時未經詳察草率措置不得其當臣每留心訪問榆林居東西之中城郭完固煙火萬家應照寧夏西寧之例改為榆林府附郭設榆林縣將州同所管䨇山等五堡屬之波羅等五堡係波羅州同威武廵檢二員分管亦於酌中處設為一縣查堡皆有城西十堡如鎮靖定邉安邉等堡城郭尤好係鎮靖廵檢安邉州同定邉縣丞靖邉經歷四員分管亦可酌量設為二縣其東十堡係葭州神木府谷三州縣分管無庸添設併綏徳州所屬米脂等縣統隸榆林府是亦一大郡也再查榆林城有總鎮一員延安府統歸神木道管轄乃為允當一直隷州知州有本管地方之責有督察屬縣之任缺為至要陜省現有直隸同州乾州綏徳州葭州四缺今以蒲城縣知縣朱閑聖署理同州以西延同知周源署理綏徳州以呉堡縣知縣詹紹徳署理葭州以興平縣知縣胡蛟齡署理乾州顧此失彼必致貽悞夫人之精神才力專於一則有餘務鮮有悉心辦理者況四員均係平庸之才未聞其能勝任而無憾也查定例直隸州員缺督撫於通省州縣内遴選才能非慎重地方之意此數條皆臣數月以來或身經辦理或親自見聞不敢畏縮隱匿冒昧宻奏伏乞賜覽謹奏覽硃批諭㫖巻四十八
