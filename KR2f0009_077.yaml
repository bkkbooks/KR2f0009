body:
  text: 欽定四庫全書硃批諭㫖巻七十七硃批蔣泂奏摺山西按察使臣蔣泂謹奏為聖主精誠格天通省雨澤普霑事竊臣於本年四月十二日抵任後即行查各屬晴雨日期據陸續報到數十州縣得雨而平汾澤潞等處雨澤尚少是以未敢具奏茲據通省各府州縣節次具報到臣或稱得雨霑足或稱得雨六七寸四五寸不等今太原府於本月二十三四五等日甘霖大沛入土尺餘四望濃雲密布得雨之處甚多萬姓歡呼豐稔在望此皆我皇上至誠參贊精意接乎蒼穹有感必通天心協應所以優渥霑足致此時雨之施豐亨之慶也臣不勝踴躍懽忭之至為此謹奏晉省雨澤情形知道了凡百處惟以據實為務粉飾迎合朕所深惡者誌之勉之山西按察使臣蔣泂謹奏為請禁大吏坐缺題人以杜權貪事竊惟國家大政首在用人而用人之柄惟皇上一人所獨操為人臣者固不得有所僭越專擅於其間也乃自年羮堯為川陜督臣恣憑胸臆橫作威福每遇文武員缺無論大小必擇其私人始行請補或一疏而題補數人甚者或至數十人吏兵兩部幾為虚設更可駭者廵撫提鎮布按大吏皆皇上所特簡者也而年羮堯必欲擠排異已遍樹私人未有缺之先外間巳傳聞某人為廵撫提鎮布按矣聞者亦疑信相半未幾而其缺果出矣未幾而其人果得矣於是寡廉鮮恥行賄鑽營之徒羣相奔走於其門今䝉聖明洞鑒種種敗露而仕途吏治巳不免多所淆雜臣愚以為欲杜其流必防其漸法制一定大權不分臣請嗣後文臣自道府以上武臣自參將以上遇有缺出該部通行開列應陞應補之員仰請皇上特簡補授其餘各官敕定嚴例文歸吏部武歸兵部即舊例應題應調各缺亦悉聼吏兵二部銓除引見後補授凡督撫提鎮不得坐名題補若果有眞知灼見實在賢能之員止許詳列品行政蹟保薦於平日其用否出自聖裁不得有缺而後薦人如有違例妄行者治以擅權不臣之罪如此則皇上獨操用人之大柄以進退天下之賢不肖在自好大臣莫不奉公謹飭即有不肖姦貪者亦無以濟其招權植黨納賄營私之計矣為此冒昧瀆陳伏乞皇上睿鑒施行謹奏似汝如是條奏者頗多朕因踐阼未久耳目未廣知人尚少諸凡且循舊典徐徐自有制度至於年羮堯之不法行為豈止於此其狂妄姦貪實為世所罕見雖然皆朕過用之咎愧悔何及所奏闢疆固邊採買米石二摺留中候朕詳閲山西按察使臣蔣泂謹奏為恭謝天恩事竊臣接到臣兄蔣漣家信知䝉皇上天恩授為日講官又䝉天恩特陞翰林院侍講臣隨恭設香案望闕叩頭謝恩訖又接到臣叔蔣廷錫家信具傳面奉上諭汝告知汝姪伊等弟兄只要安靜盡職臣跪聆之下益深感惕伏念臣兄弟身家性命仰䝉皇上聖恩保全涓埃莫報廼䝉聖恩優渥異數頻施又䝉聖訓諄切勉勵誨廸既沐有加無已之隆施復獲覆載生成之明訓感激涕零敢不欽遵謹將安靜盡職四字朝夕䖍誦奉以終身聖恩愈渥報稱愈難臣兄弟惟互相勉勵警惕恪供職守期於夙夜匪懈不敢多事以冀仰答髙厚於萬一耳為此具摺叩謝天恩謹奏安靜盡職四字極好但非朕諭也不過爾叔廷錫朂勉爾等之意朕今將此四字再諭於爾其欽遵毋忘山西按察使臣蔣泂謹奏為恭報雨雪霑足事竊查山西通省地方自去冬以至今春雖據各州縣陸續報到得過雨雪但臣細加察訪尚未能十分霑足農夫猶秉耒踟蹰臣等正在望雨之候茲於二月二十日太原府屬大雪紛披徹夜連朝二十一日雪猶未止優渥霑足入土約有尺餘四望同雲密布得雪之處甚寛田土滋潤東作俱興西成大有自可豫卜皆仰賴皇上湛恩愷澤玉燭光天此雨雪所以周渥如斯也萬姓頂祝千里歌呼臣不勝懽忭踴躍之至理合具摺奏聞伏祈睿鑒謹奏地方和氣沴氣全關刑名出入之當否勉之慎之第以得當為主亦不以寛縱為貴也凡事速結不致拖累無辜而濟之以勤慎自無不感召天和之理勉之山西按察使臣蔣泂謹奏為報明事竊惟山西一省今嵗春夏以來雨澤應時田禾蕃茂民生樂業臣已具摺奏聞茲據潞安府屬潞城黎城二縣報稱五月初九日天降冰雹麥禾多半被傷又訪聞得平陽府屬之霍州亦遭冰雹傷損田苗臣隨行令各地方官將被雹村莊加意撫綏設法拯濟毋致失所務令及時補種以冀秋成外所有冰雹情由理合奏聞其餘百餘州縣風雨順時二麥可望豐收秋禾皆已長𤼵合併奏聞伏乞皇上睿鑒謹奏雨澤田禾情形知道了歸併州縣一摺留中候另紙鈔謄不露爾名交發部議凡如此等之奏密之山西按察使臣蔣泂謹奏恭請皇上聖安朕安保舉官員一摺留中籌邊一摺所論雖甚有理但積貯至二百萬石之多不可不計及將來作何出陳易新之法必蓋藏有術霉爛無虞儲久不致虧耗方收實濟類此等處不預為籌畫遽然舉行可乎至於邊省固宜強兵亦必令天下強弱髣髴始免偏重之慮秦地素稱壯勇若再加此一番精練則與他省更相懸殊矣豈為平治良策摺亦留中候朕熟思審定密之山西按察使臣蔣泂謹奏為敬陳足食足兵以收實效事竊惟國以民為本民以食為天天下何處不應積貯而惟沿邊為最急兵可百年不用不可一日不僃天下何處可弛武僃而惟沿邊為最重臣前在邊庭軍興以來竊見當地之倉廩無幾千里之餽運維艱長征逺戍每慮糗糧之難於接濟至於兵制之數具在本足以資戰守而勤惰不齊強弱參半披堅執鋭之士未必盡皆精練也臣受恩深重圖報無由茍有一得敢不罄竭愚誠所有積貯武僃事宜敬為我皇上陳之竊計沿邊積貯約計須二百餘萬石乃為豐裕但建倉買穀經費浩繁而西土賦税稀少户鮮蓋藏於何措辦臣查捐納欵項久經停止誠不可以復開而常平倉捐監之例無礙於吏治民生臣請暫歸併甘肅各省俊秀捐監者俱赴臨鞏藩司衙門交納或慮未敷量加紀錄加級捐貢二三條俟足二百萬石之數停止則經費裕而積貯有資矣至口内口外肥饒之地可以耕者宜令各該地方官廣行召募開墾並以召募開墾之多寡課其能否則野無曠土而穀石自裕矣若夫兵以衞民武僃宜修必須兵無空缺選擇精壯老弱則盡行簡汰不得濫行頂充臣前與𠞰番之役深知制勝之技無過鎗礮查陜西官兵不下數萬於中誠得壯勇精熟鎗手三萬名礮手一萬名勤加操演十分精熟臂指可使何宼不摧此固武僃之急務也至邊人勇健武技本所􅈺習自民間不得私挾鳥鎗等器不得私養馬匹雖足以禁戢姦宄而本分良善之人轉乏防衞之具竊以為挾持鳥鎗不許養馬之禁宜嚴於内地而少寬於邊塞俾於農隙之時任其練習斯亦寓兵於農之意將塞下之鋭勇匝地而邊疆之武僃彌嚴矣以上足食足兵之見臣不揣冒昧㒺知忌諱輒行瀆奏是否可僃採擇伏祈皇上睿鑒施行謹奏詳閲所論識見甚淺可謂只知其一不知其二也山西按察使臣蔣泂謹奏為恭繳諭㫖事竊臣前奏恭請聖安一摺奉有硃批臣跪讀之下仰見皇上聖神文武包涵無外萬幾貫徹其初終庶務經營於美僃洞照九有之情形黙運萬邦於指掌聖慮周詳聖謨廣大小臣智識短淺仰荷聖恩指示訓誨實廣開茅塞之心感激涕零今後惟凜遵聖訓每事務益加謹熟思前後不敢但見一偏以仰副我皇上提命之至意所有奉到御批理合恭繳伏祈睿鑒謹奏極當加勉自勵公私二字最宜辨别明晰必心無愧怍方能永久䝉朕眷注也山西按察使臣蔣泂謹奏為恭繳諭㫖事竊臣接奉御批極當加勉自勵公私二字最宜辨别明晰心無愧怍方能永久䝉朕眷注也欽此仰䝉皇上訓誨之恩警勉諄切慈愛有加臣跪讀之下感惕交深惟有鏤刻寸𠂻夙夜謹凜竭誠奉公不敢稍存一毫私念以仰報隆恩於萬一耳所有奉到御批理合恭繳仰祈睿鑒謹奏凡百處須要自已求一是字為上策此外俱不可恃即如爾叔蔣廷錫只可照顧彼一身之是何能護庇子姪之不是再如督撫上司尚不能保其一身之是何能代爲屬員隱諱不是故曰居官之要莫過於潔已奉公盡力勉一是字朕乃惟知據理不喜徇情之主法外私恩不可倖邀也慎之勉之謹誌勿忘山西按察使臣蔣泂謹奏爲恭報春雨及時事竊惟晉省地多髙原恒資雨澤而雨澤霑足尤在及時查太原大同朔平寧武等府平忻代保等州一帶地方深春始暖二麥生發固藉雨以長養汾州潞安澤州遼州沁州至平陽以南蒲州解州絳州吉州隰州一帶地方物候較早麥穗將吐尤賴雨以滋培農人望雨之情斯時實為倍切今於本年閏三月初三初四及初七等日甘霖普徧據各州縣陸續報到或稱得雨六七寸或稱得雨四五寸三四寸不等田畝獲優渥之施來牟兆豐亨之慶臣僃員地方曷勝懽忭之至謹具摺奏聞仰祈睿鑒謹奏頃據徳明奏報晉省得雨情形甚屬糊塗覽爾此奏朕懐深慰曷勝嘉悦之至山西按察使臣蔣泂謹奏為恭繳諭㫖事竊臣接奉御批凡百處須要自已求一是字為上策此外俱不可恃即如爾叔蔣廷錫只可照顧彼一身之是何能護庇子姪之不是再如督撫上司尚不能保其一身之是何能代為屬員隱諱不是故曰居官之要莫過於潔已奉公盡力勉一是字朕乃惟知據理不喜狥情之主法外私恩不可倖邀也慎之勉之謹誌勿忘欽此臣跪讀之下感懼交切伏念臣仰荷皇上敎訓時時提撕警覺終始成全之至意雖父師之告誡亦未能深切肫摯至於如此臣惟有惕厲小心勉竭愚誠欽奉潔已奉公四字書紳銘心以仰報我皇上提命之洪恩生成之大徳於萬一耳所有奉到御批理合恭繳伏祈睿鑒謹奏惟以不欺不隱爲要勉之山西按察使臣蔣泂謹布散黄帖糾約多人夜聚明散如有不入其黨者羣持兇器威逼又將捕役拘留毆傷防兵宋全卑皇上徳威諭以利害村莊民人俱感激鼓舞無復附入餘匪類各散容職伺便密拏等情七月初四日又據劉毓嵒報稱續獲同黨孫子瑞王珍楊章等十焦養禄等現在緝拏俟獲日另報至地方居民俱各照常安業並無擾累初五日又據報稱移闗濟隣近地方協捕其合同黄符等件先呈護撫臣髙成齡所有現獲人犯焦明山等十七名俟解到省城審明申詳護撫臣核審具題外事闗匪類糾黨現在擒獲解散情形謹具密摺奏聞伏祈皇上睿鑒施行謹奏緝捕有方甚屬可嘉此種匪類豈可一日姑留於地方耶山西按察使臣蔣泂謹奏恭請皇上聖安朕安近日都中秋雨連綿不止朕正爲此憂慮山西目今雨暘情形應乘便附聞何故竟未奏及耶山西按察使臣蔣泂謹奏爲恭報晉省嘉禾盈野年穀豐登仰祈睿鑒事竊臣前具恭請聖安一摺奉有硃批臣跪讀之下仰見皇上宵旰勤求無刻不以民依為念臣未隨時奏達致煩聖心懸注愚昧之愆惶悚靡既伏查山西今春雨澤及時二麥俱已豐收閭閻歡慶自夏及秋以來尤為雨暘時若查據通省各府州縣所報或五六日一雨或七八日一雨俱際田間引領之時但多霑足之歡並無積雨之患見在天氣晴朗即日百穀登場收成約有十分又據陽曲清源平遥靈石等縣各詳報嘉禾呈瑞一莖二穗至六穗不等臣親行捧驗實屬非常此皆我皇上敬天勤民精誠感格爰致此千倉萬箱之盛並產此雙岐九穗之奇也緣事關上瑞理合具題敬將各縣所呈嘉禾加謹封貯呈詳護撫臣髙成齡題報外謹此奏聞仰祈睿鑒謹奏覽奏並無積雨之患朕懷深慰山西按察使臣蔣泂謹奏為遵㫖覆奏事竊查澤州大箕地方匪類聚衆不法前據知州劉毓嵒詳報到臣臣即具密摺奏聞嗣於七月二十日臣家人齎捧原摺回署荷䝉聖明指示精詳無微不燭諭臣細加察訪據實奏聞臣凜遵聖諭即專差幹練屬員又令信實家人前往大箕一帶地方密為細訪所有實在情形謹行奏明伏奉御批近有二字少屬含糊起自何時須當察確看此局面似非一時偶聚細加密訪具奏以聞欽此臣謹查頭目陳桂焦養祿王君禄等與首惡靳廣平日俱係不務本業之人隨有河南濟源縣人翟斌如衆號為翟神仙者素知醫卜兼奉道敎向與靳廣等往來熟識本年三月内遂陰結邪黨習學拳棒夜聚明散形迹詭祕至六月十九日知州劉毓嵒訪聞確實差役拘捕適大箕里有觀音㑹人衆混雜首惡靳廣頭目陳桂等即糾約夥黨威逼平民以致拘留捕役毆傷防兵至六月二十三日聞有官兵前來方行解散臣見在嚴刑審訊究其意欲何爲據供欲於九月内抄搶富户衞姓陳姓并欲謀搶州城等語緣首惡頭目逃往河南等處未盡弋獲口供未能畫一又欽奉御批據此景象諒必聚集多人矣大約人數若干察明奏聞嚴督緝捕自當以拏獲首惡為要其餘脅從原可不必株連朕不過欲審知其局勢耳欽此臣謹查六月十九二十二十一二等日靳廣陳桂共聚一百一二十人羣集大箕河灘其首惡頭目與知情同夥者不過二十餘人此外俱屬廹脅附從之衆臣仰遵聖諭如果逼勒是實自應不必株連其屬同謀知情者斷不容少為寬縦再拏獲敎師焦明山與黨惡劉和尚等欽奉御批擒拏之時曾拒捕否欽此臣謹查拏獲焦明山劉和尚之時俱係紳士鄉民舉首到官協同捕役擒解並無拒捕情事至供出之河南楊副將欽奉御批此楊姓者更為緊要欽此臣謹查該犯本名楊廷選係山東人曾做過濟源千總犯事革退愚人遂州寶豐縣去等語臣即具詳護撫臣髙成齡差員前往守提并星飭澤州差捕嚴拏務獲在案至督令嚴拏陳桂等欽奉御批止差人役曾用兵弁否欽此臣謹查前雖移營撥兵協捕嗣於六月二十三日黨羽解散後各犯等自知罪無可逭旋即分頭四散逃遁見在止多差捕役四路躧緝並無占據窩巢藉用兵弁擒𠞰之事以上各條臣仰奉聖㫖細加確訪實在情形臣見在㑹同欽差御史臣性桂布政使臣髙成齡欽遵傳奉密㫖將前獲之焦明山翟神仙等與續獲之郭海龍張禄王君禄楊廷選等到案公同確審㑹同具摺奏聞外先此奏覆伏祈皇上睿鑒謹奏覽悉山西按察使臣蔣泂謹奏為恭報瑞雪普遍事竊惟冬雪為春麥之資而霑足乃豐收之兆查據太原汾州潞安平陽大同寧武朔平七府澤遼沁蒲解絳吉隰平忻代保十二州所屬之各州縣於本年十月初三初四及十九二十二十一等日陸續申報得雪或稱三寸四寸或稱五寸六寸以及尺餘不等瑞雪繽紛各屬俱已普遍從此再添臘雪固為優渥之施即令遥接春雨亦可保土膏之潤合省軍民咸以此為豐登之兆莫不感戴聖主恩澤額手稱慶臣目睹嘉徵實深歡忭理合繕摺奏聞仰祈睿鑒謹奏若云雪係來年收成預兆則可麥禾長發全靠春雨爲主也山西按察使臣蔣泂謹奏為密奏事竊惟各省藩庫銀兩闗係重大司其任者在辨析事之公私詳核用之當否當用則正項自應動支不當用即耗羡亦應節省今山西布政使臣髙成齡於提貯耗羡公費一項凡往來酬酢等費並非公事恣意取用聞已虧項至數萬以外新任撫臣石麟不准開銷髙成齡無可彌縫乃議於各州縣養亷内先擬派五萬兩或扣一季或扣兩季以作抵補各員面雖承應實多怨言且恐各官養廉不敷必至派累百姓至建設先農壇一事皇上重農祈穀創千古未有之盛典自應發給帑項俾之辦理乃各屬敬謹恪恭承辦恐後而髙成齡度外置之一切興工老農諸費迄今並未給發又如禁止黄銅器皿交官給價自應查明定價給發乃髙成齡一任州縣呈詳漠然不應去年所繳銅觔至今未經領價經臣詳請撫臣飭行發給而奉法之民已不免守候之累又若大同朔平寧武三府所屬改設之陽髙等九縣衙署監獄俱關緊要自應詳請具題動支建造乃經今三載官員俱借民房居住人犯亦借店舍看守頻經府縣估價造册呈詳臣亦再四移催髙成齡視為泛常一任躭延臣近已詳請撫臣石麟速飭藩司估議具題以上各條臣既有見聞不敢不奏伏懇皇上諭㫖密飭撫臣石麟徹底嚴查斯官帑不致濫用公事不致廢弛而地方官民均汏皇仁於靡既矣謹具摺密奏仰祈睿鑒施行謹奏將此摺密交石麟看若查有實據即具題嚴㕘石麟看過密之山西按察使臣蔣泂謹奏為恭謝天恩事竊臣於本年十二月初五日接臣叔蔣廷錫家信伏知臣父蔣陳錫山東倉穀羡餘一案經山東廵撫塞楞額查明具奏九卿議覆欽奉諭㫖將臣父名下應追册費公費二項銀兩恩賜豁免臣聞命之下感悚交集隨望闕叩頭恭謝天恩激切微悃不禁涕泗横流伏思臣父蔣陳錫捐穀一案仰䝉皇上准令行查實在數目臣父共應追賠銀七十九萬五千餘兩較之原㕘之數已減三分之二仰荷皇上洪慈超逾格外今復奉諭㫖將應賠册費公費銀五十八萬兩零特賜豁免隆恩異數曠古未有臣一門百口沐皇上再造隆施感激之私銘心鏤骨惟兄弟子姪互相誡勉共矢愚誠務期竭盡駑駘以仰酬髙厚於萬一爲此具摺叩謝天恩伏祈睿鑒謹奏感激之忱何待汝之奏謝朕始見信耶必也屏盡私心勉勵為國家柱石之臣有以利益社稷蒼生方為不負朕之格外恩施耳勉之山西按察使臣蔣泂謹奏爲欽承諭㫖謹行奏覆事竊臣緣臣父蔣陳錫捐穀一案蒙恩豁免具摺恭謝天恩奉有御批伏念臣受恩深重日夕矢心竭盡駑駘今奉諭㫖仰荷皇上訓誨之切勉勵之殷捧誦之下感愧交深敢不祇承天語夙夜兢惕屏私守正盡力竭誠以冀仰副聖心上報隆恩於萬一所有欽奉硃批諭㫖恭行呈繳謹此奏覆伏祈睿鑒謹奏言之雖易此要看爾祖宗積行及爾福量何如耳朕每觀根基淺薄者竟有心欲勉而力不能之勢但將方寸持正一以公誠自律庶幾福基漸厚本立而道自生也勉之勉之山西按察使臣蔣泂謹奏為恭報春雨及時事竊惟三春雨澤實為二麥之資而西北髙原尤冀土膏之潤今雍正六年二月二十一二十二日晉省太原地方雨雪並施徹夜連朝入土尺許四望同雲密布沾被之處甚寛際此及時之施二麥豐收已可預必歡聲盈野莫不額手聖主景福致此恩膏臣僃員地方曷勝懽忭之至理合具摺奏聞仰祈睿鑒謹奏覽春雨情形不禁以手加額地方刑名如能允當上感天和朕可力保勉之慎之山西按察使臣蔣泂謹奏為密奏事竊臣奉撫臣石麟委署布政司印務錢糧重大臣徹底清查庫中正項錢糧並無虧缺雍正元二三年耗羡實在存銀六十餘萬兩四年僅存五千餘兩五年除未完民欠銀三萬餘兩外見存司庫銀四萬餘兩臣將節年用過公費逐一詳查其中有浮銷濫支應核減追賠者約共銀九萬五千餘兩欵項繁瑣不敢瀆奏已逐一造册呈明撫臣著落伊都立髙成齡及經手各官追賠歸還原項外理合具摺奏聞伏乞睿鑒謹奏覽奏已悉逐項一一查明仍候岳濬到任再加斟酌而後定議方是山西按察使臣蔣泂謹奏為奏聞事竊臣於雍正五年十一月二十四日據臨晉縣知縣劉國琮詳報該縣張村人師刑等抗糧阻比聚衆鬨堂等事旋獲張臣樊中花二犯該員不加防範致令脱逃業經具詳撫臣石麟以疎縱題㕘在案嗣知各犯藏匿各村奉廵撫檄行嚴拏諭以第緝首惡無滋紛擾該州縣等隨親往開導并出示曉衆無如村愚執迷堅不送出遂令人役前往查拏内有張村昝村人又聚集拒捕致傷死衙役楊魅等三名被傷衙役鄭國金等十餘名據該州縣等詳報前來如此㝠頑兇悖自干罪戾似應派撥兵弁彈壓多差委幹役民壯緝拏并飭該地方官詳加分别無使兇徒漏網而良懦株連除詳撫臣石麟外理合奏聞謹奏知道了此種頑民敗俗干紀務宜窮其根源不可少有寬假以長刁風尤不可絲毫掩飾以圖茍且完結一面嚴緝一面確查奏聞山西按察使臣蔣泂謹奏為奏明雨澤及時民生樂業事竊查晉省自本年二月二十一日得雨之後兩月以來各屬雖時有雨澤而太原汾州平陽三府所屬及平定州忻州所屬地方天氣久晴四月二十一日始各得雨一二寸不等迨二十九日太原府地方得雨自戌時起至三十日未時止徹夜連朝甘霖霢霂徐而善入土膏深潤且四望雲合得雨之處甚寬汾州平陽府平定忻州地方亦俱得雨入土深透五六寸不等二麥自各豐收秋禾亦俱播種又晉省地方四月間時氣流行頗多傳染第不過一二日即愈人民並無損傷今時氣盡消民生安業合併奏聞統祈皇上睿鑒謹奏覽奏久晴得雨時氣業巳全消朕懷深慰山西按察使臣蔣泂謹奏為恭謝天恩事竊臣接到邸抄奉㫖廣東布政使員缺著山西按察使蔣泂補授欽此臣恭設香案望闕叩頭謝恩訖竊臣至愚極拙屢年以來疊沐皇上髙厚隆恩至優至渥方愧未有寸效時切悚懼乃復蒙特㫖授臣粤藩重任聖恩愈厚報稱愈難臣惟夙夜兢惕奉公守正不敢稍存瞻顧因循之念竭盡犬馬之力以冀仰答髙厚洪施於萬一耳為此具摺叩謝天恩伏祈睿鑒謹奏覽將責任内事交代完畢來京聆朕面諭山西按察使陞任廣東布政使臣蔣泂謹奏為遵㫖奏明事竊晉省臨晉縣張村昝村拒捕一案臣前繕摺奏聞奉有御批臣欽遵諭㫖即嚴檄蒲州及該縣查拏并疊行懸示重賞務將各犯緝獲嗣獲師刑一犯提解省城臣細加研訊供出拒捕張景師等一十餘人復經差役嚴拏旋聞該犯等以情罪難逭欲仍作拒捕之計現又差人密訪間撫臣石麟傳示怡親王札緣太原鎮臣袁立相摺奏州縣乏員整理等因奉㫖石麟蔣泂不應疎忽至此臣跪誦之下不勝惶悚荷蒙皇上天恩不即加罪責命怡親王傳諭嚴飭聖恩髙厚感激無地所有微臣感悚之忱合行奏謝正在繕摺間據署臨晉縣閻鈵稟稱樊中花張臣二犯傳訊伊等兄弟又已選役給批并差押親人緝拏復親至三村角盃村昝村民人俱逺出迎接極辯並未拒捕惟張村一村向其勸諭令將拒捕之人送出則有要死死在一處等語牢不可解又據蒲州知州崔佩報稱樊中花一犯已於陜西朝邑縣地方拏獲等因隨飭該州縣分别設法迅緝張臣及拒捕各犯務獲并提樊中花到省親訊外再查師刑樊中花二犯雖經就獲而閻鈵所稟張村固結袒惡情形與臣密訪無異勢必不甘束手此非數十名快役民壯所能拘拏似應撥兵擒捕仰請聖裁指示令臣親赴臨晉㑹同營員帶兵相機緝拏庶可戢兇頑而振法紀良善百姓亦不至波累矣謹具摺奏聞統祈睿鑒施行謹奏此事朕遣部臣前來查究辦理候㫖遵行光祿寺卿臣王璣山西按察使陞任廣東布政使臣蔣泂謹奏為奏聞事雍正六年六月初四日臣王璣奉命馳驛往山西辦理臨晉縣拒捕一案臣跪聆聖訓即於初六日出京十三日抵太原省城遵㫖㑹同陞任按察使臣蔣泂先𤼵告示宣布皇仁招徠投首遣蒲州府知府劉登庸預行曉諭臣等於十六日由省起身二十四日到縣查得事起於被㕘之知縣劉國琮催科無術重刑徵比以致激民閙縣當經把總勸散劉令不應捏詳拆屋毆官張大其詞况所舉張村師刑角盃村張臣昝村樊中花倡率之處係民壯王彪舉報閙縣之張臣實屬張村人氏而所報獲之角盃村張臣原因急公送騾㸃驗誘拏即樊中花投首到縣該令亦並不問取確供概行監禁迨十二月二十七日午後樊中花張臣因禁卒酒醉隨開鎖脱逃劉令以越獄具報經撫臣石麟具疏㕘革委有萬泉縣知縣杜庭珠署事復檄飭蒲州知州崔佩絳州知州萬國宣署縣杜庭珠帶役查拏但該州縣不應於三月初四日夜帶役各村分查而崔佩復駕馭無術以致村民倉惶急廹拒捕傷人誠如聖諭不當於昏夜擒拏也伏查張村離城二十餘里共一百八十餘户内包大興一村鄉愚恐懼盡徙室家所餘僅老朽數人遂至錢糧無人完納臣等於抵邑之日宣揚聖德又發二次曉諭委曲勸化限日投歸而張村人民猶懷疑畏縮臣等再四思維查有失報河清案内被㕘革職之臨晉縣知縣孫琰素得民心當即給示曉諭詳細指明著令前往敬以皇上好生為心恐累善良不忍即申天威以彰國法之溫綸勸其歸化且仰體𢎞慈浩蕩許以投首自新或得邀恩末減孫琰隨即親詣該村晝夜盡心開導千百鄉民始信無欺一旦悔悟感泣盡挈人畜來歸完糧赴縣臣等復開導安撫婦稚仍享太平羣黎還就耕鑿今張村實在鬧縣之張臣併張景師王厰張聲張克耀師開師全師夫張君民張元長張安世張曹吳宗義等凡鬧縣拒捕之犯或行投首或行捕獲見同先獲之師刑樊中花王彪等分别禁押統俟審明定擬核實另行奏請睿鑒理合先將起釁緣由以及格化情節臣等合詞奏聞謹奏前後情節瞭如指掌嘉悦覽之山西按察使陞任廣東布政使臣蔣泂謹奏為恭報晉省秋收分數仰祈睿鑒事竊查晉省所屬地方今嵗自五月以來雨澤霑足嘉禾疊見今築場納稼之㑹雖鹵地沙磧及山岡田畝亦有七八分收成而豐收之處髙原下隰莫不茨梁在望統而計之收成實屬十分合省羣黎咸以屢豐之慶感戴聖澤載道歡呼臣睹此盈寧曷勝額手所有秋稼收成年嵗豐登之處理合具摺奏聞謹奏秋稼收成深慰朕懷但不可少渉肆志當勉之又勉慎之又慎山西按察使陞任廣東布政使臣蔣泂謹奏為奏明事竊惟各省開墾地畝一案伏蒙皇上天恩特頒諭㫖宥其已往准令首報統於雍正七年入額徵解欽遵在案臣於雍正六年正月二十九日接署山西藩篆檢查案冊見首到墾地八十餘頃即查催各屬地方官宣播上諭實力開導務使鄉愚家喻户曉今自本年二月以迄六月據各屬詳報首墾地畝三千一百餘頃連前所報共有三千二百餘頃限期已屆不敢少稽見將首報畝數造冊呈詳撫臣核題外臣竊有請者查見在首出地畝雖已有三千二百餘頃但臣之勸諭僅止四月有餘晉省地方遼濶必尚有首報未盡之地臣見又嚴行飭查自必有陸續首報者雖限期已逾可否仰懇聖恩但於雍正六年内首到者續行具墾地必盡行首出矣為此具摺奏聞仰祈睿鑒施行謹奏候朕另降諭㫖山西按察使陞任廣東布政使臣蔣泂謹奏為恭激御批叩謝天恩事竊臣前具恭報晉省秋成一摺奉有硃批臣跪讀之下不勝感激涕零伏念臣舉家受皇上生成保全之恩即捐糜頂踵亦不能仰報涓埃而庸陋之質罪戾多端前接臣叔蔣廷錫臣兄蔣漣家信宣傳聖訓開導愚䝉臣叔臣兄皆嚴飭敎誨諄切警戒臣感皇上之洪恩奉家庭之嚴訓慚愧惶悚無地自容荷䝉天恩不即加嚴譴批示訓戒臣雖至愚猶有人心自當時切勉勵益加謹慎不敢存一毫茍且之心以無負我皇上髙厚隆施於萬一耳所有微臣感激愧悚之私謹因恭繳御批具摺奏謝仰祈睿鑒謹奏訓誨開導正欲爾勉勵加慎倘若下愚不移則朕一番髙厚之恩殊屬可惜諸凡行為當時自檢㸃如不妥協而欲希冀姑容不可得也百凡須求諸已問之天不愧不怍為第一良䇿勉之勉之山西按察使陞任廣東布政使臣蔣泂謹奏為裕課便商事竊臣自接署藩篆以來以晉省税項隱匿者多遵奉恩諭開導各員凡有贏餘務令據實首報以無負我皇上寛大之恩見據陸續首解俟首完之後詳明撫臣具題外再檢查册籍見鐵税一項寥寥無幾臣細加詳覈知澤州潞安平定州多有產鐵之處每年騾䭾車載運赴四方不知凡幾而歴來並不抽税徒令懋遷之輩日操奇贏山澤之利不歸於官而獨擅於民既非裒多抑末之道亦非奉上急公之義臣請嗣後產鐵開採地方俱照銅鉛之例二八抽收以鐵價計算完納令地方官儘收儘解視每年所報若干再行定額斯物產於山非徒飽富商之槖而税賦於官亦足僃匪頒之用似於國課稍有裨益如臣言可採仰祈皇上敕部議覆施行謹奏此事與撫臣石麟詳加斟酌若行之而於地方民事有益方可具題請㫖朕意且宜緩爲山西按察使陞任廣東布政使臣蔣泂謹奏為恭謝聖訓事竊臣家人齎回恭繳御批叩謝天恩一摺奉有訓㫖臣跪讀之下汗流浹背又感泣沾襟臣䝉皇上天髙地厚之恩復奉至訓提撕警覺聖恩深重感激難名臣謹以諭㫖求諸己問之天六字敬錄懸於臣室時時瞻仰刻刻儆惕以冀仰副我皇上敎誨成全之至意於萬一耳所有微臣惶悚感激之忱謹具摺奏謝仰祈睿鑒謹奏操守二字甚難事也往往見極聰明大有識見之人看不透者十居八九於此竭力勉之山西按察使陞任廣東布政使臣蔣泂謹奏為奏明雍正四五兩年耗羡銀兩事竊查晉省耗羡經前撫臣諾岷酌定以公完公之法核計嵗額該收耗銀四十九萬五千七十兩零内除支銷養廉及公費外存留銀二十萬兩以彌補無著虧空自雍正四年前督臣伊都立議減耗至加一三以來通計毎年收耗羡銀三十七萬一千餘兩爾時公費又多浮濫以致存留司庫耗銀甚少是以雍正四五兩年耗羡前布政使髙成齡任内未經造册奏報臣署藩司印務將一切公費逐加核實凡屬濫用浮銷之項業經詳請撫臣題追在案今各項公費俱核實節省嗣後每歲約可存剰耗銀一十一萬六千餘兩以僃採買穀石爲地方積貯等項之用除將四五兩年耗羡收支實在細數僃造四柱清册呈送撫臣石麟具奏外謹將簡明數目另摺開具恭呈御覽謹奏汝果能秉公持正而行將來不爲人所指摘朕自有鑒照勉為之予受之際操守一節虚譽所在情面二字絲毫不為搖惑方保終始無虞一渉行險僥倖斷未有不敗露之理稍看不透貽悔後日噬臍莫及如汝父即此輩人也正所謂雖孝子慈孫百世不能改者夫復何益不特此也㝠黙中報應不爽尚有不得而知者在可不戒乎勉之思之山西按察使陞任廣東布政使臣蔣泂謹奏為恭報瑞雪普沾疊沛億兆頂戴恩膏事竊山西通省於雍正六年十一月初二日得雪霑足二十三日又得微雪十二月十三十四十五等日太原府屬得雪一尺有餘旋據各屬陸續報到或稱五寸六寸或稱七寸八寸以及尺餘不等本年正月初五初十十五等日又復得雪合省廣被二麥獲滋培之益萬姓騰優渥之歡莫不額手皇恩嵩呼聖澤臣獲睹地方情形曷勝歡欣之至理合繕摺奏聞仰祈睿鑒謹奏二麥得雪雖獲滋培之益要須入夏後方可言收成也讞獄乃感召天和之根本平允爲清理刑名之要道敬慎毋忽山西按察使陞任廣東布政使臣蔣泂謹奏為欽奉上諭事雍正七年三月初一日奉山西撫臣石麟行知吏部咨文雍正七年二月二十三日奉上諭聞二月初五日夜山西蒲州城内道府城守文武衙門三處同日被盜明火執仗刦去衣物等項此事朕已聞知而廵撫提督兩司何以遲延尚未奏聞山西地方盜竊之事甚多今以地方大員衙署尚且被刦則民間可知矣廵撫提督等所司何事而疎縱廢弛至於如此著廵撫提督等轉飭屬員將蒲州盜犯嚴行緝捕務令全獲倘少有隱飾逾限不獲定將廵撫提督等一併嚴加議處欽此臣跪讀之下不勝惶悚遵查本年二月十五日據永濟縣申稱二月初四日夜河東道署内失竊當委役分緝獲賊藍樹奇供出夥賊張五等四人隨選差幹捕躧緝同日又據該縣申稱蒲州協鎮署内於二月初四日夜亦被賊竊等因當經臣嚴飭蒲州府多差幹捕勒緝賊贓務獲嚴審行刦幾次有無窩主律擬招解仍將同城疎防各官職名報㕘去後嗣據霍州知州申稱選差同永濟縣差人於二月十一日黎明在辛置店内將李添才等一行七人拏獲當即嚴訊各供認分竊道協衙門是實隨將各犯及贓物查㸃開單選差護遞至永濟縣收審等因又據洪泂縣申稱正月二十八日該縣署被竊又據申稱經霍州拏獲賊犯李添才等七名並贓物遞解到縣查㸃贓單内有與失去衣服等物相符等因當以係屬慣賊恐遞審疎虞即飭歸永濟縣分案嚴審招解並又檄催嚴查各强竊確情勒緝賊贓全獲取具疎防各職名報㕘及查有無餘賊在案今奉上諭除移該道協將諱强情由據實確覆及嚴查蒲州府諱盜不報確情並飭嚴審夥賊確數依限全獲審擬招解不得少有隱飾外所有臣未行奏聞之處實屬愚昧仰祈皇上敕部議處施行謹奏自應議處何待汝之奏請既經隱諱於前若再不實陳於後二罪俱罰決不稍寛也山西按察使陞任廣東布政使臣蔣泂謹奏為恭繳御批叩謝聖訓事竊臣家人齎回臣奏明雍正四五兩年耗羡銀兩一摺奉有硃批臣跪讀之下伏䝉聖訓諄切提撕警覺䇿勵成全俾鑒前車於臣父益凜夙夜之悚惶感愧交集汗浹涕零臣敢不日夕冰兢深自朂勉務守秉公持正務戒營私沽譽以冀仰副皇上訓誨之恩於萬一所有微臣感激惶悚之忱謹具摺奏謝仰祈睿鑒謹奏酌之人情合諸天理較利與害計是與非何一不當痛自朂勉耶若猶矢志不堅仍復因循故轍非鬼神使然即係天奪其魄耳自勉之道無他惟竭力克盡一誠字而已至於感激悚惶不過外像敷衍情形亦何益之有山西按察使陞任廣東布政使臣蔣泂謹奏爲恭報雨澤普霑事竊本年晉省地方春初得雪經臣摺奏兹三月初一日太原府屬得雨雪三寸有餘嗣據各屬報到或稱三四寸以及五六寸不等臣奉命㑹同查看汾河於初四日自太原府起身所有辦理事宜俟欽差臣何國宗馬爾泰定議公摺具奏外臣十一日行至洪泂縣逢雨竟日旋據各屬報稱四野霑足二十二日回至介休縣地方又復遇雨各屬報到亦皆普徧一月之間三逢雨澤通省之内咸獲優渥汾州平陽絳州等屬地方物候較早髙原下隰二麥已俱十分菁葱茂盛所有雨澤日期及春麥情形理合具摺奏聞仰祈睿鑒謹奏覽奏得雨日期知道了但能清理刑名俾民情和暢則上天之嘉應朕可保其必不爽也山西按察使陞任廣東布政使臣蔣泂謹奏爲欽奉上諭事竊本年二月初四日夜山西蒲州道協兩署被盜及獲賊緣由經臣具摺奏覆外兹據蒲州府據縣錄供申稱所獲賊犯八人内李添才馬三傅二馬福成張五等五犯本年二月初四日夜分入道署協署行竊李虎藍樹奇王克已三犯在灘看守牲口又據馬三供去年八月二十六日同馬二張漢傑藍樹奇四人自平陽府假稱買馬各騎騾而行九月初三日至太原府馬三同張漢傑進偷督學署内所獲贓物經馬二䭾往張家口變賣嗣據陽曲縣審據賊犯馬三供出贓物貂帽刻絲包袱等件呈驗學臣署内認係原失之物至李添才等供案纍纍實係便㨗積賊除飭嚴加防範逐案細審移查明白起驗正贓定擬招解以及遴差嚴緝供出之馬二務獲外臣查此項賊人扮客乘騎逺出流竊任意越城慣偷衙署非尋常竊盜可比容俟逐案分别審擬詳題請㫖外先此奏聞謹奏務須徹底嚴究毋致少有疎漏山西按察使陞任廣東布政使臣蔣泂謹奏爲恭繳御批事竊臣前具恭繳御批叩謝訓旨一摺復䝉聖訓諄切愷至臣跪讀之下通身汗浹惟有欽承朂勵謹將奉到訓旨時時䖍誦事事黽勉以冀仰副聖主至訓於萬一謹奏不能據實無欺於未諭之前徒然通身汗浹於奉訓之後何益耶戒之向後惟黽勉不欺隱三字爲要山西按察使陞任廣東布政使臣蔣泂謹奏爲請旨事竊查徵收稅課贏餘一案䝉皇上天恩准令自首既免從前多收之處分復與以一年之限洪恩曠典互古未有臣奉文嚴飭并開誠曉諭各屬務將實在數目悉行首報今除奏銷過雍正五年分贏餘銀二萬五千八百兩零外又續首五年分贏餘銀六千八百兩零六年分全首贏餘銀三萬三千七百兩零經僃造清册詳送撫臣查核臣猶有請者各屬已據首報或慮猶有未首之處以及陞任離任冋籍之員見在咨查未據覆到今限期已屆可否仰懇聖恩俯賜展限半年續有首到一體免議斯各員無所顧慮自必全數首出不致回護掩藏共戴皇恩於靡既矣除詳請撫臣具題外理合奏聞謹奏是該撫具題到日有旨山西按察使陞任廣東布政使臣蔣泂謹奏爲謹陳愚悃伏祈俞允事竊臣舉家受皇上天恩至深至重夙夜感戴而涓埃莫報兹聞兩路大兵進𠞰準噶爾臣不勝欣喜踴躍願得效力行皇上天威幸有成效今欣逢王師北討正人臣宣揚威徳蕩平逆寇之時伏祈聖恩俞允於北西兩路將臣撥與何路委以驅馳之任俾得少展犬馬微勞將來大軍告㨗臣名得附於勲册之末則叨被榮光於無既矣所有懇請愚忱仰祈睿鑒謹奏兼理兩司果能秉公竭力以仰副朕之任用勝於行間奔走之勞逺矣此請不必山西按察使陞任廣東布政使臣蔣泂謹奏爲欽奉上諭事竊本年二月初四日夜蒲州道協兩署被盜一案經臣將獲賊及各犯供沿途偷竊情由具摺奏達外臣又訪聞是夜有抛瓦傷人及在協署挾嚇等事隨又密行蒲州府確查去後兹據蒲州府申據永濟縣知縣施奕簪訊據賊犯馬福成供入協署驚醒事主遂按脖挾嚇㩦物而出賊犯張五亦復供同及至城下有兵丁孔孝喝趕被賊犯李添才拾瓦擲傷旋中風斃命副將魯彥燦任意捏諱不令家人到案質審各情由揭報前來臣查副將魯彥燦既不防範於先又行欺飾於後不職之愆實所難免除詳撫臣聽候題㕘外謹行奏聞伏祈睿鑒謹奏好如此方是凡遇類斯事件不必絲毫瞻徇情面山西按察使陞任廣東布政使臣蔣泂謹奏爲恭報雨澤事竊晉省今春雨澤及時經臣摺奏兹太原府於四月二十七日將晚得雨至次日清晨約計四寸旋據各屬報到或稱三四寸或稱五六寸或稱四野霑足通省俱各普徧太原府於五月初四日又得雨竟夜初五日將晚得雨至二更續據各屬報初四初五等日得雨五寸六寸不等當此田間望雨之時既獲普沾兼逢疊沛官民莫不額手稱慶理合繕摺奏聞仰祈睿鑒謹奏覽此番奏報獲䝉上蒼疊賜甘霖二麥可望有秋矣當愈加誠敬以待之山西按察使陞任廣東布政使臣蔣泂謹奏爲恭報晉省二麥收成分數仰祈睿鑒事竊晉省入春以來仰荷聖主福庇雨澤霑足今二麥收穫查據各屬報到有稱十分者有稱九分八分者其得雨少遲之處亦七分六分俱爲豐稔民情悅豫感戴皇恩理合奏聞所有各屬收成分數開具一摺統祈睿鑒謹奏覽奏麥收分數深爲欣慰然必待秋稼登場後朕懷方釋也山西按察使陞任廣東布政使臣蔣泂謹奏爲恭報秋禾茂盛雨澤普霑事竊本年晉省入春以來仰荷皇上福庇雨澤優渥臣具摺奏聞兹自六月七月以迄閏七月或隔五六日一雨或十餘日一雨每際田間顒望之時輒獲甘霖查據各屬報到日期不一而俱稱霑足現在禾稼盈疇指日刈穫百穀豐登萬姓額手所有收成分數統俟各屬報到再奏外謹將通省田禾茂盛時雨敷被情形先行奏聞謹奏覽秋禾情形朕懷深慰但敬畏之誠不可少間更當愼重刑獄懋勉吏治以迓來歲上天之賜嘉應也勉之山西布政使臣蔣泂謹奏爲恭報晉省秋禾收成分數仰祈睿鑒事竊本年晉省雨澤霑足秋禾茂盛各情形經臣摺奏兹百穀收穫查據各屬陸續報到有稱十分有餘者有稱十分九分者其山坡沙地及得雨少遲之處亦八分七分不等比户切屢豐之慶載道騰大有之歡凡屬官民莫不嵩呼聖澤感戴皇恩臣謹具摺奏聞所有各屬收成分數恭行分析另開一摺仰祈睿鑒謹奏欣悦覽焉據各處亦皆奏到約畧相同朕實代汝等慶之但不可少肆厥志當加敬加愼也山西布政使臣蔣泂謹奏爲萬姓感激天恩公務不日告成事竊本年九月内晉省奉文辦理駝屉等項三萬副臣凜遵諭㫖敬謹辦理務使官民不致分毫有累兹據各屬報稱百姓聞有軍需莫不踴躍歡呼凡有羊毛繩料之家各出所有赴官領價凡係工匠人等一時羣集應募製造所辦物件指日齊全等語又據陽曲平定等九十餘州縣於十月十八九至二十五六等日已報製辦完僃此外十餘州縣俱報於十一月初旬告竣凡此赴公趨事爭先恐後二十餘萬件之物料工作不勞而集於月餘之内不日成功皆我皇上深仁厚澤感被漸摩之所致臣覩此尊君親上急公勇往之民情曷勝懽忭之至所有晉省僃辦駝屉等軍需情形理合具摺奏聞謹奏覽奏曷勝嘉悅朕另有恩㫖諭部山西布政使臣蔣泂謹奏爲聖恩之感被靡涯萬姓之攄忱實切謹據情奏達仰祈睿鑒事竊晉省辦理駝屉等項所有民人踴躍赴公陸續告竣情形經臣摺奏外兹據太原平陽汾州潞安澤州寧武大同朔平蒲州等九府平定保徳忻代遼沁絳解隰吉等十州所屬紳民咸以仰沐皇上仁恩浩蕩亙古未有日切感戴今値辦造軍需分應少效涓埃辦用工料既無差累内地運送又發脚價心實難安願將屉繩各項自僃騾隻自本地運至歸化城以展寸悃等情由該府州詳請前來臣竊以皇上軫念有加欽奉諭㫖不使官員絲毫賠累豈令士民解送宣布皇恩仍將脚價分發給運去後復據各屬紳衿民庶前赴臣等衙門紛紛環籲捐僃運送不願領價臣復宣示皇仁再三開慰而士民仍行固請似此歡躍急公皆我皇上至徳厚澤入之深而濡之久是以感激誠切至斯也除詳撫臣石麟具題外合先繕摺陳明仰祈睿鑒謹奏民情歡躍如此實屬可慶可喜祥瑞事也候另旨批諭該撫石麟山西布政使臣蔣泂謹奏爲聖主之盛徳光天晉省之慶雲呈瑞恭攄賀悃仰祈睿鑒事竊臣據保徳州詳稱本年十一月初二日辰刻仰覩卿雲捧日外繞三環光華四暎藻彩繽紛自辰至午照耀三時萬民咸相歡慶實千載一時之景象昇平萬世之嘉徵正在繕詳申報又據所屬河曲縣及興縣先後各詳報本年十一月初二日自辰至午卿雲捧日外繞三環實為聖世祥符理合呈報等情到臣欽惟我皇上徳懋勲華功昭位育治隆今古萬邦殷就日之思化洽神人四海切撫辰之慶苞符並啓瑞應時聞和氣絪縕共樂恬熙於玉燭榮光炳耀聿彰糺縵於卿雲璀璨三環繽紛五色映璇霄而煥彩既疊見於滇黔捧紅旭以流輝今復呈於汾晉表神靈之協應咸欽至徳難名仰隆照之祥符彌顯太平有象臣曷勝踴躍歡忭之至除詳撫臣石麟恭疏具題外謹繕摺恭攄賀悃仰祈睿鑒謹奏恭䝉上天昭示此番祥瑞殊非尋常徵應之可比擬朕不禁額手稱慶且代汝等晉省官民欣幸無既也山西布政使臣蔣泂謹奏爲萬姓感戴天恩急公實由至悃謹再據情奏達仰祈睿鑒事竊晉省紳民懇將駝屉等項軍需各從本地自運送至歸化城一事經臣摺奏外兹又據各屬詳報急公樂運億兆同心或稱士民前籲請之時即已挽車䇿騾而來轂擊肩摩爭先裝載運往叩頭謝恩並不領價或稱開導之下士民雖暫行領價感激涕零稽首稱謝及馱載之後仍將脚價繳庫或稱再三開慰士民將所領脚價封固貯於公所仍各自僃餱糧車騾運送等情前來此皆我皇上髙天厚地之徳澤涵育漸摩深浹於萬姓之隱微心志所以感激奮發誠懇切至不介而孚莫可阻抑如此似應准其捐運以慰輿情者也除具詳撫臣具題外理合繕摺奏聞仰祈睿鑒謹奏嘉悦覽焉具題到日有旨山西布政使臣蔣泂謹奏爲奏聞事竊照晉省疏濬汾水一案奉欽差工部侍郎馬爾泰等㑹同臣詳察形勢妥議辦理隨經馬爾泰等公同查勘覆奏稱汾河形勢惟文水一縣地勢低窪河身淤淺現今青高以下全無河道漫流地上應請於明歲春初自青高村至尹家社東西各開引渠一道迨三月以後平地水涸開通正河一道其挑河渠之土各於兩岸築堤實於居民有益等因經户部議覆請將文水縣應開引渠二道正河一道交與蔣泂悉照馬爾泰等所議於明歲春初興工開築先行查丈確估將所需工價銀兩實數詳報撫臣石麟具題撥給等因具題奉㫖依議欽此欽遵行知到臣臣遵於本年十二月初三日親詣文水縣沿河查丈見河道情形與從前迥異原議自青高村至尹家社各開引渠二道正河一道現今漫流巳乾皆爲沃土止有中間涓涓細流巳成引河而原議堵塞東城等村之支河現今則河面寛濶或十餘丈或數十丈衆水㑹同河身長二十五里順流直達尹家社毫無阻礙詢之居民僉稱今歲自奉㫖查勘議濬後六月内發水二次河道改流今巳天然自成大河可以無庸再為開濬等語此皆我皇上愛育黎元勤求利濟聖徳感召之所致也惟是河槽既成尚需兩岸築堤以僃春夏水漲臣沿河履勘估計工費旋復據民人環擁咸稱仰沐聖恩致此神應從前漫淹地土復爲沃壤現種春麥必可倍收其築堤防護所費無多沿河村民應自爲計情願陸續各修各堤無庸請動錢糧萬人齊心實出誠悃再三慰諭懇請愈切所有覆勘過汾水自然歸槽無庸照原議開濬萬姓感戴情形理合奏聞統祈睿鑒謹奏以手加額覽之實代汝等深爲慶幸題到之日另有諭㫖山西布政使臣蔣泂謹奏爲聖徳之格被靡涯上天之嘉應疊見億兆歡騰恭攄賀悃仰祈睿鑒事竊晉省本年十一月初二日保徳州慶雲呈瑞經臣恭摺奏聞外兹復據臨晉縣報稱十二月初一日從午時見卿雲圍繞麗日歴未申酉時其雲五色繽紛霞光萬道疊秀爭華呈輝耀彩瞻仰多時正深歡慶旋據闔邑紳士軍民羣集縣庭歡呼鼓舞以手加額咸稱聖世嘉徵慶雲捧日小民今日欣逢仰荷皇恩福慶等情前來臣伏查兩月之内晉地疊呈上瑞此皆我皇上聖徳覃敷光四表而格上下所以嘉祥滋至日月光華𢎞於一人也萬姓莫不嵩呼抃舞微臣彌切踴躍歡忻除詳撫臣石麟具題外臣恭攄賀悃敬繕摺奏聞仰祈睿鑒謹奏覽奏朕寅畏之念筆難宣諭晉省卿雲疊見返躬自問實與朕之涼德無渉皆由汝等封疆大吏誠存利民之懷兼之山右民風醇良有素咸知感戴聖祖六十年深仁厚澤奉公守法樸實節儉黙契天心所以仰邀慈鑒之所致也汝等睹此嘉應倍當勉勵忠誠承順上蒼錫福晉省黎庶之心能將愛養二字誠篤爲之自必永沐天庥長䝉福蔭矣倘若少肆厥志天難諶命靡常古訓不誣寧可預料於將來耶謙盈二字之感召㨗如影響體驗方知不但汝等撫藩大吏舉凡屬員膺牧民之責者俱當遵㫖逐一諄諄勸諭令其實力奉行夫惟誠敬昭格庶幾仰荷天恩於弗替耳將朕此諭與該撫石麟看暨同城各官悉令知之山西布政使臣蔣泂謹奏爲恭報瑞雪普霑事竊照晉省十月内據各屬報稱得雪三寸二寸不等今十一月十一十五等日各府州縣報到得雪或稱二三寸或稱四五寸十九日太原府屬地方得雪三寸有餘二十二日酉刻至二十三日卯刻又復得雪三寸有餘通省亦俱報稱三寸四寸不等紛披連日凝結田畝從此再添臘雪固為優渥即令遥接春霖亦已滋潤萬姓莫不歡呼聖澤臣曷勝額手欣忭所有得雪日期理合具摺奏聞謹奏閲爾此奏較之他處所聞似覺分數浮多即據所報而論亦不可謂爲霑足仍當竭誠祈禱然晉省吏治民情如是朕殊不爲憂念想上天行將有恩膏下逮也一番春雨可抵數次大雪但以誠恪格之未有不應之理敬之毋忽山西布政使臣蔣泂謹奏爲欽承訓㫖叩謝聖恩事竊臣家人齎回臣恭報慶雲疊呈一摺奉有硃批諭㫖臣跪讀之下感悚交深欽惟我皇上敬天法祖至仁大孝道隆今古化洽神人至治光昭疊致雲爛日華之嘉應歡聲洋溢咸抒嵩呼華祝之微忱乃我皇上懷盛徳以彌謙讓豐功於不有惟本行健之體益毖奉若之心兢兢業業惟時惟幾伏奉温綸兼頒至訓言言提命字字典謨臣跪誦捧繹敢不敬錄恭懸朝夕瞻仰時時祗畏事事黽勉殫厥愚誠勤思愛養以仰副我皇上昭受敷錫保愛生成之至意遵將訓㫖宣知撫臣石麟同城官員欽遵奉行及凡遇屬員遵㫖逐一諄切宣導外理合恭摺奏覆叩謝聖恩仰祈睿鑒謹奏前諭字字皆出自至誠之念若泛泛㑹去視爲朕之文章則大誤矣朕最憎心口互異與夫沽名釣譽卑鄙下賤欺天誑人之行事生平所恥而不爲者汝其敬信遵奉勿怠如力行有驗灼見天道感應絲毫不爽則可許汝爲一生福人矣勉之勉之山西布政使臣蔣泂謹奏爲恭謝天恩事竊臣接臣叔蔣廷錫家信奉上諭山西布政使蔣泂前在陜西甚屬效力今於山西藩臬兩司任内又能實心供職辦理妥協深為可嘉著將伊父蔣陳錫名下應追銀兩豁免一半欽此臣隨望闕叩頭恭謝天恩伏念臣父蔣陳錫名下應賠山東倉穀案内等項荷蒙皇上洪恩屢經減免已逾十分之九臣舉家感出望外兹復蒙恩㫖將臣父蔣陳錫名下應追銀兩豁免一半臣聞命之下涕泗交流感悚交集一門百口膺我皇上浩蕩殊恩實臣夢寐不敢作此逾分之想臣惟悉心勤力祗遵聖訓砥礪黽勉以冀仰副我皇上成全造就之至意并世世子孫永矢銜結頂戴聖恩於靡既耳謹具摺恭謝天恩仰祈睿鑒謹奏汝此一生除俸祿養亷之外如再取官場中一財一物以潤私囊豈但不合天理亦恐無此人情矣所當矢志黽勉者山西布政使臣蔣泂謹奏爲恭報雨雪普霑萬姓頂戴恩膏事竊山西省於雍正七年冬間得雪經臣奏聞外嗣於十二月二十七八等日太原府屬得雪四寸有餘據各屬於是兩日以及本年正月初八九等日陸續報到亦皆得雪但未霑足兹於正月十六日黎明至夜分同雲密布瑞雪繽紛約計一尺有餘旋據各府州縣陸續報稱得雪一尺三四寸至四五寸惟平陽府以南地方和暖報稱得雨五六寸三四寸不等通省普霑十分優渥二麥益獲滋培豐收可以預卜臣曷勝額手歡慶之至理合具摺奏聞伏祈睿鑒謹奏以手加額覽之畿内地方亦同被天恩矣特諭爾知據郝玉麟密奏姦匪李梅事連山陜兩省若以近日山右民情而論縱令匪徒布散妖言亦豈能揺惑萬一但既有此說安可置之不問其密諭屬員遍處留心多方訪緝今將奏摺一併發來爾同石麟詳看共商作何查究方不致有疎漏須當極加愼密勿俾風聲宣露於外特諭山西布政使臣蔣泂謹奏爲遵㫖奏覆事本年正月二十八日接奉皇上密諭一道又奉𤼵示廣東督臣郝玉麟奏摺臣遵㫖隨同撫臣石麟詳看知廣東恩平等處有不法姦匪妖言惑衆不勝髮指又供扳山陜等省亦經姦匪李梅散有僞箚等語仰荷聖明洞鑒指示周詳臣遵即密行四散訪緝并囑各屬員密密留心多方查訪不得聲張又借稽查保甲爲名廣發告示令印官佐貳不時親行查點察其聲音蹤跡倘有愚頑被誘自必究出嚴拏即有外來竄至之徒亦必盤詰就獲臣嚴切查察愼密料理斷不使姦匪漏網亦務令民間安堵地方寧謐除有無匪類察確再具摺奏外理合先行覆奏仰祈睿鑒謹奏此案看來似屬子虚大都無賴匪徒詐騙財物之舉耳雖然防患於未萌亦係有益無損之事也山西布政使臣蔣泂謹奏爲密奏事竊惟晉省連年豐稔荷蒙聖恩兩次蠲免現年錢糧六十餘萬凡屬生民咸沐恩波共登樂利惟大同朔平二府所屬有加徵草折脚價一案稍爲民累查康熙三十三年因右衞駐防滿洲官兵毎月應支米豆草束原議一半照時價折給官兵自行採買一半在大同府屬十七州縣衞所於應徵地畝銀内改徵本色供應每米一石准抵正賦銀一兩一錢五分每豆一石准抵銀九錢七分每草一束准抵銀一分五釐後因蔚州靈邱廣靈廣昌四處運送路逺照舊改徵銀兩止有應州等十三州縣衞所改徵米豆草束題定遵行年久迨雍正元年十一月經鄂倫岱等議奏右衞官兵留拴馬匹停其向民徵收本色每草一束價銀一分五釐額外加脚價一分二釐共徵銀二分七釐折給通計大朔二府所屬每年額外加賦銀九千八百九十五兩零民間所有草束不敷變價邊民無力輸將遂致歴年拖欠官兵交累臣屢蒙聖訓以愛養民生爲務今既查明有此民隱理合據實陳奏伏祈皇上密飭部臣查明原委特降諭㫖施恩豁免庶邊地生民永沐皇仁矣爲此謹奏所奏是候另有諭㫖山西布政使臣蔣泂謹奏爲恭報晉省甘雨普霑事竊照晉省現在二麥盈野全資雨澤今於三月初五日太原府得雨二寸十一日又得雨三寸霢霂滋潤麥苗長發旋據各屬報到俱於初五初八十一等日得雨或二三寸四五寸不等其平陽蒲州澤州三府及解絳二州各地方俱報得雨十分霑足正際望雨之時獲此甘霖之沛髙原下隰麥穗盛長豐收可必其種植秋禾之地亦漸次播穀萬姓莫不額手所有雨澤普霑情形理合繕摺奏聞仰慰睿懷伏祈聖鑒謹奏京城左近微覺乾旱朕深以爲慮兼爲山陜繫念昨據查郎阿之奏今覽爾所報兩省均獲霑足朕之憂懷減除一半矣山西布政使臣蔣泂謹奏爲恭報時雨普遍霑足事竊晉省三月十一日以前得雨日期分寸經臣具奏外兹太原府省城復於三月二十四五兩日得雨四寸二十七日得雨四寸四月初一日得雨三寸初四日得雨六寸又據各府州縣陸續報稱俱於是數日得雨二三寸四五寸六七寸至一尺不等正在繕摺間省城於初七日又得雨六寸通省時雨普被優渥霑足二麥發榮茂盛自必十分豐收髙原下隰百穀皆及時播種萬姓歌詠太平莫不感戴聖澤臣曷勝歡忭之至理合具摺奏聞謹奏晉省時雨普被曷勝欣慰覽奏不禁以手加額大朔二府草束折價一摺交發廷臣密議候覆到有㫖山西布政使臣蔣泂謹奏爲恭報晉省二麥豐收分數仰祈睿鑒事竊本年晉省入春以來雨澤霑足二麥蕃滋今際收穫之期各屬俱陸續報到通省十分收成者八十餘處九分者十五處八分者止十處詢之農夫野老咸稱數十年未有之豐穰比户盈寧皆仰荷聖主福澤至見在膏雨時施秋禾尤倍常茂盛所有各屬二麥收成分數另摺分析恭呈外謹此奏聞仰祈睿鑒謹奏覽奏二麥分數朕懷深慰但勉誠敬公忠上天之錫嘉應朕可力保若稍懈肆則恐難預必矣將朕此諭令撫臣石麟知之其共加黽勉可也山西布政使臣蔣泂謹奏爲奏明事竊臣接奉部文辦理各案軍需臣與撫臣石麟詳細酌議星速料理查城守尉察庫領兵三百名前赴寧夏駐防摘調採買馬一千餘匹俱巳交收足額定於本月十八日起程訖又巴爾庫爾築城器具四萬五千餘件分派各州縣製造俱經齊全於本月十三四五等日陸續委員運赴軍前交投又製辦壯帽一千頂棉褂一千件於本月初十日造完十三日委官起解又撫標遊擊茅典等領兵一千五百名赴甘州聽調摘調馬一千五百匹採買騎馬馱騾三千匹亦已齊僃現在督催各州縣解赴太原大同二鎮交收給發兵丁起程又摘調營馬一千九百八十匹採買馬二百九十八匹赴臨洮府餧養亦已陸續解送訖凡此軍務皆仰蒙皇上天恩賞賜優渥官兵莫不踴躍奮往一應採買寛裕給發是以遵奉辦理俱各全僃惟解陜馬三千匹見在各處採買合併聲明理合具摺奏聞伏祈睿鑒謹奏候另有諭㫖命大學士等由内閣頒發山西布政使臣蔣泂謹奏爲恭報晉省得雨情形事竊山西地方入夏四五兩月雨澤均各霑足六月迄今尤田間顒望之時查據各屬雖節次報於六月初三十三二十一等日得雨猶未均敷惟二十八九等日則稱霑足者甚多太原府省城於六月初四十七二十九三十等日各得雨三四寸七月初六日得雨五寸亦復普徧初八日又復得雨甘霖疊沛仰荷聖主恩膏億兆額手所有見在得雨日期情形理合繕摺奏聞仰祈睿鑒謹奏夏雨及時情形以手加額覽之山西布政使臣蔣泂謹奏爲密奏事竊惟總兵爲專閫重寄而雲朔尤邊疆要鎮操防彈壓全在强幹廉明今大同鎮臣徐起鳯怠於訓練營伍未能整飭遴拔兵弁人言亦未允服邊疆折衝之任似非所長此非臣所應言緣從邊疆緊要起見不敢不行密奏仰祈睿鑒謹奏所奏是徐起鳯於初用時已覺其庸平料難勝大同要任候朕酌定有㫖山西布政使臣蔣泂謹奏爲恭報晉省秋禾豐收分數仰祈睿鑒事竊山西地方夏秋雨澤霑足田禾豐茂經臣具摺奏聞外兹百穀登場之際查據各屬陸續報到分數十分者居其大半餘亦九分八分其稱七分者僅一州十二縣比户頂戴聖澤歡聲載道臣額手之下欣忭彌深所有各屬收成分數謹分析另摺恭呈外理合奏聞仰祈睿鑒謹奏覽晉省秋收分數曷勝欣慰山西布政使臣蔣泂謹奏爲奏聞事竊晉省地方入春以來查據各屬報於正月初二初三及十九二十等日得雪潞安寧武澤州蒲州等府屬及保徳州解州代州等處各稱三四寸五六寸不等朔平府屬之朔州則稱一尺有餘太原府屬之岢嵐州興縣稱於十九日得雪僅二寸三寸不等臣深以入春雪澤微少及尚未普遍爲慮但查上年九月十月間合屬俱得深透雨雪早寒凝結入春尚未融化土膏猶潤而晉省二麥春種居多惟以二三月得雨爲及時臣僃員地方敢不仰體皇上敬天勤民之至意悉心訪察虔謹修省所有晉省春雪及見在情形理合具摺奏聞仰祈睿鑒謹奏朕正爲此日夜焦慮當䖍誠祈禱並竭力省察吏治刑獄以挽回天意庶可望春澤之普降也敬之毋忽山西布政使臣蔣泂謹奏爲奏聞事竊晉省所屬本年正月間及二月初二初五并十九日太原府省城得雪情形臣節經摺奏外伏查十九日得雪沾被甚廣續據太原汾州大同寧武朔平遼州沁州平定忻州代州保徳各府州所屬俱報於十九日得雪三四寸至六七寸不等大同與繁峙兩縣則八寸至一尺有餘平陽潞安澤州吉州隰州各府州屬俱報於十九日得雪一二三寸至四五六寸不等惟蒲州解州絳州所屬據報於十九日得雪一寸二寸不等隨查二月初二初三等日得雨處所惟該府州屬爲均徧現在麥苖發生土膏滋潤又平陽大同寧武府屬之靈石天鎮陽髙神池并忻州據報於二十二三四丑時太原府省城又得甘雨三寸有餘現未晴霽容各屬報到再行具奏外所有全省得雪普徧省城得雨情形日期理合具摺奏聞仰祈睿鑒謹奏覽雨雪接續情形實慰朕懷山西布政使臣蔣泂謹奏爲恭報全省雨雪普徧霑足事竊晉省自本年正月二月及三月初四五日各得雨雪情形經臣節次奏報外兹於三月初十十一兩日太原府省城共得雨雪一尺八寸有餘臣隨飛查各屬續據太平大潞汾朔寧澤蒲九府遼沁平忻代保解絳吉隰十州各所屬飛報於初十十一十二等日各得雨雪自八九寸至一尺七八寸不等合省東西南北各府州統計皆十分霑足深透宿麥倍加滋長百穀遍地播種而市集米糧雲集糧價亦漸平減萬姓莫不踴躍歡呼咏歌聖澤所有全省雨雪普被霑足情形理合具摺奏聞仰祈睿鑒謹奏覽奏曷勝欣悦之至山西布政使臣蔣泂謹奏爲甘雨疊沛全省霑足事竊查三月十二日以前晉省所得雨雪普被霑足情形經臣恭摺奏報外續據太原平陽等九府遼沁等十州各屬申報於三月二十七八兩日各得雨四寸至六七寸不等臣正在彚奏間兹於本月初四日太原府省城自酉時起雷雨滂沱至初五日巳時四野均沾十分深透當此百穀滋生之時甘雨應期屢沛聖澤涵濡靡不普徧優渥萬姓踴躍歡呼臣曷勝額手稱慶理合具摺奏聞謹奏晉省雨澤如此霑足麥禾均可無虞矣朕懷深慰山西布政使臣蔣泂謹奏爲恭報全省雨澤事竊查晉省從前得雨情形經臣具摺奏報外節據太原平陽等九府遼沁平忻等十州各報於五月二十二十三四并二十八九等日得雨二三四寸至六七寸不等又自閏五月初一初二初六至十一十二等日得雨二三寸并七八寸不等臣逐加察訪太原大同寧武朔平潞安澤州等府代保遼沁等州甘霖時沛寸數尤多俱已十分霑足現在田禾長茂豐登可必其餘府州所屬霑足處所亦已十有七八現在土膏滋潤禾苖長盛復於本月十八十九二十三四等日省城連得大雨尺餘四野霑足深透行查各屬已據太原大同潞安汾州朔平寧武澤州遼沁平定忻代保徳等府州屬申報十八九日得雨三四寸至八九寸不等米糧各價較前頓減餘俟報齊續奏外理合具摺奏聞謹奏以手加額覽焉硃批諭旨巻七十七
