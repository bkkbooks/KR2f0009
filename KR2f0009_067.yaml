body:
  text: 欽定四庫全書硃批諭㫖巻六十七硃批蔡仕􅘎奏摺雍正二年十一月二十五日工科掌印給事中浙江糧道臣蔡仕􅘎謹奏為徹查懸欠之庫項敬陳彌補之末籌仰祈睿鑒採納事竊臣海濵下士至愚極陋荷䝉我皇上天恩簡畀浙江糧道九月初八日抵任後即與陞道徐琳清查交代歴任舊管新收共該存庫銀六十二萬一千四百餘兩今存庫只三十六萬二千二百餘兩此外銀二十五萬八千九百餘兩槩係歴任借墊未補内有借給各幫成造船㑹北買米并預支行月經費共銀二十二萬五千五百四十餘兩有各幫毎年應領漕截經費等銀可扣又康熙五十四年各官公捐協助陜省軍需借動道庫銀一萬五千七百兩又康熙六十一年因回空糧船凍阻動借道庫銀八萬二千五百餘兩募雇民船赴淮迎載毎米一石水脚銀一錢四分詳定各幫每船捐銀一錢外有漕州縣捐銀四分計銀二萬五千九百餘兩據州縣以捐觧不前㑹詳院司准其各捐二分共該銀一萬二千九百餘兩巳據各屬捐觧銀三千一百餘兩尚未觧銀九千七百餘兩又准於俸工内流抵二分亦該銀一萬二千九百餘兩經前道提補銀四千九百餘兩尚未補銀七千九百餘兩今各州縣未觧銀兩應仍著各員捐觧但俱巳離任新任者又不肯接捐互相推諉道庫終無歸補仰懇皇上飭諭撫臣將應捐銀兩題明於各員名下分别著追使其上緊完公其俸工内未補銀同前項墊觧軍餉未補銀共二萬三千六百餘兩懸欠多年臣仰荷聖恩忝司筦籥不敢緘黙因循謹竭一得之愚上瀆聖聰查州縣徵收錢糧俱有火耗在北省耗銀巳經提貯藩庫故交際陋規悉行裁革今浙省耗銀槩存州縣而現在院司各員禁止餽遺即臣衙門向有節禮四千餘兩亦俱裁革是各州縣應酬既巳全減火耗不無所餘除地丁事隸藩司不議外浙省漕項錢糧共七十三萬一千餘兩若毎兩酌提二分一年即有一萬四千六百餘兩前項未補銀共二萬三千六百餘兩一年有餘便可完補以漕糧之耗羡補漕庫之虚懸似為妥當倘臣言可採仰祈皇上飭諭撫臣以雍正三年為始遵行提觧前項補完即日停止庻積欠清而庫帑充實矣謹奏覧奏知道了最不宜矯亷沽名尤不宜因私悮公以及揭前官之短遺後任之累只要實心實行凡事務期長乆遵循無礙上下情理皆通方好不可為目下虚聲小譽而弄巧飾詐此等人朕所不取也勉之雍正六年十一月十九日浙江觀風整俗使臣蔡仕􅘎謹奏為微臣受恩綦重下情戀闕甚深仰祈聖慈俯允陛見事竊臣於雍正二年七月内䝉皇上簡任浙江糧道銜恩抵浙勉竭駑駘寸長未效嗣因雍正四年雨水過多米色潮潤部議降調特䝉聖恩留任是皇上於臣既加㧞擢又賜矜全臣感激涕零圖報無地兹復欽奉上諭加臣以僉都御史之銜畀臣以觀風整俗之任聖恩髙厚雖捐糜頂踵總不足以言報稱惟是臣膺兹重任智識淺陋視事方新未知窽要又臣自雍正二年八月内陛辭至今四載有餘犬馬戀主之心與日俱積伏懇聖恩俯允陛見俾臣趨覲天顏恭請聖訓庻措施有所遵循永戴聖恩於無既矣容俟督查錢糧清結之日恭疏具題外理合先行奏明伏乞皇上睿鑒施行謹奏不必來京惟當黽勉職任與李衞同心協力整飭地方可也雍正七年正月二十五日浙江觀風整俗使臣蔡仕􅘎謹奏為敬陳浙省民情官方仰祈睿鑒事竊浙省歴年舊欠錢糧自奉㫖清查以來士民感戴皇恩争先完納向日衿監包攬收役侵漁俱巳歛跡雍正六年錢糧或按額全完或完至八九分有零雍正三四五等年共舊欠銀七十餘萬兩巳徵完四十萬餘兩雍正二年以前帶徵錢糧亦俱報有溢完至承追虧空各案亦巳陸續追完銀六萬九千七百餘兩未完者現在催追今年春景日暖風和瑞雪時降農民歡欣鼓舞皆云豐年之兆將來輸將又必競勸也其府州縣等官經督臣李衞不時舉劾共知惕厲尚有候補通判劉漢儒者外貎可觀而操守未謹於雍正五年署烏程任内勒借鄉紳汪亮采銀三百兩經督臣訪實嚴加誡飭著令吐還又瑞安令何詩頓改前操因生員楊元玟兄弟争訟該縣私罰銀五百五十兩現經督臣批飭嚴審又嘉善令郜煜辦事平常浦江令袁皥聽斷無才此二員者督臣亦常言其無能又石門令呂恭之塘兵多不在次入夜復無哨警至十二月内該將遣兵丁何玉常等來省領餉公然在寓賭博被拏是皆其不能約束兵丁所致也臣衙門有稽查細加訪察得實另行奏聞謹奏覽雍正七年三月二十日浙江觀風整俗使臣蔡仕􅘎謹奏為奏明甘露呈祥事竊臣於台州府地方接到布政使髙斌嘉興府知府閻堯熙先後具詳内開據嘉善嘉興二縣知縣轉據該二縣耆民等咸稱正月二十二日卯辰二時天降甘露遍結樹枝葦竹之上萬民共覩形若脂凝味如飴美實係太平上瑞詳請具題到臣仰見我皇上以徳動天感召捷於影響益知天心以福眷徳申錫極其光昭臣巳移咨督臣李衞現候咨㑹又臣經由紹郡據該知府稟稱有府學生員黄孝純於正月十七日夜出街看燈路拾胡疇一遺失瓶袋内珠十七粒金戒指一箇及碎銀當票等物約值銀四十餘兩該生義不茍取招帖付還并却酬金不受等語随據布政司通詳請予嘉奨前來現在移咨督臣㑹核外查化行俗羙然後人知廉隅兹生員黄孝純不拾遺金自敦士品皆皇上徳洋恩溥一道同風所致也理合具摺恭奏伏乞睿鑒施行謹奏汝等大員果肯秉公持正察吏安民實心為國家宣猷敷化此等徵應乃必有者也勉之同日又奏為敬陳微臣廵歴所見仰祈睿鑒事竊臣於本年二月初一日出廵紹興寧波台州三府於三月初八日回省所過郡縣應行閲視稽輸將競勸詞訟稀少其素著姦惡之人實巳痛悔遷善不敢為非惟僻逺鄉村尚有無知衿監暗行心察核文職内有山隂縣試用知縣沙漢鰲外貎可觀中頗糊塗聽斷無才難勝劇任臣回省即言之督臣正在斟酌調換其餘各縣如上虞令徐志定臨海令顏肇維才力鈍軟然尚肯黽勉臣俱面加訓誡勉令振作以圖後效武軄營伍惟台州協經調任杭協副將吳進義訓練最為可觀至寧波一營斯為最下兵既稀少馬又疲瘦歩伍並未操緣係臣廵歴親見理合具摺恭奏伏乞皇上睿鑒施行謹奏所奏嘉悦覽焉但不可絲毫隠飾雍正七年五月初二日浙江觀風整俗使署理浙江廵撫印務臣蔡仕􅘎謹奏為恭謝天恩並陳職守事宜仰祈睿鑒事竊臣一介庸愚荷䝉聖恩擢用朝夕兢兢毫無報稱兹因督臣李衞入覲遵奉諭㫖將浙江廵撫事務題明交臣署理臣於三月二十二日受事恭疏題報在案伏見浙省士民感沐皇恩風化日臻醇厚今春雨水調勻春花二麥浙東浙西皆獲豐登飬蠶之家收成亦好台州各屬多種早稲立夏後得雨霑足栽蒔爭先至現辦事件惟海塘城工最闗𦂳要合計巳發銀一十萬二千四百兩有零尚有未完工程須找給銀四萬七千餘兩臣現在照案行催務期次第告成其通省文武屬員臣又察有海寧令胡杲性情暴戾行事乖張有玷職守廵鹽千總韓景琦頗能廵緝然好干外事蘇松嘉湖之間嘖有怨聲臣經靣加訓飭冀其悛改仍俟督臣李衞回浙共相酌議至杭城諸色人等雜處此四月内有總督衙門健歩蔣廷芳擅拏平民陳長儒鎻禁班房圖詐又撫標兵丁吳璉等同提標兵丁胡永㤗等拏獲窩賭受賄不報又回民沙彩臣等私宰耕牛販賣俱經臣訪拏押𤼵聖恩髙厚臣才質駑鈍撫心自問中夜徬徨值今京察黜陟之時臣官四品不敢越例自陳但述職心殷曠官愧重不能自巳因敢冒昩附奏伏乞睿鑒施行謹奏覽同日又奏為恭謝天恩事竊本年五月初一日臣進摺家人齎回硃批奏摺欽頒摺匣四箇并鑰匙袱墊等物臣郊迎至署恭設香案望闕叩頭祗受訖跪讀硃批䝉我皇上訓誨諄諄勉誡交至微臣祗有鏤刻心胸益加奮勵必期無慚衾影庻可對掦君父至所䝉天恩頒賞摺匣縹緗縝密鎻鑰精嚴臣嗣後凡有奏事得以固封上逹用遂敬謹之心永戴天恩於無既矣理合繕摺奏謝謹奏諸凡陳奏密之又密可也同日又奏為請除惡捕以安良民酌定嚴例以儆積玩事竊本年正月内據秀水縣詳稱嘉興縣革捕劉聖甫糾賊呉大屠大等行竊該縣王維新家多贓等情臣當即批行杭嘉湖道王溯維嚴加訊報兹據訊詳劉聖甫與伊姪革捕劉忠家内共窩賊呉大等九人竊過王維新殷公輔蔣叔恒沈廷棟朱寡婦陳御山張姓等七家又有不知姓名數家得贓俱獻劉聖甫烹分等情臣查劉忠巳先於别案被獲經督臣李衞𤼵府枷責仍永帶小枷充警在案按例窩主存留竊盜三名者發遣劉聖甫等窩留多賊糾竊多案𤼵遣未足蔽辜臣愚以為宜將首惡劉聖甫一犯大書罪由出示曉諭檄行嘉郡文武押赴通衢杖斃使各縣玩捕共知積惡必誅庻有聖裁以便遵行再查雍正四年七月間刑部覆江西宜黄縣捕役吳勝等行竊一案計贓擬以杖徒具題奉㫖查捕役為竊律内雖無加罪之條但捕役行竊仍照平人行竊治罪似屬稍輕呉勝李祚各加枷號兩箇月著永為定例等因欽遵在案今捕役為窩除窩留强盜謀刦分贓法應擬斬無庸議加其有捕役窩留强盜不行又不分贓及窩留竊盜分贓者請俱皇上睿鑒勅部議覆施行謹奏覽雍正七年七月二十五日浙江觀風整俗使署理浙江廵撫印務臣蔡仕􅘎等謹奏為奏聞事該臣等查得海寧縣一帶塘工歴來潮汐衝激護沙坍徙不常近因兩岸漲沙漸髙潮頭趨北直射塘脚致有數叚險工坦水被衝塘身震裂今年伏汛旋坍旋修幸獲保固目下正值秋汛潮頭較大勢屬極險防護尤宜加謹據布政司詳據専管塘工之杭嘉湖道王斂福移請先給銀四千兩辦料縣將被災民人分别加意賑恤並查明推壓田廬確數冊報一俟覆到另行馳奏其餘諸郡田禾俱各茂盛恐厪聖懐臣謹㑹同署督臣性桂恭摺奏聞謹奏覽同日又奏為恭報早稻收成事竊查浙東諸郡多種早稻台衢温處四府尤盛今年雨水調勻俱巳陸續收穫據各府開報前來皆有八九分不等新米每石價銀不過一兩以内本年錢糧完納巳有七八分者至晚稻現在秀茂即髙田亦報霑足至於海口洋面亦各安静姦匪屏跡惟據温州平陽協報稱六月十六日有榖船七隻到港颶風打壊二船淹没水手二十餘人失榖三千石又打損二船失榖四百餘石其餘皆被浸濕查係福建督臣髙其倬委員赴江南採買之榖尚有十二隻未曾入港臣巳飭該營飛查各船是否平稳與閩省委員㑹商俟南風稍轉方可開行並將損船濕榖協力照管壊船人口撥人打撈不得岐視一面咨明福建督臣去後再查是日颶風該縣沿海小屋籬墻草葢多被刮倒旋即撑搭無損早稻巳收晚稻雖被吹偃緣南風性暖仍然秀茂為此具摺恭奏伏乞皇上睿鑒施行謹奏知道了查明被災人民實力賑恤之閩省人船尤宜加意撫安不可委遣一二怠忽屬員茍且從事李衞離浙為時無㡬地方上即有如許事故汝等亦當返躬内省其心行也將此批諭同省大員皆令知之同日又奏為恭謝天恩并繳硃批奏摺事竊臣日前兩進奏摺荷䝉我皇上天恩随事敎訓加以温綸䇿勵感激之私淪肌浹髓兹於七月十二日接准吏部咨開奉㫖李衞各任印務暫著性桂蔡仕􅘎等照前署理欽此臣疊受我皇上委任隆恩惟有勉竭駑駘於所奉硃批諭㫖終身服膺以圖報效於萬一伏查臣前奏之上虞縣試用知縣徐志定才力不勝劇任應行調簡其縣缺巳題委試用人員晉徳慧接署又海寧縣胡杲署山隂縣沙漢鰲二員一暴戾一鈍軟前日督臣李衞進京時原公訂回任調換今督臣云因其徵糧尚好巳奏緩調以觀後效等語臣惟當時時督察冀其改愆倘再有劣蹟即不能姑容也浙西捕役窩賊縱竊㡬成錮弊臣請加等治罪䝉我皇上硃批俟李衞回浙再加商酌奏聞欽此遵與李衞商酌意見相合臣現在另摺恭奏明帶來現借與臣辦事人甚謹樸從無家信來往仍俟督臣回任送還合併附奏伏乞睿鑒謹奏覽同日又奏為請嚴捕役窩盜之禁以靖盜源事該臣看得安良莫要於弭盜而弭盜莫先於除窩平民為窩尚有捕役訪緝隣甲首報至於捕役為窩則根深蔕固隣甲不敢稽察同役復為護庇凡地方之時有盜賊竊發而莫能緝獲者皆由於蠧捕之包縱其情罪實比凡人為窩更甚臣請嗣後如有捕役存留强盜在家坐地分贓者雖不同謀不問人贓多寡將本犯擬斬監候若不曾留歇在家但係知情婪収月規者不問人贓多寡將本犯擬絞監候雖遇恩赦俱不准減免其知情存留竊賊在家分贓者雖不同謀一名杖一百流三千里二名充𤼵伊蘭哈喇地方為奴至若三名以上及其中有得贓滿貫與所窩之賊有應問死罪者俱擬絞監候其不曾留歇在家但係知情婪得月規者一名杖一百徒三年二名杖一百流三千里三名杖一百發邉衞充軍四名發極邉衞煙瘴地方充軍五名以上充發伊蘭哈喇地方為奴内有得贓滿貫及餽送之賊有至死罪者亦擬絞監候再惡捕有探定事主身自造謀行刦者不分行與不行亦照常人為首之例擬斬立決無庸更定外若不曽造意但與各賊同謀行刦應照傷人夥賊之例疏内聲明即行正法不准減等其有造意為竊者雖贓未滿貫枷號兩箇月責四十板充發伊蘭哈喇為奴若計贓至一百二十兩以上及係先曾犯過坐分强竊盜贓或婪收月規一次者俱擬絞立決共謀行竊者不問得贓多寡枷號一箇月責四十板𤼵極邉衞煙瘴地方充軍其曾先犯坐分強竊盜贓或婪收月案例應驗明並無私拷傷痕是正實盜賊尚不容其拷打乃惡捕多豢匪黨或為幫役或為水手每將良懦誣竊私拷得財則獻之惡捕甚有私拷斃命者則商令夥黨一人承罪其正身惡捕反得脱然事外應請嗣後如有捕役夥黨私拷致死人命捕役即供不知情亦以為從論俾其不敢濫收匪類暗行縱使而私拷弊端亦可以杜絶矣為此具摺伏乞皇上睿鑒敕部議覆施行謹奏向聞捕役往往私飬一二積匪作眼有以賊捕賊之説今若照議嚴行禁治則捕役將束手無䇿未必復能獲賊恐皆逺避畏途頂充無人也雍正七年閏七月二十三日浙江觀風整俗使署理浙江廵撫印務臣蔡仕􅘎謹奏為三陳海塘情形事該臣看得海寧塘工劇險秋汛潮勢尤衝經臣將勘過情形及兩次𤼵銀僃禦情由先後㑹同署督臣性桂題報在案今值閏七月正潮水大長之候潮頭東來為漲沙所激由南廻漾復為一潮兩潮盤激高至二丈有餘合攻塘身潑出塘面自初一至初五日為初汛日期坍矬疊見因柴土預僃足用文武員弁随坍随修得保無虞又自十三日至十八日為望汛潮勢必更高大衝決實為堪虞臣與署督臣性桂商定分班往看臣随於十四日親赴塘工稽督十五日早晨係東南風及潮頭將至轉西北風東來潮頭吹壓中江而流不近塘身惟南來潮頭於護樁外撲散旋即向外而去十六七八等日俱係如是臣連日遍歴東西兩塘目睹安瀾情形環塘里民莫不以手加額頂戴聖主福庇今十九日望汛巳過潮當漸平臣因科塲期邇回署辦理入闈事宜其八月汛期有署督臣性桂稽督且節過白露潮汛勢歛天氣向寒南風日少不慮其鼓浪滚塘即有續坍不至大害今年秋汛自可無虞但海中漲沙漸高塘根護沙盡洗實有日險一日之勢防護不可稍疎而東塘之白牆門念里亭一帶為東南潮頭相遇盤激處所震撼尤甚現在惟有多僃柴草鑲高培厚晝夜廵防遇塌搶修將來秋汛巳過尚須從長計議興工造築期於一律堅固庻免來秋衝決之虞俟至期確估定議具奏合將現在保固情形先行奏聞謹奏覽奏朕心不過暫時稍慰時復厪念不置海塘安危實非人力所能勝然不敢明露此意於汝等何也極盡人事尚恐不能保固倘汝等并屬員謂朕必不加罪遂爾膜外視之其險更可意料耶今不得巳而有此諭盖欲汝等體知天道感應之理耳為大臣者克以忠誠上格屬員各有司以職任勤慎上格軍民士庻以風俗醇良上格果能如此上行下效敬信相孚實有以感動神明則未有不轉危為安之理李衞在京陛見朕亦經痛加訓誨矣汝等可諄諄開導百姓萬勿妄生怨憾之心在工人役切戒以穢汚不潔致有褻瀆興工歇工皆諭令望海叩禮其監工各員務飭其必誠必敬恪謹從事上下齊心協力而為之豈特海塘可保無虞朕意必有望外之嘉應也雍正七年八月初六日浙江觀風整俗使署理浙江廵撫印務臣蔡仕􅘎謹奏為恭報拏獲江省積盜事竊有江南青浦縣巨盜張興即金子良積年糾夥在於江省蘓松河内行刦因嘉湖毗連時亦暗入為害著有蠻王綽號又號黄魚大王本年六月内准兩江督臣范時繹移咨通緝臣即分檄嚴飭文武員弁協緝務獲兹據烏程令薛景珏詳稱先獲該犯外母供出盜夥沈五張大金二三名獲禁湖郡供出張興同夥葉七邱七等現在平湖縣乍浦地方該令即専差移㑹署平湖縣撥役同嘉協外委千把總掩捕全獲現禁嘉郡起有鳥鎗夾刀挫刀等兇器在案臣随飛飭嘉湖二府訊取各犯行刦次數確供續據該府等取供具詳前來臣查各盜所供尚未畫一必俟被刦各地方官覆查明確方成信案應將此十六犯俱照例留浙究審其江省有案州縣只可委員闗供定案庻免觧審中途逃脱之虞臣巳咨明江省督撫二臣並行臬司究緝未獲夥黨分案追贓招觧去後再查上年江省拏獲巨盜徐盛先亦稱黄魚大王是否與張興綽號相同抑係徐盛先冒認其名現飭併訊張興確供附招聲明事闗拏獲積年大盜除恭疏題報外合先繕摺謹奏覽奏捕獲積盜但不止於此數巳也仍當不時留心訪察嚴督緝拏斯乃保安良民之要務一日不可稍忽者同日又奏為奏明寧塘保固事本年八月初四日接江蘓布政使臣髙斌寄字内稱伊具奏浙省年成豐收及海寧塘工情形䝉皇上硃批好再傳諭與蔡仕􅘎等令著實敬慎預為防備䖍恭祈禱海神自有感效等因到臣欽此竊惟天人感召之理屢奉特㫖頒示而我皇上敬天勤民念念出於至誠故天眷神佑随處皆有徵應今海寧塘工臣仰體聖心敬慎預防䖍恭祈禱當閏七月望汛一年潮頭最盛之時在塘各官莫不以現係東南風為慮及臣於十五日自尖山潮神廟祭禱回塘潮頭正起忽轉西北風吹向中流靈應昭然衆目咸睹迨臣自十九日回省半月以來通塘安稳此月初四日署估修築以保來年臣當與司道各官悉心敬慎辦理以祈上慰聖懐為此謹奏覽奏深慰朕之憂懐雍正七年九月二十四日浙江觀風整俗使署理浙江廵撫印務臣蔡仕􅘎謹奏為恭繳硃批奏摺事竊臣前奏早稻豐收并附奏閩省榖船在温州洋靣失風一摺欽奉硃批諭㫖敎誨臣即密告同城大員共省心行交勉公忠並將失風閩船嚴飭温州道府留心安撫去訖查浙省早稻豐收業經臣案補倉榖石現飭陸續收買新舊錢糧小民踴躍輸將海鹽秀水二縣本年巳報全完其完至八九分者甚多又臣恭謝天恩摺内附奏督臣李衞以幕客魯錦借臣幕辦事欽奉硃批臣遵查得督臣李衞帶至京師引硃批理合恭繳又奏據督臣李衞訪聞江浙閩廣有匪類結黨䝉我咨稱東洋辦銅倭人仍循舊例䝉皇上硃批臣等即録送督臣李衞知照外查督臣原咨係據商人俞孝行稱係第二番洋商俞吉枚與彼國通事約定其中詳細委曲之處俟俞吉枚回棹更可一一得其確耗等語臣訪查俞吉枚於八月内回棹即喚到細詢據稱銅商東洋買賣舊例貨物十分之中得銅四分今年二月内至島正值倭人議減給銅一分六釐吉枚随向通事宣揚皇上聖徳神威倭人咸知懼悔仍復四分給銅並議嗣前稟督臣李衞之語更為確鑿合再密奏以上防察匪類并東洋辦銅㑹奏二摺所奉硃批係署督臣性桂祗領應聽性桂恭繳合併奏明謹奏覽雍正七年十二月十二日浙江觀風整俗使臣蔡仕􅘎謹奏為敬陳微臣廵歴所見仰祈睿鑒事竊臣以菲材叨䝉皇上擢授要職廵訪所至無刻不以吏治民生為兢兢今年於三月内署理廵撫事務不能分身出廵至十月初二日督臣李衞回任臣將署任事宜交明隨於十一月初四日廵歴温處二郡并渡海赴玉環山由台州而回一路地方寧謐民情和樂現在米價每石不過八錢内外各州縣新舊錢糧按順荘新冊行滚單法納戸稱便現今尚在歳内報完而玉環山周圍五百里中開平疇泉甘土沃昔棄荒地實為可惜今居民湊集日以蕃庻村落街市漸成規模城基巳築但少經費完竣需時衙署倉庫俱備惟營房牆薄瓦稀不耐經乆查係同知張坦熊經手每間只用工料銀三兩二錢未免過於節省以致草率當經面飭添修督臣李衞亦巳飭理合繕摺奏聞伏乞皇上睿鑒謹奏覽雍正八年二月初八日浙江觀風整俗使臣蔡仕􅘎謹奏為奏𠫭罔利剝民之豪貢請㫖搜追以懲貪惡以快輿情事竊查浙省湖州府長興縣貢生趙璟貪横不法臣經訪飭該府拏訊一靣具摺奏聞旋據受害邑民紛紛出控或告其霸據煤井或告其剝估田屋或告其吞占山地或告其私抽簰税贓欵多端必須嚴審始得吐實隨將趙璟捐貢事由照例咨部斥革檄府究審兹據該府詳稱該犯豪横一方蹟同光棍一奉訪拏羣情踴躍咸欲得而甘心雖所犯罪惡尚多匿情未吐而營私罔利為惡致富是實請將該犯所有壟斷貲財罰追以充修濬湖郡一帶漊港之用等情臣查趙璟一犯肆横於長邑地方平日所有財産皆係占據煤利凌剝民膏之物現在告案鱗集自應逐欵究擬追贓給還原主非僅擬罰所可蔽辜除批駁該府覆加確審按擬詳報外相應請㫖先將該犯産業資財盡數搜追入官内有應追出給主者容俟定擬斷給其餘一切歸公以充湖郡修濬漊港湖道之項倘有餘剰仍充别項使伊婪得本地之財物盡追為本地之公用不得私自享用庶足儆貪惡而快人心於地方公事亦有裨益矣為此繕摺具奏恭候諭㫖批示遵行謹奏汝所論雖是但若罪不至於籍沒未有將其田産盡數搜追入官之理如云罰追資財留充本地方公用更不應加入官二字此事朕如何批諭當㑹同督臣李衞詳細商酌務令情法允當為是雍正八年四月初六日浙江觀風整俗使臣蔡仕􅘎謹奏為據實陳奏仰祈睿鑒事竊臣於本年二月初旬出廵嘉湖二郡一帶地方安恬民情和豫米榖充裕價值甚平雖春雨稍多經督臣李衞㑹臣等設壇祈禱旋即晴霽不至有妨春花各屬錢糧巳有完至三四分四五分不等者至於二郡為江浙要衝營伍最闗𦂳要湖州一協操演生疎尚不如太湖一小營之諳熟而該副將范宗堯性情驕縱過自矜詡臣詢督臣何以包容之故而督臣李衞云緣該將現在勉強操守此地尚可拘住伊之悍性若止以狂妄𠫭究恐降調他省為害匪細故未輕舉等語再者臣於三月初旬回署有嘉興通判今陞湖廣襄陽府同知廖坤者與臣同鄉因欲赴任來署稟辭對臣言伊近䝉皇上賜以摺匣諭其查訪各省地方官吏并出其舉劾之摺稿示臣内中首薦監生一名及候補同知潘銓布政司經歴張彦珩二員而末後又開劾杭嘉湖道王歛福鹽運分司徐有緯二員開薦知府同知副將遊擊等六員稱此摺於三月初四日恭進又稱稿内所劾二員謄清時巳經刪去等語伏思為臣子者叨䝉聖恩准令摺奏自當慎重謹密詎可矜誇漏洩以竊威福今廖坤將密奏摺稿示臣臣不敢以同鄉稍為狥隐理合據實密奏仰祈聖鑒謹奏覽奏嘉奨之懐不勝批諭内外大小臣工果皆人人如此以公忠不欺不隠之心協贊於朕朕復何憂何慮耶但三人行必有我師焉觀此無知小人之行為更當慎密自持常能以責人之心省巳則為益良多矣同日又奏為敬籌秋審之法以防疎縱事竊臣查各府州縣離省程途自數百里至千餘里不等每當秋審届期觧犯絡繹兵役護送奔走不遑雖鎻原飭加謹而行走不無稍鬆有等幽囚日乆每於觧省在途思洩其桀驁之氣凌轢路人掠搶食物歴加嚴禁終難馴帖又自念罪無可逭一值曠野孤村兵役偶懈便思乗間走險往往或至脱臣愚竊謂斬絞重犯有巳經秋審三次者其情罪巳毫無疑義即使年年觧審而到案别無可吐之供在途徒有意外之虞請嗣後有秋審三次尚擬監候之犯再届秋審只令該府縣敘由詳報臬司轉送督撫照依京師秋審之例核招具題免其觧審盖案情乆定無慮敘詳之失實招由具在即可按冊以㕘稽既可杜重犯之脱䲭張而於矜恤重典亦無所妨矣為此繕摺冒昧陳奏伏乞皇上睿鑒勅部議覆施行謹奏所奏似乎近理候發廷臣再加詳議奏覆有㫖硃批諭㫖巻六十七
