body:
  text: 欽定四庫全書硃批諭㫖卷一百八十五硃批趙向奎奏摺江南蘇州布政使臣趙向奎謹奏為恭謝天恩事竊臣山右鄙儒初任溧水知縣調繁嘉定部議因公革職䝉恩從寬留任旋䝉引見又荷天恩復還原職特升廬州府知府繼又疊沐聖恩升授巡糧二道今復奉㫖超擢蘇州布政使三載之間末職下僚洊膺方嶽重任皇上之寵眷愈渥小臣之報稱愈難銜感愈切除經詳院代題謝恩外今於三月十五日浙江織造臣許夢至臣衙門恭傳聖㫖賜給臣漆匣四箇鎖袱俱全許臣得用摺子著令送交怡親王呈進欽此臣恭設香案望闕叩頭祗領訖伏念臣何人斯至䝉皇上恩許摺奏俾葵藿微忱得以上逹天聽臣惟有勉竭駑駘益加謹恪以圖仰報洪恩於萬一而已為此謹奏試捫心自問並仰觀於天若不做一出色人物以全朕顔面於汝安乎否耶勉之勉之之道無他技術惟將公私二字辨别清楚而巳但秉彛天良與任性粗猛似是而非切不可因於心無愧遂欲徑情率意鹵莽而行必當臨事精詳愼密方無舛謬凡百過猶不及以適中為要勉為之江南蘇州布政使臣趙向奎謹奏為恭繳硃批事雍正六年五月初五日臣家人齎捧皇上硃批臣摺到署跪讀上諭訓勉周詳言言針砭臣雖至愚敢不時加警惕仰遵聖恩提命所有原奉硃批奏摺一扣理合恭繳謹奏訓勉雖詳能遵行與否須看爾之造化何如朕亦難强之使然也江南蘇州布政使臣趙向奎謹奏為據實奏聞事臣於本年二月二十五日到任核查前司張坦麟交代冊內收存正項銀兩俱無虧缺應解刑工等部飯食等銀亦無短少此外止有另貯在庫銀二萬一千三百四兩零據稱此項係伊任內贏餘已經奏明歸公不可輕動其餘應解戶部飯食及添平等銀三萬七千三十九兩零並無存庫臣當即移咨查詢據張坦麟覆稱此項飯食解費應於雍正六年分所收耗羡銀內動支起解臣據咨具詳奉撫臣陳時夏批示部餉飯食原係各屬每年隨徴解司交收自應按年按欵將屬解之銀支用至於耗羡解司奏明六年為始以供六年公用並非以充從前年分飯食解費今何得藉詞牽抵等語臣復又録批移咨催解而坦麟仍行固執前項銀兩終無著落但存庫銀兩現准部咨提解京餉八十六萬餘兩勒限八十日到都目今限期己迫因解費未據移交致稽起解且交代限期己滿臣不敢自蹈徇隱之咎除詳明督撫臣聽候具題外事關司庫錢糧重務理合繕摺奏聞伏乞皇上睿鑒批示施行謹奏於此一事觀爾不能秉公執正惟知阿順撫臣深負朕擢用之恩已有㫖矣似此借題陷人徒害自身而巳何益之有審觀目今巳往朕用人行政之道歷歷可鑑除還朕一公字是字餘無他策也江南蘇州布政使臣趙向奎謹奏為恭謝天恩事竊臣䝉聖主特恩擢升江蘇布政使又䝉俯准部議許臣交代清楚給假數月回籍營葬自問何人乃荷皇上錫類宏慈下逮微賤臣雖捐糜頂踵何由仰報萬一兹因前司張坦麟交代案內尚有解部飯食等銀未楚臣先經摺奏現在候㫖一俟皇上批示到日即將此案料理清楚束裝回籍所有微臣感激天恩下情理合先行繕摺奏謝更有請者江蘇為錢糧重地藩司任大責重一切事宜有奏摺未能盡悉必靣奏始得詳明者可否容臣於給假離任後趨赴闕廷一一靣奏跪聆指示則地方緊要事宜俱有遵守矣如䝉俞允臣即兼程進京後再行回籍合併聲明謹奏應先回籍料理完畢然後赴京靣請訓㫖江蘇布政使臣趙向奎謹奏為恭繳硃批叩謝天恩事六月十七日臣家人齎摺回署欽奉硃批臣跪讀之下感激慙悚伏念臣一介庸愚䝉皇上洪恩超擢藩司受事之後即將前司張坦麟交盤冊內逐一清查俱無虧缺惟因存解戶部銀兩例有飯食等銀咨詢前司隨准移覆擬於六年耗羡內動支臣即據詳兩院奉前撫臣陳時夏批駁按年按款不准牽抵斯時臣因耗羡歸公事屬初行無例可稽惟拘不敢擅動之見以致不能顯然别白是非秉公抗拒皆臣識見淺陋之處咎實難辭䝉皇上天地包容不即加罪硃批訓飭諄切開導臣雖下愚敢不悔悟竭忠報效臣已於署撫臣張坦麟任內詳明動支飯食等銀於七月十五日隨正解部訖一切交代俱巳清楚具結所奉硃批理應恭繳謹奏既自知過咎當以為終身戒倘再有類此不公形迹則難容輕恕矣江南蘇州布政使臣趙向奎謹奏為耗羡一案酌議略有定規先繕清單恭呈睿鑒事臣䝉皇上天恩畀以蘇藩重任又䝉恩准給假回籍葬親惟有銜結髙厚勉圖報稱應將任內一二緊要案件先行辦理方敢就道如清戶清糧一案已經確議通詳由督臣范時繹具題外其耗羡一案因撫臣陳時夏未經竣局署撫臣張坦麟與臣細加詳議逐一酌𣲖略有定規惟公用之內尚有幾款現經署撫臣咨詢行查未經覆到今署撫臣張坦麟奉命赴任江西行令再加核議臣不敢草率擅專應侯署撫臣尹繼善到任商酌妥辦完結另行奏聞臣現在遵㫖給假於九月初七日卸事十五日起行回籍合將先行定議欵項繕具清單恭呈睿鑒伏乞皇上俯賜指示欽遵為此謹奏尹繼善到任後自必料理清楚奏聞於朕也硃批諭㫖卷一百八十五
