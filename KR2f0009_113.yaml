body:
  text: 欽定四庫全書硃批諭㫖巻一百十三硃批黄元驤奏摺雍正元年十一月十八日山東登州總兵官臣黄元驤謹奏為奏聞事竊臣一介武夫至愚極陋蒙我皇上殊恩由副將特擢臣廣東瓊州總兵官旋調登州總兵官臣何人斯屢蒙特簡殊恩即粉身碎骨亦難仰報惟有殫竭犬馬庶幾稍盡職守所有微臣到任清理營伍事宜謹臚列奏一文武和衷以安兵民臣到任之始即通行曉諭各營将弁務期文武和衷兵民相安不得乖張多事庶地方享安靜之福一時勤訓練以資防禦查軍中之利器莫如鳥鎗勤加操演火藥或致不敷臣隨通行各營開造清册凡有養贍名糧據實開報臣酌量各官大小兵丁鎗手若干分别量留㡬名以資兵弁養贍并僃火藥之需至於器械旗幟等項查有敝壊者容臣陸續修整臣受恩深重圖報無由斷不敢稍有徇私之處以致上負天恩為此繕摺謹奏覽奏朕深為嘉恱只要實心實行朕之耳目自能照悉諸凡竭力為之不必瞻前顧後掩飾前任之失悞曲徇同官之請託以自取掣肘之累特諭雍正元年十二月初九日山東登州總兵官臣黄元驤謹奏為請㫖事竊查兵丁之苦累莫重於扣剋而扣剋之源皆由於營中指稱辦理公務或借餽送上司并修理旗行清查各營養糧數目送到清册其中多寡不一衙門舊有親丁養糧四十分至副將養糧擬酌留馬歩二十五分㕘將十八分遊擊十四分都司十分守僃八分千把四分其餘多占名糧悉令概行皇上格外之鴻恩也再查營中公務操練鳥鎗製造火藥修理旗幟在在需費臣愚以為大營擬酌留公請者登州沿海島嶼甚多必得熟諳水師之員於官船出哨之後不時廵查臣看得夀樂營守僃謝雲濟南城守營千總鄧成玉臨清營把總孟天棟是否合宜悉聽聖裁謹奏覽爾此奏朕甚為嘉悅但督撫提鎮莅官之初孰無此一奏言之則天花亂墜而實力遵循言行相符者甚少間有勉强踐言者亦皆捨此而就彼汰舊規而覔新利此等作用難逃朕鑒更或始勤終怠得名改操似此者比比不可枚舉今覽所奏殊非泛泛頗似實心報效立志公忠者果能如此朕得一好鎮臣矣勉之雍正二年正月十九日山東登州總兵官臣黄元驤謹奏為奏聞事竊臣查山東沿海礮臺僅一土堆上有礮亭一間文登副将查文登沿海有礮臺三十二座每臺兵五名經前撫臣李樹徳查海至文見臺多兵少因只留臺十一座每臺安兵十名今思一臺十名之兵焉能禦敵文登如此他營可以類推去冬臣在省時撫臣黄炳以沿海原設礮臺墩臺相商臣深知情形若行修葺徒費無益臣愚以為查近村要處酌留㡬墩撥兵二三名專司瞭望馳報將臺兵礮位仍各歸還本營本汛臣酌量沿海營汛分給聖裁至於操練子母礮臣請自春操為始與連環鎗一以廢法臣又思近海州縣所轄沿海鄉莊舉行團練之法最善不但保固地方或偶值官兵𠞰捕之際鄉勇亦可以張應援之聲勢臣愚昧冒奏是否統乞皇上訓示施行謹奏覽所奏朕深為嘉悅勉為之雍正二年三月初十日山東登州總兵官臣黄元驤謹奏為臣標亟需諳練之員仰懇聖恩擢補以重海疆以資指臂事竊臣標右營遊擊現在缺員應聽部推臣何敢瑣瀆但臣標有應援之責指臂調遣必得才長識敏之員始克勝任查有臣前遵㫖題請新調臣右營守僃謝雲技勇兼優辦事敏捷堪以補授臣標右營遊擊倘䝉俞允所遺守僃員缺查臣標水師前營守僃史節文雖才堪驅策水師船務非其所長以之調補臣標右營守僃實屬稱職其水師守僃員缺查有部發臣標候補水師守僃姚郎原係臺灣把總水師慣練堪以補授但山東非係題補地方臣為海疆得人起見冒昧具摺奏請可否擢補伏候聖裁謹奏照依黄元驤奏請補用該部知道雍正二年閏四月十三日山東登州總兵官臣黄元驤謹奏為恭陳下悃仰懇天恩事竊臣一介微賤屢沐殊恩即捐糜頂踵亦難酬報因思臣有長子翔麟年三十六嵗質雖愚魯年力頗壯正當代臣勉竭犬馬以圖報效之日仰懇聖主洪恩破格收録准令當差效力俾臣子得侍輦轂之下恪供職守将来䇿勵成人皆皇上教育造就之所賜也謹冒昧具摺叩懇即遣臣子翔麟恭齎捧進伏乞皇上恩賜垂鑒謹奏爾子若係不可成就之質朕即遣回矣因其大有可觀堪許跨竈巳留用侍衛矣此子将来可以為國家效力者雍正二年八月二十日山東登州總兵官臣黄元驤謹奏為特舉賢員懇恩遞補以收實效事竊查萊州營㕘將李元洲居官不職臣巳特疏糾㕘所遺員缺有臣標水師前營遊擊陳汝鐫操守廉潔馭下有術若以擢補萊州營㕘將不惟地方得人即各營官弁亦莫不觀感思奮查東省無題補之例臣未敢具本但此等才守兼優之員若不據實陳奏臣捫心亦不自安可否擢用之處出自聖裁倘䝉恩准将陳汝鐫擢補則水師遊擊之缺必得熟練舟師之員查臣標右營遊擊謝雲諳練舟師若以之調補於海防大有裨益至於臣標右營遊擊一缺有操練應援之責若䝉皇上於記名人員内選擇補放微臣指臂實有攸賴矣為此繕摺謹奏莱州㕘将員缺候朕諭部命爾保題具本時将謝雲一併題補可也不必引此密諭雍正三年六月十六日山東登州總兵官臣黄元驤謹奏為密奏事雍正三年五月初九日准布政使布蘭泰密書到臣為敬陳採訪等事四欵奉硃批此事可與陳世倌黄元驤說知著伊等詳議密奏欽此臣伏思所陳如兵船扼要廵防海口分别堵決海舟給單查驗海口撥員抽稅四欵有極宜行者亦有未便者臣前接撫臣来函登萊一帶公務紛投未遑親詣查勘俟歴年奏銷及秋審事竣即當策騎蓬萊等語臣即可以候其面議但恐稽延日久未得覆㫖謹将芻蕘之見先為分析另單密奏仍俟撫臣詳議是否相宜再為合詞回奏仰乞聖裁謹奏仍當與撫臣陳世倌㑹商具奏擇理長者而從之毋隨順毋固執倘撫臣與汝所見不同有不契合處不妨兩議奏来候朕酌定此諭密之同日又奏為恭謝天恩事臣標萊州營㕘將李建功密録聖㫖一摺到臣捧接跪讀感激涕零隨望闕叩頭謝恩竊念微臣世受國恩雖勉竭駑駘尚恐無以酬聖朝豢養之恩乃䝉皇上覆載洪仁以奨勸為勉勵臣惟有朝夕氷兢始終一節不敢少有隕越以負聖恩為此繕摺奏謝謹奏所奏知道了接朕此㫖當更加謹慎勉力盡職若因此肆志則自悮矣雍正三年九月十二日山東登州總兵官臣黄元驤謹奏為叩謝天恩事竊臣遵㫖陛見八月初七日入朝恭請聖安䝉賜克食即召入飬心殿仰瞻天顔敬聆天語頻奉温㫖即父子之恩未有若是之深者臣雖粉骨難酬惟凛遵聖訓不敢恃寵而驕縱不敢昧心以自欺竭蹶勉力以仰報天髙地厚之恩於萬一再有奏者膠州營守僃李景泰臣巳遵㫖帶回原任但臣冒昧之愆蒙皇上格外寛宥臣感激天恩犬馬之報世世不忘謹瀝情具摺奏謝伏乞皇上恩鑒謹奏爾今巳經陛見領過訓㫖知朕意向之人非從前可比若稍有違負則有心之過朕斷不寛恕勉力敬慎為之雍正四年二月二十一日山東登州總兵官臣黄元驤謹奏為奏聞事竊登州一帶沿海設有威海成山靖海大嵩鰲山靈山安東七衛前奉文裁併衛所撫臣有仍留邊海各衛之議後經部駁臣去秋陛見回到省撫臣問臣邊海各衛應裁與否臣答以邊海與内地不同邊海屯民隔州縣窵逺與衛官親近偶有汛防不及之處衛官𫝊呼屯民立應大有益於海疆撫臣云俟陛見回即来東省查看海口面商等語臣今致書撫臣商議外謹将邊衛情形據實奏聞又沿海僻處礮臺礮位臣遵㫖掣回營汛操演報部在案其衝要處應修之礮臺撫臣遵㫖陸續建造委登州知府蔡曰逢㑹同營員查看擬於登州近處先建一二座以為式様俟建起一座即将形勢繪圖㑹同撫臣奏聞謹奏知道了去年朕觀爾微有老景爾受朕知遇宜振起精神勉盡厥職若以年老廢弛公務斷然不可雍正四年九月初六日山東登州總兵官臣黄元驤謹奏為奏聞事雍正四年八月二十四二十七等日據臣屬沿海各汛報稱江南造送天津哨船十二隻在洋遇風開散有押船守僃顧賓千總馮得遇把總任彪陳世英劉士斌押船五隻飄至膠州海口又報崇文把總沈定邦押船一隻開徃馬頭嘴又報江南水師營林遊擊押船一隻開徃東行此二船尚未報收泊何處等因臣即僃文知㑹江寜撫臣蘇松鎮臣外隨飛飭沿海各海口官弁逐處挨查在後各船收泊下落即速飛報據守僃顧賓禀稱哨船桅篷被風損壊巳具禀江南廵撫著令州縣採買大桅篷料等情但轉瞬交冬北風髙烈即買就桅篷裝送来膠修理一時未易運到歳前勢難赴津今臣起程赴成山頭海口一帶查未到各船信息一路到膠州查各哨船水手人衆恐食米不敷自當資給充足俟桅篷運到修理堅固船隻㑹齊明春方可令其駕駛赴津為此繕摺奏聞伏乞皇上睿鑒謹奏所奏是明春候風順赴津巳有㫖矣一切人役加意照看毋令至於窘乏𫝊㫖與撫臣陳世倌硃批諭㫖巻一百十三
