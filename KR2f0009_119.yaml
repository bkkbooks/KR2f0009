body:
  text: 欽定四庫全書硃批諭㫖卷一百十九硃批丁士傑奏摺雍正三年正月初一日貴州大定總兵官臣丁士傑謹奏為據實陳奏事竊臣荷蒙聖主洪恩由參將歷升總兵奉㫖進京陛見跪聆全之事伏乞諭㫖彼時臣出乾清門即欽遵謄寫內有給與提督趙坤之㫖其中一句記憶不真臣仰體聖主上下語意傳與提督此臣之愚昧實當萬死為此據實奏明伏乞聖恩鑒宥施行謹奏地方事甚有關係轉𫝊諭㫖難保不致差訛爾此奏甚屬可嘉雍正三年五月初二日貴州大定總兵官臣丁士傑謹奏為披瀝自陳事竊臣前聞貴州撫臣調各屬州縣至省傳奉諭㫖貴州通省火耗課稅羡餘以及各衙門官租俱解交藩庫照山西例按等次給發各官以作養亷經臣於雍正三年四月初七日具摺奏聞昨四月二十六日有貴西道吳應龍路過大定臣問及貴州通省錢糧數目據言額徴地丁銀六萬六千餘兩雜稅一萬三千餘兩倉糧十一萬四千餘石與臣前奏之數大不相同地丁雜稅銀數尚無甚差訛惟有倉糧數目臣奏八萬餘石今有十一萬四千餘石臣聞言之下不勝惶悚伏念臣何人斯荷蒙皇恩任用至此奏陳事件尚敢妄奏不實臣之愚昧實當萬死謹將臣舛錯之罪具摺披瀝自陳跪乞聖主洪恩謹奏倉糧既非爾任內專責何罪之有此等差訛無妨朕所嗔責總不在此但取人之心田耳若居心不純即逐物細緻周密無舛朕亦不取也同日又奏為奏聞事竊臣接准貴州提臣趙坤咨文內開蒙兵部劄付欽奉上諭各省督撫提鎮凡有題奏事件禁止部費等因到臣遵查得料理部費雖係大員而其費則出自屬下員辨求免部內駁查至于文武大員藉部費之名分肥入已者亦復不少究其實文官設法取于里下武官科派隊伍兵丁似此積弊豈不有負我皇上體恤臣工之至意耶惟冀聖主清大源而細流自止必使督撫提鎮布按二司永無科派部費之名則屬下之員自安分遵守不復到部料理而部內書辦巳如無可染指自絶無厭之求積弊不期除而自除矣臣冒昧奏陳伏乞聖主睿鑒施行謹奏朕日前嚴諭正為督撫提鎮兩司而發原不為屬下各員也果否遵奉試看數月自有照察何能逃朕之耳目耶雍正三年五月十三日貴州大定總兵官臣丁士傑謹奏為奏聞事竊臣詢問三營將備汛守地方有無事件回稱各汛俱有穵礦開厰之處係奉公開採有州縣管理收課等語臣思開採之處其中有奉部文者自應聽其開採誠恐猶有私開偷穵者無端聚集數千人之衆大地方大有關係急令三營將備各將汛守地方有開礦厰之處逐一詳察明白具文報臣臣又訪聞大定地方所開礦厰多無部文隨行文與貴州撫臣毛文銓令將礦厰之處察看舊案有無部文毛文銓遷延未覆逮臣行催始發回文內中多係朦混不明之語臣又咨撫臣毛文銓言聖明無微不照一經查出不無朦混之愆等語昨接毛文銓回文內云原因猴子厰礦脈衰微經督撫二院批准在落龍硐開採以補缺額實未題明等因到臣臣思既無部文又未題明即係私開毛文銓蒞任巳經一載有餘不將某處某厰一一詳為奏明似此顯然之事尚然蒙蔽則隱微事件不問可知是豈封疆大吏事君之道且貴州通省厰課臣聞並無定額其中藉幫課之名而私開者不少臣於此時倘不即為奏聞皇上聖明逺照一有訪聞臣罪難辭理應據實陳奏臣因一摺內情由不能盡寫謹將前後往來行查之文鈔録另具一摺伏乞睿鑒謹奏爾能實心任事諸凡據實上奏甚屬可嘉果肯事事如此爾之福澤難量勉力為之朕早鑒照毛文銓徇隱欺飾卑鄙巧詐趙坤柔懦亦非邊閫之才巳俱更調矣合委任石禮哈馬㑹伯非彼二人可比爾等可共相協力整理地方但邊陲緊要既不可因循懈弛又不可喜事貪功要在相機度宜審擇情理而行雖苗夷亦民也何况內地赤子乎若稍僥利圖功致人心不服則振作反不如因循之為愈矣至于礦厰一事即係奉文開採倘或於地方有不便處亦當斟酌奏請停閉私穵者何待言耶其與新任撫提詳悉籌計行之此密諭也毋令人知若乃本地窮民為資養身命起見不至聚集千百多人又在爾等留寬一步法雖一定權變隨人總須秉公酌中以安邊盡職為期朕之耳目自能照悉也勉之雍正三年七月初八日總兵官暫理貴州大定協副將事臣丁士傑謹奏為恭懇天恩事竊臣接准部文大定總兵官巳經改設副將該鎮丁士傑暫留大定管理副將事務俟雲貴不拘何鎮缺出即以補授等因到臣臣接文之後理宜靜候但臣撫心自問年幼無知身膺重任實難自信與其在大定守候雲貴總兵缺出莫若仰懇聖恩將臣暫調回京日覲天顔使臣見所未見聞所未聞裁成數載得蒙皇恩補放總兵庶上能有益于國家下能有益于地方皆出聖主隆恩指誨之所致也惟冀恩賞驛馬於萬夀之前允臣進京獲隨廷臣叩祝庶犬馬依戀之忱得以少抒矣伏乞聖主恩准施行謹奏邊地緊要難得為朕所深知之總兵似爾者其勉力為之毋得辭違同日又奏為奏聞事竊臣前奏修整旗械並營伍一切事宜伏乞皇上寬限半年臣自當竭力急為修理荷蒙硃批三年之內可觀亦不為遲臣跪讀之下益深感激除營伍舊有軍器不計外今臣於三營之中新造大小旗幟二百一十面帳房九十頂銅鍋六十口存庫火藥三千斤鍬鋤彎刀鐮刀斧頭各一百五十把以上所造之物俱係臣捐俸自製近奉定例修造軍裝不准隱匿理合奏聞至于貴州通省營伍除小營伍不能均知外如撫標三營安順提標以及威寧安籠兩鎮臣曾差人細訪據稱各營陳式操法雖然不一看其形勢俱皆整理可觀其中惟有安籠一鎮廢弛日久自鎮臣蔡成貴到任以來竭力修理較前亦屬整飭合併奏明伏乞皇上睿鑒謹奏覽奏朕深為嘉悅勉為之石禮哈何如據實奏聞雍正三年八月二十七日總兵官暫理貴州大定協副將事臣丁士傑謹奏為恭謝天恩事竊臣前奏大定礦厰事件一摺荷蒙硃批溫綸下逮又蒙賞賜花香茶一瓶到臣臣郊迎至署恭設香案望闕叩頭謝恩祗受訖跪領之下感喜交集不覺涕零竟不知何以仰報方無愧於臣心鞠躬盡瘁固臣分之所當然若隱微之內稍有欺隱實為不忠不孝之至天地固不容臣即臣祖父亦必譴罪及臣自此以後惟有捧誦硃批凡遇事件固不敢喜事貪功亦不敢因循懈弛實心辦事文武和衷俾地方寧謐仰報皇恩於萬一耳為此具摺奏謝謹奏覽奏謝足見悃忱知道了所奏改協均養亷二摺留中候髙其倬到京與之商酌石禮哈微覺孟浪地方事恐有錯誤已簡命張謙赴黔矣於伊陛辭時將養亷一事經面諭明白伊到時自有斟酌如無益亦必另行奏請也同日又奏為奏聞事竊臣聞雲南開化鎮臣馮允中因有調京另用之㫖兵民感戴情深聞信之下遂砌門罷市聚衆赴省保留馮允中自開化起身之時地方紳襟兵民湊送盤費銀一千二百兩馮允中苦辭再三勉强收受又原任貴州提臣趙坤臣與之共事八月有餘見彼秉性正直居官安靜前四月間調補鑾儀衛部文到安順之時兵民亦有砌門罷市之舉俱出實心感戴合併奏明伏乞皇上睿鑒謹奏所奏甚公此二人朕洞悉其居心為人原為人地相宜更調並非棄而不用也雍正三年十月十六日總兵官暫理貴州大定協副將事臣丁士傑謹奏為遵㫖奏覆事竊臣欽遵硃批訪聞得鎮臣石禮哈始到威寧聲名甚好實心辦事其後遂有孟浪喜事之名及奉㫖命伊署理貴州巡撫印務一到任時頗稱亷靜其後似欲收拾人心于屬員極意修好辦事之暇至按察司署內與文武羣屬在箭道蓮花池邊射箭飲酒僚屬中不能飲者即令優童代飲此豈大臣體統聲名甚屬不好臣蒙皇上詢問焉敢不據實陳奏臣更有奏者外省封疆不比但受恩深重非羣臣之可比不暇計所言之是否冒昧陳奏伏乞聖主睿鑒施行謹奏覽雍正四年正月二十九日總兵官暫理貴州大定協副將事臣丁士傑謹奏為奏聞事竊臣前奏石禮哈摺內奏稱外省大吏仰冀皇上務用老成練達之員實慮臣上年齒幼稚者性情未定不能仰體聖懷一時激切謹就管見上陳及臣跪接硃批捧讀之下悚惶無地臣之愚昧所見至小豈知我皇上一日萬幾睿懷周悉即行一事用一臣其難其慎實有不得巳之苦心臣冒昧瀆奏蒙皇上不加譴責復言臣心可取臣自顧何人疊蒙洪恩有加無巳自此以後惟益自勉勵時深兢業仰體皇上為君之難竭盡丹衷勉圗報效于萬一耳為此繕摺謹奏前諭實朕嘉汝之奏非責汝也不過令汝知朕之苦心耳同日又奏為請定儀注以彰國體事竊臣蒞任大定總兵一年以來每閲雲南省報見雲南鎮臣一年之中或逢年節或遇督臣生日往返一二千里之逺越境謁見甚不合宜及撫臣楊名時奉㫖授以雲南總督而仍管巡撫事務之時臣又接雲南省報內言有幾處鎮臣趨赴省城身坐督臣標下將官官㕔稟披執求見似此行為更為非體臣又見貴西道吳應龍與提督馬㑹伯往來文移與伯見禮貌俱係平行臣思官員相接之禮貌雖小而國體攸關茍相延日久則驕者日驕而諂者日諂倘遇地方緊要事務督撫以及在下文員或有不循理之處而總兵等官止知惟命是從豈不有負我皇上文武並重委任封疆之至意耶臣冒昧瀆奏倘有可採惟冀皇上或另頒儀注或仍照舊例曉諭則天下文武臣工皆知遵守不相紊亂于國體實有禆益矣伏乞聖主睿鑒施行謹奏此論是極外省失之太過京中旗下又失之不及朕為此正欲嚴行飭諭尚未及頒發所奏朕嘉悅覽之同日奏為奏聞事竊臣於雍正二年十一月自京馳驛赴任至貴州交界即聞雲南布政使李衛行為狂妄上驕上司下傲屬員及臣到任兩月之後又聞威寧鎮臣石禮哈有孟浪喜事之名去年五六月間文武官員路過大定者俱稱石禮哈與李衛互有嫌隙之語石禮哈之行為蒙硃批垂問臣巳據實摺奏何敢再陳獨李衛蒙聖恩授以浙江巡撫重任又非在雲南時之可比浙閩地廣事繁最為緊要聞福建巡撫毛文銓與李衛誼屬姻親最相交好又風聞李衛係督臣髙其倬保舉之員今三人共居一處若遇地方事件果肯秉公商酌仰答皇恩實為盡善盡美誠恐李衛恃才狂妄而髙其倬毛文銓徇情將順不但于事無益臣恐李衛後來不無有負皇恩之處臣受恩深重不敢避嫌謹將李衛素日情性行為奏聞惟冀皇上時加教訓指示則以彼之才自不難成一封疆殊異之員矣伏乞睿鑒施行謹奏此奏汝見淺矣朕所深知之人洞悉之事汝但放心勿慮雍正四年五月初十日總兵官暫理貴州大定協副將事臣丁士傑謹奏為恭謝天恩事竊臣齎摺人回荷蒙溫綸下逮又蒙皇上欽賜摺匣四箇包袱四箇鑰匙二把到定臣隨望闕叩頭謝恩敬領訖伏念臣何人斯蒙皇上簡任總兵毫無報稱夙夜難安復蒙如此知遇隆恩臣跪領之下驚愧交集惟有竭盡丹衷實心辦事仰報皇恩于萬一耳理合具摺奏謝謹奏朕因吳升告休雖未允其所請但彼實巳年老故調爾福建以便將來就近擢補陸路提督接㫖後爾其竭力為之毋負朕知遇之恩同日又奏為奏聞事竊查廣順州長寨修造營房一事提臣馬㑹伯給臣文書一角令將大定分撥駐劄廣順官兵限期齊至廣順並令領兵官協同知州帶領匠役人夫引兵前往長寨駐劄一面搬運已成物料建造衙署營房等因到臣臣因營房工程非一朝一夕可以告成恐官兵在彼攪擾夷人亦未可定倘滋生他事多有不便即將此意修書與提臣去後聞提臣馬會伯署撫臣石禮哈將撫標提標二處馬步兵丁派五百名前往長寨遊巡彈壓後因官兵到彼狆苗竟將進造營房走路用石堵砌撫提二臣隨行文與通省各協營調漢土兵二千七百名夷兵一千一百名齊至長寨外邊周圍下營有進𠞰狆苗之舉今聞督撫提三臣俱巳摺奏我皇上自有指授非臣之所敢多言也但臣身任大定將及二載苗情略知大概狆苗恃險搶虜自古及今並非一日要在文武大吏振其威權而各屬凜遵恪守實心辦事凡遇苗情事件務必耐煩設法料理庶于貴州地方苗情始有裨益若偶有小醜不服拏問有司即申報上司派兵緝拏彼豈肯束手待斃所持者弩弓藥箭茍傷兵丁一名則勢必不能歇手豈非以小事而生大事耶即如日前有人條奏黎平安鎮之舉此亦不過安愈求安之意也隨又風聞安鎮二年之內即要將黎平地方古州八萬直取其巢穴此說臣亦不知倡自何人似乎無事而妄生事端臣見督撫提三臣俱係新任恐不知苗情于地方事體無益臣嘗伏讀皇上賜臣硃批不可因循怠惰亦不可好事貪功誠萬古之定論惟冀皇上時以天語開導諸臣實於貴州地方大有禆益為此繕摺陳明謹奏此諭不但賜爾一人封疆諸臣朕皆如此訓諭但狆苗强悍不法積習久矣若不少加懲創恐非恩德可以感化者髙其倬來京朕已面詢詳悉况鄂爾泰可稱才德兼優之督臣二人之見相同朕始允行此舉爾所論乃整理後之善䇿也至于取古州八萬之說係石禮哈孟浪之見於其初奏朕即再三極言不可蓋以此事重大不得其人不可輕舉也又因馬㑹伯石禮哈皆過于勇往直前所以朕令料理一畢俱調離黔省也此奏甚屬可嘉朕知汝心矣雍正四年六月二十七日總兵官暫理貴州大定協副將事臣丁士傑謹奏為奏聞事竊臣為狆苗抗拒修造營房緣由曾於五月初十日繕摺奏聞今託主上洪福長寨狆苗俯首降順者巳有幾寨其餘幾寨亦巳攜眷奔竄所存之寨皆被官兵燒燬此時狆苗之事大概平服其所以𠞰撫詳細之處臣因非親身料理事件不能深知不敢妄奏但其中有隱微之處又不敢不詳為奏聞自五月初九日進兵起至六月十八日退兵止我兵共殺賊苗七名被賊苗傷損把總一員兵丁四十八名臣恐領兵各官不言賊勢凶惡難以遮蓋傷損官兵之愆又兼馬㑹伯石禮哈不肯任擅動大兵過于急遽之咎是以止憑下屬揑造一偏之詞即將文書達于督臣鄂爾泰而督臣身在雲南以為提鎮之言再無不實之理况現在傷損官兵自必言賊勢凶惡不問可知皇上聞貴州地方有如此凶苗未必不有過慮之處臣不得不將實在情形詳悉奏聞竊查長寨狆苗不滿二三十寨每寨不過十數家至二三十家非如四川之烏蒙鎮雄千百人可比其用石堵砌修造營房之路原因設立兵丁駐劄其地一則彼懼官兵占踞地土二則安泛在伊巢穴之中不得恣為盜賊是以為一時烏合之舉今見如此大兵故爾逃散為今之計司事者必須大為調劑方保安靜無虞若徒似目前草草了事大兵退後將來之跳梁未必不甚于前所以善後之䇿更不可不詳為籌畫特此一併奏聞伏乞皇上睿鑒施行謹奏於此一事爾所見謬矣如此一番振作尚慮善後之難若不如此一番將來之跳梁更可問乎始終汝論此事朕甚不取或兵出非時預備不周處在所不免而狆苗之應當懲創則一定不易汝之意見失于怯懦因循矣雖强辨焉能得理耶雍正四年八月十六日福建漳州總兵官臣丁士傑謹奏為恭謝天恩備陳愚悃仰祈睿鑒事竊臣于七月二十二日自大定起身趨赴福建漳州新任行至湖廣地方值家人齎回奏摺臣跪讀硃批有擢補臣陸路提督之㫖聞命自天惶悚無地臣報主之心雖切而駑駘之力實難勝任不敢不據實陳奏仰冀我皇上特選老成練達之員寄此海疆重任容臣于總兵任內再經歷數載俟臣諸事少有定見再蒙皇上授臣以重任庶上能有益于國家下能有益于地方臣之愚昧思慮及此誠恐我皇上即頒恩㫖為此遽瀝愚忱跪懇聖主俯允下情實于海疆大有禆益矣為此具摺奏聞謹奏已有旨矣不必固辭其勉力殫心以圖報朕之知遇可也大凡人之行為只在此心如能以誠以公行去天下事不過一理可以類推何待件件經歷干係輕重亦不在職分之大小即州縣千把員辨責任亦豈輕易誠則明矣雖柔必强未有學養子而後嫁者凡百惟務本莫逐末此心所向若正無往而不稱職也况地方事務自有督臣總理可放心勿慮但須潔巳秉公勤慎為之雍正四年十二月初一日福建陸路提督臣丁士傑謹奏為恭謝天恩懇請陛見事竊臣於七月內自大定起程赴漳州總兵新任十月初二日行至福州省城接准部文已蒙聖恩授臣以陸路提督之任臣即望闕叩頭謝恩臣感激情深實不知如何仰報方無愧于臣心朝夕惕厲誠恐隕越厥職有負聖主知遇隆恩臣不特目前存心立念如此即終身亦難更移倘於異日隱微之內或少存欺心少有更張不惟間進京陛見恭聆聖訓實於地方大有裨益臣在外省每見督撫提鎮等官自陛見之後其才識見解與前迥不相同是外省之官員雖博聞廣見不若親聆聖訓之頓豁愚蒙也臣逺隔天顔業經二載有餘依戀之心與日俱深跪冀聖主天恩允臣進京庶犬馬微忱得以稍抒並得受裁成之恩於無盡矣為此謹奏爾且不必來京從未面朕全不知朕之人覿面聽聞朕諭領㑹朕心自必少去瞻顧疑惑之私故覺較前不同朕之訓諭豈能化導下愚耶如在廷諸臣中日領訓誨尚有四年之久不肯洗滌私腸之固結者爾乃巳經見朕知朕之人不必多此一番往來況爾甫經抵任地方事務萬不能周悉遲一二載後准爾來京陛見同日又奏為奏聞事竊臣由大定總兵蒙皇恩調任福建漳州總兵正在赴任之際即聞福建有米價騰貴之語是以路遇閩省府㕔州縣無不細為訪問雖所說不一大概福建通省捐穀雖有一百二十餘萬石俱係有名無實臣聞之不勝駭異及行至福州省城見督撫二臣將在路所聞穀石之事一一告知據督臣髙其倬言此事甚有關係我亦風聞其說業經委員徹底搜查俟查明之後當即具摺奏聞必不敢絲毫隱蔽等語次日臣往泉赴任後有汀漳道髙鐸係督臣委查四府倉穀之員臣又細問據伊亦云各處存倉之穀十分之中僅有一二等語今督臣所以急為徹底清查具摺奏聞臣雖不知彼奏是何意見揆其情景無非欲于一二年間令州縣速為買補足數之意耳但臣再四思維福建通省地窄人稠山多田少豐收之年米糧尚不足食今若以本省之糧買補倉穀必致米價騰貴臣愚以為髙其倬摺奏之時請皇上敕令徹底清查其價銀必照時價收存仍著督撫設法在就近鄰省各處採買米價既不至騰貴倉儲又易得充足臣查閩省榖價不拘向何處採買再無不足之理斷不可止存穀價徒然有名無實是否有當伏乞聖主睿鑒施行謹奏閩省倉穀髙其倬已備悉奏聞於髙其倬未到閩之先朕即知之甚詳已大費籌畫矣將來或可漸有頭緒所奏知道了同日又奏為恭謝天恩事竊臣向在大定鎮為狆苗之事蠡測管窺屢有陳奏及蒙聖恩調臣福建漳州總兵行至江西地方遇家人捧回奏摺臣跪接硃批捧誦之頃茅塞頓開仰見睿慮周詳無微不到臣庸愚冒昧之咎在所難辭荷蒙皇恩不加罪譴復蒙溫㫖教訓臣雖愚昧豈無人心目今身任提督之責又非在大定可比惟有時加勉勵小心謹慎仰報皇恩于萬一耳所有感激情理合恭謝天恩謹奏看爾膽量頗屬不及身居武職此一著為第一緊要一切事全憑主宰擔荷方寸輕動不得心神驚亂不得倘若遇事張皇失措所關甚巨凡百處總以不動聲色鎮靜為上平常無事之時愈小心愈妙同日又奏為奏聞事竊臣於到任時將一路所過營汛塘房以及兵馬器械等項細加查看實屬廢弛不堪臣心甚為疑駭臣思前任提臣吳升荷蒙皇恩至優極渥何以使營伍廢弛一至於此細詢其弊以暗中作弊以致營中賣糧私頂私替無所不至之事難以盡舉謹將臣一路所見營汛情形並吳升居官行事確實具臣職若徒冒一潔巳之虛名而于實事反有虧損豈為臣子者所宜行乎臣意自臣身以及千把將定例養贍家口之名糧俟臣查明補足以養其身倘于正額之外有貪得無厭而多取者或仍蹈故轍而作弊者臣即立刻題參斷不敢少為姑容至通省各官之賢否臣按次調考之後與督臣髙其倬商酌妥協另為奏聞伏乞睿鑒施行謹奏所奏甚是但勉行以踐所言可也雍正五年四月初六日福建陸路提督臣丁士傑謹奏為據實陳情叩天恩鑒事竊臣接准浙閩督臣髙其倬咨文內開為欽奉上諭事雍正五年閏三月初二日內閣奉㫖陳萬䇿著交部嚴察議奏丁士傑身為提督乃曲意逢迎本地鄉紳將國家名器䙝慢擅自借人私用又不將陳萬䇿所行狂妄之處據實奏聞則平日之徇情瞻顧可知丁士傑甚屬不合亦著交部嚴察議奏等因到臣臣捧讀之下驚悚無地伏思臣將轎與執事借給陳萬䇿一事臣實愚昧無知理宜靜聽皇上直陳也臣自服官以來即作參將副將之時止知皇上披瀝奏聞伏乞皇上恩鑒謹奏觀爾不知悔過不知愧恧一味强詞飾辨必不知感朕恩遇愚賤小人之態露矣卑賤無恥四字當深以為戒莫令人指唾雍正五年四月二十四日福建陸路提督臣丁士傑謹奏為奏聞事竊臣於蒞任之時路過興化府地方訪聞副將朱杰熟悉營伍至臣看伊兵馬之時該營甚屬廢弛行調各鎮協營將備千把考驗福寧漳州二鎮俱聞伏乞睿鑒施行謹奏所奏陳祖訓不確其餘皆是同日又奏為奏聞事竊臣接漳州鎮臣初有德札內言本月二十五日因雨澤愆期漳城文武各官在開化寺求雨有汀漳道劉燦言府縣倉米短少揭報督撫被府縣將伊文書截回語言甚是激切當經府縣回稟並無此情汀漳道將頭撞壁上頭顱撞破要往省辭為道員而為此無賴之舉矜名博譽聳動商民罷市大非體統伏祈已委糧驛道李玉鋐審理俟審明之日自為題達為此具摺奏聞伏乞睿鑒施行謹奏覽同日又奏為奏聞事竊臣于到任之後曾以閩省存倉穀石虛懸具奏蒙皇上諭㫖髙其倬已經奏聞臣又何敢再奏但聞各府州縣倉穀虛懸者甚多其實數貯倉者十無三四藩司沈廷正到任尚未出結因限期巳屆不勝朦混已將各府州縣虧空穀石盡行揭報無如撫臣毛文銓從前巳曾出實貯在倉甘結達部今若題參恐致處分其中不無瞻顧督臣髙其倬又因倉穀不足之州縣甚多若一概題請革職解任追比其中不無良吏恐新補之員未必洞悉民瘼猶豫未決是以通省官員反覺藩司沈廷正此舉似乎太刻臣思倉糧關係國計民生今藩司既巳據實揭報督撫若仍前扶同容隱歷年拖缺勢難完項必得徹底清查勒限完結照例處分不惟閩省之倉儲得清即令天下有司聞之皆不敢有觀望侵漁之弊矣為此具摺奏聞伏乞睿鑒施行謹奏此事朕早經備悉爾奏甚屬可嘉一切皆似此據實無隱乃報朕第一著也勉之朕甚嘉爾之存心立志於此奏未到前數日已有諭矣爾此一奏更為有益常賚到時朕自有一番料理但密奏一事以密為要爾曾再三鄙薄李衛石禮哈之不謹毋至已身反蹈其轍而不覺也密之慎之雍正五年五月二十八日福建陸路提督臣丁士傑謹奏為奏聞事竊臣叨蒙特命畀以閩疆重任凡係營伍事件無不留心而軍裝器械實所以壯軍威而資防禦尤為緊要臣到任以來倡率公捐增新換舊邇來營伍稍有起色謹將臣更造鳥鎗帳房鑼鍋數目並各鎮協營捐造盔甲器械繕摺恭陳御覽臣更有奏者臣自到任後于所屬各官之賢否技藝未悉地方之土俗民情未知邊海遼濶汛守宜嚴是以按次調考祗緣前任提臣吳升蒞任四載於各屬官員總未識面臣此番調考即未免滋多事之議臣受恩深重焉敢避嫌姑息而貽誤地方也其中調考各官之優劣臣與督臣髙其倬業巳咨商按次舉行理合一併聲明伏乞皇上睿鑒施行謹奏調考乃係専責何必為此瀆奏將此皆謂不避嫌疑可見爾原係避嫌疑之人也公事斷斷不可避嫌任怨二字較任勞尤難須勉力為之營伍捐助之事朕甚不喜不肖將官每多借此名色以圖餘利倡率公捐有何可嘉處倘遇營伍有公辦之事若係真實無私將官不妨餘數分名糧少或數月多或一年以充公費整理之後即行補足兵辨既無怨言公務亦得就緒此為上䇿至若倡率捐助之風不宜令其滋長抑且觀聽不雅不比爾等總統大員自出已資急公報效後奏聞于朕候加恩議敘尚可舉此朕甚為不取也同日又奏為恭謝天恩事竊臣擅將提督執事借人私用又不將陳萬䇿狂妄之處具奏一按接閲邸抄部議將臣降三級調用蒙聖慈曲為寬宥奉闕叩頭謝恩訖伏念臣至愚極陋際遇聖明不棄葑菲屢邀殊典此實千古未有之遭逢非微臣夢想所能到也惟謝謹奏覽同日又奏為敬陳末議仰祈睿鑒事竊臣前任貴州大定總兵官時于二月上丁致祭先聖該州具稟令臣于前一日致祭臣問其故彼言知州係主祭官不便令總兵陪祭嗣聞貴州雲南二省凡係大員皆于前一日致祭至臣蒞任福建泉州陸路提督于祭丁之期晉江縣知縣亦具稟令臣先期致祭言福建省城督撫皆然祭丁之禮載在祀典未聞有祭丙之說何滇黔閩三省竟有豫日先祭之舉如果他省皆如此行大非恪遵皇上崇祀典禮之至意臣愚以為幸逢聖世式覩隆儀即督撫提鎮應于丁日致祭不得因主祭官之職卑而督撫遂不居陪祭之位也如果臣言不謬伏祈皇上睿裁飭諭施行謹奏提督全省陸路儘費心思料理何暇及此其照例而行不必留神分外務此沽名釣譽之事硃批諭㫖卷一百十九
