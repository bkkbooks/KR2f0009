body:
  text: 欽定四庫全書硃批諭㫖卷二百十八上硃批黃廷桂奏摺雍正五年六月十九日四川提督臣黃廷桂謹奏為謹陳營伍地方情形及微臣管見事宜恭請聖訓事竊臣仰荷殊恩委任四川提督自到任三月以來於營伍地方一切事宜悉心採訪有不可不漸次料理者不敢不敬竭愚衷為我皇上備陳之一軍中甲仗宜速製也兵可百年不用不可一日不備况川省三面環夷觀瞻尤當嚴肅第自平定西藏青海以來各營盔甲器械鑼鍋帳房旗幟號衣等項大半舊爛不堪且多缺額雖歷來各營未嘗不年年造報而零星置辦不過僅供出師之用臣閲看本標及城守兵丁尚且新舊不整則其餘鎮協營路不問可知臣一面行文通省將備確查各該營甲仗等項現存可用及不堪用並缺額實在數目造册申報一面與督臣嶽鍾琪面商俟報到之日量其需用緩急陸續次第修補仍當嵗底一官兵馬匹宜加意整頓也川省所産之馬原不髙大然於低小之中必期足勝甲胄臣閲看本標城守各營竟有單弱羸瘦僅堪乘騎者豈能任軍旅之用除一面飭令將辨陸續易買更換外至於馬匹牧放臣標五營及城守俱各有厰地而臣衙門亦另有一厰皆在省城附郭不逺但各厰多有低窪坑坎草種繁雜多不相宜且夏秋霪雨之後水積毒生馬匹恣飲輒易生症倒斃故營馬不往厰地牧放俱自拴槽餧養以致羸瘦臣細訪府屬歸併郫縣之崇寧地方距省城一百餘里有順河荒山一段方長可六十里在豐樂場之後山民間以其山土瘠薄皆棄而不耕臣思土瘠則草必無毒順河則水更相宜隨差把總一員帶馬五十匹前往試驗據稟一月以來馬有起色臣查附郭之厰現今民間多有侵越開墾之處兵民聚訟不休既有此荒山六十里可資牧放則附郭六厰皆可耕耘莫若將各營舊厰除左營一厰業經撥歸駐防滿兵牧放外其餘俱應退出交有司招民開墾上可稍增國賦下可永杜紛爭至於馬匹下厰牧放臣倣照八旗放馬之例每嵗派守僃一員千把二員酌帶旗隊兵丁於豐樂場後山之外搭蓋棚厰依期牧放厰地四圍皆安兵看守以臣衙門原有之厰留給存城馬匹割草餧養以期臕壯是一轉移間而附郭可無曠土營馬可望飽騰但臣愚昧之見未敢遽行睿鑒批示遵行一士卒驕奢宜潜革也查得川省兵丁自年羮堯濫賞放縱至今習氣未除故無論大小營汛馬步戰守雖家巳斷炊而衣冠鮮楚猶必求勝於人以致重利賖借日久難償甘心逃竄臣自抵任之後據各營汛具報逃兵之文逐月皆有因細加採訪始得其由隨出示標營及通省鎮協所屬委曲開導勸其恪遵定制禁穿紗緞綾羅限三月之後馬步兵丁俱改布絹服色至於僣越官制尤所當嚴臣於標員參謁之日見各營外委把總皆著補褂臣思補褂乃朝廷名器豈容督撫提鎮私意市恩然臣前到宣鎮時見宣鎮各營外委俱著補褂臣業經禁革今川省亦復僣穿臣除面諭各營併通行鎮協嚴禁不許僣穿外但臣伏思宣府四川相距甚逺而僣用名一番蠻之防範宜慎密也川省沿邉畨蠻地方磽薄所産糧食不能足半年之用歷來舊習每嵗冬十月間各處生熟畨蠻皆至省城及各府州縣城市鄉村傭工度日其名謂之下壩男婦子女合計不下數萬人必至次年三四月負戴銀米布匹牲畜等物而歸近因文武各官禁止畨蠻携帶婦女反致隻身合夥或十數人或百十人每到一州縣即分散四鄉其中癡蠢無知者固多而臣細加採訪其强悍姦頑肆行凶惡者竟復不少臣愚竊欲乘此尚未下壩之際即備將歷來傭工番蠻隻身下壩多有行凶偷竊挈伴潜逃等情通飭各處土司曉諭所屬部落嗣後下壩傭工皆必携有家屬或三五口七八口一夥者方許放進內地聽其各路傭工如係單身合夥形跡可疑者槩不許放進仍通飭內地各州縣文武員辨於畨蠻入境之時即著落保甲查其住宿之處登記數目凡伊夥內之人有犯事潜逃者即向伊夥內跟究既有家口之纍斷難一夥同逃至於婦女年二十以下十五再查畨蠻往時有夾帶軍器等物者關隘亦阻遏不容然止行禁遏追取竝不跟查盜賣之人之地尤非窮本塞源之法併祈敕下督撫嗣後如有盤獲必行跟究方可盡除夙弊統一汛守地方宜均定也臣自到任之始訪得省城之德陽仁夀兩縣一在省城北路一在省城南路黔省河西屬四川河東之土地民人皆黔省管轄而汛防辨兵則係川省分撥直至畢節縣界黔省竝無一兵凡有逃盜姦宄潜匿民間川省營兵不者歸川駐防庶責成可専而沿邉姦宄不能遁藏矣以上五條皆就臣知識所及縷悉備陳上瀆天聽不敢圖目前苟安致貽後慮庶幾仰報聖主委任封疆之至意於萬一耳為此具摺謹奏覽同日又奏為遵㫖回奏事竊臣前陛辭之日欽奉諭㫖令臣察看馬㑹伯宜文宜武佛喜言行有無相違欽此臣到川即悉心察訪馬㑹伯操守頗能謹飭聖明洞鑒臣不敢妄議至佛喜在川支放兵馬錢糧等事從無短少尅減但聞其器量褊小每以衣履細事向屬員告缺乏且䕫關稅務竟有曖昧不明則言行相違可知此案現奉欽差究審其有無實跡料難掩飾臣風聞未有確據不敢冒昧瀆陳所有奉㫖察看之處理合謹就見聞所及據實奏聞為此謹奏殊不料佛喜如此負恩種種敗露無煩訪察矣雍正五年十月十五日四川提督臣黃廷桂謹奏為遵㫖回奏事竊臣前陛辭赴任面奉諭㫖命臣察看松潘鎮臣張元佐臣抵任之後即留心採探更専差密訪查鎮臣張元佐駕馭畨蠻頗屬得宜但生長邉地聞見不廣故一切政務未能通識大體且營員辨卒多係梓里不無瞻顧更聞其為人殊多輕浮然臣仍當細心察看倘有敗檢乖張之處臣即當密摺奏聞謹遵㫖具摺先將臣所知所聞據實回奏伏祈皇上睿鑒謹奏所奏知道了倘於一切戎政尚不至大有玷缺邉隅要地宜用熟練之員曷可輕動同日又奏為據實回奏請㫖遵行事竊臣前陛辭赴任面奉諭㫖永寧副將張瑛為人以有事為榮但尚不致干參處爾到任後可加意教導欽此臣抵任之後即留心訪察至五月內據張瑛條稟永寧所屬地方界在川黔兩省營汛參錯無所責成且云蠻民歸附日久竝不剃頭其言頗覺可聽更疑其才有可用故一面具摺瀆奏一靣檄調赴省遵㫖加意教導間偶與督臣嶽鍾琪道及永寧邉界始知此事張瑛巳經摺奏督臣現在議覆而臣又冒昧具奏正深惶悚乃奉到硃批原摺䝉我皇上天恩訓諭開導復將張瑛為人諄切明示臣跪讀之下不勝感戴誠服仰見我皇上聖明洞鑒無微不照臣惟凜遵諭㫖於其進見接談之際詳慎覺察益見率妄驕矜秉性執拗迹其言行不特以有事為榮若再稍得進步必致任性僨事今准撫臣憲德咨准刑部來文內開永寧副將張瑛借到年羮堯家人魏之耀銀一千兩竝未報解應令該撫嚴查勒限催追解部併將隱匿不首職名查參咨行到臣臣行文該協據張瑛呈稱出師西藏之時奉年總督委領先鋒沿途賞賜需用尤不可少只得與魏之耀商量隨拏魏之耀銀一千兩買備紬緞等物逮至旋師之後曽回眀年總督䝉吩咐大功巳成無庸賠還等語臣除據呈并將隱匿不首職名咨行撫臣轉咨刑部外但臣伏思張瑛進藏之時既係年羮堯差委賞賜需用不敷何不稟知年羮堯而反與家僕魏之耀私相那借即魏之耀又豈肯解私囊以充軍務之費設或有此年羮堯伏罪之後亦當首明恩自上出何得隱忍不言則其存心不端益覺難逃天鑒然現經部查臣未敢更加參奏謹具摺請㫖或聽候部臣查議或另行具疏題參伏祈皇上睿鑒批示遵行謹奏業經咨部自應聽候部議事結之後再為斟酌勿因奉朕一時之諭致令抱屈如果有貽誤職守處查明具疏題參可也雍正五年十一月十一日四川提督臣黃廷桂謹奏為敬陳管見仰祈睿鑒事竊惟欲厚風俗必先教化而教化之行尤宜廣被我皇上念切民生宵旰憂勤特賜廣訓萬言周詳允當乃復頻頒聖諭剴切諄誠凡任地方之責者自應實力奉行家喻户曉庶幾遐陬僻壤皆得沐聖天子樂育之洪慈臣於十一月初四日接閲邸鈔恭誦上諭仰見我皇上聖明洞照無微不至誠如上諭向來諭㫖頒至各省者不過省㑹之地一出告示而巳而州縣各處竝未遍傳至鄉村莊堡偏僻之區則更無從知之矣欽此臣雖武辨捧讀之下殊深愧懼自兹以後每逢朔望日期恭講聖訓畢即將從前遵到上諭敬謹次第分晰逐條誨化兵丁竝嚴飭鎮協大小營汛一體遵行毋得怠忽以期上副天心但臣竊思城市居民輻輳固當不時講誦非我皇上教養萬民遐邇一體之至意臣愚以為宜將廣訓萬言竝從前奉到上諭刋版刷印著該督撫飭令各該有司就其鄉村莊堡之中選擇年髙有行素為衆民推服者各頒發一本定於每月朔望日期挨次悉心講究敬謹誨導遵行仍令該有司不時稽察母許虛應故事至嗣後頒行上諭統照前例奉到即行刋刷頒發各鄉堡漸次講習不許遺漏如此庶鄉鄙愚民皆得跪聆皇言恪遵詔誥自有以感發天良而成一道同風之盛矣臣不揣愚陋冒昧陳奏伏祈皇上睿鑒如或臣言可採即當另疏具題為此謹奏此事不必更為題奏朕歷年所頒諭㫖頗多豈能一一盡行刋刻耶因事而發者不叙明所以莫悉其由若備載原委又不勝其繁且亦無此體製但於其中選擇化民道俗之語刋布宣講或亦可為政教之一助耳同日又奏為請㫖事竊惟軍營技藝務貴専精而訓練之方尤宜畫一臣仰沐聖恩蒞任以來於軍營一切器械無不悉心講求惟是火器一項較弓矢既能及逺而制敵更覺犀利故川中歷來用兵多藉以取勝然演習之法類皆以排偶連環為事及臣親加閲看往往裝藥發火進退遲速多不合一臣細察其由如臣標鎗手一千名分𨽻五營各二百名平時既係分操故於合操之時各就其素日所習以相從遂至打放參差而連環之聲不免斷續甚至髙下失準者亦多有之臣思業必専而後精所以陕省火器另設一營専司訓練今臣標五營不敢另請設立可否即以後營一營改作總領火器之營將原領弓箭㓲刀等隊兵丁俱分歸中前左右四營管領其一切鳥鎗炮位等兵丁俱歸火器營管領教習至火器營將辨即於標屬挑選諳練火器之遊守千把調補俟其演習精熟遇有拔補千把之時亦俱於火器營中考選拔補倘拔補之後更能奮志學習弓箭亦准與各營千把總一同考驗保送如此庶將辨責成既専而鎗手亦有上進之路自當人人奮勵練習益精遇有調遣行走之處無論多寡皆以熟習之將辨分領所部熟習之兵丁其進退遲速自必俱能畫一而收輕車熟路之效於軍營似有裨益但臣愚昧之見是否可行伏祈皇上睿鑒批示為此謹奏講求武僃嶽鍾琪平日留心而川省營伍尤其素所練習與伊詳悉籌酌堪期實效何須逺煩朕之批諭耶同日又奏為據實奏明伏祈聖鑒事竊臣前摺奏省㑹地方偷竊與賭博之風未能盡絶恭奉硃批諭㫖賭博最為惡習亟應盡力查拏欽此臣隨嚴飭城守營將辨晝夜查拏自本年四月二十五日起至今十一月初十日止前後共拏獲竊賊三十一起賭犯二十五起宰殺耕牛行使假銀拐帶人口共一十二起俱遵例移交成都府通判及成都縣審理懲究發落在案臣何敢復行干預但思執法必貴嚴明源清方能流潔該營兵辨所獲各案未盡除源既不清流何能潔但此皆有司之事臣不避嫌怨巳將此意與撫臣憲德面相商酌惟期從此犯法者日少一日則上副聖心下盡臣犬馬之私理合據實奏明伏祈皇上睿鑒謹奏牧民之官果肯執法懲姦諒亦未有不畏懼者大都䙝玩之生率由日久懈弛有意縱捨所致故禁令之弗行其咎惟在不公不明而不在不嚴也夫法猶治病之藥藥取攻疾而巳過於峻利則元氣將必大傷知乎此斯知過猛之不足為貴矣同日又奏為謹據訪聞陳奏伏祈睿鑒事竊查川省建昌一路仰仗聖謨畨蠻悉歸版籍善後之䇿固在安頓得宜然尤必撫馭得人文武和衷方能使地方永享升平之福乃今事竣撤兵之後鎮臣趙儒既巳回署建昌道劉應鼎巳赴省城而建昌附近居民於十月十三日有生員王尊爵父子及十六日寡婦邢氏母子攜伴入山樵採先後被賊蠻將尊爵之子王元敬綁去邢氏之同伴二人砍傷搶去馬匹衣服又生員陳萃家牛馬被竊如此等事臣訪知未經用兵以前竟係建昌常有之事今初經𠞰撫鷹眼未能遽化所以仍敢逞凶鎮臣雖在勒緝恐猶視為泛常臣復飛咨轉飭營員務必追出被綁之人將凶蠻依法重究以期畨蠻從此知上畏王法不敢仍蹈故轍乃復聞建昌左營専汛地名大水塘向係中營馬厰撤兵未久即被賊畨三十餘人黃昏入厰搶去官馬三匹雖經看守之人即時追捕將馬匹奪回而兵丁帶傷二人幸皆平復賊畨至今竝未拏獲一人似此放縱若不嚴加懲創何以革其頑心乃鎮臣趙儒亦止照常飭行查捕竝未督勒追擒未免示番民以懦軟非所以彈壓新附邉荒者也臣除専差飛檄嚴飭鎮屬標員勒限跟追搶馬凶畨解究外事關搶奪營馬不敢不據實將綁竊等事以及鎮臣懦弱之處一併具摺奏聞伏祈皇上睿鑒謹奏覽奏巳悉新附地方苗情尚未全馴善後事宜甚屬緊要其竭力整理務期底於安靜諸如此類事件絲毫不可隱諱必以上聞同日又奏為奏明事竊查川省蠻民下壩一事臣前巳繕摺瀆奏凜奉硃批訓㫖隨密商督臣嶽鍾琪除作何安頓又復密行咨商俟其覆到酌行外至於今嵗下壩者如有滋事之處巳與嶽鍾琪面議當以法懲治撫臣憲德亦共相酌定今於本年十月二十八日成都郊外源通橋地方有蠻民數人刀傷成都縣里長被撫標兵丁拏獲現在發審十一月初三日成都東市大街有蠻民三人白晝搶奪帽鋪被城守營兵丁當時擒獲臣隨面商撫臣於本月十一日按法究治矣但臣思城都省㑹蠻民尚敢如此肆行則偏營於城內各巷口派設堆棚三十座每棚撥兵六名専司巡緝更另派救火兵每營各二十名給以野之地倣照京營巡捕之法専交城守營派兵分緝倘有疏虞皆該營専責復與撫臣憲德面商而撫臣亦於伊所屬標下撥兵添設堆棚十二處以資巡防此等細事本不敢瑣瀆聖聰但臣賦性愚昧於所行之事未識允協理合恭摺奏聞伏祈皇上睿鑒謹奏此奏朕欣悅覽焉同日又奏為奏聞事雍正五年十一月初八日准川北鎮臣張成隆咨報本年十一月初二日有順慶府所屬儀隴縣民一百餘人扯白旗一面上書難民字樣來至保寧府城東門外控告該縣知縣鎮臣張成隆委守僃周逹前往勸諭各回本業訖等情咨報到臣該臣竊思如果知縣貪劣上司自有訪聞即或有寃亦當赴上司陳告何得扯旗聚衆自干法律除一面據文移咨撫臣憲德併咨報督臣嶽鍾琪一面咨覆鎮臣張成隆密查此項民人雖巳散去但在伊本縣如係匪類結黨有圍衙逼官及勒索鄉民盤費口糧等事即將為首之人協同文員拏交有司聽撫臣憲德查審外所有據報儀隴縣民扯旗聚衆緣由合先具摺奏聞伏祈睿鑒謹奏此種刁悍之風甚屬藐法𫝊諭憲德於拏獲之日按律究治以示懲創毋得稍涉寬縱雍正六年二月十五日四川提督臣黃廷桂謹奏為請㫖設立義學以廣皇仁事竊惟軍營首重武備而文事亦難偏廢臣自抵任以來每見各營僃辨以及現在兵丁人材弓馬雖有可觀然於兵馬錢糧册籍皆假手書吏多有不能親身查對者揆厥所由皆因自幼無力延師安於魯鈍者固有其怠忽因循不肯學業者亦復不少臣沐聖恩超遷重寄凡可以鼓勵軍營之事臣敢不據實恭陳冀邀恩鑒請將臣標五營及城守兩營共設義學四處選擇本地老成力學之士延請為師専司訓誨凡係兵丁子弟如有情願上進習學文藝者一體入學讀書其每年雇賃學舍節禮修金以及茶水等項四處約需銀一百餘兩因查得臣衙門原有曠廢教場一塊業經有司招民開墾按年交納租榖俱為成都府縣徵收充為公用歷有年所臣隨咨商撫臣而撫臣憲德查明照舊歸臣衙門臣復委員查看所交租榖一年可得四百餘石請將此項租榖變價以充每嵗義學之需倘有餘剩銀兩即充公用如䝉天恩俞允臣當宣布皇仁親加鼓舞竝嚴飭各將備實力遵行務期兵丁子弟踴躍上進均沾實惠如有混入義學虛應故事者立即斥出但事關設立義學臣未敢擅専是否允協伏祈皇上睿鑒批示遵行謹奏義學一事各省提鎮及駐防將軍等往往以此奏請朕俱未准行從來文武竝為國家器用不可偏有重輕汝意専以崇文為善舉歟子弟讀書一道非魯鈍者所能須俊秀者方可夫以少年聰穎之資既習禮儀稍通文墨猶思荷戈執殳甘為前驅乎勢必漸染日久胥皆流為怯懦將來俊秀者咸不願為兵而亦不能為兵矣營伍中所餘無非魯鈍一流欲求干城之選豈可得哉是非興文之良䇿實乃廢武之岐途譬猶驅鄉孰生童教習櫓盾徒誤其文而巳武亦終莫能就也似此邀虛名而無實益之舉將焉用之至云營伍錢糧册籍乏人查對等語因此之故而令闔營俊秀子弟皆至文武兩俱廢棄詎不更謬凡事但宜隨地隨時斟酌損益期於辦理無誤則巳何必思及分外創新立異始為美政耶同日又奏為奏明事竊臣前摺奏建南被虜之王元敬及所搶衣馬等物准鎮臣趙儒咨稱先後俱經追出獨各案畨蠻逺揚未獲臣仍嚴飭標員并該管各土司加緊屣緝務獲去後兹於本年二月十三日接督臣嶽鍾琪疏稿始知巳將洮岷協副將王剛奏明調赴建昌協同趙儒辦理臣查王剛上年進𠞰三渡水等處頗著勤勞此畨自必益加奮勉諒能實力奉行臣欽承慈訓敢不敬慎料理以供臣職俟王剛到川之日臣當細心商酌併令與鎮臣和衷辦理務期布置得宜邉方攸賴上報天恩下盡臣犬馬之私再附近裏塘一帶地方夷人素行劫奪擾害畨民臣經疊次差員化誨乃上年臣標千總范義奉督臣嶽鍾琪委令齎敕進藏據稟於本年正月初一日行至蘫泥壩陡遇賊蠻百十餘人搶去紬緞銀兩等物千總恐誤日期隨於初三日起身赴藏所失等項裏塘營官照數賠還等因稟報前來臣思畨蠻如此放縱若不嚴加懲創示以國法誠恐沿邉土司俱皆效尤則邉境何由寧謐故一面飭令化林副將楊大立嚴行查追一面専差密商督臣而督臣嶽鍾琪謂畨蠻聚衆搶劫差員法難姑縱當具摺㑹奏請㫖俟出師後即斟酌調遣附近等處蠻兵併量派官兵督催以蠻攻蠻分路擒𠞰等語臣除復致書督臣聨銜奏請外合併奏聞伏祈皇上睿鑒謹奏邉徼地方番蠻故習一時何能驟靖逐漸整理行自斂迹矣隱諱姑容養姦貽患萬不可者同日又奏為奏明事竊臣前奏改設火器營一摺欽遵硃批即密商於督臣而督臣嶽鍾琪以為操演之法不在營兵之分合而在號令之嚴明如果號令畫一則彼此整肅自不慮其參差况千把等員例無本營拔補而將辨等官又非盡由本營補授倘有升遷去者不能再留來者豈皆熟悉火器是猶未能畫一也再查各鎮協營皆有鎗手若本標將火器統立一營其餘鎮協亦當另立未免更張多費周専汛將辨協同文職現在陸續拏赴省城監禁質審復通飭鎮協營路嚴加巡防若遇此等聚衆刁民即㑹同有司查明嚴拏毋得疏縱干咎在案兹於本年二月初二日撫臣憲德向臣面商欲臣轉聖主懷逺安邉之至意理合一併奏明伏祈皇上睿鑒謹奏覽雍正六年三月初十日四川提督臣黃廷桂謹奏為奏聞事竊臣於本年三月初四初八等日先後據永寧協副將張瑛遵義協副將張玉稟稱烏䝉米貼地方蠻夷將雲南駐劄官兵殺傷等語臣隨疊次飛檄永寧遵義兩處將僃凡係接連烏䝉各隘口務必加緊防範協力堵截如遇賊夷偷越即相機追擒勿致疏虞干咎更致書督臣嶽鍾琪去後復於初九日戌時接准貴州提臣楊天縱咨稱希即調遣官兵堵禦㑹𠞰等因到臣臣查烏䝉米貼等處不獨附近永寧遙連遵義其後路不數日即逹涼山此地尤關緊要當即飛咨建昌鎮臣趙儒嚴飭各該汛將辨善為約束竭力彈壓併將要隘路口加派辨目不時巡查堵截如雲貴督臣酌定地方㑹定日期調兵擒𠞰檄文到日即將駐防建昌之提標兵四百名木坪土兵四百名就近酌委幹員統領進𠞰聽候雲督調度其遵義一路雖去夷窠稍逺然界址既相聨絡臣亦飭令該協量僃官兵以資聲援至於永寧汛防遼濶如馬邉建武諸營在在逼近烏夷實為要地臣隨飛檄該協先派步兵五百名飭令建武營遊擊許綿鍞統領在於永寧烏䝉各緊相接壤之所駐劄小心堵截應援以憑雲督調遣㑹𠞰復嚴飭督率所屬僃辨加意巡防合力查拏再查重慶鎮屬貼近永寧臣亦咨行鎮臣任國榮速將官兵簡閲整頓以聽檄調㑹𠞰而臣標亦酌派官兵僃用其一切事宜復與撫臣憲德面商據稱應用軍需糧務均照冕山出兵之例現在僃辦臨期支給臣隨専差星馳僃商督臣嶽鍾琪計程往返約需十三日俟督臣覆到之日臣所派各處兵丁及一切䭾馬軍裝等項俱巳預僃停妥彼時應作何派遣㑹𠞰之處督臣自有斟酌臣即行遵照調發斷不敢稍有遲誤上厪天心除將貴州提臣楊天縱來文恭録進呈御覽臣謹㑹同撫臣憲德合詞奏聞伏祈皇上睿鑒謹奏覽一切預僃機宜巳屬妥協雖然寧使僃而不用毋致用而不備此外應更選派兵丁一二千名聽候鄂爾泰調遣可也雍正六年四月二十一日四川提督臣黃廷桂謹奏為恭謝天恩事竊臣淺陋無識荷䝉聖慈鑒宥自宣鎮以至今職無事不諄切誡諭反覆提撕則臣之仰承訓示者巳非一日乃臣猶木石為心徒以一時之褊見罔計所關之甚巨上瀆宸聰臣咎何辭又䝉天心仁恕不即譴責復加誨導臣敬捧跪讀悚然覺悟恐懼涕零自兹以後惟有凜遵諭㫖早夜捫心隨時隨地竭力辦理不敢思及分外創新立異臣謹悉心商酌仍當據實奏明懇恩批示庶臣得所遵循不致終身迷惑則臣將來竭蹶圖報之日皆我皇上始終生全誨化之天恩也臣不勝感激悚惶之至理合繕摺奏謝伏祈皇上睿鑒謹奏勉之勉之凡人但於清晨出門舉頭看天抵暮就寢以手捫心如此早夜弗懈則一生之能事畢矣其餘榮辱得失悉聽神明默主何必鰓鰓卜度於其間哉要將徼福畏禍是非毁譽之念置之度外本之以誠矢之以公行巳無慚內省不歉將見根之茂者其實遂膏之沃者其光華動靜云為安往而不亨吉也此諭當奉以終身竭力勉之雍正六年七月初四日四川提督臣黃廷桂謹奏為欽奉上諭事雍正六年七月初一日准川陕總督臣嶽鍾琪咨開六月二十五日准兵部咨稱雍正六年六月十五日內閣鈔出奉上諭據嶽鍾琪黃廷桂奏稱米貼逆夷陸氏巳經擒獲餘黨搜捕指日可竣其四川雷波土司楊明義從前私遣部落幫助陸氏今又劫奪糧運傷害兵丁竝誘結附近結覺阿路阿照平底等處苗蠻聚衆妄行罪惡顯著再吞都千户德昌私助陸氏土兵與官兵公然對敵甚為狂悖均屬不法應請用兵𠞰除以安輯苗地等語烏䝉等處凶苗抗拒官兵該督等遣兵進𠞰今巳悉就擒獲而楊明義等當陸氏潜匿之時輒敢朋比隱藏今又劫糧聚衆誠為法所難宥但用兵關係緊要必須武職大臣統轄方為妥協著提督黃廷桂即帶領㑹𠞰米貼漢土官兵檄委將辨㑹期前往仍飭副將張瑛嚴行防範相機擒𠞰著總兵張耀祖帶領滇黔官兵分路堵截使賊苗四面受敵勿致竄逸著總督嶽鍾琪雲南總督鄂爾泰飭總兵趙儒於涼山相通阿路各處嚴加防範再飭總兵張耀祖於各要路委辨巡緝遇有逃逆即行擒解黃廷桂著賞銀五千兩張耀祖著賞銀五千兩為二人行軍賞賜之用俱於四川司庫內動用支給此畨用兵係川省地方之事進退機宜著張耀祖等聽黃廷桂節制調遣特諭欽此等因到臣臣謹擬於本月初六日起程前赴雷波除另疏題報外竊查雷波阿照阿路結覺平底噶哈等處凶夷相繼悖叛雖係姻黨相連居址參錯易於潜通然結覺平底噶哈所轄畨部僅計數百蠻户惟雷波阿照阿路恃其地廣蠻稠恣意跳梁故楊明義潜逃回巢其部落傷兵綁差之後而阿照阿路即煽誘夷類串通結覺平底等逆殺兵截糧是雷波阿照阿路實首惡巨魁而結覺平底等土蠻皆附從賊黨也且自雷波以至結覺廣袤將及千里若不分别夷勢輕重先後逐漸整頓誠恐箐密山深路徑繁多勢難兼顧不無可虞是以臣先據建昌鎮臣趙儒致書內稱兹據遊擊沈國卿具稟結覺初被阿照煽惑遂有阻糧傷兵之舉今情願捉獻米貼惡目屋基母雞則是結覺似可網開一面惟十餘名雖被阿照等逆煽誘所致其實逆惡深重大集則沈國卿等所領建昌一路㑹𠞰之兵深入山險後無接應未免可虞况涼山諸夷潜蓄邪謀倘乘間生釁難保萬全不便令其輕進臣隨密飭該將等相機權且准其投獻屋基母雞竝將現在綁去兵丁追出再攻打噶哈畢即退至附近之覺覺地方催䟎糧石休息士馬收拾器械俟續調漢顧之虞業將此段情節寄知督臣嶽鍾琪矣今欽奉皇上睿慮精詳至周至當臣等謹遵聖謨仰仗緣由一併繕摺奏聞伏祈皇上睿鑒謹奏覽同日又奏為恭請聖訓以便遵行事竊臣知識短淺仰荷慈鑒受事以來疊加誨諭臣乃得以兢兢自勉兹值凶畨悖逆干犯國典復䝉我皇上隆恩俾臣效力行間臣自揣何人膺兹重寄敢不殫厥心力益圖報效但軍旅大事關係非輕據臣駑鈍所及即使詳慎辦理斷難有當臣撫心自問恐懼實深惟有仰懇天恩俯鑒臣愚指示方略俾臣有所遵循得以綏靖苗方使之永逺寧謐以上副聖主奠安邉境之至意謹奏惟以忠誠二字感格神明則所向必克所作皆成運籌決勝豈可徒恃兵威要須合一是字對越天地諸凡莫不協吉矣務廣大信大仁勿施小術小智此為用兵之本朕所深知者至於攻圍之要𠞰撫之宜地方之情形將辨之材技在汝相機調度朕不能一一訓諭也勉之雍正六年九月十八日四川提督臣黃廷桂謹奏為仰賴聖謨恭報捷音事竊臣自雷波起營於八月二十九日即抵谷堆隨據遊擊許連科沈國卿王安民等先後稟稱訊據所獲夷猓俱供首惡楊明義現在拉密地方糾衆守險距杵腳天喜哈都魯等處均有二三日路程等語當即分遣遊擊許連科沈國卿帶兵從哈都魯前進遊擊鄂世威統兵自杵腳前進守備王勇率兵自天喜前進連夜兼程併力直搗拉密臣復尾至附近拉密之松溪一帶不時督催䇿應兹於本月十七日據遊擊許連科等連名申報職等奉令緝捕首惡途次雙腦箐口賊蠻依山創立木城拒敵職等督令官兵攻擊一晝夜打破賊復沿途接戰俱被官兵擊敗追至拉密職等見山大箐密竝無路徑首惡易於潜藏隨派兵先將各處要隘截斷更率兵步進攢入深林沿山沿箐窮搜凡遇賊蠻悉行擒斬乃於十五日在拉密隔河後山崖洞之內將拉密凶目魯底殺死其首惡楊明義亦即於十六日早擒獲應行解赴大營等因到臣臣隨羈禁行營委員嚴加看守但臣於未獲楊明義之先即密探得結覺凶番見雷波等逆被𠞰自知不免現在招誘阿照阿路各處逸賊糾聚甚衆凡係進兵道路俱預先截斷擺立擂石意與官兵拒敵今首惡楊明義既於拉密就縳查拉密兵行不過數日即逹結覺自應即行𠞰滅以彰國法臣謹親率官兵與肅州鎮臣王剛分路前進㑹期於本月二十六日齊至結覺山頂四路合攻復飛咨建昌鎮臣趙儒於平底等處分兵堵截不容兔脫俟臣整頓結覺之後應作何分兵𠞰撫餘黨及掃除確里密等處賊夷臣更另為具奏再臣先據沙氏供稱從前雷波造謀糾衆殺兵綁差皆係卑租為首等語似此則卑租實屬不法之渠魁斷難疏縱臣隨遣遊擊張朝良帶領辨兵搜捕巳於本月初七日在得磨加各箐內拏獲其助逆惡目業姑物租等亦各先後被擒至各路官兵進𠞰所至之處臣查驗斬獲甚衆官兵仰仗天威均獲平穩合并奏聞伏祈睿鑒謹奏據奏首惡渠魁陸續被擒朕嘉悅覽焉𠞰撫餘孽勿涉輕率詳慎為之雍正六年十月初五日四川提督臣黃廷桂謹奏為仰賴聖謨恭報捷音事竊臣前將擒獲首惡楊明義及㑹期進攻結覺各緣由業經繕摺奏明臣隨於二十六日與肅州鎮臣王剛率兵各集結覺山頂臣相度形勢周圍約有二百餘里其中山峰矗立懸岩深箐所在皆是然各山緊要路口臣先巳派兵嚴密把截而建昌鎮臣趙儒亦親身統兵將上下河口守住臣於次早督催官兵分五路攻入賊蠻憑恃木城沿途拒守悉被官兵擊敗直抵夷窠賊首雙尺先期遁匿臣令嚴訊所獲蠻猓據供雙尺現在結覺老箐之後地名仙人山聚衆守險而遊擊許連科同守僃王勇率領辨兵跟追臣復尾進䇿應行抵半山即雪霧迷漫不辨路徑恍見賊蠻盤踞山巔施放矢石阻遏拒敵臣飭令遊擊許連科守僃王勇督兵分兩翼奮勇爬岩仰攻三晝夜克取仙人山弋獲甚衆其賊首雙尺由岩邉滚入深溝攢箐潜藏臣令嚴訊蠻猓據供溝內一路可通阿車撥卧髙山一路可通網兜橋河口查阿車撥卧臣於未經進攻之先巳調遊擊鄂世威統兵駐劄堵截隨飛檄該遊擊於要隘處所晝夜查拏即派兵從阿車撥卧山岩搜入溝內兩頭官兵合力緝捕乃於初四日更餘據遊擊鄂世威許連科守僃王勇等報稱在岩坎密林之內搜遇賊首雙尺隨帶夷猓仍敢拒敵被官兵圍住射傷迎面小腹伊復拔刀拒捕又被官兵戳傷大腿面及刀傷兩膀跌倒被擒緣受傷甚重逾時殞命應即梟首解赴大營等因到臣臣思賊首雖擒其西北一面叢箐山洞之中餘黨潜伏尚多今仍應遣兵入箐窮搜更飭各處把截路口辨兵愈加嚴密毋許疏懈務期凶畨悉皆擒斬以昭國法所有𠞰除結覺賊蠻緣由理合繕摺奏報伏祈睿鑒謹奏覽奏斬獲情形何啻獵人弋捕禽獸倘兵退之後仍復如故則將如之何亦豈有盡行殺戮不留噍類之理乎恐結恨愈深抗頑益固內地黎庶將來受害無巳時矣朕甚憂之當詳思善於措置之道為要同日又奏為奏聞事雍正六年十月初二日三更時據建昌鎮臣趙儒赴營面語據建昌聽差熟夷磨車供稱小的奉差至拖科拖覺囉阿乃阿都四處催夫運糧先至阿乃家催夫二十五日轉至阿都布特地方遇見相連阿驢地方地名易麼住的黑骨頭兩箇一箇叫阿必一箇叫加樂來布特勾約阿都土司聚姑阿必二人說今雲南官兵被阿驢的人巳傷了好些搶下多少東西我們二人到阿驢家討帳得兩箇人如今約你同我們去幫阿驢有阿都土司向二人說這事萬作不得天在頭上有阿都土司婦人聞聽就大罵阿必加樂二人又聽得阿必二人向阿都土司聚姑說前雲南官兵去時派夫一百名阿驢官親帶送至郎簡者地方雲南官兵將夫子一百名并阿驢土官拴住阿驢土官的娘急了才調郎簡者夷人串同隨雲南官兵來阿支瓦薩二枝夷兵併附近阿驢地方一吽奈結業易麼夷人幫助阿驢乘夜將雲南官兵圍住傷了許多有營盤三箇不見了兩箇止有一箇今現被蠻人圍住郎簡者一吽奈阿支瓦薩四枝俱係雲南管的易麼結業是四川管的阿必二人又說將金沙江索橋船隻都被蠻人砍了等語臣聞之不勝駭異竊思臣於八月二十八日未抵谷堆之先途次欽奉上諭緣彼時各路進𠞰官兵尚未㑹合道路不通不知滇黔官兵渡江與否臣即遵㫖將欽奉上諭緣由飛咨鶴麗鎮臣張耀祖及雲貴督臣鄂爾泰在案及臣巳抵松溪又移駐魚紅乃於九月十五日據尋霑營參將哈元生專差畢赤營把總胡亮持文具報於九月初六日巳至阿驢交界阿路嗎地方駐劄且稱沿途經過阿驢等處俱係該將年前奉委𠞰撫烏䝉招安夷猓無不匍匐歸誠該將仍賞給花紅牛酒更稱江水泛漲難於挽運伏祈催督糧運暫為接濟等因到臣臣隨一面檄行該將迅即撤回一面嚴催建昌糧務寧逺府知府杜士秀速運軍糈赴該將行營接濟嗣於九月二十五日據尋霑營參將哈元生報稱於二十一日辰時率兵自阿驢交界起營撤回復據寧逺府知府杜士秀稟稱業經撥運口糧前往參將哈元生行營接濟各等因到臣則是該將巳經撤回且所帶官兵二千餘員名兵勢甚衆何致突生意外但既稱該將等被困自應即行救援臣經派遣官兵七百餘員名飭遊擊潘光燦張朝良統領裹糧於初三日黎明由沙罵下方兼程探聽前往復將現在附近搜𠞰結覺之漢土官兵酌撤八百名飭遊擊沈國卿帶領隨肅州鎮臣王剛於初四日尾進䇿應臣更面語鎮臣一路小心差探俟探明回報之日臣再即行馳奏至所稱幫兵之易麼結業凶畨係四川所管臣面語建昌鎮臣趙儒密查去訖統俟查覆之日一併奏聞臣除將此段情節飛咨雲貴督臣及鶴麗鎮臣烏䝉鎮臣外理合奏明伏祈聖鑒謹奏朕料此事或恐未確汝等分兵䇿應亦所當然但思逆苗冥頑無識睯不畏死大兵一臨則抱頭鼠竄王師甫退仍肆行劫殺怙終不悛莫此為甚必如何措置方為一勞永逸之䇿當悉心籌畫不可輕率從事其中情僞尤不可絲毫隱諱勉為之雍正六年十月十三日四川提督臣黃廷桂謹奏為奏明事竊查雷波阿照結覺等逆恃其山險勾連不法臣奉命統兵𠞰除惡夷仰荷廟算臣於未抵馬湖之前德昌即被擒獲復自八月十二等曰進𠞰以來首惡楊明義渠魁卑租相繼就縳其結覺賊首雙尺亦尋被戮統計斬殺凶番將里密等處原屬德昌枝夷其確里密頭人女枯係動手殺傷雲南官兵要犯臣於得磨加各箐內搜獲業經解交滇省而吞姑力等處惡夷曽將漢民朱三掠買為奴不肯獻出復擺立擂石意在抗敵悉難寬宥查黃螂海腦壩箐口牛吃水雷波諸處地險箐深統應留兵駐防約需兵一千五百名方資彈壓臣更加派兵丁五百名委遊擊鄂世威統領前赴雷波交遵義協副將張玉就近督催分路攻打確里密等處俟底定後仍飭遵義協副將張玉於黃螂雷波一帶留兵一千五百名分布小心駐劄防範其餘沿途留守官兵臣現在檄撤回營以便併力剪除阿驢惟是阿驢拖科覺厄阿都諸畨結黨恃衆不法而阿都尤稱强悍其所屬部落即散處涼山半壁將來掃除諸夷必須分路合攻使賊苗四面受敵方合機宜仍當步步留兵防護糧運乃無後慮計臣原帶進𠞰官兵八千餘名除交遵義協副將張玉統領官兵二千名再駐防吞都及建昌一路安臺隨運併抱病之兵外實有兵五千餘名似覺不足調遣臣謹専差就近將建昌所屬之瓜别等處土兵檄調一千五百名馳赴軍前聽用計程往返約需三十餘日此時臣謹擬㑹同滇黔官兵先將阿驢拖科覺厄賊蠻約期迅即𠞰除俟料理巳竣彼時臣所調瓜别等處土兵齊集再相機分布合勢整頓阿都庶無兼顧之虞但阿都族類雄長諸畨素行㸃傲今既同惡作姦豈肯安然以處臣巳派遣官兵四百名先至覺覺地方防其滋事併議建昌鎮臣趙儒統兵速赴竹核撫綏附近一帶番蠻兼以好語羈縻阿都使之觀望住牧以便先𠞰阿驢拖科覺厄逆夷謹繕摺奏聞伏祈睿鑒謹奏布置甚屬允協嘉悅覽焉諸凡總宜慎重毋得稍涉疏略即如哈元生豈非輕忽之所致耶觀逆苗情狀如惡獸然善後之䇿與張耀祖王剛哈元生等悉心籌畫其間脫有不得巳之情一一據實奏請毋得絲毫隱飾至於煽誘愚苗肆行不法之漢姦輩最為可惡當嚴緝究懲勿令漏網值此隆冬兵辨觸冒霜雪戮力行間朕心深為惻然其加意拊循以副朕體恤之意雍正六年十二月十六日四川提督臣黃廷桂謹奏為仰賴聖謨苗方底定恭報大捷事竊臣前將派兵委遵義協副將張玉統領進攻確里密等處情由曽經具摺奏明兹據該協報稱卑職奉令先遣黃螂土司國保之弟木姑持旗招諭往返數次無如惡夷頑梗不從乃派調官兵督勵進攻連破九硐其凶目利耶巳被鎗炮擊死追出雲南援𠞰右協兵丁一名董朝相併漢民陳國良楊么等其餘蠻苗俱巳誨化安插回業等因到臣臣查番蠻跳梁滋事固宜嚴加懲創而其中如有稍知順逆不敢為非者尤當仰體聖主好生之德撫慰安輯俾惡者知警而善者益勸查阿路夷類阿路係其總名中間枝派繁雜除附近結覺住居之阿路賊蠻魯佩與結覺賊首雙尺既係姻親又許幫兵助惡業經緝獲解交撫臣憲德收審其餘阿路番部皆係無辜靡不匍匐投降懇請願為天朝百姓臣察其誠切俱仰體皇仁賞賚安插示以生全之恩鼓其維新之氣併將先前藏匿山箐被獲之各枝番蠻婦稚四百餘名口給回完聚及臣撤赴竹核俟肅州鎮臣王剛與鶴麗鎮臣張耀祖㑹同約期之際復就近將阿路密坡罵家等夷調至臣營宣布國威彰明禁約因其蠻俗使之打狗鑽牛歃血盟誓不敢為非取有各枝永逺無事木刻甘結今確里密等處業巳𠞰定而雷波阿照一帶苗民又經招出其伙頭等齊集臣營投見臣重賞開導曉以禍福亦令其鑽牛盟誓刻立木信慰遣回巢統計前後招撫夷猓共一千五百九十六户現俱隨地安插住牧訖所有雷波一案軍務巳竣臣除移咨督臣嶽鍾琪題報外合先繕摺奏聞伏祈聖鑒謹奏覽奏俱悉前諭汝等籌畫善後事宜最為要務其更加詳思審計具奏以聞同日又奏為奏聞事伏查番蠻蠢頑無知竟敢擅行滋事實多由於漢姦騙誘唆使之所致蓋蠻方多不産鹽即偶有産鹽之區苗民不知煎熬每苦淡食其所衣粗細布匹亦未能紡織故鹽布二項往往仰資於內地乃不法之劣襟土棍利其所有恣意愚弄先以甘言誑惑與之結好始尚公平交易繼則託言熟識暫爾賖借日積月纍終不與值蠻人索討前缺非避匿不見即肆口橫誣反遭毒打以致蠻人屈抑莫可誰何遂憤悶不平伏路要截甚至土棍習熟夷路改扮夷糚私行夷地揑言聳動射取財物一時蠻類訛𫝊騷擾不寧種種不法難以悉數誠如上諭漢姦輩最為可惡臣前在結覺正在查追沙罵下方漢民之際突有姦徒賈榮乘運糧之便走入沙罵謡言恐嚇追出漢民大兵就要來𠞰沙罵等語致蠻人聞風驚擾惶懼弗寧而漢姦李昆乘勢遂詐沙罵夷目銀一兩蠻小子一口臣比即訪聞鎖鈕至營公同沙罵夷目質對俯首無辭隨以軍法重處追還所詐銀物更飭交寧逺府知府杜士秀帶赴竹核枷責示衆竊思此輩漢姦不過貪圖蠻人財物肆其姦狡踵習成風建南尤甚若不嚴究重懲積惡何以頓除臣凜奉諭㫖森嚴敢不益加留心密訪查拏一面奏聞一面移交有司照例治罪庶幾除一警百而邉方無啓釁之端小民得以享寧謐之福也理合繕摺具奏伏祈睿鑒謹奏似此希圖小利非主謀唆使可比自又當一論也至若不逞之徒或深潜苗窟或乘機逺逸俱未可定當詳加搜查毋致疏漏硃批諭㫖卷二百十八上欽定四庫全書硃批諭㫖卷二百十八下硃批黃廷桂奏摺雍正七年正月初八日四川提督臣黃廷桂謹奏為分𠞰逆蠻仰仗天威擒獲賊首恭報大捷事竊臣於雍正六年十一月內派遣官兵進攻阿都之阿不羅曽經繕摺奏明隨於十一月十四十五等日各路官兵先後㑹合拖腳底臣當即分兵二千名交肅州鎮臣王剛督令攻打阿不羅臣駐劄拖腳底總口為之聲援䇿應嗣於本月二十三日准鎮臣王剛咨稱巳將阿不羅攻開連日嚴搜其拉金阿必加樂覺過等犯并無蹤跡等因到臣臣思賊蠻姦狡異常或聞大兵進攻阿不羅諸犯仍復各返故穴藏匿亦未可定且詢據阿都土目聚姑供稱阿都番部悉皆害怕俱情願出降等語臣隨將王剛檄撤回營派兵二千名交建昌鎮臣趙儒統率駐阿都之布特地方乘機招撫諸苗併設法誘擒阿必别哺加樂二犯臣更派遣官兵一千二百名飭遊擊沈國卿帶領前赴拖科誘擒賊首覺過併招撫餘苗以分其勢臣與王剛帶兵於十一月二十七日撤至紐姑適中之地駐劄應援隨於十二月初八日准鎮臣趙儒咨稱於十二月初一初二等日將各枝逺近蠻人招撫俱赴本鎮行營投見本鎮面加開導衆夷省悟感激打狗鑽皮盟誓嗣後不敢滋事情願尋獻阿必别哺加樂本鎮復加曉諭各夷歡欣分頭去訖於本月初六初七等日果將阿必别哺加樂并阿必之子迫脅來營本鎮訊明確實立即擒縳於初八日専差押解等因到臣而趙儒亦於是日撤赴臣營臣等隨於次日欽遵諭㫖齊赴阿驢拖科適中處所與鶴麗鎮臣張耀祖及參將哈元生公同㑹議併將所獲阿必等犯交明張耀祖收禁訖而賊首覺過終負固遁匿不出臣議留王剛駐劄拖科督兵嚴拏務期必獲臣於十二月二十三日同趙儒仍回紐姑彈壓新附一帶番猓兹於本年正月初六日准鎮臣王剛咨稱本鎮督勵官兵晝夜窮搜於正月初五日將賊首覺過圍住凶畨仍敢拒捕被官兵奮勇向前擊斬蠻賊子弟二人立將覺過砍倒擒縳因受傷甚重隨於次日殞命應即梟首解報等因到臣臣查野蠻頑梗跳梁仰賴天威逺臨渠魁次第就縳其阿都無辜餘苗臣等宣布皇仁巳皆安插惟拖科覺過被獲伏辜地方乏人管理天威案內奏請安設營汛防範周密惟西溪地方東連利厄南距披砂路通阿都畨蠻出沒不常止有建二百名即令左營守備帶領添防西溪暫資彈壓其餘鎮協漢土官兵俱於正月初十日分撤回汛臣亦於是日起營回署除移咨督臣嶽鍾琪具題外合先一併繕摺奏聞伏祈聖鑒謹奏此番底定之功仰荷上天垂庇聖祖錫祐兼賴汝等提鎮大臣及將辨兵丁胥能效忠奮勇之所致也朕深為嘉悅具題到日有㫖同日又奏為敬陳苗疆地方情形仰祈睿鑒事竊臣荷䝉皇上天恩委以軍旅重任凡係攻山克洞進𠞰經由之地近則相度形勢臣必親勵官兵逺則遣將先行臣即尾後䇿應所有一切道里險塞苗情悍惡臣既得諸目擊復查詢確切謹據實縷書恭陳天聽查黃螂貼近內地介在石角雷波之間金江環繞儼然要衝過此則箐口雷波即惡司楊明義住牧之所也襟山帶河頗據形勢與米貼井底吞都數處僅隔一江夷類往往越江連姻故江外有事而江內煽動不無藏姦匿叛之弊由千萬貫以下至谷堆天喜哈都魯魚紅一帶皆雷波部夷阿照巢穴地廣蠻稠四圍層山密箐茫無涯際其右則遙通馬邉營汛接壤大赤口諸夷其左則相連陸氏隔江管轄之噶哈百足惟結覺僻處一方山勢竒險乃涼山第一奧區緊靠沙罵界連平抵而阿路阿蘇密波諸蠻復與阿照犬牙錯處直逹竹核臣於竹核周覽形勢遍詢土蠻始知竹核距建昌尚有三百餘里東通沙罵膩乃東南通拖科拖腳罵黑西南通覺厄阿都阿乃披砂一帶西通阿史利厄河東河西北通普雄上丁沈渣老虎各種夷類萬番出沒誠係四通之區及進抵阿都其地廣濶約計方圓二千餘里族屬繁衍畜牧蕃庶逺勝諸苗故涼山部落最强首稱阿都次乃阿照沙罵阿史沈渣利厄餘不過瓜分派别之枝夷也然種類雖雜其飲食服物性情好尚亦各約略相同總緣棲止山窟從古未沾聲教以苦􅘹為食以氊衫為衣垢面蓬頭不類人形且滚箐爬崖是其長技出入必佩刀自衛一語不合一事反目即兩相劫殺非蠻婦從中解忿仇復終無了期未嘗不刀耕火種墾田食力苟偷盜綁掠有利可圖不難一呼齊集挺刃爭先其土官與黑骨頭等名雖主僕實各司其人互相雄長又同坐共食毫無上下之分平居似屬漠然一遇土官有事則必糾合姻婭攢議張尤屬狂誕臣受恩深重職任邉疆經歷涼山目擊番情蠢悍措置匪易敢不時刻留心詳求其可以轉移之機徐議夫整飭化導之方蓋苗雖冥頑亦因隔絶漢境不聞禮義不知法令若究其本心未有不願趨吉避凶轉禍為福者今雷波阿都等逆踵行恣肆仰賴宸謨指示渠魁悉皆就縳無辜得以安插其出窟投降苗民臣每親身接見開誠誨諭則經此一番懲創之後自爾知所鑒戒稍斂邪心再勘明沿邉衝要重地設營控制防其蠢動撫綏得人駕馭有方縱其鼠竊狗偷未能驟期禁絶而日漸月摩久自相安於無事但一切善後事宜關係重大臣知識短淺何敢冒昧輕率容臣熟思集議悉心籌畫更與督臣嶽鍾琪撫臣憲德㑹商酌定再為請㫖遵行理合先將地方情形繕摺奏聞伏祈皇上睿鑒謹奏番俗苗情厯厯如繪絲毫無隱朕甚嘉之惟善後一著最為要務殫心竭力共相籌酌必得良䇿庶冀永寧雍正七年二月二十四日四川提督臣黃廷桂謹奏為奏聞事竊臣前自紐姑撤兵回署於正月十四日途次准督臣嶽鍾琪咨開奉上諭據嶽鍾琪奏稱逹賴喇嘛自藏起程明年二月初可至裏塘此地原有喇嘛寺院可以居住其防護之官兵今議派重慶鎮臣任國榮前赴裏塘統領即將四川進藏凱旋馬步兵丁內挑選二千名并酌留員辨駐劄等語著照嶽鍾琪所請令任國榮前往帶領進藏兵丁二千名暫駐裏塘防護將來如何酌量派換再暫駐之辨兵等天寒路逺效力勤勞應加賞賚以示軫念著嶽鍾琪一併分别定議具奏達賴喇嘛初至裏塘凡藏內所有什物未能即到其初來之供給著預為辦理支給任國榮既往裏塘駐劄其重慶總兵印務甚屬緊要著嶽鍾琪委員署理欽此等因到臣伏查川省原派進藏兵丁四千名內除駐藏兵丁一千名沿途安站兵丁五百名派赴巴塘進𠞰賊番兵丁四百名外惟餘駐劄類伍齊撤回之兵丁二千名應交鎮臣任國榮統率前赴裏塘遵㫖駐劄防護但卷查龍安營參將李棟報稱遊擊常力行帶官兵七百九十員名於十一月二十八日自類伍齊先行卑職續於二十九日帶領官兵共一千二百三十七員名起程由霍耳甘孜一路回川等情臣彼時計程扣算撤回兵丁巳將入口若任其回汛另行酌派不但製辦行李購買䭾載糜費殊多且川省鎮協營路距省窵逺一經派調兵丁勢必按汛分撥動需纍月始可齊集曠日經時緩不及待不便更派隨専員持令沿途先行止兵臣復兼程繼進節次路遇撤回兵丁巳至黎雅卭州一帶當經逐處𫝊集宣布聖心矜恤賞賚優渥至再至三并曉以暫駐裏塘緣由而標鎮協營兵丁無不歡欣踴躍願往報效更専差飛催重慶鎮臣任國榮統領前往俱經咨明督臣在案惟是入口兵丁往返將及一載途間風雨無時臣目擊所帶帳房悉皆損壞隨飭令臣標中軍參將張聖學備辦帳四百頂及火藥鉛彈等項齊全巳雇覓䭾載委員解送軍前分散各兵以資駐劄理合將官兵歡欣願往及臣辦理情由一併繕摺奏明伏祈聖鑒謹奏辦理妥協殊屬可嘉但念官兵甫從西藏逺歸若令久駐裏塘朕心深為不忍作何派調更換之處與督臣嶽鍾琪商定請㫖遵行此際雖云暫戍一切需用之資從優賞給務須充裕以慰朕體恤將士之意少有缺缺致令拮据責歸於汝也雍正七年四月十一日四川提督臣黃廷桂四川巡撫臣憲德謹奏為奏明事雍正七年四月初九日據䕫州協副將杜蔚報稱據駐防建始縣把總劉朝龍呈具報狀向懷明向仲貴等報為族惡私受夷職不遵國法闔族公報事蟻等係後里五花寨民自始祖以來未有不遵法律今陡出惡棍向仲乾向仲明向仲試家富萬金賄通土司寫立私結幹授官職領訖在家勢膽包天與容美土司往往私議蟻若隱匿不報恐連纍族人遭害等語據此隨追取委劄三張相應呈齎復據䕫州府知府周彬稟稱去年十二月內聞得卑府屬之建始縣邉界地方有容美土司差土遊擊一員帶領土人至該縣交界地方徴收銀兩卑府隨即星差密查去後兹據去差回稱小的等䝉差密查容美土司之事到彼未見其人但查得建始縣與容美土司交界處所有粟榖壩馬水河安樂井等處地方俱係建民居住每户納該土司銀二三錢以至七八錢不等名為春花二絲每年該土司差人按户徴收居民如不上納即遭凌虐等語相應稟明又據巫山營遊擊趙大貴稟稱據中軍守僃李世忠稟據防汛兵目報稱十一月內有容美司差副爺黃大方竝千把等騎騾馬四隻共帶十人强過塘汛小的等阻留逐回伊等揚言俱是他的地方到彼百姓人家收絲花各村民户敢怒而不敢言理合具報等情隨飭行守僃李世忠轉行専汛把總劉朝龍密查去後兹據該辨回稱十一月內土差十人帶有騾馬四隻來收絲花副爺千把是土司給有土目委牌塘汛不敢擅放當經逐回等情前來理合具稟等因到臣等該臣等細閲劄票語多狂肆且濫假名器任意妄為查向仲乾等係川東民人容美係湖北土司隔省私相授受夷職均干法律况該土司仰沐皇恩深重分宜謹飭安靜何得越界苛斂騷擾居民種種多事中懷叵測臣等再四商酌蓋緣容美土司田旻如為人狡猾富强甲於諸夷既經追取所委夷劄諒必自有聞知臣等若即咨明湖北督撫提臣查究併拘拏向仲乾等審訊或恐容美土司疑畏由此激生事端未便冒昧根究臣等不敢隱蔽除密寄知督臣嶽鍾琪外理合據實奏聞伏祈聖恩訓示遵行謹奏楚蜀各土司中惟容美最為富强緣自前明官吏玩愒弛縱遂致越分僣禮相沿成習迄今尚未改也地方大吏應曉以大義漸令革除若據濫給委牌科斂絲花等欵即坐以狂悖之罪似屬太過巳密諭楚督邁柱令其嚴飭田旻如矣汝等慮其疑畏不遽根究之意甚是四川提督臣黃廷桂謹奏為密奏事竊照駐藏鑾儀使臣周瑛抵藏之後竟於川省兵丁隊中擇其能唱亂彈者攢湊成班各令分任腳色以藏布製造戲衣不時糚扮歌唱以供笑樂甚失軍容且與副都統臣邁祿意見不睦時有爭執以致臣標後營遊擊馬良柱無所凜畏専事迎合而該將駐劄處所容留蠻娼出入男婦雜沓聲名狼籍臣恐遙聞未確值陕西花馬池副將惠延祖凱旋至省臣密詢果否有無其事據稟與臣所聞無異又化林協副將楊大立進省謁見臣更加細問所稟亦同臣不敢蔽匿理合據實密奏伏祈睿鑒謹奏異哉周瑛如是行止乖張誠為朕所不解矣凡有見聞似此據實無隱深為可嘉但滿兵自藏旋歸作踐地方何故不以奏聞耶同日又奏為奏明事竊查進𠞰瞻對賊蠻一案因遊擊髙奮志所帶漢兵無幾先經督臣嶽鍾琪檄飭遊擊常力行帶領駐防裏塘兵丁一千名星赴瞻對㑹兵𠞰除等因繼准欽差部臣查郎阿將進𠞰桑阿邦漢漢土官兵調赴瞻對併力合𠞰又派陕西兵丁五百名委守僃郎兆龍等帶領護運軍糧各等因咨稱業經奏明在案惟是軍務重大必得大員節制經臣咨商督臣嶽鍾琪令駐防裏塘之重慶鎮臣任國榮就近總統以便早奏捷音嗣准督臣移覆應如來咨臣隨移行該鎮遵照亦在案但查守僃吳鎮所領巴塘碟格及遊擊髙奮志所帶裏塘瓦述霍耳等處土兵情形怯懦且與瞻對賊蠻多係姻親往往瞻顧不前無益兵機是以髙奮志吳鎮等復聨名堅請檄調木坪瓦寺等處土兵一千名賊巢立即可破賊蠻自能授首其瓦寺等處土兵口糧鹽菜當於瓦述碟格各處土兵老弱內裁去三千五百名以裁出之口糧即抵瓦寺各處土兵需用現今柴草俱為餘賊燒燬兼之雪深數尺必待春草漸生瓦寺等處土兵亦至方能前進等情隨一面就近檄飭瓦寺土司揀選土兵四百名木坪土司預備土兵六百名收拾器械齊全聽候調用一面専差馳商督臣嶽鍾琪兹准督臣移覆准豫調換土兵一千名臣除委員分路率領星往瞻對併將各土兵所需帳房鑼鍋等項雇覓馱載専員護送軍前以資進𠞰并咨明鎮臣任國榮查照外理合繕摺奏明伏祈睿鑒謹奏覽奏知道了瞻對雖微亦不可輕視凡事槩以敬慎處之方能獲邀上天之庇佑也雍正七年七月初十日四川提督臣黃廷桂謹奏為據實陳明仰祈睿鑒事竊照化林協副將楊大立諭令明正土司代買石鍋等物一案臣等欽遵上諭查實原無勒買及短發價值情弊但不宜擅出硃帖業經照律㑹疏題參惟是楊大立自奉㫖補授化林協後臣即留心訪察見其辦事明白操守清潔頗能整飭營伍及奉派進藏凱旋至省時臣復面詢署督臣查郎阿該協進藏往返沿途行走如何之處據稱約束辨兵實屬小心勤慎堪資臂指等語且該協年力精壯正可勉勵造就臣於題參後更加密訪委係可用之才臣不敢因其擅出硃帖一事遂爾沒其所長理合據實奏聞伏祈恩鑒為此謹奏豈待汝奏朕早有㫖矣料楊大立未必忍負拔擢之恩也同日又奏為奏明事竊臣前密奏鑾儀使臣周瑛一摺奉有硃批諭㫖臣跪讀之下彌切感激惶懼伏思臣賦性愚昧叨䝉天恩髙厚超拔重任夙夜思維惟知仰賴皇上勉圖報效復何所避忌何所徇隱且協領莫爾渾統兵無律是其自取罪戾臣雖下愚何敢徇庇莫爾渾上負隆恩實因撫臣究擬咨明臣以該管處自必奏聖慈訓示感愧靡寧自兹以往臣凡有見聞自應據實陳奏臣不勝悚惕之至理合繕摺奏覆伏祈聖鑒謹奏鳥過張弓此之謂也雍正七年七月二十四日四川提督臣黃廷桂謹奏為奏聞請㫖遵行事雍正七年七月十六日據護理䕫協巫山營遊擊趙大貴稟據太平營千總王仕偉等報稱六月二十三日午後本營兵丁等因都司郜見聽信讒言苦虐衆兵受熬不過合隊交甲求退卑職等隨將進讒言之人斥責約束兵丁立即仍歸原伍理合稟報等語除専差查實揭報外合先稟明等因到臣臣隨飭令該護協確查交甲情由併將為首交甲兵丁名數訪實密稟去後該臣看得太平營都司郜見漢仗弓馬雖有可觀無如口訥才拙性復愚滯殊屬平庸之員今既輕信讒言苦虐兵丁致合營交甲求退則其溺職之迹顯然自應題參請㫖革職以警官方但查川省兵丁習染驕縱未盡悛改今若執此即行題參誠恐兵目無知嗣後轉相效尤實於營伍未便且兵丁之於營將如果受虐不過現有本協上司及臣衙門可控何得結黨挾制官長鬨然擅行交甲壞法亂紀莫此為甚殊難輕縱臣愚請將糾衆交甲為首之人查實嚴拏至省先行重處責革以懲刁風以除惡習至於都司郜見容臣稍緩即當另疏糾參是否有當臣愚未敢擅便理合繕摺恭請訓示遵行伏乞皇上睿鑒謹奏借輕信讒言苦虐衆兵一語遂欲幸免結黨挾制之罪豈可得乎類斯刁風不宜滋長當嚴查為首者重懲示警粵東有例堪倣行也郜見若仍留本營勢不相安一面另揀賢員即行調補一面具疏題奏將此原由無庸叙述雍正七年八月十二日四川提督臣黃廷桂謹奏為密奏事竊照驛鹽道曹源邠經撫臣憲德委管文場提調凡簾官需用牀席桌椅等類例係提調備辦本年八月初三日撫臣先期查看因牀席桌椅過於不堪飭令更換曹源邠隨於是日傍晚吩咐成都府役照數更換至初四日早未見送入即將成都府禮房責打餘悉拴鎖署成都府項誠繼至見而不平竟自悉令開鎖於初五日封帶府篆赴貢院至公堂上對衆忿言初四日係祭文廟齊期曹道違例動刑且晚上教換牀席次早即行責打夜間如何備辦得及此非打役明係辱我實因伊親家楊勷臣原係南充縣知縣是我屬員做官貪婪伊曽屢次囑託求我不揭我不敢徇情執意揭參曹道記恨遇事苛索借端發泄似此如何辦事我巳將印帶來俟撫憲來時回明情願交印不作官等語聲氣甚髙階下各衙門胥役及舉子百姓等觀望擁擠數層物議嘖嘖殊失體統嗣布政司吕耀曽至項誠即將前語面稟吕耀曽勸宜忍耐不則恐致兩敗後各官復勸項誠以明經大典不應道府爭競項誠雖暫從不稟終以曹源邠懷恨為辭有俟撫臣出場必行回明之語事關道府不和理合據實密奏伏祈皇上睿鑒謹奏曹源邠項誠俱屬稱職之員彼此不睦小過也非有蕩檢踰間之失同城官員當為從中勸解以息爭競同日又奏為恭奉硃批訓㫖事竊臣前奏為奏明事一摺欽奉皇上硃批事事咸以此四字居心可謂無欺無隱之純臣矣欽此臣跪讀之下汗流浹背神魂無措實無地可容伏思臣至愚極賤荷䝉聖恩屢加訓誨至周至渥乃猶昏昧為心自取罪戾臣實無可陳奏惟有痛自追悔洗心滌慮勉勵後效以圖仰報天恩於萬一耳理合繕摺恭奏伏祈皇上睿鑒謹奏無欺隱一語尚不能勉副朕意猶望汝竭力致身之效乎雍正七年九月二十一日四川提督臣黃廷桂謹奏為奏聞事竊臣前將太平營兵丁交甲情由奏聞恭奉硃批借輕信讒言苦虐衆兵一語遂欲幸免結黨挾制之罪豈可得乎類斯刁風不宜滋長當嚴查為首者重懲示警粵東有例堪倣行也郜見若仍留本營勢不相安一面另揀賢員即行調補一面具疏題奏將此原由無庸叙述欽此臣隨將奏明奉㫖情節密寄知署督臣查郎阿以便㑹稿請㫖調補但查川省除太平營都司一缺外止有建屬寧越營都司竝改設化林營都司新添噶逹都司三缺均係沿邉要地更非郜見所宜是以臣與督撫臣商酌將梁萬營守備哈元成題補太平營都司所遺員缺亦屬緊要復揀選重慶鎮標中營守備楊鶴調補其郜見應否以都司職銜管理重慶鎮標中營守備事務抑或給咨赴部另補之處現在㑹疏請㫖遵行至於不法兵丁臣巳飭令護理䕫協印務遊擊趙大貴鎖拏解省俟解到時臣謹遵㫖照例發落合先繕摺奏明伏祈睿鑒謹奏以上陵下固屬不可以上遜下尤為不可一涉將就則顛倒紊亂且不勝其紛擾矣然非秉公持正無忝統率之任者亦未易論及此也同日又奏為奏聞事竊臣據護化林協印務遊擊許連科稟據駐防打箭爐把總劉清稟稱閏七月二十八日有噶逹工所潜逃夫役八十四名到爐即盤阻詢問據云皆是髙陽百姓正要具文差人押解申報工所又陸續走到四百餘名皆是髙陽土夫據該夫役等云我等離家數百餘里來噶逹應差傭工自本年五月動工迄今四月止領糌粑五斛領過工價銀或二兩一錢及四錢五錢不等我等又無處告貸小頭人具訴哀懇借支盤纒總不給發忍饑不過只得奔回等語稟報到職相應稟明等情嗣准撫臣憲德咨准趙殿最諾木圖咨稱髙陽土夫紛紛私逃隨將大頭人髙萬修楊萬秀鎖拏訊究緣由據呈刁夫髙續英髙夀楊翠鳳戴廣四名串謀衆夫夤夜私逃勢勇難當等情除將大頭人髙萬修楊萬秀二人暫行枷示外查髙續英等四人率衆私逃刁玩巳極且聞各夫在途口稱到工僅領工價錢兩次一次每人止有五錢一次每人止有數分每運厚板一塊止給工價三分每運到板十塊止算八塊等語但事關錢糧或係大頭人等扣尅或係逃夫髙續英等刁誣之處非令質對難以清查除牌行該署司即將髙續英等四名務必嚴拏審究録供并將該夫等四名解赴工所以便與髙萬修等對質發落等情各到臣臣查土夫在工潜逃原屬刁玩既經趙殿最等移咨究審解工對質則有無短發尅減苦纍之處自必水落石出但事關夫衆五百餘名紛紛逃散有駭觀聽理合據實奏聞伏祈聖鑒謹奏此中大有情故朕皆悉知解工對質水落石出時是非曲直曷能逃朕之鑒照也雍正七年十月十三日四川提督臣黃廷桂謹奏為奏聞事雍正七年九月二十六日據駐藏把總何錫寵稟稱本年三月內有陕西兵丁約二百餘人赴邁大人衙門回稟西藏柴草豆料俱貴皇上與我們口糧折色銀兩為何扣存我們的等語邁大人當即𫝊將備等官將原存銀兩每名給發銀四兩始行解散等情復於十月初九日據駐藏把總李正藩稟稱川省兵丁為支領口糧一節先於出師挑派時令各兵裹帶兩箇月挽運四箇月折支六箇月是一年之額川省官兵自去嵗出口時在打箭爐打一月之糧折給一月食物行至叉木多又打一月之糧沿途共打三箇月口糧於去嵗八月初一日抵藏起至今嵗三月終止各兵每月每名關領折色銀四兩均各敷用安靜戍守竝無異言及至四月內有說版多解到西藏頭運之糧時有糧務文員奉各憲之文令兵丁支領本色各兵當即巷議紛紛周大人與糧務籌議備文數次與督撫兩憲籌畫方令各兵每月半本半折至八月終止各兵以為相合半本半折之期限完矣衆口嘵嘵均為日用食物以及餧養馬匹製備衣服鞋襪等項艱窘難度不意於八月初五日有川省兵丁聚集大招各帶腰刀約有百十名朋黨衆議云今西藏所存之糧共七百九十餘石令川省兵丁將前支下剩之糧二百五十石支完方將新運五百餘石川陕兩省之兵均派公支事屬不公衆皆不服該管千把頭腦近前約束衆兵口出惡言幸而天降大雨隂黑雲暗地道泥濘未能邀衆成事理合稟明等因各到臣據此事關川陕兵丁先後非為臣既有所聞不敢隱蔽理合奏聞再臣於駐藏辨兵遇有因公赴省者每親加細詢藏地情形據稱藏內柴草馬料甚貴步兵用度儘可從容馬兵未免有時不足等語臣思各兵所食半米之外每月尚關支折色銀二兩又有恩賞鹽菜銀兩甚屬充足何至日用不敷但各兵奢儉不一或間有不足之處亦未可定查出師兵丁每季餉銀俱係家口關支養贍今仰沐聖恩復賞坐糧優渥重疊其各兵家內更覺十分有餘臣愚以為似應將川陕兵丁所關季銀一半令其家口支領一半令各兵在藏關支庶在外在內均屬充裕臣復以此議屢密詢自藏赴省各辨兵咸稱如此實為妥便但事關川陕兩省兵丁臣未便擅専巳將此段情節寄商署督臣查郎阿應聽署督臣核奪料理相應一併繕摺具奏伏祈睿鑒謹奏覽奏巳悉賞給坐糧之諭想駐藏兵丁此時方始聞知耳朕今密發所奏與馬臘閲看令其確察兵丁情形覆到之時然後降㫖施行庶為協當兹且密之勿宣雍正七年十一月十六日四川提督臣黃廷桂謹奏為奏明事竊臣查黃螂改土歸流一案土司國保仰䝉恩㫖臣隨欽遵悉心辦理業將國保安插成都各緣由恭疏具題惟是國保先經奉調至省曽在將備前口稱不拘安插何處又以恐不服水土為辭意欲移家叙州府臣查敘州府距黃螂頗近未便安插成都去黃螂遙逺且係省㑹觀瞻所在便於習學規矩臣是以飭令將備等婉轉開諭國保令其住居成都學習禮法於伊子孫有益國保即欣然具呈願居成都臣又令將辨代為擇買田地房屋竹園發交管業國保愈加欣悅隨即差人回巢搬接伊妻子眷口至省再國保尚有胞弟木姑未咱未基及堂弟未娘木濟等臣思國保雖酌議安插若其弟輩多人仍聽住居黃螂倘不安靜終於地方無益臣又令將備等從容誨導國保更令駐防黃螂守備毛龍甲不時𫝊集未咱木姑等宣布皇恩俱各感戴踴躍一同攜家抵省共計男婦六十七名口臣除將未咱木姑等造具户口清册移明撫臣憲德酌撥附近荒田計口照例安插外理合將辦理情節據實奏明伏祈睿鑒謹奏安插成都甚屬合宜務令其俯仰充裕中心感悅不然則是朝廷直為誑誘之舉矣殊與國體有關總之汝等封疆大吏但當以誠信為本權術二字無一處一事可用也志之同日又奏為請㫖招民開採礦厰以資鼓鑄以利民用事竊臣據駐防黃螂守備毛龍甲稟稱金竹坪白臘山蠻夷司金竹壩等處各有銅鉛厰一座民人現在紛紛懇請開採守備又詢據商人等稟稱雷波黃螂靠山一帶尚有數處礦厰等語相應稟報又據馬邉營守備房啓義稟稱煙草峯㑹龍堡一帶礦厰甚多如隂戲岩炒米厰地方出有銅厰二座又木香岡新厰墩化皮厰三處各出鉛厰一座夾有銀砂該處土民不時在內偷挖旋逐旋聚更聞此外尚有厰座等情各稟報到臣伏思礦厰乃天地自然之利銅鉛為鼓鑄所必需封閉無用實屬可惜且建昌一帶礦厰業經酌議具題招商辦課而馬邉黃螂等處既産銅鉛似應懇請天恩一體聽民開採上可稍資鼓鑄下即可為衆民衣食之藉實於國計民生均有裨益倘䝉俞允其作何招商開採之處應聽撫臣照例承辦理合繕摺奏聞伏祈皇上睿鑒謹奏此奏識見殊屬庸愚之至所謂守突奧之熒燭未仰天庭而覩白日者也雷波黃螂一帶地方與新撫涼山諸夷壤疇交錯第宜示以鎮靜胡可興啓利端若聽民開採各處流亡無藉之徒勢必羣相趨赴萬一釀生事故所關匪淺汝其㑹同憲德速將金竹坪白臘山等處凡出産銅鉛礦厰槩行封禁嚴加防範稍有奉行不力脫至紛紜黃廷桂憲德之身家性命未足以償厥辜也同日又奏為奏聞請㫖遵行事竊查峨邉馬邉二營轄屬汛地皆與蠻夷接壤向因人民稀少野苗未靖是以從前遷棄之地方多未盡展復如峨邉營一帶汛防至太平墩而止而太平墩之外尚有冷磧關平夷堡化平林等處其馬邉營防守汛地止於兩河口此外更有㑹龍堡煙草峯大竹堡等處俱久經拋置今川省民人生齒日繁又叨䝉聖恩安插流寓開墾荒畝為窮民衣食之本以故馬邉營土著老户及外來新民屢欲將㑹龍堡煙草峯一帶拋荒田地報墾承糧而辨兵又以兩河口之外未經設汛恐無防衛倘致夷人乘間綁竊深為未便極力阻擋兵民因此往往互相訟訴至峨邉營所屬太平墩之外如冷磧關平夷堡化平林等處雖遷棄日久臣向聞各該處地勢扼要係夷猓出入咽喉總路且其中山嶴平坦土性肥饒可耕之田地甚多臣於上年進𠞰涼山事竣之際曽將素隸峨邉住牧大赤口一帶之雄瓜膩乃等夷素隸馬邉住牧凉山一帶之九土百户陸續調集厚賞臣即將化平林煙草峯等處各應安設情由明白曉諭彼時雖據各夷目稟稱情願安靜守法不敢滋事但臣伏思涼山諸夷甫經𠞰撫其傾誠效順與否尚難預必未敢冒昧奏請今自大兵撤後將經一載凡建屬雷波黃螂各處新附苗民無不仰承聖主撫綏德意甚屬安帖不但毫無綁竊更能將素日掠買漢民不逺數百里之外赴營首報自行獻出臣觀苗民既能似此恭順則附近峨邉之冷磧關平夷堡化平林附近馬邉之㑹龍堡煙草峯大竹堡等處原係內地似應懇請天恩俯准展復俾民人墾闢荒畝以資生計惟是地方新闢一切衝邉要隘汛防不可不僃臣悉心籌畫查平夷堡冷磧關化平林等處直通大赤口涼山一帶俱係蠻人出沒必由重地而平夷堡尤為咽喉總滙要區似應於此設守備一員帶兵一百三十名駐劄以扼要衝其冷磧關設外委一員帶兵五十名聨絡分防至化平林去太平墩頗逺備禦當嚴應設千總一員帶兵一百二十名駐劄以資控制所有添設千把二員均令平夷堡守備管轄仍令峨邉營統轄至馬邉營所屬㑹龍堡煙草峯大竹堡等處均在現設汛防之外查煙草峯距馬邉窵逺直通涼山普阿姑一帶甚關緊要似應設千總一員帶兵一百名駐劄其㑹龍堡設把總一員帶兵六十名分防至大竹堡雖去馬邉較近然路通麻栁壩凹黑等蠻應設外委一員帶兵四十名駐劄互相控扼此所設千把兵丁統歸馬邉營管轄但設兵必須籌餉以上峨邉馬邉二營共計請設守備一員千總二員把總一員兵五百名其每嵗支領俸餉悉關正賦臣再四思維莫若於次衝營汛及通省經制額兵內酌量設法改調抽撥通融轉移則於各營兵力仍屬無損而汛防周密俸餉無增邉民有袵席之安番蠻無盜竊之患垂諸永久實為有益臣因地方民情起見不揣冒昧是否可採恭候聖鑒遵行謹奏所奏抽撥兵辨移駐事宜候交廷臣詳議有㫖至於墾荒之說應俟汛防安設妥協三二年後酌量情形方可議及今於新撫之初諸凡未備遽欲舉行殊屬孟浪無識雍正七年十二月初一日四川提督臣黃廷桂四川巡撫臣憲德謹奏為奏聞事雍正七年十一月三十日據護重慶鎮印務參將胡兆吉暨重慶府墊江縣各通報內稱十一月初七日聞墊江縣新場地方有聚衆之人帶有牌票招人隨即文武㑹同齊差兵役拏到楊大銘董先朝黃四等十九名竝獲馬二匹未裝束鳥鎗一桿楊大銘處搜出招人硃判紙一條上寫楊大銘名下人一百隨審據楊大銘供係江西吉安府廬陵縣人到新場剃頭生理有黃四趙汝海等邀去買棉花到酆都縣白石丫王可久家同湖廣人陳姓李姓劉姓等别的不知姓名共四十多人王可久整了血酒叫小的們大家發誓拜弟兄才對小的說忠州出了楊家將叫楊成勳他家有金鑲玉印劉伯溫碑記他第七箇兄弟必要為王送在酉陽司去了叫大家扶助吃了血酒在王可久隔壁大魚寺歇這帖子是王可久王仲久同一姓陳的與小的的又據董先朝黃四等供出在王可久家吃血酒為頭第一箇楊成勳第二箇陳文彬第三箇杜秉凡第四箇王可久等情隨將各犯監禁多差幹役移㑹鄰邑追緝未獲各犯外又復檄行署忠州守備蔣𢎞英選差幹兵密拏餘黨去後據差往目兵陳國彥等回稟走到離楊家不逺忽被多人圍到楊成勳家捆綁至半夜時候有楊成勳之兄成賢成舉來解放說他兄弟回來他父親說是查地方的營兵為何捆綁他一陳罵一陳磞他兄弟成勳在屋後樹上弔死了衆人方才散去隨將成碑記確審實情定擬另行具題外理合先行奏聞謹奏奏內據稱檄飭酉陽司追獻楊七竝嚴查碑印等語最宜詳慎勿俾無知辨員憑威迫脅激出事端朕意或係姦匪揑詞妄供希圖推缷亦未可定料該土司未必有此事也適巳批明查郎阿摺內令其轉諭汝等矣雍正八年正月十八日四川提督臣黃廷桂謹奏為恭謝訓㫖事竊臣前以庸愚卑淺之見冒昧陳奏敬奉硃批諭㫖此奏識見殊屬庸愚之至所謂守突奧之熒燭未仰天庭而覩白日者也雷波黃螂一帶地方與新撫涼山諸夷壤疇交錯第宜示以鎮靜胡可興啓利端若聽民開採各處流亡無藉之徒勢必羣相趨赴萬一釀生事故所關匪淺汝其㑹同憲德速將金竹坪白臘山等處凡出産銅鉛礦厰槩行封禁嚴加防範稍有奉行不力脫至紛紜黃廷桂憲德之身家性命未足以償厥辜也欽此臣跪讀之下仰見睿慮精詳至周至逺乃臣愚昧為心率爾瀆陳以致上厪天懷謬戾實深荷䝉天恩鑒宥復賜訓示開導切至俾臣醒悟知有遵循臣隨即欽遵飛飭該管雷波黃螂馬邉等處將辨將金竹坪白臘山煙草峯等處凡有鉛銅之厰悉行嚴加封禁不時選差辨兵查拏流匪勿許偷挖滋擾仍委員逐處挨查併出示曉諭嚴禁務期漢番和輯各安住牧仰副聖主敉寧邉境保乂民人之至意臣不勝悚惕感激涕零之至謹恭摺奏謝伏祈睿鑒謹奏向後一切事宜務須詳慎為要率爾之見何可瀆陳朕覽所奏倘亦如汝遽即見諸施行竟至滋擾地方其害曷勝枚舉豈引咎頌聖數語所堪了結者如云曾經審思原非率忽則巳之才識實屬不逮可知愈當加勉詳慎矣同日又奏為奏聞事竊查墊江賊黨一案臣等據報即經㑹摺具奏嗣於雍正七年十二月初三十五等日據護重慶鎮印務城守營參將胡兆吉先後咨稱陸續捉獲逆犯徐應詔等九名王招德等十三名又獲杜秉凡等五名又獲首惡楊七等七名又獲楊成爵等四名各等情到臣俱經節次轉咨署督臣查郎阿仍飛飭胡兆吉慎選辨目嚴密查拏各在案現今此案人犯撫臣憲德巳提解赴省飭令審究兹於本年正月十二日接署督臣查郎阿札稱恭奉硃批諭㫖敬録到臣伏查首惡楊七果係於楊隘嘴地方被獲竝未在酉陽土司境內臣跪誦綸音仰見聖明洞燭如日月之照臨無逺不周臣隨敬録密示胡兆吉欽遵仍密飭㑹同文員詳慎料理勿得滋擾理合將緝獲楊七及一千要犯提解赴省緣由一併繕摺奏聞伏祈睿鑒謹奏朕非有過人技能但較汝等克誠克公耳凡人為一巳利害是非之念切則遇事接物動輒有過不及之失勉公與誠斯為對證之藥雍正八年十二月十六日四川提督臣黃廷桂謹奏為奏聞事竊臣於本年十一月二十五日據臣標前營遊擊王谷宰報稱本月十四日卑職督兵前進行次回龍關其關左手懸崖右手深溝大澗夷猓羣聚數千堆積滚木擂石卑職逺視凶險不敢冒進隨另覓小路飭守備張文璧等帶領漢土兵丁五百名抄在回龍關之前截殺又令守備干為章等帶領漢土兵丁三百餘名於巖後攀巖而上卑職帶領漢土兵丁九百名於關下誘賊以信炮為號三處官兵喊聲大振鎗炮一齊攻打猓賊潰敗奔逃隨越回龍關於米貼下營十五日取金鎖關十六日奪黑鐵關十七日剋黃草坪乃猓賊猖狂至初更時分在營盤之左巖上名拖柯磴滚放擂石隨詢知此磴後通鋪枯嚕磴卑職密令守備張文璧等帶領漢土兵丁八百名立即銜枚攻𠞰去後又令守備干為章等連夜仰攻拖科磴因磴如壁立其中木栅墻垣甚堅我兵被擂石打傷甚衆職督催官兵奮勇爭先至十八日午時羣賊大敗官兵追擊上磴殺死猓賊數百餘名十九日據守備張文璧捷報鋪枯嚕磴勢陡險有三十餘里之髙我兵攀援至半山猓賊擂石齊下官兵奮勇攻打以至有陳亡帶傷者未時攻至磴上擊殺賊蠻甚多等情卑職於二十日率領漢土官兵攻取螞蝗溝併分兵進攻古株等砘俱於永善㑹合乃猓賊狡計沿途豎立木栅阻塞隘口施放矢石我兵用大炮更番攻打旋攻旋進凶猓勢窮難支撲巖鼠竄即於本日恢復永善等情捷報到臣臣查自井底至永善沿途二百餘里俱係懸崖峭壁賊夷所在蜂聚經遊擊王谷宰督勵兵士連宵血戰克取險隘恢復永善但烏賊變叛異常官兵無不憤恨同仇爭先除冦以致陳亡漢土兵丁二名瓦寺土千總一員受傷漢土官兵八十餘員名至於克復大關一路官兵臣據署遊擊康國泰等驗稱職等於十一月初十日分派官兵前往大關後箐搜𠞰突遇猓賊數千駐劄溝內一見我兵即齊來拒敵自午至酉猓賊敗退入箐日暮收兵回營乃猓賊乘夜分為二路復來死鬬職等督兵努力交鋒直至黎明羣賊方始潰散緣夤夜昏黑殺死凶蠻固多而我陳亡把總一員外委一員漢土兵丁三十六名受傷漢土官兵九十餘員名即卑職國泰面被弩傷深入額骨等情再查堵𠞰東川一路官兵臣節准建昌鎮臣趙儒咨據署遊擊楊澤厚等報稱職等嚴密防截先後捉獲東川猓賊二百餘人內賊目十三名及賊目之家口一併解交滇省又救出被難漢民三名及滇兵十三名各兵之家眷三十四名口業經専差送赴滇員收管去訖所有微臣據報恢復永善及漢土官兵奮勇傷亡併擒獲賊目各情由除巳咨明督臣鄂爾泰外理合恭摺奏聞伏祈皇上睿鑒謹奏官兵之奮勇爭先汝之調度合宜深為可嘉據鄂爾泰亦有川省將領此番勞效較勝滇省張耀祖輩逺甚之奏勉旃勉旃雍正九年六月二十二日四川總督臣黃廷桂四川巡撫臣憲德謹奏為備陳川省情形敬竭臣等管見仰冀聖明俯垂採擇事竊惟民為邦本食為民天我皇上浩蕩洪慈無時不以民間粒食為念各直省倉厫儲積屢䝉諭㫖訓示周詳臣等仰體宸衷覺川省地方其米榖有不可不早為籌畫者敬為我皇上陳之川省逺屆極邉萬山叢積惟成都省㑹附近十餘州縣平洋寬敞田多渠堰素産米榖古稱沃野千里其餘府㕔州縣則皆依山傍澗其田丘地塊専賴天雨灌溉稍不及時即多歉薄所以附近內外兩江舟楫可通之處軍民食米亦往往仰藉成都前此糶販甚廣而産米之鄉相忘不覺米價不增者以本處人烟稀少食之者寡也今聖朝生聚日繁向之畸零小户每多聚族而居兼之商賈匠作攜家就食傭工力役結伴去來四時絡繹不絶故近來青黃不接之際米榖價值城鄉俱不無少昻臣等查全川一百數十餘州縣其倉厫存貯米榖雜糧通省合算止共四十二萬石有零且川民習俗從無蓋藏即紳士豐裕之家亦皆無隔年之蓄所以臣等輾轉深思若以本省所産之糧供本省目前之用自無不足之虞然以現今之生聚遙計後此之增多自必日盛一日萬一偶遇歉收鄰省既難於撥運本地又無可截支止藉此四十萬石之倉糧實難免匱乏束手之慮此臣等竊謂川省米榖不可不早為籌畫而上請聖慈者也伏查川省常平倉捐例久巳奉行又經升任嘉定州知州陸錦奏䝉恩允部覆飭遵至今巳越兩年竝無一人報捐臣等復悉心咨訪蓋川省例係捐榖歷年榖價漸長又不無購買搬運及上倉守候之勞且又止有捐監一途更不許外省之人在川援納所以自康熙三十二年起至今歷四十年來而捐者寥寥倉儲無幾臣等不揣愚昧竊計略為變通請將川省常平倉捐例改榖作銀一切捐欵銀數悉照雲南貴州現今事例不分旗民人員聽許赴川遵例援納即交兑四川布政司貯庫出給實收赴部換照臣等即將此項捐貯銀兩分别地方大小遴委賢員於秋成之時赴各州縣照依市價分頭買榖交該地方官查收貯倉而於濵江州縣加倍多貯一轉移間國計民生俱有禆益倘䝉俞允其州縣衝僻繁簡各應貯榖若干石松爐新設營汛應行改榖貯米者各若干水陸船腳運費按站應給若干併請照雲貴開墾各條事例統俟恩准批允至日臣等悉心酌定另疏具題未敢遽為瀆奏謹就管見所及者據實備陳是否可行伏祈皇上睿鑒訓示遵行謹奏川省乃産米之鄉籌畫積貯尚易為力該督撫遽請開捐誤矣且欲改榖作銀又復將銀買榖輾轉滋弊更屬悖謬但通省倉厫止存四十餘萬石為數太少應作何增儲之處交從前所派㑹議截漕大臣同田文鏡速行詳議具奏雍正十年閏五月十二日四川總督臣黃廷桂謹奏為恭謝天恩事竊臣接准撫臣憲德寄到大學士鄂爾泰等字寄四川巡撫憲德雍正十年二月十九日欽奉諭㫖賞臣養亷銀一萬二千兩臣隨恭設香案望闕叩頭謝恩伏念臣庸愚駑鈍叨沐天恩逾分超擢未有涓埃之報屢以養亷瀆請實深惶悚乃䝉聖慈賞給加厚隆恩豢養至深極渥臣惟有矢竭公忠實心任事以期仰報髙厚洪慈於萬一理合恭摺奏謝伏祈皇上睿鑒謹奏覽奏謝知道了凡居官食祿者無論髙卑俱當以操守為第一要務汝輩旗員獨此一事朕未之能信勉之雍正十年閏五月二十五日四川總督臣黃廷桂四川巡撫臣憲德謹奏為奏聞事竊臣等於本年閏五月十八日據直隸嘉定知州錢青稟稱本月初六日據峩眉縣知縣文曙具報該縣地方於初三日夜山水陡發自西關至東門城外將居民房屋衝倒人口淹斃數十名田禾淹沒同日又據署夾江縣蔣一鳴亦報水發淹沒田禾各等情卑職隨即星赴峩邑逐一查勘緣大雨連夕峩眉山後山水陡發㑹集奔衝直至城西轉北至東水勢洶湧兩旁人户躲避不及以致坍塌房屋百有餘間淹斃男婦大小九十餘口近城田地被水衝塞沙石淤填至夾邑水淹地畝係因雅河泛漲水漫入地將近河沙地秧苗淹沒房屋人口竝無損傷等情到臣等臣等隨公同㑹商峩邑近城民人陡被水災損傷男婦飄沒田廬實屬可憫臣等仰體皇仁暫動公用銀一千兩飭交建昌道馬維翰星速前往峩眉夾江逐一查勘務將實在災黎宣布聖恩酌量賑恤均霑實濟仍恐被水窮民不無乏食竝令該道即動常平倉榖按户查明借給以資口糧其二邑淹沒田地是否成災一併據實查勘詳報俟該道詳報至日臣等另行奏聞外所有據稟山水陡發臣等委員查勘賑恤緣由合先恭摺具奏伏祈皇上睿鑒謹奏自命黃廷桂總督川省以來災祲屢聞朕甚憂之未識黃廷桂亦曾返躬自省否也雍正十年八月十七日四川總督臣黃廷桂謹奏為奏聞事竊查秋成之後𠞰捕兒斯賊畨需調漢土兵丁六千名經臣繕摺奏請恭奉皇上諭㫖臣隨分檄派撥漢土兵丁六千名交鎮臣趙儒總統調度至於進𠞰機宜臣悉心籌酌查兒斯堡地方前以上中下三渡為門户扼塞之所後以蘇爐巴日堡及木裏等處為事急潜遁之路左則恃有噶巴峪石關二道右則恃有廟頂山險得以抗拒而其盤踞重地則意魚卡一山兩峯壁立中通一線長亙數十餘里實為要害臣先密檄明正土司將蘇爐巴日堡連界渡口由打箭爐多派土兵嚴密堵截其木裏各接壤處所令該鎮預先密飭各土司頭人加謹防範至我兵進攻道路亦巳密檄鎮臣趙儒查照應由三渡各分一軍飛濟直前毁其門户由㑹鹽一路至噶巴峪搗破石關由窩卜一路攻克廟頂斷其兩翼其意魚卡山之前仍應明駐大軍攻擊牽制賊人却暗派精兵一由石關一由廟頂山各屣小徑出其不意攻入意魚卡之後則賊首尾受制顧此失彼擒縳首凶以正典刑似覺易於為力竝令該鎮臨時詳察機宜務期實力料理不許稍有將就完報等因在案臣仍不時専差督催密察倘草率粉飾立即嚴參再鎮資鼓勵合併奏明伏祈睿鑒謹奏務期一舉戡定以收永逺綏靖之功毋得仍然潦草結局今賊番敢於猖獗者皆由汝從前未經料理妥協所遺之患若再苟簡從事朦混一時則將來何所底止耶其將朕意密諭趙儒領悉𠞰番之後原係汝二人未了首尾設不能奮勉立效以贖前愆二罪併罰恐汝等難以克當矣總之一切進退利鈍情形纖毫不隱殫心竭力相機合宜而為之自䝉上天之庇佑也囑伊謹志勿忘同日又奏為奏聞事竊臣因上年六七月間成都米價騰貴一面諭令布政司將常平常豐倉榖全數碾米委員平糶一面繕摺㑹奏及秋收後隨即諭令布政司將碾辦倉榖如數買補還倉以為今嵗青黃不接之需仰䝉皇上至誠格天今年夏熟巳獲豐稔無須此項接濟復慮蜀地氣候每當秋成之時恆多隂雨連綿縱有上等田禾緣雨水過多收成反致稍減乃自入秋以來七八兩月天氣晴朗川民婦子得以盡力收穫所結顆粒愈加穎栗兹據成都府查報府屬十六州縣收成分數十分者十州縣九分者六州縣臣又差役四處訪查俱云各處收成實與成都不相上下現今米價上米每石四錢七八分次則四錢一二分將來秋收完畢之後米價或尚可以減少除俟布政司彚造通省收成分數另行㑹奏外合先具奏以慰聖懷謹奏觀秋成豐稔米價平減情形或汝果能悔懼修省有以挽回天心亦未可知也雍正十年十月二十日四川總督臣黃廷桂謹奏為奏聞官兵克捷拏獲賊凶事竊查擒𠞰兒斯賊番臣酌調漢土兵練委交鎮臣趙儒統領調度隨經繕摺奏明但臣伏思獏狻番部其素行不法者固以兒斯為最然此案則水墨巖係在河東兒斯賊住居河西一旦渡河逞凶必有附近惡夷勾引生釁若止𠞰捕兒賊而造謀之首逆不即查明懲創終非一勞永逸之圖臣隨疊次札寄該鎮并諭軍前各將留心訪察嗣據稟稱查明動手正凶原係兒斯賊番而始則起意勾結殺害厰商繼值大兵駐河鵰𠞰復乘間搶奪糧石傷壞兵夫者實係河東之瓦都瓦尾紫古哵一帶賊目內外作姦罪不容誅等情臣隨檄飭一併嚴拏去後今節據鎮臣趙儒咨報漢土兵練於九月初旬內外陸續齊集一面先令遊擊楊澤厚帶兵自㑹鹽一路攻入一靣飭催渡船於九月二十五六三處渡口需用大小船隻俱巳造完隨分遣遊擊夀長等帶兵於二十七日渡河直前本職量帶官兵駐劄刻嗎木上下䇿應相機料理於十月初二日將瓦都瓦尾紫古哵賊目郎姑嗎即沈各别竝壬撲撤父子等設法擒縳隨立遣署參將傅𢎞禮率領辨兵分頭搗巢捉獲賊犯等男婦二百餘名口又將賊首獨溜溜俄即擒獲解交寧逺府收審其夀長等各將遵照檄示分道進攻各據稟報督率辨兵轉戰而前於初三初六等日左右前後四路官兵俱將各處石關攻克意魚卡腹心重地亦巳犁掃直抵接不接新老寨俱經㑹合沿途陳斬賊蠻甚衆生擒兒斯正凶雜兒谷哈布等十名一併押交寧逺府收審等情捷報到臣臣查進𠞰以來仰仗天威將士鼓勇旬日之間遂將河西險要俱經搗破兒斯正凶巳有擒獲而河東各寨造謀逆番無不受縳除再専差嚴檄諸將分遣辨兵四路窮搜密捕務將凶番通數全拏解報外所有據報克捷情由理合奏聞謹奏覽奏巳悉仍飭將辨兵丁小心慎重相機而行毋致稍有疏失同日又奏為敬凜聖訓實力遵行事竊臣恭奏漢土官兵起程日期一摺敬奉硃批委曲開導仰見皇上軫念邉防務為久安長治之計至深且逺凡有地方之責者苟具人心能不戰兢惕勵勉圖報效孰敢尚懷欺飾自干重譴伏思番蠻雖屬蠢悍如果措置得宜自可漸臻化理蓋雷波黃螂即係新附之區臣凜遵睿謨宣布威德不時専差察看彼處土民沾沐聖澤日就醇謹其涼山十數萬夷猓自雍正六年進𠞰之後靡不安靜守法而冕山越巂相隔百有餘里從前原係撥兵對哨保護行商及臣撤兵之後明白曉諭停止放哨數年以來竝無劫奪等事至兒斯一案於雍正五年經副將王剛帶兵剿撫之際臣甫經到川一切地利夷情實屬不諳今逆蠻既敢陡肆凶鋒即臣撫馭無方仰䝉訓㫖諄切敢不竭力肅清臣巳遵㫖密諭鎮臣趙儒凜遵料理今查河東一帶造謀首逆全數擒獲河西兒斯堡動手正凶亦有解報臣復専差疊檄嚴催將兒斯凶番逐一上緊緝捕務盡根株以免後纍惟是三渡河東逼近寧番肘腋之地若不痛加懲創終恐養姦貽患是以并令該鎮乘此軍威凡有素行不法賊夷查實一併掃除再臣訪聞寧番村堡竟有漢姦希圖夷利擅敢隱藏逆犯之牛羊等物者隨巳密諭寧逺府即速確查拏究以警不法臣惟有盡心竭力徹底辦理俾漢夷共知警戒則蕩平之後徐施教化庶可一勞永逸仰副聖主綏靖苗疆至意所有遵㫖辦理緣由理合恭摺奏聞伏祈睿鑒謹奏秉忠抒誠黽勉為之其間偶或遇有滯礙難行何妨據實奏聞商酌辦理豈可欺飾掩蔽苟簡朦混也汝等中平材質一切處非過則不及嗣後務須講求適當合宜之道為要雍正十年十二月初一日四川總督臣黃廷桂謹奏為凜遵睿謨苗疆底定恭報凱捷事竊臣前將擒縳河東各寨勾結逆番及兒斯有名正凶并嚴檄將辨密捕窮搜務盡根株各緣由俱經繕摺奏明續據鎮臣趙儒次第咨報從前河西各堡凡係協助兒斯之逆猓及官軍深入以來負固抗敵庇匿兒斯之凶蠻嚴飭遊擊楊澤厚夀長沈國卿洪揚都司張懷元吳金章等督領備辨士卒嚴截密布屣緝賊蹤或分頭犂掃或協力𠞰擒先後計尅廟竹打約勒烏錯多拉谷擦谷路糯居勒必約葛皮羅木羅等堡數十餘寨又將賊夷盤踞要窟喇卡哈四夷羅露沽崖萬雲峯等處竒險石硐十數餘穴次第搗燬再查下渡河東接連內地白宿凹麥地溝瀘沽一帶夷巢原係獏狻本支輒於軍營左近射傷馬匹攜家逃入山箐不肯受撫復行檄飭沈國卿張懷元等堵截要隘㑹兵嚴搜捉獲賊番除飛巖投河自盡及臨陳擊斬外通共生擒賊目賊從及老幼家口一千餘名本職又復帶兵渡河查勘情形周圍上下逐處親歷以便詳議善後目擊沿山各箐險巢要隘俱經掃除其案內各堡造謀頭目動手拒敵正凶巳全數緝獲移交寧逺府收審解省實係賊氛悉靖地方清寧軍務告竣各等情到臣該臣看得獏狻番族在於三渡河東河西毗連住牧從前副將王剛帶兵𠞰撫雖經渡河不過兒斯一堡原未深歷重險遍加懲創故賊蠻倚恃山窟仍敢恣肆今則仰䝉聖訓剴切指示而鎮臣趙儒凜遵宸算殫力竭誠徹底料理一切險巢重地深林石穴靡不督勵將士悉行蕩平凡係案內不法賊目正凶業經寧逺府知府杜士秀等訊眀陸續解省一無縱漏又因善後機宜關係垂久鎮臣趙儒親身遍歷逐細查勘今軍務既竣臣現在檄行該鎮量留官兵駐劄彈壓其餘漢土兵練撤回汛巢俟咨覆前來臣另疏題報外至於善後措置臣巳寄知該鎮悉心妥議到日臣再與撫臣憲德熟計詳籌另摺恭陳天聽所有犯番全獲軍務告竣各情節理合繕摺捷奏伏祈睿鑒謹奏所奏欣悅覽之趙儒督勵將士蕩平逆番不法賊目又經全獲甚屬可嘉俟具題到日另有恩㫖可先轉諭知之雍正十一年十一月二十一日四川總督臣黃廷桂謹奏為奏聞事竊臣據巫山營遊擊稟稱據駐防建始縣署把總葉如藩報稱本年十月十六十八等日有容美司土民陸續逃出男婦大小五百三十餘名口由本汛茶寮塘經過前往湖廣紅沙堡駐劄聞說容美土司修齊寨子要將寨外居民調進土民不服搬逃等語隨帶過山鳥機二門小鳥鎗百桿㓲刀百口寄放過山鳥機一門於本塘隨又差兵目前往紅沙堡確查去後續據回稱所有帶出各項軍器現俱存在紅沙堡有湖廣防汛把總于元將土民安插巴東一帶地方候示等語卑職對面觀看司內守烏陽關之土兵約有五十餘名晝夜響鎗不止今汛內南里以至下白沙等處百姓男女心驚躲避卑職㑹同文員於各處安撫百姓歸寧隨復挑領汛兵駐劄茶寮頂塘小心隄防外所有過山鳥機一門不便存留差人送至建汛城內收貯等情又據護重慶鎮劉敬稟據署黔彭營遊擊稟稱據目兵李元良等稟稱探得容美土官差土人八十餘户隨帶鎗炮什物駐劄烏陽坪築城防守關口堵禦湖兵土民商議逃出投明紅沙堡于把總將土民所帶什物鎗炮解赴彝陵鎮當即派委歸州張遊擊帶兵三百駐防紅沙堡等情各稟報到臣該臣看得建始一縣逼近容美隘口繁多今土民五百餘衆攜帶火器㓲刀紛紛徑過以致建汛境內南里至下白沙等處百姓驚惶躲避查該縣防兵單薄不足彈壓稽察臣與撫臣商酌飭令巫山營遊擊曽來印將本營兵丁量派一百名委辨帶領前往建始暗自分防勿許稍有聲張滋事仍選差幹目密探情形不時飛稟至容美土民逃赴湖廣土司有無不法事屬鄰省臣未能深悉湖廣督撫諸臣自必備細查辦奏聞但臣伏思川楚接壤如或進𠞰誠恐需用川兵臨期派調未免急遽似當備而不用除密令重慶鎮預備兵一千名䕫州協預備兵一千名收拾停妥聽候進止外所有據稟容美土衆逃出建汛百姓驚惶以及臣等商酌辦理預備各緣由理合㑹同撫臣憲德恭摺奏聞伏祈睿鑒謹奏兵固當備但須密而又密或托詞防邉預選候調不可令彼驚疑反致激出事端朕審度局勢雖備無用切毋輕舉妄動候㫖遵行雍正十一年十二月初五日四川總督臣黃廷桂四川巡撫臣憲德謹奏為奏聞事雍正十一年十二月初三日據順慶府同知管臚𫝊稟據大竹縣稟稱本月二十一日訪有文興貴文射斗王來聘在於文家山大山內書符書咒假稱有放瘟放虎法力煽惑愚民演習鎗棒當即㑹同營汛選差兵役星往緝捕拏獲黨首文興貴又續獲徐永耀王秀章賈克武王登第李登庸馮殿川文興義等一干黨犯隨訊據供稱尚有要犯朱洪文射斗陳心儀王來聘夏佐五等聞風逃往大竹鄰水交界瓦屋坪之東隱寺山內藏躲等語卑職隨即㑹同遊擊劉應標添撥兵役馳赴鄰水大竹并令該兩縣文武員辨各差兵壯即委典史外委分頭帶領星往彼處四路搜拏外相應通稟等情到臣等據此除飛飭該員等將巳獲要犯牢固禁守其未獲有名各犯迅即多撥兵壯加緊跟捕務獲解報不許踈縱仍恐接壤之逹州長夀等處俱係山箐相連賊犯兔脫又飛令各該地方文武選撥兵役協同查捕俟擒解至日另行嚴訊確情分别首從定擬具題外所有據稟拏獲姦匪情由合先繕摺奏聞伏祈皇上睿鑒謹奏此奏嘉是覽之汝等督撫大吏但肯留心地方稽察姦宄剗鋤匪類朕復何慮之有須竭力窮究務盡根株毋或稍存將就省事之念雍正十二年正月十七日四川總督臣黃廷桂工部尚書暫理四川巡撫事務臣憲德謹奏為奏聞事竊查大竹縣妖言惑衆一案臣等初次據稟拏獲文興貴等一干姦匪尚有朱洪等要犯未獲等情隨即一面繕摺奏聞一面飛飭查拏去後續據鄰水大竹二縣文武報稱要犯夏佐五及黨惡馮帝欽并朱洪等家屬俱經拏獲又據重慶府知府顧贄順慶府同知管臚𫝊遊擊劉應標節次呈報於十二月內將首犯朱洪陳心儀王來聘文射斗周老九等全行拏獲各等情前來臣等伏查此案首從各犯既經全獲隨行令按察司即速轉飭多撥兵役分起嚴押赴省另審確情究擬具有首從各犯全獲緣由理合恭摺奏聞伏祈睿鑒謹奏此案匪犯不旋踵而全獲甚屬可嘉各員役等應重加奬賞示勸雍正十二年二月十二日四川總督臣黃廷桂謹奏為據實奏聞仰祈睿鑒事竊臣據重慶鎮臣吳正揭報中軍遊擊劉敬欺上凌下無所弗為或扣剋馬價或私換營馬或借端攤派與夫侵蝕銀米勒索屬員蠻女非理酷責兵丁私餽希圖䣃過種種貪劣難以罄書守備何正國前既畏威未舉今猶懼勢不言亦難辭咎等因開揭請參到臣臣查劉敬據調任鎮臣馬義路過成都與臣面晤之時極稱劉敬實心辦事操守頗好臣又詢之同城道府各官均言其居官甚好夫當新鎮蒞任之初即素行不端之員亦必自知收斂何竟任意貪劣且臣聞得該鎮之與劉敬因到任接遲索馬未送頗有不睦之說而劉敬為人又素性粗戅平日與鎮署管頭稿房人等俱不相合恐有乘機排擠之弊臣不敢隨聲附和草率列疏是以檄行兩司轉飭重慶府立即嚴訊確情據實詳報如有瞻徇一併糾參等因在案但臣復經密訪該鎮暗令各營招告疵求續揭俟有續揭到時臣一併發司嚴訊如所揭各欵但有一二實在可憑者臣即將劉敬嚴參請㫖究治不敢姑縱所有臣據揭發審未敢即行題參緣由理合繕摺奏聞伏祈聖鑒謹奏覽所奏情節朕不便懸定是非大抵此等事件總以秉公持平為主其間稍涉纖毫私念將來必為己身之纍也雍正十二年九月初二日四川總督臣黃廷桂四川巡撫臣鄂昌謹奏為恭報秋禾收成分數事竊川省自夏秋以來雨暘時若早禾久經收穫晚禾亦巳登場據布政司據各屬呈報彚册造送前來除松潘一㕔鹽源等四州縣不産秋禾外其餘各屬收成十分者共九十㕔州縣衛所九分者共四十六㕔州縣司合計通省收成有九分以上當此萬寶告成之際百姓俱有蓋藏地方亦甚寧謐此皆我皇上敬勤昭格之所致也理合恭奏謹將各屬收成分數另摺敬呈御覽伏祈睿鑒謹奏收穫情形以手加額欣悅覽焉同日又奏為奏聞事竊酉陽土司冉元齡父子濟惡暴虐貪淫經臣等㑹疏題參竝議設流撫輯查酉陽地方緊要經理需員隨委成都通判耿夀平星馳署理酉陽司事一面檄行黔彭營遊擊挑選健兵五十名委該營署守備劉紫襟㑹同赴司彈壓一面委令川東道陸賜書前往周巡踏勘相度地方形勢將作何設營分汛設官分理各事宜悉心商酌詳報去後兹據委員耿夀平稟稱職等於八月初六日抵黔江縣即有司屬之上際容坪二里百姓聞信踴躍齊集二三百人照酉陽司舊規到縣聽候差使初八日到酉陽紳士土民客商人等扶老攜幼羣出逺迎歡呼載道又節據川東道陸賜書等稟稱八月十四日抵司司屬人等逺來迎接人人稱誦雲開見日隨有各里頭人百姓紛紛投遞烟户册籍并地壩平茶邑梅石耶四土司楊勝鈞等陸續來見獻圖繳印咸稱情願改土歸流共樂升平等語臣等伏思酉陽百姓被土司殘虐積怨巳深仰戴天朝傾心向化亦非一日今聞改歸如出湯火其踴躍歡呼具見中心悅服至地壩等四土司久欲內附今委員一到即便獻圖繳印亦屬傾誠除酉陽土司冉元齡等按名拏解審擬并建設文武官兵各事宜俟該道議詳到日臣等悉心妥酌另行請㫖外所有酉陽各地方民情歡悅并地壩等四土司呈懇歸流緣由合先繕摺奏聞伏祈皇上睿鑒謹奏覽奏知道了慎厥終惟其始諸凡建設事宜極當周詳計慮稍涉疏忽致貽罅隙日後責有攸歸也雍正十二年十一月二十一日四川總督臣黃廷桂謹奏為奏聞事據署成都城守營參將李文秀禀據署右營左哨千總張宏仁禀據右營馬兵金寬禀稱十月二十一日小的因操點回家路過什邡堂後小巷內拾得小布包一箇內有紙包紋銀四兩七錢上有龎秀名字小的隨在巷內喊叫竝無人承認後遇撫標兵丁董國仁小的將拾得銀兩告知據董國仁云龎秀係撫標右營出師兵丁小的遂託其寄信龎秀家下前來相認又恐有冒認之處因將所拾銀兩呈繳伏乞發給等情據此查龎秀實係撫標右營兵丁因出師在外伊妻蕭氏領取餉銀回家在路遺失遂𫝊喚蕭氏詢其所失銀兩數目相符隨將銀兩發給領回等情轉稟到臣據此臣隨傳喚兵丁董國仁等詢問緣由其遺銀還銀之處俱與所稟無異竊川省為邉逺之區金寬一貧窮之卒而克敦古道不拾遺金仰見聖德覃敷普天服教雖荷戈微賤亦知禮讓相先也除將兵丁金寬奬賞外理合恭摺奏聞伏祈皇上睿鑒謹奏兵卒雖微拾金雖少但行伍之中能如是顧惜亷恥不昧本心即屬難得應超拔千總以敦義讓之風雍正十三年五月十一日四川總督臣黃廷桂四川巡撫臣楊馝謹奏為恭報夏熟收成分數事竊查川省今嵗雨暘時若夏熟豐收據布政使竇啓瑛將各屬收成分數分晰具報前來查十分者三十八州縣一㕔二衛四所五司九分者八十一州縣一㕔一司八分者九州縣統計收成有九分以上川民當此屢豐之後更獲麥秋共慶天和均霑聖澤再目今隂晴應候四郊甘霔時行髙下田禾栽插巳遍合并聲明謹將夏熟收成分數另繕清摺恭呈御覽伏祈睿鑒謹奏際斯盈寧之慶當益加凛畏更勉公忠試思川省屢䝉天佑頻賜豐年豈文武不和各立門户排擠乖爭之風所能感召者耶若因此而自以為是任情肆念殊非所以仰答天貺矣亟宜返躬內省倘有不慊於中極力改悔毋稍逡巡同日又奏為奏聞事竊臣等節據永寧道劉嵩齡永寧協副將馬化正各稟稱聞得古州等處賊蠻作叛正在差探間隨據護理重慶鎮印務參將李文秀稟據駐防酉陽署守備劉紫襟稟稱探得古州苗人作叛燒殺印水司八弓等寨銅仁松桃現在抽調出兵有快役陳祖華拘提人犯行至騾子灘路遇民人劉國正攜家奔走問其何往據云近日貴州沿河司東流井一帶居民為古州苗亂俱各搬逃今我這裏民户連日聞信逃避只得隨衆避亂及行至臘撒溪見民人攜眷搬走者甚多各等情到臣據此臣等查古州之去永寧甚屬隔逺而與酉陽亦非連界但酉陽係新附苗疆其善後事宜於上年十二月內繕摺具奏未准議覆故營汛尚未安設現在雖有文武官辨帶領兵役在彼彈壓地方料理民事誠恐無知土民聞風逃避互相煽惑致滋驚擾關係緊要查黔彭營兵丁于敬籌酉陽安設事宜案內請抽兵二員逐處曉諭土民各安耕業勿相輕避其鄰近黔奏聞伏祈皇上睿鑒謹奏覽雍正十三年六月初八日四川總督臣黃廷桂四川巡撫臣楊馝謹奏為奏聞事竊臣等前據稟古州苗叛黔民驚避隨撥兵協防酉陽一面繕摺奏聞一面飭令接連黔界之文武員辨不時差探情形稟報去後嗣據署黔彭營遊擊陳錢浩署普安營遊擊李繼經叙永同知何培等節次稟稱探得逆苗頭目包利枉利漢姦張九萬三人糾集苗衆於閏前於大關路上搶奪鹽駝砍傷客民又昭通鎮屬之恩德岡駐劄汛兵蠻人乘夜來劫兵民各被刀傷等情到臣等據此伏查蠻人素習凶殘一處滋事處處每多煽動今古苗悖逆而阿底土兵抗不應調烏䝉又似不安靜雖係差探稟報未盡確實然與黔省連界之建昌永寧等處盡屬苗疆自應預為防範隨寄字建昌鎮臣趙儒嚴飭所屬將辨小心汛隘速選妥役分往凉山沿江接壤烏䝉處所屣看苗情至普安安阜二營內附未久所在皆星往駐劄不但彈壓雷波凉山并可為米貼永善一帶聲勢以安反側又龍場營管轄番蠻與威寧畢節繡壤毗連亦應派千把總二員兵二百名赴彼貼防其酉陽等處前巳派兵二百名更恐新撫之地不敷分防復加派兵丁一百名以資汛守并飭各該文武員辨加意撫輯苗民謹慎地方勿致煽惑滋擾仰副皇上寧謐邉疆之至意惟是此項辨兵離汛逺防所需口糧力難自為備辦應請於駐劄之處如有官倉可以供支者照例每官兵日給食米一升其無官倉處所酌於附近採買運供以資飽騰所有據稟黔省苗民情形及臣等派兵協防緣由理合恭摺奏聞伏候皇上聖訓遵行謹奏汝等封疆大吏措置此等事件以不動聲色鎮靜慎密為要切勿稍涉急遽搖惑人心寄字趙儒亦令備悉朕意撥兵增汛屣看苗情各事務俱應從容不迫相機合宜倘露有張惶景象致起番蠻疑畏之心則大不可也硃批諭㫖卷二百十八下
