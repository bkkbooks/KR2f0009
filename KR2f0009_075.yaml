body:
  text: 欽定四庫全書硃批諭㫖巻七十五硃批許良彬奏摺雍正六年十二月初二日南澳總兵官臣許良彬謹奏為奏聞事竊臣䝉皇上隆恩擢任南澳總兵官於雍正六年八月初六日抵澳業經將到任日期繕疏題報外臣視事後當即查驗兵船整頓營伍隨親歴福屬轄汛海洋遍閱形勢并查年歲豐歉今歲南澳地方兵民樂業米價頗平八月内每石米賣銀一兩一錢五分九月内每石米賣銀一兩一錢十月初旬晚稻登場收成約有七八分不等至十月十三日臣躬歴廣屬轄汛洋面各要處亦見晚禾茂盛地瓜蕃衍風雨和調豐登有慶現在每石米賣銀九錢至一兩不等比户歡慶歌頌太平理合據實繕摺陳明伏乞皇上睿鑒謹奏覽奏知道了地方上凡如此等情形只據實上達為要絲毫不可涉於粉飾切記毋違同日又奏為謹陳捐除榖石以資兵食事竊思足食足兵為政事之首重而或豐或歉歲序不齊查南澳為閩粤要區懸於海島田地無幾産米有限且太平日久生齒浩繁營内兵丁樂歲米賤尚多拮据一遇米貴有艱食之虞是以兩廣督臣孔毓珣於雍正四年六月内題請為酌議沿海緊要鎭營積貯榖石以備兵食一疏奉㫖依議欽遵在案現在廣省提鎮協營造倉買榖分貯各營借給兵丁行之有效臣所轄親標右營屬於廣東已經督臣於積貯案内發銀一千二百兩買榖二千石交右營將備經管貯倉屆期借給兵丁無庸再議外惟左營屬於福建尚未舉行臣愚以為兩營兵丁均屬朝廷赤子似應一視同仁臣叨沐天恩授以海疆要地顯榮已極自惟起家寒素日用之間勉從節儉請以皇上賞臣俸金及隨丁項下銀兩捐買榖二千石併建造倉厫發交左營將備積貯循照兩廣督臣孔毓珣積榖分貯沿海各營事例遇青黄不接之時給借兵丁約於秋成後散餉時令其照數買還概免利息仍令左營將備經管提鎭不時盤查毎年終具該營將備買貯無虧印結送部新舊交代亦照正項錢糧事例如有侵那短少叅追治罪庶海島兵丁亦可緩急有濟矣臣仰體皇上愛養兵丁至意冒昧陳請伏乞皇上睿鑒俯允施行臣不勝惶悚待命之至謹奏此奏是殊屬可嘉候另有諭㫖由部頒發雍正七年三月二十一日南澳總兵官臣許良彬謹奏為據實檢舉事竊臣於雍正六年瑞安副將任内荷䝉特恩召見擢授金門總兵恭聆聖訓䝉皇上問及瑞安副將員缺誰可接任臣時以瑞安新改水師必需熟識水務之員方克勝任即以臺灣安平協標右營遊擊蔡添畧奏對又䝉問及安平右營遊擊員缺亦是水師誰可接任臣又以熟練水務之水師提標左營守備蔡國駿奏對俱荷聖主俯照微臣所舉補授旋奉面諭爾回去傳諭二員各做好官日後如稍變節爾即查叅臣隨銜命旋閩嗣䝉恩㫖移調南澳重任比至厦門遵將諭㫖先傳蔡國駿跪聽復諄誡其恪供厥職圖報國恩臣謹遵聖諭時時查訪詎意該員赴臺視事甫逾半載不思自愛用人不當致玷操守臣於本月二十日赴金署篆訪聞益加確切現經訪確謹當遵㫖據實繕摺入告仰懇嚴加處分俾各將弁知所儆畏至臣保舉不稱福建武員操守不潔者非止蔡國駿一人亦無怪汝之保舉不稱也雍正七年九月初八日南澳總兵官署理金門總兵官印務臣許良彬謹奏為奏聞米價事竊閩省本年自春徂秋下游之漳泉二府雨暘時若髙下田畝收穫率有七八分又䝉我皇上預截漕米運發到閩平糶故新榖登場如金厦之米每石八九錢不等至於粤東如臣屬之澄海門達濠等處臣時行查察皆據報米價六七錢不等現在晚稻亦各茂盛吐穗揚花可期大有臣縁署篆金門總巡海洋上下内外肅清商漁樂業悉由米價平減所致具見時和年豐人民安堵理合一併奏聞伏乞皇上睿鑒謹奏覽收穫豐稔米價平減情形朕懷深慰但其間無絲毫粉飾之詞方實為可慶所奏船篷大書號字之摺已交與該督髙其倬矣俟伊回任後汝等再加商酌奏聞朕意徒多一事耳似屬無益雍正八年二月十七日署理福建水師提督印務南澳總兵官臣許良彬謹奏為備陳晴雨米價事竊臣駐劄厦門密邇漳泉内地適際春耕之候幸逢時雨霑足細查各屬邑悉皆漸次插秧每米一斗價銀八分似此時和春藹播種及時邊海兵民咸歌樂利理合繕摺奏聞伏乞皇上睿鑒謹奏據奏時雨霑足米榖價賤深慰朕懷同日又奏為糾揭欺冒以儆官邪事竊查臣屬南澳右營守備林甲俊於雍正六年六月内該營南字六號趕繒船出洋哨巡遭颶擊碎淹沒弁兵具報前鎭臣陳祖訓轉報題銷臣於本年八月内接任於視事題報内聲明出洋統巡本管廣屬洋面期滿回署即於七年正月内承福建督臣髙其倬委署金門總兵印務正值春巡之期隨統舟師總巡閩省南洋直至九月接准廣東藩司移開鎭臣陳祖訓所報右營六號船准銷補造令將淹殁及得生弁兵分别造冊請領䘏賞當於洋面轉行該營遵照去後迨臣總巡方滿於十月十四日交卸金篆又於本年十一月内承署督臣史貽直調赴厦門協理提督事務繼又實委署理離澳日逺未據該營報領䘏賞日期隨經行查至今未據覆報細訪此項銀兩已領在營兵士煩言嘖嘖該備此中不無乾沒情由因復飛遣密查六號船當日實止淹沒把總一員兵十四名得生兵丁九名該船冊報六十名除實在存歿兵共二十三名其餘三十七名皆屬虛報今概全邀䘏賞通共領銀二千零八十兩等語臣查此項銀兩歿故一十四名每名五十兩應給銀七百兩得生九名毎名三十兩應給銀二百七十兩合應給銀九百七十兩尚存銀一千一百一十兩守備林甲俊先既冒報於前今又冒領於後似此欺誑貪婪之員誠難一日姑容縁臣現署福建水師提督印務該備屬在廣轄當即飛移廣東督撫提臣糾叅外至臣雖接任後皆在閩省署理未能糾叅於先而該營遊擊王棟雖亦報後視事均疎查檢皆難辭咎應交部一併處分理合繕摺奏聞伏乞皇上睿鑒施行謹奏此奏可嘉已有㫖諭部矣雍正八年五月二十四日署理福建水師提督印務南澳總兵官臣許良彬謹奏為請設立巡檢以約束番民事竊臺灣處閩東服為全閩海表藩籬與内地七省水道相通南北延袤二千餘里其番社新舊歸化户口不下二三萬社每社男婦老㓜多至一二百人少亦不下數十人隔越數里方有一社地方遼濶最易藏姦向無專設授職之土司董理鈐制惟有正副酋長號為土官實不過一社之頭目仍一番民而已是以不能約束雖分屬四邑然縣令但司催科亦不過問之管事其餘悉莫稽察以致番民徃徃生事臣按雲貴川廣土府有世襲之土司今臺灣既入版圖久設漢官固無庸議及改土設流而社多番稠必於彼處按其社之聯絡處所或數十社分設一土巡檢司使鈐束教導稽察防閑俾已附之番咸知聖朝教澤未附之番亦皆感奮招徠至於巡檢職守令擇大社中才幹篤厚之酋長為之給與號紙與以頂帶如雲貴土司之例各守其地管轄各社土酋長一應番民行止惟巡檢是責徵糧輸課皆出其手毋使漢官衙役入鄉漁獵汰其社之漢人管事以免剋剥倘有遊棍到彼勒索與夫姦匪藏匿於彼均許土司一一報縣其各土司仍聽該縣管轄則土司自不能放縱一有事故斥革則請拔舊管之酋長繼之敢有不職仍聽申揭府道詳叅另選庶各社俱有節制番民不敢妄為矣再金門鎭地方有明季廢城登埤一望内外洋面帆檣徃來瞭然在目官兵屯駐具間實居形勝自光復設鎮以來不復駐劄於此只圖茍安就於港内後浦地方暫駐相沿至今查厦城現已屯兵則金厦自當如一但金城頽廢日久必加砌土石起葢樓垣并將官兵衙署營房添造完整方可移駐倘䝉俞允其應撥帑項應行文員估計請㫖舉行臣前署金門深察形勢洞徹底裏謹抒末議仰惟聖明採擇敕部議覆施行至於全閩水師尚有應行添撥改調之處容臣次第咨呈督臣轉請合併聲明伏乞皇上睿鑒謹奏悉與督撫臣商酌妥協如應具題㑹題請㫖硃批諭㫖巻七十五
