body:
  text: 欽定四庫全書硃批諭㫖卷七十硃批甘國奎奏摺雍正二年七月二十四日浙江按察使臣甘國奎謹奏為備陳地方情形事竊臣一介庸愚知識短淺仰䝉皇上天恩畀以刑名重任受事以來朝夕兢惕勉供職守惟是浙土俗尚刁華方事化誨成效未臻而吏治率皆疲玩以致案牘拖延業經嚴飭勉勵如再悛自河道汊港令州縣添設巡船往來巡邏如遇賊盜鹽販飭巡役與汛兵協力捕捉不致漏網又於汊港橋梁俱各設立柵欄責令鄉地保總嚴其啓閉衢等府山內種麻種靛流寓閩人亦皆酌編保甲按户可稽逐漸而行庶姦良易於區别至於海上洋面督撫二臣已飭將戰船及商漁船隻於船傍篷上大書字號并船戶兵目姓名使瞭逺者一望而知如有作姦為匪便可擒捉庶宵小有所警畏惟是浙省武備廢弛將驕卒惰玩法生事者居多如湖州營守備黎元途遇私鹽輕躁妄動經督撫二臣會疏謐端賴守令臂指任使舉措無違方收實效現在勤加訓導以期無負皇上委任至意再臣於六月初十日受事適逢澍雨連日禾苗得蘇逮今雨澤接續可望豐收惟於七月十八九等日風雨猛烈海潮洶湧沿海塘岸多有臣委藩司親詣查勘俟查明處所由撫臣耳奏合將現在經理情形繕摺上陳謹奏黃叔琳如此妄作亂為爾心懷隱誑不行據實直奏而為實力整飭公務之語以欺朕此外所言朕亦糞土視之耳何暇披閲雍正二年九月十五日浙江按察使臣甘國奎謹奏為敬陳下悃仰祈命來浙與藩司臣佟吉圖同時入境共聞有黃叔琳杖斃賀懋芳一事臣到任後曾經向黃叔琳面說此等事件應發審定擬人命重大未便輕視再三勸勉在黃叔琳亦自知愧悔且係臣未到任之事是諭㫖復加細察知陳世倌與黃叔琳原屬姻親而賀懋確實正在繕摺間有密參黃叔琳奉㫖察審之案又接署撫臣佟吉圖發下賀懋芳之妻聞氏呈詞行拘各犯其詞內情由臣不敢瑣陳謹抄呈御覽至於杭城罷市實無聞見但臣到浙時黃叔璥尚在叔琳署內是實今將軍臣安泰與佟吉圖現在㑹審惟是黃叔琳辦事性急未免周章在錢糧事恩深重惟有仰遵聖訓刻刻以察吏安民為念何敢上負天恩自甘暴棄今䝉聞謹奏承審此事者倘少有瞻顧及偏執處據實奏聞雍正二年十一月二十四日浙江按察使臣甘國奎謹奏為敬陳下悃事臣查浙江按察司衙門向有各屬四季節禮連隨封共銀一萬七千七百四十兩零鹽務規禮連隨封共銀四千四百兩刑名部費四季共銀四千五百三十七兩零臣身受皇上特逹之知報效未遑何敢濫收以充囊槖臣於節禮因浙省公事繁多火耗輕少恐各屬藉口虧那是以全不收受祗收鹽規一項以為日用至於刑名部費原以供刑部書辦紙筆飯食之需臣到任時雖未奉㫖嚴禁然慮有染指之嫌已交與杭州府魏定國經手而該府因各屬俱未交付尚未料理近奉諭㫖嚴禁仍念及此輩紙筆飯食之用仰見皇上體察下情至意臣愚以為若盡行革除則此輩紙筆飯食無從備辦恐難枵腹從事可否每季或給銀二百兩一嵗共計八百兩庶使此輩得殫心效聖裁再浙省賑恤饑民臣應捐銀一千兩臣因無項可解尚未措辦查刑名部費倘䝉聖裁總之臣凛遵訓㫖清白自矢不敢稍有隱匿惟期竭力辦公以仰答髙深於萬一耳謹奏但務實行總不在章奏之間也同日又奏為遵㫖奏明事竊臣齎摺家人回浙恭捧皇上硃批諭㫖臣跪讀之下益深凜惕敢不加謹勉勵以期報稱伏查黃叔琳一案經將軍臣安泰署撫臣佟吉圖會同題奏已䝉皇上洞鑒特頒諭㫖敕令覆訊仰見聖主精詳慎重至意兹於十一月初四日將軍牌行飭提陳世侃黃叔璥等各犯到臣當即委杭州府立刻鎖拏黃叔璥等并令該府星赴海寧縣鎖拏陳世侃等押解將軍署撫臣收審臣密行查察初十日十一日連審二次陳世侃黃叔璥俱無確供而陳世侃供出係伊兄陳世倌有書信來轉向黃叔琳囑託拏究之語並未詰訊亦未動刑十二等日據錢塘縣報稱陳世侃黃叔璥患病未審十七日病愈十九日會審一次陳世侃供稱賀懋芳與世侃三嫂子家人打架黃巡撫因是親戚四月十九日央求巡撫處治他替我嫂子出口氣不料巡撫把他責死了黃叔璥供稱家人在外買紬縀角口是有的各等語並未究詰亦未動刑二十日據錢塘縣報稱陳世侃復病二十一日將軍牌行知照陳世侃暫停解審餘犯又會審一次將黃叔璥去襪未夾將黃叔璥家人凌霄王榮各夾一夾棍止供買手巾刷牙細物二十二三兩日未經審訊尚在懸案臣查陳世侃已經招認央求黃叔琳處治出氣不料黃叔琳把他責死則立斃已屬情實而黃叔璥承認家人在外買紬縀與人角口尚未究明審定其陳世倌亦並不究及總之此案情罪難逃聖明鑒察臣不敢欺隱謹將歷審情由據實陳奏伏祈睿鑒謹奏所奏知道了百凡惟以無隱為務雍正二年十二月十五日浙江按察使臣甘國奎謹奏為密奏事竊十二月初八日督臣滿保以查勘海塘到杭於十二日往嘉興一帶查看當督臣船未到時同城文武在北關馬頭忽聞人聲喧嚷查係督臣隨丁毆打鹽驛道王鈞轎夫經仁和錢塘二縣察逐而督臣船上家人李姓者將仁和縣知縣胡作柄詈罵辱及父母該縣候督臣船到即刻禀買備官馬定價十九兩二十兩不等以致官兵嗟怨又旗厮私放印錢重利盤剝民多怨纍臣即行命調任西安已於初十日起程而新撫臣法海尚無到任日期又時迫封印臣仰體皇仁將發回應黃叔璥一案據報痊可今陳世侃已供明黃叔琳留伊喫飯坐在後堂黃叔琳出堂杖責賀懋芳是實又黃叔璥家人供出買物之鋪戶亦已到案至恩深重凡有見聞不敢欺隱謹繕摺密奏仰祈皇上睿鑒謹奏此奏誠實可嘉悉能如此爾之䝉福不能限量也雍正三年三月初三日浙江按察使臣甘國奎謹奏為遵㫖密奏事竊查販馬一事臣訪聞係將軍臣安泰管事家人梁大夥同前任將軍諾羅布家人董二從口上販馬到浙散給旗兵每匹價銀二十兩十九兩至十二兩不等按月糧扣還馬匹多屬疲瘦是以窮兵含怨至黃叔琳一案承審官定擬未當䝉皇上洞鑒無遺寬嚴允協合省官辨兵民無不敬服頂頌聖明臣仰承諭㫖謹據實密陳伏祈睿鑒謹奏朕之明與不明全賴爾等撫司大吏之秉公據實不欺觀此更當勉勵一無隱蔽以贊助朕之政治并以利濟社稷蒼生也勉之同日又奏為奏明事竊杭州乃省會之區商民繁庶整飭地方務在戢暴安良自臣任事後嚴禁結黨打降以除惡習乃有仁和縣土棍董御天於二月二十一日在倉橋麵鋪賒缺毆打次日復糾合旗人陳老八胡老六等并不知姓名多人擁至麵鋪復行毆打毁壞器皿并連打别家鋪面四座以至鄰近二十餘家畏其凶勢關閉店門臣一聞知立刻飛飭杭州府嚴拏隨據府詳董御天等藏匿旗下臣即詳撫臣咨提并檄杭州府魏定國兼理理事同知特晋德嚴行究治尚未審報又據紹興府申稱餘姚縣典史程時中自刎因為黜革武生徐文中等赴督臣滿保控告該員擅受民詞督臣發該府查審情憤輕生等語撫臣法海恐别有隱情檄令臣會同布政使佟吉圖究訊現在提犯嚴鞫俟審明議覆奉㫖通行臣欽遵之下伏念臣之幕賔實係浙江人但歷任相隨老成拘謹臣所深知今别行延致初經識面才具心術殊難相信況臣衙門乃全省刑名總滙民命攸關若延致非人貽誤不小現在别省採訪恐一時難得臣一生敬謹不敢隱匿合併奏明統祈皇上睿鑒謹奏所奏幕賓情由已悉將奏明准爾留用之處令法海佟吉圖知之雍正三年三月十八日浙江按察使臣甘國奎謹奏為奏聞事竊台州府屬臨海縣知縣王郊經督臣滿保題參委嵊縣知縣宋斆署理王郊虧空倉庫交盤未清宋斆不肯接受王郊以原籍房産凂寧海縣知縣趙豫信置買擔承虧空趙豫信先付王郊銀五百兩下缺之銀台州府知府楊廷璋著趙豫信出具印收繳府轉給宋斆交盤出結宋斆以王郊無現銀不受旋經宋斆解任趙豫信接署臨海印務而楊廷璋遂逼勒趙豫信交盤出結因其不允甚至面叱換詳王郊反以趙豫信不肯出結揑稱有銀交付申詳布政使批查趙豫信以先付王郊之房價無著繳府之印收不還情極輕生於三月初六日自刎初十日畢命據黃巖縣知縣李淑端驗報并訊據趙立本口供臣細閲情事顯係知府貪殘逼勒當即將知府楊廷璋開揭詳參以便檄提官犯嚴審確情究擬因事關知府逼勒印官自刎謹據實先奏所有撫臣封發趙立本控詞及黃巖縣訊取趙立本口供一併抄録恭呈皇上睿鑒謹奏知道了極當秉公審理朕看楊廷璋光景殊屬可惡雍正三年五月初十日浙江按察使臣甘國奎謹奏為敬陳海疆事竊臣於三月十四日經督臣滿保檄飭查議鱉子亹河莊山添設官兵防守一事仰見聖明燭照軫念邉海民生至意欽承之下隨委杭州府魏定國會同水師副將李燦踏看繪畫全圖到臣謹按河莊山雖稱海口實為內港海船乘潮可進潮退則膠非如吳淞乍浦等口可以揚帆徑進也此地原設有炮城名為司城安炮八門有千總一員兵八十名唬船四隻稽查匪類在河莊山之東南陸地則有紹興協寧波提督及城守營接連鎮海等汛東北岸則有海寧汛防沿往東北即鳯凰山亦有炮臺防兵再往東北則有嘉興協海鹽澉浦汛防乍浦新設水師與鎮海新改水師此外又有定海重鎮官兵巡查外洋扼要掎角擁護錢塘江門戶至河莊山地勢褊窄山石凹凸司城狹隘而海灘悉屬浮沙漲沒不定水性極鹹牧放馬匹以及搬運米薪淡水似屬不便今現據河莊山居民人等以兵民難以混處為詞具呈臣謹録原呈并繪河莊山一帶全圖恭呈御覽可否移駐伏候睿裁再董御天等結黨逞凶經臣奏聞一案今據杭州府知府並理事同知等審明將為首結黨生事之民人董御天旗人陳老八胡老六俱照例分别旗民發寧古塔烏喇解部發遣餘犯分别鞭枷杖徒具詳到臣經臣轉解撫臣法海會審具題合併陳明統祈睿鑒謹奏所奏知道了事事咸能如此保爾上進有日也同日又奏為密奏事竊臣聞溫州府屬樂清縣一帶地方潛有匪類煽惑愚民臣即密飭該府廳密察據實速報今據禀稱細加查訪此種匪類浙閩及江西皆有總以邪教引誘騙人銀錢為事其首惡實在閩省而姓名住址未訪的確等語臣思宵小煽惑不過為騙誘錢財起見然勾引滋蔓貽害良善所關甚巨是以臣密會布政使佟吉圖馳禀督臣滿保并知會溫處道王斂福因撫臣法海操守甚清而性情褊急辦事不甚防間誠恐泄漏未敢即為通知今已嚴飭該府廳細察確實形迹姓名相機密奏惟是海疆重地實關緊要如寧台溫沿海各屬近者數百餘里逺者千有餘里遇有緊要信息一時不能即通全在府縣各官善為治理杜遏姦匪防患未萌無如各該員中拘執平庸者多才幹有為者少即今台州府及寧海縣現在缺員事多遲滯皇上厚恩逾於格外鰓鰓過計冒昧陳奏伏惟聖明照察再時屆秋審經撫臣法海准部咨轉行陳世侃陳源生陳若嵎一案臣查定例應入秋審隨詳明撫臣提犯會勘而撫臣批飭陳世侃等無庸秋奏明更有附奏者因布政使佟吉圖偶患瘡疾臣往海寧縣代祭海神適於回省時聞有拏錢塘縣人陸淵并將四川東鄉知縣差役傅文榜收禁一事而臣未見檄行不知事由聞係撫臣准前任川陜總督年羮堯咨拏訊䆒者合併密奏統祈皇上睿鑒謹奏甚屬可嘉知道了雍正三年六月初二日浙江按察使臣甘國奎謹奏為再行密奏事竊溫州府有匪類惑衆臣已繕摺奏聞續於五月十四日溫州總兵臣邉士偉過省抵任臣跪請聖安隨密以此事通知密會溫州府知府芮復傳同知楊吉祥協力查拏今據芮復傳禀稱永嘉縣首犯范子盛經守備張進升拏獲交府該府立刻會齊同知楊吉祥飛詣范子盛家搜出金牌銀牌名簿并五爪龍紙數張內止書姓不書名並無别語亦無僞銜隨訊供在溫餘黨拏獲七名一面委員同張守備赴樂清縣密拏夥犯倪允信等并據范子盛供出首惡王文治住居福建省城湯門內又有教主姓張號為彌勒老佛住居布政司後白雲洞而督臣滿保亦因此事已有密札到溫州矣現在地方寧謐等情續據同知楊吉祥禀稱密會守備張進升於五月十三日拏獲范子盛即親詣其家搜出五爪金龍白紙數張上有人姓暗藏字眼又有大小金銀龍牌十餘面一應書信字跡併姓名冊籍二本以及金龍丹藥據范子盛供稱邪教惑衆如溫州永樂瑞平四縣約男婦五千餘人若看冊上不止此數如在溫州乃范子盛為首閩省江西以及寧台紹各有掌管堅供不知姓名其在福建省城首犯王文治住湯門內畢水巷凡給劄牌丹藥各物俱係王文治經手另有天地當來虛空家鄉彌勒等號俱在布政司後白雲洞范子盛從未見面據王文治云務待圓滿方可見面更有太隂老娘娘住北京大同關等語所有搜出劄付名曰合符以及金銀龍牌葫蘆併推背圖來往書信內中不經不軌字跡解銀回單俱面同封貯其范子盛惑衆之言以天地巳屆末劫午未之年就要塌陷喫此丹藥有此牌符可以逃劫等語至於夥犯倪允信一名於十五日拏獲解交芮知府緣奉飭拏合將拏獲情由備禀外抄畫金銀牌一紙合符一張等情臣現在密會布政使溫州鎮溫處道并飭該府嚴究一面密令寧台紹三府密行訪拏盡根株今據各稟報再行密奏并將該同知原抄畫金銀牌一紙合符一張恭呈御覽謹奏知道了但不可滋事圖功以及寃誣無辜之人此一事深賴爾籌畫得宜也同日又奏為謹陳下悃事竊臣才識淺薄荷皇上厚恩時切凛惕凡屬政事惟有遵守律例秉公辦掄彬因鹽犯張天寶等殺傷官兵一案係二參之件自行來省與杭州府會審適臣於五月二十八日服闋延糧道蔡仕􅘎為臣生母陳氏點主鹽驛道王鈞副將李燦知府魏定國曹掄彬均至臣署等語查定例題參摘印應檄臣衙門奉行今竟不檄行則所謂上司是指臣而言也續於二十九日布政使佟吉圖主稿移臣會揭曹掄彬內開該員甚是糊塗居官懈怠臣以撫臣既已移回布政使在案又德清縣沈慶元等毆斃沈廷標一案知縣盧志熙覆檢尸傷尸親以檢驗不實將骨桶搶去知府曹掄彬將盧志熙以溺職揭報臣等毆傷徐殿臣威逼投河自盡一案臣駁訊確實問擬軍罪其原謀助毆已斃三命亦例得減等隨經詳解撫臣令錢塘知縣楊夢琰傳言令臣檄行該縣嚴審臣即檄飭而該縣將馬秀臣等疊夾並無疑竇楊夢琰又傳撫臣之言云以易結不結參臣本已繕就臣處心無愧惟有靜俟而已忽於皇上簡任如違拂其意則事多棘手民多拖纍臣進退維谷不得不直陳於君父之前統祈聖鑒謹奏覽所奏不公爾必有把柄已被法海執捉恐其參奏欲以先入之言來動朕聽光景此等伎倆何能逃朕鑒照向後斷乎不可無益而徒有害也雍正三年七月初九日署理浙江巡撫印務按察使臣甘國奎謹奏為奏聞事竊臣一介庸愚荷皇上厚恩凡見聞所及不敢狥隱伏查浙省風俗柔華人心刁譎駐防旗兵居處日久生齒日繁後生之輩易於習染所賴鎮守諸臣宣揚皇上教養之恩朂其守正向上以報效朝廷耳今年羮堯於七月初二日到任仍似大將軍氣象且聞年羮堯語旗人云爾等窮苦我所深知能隨我說斷不令爾等窮苦雖屬撫慰旗人然意指含蓄非所以朂勵之也年羮堯受皇上莫大之恩自干重譴理應時加凛惕以逭罪愆乃仍然奢肆語言狡詐慢無警懼稽其所坐之船先到者已三十餘隻聞未到者尚有四十餘隻而家奴復有家奴到杭者男女已不下千人後來者尚未知其數所住衙門人已居滿聞將長隨等類分皇上睿裁至溫州邪教其在浙在閩為首之人皆已拏獲而無知被誘愚民俱令其各繳出所造牌符等物一概自首免究其福建王文治陳立昭等溫州范子盛倪允信徐璞如處州季海官等現在飭審究擬但伊等邪教煽惑雖志在誆騙然日久蔓滋所當亟行懲究仰祈聖裁如何處治以警姦匪以彰國法庶便祗奉遵行江西巡撫裴􅏍度臣遵諭㫖於六月二十四日寫書差人通知令其密行察拏寧戢地方合併附陳謹奏邪教人等分别等差發落之處已據滿保議奏矣應照伊所奏料理硃批諭㫖卷七十
