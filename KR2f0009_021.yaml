body:
  text: 欽定四庫全書硃批諭旨卷二十一硃批佟吉圖奏摺雍正元年七月初四日臣佟吉圖謹奏為瀝陳愚悃仰冀照鑒事雍正元年七月初四日臣接到部文欽奉嚴旨隨向北叩謝天恩摘印繳敕就鎖候解泣思臣受皇上格外隆恩千古未有雖在犬馬亦知報效今絲毫案卷可查不待臣辨白但求皇上曲賜矜憐留臣生命到京得陳始末即就斧鉞亦所甘心臣不勝戰栗為此瀝血陳情謹奏爾但能辨明無罪朕仍可録用何必待到京方陳始末光天化日之下齊蘇勒嵇曾筠豈能將爾枉屈含糊致於斃命諒無此理朕原實心惜爾爾不自惜不肯為朕所用其奈爾何如果辨明情節不但全然無罪即少不似齊蘇勒所參之欵朕猶可恕爾也雍正二年六月十八日臣佟吉圗謹奏為欽奉上諭事臣於五月二十八日抵蘇即傳旨與署江蘇巡撫何天培布政使鄂爾泰嗣於六月初九日至浙江北新關外巡撫黃叔琳因會同福建總督滿保看視東湖臣即於舟中敬傳諭旨初十日臣到任所又傳旨與將軍安泰巡鹽御史噶爾泰隨將到任日期詳明巡撫具題外所有臣沿途訪聞各事遵旨具奏竊臣至揚州細訪兩淮鹽梟皆出入於揚州府屬之三港營沿江一帶地方不獨是本地之人即河南山東之人俱有究其所以興販之由皆因得利利益多是以私販之人雖嚴禁終不能止臣愚以為除弊必清其源竈户之所以樂於私賣者必有場竈既無私售則鹽法漸可肅清至浙江産鹽地旨查訪松江海水滷田一事細訪得被滷地方如松郡之所屬華亭婁縣青浦上海四縣皆有河道通潮其潮之來有二道一由黃浦江進口一由吳淞江進口而兩口之上流皆納受太湖并諸山諸溪之諸山溪之水甚淺適於三月十六日又東風大作十餘日所以四月初旬潮水由黃浦江湧至上海等處味皆苦鹹以致嫩秧滷壞後於四月二十七日得雨數寸閏四月二十三日復得大雨兩口之水皆奔騰而下潮來水味盡淡松民補種新秧盡出五道各處俱通訪得此中頗有姦民為盜晝則以捕魚為生暮則以行劫為事更有一種姦民慣為採生之事各有小船名為包裹頭船散在太湖並浙江嘉興湖州各溪港幽僻之處將拐騙男女做成殘疾之狀每日責令入市化錢又有一種婦人假扮星卜或向人家求食借宿乘機乃行不良之事而窮鄉僻壤小民受此荼毒必有本地土棍又自淮抵蘇詢問各處皆得雨澤禾苗甚好浙江於六月初十日起十二日止晝夜大雨臣查得雨之處甚廣田禾霑足臣因初到地方之事尚未周知先將所過地方訪知各事並繪松江府輿圖恭呈御覽謹奏覽所奏甚屬詳悉朕意爾等藩司若明上摺奏未免物議一省事權不專有兩三巡撫之嫌所以前諭爾將奏摺交怡親王代為轉奏今爾家人為何竟直詣宫門進摺耶嗣後凡有所奏遵旨密交怡府即或王偶有出京之差自必另有託付之人在府也雍正二年八月二十八日署理兩浙鹽政布政使臣佟吉圖謹奏為欽奉上諭事竊臣蒙簡任浙藩陛辭之日恭聆聖訓日夕在心念惟天語丁寧事機密重必從容得實乃可仰答聖明垂問臣自南下之後至清江浦漕臣張大有相見看其質性醇厚而於旗丁屬員不能約束蓋或才分所限非有意故縱也江蘇接近浙界臣往來之因此武辨驕悍多有愛憎之誤又石門縣知縣王以和臣奉又浙省七月十八九兩日東北風大作猛雨隨注兼值秋汛潮大之時水漫塘工淹沒沿塘場竈居民田畝臣即星赴被傷之處酌量捐賑并逐一細查被傷等地詳報撫臣具題外臣又歷視海岸塘工有石塘草塘土塘之分水漫之後有倒塌者有完固者現今逐處修築但海水係風勢湧至退去甚速故內地田禾並無傷損秋成大好合并陳明謹奏海塘須於冬末春初儹修完整方好不然恐春潮狂大或再有疏虞為害難量朕意欲如山東去歲挑淺之例修築堤工即可藉以養窮民也爾與石文焯速商具奏同日又奏為浙省耗羡不敷公用請酌捐俸工以濟諸費事竊臣受恩深重屢叨要任必實心體國為民早完公事以盡臣職念錢糧之有火耗雖非正項但一切公費取給於此勢在必需要在酌其輕重隨地隨時而增損之庶幾上不誤公下不病民于公事為有益也臣前任東藩實查通省正項三百餘萬火耗加二約有六十餘萬兩除官吏養廉之外於地方一切公事備辦有餘臣今查浙省少者臣查通省積年有無著虧項當賠二萬餘兩又修戰船部估原不敷用當津貼銀一萬餘兩又歲解部費約有二萬餘兩皆當取之火耗以公辦公而浙省額徵不過二百六十餘萬合算五分之耗以抵三項之用其餘地方公事當捐當助者又不敷用臣意欲將浙省火耗加增以為變通之道恐撫減於前司加于後當土薄民浮之處未免人情不服再四思維惟有俸工一項雖已奉奏明倘邀聖鑒俯允一轉移之間公私兩濟矣俟别項可通即將俸工停捐但事屬違例恩由破格可否悉候聖裁謹奏爾等避加耗之名固當朕既禁捐隨復諭捐此等遊移之名獨不當避乎即萬不得巳權變轉移或爾等通融一時猶可若欲朕批諭而行則斷然不可加耗捐俸總候石文焯抵任後爾等悉心籌畫而為之此非朕可破格施恩之事也雍正二年九月初三日署理浙江巡撫印務布政使臣佟吉圖謹奏為陳明撫恤災黎情形仰慰聖衷事竊浙省於七月十八九兩日偶值風潮沿海府縣致被災傷臣即親㩦銀兩馳赴浙西一帶親加查賑又念被災之民口食維艱臣仰體寧台道王一導糧道徐琳分頭查賑招民築塘亦即舉行及臣由松江掣鹽回省查得紹興之餘姚被災獨重恐前捐給尚有未周又續發銀五千兩迅查補賑查海塘衝塌例有歲修有民户承修今興工以寓救災一槩官為給值計各處米價之貴賤視其一日之工以給一日之值務俾毋致失所但恐各該府縣一時無項撥給臣已飭動正項册報核銷其地方有鹽場竈户被災者臣即飛飭鹽驛道王鈞齎銀安插合計前後賑災陸續發過銀一萬五千兩臣等公捐其塘工所動正項應著落在工原任巡撫臣李馥原任台州府知府高泓速行填補臣當聞災之日急往賑恤未及詳細摺奏今設法撫綏巳有次第恐尚厪聖心除被災地畝分數多寡俟册報到齊彚題請蠲外謹將捐賑情形繕摺奏聞謹奏料理允協實實可嘉如此方不負朕之擢用也朕今降旨賑濟修塘開濬西湖諸務齊舉爾其竭力勉為之朕正為浙省黎庶繫念覽奏深慰已命動正項修砌海塘并令五省買米載往蘇杭平糶矣此數事爾意如何可少解爾等之為難否耶雍正二年九月十五日署理浙江巡撫印務布政使臣佟吉圖謹奏為欽奉上諭事竊臣奉旨署理巡撫印務九月初三日受印任事準前撫臣黃叔琳遵旨將所奉上諭奏摺等項開單移交到臣臣謹祗領訖內有請將理事同知特晉德調補紹興知府一件奉旨著詢伊能否兼管理事同知事務臣欽遵傳詢據該大山私鹽出入匪類易藏今知府曹掄彬雖亦稱職然必得強幹能員資其彈壓于地方更有禆益諭旨上請聖裁再臣恭讀前撫臣送交硃批奏摺內尚有私梟邪教河道竈課里書關稅羡餘追沈淵補庫銀兩及傅澤淵俸工樁木等銀準抵諭旨不敢擅便謹一併奏明統候諭旨遵行謹奏覽同日又奏為奏明海關贏餘銀兩仰候聖裁事竊臣奉旨署理巡撫印務九月初三日臣受印任事適屆海關一年限滿奏銷之期臣即清查徵收解貯數目有無虧缺查得海關歲額除役食外其銅斤水腳並加增及加徵絲稅等銀兩共該解四萬五千六百八十五兩零自雍正元年十月起扣至本年九月止經前撫臣李馥等歷任交代徵收陸續解交司庫通共銀三萬四千二百三十七兩零尚欠銀一萬一千四百四十八兩零係臣署事後所當催收解司現在盤查正額加增俱無虧短即當通計一年之內前後徵解造册依限缺外又收贏餘銀一萬三千餘兩理應據實因辦銅之故仍許商船往販但其中有無利害情弊臣署事未久未及深知容臣細查再奏伏祈睿鑒謹奏海洋商船出入其不合者嚴行禁絶合宜者照例放行可也雍正三年二月十三日浙江布政使臣佟吉圖謹奏為欽奉上諭事竊浙江沿海塘工蒙皇上特命尚書臣朱軾會同撫臣及臣詳查定議臣已經兩次親歷各塘逐一詳勘并問土人及地方官之久任兹土者查從前杭紹二府俱係土塘惟海鹽縣舊有石塘因康熙五十三四年海水侵刮塘腳損壞方始興修有增改石塘之處今巳歷年修築沿塘又各長淤沙海水去塘漸逺目下工程乃保固以善後非因損壞而增修也至如上年颶風迅發原屬偶然之事即石塘再加高厚亦不能免其漫溢其間坍損之處巳經陸續修補今蒙天心厪念諭旨諄切尚書臣朱軾會同臣等親赴各塘細加查勘再四詳議其塘外淤沙淺薄之處改建石塘如淤沙雖厚而土塘尚薄者即將土塘加高加厚此就目前形勢分别加修則塘工益加堅固沿海居民俱沐聖恩矣至於淤沙之坍長海水之去來俱屬無定或他日之淤沙此消彼長是又在隨時隨地酌量修築非可預為意計也除將分别石工土工丈尺并估計用銀細數詳悉會疏具題外謹將海塘情形并土石並用緣由據實奏聞謹奏俟題本到日朕再為裁定雍正三年五月初十日浙江布政使臣佟吉圖謹奏為奏聞事查得今年浙江各府地方三春雨水調勻二麥豆菜俱各豐收杭嘉湖三府𧖟絲亦俱大好四月半後正需雨水播種稻田自四月二十至五月初九等日連得時雨高下霑足俱各及時播種目下米價漸平民生樂業理合奏聞以慰聖懷謹奏覽奏知雨澤調暢實慰朕懷雍正三年六月二十日浙江布政使臣佟吉圖謹奏為奏聞事六月十九日據按察使臣甘國奎移咨到臣一件為撫臣法海審理淳安縣朱進命案查拏按察司衙役家人因此不能供職咨請詳題罷斥事一件為巡撫輕忽皇恩恣行無忌事臣思巡撫與按察使俱係封疆大吏理宜協和辦公不得各執巳見即該司所審案件不實撫臣平心詳審衙役家人得賄供證眀確據實題參誰敢不遵乃法海多疑性躁到任以來每每輕斥屬員不肯和衷商議凡遇公事一言不順其意輒以怒氣凌人且聞其議論云內外所用俱屬小人惟年羮堯是豪傑甘國奎與撫臣中表親戚比衆略為和好後因甘國奎奏用本省幕賔一事奉硃批將旨意傳知撫臣及臣聞撫臣因此大怒屢加指斥秋審之日為陳世侃應否入審彼此相爭今又因審出命案內尸親及司府縣經承通同得賄徹夜刑訊連差官兵提拏嚴急似屬有心煆煉以致甘國奎憤激通揭其所揭撫臣不敬之處臣亦得之傳説但係伊署內之事不能親見總之地方同城大吏彼此挾嫌爭執必至以私廢公不獨有失體統亦與公事有礙皇上聖明逺照自有洞鑒但既據甘國奎移揭到臣并臣亦有訪聞理合據實奏聞伏乞睿鑒謹奏所奏巳悉俟法海到京朕自有裁奪凡百惟宜直陳無隱黃叔琳以欺蔽之故見棄於朕朕實為之寒心爾更不當如此前巳經過一番蹉跌向後惟以無欺無隱為務自亦受益良多何樂而不為耶勉之雍正三年七月初三日浙江布政使臣佟吉圖謹奏為密行奏聞事臣竊思人臣辦理公事必本忠誠之實心上膺朝廷之恩寵使人人信服方克有效若業巳罪惡彰著天下臣民無不共知共見即能改悔亦引咎懼罪之不暇所屬人員誰肯樂為之用安能有益地方查浙江武備重在八旗統轄之人所係匪輕今將軍年羮堯雖未知其調度若何但既已罪惡彰著諒亦未必有益地方且滿洲漢軍彼此意見往往不同此皆久在皇上洞鑒之中臣知聖明逺照早巳籌畫萬全無俟臣之瀆奏但臣受恩深重愚見所及不敢不密摺奏聞伏祈睿鑒謹奏此等事豈爾之伎倆所能揣摩萬一者耶幸朕降旨在前不然則是因聽爾言而始然也雍正三年八月二十四日浙江布政使臣佟吉圖謹奏為叩懇皇恩準臣瞻仰天顔以伸依戀微忱事伏念臣以病廢之人屢蒙天恩不次擢用格外知遇人所共知然臣蒙皇上殊恩異數人所不知者正多臣之感激實乃口不能言筆不能述但自荷簡任以來清夜自思實實毫無報效臣寢食不安況臣從幼未任外官到浙一年有餘依戀之忱日深一日伏思臣於上年奉命出京之時荷蒙天恩面諭或一年年半準臣陛見臣晝夜盻望今巳屆期伏乞皇上俯鑒犬馬戀主之心準臣即日束裝瞻仰天顔則臣之愚誠得以少遂而浙省之吏治民情及臣一切見聞有不能形之奏牘者俱得面為奏聞臣實萬幸不勝懇􅋀待命之至謹奏日前一年半年之諭不過泛言之耳朕棄瑕擢用意爾必另有一番分外感恩圖報處孰料爾不過隨常供職獨善巳身而巳且獨善之道尚不能純殊大失朕望法海到京甚言爾不肯盡心竭力辦事亦不止法海一人大槩論爾者類皆此語爾等封疆撫藩大吏從未有蒞任年餘無故往返奔馳道路之理此行不必況爾受朕恩重來歷亦異迥非他人可比不居雲霄即墜泉壤總非爾私揣預防之所能及究不如實心感報庶幾無患也雍正四年三月初六日浙江布政使臣佟吉圖謹奏恭請皇上萬安朕安朕新簡命浙撫爾以為何如諒必與爾契合矣雍正四年五月十二日浙江布政使臣佟吉圖謹奏為恭繳御批事臣思外省督撫司道猶之部院堂司所辦同屬公事原無可爭上司凡事從公屬員自無不心悅誠服撫臣李衛到浙數月人明白辦事勤惟恐臣之才力不能副撫臣之意耳緣奉御批理合恭繳謹奏朕命李衛撫浙料汝二人必合心應手今覽此奏似有不足之意人原難信至徹底朕於用人行政惟務得中審實爾但據實直陳無妨汝觀李衛或有偏執不公處即當據實奏聞不可隱諱至於辦事勤人明白不待爾言朕所悉知所問者較法海為何如巡撫耳其秉公奏聞同日又奏為奏聞事查得今年浙江各府地方春夏以來雨水調勻二麥豆菜俱各豐收杭嘉湖紹等府養𧖟地方收成大好早稻播種齊全米價比往年甚為平減百姓安業理合奏聞以慰聖懷謹奏覽奏深慰朕懷雍正四年六月二十七日浙江布政使臣佟吉圖謹奏為遵旨具奏事臣齎摺家人回浙捧到臣前奏恭繳御批一摺奉有硃批臣跪讀欽遵伏念知人最難況以臣之愚昧何能深知但蒙諭旨垂問若不據實具奏自欺此心上負聖主臣實斷斷不肯前撫臣法海操守好但在浙未久性躁多疑凡在屬員多不能堪撫臣李衛到任數月看來辦事敏練非臣所及自至浙中與臣原無不相得之處至所辦地方公事若有意見不同斷不敢茍且依違今數月以來凡事皆從公辦理未見有偏執之處理合據實奏聞並將硃批恭繳謹奏朕閲爾前奏因稍有可疑故爾批詢也今爾自謂不及李衛誠然爾若勝於李衛則用爾為巡撫矣當效法之同日又奏為恭謝天恩事六月二十五日奉浙江撫臣行知準到部文雍正二年浙省海災平湖等縣未經具題散賑一案部議臣降三級調用奉旨佟吉圖著降三級從寬留任欽此臣隨恭設香案望闕叩頭謝恩訖伏念臣質本愚昧兼之未任外吏一􅋀事冝實未諳練以致辦理每多過愆屢蒙聖恩格外矜全感激實難名狀今部議降調又蒙恩旨從寬留任臣惟有竭盡愚忱圖報天恩於萬一除請撫臣代題外理合具摺叩謝天恩謹奏偶然錯誤猶可恕宥若過愆太多則難頻邀格外恩施矣勉之慎之硃批諭旨卷二十一
