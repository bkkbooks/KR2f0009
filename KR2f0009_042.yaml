body:
  text: 欽定四庫全書硃批諭旨卷四十二硃批索琳奏摺雍正四年七月初六日巡視臺灣監察御史臣索琳謹奏為恭報微臣到任日期事竊臣蒙皇上隆恩令臣巡察臺灣地方於雍正四年三月十九日恭領聖訓隨於二十二日起身於七月初二日抵署望闕叩頭謝恩任事訖臣所過山東江南浙江等處二麥豐茂米價亦平五月十一日至福建浦城縣地方上米價值每石一兩較之舊冬今春實減四五錢之數然農田望雨甚殷幸於十二三四等日連沛甘霖閭閻歡悅俱得盡力南畝而灘河雨後水漲臣亦得放舟南下也十九日抵省城一路雖見田禾遍插祇以福建民稠田少今當青黃不接之時啇販偶稀米價遂長至一兩七八錢不等聞地方大吏斟酌時宜先將存倉榖石出糶一面遣員往浙江江西買米平糶故市價稍平從省至臺所經興泉二府雖早稻俱巳將實其米價亦如省城之貴惟厦門米價止一兩三四錢今臺地早稻已收且又播種於六月二十八及七月初一初四初五等日甘雨連沛田疇霑足目下上米每石價值一兩一二錢小麥每石一兩三四錢其奉旨運濟漳泉二府之米五萬石經臣查案已於正二三四五等月如數運足矣除驗看臺澎兩協大操及臺郡兩水情形並六月內臣未到任之前彰化縣界水沙連生番傷害諸羅縣治收麥民人一案俱經巡察給事中臣汪繼燝同臣另摺具奏外所有微臣到任日期並自京至臺經過地方所見年景米價緣前奉有諸事留心之諭旨理合一併奏聞謹奏覽奏知道了勉為之汪繼燝朕頗信伊不及似欠誠實爾與之共事宜時時留心但亦毋致乖異蹈禪濟布之前轍而貽笑於人也巡視臺灣監察御史臣索琳吏科給事中臣汪繼燝謹奏為恭報臺澎兩協操期驗閲已竣事竊查臺灣鎮標陸路營大操於去年十一月內經前任滿御史臣禪濟布公同道府驗閲先行具摺奏聞并聲明臺澎兩協已飭水師將領勤加演習俟臣汪繼燝到日會同簡閲嗣臣汪繼燝於二月初四日蒞任準臺協副將陳倫炯訂於三月初八日先演陸路十九日次演水操臣汪繼燝隨與禪濟布并鎮道等公同臨閲陸操則步伍整齊水操則進退合度施演鎗炮藤牌等藝頗稱嫺熟其澎湖一協先因副將董方稟稱時當巡哨且值撥護餉銀在澎船隻無幾另期具文申請今於六月十六日新任滿御史臣索琳路經澎島候風之暇該協即請留閲視隨於十九日看演陸操鳥鎗藤牌俱各精熟又於二十二日看演水操開合攻擊人船便利此皆我皇上聖武宣昭恩加海外所以士卒歡騰咸思自奮也所有兩協大操俱經驗閲已竣理合繕摺奏聞謹奏凡事務實為要從來君臣之間惟貴忠誠無隱一切粉飾迎合贊頌虛文皆屬陋習不可效法勉之同日又奏為恭報地方米價雨水情形仰慰聖懷事竊查臺灣米價向來賤於內地頃於五月間因福建省城及泉漳等府米價髙昻俱向臺灣採買辦運以致有粟之家居竒觀望價亦漸長今內地已經豐收赴臺採買者漸少價仍平減每米一石約值銀一兩一二錢不等海外黎民可免榖貴之虞矣再查臺郡四邑田禾仰賴皇上福庇今嵗自春徂夏雨暘時若早稻已盡登場稍遲者俱暢茂堅實最晚者亦乘時樹藝民情歡躍比户盈寧此皆我簡命巡視兹土見此及時之雨澤欣逄盛世之休徴不勝歡忭之至理合據實奏聞謹奏覽奏曷勝欣慰同日又奏為奏聞事雍正四年六月二十三日據諸羅縣稟稱六月十八日據柴裏社通事髙歉土官皆知里等轉據莊民劉日魁報稱伊夥計陳登攀劉尚伯劉士鐸劉連清劉應逺等五人本月十七日早因往斗六東埔地方採收芝麻被生番殺死等情報明到縣隨經帶同仵作前往相驗俱稱被殺死是實即著各尸親收殮看守復據甲頭廖士乾稟稱拾有番弓一把箭五枝番牌一面呈驗隨令通事土官等看認僉稱是水沙連內山生番所用等供除一面訪緝凶犯務獲究審外先將驗訊供詞緣由通報到臣衙門臣查凶番肆橫大槩在彰化縣地方然與諸羅縣僅隔虎尾一溪而內山之路徑實綿亘相接今據諸羅縣稟報驗看番遺凶器并屣明來往蹤迹亦屬水沙連內生番攀越大山邁虎尾溪而南遂至斗六東埔地界則是因彰邑既經守禦不能逞凶於彼復又流毒於此除飭諭該地方文武嚴緝務獲并令兵役土官鄉保等加謹巡防守禦外事關生番殺人理合繕摺奏聞謹奏知道了地方上凡遇此等案件當加意察理尤宜與督撫大僚和衷共濟髙其倬非滿保可比乃朕所委信股肱之臣爾等所聞所見一面奏聞一面就近行知伊未有不秉公推究悉心商辦之理遵諭而行可也雍正四年十月二十四日巡視臺灣監察御史臣索琳謹奏為奏聞事雍正四年九月初二日據鳯山縣知縣並南路營參將稟報據港西里新東勢莊管事等稟報新東勢莊佃民邱連發家傭工人邱雲麟於八月二十二日往埔種作被生番殺害等情十月十九日據彰化縣知縣並淡水同知稟報據堋山社通事具稟本月初二日南日社熟番大宇加六歇等共十一名同往東勢山邉砍木被山內生番五十餘人突出殺死甘仔歇老鬱等四名又箭傷二名等情十月二十二日又據彰化縣知縣稟報據貓羅社阿密里莊管事具報本月初八日初更時分生番二十餘人各帶弓箭鏢鎗木牌到莊殺死佃人邱未又鏢傷佃人林福等情十月二十三日又據北路營參將並彰化縣知縣稟據半線汛千總報稱南北投鎮番寨守禦竹腳民壯朱八於本月之十五日在水沙連河邉被生番殺死并奪去所執七十二號鳥鎗一桿等情先後各到臣衙門除飛飭各該文武加意防禦外伏查臣到任後自七月以至十月南路計一案傷佃民一人北路計三案傷民番共六人似此光天化日之下蠢爾醜類乃敢橫行無忌若不𠞰捕以彰臺之日星即同至水沙連一帶番境相機𠞰撫則南路凶番自必聞風膽落可不討而歸誠矣再臺灣全郡今年海颶不作雨順風調稻榖十分收成理合一併奏聞謹奏朕聞臺郡年歲止有八分收成為何奏稱十分百凡惟當據實不宜粉飾雍正五年正月十二日巡視臺灣監察御史臣索琳謹奏為𠞰捕生番以保民命事雍正四年十一月初二日道臣吳昌祚自省回任帶投督臣髙其倬咨文一角內開為凶番戕殺民命特委臺厦道吳副使為總統兼委淡水同知王汧北路營參將何勉淡水守備鍾日升等帶兵分路進𠞰專委以知州管彰化縣事知縣張縞辦運軍糧等因到臣本月十六日道臣吳昌祚等調領官兵番壯自府治先發臣於十八日選帶丁役自備行糧亦從臣署起行至二十六日入牛相觸番境渡阿勃泉溪而抵竹腳與道臣吳昌祚官兵會劄於虎尾溪陽預令曽歷番地社丁林三招引水沙連內決里社土官阿龍等十八名來歸詢明路徑又令社丁陳蒲同決里社順番先至北港蛤里難等社曉諭能歸化者即免誅戮去後臣與吳昌祚隨撥同知王汧帶領熟番民壯由北港南投﨑抄入番巢之後候令進發仍調參將何勉帶兵接應一撥守備鍾日升等帶兵由南港水沙連之前路竹腳候令進發仍撥千總蔡彬帶兵接應一撥守備楊鈐帶兵駐劄於凶番之戚屬朴仔籬社傍以覘動靜仍撥把總任林五帶兵駐劄於鄰近之貓霧捒社以備應援臣與吳昌祚率領員辨兵番由南港竹腳督兵前進其前後兩路官兵統令於十二月初三日進攻仰賴聖主天威及督臣髙其倬知人善任道臣吳昌祚盡心竭力調遣合宜同知王汧等不避艱險招撫有方知縣張縞運濟四路軍糧各足並隨征官將兵番同心協力故自十二月初三日進兵計十有四日兵不血刃而凶番已獲各社歸誠北路俱已平定臣等帶領官兵於今年正月初九日已回府城所有臣與道臣吳昌祚等𠞰撫過水沙連一帶二十五社畨人凱旋緣由理合繕摺奏聞謹奏觀一切調撥機宜殊屬有方所以奏效迅速甚為可嘉蠢夷經此番振作之後自當安靜數時然終非久長良䇿也要在文武官辨撫恤得法使百姓總不干犯熟番熟番永不欺陵生番各安生理兩不相涉自不至生事設或文員貪黷武辨懈弛百姓侵擾熟番熟番又復虐用生番遂爾激成禍端以彼冥頑無知近於禽獸之人何事不可為也雖如此𠞰撫兼施凶犯就獲未免多致殺傷矣今既平定嗣後當徐徐開𨗳令其感恩向化漸知人理方為柔逺之道若專逞兵威朕甚不取爾等協力共勉之雍正五年閏三月二十一日巡視臺灣監察御史臣索琳臣尹秦謹奏為奏聞事雍正四年十二月初四日臣索琳於水沙連內武滑納埔軍次據南路營參將暨鳯山縣知縣並報風聞謠言阿猴林黃基崙地方有匪類聚集現在搜捕等因除臣飛飭南路文武立即協同細心訪拏外臣以事屬風聞謡言未敢輕易摺奏今年正月初九日北路事竣回署之後據鳯山縣稟報差役於赤山莊地方訪拏得匪類黃萬等四人又於行劫臺邑陳日隆家案內獲到盜犯陳三竒等四人亦係匪黨其時尚未審取確供雖未敢遽行奏聞臣以凶犯肆橫亟宜懲創已經飛咨督撫請其仍委道臣吳昌祚等以得勝之兵移𠞰南路凶番況阿猴林亦係南路地方并可藉此潛消姦民不軌之心隨據督臣髙其倬行據道臣吳昌祚以方春雨水溪漲地濕上蒸恐染瘴患請俟冬間水涸再議𠞰懲等因詳覆在案三月二十一日據南路營參將暨鳯山縣知縣並報熟番阿猴社本月十七日三更時分被山豬毛北葉二社傀儡番焚殺等因閏三月十七日又據該營縣稟報本月初十日傀儡番殺死加走莊砍柴民人陳義十三日懷忠里東勢莊塘被凶番放火殺死民人蘇厚等因各到臣衙門除臣等飛飭該管文武官辨分布兵壯加意偵防外隨經臺灣府知府孫魯以山豬毛北葉二社離山口不逺若不即加懲創恐殺害之事將接踵而至詳請道臣裁酌杜害當據移會鎮臣陳倫炯飛調南路營守備協同鳯山縣知縣帶領兵番駐劄武洛地方相機𠞰捕在案至於阿猴林謀匪各犯據鎮道咨報並奉督臣照會令牌以臺地事勢與內疆不同似此匪徒若照常審題處決為時遲久不足示警仰親審確情將倡謀為首及為從情重之犯請出該鎮王命當衆曉諭梟斬以警姦宄一靣舉行一靣飛報以慿奏聞等因業經審取確供於閏三月十六日恭請王命傳集府廳縣各官將先行強劫陳日隆家分贓正盜復聚衆謀匪之陳三竒當衆斬首梟示并將為從情重之林居黃允黃萬亦當衆杖斃示警又匪黨徐寧為行劫陳日隆家盜案首犯應歸彼案完結各等因到臣衙門理合一併奏聞謹奏覽奏巳悉事事直陳纎毫不可隱瞞地方諸務悉聼髙其倬指揮而行雍正五年四月初二日巡視臺灣監察御史臣索琳臣尹秦謹奏為奏聞事雍正五年閏三月二十五日據南路營參將並鳯山縣知縣報稱本月十五日二更時分傀儡凶番至新東勢莊殺死民人謝文竒等等因二十六日據鳯山縣知縣暨南路營守備稟報本月十八日從武洛社帶領兵番移駐於番仔崙經遣通事訪知行凶傀儡乃係七齒岸社大文里社之番因山裏留社歹番勾引而出隨於十九日蚤帶領兵番至山裏留社該社男婦業已逃遁遂焚而還二十一日有傀儡加者惹也社土官遣番謝巳卯小貴到營稱伊土官聞大兵𠞰捕歹番令伊等下山聼候吩咐據稱東勢莊行凶係七齒岸社大文里社山裏留社之番其阿猴社行凶係北葉社之巴思立辛武里亦有山豬毛社番在內至於篤佳莊行凶之番則稱逺而不知當經給賞令伊回諭土官傳諭行凶各社獻出凶番去後二十二日帶領兵番抵山豬毛社山口於二十三日上山直逼番巢攻開社門番衆逃竄鎗傷傀儡四名仍回番仔崙駐劄當據港東里通事稟稱港東里傀儡勃朗錫干等社土官咸稱港西歹番原該征𠞰我們港東各社從不下山作歹等語二十五日據加者惹也社番謝巳卯等到營稟覆小番土官遵至七齒岸大文里等社傳諭奈各番在逃未歸容伊等回社後呌他獻出等情隨經給賞令其回諭土官速飭七齒岸等社將凶番獻出等因先後到臣衙門除俟七齒岸等社番人就撫獻出凶番另摺具奏外所有南路文武稟報凶犯傷人並𠞰捕港西里傀儡情形理合奏聞謹奏所奏知道了凡事以治本為要不宜專務末節爾等身在其地當廣咨博詢遇事則詳悉講求共相籌畫必得一久逺可行之良䇿方好似此隨事支吾逐案整理不過小績微勞耳何足深取勉之然若見不透信不及又不可逞臆妄言惑朕耳目并回易地方大吏之心思也雍正五年八月十二日巡視臺灣監察御史臣索琳臣尹秦謹奏為訪陳臺郡田糧利弊仰請聖裁事竊查臺灣全郡盡屬沙壤地氣長升不降所有平原總名草地有力之家視其勢髙而近溪澗淡水者赴縣呈明四至請給墾單召佃開墾其所開田園總以甲計每田一甲約抵內地之田十一畝有零鄭氏當日分上中下三則取租開臺之後地方有司即照租徴糧而業户以租交糧致無餘粒勢不得不將成熟之田園以多報少欺隱之田竟倍於報墾之數臣等細訪向來任其欺隱不行清查之故則其説有五現徴科則計畝分算數倍於內地之糧額若非以多報少不能完納正供此其説一也臺灣沙地每歲夏秋大雨山水奔瀉田園衝為澗壑而流沙壅積熟田亦變荒壤若非以多報少將何補苴虧缺此其説二也臺地依山臨海所有田園並無堤岸保障海風稍大鹹水湧入田園滷浸必俟數年鹹味盡去之後方可耕種若非以多報少何以抵納官糧此其説三也臺郡土脈炎熱不宜用肥兩三年後力薄寡收便須荒棄兩年然後耕種若非以多報少焉能轉換辦公此其説四也佃丁悉係漳泉潮惠客民因貪地寬可以私墾故冒險渡臺設使按畝清查以租作糧伊等力不能支勢必各回原藉以致田園荒廢額賦虛懸此其説五也夫田糧之欺隱若此其所以致此欺隱而難以清釐者又若此今宜作何變通以除聖裁至於北路彰化一帶縣係新設地稍偏逺臣等見多未闢之土亦宜召民開墾案查淡水同知王汧曽經具詳稱北路虎尾溪以上間原寬曠其召民開墾之法毋許以一人而包占數里地靣止許農民自行領墾一夫不得過五甲十夫連環互保定限三年比照內地糧額起科再如熟番場地向有姦棍認餉包墾久假不歸之弊若任其日被侵削番衆無業可依必至退處山內漸漸變為生番宜令大社留給水旱地五百甲中社留給水旱地四百甲小社留給水旱地三百甲號為社田以為社番耕種牧獵之所各立界牌將田場甲數四至刋載全書使日後勢豪不得侵占其餘草地悉行召墾并限三年起科等因臣等細加尋繹事屬當行惟召墾農民似宜照臣等前摺所陳亦令歸莊併皇上睿鑒施行謹奏覽雍正五年十月十三日巡視臺灣監察御史臣索琳臣尹秦謹奏為臺郡農功已畢恭報收成分數事竊查臺郡早晚二稻收成分數行據臺灣鳯山諸羅彰化四縣申報本年春夏以來雨水調勻早晚二稻收成俱有九分八分七分不等米價每石一兩一錢五六分至七八分不等穀價每石五錢四五分至六七分不等各等因前來與臣等訪聞無異再臺郡農民因今歲颶風不作雨澤頻施將向日缺水難耕棄地亦皆開墾是以今年所收之榖多於往歲現在地方寧靜閭閻樂業理合繕摺奏聞謹奏覽收成米價情形朕懷深慰雍正五年十一月初八日巡視臺灣監察御史臣索琳臣尹秦謹奏為特參虛冒兵糧濫役滋優事竊臣等訪得臺灣縣所屬新港司巡檢衙門額設書識一名皂役二名之外另有弓兵一十八名原為巡緝地方姦匪而設乃署新港巡檢事臺灣縣典史徐履謙敢於額設書識之外多設書識陳吉等三名又私設貼寫陳逹等十一名俱在鹿耳門汛口挂驗船隻抄寫報單並無弓兵名色及臣等行令臺灣府知府俞存仁臺灣縣知縣張廷琰查取弓兵名册則該署巡檢即以貼寫陳逹等十一人姓名造報又揑開吳齊等假名七名以足十八名之數仍於各名下或注退役或注革逐現在召補字樣夫設兵原以緝暴衛民若果革退自應立時召補豈可任其懸缺再者貼寫係刀筆之徒巡兵有防緝之責奚容假借影射明係虛冒兵糧濫役滋擾今據臺灣府縣查報前來與臣等訪聞無異所當特參以警劣員者也為此繕摺具奏伏乞皇上睿鑒施行謹奏朕不解爾等此奏所參者為何人該府縣既經查報則不應參若巡檢虛冒則止應咨革殊屬可笑之極硃批諭旨卷四十二
