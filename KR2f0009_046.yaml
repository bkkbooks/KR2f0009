body:
  text: 欽定四庫全書硃批諭㫖巻四十六硃批張坦麟奏摺雍正四年六月二十六日兩淮鹽運使臣張坦麟謹奏為奏聞事竊臣一介庸愚䝉皇上特恩補授兩淮運使惟有凜遵聖訓勉竭駑駘務期恤商裕課仰答臣細加稽查内有江蘇布政使劉殿衡任内於康熙四十一二兩年曾借運庫未還銀一萬一千四百九十餘兩經臣詳請具題現經部議勒限行追賠補奉㫖依議欽遵在案此外並無未清之項至臣運使衙門向例有商人鹽規銀五萬兩經欽差部臣李周望等清查盡行裁汰臣查鹽規之外尚有各項規禮舊例應得銀兩臣不敢擅入私囊俱已設立印簿逐一登記貯庫在臣衙門日用薪水之資皇上原有經費給支應用前任運使俱將各項規禮補其不足臣加意節儉計延請幕賓需用人役以及過往應酬動支經費之外雖有不足無須若是之多所有向來未經奏明各項規禮臣莅任六月現收貯庫銀一萬三千餘兩臣不敢隱匿理合奏一千餘兩併嗣後舊例應得規禮統俟歲底彚總奏請充餉合併聲明謹奏所奏知道了條奏一摺發部議矣雍正五年正月初三日兩淮鹽運使臣張坦麟謹奏為奏聞事竊臣衙門舊例鹽規裁汰之外尚有應得規禮臣曽於雍正四年六月内將各欵細數併經收貯庫銀一萬三千餘兩具摺奏聞懇恩准臣於此項規禮内動支銀二千兩以補日用之不足餘俟歲底彚總奏請充餉奉有硃批欽此欽遵臣自雍正四年正月到任至本年十二月共收舊規銀二萬五千八百九十二兩零再脚價内向有每年山東司領引銀六千四百兩今遵部頒存冊支用其脚價内銀兩無庸動支照院道各半例臣名下應得銀三千二百兩又匣費内有臣衙門巡緝銀三千六百兩查臣衙門並無巡緝人役無庸動支合共銀三萬二千六百九十二兩零現貯運庫伏念雍正四年八月内荷䝉皇恩賞給臣水脚銀四千四百兩臣當即恭設香案望闕叩首奏謝天恩訖伏念臣身家日用均沾帝澤所有奏明動支規禮銀二千兩未敢動支理合彚總奏聞同臣衙門節省經費等項銀一萬七千二百六十二兩零共銀四萬九千九百五十五兩零聽候部撥一併起解為此謹奏此皆係爾應得之項非分外陋規可比且動支二千之數業巳奏請何必矯廉此銀内止將四萬兩報部足矣其餘爾存留以為幫助親友之需可也雍正五年五月二十六日蘇州布政使臣張坦麟謹奏為奏聞事臣以庸才䝉我皇上不次超擢補授蘇州布政使業將兩淮運使任内經手錢糧交明新任運使張璨臣於四月初八日到蘇州布政使任循例詳請撫臣代題叩謝天恩臣查江蘇藩司衙門素號繁劇陞司鄂爾泰料理一切頗為清晰至前司漆紹文接手諸事闒茸不無廢弛之處臣履任月餘見其積案纍纍急為清釐又存庫銀二百餘萬兩輕重參差逐加彈兌昨據陸續送到交盤冊籍内開雍正三年八月内奉旨於天津地方設立水師營需用操練船隻部議行令江南浙江福建督撫動用正項錢糧在三省地方建造送營應用在漆紹文自應比照江省崇明狼山向來承造大小趕繒船隻部定價値並各屬協三十三兩零臣逐一查核其造船一切所用銀兩除應作正開銷之銀一萬六千二百四十七兩零外漆紹文實墊出協貼併多發銀三萬四千一百八十六兩零將來造冊報銷臣斷不敢扶同浮冒未完虧空等案未經料理妥協之處理合先行奏請併將臣兩淮運使任内本年舊規銀兩分摺奏聞餘容臣次第辦理為此謹奏覽同日又奏為籌定捐項以速公務以裕國帑事竊下江地方濱江跨海設立崇明狼山京口各營汛以資防禦額定海巡等船共二百三十三隻每年或小修或大修或拆造開銷部費之外各州縣公捐協貼計部價一兩協貼一兩五錢無如省屬州縣逺近不齊各營報修先後不一必須於估定之後方行公派迨至派後行催未免稽遲時肘萬不得巳致將正項那墊此不得不為籌畫者也又通省公務如督撫將軍衙門廩工書工礮藥火噐數十餘項毎年約需銀二萬二千二百餘兩俱係於各屬耗羡内均派雖羽檄頻馳而支應每不及期即如上年船工協貼尚有二萬二千餘兩迄今未據解交承修各官紛紛請領司庫無項可支此又不得不為籌畫者也臣再四思維固有一轉移間可以萬全無誤者臣查下江省屬兩淮鹽規額有五萬九千餘兩雍正四年九月内刑部議㫖此内議稱無著銀兩不准以鹽規抵補欽遵在案現奉督撫以鹽規作何動用之處行令查議臣思鹽規銀兩係省屬公項其船工協貼以及督撫將軍衙門需用等項亦係各屬公務莫若將雍正三年存剩鹽規與雍正四年未動全規令繳兩淮運使衙門移交藩庫動支辦理船工等項其各屬應捐協貼等銀仍照舊催交歸還鹽規原數如此則不但各營船工可以剋期告竣而一切公務亦可從容就理再此項歸還鹽規銀兩併同後此鹽規統貯藩庫每年報明督撫具摺奏聞以為本省積儲之用歲以為常庶鹽規不致虛懸而積儲日益裕如矣至於前項船工及督撫將軍衙門需用等項其中或有可減可裁可令各屬就近承辦者容臣查明具詳督撫節省辦理合併聲明謹奏將各項逐一詳細察明方可料理此事不宜如此草率急遽地方公務自有相沿舊例若不論前後槩為那墊如何其可爾其殫心竭力通盤打算明白時再行奏聞同日又奏為國帑久懸謹籌彌補事臣查江蘇省屬各州縣先後虧空帑銀并米麥豆等項先經督撫分别有可著追銀一百五十六萬三千七百餘兩米麥豆三十萬八千四百餘石無可著追銀及米麥豆穀茶篦折價銀共三十萬四千一百餘兩疊䝉恩㫖寬至雍正七年令督撫務須一一清楚現今牌行到司臣思有著之項固宜按限嚴追而無著之項尤當上緊彌補查江蘇省屬官役俸工奉㫖不准捐輸不敢議補虧項外或以各屬耗羨酌量提取此亦彌補之法臣於到任之始即經商酌撫臣陳時夏為臣僃悉言之但江省錢糧繁多耗羡輕於他省現有公捐協貼等項及各屬養廉之需一從前盤查狥隱失察之該管知府分賠一股接任不實力承追之正署各官與督催之正署院司府共賠一股至外省咨追之案彼省從前狥隱失察之知府分賠一股彼省承督不力之院司府縣共員到任年月日期久暫計算應賠數目及原籍旗分逐一造冊題請勅部按冊分咨著落各員勒限一年照數賠完臣再四籌度國帑重大經手督率均有難辭之責兩江事同一體亦無異議現在確查分析造冊詳請督撫會題恭候皇上睿裁遵行理合先行繕摺奏聞謹奏江蘇虧空之案甚屬繁重當與督撫悉心籌畫允協然後奏聞非一新任藩司擅自專主草率摺奏遂可完結之事查弼納張楷皆因於此事不任勞怨不肯盡心料理而獲罪即魏廷珍之休咎亦在未定汝何得冒昧摺奏耶河南山西拖欠不下數百萬一得田文鏡諾岷盡已完楚山東虧缺塞楞額一到亦俱清晰只在得人與否耳若少瞻顧回䕶取巧弄術萬不能料理設欲將别項錢糧那移彌補朕亦斷不准行必督撫㑹商斟酌妥確方可奏請也同日又奏為奏聞事竊臣自雍正四年正月内到兩淮運使任起至本年十二月止經收鹽規銀兩業經具摺奏聞附解在案又自雍正五年正月起至本年三月離任止共收鹽規銀一萬五千八百二十六兩零交明新任運使張璨存貯運庫除臣任内交代項下一應正雜錢糧經張璨盤查明白循例具詳鹽臣具題外所有臣經收鹽規銀兩例不在交代之内理合奏聞聽候在運庫撥解為此謹奏覽爾運使一任實無瑕疵可指可謂全美今布政使之職非比鹽道鹽道不過潔已則諸事畢矣督撫以及布政若不能任勞任怨一切何克辦集耶勉之雍正五年十一月初一日蘇州布政使臣張坦麟謹奏為遵㫖奏聞事竊臣於本年五月二十六日具奏為籌定捐項以辦公務一摺奉到皇上硃批臣謹祗領數月以來悉心殫力除欽部案件暨地方一切事宜逐一矢公矢愼詳請督撫應辦之公務不致掣肘而從前無著之虧空亦有不必别為議抵者臣通盤打算量入為出請自雍公務併酌量督撫暨府㕔各官養廉通共需銀一十九萬三千八十六兩零外尚可餘剩銀一十萬八千二百兩零以為彌補虧空之項如此不惟通省公事辦理無誤而從前無著虧空不數年間漸可次第彌補矣臣已將通省公務酌提耗羨原委造具清冊面同撫臣陳時夏妥議聽候撫臣繕摺具奏理合遵㫖再行奏聞謹奏將朕批諭與撫臣陳時夏看同日又奏為奏明事臣於雍正三年十二月内䝉聖恩補授兩淮鹽運使在京延請幕賓陶溶係江南常州府陽湖縣人查陽湖地方不食淮鹽非兩淮屬地今臣奉命莅任江蘇陽湖實係統轄臣以本屬不應延至藩署而陶溶亦堅辭求去無奈一時不得其人錢糧重地若另延幕賓非臣素悉不敢倚託是以仍留數月陶溶端方謹愼終始如一臣不敢欺隱僃錄下情仰懇皇上恩施格外許臣容留則臣幕錢穀得收指臂之力矣為此繕摺陳明謹奏可將朕允留原委亦令巡撫知之不然恐招物議同日又奏為奏聞事臣查江蘇司庫存貯錢糧前司漆紹文濫放天津船工併那墊雜項銀兩俱經揭報題㕘其那墊銀兩隨於㕘後全完所有濫放銀兩現奉飭發審追在案伏查司庫收放錢糧向有規例銀兩臣經收經放已七月有餘逐一清查其兌收各屬解到地丁正項錢糧除隨正飯食外每百兩加坐平銀一兩三錢向例以為解餉添平併督撫季規及本衙門養廉之需查漆紹文任内經收正項錢糧實收地丁銀三百二十五萬八千八百兩零計算收隨正飯食銀三萬三千七百七十九兩零計收一三坐平銀四萬二千三百六十四兩零内除解餉飯食補平銀及督撫季規并一切雜項用去銀兩又交下飯食銀及坐平銀存庫以辦本年春季解餉飯食添平之費其坐平内除動支外餘銀八千九百五十四兩有竒漆紹文以為養廉之資此外又有放給河員俸工等項出平銀兩併辦理錫蠟解官例繳規禮漆紹文任内約計收銀一萬三千餘兩在漆紹文歴任一年零七箇月以八千九百餘兩養廉實有不足加以一萬三千餘兩養廉未免過多但此項銀兩例不入正交代並無冊籍可稽自臣到任以來一切收放舊規銀兩俱立印簿纖悉畢登凡臣衙門應用各項俱照例動支亦立印簿登明俟歴任一周將動支存留彚總具奏再臣家人分下亦有應得舊規歴今七月經收銀六百五十九兩零除應辦本衙門公費動支外餘銀賞給家人為數甚細不敢𤨏瀆聖聽但臣絲毫不敢欺隱合併奏聞謹奏百凡以據實無隱為是此奏甚屬可嘉將此摺亦與陳時夏看同日又奏為遵㫖奏明仰懇睿鑒事竊查江蘇通省公務應辦欵項業經通盤打算請自雍正六年起酌提耗羨另摺奏聞本年五月二十六日臣具籌定捐項一摺奉硃批地方公務自有相沿舊例若不論前後槩為那墊如何其可欽此臣查各營修造戰船未經歸厰以前俱係州縣自為辦理採辦錫蠟顏料等項歴來亦係州縣自向解官幫貼其餘各項公務額辦派之州縣添辦出之俸工自雍正元年九月内奉㫖停捐俸工以後陞司鄂爾泰前司漆紹文因地方公務繁多無項可支詳明督撫仍行酌提雍正二三四五等年俸工閒欵銀兩解庫應辦鄂爾泰任内經收銀二萬四千一百餘兩零照數動支無存尚有閩廣運米水脚并修造書院海塘教場火藥局等項共銀六千六百一十七兩零詳明於續收俸工内給領漆紹文任内經收銀九千三十五兩零除辦理公務動支銀八千三百五十五兩零交存庫銀六百八十兩零而前項閩廣運米水脚等項銀兩尚屬懸項仍未給領臣到任後據各處陸續解到經收銀六千一百四十四兩零通共現存庫銀六千八百二十九兩零臣思俸工已奉停捐前兩任内提解銀三萬三千一百三十五兩零雖經詳明督撫批准有案但係奉㫖停捐之後提解俸工未知曾否奏明無可稽查臣不敢瞻狥欺隱理合具奏至現存庫銀六千八百二十九兩零據各屬照案請領歸欵臣未敢擅動應否動支給領嗣後俸工停止捐解抑或容臣詳明督撫具題請㫖定奪伏乞皇上睿鑒批示遵行謹奏此項業巳提取現存在庫或可留為彌補無著虧空此外爾等另行商酌而行何必具題多生一番枝節將此諭與巡撫陳時夏看雍正五年十一月初十日蘇州布政使臣張坦麟謹奏為奏聞事竊查江蘇六十六屬正雜各官數百餘員上司之耳目雖密各屬之䝉蔽無窮迨事經發覺應遵定例處分若一渉寛容遷就即無以肅官方而清吏治臣謹將現在情形為我皇上陳之江蘇辦銅之事承辦各官弊難枚舉臣正在稽查乃有蘇州府知府溫而遜承辦雍正四年上運銅斤於漆紹文任内詳委州同車國器領解咨部在案嗣因州同微員領解違例該府又詳奉撫臣陳時夏批行到臣改委併令倒提前司月日臣恐茍且依違不足以肅各屬當以不便倒提月日具詳申覆撫臣將原詳發換又有如臯縣知縣丁銓因前任知縣曹樞任内有地丁銀一千三百二十餘兩懸欵未清不肯接受詳報到臣臣查此項地丁銀兩係在前署縣通判張禹錫名下追補之項歴任相䝉數載懸宕不但無完之張倅出結之曹令咎有難辭即現陞甘肅藩司孔毓璞原任揚州府任内亦干失察分賠之愆臣據揭詳㕘孔毓璞情願捐賠撫臣又將原詳發換又有原任太倉知州張思閎原領安徽平糶米石應繳銀三千三百九十兩零歴今三載無完蘇州知府溫而遜原係太倉州接任知州未經揭報不無狥隠臣一併具詳請㕘張思閎仍於揭後延挨月餘陸續清還撫臣又將原詳發換又有原任霸昌道卞之錀家口暨廣東馬糧道之妻馬卞氏俱容留揚州府江都縣地方居住該地方官漫無覺察夲年七月内因打死熊子旺父子經熊氏告發方行具報奉督臣飭臣衙門造冊請咨解部查取容留職名附㕘臣將容留旗人之知縣張有觀同城失察之知府呂大雲職名具詳請㕘而撫臣又未查例具題又有常熟縣知縣喻宗楏因黎吉士逃囘一案經督臣題㕘革職蘇州知府溫而遜以㕘員盗帑詳報該令將徵完應解錢糧三千七百餘兩差家人潛行送回江西隨據喻宗楏呈辯虧空銀兩實因遞那遞墊動缺庫項回明本府已䝉面允寛期補苴今見卑職别案被㕘難卸失察之累突以玩法盜帑大題誣揭砌陷等情臣俱轉揭通詳請㕘在案復據該府禀繳該令歸補銀三千兩臣隨以貯庫禀明撫臣而撫臣竟以免㕘移咨督臣銷案查三案雖未達之宸聽而銀兩悉於揭後全完揆之國法猶可寛免至於江都縣之容留旗員家口常熟縣之盜帑互揭俱不應令其巧為趨避以弛功令臣䝉恩賜摺匣有關地方事務理合據實陳奏抑臣更有請者江蘇事務殷繁臣自揣無能難堪外任仰懇皇恩調臣京職俾得咫尺天顏效力行走蘇藩重地另簡賢能不獨臣免覆餗之虞而地方亦大有裨益矣為此繕摺陳明謹奏如此秉公毫不瞻顧甚屬可嘉勉為之因公獲罪於人無妨也假若懷私獲罪於天恐難逃法網耳雖暫時倖免亦不過茍延歲月而巳屬員中遇材堪造就者小過當寛宥之隨加訓誡容其悛改教而不改者㕘處示懲但當將情由密為奏聞如陳時夏竟行開脱狥隱不奏乃其過也至於在内在外皆係與國家效力朕量才器使自有鑒别當遵奉指授而行何可存揀擇之念既存此念則心志疑貳而精神散亂矣曷克奉公盡職百凡處無茍同無立異當酌中而處不可尚氣同日又奏為奏聞事竊臣查江蘇省每年起解京餉除春秋二季造報奉部酌留數十萬兩貯庫聽候撥用外餘銀照部撥額數悉行解部其應需飯食補平解費等項例有經收隨正飯食銀兩春季經收之數毎不敷春季解費即於秋季飯食銀内通融放解其中並無浮冒至於京餉水脚向係動支司庫錢糧每千給銀八兩遞年造入奏銷項下臣於本年六月内起解春撥京餉照例動支水脚銀四千七百八十一兩零著家人協同解官辦理昨於十一月内各官掣批回蘇其前項水脚銀内除一切費用之外餘剩銀一千二百七十兩零臣巳登明印薄貯庫在案查水脚一項原係正欵錢糧既有餘剩自應具詳督撫題請核減但天時寒暑道途風雨解運雜費不能畫一未便即請核減本年尚有兩次京餉臣俟起解完日將餘剩銀兩統於舊規項下彚總奏聞謹奏覽諸凡但當秉公除私做去何必如此瑣瑣奏聞耶同日又奏為敬籌查追之員以清虧項事竊臣查江省虧空前經題明飭追共一百九十餘案現在著追之項共銀一百五十六萬餘兩米麥豆三十萬八千餘石迄今數載追完尚不及十分之一又有續㕘各案臣到任以來分檄嚴催又歴半載完報寥寥葢緣繁劇之邑虧空獨多兼有各省虧空咨追咨提案件加之徵收地丁開兌漕白審理刑名各案日不暇給以致承追之項視為奉行故事及至屆期甘受承追不力之處分而不惜臣愚以為各直省虧空最多之處仰懇勅部遴選賢能官一二員赴該省督同地方官將一切承追以及外省咨追之項嚴行查追果能一二年内逐一清晰交部議敘如仍虛應故事交部嚴加議處倘有人亡産盡無可著追者分别題明以便早籌彌補庶各項虧空得有著落而積案纍纍亦得速為完結矣是否允協伏乞皇上睿鑒施行謹奏此奏甚是殊為可嘉朕另降諭㫖同日又奏為敬籌停忙之例以裕徵輸事竊照直省州縣徵收地丁漕項銀兩開徵完半以及全完俱有定限而一歲之中麥忙蠶忙穀忙各省不同至期巡撫衙門通飭停忙緩比臣查一歲錢糧催徵之期春季止有三四兩月秋季止有八九兩月輸將日少而休息日多彼急公良民在暇豫之日先為完公之僃殫力輸納仍自寛裕惟是游惰頑民不法豪右包攬衿棍於三四月間官司輸徵正廹淳良赴納正殷此輩明知停忙在即竟置錢糧於不問一遇摘拏百計賄差倩比延至停忙而若輩五分之限竟有毫釐未完者及至開徵復行故智輾轉規避無怪乎積欠之纍纍也以臣愚見停忙之例原因東作方興水耕火耨之不暇特許以寛假以示勞農勸相之意非謂末業逋賦之姦民亦概從寛緩也臣請勅下各省一遇停忙之日該州縣查明糧戸已於限内完半者照停忙之例於開徵後再行完納其有抗欠不完及完不如數之戸州縣仍行徵比無庸一例停忙開徵之日即令首限先完以為頑戸之戒庶逋欠之民咸知慕義而州縣得以源源徵解趕副奏銷之期於錢糧大有裨益矣伏乞皇上睿鑒施行謹奏爾此奏朕另降㫖發交廷臣妥議此舉更張舊例頗有干係候朕酌定雍正五年十一月二十六日蘇州布政使臣張坦麟謹奏為奏聞事竊照蘇松糧道存庫錢糧臣有盤查之責新任糧道趙向奎於本年八月内到任其原任糧道楊本植經手一切正項錢糧俱已交代清晰據趙向奎移稱由閘輕齎未獲批迴閩廣運米借項以及應須補平銀兩尚未清楚經臣將交代遲延緣由詳揭請㕘在案又據趙向奎查得楊本植任内得受各項入已銀共三十三萬九千七百二十兩開具細冊面交與臣臣查趙向奎與楊本植原為交代起見其移稱由閘輕齎之批迴閩廣運米之借項俱經詳題有案存庫應解銀兩楊本植亦情願領解交代一項自可無難完結至趙向奎所開楊本植入已各項銀兩原不在該道交代之内臣照冊細查其中眞偽或别有支用或盡入私囊雖一時無由盡悉但為數至三十萬兩之多趙向奎未經詳揭既據楊本植造冊交臣臣何敢隱匿理合據實奏聞併照原冊抄錄清摺進呈御覽為此謹奏諸凡據實無隱朕甚嘉之將奏聞之處密之勿露楊本植到京自另有㫖原冊留中雍正六年二月十五日蘇州布政使調補山東布政使臣張坦麟謹奏為奏聞事竊臣於雍正五年十一月初一日謹將酌提江蘇通省耗羨辦理公務緣由繕摺具奏奉有硃批諭㫖臣遵即恭捧交與撫臣陳時夏看訖本年正月初一日撫臣率臣同赴江寧府與督臣范時繹面為商酌於正月十一日回蘇傳集十二府州議定通省耗羨加一徵收隨同正項起解司庫經撫臣行文通飭在案茲於二月初十日接到部文欽奉上諭著將臣調補山東布政使臣聞命自天感激無地除現在料理送印交盤俟起程赴東受事後循例詳請代謝天恩外臣更有請者臣三年外吏未聆聖訓犬馬依戀之私不忘寤寐仰請髙厚伏乞皇上俯賜批示至江蘇耗羨辦理公務清冊以及現提俸工議補無著虧空各項統聽撫臣陳時夏與新任藩司趙向奎酌定具奏合併聲明謹奏撫藩意氣不投如何共事朕若偏信爾而即疑撫臣無是理也若仍留江蘇爾一藩司何能抗衡巡撫恐必致受虧天下事未有公而不和者汝二人雖皆見信於朕其中定有一是一非今調開兩處是非自明矣爾至山東竭力勉盡厥職雍正六年四月二十九日調補山東布政使臣張坦麟謹奏為再請睿鑒事竊照江蘇酌提耗羨乃係通省大事原與撫臣陳時夏再四啇酌定議而後敢於上聞䝉硃批臣摺著與陳時夏看當經遵㫖齎送撫臣看訖皇上硃批撫臣奏摺撫臣未經示臣及與督臣范時繹公同商酌督臣細詢撫臣亦未宣示臣私謂撫臣愼重祕密詎至本月二十六日於新藩司趙向奎處始見硃批撫臣原摺抄稿内有此布政使張坦麟之見此臣之見等語乃知向之不肯示臣者職此之故臣今閲之不勝駭異竊思此等大事臣與撫臣歴次面商其難其愼定議之日撫臣諭令聯銜具奏臣以撫藩統屬攸分堅辭不敢撫臣言之至再臣始將銜名開送設其時稍有未協撫臣即當明白指示臣斷不敢偏執已見乃撫臣既當面議定而於君父之前互陳二三之見是以上煩天心有此奏朕未達因未定其是非之㫖臣從前深信撫臣聯銜之言決無異同故於覆奏前摺内聲明臣與撫臣面商妥議等語今見所抄奏稿不敢不據實辯明致蹈欺罔之罪理合具奏伏乞皇上睿鑒謹奏知道了此等作用自陷自身耳何損於人知此當切記以為終身戒所以云三人行必有我師也雍正六年七月初三日署理蘇州巡撫印務臣張坦麟謹奏為天恩髙厚恭摺奏謝事竊臣一介庸愚識見淺狹欽奉特㫖著臣署理蘇州巡撫印務除望闕叩頭具疏奏謝外伏念臣筮仕部曹監督倉庾䝉皇上拔於稠人之中置諸卿貳之列旋命司鹺兩淮司藩江省今更叨恩命畀以封疆重任臣自揣何人屢邀異數即肝腦塗地亦臣心之所甘而臣分之所宜且臣於監督任内應賠米八千餘石䝉皇上慈鑒寬免續於運使任内復荷兩次恩賞銀兩今當藩庫交代之際陳時夏必欲勒臣額外賠銀三萬餘兩若非皇上睿照無遺臣即鬻盡家産竭髓碎身終於無補是我皇上之保全微臣至再至三聞命之日臣率舉家老幼百叩天恩臣自顧年近五十尚無子息不敢萌求田問舎之心為子孫封殖之計倘臣日後有子即此聖恩保全之家産與疊次之賞賜已足為世世子孫留貽温飽感頌無疆矣臣惟有益矢精白勉竭駑駘上報皇上委任之至意為此繕摺恭謝謹奏感謝之誠自在章奏之外但今日之感能他日不忘此時之志至後時莫移則始終是矣勉之同日又奏為據實臚陳恭請睿鑒事竊查江省各屬徵收錢糧納戸里書有花分之弊有詭寄之弊有飛灑之弊皆由蠧役排年包攬侵蝕按冊原非的名摘徵又無實在以致年年壓又下江舊欠自康熙五十一年起至雍正元年止共六百九十餘萬兩經前撫臣張楷題准分作十年十二十五等年帶徵其有實欠在民田仍原主管業者尚不難徵比若原田屢易售主産戸巳非的名甚至遷徙逃亡無可根追更有里蠧通同侵收揑開詭名欠戸經徵各官新舊兼徵每不能徹底清查故催追二年而照數徵完者十不過二三若屆限不㕘則將來玩誤惰徵愈不可問如盡行照例㕘處則革任必多而接徵之官更難措手此帶徵之民欠所當亟為清釐者也又如舊欠銅觔三百一十餘萬各商巧營新舊兼辦以六年為期臣在藩司任内恐該商舊欠未完新者又被拖欠因密訪各商力能完補者按名查審令各商自行甘限或三四月或五六月交完如有不完即行監追業經具詳前撫臣陳時夏題准在案今各商前後止共完過銅觔三十餘萬尚未完二百七十餘萬此銅商之積欠所當亟為催追者也又如錢糧火耗臣與前撫臣陳時夏商酌不分紳衿民戸一例徵收俱以加一為率并令納戸自封投櫃通飭在案臣訪聞民間完糧不能皆有足色所用俱係市戥較之紋銀庫平加之火工折耗合計民間市戥色銀完庫平一兩應火耗銀一錢七八分更重以姦匠之刻估蠧役之包收仍踵舊習而納戸不能自封投櫃遂致有市戥二分以外者此徵糧之膽玩所當亟為嚴禁者也又如漕糧兵米向例統徵分解各屬印官因事務叢積止可按期催比不能分身兼督經役乘機多勒耗價値虚出倉收直待營員催促始令牙行代買兌給而買價少於折價官役互有分肥雖經申飭類皆陽奉隂違此漕項之積弊所當亟為整理者也又如各屬刑名事件例有定限江省積習案件多不速結每每待㕘遲延拖斃人命勢所不免更有案之積玩所當亟為振刷者也又如聚衆閧堂挾官抗糧此等習染深可痛惡雍正五年四月内有震澤縣鄉民楊秀林等打閙公堂一案本年二月内有嘉定縣糧戸張三等聚衆拆毁四門弔橋一案四月内有福泉縣衙役戈祖順等聚閙公堂拆枷犯薛浩等一案臣抵任後據報當行藩臬二司嚴拏究審俟查詢得實或具摺奏而才識短淺封疆重任恐難負荷伏懇聖主另簡賢員俾臣得免覆餗之虞而於地方事務亦大有裨益矣謹奏既能詳悉地方種種積弊果若實心破面不辭勞怨何事不克就理耶竭力勉之必期克奏成效全朕用人顔面庶可以塞物議而顯汝之是非也假若徒知而不敢行空言而無實濟亦何益之有當不疾不徐循序漸進先加勸諭而後繩之以法愼毋迫促急於求效屬員中必得人然後施行倘不得人寧寬期以待之任爾良法美意不得其人手不應心徒滋紛擾無益而有害為政之道惟一秉公察吏乃求治之根本其餘皆屬枝葉務本為要爾其勉之同日又奏為懇請暫留告假藩司以資佐理事竊江蘇各官養廉臣於藩司任内遵㫖同督臣撫臣公商面議一例酌給則各屬舊有陋規斷難容其入已必須詳查實數方可定給養廉已飭各府州查明確覆未及數日臣即䝉恩調山東交印卸事不敢妄行干預兹䝉聖恩留臣署理撫篆則酌定養㢘最為首務因查各府餘兩此後源源起解通省公務俱可分别緩急照冊支應而養廉額數臣即星速酌辦尚得月餘摺御覽請㫖定奪後按數找給再查江蘇各案虧空臣於雍正五年十一月内陳請敕發查追之員以清虧項業奉欽差臺臣伊拉齊等來吳會同清理在案臣前於藩司任内已通飭各屬開造民欠役欠花名細冊呈送至今俱未造報臣抵任數日正與趙向奎商辦俟伊拉齊不日由閩到蘇即可會同清查適接邸抄奉㫖著陳時夏范時繹與臣會同辦理臣當竭犬馬微忱力圖報效茲値趙向奎奉㫖給假歸葬伏念皇上以孝治天下臣何敢請留趙向奎在任辦事但養天恩准將藩司趙向奎暫留數月俟養廉虧空各冊核定造就後再行給假歸葬庶公私得以兩全矣伏乞皇上睿鑒批示謹奏覽雍正六年七月二十四日署理蘇州巡撫印務臣張坦麟謹奏為奏聞事竊照下江各屬仰頼皇上福庇雨暘時若田禾皆已青葱秋成應在指顧今七月初六初九十五二十等日據宿遷縣報稱該縣境内有蝗蝻生發據練總劉士達報稱係山東郯城縣生發蝗蝻貽害宿邑等情又據邳州徐州各報稱該州境内各生發蝻子等情又據淮徐道申據睢寧縣報稱該縣地方發生蝗蝻等情各到臣臣隨飛檄布政使趙向奎淮徐道康𢎞勲即督該州縣協同文武各官趁此蝗蝻初發之時上𦂳撲滅挖溝掘阱火燒土埋毋致蔓延有傷田禾臣又委標員前往各州縣驗看情形仍咨明山東署撫臣岳濬無分疆界一體撲滅為此合先奏聞俟撲滅淨盡再行繕摺陳明謹奏蝗蝻初生惟撲捕為最善策聞爾江南省地方官甚不盡力如何推諉隣省耶已有㫖矣同日又奏為守令亟須得人仰懇睿鑒簡發以收實效事竊念江省地方重大分理務在得人而得人莫先於守令葢守令為親民之官茍得其人則郡邑諸務皆可承辦無悞況下江各屬事務紛繁雖在能員以之專理則有餘委以兼任則不足前䝉皇上欽頒諭㫖於蘇松常三府分縣而理極稱利便惟是現在州縣陞遷事故不一或當缺出必委鄰近之牧令兼理而此鄰近各員多係繁劇之地若更加以繁劇未免顧此失彼臣莅任後因查蘇州府吳縣係元和令兼攝長洲縣係嘉定令署理是附郭之三縣僅存一官現今蘇松各邑以大縣各攝者則有昭文縣署常熟南滙縣署上海泰興縣署靖江若徐州碭山宿遷睢寧皆以試用之員一人而兼兩篆倘將來再有缺出委署無人而通省之同知通判多有差委公務無一閒員伏查上年部發試用知縣四格等十五員及續發到寗承謀等九員皆已委用無遺現在河工巳經告成惟有部發在蘇松水利效力人員汪鯤躍等共二十二員皆閒住蘇州聽候督理水利臣陳世倌鄂禮分别會疏具題臣未敢擅行委署伏乞皇上敕部揀發候補候選知州知縣二十員作速來蘇量才試用抑或於此二十二員中命臣先行委署各屬篆務伊等河工效力之處仍聽督理水利諸臣分析會題則一官各理一邑其於地方民生實有裨益至蘇州府為衝繁首郡知府温而遜不能表率屬員府事每多廢弛今遵例輪流送部引見在聖明洞鑒之下自有定衡或試之簡任以觀後效其蘇州知府恭請皇上敕部揀選精明才幹之員補授庶劇郡得有賢員諸務皆可清釐矣伏乞皇上睿鑒謹奏該部速議具奏雍正六年八月十五日署理蘇州巡撫印務臣張坦麟謹奏為奏聞事竊蘇松等處今歲雨暘時若田禾花豆茂盛倍常民情鼓舞羣慶豐登一俟秋收臣當確查各屬分數奏報前於七月間臣因宿遷等四州縣境内有蝗蝻生發臣即飛檄文武官弁上𦂳會撲業經繕摺奏聞今據各屬覆稱境内蝗蝻皆已撲除禾苖一無傷損又據淮安府知府稟稱桃源縣前生有蝗蝻當時會撲無遺又清河縣境内亦生蝗蝻不待撲除忽有神鴉飛集半空往來啄食餘皆附樹抱草投入水中並無存留該地方老㓜居民皆歡呼稱慶羣頌聖天子至德感天故遇此古今希有之事理合據實奏聞謹奏蝗不為災深慰朕懷同日又奏為奏聞事竊照科場取士乃國家之大典我皇上加意掄選凡遇科場取士屢頒諭㫖訓飭無非欲澄清考校以端士習臣於本月初六日在臣衙門内室西樓上雜紙内檢查出白紙小封十箇上有南皿南易南官浙詩等字樣併有錢元台張之頊許廷鑅洪志齊閔長虹沈柱臣阮汝昕周簡裘璉姚鍾等名姓内有首承首破首結七結經首義小講起又有王洲若令親潘門生託等字則顯係科場關節無疑矣但不知是何人遺下亦不知是何人通同惟查十人内阮汝昕係現任吏部文選司主事順天甲午副榜則此關節或亦非近科之事臣既經檢查不敢私行燒燬以蹈欺隱之愆謹將原紙十封㳟呈御覽伏乞聖恩將臣摺留中止將原紙十封發部查議抑或俯念科分巳久事在赦前併將原封留中洪恩出自聖裁謹奏直奏不隱甚屬可嘉十封留中同日又奏為據實懇恩賞准迴避事竊蘇州府昭文縣知縣勞必逹與臣同鄉素有表親臣於江蘇藩司離任後將臣胞姪任葉議婚勞必達之女為姪媳實為兒女婣婭今臣䝉恩署理巡撫印務於該令有上下統轄誠恐外人以該令為臣至親因此觀望别生議論伏查定例非同族子姓不應迴避本年七月内接閲邸抄河東總督田文鏡以莒州知州蔣大年嘉祥縣知縣蔣嘉年係伊内親奏請迴避欽奉上諭著照該督所請行臣謹據實恭懇聖主洪恩准將勞必達照蔣大年等之例迴避另補庶該令仍得奉職報效而臣亦免於瓜李之嫌矣謹奏今調爾署江右巡撫印務此事可以不必布蘭泰一味褊狹自用而兼之不明深負朕恩巳罷其任矣江右地方經邁柱此番徹底清理一切不難於措置非江蘇可比到任後但秉公自持和平率屬謹守成規做去則相安於無事也勉為之凡為大吏者必具包羅通省之襟懷隨材駕馭寬而不失之於疎和而不失之於懦方為能勝其任若徒恃一巳之淺見而不得屬員之心則一人之伎倆有限未有不至於顧此失彼鉅細兩誤者勉之毋忽同日又奏為錢糧積弊巳久恭請委員督查以清舊欠事竊照蘇松歴年舊欠錢糧六百九十餘萬兩䝉皇上允前撫臣張楷分年均徵之請寛其期限以紓民力分其欠數以便催科宜乎徵輸自易依限可完無如各屬種種弊端莫可枚舉總由積弊不清印官事務紛繁即欲徹底稽查而一手一足力有不遑遂至相沿遷就故自奉行均徵以來雍正四年初限奏銷案内如數徵完者止有海州靖江鹽城宿遷桃源崇明等六處其餘均未報完合計該年一分之數應完銀五十八萬一千餘兩今止完銀六萬六千餘兩徒有均徵之名究無均徵之實臣再三籌畫自非立法清查不能直窮弊竇臣有堂弟張坦讓原任浙江金華府知府丁艱經督臣李衛題留在浙查所屬民欠漸巳就緒其清查之法臣因得以熟悉以臣愚見仰請皇上恩准將下江均徵舊欠仿行浙省之例委員協同該府州逐細清查現今奉㫖著臺臣伊拉齊戴音保會同原任撫臣陳時夏督臣范時繹與臣等五人辦理通省承追虧空俟伊拉齊一到蘇州即當分詣各府州地方并祈敕交臣等五人會查此案舊欠務使的名實欠犁然清晰侵收包納著落根追俾若輩咸知畏懼而此後不致再踵錮弊查各府同知通判俱有公事差遣並無閒員可委倘䝉皇上允臣所請容臣具題恭請敕部揀發候補候選府佐牧令之幹員來蘇分委抑或即令伊拉齊戴音保陳時夏督臣范時繹與臣各舉所知協委今合計承追虧空與均徵舊欠二案各府州共需委官二十四員俟查清造冊告竣之日相度機宜或可接辦丈量事務臨時再為請㫖是否允協伏乞皇上批示遵行謹奏將此奏交與尹繼善斟酌妥確覆奏以聞雍正六年八月十九日署理蘇州巡撫印務臣張坦麟謹奏為奏聞事竊臣於本月十八日據淮揚道白鍾山密禀據海州詳稱八月初六日准海州營移據山東安東衛移稱海中有船二隻白色白旗防丁放礮不理等語其船雖並未到江南洋面但據稱出入無時往來無定事關海洋理合禀明等因到臣臣隨即嚴飭沿海各州縣實心奉行保甲以清姦究藏匿之源又密遣標員前往上海劉河等處各緊要海口借名查税以察姦宄潛通之弊臣職任封疆事關督差官李澂等奉文擒拏夥盜楊秀於本月初三日隨押楊秀至該縣地方緝拏同夥張來詎該弁不照來文添差協捕以致無知鄉愚見無本縣差票鬨動衆人互相毆擊遂令弁差受傷等情臣現在嚴飭查拏夥黨并詳審實情另疏具聞謹奏覽雍正六年九月初七日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為叩謝天恩恭請陛見事竊臣前䝉皇上天恩留蘇署理撫篆方愧涓埃未效旋奉特㫖補授内閣學士兼禮部侍郎又叨寵命署理江西巡撫印務恩綸疊沛有加無巳除望闕叩頭具疏奏謝外謹於八月二十六日起程前赴江西所有一切事宜俟臣到任後矢愼矢公次第辦理具摺請㫖遵行惟是臣出膺外職越今三載犬馬戀主之微忱無刻不縈諸念慮況封疆重任負荷匪輕可否俟封印後仰懇聖恩容臣兼程赴闕跪聆訓㫖俾得敬謹遵循以免隕越伏乞皇上批示遵行謹奏甫到地方一切正需料理不必來京但秉公酌中悉心措置自無不合宜處前諭甚明遵奉可也同日又奏為奏聞事竊查何天培蘇州巡撫任内曠職負恩臣前已繕摺具奏隨又查出沈文良私鹽船隻一案何天培擅將原獲私鹽二萬一千餘斤枉法行私減去二萬斤止以一千三百八十三斤朦混具題臣謹另疏於本案附㕘外至臣前摺内查拏何天培家人白大白二飭委元和縣郝䨠究審各供據稱天培管理滸墅關侵用銀三千兩係書辦邱可逹經手又於龍江關狥情私放年羮堯木植過關應税銀一千餘兩又代原任蘇松巡道魏荔彤擔認管關缺額銀三千兩將所收正税賠補又得受原任鎭江府王珏銀一千二百兩原任蘇州府蔡永清銀四百兩又收受揚州府同知王嵩投拜門生禮銀一百二十兩并杯縀禮物各等供現在咨提關書邱可達質訊尚未提到臣今離任應俟署撫臣尹繼善查審具奏外合先繕摺奏聞謹奏尹繼善受事後自必審明具奏至飭部嚴檄緝捕重犯譚公安脱逃一案甚屬可惡明有賄縱情由當竭力設法緝捕務獲研訊疎縱實情奏覆毋因前任之事遂草率塞責雍正六年十月二十日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為請㫖事臣查兩江督臣范時繹養廉一案經原任蘇州撫臣陳時夏酌定於向給銀四千兩外再加二千兩以為養廉之資繕摺具奏奉有皇上硃批此事辦理是交與張坦麟欽此臣在蘇撫任内欽遵移咨范時繹在案及臣道經安慶面晤撫臣魏廷珍據稱督臣養廉現在議加等語今臣抵任江西查前撫臣布蘭泰移咨安徽撫臣原案亦稱江省向有督臣養廉銀四千四百兩恐未足支應將巡撫衙門舊規養廉八千八百兩内分出一千八百兩以為督臣養廉業巳具摺奏聞但臣未經奉有諭㫖仰懇皇上批示遵行再臣衙門養廉除分給督臣外尚存銀七千兩又臣衙門有鹽規銀一萬六千六百兩除解交藩庫一萬及捐買穀石外尚存三千兩又新撫臣到任各鹽商公繳賀儀一千兩隨禮二百兩臣巳飭存藩庫但臣衙門只存養廉銀七千兩實於公私費用有所不敷伏乞皇恩將前項鹽規三千兩并現在養廉七千兩合共一萬兩定為養廉之額其賀儀隨禮一千二百兩留充節僃倉儲之用則絲毫皆屬天恩而纖悉咸充實用矣至江省耗羨舊例加一徵收内除二分七釐為解餉並通省公費其餘係督撫兩司府㕔州縣養廉并起解錢糧鞘木脚費等項今據布政使李蘭禀稱各屬養廉内有不均通省公費亦不敷用現據建昌府通判沈東詳稱通省通判十員均有督運監兌之責而該員養廉僅有三百四十餘兩較之南昌吉安饒州三府大相懸殊若云三百餘兩即可養廉則二千餘兩者未免過多倘謂二千餘兩始足養廉則三百餘兩者似乎太少等語臣隨批布政使會同糧道秉公確查定議俟覆到之日容臣細加詳察另行具摺奏聞謹奏秉公斟酌料理均平摺奏以聞雍正六年十二月初三日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為奏聞事臣䝉瞻顧奉行不力臣與布政使李蘭商酌委員前往立限協追如承追官有狥情縱玩一經協追官察出即行指㕘江西各屬城垣類多傾圯緣歴年久逺未曾修葺如進賢崇仁興安上髙大庾永豐寧都信豐贛縣瑞金等縣皆坍塌過多修整非易約計工料需銀自萬千以及數百兩多寡不等今除民從前來去無常姦良不一自瑞州府之新昌縣棚民龔永錫等南昌府之寧州棚民楊龍友等聚稽核以期安民靖地從來火烈則人畏水弱則人玩臣前在蘇藩任内處漆紹文之後於通省事務加意整理不稍依違其時間有以太嚴議臣者今臣在江西承布蘭泰之後近得諸訪聞遂以安靜和平目臣在彼此相形兩地似有異同而臣之兢業自矢實未敢改途易轍欽承聖訓寛厚而不疎和平而不懦臣惟有夙夜謹凛遵循不懈以上副皇上簡任封疆之至意謹將臣現今辦理事件臚列上聞所有應奏事宜仍開具另摺伏候睿鑒謹奏一切不須多言但能勉勵公以為體中以為用則立身行巳居官為政之道僃矣同日又奏為遵㫖查議事竊照浙江布政使髙斌條奏蘇州滸墅關貨物税銀則例與部頒不符請刋榜曉示奉㫖通行直省各關將各處現行徵收則例徹底清查據實奏聞欽遵在案今江西所屬九江贛州二關臣逐一清查九江關自順治二年設立以來止徵各船料銀不税貨物其時原額九萬九千兩隨船大小估報徵收至順治十二年始有徵税則例又康熙十二年移關湖口加增額税銀十七萬二千二百餘兩若照原定則例徵收即不敷税額故歴年監督皆照船隻加税如舊例大船納料謂之滿貫徵銀十七兩五錢則加至四十七八兩不等其次為中滿貫舊例納料十七兩則加至三十七八四十一二兩不等其最大之鹽船亦照滿貫例徵收此三項收銀皆無另有加耗其餘一切大小船隻統名之曰時船雖照舊例徵收而無加税然正額一兩則另有五錢四錢不等之加耗總期滿足歲額不使虧缺行之數十年商民亦相安無異然歴年交部之稽考簿則仍照舊定則例虛報徵收而去其加徵加耗之名以符合一年之解額故報銷與徵收遂兩相互異臣抵任以後以該關收税事宜與各關大不相同正思酌改則例畫一遵循據管關饒九南道劉均抄呈原任撫臣裴􅏍度於雍正二年間摺奏該關徵税原非舊定則例請仍照現行估報不敢紛更等因奉硃批應如是無益之更張原可不必知道了欽此則是該闗之不應更張早巳在聖明洞鑒中矣臣自應照舊凛遵但裴􅏍度原摺亦止約言大概並未將加增收耗檔冊互異各情由僃細聲明具奏今據髙斌條陳奉㫖刋榜曉示以臣愚見應一一據實將從前遵行定例與後此加增加耗之處一例刋示木榜照數塡入報部冊檔仍於收正額一十七萬二千二百餘兩外核給各項公費其餘悉歸贏餘起解始為清晰倘以相沿年久商船皆相安熟悉仍以舊例刋榜曉示而各船耗銀悉照現行徵收總期儘收儘解以裕課而便商亦屬省簡可行因奉㫖徹底清查據實奏聞臣不敢不分析明白伏乞皇上睿鑒批示容臣另疏題覆再贛州關現行徵税之則例與報部之檔案原屬相符合併聲明謹奏前批裴􅏍度之密諭乃朕一時之見何得以此藉口今既接准部文奉㫖通行自當一一遵照部文改正題請部示況朕有㫖一切密奏不可宣露今所抄之摺乃裴􅏍度違㫖之舉汝豈宜奉為準的踵而行之耶識見甚屬卑淺愚闇之至同日又奏為恭請睿鑒事臣查江西各府州縣庫内自康熙十四年以至二十二三等年有奏凱收獲投誠繳納以及裁減額兵餘剩并有營兵捐置改造之軍噐陸續交存分貯南昌等郡邑一十九屬臣到任後檢查軍噐舊案從前俱有存冊若計算成造價値不下十餘萬兩因與布政使李蘭計議據稱當時所交軍械至今歴年久逺加之收存庫内霉潮蒸濕其中木革布絮悉成灰土不能手舉鎗刀甲葉皆為銹鐡不堪修補具詳到臣臣不敢以庫存軍噐聽其愈久愈壞當即批令委員前往各屬確查僃細造冊在案伏懇皇上天恩俯念軍噐歴經四十餘年而江省霉蒸卑濕更易朽爛恩准從寛免㕘賠補容臣分析查明其銹爛無用者請行銷燬變價存公如鐡質尚存可以修整者酌量各營留用另疏題明庶不致年久存庫終歸無著矣為此謹奏此事經李蘭僃細奏過於伊摺内批諭甚明問伊可也雍正七年正月二十九日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為遵㫖奏聞事本年正月二十日接准部咨奉㫖張景蒼著以贛州府知府試用贛州府員缺緊要令該撫酌量或即將張景蒼補授或於通省知府内揀選調補所遺員缺令張景蒼補授欽此臣與布政使李蘭商酌據稱張景蒼原為江西饒州府浮梁縣知縣保送閩省才能辦事但伊用度奢靡贛州離省窵逺臣等不能時加約束恐致踰閑失檢有累官箴查通省除衝繁府分需能員治理不便調補外惟瑞州府知府史隨操守謹飭人甚歴練臨江府知府髙遐年雖到任未久臣觀其才品優長人甚明白均可膺繁劇之任臣意俟張景蒼到時於族而居歴年積欠未清向多刁玩該縣金有福上年八月内徵比舊欠將監生李含英等監追武舉李紹廣等欲令釋放輒呌喊罷市經縣具詳咨革監禁餘犯李瀛洲李芳陳天錫等皆拒捕潛匿未經弋獲臣抵任後嚴檄該管道府委員督同協拘嗣據贛南道王世繩據該府縣詳請撥兵協拏臣查南昌府屬之新建縣知縣胡師周才具平庸難勝牧民之任止堪改授教職其員缺即將金有福調補葢新建附在省城臣不時教誡俾得勉供厥職倘或不知檢飭另行㕘處至寧都縣民俗刁頑必得幹員方於地方有益臣查饒州府屬之萬年縣知縣汪蓉照才具優長實能辦事前委協辦安仁縣賑務如法給散衆情帖服以之調任寧都縣自屬人地相宜除臣另疏會摺一併預為奏聞謹奏覽同日又奏為密行奏聞事臣於本年正月二十五日准湖南撫臣王國棟密咨内稱雍正七年正月初九日據辰沅靖道王柔拏獲匪類許英賢並訊供緣由事關姦匪合咨密拏張易珍及供内有名人犯取供監禁如無其人取結移覆計粘單一紙供摺一扣等因到臣臣查該道所訊許英賢供内稱張易珍係張天師之叔在龍虎山得有兵書結黨多人借捨藥為名往各省招人及湖南撫臣親訊許英賢則供張易珍並沒有這箇人小的實係借天師名色捨藥騙錢並無謀為不軌之事王道連夾六次受刑不過混供的等語但事關重大該犯初供鑿鑿後雖改供難以輕信臣即刻密傳按察使飛委䕶廣信府上饒縣知縣王還樸星往貴溪縣查拏首犯張易珍並搜查家中有無藏匿兵書又分委南昌九江南康三府查拏供内有名各犯又另密遣標員分往龍虎山鄱陽湖各處地方探訪的實俟拏獲人犯到案臣即細加研訊或實係糾黨為匪或係畏刑混供務得確情另行密奏合將臣准到密咨及臣現在委員分路密拏緣由先行繕摺奏聞謹奏此等事件寧可過於小心不可臆斷其無而疎忽從事天下之大兆庶之衆一二姦匪焉保必無自古以防微杜漸為要身膺封疆重寄平居當時時防察毋得逐日但以刑名錢穀為專責惛然置國家關係大事於膜外而不顧則節鉞之任難云不忝愼為之勉為之同日又奏為遵㫖奏聞事竊臣前因江省各官養廉不均司庫公用不敷繕摺具奏奉硃批秉公斟酌料理均平奏聞欽此臣與布政使李蘭通盤計算再三商酌養㢘公用皆取給於耗羨而州縣糧額各有多寡不等尤在乎酌量提留除漕米照舊提解一分并府徵額欵耗羨全提外其雩都等十縣糧額一萬兩以下者耗羨無多俱留為知縣養廉安逺等三縣糧額五千兩以下者除不提耗羨外仍分别添給以足養廉其餘州縣糧額二萬兩以下者酌提耗羨五分額糧三萬兩以下者酌提六分糧額四萬兩以下者酌提六分五釐糧額五萬兩以下者酌提七分糧額五萬兩以上者酌提七分五釐所剩餘耗即留為各縣養廉共提銀一十三萬六千二百九十八兩零俱貯司庫除督撫司道各衙門書役工食奏銷押運等項公費用銀一萬四千七百六十九兩零照舊支給外其各官養廉則分别地方之大小事務之繁簡減其有餘增其不足酌量均派共銀七萬二千九百七十六兩又各屬首領佐貳雜職等官遇公務差遣惟解餉一項有水脚支領其餘水陸程途往來奔走皆苦盤費無措仰懇聖恩准存銀二千兩以僃臨時酌給又南昌新建二縣附在省城尚有應辦之公務動須支應亦各存銀四百兩遇有支用詳明報銷以上共銀九萬五百四十五兩零餘存銀四萬四千七百五十二兩零又臣查出司道各官從前未提鹽規銀四千六百三十三兩六錢又各屬起解地丁例有飯食銀每年除支解外約餘銀五千餘兩均應歸公連前共銀五萬五千三百八十五兩零存辦公務較之從前提僃公用數止二萬九千六百九十餘兩今溢出二萬五千六百餘兩不但歲需公務無慮不敷即遇額外添辦亦可足用今除額辦各欵公務仍照案動支外所有酌派養廉數目另繕清摺恭呈御覽是否允協伏候皇上批示遵行謹奏總在汝秉公為之此等事朕既不深悉何能為之代畫凖繩至如養㢘之多寡懸殊處朕更不解在汝等自必有深知確見而然也雍正七年二月二十四日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為密行奏聞事竊臣准湖南撫臣王國棟密咨查拏匪類張易珍等臣密委廣信南昌九江南康四府嚴拏並密遣標員分往查訪各緣由經臣繕摺密奏今據䕶廣信府王還樸覆稱親往貴溪縣密行嚴拏並無張易珍其人取有練保族長并署嗣教大眞人府張慶麟印甘各結訪張氏逺族之中有名翼軫者該府因其字音相似拘到研訊乃係一孑身貧老訓蒙餬口居住茅屋一間搜其家中唯有破爛時文雜書幾本並無違禁之書又據南昌府覆稱密往奉新縣拏獲張子明雖名姓相同而面貌與來咨所開不合且係歴來在家耕種目不識丁之人從未出外亦不會算命地理之術又據九江府覆稱密往德化縣查拏朱文先並無其人取有印甘各結又據南康府覆稱密往建昌縣查拏江東榮江東號俱係雍正四年十月内在雲南地方兄弟同染疫疾身故伊徒詹爾文等帶回骸骨現在有墳墓可據親族可訊江自得劉惟和等並無其人許世基世朝世龍世胄世堂等俱係出外行醫並未回家拏獲許英賢之父許有儀胞弟許英資並許世基之父許冠瑞搜獲世基托英資帶回之家信及為許世朝帶信之許冠祿同現獲之李次文解臣親訊據許有儀等咸供許世基等實係在外行醫並無為匪之事查其帶回家書内俱家常言語並無别情又據李次文供生員是建昌縣學附生學名文珩一生教書為活從不出門許英賢是生員外甥許文英的堂弟等語反覆窮詰矢供不移并據南康府取具印甘各結申送到臣臣察核供情復檢查湖南來咨供單與辰沅靖道王柔所審許英賢口供毫無一實合之湖南撫臣王國棟親審許英賢所供張易珍並沒有這箇人江東榮江東號都巳身故朱文先張子明等名目都是夾昏了捏造的李次文是小的母舅是箇秀才現在家教書從不出門的是小的受刑不起扯上了等供俱各相符唯江自得據英賢供係親戚現在雲南劉惟和英賢供係鄰居現在家中今細查俱無其人似覺互異當咨明湖南撫臣覆訊許英賢確供方得實情又據臣所密遣往龍虎山鄱陽湖察訪之標員回稱各處地方俱極安靜並無姦匪潛匿龍虎山亦並無石裂之事則王柔所審張易珍招人都隱藏在龍虎山鄱陽湖之供更屬子虛矣臣研訊既確知現拏各犯悉屬無辜當即省釋其許英賢之父許有儀許世基之父許冠瑞暫行覊禁俟湖南撫臣審明咨覆釋放除詳細供情并印甘各結飭司覆審會詳咨移湖南撫臣核審外謹將臣親訊緣由繕摺奏聞謹奏此事自屬子虛但地方上凡遇此等可疑之事不得不過於愼重察明無辜即行釋放則人人皆知謹守自愛亦屬防姦之道汝等封疆大吏倘有風聞不可避多事之誚必當留心密察根據切毋失於疎忽誌之雍正七年五月二十四日内閣學士兼禮部侍郎署理江西巡撫印務臣張坦麟謹奏為奏聞事竊查江省本年自春至夏雨暘時若各處田禾皆已種植經臣具摺奏聞兹有南安府附郭之大庾縣於五月初三四等日連朝大雨初四日黎明溪水陡漲平地水深四五尺至本日午刻水勢方平而城垣橋梁民舎田禾不無衝塌人口亦有淹殁又該府屬之南康縣亦於是日驟發大水從府城奔下髙至一丈餘城外民人住居低下者衝塌土墻房屋計七十七户其餘居民概無傷損惟窩坑塘汛發水淹斃兵丁一名婦女一口等因臣飛檄布政司支動公用銀六百兩委員星夜前赴該二縣協同印官確查倒塌淹斃各家逐一分别挨戸賑恤無俾失所以廣皇仁仍勘明大庾縣被水田畝是否成災一面發給籽種令其補種晚禾其城垣橋梁等處被衝者亦估計工料次第議修外所有大庾南康二縣被水情形理合先行奏聞謹奏朕另降㫖由部頒發文到日實力奉行務令災黎得沾實惠特諭同日又奏為奏聞事竊查江省舊年晚禾收成各屬豐歉不等米價較常稍昂經臣請㫖糴米三萬石平糶又䝉皇上天恩截留漕米十萬石臣現在分撥各州縣業經具疏題報在案内有撫州府屬之金谿縣巳撥米一千石給領平糶旋據該縣知縣董天敘稟稱平糶雖減貴價奈窮民無銀仍難買糴羣懇借給常平倉穀臣以常平倉穀未敢擅動而乏食窮民必當賙濟該縣有現貯社倉穀石准令借給再撥截漕米一千石以濟平糶之不足先後飭知趲運去後又據撫州府知府羅復晉稟稱金谿縣衆民務要借給常平倉穀環請甚切臣又撥運省城僃貯倉穀一千石委員星速運往借給乃運穀尚未到縣五月二十一日據該府稟稱卑府於本月十五日聞金谿縣鄉民羣聚縣門要縣開倉汛弁排解反被將馬打壞卑府戴星前往十六日抵城親詣縣堂再三曉諭衆民譁聲鼎沸竟將卑府擁繞不散該令無奈只得於十七日開倉衆始寧息領穀三百四十六石多係二十一二都人其餘别都竟有不領者臣查知縣董天敘被勒開倉殊乖職守知府羅復晉親詣縣城不能約束均應題㕘但查金谿縣米價一兩二三錢不等未為甚貴臣已屢撥米石接濟民心亦宜帖服何至羣聚不散立逼開倉及至開倉反有不領而去者其中必有别情果據該府稟稱查有朱品仲者原係該縣責革蠧役更有鄭賢錫者係誣告董令革貢鄭𢎞謨革監鄭𢎞烈之族棍與董令有讐俱住二十二都糾合黨羽𫝊啓明周時俚等為首號召煽惑鄉尚堪策勵羅復晉聞信遄往並非怠玩今迫於衆勢遽罹嚴譴俱為可惜惟是該縣既與民情不甚相安如仍留原任恐致别生事端必須另調能員治理庶幾上下無嫌民情允服臣揀得糧道庫大使程懋泓係按察使胡瀛保舉引見之員奉㫖交臣以應陞之缺酌量試用查庫大使應陞與知縣調補統容臣繕疏請㫖合先一併奏聞伏乞皇上睿鑒施行謹奏於此一事觀汝通盤料理猶屬妥協同日又奏為請㫖事竊查江省學政衙門向有新進生員致送贄儀每名二兩四錢歲科兩考三年之内約銀九千三百八十餘兩其考試各屬皆係地方官供應每年又有學田租息餘剩是以從前均未議給養廉今學臣傅王霅到任與臣議及養廉一事據稱新生贄儀歴任學臣俱未曽奏明不便收受學租銀兩當照數給散不應絲毫存留考試供應薪蔬柴米亦宜裁汰移咨議給養廉等因臣與布政使李蘭酌定該學政養廉銀每年三千六百兩仰懇聖恩准給於司庫公用銀兩動支其學租贄儀考試供應俱當裁革今學臣現在按考撫郡臣巳檄行布政司支動公用銀五百兩先行移送以為養廉理合奏請伏乞皇上睿鑒批示遵行謹奏向來循行相安已久何必多此一番沽譽之舉況聞傅王霅未時點名入闈而又不容士子給燭觀此乖僻舉動未必得養廉而不分外貪求也莫若仍舊為是但汝既沽買虛聲業巳許給養廉今若揚言奉㫖不許而欲歸怨於朕則恐汝與李蘭禍不旋踵矣雍正八年五月二十六日原任内閣學士兼禮部侍郎在工守制臣張坦麟謹奏為請㫖嚴飭以重河防事竊臣等協辦髙堰隄工訪知山清一帶地方向有土棍倚恃衿監串同無賴棍徒别立義民名色每於河工興作向承修各官巧言承領委員不諳一墮術中聽其包攬始則衆集如雲繼則停工索找迨至錢糧如數全給非百計掯勒即逺遁無踪工程遲誤被㕘追帑其為害有不可勝言者現今承修山盱第十七段土工效力州同李霖被監生劉捷串同昌國盛等寫立合同作保承領收銀三千三百餘兩掯勒停工又承修山盱第十段土工效力武舉劉魯思被監生范一豹串同范標等冩立合同作保承領收銀一千二百餘兩輒行掯勒停工俱經淮揚道清算應追銀兩飭行山盱通判枷比而各犯悉已濳逃茲李霖劉魯思二員工程俱可補苴無誤而土棍包攬之害即此已可概見矣臣查髙堰石工料物所需甚多而部發人員新到工次路非熟徑㩦僕無多勢不得不付承領之人而説合擔任又係衿監易於入彀在土工每員領帑不過數千兩即受誑騙亦止數百有竒土方隨地可得補苴計日告成今石工領銀一員多至數萬餘兩一料有失動以千計縱家道殷實彌補無難而料物俱取之逺方非經年累月不能辦集姦猾衿監在在不乏保無有如劉魯思李霖之被其誑騙者乎臣再四思維此種陋習牢不可破非經上聞未能徹底澄清仰懇皇上敕下河臣轉飭該地方官嚴禁土棍串攬不許别立義民名色騙帑誤工如遇有遲誤除將承修官照例㕘處外并將承攬土棍附㕘究治如該員力能完補不致悞工即將告發誑騙之承攬人等按名題㕘究追立限嚴比庶積棍不敢仍蹈故轍委員不至欠帑於工程大有裨益伏乞皇上睿鑒施行謹奏據汝奏稱應敕河臣嚴禁包攬不許别立義民名色等語所見殊屬卑淺之至廷臣所議甚是今併發汝觀之諒汝平生志趣除錢糧為重四字外一無所知亦一無可取也硃批諭㫖巻四十六
