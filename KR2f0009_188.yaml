body:
  text: 欽定四庫全書硃批諭㫖卷一百八十八硃批孫文成奏摺雍正元年十一月初一日杭州織造臣孫文成謹奏為遵㫖覆奏事前奉聖㫖著令臣估看磬山情形巳經具摺奏聞臣隨喚各匠人等商酌務將百年舊剎重壯觀瞻其山門原係平屋五間今另造為天王殿五間大殿原係三間今改造為正殿五間殿前東西兩側原係樓房六間今拆造為配殿十間所有髙大長濶尺寸巳於圗內開明其第三層方丈原欲一併更改因寺僧堅以限於地基不願重建是以中止其餘一應羣屋務期盡行修飭完美所有應用物料臣親同各匠確估約需木石磚瓦各料及運費工食并裝修佛像佛座等項共該銀一萬二千九百兩仰懇皇上准令臣竭力修造以效犬馬今先將圗樣二副呈送御覽聽候聖主恩賜俞允臣隨即買備各料擇日興工謹奏姑且開工緩緩修理爾於明年來京見朕再定程限萬不可藉端向地方官生事滋擾亦不必勉强賠墊力少不敷即暫借司庫銀兩動用候朕另有諭㫖若循故套假公濟私之捐修朕不樂聞倘稍有風聲爾不但無功反罹大咎也慎之雍正四年六月初一日杭州織造臣孫文成謹奏為奏聞事杭州五月內糧米時價每石白米一兩一錢五分稄子米一兩麥子八錢稄子米禾苗有一尺三寸髙白米禾苖有九寸髙今年絲價頭等細絲每兩七分稍粗者每兩六分五六釐謹奏絲價低昻朕向未了悉歷來最貴之價若干最賤之價若干其詳細開明奏來朕欲知之雍正四年九月初一日杭州織造臣孫文成謹奏為遵㫖覆奏事臣前奏糧米時價并絲價摺內奉到皇上硃批臣伏查絲價從前互有髙下自皇上御極以來蠶絲連年俱好其價不甚騰貴如頭等細絲雍正元年每兩七分八釐有零二年七分二三釐三年七分四年亦七分稍次者雍正元年每兩七分二釐有零二年六分七八釐三年六分五六釐四年亦六分五六釐其粗糙不堪之絲臣衙門因無用處不行採買價比頭蠶好絲賤一二分因蠶桑年成與莊稼一樣看收成好歹定絲價貴賤大槩歷來上貴者不出一錢之外最賤亦得五六分不等為此具摺覆奏伏祈睿鑒謹奏所奏絲價知道了將磬山寺碑樣呈進朕量其大小以便書寫雍正五年正月初一日杭州織造臣孫文成謹奏為奏聞事杭州十二月內糧米時價白米每石一兩二錢五分稄子米每石一兩一錢五分麥子每石九錢四分謹奏米價等項總宜據實奏聞毋欲慰悅朕懷隨意增減同日又奏為奏明菩提樹結子事竊臣前䝉皇上諭問菩提樹為何結子不多欽此臣查此樹係佛地佳種南方得以生植皆出聖德滋培臣衙門內現有大小樹八株每年冬夏加意照管止有一株結子但開花結實之時無風則子堅固多收如遇風多之年便隨結隨落所以不能多結為此覆奏伏乞睿鑒謹奏所奏巳悉此樹乃係聖祖遺愛當加意培養毋令損傷同日又奏為叩謝天恩事竊臣在杭州無一非皇上恩德今又奉㫖將鹽規銀兩特諭賞給准巡撫李衛行文與臣臣聞命之下隨望闕叩頭因思臣何人斯䝉皇上如此矜憐實乃天髙地厚之恩臣惟有竭盡心力以圗犬馬之報為此具摺叩謝天恩謹奏受朕之恩切勿倚恃遂致膽大放縱舉凡爾織造所屬一切人役暨爾家人子姪輩槩須嚴加約束令其安分守法大家學好尤當崇尚節儉不得以聲色嬉戲為事如此則可永久保全體面矣爾試看一省之中督撫將軍地方文武官員假若仍踵故習爾亦循照舊日織造行為舉動可也否則必當擇善而行方好雍正五年三月初一日杭州織造臣孫文成謹奏為恭承聖訓事二月二十四日臣家人捧到硃批摺子伏讀之下不勝敬畏之至臣自前年冬叩見皇上時父子瞻仰雲日俱䝉天髙地厚之恩至今感戴思念時時不忘今䝉皇上特賜教誨如跪奉聖主面諭臣父子敢不日夜警惕竭力報效隨戒飭家人及衙役機匠等各各小心守分又將聖諭宣揚俾令學好共享升平之福至於米價貴賤臣原是據實奏聞菩提樹八株臣凛遵㫖意更當加意培養不敢玩忽所有奉到硃批理合恭繳謹奏覽浙省近日風俗人情如紳襟之好尚議論小民之豐嗇情形及駐防旗人游嬉奢靡之風較前若何光景據實奏聞爾年巳遲暮趁此歲月恪秉一誠既以效忠兼以造福顧不美歟朕不下詢爾自不應越奏今既問及當據實直陳無隱不可甘蹈欺君誑上之罪也雍正五年四月初一日杭州織造臣孫文成謹奏為覆奏事閏三月二十七日臣家人捧到臣奏恭承聖訓摺內奉有皇上御批臣敬啓跪讀惶悚感激臣至庸至愚惟知赤心辦事以報皇上眷注之恩雖日夜竭盡犬馬之力猶恐不足今䝉皇上垂問敢不小心謹慎據事直陳從前浙江人原多狡詐生事自奉皇上纍次教訓警誡改悔自新皇上又特用李衛為巡撫王國棟為觀風整俗使二臣時宣聖諭多方勸導近來紳襟各思守分罔敢為非百姓亦知朴實皆務耕種貿易獄訟少息人情風俗比前大改至於旗人操演騎射輪派當差將軍鄂密逹仰體皇上愛養訓練之心嚴加巡察吳山西湖等處不放一人間走禁止喫酒賭錢不許衣服奢靡聞得旗人與百姓相爭巡撫即移文與將軍或百姓與旗人口角將軍亦移文巡撫兵民畏法頗思戢睦此皆我皇上德化深厚聲教普被所致也謹奏凡百奏聞若稍有不實恐爾領罪不起須知朕非生長深宫之主係四十年閲歷世情之雍親王也硃批諭㫖卷一百八十八
