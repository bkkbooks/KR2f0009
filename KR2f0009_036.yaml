body:
  text: 欽定四庫全書硃批諭㫖巻三十六硃批謝賜履奏摺雍正元年三月二十六日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為奏明事竊臣一介寒微至愚極陋荷䝉皇上命臣廵視兩淮鹽課兩淮重地課額繁多臣之庸鄙曷克當兹感激洪恩末由報稱惟有凜遵成憲杜絶陋規恤商裕課勉竭駑駘以上報皇恩於萬一也臣新經到任視事除袪弊緝私之外惟銷引疏綱為急務查前任鹽臣魏廷珍任内有帶銷丁酉戊戌己亥庚子四綱未銷殘鹽共八萬四千九百二十引再辛丑綱魏廷珍本任内未銷鹽十三萬九千六百零五引臣現在勸諭各商上𦂳帶銷以便督運壬寅綱新鹽銷售各商皆感戴聖恩莫不踴躍報效現今竭力装運臣星速督銷以期課餉充足再照兩淮鹽政頭緒紛繁遇有應請聖訓事宜伏望皇上洪慈容臣具摺上請一切皆䝉睿示則臣愚得免覆餗矣伏候聖裁批示謹奏應請㫖者具摺奏來但若一切必候朕批示而後施行則不可爾任内之事朕何能周知詳細一一皆為訓示耶如此恐反致貽悞凡事湏将爾之主見明晰陳奏或有疑惑處亦必將爾之意向聲明朕以便酌量準定也雍正元年四月十六日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為恭請聖安事欽惟皇上躬送聖祖仁皇帝梓宫到陵孝思純篤超越前古㣲臣奉差外省聞聖主勤勞下情繫戀為此繕摺恭請聖安謹奏朕躬頗安皇考梓宫大事幸䝉上蒼黙佑百凡合儀得少伸子臣之心仰觀俯察天時人事俱皆和順都中内外平靜爾不必為朕過慮特諭雍正元年四月二十一日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為欽奉上諭事雍正元年三月二十七日准户部咨開該本部等衙門㑹覆工部尚書李先復等奏前事於正月二十六日具題奉㫖依議嗣後如督撫與廵鹽御史各有臆見著將情由達部聼候定奪欽此遵奉在案兹准湖廣督臣楊宗仁咨開本部院衙門每年鹽規四萬兩今出示首先革除嗣後總照三十年前例每包貴賤以一錢為准等因咨行到臣今據各商呈稱鹽觔買自場竈天時水旱不同産鹽亦多寡不一而鹽價因之從無一定且三十年前尚無織造河工銅觔等項捐觧近年増添至數十萬兩若照三十年前時價實屬虧本等情臣即將楚省陋規核算總計十五萬餘兩按數減價每包照時價減去六釐即合十五萬餘兩之數商本無虧民食亦裕等因咨行湖廣督臣去後今督臣仍照前定鹽價咨覆前來復據各商禀稱現運到楚鹽包出示後巳被小販乗賤買去囤積今商等又趕運不及勢必因民間缺鹽食淡以致地方多事則商等罪不容逭哀求告退呼籲盈廷臣思現在到楚之鹽既被小販買去囤貯後運之鹽又不能一時即到不特居民有食淡之虞而諸商觧體則新舊國課何從辦集勢不得不具摺奏聞伏祈皇上亟賜乾斷或仍照各省鹽法規例照依時價銷售或即照湖廣督臣所定之價每包量増一二分庶可無悮趲運而亦不致病民於國課民生均有禆益矣為此繕摺具奏伏候皇上批示遵行謹奏所奏是今巳有㫖諭部令爾㑹同楊宗仁確議具奏矣雍正元年六月二十日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為恭繳硃批奏摺事臣接奉諭㫖凡有硃批奏摺俱於齎摺時呈繳欽此臣遵將為奏明帶銷各年殘鹽數目一件為恭請聖安事一件共二摺俱奉有硃批理合遵㫖恭繳為此具摺謹奏知道了汝所奏為減定鹽價之事一摺留覽俟汝等題本到來再定但汝二人不應如此各執已見也朕今姑暫從汝議雍正元年七月初三日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為泣陳愚悃恭請節哀以慰下情事雍正元年七月初一日准督臣查弼納移送本年六月二十五日恭接皇太后遺誥一道謄黄到臣跪接之下驚愕哀號撫膺搶地竊思聖祖仁皇帝賓天之後皇上孝思純篤哀毁過情减膳悲憂逺送陵寢天下臣民莫不繋戀今又值仁夀皇太后升遐皇上大孝性成超越千古聖懐悲切自逾尋常臣奉差淮甸不獲親叩梓宫恭請聖安然沐恩深重戀主情殷伏望皇上少節哀思保護聖躬上以答宗廟社稷之靈下以慰中外臣民之望為此具摺恭慰聖懐下情曷勝孺慕謹奏知道了朕猶可勉強支持不必為朕過慮雍正元年十二月初一日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為奏明解過織造銀兩事竊照兩淮應解織造銀兩歷年遵奉已久兹於雍正元年三月十六日奉戸部咨行將江蘇織造銀兩停其支給兩淮應解銀兩彚行解部臣隨查前任鹽臣魏廷珍於康熈六十一年内未奉部文停止之先兩次解過蘇州織造銀五萬兩咨明户部部議以朦混支給行令江寜廵撫於違例支給之御史名下追賠等因竊思織造關乎上供稍或遲延即干嚴譴若部内先有停止之文運司必不肯起解鹽臣又豈敢轉解再本年六月内奉有停止江寜織造之文查前鹽臣魏廷珍經解過江寜織造銀四萬兩臣任内亦於未經奉文停止之先節次解過江寜織造銀四萬五千一百二十兩亦將情由咨明部議行令臣向江寜織造催還臣節次咨催差催杳無一字回覆竊思停止之文若經知㑹江寜織造即不應混催混收既收之後竟不回覆則錢糧從何著落臣請将解過蘇州織造銀兩在於審理李煦虧空案内併追将解過江寜織造銀兩行令曹頫解還户部伏乞聖恩俞允庶将來錢糧不敢混收急公者得免貽累矣謹奏照爾所請諭部矣聞何順人甚明白辦事好操守平常且瞻狥情靣汝當勸戒之即將朕㫖諭伊知道雍正二年正月十七日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為恭謝天恩事竊臣齎摺人囘䝉皇上賜臣御書福字榮幸非常謹望闕叩頭祗領訖摺内奉有硃批臣遵即勸戒運司何順據何順跪奏奴才自㓜庸愚初任外官兩淮錢糧重地惟恐不能勝任有負皇恩今特䝉聖諭教奴才成人令鹽臣謝賜履勸戒奴才跪聽之下不勝惶恐天恩髙厚不但奴才感激無地即奴才之祖父亦感戴於九泉嗣後惟有謹遵聖訓益加勉勵以圗報效於萬一等語所有遵㫖勸戒情由合併囘奏謹奏何順若能改過自新則巳倘仍怙終不悛爾當密奏以聞毋被伊累及於汝也雍正二年閏四月初四日廵視兩淮鹽課都察院右僉都御史臣謝賜履謹奏為備陳淮商困苦情形仰祈睿鑒事竊惟兩淮鹽課甲於天下正課之外雜項亦繁淮商積困巳早在聖明洞鑒中矣查兩淮鹽觔大半銷於江西湖廣二省長江挽運原屬艱險夏季南風不能前進故每年有預備鹽數十萬引候南風發時銷售去年因湖廣總督楊宗仁核减鹽價地棍希圗囤積貴賣一時強買至五十餘萬引因盡被囤賣以致預備鹽觔缺少按引計算每引少賣銀一兩即少賣銀五十餘萬兩商本有限豈能虧折如許迨欽差核定鹽價後微臣恐誤鹽課多方勸諭各商感戴皇上洪恩齊心竭蹷趕運以圗報效然商力巳竭目下皆無本營運癸夘綱尚不能開徴通商環庭籲懇代題請借運司庫銀濟運分作十年按年加息扣還臣未奉聖訓且鹽臣每年更換無徴收之責何敢冒昧具題但兩淮課餉關係匪輕數月以來運司何順懇詳懇禀通商江楚吉等哀籲不巳臣身肩重任勢難膜視除督令上𦂳開徴運銷外合将商困情形據實奏聞伏乞睿鑒謹奏題請借帑濟運之説㫁乎不可日前俱已經過確然無益之舉也且爾乃一清白人何故作此拖累身家遺患後人之事耶現今楚省百姓甚苦食淡爾與楊宗仁不思悉心竭力籌畫萬妥因事不諧欲將此必不准行之事奏朕以為将來託辭地歩則大負朕任用之意矣於爾奏未到以前巳諭廷臣㑹議令将兩淮兩浙照長蘆一例加鹽矣大約爾等所希冀者無過於此今既遂爾等之願可鼓舞商衆勉力辦運楚省鹽務第一要𦂳當設法籌畫為商民兩便之舉若仍然置之膜外互相推諉溺職之咎朕不為爾姑寛也雍正二年九月十一日廵視兩浙鹽課都察院左副都御史臣謝賜履謹奏竊臣䝉皇上隆恩廵視兩淮鹽課臣抵任時查前任鹽臣魏廷珍尚有未銷丁酉戊戌已亥庚子四綱殘鹽并辛丑綱未銷鹽共有二十二萬四千六百五引臣曽經奏明帶銷在案臣任内巳帶銷丁戊已庚辛五綱十九萬四千五百三十三引尚有未銷三萬七十二引至臣壬寅一綱除銷過引目外尚有未銷六萬三千四百二十六引再臣奉㫖留任管理癸夘綱除掣運過綱食鹽二十一萬七千四百八十二引尚有未掣運綱食鹽引今臣調任兩浙合將前項未銷鹽引一併交與新任鹽臣噶爾㤗督銷除壬寅綱督徴過課銀已經具疏題報外所有未銷引目交與新任接銷情由理合奏明伏乞睿鑒謹奏知道了爾但料理交代清楚噶爾泰自當題奏也同日又奏竊臣䝉聖恩命臣廵視兩淮鹽課夙夜兢兢管理壬寅綱一年商人向有匣雜等費凡督撫各衙門規例以及挑河築壩緝私火仗文武規禮過客盤費俱出其中向係各商自收自支鹽臣原不經管前鹽臣魏廷珍因兩淮有積年舊欠銀一百三十五萬餘兩奏請於此内每年節省銀九萬餘兩凑解臣遵於壬寅綱在匣雜費内節省銀九萬七千餘兩凑解訖再臣衙門向有經費銀一萬零三百五十兩為修理衙署紙張等項及鹽臣日用之需臣除一年用度外尚節省銀七千兩至癸夘綱經費臣止提銀一千兩為各場水災賑救之費此外並未曽支用即生辰節禮亦一槩拒却所有節省銀七千兩現存運庫聼候撥解臣愚昧寡識惟有自矢無欺以報天恩謹奏爾之操守朕所深悉何庸爾奏陳耶雍正三年二月二十五日廵視兩浙鹽課都察院左副都御史臣謝賜履謹奏竊臣猥以菲材叨荷皇恩調任廵視兩浙鹽課抵任以來夙夜兢兢惟有仰事宜容臣細加訪察次第奏聞外惟是兩浙地方私鹽充斥雖飭地方文武官弁嚴加偵緝而販私之徒究未能絶因思鹽産於竈姦徒興販往往勾連竈户查兩浙各場舊制有聚團煎燒之法今日乆廢弛各埸竈舍聚處煎燒者固多而零星散漫者亦復不少販徒竈户易於串售臣今飭行分司場員將散處各竈令其移歸本處共聚團煎編設保伍易於稽察其各竈户内有貧乏不能移者飭場員查明造冊容臣酌量捐給臣現在親赴杭所嘉所西路等場踏勘相度團聚基址指示督移俟有成局另行逐一摺奏則販源可清而引課得以無虧矣為此繕摺具奏伏乞皇上睿鑒施行謹奏所奏甚屬可嘉惟須實力奉行耳雍正三年八月二十八日都察院左副都御史降一級調用仍管理兩浙鹽務臣謝賜履謹奏竊照兩浙地方私鹽充斥額引難銷文武各官艱於廵緝由煎鹽場竈布置不得其宜俾姦徒易於興販惟力行舊制聚團煎燒私販可以漸少臣經具摺奏聞奉有俞㫖臣於二月初旬已赴杭嘉附近各場查勘相度基址復於五月中遍歴松杭嘉紹各所查勘盡心稽查務期得當除場竈聚處相宜者無容改移外内有零星散處者令其團聚一處使場員易於稽查亦有逼近私鹽要路易於私售者飭其改移善地則竈户難於串售臣酌量地宜一一親身指示竈户内有貧乏不能移者臣量加捐給俱限於秋杪告竣至於海邊僻壤單户偷煎者即令拆毁今據各場具報前来臣又委分司再徃覆查無異至寜温台三府道途遥逺臣不能親徃臣巳委該知府查勘移聚現經遵行造册詳報在案自此兩浙私鹽可以漸减引課可以無虧除現在場竈數目容臣於奏銷時造册報部外所有查勘各場竈移聚告竣情由謹繕摺具奏伏乞皇上睿鑒謹奏實屬可嘉行有成規之後惟在嚴守此法勿使移易耳同日又奏為奏明兩浙公費事竊照兩浙鹽政所轄温台寜三郡逼近海濱鹽難銷售引數無多商力單薄是以一切雜費向不派及祗有杭嘉紹松四所每年於每所内點甲商數人凡鹽務内一切公私之費皆其經管内中有關工食盤費食用必不可省者固多而不急之務亦復不少大約每年所派不下四十餘萬兩除題明歸庫者共二十五萬八千六百九十兩外其餘雜費陋規勢不能盡行裁去若不斟酌量減核為一定之規恐甲商受人需索無力阻遏因而多派則散商資本消乏課額難完臣仰體皇上愛民恤商徹底澄清之至意倣照兩淮雜費之例將浮費盡行裁減以恤商裕課謹將應存各項逐一分析另造減存冊進呈御覽伏祈睿鑒謹奏覽所奏料理處皆當但朕無暇判斷此等事也總在爾秉公合宜為之朕之耳目自能照察硃批諭㫖巻三十六
