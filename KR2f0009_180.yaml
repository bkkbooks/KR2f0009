body:
  text: 欽定四庫全書硃批諭㫖卷一百八十硃批李秉忠奏摺雍正六年二月十二日杭州織造臣李秉忠謹奏為恭謝天恩事竊臣一介庸愚至微至賤由廣儲司司庫歷升內閣侍讀學士雍正五年九月荷䝉聖恩超擢河南按察使赴任未久寸長莫效又䝉皇上慈鑒以臣刑名事務未甚諳練著以按察使銜管理杭州織造事務聞命自天報稱無地臣自問何人膺此重任惟有竭盡駑駘勤慎供職以仰報皇恩於萬一耳所有感激微忱理合具摺奏謝謹奏今將爾調任蘇州織造矣勉力供職惟當以顧惜顔面為務雍正六年二月二十七日蘇州織造臣李秉忠謹奏為恭謝天恩事竊臣於雍正六年二月二十二日准浙江督臣李衛咨准吏部咨開奉㫖李秉忠著調補蘇州織造仍兼理滸墅關稅務欽此欽遵隨即望闕叩頭謝恩訖伏念臣荷蒙聖恩以按察使銜管理杭州織造事務任事未及一月復奉恩㫖著調補蘇州織造仍兼滸墅關稅務臣聞命自天報稱無地膺此錢糧重任惟有矢公矢慎竭誠供職以仰報皇恩於萬一耳為此繕摺奏謝謹奏竭力保全顔面莫負朕任用之恩但爾等包衣下賤習氣率多以欺隱為務每見小利而不顧品行辜恩者不一其人即爾奏中矢公矢慎等語朕亦未能遽信試勉力行與朕看雍正六年三月初三日蘇州織造臣李秉忠謹奏為奏聞事竊臣於雍正六年三月初二日到蘇視事確查今春雨水調和菜花麥子俱甚茂盛將來可獲豐收現在米價亦不髙昻小民樂業毋煩上厪聖懷所有二月分米糧價值并晴雨日期理合另摺開報謹奏覽雨水調和情形深慰朕懷凡如此等之奏務須一一據實入告毋得絲毫隱飾即地方一切事務及大小官員之優劣若果灼見無疑亦當據情直陳倘不慎密招搖炫露借稱朕之耳目擅作威福嚇詐地方則自貽伊戚也且不但本省宜然蘇州地當孔道為四方輻輳之所其來往官員暨經過商賈或遇有關係之事亦應留心體訪明白密奏以聞織造鈔關雖兩處衙門皆無繁勞辦理之處與其空閒無事何如於此等處留意莫愛惜心力趨避利害一秉良心為朕效力朕自然知悉若惟徇一巳之私容默自便及虛張聲勢分外多事亦不能逃朕之照察也勉之慎之雍正六年九月初六日蘇州織造臣李秉忠謹奏為天威遠播事欽惟我皇上治隆千古功冠百王文德覃敷洽深仁於異域武功赫奕凛聲教於殊方凡戴髙履厚之區日出扶桑之地無不遠奉正朔爭效享王乃有阿爾布巴等逆天背理侵擾西藏皇上胞與為懷赫焉震怒特命大臣帶兵前往究察情由分别治罪一切機宜皆預定於宸衷勝算今渠魁巳經就擒從此沙漠永清共樂升平矣臣接閲邸鈔不勝踴躍歡忭之至為此具摺稱賀以聞謹奏此事仰賴上天垂慈竝聖祖在天之靈默佑成功實非人力所強能者奏事之摺留中同日又奏竊臣保薦監察御史現在江南稽察錢糧伊拉齊前在養心殿造辦處與臣一處當差見其為人謹慎操守頗好才亦敏捷今稽查錢糧盡心料理辦事明白堪勝布政使之任前任河南南陽府知府今升江寧糧道劉永鐄臣在河南時聞其在滎澤縣聲名甚好後見任南陽府辦事勤敏刑名諳練操守亦優堪勝按察使之任為此繕摺謹奏此二人何待爾舉保朕素所知者聲名俱好劉永鐄居心尚未悉其定向若肯向上造詣將來更當進益但少覺虛僞耳雍正七年二月初四日蘇州織造臣李秉忠謹奏為奏明商船阻淺事竊臣於雍正六年三月初二日到任徵收頭二三季正餘錢糧俱有九萬十萬十一萬不等悉按季報部矣惟第四季錢糧自十二月至正月兩箇月止收二萬九千兩有竒於正額尚未足數查現季錢糧短少情由悉因上年夏秋之交雨水不多民間又復戽水溉田是以稼穡豐收而河水淺涸目下又兼空艘南旋重運北上以致鎮江口至丹陽一路凡來往商船以及官員差使人等船隻停泊河干俱難行動甚有耽擱數十日方能進鎮江口者如遇重運阻淺又拏商船起剝目今不但貨船不能到關致虧國課即糧艘亦多阻滯恐誤漕運理合據實奏聞伏乞皇上敕下漕臣暨督撫二臣如何設法使河路疏通庶漕務不致有誤而課稅無虧行旅商民均有禆益矣謹奏漕河阻淺殊未之聞商賈船隻或因重運北上不無耽延阻滯耳雍正七年三月初十日蘇州織造臣李秉忠奏為恭請陛見以抒蟻悃事竊臣自雍正五年九月間䝉聖恩超擢河南按察使赴任未久特命管理杭州織造旋調蘇州又兼滸墅關稅務暌隔天顔迄今幾近二載臣受恩深重悚惶依戀更倍尋常今關差一年任滿共收正餘錢糧三十五萬九千五百五十兩有竒除額解銀十九萬一千一百五十一兩零盈餘銀一十六萬八千三百九十八兩零現在彚解伏乞聖恩允臣赴京陛見恭請聖安則外任事宜既得跪聆聖訓微臣下悃庶幾少遂瞻依仰沐洪慈於生生世世矣為此具摺奏請以聞謹奏不必來京在任勤慎效力勝如無益之往返也諸如地方上風聞事件從未見爾陳奏一次此後亦當留心訪詢但須慎密毋借此作威福於人若不能密不如不奏也硃批諭㫖卷一百八十
