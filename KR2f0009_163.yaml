body:
  text: 欽定四庫全書硃批諭㫖卷一百六十三硃批李淑德奏摺雍正五年二月二十六日鑲黃旗漢軍副都統臣李淑德謹奏為奏聞事竊臣奉㫖興修江南水利於二月初二日跪請聖訓䝉皇上面降諭㫖臣祗聽凛遵於夲月初四日起身初七日在直隸滄州地方見過怡親王於十六日到江南清江浦總河臣齊蘇勒總督臣孔育珣跪請聖安臣隨將上諭齊蘇勒有病不可纍伊之㫖傳諭即日同總督臣孔育珣起程於十八日行至淮安府寶應縣地方適遇巡撫臣陳時夏遵㫖踏看運河跪請聖安臣即將上諭先將要緊河渠速行酌議疏浚之㫖傳諭臣同孔育珣於二十四日巳到蘇州府現同孔育珣先將臣昔日經厯所知數處一面踏看俟巡撫臣陳時夏踏看運河事畢回署原任巡撫臣陳世倌到蘇公同相度緩急酌議先後興修之處另行合詞具題外所有臣到蘇情由理合繕摺奏聞謹奏所奏俱悉但齊蘇勒患病光景若何並不奏聞殊屬忽略之至至於地方情形隨時變換河道遷徙不常不可刻舟求劍況爾離彼處為日已久若因前此巳有條陳必欲強符所言則大謬矣雍正五年閏三月初六日鑲黃旗漢軍副都統臣李淑德謹奏為奏聞事竊臣奉命江南興修水利看得太湖阻滯實為江浙之患其婁江吳淞江黃浦江均屬泄水入海要區惟婁江自吳江縣受納湖水繞蘇州府過崑山縣近太倉州接劉河入海關係重大年久淤塞潮來僅有一線潮回則舟楫不通查商賈貨船向由婁江吳淞兩路往來婁江淤塞尚賴吳淞隨潮上下若將婁江吳淞一時竝行開濬則商賈皆為阻滯是以臣等已將先濬婁江之處具疏會題今臣㑹同巡撫臣陳時夏選派蘇松道孔育璞及府㕔等官料理一切工程事務帶領州縣佐二雜職人員分段興工臣與陳世倌竭力督催務期於芒種前農務未興之時挑濬完竣以仰慰聖懷臣再查婁江有通海閘一座內可蓄水外僃海防年久傾圯必用重修所需石料現有袁家渡拆毁之閘又有海邉衝塌廢城一隅其中磚石儘可選用無庸另辦只須樁木灰漿人工運費已經委令地方官員細估修建至於吳淞江等處宜加疏濬者甚多統俟逐細確勘會疏具題所有現在儧工竝估修閘座情由合先繕摺奏聞謹奏好秉公勤慎為之諸凡切毋自用聰眀庶不致差謬也雍正五年閏三月二十九日鑲黃旗漢軍副都統臣李淑德謹奏為直陳水利仰祈聖裁事竊臣查蘇松常鎮原屬水鄉所有沿江濱海之區稍有淤墊潦則田疇被浸旱則地土乾涸以致上厪宸衷動銷國帑興修水利臣細勘現在應修之處甚多自應仰遵聖訓盡除淤塞廣蓄水泉始於民生有益查婁江一處工費已及三萬有餘若通行修濬約計錢糧不下二十餘萬在皇上愛民如子固不惜百萬金錢而臣再四思維實有不甘於心者水利工成則東南盡為樂土國家糧賦不過什分取一以利益民生之事豈可盡查現在應濬各河地方官員所量丈尺估計土方不足盡信惟候婁江告竣之後皇上賞來效力人員到時臣率領㑹同地方官員親身國計民生為念是否允協跪求皇上聖裁謹奏矢口亂道甚屬無知硃批諭㫖卷一百六十三
