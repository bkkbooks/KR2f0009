body:
  text: 欽定四庫全書硃批諭㫖巻九十一硃批董象緯奏摺直隸古北口總兵官臣董象緯謹奏爲欽奉上諭事臣於本年十二月瞻仰天顏㳟聆聖諭爾所屬曹路南峪溝砍伐木植此亦有益民生但與霧靈山相近恐有關礙爾可查明具奏欽此臣囘署卽親至曹路勘得南峪溝口等處年來所伐木植係在報部四至界内並無關礙霧靈山之處臣復查界内木植旣巳無多而成材者更復寥寥現今巳伐之木因道路艱難尚未盡出或俟巳伐木植出盡之後嚴行禁止或仍於報部四至界内聽其砍伐相應繕摺請㫖謹奏俟巳伐木植出盡之後卽行禁止砍伐可也直隸古北口總兵官臣董象緯謹奏爲㳟報雨澤事竊照古北口地方於雍正元年三月十二日甘雨一日十分霑足又據懷柔密雲石匣熱河等處俱報同日得雨亦皆霑足理合奏報謹奏甘雨及時眞可謂天恩浩蕩也直隸古北口提督臣董象緯謹奏㳟請皇上聖安朕安爾所奏駐防一事甚屬詳妥巳發該部矣直隸古北口提督臣董象緯謹奏爲㳟報雨澤事竊臣查古北口於雍正元年五月十七日得有微雨十九日復得大雨高處四寸平處霑足據河屯營守僃報稱熱河等處俱於十七八日得雨二三四寸不等又據石匣營石塘路曹家路懷柔縣遊擊守僃等報稱各該汛内俱於十七八日得雨一二寸三四寸不等理合一併奏聞謹奏覽奏甚喜但要據實奏報不可增飾分數直隸古北口提督臣董象緯謹奏爲恭請聖安仰慰睿懷事雍正元年六月十四日准直𨽻撫臣咨送大行皇太后䘮禮儀注到臣臣悲悼之下伏惟我皇上大孝大仁根於天性㳟遇皇太后仙馭升遐哀痛悲傷必深且摯臣雖至愚何敢以節哀一語妄瀆宸聰竊思去年聖祖仁皇帝龍馭上賔臣叩謁梓宫後因查汛入京恭請聖安兩次獲覲天顔仰見我皇上悲泣涕零過於哀感今年三月叩送聖祖仁皇帝梓宫復見我皇上悲思之切誠篤如初今時當炎暑復抱皇太后升天之痛想見我皇上聖心哀結罔極情深必有過爲悲泣者臣五内徬徨不能自禁是以不辭冒昧恭懇皇上念聖祖付託之重薄海内外仰頼之殷勉攝聖體少節哀思則天下臣民幸甚臣犬馬微忱謹具摺恭請聖安謹奏朕躬安爾不必爲朕過慮皇考大事實力已竭今不幸復値皇太后大事朕無奈惟以皇考付託之重爲念勉强忍痛而已所奏知道了直隸古北口提督臣董象緯謹奏爲恭請叩謁大行皇太后梓宫以伸哀念事伏惟皇太后化洽宫闈慈周寰宇宜乎遐筭倍增長衍千秋昌熾純禧永懋式昭萬世懿徽何期仙馭遽爾升遐臣世受國恩至深至重分宜匍匐皇太后梓宫之下躬親叩首伏懇皇上俯允臣請俾得單騎赴京庶幾少伸哀念於萬一爲此繕摺請㫖謹奏地方要緊不可擅離況大事巳過候八月盡爾赴京叩謁可也直隸古北口提督臣董象緯謹奏爲要地需才謹據實奏懇仰祈睿鑒事竊查臣所屬昌平營㕘將馬承璋奉特㫖陞補張家口副將山海路都司王道義潘家口守僃孫得明奉部推陞其員缺應聽部推但昌平營㕘將山海路都司兩處地方均關緊要臣旣有所知之人敢不據實奏聞謹查臣標下右營遊擊楊雲棟密協右營守僃劉正俱係臣深知灼見之員才技俱優楊雲棟堪以陞補昌平營㕘將劉正堪以陞補山海路都司如䝉天恩俯允陞授則臣標右營遊擊之缺有現陞遊擊之都司王道義對品留補洵爲人地相宜其密協右營守僃員缺查有遵化營千總李挺人材健壯弓馬熟嫺堪以擢補至於潘家口守僃一缺查得臣標下右營千總陳萬里頗能整頓營伍操練兵馬堪以擢補雖現今奉有部發年滿千總何敢妄行保奏但李挺陳萬里二弁臣素所深知試有成效故不辭冒昧一併仰懇洪慈可否破格簡用出自皇上天恩爲此具摺請㫖謹奏俱照爾所請補授巳降旨該部矣廣東提督臣董象緯謹奏爲奏聞事竊臣於雍正元年九月二十六日陛辭跪聆聖訓䝉皇上訓誨殷殷周詳懇摯更䝉寵錫便蕃有加無巳臣弟兄惟有凡事盡心竭力不敢稍渉欺罔以圖報答方官收稅感頌聖明至於廣東武職衰邁闒茸者甚多而陞銜留任更多不稱厥職卽保題員内亦不過恐其引恩深重不敢隱匿謹據實陳封疆有益以圖共報天恩爲此繕摺奏聞謹奏文武和衷固屬美事若志趣迥然不同則亦難以裨益封疆總之爾於此一年來多次見朕所以深知朕心楊琳從未覿面受朕指訓年希堯又庸愚無知凡事爾宜自立主見莫被伊等揺奪勉之廣東提督臣董象緯謹奏爲奏聞事竊查右翼鎭屬翁源縣民林書保家於雍正元年十一月初三日夜被賊捉去人口一十六名經督撫二臣檄令惠協都司姚夔提標守僃殷文達會同右翼鎭屬𣲖撥官兵𠞰捕臣到任後又派委守僃劉涵前往協拏兹據右翼鎭臣咨稱官兵追至賊穴斬一賊首級餘皆奔㪚惟將被虜人口盡行救回等因前來伏查廣東地方此等之事甚多此案未傷人命勢必外結何敢冒瀆宸聰但以事關聚衆搶掠又不敢扶同隱匿如果差去官兵能將賊徒盡行拏獲或能拏獲過半臣自聽督撫二臣結案若以擄口救回未傷人命不將賊徒實力盡殲遽思完結臣必查其兼轄專汛以及派出各員嚴加㕘處獨是此等擄掠人口之事敘入本内恐抄傳遠近駭人耳目臣亦惟以廢弛營伍糾㕘伏乞皇上睿鑒謹奏此皆向日陋習積弊有何駭人耳目處卽善於諱飾亦不過掩朕一人耳目而已天下人孰不知之嗣後如遇此等事件但宜據實直奏況粤省視盜案爲常事以欺隱爲成例頑民以法令可玩而輕犯兵弁因賞罰不明而懈弛此種惡風爾豈可效法之耶楊琳怙惡不悛徒欲掩葢巳往之迹年希堯懦弱庸愚未能剔除現在之弊爾若復蹈因循之轍虚應故事朕只得於各省大員内輪替更換務將能靖盜之人用來粤東俾地方一淸彼時爾等何顏以見朕耶將此諭通知該督撫爾等同心協力整飭粤省盜息民安方可見朕否則恐爾等因循怠忽違旨溺職之愆當不起也功罪賞罰不明將何以服衆心恐駭人耳目借以他罪處分是何言歟捕緝專責寧任兵弁之曠弛爾等私賞豈抵朝廷之議叙自此以後必以明功罪除欺隱爲要務特諭廣東提督臣董象緯謹奏爲請旨事竊臣䝉皇上高厚之恩授以廣東提督莅任之後接見各官查其年力衰邁者甚多伏念東粤要區未便以伊等通行考驗詳加辨别其有年老不及者除其自知曠廢情願告退之員仍聽其乞休外餘必會同督京稍逺一遇缺出或經題補或候部推累月方能到任要缺必致久懸伏乞皇上敕下兵部或旗員或侍衛或候補候選人員揀選數十名開列引見恩賞來粤遇有缺出臣會同督撫二臣量其人地具題請補授庶巖疆得人營伍自然改觀更有請者臣古北口任内昌平營㕘將馬承璋拏獲人和當刦賊六名有涿州營把總劉方成協同緝獲膽勇可嘉伏乞皇上准賞來粤遇有千總缺出暫行補放試其料理營務果有可觀另行題補是否可行𢎞恩出自聖裁謹奏另有㫖矣廣東提督臣董象緯謹奏爲營伍務宜整理將僃必在得人謹據實奏請仰懇睿鑒事竊查臣標右營遊擊一缺應援全省實係臣之臂指必得能員方克勝任今看得四會營守僃張鳳起才猷敏練堪以擢補又查三水營守僃一缺地當孔道鎭平營守僃一缺界連閩省連陽營守僃一缺逼近猺排俱賴賢員料理兹有鑲黃旗漢軍驍騎校劉汝霖福建駐防鑲黃旗驍騎校邢雲貴古北口石匣營千總哈雲棟古北口太平寨千總福益𢎞此四人騎射兼優辦事勤愼臣素日深知灼見不揣冒昧仰懇天恩准以張鳳起補授臣標右營遊擊劉汝霖補授三水營守僃邢雲貴補授鎭平營守僃福益𢎞補授連陽營守僃倘䝉俞允則張鳳起所遺四會營守僃員缺懇以哈雲棟補授可否簡用出自天恩爲此繕摺請旨謹奏何營不需好員隔省題人不可其餘所奏皆是㕘遊以下補用人員巳揀選二十餘員發往矣爾所題請人員中可以准發者亦入揀選内一併發往到時爾酌量題補廣東提督臣董象緯謹奏爲據實奏明水師情形仰祈睿鑒事竊照廣東營制半屬水師向例題補員缺自副將以下俱選熟識水性之人誠取其人地相宜便於海道耳臣歷驗水師人員有歷任水師毫無裨益者有原任陸路至水師著績者大抵人地無拘惟才是視惟守僃以下專供驅策應需熟識水性之人至副將㕘遊則係統領督率之員若果駕馭有方運籌有術似不宜以水師拘也臣不辭冒昧請以守僃等缺仍揀水師人員副將㕘遊不拘水陸惟以幹員題補以試其駕馭運籌之畧倘䝉俞允則海疆收得人之效矣是否允協伏候聖裁謹奏水師難於得人卽陸路亦屬不易此事甚有關係大半總督之責與孔毓珣商酌可也廣東提督臣董象緯謹奏爲據實覆奏事雍正二年二月初六日准原任廣東督臣楊琳抄錄正白旗漢軍副都統金鐸條奏拖風船及違式漁船槪行拆毁一摺欽奉硃批金鐸條奏此摺爾可與提督董象緯密商應行卽行不應行密摺回奏到臣欽此隨卽悉心籌畫移商督臣楊琳聽其酌議緣二月二十二日督臣身故臣應專摺據實奏明查拖風船亦係捕魚之船但漁船定例樑頭不過五尺不用葢板拖風船則上釘葢板樑頭九尺一丈甚至一丈一尺不等文武員弁因其違式皆得勒索遂其所欲則船之姦良竟置莫辨其間亦偶有如條奏所云接濟賊糧藏姦爲匪之弊實係官弁疎縱竊念粤省沿海居民大半皆以捕魚爲業而採捕非大洋不能得魚入洋必得大船始能禦浪民生攸關實難拆毁但旣欲便民仍須弭盜臣再四思維欲除接濟藏姦等弊惟宜船主取隣佑保甲甘結水手取同船互結一船爲匪事發甲隣連坐一人爲匪事發互結連坐近奉特頒諭旨各省出海船隻分别油飾刋刻編號今飭令此等漁船亦遵此例則防閑有具船不致爲匪民得以資生矣再條奏墺甲詭辭存案一弊竊查沿海船隻果遇風飄或被賊擒必本船有生回之人始有情形日月可據否則墺甲何從得知而遽代爲存案此亦該管地方官不加詳察之故惟令存案之該衙門於此處確查的實果係被風被賊生回有人方准存案不許墺甲代爲具呈縱有詭計亦不能施是詭辭存案之弊亦自易除矣謹據實繕摺奏覆伏祈睿鑒謹奏爾此奏旣公且直毫無隱諱甚屬可嘉大槪與楊琳意見亦相仿朕已將原奏原議俱發交督臣孔毓珣令其斟酌爾與孔毓珣議妥再行奏聞廣東提督臣董象緯謹奏爲僃陳營伍那欠餉銀設法補前杜後事竊臣莅任後查兵馬錢糧那欠成千累百臣巳飭令各屬協營凡提督衙門一切規例及餽送節儀等項盡行革除以之陸續盡補前欠倘仍敢虧欠臣卽特疏糾㕘然此爲陸路人員計不過一半年間自可淸楚至水師虧欠更甚每藉口於捐修船隻臣查出洋遊廵船隻非遇定例修造年分設爲風雨損壞皆營中公捐修整今嚴飭彌補是從前之虧欠可淸而後日之弊未杜臣思通省馬價一項上年兵弁情願每匹扣銀三兩補王綱明虧空荷䝉皇上天恩免其代補此項銀兩實係羡餘請將通省應發馬價銀内每馬一匹扣銀三兩約銀四千餘兩如遇遊巡船隻果於不應修造年分因風損壞該營據實詳明督撫提督另委賢員勘明估計加具甘結赴藩庫具領以資修葺則營員無從藉口而後日虧欠之弊自除矣爲此繕摺請㫖謹奏此事亦當與督臣斟酌今將陸路之錢糧修補水師之船隻一者恐陸路兵弁不甘二者恐水師中小人輩見現有修補之項不費已資因而隱匿揑報等弊不能保其必無似非良䇿也將朕前後所批三諭及爾之所奏併與孔毓珣看明爾等悉心籌畫妥協具奏不可有意迎合遂以朕諭爲是也廣東提督臣董象緯謹奏爲遵旨回奏事竊臣標新任中軍㕘將楊大立到惠赴任口傳該㕘將懇恩賞戴翎子一事欽奉聖諭爾且戴往廣東任所著提督董象緯具摺來奏不必用本欽此臣伏思楊大立原係乾淸門侍衛今已䝉皇上格外施恩准其戴翎至任是曠典出自天恩而該㕘將身膺異數必倍加鼔勵以圖報答於萬一臣謹具摺奏聞謹奏楊大立准其戴翎但不可因係乾淸門侍衛稍爲瞻顧朂伊勉力做好官以報朕知遇方是伊若少有負恩玷職之處朕必加倍處分也將其到任後如何效力供職光景據實奏聞朕看此人將來大有可望第恐其少年放縱自暴自棄則無如之何矣廣東提督臣董象緯謹奏爲恭領聖訓仰祈恩宥事竊臣接臣弟董象台書信内云雍正二年十一月初七日䝉聖恩召見跪聆闕叩首感激無地竊臣受皇上隆恩授爲廣東提督莅任一載寸長未效負咎良多荷䝉皇上不卽加譴斥猶諄諄敎誨使之改過自新戴恩負罪心膽驚裂敢不洗心滌慮痛改前非以仰報皇上寛宥訓誨之至意仍懇聖恩明切指責俾臣得勉竭犬馬圖報微忱則更邀天恩於望外矣爲此繕摺奏謝謹奏爾之聲名未聞有不好處但爾於陛辭時許朕件件據實奏聞今抵任年餘所奏何事行不符言朕心不愜且爾向都中奔競特甚不如仗已之忠勤靠朕之眷顧穩妥否則徒有害而無益也若悉聽都中信到然後舉行事事失機會矣勉之廣東提督臣董象緯謹奏爲奏聞事雍正三年正月初四日據龍門營守僃胡世勲報稱雍正二年十二月二十二日該營千總劉貴帶兵巡遊至鬼葢山遇賊一夥對敵傷故千總劉貴一員兵一名等情到臣臣隨飛檄廣州副將賀捷派撥官兵協捕臣又於本日派撥千總一員把總一員兵六十名於初六日起程赴龍門協捕又於初八日派撥遊擊一員千總二員把總一員兵一百四十名由長寧各山場搜捕堵禦會合督臣委員同𠞰務獲俟獲日聽督臣題報事關官兵傷故臣謹具摺奏聞謹奏凡百悉當據實直奏方是卽此一事亦未必盡情傾吐也廣東提督臣董象緯謹奏爲奏聞事竊臣准督臣孔毓珣咨稱本部院現在捐造盔甲陸續分發各營今製成鐵盔甲戰裙一千頂身差官齎送希發提標五營兵丁披掛操練等因到臣臣卽令中軍㕘將分發五營換補配兵操練訖理合繕摺奏聞謹奏知道了另奏三摺一發部議一留諭新任撫臣一留中候引見人員到時對閱諸凡益加秉公勉力毋得少懈硃批諭㫖巻九十一
